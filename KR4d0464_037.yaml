body:
  text: 平陽府重修道三晉之地表山帶河風土者侯小者卿采圜檄二千餘里自前代來視諸道為上遊平陽實治理所在故府署之制崇壯麗勢壓不爾與山川形勝莫相長雄道愛堂今府治之前事其東西廣十有五尋南北一辛丑都監郡薛闍公因故基創焉當至元十一年甲戍歲蓋三十有三載矣歲月既墳土木弛解侏儒就弱西騖夏沉氣湮鬱不時脫落殆不能視顛撑危上冬官考工悉許公帑於是慿寬如相前增崇之腐撓敗者蓋甎之破裂者之折者與夫吏舍臺門狼藉之然山大瞻重門洞盡城之南北望衡玄居六曹執事登降公式治于中從容委之隆於治以一之用宣于斯審于斯不勤官之戒凛取學人之意也即府判官西衛王惲謹記平陽路景行里新修岱嶽行祠記岱宗東方之鎮山有國者得以旅焉祭典下哀世以神司命萬類死生禍福幽明會歸故所在駿奔奉祀惟恐居後去之逺者其敬篤事之肅者祠愈崇蓋其風俗使然復何怪焉平陽故族張士信等信之篤事之尤謹者也常以匪廟而貌之不足妥靈揭虔牖人於善也於是傾資擇勝得東南陬景行里爽塏之地甚延奠其神觀焉實經始于辛邜歲之三月于至元之戊辰凡締屋幾三十楹前殿後寢兩廡翼中設冥府諸像曰昭惠君蒿里相祈嗣位五重直及隂圄變相擁衛環列罔不畢偹巍巍煌煌帝居光俾觀者起敬加畏知所勸戒善油然而生于衷洋洋焉對越靈威如在其左右也下至作樂有亭省牲有逼便户鑿乎西臺門敞其南槩瞻餘祠號稱整肅吁勤亦至矣一日來丐文於豫將紀其興建本末洎信助者之名氏永昭于後因略為論述之嗚呼古人以神道設教今也作新祠宇為事理雖殊而勢有固然者自禮義亡而世教不明於下一鄉之士秉彛心而私淑人者不爾則弗克悟陋民而警薄俗是則後人之意也歟然神也者聰明正直福善禍淫乃其職耳奉之者歲時儀獻能齋莊沐潔逺惡遷善可薦而不為神羞吾知夫朋酒斯饗獲簡穰之祉矣不然慊負中積象恭于神雖鏘之以鐘鼓之音腆之以牲幣之禮芳菲滿堂三獻具舉神將厭而不顧尚何福之有哉幸來者詳特書之意庶乎其逺黷矣十有二年春二月平陽路總管府判官汲郡王惲謹記絳州正平縣新開溥潤渠記至元改號之六載詔立大司農司其品秩僚屬特與兩府埓蓋以農桑大本滋殖元元莫斯為重故崇職掌開藉田以率先天下外建行司曰使而副歲時巡視責郡縣長吏條綱甚悉考其成績而明殿最凡先農之遺功陂澤之伏利崇山翳野前人所未盡者靡不興舉東雍之地厥土赤殖墳雖潤蓄兩河島則腴而亢下者鹵而瘠時雨稍愆歲功不稔州尹馬君患之遂按行川浸思有以濟其艱而敬承天子之明詔曰澮吾所用也於是度原隰順水勢距郡治東南三十里曰楊程鄉澮入汾所至橫截水衝楗石為堰者三袤可六十步武穿崖塹阜激之北騖波神委蛇來就束帶郭門而西注汾其間長溝通洫蔓引枝分溉田度二千餘畒水性濁滓流惡溢腴於田甚冝業巳波及穫可畒一鍾凡役工若干計未周歲而渠事告成蓋君以規度有方衆樂其溥博之施也故自始迄終曽不告勞絳下老人相興材公之為感公之勤欽明命霈利澤終以實惠及民懇豫文以記之豫嘗有事於鼓溪之神登髙望逺觀陏令梁引用鼓水分溉田疇幾絳之西北郊于今蒙𬒳其水有餘蓄而河為限之暵思以一杯沃枯稿而不可淂嗚呼何跬步相望而有苦樂之間哉今馬君鋭興兹役出衆慮之所不及行前世所未行俾汾左之田溥洽膏潤仁民之功其利博哉百載而下將見府君與梁公並祀而同談者矣董其役者實縣尹趙某簿王某能事其事而不負所責勤亦至矣故併及之且採民謡而為之歌歌曰新渠成汾之滸溉我田流潟鹵公雖劬民獲所昔也豐穰穫幾許今縱旱暵決渠雨甌窶滿篝公所與公惠我兮母速去我報公兮烏所覩刻石河濵照千古遊王官谷記山之與水相胥而後勝山非水則石悴而雲枯水非山則勢夷而氣泊二者雖具淂其人而後名中條山王官谷其萃美之尤者也山闖首河曲連亘北騖為雷首為栖巖為萬固運肘而東為五老又東而淂王官谷谷漢故壘名有唐司空表聖之别業至今遺像休休亭在焉至元甲戍夏六月豫以撿括牧田會蒲巳而奔命珣瑕取道于虞王官諸峰指顧東邁後八日因恙小休暑雨向霽遐想風煙情逸雲上遂幡然來遊始自固氏西南行約四五里抵山門歷磴平進無顛頓堆挽之勞不百許步已入山堂隩中矣其繚而曲深而容垂蘿灌木磐石美蔭草香而土肥環峰疊嶂碧壷瑶甕濃淡覆露內曠而外掩無擁遏怫鬱之氣蓋谷田中髙狀作層陛勢相覆壓耐辱所謂上下方者是也東西兩山曰壷門夕陽青壁矗立卓絶如削中峯曰天柱秀拔特起如鼇鼻噓空髙齴雲表不與衆峰聯絡真竒觀也峰半有石突然曰落鶴臺又西有石拱立曰雙人左右斷崖水作瀑流下㵼如仙人解佩天紳未收西則泉􅍺出縮以乾溢為度東則飛灑噴薄隂壑恆雨砰崖激石下注幽澗是謂貽溪者是也山藉以潤人仰以清物滋以榮也王子於是斂袵薦茗謁司空祠下退觀休亭諸詩既髙公之名莭且詫谷之深秀也青鞋竹杖扶掖上征抵天柱峯足望東嵓瀑布磐礴三詔亭上因留宿焉時月出山豁萬籟沉寂􅋽露洗空失暑所在青嶂瑶光非復塵世其東溪水聲如逺鼓奫􅔿隱動林壑顧謂兒子孺曰此山靈張樂喜其來而作豫氣也深夜久聞毛髮森竪山人李珏出司空一鳴集相與披讀于露幌風簷之際顧瞻林影如見須眉乃酌水再酹乞靈于公詠休休之歌思考槃之樂安淂黃金買堪乘之鶴追仙遊于寥廓也邪不然搖江山之筆吸撑霆之氣貯濯詩脾以增益其未至庶幾列名于王駕李生之次亦所願也日既昃徘徊久之出山林霏煙翠漠然四合回望谷口無復所見庚伏中旬后三日共溪雲隱記待旦軒記至元壬申歲豫自御史調官平陽扁私居之軒曰待旦蓋所以礪厥志而警不逮也矧河東列城五十棋布相望大府實根本所在而風俗係焉國制張官五廳幕例下僚位東西與别駕嚮至扶筆剖斷一㝎于上官僚芒無所事及占署牘尾無細大通淂可否之是則位雖下所責亦不輕苐以品位有崇卑材術有優劣得其人則分安而政舉非其材則身骫而事去自惟氣質踈散心雖勉強撫字無方故就列已來朝夕惕勵如恐弗勝當其夜漏將盡晨雞始興矍起盥激即夫清明假寐之際得無深思者乎其于德澤川流何宣布焉庠序煟興何申重焉綱維末振何主張焉風俗未醇何肅清焉吏沸務棼何理亂焉訟繁獄滯何簡恤焉屬邑不共曷先率焉賢才在下曷薦揚焉靜言念兹有公以處心勤以集事耳噫周公聖臣也負扆履籍以當冡宰之位至于思兼三王而施四事猶坐以待旦勤強不息况其下者乎蓋勤則為輔拙之資公即具生明之本無私則心宰心宰則理得理得則言順克勤則匪懈匪懈則力行力行則事隨事隨則物化此理之固然無復疑者苟不是念而甘糞土其身臯皋訿訿藉廩祿為代耕之地與夫工不事事計日取傭者奚異哉恐食焉而氣怫寢焉而休臲尚何根本是賴風化得喪之所係焉若此者豈惟愧負中積而獲罪于時將見嘯干梁者下瞰其室矣於是乎大書屋壁庶抑詩之自警云明年夏五月二日靖共堂主人汲郡王惲記畫記近世之沒者以平時服玩遺宗屬賔友諺云留念緒然非故舊知愛之至則不爾平陽刀君嘗飲豫于私苐酒酣出古畫一簏中淂龍嵓山水兩幅其山骨欎荗林屋黯密蓋學中立而逼真者也上題云丙申春孟留汾水時為康玉閠所作時金大定十六年也歲月峥嶸迄至元甲戍九十餘載矣余歎賞者久之刀即前用為夀辝焉明年乙亥春君以疾終既卒哭其家持畫來貺遵治命也嗚呼君與余非故交深知者且南麓畫在士大夫間固有品格然不過一物耳其可重者氣與義也昔曽子易簀而後殁愛其禮也今君當萬事已矣之際事有不遑及者乃以是為囑篤夫義故也吁衰俗波蕩中能耿耿取信如此可謂信義不失者矣時于軒楹間展對斯畫愾然想見其人未嘗不為之嘻歔也君諱國器資敦純早以勳閥為征西帥臨敵決戰以果毅稱軍中後因疾去職僻居田間怡然自淂人不知為故侯失將也西山經行記至元乙亥秋七月𬒳藩府檄偕來伻盧君採文石于音丙申如襄陵董治厥事館許氏東堂八月庚子次西梁質明致祭黃崖山下遂命工即役借榻普照僧舍凡再宿有以義成石為言者壬寅馬此首旁山行入臨汾界過侯氏四水等峪踰山尾得王莊峪峪口敞咨夷衍北連白陵寨腳既夕宿龍子祠南晉掌里癸卯下井峪渡麻柵澗自獅子鼻登山越石門是為姑峪西山諸峪凡十有八處姑射王莊實為之要蓋南逹吉鄉北走𬗋川道也前臨渃岸觀隂定關關形峽束若石門然僅通人過想夫秋潦澮汾群壑來注掀騰勃怒萬馬東駃遽厄兹口激而為飛流銀濤雪浪百丈湍㵼亦壯觀也躡澗西騖歷馬蹄纏山雨奄至且作且止指望仙臺眺玉女樓望生馬壇頂諸峰煙霏翠濕空𪷟無際蹊蹬縈紆盤十有八折抵神居洞下洞腹寬肆窿穹巉嵓仰視欲墜後有竅逶邃山之噫氣穴也遂解衣盤礴憩洞閣上尋復開霽山紅澗碧景氣爛熳涼風吹面自逺而至煩襟翛然如夢仙府雖遇四子於汾水之陽不足以喻其樂也因晉題壁間且辨其誕少焉遊太一洞觀隂罅玉柱蓋石鍾乳也稍西騙馬鞍嶺上弱羊坂坂長約七八里極峻折艱於登陟馬力不能勝抵暮宿西陶謝氏林屋甲辰由鄭峪入義成分循澗槽西行徑嶮狹草木蒙茂步履錯忤過水磑折而東北上砠嶺視石之所在石陛砌覆壓隱山之半腹玄質白章又有絳其色若雲然者尤秀潤竒特降橫岡石澑間得枯枿一株矯如龍騰竒崛可愛於是按行澗道視輦運所經稍東入深峽亂澗水峽形曲折中藏堂隍其根足沙水囓蝕似口似圈似窪呀焉而頥張突焉而角出者不可殫記兩崖峻削嶄嶄壁立髙入雲表大石阜如齟齬左右勢犖確殆不能騎造愈深而峽愈竒又東行十餘里顛崖橫截水潨㵼石甕中鏘然如環佩鳴兩山間峻絶不可越矣遂自南腳嶺攀援北上峯回路轉行可六七里抵宿東陶山家乙巳復自羊坂東降取姑射北道過龍堂澗望仙門謁王母洞道人致酒山閣以軟腳例飲余浮大白者三世傳北山中復有玉蓮古洞下與此穴暗相通連旁有水泉曰漉錢名者事涉誕怪不復紀遂由側嶺白石溜下參峪抵西假里午飯郭氏田舍日昃還府吁天壤間山水佳處唯幽人朦士得徜徉其間與皓氣造物俱遊而共樂不圖官守急遽中而獲兹逰雖不能窮幽極勝弄雲煙而狎魚鳥亦非嘗之舉也掃筆所覩以志且見夫因事機攄煩滯而不為徒然也船蓬菴記船蓬道人姚氏太平相里人自童丱入道甲子幾四百矣棲心淡泊草衣木食全其生而樂其樂穴居野處于澗之阿削懸崖為土空廣不踰尋丈回環洞如一歲之中而有結夏蟄冬之適塊坐塵凝與時啓閉溫燠清深去圜圚咫尺殆塵壤隔豫嘗以事走絳與故人張器之遇把臂道舊步入縣西溪遂來遊兹庵道人因丐名于余題之曰船蓬且請其説船蓬者取形似而言然意不無其所寓焉蓋水浮天而載地中土者天地之虛舟也萬類雜處魚頭濈濈其陵蕩傾覆之虞日復一日何若斯人處斯室而獨為一天肱眠瓢飲樂其樂而曽無錙銖之患哉余乃為之歌曰玄冥之曦兮朱夏之清兮木歸其根蟄吾形兮梨花雪開啓吾扃兮人區鮓甕全吾生兮蓬底秋江泛然無所攖兮余復何求心營營兮道士顧笑舉酒相屬後余歌而言曰銘吾廬甚當于是乎書平陽府臨汾縣姑射山新道記晉人善用水而盡地之利山之奧藏未有以悉發府冶西山行五十里曰東西陶鏐炭所萃連山亘峪根苗洞窟軒豁呈露然澗壑嶺嶂號稱天險拗深峻削摩雲穴地磻錯交礙跬步間登頓駭汗不勝其憊雖中伏厚利用是限隔川居邑聚十不獲一二並山農氓志圖開鑿力單罔逮睨之而興愾者蓋有年矣皇子安西王以維城之重分茅開府胥宇雍土爰命幹使伐石兹山輦出之途仍宣理焉乃西自李琚疏度而北諭南山截義成澗盤土塿東上搚嶺脅折而東北行度鄭封峪上蓋炭之膏盛于焉而最又嘗置鐡官出車連連之咽會也循崖崦取易東騖緣西陶北麓其顛走延隴四道過東陶里出斷崖南分而兩岐其一履級東降越疳溝旋鞾腳嶺腦懼其蹊良田也落生馬澗櫓穿南北石峽山形匱如極險迾處也遂中貫而上南則駕駝嶺轉弱羊石盤抵夀山平壑下會馬鞍嶺口以備北道石峽水潦時至之虞躡龍溏而東經望仙北洞跨南北溝首由前後石門嶺下白石溜厯參峪注赤植坡陽盡西假里當峰回路轉復作避車埸六防其致阻塞也其間踣巨石擘老峽峻絶者坦焉厄仄者廓焉􅻄確者火焉刋落摧陷去危就安變壅鬱為疏通夷峻惡為平易西東一瞬略無梗澀雖並崖旋阜紆回曲折方之故蹊曽弗加逺凡為里一萬八千餘步揔役徒五百度工萬五千其始至于迄工才十有八日于是山輸委貨人休永勞逶迤安舒坦坦東下籠負車牽魚貫而出居者行者笑歌載路相與言曰伐他山之材而獲兹石之秀因輦運之役遂致道途通暢之便西山伏利以之盡起不惟俾一方之民賴厥功而冨所用抑以見我國家封建之制肇造藩維之方隂賜于民者將張本於是不爾山澤無窮之利將終古而奧藏矣守土吏大小之役實董其事是不敢不志某年月日記平陽府臨汾縣新𪠘記平陽當河汾間為巨鎮屬邑五十餘城臨汾劇而最要經界才百里占藉者幾萬五千户凡丘賦之重徭役之煩十常居其二而風聲氣習勤儉果譎宛然雜唐晉餘俗惟其物浩壤狹且不相能故人嚚於訟必直曲乃巳聽約束俟審辨者動填里閈縣舊署在府右廂康寧坊之南城易代來為工人氏豪據有司假老屋隙舍寓理曹務一歲間輒三五易豦簿書儀具坌集委積棼不可曋奔趣執事者當夏熾冬冽赭汗僵立尤實艱苦前政狃故常眄瓜代日復一日漫不加省庶幾赫令尹之威具視瞻之媺清承宣凬化之源其惟艱哉逮今縣監某洎尹某稔其如是適時和訟理嚮化有漸乃以其故詢諸衆僉曰念兹在兹竊有年矣苐率先無自訖干今唈唈也既度其人之樂用遂經辦焉應直得景行里次氏之故第凡成室一十有五楹略不加易其來如歸廳事適中吏舍兩列形閎前啓衡逹里逵于是逺湫隘處髙明委蛇安舒各有攸敘中外竦然大易觀仰既而史亢淵曰其興滯易弊之勞趍事樂成之懇公倡私應共濟厥美匪劖書珉石代而縣者烏能究根據而見經始贄禮幣來謁文豫以厯官內外因知天下之治在於宰相師帥得人而已佐天子理百官發號施令以遂物宜者宰相也推君治宅民生供事取決會歸有極撫字百里間者師帥也是則宰相與師帥勢雖霄壤以本末體要而言實相須成化耳故前代選重其人眘柬于清流册授於軒陛疏名殿屏蓋繇是也今國家條章具舉百度惟貞顓任責成垂寄殊切作縣者苟非恪勤官守推忠及物何以稱經緯相需之望今一縣之署置固匪政之大者類能若是尚何患仕之不優俗之弗易責罔塞而績用不章于時哉豫特喜縣僚屬逹于從政有志于民得春秋憫雨之義故以所繫重者告焉幸來者毋忽至元丙子三月日記懷先賢記至元甲戍冬豫既復首陽山夷齊祠繹之曰亞尹張侯聿來會祭遐想故家佇瞻墟墓對越靈威泫焉泣下蓋風誼激哀有不能巳焉者顧謂豫曰走世為孤竹人自稚及壯經行遊獵往來南山故城間覩夫廟貌不稱旌記寂寥言念于懷顔實有靦吾子幸為我大書特書歸揭海濵以為邦人光且表夫山川之重鎮二賢出處之大致也按圖經箕尾之分徑氣下蟠控帶遼碣北平乃一大咽會故其俗雄碩尚氣義敦諾急難凛焉有戰國餘習乎州經界本殷諸侯孤竹君世封春秋為肥子國秦漢以來列郡縣不恆實燕之肥如盧龍邑地肥如因水淂名耳開皇間始升為州直灤江而西二十里有古城宛存枕動山東麓蓋孤竹故都今指曰竹城者是也州治南三十里而近有山巋然盤亘中野其名曰孤屋二賢其上遂亦首陽呼焉於戲二子之英烈言言窮天地亘萬古皎乎日月不足以喻其明巍乎嵩華不足以喻其峻俾後之為人臣者取標凖而知所懼其為世教豈小輔哉尚何俟山稱號而為之顯晦也然侯懷賢思齊之意何其盛歟莊周有言去國期年見似之者而喜蓋敬恭桑梓曾不燬其愛惡矧國之古賢世之大老特立而不群者乎若張侯者可謂尚友千載敦鄙薄而有志者也侯諱昊字明卿資果逹嗜魯論為顓學故􅊩官行已多據經旨為言已而沾沾然喜見顔間曰吾中有所淂矣其篤信好學如是至有以張俠論目之者十有三年丙子春正元日謹記遺廟記金海陵焬王以天德七載乙亥定議南伐明年正隆改元詔大營汴京擬混一江左遷而都焉故廟社之制于是乎興然清廟實前宋之故物也在景祐間止屋有七楹而金之記曰正隆四年己卯歲冬十有一月禮部尚書同修國史王競銀青榮祿大夫參知政事敬嗣暉開府儀同三司尚書左丞相上柱國魯國公臣張浩監修實金為之增廣加飾非創作也何以明之覩其挻桶旅楹大而徑三尺者比皆腐朽餘丈若曰金朝創始不及百年安淂如此之朽腐哉廟直大內之南馳道之東殿法吳制東西列二十五楹袤四十丈廣七丈其神室內地廣一十步餘四步為室前之虛明廟兩首各限一楹中以二十三楹分十有一室從西以三楹作一室餘每室以爾㨕為之龕之數其西位夾室六南向者俱兩龕自餘率一龕所向皆東面而已總十有八龕殿階作二層列升道三前井亭二東西相向外作重堧四繚靣沿門角有樓門南列五闔餘三而已其東北中垣之外即册寶殿也國制凡帝后寶册暨郊廟金玉禮器皆在焉令太常官一貟每季檢視用印封緘謂之點寶禮器者何爵瓉圭壁是也玉册者何先代哀諡是也其册帝以寶玉作簡后以象齒為之賁以金書貫以朱絲封縢甚祕卋莫之見南則更衣亭亭前舊有湖石環竒名曰瑞芝其東南外垣之內即神庖刲取血膋之所環重垣之內東西為廡各五十㨕旁夾廟門各草有五千以分布齋郎駿奔走執之列正北則闕焉其西南垣外即廟署位前有門以表循外垣西比復鑿偏户一意者備執事出入之便也豫聞之遺老云制祀廟率以親王上宰攝太尉以享太祝奉遷宗拓置地用色羅上羃帝以黃后以絳所謂至敬無壇也茵以皋比器設陶血用血肉以獻上下之樂畢備此金朝典秩之大槩也國亡巳來汴之宫室毀撤掃地顧惟兹廟以貯儲淂巋然獨存皇朝中統五年夏四月詔河南前宣撫張子良撤焉以北浮御河入燕就為今之大宫從堂議也據正隆己卯至今甲子以曆考之適百有六年也識者異之且今𥘉建宫于燕多撤汴材其木皆以燕用為志今是廟亦復用燕之故址有數存乎其間爾自有能辨之者夫君子將營宫室宗廟為先祖宗胡可以無廟然一廟之用有不可勝之費今也存亡廟而為新宫其尊祖息民可謂恭儉者哉是廟宋制也按禮經天子七廟太祖之廟居中三昭三穆為之左右其七主曰壇曰墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟月一祭之逺廟為祧去桃為壇去壇為墠壇墠者有禱焉祭之不則乃止此三代不易之制也逮東漢變而為一廟同宇異室耳李唐自貞觀開元后增置九數后宋因之亦列九卋為十二室而金朝以九帝有天下百餘年上自景太至于宣宗不審天興奉祀之日其間升祔祧出得列于太室者凡幾廟何者得祔何者為祧邪故并及之以俟更考云至元五年夏六月十一日記泰安州長清縣樂育堂記趙君明叔尹長清之明年政夷訟簡視其民可教乃廟垣為數泮宫于是治學舍植松竹聚書史立教條率儒生屬吏日講授其中雖造次多故未嘗少輟不半載士勤于業吏循其風禮容文物郁郁可觀十四年春與豫會于京師因以嚮所聞為問曰有是奚足多為然清今為中縣顧瞻岱宗背負河濟教習出齊魯間在昔距濟南為近邑生徒率就學府故禮殿序庠之屋庳隘無足稱于前爼豆弦歌之不接見于閭里青襟之耳目蓋有年于兹矣此僕之所以不敢狃安故常鄙薄其俗勉有此舉也已而以學記來請嘗試論之古之君子以先知覺後知以先覺覺後覺是天之所責于我者甚重我烏淂而避之况有能致之資居可行之位尤當急先務也令尹雖出宰百里實為一方師帥政之得失俗之善惡繫夫志嚮所在知先後之序耳人之秉彛惟其物則內具故好是懿德此天理均有人心之本然也苟淂其養無髙卑大小之間故狂而聖愚而明始也致知格物身修而家齊終則明德新民國治而天下平由是而觀學校庠序之教豈小輔哉叔世道微功利説興督責之令密士以區區末學苟祿代耕奔走鞅掌于簿書期會之間我躬不閲遑恤乎爼豆禮容之事哉今君以修敏之材奮迹諸生間歷事臺省由省臺而宰劇邑卒于簿書期會奔趍督責之餘遵詔條確志嚮務以德義牗民力行不倦為樂俾群材長育如中陵者莪菁菁然而盛可謂能也已昔韓潮陽牒置鄉校曰刺史縣令不躬為師使後生無所從學為耻又以飬育人材為吾君相之事顧天之所責於我者當何如哉若趙君者庸知夫不異日得時行志以斯道覺斯民為天下之樂且儀乎吾見有開必先之兆于是乎始君諱文昌濟南人至元丁五歲三月丙申記逺風臺記豐冝門外西南行四五里有鄉曰冝遷地偏而囂逺土腴而氣淑郊丘帶乎左橫岡亘其前中淂井地三九之一卜築耕稼植花木鑿池沼覆蕢池傍架屋臺上隸其榜曰逺風以為歲時賔客宴遊之所者韓氏之昆仲也至元戊寅百有六曰主人邀豫來登顧瞻河山形勢在北則近連圻甸南則逺際河翔東控海門碣石之雄西眺太行桑乾之勝千里一瞬略無限隔少須風翛翛然自太虛中來浸淫乎溪谷蕩漾乎林野春和明霽微埃不興聲先乎群木之顛氣欎乎崇丘之外然後度叢桂入亭圃轉蘭獵蕙泛溢乎層棟軒楹之間座客欣然動蘭臺之興暢方外之適披襟當之曰信乎滌煩臆抒滯思而其來之之逺也余仰而思俯而歎曰子知風之來邈未究夫臺之淂斯名于士大夫間也韓氏自鄅城府君以來孫謀底法以燕翼子者義則昭昭矣通甫君美遵誨承志光大先業􅌚然若父災之敷播曄然如棣華之相輝泝流尋源其遺風所從來逺矣故賢士大夫莫不重其好賢樂善登兹臺而願與之遊由是而觀慈祥豈弟之風又賢于人逺甚况兹墅也出而入仕蹞步于清朝之上退而隱處偃薄于山林之下將行義違道存志俟時無不安適其清風穆如流芳于後人者又有逺而不可極之致不然天壤間林泉佳處苐欲暢幽情而滌煩慮何所往而不可客曰嘻有旨哉今韓氏卜築之意信得其趣而吾子可謂發不言之祕勉其所未然者焉既而囑豫筆記之因掇前言俾刻諸臺上以貽來者至于風交平疇良苗懷新行之而喜者兹值杖野人之事故不復云後三日記韓氏遵誨堂後記人子之事親存沒兩間觀志由行三年無改為孝之至况終身而維則者乎燕今為大都會世家巨族飄輕𥚑蔭華欀非不侈而盛也及論夫居室善而內有則者韓氏為足稱長即總管通甫次即君美判府豫御史裏行在燕者凡三年用是交好甚欵知為人甚詳修身齊家讀書治生禮賔客應外務一以忠信孝弟為主怡愈雍睦如賓友之相敬棣華之相輝也過庭者佩詩禮之嚴居家者無言笑之雜超然而處熙然而遊方筵多燕衎之娛田野有烹歌之樂以致一門之內百順坌來昆弟之間言無少間所謂身不求逹而逹有餘屋不期潤而潤自至豫嘗獲拜鄅城府君畫像望之粹然一淳德君子其嘉言善行無非後嗣可遵而法者乃知韓氏淵流之深長枝葉之茂盛疏之溉之者功加于前繼之承之者復善其後故永年先生良有旨哉嘻李唐在前代為盛卋至栁氏為稱首豫每讀玭傳求其修齊之要不出以忠信為孝弟為至曰此乃食之醯醬可一日無哉未嘗不撫卷嘆息三復格言万衰俗䫋靡中而韓氏昆仲亦能以孝悌忠信為飲食之醯醬揚令名而顯祖考奉潛德而彂幽光惟是心不匱至錫類也如是將見垂芳來葉不獨栁氏專美于前史也秋澗先生大全文集卷第三十七
