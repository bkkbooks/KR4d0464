body:
  text: 辨説日用講究義理其用有三體認明白臨事能施為出一也道義傳受必託于言辝筆頭發明出來二也其或諸生請益發藥啓迪化若時雨三也至若都曽經歷只為自前不曽專心理會又不能記誦乍了若無使此心茫然如道傍空舍諸物淂去來住持不敢認為巳有又學既不固及人説著才方省記終了自無所淂前賢力學須先除去此病攻苦食淡不為一毫外物移動屏墮氣收放心一主於敬不雜觀不過分此或未畢輒復它務才作復輟今日已過而有明日管淂無時㝎志帥氣如下硬寨崔乎有不可拔之勢一物一事不輕放過窮理盡性至於命而後巳性與命只是一個理而巳若有所淂即極力存養晝見之于行事夜驗之于夢寐使真積之功日新一日不使頃刻間斷不恤乎時之利不利不悶乎人之知不知將所樂自喜專以推崇天爵為至古之學者無不盡其極者恐不外是不然困而不學生而為斯民之下不知所以學老而為乾沒之人良可哀也此皆豫之錮疾遂書以自訂非敢示諸他人書太極圖後嘗觀宋一代道統傳授獨推濓溪元公為首及究其功用有渙然氷釋者蓋先生始明太極隂陽五行性命之説以開萬卋沉迷之惑明一出于中天故也夫太極者何曰有物混成先天地生以一而含三者也老氏所謂一生二二生三三生萬物者是已為太極判而有天地乾坤既位然後萬類育焉故理可見而道由是而生道者循其理之路也其性之與􅒛尤坦然明白性者理之所從出理也者只是純一四端而巳固無有不善􅒛者氣之所從來氣也者變化錯糅有清濁厚薄參差不齊之間曰賢愚曰夀夭曰貴賎曰冨貧一隨所遇而稟之者更無旁入曲生之理濂溪先生以前只為先儒不曽尋出氣質性來雖有混然上中下三品之説終是不無窒礙學者又不致思或求而不可淂者往往溺於邪説未免隨人作計以至迷惑忘而不返可哀也哉若先生之圖之説其有功于聖門惠夫後之學者可謂大且深矣抑使輪回宿習荒誕不可致詰之説一掃而無餘此所以尊居圖首為道統之宗也若以作一箇分隂分陽之圖説了是齊其末而不揣其本也體認從古至今止是這些人情止是這些事理聖人裁量備具六經罔有不盡後之學者學此也既能通曉厥理正要行已臨事之際觸類相應以較其巳之貝合與否若事務之來既不能體認前言往行以酬酢其變此與不曽學者何異是最吾儕大病既不能踐迹將何以造其室乎亟當思體認之方從何而入可也戊子夏四月十一日晨起偶書小子其志之氣志人志不㝎只是氣為之亂氣既亂却為動靜無常於中互相奪爾若安􅒛順處不以我之所當得而易其彼之所不當有者人無日而不自得也如是則何患志之不安理之不明氣之不充者哉或曰所當淂者何即天之所􅒛于我者是也不當淂者即天之未嘗付于我者此君子之所以亟當知也故曰知􅒛不然則謂之不受􅒛不受命是之謂逆天故孔子責子貢而貨殖焉者是也天人爵天爵志清明而夀人爵氣濁亂而天或天或人能夀而不亂者唯素有所飬者能之曰養者何至公無私而巳孤立人生天地間立甚孤特賴有四端在我然後乃有所倚如伊尹之恬于放甲西伯之安於羑里周公之坦于東征孔子之泰于厄陳武侯之必于復漢蓋倚是理為用而後大有所立者焉故傳曰君子獨立而不懼其是之謂乎不然一身心之微其何以禦不測無窮之變乎戊子夏五月甲午積雨開霽晨起書于露堂西序孟莊不相及豫嘗疑孟與莊皆同時間人終無一言一事相及者恐是蒙莊閉户著書罕與卋接逮身後其書方出適讀陳氏輯語陳名應童字景雲三山人大意略同説當時無人宗它只是于僻處自説然亦止是楊朱之學但楊氏説得大了故孟子極力排之戊子重九前一日書自得志者發其心于內故納諸壙印以告化者碑者表其德于外故植諸神道以鑒來者又曰志者紀其心之迹也碣者揭其事之著也朋友眀友列于五典其所以為重者志同而義在也故粲然有文以相接歡然有恩以相愛不然其與走者類聚而同逰飛者群分而並集蓋幾希矣詩人以伐木廢特表夫友道之缺深有旨哉五常五常之道仁為體而四者為用義與智陽中而含隂禮與信即隂之一㝎者也曰陽中而隂蓋運動離合有吉有凶者焉故也隂陽之道易曰一隂一陽之謂道九峰曰隂陽以氣言道者隂陽之理余曰理者氣之所以明所以幽所以生所以殺所以舒所以慘所以為君子所以為小人丗之所以治丗之所以亂戊子冬十一月十八日成鼓作燈下偶書讀孟子或問四書或問獨鄒書多設疑詰難何也孟軻氏終是去聖人一間辨論之際其言英氣發露不無激切輕重之異故文公于此頗詳講明折衷要使不詭于理先後一揆而後已何則溫公大賢也猶有疑孟等篇况解之云乎此晦翁惓惓于是亦臨川翼之之意也入伏后三日課讀此書或問偶書晚學小子題恩多怨深此余平日事也或者曰君土􅒛人生物者土也物既長不淂不克制其土自然理也此隂陽家論似亦有理然不若以人事評之謂如我以禮待人人不見答未免有所不平不平則彼則乃有怨意我當夷其不平以恕心待之寧人負我雜著聖人之道如長江大河人人淂以飲之然飲之者有多有寡為江河者不能使之一一均同其量任其自然而已不然恐造物者亦太勞矣余謂師授學者以道亦當如是既以自警且示韓陳二生八月二日偶書分絶伊川先生云常思天下君臣父子兄弟夫婦有多少不盡分處况今所為親戚故舊昆弟友朋四者天理當然之分廢將無遺可哀也哉秪是計較于我善惡有無相益為事與之離合耳靜言思之物則既蔽近于飛走人既與非類相雜處幾何不傷而夷也可不慎言堇行凡事點檢以先周身之防而存逺大之至元戊子歲臘日書無音萬物受氣於天音者情之所由發也以政有得失而音有乖和雖極亂極困未有情不宣而音不作者如幽厲之世雅固遏密變則不無也至於當有絶無豈困而不暇作伏而不敢出其或善不足以法惡不足以戒亦若天變之無所見乎三者必有一居於此矣於是感而書之得失人之得失一係夫命之通塞若得則既不當過恩于其所舉揣其已才如何耳失則又不當致怨于其所沮亦當量已命之如何耳若恩有歸是人憐其不才而私之也怨其沮是我妄為言而不安其命分也何益哉已丑歲夏六月客退偶書以自警黃鳥三良説觀坡和陶三良詩反復詠味似責三良之不當死也當時從死穆公者百七十七人蓋康公從先君亂命迫而納之也三良之不死淂乎若專責康公可也分謗三良豈忠恕之道哉只以坡之議論英偉辝氣縱橫讀之者愛其如此故不覺白壁之有微瑕也若晦翁之詩説可謂盡之矣文辭先後文之作其耒不一有意先而辝後者有辝先而就意者意先而就辝者易辝先而就意者難意先辝後辝順而理足辝先意後語離而理乖此必然理也學者最當知之讀淮南子淮南鴻寶書出大山等徒所述在藝文言掇百家之緒餘耳特變其文而為小大異同之論然自得者鮮矣讀之者不無所益至於隂陽造化之機治道興衰之理正有吾六經與信史昭在又親于其身為不善者雖著書立言君子有所不道豫所以讀之者取其事實可訓及漢文近古三代之氣有凝而未散者至元丙戌歲十月二十三日題雜著鸜鵒食蝗秋七月螟生牧野南無幾有鸜鵒自西北踰山來方六七里間林木皆滿遂下啄螟食且盡乃作陳飛去豫考漢五行志貪人尸祿猶螟害榖故感而生蝗夫鸜鵒北方之鳥也其觜距有搏啄之利又數多如是意在位者不肖將有因貪抵法而敗者不然何食之既邪紀之驗它日之異時至元五年歲戊辰也魚歎至元九季春三月余自燕南還前次淇右逆旅主人條桑徹土束藁作炬詢其故曰此取魚之具也既而主人置條圜淺水中外以石擁之夜向寂風息波平炬火起岸側群鯈趍明爭集其中回旋往復千周百匝視其條為罟之大網一不敢出越而遊去主人俯掇如地芥焉王子喟然嘆曰班生有言山林之士往而不能返朝廷之士入而不能出士乎士乎冒昧行險趍利而不知止者曽何異于斯乎是歲重九前三日寓平陽牙城官舍之待旦軒坐聽秋霖耿不能寐追思所見作魚嘆云非分説甚矣非分之不可求猶鴆毒之不可懷也鴆毒之殺人世知避忌非分之存心其禍有不可測者有人于此小有材行險僥幸以濟其欲一旦濡首染指攫取公餗是知厥指之可染不知首領之不可保也竒貨之可居不知竒禍之不可脫也既而以敗聞抑栁子云立身一敗萬事瓦裂者其是之謂乎夫鳥俯而啄仰而四顧猶懼夫物之為已害也可以人而不如鳥乎今日方食聞府吏藉其家案上一柸藜藿重于五䁀七牢矣至元戊辰夏五月重午前三日遺安坣書鏡針王子醉墮馬傷額既愈日引鏡自照色黳如凝欎者旬餘因愀然曰昔樂正子春下堂足傷追悔不踰閾者纍月蓋聖人以毀傷髮膚為深戒必全而歸之為至孝矧陷身非義一敗瓦裂之酷哉是以墨子悲其絲染馬遷痛其刑餘栁州悼其躁進也惟其居易俟命不行險毋苟淂從容中道乃為合理吾知免夫至于遊居食寢則體安而氣平不然事變之來少有蹉跌又何翅髮膚之毀傷物議之輕重者耶嗚呼小子孑焉正其戒之慎之于是乎書時至元辛未冬十一月十有三日也簮導玉飾辨統軍府從事李良貴上計耒燕過豫出示華玉一方長寸許廣如之狀類方勝然其文章昭回刻卧蠶中間髣佛粟粒隱起上作蟠螭闖首左顧前足去左其下穴方孔甚邃玉色皎潤殆疑脂然余曰魏晉已下無有也李曰然此陽夏壙中物也余時方讀禮書而此物適會因考其制蓋大冠橫笄之首飾也古者笄長尺二寸諸侯以王大夫士用象其為神明之器斷無疑矣何以知其然禮云瓦不成沫木不成斫有鍾磬而無簨簴其曰明器神明之也故闕其足之左于乎魏晉去秦漢未逺兹物也視之猶可仿像一時禮文之盛古人嘆三代吾不淂而見之淂見漢魏斯可矣蓋文獻之傳尚足徴于當時者耳于是乎書興平閣本説古今名臣畫像皆曰興平閣本興平亰兆縣名而曰閣本豫𥘉不解其旨近襄陵吉仲和過豫覩壁間李衛公東坡等像此正興平縣學所臨者嘗聞諸進士武公張徽君美云金大㝎間某人自祕書郎出宰兹邑􅊖取平日竊模祕府真像而圗形焉故有閣本之目云崇德堂説余貌不揚寫之者未淂盡肖建賈君一貌而見者皆以為余且曰仲器為人不止技稱其于奉親事嫂以孝友聞鄉間殊侃侃也既而求名其堂且敘其世家賈系出襄陵今汾東有塜巋然曰賈相者乃逺祖也從傍居民同族氏者尚百餘家有圭田三百畒耕穫者主其年之守祀終而始焉奉為故事甚恪考夫傳記蓋賈豫州逵之壠耳豫州在魏晉以巨儒名卿顯冝其世祀至于今而弗絶也今觀仲器氣質溫粹孝友純至似非丹青馳譽者豈豫州之澤淵流而未央邪故以崇德榜之且用篤其所巳至勉其所未盡者焉至元丙子清明前三日題讀唐徐有功事迹周革唐命豔后煽處任威刑而絶異議遂起麗景等制獄縱周來之徒誣搆陷置膏流節解之禍莫有救止大者以剪夷宗子希旨下者以告密上變徼功鬼朴滿朝中外股栗時有功以司理之微秉公恕之心扞折凶鋒守死不撓至辨明冤抑竟賴全宥者甚衆嗚呼仁哉公固知上含容孤直庸示公道然人欲肆裂之際天理有不可泯滅者彼中橋突犯清蹕釋之辨于漢文慎罰之𥘉威衛悮斫陵柏仁傑諍髙宗于受諌之日以勢以時司刑為尤難及拜西臺至頓顙流涕有鹿挺懸庖之請何感動自悼若此豈體存正大明哲保身之方非權無以濟之邪紀異至元十三年夏六月王按察立夫同在汴梁試院中告子云前年冬十月益都路總管于也孫䚟以髀瘡卒于官𥘉病臥踰浹旬遽召左右具儀從及鷹犬橐鞬者列堂下徐曰吾今日晌午逝矣家人問何往曰將赴逹官某人府言畢據銀椅而終逹官者故監真㝎路郡沃魯外五赤也蓋公自微時薦擢于朝以致顯逹皆公力云俄有樂安縣吏耒云日晡時三十里外遇公騶騎甚盛從者呼某至馬前喻之曰汝歸當告吾家若車徒西還凡過水當以金錢投之𥘉不知公捐館矣翼日又有自濟南來者亦見公獵道左而西如平生然明年丁丑夏四月與公之子某會燕以向所聞審焉不少異因念余向在省署識公于稠人中􅥟幹魁偉望之一雄傑也立夫云公為人忠謹誠慤厯事三朝多為上所倚注世為燕之香河人夀五十有幾又聞吏部尚書太原髙公亦臨終區處後事神志灑灑不少亂問騎從具階下否曰具如期而逝嘗聞聰明正直者生有所自來殁有所自去如傳説上為列星韓柱國死作閻羅信有據而然也因併筆以記其異讀魏相傳周書有云論道經邦燮理隂陽道者何以正心誠意為體仁義禮樂乃其具耳以此出治隂陽自和萬物咸淂其理舍是非復有調元之術也今觀相之燮理至區區建議舉四人各主一時使衣服禮物朝祭百事一切法而行之時至明言所職庶政玉燭之祥何不思之甚也嗚呼西漢去三代殊邇相于中興為有聲其經綸器業惜乎不出乎正心誠意之大學而牽于五行附會之小數豈見道未明權衡機務之心有所偏溺哉御書銀盒事客有云道陵朝二近侍以功名利逹由天􅒛人事因私相論誥甲曰天乙曰人上聞之取銀盒中扺曰可去者某宫遂授乙者使赴尚書省既出衄血大作不克往適與甲會以君􅒛不可緩即就付焉其人拜官而去由是而觀雖云君相造命不知造物使之然耳近一名士甚為聖上所重當軸者力薦以為同列將謂旦夕輔政及上聞喜其奏而徐之既而病卒因記客談併書其事紀肉芝等事天興𥘉荆王府弟中庭産肉芝一株髙可五寸許色紅鮮可愛既而枝葉流津濡地視之皆成血臭不可聞剷去復出者再遇夜房榻間有物作聲伏其中燭之群狐滿床逐捕失所在未幾曹王訛可出質王妃蕭氏向豫談其事妃尚書貢之孫今為黃冠師居衛先友牛講議國瑞牛天祥字國瑞澤州陵川人通天文武經占筮風角等書正大間嘗為恆山公府議事官兵后居衛東白皇渡既而著軍前中書省詳議辛亥秋八月應東諸侯聘客死聊城夀五十有七葬汲縣郭村東鄉清水鎮州風俗鎮人以七月六日為七夕莭蓋其避王鎔日百餘歲俗以為常何恩德感人心也如是據五州當時四鄰交爭併起惟鎮之人古帶遊嬉燕樂安王氏之無事彼懷思不忘愈者豈非是歟則知文忠公筆削真實録矣至巳卯月六日按部次新市縣五夜燈下書僮喻官真定時五月夏至日作秋澗翁自幼讀書踈于生事處則知涉古今考治道驗平時所淂于日用間庶伸微志故從壯歲沗列舉家仰食廩祿未省飢凍切身者二十有餘年矣雖然才間即無以資生顧貧乃士之常不敢略有他騖以覬苟淂非惟不解亦且耻出諸口汝等轉藉翁庇各蓄妻抱子日嬉溫飽奔走承侍外心則無所苦也汝翁且自已卯秋移官燕南忽復四祀以理將去乃有維揚之􅒛夤緣投獻遂致杫止重敘一官良為匪易其幸與否汝等朝夕所親覩也及南還滹上復需後􅒛今又數月矣適飢旱相仍食艱口衆事勢牽率有進退維谷者况汝翁行年五十有七自惟踈拙與時齟齬加之筯力衰耗百念灰冷靜退之心日往來于其懷嘗謂秩天秩也不肖者無久當之理祿天祿也衰老者無恆竊之方躬田力穯本吾家素業稅駕壠畝固分所冝然行止有命又非吾之所敢必也此淵明所以有心形相役口腹交病之嘆盻盻一稔斂裳霄逝切嘗慨有感焉今日炊煙晨冷庖人告乏計口而食月淂粟五釡可足時斗直鏹餘二千是旬月所縻須六萬三千錢耳其賔客之奉慶吊之禮鹽醢葷茹薪㸑芻抹僦舍之費不在焉諺所謂百指無糲飱食倒黃流灘諒非虛語噫官時來則為筆耕之潤又非所恆幾何不相胥而困也今日夏至聞東郊穫麥天倉廓開招拾遺秉不為無益汝等其往哉毋忽且令汝知田功之艱一餔之不輕獲也暮歸淂新麥斗餘僮奴輩既飯放啜頓失菜色為一快也又念位雖下近伐冰之家尚爾窘迫在閭閰細民不合釡而坐餒者幾希矣因援翰作僮喻會有餘思不足為暴殄之戒且廣訓儉之遺意云魃妖余行陽榖道中農人有以魃言者余告之曰周宣王詩云旱魃為虐是魃非今見從古有之此蓋旱妖之氣感人變所娠而成耳神異經云魃生南方肉體長二三尺目在頂上走行如風見之處赤地千里執而殳之溷中即死旱氣乃消又云魃字從鬼鬼魅之物所生非唯南方也且古者娠婦不使食邪味聽淫聲覩惡色恐逐所感而化余故曰變元娠而成妖耳哀辝後衛自壬子歲迄今邑中子弟不三十而夭者凡八人季武王範輩皆雋秀有望翩翩而佳者也吁百蛇墮地一或能龍既玉汝之輒復奪之不知造物者果何意也余故以咄咄怪事為言然以理揆之雖一家之凶變亦斯人有自致者嘗記一士人問于先君子曰粵惟金𥘉已來衛之文秀者極罕間有之多秀而不實先君曰衛地濵河沙薄豈其氣疏弱故也若使水環州南或城居水西氣或可盛時不肖尚稚聞之不存諸心又弗請問其所以故雅意所在每念之而不明了以今觀之其言固為有徴何則如東平汶出府南阿邑濟經縣東且以東阿較之在金一代由進士而位鄉相者幾二十人鄆則不須論也然魯無君子斯焉取斯使衛師有經儒人問學而知義則薄者可厚愚者可明天者可夀也此雖以人事臆度若有輔于世教聞之者庶不惑于邪妄之説云至元戊子秋八月八日書盧氏墳石泣大都玉馬坊耿氏石獅猛水出如霧豫時為御史目覩其事山陽長流村盧氏墳石表水出如泣者連曰耿盧二人皆出微賤而遽當台鉉此驟淂不祥之極也蓋善惡以類應故隂沴將至兆見于石如此豫因曰此石泣也二人尋皆𬒳誅然泣者非憫之也悲乎不知其量也吁龍墮農民王家至元二十年癸未夏六月中大雨河西鄉農家王氏甫夕黑霧四塞中庭窗户間寒􅏮不可勝視之有蒼龍蜿蜒在氣中起而復墮者再時王氏女已笄下堂趍室驚而絶于地救乃蘇問所見亦同歘霆震霧散失所在明日視其地鱗鬛印泥尚宛然也王氏世居水上其下潭渦殊深黑可畏雜著太宗英文皇帝天容睟表一類釋迦真像仁厚有餘言辭極寡服御儉素不尚華飾委任大臣略無疑二性頗樂飲及御下聽政不易常度當時政歸臺閣朝野􅌚娛前後十年號稱廓廓無事臣向過平隂縣聞校尉陳某所談如此陳早年蓋先朝控鶴近侍者云前宋時有日者肆相國寺東一日而識四相謂韓魏公范文正公王沂公張齊賢也自後術不一售竟窮悴而死近年畫師覃人孫某奉詔追寫太祖聖武皇帝與睿宗景襄皇帝御容及奉進上顧其惟肖至泣下沾襟宣賜甚渥孫歸及家而殁二人術雖不同其于發藏泄祕則一也傳曰人之患莫大知人之機况神明不測者乎戊子秋目疾後書鶻嘆昔有漁于河濵者見一鶻摶一禽于沙渚間禽逸而鶻不起良久漁者往視鶻已死矣彼念之曰鶻之􅋧擊性也一舉而坐空拳遂憤而斃有志士之烈焉夫士懷才負氣求用于卋倘時不我合人不我知則納履而去之豈若小人之求之也不以無耻為耻專以患失為事千思百計阿匼取容雖僇辱在前而不顧期于必淂老死而後已豈不貽伊鷙之忸哉余聞其説甚有合于吾平日之所行者遂著之篇以見微意云戊子歲重九後一日書此係石盞正之説齒射寶寶翟姓內鄉農家子史侯都督江漢時散卒也為人疊齒多力挽弓幾六鈞發無不中少嘗射隼並貫干木寶登而取之木折與墮碎其臂骨治無法肘已下斷去自是馳獵以齒控弦括羽左手托月滿逐獸皆應聲而斃史侯異之上逹後授校秩振古以能射名家者多未聞以齒而決者然付之翼者即兩其足與之角者必去其齒蓋懼其全而過為物害也又唐李客師善射好獵每出鳥鵲逐之翔噪時人呼為鳥賊亦惡其物之多取也今翟一手尚爾斷其右殆為天所劓乎弟忱説如此故書畫虎先君嘗告某曰王氏在前金時家魚行里曽祖府君氣方嚴于土障畫一虎甚獰意者取陳力就列故也後八十餘年當至元已丑偶於樹塞復圗此獸追念前言有常警懼者書云德明惟明德威惟畏今雖頓還舊觀其于惟畏惟明萬不一逮爾又諺曰生子如狼猶恐如㒬曽之意豈復在此邪小子其志之先子善書可以辟之者乃命僮道求鱔淂大小四尾從其法而用焉明日開户視之機案書帙拭如也嗚呼物類之相感也如此何其驗且速哉余因推其蛀之所致蓋木斬不時非經雨露浸漬之久又任其滋而棟焉濕與氣相閼故生噫蛀者木所産也而為木之賊政者民治之具也而為民之蠧若上焉者治之而昧其方下焉者忽之而不知畏故害無小大有吾無如彼何者能一旦修其政淂其法固雖四凶之方􅒛圯族群弟之流言畔國從容可辦曽不知其艱也至元草三年丙戌歲秋八月草五日夜適良醖在壷欣然引大白者再􅒛童子執燭記豫之作紀夢二十四年八月乙丑夜夢豫逺行過一城市當莊嶽間一逹官解鞍卓歇過焉呼豫回視之蓋參政飛卿也寒暄外髙曰别雖久食頃不忘也豫曰披此彼此握手間豫乃曰聞吾友參政以來多有施為髙曰傳者妄矣參政者參知雜劇見做不行何施為之有豫答曰渠于此見打野呵兒胡為做不行也遂寤聞夜漏踰四鼓矣古人云至友神交于沖漠間殆謂是歟次日聞吾友南來論其氣類與同亦夢應也因書此以贈吾三人者相會及此當捧腹大為一盧胡也紀夢二十五年春二月十七日夜夢朝上于端門內彤臺上聖上椅坐東北惲于臺西南角俯伏上問條支國事惲對以其國甚逺出犀牛革為甲甚良號曰黃犀甲上喜甚因窹明日撿通典六條支國去陽關二萬二千一百里在蔥嶺之西城居山上周四十餘里下臨西海水環其南後漢和帝時乃通地暑濕冝稻産五榖果菜出犎牛孔雀大卯如甕有桃拔師子犀牛桃拔一名符拔似鹿長毛一角或為天鹿師子似大蟲正黃有音髯耐音端尾端者毛大如斗爾雅云狻猊是也記夢至元戊子八月十三日夜送真定姬仲實上路就枕熟睡夢在一雪後亭榭尚書夢符宣慰信雲甫御史王子淵三人來訪坐間話及向在東平時遊燕等事夢符衣一素練衫當膺畫名士像自遺山已下數人余即題詩杋上云不惜千金買東絹丹青難寫是精神因大噱曰此衫甚佳但到處是長負一軸諸公行神也遂蹴踏砌雪而覺乃自占其夢復作一聮云恐是隆江方大用故將賢彥貯胸中詩夢十一月七日與兒子輩祓除回就枕熟睡近四鼓夢與薑君文卿會厯下亭酒半酣薑歌鷓鴣曲夀豫聲甚歡亮巳而以遺山新舊樂府為問余曰舊作極佳晚年覺詞逸意宕似返傷正氣薑以為然豫因賦詩以贈既覺頗記其一二因足成之其詩曰畫戟清香敞燕居分明夢裏到庭除恩醲故里懸車後錦爛秋鷹斂翮𥘉細棹觥船浮酒海暫停銀管合纍珠賞音千古遺山曲堅意髙歌要夀豫既而後夢至一大城府遇老人邀豫入王氏邸肆其主即曰汝非王秋澗邪豫曰然因口占二句云此生難道無餘幸海上人爭識姓名仍詢曰此何處曰兹戅州也地在洞庭湖南七百餘里豫曰東坡八詠何在曰石刻去此又三百里外其老人又推豫賤庚曰誰謂中州無人乎未及問其行藏而窹時二十五年戊子歲也十一月十二日夜夢四鼓時夢入一重修大佛閣有巨蛇長約三丈自閣壁西北而下僧徒以杖擊之不中內一僧揮鍤中斷為三假豫稍前視之其蛇首似獸有雙角若羚羊者膏血淋漓赫赫然尚能舉動次夜復夢人以羽矢一大房若今之鞬者挂于中門記夢中題人手卷娶為無後有子而嗣有餘老為致養子孝而養不闕其嗜欲或有所未免而年巳及于耄而于三者吾子將何擇焉擲筆而覺因卧笑曰夫子自道也于是起而書以為警至元二十六年歲在巳丑春二月二十一日辛未夜也豫時年六十三明日會亡友中丞王君葬于正尚里夢解豫平日夢頗異自今年夏多夢疾厄凶喪或纒綿墟墓間及故交久殁者與之宴逰談笑如西溪贊拜殿授王中丞需騎而作且知其彼死時又不省在寤寐中爾覺意甚惡之因自解曰此無他乃一身隂陽消長之漸也醫家有云男子四十隂氣自半况行近八八之數乎雖然氣有盛衰人不能皆然若有餘尤當惜養不至耗竭可也陽為舒為暢隂為慘為悽慘多而舒少故神才交而魄為之勝矣調此二者奈何有絶嗜欲少思慮檢行已安傃分息形神而植定力旦則以此理坐進夕則以夢相驗一或有差立為除治其病庶少瘳矣昔夫子向衰稱不復見周公于夢只是老克自持不願乎其外之意也若不量力不安分凡百營為返勝于昔將見有不任我勞從中躍出辝而去之者矣可不畏慎也哉故曰知之者強不知者老其是之謂乎作夢解紀風異余年十七八往蘇門讀書至古城東十里外有旋風自西南截泉水北來望之圍圎約六七里大其髙入天聲勢如甲馬迅馳黑氣蓬勃吹拔草樹飛卷半空余走不及避乃暝目倚棠樹悚立須臾覺寒凛氣繳束而過别無它故今日偶讀筆談見元豐間武城縣旋風殺傷人甚衆因念豫幼多災厄追想往事有可怖者故書以為來者之警壬辰秋申月已七日記喪紀古之人以送終為大事故即是而察禮者氏將葬燕人來觀滕文居廬弔者大悅今觀雷白二家祔葬甚有關于風化而出于常人之表者一則衰絰纍然多從古制二則寢苫枕塊卒哭後日飯𬞞食三則不徇俗而用二家四則穿治壙右製為壁藏土周于棺略不施甓五則直壙下窆同穴異棺乃北其首六則墓記從實略無虛飾至于容色之戚僻踴之數又見夫固所自盡之道以致會葬者皆歎息有得而去因念唐為衣冠盛代至祭不焚冥錢唯顔魯公張司業家又伊川先生居洛下治喪不用浮屠法雖風動一時止一二家化之豫行年五十有九宦遊四方其于慶弔固云不少然由德風而偃者所見亦姚許與是三家而已嗚呼甚哉禮之難復俗之不易化也如是述喪紀以寓豫感雷則祔其母夫人侯氏白則葬其父頥樂先生云紀夢至元十七年春某官真㝎夢先祖敦武府君親告某曰今濟源縣宋宰相陳堯叟碑文內王其姓者䢻王氏逺祖也汝其識之草年正月在燕與懷州劉節使相會問及陳相石刻云濟源見有陳堯叟讀書堂故碑但不知有無王姓者筆之以志異日求訪紀夢至元十九年八月二日夜分後夢行通衢見大井中一異狀人跨青色巨蛇躍出地長約丈餘身廣闊與尾等修鱗濯濯可數若將前迎而復去余俯視井中水波皆成五彩丹色殊煥爛也內中至井漘與所經遺水濡濕尚淋漓然余逐蛇前行相去數步外因取碎甓擲之者再既而余入一團焦避之蛇復來集其首巳化為馬又有數異馬飛舞環余而立𥘉甚惕息至此無復怖矣尋登一𬗋閣少頃從閣之西道木陛下降乃窹月異庚辰歲十一月十一日長至日日出三丈許月現東北丑位間去日約百餘丈其上數丈隂魄團團略無虧欠至寅方移時乃滅因念月與玄象經緯空際太陽既出自掩而不見今太隂於陽生之朝晝見與日並光又未嘗月出東北方者吁亦異哉剱戒哀梁子也梁奉議仲常與豫聮事于憲司者凡四年十九年冬同在京師乃告豫曰僕有一劒頗古而犀利自落吾手每臨靜夜屢聆悲鳴比復作聲錚然也且聞百錬之精或嘗試人者則鳴卋傳以為劒戒豫疑焉白此金孽也非戒也既而梁以事南還陳留到家四日而卒吁亦異哉因念張華授千將而告凶鄭逵淂吼劒而怪至夫金鏞木鐸中隱大聲若無因而自鳴則為不祥之金梁以劒異告豫至其死時僅四十九日淂不為劒之孽乎梁諱秉常燕人性機警持事峭急寡讓淂年五十有三金尚書梁肅裔孫見所藏世譜云至元草年歲在癸未端月十有一日王惲書鹿庵先生卒日至元三十年癸已冬十二月草二日鹿庵先生夀九十二歲無疾而終先是公靜坐間忽張目仰視屋廬曰我于此居淂箇月旬日間爾及薨適滿其數氣比絶呼家人令具鞍馬曰可與兄去矣隨有大星隕于寢室東山其光芒炬然曰兄者蓋同母兄文勉先生也愛民榜進士第嘗為某縣令終恆山幕官明年二月其壻李惟賔葬東平府須城縣三十一年四月五日李野齋説如此家府遺事先君思淵子通天文又善風角辛亥夏六月憲宗即位明年壬子秋先子以事至相下九月𥘉客鶴壁友人趙監摧家一日夙興見東北方有紫氣極光大衝貫上下如千石之囷時磁人杜伯縝侍側指示之杜曰此何祥也曰天子氣也杜曰今新君御卋其應無疑曰非也十年後當别有大聖人起非復今日也渠切記無忘第老夫不淂見耳至元十五年豫過滏陽與杜相會話間偶出元書片𥿄相付且歎其先輩學術之精有如是也國朝奉使大元太宗朝奉使宣撫王公諱楫字豳人有文武才略金季舉進士不第以武辨降太祖聖武皇帝即授宣撫使佩金虎符時年三十至太宗朝丁酉歲假御史大夫持莭使宋議和雖往返十年有皇其華風義言言竟從我議不幸使軺北還前次荊南疽發背卒年六十時癸卯秋也道號𬗋岩翁有文集并使宋録藏于家元貞改號六月十日偶過其家孫元德因出示公祕閣畫像介胄弓劔姿颯爽蓋儒將之偉者元德風彩甚肖其祖及觀楊𬗋陽楊西庵吕大鵬張徽商左山祭文畫贊題跋等篇又説公比卒前數日夢一青衣童子傳王溪東館主人來召既抵其處宫觀甚麗止公俟門屏間少頃出報曰公旬日後當主是館吁亦異哉又觀馬雲卿所畫人樣吳粧五星乃竒筆也其金水二女形皆散髮金主殺故杖劒水持筆者或謂水官主録過木捧蟠桃火四臂上擎飈輪散火下操弧矢當前一大星旁射土則扶虬杖而已六帖説白樂天作類書名六帖通典選舉門載唐制曰開元中舉行課試之法帖經者以所習經掩其兩端中間惟開一行裁𥿄為帖凡帖三字隨時增損可否不一或淂四得五淂六者為通此六帖之名所從起也六帖云者取中貼之數以名其書期于必遂中選也金制金人立國作制頗詳雖服御飲膳皆有法以維之然化敝則奢麗奢則嬌嬌則弱弱則萎薾而不振恐亦取亡國之一端也今日因餟粥糝不可對齒偶思穆若卷如之事為感而筆之冠冕始制或者以金人盤領上服與西域素積尖冒皆出本俗余以謂盤領漢之曲領尖冒古辨之制也今晨讀戴禮冠義得鄭氏冠禮起早晚之説稱周公對成王云古人冒覆而勾領謂三皇時以冒覆頭勾領繞頸皆以羽皮為之至黃帝則有冕辨又云帝造火食旃冕而用布帛代其羽皮乃知二物皆三皇巳來之遺物也又如山東民家至今亦以長幅皂繒蒙纒首髻西域人用綌絺纒繞其首及食齒人冠絳氊以冒頂髽者其亦本於此歟嗚呼禮失于中而求之野冨哉言乎裴中立不引韓愈共事昔裴晉公授鉞平淮辟韓愈為司馬自以度為已知然終不引愈共天下事至作田橫墓文微露其憤時貞元十一載公年始踰壯矣豫嘗思而不淂其所以今乃悟此何異魏公之抑蘇軾也大抵才盛學博之士加以年少未免有軒昻莫降之志卒之臨大事成大業有不當如是者乃知二公厚而惜之非畏而忌之也欲使澄治客氣明夫大學之道懿蓄其文德以就夫晚成之器耳嗚呼君子愛人以德復有重于此者乎戊子歲冬十一月朔晨起偶書賤生于無用説萬物盈于兩間未有一物而不為卋用者况人乎人之為物淂氣之全而靈之最者也苟自棄自暴不為卋之所用非惟返不及物而賤之所由生也彼牛溲馬勃敗鼓之皮物類之極賤者也然一旦與用適冝顧惟毫末可以愈竒疾應時需即與玉札丹砂赤箭青芝並芳而同貴貴生于有所用故也彼衣敝緼袍並夫華簮盛服之士貴賤固有間矣其所以秉有靈彛物備于我者則不殊也故為士者烏可惡其居貧處賤戚戚然卋之不我用也要當明德志學思求其致用之方可也世之所謂學者多矣有有為之學有無用之學窮經洞理粹我言議俾明夫大學之道者此有用之學也如分章摘句泥逺古而不通今攻治異端昧天理而畔于道是皆無益之學也士乎士乎于焉而不擇其有用而致力乎無用及其志與年邁悲嘆窮廬尤其世之不我用迹惑矣衍賤生無用説庭芝評郝奉使文李庭芝見郝奉使文字謂陳月觀曰陵川固才髙學博但出入韓文未甚熟耳余嘗度之韓文卋所重者其要非一今李之于郝所以云云者正以韓豐而不踰一辭約而不失一字郝之返是者極多不然是擇焉不精明理未至雜以非聖之言故也崖公厲鬼事迹故榮祿大夫平章政事御史中丞領侍儀司崔公遺言曰人秉四大假合而為生踐履五常而為用有偏於學佛者溺于儒書者各執其一偏所以學者兩不淂其全雖聖人性􅒛之學備載方册而學者多以尋行數黑為務及其遇一事決一疑皆不能自省愚于七月上旬腦後病瘡𥘉不以為意會車駕幸大都跋涉從行瘡益舉彂草三日問醫者麻監丞曰此為腦疽其源發自五臟急之不可緩之不可當以漸治之自是日詣麻行館求治後至白海而瘡勢益大形疲力瘁心神不寧以此自思蓋無他故病之所作也然所恨者居無良醫行不能扈從一曰近侍官伯勝等以愚病聞奉旨留麻監丞於白海治之拜命日赧汗浹背伏思平昔略無報國殊勳致感今日聖恩如此由是覺瘡疾頗回然于夢寐間每為厲鬼所慿竊謂生死是苦樂我心既㝎何從不可八月二日從其醫針者三處覺心舒意暢神志帖然視天地之氣月白風清霜露溶溶萬物各淂其所而吾之清氣其靜者混然同于表裏方就寢而厲鬼又見于夢且曰卋間多少難了難行之事相惱百端向之治功皆不復見而疼痛比前尤加夢中恍愡而覺坐而思之非厲也以我所見不㝎淂乘其便耳若吾身獲安即與天地萬物混融同一和氣彼厲鬼安能凂我哉且天下之事不可不辨于早人之生死不可不識于先我既能悟此白日黑夜自有㝎數彼厲鬼何預因記其夢以俟知者詳焉時大德二年八月五日也卷終
