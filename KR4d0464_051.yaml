body:
  text: 碑大元嘉議大夫簽書宣徽院事賈氏丗德之碑元貞改號之二載歲舍柔兆月維㽔賔十有七日甲申附馬髙唐王臣闊里吉思奏簽書宣徽院事臣賈脫里不花言惟賈氏三丗先臣供奉內庭繼典玉食夙夜祗勤頗著微效今飾終之典表行之銘未蒙贈賜敢援例以請制曰可仍傳旨翰林文諸石碑傳信後來臣承詔伏念方今追崇宗祖因之懷想舊臣稽諸古者實皇王盛事敢再拜稽首考其丗系而論列之謹按賈氏丗為燕之大興人髙祖仕亡金職庖人氏祖妣夫人李氏生一子曽祖諱昔刺躰貌魁梧箕裘丗業資謹願以孝行聞鄉曲國朝甲申間因上元奉御劉公紹現莊聖皇后時睿宗駐和林北有大水曰也可莫瀾有峻嶺曰杭海答班與中土遼邈以公不憚逺侍闕庭即令典司御食甚稱上意顧而愛之以其髯踈色黃因賜名曰昔刺然慮公漢人與風土不相冝令徙居溓州以優便之既而上思公不置曰賈某在吾左右飲食起居殊安適也復名史供奉其諸色庖丁悉隸焉凡宫闈所需改雖繁多事益辦給人有不逮未嘗挾所長以聲色拒人衆以此敬愛若儒素然加以謹飾周密動而有為故屢蒙眷諭命與貴近啇確大事深識逺慮出人意表時丗祖在潛知其重厚可大用逮中統建元特授提點尚食尚藥二局兼領進納御膳生料令佩金符用彰勤恪既而昭睿順聖皇后嘉其克調鼎味以宫人蘇氏妻之年既耄猶不倦勤既而以疾不起將革索賜衣及所乘驄鞚至庭奄然而逝其方寸灑然略無愧慊送終之具一從宫給葬漆園先塋實至元五年二月八日也今贈嘉議大夫聞喜郡侯諡曰敬懿夫人李氏淑慎柔嘉光備婦道𥘉奉姑於兵間食少不足供養自以漿腳雜菹而食其賢孝可知年五十九沒於中山繼姑亦亡壽九十有四夫人生子一人今贈聞喜郡夫人諡曰節孝祖諱醜妮子嶷然殊異及長多力倜倘有襟量甫五歲丗祖皇帝愛其風骨嶢嶢嘗置御坐側既冠昭睿順聖皇后妻以宫女毛氏從征大理嘗躍馬入水捉戰艦一併擒甲士十餘人上重賚壯其勇而惜其輕鋭也自是命與丞相線真出入而持護之及還上欲大用以疾終檀州今贈資善大夫臨汾郡公諡曰顯毅夫人毛氏系出延安有婦道宗族以賢稱撫育孤幼皆致成立賈氏復振夫人之力居多享年六十有一贈臨汾郡夫人諡曰靖淑子男三人女二人孟曰忽林赤仲曰買狗性沉厚寡言笑幼事𥙿宗皇帝官奉訓大夫典膳署令卒年四十有一季曰寄𧾱天資慷慨能睦諸親自幼侍安西王官至懷逺大將軍陜西屯田總管府逹魯花赤卒年三十有七孫二人長曰錫烈門官至掌膳局提點次曰觀音奴女二人長侍中宫既笄願披鬄為北丘尼賜號崇教大師次曰邈罕適中書左丞相即律公第九子參知政事希逸顯考諱忽林赤資寬厚美儀容善騎射中統辛酉扈上北巡道出釋壷土風霾晝晦歘有賊來犯遂射而扲馬下上壯之至元𥘉襲祖父職佩金符提點尚食尚樂二局兼領進納御膳生料夙夜在公克紹乃聀繼授嘉議大夫簽宣徽院兼尚膳監事出入禁闥三十餘年嘗侍清燕調羮御幄曽無覆餗之憂將命公朝每抱有終之戒悉心盡慮敬慎如一過則歸巳善則稱人橫逆之來直受之而不校其雅重有量根於天性自然非矯揉作為而為之也以其年月日以疾卒於位得年四十有三訃聞上哀悼竟日闔朝諸臣弔哭皆失聲下至庖丁宰士紼送長號者無慮數百人自非推誠接物素服人心焉能感召如是今贈榮祿大夫絳國公諡曰忠靖夫人忽八察皇叔安西王與同乳哺聮貴氣冝室家德充於容行踐於言爽朗而不掩其柔嚴恪而不失其和奉舅姑則盡孝事夫長則罄節嘗入監宫紀蒙賜珍玩甚厚今封絳國夫人子男七人長曰完者不花昭信校尉尚食尚藥局提點卒於官次曰也先不花蚤世曰脫哥里不花嘉議大夫簽宣徽院事曰也相忽都魯中奉大夫司農卿曰王六曰布延不花侍皇太后于西宮曰忽都不花孫六人完者不花之子一人曰乞里乞歹脫里不花之子三人曰也先怗水兒曰逹理麻室利庶出曰班不王六之子一人曰撒里忽都不花之子一人曰伴哥臣嘗觀周禮天官而下即膳夫庖人之職豈人主尊嚴不厚其身無以護養元氣根本惟其血氣和平志慮充溢而後使國脈民命乃有所恃而發政施仁散為天下之福令賈氏五世嗣守世官同濟厥美冝其子孫報施昌熾榮顯有如是者銘曰賈氏五世箕裘相承蛇化蛟騰不變其形大安季年萬室南遷天道在北公知其然負鼎比上割烹擊鮮既現睿莊奉承周旋乃眷乃顧忠力于宣神龍奮淵儷景同翻尚食尚藥聖躬萬安謹飾周密耆艾敦厖出入卧內將事不遑燕喜龍樓饗獻朝堂鼎鐺刀七威儀鏘鏘養德養體其道有光一飯之勤其報彰彰况乎萬乘福賜可量寵數優渥垂𥙿後昆若若纍纍爛其盈門有來遐祉大集公身八秩之壽五福之尊一笑而逝長逰帝閽逮夫嗣子忠勇絶倫秀而不實大用遂屯于嗟麟趾乃見振振於穆孝孫有儀有藝功歸衆人過則稱已犯而不校是又人所難爾調和鼎味有相業履其在內助彤管有煒帝曰懋哉德容嶷嶷朕自邸潛深知所以繼續而行丗濟斯美崇德尚功有例有體曰祖曰禰若孫若子諡以顯號公侯有偉表之豐碑漆園故里臣拜稽首愼終如始臣力方剛圗報無巳大元故大各路宣差李公神道碑銘并序大元以神武戡定區夏長䇿逺馭控制撫御之方甚悉故治無小大例建官臨護猶古監郡然而權威視前代為有加維魏府盤城千里為户幾十萬其襟帶之雄節鎮之重自昔號建國至署監總者必勛閥丗胄練逹時體通習漢事忠貞而有材望者膺選在梪撥甫夷之後官府草創之𥘉布宣皇靈統攝羣屬具民瞻而勝保釐之任者鈐部李公其人也公諱益立山其先係沙陀貴種唐亡子孫散落陜隴間遠祖曰仲者與其伯避地遁五臺山谷復以丗故徙酒泉郡之沙州遂為湖西人顯祖府君𩔶夏國中省官兼判樞密院事皇考府君用級爵受肅州鈐部其後因以官稱為號喪亂譜亡遂逸名諱公昆弟四人獨公少負氣莭通儒釋洞曉音律以廕儤直宫省積勞調沙州鈐部建國朝運開乾維時公兄由肅州長奉使于我太祖聖武皇帝異其材辨因與館接使察罕深相結納情好既密約輸欸內附天兵啚肅以射書事覺遇害及丙戌冬師次燉煌公審天命之攸歸憤兄忠之不果遂拔部曲詣軍門迎降太祖以公首效忠赤特加褒命隸國王木答里帳下從征羌落每戰愾王所敵故所向克捷有功丁亥夏師還乘破竹勢命圉將忽都帖木兒偕公招諭沙州守臣率衆偽降伏彂擊走之忽都馬踣追兵垂及公下所乘授之得逸去乃麾左右􅊇戰却敵而還王壯其勇召使前僗焉曰當危急際委巳以濟人汝命固不靳邪對曰彼國之勳舊倘墮姦計有辱君命以新附顯𬒳驅䇿效莭死事乃所甘心太祖聞而嘉之仍諭曰卿勉宣忠力會當以好爵縻汝明年戊子春從攻沙破之帝怒不時下欲屠其城泣請曰彼逆命者渠魁一二人民何與焉若悉坑之恐堅未降者心且臣賤屬咸在願賜全宥帝録其功忠許焉闔城賴以生既而命二業陌赤行其部斷事官公不鄙夷其俗故裁遣終日無倦色人服其詳明焉庚寅秋有詔檄諸部精兵忠朂之士西征阿思部署公選鋒率轉閗而前斬艾不勝計進圍城聚踰月不即克一夕公伺守陴者怠帥猛士潛登其墉殺十餘卒即大呼曰城巳陷矣諸軍進隨阿思乃潰䇿功居苐一擢千夫長自是勳名焜耀朝廷有意大用矣歲甲辰詔選勛能佐行臺于燕上以公克諧往焉時莭制所及二十餘道機務填委日復一日公輔相聽斷動合事宜政多便于時者辛亥春朝廷稔公綜練國事復有顓面西土之寄以年髙辝不拜憲宗皇帝奬其舊臣處內地便之命錫金虎符充大名路都達魯花赤復賚白金御驃以寵其行魏自兵後官府甫建群豪諸司錯迭長雄不相下致政令不行事多齟齬公知其然無巨細一以重典從事𥘉則遻然既乃弭耳聽約束惟謹大綱既振于是舉廉能拉姦暴扶良善惠􅟂寡凡政之不便民所欲而未得者率立行而更張之至于外而營幕連野內則使者旁午咸畏公方剛莫敢侵分少有牟于民一日釋菜廟學顧禮殿䵝圯公喟然嘆曰澤宫風化所繫今若爾何以興善心于民乎即完治一新其亭傳長府皆以次修舉衡漳歲霖潦泛溢為民害甚侈公請於朝跨河揵堤仍植槐抑萬本苞固峻址捍禦崩嚙且充歲時材爨之用迄今公私賴焉相有劇賊張黨結百餘輩在所為梗官不能鈐潛入境行劫公廉知窮其根株窟穴撓捕無遺自是相魏之郊民安田里暮夜絶桴鳴之警矣巳未春今皇帝南伐駐驆濮苑起公從征既而知公恙命尚醫診視眷顧殊渥其年秋七月竟以疾薨於位春秋六十有九公資嚴明不妄言笑清峭有機警以忠順上結主知致出參大政名聲極于時利澤施於世平居循循為善若不足惟恐一物之傷及束濕吏曹紏繩姦謬不絲髮少貸虎符麟節長魏師者九年號令明肅豪右屏息四境樂業鄰藩悚其威望𥘉公行春近郊見盛挾果芳者公責之曰此天地秀實以養人多折何為乃撲教而去自是方苞體之物莫敢有暴殄者其始焉以重典立威終之以惠愛及物類如此至元戊寅葬公於大名縣臺頭里之新阡從卜食也夫人田氏白氏祔焉三子長曰愛魯襲公丗爵至元四年遷金齒等國安撫使尋升授雲南道宣慰使兼都元帥今進拜中奉大夫參知政事行雲南等路中書省次羅合終大名路行軍萬户次小鈐部代兄民職孫三人長教化孝友英發樂問學有藴藉至臨政精核矯矯有祖風今階正議大夫佩金虎符充大名路總𬋩府逹魯花赤兼新附軍萬户曰帖木兒敦武校尉固鎮鐡官提舉曰萬奴簉中朝侍從官嘗聞活千人者後乃有封公沙州之請何啻千人哉今子孫繩繩承世爵而繼祿次豈非隂積致然耶既襄事之三年嗣侯教化百拜以墓碑來請曰我祖捐館巳來將二紀于兹曽是表峙神道無顯刻以昭裔昧朝夕惴惴有不遑息者幸憲使惠顧以畢厥志庶圗報遹追之心有以招告存殁大獲慰焉某謝不敏禱愈懇以教孝求忠之義固不得辝謹按所具善狀敘而銘之其辭曰乾龍奮飛天北方潛蛟乘時亦雲驤李公材武邦之良拔身嚮明佐興王西傾崑崙掃河湟有來群后何瀼瀼公從鈐校參戎行卒能建功出非常天威西收陳堂堂凱歌歸來百戰埸龍泉精英百錬剛試之剸繁尤允當行臺駐燕總皇綱上計委積如陵岡斂伏雄毅歸贊襄於惟致君變時康我聽我理多救匡一日問望馳四方酬功便老國有章付之方嶽又汝長魏昔建國千里疆德星出昴光煌煌憬彼羣屬勢軒昂正名定分我所遑拊摩瘡罷抑豪強百廢具舉用乃張若傳有亭積有倉里不桴警孰竊攘大賁禮殿開兩庠春風絃歌齊魯鄉漬民于淵吾憫傷躬督萬民揵隄防濁流不揚耕且桑功餘保障歲屢穰始焉立威肅秋霜終以惠鮮熙春陽民祝公壽福此邦曾不少留我涕滂公雖遽往有不亡隂積陽報理乃彰子孫嗣封奕葉昌髙牙大纛冝彯揚河流洋洋沙麓蒼是為元臣衣冠藏惟德在民久愈光嗚呼此碑古甘棠大元國故衛輝路監郡塔必公神道碑銘并序皇元天縱神武戡定區夏禁網雖闊鈐制有方曰州府曰司縣乃建官監治於上路則復設總監一人其位望之隆控壓之重若古方伯刺史在諸王分地許持選掄委之顓任之久比同封建嗣承丗爵校常調為重若天寵襲漢貂榮分虎節卓尓良碩之才允濟承宣之美其生也愛方召父其殁也思逺桐鄉者繄我衛輝路都監郡塔必公其人也公諱塔必迷失系出瀚海大族王父府君諱押脫玉倫𥘉太祖聖武皇帝龍飛朔漠合一諸部公扈翊開拓屢樹勳伐授阿不罕部工匠總管仍佩金符顯考府君諱玉魯忽倫為人膽勇善騎射早以丗胄為內侍官歲壬午帝西征有獸扶拔潛嚙御驃上怒合圍大搜公蹙獸至帝前射而殪之上喜甚錫百馬以旌異自是歷事莊聖太后憲宗皇帝以先朝勳舊為御前總執法每大犒饗衣盛服乘名馬麾纓杖肅官儀周行雲幕殊顯赫也府君生四子公即冡嗣也公姿白晢美髯而氣幹魁偉膂力絶人長襲父秩出入禁闧親密無間巳而有言貴近納賂致殷者上命搜索帳橐獨公衣𬒳外廪粟數斛而巳由是廉慎為上所知已未秋憲輴西陟棄群臣而北明年庚申世祖皇帝北還公倉皇東播迎謁中途上素聞其賢為顧恤之及登極俾就宿衛至元三祀詔以衛封皇姪玉隆答失為采邑升州而路遂輟公來監治既下車以衛壤𥚹狹路郊衝會使軺營帳騷屑無時不力為撫養遺黎保障一切恐靡然無復綱紀僨瘠豚上如淇控北徼無所附麗公請於朝來隸分辨主宰汔民勞為多由是衛以三州五縣列河朔劇鎮明年諸王秃忽魯南征道出淇右供頓儲偫至駭民聽公逺迓啓其故下教申嚴衆斂迹而過輝營帳千屯分牧共西夏則避炎潞頂冬則迎燠山陽踐食村落輘轢州縣有不勝其撓者蓋十年于兹公落其機牙來就約束輝民殖園竹仰供賦稅監司掩之入官少有犯民即破産抵養民之道公上奏力陳利害竟還民産劉數夥徴甚急雖破産莫克償公憫其數不虧為申理之得免釋惠孔子廟兵後廢撤不復者五十載公首議修建解二驂馬輟俸稍兩月以佐費既迄工壯麗甲諸郡釋菜告朔文物煌煌其蹶厥民彛思樂泮水貽謀後來有深意存焉者六年入奏膚功上喜甚以憲宗嬪賜之金玉鞶帶上駟雪鶻副焉七年河朔大蝗衛獨不為災識者謂德政所致其秋料民為兵甲衣需紬製之市闕民不易得公命以繒代敕使以乏軍興不可曰脫有誤我則任之民賴省便八年夏四月入覲得疾上命皇姪阿速䚟同尚醫來視以六月十有三日薨於上都寓館得年三十有九訃聞上嗟惜者久之遣使護喪南歸葬汲縣西郭清水之曲公姿剛毅嚴明事上忠奉毋孝平居寡言笑凛不可犯及與僚吏共事有量知體通議論樂從善無一毫自用之私要以愛養民力成就王事為亟知總尹陳公祐之賢敬讓歡洽與其施設至事閧興除人莫措手者即任其責不自顧惜晨起坐堂上吏抱成牘鳬進公詢尹云何曰得即署及朝士貴種譯語闌翻辨論請索關不可支者不動聲色徐以數語應之即聽決而去退食鈴閣下侍立不三數人門庭肅然杜絶私謁當時政令修舉豪強斂迹賦役均簡俗興禮讓河淇間民物雍熙風化大行皆由公處之以公廉揵之以勤強鎮之以安靜有以致也時移事昜人亡政存三十年間人物有渺然之嘆論者謂仁者當得其壽積善常與其報公位不滿德夀未遐齡天之報施果何如哉豫曰不然賢者必有其後一世之短百丗之長存焉天道可必至子孫而後定者審矣夫人月掬氏姿淑婉亦瀚海名家後公十七年卒祔安玄堂子一人即今嗣侯塔失帖木兒女四人長夭次適輝長玉失乃次適汲尹也先不花次適工匠府經歷小云失不花孫二人曰不顔帖木兒曰脫忽帖木兒女孫一曰不顔的斤𥘉公薨嗣侯甫三歲後二載太夫人挈之謁皇姪阿速歹令舉頭視日曰嘉肖其父仍撫背謂曰汝蚤成立當繼先業既冠從叔父懷逺覲丗祖皇帝詔侍湯液扈東征有勞績至元二十五年命襲爵官懷逺大將軍材識明敏臨事善裁決止酒十年讀書無倦秉志挺特有過人者祗遹先志儷蹤時彥蔚然以賢師帥稱佳聲載路逹於天朝蒙賜府第一區賢王亦以錦衣玉帶白金為賚大德改號歲冬十一月以書幣走京師請於某曰孤子無所肖似尚賴先人遺澤猥嗣爵位朝夕惴惴以圗報為亟惟是揄揚先美昭示永久庶幾少有慰焉敢百拜以銘章為請追惟先郡公交最久知行巳為詳義有不得辭者謹按善狀系而銘之銘曰金天瀚海包元精斗極通貫氣上蒸地靈人傑古所稱篤生丗賢為國楨爰有真人起朔庭風雲儷景爭騫騰維公家丗開五城執掌天憲昭儀形帝前盛服麾仗纓雲幕萬士羅天星肅焉約束一氣凝日華光動劒佩鏗渥窪神駿天池鵬維藩采邑啓衛埛其往視師汝則能衛維小邦勢孤撑民屎事劇力莫勝興滯輔罅須力行繭絲保障事匪輕今則致理宜合并與善知體政大經兹焉吾分非自京坐鎮政有公而清暴強斂迹民敉寧學校修舉禮讓興吏畏民愛化大弘紫庭入秦報政成賜金增秩循固應嬪以天御何寵策蝗不為災嵗屢登民沐膏澤如幪帡願公福壽川方增一夕星殞瞪有聲素旗南下風冥冥民失怗恃疇卑矜昔歌且舞今涕零臧孫有後事可徴嗣侯善述德日馨豐碑墮淚勒我銘大書丗篤忠與貞懷我風愛為丗程龜麟漠漠秋煙生衛人户祝公之靈桐鄉丗祀何千齡大元中奉大夫參知政事稷山姚氏先德碑銘至元改號之五載秋七月憲臺肇建于以配肅天德用昭太微執法之象詔平章政事塔察公為御史大夫其裏行十有二人就舉所知以充貟數某亦忝簉力列始識姚矦君祥於肅政堂為人蜂閎有膽氣勇於必為以功名自喜尋膺才選由本臺架閣授監察御史朱衣白簡意躍如也時朝廷方勵精圗治思聞讜議振折骫骳倔強之氣君祥一旦責與志合義激于衷殆以與事閧者嘗與柄臣庭辨得失摧姦發伏見於聲色不少假借彼情露氣禠落其機牙上為動容嘉其峭直因目之為巴兒思國語謂其不畏強禦威猛猶虎然且喻之曰爾後有違太祖聖訓及干朕之紀綱者許令直逹罄所願言由是臺閣生風士論有埋輪都亭膽落金吾之目故四仕風憲入長秋官再尹大府皆著能聲遂進拜中奉大夫參知政事因不自遑暇曰愚忠朴直效用何有致茲貴顯追念先考讀書遁丗不一見於用潛德融光流慶後人欲報之德昊蒼罔極有求銘太史光賁泉穸霜露之感庶幾少慰遂以銘章來請自惟君與不肖早以義交友愛之情實深孔懷况久要不忘其敢以不敏辝謹按東雍之姚系出唐宰相文貞公遐裔逺祖伯祿嘗任絳州觀察判官卒葬屬縣稷山之南陽里子孫因占藉為邑人今姚其氏者尚餘七十家雖莫克昭穆要之同出一袒風聲氣習猶可識也君祥大父以祖竁艱於溝合别起新阡於嘉禾之北原父韓某生十有八值金季搶攘家業蕩盡孑然以孤童子流寓代之鴈門鄉貢進士趙公愛其姿性溫克館之為門倩其先素以方技行府君幼傳家學或勸售其術以資生事曰利者人所共趍其如不可何醫重事人命死生繫焉今以糊口計措不精之術於其間寧寒莩死義之所不敢為也聞者為歎息遂安貧處分以闡庠為業終身不昜非道一介不取與於人單瓢屢空進修之志不少輟由是逺邇矜式以師儒推重之及二子稍長嘗庭訓曰聖賢千言萬語牖人於善以要領而論不過忠孝兩端而巳汝等其勉旃異時立身成人恐不外是壽五十有八以疾終于代遺囑天福等起宗顯親歸葬先壟為切配趙氏治家清嚴教子孫有法君祥𥘉拜御史戒之曰古稱公爾忘私汝既委質而臣當罄殫一心黽勉所事勿以未亡人為恤俾吾追蹤陵母死之日猶生之年也君祥亦請於憲府監察責當言路有犯無隱儻因事獲譴乞不親纍或以奏聞上為稱之曰巴兒思母子雖生兹丗其義烈之言當於古人中求之命侍臣董文忠傳旨翰林院特書其事光昭簡册由是夫人賢淑聞於時元貞元年十有二月晦考終牖下享年八十有七生二子長曰天福即中奉君次曰天祿終和衆縣簿男孫四人女孫二君祥之子曰祖舜終祕書監著作郎曰和尚未名女二俱適華族天祿之子燕山驢速不歹先是君祥總尹平陽絳即屬郡封樹墳劵凡儀制之得為者略皆備具及母夫人之喪方尹真定即棄官奔赴爰奉二親祔之玄瘞既償先志適展孝思維姚氏自文貞公巳來歷唐訖今餘五百歲彯纓若綬代不乏人逮鴈門府君遭罹丗故家業中襄復能積德絫行躬不受祉遺之子孫中奉君承丗德之清源浚之以蠲潔而端其本采群言之枝葉滋之以茂實而循其能冝乎起身韋布致位卿相為連為率勵薄俗而振清標也是冝銘銘曰岷山導江彂源濫觴豫樟蔽空起於毫􅉭士貴尚志再丗而昌天道於赫孰為茫茫東雍之姚系開巨唐盛衰靡常善焉降祥繄鴈門君源濬流長不饗其報後祉曷量生丈夫子訓以義方一朝奮飛大我門墻峨峨豸冠振朝之綱摧姦彂伏耻後趙張嬰鱗上諌屢皂其囊精誠耿耿洞逹帝傍以虎喻猛奬其忠良遊刃恢恢槃錯莫當外臺雄峻搏擊翺翔羣狐闖穴一鶚撗霜風動百城孰為暴強遂參大政庸極寵章豈曰子能先代之光追報無及有事顯揚豐碑揭嶪勒銘煌煌惟孝移忠惟忠孝彰孝繼忠傳大渢泱泱子孫訓之昭示不忘
