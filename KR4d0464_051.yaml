body:
  text: 碑大元嘉議大夫簽書宣徽院事賈氏丗徳之碑元貞改號之二載歲舎柔兆月維㽔賔十有七日甲申附馬髙唐王臣闊里吉思奏簽書宣徽院事臣賈脫里不花言惟賈氏三丗先臣供奉内庭継典玉食夙夜祗勤頗著㣲効今飾終之典表行之銘未蒙贈賜敢援例以請制曰可仍傳㫖翰林文諸石碑傳信後来臣承詔伏念方今追崇宗祖因之懐想舊臣稽諸古者寔皇王盛事敢再拜稽首攷其丗系而論列之謹按賈氏丗為燕之大興人髙祖仕亾金職庖人氏祖妣夫人李氏生一子曽祖諱昔刺躰皃魁梧箕裘丗業資謹愿以孝行聞郷曲國朝甲申間因上元奉御劉公紹現莊聖皇后時睿宗駐和林北有大水曰也可莫瀾有峻嶺曰杭海荅班與中土遼邈以公不惮逺侍闕庭即令典司御食甚稱上意頋而愛之以其髯踈色黄因賜名曰昔刺然慮公漢人與風土不相冝令徙居溓州以優便之旣而上思公不置曰賈某在吾左右飲食起居殊安適也復名史供奉其諸色庖丁悉隷焉凡宫闈所需改雖繁多事益辦給人有不逮未甞挾所長以聲色拒人衆以此敬愛若儒素然加以謹飾周宻動而有爲故屢蒙眷諭命與貴近啇確大事深識逺慮出人意表時丗祖在潜知其重厚可大用迨中統建元特授提點尚食尚藥二局兼領進納御膳生料令佩金符用彰勤恪旣而昭睿順聖皇后嘉其克調鼎味以宫人蘇氏妻之年旣耄猶不倦勤旣而以疾不起將革索賜衣及所乗騘鞚至庭奄然而逝其方寸洒然略無愧慊送終之具一從宫給葬漆園先塋寔至元五年二月八日也今贈嘉議大夫聞喜郡侯謚曰敬懿夫人李氏淑慎柔嘉光俻婦道𥘉奉姑於兵間食少不足供養自以漿脚雜菹而食其賢孝可知年五十九没於中山継姑亦亡壽九十有四夫人生子一人今贈聞喜郡夫人謚曰節孝祖諱醜妮子嶷然殊異及長多力倜倘有襟量甫五歳丗祖皇帝愛其風骨嶢嶢甞置御坐側旣冠昭睿順聖皇后妻以宫女毛氏從征大理甞躍馬入水捉戰艦一併擒甲士十餘人上重賚壯其勇而惜其輕銳也自是命與丞相線真出入而持護之及還上欲大用以疾終檀州今贈資善大夫臨汾郡公謚曰顯毅夫人毛氏系出延安有婦道宗族以賢稱撫育孤㓜皆致成立賈氏復振夫人之力居多享年六十有一贈臨汾郡夫人謚曰靖淑子男三人女二人孟曰忽林赤仲曰買狗性沉厚寡言笑㓜事𥙿宗皇帝官奉訓大夫典饍署令卒年四十有一季曰寄㣘天資慷慨能睦諸親自㓜侍安西王官至懷逺大將軍陜西屯田緫管府逹魯花赤卒年三十有七孫二人長曰錫烈門官至掌饍局提點次曰觀音奴女二人長侍中宫旣笄願披鬄爲北丘尼賜號崇教大師次曰邈罕適中書左丞相即律公第九子叅知政事希逸顯考諱忽林赤資寛厚羙儀容善騎射中統辛酉扈上北廵道出釋壷土風霾晝晦歘有賊來犯遂射而扲馬下上壯之至元𥘉襲祖父職佩金符提點尚食尚樂二局兼領進納御膳生料夙夜在公克紹乃聀継授嘉議大夫簽宣徽院兼尚膳監事出入禁闥三十餘年甞侍清燕調羮御幄曽無覆餗之憂將命公朝毎抱有終之戒悉心盡慮敬慎如一過則歸巳善則称人横逆之來直受之而不校其雅重有量根於天性自然非矯揉作爲而爲之也以其年月日以疾卒於位得年四十有三訃聞上哀悼竟日闔朝諸臣弔哭皆失聲下至庖丁宰士紼送長號者無慮數百人自非推誠接物素服人心焉能感召如是今贈榮禄大夫絳國公謚曰忠靖夫人忽八察皇叔安西王與同乳哺聮貴氣冝室家德充於容行踐於言爽朗而不掩其柔嚴恪而不失其和奉舅姑則盡孝事夫長則罄節甞入監宫紀蒙賜珎玩甚厚今封絳國夫人子男七人長曰完者不花昭信校尉尚食尚藥局提點卒於官次曰也先不花蚤世曰脫哥里不花嘉議大夫簽宣徽院事曰也相忽都魯中奉大夫司農卿曰王六曰布延不花侍皇太后于西宮曰忽都不花孫六人完者不花之子一人曰乞里乞歹脫里不花之子三人曰也先怗水兒曰逹理麻室利庶出曰班不王六之子一人曰撒里忽都不花之子一人曰伴哥臣甞觀周禮天官而下即膳夫庖人之軄豈人主尊嚴不厚其身無以護養元氣根本惟其血氣和平志慮充溢而後使國脉民命廼有所恃而發政施仁散爲天下之福令賈氏五世嗣守世官同濟厥羙冝其子孫報施昌熾榮顯有如是者銘曰賈氏五世箕裘相承蛇化蛟騰不變其形大安季年萬室南遷天道在北公知其然負鼎比上割烹擊鮮旣現睿莊奉承周旋乃眷乃頋忠力于宣神龍奮渊儷景同飜尚食尚藥聖躬萬安謹飾周宻耆艾敦厖出入卧内將事不遑燕喜龍樓饗獻朝堂鼎鐺刀七威儀鏘鏘養德養體其道有光一飯之勤其報彰彰况乎萬乗福賜可量寵數優渥垂𥙿後昆若若纍纍爛其盈門有來遐祉大集公身八秩之壽五福之尊一笑而逝長逰帝閽迨夫嗣子忠勇絶倫秀而不實大用遂屯于嗟麟趾廼見振振於穆孝孫有儀有藝功歸衆人過則稱已犯而不校是又人所難尔調和鼎味有相業履其在内助彤管有煒帝曰懋哉德容嶷嶷朕自邸潜深知所以継續而行丗濟斯羙崇徳尚功有例有体曰祖曰禰若孫若子謚以顯號公侯有偉表之豐碑漆園故里臣拜稽首愼終如始臣力方剛圗報無巳大元故大各路宣差李公神道碑銘并序大元以神武戡定區夏長䇿逺馭控制撫御之方甚悉故治無小大例建官臨護猶古監郡然而權威眎前代爲有加維魏府盤城千里爲户幾十萬其襟帶之雄節鎮之重自昔號建國至署監緫者必勛閥丗胄練逹時體通習漢事忠貞而有材望者膺選在梪撥甫夷之後官府草剏之𥘉布宣皇靈統攝羣属具民瞻而勝保釐之任者鈐部李公其人也公諱益立山其先係沙陁貴種唐亡子孫散落陜隴間遠祖曰仲者與其伯避地遁五䑓山谷復以丗故徙酒泉郡之沙州遂為湖西人顕祖府君㦄夏囯中省官兼判樞宻院事皇考府君用級爵受肅州鈐部其後囙以官称為號䘮乱譜亡遂逸名諱公昆弟四人独公少負氣莭通儒釋洞曉音律以廕儤直宫省積劳調沙州鈐部建國朝運開乾維時公兄由肅州長奉使扵我太祖聖武皇帝異其材辯因與舘接使察罕深相結納情好既宻約輸欸内附天兵啚肅以射書事斍遇害及丙戌冬師次燉煌公審天命之攸帰憤兄忠之不果遂拔部曲詣軍門迎降太祖以公首効忠赤特加褒命隷國王木荅里帳下從征羌落每戦愾王所敵故所向克捷有功丁亥夏師还乗破竹势命圉將忽都帖木兒偕公招諭沙州守臣率衆偽降伏彂撃走之忽都馬踣追兵垂及公下所乗授之得逸去乃麾左右􅊇戦却敵而还王壮其勇召使前僗焉曰當危急際委巳以濟人汝命固不靳邪對曰彼國之勲舊倘堕姦計有辱君命以新附顕𬒳驅䇿效莭死事廼所甘心太祖聞而嘉之仍諭曰卿勉宣忠力㑹當以好爵縻汝明年戊子春從攻沙破之帝怒不時下欲屠其城泣請曰彼逆命者渠魁一二人民何與焉若悉阬之恐堅未降者心且臣賤属咸在願賜全宥帝録其功忠許焉闔城賴以生既而命貳業陌赤行其部断事官公不鄙夷其俗故裁遣終日無倦色人服其詳明焉庚寅秋有詔檄諸部精兵忠朂之士西征阿思部署公選鋒率轉閗而前斬艾不勝計進圍城聚踰月不即克一夕公伺守陴者怠帥猛士潜登其墉殺十餘卒即大呼曰城巳䧟矣諸軍進随阿思乃潰䇿功居苐一擢千夫長自是勲名焜耀朝廷有意大用矣歲甲辰詔選勛能佐行䑓扵燕上以公克諧往焉時莭制所及二十餘道機務填委日復一日公輔相聴断動合事宜政多便扵時者辛亥春朝廷稔公綜練國事復有顓面西土之寄以年髙辝不拜憲宗皇帝奨其舊臣䖏内地便之命錫金虎符充大名路都達魯芲赤復賚白金御驃以宠其行魏自兵後官府甫建群豪諸司錯迭長雄不相下致政令不行事多齟齬公知其然無鉅細一以重典從事𥘉則遻然既乃弭耳聴約束惟謹大綱既振扵是舉㢘能拉奸暴扶良善恵􅟂寡凢政之不便民所欲而未得者率立行而更張之至扵外而营幕連野内則使者旁午咸畏公方剛莫敢侵分少有牟扵民一日釋菜廟學頋禮殿䵝圯公喟然嘆曰澤宫風化所繫今若爾何以興善心扵民乎即完治一新其亭傳長府皆以次修舉衡漳歳霖潦泛溢爲民害甚侈公請於朝跨河揵堤仍植槐㧕萬本苞固峻址捍禦崩嚙且充歳時材爨之用迄今公私頼焉相有劇賊張黨結百餘輩在所爲梗官不能鈐潜入境行刼公廉知窮其根株窟穴撓捕無遺自是相魏之郊民安田里暮夜絶桴鳴之警矣巳未春今皇帝南伐駐驆濮苑起公從征旣而知公恙命尚毉診視眷顧殊渥其年秋七月竟以疾薨於位春秋六十有九公資嚴明不妄言笑清峭有機警以忠順上結主知致出叅大政名聲極于時利澤施於世平居循循爲善若不足惟恐一物之傷及束濕吏曹紏繩姦謬不絲髮少貸虎符麟節長魏師者九年號令明肅豪右屏息四境樂業隣藩悚其威望𥘉公行春近郊見盛挾菓芳者公責之曰此天地秀實以養人多折何爲乃扑教而去自是方苞體之物莫敢有暴殄者其始焉以重典立威終之以惠愛及物類如此至元戊寅葬公於大名縣臺頭里之新仟從卜食也夫人田氏白氏祔焉三子長曰愛魯襲公丗爵至元四年遷金齒等國安撫使㝷陞授雲南道宣慰使兼都元帥今進拜中奉大夫叅知政事行雲南等路中書省次羅合終大名路行軍萬户次小鈐部代兄民職孫三人長教化孝友英發樂問學有藴藉至臨政精覈矯矯有祖風今階正議大夫佩金虎符充大名路緫𬋩府逹魯花赤兼新附軍萬户曰帖木兒敦武校尉固鎮鐡官提舉曰萬奴簉中朝侍從官甞聞活千人者後乃有封公沙州之請何啻千人哉今子孫䋲䋲承世爵而継禄次豈非隂積致然耶旣㐮事之三年嗣侯教化百拜以墓碑來請曰我祖捐舘巳來將二紀于兹曽是表峙神道無顯刻以昭裔昧朝夕惴惴有不遑息者幸憲使惠顧以畢厥志庶圗報遹追之心有以招告存殁大獲慰焉某謝不敏禱愈懇以教孝求忠之義固不得辝謹按所具善狀叙而銘之其辭曰乾龍奮飛天北方潜蛟乗時亦雲驤李公材武邦之良拔身嚮明佐興王西傾崑崙掃河湟有來群后何瀼瀼公從鈐校叅戎行卒能建功出非常天威西収陳堂堂凱歌歸來百戰埸龍泉精英百錬剛試之剸繁尤允當行臺駐燕緫皇綱上計委積如陵岡歛伏雄毅歸賛襄於惟致君變時康我聽我理多捄匡一日問望馳四方醻功便老國有章付之方岳又汝長魏昔建國千里疆德星出昴光煌煌憬彼羣属勢軒昂正名定分我所遑拊摩瘡罷抑豪強百廢具舉用乃張若傳有亭積有倉里不桴警孰竊攘大賁禮殿開兩庠春風絃歌齊魯郷漬民于渊吾憫傷躬督萬民揵隄防濁流不揚耕且桑功餘保障歳屢穰始焉立威肅秋霜終以惠鮮熈春陽民祝公壽福此邦曾不少留我涕滂公雖遽徃有不亡隂積陽報理乃彰子孫嗣封奕葉昌髙牙大纛冝彯揚河流洋洋沙麓蒼是爲元臣衣冠蔵惟德在民乆愈光嗚呼此碑古甘棠大元國故衛輝路監郡塔必公神道碑銘并序皇元天縱神武戡定區夏禁網雖闊鈐制有方曰州府曰司縣廼建官監治於上路則復設緫監一人其位望之隆控壓之重若古方伯刺史在諸王分地許持選掄委之顓任之乆比同封建嗣承丗爵校常調爲重若天寵襲漢貂榮分虎節卓尓良碩之才允濟承宣之羙其生也愛方召父其殁也思逺桐郷者繄我衛輝路都監郡塔必公其人也公諱塔必迷失系出瀚海大族王父府君諱押脫玉倫𥘉太祖聖武皇帝龍飛朔漠合一諸部公扈翊開拓屢樹勲伐授阿不罕部工匠緫管仍佩金符顯考府君諱玉魯忽倫爲人膽勇善騎射早以丗胄爲内侍官歳壬午帝西征有獸扶拔潜嚙御驃上怒合圍大蒐公蹙獸至帝前射而殪之上喜甚錫百馬以旌異自是歴事莊聖太后憲宗皇帝以先朝勲舊爲御前緫執法毎大犒饗衣盛服乗名馬麾纓杖肅官儀周行雲幕殊顯赫也府君生四子公即冡嗣也公姿白晢羙髯而氣幹魁偉膂力絶人長襲父秩出入禁闧親宻無間巳而有言貴近納賂致殷者上命捜索帳橐獨公衣𬒳外廪粟數斛而巳由是廉慎爲上所知已未秋憲輴西陟棄群臣而北明年庚申世祖皇帝北還公倉皇東播迎謁中途上素聞其賢爲頋恤之及登極俾就宿衛至元三禩詔以衛封皇姪玉隆荅失爲采邑陞州而路遂輟公來監治旣下車以衛壤𥚹狹路郊衝㑹使軺營帳騷屑無時不力爲撫養遺黎保障一切恐靡然無復綱紀僨瘠豚上如淇控北徼無所附麗公請於朝來隷分辨主宰汔民勞爲多由是衛以三州五縣列河朔劇鎮明年諸王秃忽魯南征道出淇右供頓儲偫至駭民聽公逺迓啓其故下教申嚴衆歛迹而過輝營帳千屯分牧共西夏則避炎潞頂冬則迎燠山陽踐食村落輘轢州縣有不勝其撓者蓋十年于兹公落其機牙來就約束輝民殖園竹仰供賦稅監司掩之入官少有犯民即破産抵養民之道公上奏力陳利害竟還民産劉數夥徴甚急雖破産莫克償公憫其數不虧爲申理之得免釋惠孔子廟兵後廢撤不復者五十載公首議修建解二驂馬輟俸稍兩月以佐費旣迄工壯麗甲諸郡釋菜告朔文物煌煌其蹶厥民彛思樂泮水貽謀後來有深意存焉者六年入奏膚功上喜甚以憲宗嬪賜之金玉鞶帶上駟雪鶻副焉七年河朔大蝗衛獨不爲災識者謂德政所致其秋料民爲兵甲衣需紬製之市闕民不易得公命以繒代敕使以乏軍興不可曰脫有悞我則任之民頼省便八年夏四月入覲得疾上命皇姪阿速䚟同尚醫來視以六月十有三日薨於上都寓舘得年三十有九訃聞上嗟惜者乆之遣使護䘮南歸葬汲縣西郭清水之曲公姿剛毅嚴明事上忠奉毋孝平居寡言笑凛不可犯及與僚吏共事有量知體通議論樂從善無一毫自用之私要以愛養民力成就王事爲亟知緫尹陳公祐之賢敬讓歡洽與其施設至事閧興除人莫措手者即任其責不自頋惜晨起坐堂上吏抱成牘鳬進公詢尹云何曰得即署及朝士貴種譯語䦨翻辯論請索関不可支者不動聲色徐以數語應之即聽决而去退食鈴閣下侍立不三數人門庭肅然杜絶私謁當時政令修舉豪強歛迹賦役均簡俗興禮譲河淇間民物雍熈風化大行皆由公處之以公廉揵之以勤強鎮之以安静有以致也時移事昜人亡政存三十年間人物有渺然之嘆論者謂仁者當得其壽積善常與其報公位不滿徳夀未遐齡天之報施果何如哉予曰不然賢者必有其後一世之短百丗之長存焉天道可必至子孫而後定者審矣夫人月匊氏姿淑婉亦瀚海名家後公十七年卒祔安玄堂子一人即今嗣侯塔失帖木兒女四人長夭次適輝長玉失乃次適汲尹也先不花次適工匠府經歴小云失不花孫二人曰不顔帖木兒曰脫忽帖木兒女孫一曰不顔的斤𥘉公薨嗣侯甫三歳後二載太夫人挈之謁皇姪阿速歹令舉頭視日曰嘉肖其父仍撫背謂曰汝蚤成立當継先業旣冠從叔父懷逺覲丗祖皇帝詔侍湯液扈東征有勞績至元二十五年命襲爵官懷逺大將軍材識明敏臨事善裁决止酒十年讀書無倦秉志挺特有過人者祗遹先志儷蹤時彦蔚然以賢師帥称佳聲載路逹於天朝蒙賜府第一區賢王亦以錦衣玉帶白金爲賚大德改號歳冬十一月以書幣走京師請於某曰孤子無所肖似尚頼先人遺澤猥嗣爵位朝夕惴惴以圗報爲亟惟是揄揚先羙昭示永乆庶幾少有慰焉敢百拜以銘章爲請追惟先郡公交㝡乆知行巳爲詳義有不得辭者謹按善狀系而銘之銘曰金天瀚海包元精斗極通貫氣上蒸地靈人傑古所稱篤生丗賢爲國楨爰有真人𧺫朔庭風雲儷景争騫騰維公家丗開五城執掌天憲昭儀形帝前盛服麾仗纓雲幕萬士羅天星肅焉約束一氣凝日華光動劒佩鏗渥洼神駿天池鵬維藩采邑啓衛埛其徃視師汝則能衛維小邦勢孤撑民屎事劇力莫勝興滯𥙷罅湏力行繭絲保障事匪輕今則致理宜合并與善知體政大經兹焉吾分非自京坐鎮政有公而清暴強歛跡民敉寕學校修舉禮讓興吏畏民愛化大弘紫庭入秦報政成賜金増秩循固應嬪以天御何寵筞蝗不爲災嵗屢登民沐膏澤如幪帡願公福壽川方増一夕星殞瞠有聲素旂南下風冥冥民失怗恃疇卑矜昔歌且舞今涕零臧孫有後事可徴嗣侯善述德日馨豐碑墮淚勒我銘大書丗篤忠與貞懷我風愛爲丗程龜麟漠漠秋煙生衞人户祝公之靈桐郷丗祀何千齡大元中奉大夫叅知政事稷山姚氏先德碑銘至元改號之五載秋七月憲臺肇建于以配肅天德用昭太微執法之象詔平章政事塔察公爲御史大夫其裏行十有二人就舉所知以充貟數某亦忝簉力列始識姚矦君祥於肅政堂爲人蠭閎有膽氣勇於必爲以功名自憙尋膺才選由本臺架閣授監察御史朱衣白簡意躍如也時朝廷方勵精圗治思聞讜議振折骫骳倔彊之氣君祥一旦責與志合義激于衷殆以與事閧者甞與柄臣庭辨得失摧姦發伏見於聲色不少假借彼情露氣禠落其機牙上爲動容嘉其峭直因目之爲巴兒思國語謂其不畏強禦威猛猶虎然且喻之曰爾後有違太祖聖訓及干朕之紀綱者許令直逹罄所願言由是臺閣生風士論有埋輪都亭膽落金吾之目故四仕風憲入長秋官再尹大府皆著能聲遂進拜中奉大夫叅知政事因不自遑暇曰愚忠朴直効用何有致茲貴顯追念先考讀書遯丗不一見於用潜德融光流慶後人欲報之德昊蒼罔極有求銘太史光賁泉穸霜露之感庶幾少慰遂以銘章來請自惟君與不肖早以義交友愛之情寔深孔懷况乆要不忘其敢以不敏辝謹按東雍之姚系出唐宰相文貞公遐裔逺祖伯禄甞任絳州觀察判官卒葬属縣稷山之南陽里子孫因占藉爲邑人今姚其氏者尚餘七十家雖莫克昭穆要之同出一袒風聲氣習猶可識也君祥大父以祖竁艱於溝合别起新仟於嘉禾之北原父韓某生十有八值金季搶攘家業蕩盡孑然以孤童子流寓代之鴈門鄉貢進士趙公愛其姿性温克舘之為門倩其先素以方技行府君㓜傳家學或勸售其術以資生事曰利者人所共趍其如不可何毉重事人命死生繫焉今以餬口計措不精之術於其間寕寒莩死義之所不敢爲也聞者爲歎息遂安貧處分以闡庠爲業終身不昜非道一介不取與於人單瓢屢空進修之志不少輟由是逺迩矜式以師儒推重之及二子稍長甞庭訓曰聖賢千言萬語牖人於善以要領而論不過忠孝兩端而巳汝䓁其勉旃異時立身成人恐不外是壽五十有八以疾終于代遺嘱天福䓁起宗顯親歸葬先壟爲切配趙氏治家清嚴教子孫有法君祥𥘉拜御史戒之曰古稱公尔忘私汝旣委質而臣當罄殫一心黽勉所事勿以未亾人爲䘏俾吾追蹤陵母死之日猶生之年也君祥亦請於憲府監察責當言路有犯無隠儻因事獲譴乞不親累或以奏聞上爲稱之曰巴兒思母子雖生兹丗其義烈之言當於古人中求之命侍臣董文忠傳㫖翰林院特書其事光昭簡冊由是夫人賢淑聞於時元貞元年十有二月晦考終牖下享年八十有七生二子長曰天福即中奉君次曰天禄終和衆縣簿男孫四人女孫二君祥之子曰祖舜終秘書監著作郎曰和尚未名女二俱適華族天禄之子燕山馿速不歹先是君祥緫尹平陽絳即属郡封樹墳劵凢儀制之得爲者略皆備具及母夫人之䘮方尹真定即棄官奔赴爰奉二親祔之玄瘞旣償先志適展孝思維姚氏自文貞公巳來歴唐訖今餘五百歳彯纓若綬代不乏人逮鴈門府君遭罹丗故家業中㐮復能積德絫行躬不受祉遺之子孫中奉君承丗德之清源浚之以蠲㓗而端其本采群言之枝葉滋之以茂實而循其能冝乎起身韋布致位卿相爲連爲率勵薄俗而振清標也是冝銘銘曰岷山導江彂源濫觴豫樟蔽空起於毫􅉭士貴尚志再丗而昌天道於赫孰爲茫茫東雍之姚系開鉅唐盛衰靡常善焉降祥繄鴈門君源濬流長不饗其報後祉曷量生丈夫子訓以義方一朝奮飛大我門墻峨峨豸冠振朝之綱摧姦彂伏耻後趙張嬰鱗上諌屢皂其囊精誠耿耿洞逹帝傍以虎喻猛奬其忠良游刃恢恢槃錯莫當外臺雄峻搏擊翺翔羣狐闖穴一鶚撗霜風動百城孰爲暴強遂叅大政庸極寵章豈曰子能先代之光追報無及有事顯揚豐碑掲嶪勒銘煌煌惟孝移忠惟忠孝彰孝継忠傳大渢泱泱子孫訓之昭示不忘
