front:
  text: 秋澗先生大全文集卷九十九玉堂嘉話卷之七䘮服小記别子爲祖継别為宗継禰者為小宗有五世而遷之宗宗其継髙祖者也是故祖迁于上宗昜于下尊祖故敬宗敬宗所以尊祖禰也大傳曰别子為祖継别爲宗継禰者爲小宗有百世不迁之宗有五世則迁之宗百世不迁者别子之後也宗其継别子之所自出者百世不迁者也宗其継髙祖者五世則迁者也
  hash: sha256:15a7ca78a851ef20a74d0be159b22e8b716c1086a2fa3776cfbb6417fc147849
