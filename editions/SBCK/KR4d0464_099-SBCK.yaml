body:
  text: 禰継禰小宗小宗禰継禰小宗小宗小宗禰継禰小宗小宗小宗禰継禰小宗小宗小宗别子継别爲祖爲宗大宗大宗大宗大宗諸侯継世之君君君君君君陳氏禮書云公子不得禰先君故爲别子而継別者族人宗之爲大宗遠雖至於絕属猶爲之服㐮三月庶子不得祭祖故諸兄弟宗之為小宗以其服服之大宗逺祖之正體則一而巳小宗髙祖之正軆其别有四則継禰者兄弟宗之継祖者從兄弟宗之継曽祖者從祖兄弟宗之継髙祖者從曽祖兄弟宗之四世親盡属絶而不爲宗矣然言継别爲宗又言継别子之所自出者言継禰爲小宗又言宗其継髙祖者則継别子者子之子也继别子之所自出者即别子也継禰者庻子之子継髙祖者五世之孫也継禰言其始継高祖言其終継别言其宗継别子之所自出言其祖經言継别子之所自出頴逹言别子之所由出然則别子所由出即國吾也其可宗乎壐衛宏漢書舊儀曰壐白玉蝺虎紐文曰皇帝行璽天子信壐凡六又曰諸矦玉印黃金槖駞紐文亦曰璽列矦黃金印􅀛紐文曰印丞相將軍黃金􅀛紐文曰章中二千石銀印􅀛紐文曰章千石六百石四百石銅印鼻紐文曰印孫堅得傳國璽方圍四寸上紐盤五龍然則漢天子之璽其方不過四寸諸侯王巳下其小可知􅁟牛制義月令季冬命有司出􅁟牛以送寒氣正義曰出猶作也丑爲牛牛可牽止也送猶畢也其月建丑又土能尅氷特水之隂氣故時作􅁟牛以畢送寒氣也􅁟勝水故可以勝寒又且以升陽唐月令季冬出􅁟牛以示農耕之早晚􅀂立春在十二月望則䇿牛人近前示其農早立春在十二月晦及正月朔則策牛人當中示其農平立春近正月望則䇿牛近後示其農晩也後漢志季冬作􅁟牛六頭於國都郡縣城外五地其牛色以歳之幹色爲首甲乙木其色青丙丁大其色赤戊已土其色黄庚辛金其色白壬癸水其色黒以支色爲身寅夘水其色青巳午火其色赤申酉金其色白亥子水其色黑辰戍丑未其色黄納音色爲腹􅀂甲子乙丑金其色白丙寅丁夘火其色赤他皆倣此以立春日幹色爲角耳尾支色爲脛納音色爲蹄設令甲子歳甲爲干其色青則青爲牛首子爲文其色黒則黒爲身納音金其色白則白爲腹又􅀂丙寅日立春丙爲干其色赤則赤爲角耳尾寅爲支其色青則青爲脛納音火其色赤赤爲蹄九州釋義兖州兖信也五行星流而爲兖豫州豫舒也又序也言隂陽分布各得其序荆州荆􅆠也陽盛物堅其氣急冀州兾近也爾雅云河两間曰兾青州元命苞曰虚危星精流而爲青雍州雍壅也唐地紀曰雍兼得梁州之地西北位陽所不及隂氣雍遏故取名焉益州益謂溢也徐舒也楊輕也鍾山徐爰曰建康北十餘里有鍾山漢末金陵尉蔣子文討賊戰亡靈發于山因立蔣侯祠故丗號蔣山神赤縣張衡靈憲圖曰崑崙東南有赤縣之州風雨有時寒暑有節苟非此土南則多暑北則多寒東則多隂故聖王不處焉史記鄒衍曰中國於天下八十一分居其一分耳中國名赤縣赤縣内自有九州禹之叙九州是也不得爲州數中國外如赤縣州者又有九乃謂九州也有神海環之如一區中者乃爲一州也如是者九乃有大瀛海環其外天地之際焉三川河洛伊也司馬光言行録有司奏言日當食光言食不滿分或京師不見皆賀臣以爲日食四方見而京師獨不見天意人君爲隂邪所蔽天下皆知而朝廷獨不知其爲災當益皆不當賀詔從之後以為常漢宫中有宣室武臺召文臣則於宣室召武臣則於武臺春夏秋各釋義禮鄉飲酒云春之為言蠢也産万物者聖也夏之爲言假也養之長之假之仁也秋之為言愁也愁之以時察守義者也冬之為言中也中者藏也天地嚴凝之氣始於西南而盛於西北此天地尊嚴之義氣也温厚之氣始於東北而盛於東南此天地盛德之仁氣也按地志今衛州城即殷牧野之地周武王伐紂築也又云武王至於商郊牧野乃築此城􅀕説唐韋彤議曰􅀕非外至生于心者也是故聖人等牲牢布􅇼豆昆䖝草木可薦者莫不咸在所以享宗廟交神明而全孝敬也遺山嘗與張噥齋論文見有竊用前人辝意而復加雌黃者遺山曰旣盗其物又傷事主可乎一坐爲絶倒噥即張緯文先生盖遺山戲語也嘗有詩云因君􅀉謝噥齋老道我今年二十七作論法鹿庵云語與義體式一殷亦是冐原講證結但論入作獨句直下不佀義两句扇對而入如麻先生漢書貫五經論㝡明白得體金清漳老人南宫人曽撰本縣二閬神廟碑遺山見之謂進士張和之有讀得行之語光武同馮異遇雨燎衣處在今南宫東北二十里馮村内外制翰林學士所撰者爲内制中書舎人定撰者爲外制金哀宗朝有親軍殺其子者法家断不至死上曰親軍宿衛之人父子之間殘忍如此與常人不同竟坐死論徐大卿云詔命之體莫如两漢以其典實故也餘則何恤又大卿等論及子告母事孟德卿有荘公文姜之説徳公主義重於母李侍講説中和真人在龍庭時以瞻對無時恒備物以充咀嚼時一士人同在邸舎師毎與之分甘一日師復求之彼辭無有託便族食焉師知之因曰沙漠之羊與中􅁟桑用略同肉充飢毛作氊皮為裘角為柸匜此人所共知不憶近來羊尿又何以配餅食也聞者爲大􅀏彼徐悟其方已甚有愧色楊勸農春卿夜讀書有䑕出躍書机上忽投膏􅼺中揚子取一方木覆之隨突以出環書􅁽走不輟作人語曰油着油着揚􅀏起曰吾避汝燕城閣前晌午市合更忙猝不能過即擎虚噐云油着油着人即開避故䑕亦云云聞者為􅀏徒單侍講説石丞相琚大定末致仕居郷中一日㑹客間聞司録呵喝過門公即起立旣逺復位客曰丞相何􅀂此公曰參軍雖㣲國家命官也吾敢不敬衆客爲嘆息丞相字子羙中山人王西溪嘗云表章體目無居首之理故今之表式皆以帝㫖冠首王西溪云元遺山録􅁽中云東平范尊師庵内見化飯王先生說渠海州爲吏時歳貢糟薑糟蟹海棠出州東入海八百里峡島島是龍宫地生海棠作矮樹花色􅀷紅大如茶盌面而百葉香韻殊絶開時可持一月乆既衰不落而萎毎歳自島中移百本入海州御園明年􅂯移百本而以先所種者供衘毎花一金籖牌記之脚花乃得入州官民家毎一花必三葉承之重九開鹿庵先生爲學士日命􅀿奉編修軰取金實録内各臣事蹟欲集爲長編俾士大夫家易於􅀚録或問其去取法曰大抵人之功勞必須具載如西漢曹參樊噲傳此其例也又曰西漢列傳是多少好墓誌碑銘格様學之有餘師矣旣而侍講某多畧之其人勲効鹿庵聞之曰某不觧此平日於書多謾讀過去了秋澗先生大全文集卷九十九
