  text: 秋澗先生大全文集卷第二
  hash: sha256:2a05e0b95397a1cdebf3e5158ba332988ed1f6455f57a67c221c5f1cfcd37dba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_002-1a}
body:
  text: 五言古詩拜奠魯文憲王廟二十八韻丕承固云烈嗣王㓜而冲嬉戯剪桐事安知多難衝公乎居斯時岌岌遵渚鴻外謗流四國内疑叢一躬􅀒扆令百辟天心昭懿忠想當假􅄰際夤亮天地工陳誥開治源奠遷營洛宫南服静海波東征殄元凶􅄍握下白屋憲章沃淵􅇆罄單一徳聖思兼三王功及夫就臣位畏眘何匔匔制作萬萬古丗道仍汙隆至今豐鎬間凛有三代風饗以宫縣樂報之不為豐宣父稱大哲窹􅄰雲從龍垂老無復夢慨焉吾道窮丹青見遺像皜皜日在空臣子知所止仰之餘敬㳟悠悠蒼􅁎下輔相業不同論思機務地典調簿書叢豈其世務棼經權有違從頋惟大臣體一節貴始終伊公狼狽間不失體與容几几兩赤舄儼立如岱宗我甞集衆羙一言蔽其中至公絶貪􅀻廓與天人通作詩庻􅀘衮九章一華蟲精誠有來格寒雲動􅀛䝉拜奠宣聖林墓庭訓堕渺茫師授悖嚴誡羗予不惑年行已得夷隘今歳客東魯佀爲神所介駕言逐秋風得展闕里拜遥遥魯甸餘汶水走湍瀬憑軾望雲林欝欝佳氣靉齊莊趍兩楹奠献成􅀌酹巋然三聖封仰止高泰岱恨生千年後今夕備掃洒披雲覩天日太極開一畫彼蒼詎能言諄諄聖爲代三綱與九法範圍無内外君臣以之定乾坤以之泰東周不可為述作萬世頼藐聆徇鐸音元化雷雨觧敬想燕居容金聲鏘玉佩當時七十子授受儼如待鳯􅀆鳴㡬時諸子沸秋籟一朱亂紅紫百榖茷稊稗愚者甘下逹誕者樂語怪韞藏寳康瓠幹棄清廟鼐明倫得不泯而有六經在天髙孰可階一氣包厚載兹遊固難言嘿契心有㑹胷中九雲夢吞納失蔕芥循循善誘辝師也書諸帶􅃡懐伯禽業郁郁文献㝡三桓張公室覇功熾而忲一奢去無復荒陵餘石獬煌煌天乙孫膚敏半冠蓋徳愽慶自修道大世能邁金尼貫元精泗波來逺􅂀汪濊一聖海不随梁木壊歸侍金絲堂攝齊聞謦欬怳如到帝所鈞天廣樂備洗我兩耳聦肉味忘一嘬詠歸冩遺音風雅變鄘邶一簞老東家吾知其樂大遅遅不忍去寒日下蒼檜陪緫管陳公肇祀商少師比干廟元化形萬彚浩浩無時無云何忠貞氣大􅂌先生軀念昔有殷季天歩移獨夫滛酗蕩祀典下民為毒痡所崇盡奸回唘遯箕子奴師保乃云爾餘敢編其􅂡炎炎鹿䑓火巳兆明珠􅃭先生豈不知蔓草不可圖顧親叔父尊以位仍三􅀌強諌誠我任剖心不為瘉自靖暨殺身要之宗社扶所以宣父筆三仁同一途繄公存亡間所係重有殊堂堂柱天手能摯火徳烏當時戡􅀺兵所侵良及膚周雖彼蒼眷加翼十亂謨天其諌少行終鄙西人居稱師止觀政安取商郊車一朝嘆云亡宗國隨之墟丹誠皎白日餘烈光八區凖爾來代臣大節知所趍嗚呼介士嘆萬萬狂童且今來二千載殷周兩榛蕪巍然一丘土髙與西山俱清霜九月節肇祀陪干􅒅肅拜列階下精爽動佩􅅂世道有淪䘮一忠千萬謏啇歌振林樾日下悲風徂擬韓子秋懷十一首出郭行時稼秋風正薿薿臨川閱逝波浩浩去不巳富貴來幾時及此行樂耳把酒對西山坐看秋雲起夭矯化蛇龍異狀紛莫似世態初不殊儻來安可恃我懷拔俗標干霄仰逸􅁤酒酣歌嗚嗚振衣􅀻自喜秋風拂庭柯物意自含悴松栢抱貞心表表歳寒地長年豈􅃱飬易衰匪自恣浩浩一氣中所禀蓋殊異人􅀹物之靈要以天爵貴天運徤息君子戒靡曼讀書下硬塞肌腸􅂶藿飯造道苦不深紛華非所願秋風動黄鵠千里奚足嘆風濤北溟鯤變化摶九萬大􅀖易為仁郁都文献半出處貴有時莫遣夜鶴怨􅄃衣起秋早露氣清凌凌偶書秋懷篇悮筆成蒼蠅吾言固不佞未免人屡憎聖域有坦途學歩髙山陵尋源有靈槎臨池弄鮋罾我生恐不偶鄙事從多能虚室生夜白清露發鶴警空庭海月上愛此良夕永今年苦煩歊似值苛政猛盻盻秋風來汲深持短綆庭菊􅀍焚燎脱禍乃差幸朝來有佳色一􅀏􅀝軒屏露叢低寒花促織泣暮景呼兒􅜣群書趂此秋日烱㢢帚享千金利途競纎梗二者昧所思厥病失坐騁既悟前日非敢事子淵請長夜苦漫漫長空星斗暗啇歌南山翁遺佚有餘憾秪知享髙明曽何恤􅀑瞰而我獨於世滋味嚼蠟淡畏途足風波汹汹洪水濫濯足尚云可浣纓豈冝暫此身矧虚舟敢不慎蕳䌫天心幸􅀻我書史日與勘庶還浩浩天未害家儲甔殘暑不肯退秋陽麗庭軒静觀消長理警此􅀊月奔成功嘿嘿去天道何曽言歛衣坐一室書帙散我前開卷飫至味忘却盤中飡最爱歸去辝雋嚼了一篇作者古不少文字浩万千感君固窮節當年亦辛酸遥持酒一瓢同醉東籬􅁁九原不可作念之終􅀊年青竹不耐暑索寞衆葉乾白露下天宇洗此青琅玕風枝簌餘􅃳暗滿佳菊團依依南飛鵲遶枝擇所安感時賦秋懐古井翻晴瀾我生分已定安用智走丸出門安所之呼兒觧征鞍閉門秋月上静院圍䖝聲幽人掩䆫卧一室翻虚明四序倐以周代謝何其誠物華有盛衰天地從虚盈君子順所履持身嚴五兵牛羊旦旦伐山木何以榮所慎獨處際心蕩韓盧令􅄐􅄐壠上禾望望日攸好不勤耘耔功秀實苦不早西風卷黄雲􅀵穫走隣保荒田棄足惜揠之速其槁致役貴厥􅀄無為宋人道九日和淵明詩韻九日天氣好淡遊無友生懐哉曠逹士愛此佳節名野逈秋山髙逺目増􅀟明手把霜菊枝吟泛風葉聲人生天地間強矯無百齡􅀊月不我與大川日東傾且酌一尊酒遺彼五鼎榮滿挹風露香陶我醉後情遇坎且復止吾器期晚成今􅀊莭序晚天氣秋夏交衰草伴佳菊藉暖亦後凋居閑愛莭物不辝逺升髙川澄􅆂鴈影空曠曖㣲霄舉觴酹時人塵坌乃爾勞中間百憂集􅀛卜將日焦何如遺世士空杯樂亦陶得酒且歡喜誰能保来朝寒雀歎閑庭有遺粒寒雀徃還飛眄睐傍無人翔集下踈籬一啄復三顧慮為物所闚幽人􅀒暄坐玩之淡忘機一􅀏拂衣起群驚向空歸因之感吾生分外非所期富貴倘僥倖何殊鳥驚疑吾儕以義榮先賢有良規觀葬者有感走筆為賦西鄰送喪車前後餘百人少壯亦歔欷老大尤悲辛殯歸焄蒿里奄忽随沙塵逝者長悠悠魄散還蒼旻存者但追悼簠簋時空陳人生天地間變化朝􅌲新㝠㝠夜䑓下念之傷心神大限百􅀊止憂喜還相因况且不滿百忍使憂纒身青春不再至􅀊月波注輪有釀不来飲􅀒此頭上巾自喻吾性􅂴且拙置書未嘗觀興来一披讀暫涉意已闌因傷中道畫勉力鞭使前柰彼外物誘既徃輙復還年来天與幸􅓎當凾文間朝昏迫童課未免親書編開緘三嘆息知學今十年雖傳失自習所得亦以偏正如乗跛馬十歩九躓顛引領望聖域尺綆汲文泉有時尋墜緒意㑹亦愜然務敏修乃来自棄誠可憐譬彼執銚鎒緩治榛蕪田縱弗曰敞熟猶愈埋荒煙進進乆不輟功豈止百㕓九原雖不復聖道具蹄筌堯舜等人耳悉自學至焉從兹自發藥浩浩還吾天改葬冥漠君買樹植中唐下􅓩得髐骨生世何爲者何年此埋没周身瓦作棺上有刼􅁅覆黄泥滿髑髏麥枕餘故物神竒到腐朽貴賤辨無復惻然戒僮僕掇拾百骸足徹我床上簀包褁葬城隩遣奠酒一杯􅀕汝一盂餗同區三十年今始改兆卜死者謂有知夢􅄰不一嘱幽沉起有時掩骼適春燠豈復識此為庶慰我心曲不無攓􅅾嘆何必桃茢祓免汝踐辱羞我豈徼􅄀福長眠一抔土野􅀕霑䞉馥莫羡麒麟􅊘發掘為珠櫝自買身後禍安用髙􅊳兀去去􅁳漠君九原春草緑青青兩桐樹示兒子阿孺青青兩桐樹乞自幽人居植我庭堦下護飬嬰孩如汲水時一溉要令地脉濡起架障炎曦挿籬周四隅眄柯日怡顔手把種樹書及夫始華月春芽茁蒼珠朝来秀色發衆葉卷且舒終朝三摩挲愛此青王株亭亭一尺影翠蓋遮門廬嗟爾琴瑟材中與霜籟俱逹哉蔡中郎救爾煨燼餘我望十年後直榦凌碧虚秋聲泛韶濩雲表来鵷鶵且天生萬物因材而篤諸栽者厚其生傾者不尔扶譬彼青衿子致飬在厥􅀄必擴心與志母適尺寸膚然有才不才學焉因爾殊緬懐孟軻訓書以示阿奴鹿喻我本麋鹿性出處安自然金鑣非所慕志在長林煙得逺機穽地食苹飲清泉􅊯鳴錫同􅀋甘以辝華軒野兕出其側暗蹂山前田農家伺所害乃知獸之愆彼兕以計去嘉禾歳芉芉野人居山中數畒事墾􅷣慮為町疃􅂣指鹿乃兕屬雖無擉刃心見之惡且逐鹿心素無機淡與標枝閑遁跡入幽谷擇音逺人寰尚為山中人置疑齒頰間送宋大使漢臣之任延安四海王翰林髙情比雲月一甌宻雲籠過門誰復啜宋君平生交矯矯峻風莭况經患難間邂逅叙闊契毎来倒屣迎所請無不􅀃賦詩近盈軸沽酒慰乆客都門冠蓋􅂣聲華愈昭晣我􅀄識君面論交心莫逆相看自淇水燕地最多日吟鞍賞春華茶鐺煑晴雪劇談挾銳槊洞逹失堅壁兹焉一載強相從復相覔喜聞得新除腰金出省闥烏臺退食歸入户屐齒折朝来髙軒過打門欣告别情親近中年何啻數日惡天涯兩淪落歳暮悲風發人生㡬河梁底物慰愁結觴君病不能贈言素所拙君矦天下士抱􅀒􅀴丗業鞭筭致錢流論吐究時瘼吾子兩餘􅁉它人􅀟落寞黄鵠志千里秋天擬横絶誰能雜鳬鴈羣飛争飢啄兹行固非傃歸愈垂空槖儘新僮僕敬大慰妻子色延安西北秦地與羗渾接王民六十載厥賦尚寡弱保障慮不遑徴収肯騷削緑樹空野煙山澤入籠絡秦風與隴月􅃤悴自兹作􅁁氓靖為重聚歛聖所怍臨淵得河潤當念逺井渇得書下下考吾子亦云樂我詩春秋法責備賢與􅈒此心能不爽蓬華乃麟閣不煩􅀟鯉魚時遣慰􅄐索溪田暮歸踈林煙火㣲草露濕芒屩遲遲歸路長清月掛林杪依依南飛鵲㡬囬驚且繞一枝幸得安誰復睇雲表田家固作苦遺安子孫寳彭澤百日令觧紱徑歸老我心黙有契縻爵豈不好違巳病交攻飢凍止枯槁躬耕南澗垂浩歌槃樂考散歩清溪湄散歩清溪湄林飱憶鮮食沙頭有漁梁呼童樂閑逸波清滿遊鯈鬚鬣分纎悉雖㣲知所避矰之不可得悠然逐風漪相忘萍藻宻逹人濠上樂政自觀其適人生風埃中與爾何差别區區一巳私奔走抵溟極萬事恐偶然胡為較得失舉網出深淵髙樹掛㝠色長􅀏歸去来吾道無固必讀林和靖詩集枯梢振驚飊茅齋寒日短幽懐乆不樂訪友橋南館探囊得逋集塵臆欣一浣賡歌竟遺編佳處時再欵先生玄豹姿清風滿朝簡仿像詩骨清雲嶺松雪偃湖光與山緑几席供竒産呼吸貯肝脾无氣筆下綰逸情薄雲月幽律發葭管静觀周物靈逺覧豁􅁭散清遺郊島寒淡入陶韋坦孤山富梅竹香動春江暖篇中㡬致意似慰平生眼客来佳話餘横琴浮茗椀是中有真趣風味亦不淺廬洛與寺閤意適欲忘返長空渺􅀌鶴容與歸舟晚如斯六十春􅀏傲一何衎相去羲皇間不到牛鳴逺暮歸􅀝䆫眠清興江湖滿雋来愜􅀄心有味叅玉版燈花喜共妍一􅀏成㣲莞人生無百􅀊胡為日憂懣􅅰􅅰聲塵中任事同蝜蝂西溪始泛同王子􅀄訪王柔克自此多經遺山先生􅀧竄閑人無所適心向静境趨今日欣有得快如脫籠拘歩岀郭西門偶與佳友俱舎杖棹清溪忘授圯上書舟輕風浪平泛􅀂乗流鳬波光灔舡頭雲隂翳平蕪畸人驚見之輟耕立河淤白鳥去不逺前飛如導予故人喜我至就舡與相娯呼童下泝流載入酒滿壷促􅂰兩舷間鰕䖝雜肴䟽吟杯斟且停要看傍岸漁從下恐忘返欲上意轉徐瞪目看銀刀不知寒日晡纎鱗竟莫􅀗豈謂吾網踈顧此一溝水安取松江鱸舟人云不爾近多狡獪徒散毒河伯宫掇取地芥如卵毀鳯不至禁􅅈自有餘釣綱詎可並况乃詭計圖射利一至此丗途足﨑嶇歸時還一􅀏兩岸風生蒲擬古北山介公壽也公之德澤及物如山之蓄殖焉是宜得厥位而享其壽也故作是詩以頌焉瞻彼北山維石嵳嵳􅀖民仰止匪丘匪阿既峻而極復委而佗元氣中宰所蕃實多維公之德如山而峩瞻彼北泉維彪于垠淵淵其源浩浩其春澄之弗徹撓之莫渾潤餘一方波彼四隣維公之澤如泉之新瞻彼北山有松桓桓氣榦千尺盡􅀊之寒揀樑大厦是依是安未皇厥用心怡體胖羙䕃所庇物為一天匪惟蔦蘿有蕭有蘭受德匪報茅菅厚顔維公之壽如松之年北山三章二章二十句一章十六句過劉元海􅁜寢漢統天乆絶漢恩一何深隔逺魏􅀳代猶足収民心咄嗟呼韓子崛起蒲離隂自云漢婿甥赫怒開實沈左顧龍在野右咤虎嘨林吹嘘炎燼餘五部来謳吟阿聦􅁬餘烈兩京随掃平竊據二紀強文物有足矜我來拜􅁜寢悚然振冠纓風雲渺何許廢蝶餘金城賢哉劉淑妃成此直諌名在聦未為疵假義渊可稱孰云仁義師可敵不可征桓桓祁山舉一出三輔驚天其假公年載洗六合清此志竟莫遂此􅀖還有成所以廣武嘆痛惜無豪英山煙知客意斜日生荒陵遊萬固寺中條欎蒼蒼首尾固雄大連山一卧虎矯首盡兩戒東南万峪門犖确入幽阨空青上􅅸壁嶻嶪兩崖對南山開畫幈髙下蔚萬檜扶藜到山門黄衣六七輩寺殘薄心賞一水良可爱尋源入雲蘿不惜阮屐敗掬飲清臆塵坐睨巨石恠山空響佩環林逈騰怒獬行聽溪聲回周覧詢勝槩當年爽心亭萬竹争映帶碧鮮照清泚􅁭􅃑濯沆瀣人境兩渺茫佳句儘誇邁舊有石刻坡詩云水自竹根流出風從松頂飄來座上侭為佳士更無一􅀧塵埃開軒邀客飯放目欣一快盤餐固踈糲泉冽㡬肉嘬少焉林風振萬壑一氣噫前林疑虎嘨作勇􅂇吾憊筆落還自驚一掃衆􅈐爱寺僧請書殿雲閣名故云山僧喜醉顛海㑹得珠具興來本無心游戯詫佛界夕陽送歸鞍依約虎谿外風煙作破墨塔廟失所在鍾英厭摹寫閟伏化機藹盤空乏硬語技癢苦無頼馬首詩遽成一􅀏豁吾隘静樂堂人生霄壤間動静藏妙用一為外物遷舉足非禮動惟夫操存人而與天理共紛紜萬變来一一皆折􅂨問之果何因性定心自統心宰物随化奚俟人指縱體安氣静徐内􅀬失急閧兹焉須􅁷􅄐不啻天地雺梁君出豪右表表聳儀鳯意氣杯酒間談􅀏百金重一旦刮餘習紛華不復夢省躬日有得守約還自諷霜餘波自澄雨退雲知洞復我浩浩天多言譏屢中客來掩書坐香動玻璃甕融然一室中萬象入持控知君樂無涯五絃歌雅頌舜泉在河中府南三十里夏陽村東歷山聖人嶺下舜峪内至元壬申冬十二月十四日来遊舎鞍夏陽西褰裳躡雲頂盤折下濬溝失身堕幽阱孤松突危巔望望􅀟目烱不圖兩芒屨踐迹聖人嶺重華不復返欽此孝慕炳降觀臨帝泉冠珮為肅整泓澄一勺多浩若淵水逈彷徉不忍去杯飲濯􅎞梗慨焉念髙風㓕没翻倒景野人前致辝此事􅀓􅀊永有鰥昔在㣲怒為瞽所屏窮歸此来田號泣痛自省空山無所得扶耒子􅀌影彼蒼彰聖誠暍餒恐成眚一夕两崖間二水出俄頃北崖縈帶流南壑湛寒井至今山中人飲食了二頃我生千載后懐古心耿耿風俗日淪喪道義奚所秉安得天瓢手挹此霜露等千林摧姦枿比屋化封頴滌易臣子心骫骳變骨鯁暮歸田舎眠有志安得騁此心恐末能作詩聊自儆且當就岩蕨酌水煑殷鼎䟦席懐逺臨終語録人當易簀際發言罔不善昏矇迷本真狂者渉誕幻徛嗟席懐逺洞徹生死變日氣薄西山皦乎天理見諄諄忠孝言垂戒漢馬援洒然明月懐身後照郷縣賡歌諸賢詩清風一家傳録老農語揚曲道中作老翁揭溝水駐馬待樹閒􅀟脛怯朝渉欹傾激衝湍既濟問老翁荷鋤何所還䈥力一何弱甲子今幾焉歛手前致辝星紀凡七旋有妻喪已乆有子病且殘舉家無營業止有田一㕓禾生迷東西老雨荒草芉耘鋤庶有穫聊以卒歳年饘粥乃余事要輸包垜錢有身古當復以老聖所安二者不䏻必聞之鼻為酸我食爾所粒作詩告京官呉大使子明致樂堂人生有至樂榮貴了不干人子有至飬三牲非所先宣父語􅀴訓承顔首為難南陔著深戒不獨馨盤餐眷戀庭闈心朝夕靡遑安問寢與侍膳樂在融融間所以極愛敬要罄平生懽呉君出紈綺孝純思力殫垂領髪已素娱親衣尚斑天意亦有在一官仕郷􅀜稱觴歳上壽香火欣團欒此身不願貴有家從苟完願親日康寧丰容紫庭蘭毫彩神與相慈顔渥而丹婺光藹萱室嬰香芬珮環壼族化柔懿周南詠幽閑髙堂敞温清題扁存鑑觀致樂無復尚守身老彌堅庶幾寸草心少報春輝妍堯都三萬家清風渺誰攀作詩頌匪匱錫􅀋君其端㑹當䝉顯異寵光爛門䦨三釜我禄餘履霜非謂寒一飽及妻子因君起長嘆瀟瀟風樹底悲絶仲由􅃣遣發僕夫李老櫬歸瘞淇上至元癸酉後六月十九日死于平陽寓舍来自東西劒相看二十年因罹兵燼厄重結主奴縁薪水嗟􅀄服耕耘遂􅀁天挈身辝勠辱得病便沈綿藥餌功無効棺衾禮罔愆汝魂應有識歸到水西田感寓荆岩産竒寳輝山生五色鳯鳥集其上採者終莫識卞生具神眼抱泣天地􅎇稱喻日百至此璠此玞珉一世竟莫售指卞為瞽人􅀒之献楚子致前湏近臣豈知事大繆反取按劒嗔􅀗譴或不賞戮辱終其身所以苦節士萬古潜悲辛陳村待渡河行虚壤間随意東西卧我邉汾水行十日凡兩過沮濡變深淵野航驚漏破篙師怯吾衰傳呼細扶柂朝來大陳渡細擺得乆坐山川􅀮佳句軒豁矜寡和秋風吹馬去行看林葉堕沁水道中蒼巔互出縮峪􅀔曲走蛇回眺驚後擁迎看復横遮雲林蕩髙秋半嶺翻清霞十里九渡水清流帶寒沙山溪本幽寂􅈭之聲乃譁觧鞍憇羙䕃覺我心静嘉風技滿秋實野菊􅀍水涯幽馨散蘭馥紅鮮綴丹砂二物固鎻碎託興騷人誇我欣記所見信筆書田家宿板橋田舎山村極幽僻坡嶺還四靣麋鹿日與伍自餘無所見朅來事文石供給半山縣倦枕聴呼號相次過夜半過鹿臺山在澤州沁水縣南二十里時􅀍安西王命伐石於此逺尋文石崗來歷南山纒鹿䑓䑓為山幽徑蟠古􅂐後峪行未盡前嶺已當靣秋聲蕩林越風露凄以泫隂壑氣翁欎疑有虎豹變山田苦無多溝崦耕已遍柴援結半空羅絡碧岩轉自憐終􅀊勤獸患防一旦我本山中人束帶對郵􅁺頓然還舊觀瀟洒償夙願行經􅀟蟾嶺石怪驚變現闖首槲樹間氣自太古練月中誰推墜囚鎻属山縣乃知北平守認虎飲一作拍羽箭物肖本偶然長歌下層巘觀穫蕎麥摇摇􅃢瑚枝浥浥露光潤霜餘秋實繁壠畒欣一瞬野人趂時穫柂車施素刃前推約歩長偃仆為一順風来湯餅香玉粒夢炊甑田間還自􅀏三載㧾山郡肥甘與菲薄一飯吾有分坎止與流行何思復何悶臨汾節婦吟松筠四時青特與凡木别弱草不自持風霜易摧折坤柔變乾剛彤管古所􅀃臨汾孫氏媪寡操抱貞節之死誓靡它棲心入霜月事姑極孝飬教子承世業神明與扶持骨徤丹浮頰我觀中壘傳於粲古英烈作詩備採官徽名継前􅈒過鹿䑓西崦乙亥八月二十九日偕沁水縣尹李君飛卿眎治道馬上作鹿䑓西南麓石路何扠枒青林轉幽深一水中可嘉逺從半山来長流石為窪一泓湛寒碧野飲供麕䴥濕雲擁絶壁灝爽霑巾紗我忻為緩轡睠立溪之涯恍疑桃花源錦樹蒸紅霞畸人指前途兩􅀧蒼山髽荅老農語風梢怒號寒駕言復西邁吟鞭趂羸􅆖直走壷口阨俯縁絶澗源仰看􅀌石大陽崖栢青青隂嶺雪全蓋詩脾儘餘清灝氣溢􅁭帶行行遇老農馬首言􅀏載前時使君公治此逮困憊事成固國力規畫良匪􅈈一朝文石去永利予等賴兹焉詎可忘衆意見遺愛連章供􅁥司大嚼伸一快既聞父老言慚汗流浹背道開非吾功物出數有在况予分當然添足恐成怪夕陽澹前􅈐凝睇飛鳥外是中有佳趣毀譽吾敢介秋澗先生大全文集卷第二
