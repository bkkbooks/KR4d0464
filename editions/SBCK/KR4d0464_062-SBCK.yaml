body:
  text: 詛蠹魚文并序王子曝書于庭風動帙開有蠹十數輩倘佯其間耴書眎之甚有囓壞者遂爲文以詛之亦且攄予懷之梗㮣云其辭曰嗟上蒼之生物􅀆曽巨細之不遺随一物而一名􅀆乃各有其所施竜􅋮首而霧集兮鷙搏擊而翰飛蝪縁􅂩而射蝎􅀆蚓含凄而應時蟻結陣而雨妥􅀆蛛縈􅁝而喜随至於蛇虺毒而虎豹猛兮網繩㯮刃人得驅而逺之彼蠹魚之何爲􅀆當去之而不疑我固拙而未貧􅀆尚其書之滿家規姚姒而法周孔兮浩波瀾之無涯念披讀而有次􅀆譬草木之品差歳翻閱而莫周兮蠹乗􅂩而遺蘖芽感餘浥而化育􅃓何族􅀋之紛拏正如􅀷山大澤人迹所不至􅀆足魍魎而生龍蛇爾名為魚厥号曰蠹無鱗鬐以自衛不潜淵而躍渚披景慕之虚名藴􅁞食之邪慮天壌之間充汝腹者多矣㝷茫茫之墜緒幸不為人之害兮唯簡編之見惡信黄卷之有味汝得幽替而饜飫􅃩􅁿碧之㣲軀􅀆曵白鬚而容与曽賢愚之無間􅀆輒遇之而必妬誰謂汝無牙􅀆何以穿予之竹素紛􅂐籀之紆屈􅃓致篇章之脫誤欲散帙而撲㓕􅀆念忌器之善喻芼春薺之纎葉兮雜芸芳而細注恐物感之有驗􅀆庻噍􅀋之一去曽少力之不􅀗􅀆愈滋蕃而無數汝豈學道之人􅀆咀糟粕而未悟將生死扵文字之間􅀆凝精思於朝暮不然秦季斯之徒􅀆師六經而依據一旦燔之而叛道􅀆俾黔首而聾瞽流餘孽而見化􅀆終宇宙而惡著聖防謹其萌芽􅀆堅氷凝扵霜屨苟不處而不區􅀆恐齧缺而無餘也布我床榻汛我庭宇乱牙籖扵風中趂秋陽之烈馭既不能仝湯䑕之磔裂􅀆以炎暉而為治具藉流爍之熾焰􅃓書難為之一抒􅑒醜􅀋而莫逃􅀆逓糜暍於諸部失餘浥之所在􅀆㰸炎光扵書户齊㓗竹書之簡森列周宣之鼔固我扄鐍若有神護喜卷舒而無恙殆遺亡而見􅀘既􅀵書而入室遂􅁣然而懐古彼微蟲之蠧書尚為害而斯巨吁姦邪之在朝妬忠直扵時主其擯斥危亡之禍将何如㦲嗚呼噫嘻我得之矣嚚嚚管蔡為周公之蠧􅀆幾謗成於王􅀁睊睊子西為宣父之蠹􅀆化不霑扵荆楚􅆇倉媒孽為子輿之蠹􅀆道不行扵東魯上官媢嫉為屈平之蠧􅀆賦懐沙扵汨浦匹夫絳􅈅為賈生之蠹􅀆老長沙之一􅀓孫弘變詐為仲舒之蠧􅀆䇿不施扵漢武恭顕讒慝為蕭􅀓之蠧􅀆致炎運之中阻封倫小人為鄭公之蠧􅀆太宗幾以刑而為務盧􅂎姦邪為真卿之蠧􅀆卒糜軀扵賊乕逢吉隂険為裴度之蠧􅀆播緋衣之訕語蠧􅀆去之而不可疑􅀆尚拔山之固􅀆况任遇寵信返為忠直之輔􅀆奮筆成文吾為此而懼􅀆􅀕諸􅁑丞相乞靈文維大元至元八年歳次辛未九月壬戌朔某日承事郎前􅁥察御史衛人王某敢昭告于漢大丞相忠武矦諸􅁑公之靈嗚呼事有曠百丗而相感者以道義故也維公挺天人之資奮雲雷而起黜功利之邪􅀃明剛健之正體攘伏群隂嗣㒷漢紀兩立偏安幽燭厥理兹少康克復之本心何戰囯縦横之可擬由是而􅀚公之志何意扵鼎􅁕而峙也至扵開誠心布公道􅀙權制示儀􅁤牧民訓兵賞善黜戻以君臣大義而言乃忠武開濟之餘事也宜魏人畏之而乕如走狐狸而号魍魅偃囬斾之威靈嘆竒材於壁壘故三代而下巍然王者之佐惟公一人而巳繄一介之凡庸何清光之敢企然掦洪蜀郡之功曹楊顒莫府之属吏韙一言而表擢感忠規而隕涕又如李平廖立以過見廢俾之怨艾固匪遐棄及夫蜀婦旣髽痛吾已矣恨終左祍發憤而斃是又見公不屑與新之教采葑采菲之意無以下體而為累也􅀂惲也質朽才踈有志未遂年迫知命動昧操履蹣􅘐仕途幾年于此八月行臺僅免官謗三年御史莫􅄍其氣今則俟大治之甄陶聽䑕肝而蟲臂虽耿耿以自信復何為而何逝恐生無益扵人死罔聞扵丗也用是中夜􅁣歎不遑窹􅄰乞靈祠下陳辝而跽我公在天日星昭緯容光必照奚間彼此思蛻濯其塵􅁾扣􅇸底之餘智覬増益其不能為砭訂其頑鄙付清明扵眇躬極臣子之􅀁上有来厥脩神􅀁恵祉庶免夫年與時馳意従􅀊易悲嘆窮廬遂成枯蒌區區之懐竟無及扵追悔也尚享為虎害移澤州山靈文大元國至元十二年九月日承直郎平陽路緫管府判官王惲近􅀍藩府檄伐石東鄙有以虎害言者謹移文以告澤為用當太行心腹間傍虽長林巨壑獸蹄􅀁交窟宅􅀁在然鳥獸隂􅀋神寔主司隂禦黙捍限隔常處制其暴厲使無犯越以為人害此神之聀守吏之責也今不逞之獸悍然不安其􅀁安食其所不當食怖農耕梗行路啖民畜膏肥厥身以孳乳其遺􅁼乱區制之常經忽太府之命吏是将與吏民雜䖏此土方今聖賢在上丗道清夷政令簡肅年榖登盗賊弭守吏者承流宣化牧養斯民為任坐視􅀂此安䏻俛首降心偷安朝夕容此物横重念民之扵國􅇱㩘牲粢盛供天地百神之祀出兵賦蒭餉佐軍旅征伐之用重繁􅀂此幽明兩間敢不敬忌以顧恤􅀖本且民又未甞􅂺犯於彼彼胡為而然㢤􅀂曰妖孽之来蓋有由然秪吏之不徳政有不善自有任其責者奈何禍延平民使居者行者惴惴焉懐旦夕不安之恐一至扵此哉即欲窮幽致討勦絶而後已逮禽獮草薙䓁耳然神不扵其告􅂺従事扵彼是守吏不有其神此文告所以先也維神聦明正直念守吏克䖍之告思職分當然之理赫靈威迅符牒搜索􅇯渠斃諸原野餘則鞭笞驅逐逺放林壑限以常處永絶斯害使一方安靖遂田里有生之樂虽神之職也寔神之恵也惟明靈其圗之􅄟畜犬文有銘犬之於人有功矣晝則守禦夜則警盗其徤則􅀎搏物猛則􅀎􅂑威窮則不遺其主靈則不失其家兹犬徳之大率也子有畜犬曰蒼頭髯狵􅀍體耽耽然有獅猛之姿誠㺜之上品也其為徳則不貪饞不舐穢不虚吠不狂逰寢有常䖏履擇其地投之物非嗾之不敢囓叱之退非招之不敢前至扵親屬賔客一及扵門墻者聆其聲亦䏻識其人指揮馴狎咸㑹又意可謂有人性而無狸徳矣嗚呼物之生穉而壮壮而老老而病病而死順常理也主人何憾焉且計其㱕于我以至扵死蓋十有一年于兹其服勤守禦功亦多矣主人惻然而興􅒛童子具畚鍤褁以寢簀枕用玄石􅄟扵古堞之下亦弊蓋不弃母使首陷之義也記曰捕田䑕者祀之矧犬有功扵人也昭昭矣故係之銘其辞曰嗟嗟竒狵㺜之種曰守曰禦􅂉靜或動靡失其常風鳴意􅋍卧護我家􅂑威于衆相非狸徳尓馴且勇唯有稱徳与良馬共生也服勤死當礼送弊盖之義敢不是奉諭平陽路官吏文爲判官􅀄任時作時九年五月也契勘國家張官置吏本以爲民且縣而州州而府吏而官官而長虽上下分殊大小聀異以承宣而言寔爲一體至􅀂親臨民事周知下情如賦稅課程㛰姻良賤債􅀒田宅刑名等事推明根源分别曲直兩盡物情一歸于正爲莫若州縣耳故諺有之旣爲民父母當作子孫看此言虽微可以喻大恐不當憚其煩勞一委扵吏致開塞倖門情生詐起附㑹科條髙下其手冨強恃势者理本曲而返神貧弱􅁈抑者情乆欎而罔訴事体旣乖􅀔成稽滯及愬者有辞莫可推延仍作疑似上之于州州司設有窺避亊情捨難趨易艱扵劳心者止慿縣觧略不詳審􅂺上扵府者有之易而有謂者一委胥吏聴其飾說􅅍行剖决者有之謂如按験未完辭情稍􅇱或明具条章不行定擬冐乱上陳倖其万一者有之又念徇情同列者視違錯而不言旣滿望代者以患失而為慮至扵辭不清明而曰民嚚扵訟身不力行而曰事擁于下以聀以分何不思之深也緫府固當持大綱畧苛細不冝求痕洗垢以察為明然念軍國之利害刑罰之枉濫脫􅂉差悮而緫府亦不敢止守大綱䆒其􅀁以自有任其責者矣至若緫司行有不逮虧一道之紀綱亦何以逃朝廷共理之責乎又念郎官上應列􅀫苟非其人百里受害静言思之可不畏欤稔聞公䓁􅀋皆明直恪勤官政小則􅀉百里之􅒛大則近連率之聀天官天禄寔荷恩荣獨有履正奉公竭盡心力以功名圗報上可以荅􅀦家委􅀉之恩下可以塞為民父母之望噫社稷人民莫非王事視如私家無不修理推廣此意又何俟告辭之丁寕公移之督責也自今以徃計􅀎強其􅀁當行勉其􅀁未盡以一體爲心共理爲務逺懲積習作新斯民使一道元元霑􅀍王澤而遂有生之楽寔公䓁之力捴府敢叨其功乎所以集衆思廣忠益者惟期王亊有成則捴府亦庶乎其寡過矣敦諭百姓文汝䓁性秉五常智周品物聞善必遷知過速改此固有之理恒乆保身之道也方今明教化􅂆農桑彰善瘅悪爲務庶爾有衆比屋安然遂有生之樂此明天子之意也平陽陶唐故都詩書遺俗丗不乏徳比者自逺思之化􅁜夷衰晋之風尚氣亢強頗乖正理致使訟牒嚚繁動經歳月較其􅀁争至甚微眇親舊變爲􅄷讎畎畒棄而荒穢事端旣起歳計一空亟當戒者乗氣窒塞不度輕重果扵自殘禍延後人嗚呼一忿輕生乃至扵此非愚而何况朝廷委付守臣之責非特有司常務而已正以承流宣化羙厚風俗安靖一方爲重兄兄弟弟夫夫婦婦恩義至篤也不可因細故而致争比鄰共里連郷並黨緩急相恤也不可以小忿而㒷謗盖好闘者喪身之原健訟者破家之本㒷言及此我心悲傷汝也何心忍扵爲此常念礼譲者安順和睦之方孝悌者福澤冨厚之本一日自新終身樂地􅀎爾何止公庭致束杖之清田里􅀗共安之樂将見祖先神靈安扵上子孫徳澤流扵下比屋雍熈永爲善俗豈不快㦲豈不楽㢤據教諭社長耆舊人䓁請以此意敦諭中外使咸知􅂆戒毋重其改作也其有不待教率自来孝悌勤儉力田而省亊循理而畏法者申明上司別加顕異若􅇯頑如前恬不知省上違捴府之訓辭下悖父兄之忠告是乱常敗俗之人國有常刑悔将何及至扵有司非横以侵牟豪強兼并而為事科差不均力役偏重縦而不問以致失冝使汝下情鬰抑控告無􅀁是捴司撫字無方得罪扵汝将何以息閭里愁嘆之聲逃朝廷共理之責乎汝䓁其詳思毋忽􅂆農文切惟民生之本在農農之本在田衣之本在蚕蚕之本在桒耕犂把種之本在牛耘鋤収穫之本在人人之本在勤勤之本在扵盡地利人亊之勤地利之尽一本扵官吏之勸課夫田功旣盡縦罹水旱尚有所得仰事俯畜廼克匡生穑事不勤虽值豊穰終無􅀁穫賦稅饑寒將何以濟由是而􅀚克勤者身之寳自惰者家之殃此􅂆課􅀁云急也提刑按察司欽奉聖㫖所至勸課農桒使聀近縁巡厯考照簿書其耕播栽植之亊勤惰􅂆率之方大抵虚文多失實効勸農之官長民之吏安得不任其責况今春首農亊方作巡行勸勉適在兹時仰所在有司照依已降條畫徧厯郷村奉宣聖天子徳意敦諭社長􅂄老人䓁随亊推行因利而利察其勤惰而懲勸之􅀁有事条開列如後一如田多荒蕪者立限墾斸以廣種蒔其有年深塉薄者敎之上糞使土肉肥厚以􅂇生氣自然根本壮實雖遇水旱終有收成若無閑田此最良法一􅂖麥羙種苟不成熟不如䄺稗切湏勤鋤功到去草培根豈不聞鋤頭有兩可耐旱乾結穗既繁米粒又復精壮此必然理也一一麥可敵三秋尤當􅆀力以盡地冝如夏翻之田勝於秋耕概􅦥之方数多爲上既是土壌深熟自然苗實結秀比之功少者收穫自倍一所在水利常令修葺毋得因循廢弃倘遇旱乾獨沾豊潤是地利徧恵一方人力可不加謹又兼此係朝廷最重之事切當用意仰體至懷一桒麻之務衣服所資切湏多方栽種趂時科薅自然氣脉全盛葉厚稭長飼蚕績縷皆得其用又栽桑之法務要坑坎􅀷闊盖桑根柔弱不能入堅又不冝拳曲難舒根既易行三年之後即可採􅎥一蚕利㝡􅀶養育寔難如浴連生蟻初飼成眠以至上簇必湏遵依蚕書一切如法可􅀵倍利甞聞山東農家因之􅆀冨者皆自絲蚕旬月之劳可不勉勵一耕犂之功全籍牛畜湏管多存蒭豆牧飼得所不􅃱羸弱以盡耕作其或引重服勞使長有餘力若有羸老不堪者切湏戒殺心檀行屠宰一雞豚鵝鴨之属菜果瓠芋之􅀋皆可養人務畜廣種用之接聞不為無􅀘故古人有言菜不熟曰饉豈為細事一時至物成罷亞壠畒更加併力􅀵歛以防風雨損壊有失􅀊計不惟盡廢前功一飯到口自行􅁀弃良為可惜一古人蓄積㝡為急務故國無九年之蓄國非其􅀦也如平陽太原兩路例有蓄積往往山下饑荒鮮聞山上失所近日官設義倉正為此也蓄積之事其可後㢤一織絍紡績責在女工可諭家長戒其慵惰􅃊立程限造成端疋以俻粧着盖非鳥獸必湏温暖可禦冬寒若無衣􅄄何以終􅀊一或有頑不率教惰農自安背本趨未敗壊淳風朋㳺群飲称曰事情醸酒屠牲指為口願田務方集躭樂城市其或别生事端遭值官司父兄親戚理湏營救豈止破壊家産田産轉成荒廢此等切當禁治毋得􅁿犯一有孝悌力田為衆表率汝等舉明到官優加寛卹如有浮泛雜役可除者即為蠲免以􅂆餘人㩀巳上事條仰社長􅂄老人等各於當社時時開陳隨事推行因利而利察其勤惰而􅂆懲之不致因循苟且徒文具而已庻可以仰副朝廷愛養元元務農重􅂖之本意也除已暗行体察不如教者湏議省諭各令通知勸農詩緫􅂆分司􅂆課不辝頻汝但聞言日克勤倘使有名無實效到頭俱是具虚文糞田年深蒔種薄田疇糞壌頻加自昔留田果糞餘根本壮縱遭水旱亦豐收種桑年年􅂆汝盛栽桑相度田園􅁟脉良属汝一根如法種明年要見百根長勤鋤鋤頭有雨潤非常此是田家耐旱方果使鋤跑功續到結多得米更精良水利細思水利最無竆普例灾傷獨歉豊倘有可㒷湏舉似已成毋得廢前功女工田家門内事紛挐㝡緊蚕繅与績麻主戒婢奴姑􅂆婦趂時作活可成家訟田近年田産貴扵金明見無慿恃力争縱使一時官借向就中不直有神明結親成㛰作贅結歡情徃徃年深致怨争省訟有方渠記耴始湏書契兩分明讀書孝慈和順革􅅝愚􅀃似児孫自讀書縱不盡爲官窅去省心解事亦良圗省訟典田賣舎属曹司何似無争省状詞唆汝致争元是賊􅂆令和忍是良師畏法禁網寛踈固不苛慎毋輕犯􅀍拘羅更思有理無錢語試估家資有幾何屠宰上司禁汝莫屠牛間有人來告事由豈止到官刑罪􅃤怨讎相結幾時休闘敺農家蚕務与耕田除却耕蚕半是閑利害不多休致闘壊錢當罪片時間教唆教唆􅁈報似循環比及児孫已􅀍􅄽若欲人生求利逹正湏良善養心田盗賊一毫非有莫萌心􅀼物穿窬罪不輕重是杖徒微刺記枉因纎芥壊平生飲􅀶常思群飲與難錢此事􅀹湏預禁䦨酗至輕生輸至盡恁時雖悔恐􅀿難安分貧湏藉冨冨怜貧安分懲貪徳自新積取餱粮防儉􅀊慎無相率去祈神天報四民唯汝㝡純風天憫辛勤報已豐試看仕途青紫客大官多半是荘農終勸分司􅂆汝事多忱今歳詩篇意更深切把此詩長記誦來年比􅂆預関心又文告裁成二十詩篇篇皆出老農辭汝帰相􅂆行毋怠便是分司樂不貲􅀕文先祖妣韓氏􅀕文中統元年庚辰秋九月丙寅朔十有一日丙子男孫某等謹以清酌庻羞遣奠于祖妣韓氏之靈繄韓氏先昌􅀺之裔枝分􅂀析散處於衞衣冠煌煌文經武緯越宋有光司空之貴惲􅀚其譜本支十卋尚嗟祖妣實出其系薫沐膏􅃾生大盛卋德婉柔嘉主夫中饋貞祐􅀄元金兵四潰萬室一存危若旒綴時維祖妣歸于王氏内助我祖畢力家事遂濟坤柔外扶貞義我堂􅃨構我祀復継内治雖嚴舒而脫脫我祖先歸我考時穉勤苦流寓栢舟自誓鞠養提携遂成偉器名甲京師一日騰沸抱飴諸孫免夫火水至克􅀒薪其恩非細欲報之德昊天罔既八十之春不為早卋頋不孝榮養殊替有銜不祛涕泗面􅀍庚申之秋􅀿辟東魯力辟幕官唯曺是主慮其不淑庻􅀗奔赴罔遂所求心不遑處后􅁟皇天實聞斯語旬日之間事易其故天誘愚􅂨駕言西騖拜省庭闈病為少愈九月􅀄􅁻星河尚曙有物告終聲裂軒户奄奄在床彌留不去日薄西山矯首云暮風􅀣之悲有淚如注盤盤新阡實惟高原安之妥之一遵訓言傳家之範敬奉周旋左配我祖何千萬年嗚呼尚享廣平郡夫人完顔氏􅀕文從單學懿懿夫人金源之裔分􅂀天潢坤柔所萃式承隂教婉其令容作配德門􅀍之僮僮蘋蘩主饋化成肅雍血母之訓伯􅁎之恭是嬪是則以號以封立人之道莫嗣續大子挺儒宗種德孔邁令伯陳情不仕而恝菽水盡􅂬心乎日爱素髮垂領班衣在身問安眎膳眷然晨昏野服瀟然林下之秀蘭玉􅄹庭􅀊時上夀日薄西山其明則東曽是微恙而不及躬起居燕楽曵曵融融彼髙明家具慶則那若母若子為夀如何親不知􅁨孝養終天享此全福幾人則然懿懿夫人足慰下泉膴膴周原瞻氣葱曨居河之漘有儼新宫􅄶柎無憾哀以送終懿懿夫人為婦盡道為母有儀彤管有煒千古是徽尚饗􅀕王叅議文維中統元年十月甲寅朔二十一日甲戌王惲謹以清酌之奠致􅀕于叅議先生之靈藹藹王公維徳之宗教子以義從師于共走也何幸而與􅀧同氣質一変舞雩之風文士輩出繄先生之功公来典衛粤惟八年㒷滯􅀘弊政有後先􅈭濁􅀭清巨細不􅂢樂育之心有加于前士感公知􅀁立卓然頋惟不肖獨有二天毎侍几杖接以温言意向所在多文字間一意作成汝其勉旃家貧親老擇我禄仕床下之拜言猶在耳蜀山蒼蒼公箠西指董菴之別誠發扵􅂨臨岐眷眷告以終始蹭蹬沉鱗有俟乎此孰為㱕來便隔生死痛彼知已丗罕􅀁遇我思古人涕零如雨猗欤先生伊時之麟文彩風流與道日新旣惠我輩亦及我之後人所謂故國非有喬木之謂而有丗臣峩峩豊碑耒公之墳公雖云亡其德在民太行盤盤淇流湯湯永懐先生何日而忘􅀕王府君夫人陳氏文大元國至元十二年歳次乙亥二月壬寅朔越日承􅀡郎平陽路捴管府判官王惲謹以香酌之奠致􅀕于河南路宣慰副使王君太夫人陳氏之靈伏以詩稱有基婦道乃隆易讃坤儀徽柔所鍾維夫人之淑兼著一躬母儀女範婣于六宗内􅂇既􅁉化成肅雍彤管有煒周南之風嶷嶷賢嗣緫角從容以契以分昆仲猶同二十年間􅀗侍左右􅀊時拜慶稱觴上夀頋畜殊常如夘斯覆我草惟纎兄蔚蘭樹突而弁􅀆載同庠序浹洽薰陶亦叨時譽調官南㱕四月惟夏升拜北堂德容甚暇親哺之食手飲以斚駕言西行辞拜床下中心惻然誨言灑灑日薄西山衆鶵飛翻云別幾何遽棄荣養聞訃驚怛惄焉如喪英英白雲太行之上有淚盈睫悵然東望嗚呼適去則順其生也榮較丘山與華屋終哀樂而殊情懿懿夫人夀踰八旬拊安玄堂慶流後昆是足以慰下泉而釋悽愴扵蒿焄也惲以官守有限罔􅀗駿奔既不及撫棺而與謚繄昔賢􅀆儗倫以陶侃之忠順知湛君之聖善以不疑之平反審母氏之慈仁援例私議寓哀扵文庶幾薦微誠而告精魂也尚饗禱雨蒼谷神祠文去冬今春厥旱斯普比聞三方既禱而雨維此衛􅀖和氣艱阻草木焦卷種不入􅁟致此咎殃誠守吏不德之故也吏不稱聀罰及一躬我民何為罹此旱㐫嗟嗟四民㝡苦我農止食其力􅀊期一豐旱苟成灾散而西東恭惟明靈蒼水之龍哀憫慈惠正直明聦司我雨部山靈是宗澒彼淵池雲雷之宫民以病告禱􅂺感通忍以吏不稱聀卒莫救其隆蟲哉願廻哀眷澤我􅆁􅅠乃以有秋祀事孔終祭王叅議文代史運使作惟公奮迹渤海應期挺生婉畫長材廓時之清佐我父相幾三十年子惠兵民以謀以旋長淮百戰松漢逾邁死生以之而有公在矯矯大莭老而弥堅􅁭融宇粹秉心塞淵中牟之仁平陽之賢哀哀衛民頼公以痊膴膴周原熈然樂􅁟公雖云亡其政則舉走自恒陽來寓南􅅠瞻􅀖遺像齊之盖公歌詩知政泱泱大風民懐遺愛甘棠是比士而感徳曠乎百丗矧伊嗣侯義同昆季嗚呼哀哉吊罔及哀生不􅀗事遐想音容河岳流峙野日􅂽􅂽群飛搶􅀭公不少留使我涕滂跽而陳辤奠此一觴尚饗春旱禱諸廟文旱自去秋極扵今春滌滌衛土如惔如焚夏麦已槁􅂚休我民秋種不入饑饉荐臻旦夕惶懼不知􅀁云恭惟明徳守臣所欽民以病困神心孔仁用是齋沐以祈以禋庶垂哀眷昭鍳微誠風伯囬馭山川出雲一変盭氣化而甘霖秩我東作庶幾西成載謁祠下荅鴻靈尚享七夕􅀕竈文至元乙亥平陽府作三代之制五祀孔修群姓時享或春而秋欽惟竈靈並奥而幽朝烹久飪一家所由火水相徳乃神之休敢􅆀薄奠于陘之周有肉如玉有酒斯柔味登于祖香列于卣匪物􅀅致匪媚是求乆矣斯禱庻荅神休尚享七夕祀竈漢俗也丗乆不用獨吾家行之多歴年所且前人􅆀恭或斯苟得此非予之心也盖庖湢飲食所出五祀神為㝡尊薄䆠巳來餬口四方是神即予主予乃神之客也匪朝伊夕不無溷殽膠撓之瀆惟神念客之故庻有以安之用伸告謝以荅神休尚享謝龍神文維至正四年􅀊次下丣夏六月丁巳朔廿日丙子翰林修撰郡人王惲謹以香酒之奠敬􅀕于縣西平成郷龍公之神矯矯神龍柄雨之機亢陽為灾非雨則饑土而力農乃分所冝惟百創理一旱則堕霈澤在天屢及我􅀻疇敢不祗若神之威徳也尚饗秋澗先生大全文集卷第六十二
