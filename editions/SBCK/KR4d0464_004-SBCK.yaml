body:
  text: 五言古詩遊百家巖四十一韻兩紀山陽城行役凡七過佇瞻百巖雲屢徃屢不果亭亭白塔顚望逺幾招我今秋􅀂有相老玃脱籠鎻二三㑹心友與逰無不可􅀄從萬户門迤邐陟層坷石林轉幽深到寺氣幾耎截雲駭巨屏􅀔軋坤軸妥天関瞰􅅸巓黛色潑峻朶三纒上杳􅁳兩岫巧包裹谷深餘繚曲石怪欲垂嚲何年緇衣徒詩境闢飰顆或疑巨靈斧擘削乃尔硪僧殘失珠寳寺圯驚甑堕寒猿從何來跳踉不能箇近人不少怖掇拾落殘菓有草名龍湏纎潔豈容涴崖絶不可攀殆似衒竒貨最憐明月泉流瀉不細瑣玉虹貫山透噴灑螭口拖我嘗遊三嵓景氣固雲哿未有此泉勝翕合瑶峪大怳疑神物潜供飲結僧􅮮徘徊醒酒臺石老書字娜憶當沉酣時萬象入眺卧八荒敞庭衢日月螘旋磨下視區中人冝為蜾與臝復尋淬劒池􅂂􅇖不辭跛澗黒不可渡悵望藉草坐山僧似嗔余空踏苔蘚破萬槲霜葉丹鍜竈烘熾火有懷中散公材大識或麽至人戒其偏康鋭不自挫當時朝右姦如㑹􅀑見唾吹毛不此施淬礪安用那徒為論養生竟落非命禍長􅁔下山門丗累訝許夥寵辱未足驚門閭續吊賀吾湏人爲徒長徃非所荷正煩日用間克我偏與頗賦詩約重遊備豫木客和謝王中丞恵栢栽我家西河阡清隂不多植白楊風䔥蕭万葉空戞擊君家乎種栢蒼􅆬照城壁移栽滿山丘鬰鬰歳寒質丐餘􅀘不足雅意許波及恣取不我貪廣種庶多得慇懃教之法水土要相適又云􅀣平壌根柢雜沙䃯蒼官雖􅀑庭在木躋壽域恨蟠泉窟深氣接太行碧佗時兩喬林黛色看千尺大招逺遊魂納此衆香國百年見諸孫鶻立大隂黑􅀂問物從來渤海王氏出飼牛辭我性本踈拙壯年樂郊居况兹二頃田近在城之隅兩紀官為家耕牛老無餘秋翻巳失計春種烏可虚浮陽漲林埛我甽猶荒蕪傾嚢買雙牸典却杯與壷齒歳固云稺野牧多形癯角浪黯無光寒氄躁不濡服来試壠頭喘息乆未蘇田家作雖苦大本誠在渠嘗聞老農言力盛出壯軀時時過皂隖付嘱飲食劬早晏日有常瑣屑豆與蒭均匀細為和囬噍皆至􅃾頋立終所䑛對之為嘻吁半生遊䆠間代耕􅀼官租雖乏濟物功遇事多􅀡愚闘怯公戰勇不知夏畦䛕古人發畎畆開務荷天衢有莘伊衡相􅀯陽孔明廬大賢吾敢望耻作遊説徒咄哉奚戚輩販鬻庸自汚百里西入秦炊扅感妻孥養牲五羖皮其志還自如越􅄄不掩骭夜半歌嗚嗚應怜􅀯山粲中有尺半魚一朝遇覇主立談開逺圖我歌意有在歸來事耕鋤水溢継旱乾二年儉缾儲力田漢重科躬耕需壯夫我老理當佚返與若等俱塗霑固不及風日儘瘁枯筋力日衰耗毛髮不滿顱平頭七十數温飫帛肉湏舉家二百指張口待尔餔田間一􅀏起謀生太區區非関効周人白首悲窮涂庶配耒耜經因之􅀘叢書種􅂼風人憫東周饑饉何荐臻一飢未為窘二事胡並云當其榖歉時一菜真偏思减粒倍􅂼茹儘足濟餓貧我田在溪曲有圃逾一㕓十年廢不治草闇野井眢飯糗日兩盂舉按􅂼爲先顧瞻畫义首日食無幾錢甘受宣父誚課兒斸荒烟甞聞饉不驚示貶中書堂况我田野人鄙事亦備甞東家乞􅂼子西家學種方乂土作長塍繚垣為周防劬勞不旬時緑畦变天荒朝來見生意次第青與黄春韭存夜氣夏葵茁屯芒努力辦一飽藉尔為半穣大哉烈山柱齊物心遑遑草木别珎味擴充神祖嚐雨露天地恩水土仍君王智能創而述功用有至藏皇風眇無及庶物昭回光配社徳罔極万代詎可忘餞王和之北還王􅀰自燕來不見凡四載拜起寒暄餘命坐至于再靡然衰俗中持身敬勝怠出言口不能遇事意何􅁣闌翻譯語詳宛轉刀筆快幾年民部間奔走事多頼􅀒責在人先利心非所在所以􅀰曹官􅀝用例深愛朅來衞􅀯􅅠治任將北邁為余閑著書論説餘教戒探微尋墜緒發源䟽九􅂀贈言為至榮在公猶謦欬賤名見諸編儘足光丗代常觀長厚人徃徃福未艾行矣愿所守揚名此無外芸香霏版藉鴈署􅄂書袋飛翔得所止早夜更匪懈會當長安陌軒翥看冠蓋汲􅃁懷古丁亥歳三月十八日觀稼西疇遂矣伍城抵安􅁵王陵下歸作是詩者蓋自江左平後竹書多傳於丗余􅁨好竒攻異者讀之恐有致逺汨泥之弊故不得不辯云濔迤伍城郡背水猶陣圖魏陵廢巳乆磅礴如覆孟草樹􅃤不春穿穴狐狸墟我來登其顚懷古心躊躇憶當戰國際安􅁵亦狂且澤麋􅀍臯比坐為秦人驅敗亡自此始保􅀖何乃䟵不知身後藏安用書十車上窺姒與商下逮蒼周書零乱竹簡光詭説何紛挐征􅀯辨已詳多出行怪徒稽古不􅃴正死為毛頴誣其中亟當辨阿衡􅀍夷誅孔子修六經亦巳防姦汚大書一徳後薨葬開亳都在易最竒法安取理所無兹焉万丗程洋洋真聖謨何煩事幽􅄨致逺泥所趨長歌望陵去樂過風乎雩壽弟監使仲略淇澳望鄧鄙迢迢千里途吾弟官其間筠林辦公租十年凢兩見聚散何湏􅁷今歳乃天幸同歸在郷閭朝昏對無時談􅀏樂愉愉春風露堂飲盤餐雜肴􅂼絲竹厭啾聒却去從歌呼曾及兩耳􅀬仰空作嗚嗚張燈更大白要盡罍與壷都将積年懷一洗中無餘健倒不知曙醉頭同與扶扣瓶得餘醖忘却公堂拸時以事候府下兩宵對牀眠百篇詠徐徐静聴未容再恍陟西崑墟鬼窟易作計大馬艱為摹吾弟擅所長愈吟辝愈都意圎兼理到韻逺幾風䟽宛從尋常中竒倔驚專車又如苛盤露細大皆成珠章郎五字吟花樹欣游居今夕復何夕香滿先丗廬近復示新作篇篇商起予玉美韞櫝中得價不待沽倡者凡幾輩賞識風雅殊今者重有喜不為文字娱君今知命年我亦耳順踰素髮各滿領不樂復何如况逄􅀄度朝怡怡與之俱膝下分戯綵朋徒日依於我有一罇酒慇懃三禱渠一酌願君壽金石堅不渝再酌官事利百吝爲一攄三酌日康寧神相千金軀貴冨天所與道義我所儲居閑未落寞畏涂足﨑嶇家理即􅀖政繄孝與友于長歌復一杯此外非吾圖揔詩皆漫與此詩吾特書酬紹開提刑見􅀉嚴韻我老不足畏閉門欲誰親按頭有遺經卷舒無時旬平生未嘗學於焉究彛倫旣非目繫者補拙需以勤其或少有得庶浹羲和春吾子四科哲勳名逐時新迩來亦歛翮淵潜思自珎有時縱諧􅀏傾倒冠與巾豈知􅀉傲餘落筆摛雄文客來示新作郁郁皆卿雲繫訓狐訓狐本􅁖鳥飛潜林谷間眎夜返爲晝聲􅀔何軒軒矜㐫聚妖異其氣幾神姦家僮夜得之縛致庭階前目光爛兩炬狂躍倖一騫群児頋之駭四走入席眠我因為沉思善􅁖以氣宣古云鷹集軰不如鳯與鵉以兹惻懚心逺彼㐫與殘胡為止我屋夜半呼聲乾女奴前致辝此物何足患西家養巳乆逸飛偶翩翻内疑始氷釋念之心稍安􅃡懷昌黎公心炳陽烏丹弯弧親斃之絶􅀋不使蕃揮策碎厥首亦與韓意然長令杖端血著此一綫殷比跡孔段笏異丗同不刋起視夜何其斗挿西南天蒸雲変曉黒漢漢來輕寒明農亭我田僅二頃近在清水涯䆠遊苦不巧歸來把鋤犁樊湏披聖闢彼士當有為時有利不利一饑胡可醫士而食其力安分至極冝繄予事農圃三歳􅃤不怕四郊氣隆崇澗芼成悴萎釋耒得窮處日坐詩書癡樵蘇甫有積瓶儲復無幾餬口恐不給奚暇卒歳衣明農榜新亭此意空規規有懷靖莭翁起為三徑資分種粇與秫一䄒欣有期豈知事大謬折腰困憸㣲歛裳即宵逝一粒不入頥蕭然環堵間老飢日相持九華安足服嚼句􅂶朝飢士貧理雖常念之令人悲空餘身後名万古流清輝天運旣􅀂尔吾道将安之過此或有作殆與天相違感興詩三首中丞子􅀄過訪憫及生事述此以見志亦古人感遇意云不製衣日僅兩盃飯得年過期頥此亦何足羡是非華軒口悦芻豢平生未嘗學晩歳似有見盈望五秉粟禦此飢凍患閉門了一經庶幾思過半到羞澁百計􅀂為辦人生霄壤間所􅂌恐有限分外思錙銖有力不容綰傷哉道難或拊掌發浩嘆士不吾知胷次何磊落少當利害間鮮有不顚患在無定方多學昧所樂出處况大節未用從人開談話艱辛汝豈有求託譬彼飲與食孰不知飢渇區區俟渠决肥瘠不相腭在我弗能了彼豈吾可校讎天禄閤我甞讀其書辝旨徒意何有止得寂與寞物來有當行道在吾面事所在俗争取維抱見售耕韞侯其沽䧟入中可爲征又昧出困舉湏利所有客語予固宜僂所論誠足門有時且入此室處苦寒昌􅀺體四年丁亥冬玄􅁳肅坎治太除包元陽少苦無風色悪積雪不在地隂機發新玄霜佐􅂭嚴宿􅂇重曀長空浩乾冷於虎甚伯有厲一氣粟生膚酸鼻冰涕酒澤水空破裂山石潜獸忘群巢鳥交􅀝熒惑慘不芒崑火澹不熾東皇約祝融縮首避權􅀔天弧弦屢折何有琴瑟輩薄帷透三衾夢凛神不寐暖老玉無憑炙手竈可媚閭巷稀徃來雞犬噤嗚吠茫茫堪輿間欲逭何所逝􅀂􅀅肅殺威一変寛大制時當謹蓋藏理合絶掩蔽雖威貴不猛革故不失惠明知􅀔非恒其奈日増劇冨人尚云哿貧弱胡為濟里門有殣僵穴䖏返得計我時幸􅀷藏順此天地閉無餐又無􅄄不易卒此歳有客過予談􅀊律何時易九陽消一隂萬象回生意予因語過客無庸心過亟四序本平分過差自成盭此雖節氣正未免急恒致循環万化輈一刻何甞滯昨晨履中園芳樹一為睨枯枝雜凍條芽孽巳萌綴都無十日春迎致勾芒􅀕土牛送餘威斗柄挿寅位汝冝姑待之能作幾日崇我閑亦已乆幽空懷霽偶書苦寒辭又成韓筆贅何當凌景風下折炎洲桂古云玉燭和調爕由獻替冥􅁳於两間侣恐不関係天運諒自然何俟呶吾喙怪石辭巉巉荒谿石濁滓疑太古顧雖一拳小岌立有足觀牛神两顛撑山魍一足拄移來夸娥檐劈截巨靈斧蒼雯裂荒寒老峽翟秋雨千年洪水餘石浪尚掀舞又疑秋江蛟蜕骨委幽渚却愁出雷火下取還洞府要從五色族軒􅂦入練煑元精儻不克備豫女媧􅀘從渠置散地不第竒章譜疇昔一首􅀉胡紫山戊子十三月卄二夜疇昔夢紫山燕集街西居又撑瓦􅏛底一􅀏春怗餘四頋盡佳客半是髙陽徒紫山正襟坐手把一卷書疾讀且􅁛嘆照眼皆驪珠乃云某近作商也真起予吾儕惜無幾烱如暁星踈正湏佳眠食善保千金軀别乆得一㑹喜與老嫂俱呼児具罇酒張燈列肴􅂼觴予不數行致辝前見揄平頭七十數眉毛雪糢糊投閑天或憐有書心使娱又云悼亡來不以再娶圗老懐固鰥鰥􅀫業一掃除殘年累幸輕恐是得壽符叙闊夜向深對牀卧斯湏展轉寤寐間怳然到吾廬春明煥庭軒門縶雪色駒俸忽坐壤含意􅀂傷道汚彼豈能我凂髙氣􅀄自如軆融合􅀂一樂適歸不殊安得自伊始終歳同歩趍或乗欵段馬或駕下澤車春風十二窩醉墨翻瓊琚相看以佚老脱屣榮與枯夜寒薄重幃夢清誰遣呼枕邉有鐘皷鼕鼕應更壷起聽夜何其漏下三更􅀄念兹夢何異自况良可吁紫山俯秋澗玉峰映汚渠固知瞠其後庶可山澤臞援毫記所遇一字不敢渝代書寫離索涸魚聊自濡何當拊素筝醉捋桓侯􅂡取其使君不凡之意元日吟深院咤􅀕餘黎明紛拜賀嚌飲藍尾杯傳嗅辟瘟馤献歳事多宜晚景福未艾郷隣最善禱有錢無病害児童楽新年添歳漸壯大老人死生忙􅀿接筋力憊元正貴清明其占君子㤗多連人日隂野老足吟嘅今年天氣晴日色暄可愛相竿絶㣲風曦取飛火蓋墻隂凍全消水陽氷自壞布席坐前簷欹傾餘醉態一冬苦凝沍乍暖欣曝曬頽然曲肱眠夢到華胥界􅀫醒與臘嚴融暢無内外放教原壌肆大豁伯夷隘温温秦和湯股痹為一差覺來喜不勝嚼有屠門快持美欲献君癡絶覬霑嗟哉􅀓生行客從大梁來投刺謁蕙帳再三相之坐氣貌何骯髒䄂携一卷詩照映青藜杖起立懇予觀詩意見推唱􅀓生􅀯樂人明兩自㓜䘮聽官奉心君入耳物能狀曖然内含光記誦殊通暢我思篤廢人氣志多散放苟能豢此軀那計非所養􅀓生痼而卓出入知所嚮不學隂陽流甲乙肆虚妄復􅁖鄭衛哇耻列師瞽行六經天浩浩義理無盡藏㳺心於其問取友千古上古人不復見古心胡可忘古心果云何􅁎孔乃心将循夫天理公絶去私慾王神光滿牛背安取内外障師傳庶西河爽識或􅀳曠不吐張籍竒猶可祖珽相丗人非禮視外蔽内随蕩思屏心過易眼過最難愴一根塵幸空内動息孟浪作詩還自􅀏示勸随彼量大匠無棄材長短皆有望文昌藉終譽尺書軍欲張豈知我非韓徒増山斗仰處暑日偶書丙戌􅀊七月長夏便幽居動静得交養杜門逺炎􅅝人事息來徃三年謝簮紱倦鳥脱籠網生涯書滿屋汎覧極遐想欣然欻有得忘却折爼饗一凉沐新恩兊治多峻朗殘暑竟餘熾木葉戞清響好風從西來一雨為滌盪氣骨増老健絺綌䬃餘爽赫然酷吏去而得故人訪草木行変衰騷客重悲愴况復迫暮景歳月驚俯仰浮生太奔忙壯志非昔曩時至氣自表心在不忘嚮要資配義剛毎戒揠苗長人生老當佚我老事耕壤有田不及蘇開徑謾希蒋一貧非所憂俗事苦紛攘娱心筆􅀘衮甘分弨居韔兹焉庶有成心體日胖廣窮児即暴冨孰羡軒冕儻何煩問大鈞自断示諸掌敲門看竹來一􅀏豁心賞秋雨中書懷秋氣何沉寥寒序変淒渰木葉與時謝芳菊得秋苒生涯無少營書史有餘覧静尋古人心理乱見忠謟薄田待耕食雖苦猶嚼欖稍豐不外求卒歳飽羮糝既􅀗飯􅂼樂又免素餐忝吾儕當壯年頭角露斬斬一為客氣乗前進率勇敢才行有所疐欲止不容憺尚恨才術踈而不大其膽随即事変來長網驚一掩天意深有惜不遣入習坎委心聽自然致用毎縮歛䆠巧輸晉衍戇直終漢黯丗涂伏黄間舉足中機險虚名竟何用抵事纒坎􅇄唯餘讀書心連綴􅀂紘紞秉德思一心覺衰誡多感古人了婚嫁家事断不􅄃賢哉靖節翁歸卧斜川崦怡然擁敗絮一􅀏慰佟儼多生各有分過慮譲憂貶當時曠達懷樂過鼓瑟􅀧因復念涪翁亦厭俗累染異丗同其流漆板書何醰青山與白雲江湖渺而湛終古無少異曾有不足慘窮年爲形役膏火自煎欿齒髮况日衰神情豈任晻正湏慎圭璧不致有容玷惟天有盈虚賦分自豐歉天運審如此終老樂貧儉丗或昧兹理遇塞強鐫鏨我恐傷天和作詩時自檢餞侯敬甫還汴侯君司竹君調度去声􅅻年半去春持停罷公私或云便継差上官來新舊盡交筭衣􅂁到緼弊未免積垢綻支持一載強非汝不易辦天姿公戰勇奔北獨與殿昨從汴梁來相過爲飲讌坐間出片􅁓喜色睟於面乃云監復立将集此微霰財賦至復任斯人不多見愀然忽変容不覺當饋嘆操刀截鼎肉有味誰爲雋半生媿兹心而向此中轉􅀂來期半歳整示見関鍵蠲潔七賢譏去應一鶚薦脱落小規為追逐接時彦擬慿素所懷髙舉酬吾願仍説解由事不了無一件俄尔來告別牽率復還汴祝余贈言榮歸代賔朋羡歷聞君所談行止渠自判何庸待余言樂處戒乆恋最哀同察子臨事本怯愞壯士􅀍蝮螫慷􅁣有解腕懸絙即自經而釋身後患更無拙計人一死循鳬貫常嗟白靣生時務少諳練大㮣説不差節目多自絆米塩􅃈屑間居之要無倦君看韓侍中張本府推幹行矣夷門侯前涂况多援髮壯吾舌在槖罄志曾変花様又時冝何患不光炫望崧吟至元丙戌長至日追作北韻徃歳試洛師憶與節齋約同作崧少游心賞為一豁羸􅆖鞭欲前竟為事所却宛循洛水東馬首眺隂壑洪朦元氣湧磊落雷雨惡不有此峻極安得雄四岳只縁不得登萬􅁚􅀒酬酢諸峯羅六六景氣終慘錯披榛入㑹靈離宮名吟􅀝廢宫角陳公最徤者帥可三軍奪空餘墜仙興出丗說飛堕迷嶺崿歸尋黒石渡易馹指鞏洛行行嘆不勇失此寕復作吾儕貴乗時過慮自覊靮至今有餘恨夢繞神崧脚盤空轉危磴矯首看飛閣探穴不知畏入室不挽葛兹焉即神清洞户四開闊山人喜余至供具為止泊㑹凌列􅀫嶺一􅀏動寥廓宣城筆巳丑秋八月三十日晨起試宣城筆前一夜夢對御陳事故有入閤侍立之語江夏無雙公翰墨能事畢平生􅁛快意揮洒得此筆圓如􅀥心大鋭比囊頴直横馳屈産良細挿蜂膂悉鋒柔得字易心勁腕能適赤管􅅻握餘貶削失掠敵䇿􅈴嫓中山落帋生五色或簮豸冠霜或泚螭首墨入閣與賛書侍立天咫尺雖非山甫儔萬一􅀘衮職賦襄邑蒸豚尹劉璹字君玉予為都司時部提控令史相州人我行錦襄野田間多牧豚不沾攔笠溷不識糟酵渾渇飲兎苑溪飽嚙香阜根所以味佳美萬有空其群故人得劉宰紅蒸具盤飱俵淺食不饐體芳腥未聞今日復何日大嚼過屠門他郷固肥腯性燥空突奔有時嘬其肉一筯増餘惽乳烹謝􅀳豪禁臠未必尊柔毛詫沙苑盛餐厭羶葷未减貨所饋徃拜禮合殷物産貴得地橘與枳遽分藍田異崑丘而别璠與珉人生與物殊善変觀鵬鵾􅀟廟懷古鐡轝動地來獵火燼丸縣睢陽東􅀯衝江淮國所援蔽遮不使前恢復可立見二公明此機死守誓不変雖危所保大如蝮螫解腕最難結衆心存殁匪石轉彼蒼􅂌全節誰為落賊便巳矣君不忘握爪掌為穿竟能濟中興淮海了清奠至今忠烈氣皎皎白日貫賀蘭觀成敗不飲浮屠箭殺亡計多寡此論誠可辦我來拜遺像凛對如生靣乞靈激懦􅂨剸决剛同鍊朔風吹樹聲尚想登陴戰暮􅀝暈月城悲歌淚如霰虞姫墓在靈壁縣東三十里虹縣道南隂陵山北舊有廟在山上今廢重瞳鮮情人鍾愛獨虞美五年有天下寵幸想無擬一朝走隂陵楚歌聞四起君王大事去飲訣共欷歔感君伉儷恩死不為漢􅀑一坵鳯陽東粉黛見石紀空餘山頭草􅅻歌葉披靡定應月夜魂長遶烏江水江船二詠蓬尺簀編黄蘆節數湏隻長短随所冝張弛易為摘長者二十七節廣二丈餘一傍繫脚索􅀂網綱揔緝北人布為㠶南俗蓬以荻舟師貪重載髙挂借風力順流與遡波巨鷁添羽翮望從逺浦來一片雲影黒乱衝渚煙開重帶江雨濕百里不終朝用捨從順適夕陽見晚泊堆疊紛襞積水雖物善利其􅂇乃爾益櫓江船一鉅魚櫓拖乃尾鬛當其淵水深棹弱不捄乏故令施航後前與棹力合濟川具有五此物乃其甲一聲天際來欵乃中流發我浮大河東並岸行􅀂狎終朝卧舷間蘭槳但空挿􅃡懷剡木皇智創万古法舟宿桃源縣長路風日凄逺征力難勝捨鞍事舟行庶便寢與興蓬底坐秋江􅋏如在韝鷹有時縱逺目汎􅀂􅀌槎星河從西北來􅀔建東􅀯瓴萬艘水上下浩浩無時停利名任風波醉著誰復醒閑看兩岸移轉盻煙中汀晚泊桃源下波光乱漁燈静卧船舷間拍拍風水聲舟人話夜潮使君老母驚又云此水樂君其細爲聽劉營田拜慶詩人生所欲壽有壽貴健安接物心思瞶曵履行歩艱雞窠日省定此又何足歎耿濟劉營田字太􅀄事親有餘懽母氏壽期頥髮艾顔渥丹歩趍不扶杖目視分遐􅀚怡神奚服餌終朝例三餐共云子致樂諒自家有閑結䄜見壼儀教児列時官豈惟一門樂化及濟岱間徳盛福自備百歳到不難朝家重貞静露恩不時頒行當見旌崇寵光爛門闌車簾蹙繡額誥錦回翔鵉肩輿王與陳一旦相追攀兹焉荅春寸草心能單我詩嫓彤管要作後代看食鱸魚鱸魚昔人貴我行次呉江秋風時巳過滿意蓴鱸香􅀄非為口腹物異可闕甞口哆頰重出鱗纎雪争光背華􅀧玳斑或圎或斜方一脊無乱骨食免刺鯁防􅁏膩勝海薊味佳掩河魴燈前不放箸愈啖味愈長張翰為爾逝我今赴官忙出處要義在不湏論行藏􅀝裝足朝睡且快所欲償夢驚聽呉歌海日方蒼凉長至日次赤岸驛扁舟下餘杭逺客逢佳節呼童起四更理棹未明發燈前一杯酒持飲聊自悦江行官有程貴重敢中輟此身得安舒行止聽驅䇿去冬一陽生露寢樂良夕餳茶雖草草􅀄不失家食今年赤岸亭野􅀫雜乱聒郷関天一涯雲水幾重隔殘年無定居餬口走閩越眷焉不無情念乆意為惻兩舷暗浪喧拍拍􅀂嗚咽􅀉聲紫山翁此懷多不别時任蘇州提刑平望道中今日風色好舟行喜清和呉江抵嘉興逺不百里過解衣坐蓬底閑聽呉儂歌大艑從東來㠶檣鬰嵳峩云是淮海公赴召躭微痾倉皇不少住進棹如飛梭物情忌太盛從者不得多尚餘蔽川載意氣隘兩河有懐陶朱公覇業到不磨功成委之去敝屣與棄蠡左顧萬金槖右顧西施婆可想不可見五湖渺煙波大安嶺乱山從閩來􅀔􅀂萬馬騁六丁闢坤闔通道取此嶺仰觀巳可怖􅀄陟戒太猛乗班亊推挽氣鬰頸生癭旣升頗平夷六折到絶頂最慮泥雨滑沙磴足易整俯臨盡黒澗一漫漲雲影佀矜吾年衰不遣見􅇖景一山􅀔兩殊限隔示外警北登儘坡陀南下峻深井牛肩抵風門峽束轉幽逈湍泉激南駃噴薄萬壑冷人生此兩足停輟不俄頃舉縁聲利牽走險不知挺我獨喜壯觀大嚼快雋永好竒與馮生比較略相等漢家截海表兹嶺乃内境行人無晝夜関史􅀄未省徒令踠馬足安用障巨屏暮投大安傳燈火破䆫炯吐我胷中竒削此疊嶂梗此事特游戯夜乆凍生頴控馭稍得冝雖險􅀔莫逞􅀺明呌雲去有懷為耿耿自淮口抵􅀫遷值風雨大作拖舟入清口適喜乱淮碧崔鎮抵􅀫遷徐行􅅻半日朔風殆警余不爾何凛慄江雲作陣來凍雨矢四集行撁人力微泥爛槽岸側打頭為旅拒遇淺殆鯨吸波神鼓餘勇洶洶波浪黒􅀔張互相薄力進硬與敵欹傾乃尋常簸蕩不少息秋江渺無涯終日困跼蹐夜眠任倒懸晝坐自撞擊試身一葉舟凌轢蛟蜃窟逺道胡為來行止吾豈必相值當耐何安順險能出有涂莫舟行此語聞自昔君看坦塗間風浪猶莫測處身苟無方徃徃半乹没居安貴不忘遇險戒無佚所以長樂老進諫及衘失行行入吕梁持守要愈惕吕梁吕梁世􅀁畏徃徃舟碎破我來相其衝說者無乃過南洪一石埌北梁更么磨水淺但湍急欲上船旋磨更縁暗石多重載防右左舟空人力衆徑徃彼無那豈云水至柔内極沉溺禍至人特爲名過者戒㣲堕舟行四千里冐渉銳盡挫髙歌幸無虞猶呼細􅀉聲畏塗間識者當有和秋澗先生大全文集卷第四
