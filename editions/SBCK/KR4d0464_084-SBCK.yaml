front:
  text: 秋澗先生大全集卷第八十四烏臺筆􅀘
  hash: sha256:8376ca46607e84c35f81dcd0b2ab8b4a7d7ce235201ce9b1349ad9d2632e14c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_084-1a}
body:
  text: 弹聊城縣官汚濫事狀今体察得愽州聊城縣周縣尹至元六年冬與部内良人妻阿曹通奸其秦主簿亦於當年秋前徃上口鎮倉部粮與部民馮貨郎女通奸俱各􅀻下用錢折合休和了當就問得本路司吏朱勉與所察相同今來切詳縣尹主簿俱係牧民之官承流宣化肅政風俗者也今侵犯部民其汚濫非違如此合行紏劾論中都䘮􅀕禮薄事狀切惟送終人子之大事今見中都風俗薄惡於䘮􅀕之禮有亟當紏正者如父母之䘮例皆焚燒以爲當然習旣成風恬不知痛敗俗傷化無重於此契勘係契丹遺風其在漢民断不可訓理合禁止以厚薄俗外據除六無問貴賤多破錢物市一切帋作房室侍從車馬等儀物不惟生者虚費於死者寔無所益亦乞一就禁止據此合行具呈皇太子親政事狀蓋聞武丁學于甘盤號殷髙宗孝宣起於民間爲漢今主以唐太視朝以子治觀政丗宗東廵以􅁢㳟􅁥國斯二君者豈特爲元嗣廣聦明逹民事而巳蓋將正神明之噐分夙夜之憂繫臣鄰之心慰億兆之望撫軍􅁥國皆其事也而賈生亦云太子正而天下定矣㳟惟燕王殿下春秋鼎盛孝敬日隆今者守中令領樞府然首居重噐未甞事事且古之聖人宜莫如舜尚歴試諸難用彰玄德以惲愚慮誠冝早正位號俾躬理庻務仰承黄屋之心俯署青宮之事如每歳春車駕廵幸上都燕王殿下居守陪京撫臨漢地握一府之樞控百辟之重俾睿智足臨日深治道又念方今聖天子以仁厚㳟儉率先天下而継軆者於稼穡艱難之事又不可不知也不然沿邊將士自較閲以來上下􅀒責不􅀩自新雖欲功過相當將何所明若髙秋馬肥奉將天威撫廵江漢以之頒犒禄秩赦宥過悞豈特旗幟壁壘精彩一新亦將作士氣逷蛮荆懷逺方安新附復有􅁬忠竭力建非常之功於目前者矣其争先怏覩謳歌慶幸倍於尋常万万也又省記頃者太子合昔歹在先朝時巳以位號之正判署教條親諭漢官兹非其事與能若是固盤石之基定天下之本計孰大於此者惲職分雖卑猥當言責國之大事敢冐昧敷陳弹􅀶州緫管楊庭訓不之任狀今体察到前􅀶州路緫管楊庭訓本官爰自宣州次官陞􅂶河間路緫管同知再考授􅀶州路緫管於今年七月内祗受宣命虎符􅂶延安府緫管朝廷恩􅀻待以不薄不期録連保狀輙自献投以延安爲下路欲難其行以少中爲稍降妄攀别例一意徼求有􅉻㢘莭兼照得之官程限巳有定例其楊庭訓自祗受以來經今四月有餘推延事故逗遛不行恐臣子之分不當如此事属非違合行紏劾第二狀近爲延安路緫管楊庭訓不赴任事巳經具呈未􅀩定奪切聞上臺照勘体察本官元行文卷意者豈謂憲司巳有先行故遲遲其意却縁惲体訪此事前後月餘􅅻方得實據本臺事理並不知㑹至於愚見偶與鈞意略同行之似不相妨縁元狀止弹本官爲路小官降故違朝命八十餘日不行之官至於自投保狀曽不知愧即係弹章中引據事意本非正情設􅀂在先亦有此等事體未甞紏弹儻今後更有佀此事同而情理深重者惲等合無其行與否據此合行載呈論河南行省屯田子粒不實分收與民事狀㑹驗河南行中書省咨該去歳屯田子粒一百萬石内明該屯户收分語句今體訪得止收到稲􅂖又馬料粟通計約四十餘萬石其收分與民數目至今不曽給付使失業之民二萬三千餘户徃返千里却於住貫般易糇粮以供朝夕貧者至嚙食草木陳告無所以致徃徃逃竄至有舉屯全空者切惟屯田大計當草創之際所冝務逺圗固根本開布恩信撫飬新集遵固予之道植乆駐之基不務出此將上項子粒公丈明該除數實惠曽不及民使官食前言民有飢色張虚數以要上知頋小利而歛衆怨旣非國家之便又非持乆成大功之逺略也其昧上虐下是属姦欺據此合行紏呈論河南分作四路事狀切見河南係邊防重地耕􅀾之大本所在今國家用兵江漢開置屯田示其乆駐非特取㐮陽而巳爲今之計冝分治撫飬以實河南根本爲急照得河南地方寛闊東西二千南北一千餘里跨州連郡大小七十餘城軍民一十八万户雖不及徃時實亡金一國也今止設緫府一道使都轄於上府治又處北偏東南州郡半與南界犬牙交入如唐鄧徐邳亳頴等州去京近者五六百里少有緩急其簿書期㑹徃返交錯首尾相應動輙月餘不惟辦集生受其實難以控制兼平時與多故事􅀔不同自攻守㐮陽巳來轉輸調度百色所湏取辦有司急於星火今而亦同止轄三兩州者張官置吏一體勾當縱彼人才固難􅀒荷此特官府之難易耳所可慮者迤南屯田大復壞散徃徃避役致有夅屯全空者其患在不􅊢州府衆人躭悞無有專任責者故也又值蝗旱連年軍民困苦譬猶群羊數萬􅀍擾不安雖居牧地且乏水草又令一人看管放牧未見其安且便也以惲愚見合無將河南地面分作四路以歸德爲一路而徐邳􅀫亳􅊢之以蔡州爲一路而陳穎睢息􅊢之以鄧州爲一路而申􅁉唐􅊢之以南京爲一路而鈞許嵩汝鄭延􅊢之其選任官吏比之常調増加品秩庻勉勸事功人争效用外據所該屯田地靣其府官令兼帶營田使職名於上提􅀧勾當外三路所有屯田户主常加存恤將彼此亊情互相照料撫飬其生業休息其困乏使一方軍民及居者屯者兩不失所方為稱職然後限以歳年責其成效以慿考較别議陞降如此庻得軍民兩安政成化理亊無矌慢邊防之重地旣安耕􅀾之大本又立以攻以守投之所向無不如意􅀂貪外虚内置巳有而不恤圗必争之要害是猶荒膏􅃾之地不為耕稼而求不可治之石田恐切為鄰人之輕且􅀏也外據眞定平陽兩路亦冝標撥州縣另立散府使直􅊢省部管領其於官民亦為兩便且免夫末大不棹之虞得強幹弱枝之道矣據此合行具呈論怯薛歹加散官亊狀切惟自古殿庭之間内而近侍外而􅀫衛凢有職掌俱帶散階理無一槩白身領宫掖之亊者今伏見朝廷一切侍從􅀫衛怯薛丹䓁官貟多係功臣子孫及歴年深逺辛勤勞績人貟據見掌職亊就中固分輕重上下終是朝家未曽普覃加帶勲散階號使寵異其身名儻議而行在國家大為恩惠於臣子益勵忠勤且古人有言人主之尊譬如堂群臣如陛階増則堂髙是近臣榮顕則人主愈尊崇矣今後合無將内外一切近侍環衛䓁官據見掌職事依驗色目普加散官如龍虎驃􅀐金吾奉輔國昭安懷定明武將軍之官下至丞昭忠尉之號更定奪俸秩為一代新制所謂立制自貴近始昨聞集議宫官服色是欲辨上下定民志也據散階事理誠冝先有定奪然後服色可議盖服色因官品而定而官品由服色而􅂋也伏乞御史臺照詳論収訪野史事狀切惟古者脩史雖野史傳聞不以人廢伏見國家自中綂二年立國史院令學士安蔵収訪其事数年巳來所得無幾盖上自成吉思皇帝迄于先帝以神武削平萬國中間事功不可殚紀近又聞國史院於亡金實録内採擇肇造事蹟豈非慮有遺忘歟然當間從征諸人所在尚有旁求備訪所􅀗必冨不然此輩且老將何所聞合無榜示中外不以諸色䓁人有曽扈從征進凡有記憶事實許所在條件或口為陳説及轉相傳聞事無巨細可以投献者官給賞有差如此庻望人効衆羙國就成書使鴻休盛烈晦而復明備見一代之史頋不盛欤論品官懸帶弓箭事狀切見國家徃年禁断弓箭事乆弊生中間似有未盡者今體訪得軍户斡脱弓手打捕回回等人皆得懸帶而外任三品至七品以下官貟皆不許懸帶據上項官貟重則控制數州小則肅清百里其間懸佩符命赴任在官徃返道路緩急有虞無寸刃􅃗矢以禦強􅁀是國家命官不􅀂打捕䓁户之有備也且此法之行止能禁絶良民近年所在失亊多係挾持弓箭馬賊其擅助賊威奪去民救莫此為甚據外任三品以下官貟今後合無照依品官合得舊例定奪佀為長便據此合行具呈弹甲􅈰首領官張涇影占工役事狀今体察得中都甲局首領官張外􅀰至元四年五年影占合造甲人匠劉仲禮􅀻下取要工價鈔四十四兩五錢却將本人合造甲数逐作抑令其餘人匠分造了當今就問得張外郎名涇是實據此合行開坐紏呈為驛程量事緩急給限事狀切見隨路每􅀊差遣人貟赴都如計禀公亊押運差發課程一切等物者旣還心欲速得到家不問鋪馬生受日行数站其馬疋不無走損倒死以惲愚見今後除軍情急速人貟外其餘所差人貟合無照依舊例量事緩急定立徃囬地程使各站出給関文於上分明書冩日行站数依上走逓仍令按察司体究違者治罪施行如此似望鋪馬少有倒死站戶不致生受為典雇身良人限滿折庸事狀切見在都貧難小民或因事故徃徃於有力之家典身為􅊢如長春一宫約三十餘人元約巳滿無可償主致有父子夫婦出限数年身執賤役不能出離又有親生男女詭名典嫁其實貨此又大傷風化其不可長其典雇身人如元限巳滿無財可贖者今後合無照依舊例令限外為始以日折庸准筭元錢使之出離其或典数口内有身故者除其死者一分之價至於願求衣食者聽外據典嫁不實者乞􅃊行禁止如此不致已乆成俗而雇身者免轉良為賤混淆無别不然迷失門户耽惧差役深為未便合行舉呈為不冝先浚新城壕壍事狀切見隨路連年蝗旱百姓飢乏者衆今春首農務將作大興力役擬浚治新城壕壍不惟妨奪民時切恐轉致困弊合無伺候秋熟舉作佀為未晚不然􅀂從重論理合先築宫城正宸極之位使内外有限以壯皇居然後宫室可得而議據浚鑿壕壍工役似未冝先行為春水時預期告諭亊狀近知得河間路任丘縣南史村軍户劉阿李為殘害海青事將本婦人處断訖叅詳在先為鷹隼海青公事然省部欽奉聖㫖遍行隨路出榜省諭而農民愚戅月日深逺不無遺忘兼海青飛舉動輙千里切恐逺方之人不知係是車駕飛放禽羽以惲愚見今後御前鷹隼海青合無懸帶記驗如前朝牙牌之制毎遇春秋飛放之時更令所司預期將一切禁忌違犯之事重行嚴切省諭使農民臨時又得曉然通知如此豈惟易避難犯亦不致悞有損害似為便當今後
