body:
  text: 蘇門林氏家傳林氏其先兖州曲阜人唐季有官閩中者後復徙家文登至逺祖府君翰蓋五世矣翰宋􅀄用貴贈率府率子諱文受知熈陵官至崇儀副使淮南路提無刑獄贈領軍衛將軍生子永終屯田貟外郎御史臺推直官累階贈光禄卿永生之純字嘉父曜景祐五年進士第釋􅄄主朝城簿河東犯横壠頻於不支㱕兵恟恟欲亡去公安諭遂怗然事集升知莘縣以屏盗有方受澶州頓丘令未幾恩信大行時麥黄木盛下囓孫陳埽岸􅀔危甚公朝服立潰堤上望濤頭拜禱波神爲霽威竟頼以安改佐著作淮陽軍事判官貳徐惠劾紀著叛獄有匿其家孥者註誤殊衆公爲辯理多致原釋郊禮覃􅂟加太常愽士知大名縣􅀄天王院五代時有韓王賜田甚廣􅀊乆失據鄰伍以僧妄冒致訟累寒暑不能决公按索隣劵考明封畔継得古石記與所按吻合以田付僧令􅀊輸常賦民乃稱服用丞相程公薦通判青州終得年四十有九官至職方貟外郎上􅀐都尉仍賜五品命服娶吕氏封京兆縣君恵和冝家之純生三子長曰舎字虚白年十九擢熈寕進士第性恬退以髙節自信甞有詩云世有非常樂人無未老閑未三十以大理評事休官名賢髙其行至方之淵明􅀄先生西遊共城愛其山水明秀廼營葬青州府君於縣西處賢郷古郭里母夫人吕氏祔焉自是林氏爲衛之蘇門人先生四子曰愚曰恕曰怤曰愚字貢元亦以莭行稱宋亡至焚香告誓不仕而殁仲弟介郷貢進士季弟㑹字貫道㓜知􅄝書剛正有志操由䕃􅀘郊社齋郎􅀄主成都􅀟流縣簿令乆闕攝公行縣事有能聲部内舊有􅢰􅀊例役並水民苴治貧下苦之公乃一責資漑家理辦仍揵石代土衆免告勞頻􅀊大稔調􅀫州司理叅軍暮夜民遺火延燒犴屋公出繫散置庭中比熄倉卒際無越逸者上官材之移南京軍廵判官民有􅆷其子執謀害人者按竟公至疑焉求情得白遂直其枉改新蔡令􅀊大蝗獨不入縣境人謂公廉平所致由韋城宰歷奉符縣秩滿授通直郎知蘇州常熟縣兩浙頻年大水引漑浦口湮閼無慮三十餘所累政謾不加省公按行故瀆率䟽瀹之民受賜不貲元祐庚辰疾終蘇之公館配張氏有淑德駕部貟外郎赤之女封壽安縣君生子男四人聽通直郎西京敦宗院愽士聦揔隱皆業進土自覉丱至成人太孺隂教爲居多聽生子五人曰巽兊蒙鼎革巽次子諱正國字徳將登金大定十六年進士第終少中大夫北京塩使生懷逺大將軍毗陽丞諱茂字漢卿懷逺二子曰思敬郷貢進士曰思德頴州軍仗庫使生子芳今任江南某府從事思敬府君之子即故衛州交鈔規措大使諱通字子泉爲人丰儀脩整顔渥丹鼻隆然如膽垂寡言􅀏善心計顧衛南北衝㑹貨財四通遂積殖興時逐然坐籌能擇人而任故物情得而掇世資生平喜賔客樂施予其克勤躬儉殆憂深思遠者屢以其術事上官獲精幹稱甞訓子珪曰林氏上世以詩禮傳家代有聞人予惟早失怙恃生長䘮亂間以餬口計處四民末業致貽祖禰羞諸孫稍長無忘讀書以復世範汝念兹無置府君以丙辰嵗終魚行里之􅀻居壽六十三配宣氏衛之大家主治内務寛健有母儀燕處榮飬期頥而終享年八十有三人以全福歸之子珪以孝義著稱能丗其父業甞任州三務大使次子璋謹愿克家珪子永大名府平凖庫使次子元珪奉遵先訓俾之從學其資藉啓迪乃心罔不盡不數年起家為中書􅁺至元丁丑予列職太史元來謁拜而請曰元無所肖似析薪之責固不克􅀒荷惟是先世行業非得名筆約而暢之將不能傳逺而人見於後先生尚胥曁顧予以林世叙雖邈其聞而知之見而知之者班班可紀加以世姻之好故勉爲傳􅄒之賛曰林氏本出商姓太丁子比干以忠諌死嗣堅逃難長林山易以定氏周衰枝葉扶踈散處中國如放之聞於魯顔之顯於齊囬以義著至以相名皆其後也繄南安之林唐已來世爲魯人豈放之苗裔耶道唐歴宋金四百餘載間奕葉以儒顯其流風善政表表于時者如是逮規措府君遭時艱虞家世中衰竟能渇追來孝俾盛德幽光墜而復續豈君子之澤其流淵且長乎南􅅠王氏家傳王氏皆王者之後春秋時王子成父者敗敵有功因賜氏厥後子孫散落中國在晋者靈王太子後齊則畢公髙後其在陳留者齊王和之裔汲郡王氏其先陳留陽武縣七圏里人起家壠畒耕稼河陂間宋靖康􅀄避地徙家衛汲縣長樂郷之白楊里逺祖金天㑹間積勞至􅂎縣尉髙祖見弟五人二翁是爲扈王氏􅀄妣父扈素長者聞髙祖賢舎而甥焉生子男五曰三翁四翁五翁十五翁十六翁人見其本支蕃衍稱扈王氏以别因之蓋不忘本也三翁贇譜叙爲二代祖生二子曰元用資頴異是爲惲髙祖自田舎郎改肄士業甞語人曰終當以筆代耕衆異其言及長補郡􅁺爲人英特棣棣有威儀主治曹務踔勅角切厲風發明昌􅀄莭鎮叅佐例朝授用薦者言迁河平軍都日官上官倚重有黒王殿直立節度之目㝷得􅁀疾卒魚行里舎時年三十有八人惜其年不稱德生經紀紳三子紀爲决曹紳潜德不耀曽祖經字伯常天禀孝愛垂髫已知事母容止如成人禮氣方嚴内長厚喜施與志不樂禄仕雍容郷間以徳度靄一時昆仲七人同居内外無間言以累葉不分家用饒足其賑貧施乏不掩爲偏惠人有貸弗忍徴乆不克償輙折其劵或來謝就復惠濟曰周急素所樂何謝爲一四家子要􅂵大絛來取所附興徐誡之曰農當務實士君子帶非送其家女弟嫁陵氏婿卞以俠犯女妹先君所鍾爱􅀂婿置於辟婦容匿㑹赦甞出郭門遇里農昜也堕焉取諸市可乎其人謝而去黨官府來求剖正爲諭之曰逺親莫世所末免親仁和隣古之善道􅀄無君子爱人以德曲直非所辯曰吾儕小人不昜慮至相戒曰今而後不可使長􅀂其爲一􅀖聽直欽服如此王氏北者尚十餘房其親䘮隨所寓權厝曽之晋村之南阜曽慮歷年乆斧封馬鼠漫不可曰吾大宗子合食族墓責實在我遂起新任大葬於長樂卿第四疃祖業之北原及舉祀絶者廿餘柩贈率有加凢内外男女孤惸無藉頼者爲娶嫁之姻禮踰巳出曽祖妣系出新中臨清関宋汲郡公吕氏之裔壼儀母徳宗属仰法焉生與曽祖􅀊月日同北兵破衛亦同時怖没於家春秋七十有六實貞祐二年甲戌春正月十一日也百年來里中􅀫􅂄談孝爱而内有則者必曽爲稱首生祖宇字彦宇身長七尺二寸儀觀清淑少傳家學􅀹明習文法至帖問條對儀精理當筆洒洒無滯辭行軰無居其右者甫冠遭罹板蕩業爲一空奮身從事卒不失舊物雅爲節度公完顔從坦所知遇由郡􅁺辟刑曹孔目官祖盡心庻獄要本情與法應未甞用察爲明情得爲喜也故郡中稱平至有哀矜折獄之譽􅀋注刑綂進禄䓁書旣而嘆曰後世知我罪我其此書乎生平樂誨人怡顔和氣不以已長格物雖童孺質問諄諄然無倦色有弗知未始不盡也今梁衛間由吏業而上逹者半爲門生遂以吏學授先君曰吾治獄平後當有顯者然前賢有言吏以法令爲師問而可知其能與否自有資才非學而可此汝㝡當黙識苐完之子鈞早失怙恃鞠育與先君䓁至一豆羮一裘􅄄必加顧恤正大改元四月十六日以末疾終新衛州横堤里之寓館壽五十有一官至敦武校尉祖妣孟氏女縣南草市榆林坊冨家姿貞順配祖德良稱旣誕先考以貞祐二年癸酉四月十六日卒於郡之故家再娶韓氏韓朱巳來世顯族有累階至司空龍圗者二十九處寡以健烈聞流寓勤苦保持門户甚力俾先君卓爾早逹祖妣資藉之方爲多晚􅄝道家教號妙清大元中統庚申重九日以疾終安仁里享年七十有六越三曰祔葬玄堂祖柩之左先君諱天鐸字振之姿精敏㓜知嗜學諸弟出遊嬉獨把書不置旣通大義先祖以律學授之即能下筆條對明䆒情法日蔪然露頭角衆謂能大其先業元光􅀄温國胥公自􅁗移鎮新衛尚書李特立聞其才由州户曹􅁺辟􅁠行部令史時上以御馬賜國公園曹取蒭粟比内廐例先君曰不可在閑則路馬旣賜則公乗内廐之例容得同乎公聞之曰王􅁺愛人以禮二年上黨公誾壁馬武虫爲河朔藩扜分羸兵四千人假食於胙適公儲亦無幾方風雪寒沍衆待哺閭井間公府議以聞先君進說曰張紏合義兵皆河北遺􅀺今飢􅀂是不􅁠冝以濟殆非從便副上官意也侍郎梁亨道爲肯首然當􅀂何曰今官義兩軍温飽有日􅀂以月給權輟半以應彼急河南漕粟計不時亦至如此則客主兩不失所行臺可其請孱兵頼以安活自是大爲省􅂙康瑭郎中盧芝瑭字良輔芝字建瑞二人号􅴻吏事所賞識曰㑹見􅂹足騰􅋮一日千里也正大四年用元帥完顔公公諱訛可得賊以火燝之号火燎薦拔所能試京師擢吏貟甲首時年二十有六方軍國多故財賦一仰都運司經度寔擇才􅁺集事即選充運司􅁺長先君夙夜在公游刃餘􅁉都漕李公芳字執剛承安二年進士号精政務同漕移刺呉和深加器重吳和中公字景先亦禁官入作司藏吏以計盗官物使髙世英受贜􅀄不知從來事覺吏逃失所在及科罪㧿事師肅執以監主爲罪首抵世英死先君争之不下至諳憲部詰辯曰原丗英情本非同謀第行盗後受賕耳據法議罪與元謀共犯不同髙止合坐贜論且法者固當公共師舎焉以即汝心是置法爲虚器上官韙之髙竟减死論后懷金來謁先君怒斥去曰毋汚墨我所争者法非汝􅀻也豐衍庫使劉濬字徳源愛民膀進士先君甞從問學以卒􅀄業以㳂代不審䧟名􅁓三十萬用是追解先君爲申理復官如􅀄五年􅀘睦親府􅁺属皇兄荆王判府事爱其德度深加禮遇明年秋皇太后崩制􅃝免親奔仆有逺邇之限違者從府科罪時有後期者先君請曰南渡來宗室播弱宜從寛宥王然之以爲知體園陵禮畢卒無有􅀍劾者六年轉􅀘户部令史時簿書財賦委積音漬紛至先君精力過人故務愈繁志愈明氣愈厲事愈詳不煩書佐裁决如流於是風動臺省有快吏元康之譽開興􅀄用入粟例補滿授户部主事壬辰天興東狩崔黨往往入宫禁􅀼取金貝或堅約同往以愻辭免乃切嘆曰端門不忍過其忍聞此京城下將士争入俘掠㝷有令禁止先君偕同志者突冒兵威禠救百餘口於南薰門下乙未嵗北還淇上㝷朝廷命断事官耶律買奴公括諸道户口柄用顓决得人爲急用薦者署行臺從事制以籍爲定互占它縣以死論有潞民馬醫常氏避役匿河内王帥家事露公抵常以死意在籍没州將且用聳動隣道先君辯之曰常罪止於逋論死則非制書本意公怒曰脫有誤並汝坐之反復辯明常竟􅀗免又王鳯翔者告崔帥立弟益侃匿金國珍寳適萬户喊失納國人受誅公抵益等以喊失罪罪之先君曰􅀄謀崔立今已死况罪不相及國有常憲公遂平反益䓁至有圗像奉報之語明年秋耶律公薨曰南歸或􅂆爲州縣曰一丘之木安足棲集來辭於齋壁以見意因號思淵老人􅀹􅂄春秋左氏傳西漢書晚年洗心於於華隂王先生名元礼天意進士第号王華子曰子學汝問自昔治少亂多君子寡小人衆何也非天一而地二乾陽方始而隂已爲之倍子得之矣集歷代諸儒易說爲一書題曰遇朔例一占玩辭明変其應如響下至天極等學皆通習之聞一異書輙自手録多卷交人劉冲曰何矻矻如是曰吾老矣爲􅀊戊戍詔試儒士時恩制寛或以乃嗣長可試先君曰吾思以義方爲訓􅀂以幸竊非常敢聞甞誠惲忱曰吾巳錯断不容再寒殍死無能一志於道以儒素起家吾殁則瞑目矣然學貴專精汝不見鑑瑩則乃能别物學苟不精如治鑑不明􅀅安用爲不學昜昧渉世之道不讀麟經無以見筆削之王吾平昔行巳得乎此而已丁巳秋八月以疾終牖下先君資剛明簡重善持論慮患深雅以大用自期人亦以此與之握瑜懷瑾群而不矜事莫可措手者率􅄖爲之不聲色少動故官守游䆠莫不尊德樂道問政質疑取决而去事巳率如教至吏筆縱横縁以儒術乃餘事耳又善尺牘作真行書勁韻有風格與人交以取容阿匼爲恥居家寡言􅀏以身爲律度人望而畏􅀂一官府然外事緩急不一言及家人非疾卧未甞見日而作三十年兩昜䘮􅄄年四十六既奪先妣或勧􅄪娶曰其如不可何老者継室又先余死是轉余於恤少者後予是吾遺累於後竟不娶􅀄試亰師時􅀫院夜夢人奉一首加胄曰持此􅀂名也及榜出擢甲首云􅀊丙辰秋惲亦夢人馳報曰汝父領朝拜且至􅃐出顧見先君朝服席帽乗而秉簡一卒跳梁馬首唱云翠㣲君節度使后三日先君遘疾乃以所夢上白曰翠㣲者太虚之氣夫精氣為物逰魂為変死生者晝夜之道吾固安之復何􅁨奥明年捐舘吁亦異哉先妣靳氏相州永和鎮人進士子玄之孫安陽丞顕思之女性淑善扵婦道良謹生二子曰惲曰忱孫振孫冝孫重孫鞬郎賛曰謹按家譜惲六代祖昆弟五人五代祖行一十三髙祖行一十五曾祖行一十九王父行一十四禰伯叔行六人由是而􅀚金百年間本支不為㣲􅆌然自䘮亂来或四三世五六世而巳者凡二十有四房哀哉唯扈王氏曁相之醫􅀶房歴八世而傳祀是豈偶然者哉惲􅀚西漢名臣往往决曹獄史致位槐􅁄雖云明習文法練逹故實至論身名烜爀㣧裔延昌必曰隂積所至王氏自河平府君而下累葉以刀筆承家職司城旦逮先考而業有光子孫迄綿綿于今視履考祥其亦有足􅆀然者邪烈婦胡氏傳劉平妻胡氏濵州渤海縣秦臺郷田家子至元平挈胡洎二子南戍􅀥陽垂至􅀫沙河岸次夜有虎虓然突来咥平左曵之而去胡即抽裝刀前追可十許歩及之徑刺虎劃腸而出斃焉趣呼夫猶生曰可忍死去此􅀂他虎復来柰何委裝車遂扶平携㓜渉水而西􅀺明及季陽堡訴於戌長趙侯爲捄藥之軍中聚􅀚哀平之不幸咤胡之勇烈也信􅀫平以傷死趙移其事上聞得復役終身嘻胡柔懦者也非不懼獸之殘酷正以援夫之氣激於衷而知有夫不知有於菟也平雖死其志烈言言方之太山號婦何壯毅哉賛曰桓桓壯夫鷙勇而夫事出倉猝変色蜂蠆烈烈胡氏憤物爲害義激柔􅂨氣簿於外視虎如䑕所天爲大平雖咥死婦莭則邁媛折熊衝藴刃賊軰彤管流徽清芬並代貟先生傳貟炎字善卿同州人性落魄􅄝酒業詩有能聲不事生産大元巳亥􅀊故人楊紫陽主漕洛師􅉖其窶用監嵩州酒時兵後邑居榛荒日與鹿豕伍非所樂也巳而隨所徴上謁楊方據按坐堂上吏鳬鴈行立貟挂布囊腋下杖巨挺直前曰楊使君不相知置我於此幾爲老羆所噬此汝酤鏹持取吾不能爲汝再辱遂揖而去其䟽誕如此自是長遊河朔以詩鳴諸公間其洛陽懷古分韻得髮字云東雒打空城北邙連督闕懷古動悲吟逺客生華髮隆德宫云林花細妥烟脂色水荇輕淤翡翠泥歌舞留連嫌畫短樓臺䌚緲􅁴天低讌集東平湖亭北海樽前人似玉東原城下水如天滿服荷華三百頃採蓮人語隔秋煙髙唐道中影􅀌海内干戈滿愁入天涯草樹低桑柘影空蚕已老陂塘涸盡燕無泥濟南金線􅀫雨乍收雲葉断猶疑電影掣湖心扇尾羊云馮翊春草香羊綿柔毛食飽飲苦泉卧沙稀助瓊筯細帶霜小耳春繭圎扇尾一方移種􅀋風頭萬里摇腥羶吾生本無食肉相不煩浼手愁烹煎馬酮云謾􅀃千杯不醉人清光壓倒洞庭春携行何用紫絲絡渇飲不煩烏角巾摇動革嚢成醖醸封藏花盎作逡巡坐中一混華夷俗或有豪吞似伯倫予時能憶者止此西歸過衞先君館焉􅄄衣麻屨酒近酣巨挺横膝上掉頭吟諷歌謡慷􅁣之氣軒軼四座素不能􅀐乗人強之輙色变隋地或以詩戯云靴有鐙青雖可愛面無人色實堪怜甞懐金一餅曰鎮心不可以闕此後用以昜妾継為人竊去家居壁四立餘詩藁酒瓢而巳十七復有撖夅字彦舉亦陜人面黯􅃤目光􅀑物憑者少為里嗇夫􅀄不解文字一日忽能作詩􅄍竒怪語皆古人所未經道雖苦無義意其豪侈軰属和終不能及中元冬見予於燕市酒樓浮大白數行徑出歩壚間嚶嚶然吻作露蚓来扼余腕忻甚曰吾有以贈子其詩有氣凌太華五千仞詩繞國風三百萹之句醺酣中惜不全憶也嘗謁淂禇幣􅀂干醉過里井即投其中曰爲爾俾子區區若此奚用爲其狂昜如是後客死保塞殯西南門外路北若干歩掲曰詩人撖厶墓詩三卷號凾谷道人集好亊者刋行于世墓誌銘金故忠􅂋校尉尚書户部主事先考府君墓誌銘先府君諱天鐸字振之族王氏其先陳留郡陽武縣七圈里農家避靖康乱徙居衞汲縣長樂郷逺祖有積劳官祀縣尉者曾祖府君諱仲英特有威望終河平軍莭度府都目官祖經諱不仕天性孝愛鄉黨化其徳􅂋考府君諱宇衛州刑曹孔目官精文法表表為吏學師官至敦武校尉先君少聡敏􅄝斈不為羣児嬉讀書通大義先祖授以律學即􅀎下笔論断推原情法誾誾如老成人衆謂父良為教子􅀎丗其家矣正大􅀄自州户曹辟􅁠行部令史時哀宗以御馬賜行省英公圉曹􅂑芻粟欲内廐例同先君曰在閑則路馬既賜則公乗内駟之例非􅀁敢知公聞之喜曰王􅁺愛人以徳矣上黨公闓壁馬武京爲河朔聲援以餽餉不継間羸卒四干假食扵胙適公儲亦無㡬部議以省聞方凨雪寒沍衆待哺閭井間先君進􅀃曰公府紏合兵力皆河北遺黎今飢􅀂是不􅁠宜以濟殆非徔便副上官意也侍郎梁亨道為肯首然當􅀂何曰今官義兩軍温飫有素􅀂以月給􅁠輟半以應彼急河南漕粟計不時至如此則客主兩不失所可其請孱戍賴以安活自是為省叅康瑭郎中盧芝所器識曰㑹見駿足騰􅋮一日千里也正大四年用元帥完顔公薦拔所能試亰師擢吏貟甲首時年廿有六方軍國多故經費一仰大農調度即選充運司案長時李乾州芳承安二年進士字执剛移刺吴和領漕計號精吏務先君夙夜盡公審㑹明當二公称其􅀎入作司吏以計盗官物使髙丗英受賍􅀄不知􅀁􅀙耒事斍吏跳失􅀁在及科罪􅀙事師肅執監主為首抵卋英死先君争之不下至詣憲部誥辯曰原丗英情本非同謀苐行盗後受賕耳據法議罪與元謀共犯不同髙止合坐賍論且法者固當公共師舍焉以即汝心是置法爲虗噐上官韙之髙竟减死論后懷金來謁先君怒斥去曰母汚墨我􅀁争者法非􅀻汝也東豐衍使進士劉濬以㳂代不審䧟良􅁓三十萬是用追觧先君爲伸理復官如􅀄五年􅀘睦親府􅁺属皇兄荆王判府事爱其徳度深加禮遇明年秋皇太后崩制􅃝免親奔仆有逺迩限違者徔府科罪時有後期者先君請曰南渡来宗室播弱宜􅀙寛宥王然之以爲知体園􅁜礼畢卒無有􅀍効者六年轉􅀘戸部令史時簿書財賦委積音漬紛至先君精力過人故務愈繁志愈明氣愈厲事愈詳不煩書佐裁决如流扵是風動臺省有快吏元康之譽開興􅀄用入粟􅀘􅀂授户部主事壬辰天興東狩京城下􅀅士争入俘掠尋有令約束先君偕同志者突冒兵威禠救百餘口於南薰門下旣而北還郷里乙未嵗朝廷遣断事官耶律公括諸道户口柄用顓决得人爲急前省􅁺李禎巳佐幕府薦先君於公曰王某予弗如也遂署行臺從事户制以籍爲定互占他縣者以死論有愛民馬醫常氏避役匿河内王帥家帥名資荣事露公抵常以死意在籍没州􅀅用聳動隣道先君辯之曰常罪止於逋論死非制書本意公怒曰脫有誤並汝坐之反復辯明常竟􅀗免明年秋買奴公薨雲中南歸讀書飬晦以厚所待或􅂆治生曰非予􅀄心也􅂆仕州郡曰一丘之木安足棲集日以經史自娯􅀹􅄝春秋左氏傳西漢書其天文術數䓁學皆通習之年既加一洗心於昜甞質問於玉華子先生名元礼華隂人從衆進士大有所得一日先生發問曰自昔治少亂多君子人衆何也先君曰豈非天一而地二乾陽方始而隂巳為之倍歟玉華子曰子得之矣集歷代易說為一書題曰王氏纂玄且見吾遯世無悶也嵗戊戍詔試儒士時恩制寛或以廼嗣長可從師取應先生曰以為利非敢聞命甞庭訓惲忱曰吾巳錯断不容殍死無􅁺習能儒素起家其荣多矣然學貴不見鑑莹則乃能别物學苟不精如治鑑不用爲不斈昜脉渉丗之道不讀麟經無以見正吾平昔行巳得乎此而巳年四十六旣奪先妣或􅂆之娶曰其如不可何老者継室又先余死是轉余於恤少者後予是吾遺累于後竟不復娶淵老人􅀖君游䆠咸尊徳樂道問政質疑無巳率如教丙辰春平章趙公璧以書來聘時已克往明年丁巳秋八月十有八日考終牖下享年十有六官至忠顕校尉夫人靳氏相州永和人進子玄之孫安陽丞顕思之次女貞静淑善光備婦生二子惲忱先卒用戊午春三月葬汲縣親仁郷新任先妣祔焉先君資剛明簡宻議論長慮患深以大用自期人亦以此與之握瑜懷瑾群而不矜當官宰務人莫能措手者率􅄖為之不聲色少動外事緩急不一言及家人至於吏筆縱横縁以儒術乃其末耳又善尺一簡而盡書勁韻有風格作楷字日滿萬聞一異書佔畢如不及多積至千餘卷友人劉冲見之曰何自苦如是先君曰素無長物非此何以遺子孫其逺大如此所交皆一時名士以取容阿匼為恥生平非疾病未甞見日而作三十寒暑兩昜裘􅄄居家寡言􅀏以身爲律度人望而畏爱􅀂一官府然嗚呼先君㠯刀筆起身垂聲當世於先業為光大惟其秉彛粹㦤思欲克其所未至進進焉不容自巳絶不齒故習一肆於學根極群絰務明大本復旁通天人之術以濟厥用其修已應時開物成務之志是可涯際邪然時與命捩壽止於斯不獲卓犖大見於等聆風樹而含悽履霜露而興感抱昊穹明之氣也愾想平生鏤兹壙石庻幾慰安神靈永閟窀窆之藏銘曰繄扈王氏世業髙曽而下􅁺習同大風泱泱動南􅅠於爍先子德一日奮起蛇化龍樹立先業何光融獄唯平反匪厥躬要以明恕剛而中廷平釋之唐有功漢二千石世業公剖裁錯節輸神鋒庻幾凛凛德譲風盧淵日入不可瞳布衣歸來黙而容春秋大昜羅心􅅐跡蟠於泥氣則虹冀北一顧凢馬空道雖人弘繫其逢維弗卒施爲世恫兒能讀書亢吾宗白首孰計逹與通閉門􅂼水􅅴長終翠微之居窈以重一僨不起胡凶悠悠大鈞問無從太行西峙泉流東九原盤盤佳氣葱䰟􅀆歸安此新宫先妣夫人靳氏墓先妣縣君姓靳氏相州安陽永和鎮人永和自唐歷宋爲名縣鴻儒鉅族代櫛比出靳氏其一也家故饒財世以孝義著聞郷里祖諱師楊字子玄舉進士賦聲􅂣屋間以恩賜第授彰德府教官金百鄴丁論人文之選者殿元爲稱首以外祖其季也爲人儀􅀚秀偉髯滿喜馬滿經犬游獵横漳間有河朔故家豪習甞官安陽丞生二女先妣其次也姨母適李氏今爲召居郷里有一子旣王氏先祖時已殁祖母韓性貞明持門户益嚴先妣孝飬恭順故閨門内事僅絲髪比不敢專須請之后行祖母以是賢之非大故未甞踰外閾姻黨有以合二姓㑹諸親者先妣與焉里中諸媪至顧而不知爲誰平居課兒軰讀書傍治絲枲湏夜分乃休樂聞古人毋儀女誠及善惡興衰等事怡然有得至窹􅄰思服旦起爱晴隂問或旱則清澡溢則霃陰輙愀然不懌曰􅀊功一失􅁨有大於不然喜津津見顔先妣性温純慈祥居家容儀無啞啞言􅀏人物不忍少傷内外以厚平生不能昜物心慊慊惟恐我之人也世方以服飾相髙羽耀閭閻間甚者託燕游以􅀻謁為事先妣聞而之朝夕志女功主中饋􅀍服在躬承祀孔時甞以事當出乃歸而不自安者移時其幽閑貞順之德蓋可知已嵗戊申夏六月竟以憂勤致疾越明年已酉秋七月廿九日化于􅀻居之適􅃦壽四十有五先君識明達旣失内助断不復娶祖母惓勤稍以内事傳新婦推氏每取先妣婦道是訓因追悼曰汝如醮王氏二十有五年有子有孫未甞以王母自居失為婦禮勤巳至矣不􅀗少慰劬勞而止於斯可勝痛哉嗚呼天道悠悠報施善人果可必而恃邪故臨終嗚呼哀哉天妥惲可罪而至此極耶追念祖母疇昔之言穩然恫於心故茹哀䘖恤於兹八年是伸荼毒慰下泉發幽光而圗不朽冝銘德莫􅀂哀號泣涕以畢其辭銘曰坤柔之德婉以從徤而幹蠱匪婦功伯􅁎之卒謚以共淑先妣柔所鍾主夫中饋成肅雝春秋承祀􅀍憧憧善人􅀗報天乃公嗚呼福壽不一逢歸咎無處侗厥躬􅄶祔無憾哀送終萬家之原偃斧封泉流可竭恨不窮故權左司都事趙君墓銘君諱謙字和之世爲蓋州人中統元祀用薦者言以材幹􅀘行臺左三房提控令史二年春考政上都與予同游居者數月用是情好日洽夏六月闔臺南還君爲中省苛留乃以都司擬之作駐久計君怫然不樂求亟去甚銳事業巳不許信􅀫疽發於腦户呻吟無􅂓殆不能堪醫庸藥妄一刺而肆裂越三日予與楊易州恕謀曰常山􅅑醫麻澤民今之俞跗也􅃴召至􅀂禱於院使王君儀之可一來救藥凡三往得請踵及門中使趣去之自是内侍不出者幾浹旬後五日夜聞君聲漸嘶執燭起視向壁卧頭岑岑不舉矣比明氣惡逹户外傔從止一老傖戇且愚瞪不知􅀂何訪求知故無一人予惻然感傷冒臭惡易衣衾悓其疾緩急困則對榻衣寢自疾亟迄蓋棺凡五旦夜得年五十有七實中統二年七月廿有五日也嗚呼哀哉以義以友䘮無歸責寔在我旣歛詣堂中請曰吏趙謙以官守客死禮以公給䘮郎中賈君仲明怜之官爲􅐠緍錢千躬爲護䘮大都城東門郊外􅃴表親徐貞者至付之俾轊載歸燕君短小精幹審於吏計蚤􅀊從事課府以廉介稱杯酒間言􅀏啞啞殊不知爲肅慎氏之族也术甲偁者聲近趙家故以趙定氏云銘曰志樂而奚庸氣信而弗窮曽不知安於命而爲通也心與事捩卒與楇逢柰何乎趙公故南塘處士宋公墓誌銘并序南塘處士宋公􅂢館之九年當強圉赤􅁬􅀂千挿亥夫人魏氏奄棄榮飬仲子継祖䓁託叅卿趙禹郷致其命来請曰先人墓壙未克埋銘今將啓堂祔安妣䘮于柩之左窆有日幸吾子速銘以光大事某追惟雒尹平生之言重以禹卿孔懷之義爲次序之公諱珎字子玉姿秀偉有德度早能詩華玄深造理窟散髮揮塵瀟洒有出塵想故中書令律公一見偉其貌竒其才至贈詩稱與有柱石中原之目遂薦爲朝廷侍從官旣而歎曰吾志在長林豐草清泉白石金馬玉堂非所樂也乃辭去中令復授以資便職亦不就嵗甲辰自雲中徙家燕都得金溝水南形勝地十餘畒䟽沼種樹中搆堂曰麗澤碧瀾秀樾景氣二勝日以琴書自娯教子孫爲業野服髙閑漠然以世務不攖其懷然性喜賔客樂觴詠所交皆一時俊乂如王慎獨之愷悌張隣野之諧傲藴藉如楊西菴才鍳􅀂姚雪齋王鹿菴之品㓗一世商左山之凝重朝右毎光風霽月過其居者燕樂衎衎必極􅂬而後去太史公云視友知人公之行巳槩可見矣夫人魏氏有賢淑行輔承内治能遂公􅀄心四子㓜服庭訓皆賢孝􅀒藝學長曰紹祖少中大夫河南府路緫管次継祖不仕次光祖侍儀法物庫使次仁祖以琴阮供奉孫十人曽孫四女孫一十四人時莭賀􅂟蘭芽玉樹瑶環瑜珥秀映庭户以次列拜上酒介壽公與夫人亦舉觴酬酢一家之内樂融融也公以至元巳巳秋八月考終牖下春秋七十有七越明年庚午冬葬大興縣招賢郷之南原夫人之殁實至元十四年冬十月廿五日也夀八十宋氏上世本蜀城都人逺祖有官言州之吉郷者遂爲河東人曽祖元祖信考章俱有儒行不耀其幽光潜德發於公之身者冝咺赫然公復謙抑不盡享其篤祐遺其子孫至光盛如此銘曰名藉朝端身心考槃貞不絶俗道出夷惠之間以儒雅而擅一時儋天爵而享髙年服食華鮮子孫滿前彯纓􅀂綬照耀後先没而從祖是之謂祉全我銘納壙復慰下泉千年而見白日尚知爲青山白雲之僊大元故蒙軒先生田公墓誌銘金源氏踵唐宋舊制以舉業取士號稱文武正科大定明昌間人材軰出天下英雄盡入吾彀中南渡後境壌蹙時事艱其自淵源見聞中來者多􅁨深思遠忠義􅁬發懐﨣﨣干城之志况其風聲氣習歌謡慷􅁣而有故家遺俗者哉公諱文鼎字仲德姓田氏其先京兆醴泉縣人曽祖俊正隆􅀄董汴宫役因家太康之侯陵祖秀徙居􅂪城遂占藉焉祖用御史君貴贈上輕車都尉鴈門郡開國伯妣尹氏贈鴈門郡君父芝貞祐二年進士第官至嘉議大夫鎮南軍莭度副使資雅重有相望妣楊氏鴈門郡君公生而爽朗稚時巳軒露頭角棖觸物論爲竒童甞問學燕山張融一見即以不覊許之爲人有膂力善挽彊汴京受兵得請於香林先生應募自効執政以公書生年少初不之重及觀其拳勇誡以方畧詢之宛如􅀫將射敵慮無遺䇿以勞授武節將軍西南面元帥府緫領仍佩金符以寵異之京師飢遣公將五百人取封丘麥旣還去城逺倐千􅀐來襲衆欲鳥獸散公曉之曰彼􅀐我歩􅀂前􅃒後蹂逃將安之即分爲二隊相去各里許結陣而待戈矢外翼􅀒者居中轉戰轉退手先作氣敵叵測不敢迫比至城不亡斗麥一卒執政才其爲命監鄭門前後出活飢民甚衆汴梁下縱民四出護二親北渡時同發者數百家奉親外救死問疾徃來保庇不少倦如渾源劉祁母洎祖母病死半涂二子相顧號泣而莫之何公爲死瘞生􅀒兩皆得所其處患難中自捄不睱能急人之急如此何義烈哉遂來居相下以飬親讀書爲事索米􅀒薪日供所需以盡子職旣而應廉訪劉汝翼辟爲幕察官時朝廷逺駐龍朔凢上計三往返事集而無難色􅀊壬子輔國賢王定封彰德爲分地擢用賢雋特授公爲本道課稅所經歷時持政者多不法公諌止不從即投劾去後果敗中統􅀄又爲叅政商挺辟署河東行臺幕属無幾罷歸公少􅀒氣挺莭持論髙料事明義之所在勇於必爲自視以爲一世竒士幅巾藜杖掉頭吟諷不知去古為逺邇惟其學髙六藝名重一時􅀖君時相争以禮幣招致尚期有可爲而爲之者然以太剛又不屑取媚於時故其抱􅀒治具竟百不一試晚節與西巖張豸緱山杜瑛以詩酒自嬉不復談經世事矣臨終語其子復曰士之出處莫非義命道行志通伊周不爲之㤗道窮志湮顔原不爲之否從古迄今有才不遇窳死溝壑者豈獨余哉是非所當戚戚於吾􅂨也蒙軒其自號云公善作詩工書學遒麗有楷法至於丈尺大字􅀹極精妙云癸酉春二月七日以疾終廣川客舎享年六十有三夫人􅂟陽李氏系出唐薛王前進士司農丞無黨女共儉淑善母道光備教子孫有法白首一莭安公之貧後公八年辛巳􅀊亦二月七日終於家壽六十有八生二子一女嫁士族子復傳家學有詩聲終河間漕司從事衍冨文學通吏事由憲臺史轉􅀘中書今爲禮曹主事庻克光紹遺緒云孫六人曰伯耕曰叔耘叔耨叔耜曰重曰某衍將以年月日舉公柩葬彰南新再拜來請銘雖後進甞􅀗拜履綦知公爲頗詳旣序其行已敢以生平底藴未克展盡爲士論所痛惜者銘之銘曰士貴尚志趍事赴功况作而行之廼士夫之所崇矯矯田公繄時之雄振靈脩之逺駕思從事而匪躬文章足潤身之具才武見將領之風桓桓蔡挺明夫戰攻解臨機而制変張國威於小戎奔走急難􅀏談折衝朔漠三往兾群一空顧􅂚職而弗辦曽漕計之是供政不我俾坐困簿叢寕窘澗阿肯與彼同利器百而不一試在先生爲不逢道義蟠􅅐伊周是宗旣得䘮之不我與吾胡爲而戚乎􅂨有軒曰􅂪獨善固窮閉户讀書飲水長終人邪天邪問大鈞而無從惟子孫之可卜見德澤之所鍾繄臺閤之就列蔚珪璋之顒顒洹流毖北太行之東雖髙深􅀆易位尚知爲􅂪軒先生之封故正議大夫前御史中丞王公墓誌銘并序至元二十六年二月丙辰辰刻正議大夫御史中丞横海王君以疾卒于􅀻第正寢歛有七日其子庸彛軰縗服纍然持事狀百拜以壙銘來懇以義以分有不得辭者公諱復字子􅀄􅀄名趾麟伯其字曽祖瑜大父松世家滄州俱隱德不仕禰府君諱昌齡金季甞游䆠河南大梁亡起從恒山史矦叅議軍府事後以公命來攝衛州事有惠化於民惟君噐識早爲經略公所知巳未冬自齊絰中起君襲父職仍領州務明年中統建元真授衛輝二州同知又明年昜州而路就陞貳揔尹君遵守成憲越先正有光至元甲子轉官制行授朝請大夫改倅彰德路無幾以德望入爲中書兩司郎中調議宻勿宰相至以佳士上聞魏河朔鉅鎮吏重而俗囂號難理特輟君以少尹來治廼曰清心不如省事省事莫􅀂先殺吏權於是汰冗濫屏姦惡絶􅀻謁尚德化民有李氏者珥筆構黨持短長嚇官府張甚君發其姦杖踣之萬喙稱快自是闔郡嚮風書葉飜香曹務爲清簡八年辛未春自中書舎人出知歸德府府居河下流其秋水大至環城爲海衆胥沉爲慼君廼督櫂師浮舟楫濟民於丘陵林木上遂相水衝循横堤䟽二渠一注汳瀆一逹河故道水隨退得􅃾田萬頃佃貧民仍請廩粟得萬五千石活飢殍者旣而復揵治囬龍堤􅁑邑口於府西以絶永患曰烏可使吾民重漬于泉故水去而民益親継丁母夫人􅁨去職未朞詔起君􅂶河南道宣慰副使國家方有事襄漢順流以成破竹之􅀔故軍需百色羽書交督急於星火一責於我中間籌辦君力爲不少時大軍復東掀五河戰力而餽乏河走凌蔽川不昜轉致衆艱於行君毅然以漕事自任至撞氷東下一夕凍歘解軍威藉以振衆且服君事不辭難而害不苟避有如此者明年超擢陜西四川道提刑按察使尋進拜嘉議大夫行臺御史中丞用􅎓才選旣署事有告蘇州應草竊以城叛者或議調急兵徑討公曰維揚去呉􅂊三百里不當猝有此変恐憸人流言激之閧乗間以利賄耳與省議合遂駐兵近郊偵其實継發未晚巳而果如料呉人得無虞而妥其臨大事處置明審例如此淮甸沃壌千里公於上前論奏冝設農司募游食者開耕屯以盡遺利􅀂爾非惟實内地且威剔遐陬坐銷外侮韙其議付有司施行俄加正議大夫徙按河東山西道以事免歸居三年竟以疾醻之遂至於斯哀哉享年六十有四前後寵錫凢十有一命官極通貴哀榮終始不為未遇以是月壬申葬汲縣親仁郷王尚里禰塋三昭首穴夫人夾谷氏前公卒再娶夫人秦氏生二子曰彛曰範範前公九月􅁀卒二女長安歸徒單衍亡次適趙常曰夫人杜氏生子曰庸二子並愿而有文學皆公所自教云曰子度曰女夀適陳氏皆先亡孫二人曰青牛範之子一在褓公為人器量弘深有經史學善持論識変通無贅言居飬甚重周防甚謹及開物成務當其可為推致所學惟恐不臻于極然事無巨細率以大躰中持恥近効取譽所謂以道事君者近之至威儀柔嘉小心式訓又􅀋夫仲山甫衛武公之行巳承㫖鹿菴王公人品清峻慎許可甞詔公舉可執政者廼以君名進奏其経濟德業可知巳􅀄官河東時憲府争索􅀮幣以副上需分司者不計應否悉掩為巳功弊乆恬不為恠至是公以前行没入十萬餘緍盡給之民又平陽府胥有以母䘮甫窆輙從吉執役者公曰忘孝之人胡可與處廼按而斥之其惜躰正俗又如是可書者尚多惟著其繫夫事之重者恐亦公之志也歟銘曰大學爲道將何爲俾明一德新民彛行焉而底善是依要本平治先修齊俾明厥體用或違其在孔學非吾知倬哉王公天秉􅄮自穉細行􅀄不遺􅀂考翼事子肯基一日雲厦盾巍巍楊歷中外厚自持柔嘉維則非公誰又復當用行不疑翰音登天翅屢垂越􅀂有物中縶維從心罔單體弗羸期於俯仰無忸怩人或咨惜我則熈以道事君其庻幾六十四載麟儀儀綬何􅀂􅀆印何纍賁夫松檟餘光輝天其或靳將後貽俾爲清廟璧與圭奉之天門光陸離仙山東麓朝氣霏佳城欎欎君所歸殁而從禰爲受􅁵足慰下泉含􅀏嘻零落不必西州悲我銘昭昭惟昧詥秋磵先生大全文集卷第四十九
