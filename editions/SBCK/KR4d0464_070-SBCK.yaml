body:
  text: 衛輝路緫􅃹府重修帥正堂䟽伏以聽共民亊必先處所之安絡繹星軺無匪玉人之重顧衛輝之公署寔民庻之具瞻起蓋年深䟽陋日甚飭傳舎固為微末論揔治此則本根今將重搆一新増光六縣俸稍先輸其兩月餘力湏藉於衆官􅀔惟乗其一時工可就於不日清香􅀞戟雖云都尹之居聖莭公筵永祝皇家之壽敢祈同志各署芳衘楽籍殷氏醵金䟽量珠買􅀏空憶當時餬口爲生重過故里李弄玉幾年西邁杜秋娘未老東歸載瞻光禄池臺緫是舊遊桃李楽籍殷氏者名香佳麗天賦芳温曽􅀅兩字風流占断八州煙月此日紛華都識破向來心事欲誰論鳯凰臺上有伴吹簫鼔笛􅂣中何堪把色與行丏歌姬之院且少分隣燭之光万水千山得得來一瓶一鉢垂垂老桑間游女固能憐暮雨之詩芳草王孫尚不棄春風之面倘霑餘潤儘冨歸裝多寡隨冝以疾爲妙謹䟽李府君建碑醵金䟽故汲縣長官李公天祥素􅀒義襟號稱能吏急難多國士之風宰邑有桐郷之爱去世能幾日有家爲一空短碑卧草未覩瑶鐫孤壠含悽豈勝冥感凡曰相知之舊能無墮涙之傷庻少分魯肅之囷共建此陽城之碣睠言故里永賁幽光請靳􅂋卿山陽闡庠䟽切以嬰孩教子貴在父兄詩禮承家必資師範伏惟顯卿學師性資純厚賦業􅄖長規模有乃岳之風句讀傳故家之習乆訓蒙於柘里今閑處於山陽煩於白社之間載闡青衿之教邑雖十室使盡為忠信之人喜動七賢不􅀒此風煙之勝恭惟短䟽具列同盟重修㤗山廟䟽伏以物有生死維岳主司事至微湏人興葺睠新中之左地儼㤗岱之行宫當年廟貌壯麗有餘此日嵓廊摧毀無幾頼陳將軍之果毅曹郷老之經營一備糇糧一鳩工役周垣己興於百堵正殿將復其五楹度其工之寔繁計所費以不少􅀂憑衆力可見成功使車馬風雲喜降臨之有所官僚户庶獲福祐以無窮謹䟽重修河内公廟化縁䟽惟公德並群哲材優四科爲􅀖致三善之稱折獄有片言之譽顧瞻喬木懷想其人况此蒲郷寔維舊治民淳訟簡猶沐休風世逺祠存不忘乆敬然塵昏像設殆緼􅂁弊故之餘草滿露壇起燕麥動摇之嘆惟夫興葺可表尊崇凢我同盟義當少助謹䟽省齋裴先生建碑䟽伏以辭焉不愧縁景行之獨髙得之無財於人心而能恔故武昌節度同知省齋先生两朝名士一世龍門在鴻文大學之間有瑞錦秋濤之譽里雖稱其通德墓未表乎豐碑眼中縫掖半門生身後殘膏丐來者知歸報本復有望於諸君礲石劖銘庶落成於不日嶷嶷麒麟之碣輝輝星漢之光匪惟裴氏之􅀗安誠亦士林之羙事爲耶律伯明醵金䟽伏以分財曰恵莫先賙急之心見義當爲切戒後時之嘆伯明秀造􅃮水東丹之後右丞文獻之孫學則有餘空至於屢為子娶婦禮尚未完急手謀生力有不及顧同志多狐貉之列忍一家有風雪之寒少分半宴之資可合二姓之好倘蒙薄助請署芳題張漢臣醵金䟽張漢臣者監司故􅁺淇奥諸生緼􅂁傷此日之貧客舎歎故人之雨心􅀜桂玉連阻風波旣乆淹吏部之除未免索長安之米况臺閣半爲郷舊而燕雲古有義風哀王孫者丗爲㝷常付裝資者日云不少舉舡望恵才固匪於建封指囷不難時豈乏於子敬滴水而爲恩於目下奉千金而敢忘於他時困涸能濡多寡唯命梁彦升醵金䟽太原人山頽木壞永哀賢哲之萎髙上坎中未遂窀穸之􅉎兾彼齊卿之恱傷哉季路之貧前進士太原梁公子彦昇詩禮名家羮墻純孝思雙親而不見抱孤影而自怜秋草萋􅀆恨隔於九原春露濡而履兹者二紀惟得脫􅆖而􅉠乃能大事之㐮四十萬非敢望於郭代公五百斛庻少分於范左相凢爲同好寕不興哀淇水東傾渺逝者如斯之嘆太行西望慰異郷乆客之心大継長醵金䟽國破家士老作無依之客衣單粮絶誰堪卒􅀊之憂大先生継長者渤海名家中朝顯䆠功名冨貴竟無有文彩風流今尚存黒貂盡季子之裘短布􅂊寗卿之骭雖黄髪髙年之列柰清霜九月之寒甘餓陪於西山束荆薪而煮白石哀哀漂母進簞食以無難戀戀故人贈綈􅂁而何有大凢同志能不興懷所願不過一金未免上煩多士謹䟽南宫縣文廟三門化縁䟽切惟衣無䄂領難以爲全行舎户庭將何自出南宫廟學修建有年大殿旣完兩序已具獨臺門而未稱在衆意以未安湏資多助之方可就三楹之勝雲煙動色􅀊來泮水之芹雷霆乍驚玉振殷人之輅倘垂重諾請署芳銜滑州文廟化縁䟽天下之事無大小得人則興郡國之學由古今似緩而急蓋庠序乃禮女之地而絃歌爲風化之原繄爾侯􅀖號稱文治載瞻淸廟有乏宏規廊廡卑棲狹僅容拜宫垣頽圯髙不及肩我將易故而増卑衆欲妥靈而掲敬輪奐動泮池之藻丹青一繪事之新審致大成需資多助垂旒委佩復誾誾侃侃之儀趨事赴功得磊磊落落之者賢使君業爲倡率同僚属理當賛㐮母悋援毫重書所諾謹䟽鉅鹿縣講堂化工䟽粤惟大陸寔曰古任創興釋菜之宫舊有眀經之室年深踈陋日就傾危今擬修崇務敦風化大弓長劒其備可忘三綱五常非學不立稍聽一丁之諭將成百室之歌敢仗斯文共成勝事謹䟽爲周府君立碑醵金䟽伏以起千年巳廢詎能忘利益之恩顧喬木而言尚未覩麒麟之碣故江淮都轉使周侯除興義重撫字恩深公雖云亡德其可後今也有銘不愧墮淚無從惟斵石而爲特書可於公而見不朽庻圖少報永振休聲凡我同盟共成盛事謹䟽汴梁路相國寺化工䟲汴梁路大相國寺住持僧柴某欽奉聖旨修葺前殿所有化縁䟽文合行開具者伏以􅆊宫盤欎無踰相國宏規傑閣巋存猶是李唐遺構浩刼黯浮雲之衛秋風動喬木之悲顧二三之殘僧將修完而何力幸蒙睿眷尚頼人謀况有生趍嚮而孰匪善心在稽首歸依者當體上意能傾心而樂施或分囷以􅂢金同新般若淸光與復天人偉觀風鈴如語響泛潮音天女散花有來衆士祝延聖夀載繙具葉之香翊賛皇圗永比彌盧之固謹䟽請陶教授主善䟽切以擇師教子孰無希􅂹之心傳道解疑湏藉鑄金之手况木非揉則無自圎之理玉惟斵則成就器之名伏惟主簿先生經明行修學慱才贍聞望素髙於儒館淵源逺自於顒軒講論造精一之微文辭知古今之变惟是青衿之子常瞻絳縵之儀敢瀆師嚴再新凾文心專志致深惟體用之方日就月將㝡切後先之序以兹誘掖與正斐狂所有束脩開呈于后重修開㤗寺大功德䟽伏以道不逺人善無先於利益物興有數􅀔湏藉於英豪廼眷燕山昔爲遼府開泰禪寺者爰因鄴第建自樞臣雖復兩朝之増葺何堪雙樹之蕭條如聲色香味布施能圎則上下虚空何修不可伏惟參政相公才優鞭筭義重規爲禪扣愚機􅂀流臨濟逺暢神通妙方幾開方便法門莊嚴已擴浄慈天庇􅄻證明羅漢夢况兹金粟影巋􅈛古精藍􅀨花翳空得還舊觀登壇判断重振玄関盡刮衣孟已是多餘香積飯有來福德何嗟不到佛如來載經載營同心同徳永扶寳祚爲國拈香前進士李舜臣姪求子婦醵金䟽切以燕雲尚志情深友義之懷婚媾及時詩美桃夭之詠前進士李公舜臣之姪元德爲子求婚納徵有月柰囊空而羞澁湏力濟於英豪或采幣以相投或青鳬而見賜迓續先人之胤配合二姓之懽如種玉而􅀗珪璋在貧家而得箕帚豈曰小􅀘實荷鴻􅀻兒女債還敢云遂尚平之志簮纓顧恤庻幾接仲郢之風請署芳衘用昭金諾謹䟽銅臺阿丑石氏䟽年方破瓜在故里樂籍者凡四年今嫁李氏相得甚懽辛巳春以良家來見酒間叙話心事追念舊游蓋廿有二年矣且有滄州之行求余言爲重因書此以付去國㫷年見似者而輙喜改圗故歩念此意之可嘉銅臺石氏者穠艶呈霞髻雲綰緑白雪擅郢中之曲絳羅捲薛氏之䆫玉秀蘭芳風尖月細荏苒四年之塵土稱量幾斛之珠琲悔失此身得逄佳配囬金沙灘頭之夢吹碧桃花上之笙顧自怜度日之難未免有當壚之役試看長樂坊頭雪猶自春風醉裏香將安排老􅀊生涯預准備藥爐經卷巳蒙重顧來謝鈞慈滿地流錢共說平生鞭筭了投竿在水肯教空載月明歸謹䟽前泉州路揔管府推官朱淮故太師徽國文公嫡孫今擬於杭州路擇湖山勝地創建書院中起文公祠堂教誨子弟奉承香火上祝聖壽無􅆠次爲宗属朋從續考亭道脉之傳伏望公卿士夫喜聞樂􅂇庻資衆力克遂􅀄心者伏以明經傳道深有頼於後人圗報起祠必資成於多士况在曽玄之列當膺倡率之勤㳟惟晦菴先生學貫六經名髙諸子始焉講學克紹程張之緒餘展也成功直造孔顔之堂奥發揮義理昭若日星没未及於百年道太行乎四海凢曰進脩之者孰非沾漑之餘方國家之右文冝天下之通祀廼眷餘杭名郡未瞻遺像清光聿修香火之新祠爰擇湖山之勝地計所需而甚廣嘆獨力以難勝少分㳙滴之餘波同濟經營之盛事絃歌不絶敢云家學之有傳爼豆斯陳庻使宗風之罔墜倘蒙金諾請署􅈿衘謹䟽榜張氏秋香館酒牓伏以三尺紫簫吹破金臺之月一竿青斾飄摇淇水之春孝先張君系出豪華長居紈綺壯狃五陵之裘馬老㝷中聖之家風左顧東城名香新館雖借作育廉之地已大蒐破敵之兵瀧春溜於連床貯秋香於百瓮與同至樂任價寛沽罄翠罌銀勺之歡是非何有聽白雪陽春之曲風月無邉信不比於㝷常莫等閑而空過任使髙陽公子從他宫錦仙人争貰金貂紛摩劒珮繫馬鳯凰樓柱掛纓日月牎扉白骨蒼苔古人安在流光逝水浮丗堪驚况百年渾是者能幾逥一月開口者不數日忍辜妙理也作獨醒莫思身後無窮且闘尊前見在那愁紅雨春圍綉幕之風来對黄花共落龍山之帽快傾銀而注瓦任枕麹以藉糟只空工部之嚢扶上山翁之馬前歸後擁盡日而然約林評事花約伏以良辰樂事雖曰難并㫖酒嘉有豈容獨饗兹者小園竹木粗有堪觀故里賔僚可踈一宴忍教康節獨擅花時敢擬右軍同修禊事伊誰有語花枝羞上老人頭來日無多此樂莫教兒軰覺玉盤濯月巳煩竹裏行厨綉勒攅香暫簇花邉駿馬擇於今月二十八日就弊圃聊備芳罇伏望群英早垂光降茶約伏以歡情漸减豈任林酌之娯老境相冝正有茶香之供今者策勲茗盌集勝爐薫湏分旗葉槍芽選甚鷓斑螺甲破帋帳梅花之夢叅老夫鼻觀之禪要追陪七椀家風共消遣一冬月日勿謂淡中無味且從静裏看忙老懷自嚮故人多此樂莫教児軰􅁴我今首倡盟可同㝷湯響松風巳减却十分酒病日拖竹杖長行携两䄂香煙顧此聞思咸歸歡樂謹約禊約四序節氣春極和而季月爲之盛故古人因三日盛時而爲元巳之莭然鮮克與巳相㑹今􅀊兹辰適值癸已又一盛也用是約二三知友讌集林氏花圃所有事冝略具真率舊例各人備酒一壷花一握楮弊􅀂干細柳圏一春服以色衣爲上其餘所需盡約圃主供具秉簡續􅦔辨追洧水歡遊禊飲賦詩修復蘭亭故事上梁文大成殿上梁文寳位龍飛首闡大猷之化儒宫􅁅冷鞠爲茂草之區恭惟緫管陳公爰自下車􅁣焉興感仰體右文之意推明樂育之心因政平訟理之秋舉禮在實亡之典大復素王之宇重開太極之天于以増聖道之光華鑿晚生之耳目矧惟治本一出化原猗歟岳牧之心擬变謂書之俗落成有日神化無方折雄冠豭佩之徒趨庭受訓易􅂐刻雕􅆉之子執簡傳經奠兩楹之豆蘧舞三代之韶箾伸嚴􅂎典咸啓敬心猥承縫掖之流可後閟宫之頌有來多士共駕虹梁兒􅀰偉抛梁東萬古宗風一泮宫頼得賢侯扶聖教太行元氣魯􅀛蒙抛梁南奕奕新宮播盛談一旦詠歸欣有地北山伏掃讀書龕抛梁西聖學如天不可梯湏信小成從洒掃互郷名與大賢齊抛梁北萬象經天瞻拱極文奎髙射徳星明昨夜騰光滿營室抛梁上偃植圎义屹相向人從懸甕發丹書堅與西山兩無恙抛梁下適衛屢爲瑗所舎春風緑滿杏壇隂從此西遊冝稅駕伏願上梁之後邑多君子世極文明國本固磐石之安天子享萬年之壽斯文有在振木鐸於中天遺法復行得人材於郷校舉霑寸進仰荅明時鎮國寺上梁文伏以坤儀佐理巳􅀵純􅀍之功象教加持妙極大千之力爰擇鴻都之右輔聿興蓮宇之新宫我國家崇報是圗慈憫爲念演三乗而設教歛五福以錫民一朝之役罔及於國人萬有之輸悉供於内府於是郢斤運巧鄧梓呈材有來神力之無方遂極天下之大壯桓楹修棟欎雲氣之上浮疊拱層櫨屹丘山之壁立仍差榖旦共駕虹梁用綴蕪辝式伸善禱兒郎偉抛梁東六合天花散暁風隻履不煩嶺去九天開出􅆊王宫兒郎偉抛梁西萬刼壟縁妄想迷方寸欲明諸佛果正湏一勺自曹溪兒郎偉抛梁南莫咤龍門萬佛龕㑹使樓欏雙樹地萬方來此發經凾兒郎偉抛梁北萬象森羅朝帝極我爲禮此玉毫光聖徳無量千萬億兒􅀰偉抛梁上寳氣瓏􅋛像我今建此内道􅂣海㑹龍華無盡藏兒􅀰偉抛梁下千里王畿際兩稼年年鐘鼔樂清時共對人民霑聖化伏願上梁之後天低法界海怫潮音山河扶綉户之光日月擁雕簷之氣永將寳供仰賛皇圗奠金城不㧞之基祝天子無疆之壽亳州太清宫上梁文至道無名混太􅀄之一氣真人者出廓衆妙之玄門載歆道徳之言寔翊􅀖家之化太上混元上德皇帝潜輝柱史肇迹瀬陽千丁令神遊三尺兒童知尊聖祖故歷代備褒之禮皇家極樓觀之雄雖九伏於渊泉而紫氣日􅆞于天宇嗣興有數今見其人演化宗師真人德紹蟠教流白霫逺乗鶴馭來住琳宫爰即遺基重興丕搆用篤皇家之祐先開紫極之大及覩成規有光往制煙雲晻靄車囬隱玉之鑾仙聖超騰日仰猶龍之表㳟依善頌用駕虹梁兒􅀰偉抛梁東綿絡鈞天夢帝宫􅃴喜頓然還舊􅀚玄都仙客振􅀌風兒郎偉抛梁西萬里黄流入望低爲謝㝷􅈵張慱望故家仙李又成蹊兒郎偉抛梁南聖牘玄珠閟不談且置金華丹寳説請從河上發經凾兒􅀰偉抛梁北玉帛中天朝萬國玄風慶㑹雪山陽柱下有人談道德兒郎偉抛梁上天蓋蒼蒼含萬象西昇不箸五千言萬古流沙空悵望兒􅀰偉抛梁下祈福爲民崇廣厦道家設教貴無爲䘮􅁑暄凉自冬夏伏願上梁之后人庥道􅄻世沐泠風山河扶綉户之光日月擁雕梁之氣竹宫望祀休誇漢武之祈靈敁宅徴符巳表吾皇之萬壽萬夀宫方丈上梁文伏以起百年之搆植大本於宗門葺一日之居見恒心於君子萬壽宫丈室者自昔中和之起廢逮今六祖之丕承物旣弊而更新制有増而匪舊敞桓楹而中起翼兩室以傍開雲霞藹疊栱之間燕雀賀華榱之上前瞻玉境通暢玄風後壯宸居擁陪法座况仙馭來臨之有日令威歸語以無時工旣落成衆孰不樂􅀝疊如山之壯罄單肯搆之誠重光動淇水之波佳氣欎太行之色式扶脩棟可後􅂬謡兒郎偉抛梁東燈火春城動竹宫看取洞天閑日月佩環聲在歩虚中西苒苒春雲去殿低莫道靈章仙秩峻青霄有路是丹梯南故院當年一畒菴碧瓦朱甍今覆壓後人光大儘無慚北五福從來尊太一碧霞千古振孤風奕奕神光長拱極上符籙潜珍無盡藏光芒未暇詫青藜六代傳芳主凾丈下玄教扶持衡可迓德星所在風雨時萬里如雲看多稼伏願上梁之後教基大闡福地重新五雲來崑閬之仙六甲祕風雷之奥華簮列拜載光傳度之儀金簡朝元永肅焚修之供以兹快樂普洽生成太一宫清蹕殿上梁文伏以顧瞻琳宇已嚴上帝之居婉孌龍聖人之作恭惟皇帝陛下圖囬治道窹􅄰幽人爰從潜躍之􅀄重有中和之䏂風雲允恊文物道而沃帝聦曽一言而利天下師今不見意􅀂無犬駕以來臨駐故宫而懷舊漢文授經於河上加於軒后訪道於崆峒􅀄不踰此以兹寵握光極玄門念我後人思皇睿眷故大起御天之搆庻少伸就日之誠旣獻􅀊以僝功乃而考室敢陳善頌用駕虹梁抛梁東夜鶴休驚患帳空一自翠華臨幸後至今鎻春風抛梁西尚記春旗簇仗齊真氣滿空驚户牗光芒暇到青藜抛衆南論道當年有奥談乗賁臨猶望壠非縁叅决發經凾抛梁北金簡朝元瞻萬歳永無疆更願八荒開壽域抛梁上碧瓦朱甍遵大壯五雲佳氣欝蓬萊遊像思天仗抛梁下華表人歸餘道價􅀨露有偏恩不遣靈章隨物化伏願上梁之後日月擁雕楹之氣山河扶綉户之光道以之増輝真仙為之改觀雲紅黼座濃薰花氣風肅㤗壇光動竹宫之祀歛兹廣福錫厥明時溥同至樂春露堂上梁文伏以飛鳥知還固擇安棲之所弊廬託處舉懐必葺之心秋磵老人樗擽散材萍蓬逺䆠東西南北两紀奔馳􅀨露風霜終年偃薄乆矣壯遊之倦浩然故里之歸迣構新堂不遺舊物豈獨廣居而移氣蓋將追逺以顕親連甍接棟而中列三楹却暑囬寒而旁開两室俾春秋寢􅀕衆免勃磎節叙賔筵喜同􅀏語惟是時思之切仍題春露之名言舉斯心卑之來者承承継継無遏佚前人之光欎欝䓤䓤非秪謂喬木之羙爰扶脩棟例有歡謡抛梁東旭日紅駘蕩春陽滿太空人喜廟堂真宰出不煩東觀論青蟲抛梁西萬瓦齊撲地閭閻似碧鷄春露堂中春自好何甞有意夢沙堤抛梁南合明簮交道微來不易談正有􅀊寒三益在風簷先種兩株杉抛梁北正統一東亘扶桑略西極一堂雖起有先憂所願八荒開壽域抛梁上天蕩蕩光動太行三萬丈主人投紱巳歸來夜鶴不湏驚􅈍帳抛梁下觀治化叶氣薫然衡四迓過門有客問行藏蓬纍而行得時駕伏願上梁之後里多仁美門掩春華􅀊時豐穣問甚槃中之蓿物情和好爱及屋上之烏對床賡風􅀨之吟開卷得聖賢之樂倘使少如所願不爲虛度此生秋澗大全文集卷七十
