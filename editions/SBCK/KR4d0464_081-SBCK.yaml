front:
  text: 秋澗先生大全文集卷第八十一中堂事記中五日丙申隂晦王相同左右司􅀰中賈居貞始入朝陛見上喜甚旣退侍中和者思傳㫖命與諸相集議六曹并九道宣撫事於中書堂六日丁酉諸相㑹左丞張仲謙第左丞名文謙字仲謙邢州沙河人資安和匕恭内敏於政不大聲以色為都司時公来催帳竿棊工事因教曰朝家事有大小大事需議可敢奏稍緩無方餘則不然吾子切念之今日思之可為至言也以决前議大抵選官薄賦評鈔法等事論者頗交雜王曰何傷取其長便者用焉未刻諸相入見進大定政要因大論政務於上前聖鍳英明多可其奏班退論諸相曰翼日朕郊􅀕釃馬酮馬卿等不必扈行凢内外之務比還悉裁定以聞八日巳亥天日極晴朗上祀天於舊桓州西北郊皇族之外皆不得預禮也九日庚子晴暖諸相圓坐都省集兩曹􅁺史讎九道民事十日辛丑王張廉三相洎賈􅀰中㑹議政事因論功利等事且曰丗代下衰其􅀔有不得不尓者時惲亦預坐因徐起而言曰功利旣不能㢮心與術亦不可不辨也且心以居正為體術以應變為用終之體不失而有成者為上此大臣所先務也三相愕而起十一日壬寅保定緫管蔡國公嗣子和略以本道鈔法事耒議都堂為經畫之已刻張參政廉右丞㑹王相第令詳定官周止縷讀衆士嘉謨而詳聽焉僉曰不為無益也継㑹九道宣撫定議官制輕减民賦䓁事申刻東北雲起蓊􅀂潑墨雨東來散絲千門間乍暑霑潤為一快也十二日癸夘諸相集廉右丞第審定前議盧進之飯焉餉午鑾輅還宮有頃侍中和者思傳㫖召諸相入朝遂以軍國大政上聞都俞際衆悉之以對天顔為喜動且有恨其見晚之嘆是日平章趙壁以軍儲事􅀍譴胥靡於家甚嚴惲時從承旨王公上諸趙公心雖惕厲氣量􅁉如也從而不去者唯門下士李革在焉趙事為結東平粮事李九山謂此事盖意起於陳徳秀禍成於杜彦深公實不知也藺仁甫之是日河􅀯宣撫兼􅀴略使史公至自汴梁十三日甲辰夘刻㑹廉右丞第辰刻諸相入朝以議定六部等事上聞綸音撫尉大允所奏曰向耒群疑渙然冰釋比出宫小雨浥塵綬轡沙堤有不覺其喜者晡時張叅政廉右丞㑹王相第以奏允諸務耒審聴焉十四日乙巳雨午刻開霽㑹楊宣撫果張宣撫徳輝劉宣撫肅張左丞􅄪議民賦事盖有所未盡故也十三日丙午有㫖就上都長春宫作清醮三晝夜為民祈福奏告文字交王鶚定撰者其辝有既􅀗􅂌矜之福冝隆敷錫之恩六轡属還歸之際一家孚保又之休言念蒼生不無素擾或凶荒之災相望或轉徙之苦相仍雖勑有司俾修善政更祈照鍳普洽鴻私是日巳刻廉右丞張􅂙政㑹王相第呼金齒蠻使人問其來庭之意及國俗地理等事言語侏離重譯而後通國名百夷盖群蠻之緫􅁛也其地在大理西􅀯數千里外而􅀠六詔焉曰阿吉者捻迭部長阿列所遺曰鉢布者玉龍川部長塔亨所遣偕来者八人始自戊午冬發於本土至是方逹上都其人衣冠裝束髻髪于頂褁以絳氊復以白疊布盤繞其首衣以皂繒無衿領之制膝以前裂而編之如懸索然眉額間塗丹墨為飾金其齒盖國俗之賤者也意思野逸殆驚麕然其土冝稲有牛馬山羊雞豚鵝鴨之属兵械有刀槊手弩而無弓矢甲胄既而遣還上命中山人劉芳借職兵部􅀰中使其國都堂命惲草詔其辭有嘉爾䓁䟦渉􅁱阻懷徳逺来首輸事大之誠克謹畏天之戒轉為宣暢皇猷告諭隣附俾知國家威靈無逺弗届之意是日耶律中書来自漠北聖㫖十六日丁未史經略張右丞洎衆宣撫集都堂條具民政十七日戌申辰刻諸相入朝以集議聞上一允所奏向夕出宫十八日巳酉省奏准條畫民事凡廿七欵為施行之十九日庚戌百僚入見少頃出㑹東省奉㫖召九路緫管頒示新典􅀂有所陳即具以聞除河間真定餘略有異同復為啇確奏裁以定廿日辛亥内宴不克見是晚工部石里忽即李􅀍問堂命都司楊恕提控趙謙同惲等磨勘工匠支銷䓁簿逹曙不寐廿一日壬子都堂令惲檢討唐人置信牌鎻長官㕔事諸相辨析石里忽事責遂有所歸巳刻既雨而雪寒沍盡日廿二日癸丑八見午刻諸相圎坐讎校九道宣撫殿㝡時東平撫司民賦有未足者某官對云云省官曰不聞詔條使户口増差發辨方為􅁛職某官以不敏謝及議中外新舊官改授定制轉午雨雹蔽地大者如彈丸俄而風作土下如雨黄霧四塞逮酉刻聞開霽廿三日甲寅司天臺官中順大夫張爲雨土亊以民勞上聞明年新都之建遂經始焉廿四日癸夘極晴朗諸相入朝奏准七道宣撫司所行條畫
