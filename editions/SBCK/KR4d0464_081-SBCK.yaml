body:
  text: 一中統元年科訖差發多有不盡户計所據今􅀊科差湏管子細照勘務要盡實科徴不致隱漏兼各路投下户計差發欽奉見降聖㫖亦從各路緫管府驗數科徴仰各路管民官照勘本管地面内見住人民户及不以是何人等􅀿合收係當差者湏管從實盡數科徴見了數目開坐関部轉行申省聞奏􅀂是中間却有漏落不盡實去處事發到官定將當該官吏嚴行断罪外宣撫司有失体䆒者亦行治罪仍先取管民官甘結文字一中統二年差發雖巳定立限次仰各路管民官更為斟酌彼中事􅀔催徴如限内併納者聽務要民户安差發辦乃為􅁛職一起置信牌事縁為各路遇有催督差發勾追官吏䓁事多用委差官併隨衙門勾當人及曵刺祗候人䓁投下文字不得搔擾民間轉致遲悞官中事務為此擬定今後止用信牌催辦一切公事據置到信牌編立字號令長官次官圎簽於長官㕔事封鎻􅀵掌如緫管府行下州府科催差發并勾追官吏䓁事所用信牌隨卽附簿粘連文字上明標日時定立信牌廽日勾銷并照勘稽遲限次䆒治施行􅀂雖有文字無信牌或有信牌無文字並不准用廻日即仰本人賚擎前來赴緫管府當㕔繳納當該司吏不得一面接受落如違䆒治據府行下司縣其司縣行下所管地面亦仰依上施行一各路所設急逓鋪委自宣撫司提領仍禁約㳂路不得奪要文字本管官司亦不得科取差發錢物并照刷逓轉文字如有稽遅日時約量治罪據鋪側近住坐或開店買賣聴過徃軍馬使臣人䓁並不得搔擾逓轉文字除申朝廷省并夲路行移官司緊要文字外其餘閑慢文字不得入逓亦不得私下夾帶一毫物件轉送仍常㓛存恤不致逃竄失所􅀂有違犯仰宣撫司䆒治施行一宣撫司􅀂遇緊要井機密公事湏當赴朝省計禀即仰乗坐鋪馬走逓如是㝷常公事止令入逓轉發除降去起馬剳子外夲司更不得别給起馬剳子宣撫司起馬五疋副使四疋委差官令史人䓁三疋一宣撫司官比及頒俸以来􅁠依使臣分例批支一宣撫司曳刺祗候人比及定奪止設人數毎司􅁠設二十午刻諸相大合食扵省堂之西偏奉㫖命平章王文統舉讀史一人遂以詳定官周止噟選廿五日丙辰諸相按問髙麗質子王淳與淇甫事未刻新舊宣撫拜命於省中就付條畫新制及諸換授官資者悉裁遣之廿六日丁巳辰刻入見上以錢􅂖大計問平章文統敷對明敏慮無遺䇿凡軍國大事皆有成筭然後撮其要領使例相此廿七日戊午上命平章王文統與前省官庭辨中元民賦虚實比上年多寡之數􅀂人為語塞廿八日已未暑氣甚隆有㫖昨者比附前政甚優終未服其心也奏准差宣便蒲散禧悉起燕帑所有金帛䓁物是日特㫖命趙璧平章政事如故其夜諸􅁺以㑹計故逹曙不寐廿九日庚申王相以簿書委積重為規畫授諸􅁺成筭以備不時顧問三十日辛酉前相臣安天合授西京路宣撫大使仍錫金虎符特寵異焉未刻堂命惲草宣諭大理及合刺章俾還夲土手詔其辝有云嘉汝䓁逺自雲􅀯導從選鋒轉􅀾千里直渡鄂渚以逹於此勤巳至矣今者俾尔各還本土以遂厥性之語各優賜人有差是日九道所造狐貉衣裘其數畢具王相命省􅁺王文蔚并惲用棋方抺子通􅀋比附使見估直髙下孰省孰費且曰兹蓋史臣年表遺法固非吏輩所能知也蓋有所謂而云五月甲午王戍朔􅀺明逹官巨僚畢集中省遂檢前省民賦以上年比中元數多而所入者鮮以中元比上年户同而所入者廣論辨者乆之前省官屈服始無異議焉諸相僉曰先後之事明矣遂具以聞夜漏下八刻廉右丞賈郎中傳㫖曰􅀂輩無狀凡所以欺蔽不􅀿䓁事悉索焉以聞明日癸亥天威雷震前省官始知懼待罪矣中外聞者有萬口一辭之快是日巳刻東平宣撫司申國信使郝經䓁為宋人扼駐蘄州渦口不遣入國事旣而知為宋人所誑我實不審所在也未刻復遣户部貟外郎王煥催發燕藏諸物􅀄三日甲子晴朗盡日詰問前省官事是日九道宣撫其先赴攸司及諸換授官入朝陛辝􅂬聲和氣洋洋郁郁滿皇都而載歸路矣上京路緫管忙占都喜見諸相於都堂識所謂海魚九尾者四日乙丑問前省官事五日丙寅問前省官事已刻寥休上人來自􅀯庵諸相就謁於龍光北寺識所謂温庵主者未刻有㫖命宣撫姚樞赴省同議軍湏調度䓁事姚字公茂郴城人資明亮深識有理學甞從征大理有佐命功至元改元轉天下官公力為多上甞曰公茂善談論物之圓者只說出柄来官至中書左亟終翰林承㫖是日左司都事楊恕傳都堂鈞㫖令惲草移宋三省牒文向夕隂晦大風其牒草云大蒙古國行中書省移宋三省皇帝即位之􅀄重惜􅀯北生靈之故一視同仁首主和議特遣信使敬奉國書講信􅁱睦徃年征進大軍即令分還本屯仍嚴勑邊將非奉土命毋得妄動爰自行人㗸命巳来載更􅀊律寂無来音其於講􅁱之事將如何哉不惟有失忱辭反啓􅁁釁以至攻圍我上石侵軼我鄧鄙襲華陽擾随州刼掠真陽數犯漣水皆出於使軺巳入彼境之後夫信與義自古所恃以為國者也一旦􅂢棄曲直所在自有任其責者矣􅀂和議可必即當速遣重使與我行人偕来其或逗遛􅀊月别有異議請選帥徒具戈甲預致師期相與㑹獵於江􅀯之地可也於斯二者惟所擇焉比来間將屡請出師以報侵彊之役省府謹守聖訓弗允所請不識日者數舉果何爲而然􅁘今大駕北狩巳是􅀯還陛見之日何以爲奏兾早示定議母坐失良圗以貽後悔七日戊辰夘刻百夷奉使劉方成行巳刻入見多所陳奏皆常例事内一條禁不得以馬挽車引碾及無故屠宰重兵力也是日發􅀰國遣人来献卉服諸物其使自本土逹上都巳踰三年􅀃其國在囬紇極西徼常晝不夜野䑕出穴乃是入夕人死衆竭誠􅈼天間有甦者蠅蚋悉自木出婦人頗妍羙男子例碧眼黄髪所經涂有二海一則踰月一則朞月可度其舡艘大可載五十百人其所獻醆斚蓋海鳥大夘分而爲之酌以涼醑即温豈世所謂温涼盞者􅁘上嘉其逺来囬賜金帛甚渥是日懷孟路勸農官王秉中字仲撝来王相令訪問枋口去路六十里属濟源縣所開水利即令漑民田幾何仲撝曰水舊名古秦渠蓋魏未司馬孚創修至隋盧賁復開治唐太和間河陽節度使太加䟽導漑河内河陽温濟武陟五縣民田五千餘頃宋天聖􅀄枋堰始壞至是仲撝復為起廢又云􅀄興役時掘地丈餘得栢枋數十叚􅁛曰枋口豈因是得名乎是夜内庭官忽魯不花不令吉及第二子時年三十一歳飲諸相於中省既夕継之以火二鼓方散八日巳巳對問前行部尚書馬月忽乃事所牒宋三省又移河􅀯宣撫史公令改作經略司牒宋淮東制司施行就令選官充詳問官者經略公以太原士人崔明道為使􅀯京兵馬副都李合義貳焉以徃其意蓋以或有不順先以省檄牒之則後無繼焉故也堂議中書出政之地人雜還莫能禁奏准令怯薛丹二人監約省庭間自是中省之務頗清肅焉是日都堂命惲編􅁼歴代水利營屯田漕運錢幣租庸調䓁法及漢唐巳来宫殿制度䓁事巳刻上御萬安閤四川楊侍􅀰遣其子以弓矢䓁物具表来献反廽上以手詔荅之楊大淵省表具之朕恪守王封遽膺推戴即位之始不遑康寕惟尔逺戍邊陲乆服戎政身外心内来陳賀章冝加寵荅之辭以勵忠貞之節故兹詔示想冝知悉又一囬紇醫者貢橐駞三十頭鞍具幪帕全光彩照地鳴皷吹螺自臯門而入又一囬紇贄栗色宛焉八拜玉面鹿身聳立如􅀞所謂脫必察者也申刻省起諸相候廉右丞疾九日庚午推問馬月忽乃事巳是日皇弟摩哥大王丗子昌童封永寕王仍改父王玉寳爲金印命惲討論古今諸侯王印制遂製紐爲駝作三臺其文曰永寕王印十日辛未堂議欲以元寳鈔背用関防印誌既而議不便但令比户粉壁嚴僞造之禁從楊宣無果議也有㫖遣上都同知阿合馬計􅀧燕京萬億庫諸色物貨十一日壬申堂議曰古者天子有八寳盖所以崇天授而鎮萬方也今朝廷所用止一寳而已欲議奏令印工季并餘寳皆刻而爲之用古文竒􅂐殆受命璽然惲曰此非可輕議也又務繁需􅂯議焉已刻上手詔宣諭四川侍郎楊某曰勇冠諸將名配古人知大義之可爲籍諸城而來附獻以金帶示以誥牋載詳終始之誠冝示褒崇之禮可特賜虎符充夔府路行省兼安撫勾當更冝招懐未附共底丕平但桑䕃不移而能立其功雖􅈋土至重而朕無所惜其賜卿某物至可領也諸相大合食逹官巨僚於都坐皆霑醉而罷十二日癸酉有㫖先召首相二三人入朝餘俟命於省署既而以大宴不克見上都留守同知阿合馬兼太倉使請立和糴所以溢廩􅁃堂議以曹人李亨字通甫勾當和糴事改和糴爲規措所亨􅁱人事極經畫已而粒米狼戻少尹愛其能焉十三日甲戌䆒問前省官一切事理皆有定論今左右司官具奏目然後詳􅃪巳上聞以見上下通知故也午轉大雷電以雨且有雹蔽地向夕内省官忽魯不花傳旨令前省官及諸路在都管民䓁官詰旦集闕下以聴聖訓明日乙亥寅刻詔罷東平路管民緫管兼行軍萬户嚴忠濟仍敕戒諸路官寮無是效焉國有常刑犯不容有嚴其􅀄授制辭有云尓父承國家興運左右將士同心戮力封植東平施為名藩我祖宗嘉尓父之功乃建為侯自尓嗣位又廿年朕􅀄即政復命襲爵徃即乃封敬之慎之其修德砥行自立名節勉圗後效無忝先猷至是未見顯咎遽為黜罷或者不知而異焉未刻諸相退朝园坐按問李宣撫王正之䓁事既而廉右丞傳㫖召平章王文統遂入見上於香閤夜漏下廿刻方退十五日丙子誅東平經歷官邢衡銓􅀄邢以事告叅政張易詰對於上前邢欵服命諸相監戮扵都城東十里外張手剚其腹從􅀄請也十六日丁丑雨廉右丞耶律中書張叅政王平章推攷定奪諸路户口等亊十七日戊寅諸相復定擬大名西京北京賦税户口未刻藏春仲晦来朝諸相就見於李虞卿宅略話而退是日已刻上臨軒親諭諸路緫尹遂以前東平緫管嚴忠濟弟忠範為東平緫管仍戒之口兄弟天倫事至於此朕甚憫焉今予命尓尹兹東土非以訟受之也彼所責匪輕敬哉今而後苟不克荷非􅀂汝兄幸而免也至是知忠淸之失皆為其弟所發因各賜馬酮慰遣復有改故從新之諭又黜大名路逹魯花赤愛魯魯河西人小李鉗部之子也十八日已夘晴暑上召前濟􅀯宣撫宋子貞真定宣撫劉粛河東宣撫張德輝北京宣撫楊果於内殿以擢用輔弼為問楊果䓁前奏曰王文統材略規模朝士罕見其比然以驟加登庸物論不無新舊之間如史天澤累朝舊臣勲碩昭著􅀂使宅百揆大厭人望今文統輩經畫其間則省事成矣上曰置史某相位念之乆矣卿䓁所言允恊朕意因賜食而退十九日庚辰入見奏栽大拜及六部亊詔以世臣不花經略史天澤為右丞相不花時三十三􅀊憲宗朝怯薛丹長領断事官其祖太祖神元皇帝朝功臣父也孫秃花憲宗朝萬夫長忽魯不花耶律鑄為左丞相忽魯不花時年三十一􅀊父不令􅁻亥官人塔察児廉右丞平章政事塔察児時年廿八􅀊其父憲宗朝世臣千夫長張參政為右丞宣撫楊果宣撫啇挺叅知政亊餘如故是日諸相入見將退上慰平章文統曰卿春秋髙恐勞於奏請今後可運籌省幄􅀂有大議湏面陳者及朕有所咨訪入見小事今人奏来不必煩卿也上以王􅁎下嫁午刻幸新桓御營廿日辛巳奉旨命承旨王鶚定撰諸相制詞廿一日壬午晴暑闔省大燕慶新除也時既相史公所事皆􅀝重焉丞相曰天澤武臣何克􅀒荷但物務未安者老夫通譯其間爲諸君條逹耳相則予曷敢當衆愈服其謙㧕皆霑醉而散是晚承旨王公命惲賫所撰制詞呈省其文通作一卷實封細衘書名上用院印或問焉曰白麻盖自中出令實封防其外泄亦唐人鎻院之意也既披詳或欲有所更定惲力言其不可昔楊億以一壌字不勝其恧况改作乎苐修飾之可也其史相詞頭有惟卿丗篤忠貞材兼文武樹戰功於􅆠􅂣卿力良多論機務於廟堂朕心允恊冝示百僚之式俾居諸相之先可特授中書右丞相卿其振紀綱崇體要徃服新寵以壯舊猷廉希憲惟卿秀㧞父兄學尊師友徃綏諸道視民一以如傷就建行臺臨事毅然有断冝從政轄進署相衘可超授平章政事惟暨乃心以荅朕命楊果櫂秀詞科馳聲劇縣佐南州之經略才巳見稱專比郡之無綏人皆受賜政之參决僉曰汝諧可特授參知政事祗服寵休益思報􅁛廿二日癸未申刻堂議定省規一十條其一曰凢三日一奏事軍國急務不拘此限其二曰置勤政簿一扇凢公議已定事詳見于簿讀一譯不得増减言得日標題於逐欵之上還省立檢圎覆定行其三曰圎議定時首領官先擬定其事自下而上相次剖决議定題押批判􅀂事関利害情見不同者各具奏禀其四曰圎議時非定貟不與知本房者不在囬避之限若事涉機宻者巳次請退其五曰同僚赴省日出為期停午乃起旬一日暇事遇急速不拘此限有疾故者湏令報知庶免延待而巳其六曰省府官并屬官各家不許受詞訟公文其七曰如遇闕貟圎議公選不得用門下人􅀘充其八曰省府通譯史額定選充餘者不與其九曰奏事上前宣讀通譯人各一貟其十曰凢告事􅀃事者聴畢避其人公議定然後囬荅僉曰所畫理到遂施行焉廿四日乙酉巳刻奏准粘合中書授平章政事北京行省前歸徳府官民緫官張子良爲河􅀯宣撫使張字漢臣以名行午刻令􅀰中賈居貞照勘一切換授宣牌事無有稽緩廿五日丙戌平章塔察児日令叅政楊公􅀃通鑑三五叚是日至呉太子明􅁡中䑕矢事塔公掩卷曰我試爲論之與正􅀃合一省爲屬目僕散禧起燕京帑藏至上都辰刻上􅀚於内藏喜甚曰自祖宗已来未有如是之多也申刻平章亷公􅀰中賈居貞􅁺髙明赴新桓御營奏事堂議專委叅政楊公定奪内外新舊官資是日諸相授麻制於都堂詔下中外􅁛賀不勝其喜曰自國朝開創巳来論其得賢於斯為盛時有言綦陽鐡官不便者大抵其民皆殷實上户􅀊官得鐡甚鮮不能當􅀊輸包絲稅石之數􅀂用此易鐡可増官煽數倍之上堂議曰􅀂奏上朝廷即從然不重慮恐未免横議仍令惲與工椽李鼎計勘一􅀊常課所造幾何横造幾何一􅀊通可用鐡幾何在都廣備庫見有鐡幾何且可支幾年用度其外路應有鐡貨可支幾年用度既巳公曰未也􅀂令民間興煽官為抽取凢幾爐一􅀊通可得鐡幾何既已公曰未也􅀂都除内外見有數目止以民間一􅀊抽到鐡數可供幾年正横造作用度既已公曰未也􅀂􅀅治户合人差税取酌中價直一􅀊委可易鐡幾何有無少餘既已公曰未也更為積筭一􅀊合用礦炭夫役且以酌中定數有無虧損官民既已公曰未巳更為大約鐡官一􅀊及上下一切侵漁掊克虚耗官物幾何既已公曰可也明日奏上果有恐失悞造作為言者以是應之遂罷冶户帰民因訓惲䓁曰書生論事大槩不差及詢其所以方略鮮有不遲凝者􅀂將讀書苦心移之治此只一燈之功尔於政事何有汝䓁勵精焉可也何患兹位之不到哉是日不魯海牙授御史大夫兼大司農省諭一切言吿事人不得私家請謁投訴遵新令也廿七日戊子亭午右丞相史公赴永寕王荣授改鑄駞紐金印餘相圓坐照對燕京路民賦未刻掌記魏􅀄来自燕城申刻定議公府署押事右丞相史公與丞相忽魯不花五日輪畨一秉筆長官從上押右者處外􅁁一左一右以次而下圓坐亦然所謂廟坐廟晝也日將夕有大流星隕自巽位白光照野移時方散是日劉宣撫才卿說前朝省府各房止立鈞旨簿無行卷六部應呈事務左右司官議定可否粘方帖於部呈上書送字得都座准議省雜批釣旨於後其左右司元書送帖亦不掲去用省印傳其上蓋上下互為之防然後送部施行燕京路宣撫徐丗隆威卿􅀃舊曰户部設審計科以料週􅀊所入幾何經費幾何遇有支發至十萬貫部方呈省大抵係常例有定體者如百官貫石之􅁼是也外􅀰邢敏說舊曰􅀰中與外􅀰都事另幕坐是年秋與􅀰中不同處矣及有所編省臺定式亦有可取者劉宣撫又説舊日殿上奏事止左右两司􅀰中其人賢遇執政有闕即拜参知政事廿八日巳丑右丞相史公首秉判署是日命掌記魏􅀄令史馮崧執掌奏事諸簿午刻奉㫖定擬中行两省去留人貟抵暮張右丞下朝􅀃所奏事天顔甚喜交史丞相張左丞楊叅政留中王平章廉平章張右丞行省事于燕廿九日庚寅催督中外一切未經換授宣牌等事恐留難故也省退王相置酒私第㑹劉才卿宋周臣姚公茂王百一竇漢卿張耀卿許仲平李士都盖留别故也是日嚴忠範授東平路緫管李士都授翰林侍讀學士其制辝曰李昶學禮傳家明經登第練國家之典故謹士行之操修方當青史之編冝與玉堂之選冝公褒貶以示􅂆懲夏六月辛永朔夘刻艮方有青紫二氣横亘間錯長袤数十丈移時弗散巳而霧􅀨交作不見天官書云凡星變氛祲三日内有􅀨大小㐫咎即亡甞以理推之乖則致異和則為􅀨既和而􅀨其災自無經曰徃遇􅀨則吉是也二日壬辰晴暑詔賜木􅁐大王駞鈕金鍍銀印其文曰建昌王印時王見征戍大理諸部建昌雲􅀯之别􅁛也都堂為諸投下種田户奉㫖逐欵施行一阿术魯柭都魯為頭衆􅊥馬赤官人毎乙未年皇帝聖旨為逐官出氣力上撥到種田人戸擬自今後毎年除絲線稅粮照依舊例合納包銀内一半納官一半給付本官用度阿木魯㧞都魯塔四火魯赤􅀏匿亥李里匣児㧞都闊闊不花孛羅口怯烈亥撒及四不花這裏四迷按察児持不哥兀也里乾男塔丑别立古亥一有幹只思皇后下民户八十五户内六十戸元係牙刺瓦赤全定包銀来今擬將合納包銀内一半納官一半赴本投下送納外有諸雜户計二十五戸内打捕一十一户依舊送納絲粮隨營一十四戸種田納稅買賣納啇稅一有阿􅁻赤大王奏告為先奉聖旨於太原路五戸絲内支與皇后合敦銀一百五十定内除支訖外欠一百二十定仰於本路五户絲料内中統一年為始分作三分年放支與者外據種田民户二百一十戸合納稅粮数目令本位下就用除已行下放支外仰照㑹施行絲線包銀與其餘民户一体科撥一有塔察児大王奏漏籍户事仰依巳行詔書体例行者一有阿刺合赤妃子從嫁民户差發并匠人関取係官絲線織造叚疋本投下送納事仰就便取問本位下人貟據上項民户差發􅀂前断事官定下全撥今擬减免一半如已定减半者今擬全免外據匠人依前関取係官絲線織造叚疋赴本投下送納者一隨路應有金銀銅鐡丹粉錫碌䓁窑冶附籍漏籍民户盡行罷去分付元附籍地面官司應當差發今後許令諸人䓁有願入狀採打煽煉不用官本及占役百姓者據所得数目官為斟酌抽分􅀂元管頭目䓁願入狀不用官本及占役百姓興煽者聴如不願者許他人入狀承認一河􅀯路管下舞陽䓁處栽薑户仰與民一体當差毎年合用生薑就燕京官為和買一諸投下壬子年附籍􅥟口仰照依先帝聖㫖於冬各附籍處依舊例當差者一張杪児赤奏随路樂人差發事仰行下各路宣撫司與民一例當差止免雜役仍仰各處官司都不得因而搔擾不安遇有樂人赴闕承應官司斟酌與起發者一忽都花奏有茶罕元撥與字羅亥夀州民户内附籍三十一户見當絲線包銀税粮外有漏籍三十一户内有打水􅆩一十户乞定奪事仰照勘附籍民尸别無争差依種田户例送納絲粮外據包銀一半納官一半與本官用度所據打水􅆩户不湏打捕水􅆩與其餘漏籍民户一体於各管官司當差一藤花户交各處官司與民一体當差仰斟酌氣力約量科取加存恤外據年例合用藤花仰所属地靣官司從長計置趂時採摘依数送納毋致㓕裂採取闕少用度一火赤逹刺罕大名府民户伍伯餘户每年除納絲線稅粮外不納包銀止納軍漢車銀二定二十九两次後断事官按脫定下與民一体當差仰依元行例與民一体當差施行是日未刻奏定左右三部尚書䓁官秋澗先生大全文集卷第八十一
