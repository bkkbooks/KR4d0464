front:
  text: 秋澗先生大全文集卷九十八玉堂嘉話卷之六野合女子七七四十九隂絶男子八八六十四陽絶過此為婚為野合時叔梁紇過六十四娶顔氏少女故曰野合宋紹興中􅄛聖公渡江而東者孔玠也􅁞為龍之精按馬質云禁原蠶注天文辰為馬蚕書曰蚕為龍精月值大大則浴其種是蚕與馬同氣李林甫月令釋曰先蚕天駟也先蚕之神或以為苑窳婦人寓氏公主或以為黄帝或以為西陵氏或以為天駟歷論不一然蚕其首馬首其性喜温惡濕其浴火月而􅄪養則傷馬此固與馬同出於天駟矣然天駟可為蚕祖而非先蚕者也蚕婦人之事史記黄帝娶西陵氏始蚕漢祝苑窳婦人寓氏公主比或有所傳然其祭設壇或少牢或太牢或一獻或三獻禮必皇后親享北齊使公卿祝之非也其曰龍精見荀子􅑝蚕閑府儀同三司謂置府辟吏儀同三公也唐制感生帝唐王仲丘􅀓引鄭玄注云天之五帝逓王王者必感以興故夏之正月􅀕所生於郊以其祖配之因以祈􅂖感帝之祝貞觀用之矣廟制古者天子七廟自虞至周不易之制也七廟者
  hash: sha256:14da384b83b901fe248c44a186897307862e3288c20dee83fcedcf2c76e56a6b
