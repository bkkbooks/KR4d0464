body:
  text: 廟前廟後􅃦漢自明帝詔遵儉約無起陵􅃦藏魏立二廟晋宋齊隋及唐皆同一廟而異所以象生之有朝􅃦所以象生之有寢也建之觀門之内不敢逺其親也位之觀門之左不忍死其親也諸侯五廟謂二昭二穆與太祖之廟五鄭氏曰太祖始封之君王者之後不爲始封之君廟蓋諸侯不敢祖天子故王之子弟始爲諸侯不得立出王之廟後丗子孫祖其始封者而其或有大功德特命祀其祖先則立廟可也魯有姜嫄文王之廟鄭祖厲王是也􅀂王者之後始封之君非有功德不可為祖則祖其先代之王也宋祖帝乙是也大夫三廟王制大夫三廟一昭一穆與太祖之廟三鄭氏曰太祖是别子始爵者雖非别子始爵者亦然鄭志荅趙商謂王制商制故雖非諸侯之别子亦得立太祖之廟周制别子爲太祖􅀂非别子之後雖為又祭統曰昭穆者放以别父子逺近長幼親䟽之序而無乱也藏主開元禮義鑑曰藏主合在何處按五經異議云藏主於廟西壁中備水火之災必在西者長老之處地道尊右􅄦神幽隂也􅀕薦檀弓有薦新如朔奠謂重新物為之設奠王制大夫士宗廟之􅀕有田則祭無田則薦祭二以首月薦二以仲月士用特豚大夫用羔庻人春薦韭夏薦麥秋薦黍冬薦稲韭以夘麥以魚黍以豚稻以鴈髙堂隆曰天子諸侯月有􅀕事其孟月四時之祭也大夫以上將之以羔或加犬而巳士以豚庻人則唯其時冝魚鴈可也又薦新雖在廟皆不出神主五禮精義曰但設神座陳氏曰人子之於親飲食與藥必先甞而後進四時新物必先獻而後食寢廟之薦新亦推其子先之禮以盡誠敬而巳宋秦益公檜家廟制紹興中命立家廟於􅀻第中門之左一堂五室丗祖居中東二昭西二穆堂飾以黝堊神板長一尺􅀶四寸五分厚五寸八分大書某官某夫人神坐貯以帛嚢藏以􅃮凾用神幄歳四享用孟月柔日具三獻有司言時享用常噐常饌上倣政和故事命制􅀕噐賜之舞雩臺雩􅀕葢龍見建巳之月巳乃陽亢之時隂氣難逹用女巫舞雩女隂也舞所以逹陽中之隂也又吁􅦹而禱雨曰雩社稷位社五土之神稷五榖之長首種先成故長蔡邕曰其位在中門之右社主隂其遺故北向天子曰大社諸侯爲百姓立社曰國社諸侯自爲立社曰侯社大夫爲民族居百家以上共立一社曰里社各以所冝本立而表之大社廣五文諸侯半之蓋方廣二丈五也皆胃以黃土其主以石謂石土􅀋也其位社東而稷西王之􅀕也南面其服也絺冕其性黝其祭血取其隂􅁼其罇大罍其樂應鍾其舞帗舞其皷靈皷凡皆因其物以致其義庻人􅀩其社功故亦􅀕之春有祈而秋有報也稷非土無以生土非稷無以見生生之效以其同功均利養人故也地載萬物天垂象取財於地取法於天是以尊天而親地故教報焉家主中霤田主社示本也陳氏禮書諸侯城郭之制典命云上公九命子男五命其國家宫室車旗衣服禮儀皆以命數爲節國家國之所居謂城方也公之城方九里宫方九百歩侯伯之城方七里宫方七百歩子男之城方三里宫方三百歩五土所宜鴻别子曰土地各以􅀋生故山氣多男澤氣多女障氣多喑風氣多聾林氣多癃木氣多傴岸下氣多腫石氣多力險阻氣多癭暑氣多天寒氣多壽谷氣多痺丘氣多狂衍氣多貪輕土多利重土多遲清水音小濁水音大湍水人輕遲水人重堅土人剛弱土人肥壚土人大沙土人細息土人羙耗土人醜七水所宜汾水濛濁而冝麻濟水通和而冝麥河水中濁而宜菽維水輕利而冝禾渭水多力而冝􅁰漢水重安而冝竹江水肥仁而冝稲平土之人慧而冝五榖爾雅曰太平之人仁丹穴之人智太蒙之人信倥侗之人武釋菜鄭司農云古者士相見於君以雉爲贄見於師以菜爲贄釋即舎也始入學必舎菜禮先師也菜蘋藻之属蓋以伴宫有芹藻猶子事父母有堇荁也姓族氏說詩曰振振公姓振振公族書曰錫土姓左氏衆仲曰天子建德因生以賜姓胙之􅁟而命之氏諸侯以字為氏因以為族官有丗功則有官族邑以如之周語曰伯禹䟽川遵滯鍾水豐物皇天嘉之祚以天下賜姓曰姒氏曰有夏堯賜禹姓曰姒封之有夏謂其能以嘉利冨生物也祚四岳國命為侯伯賜姓曰姜氏曰有吕謂其能為禹股肱心膂以養物豐人也姓非天子不可以賜而氏非諸侯不可以命姓所以繫百姓之正統氏所以别子孫之旁出族則氏之所聚而已占者或氏於國則齊魯秦呉是也氏於謚則文武成宣是也氏於官則司馬司徒是也氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東門北郭氏於志則三烏五鹿氏於事則巫􅁟匠陶是也盖别姓則為氏即氏則有族族無不同氏氏有不同族故八元八凱出於髙陽氏髙辛氏而謂之十六族是氏有不同族也啇氏條氏徐氏之􅀋謂之六族陶氏施氏之􅀋謂之七族宋氏華氏謂之戴族向氏謂之桓族是族無不同氏也贄禮帛有衣􅀍之仁皮有炳蔚之文故􅀌執之羔有跪乳之禮有羣而不黨之義故卿執之進必以時行必以序鴈也故大夫執之交有時别有倫􅀍文以相質死分而不變者雉也故士執之可畜而不散迁者鶩也故庻人執之可畜而不違時者鷄也故工商執之食邑説秦爵二十級惟徹侯乃得食縣其関内侯本無食邑其加異者列之関内之邑食其祖税漢􅀄士大夫以上皆令食邑食者除租毎户一歳更輸錢二百貨殖傳所謂千户之君則二十萬是也漢因郷評取士謂因人共推之也如公孫弘以充􅑝萬石君以孝謹聞漢􅀄入仕者不限年如劉向陳咸以八十爲􅀰劉辟􅆠以八十爲衞尉公孫弘以八十爲相趙充國以七十爲將軍貢禹八十迁御史大夫漢集議漢置大夫專掌議論事苟疑似未央合中朝之士雜議之自两府大臣以下至博士議􅀰皆得議之不嫌於卑抗尊也如呼韓邪單于欵塞卒用郎中侯應之䇿朱􅀶得罪議獄者五十八人王嘉得罪議者六十人故曰漢集議有公天下之心漢封侯􅃅有宰相封侯者公孫平津是也有婦人封侯者蕭何夫人同封鄼侯樊噲妻吕湏封臨羗侯是也以地名封者平陵冝春是也以功封者冠軍驃侯是也以羙名封者傳望愽陸是也太行山水皆洑流地中関中諸水皆行流地上金銀魚袋唐髙宗給五品上隨身銀魚袋以防詔命之詐出内必合之三品巳上金飾袋垂拱中都督刺史始賜魚中宗景龍中令特進佩魚散官佩魚自此始宋張師正倦游録云魚袋者取事君夙夜匪􅈈之義以金爲飾亦身之華也上公桓圭侯信圭伯躬圭鎮主冐圭公謂二主之後及王之上公􅀟植謂之桓桓宫室之象所以安其上也信當爲身與躬圭葢皆象以人形為瑑但文有麁縟耳欲其慎行以保身也鎮圭尺二寸天子守之鄭氏曰鎮安也所以安四方以四方鎮山爲飾崇髙敦厚而萬物附焉者山也冐圭孔氏曰冐以齊瑞信方四寸邪刻之然冐之以知諸侯之信偽猶今之合符也子榖璧男蒲璧榖所以養人蒲為席以安人璧皆徑五寸子男不執圭者未成國也葢桓強立不撓而安上為任故公圭瑑之身伸而躬屈伸者尊足以候外而蔽内屈者卑足以長人故侯伯之圭瑑之子不足於長人而可以飬人故璧瑑以縠男不足以養人而可以安人故璧瑑以蒲圭者天之用璧者天之體盡其用者必盡其體得其體未必盡其用此圭璧所以不仝也王后駔琮駔音組作方玉五寸上有鼻以組繋之因名焉蓋古者建國王立朝后立市用以爲權也牙璋中璋典瑞曰牙璋起兵旅以治兵守鄭司農曰牙璋瑑以爲牙牙齒兵象故以牙璋發兵又牙璋中璋皆有鉏牙之飾賈公彦云軍多用牙璋軍少用中璋白虎通曰璋位南方南方陽極而隂生兵亦隂也故以兵起爲義如漢有銅虎符魏有兵符以發郡國兵豈牙中之􅁼歟白琥刻虎爲形者以形成於秋也虎禮西方之玉也以塩爲虎形者亦示武之謂也瑗説文曰瑗大孔璧也人君上除陛以相引環玦荀子曰絶人以玦反絶以環范寗釋榖梁曰君賜之環則還賜之玦則往蓋環之爲物或施於佩或施之於反絶佩環則不佩玦六幣相合行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼何也昔大王事秋人以皮幣継之以犬馬終之以珠玉是珠玉重於犬馬犬馬重於皮幣則合圭以馬合璋以皮宜矣繡黼皆隂功也繡則五色之全黼則白黒而巳是繡備於黼也則合琥以繡合璜以黼冝矣婚禮納徴以束帛饗贈送者以束錦聘禮享君夫人以束帛覿以束錦上大夫與下大夫致賔介饔餼皆以束帛賔介儐之以束錦食礼君侑幣小束帛大夫相食以束錦是帛宜於錦也則合壁以帛合琮以錦宜矣圭東方也馬動物也璋南方也皮文物故以文琥西方也萬寳之成莫備於此故以繡璜北方也隂陽之辨莫斷於此故以黼此六幣所以合之之意也皮馬不上堂故圭璋特逹於上然則璧琮琥璜皆非特逹者歟伏日暦忌釋曰伏者何也金氣伏藏之日也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏於火故至庚日必伏庚者金故也臘日風俗通曰禮傳夏曰嘉平殷曰清祀周曰大蜡漢改曰獵臈者臘也因臘取獸祭先祖也漢火行衰於戌故曰臘也漢􅃇儀曰臘者報諸神􅀑古聖賢有功於民者禮記伊耆氏始爲蜡蜡者索也歳十二月合聚萬物而索享之也周禮􅀕䄍則龡豳頌擊土皷以息老物節有八節玉節玉節之制以玉爲之以命數爲大小守􅀖國者用之角節用犀角角在鼻上是角中之貴守都鄙者用之虎節山多虎者用之謂晉國之􅀋以金爲節鑄象焉必自以其國所多者於以相别爲信人節平地多人者用謂衛國之􅀋龍節澤多龍者用之謂鄭國之􅀋皆以金爲之以英蕩輔之英蕩􅀞凾也以竹爲之而有飾焉盛節噐也輔之節者使不損也旌節道路用之道路謂郷遂大夫也符節都鄙用之都鄙謂公之子弟及卿大夫采地之吏也管節以竹爲之析節竹爲符節全竹爲管節如今之竹使符也其有商者通之以符節門関者與市聮事節可同也康誥曰越小臣諸節春秋宋司馬握節以死司城效節於府人而去司馬牛致其邑與珪而適齊珪守邑土信符則守節不特於􅀖國都鄙雖官府小臣亦有之矣漢竹使符銅虎符各分其半右留京師左付郡守傳司関凡所逹貨賄者則以節傳出之如今移所過文書凡通達於天下者必有節以傳輔之漢制門関用傳作两行書繒帛上各持其一出入合之豈古之遺制歟秋磵先生大全文集卷九十八
