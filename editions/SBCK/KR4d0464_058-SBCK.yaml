body:
  text: 碑渾源劉氏丗德碑銘并序金源氏倔起海東當天㑹間方域甫定即設科取士急於得賢故文風振而人材輩出治具張而紀綱不紊有國雖餘百年典章文物至比隆唐宋之盛􅀂夫篤志力學挾藝應選首破天荒魁冠多士父子昆季相継擢第爲名士夫作良牧守文行端雅門第清峻爲金朝第一流者其惟渾源劉氏乎劉氏出彭城望族五季板蕩播遷朔土遼末逺祖諱用者居弘州順聖縣之耀武関丗業耕稼生子翰贈承德郎配張氏追封彭城郡太君生撝字仲謙即今監察御史鄰之髙祖也始釋耒耜習進士業當遼金革命擾攘際學未甞一日廢天㑹二年肇闢科􅂣公以詞賦第一人中選惟遼以科舉爲儒學極致文體厖雜萎薾視晚唐五代尤爲卑下公勵精種學文辝卓然天成妙絶當丗一掃假貸剽切牽合􅀘綴之弊其後學者如孟宗獻趙樞張景仁鄭子聃皆取法焉金國一代詞學精切得人爲盛由公有以振而起之也釋􅄄右拾遺轉知天城陽曲懷仁三縣擢大理正遷平陽府判官安東節度副使兩貳大理寺出刺石州累官中大夫年六十三卒於位翰林學士張景仁碑其神道公性淳厚見義固執待物誠好誘掖後進三爲理官議獄主恕不屈於權䝿故多平反􅀹長於治民興利除害􅀂嗜慾然施設有條理簡便可持乆所去見思圖形奉事素愛渾源山水幽勝買田家焉晚号南山翁夫人渾源雷氏北京轉運使思之女封彭城郡君生四子曰汲曰渭曰滂早丗曰濬汲字伯深頴悟絶人早傳家學與弟渭同擢天德三年進士屢爲州縣有聲累官朝散大夫應奉翰林文字西京路轉運司都句判官平生寡合不覊慕郭林宗黃叔度之爲人晚節倦於游䆠放浪山水間以遣興讀書爲樂稱西嵓子述壽蔵記叙其行已甚悉卒年五十八鄆王府文學陳訥銘其墓有西嵓集行於丗屏山李之純引其端娶曹氏追封彭城縣君一子偘字稚川大定十年進士第積資奉直大夫豐王府文學兼記室叅軍孫一從䕫字和卿奉聀出身善作詩曽孫文祖渭字仲清少好學克紹箕裘旣登苐授承德郎知秦州隴城寨事調隰州軍事判官終朝列大夫岢嵐州刺史號老人一子价河水泊酒監曰濬廼鄰之曽祖􅀶學強記少有聲􅂣屋間既而用􅄻入仕至安逺大將軍饒陽令配張氏封彭城縣君生四子佖似儼侯佖字稚行宣武將軍真定府軍資庫使三子從善字澤卿彰德府酒監從皐字平卿從契字禮卿武義將軍克勝軍副都統孫五人曰郊武義將軍曰郅等俱早丗似字稚章孝敬友愛出於天性力學能文称其家聲四試于庭不偶用恩賜苐授承仕郎華州教授再任承直郎主沂水縣簿娶王氏封彭城郡太君壽五十五終於家遺文雄深簡古有廼祖風甞訓子孫曰爲士當先行檢如絲之㓗將立其身愼無􅀧汙汝佩吾言則無忝矣故屏山李純甫表其竁曰善人劉公之墓其爲士夫之紀蓋可見矣一子從益字雲卿自髫齓時已有成人度擢大安元年進士乙科調鄯陽丞長􅁑簿陳州防禦判官皆有治績投機應變措畫出衆意表進提舉南京路摧貨事丁沂水君憂起復拜監察御史君􅀒材尚氣資之以學欲使事業表表大見於丗一旦聀與志合所言朝廷紀綱時政利病竟與宰臣辨論得失不屈去聀閑居淮陽與諸生講明伊洛學乆之選令葉縣至則鋤強剔􅗜豪族惡黨禁不敢少肆請免逋租三萬石致流民自歸者口數千大起孔子廟既樹教本集諸生肄習其中風化大行考課爲河南最未幾召入翰林爲應奉不踰月而卒得年四十有四雷御史渊誌其墓趙翰林秉文勒銘神道皆称其噐識明敏剛直敢言學可以輔政教材足以濟時艱賫志以殁士論惜焉葉民至廟而祀之孔子称遺直遺愛者豈近是邪蓬門其自号也蓋取南山翁誡子詩元自蓬蒿出門户莫交門户却蒿蓬之句有文集十卷粹而瞻通而不流􅀋其爲人丙子嚴氏封彭城縣君子二祁郁祁字京叔少頴異爲學能自刻厲有竒童目弱冠舉進士庭試失意即閉户讀書務窮逺大􅆂滀鍜淬一放意於古文間出古賦雜􅀃數篇李屏山趙閑閑楊吏部雷御史王滹南諸公見之曰異才也皆倒屣出迎交口騰譽之及與御史公退居於陳相與講明六經直探聖賢心學推於躬行踐履自是振落英華収其真實文章議論粹然一出於正士論咸謂得斯文命脉之傳壬辰北還郷里躬耕自給築室牓曰歸潜歳戊戌詔試儒人先生就試魁西京選充山西東路攷試官後征南行臺拈合公聞其名邀至相下待以賔友凢七年而没享年四十有八翰林承㫖王磐誌其墓娶史氏洛陽名族一女適前監察田芝子文冕一男景山終國史院編修官孫一興同有神川遯士集二十二卷處言四十三篇歸潜志三卷行於丗郁字文季亦名士中統元年肇建中省辟左右司都事出尹新河召拜監察御史能文辝工書翰别號歸愚卒年六十一娶趙氏前禮部尚書璜之女一子景嵓鄴字伯震一子景巒儼字稚昻鄰之祖也登承安二年進士第累官至中奉大夫秘書少監壬辰北渡痛宗國云亾蹈河而死配李氏封彭城郡夫人三子從禹字虞卿登正大七年辝賦第官至朝散大夫同州録判一子曰都從愷字舜卿自㓜卓犖不羣稍長入郷校擅能賦聲再舉不契就􅄻􅀘官授武義將軍登封主簿已能綜覈縣務束濕吏曹人不敢以少年書生易之國􅀄生聚稍集遴選廉能急於撫字辟府君攝領韶州事継真授冝陽令縣當兵後庶事草剏髙下下車廉知其利病休戚斟酌而更易之凢科取差徭必驗其等第俾均輸焉暇則集俊秀於縣庠講明禮義羙善風俗爲政才朞月而頌聲四逹終更授河􅀯府路經歴素精吏事婉畫恢恢刃游餘地致六房無滯務公餘與紫陽楊文西菴楊公九山李子微薛庸齋微之觴詠於泉石間中統四年正月卄八日以疾卒於私居之正寢壽五十有五娶張氏宣德望族貞靖柔懿自在父母家巳称純孝及歸于我事舅姑恭順飲食服御非經其手不進也終於至元卄三年十月卄日享年七十有五葬合祔子男三人􅅠字君羙平江路人匠提舉至元三十一年十一月以疾殁得年五十有五配叚氏享年四十有九鄗􅀽部􅂣管句鄰才識警敏練逹時務由省􅁺授承務郎工部主事次陞承直郎順德路緫管府判官選充監察御史女二長適渾源州王氏次適應州元帥韓公之孫孫五紹祖江浙省宣使慶祖澱山廵檢継祖勝童乞童從稷字賢卿終濟南路儒學教授三子曰郇曰郴曰郛俣承奉班祗候遂州酒監一子從周字文卿劉氏先壠始葬順聖之耀武関南山翁徙祖營於渾源縣東北黃嵬郷御史君以丗故流離起先塋於宛丘神川旅殯洹水歸愚㝎􅉎燕山令鄰奉大父中奉公衣􅃣及考妣柩安厝於河南北邙之原是爲渾源劉氏洛陽新仟鄰復欲彰先懿昭孝思圖不朽諗不肖甞問學於神川先生知其家丗頗詳持張陳李趙雷王諸公銘誌求述丗德碑以猥列後進年迫㐮謝不能發越先賢事業且何敢秉筆於諸名勝之後堅辝者乆之鄰復曰金亡士之北渡者百不二三今消磨已盡求接見先輩老於文辝而最知名者莫公􅀂也今弗惠頋則先丗之事將何於託不􅀗已廼採掇諸公緒餘及巳之聞見而知者㑹歸其極而系之銘銘曰漢庭射䇿貢士遺風排黜百氏仲舒是崇唐文三變敗北無從振起衰薾尊昌􅀺公兩公傑出莫之比隆考其㣧裔孰継芳蹤大名難再氣數竒窮金源立國網羅才雄首魁多士惟南山翁程文妙絶一丗師宗當時景仰韓董攸同子孫克肖家學是攻巍科七决聲華摩空故家文獻泱泱大渢蓬門卓尔丗業克充言直行果節効匪躬支撑傾頽致時之雍賫志雖没留名則鴻中奉矯矯聀貳大蓬存亾惟義表我􅀌忠子孫昌熾為報則豐神川力學洞聖心胷明理貫遒匪文奚工玉佩瓊琚大振辝鋒導家學之渊流㑹百川而朝東章甫適越惜不時逢隂相同氣先志恢洪朱衣白簡乗御史騘何劉氏之多賢試紬繹其始終種德植善無踰於農立志務學禄在其中忠義仁恕傳嗣彌縫維人事之克盡見天理之昭融冝澤流渾水之源青蔚南山之峯北邙之原巋然新宫丗故牽率匪􅁯祖封是惟金百年文宗之裔過者敬恭大元故廣威將軍屯田萬户聶公神道碑銘皇元以神武戡定區宇剪金取宋保塞一軍號称雄勝帥閫堂堂節制於上亦由部曲宣力得其人故也况聶氏與蔡國張公奮跡布衣義同里閈依乗風雲奕丗竭節者哉公諱禎字正卿丗爲定興沈陶井里人曽祖洎大父皆在野不仕父福堅資豪偉善􅀐射國􅀄張公團結郷義柵西山之東流堝選推爲百夫長從定河朔取汴蔡有殊績終襄縣屯田緫管母夫人叚氏同里大家生四子公其長也幼沈􅋧寡􅀏言不作群兒嬉及長聦敏好學有謀略慷􅁣尚氣節年十七嗣襲父聀張公察其才武試以攻守之方爲問條對洒洒有成筭公愕然不復以嚮之呉下阿蒙爲睐歳丁未率本部分功立􅂎城亳阨宋人出没以絶侵軼之患継攻泗州前後以功受賞有差巳未扈丗祖皇帝渡江攻鄂渚拔蝥弧先登䧟東南城堞都督戰親覩壯其勇酌酒飲賚以紀其功其年冬命領千兵迎援大帥兀良合反於長沙水陸轉戰備甞艱苦竟逹漢陽由是陞緫轄仍佩銀符中統三年賊璮叛公攝千夫長分圍歴城接戰甞先諸道兵蒙賜鏐馬俾激士氣璮平遂南城荆山至元六年真授千户易以金符是年朝廷進軍㐮樊公屯守鹿門甚力至元七年行臺命公將畨漢馬歩三千人取新興寨公曰彼衆而恃險我客而力不一惟當神速掩其不俻可成功尓遂一戰而克斬馘不勝計生擒者七十人賞楮幣四千緡至元十二年分􅀠元帥孛魯􅂬収連海淮安等州宋守將許安撫者陳艨艟五百艘以俟公帥麾下直擣之許少却水陸乗之彼軍大壞殺死溺水者十七八盡􅀗其戰艦噐仗帥府上功奉㫖陞武節將軍継攻下招信泗州階進宣武時孽宋巳亡江西湖南皆内附獨静江恃其險逺旅拒上以亳軍素精銳戰必勝攻必取命摘全軍進擊至則賊􅀔披猖公率猛士深入殊死閗首奪西南城堞衆隨之以進城䧟捷聞加授顯武將軍行軍緫管桂境雖平大兵後所在草冦切發充斥山谷間爲良民梗衡山茶陵尤稱搶攘帥府稔公威名烜赫摘諸翼兵千人徃平之公窮竟窟穴夷抉根株其脅從汗染者諭歸田畒井邑按堵軍無私焉所在老㓜擁馬首泣拜曰非公活我吾四縣遺民二十餘萬無噍􅀋矣其戢禍亂威愛兼濟有古良將風既而蒙古漢軍都帥張侯以公部曲故家屢立駿功請於朝復備將佐十七年從張侯入覲進拜明威將軍亳軍副萬户仍賜錦􅂁一襲旌宿勞也俾鎮建康㝷移維􅀭十九年選充江淮都漕運使二十五年改任廣威將軍大都屯田萬户一載間區畫營屯耕稼有法比前政収􅀗爲倍蓰二十六年更授右翼萬户田旌閃閃有万屯曉唱之楽至元卄六年三月十六日以疾卒於官享年六十有二􅁙祖塋公資外嚴毅内廓如也孝於亊親忠於爲國出天秉固然治軍旅號令嚴明部伍整肅臨陣抗敵挺身决戰略無顧惜故毎戰有功聲名烜赫暇則讀書不輟左氏傳通鑑戰國策皆通大義古人良法羙意竒計偉畫渉獵融㑹多見諸行亊方經略南服母夫人陳氏尚在堂公廼心王亊不遑暇然遺親之念未甞置頃刻也一旦心神内動泚流􅀍靣曰豈吾親有故動於彼而應於此邪即請歸覲比至太夫人喪尚未歛公攀號屢絶痛其終之無所存活克㐮大亊郷里感嘆爲平昔孝誠所致夫人郭氏同縣南王里人温純恭謹奉亊老姑怡順進退不敢自專年逾四十夫貴子長應對門内事尚以名称姑病早暮侍養不少懈倦湯劑必甞而後進及亡朝夕廬􅀕者三週歳宗黨號曰孝婦待妾媵有恩礼略無嫉妬子一十一人長曰惟義承父爵右翼屯田萬户次曰惟謙峽州夷􅁜尹曰惟明閤門宣賛舎人曰惟孝惟爵未仕皆郭出也余㓜未名女四人俱適望族元貞建號之二載冬十一月惟義踵門來請曰自惟無所肖似尚頼先丗遺澤嗣守緒業朝夕惴惴愧無光􅀭惟是鑚石紀銘表諸神門圖報萬一稔聞翰學先生學古詞逹當代將相家皆有煩於下執亊儻得銘則爲不朽矣中統建元余應召中省獲識蔡國父子及提憲河朔􅀰山雞水之間亦甞廵歴載惟疇昔輙次其件右而繫之以辝銘曰大夫挺志無先外事况乎戰陳聖所慎毖不有諸内孰形於外擴我秉彜克作其氣惟燕南陲聶宗所系奮從雲雷以功名憙侯不封萬志焉罔遂報之後人福禄何既桓桓廣威克昌再丗曉暢戎機蔡國首噐發蹤指獸俾展其翼橫戈長江斬䲔蒼海萬􅍳同心雅􅁔奏凱長驅静江指顧摧敗草切蟲如肆爲民害玉石既分善良攸頼笳鼔歸來旌斾􅀭彩酬功進爵大􅀩天賚髙大門閎郷閭歎嘅不知其中大本有在子曽有言質而弗礙篤孝惟移化而忠義公於臣子存没無愧巨川騰波郎峯聳翠片石干霄千古光配大元奉聖州新建永昌􅀚碑銘并序奉聖本秦上谷郡地唐始立新州石晋割賂於遼更今名亡金陞武定軍節度今雖爲州當兩都徃來之衝其地望尤重於昔雲山環抱川流交貫樹藝茂盛有中土清淑之羙風俗雄碩樂施而好善盖燕雲習尚氣義而然也據治城東南里許有道􅀚曰永昌其􅀄祖寂然子張志玄隠微丗居河東之孟門縣越自髫齓歆挹真風從平水景錬師爲全真學既長正一法籙亦稱精䆒貞祐南遷所在俶擾聞長春丘公應聘龍庭師喟然嘆曰天道在北吾將逺遊雲朔庶有遇合聿隆道紀至永興之清樂郷愛其山水幽勝遂結􅈋而居凝神坐􅁯志趣叵測謁漿之家咸異之曰彼其中必有所得豈徒然哉由是風動一方日奉香火羅拜菴前間有請必恍然開悟廼相與選勝得獨山中水頭地起建琳宇處師爲上賔榜曰迎仙尊顯之也師佩上清三洞靈章主盟武定者幾卄載前後化度門人甚衆惟呉張盧三法師得其要妙而呉在伯仲爲㝡寂然謝丗蔵􅀚南化臺呉號通玄子氣㒵魁偉志行誠篤体含妙用動逹玄機寂然師知爲受道噐常勉之曰汝舉止異常言論卓犖通文辝知醫藥恐鸞翔鶴翥終非草野間物寂然既終行縁城市人或叅扣誦荅如流有一鉢千家飯渾身百衲衣心如江月朗情佀埜雲飛之句其􅅐懐洞徹如此加以符水療疾隠痛隨愈衆驚異以有道目之逹官豪右共來敬禮至有得望其風采而爲幸者闔境尊信法縁􅆻合遂易亾金劉大監別墅爲棲真所中有亭崇䑓層檐爲一境偉􅀚即改亭爲殿奉三清睟容下逮齋厨庫廪以次修舉署曰永昌與迎仙爲上下院自是徒衆雲集檀越之家設醮筵而徼􅁳福求符藥而濟灾屯者憧憧而來曽無虚日鍾磬之聲隠然聞市肆間永昌琳舘爲一方名勝道俗歸依之所矣通玄仙去寜神於永昌之南以後事付上足弟子虞法師師行業修㓗和光同塵心存濟度多蒙藥惠􅀘治遺缺而􅀚之規爲始克完具以推擇充玄門道録虞寂陪􅁙師側其徒崔志善踵而増飾之崔没盧法師以道録來住持焉傳之門人李道素道素姿朴實惟恐遏逸前光内則起廢寮舎外則増置田圃朝夕齋戒載勤頌禱望髙羽流擢判管内道門事廼惴惴不遑曰向上師真刳心勞神披荆榛掇瓦礫鋪敦教基吾輩何有坐享其安惟是刻石紀行俾見興建本末庶垂不朽來丐銘予以道不同不相爲謀牢讓者爯請益堅乃酌取大方家見於吾儒之紀載者論次而銘之後丗所謂道家者流盖古􅀮逸清潔之士矣巖居而澗飲草衣而木食節欲以清心修已而應物不爲軒裳所覊不爲榮利所怵自放於方之外其髙情逺韻凌煙霞而薄雲月誠有不可企及者自漢以降處士素隠方士誕誇飛昇煉化之術􅀕醮禳禁之科皆屬之道家稽之於古事亦多矣徇末以遺其本淩遲至於宣和極矣􅁦極則変於是全真之教興焉渊静以而行翕然從之寔繁有徒其特逹者各牗日名其家􅀂寂然師弟弘衍慱濟教行山此是也耕田鑿井自食其力垂慈接物以期善俗不知誕幻之􅀃爲何事敦純朴素有古逸民之遺風焉而又􅂌授得人顯􅀭斯在是可書定安之白雲觀盧法師建永興之觀張法師建與永昌同一法眷也銘曰道之大原玄文五千慈儉不争清静自然辝固奮激至理無邊修道謂教由是之焉全真爲學本乎善渊返純還朴復太古前䆒其源委豈􅁯蹄筌寂然出丗私淑其傳雲朔俗勁聞善易遷坐􅁯感化孰分後先傾心信嚮克興大縁絶塵而下復得通玄化行城府重闡法筵一時景仰道價翩翩香火奔走先業昭宣燕處有室耕鑿有田遺我後人基緒綿綿門人継承持守拳拳光􅀭有例刻銘瑶鐫流光遺照何千百年大元故正議大夫浙西道宣慰使行工部尚書孫公神道碑銘并序雲西風土雄碩龍山峻極爲之奠焉渾流交貫神川清淑資其潤焉故士生其間有瓌竒宏傑之稱而劉雷爲之冠焉然山川炳靈奚間今昔况河洛爲帝王之里并汾多攀附之臣儷景風雲依光日月者哉􅀂乃始以材技有光丗緒終則挺輸忠藎作時名卿安榮福壽慶流後裔者誰乎故宣慰使工部尚書孫公其人也公諱公亮字継明丗家渾源撗山里曽祖諱伯大父諱慶文咸勤力務本不耀其光顯禰諱威爲人跅弛不覊早以功名自憙少有巧思肄函人民業繕治堅宻出新意於法度之中方太祖聖武皇帝經略中夏緫􅄃豪傑貯除戎具爲亟廼挾所業投獻上賞其能應時需賜名也可兀闌􅃬佩金符充諸路甲匠緫管太宗朝從征秦􅀳惻民􅀍屠戮屢以蒐簡工匠爲言頼全活者衆顯妣杜氏主内務有綱紀嘗辨雪工徒質逆之誣因之脫死公生漠北年十許歳緫匠君挈之入覲太宗異其風􅇧曰此兒他日必大享用蒙賜御饌自是得出入禁闥矣及長資英明多藝能慷慨有大志練習國典通曉譯語所交皆一時豪雋衆亦以通材許之庚子歳襲父軄佩銀符定宗朝換金符歳進課精例賜錦幣憲宗特賚貂裘仍􅃙継稱父賜名丗祖皇帝在潜邸上命歳輸百鎧有中七矢而不貫者其堅完如此及南征果􅀗用中統建元授都緫管上北征駐昔没敦公出私財製甲胄六十襲以天顔喜甚錫銀笏忠結命領諸路雜色一奏四十妻工之鰥者􅀊支衣糧贍濟不給局廪給自此始又考制度定程式作諸路恒法公自承嗣選材下招亡恤弱出􅀻財以代公費􅀗而軍興蒙賞進秩可謂盡心所事克以人材抱􅀒論之于將􅀘寳鼎枝車未膺所用有􅉱不能自巳者至元改朝廷清明治具畢張公上抗言冝設御史臺肅正紀綱雖不遑有符士論偉之五年憲府肇建特拜監察御史官忠翊校尉上諭大夫塔察公曰他人則未之識如也可兀闌朕熟其忠㢘冝與汝共事時官僚極一時選較天多識朝廷故事洞逹諸色情狀材氣足以投赴事機威望可以懾服豪猾在公無以踰一旦職與志愜思明目張膽鯁言無忌仰荅恩遇是風生白筆氣凌霜簡論列無虚日時宿衛鷹房待城社頗縱恣在他人弗措手者公優爲之如上時門強奪民物東安州縱馬駞囓食桑枣甚至伐為薪公痛䋲之以法至畏避上聞而以目之年考滿憲長奏公自供軄無􅀧水私至絶飲風稜銛利刺督切中裏行無出其右時選擢正爲此爾可再任俾矜式新進者既而察為外事還西川行者冐支楮幣二萬餘定之義爲役兵士治第採薪至􅀍虎五十仍奏治其罪十年夏宣授金符武德將軍簽山東東西道提刑按察司事至則務實用顯效張皇憲度故材㢘者必薦姦貪者必置於法州郡惴惴奉約束惟謹褰帷具瞻有風動百城之目東平路監尹出貴戚簡重自居監司官至郡未甞相覿聞公來按部迎謁境上紏治豪縱不法者十數輩曽無一語護援及去復伸餞禮愽徳髙唐􅂄老貯香於頂來迓曰自立憲司未覩稱軄如公者我輩􅀗安田里受賜多矣其威望顯著吏民畏服可知已十二年陞山北遼東道提刑按察副使遼東境土曠逺諸王營帳洎諸部種人雜處其間恃􅀔相凌爲申嚴法禁革去宿弊豪強歛迹小民氣得少伸分司遼陽親王近侍五人刼居民資用且歐擊之有司不敢䆒民來訢即械五人徇通衢王諭釋其罪竟杖决之滦水闊而雜沙石自昔無津樑命造荆絡貯碎石爲柱以成橋倣此建者百所自爾遼右免病渉之苦十三年進階朝列十四年春陞授中順大夫彰德路緫管分佩金虎符惟相當南北衝㑹民物繁夥自昔爲河朔名郡然政務煩重視鄰路爲蓓蓰公諳練政體材地有餘當王事坌集訟牒交至泛應曲當不失時措之冝平生遇事有爲一旦重膺民社廼䆒竟利病俾實惠及民以三事躬請於朝其一比歳霖潦傷稼民多闕食准免逋稅九千七百石其二諸郡翰逓取道本路徴發車牛越廣平扺順德徃還餘五百里非惟偏倍恐民力不堪蒙以廣平之磁州代焉其三本路稅粟歳輸大名秦家渡由唐宋渡河東南行百五十里歳晏寒沍車人告病聽於唐宋倉輸納前政貸民資五百餘定起新附軍營舎至是亦給公帑邢民李閏六甞殺人累問弗伏干證餘百人移公推宻廉其實遂伏􅇳餘得釋時以神明稱終更相人懷思至琢石頌焉江淛平上諭中書省造作事重當選能者主之十六年冬授正議大夫浙西道宣慰使兼行工部事籍人匠四十二萬立局院七十餘所毎歳定造幣縞弓矢甲胄等物十八年上命左丞相阿刺罕等征日本給辦艨􅓘戰具繕製堅完都將以聞上曰也可兀䦨豈有誤邪二十年十月來朝大爲上所􅅄諭賜宴於便殿二十二年授江西等處行工部尚書上章致仕閑居清􅁐毎風憲洎臨民官來質疑必告以益國便民之方二十四年九月覲上於朝殿上念丗臣之舊問年今幾何居某處子孫幾人奏對畢賜食俾坐於御榻之西上遣大府卿納里忽問曰飲飫飽未復賜鹿羮白酒沾醉而出大德元年子拱緫尹大同奉公與夫人張氏還郷里時公及夫人夀俱髙日與親友相飲宴郷人榮之改渾源西北山曰晝錦有司亦用名郷四年正月卄九日以疾薨于􅀻居之正寢享年七十有九遺訓子孫勉力忠孝少不及私二月十四日歸􅁙于渾源州西劉村先塋之次送􅁙者數千人哭聲聞數里外蓋平生感懷於人者如此夫人張氏梁氏皆出名家張氏終於四年秋壽八十有四梁氏先公没子三人拱資誠實材果純孝力學由工部侍􅀰陞受少中大夫大同路緫管兼府尹本路諸軍奥魯緫管管内􅂆農事擏武略將軍武備寺丞振忠翊校尉定海縣尹女三長適安平縣尹趙㐮次適李氏劉氏孫男四謙襲丗職從仕􅀰保定等路軍噐人匠提舉次早丗諧承真郎利噐庫提􅀧􅁩進義副尉保定等路軍噐人匠提舉孫女三適趙氏王氏次㓜曽孫男一㺜頭曽孫女三長適李氏餘㓜公儀􅀚魁偉氣量蠭閎羙􅂡髯容色莊厲閑習時體譯語闌翻雜以談謔顧國種貴卿無以易其論列公朝集議僚属處正奉公詞情剴切毫髮不假借善爲鉤距能得小人根株窟穴似夫古之能吏才大夫至於奉上忠事親孝交友誠雖位望顯赫循循謙譲退然如無能爲者齊家教子敦篤義方循尚禮法又似夫齊魯質行之士生平疾惡由義激中其心休休樂善成羙出於天禀粹厚放良􅆇􅀗百餘人貸貧民子錢七萬緡冝其三任風憲位正緫尹丕張丗守官簉六卿剛直有守􅁢恊士論忠勤無間簡在帝心福壽綿延子孫衆多家門隆盛雖曰依乗亦由平昔操履感召有以致然也可謂材德具備勲名兩全哀榮終始者矣嗣子拱以墓碑來請因憶至元戊辰憲臺􅀄立公與不肖同擢御史引見丗祖皇帝於廣寒殿自爾議事松㕔聮鏕􅍡馬義氣交孚相得爲甚􅂬後偕官於相迨歳壬辰應聘北上復私覿保塞追叙契舊當時並峨豸冠今所存者獨吾二人公又奪去僕雖耄忍無一言邪既叙梗概仍系之銘銘曰雲龍奮飛西北天神武載造坤與乾有來羣后捷戎軒所在戈甲相周旋孫矦挾技善逹􅁠賜名訓徒􅂌任顓函惟扞格貴弗穿函雖多様公發源犀兕七属光生煙上爲嗟惜賞丗延風雲儷景同翩翩執藝諫請多活全􅆇孫有後理固然公其挺生鍾丗賢嗣興遺緒心彌丹鯤化躍出天池渊豸冠執法班朝端憲綱未舉爲進言太微一夕光星纒朱衣白簡相後先忠臣憤激同鷹鸇秋風􅅮擊無空拳上目剛直由􅀌騫青齊遼碣海岱連地廣物衆牙孽間繍衣風彩何翩翩積弊一剷摧邪姦耻令趙張出吾前煌煌金節臨漳洹霜空霽嚴政春妍矦伯正位務固繁剸裁錯節驚龍泉吏惟寛慢猛則殘要本實惠蘇民編三事上請民力殫轉輸省便逋賦蠲橫歛追給公府錢去思有頌德化宣江淛平一俗巧儇訓授程課需丗官共工汝賢常伯聮工局染院勞次銓歳時供億物利堅聖皇眷頋稱忠惓一朝上章遽引年功成身退名節完嗣矦亞卿請外遷作牧郷郡意所便錦衣榮養白晝鮮丗期福壽方綿綿丘山零落舘舎􅂢停雲苒苒橫之巔時有白鹿馴其仟神遊凄断招來篇自昔豪傑誇雲燕乗時樹立孰敢肩千年酆劒埋神川􅊊􅊊紫氣衝斗邊何以驗之瑶有鐫英聲並與斯銘傳秋澗先生大全文集卷第五十八
