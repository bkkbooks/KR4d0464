body:
  text: 􅀕文􅀕蒲大夫文大元􅀦至元十八年􅀊次辛巳三月丁酉朔十有九日乙卯朝列大夫燕南河北道提刑按察副使謹遣從事賈汝霖以清酌庶羞之奠致􅀕于河内公之神惟公徳挺群􅈒獄清片辭列髙弟于聖門􅀭仁風扵蒲邑三善之羙庸􅀎旣耶適星垣有分按之行過神宇致一柸之奠庶祈靈貺以益不能尚饗􅀕孝感聖姑文惟神肇迹博靈遇仙渦浦㦤昭靈作蚕聖母千祀永頼神功斯􅄎食弗再則飢衣弗製則窶念此􅀊事惟神其恵顧之尚享故江漢大都督河間路緫管兼府尹史公􅀕文幽霫萃氣招揺耀芒合是二者篤生忠良惟公應運挺出􅁸家朔方奮父兄之餘烈荷天衢而鷹􅀭武済文經爲峕棟梁􅀫一軍於陽夏号東南之精強枳􅁄非􅀁移旌鎮穰撫我瘡痏靖我邊彊其恵春雨其威秋霜掇我殘棄変而金湯復我陂障積而􅁜岡孰慮鱗介易我衣裳彼氣日索我師堂堂果上鈞之一戰掃敗葉扵秋啇毎出竒而制勝􅀄不知古人之所長殆羊􅀓之乆駐控上流扵荆㐮雖飛渡之無及吴之所以亡者本由此而用張能回百􅀾之餘勇効政蹟之章章鬰公堂之佳樹至今三鎮指為公之甘棠然干将而􅀘履終所用而失常加􅁨深而思逺此夙夜之所以遑遑也竟風悲於大樹奄龍剱扵幽藏嗚呼才有餘而用不悉位雖髙而志靡償曽桃李不言而天下為之傷也公常幕余二年倘佯促滕言􅀏執手飲觴略吏事而不責謂國士之􅂉當兹奉恩綸按部滹陽望龍驤之茔域䏻我涕之弗滂㵼平生於此辭庸表公之􅂨腸噫慟臨江之哭在公則萬事巳矣有子孝継以後則其流未央神之聴之庶少慰其所望也尚享􅀕郝奉使墓文大元國至元十七年􅀊在庚辰二月十有二日甲申朝列大夫燕南河北道提刑按察使友生王惲堇以清酌之奠致􅀕于故翰林學士國信大使􅁜川郝公之墓嗚呼甲寅之冬仲月之尾公自􅂎來道出鄘􅆁始覿清􅀭重於夙契把酒論交􅀏談㳺藝頋睐回翔吾子可誨臨别之語一何勉慰維中元春雲龍交際我時㳺梁與公再㑹東舘相過四并同醉所學所行尽發其祕北次龍崗嘔血而癘書来及予愈見友義我車北轅公已南逝自兹及薨凡十六􅀊追憶平生潸焉出涕公之問學閎肆汪􅐮公之文章豹炳乕蔚万斛淵泉岀不擇地太史与倫皇墳可嫓浩浩江漢万古不廢發為忠貞見諸行事著書垂聲諒非本意匪予得私乃世公議今我想公令人短氣斯文綫如忍復殄瘁直筆疇㱕大􅁽孰􅂌偉蹟鴻休光潜􅀭厲而最傷公爲國出使􅀄舘儀真主成和計奉持國書以死自誓万介外侮群狵内猘莭落瘴㷑精誠益勵属國平原同㱕一致長星墜芒使軺還轡玉上青蠅何啻一二惟皇聖明見萬里外録劳弃瑕予豈汝罪士無賢否入朝見忌膚愬再行與病交􅇵一僨不起萬事瓦弃感時懐人憂來附髀昔賢有言常論我輩大㮣無差節目或滯如公之才如公之志雲夣九吞曽弗芥蔕俯掇勲名髙視一丗意廣思長反爲物制豈惟公傷因以自識茫茫太鈞形流萬彚幾丗幾年生此偉器贄用潓宗􅁩逢漢帝百未一施胡奪之易雞水淪光􅀰山歛翠􅀮然一丘保之西遂車過腹痛我懐􅂚旣黃鳥聲悲助我歔欷臨風拜公􅂘而載酹嗚呼哀㢤􅀌忠伊􅊊幽憂樵悴生罔􅀎伸死而永閟寓哀斯文庶昭枉昧公如有靈恐予言為知己也尚饗􅀕武強南龍池神文維神威洞渊府奮飛天衢致雨興雲執帝之樞頋此兾野時極焦槁桑半捲而虫作􅑂􅂖出壠而氣未蘇農官至無可而勸窮民将失所匪惟吏責恐亦神之所當虞也况蒼精昬見􅃴時之雩望靈池而致禱庶少金其區區嗚呼帝而下君也我當供厥聀耳免吏責而􅀊有成則其敢後諸尚享北嶽兾之爲分方数千里惟嶽峻極于天神奠安之水旱疾癘神主宰之今者地不藏陽寒氣失序歳律向終未霑冬澤俾野􅁟不膏宿麦無望春疫將興巳足􅀷慮饑饉荐至民何以生祈􅂖請命憂人之憂是亦部刺史之責也慺慺㣲誠敢用昭告尚享祭侍講學士竇公文惟公性極純誠道􅀷養浩㓜學壮行出人意表於周吉士在漢有道以術濟人方德則小丁巳春識公於沙麓之墟辛已夏吊公於肥縣之保憶忝列於􅌡洲閱歳華者再抄丗知公漢家之羽翼我以爲中朝之元老謀方􅈾於聖咨憂􅃍遺於丘禱今也云亡士林悴槁据愸遺而論斯民有無禄之歎以順受而言得五福終命之考再拜墳阿奠酹草草頋藥籠之纎微盖以荅平日之不我少也尚享丞相史公明忌日􅀕文十六年十二月十九日按部中山府維公出入􅀅相存殁哀荣公自去丗于今幾齡定人思公雖殁猶生永言不忘曰忠曰貞見之範圍展也大成勛藏盟府德為丗程赫赫堂堂如山不傾定人那知功􅀍齊民惲向侍燕几謦咳親承今遇明忌来拜神庭感念在昔依依我情有樂陳列有酮在罌碧映堦酹兹一觥尚享定人像公於西北隅皆享祀謂忠孝㑹史公祭文惟公徳冠群后望隆漢儀一節四朝知無不為􅀵武定文綏之畧有金声玉振之規發至仁於易簀識大運之盈虧何巳私之曽及顓戒殺而為嬉雖羊祐知吴亡而􅂆進房喬以征遼而未冝固􅁕與之等夷也嗚呼柱石巍巍歘然中微風雨震凌恲幪者誰俾為善者嗒然而若喪変怪者百出而不疑此又丗之歔欷而含愴也公殿是􅀖尤極恩威峩豊碑扵國門冝鎮人之涕洟切甞荷公左提右㩗豈孺子之可教在􅆑而翼之之恩大有濟扵艱危及聞公薨身縶情馳矌一奠而如􅀒盖五年于兹也今我何幸改􅂌燕陲歴河山之故封悵音容之依稀念公平生其􅀎巳而公雖云亡為丗􅆱􅀛公爽在天尚􅂶念之盖生而矝其愚旣有以省録豈殁而知其來復無􅀁維持也追盛徳而􅂚報庶不辱我公之所知尚饗岱岳祠禱雨文嵓嵓岱宗雷雨宅􅀆艮震對代生物仁􅀆片雲膚合天下澤􅀆兹者春霜例灾桑柘空􅀆二麦含實勒将槁􅀆秋雖下種不岀􅁟􅀆無􅄄無糗􅀊何卒􅀆衣􅀍饜飫膚合力􅀆仰惟岳神其念兹􅀆憂民之􅁨而亦部刺史公之責􅀆慺慺㣲誠神其鍳􅀆尚享黄石公祠乞靈文惟公鍾秀崇丘降神圯上靈氣驚丗倘怳莫詰如子房以韓亡之餘開炎漢之業為帝師之崇其􅂋授隂翼竟済丗羙者先生之神之功也不肖猥叨時名艾服官事余廿年毎以昧於事機動成乖戾為愧然非其材而楽之者有賢父兄故也矧先生明靈乎至若矝其愚昧濯其固陋増益其所不􅀎非先生其誰用是乞靈祠下區區之懐神其鍳兹尚享修治新阡告成文餬口四方幾二十載􅀊時拜掃禮有不逮水泛雷轟未免惶駴於其事亡不孝之大即此良月躬爲修治芟蕪剪􅁄増髙夷圯􅀘植林空􅄪釐風水郭以周垣隆阿四起樹門神㳺題阡表氏掲䖍妥靈非直觀羙功今有僝以告以祀神之聴之以克永世尚享韓君大祥􅀕文嗚呼王宗韓氏通家徃来三十年間情好孔懐矧惟亡友吾門上第貞幹風生彂強剛毅其在諸生先子所喪年近而立􅀭厯中外臺􅁺郎曹名聲􅎪􅎪前􅀊之秋告别何遽曽未越境夢随川逝日月云邁奄復祥祭論其受年校夫禀氣老而益強期頥可致衆維奭傷去之太蚤古云五十不爲之大宛彼二雛卓有􅀁樹翶翔仕途侭持門户依依孝思以永終譽君如有靈亦足以慰夫懐之素也尚享爲姓氏告亡妻文維丁亥􅀊六月十八日丁丑夫惲謹以茶果之奠告于夫人之靈推之爲姓世不多有故甞詢其所從出爲汝討論者有年一無􅀁見適讀替夫氏姓論曰推氏建氏南氏舒堅氏魯陽氏黒肱氏皆出楚之芈姓者先君熊繹氏之㣧其来光且逺矣嗚呼夫人殁而有靈亦将歆慰其光且逺者用是不敢不告尚享中丞王公􅀕文大元􅀦至元二十六年􅀊在巳丑二月辛亥朔越八日戊午友生王惲謹以清酌之奠昭告于正議大夫中丞王兄之靈嗚呼朋友之重義列天倫切切偲偲疇非弟昆惟君頋我而我宗君以志則一以分則親如漆斯固如蘭斯馨而敬而愛乆而益新爰自􅂷齠以及於冠授業蘇門各伸志願智愚雖殊道則一貫君􅂨淵塞浩無涯岸脫畧辝􅂠好謀􅀎断甞論士心酬酢萬変如匪中立鮮不棼乱此予少君餘何􅁕算我時念君大噐已見敦我鄙薄激我愚懦治仕将㱕而予獨眷􅁇分使符有最無殿在昔相度有若昌黎辟佐戎幕大為已知及論􅀦計莫之與規裴非少韓有崖其間􅀮忍就事材為實難穆穆忠武曰伊曰吕桃李盈門夛士如雨同升諸公曰僎是與􅀄疑中舎謂輕􅀁䖏長㞐六曺是為之􅀁自後騰􅀭又知􅀁主曰史曰張曰姚曰許交口薦揄螭蟠鳯翥望君庿堂致主堯禹其經綸􅀦業固􅁕以見君之器宇彼􅂉無知奚我齟齬淮海㱕來道在心小角巾私第日事墳討周防有餘虵虺結繳讒火燒城甚於原燎伊欎積中不無􅀬惱嘗切諗予憂丗心悄覯閔何多受侮不少每見慰寛外物一掃擴量冲融致養強矯死非所憚此何􅁕􅅰如金在鎔百錬不撓白首窮塗亦􅁕枯槁㽞使咨謀為世儀表此天下之公論非一己之私禱云何不淑不憗遺此一老吾乃知蒼蒼報施於焉有未曉者念君問學天人理皦臨終永訣投我腹藁語何琅琅秋空日杲淚洒行間茂􅁜遺草哀哀二子越玉陳寳賢而有文遹追來孝􅀁存者長况不為夭鍾鼎一事古人誰了嗚呼事至盖棺夫復何尚精爽不昧而來者是保我奠兩楹腹痛如攪平生相期逺到苦楽行違知者惟魢悠悠常情異心同貌老夫知音自深痛悼我過孰寡我􅂂孰蹈有慟無聞徒辟而摽淚下河傾􅀉兹一抱嗚呼哀㦲尚享路􅀕中丞王兄永訣文維君丰度凝遠内明而外閟以予交㳺之乆頗髣髴其一二其􅀁以斯疾而至於斯者而皆命之􅀁致耶豈用有餘而嗇於行耶物或犯而􅀮不校耶欲求合而反得乖耶剪􅀁愛而牋老懐耶不然何氣運䘮謝叢一躬而菑耶方謗之興予適在燕甞表裏乎西溪致一言於諸公之間力雖微而莫辯庶幾友義尽予心之拳拳用是生有以書慰之殁有以文誄之又罔以不敏復銘而賁之辝固斐然思罄單無愧而巳今者執紼徒送永隔泉路然古人神交罔間存殁臨􅄮贈言故不憚其再瀆伏惟明靈鍳兹微悃尚享御史中丞王公誄文大元至元廿五年􅀊在戊子秋八月十有一日前禮部尚書御史中丞東魯王公薨於維陽之客舎友生王惲謹遣子某致奠以不腆之文誄焉其辝曰顕􅁢王公天姿粹精文辭翰墨外彪中弸年甫弱冠四擅華聲從元問學舘申作甥二公提㯕大潰于成継以賔師主善共城始拜公面􅂬如平生忘年定交實為畏兄青灯孔序絳帷趙㕔尊酒文㑹桐隂滿慶旣謁寥休偉其豪英力薦于上與之同升帝曰汝冕秉心和平乃眷乃頋詔扈南征潜鱗縱壑天衢荷亨一命卿貳㝷擢歴亭改􅈇京兆以㢘見􅁛擢之提憲以㫫以荣褰帷杖莭激濁楊清移鎮三晋八州敉寕載臨恒衞兩河肅澄霜空千里一鶚獨横走忝貳車峩冠振纓言議甚衎王事毎兢其臭斯蘭其堅斯金兩秩五年愈親愈誠訌賊撾死王度載貞整我六曹春官首􅊹再執行憲㞐中作丞守以大體與時浮沉西湖㶑碧呉岫空青公餘吟醉若慰羇情用是北㱕伊誰云憎徜徉淮海子潜疾嬰俟其少間偕之北行豈其奄忽痛乖延􅁜剛弗愛克遂傷厥生疇昔之夢飲于兕觥予欲從之扜格莫能今悟死別神交匪冥今􅀊夏仲手書是承􅀉是新作託之稱停豈意期月遘此㐫屯􅀄接傳聞旣疑且詢継来訃告大為震驚於戯已矣王兄殁而有灵鄙懐我聴以公夀言六十六秩未甞疾痛體胖心逸以公䆠業通貴之極三十年間略無空􅂩以公文章不事雕飾平易温雅簡而有式以公聞望􅀭休山立声價一時荆金趙璧以公㣧嗣怡怡蛰蛰翠竹高梧鵉亭鵠植所為福全百福無逆是用慰公能事可畢方之吾㑪又有大弗克及者秉􅃔豊厚度量寛宏愷悌樂易頋大光明不以逹貴我崇彼輊不以已長格物自矜心無城府口絶否臧孰為機張以虞以防坦焉蕩蕩内敬外方汪汪黄陂撓之不渾嵓嵓高山仰之弥尊天下之人不間識否聞君之名僉曰良友是喜是愛称不容口我􅀚氣運有通有窒或􅀒而乗君子冝息遺逸阨窮固足摧抑􅃍忍飄蕩忽還穹碧是用奭傷載悲載泣維此善人天地之紀㡬世㡬年生此偉器一朝云亡歎興殄瘁茫茫九原愛莫之起悠悠此懷􅂚維其巳上以愾斯民之無禄下以惜平生之知已嗚呼哀㢤尚享推氏卒哭􅀕文至元卄四年􅀊次丁亥二月壬辰朔十七日戊申中議大夫王惲謹以玄酒庻羞之奠敢昭告于亡妻推氏之靈嗚呼礼􅃊卒哭氣渝一時愾然興感悠悠我思去日漸逺神而明之爰仰道宫有求戚知哀薦成事用光其儀君子與孫衰衣纍纍心焉寸草恩則春暉伸哀報德泣涕交頥而於自􅃱其殆庻㡬惟靈降鍳以慰永悲嗚呼哀㢤尚享􅀕三藏佛圖澄文惟師薄㳺襄􅀦寔開帝聦聞音知物變眩幽通非此無以囬猛鷙而神事㓛我師真筌不忌在空来拜祠下辛􅀊􅀄冬酹觴乞靈裴囬呪龍庻一勺之逹水人之心􅅐也尚享􅀕宋文貞公墓至元十九年􅀊次壬午五月巳未朔十一己已謹以清酌之奠致􅀕于唐太尉文貞宋公墓下嗚呼惟岳降神生甫及申為周之楨如公之生於唐迺開元之治具也昔玄宗􅀎逺而不忘一旦召而相之何其明邪及惑伶人一謔公終老于家何其昧㦲豈天宝之乱扵後有不容置大器扵乆安故於戯徃者何咎􅀦家方以親賢為急天或寵綏四方若公者復克降靈作甫與申免夫望壠思賢之歎此臣子所以再贍隧動曠世相感之意也區區之誠惟神其鍳之尚享授少中大夫福建閩海道提刑按察使告祖宗文巳丑秋八月三日至元卄六年􅀊次巳丑八月丁未朔越四日庚戌孝孫惲敢昭告于王氏三代祖考祖妣之靈惲不肖􅀗承祖宗遺訓以至今日又於此月初三日欽奉宣命進授少中大夫福建閩海道提刑按察使是皆祖宗奕葉德積之故越小子何敢存殁光显冝知􅀁自特陳薄奠是用昭告尚享􅀕待制徒單衍文維至元卄六年􅀊次巳丑冬十月丁未朔十二日巳未少中大夫福建閩海道提刑按察使王惲致奠于故待制徒單公之靈嗚呼禍與福善悪以應之変其常理有不復致詰者惟翰林侍講學士顒軒先生厥心孔嘉楽善修德及其立朝行道罔不傾悉晚􅀊得子又􅂧良碩學由家傳志乃早立先生云亡相咨惜念渠零屏継任翰聀淹㽞京師豈造物者􅀅有俟而􅀘先生之不及一旦夭奪松摧玉質云何不淑而臻此極睠若堂之三封悵遼海之不溢何一􅂔之衰謝逮子身而迹熄余愈知善惡之叵量蒼蒼之不可必也不然豈行焉忽諸致皐陶庭堅之不食吾不可而識也噫辝墳祝文伏以甌東南之極徼憲使外臺之正名受命以來夙夜祇懼有不遑寕䖏者於是月十七日卯刻與子公孺軰前赴任􅀁㐲惟明靈相其不逮以道護之尚享􅀕􅀟庿文至元卄六年歳次已丑冬十月丁未朔二十六日壬申􅄟以清酌之奠敢昭告于唐臣中丞張公睢陽太守許公之靈惟神忠抗全莭義摧賊鋒旣障江淮載清河洛精爽在上其生炳如惲䓁適有亊扵維􅀭特乞新庿頋惟朽質逺渉畏涂過覬之心断非敢萌虞之変庶祈黙祐尚享􅀕淮水文惟神彂源桐山横界楚甸徳叅四瀆潤􅉼百川惲恭綸恩逺臨殊域險阻炎蒸有自惜者惟神鍳祐其安以済是則神上有以欽承明命下有以臣子之義也尚享亡妻推氏􅀕文遣奠􅀕文維至元廿三年􅀊次丙戌冬十一月癸亥朔十有二日甲戌中議大夫前行臺行御史王惲堇以牲醪之奠致􅀕于夫人推氏之靈維君爲婦克㳟以母則式助我内治其冝其􅃴四十三年迺猶一日眷我貧家勤亦之極惟是尽瘁遂臻于疾弥㽞八年屢值巳􅁄孰祓其祥梢復安息孟冬辛酉遽変容度孰禠其魄溘先朝露惟此喪制我實主之布冠齊衣我具舉之木羙藏嚴恐速腐之羙慰汝心汝其頋之我小甲戌􅉎焉襲吉奉安汝柩皇姑之側升輴彂引爰用控告汝冝勿憾我未為恔魂􅀆㱕来些四荒不可以徃􅀆惟汝子孫是依是保黯黯精䰟悁悁心目旬浹之間重有􅀁祝曰薄西山一語不復念之奭傷又熟為鬰於戯零落山丘生存華屋自古皆然非汝之獨惟弗偕老天為之酷有淚如泉永注河曲嗚呼哀㢤尚享過趙􅀕忠武史公祠文夫用物精多者英爽罔昧垂頋異常者死生不殊我丞相忠武史公以丘山之重頋草芥之㣲其生也􅆑而翼之其殁也􅄰而訓之兹者奉詔比上展拜新祠敢乞明靈増益不逮盖愚魯之性惟其素知於言動之間庶幾黙祐尚享秋澗先生大全文集卷第六十四
