body:
  text: 碑大元國衛輝路創建三皇廟碑銘有序衛之廟祀三皇􅁠輿於國􅀄醫家者流因城隍祠右故壇屋而像之庸申歳時瞻仰之懇然位置迫隘規制卑陋不足以妥靈掲䖍爲神明􅀚府監尹荅失帖木兒頋其如是蹶然于中私自念言當尊而侈大之心有所在而時則未遑也伏承登極詔條聖帝明王守吏致􅀕廟宇傾圯官爲修葺至大德庚子歳夏仲祠部頒降三皇禮秩以春秋二時饗獻盖宗本醫學拯恤元元也而昔構不称安能儼肅禮容光昭祀典哉侯乃咨謀於僚属曰明詔所當夤奉民力不可妨奪工匠不可徒役公帑不敢擅發也當首出俸稍以爲倡率少尹八思麻因判寮髙興仁推官馮琚相與賛襄下逮属吏醫師筮士從風皆靡聿來胥宇於是相治城北郭汲署故址爽朗方衍奠敞神居經始於是歳冬孟断手於明年季夏爲禮殿三巨筵松桷旅楹奕奕挻舃望雲就日儼􅀂帝者之所其臺門洎醫學講堂齋室以次修舉其秋因常禋禮奉安神棲儀物肅備薦獻通暢士民來􅀚懽忻賛嘆謀斵石紀績傳示方來持學正祁伯易事狀以修建碑銘爲請不肖念郷榆盛事其敢以衰耄辭夫德髙太上者宜垂不朽之名澤及萬丗者當享天下之祀鴻荒肇判爲生民害者多矣三聖継作􅀚象化民創物垂範如畫八卦以通天地之情造書契而代結繩之政耒耜以資耕耨舟楫而濟不通衣裳宫室既厚其生棺榔歛􅁙復恤其死交賄貨而易有無剡弧矢以威強􅁀然後民得安居而粒食優游以卒歳孔子繫易叙太皥神農軒轅氏功德如此其見於醫家􅀃者謂神農氏一日嚼嚙物毒七十餘種軒􅄮論難本乎大道而䆒乎死生之奥故近代猥爲主祀􅀂以三聖人開天建極利生民而仁後丗者論之特一事尔在泝流求源雖出於人心之至情而報本反始乃有國之令典按歴代祀秩曰皇曰帝惟唐甞置廟京師餘雖多文定於故都三年一􅀕而已我國家掃攙搶以清華夏断鰲足以立四極還純反朴崇德尚功三年故都之祀亦甞舉行迨聖天子當宁道嫓生成仁含動植秪嚴毖祠克作神主開建醫學德洽好生故有司推廣睿意俾同通祀致祠廟徧于天下其敬恭之典越至矣乎伊守土臣奉承唯謹規爲有方不傷財不役民未及閱歳而起百年偉􅀚事神治人可謂能也巳冝銘銘曰林林緫緫厥􅀄民生理具畫一七鑿方萌乹端坤倪軒豁露呈孰措其一厎於和平聦明惟亶體用弘三聖継作見天地情裁成以逸以寕躋民仁壽萬丗徳至孰邁道大難名功同元化罔知申行推原報本在理攸應大德之政恩治幽明在在通祀尊隆莫京惟守土吏恪於奉承載敞新廟閟妥聖靈聖靈在天與時降升雲行雨施品物咸亨云何事神而瘠於泯翼翼禮殿有儼神庭民􅀄不預吏亟經營維皇降止庶監嚴誠風雨時􅀂歳事屢登民浸福澤豈曰吏能謹夫歳月爰勒斯銘事神治人績用昭稱煌煌麗石永垂頌聲表碣文通先生墓表先生諱天鐸字振之姓王氏丗爲衛之汲祖諱仲祖諱經顯考諱宇妣孟氏由農而士汔于先君蓋四丗矣其本支德澤與夫出處之大致巳鑱諸埋石兹不復云惟其心之與學逹於政而明夫用之所當然者敢發越以昭于外􅀄先君既冠以家學魁多士已而嘆曰君子不可以虚拘是足以盡吾學乎且天之所􅂌於我者何如我能克而復之以塞所以􅂌六考終于家逺近訃聞來㑹哭者踰月如知巴丁郎中居實石處士德玉單侍講公履烏宣慰貞等垂洟而言曰天不少假公年㑭爲我軰􅆱􅀛今而後過將孰寡矣仍以文誄之至有識敏學精是既􅃬之以重彼胡奪之以輕遡長川而中流柂絶渉逺路而丰道車傾其爲時賢敬惜如此明年戊子春三月改葬于康公里清水原猊渦之洄曲奉常宋衜教授趙澄郝􅆬進士太原劉冲邑大夫李瑞僉曰先生卷徳丘園學貫三極其行與業爲國人所矜式可謂敏學先物逹夫丗用者也遂相與據法而謚表其封曰文通先生之墓夫人永和靳氏進士子玄之孫安陽丞顯思之女生子二人先卒家府没小子惲忱等服膺嚴訓􅀗登仕版粗有立于丗識者謂先生之志之學盖有驗於後矣是用昭掲神道永示來裔銘曰政爲事樞用乃道輿學焉而兩不克是爲虚拘融體用於一源宜大行而窮居其命矣夫􅀂或訓斯丗而迪後壽髙名而不渝固云先生之知命胡其衘之不抒碑隂先友記曹居一字通甫北燕人有文章善談詣以謨畫佐征南幕府官貟外􅀰卒劉祁字京叔渾源人資純粹早以文章擅名有神川遯士集行于丗弟郁以􅂐􅀠眞行名家終監察御史牛天祥字國瑞上黨人深天文武經學歴恒山公府講議官應東諸侯聘客死􅂓城孟道字伯逹琅邪人性沉毅有機果威儀抑抑以業顯東海趙澄字公靖共城人性純古有儒行終衛州教授司之才字進道淇門人業詞科有聲􅂣屋間性悄直有口盧武賢字叔賢燕人資雄峻憙談兵以客卿游諸侯間王之綱字徳柔湯隂人通丗務以儒術縁吏事有塩鐡諸論傳相下邢敏字公逹秦人性公直明法令以廉自持用薦授左司貟外郎終大名府判官李禎字彦祥􅀺陽人先考同年吏貟轉尚書户部􅁺性温粹以善淑稱釋朗秀廪延人行精嚴内典外五經子史無不䆒覧逮耄期不倦示㓕衛之仁化寺楊果字正卿蒲隂人詞賦第歴劇縣皆有能聲文彩風流照映一世拜叅知政事終懐孟路緫管董瀛字巨源廉臺人精力有幹局常從王滹南問學今爲淮東按察使董民譽字端卿陽夏人詞賦第爲人渾厚無圭角與時浮沉常叅預江漢都督府事劉方字元卿陵川人性清古善歌詩終衛輝路提學宰沂字魯伯洛陽人才表氣豪抱􅀒竒節甞與中書楊維􅀃降西山主帥時人壯之後爲王府徴士張豸字義夫相人性僻直數從事郡府少不合􅂺望望弃去趙鵬字搏霄蒲隂人純粹有􅂄舊風金詞賦進士用辟舉令泌陽以廉能稱石盞德玉字君寳蓋州人性至孝與人交愷悌篤信義甞與友共事惡其不直遂絶而不較勾龍瀛字英孺河南人性方直在河南有詩聲述姓譜行於丗烏古論貞字正卿遼東人沉毅果敢用􅄻任内侍官得幸北渡後顯仕於去就不屑周惠字德甫隰州人性慷􅁣有大志早貴幸樂與賢士夫遊終江淮都轉運使王昌齡字顯之滄州人藴藉有經濟材由叅議史忠武府知衛州有惠政在民李瑞字天祥汲人性強果重義急難凛古人風逹吏務有調議於先考執弟子禮終身焉仕至潞州判官王賛字子襄登封人性直諒生平游元劉間好詩學劉冲字進之太原人性剛克敦友義􅄝學安貧樂道人善事與心㑹激節感􅁣有幽并豪傑氣􅀹長於左氏春秋馬寅字致逺許州人性雅重􅄝古學恬於仕進丁居實字仲華錦州人用􅄻以吏起身有廉德北渡後以前代掌故授礼部郎中致仕馬佐字佐之滄州人金明昌太學生有賦聲完顔孟陽字和之遼東人用門資起身爲部􅁺北渡後不仕好古書家藏至千餘卷沈􅋲字和卿魏人資端方精律學嚴而嫉悪由憲臺司法調陵州倅致仕張善渊字機道譙人少為黃冠師性機警有幹局表表為玄門綱王磐字文炳永年人經義苐人品髙邁儀範一丗文章精極理要臨大節不可奪今為翰林學士承㫖徒單公履字雲甫遼海人經義苐學問該貫善持論丗以通儒歸之性純孝樂誨人官至侍講學士陶諒字信之􅀗吕人有吏幹歴邑長著能稱程和字仲羙武陟人長管庫材以聚書教子爲志竟莫遂而没哀哉胡璉字國瑞武安人詞賦苐爲人慈祥樂易風流偉德度子祗遹有俊材光大其先業朱萬齡字壽之雲夣人生平以道學自􅀒星暦占筮乃其所長楊弘道字叔能淄川人氣髙古不事舉業磊落有大志文章極自得趣有小亨集行于丗王信字信之南燕人少爲律吏羙丰儀􅄝酒有氣義李班字晉伯北燕人性介特以品官子􅀘部掾趙非熊字周卿安陽人貞祐間甞以材武􅃟爲春官衛率爲人姿嚴厚可任以重事長樂仟表汲郡王氏其先河南陽武縣圈亭人避靖康之亂北渡河至汲樂其風土􅄛沃遂占藉為長樂郷西晉里人今墟落南原纍纍而阜者蓋自肈遷巳來丘壠也族衍代深法不可溝合率藁殯兆外時我曽祖府君以大宗子覩其然而歎曰禮當改卜新仟爲王氏第二營明靈其舎諸况責寔在我乎於是擇葬而東得地於苐四疃清溝之北自禰而上三丗合群從凡厝者卄餘竁其紹己絕而力弗逮者率棺衾畢具逺近聚􅀚莫不欽其孝之至仁之厚也及夫歳時墓􅀕先西後東傳于今而不墜百年來墓栢蔚茂蒼煙梨雪光動林陌識者謂君子之澤渊流而未央也時則㤗和之末大安􅀄年也迨我有元至元十五年戊寅不肖孫惲由翰林待制授朝列大夫充河北河南道提刑按察副使明年春三月按部而南過家上塜首從二墳以封以饗其東仟則繚以短垣周􅀂干歩武復欲發逹幽光􅁣焉莫䆒訪􅂄舊則髙年俱盡考丗德則旌紀寂寥因念天下之物未有無本而立捨祖而豐昵者也然逺則䟽䟽則不親不親則涂人此丗俗之常情也今王氏二百載間丘墓移置者三始焉西晉里再卜白楊疃分白楊而祖西河郷􅀔固有當然者彼子孫浸逺吾豈敢必其不源委泮渙枝葉扶䟽者哉惟其泝流㝷源推末求本明夫當然之理固不得親其親而豐于昵者矣後之來者能以吾言丗守而不易雖百丗可親也而我祖建遷之義是不可不表見于後曽祖諱經字伯常讀書不仕以仁厚比一郷衛人至今以長者稱云銘曰族萃蕃理則遷尊而祖􅀗所安論本根不易存􅀕先河祖所遵致時祀首逺墳取此法􅁉後昆繄我曽寔古人仁之厚孝之純西晉里長樂原憶墓栢鎻蒼煙欎相望見嬋嫣孰不曰王氏仟銘貞石表先德陵谷遷庶可識管勾推公墓碣銘公諱德字濟之姓推氏其先相州隆慮人宋季有起身刀筆至州録事叅軍者以政尚嚴明不畏強禦名大父暨兄金􅀄避仇徙家衛之共城伯祖以材􅀘縣吏不幸偕蚤丗考復字永亨時在襁褓母李氏貧不能家提之再醮邑醫杜氏及長就傳其術遂以良毉稱公少頴異能紹其家學軒􅄮雷扁巳來書浩愽不易䆒悉研窮機要所得爲甚多正大丁亥以方瘍兩科中選由毉工􅀘省司管句公有藴藉以德將藝爲上官推重生平志存濟物故其診治疾證未甞以貧冨易心理或未安歸􅀂芒刺在背㒚不敢着席􅀄貞祐大兵後比屋疫作與考謀曰今困厄如是我寔司命可坐視不捄遂大措湯劑歴飲閭里間其乏粥瀋者復以米遺之全活甚衆天興􅀄盗起西山約衆東走汴中涂遇刼賊熟眡爲公遽放仗前謝曰推君父子曏以藥惠脫我輩命忍以非義加諸餘亦􅀗免壬辰秋歸隠蘇嶺老者尊其德病者頼以安而少者訪其學然神膏傳􅅑靈丸起廢毉家者流正有定法而僻隠贅異等疾在方􅇊所無者公率能望知意料而决翕忽死生之變如程氏子得腹痛疾以食毒治而苦愈亟謁公狀聞曰此臓疽也已無及矣程不應公曰後三日當有腐血下而絶及期果然晚節耽翫史籍酣適醪醴浮沉得喪一寓情桮杓間或􅂆焉吾方陶然遊太和之郷君可去母呶竟以飲致疾終享年七十有二配桒氏郷進士彦周之女壼儀母道有承平故家風範生女子三人長適司􅀱張顯仲女鉅家李氏季歸王某後公五年卒壽八秩聓顯等合葬古郭里栢門山南原殿士桒君塋西南隅實至元二年二月四日也後十五年春惲按部南下躳奠墓次泫然興感縱羊曇之淚下霑􅁭時思罔替終伯道之自遺伊慼爲恨何如惟是鑚石紀銘昭告下泉庶幾少有慰焉推爲氏歴考姓書不見惟潜夫論載餘推氏出楚之芉姓公豈其苗裔乎銘曰軒歧有書是爲内經洞逹病機惟明克能於惟我公天禀粹靈靈丸起廢神膏續肱不主故常以意智行推本所自其源渊渟藝精多挾度貨可居髙下其手􅀋夫吏胥繄公處心德度愉愉拯溺捄焚巳焉是圖相彼陽施冝嗣厥後本支顚兀理莫可䆒纍纍堂封栢山南原刻銘表公以慰下泉雖髙深􅀆易位尚知爲郷先生推氏之仟故將仕郎潞州㐮垣縣尹李公墓碣銘丗有風􅁩之士粹出天禀不俟激卬藹郷曲之譽稱於士大夫間者李公其人也公諱瑞字天祥其先潞州上黨人系出唐昭武公抱玉之裔五代季逺祖以官家衛公爲人慷􅁣有機警長身銳目髯糢糊蝟磔酒酣吐氣抵掌談話而英姿颯爽之餘猶隠然溢眉睫間少爲縣吏録録無所見正大間恒山公僊提􅀌軍宿汲連九公聲援君時給事莫府叅軍李仲愛其武幹委以赤白嚢事公感其知遇晝則荷戈捍侮于外夕則抱牘上軍務于府殊﨣﨣然及冝津撤守跳大梁既而京城疫作縱飢民出公倡率流播救死扶羸歸那延撒吉似悉編爲氓者千七百餘口逮乙未春家府一見喜曰此跅弛士也教之當有用遂礲夫糲厲日致其詳謹焉州召爲吏主掾數不屑去壬子秋詔以衛六縣爲丞相忠武公采地叅卿王公來主州治舉能理劇署之典薄領聽其指縱躍如也巨細之務釐􅀘肅叙効其用居多俄薦授録事叅軍兼汲邑長將順拊循至有惠愛至元三年緫尹陳公以材辟府從事六年積前後勞赤牒授潞州判官棲遲下位德及民爲艱故寛簡持大體謙譲睦僚友聽共佐理中多禆益了不露巳出至上敬下安惟恐秩竟而去之遽也九年夏予調官晋府過家上冢胙飲水濵話平生甚悉翼日雞一鳴送予逺郊外泣且言曰吾老矣不能爲􅂛斗禄走形􅀔途弟相見期邈未知復無恙否遂哽噎訣去予亦歔欷乆之且訝其遽如許也其秋以訃來告嗚呼哀哉公事家府執弟子禮三十年始終如一日一別終天葬弗逮送吊不及哀銘誄未彰有恨何如嗣子震既礲石墓道百拜來請銘曰無庸固所願也公姿孝悌憙賔客賑窮継乏雖脫􅆖指囷略無難色至於排難解紛不自頋藉猶焚溺之在已復能通下情知疾苦姁姁欵欵老安少懷與人接無貴賤禮夷故牛童馬走盡得其懽心晩節備甞世故小心儉畏以省事爲樂有訟來質成公温言理喻曰緩急人時有也其忍以小忿興怨可退思自省既而偕謝曰公長者過不敢復聞又善營搆事不爲巧飾要以敦鞏延百載上如衛之泮宫潞之儲廪是也􅀄農民發野塜市甓下令禁焉􅁀委之患遂絕士人牛國瑞聞公義託妻子東遊客死􅂓城爲經紀其家又石其氏者坐事累猝不易辨明索之急投公匿焉竟頼以脫里有䘮率匍匐救視孔懷之情踰於兄弟至貧不能舉者棺衾坎壙楄柎之物必具葬乃已其周急趍難甚於已私􅀋􅀂此終飲德不伐閑居灌鑿樹蓻麄衣糲食與老農老圃爲伍殆將終身焉噫衰俗頽波中矯矯然有古義士風出則智効於官處則行比一郷可謂不凢者矣士方以壽祉期公一旦􅁀僨不及中壽爲惑豈氣盛亟㐮物剛易折推原本自理或亶然然觀義之所在有不亡者存焉異時有帶劒喬林讀予文而興起者未必不拜酹公墳㑭配食於縣社也公仕至將仕郎潞州襄垣縣尹命巳下卒春秋六十有四實九年壬申七月十九日也配張氏先卒女二人長曰阿醜女甥魏珎次未竿皆継公没嗣子震實主其喪葬汲縣唐津里清水之南源銘曰太史著書游俠與侉不􅁤正理匪􅁀豪邪行而宜之義莫有加李公之先奮跡將家餘烈有光流而義華故俠焉􅀒巨先之氣行焉佩仲由之猳家府與訓化而柔嘉據理施惠如有等差趍人之難甚於已私􅀌不自存我衣食之貧不䘮舉我棺窆之野􅊘纍纍公助半之夷考其行匪義則那以之莅官敏而外和絲棼我理瘡疲我摩方百里之命下俄春者之不歌心則罔单其如命何念公平生涕泗滂沱番番良聲公榮寔多泉流西東太行峨嵯我銘刻石等與不磨秋澗先生大全文集卷第五十九
