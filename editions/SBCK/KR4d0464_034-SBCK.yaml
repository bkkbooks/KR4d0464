  text: 秋澗先生大全集卷第三十四
  hash: sha256:be26cdc3b4dca4a5b408aaa7ccbb1fcbf35406194c61eff1eb038af4a3a43e22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_034-1a}
body:
  text: 七言絶句讀漢武帝外事囬詩汾水西風岱頂柴侈辝稱自馬遷開誰知留謗千年後還向班生筆底來瀟颯神飈下寢園玉衣晨舉馬嘶煙不容夣語加明譴應是千金漢相賢白髪劉郎一帝巫老方服食悟前圖首言要格君心妄萬古鄒卿一大儒太一蓬仙杳不聞龍輿三駕海東雲明知求訪終無驗才悟文成又少君嬴傑而顛徹黷兵較來遺跡不多争戾園甘分秋風裏流血争教到市氓鷁艦龍旗照水開昆明都試想雄材眼中不惜肌膏盡􅀶得西南拘醬來晝獵南山夜不歸白龍㡬中豫且危論功正有髙皇約不爲諸孫濟所􅀻二喬􅀚史圖二喬絶艶煽江東一札龍韜閲未終多是周郎傳報捷華容燒虜夜來空劉永年􅁄兎周身有術無牙角出没中林草􅁄深幸自得沾閑静處枉將隂巧見機心神明之後管城封埋骨詩書有駿功原野暖煙三宄樂縁雲無夣入蟾宫月中搗藥伴蟾蜍嘯傲秋風挂影踈今日弃􅂢茆􅁄底免冠􅅴謝不中書旅􅆈圗厖然纎氄􅄄毛鮮閃閃蒼精照帝軒誰為此􅁥楊得意一言曽逹漢文園何人刾繡旅􅋙圗慘淡風煙較獵餘不寳珍竒安逺邇至今人味召公書風雪藍関圗天威不逺雷霆迅雪擁藍関惜自傷不似老坡南竄夜一天風露縱浮航􅇯鋒􅀏折王庭湊赤手嬰鱗撼憲皇可惜堂堂忠義氣枉將衰朽托吾湘庚子歳門帖子庭驚爆竹驅儺􅀑門掩春風貼􅀞雞戀闕心丹老猶在夣中來趂筍班齊庚子元日即事春融官閣梅仍好暖透墻隂雪盡消長記紫宸朝退後洋洋猶說太師韶覔酒正月三日皆風色隂寒門外風霾障日昏地爐吹火發春温牀頭􅀃有青藤醸好遣麻姑送一樽敬甫英豪盖代聞三年幸得作比隣閑來屈指從頭數得見青瓶有幾人時以佳酒貯青瓶來貺題文殊院壁呉僧乆住文殊院千里東歸未有涯十二通衢春雪滿又携藜杖去誰家䟦梁中憲無盡藏手卷四首人物風流晉永和一樽觴詠百年歌邇來水檻中台宴更比當時樂事多長橋春露濕吟鞋共警時思􅇶􅅥懐只為一終天理在晚香何有百花崖鍾皷山林窮勝事衣冠韋杜似樊川一門顯􅁢稱多士野老猶能説定年馬頭旌斾八騶行劒佩􅟚􅟚尹雒京特就房山嵓畔月百花潭水濯冠纓海岸古木圗古木螭蟠欝有華輪囷竒崛欲誰誇何年海蔵龍宫使推出秋風八月槎題肅齋詩卷坐如泥塑程明道笑比河清孝肅公一字名齋見操守儼然思有古人風外自形骸内自心敬恭交飬理尤深用功不必求他説細讀西山夜氣箴再題梁氏無盡蔵月白風清丗不知園林鍾皷想當時萱堂此日南陔樂又見肩輿拜慶詩洹水郎山雨露春江山如􅀞見横陳丗臣喬木千年事長配先生德日新呉郡張緫管代輸民租手卷呉郡張矦􅃳屋餘歳供民賦濟貧居二十四考中書令此樂融融未必如庚子歳冬與僧印相對見其頗瘦戯作一詩相贈雲在青天水在瓶禪関終日不曽扃莫疑磨衲松形瘦午夜吹燈唱佛經又題逺僧定禪東林法第隠峨嵋風雨中途避樹枝千刼塵縁終共盡枉將公案詫神竒題王國祥適安齋詩卷神光仰靣􅇭流東睡起東䆫日巳紅適意有詩樽有酒曉猿休訝草堂空断崖煙隔囬逋駕山鳥山花樂亦佳一夜山靈來軟脚盡分空翠濕吟鞋起居有道適之安况復山人已考槃辛苦東曹馬觀復簿書燈火五更寒􅇯鋒北折恒山逆鰐􅁀南移窟宅空天地此身無定在適安何佀一盤中馬卿來索適齋詩終歳思歸未得歸羡殺昌􅀺盤谷叙山林長徃㝡知機呈德昌郎中太平朝野足娯􅌚漢日舒長省府閑前日景陽臺上讌一堂絲竹兩東山江山大筆硬盤空誇海歸來不自雄紅藥滿堦春露濕看君給事大明官沉沉宫漏出華遲曉日雲籠簇仗齊前日彤庭青􅃈客只今􅀐馬欲雞棲蘭陽僧榮説昔開汴河得入定隋僧今移葬宝相蔵寺前殿趾下手爪纎長􅆞繞兩胯或問彌勒下生否未也榮説寺中見有碑記漢家習戰鑿昆明刼火留􅁅憶見曽誰謂大梁蘭若底土中入定有隋僧錢舜舉桃花黄鶯圗金衣公子絳桃芳飛下喬林過錦江細按玉琴能巧囀絳紗髙捲薛濤䆫夀陽公主折梅圖滿庭梅影媚春陽粉蕚封香散麝嚢折得一枝春在手含章宫閤闘新粧寳檐公鳯探芳叢瓊蘂飛翻入卧中一自粉綿輕拂散暗香吹滿夀陽宫題武教授峨嵋山谿堂圖野水林塘淡欲秋日長繒􅌳在沙頭故山咫尺峨嵋外未礙因人作逺遊張金吾慎獨堂赤丸夜語飛電如徼巡誰猛張金吾能於不覩不聞際一妄􅂊生制得無中和堂草隨風偃理之常况是京師首善郷聞說開元天子聖羽林多半授經郎慶夀東西二橋慶夀精藍丈室前松蕤盈庭景氣蕭爽嘗引流水㶁鳴其間東西梁貫以通徃來今水湮橋廢止存二石屏上刻飛渡飛虹橋六字筆力遒婉􅀔若飛動有王禮部無競風格寺中相傳亾金道陵筆也主僧西雲安公喜作詩通書學以無礙妙辯現當機應身軒露頭角價重統堂緬懐遺跡修護􅈿惜属秋澗翁作詩讃嘆傳示後來謹賦二絶奉荅雅意秋澗王惲和南花木禪房逕窈通卧波曽覩未雩龍摩挲一片西山石依舊宸奎照碧松飛渡飛虹㧾舊名玉淵無復繞松棚偶投静境便僧話指頋瑶鐫説道陵半山石詩一拳山骨動溪神小字金書爽醉䰟􅀼吹濫巾非我事約公同賞謝家墩荆公精舎定林居蔣廟相過恰半途不憶半山亭上石溪光一夕照吾廬農里嘆并序至元廿八年秋九月檢視水災趙之東偏自平丘至劉村渡凡一十一處因老農問荅集爲十絶句庻以見農家有終歳作若卒至於無成者可哀也哉作農里嘆其辭曰今歳馮夷􅀔蹇驕漫流西岸不知遥枯槎聚沫猶然在時見田間擁樹腰洨水南來接北滹兩河㑹合泛田廬官來檢驗承尊重所望申圎早得除寕晉東南舊馬頭今年秋稼􅀍灾稠至今田畯􅀭旌處猶作長河一漫流漲痕到處盡翻耕壠畒縱横􅀫麥青馬首野人争説似肯教欺昧老提刑薄有田疇在逺埛近村减埯不能耕今年巳損秋禾了庻望來年麥有成野漲平田一漫蒼只縁溝澮失隄防田廬相近初無礙頼有莊東白草岡馳傳東來相水灾並河村分盡俱該莫疑詢訪多諄復切恐文移不細開每年秋漲頼横堤水縱漫堤尚害微近爲鹿城偷堰破放交流潦到柴扉每歳灾傷走吏曹何甞南陌到東皐正縁事重人微甚特遣官來慰爾勞榖穗虚穰草色燻满前堆積漫如囷一餐到口還無濟辛苦田間力稼人火雲六月旱爲灾嘉穀方苗大水來老㹀瘦來無可飼放教河底嚙枯荄辛苦農民上所哀况遭今歳水爲災淂除與否渾閑事最喜分司檢􅂿來責偹利爲人後責居先子細評來不苦偏鄭重左山親有語天心責偹最相憐相鄉懐古整整唐旗向日開賊兵來陣亦雄哉膽寒已落銀刀手不待􅀐河百戰來泜水􅀝空趙壁漢旗殷裭魄南隨逝水寒自是炎劉方爾熾不應儒將責成安題趙縂尹書堂趙氏諸􅀰玉不如籝金雖貴樂三餘朝來放眼芸香閣信有人間未見書河内許生希顔愿而有立志予在襄國問學者月餘及其行也求一言為訓故書此以貽之筮仕常深未信懐孔門惟有漆彫開治平果淂真知理青紫何愁俯拾來題陳居士歸真圗三首林下山間本寂寥只縁乆動思漁樵君看白首争名者穰穰依前滿市朝桂樹巖幽謾見招風煙圗􅀞儘髙標一從五柳歸來後此事人間乆寂寥舉世誰能未老閑風煙空對􅀞圗間應怜心逺陳居士杖屨西山夣徃還松林秋月萬壑松聲月色開夜深清景湛靈臺放懐不爲樽中醁坐聽蒼髯說法來題劉道濟所蔵石屏石中乃有此竒雯來䇿臨池障墨勲絶似雞鳴南下望桑乾東捲入寒雲過寕􅀳北陳村題陳節齋故居草廬壁皎皎丹心與義俱要須身外更無餘截然不􅀒平生志依舊陳村一草廬生死分岐又六年野煙行入比陳阡不煩更聽山陽笛老淚臨風巳泫然過後趙右侯張賔墓自擬籌兵借筯倫品量何必果誰親風雲􅃤淡龍蛇裏獨識將軍亦可人一劒横談動世龍掃除河朔􅀳爲空運歸曽不論夷夏乹没并門坐嘯功勒遇光皇竝駕先右侯端有子房賢一時瀟洒君臣契虎視鷹揚豈偶然鉅鹿懐古寰宇記平鄉秦鉅鹿也項王觧趙圍於此鐡鎻秦圍一戰開群雄稽顙拜平臺君王邂逅東城敗驕氣湏知自此來趙圍􅂊觧已亡秦六合風雲覇業新逆取不思湏順守嘔嘔空抱婦人仁沙丘懐古一從竒貨落韋機秦自莊㐮綂已非大寳前依王命論牛當馬後一何微滈壁投來䜟已真沙丘臺下泣宫臣事機説到還元處造物於中太戲人時苗墓苗魏人官夀春滿留犢寰宇記云墓在平郷縣東北二十里至今二村以時南時北爲稱典郡風流若可稱當官明􅁢復氷清來時􅀌牸歸遺犢却恐存心似近名􅀏却青鳬取大錢去留黄犢縣門􅁁就中處置人情近似覺山隂守更賢苦􅀬炎官令虐不容安背汗翻漿厭午餐遥憶百門山下水玻璃盆靣萬珠寒沙丘懷古六國平夷甚虎狼擬從一世到無疆誰期五十餘年後生處元來是死郷擬就靈仙不死期翠華拂靣事皆非湏知一把亡羊火望望驪山待汝歸萬靈訶護駭東廵一死沙丘等棄焚不直鮑車曽貝惡萯陽宫事儘腥聞萯如字花名玉萯四月開見廣韻陌上行人去不還眼中豺虎滿朝班齊雲樓下陂陀血紅比龍􅂁色更殷右讀唐昭宗紀東就梁營怒重􅄮傾危何處託苕枝目斜䄂搭欄干曲花滿春宫去住時讀明皇雜事捂桐葉上雨聲繁絶似花奴羯皷畨不待迫遷西内後上皇當此已消䰟讀肅宗雜事凄凉南内廢晨昏興慶宫官不一存進藥失嚐􅀩大􅁖肅宗當以弑君論又擁憐愛子遽聞言天理中還帝泫然龍徳本非軋健體不應良娣健而顓廣宗早發武道亭西望鎮陽趣裝猶是四程強夜来一雨扳炎􅐸借得長途雨日凉贈擒虎張侯弟三子飛卿射虎聲雄發五豝三􅀰閑損玉稍花雍容詩禮相逢處不信風姿是將家大學淵源在六經振振儀鷺儘充庭君㸔萬字長沙䇿不到詩家月露形黃巾墓洶洶黃妖聚一呼􅁄矜元是力耕夫人心莫作平常㸔易動難安最可虞再過隆平我􅁒臨流濯􅁂埃沙鷗橋畔莫驚猜亭亭一􅀧隆平塔半歳還成两度來銅馬祠古鹿城西野廟新戰勲猶􅀃馬将軍甲光千丈雲臺􅀞只有荒煙對夕曛昭慶陵紫雲仙李隴西宗又向平􅂭見祖宫陵寝栢城俱掃盡石麒麟鬛動秋風過唐山望禱帝尭祠光宅宫庭歳祀新壤歌猶是昔時民遥祈一勺龍弘水痛與山前洗旱塵讀李斯傳常􅀏秦斯訴已忠豈知身堕趙機中沙丘不􅀒先王託雖死猶能保覇功盧處道處覔書米家書􅀞滿江船月貫長虹夜色鮮欲識廣收多蓄意北歸分賜到諸賢題塗水老人趙君璵詩卷豪傑并門自昔聞儻來軒冕等浮雲瀟然獨老琴書樂塗水㸔來只趙君老鶴昻藏不受覊九皐心與野雲斯翩翩不墜中􅀰業又向詩書得蔡􅁎廣武君李左車墓廣武籌兵見未形規模儘敵漢威靈天其不奪成安魄赤幟何由下井陘早發銅梁旱損滹南二十城蚕沙充食葉爲羮朝來夣覺梁門驛幾處坊場聽皷聲春宫元日口號日融欄檻㹸金麗春滿松廊鶴禁深四海謳歌皇子夀一年得拜老臣心色目依班向殿趨入門一字立青蒲侍臣直上牙牀啓拜畢分觴當大脯獸樽人立逺傳臚軋軋聲來啓左樞玉馬抱牽當殿過一時肅拜不聞呼沉沉蘭殿欎穹㝫一􅀧前星現半空事事見來臣分裏中單奚取絳紗紅暖煙宫殿歳華新入賀東朝異紫宸内外百官皆便服紫衣獨見海東臣三薰來獻野人芹不謂芻蕘得上聞銀研柘弓非所覬庻憑春鐸振斯文朝拜歸來户晝扄小齋􅀌坐喜春晴太平儻許斯文􅃱未礙明䆫管墨卿偶書唐到開元極盛年見人説佀即欣然時時夣裏長安道驢背詩成雪滿肩太一宫春早即事漢家望祀竹宫神參禮精嚴動早晨殿瓦漸分籠月白一聲金磬聽朝真壬午除夜雜詩来住京師已半年欲行還止果誰然淵明豈是山林士苦要絃歌為秫田兩間齋室過今冬臈雪􅂊消又朔風底滯王窮何所戀終年相伴要詩工鐡畫顔書雪屋燈夜深相對眼増明莫疑擲几金聲砉讀盡諸孫得杲卿科斗秦燔漢莫猜􅁵􅁜况是晉初開辭堅句􅉣無多旨茟削疑􅀙􅀾國来輝輝風日暖生煙氣韵和平􅂲信然軒冕儻来皆外物歳功無切是豐年瓜畦分漑引温湯三月中旬已進嚐縦使得先諸菓上摘来終是不馨香衆卉迎春竊化權苦寒都在早梅邊不愁一夜氷花老便得和羹亦槁然失之湏信本来無勉強難扵上圾車看取一陽潜九地春来葭琯自舒徐謝安石奕棋圗百萬秦師未易摧動容無復㨗音来入門偶折登山齒一矯論公恐妄猜江東全􅀝謝家安雅量形容對奕閒勝􅀒自􅀄成􅈫在在風聲何頼八公山沛公洗足見酈生圗氣折狂豪一洗間要令游士􅄍嘉言􅀄從沛長咸陽帝此術施來第幾番喭然洗腆孰爲賔中隠炎劉四百春一説便能延上客君王肯效婦人仁包緫綿區細故􅂢未妨撣洗酈生前一嚬一􅀏非無謂不似髙皇氣馭權落魄髙陽一酒徒畧除􅁁幅展雄圗桓門堅忍湏􅁷去長爲東山出此模布􅄄昻蔵七尺身不容空老酒壚春風雲􅃤淡龍蛇際首識隆顔亦可人書壬午歳十二月廿二日夣中所見青山􅀮􅀮水悠悠鶴盖前頭列火篝江閣連延三十里停輈㸔處古昇州孫陽相馬圗龍眠筆昭王墓老秋蕪合虞坂人歸暮靄蒼屈産何甞無駿足世間能有幾孫陽渭橋迎代王圗龍眠筆古人作事洞胚胎􅀞到龍眠見大材勘破丹青揮洒意英宗還自濮陽來李臨城挽章桂香坊裏推時雋爆竹聲中見孝心人道臧孫今有后惜教含􅀏九原深榮歸亭䇿勲自合􅀞麒麟佚老榮歸帝里春開卷賦詩還自􅀏滿纓塵土向時人身外功名弊屣輕一亭歸卧有餘榮分明昨夜南山獵夣裏弦驚裂石聲再題胡烈婦殺虎圗丈夫不作屠龍舉揵婦能成刺虎威試看五行參運化二隂何盛一陽微耽耽哆口摧天去死地求生有若人寸鉄竟能伸義烈大臣當國合横身古稱政猛苛於虎揃􅁀除殘惜壯圗蹀血兩坊王義侠䄂鎚揮處幾於莬汘宅全用倀􅀑事皮骨皆爲虎吻􅃾􅀑幽曽不悟當初􅁄林夜黒相逢處猶恐倀倀泣有餘石鼎聮句圗衡山何物老彌明氣歴侯劉到震驚􅀏向半空盤硬語火爐頭上把降旌海上游談接大顛鼎􅁁聮句託軒轅不湏苦泥中間事二者㸔來揔大言渭橋辞謁圗閃閃鑾旗擁帝輿八方臣妾效嵩呼君王莫以來同喜衛霍功成萬骨枯周文矩􅀞金歩摇官人圗螭玉珠華兩趐排髻髙􅀟鳯拂雲來玉笙合就新翻曲恰值碧桃花正開雪中同郡寮遊逹活泉訟牒聽餘事未圎日長誰辦枕書眠出門偶作閑人計踏雪來觀逹活泉淵碧澄泓一畒池勝遊都在郡城西潜蛟免致騰雲潤歳歳分香入稲畦取東坡夏壠餅餌香之例也雪䆫無寐夜深雪晃客䆫明更比西樓月色清老大㸔書無眼力偃然欹枕數寒更早秋夜坐候䖝唧唧掩荆扉落索􅀲簍滿敗籬凉氣巳隨新鴈至小齋燈火便相冝飲醯圗一勺儘調鼎味三升鼻吸誠難翁不去為卿相何人禁此辛酸江南道閩越自方千里􅁳􅁳海角天涯野竹踈梅沙路江􅁁到處人家早起效三五七字格東方明清風發白露下無聲歩乆寒侵襪撫楹歌罷酒微醒月明滿地蘆花雪秋澗先生大全文集卷第三十四
