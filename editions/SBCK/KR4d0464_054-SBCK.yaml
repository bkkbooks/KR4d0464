body:
  text: 碑大都復虞帝廟碑幽陵之祠虞帝所從來綿邈廟據金故􅁐西北維兵後廢不治獨唐貞元間復廟碑宛在顔貞卿于頵春人屢欲昜去礱焉以它用主者心戃恍􅀂有儆動廼巳厥後道士陳志玄直廟西百舉武起真陽􅀚爲長春别院復購焉約不犯元刻用石背勒營建本始備力來徙碑與趺坼身挺植重不克舉仆道士愓息磬折向碑祝曰今神顯思􅀂是願置安處且逺荒􅁾尚敢他用以黷聖靈神惟降監庶畢兹志安載而去吁亦異哉􅀄樞宻趙公良弼甞建學宫於郷縣永志玄爲工師既迄功以徙碑事蹟來告公曰嗚呼噫嘻皇乎休哉惟帝明徳萬古是式况兾土􅃼􅃼析而爲幽州者帝之所經畫宜乎燕人祠饗不忘廟屢廢而旋復也又遺碑巋然自唐歴五代遼金當大元戊寅凢五百有餘歳神物護持俾勿壞汝歸興復之責不在師乎志玄曰唯即以道宫丕搆作新廟而奉黼扆焉既而趙公將志玄之懇以復廟記見属某拜手稽首而颺言曰日月星辰帝文明也君臣父子帝􅃔倫也山川風土帝􅆠域也是則聲教所暨巍巍乎與天地同休孰能名而能報哉今志玄黄冠師因趙公一言而復數百年之舊俾來者瞻天就日知慕帝徳如蟻之赴羶可謂推原道本敬其所當敬乃知天理之在人心者曽一息而間断邪至於稽古樂喜因機就功毗賛皇猷思成比封之羙又以見趙公事君治民孳孳焉以堯舜之道存其心者也誠冝特書以詔來哲仍繫樂章使都人歳時祀饗登以􅁔焉其詞曰帝降諸馮東方人􅀆幽幽深山鹿豕群􅀆耕稼陶漁至爲帝􅀆風動八區烝一乂􅀆矧惟析津帝經制􅀆物不苦窳化土泥􅀆聖靈在天濡鴻私􅀆阜財解愠南薫時􅀆鳶飛魚躍日用而不知􅀆風移俗変天理存厥􅃔􅀆燕人懷思歆明德而祠􅀆八音庭陳鳳來儀􅀆九疑雲深望何依􅀆我賡九歌言匪空􅀆皇天降􅂨克綏惟帝聦􅀆恫彼下民中庸其鮮充􅀆嗚呼胡能一天下之慮􅁢執其中􅀆大元故中奉大夫浙東道宣慰使陳公神道碑銘并序士有奮身韋布作時藎臣志足以有爲材足以應変氣足以充守學足以明義毅然以致君澤民爲已任雖罔􅀗克畢厥志不幸而罹患難猶能梃樹名節勵薄俗於當年激清風於來代古難其人今於宣慰陳公見之矣公諱祐字慶甫丗家趙之寕􅀳爲人固窮尚志好讀書耻陸岀馬援書混泥塗間癸丒歳以藝能應穆王府辟一見而列侍從官公勤勞所事進盡忠言王嘉其大有禆益遂賜號尚書俾顯異於衆及分土其監與守承制封拜以公充本道軍民緫管洛邑関河衝㑹政荒民耗困於兵賦轉輸不大更張之將無以爲治即啓其利病之要者得卄四事率如請又奏免征西屯田軍士數百家歳􅀒粮料及椒竹等課甚衆自是殿夷屎息日就安集之樂八年間規爲保障率以身爲律度至仐人頼其惠至元二年調官制行授奉政大夫南京路治中徐宿大蝗移公督捕役農民數萬度其􅀔猝不能殱秋稼垂成即散遣􅀵穫自捄不然秉遺無餘或以不可諌曰救菑􅀗罪廼所甘心朝廷以從􅁠韙之㝷授嘉議大夫衛輝路緫管其治比洛愈精勵有方正官紀革吏習杜私交審聽断務以至誠感發期於實惠及民每庸調之下必經畫寛便使民有餘力部内屯戍習豪横眂民司蔑如莫敢誰何公因事致詰落其機牙衆譁噪擁其長以來意在棖觸公坐㕔事上折之以理厲聲色略不相假貸爲氣裭而退自是闔境肅然奉教條惟謹復比干祀大起孔子廟暇則集諸生肄經史以敦教本至風化大行吏民稱羙刻石以頌之時憲臺􅀄立首以材擢授山東東西道提刑按察使公憙其賁與志合踔厲英發撃豪右擿姦伏逆見隨决所至以神明称貪墨者徃徃投劾而去褰帷具瞻有風動百城之目平時底藴雖略張設而惓惓朝廷之心不食寢忘甞以三本陳事忠嘉剴切反覆論列至累數千言大率太子國本建立之際冝早中書政本責成之任冝顓人材治本選舉之方冝審又群小流言干撓庶政恐習以成風私門萬啓於下公道􅀌立於上臣知承平吉祥之言必不出於􅀂軰之口事雖不報士論偉焉時機務多出尚書􅁠臣意欲獨顓柄用乃以併中書設三公爲言事下大臣勑公預其議有􅀃公冝審所向可致大用公不顧乃直言可否曰中書政本所係併尚書爲一省便右丞相安童位尊望重冝端揆如故三公虚位不湏設置衆因以聞事遂􅃦斯皆國家大計人所持難公慨然吐論曽不少頋自是忠直之名聞於蓋代然不􅀃者衆矣遣簽書中興行省事十三年改授南京路緫管兼開封府尹属吏憚公方嚴有不安者仍諭之曰汝昔爲顔今跖吾以法䋲之昔爲跖今顔吾以禮遇之善悪自取吾何心其間衆恱弭耳趍事許蔡郊有劇盗號賊李三黨結甚衆軒澒􅅝嘯公然剽刼􅇯艶動兩河間及公來逸去以計捕􅀗即撾殺之萬口称快明年春進拜中奉大夫浙東道宣慰使時江左􅀄下人情臲甈例賂遺相尚公表以廉正濟以恩威逺懷邇乂浙人忘亡其不貪母擾之戒兹有驗矣福建平大軍俘温台新附萬餘人而西公力爲申援還民伍者什七八越校廪継米幾萬斛掩爲兵食驗籍復于舊行省下令筭啇酤頗亟公建言兵後瘡痍未復冝停征以示優䘏遂檄公覆明台營田歸頓新昌值玉山宼出剽報至衆謂可去曰吾守土臣義不當避去之民􅂚依俄兇黨突入衆寡不敵遂遇害實至元丁丑歳九月七日也得年五十有六靈輀抵越人士素服􅂘􅀕皆失聲願留􅁙起祠以奉嗚呼非守義不回推忠及物安能感人心如是子䕫請兵討復得首悪七人僇越州市次子臯扶其喪歸殯洛陽縣之北邙原公剛明廉介􅀶學有經濟材信道篤立志堅從政果於應変爲􅀹長氣之所充雖百折不撓故處大事臨大節審量合義挺然力行要欲表表有所見於丗而􅀔利可得奪􅁘其愛君憂國之忠出天性固然與人交有終始不可干以私官二千石三十年自奉猶寒士不知冨貴爲何物可謂甘貧苦節不媿神明者也以用罔能盡死非其所訃聞識與不識舉爲愴惜之生平喜作詩辝必巳出能道所欲言節齋其别號云曾祖懷妣范氏祖忠妣張氏丗在野父諱子安性慈祥羙丰儀易農而醫壬辰際以其術多所全活陳氏之興豈其是邪用公貴封資德大夫妣張氏順德夫人賜錦衣各一襲公夫人翟氏以貞静能安公貧子三人長曰夔武略將軍佩金虎符充某路行軍緫管次曰臯讀書克家矯矯偕有父風次庶未名女三俱適士族孫八男女各四人卒事之明年􅀌子􅇪等䘮服纍然百拜涕泗以墓碑爲請因念公與不肖交素厚死生之際三入子夣皆有明徴豈非精爽交感動於彼而應於此然耶錐既挽而復誄其慼於予心者固有所未盡今属筆來圗不朽以義以分其敢以不敏辝謹按母弟知府天祥善狀勉爲論次之銘曰維天降材􅂌我其治其道伊何曰忠與義安而行之匪功匪利致君堯虞否乃予愧不曰藎臣其將孰謂堂堂陳公元精貫中貞亮之義謇諤之忠以剛而順以介而通養我浩氣塞乎昊穹一朝遭際奮從雲龍即事進諌礪夫深􅂨列二千石敏焉赴功以德以讓凛兩漢風擢登使車攬轡而東三年齊魯一鶚横空治安陳書袞軄是縫明我國本如棟之隆充庭預議孰知雷同屹然有立砥柱河衝望公廟朝帝載􅁬庸持節江海卒與􅍔逢命也何言其來則豐哀哀嗣侯子軄大供臨江一慟揃夷姦兇憤雪九泉與没其躬癭陶之墟洨川溶溶頋瞻佳城祖禰是從魂􅀆歸來安此新宫忠傳孝継有泱其渢是維慶父之表過者敬恭大元故真定路兵馬都緫管史公神道碑銘并序雲雷合􅁬屯難伊始君子以經綸爲囏􅍴搶廓清恢我文治丗臣以守成爲重維史氏倡大義起營朔爰自都帥公仗􅃏分閫來殿鎮方擴武略以濟屯角群雄而宣力取威定霸於是乎在継以太尉留後二公篤忠貞昭嗣服治具粲張民物趨阜至於知垂創之惟難審守持之匪昜躬念成規洞焉恐墜卒之承先志而推方岳之賢著治效而􅃣羣辟之列者緫尹史公其選哉公諱楫字大濟丗爲大興永清縣農里大家曰成珪者公之曽大父行北京六部尚書曰秉直者公之大父金紫光禄大夫河北西路兵馬都元帥曰天倪者公皇考也􅀄乙酉歳父金紫公遭罹仙難時侯齒雖穉資禀剛毅沉塞巳能從叔父忠武公破走仙復真定衆謂􅆇孫逹其有後於魯矣及長不妄言􅀏善􅀐射􅀶戯音樂略無所憙開府公竒其好尚不凡令給事左右俾習知政務巳亥歳奏授公知中山府事惟定武衝㑹務殷使軺營帳中外騷屑公措畫有方數年間民頼以安㝷充征南行軍萬户翼經略公狥地蘄黃間當戰攻殊力值阻乏則頓舎樵爨經營百至甘苦與衆共之及還一卒無飢疫失所者丞相以公材果從政治兵皆所於可壬寅春引覲太宗皇帝奏曰臣先兄天倪死事際縁姪楫孺攝行其軄今業克􅀒荷請解所佩金虎符􅂌之臣天澤備列戎行俾兄不失舊物臣之願也上大加稱賞即授公真定路兵馬都緫管涖政之􅀄頋惟鎮府表山帶河連属三十餘城生殺進退咸􅀝顓决一旦惴惴継述有夙興夜寐謹身帥先明政化信賞罰任良能汰貪墨劭厲農工惠鮮鰥寡庶繭絲輕而保障之功可立辛亥歳朝廷肇議賦額户率徴白金一鍰名曰包垜銀諸路審其重莫敢倡言公毅然上請曰兵後生意未蘇民恐不堪如銀與物折各减二數庶民力少寛且無逋􅀒􅁢其請詔爲定制迄今天下頼焉各道發楮幣貿遷例不越境所司較固取息二三歳一更易致虚耗元胎啇旅不通公騰奏皇太后立銀鈔相權法度低昂而爲重輕変澁滯而爲通便時又有言食肴之醬請按籍計口樁散者業以從之公詣行䑓論其不可曰塩鐵本貿易物難同差稅一例配著今民資单弱是愈抵於困不􅀂依舊便議遂寢甞有宼行刼保之南鄙捕罔􅀗時檄所在如盗數償主公與保將賈㑹境上議強歸于我公弗辨徐曰盡付之苐切發地約􅁦邑耕斸去其囊槖以絶後患何如賈悟遂詘我免輸儻錢數千緡元氏郭其姓者愬府僚属於逹官按脫既而質無實逹官怒欲抵郭死公力請釋之曰此人以重辟謀䧟汝等何援爲公曰殄之以懲後未􅀂宥之死愧其心也况人命至重豈以妄言某等卒窮極戮哉竟杖而遣之辛亥断事官也里干脫火思來按本部性苛察憙事凢􅀍劾者凌轢羅織莫有脫其彀者公能隱忍將順使虐熖歛熇不致濫及非􅇳害吾事而巳其已藉没者十數家公奏明其􅁈竟皆復業公之捄時濟物民得受一分賜其不自顧藉􅀋多此中統建元首授公真定路緫管同判本道宣撫司事遂舉明州縣文學属吏三十餘人後皆致通顯云三年齊叛平忠武公首奏兵民之聀不可併居一門行之請自臣家始公即日解紱以聀譲其苐江漢大都督􅁠角巾私苐􅁉如也遂選勝西郊築治亭圃日以植花木玩泉石爲佚老之計澤車欵叚徜徉游詠人不知爲故侯失將也以至元九年二月遘疾越廿日薨於正寢春秋五十有九某月日􅁙􅀗鹿縣明丘郷安社里之西原公之純正蒞官嚴恪親戚左右罔敢一語私於其間至􅀂民情欎而未宣時政舛而未便寢餗爲不安思有更張而後巳終其身無聲色逸靡之娯其奉上接物刻巳自厲不一毫及民前後積􅀒至四百餘定弃官日方議昜田宅以償朝廷憫其廉爲代輸焉故在官三十年間時和歳豐政平訟理鎮之士民輕裘緩帶鳴絲跕躧嬉遊宴衎樂史氏之無事内則連甍接棟井肆夥繁河朔兵餘獨稱萬家之盛外則阡陌從横耕􅮏弥望熈熈然爲樂郊之民及朞而報政崇􅅄聲實俾爲諸道法冝矣夫人三完顔氏北京路左副元帥某之女散竹氏金紫光禄大夫北京七路兵馬都元帥烏野兒長女蒲散氏子男廿一人曰炫武德將軍常德府管軍緫管曰蚤丗曰煇奉訓大夫孟州知州曰燧朝列大夫東昌府同知曰熒曰燁卒曰炷煇曰煊潼関提舉曰燭燃炎曰煬承直郎簽嶺南廣西道按察司事日焃日燉行省宣使曰烘炬炘烜烔女子一十三人俱適華族孫男廿三人長塔列赤武德將軍鄂州管軍千户餘並㓜女孫一十七人􅀂子與孫服庭訓迪撿押略無紈綺驕豪之習彯纓􅀂綬爛焉盈門詩云靖共尔位好是正直神之聽之介尔景福公誠有焉公薨之十年嗣子煇熒介公苐征東經略使樞御史中丞彬以神門之表來禱某惟曩列省郎公以民事上計意有未安者憂形於色固巳切嘆其有志於民及按部燕南延見故老􅁔頌遺愛有不能􅁯者又知夫流風善政感人之深也如是􅂺苐其門士李豹善狀而系之以銘其辝曰繄農之務丗服勤正以篤實天爲親史維累葉耕而耘一氣厚積生元臣惟元􅄪傳彪其文弱冠崛起乗風雲中天草昧殊未分亦能當閫收元勲豈其垂􅁉彌後昆大忠遽掩豺豕群是爲明府皇考君公今嗣封昔孤童已能馳射精絶倫利噐小試無輪囷堂堂大府恒山軍一日作牧兩漢循於鑠叔武經且綸大綱一舉萬目振如何畫法參能遵保民無踰家冨殷􅁦去㤗甚輕絲銀權臣按事何斤斤歛回熇艶燋吾身拔濯良善脫巳焚載其清静民謐寜丹砂成金頑化仁潭園水滿花氣薰髙牙大纛馳朱輪崇髙有餘足具陳公曽目覩耳弗聞公堂糲食坐日曛念念民事憂絲棼絃􅁔萬家和氣氲農夫不識城四闉桒麻蔽日原隰畇熈熈鎮土三十春歳時報政帝乃訢褒顯班上諸侯䄄白頭一德酬國恩用昭先功􅀞麒麟惟􅁳報果忠與純慶流又見螽斯孫功成身退素所云􅀏解留務逺丗紛郊園花木清而芬拂衣去作封山神空餘遺爱霑􅀖氓甘棠懷思墮淚存零落何必西州門嗣侯追報圗不泯哀號罔極悲秋旻我銘騰􅀆舌可捫擬配大茂増雄尊孝思永言丗所敦淇州創建故江淮都轉運使周府君祠堂碑銘郡邑之設因形勝而􅁛望雄由変遷而有併置至於廢起千載之餘功垂百丗之後俾存殁懷思感人心而不􅁯者非豪傑經濟之士未易致也朝􅁔殷故都两漢縣焉魏齊來移理衛縣河朔經途東出鉅橋陌而朝歌遂墟天兵南下鉅橋正途亦廢自太行東接浚郊莽爲林灌行者並山取捷躡跡於兔蹊鹿町之間又分當相魏汲三㑹之郊盗賊嚢橐其間日禦人爲㝷常􅀖君邑長頋目前不遑奚暇逺圗哉故羣行恣睢莫敢誰何者有秊於兹壬子秋國家經略江淮擢行臺聽事官周侯充諸道轉運軍儲使仍置司于胙侯道出朝􅁔登鹿臺遺址顧瞻河山愛其沃壤且嘆夫梗阻􅀂爾􅁣然懷闢昜興除之舉乙卯歳公以事北覲圗利害上之朝廷爲開可詔以彰德大名衛輝漏版户五千實焉復其徴三年因易號曰淇州縣曰臨淇特勑公領辦其事於是推賢擇能申今講治設官府建倉廪立市㕓外則表􅆠理布丘聚開阡陌梁津夷嶮以便行路置淇奥思德南陽薛村等鎮以間逈曠耕牛田噐及飢貧不自存者一仰給於官下至取材于山陶甓于野率躬親規畫略無倦色西山鐵官甆􅍳公出本資悉發其伏利自是四方流徙願受㕓胥宇者日接踵而至啇通工昜貨委闤闠餘粮畒樓煙火連甍鳴雞吠犬相聞和樂之氣達乎四境侯復以旣庶且逸無教可乎遂建孔廟立學師敦化基而厚薄俗不五載内外修治井井可􅀚邑居過客相與咨嗟嘆息曰曩以荒煙廢堞之墟化爲樂郊樂國向也流逋傭耕之民今爲恒産完羙之室雖天休涵濡非我公建白興造之力疇克臻此既而公薨于位子鍇襲聀継述先志有光於前者至元癸亥轉官制行州􅀠于衛􅂄舊馬良等謀于衆曰公去丗逾逺吾輩生理日完嗣俟又歴官它郡其開建本末夘翼深恩匪立祠樹碑奉祀光􅀭何以報盛德而圖不朽廼相率度治城乾方爽塏地廟而貌之十三年秋適嗣矦自魏府别駕代歸良等邀過妹􅀖大合樂以落之相與請予文以紀其實走早辱公知敢以不敏辝念古之君子興事造功率忠愛持心無一毫功利自私克成碩大光明之業故民戴之如父母仰之如神明冝矣如公􅀄以轉致之便興廢棄於荒殘因丘聚之成養流播於完實又未甞占據膏􅃾營治巳私爲務誠可謂持心忠愛豪傑經濟者矣致感人心存殁罔間耿耿不􅁯者如是據礼當祀在法冝銘公諱某字徳甫􅀳之隰人孝悌忠信慷慨尚氣義蚤以材術振耀一時仕至江淮都轉運使其豐功碩德具載墓碑兹不復云今嗣侯自武德將軍陞嘉議大夫佩金虎符淮東髙郵軍緫管銘曰河山兩戒殷故墟自昔土壤稱膏􅃾千年􅀤治灌莽區殆佀渊藪蔵逃逋政以規畫無良圗堂堂周侯烈丈夫一朝王門曵華􅅂利焉思興害思除南來主漕過此都頋嗟形勝資豺貙忍龍庭入奏爲􅁢俞一語能霈天恩濡郊圻申畫開井廬連甍表植左右閭日中市集百貨俱荒榛一旦爲亨衢流民頼之彫瘵蘇僗倈又復三年租夫耕婦織圃有􅂼桑無附枝麥兩塗芃芃翠浪西山隅昔焉餬口今贏餘我衣我食公所予欲報之德父母且胡不均弘秉事樞天奪之速爲丗吁公去雖逺愛豈殊身後報謝當何如閟宫盤盤列綺䟽繪肖公像儼以居歳時豆籩民駿趍曝牲在几酒在壷坎坎鼔擊吹笙竽睇公風馬乗雲車神􅀆歸來意恒愉風時雨􅀂蛇虫菹甌婁滿篝厲􅀑驅我詩劖石誠匪䛕採之民謡與同符大書特書不一書太行礪􅀆河帶紆黄童白叟相携扶猶有堕淚沽􅀛趺資德大夫中書右丞益津郝氏丗德碑銘有序至元十七年中奉大夫叅知政事禎進拜資德大夫中書左丞􅀍二品命服中外具瞻越郝氏惟煒公乃頋宗屬言曰自惟踈薄烏能致此兹盖我祖考勤勞紫積篤祜餘澤集于後人乃克有濟今新壠幸建麗牲有石惟是大書顯刻表􅅚神道庶幾報明靈昭裔昧而傳永丗然非頼篤古逹辝者其將伊託遂以銘章見嘱厶以寮雅故義不當辝謹條其族系丗德祖禰之所以劬躬燾後資德之所以起宗顯親者廼綴之以銘詩維郝氏其先覇州益津縣人資德之曽諱贇少擢律科第授憲部檢法爲人文無害以讞疑平􅁢稱正隆末遷司理叅軍佐進發部殁兵間曽妣郷進士王公之女德柔嘉有母儀祖諱誠長身秀髯丰儀甚都早以義勇聞大定􅀄􅅄死事子孫得叙用材武授衛軍鈐轄盧溝當國都西門水潦時至艱於航杠承安中大起石梁府君首膺選督役醻辦最功陞昭信校尉貞祐􅀄燕不能都扈德陵南遷得疾卒官下享年六十有七祖妣同閈大家亦王氏姿淑貞事舅姑孝謹生二子曰瑨曰珂夀七十有八終珂早丗藁場府君瑨即資德之顯考也天性孝悌􅀄鈐轄府君既南從靡所依藉奉母夫人走汴中涂困乏置母便所與珂索食隖間游兵遇偕駈之去敦武君泣請曰弟㓜不任事又母所鐘愛幸免以視義縱珂還行復念珂終不能遑將其母因跽而訴曰將軍以母故釋弟然母老湏瑨可生且爲人子不竭力於其親將安用爲敢以死請遂伏馬首不動兵怒以佩刀刺之即仆地作死狀兵委去護母與父㑹後用恩例調京城草􅂣副使官至敦武校尉至元乙丒某同資德在東平史矦幕􅀗升堂謁拜時敦武府君壽期頥氣貌魁偉其齊家勤儉有法􅀂一官府然資德年向五十佑封君列郷士長巳貴朝夕温清門内事必咨而後行府君晚樂道家言遵其禁忌以静黙自䖏其修嚴如此明年春二月遘疾考卒齊氏寓舘春秋八十有四資徳扶柩歸􅁙真㝎縣西三里安上原之新仟夫人馬氏祔焉夫人出􅀥強􅃾族性貞烈主内務殊健生平樂扵爲善至絶葷酒不御毎晨興炷香禱曰願聖人夀天下安妾家亦沾餘佑又月具饌食囚繫爲常􅀄資徳爲郡决曹歳壬寅有盗刼臨城石帥家以疑得兎劉等十餘人繫之皆誣服上官􅃐論報夫人訪聞里間有稱其􅁈者歸語資徳曰捶楚下何求而不得汝當盡心詳審恐及無􅇳資徳亦方以贓驗未白致詰及承教仍文移緩其事㝷果􅀗真盗自是資徳於獄情愈恤慎後復全活張紇兠等十餘軰由是而􅀚昔雋京兆母聞不疑扵囚徒多所平反即言􅀏異常不然􅆭而不食以夫人教戒方之賢於人逺甚又近舎有賣餅翁媪併亾䘮不克舉夫人鬻粧奩中物掩􅄟迄成禮非出天性能然邪中統甲子歳正月十二日以疾化扵私居之正寢享年七十有四子男一即資徳公女一適尚書許公孫五人曰思仁謹愿克家次思義資温雅有幹局材官嘉議大夫諸路人匠府緫管次思忠性果逹少中大夫同知真㝎路緫管府事次思禮思敬重孫二女孫二􅀼甞論古之人因隂積而􅀗顕報由仕䆠而位公卿者多矣然非濟以材徳則卿相之任有不克負荷者今郝氏連丗孝友純善罔侈厥報委積流衍介祉於資德公公廼傳德襲訓自微而著莫不材稱故能依光藉潤遂貳台輔是皆祖宗載基載播于前而公以材德肯搆肯穫充大光􅀭于後故也今復援賜鼎􅁔鐘之例載德象容刻銘樂石垂示無忘可謂遹追先業濟其丗羙者矣其詩曰啇啓期封肇迹太原因郷定氏郝姓乃蕃晏相夔將寔爲裔孫逮晉中圯族系枝分散處朔南異宗同源處俊相唐立朝直聞義形于主忠烈名存維德繼顯乃理之偱曁曁司法􅁬跡益津平讞庶獄廷無􅁈民毅然就列僨彼祗勤於赫鈐轄軄司徼廵駕梁桑乾萬石鱗鱗神工雲僝増秩醻勛敦武趍父奉母南奔中涂阨阻孝義兩伸施於閨壺德馨􅍤􅜳三丗一致封培善根冝逹而窒歸成後人篤生賢孝夐出人群持衡機務叶賛經綸華軒駟馬乃大于門不有其羙推功本元爰求我銘載苾其芬我觀資德才全德洵仁以濟物謙以持身須彼隂積蔚爲名臣隆隆新丘萬象傍隣表列華柱石卧蒼麟神維顯思孰知蒿莙匪義奚立非孝無親移忠于上垂􅁉後昆恒岳之陽滹池􅔿淪渊峙無極永昭刻文秋澗先生大全文集卷第五十四
