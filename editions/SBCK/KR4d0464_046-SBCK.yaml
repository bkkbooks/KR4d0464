body:
  text: 題戒仲希出金源卋胄少以􅀌兒􅀠羽林􅀫衛者有年為人慷􅁣尚風􅁩善馳射北渡後折節讀書樂與士夫交游賙急解紛空蹷裝槖奔走風雨不少顧惜至於識名馬善隼羽知常通變談􅀏一卋翩翩為佳公子也如􅔪山先生一代鉅公雖泛愛無間翰墨之作􅀄不輕與至于君題其居曰元齋継其徳曰吾弟復有篇贈稱道其志向非尚友重義得如是乎自是完希之名軒翥於河朔者三十餘年非不顒也予旣冠與君傾蓋於酒壚間一言定交伸眉吐氣歡􅀂平生及合好議采曰夷貃之道吾不取也此又拔出流俗義之所可重者嗚呼君没卋巳逺撫卷懷人不􅁴增嘆然義之所在猶耿耿也汝曹固當思其所尚求其所當重者充􅀋至義之盡昭然使身名齒録於賢士夫之行曰此則某之孫也則某之甥也是則汝外祖姻於吾家之意也不然得衛公故物知其賢而不踐其迹徒以服噐爲丗家傳嗣之寳非所望扵汝曹也作題戒廿四年丁亥三月伯父秋澗老人書􅂌姪阿冝其聽之母怠名王氏子說王氏子甞以小學從予一日耒求其名與字因得讀張户部復亨所撰其祖墓碑廼知王氏自逺祖巳耒以文章儒行世其家於保者也小子今吾語汝汝曾祖在承安間擢巍科為一時名卿明昌􅀄官真定録事叅軍政聲藉甚汝父遭罹世故以􅀌身卓爾自拔見知於漕臺周矦騰􅀭仕版􅀂有所為而不幸蚤丗良可嘆惜然人有隂積者必有陽報苟不在乎身必及其後人如汝髙祖教授君志竟不遂厥􅀋􅃬於爾曹今汝父復罔克所紹而止於斯而汝也今亦􅀌童子方保持門户為事長身如此所當愿而恭柔而立操惟危之心念肯搆之戒日切一日吾見王氏之慶未艾昭然之報將不逺而復可不勉旃也哉故用􅌟名汝以德基字之中綂甲子夏五月望日書忽治中名字說予官御史時聞尚書工部郎中今治中别乗合刺思憙功名樂善言而與士君子游某甞望君於稠人中飄然有玉立雲飛之舉欲願交而未暇也至元壬申秋得同僚平陽相接如平生懽共事旣乆愛其材識通敏廉介有守處心臨政多中事冝殆與􅇮聞無異一日請名於予且求其說予曰上古之民林林而生系出一本聖人見其厥􅀋蕃庶惡夫無别於是因官因封或勲或守王父之字賜姓氏以明之立名諱以識之表徳業以貴之又以性有剛柔進退好惡之異而寓抑揚與奪之義焉君姓忽氏盖父字也世為唐瀚海軍都護府人其國郊於乾兊之間􅁺雲天之雄故其人多沉潜剛克内明而外毅吾子乗彛竒特超拔倫萃表著於一時豈非能明其􅀄徳而光揚於外者乎傳曰徳明惟明其是之謂歟故以徳輝名君而英甫字之蓋英者徳之光發見於外者甫者男子之羙􅁛也吾子以為如何廼書以贈李氏子名說故河東連帥李公以忠勇佐征伐建殊績受封河東盖三丗矣有孫一十四人一日元孫萬户某率諸弟相過鴈行玉立映照前後與之語挺然有燕雲遼碣之勁氣吾知其先代之澤渊流而未央也次五弟因求名於余予以謂李氏丗以武顕継武而善可守者其惟文乎故名之曰嗣文以文叔字之傳不云乎文武之道未墜于地在人賢者識其大者莫不有文武之道焉李氏子其服之無斁至元十年􅀊癸酉前六月十一日予自河觧北還過絳書于園池之華蕚堂王氏四子字訓中丞王兄子􅀄一日因子名而告予曰人之生丗貴善良而材用譬夫羊豕性馴而乏可用之資虎豹材逸而無可馴之理唯牛與馬乗服耕播性馴狎大有濟於世故弱息四人取其義名之曰犄犆牥犅吾友其為我字之予即訓曰徳驎徳駼徳騵徳駺雖然牛不駕習則有破車之􅁀馬不調御則有泛駕之虞士不學習至跅㢮而無􅀁用四子尚􅆂飬其徳性修治平声其才學異時任重道逺無以􅁭据貽誚兹汝父之志也其勉旃母忽書字訓以貽之温緫􅃹字説古人制名與字本以假代稱道因其材而進退之非欲求勝而滋羙也温生世將家容止雍雅殆素閑於詩禮者甞攝從戎事及兄之子衣甫勝即以軄􅂌之時人多其譲一日踵門來謁載拜而請曰􅀄膺字仲傑傑也者智過萬人之謂竊意聲聞過情君子恥之且於名理又弗􅀋假而􅁛之誠有所未安者願先生易厥􅀄得因名􅄛義可用以自儆者為偁則所貺多矣予嘉其情實而辝愻卑牧而不自矜也迺以大賢之事告之昔顔氏子得一善則拳拳服膺而莫之失服膺者能持貯心胷以為終身之行用是夫子至興其殆庶幾之歎予因為之説曰人心虚明而廣大衆善畢具惟其人慾静盡則道心孔昭道心者何四端用中而巳雖然仁為體三者乃仁之用而敬者又禮之實克巳復禮庸焉而入德􅀹在視聽言動之先惟其善擇能守從容中道則此心弗曠既有物而且有則矣傳曰􅅴受和白受采忠信之人可與學礼苟無其質禮不虚行况乎天姿温粹樂善而克恭者焉故敢昜傑曰禮以仲敬字之庶幾因名􅄛義用以加修者欤然前賢致恭不以聲音􅀏貌爲事欲誠著于中而藴篤實之光氣彂扵外而粹安和之色道見于用而極靖嘉之方其事上則忠􅀾陳則勇與人交則信將見名實兩得禮容偘偘與大賢同歸異時詩書謀帥豈唯投壷雅歌而巳哉吾子以為何如膺曰意中事先生能言瑩如是敢􅄪拜受教扵是書以爲贈張􅁺史名說元貞建號之前􅀊丞相伯顔公受開府儀同三司太傅知樞宻院事許開幕置属扵是選擢材儁以崇時望主安定簿張楚者以􅁺史進一見即􅂪眄睐是歳公以疾薨謝于位嗚呼哀哉楚追感殊顧懷思不忘至圗公像奉之懇集賢翰林两院題讃俾昭盖代亦来叙哀徴辝言念勛徳辭情慷慨義形于色因知楚河東九原人少失怙恃飬於外家徐氏孑然以􅀌童子從許公度學氣兒修楚早􅀒幹局甫冠先生以楚訓名是用勉夫修習俾趍于成今以事爲所著者論之可謂樂事大賢知恩所自以義圗報有始有終者也其在衰俗誠可嘉尚予乃悚然而器之曰楚今當作礎矣旣而来求其說廼告之曰古者制名皆存義例有像其􅀋而命之者因其材而篤之者或審其剛柔而抑􅀭之者或察其氣熖而取與之者非徒􅀚羙誇大而巳也今予以汝美在其中用見于外篤實輝光有不可掩焉者􅀂夫氣志堅凝如鉅石出霧洞逹無隠既敦固其材實復砥礪其廉隅方嚴正大奠夫鰲植之下而収任重持乆之効者是正汝之責也昜曰介于石不終日貞吉其是之謂乎嗚呼礎乎其聽之無斁二年丙申重九日叙說儒用篇士農工賈謂之四民四民之業右士為最貴三者自食其力能傃所守時雖弗同固不失生生之理唯士也貴賤用舍繋有國者為重䡖盖其所抱􅀒者仁義禮樂有國者恃之以為治平之具也國不為飬孰樂育之君不思庸孰信用之不幸斯道中微我玄尚白阨窮遺逸隨集厥躬此士之所以遑遑於下而可吊者也幸有連茹為引用為主張者曰鄙儒俗士烏足有為也切甞惑焉謂有用也時不見其所用為無用也一為時用卓越宏逹莫可企而及者烏可以時偶無用㮣有用悉為無用之具哉國朝自中綂元年巳来鴻儒碩徳濟之為用者多矣如張趙姚啇楊許三王之倫蓋甞忝處朝端謀王躰而断國論矣固雖聖神廣運於上至於弼諧賛翼㑭之休明貞一諸人不無効焉今則曰彼無所用不足以有為也是豈智於中統之􅀄愚於至元之後哉予故曰士之貴賤特係夫國之重輕用與不用之間耳嗚呼國之所以為國者有其人也今天下之心同然而深惟者天統大開六合同􅁤及其選一材取一士舉目茫洋無所於可正孔子稱􅂎宋二􅀖無足徵證盖傷其賢旣不足文典之傳有不可強而為者復以時務論之今選行於上材乏於下是㝡有國者之所當病故唐取士之法歳萬人為率猶三十年可盡况法未備而無所取哉又老成先進文學經制之士學海内而計之不三数人耳故州郡所謂學校勉勵修進之方從而無實掃地何有嗚呼儒乎其微至于兹乎斯文在天無可絶之理是恐不止不行不塞不流之意耶然士不用則巳如或用之固非一朝可就必湏廣學校禄師儒振士氣而勃興設衆科而肆􅂑故得人材軰出以膺文武之選以成乆長之業斯則適其時矣任是責者庶聞之油然有蹶於中􅄒儒用篇吏解甚矣吏之不學取之無術也紛紜苟且自進自退㨿其名則正較其實則非而官之形􅀔衆之情僞習不相逺也故諺曰畫地爲圄不可入削木為吏期不對此盖傷其持心近鄙之之辝也然非吏之性也􅀔也今夫一縣之務領持大㮣者官也辦集一切者吏也簿書期㑹之所交錯也利害督責之􅀁相湏也鍜煉酬酢日復一日大體細行有不遑顧者少或蹉跌輕則窘折困辱重則榜責退黜吏之為役賤巳極矣安得不持其事而逾急欺其心而後語哉或不經事昧於自信聞其名則憎見其人則昜意復少忤至忿嫉訾毁不以禮貌相接非也是皆不澄其源而貴其流之濁也􅀂使上之人能清心省事一其法政簡而不擾有傑􅃛苛刻急劇苟且之心將安所施哉余故曰非吏之性也勢使然也􅀂從其流而責之所可鄙而傷者甚矣今天下之人干禄無階入仕無路又以物情不齊􅁖危而便安不能皆入於農工商販故三尺童子乳臭未落群入吏舎弄筆無幾頋而主書重至於刑憲細至於詞訟生死屈直髙下與奪紛紛藉藉悉出於乳臭孺子之手幾何不相胥而溺也以至爲縣爲州爲大府門户安榮轉而上逹莫此便且速也人烏得不樂而趍之甞聞近代吏之出身難矣由州而吏貟由吏貟而部􅁺法侓乃筆人材行止舉明有官否則結罪然後考試有司寸歩不遺設法既嚴百不選一猶恐中非其人害於而政以今􅀚之其可鄙而傷者當如何哉且两漢之丗丞相御史下至三槐九􅁄蔚爲名臣者多吏也固必學之有素進之有道􅀄不􅀂此紛紜茍且嗚呼弊極而變變則通此必然之理也然非持衡者孰爲立法而與革之哉作吏觧篇田訟民之致訟者多矣未􅀂田訴之未能决也自井地散而為限田限田變而為無法此事端之所由興也又以兵農􅀔異兩有相犯各持其是而不相下治兵者曰吾軍刀之所自出親民者曰吾征賦之所由辦居上者􅀂是為下者將安􅃴從至官諉吏而搏拏吏眎賄而與奪牽制蔽欺卒無定論幸有審兩造而克荷者情裁臆断明同仁一視之公釋累􅀊積年之弊徃徃迫於形􅀔頋後患亦因循而莫之問故僥倖者覩其如此又以彼弱易欺也詒冐􅐁攘靡所不至甚者損衆益已閧一方之訟必􅀍擾而後巳以致􅆾戾抑滯之氣鬰積於上烏得無水旱之異哉水旱之來又弱者􅀁先苦􅁒政能行民之不困也難矣余甞讀大雅綿之詩虞芮質厥成文王蹶厥生盖言二邑訟田徃正於周及入其境履其庭礼讓之風無或不在二君感而中愧生其固有良心相與罷歸棄所争為間田自是歸周者四十余國先儒以是為西伯受命之符冝矣孔子曰能以礼譲為国何有其是之謂歟嗚呼三代而上教有餘而法不足两漢而下法有餘而教不足教不足法猶足治也矧教與法俱至闕然者乎民不險而訟也又難矣施於今者宜􅀂何曰惟有明其教一其政立其法干其上然後擇官宣化守其法于下庶幾民志日定而訟者少為之熄矣述田訟篇黄石公説秦惑李斯之説燔書阮儒以愚黔首故一時豪傑之士醜厥德而耻食其粟者多矣如盖公盧敖倉海􅀂啇山皓皆是也􅀂黄石公者後丗獨以􅄦物為疑非也􅀚圯上一節公蓋逆知其炎劉將􅁬非良無以輔成漢業雖然頋狙撃吕政於􅀶浪沙中良之氣固以為盖丗雄傑惜有其材而未至者學耳及一旦相值輙令取履跪進旬日間徃返三至先折以禮継稱其可教特重夫師道之傳抑使動心忍性徴於色發於聲而後喻也兼奉執履杖弟子之職非有儻慌可怪之事而班固亦以非有賛焉設􅀂良欲神其所遇不過使髙帝異其非常平時智計皆自神異復不䡖其所授教而巳使是公果有其石我巳之語亦不過古人事了徑去剷跡韜光今千載而下仰其髙風可聞而不可詰也又甞讀公遺書皆明哲警抑之道殆黄老氏之精英者也不然胡自托於荒丘􅻄确而爲是傃􅀮行怪之舉哉由是而觀東坡􅁛公為秦􅀮君子可無疑矣距祠東里許有阜曰黄山下有孔穴其巔巨石嵬立土俗相承云公出於此􅀹為不􅀴云至元甲申􅀊夏五月余覆灾祠下頋瞻山川慨焉興感書是説以辯云筆説燕之筆霜雪頴也勁而莫為屈楚之毫炎蒸之毳也柔而易為書勁與柔何俟多論獨念夫用之有難昜也余以心無所用近集三代巳來輔臣相業述調元事鑑筆為日課資間中一樂机格間燕楚之材皆具柔和者易扵得字腕不知勞也勁挺者艱於如意手指既据致牽其臂而為困然不数日燕鋒方練布畫愈精頋楚産巳敗而不任吾用矣予於是乎感焉曰此何異於相之用人也昔霍將軍子孟欲顓事權利其庸鄙者相故李蔡石慶王訢􅀭敞使之充位而巳霍終不聞讜言其族随敗而無餘唐相蕭嵩亦以韓休柔昜而薦之及其當位持議方剛殆不少撓至有不意能尔之嘆而開元之政蔚有可􅀚後之君子居扵人上者正當毋友不如巳者可也苟専以庸鄙便巳為心其如􅀖家何作筆説至元丙戌夏六月三日也亀虵􅀃巳丑􅀊秋八月癸亥有玄亀丹虵見于太乙宫之書院錬師范君􅄪拜以禎祥来請予為之說曰虵虺在􅀁有而玄亀不常見一旦蹣􅘐蜿蜒並出而偕行此又覩之罕也二者化精水火玄武􅂨甲以自壮靈虵摇毒以螫人故古者師征圗形􅒅旐用先唘行加招揺扵上俾急繕其怒以示禦侮毒􅁀之戒今六代純一師奉命醮斗積有􅀊時豈精誠感格當進作之際堅勁衆怒俾禦侮警􅁀隂為之祥邪然禋于彼而見扵符籙􅀁在者豈􅀕法徔出昭其教之本邪不然昔昭應宫因二物畢至灵宇斯建抑亦夀宫􅀅欲復增光舊物此為有開之先兆邪吾不得而祥也作亀虵同出􅀃冬十月三日書牛生字􅀃全閩鉄官属吏曰牛生者東平人丗儒家尚氣義好刀剱或欲之雖千金不恡聞余名甚喜通謁耒拜予曰汝非文星者乎唯而不敢當吾自壮歳亦以論文說劒為喜今雖耄氣習未除也遂與談古今劒噐雄雯雌縵者数品至有所未聞而未見者若􅁒吐燕趙勁氣而來吳越之清風也巳而跽請曰星之表字走有所未安􅄑憲使與昜而淬礪之因謂之曰維南有斗不可以挹酒􅄴然經緯昭布天之至文也昔龍泉下伏􅂵氣上欎張雷識之得二者扵幽囹之下嗚呼一物之靈有如是者傳曰文武之道未墜扵地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫物猶􅀎以氣而上逹人固當以文而致昌其以文昌字之可也牛生其朂㢤毋怠扵是書以為贈米少尹名字􅀃人之性有生而即敏者有學而後明者要之生而開敏者為上習而成性者次之劒倅米君燕産丗為西域人性開敏樂扵為善甞憶其兄中丞丁多故際衆無異議中外称其善良予過劍浦米来求名因訓之曰闓闓者生其善心顕其可踐迹也内不先開英何為而發故字之曰英甫兼汝年方壮功名䁀耒􅀂􅀎以乃兄為法䔍其良心踐其善迹是不􅀒天性㓜成訓夫闓之之義也英甫其勉旃庚寅九月十二日書扵南劍􅈦事孫鞬郎名字􅀃六藝以射為重三代􅀁以觀徳而貢士也故男子始生懸弧矢扵門俾射上下四方示有事扵他日也元孫鞬􅀅生之夕総戎晋人社矦以竹簳五十遺余矦甫去而鞬生其開先慶璋名逐生来之兆為不偶然者昭昭矣今生十有八􅀊姿妍静學習頗嚮方訓名象徳不即開先之祥而用之􅀅何求故以笴名之而以君貢字焉亦因饋命鯉之義廼告之曰雲夣之竹天下之羙材其米而貢之者將逹之扵王庭􅁱夫射宫大用以明擇士之道其為物豈不重㢤然矢之為矢必湏辯隂陽相􅀶勁矯揉以端其紆趮文彩以煥其羽筈堅銳以利其鋒鏃而後可以洞逺而捷鵠不然雖公佗飬由之伎且將不吾􅂑矣於戯笴王氏由農而士嗣志讀書迨於汝盖五丗于兹吾老矣其􅀁以望於汝者端重持其中和昜接於外不使一毫怠堕之氣設於而身以之效用致逺而光大先丗之業小子笴其服之母斁至元壬辰秋九月十二日少中大夫祖父秋澗老人訓示叔父後谿題示訓汝諄諄意竒文見廼翁洞堅威可大棲鵠體湏中旣應開先兆當知矯揉功逺期􅔪近効羽夾看摩空樂全老人説昔太史公傳貨殖以素封而名家甚夥然冨而好禮享所有而全其樂者盖亦鮮矣林氏系蘇門望族君玊雖治産時逐處心逺大資之以發其身者良有足􅂑為人志明而氣鋭樂賢好客教子孫讀書頋一事不肯屑屑出人後通都大邑居竒貨儈嬴羡掉臂於陶朱猗頓間千金之産有過而弗觀者至親近名士大夫風雨寒暑奔走不避如鹿菴顒軒二大老愛其䟽通知変皆欵與其進遂資藉子仲先為時聞人故好事之名髙出行軰逹官時貴踵接於門者無虚日家則藏書有閤圃外思親有亭植佳花醸名酒客至則撃鮮為具賔醉而後巳窮年而不厭也今年七十有五視聽聦明行歩加健飲啖如五六十人既富而壽壽而安安而能享承家有子純孝而特逹釋􅀒有孫善継而克荷嵗時讌喜朋簮四盍児孫滿前奉觴拜壽樂融融也一門之中百順坌集何其秉之厚樂之全且見其禮義之生於家也予以丗姻故㳺最狎因舉曽有􅂟謂子仲曰􅀂廼父克享所有以齒以德扳古人之例宜易名以顕異之􅀂等以爲何如曰謹唯命遂以樂全老人目之異時瞻喬木禮髙年使誥雲絢彩爛焉盈門是將望於􅀂子􅀂孫者未必不張本於斯耶巳而子元耒請其説於是乎筆以為贈􅀊壬辰至元廿九年履端曰書劈正斧辯斧斵蒼玉為之長􅈳九寸有幾鍼之刃满六寸頦下畧齟齬之中堅厚二寸強龍首呀脗囓于口作两叚吞荅腦與刃通以柯貫之上以􅀟蟠螭冐其端下以玉束琯承其竅華􅃳緻宻無微疵可㰅神兵凛肅真秘寳也且斧者黼也黒白二色相次故以水蒼玉象之三代之制云兵刑䘮祀用之飾怒以賜殺執之以就列示威以啓行而巳今則天子正何朝㑹命冕執中立以劈正爲義莫䆒所從耒然法物変昜多自􅀌隋李唐因之有不能廢焉者歟又制度追琢以近代工較之非隋唐莫之能作豈劈正之論􅁠輿於二代間邪嗚呼断之爲德至矣昔孝成以優㳺不断漢鼎遂傾憲宗知惟断有成淮西克平是既繡於裳繪於扆織于畫于羃今復植立以肅正朝古之人納君於正去邪勿疑寓德威於物以將其果毅者俾無或忽也垂戒之義深矣至元癸巳春三月廿六日因閲實偕御史啇琥修撰魏必復觀於侍儀法物庫偶憶近􅀊夢先師命予賦朱干玉戚詩今日廼與神物㑹遇所謂嗜慾將至有開必先者也作劈正斧辯王氏冬蔵圗説夫出處語黙君子固由其中然造物者不無意於其間也適事殷之時引之静處使逺其咎人意􅀂中有􅀁惜我可忽其所事哉曰事謂何静而積學以俟夫動而有爲也傳不云乎居則曰不吾知也如或知尓則何以哉况苒苒而來我悠悠而過心放而不思其求學雜而不至於􅂖坐靡光景日就衰謝則曰人不我知時不吾用其爲惑也亦巳甚矣今將収放豚以入其笠屏吾雜以絶其害朝焉而経暮焉而史経則􅀁以端吾體於中史則所以驗吾用於外旦為夕之所不能夕補旦之所不足要本先定力以固窮終精思以求道貫夫六藝之㫖而醻酢乎事変之耒者如斯而巳矣至於無益之談不切之務昏怠之氣過分之思合俗徇情徴逐挑逹一日三秋之戒廢日􅆸身之喻又見夫左箴右銘儆其敬之未莊心之所不力也嗚呼昔孔宣父稱顔氏子其殆庶幾豈非三月不達其仁乃􅄖入聖域之要也歟予甞求是心渾然無間於一時之乆者無他政自敬與義夾持動與静交相飬故也􅀂夫冬者􅀊之一時猶夜之所當息也又易曰艮其趾時止也雖止止不終已而湏其所止者盖成於終而後有以成平物之始此冬蔵之所以作也至元廿四年丁亥陽月朔日云度曲説敬齋李先生晚年以歌酒自娱既耄雖不復而倩猶獨至毎興耒輙持空柸令門人酈生放聲長歌以導歡暢或不如指先生以已之所得教之遂㦸其手而髙下之使視焉以諧其節奏雲起雪飛窮要眇而後巳公亦醺然也丁亥冬十月八日飲李氏新篘偶及分忖歌節信主士逹仍為發此冲冲然殊有所適昔孔宣父與人歌善必使反之而後和焉又漢人例蓄聲樂唐之士夫皆有音學由是而􅀚歌之為藝亦未可人也先生以材徳主盟斯文六十餘年予􅅻得一拜履綦及過元氏先生墓草巳􅀫何先賢風流藴藉不容多得也如是可勝嘆哉吾特書此異時㑹與蕳之酈君相值於光風霽月之前拊掌談咲中郎之文采風流不無髣髴於眉睫之間也士逹其志之又從而為之誶曰我觀夏禮􅂎固不足徴􅀆吾道綫如賢献日巳零􅀆斯文未䘮其將孰為興􅀆噫中說聖人垂教千言萬論獨以中為天下之逹道者天體如是也且天地周圍三百六十五度而南北二極揆上崧髙乃天之中心也故定極焉然後天地位而萬象則其法焉故過則為差不及則氣不能成􅀊折而中半二九一十八則度之數文稱停不偏矣人出於两間受其中以生是謂之理理者仁義禮智之謂由是􅀚之聖人之為教所以因其材而篤焉舎是何以為物何以為則故董子有言道之大原出於天其斯之謂歟於是述中說至元戊子端午日雨中書命說􅁎仲實者名思誠真定靈夀人㓜業儒兼該隂陽氣數之學今年四十有九以耕稼㱕隠􅀌虚取名非本志也至元二十五年自趙過衛將還􅁉之方城縣合河郷之新居為予作一日之留得略談三命之理知􅁎之所得絶與衆人不同其法大抵取先天二氣五行萃合一處以盛衰偏枯克䧟抶助就其胚胎截長􅀘短互相乗除度其造化虚實得中與否然後断其衰旺成敗何如耳且謂予身自乙巳至甲辰两運極安静得夀垂老若無疾恙予莞而謂曰所􅀗多矣尚何兾云又云人不冨貴者若有學問即與享用者同樂又曰品秩入格局者極難因說賤庚即今大運見在乙巳已中闇戊人皆以破丁官者戊也然戊居巳苦無力不妨􅁎曰不然只為戊字居巳無力故官氣不旺何則日居丁邜火取月壬子為水丁之官子􅁍為卯相刑尅使壬子散漫卒不得用若戊土建旺即成涯岸其水自可浮舟楫潤物􅀋今年􅀊君雖是戊子戊旅寓於子非土之正位亦不克助噪開􅀊巳丑用神戊辰皆土恐􅁍得扶藉作内作外皆􅀗􅂇益蓋上下氣體皆順故也又以六壬占得一課其名見幾􅀄傳功曹次傳從魁末傳天綱中間所有動静不渉虚妄其占云功曹者官府之吏長起彂其事者也從魁氣毋之杓斟酌與奪是大人之主断者天綱即斗之標係從而賛輔者也謂如杓有􆇢用柄自然来随將來所應多是武秩文用在今嵗窮臘来春孟仲間其事可驗門下自耒占決無似此課皆順無逆有成不妄也幸切記勿忘時歳八月十二日甲子未刻事也因念逺凶近吉君子之恒心故數占而不厭􅁖直喜䛕丗俗之常態多願聞而受愚至有求其所不可得避其所不可免中無蔽志一聽於卜神亦不為之占矣且不測者隂陽之神也孰為細人寡聞者可得臆而度思彼妄意受愚者是特䟽釋一時之隕穫耳苟非理之所在義之所當行者其抒憤警俗虚髙務悦之説君子雖聞之而弗由也然所以見其彼之云云者試以吾之所在而當行者且念夫彼之殊異扵衆人之所謂者果孰得而孰失哉作命説金從革説予甞侍坐於丞相史公昭文先生談􅀊序􅍴搭之説不爾四時不續􅀊功不成開府以未之聞而喜甚継以皷鑄事語予曰汝知夫金之從革乎工人摶沙為範力甚䟽弱以金燬烈之氣冩而就噐彼様度之圎方文章之緻宻頋虽絲髮之微其脉胳縱横莫不克满爛然可觀有非人力所能然者何則方金之在鎔也猶氣之氤於範圍間也彼爗爗融融楊彩委質既爲之氣盖有無不者所謂氣不周者是也予以晚進學淺尊卑􅀔殊有所聞不敢質其所從来後乃知據易說莊解而云其敷言甚覼縷也以今思之爲予而發者多矣予平生䟽直強項氣少不人下而扵丗每竒而不耦先生以不屑誨之盖先說欲學者紬繹其道貴夫造之􅀷也後一說以變化氣質爲先欲澄治粗厲㑭就夫氣之中且和也此豈唯予益實於丗教有􅀘恵夫後學者深矣因追録前言述從革說馬氏子處禮丗治家氣清而志學来求予訓辝特書此以貽之古文今文難易不同說訓誥誓命等文體固不同要本聖賢以彛典明天理本人情綂群心而巳然古今辝文有難昜相反者先儒論難終未明了以予度之書之為䇿湏史氏潤色􅀮括旣出衆手性異好尚學有􅀷淺才有髙下筆有強弱而辝有澁昜故也九峯疑其勝女口傳者偏記其難孔壁後得者返為平昜反覆䆒説似逺而泥謂如尹之訓賢君也當􅀷而昜庚之誥民庶也當易而􅀷又周書五誥獒牙詰曲叮嚀委曲有不昜曉者此無他一繫夫當時人情勢有不得不然者更值夫史氏之尚竒者一向艱澁韜其幽光以成噩噩灝灝之體耳蔡氏復以紀實難工雅詞昜好為辯是亦主其措辝為言然不碇此恐杜後来者詳説使學者躍如求於耳目聞見之外也啇魯頌次叙說韓陳二生問魯継周頌啇次魯頌之後何居余曰三百篇皆周詩魯則列國盖周之㣧裔僖公又魯之賢君天下無王蕩蕩板板而周禮盡在於魯故孔子曰如有用我者吾其為東周乎賢諸侯不與將疇歸恐亦書終以秦誓継之之義也􅀂商頌次之魯上殷周之先代前後不叙意者孔子殷後又當斯友之主那等樂歌皆成湯髙宗盛烈其聲其靈赫赫濯濯如此為子孫者刪次之際偶得是篇於大師可忽而不録仍附于後以終其弦誦之意恐或然歟百獸率舞說百獸率舞先儒皆無明攵所以然者豈上丗四靈在郊楽與天地氣應故幽則神和於上明則物和於野正縁史官形容四靈等瑞以見其氣和之至且如唐明皇舞馬止是一時教習即能驤首振鬛衘柸上進應樂節不差况聖人教化極和感發動盪上下同流信及咸􅀂有自然而然者予故曰獸之率馴盖實有之非溢羙辝也不然則鳯凰來儀亦可為疑了雹說陶晉卿說􅀗嘉縣今年五月􅀄雨雹為灾其大如柸拳桑􅀥皆􅆷折無餘及多拔大木有提去百歩者如此凢一十八村其可畏也予曰天地間無别物只是隂陽二氣交感而巳雨露霜雪如常者天地和恒之氣也唯其弗和致有此異盖隂沴􅆾戾之氣從中脅而成之其大小即隨所感輕重而然木拔與去此是伏隂摶陽而􅁬木􅃴與值遂突而出之耳氣盛物微吹而去之氣散自墜于下予二十歳時行共山道中望羊角風自西南來蓬勃方數百畒吹駕大枿於塵坌上者數十株正此同耳申豐云􅀨雹山有氷不蔵蔵無棄餘所致且一歳山谷間隂積不釋者􅀂一一蔵之庸能既乎又遺堅志說有人雨過山行覩大本忽抜至聞其隂靈用力過而自絶倒者是皆齊東野人之語士當教子說予甞疑士大夫多不教子求其情而不得乃臆為之􅀃曰儒家者流􅀶而寡要勞而少功學者有牛毛鱗角之嘆其成難也如此豈謂是歟且以巳况之攻苦茹辛焦心勞思積數十寒暑之勤僅得猥列士行否者將何所冀哉故徃徃多不以所難強其所不能寕從彼好使昜為立身耳然蜾臝最虫之微者尚能􅀒螟蛉振羽而祝之曰􅀋我􅀋我况人乎彼或不賢為父兄者固當擇其師課其力誘之掖之俾極其所進之方果鞭而不前然後随其所樂以畢父兄之責此吾儕當然之理也然自非下愚不移天下無不昜之俗人無有不變之資只在夫發藥者如何耳為子弟者至此日當愧耻無地心憤口悱勉立志節人十之巳百之人百之巳千之􅀂恐不及為心又使昏惰之氣不設於其身可也先君亦甞有言四民士為重學有成髙出一丗如其無成不衆人􅀂委而棄之此何足以有為是則賢不肖其間不能以寸孟軻氏之言責固不為過矣又父兄不能乆視長在一旦衰􅒜覩彼之子孫􅀂是之髙我之門户如此之卑家聲曰替丗業一空幾何不嘆息而悒悒扵斯也近一素䆠以家學授其子三俱有所立尚以未登仕版至告人曰吾死目且不瞑矣父母之心天下一也况其所業未就學幸得而不自強才可進而乃自畫其為父母者安得其心不攸困者哉作士湏教子説周景王大泉説世之嗜古者多尚鼎鍾鼎鍾徃徃偽出古而真者莫錢􅀂也陶簿􅀳卿好古泉而得大泉五十者攷之譄籍盖周景王所更大錢大夫單旗諍之以為不可者是也其形徑一寸二分其重積十二銖今則半两也以􅀊月計之自景王迄今幾二千年矣其文與周郭肉好精緻堅凝略不為之齧蝕信哉前代制作後人有不可企及者嗚呼陶子其寳之無斁安知無􅀍篾杖䇿踵門而耒丐者乎昨日歸卧春露堂既覺適筆研在䘛偶為書之覺體中不佳拂拂然從筆端出去矣至元二十四年秋七月丁酉戯題賣兎説伊川先生見賣兎云此亦可以畫卦或者曰何謂也余曰物盈天地間皆從氤氲一氣中耒所謂萬物一太極也卦之畫一隂一陽而已兎亦具其二者之氣耳見兎亦可以畫卦盖謂有此理耳故又曰不特龜馬之􅂋著者焉二馬圗説明昌􅀄西夏國毋病章廟遣尚毉徃治愈之獻名馬囬謝一曰進御以試良德即旋焉上怒命太僕驅去窮曰力斃之未夕徃返馳五百餘里㱕望天廐振鬛長鳴􅀂無事然自是以一骨當御今􅀚此二馬毛骼駭異黄門飛鞚迅􅀂㳺龍豈非當授轡之􅀄耶嗚呼馬臣􅁼也食三品蒭豆直立内仗一鳴則黜之矣其或猥靡為心取媚於上以速見知皆非馬之德也然則馬之為如之何而可曰有受䇿服劳不有其力以服蒭秣之恩庶幾或徔王事無成有終之義也作二馬圗説稼齋説崔文字文卿稼齋者府從事崔君之自名也求余以隷書冠於卷首余曰渠年少氣銳方馳聲臙仕以調議理務為事何以稼為豈起家隴畒掲焉而不忘其本邪豈食貧口衆禄不足以代其耕邪豈仕不為貧動乆而思其静邪曰崔氏世居荏平薄有田廬近在郊遂與城居不殊其静僻殆谷耕林隠也徃歳自海上罷官西歸脱煩鞅謝人事郊居者數月冲然大有所􅃴方夏之􅀄三農在田耘耔底蹟予開軒卧治􅀚良苗之懷新有田畯之至喜及夫多稼雲如薿薿彌望庵􅀚銍川􅅯然覩崇墉之積􅆳豊年之歌動髙􅅒之詠田里熈熈物情交暢以已之樂而為衆樂因衆之安而爲吾安是乃平昔明農私有所得於此也其為稼也不亦冝乎余曰四民之分各有攸業而進莫榮於仕退莫安扵農仕則思吾所當安而明夫學之用也農則安吾所當遇而樂其身之適也􅀂當仕而農將貽老農吾不如之鄙當稼而仕恐渉大昜知進不知退之譏然進而懐静退之心不猶愈於退而存不巳之念也歟崔君其艾服官政進進而能先求其所當安而安之而後思巳之所安是亦先其所􅁨而後樂其所樂之意也作稼説以貽之李郎中二子名説郎中李俣正卿有子二人俱教之讀書從劣孫問學其勉勵資藉之者甚力其長資頗篤厚次則佀渉輕俊然奉􅀂父命周旋唯謹一日請訓名字於予廼告之曰古人立名命字取義多端俱不􅀂酌其才性􅄖劣就為教誠而抑􅀭之㝡為親切夫篤厚者必藻之以才華所以彬其文質也故其長用質命名而字之華甫輕俊者湏濟之誠實所以俻其材德也故次者名之以俊而誠甫字焉嗚呼二子今而後當克制其偏勝􅆂飬其不足以造夫中庸之域他日立身行已不致有過不及之差庶克荷汝父平昔提誨之責尚佩服之母斁祁氏四子名説汴梁士人祁祐之治生而不求冨楽善而不近名尊賢者使教子讀書意在亢宗起家介司計楊敬夫求名字其四子予謂為善好學積累能又則恊氣感發其興也勃然如水之淵渟滙滀一且􅂥溢騰而為雨霧降而為川流有不期然而然者祈氏子誠能勉力進􅁱則於志成羙其庶幾乎故其名與字皆以水命意焉澤字潤甫淵字濟甫源字湜甫濤字浩甫鳴呼小子其聽之母忽王從事季明子説兵馬指揮即前世執金吾軄也其從事王李之之故人也以通家好出拜其子詢夫小渉即其命意以連僧昜之因求訓誨廼祖少從西菴楊叅政樽爼士大夫間風流藴藉以通才稱惜乎竟汝父夙蒙中丞王西溪提誨持身從政不失不偶優㳺常調然在相衞故家間屈指可數若家世之隆替係子孫之賢否欲其才賢讀書修業而已在我者旣盡逹則身立名揚光昭世緒窮則為善人吉士此理之必然小于其服之母斁石抹氏子名字説大德庚子冬秋澗翁歩入文殊東院主僧量示予木鏤瑞像一龕何精妙也詢其孰作曰汝南監郡石抹君也為人端整白晢辭語灑灑有章天性機巧不待師授而能今年三十有三始筮仕入京師既而僧印耒謁言辤容止與向間脗合資何出之晚耶荅曰叔父國用從四年母老侍疾持服年兹皆家􅀚光上國而名字未立何以稱呼先生顧卹為之訓誨曰勉夫志之命名用世亨字之夫雕鏤刻畫特志其逺者大者傳曰貞固足以幹事亨誠能貞正以固其徳幹敏以運其昭先丗之業廼所以望於吾子也其秋澗先生大全文集卷第四十六
