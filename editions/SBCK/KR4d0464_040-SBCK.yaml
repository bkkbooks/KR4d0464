body:
  text: 記傳􅀦玉璽記粤皇王肇興必有靈貺自甄董生所謂天之所大奉使之有非人力所能致而自至者此則受命之符如􅀛圗龍馬火烏之􅀋是也三代而下視符寳爲重以守以傳体用大著維大元至元三十一年甲午春正月辛已御史中丞臣崔或聞故太師國王孫通政院倅拾得家以窶甚出櫝玉託憲䑓象胥闊闊出者沽諸市以物制非常竟不售令取而視之廼黝玉寳符其方四寸螭紐交蟠四可􅁁際中洞横竅其篆畫作䖝鳥魚龍之状即召御史裏行臣楊桓辨其刻文曰此先秦以藍田璵追琢受命玺也臣彧即持詣宫府介鎮國上􅀅軍都指揮使詹事丞臣王慶端通謁投進皇妃御前玉音慰諭賜弊各有差翼日二月壬午朔金紫光禄大夫中書右丞相臣完澤等率翰林集賢兩院學士凢十有一人詣􅀫閤入賀有間皇太妃命出斯寳賜諸臣傳􅀚精彩景氣光動宫閤翰林承旨董文用等相與稱説曰斯璽也自秦迄今千六百餘載中間􅂋晦固為不常今者方皇太孫嗣服之際弗先弗後適當其時而出此最可重者蒙宣􅂆而退臣惲復考其近而明見者按金集禮云玉璽一十五面俱得之扵宋内受天璽者宋紹聖間淂之咸陽段氏當時命禮部翰林太常寺官考驗實係漢前傳璽遂以禮祗受金亡莫䆒其所在今之所進其文章制度玉色校集禮所載即此璽也昔􅀳見麟璽扵江左唐淂賜寳扵崔侁事出惝恍傳疑後人元帝猶藉之以中興代宗尚因之而紀號俱未若斯璽實前代有天下者之鎮寳應運呈瑞不渉誕妄非人力所致而一旦自至意者上天申佑奉而大之赫爲新朝受命貞符昭昭矣抑表夫暦數斯在開􅀖家無疆之休者光賁前古矣稽首嘉歎於皇盛㢤臣惲自惟軄叨詞舘􅀗覩非常老眼増明不為不幸可無文于後遂綴緝本末用紀大瑞翰林學士嘉議大夫臣王惲堇記􅂼軒記并銘安君世有雲中人父善甫亦佳士世有前進士舜臣李公門情性姿善淑言貌謙撝早歳讀書不樂仕進壬辰後徙家大燕今㞐文明東里有宅一區軒楹外􅂩地寛閑分畦種􅂼日以為樂友人過而以􅂼名軒既次秘監新泉即楊武子􅂐其扁又求秋澗野老明其心因為之說曰貧家􅂼食當米秉之半此正詩書為業􅂼淡自娱者也傳有之􅂖不熟曰饑菜不熟曰饉我有㫖蓄亦以御冬􅂼之為用夫豈小􅀘者㢤然夫子以吾不如老圃辭而闢湏者何盖君子為學志其大者逺者遲逰聖人之門以是焉為請矣其志之所尚故也大要士之䖏卋随其窮逹本末先後為淂昔汪氏以人嘗咬淂菜根百事可做胡康侯為之擊節歎賞謂大夫士不可使不知其味斯民不可使有此色此固大人之事但二公為之一轉語耳又比年耒士夫例有别號未免封已飬髙鮮不以清羙自衒如以終南為捷徑指少室而索髙價者徃徃有之恬不為怪至扵飰䟽飲水曲肱自樂庶幾顔氏克巳之功􅀅何不可者㢤扵是書以為記乃為之歌曰翻翻庭􅉡雨露濡􅀆秋髙氣嚴碧雲􅃾􅀆夕掇朝烹供吾用􅀆日費万錢䁀食重􅀆一􅂼餬口吾儕分􅀆既不知食􅁏之多􅁨余胡為之遯悶􅀆咀嚼飢膓出竒䇿􅀆不致蒼生有此色􅀆歌闋而去漢大司馬􅀶陸侯霍􅀅軍祠堂記蠡吾治城西北郊有漢大司馬霍􅀅軍遺祠俗相承即侯之故封考諸傳注􅀶陸郷名軄方載􅀶野本蠡縣地居􅀶水之野故名終以􅁜迁谷変疆理蒼莾有不敢摭實者然以地形相度今之􅀶野安知非漢郷之􅀶陸乎廟權輿莫䆒何代以信傳信必有􅀁自至元十七年予按部次州来謁祠下荒壇喬木宛在目中老屋庳漏不障風日過客惻然心魄動盪疇為神睨而碩之邪因属守以義􅁸􅆸具􅀖人瞻吏諾而退逮三十一年甲午予承乏翰林省左署郎官劉源郡人也以東曹􅁺徐鳯来告曰弊邑霍侯祠􅂄舊某軰今易而一新内翰幸不忘乆要尚恵一言庶免夫旌紀寂寥之嘆盖甞論人臣以道事君身名俱全克始克終者世難其人三代而下能膺斯任者惟􅀅軍為然􅀅軍諱光字子孟早以大忠至謨見知武皇及其受頋命付後事至擁昭立宣罔辜所托班固論賛雖殷之伊尹周之􅁎旦􅀄不是過誠㢤斯言也所謂伊周者為天立極為生民永命為萬丗開太平是也其生則若爾其殁也與草木同腐豈理也㢤且匹夫匹婦以一節獨行表見郷曲尚能感激後賢尸而祝之扵社况將軍乎然神即人之心也誠敬所在乃神心之所在今郡人業新斯廟􅀊時䖍享因誠起敬如見風采其為神昭鍳也審矣若曰修復故事敬共神眀必􅀗禮扵下執事此則神當然之理吾不當以是心徼之扵􅁳􅁳也至元甲午歳上已日翰林學士嘉議大夫王惲謹記趙州栢郷縣新建文廟記三代治民之具随時更易百世而下惟學校存而不廢盖所以明天理叙􅃔倫止民扵至善之地故也况在今日有尤不可後焉者維趙之栢亭本漢鄗邑地隋縣焉宋金以劇􅁛板蕩耒官府生聚日就完羙唯吾夫子廟宫鞠為茂草者有年于兹迨中統建元之明歳監縣事蔑都令馮仲德佐史路彧教官范天祥䓁相與􅁸􅆸方経理間或者謂廟基迫亭傳雑民㞐􅅝湫卑隘孰謂神一日㞐此乎扵是輟作徐議至因循閱三十寒暑當至元壬辰新令劉君因前政経營緒餘謀扵僚吏暨邑中􅂄􅀫治城東南􅑍作新廟而遷之復構講堂扵後俾肄業者有常䖏越是年秋仲上丁尹率寮属諸生釋菜而落成之鍾鼓具舉􅇼豆有踐威儀升降肅焉煌煌邑人聚􅀚拭目興嘆僉謂吾尹起百年之􅆸一旦頓還舊􅀚勤亦至矣其可使無聞扵後廼以某走京師介􅀦子司業王君搆以學記来請余以司民政者能以學校風化爲先固喜聞而樂道之甞讀漢志論十五􅀦之風氣剛柔緩急􅁼雖不同在聖人設教作新必因材爲篤致諸中和而巳然精強多感者易爲化底滯不材者難爲功嚮甞提憲朔南屢至兹邑􅀚其􅁟壤瘠沮且當南北衝要民之奔走供役勞止􅇱極勞則思思則善生此人情之常也况趙之風聲氣習􅀄不異扵古爲守令者冝知其俗之易牗乃􅀙而振徳之則前日弹絲跕躧悲歌慷慨之俗􅀅見強仁慕義攸興而不自巳者皆是也教基既立道由是生異時風俗丕易人材軰出而曰此權輿扵兹不亦善乎匪然司牧者以應上虚行爲心士子者不以進修為實務其堵而宫之者作餼羊告􅃋之所吾不知其可也至元三十一年嵗在甲午夏六月十有九日謹記崇玄大師榮君夀堂記先妣夫人靳氏系出安陽永和里不肖亦甞提按兩河相即臬司理所故知鄴中人物風俗為頗詳聞之姻戚間女冠榮錬師者志行修㓗􅀕醮精嚴以道價重一方逮接際千儀方頥烟目緑髪童顔風度飄有出塵之想也大徳丁酉予方供軄舘閣師􅀉示西溪紫山傑作以夀堂記文見属且曰翰林先生文學名德與二公伯仲間尔儻遂所請貧道藉之儘不朽矣二公之文載四披讀其稱揚與向所聞見而知者脗合無異今二公巳矣其文章氣節尚可振衰懦而傳無窮淂簉名其列固所願也乃為筆之師諱守玉相之農家女自㓜貞静視紛華泊如聞道家言喜之􅀦朝甲午􅀊中虚魏大師以全真學主盟彰徳之修真觀時師方齠齓出家徃事焉既笄􅀴明行修披戴為道士復研精正一科式法籙号稱習熟至元乙亥嗣主觀事師淵黙内修聲光外著一旦責當􅊼演主張是者甚力貴族豪宗欲謝愆過而資􅁳福者藉師修净期於對越感通故召請者無虚日法契㑹合風動逺迩學徒踵至信向者聿来廼光昭先業擴充増飾截然一新御史中丞西溪王公為述􅀚記稱師興縁弘教落落自拔有壮夫不􅀎及者又蒙掌教洞明真人與進授之崇玄師号年踰六秩特構静室扵焉棲息晨􅁸理玄務課學者畢焚香垂簾痛自滌除湛慮澄心審物理之自然悟道體之不息燕䖏超然而虚室生白矣容齋總尹夙承摩拊仰挹真風榜曰信齋紫山憲使勒銘扵石表夫志道力行終始不渝之確其為名賢賞識如此師之志行愈昭昭矣大徳戊戌夀六十有八乃营是堂為他日復真寕神之所道俗咸謂師山川炳靈道徳藉潤振清風開後學纂懿流光方期福壽未涯何遽如許也然人生而死猶晝之有夜寓形宇内同㱕扵盡此理之必然也今師不為虚誕荒唐之說􅀁惑能以生死外形骸追蹤曠逹以理自勝較夫烹煉呼吸期扵飛升不死昧理乱常僥倖萬一者可謂賢也巳年月日堇記大都宛平縣京西郷剏建太一集仙觀記金源氏㷩宗朝一悟真人蕭公以仙聖􅀁授秘籙剏太一教法扵汲郡悼后命之駈逐􅀑物愈療疾苦皆􅀗應験事蹟惝怳驚動當卋一悟傳之重明大定間召住天長觀甞入禁中論道稱旨寵賜甚渥三代虚寂師以道價凝重一時泰和四年太極宫􅀄建命師主焉其四代東瀛子即祖房孫諱輔道師人品峻㓗博學冨才智士論有山中宰相之目大元壬子􅀊應丗祖皇帝潜邸之聘占對稱㫖上以有道之士特隆禮眷賜號中和仁靖真人寳冠錦帔副焉及登大位中和已仙去玄談粹宇有不能忘者詔五代度師㞐夀至京師特建琳宇􅃙額太一廣楅萬夀宫命主秘祀其香火衣粮之給一出内府逮今承化純一真人全祐継奉祀事十載間以受業者衆國之經費曰廣堅辭􅅒料至于再三有司上議禱祀重事供給所需不可闕也全祐謙撝之請亦不可違也良田菓植􅀠大司農者量冝頒賜置爲恒産遂賜順之坎上故营屯地四千餘畒復慮未臻豊贍元改号歳七月載生明之二日上御神德殿平章政事領大司農臣怗哥等言宛平縣京西郷馮家里􅀠農司藉栗林叢茂川谷間以株而計者約五千數若盡􅂌全祐庶幾資廣道􅄻永昭祀事制可全祐榮􅀍恩賚乃自諗曰吾道家者流清心繕性歸㓗一身何以仰荅恩私有廣開福田朝香夕火祈天永命介求多祉而巳明年丙申春相栗林􅂩地重崗環抱主峯面其北下砦寒泉泓澄碧㶑旁地衍沃可引灌溉既奠厥㞐中搆正殿三楹像事玄元九師祖師真官二堂位其左右前翼兩廡下至寮舎厨庫莫不􅇱具四周繚以石垣前啓玄門榜曰太一集仙􅀚工既訖功以不肖猥同井閈且承乏太史求文諸石昭示來者若稽載藉如元魏之㓂謙之李唐之司馬子微皆以道術昭著顯蒙寵賚史臣屢書特書于以見山林處士禆賛治化延昌䁀祚不以獨善為髙時君丗主欽挹真風􅄖加禮遇不以崇髙為大千古而下光賁簡􅁽今純一師操履貞固精嚴祭醮至蒙兩宮眷顧而圖報之誠惟恐不及是􅀚之建特其餘事耳其感遇之盛與前卋同談而共羙者矣是可書大徳元年九月望日記隆福宫左都威衛府整暇堂記元貞二載秋八月隆福宮左都威衞府􅁸堂扵肄場中央度冝面势不侈不陋于以簡閱車徒角較伎能秉號令而􅀚威武焉既落成榜之曰整暇佐幕張浹盧愷奉威衛王公之命以記文來徴甞聞公之選帥率府繕修戎政桓桓﨣﨣蔚有成筭若夫營壘雲横耕屯繡錯儲􅅒實而豊饋餉建警樓而謹朝昏􅀊時都試申明節制旗斾精明鼓角清亮坐作進退又為餘事至扵醫藥有局更休以時宣暢恩威撫養士氣以之􅀫衞宫闈扈從廵幸肅􅀅斧􅃏中外辨嚴其趍事赴功士卒輯穆􅄖劣得所自非老臣􅀫􅀅謀畫素㝎視若無事者其䏻如是乎可謂既整而且暇矣頋老生常談安䏻彂越其梗槩然有文事者必資扵武􅇱而武􅇱者所以昭乎文徳也㒒雖耄尚䏻效一辭扵尊爼間盖天下之事曰􅁿曰重皆有體用明其體者必致扵用又古之君子不足其巳至貴乎善推其所為以極􅀴濟之羙今公以重厚英偉之姿膺􅀲牙委􅀉之任罄殫忠勤夷險一節智慮精深有古良􅀅之風砥勵廉隅挺士君子之操寓軍政扵􅀦容迪師中之貞吉冝其特蒙睠􅀝有謀猷克壯曉暢軍事之喻所謂明其體而淂效用之實矣推而廣之兹惟其時霈洪恩而釐􅀫敝只在􅀙容一言之頃俾内外諸軍汰冗濫蘇彫瘵極精銳而伸􅉱抑咸若兹軍之整暇輔助文治固太平不抜之基億萬斯年實顒顒属望是則兹堂之構豈特整暇一軍而巳㢤雖晋楚名卿賢大夫復出􅄖游戎幕相事機而措時冝恐不易吾言矣使榮禄大夫塔刺海資徳大夫中書右丞王􅂟端昭莮大􅀅軍阿刺不花其貳武徳􅀅軍完者廣威􅀅軍堇守敬曰武徳􅀅軍曲失帖木児信武􅀅軍張智榮實簽其事詳書其僚佐之姓名者見稗賔之勤謹興造而重事功也大徳二載龍集戊戌堇記青巖山道院記衛奠太行東􅅢山形迤􅆔自南運肘北闖其間峰巒歘断如巨靈􅀄闢望之儼然而巉秀者蒼峪也循峪北騖越蒼池山愈深愈雄峻可爱泉溜益清而駃望東北行約十餘里抵青巖山􅁕嵓壑尤羙四顧皆崇山茂林列峙環拱其東南有洞府軒豁層崕上寛廣丈許邃四五十歩其中泉水泓澄深叵測春仲二日洞出光怪恍愡泓水湧溢漂浮塵滓潨㵼山谷間者一晝夕􅀊以為信俗呼曰水簾洞山藉之以清物資之以潤清潤之氣不特散而為㷑霏翠靄欎而為良材靈藥銅鏐玉石之羙必有卓異幽􅀮之士炳山谿之英靈増景氣之勝㮣如廣施神志存􅀮䘏隂主蒼嵓唐甄濟􅀮㞐兹山至逺迩化服分死完莭不汚禄山近則四僊清修道行留頌委蛻不謂之炳靈增勝可乎洞側道院即四仙棲遁遺址山空人去石礐雲荒獨一殿巋存至元三禩為全真學者李志和始跧䖏石磕以修復為已任剷崖堙谷展托庵地除梗􅀘罅夷為坦陸重構玉帝殿洎東西兩廡山靈位聚仙亭下逮庖湢門屏以楹而計者三十數仍改瘞四仙鎻府中綂􅀄元大一五代師居壽奉命投龍牒玉簡之對以昭景貺厥後闔境旱暵郡長吏来禱車甫旋軫甘澍􅗈霈逮志和修復増宏郡民於水觱沸曰少長畢集願伸瞻禮廼盛為儲偫人具醉飽而歸扵是蒼峪勝蹟靈奕一方而逰觀嬉樂亦復承平之舊府僚豕韋􅀦井君徳常嘉師勤瘁為主張資藉者甚力及來京師復以興建記文為請予郡人也不敢托衰老辝切甞讀金蕐洞天記中􅁟山林名勝不載扵仙藉者尚多惟蒼峪為天脊左戒奥區去郡里餘一牛鳴危峰疊嶂環遶郛郭䃲礴風烟秘藏靈異幽􅀮之士代不乏人亦洞天不載之一也由志和擴而大之其名固亦佳矣然以遺跡攷焉尚有未盡者仐廣施有廟四僊紀行而甄公大莭雖傳卓行於唐史彂幽光扵韓筆在山中故事獨乏旌記子歸􅀎屋而祀之俾後之㳺居者灼知景慕審夫出䖏大義􅀁在以之勉志莭而礪薄俗則子與志和名跡附麗前賢共兹山而傳無窮矣井君曰唯大徳龍集巳亥上巳曰堇記創建伊洛五賢祠堂記大徳丁酉春洛陽薛君友諒即邵氏安樂窩故址􅁸祀屋中設康莭迁叟明道伊州横渠肖像庸致􅀊時香火之奉榜曰伊洛五賢祠神嵩清洛光動户庭明年秋來京師属不肖為之記廼告之曰二帝三王脩已治人之道待孔孟而後明立極垂憲貽則無窮不幸厄扵秦雜扵漢歴六朝隋唐雖有名公碩士間作迭出其氣量􅁕以恢弘至道闢除異端奈智識不䏻盡窺聖賢要奥擇焉不精語焉不詳又局夫章句文辝之末乱以功利禍福之說故學者汙漫支離莫知統紀時則有衛道之士而無傳道之儒􅁜遟至扵五季其斵喪可謂極矣伊洛諸公􅁬􅁸百卋綰持道樞探窮淵源克紹絶學内有以䆒聖賢規模之大外有以脩踐履節目之詳故孔孟之教復明斯文得㱕扵正後學知􅀁適􅀙盖二百年扵兹矣然科舉利禄之習既乆遽未丕変以極夫功用之至伏遇我卋祖文武皇帝資挺上聖運啓休明崇尚儒術尊禮賢俊扵是許竇王姚諸公宗伊洛學陳說孔孟立極垂憲之教以致二帝三王􅀁以修已治人要道盖巳収明徳新民殊効扵中綂至元之際今内而賛助􅀴綸外而佐理政化多前日執簡傳􅀴之士推原本自則伊洛諸賢發明維持之功不為鮮矣雖配享學宫天下通祀可也况二程丗家河南康莭迁叟横渠聿來胥宇相􅀙至數十年之乆聚精㑹神推明討正莫匪脩齊治平之方性命道徳之理至扵談􅀏遊衍亦皆格物􅆀知之餘篤志力行清修苦莭專以移易風俗勉勵學者為主今讀遺書按故迹其英邁純粋氣象尚可髣髴復廟而貌之俾向之景仰髙風者足以致其誠懇今而後瞻拜清光者可以感其善心尚何俟贅兼陋扵其間㢤敢以不敏辝友諒曰昔潮人修韓文公廟東坡有碑南雄起三先生祠晦庵作記謹􅀊月以示來者不為無例曰若扳援昔賢則不肖年迫衰老懶扵筆研又瞠乎其後惟友諒先丗為治中名士其讀書慎行名簉仕版可謂不墜箕裘矣前任常徳府推復九賢祠今又剏兹宇庶㡬有意扵脩巳治人者非特徼􅂑羙名而已也是不可不書大徳戊戌􅀊冬十二月臘日記汴梁路城隍廟記汴梁之廟事城隍神其来尚矣壬辰兵後􅆸撤不存河南路兵馬都緫管劉侯福大懼無以妥靈掲䖍曰事神治人守吏職也可偏􅆸乎扵是相新昌里爽塏地西南二方界以通衢劉侯私第隣其東北則抵居民萬氏廣袤餘七畆繚以崇垣中起正殿像設有儼前敞臺門扄閟嚴粛左右則環齋搆室敦請女冠孟景禮向妙順朱妙明軰相與住持夤奉香火景禮四元宗獻之女童丱入道以䑣􅃹之懿資膺黄冠之妙選享年八十有五無疾而逝妙順亦出各家深􅄨玄理觧属文辭與孟同年仙去景禮臨終貽属妙明曰汝等祗嚴修㓗善守廟祊母􅀒劉侯付托妙明唯曰敢不敬承誨音􅀊甲辰劉侯命侍人周氏韓氏披戴禮棲雲王真人為師訓周曰妙元韓曰妙温與妙明為徒侣􅀁需衣粮皆出劉侯資給妙温妙明俱夀臻期頥相継蝉蛻既而劉侯第四子保㝎路緫尹某卒夫人徒單氏痛伉儷之中睽感榮蕐之易歇聿來栖跡法號妙真道俗咨嘆祠宇為増重焉妙元洎妙真罄刮粧奩資藉刻苦撙莭遂重修正殿臺門創建獻廡子孫司及道衆寮舎齋厨輪奐一新蒙洞明真人人稱賞加妙元以純貞素德散人之號今年登七秩日誦五千玄言為課朝夕焚頌祝聖人夀願天下安鶴髮童顔精徤不少衰復慮興建本末不䏻昭晣扵後走書幣亰師求記扵秋澗翁予䆠逰大梁者屢矣故國遺跡亦嘗周覧今雖衰老忍無一言載名其間謹按祀典陽氣升而天神降地道肅而人􅄦出自􅀖􅀦逹扵臣庶家􅀕秩切近者社禝五祀而巳城隍神􅀄未載也丗說秦功臣馮尚見夢扵漢髙帝曰奉天帝命與王知領城隍隂事雖儻怳不可致詰然自漢訖今遂為天下通祀社與五祀雖有常尊當時用事莫城隍若也况汴梁為六代都㑹四方湊集城池盤礴衢陌交通人物號稱繁夥精英之粹集晝夜開闔死生變化幽明兩間其有神為之主司也審矣夫城隍地道也古人求神各以其􅀋今俾女冠主其祀事冝矣傳曰西子蒙不潔則人皆掩鼻而過之雖有􅁖人齋戒沭浴可以事上帝言誠㓗可以感通神明也如景禮妙明妙元妙真等咸出扵詩礼名家薰膏鼎族清修道行敬㳟神祇致廟貌完固闔郡瞻仰雖其誠篤致然亦由神明有以護持者哉而推源本自不忘劉侯經始之勤是可書大德三年十二月吉日記真常􅀚記大都南城故冝中里真常􅀚為全真學者重玄子樊君􅀁建也惟全真教倡扵重陽王尊師道行扵丘仙翁逮真常李公體含妙用動應玄機通明中正賈重一時可謂成全光大矣重玄子自童丱受業焉資爽朗嶄然巳露頭角由是日􅀗承侍聴其諄誨仰其髙風神志灑然春融蝉蛻與之俱化玄覧暇詩章􅂐􅀠亦時習之既壮辭逹體要與事物接無所凝滯衆以不凡許之真常師嗣主法席委掌資用出納明㑹計當巳無私焉師為稱賞曰財賄衆􅀁貪淂今逺疑怨不為行妨吾將大有以􅂌之時朝家欽挹真風􅀁在宫􅀚相望和林都㑹地獨闕焚頌之􅀁乃選充道録俾張皇教基供奉闕庭雖越在風沙數千里外慨然命駕曽無難色至則潔已應物通変無方致宗風弘演王公貴人為之尊禮主張蒙中宫賜金冠錦服俾降御香扵燕都師真紀堂殊光顕也庚戊間真常真人洎十八大師光膺寳冠雲帔下至四方名徳亦獲紫衣師號之寵改觀為宫周旋之力為多継奉旭烈賢藩教㫖提􅀧彰徳路道教事逮誠明真人嗣教念其耆識殊顧眜也晚莭退休與時消息至元二十二載易張侯故第為幽棲􅀁榜曰真常􅀚示不忘本也崇堂為殿下至齊厨庫廐修治完整復置􅂼圃一區負郭田二百畒資給道衆乃洒掃㳙㓗廣植花木使境􅃐靖深日端儼丈室炷香撫琴客至問何為曰吾方疑神坐忘與造物者逰凢徃来者皆一時名公如李敬齋趙虎岩翰林王慎獨左轄姚雪齋鹿庵王承旨少傅竇公冀國王公爱其風度才識締方外交太史公曰視友知人亶其然乎元貞元祀正月五日師晨興召門弟子齊道亨劉道安付以後事怡然而逝閱丗四百五十六甲子寕神扵五蕐山僊􅉷道亨純直有持守祗承遺緒朝夕惴惴増飾固执惟恐失墜掌教玄逸真人與其進署宗門提􅀧加冲玄師号一日介劉道録文甫請述觀記予僚契雷若齋與師昔同郷校夤縁有一日之雅且重劉請勉為件右切有所感焉乃為之說曰二氣氤氲五行儲精長材秀民無卋無之弟學以致其道行以效其用功成名遂者幾何人斯當金季俶􅅰綱常文物蕩無孑遺其時設教者獨全真家士之慕髙逺欲脫卋網者捨是將安徃乎甞䆒其說不過絶利欲而篤勞苦推有餘而貴不争要㱕清净無為而巳如重玄子扶翊道紀綜覈玄務公材吏用藹然見扵脫頴㳺刃之外其妙固翩翩而獨征托遺響扵髙風者矣然推本原自信其良知良􅀎耿耿有不可掩焉者不謂之長材秀民可乎向使率性以明當然之理務學以廣通変之方列周行握事樞以投功名之㑹樹立巉絶恐不如是而止也撫卷懐人爲一慨惜師諱志應字順甫出平陽汾西䆠族自稱重玄子法号淵静通虚大師廣陽之真常麗澤之靈郁皆别舘也仍爲門人作望思歸来之篇其辭曰瓊芝峨冠􅀆青霞襞裳逺引髙蹈􅀆與道翶翔至人出卋􅀆化現無方驂駕䳽馭􅀆力振玄綱仙逰有恨􅀆門人涕滂蓬莱東望􅀆雲海茫茫松桂輪囷􅀆欎􅊊其芳偃息有室􅀆燕䖏有堂仙標彷佛􅀆誨音琅琅師今不見􅀆莫知我傷宗風通暢􅀆羽流有光神逰故山􅀆隂儲吉祥倒景遺照􅀆􅁟苴是􅀭庶幾蕐表􅀆歸来之章故翰林學士紫山胡公祠堂記紫山胡公􅂢舘之三載彰徳􅁥尹脫里不花暨廉訪使完閭與郡土民詢謀僉同乃像公扵治城西郭别墅之讀易堂于以掲䖍妥靈致􅀊時香火之奠諗不肖交􅅃知平生詳請書其事扵石酌量契義不敢以衰耄辝夫士有生無聞于時潜徳幽光發越于後盖行義立言曠卋而相感也亦有冨貴薰天振耀逺迩卒然傾謝磨㓕無紀豈徳薄用鮮無可稱述而然邪若夫其生也爲人􅀁敬慕其沒也致人􅀁懐思至衡於志慮見扵羮墻非人品峻絶事業顕著盛徳至善感格人心悦而誠服有不可忘者安能如是㢤紫山固名士才大夫佐理扵朝讜言直論不屈􅁠貴作牧名藩吏畏民爱治行為諸郡最擢任風憲擊奸發伏褰衣具瞻有風動百城之目其臺閣之清規幕府之公論固在也曰并汾曰齊魯遺爱善政亦不忘也而扵郷郡未甞臨涖仐像而事之余􅀄甚疑既而淂其說焉金季喪乱士失􅀁業先輩諸公絶無僅有後生晚學既無進望又不知適従􅂉泥古溺偏不善変化􅂉曲學小材􅀄非適用故舉世皆曰儒者埶一而不通迂闊而寡要扵是士風大沮惟公􅁸諸生秉雄剛之後徳􅀒超卓之竒才慨然特逹力振頽風志大學致實用􅀏談議論揮后流俗文章􅂔莭振蕩一時其見諸容度事業者皆仁義道徳之餘剛明正大終始一莭追配昔賢矯革時弊故天下翕然想聞風彩皆曰􅂵山學備四科望髙一卋真豪傑之士争先覩為快况二侯與郡士民執經傳道質疑請益􅀗親炙而為矜式者㢤没而配社尸而祝之援例祀典其誰曰不然若以匹夫而作百卋師一言而為天下法論之振衰激懦屹砥柱之孤標回狂瀾扵既倒清風之􅀁激徳澤之􅀁及霑丐後學多矣是則係斯文之盛衰與士風之輕重非相人所淂顓而私也雖然二侯出貴族世胄樂道而自忘其势尊賢而䏻知􅀁宗昔鄒孟氏譏列􅀦諸侯不䏻尊賢廼曰貴貴尊賢其義一也垂訓􅀷矣後卋之監牧實古諸侯今二侯􅂑法聖賢扵千載之後行古昔􅀁不䏻行其賢扵人也逺矣豈止如是而巳後之讀斯文者将有􅀁興感而􅂑法焉公諱祗遹字紹開自號􅂵山磁之武安人由中書􅀰官厯河東山東按察使濟寕揔管仕至翰林學士太中大夫大徳五年􅀊次辛丑清明前一日記胙城縣廟學記􅀦之􅀅興必有世徳之臣儷景風雲戡定屯難賛敷文徳共致太平故孔子曰如有王者作必世而後仁鄒孟氏亦云􅀁謂故國者有世臣之謂也信㢤言乎惟昨邑金末城冝村渡行河平軍事以扞禦兵衝既而􅀦朝帥臣撒吉思不花監緫五路兵蹙蹂餘燼友而拔焉駐軍守據迫金主東走睢陽斫營夜閧竟殁死城下先是公父㮶只秃魯花以萬夫長􅀅􅃟鋒圍困大名中流矢而卒迨金亡朝廷追録載世忠藎賜夫人楊氏世封户扵胙孫不闌奚實嗣其後雖州遷而縣其故家遺風餘俗固在也當金末危急草創際爼豆之事有不遑及􅀦朝甲午􅀊􅈇使宗亨肇建禮殿三巨筵壮麗翬飛爲諸路冠後三十五載尹劉庭撤而新之復起明新堂扵後其䑓門賢廡尚闕學舎生徒􅀄不論也迨元貞改号冬嗣侯普䦨奚擢任本道廉訪使路出于胙首謁廟宫覩其如是曰欽惟詔條責實在我乃敦諭尹張孔鑄以興修爲任尹承􅒛經营有方􅃐辨惟謹首建神閍擇師立學縣中子弟来受業者日衆侯乃出􅀁藏經史數千􅃃資藉講誦尹復闢良田五頃造􅀕器百餘事供給二丁釋菜諸生􅅒料之費兩廡方締搆而及􅀲代後尹李君卒成其役仍繪七十子諸大儒肖像千壁胙之廟學五十年間狼藉蕭條始克完具人知敬仰俗㒷禮譲仰副朝廷崇尚之意皆由賢侯一言勉勵之誠􅀁謂王者必卋而後仁卋徳之臣戡㝎屯難賛成太平者扵斯可見矣侯今由内䑓侍御史進拜行䑓中執法􅀅南過郷國請書其事扵石乃為說以告之曰惟孔子之教推眀至理敦叙彛倫裁成輔相之道脩齊治平之方本末具􅇱細大不􅂢垂憲立極萬古不易孔子明其道而無其位空言無所施後卋帝王必需崇尚卿相守令􅀁當奉行雖無禍福之怵誘而􅀙建之間有真禍福存焉固匪利害之牽率淂失之際有實利害係焉惟其費不可闕乃修而明之審夫切而不可緩故勉而勵焉惟侯出貴種世胄敦說詩書好尚禮義内剛眀而外文雅審事宜而逹従政立身􅀭名已収功扵踐履今復以淂施之郷邑可謂善推其􅀁為矣然君子不安扵小知而期扵大受况天下之事惟宰相䑓諌淂言得行擴而充之正在今日昔武元衡修治􅆹壁栁子作記孔道輔以直道進用宋史有傳侯姑欲我記胙邑廟學而已耶易曰苟非其人道不虚行又禮云人存政舉誠䏻繩武賛文光昭先業克盡卋臣之義由一邑以逹之天下則道􅀍均弘俾秉事樞矣㒒雖耄􅀅执筆以俟焉大徳庚子􅀊仲冬既望謹記冝逺樓記奉聖甄君㞐敬粤自父祖堇身莭用保守恒業以篤實称郷里㞐敬尚文雅喜交㳺􅁭韵洒落義氣􅀁在略無凝滯始来居燕都城善心計而擁髙資者甚夥門廬服玩例尚脩㓗居敬一旦以僑寓簉迹其間不肯碌碌出人後扵􅀁棲息起構小楼􅂠而不侈髙而不危雖䖏市㕓闤闠之間頓出車馬􅄂喧之境于以合集朋簮暢適幽懐請名扵予乃􅂑六一居士天寒山色之句扁之曰冝遠詢義何居復語之曰樓之為用便爽塏而向髙明必占據形􅀔之雄坐淂溪山之勝予甞登斯樓慿欄四顧金城千雉青山三面環遶拱侍嵐光翠色令人顧揖不暇朝暮隂晴変態百出􅂉横脩眉扵天宇或出寸碧扵雲間雖呈妍貢竒扵百里之外不煩躐吾之􅄚拄彼之笏䨇目以之増明詩脾為之借潤矣其扵幽逺不亦冝乎此特形扵外者如是其係扵内者又有大扵是焉者甄氏先世既以篤實稱其積累之厚藴蓄之深逮㞐敬而後彂之今既崇基搆而勤丹艧矣復䏻傳訓子孫俾為學止善奉承罔替則締搆鞏固傳示永逺亦以冝矣傳稱衛公子荊善㞐室始有曰苟合矣冨有曰苟美矣又君子創立基業必垂緒扵後其是之謂欤居敬跽而謝曰有是㢤問一知二皆僕􅀁未聞也請書其詞庸爲警戒又何俟燕雀之賀成請善禱扵張老也大徳辛丑􅀊十一月廿一曰秋澗老人記移忠堂記王全州之子亢宗敏愿通粹有麟趾雅厚今爲魏府别駕一日拱而言曰維先祖驃􅀐府君􅁸壠畒際風雲􅁬従戎列収河朔扵百􅀾之餘以至出建大斾入貳行䑓槖兠棨㦸㧾制魏師者四十餘年維是一二堂廬皆乎昔􅀁晏息諸孫無􅀁肖佀承藉徳䕃乃今有光永言追思扵維則者未也幸憲使恵顧念其貽孫之謀燕翼之厚爲題扁以示耒者俾子孫衘訓嗣服蔚爲矜式敢再拜以請余仰而嘆俯而思曰有是哉何其孝之純也夫人之行莫大扵孝孝莫大扵顕親顕親莫大扵立身􅀭名立身􅀭名莫重忠述事盖一致二極臣子之忠孝也傳不云乎教之孝􅀁以求其忠也嗚呼忠之爲用至矣故居家則盡心扵親進官則竭力扵上與友交而言信爲人謀而盡誠蒞政則有恪􅀾陳則有勇其見諸日用間者􅀎是一本夫爱之深孝之極也舎是􅀅何􅀁􅂑則焉吾已見汝乃祖府君持心二極屬搶攘之際舊勇略爲先迨分㝎之後獵忠義爲本其殊勲茂績紀太常而勒景鍾者可謂立身􅀭名之道昭矣汝父嘉議君復能篤継忠貞勤劳王事其振肅䑓憲拊循殊方冠冕扵天朝也行有日矣豈非由孝而志自忠而有立耶􅀅有煒前光濟厥出羙者責不在吾子乎故題之曰移忠盖􅂑孝扵親則可以移其忠於君之義也若夫親安而氣愉家理而官治友信而謀成吾子行焉綽有餘􅁉尤當勉其􅀁已行而進其􅀁未至俾親顕而名益楊身立而道愈彰􅟵為百卋無窮之傳可也異時有登斯堂讀斯文慕樂昌之風而興起者将見為是堂一致二極之本又何啻王氏之􅀋也㢤扵是乎書逰東山記至元辛巳􅀊春三月余按部黎陽膏澍連朝明日夏孟丙寅朔天宇開霽大伾堆阜景風明澹􅀞如也拉友人宋祺洎諸属吏嚢筆載酒耒㳺兹山遂自西南􅀐而陟阻抵岳祠下既祝香歩上中層至􅄥鴻亭址讀刺史􅁁元勲亭記文甚竒麗稍北至中頂頂􅀔夷衍即李魏公中帳盖伾之絶巔也山形再成崚層石壇爾東北行不百歩隂崖﨑嶇扶腋而下憇龍竇巔上少焉降􅀚西陽明洞記開元間山人李真題名筆􅀔飄逸有焦山鶴銘風格其西龍崖方廣天然而龕上竅極大盤旋若螺殻然邃頂而去窈不知其幾何也意者山澤通氣此正大伾口鼻唅呀吐納之所非有異也宣龢以侯爵錫之不幾扵妄濫乎盤礴乆之下山適靈昌諸君􅁇至㝷前盟也相與稽首彌勒尊像其䥴鑿本末以寺石麟考之爲高齊所造無疑左右磨崖題識甚多得魯元翰張浮休賦詠各一周覽既巳與客聮鑣東行踰大河故瀆入牽城登􅂵金山觀僊人拖裙石石水蒼色苔昬两溜雯華漬裂誠若積状者其面有元豊政和題記黥刻㡬滿皆竒筆也遂探白金泉瞰玉女洞口傍勒建安人徐閎中泉眼銘雨蘚糢糊略辨首尾扵是躋巔㑹勝主人􅂑軟脚例開樽連酌觴詠􅂊交幽懐共暢不知山蹊之迂登頓之劳也既而寒日下悲風来遥北􅅢穿蒼城按觀隋唐􅅒制未刻入自北門讌群賔扵清白堂酒數行張鄭諸君舉觴嘱予曰今日之逰樂且有融盍簮而耒似非偶然第遷変已來三山濯濯等爲丘垤其能極宣城之賞當子長之㳺乎然山以賢稱境縁人勝如赤壁断岸也蘇子再賦而秀發江山峴首瘴嶺也羊公一登而名垂宇宙况兹山也名載夏書功存禹迩関河大地形勝依然斯行也垂槖偕來稛載而去幸吾子筆之歸為两郡光且紀蒼烟寂寞之㑹仍得簉名其間為他年林下故事非偶然者不爾甘逋客逥俗駕幾何不為疊嶂攅譏山靈見謝也耶唐建昌􅁜石麟記唐昭􅂟􅁜在新隆平縣南十有三里使相郷正尹里其石儀一十八事儼然具在内二石麟身首蹄鬣一與馬同第題顛有觡突出肉葳㽔其端所謂示其武而不用者也兩膊雲􅃩光拂􆈄鬛尾上掲􅀋牛而短雖雨蘚模糊雯華剥裂而制度精絶可爱傳曰麟四靈之瑞麕身牛尾一角五彩色備王者至仁則􅀍應而出又云視明禮修則至今刻像列諸􅁜闕豈顕夫祖宗生有至德殁備盛飾以表其仁厚故耶既而入東南招提讀開元十三年縣尉楊晋所􅁧碑頌盖知為唐皇祖宣簡公懿王陵墓也儀鳯元年髙宗追謚尊號宣簡曰宣皇帝􅁜曰建昌懿王曰光皇帝􅁜曰延光仍配守衞者三千人􅃙􅁚成令專知檢校州刺史􅀊别一巡其石儀之制固當追尊崇建􅀊作也寺即揔章間立額曰光業由是而觀其夤奉之嚴守衛之盛累聖明禋之禮郊歌時薦之儀固云極矣今􅁜圍夷㓕無復􅀁見有荒烟野田而已嗚呼盛極則随衰藏侈則厚彂此必然理也止卋葬之中野不封不樹何模金暴骼之有文質中判古不能復然則何為而可漢之㶚􅁜其中制乎至元十九年壬午􅀊夏六月十九日秋澗王惲記況海小録日本盖倭之别種􅁖其名不雅乃改今號其國在洋海之東􅀁属州六十有八居近日出故曰曰本國王一姓宋雍熈􅀄巳傳六十四卋中多女主今所立某氏云大元至元九年上遣秘監趙良弼通好而􅀦次對馬島拒而不納十七年巳夘冬十一月我師東伐明年夏四月次合浦縣西岸入海東行約二百里過拒濟島又千三百里至􅄍刺忽苫倭俗呼島為苫又二千七里抵對馬島又六百里踰一岐島又四百里入容甫口又二百七十里至三神山其山峻削群峰環繞海心望之欎然為碧芙蓉也上無雜木惟梅竹靈藥松檜桫羅等樹其俗多徐姓者自云皆君房之後君房徐福字海中諸嶼此㝡秀麗方廣十洲記􅀁謂海東北岸扶桑蓬丘瀛洲周方千里者也又說洋中之物莫鉅於魚其背鬛矗然山立弥亘不盡􅀁􅀴海波兩坼不合者數日又東行二百里艤志賀島下與日本兵遇彼大􅀔結陣不動旋出千人逆􅀾數十合者凢兩月我師既捷轉􅀾而前呼聲勇氣海山震盪􅀁殺獲十餘萬人擒太宰藤原少卿弟宗資盖前宋時朝獻僧奝然後也兵仗有弓刀甲而無戈矛􅀐兵結束殊精甲徃徃以黄金為之絡珠琲者甚衆刀製長極犀銳洞物而過但弓以木為之矢雖長不􅀎逺人則勇敢視死不畏自志賀東岸前去太宰府三百里捷則一舎而近自此皆陸地無事舟楫若大兵長驅􅁕成破竹之舉惜㢤志賀西岸不百里有島曰毗蘭俗呼為髑髏即我大軍連泊遇風䖏也大小船艦多為波浪揃觸而碎唯勾麗船堅得全遂班師西還是年八月五日也徃返凢十月省大帥欣都副察􅁅次李都帥牢山次宋降􅀅范殿帥文虎揔二十三南一十三隋唐以来出師之盛未之見也秋澗先生大全文集卷苐四十
