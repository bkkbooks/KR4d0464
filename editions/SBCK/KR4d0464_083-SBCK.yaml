body:
  text: 烏臺筆􅀘序至元改元之五年秋七月憲臺筆建于以用昭太微執法之象詔前平章政事塔察公爲御史大夫曰中丞曰殿中侍御史以帖赤木八刺撥􅁅貳焉曰侍御史曰治書曰􅁥察御史純用漢人一切事冝率循舊典其裏行十有二人令各舉所知以充貟數侍御史太原髙公乃以相人梁貞前翰林修譔左司都事惲俾􅈾遴選方朝廷嚮治思有以重之其􅁥察到臺特詔庭見以肅其氣優禄稍以厲其嚴朱衣哀板雖以七品就列秩望清峻天下事無非所當言者其出使四方佩金符分属􅁺馳馹傳中外具瞻凛然聳綉衣直指之望至有恨其崇資不得與之同事者内則􅃅下臺通論駁設六察畫坊廂縱游􅊫小大事月限以數於是騰章抗􅃺紛畨迭作霜逐簡花風聲動臺閣矣僕偎厠裏行頗收薄用比受更凢三十有二月尸素旣乆具藁紛然併以外臺所言一二凡得臺綱書記事狀時務等篇揔一百五十餘章􅁵爲五卷題之曰烏臺筆􅀘客有覧而誚予者曰昔人諌草徃徃削而去之子今是舉不幾於自用昭晣以章時事之非乎子曰客何見之晚也裏行言責也人與言雖卑而微其見於此者皆本臺巳行底至而不遺者也故書之䇿正欲表夫朝廷寛忌諱重臺諌顧惟蕘言曽不少棄見乎微其至可知已至於政貴有恒辭尚體要予雖不敏中或有一得焉是又不可因巳陳而廢之也客唯而退於是乎書以爲序烏臺筆補監察御史王惲今呈謹集録到御史臺典故條例上自秦漢迄於宋金凢七十三事逐一開列于左有可行於今者伏乞釣覧采擇湏至呈者一古今名號更易御史大夫秦大司空漢大司憲唐御史府漢憲臺後漢蘭臺魏晋中齊左右肅政臺唐左右御史臺唐一貟數品從唐制大夫正三品百官志一貟六典二貟中丞二貟百官志正四品六典正五侍御史百官志六貟從六六典四貟正六殿中侍御史從七百官志九貟六典六貟􅁥察御史正六百官志十五貟六典十貟録事二貟從九金制大夫一貟從二中丞一貟從三侍御史二貟從五治書侍御史二貟從六殿中侍御史二貟正七􅁥察御史十二貟正七典事二貟從七檢法四貟從八一三院人數唐制臺院令史七十八人書令史二十五人亭長六人掌固十二人殿院令史八人書令史十八人察院計史三十四人令史十人掌固十二人金制獄丞一貟架閣庫管勾一貟令史一十人分掌名頭上臺機宻房掌察到應干公事下臺機宻房掌同上臺謂􅁥察紏到公事申臺吏户禮兵刑工房斟酌繁簡分掌刷案一三院例一曰臺院其僚曰侍御史呼端公知雜事謂之雜端非知雜者號散端二曰殿院其僚曰殿中侍御史呼侍御新入者知右巡以次左巡號兩巡使三曰察院其僚曰􅁥察御史亦呼侍御毎公堂㑹食雜端在南榻主簿在北榻皆絶􅀏言一臺門例舊日御史臺在宫闕西南其門北開取隂殺之義一置獄例舊臺中無獄有湏留問􅀉禁大理若尋常之獄推訖断於大理唐李乾祐爲大夫請於臺置獄雖按問爲便而増鞠獄之弊至開元間御史大夫崔隠甫奏罷之湏留問者􅀉禁大理一班簿例治平元年閏五月詔御史臺閣門十日一具細書班簿以進自今大書爲冊月上之一兩臺發使例舊例兩臺􅀊發使八人春曰風俗秋曰廉察以四十八條察州縣一受事例舊例􅃗日臺院受事􅀟日殿院受事一職官如置御史大夫秦官位上卿銀印青綬掌副貳丞相其􅁥察御史掌􅁥郡一弹奏進止例舊例弹奏皇帝視事日御史奏之景龍後皆先進狀聽進止許則奏之不許則止一同詰􅁈獄例凢爲三司同詰三司爲御史大夫中書門下省大事奏裁小事專達一衣冠例秦御史冠柱後惠文蓋用鐵爲柱取其審固不撓唐大夫中丞遇大事押奏冠法冠謂牙冠也衣朱衣纁裳白紗中單以弹之小事常服而已一大禮例國有大禮則乗賂車爲之前導一審覆例若有制使覆案囚徒則刑部參擇之一三司理事例則與給事中中書舎人更直於朝堂受表一中丞與皇太子三公相遇例元魏朝故事中丞出與皇太子分路三公皆遥駐車去頓軛於地以待其過其或遲違則前驅以赤棒棒之一六職例一曰奏弹二曰三司三曰西推四曰東推東西朝堂五曰􅂍贖六曰理匭一侍御史五曹例漢皆用公府􅁺属髙第者爲之一曰令曹掌律令二曰印曹掌刻印三曰供曹掌齋祠之事四曰尉曹掌厩馬之事五曰乗曹掌護駕之事一新除有罰例舊例新除者未曉制度有罰至罰有逾萬錢者􅀂議罰則詢於雜端一侍御等裏行例唐龍朔元年置侍御裏行殿中裏行􅁥察裏行武后文明後顓以裏行名官長安二年復置内供奉官一供奉例舊例掌殿庭供奉之儀式毎朝與侍御史隨仗入位在中丞下給事中中書舎人後一持書故事持書侍御史者本漢宣帝元鳯中因路温舒上書冝尚緩刑帝深采覧之季秋清讞時帝幸宣室齋居而决事令侍御史二人持書故曰持書侍御史一四推莅太倉左藏出納例舊例以殿中侍御史第一人同知東推莅太倉出納第二人同知西推莅左藏出納號四推御史一大朝㑹例凢冬至元正大朝㑹則具服升殿􅀂皇帝郊祀廵省則服從旌門徃來檢察視其文物之有虧闕則紏之一銜署例凢弹劾之事御史言於大夫􅀂遇大事則方幅奏弹小事則署名而巳一􅁥察不得供奉例舊例􅁥察正門無籍非因奏事不得入至殿庭開元間勑並令隨仗而入不得供奉一􅁥察例凢冬至祀圎丘夏至祀方丘孟春祈糓季夏祀明堂季冬祀神州五郊迎氣及享太廟則二人共􅁥之朝日夕月及􅀕社稷孔宣父齊太公蜡百神則一人率其官属閲其牲牢省其噐服辨其輕重有不修不敬則劾之一㑹議例尚書省􅁥司七品巳上官㑹議先牒報臺亦一人徃􅁥􅀂據狀有違及不委議意而署名者紏弹凢有勑令一御史徃􅁥即􅁥察受命而行亦􅁥其過謬一􅁥齋例凢京都忌齋日則與殿中侍御史分察寺􅀚七品已上清官皆顧行香不到則牒送法司一􅁥决囚徒例凢决囚徒則與中書舎人金吾將􅁥之一在京􅁥察例分知左右廵各察其所廵之内有不法之事謂左降流移停匿不去及妖訛􅀫宵蒲愽盗切獄訟􅁈濫諸州綱典貿易隠盗賦歛不如法式諸此之􅀋咸舉按而奏之􅀂不能紏察及故縱蔽匿者則量其輕重而坐所由御史一􅁥察御史雜例分察百僚廵按郡縣紏視刑獄肅政朝儀朝廷有不肅欽者御史則紏而劾之每二人五日分知東西朝堂一邊功例凢將帥􅀾伐大克殺􅀗數其俘馘審其功賞辨其真偽一門直例凢自􅁥察御史已上毎日一人於本司當門直以檢察臺中出入及令史領詞訟過大夫之事􅀂縁詞訟事須推勘者大夫便委門直御史以推之一風聞例舊日御史臺不受訴訟有通詞狀者即於臺門候御史御史徑徃門外収采知可弹者畧其姓名皆云風聞訪知一相遇例凢御史以下遇長官於路去戴下馬長官歛轡止之一􅁥圍例舊例蒐狩則􅁥圍察㫁絶失禽者一􅁥選例舊例吏部將除定貟數及擬到州縣付之􅁥察於吏部别置􅁥察一幕御史閲數臨視而已若中間或有資歴先後品從髙下及不應等事許授除官陳告御史即推䆒根因與之改正一進帖例􅁥察舊例所進帖子止是今呈子様但内爲腰封其囊上用黄􅁓作帖黄上書奏帖二字下書臣某謹封一照刷例舊例照刷所司先具事目到臺其文卷後粘連刷尾具公事本末赴臺照刷􅁥察御史於正位坐閲朱銷簿臺令史一人在傍亦坐執掌具到事目其當該人貟引卷通讀若係筭數文卷更設帳科司吏一名與臺令史一同刷磨其中但有違錯稽遲􅁥察將文卷収訖申臺量情治罪餘無違錯者即令大程官於刷尾􅀐􅒌近下先用刷訖銅墨印然後蓋以􅁥察御史朱印及於朱銷簿上結尾後亦用刷訖銅墨印一督軍御史晋職官志光武建武􅀄征伐四方始權置督軍御史事竟罷東晋孝武太元六年復置隋􅌆帝時􅁥軍御史一符莭御史前漢百官表其治書符璽者印綬比二百石以上皆銅印黄綬漢官儀尚璽四人􅁺史趙堯爲符璽御史尚璽者也晋職官志符節御史秦符璽令之職也漢囙之位次御史中丞掌綬節銅虎符竹使符及泰始中武帝省併蘭臺置符莭御史掌其事焉一防禁御史晋職官志按魏晋官品令又有防禁御史第七品蘭臺之職也一漢六條漢官儀云部刺史周行郡國省察治狀黜陟能否断治􅁈獄以六條問事非條所問即不省其一條曰強宗豪右田宅踰制以強陵弱以衆􅁀寡其二條曰二千石不奉詔書遵承典制背公向􅀻旁詔中利侵漁百姓聚歛爲奸其三條曰二千石不䘏疑獄風厲殺人怒則任刑喜則滛賞煩摇刻􅁀刺截􅀺元爲百姓所病山崩石裂訞詳訛言其四條曰二千石選署不平苟阿所愛蔽賢寵頑其五條曰二千石子弟恃怙榮􅀔請託所􅁥其六條曰二千石違公下比阿附豪強通行貨賂割損政令一廵案官選判官支使例舊例十道廵案則選判官二人爲之佐如本道務繁得量差官人歴清幹者號爲支使一廵案出入例漢􅁥者每三歳一更常十一月奏事三月還􅁥焉唐廵案使率三月巳後出都十一月終入奏事宰相李嶠請率州置御史一人以週年爲限一廵案州縣例諸􅁥司每歳分上下半年廵案州縣具平反􅁈訟案訪利害及薦舉循吏案劾奸􅂍以聞一案察所部有犯諸案察官知所部官有犯􅀂事理重者躬親廉察部民訴訟縣令同餘事聽先委不干礙清強官體䆒有無實跡結罪保明申所委官司於案章内明坐所差官體䆒到事因並不得出榜召人首告即犯􅂍􅀻罪雖巳離任􅀍告論或因事彰露者聽案治一具發摘過􅂍吏例諸案察官毎歳終具發摘過􅂍吏姓名置籍申尚書省一廵案許見賓客例諸􅁥司巡案許接見賓客惟不親謁一直指使漢直指使持斧衣繡衣一知班受百官及命婦入宫帖子例舊例百官入朝知班一人於宮門受百官及命婦入宫帖子其止書某官某職某爵上用職印令執事人授知班蓋使知其百官是日有疾病有故者其所告狀爲之曹狀一知班紏弹例殿中侍御史下設知班十人如百官朝㑹知班四人於四方臨視如有失儀堕簡者知班向其人前問何姓氏然後具狀紏弹一主簿例隋大業三年始置隋二貟唐省一貟掌印授事發辰勾檢稽失及􅃹轄臺中雜務公􅇬厨庫檢督令史奴婢配勲散官職事毎食則執黄卷書其譴罰右呈誥晁逈爲工部尚書集賢院學士判西京留司御史臺他官止云權而逈云判者以三品故也理檢使宋朝淳化三年置院在宣德門外西北廊皷院之西令登聞皷司進狀人有稱􅁈濫沉屈者即引送理檢院審問登聞皷院宋朝皷在宣德門南街之西廊院在外門西之北廊舊曰皷司景德四年五月改今名凢文武臣僚閤門無例通進文字者諸色人進狀並先經登聞皷院除告軍機宻事及論訴在京臣僚即依例實封如進入後審狀有異同虚妄及夾帶他事並科違制之罪所論事理重依格勑施行仍令進狀人别冩劄子節畧要切事件連粘於所進其餘所進文字並先拆開㸔詳定奪或有元本文字照證速牒合属司分取索􅀂事合施行及所進利濟有可觀採便通進􅀂􅂋有違礙不可施行即當日内告示本人知委不識文字者許陳白帋據所論事件判院官當面抄劄詣實口詞仍當日據収接到所進文狀都數逐件開坐行與不行因依具单狀聞奏􅀂進狀并遇白帋人稱皷院看詳不盡情理即許經登聞檢院進狀披訴仰檢院詳酌事理􅀂皷院所定不行爲當即據不行爲當縁由判押審狀與進狀人収執如皷院所定不當即具不當事件并元進狀繳連進呈其収接所進文狀亦於當日内具都數開坐行與不行因依单狀聞奏其披訴人即時判審狀給付即許於御史臺陳訴其登聞皷院檢院委實行遣不當者方得接駕及繳所判審狀披訴當付所司勘鞠如披訴得實判皷檢院官必行朝典如是虚妄本人科上書詐不實之罪未經皷院進狀檢院不得収接未經檢院不得接駕進狀違者依法料罪判院官二人舊以内臣勾當至道三年改用朝臣監皷内侍二人令史一人登聞檢院唐置匭宋朝太平興國九年改匭爲撿東延恩白崇仁南招諌曰思諌西申􅁈曰申明北通玄曰招賢改匭院爲登聞院院在宣德門東廊之北景德四年五月改爲登聞檢院是月勑如急速文字畫時進入常程文字一例毎五日一次於檢院内通進天聖七年上因讀唐史見匭凾逹下民􅁈枉之事乃謂左右曰天下九州之大豈無􅁈枉之人􅀂至京師檢院皷院理雪者必是州縣官吏提􅀧刑獄轉運使不能理雪又􅀂不爲申理則赤子無告矣乃置匭凾仍專命御史中丞爲理檢使應諸色人除竒巧法術邪妄干正道事不得上言及常程公事自依乆來體式令逐處官司并皷院収接外如有指陳軍國大事朝政得失大改􅁈枉累經訴理未􅀗辨明或事干機宻並許詣匭凾投進内委是急速文字畫時進入其餘並每五日於檢内進納如無亦具单狀聞奏如檢院進狀人稱􅁈濫沉屈者畫時引送理檢使審問判院官一人舊止舎人兼掌淳化二年始命他官判之都護府都護一人掌所統諸䉒慰撫征計斥堠安輯蕃人及諸賞罰叙録勲功揔判府事副都護二人長史司馬各一人兵曹各一人餘並不置射聲校尉漢掌待詔射聲士工射者冥冥中聞聲射則中之因以名也湏待所命而射故曰待詔射聲戊已校尉漢元帝􅀄元元年置甲乙丙丁庚辛壬癸皆有正位唯戊巳􅀉治耳此所置校尉亦無常居故取戊巳爲名一説戊巳居中鎮覆四方漢所置校尉亦處城之中撫諸國也散􅀐常侍􅀐馬並乘與車􅀐而散從無職事也舊日􅁥察所行一差􅁥察例本臺且以三人爲率本臺備具本官脚色伴奏自進呈御筆􅀧差假如首先一人是臺家法意者御筆或􅀧却次者第三者一無故入御史臺杖六十撾皷者先杖八十一臺諌撿院皷院臺旣立餘皆合行皷院在掖門東檢院在掖門之西一舊來􅁥察照刷止是徹卷看讀但有稽遲即有杖罪如違錯等事更不消説􅁥繫取招訖送法断定然後决罰據勾當限次如瘡未愈勾當瘡巳愈不出又是罪及照閲朱銷簿一金國省院臺爲三省一舊有六臺六院一上下臺大夫中丞爲上臺侍御史以下爲下臺一治書侍御史乃是臺奏事官爲制一臺事也一報午時省即起然後臺起六部視臺起然後部起一按察兼運使其意已爲按察中間一切欺隠不公事則不敢犯早辰先與書史判按察司事次乃與同知副使判運司事一舊日􅁥察如某吏行止不修及􅂍濫者􅁥察於本人門或帖子或粉壁書云某人行止如此身事便索廢却一臺有三臺上臺下臺外臺一舊日􅁥察出使帶牌起驛馬一􅁥察有急事至撒合門納帖子無問早晚自宫中傳入奉御傳於門娘門娘轉於承御承御聞奏上如熟寢承御直夜者不敢聲言擊所懸之玉爲之襲聲旣寤進讀某人奏到帖子如此等事􅀂上即裁决令承御批送省部臺上用小方玉印印之所司得旨登時勾當趂明日朝奏對一舊日􅁥察外路有体䆒公事差部官一貟并部令史事得其實官人申臺吏人杖一百巳下皆决之􅀂有大改公事臺司覆察得實関所該部分差部官與􅁥察一同致勘如所察不實􅁥察所得罪止是罰俸贖銅一舊日三品巳上官有罪􅁥察体䆒得申臺呈省聞奏􅀂宣勘本官不問虚實即便承伏如中間實有􅁈枉令家属告
