body:
  text: 憲司箴粛肅憲司虞夏九牧其在漢唐刺史都督控臨百城靡不約束既重其權匪䡖􅀁責治弘務簡望􅂭威赫有臺閣清嚴無州郡急迫繡衣四出輶軒金莭命服有彰非爾徒設奉宣詔條巡省按决官之邪正政之得失酌汝之言以明黜陟俗之媺惡民之休慼恃汝注措以安以息國有重典越惟刑辟圜􅁟幽囚肺石􅁈抑仰汝審察哀矜致恤毫髮􅂉差追悔何及剛不可憚憚則氣怫弱不可欺欺則衆忽事無避難避之愈集法毋情破破之有窒何以䖏之必正必式一有私萌力爲之克如松斯貞如鷙斯擊其嚴秋霜其平砥石是乃􅀖之司直我玉無瑕彼疵可録志行氣伸吏畏民服一道清寕乃稱􅀁属其或暗夫大體苛細是燭較利害之孰夛至首尾之畏蹜甘扵慵身計日而禄官謗逭顔厚有忸爰作斯箴敢告司僕言箴語戒過繁先期我動躁䡖易違理取勝過慮思邪言之不有害扵用審察安詳時然後應一出扵正其或不然自䧟於穽念之之忍箴忍之為字以刄加心少或弗􅀮其傷必􅀷家府維挺挺而全謂予平生半在官聮萬变前陳􅂂薄臨淵少觸與競其心即燃自救弗暇理何有焉量汝之性以忍為先惟忍則濟欽哉聖言銘楷杖銘并引孔林之木􅅛異者為多魯人世不知其名者盖夫子没弟子各持其方之水耒樹焉在枌檀毚柞中名殊顕者獨文楷耳前朝斵之板持以􅇱新進之儀豈思其人重其文敬其手植之意也欤􅂵陽公携二杖過衛一以贈予因識其楷之􅀁以為楷也如是吁昔而簡今而杖用雖不同至於重其文敬其手植之意一也銘曰體堅而㣲色正則瑩庚庚其文挺挺其性本根傳万世之芳枝葉䕃百王之聖斵而杖之以扶吾道之衰􅀆庻由乎義路之正且予年之方盛是不可施於其郷􅀆復􅀅弊蛇妖於異日于以叩原壤之脛惟桑與梓必恭且敬矧吾家之草木敢不同甘棠而加愛􅀆故賡之以舞雩之詠㯽榔杖銘體堅而柔莭促而澤赤藤桃竹非􅀁狎􅀆青蛇奮蟄腹紋鱗鱗入手滑􅀆質挺炎徳出入有聲豈特鏗瓜甲􅀆堂堂許公國喉舌􅀆杖而登朝表孤節􅀆是􅀅代太尉之笏擊奸慝扵未孽也芝枕銘并引予觀神農氏之經芝之種有五焉紅者如􅃢瑚青者如翠羽黄者如紫金白者如截肪黒者如澤漆光明洞徹如氷之堅五岳之山産焉後之以芝名若是豈柳柳州􅀁謂天澤餘潤虽枯枿敗腐猶能出芝􅌲以為瑞物是枕之芝或間産名山􅂉蒸出枯枿予不淂而知也但不斤不斵底平面傾犀文外繞疊成枕形誠可以薦牀第而承幽人之憇息也銘曰體似重而䡖性似柔而剛豈顛木之餘枿薦幽人之野牀質似芝而秀文似犀而光果齋房之瑞氣化竒形而不忘但髣髴􅀆一枕之妙至於為芝為􅌲吾不知其物化之常秀比連葉清凝寝香枕􅂉強名用適則良俾欹之藉之勿邪其􅀁思􅀆是可以夢周公而接羲皇也砥柱銘水之為力無物不􅀙津門之險壮夫砥之為雄洪濤西来萬夫前攻而戰而薄我當其衝狂瀾􅀔倒安流而東屹嵩􅂠之􅂭崇也吾儕小人弱值淺中衰俗外群邪外訌苟内省而不疚有碇心而直吾躬也金銀沙二泉銘山之清潤澤氣以通􅀆坤之靈秀醴泉以發􅀆太行蟠亘元陽􅀁軋􅀆天門左界二泉並渣􅀆巨鰲背鑿宝藏泄􅀆靈淵奫淪海眼徹􅀆泓澄一碧金瓊屑􅀆全流石爍爽氷雪􅀆雲煙藉潤為改色􅀆酌而㵸冷冽􅀆挹之薦帝明水㓗􅀆淋漓膏液􅀘天缺􅀆女媧錬石用不竭􅀆夸娥㢮檐濯困暍􅀆七賢㝷盟醉達􅀆幽響傳谷鏘瓊玦􅀆山空月落仙人揭􅀆生肥悟真訣􅀆我銘勒石泉不涸􅀆端石硯銘硯之同功甲與鋋試之敵塲惟利堅其或不爾安用焉鳴呼此硯穹而圎神黿􅁕跧舌有泉既利我頴墨且便青州絳州何􅀁賢題品入格因公權䖏士或托斯銘傳黙齋銘語􅄫㓕者渉扵絶􅀋談自然者入扵虛無嗚呼黙乎其天地閉賢人􅀮括嚢無咎无譽者與至於明良相遇治具畢張一言而可以興除者如宣父夾谷之盟孔明􅂭中之論茲吾儒之事也豈淂退藏於黙乎豈得退藏扵黙乎閑邪齋銘意嘻是心旣岌而放内閧外膠靡不馳嚮忘返􅀙流于焉板蕩維礼與義以戒以懼存之以誠為閑之具有人于斯言動視聴庸信庸謹造次於是成徳雖中慮萌邪侈一念或非為奸􅀁餌易演文言一閑大焉一聖心權輿於乹譬海乗載一碇能安如馬泛駕則旋險去而夷浪平斯淵彼碇與勒􅂚􅀎舎何李侯周防未然操心知要惕焉拳拳言信行謹其庶㡬一誠存中太山可移素聖賢同歸洮石硯銘吁爾洮水中沚翠欲流礪扵砥考之譜端歙齒波及余古月子斵而泓堅澤玭孰爲尸王御史瑇琩􅀛洗銘毉月槃漢洗噐制爾形從相􅀋漢維魚我􅀛賁取彼壽綰元氣宜子孫傳後裔銘者誰王子系訥齋銘堪輿两間事变靡極成始要終非言莫立玄聖垂教訥言爲先匪曰終黙時然後言喋喋利口返爲事愆覆􅀖乱家身溺于淵猗郜君内思靖顓一訥銘齋浩浩其天人亡道存寔大其傳尚来者而恪守猶丹書與湯盤也文貞公笏銘呈竇學士公家物唐有天下垂三百年扵粲者貞􅀚之治焉其効盖仁義之一言世之望公三辰在天是則公之徳何俟笏而賢耶銘存物亡寔大其傳則是樵之文伊笏之曽玄也猗欤竇公國老之元神物有㱕宝之几筵安知無望壠而求後因甘棠而思邵伯於燕者耶仙臺金跡硯銘爲宋少卿弘道作盤盤嘯䑓一碧千尺湛月露以洗空􅀮松風之瀟瑟仙㳺何之留此真跡斵而硯之是將晦靈蹤於翕歘藉玄雲而掩扣神物有歸蘭臺之客㑹登玉淸蕩空碧斗挹滄溟醉憑鰲格拂海苔之霞牋揮仙火之巨筆也楮都護銘漢開西􅏾國三十六中置都護控制約束強凌弱折廼有攸属我􅄝群經視為席珍繙閱不時未免絲紛亦作護府仰兹楮君統之有要無相奪倫侵損日逺緝㷩日新揷架安書曰史曰墳勒銘于上䇿燕然勛太秀􅂠銘丁生贈余湖峯一株頂􅁕背面蒼鱗􅀮􅀮渾然天成無㣲竇可􅂩植立几案間殆與頎頎君子相對殊可翫也昔元㫪􅁜作榱溪柸樽等銘命名既異垂戒又深予甞讀而愛之因銘玆石仍掇其義片石何状天然自若鱗鱗蒼窩背露蛟鰐一氣渾淪略無巖壑太湖凝精示我以朴我思古人真風眇邈變詐百出孰知誠確心深洞府混沌六鑿剛徤篤實君子之質惟其似之是用比徳嗚呼安得誠天下之意如兹石之挺特也書厨銘至元十七年八月三曰夜與子孺灯下觀丹書銘因擬而作此置之扵室胡若載之腹也名汝曰厨以其無不蓄也腹至於餒返為汝􅀁忸也子其戒之惟勗鸚鵡啄金桃研銘大名劉揔尹求予作忍濟堂銘奉此研見謝翠鸚啄桃翩欲飛去棲影片洮以慧之故芸閭風簾疑若與晤助彩毫端辯夫詞語搥黄鶴而倒芳洲賡正平之賦邪復明辟而以夣諫草梁公之䟽也菊井銘余到官两月移居司西官舎治舊井而新之方衆菊爛然擇其佳者植諸欄傍因銘之曰菊井其辞曰養而不窮者井之德也服而能壽者菊之靈也我㓗斯井冈羸其鉼彼窈然而深􅇦然而澄蓋南山之餘溢迺濟清而未名思欲沉浸醲郁皆菊之馨庶幾西河南陽之意仁吾民而制頽齡也冬藏圗右銘太極中分有静有動氣與理錯未免交閧孰尽聖哲不思而中思而或邪奚翅荒縱理明伊何精一爲重閑邪存誠彂而可􅂨内荘全體外致吾用早也奚思尹則孰覺一洗妄心尽易前錯學孔之學樂顔之樂􅂠去實存玉礱石斵道最中害或輟􅂉作不學而衰即成枯落念至于茲立敢不卓靳惜分隂守之以恪敬入為門􅀘我不及足豈三餘日新一日動静云為是爲之則敢吿靈臺服之無斁左箴其目曰定力以固窮為冬藏圖作天運循環有泰有否人生其間迺一氣類乏財曰困弗通為塞苟遇不安習坎而阨自昔君子器藏俟時出門有礙吾將安之仲由愠見阮藉窮􅂘惟昧困理于臲于􅑶安之有道説不徒泛堅我㝎力不容少濫氣養以剛志明由澹少焉堕昏亟爲澄湛衣弊服緼一温而止飯糗茹􅂼一飽而已茫茫厄臺悠悠羑里文明爲夷孔玉櫝毀聖賢猶然况弗至此我道未亨克念終始敬義齋銘維天生民􅂌之者全氣有澄滓因之以偏惟聖立極俾復其天困而弗學民斯爲下甘彼顓䝉時有不暇間有知悔或窺厥竅遺緒茫茫又昧其要大㢤文言聖學之宗致力兼􅀘蒙而聖功一敬内主義湏外􅂶凡百君子有云有爲行而冝之心宰物随秪直而荘匪方於動事物之来未免变閧惟其夾持務成徳尊既銘吾心復書我紳始終是則日新又新垂龍圗銘􅀁翁姓陳氏福州人􅄝飲恬扵仕䆠善圗竜見知於宋理宗甞以商舶越海與真竜遇自是尽其情状其作也必乗醉潑墨為之天機􅀁到非學而􅀎殆邈㮶之噀墨法云醉墨翻雲族聚􅀁翁圗竜與真遇黑風吹海作太隂太火岀山雷奮豫是􅀅執雨機而飛天侭滂沱而洗呉楚􅀫雲軒銘并序吾友中丞王君買宅蘇門得竒石一峯厥状雲如靄然煇應於庭户間甚可愛也因名其軒曰􅀫雲徴文扵余乃以是文表之其辝曰睠此来雲態度容與觸石而生與石為伍宛􅀍南山宿我庭宇主人名軒其義安取是􅀅停藹譪之容為思友之故邪伴東山之卧抱濟時之雨也雲􅀆雲􅀆出兩者之間固無心􅀆其􅀙竜也湏以時􅀆吾豈欲度之以自㓗徒為怡悅而巳邪水晶筆格銘玉瑩氷清太陽之精孰􅅣肖山之形鎮我几案虚白夜生息我矛矟摩壘之聲空明洞徹爛氷峰之孤撑物有形似吁足可驚若􅀝之而固寵旭日巳升恐潰釋而摧崩也頥軒銘為洪同簽作堪輿兩間物所􅂶􅀆而長而養一氣融􅀆人惟法天浩焉同􅀆頥以象􅀚四隂内訌惟養之以中正不我舍而彼從是以得終吉而在躬洪公孕秀海山沉推其材足以經制其量足以含弘賛翊樞務既貞且忠故謀謨應事機之㑹談􅀏折尊爼之衝不恃全羙方致養以為功果我枵腹以正以冲虎耽其視而始而終見寒思煦恐邉衣之未􅇱寸膚失養念一士之或癃扁吾軒而匪外飾起居飲食在日用常行之中吾􅀅養已以及物致事業於無窮是知大易迺萬世之亀鑑尚何俟授一編扵圯上之翁也愛菊堂銘草木之品色中氣清有􅀮逸之稱唯菊為能含精益齡晚而芳馨又􅁼夫君子退譲而不争圯橋老仙友而堂名雖堕履之弗進亦足以卜幽人之永貞華構傳芳三世相仍其孺慕也孝凝然心深而愛中樂不勝口欲言而不能自鳴者此郭氏之所以㝷盟也若夫平泉草木固護封植亦克厥承是或一道終未極愛之之至情親存親沒觀志視行曰如其道終身是程嗚呼郭君至性愉色豈得於尹氏者拳拳而服膺吾今取爲銘以告草堂之靈安知不入户聞愾然之聲也邪虹霓硯銘并序趙太傳彦伯出示􅂵石大方硯請銘余以石有竒雯􅀋虹霓然因以字之銘曰蒼梧雲䒱九疑􅊜碧海風濤翻出日江山通秀欝􅂵煙産此珍材比玉徳金繩繞腹泄精英電激神光掣蛟室雌霓断影飲丹池暮雨連蜷一千尺號􅅺鄴瓦稱善墨石中乃有此竒質子墨客卿􅀹所惜大竒多自米家船入手摩挲三嘆息趙君文彩珊瑚鈎禮樂縱横供夢筆左招恊律揖孫通出入英莖五音飭楊氏雕玉寳章銘并序故參政楊公之子勗家蔵漢雕玉印章二方者丞相吉圎者太尉震也其愽陽章即乃祖息軒所傳故物大定十二年崔憲可詩序云長安許惟寕以是愽秘監􅀞于闐花騘圗得之嗚呼二公以通明正直師表兩漠今去千餘載其風烈凛然思其人而不得覩物增嘅乃為作銘士桓􅀶雅好古今為集賢直學士庻幾能紹其家風者漢丞相􅀶陽矦丙吉印銘吁宝章􅅻寸許紐玄􅀛綰漢祖􅀠為刻見邈祖神物護照千古此何夕得摩汝恍坐我丞相府􅀄望氣郡邸圄詔夜殱拒户樞是虽天公可無偃柳興􅀅舊圗乳褓恩其可辜獄有牘秘不舒是章緘金縢如㱕有數子與俱十襲藏无太踰防有光夜衝閭六丁􅂑嫓貞符在􅀶陽宜特書漢太尉司徒楊震印銘伊弘農漢巨儒道自任聖為徒主鱣堂閲群書表氏諱兹為符位台鼎綰􅀦樞赫漢炎走羣貙堂堂氣忠義軀四知金厲貪夫殆是章玉不渝内寵横􅈒人殂與雀環􅄟幽墟見白日㱕子􅁉世失系紛莫區伊莘楊豈公莩苟不爾胡為乎致大鳥止丘隅淚如雨洗􅁈誣佩之行可舎諸我作銘此嘻嘘張指揮甘白堂銘我識先帥于清之野緩帶䡖裘投壷歌雅伊時張君侍立親傍虎豹在穴已炳其章及􅀅羽林肯構其堂榜以甘白于先有光試甞聽其言論諒天姿之殊常是將調和衆味羮􅀓鼎之羙邪彰施五彩絺上公之裳邪噫吾說已竟必一㞐於此恐徳業之未易量也忍濟齋銘改作為楊子英題多変而莫測者事機淺深殊跡而難度者人心善􅁖我據事㑹忤激交作彼以機成客氣外鑠或當懲而乃忿可理遣而反愕隘不自容事安􅀎若因小端而致大􅅍又奚翅九州之鐵而鑄一錯也理貴含弘量崇濩落功若與即是心先怍言不可出我舌為齚故堅伺桓門者收康濟之功俛岀胯下者辦戡㝎之畧宜成王之戒君陳見周書之噩噩海印奎星研銘宋祕監弘道索賦詩􅀍東宫㫖編莭丗宗实錄奎麗空文之宗秀孕石與歙逢礲而研以􅀋従海有瀾穹浮蓋印天光終古在拱前星問有待霮玄雲集毫彩酌前言作帝誡歙石壁研銘并序至元癸未􅀊正月二日謁左山先生坐間出茲硯示客僕以形質異常略狀數語公喜甚曰汝言殊有契予心者吾子其為我銘之銘曰玉徳而金聲縠紋而紺理湛􅀆虚見明生於旁魄恍􅀆惚疑璧投扵山􅀑玄雲横馭風生燕几顕諸用起經綸於心上發餘輝綰秋虵扵筆底是則公亊業之羙也我􅀅静濯碧空洞徹表裏􅀚春雨之散絲似啇霖之復起也醉仙石銘為韓通甫作爬髿蟇縁蹣跚鱉跛化而醉仙蓬首不褁傾欹落魄對客裎祼惟不適用得脱秦火黯桂樹之秋香普故宮之青鎻推墮人間無可不可頑碧凝蒼肩神垂嚲留賔筵而盡餘􅂬每蹲蹲而舞我也殷乳銘并序韓生弘以瓦鼎示予制極古而可爱余曰此􅀙何而淂曰淂之扵帝辛之故墟然不知其為何制也余曰此殷之乳鼎也即為之銘曰惟殷墟廢巳乆代􅀁㞐止野叟殁而􅁙此何有其為物故啇埴千年後見白曰乳至四冝蟄蟄萬有生皆此出􅂑為形穀瑑壁嫓龍觚飲而食秋澗銘渾沌鑿韓生藏深夜壑後来者見必作賛老人星賛月帔雲衣金支翠旂御星騑而􅓸沆瀣騰淵䊮而表明時爛祥光於萬文湛南海之清輝我見我出為瑞為禧厯朱方而朝北極祝皇夀之無期何􅀯山之鞏固䓁旻天而峻齊然後廓夀域􅀆無際挈斯民而溥躋􅀝蓋霏霏蒼茫􅂚㱕貝􅆣珠宫群仙與嬉歌東皇而逺引随升降而入氣機但天容海色􅄅不可以涯涘􅀆眩朝日之重暉先君思淵子􅀞像賛徳之厚其􅀁受也全學之博其􅀁守也專材刄恢恢利周物先占氣斗間世之龍泉卒之臨大事以益辦曽何以恵文而為賢望之儼然即之温然治之隆汚持衡以權一言吏師世有可痊孰謂神而化之之妙杔丹青而可傳耶王内翰冩真賛捴管蕭君出示承㫖内翰冩真木庵師題賛其上佀有􅀁未盡者因為之賛云充氣之粹􅀆與材無忤靈􅁭之廓􅀆以道為􅃾延譽在龍門之上視草冠玉堂之廬及其物則見百里之􅀉其托輔則可六尺之孤天歩改玉婆娑兩都悵蒼蒼之秋色欎喬松而未枯尚􅀎賔扶桑之出曰振人文扵燼餘見之丹青清風穆如人徒知百年之遺老我以謂中朝之鉅儒彼晬然而容盎然而春見扵眉睫之間者固非山澤之臞也耶鮮于純叔冩真賛遥遥華胄卋靄令聞沇水之集其源奫淪老成雖逺而典刑今見于斯人髥踈而秀心吉而仁藤白而冠紗烏其巾豈見夫身外之身予但知仁者之必夀其風姿落落百􅀊猶畫中之真也麟匜賛噏嬴匜脹豕腹背􅀒厥角挺竒骨列太階軄盟滌今歸于我研與匹薊門市南冬日淂蒼溟之波浩無極挹彼注兹泚我筆姦枿誅絶旌直徳子孫寳傳金玉式桒泉老人􅀞像賛德與學専行爲卋傳是之謂有年㕠瞳烱然蒼髯㦸然人目曰山澤之仙庸鉅知抱長孺之直甘骯髒扵門邉者耶范文公􅀞像賛堂堂范公三代之佐致君澤民盡夫在我曰義與仁經綸之具篤信力行曽不易慮受知􅁉􅁜千載一遇其施幾何貞我百度狺狺羣言激公而去天下之事匪材莫為遭時冨材中靳固之治止斯耶由數竒耶再拜公像涕洟咨嗟乖崖公真賛堂堂益州元精之傑用智馭權以氣逹莭在德克剛得吏之訣其捄時也若乖崖而極經綸其擿奸也不鉤鉅而洞窟穴噫太􅂠之雲清淮之月豈無閑心大厦火􅅡較以出䖏此兼善而彼獨索冝公平生日新事業皂裘􅄄衣有􅀅之威我拜公像清風凛而悠悠九原愛莫起之吕仙翁真賛合道陵秘府物今為王簽省家藏元精貫中老不息先生煉形與之一氣機出入我􅀁乗世間甲子管不淂有時变現稱劒客三江五湖風䄂碧江雲紅爛岳陽樓醉飛星馭鞭金蚪􅀐驢歘上長安道来看西風渭水秋古人事業垂不朽八表神㳺欲誰友乾坤况復一洪爐萬古消沉竟何有先生遺照滿人間已是真筌不死傳只湏䄂裏青蛇氣夜夜人驚在斗邊駮華騘圗賛并序馬之有駮猶人表之異常也昔骨利幹貢馬百匹中有駮者太宗愛之親為製名曰决波騟又秦胡公有乗馬號忽雷駮此馬毛質時異豈骨利之遺種欤故供奉官圗形以獻見方物一峕之盛云吁神騟骨相殊振蒼雲散􅂠軀供帝閑馭虬􅂡厯八極塊清都非􅀁覬三品芻有物制噤不舒絡青絲伍髯奴終奮鬛躍天衢君無癡茲畫圗填星神像賛坤元之精積而上曜厚載之徳至静而妙爛然黄明有􅀊之兆僧繇像之其神杳杳冠著牛首􅀋其順也手綰方玦􅂑乎填也非夫知􅄦神之情狀者何以則其奥􅀮也二十四大儒賛并序堯舜之道淂孔子而後明六經之旨俟諸子而後彂逮秦火燔蕩先王之迹一向熄㓕而天理之在人心者何甞有一息之間断㢤漢興諸儒挺出如董生刘向孔安􅀦毛萇楊雄號稱鴻碩斯皆摘奎之光發煇孔壁探聖之幾耴訂口傳致興學立官文風彬彬可謂盛矣然六經之㫖有師授而無傳著東漢巳来師說並行馬鄭賈何服䖍王肅之流罔羅衆說正誤刋繁流藻箋註復使聖道粲然如大明當空蔑不耿昭以之断􅀦論建民極有不可斯湏離者至唐踵七代之衰理弛文弊道統益㣲及韓愈氏出以道濟自任隄障末流廓清義路盖皇皇如也故人儒位置終之以昌􅀺伯者良以此歟若夫三才彌綸元化前世比圖像列配神庭為不刋之至元癸未冬十月齊府廟宫兩廡繪事告成明靈儼然如在爰作賛文昭掲扵上庻幾乹端坤軒豁呈露􅋍齊人之敬為􅀖家之光也左丘明麟經垂憲百王是懲素臣筆傳日星益明文開史綂卋咀􅂠英儷景同翻未播休声穀梁赤封襲丘伯聖道群用見有􅀷淺赤也明經辝清義婉漢儒推轂大開學舘􅁇我囯政論益光顯公羊髙封臨淄伯麟出魯郊筆終史削公一再傳若聆徇鐸冝其資􅀷裁辯辤諤折􅂨群疑匪斯孰托荀卿封蘭陵伯金聲絶響詭辯縱横蘭􅁜著書􅄍辤為經憤彼譎变欺卋迷民性惡之說有激而云伏勝封乗氏伯秦火驪坑儒厄斯極天不没公俾副孔壁渾灝之義垂範後王頼公口授帝道復光照耀齊國文奎煌煌毛萇封樂夀伯風雅三百一㱕無邪絃歌音􅆌孰為傳耶温温樂壽漢􅀄名家訓傳首出遂正而葩敦厚之風永煽幽遐髙堂生漢慱士封菜蕪伯秦尚法制禮喪無幾雝雝堂生當炎之始官儀國容有頠㑹弁澤宫赤舄几几孔安國封曲阜伯書出漢初壁傳口授古􅀠未兮詎免訛漏天開聖孫以傳以㝎帝制􅃨明翼我國政戴勝封楚丘伯曲臺傳經有千其儀戴君發揮其詳可知履之則癸悖焉来違煌煌天序相我民彛劉向封彭城伯彬彬中壘帝胄惟英授經草諌力扶漢傾巳志伊欎聖學崇明鷩冕玄端山立神庭楊雄封成都伯有漢鴻儒述作之賢体易之妙衍夫太玄抉聖之心継成法言大醇小疵其然豈然惟寂惟寞天禄之閣出䖏兩間其何以怍何休封任城伯髙也傳經心深而文秦漢而下莫闚其門任城觧詁堅守如墨開户免脫破碎陳敵駮我漢事㑹㱕其極鄭衆封中牟伯喧啾梁門師也威鳯志棲阿閣學明三綂皇皇使􅂠漢鼎􅂑重諒夫通材中藏大用馬融封扶風伯扶風氣豪慱精群集賢如鄭賈執經在席暢我休風彬彬文質尚想絃歌漢南之國盧植封良郷伯海山沉雄精貫斗極篤生大儒文武之特以道事君以經翼􅀦劒佩赫然氣掩群慝鄭玄封髙宻伯秦燔六經天理曽熄漢興諸儒臆說雜出司均網羅刋繁正誤箋注皇皇流藻終古服䖍封荣陽伯卓越九江清介不羣雅材文論爲世􅀁珍任城巨敵左氏忠臣光簉漢彦蔚乎其聞賈逵封􅄮陽伯偉㢤侍中好問而􅀶通眀四經大肆厥作綱維國論張皇帝學東觀石渠光寵扵爍杜子春封緱氏伯周官大典興王之迹制古辤約我觧我釋入海穿深薄霄透碧品物詳明千載是式范寗封新野伯藻發儒林學淹墳籍嫉世浮虚著論詣實盤盤學䑓膠庠大開至今豫章有來群村杜預晋大􅀅軍開府儀同三司當陽侯贈司徒堂堂征南經制晋室袵席金革研精麟筆學方武庫卋􅃅經癖有開後来理順氷釋繄公存殁戃怳靈氣我曰猶龍焉􅂑虺異王肅魏衞大􅀅軍太常蘭陵侯贈司空猗歟子雍英發妙年書易陽秋傳列學官制刋朝典秩煥郊壇汪汪東海載觀其瀾王弼字輔嗣魏尚書即封偃師伯龍出河圗經成三聖輔嗣窮幽乾旋坤静漢說多門唯公􅂑正伊洛淵源流光與盛韓愈字退之唐吏部侍郎封昌􅀺伯維天有文公材命丗彍義滂仁黜邪異世溺方深力以道濟百折彌堅死而後巳倒影滅没藐不可企文中子顯允文中希聖之徒闡教河汾宛然泗洙斤斤陏文不􅁕與事挾䇿㱕来心醉經史曰魏曰房曰杜曰李學傳聖心有楽有禮貞觀至治有三代風論夫源委先生之功千古而下與唐比􅂭鍾氏先世􅀞像賛為郷人大明作顯允鍾公肇䟢自秦金季家衛以財發身闤樓卉圃照暎河濵􅄖㳺卒􅀊壽開八旬維嗣強矯結髮從軍奮提干􅀅屢収戰勲釣䑓雪潰死莭酬恩伊恕之父虵化其文憤志讀書行比郷鄰陳力􅈇府克公克勤是知善継述者豈無其因不過積徳與崇仁故培之厚者其發茂浚之深者其流􅔿嗚呼鍾氏之子孫􅀎不封植其本根也趙曹州昼像賛宓子宰單鳴琴在堂琅琅玉音齊魯之郷流清芬扵異代得趙公之循良峩冠恵文貯書撑腸不􅀼榮而易素守曽格物而恃巳長貳政兩州治績章章字民折獄仁恕内􅀅軆春陽而休煥孰知秋荼之繫昌觀兩漢之卿相自卒史而翶翔以材以術公其可方固沉底扵下位浩􅚡流􅀆未央維嗣善継乗騘奮􅋮慶之􅀁鍾于焉厚償匪槐􅁄而就列􅀅礼文之有光又何啻􅆪白筆而飛簡􅂠之霜也九公子􅀞像賛史開府子名喜荘列學屢為萬夫長有時麻衣草屨以散仙自號銳目豊頥氣䫉魁竒􅀍􅄄懐寳有儼其儀出紈綺之間無豪貴之習􅈽夷惠之志蔚熊豹之姿齊物我於一致感盛衰之無時其或戴逺㳺之冠甘元氣之委􅀐􅀅軍之馬掃干􅀅之霓歘生皐比玄談四馳提筆揮洒以遨以嬉歛凌雲之劔氣等尺鷃而蓬飛恥以藝進與時推移希逹人之大觀毎先事於幾㣲與其身之外樂何若心之内怡是則散之為僊見於丹青者如是又何計騰寓説而横氣機也試􅀅湏而為問恐吾言之庻㡬漢諌議大夫王章博士朱雲賛并序孝成之朝劔履間健者猶百位然挺身為國直言忠諌者誰歟盖當時乹綱紐㢮威福柄移赤伏隂疑堅氷日至獨能痛國綂之􅀅㣲憤中外之單弱毅然與天子合謀属具臣矯朝曲以社稷大計為言殺身犯顔以成其仁者在漢二百餘載之間唯仲卿與朱㳺二人而已何忠直剛果之氣寥寥如是㢤論者方以下量䡖重䧟扵刑戮為譏吾恐為人臣者不以容身保禄是耻􅀅何以為訓作諌議大夫王章慱士朱雲賛其辝曰天厚之剛百折不撓履霜而氷辨之當早漢至元成國綂中熄隂晻陽精九廟不食劒履群卿孰非逺識坐眡淪胥權歸外戚厄㑹中来詎容人力公豈不知言出禍入殺身成仁臣子之職彼牛衣言固非􅀁恤諤諤南昌感公奮激抗書申明路開忠直三復斯言冩我心慼慱士朱雲維皇有師禮自天秩動静安危以物以則矧惟中材性可善惡俟我儀刑狂聖迺作安昌師漢腹心之疾􅀼我崇髙容奸􅀮慝社禝大計莫此為亟雲位下僚自任稷契犯顔嬰鱗為漢薬石諌虽弗行彼氣則折欄檻嶙峋我舌不結少師劘軀龍逄挺莭以分以職扵死為說並游無慙終古有烈嚴子􅁜賛漢有天下夲以覇㒷􅁜遅世季其弊莫勝光禹阿䛕雄欹狂鄙元成以来従風而靡維炎中熾故人作帝先生慨傷為漢砥礪㓗我一巳訓彼四方頋惟可加萬世之光幽幽冨春􅄅􅄅桐江釣絲裘􅄄終焉倘徉是則柔理之道先生助治者其維皇㢤噫漢議郎田疇賛炎漢淪精群雄蠭起士昧􅀁擇依強而巳附􅀽臣曹風従雲委倖而有成終焉自凂堂堂幽州志在安劉信我大義掃清􅀦􅄷先生委質名正言順報以國使力抶衰運間関歸来大事已去君讎未復吾􅀅孰與躬耕故山有死無貳白狼之役諒非本志是懲是膺權以濟事何以明公龍盧之封繫以千駟禄之萬鍾曽不少睨肯縻其躬嗚呼智如荀或識似田豐眀不自保竟貽終㐫千古而下死魄英風牴􅲨賛并序郡譙門兩棖下有石獸左曰牴右曰􅲨為状特異􅀮其齒而吻張崩其角而㒹兀頂髪雲委垂卷兩膊丗傳殷宮中故物自衛縣移置扵此攷之集韻云秉心甚靈盖忠直獸也彼物爾淂氣之偏者也何以識其性之云然以屈軼指倿神羊觸邪麟趾厚而不踐虎螭仁而有威是以忠與直可得而推也其􅀁以表之以為世儀者古人制物有􅀁􅂑而垂戒焉盖忠者衛上之謂直者不骫之稱此則臣子之􅀁固有而􅀁當為者物能如是可以人而不如獸之云乎作牴􅲨賛賛曰吁竒厖三代制賢其徳與獸異體具存神則逝逐比干而下逰悲獨夫之狂猘牴􅀆􅲨􅀆無效麟之岀非時􅀆使吾拭面而反􅃑西溪真賛秩秩其徳瞱瞱其英天禀之厚固非學之􅀁􅀎用晦而眀與時偕行愚常与公􅀙事雅量有餘曽不知趙張之蠭閎豈鷹隼迅擊終不若鵉鳯之和鳴也我賛公像庶幾典刑道義視文章為重雲㷑同冨貴而䡖至于生也順事没而吾寕疇為丹青可淂而名也邪雪堂普仁真賛桺州序浩􅀄讀書楽山水有文章父子咸為其道治焉而無求賢扵惟印組為務以相軋者逺矣道行貞純􅀄不􅅸俗機鋒洒落即之可親苦空任没膝之雪䖏心探濟物之仁草坐容身雨花􅌭紛雷音淵黙獸伏鳥馴咄此圎神澹如凝雲耿金粟之孤影􅀏人間之幾塵爱而賛之蓋浩初一流人也中書左丞許公真賛古人以道濟為任者時雖見扵行藏心不間于㣲著扵皇先生道深絜矩以希聖為心侓已為度上明君道之方下易薄夫之慮危言立朝聞者悚懼公于斯時屹傾波之砥柱非天下至誠其孰􅀎與瞻拜公像魁然真輔奉璋峩峨其儼而􅁉至扵体用一源先後有叙試以中元之治較之見論思與機務念公平生其丹青可得而喻也耶醫學教授趙公仲康真賛洹水流潤太行唯峩篤生異人司時之瘥顕􅁢趙公􅀍服委蛇道髙而施慱脉明而智多丗以醫名者衆如公之醫中而不頗護養氣元玉池生波攻以峻劑我禁我呵􅊊焉有餘揮之以戈俟其半衰済之以和開壽域者五十年良声番番其􅀁以淂于公者如是􅀍之賛歌知陽報之有在福子孫而為那也王子明傳賛古人稱殺身易成事難雖然事有大小公私之間如不有已私專以公心除天下之害此其成尤為難能而可重唐代宗以萬乗之􅁠群公卿之謀至􅂑一家奴宛轉畏懦不敢明言竟以盗㱕之而􅀚著之莭可謂壮矣手植夏禹像賛并序衡岳有怪栢一株世傳夏禹手植長沙温􅀅軍得斯木一枝堅勁苾芬愛仰不已以為神明之物也刻帝像以奉之亦臣子厯舜九疑呌雲蒼梧之義也求潤色扵余秋澗王惲拜首稽首而為之賛曰亹穆神禹玄功格天見之羮墻况手植之􅀁刋帶不下而道存体雖微而儼然所謂㰸之管窺浩浩淵淵嗚呼三代吾不得而見之得視斯像固足以掲吾之䖍是􅀅同啓石而不朽耶抑以與九疇而共傳也田仲德先生昼賛言論固樞機之先作行在士大夫為重卓越田公二者錯綜氣無虚談才見實用翶㳺侯伯之間擬擴香林之供幅巾横策掉首吟諷予甞聞鄒䝉之辯說有以􅁲先生之㝎動扵戯文献不􅁕以柯為棟載曕遺像安得不有人物眇然之痛栢溪主人張仲和真賛堅以持其心直以養其浩用是二者以全純孝淂其時而濟斯􅍇安其貧而􅂑近效其樂也融融為行也慥慥氣温而和皃儼以肖豈惟夀考􅀆康寕永以為鄉黨後来之教趙瓠􅀲冩真賛丹頰秀眉踈髯方頥目朗烱欲曙之星氣吐若垂天之蜺畧施為而見底藴據懐卷而藏噐機􅇮也為平津之上客今而乃􅀲田之布衣注酒滿瓠溉此鴟夷醯雞􅀏甕天之舞醉䄂拂西山之低趑趄囁嚅尚肯效夏畦之病為浮雲冨貴軒冕塗􅅺况尺鷃享鍾皷之樂㳺談到六印之纍卧元龍之樓下􅁴許汜未全痴也耋杖圗賛先生姓馬氏名天昭字雲翰汾州介休人自号師易老人丁丑歳壽八十有一德維懿其存則不謂之命氣維克其㝎也能勝乎天故衝風之火易熄溉旱之禾有年而况有道君子者焉矯矯先生匪曲而全静以仁樂健為徳先應獵無夢絶韋有編通而得夷恵之介黙而契消長之權何軒冕之可累豈山林而後賢氣精而鶴夀松貞而嵗堅故得甲子幾七七之數乹陽符九九之玄道與貌粹峙而停淵儼乎􅀂介山之欝茂奫􅀆如素汾之淪漣方吾道之如線頼此老之康延豈造物者􅂌西河南陽之夀固􅀅為斯文無窮之傳也耶趙徴士􅀞賛君名鉉字仲噐多巧思精藝術今年六十有一自號鈍軒逸皓􅀁謂􅀮㞐求志行義逹道者也祖質字景道家大㒷之穴里金建春離宫在焉常有詩題學舎壁間云折脚鐺中烹白薺打頭屋底看青山道􅁜春水過見之為賞識左右以公卿名對召見殊加􅄖礼仲器公之曽孫也蒼髯于思􅀟瞳烱然勁逸欎幽燕之氣端倪賾太易之玄挫止其銳鈍而名軒曽扵物而不滯浩􅅐中之一天是謂建春徴士之後其青山秀句猶􅀮見扵眉睫之間也故金滎陽令傳輔之􅀞像賛其父霖明昌刑期進士行部臨潢没扵王事玉㓗含光蘭幽藹芳孰為氣機㒵温而良我甞陪公杖屨徜徉冲善為植德之本揮遜厚周身之防見之丹青衣冠堂堂維玉田之傳其故家文物尚髣髴明昌之煌煌若子􅀂孫既衍慶以襲吉又􅀅見再世而昌也耶韓御史􅀞像賛晦其明而扵物也周以旋介而通其扵事也曲以全神湛秋水顔如渥丹藹藹蔚和愉之氣怡怡為孝友之賢施之有政其逹固然同峩冠于豸府愛諤莭之孤騫􅀁可見而知者如是其不可企而得者殆丹青之黙然而淵也渡水十六羅漢賛為聖安容老賦誰吮澹墨作佛事頋頴含光開太始稽首尊者十六相金沙灘頭渡淵水魚竜異獸同一家背􅀒鱗浮供役使碧蓮泛灧百花小兩脚何曽踏􅅺滓法身化現烱孤月海風吹堕千江裏􅀘陀巖竇宝香濃滄浪石上觀生死白毫光滿海西岸航此洪濤悲一卋玉溪老子出示余意匠經营親說似禪機巳落􅆭淡中我今試下第二義九年面壁度竜象一日西㱕携􅃗履善提樹下喜相逄拍板髙歌聊尔耳香水琴賛并序南海石􅀮禪師合沉檀二水為琴絲而撫之其音克諧有不譲扵槁梧者叚生淂之以珍異丐余文以賛之其辝曰繄琴之胎以桐為材製自虞氏其来邈㢤斵以香木南海之僧絲而理之有嶧陽之清物逐􅀁好㱕之伯寕脫燎爐之融液拉玉雷而為朋藹然雜芬菲之韻琅然泛韶濩之聲嗚呼琴乎學者寡而其􅀅孰聴倘鍾期之與遇又何啻一再行也刘巨川簽事真賛事機之棼非才則務㢮天質之羙逢時則道行於維刘卿志氣蠭閎䑓閣肇建鶚書應徴豈惟夜書快吏見稱及佐府幕㳺刃發硎人奉承而不睱我持難而肆能致駕五馬心奚以荣律身束吏明倫恤刑陟而提憲風動百城褰帷聳具瞻之羙控拳無虚􅅮之名抵凡􅂉迅盤根莫就天或假年蔚為名郷冝大用而乃靳殆収功扵嗣㒷卓彼二子力振家聲彯纓若綬荷天衢亨􅀅見一日千里騁駿足而躡雲鵬也黄洛老人􅀞像賛猗歟趙公以古為徒燕居磐石㝎力有餘萬坌前陳付之一壷身心翛然浮雲太虚自號曰黄落散人世指為山澤之臞見扵序文者如是吾說試嘉遯之自如不㞐山林匪樵匪漁安我素分而與道俱醉以酒而適意晦其明而内娱夀幾九齡健不杖扶有子有孫簮纓仕途天之報施善人也合若契符甚矣吾衰愛公起予拊卷慨嘆遂㰸袵而時書軟背椅賛并序昔李山人詔􅀮衡岳淂虬松一枝即形作椅名之曰􅀮和終莫􅀎曉其何義故左丞史公之子假予是具其安四體養老妙意有不可勝言者䋲而網之以軟其背把而執之以駕其肘至包承臀臂曲盡其冝甚矣工者得老者安之少者懐之之遺意欤名之曰軟背且賛之曰咄此為具其製非一坐促背峻佀㳟而蹐傍無兩把予肘安適而最苦者磨􅀮傴脊未若此君温柔旖旎譬彼􅁎姜擁􅈽而息不髙不亢老者􅀁仰爰􅀙何来藍輿之状管㓜安濯足圗賛天下有二道出與處而巳然審時䖏巳有未易言者先生遭三國雲􅅰􅌃海而東髙尚其事如度之致禮以加敬丕之逺聘以拜官皆恬然若無􅀁聞所謂􅀮居求志行義逹道者也至於嘯傲物表澡洒溪流特一時閑適若歆輩俾進􅂂拱杖猶恐自汚抗䟽代位此何理哉自惟老繆待罪翰林赤日長驅㑹集寓館背汗浹流暍而欲踣歘挹清風豈勝愧仰乃再拜稽首而為之賛曰吁先生古逸民素所友夷恵倫傲狐瞞東海賔著皂㡌蹋碧􅉿尚恐染三䑓塵若歆輩進􅂂徒破壁手乃敢汚抗䟽請代三孤眛平生何􅁕誅百世下孰知巳翛然心見終始大􅁸予有蘇子古燕印賛并引参政何公世家易州常扵燕丹廢城中耕淂圗書小印虽百枚制皆殊一曰以􅀁淂者贈予形如方斗其文曰韋宙宙唐昭宗時宰相豈古今人姓名有偶相同者耶入手摩挲甚可惜也作斯賛以荅雅厚其辝曰燕有國八百餘維易容奭故都按璧壘見雄圖萬組印􅄂簮􅅂人與骨朽巳無耕壠間獨淂渠一粒小丹砂如其文宙亦盛夫紐岑樓或􅀛趺纍纍多一皆殊彼斗大黄金塗懸肘後擊賊奴氣虽豪空淪胥三摩挲重嗟吁猗叅相好古徒知澹癖爲贈予何􅀁誌遺恵書四子問孝圖賛天地之經其維白孝魯人􅀁瞻巨室是效四子致問庶幾要道因材爲篤聖荅各異發藥其偏從容和氣思煽皇風永錫厥􅀋怡聲粹色玉佩􅂠􅅂表之丹青清風穆如嗚呼安淂一天下之慮宛同是圖梁太師王彦章􅀞像賛堂堂太師勇冠萬夫曽精甲之幾何破南城於一呼三日奏捷素果不逾大厦􅀅仆一木可扶衆且頋望我􅊎􅂢軀蒼髯糢糊目光炬如戰酣㱕来氣欎犀渠惟孝與忠同㱕異途繄錦囊之三矢與長矛而不殊冝乎文忠之筆大書特書不一書而巳也吁刘珍母王氏真賛嗟嗟母氏恩斯勤斯自期寸草庶荅春熈况復身後有飬何施履霜濡露感懷􅀊時嗟嗟母氏健幹而慈奉巳以約保家之肥致家之完乃有今日我食我衣皆母之力曖曖停雲泉水湯湯我思母氏何日而忘重􅂠鼓琴圖賛幽幽深山玄徳聞􅀆二女􅁵降溈水春􅀆乹健坤順其道恒且乆􅀆袗衣鼓琴固若我􅀁有􅀆手揮五弦正始此其時􅀆琅然玉音一氣為之熈􅀆鏘然和鳴鵉鳯以之儀􅀆衣垂手拱其道本於斯􅀆升道蒼梧惋莫􅀙􅀆淚浥湘筠思何窮􅀆噫故䖏士牛了齋真賛眼高一卋舌本懸泉噴噀珠璣孰為後先樂育自好以全性天生也順受没吾寕焉彼顔渥而顴野服翛然尚知為鴈門儒將之裔庶幾青山白雲之仙也故翰林應奉陶珉溪真賛貌古而氣清言訥而行純此見扵外者皆曰儒學之醇􅀂夫該貫經史筆斡千鈞玉佩瓊琚大玩斯文􅁕以泛珉溪之雪浪追顒軒之絶塵然綸恩甫沾而不禄夀靳固扵七旬天之報施果何有扵善人峩并朱衣正笏垂紳雖未及直玉堂之署尚知為元貞辭翰之臣也房星賛粉色黯淡䨇絲浮絳冠箕如柱劒􅚆陽環夜半海氣湧火輪欲上鞭金虬赤㕙躍入玄関幽殆佀戰勝褰雲兠千金漢􅀅非吾儔中令化筆通神謀冷風拂巫寒颼飀大徳四年臘八日作房四星為眀堂布政之宮亦四輔也下一星上􅀅次次將次次相上即上相􅀁以理隂陽正教化南二星君位北二星夫人位又為四表中間黄道之􅀁􅀙為天衢又為天関南関曰陽環其南曰太陽北関曰隂環其北曰太隂亦曰天廐示曰天馬主車駕南星曰左􅆖次左服次右驂又主開闔畜蔵之􅀁也松化石賛燕城趙彦清家藏伊石與松秉􅃔堅潤雯􅂠根莭鱗皴挺勁儼髯竜之淵潜蛻康溪之深濬伊艮震之交感化而為他山之璡逮霧巖之玄豹􅀮錦斒而如扙水水清華坤靈藉重氣變無方静含妙用物貴異稱金鏗玉振習焉不封於秦今也罔言於晉但摩挲而三嘆非張華而孰綜然室無滯而不冨况殊方之竒貢嚮爲山人􅀮和之具今作􅄷池怪石之供一線爐熏靄􅀂雲蓊栩栩蝶去夢繞神清之洞蛻齋劉先生真賛先生諱思齊燕人猗歟蛻齋蚖肆螭蟉擴充家傳資􅀷善誘愛波瀾之老成宛黼黻之絺繡曽管窺於一斒竟韞匵而莫售我瞻遺像氣豐而蔀一官廣文禄才􅂛斗挈簞瓢􅀆屢空曽􅆇否之何有嗟共盡而奚言豈獨哀於吾友蛻齋􅀄與胡國瑞同年登第中統􅀄爲中書省􅁺後辤歸爲彰徳路學官卒秋澗先生大全文集卷第六十六
