  text: 秋澗先生大全文集第十九
  hash: sha256:c66bee622bcb694a7acc95ea842f96b2292241fee8695416b37d14831aec1718
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_019-1a}
body:
  text: 七言律詩老境六􅃴并序夫人生百􅀊如馳駟過􅂩能幾七十者又復幾人􅀁謂倘來外物猶浮雲過日亦何足道哉因感壯年􅀁行多䡖生之事趍前太猛一也讀書過分二也飲酒無量三也妄慮坐馳四也喜談耗氣五也戰藝多劳六也不肖今年已踰六旬念此六失覺五十九年之間何趐是耳而驚而愕且畏且怖豈勝既㢤故養生之念蹶然生于中蓋其􅀔有不得不然者因作老境六詠庶幾與吾同疢者聞之不無少有􅀁戒亦老者安之之意也至于直逹性情以救徃失初不以工與拙爲計也幸觀者無誚至元二十四年冬十一月一日秋澗老人謹白飯飽即歩殘書讀罷午飱餘信歩徐行當澤車接武徑過通徳里談玄時到故人廬老便歩穏靴無襪静爱聲璆佩有琚相送歸時燈巳上到床一枕即華胥目倦忘書辛苦􅀟明六十強滿前花黒理應常酒盃縱對甘無分書卷相看任乆忘虛室靖深便黙坐午牎晴爛怯餘光悠悠未了三千牘吟諷從今付窟􅀰言慎飬氣聚首閑談足是非到頭贏得小人歸屬垣有耳甞捫舌守口如缾慎動機珎惜無先吾氣浩坐忘深識道心微客來客去俱恬静克已存誠恐庻幾食甘戒飽食前方丈肉如陵莫遣分毫胃氣勝百斛盡從中所過微軀能不病相仍巳飢便飫甘能止過軟雖鮮􅀬即乘此是老坡真聖楽免教携杖去騰騰寤寐絶思夢神依例到殘更目似鰥魚了不瞑正為膽寒增展轉不縁身老惜伶俜滌除玄覽歸安静宰制心君入沓􅁳昨旦早興􅁭韻足不知青鏡􅁂星星息藝休心辝筆縱横更老成秪来虚譽不根經風雲滿眼嗟何有月露盈箱􅀏未停肆口成章終妄作忘言休思是頥齡子渊直在心齋妙一字何甞及性靈坐倦即眠坐暖團蒲倦自然夢歸先到蝶飛邊膂􅘡癡絶凝盤石肩井斜傾似墮鳶香散餘馨栖翠被燭摇寒影掩殘編老來境界無多味飢即思飱困即眠一作不教怠氣加吾體爱然中和論性篇香冷燈殘静枕帷竹牎幽思獨依依時情乆與詩情澹鋭氣夜氣歸空控􅀌膺堅鶻坐漸驚縫掖擁腰圍味雖同體未分甘從朽木譏汲城懐古尚父祠荒草滿扉伍城猶在陣圖圍飛梁水落横霜瀬石馬門空半夕暉竹簡有光陵寢破山川是昔人非臨風􅀏煞安釐事甘着虛名􅀶禍機夢王尚書子勉時罷中丞在楊州丁月日分明昨夜夢王褒海上歸來從鳯毛燈下留連醉筆端揮洒挾風濤滿囊文具為余贈四座春風倦士豪與客忽從䆫􅂩去惘然驚覺聽鷄號冬藏木葉歸根到閉関遇藏􅀄匪避冬寒孔宣何苦韋三絶顔氏胡為樂一簞庭户信知吾道在光隂移入􅀞圖看此􅀖雖小無窮事定力先湏似石盤小邑都来掌許間紛紛人事日多端敢言絶學希不觧呼盧去効韓身老轉驚謀道拙時艱難作強歌歡正須一室虚明地時着閑身引睡看丁亥歳十月十日夜夢乗船渡一大河旣濟望南岸一閣髙數百尺牎户北向自簷至地上下以琉璃大簾垂蔽翠色半天甚竒麗也雲間髙閣翠為􅄕疑是仙居擁衛嚴虹影蕩揺青帝闕海風吹墮寳陀嵐半空倒景驚竒絶千丈揺光入頋瞻我自平生多異夢似怜方朔詫雄談篘飲李縣丞靖伯約嚐新醸坐客有云酒之醇粹莫胚胎􅀂也遂篘而飲之偶得獨脚句醉㱕為足成之如能可君等雅意便當属和時至元丁亥冬十月八日也瑟縮松凬滿瓮春瓮頭篘飲有餘薰醉郷日月時須到太極胚胎昔未分肯放小槽珠作滴快傾浮蟻玉為群人間愁緒知多少一醆能消正要君誰擬鯨吞罄緑樽一杯􅂓示試芳温中含妙理何多味細捲春江侭帶渾談藉清光揺北海詩慿風韻繞西崑知君預報時湏意免故来􅃻月下門透月岩偶到君家思適然一峰竒石墮吾前千金欲買􅀄無價百穴潜通小有天花露逗香滋碧潤月娥含景愛幽妍從今紫翠芙蓉夢不到齊州落照邊成氏西湾即事栽種西湾趣已成主人置酒約同傾小車来駐林間閣藜杖閑看兩后耕老圃生涯非細事滄浪清濁任吾纓少陵苦愛溪居好興在千章夏水清南陌東城占􅁍春西湾深䖏㝡藏珎青芽破粒柔桑稺紅䄂迎門杏蕾新醉裏光風多樂事老來清貴是閑人就中更愛清溪水隔断西風庾亮塵壮年心事幾虧成毎對蒼髯聽細傾夢裏江湖幾走遍林間雞犬却帰耕潘輿正要閑居賦蘭佩誰堪海縣纓脱􅁍烏紗有忙事瓮頭春醸漉生清海縣纓暗用觧蘭縛塵纓事海縣調周彦出爲海縣令也清明日花下獨酌時戊子􅀊廿七日㳺泗溪作人家拜掃重清明羅綺翻香曉吹輕不欲把書成兀坐也隨遊子出重城閑雲弄日何多態春水平橋不礙行勝事自知還獨徃一壷耒就淺沙傾後一日雨中招林韓李三君子小酌且爲梨花洗粧時新植梨花一株盛開花滿金罍酒滿樽一盃歡飲得佳賔近年樂事無今􅀊此際閑身有幾人禄羙勝於三品料臘香清徹六根塵風簷數􅀧催粧雨辨與梨花作好春東坡汲乳泉圖儋州遷客玉堂仙服食天教得乳泉三嚥遽驚滋浩氣一甘無壞是泠淵中朝清議􅀌忠裏瘴海鯨波九死邊落月澹隨人不見滿襟風露獨翛然道宫獨發乳泉香似與坡仙養浩方井冽不從炎海瘴味甘還比上池觴化機軒豁元胎濕􅀌影追隨月色蒼天地此身忠義在一杯三嚥濯肝腸送􅁎仲實􅀮士北還紛紛未術例從䛕邂逅淇南論有餘賈傅自怜多感􅁣東門何意泥􅀌虚雨連賔館留三􅀫天遣幽懐爲一抒覺我胷中聞未有九􅈐新􅀃暦家書九峰一作一篇壽器之國醫學開金櫃得真傳濟物功深不自賢前軰衆推楊獨歩後來誰與子爭先青黏有術扶衰謝白髪相㸔度􅀊年此曰樽前祝君壽一杯還代上池淵白簽事彦隆哀辭素菴一氣本龍佟心苦時違揉與同強仕有懐三品料發言都是四書功愁隨野草憂春雨恨滿山城對學宫誰為魯齋興起地古共門外便秋風王師中哀辝玉樹庭階自㓜看九霄雲路到鵬搏天門折翼差何及宅相論微理未安咄咄向空書恠事㳙㳙揮淚湿門闌應忴遺愛祠前栢恨鎻秋風月影寒壽少尹寳同知宝丁平章子秀禀金天一氣晶規模全是漢專城當官治劇有餘􅁉臨事知幾見老成門閥起身真相種天池刷羽看鵬程一杯領取千秋夀細着檀槽合玉筝顔氏冠詩􅀉蒲城主仲白祠李知觀一握儒冠綴七梁金􅁝匀織玉爲相頋瞻遺制從顔始陪侍先師見色莊巾卷在庭􅂓束髮玉簮横影夢升堂切雲莫羡如箕大曽冠三千弟子行紋背藤梁玉色瑳師傳元與薛同科薛模爲西􅗛冠師出高帝紀要盤白髪三千丈閑過春風十二窠衰俗幸存加冠礼滄浪無用濯纓歌敝餘改作須重丐玉導先期為細磋朱砂餅菊詩并序秋澗翁觀化於秀春園見菊之種甚多有所謂朱砂餅烟脂紅子以白與黄菊之正色今変幻若爾何哉或曰接之於艾致然予試為之􅀃曰艾火草也菊亦陽種也以二物方盛之時使客扵艾之末未有不随其主之盛氣而変者又赫以鮮者陽之精也故有硃砂之異此雖小事亦氣化之􅁼也格物者不可不知故序玉餅金蟬爛熳秋朱砂為質更風流天機欲測司花巧物色先從氣􅀋求孕秀似隣勾漏井分香當上絳霄楼朱顔厭對柴桑客恐覩空杯􅀏不休送録事薛彦暉秩滿北上秦隴風聲化有邰規模况自左山來三年弊邑淹良􅂹一日銓曹得茂材撫字論功書上考㢘能覈實到兼該春風領取新除去喜動門山兩翼開王尚書子勉挽辭三首淚洒行間閱尺書訃聞三至尚疑虛佳城一閟無開日聮事三年忝貳車詞筆早推韓愈健曠懷未􅁴孔融踈那知一夢終天别惆帳春風隔綺䟽少􅀌綿歷太迍邅甫壯光榮四十年氣運倘來方出限愛心先断便終天魂飛楚些和雲慘涙洒淮壖與海連左􅃝客衣三匝去延陵冝為聖稱賢婉娈英姿自妙年奎光空照玉堂仙辦教一世龍門重誰遣三王鼎足偏曠度包荒無徼略秋濤翻海失䲔鱣百觚未醉螺䑓酒重為斯文一泫然逰蒼峪青岩山有懐烈士甄濟義重於生視􅀂㱕封刀無復騁霜威千年喬木髙風在一片青岩烈日暉元稹論忠真不愧杲卿摧逆與幾希環山弋獵猶知畏白鳥衝煙自在飛啇左山副樞承屢念及作詩以荅雅意四十年間凢九遇感公翦拂使長鳴三蒼論法傳餘藴七扎量能綴賤名暁日嶽祠留語别秋風韋曲餞予行傷心緑野堂前月空遣流光照斗城賀士常侍御受吏部尚書識鑒乆歸清議裏恩光今著履声中文章曹植波瀾小星斗潮陽譽望隆除重不知黄散目輸誠思􅀘爕調功從今不鎻春風部管取銓衡􅀍至公題懐孟路宋緫管太夫人九秩詩卷七十􅀖君九十親人間此事少同倫栢舟髙節徽彤管鵉誥清光照􅀞輪歩履不縁扶杖健精神猶比結䄜新河陽莫說潘輿樂沁水花時别有春身寵家温親老健福全無似宋門榮漢宫傳訓斑儀在萊子承顔彩䄂輕孤節勁於相水竹九齡春動野王城年年壽席聞佳語南極星邊婺女明和陶主簿見􅀉詩韻時主肥鄉簿半生郷國共游居老去文交樂更餘苦厭物情多薄相毎吟風雅入吾廬一官稍得寛民力三飰何憂進野􅂼聞􅀃列人真吏􅀮竿頭還有再懸魚哀挽亡友中丞王兄五首百虵堕地一能龍知巳相湏不易逢僧孺固應知杜舎􅆇洪􅀄不􅀒張公扶摇羽翮翻溟海作養功名上景鐘自􅀏澗松居不巧半生清露到虛􅂪嚶嚶求友㓜同聲五十年來好弟兄零落山丘有今日􅀏談樽爼意平生酒壚不隔河山断隂翦其如骨蕞征用韓文公臨終事寂寞逍遥堂後木對床風兩最關情故人牢落曉星踈此日三王獨在予泉壤冷埋和氏璧牙籖空見鄴侯書問誰乆視嗟同盡老失知音慘自餘從此故祠鍾皷地謂去􅀊冬用三献禮祔母夫人于室此礼乆廢君首行之良可嘉尚過庭趨䖏半蘼蕪參議公在時賔客與君相接者未甞坐正堂上其謹敬如此衆呴漂山不易安􅀔張那復漲狂瀾一時附㑹真堪畏此際支持誠獨難貝錦斐文哀巷伯瑶琴幽橨变猗蘭一言曽擬桓矦辯醉裏哀箏爲謝弹病臻留飯作終天示我新文已惻然竒疾変常􅂊四日佳城埋恨便千年嘱遺不及􅀻門亊燕翼全規誡子篇惆悵西山埋恨處定應大鳥淚如泉用後漢楊震事牡丹洛譜丹青􅀃典刑􅀞欄春日見􅂛平金盤薦品承朝露翠幄留香護玉鈴神女賦中羅襪歩少陵詩裏麗人行百壷莫惜花前醉樂事從來不易并海棠桃李無光分落英海棠姿色占春榮雲鬟緑擁粧􅀄罷醉臉紅匀睡未醒任使無香真可意放教千葉更多情光風流轉都能幾莫惜沙頭倒玉缾挽史九万户半生希古振長纓􅀮􅀮胷中冨甲兵三篋􅀘遺安世博千金爲壽魯連輕春風故里鳴珂逺暮兩山丘􅀫草生一傳散仙懐素叙為君珎惜比書評小園即事閑來無事欲何營揔是栽花種栁情汲水漑餘紅藥秀遶欄看得緑隂成身叅化育行當健物喜安舒悟養生放下虚牎時倦卧夢驚還聽乳鳩聲小園清􅃳稍堪觀翠有庭筠馥有蘭未放薔花金作蕾已開梨蘂雪為團鳥欣有託扶踈樹客喜来慿詰曲欄深院日長須細履也勝愁坐两眉攅託陶晋卿借鄭氏所藏刘房山行草效呉躰出入格房山一字三過筆此帖揮洒何其殊臨游親覩長史作透綃又似涪翁書春葩舞女多姿態逺韻髙風見歩趨手追心慕情正切託君為借今何如復作一詩以繼前韻鄭家數幅房山書自􅀏伎癢須臨摹五陵裘馬見年少两漢劒履多文儒㳺談得叙真可壯破塚求法何其愚煩君更撃馮夷鼔未信驪龍不吐珠戊子􅀊􅂖兩日中丞王兄令李子師中携名酒洛花相餉作詩以謝殷厚洛艶紅嬌醴味佳併携春色照人來豐苞細拆先三嗅醁蟻連傾尽数杯北里定應香作陣西園休詠眼慵開維摩乆病行當問好在春風紫錦䑓括九峯禹貢觧北條北境之山􅀳北諸山自代來自寰武風憲四州而耒肧凝首自霍山開連延眷脉為壷口南作析城王屋排復折而西雷首出一支北走太行崖次又一支為大茂四條明白不須猜大卿徐先生挽章諱世隆字威卿金進士第陳州西華人官至集賢大學士壯􅀊巍科擢上游如公樂易更風流文章海内元推轂議論行間宋與儔郷校功存東魯盛炬蓮㤙在北門優自忴狂斐慚提􅅄爭遣鱣堂一拜休至元廿一年予按部東平拜公於􅀻苐之前堂時公巳在病眷眷於予者甚欵既而卒于家壽緫尹劉公一家英氣盖遼東聞􅀃君矦有父風作牧首分青社土䇿勲誰比黒河功化行属邑謳歌裏春自慈闈孝養中今􅀊壽筵光景好榴花渾似舞裙紅龍教授哀挽東郡教授龍君名革字取新廣安人善賦學及五星等術士子從之學者多所沾丐至元辛已與予相遇于滑朝夕從㳺者旬日一良徳君子也後主魏縣簿政有声今兹云亡其子䕫來求挽章特為賦此當年按部館南衙日夕相過興未涯楚産例佻開實學天星推跳見名家大伾山下游竜洞歸鴈亭邊望暮沙此日題詩重惆悵為君回首眷西華南斉任盻之子商左山哀辭啇孫膚敏矯猶龍千載流芳見此公佐魯謀猷元克壯定秦功力更沉雄城門被􅅡池魚涸臣罪當誅聖主聦老淚不縁知已痛麒麟䑓上又秋風夾谷尚書哀挽名之奇字士常終吏部尚書品彚流形萬不同銓量平允侭清通恩非出已知誰怨天不遺賢見道窮三復苦辭歸汶上一官催老掩曹東茫茫大塊升沉裏重為清朝惜至公追挽承㫖王文康公文章四海一康公烱烱元精貫自中盧肇名先金榜重歐陽仙去玉堂空道由實學明真用義不忘君見至忠惆悵當年門下士断雲低䖏望曹東左丞史公哀辝并序左丞史公之薨客有云云者余曰事機之来雖理有難䖏度不違於義其寵辱有不足驚者當克明之無定力以順受䡖則伊欎而自沮重則至憂悸而殞越正以不安而無定力故也嗚呼史公不少􅀮忍以光先正之業而至扵斯其命耶抑以有未安於所受之正耶於是作是詩哀之鬢金貂漢九郷大階平自栢䑓清侭將事業傳鍾不特家声藉父兄自忖行藏無所慊此生榮辱不湏驚辦姦聽徹唐君說淚洒春風滿豸纓丙戌􅀊中秋後二日夢過真定與宣慰張鵬㪯相㑹作詩為贈旣斍頗記首尾意韻因足成之九月十一日忽英甫過衛説張是月此日辛於真定千里提封入控臨不知秋氣上華簮紫泥頒寵何三詔丹扆輸忠見六箴機務固方前日簡論思􅀹比向來深潭園月轉斍􅀌懐媿此心蔓􅂟憲副良友十年局促㐲轅駒解鞅歸來樂自如奔走止縁餬口計支離况是不材樗常因客過知安徤多謝人來問起居把酒竹軒猶昨日清詩想似向來臞􅀉贈介甫憲倅聞除㒷元揔尹方聽新除入歷城忽傳改授漢中行霜空暫息騫飛翮民社教􅄖撫字声伏利試㝷山水堰逺征先䘏異方兵如承髙省相垂問老我山田二頃耕送徐正卿秩滿還漳南共筆灯牎憶昔時只今相頋􅁂成絲三年調議良多益一道將迎不易持辭别巳餘連日惡直清留在後人思漳􅀯未是㱕棲地要與朝家作羽儀謝湯宣慰惠書閑來何物慰窮愁細把調元入校讐相業有方無限事室書能幾不容抽巳欣惠賜承蘇集復夢翻香上郡樓挿架万籖容遍覽鄴侯人道是湯矦代書􅀉友舊二首匪爲窮愁曰著書閉門經史且相娱爲怜魯酒無多味任使陶鉼乏見儲黄卷能敎吾道在青雲未斍故人踈有時夢到烏䑓月奄奄猶勝閉婦車半􅁓功名不足書暮年心緒􅀂爲娱背昧伎俩輸鳩拙度􅀊生涯儉擔儲為寂恐貽髙宻􅀏不才爭似孔融踈退蔵入宻真吾事誰遣門多長者車西村三首和韻種來佳樹日扶踈秋草當堦不忍鋤城府事囂閑静重林墟秋熟物情舒溪行改逕農耕後漁浦移梁水退餘我自興来成獨徃手拖拄杖不巾車近􅀊行蔵匪自踈胷中刺鯁要誅鋤通明縱使同方進樸鈍何如似魏舒堂上咿瀀從肉食橘中㳺戯喜霜餘八騶前馭非吾事正要安徐下澤車忖量身卋兩乖踈去學淵明荷短鋤時事未容閑裏過人心安得老來舒沙鷗逺汎機先識穴䑕深藏壌有餘我軰所行多倒置旱資舟楫水資車􅀉道之憲使仁兄匪爲場苗賦白駒别來多事復何如臣門最喜心如水故第猶知里號樗落落壯爲天外客潭潭老向府中居爲近日二憲使不出司故云使君􅀂問年來况山澤依前老病癯聞平章由公薨扵維陽以詩挽之非藉吾不徒言邂逅欒江讌語頻外䑓􅀄建首先分風雲契厚真吾相魚水情深有分民名在諌垣称鯁直力輸王室最公勤豐碑㑹見十年後猶是中朝第一人丙戌除夜盤花紅卷燭光揺一􅀊迢迢尽此宵凍坼臘香浮栢葉暖移春意上梅梢拊心自信愚忠在流涕還悲髀肉消揣分要知温飽力比生無地荅清朝賀文卿同簽宣慰河朔時真定連年旱乾春風花發四隣香曲巷時過􅀏語長議論有方消鄙薄功名無地不輝光簽書樞府􅀌忠壯愾敵長江一葦航今日八州歸緫轄又煩和氣致時祥同簽趙公挽辭諱良弼字輔之遼東人至元二十三年南遊京洛卒明年正月二十四日夜見於夢托予令易其名諱辞意甚切不然目將不瞑矣遂追作是詩以紀其意識逺幾沉任獨勞不將虛譽冠時髦使華光動扶桑日樞府謀深尚父韜四海樊川遺􅀮在九原精爽與秋髙分明夢裏來相託抵掌猶能似叔敖禮部尚書許公挽辝官至榮禄大夫名國禎字進之翼城人當年劒履上星辰忠謹持心老益振藥籠功名開夀域朝端風度見誠臣勒漿有味霑餘論卿月分光照近隣我自訃聞增悵望白雲長處是滹垠㐫訃􅀄傳不忍聞惜從朝著失忠臣安常毎懼非常寵格物還深濟物仁貶損定交何眷厚燕閑相過更情親轔轔細約車聲去長憶同逰過闕晨宋賔客弘道挽辝景玄絶學到縱横此老猶能見典刑相府才華推上客少㣲光彩動前星誠身􅀄不離儒行進讀何妨􅄂貝經正有莫教傷餒恨併隨神剱閟泉扄公舊有舒辟劍萬有紛華入醉吟都將誠靜粹靈􅁭雲松卧壑存􅀄志望苑霑恩豈本心談並齊諧疑志恠學空滄海别穿深斗間縱有龍泉氣凄断春風緑綺琴追悼叅政李公仲實詩有序至元丁亥二月十日夜夢李叅政仲實􅂯拜向予顧指所佩鞶囊曰吾平生盡在於此他日㑹湏累君但不敢輕易發也旣寤悵然者乆之因追作此詩以見其神交之不昧也昔李衞公見夢於令狐綯懇其北還綯畏其精爽白于帝得以歸葬今李侯明以後事來託予老且閑不知何所頼焉冠劒風雲擁漢庭斗邊喉舌振􅀌聲漢儲與翼非䡖託蜀酒雖多每細傾身後哀榮光謚􅁽夢中精爽似平生分明􅃌顧鞶囊事一縷幽光要累卿挽教官石仲遷名與義鄭州人少爲縣吏後從李野齋學終南京教官臨試東過僕射陂封書投贄識君時生猶櫝玉期三獻死愧囊金昧四知塵丗驚回黄落夢帝京悲動白雲辝因思吾軰豪雄處貧賤能安貴不移送府判李侯赴調東曹其懐與政備見乎辝邶衞交衝辦事難送迎終日不停鞍去官不到􅀲期代在分能居幕職安衙鼓通嚴披訟牒厨煙炊碧澹􅂼盤囬看奔走風塵際却忠新除是振冠代書奉􅀉子明宣慰時爲濟南宣慰五載因官寓鎮陽朋簮盍處佩聲鏘金盤爛醉雲樓酒綉镼其物反今之半臂也出光武紀一作䘿同披燕寢香樂事有懐終會合名泉無計共徜徉空餘情似康崖水一脉勾連到海長夀子􅀄中丞鼓瑟春風記􅀧同轉頭俱作白頭翁逺逰長得知時報微恙行収勿藥功巾卷在庭隨燕几嬰香和露温簾櫳暮年縱有周公夢輸與浮雲度太空送史􅀖直之任竹山縣属房陵更在西一官雖逺儘施為王風漸􅀍無遐邇異俗能安戒鄙夷㑹待竒姿超駿足試教銛頴發囊錐彩旗閙簇清江渡想見春風到任時丙戌嵗除夜去􅀊椒盤一􅀏欒今冬除夕倍凄然奠餘靈桉鍾声後坐對隂容燭影前存殁不堪思徃事康寜還喜過今年數家剰􅀃新春好夢到梅花小雪邉奴星具糗送窮㱕夜乆蘭堂燭影低梅雪溢寒嚴厲鼓枕香留暖􅃳盤犀試傾臘醖歆椒頌已覺春風拂􅀞雞明日書雲䑓上去蒼精横角看杓􅂝荅何劉二端公屢有人來問起居近年為况果何如每承省録常深感欲話行藏不敢書逐末有慚規什一歸田無力把犁鋤時時夢到霜䑓月静聽烏聲尚起予挽李子陽早􅀊龍門接茂材相携有意上台階夜書稱快元康在詩思争髙岳掌開落月滿梁清夢断旅墳三尺野烟埋微官殆似台州鄭拊卷題詩擬八哀三十年前成邂逅酒壚傾徹醉顔開笔端力挽狂瀾倒䄂裏親携太華来淚洒行間遺草在恨埋泉壌劒鋒摧因思秋雨蒼苔句何限令人不飲哀餞士逹御史還䑓通家丗契欝蘭金騘馬南來屡見臨披露義􅁭餘悃愊酌量時務入精深眼中白璧真無價調外朱絃有賞音回首炎荒四千里一杯不惜為重斟秋澗先生大全文集卷第十九
