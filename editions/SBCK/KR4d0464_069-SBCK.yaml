  text: 秋澗先生大全文集卷第六十九
  hash: sha256:1cf0e42a524738383157821fdf9f3eca42be124e073c35c027a2907715ef42df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_069-1a}
body:
  text: 䟽衛輝路創修文廟䟽竊以廟而通祀國家極典禮之尊教以多方庠序乃風化之本子焉而父臣焉而君大凢日用之間無匪聖人之道旣冨而教㠯時則冝猗嗟君子之􅀖久曠素王之位吏之不職孰此重焉學之不講是吾憂也爰興丕構庸示教基擴前日輪奐之規敞百代神明之觀經始雖先於一府賛襄寔賴於諸公蓋􅁟木之資瓦甓之用湏豪傑而共濟庻程度之可完仰止翬飛永鏘玉振春秋二祀肅豆􅇼三代之儀衮冕而王還文物昔年之舊凢我同盟之者即當聞斯行諸謹䟽大成殿上樑䟽伏以起百年之廢不渝乎素心合四境之人用扶其脩㨂凢曰有生之者孰非吾道之中功􅀅底於落成衆能無於小􅂇况郷校半讀書之子而師帥舉稽古之流重瞻􅆁衞之天乆􅀍絃歌之化推求治本一出儒宗敢紆長者之車來聽兒􅀰之偉謹䟽重修衛州蒼谷山廣施王廟䟽伏以民所欲而神必從冝深乎報神有享而民乃主否則疇依顧維明神爰處蒼峪司分雨部權控龍威時罹暵乾禱輙靈應且王號巳昭於舊典而秩恩又見於新條比者祠字年深榱楹日圯塵昏畫像􅃤雷轟電撃之雄瓦落宫墻動木老雲荒之嘆今將上完霧棟旁奕蒼池及時瞻山雨之來闔郡享豐年之賜神報义已豐矣公等冝如何哉謹䟽隰州蒲縣重建嶽廟臺門䟽伏以鐵鳯翔雲神棲固極於壯觀銀臺墮墜天廢必假於人謀眷岱嶽之行宫據蒲城之右麓豐碑具述歷代増崇雖作鎮於東方寔普臨于率􅁟有禱輙應顯化殊常蓋幽明祕不測之神而死生爲揔歸之府兹非尊奉􅂚致敬恭今將大復神譙俾還舊觀計百費以寔愽顧一巳而難爲衆力經營厥功可僝舉蒙少助不日告成靈威肅喬木之風雲氣動􅀌山之色璇題藻棟儼九天來格之儀僚寀􅀺民􅀗三殿護持之福幸垂藻鑑請署芳題玉清觀化縁䟽􅀼以雲飛鶴舉固所去以爲常火食屋居在有生其可闕未遂山林之往所期性命之安如某者忝鄭圃之居乆滿户間之屨慕子真之隱擬耕谷口之雲雖南鄰北里揔是檀那而凌雨震風可踈寢處爲歸翼數飛於夢蝶柰拙謀復甚於林鳩王録事倘助於草堂庚桑楚庻休於畏壘田園成趣平分乎二頃煙霞杖屨它時共樂此一庵風月凢曰通方之士能無尚義之心鄆城縣普濟寺化縁䟽伏㠯建外道􅂣不獨爲天女散花之供祈聖人壽庶或盡臣子永命之心眷髙魚之北郷廼􅀗麟之西鄙古瞻勝槩地發龍光巳霑普濟於明經未覩華嚴之寳界今將百堵具舉精籃聿修需仗衆縁能成妙果道昭者雲龕野衲海嶠行騰卓錫得泉了此這埸諸佛事投竿在水肯教空載月明歸謹䟽請黄先生德新主善䟽三年至榖諸生忍廢於光隂一卷立師學行首明其模範惟大冶有鑄金之妙良工􅀵琢玉之功况漢庭發䇿本之明經而近代程文自有定體欲造科􅂣之捷徑湏求事業之專門伏惟殿元先生藻發儒林道傳絶􅂀継踵于黄氏三山之後探􅄨乎上古八索之前而又馳騁乎百家通貫乎六藝春闈陣合筆驚風雨之聲夢澤胷吞文麗江山之秀乆矣倦游之興偉哉樂育之心倘蒙憫小子之斐狂永以為國人之矜式髙懸絳帳嗣音敢自於吾儕仰属青衿固譲毋勞於謙德謹䟽㐮陵縣重建飛橋化縁䟽伏以平水澮川依約金城之舊彩虹沉影空餘華表之遺矧當晉秦南北之衝有秋夏泛溢之阻僧淸者心存肯搆力振前修經營者己數年奔走者幾萬里毎以力微而事大懼夫始作而終衰驅石必東海之鞭洪波可駕衘木仰西山之鳥尺喙徒勞在他􅀖果於義為豈郷國獨無至意倘􅂷一諾過重千梁少分有限之功隂受無量之福公私安濟免勞鄭國之乗輿遐邇具瞻復覩河東之偉觀謹䟽追薦􅀌䰟化縁䟽切以辝辯游魂雖著長終之變傳明滯魄􅀷詳為厲之文乆失所依誠爲可憫痛彼河南之戰重為天下之傷血殷溱水之波尸蔽奉寕之野兵自休者巳三紀祀而存者能㡬家野􅀕不來愁絶䘮元之勇士沙􅂣半殁盡爲亡社之遺􅀺蕭條蒿里之悲風黯􅃤􅁄林之老月尚過者動虆梩之嘆况仁人同桑梓之情義所當為􅀕而非謟凢我見而知者忍不聞斯行諸故謁同盟畢茲大事魂􅀆來些庻幾貴賤之攸歸心􅀗所安不謂幽明之有識倘蒙金諾請掛銀鈎上張宣慰䟽代劉進之作切以辱甲子於泥塗趙武有由吾之嘆轉江沱之窮鮒昌􅀺云􅄬足之勞懷古傷今而復有此進之先生文摩屈壘心醉麟經學詩得東野之窮好學有征南之癖以壯歳􅀒并汾之氣幾年爲河朔之遊老雖益堅空至於屢拭白首窮途之淚夢黄雲畫角之秋思歸敝廬得甘饘粥撫􅀌松而吊影望先壠以含悲具爾是逢翻然可駕麥舡惠顧一帆助順濟之風華表歸來獨鶴遂長鳴之願伏惟使相學士閤下氣嚴霜簡名在帝心炳趙衰愛日之輝􅋍吏部㤗山之望爰從公議两鎮名藩承流巳浹於河汾宣化又漸於海表去國見似之者喜同聲亟相􅀿之情嗚呼託子而來甞切慕古人之義請書而去思㳺􅀭足下之名爲成尺素幸念郷扮之舊與分鄰燭之光倘請題芳字謹䟽爲宋儒􅀭從龍贖身醵金䟽切以觀軍府而釋鍾儀傳羙晋侯之德解左􅆖而贖世稱晏子之仁古則云然今亦能爾唐風雖儉義則豐荆璞未逢遇和則售士人楊從龍者晋州客吳㑹諸生念江湖當波蕩之餘得升斗遂身安在士庻官寮之者當體寛恩以吹嘘惠費之仁不過一讌倘蒙金諾請署芳題筭學主善䟽眷言六藝數之先訓彼群蒙業必專門之者伏惟冝之先術窺海鏡心洞神機以勾股而測髙深極乗除而盈縮挾此九章之妙屢為一卷之師倘許光臨豈口傳要訣同趣開悟之方手筭万籌庻無倒顛之謹䟽爲刋金䟽發明徳豈惟鄉國之賢関繫民風庻見事為者凡一十五卷計字數近六七萬言其傳必録諸梓惟是閑居之乆苦無力量之多費口粮倘蒙少助雖夜光明月不為暗投公等我正頼有此耳謹䟽太康縣剏建忠武史公祠堂䟽伏以臨危脫難無深骨肉之㤙報徳靡忘莫重春秋之祀太尉忠武公􅇮分帥閫東徇京畿擴仁心而歛兵􅄡招柘城而降陽夏継來臨戍尤盡撫綏雜耕無相擾之􅀻按堵享維新之樂百年父老􅄻自餘休三尺兒童慶延史氏今􅀅起神祠於舊里昭大德於􅀖其等雖經始於一時敢獨專其至羙庻憑衆力易見成功具我時瞻要擬甘棠之木眷言遺愛豈惟墮淚之碑凢我同盟請題芳字秋澗先生大全文集卷第六十九
