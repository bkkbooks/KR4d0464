body:
  text: 樂府行香子乙酉􅀊九月二十五日過林氏西圃與主人公洎張道士㸔花小酌林曰􅀂作數語以記其來使通俗易觧甚佳旣歸不百歩得樂府行香子一闋醉立斜陽浩􅁔而去秋霽遥岑何處登臨水西頭來散閑心遶園細履栽種成隂撚秋香浮酒盌入􅀌斟老境駸駸郷社浮沉醉顔酡白髮盈簮夕陽歸路聽我長吟待野梅芳多載酒再相㝷江神子金朝遺風冬月頭雪令僮軰團取比明抛親好家主人見之即開宴娱賔謂之撇雪㑹去冬無雪今歳􅀄白如此燈下喜賦此詞録奉逹夫且􅀿撇雪故事為一觴之侑也小䆫遥夜失冬嚴􅁴春添捲踈簾掌許氷花撩乱撲風簷喜倒坐中児子輩争指似謝家塩一盃燈下醉掀髯處窮閻㝡情忺萬壠含春江上麥纎纎應􅀏凍吟蘇老子楷病目認青帘眼児媚賦燕子樓用幹臣継路宣叔樂府韻横塘煙淡冷􅆂秋寂寞舊粧樓珠簾夜月露桃幽怨緫是閑愁形滿骨化情縁在此恨􅀂爲休長河觧浣佳人無那倒捲黄流二滿簾夜月耿霜秋雲夣黯歌楼殘燈伴曉夕陽催暮海水添愁天涯地角相思恨誰道此生休一篇照映唐人詩雅千古風流三我來吊古過悲秋徙􅀝夕陽楼畫堂歌舞都能幾日何限幽愁合懽牀冷􅀌眠若争向死前休慿欄閑看一雙鷄鶒對起中流四西風歸燕幾經秋人老水邊楼一燈􅀌枕滿襟清血花也含愁前堂歌吹新声有争佀去來休長河􅀂觧將姝遺恨與淚俱流五呈周幹臣桑榆晚景日駸駸莫厭数相㝷静怜幽境閑談情話與滌煩􅁭濟時幸有諸公在郷社好浮況閑雲却恐西風吹去認做啇霖鵲橋仙壽胡紫山秋香懸桂光風轉蕙掩尽㝷常花卉西城來徃巳風流更點檢生涯次苐堂名休逸䇿扶流憇點閑中風味雞声􅅻動巳扶頭紅日上花稍未起二調羮粉桂愛香種蕙自􅀏秋風野卉兩椽茅屋對青山􅀄不羡入雲髙第將心自逸欲行且憇爲噯清時有味桐江波上一絲風儘容得嚴光不起三金蓮􅁡炬紫山仙侣夣寐青門􅀲圃春風著處是行窩要一􅀏人間今古錦箋佳句新聲金􅈁洒遍薔薇清露東華待漏滿靴霜恐輸與西城杖屨四和劉夣吉䪨髙人非古冲􅁭粹宇要覽德輝飛舉伊周元不是庸人吾志在箕山巢許蘭紉有賦菊香醸􅁰夣断糟床秋雨淵明卧老北䆫風猶勝佀清談夷甫五沉酣徃古棲遲衡宇劇有弓柖此舉長林豊草野塵心是中散生平自許日邊草賦矛頭炊􅁰誰道閑雲有􅀨周宣􅀘衮要深功除喚起當年山甫六金鸞視草蒲輪應召客路人情殊好豈知野鹿飾金鏕志却在長林豊草霜風料峭形容枯槁愁緒百端縈繞故山歸去有茅蘆任束置長沙諌藁七五窮作崇百端相滯破㡌一風吹碎邯鄲道上断人行銷鑠盡元龍豪氣啇顔綺季當時不起悞甚漢家經濟書生薄相到還元要結末黄虀滋味八爲何継先夀調和謀断論思機務許大茫茫疆㝢當年姚宋捄時才聽沙路歸來好語堦飜紅藥省運温樹滿貯春風瑞露眼中庭檜欎蒼蒼道晚節昌於韓圃浣溪沙壽李衛尉矍鑠當年漢伏波紫微垣外侍雕戈笑􅀐天駟下天河華髪雅冝麟閣􅀞春風先送武城歌朱顔休惜捲金荷二内黄道中風栁婆娑半畒隂兩株巧與道相鄰樹頭幽鳥侶知音馬上行人思困睡天邊赤日欲流金觧鞍休惜濯煩􅁭三送王子勉都運関中薊北分㩗已六年秋風淇上又離筵一樽情話重留連内史調兵推漢相春潭通漕􅀏韋堅嶽雲拖翠上吟鞭四題韓氏别墅翠竹連村映白沙小崗回抱一川斜旋開幽沼聽鳴蛙樵客􅈰邊驚橘樂黄塵門外任蜂衙樹頭山色晚來佳五客亭觀漲老雨長河壯怒濤客亭夜乆聽喧號平明兩涘􅄅江皐沙尾没來漁箔短危檣看處客㠶髙斜陽汀草亂青􅂁六夀周幹臣十載相期紫禁遊一官誰想客西州春風閑􅀝仲宣樓四海論交真益友一年好處是中秋壽波無惜捲金甌七吴村道中在平陽府北三十里汾水西三月十五日送客回作緑樹連村際碧山春風吹水漲黄彎沙汀蘋滿釣舟閑薄䆠﨑嶇清議裏風煙吞吐􅀞圖間夕陽明處鳥飛還八至元九年秋九月登秋風亭觀雨呈賊曹叅軍周幹臣雨􅀔蒼山共一雲雨聲作氣張三軍秋風亭下葉繽紛官事何􅁨嚴限促天心不􅀒老農勤夜䆫􅀌客儘先聞九乙亥自夀時二孫行一女孫兒時避人事在汾西廣福院梅􅀧氷梢蠟􅎞凝蘭芽珠樹闘鮮明團欒香火此時情避世逺慚金馬客現山人道老人星雪邊岩檜儘青青十夀湯緫􅃹十載煙花紫禁遊嘉謨曽􅀘翠雲裘歸來尤荷寵光􅄖􅀞戟清香髙北里虎符金節照南州夀波無惜捲吟甌十一夀王子􅀄六合澄清到一家顒顒文物望中華未容詩禮飬蘭芽松栢後凋元有待珪璋􅆂潤本無瑕誥恩行墮五雲花十二王中丞許贈新香不至書此以催之珍品無多百和濃露沾婆律濕蘭叢喜分新供到南豊螺甲未融金雀餅芳菲巳夣碧湘宫寳猊先障綉簾風十三六月􅀄三日與學官髙伯祥夜話於魏府之清潤堂露榻風簾燭影摇故人留話慰瀟條徘徊花月可憐宵天淡有雲空漢漠月明無雨更翛翛洞天歸路踏瓊瑶十四送劉仲元赴平定州親迎青鳥西傳燕尓期乗龍喜氣見脩眉芳倧濃似去年時禁臠名香天盻重玉臺春暖鏡鸞棲人生樂處是新知十五賦筝朋盍華簮醉未霑主人張樂見厭厭一聲銀甲裂霜縑澗水咽氷翻隴怨將軍出塞憶蒙恬碧桃花底王十八賦筆朋盍華簮醉未霑主人張樂見厭􅌅一聲銀甲裂霜縑澗水咽氷翻隴怨􅀅軍出塞憶蒙恬碧桃花底玉笙惉紅翠叢中様度新桃花扇影駐行雲隋唐嘉話閲來真一片錦㠶浮汴水両京花栁暗風塵彩聲曾動鳯城春付髙彦卿十九雨􅀧鳴鐃裂竹聲併随牙板一時停詞源都作建瓴傾白羽揮開諸葛陣蒼濤翻動憲王陵低空知有彩雲横隋末唐􅀄與漢亡干戈此際最搶攘一時人物盡鷹掦褒鄂有􅂕毛髮動曹劉無敵簡書光争教含泣到分香二十旅館灯青夜色曛據牀談劇作春温􅅐中雲夢入雄吞清議素髙烏府月秋霜低壓漲江雲呉山山下惜輕分中秋雖見月桂花出没于雲影間有不快人意者作此詞以歌之月色都輸此夜看人心偏䖏即多慳碧雲吹恨滿瑶天儘着氷壺凉世界故􅀅隂巧妬婵娟桂香和露濕幽弹二十一贈朱簾綉滿意苕華照樂棚緑雲紅灔逐春生捲簾一顧未志情絲竹東山如有約煙花南部舊知名秋風吹醒惜離聲二十二為張右丞壽􅀘衮功深浴鳯池好賢人道佀緇衣佩聲清響見委蛇千􅀊壽祺隂有積兩宫恩睠古來稀東山歌酒樂時熈二十三􅁓帳梅花夜色清行雲香濕堕銀幈惜花人老􅀂為情對酒當歌須適意凌煙圖像是虚名十年編簡幾人青􅀧絳唇夀周幹臣秋氣平分􅀞欄桂樹秋香底良辰羙景􅂸取花前醉彭壽添君白也詩堪擬髙歌起月波如水長照金鐏裏二夀􅃰郡房二尊親露影庭萱一枝金綻釵頭鳯寳花香供壽席光浮動懿範閨門姻族同推重瓊盃捧二親安寵共醉玻璃甕三送董彦才西上􅀭桞青青玉門関外三千里秦山渭水未是消䰟地坦卧東床恐减風雲氣功名際願君着意莫揾春閨淚四癸百夏六月五日同河中府官宴白樓􅀝檻清歌一聲髙遏行雲住長河傾注不煞㬢輪署燕寢清香􅀞棟珠簾雨人何處一樽緑醑滿眼青山暮五題絳州花蕚堂時天暑回自河中一榻清風故山邂逅欣相遇緑隂池樹蕩漾瑶翻處赤日紅塵前日中條路人良苦壯心如故快斥王陽馭六後六月二十二日同府僚宴飲白雲樓時積雨新晴川原四開青障白波非復塵境忽治中英甫索鄙語酒酣耳􅀬以樂府歌之晴􅀝層欄飄飄醉上青鸞背飛雲崩墜萬疊銀濤碎青障白波非復人間丗人懐霽夕陽有意返照千山外七爲房祖母壽婺女呈祥瑞光分自雲衢爛鳯萱金燦留待佳辰綻林下丰容閨壼瞻儀範香縈􅂐玉顔如練􅀊􅀊長康健八夀周幹臣千古詩壇苦吟誰得風騷妙羡君才調一蹴無邊徼􅀊􅀊中秋喜見朱顔好霜蟾皎一蹲傾倒萬事秋毫小九為丞㫖唐壽卿夀秋氣平分欎葱都作􅂶閭喜玉堂風味磊落青雲噐醉墨烏絲緑綺傳湘水千秋􅀊月波如洗長照金罇裏十雨中故人相過誰惜幽居故人相過還䎸語話餘聮歩来看花成趣春雨霏㣲吹濕閑庭户香如霧約君少住讀了離騷去十一春夜喜雨好雨知時萬金􅁒買􅀄無價種花才罷佀爲芳枝下花重宫城好箇風人雅從飄洒探花走馬明日春如􅀞十二雨霄即事春雨空濛晚来􅀧綴閑庭景一􅇃燈影潤入琴絲冷清夜況況誰慰􅀌懐耿雲生鼎􅀝䆫髙詠愛此春霄永十三探花春雨添花繞欄來看花開否海棠紅瘦緑葉花如豆梨雪生香近在清明􅀱花為友莫軽􅇳􅀒預問隣家酒十四喜芍薬發芽紅樂當堦朝来撥土紅芽秀􅀞欄晴晝凭暖佳人䄂一粒丹砂誰􅀧仙根透從今後為渠釀酒去作花間友十五春雨後小桃端正樓空一枝春色誰偷得夜來消息暮雨臙脂濕􅀝竹佳人翠䄂嬌無力湏相覔一罇休惜轉首春狼籍十六已丑清明前一日春露堂即事時旣雨快晴明日書示友人主人出名酒相属因放歌數闋而去實至元二十六年三月七日也可爲不虚度此節矣秋澗老人深香閑適春雨如膏最憐適與清明遇晚晴庭宇􅀞出樊川賦苒苒行雲低拂垂楊度春如許亂花深處幾􅀧薔薇露十七西湾即事碧玉環深一罇同醉清明後緑隂晴晝多少閑花柳身丗虚舟日月驚跳走誰豪右志懷惟有拍泛舩中酒平湖樂十章平湖雲錦碧蓮秋香浥蘭舟透一曲菱歌滿樽酒暫消憂人生安得長如舊醉時記得花枝仍好却羞上老人頭二鑑湖秋水碧於藍心賞隨年淡㧕外蘭舟莫空􅄃典春杉觥舩一棹汾西岸人間萬事暫時放下一􅀏付三平陽好處是汾西水秀山挼翠誰道微官淡無味錦障泥路人争􅀏山翁醉西山殘照関卿何事險忙殺暮鴉啼四秋風嫋嫋白雲飛人在平湖醉雲影湖光淡無際錦幈圍故人逺在千山外百年心事一樽濁酒長使此心違五採菱人語隔秋煙波静如横練入手風光莫流轉共留連􅀞船一􅀏春風靣江山信羙終非吾上問何日是歸年六秋風湖上水増波水底雲隂過憔悴湘纍莫輕和且髙歌凌波幽夣誰驚破佳人望断碧雲暮合道别後意如何七緑荷相背􅀝西風凉露煙霏重翠盖銀瓶醉時捧使君公徑須傾倒玻璃瓮青山城郭暮雲樓閣髙下一重重八安仁㕠鬢巳驚秋更甚眉頭皺一􅀏相逢且開口玉爲舟新詞淡似鵝黄酒醉歸扶路竹西歌吹人道似􅀭州九水邊楊柳緑絲􅂷倒影竒峯墜萬疊蒼山洞庭水碧玻璃一川煙景􅆂珠媚㑹湏滿載百壷春酒撾皷蕩風猗十黄雲罷亞捲秋風社瓮春來重父老持盃十分送使君公秋成不佀今年痛太平天子將何爲報萬壽與天同十一乙亥三月七日宴湖上賦春風吹水漲平湖翠擁秋千柱兩葉蘭撓闘來去萬人呼紅衣出没波深處鰲頭遊賞浣花風物好箇暮春􅀄十二山隂修禊說蘭亭佀覺平湖勝春服􅀄成靚粧瑩玉㕠瓶興來徑入無何境使君髙燕年年此日歌舞樂昇平十三柳邊飛盖簇晴煙人在平湖讌碧㶑瑶翻映歌扇綺羅筵人生幾度春風靣江山􅀞裏一時人物斜日重留連絳桃春堯廟秋社社壇煙淡散林鴉把酒觀多稼霹􅆮絃聲闘髙下􅀏喧譁壤歌亭外山如􅀞朝來致有西山爽氣不羡日夕佳壽李夫人六首眼明欣見太平人環佩嬰香潤洞裏瑶華自髙韻八千春裊煙巳報長生信一盃更買麻姑蒼海安坐看楊塵謝林髙韻本蕭然百􅀊春風靣白髮児孫羡康徤誥鸞觧彩雲扶下長生殿郷閭盛説一家榮飬初不羡魚軒南枝消息小春初香滿閑庭户見説仙家舊風度壽星圗瑞光浮動雲衢婺綉筵開處散花傳琖彩䄂不曽扶小園不惜買花錢粧􅀧蟠桃燕傳語風光莫流轉百來年人生幾度春風靣細思誰佀君家阿媽康徤地行仙牙牙長憶􅀧粧紅曽得含飴弄此日筵前一杯捧白頭翁紫簫吹断繁華夣百年留在故都瓊樹依舊動春風慈親康徤説誰家李氏人難亞鏘鳯筵中見多暇醉簮花肩輿勝佀宫門􅀞從今㸔取君家餘慶門户爛生華壽府僚錦貂千􅀐朔方豪瀚海淵波浩􅀞㦸清香看傾倒醉仙桃秋光雖晚人難老煙花紫禁玉魚金帶新寵照朝􅂁九辛卯九月二十五日夜觧衣欲睡適有飲興顧樽湛餘醁燈綴玉䖝而樂之然酒味頗酷乃以少􅁡漬之浮大白者􅄪覺􅅐中浩浩殊酣適也仍以樂府絳桃春歌之少年鯨吸酒如川甘苦從人勸老大含飴最深戀要中邊一甜掩盡黄柑釅更憐中有百花風味一􅀏爲君妍十􅀏分花露出粧奩香軟金盃㶑滿着華池􅃳吾咽展眉尖坡仙釀法眞堪羡却怜􅁡課蜂児官府辛苦爲誰甜如夣令和曲山韻仕䆠須求遭遇不顧已沾泥絮穣穣丗間人緫􅀍虚名引去引去引去光景促於朝暮半丗隨波從衆幾被狙翁調弄富貴苦相謾一枕槐根春夣春夣春夣况復此身無用友道雨翻雲覆膠􅃮幾人持乆遣興漫題詩客至有錢沽酒沽酒沽酒徑入醉郷無有老境心便多暇束􅅞塵纓髙掛飯飽去㝷君閑歩閑吟閑話閑話閑話過眼紛華都罷柳圏辭六暖煙飄緑楊橋旋結柔圈折細條都把發春閑懊惱碧波深處一時抛野溪邊麗人天金􅈁歌聲碧玉圏觧祓不祥隨水去盡回春色到樽前問春工二分空流水桃花颺曉風欲送春愁何處去一環清影到湘東歩春溪喜追陪相與臨流酹一杯説似碧茵羅襪客逺將愁去莫徘徊秉蘭芳俯銀塘迎致新祥柭舊殃不佀漢皐空觧珮歸時襟䄂有餘香醉留連賞春妍一曲清歌酒十千説與琵琶紅䄂客好將新事曲中傳樂府合歡曲讀開元遺事去取唐人詩而為之一名百衲錦因觀任南麓所􅀞華清宫圗而作驛塵紅荔枝風吹断䌓華一夣空玉輦不來宫殿閉青山依舊御墻中亂横戈柰君何扈從人稀北去多塵土已消紅粉艶荔枝猶到馬嵬坡􅀊東廵洛陽城天樂宫中夜徹明不憶李摹偷曲去酒樓吹笛有新聲雨霖鈴却歸秦猶是張徽一曲新長記上皇和淚聽月明南内更無人憶開元掌中仙入侍深宫二十年長記承天門上燕百官樓下拾金錢錦城頭錦江流回望長安帝儘愁那更血魂來夣裏杜䳌聲在散花樓驛坡前掩嬋姢􅃤亂旌旗指望賢無復一生􅀻語事柘黄􅂁䄂淚􅏰然九龍池百花時樂按梁州愛急吹掲手便拈金椀舞上皇驚􅀏勃拏兒信音沉淚沾􅁭秋雨鈴聲閣道深人到愁來無㑹處不関情處也傷心後庭破子晚眺臨武堂緑樹連逺洲青山壓樹頭落日髙城望煙霏翠滿楼木蘭舟彼汾一曲春風佳可遊驀山溪氷姿綽約翠䄂翻清露林下謝夫人依然是故家風度搔頭玉重雲髻不勝寒繡簾踈凉月細一􅀧香來處清摽一揷脉脉秋如許無語對西風恍當年六朝瓊樹幽䆫深鎻莫厭惜娉婷瑶臺路藐姑仙恐跨青鸞去鵲橋仙大徳辛丑歳八月􅀄四日壽平章相公夫人金波秋静桂欄香重瑞應能羆佳夣錦棚擎出玉麟兒道釋氏老君親送壽筵増慶朝鞍歸控恰及瑶觴拜棒平津起舞棣華歌好一醉玻瓈春甕秋澗先生大全文集卷七十七
