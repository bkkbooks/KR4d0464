front:
  text: 秋磵先生大全文集卷第四十七行狀
  hash: sha256:6ad7371c770b51fe19c08b8547731850496868544f6c7cc201c1735c8625decf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_047-1a}
body:
  text: 故真定五路萬户府叅議兼領衛州事王公行狀曽祖韓某祖韓某父諱某滄州某里王某六十三狀昔王延州有云君子有恵政而無異政史臣傳循吏而無能吏故班孟堅序龔黄鄭召諸人曰生有榮號死見奉祀廪􅅒德譲君子之遺風矣德旣肆乎循政復極乎恵求之今人其惟王衛州乎公諱昌齡宇顯之姓王氏滄州人世雄于財以孝義著稱郷里公少頴悟不凡業儒學嶄然見頭角故大父臨佟嘆曰王氏之宗善積有素嗣續弗絶必矣然起吾門者在此子也貞祐􅀄滄景􅀍兵破公以孤童子能依疆濟難間行歸汴抱􅀒竒節時人未之知也正大末京城戒嚴北面元帥府以材幹辟公授帥府徑歷官積勞遷明威將軍陳州防禦判官適今中書大丞相政緫兵民撫鎮河朔開幕府學良能恢弘父兄之業用薦者起公叅議幕府事公遂悉心畢力知無不爲故得感同風雲合􅀂符契方國朝有事東南城攻野戰餘二十年公籌畫戎幄應變機􅁠無戰無之以至冒矢石輸忠力作士氣雖一時輔佐有不克􅀒荷者􅀄王師次安陸􅀒險之民盤結山谷間備禦完固艱於力取公􅁣然以降集請行時人危之旣抵壁宣示恩信喻以禍福竟招降而全活之􅀊丙申冬天兵次光州時餉道不継主帥命公率十餘人乗栰入焦湖督運中流遇賊甚劇衆怖亂栰傾身没於水者半公獨神色益壯持兵殊死戰賊潰護所運以軍士頼之大振遂取光州凱還丞相嘉公伐謀制勝之略遂留公居守公遂附安反側市肆不昜按堵如故幾於一載及䇿勲盟府主帥累公之績以聞朝廷褒寵之而後奉命北覲通名於天朝者數矣每以生民休戚軍國利病爲巳任而風雪沍寒往返之勞略不之䘏也于今良法善政守而不失者多公所請云辛亥秋七月先皇帝即位正封邑錫勲舊復以汲胙共􅀗新中山陽六縣之地封户書大丞相􅀂古采地然昭其功也時朝廷以汴洛荆徐􅂌丞相經畧之以衛乏人爲􅁨且曰衛當四逹之衝民疲事劇非得二千石良者無以剷夷積弊􅆂飬瘡痏也旣難其人特命公領其事公下車以来敬以奉上恭以執事巨細不遺知所後先哀民之困於繭絲也均徭平賦以畜其力痛政之極於汚染也治官汰吏以清其源并容細民不􅅰市肆懋遷有無以通舟車楗堤防以捍水灾課農桑以抑游手尊王人則修飾館舎免病渉則平治橋梁勵薄俗扶善良禮賢俊贍貧乏衍郛郭廣居㕓通商恵工興滯􅀘弊民不見吏而無吠警之虞士格所恥咸有聞知之懼蓋公之冶化謹身帥先居以廉平不至嚴而巳衛自亂餘以來民耕植居郡東者多而泉水自􅅠城而下崖岸平流駃如掌上稍東復與淇水合秋潦時至涇流之大南際漢金堤田廬爲之一空公為堤黒蕩陂以禦之遂絶横潰之患清水出山陽白鹿嵬公乃度原隰創溝澮漑田余数百頃其興起洑利如此朝歌介􅆁􅅠之間地迫山麓灌莾極目盗闖出没越人於貨行者苦之公乃建議於漕臺周侯德甫州而縣之驛亭平襄南接頓丘於是淵薮之患息馹􅀐之力紓焉而德之波及鄰土者又如此旣而丞相材公之爲酬公之功以其子􅂧􅂶同知衛州節度使事遂有撫卹軍民均平差役勸課農􅮏裁决詞訟治効極多之諭誠以八年之間熈然而春郁乎其文楽囯多士之風還舊􅀚矣巳亥春例上計行臺恇怯苛猛公不忍甫息之民横􅀍侵􅁀遂乃道巴峽抵忠渝哀鳴相府中有以彌綸之也雖􅀗所請竟以􅁨勞致疾東帰以是年冬十月廿日卒於􅉑縣之斜披里春秋六十有三越十一月葬於汲縣王尚材之西原送䘮者餘萬人攀號祖奠凝慕不巳其貴官名土􅀂闊闊左丞姚司農張左轄叅卿王仲禮宣撫張子敬􅂄德孫元輔叚季昌咸逺道致􅀕衛人思之如戴父母明年相與起祠宇立遺像植豐碑壽遺爱􅀊時香火之奉其嚴如生公資明良安雅德量無涯涘風鍳表表口不出􅆇否飾吏以儒外彪中弸慈祥愷悌喜愠不形於色務明大體悃愊無譁持論深長操守匪石其待人御物純以至誠感發人心諄諄訓導􅀂嚴師慈父有銘骨不能忘者􅀄京城厥圍友人某以罪逮捕抵公爲舎匿之竟以獲免篤制徒單雲甫肥遯鄰邑聞公之典衛也幡然来歸爲治堂黌極賓禮選子弟之開敏者從而師之自是郡之文風尤爲煟興又曹取齋通甫由趙來依疽發背自病至終公毉拯殯送曲盡友義北渡後无遺山號稱一代士林之宗愛慕髙義乃有今而後寒士知所歸之嘆每自公退食盤饌稍盛必撤去之曰無􅁀殄天物及宴樂賔客供具豐腆盡於慇厚曰儉於人則不可也餘睱則閱書史接文士晚年􅀹喜作詩歌詠風流不知老之將至至雄章傑句間見層出兼善尺牘行書甞謂下客王惲曰吾少業儒以時艱罔卒所志然胷中緒餘之氣勃勃然日新矣其好學又如此愛其子擇師而教之因訓之曰我不願􅀂富貴能儒素起家弊廬饘粥生飬死葬足矣故於諸生􅅄藉作成爲尤至所交皆天下豪傑其推賢讓能而􅂛諸公者如中山楊西菴廬龍盧叔賢河南鄭子周陽􅁨董端卿皆一時材大夫也公之殁丞相墓􅀕而􅂘之曰昔公勤勞我家三十餘年事無巨細咸仰决焉豈其天奪之速而至於斯俾予煢煢然在疚至有失目折肱之喻哀號之聲感動左右其爲賢主人所惜如此不可謂不遇也不可謂不逹也故論者評公之惠愛􅀋鄭子産忠貞􅀋漢王常智周事悉􅀋蘇令綽權望雅事之其樂於爲善之心又如飢渇之於飲食也苟推而行之天下其功烈豈止是哉夫人姓陳氏齊安人生子男一人韓復少􅀒鍳裁於間母通逹政體用丞相廷薦宣授衛輝路同緫管事其綸章諭之曰故叅議王顯之才行相輔政恕中行俾治衞輝民安事辦今子復良有父風以継述之事考之誠無媿􅀒矣孫二人曰雪山曰鐵山女孫一人曰㓜安嗚呼公生平事業智名勇功囊括無迹恐蕪􅀋之辭不足發越盛德之萬一敢以區區聞見播任興訟之實者勉爲具述託立言君子而圗其不朽焉中綂三年秋九月廿有九日門下王某謹狀太一二代度師贈嗣教重明真人蕭公行狀師諱道熈字光逺本姓韓氏其先汴州人五代祖銀青榮禄大夫璹自唐季來􅀠于衛曾祖奕山舉茂材祖渤進士第父矩隱德不仕度師其仲子也師爲人英偉眉目踈秀豐下美鬚髯三􅀊識字六􅀊能書棲心教法儼然注蕭門二葉之望金正隆間始祖一悟真人以神道設教上動人主所在翕然從風韓氏舉族清修師母閻􅀹極信心深入法海旣孕苦病父請禱於真人真人曰汝韓氏素植善根當産異人且昭陽報然將來必佐吾法門可服吾丹書以安胎息乆之母感異夢旣寤師生果禀竒相充閭之氣肅如也􅂊免懐留飬道宫受度為道士復先訓也􅂯命而受清虚大徳之號大定六年冬十有一月真人羽化於萬壽丈室師纕絰哀慼如䘮考妣於是相宅兆具葬儀及殯整整有法綱而不紊觀者咸嗟異之時師甫滿十祀耳旣􅉎師乃陳寳籙法物具香火陞堂以二代嗣事諭衆有門弟子芋道省劉道固䓁思有以大厭衆心稽首求頌且問師它生云何賢聖師即走筆批曰明月清風大徳頗訝愚人未識忉忉詢吾為誰只是從來太一衆遂讋服歸心焉九年朝廷歆其行異􅃙立萬壽額碑於本觀是后聲教大振門徒增盛東漸于海矣􅀄真人謂靈章寳籙率天神持護遺命起臺中央上為壇屋鐵作户牖庻㡬神靈游居有以妥安之師乃擴充真訓尊光圗籙締􅌟層閣制極壯麗掲以靈章寳藴之名􅀊時醮􅀕為衆生進階之地復建朝元􅀚為祖師墳原道塲仍植豐碑表襮景行不數寒暑内外修治輪奐中度師直以徳教感化曾聲色不動門人子來如趍父事十一年時師殆十有四臘門人鉅鹿李悟真者造請何為仙道師曰做仙佛不難只依一弱字便是爾曰弱者道之用也悟真旣授㫖辝還師曰可速還汝當遷矣明年李不疾而逝殯七日形色如生及㼅舉棺蔑如開視之從中一曰􅃬飛去餘衣衾而巳衆始悟師㫖當遷者即仙也其慧悟如此一日師曵杖逍遥謂左右曰吾旦夕􅁒馳四方可趣治行裝已而世宗詔永海内名僧宗主天長觀事師遂幡然應韶不閱月户外之屨满矣師宻削䟽聚精以備儲乏旣而秋旱京師物涌貴提􅀧陳公者請行化畿内師曰君休矣吾巳辦之或者疑焉不數日陸輦川舟坌集於門下衆服其幾沉物先德􅀶而化時大定十四年也明年春辝還郷里后四年復住趙之太清觀適境内大旱衆禱兩於師曰今藴氣隆蟲願垂慈請命上帝師曰􅀂等宜先竭誠徧走羣祠不應當以吾法行之越三日不雨師乃書飛雷捄旱符一道張浄几上復呪法水數石令州將巳下人酌水沃符畢雨即來矣行未竟雷電雨且尺嵗頼以熟迄今趙人能道其事共二年興陵夢師冠履上謁寤思之遂徴至内殿問以攝生之道對曰嘘噏精氣以清虚自守此野人之事今朝廷清明陛下當允執中道恭已無爲而巳聖躬爲之興及還寵錫甚渥廿六年秋師忽思棲真巖壑因宻謂蕭道宗曰吾門衆萬數試經具戒者完顔志寧王志冲而巳然志冲特純精廉㓗可属後事遂設大醮告禰廟􅂌之傳代祕籙曰君太一第三祖也及銘所付法具云有德輔德天孰可欺慎之敬之永保教基居無何棄几席謝去或問安所之曰吾將遍禮名山與心君作天遊耳遂去後不知所終師風儀瀟爽德宇冲粹􅀓學善文辭動輙數百言樂與四方賢士大夫游談玄論道造極精妙書畫矯矯有魏晋間風格甞自題􅀞像云来自無中來去復空中去来去緫一般要識其間路其明逹又如此生平好振施飬老䘏􅀌近百人人以鏹伍千月給爲率死乃已貧者䘮不能舉衣􅀍棺椁爲俱具之至於持行法籙捕逐􅀑物風聲肅肅除治户庭間殆古之能吏然精一之誠貫逹幽顯降度之功洋溢一世矣師之玄孫某以貞常温􅁉爲五代人天之師服膺先訓追逺盛德心藏不忘越乙夘春具大招之禮葬衣冠於祖塋之側今皇帝登極之三祀光崇玄化貞常師以祖德範圍請謚於朝追贈嗣教重明真人噫道家者流其術固以多矣而太一之法輔行世教有不可勝言者其鴻靈幽祕変化叵測通徹神明之功幾於上下天地把握隂陽者矣然苟非其人道不虗行一傳而至推廣悉備􅀂真一人弘衍􅀶大継志述事之善者也翰林修撰兼國史編修官王惲狀故金吾衛上將軍景州莭度使賈公行狀曽祖鑑祖璋父政公韓德字克仁姓賈氏景州蓧縣從教郷劉卿里人其系緒見學官王鼎所撰衍􅂟碑賈氏前宋時出行管都團練使用威府君之後曽祖鑑志操髙潔恥襲􅄻不仕家素饒財以周急販乏爲事祖瑋性勤儉專事農務故貲益雄鄉里父政事親孝處昆弟間無間言宗族以純至稱生二子長曰贇早卒次即公資秀頴在垂齠時舉止如成人禮旣冠慷􅁣有逺志樂施予不屑屑拘小莭甞與郷人處事談辯雄偉無出其右衆属目異焉曰興賈門者必此子也自是事有疑率質成於公貞祐􅀄燕不能都德陵南幸汴群盗逄䖵起河朔在兾部滋甚澒洶囂混兇熖所灼里陌爲蕭條公􅁣嘆壠首曰大丈夫生世不能除􅁀薙亂建勲名于時掇取冨貴戴履兩間寕無愧怍群俠少壯其言恃其勇往往依附爲用州將材公爲且知衆素所推服自白衣署公爲故城縣丞專徼廵事於是設方畧窮椇株破機牙擒捕招諭不數月㓂難盪平㝷國兵入中夏太師國王營屯彌亘原野聲􅀔火烈震掀河岳元州將某舉城降無幾宋將李益都全乗􅂩西畧甲戍􅀊州遂爲全所取盡質官属妻子以東太師聞變赫怒擁盛兵爲屠域之舉公白於州將曰反復際明以力不支故至此况天道人事嚮背皦然詎能以智計免哉不早爲所楇將噬臍願躬詣軍門請命遂間行至深州帳下太師察公忠誠慰諭殊渥許其請闔城頼以全活大師承制拜公定逺大將軍賜金符提控本州兵馬事丙戍􅀊大師帶孫郡王南畧晋衛明年復東徇魏齊皆從以行其破上黨馬武大名濟南及信安水柵與三齊勁兵閧穆陵歷山下俱􅀗大功英威騰奕冠諸將列益爲太師郡王所知遷鎮國上將軍節度副使兼右副元帥仍改佩金虎符時江陵齊東寕晋與益都界犬牙相入賊李蠻奴寗主薄者引海㓂不時僈軼爲百姓患公連戰破之東鄙遂安陞授金吾衛上將軍景州莭度使􅀊丙申以蓨縣東光阜城呉橋故城􅀠焉􅀊丙申六太子復命以分地所入江陵齊東寕晋八城俾公緫治其事公爲人恬退每物盛爲戒丁未􅀊年五十有二即致政閑居日課家僮軰躬事澤車欵叚􅄖游田野間人不知爲故侯􅀫將也至元十一年甲戍秋七月廿八日以疾終千劉卿里􅀻第之正寢享年八十有三公臨政剛明有断僚友間容辭謙譲急於持吏恵以飬民卒之畏而愛威而不猛循循然有古良吏風􅀄州將以甫離搶攘人心轉側頗任刑立威所犯有事重而情輕者有情連而力嚇者公爲折理營救多所昭雪以從輕議又同列馬侯子趙君妻男㓜女彈壓宋其氏者􅀍虜胥靡营幙間公傾橐資購而良之其輕財重義􅀋多此生平䘮􅀕爲􅀹重甞謂宗属曰兵荒來上數世殯淺土德又早失怙恃其於大葬之禮非竭力盡心罔極之恩何所圗報遂大治塋域表叙昭穆封植林丘而安而措禮莫不備復樹豐碑紀世德以見夫祖宗隂積所致之厚一郡有光焉性喜修㓗裘馬鮮整自少􅀂素䆠然稍渉書傳善左右􅀐射矢不虚發時軰無與之比公八秩時往讌從教别墅二㕙起田間飛鞚回射􅀗焉其精力老不少衰蓋如此夫人髙氏蘇氏魏氏劉氏魏氏以賢配稱夫人梁氏施氏張氏馮氏王氏李氏亦俱有淑行如夫人者三人楊氏趙氏張氏子男一十八人曰荗宣授金虎符昭勇大將軍左翼侍衛親軍都指揮使行淮東左副都元帥府事謨勇忠謹以良將稱善射蓋家法云曰著前宣差景州管民長官曰莘未仕曰芳樺車弩千户曰蔚未仕曰英宣差滄州節度同知性方直有從政才曰仲温前景州課稅所長官廉能有幹局曰毅前河間路諸軍奥魯緫管曰萍前征行千戸曰僖曰蕙未仕曰玉前征行千户曰芝未仕曰蒿前景州勸農提領曰彬曰仲信曰進曰璧俱未仕女一人嫡夫人髙氏所出適侍衛親軍千户張琬男孫四十九人茂之于乃满歹宣授金牌侍衛親軍千户重孫一十人兄贇子一人曰榮前景州奥魯千户榮之子三人重孫二人嗚呼盛哉十四年丁丑春元帥嗣侯茂曁弟仲温介叅謀趙君禹卿提􅀧李練師子玄来謁予曰先都帥祔葬墓木巳拱比年國朝方平一江左不肖忝居戎右用是其表見神道者未即樹立以慰下泉霜露之愴不遑寕處今將託立言君子圗其不朽焉敢再拜以事狀爲嘱遂勉爲次第之故蠡州管匠提領史府君行狀府君諱忠字良臣姓史氏蠡州􅀶野縣盂家里人曽大父曁祖世在野俱以伯仲稱父韓成継業耕稼善因地利自髙祖巳降昆弟宣多至府君凢五世同居藹然以孝義渢一郷君児時日庤錢鏄爲戯及長資純厚與人交不妄言謹身節用致桑士滋殖然慷􅁣有顧慮料事多合情得冝里人推其識直凡所疑滯必諮焉而後行貞祐􅀄國兵入中夏蠡􅀍圍太守鐡哥嬰城自固民懔懔崩角莫知所属欲鳥獸散公約衆合謀曰金駕而南委河朔去州又自顧不暇事􅀔至比吾軰將安所託正有畏天順時得全性命爲計之上不然何爲束手俟死衆以君素有畫可仰聽焉遂率孟莊鐡千兩河夏村䓁老稚百餘人持牛酒詣太師國王行帳􅄬附王矜其情許焉命公前慰諭者良乆且給符約遣各歸田里尋州破鄰郷多􅀍屠掠唯孟莊兩河䓁里得按堵如故兵後􅀊飢疫公惻然興感曰家幸嬴餘胡可坐視郷人轉死溝壑即出蓋藏粟五百餘石計口而恵之頼安活者甚衆其散而復業者往往力殫具乏公爲假牛畜耒耜􅡡種有因疾田蕪不克治者公廼侣結義社相捄助於是秋􅀗皆有得家具酒食勞公以謝其德公曰患難相䘏人之常道奚謝爲苐比年来仰荷天休稍即温飫不以禮道維持羣居雜處未免侵犯争閱之事衆對惟君見訓俾終厥惠君雖不經見聞遇子弟必申以孝弟父兄則勉以恩愛聞順而善事者心需之飲食以蓄其良心彼游陏有安狎于不順者即畏以官府使懲戒於是田里安集不知出䘮亂之餘而有譲畔敬饁之漸每冬夏設粥瀋於路以濟行人其周急濟物􅀋如此聲稱傳播時人有義門史氏之目州緫匠王公興秀賢其爲曰吾甞聞居家理可移治於官遂薦于行省劉公署工匠提領府君感其見知盡心所事於是配能否均程課革舊弊皆有條次不紊及考工器率堅良精緻且合時度不爲巧虚積料餘徼幹局稱乂未甞竊徒工治巳􅀻以自􅃾揔匠每稱能以勵其餘某年月日以疾終于家享年八十有五葬孟莊北原先塋之次識者謂公德純行美効官及物者甚廣其儲祥萃慶不在其身而子孫將有勃然興者娶同里某氏柔順勤儉克配公徳生二子長曰伯祥次曰伯福㓜承訓導俱孝而友或以襲父職爲言伯祥曰吾家世服井畒以孝悌相傳逮吾先人輕財重義表率一郷雖遭罹世故所立挺挺然大先業爲有光今于昆苐二人無所肖似継守田廬􅀒薪之責惟罔克是􅅥苐知勤敷菑修􅆠畎寒耕􅀬耨濬源培本使先世之澤渟蓄汪􅐮霑漑後人俟其可以起史氏者廼所職耳聞者歎其志逺而有所見也及子弼長性謙謹寡言􅀏顔赫然軀􅆬魁偉孔武有力年十六七時耕牧田間午憇桑䕃下父往饁遥睨有玄虺穴其口父大駭趣呼之寤問焉曰無所覺自是手力愈􅀂神助遂精習挺槊又善左右􅀐射赳赳然負干城之氣揔匠王公子前僮􅀜使彦弼異而妻焉舉於左丞相耶律公一見竒之得給事省府適考工上新製鐙弩力踰十鈎近臣有言弼材勇善挽此者即召見試有驗命列名扈從仍賜白金御以壯其勇不一二􅀊譯語國字皆通習之嘗奉㫖數軍實于邊􅩌岳祠於雒精簡而敝去壯麗而費省由是廉幹之稱聞于朝上知其可用至元巳巳命佐帥臣劉整南伐轉戰江漢間􅀂鏖峨眉掀松陽㧞樊城下㐮陽飛渡大江併圍維􅀭率内簿先登及論功每在諸將右寳鞍錦服寵賚殊渥始自漢兵揔管授金虎符懷逺大將軍行軍萬户加定逺安逺陞昭勇大將軍淮東大都督改揚州逹魯花赤今由鎮國上將軍進中奉大夫叅知政事行黄州路宣慰使旣拜命乃謀於婦翁奉直曰弼自惟起身壠畒遭際風雲􅀍沐恩遇以汗馬微勞不十五年間致仕將相其於史氏其榮極矣兹蓋祖宗勤苦純儉累積攸厚一旦發越於藐焉之躬者如是丕顯可不知其所自哉欲報之德有懇求懿筆著信於後者論述隂積表樹丘壠而傳不朽庻幾顯􅀭之道奉直曰冝矣遂託樞相賛皇趙公及􅀜使王君以事􅃺求属因勉爲次第之中奉大夫之攵今年六十母夫人某氏􅀂干壽皆享有全福叔之子曰輔管軍千户次曰翊未仕中奉之于曰蠡奴女一人曰燕哥至元戊寅三月晦日謹狀太一五祖演化貞常眞人行狀師姓李氏諱居壽宇伯仁道號淳然子衛之汲縣西晋里人生有淑質沉黙寡言􅀏自㓜喜遒家之學年十三拜太一四代祖中和仁靖真人爲師旦夕給侍左右進退應對容度詳謹中和知其可教甚善待之戊戍嵗受戒爲道士命典符籙科式等事籙文部帙靈章寳􅂐仙階顯職稱號廣􅀶師裝繕嚴整銓次詳明大稱所委壬子􅀊聖主居潜邸駐驆嶺上以安車召中和真人於衛旣至燕見之次薦師才識明敏志行淳和請傳嗣爲五代祖仍從誓約昜姓爲蕭即􅀩允可賜號貞常大師仍授紫衣其年冬中和謝世中和人品道價髙眎一世師嗣挈玄綱以簡重堅㓗持守成規洞洞属属􅀂恐失墜及其張皇道紀醻酢事冝其應如響由是徒衆厭服聽約束惟謹前人之光曽不少佚時衛大旱守官致禱于師即書太一靈符浸巨盎中騰呪未畢雲葉膚合澍雨霑足致德譽日廣上聞於朝巳未春上南廵駐驆淇右重師之請幸所居萬壽宫悵真仙之倐去喜付􅂌之得人周歷殿廡詢慰者乆之師敷對誠欵允恊睿意眷顧光寵於焉伊始明年庚申中綂建元春正月命師即本宫設黄籙静醮􅁳薦江淮戰殁一切非命者迎奏際隂風凄凛􅀂有趍赴􅃤泣之狀秋九月詔赴闕下上親諭修祈祓金籙醮筵翼日特賜號太一演化貞常真人二年冬上命禜斗於厚載門親詣祝香仍賚錦紋綾帔四年秋遣近侍護師頒香岳瀆䓁祠仍賑濟貧乏至元三年以京師劉氏宅賜師爲齋潔待問之所六年春皇嗣請師禱祀上真用介繁祉受釐之餘遂賚師金冠錦服玉佩付焉八年螟蝗爲災命師即岱宗汾睢設驅屏法供秋乃大熟十年正月就上都大安閣演金籙科儀時春寒賜黒狐裘貂帽各一冬十月奉安真武神位於昭應新宫禮畢中宫衣以異製綾道服大内青宫肇造之􅀄皆詔師按太一符云禳鎮方所十一年特㫖於奉先坊創大一廣福萬壽宫中建齋壇継太保劉秉忠禋六丁神將􅀊給道衆粟帛有差十五年奉㫖􅀕七元星君於西府鐘室啓告之􅀄期以風動所樹幡標爲神君格思之驗旣而儲皇親臨炷香冷颼䬃至幡影飃颺從官劒佩鏗鏘肅然爲起敬明日具陳其事上甚喜越明年以事辭結遁壇命昜七元斗位聖上儲皇以師積年致禱精誠多獲靈應前後賜與如玉尊像寳粧劒安車龍杖金銀器皿等物不可殫紀師爰自傳嗣以来奏謚始祖曰太一一悟傳教真人二代祖曰太一嗣教重明真人三代祖曰太一體道虚寂真人四代祖曰太一中和仁靖真人焚黄昭告典禮華縟存殁有榮焉至元三年以重修祖觀殿宇告成以聞蒙勑辭臣製碑鋪敦教基具紀本末復奏受保舉師張善淵真靖大師教門提􅀧監度師髙昌齡保真崇德大師髙弟李全祐觀妙大師范全定希真大師及欽承璽書護持玄門其弘闡宗教殊爲光顯師以至元十七年七月廿六日羽化於西堂方丈享年六十治命令觀妙大師李全祐嗣主法席訃聞上嗟悼乆之儲皇􅐠楮幣三十定仍諭中書省給威儀祖送其年十月遣使護䘮歸葬衛州汲縣四門村祖塋之次師丰儀秀偉清修有操行謙虚篤實不事表襮混然與物無忤而􅅐中風鑒殊皜皜也與人交誠欵有藴藉所談率以忠信孝慈爲行身之本未甞露香火餘習生平問學不斯須離如飢渇之於飲食其易傳皇極三式等書皆通究其理晚節德量弘衍慱大不可涯涘冝其爲聖皇挹真風属祕祀留􅀫宫禁叅預庭議師素以憂深思逺理或未暢形於顔色故因方便而霈德澤之厖即詢訪而禆時政之闕横覆道䕃成敷錫之美者多矣惟其玄黙不出叵得而詳論者謂師雖方外士其至誠上感盖有君臣慶㑹之契古人稱上士學道輔世主以洽好生之德師其有焉旣窆之二年嗣教真人將以師言行請於朝植碑神門揄􅀭追報以慰華表歸來之想以不肖惲與師義同里閈交且欵知師爲頗詳以事狀見託謹按綱首楊等所具行實勉爲件右庻幾太史秉筆者得以採擇焉至元十九年十二月廿一日中議大夫治書侍御史行御史臺事王惲謹狀秋澗先生大全文集卷第四十七
