  text: 秋澗先生大全文集卷第三十
  hash: sha256:5379bec9d90d18e95180bcf77d7be486ec87458abd0bf1116edb65df832e75f7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_030-1a}
body:
  text: 七言絶句題蘭氏三桂堂字􅀃手卷當年山斗仰蘭公此日開封有父風著眼讀書堂下去又看三桂發春紅著一作放題玉局公所畫竹石秋壑家藏此老何心作此君一枝中發錦江春無窮露葉烟梢意散作先生百億身関河形􅀔圖関河百二控秦頭滿目斜陽獨􅀝樓設險守􅀖湏尚徳每多呉起􅀃文侯秦川展掌華山髙千古関河緯構牢早晩去施通済手浮航如畫鎻驚濤壓関樓上醉慿欄一片黄流入断山彼索此強俱寂寞山河空鎻夕陽閑解鞍圖川流縈帶燒痕青万帳風烟扈漢營長記散軍郊射罷丹青圖上看升平瀟瀟牙帳野河春羽獵歸來日未曛展放􅀞圖還記得二年鞍馬過牛群髙空雲逈射鵰還細草平沙困解鞍醉裏清寒將夢去春風吹雪􅀧旗竿題黄門飛鞚圖金錯盤陀絡玉鞿春風飛影下瑶池丹青明見臚傳意花栁深宫燕八姨年年十月幸温湯詔給辝臣半驌驦㝡見流雲瀟洒處津陽春色晚蒼蒼讀唐武后曌紀秋日花開未足災有􅀲無可摘黄臺􅃈間辦著青娥􅀏争指朝堂􅀑朴來讀狄梁公傳魚鱉霑恩徧九垓鳯池春色接鵉臺敝􅂁不染梁公血辨作幽囹一聚埃二馬圖振鬛長鳴万馬瘖肯教閑損絡頭金多應縱鴐華清去飛過宫前御桞隂讀冨鄭公傳奉詔東來止國門悔􅀅威克動􅃊宸繞炉不合終宵眼六丈方知是聖人玉堂閑適圖醉岸烏紗殿影東宫花低映酒波紅興來草罷長楊賦独占髙槐洒晚風淵明漉酒圖此圖以氣象筆法較之恐是王雲筆也雲秦人意匠多偉䴡而少雍容余嘗觀斬蛟及内殿横吹等圖故敢指此殆雲之筆也然近代以來如雲之工者亦不可多得云秋澗老人王惲序牀頭新醸漉來空清濁君看固不同門外徴車揮巳去秋香籬落醉西風紛紛葛屨雜華纓何物衣冠可重輕莫􅀂脫來還漉酒一杯時復聖之清秫田一粒不霑唇長恐春醪􅀒此巾儘着輕紗渾溼却􅀹勝憔悴染京塵停雲時鳥日從容長在先生醉眼中刘宋禅來非一事五株楊桞自春風蒲輪逺聘亦醲恩處士雖㣲實晋臣常愛紫陽書法當不教輕染􅀉奴塵荘宗横吹圖郭相西征奏凱還阿嬌􅂬寵鏡交鵉􅁍嫌暖殿春風燠玉管横翻曉吹寒覇業艱難百􅀾開侈心何苦溺優俳豈知兩部仙韶器揔是君王火葬材継周南樂見􅀉􅃊韻長慶詞人興􅀉長當時元白闘軒昂江山正有潮陽筆千古詩壇自一行一作細嚼君詩興緒長孤吟空效鶴頭昂觧教老媪能通曉留與香山作鴈行莫嗟朝鏡􅁂毛霜揔道寒花晩莭昌一級散官增正七三升春酒醉公堂茆亭秋月水天上下月㣲茫冷浸茆亭夜色蒼我欲去㝷幽隱客一天風露静琴張括諸山水势兩分兾北諸山水兩分山西流注㑹龍門春東衆壑歸幽野號作桑乾入海奔復作詩以賛之聀方引據􅀃空繁到底終無一定言愛殺九􅈐真具眼髙空直下看中原􅀉馬左丞子卿士逹察判行求先容不敢書謹以乱道二章􅂓代起居之問且奉一􅙾云治道元來有本根聚精都在鳯池春近因拈出中堂記滿眼經綸半魯人一别春坊􅀊五過向來心事緫蹉跎遥怜紅藥堦前露霑丐茆茨意最多學圃亭崔君􅀮徳老譚經俯仰乾坤一草亭莫為処心親細事正冝烹煑削蕪菁桔橰上下任畦丁春韭秋􅂼用不勝􅀂向邵生親問訊􅀲田風味勝東陵明農􅃱事称周宰抱甕澆畦􅀃漢隂兩事􅀂論為拙計空拳搏虎更何心庚􅀰三韭種來靑鄭老秋􅀲結巳成食肉飯􅂼元有分不應空恋五侯鯖鄭老爲􅀲州刺史審也東鄰近接香山里南汭今稱處士涯活計看來无不惡自鋤明月種梅花題紅葉扇頭故宫秋色醉來鮮浥露吟風雜暮蝉折得不浮流水去一枝留伴月中仙深宫不禁水東流賦就幽情孰與酬紅露滿山秋正好等閑休上建章楼今年火盛􅀂爲攻盻盻西風一掃空忽見扇頭紅錦色上陽秋意滿呉宫雅歌一十二首并序雅歌者爲丞相武公作也公經略河南之三年有詔士計行臺時􅁠臣承制威震中外拭吻磨牙婪婪横噬凡可以中傷羣辟者靡不畢至公以大忠至謹乃心王室歛衆人之責為己責以天下之􅁨為巳憂雖困於跋疐一身利害略不爲恤也盖欲俾朝廷上存公恕下不失民心為重其大節有如此者竟能感格帝心恩終簡在自非精忠貫日其孰能與於此哉所謂臨大事處大変而后見其真將真相之度焉因追作雅􅁔一十五章庻幾流播斯羙使後人頌而歌之顧望􅀂神人然其辝曰讀來黄卷有深功都見平時日用中朝下引車常慕藺行間㧞士每知蒙隂闔陽開制揔司諸人何與到傾危㣲臣有罪天王聖不患朝廷遠不知衮冕桓圭極品榮校來得失一毫輕空摶馬援囊珠謗終見汾陽貫日誠天蓄靁風未動威栖栖遵渚歎鴻飛見知正頼龍潜帝笳皷歸來有衮衣萬馬瀟瀟入漢巴行臺東下控中華方思霖雨湏賢相豈特春風動虎牙萋菲方成具錦哀睿思熒惑􅀂爲開天教中令心如日几几俄瞻赤舄來品彚流形共化權􅀊寒都到老松邉欺残太古隂崖雪始信貞心老更堅儀比鵉凰重比山功髙心小古爲艱平生幹當江南事事了身名兩不関羣飛鎩翮入􅆯羅􅁄上青蠅訝許多良玉儘禁三試火周人坐搆百升歌亢則憑凌懦則摧秋霜中烈外低􅆦虎臣剰有囬天力更着閹児与孽媒拓境毎憂王土窄息肩思与万方休生平戀闕丹心在風雨何傷一葉秋身任安危五十年老臣懷抱􅀂爲宣始終正有汾陽夢不到江湖范蠡舡長圍破蔡仁聲著積糓吞呉策畫深三十年來分閫地智名功勇揔無心長憶中堂掌固􅀄宛陪髙歩在亨衢百官礼絶真除日門閤蕭然一事無釣魚山下護龍旂番􅊘江边奏凱歸一馬二僮東下日路人拭目認征衣丁亥􅀊門帖子坐賈謀生計巳癡歸田無力理耕縻一家風雪渾閑事四海豐穣是素期汴梁故宫寒食人家賣酒繞宫池争挿青旗曲作圍簘皷漸多寒食近一撙先爲典春衣熈春閣傑閣當年燕御頻鼎烟未盡慘兵塵土堦三尺茆茨底人自熈熈物自春􅀝竹圗錦字挑香翠易顰一枝脩竹立湘裙定情正在氷霜操下到琴臺日暮雲粉香沾䄂怯輕寒都着幽情􅀉竹間多是楚山湘水怨不應空待賣珠還巳丑􅀊門帖子大􅀰赴部應求叙老子傳心要醉經二事儻能如所􅂅一家編簡有餘青韓生寤寐春秋學陳孺薰酣宝訓文磨礪童孫能寸進一家春色看禅雲題顕宗墨竹撫軍睿思到湖文筆底秋筠見本根絶似承華欄檻看露梢烟葉揔龍孫尭民圗日出漁佃日夕歌􅅙衣耕食樂天和細思歴象星辰外帝力於人更有何巳丑五月十五日過王氏祠堂兩軒梅竹足興哀親見春山手自栽前日問安人不見翻翻風葉送愁來兩丗規模有逺圖轉頭庭樹影扶踈頋瞻阿大中郎軰信斍嵇公徳未􅀌巢父飲牛圗濁泥常恐汚吾牛特地駈來飲碧流縱使許由辤位去汗顔終是對宸旒耕田鑿井不知勞長恐逃名未得逃㝡喜帝尭平治事一犂春雨滿江臯徴庸禅譲兩無心駈飲時過碧澗潯􅀂見後人牛傳事入山唯恐不幽深舜授尭傳兩不聞㝡怜牛力晚來新一鞭了却東臯事潁水箕山分外春苦訝箕山易所操雖辝堯譲匪吾曹桐江江上垂綸客一様清凨万古髙清明后二日南庄拜掃囬偶占寒食人家莭巳過秋千猶在院東坡今年春日光風好拜掃帰來􅀏語多野叟争求醉筆新因書聊歇杯頻勸農􅀃有新冠盖要識君侯是老親送􅁙挽歌髙墳嶣嶤没荒草白楊風悲和􅀑歗人生到此是徹頭一例􅁅塵無醜好祖筵􅅻徹哀號起翣桞多儀殯蒿里向來送者各還家􅁳􅁳独卧黄泉㡳人丗何短白髪多駒􅂩光隂不奈何才見春風吹草緑又看庭樹葉辭柯人命輕㣲如薤露百年歡樂能幾度森森􅀑伯􅀂來催相將共入黄壚去哭聲交慘簘笳咽樹架增嚴縞素餘昨夜髙堂猶暖􅀬今宵荒野恨何如相將执紼送華輈毋子恩深哭不休报徳不銷埋石痛低空還有断雲愁方相擊凶魂攪馬閭里親知滿中野只知哀挽送行人相看誰是長年者細君推氏哀辭神情减自女挐􅂢病後支持又八年最着老懐悲悼処死猶知惜􅀞义錢性姿貞静伯􅁎㳟四十三年好夢空一閟夜臺無復見悲聲留在白楊風歛來三夜夢平生明􅀃先姑巳侍行䘮称有無能戚了何須易治太經營中堂北隩挂殘魂恋恋情思在子孫奉祀更當嚴在日忍令哭臨限朝昏水西原上有新塋三丗親䘮力助成一旦夢随先妣去有知當慰未忘情􅅻過弥誕無旬月遽変辭容只兩朝宝靨暗􅇔嵓菊細黛蛾空見逺山遥營葺貧家鵲有巢百年心事憶同牢空餘深夜囬溪月獨見凌波采澗毛六十難爲大折悲百年偕老是同期篋衣滿意遺薌在空結纓䄜九十儀病􅀝中庐望大児姢姢心目巳難支朦朣帳影魂衣闇腸断燈前擁䯻時暗用通德悲野田荒草事去年扶病上新塋歌管杯盤水曲亭今日重來人不見杏花零落桞條青素棺巳蓋鋪丹旐舊物難窺瘞玉臺苒苒縱随仙馭去姗姗猶憶夢中來將持仲子庻同嫡主葺貧家儉作豐存殁較來無少慊正縁余厄􅃱終凶恩榮頗浹魚軒貴禄食同霑石窌田忍死最怜相叩問六旬之上有餘年舒徐委􅍤澣餘衣能盡桃夭灼灼冝四十三年中饋地儼然宗祖饗多儀團圞香火坐庭闈欲話平生氣已㣲生死慮來真大事幾囬含􅀏􅀃先歸逝水碧縈長寝地􅀞簾香黯送時車閑䆫不待粧奩感遺恨空存禱嶽書百年同穴是同期一病彌留秋草萎垂老境中成死别九泉相見話真知緡錢􅁅冷過黄昏閃閃寒缸閉閤門只有此生來夢裏幾逥含泣認離魂徤婦治家勝丈夫維君真与徤同符半生黽勉公家事一米􅀻門不纇吾􅂆余過飲省文思切戒無多酒後辭翁媪老來惟我尔百年門户要扶持蘭枯蕙槁不禁風一夕吹香入殯宫把酒試澆橋下水不容􅀅恨到湘東當餐愁對齊眉案升屋空留復魄衣誰遣兩行知巳淚浪浪併向老來揮薦蘩人去露堂空内助功多想粛雍􅀃似老荘休鼓􅇲固無形氣柰情鍾壷􅄴朝奠愴蒿蔒露􅊜衰衣半淚痕毎嘱児童莫歸早水邉恐有未招魂忘懐無似老荘盆便作何知委路塵詩到悼亡能自釋情文相􅁛是安仁祢殯親遷􅁙百泉乆謀銘誄入瑶䥴君須少候無多恨行見貞珉表墓前長筵拜慶諸􅁎上隨宦名􅀖二紀間秋入池臺芳徑歇春歸庭院落花閑行來古禮不多難含歛堋蔵淚涕澘莫訝􅀄終無佛事此心求在有無間衣衾棺槨無遺憾親戚悲哀有至情二十三年庚子月西河原上􅁙先塋李早蕃馬圖群奔角壮任郊埛巳入竿頭莫力争惜取蹄間三丈逸望雲秋計鐡山程跋藍関圖潮陽英氣凛中天愁絶南荒瘴海烟不道生還隂有相自陳哀表亦堪憐晚凨吹雪下関頭􅀧綴行人去國愁展盡􅀞圖還自惜七閩南下即潮州題趙克敬遺安亭襄陽苦莭􅀃龐公趙氏貽謀意與同肯羡東隣驟榮貴轉頭歌舞􅀞堂空趙生卓爾見青衿及長行身􅁛克欽為問遺安安所止一家鴻鵠住高林題張氏􅃱楽堂生前菽水儘餘歡身後追思丗所難誰似考城張孝子至今供具㓗盤餐刻桷丹楹燕寢新食前方丈處華裀一杯不及慈顔樂􅀒米終慚季路貧夀萱亭葵丘張氏孝無違終歳承顔著彩衣入户僾然親不見一簾風月澹春輝凱風吹􅁄􅁄心柔罔極恩深痛莫醻不羡潘興花滿縣一枝金鳯儘忘憂潘店早發一鞭行色甌閩道過処人多􅀃險夷忠義此心能自信風波前路不湏疑儀封三代漸民道義深抱関疇匪大賢心按雲􅅻遂瞻依願便解天教振鐸音睢州道中馳傳北經梁孝苑垂鞭東過宋襄城征人折盡隋堤桞風捲枯蓬逐馬行汴堤近自汴州開夾道逺連淮甸卧長虹􅀂論徃返行人便道在勞民却有功寕陵縣早發殘缸斜照耿􅀌懷夜乆吟餘氣頗諧睡暖不知霜力重起看梧葉滿庭堦蕭相國廟海寓清澄入帝圖忍􅀅牛渴飲泥汚不思世教從中降得約秦苛意儘都聞畸人話芒碭山事芒碭山逺欎蒼蒼断口雲連十里長兩叚素蛇今化石至今神異銳髙皇望碭山縣有感裴劉起義晋陽宫三百年來立國雄一旦剪夷無噍􅁼厲階誰想在全忠􅀫州道中辟寒湏酒多難飲數堠前征覺易行前去維揚猶七百黄雲衰草􅀫州城樓子店道中汴溝巳是荒亡跡湖石重開禍亂基徽煬較來同一病九泉相見不相􅅓敗盟無策更開邉万石移來起艮山天意故遺亡國恨兩堤秋草卧孱顔虹縣道中度長直溝望入綏寕接楚雲老婆山逺界溝鄰小河河上淮東地万頃黄蘆不見人渡江生平夢寐􅀲州渡此日風煙指顧間却恨中流凨浪惡雄觀應欠上金山潤州甘露寺近為火焚掃地望空北顧無􅀟寺行入西津第一州江影隔山揺素練行雲和夢􅃈朱楼桃源圖刘君卿索賦淵明旣號􅁑天民流水桃花到処春明見筆端閑寓興武陵休苦殢漁人東來連舸泛長湖兩􅁂氷霜儘瘁癯偶值漁􅀰心巳媿更堪三復武陵圖浙西到処武陵溪稍渉幽深路便迷始信避秦元寓􅀃渊明遺丗厭覊栖虎丘寺真娘誰爲惜娉婷李白題詩在竹亭洗鷓班金縷盌細烹泉眼較中泠姑蘇館夜雨呉亡越覇两蝸争朔吹飜江恨未平一夜不眠思徃事姑蘇臺下雨連明􅀫寒山寺借榻僧䆫夜氣清梅花香細燭花明鐘聲不取唐人例一􅁴安眠徹五更伏生授書圖遺書􅁅冷散飛煙老喙重宣即粲然三䇿竟從名數􅀃穎川方寸殆虚傳題醉􅀮墨竹清溪映竹竹連雲苒苒晴梢醉墨新却為􅀊寒心事苦煖烟濃淡要横陳露梢風葉喜晴春醉掃吟看卧竹根欲見此君生意盛滿川煙雨半龍孫西湖一湖碧水山三面滿眼楼臺堰一條只為近年荒廢乆花無容色竹無憀飛來峰西湖廢撤無多景靈隱荘􅃊有勝幽扶杖冷泉亭上看日斜猶爲此山留靈隱寺山縁松竹煙光潤寺􅀝峰峦地位雄凭檻忽驚靈鷲上丗間真有化人宫旋開僧牖觀山罷閑逐遊人看寺廽買得兩錢乾菓子歩穿經洞引猿來錢塘噫流無壯浙江潮刀削銀塘甃石牢三十里長凢兩用旣防崖路障驚濤錢塘西岸市楼接望無三里嶺嶂囬環自一川曉日人家炊㸑罷竹籬香滿碧松烟人家邸閤絡江臯十室看來四五逃閑向老人詢所以近縁軍過苦相搔富陽縣㑹江楼山光簇簇無連嶂江水瀰瀰漲碧瀾何処風烟見真境冨陽楼上􅀝闌干冨陽道中兩浙風煙入冨春眼中形勝閗一樽不吸江山渌􅀏煞桐庐把釣人江山􅀞裏看清雄魚稻郷中樂􅀊豐不是釣壇壇上客未能忘此就三公早過新城黄山鎮二首水無絶壑山無麓春麥収來秧稲穀行穿松逕看烟巒一叚碧紗籠水玉奥溪引作長畦浸􅀫霧空􅄥破墨山馬上不知行役倦村村都在􅀞圗間白峯嶺儀曹苦厭爲山囚霧幛烟幈看未休行過白峰三十里桐廬江上重囬頭七里灘桐廬江水緑於藍兩岸山攅碧玉簮前去釣臺猶數里兩峰竒石見巉巉共惜殘年得逺迁豈知天意却相憐筆頭少得江山助便遣空逥亦愜然嚴州道中髙盤山頂下深渊馬足長驅不易前幽鳥背人飛去速一聲津皷突江煙叢叢呉岫煖烟生峽束奔江徹㡳清斜日篙師催進棹三灘難上要雄撑蘭溪縣女歩道中豫樟蔽日無黄落竹笋經霜更碧鮮記取江南光景異煖烟晴日是冬天三河道中龍丘風土􅁼中原兩势山開百里川白鷺水田摩詰􅀞桃花溪洞武陵舡龍游道中路入龍㳺不見山緃横阡陌縠江邉穿籬臘笋如槍槊夾道寒花似火燃龍㳺道中聞鴈避寒來趂稻粱肥水逺山長結伴稀已是江湖逺行客一􅀟猶自向南飛西安道中衢州属縣西安荒惡路清寕水泛山行夜不停􅁍為近來山宼發大明猶未撤関扄紫溪嶺紫溪梯嶺一層層况復鞭羸帶雨登頗􅀏此山蔵行迹丗人曽不峻為稱昔杜止軒告予云楊西庵談諧俠黠之雄者也丗人不知其然不肖何有竟􅀒天下滑稽之名楊何深而僕何淺也予謂分水與紫溪嶺亦然分水雖大平而易登紫溪雖小峻而難陟今丗人以大安至險可畏爲言而紫溪略無聞焉其與楊杜顕晦􅀄不殊也車盤嶺大雨中上嶺時沾窮臘天多雨路轉巔崖險可驚辦着壮心時叱馭兩程併作一程行武夷山朱文公書院在焉紫陽集裏已曽逰此日輕舟過山摳衣不獲拜遺祠武夷一棹空囬首建陽道中二更到縣山谿流急逺聞聲月暗林深信馬行衆􅀫歛芒南斗大半天驚看六星横謝朱詠道山長來訪名沂今為亭山故縣經兵廢不存考亭依舊泰山尊南來有幸猶親炙得見先生四丗孫八仙驛灘峻渦旋􅈝下危施師招䖏和聲齊八仙驛畔山如􅀞一棹清風下建溪劒浦湛湛􅀟溪劒浦秋張華祠下更深幽神兵不斫奸臣去真是蛟龍亦可羞李延平道南書院延平名侗晦庵師也延平劒躍蛟龍窟湆澹灘危灔滪堆二事聴來皆野語道南書院重裴􅆦髙桐道中梅花如雪小桃紅夾道脩篁翠幄濛折得一枝春在手蠟香吹滿馬頭風上水舡乱石叢堆積鐵然湍流飜雪沸洄渊半崖匍匐人如蟻百丈驚看上水舡􅒎洋鐡喻篙師􅁓喻舡上灘元比下灘難傳呼緩棹蘭撓去路入􅒎洋要細看蒼峽道中雨後看雲滿嶺閑看雨後雲空􅄥踈薄畫難真蒼山巧露都著銖衣掛法身蒼峽鎮雨夜地連呉越已夷蛮蒼峽東南更二千郷夢不成非野􅀫雨聲還向客牎偏摩天嶺寒雲直上看髙層峻極諸山莫與京不作閩清具瞻物摩天空擅最髙名秀才嶺西登盤上卧羊坡東降平穿谷口蘿爲問蒼巔髙㡬許㣲行人指樹頭過水口山路捱來僕馬瘏方舟南下頗安舒催摇柔櫓嫌曛黑行趂漁燈一點􅀌小箬冬陽暖透征衣燠溪曲寛從水口開夜半朔風吹月堕臘寒還逐早潮來湯池湯泉為􅀃盡唐庚一脉温從地氣生滌净丗塵􅀄不汚根源方信本來清􅅴蔗洲山明溪静絶纎埃望際川原四面開忽訝兩涯風浪湧舟人云是海潮來雨中江行望􅅴蔗洲方舟摇颺櫓聲齊細雨􅏃䆫㸔岸移望入蔗洲何眇靄霧江平抹白烟癡懐安縣縣依溪曲兩岡間翠竹晴沙轉雪灘前去郡城饒候迓官儀多是夢中看緫題無窮山轉青龍峽不盡溪蟠碧玉潨西自鎮江南抵福三千里路略相同義門任氏詩并序燕雲風土䧺碩故其俗純厚多以孝友稱御史藺君寳臣屢談於余吾郷有任著飛卿者樂讀書其家義風尤為昭著至三丗同㸑郷鄰化而慕之􅂅得一言發越其媺因賦二詩于以見蒸蒸所自且勉夫錫􅀋不匱之心焉燕雲任氏丗同居和氣薰然樂有餘春在紫荆庭樹㡳緑隂􅀄不見扶踈一門髙義􅃣郷鄰累葉相承棣萼春不學張公書忍訓友于元自孝心純秋澗先生大全集卷第三十
