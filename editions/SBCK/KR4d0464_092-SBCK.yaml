front:
  text: 秋澗先生大全文集卷第九十二事狀
  hash: sha256:ee04260ac5fcf8daaebb969c7a290862911b35491973a6d657f4e80d6c567d29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_092-1a}
body:
  text: 郊祀圎丘配享祖宗奏狀臣謹言伏念我國家列聖相承奄有天下六十餘載今海宇一統自尭舜漢唐以来未有如此之盛兹蓋陛下神聖天縱孝治日隆以不丗出大有為之資臨御有道故也然所有未舉大典在臣子分禮冝建言所謂方今大典郊祀是也何則孝莫大於嚴父嚴父莫大於配天自尭舜巳来至於金宋上下二十餘代之間莫不郊􅀕天地及五方帝神以配父祖盖尊之至也祖宗之聖重熈累洽郊祀之事未既舉行者縁禮文弗備有不遑及者今陛下即位二十餘年功成治定昭事天地尊禮百神略無虚􅀊􅀂大禮一行􅀅咸秩之位合禘於圓丘豈不大通神明降福穰穰者乎又念自古偏方小國尚皆力行尊顯祖宗以為天地百神之主恭惟陛下大􅄻謢助際海内外盡付所覆而上帝簡在陛下之心又大可見矣不於此時報本顯􅃝以荅天休其於継継承承之道終為曠闕兼舊有典章自金章宗一行之後湮没遺逸不絶如縷即今就有三二老儒并􅀵拾到亡宋典􅁽講䆒張皇一旦有成將萬倍於㝷常使陛下垂旒􅀍衮對越上帝與三五同功並接數千嵗之統於上新萬方耳目於下使王道明而墜典興天地察而上下順聖政聖教不待嚴肅以成以治所謂聖人作而萬物覩也豈不盛哉由是而觀自古聖帝明王纉承先業所任之責未有重扵此者故傳曰國之大事在祀與戎惟陛下裁察鈞州建先廟事狀盖聞益廣宗廟大孝之本欽惟太上憲宗皇帝雖聖靈在天而神功武烈見扵郡國者固當昭布逺暢以盡中外臣民之敬今河南鈞州係先太上皇帝王業所基戰勝龍興之地蓄靈擁休赫焉斯在冝營建原廟俾親王􅀊奉嚴禋以彰聖德光昭造􅀖之本誠嗣天子顯揚祖宗之至孝也牒司為中丞王通議病愈状竊見前行臺中丞王通議去􅀊春自􅀭州赴闕奏事囬偶患病疾百日作闕今過期年巳是平復即目居家讀書以教子為事其於已􅀻似為安便􅀂以方今選用人材之切如王通議者才術徳望理當起復未宜投置散地􅀂不舉明伏慮憲臺未知乆遺録問保士人杜之材賈宗􅀓狀竊見新鄉縣布衣賈宗􅀓胙城縣中選儒士杜之材二人性沉厚端亮有文辝而通丗務讀書三十餘年安貧守道以耕稼自給未嘗枉已妄有干進其扵士論略無瑕玷誠丘園之秀民廉退之良士也今者幸遭明時選材為急理當薦舉使㧞出民間以備内外之用必能行其所學不􅀒素守以之振士氣而抑僥風不為扵時無􅀘彈保定路緫管侯守忠狀檢㑹到中書省欽奉聖旨定與提刑按察司條畫内一欵節該所部内􅀿有違枉並聴紏察除欽遵外今体察得保定路緫管侯守忠麁魯無識㐫􅁀有名恣意乱行略無忌憚不任以職猶恐敗群重之以官㓙㷔何柰以致不遵朝省對抗使人詈辱同僚􅁾言肆口躭悞􅀴賦縱而不征引帶􅀻人結而成黨取能声擅断職官樹威風敗壊官府其吏民枉􅀍凌􅁀者畏其㓙惡罔敢声訢所望察司少爲抑按今又爲阻壊如此中外嗟嘆莫不失色叅詳本路近在都南實爲要郡所轄一十五處軍民約十萬餘户據根本内地首恩澤固民心非良吏莫可今使㐫暴如此之人臨民辦事正猶以豺狼守羊無不傷之理據此合行糾彈體復教授李龍輔狀今體復得本官併與元保相同當職又覩其為人雅厚清純臨亊通方有如修整廟學訓導生徒舉皆有法雖淹滯年􅀷未甞妄有于求所謂有徳有能可以從政者也兼知得北京南京教授俱蒙迁調理合陞擢以激士風舉楊徳柔狀竊見南京路録事司軍户楊徳柔天資秀穎不妄干進累歷筦庫継任本路照磨及奥魯府提控案牘檢法䓁官俱有廉能之􅁛其為書學尤為精妙方今少見其比今名在兵籍常以家貧執役行間譬之象犀珠玉要以不宜溷跡泥沙此士論之所共也卑職按廵河南見之廣座其學問行巳並與所聞相同據此合行保呈伏乞樞宻院照詳施行論王學士合陞承旨亊狀竊見翰林兼國史院承旨中奉大夫姚樞今巳身故據本院翰林學士嘉議大夫王磐人品風莭追配前賢議論文章發明聖學方崇儒重道之秋膺養老乞言之眷者陞授承旨職名以徳以材實允中外之望據此合行具呈中書省照詳施行保舉提舉張從仕狀竊見前綦陽鐡冶提舉司從仕􅀰同提舉張從􅁉賦性良明為人謹厚兼通儒吏歷仕年􅀷掌財賦而靄廉㓗之􅁛論刀筆而有裁遣之敏加之嫉邪處正識逹時冝誠為有用之材皆係廉知之實理合薦舉以俟擢陞特選行省官事狀竊見福建所轄八路一州四十八縣連山􅀒海民情輕譎無常困苦者多其在邊隅實為重地存心撫馭尚慮失冝縱􅁀侵漁不無生事縁収附已来官吏以朝廷逺貪圗賄賂習以成風行省差擬職官又多冗雜擅科橫歛無所不至致政壞民殘草㓂竊發指以為名下愚無聊因之蟻附其嘯聚去處附近平民盡為剽掠内地軍興不免蹂踐中間雖有憲司紏治梢末尚艱所行其於根本有無如之何者甚非朝廷包荒一視同仁之意求其治要無過得人為先且府州司縣䓁官雖不能一一精擇據見闕行省官僚如平章左丞二府名位特選素著清望簡在帝心文足以撫綏遺􅀺武足以折衝外侮盡忠所事籌䇿有方不以利賄為心使剷除積弊矯正枉濫肅清邊陲庶幾民安事靖日趍治域以之招諭則彼心可服以之進兵則我直大信今賊之所以滋蔓為梗者正以内闕官僚乗虚有名故也可不􅀷計而熟慮哉設或不尓雖濟濟布列上下相蒙以私害公民之困弊猶焚溺水日益􅀷且熾矣得失之機實係於此卑職叨居風憲覩其如是有不敢自惜而緘黙者論草㓂鍾明亮事狀竊見福建一道収附之後户幾百萬黃華一變十去其四今劇賊鍾明亮悍􅃛尤非華北未可視為尋常草竊誠有當慮者今雖两省一院併力収捕地皆溪嶺囊橐其間出没叵測東擊則西走西擊則東軼􅇯熖所及煽惑殺掠為害不淺招降則賊心不一攻圍則兵力不敷又兼春氣動時雨行彼􅀒固我持乆恐猝難成功以冝益兵力置緫戎一節制追奔合圍􅀔至窮蹙其將自斃惟復特差重臣宣示恩詔招諭撫慰以安中外两者之行庶幾有一得保醫儒胡璉狀竊見衛輝路醫儒胡璉資性詳眀學術有素凢經治療多􅀗痊安據本路見闕醫學教官􅀂令璉􅀘充勾當教育諸生必有開益據此合行移牒請照驗施行保儒生韓弘牒草竊見衛輝路録事司後進儒生韓弘性温雅有士行素明經學兼習詞章甞試以事論議容止舉皆可觀據兹良碩冝備時用以􅂆後来今將本人所業文字録連在前合行移牒請照驗施行論教官俸給事狀竊念天下之事得其人則治不然雖有紀綱法制將衰薾而不振此必然之理學校者育材出治之本也見承奉御史臺剳付該諸州府皆有受勑教授仰免差儒户内選餘閑子弟入學修習儒業仍令各路正官朔望省視及按察司官選試行義修明文筆優贍可以從政者然後解貢此誠為國育材以備文武内外之用固非細務也却教授多係老儒􅀫德白首一官不沾寸禄良可哀也今欲修習之業旬省月視賁有成効亦巳難矣合無照依國子學醫學教官一體頒降俸給不然據見有學田去處扵毎􅀊収到子粒内宫爲眀定斗石月充廩給以濟貧乏外無學田者唯復别議定奪如此䘏勸庶幾官無虚設之名學有賔興之實將見文風蔚興有不期然而然者矣論開光濟两河事狀省議即從所論罷役會驗近欽奉詔書内節該自今以始煩民之事一切革去便民之政次第舉行欽此今體知得省部符文准前工部尚書李奥魯赤䓁呈開洗東平濟州䓁河道并剏修閘堰可役人夫一萬餘名計該八十六萬五千餘工合用石材地丁等物且舉德州一處所着該白􅀥木九千餘條毎條長六尺徑四寸石材九千二百八十餘叚毎叚長四尺闊三尺厚七尺計其餘該著數目比之德州豈止数倍雖云和買目今驗户樁俵上户十叚中户不下五七餘塊並不見發下價錢即要赴所止送納日夜催併殆不聊生縁石材地丁非民間素有積蓄之物計其採買上價般運脚力上户已不能辦下户將何以給有破産逃竄而巳􅀷為未便边年創開海道益都淄萊濟南東平東昌䓁路百姓巳是疲乏死損數多哀痛之聲至今未息今又東平䓁一十餘處供辦上項夫役䓁物比夫海道之役亦爲不輕是齊魯魏愽數路之民􅀍擾無遺又念前政苛撓去􅀊不収民多流亡加以今秋風水䖝蚄災傷所在闕食恐又聞此役復業者轉行不来見在者又將逃避山東重地不可不慮兼此役浩煩未審曽無奏聞儻巳後不能成功虚費國力百姓實受其弊將來誰任其責然此却訪聞得李尚書䓁官見行安置土垻九座合無候來春土垻修成更爲責委􅀷知水利官貟一同相視光濟两河於􅀷淺不常時月断流走沙去處試驗土垻委能積􅀷浮重轉漕粮舡迤乆通行快便然後修理石垻尚爲未晚仍於出産石木去處官爲差顧夫匠採打用度不致取辦一時逼迫靠損人難卑職謬當言責以鎮静爲職親覩其事不敢不言合行移牒請照験備申御史臺照詳施行論濟南路所轄逹魯花赤合遷轉事狀竊見濟南路所轄州縣見任達魯花赤内承襲勾當及巳滿年􅀷未經遷轉者一十三貟今朝省庶政稍有未便務從一新􅀂將上項逹魯花赤人貟於本投下州縣内依例遷轉寔為使當庶不致恃頼乆任樹黨行私官吏因之受弊據别路未經迁轉者亦合一體定奪保李提學昌道狀伏念俊造秀異皆禀氣之清造物者靳固未甞多得今有其人使徒老明時誠為可惜竊見前上都路提舉學校官濟南李師聖經明行修不妄干進文筆性學皆有古風及扣以政事議論通暢皆切時之務可謂年髙徳邁學冨才優韜晦城市不求聞逹者也朝省以選才為急如師聖者􅀂擢以風憲或置之館閤俱有所長可􅀵實用論濟南經歴闕貟事狀凡厥政務必官吏相湏而後能濟􅀂官有其人或吏􅀗其用二者得一則事無留難竊見濟南路所轄州縣一十三處路當山東要㑹事務頗繁所頼首傾官調議規􅀞為切今本路經歷知事俱各闕貟問得經歴孔文貞省部别行差委東平等處勾當却於本司署御請俸將近朞年又本府憲司親臨於上今照得簿書未完事理九百餘件乆乏其人責以事有未辦實上下之所難理合作急選注材能使􅀘其闕庶不致耽滯一切事務議盗賊民患莫甚于盗賊不可視為小亊近年作過者皆於通涂大邑公然行刧略無畏憚者以應捕無方􅃓兵數少故也臨時力弱既不能擒捕既去應命追趂三限巳過恬然無事乞請將州縣尉司重行整搠所有弓兵定其不應占破之數悉歸所司以重其威力使潜消盗賊公然無畏之心且盗賊􅀼發正以衣食難飢􅀂稍年難且有縱横不可制之􅀔何則人盗有形而易為之破竊賊無跡潜聚潜散難為之取也彼盗賊料其物既易取官無如􅇯惡之人鮮不動念我􅀂度其如是預為備之之則將能為矣縣尉雖責專一捕盗然用得其材乃可所除多是承䕃子弟不閑事務又不習當處選擇一等舊曽作過不良人充師問詰捉雖頗有功効中間作弊有不勝言者如賭博櫃房宰殺牛畜等皆其事也又有因盗將良民俱被􅀵禁正賊反行出放以致有與歹人暗行辭其在輩流實不多見加以揚歴省臺通介有守照得例五品已上宫不限職掌有文華者即命制誥􅀂本官於翰院學士内相應名闕陞用實爲允愜士論合行移牒請照験備呈中書省定奪施行秋澗先生大全文集卷第九十二秋澗先生大全文集卷第九十三王堂嘉話序中統建元之明年辛酉夏五月詔立翰林院於上都故狀元文康王公授翰林學士承㫖已而公謂不肖惲曰翰􅁐載言之職莫國史爲重遂復以建立本院爲言􅁢焉仍命公兼領其事時不肖侍筆中書两院故事凡百草創經營署置略皆與知其年秋七月授翰林修撰同知制誥兼國史院編脩官方帝澤鴻厖賚及四海誥命宣辝頗與定撰再閱月蒙二府交辟不妨供職兼左司都事自後由御史裏行調官􅀳府秩滿復入爲翰林待制時則有苦左丞相監修國史耶律公承㫖霍魯忽孫安藏前左轄姚公大學士鹿菴王公侍講學士徒單公河南李公待制楊恕修撰趙庸應奉李謙不肖雖承乏㡬於一考其􅀗從容侍接仰其祖宗對天之鴻休聖訓無窮之睿思皆聞所未聞者至於文章髙下典制㳂革朝夕饜飫所得亦云多矣今也年衰氣耄盡􅀒􅀄心因紬繹所記憶者凡若千言輯而爲八卷題之曰玉堂嘉話其成燈火茆堂之夜尊罍心賞之間􅄍嘉話於目前想玉堂於天上鳴息有時盛年不􅂯良可歎也然昔人有宅位鈞衡不得預天子􅀻人爲恨頋惟此生不爲未遇用藏家櫃以貽將來至元戊子冬季二日前行臺侍御史秋澗老人謹序
