  text: 秋澗先生大全文集卷弟三十一
  hash: sha256:a951ef074a957d92a8e2f3b8f0046a4245d5ed89c615853f70c169dffa872dea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_031-1a}
body:
  text: 七言絶句早梅香信臘前開籍約君同徃肯前來松風亭下一樽開終曰裴徊醉竹􅄗霑帶晚夜深猶傍枕􅁁來花開花謝催人老花本無心人自哀折得一枝手且分春色入城來梅花風韻不凢才氷雪方凝始見開任使和實等閑斤斧不為災夢酒張鍊師道人尸觧栢陽䑓三尺琻鐫卧縁苔昨夜月䆫清底分明霑醉謝文來題劉總管宅御愛􅈐太湖清􅃳岱宗雄金宅宣和苐一􅈐絶佀水晶宮裹㸔一堆寒碧玉玲瓏詠梅銅切塗黄􅀧酪酥細薰婆律發温鑑老夫鼻􅀚多知見不用燈前問玉奴一脉陽和擅獨根蒲枝金蕾鎻春温惜花人老情縁在翦断春風倩女魂尚愛梅君佀細君題詩重過去年門經年不見春風靣爲恐啼㾗似臘㾗鼓嶺青林欲盡頭半崖渾作白煙浮應知昨夜山中雨石上寒泉散漫流荔枝樓在按察司潭潭大府號澄清一道綱維控八城舊說憲僚憐夜宴荔枝樓上月三更題米元暉楚江清曉圗元暉茟力儘清雄兩岸青山似越中六鑿近年攘欲盡蒼煙無復曉􅁳􅄥江􅁁墟落静荒煙林隖依然井臼全若比石壕更潇洒入山多避過都錢禽語自感鷓鴣明呼行不得杜䳌切祝不如歸長憐二鳥知幾早苦戀明時日自鞿小樓晚眺逺客逢秋苦憶家小樓登眺日􅀄斜忽驚海上風來迅吹亂鄰墻一架花白沙漢舊名歸舟􅃞􅃞度林菲兩岸芙蓉間木犀㝡是逺遊堪記處一篙秋水白沙西天涯乆客得還家喜動秋風八月槎絶似武陵囬棹處後山都􅀍亂雲遮岸􅀫閩清縣門清江一曲抱城根此夜􅀌舟􅀫縣門已是客心幽逈處更堪踈雨濕黄昏小箬水師横棹卧舡頭三日風􅏃喜順流縱使不携西子去烟鬟都是苧蘿秋醻劉憲使仲脩嚴韻舟次建寕書史孔元敬自浙東改任福唐得憲使仲􅁱詩因継髙韻為荅孔字中卿係襲封元措行也來從海徼全閩地閱盡烟江疊嶂山越橐不憂無重􅃱班超今喜得生還安嶺北􅃒千里目全閩東掩萬重山江花江草争含􅀏一事無成謾徃還夢筆山異禀中來氣自豪先生藻思湧秋濤斯文本逐年衰壯􅂑與何嘗有彩毫題北􅁐亭柱覊懐牢落獨登䑓幾􅀍時人􅀏不材只有青山㝡憐客翠幈如􅀞四圍開贈相者雪庭東谷二絶道人宛有雪山清顧我眉毫近九齡最喜一生心事好又㸔黄色起天庭雪裏踈梅儘耐寒功名都在晩年看煩君與卜趣装日早晚􅀌舟發建安全氏小樓與南山相對殆几案間物也暇日觴予其上索賦鄙作因口占二絶句閭閻撲地不容閑疊起重棚翠靄間樓下市声喧午枕藥炉頭上㸔青山東籬遥見喜悠然况在風􅃄咫尺間滿勸銀盃留客醉夕陽佳処鳥飛還南山秋色两争高終日相看不待招一炷龍涎滿樽酒安排詩思苦相撩過朱家府并序至元廿七年冬孟過朱家府謁太師遺祠瞻拜禮像懐徳不巳敬留四詩付林彬二孫庻㡬鑚仰意云晚進小子汲郡王惲歛袵百拜書世仰遺祠愛及烏不縁喬木縁隂餘題為通徳猶膚淺云是文奎所次墟濂洛尋源到聖功八方吹偃舞雱風一椽得近東家住瓢飲肱眠樂在中金聲遺響已千年聖道重光自子􅀓不為武夷山水窟拏舟還艤杏壇􅁁神而能化自人存毳冕凝旒以道尊徳澤未應移五世青袗長見讀書孫張家灘在建陽縣􅀯五里張家灘下石縱横舟楫經過與水争行路險􅇖皆一例溪聲何苦不平鳴武夷溪口謝諸生來迓諸生濟濟半深衣鞭馬來迎候武夷把酒向前争􅃱語精神全在去年時望武夷諸山武夷山水儘清竒石作􅀛麟玉作溪望入神清􅃜一到壁間空擬老歐題崇安道中十月山間不覺秋青林依舊鎻深幽西風老却黄雲稲野水溝溝澗澗流贈石堂和尚梅花樹下石堂僧楚語咻咻碧眼稜盛說􅀘陀神力大碧丹療疾百能徴道人來自武夷山䄂有千金起廢丹専意濟人無所取一年強半在崇安過大安嶺愛山不厭入􅁳搜薄霧空濛爲少収意似范寛誇老筆乱峰明處露礬頭大安形􅀔鬰峥嵘閩海東蟠未了青徃返两囬煙雨暗不容詩筆冩真形前有群狐後有􅉘老懐悽断嶺猿哀此行可卜新年順無是無非下嶺來萬里生還豈偶然一聲長嘯下蒼巔開頭若要留詩去記我今冬下嶺年下嶺人言出厄年一杯湔祓瘴江煙紫溪嶺下重囬首巳勝班生到酒泉過稼軒先生墓在鉛山州南十五里陽原山中廿七年自福唐作青銅三百了時文大節知公在􅃱君朝野不應傳樂語六宫春動鬰金裙相秦審􅀔不明理坐使炎興失逺圗力主俻􅁁信大義先生真是孔明徒遺編三復羙芹辭睿眷曽􅀩孝庿知黄壌不埋忠義氣至今煙草見蟠螭老徽北狩七陵空奉命南來見匪躬誰遣廟謀空坐老一椽精舎帶潮東招提遺像見英材喬木秋風過客哀通暦縱令追削盡疊山文是漢雲臺次鉛山示州尹杜君西連兩廣天荒䖏東接三山海盡頭喜見寛平風土羙鉛山今合作中州余去冬過此今􅀊復由此北歸􅀚其田里城居比之前日精彩數倍詢之盖侯杜新政之所􅃱也喜爲留詩而去題寒碧井在鉛山州東五里寒泉湛碧石爲嵓鯨口長噴色更藍六月行人方困暍一杯永雪􅁡同􅅴沙溪道中馬知驛近趨行迅詩爲山竒捉句難行過沙溪都忘却際空原野喜平寛喜得臺報弓刀霜冷五更􅀄破睡無方有疾驅不爲殘年誇老徤暫教粧􅀧早行圗欲進行难愧素飡當機坐視更何安從今漸斍身心適秋水鳴蛙不属官下山風䄂任披披來路囬看在翠微貪恋紫溪山路峻不知寒霧湿征衣玉溪登舟捨鞍乗木玉溪煙坐聽呉歌踏兩舷東抵餘杭西自信一千里路月明舡食柑黄柑香熟夜來霜比似休官味更長道出三衢冬十月石塘林圃記􅀄嚐夜發􅃊州亭亭白塔過􅃊州漫漫清江不盡流慚愧釣臺臺上月分光也照逺逥舟桐江待發柁師說佀小児童一斍平明意莫怱待彂桐庐遅是速舟随潮退疾如風夜過七里滩都俞無幾巳還山自􅀏瞞􅘐老一官爲恐石壇松鶴􅀏夜深舟過子陵滩錢塘道中長路人家不断頭冨陽東下接杭州如今不佀勾呉日猶自歌声沸酒樓余自閩中北還舟行過常秀間卧聽櫂歌殊有愜余心者每一句發端以聲和之者三扣其辞語敷淺而鄙俚曽不若和声之驩亮也因変而作十二關且道其傳送艱苦之狀亦刘連州竹枝之意云露華冷浥蒼山碧江水平鋪素練光半夜棹歌相應起發揮無用詫鳴榔今秋湖濼兩相通差遣雖頻力易攻度險却防連夜發泝流還怕打頭風兩浙人稠不易安少罹凶慊即流迁今年苦惱蘇常地易子營生不計錢睡思朦朧苦未休棹歌催彂五更頭兩盂悶飯無塩菜雨雨風風一葉舟朝來囬棹喜空舩坐唱呉歌踏兩舷淘米墩頭風浪起最防吹入太湖烟中産攅來六七家終年執役在浮槎今年水渰田苗盡少米争前乞使華水色山光不易吟􅁍教欵乃發幽深㫪陵不作呉児事道是雲山韶濩音岊江灘石苦經過音莭聽來噪未和不佀呉儂音韵羙遺聲全是竹枝歌夢驚蓬底卧秋江一句􅅻終和者雙任使再歌聽未巳不知寒日上舩䆫幹當江南有許多徃還冠盖佀攛梭因兹力役無朝暮欸乃飜成懊惱歌路長江闊霧烟埋盡日長征帶夜開記得徃年日􅀍差冠盖有時來迢迢江上乱峯青路轉山囬逺作程來使共稱星火急不容停待晚潮生水仙萱草二詠并序予行次赤岸兩浙憲司属吏侯仲卿挐舟自杭追余四十餘里及之拱立水次􅃱紫山之意仍索賦水仙萱草二詩詢渠别有何故曰無有予􅀏曰澹癖好名有如是者遂書二絶以付時至元二十七年冬十月二十二日也片㠶歸自海東頭何限烟江疊嶂愁展放􅀞圗還一􅀏丗間名品果忘憂緑萱不得獨忘憂江草江蘺揔帶愁若使花神真觧事一枝金鳯也垂頭雪作肌膚翠作裙凌波㣲歩襪生塵茟端欲見銭郎意重爲陳王賦洛神望歌風臺西風殘照舊山河故國遺臺憶獨過四百威靈歸寂寞断碑猶記大風歌漢家豐沛有周邰四百炎輝自此開舉目不瞻龍虎氣寒鵶飜日上荒臺奉春一說即西行百二江山敞帝京不佀楚人無逺略錦衣東帝詫韓生石勒問道圗位號真來変故多􅄎天無地不干戈養成豺豕䔥墻禍更向伊蒲問甚麽題范亜父増墓在徐州城南臺頭寺下大塚劒舞鴻門失此機重瞳成敗可前知猜嫌只待􅂢金後决意東歸去已遟單父琴臺武侯治蜀毋輕赦宓子弹琴不下堂風俗変移難復古後人為政貴論量讀佛圖澄傳慧眼前窺事有徴最慈祥是戒􅁋刑阿師更欲矜神異塔上風鈴要細聽雪漲千山圗六合雲同雪自寛千山都変玉孱顔限量不佀年來雨多処淋􅁋儉処慳月廿一日河南雨三尺河北全無喜周宰來居友道年來棄若泥白頭傾盖似新知短轅塵尾関渠甚誚殺當年蔡克兒筋力覺衰防酒困生涯從澹􅂅詩工尚憐繆誤今何幸長在周􅀰頋盻中吾友西歸喜可知殘年心事得追随朝來僦舎清談乆憶得西齊共􅀍時諸子當年甫冠昏執經同在鹿庵門相逢正有謀生急裂月撑霆不要論發雪􅀄霏踏雪携壷扣夜扉長記孔門多披風䄂詠而歸泉水思歸有故交共山無地可誅茅羡佗僦舎同來燕終日㗸泥􅀘舊巢周兄所至號能官旣幹而清事更難昨日借車還故里􅇸空留得一錢看一别淇南又十春此囬相見更情親河山不隔黄壚断屈指同㳺有幾人飜雲覆雨到澆漓長愛吾周重所持四十五年同一日物情心事兩相知人生七十一衰翁比老能閑樂事融着手不􅃒西去日閉門同卧北牎風山陽髙興在筠林痛飮狂歌揔賞音四十五年雖轉首白頭同賦故山吟柱頭化鶴千年事松下懐人一聚塵撥置老懐休悵惋且來同醉酒壚春􅅻沾公禄能餬口縱得居官柰老何暫借麹生供日事何嫌酤醸近林婆過郝教授子貞故居三首雲際曽瞻處士星竹間無復草堂靈喚囬三十年前夢壓酒槽边冩六經一言抛却羽人冠長喜先生不逺還故􅀮只今誰作主詩瓢空掛百門山平生詩卷幾牛腰身後遺文便寂寥事業文章元有分自餘辛苦枉相撩囬河常年動磑踰三月孟夏中旬見稲芽今􅀊使君先玉食清明分水與農家題胡笳十八拍圗漢丗婦人傳家業善文辭者前曰班氏後􅁛文􅁎琰不幸遭乱失身悲憤知耻至發而爲辝章者而巳如是在東漢文章清而不俚者也其音調悽楚縁琴翻聲律恊笳拍而於音學曲盡窈􅆌可謂不墜中郎之業矣今觀是圗其情義相牽不克自制之懐猶可想見於當時也此辭即唐劉商所作以七言較之益無疑矣因題五詩于後騷人擬之之意云􅀞却春山理素琴翠簾香鎻落花深豈知中有胡笳恨吹折関山一寸心胡笳飜曲太含情不道倉皇義重生舊怨未平新恨疊鴈聲􅂊罷又􅁁聲乹飜坤覆困蛇龍女子柔􅂨鮮克終全着靡佗論蔡琰不知何地置楊雄憔悴風沙十二年得歸情義轉相牽董郎庭户虽啓舊已是蘭摧白露前才慧其如薄命何猶能知耻見悲歌寥寥誰後得續離騷幸儘多跂徽宗􅀞兔格物心存養聖功老徽游藝眩青紅四靈瑞丗渠何者也在君王物色中牧牛圗垂紖徐行信自如一揮鞭䇿見齊驅近來不佀圗中看旱塊􅃻蹄百草枯青青春草滿郊原放飽歸時不用牽何佀人牛俱不見碧天明月静姢姢緑楊堤岸曉風清碧草陂塘暮雨晴村落近年乾旱損却􅀅圗􅀞看升平兩童相顧意何爲猶恐渠飢趂草歸一道牧民無所事処心專在當家肥飽耕飢放事年年放去収來任自然莫訝兩童無所識至今牛背是堯天䟦徽宗􅀞馬圗爲愛瑶池噴玉龍麝烟移入􅀞圗中宣和殿上揚休處忘却熈河汗馬功問雨六月五日雨三寸前日西村雨有餘東村曽不少霑濡望中雲氣西南重爲問村東果有無從來暑雨多隔轍且喜一㮣蘇焦枯􅃻蹄旱塊如盆火爲問秋田勾得無近日􅅴霖遍四周􅂭都在郡城火無光澹䟦武陵圗淵明髙興託􅁳鴻流水桃花事本空好􅀏武陵狂太守謾回烟棹月明中題數學鄭斗南詩卷洛圗河數發天機萬彚中來理莫違却有一言煩説佀貴人何廣福人稀數學規模自易齋不煩衰薄䆒予懐朝家謀断須房杜早晚相携上太階巢父飲牛圗巢由真􅀮本同儔細論吾巢莭更優老牸渇來何所擇徑湏牽避是非流靈照度丹霞圗衆生種業到無該愛海沉迷喚不逥對證処方唯一捨不應真假比如來西江萬有巳沉沙更有何心到散花很佀入門三十棒欵􅀅一語了丹霞性定情移逐物開力能剛制見英才金沙灘畔風流骨恐是逄􅂣作戯來克已先論定力優後從屋漏驗清修禪家多少閑拈弄糞埽堆頭覔悟頭和彦正憲使􅀉周宰詩韻且酬前日見贈之什紛紛黨議到無如常愛林宗智有餘金谷聚蚊潘在數一生空枉賦閑居自憐豦事太遅回幾􅀍傍人􅀏懦哉勘破南華山木喻支離􅅴作散樗材山陽水竹接雲荘真是閑人避丗郷殺馬毀車渠莫訝風波平地更羊腸殺馬毀車東漢馬良事故舊追􅂬不厭頻甚時王翰作比鄰相看比老都能幾猶作離羣索豦人時與心違儘倒顛且􅀅書史度殘年樂天仁厚知幾逺好箇香山獨徃篇佳人􅀝竹圖失路青雲恨未深更堪空谷日幽沉天寒翠䄂相依處却是琴中對竹心和幹臣詩韻六首清江百折萬重山倦鳥翩翩不易還有客又來詢動静不知馮道已癡頑一雨焦黄荔子丹去年今日宴東山山僧勸酒賔僚唱醉裏肩􅞿月下還樓閣三山景氣鮮萬家簾映荔枝妍紅雲酒羙香粳滑只枉風烟是海􅁁泉石鷗盟尚可尋老懐其柰丗縁深將詩細嚼要予和有酒深藏待子斟吾儕從事思行道尺未容伸巳枉尋不若􅀅心随所好物情明見古猶今人生兩足無不到去􅀊天涯今故山古語在家貧亦更怜吾子適東還復用苦齋韻作五詩以自警剽􅀼詞章􅀏自如何曽經㫖醉三餘卑凢自䖏有如此誰復如軻以聖居終日如愚莫哂囬克先復後並生哉從􅀄一着髙空上即是盆成死矣才學湏一念主端荘漸次通融理義郷况是四端生巳具幾曽由外貯肝腸濂洛諸儒問荅頻道雖未冨亦其鄰異時醻酢無窮変不比禅林面壁人刺口髙談謾聖顛人心能淑変堯年孔門多少齋心學見用還存問政篇四月卄六日西溪睡起城居喧隘一蛙坑乍到郊墟眼倍明濃睡覺來村塢静緑楊深處栗􅇔聲灌園􅀝鋤看水立斜陽愛殺春風菜圃香自􅀏老饕湏肉飽􅁍思竒䇿出􅂼腸馬嘆足輕行穩不􅀭塵種性來從野馬羣昨日緑楊亭下路郡人争羡五花文市來一馬性馴良竹耳㕠批秃尾蒼􅀏殺飬生王武子辨教銅歷葬人腸撃壌軒軒旱塊大於盆朴撃都教細作塵便覺静夕陽原隰看畇畇老子過関圗韓虬筆論道休將坐井觀逢時爲用見真筌漢家注措􅅻糟粕嘉靖寰區近百年柱下潜輝跡已賒青牛苦要渡流沙料應紫氣浮関後夢繞春風巨勝花贈武昌相士秋雲羡君兩眼明如鏡萬事都帰一盻中自􅀏本無食肉相虚名空佀豹林种扣門有客號秋雲偶與㣲言㝡近真過眼無窮軒盖士急流中退果河人品彚虽殊智欲周江南江北去悠悠多應未遇啇嵓叟􅀧破長空萬里秋䟦􅃮園田氏手澤金源取士自科文臺閤公卿半鳯麟後進且休輕訾議試從田氏看潜珎䟦顧虎頭所􅀞謝安東山像出䖏當年繋重輕枉􅀅浮議論蒼生異時兩䄂東山雨待與君王洗甲兵䟦香林先生顛草涪翁醉草􅅴露帖势與江山争長雄幾丗幾年當復得香林筆底有遺風嘗愛􅅴露詩草聖筆势縦横破碎陳敵今觀香林先生遺墨得涪翁歩驟為多具眼者當至元元年有所思莫道當時無義間四題謝太􅀓安勝􅀒􅅐中料已明又從堂上出竒兵怡然一􅀏文揪裏未礙東山是矯情周􅀅軍江東注伯仁茂弘中忮本辜恩異時淚洒中書省空慰􅀅軍石上魂髙司空􅁢龍顔震電威伯恭持正見臨危挺然不應前星人臣要不欺王丞相猛當年北海螭對談捫蝨果何爲華陽未入君王裏風雲只自知謁玉泉真像五首幾讀九山碑管􅁑􅁭期漢相規思欲執鞭那可松下獨來時民五十年後人經済􅄅難攀湏知浴日回天領間麒麟事業新有言到伊周元不是庸人丞相祠堂憶重尋幾年西崦栢森森入門再拜夫人表忘却登山力不任揔道書生吏事踈米塩無術應時湏請看中統元年事済済得朝廷半老儒豫讓邀襄子圗智氏頭顱到溺旋趙襄謹避堕空然若圗伯也非常報合有嘉謀在死前一言感激命爲輕九死酬恩不爲名千古晋陽橋下水不􅀿嗚咽恨無成酬温仲敬以櫻筍見遺四月人間櫻筍局喜將二物特相遺故家風味依然好獨有温郎是素知春睡起偶書西墅東軒壁留連春色花隂蝶断送林歌雨桞鶯更愛静中消遣処春愁滴破􅃪槽聲題王明村老黄店壁八絶壬辰􅀊三月廿五日葬曲山囬作西山千疊玉稜層踏雪當年過五陵破㡌不知風力緊夜䆫歸趂讀書燈荒荒野曰店東西路入蘇門草樹低記得鹿庵傳授日饐􅀲亭上識西溪今年上廟客紛紛賸具黄粱與酒樽白髮故人渾不見青衫多是子和孫曲山靈柩夜來過腸断春風薤露歌同軰眼中多顯逹一生心事㝡蹉跎危嶺南蟠縮尾尻伍城東望俯坑壕蹇馿䭾過王明店􅈝􅁴西山百倍髙古槐盤石緑隂垂下馬行人倦午馳每過黄翁閑話舊停􅆖長到日西時中陽川逈属新中店舎􅀄開暎􅁄叢四十九年􅅻一瞬黄􅀰今日老黄翁筠林同業憶當􅀄幾醉黄翁旧酒壚鄰􅅇声中何限恨不堪零落曉星􅀌五五今獨予在當時同門者十三四人止有李士􅀚傅士開秋日即事風軒兀坐髪鬅鬙凉入簷花露氣凝詞客感秋驚􅀊暮半生虚􅀒讀書灯題嘉山叚冝之讀書堂圗山水雖佳以士名誦聲曽動草堂靈至今松桂林中夢不識無禾飬百齡墨梅偶賦梅葉天質本紅黄玉潔氷清徹骨香近為丗間貪墨客硬隨時丗作新粧秋澗先生大全文集卷第三十一
