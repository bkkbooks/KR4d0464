body:
  text: 七言古詩滹沱流凘行馮征西傳云丗祖自薊馳至饒陽蕪蔞亭南渡滹沱入信都王􅀅軍覇􅁛氷堅可渡處今皷人指縣東北龍華郷故河道曰全渡者即其處也且以饒陽取直趣異其經皷縣東界無疑但河自収國庚午徙縣南行流問諸父老云今七十有一年矣春秋皷聚在令縣西五里廢城尚在今曰下曲陽者是也至元庚辰夏余按部是州士子張春卿者請余紀其事因爲賦此王􅀰何人著柘黄欲與赤伏争翺翔漢炎中断天復熾肘後頑石胡爲光蕭王揮戈指幽薊戰血滿野風塵蒼募兵返得市人噱當時南馳亦蒼皇鳶鞮城東滹水長北風烈烈天雨霜前驅候􅀐两失色河雖流凘無可舫莬肩麥飯未下咽大􅖅横合堅於梁古􅁛王者阨不死淮陵一言殆天使赤龍巳渡凌四開白魚躍舟未逾此壇亭王氣如水清妖彗邯鄲死􅁅耳彼蒼有意開真主固令􅀂輩先驅䖏君看隴蜀最健者一旦等蛙終漢虜王即區區安足數蒼茫此日龍華渡漠漠野煙生緑樹留在長河閲世人萬古朝宗浩東騖布榖辭按部饒陽行次劉楚馬上聞布榖偶得此辭寒凉朝雨濕耕瓏離離引繩直一聲布榖動前来相望竟朝夕良笛芟芟入我鋤結舌􅀷潜緑隂宻田家衣食仰堪輿一勤之外􅀄無餘嗚呼禽鳥司農務􅂆課之吏當何如惡鴟行有鳥不丗用其名曰䲭鴞前林崖窟黑飛鳴假狐妖啄食公􅀻間遼野爲瀟條嬉飽摩髙空逺觀聳盤鵰不憂穴破老妖死惡聲向人恣喧嚻正爲腐鼠嚇有􅂡無廼撩病鶻困􅀌撃霜秋此其朝我病非苦饑我困非爲調跕跕垂两趐坐使窺雲霄老拳固有利不利搏逐之志常超遥倘不與之護返爲物所憢主人一呼良未報不縁自獵矜風標會當攫大悪併驅若􅀋直出六合分鸞梟錦鞲脱落青絲條鴻鴈歌爲馬仲温求娣賦膠船幸脱長河津朔風慘慘吹兵塵天摧地圮井峪易骨肉離散如驚麕吾宗積徳僅不死有淚空洒天街雲歘傅伯姊落斥漳女固有行逺弟昆怙恃旣失寕復得得見女嬃如見親最虞身在墮覊彀彼此笑闊􅀹酸辛褁粮物色不憚逺西走懷洛東嬴秦眼穿足繭幾萬里􅀊月荏苒三十春朅來古鄆天假便鴻鴈遽接秋風群相看喜極淚如雨恍􅀂夢裏招離魂軒軒喜氣溢須勾此事希有爭讙聞金鸞誥書五花文紫藤肩輿繡羅茵馬君􅀄非羡此樂一念有在明天倫君不見守真禄餋殆常事慎矜母奉冝相隣高平王氏觀津馬兩族丕顕全親恩更因識姊表宗系衰俗乃爾逢斯人爲君濡毫紀孝愛要使竹帛流清芬徤児􅁔贈李􅁉卿南來見君喜殊常不爲秩滿身精強掌中擎出一珠新大􅁴門戸生輝光此生抱弄萬事足晚景雖迫心無遑頭圓骨緊眉目爽已解顧語呼爺娘阿冝自是樊川秀剩備詩書滿百箱贈滑州龍教授取新蜀山相繆欎蒼蒼龍君來自西南方馳聲場屋少年事筆底秀色翻巴湘滑臺一落三十載冉冉青􅁂今秋霜勑書在手無所得坐老茆屋青衿庠朅來聞君擅術數萬有飛跳天星光方圖據説賾藴奥解我中􅀬心遑遑又聞天人本一􅃱物欲􅀅至先開祥紫垣昨夜動光彩進賢奕奕三台芒書生薄命何足道此去蒼生得小康馬天章􅀞廬山清曉圖平生愛讀廬山髙不識廬山何面目眼中忽墮此山眞萬疊蒼煙彭蠡曲江南地卑苦炎蒸暖翠濃嵐氣多欎馬卿㓜作清曉圖特爲千􅈐濯秋骨恍疑坐我瀑流下净盡煩襟貯清淑何當杖履東林游一樽共吸江山醁放猿詞爲提刑副使程分甫作有齊號俯仰霜林萬菓翻朝紅老徂夢到秋巖重幾年胥靡辨児劇物失本性心爲忡主人誰似俯仰翁放之逺野將何從封龍雲深洞穴暖東山之西西山東衝煙嘨月恣汝嬉曉驚無復山人扉歸時物情喜兩適豈爲尔心知不知田家謡至元十八年九月九日作君不見訖干山頭雀翔集止其所正縁生處樂凍死不飛去人生重郷情疇非戀吾土丘壠蓋丗守耕鑿自父祖一旦委之去倉皇事覊旅豈不知朝辭弊廬空暮􅀫何人塢身􅀒逋逃名比訣心良苦我本耘田客挨排爲主户􅀊無儋石儲日有箕歛聚刻肌醫却眼前瘡肉至無剜瘡愈腐支持非一朝窘至空棰楚東隣匠色日􅄖游西里征家厭温飫平時皥皥等王民一苦一甘遽如許兩淮悠悠田四開差徭不及無天災比之老雅轉溝壑一飽而死猶春臺水深林茂魚鳥樂此雖古語爲時哀可堪大府督州縣親臨之官胡爲哉我初聞言爲嘆息天網恢恢踈不失只今六合混一家此雖逺迯何所適但思逋􅀒洒餘民似此披躭轉疲極素馨辭并序五代漢劉隠女曰素馨死其墓生花甚香因以女名目之後人削降香作薄株以此花蒸之及􅅡比本品極清逺無濃重勃欎之氣顔公仲復謁余試之誠然作是辭以紀其異紫擅爲屑丗所珎降香變體吾未聞漢宫有女號素君殁而墓花香􅀂薫降檀氣味多濃欎蒸以素馨清且淑顔公䄂出赤龍鱗入手如游衆香國夜􅀷一炷雲滿室素馨之魂降鶴骨君不見西施苧蘿山下子膏沐􅀷宫轉清羙一朝呉亡隨范蠡隣女效顰終莫儗素馨得名從此始宣和寳墨歌贈顔提􅀧仲復宣和殿􅀷春晝長老徽宸翰昭回光黒卿入奏少許可追逐五李參三張猶卑古法出新意萬笏細槝和龍香宫鴉借色翻朝日三十六宫香霧濕鳯飛龍舞九天來雙影盤盤落玄壁流傳人間令幾春顔公得之知所珎有時一勺試曹溪翠研霮䨴看玄雲錦囊舉丗爲寳玩阿知􅀹物反玩人以玆過客目有属重似連璧輕埃塵厖眉書客秋澗子老不道進技乃伸右軍筆端有陣法需此甲盾方通神作謌一􅀏師應聞寳鼎歌贈開元僧法恒僧回來自勾呉天䄂携寳鼎心欣然逺逰萬里無長物愛此古色暈碧玉有煙土華千年不敢嚙夾底錚錚堅比鐡雲雷繞腹走神光两耳􅀌撑仲蠖屈我􅀄驚見心魂動若眼增明喜生頰憶在玉堂􅀚愽古此鼎依俙冠周譜摩挲龍欵四十九王自成周徙居楚細看云是季妘彛享錫臣夌無乃祖君不見殷盤夏鼎令何有此物區區歷年乆供佛牀頭夜壑深一旦胡爲落吾手斯文三代周爲郁孔意姬情子素守嗜心旣至開有先夜半燈前􅀒之走僧恒拊掌喜有歸却恐獅王怒如吼義俠行并解題予爲王著作剱歌行継更曰義俠或詢其所以因爲之解曰彼惡貫盈禍及天下大臣當言天吏得以顯戮而著處心積慮一旦以計殺之快則快矣終非正理夫以匹夫之微􅀼殺生之柄豈非􅁀豪邪不謂之俠可乎然大姦大惡凡民罔不憝又以春秋法論亂巨賊子人人得以誅之不以義與之可乎又且以游俠言古今􅀂是者不數人如譲之上報巳􅀻軻之劘軀無成較以此舉出于尋常萬萬也凢人臨小利害尚且頋父母念妻子慮一發不當且致後患著之心孰爲不及此哉然所以略不顧籍者正以義激於􅂨而􅁬􅂢一身爲輕爲天下除害爲重足見天之降􅂨仁人義士有不得自􅀻而已者此著之心也何以明之事既露著不去自􅅞詣司敗以至臨命氣不少挫而視死如歸誠殺身成名季路􅄷牧死而不悔者也故以劒歌易而爲義俠云著字子明益都人少沉毅有膽氣輕財重義不屑小節嘗爲吏不樂去而從軍後與妖僧髙北行假千夫長歸有此舉死年二十九時至元十九年壬午􅀊三月十七日丁丑夜也君不見悲風瀟瀟易水寒荆軻西去不復還狂圖祗與蝥蛛靡至令恨骨埋秦􅀜又不見豫譲義所激􅃮身吞炭人不識劘軀止酬一巳恩三刜㐮衣竟何益至今冠古無與儔堂堂義烈王青州午年辰月丁丑夜漢元䇿祕通神謀春坊代作魯兩觀卯􅅎巳裭曽夷猶䄂中金鎚斬禹劒談􅀏馘取姦臣頭九重天子爲動色萬命抜出顛崖幽陂陀燕血濟時雨一洗六合妖氛收丈夫百年等一死死得其所鴻毛輶我知清誠耿不减白虹貫日霜横秋漸頭不作于胥怒地下當與龍逄遊長歌落筆增􅁣慷覺我髪竪寒颼颼燈前山􅄦忽悲歗鐡靣御史君其羞是時授南臺侍御史故云贈僧芝庵我吟越雞行君在西溪席軒然一􅀏喜相逢秋水爲神犀挿骨西溪提筆顧余言渠乃芝庵名甚籍下階揚􅃑遽别去三載不聞音與迹朅來扣門忽相過促􅂰髙談論平昔升堂幾作獅子吼雨花散空衣不濕近便野水洗心法塔廟龍宫如避敵南游梁園東入魯所在英豪多舊識公材吏用衆所􅁛風土河東見雄碩皇皇仁義昌􅀺公當時救丗心何亟浮屠徃還非一輩例欲加冠嗟莫及芝庵洒落澄觀流我匪潮陽徒感激歴山風煙春事深七十二泉俱可吟一庵静卧挂飛錫布地不羡千黄金只縁萬象森羅妙到處行􅌪是賞音題右相文獻公􅀞鹿圖明昌昇平兵四偃帝樂餘閑見丕􅂋時從靈囿嘉賔復引詞臣事秋獮風流右相東丹孫不爲丹青侍游輦􅔔焉德業魏文貞下遂物冝隨氄毨泰和行宫漢五柞槲葉秋山如繡錯鹿鳴不盡君臣歡扈從歸來冩麚角群逩知擇美䕃逰雅馴似應騶虞作食苹呼友見天全筆底龍騰驚濯濯蒼然角尾千金姿我拭老眼三見之至元甲寅年觀王氏所藏公書卧鹿一十六年李正之處觀所書行鹿二二十一年甲中三月十四日於曾孫即律義甫處又觀三鹿圖就中雪毳何多出恐是當年獻瑞詩桑灾嘆穉桑發暮春緑葉光旎旎田家嵗計固不常農婦相桑掃􅅙蟻黒霜一夜從天來萬樹焦枯遭燎燬令春継以海多風剪碎枝條生意靡天孫仰訴錦機空寓氏􅀝壇如喪妣蚕生時序三月尾過晚終非應時美只縁闕飼勒遲生徃徃中乾空滿􅁓山東自古絲纊窟大収之年有不熟一婦不􅅙天下寒况復例災過慘酷緼􅂁雖弊􅀊可卒所嗟盛陽月隂凝返尔肅府州文移速於火稍緩申期慮難復不知和氣誰所傷田野疲甿先􅀍毒部家科勘動正月中省限催嫌不促老農拊樹嘆不巳頻年桒灾免絲徵楮幣人言此是前省過但恐巳免復徵又似去年秋稅例入奏行羙聖政而重民急也一作免租謡贈崔中丞君不見燕􅀯饑民行且泣膏澤屯來三百日蚕沙嚙盡木皮空剉末草根充糗食追胥星火縣帖嚴官不汝憐需稅石人生郷土孰不戀一殍迫臨那得惜扶羸載瘠緫南逋鶻靣鳥形猶努力比之坐斃不相保趂熟庶幾延旦夕刑司府解兩虚文道路無言空嘆息吾皇德並唐虞聖軫慮斯民期日靖傳聞一介或可相不問草茅分政柄因思治道責有歸未洽鴻􅄉臣下病􅂊豐禄秩即患失又以材踈難仰稱蹲而不去噤無聲老鳯飢烏同一證西臺入奏沃淵􅇆蹴踏群疑開善政盡蠲秋賦出御女百色支供皆省併􅀂稽黄屋帝堯心一語乂安無不聽萬方歡喜聲一槩逺過漢家寛大令三錢斗米􅀃開元二稅户除聞大定限田固是平丗法未免區區與民競况今江淮􅀊入數不貲經畫有方財恐賸人和天地氣自舒一雨行隨明詔應老癃扶杖願少留又頼鴻恩拯懸罄兩河千里麥青青預賀有年天子慶是年三月廿七日燕迤南至河南皆大雨有三二尺處紫藤花歌并序癸未歳三月二十八日宋賔客乗澤車過道宮訪余時庭中紫藤花盛爛􅀂錦摛道師蕭公邀宋與余坐藤隂下尋友人張明之亦至酒数行開口􅀏粲殊適然也宋因出名􅁓属予作字一春天氣不佳此日頗清潤可愛旣援毫覺幽香馥郁時集筆端放手喜書初不計其工拙也遂話及樂天夢元九故事子曰二公雖神交如此恐未􅀂今日之樂衎也􅀂取紫桐詩例賦長句歌之以爲他年林下一叚竒事可乎宋曰吾子便可承當遂率爾而作歌曰竹宮􅃈牎雲霧垂紫藤花發何葳㽔仙家駐景出異供横揜桃李無晶輝群蛟􅁬蟄力猶困鱗鬛不耐凄風吹天孫夜擲紫霞􅀍滿意下覆須春㬢幽禽縮喙不敢啄囚鎻恐泄蒼精機又如王愷紫絲障跨雄闘侈光陸離倒冠落佩衆賔醉臨風零亂干纓緌虬柯扶踈散蒼翠季倫擊碎􅃢瑚枝青宫賔客今園綺杖藜來扣仙人扉遥驚紫艶翻半空造物乃尔争新竒君不見香山老居士夢與元九神交馳覺來清吟增悵望紫桐花下空懐思何如吾儕時燕集對牀話乆藤隂移興餘属我掃牋素爛柯不着山間棊刺簷入户要學騰蛟螭鳥歸花落香下來時集毫彩霑人衣一杯春露助香潤清氣貯滿詩人脾依依青裊厨煙起好命庖人辦新羙炷香供具禱群龍莫學癡藤蟠未巳燕南饑民饑欲死時普旱無雨二載矣聽馬􅁎彈明妃引踈簾映閤春晝晴􅂐煙一線浮雲縈主人娯賔出雅樂疑是雪江一􅂀分得岷峨清當䆫􅀄調逸餘響大絃琅然小者音泠冷衣冠四顧静且好漸􅁴指頭淅􅄋風沙驚自云明妃出塞引當時去國難爲情黃雲馬上幾千里昭陽宮殿􅀌鴻冥琵琶恨絶環珮冷漢月空照黄昏城千年謾向圖􅀞見一曲能冩離鸞聲我非聲學固不解古道古琴誰復聽洋洋盈耳紛􅌙筝讀舜廟碑至元廿年二月七日同劉節使景融由西園過舜祠入眞陽庵觀唐貞元間顔魯公子頵所書幽州節度使韋稔重修舜祠碑書畫端莊殊有父風劉君邀予閑散適行過西園感疇昔來遊長憶至元􅀄隠􅀮故墻猶竹色半陂春水浸遺臺􅀊與都人作寒食緑波乾後燕無泥野粉飄香􅁟華碧相將歩入野人廬求訪貞元虞廟迹我欲逺呌蒼梧雲重華一去寕復得殘碑不逐刼􅁅空扶持信有神明力道人栱手􅀃向予拂拭顔書三嘆息聚星鳯池硯歌宋賔客弘道出端研示予背有七眼題曰星聚鳯池其狀皆作人目平竪蓋未甞見也先生喜翰墨又目疾新愈即得此硯豈􅀹物有歸將爲文字之祥耶將洞發神光增㕠明於桑榆之境耶喜爲作詩以歌之其詞曰硯之同功甲與鋋試之敵􅂣惟利堅其或返是奚用焉嗚呼此硯從何傳墨華猶帶紅雲鮮景星㑹并舌有泉鳯池春漲光流淵松風瑟瑟聽磨研君㸔涙眼眞茫然斵手愛惜猶珠蠙江山秀發駭一世乃今碧眼開癯仙先生神光還舊觀皎如明月澄秋烟潜心雖澹開有兆不尔此物胡為前硯园喚起襄陽米走虺驚蛇見醉㒹贈張道士字懷王孟津入自童子入道通易學莊老等書曾爲長春宫講師大方之家本静虚天地俯仰眞蘧廬鷃鵬氣化分小大二者角勝相乗除天眞所至自行火閬風蓬苑皆焚如先生超超萬里鶴跼蹐肯受樊籠拘潜心大易中有得􅀯華禦㓂資譚餘未容飲啄逺雞鶩歴遍物表須人徒紫㣲二兄老且健一念天顕存斯須今春掛囊海子觀此身之外簞瓢無鶺鴒何嘗沙水寒心迹自與間雲俱君不見三茆道士􅁛愽洽當暑講􅀃方舒徐怪魁適從何處来怒罵似泄仙經樞張錬師冝何居談天有舌儘雄辨閱丗雖泊寕忘軀神僊近日足官府道心元與時情踈屨盈鄭圃適爲累慎勿出口它人狙河􅀯秋熟一萬里遁身丘壑眞良圖少室山玉華溪紫芝曄曄青松肥吾獨胡爲坐長飢約君歸䄂風披披辛夷花歌癸未四月十三三新楽道中作樂城城􅀯沙水渳在漢名爲新市里中山遊燕此離宫亭沼當年􅔣花㡳至今辛夷植縣圃我􅀄來觀欣細履碧桐爲身梅作葉好雨􅀄晴更娟羙千年故苑風􅁟香草木含滋猶泥泥毎逢臘盡花已苞滿眼故家毛頴子宛然白賁挿秦冠載事彤庭紛内史春風芙蓉散木末紅影亭亭失秋水騷人取爾爲楣梁託物豈獨誇芬芳柔􅐾中有􅀌潔操首出庶物翻春陽我因繞樹三嘆息喚起湘纍共一觴至元癸未夏四月廿五日同􅀗鹿主簿蓋義甫同遊封龍上觀宋人碑云昔趙駱元遇徐來勤授丹元案服之遅老还童白日飛升又云徐童花徐所種龍首峰高幾千尺暮雨濯山山更碧我遊上􅀚風日清手弄寒泉看􅀛石幽人愛泉說向余藉此嵒捿從自昔駱元眞遇事㣲茫丹素曾傳不死方山林長徃世所有白日仙去誠荒唐祗有徐童花色異秋風開處滿山香題桃源圖後至元癸未夏五月二十日經略史公邀余樓居燕語仍袦桃源古畫二大軸荒佳筆也公因詢兹事有無其意果云何者明日賦此詩以呈君侯示我桃源圖絹素剥裂丹青渝衣冠爼豆三代古髣髴物色開華胥當時傳記羡樂土序說本未何敷腴半山􅁔詠似摭實昌􅀺論列疑其虚千年繪彩見遺跡桃源之境誠有無君不見淵明千古士心逺與世踈羲皇而上毎自況肯隨澤雉樊籠拘絃歌歸來朝市改故山田園松菊蕪斜川風景固足佳未免結廬人境車馬時喧呼復讎宣力兩不可天運乃尔將無如遐觀髙舉􅀷意在安得超出物表􅁳鴻俱因縁開此武陵􅀃託彼奥隱稱樵漁不然果有継問津雲煙出没何須􅁷又不見山林不外天壌間迥與丗隔皆仙居桃花流水窈然在放浪而即斯人徒放浪而即斯人徒贈九萬户昻藏野鶴誰能馴澤雉雖美終無神一篇秋水江海闊雨䄂醉墨雲煙春猿翁學劒事跡秘蘭舌解紛詞調新萬事人間歸一噱􅀟旌燭影見來頻用淮西􅀅劉污事􅃆嘗爲提生􅀅及拜大將有人授燭二枝後常見燭影在雙旌上出酉陽雜俎嗟嗟住河濵嗟嗟住河濵瀕河之患愁殺人虎狼雖􅁀猶可禦秋水時至其容奔農民家近野河居活計趂種河之淤比年旱暵我頗穫餬口之外供王租昨時一雨川澤通黒浪夜捲田廬空畸人何止賦分薄有家舉葬魚腹中嗚呼山虞虎害水即毁􅂢瘠斯民老則已滹沲秋漲行七月十日次沽家度君不聞䝉荘說秋水两涘猶見馬與牛今年滹沲水大漲墟落濈濈生魚頭雲蒸老雨注萬壑上不少止下可憂馮夷不受上所制黑浪怒蹴黿鼉遊望洋東視誇海􅀂似憤蛙比跳躍井坎湫金行氣肅坎冝縮狂瀾不逐西風収東行我濟小范口水􅀔淼􅐯方滛流秋禾盡爲魚鱉餌廬舎漂蕩迷田疇二年旱暵例乏食彼稷幸得逄今秋嗟哉一飯到口角渰没無望將誰亢河防乆廢不復古惟預揵治爲良籌翻堤决岸􅀔不巳雖有人力誰能謀近年遇災幸無事其或成患徒嗟諏两河農民􅀍災者逃避無所棲林丘夜􅀷投宿聞聚哭悲聲暗與蟲聲啾謝安從事見贈放生池碑本我嗜顔書觀欲遍獨有放生碑未見昨過髙齋偶得之喜氣津津晬吾面安卿捧持即見遺物遇真賞玆何爲掇渠所愛適余願風義矯矯非君誰君不見集古書成叙說長玩而欲老希歐陽最憐苕溪􅁁月一夜分光照客牀紀夢癸未夏六月十一日夜夢劉使君相過腰間佩二寳劒解以示予又䄂出書一卷曰此君先世筆也帋色􅃛慘字􅀋離堆用朱鈎填􅀂新髹􅃮者與之語甚洽劉㒵肖河間劉清卿既而爲風雨驚覺間夜漏下三十刻矣劉使君跨蒼驎翩然而來空際雲腰間寳玦佩两劒青蛇躍出光􅉿􅉿誰爲昧平昔欵語情何親復爲䄂出先世書一卷帋色黯慘皆竒文大如離堆幾百字鉤絡朱墨殆似髹􅃮新殘夢忽隨風雨断破䆫驚聽怒濤奔平原行至元甲中正月作羯怒騁兵傷濫恩天寳之禍將自焚三􅀰宫中略不省履霜有戒知何人平原蹇蹇真王臣沈慮乆識幽營氛泛舟從酒運竒略一日樓櫓驚雲屯鐡轝南來從獵火河朔風靡煙塵昏􅀌城平地獨與抗勇皷義旅争鯨吞西開土門掎蛇陣南激睢守遮進垠滔天腥􅁾思一掃誓與此羯不两存書生信能立大事竟掣賊肘西南奔事雖曠代有足感魯公之義世所尊我來弔古増永􅁣蒼煙草樹連荒闉欲尋遺廟不復見寳刻留在東方珉栖蓋亭前野日曛平原城下酹忠魂朝廷何嘗容直道志士蹈難甘􅂢身此心自視無愧已一時知否非所論嗟余何者敢跂慕屢書不厭裊鵉分當年紀載两􅀑城九泉奄奄隨埃塵先生一死固不杇雅操何翅同松筠故應烈日秋霜氣千古堂堂凛􅀂神常山太守歌天寳之政植禍根明皇宴安如不聞海棠紅嬌荔支緑玉笛吹滿長安春潼関之車空璘璘曲江水􅁁多麗人羯奴東歸叛意决先以羽獵驅其群朔風萬馬捲遼碣殺氣巳􅃤滹沲垠常山太守臣顔盺聲􅀔東合平原軍憤提一旅徇國難捦馘心手􅃒横奔桓桓􅀽侯復何壯㫄翼勁翮張其鱗長蛇中擊断首尾後掣其肘前行屯西開土門引義幟􅂯廓宇宙清埃氛天令完節畀二子漁陽游􅀐徒紛紛天津一死有餘烈夢入帝寢何其神只應千古雷霆氣長與先生洒怒嗔􅀒籠行至元九年四月邢䑓作命植於易等處炎風吹沙官路赫穣穰羣奔宻如織筠籠脩檐不留行一寸蔞藤􅁟膏溼蔞􅂰來自海南陬厥貢不入禹所收一朝進御列珍品何異草澤加公侯昌􅀺不湏感二鳥物有時遇非人謀志士何苦身岩幽秋澗先生大全文集卷第九
