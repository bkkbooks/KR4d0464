front:
  text: 秋澗先生大全文集卷第九十一事狀
  hash: sha256:719fae4bbe973f71e11504f9f47f73157727a986adca0ecd41cd0aa1f3b1cec0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_091-1a}
body:
  text: 翰林院不當以資例取人竊惟人材不出政事文章而巳政務但曽諳練尚可勉為至於文章自非天材有學者不可强為今翰院職掌人等樂其安簡占處名位守以􅀊月以次而迁有從書冩至修撰待制者今後合無從本院精選人材勾當不冝循迁以塞賢路定奪黄河退灘地一黄河两岸多有退灘閑地有塔察大王位下頭目人等冐占作投下稲田令側近農民冩立種佃官文字毎􅀊出納租課自餘不得開耕竊詳河水走卧不常今日河􅵝明日退灘安得爲投下属地今後合無將一切退灘地面許諸人開耕種蒔實爲便益舉耶律張商焦四相事狀一竊見前中書左丞相耶律鑄前中書左丞張文潜前安西王府王相啇挺秘書監焦仲益皆係朝廷勲徳天下重望方今之務親賢爲急比之求訪踈逺如四相者識逹政體綜練時冝􅀂使之叅預大政必能禆􅀘闕漏有所廣益傳􅁛圗任舊人共政此之謂也復許諸人陳言一中統元年許諸人陳言當時主意不爲徒然蓋一則舉知群下休慼之情二則視時政得失之弊三則見人材可用之實令政務方殷惟慮廣來直言採議得失令後合無復許諸人陳言内設詳定奪䓁官使掌其事舉明宣慰胡祗遹事狀竊見前荆湖路宣慰副使胡祗遹自中統元年至今揚歴中外二十餘年所至皆以能稱其識時應務通方有為求之時輩不可多得誠經濟之良材時務之俊傑也内外􅇵職皆可迭居今在閑日乆理合起復以應清朝之選兹乃天下公論非卑職之所得私也議司獄官竊見隨路所設司獄官致恤囚徒最為切務盖使暮夜不致踈虞寒暑罔令失所飲食以時醫藥無闕比縁當罪不使苦楚無聊損傷人命此其職也近年多以年老無能之人使充其任至獄事狼藉囚繫失所是與不設等爾􅀂選得如徃年大都路司獄劉彦禄十數人使之盡心獄事或今後應重囚未断非理獄死者治司獄䓁罪如此庶仰副朝廷哀矜庶獄之本意也禁約興利無效等人竊見近年開桃淄莱路石河致死損夫役甚衆終不能成事竊詳􅀂輩妄開利孔明知無成萬一有效功歸一已不成害及衆人所該之家其將何罪山東之民至今咨怨今後􅀂復有如此妄言僥倖之者冝嚴行禁約如見役興工者將来無驗合無量事重輕究治庶免傷財害民之悔又安知非姦人之計可不審慎之哉議大名劵軍竊見大名見屯生劵軍一萬二千餘人不及三年所費錢粮至甚浩大米一十萬石鈔七萬餘定􅀂上司近前别無驅用冝同徃年熟劵軍發還南中使分􅀠諸翼以備邊防其中􅀂有年老者放還為民不冝使仰食縣官坐糜經費緫三万大名一万二千衛輝路季太原十三年理財事狀即今包銀課程茶塩之數歳入不貲用度不患闕少所當更張者在於一切掌管之人染漬舊習中間多方掊取盡入私門官不得用民實受弊使國家虚受重利之名切要立法革弊使民力蘇息取之不致困乏馬政事狀竊謂三軍之本以馬為先今遇有用度不免和買拘刷和買官吏作弊拘刷則逺駭􅀚聴乞請於塞垣水草冝収之地分立群牧使通政院專掌其亊預備亊狀除有司常例支持外振武屯田輸粟􅀘官最為上策易稱君子儲戎噐以備不虞兼預備則造作如法犀利可用晁錯謂甲不能禦矢與無甲同矢不能入堅與無矢同可不重慎今後合無將隨路常課􅂯行整􅀧督勒使成造如法於上書冩官匠姓名以考其程於所湏去處起庫収貯如是庶得造作如法不致臨時併造多不如法朽鈍不堪用度為審断罪内亊狀竊見隨路淹禁罪囚極多省部自從以来逺踰半􅀊今追銀者有人填撫者有官檢災亡者有使未聞曽差一官審理罪囚者古人􅁛遭遇旱災多縁刑獄淹延所致即目巳是秋分乞請選精詳官貟曉知刑名者同按察司官分路前去審録歸断一切獄囚恐亦感召和氣之一端又使百姓且知省部不獨扵錢糓留意也為革部符聴偏辝下断事狀竊見部吏符文之弊謂如甲以田宅告部便以偏辭有理断付甲主乙復上訴新吏不照先行却以乙辭有理即付乙主路官知其徇弊欲從理長者歸結二人各􅀝元符互相不服其两造或赴察司陳告照卷明見亦欲與之改正又縁省例部断者不許輙改以致耽誤有累年經􅀊不能杜絶者乞請上司定奪歸一母令止慿偏辭輙下断語庶免人難開種两淮地土事狀一竊見黄河迤南大江迤北漢水東西两淮地面係在前南北邉徼中間歇閑􅀊乆膏肥有餘雖有居民耕種甚是稀少冝設立大司農司招集江南北無産業人民驗丁力摽撥頃畒令一定住坐爲主官給牛􅃗農具差税並不取要􅀂成就後别議定奪如此不數年間開耕作熟貧民既得濟虛地又行内實萬一緩急以食以兵皆可􅀝用祝香百門山神事狀一輝米凖差者二千石和買又不下二三千石又淇水係是御河上源一切漕運供給大都甚有功用比之濟瀆及物濟國潤民之功非細據上源水神似冝特降香火以荅神休司官不勝任者即行奏代事狀照得條畫内一欵按察官聲迹不好者即行奏代今南北察司廿道毎司正官與首領人貟除新任未滿者是迁調貟數嘗幾扵半材不易知安得人人而當之然即其所知於􅀄選時稱停搭配不致偏重可也其巳除而不勝者􅀂姑息待滿是知其無能今徒占位次月費俸料養資歷而巳於司事何益乞請令􅁥察上下半年巡行督察之􅀊取其功罪之􅀹者明著之以示天下不次陞黜一二人所謂臺諌急則􅁥司警監司警則郡縣肅誠激勸賢否振勵衰弊之一法也精選首領官員事狀近年憲司首領官多取自雜流扵案牘文墨有絶不通曉者其懦者備貟素餐強者挾􅀻害公紊亂官府􅀂今後止於見任州縣八品七品職官内選兼該儒吏通曉世務風采人望出緫幕之右者使充可也且憲司職雖紏彈其體面全是禮法二者為用不同管民叅佐衝撞辦集為能􅀂必其取強梁䟦扈務尚口吻者是無良之人假其重􅀔使之行私耳伏乞詳思以存大體添書吏奏差人貟禄食資歷事狀竊見按察司書吏奏差人貟據掌照文案紏察等事其品雖微其職甚要今百物踴貴俸稍不足以育廉賢愚混淆資叙不足以激勸循名責實似有所難惟其養之厚故可責之重乞請將禄食資歷耳行定奪稍得加重乆則人自為􅂆􅀂責罰出退其將何辭関支俸錢事狀竊見迁轉官吏例携㓜扶老千里區區而就一官照得十八年正月内朝廷令州縣依舊與俸却為各處官無見在至今有未関支者是國家露恩如常而州縣不蒙均恵方餬口不贍而責曰尔無貪吾有法豈理也今後乞請將隨路百姓納到俸錢另行收貯專以按月支付庶㡬官吏日得養廉易於責辦罷孫招討户一孫招討户自都督史􅁠鎮鄧州時投拜約八百餘户名之曰射生户即目散處襄鄧西山一帶合行分属所在州郡為民當差不致别生事端罷南陽屯田户一南陽府屯田三千户徃年亦曽言其當罷其後省差官與河􅀯宣慰司一同前徃屯所勘當定奪其本管官見户齊歛鈔四两打發来官以此却言不罷便至今依前屯種理合罷散兼􅀯陽縣民該驛程在城見管當差户止十餘户遇有一切逓轉差役委不能當􅀂將上項屯田户放還為民甚為便當罷規運硝减山楂䓁官一隨處見立規運所硝减局并河泊山楂山場䓁官侵漁百姓其害非一謂如一切販買山貨䓁物其賣主巳有認辦課程買主赴務起稅及其貨賣又行依例啇税今来山楂䓁官鎻闌山路或半道廵捉更行驗物抽分至於来自它所經過地方不慿関引取要錢物稍渉疑似監収鎻索百方侵擾竊詳山野小民貲本輕微仰之經營以供一切差役今者有此重併實不􅂓生所立州府為上司設置辦課衙門坐視亂行又不敢問致内負旣屈控告無所據上項一切創立局司侵奪民利䓁事理合革罷以慰民心定奪儒户差發照得丁酉年欽奉聖旨節該中選儒生􅀂種田者輸納地稅買賣者出納啇稅開張門面營運者依行例供出差發其餘差發並行蠲免又照得中統二年欽奉聖旨節該巳前聖旨裏如今咱毎的聖旨裏和尚也里可温先生荅失蛮體例裏漢児人河西秀才毎不㨂甚麽差發休着秀才的功業習者欽此至元十三年蒙上司差官試驗分㨂元籍除差儒人該試中儒人内两丁近下户計撥充大常寺禮樂户竊見試中儒人户内多有户下餘丁不曽就試官司収係當差又有因故不及就試儒人亦行全户収差􅀂蒙將元籍試中儒人户下餘丁不曽就試户計照依丁酉年試驗儒人聖旨體例全免本户差發外及因故不及就試儒戸乞差官􅄪行試驗試中者依例免差黜落者収係當差實為受賜外有至元八年欽奉聖旨保勘到委通文學續報􅀝差儒人於至元十三年亦行就試中選􅀂䝉依例除差以為後􅂆薦前御史康天英狀早膺劇任備見長材當官有通變之方持論熟經事之慮考據實迹委號良能如憲臺􅀄立首以材望櫂拜御史継授南京幕職時攻取襄樊夲官支持餽運務繁益辦􅀂以才能可以從政八路之間少見其比自秩滿居閑恬扵仕進于令四年抱用未伸中外漢惜伏惟聖朝方致理有為之秋如天英者不冝使才徳空老田間以遺明時之用理合舉明以激貪鄙保郝彩鱗狀竊見故翰林侍讀學士國信使郝經奉使亡宋幽囚十有六年以沉欎致疾還朝未幾隨即物故據以勞死事誠當優恤其家令嗣子彩鱗年長􅀒學卓有所立似冝超䓁擢用以酬父勞且為立功立事者之􅂆申明宣慰使陳祐狀盖聞忠義者天下之大閑聖王常推而褒之所以砥礪生民為當丗不忠者之􅂆竊見故中奉大夫浙東道宣慰使陳祐歷事两朝家無儋石迹其官舉皆善政生而竭匡濟之忠殁而有砥礪之効􅀌身遇㓂無路可生􅁬然不去為國扞賊甘心白刄正色就死雖李司徒之握節死事顔魯公之抗志􅂢軀無以過也至使越之部民感愴忠節萬口一辭願留葬㑹稽世奉其祀自非精誠洞貫儆動一時何能致此其於助丗教厲薄俗豈小􅀘哉况忠義者國家之元氣所冝養而不可衰也今本官淪忠泉壤不蒙顯異切為朝廷惜焉伏惟哀憐推而褒之不惟於贈典殊常將見伏義守節之臣自兹為不少矣嗣子夔今為福建路行軍千户盖出特㫖不縁門資次子臯未仕通文學有孝行如録之從政必有可稱亦旌顯之一端也􅁱理大都南京石經事狀三聖人之教其揆則一尊其師重其道此理之當然也竊見大都南京廟學所有九經石刻刋瑑極精近年巳来舊制旣廢舉皆散落於荒煙草􅁄間日就摧圯甚可寳惜且經之遺制自漢唐至今歷代聖王無不尊崇修理盖重夫經丗大法故也今海宇混一方息馬論道之時據上項石經理合脩立以彰國容兼所費不過夫匠􅁅石而巳只係有司一言力耳論黄河利害事狀夫古人作事慮未然不治已然治未然用力少而收功多沉預備不虞古之善教也河為中國經瀆迁徙不常自古為患非小川細流可比􅀼見今夏自中堡村南卧去京城廿里而近撞圈水三百餘歩􅀔湍悍舊築月堤一蕩而盡又自河抵京北郊地􅀔漸下南北争懸七尺之上中間土脉䟽惡素無隄防固護以悍水衝又見犯去處不下五六十歩南接陳橋六丈故溝至甚寛浚北􅀔既髙水性趋下断無北泛之理故識者云巳隠犯京之􅀔似非過論也􅀂向前霖潦大至瀑汎之際意欲所之崩摧潰决其害有不可勝言者毎歳有司規畫不過今夏復夫數千明年興功半萬縷水築堤以應一時極其所至僅能防備渰水終非緩急可恃得濟之用但幸其不為菑耳况大梁自古雄鎮今又為江淮緫㑹要津日當修理不可任河作􅑂視為㝷常萬一侵犯豈惟使民居蕩析且廢通漕控制之利民之大命又所係有重焉者盖開封祥符陳留通許䓁數縣之地耕種不暇數萬餘頃􅀂澷為淀濼􅀊訃先失民何以生此最可慮也又聞徃年两次南犯酸􅀥陳橋二門止是支流小水京尹昔告秃滿行省崔斌䓁極力堵閉幾不能塞况今大河正流直指南卧常人尚慮將漸為患而增卑培薄分流殺勢之議其可後㦲今體訪得河自臺頭寺西東接􅂎縣西界两􅀔平無槽岸行流虚壤中故卧南卧北大􅀔走作所以漸為京城害者不岀此百里間而巳􅀂能舍小就大廣為規制如亡金新衛所修石岸者遮障奔衝使東過三汊散為巨浸可毋慮也當職竊詳每􅀊興功築隄防㧹真成戯劇恐徒費人功損踐民田其為可防經乆之事曽無少􅀘如蒙以國家大計論之河防之議其􅀃甚多合行重為講䆒方来利害舎小就大廣為規制以圗一勞永逸之舉寔為便當不然據要害去處建立祠廟專使以重禮禱􅀕仰頼洪庥庶囬神眷使河有定流不致傷財動衆亦捄災之一端也秋澗先生大全文集卷第九十一
