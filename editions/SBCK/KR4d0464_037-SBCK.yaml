body:
  text: 平陽府重修道三晋之地表山帶河風土者侯小者卿采圜檄二千餘里自前代來視諸道為上㳺平陽寔治理􅀁在故府署之制崇壮麗􅀔壓不爾與山川形勝莫相長雄道愛堂今府治之前事其東西廣十有五尋南北一辛丑都監郡薛闍公因故基創焉當至元十一年甲戍􅀊盖三十有三載矣􅀊月既墳􅁟木㢮解侏儒就弱西騖夏沉氣湮欝不時脫落殆不能視顛撑危上冬官考工悉許公帑於是慿寛如相前増崇之腐撓敗者盖甎之破裂者之折者與夫吏舎臺門狼藉之然山大瞻重門洞盡城之南北望衡玄居六曹執事登降公式治于中従容委之隆於治以一之用宣于斯審于斯不勤官之戒凛取學人之意也即府判官西衛王惲謹記平陽路景行里新修岱嶽行祠記岱宗東方之鎮山有國者得以旅焉􅀕典下哀世以神司命萬􅁼死生禍福幽明㑹歸故所在駿奔奉祀惟恐居後去之逺者其敬篤事之肅者祠愈崇盖其風俗使然復何怪焉平陽故族張士信等信之篤事之尤謹者也常以匪廟而貌之不足妥􅂕掲䖍牖人於善也於是傾貲擇勝得東南陬景行里爽塏之地甚延奠其神觀焉寔經始于辛邜歳之三月于至元之戊辰凡締屋幾三十楹前殿後寝两廡翼中設􅁳府諸像曰昭惠君蒿里相祈嗣位五重直及隂圄變相擁衛環列㒺不畢偹巍巍煌煌帝居光俾􅀚者􅁸敬加畏知所􅂆戒善油然而生于􅇆洋洋焉對越􅂕威如在其左右也下至作樂有亭省牲有偪便户鑿乎西臺門敞其南槩瞻餘祠號稱整肅吁勤亦至矣一日來丐文於予將紀其興建本末洎信􅂇者之名氏永昭于後因畧為論述之嗚呼古人以神道設教今也作新祠宇為事理雖殊而􅀔有固然者自禮義亡而世教不明於下一鄉之士秉􅃔心而私淑人者不爾則弗克悟陋民而儆薄俗是則後人之意也欤然神也者聦明正直福善禍􅁋乃其職耳奉之者歳時儀献能齋莊沐㓗逺惡遷善可薦而不爲神羞吾知夫朋酒斯饗􅀗簡穣之祉矣不然慊􅀒中積象恭于神雖鏘之以鐘鼓之音腆之以牲幣之禮芳菲滿堂三獻具舉神將厭而不顧尚何福之有㢤幸来者詳特書之意庶乎其逺黷矣十有二年春二月平陽路緫管府判官汲郡王惲謹記絳州正平縣新開􅄎􅃳渠記至元改號之六載詔立大司農司其品秩僚属特與兩府埓盖以農桑大本滋殖元元莫斯為重故崇職掌開藉田以率先天下外建行司曰使而副􅀊時廵視責郡縣長吏條綱甚悉考其成績而明殿最凡先農之遺功陂澤之伏利崇山翳野前人所未盡者靡不興舉東雍之地厥􅁟赤殖墳雖􅃳蓄兩河島則􅃾而亢下者鹵而瘠時雨稍愆􅀊功不稔州尹馬君患之遂按行川浸思有以濟其艱而敬承天子之明詔曰澮吾所用也於是度原隰順水􅀔距郡治東南三十里曰楊程郷澮入汾􅀁至横截水衝楗石為堰者三袤可六十歩武穿崖壍阜激之北騖波神委蛇來就束帶郭門而西注汾其間長溝通洫蔓引枝分溉田度二千餘畒水性濁滓流􅁖溢􅃾於田甚冝業巳波及穫可畒一鍾凡役工若干計未週􅀊而渠事告成盖君以規度有方衆樂其􅄎􅀶之施也故自始迄終曽不告勞絳下老人相興材公之為感公之勤欽明命霈利澤終以實恵及民懇予文以記之予甞有事於鼔溪之神登髙望逺􅀚陏令梁引用鼔水分溉田疇幾絳之西北郊于今蒙􅀍其水有餘蓄而河為限之暵思以一杯沃枯槁而不可淂嗚呼何跬歩相望而有苦樂之間㢤今馬君鋭興兹役出衆慮之所不及行前世所未行俾汾左之田􅄎洽膏􅃳仁民之功其利􅀶哉百載而下􅀅見府君與梁公並祀而同談者矣董其役者寔縣尹趙某簿王某􅀎事其事而不􅀒所責勤亦至矣故併及之且採民謡而為之歌歌曰新渠成汾之滸溉我田流潟鹵公雖劬民獲所昔也豊穣穫幾許今縱旱暵决渠雨甌窶滿篝公所與公惠我􅀆母速去我報公􅀆烏􅀁覩刻石河濵照千古遊王官谷記山之與水相胥而後勝山非水則石悴而雲枯水非山則􅀔夷而氣泊二者雖具淂其人而後名中條山王官谷其萃羙之􅀹者也山闖首河曲連亘北騖為雷首為栖巖為萬固運肘而東為五老又東而淂王官谷谷漢故壘名有唐司空表聖之别業至今遺像休休亭在焉至元甲戍夏六月予以撿括牧田㑹蒲巳而奔命珣瑕􅂑道于虞王官諸峰指顧東邁後八日因恙小休暑雨向霽遐想風㷑情逸雲上遂幡然來㳺始自固氏西南行約四五里抵山門歴磴平進無顛頓堆挽之勞不百許歩已入山堂隩中矣其繚而曲深而容垂蘿灌木磐石羙䕃草香而土肥環峰疊嶂碧壷瑶甕濃淡覆露内曠而外掩無擁遏怫欝之氣盖谷田中髙状作層陛􅀔相覆壓耐辱􅀁謂上下方者是也東西兩山曰壷門夕陽青壁矗立卓絶如削中峯曰天柱秀拔特起如鼇鼻嘘空髙齴雲表不與衆峰聯絡真竒􅀚也峰半有石突然曰落鶴臺又西有石拱立曰㕠人左右断崖水作瀑流下㵼如仙人觧佩天紳未収西則泉􅍺出縮以乾溢為度東則飛灑噴薄隂壑恒雨砰崖激石下注幽磵是謂貽溪者是也山藉以􅃳人仰以清物滋以榮也王子於是歛袵薦茗謁司空祠下退觀休亭諸詩既髙公之名莭且詫谷之深秀也青鞋竹杖扶掖上征抵天柱峯􅁕望東嵓瀑布䃲礴三詔亭上因留􅀫焉時月出山豁萬􅄜沉寂􅋽露洗空失暑􅀁在青嶂瑶光非復塵世其東溪水聲如逺􅈜奫􅔿􅀮動林壑顧謂児子孺曰此山靈張樂喜其来而作予氣也深夜乆聞毛髮森竪山人李珏岀司空一鳴集相與披讀扵露幌風簷之際顧瞻林影如見須眉乃酌水再酹乞靈扵公詠休休之歌思考槃之樂安淂黄金買堪乗之鶴追仙㳺扵寥廓也邪不然揺江山之筆吸撑霆之氣貯濯詩脾以増益其未至庶幾列名扵王駕李生之次亦所願也日既昃徘􅆦乆之出山林霏煙翠漠然四合回望谷口無復所見庚伏中旬后三日共溪雲􅀮記待旦軒記至元壬申􅀊予自御史調官平陽扁私居之軒曰待旦盖所以礪厥志而儆不逮也矧河東列城五十棋布相望大府寔根本所在而風俗係焉􅀦制張官五㕔幕例下僚位東西與别駕嚮至扶筆剖断一㝎于上官僚芒無所事及占署牘尾無細大通淂可否之是則位雖下所責亦不輕苐以品位有崇卑材術有􅄖劣得其人則分安而政舉非其材則身骫而事去自惟氣質踈散心雖勉强撫字無方故就列已来朝夕惕勵如恐弗勝當其夜漏将盡晨鷄始興矍􅁸盥􅈭即夫清明假􅄰之際得無深思者乎其扵徳澤川流何宣布焉庠序煟興何申重焉綱維末振何主張焉風俗未醇何肅清焉吏沸務棼何理亂焉訟繁獄滯何簡䘏焉属邑不共􅂚先率焉賢才在下􅂚薦揚焉静言念兹有公以䖏心勤以集事耳噫周公聖臣也負扆履籍以當􅃁宰之位至扵思兼三王而施四事猶坐以待旦勤强不息况其下者乎盖勤則為􅀘拙之資公即具生明之本無私則心宰心宰則理得理得則言順克勤則匪懈匪􅈈則力行力行則事随事随則物化此理之固然無復疑者苟不是念而甘糞土其身臯皐訿訿藉􅅒禄為代耕之地與夫工不事事計日􅂑傭者奚異㢤恐食焉而氣怫寝焉而休臲尚何根本是頼風化得丧之所係焉若此者豈惟媿負中積而獲罪于時􅀅見嘯干梁者下瞰其室矣於是乎大書屋壁庶抑詩之自警云明年夏五月二日靖共堂主人汲郡王惲記􅀞記近世之沒者以平時服玩遺宗属賔友諺云留念緒然非故舊知爱之至則不爾平陽刀君甞飲予扵私苐酒酣出古􅀞一簏中淂龍嵓山水兩幅其山骨欎荗林屋黯宻盖學中立而逼真者也上題云丙申春孟留汾水時為康玉閠所作時金大定十六年也􅀊月峥嵘迄至元甲戍九十餘載矣余歎賞者乆之刀即前用為夀辝焉明年乙亥春君以疾終既卒哭其家持􅀞来貺遵治命也嗚呼君與余非故交深知者且南麓畫在士大夫間固有品格然不過一物耳其可重者氣與義也昔曽子易簀而後殁愛其禮也今君當萬事已矣之際事有不遑及者乃以是為嘱篤夫義故也吁衰俗波蕩中􅀎耿耿取信如此可謂信義不失者矣時扵軒楹間展對斯􅀞愾然想見其人未甞不為之嘻歔也君諱國器資敦純早以勲閥為征西帥臨敵决戰以果毅稱軍中後因疾去職僻居田間怡然自淂人不知為故侯失将也西山經行記至元乙亥秋七月􅀍藩府檄偕來伻盧君採文石扵音丙申如㐮陵董治厥事舘許氏東堂八月庚子次西梁質明致祭黄崖山下遂命工即役借榻普照僧舎凢再􅀫有以義成石為言者壬寅馬此首旁山行入臨汾界過侯氏四水等峪踰山尾得王荘峪峪口敞諮夷衍北連白􅁜砦脚既夕􅀫龍子祠南晋掌里癸卯下井峪渡麻柵澗自獅子鼻登山越石門是為姑峪西山諸峪凡十有八䖏姑射王荘寔為之要盖南逹吉郷北走􅂵川道也前臨渃岸􅀚隂定関関形峽束若石門然僅通人過想夫秋潦澮汾群壑来注掀騰勃怒萬馬東駃􅃍阨兹口激而爲飛流銀濤雪浪百丈湍㵼亦壯觀也躡澗西騖歴馬蹄􅆞山雨奄至且作且止指望仙臺眺玉女樓望生馬壇頂諸峰烟霏翠濕空􅄥無際蹊蹬縈紆盤十有八折抵神居洞下洞腹寛肆窿穹巉嵓仰視欲墜後有竅逶􅃉山之噫氣穴也遂解衣盤礴憇洞閤上㝷復開霽山紅澗碧景氣爛熳涼風吹面自逺而至煩􅁭翛然如夢仙府雖遇四子於汾水之陽不足以喻其楽也因􅇔題壁間且辯其誕少焉㳺太一洞􅀚隂罅玉柱盖石鍾乳也稍西騗馬鞍嶺上弱羊坂坂長約七八里極峻折艱於登陟馬力不能勝抵暮宿西陶謝氏林屋甲辰由鄭峪入義成分循澗槽西行逕嶮狹草木蒙茂歩履錯迕過水磑折而東北上砠嶺視石之所在石陛砌覆壓隱山之半腹玄質白章又有絳其色若雲然者尤秀􅃳竒特降横崗石澑間得枯枿一株矯如龍騰竒崛可愛於是按行澗道眎輦運所經稍東入深峽乱澗水峽形曲折中蔵堂隍其根足沙水囓蝕似口似圈似窪呀焉而頥張突焉而角出者不可殫記两崖峻削嶄嶄壁立髙入雲表大石阜如齟齬左右􅀔犖确殆不能􅀐造愈深而峽愈竒又東行十餘里顛崖横截水潨㵼石甕中鏘然如環佩鳴两山間峻絶不可越矣遂自南脚嶺攀援北上峯囬路轉行可六七里抵宿東陶山家乙巳復自羊坂東降􅂑姑射北道過龍堂澗望仙門謁王母洞道人致酒山閣以軟脚例飲余浮大白者三世傳北山中復有玉蓮古洞下與此穴暗相通連旁有水泉曰漉錢名者事渉誕怪不復紀遂由側嶺白石溜下叅峪抵西叚里午飯郭氏田舎日昃還府吁天壌間山水佳䖏唯幽人朦士得徜徉其間與顥氣造物俱㳺而共樂不圖官守急遽中而獲兹逰雖不能竆幽極勝弄雲烟而狎魚鳥亦非嘗之舉也埽筆所覩以志且見夫因事機攄煩滯而不為徒然也船蓬菴記船蓬道人姚氏太平相里人自童丱入道甲子幾四百矣棲心淡泊草衣木食全其生而樂其樂穴居野䖏于澗之阿削懸崖為􅁟空廣不踰㝷丈迴環洞如一歳之中而有結夏蟄冬之適塊坐塵凝與時啓閉温燠清深去圜圚咫尺殆塵壌隔予甞以事走絳與故人張噐之遇把臂道舊歩入縣西溪遂来㳺兹庵道人因丐名扵余題之曰船蓬且請其說船蓬者􅂑形佀而言然意不無其􅀁寓焉盖水浮天而載地中土者天地之虚舟也萬類雜䖏魚頭濈濈其陵蕩傾覆之虞日復一日何若斯人䖏斯室而獨為一天肱眠瓢飲樂其樂而曽無錙銖之患㢤余乃為之歌曰玄􅁳之曦􅀆朱夏之清􅀆木歸其根蛰吾形􅀆梨花雪開啓吾扃􅀆人區鮓瓮全吾生􅀆蓬底秋江汎然無所攖􅀆余復何求心营营􅀆道士顧􅀏舉酒相属後余歌而言曰銘吾廬甚當扵是乎書平陽府臨汾縣姑射山新道記􅀳人善用水而盡地之利山之奥蔵未有以悉發府冶西山行五十里曰東西陶鏐炭􅀁萃連山亘峪根苗洞窟軒豁呈露然澗壑嶺嶂號稱天險􅉾深峻削摩雲穴地磻錯交礙跬歩間登頓駭汗不勝其憊雖中伏厚利用是限隔川居邑聚十不獲一二並山農氓志圖開鑿力單罔逮睨之而興愾者盖有年矣皇子安西王以維城之重分茅開府胥宇雍􅁟爰命幹使伐石兹山輦出之途仍宣理焉乃西自李琚䟽度而北諭南山截義成澗盤􅁟塿東上搚嶺脅折而東北行度鄭封峪上盖炭之膏盛扵焉而㝡又甞置鐡官出車連連之咽㑹也循崖崦􅂑易東騖縁西陶北麓其㒹走延隴四道過東陶里出断崖南分而兩岐其一履級東降越疳溝旋鞾脚嶺腦懼其蹊良田也落生馬澗櫓穿南北石峽山形櫃如極險迾䖏也遂中貫而上南則駕駞嶺轉弱羊石盤抵夀山平壑下㑹馬鞍嶺口以備北道石峽水潦時至之虞躡竜溏而東經望仙北洞跨南北溝首由前後石門嶺下白石溜厯參峪注赤植坡陽盡西叚里當峰回路轉復作避車􅂣六防其􅃱阻塞也其間踣鉅石擘老峽峻絶者坦焉阨仄者廓焉􅻄确者火焉刋落摧䧟去危就安變壅鬰爲䟽通夷峻惡爲平易西東一瞬略無梗澁雖並崖旋阜紆回曲折方之故蹊曽弗加逺凢為里一萬八千餘歩揔役徒五百度工萬五千其始至扵迄工才十有八日扵是山輸委貨人休永勞逶迤安舒坦坦東下籠􅀒車牽魚貫而出居者行者􅀏歌載路相與言曰伐他山之材而獲兹石之秀因輦運之役遂致道途通暢之便西山伏利以之盡起不惟俾一方之民頼厥功而冨􅀁用抑以見我國家封建之制肇造藩維之方隂賜扵民者将張本於是不爾山澤無竆之利将終古而奥藏矣守土吏大小之役寔董其事是不敢不志某年月日記平陽府臨汾縣新􅇬記平陽當河汾間爲鉅鎮属邑五十餘城臨汾劇而最要經界􅂊百里占藉者㡬萬五千户凢丘賦之重徭役之煩十常居其二而風聲氣習勤儉果譎宛然雜唐晋餘俗惟其物浩壌狹且不相能故人嚚於訟必直曲廼巳聽約束俟審辨者動填里閈縣舊署在府右廂康寕坊之南城易代來爲工人氏豪據有司假老屋􅂩舎寓理曹務一􅀊間輙三五易豦簿書儀具坌集委積棼不可曋奔趣執事者當夏熾冬冽赭汗僵立尤寔艱苦前政狃故常眄􅀲代日復一日漫不加省庶㡬赫令尹之威具眎瞻之媺清承宣凬化之源其惟艱㦲逮今縣監某洎尹某稔其如是􅃴時和訟理嚮化有漸廼以其故詢諸衆僉曰念兹在兹􅀼有年矣苐率先無自訖干今唈唈也既度其人之樂用遂經辦焉􅀿直得景行里次氏之故第凡成室一十有五楹略不加易其来如㱕㕔事適中吏舎兩列形閎前啓衡逹里逵扵是逺湫隘䖏髙明委蛇安舒各有攸叙中外竦然大易觀仰既而史亢淵曰其興滯易弊之勞趍事樂成之懇公倡私應共濟厥羙匪劖書珉石代而縣者烏能䆒根據而見經始贄礼幣来謁文予以厯官内外因知天下之治在於宰相師帥得人而已佐天子理百官發號施令以遂物宜者宰相也推君治宅民生供事􅂑决㑹㱕有極撫字百里間者師帥也是則宰相與師帥势雖霄壌以本末體要而言寔相須成化耳故前代選重其人眘柬扵清流􅁽授於軒陛䟽名殿屏盖繇是也今國家條章具舉百度惟貞顓任責成垂􅀉殊切作縣者苟非恪勤官守推忠及物何以稱經緯相需之望今一縣之署置固匪政之大者􅀋能若是尚何患仕之不􅄖俗之弗易責罔塞而績用不章扵時㢤予特喜縣僚属逹扵從政有志扵民得春秋憫雨之義故以所繋重者告焉幸来者毋忽至元丙子三月日記懐先賢記至元甲戍冬予既復首陽山夷齊祠繹之曰亞尹張侯聿來㑹􅀕遐想故家佇瞻墟墓對越靈威泫焉泣下盖風􅁩激哀有不能巳焉者顧謂予曰走世為􅀌竹人自穉及壮經行㳺獵徃來南山故城間覩夫廟貌不稱旌記寂寥言念于懐顔寔有靦吾子幸為我大書特書歸掲海濵以為􅀖人光且表夫山川之重鎮二賢出䖏之大􅃱也按圖經箕尾之分勁氣下蟠控帶遼碣北平乃一大咽㑹故其俗雄碩尚氣義敦諾急難凛焉有戰􅀦餘習乎州經界本殷諸侯孤竹君世封春秋為肥子􅀦秦漢以来列郡縣不恒寔燕之肥如盧龍邑地肥如因水淂名耳開皇間始陞為州直滦江而西二十里有古城宛存枕動山東􅅢盖􅀌竹故都今指曰竹城者是也州治南三十里而近有山巋然盤亘中野其名曰􅀌屋二賢其上遂亦首陽呼焉於戯二子之英烈言言竆天地亘萬古皎乎日月不足以喻其明巍乎嵩華不足以喻其峻俾後之為人臣者􅂑標凖而知所懼其為世教豈小􅀘㢤尚何俟山稱號而為之顯晦也然侯懐賢思齊之意何其盛歟荘周有言去􅀦期年見似之者而喜盖敬㳟桑梓曾不燬其爱􅁖矧􅀦之古賢世之大老特立而不群者乎若張侯者可謂尚友千載敦鄙薄而有志者也侯諱昊字明卿資果逹嗜魯論爲顓學故􅊩官行已多據經㫖爲言已而沾沾然喜見顔間曰吾中有所淂矣其篤信好學如是至有以張侠論目之者十有三年丙子春正元日謹記遺廟記金海陵焬王以天徳七載乙亥定議南伐明年正隆改元詔大營汴京擬混一江左遷而都焉故廟社之制扵是乎興然清廟寔前宋之故物也在景祐間止屋有七楹而金之記曰正隆四年己夘􅀊冬十有一月禮部尚書同修國史王競銀青榮禄大夫叅知政事敬嗣暉開府儀同三司尚書左丞相上柱􅀦魯􅀦公臣張浩􅁥修寔金為之増廣加飾非創作也何以明之覩其挻桶旅楹大而徑三尺者比皆腐朽餘丈若曰金朝創始不及百年安淂如此之朽腐㢤廟直大内之南馳道之東殿法吴制東西列二十五楹袤四十丈廣七丈其神室内地廣一十歩餘四歩為室前之虚明廟兩首各限一楹中以二十三楹分十有一室從西以三楹作一室餘每室以爾㨕為之龕之數其西位夾室六南向者俱兩龕自餘率一龕􅀁向皆東面而已緫十有八龕殿階作二層列升道三前井亭二東西相向外作重堧四繚靣沿門角有樓門南列五闔餘三而已其東北中垣之外即􅁽寳殿也􅀦制凢帝后寳􅁽暨郊廟金玉禮噐皆在焉令太常官一貟每季檢視用印封緘謂之􅀧寳禮噐者何爵瓉圭壁是也玉􅁽者何先代哀謚是也其􅁽帝以寳玉作簡后以象齒為之賁以金書貫以朱絲封縢甚秘卋莫之見南則更衣亭亭前舊有湖石環竒名曰瑞芝其東南外垣之内即神庖刲􅂑血膋之􅀁環重垣之内東西為廡各五十㨕旁夾廟門各廿有五千以分布齋郎駿奔走執之列正北則闕焉其西南垣外即廟署位前有門以表循外垣西比復鑿偏户一意者􅇱執事出入之便也予聞之遺老云制祀廟率以親王上宰攝太尉以享太祝奉迁宗拓置地用色羅上羃帝以黄后以絳所謂至敬無壇也茵以皐比噐設陶血用血肉以獻上下之樂畢􅇱此金朝典秩之大槩也􅀦亡巳來汴之宫室毀撤掃地顧惟兹廟以貯儲淂巋然獨存皇朝中統五年夏四月詔河南前宣撫張子良撤焉以北浮御河入燕就爲今之大宫從堂議也據正隆己夘至今甲子以暦考之適百有六年也識者異之且今􅀄建宫扵燕多撤汴材其木皆以燕用爲誌今是廟亦復用燕之故址有数存乎其間爾自有􅀎辨之者夫君子􅀅營宫室宗廟爲先祖宗胡可以無廟然一廟之用有不可勝之費今也存亡廟而爲新宫其尊祖息民可謂恭儉者㦲是廟宋制也按禮經天子七廟太祖之廟居中三昭三穆為之左右其七主曰壇曰墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟月一􅀕之逺廟為祧去桃為壇去壇為墠壇墠者有禱焉􅀕之不則乃止此三代不易之制也逮東漢变而為一廟同宇異室耳李唐自貞􅀚開元后増置九数后宋因之亦列九卋為十二室而金朝以九帝有天下百餘年上自景太至扵宣宗不審天興奉祀之日其間升祔祧出得列扵太室者凢㡬廟何者得祔何者為祧邪故并及之以俟更考云至元五年夏六月十一日記㤗安州長清縣樂育堂記趙君明叔尹長清之明年政夷訟簡眡其民可教迺廟垣為數泮宫扵是治學􅃕植松竹聚書史立教條率儒生属吏日講授其中雖造次多故未甞少輟不半載士勤扵業吏循其風禮容文物郁郁可觀十四年春與予㑹扵京師因以曏􅀁聞為問曰有是奚足多為然清今為中縣顧瞻岱宗背􅀒河濟教習出齊魯間在昔距濟南為近邑生徒率就學府故禮殿序庠之屋庳隘無足稱扵前爼豆弦歌之不接見扵閭里青衿之耳目盖有年于兹矣此僕之􅀁以不敢狃安故常鄙薄其俗勉有此舉也已而以學記来請甞試論之古之君子以先知􅁴後知以先覺􅁴後􅁴是天之􅀁責扵我者甚重我烏淂而避之况有䏻􅃱之資居可行之位􅀹當急先務也令尹雖出宰百里寔為一方師帥政之得失俗之善􅁖繫夫志嚮所在知先後之序耳人之秉􅃔惟其物則内具故好是懿徳此天理均有人心之本然也苟淂其養無髙卑大小之間故狂而聖愚而明始也􅃱知格物身修而家齊終則明徳新民􅀦治而天下平由是而觀學校庠序之教豈小􅀘㢤叔世道微功利說興督責之令宻士以區區末學苟禄代耕奔走鞅掌扵簿書期㑹之間我躬不閲遑䘏乎爼豆禮容之事㢤今君以脩敏之材􅁬跡諸生間歴事臺省由省䑓而宰劇邑卒扵簿書期㑹奔趍督責之餘遵詔條確志嚮務以徳義牗民力行不倦為樂俾群材長育如中陵者莪菁菁然而盛可謂䏻也已昔韓潮陽牒置郷校曰刺史縣令不躬為師使後生無􅀁從學為耻又以飬育人材為吾君相之事顧天之􅀁責於我者當何如㢤若趙君者庸知夫不異日得時行志以斯道􅁴斯民為天下之樂且儀乎吾見有開必先之兆扵是乎始君諱文昌濟南人至元丁五􅀊三月丙申記逺風臺記豐冝門外西南行四五里有郷曰冝遷地偏而􅅝逺土􅃾而氣淑郊丘帶乎左横岡亘其前中淂井地三九之一卜築耕稼植花木鑿池沼覆蕢池傍架屋臺上􅀠其榜曰逺風以為􅀊時賔客宴㳺之􅀁者韓氏之昆仲也至元戊寅百有六曰主人邀予來登顧瞻河山形􅀔在北則近連圻甸南則逺際河翔東控海門碣石之雄西眺太行桑乹之勝千里一瞬略無限隔少湏風翛翛然自太虛中來浸􅁋乎谿谷蕩􅃞乎林野春和明霽微埃不興聲先乎群木之㒹氣欎乎崇丘之外然後度叢桂入亭圃轉蘭獵􅈍泛溢乎層棟軒楹之間座客欣然動蘭䑓之興暢方外之適披􅁭當之曰信乎滌煩臆抒滯思而其來之之逺也余仰而思俯而歎曰子知風之來邈未䆒夫䑓之淂斯名扵士大夫間也韓氏自鄅城府君以来孫謀底法以燕翼子者義則昭昭矣通甫君羙遵誨承志光大先業􅌚然若父菑之敷播曄然如棣􅂠之相輝泝流㝷源其遺風􅀁従來逺矣故賢士大夫莫不重其好賢楽善登兹䑓而願與之㳺由是而觀慈祥豈弟之風又賢扵人逺甚况兹墅也出而入仕蹞歩扵清朝之上退而􅀮䖏偃薄扵山林之下􅀅行義違道存志俟時無不安適其清風穆如流芳扵後人者又有逺而不可極之􅃱不然天壤間林泉佳䖏苐欲暢幽情而滌煩慮何􅀁徃而不可客曰嘻有㫖㢤今韓氏卜築之意信得其􅃐而吾子可謂發不言之秘勉其􅀁未然者焉既而嘱予筆記之因掇前言俾刻諸䑓上以貽來者至扵風交平疇良苗懐新行之而喜者兹值杖野人之事故不復云後三日記韓氏遵誨堂後記人子之事親存没兩間觀志由行三年無改為孝之至况終身而維則者乎燕今為大都㑹世家鉅族飄輕􅅂䕃華欀非不侈而盛也及論夫居室善而内有則者韓氏爲􅁕稱長即緫管通甫次即君羙判府予御史裏行在燕者凢三年用是交好甚欵知爲人甚詳修身齊家讀書治生禮賔客應外務一以忠信孝弟爲主怡愉雍睦如賓友之相敬棣􅂠之相輝也過庭者佩詩禮之嚴居家者無言􅀏之雜超然而䖏熙然而㳺方筵多燕衎之娱田野有烹歌之樂以􅃱一門之内百順坌来昆弟之間言無少間􅀁謂身不求逹而逹有餘屋不期潤而潤自至予甞􅀗拜鄅城府君􅀞像望之粹然一淳徳君子其嘉言善行無非後嗣可遵而法者乃知韓氏淵流之深長枝葉之茂盛䟽之溉之者功加扵前継之承之者復善其後故永年先生良有旨㢤嘻李唐在前代為盛卋至栁氏為稱首予每讀玭傳求其修齊之要不出以忠信為孝弟為至曰此乃食之醯醬可一日無㢤未甞不撫卷嘆息三復格言万衰俗䫋靡中而韓氏昆仲亦􅀎以孝悌忠信爲飲食之醯醤揚令名而顯祖考奉潜徳而彂幽光惟是心不匱至錫􅁼也如是􅀅見垂芳来葉不獨栁氏專羙扵前史也秋澗先生大全文集卷第三十七
