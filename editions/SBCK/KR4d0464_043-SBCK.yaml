body:
  text: 序紫山先生易直解序紫山胡公年未強仕應奉翰林潔居官舎者幾十載致力讀書䆒明義理期於逺大取易卦辝徧書屋壁時不肖忝在言列過而見焉詢其故曰吾朝夕洗心􅀅範模四聖人庻幾言行適冝而寡􅀹悔焉非特説夫言竒而法也識者巳以通材有用許之尔後郎地官佐省幕緫尹大郡提憲外臺平生藴藉見諸施設其至公正大之論卓異特逹之舉固不可枚數要之神吾志行吾道不阿合取容於時不俯仰勉從於衆可行即行不可即止又其晚節脱屣軒冕􅀏傲林泉進退兩間知命随時從容中道蓋棺論定皆曰紫山曠逹英邁士也稽驗疇昔諗其得於易者爲多􅀄不知其有所著述公没之三載嗣子伯馳携所著易解懇題其端公與僕自弱冠定交氣義契合互爲知巳今雖衰􅂴撫其遺書忍無一言發越潜輝夫易聖人憂丗書也純粹精􅀷通貫三才理包萬彚其用必湏見於開物成務之實然通其變必當逹其辝逹其辝欲見諸用者不於先覺躬行踐履之實跡而取法焉未見能造其窔奥也昔宋名儒劉斯立作學易堂記但序日用常行事而曰余學易矣論者以爲得體况紫山踐履工夫形諸事業復推巳所得纂而成書啓迪後人可謂得聖賢忠恕之道矣學者復能考公平昔操履得其端倪以之㝷繹􅀮􅄨奥妙之㫖則思過半矣大徳二年冬十月八日謹序緫管范君和林逺行圖詩序燕趙自昔多豪邁慷􅁣之士雖時移俗易不復於古而海山沉雄通貫斗極鍾靈孕秀間亦見其人焉和林迺國家興王地有峻嶺曰抗海荅班大川曰也可莫瀾表帶盤礴據上游而建瓴中夏控右臂而扼西域盤盤欎欎為朔􅁟一都㑹然去京師數千里地連廣漠氣粛玄􅁳中土人聞話彼間風景毛髮森豎巳不勝其凛然矣况行役於其間哉至元丙戌詔皇孫􅀳王於其地建藩開府鎮護諸部燕人范君徽卿早以湯液供奉徽卿為人讀書尚義以功名自憙識逹時務臨機果决非特以方􅇊進也凢侍行者三徃返焉所謂沙漠寥逈風雪寒沍險阻艱辛備甞之矣其志益厲氣益振曽無退縮顧避之􅀻今人暫適數百里間者輙有離别可怜之容抱􅀍入直省署彷徨顧妻子語㓨刺不能休較以徽卿之事非豪邁慷􅁣者乎冝遂雅志掇美仕而收功於薬籠者不止邯鄲故歩也友生尚薬長叚鼎臣壯夫為人撃節嘆賞之不足復持所繪逺行圖将求名公歌詠庸彰其名譽属序其端予謂徽卿志行固可振衰激懦為臣子忠勤之􅂆復欲形諸歌詠庻有聞風而興起者焉大徳二年十二月臘日序易齋詩序予徃􅀊需命延芳東淀識供奉姚君於稠人中儀觀秀偉襟量伉朗及聽其談論灑灑有断决固疑其非建除流也舜卿河東人少愽學越法家為顓門甞從事憲司以平反􅁛用薦耒京師當涂者將處之秋官司平旣而侍從官有以善占筮聞者一日緹􅀐到門以所詢上對多徴驗中事幾由是待詔金馬日承恩睞者盖有年于兹四方稽疑問計者湏以正理示之曰人事順􅆱蔡不吾戾也皆知所止而去然舜卿姿耿介􅀒才氣思効用於明時者為切顧是覆逆有不屑為者足跡亦未甞及權貴門墻求展其所藴賢士夫歆其志尚如此樂與之遊從嚴範泉甞題所居曰易齋率賦詩極口幽賛近持嚴翰相過属題其端且曰序吾平生闕下十年幸詳之過此非所知也予告之曰昔劉斯立記學易堂但筆其宿昔日用常行之事洗心工夫不一言及論者謂得體盖易之為書聖人之丗為書人事作也吾用旣明道固在其中矣嗚呼舜卿胷中自然之理善學不言之妙與厮立其亦同然者乎元貞乙未冬十月望日序洪洞縣王舜卿敬親堂詩卷序昔賢論孝子之事親也務為敬愛交至恐其恃愛而怠慢生故父子異宅而處復慮孝愛簡而弗洽廼有問搔庠痛之節所以廣其敬愛也然宣尼語孝之大經以不敬其親謂之悖禮徒能養而禮法不足又深警於言游蓋明孝之用固有愛敬之别䆒其本體主一無適與親之重事之大復何以加於敬乎予官晉府者五年得純孝之士曰王君舜卿舜卿丗居洪洞縣東陽里自曽祖惠祖誠祖母張氏継享遐齡子孫俱以善事聞舜卿夙承家範復知讀書勵行増益其情文之不足者奉其父伯玉君恪供子職謹身節用惟恐甘旨之有闕也氣和色愉所期致志之樂也孺慕情至洞洞属属如不勝而有所失由是取信於朋􅀋傳美於郷閭僉曰舜卿誠孝人也予甞過其廬扁曰敬親庸表順徳後廿餘載予在翰林其友人中省東曹􅁺郭文卿相過而請曰舜卿自經翰學先生題品後信道愈篤家居教授克終孝養有司辟舉辝皆不應邑大夫洎士之能文辝者咸歌賛之然未免為一郷士也不肖交㝡欵将求詩什於朝士庻播其清譽幸念疇昔賜以序文予謂文卿曰河東三聖人所都平陽寔放勲所理其至徳之所感格深澤之􅉼濡至今尚有存者􅀳卿乃􅀳産之良孝行旣超乎流輩􅀮居復求其志尚自可追遺風而厲衰俗矣昔唐董召南􅀮居行義昌􅀺先生作詩發其潜徳宋徐仲車力學至孝紫陽朱公特書卓行二子之名因之昭晣顧予衰老其言豈能為人重輕哉文卿曰士志􅀗伸於知巳後生借重於先進此理之必然况甞趍下風而接清光者乎不然幽􅀮之士烏能名於後丗邪予曰有是哉於是乎書大徳二年戊戌􅀊重陽前二日序雪堂上人集􅀋諸名公雅製序雪堂上人禪悅餘暇樂從賢士夫游諸公亦賞其爽朗不凢略去藩籬與同形迹以道義定交文雅相接故凢有營建游謁或懇爲紀述或贈之詩引三十年間累至數百篇非好之篤求之切安能致多如是􅁘廼自諗曰綾標玉軸藏之篋笥銀鈎翠琰列諸廊廡焚香煑茗玩味者有時拂拭塵埃披讀者有數不若纂爲一編刋之板木用廣其傳遂詣秋澗翁以序引爲請予詰之曰夫浮屠氏一生死外形骸百年斯丗電露起滅事業功名一歸虚寂而後已今吾輩旣以不朽計實其空無復欲申衍微義其說何居師曰在吾教法中凢嚮善積行述賛偈爲之證據今某踵鴈塔之故例續千佛之名經集群英裒衆美期欲布恒河沙界等湏彌盧共傳爲無盡藏不求詞林大居士爲表􅁀其端倪皷舞其􅀫緒是猶以明月之璧夜光之珠無因而暗投可乎予曰有是哉昔文暢參寥子愛仰昌􅀺東坡名徳屢造門墻二公以墨名儒行特與其進至贈之序賛雄深雅健與時俱新膾炙人口由是後丗知有二僧之名雪堂其亦文暢參寥子之流與至於行業風義讀其文頌其詩自當知之兹不復云樂籍曹氏詩引樂籍曹錦秀緩度清歌一日耒爲余夀因詢之曰汝以故家人物才色靚麗風韻閑雅知名京華爲豪貴招致逞妙藝而佐清歡日弗暇及不知何取於予而得此哉曰妾雖不慧頗觧之無猥以薄技陳述古今興亡閨門勸戒必探窮所載記傳詩詠掇採端倪曲盡意趣乆之頗有感悟欲為效顰願乞一言為發越俾妾姓名得見於當代名公才士題品之末庻幾接大雅之髙風一時増價飲靈芝之瑞露七竅生香不同落花飛絮委跡於塵泥間耳先生寕無意乎曰予少有志於時中年多故每感事興懐登髙作賦以攄其底藴由是頗以文字知名今老矣百念􅁅冷有瞑目澄心燕坐焚香而巳惟集賢翰林諸名勝擅文雅而足才情念芳温而餘藴藉者肩相摩而踵相接也􅅣肝腎而製錦綺因咳唾而成珠璣模寫鶯花之狀形容月露之情只在揮毫之頃耳彼徃求而得之如杜秋娘之善謳金縷薛校書之秀發娥眉元相國杜樊川皆贈􅀉詩什語意清新膾炙人口自可因之以傳不朽尚何俟粃糠之辝􅉫􅀭於前哉曰請即書此語令妾持之以為先容扣蓬萊瀛洲之境而問津焉不以可乎磁州采芹亭後序采芹亭者前州倅劉藻之所建也予自壯年䆠游河朔間每過􅇭陽更遽必趍拜楊公而去一日先生率予謁州之廟學指其廢而未理者曰此郡庠也此頖池也此頖之采芹故址也承平時學校之盛視數州為冠吾雖耄要當修完庶復舊觀據當時所存者雖一瓦一石俾保之勿壞旣而先生下丗壬辰冬予復過􅇭陽所謂芹亭者巍然如翬飛翼跂宛浮波面荷香藻影曉風凉露士子游息徜徉其上沾濡芬霏歌詠思樂殆有登瀛之快已而翰属曹生因求書其事楊公疇昔之言不覺蹶然於中雖罔及施勞使來者是心不匱寔先生有以錫之我其可不念哉先生名威字震亨承安人姿剛直有文章議論少甞以蕃兵為儒将有功西夏建元􅀄年中書甞召為詳定官巳而言事以星變勸大臣宜解機務以避賢路不然且有大咎不聴遂拂衣􅀯歸教授郷里壽八十終于家逮至元五年襄陽破吕文煥出降五月北覲過磁先生贈之詩云連隂六十日平地一尺水今朝與明日淋􅄋尚未止此者天垂戒其中有至理降将吕太尉飯畢行欲起偶尔得㑹面舎舘接汝爾自言鎮襄陽於此今五紀為惜萬人命此來非為巳聖主錫深恩髙爵還故里一飯尚有報盡忠從此始余謂我國家萬方同一􅁤得之與不得東􅀯一隅耳向使君不來宋歴能有幾人生苟冨貴直筆一張􅁓見說李陵生不若張廵死吕為之歛祍而去撫卷懐賢豈勝感嘆若能取孟亭例祀先生於學宮俾死而不忘儲宫祝香回洒汗而書雪庭􅁉公和尚語録序至元丙子夏予考試河􅀯由汝抵洛崧前勝槩盡在目中只欠少林一遊耳東行擬取道轘轅庶饜􅀫願竟以事奪不果耿耿在抱至神遊洞閤雨花􅌭紛怳與真遇今年甲午冬萬夀主僧圎譲偕少林惠山来謁因及山中物色與向夢不少異相顧一􅀏乃有是邪遂䄂出一編曰先師雪庭語録也仍合􅀲前請曰公山林清興雖未􅁛遂幸題辝篇端以爲佗日張本寕無意乎予以事與心㑹似非偶然者按所具騰說以應懇求雪庭􅀄叅万松秀公萬松得法雪岩上人縱横理窟深入佛海至於游戯翰墨與閑閑屏山二居士互相賛歎爲方外師友其噐業槩可知已帥叅礼閱十寒暑獨能秀㧞叢林得根踞爲奥遂出丗主奉福精藍継應少林敦請招提禪刹号中天名勝板蕩后増崇起廢頓還舊觀緇徒具瞻蓊若海㑹於是欵龍庭而振舉宗風敞五林而弘闡家教因縁㑹合傾動一時以無碍妙辯現當機應身處綂堂第一位者盖有年于兹從是而觀自非克荷佛乗大異倫类機鋒峻整逈出物表者能如是乎今舌本巳浄真如迹空學其法者能鑚研故帋即心印所在求向上一着恐不待夜雪横腰而悟面壁西耒之意盖有之矣吾未之識也是􅀊仲冬開局前三日書孝節王氏詩卷序傳􅁛夫有再娶之義婦無二􅃴之文盖天道之常經人倫之大綱也然風霜别草木之性衰俗表幽貞之節求之于今王氏其人也父振北渡后甞為州權司年耄無嗣納州将劉六􅀰為門倩得一子甫半􅀊而婿亡旣而父以女年盛且無母氏議復舘甥於室女聞之跽父前而言曰家貧無嗣世之常事婦人再醮柰名教何有誓死而巳父壯其志遂􅃦無幾異母弟用國俗欲行續嫓王氏出好言置叔於姑前以人倫正理折之曰寕守節而死不失節而生且夫者天也天不可逃行違神明天則罰之即欲自戕頼左右救而免叔亦感義烈而止時劉帥殁已乆世業扶踈諸子分居其姑秦氏亦無子􅀌影㷀㷀空闈索處王氏善組紃以供日需提挈子傑歸養秦氏以極孝恭教其子至通習儒吏致卓有所立於是風動郷閭義激行路􅂄舊士夫交章舉保􅀩旌表門闕曰孝節王氏之里嗚呼光顕哉及秦亡顧劉氏三代浮殯淺土子孫游䆠力不暇及遂獨營墓田經理葬具凢溝合者十餘竁郷人來觀無不驚歎曰丈夫児有不􅀎辨者何賢孝如此王氏處寡四十寒暑言􅀏未甞露齒素髪盈簮氣皃幽閑所謂老而益堅者也郷里偉其徽羙一日子傑來請文因泚筆而序之庻幾備采管䑣區明風烈者演柏舟之義云雪庭􅁉和尚詩集序禪以奥為說詩以志為言僧之以詩鳴者見於晚唐盛於前宋前賢評論固匪一致不出才清氣勝發􅂼笋之餘芳辝簡義深調􅁑藤之奥語就本法言之以心傳心推離還源在用之恒寂而已尚何文字之有然出丗演法者儆悟群迷不容忘言假借聲光發雷音之先雪庭公和尚蓋亦出丗演志者也集詩詠及雜體等篇為三卷首嗣髮恵山來求予叙引以光師行雪庭平生然甞聞諸友人陳節齋談師噐局磊用見諸行事其在方外實為不今觀其應物信手拈來吹花作霧於憂時判徃徃出言意之表者可謂混儒墨為之手段企慕髙風追攀有山堂惠至元甲子冬十月卄七日秋澗老人序嘉善録序刑者成也一成而不変民之生死俗之􅃤舒係焉故君子悉其聦明致其忠愛而盡心焉在唐虞三代之際風俗淳教化備巳有輕重適冝欽恤哀矜之感况肺石雪􅁈􅁄林夜哭之後哉此疑獄折獄等集所由作也大都路緫管府推官李君威卿少習城旦書以儒術飾吏事復取經史子集下逮百家之說凢関於刑憲者撮其機要纂而從􅀋先之以歴代法令輕重㳂革著明其體継之以聽断節目之詳彰施其用凢三十二門名曰嘉善録一日携示秋澗翁懇題其端予雖衰耄􅅐中耿耿尚在士有好學而兼善者廼喜聞而樂道之自政教陵遅獄辝繁閧事至持難手有未易措者故軄任推理衆爲抵諱然恊中輔治之具雖聖人視之為切務者孜孜焉存心而盡意可謂超出於流俗之表矣况有致知之資居可行之聀當推鞠審决之際属􅀋比事稽古凖今融㑹貫通俾時有􅁛平不􅁈之譽為不難矣昔宋祥符間有獄官張慶者以矜愼自持其囚徒飲食湯藥卧具必加精㓗其後子孫奕葉登第顕䆠于朝論者謂慶平昔重䘏獄事隂徳致然况延精覃思盡心於五罰五用者哉威卿尚勉行其所學善推其所得而愛物兼善之澤詎可量邪西巖趙君文集序西巖趙君系出遼勲臣開府公後遭時多故家業中衰西巖崛起􅅵畒從龍山吕先生學金自􅀯渡後詩學為盛其格律精嚴辭語清壯度越前宋直以唐人為指歸逮壬辰北渡斯文命脉不絶如綫頼元李杜曹麻劉諸公為之主張學者知所適從惟虎巖龍山二公挺英邁不凢之材挾邁徃凌雲之氣用所學所得偃然以風雅自居視孝恊律趙渭􅀯伯仲間也雅為中書令􅁘律公賔禮至令其子䨇溪從之問學由是趙吕之學自為燕薊一􅂀西巖受業適丁兹時探䆒其淵源沉浸乎醲郁加以立志堅篤講肄不倦冝紹傳遺緒最為知名士􅂢舘後十五年子天民携所述西巖集見示求引其端廼為之說曰文章天下之公噐與造化者争衡為之甚難故得其正傳者亦不多見豈非天之降才不易而人之噐識亦有限量邪惟就其材地所至學問能就以自得有用為主儘名家而傳不朽若必曰湏撑霆裂月碎破陣敵穿穴險固者方可為之則後生晩學不復敢下筆矣如西巖之氣淳而學古材清而辝麗自足以攄平生之底藴為後進之規模異時有大辝伯出如王臨川元新興纂李唐之英華續中州之元氣序文章之宗􅂀者則於是集恐亦有所取焉遺安郭先生文集引関輔天下形勝地有終南太華洪河涇渭為之􅁭帶􅁎周之所積累漢唐之所經營雖時異事改彼忠厚雄傑之餘風山川英靈之萃秀而在於人也意其必有瓌竒文雅之士生乎其間僕甞思一遊求其人與之縱竒觀歴遺跡羡河山之良是嘆興亡之無窮豁逹界蔕以忘吾憂寤寐平生未遂斯願至元乙亥冬猥判􅀳幕夤縁迎謁抵華隂東歸殊悵然也爾後每自秦雍來者必為訪問雖得其髣髴而士之􅀮見􅀄不知也大徳庚子春方謝事不出有客扣門剥啄自􅁛奉先郭良弼嵒甫携示先丗遺安先生文集請引其端細為披讀盖信道篤燭理明攻詩文為顓門之業者也豈非向所謂􅅛竒文雅之士乎雖未西遊其山川人物已在吾目中矣柰何衰老􅂴於論載請益勤乃勉為之說曰文章雖推衍六經宗述諸子特言語之工而有理者尔然必需道義培植其根本問學貯蓄其穰茹有淵源精尚其辝體為之不輟務至於圎熟以自得有用為主浮艶陳爛是去方能造乎中和醇正之域而無剽切撈攘㓕裂荒唐之弊故為之甚難名家者亦不多見惟周卿先生天資冲粹内守峻㓗自㓜力學為健舉子中年流離不易所業故徳望彌髙文學益冨致逺近尊禮又少日以外孫行接際蘭泉先生所交麻段孟李諸公皆秦􅀳名士其資之深學之􅀶與夫淵源講習可謂有素矣故詩文温醇典雅曲盡已意能道所欲言平淡而有􅆂蓄雍容而不迫切􅀋其行巳靄然仁義道徳之餘孔子曰有徳者必有言信乎其有言也所可惜者連蹇􅂣屋不遂一第侍謀省幕道弗大行然化乎今者不必傳於後晦其始者其終必顕曰􅂋與晦必時之待楊雄氏所謂五百年必得其人然寥寥四海豈無知音者恐表聖之言乃為通論况有賢子孫為之􅀭顕者哉今文治蔚興學者日衆異時板本一出有序􅀜右之宗􅂀䆒蘭泉之命脉者則於是集知所崇尚矣翁三山史詠序自伯魚趍庭宣父訓以學詩俾興起志意通逹事理造夫大學閫域由是後之學者有以取法知所適從伊川先生甞欲體詩叙童子切務令朝夕諷誦發其意趨盖遵遺㫖也六經之外其次莫如史然載籍浩􅀶􅀄學者欲遽渉獵譬如筭沙海上成功何年故前丗有帝王鏡略小學史断􅀩求箋要等編皆誘之易以覧誦速収見效今慶元路緫判三山翁侯元臣復廣克前人規模取通鑑編年事跡顕著者綴聮五言絶句二千餘篇其歴代之隆替君臣之得失粲然具列辝直而不晦言簡而意足使􅀄學者讀之易曉而難忘庸他日融㑹通貫之漸或曰牽合章句破碎全史不幾於􅂐刻雕蟲之弊乎予曰不然聖賢進修學有大小傳有後先子夏所謂譬諸草木區以别者為得之矣况翁侯是作特為童􅀩所設就其所成就而論可謂祖聖訓述賢傳攄已志惠後學好古􅀶雅者矣大徳四年月日謹序燕山王氏慶弄璋詩引史舘檢閱王生子憲自其先丗以篤行至孝培植根本子孫奉承家致屋潤復能尚義好禮為名公賢士夫􅁛道都城人物浩䌓由是王氏以孝義知名子憲㓜􅀩訓誨卓有所立以良家子選侍閤門擢直玉堂謹愿文雅出色同輩有光故家所不足者嗣續爲念大徳庚子夏佳氣充閭璋裳呈瑞犀錢玉菓已浴蘭湯綵筆柘弓載臨晬旦以予在院中最爲􅂄舊來乞名乃取先丗積善而不近名種徳而不求報命之曰餘慶先儒有云善惡之報至子孫而後定又云賢者必有後王氏其有子也冝矣謝庭春好羡樹玉之臨風竇桂枝榮望讀書而有日徐卿二子少陵有歌嗣深晬日涪翁伸頌凢與徃來者皆冝作詩用展光賀贈李逹之詩序李逹字逹之汲梁人世􅀅家旣長遊燕遂占藉焉爲人慷􅁣樂易好閑便静以相術行於時然不以藝自矜與僧西雲相善講主和一日以領宗門事為問切語其徒曰汝師不數日逺行尚欲何為不浹旬而逝又同術者指一井工有坎阨斃不出來日逹曰否坎阨則無将縊而死果然􅀯官程緫尹以除目訪之曰喜只在此夕口未落而除下其應験若尔僧龕禪榻曽不惜朝鏡之蹉跎醉䄂笻杖甞歴遍春煙之巷陌丗味䆠情兩皆泊如其兄􅂋道以偏師戍􅀲歩殊光􅂋也書屢招不赴或疑焉逹曰兄安余無所希覬何徃其安貧守分如是者有屋數間在崇仁東市門田五頃近潞水澹臺里􅀊得租粟自餬其口云義齋先生四書家訓題辭義齋先生姓石氏諱鵬字雲卿父璧自五臺東徙唐封家焉丗傳儒業中戊戌選終保定路勸農使先生早以文行師範一方至元丙子用辭科魁多士資純篤恬於丗味惟閉户讀書務為無所不窺四書小學尤所致力集其所得遂至成書沉潜玩味者有年反復更易􅀄不去手易簀際属其子承義等曰吾平昔精力盡在是書藏之家塾詒訓子孫吾丗其庶幾乎承宗奉遺命以叙引來請僕憶提憲燕􅀯時按行属縣與先生有一日之雅今雖衰耄忍靳一言庸慰存没夫四書所載性命道徳之懿修齊治平之方道綂所由傳授學者所以修習推明天理維持丗教如水火菽粟日用而不可闕伊洛名公後宋諸儒集解纂䟽論之詳矣近年月而公卿大夫下而一邑一郷之士例皆講讀僉謂精詣理極不可加尚先生復能沉浸濃郁含英咀華發先儒之未及附巳意之所見自為一家之說其學與志可謂勤而知所務矣蓋士生斯丗不可虚拘出則行道濟時􅀮則立言垂後况性命之理仁義之端非由外鑠皆性分之所固有職業之所當為盡其在我者而巳􅀄無先後淺深之間故子貢曰文武之道未墜於地在人賢者識其大者子夏亦云君子之道孰先傳焉孰後倦焉是則先生著述之本意也若秪以篤信好學修辭明志遺訓子孫啓迪後學折中聖賢則義齋之名亦當傳聞于後於是乎書大徳辛丑􅀊孟夏吉日題義齋先生小學家訓序義齋先生􅀘註小學書藏之家塾未甞示人治命其子承宗曰當携謁秋澗翰學庶明吾志先生旣没郷邑士人楊飛卿将板行焉承宗致遺命懇求序引僕向游䆠趙北與先生夤縁􅀻覿欵洽則未也用是追念疇昔敢攄臆見昔晦庵朱文公旣集注四書俾大學之道體用本末昭然􅂋著復慮童䝉之士弗知趍向次第不能入徳義之門造治平之域復述此書俾為師者知所以教弟子知所以學雖曰小學其文辭雜出於聖經賢傳百家之書言微行懿顧老師􅀫儒䆒竟踐履有終身不能盡者近年科舉不行士趨實學曰師弟子云者專務講明収功致效舊有標注未極詳備今先生之注䆒其淵源辭㫖之奥與夫品節度數之詳随其䌓簡而具載焉純直明坦俾􅀄學者觀之易於省解如陟髙而得梯階濟深而遇舟楫其急先務應時求不為無􅀘先生諱鵬字雲卿自號義齋保之唐縣人隱居求志潜心著書不求裱襮吾聞積善勤學報施不及其身而發越於後者必大則是書之出先生之志之學光昭於時也審矣西溪趙君畫隱小序予旣冠受館於漕使周侯因與門下士趙君子玉游乆之熟其為人資清雅而有幹局心機巧而善繪事其􅀄家藏營丘􅔪墨朝夕愛玩不去其手遂有所得継遇東丘􅀞工沈氏指授筆法又甞西遊太行窮巖岫之深峻觀雲烟之変化當其情得意㑹留連忘歸動經旬月由是於仁智妙趣得其動静之理及操觚染翰覺心手洒洒無留思甞為廉右相董承㫖及僕作廉泉野莊秋澗等圗景氣潇爽雲烟清􅃳筆簡而意足其􅀉興雲霞放情林壑有淡墨寫出無聲詩之譽或譏懐材抱技不沽價以求售曰人物者天地之幻化圗畫者又人物之幻影彼功名烜赫冨貴薰天者倐忽之頃巳歸磨㓕况韋布之士欲取聲華於虚幻之餘不幾於惑歟然所以孜孜於此者特遣興適懷寫吾􅎍中之丘壑爾聞者為知言大徳辛丑夏邂逅都城為予臨楊息軒緑野探梅圗髣髴三昧不傳之妙復懇於予曰僕老矣技進止此幸惠顧序述平生傳遺子孫乃語之曰昔曹覇樂藝而忘貧窮郭熈頭白餘筆力少陵山谷為賦丹青引秋山歌攀附􅂹尾名垂不朽顧僕何人敢望於二公哉趙君趙君其奈爾何子玉曰不然前賢後賢其揆一也古徃今來各其時也顧在中朝問望老於文學者孰出公右言念夙昔能無情乎旣不􅀗巳乃援毫而識之趙氏系出柳城䆠族當天兵􅀯下父通福以義勇附太師國王帳下從定河朔屢立戰功夀終定武漕使周侯以葭莩故表其勞績䝉先朝収録二子仍復其家仲列名侍從後歴尉完利等州州尹次曰澄即子玉也受中山三司使晦跡管庫餘三十年無毫髪􅀧汚蓋其胷次脫洒不為物欲所累故也五子秉仁秉温縁父好尚亦馳譽丹青云是􅀊秋七月上旬二日秋澗翁謹述崇真萬夀宫都􅁥馮君祈晴詩序大都辛丑夏仲暑雨大作霖􅍂不輟至五旬之乆泥􅂗坎塪車馬不通潢潦㳽漫浸貫川澤小民咨怨農夫告病崇真萬夀宫都􅁥石泉馮君乃謀於道衆曰吾輩奉正一法以祈禳為業覩其如是雖不吾以安可坐視而弗救􅁘於是致齋㓗肅儀物􅈼告穹蒼飛檄諸部懇以七日為開霽之度及期果六丁歛虐曦馭騰光士庶􅀗覩天日晴明之快免昏墊䧟溺之苦於是羽客儒流咸作詩賛揚湖廣儒學提舉戴月澗以序引見属戴交乆情欵有不能已者廼題數語姑塞其請予甞讀洪範九疇觀天人相感之際随所召禎祥災沴應之吁可畏也故三代君臣遇災知懼固曰修已敬天爲務而禱謝禋榮盡諸人事者自不容巳逮漢静應張公以神道設教躰含清虚用周慈憫爲國家祈天永命爲􅀺庶祓除不祥由是祈禳􅀕醮自爲一家之學傳授科式符籙具在也然得其人則法靈而著効笱非其人道不虚行傳曰至誠感神又曰至誠動金石道雖殊途其致則一若石泉馮君之祈晴有驗其亦持守誠敬􅀕醮精嚴善於弘衍宗風者哉諸君作詩􅁛美不亦冝乎其年秋七月卄三日秋澗翁漫書窮閻飄泛逝川東千里嘉禾一雨空􅑷㩳羽林槍壘底林林萬木水光中􅃤舒何待鞭竒石禱􅈼端能格上穹千古盟威神力在崇真壇下振髙風紫山胡公哀挽詩卷小序挽章者哀傾逝而寓夫所感之辭也予於紫山旣哀之而復有以惜焉紫山起諸生進擢舘閣􅀭歴省臺官至三品夀幾七秩順受委正略無慊媿於何嗟惜所惜者材超卓而不凢氣正大而有養可以挺公論而勵衰俗激清風而作土氣旦天柱峰摧少微彩晦士林憔悴失所景仰不知乾坤純粹之精山川英秀之藴幾丗幾年氤氲感㑹復生斯人此黄鳥之詩薤露之歌有不容已者忝與紫山三丗交游氣合情欵故其子典簿特屢徴鄙作旣序夫易解復記其祠堂今又以斯文為念孝心追逺誠宜嘉尚顧筆力衰薾奚能發潜徳之幽光倡作者之端緒然眷懐疇昔重以陳太常北山之請敢攄平生所得於公而可深惜者冠之篇首云大徳辛丑􅀊秋仲載生明秋澗書朝儀備録叙至元辛未􅀊大内肇建始議講行朝㑹禮儀盖所以尊嚴宸極辨上下而示等威也然事出草創不過㑹集故老叅考典故審其可行者而用之其後遇有大典禮准例為式祗取嚴辦一時執事者各司品節其禮之全體亦不能䆒其詳而通貫焉逮侍儀􅃕人周之翰供職乃纂述物色儀制之品班次度數之則曰朝賀曰䇿立曰開讀皆具已行而可驗復圗注以致其詳皇儀縟典粲然明白目之曰朝儀備録携示秋澗翁求考辨焉乃告之曰汝外祖文康公羽儀先朝粉飾皇猷號禮文􅁛首汝父松壑侍儀􅀄事綿蕝􅀗預選習今汝從事於兹又復有年其見聞之乆講習之熟可謂專門學矣况禮之大經本乎天理之自然節文儀則出人情而折􅂨不容強知妄擬措私意於其間雖聖人不過祖述旣徃随時去取故孔子曰周因於殷禮所損益可知也其所以行之者極乎敬慎而已故曰其在宗廟朝廷便便言惟謹爾則是書纂述非惟俻豫考按即事可行若有集國禮而編㑹要者亦􅀅有所取焉大徳辛丑􅀊立春前五日秋澗退叟題恕齋詩卷序郎中李侯正卿其先世佐金祖開國子孫衍慶傳嗣侯爵易代後軒裳蟬嫣猶為燕雲鉅族正卿資明豪踈財樂善有子二人俱教之讀書勉勵資藉之者惟恐不及與古人愛其子教以義方之說吻合衣冠修整僕馬鮮明喜交游遇事慷􅁣與物無凝滯蓋有志於冨貴利逹者也人爽約以􅀒之量廓然而能容或非禮以相干但理遣而不校尚恐其守之不堅行之不力乃榜其宴息之所曰恕齋又為未盡也質之於秋澗翁将求諸名勝題詠庸勉其不逮乃告之曰夫人之生禀精五行有情有性仁義禮智主之於中所謂性也喜怒哀樂愛􅁖欲感之於外所謂情也聖賢存養撙節求合乎中而已其恕云者旣盡夫存養之功復推而為應物接人之道故曰推巳以及物已所不欲勿施於人蓋由内以逹乎外自漢以來不能體認聖賢求諸巳意思遂以恕為寛容之􅁛雖范忠宣之賢亦有恕已恕人之說是徇外以遺内也何不揣其本而齊其末哉今夫己之善推以及人其不善弗加諸彼則物之應於我者皆善自無出悖來違之戾尚何寛貸容恕之有今正卿旣識其用復能明其體由未以逹其本日就月将緝熈光明則違道不逺矣雖然比之貪冐無厭覿於貨財較班資之崇卑計利害之得失不至傾䧟攘奪而不止者為之猶賢乎巳某年月日秋澗翁叙秋澗先生大全文集卷第四十三
