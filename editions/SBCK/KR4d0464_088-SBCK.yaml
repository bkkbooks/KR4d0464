front:
  text: 秋澗先生大全集卷苐八十八烏䑓筆􅀘
  hash: sha256:aed3574444824a618007b1fa3b15cd765792027d3ac14ac00cdc2babe62526ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_088-1a}
body:
  text: 弹趙春奴不孝事今察到在都薊寕坊人匠趙春奴􅀅伊親母阿焦生不奉飬棄絶在外餘二十年於今年五月内客􅀉患病有伊母親妹梁阿焦遣人報知其趙春奴並不前来侍疾至十九日夜母阿焦身死其院王陣姑兩次専人告哀本人又不奔赴停至午轉􅅻方前来巳是帶酒並不舉哀又無衰絰復彂怨言雜以穢􅁖又禁伊妻不令哀哭遂􅀅靈車用驢駕拽便行出送春奴隨逐道中又不哭泣亦無戚容言􅀏自􅀂里巷人衆指詈不孝其逆心終不悛悔反生嗔怒先行去訖有姨弟梁􅀙振者告到匠官黄元帥教依理持䘮出殯本人故􅀅䘮事畧不成禮只扵當晚焚燒了當詳此情逆世所不容今京師風化之源憲䑓肅清之府其趙春奴旣爲人子其於毋氏存殁之際梟獍其心絶滅人理較量􅁖逆孰大扵斯其在國家寔傷風化據此合行紏劾伏乞御史䑓照詳痛加懲戒施行論鈔息復立常平倉事切惟天災莫重於㓙歉國計無先於貯儲盖諸有餘則國用足國用􅁕則民頼以􅁕今天下大約公私之間曽無蓄積以俻㐫年况􅀰目自中都而南蝗旱水涝十有餘路雖水至甚萬一失所官湏存䘏然不過發倉廪免租税重爲賑濟而已此特捄荒于一時其於經國逺圖則未也以愚見莫􅀂復先帝常平之制就各路巳有之倉令有司預爲脩理講明定法不使有名無實昔唐以税茶等錢爲義倉之本深爲便益叅詳合無亦將隨路平凖行用鈔庫工墨鈔息増餘見在等鈔分標州郡作常平粟本就令夲路轉運司兼以提舉収籴勾當續用逐年所得錢數源源不巳則三年之間百萬石之粟可不勞而辦是常有一年之蓄矣又㑹驗得常平倉國家自丁巳年􅀄立明年戊午宣德西京等處霜損田禾穀價騰踴百姓闕食官爲减價出粜民頼以安此先事之效也兼安便官民其利有五且不動官本無害經費取辦於息取息之法又無窒礙一利也􅀊或饑饉就未全濟使民心先安大有指擬不必家至户到感念恩惠二利也其力穡之家又知國家貴榖賤貨務農大本使趍末之徒争縁南畒不致有過賤傷農之歎三利也至􅀂軍旅調度粮餉爲先比歳軍興動輙和籴􅀂常平一立除屯田粮及正税外復有百萬餘石之榖積於中而壯於外時和歳豊民無所仰權以濟軍雖調度加倍民無和籴之擾軍免闕食之虞四利也歳稍不豊平價出粜鈔夲不失人頼以安使市㕓之徒絶幸災貪利之心貧乏之家脱轉死流移之替五利也􅀂夫平糴常平富人社義等法歷代相㳂莫能變易能一旦舉而復行則天下幸甚所謂不害經費為國逺圖良以此也據此合行呈覆彈縣尉楊政事狀體察得今年十一月内有在都住人崔提領將傳州人户丁五十妻支丑女作逃婦捉拿及稱被捉支丑女時有老劉等將皮㡌金經卷児等物奪了其崔提領與伊相識人大興縣見任縣尉楊政一同於施仁門關不居公􅇬問得支丑女不係逃婦明有根脚不容分析崔提領將支丑女用繩索鎻訖分付楊縣尉收禁責得本婦狀稱因夫丁五十赴都作夫患病前來探覷到永清縣河西務􅀍雀提領作孛蘭奚捉住寅夜強行奸汚問出如此詞因其縣尉楊政並不行移有司理問枉禁支丑女數日將崔提領所摭老劉等奪訖金經卷兒等物却勒支丑女要培鈔六貫才將支丑女保出使本婦無處申訴爲此就喚到太興縣尉楊政問得所説相同除前項支丑女等一起公事省㑹本縣尉司行移本縣依理施行外據縣尉楊政係京畿捕盗正官有此違枉合行紏彈彈馬全擅科鈔事狀今體察到􅃹上都路洪賛馬站貼户提領馬全自至元二年正月至五年十月終於所􅃹站户劉澤等處除正站秪應錢外擅自科歛雜泛錢鈔二定一十九两九錢問得馬全招伏是實兼馬全年七十七􅀊老病不任勾當合行紏彈爲収刈秋青草事照得每年和買應辦稈草不下六七百萬秤才方敷用切見燕京順天等處蝗虫水澇􅀂全依年例和買切恐臨時躭悞合無籍此秋間令從長計置秋青等草如法積垜向前兼戴支持用度官民侣爲兩便㩀此合行具呈爲􅀻􅀍衣甲事状欽奉聖㫖條畫内一欵莭該諸官吏將官物移易借貸者委監察紏察欽此近於五月十三日在都百姓人等私賽神社其人徃徃􅀍執兵甲遊歴街衢前後數日及馬有挂全副甲者今體察得上項噐甲俱係在京諸色官貟人等處借到叅詳甲兵國家重噐又欽奉聖㫖已有眀禁條例今來諸人冐法抵禁􅀻假小民以爲戯劇甚非嚴制令而重武備也豈惟民不識法習以爲常切恐因而别生事端據在都官貟人等務相假借及合干部分禁断不嚴合行紏彈伏乞御史臺照詳懲戒施行彈市令馮時昇不公事狀今體察到在都前市令馮時昇於行鋪人户處取受行錢鈔六定一十一兩三錢五分黄米七石􅋗一百斤制府見行追培其馮時昇却於今年四月間賫大興府保觧赴部求仕省部依准將馮時昇遷除保定縣尉去訖切詳市令係八品職官其不公如此事發在官已有承伏迺於緫府告稱勾當已來並無粘帶亦無過犯其大興府亦不勘當是否端的輙便朦朧保申是属違錯外據馮時昇􅀒罪欺官僥倖冐進以之臨民何所不至合行一就紏彈今後合無照到部人員曽􅃹領錢􅂖者亦於制國用使司㑹驗有無粘帶然後遷除庻望杜絶奸欺以厲來者彈歩站官王提領不公事狀今體察得中都􅃹歩站官吏王提領崔緫把徐令史等與自願當站百户楊賆焦百户等上下通同作弊於站户百户馮百亨等二十名處累次取歛錢物及尅落給散草料鈔取受羊酒逐莭不公等事據此合行紏彈爲在都回回户不納差税事狀切見中都親􅃹民户每􅀊供給和買夫役一切等事比之他路實爲繁重今體察到本路回回人户自壬子年元籍并中統四年續抄計二千九百五十三户於内多係冨啇大賈􅀔要兼并之家其興販營運百色侵奪民利並無分毫差役照得欽奉先帝聖旨莭該斡脱做買賣畏吾兒木速児蠻回回交本住處千户百户裏去者􅀂稱有田産物業不去呵依已前聖旨體例裏見住處不㨂大小差發鋪馬秪應與民户一體當者欽此合無照依累降聖旨處分事意取㑹見數分豁定奪驗實有氣力與民一體當差庻得恊濟貧乏不致靠損據此合行紏呈施行爲陜西鄭縣􅀮户計事狀欽奉聖旨条畫内一欵該載不盡應合紏察事理委監察並行紏察又㑹到陜西行中書省文符該欽奉聖旨莭文拘刷本路外來交叅析居放良等户􅀂州縣官如能用心將民户拘刷盡數到官遷官給賞如有隱藏定是降官治罪欽此今體訪到京兆路華州官司將鄭縣刷出漏籍等户六十二户並不申報上司􅀻下取歛差發今問得見有華州人劉徳亨並與所察相同是属違錯據此合行紏呈爲蝗旱救治事狀切惟古之爲國者雖值㐫歉民無􅂢瘠困乏者蓄積多而備先具也今隨路大蝗赤地千里就使撲㓕巳成災傷其於貧民首先失所不無流移飢饉而救荒備患之術不可不預爲計料何則今日唯先安集民心最爲急務故謹具愚見二十事伏乞御史臺詳擇施行須至呈者一隨路緫管府今􅀊伏遇天壽節除祝延萬壽禮數外權冝停罷公宴庻表朝廷優䘏元元不以巳爲樂也􅀂然則雖古者聖王遇災减膳徹樂無以加此一御河上下有粮倉分冝差清幹官檢括實有見在數目外據借貸裝散變碾及上年河運未到倉粟數督勒所司嚴限閉納其通州李二寺等處應有露囤粮斛就水潦未動亦冝許諸人般運赴都城倉其脚價止支本色亦實京師濟窮民之一端也如挨陳者其闕食之家驗口賑濟不然令所在弓兵早暮兼爲廵防以備踈虞一隨路啇販積蓄之家官冝出榜驗彼中時估量添價直發賣仍禁不得擅恣高增物價如百石以上不出粜者究治如官倉發賣其權豪冨户所籴不過十余石􅀂詭名轉籴者仍爲究治一隨路存留祗應銀粮如已到官者湏土司明文然後動支􅀂百姓緊闕食處仍作急飛申聽候許令賑濟其未納到官者盡行蠲兔一隨路站赤祇應如酒肉等物亦冝約量减免不然照依中書省劄付順天路事理一體施行不然是燕南二萬餘户獨不􅀍存䘏之意也一河間路轉運司應収到物斛不下五七萬石冝無令回易銀鈔驗元價直輸河倉使􅂶正課以備軍國經費侶爲兩便不然如本路百姓闕食官定平價發賣一隨處金銀丹錫等坑治約五十餘所每歳穿穴淘採不無損泄隂陽之和有無合止者止以少養天地元氣一山林河泊之利所在皆辦外課有無權時蠲免聽民採取以供不給兼前丗巳甞施行稍足復禁如初一山林原野係禁地去處如猪鹿鳬鴈雞兎之􅀋亦冝許令採捕期以歳稍豊復禁如初一隨路交鈔庫鐵治所即目􅀂有見在物斛去處亦冝取㑹見數仰所在運司出榜照依元價粜賣一在都酒務開沽者􅀿有見在稻糯官司亦冝見數權令停止醖造此係前丗屡甞施行一捕蝗之際不以諸色等人有材能識見規畫出衆者籍記姓名事定量如賞用又甞聞飛蝗雖難打捕遇夜即湏停止於坐落厚處傍挑坑壍燃薪草使之明照四逺然後驚趕蝗必望明投赴衆力從而撲滅説比比得濟合無試爲之行恐是一法一莊農之民闕粮食者所在官司預冝出榜禁治不得推稱病疫私宰耕牛爲食如􅀶易米粟者聽准備飜耕出曝蝗子叅詳㝡爲急務一州府司縣官其􅀍災重處有能規措存䘏百姓不致流移飢殍者仰按察司考覆得實申臺呈省以憑不次陞用一急逓鋪兵俱係貧難下户􅀂一處断絶逓轉即時阻滯合無與中都迤北逓鋪一體給粮食飬濟仰所在官司專一存卹不致飢困逃散一每歳應辦官草収成尚然不敷今秋榖草顯見儉少冝趂時於無蝗去處收刈秋青等草將來兼帶支持用度一莊農之民所認六色課程如酒醋等課今蝗旱如此有無權時停免或從實結辦稍安復舊如初一隨路州府冝建立社稷䄍神壇廟令有司歳時致􅀕亦憫恤爲民之一事也一隨路自省併州縣以後極有寛闊去處或有尉多係主簿兼攝至有全闕去處如山東州郡所在雖有專刷其地廣物衆委係難以照􅃹又體知得省部亦爲此事先於東都路巳行添設專尉了當今蝗旱如此百姓嗸嗸切慮迫於飢寒盗賊多有不無驚擾冝約量隨路緊要地靣添設廵檢使鎮遏廵防以備不虞及村保設置皷靣遇有警急互相應和一隨路如冨户有力之家能周贍貧乏或爲粥於道以濟流民至千人以上者官爲旌賞或聽一子臨官彈馬仲温横歛錢物事狀今察到在都曲河坊坊正馬伸温因刷問逃軍於人户取訖寳鈔一十一貫八百文縁兩廂七十餘坊凢有事務不無搔擾合行紏呈彈忽都魯阿散不赴任所事狀今察到淄萊路長山縣達魯花赤忽都魯阿散前來中都部夫勾當至十月初罷役本官不行還職令女婿馬合馬等於本路􅀜訖自十月至十二月終俸鈔􅀂不紏呈縁忽都魯阿散係請俸親民職官到今八十餘日不行還職據此合行紏彈彈王千尸冐名代軍事狀今察到守把􅀥陽萬緫􅃹下千户王仲賢至元六年入月内前來中都取發軍人其本官將合起正軍六名不令正身應役却行要訖錢物冐名替代今就責得本官下提控李德唐指證並與巳察相同合行開坐紏呈彈益津縣尹張文郁侵使塩價事狀今察到覇州益津縣前縣尹張文郁主簿李璋於至元五年支不盡塩折粟内侵使訖鈔三十三定三十五兩爲此就問得州司吏杜唐佐並與所察相同據此合行紏彈爲太廟中柱損壊事狀今體知得太常寺申都城所呈相驗到太廟中心等柱損壞訖一十四条訪聞先爲劉晸監修太宫完備特注朝官重加賞賚今者未及數年朽壞如此顯見當間滅裂多不如法設􅀂舊柱不堪自合改用新林拟壯麗今省部雖令劉晸用木填塞了畢終非可待􅀊月理合治罪以彰其咎至如太常寺近爲經夏暑濕告出曝神室中氊􅄢有司尚恐䙝瀆不從所請彼修􅀘動作之際其震驚神靈比之曝㬠䙝瀆實爲加重外據不經奏請即令劉晸修􅀘震驚神靈事属違錯合行一就紏彈爲優䘏襄陽軍人事狀伏見中綂建元詔條内一欵莭該凢征進軍人臨陣而亡􅀍傷而死者其家属理當優䘏仍仰各路宣撫司量給衣糧優䘏其家欽此又漢唐舊制軍士死者加恩致􅀕吏爲衣衾棺歛轉送其家今聞圍守襄陽軍人經值今夏癘疫致有死亡俱係没於王事誠當推恩矜憫有無照依巳行事理或令所在官司逸還其䘮外據氣力􅀌弱之家取㑹見數量加優卹非惟激厲將士寔恩慰民心感召和氣一端也爲懐孟路新民不便事狀切見懐孟路新民三千餘户雖俵居六處終頻近大河又不在本路莭制之内巳是未便兼所􅃹鄭汪等頭目俱係宋人中間官民恒相告訐輙生事端無歳無之又訪聞得如修武縣新民見發奸細利害䓁事此其驗也設􅀂狂妄無實人情臲卼終是不安合無將上項户計􅀠属夲路􅃹領其舊􅃹頭目依例與􅃹民官一體遷轉不然於職官内選素有威德足以鎮撫爲緫􅃹亦是一便盖徃年巳曽令李同知宗傑於上安撫勾當一任之間特然安静此非其効驗乎據此合行具呈彈兵馬司擅自鞠断事狀切見在都兵馬司設馬歩軍五百人係專一警捕衙門自去年至今年三月終強􅀼盗賊計六十餘起致有殺傷事主劫掠財物及本司公􅇬下爲盗者盖當該官兵不爲用心滋多如此三限不􅀗行下取招並不回報其都轄上司縱令滅裂虚作行移亦不申明賞罰是作過之人無法可畏教之公行也都城輦轂之下庫藏倉􅅒諸所在萬一窺􅀼深繫利害又間有敗􅀗賊徒除事関權􅀔不能歸結者才方申上自餘無問䡖重輙便鞠問断遣豈惟侵司越職竊弄威權但恐中間奸弊日滋寔爲事害兼是司自來並無囚繫鞠問㫁遣之理今後有無有令兵馬司據􅀿􅀗盗賊畧行取問即便解府歸結施行外據失盗起数巳􅀗者賞未􅀗者罰如此庻望上無縱恣虚行之失下革違錯自專之弊賞罰旣明民知所畏京畿之間不待歳月作過之人􅀅自消弭據此合行紏呈彈大興縣官吏乞受事狀今體察到至元六年三月内有施仁関倡户魚王嫂赴大興縣告稱男婦阿肖欲行􅀻遁還家想見别有奸事有周縣尹并司吏張榮禄將阿肖枷収輒行推問指稱在曽與劉和尚安三通奸隨即撲捉各人不見却將平人劉貴劉慶甫監収至當月二十一日有周縣尹將魚王嫂劉貴巷長張仲義等公㕔省會傷和了者至二十五日有魚王嫂要訖親家肖大買休鈔一百四十兩及劉貴安三劉住女休和鈔九十兩當官有本把張榮禄取要訖劉貴䓁家錢物鈔三十八兩九錢紵絲二疋又有打合休和人罷役司吏張􅁠縣要訖安三鈔一十五兩祗候人馮首領董靣前要訖鈔九兩打合人韓大處見収鈔一十七兩有周縣尹教休和了當爲此喚到司吏張榮禄䒭畧行問得是實就追到鈔六十三兩紵絲二疋贓狀至甚明白據本縣官司止合依理歸問阿肖不合背夫欲行􅀻自還家罪犯外據想見别有奸事一莭係是稱疑詞因别無堪信􅂋跡依例不許經告官司便行推鞠令阿肖招説曽與劉和尚安三通奸輙生事端乱行撲捉搔擾収禁兼魚王嫂娼優之家官司不爲詳審致令當行令史収受錢物爲無慿據却行省㑹休和如此開閉倖門撓亂公法事属欺枉合行紏呈彈良郷縣站官􅀻取工俸事狀今體察到良鄉縣􅃹站官王提領等至元四年至元六年於站户納到祗應錢内侵支訖鈔数為此就責得司吏王仲筠狀供􅃹站官吏於至元四年至元六年祗應錢内侵支訖鈔八定二十五兩五錢據此合行紏彈為孫彈壓代軍事狀今察到左衛親軍緫把張大亨下彈壓孫旺至元七年二月代替訖哨馬劉本户軍役周歳雇軍絲一千兩巳得訖絲一百兩就取問得孫旺招伏是實據此合行紏呈彈固安州官吏尅落塩折粟價錢事狀今察到固安州官吏將至元三年塩變粟数作至元四年塩粟見在報過大興府依巳報四年粟價毎石四錢五分追鈔其固安州却分出三年粟数依當年粟價毎石六錢追鈔爲此就責司吏張安仁狀供當元係司吏于仲淵䓁將三年支不盡粟六千四百四十四石二升作四年見在報過在後緫府依四年粟價毎石四錢五分追要鈔数此時照出三年粟數并價直於前州官劉州判處啇量􅀩擬定三年粟數止依當年粟價每石鈔六錢追収見收到鈔二千七百兩五錢四分得此文狀扣筭得三年比四年粟價每石多鈔一錢五分計多餘鈔一十九定十六兩六錢據此合行紏彈彈東安州官吏尅落塩折粟價錢事狀今體察得東安州塩折粟價至元三年毎石六錢至元四年每石四錢四分除起納就支喂馬駞外至元三年見在粟二千六百九十二石至元四年粟八千八百七十五石五斗二升一合七勺有司吏李讓將三年粟數併作四年見在申報在後大興府驗巳報四年見在毎石徴鈔四錢五分其當該司吏李榮并提控楊守榮却將至元三年粟數依當年毎石鈔六錢追収比四錢五分餘徴鈔八定三兩八錢畧問得司吏李榮狀招巳取到三年鈔折粟一千五百四十石六斗五合計餘徴鈔四定三十一兩九分據此合行紏彈乞徴問取牧馬地草粟事狀今察到􅃰州站憀占牧馬地内有熟地二百七十七頃二十二畒每年召人租種毎畒収粟三升稈草一束爲此取到􅃹站官提領馬仲祥呈並與所察相同今扣筭得上項地畒每年計取粟八百三十一石六斗六升稈草二萬七千七百二十二束且自至元三年爲頭至今四年計粟三千三百二十六石六斗四升稈草一十一萬八百八十八束據此合行紏彈彈東安州司吏張芮不公事狀今察到東安州刑案司吏張芮􅂍濫不公爲此就責得張芮招狀於至元四年十二月終劉仝等處免刈葦草要訖鈔四兩五錢至元五年免放李守政觧鋸夫役要訖鈔三兩至元六年七月於娼女常海棠家内飲酒逐件是實即追到鈔七兩伍錢再將本人審問無􅁈断訖二十七下勒停了當今將上項鈔七兩五錢隨呈觧去伏乞御史臺照詳施行體訪保申令史曹士良狀訪問得曹士良􅃗身於在都銅馬坊􅀉居住坐於今年六月内前去上都至今未回今就問得左廵院司吏張仲禮稱當間係燕王位下趙二奉御對警使警判保舉曹士良係真定路附籍人户儒吏俱通以此准慿轉保申府了當今來切詳旣大興府令本院踏逐通經史令史一名自合公選可應之人其左廵院官却行徇情轉保訖自來素不諳知人貟事属違錯據此合行一就紏呈彈􅃰州站官􅀻使祇應錢事狀今察到􅃰州􅃹站官劉提領等至元四年至元五年於站户納到祗應錢内侵支訖鈔數爲此就問得次官提領馬仲祥稱本站官二貟吏三名於四年五年祗應錢内侵支訖鈔一十二定是實據比合行紏彈彈趙州平􅁄縣尹鄭亨事狀今體察得趙州平􅁄縣尹鄭亨自到任巳來聲跡至甚不佳本官酗酒狂爲連結朋比遊行私家無日不飲及求娶娼婦展散不公挾弓放彈損傷人目如此非違事理就問得本州司吏王柔張才稱與所察相同合行具呈伏乞御史臺照詳施行一本縣西関開門户娼婦邢絨哥其鄭亨􅀻先徃來於今年七月内求娶爲妻照得舊例監臨之官不得與部下百姓交婚雖㑹赦猶離之况娶娼女户主爲婚叅詳縣尹字民之官務在肅清所部禮義興行今所行如此事属汚濫一自到任至今别無可􅁛聲迹與本路扇趙史提控王太醫靳提控日逐朋從遊行􅀻家飲酒無度如今春北寺救火其鄭亨乘醉執持棍杖沿街驅率人衆致將小耿打傷頭靣叅詳應救而不救自有條禁罪名豈得恣爲歐擊亂行無法足見居官素無政體事属違錯一於今年春令在縣祗候人屈首領引宅司鄭都􅃹於縣西村分發訖馬尾羅兒約三百餘箇每箇要白米一斗無米歛金一錢四分其公然展散無所畏避事属貪鄙一今夏捕蝗自佛寺爲頭迤西村分所至輒取要雞酒毎飯殺雞數􅃗且天災如此農民嗸嗸困於捕役當此之際其鄭亨恬不爲意飲酒食肉以悦口腹其爲不恤無重於斯一去年夏挾弓放彈􅀅縣民曹愽士左眼打傷致令本人損傷訖一目無所告詣照得放彈及投瓦石在庻民猶有明禁詳此縱或悞傷亦無一方師帥民所具瞻挾彈行遊彈射鳥鵲而爲少年童子之事是爲不應合行紏彈薦濟南士人楊從周事狀盖聞爲國所重必在得人報恩之義莫大薦士今體訪得濟南士人前􅁥察御史楊清卿孫楊文郁天資雅厚質而有文子史群經多所浹洽今年近強仕經明行修不求聞逹侍庭闈以􅂼水悦親居鄉里以教授為業傳箕裘於三丗罔墜先聲藹聞望於一方式敦薄俗誠當代之孝廉士林之挺特也儻􅀩省録必有可稱不惟激士夫進學之心庻幾媿奔形􅀔之者於肅清風化佀不徒然謹具狀舉聞彈中翼軍搔擾百姓事狀今察到中翼侍衛親軍楊千户崔百户髙彈壓下軍人自至元五年八月前來武清縣北郷等處於民家安下毎日取要飲食及逓互歛索馬疋草料至甚搔擾不安少不應副恃頼衆力輒發惡言恐嚇侵凌無所不至毎年直至來春三月才方起離雖曽陳告縣官不能禁制使當差平民無所赴訴深爲未便今就問得夲縣東至孫家務西至牛人南至召香二十餘村及取到百户梁仁主首趙百春社長田祥䓁狀供與所察相同據此合行紏呈彈漕運司差委官非理掻􅅰亊狀今體察到漕運司同提舉下委差唐古張千户䓁於今年正月間􅀐坐鋪馬三疋前至武清縣北洪濟鎮將夲鎮主首張聚䓁用繩子拴縛打拷非理取要飲食䓁物就責得張聚䓁狀供與所察相同看詳本鎮不係站赤路程遇有使客鋪馬飲食皆取自民間而漕司官吏毎年不時經過其唐古䓁恃頼本司形􅀔如此縱􅁀不公非止一次畧舉今次強取要訖物件并多取訖飲食数目合行開坐紏呈彈李二寺倉損壞官粮事狀今察到李二寺通濟廣濟二倉見在粮粟用露囤収貯其倉官不為用心以致倒榻訖露囤五十八座並不修理損壞官粮計尤千八百餘石據此合行紏彈彈右廵院淮攔王得進事狀今察到在都西曲河坊丁阿齊女心哥召到弘河人户王得進弟王千奴為婿於至元六年十一月内為病卧於積糞團標内凍餓身死並不停䘮依理埋殯恐隣佑知覺比及天明擡􅐝岀城燒揚了當其丁心哥亦不持服於今年五月内有母阿齊接受訖本家安下数年今平凖庫劉大使財錢鈔三定金子六兩為妻了當又買與丁心哥女婦一名於八月内有王千奴兄王得進具􅃺告到右廵其本院官吏雖判勾行並無取責却有坊正陳提領為與丁家関親遂拆令折和至當月初四日丁阿齊與訖王得進買服物折鈔五十貫其當該司吏劉淵兩次要訖王得進鈔六兩祗候人小楊䓁二兩七錢於初九日接訖攔狀為此追到元行文卷及問得元告人王得進并過錢人薛仲甫張得林隨逐劉淵人劉得進俱與巳察相同今來叅詳據丁阿齊圗財主婚濁亂人倫不有所天其劉大使明知違法輒行求娶其右廵院官曽不詳審俱係妄冐敗俗傷化之事輙虚調行遣並無取責却於公㕔接受攔狀縱令公吏䓁人私下折和如此開閉倖門撓亂公法亊属違柱合行一就紏彈論課税户􅀠緫府􅃹領事狀切見隨路運司見􅃹課税户五千七百餘户契勘係先朝初立課税所時將應設官吏就作本所户計用之添重氣力恊辦課程今運司巳立数年其官吏及院務人貟皆從朝省擬注據此等户計寔無所籍近體訪得尚書省遍行隨路如遇婚姻田産詞訟等事令緫府運司関㑹一同歸断給者徃徃有之深為未當至如隨路奥魯比之此户尤重今巳令緫府􅃹領近年巳來至甚簡便合無除竈挿户外其餘一􅀠緫府􅃹領寔為長便論法官沈侃陞用事狀官沈侃性端方通經旨知典故年雖耳順精衰於老成寔具典刑在司理誠為師表兼本臺執法如侃者議㫁公平情文兩得至比理冝陞用以表良能秋澗先生大全集卷第八十八
