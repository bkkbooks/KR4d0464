front:
  text: 秋澗先生大全文集卷苐二十
  hash: sha256:f68cdcf138b4dfbbfa946ff064cc50cd95261b21e63f29309d29774c90bbb183
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_020-1a}
body:
  text: 七言律詩西溪見夢十月􅀄八日夜五皷􅀄拄靣相看几格間􅀏談似與浣離顔越裝已辨冝趍徃江路雖遥不乆還魯國自來尊北海謝家誰更作東山瀟瀟夜雨蓬牎曉細酹清樽與涕澘儀封道中驛館殘釭曙色分馬䭾殘夢走踆踆去家已逺誰爲侶到䖏相逢有故人健羡鵰盤慚始撃静便蠖蟄返求伸一杯拜酹睢陽廟激懦扶衰尚有神睢州道中􅀉友人奉詔東行􅀗所安􅁍憐衰朽強爲顔恩縁至渥酬無地事不預防多後艱逺馭有方清百越纎埃何􅀘奠三山殘年正要相料理旣不容辤望早還過歸德􅀉何相白髪年前六十三強扶衰朽去江南心知義重吾何惜老不身安事恐躭弩末縱能穿魯縞病軀胡可敵閩嵐郷􅀜回首四千里正頼君侯與細參十月廿七日過下邑喜與趙彦伯侍郎相遇作詩而别暮色増寒慘驛亭燈垂紅燼盡情明長年幾夢溪堂月此夜相看下邑城流落蠻方真可畏􅀏談樽酒且同傾回頭楚水楓林下熖熖聲華定彦卿宿宋家山趙氏田舎白髪搔來不滿簮就中誰遣世塵深野煙遥認圯槁月霜夜􅀄聞楚户砧長路苦吟支睡思客牎無夢耿郷心前行􅀃似安夷道隱隱青山轉槲林楊州送劉漢卿東歸汴梁海鶻翻雲下錦韝眼中人物見風流誰期淇水三秋别􅁍作維楊數日留樽爼留連江上月風煙吟眺竹西楼馬頭細嚼梅花句又領春風入汴州西湖西湖三靣簇青山净拭菱花照翠鬟蒼海月寒龍穴露彩雲仙去鳳簫閑無多樓觀猶圖盡最好風煙近市闤鄭重綉衣周漕使􅀞船春酒待余還留别左轄台相兩浙江山漠霧雲呉儂䡖剽到羣奔􅂊寛防異須威霽稍困隨方以徳存龍寵􅄖來心愈小義方嘉処􅀔忘尊忠傳孝継平生事長見風煙擁㦸門一作薦賢正是台衡職桃李何須在一門已丑冬仲三日與宣慰楊子秀揔管髙瑞卿侍郎田榮甫三君子邂逅於餘杭其喜有不勝者以詩留别情見乎辭北來冠蓋拂呉雲試計分飛動十春意外論交縁義重天涯相值更情親放懐罇酒難同舊照眼梅花揔可人明日浙江江上去􅀉聲多逐荔支塵下大安嶺俗云分水嶺宿霧霾山苦未収馬衝寒雨下􅀜頭紅雲軟脚揮三爵碧玉攅峰湧萬丘日月麗天從北轉山川分水盡南流漢家聲教今無外誰遣氣妖孛斗牛時汀漳州鍾冦作耗未平故云三山元日䑓􅋹天香簇絳紗三山簫皷樂年華竹枝歌後多滛祀燕子歸來識故家荷鬢閙粧餘翠貝􅂼盤勾飣雜魚鰕殊方風物雖堪賞争遣衰年客海涯贈之問泉尹福州庚寅三月廿一日作社燕秋鴻十載餘天涯邂逅兩臞儒九遷論秩心何有百折當機氣自如喬木故都思徃事月明滄海炯遺珠春風回首桐城郡時訊平安見簡書一作小書送李司卿輔之北還名天祐安次人同年御史也今為户部尚書憲府乗騘憶舊逰白頭相見嶺南州地連瘴海三山月人在元龍百尺樓此日又驚成契闊異方誰與慰淹留交親􅀂問衰年况夜夜秋􅀲夢故丘庚寅春三月與張叅政献子李司卿輔之㑹飲九仙絶頂其道室榜曰滿目雲山四千里外同覊旅三十年來老弟兄樽爼喜陪今日宴江山難得晚來晴巖花帶露春容濕醉䄂翻香􅀏語清莫對雲霞􅀃輕舉蒼生料理正煩卿旹張參政奉㫖料八州民数暇日登道山亭懐古亭在烏石山巔有碑刻南豐記文其上刻鄰霄䑓三大字閩㑹東南控嶺溪斗牛無孛歳無饑文風興盛猶唐舘覇氣沉雄入劒池海近重城朝日蚤山蟠平野暮江遲危亭一片瑶䥴在晤語殘陽􅀝杖時送師彦貞藺寳臣二御史庚寅四月十九日半歳相倍百越東捄時人道嚮來騘剱華光動蛟螭匣豸角霜嚴簿領叢明月共看千里隔屴峯廻憶一樽同借來不得成偕徃目断三山羡去鴻大中徳長老見贈竹輿作詩爲謝人老筋骸不自持乗堅䇿駿兩非冝憐師雅意慇勤甚恵我班輿結束竒花底徐行閑看處陌頭趍進早衙時醉歸更比籃舁穏一任山公倒接籬贈皷山長老平楚不下禪床四十年老軒頭角出泠淵乆從貝葉傳心印來與雲山結静緣蘭馥􅈍光憎娬媚竹風松月共清圓荔舟有約重登覧轉首天風恐䬃然楚有畫蘭絶句故云庚寅夏四月送二御史回淮安道中即事語知已者五千里外一衰翁八郡規爲與省同衆口鑠金方作異諸生鳴皷欲誰攻寒封老栢常年慘暖借繁葩盡日紅夢到垂虹亭下水雲㠶千尺掛秋風遊皷山五首并序皷山在閩中爲特秀余到官五月王事鞅掌未遑登覽以盡江山之勝迨明年庚寅四月庚辰遂與天平叅政獻子大都李郎中德昌御史聊城師彦貞居延藺寳臣提刑東原曹仲明憲􅊷張遂良程舜臣何舜卿來游㝷前􅉀也辰刻抵戒院舎鞍肩輿迤邐而進至望州亭主僧平楚來迓用軟脚例酒數行歴松􅀜由石門入白雲寺適簽省樂公亦供佛來此乃相與禮像殿浴佛於西寮既而飯屴峯丈室眺上方重閣降觀涌泉歩入靈源洞度喝水巖登天風海濤亭觴詠間獻子德昌扶㩗上征徑欲造大頂峯足觀紫陽遺刻石礜雲荒中途而返時􅀫雨濯山林壑爭秀煙霏空翠有顧揖不暇者莫不欣然志歸冲冲􅀂有所得僉曰樂哉今日之遊也吾儕越在絶域縱使重來恐無復此歡耳至元歳月不可以不紀詩亦不當無也明日􅊥囊得唐律五詩俾刻諸亭上以爲山中故事峰迴路轉已層雲望逺風煙接海門􅀫靄去収千嶂雨老僧迎勸半山罇巖幽選勝窮詩境山逈登危黯客魂闊絶殊方同大塊坡仙心事強爲論筍輿同駕躡鰲􅘡冷帶秋聲入白雲雪竇有禪容暫叩名山無分與平分雲憐嶺断聮松䕃雨惜題芳護蘚雯㑹約賛公重借榻皷音同向夜􅀷聞上方㳺遍雨花天洞壑㝷幽得壯觀林影蕩空金界闊天風吹袂海濤寒江山􅀂爾不一醉杖屨再來無此歡詩在眼前拈不出碧瀾秋色上層巒杖藜㝷壑㳺初遍􅀝檻􅁳搜興未闌濁酒一杯方大嚼蒼煙千頃要竒觀放教眼界寛無際徑上山椒不作難􅀂欲攀蘿窮絶頂海濤風勁不勝寒􅃨嶺重岡奠七閩皷山東峙最崇尊嶼亭詩好風濤湧靈洞龍移窟宅存千尺翠屏宜晚對一泓滄海儘雄吞雲煙稇載歸時晚月偃松梢玉一痕道山亭燕集霜簡無華鷙鳥朋追隨飛蓋上髙亭霏霏空翠沾衣濕浩浩雄風拉瑟聲已愧東山空雅志枉教南斗避文星憂來猛把欄干拍轉􅁴時情未易評酬余招討見贈詩韻秀孕江山氣自靈余君􅁭度玉亭亭髙軒過訪承佳什世事開談見逺經秋色望空喬木國海商争避客槎星又聞占籍多隂積一户從良近百丁送魏叅政赴邵武時與江西三省㑹合破賊􅀞省分麾出越營跳梁􅃛䑕已潜驚環郊多壘真吾責報國丹衷在此行獸困可擒須急縛民安無畏是佳兵遥知帳繞生犀地草木風前揔戰聲戰一作捷省􅀰李應中見示所藏書􅀞因題其後􅀞省官書不片閑撥忙能結澹中縁吟餘紅藥堦前露夢到蒼江月下舩鑒定正煩君具眼収藏還擬世珎傳古人巳矣精華在時復横披一灑然八月八日雨中書懷自到閩中十月餘老懐未省兩眉舒命縁限蹇行多拙心與時違意轉踈夜枕有蛬妨睡思秋空無鴈繋郷書桂香簾幙中秋近愁對清輝憶故廬小樓秋望其下即福之西湖芙蓉吹老白蘋風隰有游龍草有蛩湖水巳翻寒日影火雲猶作夏時峰清時還􅀒無能責老境其如所事慵推放小䆫閑寓目秋來無物不愁容景聮一作時方多故增心苦人到髙年所事慵􅀉紫山憲使去冬相從入臺叅君任平江我更南不惜殘年趍海嶠擬􅀅風義壓煙嵐得時可進成虚歩縱􅀃知難到強談歸見紫山如有問此身扵世百無堪景聮一作碧雲暮合人千里白髮愁多雪滿簮秋雨秋暑燔空􅀔莫禁西風吹起􅀓巖霖驅雲湧海連三日潤物回枯抵萬金火傘炎収閩嶠瘴煙螺重拭越山岑􅗈􅑛未洗戈舩甲愁絶􅀌臣一寸心御史陳君濟來知紫山病告巳滿浩然北歸余以微官自絆留滯閩中未卜歸期定在何日慨然感而賦此南來同仕君先徃自絆微官固可憐書考巳甘陽子下着鞭又爲祖生先碧雲暮合人千里白髪愁攻雪滿顛去去呉江西下路姑蘇臺上月空圓􅀉參政何公黄閣年來相業多忠腸輸㵼略無佗物情雖異歸包緫鼎味能甘頼爕和客子逺聞欣欲舞海凬何慮偶揚波時草􅀼蠭起故云殘年喜見升平事歸老田間儘浩歌􅀉左丞馬公黄閣清風相業多漢家機務到賡歌黙􅆂羣動歸包緫力賛􅀌卿罄爕和春草閑嘶炒塞馬秋霖行洗越舩戈古今多少調元様丙魏聲華未减何即事耳聵瞳昏乆病翁暮年游宦又閩中一旬好快無三日百計随人到五窮毎署細衘慚已曠雖無私過亦何功揣量薄分冝歸去免着通人􅀏未通卧病中即事萬慮消磨只一身一身猶爲病邅屯老饕􅂊􅂇脾神喜濕􅀬還攻眼力昏􅂼飯半盂嗟強食物情千變苦難論前期七十都能㡬更有何心到競奔即事地僻天荒自一方江山環􅃈瘴烟鄉炎凉失節人多病勁躁難馴俗返常媚􅍳王孫方怙􅀔背時郭老怎當場欲行莫克行還阻乞取閑身且六藏芙蓉平生不識翠苞纎真色還欣到尔瞻嬌綻葵芳無两様閙裝橙葉更多尖一溪野水明粧鏡滿樹清香拂繍簾開謝巳甘秋色晚碧桃紅杏我何嫌卧病吟四大㝷思孰主張百般調護不康強火頭孛尾方為􅑂肝氣脾神互見傷秋月欄干吟䄂冷曉烟庭户藥鐺香夜來一􅀏伸眉喜夢裏分明到故郷閩中即事誰作新詩採衆謡八州淵藪萃逋逃蒼􅃄滿樹驚梟嘯白日四山聞虎號取辦急徴農最苦仰空哀愬彼何髙内奸不止終多㓂闘敵徒教殺爾曹爲官軍民義八月十八日野奠回入西湖開化寺廪禄已沾三品料浩然歸志苦遲遲宦情老去無多味花様看來緫背時林下冝㝷歌鳯侣澗阿閑詠考槃詩免教方寸為形役惆悵終年抱獨悲送趙提舉仲逺職滿還江西眼中薄俗日紛紛信厚如麟見趙君學舘乆淹雖散秩士林輝映緫多文三年提調無遺育囬首歸飛隔暮雲忠孝堂前秋色好淡煙吹滿泮池芹即事人微職峻作提刑正似禪僧放海青癡坐乆為山鳥怪急歸巳媿草堂靈甕邉吏部方酣飲澤畔靈均謾獨醒樂得便行無窒礙雲間髙躡鳯凰翎悠悠心事欲誰同甚是留侯智與功幸有釣舟蔵夜壑免教官事􅅞微躬旬多病假慚虛位獄有繁􅁈謾􅀬中穩送布㠶無恙去小樓非夜有東風謂諸君津遣也西風吹老一川秋劒水東南送客舟寒鷹逺賔方漸陸野鳬群聚正乗流飛鳴􅂓欲伸吾志飲啄非徒為食謀通塞既知皆素㝎平泉何為志窮愁題建寕府建安堂壁郡名改自炎興後官寺多從五代年草木不知黄落候江山渾是寳嚴天風時兩􅀂回天漏味厚泉甘覺氣全城府自来多險隘髙蹤誰躡漢梅仙謂東山稱梅隱云梅福甞􅋣於此子孺腹疾良愈謝全王二醫官全名立夫王名貴和喜向醫林得二髦河魚為祟免憂勞調和臓氣事為切護養丹元論更髙曽未浃旬􅀵勿藥併軀二竪不容逃難忘最是真誠意荅荷千金恐一毫活庵方伎􅀂為髙濟物心均不伐勞子孺病来方作祟脉源看䖏弱扵毛臨機制変元多筭勿藥収功大可褒自是理明竆􅀮粤不縁潛授老龍韜非大韜之轁盖借用孫思􅊬昆龍􅀁授之法也贈三衢儒醫徐登孫升伯徐卿奕世傳醫學道濟衢人蔚有功方自千金開壽域胘非三折見良工􅀴横烏凡筠籬静門掩朝暉藥􅍳紅我似病梨無可賦略煩料理少陵騘又題石橋山􅀛阜煙霞小有天半空竒絶石橋山蒼龍背倔雲千疊寳月光􅆂玉半環當局仙人閑遣興爛柯樵子不知還一樽醉上山翁馬􅁍逐流紅到世間繼李昌道見贈詩韻以􅀉當年􅀄識歷亭仙青眼相看意愜然把臂喜談天下事洗心如聽玉琴絃時文變古多君雅逺馭長驅並我先北渚風煙儘瀟洒興來詩思想無邊遐觀享南劒州揔尹張矦􅀁構閩右江山第一州危欄髙􅀝九峰頭大書快覩凌雲榜神化空驚躍劒舟冠蓋送迎無少暇風煙吟眺暫相醻曉凉多趂薔薇露醉墨淋漓想未休九日南劔道中􅀛山山長林元甲和韻有云万里好風南去鴈兩溪明月一歸舟䬃沓弓刀入劒州登臨髙出碧山頭松風度嶺吹紗㡌煙水漫溪送客舟萬里故郷今得徃一年佳節儘為醻滿樽渌湛茶洋酒空對黄花一􅀏休憫雨呈幹臣詩友四月十一日作時闔境祈雨天人消息兩交通和自羣情雨意濃一旱汔今幾五月四民作苦㝡三農雷燒赤尾空飛電雲捲黄頭又變風傳語龍棚棚下客孚誠終始要相同嗷嗷羣動日焦枯何處癡龍睡未蘇􅂖未見苗耰可望麥方含實勒來無九􅀜變豹無餘藴百郡承風恐失圗試手天瓢儻微恡斯民斯苦果何辜和錢神詠幹臣二首觧毅開難到處行雖云銅臭最関情世縁利益稱泉貨時便流行托楮生武子矜豪編竟埒魯褒貽􅀏愛如兄細思最是通神處買盡人間事不平鉅室權門坦蕩行反於窮薄略無情散飛庭樹來無迹汚濁羣心到處生取象有天還有地縱貪無父亦無兄存心思革交征弊何處銅山剷可平芭蕉扇輕箑如蕉一様新楮衣筠骨製來匀隔牎雨落驚真葉灑面風清來故人甞羡楚材為晋用􅁍嫌紈素化緇塵㑹當柄在調元手與播南薰觧愠民近讀夜永不寐等作􅁴清而頗寒吾恐傷中和而病吾子也因復継前韻假辭而薰炙之亦晁􅀘之擬騷之遺意也幸􅀏覧燭影紅揺夜色侵香􅄈菱葉鬱重衾鳯琶調軟歌能合竹葉盃􅀷醉易沉緑鬢追歡燕市樂翠幈歸夢越江吟平明剩買扶頭酒不向諸兒計槖金夕坐虚䆫夜氣侵欲眠還未擁􅀌衾書因倦讀從燈暗物不攖懐任思沉肥遁世髙雷子節清貧時見曲山吟舊㳺相望成三老既老能閑抵萬金和曲山覔菜詩韻鼎餗藜杯一槩平見君胷次匪缾罌屡聞飯糗同鰥舜似要矦封號頡􅃵靈府天和流玉薤露盤詩思霮金莖腹􅃾蹯脆皆吾欲二者難兼恐物情貧富因君嘆不平食前方丈對羸罌一簞雖具黄粮飯滿豆長空碧澗􅃵甕料不聞波底語秋光時見鬢間莖細思清苦多吾軰愈見蒼蒼責備情和幹臣詩魔韻倦懷欲罷不能回啾唧咿嚶雜嘆欵清禁事嚴微服入華山峰好倒看來禁持作祟非無謂狂斐縁渠不觧裁島痩郊寒遺像在至今追想日悠哉詩家何苦似魔爲逺紹傍搜沒了期鼓舞有舒還有􅃤禁持似醉復如癡鼎邉苦思多窮夜江上􅁈魂獨語時伴老此生成底事乾坤清氣幾人知睡魔和韻醺然一氣􅀬相纒不是晡時即午前臲􅑶枕丸無􅀁濟昬眀心境􅈝相懸見侵多自群疑後澄治無如一敬先不羡老歐能善變化爲鸜鵒舞翩翩欠呵舒挽速如神不是愁縈即思棼釀就黑甜濃有味撓昬靈府黯無聞魂遊纒老三峰客茗戰摧空七碗勲經事不爲渠所泥邊韶便腹見多文和幹臣齒痛詩韻硬囓豪餐養老饕先生編具􅀂爲牢􅀬流支脉知來漸痛抜􅀌根訝許髙縱使舌存冝晦默更堪心苦恣燋勞休休事事從輕减急手先湏止濁醪折齒吟自慰朝來齒折五神驚􅀔􅀂山爲朽壤傾缺豁醜於韓子態嘯歌妨盡㓜輿情病根何益華池漱五色空傳幻術生駢潔浮危雖自取丗間何物不虧􅄹􅃴見揔府應詔薦章偶得一詩庶明鄙意呈幹臣齒牙缺豁雪蒙頭更有何心接俊游一自詔條頒雨露盡催遺逸起林丘韞蔵櫝玉知無限刻畫無塩最可羞經濟斯時公等在此身天地一虚舟􅀉胡紫山提刑蒼顔白髮兩衰翁前􅀊將翔馬首東常喜􅀏談猶不淺静思行止略相同閶門凍鎻連江雨瘴海炎吹發屋風兩地生還幸無事更何心到炬蓮紅􅀉六祖眞人渉丗筋骸百不堪只堪打坐老書龕眎難逺矚目全眊聽不能聦耳􅓽耽臂痛帶來梅嶺湿心煩漸染瘴江炎客來問訊承佳意蓄縮其如向老蚕五月八日同幹臣遊耿家池上跼促城居鶴縶籠禄荷池上暫從容花明淡灎池光外詩在扶踈樹影中老厭宦游追俊彦天教閑處着踈慵日斜尚約遲遲去散坐髙槐洒晚風和幹臣山居細想山㞐有足論既便嘉靖不知貧霜封幽谷􅀵朋栗水漲前溪送束薪茂樹坐移隨所􅃴良苗耘罷見懐新隱居不見求髙意千古渊明最可人景聮一作樽酒相勞鄰曲厚樹林交䕃鳥聲新山中有樂試為論石上無禾未是貧溪隔圃田多滯穗霜催林葉自添薪醉談有味漁樵熟野飯加餐筍蕨新大朴散來非復古􅀮居永志果何人一作半道閑談留苛蕢隔林􅀌唱聴樵薪瓮蒭春釀雲腴舊園摘秋葵露葉新朝呤樽湛芳醪􅽼夜話爐煨紫辛新遠壠秋餘多􅅁穗中林霜後半烝新時耕白水親秧稻日斫青山白􅀒薪隠仕􅀄終絶異論渊眀憂道不憂貧比如違巳心交病何似行歌自􅀒薪意外風波平地險山間煙景四時新此生只向黄塵老􅀏煞羲皇向上人和幹臣以目疾詩相儆老来􅁭􅂁百無圖遮眼唯便幾業書不尔心神渾散澷豈知目力􅈝乖踈晚年愈種玄花盛平日豪吞緑醑餘氣習屏除元易事急湏顛倒坎離居常􅀝精神壯未殊有時豪飲痛觀書形骸未化無非苦寢餗其間敢自如赤貫瞳人昏􅀂蔽濕留肩井冷難除人慿手眼今如此更有何心望玉除時徃徃傳余有翰苑之命故云掃晴婦今年夏六月初方雨几六日不止前去秋節止廿三日亟晴秋種生發能有幾日又諺云秋后一十八日百粒不結巳種者為雨所拍艱於出壠方種者􅡡土粘濕不易耰作兒子輩戯作掃晴婦懸之前簷明日開霽因作是詩以見其意云澹粧烏䯻緑衣衫一線髙懸舞􅀞簷􅀏着苕枝揮素手盡驅雲影入蒼巖掃晴既出児曹戯指日何殊艾子談百􅂖近秋苗未立羲和先歛壠頣粘江山萬里圗勝覽何人作此圖雄誇天險亦區區經營意匠羣工上慘澹風煙百戰餘並轡相夷嗤宋魏舞干來逺羙唐虞只今一綂無南北正要懐柔謹厥􅀄一作指頋漢封真采聚追奔秦鹿此山虞江山列地出新圖限隔東南見奥區與校廟謨雖有間細㸔邊備到無餘忌功去介甘􅂢蜀併力亡金􅀏假虞千古羙芹髙議在不應成敗論終初喪馬和幹臣韻大夫而後不徒行為罄囊金市此乗耳削秋筠分額髪臆團􅀌月映鉤膺長鳴尚憶㸔雲立論力空懐以徳稱得失塞翁深領㑹天教閑坐㸔飛騰過郭璞墓墓在金山西北大江中流亂石間有叢薄鴉鵲棲集望之如蒼雪者蓋鳥矢也青囊書秘造精深􅁙法人傳冠古今一死秪縁撩虎尾􅀌墳何故􅁙江心師從􅀑谷冝多恠山湧胥濤不寸侵丗傳江雖大漲水不及墓我特回舟酹公去翻翻寒鵲落蒼岑一作舟過乱灘無所見寒鴉蒼雪滿崎嶔佛狸祠在瓜洲城江山照眼舒清眺千古興亡堕眼前􅀲歩市長連野戍佛狸祠古􅃤荒煙柂樓看取平呉日父老空傳飲馬年此日不湏開濁浪好風都属徃來舡即事三詩奉呈幹臣明府詩友辛卯六月廿六日作鯀殛苗夷併放驩九官相譲濟時艱閭閻有喜科差少煙火全踈傳舎閑雨澤潤寛無逺邇詔條恩溥到惸鰥聖皇撫御超前古􅂟曆元和未易攀恩書一札變虞驩盡革前非免後艱星影不摇天宇静邊庭無事羽書閑震霆摧惡無留枿霖雨思賢到有鰥􅀂把古先相比擬周成唐憲敢躋攀占法云民勞則天星動摇巖廊吁咈處工驩萬死猶難謝世艱向奉御秃列死先今野貍瓜嚙其膚今相哥自請死同秃列􅀂交汝便死天下人謂我何為念民碞深頋畏自裁書詔盡防閑求賢不啻飢和渴發政常先寡與鰥蟣虱小臣雖片善一時鱗翼盡期攀今嵗自二月至五月凢雨降詔條皆出自聖裁韓齋小集呈幹臣詩友辛夘十月十日十日秋霖不出門偶同􅀺杖歩城根故人雅有平生好尊酒時陪一􅀏温野菊翻香忴晚節露􅌲團蓋任朝暾暮歸欲乞天孫巧􅁍歎儀曹是妄論送同仁甫之任武陟寛則民輕猛則殘化行州縣固應難紀綱綜務見常操䑓閣推勞不素餐能使弦歌千室樂何憂風雪一家寒來辭請益吾何有一札恩書與細看秋澗先生大全文集卷二十
