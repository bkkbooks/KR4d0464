  text: 秋澗先生大全文集卷第十三
  hash: sha256:f41641ed11c15478797fd53083fdb779e0a77dc22eea0e035933b2d4be4bec25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_013-1a}
body:
  text: 五言律詩哀向書髙公詞維至元十一年甲戍十月壬子故吏禮部尚書髙公以疾薨於位嗚呼哀哉明年乙亥夏四月丁巳考工使者蔡鉉自相抵晋始知公靈櫬歸葬安陽秋口郷臨穴者幾萬人僚属士友㑹哭皆失聲惲辱知最厚嘆斯民之無禄痛知已之難遇自非歌詞無以寓餘哀而露情臆也廼作挽詩三篇表於素旂之末尚兾神靈鍳兹哀悃其詩曰翰學期公淺謨猷冠一時立朝稱極諫連茹愧深知斗舌承天眷風神夢羽儀比揮千字誄悲絶七哀詩思公情曷已漳水日東馳風調翔麟士文章太史辭行身無少玷持論有餘師落日􅀌忠壯秋風兩􅁂絲幾行知已淚東望重淋漓問望群公表枝撑大厦材印窠空瑞錦風憲黯蘭臺反拭驚麟出云亡動國哀千年遼海鶴華表倘歸來枝撑一作扶持送成耀卿尹温縣時河内連􅀊蝗旱邑古仍卿采民屎待尹蘇千年留故事一治聽歌􅃭鼎鼐調應切山川慘未濡莫辤淹兩考留潤漑焦枯奉題趙侯禹卿東皐林亭雅性便林壑紛華厭市城庭柯交羙䕃好鳥變新聲喜見桑麻長誰知寵辱驚門前輪鞅滿一醉共秋成物我同天壤流年遽代更髙臺方畏景喬木巳秋聲黙熟盛衰理都忘悔吝情只湏多醸酒時與故人傾今年秋穫早臺逈暮登時野徑人歸晚煙林鳥去遟有來飛蓋客日課讀書兒適意有如此此外安所期築臺連野色架木繋匏􅀲舎外開三徑壷中自一家愛吟歌白紵灑酒脫烏紗更喜南牎下秋風菊半華野逈門開早心閑起自慵林香芻社甕山暝􅀝吟笻半醉留佳客深耕愛老農晚眠誰復􅁴墻外月明舂趙侯敬愛客毎云相見稀不辝髙㑹數但恐賞心違白酒夜來熟黄花香正菲賔僚多暇日無惜過柴扉重謁樓桑昭烈帝廟百里燕南道山河繞帝宫荒村仍故里喬木幾秋風簡􅁽經綸在丹青户牖空寥寥千載下無媿孔明公固安道中時至元六年冬十月廵按四州十月燕南道提封入按巡清霜嚴比雪枯樹老於人尚逺經綸妙湏勞撫字頻前林烏鵲盛喧無恋餘春除蝗時被命捕蝗武清縣秋雨大作終日方止千杖呼聲急人懐愾敵看日長旗尾困圍促鼔聲乾人與蝗交戰天將雨􅂇殘東林茅屋底客枕夜來安秋日過濟衆僧舍院静鐘鳴後僧閑暑退初過門無俗客閱古得名書衲􅃳香留几心清月印䟽仲殊􅁭爽在開口見真如送紫陽歸桞塘時遊孔林回千古文章事江河不廢流苦心公正閏書法継春秋夢繞秦山逺天教闕里遊㑹將洙泗教行復丐西周午憇陽城北龍泉寺倦客鞭催急龍泉一解鞍在家貧亦好行路古來難寺古松杉老山空水石寒萬松亭廢乆重拂短碑看碑大定問澤州刺史楊庭秀撰真竒作也簡寄龐雲卿時自滑州判改授濟源令軹井千年邑提封百里侯剖繁人有頼治簡事彌優白鳥翻林表青山滿樹頭訟堂歸去早揔是釣詩鈎元日夜燈下即事五十又加三行藏黙自諳去年留薊北今􅀊客漳南官事何容了君恩未報慙白頭青䤥裏衰謝百無堪詠史開府宅鶴超遥華表客吹落故侯家􅀌㓗真仙􅂹飛鳴稱彩霞困眠依竹石飢啄半蟲沙㑹待秋風舉巢雲飬頂砂清􅁐道中野店春風裏行人避綉衣劒華寒有暈山日慘無暉􅀌隼梢雲下群鴉結陣飛驚鷗無逺泛事外本忘機又作澄清吾有志天意肯從違至元十七年正月十三日已刻出完州抵暮入保定夜未分雪大作至翼日午刻方止偶得此詩預喜􅀊事之有成也曲逆連清􅁐相忘兩舎中朝驅塵沒馬夕捲雪填空巳滌崇􅂭盡仍歌􅀊事豐小紅燈影底一􅀏􅁴春融一作誰云吾分薄所向得灾凶荅蠡州天寜寺英老灑落天寧老携尊復䄂詩逢場閑作戯来謂老監司白頂憐郷土清吟􅀃阿師一盃供客􅀏聊用當門搥在教頭腦異􅀄不間天彛座中偶得示舜舉舊逰仲賢良醫半載東州客﨑嶇􅀏自奄事隨時即故老與病相兼發伏遺姦枿褰帷愧具瞻君恩如許報白髪且休添龍門寺寺古僧何在山空石作門碧崖懸瀑影蒼峽掩朝暾不惜山公屐重登謝傅墩一杯須軟脚掃葉煖清尊辭長樂先壠二首已丑嵗秋九月二十六日將赴任福唐拜辭長樂先壠歸宿野竹趙氏田舎且喜聞村之故名因有是作爲野竹訛爲野緒别逺辭先壠歸遲􅀫近庄客牎疑夜煖野雨變晨凉游䆠嗟吾老窮居仰􅀊穰故郷猶足樂誰遣去朱方展墓過農里㗸恩使逺方氣隨天北轉人與鴈南翔肝膽􅀌忠在江湖去路長此回當自信不必泥行藏飲食飲食資吾耄行年六十過三升元有料一口不容多過爽心隨滯長虚氣便和不湏移遠歩聖藥有束坡辭先壠後臨行作義重煙嵐簿人微使節光桑榆雖晚景事業見炎方回轡知非逺趣裝苦未凉交親留少住馬足健秋霜望舎弟消息憶弟居穣縣嗟予䆠建陽三書曽未報一别謾相望喜信占晨鵲清吟夢夜床殘年能幾許長與汝參商後㑹期􅀄夏遐征動暮秋萬金書渺渺兩地思悠悠問竹過門巷看雲􅀝郡樓􅀯遊曾有話㑹上􅃆陽舟居守縈家累懷歸畏簡書人憐英蕩重我􅁴䆠情踈緩進需安信頻呼斫素魚後溪溪上月北望想躇蹰送趙克敬任孟州同知予爲待制時穆其属也趙穆從英妙詩書性所安曏爲太史属今作孟津官事辦時爲切民恬貴政寛老夫江海去州縣莫辭難蕭相國廟在下邑東南五十里郎縣廟在縣北門外下栗東南陸鄼城井邑空圖書秦府夢簫鼔漢時宫喬木秋煙慘頽垣野燒紅數郷供野􅀕􅀊􅀊不期同火獵自歸徳以東皆用此法緑竹連􅆯逺蒼烟蔽野昏兩傍羅草伴一火趂羣奔從乎􅃒麛鹿張弓得艾豚縱觀思獵較積柴散燒痕汴堤道中細竹㳂堤緑秋烟蔽野蒼路荒經桞子山逺指芒碭勉進心還尼懷歸事叵量縱令空徃返猶得看維揚十一月三日􅀫濉寕夢緫帥史子明見教矯矯常山帥相望間楚齊夢中親與誨身外别無提切嘱心何朗臨辭乎重携何時揮老淚墓額拜征西次宿遷望紫山不至河廣舟航小堤長市屋卑􅀫遷元隔楚淮甸舊連邳濁浪隨淸變香粳問客炊紫山前有約抵事北來遲淮安州平野圍淮甸􅀟城入楚州喉􅁭開重地鼓角動邊樓聞鴈思郷信歌魚撫劒緱此行安所遇江海任浮鷗是夜驛亭無抵待故有歌魚之句寳應道中共􅀃淮南冷今冬氣􅈝增雲垂梅野雪風結漕渠冰事弊㝷常宻吾㐮用不能據鞍時自􅀏休苦直如繩出寳應雪中舟行避冷乗官舸風篷去若奔兩陂雲影黒一片雪花繁景與詩相㑹寒無酒可温泥橋投􅀫處寒日暮鴉昏髙郵道中二首築甬餘三百灣環護漕溝重橋穿寳應一岸入髙郵水陸開亭轉煒烟静塞愁腰􅆞無十萬官遣上揚州湖漫通淮水盂城隱楚防百年勞士卒一擲失金湯陸走無􅀜禁舟行半海商此􅀖多秀彦國士􅀃秦郎召伯埭謝傅留遺愛千年尚不忘埭名同召伯郡號属維揚煙火今中土干戈舊戰埸離離平野樹人指是甘棠一作断橋穿市過十里藕花香又一作野人誇藕脆滿口嚼氷霜揚州贈史左丞㧞都時宣慰維揚淮海維􅀭域金湯􅀔尚存車書歸一混鯨鰐失􅀌吞樓鎻行雲夢岡環洗玉盆治安君有䇿長嘨出東門衢州我歷江南郡凋殘不似衢兩坡稱閙市一炬變荒蕪反側誰無識瘡痍意未蘇殷勤陳别駕不厭拊循劬早發三衢驛開􅀜放暁裝江風吹㡌側山月照衣蒼馬渡浮航水雞號野店霜爛柯聞有局無分躡仙梁州南三十里有天然石梁長約數文謂之爛柯仙界玉山道中石徑行無盡清溪送馬蹄啾啾啼野鳥攃攃喚多泥松暗増晨黒川斜入望迷比明三十里巳過玉山西常山道中晚行土蹬盤黄嶺人家住碧峰焚林人逐獸競渡木爲龍水穫無過夏山行不識冬斜陽留絕景不放晚烟烘信州道中控帶谿山嶮􅁭喉福建門呉音饒鴃舌越皷聳邊屯岸闊浮航小城卑夕靄昏不煩詢土俗煙嶺互相吞石溪道中赤嶺鉛山界清溪野店橋株林烟漠漠沙路雨瀟瀟馬慣行安嶮禽幽語弄嬌西山晴更好詩思苦相撩鵝湖寺已丑冬仲望日雨中過此坐間爲主僧希聲留題希福州人湖頂開鵝沼川形偃法船寺留金粟影僧結草鞋禪地勝多􅈿木山空響夜泉寺僧談逺跡張本永真年唐順宗年號閩中錦綉無諸國曽經漢武荒祝融開火宅􅄓毋擅風囊淵萃逋逃藪人依虎兕鄊閩中不識雪何有豸冠霜閩清湯池留題熈寕十年八月赴福唐元豐元年九月􅀍召還朝徃返皆經此十五日南豐曽鞏題僕以大元至元廿六年已丑秋按部來閩與公裔孫冲子同事明年秋以理去官與先生徃還時月略同曠世相苻有似非偶然者摩挱蘚刻留詩而去重九前四日小子惲序潦倒嗟吾耄淹留近􅀊終客星回海上桂棹發閩中逺䆠無遺累歸帆得順風湯池看蘚刻徃返似南豐建寕北􅁐宋寧宗曾開邸於此北􅁐繁華歇名猶􅀶望尊野花疑靨珥徑草半蘭蓀軒縣歌鐘暗宫樓峻址存我來凝眺乆喬木晚煙昏望嶺谿嶺無千里﨑嶇半月間事機須勇退天意許生還順處從多厄趍時免強顔越禽忻我徃長路語關關鵝湖道中細路山園静煙蘿野寺濃俯躬升峻嶺仰靣看喬松道在從時背才踈助性慵有身官不属一任老龍鍾是日得䑓報故云題柯山寳嚴寺璧同遊者山長趙文龍前教授徐夢龍兟友教官余性道二人皆廣信人徐有文筆甚健府推官保定張式儀卿别駕東平陳珪國寳子公孺侍行至元庚寅冬十月望日秋澗老人題􅀛阜西南麓名山世未􅀟爛柯仙有局絶觀石爲矼事去空遺史風恬愛此􅀖來遊情眷眷留詠􅀉僧牎喜得陳張友來遊興不􅀌江山開恠供風月閟清都閱世驚棋局看題倒酒壼暮歸應稇載只欠􅀞爲圗首夏家居即事􅂴幘從鬅􅁂披衣任曵􅅂都忘身外事貪讀意中書比老心能爾雖貧樂有餘繞園欣細履樹影緑扶踈竹茂資泉潤花榮藉圃沙鈎簾来舞燕鎻樹護栖鴉客至留酤酒吟長待煮茶幾時容􅁍掃一向似仙家方竹杖節勁嫌圜甚形方與衆殊任從炎漢斵不變魯人觚心曠謙中守姿堅義外扶蜀笻非我友釐簡乃吾徒枯燈花歩入東瀛丈吟看北檻花春風収翠葉烈景發炎葩一氣元無間􅀌根乃爾差鄭箋􅀄不及党詠只空誇送杜簽事之任江西憶在齊州日同䏈憲府鏕群居推健羡􅀌繋更超遥此去雖殊域規爲秪舊條將身能道護所至儘風標和幹臣重九日兩中醉歸韻髙㑹有成約寕爲一兩妨烹鷄酌白酒煮芋臭秋香落㡌同嘉興霑寒等陛郎醉歸從健倒􅂓復少年狂今􅀊登髙節佳招兩有妨閉門時隠几掃地静焚香安得黄金酎同傾白首郎醉郷多樂事何祗發詩狂事一作地舎弟仲略題孫鞬郎名字􅀃後訓汝諄諄意竒文見廼翁洞堅威可大棲鵠體湏中旣應開先兆當知矯揉功逺期遺近効羽夾看摩空贈欒子英詩子英冠州人時爲農司從事子英外郎孝廉士也十年前予與共事於沙麓者凡兩月今􅀊秋將命過衛踵門來謁話間因及親䘮事弔以伏臘二氣遇之者固異然殁而不壞及膚髮猶生如欒氏二親者蓋亦罕見豈廼翁與媪生有所積而殁有以孝心之所感者然邪乞言顕親書此爲贈其辭曰孝感元多異欒翁見化􅄱􅀄終神不昧將祔兩猶生盡謝青蠅吊堪書翠琰銘百年風樹底悽断蓼義情贈岳錬師仲和今年八十四健勝去年時豈假還丹力沉潜繕性辭骨清儀野鶴神爽見毫眉更有虚明處物来多預知月桂花名誰品藻􅀊與月華新不爲􅀌根細能留四季春色深丹竈術葉映碧苔䄄我近雕攔側終朝􅀝杖頻賦白鷼羽族幽閑品霜毛縷黒章聳冠矜耿介蓋用棲止不雜於象禽也頋影惜飛翔去備虞人貢行觀上國光刷毛琪樹底無夢海山蒼京華舊俗􅀊終廿四日諸神上界夜家人設􅀕遣奠致詞且有遏惡􅀭善之嘱遂作小詩庻見風物五祀開三代人間閱􅀊華交更同選調遣奠具餳茶天闊神驂馭燈清喜結花逢新如有問萬一善相誇和曲山冬夜即事韻二首清苦周南樂居官素有聲老天何汝困公道欲誰明瓶罄憐三白衾寒盻五更捋􅂡儔賞識吟苦撚霜莖雪夜清無寐瓶笙細有聲茶鐺吟待熟虚室白生明白髪催人老青陽廹􅀊更湛思盤露重何意望脩莖奉酬舎弟仲略見竒之什隔闊三年别回還萬里程細吟違逺句深見友于情路眇霜風勁吾衰體履平家貧渠亦老一動不爲輕挽宋耀州漢臣二首每有遊秦士慇懃問宋侯相望無兩紀一别便千秋斗酒新豐客堂封渭水丘題詩何限恨老淚不成流斗酒新豐客龍門接上游相望纔兩紀一夢便千秋銘徳辭無愧親民政㝡優兩行知巳淚撫卷爲君流辛夘歳十二月望日大雪連明信􅀫開霽日色暄妍如春乾坤清淑之氣肅肅可挹數年來未之見也作小詩以紀我􅁴今冬氣全􅀜爕理􅁠一寒嚴徃歳三白見豐年地掩浮陽静天開麗景妍不應薪米價愁計􅀞义錢五加皮酒服食閩中士加皮􅀃異常精華含五氣􅀘益最多方不羡黄金載長澆白玉觴豈惟除濕痺志意日安強題杜氏六子名後六子名三老餘芳見故家翰音鳴彩鳯翠茁映蘭芽出拜濟南日今看漳水涯一謙能事畢題詠復何加燭花詩李真人索賦燦燦銀臺燭淸光散彩霞誰分壼内景來種火中花一轉芝垂蓋􅀌芳蕙茁芽殘年如喜合丗事任無涯火􅼺兩手寒來􅏿摩挲頼汝温形骸雖土物氣􅀔炙權門燕王休誇暖湯婆可比尊心兵全不起留在谷神存題甘河遇仙詩卷愡怳甘河遇生􅀛脫慤時二仙形姓字一酌悟天彛入道兹玄徼㝷源接上池崞山文㝡雅略不見諛辭和仲常牡丹詩并序三月廿三日飲中作仲常良友氣温而德雅余愛之重之未有擬諸形容爰因賦詠遂見賡歌故情之所鍾有不嫌於太切者其詞曰漢殿承恩早金盤薦露新色酣中省藥香重錦窠春儘殿群芳後誰辭載酒頻淸如司馬相也作挿花人題郝氏世徳碑後其嗣侯今爲蜀省叅政所謂和尚萬户者是也故國非喬木雄藩有世臣河山盟帶礪勲業􅀞麒麟白羽沉蛟匣靑雲滿後塵雅歌平日事遺愛在斯民草昧經綸際恩威見郝侯功成韜將略徳洽配汾流金甲春農野黄雲􅀞角秋衰榮何百世千古仰山丘八月十二日夜病不能寐歩月逹曙官事未易了癡兒昧獨勞病多和夢異蛩若爲秋號事業靑燈苦星河紫極髙帝城人海裏汎汎一漁舠大行皇帝挽辭八首至元三十一年歳次甲午正月廿二日癸酉夜亥刻帝崩于大内紫檀殿旣殮殯于蕭墻之帳殿從國禮也越三日乙亥寅刻靈駕發引由建德門出次近郊北􅁐有頃祖奠畢百官長號而退臣惲職在詞館追思不巳作挽辭八章庻幾鼎湖攀髯之意其辭曰欒水龍飛日長楊羽獵時天顔凡五見雨淚遽􅀟垂化日中天赫隂靈萬國馳何由知帝力耕鑿樂雍熈晏駕􅂊經􅀫幬車出建門千官紛兩涙六馭迅龍奔雲氣蒼梧逺天山禹穴昏依光瞻日月頌德象乾坤威破群䧺膽恩藏四海心聲明三五盛垂拱九重深國論多儒断天機入睿臨小臣􅋇面血無路灑松林聖神由廣運纂述到無加禹甸逾輪廣殷􅀖極靖嘉遵臨三紀乆遽陟九天遐白首金鑾舊長號自倍嗟端月辰臨酉淵衷弗寤興紫垣蓬彗學􅂎國駭天崩法從嗟何及朝臣痛不勝聖靈知在上春草認封陵去􅀊回鑾輅旌麾擁萬靈今春辭􅀞翣弓劒閟泉扃黼扆虚瓊島雲龍慘帝庭是夜殿庭間有光煥爛􅀂燈燭然良乆方散詞臣思􅀘報淚濕簡編青論治方堯禹求賢到釣耕民區無二上廟筭有竒兵萬寓風煙静中天日月明小臣思頌徳終了是強名帝系三宗上麟經一統尊火盤承正據虎落入雄吞窮蹵􅀯交獸奔騰北海鯤不教擒一索遺恨付皇孫題兾州馬同知拜慶詩卷時九十七官郷里時恩不轉矍鑠征南將忠勤爲國知任官無調轉享壽到期頥錦爛行春里香生拜慶詩滿前蘭與玉又見福生基秋日下直玉堂下直玉堂廬閑拖過市車秋風殘暑􅀱積兩暮凉初撥置難行事㝷看未見書萬縁前巳定不樂復何如餞安南國王弟回鄂渚萬里朝天道歸軒寓武昌觀光呉季札助順漢閩王寵渥心逾赤詩新桂有香􅁃樓回首處秋月興元長雪夜聞鐘元貞元年冬無雪十二月廿一日夜大雪喜而作此雪屋燈淸夕踈鐘定夜鳴撞餘週逺韻聴乆喜􅀟淸爐火留􅀌坐茶鐺待一烹巳眠猶未寐詩向枕邊成王氏拜慶詩并引集賢大學士王顒太夫人張氏元真丙申夀八十有八視聴聦明起居康健剪製纂組之事老猶能工正月十四日蓋生辰也中書右丞張公以升堂拜禮義重諸人前期誕彌啓之太毋特召見宫閤存問再四嘉其賢淑留讌賜幣下暨二孫皆霑寵渥明日翰林諸君相與舉觴上夀百拜獻詩猥當卷首九秩康寕夀親承燕賜恩香融彤管煒春滿綉輿温世與名郎孝天全五福尊佩環聲合度清響徹宫門賈仲和慶八秩君前來魏國文元公逺裔其家丗備見遺山所撰千秋後錄太史徴文獻隂功滿諌章諸孫冝曼衍八秩見康強孝義聞東魯簮纓慶北堂千秋遺録後奕葉又生光慶閻庭直夀毋詩洗髓黄眉夀儀尊五福全雍容班姆訓潇洒謝庭仙致樂孫能飬居官子更賢霑恩行有日香重誥鸞牋送喬元朗疆理􅀄無外乹坤大統齊漢恩同一視星鳥望中低海甸沉銅鼔天書坼紫泥皇威能逺暢歸斾拂雲霓榕樹南來過劒府嶺岸樹多榕繳結如蛇蚓堅凝比栢松葉芽生挺代隂影散芳濃鶯羽群飛日凋零􅁍是冬五言絶句贈髙邑趙教諭坐乆槐花落黄金滿石牀一杯春露冷情話不知長冬藏和曲山詠懷嚴韻吾道有汚隆人情逐冷暖自憐心事佳不覺天機淺一作克教私意無任使天機淺貧居固鮮􅂬漏盡行當止只有若吟心時時爲商起巨鈎釣鮮鱗其􅀔兩難着何當掩長圍爲君獵麟脚􅁍掃苦未能人事日復日泛愛聖所稱亦復論損益才踈詩倦吟年老酒當止君看古井波澄湛自不起安坐此心與天游老我無繋着坑頭有春温安坐收兩脚讀史紛紛世利塗翳翳桑榆日賢哉向長心一損勝三益詠梅折来何處梅自擬􅀌根暖寒花本強顔風味空不淺已亥􅀊門帖子不羡陶朱冨非悲阮籍窮愛君思道泰􅁨國願年豐䟦吕丈扇頭井道飬不窮濟人非望報過飲投青錢取廉非正道秋雲自激行雲映空明㛪妸飜輕轂風吹不成雨日暮空相逐夢中得燈殘細暈黄月落􅀌牎白惡夢不成眠幽魂驚撇捩出門二首因酒敗佳意方知百拜輕忘機甘李喻重賦赤霄行踈拙傷吾性傾危見俗情出門山自好秋色浪峥嶸望淮朝日􅃤無色昏昏水氣間到淮猶數里隔岸見尖山夏夜庭竹影扶踈清風晚騷屑夜凉人未眠卧看牎間月出門東風吹隂霾朝來晴霽開􅋞眼門前去青山城際来雨後看山西山色蒼蒼雨後如新沭天髙晴意寛歸雲滿巖谷夢中得持酒濯利劒青蛇光黯然金鞭鞭駿馬汗血沾錦韉喜雨癸丑六月旱草木變萎黄夜來聞雨落起舞亂登床秋夜西風入庭樹掩冉衆葉鳴幽人不能寐愛此秋雨聲中秋制中對月露冷庭梧墜天髙月影長清光不堪掇和淚濕衣裳披􅁭凉風東北來蕩盡中夜􅀬起視河漢星微雲淡明㓕秋磵先生大全文集卷苐十三
