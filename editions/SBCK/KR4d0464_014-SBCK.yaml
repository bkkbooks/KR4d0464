front:
  text: 秋澗先生大全文集卷第十四七言律詩
  hash: sha256:79d5f7a7e16c8d0b60a62b950e6cac551e4297ff7092cd925616548ec2d34989
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_014-1a}
body:
  text: 哭劉房山紫髯山立蔚􅀭休書學推君到晋流文塚氣嚴驚卧虎墨池星黯失蟠虬眼中人物嗟何及身後珠璣散不収我擬九歌投濁浪重傷吾道轉悠悠中秋月夏苦蒸雲嵗晏霜月華還覺此宵良天容澄徹銀河没桂影飛來海氣凉老魄不應秋更苦賞心多爲事相妨一杯儘吸清光了洗我平生芥蔕腸送王嘉父新知雖樂道彌親樽酒燈前便故人時宦儘從閒處着浩歌還愛醉時真紅蓮幕府名兼隠春草池塘句有神恨煞百門山下水錦波流不到東秦一見􅁭期倍所聞霧嵓玄豹隱竒文清樽浩月應無幾赤日黄塵遽爾分濁酒可因微恙止天葩寕為舞裙芬百年湖海論攵地興在天東日暮雲和靖教授送行詩韻出處􅀄心度義行蒼天誰識此精誠十年載質􅀌懷苦一宦縻人弊屣䡖時事失聲驚破釡幕蓮晴泛媿參卿夢歸夜夜栖巖桂猿鶴無勞乆怨驚秋日言懷時先考卧病雨後秋堂早暮凉竹風飄蕩藥塵香身間正坐詩成癖親老何堪病在床書卷日隨秋草亂壯心愁入野雲蒼摩挲老鏡蓬䆫底也效樊川洗􅁂霜清明日錦堤行樂浪􅀃蘭亭禊事修年季春好錦堤遊花翻舞䄂驚歌板桞隔髙城暗酒樓緑樹恐應春事老金鞭重爲使君留竹西路晚歸時醉何處珠簾半上鈎八月十九日雨晚晴積雨収霖景氣清物華雖老􅁴容平閒雲知倦争歸壑飛鳥趨林不計程山􅟠翠鰲驚突兀天浮圓蓋失枝撑化權舒惨吾何預要擬樊川賦晚晴上史節使晋明夀尚父忠勤歷五朝承家又見鳯遺毛神鋒灑落青􅁳闊秋隼騫騰華岳髙治化載清遵定法德容充擴浹吾曹年年盡戟清香地常對秋香醉露桃南城納凉晚歸書院歸休日巳曛南城風細晚相親坐來近市喧􅀄息歸到衡門夜向分矮榻趂凉欣稚子踈燈留影伴厨人一盃粥了從髙卧須信閒身等䇿勲七夕立秋庭竹風生好雨過碧梧飛下鳯凰柯人間一夕驚秋早天上􅀟星恨别多鈿合蛛絲遺暗網綺樓雲影淡明河柳州羡煞天孫巧其柰㣲生賦分何凉夜祝融怙權不肯退一夕好風吹暑回雨氣淡從雲尾散秋聲凉自樹頭來渇懷夢濯西江水逸興歡逢北海盃慿語蘭臺宋公子莫因雲物詠悲哉八月十一日夜坐展轉秋懷鬱不平憮然方寸若爲驚學踈乆昧天人理親老尤深喜懼情坐對燈花供􅀏語静聞庭樹散秋聲大家但使康強了未害窮愁老此生雪晴望壬子􅀊正月滑滑春泥雪意融出門藜杖任西東光風漸好茅簷喜煙火全踈傳舎空三穴既能容狡􅇠五噫誰􅂧羡􅁳鴻更爲着眼登臺處頗覺江山王氣雄題何練師巨川虚白菴西風吹下鏡湖􅂳來作空山避丗僊採藥逺辤滄海上結茅歸老白雲邊鑑光應物元無物素質能玄本不玄莫遣碧桃溪畔水暗香浮出洞中天鵬雲蹤跡􅀂垂天収歛都歸一室間塵境夢空祥巳止松巢枝穏鳥知還潭心印月清無滓谷口横雲意自閒想得翠蘿幽隱處天風和水㵼空山太康展江亭籌筆規模蓋丗功新亭髙構継遺風乗秋閱武邊聲静臨水投醪士氣醲騏􅀐継聞空塞北樓船行復下江東慇懃淮水東邊月幾照元戎坐折衝送紫陽歸栁塘掛冠神武急趣裝歸隠秦中舊草堂海内共知元氣在井邊巳仰徳星光眼明華嶽蓮峯翠路入凾関草樹黄預爲山靈報歸日緑楊隂合鄠南莊送蕭四祖北上丹鳯㗸書下紫庭秋宵光動少㣲星蒲輪再起秦遺逸天意將新漢典刑長䇿正勞黄屋夢故山從使白雲扄中原有幸經綸了天外髙鴻本自􅄀上闊闊學士􅀄來軍儲字子清蒙古人官至中書左丞六轡聮翩走使車繡衣風彩漢相如紛紛漕計歸鞭筭戀戀丹心在帝居折節不知軒冕貴濟時行奏便冝書從今慰􅁍蒼生望一􅀧文星照玉除壬子夏六月陪蕭徴君飲方丈南榮同㑹者烏大使正卿董端卿經歴學士徒單雲甫張提􅀧幾道王秀才子􅀄洎家府小子惲隅侍席末云脩竹翛翛風滿廊夜深樽爼得餘涼浩歌聲繞銀河水畫燭光凝燕寢香雪蟻十分浮大白徳星一夕聚髙堂停盃更待東山月要汲清光洗肺腸送王子􅀄東行岱岳西南碧海東青齊中據震維雄驚猿别鶴休増怨詭觀竒蹤得盡窮劒暈寒輝騰寳氣馬摇金蹀健秋風欲知别後相思夢多在西山紫挂叢杜君美耕隱堂厭喧恥向市朝居歸隠南城舊草廬黄葉落時農事隙青燈明處夜䆫虚冩懷草就淩雲賦貯腹看殘種樹書翠竹白沙村路晚月明幾駐故人車春懷和术忽坦夫韻苐屋春深􅂴閉藏出門藜杖獨相將春光暖透芝蘭谷風色妬殘桃李􅂣論政舉知南國弊賦詩休詠北風凉浮雲軒冕非吾事擬訪無功覔醉郷雨中與諸公㑹飲市樓毎恨人生㑹合難興來一醉盡君歡雨沾翠佩簾花細酒凸金杯飲興寛胡旋舞低翻翠䄂串珠喉穩怯春寒朝來酒醒􅅾䆫下依舊春風首蓿盤秋漲後晚訪王克書舎種柳堤邊􅁸暮吟黄金不博百年心垣墉傾圯水􅀄退門巷瀟條秋向深但遣歌詩酬野逸儘隨郷社共浮沉鄰墻酒美中秋近明月柴門約重臨報子􅀄以書見慰擁鼻吟成嘆索居眼明驚見故人書邊城秋静沉寒柝畫㦸門深曵翠裾契闊秪應分一水􅀏談曾不廢三餘荅君不忍虚來意呵筆裁詩雪滿廬春望黯淡春雲雨意微小樓􅀌影立斜暉書能引睡聊遮眼酒可攻愁任典衣桃蕾有情含􅀏發鴈行無力拂雲歸􅀝欄不盡登臨意獨對東風詠采薇冬夜坐虚堂人静䑕窺燈霜葉瀟瀟散雨聲睡眼看書渾勉強夜䆫得月喜虚明漫漫長夜何時旦悄悄􅀌懷百慮横到底麄官男子事幾囬投筆壯班生砧帋鵝溪蚕繭太豪華新帋蒙茸隠細紗不惜秋砧聲夜杵要翻新法自吾家搗匀楮皵光舒練拂散龍煤字􅀧鴉我録詩書何所事擬㝷源委泛靈楂夜歸月波環暈晚風凄賔館歸時獨杖藜曲巷門深驚剥啄小樓燈影自髙低歸心有限先回鴈丗亊無心􅀋木雞淡蕩春風二十八忍將書劒坐覊棲壽周都運劒佩龍樓顧遇頻漕臺今復試經綸平生許國丹心壯此日承家玉樹新德量􅃳􅆂淇水逺夀杯光動紫川春朝天好在明年日金印重看拜伯仁秋雨有懷吕丈子謙時奔䘮夏津賓館光隂一􅀊中飄蕭吟鬢感秋風乆諳丗事無多味静􅁴書編有細功四壁夜蟲秋思苦一䆫寒兩客牀空對眠不見蘇州守縱有新詩愧未工壽王參謀二首郁郁卿雲靄士林不應正作一方霖無媒致位寧􅀻巳有子傳家足慰心巾卷在庭公事簡壽毫浮彩蟻罇深非詩莫頌千春徳喜對梅花入細吟典郡風流漢表儀一方春物自熈熈謝公雅量推平昔楊震髙風到四知畫㦸清香凝燕寢東山春酒照芝眉政成不獨褒金爵賢守恩波在鳯池贈元仲一書記名寓緇衣行碩儒蒲輪􅁍走事居萬縁擺去聊乗化一念深來為讀書黄閣經綸冝自重青山談􅀏未全踈相望未入廬山社日暮碧雲思有餘和仲一詩韻丗事紛挐八九違未容丘壑淡忘機湏知霖雨思賢佐終擬卿雲挾日飛麟閣勲名驚壯節虎溪公案覺前非㑹看杖䇿軍門去滿眼行山空夕暉娯志詩書不厭貧蟄龍冬卧不求伸應憐擁篲侯門下何似行歌澗水濱沙鳥忘機還自樂池蛙睅目欲誰嗔悠悠物理吾難料㑹得摳衣問上人送百德正臣之汴梁君璋序裏仰髙懷賓館相逄一􅀏開過眼揔非如意事着詩時遣不覉材人驚駿骨空燕市夢逐秋風上吹臺去去當途足知巳未應空使劒鋒摧贈王􅁱甫樊川風調錦囊詩邂逅青樓豁所思得酒愛澆吟舌健放談時露劒鋒差香翻月户情難極風入庭梧􅁂巳知過眼紛華終寂寞望君冠蓋鳯凰池挽趙父師提舉疋馬南來及撫棺磨礱空使憶當年師資有道無虚飾賦業推公得正傳黃鳥此時空止􅁄青藜何處伴譚玄􅃡懐壽徳冝無憾可忍覉魂似粤阡送盧叔賢之鄧州萬里風雲入壯懐斗南人巳識竒材重看緑水開蓮幕宛勝黄金築隗臺鈴閣風清談麈静星屯煙暖漢旗開後期竚聽平安報定逐梅花驛􅀐來壽王子􅀄彩鳯髙翔欲覧輝十年書史董生帷持心不為紛華奪尚友常先逺大期内冨經綸隆事業外涵風雅養詩脾赤霄玄圃春風細百􅀊相期拾紫芝自適旋収栢實炷爐熏􅁓帳低垂自有春竹几隠眠無俗夢蒲圑容􅂰勝華䄄䆫間白日驚濤迅門外黄塵萬事新幸與聖賢相晤語未辤藜藿此生貧登熈春閣封丘門外故宫傍天閣空餘内苑荒瀛海夢空三島没帝城煙慘五雲蒼石䲔照水鱗猶動金鳯凌雲􅀔欲翔竒貨梁園當日盡為誰留在閱興亡哀故宫掖庭依約粉垣丹行入荒宫重黯然華表忽驚人丗換昆明重見刼􅁅寒石龍委地埋秋草湖王臨池􅀝暮煙滿目悲風吹酒醒東華門外淚闌干送趙相君北上漢斾當年入汴州布衣曽此識君矦夏盟自列葵丘㑹􅂹馬空騰瀚海秋萬里風雲横寳玦九天名姓動金甌南遊正值朝天去望断春風五鳯樓登凌雲閣布衣塵滿戴儒冠風袂来登上將壇棟藻雲飛朱栱濕簷牙霜重玉梯寒風煙逺勝籌邊逈氣􅀔雄吞汴水乾經略江淮有成筭不湏重展地圖看送王子􅀄之鄧州東風霽雨泛晴光桃李爭妍出短墻春意似留行客住陌塵都醸燕泥香三盃别酒清明後滿眼春愁錦瑟傍一曲劒歌心事逺緑波南浦未􅀿傷送郝伯常歸堡塞書劒南辤􅂎國天一歡傾倒酒爐邊鳯麟瑞質驚千古江海詞源浩百川吾道莫傷今日否斯文將付後来􅀓驪駒歌断青山暮愧未長遊從馬遷贈李幹臣少年心事便拏雲不着清談觧丗紛自得士元參别駕僵摧伯比張具軍一江夜雨供吟筆万里征鞍逐鴈羣早晚春風笳皷地更看詩壘䇿竒勲登資聖閣傑閣當年瑞靄氤乱餘金碧半塵昏豈知象教移中士猶掲雄名護國門法界冷沉梁􅁐月寳香難返汝陽魂傷心五嶺騰煙語舉丗從風莫與論跋西蒲老人燕處圖甫脫􅀌城百戰危蒼茫何處跨鯨㱕百年有感悲風樹一旦無依足孝忠遺像儼然留故事寸心聊擬荅春輝逺游剰䄂如􅀲􅀥海岳相逢㑹有期上史相君夀麟閣勲髙誓不磨㦸門春靜雀堪羅盟髙踐土尊王切恩入河南受賜多好學丗推同杜預薦賢人道過常阿稱觴何限輿人頌細逐春風入凱歌時自鄧鄙四過楚卿子冠軍宋義墓并序乙卯春三月予柬如大名道出内黄鎮有廟在民居之南曰項王廟廟之址即卿子冠軍宋義墓也且以徃昔墟墓間恍惚事來告子甚鄙焉獨扵義之死有所感焉者噫義竒士也􅀄武君舉兵渡淮而西城攻野戰􅀔􅀂破竹義之力居多及師次定陶再戰而再勝也見梁志滿氣驕識其奪魄後值崩潰果不踰素義可謂深知兵矣至羽請師捄趙執以不可觀其籌畫號令攻取先後之方誠上將之略惜不使差肩三傑北靣以事髙祖反區區委質天乆厭之楚與羽並驅爭先西向以舉虎狼之秦何其不幸者哉雖然方秦之失鹿也羣雄蝟起以蛇為龍者不可勝計布衣皇皇之士能明目識帝王之眞而歸之者蓋有之矣誠未昜一二數也至􅀂淮隂韓信陽武陳平一旦起而盡爲楚用􅀄且不知天命集漢而後卒歸于漢功業如此幸也嗚呼俾天假義年脱身項氏䇿杖以歸真主其功名當代縱不能厠三傑之列未至與噲等伍耳嗚呼義何不幸也哉義何不遇也哉因作詩以吊并著予之感云老項􅂢軍􅀔巳􅀌擣秦遺趙見雄圖竒才惜不遭龍準赤手争教捋虎􅂡日月不爲荆楚計干戈空爲漢家􅇌因君重起無依嘆羡煞中林得止烏元齋爲仲希賦生平􅁭度玉無瑕天馬精神出渥洼北海罇罍無暇日徳公賔主到通家山髙仰止人皆慕齋用元名意匪誇教子以􅀴平日事不應遺實取其華過朝歌山勢西来擁􅆸宫荒烟回首接南􅅠緬懐藝祖􅀄經野忍見狂童到覆宗野水作聲知客恨幽花含露爲誰容千年快意商郊􅀾流謗爭教有二􅇯銅䑓懐古都邑盤盤據四衝登臨形􅀔覺天雄歌楼暖響春風細綺陌香銷寳氣空􅀏著孱王承宋􅁦至今姦孽擅唐終慿髙誰識神州恨付與衡漳日夜東佑徳觀早起留别道人陳彦逹碧桃花露濕衣凉宿酒醒時夜未央浩浩市聲喧曉枕摇摇星影入虚堂春風醉䄂愁分手秋雨吟燈約對床後夜月明東北路吕安㱕夣半嵇康望東北方半空書嵇康字兩行􅀉蕭荗先飄瀟􅁭韻恥咿嗄醉裏青袗兩􅁂秋通介不随㐮俗受清貧當向古人求城居真似玉川子郷思空懷馬少逰蚤晚臨漪亭畔月一樽重為紫髯留晚菊竹瘦松枯怨􅀊寒為誰含露彂幽妍踈花儘秀開何益晚莭能昌固自賢採擷落英悲楚客破除秋色静斜川不辞潦倒東籬下桃李成蹊世舉然聞詔灤水嵩呼萬􅀊觴綸章飛下紫􅅺香九天空有風雲夣萬國爭依日月光草木变衰元氣活乾坤開霽老隂蔵兩都􅂄舊欣相告四十年来未省嘗陽穀道中有懐黄石公事􅀉呈敬齋姚公雪齋請益􅀄心在東郡趍庭宿願償黄石有書開帝業布衣無地着恩光自慚國士思圖報敢暴􅀌懷不自強巾卷在庭循誘際佩懐言行愈難忘趙御史挽章振藻儒林起趙宗殿前一賦已摩空筆參造化陽氷篆氣屏􅁠豪御史􅍡飬老正期来祝哽招魂何意入新宫影堂一拜情瀟􅆭瑞露香殘翠竹風先生比化甘露降庭竹上上王翰林白衣如鵠禁闈春九萬曽􅅮北海鵾獨翼龍顔潛代邸親承雲錦織天孫兩朝􅂄徳尊元老千古雄文􅀃赦恩􅄫寞黄金䑓下客詠㱕心乆在龍門夢受庭訓其中頷景二䏈盖先君之意云老月驚風夜色蒼覊魂明隨几筵傍音容恍對如生在教戒無多止義方芰歜似傷時􅀕闕松楸應念墓田荒牽衣未畢城烏􅁸曉枕縱横泪幾行贈孟文伯秋月堂深劒􅂂寒相逢一話破春顔心君意豁驚囊頴豹體文竒見霧􅀌節共髙殷侑壮片言誰拔子卿還笑抛燭影金􅁫夢長繞天墀十二間壽姚宣撫咸池朝日覩離明羽翼功髙見老成相體共推安石雅􅁭期全淂伯夷清黄金眼冷燕臺望赤羽心馳魏闕情鄭重一杯千歳酒調元消息在新正周仲寅處覔貂㡌炙手權門已强顔蒯緱未免向人弹晨鐘聲裏霜侵􅁂蘭省臺邉雪滿鞍貂恰擬從公子覔客床應念廣文寒何當花影烏衫側一􅀏春風拍􅀞欄邢夫子拜慶詩軸對君如讀開元報歷歷聲明見典刑欵曲毎憐名父子顧瞻疑是老人星一言楚獄隂功厚百世名談汗簡青濵海歸來非我志春江乗興看浮萍鎮州懐古趙武雄圗不可㝷風烟東接九門深炎凉到此分南北戰伐無情自古今弹躡流風猶戰國椎埋遺俗帶燕音劒歌不遇平原客落日滹沱動旅吟祇謁昭烈皇帝廟一劒功成百􅀾􅂣三年章武事堪傷力扶漢祚圖燃燼規取劉璋出侮亡若論託􅀌徒啓篡試評含泣到分香秋風一掬宗臣血五丈原頭落日蒼燕城書事二首都㑹盤盤控北垂當年宫闕五雲飛崢嶸寳氣沉箕尾慘淡隂風貯朔威審􅀔有人觀督亢封章無地論王畿荒寒照破龍山月依􅃇中原半落暉朔風千里捲􅀌􅅾斗酒難澆磈磊􅎍清濁滄浪知自取􅂪茸狐服竟誰從燕臺坐老黄金客甲苐爭髙白玉鐘撥土便成千尺􅆬露恩初不􅀒嵓松望西陵漳川北岸望西陵馳道東連講武城將略有餘開戰伐墓碑無謂自題評一棺何在彌天力九錫徒誇盗漢名千古遺墟冷煙底定軍山樹拂雲平牧野道中野人川浴振裳衣况接恩波沐鳯池莫訝出門何刺刺湏知去國自遅遲河橋飲餞無千􅀐文物聲明又一時有淚不揮離别際西風空送鴈行悲奉送平章趙公赴闕庭之召少荅省檄見招之意云龍斾南還沸捷音漢臺凝望幾登臨洗兵未用挽天漢入夢應知有􅀓霖暖日睛消青海雪春風重掃黒山隂君王􅀂問來歸䇿為􅀃虞皇待象心贈郷先生韓義和草服黄冠玉練顔一臺天地市朝間飄飄野鶴雖無繫戀戀鄉情尚未慳幽睡不妨紅日晚青山誰似白雲閒何當一劒飛空去好爲留題過故􅀜送常道人子明道士何心作羽流擇音應避物為􅄷冷風身丗三千界碧落仙居十二樓無地可留雲表舄有懷終結竹林遊因君喚起西逰興滿眼太行黄落秋送劉同知還鎮陽継士觀韻幾人􅁭韻似君矦潘岳間居賦逺遊白雪髙歌南郢重壽山長路太行秋隠居正有千林玉濯足何湏萬里流一曲驪駒頓丘北碧雲零落使人愁為王朝顯贈梁􅀖傑兼簡郝勸農漳南客子王朝顯日暮塗窮仗友生今夏逺投囬沁水傍冬索米入共城千金諾重河柬守一府蓮香白璧卿詩藁不湏詢幾束溪聲山色揔關情和榦臣今晨所見庚金乗火􅀔相髙午夜秋風散欝陶氣錯不調伊摯鼎雨􅁋空續楚臣騷人占樂嵗無遺慮我覺天刑未可逃除治菊荒還寓目青山城郭幾週遭大風六合塵沙一混同群龍無力鄣驚風旱乾到此誰歸咎天道從中見蔽蒙詩枕夢驚茅屋破山林春老縁隂空雄攵便擬昌􅀺訟九虎當閽未昜通雨後草堂即事駭浪崩騰􅀧額餘歸来縮首伴凢魚門從席後軒車少􅁂自蒼来酒琖踈坐掩殘書懷苦節自鋤明月種秋􅂼鄰人共指揚雄宅只有兒童未喚烏挽季子文一丘􅀫草縣城東前日花時杖屨同白璧不埋連邑價青燈空􅀒十年功鵩來近舎傷君去麟出非時見道窮脩短偶然吾適值不湏作賦問天公􅀄從拱把見凌雲天意栽培似厚君大厦如傾樑棟在神交遽尔死生分白駒空谷歸何䖏夜雨它年不忍聞吾道已窮來者替兩行清淚為斯文絳帳絃歌日沸闐去煩從簡屢為言自春卧病無三月一死埋魂入九原桂實未霜驚早落鳥聲解語惜空喧東門最是傷心地老父哀號血灑轅五年六月􅀄八日夜夢遺山先生指授文格覺而賦之以紀其異分明昨夜夢遺山指授文衡􅂂絇間道必細論能出理文徒相剽亦何顔江流不廢驚千古霧管時窺得一班落月滿梁清境􅁴紫桐花露濕吟冠夏日南堂即事一雨清凉恰四朝霧絲縈户見蠨蛸病因戒酒成真止辭免書門絶妄交道拙尚憂児墜簡家貧且喜稼盈郊閒庭緑蘚泥融遍燕子飛来􅀘舊巢同榦臣讀漳濵唱和詩軸草堂舊兩記相㝷細嚼漳濵唱和吟白雪調高雖寡和朱絃聲眇有遺音犀寒蒼渚竒逾出氣奪元胎理更深一洗向來筝笛耳坐聽三峽㵼瑶琴髙山仰止爲千㝷更對佳人與細吟藝絶六鈞俱破的調髙千古得知音静藏晚兎無窮變法北滄溟不自深客去灑然心境寂滿軒秋氣入絲琴謝人惠瓦甒老雨崩崖爲爾􅀜野人携贈入芸齋埏陶有意存三代奠獻曽經備兩階上擁圓吭蹲野鸛中横皤復怒池蛙鈎深免汝居危地時挿秋香慰老懷六月􅀄七日夜二更雷雨大作落日山雲擁蓋幢二更雷起雨飜江六丁怒㵼銀河水千杖齊􅃻羯皷腔耕壠揠苗秋有望炎官収􅏛夜深降一犂聞説西江上早晚龍移似老龐和幹臣韻雲漏踈星不滿天坐來風雨暗西山不憂鯨鬛飜滄海喜送凉飈入白間蜚不成災休紀異署雖才伏暫知還雨傷旱損俱咨怨讀罷君詩壹破顔雨后出門言懷壯年祗死别猶薰老去収藏省一身禄不妄干時有待道從深探理彌真充膓有薺固云苦舉扇無塵可汚人洗我􅎍􅁭閒磈磊門前秋水碧粼粼萬書叢裏自陶薰浩浩堪輿􅀉一身未静蟄坯存夜氣鳥飛魚泳見天眞學從踐履安天丗要經綸有􅀂人林下㓜安應未老且教雙足濯粼粼和幹臣雨晴出郭之什飲散公庭樂亦陶西湖乗興喜同遨河神偃蹇誇秋水山翠空濛上􅁂毛乍脱城居驚眼放縱教詩思與秋髙鴻飛燕集隨時處誰羡傭耕壠上豪秋澗先生大全文集卷苐十四
