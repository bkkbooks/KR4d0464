body:
  text: 七言絶句五年夏四月􅃋日即事朝衣絺綌暮綿裘氣運和天不自由吹損緑隂風不定晚来庭院似􅀷秋贈周幹臣槐府潭潭吏隠周青衫􅀐馬亦風流入門休問生涯事讀罷離騷待菊秋題風雨廽舟圖江雨江煙萬里秋㡬年汗澷事長遊憐君巳落風波裏只􅂲廻舟不自由題王武子觀馬圗玉華吹散滿身雲掣電追風隠駿奔好尚秪誇毛骨異不思戎馬在東門題李伯時所􅀞開元御馬圗閱武驪山是近游霜蹄蹴踏厭長楸料應扈從東封了一片雲煙赤岸秋題山堂㑹琴圖静夜山堂萬􅄜沉抱琴來㵼古人心箇中真趣知誰㑹門外松風是賞音聖賢思治先琴事子賤為􅀖舜阜民莫訝松軒来㑹數要從心􅃌起經綸􅀉潞尹侯伯禄分携不及都門别情話長懐五夜灯蘭省未妨虛儉幕郡人争喜識黄丞太行絶頂潞州城竹馬児童遠見迎聞􅀃下車公事簡不勞衙皷報新聲題李伯時畫支遁觀馬圖晋人大槩尚虗談外物遷移等徇貪千丈神光渠自有􅁍􅀅風駿馬中􅆖金城店麻葉翻風稲映畦道邊垂桞䕃横溪一竿青斾誰家酒金店東頭野彴西金城懷古典午能延邂逅生柘弓銀研未志情較量成済揮戈􅃤天道中還固未平絳陽道中山自南来两翼開汾崗横亘隔金䑓伯宗驅傳無􅁿去聴取輿人論絳災絳州公􅇬即事終朝㩀桉訊纍囚日暗風凄動􅄦幽草暗池荒人不見絳紗灯影看懸流河東池館絳園優才守豪王樂讌游㒷不見斛王祠畔暮山稠挈鷺提鷗次第開碧圍丹障鎻重䑓焦土却似汚宫為世哀樊守文章世已驚冨公遺愛水假借群蛙徹夜鳴皷水西來竇北墉絳園形勝日增雄依稀􅍕盡接臺影猶在瑶翻碧㶑中水聲激激枕邊來卧看偪池碧鑑􅄏三尺短碑樊記在苦無多意發雄猜莽望黄原􅀔玦天驚驂南走削􅀌巔東䑓何限消沉意目送汾流落日邊讀絳陽園池記樊守文章未易窺艱深冝􅀍後人譏一言能盡興衰理愛煞當年李格非周孔文章載道輈定刪元自典謨留不知魁紀操觚意地絶天通孰與儔題斛津王廟壁玉璧威騰􅁍日戈飛摇其尞伯升􅁔須知地下坡陀血氣壓南山翠不磨祝融堆廩表韓公神理雖冥正可通自愧不求來折獄亦䝉隂相誘愚衷過絳州北哺饑坂蓋晉趙宣子飯靈輙處也應有祠屋今廢釣采蕐名丗有人微勞髙擬泰山勲此心報徳誠堪尚事了身名兩不聞血􅁏􅋙牙白晝寒挾輪來脱趙卿艱悠悠鶴蓋隂中子髙揖清風恐厚顔晋國平時有殍夫趙宣為政果何如哺饑坂下重回首一飯酬恩寔豈予題夏當務壁村落人家􅌨比稠平時分水細爲籌朝来一雨郊原足門外長溝滿意流龍祠禱雨中岸烏紗角半摧馬蹄泥滑晚相催郡人莫訝麻衣濕適自龍祠禱雨廽禱雨龍祠訪張緫判不遇因題其壁甲第分携半月餘逺廽相過得湏􅁷松隂滿院溪流碧辜􅀒臨風一捋􅂡登白雲樓百日區區簿領間白雲樓閣幾慿欄秋來致有西山爽兩度還容拄笏看山沉雲髙暑退􅀄簟文如水葛衣䟽邇來郡府無多事卧對西山把性書贈墨卿秦得真壯心零落羽林槍老劑玄圭入退藏爲報鳯池池上客不應神品擅潘張麝團小印栁枝龍不减唐人入􅃮工留得玉堂揮翰日桂香欄檻聽松風聽一作泛秋望客窓十日雨聲中雲影朝來綻碧空不上西摟能幾日滿城黄葉動西風題子猷山隂圗閉門一雪天地白乗興即上山隂船愛煞此君真率意至今人境兩脩然自嘲踏月聞鷄出郡齋逐撾皷放尚來盤盤三晋河山地兵賦民情使汝諧自壽二年岱頂冨竒觀今歳姑山對霧鬟􅀏拂巖華指歸路黄塵深䖏是人間待旦軒假寐而作待旦軒虛曙色分瓦爐㷑煖有餘薰細思曰用無多事一静能消萬有紛題永安刁氏别墅壁一川百頃數家村􅃨嶺重崗擁澗垠樹藝自勤民自儉勸民冠蓋不湏頻南崖刻畫似城闉北􅀔耕桑聚落匀所願廟堂論至理萬方風俗再還醇聚逺亭刁氏别墅壁間題示墨猶新聚逺軒中入幕賔還喜晋人風土舊一村名姓似朱陳英武王馬燧廟西平英氣凜如生千古旌忠勒御名過客賦詩增感激北風原上皷􅎏聲奔䲔吹浪盪蒲津堂上竒兵筭已神老賊垂降還赴召比量先軫乃純臣汾睢懷古三首伸倪三面削蒼崖中擁汾睢寳氣開夾道老槐君莫訝虬枝曾拂漢旗来武皇誇大喜雄奇􅂦出汾隂恐事爲更著壽王相嫵媚守經深見漢儒卑東封泰岱西汾隂始自嬴劉好侈心只爲一非無所格儘令方士出妖􅁋過聞喜縣有懷元鼎故事秦左邑桐郷地窮兵無似漢皇雄六合爲家意未充一喜政能留故事舞干終愧有虞風過太寧宫披雲臺晚野煙荒宫掖坊深半夕陽獨有太寜祠畔土碧花猶自學宫粧安邑道中匡墻㷑火暮微茫樂􅀊人家半米糠漢至孝文才四葉便能三萬里農桑謁司馬温公墓河山兩界夏西分孕秀鍾靈産異人可惜秉鈞􅂊八月不教仁澤浸生民嗚條山逺聳􅀌墳千古嵩髙仰甫申有意誕彌無實用竟將新法遂諛臣游棲嵓寺七絶上盡雲間十二盤一枉松下散􅁭顔老僧近晚堅留客争指西南見華山河山形勝見栖嵓万壑秋聲度碧杉竒絶此遊還有恨杖藜不到冷雲菴翠嵓囬抱欎蒼官絶境軒横杳靄間老矣瑞峯寺僧名應健在護持長伴八龍閒宇文周末年大禁釋教有曇延師者遯隠北山乆之有樵叟日來聽經后師道成復有七人者來師問故曰余八人皆龍也其一已傳師教故余等亦來受戒一徑縈䊸入杳冥望川亭逈夕陽明欲知眼界寛多少放出秦川似掌平層巖重􅀝尚斜陽山下風煙一漫蒼恨煞愛山王老子不來同宿賛公房暮煙遮断嶽蓮青低壓河流一線明巳被山靈嫌俗駕更堪留榜彦倫名安然乗馬到煙蘿一􅀏山間對鳥窠詩旬滿前拈不得風煙還比石樓多得一作出鐘聲出谷尚依依稳送詩人帶􅉂歸自􅀏野猿山鳥性夜深幽夢到嵓扉跋提刑王副使航海圖天險無踰海與江得人一葦即能航懸知恢廓髙宗志夢繞啇嵓夜月蒼䲔翻鼉作大江流舟檝顚危咽棹謳忽展畫圖還自悟當年風雨過封丘遊普救寺晚寺人歸憶㑹真夣雲花氣鎻窓春重簾不隔西廂月一點香來是襪塵讀破口先事跡釋氏功夫向上尋一身歸寂雪山隂片言能脫盈城命少似先公濟物心贈舩蓬姚道人一龕塊坐巳忘身陸海舡蓬别有春却為梨花枝上雪等閒踏破緑苔茵臨晉道中野靈晴消滿道泥茫茫銀海際煙霏日斜信馬中條北愛煞山光照客衣春雪小雪霏微不滿空亂穿庭樹舞春風餘威似掣調元肘不與東皇擅化工曵􅀛圖馭說闌翻已自欺更堪身世兩相遺抱麟痛為東周泣争遣宣尼不及時公堂午吏散一首吏散公庭日轉西蟻旋蜂閧静無時人無定志堂居逺悄悄􅀌懷抵自知清明后一日作里巷春遊鬨鈿車午窓睡起日西斜閒書讀罷焚香坐淡對一枝山杏花卧數牎櫺對日曛一簾晴影弄游塵鄰墻幾片桃花雨􅀧破苔堦更可人懊惱春悰困宿酲偶隨游子到溪亭多情幾行城南栁三度春風見汝青跋李提􅀧和甫筠溪亭和甫開封人早年應神童碧鮮庭户玉琤琮影透踈簾翠幾重中有道人髙節在青青􅀄不易秋冬洗耳無煩近頴川虚心獨愛此君賢何時拄杖􅃻門去讀罷離騷聽夜泉題鄠縣簿雷損之景程齋詩卷道統幾微孰継傳景程還得此君賢湏知二帝三王事要似仁民愛物先理窟名言嫓典墳發源伊洛見經綸千年鄠杜遺風在更着雷卿継後塵題田使者王泉垂釣圖渭畋應未兆非熊底是胷蟠萬丈虹辦與澄湖三百頃一絲斜裊緑楊風挽平陽教授崔君度心醉群經四十年老成身後見波瀾蒼􅋽一片姑山月空照先生首蓿盤孟浩然灞橋圖金鑾消息逺相招雪滿吟鞍過灞橋處士本無經世志強將詩句枉清朝髙鳯漂麦圖疾雷破柱雨翻盆甑墮何煩顧惜頻傥為把書都不省先生應是太癡人跋蘇武持節圗使蕐徃返見交兵老我何甞繫重輕巳分横身膏草野茂陵松柏夢秋声君臣義合以忠持十九年間節可知邂逅論詩幾侮玩區區才得典諸夷兩行衰淚血霑􅁭一節醻恩北海深衛律有知慚即死更來游􅀃此何心慶趙汲古八秩之壽効樂天體人生八十今極壽况復兒孫滿眼前汲古園中趙夫子燕京城裏地行仙摩挲金狄門前客精健􅂄英㑹裏人坐對天津橋畔月池塘春草幾回新崇慶􅀄年萦組綬至元八載享康寧人間八秩風流事無似君家種徳馨至元辛未􅀊八月十二日拉馬都事才卿遊韓氏南荘歸効樂天軆得詩十絶皆書目前所見􅁴信手拈來也開門不問主人無幽鳥飛來應竹呼僮僕也知賓客敬與奴白飯馬青蒭吟鞭踏破緑苔堦自掛幽軒數菊栽半日杖藜横膝坐絶勝前日醉歌來浮雲冠蓋六街塵老盡朱顔白髪新嬴得身心兩閒在水邊林下果何人滿庭竹影鎻秋煙倒盡池蓮細菊斑墻外緑畦澆巳影桔橰閒淡忘機山鳥山花􅀏我癡萬事看來皆偶間休遣丗人知臺凉吹晚留連樹繞崗囬自一川野菽未霜溪栁煙光輝是早秋天園松菊餘秋色趙氏林亭滿夕霏人自晚年便静毎來吟賞便忘歸雲煙樹事幽尋􅃌􅀧平蕪起醉吟但使眼前無俗一杯時與野人斟墨淋漓字半斜枉將霜壁亂雲遮一杯先洗黄泥佀我閑情逺丗譁蛙鳴水底強爲聲酒盡沙頭卧玉瓶我自近來無不是白雲舒卷暮山青裴晋公緑野探梅圖息軒茟淮西平一兩河清緑野梅花照眼明霜鬢未容閒裏老南枝消息要和羮當年韓白兩辞人吟賞天教在相門邂逅有詩窮勝事㝡怜踈影月黄昏東臯八詠為趙參謀題匏􅀲亭君家匏􅀲盡罇􅃔金王雖良適用齊為報主人多釀酒葫蘆從此大家題李齋人生知足一瓢多未老得間非幸何堪􅀏矯情揚子㓜嗚嗚空縱醉時歌東臯村陽春門外望東臯三載相邀醉濁醪早晚洄溪溪上路桃花紅雨滿漁舠耘軒草盛苗稀苦見侵荷鋤歸晚月生林湏知種豆南山意雄有渊明識此心遐􅀚臺自􅀃無堪不出村一杯藜藿樂閒身就中不􅀒登臨興滿眼青山是故人清斯池塵冠挂後無纓濯漁父從歌濁與清待與田家占水旱年年池上耵蛙聲流憇園養素丘園趣已成斜陽林影看春耕手中三尺枯藤杖不羡人間六印榮歸雲臺從龍致雨固油然巖壑歸飛意本閒况是東臯巳霑足不妨來伴宿簷間夣中又賦開元御馬圖毛龍天降馭龍韜歴塊過都乃爾曹安得錦韉三萬􅀐冷浮秋水下江臯予寓舎前有所謂水官珠者客曰此即意苡也因呼兒採實作詩以識之堂前薏苡因人悟不處嫌疑信至言豈獨菲妻成貝錦令人還憶伏波􅁈讀開元雜事水殿涼多暑氣微薰風華蕚正相輝争教明月梨花院玉􅅇聲長到枕幃興慶宫池景氣深薰然四海友于心譲皇篤愛情尤切力爲君王辯八音海棠紅綴棣華零樂裏西凉巳變聲㧾把大衾長枕夢老天移魄入華清歸志來圖長沙勲業武侯忠劉宋規摹操懿雄虐熖儘烘寰宇裂五株楊栁自春風彭澤遺􅀺不幸何斜川魚鳥共婆娑先生踐迹髙千古不似終南捷徑多觧紱歸來百日強東籬松菊未全荒細觀歴贊髙賢傳一岀頭來恨已長煑茶枯腸拍塞貯春雲洗盡􅅝煩六府昏山木䇿勲存夜氣大河流潤下崑崙胷中宿酒閧殘兵一椀澆來陣敵平濛頂淂仙疑􅄭語月波千丈與詩清瀟瀟風雪薄虚窓細貯搶旗煑夜缸􅀂論廓清真武事一天幽思爲詩降四皓圖羽翼横飛四皓鴻楚歌悲絶趙王宫髙皇英睿啇顔節俱墮留侯計畫中萬古規摹一漢皇保全母后捨僝王啇山邂逅招園綺出自留侯畏吕強題楊息軒盤谷圖石峪盤盤百畒蒿野㷑秋色淡林臯雄文一出潮陽筆頓覺山人索價髙関山秋霽圖望京樓上晚凭欄長記居庸八月還一段紫㷑吟不盡枉分秋色與南山生平懷霽是􅀄心捲盡江山萬里隂十載夕佳亭上客卷中還對玉千岑􅇞戚叩角圖舜授堯傳老不逢啇歌愁絶國門東小哉恨煞夷吾器竟列齊桓五覇中五王避暑圖翠幄留香郁棣華紅雲縈暖鶺鴒沙豆萁不免陳思嘆朱李寒泉是浪誇蓮鳥窺魚圖觜距􅀄非搏擊流翠香深處樂清幽游魚何限相吞噬秪得臨風一瞪休門帖子廪食京華兩見春全家飽煖荷深恩自慚􅀘報應無地夣到青蒲白獸尊題􅀽安卧雪圖曲突無煙雪擁􅀜引書髙卧自怡顔湏知四世三公業不在人情冷煖間突不煙黔雪擁扉一編犠易療朝飢火城莫漢沙堤相論士當觀未遇時窮巷無人與叩􅀜長安風雪一家寒挺然不為飢驅去肯逐時人作􅀬官題顯宗承華殿墨戯大青小青兩龍種承華墨戯真天人春思欲見昇平事立仗歸來不動塵題東海徐白魚􅀧額雷燒不到渠相忘何必在江湖細吹藻荇􅂶饑了两頷腥涎儘自濡酹祭宋先生子缶六首山立楊休七十春閒中今古醉中真傷心麗澤堂前月空照先生漉酒巾一代波瀾獨老成百年人物見耆英茂陵身後多遺藁一賦梅花到廣平我識空澄海印心生平游戯在禪林寳珠儘照青藜杖雅韻先空緑綺琴玉堂仙去渺翩翩冷落梅花樹下禪疇昔過庭言在耳炷香傾酒大蘇前水暎林亭竹映山四時風景樂天閒一從零落丘山夣頓覺風光向客慳酒榼詩筒白玉珂春風到處是行窩百年愛仰都人士哀比羊曇淚更多䟦龍陽枌􅀮圖學窮象數别穿深又向龍陽得洗心前日小山叢桂客不煩春草賦歸吟承華殿墨戯圖天廐雲屯八尺龍緫輸神駿付青宫細看絶電流雲筆天寳諸王恐未工主人愛馬憐神駿一骨千金十襲藏􅁍恐雷霆還下取九重天上看龍􅋮感寓逢人驚問但慚然自信文渊老益堅來坐癡牀一千日恰如無事草鞋禈至元七年十月廿二日過順州與梁御史話金節侯剛忠王公子明死節事馬上為賦此詩以吊州舊治唐歸順州見大暦五年試太子洗馬鄭宣力所撰開元寺碑雉堞蜿蜒隠塊城剛忠於此殁天兵千年英氣如生在草木風前動戰聲題趙仲器銅芝蟾瓶滴坡陀金背兩眉蘇不属官池與研居老筆䇿勲餘潤在一生何啻五車書足跡蹒跚几研間太隂何苦汝為餐寸腸不磔盧仝鐡更吐隂寒上筆端題張夣卿􅀟清圗月影氷魂奪化工捋湏真是不煩公漫山正有閒桃李爛熳春風幾日紅花􅊍品格黃華筆一段風流付後人誰為九衢塵坌底兩枝揺蕩浙江春淡粧踈影兩依依􅀧綴横斜􅀞揔冝恰似􅀌山籬落畔小溪如練月如眉王右丞􅡞川圖騷詠禪談意未央欹湖㷑月墮微茫園林鍾皷清時樂好箇裴公緑野堂狀物何如及物功開元真宰􅀃姚崇未妨僦屋招提裏斗米三錢四海同凝碧池邊野鹿過空垂􅀟泣賦悲歌論忠不到平原列馳譽丹青未足多文彩風流映一時丹青三昧有餘師戯將萬斛欹湖水冩盡南山五字詩迁張氏新居四首我自三遷到巽隅市朝雖近似郊居東鄰有竇西鄰許不羡門多長者車院静窓虚淑景間戎葵凝􅀏海榴丹莫令兒軰輕傷折爲與渠儂理一般聽雪思堂與筆耕主人寓意強爲名錙銖得及斯民了日出何妨事又生羞將勲業鏡中看不爲無魚動劎彈两鬢捴隨霜簡白寸心虚傍日華丹題秋江月夜摘阮圖玄璧朱絃激烈聞縱横詞舌得儀秦忘言何似陶元亮直作羲皇向上人易水悲風動急彈小絃鏗爾摘銅丸多應一片松梢月併入茅亭作夜寒闕下元日口號五首筍班春仗簇初齊贄馬行牽望拜時臘雪未消􅀟鳯瓦春風先到萬年枝平明瑞雪滿蓬萊島樹瓊花次地開人在建章馳道外四邊鞍馬唱歌來建章宫樹玉嶙峋雲近蓬萊氣自春帳殿忽開齊舞蹈紫衣獨見海東人春前移仗島東邊大禮稱觴最重年何幸小臣陪虎拜一杯春露共瞻天干官錫宴瞻天喜萬里休兵立仗閒擬効堯封三獻祝太平天子壽南山魏豹故城兵渉西河豹岀迎亾􅁎還作漢儀程事機􅀝伏真相戯一􅀏長驅過故城題解梁􅅟壁立壠依俙井幹殘人家煙火甫兵還就中不􅀒官曹眼簿領當前坐看山再過絳陽二年三度過金臺盛暑祁寒不憚懐卧聽水聲何所憶一軒秋兩竹間來夜宿李氏林館困眠欹枕未容休睡起関心事㝡幽鶗鴂一声窓色􅍼月明滿地緑隂稠禹廟大地河山繡錯明野㷑􅀌廟枕荒城杜䳌饒舌知何事血洒東風怨未平路村道中􅐭澤條山動寵光天書來坼紫泥香老癃扶杖欣相告五十年來未省甞解州㕔壁題示至元癸酉夏五月二十三日奉宣明詔至於解梁因得王黄州壁間所題觧池詩序云盬池之大自唐以來凡臨􅊩者無一辭以紀勝槩觀覽之際憤然成章或継之者寔自予始僕􅀼有所感焉因勉成三詩以附􅂹尾之末庻幾因公而使天下知有惲云偕來者府兵曹解槙子公孺侍行承直郎平陽緫判汲郡王惲題物色分留付後人暗將風雅欲誰親琨珠在側知形穢尚友何妨継後塵日融池面爛生紅更着南山障碧空一夜髙臺汗如洗州人􅀃是廣南風解梁城下解塩池萬寳騰光奪日輝我欲大觀窮化窟乳泉一賦了天機題平正縣鋪樓壁盤盤峻嶺上青山兩度南來􅀧鋪翻义手老兵前致語此回霜鬢又加繁秋澗先生大全文集卷苐二十五
