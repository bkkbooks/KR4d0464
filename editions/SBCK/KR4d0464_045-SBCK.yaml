body:
  text: 說遷固紀傳不同說余讀宋儒論項羽紀傳不同說以謂遷之意秦有天下五載而後楚楚五載而後漢方秦巳亡漢未立天下莫有攸屬不可一日無君况封建王矦政由羽出舎羽孰主㢤作紀所以繫天下五載之權也立之傳班固意不過羽不可以抗漢因断之曰皆非也正以二史之體不得不然爾在遷不得不紀在固不得不傳設使固取遷而紀是天有二日民有二王也其書將載之漢代之首乎次於髙紀之下乎其爲􅁛號曰楚史乎曰漢史乎若以封建繇項氏出五年而後漢天下不可無君乃属之羽曽不察首入凾谷者髙祖之義師也授降軹道者秦民之真主也天命人心之属漢明巳兆於秦十月五星聚東井之時也胡不考虞芮之質厥成西伯受命之基也當陽之不馳去昭烈淂綂之年也若籍者正炎漢之一驅除耳矧才封已叛旋取復失安得爲一日継統之主㢤若又曰固之意羽不可以抗漢故傳而遷漢太史也獨可紀羽而肩漢乎余故曰子長之􅀁以紀筆削厯代之史也其意蓋以歴年相承不可中闕猶存夫以月繫時之法也孟堅之􅀁以傳先漢一代之史也余故曰二體有不得不然者矣若宋儒之論恐求之太過耳讀史余讀留侯傳云沛公入􅀜見秦宫室之盛帷帳狗馬之冨重寳婦女之羙欲留㞐之樊噲進諌子房固知其不聽此正教之使先耳盖良以沛公有為而多慾者也至此天理昧而人慾肆矣非驟能一言回也若已諌不入則莫之􅁇也故先之以樊卿使抑遏横流少殺其方張之􅀔継以苦口逆耳之言警懼啓沃使黙識其神噐􅀁在何眷眷於此耳髙帝能無從乎此乃晉隨㑹諌靈公三進及霤然後以趙宣子継之之義也不然噲沛之屠狗者也安知夫漢之為漢張本於此亟當力諌以成髙帝之業哉對張中丞說或者以張廵守睢陽之事為非曰古之人行一不義殺一不辜雖淂天下不為况食邑人以為守乎余以謂不然昔李翰表公握節死事與夫造唐之功嬰城之志亦云詳矣然尚有􅀁未厭者翰特以功利為言未極夫臣子當然之理行而冝之之義也昔伊川有以武侯􅀁䘮弘多亦以不義不辜為疑者先生曰若殺不辜以利一已則不可奉天之命討天下之賊殺戮雖多理固無害且陳恒弑君孔子請討夫子豈得討恒時保不殺一人耶蓋誅弑逆之賊有不得顧焉者余亦曰此中丞之素心也公以一郡守之力横制百万日滋之㓂公豈不審夫彊弱存亡之􅀔哉正以與城存亡効死不去當然之理也若無廵則無睢陽無睢陽則無江淮無江淮則唐之為唐未可知也由是而􅀚公之心利一巳耶為天下耶夫武侯控全蜀之力燃未􅁅之燼陳恒以穿窬之盗􅀼一隅之齊耳彼禄賊者豨突之頃九縣飈馳三精霧塞万姓以之􅂗炭大駕為之蒙塵其弃城圗存望風崩赴者又何啻卄四郡哉俾唐祚中微禍乱接踵卒至於亡安史階之而巳是迺周公􅀁必膺武侯不两立者也論者不處公以大􅁩秪擿以捄不至而食盡食盡而及人爲非不知李司徒郭中令河朔之舉安陽之役屡戰屡北紛紛藉藉草野􅀍血者幾千万人能必其事事合􅁩人人得罪於唐室者乎若又曰上以政荒失􅀦乃殘民以復民何罪焉是則李郭亦不義之舉耳傳不云乎臣民之於君猶子弟之於父兄也君父有難臣子奔救餘有不睱顧者若大義既正安得徇夫區區之小節哉不然則石碏不得為臣之純而王􅁜乃賊㤙之大者也讀張籍書予讀籍遺文公書大率稱公材識明睿當任著書之事又曰不以此時著書待五六十後而有所爲或有不可及曷可追乎然公之志豈忘夫着述哉原道不曰斯道也堯舜禹湯傳之文武周公周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與楊擇焉而不精語焉而不詳又曰小醇而大疪意二子者雖云升堂終未窺其窔奥也豈公之心繼孟而下任夫道綂者邪何藉之識必待公屢書而後悟哉而伊川亦云公之見道固因文而發耳嗚呼公五十七而殁若假以數年其見於後丗者爲如何哉夫五百􅀊而後命世者出造物者固云靳矣而奪之遽何邪予不得而知也彼籍之慼慼而恐公不及者竟如所言非有見於公也特以陽一隂二之理而言耳道之難明也如此噫犬相乳說轉運楊公家有犬生子而斃求哺無所􅀗鳴咿咿殊可憐有斃犬之母性甚獰既老乳乆絶走而顧睞彷徨躑躅即其棲附而乳之旣乳而乳眞有遂盡活所棄子噫犬之畜也非有慈祥不忍之性特感於所畜者如此然老而復乳此亦異之大者楊公北燕人世為鉅族盛年以勇毅從事兵間其活人捄物釋難解紛功亦多矣雖􅀭歴州郡爲顕䆠其友爱之情日篤一日事姊如事親敬兄如敬長以致弟念天􅂋兄鞠子哀一門之内兄兄弟弟怡然而理順曖然而氣和若棣華之相承手足之互爲用耳何其偉哉傳曰國之本在家家之本在身盖一家之隆替繫一身所行如何爾其善惡感召殆影響之應形聲也昔北平王道行於家有猫相乳之兆董召南孝且慈有雉哺其犬之祥今楊氏大感於所畜極不忍弃其後之意者表公樂於爲善之心油然生乎其中也其乳絶復生意者見公福禄將老而未艾也巳棄之物遂􅀗生全意者勉公故舊之㤙所當復也丗之人以犬之悲嘷爲不祥非犬也殃自人召也是犬也持性於不忍爲姑乳之亦非犬致然也福開有先也夫冨貴福禄人之所大欲也故韓子有云得之之難未若待之之難也得之於功或失之於行得之於身或失之於子孫今吉祥止於楊氏者如此其厚而隂有所積也必矣冝乎有犬相乳之報云嗚呼楊氏其善持之旣談其事懇予以叙故書磔犬者説王子逰於市見群犬逐一叟號呶而不去詢其故曰屠犬者也於是乎有感夫人之爲不善禍從而磯之亦何以異於是歟且犬之吠逐非有見於物也特爲氣所感而巳至若雷霆之威人有叛父母䙝神明者或下擊而斃之豈造物者區區環域中特索夫若人而敝之邪故先儒有言迅霆者天地之怒氣無良之人其凶戾與天地之氣自相感激遂震以死此略無疑者彼犬之見逐雖小大不殊理固然也從是而􅀚人之方寸胡可萌一毫不善之念哉微則至於物怒而見搏大則至於天威下罰故横浦云一念善則祥風和氣在於是一念􅁖則妖星癘􅀑亦在于是可不敬畏之哉是知天氣下感於人人氣上通於天者犬昭昭矣因筆此有以明夫感應正理不眩惑於􅀑神怪誕之説云鈍説夫噐之爲制小大輕重適厥用而已然以銛鋭拙鈍用之多寡故有敗之夀夭之異焉趙君仲器􅀶物多藝能喜筮而絶市道􅀚化而樂誘人古所謂不居朝廷而􅀮毉卜之中者之流也一日愕然以所感告予曰適過梓人氏頋礱削之噐縱横前陳例乏完好因詰之曰操幾何而致然爾豈材􅀒劣弱鍜礪弗精而然邪匠者曰不然彼斧斤刀鋸之属銛乎其銳者也特以朝夕從事乎削斵礱刮或半􅀊一易或旬月一易逺者不逾朞年比更新而無孑遺矣因指其輳輪之錘曰是置於吾祖用於吾父今傳於予惟其碇然樸鈍用寡而無所損益故能夀於彼而若是其乆也僕因曰豈獨物乎人則亦然進鋭者退必速任重者道能逺是輕鋭者不若堅鈍之爲愈也夫木訥之仁樸魯之忠外視之若癡絶而緩於事及其臨大莭䖏大政守固宻而罔䟽挺剛健而不奪亦何異兹錘之輳圜輪納疊拱刜蟠根􅀮錯節支離者周比而無間倔􅆠者妥怙而端平由是而􅀚可謂宣力􅊼多収功攸厚者哉彼丗之人秪知利之爲利曽不悟鈍之爲利廣且愽而夀且乆矣予聞其説而韙之吾將蔵吾噐飬吾鈍歛吾圭角息吾氣機引重致逺俟時而動以利天下可乎趙君曰嘻子其得用而不括出而有􅀗語成噐而動者之道也於是乎書至元壬申二月九日題服色考陳節齋祐以宣聖像設既素而繪仍以服色為言曰冠服之制所從來尚矣然自三代之丗變易去取其義有不同者某雖不敏試請而詳之夫冕平而旒笄衡而紘上衣而下裳垂紳而履舄繫而帶珮而綬此三代王者不易之制也今宣聖其紘其芾其純其舄皆丹乎質唯服之色尚玄何也考漢晉志書天子以袀玄皂繒爲大祀之􅂁服於孔子服色非可㨿而明也謹按大戴禮云有虞氏皇而􅀕深衣而飬老逮乎夏后氏王以水德色尚黒易而􆇄端玄裳故収而􅀕燕衣而飬老又諸侯以天子燕衣為視朝之正服有殷氏以金符德色尚白易而練衣縞裳故哻而􅀕縞衣而飬老及周有天下以烏火王色尚赤宜乎以赤為飬廼曰冕而􅀕玄衣而飬老何居鄭玄云周則兼二代而用之也若夫四代之禮飬囯老於膠序盖天子師而學之也唐孝明皇帝尊師重道爵孔子以王列弟子爲素臣至於冕服之制亞次之秩廟宫之法饗献之禮講明論議亦云極矣今之制寔開元儀也其義正襲鄭氏之説耳故冕服尚玄用夏禮也朱芾斯皇示周制也錦紳素質兼祖法也彼領􅃑縁飾又復純赤何也詩素衣朱襮者是也襮為領諸矦之服也據爾雅黼領爲襮黼繡為領丹朱則其縁也又范曄云天子祀天地宗廟釋奠先聖皆服袀玄縁領以絳漢明帝以紗爲中單或者疑此乃中衣表而出之非縁也予以褻紅紫為非後之賢者加諸乎夏后氏云其色赤則示赤心奉神明而已兹㮣􅀕服而言也在吾夫子則不然特又明夫周所尚之之義也盖孔子帝者之師禮王者之後以天子燕衣爲之御周大夫士私朝朝玄端夕深衣孔子以時則周人也以臣則魯司㓂也以後則啇之孫子也其道則堯舜禹湯文武周公其法則禮樂刑政而後王報功報德有罔極焉者曰公曰矦曰師曰玉曰帝可也宜乎用三代服色而兼備於一躬也尢昭昭矣又有曰方而心者當乎膺曲而領者施於朱襮之上何也此盖漢猶有􅀍之者故朱勃衣方領能矩歩乃學者之服也其象則圎上而方下蓋取諸乹坤迨晉隋唐以来天子有事乎郊祀􅃣通天􅃣束白假帶方心曲領猶存乎前代之制耳其十哲服色大同而章有降殺之異下至七十二子佩服皆青士子父母具純衣以青體少陽而致敬也其帶則縞有受道之質也夫諸子乃以士從父師而學者也詩不云乎青青子衿殆學者之常服云鸞刀説余徃􅀊客汴梁陳君逹夫出示玉刀長二尺許鋒首斜削廣餘五寸玉水蒼色極光潤扣之聲清越以長其拊容握末有環背通刻柷敔状端有竅圜徹陳曰乱後入太常官舎得之不審何物於何所用予曰此省牲之鵉刀也其端之圜竅盖用繋鵉未所施環即着和耳傳曰鋒有鵉環有和是也禮云割刀之用鵉刀之貴貴其義也端有鈐取其奏刀中莭聲和而後断環有和取其断非和則劌和非断則牽天以秋粛物和之以兊聖人以義制物而和之以仁鵉刀以和濟割此其義也詩云執其鵉刀以啓其毛又曰鵉刀以刲何休亦曰鵉刀宗廟割切之刀然孔氏有古刀今刀之異古刀遲緩難用宗廟用古刀者修古故也由是而觀今刀古刀其實皆以金為之此玉也其何能割切哉豈漢唐而下三代之禮實亡名存者非一刻玉爲刀郊祀之際執以示古儀乎至於去質從華亦由近代用金玉爲匜爵代越席以臯比也恐未盡惟彦伯太􅀶詳覧涿州移置攷至元八年秋九月予以省覲来涿因拜謁孔子清廟遂讀唐貞元中使待莭都督幽州諸軍事彭城劉公建孔廟碑乃知州治本幽州盧龍軍属邑范陽縣也至代宗大暦􅀄詔始分范陽歸義固安三縣爲涿州治范陽涿郡即涿郡故地爲名按輿地廣記漢􅀄髙祖始立涿郡魏文帝改范陽郡其地左碣石右督亢南控鄚城百里而遥北連幽薊百里而近唐巳耒中間控制蕃戎部落甚衆又河流縈帶前後有林麓陂池之利周廣磅礴欝爲雄藩及辨讀遼綂和卄八年州刺史廣陵髙公移廟碑隂記云舊廟本在南城東北隅是年刺史髙公移置南城東南隅康莊之左因復悟今州城南北若連環然意者置州時展築南城而廣大之今市中隔門本故縣城南門也􅀚此前後證據甚明無可疑者噫予徃來幽涿間盖十年于兹甞以隔門之制為惑詢訪土俗莫詳其故且方物之辨一事弗知君子耻諸不圖聞一得二使數年之疑一旦渙然冰釋亦可喜也特表而出之敢貽涿之好事君子以俟更孜云締觀説吾郷黄冠師房公軆鴻厖皃古而心通讀儒書喜營治甞作吴殿於棣華菴故址締構日予與亡友季武子文徃觀見工人數十附立楹顛方納栱駕梁為事其枘鑿縫縮有略不相認者衆工争左右晲材分繩墨曰不少繆即縆驅鎚按呼號半空彊以力相下良乆終無柰木何一工者舉手招衆曰聽無譁衆瞪目東北嚮率弭耳受嗾予二人從􅀁向顧之見一老道士傴僂擁敗絮曝日坐短垣下俛其首捫虱略不一仰睐苐抗聲騰言以手畫空而已云東西行若干寸南北起若干尺此蹇傲者彼之􅀁枝撑也彼拗捩者此之所走側也上工即如教歘衆材軋然作聲若相㝷而契果安貼停穩不踰若􅀁料予問道士於房曰此始謀􅀞宫扵堵断手載名其上者也予因有感於中廼知天下之事有大有小人之材有能有不能俾細大不􅂢區處適當此宰相之聀也君人者何􅁨乎不治苟明大者反知其小任小者反􅀒其大是上下錯繆冠屨倒置欲求功成理定難矣哉持衡者曽梓人軆要者之不若也師啞然曰筆之可也於是乎作締􅀚說屏雜說嗚呼雜之爲學其害道也甚矣麴蘖雜醴齊爲弗醇享飪􅄂鼎羙爲之変味宮啇雜音奏爲之惉滯君子之所不取而不由也况學乎學而雜心則交錯而弍其行言則叢脞而昧于理動則拂乱而失其冝至于文章翰墨一糅于雜偏駁不振尚何理之能著家之可名乎謂爲道尤判然離而曠且逺矣故傳曰攻乎異端斯害也已然􅀶我以文多學而識之又曰君子耻一事之不知能無雜乎盖聖賢爲學必務其大者而使小者從焉其所以務之爲者明理致知収放心格庶物而已四者旣主存于中雖諸子之說百家之言日至于前猶衆川之流朝宗而東常我之主孰能雄而長之撓而濁之者哉况約之以禮詳之以說爲之澄滓于其後者非一如是則何患乎問之該洽學之愽雜者哉戊子夏六月庚伏有七日發蔵曝書得雜文百餘帙睨而視之皆予穉􅀊所閱習多曲學小道廢日力不少不􅁴喟然曰两漢而下學無師傳安宅曠而弗居正岐舎而弗由者其我之謂乎使吾老而困困而無所成者職此之由務于􅀄而害其大之爲也於是命兒子輩屏而絶之板爲三夾束置髙閣且誓之曰今而后非有命不得發而妄閲以蠱惑其心目大抵中人以下之性所偏者多同而特逹者或鮮吾今是舉正以巳之所偏且正汝之或失也是吾不忍以悞我于前者而又悞汝䓁于其后也天其或者果汝之賢而有全經全史在焉泝流探源採剥其華實咀嚼其膏味少有所得以之修身齊家推而及于物將見終身有用而不克盡者尚何以他爲哉小子其服之無斁作屏雜說荅客問至元廿一年春正月予有中省郎曹之命既而以事不果行或傳予抵燕視其有不可而歸者嗚呼誠身之未篤不爲所信也如此作荅問以自見其辭曰客有過秋澗而問者曰子不旬時而􅀍旌招者三將謂􅃐裝有期反柅其輪而脱其鞿者何也方今王者無外四海一家渇於得賢以光國華有片善者無不録效寸長者靡不嘉故有立談而致卿相略而不及其佗士或韋布進無資涯名不登扵仕版何得挂銓曹之齒牙子今幸蒙見招未爲不遇官列郎曹名都省署切近論思周旋宰輔設或有為澤及黔庶曽若無聞又復何顧豈子志願未充班資尚卑重有所覬其行遲遲予仰而歎俛而思人各有冝孰不自知越分而行有乖無隨予方以再命而傴僂尚敢以銳進而爲期也客曰豈子欲信猶屈道行未隆甘於泥蟠以固其窮然聞聖哲席有不腝援溺捄焚予曰丗之康濟固自我化道之隆汚盖有不為命者然墨突不黔其炊烟孔轍幾環於天下雖遑遑於救丗亦觀時而取捨予且何人敢妄為之駕也客復曰子豈年近耳順歳月向邁心智雖強膂力弗逮曰若不肖齒髪雖微未為衰暮顧甞􅄃轡外臺峨冠憲府從事有年艾服頗素其責固重即其心則安道可行雖一日不去故黽勉盡瘁不遑寕處通其考則為四百其月則去五予亦知力之有所不及盖甞以明時可惜憤功業之不顯著也客曰伊懷既然子何見其一而二之不覩投㑹是機進退餘􅁉忖其不可即以佗務尚不失邯鄲之故歩不猶愈於刻舟求劒守株而待其兎耶乃若而然客轉談之悞也今有司以是召我其行或否理之所當喻也若顧量可否以改圗爲舉是先以不誠自將上欺君父以幸為利取便巳故是又義之不敢與也客曰然則子之志嚮果云何而可哉傳不云乎士有二道出處為大進退無常惟義所在又曰可乆可速其行其止盖平日所素學不容以彼而易此今吾子堅欲推挽抶之使前是茫洋徑渉􅃐入於無涯之淵設若有為徒勞勉旃至扵出處之道論之誠君子之不然此吾之所以不果執宣父之鞭也故為可為於可為之時則從而寕為不可為於不可為之時其咎即徴杲其可之與㑹客何勞於􅂆懲吾年雖耄目顧矍鑠尚或堪於一行客唯而退於是筆之以自銘謗解予作謗解夢人以壞木寓蠧見示意者謗由我興非外至也然謗之惑人深矣公孰與制􅀻無以勝其􅀃至肆行而不少憚以隂擠而爲陽􅂇􅀍之者鮮克自處欲弭之而無術也嗚呼丗教下衰友道日壊􅀻好惡者爱之者欲其生憎之者即其斃口溢金蘭心包􅀑蜮謹其藏已射其形亟爲防巳螫其毒矣輕則噂沓背憎浸潤膚受妄生事端横造異議忘我大徳利彼小􅀻傾良惠姦傷公害義認爲憸人坐擅形􅀔苟淺之爲量者不自返而縮徒恚夫此胡爲而致焉思其稍逹藉􅀔投􅂌使恩讎两明以泄其忿懥恐非君子以直而報之義也夫聖人所以列朋友扵天倫者示其當重而親匪大故則不容棄也又讀小雅何人斯篇彼􅁀之譛蘇公也至􅀗戾失職亦云極矣略不見聲色於辭氣何三代教化和平忠厚成士徳也如是至好歌忠告反以不忍遽絶爲言其亦審夫天倫爲重枉爲小人之爲也静言思之大有􅆻予心者予雖愚而懦受人侮者不少然天之所􅂌於我者佀不薄矣矧諺曰禦寒必湏重䘮弭謗莫若自修大率常情之所未免者其疚有十處巳之不恭也御物之不誠也嫌與疑不擇也毀與譽肆行也或以巳長格物或以剽義沽名或出戯言犯衆或恃口給陵人責人太重而以驕吝自矜審先去此十病無瑕可摘謗奚自而生㢤而復守之以敬慎將之以忠厚以蘇公之心爲恕以中庸之教自處其或有作於上力易斯􅁦上以格憸人之非心下以殄䜛口之罔極建中子民歸之以厚俾欲校欲報者亦不得賊其􅂨而發之如此我之所謂疢者而或有瘳彼之所謂謗者亦庶幾其少熄矣作謗解對魯公問後云思保􅀊寒之莭徇囯家之難尔顔魯公唐一代鉅臣論者當明其心求其迹則非也公始終王室死而後巳盖素所藴也不幸值唐中衰以􅀌忠大節立于傾朝死覬一言有􅀘於國至扵老不退休大率朋友之交遭罹患難尚有相死不輕去之義况君臣乎及盧􅂎當國見其嫉賢乱政公復以正言折之既憎公直重忤杞意至遜辝為謝終不少觧巳而有宣慰之命每讀至此未甞不掩卷而興嘅也于時公豈不知一入賊庭撗噬虎口意者比之使􅂎姦計媒孽其罪㗸􅁈入地靄而不可明是不若履忠蹈義明死於使華之命尚或摧沮逆謀以激忠義之士而愧夫天下後世乱臣賊子之心是乃不以李鄭􅂆而不行為得而以死扵義命為安也要令千百世後義烈言言如嚴霜畏日有不可尚巳者此公之心也甞以忠義者囯家之元氣世當頋護靳惜使信其巳徃不泯之志勵夫将耒至簿之俗而為天下之大閑如公者誠不可例與具臣者論其進退之跡也若專以老不致事為嫌是又失見危授命之義也况唐人之扵致政􅀄無定躰至元戊子秋八月廿日晨起偶記徃年對翰長之問特為筆此且發􅀁潜之幽光云儉訓人之生扵天壤間分􅀁當得者隂有曰料涪翁謂一飯先書籍者是也未老前固不應空乏凍餒而死如其􅁀殄過度以旬時之用為一朝之費促之而不給者信有之矣故諺云兹焉不足徃則太過此言雖微可為永喻昔李文饒相而後當飫羊十萬數未充而􅀍斥盖已用者過侈故也此非明驗可不鍳哉今余一家二百指日所費以酌中計之且約五貫文是湏千八百餘緡可支一􅀊其於慶吊賔客差徭之數又不在内顧余生事四民之業一無所營而終􅀊所耗如此造物者斡旋供億亦巳勞矣吾何徳以堪之復􅁒終日望望然致室之完羙此心断不可萌至量其所入度其所出如且休接􅊴之說此念不可䟽也予今年六十有二向之所謂心焉而志學焉而力者日趍扵衰微安坐待哺外餘無能爲秪有以勤儉律彼使猥承家事而巳􅀓曰家當克儉焉􅀖當克厪焉又曰生則在勤勤則不匱儉爲徳恭侈􅁖之大也此雖聖賢垂教格言不可斯湏離逖然孰不念而知之但齒年未至不經其事之囏難者鮮不忽而畧之是自逺其恭德昧夫寕固之理可乎逮其已困歎彼之豊傷巳之窘方思莭約以􅀘其不足不亦晚乎汝等其勗哉毋替作儉說􅔪山先生口誨遺山先生向與頥齋張公諱徳輝字耀郷終河東宣撫使自汴北歸時史相請為皆吉秃滿作碑過衛先君命録近作一卷三十餘首為贄拜二公於賔舘同志雷膺在焉先生略扣所學喜見顔間酒數行令張燈西夾曰吾有以示之先生慿几東嚮坐予二人前侍披所獻狂斐且讀且􅇡即其後筆以數語攦其非是且見循誘善意而於體要工拙音韻乖叶尤㘦致􅈤每篇終不肖跽授教􅄪拜起立夜向深先生雖􅀍酒神益爽氣益温言益厲􅁴泉蒙􅈋塞灑灑然頓釋如醉者之於醒萎者之於起也說既竟先生復昌言曰千金之貴莫逾於卿相卿相者一時之權文章千古事業如日星昭囬經緯天度不可少易顧此握管銛鋒雖微其重也可使纎埃化而泰山其輕也可使泰山散而為微塵其柄用有如此者况老成漸逺斯文將在後妹䓁其朂哉母替坐客四悚有惘然自失不覺嘆而發愧者既而鼔動客去先生覆衾卧予二人亦垂頭􅀝壁熟睡及􅁴日上先生與客已觴詠乆矣於是胠篋取一編書皆金石雜著授予曰可疾讀吾聽愜其音節句讀不忒顧先君字而謂之曰孺子誠可教矣老夫平昔問學頗得一二嵗累月積針線稍多但見其可者欲付之耳可令吾姪從予偕徃將一一示而􅂌之庶文獻之傳罔隕越于下先君起拜謝不敏曰先生恵顧若耳何􅄑之如王氏且有人矣敢不唯命期以眀年春當見先生於西山時􅀊甲寅春二月也後三十五年戊子冬十二月臘節前三日小子再拜追述政問至元九年春予以御史滿秩除平陽路判官過辤諸公以臨民處已之教為請右丞相史公曰汝讀書年長乆在朝行今官外郡寅奉之心當常若在朝野時至扵事機変轉不可預料臨時制宜可也翰林學士鹿庵先生曰長次不睦及首沽虚聲今天下之通患推譲有終為上詩云靖恭尔位好是正直神之􅃪之介尔多福况人事乎餘何言􅀕酒許魯齋曰臨政譬之二人對弈機有淺深不可心必於勝因其势而順導之同僚間勿以氣􅀋匪同而有彼此或有扞格當以至誠感發無所争矣其後揔􅃹萬奴耒尹亦請訓於開府史公曰今判官王某性純直頗諳事儻有􅀁疑當與可否至於左丞姚公吏部尚書髙公諱鳴雄飛每以事使􅀳府者必有言頋慰至秩竟僚屬友爱以理而去時十有三年春三月也不肖今年六十有二老不能用追思徃事如此䓁格言有不可遺逸者因特書云且寓夫強仕之不可復也是􅀊戊子秋七月丙戌􅀄二日也醫説贈胡君噐之醫者精微之術也又曰醫者意也得於中而可以應諸外通乎微而後可以逹其変此必然理也予素有中脘疾二十年間凢三舉發􅀄得扵燕也毉􅀽以玄胡劑療之法既緩􅄪宿而疾乃巳在趙薬以神宝名者攻其中堅暝昡搜索上痛方厲而下動大作猶一敵未退而復生一敵物雖去而泄不止予頽然而卧力不勝而氣巳憊矣間日而氣始平其作於邢也陳氏亦以􅀋趙劑者投之而為苦與先􅀹加劇焉今者蹶動感似輕而痛則一上閧於中州旁刺於两脅後延於膂􅘡撞搪衝拉頭岑岑而氣翕翕求少寐以休吾煩且不得也胡君噐之亦探藥之粒如者曰朱砂圓下之予顧其劑微於先疑為力更峻噐之曰無慮爲苐下嚥􅁴腸間少鳴而微痢則痛隨止矣巳而果然継以厚朴湯調之忽醒然而寐如釋重􅀒而濯淸風也師寤日髙三丈許予軆中巳平曽泄之不復作而氣之不少憊也噐之天資髙業顓而學􅀶識明而善断出新意而不泥古知其常而通其変甞曰人具五行禀之者不一天有六氣感之者無常病雖名同而證實有異者苟以一槩治之吾未見其能也故證之壊者徃徃濟而􅀗安昔霍嫖姚行師少衂多勝正以不至泥古兵法顧所遇吾應之者為如何且予於器之亦然作醫說以貽之秋澗先生大全文集卷第四十五
