front:
  text: 秋澗先生大全集卷八十七烏臺筆􅀘
  hash: sha256:011685f5c2042342bf623604820761665c92807e8e82327b789288becf58347c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_087-1a}
body:
  text: 弹順天路緫管祖丗傑不合支俸事狀照得尚書省劄付莭該今後官吏辨證􅀻罪但離本職其禄不給承此今體察到順天緫管祖丗傑於至元七年二月爲道大言語公事尚書刑部勾喚本官前來歸問至當月十七日到部至至元八年二月二十二日才行還府有本官却將正二兩月俸秩於本路盡數関支了當事属違錯合驗曠闕月日於本官處依數追理施行論借貸飢民米粮事狀切見益都淄萊衛輝洺磁等路農民因連年蝗旱闕乏餱粮自去秋至今春剟食草木至結死中毒病腫自縊死者幾於百人其壯者迫於飢寒徃徃去爲盗賊外據見闕食者宻州萊陽等處二萬七千餘户西京一路三萬餘户上下累申前後十月才聞尚書省將三路飢民分間約量許貸米粮接濟却令今秋還納而上年佀此等事依例催徴欠數叅詳極有未當者夫張官置吏本以爲致如爲郡縣者承流宣化牧飬元元爲本主監司者以按治撫察問民􅔂苦興利除害爲務且救荒守臣職也今坐視民飢大失所天至於此極不敢權冝畧爲營救方循守常例行移申解經由官府數重至於再三尚不􅀗請即救其轉死溝壑之禍誠可痛也又慮任内户口流散别致違錯虗言安諭隨以隣佑團甲保結不使東西就食它處苟延朝夕以致殍餓死亡迯竄如此是上慢下殘而與有司殺之何異使􅁥司管民等官當位食禄何顔安處民上而以牧飬興除爲治哉夫􅀖以民爲本民以食爲天宰相者代天理物下遂其冝者也今民急如此理合以哀痛爲心猶巳飢溺開陳事冝作急聞奏使朝廷曉然知利害所在大發倉􅅒寛貸塩法或停罷夫役蠲除差税重加惠恤以賑濟撫飬爲事庻可以上副聖主天地雨露之恩仁民愛物之念不務出此視爲細微方以借貸還官爲事所謂聞荒不救見饉不驚者也兼所在爲粮多有名無實切恐虚行了無所濟且近年巳來爲百姓貧乏省部雖差官賑濟止是營救一時不見逺有安濟弭盡之方以至於此如西京一路見闕食者三萬餘户今許借貸米粮倉檻二萬石約户給七斗家以五口爲率日食二小升是僅能支持月餘兼山後地寒霜雪早至設或天災依然二月之外不知復何存活而秋田又無所望此又當慮者照得前宋時每遇水旱飢荒必選摘京朝才幹重臣以體量安撫爲職其一切規畫悉以便宜從事如冨弼之活青州韓􅄾之救利益前後所活百有五十萬口足見規爲有方雖多益辦况二三万之衆乎又檢㑹得金􅁥司條例遇災傷闕食去處有能以物賙濟困窮與民興利除害者按察司保申朝廷約量旌賞其或今後遇有此等事理許令守臣從長規畫營救更乞將巳借米粮即充賑濟之物外據上年懸欠舊税截日住徴其於官民兩得便濟某今當去職有見不言寔爲􅀒責合行一就具呈據乞御史臺照詳聞奏施行舉李户部􅁛職合特加寵數事狀切惟財賦天下之大計民部六卿之劇曹昔李唐一代以調度見稱者裴劉二公而巳切見户部尚書李徳輝資禀忠純精詳政體夙夜在公克盡所事而又疾邪持正吏不敢欺爱自歷職巳來寔爲􅁢稱可謂蹇蹇匪躬盡瘁於國者也近聞尚書省亦以喉舌得人不許改􅂶别職誠然照得唐例如裴劉諸人於度支塩鐡本職上帶中書門下兼同之稱據尚書李德輝官資禄秩理冝特加寵數顯異良能以慰中外之望而當國者且復塞進賢之責矣烏臺日事自至元五年冬十一月終至元辛未夏四月請舉行科舉事狀切見科舉事理徃年翰林院巳經具陳中書省乞聞奏定擬頃者尚書省亦下禮部復有講䆒條目至今未聞施行盖未有度其事冝而力爲言者伏惟朝廷凡有大小勾當聖意毎云尋好人者且好人者大槩觧官事識廉耻以公滅􅀻不作過犯之人􅀂科舉事行必須先立學校或人人力學學校者國家之化原人材之大本也但自教育中來人終是通古今解公事知廉恥識忠義鮮過犯如此豈非好人歟由是觀之庠序科舉以之育材取士㝡爲急務理合舉行兼自立銓選已來内外郡官其品從散官俸禄職田子孫􅄻叙其爲寵數亦以不薄至於功能陞賞之科過犯降罰之例又復備具盖所以磨鈍礪丗欲官得其人以之致理故也然取人之道未覩其由應選之人􅀊有定數謂如目今随路府州司縣見設正官一千五百餘貟槩以中材較之其實良能著稱者少又中間身故老病因罪黜罷及闕貟去處每􅀊極多據格法之外雖有適用長材又不敢枉法叅注一人是應選常調之者不數年所存固無幾矣􅀂科舉取人之法於此不早詳定是猶工巧者得製錦之方而無錦可製將何以就裘服之功乎又如儒人户計委係深通文學者依例免差􅀂此科不立恐不能竟别是否使委通文藝之人終身不􅀍其澤而又無路可進得展實用於明時誠可惜也以此叅詳科舉爲法以之取人寔爲公當故歴代因仍雖格制異同終不能少廢此明驗也鴻惟太宗合罕皇帝聖模宏逺戊戌年間以程試之法畧爲施行當時翕然向化所得人材不少據設科事理旣係先朝已行故事理冝追述聞奏定奪施行如此則上可以副聖主求賢致理之心下庻幾多得人材大􅀘銓選内外百官之用不然人情急於進用􅀔利所在僥競成俗􅀂此風一煽治道無由而􅂭風俗因之而靡尚何選法之有哉故時政所先莫此爲重秉國鈞者冝深思逺慮預防其將來之弊則天下幸甚論職官公􅀻有犯不聽収贖皆的决事狀古者刑不至大夫禮不及庻人兼爵禄者所以待材能廉耻者所以厲莭行此自古之常法盖断不可易者今訪聞得尚書省奏擬到將一切内外職官如公􅀻有犯不聽収贖皆以的决論罪甚非待才能而厲臣莭也如此則是有司教人以頑鈍無耻奊詬之莭廉隅不立而當職任者既無貴貴尊尊之義且以官徒自處苟日計庸而已假如外路一州縣官聽断民訟其或無理者必諭之使退彼執迷不聽至於再三官偶以怒詈遣出民必曰汝雖無􅀻罪猶得以辱詈爲公罪是當官者手足無措爲小民者恣得羅織矣兼目今官弱民強例以侵侮把持爲事􅀂此法一行官府决不能立上司亦不復制矣論者必曰相臣得罪且受杖責此何所措是大不然夫相臣受責出人主一時權断舊例即非永格體制不得引爲後例今欲以的决施之天下必將爲常行格法所謂非常之論民必懼焉恐此言一出断不可訓徒傷天地之恩爲國家歛怨之舉耳據此合行紏呈論重刑决不待時事狀切見中綂建元詔内一欵犯刑至死者如州府審問獄成便行断决則死者不可復生断者不可復續案牘繁冗湏㬰决判萬一差誤人命至重悔將何及朕實哀矜今後但有死刑仰所在官司推勘得實見事情始末及断定招欵申宣撫司照詳宣撫司再行審覆無疑呈省聞奏待報决断至今依上施行理實􅁢當此聖主天地好生之大德雖堯舜無以踰此今訪問得朝廷諭尚書省今後合打的便打了者合死的便施行者省官回奏云己前重刑待報候秋分後断决爲這般儧下多有便似淹禁一般今後至如省部問了􅁥察重審無􅁈不待秋分逐旋施行呵怎生聖旨您道得是一般所聞大槩如此設或在京者能然外路何以區處卑職叅詳刑者侀也一成而不可變故君子盡心焉謂如明白重刑其正犯干連􅂍仗准服追勘審覆結案須經歴官府數重少者不下半載之上不能一切完備尚慮事情始末恐有差疑人命至重或致枉錯有傷和氣故舊例重刑不限催舉待以􅀊時欲於三覆五奏之間脱有􅁈誣庻正犯敗露不致濫及無辜以極哀矜欽恤之意見不嗜於速殺也至於秋分後行刑盖自古帝王體天行道以順四時生殺之理此又大不可悖也如舊例决不待時盖所以待惡逆以上罪也今者將一切常犯死罪者數月之間案牘稍具止令省部􅁥察審問無􅁈同惡逆罪犯决不待時雖皐陶在上保不能曲盡獄情一無􅁈濫今畧舉近年北京髙幹忽乃壻銀延壽奴將隨逐妻家駈男長夀轉賣上都民家在後事發到官以殺害駈男自誣又經中書省審刑官審問無􅁈至將延夀奴作死罪断訖一百七下及將妻髙氏離異旣而駈男以親書逹于本使乃知本人誣服本道按察司方爲改正以此叅詳捶楚之下何求而不得兼法者天下之公共非倉卒奏對間所可擬議伏惟尚書省緫持紀綱號令天下民之大命繫一言安危誠當審量事冝集議􅁢當可爲永格者而復更改聞奏以救旣徃則天下幸甚據此合行舉呈髙唐州州尹張庭瑞稱職事狀今體得髙唐州州尹張庭瑞自到任已來甫及朞年五事可稱一方受賜盖其人強幹有爲廉能素著凢所興除率先律巳如待僚佐以禮束胥吏以法勸課耕桑裁抑游惰宣明教本則首興學庿拯齊羸劣則課習毉流井井有条吏安民便而又䁱暢軍機勇於臨敵向軍虎嘯巳肅邊声今尹齊西號稱治㝡誠有用之全材一時之良大夫也理冝聞奏擢置監司不然百里之地不能盡其所長爲可惜耳據此合行呈請立登聞檢皷院事狀切見一等狂妄小民苦無􅁈抑如婚姻田宅户門等事徃徃輙便接駕唐突聖主愛民心切以爲事重致使聖顔未甞不爲之動其唐突者必奉將敕㫖令有司理問然後退去則是萬乗帝王之尊下行有司之事萬無此理臣下能不駭懼合無建立登聞檢皷院如有指陳軍國大事朝政得失大段􅁈抑累經訴理未擭辨明或事不機宻者許令投進以聞如此使天下􅁈抑之情得以上逹而朝廷尊嚴之􅀔彼狂妄小民亦不能咫尺輕近矣論立司諌等官事狀盖聞朝無諍臣則不知過國無逹士則不聞善至於諸侯卿大夫士庻人皆有諍臣諍友則國安而令名可保矣况萬乗之帝王歟伏見朝廷近年以來雖或事小情有似重者天威震怒出於一時輙至不測欽惟聖慈隨復追悔以至有云當間如何無人題奏來所聞大槩如此今憲臺雖立或有所論執卒不能上逹得開陳利害於前合無選近侍重臣輔以剛正儒者使爲司諌等官如此則聖益聖而明益明且免夫旣徃追惟之悔天下幸甚論職官子孫試􅀘省臺院部令史狀照得舊例皇家緦麻以上親及曽任宰執之子聽試尚書省令譯史皇家􅃝免親及宰執孫并弟􅀂三品以上職事官之子弟及終場舉人聽試臺院令譯史其散官五品以上職事子孫兄弟及姪或散官不及五品曽任五品職事子孫兄弟皆􅃪試部令史譯史通事切見朝廷近年將大根脚官貟子孫分付都省臺院習學政務此政前代宗室宰執職官試􅀘之意也至於宗室子孫不敢輕議如宰執職官子孫弟姪理冝舉行盖宰執職官子孫弟姪終是有門地大相脚中出來人其所聞所見無非䆠體時務有所顧惜且不急於財賄此㝡可取者今後合無酌准上頃格例限以􅀊月試驗􅂶堪相應之人令於省臺院部與吏貟相叅勾當寔爲兩有便益且吏貟職掌文字皆係國家庻務刑政機宻動関利害自非守愪公幹者鮮不害事􅀂以宰執職官子孫相叅勾當驗事務輕重上下分掌使逓互􅅣磨長短相􅀘持體􅀝辦各有所司豈非兩有便益者哉爲吏貟者漸磨旣乆務知逺大聲迹漸好易其鍛煉積習之心爲子弟者通曉政事一適於用革去驕堕侈靡之氣不數年使朝廷之上備任用者比皆良能公正閥閱素䆠之人將見􅀻已門下僥倖泛濫之弊不革而自去矣舉都事馬甫并選用儒者事狀切念臺之爲司不同省部職掌上所以肅朝廷之紀綱下所以正百官之邪僻至於軍民利害刑政得失皆得紏而繩之故一臺綱領必須擇得其人使内外官府動或過舉則曰有某人在恐不冝然可也又古者用人唯出至公雖父子相舉兄弟同臺官府有舊皆不以爲嫌如或不才抑濁􅀭清正臺司之職耳切見都事馬甫性詳静閑吏事凡所論議務先大躰以儒飾吏者相叅勾當方爲􅁢稱不致事務差謬爲外望所易論陳提刑改除不冝取觧由事狀伏見尚書省奏擬山東東西道提刑按察使陳祐簽中興等路行尚書省事就令本司取無粘帶觧由前來叅詳見設按察司五道據祐忠真剛果毅然有爲脫畧苛細務明大體凡所興除民安吏畏風彩所加百城震肅以聲迹比量㝡爲稱職兼山東東西阻山􅀒海地廣物衆連年蝗旱軍民不安所仰祐等以之鎮静今祐所除名雖相列其寔左遷􅀂向前代官苟非其人是一道監司殆虚設耳憲臺理合開陳可否以之執奏别議選注外據取觧由一莭照得舊例凢省除官倒除者止是給據别無取觧由休例且按察官係朝廷耳目之使以按劾弹紏爲職不同州府掌管事理今也擠同有司一例取觧由赴省似爲非體乞一就定奪據此合行舉呈論五品以上官殿授事狀訪問得舊例五品以上官得除者殿授皆奏謝六品以下官於嚴祗門授而無謝禮今者内外大小官貟其宣命勑牒皆於中書省祗受似有未當者且三品至五品官僚職掌雖分内外俱係國家􅀝重臣子而朝廷誠不可不察視其人之邪正能否也昔太宗將都督刺史姓名䟽於屏風欲坐卧觀覧得善惡之跡注於名下以備黜陟至玄宗將已除職官延之内殿詢訪治道然後諭遣至人人感激莫不以名莭自􅁬故貞觀開元之治號稱隆平今後合無將五品以上官貟盡令陛見祗受宣命使人人躬􅀍恩寵於朝抑且革去僥倖非妄之徒外據六品以下官貟且於中省祇受權冝門授之制如殿庭定立然後别議施行論貧難軍合從所属定奪事狀切見天下新舊軍户極有生受難以應當者如貧難年老单丁女户消乏者是也至如新簽軍人近年上司畧行分㨂難易不堪者却行收係為民二千餘户况在前年分舊軍中間年老单丁女户消乏貧難數多獨不䝉分間優恤何事情一躰而舊軍偏重如此盖有司之不省故也其㝡可傷者如貧難等户徃徃陳告經年累歳了無投向如告到緫府府司止備申兵部部即曰非我當問即行下令申合属本路依准申覆樞宻院院即曰我主調發但恐闕少正數而巳仍散押入案亦别無定奪叅詳雖使貧難軍人無所控訴而軍前氣力亦不濟用是軍力人難上下既無分觧兩相躭悞今畧舉懷孟路舊軍李用姚三秦義等三名俱各单丁年八十餘歳無人俱給日逐㳂營乞食應役向申樞宻院不蒙明降其秦義近於軍前因病身故本路又將李用等三名申詳兵部又行下令申合属别無定奪此明驗也今檢㑹到唐制健兒在軍皆有年限更來徃額爲勞弊又諸軍鎮量閑劇利害置兵防健兒於諸色征行人内及客户中召募􅂑丁壯情願者􅂶健兒常住邊靣者每年加常例給賜兼給永年優復其家口情願去者聽至軍州各給田土屋宅人頼其利中外􅀗安是後州郡之間永無徴發之役又舊例諸軍健年六十者罷役如秦義等八十老人使之守戍禦敵何所頼其勇健哉今後合無應貧難軍人陳訴許從合属受理定奪勘當的實唯復寛减差役或别議優恤庻免致靠損人難進退無據不然請依分間新軍体例將貧難極生受者亦從長定奪似爲安便外據闕少合􅀘之數官爲召募情願者聽仍優復其家口遇有􅀾功普例給賜如此可以􅀵壯健而活疲民其爲惠恤小民豈不倍於尋常萬萬也據此合行舉呈薦臺􅁺趙文昌事狀切惟臺之爲司以禮法䋲官邪用儒術飾國事近丗巳來文學之士專上才華少諳吏業一旦從事觧克有爲苟有盡心誠可嘉尚切見前濟南副提學趙文昌自爲臺􅁺強幹有稱夙夜在公精研政事以儒有飾吏之材飬氣􅀒嫉邪之志求之等倫誠難多得今去繁居簡明見甄􅅄􅀂臺司將來闕貟如文昌者誠冝擢用必能不􅀒所學克堪所任儻升霜簡之流􅀹勵素餐之者某今當去職有見不言寔為􅀒責據此預合薦明舉左丞姚公克經筵等職狀伏惟朝廷凢有大政大議必湏清問故老兹盖詢諮黄髮恐有所愆之盛意也切見前中書左丞姚樞潜邸舊臣中朝大老生平以聖學爲心輔政多嘉謀入告近簽南省爲衆牽持罔伸所懷今年雖􅂄艾精力未衰謀猷論議足有規爲未冝閑退使後事功至於侍講經筵監修國史保傅儲闈承旨樞宻寔能克堪􅀒荷必能進盡忠嘉有所廣益兼翰院集賢等貟如許竇二公者巳􅀩恩眷如是有此體例合行舉言者伏乞憲臺詳照施行論衛輝路不冝通􅃹竹課事狀切見衛輝路見􅃹竹課據所該地靣懷洛嵩汝唐鄧徐邳益都泰安等處自方萬有餘里其實難以勾赴今止令衛輝緫府並􅊢􅃹領恢辦課程不致虧兊失誤叅詳極有未便者蓋衛輝路分微小當四衝驛程民訟科差諸軍奥魯一切課程等事比之他郡百倍其劇今又將諸路竹課並令􅃹領雖極慮盡心勾當决有力所不及去處又縁竹雖官貨寔係經啇交易不同啇税認辦宣課事體至於斫伐以時般運有法價直低昂使官民兩便自非通知貨殖善於理財者鮮能首尾相應彼此皆辦兼上項有竹地靣必須差設􅁥司廵竹等官吏又令􅃪受本道節制前去各路營運其間交関徃來其路分旣平牒衙門而􅁥廵皆差委客􅀉少有蹉跌輙成沮阻與其廢力如此何􅀂各令所在緫府兼行􅃹領以爲長便又照得濱樂清滄觧塩依舊專設司事恢辦合無將上項竹課亦另行設立􅁥司同塩􅂣一體􅃹領勾當庻氣力專一終是易爲責辦今省部􅀂不如此從長别行定奪將來衛輝官府不惟因此􅀒累其所辦課程儻有虧兊失誤深係利害據此合行舉呈儒士楊弘道賜號事狀伏念髙尚之士無代無之國家必遂其素忘賜以處士先生之號盖其材學節義可髙足以勵薄佫而敦風化故也切見益都路耆儒揚弘道文章德業師表一丗至於賊壇頻年徼功經營海道欲遂奸計先生預有所見發為歌詩聲言不可今行年八十有三窮君守道垂老丘園誠天民之先覺清時之隠逸也合無照依莊靖李公恩例乞賜處士先生之號以表其康節且令本路歳時常加存恤請職官依舊三十月遷轉事狀切見即目到部聽除職官縁貟多闕少填積停滯人數以致進退兩難有礙銓調佀失才能樂於從政之詈及􅄃捽髯􅂡至於脱落却行􅀻下􅂆和叅詳教官維爲人師行中士表宣明教本訓導生徒爲任其劉汝翼㓙悍荒酗凌犯官長爲細人所不爲旣傷儒風大失士體使京師首善之地何所矜式冝遴選師儒以代其職據此合行紏弹論隨路闕貟及未到任官貟事狀切惟張官置吏本以爲民官得其人貟不曠闕庻得民安事辦今體察得隨路見闕緫􅃹八貟正從七品二百七十餘貟兼州縣省併以來所轄地靣極有寛闊去處加以蝗旱大作民心嗸嗸似爲未安况􅂶兆平陽太原濟南等處皆係重鎮尤不可闕貟勾當合無遴選才德兼備素爲朝廷所知者擬注緫􅃹及州縣􅀍災重處貟闕多者省部從長講䆒於見守逺闕官内選摘或令内外五品以上官辟舉廉幹相應人借注􅀘􅂶勾當又知得四月中受除官貟巳踰兩月尚有未到任者五十餘貟亦當作急催督别議䆒治不然切恐中間規避致悞一方事務又於國家法制有所蔑裂合行一就舉呈為起盖良郷縣南留里河橋梁事狀㑹驗中書省條畫内一欵該􅀂有利害可以興除者申臺呈省遵此切見中都迤南係四方官貟客旅朝㑹經行驛程正路近體知得良郷縣南十三里有舊來經由留里河橋官道南至涿州六十里兵革以來橋廢不行目今靠西由継陽套遶轉至􅃰州七十五里􅀂經夏秋河水泛漲􅅺濘虚䧟致使鋪馬客旅來徃生受兼継陽套地形卑下村坊逺窵接連溝㑹屢常失盗深爲未便􅀼詳􅀂依舊起盖留里河橋道不唯道路髙平徑直使鋪馬客旅徃返近三十餘里又免水潦泥濘之患官民寔爲兩便伏乞御史臺備呈中書省行下相視改正施行益津縣尹張英非違等事狀今察到益津縣尹張英自到任已來甫踰兩月其逐莭非違爲􅀻蠹害等事開具于后據此合行紏彈一縣尹張英到任至今兼掌尉印凢失盗二起明有窟穴顯跡不即督勒弓兵嚴限緝捕却爲擗問失盗李鄭二家親属及勒要訖事主王伯英自願不行申告文狀其從滋盗賊以有爲無匿而不申度其主意止恐不􅀗停罰月俸本縣民心因此失望其張英字民之官務在肅清所部盗賊消弭方爲稱職今所行如此非唯違錯寔爲以􅀻㓕公一前益津縣尹張文郁主簿李璋使訖塩折粟鈔三十餘定其張英明知前官侵使官錢不即依理舉問又不止約本官申明使州知㑹於九月十九日反行送出還家去訖及發下馬駞一千餘疋已悞料粟􅂊於十月􅀄十經隔二十餘日不由所􅃹上司擅自赴府而越言上說稱前官張文郁並不交代徃豐閠去訖乞勾追發下依理交代及緫府退訖月申縣觧却就都於州司吏李讓處詭取本州空觧依前申覆切詳上項事理非唯失悞支持事属欺罔詐冐兼張英係􅁥臨之官知代官有犯故不舉問送令還家其徇􅀻害公孰甚於此􅀂弗紏治切恐因而循習别生事端所壉前項事情就問得州吏目王文進司吏吕仲榮與所察相同一覇州益津縣分俱該河流陂浸地靣其驛程係山東要路中間津梁㝡爲急務又照得省劄修理橋道事明該簿尉闕貟委自巳上正官兼􅃹及令長官檢校其縣尹張英將本縣合修橋道堤口畧不省問止委弓手盧得用􅃹領工役致使人夫迯散冬月寒冷修疊不能了畢使經行人貟罷役城夫及發下馬駞蕩渉氷水人幾有漂没者就問得縣逹魯花赤舎里甫丁吏目王文進與所察相同其於公不幹違錯怠慢如此一守令百里􅀉命苟非其人則一方彼害其張英性荒􅄝酒昧於事體又乗酒縱􅁀不居公􅇬將公使人符首領等非禮􅇌擊致有逃避之者及本州行下事理如橋道見禁等事徃徃違拒輙不申報至於縣司所行或不應者典吏報覆畧不聽從恃頼曽為部􅁺蔑視上司如委棄尉印令弓手張典掌管將舎里甫丁􅀻已人烈石立為巡捕祗待官見於煎茶鋪勾當其恣意亂行如此致將公務窒塞兩耽非止一事兼張英前任唐縣其部民告發不公等事上司未曽歸結不審縁何依前遷除􅂶益津縣尹勾當合無一就䆒問彈左巡院官休和趙仲謙事今體察得趙仲謙於至元五年十二月内詣中都左巡院告王四打死妹趙喜蓮事其郝警使馬警判蕭典史提控張仲禮將􅀍論人王四不行撲捉到官及在都見有干證人亦不勾喚虚調行遣及將潞縣取發到干連人等並不與元告􅀍論當官對問從放還家其事主趙仲謙爲見巡院故意遷延再行告到總府并右三部行下廵院其巡院官吏止是依前虚調行遣並不理問却於今年二月二十日有郝警使沈警副等當㕔公然省㑹元告􅀍論人等與限二日勸和了者切見巡院係京畿親民正聽務要禮義興行肅清所部據前項違錯事理合行紏弹爲添科南京不任差户事切見南京路兵興巳來百色所湏盡出民間如挑河運粮和買和籴採打木植造作舡􅃗噐甲等事三年之間畧無寕息加以蝗旱相仍物價踴貴其􅀍災去處至今有闕食者而賑濟大恩又不霑􅀍中外嗸嗸財殚力困已是生受又即目䖝蝻比之去歳滋㣧極多近體訪得今歳將本路新􅀵二萬四千餘户盡行添科差發湏􅃹不失元額却縁照得上項户計内一萬餘户俱係交叅重抄老疾不任差下户切恐絲銀一出别致迯竄將閃下差發必􅎈於見在户數可敷元額如此是百姓重併轉増困弊兼目今襄漢未下攻取之本首仰河南據已困之民爲國計者誠冝深慮撫摩存恤得小利爲易固􅀖本爲重合無欽依近奉聖旨减免益都差發恩例再行勘當堪與不堪從長定奪聞奏施行據此合行具呈伏乞御史臺照詳施行爲除豁河南屯田户差發事切見河北路分新簽軍户省部將元當盡數除豁了當今體知得南京路屯田户計相近二萬方其絲銀止除訖正額餘上趓下數目却今見在民户包納即目本處軍馬調度百色所須民力已是生受更將額外絲銀敷納切恐靠損不安合無依見起新軍差發一體除豁似望百姓蘇􅒚不致因而重困爲劉古乃打魚事切見雄覇武清等處魚官劉古乃所􅃹專一打魚人户七十六户毎年納魚二千餘頭自去年納至五千四百餘頭比舊數増一倍之上儘供官司用度今體知得歳納魚數増至萬頭切詳雄覇等處俱係河泊斥鹵地靣其間貧難人户别無營産止仰捕魚爲生應當一切差役又兼依例認辦課程其古乃毎年於民間抽分魚貨巳是侵擾今來本官爲増數及萬陳告上司將應有河泊盡拘属官禁絶諸人不得採捕就問得魚户趙知事與所察相同􅀂依上項所告不惟下奪小民衣食於國家賑䘏貧難之意大相乖違又兼天地生物有數歳取萬頭不幾於竭澤乎據古乃所請理冝裁抑合行舉呈秋澗先生大全集卷第八十七
