body:
  text: 序與左山啇公論書序嚮大觀所􅀋諸賢法書平生所未足於焉盡償公云如楊少師維摩等帖天真爛熳上法二王下與魯公争衡至縱心所欲皆寓正筆而不踰矩所謂出新意於法度之中􅀉妙理於豪放之外知此迺悟涪公云余書不可學學者輙筆愞而無勁氣似非虚語也因復出坡公所書寒食詩二帖方之在顔楊兩間蘇當爲入域之賢爾嗚呼古人不可作所得見者書蹟爲最眞今吾左山商公掇拾於二千載後剔去纎妍而留精偉復始終條理俾金聲玉振以集大成是又智者之事諒非禪中有眼者疇克辦此邪弟恨不得時時聽瑩以盡古今之變㑹歸其極耳然歸裝翩翩巳復稇載矣至元二十年四月六日書于所寓壽宫之道室上巳日林氏花圃㑹飲序四序言謙氣有􅆭舒不無哀樂從違之間維暮春元巳物華澹􅃩極夫舒樂者也故昔之人迓續維新祓不祥於川流之上其來逺矣然例以三日為節縁不克與已㑹者蓋㝷常焉今􅀊人和氣稔適與巳契又可重也不揆援永和之舊例嗣舞雩之清音徴賢合友禊飲林氏花圃尋盟而至者凢一十二人於是登野彴酹清波折栁脫窮秉蘭即宴歌絲間發羽觴交獻不數行四座紛然迭爲賔主酒旣酣秋澗老人継以栁圈新唱詠四者之來并喜三樂之同集􅀭觶侑賔傾冠倒佩不知其不可也巳而客有稱於坐者曰昔㑹稽諸賢禊集雖雅未免因述梗懐俯仰今昔動終期歸盡之感今吾與子一攄厎滯増暢老懐顧知巳而無雜賔聆歌聲而免詩苦以此方彼疑若可継楽有所踰也是不可以不志明日弟忱輩來解酲首賦佳篇乃以其序属予余亦以㑹鮮離多楽之不易􅄪也筆泚餘酣率尔而作時至元二十四年􅀊在丁亥甲午日也謹序編年紀事序史書浩慱殆藥山然用之不盡取之不竭弟掇之者不易區别編紀之書有不得不作者然務􅀶者或詳其不必書從簡者至略其所當取斯盖漫然中無所主故也大抵觀史者湏當見其一代興衰之自要本不出君與相好尚治忽而已如賢否之用舎治乱之所由生刑政之寛虐民情之所從易安危之機截若影響此理之必然也是皆吾儒法之而為明時治平之具者得不詳且備欤若筆之而無所用則上下數千載之事績特断爛朝報耳卄一年余解印西歸休焉而無所事日纉相務為業編年者尤不可斯湏而去手遂與韓生弘因其舊編增而廣之事備於前統明於舊若夫丗主之御天接綂輔相之登庸宅揆前後繫属一不敢闕所謂該夫運之盛衰者則思過半矣明年冬旣断手生曰増輯之意不可不序諸篇端吁吾年向耄前日所進今日不􅁴其忘小子其秘之于以備吾家藥籠中用可也時則二十四年丁亥􅀊夏仲日序王氏易學集説序先君思淵子昔􅁺民部時尚書張公諱正倫字公理日引一叟連榻坐與之問辯甚欵察之盖講易經㫖也每叅署已輙抱牘傍侍張公曰汝亦樂聞斯乎曰唯自是日熟所聞遂潜玩焉造次顛沛楽之而不釋也北渡後遇玉華王先生復得窺其門墻而覃思焉旣而有問荅理乱之說玉華子訢然曰推是而進何憂乎不造夫穾奥也然專静之功不可以不至藏徃知耒寔本於此吾子其志之旣而家府屏逺人事取歴代諸儒所傳探微頥妙日一卦為業真積旣乆静見之心遂大以肆曰吾老矣非述何以見於後示子孫以大受也乃組節群言使如出一手辝約而意貫諸家之善盖無餘藴矣嗚呼易之為書三聖人憂丗而作也其道有四互為之用然身外無可論之道道外無可談之理天理人事不出乎日用行已之間而已是書之集四者具列要以近人情為本使學者切身以求用易知而不雜其於易道庶彬彬然有煒矣不肖今亦向耄先丗庭訓墜佚無緒大懼夫不學而衰也乃沉潜是編冠脩述之意於篇首仍題曰王氏易學集説使後之來者知先君學道立丗其􅀶文約理有如此者小子惲復續所得以綴于後盖先君所未見也庶幾五十家之說左右逢原矣至元二十五年戊子春二月一百五日序送信生士逹北行序勾呉之分豫章之野有神物焉雄雯隂縵丗不多得佩而服之可以檢非常而走光怪礪而用之可以决浮雲而開白日當其鋒鍔翳昧沉欎於幽圄之下然衝霄之氣不自逹於斗間雖有精鍳􅀶識之士安得佩服提携檢非常而神利用者哉君子之仕也上需志於逹而後可以見於用用則先其材之云何而後其時之利與否也逢乎辰而匪其才何克應事㡬而成吾務􅀒其才而艱厥時吾固知攸徃而終有所濟矣故伊尹不以其時而有間於所行孟軻氏不爲齊梁不吾與而必意於速去何則天之所卑於我者如是我烏敢自棄不力其在我者焉奚暇計其可否俟彼有待而後我爲之應哉士逹少問學於予甞以政試於諸生間唯士逹知所以對當時已異夫姿之敏志之逺到也厥後􅀭歴州郡果在夫受直罔怠其事者之列及例歸河東又見夫居養有得噐藏諸身與時消息者盖素所蓄積耳斯舉也又非底滯於下求逹於上方試用於公卿之間也顧時與仕吾無所慮矣然理有所當燭者試以吾甞從事於斯者告之夫仕䆠雖或巧拙而其間有容力不容力者彼自然之來吾順受而安之是則力之所不必也吾分旣尔吾行足為即其所受而􅂶其義之所至是則力之不可不勉而前也所勉者何用晦而明以訥為辯竭誠心於所事見實用於當行察其機而發人之幾通吾滯以逹人之滯不以資之微卑為嫌不以與之依附為得盤桓居貞以俟夫君子之大受何患乎聲名之不昭事業之不􅂋而著也於其徃也故書以為贈禮部尚書趙公文集序至元丙子夏五月予考試河􅀯道岀臨汝舘望崧樓者再􅀫歴覧後圃緫為塵迹所謂汝海虚舟者於蒼烟老樹間巋然獨存因得防禦趙公亭記於壁間􅀝杖披讀者乆之令人想見承平官府之盛惜公遺文不多見也後七年予自齊還衛日與公孫維弘杖屨倘佯言􅀏者無時一日出耐辱集一編示予曰此先祖通奉君之遺藁也予請而讀之者數日得辝賦古律詩及雜著楽府等篇若干首其氣渾以厚其格精以深不雕飾不表襮遇事遣興因意逹辝略無幽憂憔悴尖新囏險之語信乎太平君子假楽有餘而神明與祐者也維弘遂以集序見属予曰以遺山先生之論之詳此固以為之足矣然士君子之學文章徳業名為兩涂其實一致有以事業而垂丗有以文章而名家者傳曰我欲載之空言不如見諸行事之深切著明也吾儕孰不欲得時行道使利澤施於人名聲昭於代盖有幸不幸遇不遇者焉如仕䆠利逹復擅文雅以事業盛而揜其所謂文者從其重焉可也若文彩絺紩竟不得以片善及物者其或曰若何克為一文士而已此眞為妄人尚何知兩塗一致之理者哉旣為其序且寓夫予之所感云先生諱思文字庭玉明昌五年進士官至通奉大夫禮部尚書􅀄河朔雲擾公流離兵間挺身歸國遂為徳陵所知故其仕䆠通顯而為兩朝名徳一丗之龍門者云至元戊子秋八月朔旦謹序宫禽小譜序三百篇之作風人多引物以比事或託物以發興其氣􅀋情性學者不可不識也是謂致知格物之道十一年江左平宫籞禽玩畢逹京師戊寅夏予待制在京師􅀗覩諸禽于㑹同舘之西位者凢一十七種誠有可愛而當識者厥後珎禽竒獸陸貢川輸􅀊相望於道彼􅀠鳥官入上林集萬年之芳枝䝉天顔之一盻振羽和鳴固有喙同而如瘖者矣其爲物不可爲不遇也因念九州風氣各殊其所産常異有無亦然非遍游歴覧有終老而不識其狀與其物之情者况耒自閩廣之逺乎伏見近年求訪嘉士車徴幣聘􅀊亦不絶其或抱􅀒噐業谷耕巖隱偶不及時賢之論者未免阨窮遺逸反不若斯鳥之採擇薦進光耀如此之幸且遇也至元廿五年戊子秋八月壬戌偶逢江外鳥使因追作宫羽小譜叙其所觀而識者今列于後秦吉了狀如大鸜鵒毛羽青黒色閃閃有光翅兩稍皆白翎耳與人肖耽腦上相荅及喙距皆黄色聲雄烈善作人語蘋茄児形狀毛色一與白鸚鵡同養者云性極乖戾尖尖㡌􅁅緑色形如燕許頂毛上銳下豐髙約一寸故名百舌児狀如鴿略同毛羽蒼白花色江􅀯三月間盛作聲今四月尚未鳴盖北方地寒故也白頭翁狀如䲳色純白喙距皆青頂毛冗細蓬蓬然上起故名柳鶯純緑色甚嬌可愛性靈如黄鶯其狀差小切倉子一名鐡觜児毛純赤􅄄色狀如雀鳴聲啁啾調之能頂􅀒􅁓殻介胄人􅀐像於一欄内分兩陣作衝擊狀甚馴狎也相思児􅁅赤色狀小如雀白鸚鵡一其大如鳬玄鶴二比常鶴差惨極清癯金絲鷄毛􅄄色上有蒼班細文疊積如鴙鷹尾翅末秀翠金䨇團花絶􅀋孔翠聞他鳥鳴皆能效之水老鴉形髙大如鷀體班爛脩首如夘形喙尖長蜿蜒俛仰絶與蛇􅀋􅀲掌則鴨也疑烏􅀑即此也花鷺鷥􅄄色中白毛份然間出長喙趾青緑比鷄差小又名白嘌小鸕鷀純白色黒喙青足但其頸骨狀曲折為一曲料哥形毛全是鸜鵒其光彩濯濯然丹喙人耳作梔黄色耳後有黄眉兩抺上連於腦能作人語喜則兩耳開聳烏鷄骨與􅁏皆黒其蒼者亦然送薛叅軍北行序承宣供億莫司属為切然户鮮而居衝俗􅅝而不知教制於上而梗於下誠有所特難者焉又恒人之情視難易為行不乗􅀄以取其名即旁縁以徼利苟安依阿護養資歴愒日以俟代而巳丹陽薛君彦暉由藩府􅁺從事於斯者四十餘月為人外簡朴而内廉能供王事理民訟直而有方雖當急遽二者並行而不相遺自始逮更猶一日然其邁迹㝷常立於能者之行卓矣惜乎心儘公而罔間於易難用有餘而不遑於風化因念令便於亟行化安於永乆苟使民知義方其趍事赴功有不待致期而然者儻教有所未至俗有所未醇能者日鮮不能者日衆而供庶事理政務固不得一日曠弟恐物情治冝兩有不自盡者此昔人以化為先而令次之師帥者又化令之本也安得惟良如薛君者百有餘軰俾用焉而顓靖嘉治焉而有餘􅁉我不以徒法為政彼不復顧難易為心事雖衝而亦辨俗雖􅅝而可諄方之亟便特緩夫前後之間然能使物情紓而政本固官有儀而民不輕民不輕則吾之令行􅀅見如流水之源矣不然使韓范復出軄思其属處簿書米塩間雖終日無倦亦且有所顧矣薛君行來辝飲之酒再拜以送言為􅈤因書此以贈庶幾條治冝者聞之亦􅀅有所頷焉卄五年戊子冬十月晦序贈日者張翺序隂陽家者流秦漢已來如五行堪輿建除叢辰暦學天人太一等家其目雖多及臨事占决各開户牗􅁻凶得失互皆不同故漢人顓以五行主之予因䆒其理而爲之說曰夫太極判而五行具五行具而萬物生一物而一五行也􅂊有所闕物不得為之物矣静而體動而用剛柔迭制而吉凶生焉矧二氣良能以不測為神人於其間亦一物也吾何以逭其為術也天人之際有未易知者得之深者其理明索之淺者其說近又世道下衰人不安分以狂妄横干中徼倖騖于外貪者以苟得為心狷者以速逹為念詢其命曰吾此去可亨相其時曰吾今年可動彼知其然即順情悅主售其術而已我審彼䛕竟沾沾自喜圗一豁隕穫為愜是天理兩滅而人欲肆矣嗚呼風俗之移人也如是可勝嘆哉有張生翶者姿甚髙業是而志篤語直而不隱觸數知変若夫誇嚴苟售其術而已者挾是游行州郡億焉而多中故七子徃徃與之顧接在翺固亦榮矣雖然吾将進翺於學鑪其粗而造於精資之深而遺其淺不為世俗所移不以虚髙務悅習其所已知其所未至其要安在道其在於是矣能此将見聲光四白義置百錢坐來衆問不愈於行而求其售乎翺曰唯有是哉然行襆巳具敢板康節之例願先學於四方可乎於是書以為贈星丸漏詩序司録判官趙㝢到任之明年置星丸木漏於衛之汲門上仍繪采為圖携之耒謁再拜請題辝于後予以為政有緩而似亟事有微而實著者更漏是也雖因象制噐特挈壷氏一士之職也然天地朝昏我則司之官民勤息我則警之上而日月運行於三百六十度之中外而二氣渾淪磅礴於三十七萬里之表使不出於五尺之幈百有餘丸之數非格物善政者其能之乎予嚮官平陽亦甞創此其攷述測験知為匪易今司録小秩也首此為務舉行廢典其儀物有足觀者是欲勤政率先因噐警民者矣然年少氣銳當筮仕之􅀄能推廣是心始終罔間則張希顔以夜漏分明等數事得􅁛為好官貟者恐他日不難至矣至元二十五年戊子夏六月入伏三日題淇奥唱和詩序心有所思思而有所言託物以永其言者莫詩若也曲山河君尹􅀯樂終更将歸西山舊􅀮以吾故遂稅駕鐏酒談􅀏杖屨游從日夕不少間旣老日閉心無所運用感物興懷情有弗能巳者即作爲歌詩以示同志顧不揆乃相與賡唱迭和絫積日乆遂成卷束緫得詩大小凢若干首曲山慮其散乱遺逸欲命劉生琛第而爲帙且告予以爲何如予曰彼王公大人覊旅草野之士遇其志得意滿與夫幽憤無聊見於詞章者多矣然未免有豪宕夸毗之意幽憂憔悴之狀吾軰不過道閑􅃴安命分遣興􅀉詠性情而巳又非欲示諸它人俾後之來者萬一視所履而踐厥迹安知不有撞破煙樓者乎巳而客有謂吾等不以有用爲心而廢日力扵此爲可惜也予應之曰不然是将俾予守兎園之􅁽耶削汗簡之青耶抑欲續太玄之經耶客􅀏而不荅於是乎書以爲淇奥唱和詩序老子衍義序壬辰冬予應聘至都旣舘壽宫嗣教玄逸張公與一杖者相陪來謁湏眉皓白氣貌魁偉敦􅀆其若樸聽其言冲冲然殆有所深藴随見所賦詩顧非澹泊忘言者尋西還求辭方知君為重陽宫主玄學師也旣而其徒執老子書請見稽首再拜為致師求序取重之懇避席拱立需命而退因勉為説云天下所謂聖人者以其理之所在治從而出焉舎是何所望於著書立言者哉然聖道溥􅀶該貫群倫其為用也為天地立極為丗主明道要不過以静制躁以簡御䌓以真黜偽以樸還淳以正息妄以公去􅀻以理勝慾以法防亂而已惜也老􅆅氏潜輝柱下不出於文武周召之時當王道中微禮壞樂崩仁殘義缺之後萬偽並作猝莫能觀其復思逺駕流沙髙出物表抉天機軆玄化吐辝為經過為音憰憤激自成一家之言庶幾廓清澆偽再造堪輿之意欤雖然矯枉者必過其正迨夫末流仁智異見户牖各開曲暢旁通肆為駕説養生者以乆親為心尚玄者以清談為樂冝乎􅀳史譏王政之􅃜知幾􅀧河公之注今王丈蜀産皓首玄學獨能㧞出衆流間索正歧根於治平者為多無乃見幾而作由儒而逃墨者邪固特樂而序云玉淵潭讌集詩序都城西郊佛官真舘勝槩盤欎其間有潭玉淵盖丁氏故池也栁堤環抱景氣滿爽嵐煙瑞靄霑漬􅁭􅃑方秋是焉撗陳都人游觀誠為佳麗財賦緫管王侯明之尚義好客髙出時彦甲午秋孟置酒潭上邀翰林諸公為一日之娱旣而雨不克成懽是月晦復折簡來召用㝷前盟也簮舄旣集風日清美紅幢翠盖間見層出天光雲錦澹灔尊席沙鷗容與於波間幽禽和鳴於林際若有以知野老之忘機代清唱而侑觴也酒肴饜飫賔主胥樂煩􅁭滯慮頓然一醒清􅃴夷曠綽有餘思然賞心樂事良難四并雅㑹清吟烏可多得信口吐詞不計工拙諸公走筆􅆳和咸有所得殆山隂禊事之脩幽情暢叙􅀏金谷羽觴之罰酒數何多第以率爾居前殊愧其粃糠也八月載生明序易解序易文為書廣大精㣲範圍乾度經紀丗道以一理而含萬変辝雖有盡理則無窮故說之者吹萬不同仁智各異要以脩辝通変近人情関丗教為切練師李公甞為予言監丞張君在河南為衣冠清流多蔵書得前代以易名家者數十種早治其學精占筮術北歸以藝能得官如支離覆逆建除叢辰等􅇊有不屑為者於是廣詢愽䆒師心自断集易解十卷于以抉聖心而明素志駙馬髙唐郡王天資英明雅好經術一覽偉其述作勤至發題篇端有正大純雅本乎仁義與經旨不殊其於丗教大有􅀘益命藩府板行賜觀中外者無慮數百餘帙用廣發越以表其志尚義山來属俾序其事予謂古之君子立言垂丗必藉王公大人為之主張方能信其説而傳不朽如曲臺礼經由獻王而明遺制毛公詩傳得河間而置學官今張君遭遇賢王得成其美将見與大雅不群之英異丗而同談者矣至於淵源之傳授辝理之深奥讀者自當知之又何俟見賣兎而設喻遇俑人氏而致問者邪元貞二年冬十一月謹題天徳柴氏悅親圗詩卷序昔四子問孝於孔宣父雖因材而篤所荅各異不過使親無所憂怡順顔情為難鄒孟氏復探源推本論臻其極曰此身能誠則親為之悅矣意者謂儻違於理雖奉承之至温清之勤日養二牲猶為不孝如其愛敬交至氣和色愉則菽水乃盡其歡矣在孔孟時去古未逺垂教警俗亦復如是况天理斵䘮人欲横流於千載之後哉天徳柴氏上丗為邢䑓堯山人後迁絳之曲沃逺祖有軍功以鐡劵賜其家祖諱堅金季仕至将仕􅀰􅁉州葉縣尹生子懋字秀實以丗故復徙居于豐治家接物廉慎有法推其贏餘尚義好施鄉里以善士􅁛今夀登八秩有二配邢氏壽七十有四生四子長曰伯璵次仲謙仲玉仲祥伯璵天性孝友善治生與人交誠慤有終始慈祥愷悌見於顔間清淡不樂仕進惟致養二親友愛諸弟為務至一門之内上下安冝和樂且耽憲司廉實聞于朝榮加旌異嗚呼丗之貪很無頼不顧父母之養且貽親憂与夫所争僅毫髮比更相媢嫉視同氣為㓂讎者聞柴氏之風亦知其愧赧矣雪堂禪師雖處方外素樂君臣父子之懿喜從吾徒遊以鄉里盛事乃繪諸圗􅀞形容其􅀊時家庭拜慶之歡将求館閣名卿見之歌詠以序引為請予為説以勉之曰方今孝治光􅂭仁風徳教洋溢海宇臣民感格理􅀔應尔然雲朔之俗素号雄勁以氣義相許今論其孝友之行固當以柴氏為􅁛首復能如孟氏所論誠之於身詩人所詠不匱永錫者而􅆀力焉将見化儕􅀋而美暢彜倫觀人風者簉名於史籍矣以是為贊倡之始云清香詩㑹序道不同謀咫尺兩間渺隔千里心有所會上下八方􅄎同一雲法性三藏弘教佛智大師江浙緫綂沙羅巴者聞予名而喜之不知於渠何所取也一日介應奉曹顯祖來約以深香閑􅃴與同一㑹於是開禪室敞賔席蒲團烏机列坐其次佳釀數行意甚怡悅主人出寳薫娱客温鑪回春楮煤凝雪牎日含暉岫雲借􅃳先之以青桂継之以緑洋糅以熟結加之都梁棧融沉爇氣欎膏煎黄雲作穟碧霧􅄥筵吟珮未染鼻觀先叅或䄂籠而歛瑞或心融而氣宣於是健詩脾却蒸湿燕飲助其淸勝志慮以之冲粹不知佛齊勃泥婆律大食真臘占城而相去幾何通為一洞天也衆客稽首向師曰今夕何夕餘膏䞉馥沾丐如是有不可思議者第恐造物者訝其多取而饜飫也師曰庸何傷且吾之爲香者衆而心香爲最曰戒香定香慧香解脱香解脱知見香是爲五分香天之所賦於我者如是而馨解脱知見爲妙用之極即詩所謂天生蒸民有物有則民之秉彛好是懿徳也貴夫能復其􅀄而爲物之靈也願此香雲徧滿空界作爲無量佛事以奉五老香供且合三百五十􅀊之夀祺傳􅀄庵七十五雷苦齋七十三閻静軒六十三王秋澗七十一貢評事七十而爲無盡藏說法不以可乎於是衆賔讃嘆曰昔逺師以廬阜清勝即於東林結社絶塵清寂之士不期而至者甚衆諸人依逺遊止獨淵明范寗召而不赴豈非有不屑者哉以今論之衆之殽雜一也心有所局二也香色執着似累干中三也何若師心境㕠清賔主兩忘不知我之爲香香之為我也而以心香為主也師曰有是哉遂相與一盧胡而别大徳元年三月吉日謹序送丁主簿南還序古人以良能並􅁛欲以善而将其能也不然豈惟敗事亦且有害于而身此必然理也丁生元諒主榖城簿之明年以事抵衛來謁有頃避席而言曰弊縣僻在漢南事雖簡山甿獵户氣甚鄙悍思有以教迪之於是請書其廟學殿堂門廡等額乃曰歸當辦兹一事先此之作用碇余􅀄志耳遂授書沾沾而去後七年冬十月復見吾于京師曰嚮云而廟而學者今巳落成且有加於前及出馮雪崖所撰學記讀未竟不􅁴􅁣嘆曰一簿力之專迺致如是非有志能然乎兼雪崖吾熟其為人慎許可記中件右恐匪徒言雖然年少氣鋭乗势作事佀或不難至於知喜其事而不虞其終顧其近而不思其逺無後悔者鮮矣况能保巳成之功而享有無窮之辝乎又甞聞士之當官公心多而取名薄者設有過舉徃徃人恕而紛解汝今此耒遇非常之恩千百人不一二值其為幸不幸誠不敢必所當念者此心不使有一毫之􅀻可也丁生其勉哉如以吾言可取念之戒之将見悔􅀹日寡良能並著何患乎禄秩之不吾至也旣行來辝書以為贈是􅀊癸巳仲冬五日序兊齋曹先生文集序北渡后斯文命脉主盟而不絶者頼遺老數公而已夤縁䝉元李諸公與進親承指授惟貽溪兌齋未之見也及調官平陽􅀻􅀼喜幸雖不􅀗瞻拜􅂂綦而遺文得遂觀覧逮識公仲子輗首爲詢及謝以纂録未就然徴文獻論家丗而􅀻淑諸人者固巳昭昭矣先生父清軒公資豪邁以文學起家受知榮國髙公雷李諸賢交游甚欵先生接迹詞林㓜知力學早擢巍科旣而與遺山同􅁺東曹機務倥偬間商訂文字未甞少輙至以正脉與之其奬藉如此後居汾􅀳閉戸讀書屏去外物嚅嚌道真及與諸生講學一以伊洛爲宗衆翕然從之文風爲一變後二十年予在翰林前長􅁑薄子輶持遺編來謁属予序其端方得伏讀者􅂯四不去手者累日因爲之說曰文章天下公噐造物者不􅀻所􅂌然非淵源有自講習有素力為之任者未易與議若先生之作其析理知言擇之精語之詳渾􅆂經㫖􅀷尚躰之工刋落陳言極自得之趣而又抑掦有法豐約得所可謂常而知變醇而不雜者也所可惜者古文雜詩僅三百首盖先生年方不惑瞑廢於家又為人慎許可片言􅃗字不輕付人嚮使展盡底藴大開文竇極其所到肆波瀾而侈光􅃩則與元李麻劉並驅為不難矣異時版本一出學者争光快覩俾中和之氣中融粹盎􅁉四躰而􅃴獨坐如大羮玄酒􅀉至味於淡泊者庻幾知先生之所尚云不肖衰老􅂴於筆研敢直言所聞見而知者以塞其請焉大徳二年人日謹序秋澗先生大全文集卷第四十二
