body:
  text: 王漏遲答􅀯楽令周幹臣來篇竹林幽思杳栖遲自嘆離群􅀌鳥萬里雲翔海樹去相依遶隣笛一聲喚起憶共聽朱絲雅調還自􅀏當年巳愧孫登清嘯情擾回首分飛悵落落相期望髙崧少會鮮離多經丗又誰曾了二子况成陳迹落月滿梁空照庭户曉得意眼中人少二子謂西溪春山二越山征路杳東􅀯澹澹長空飛鳥儷影同翻明月一枝烏遶共道有心避事甚未􅀂從渠相調君莫􅀏􅀯樓苦要胡床舒嘯空􅅰􅀞裏江山緫輸與風流眼中年少也學癡児官事幾時能了一曲驪歌未動還夢到三山晴照江月曉莫為賞音稀少前一篇懐舊有感曰鄰吹者為見􅀉樂府也朱絲雅調者為鹿庵先生也孫登者為足下與諸君也三子者為西溪春山兩忘年友也後一闋將行即事曰三山者福城中山也幾夢者為不肖拜命前後凢夢三至其處曰賞音不少者為彼中宋吏部陳菊圃者甚衆故云二篇自覺語硬意凢固非樂府正體望吾子取其直書可也三留别淇上諸君浙江江路杳蒼茫自嘆南飛烏鳥故國回頭夢裏青山吟遶手把一麾南去道不比八州常調君莫􅀏􅀯樓苦要胡床舒嘯休􅅰歸去扁舟􅀂比似陶朱尚猶年少飛泳雖殊友義固應明了擬覽九江秀色誰凄断関河殘照霜月曉去去眼中人少風入松觀灯下半開杏花一枝穠艶照華堂暖蘂貯春光冩生莫羡徐熈筆風流在百子池傍􅀧綴紅粧玉頰簾苫粉淡宮粧静憐踈影伴昏黄􅄈麝入爐香惜花人老情緑在雲幈晚銀燭髙張細㵼一杯春露浩歌㣲雨東墻三奠子都城七夕渺新秋節物客思天涯巖桂重碧雲賖煙華縈􅂵禁心事夢長沙青銅裏人未老􅁂先華鈎簾望月得巧誰家児女軰語空譁露翻梧葉重河映綺楼斜傾雲液歌金縷岸烏紗二登河中迎煦楼楼故址即唐崔徽白楼也壯河山表裏百二喉􅁭形勝地古猶今風雲全晉在草木故都深淡長空􅀌鳥没緫消沉東山髙卧梁甫長吟人未老􅁂毛侵平生多古意落日更登臨􅀝危闌窮逺目恐傷心三辛卯七夕時乆雨未霽中以感寓為湛新秋風露曖曖㣲霄梧葉下桂香飄鵲翻銀漢水人渡玉闌橋􅂬能幾虹影断渚宫遥人間多巧天上無憀今古恨苦相撩菓􅀲絲曲綴児女思空饒層軒晚香露濕可怜宵四悵神光奕奕天上良宵花露湿翠􅁫翹風回鵉扇影愁滿紫雲軺恨相望雖一水隔三橋朱絃寂寂心思迢迢人未老􅁂先凋翻騰驚丗故機巧到鮫綃凉夜永簫聲咽􅂐煙飄五隔盈盈一水􅂬㑹今霄梧葉上􅀨蕭蕭星沉開帳燭雲黯渡河橋渚官深離思苦兩無憀金針縷細彩舫花嬌兒女軰漫情饒巧來心愈拙絃促韻難調西樓月銀漢影碧夭遥江城子為張同知壽灤江晴漾首山前玉為淵秀相連總把華英都付使君賢梅竹堂深歌吹動香似霧酒如川列城千里聽鳴絃頌聲喧覺春偏争遣翺翔猶是貳車權滿泛一杯添壽酒懸斗印看他年二賦拜月圖一枝繁杏宋墻東翠惟重捲春風留得殘粧簾月拜玲瓏雲作􅁂蟬霞作􅃑香霧湿玉鬟鬆閑情都付燭華紅􅃈牎中照芳容細逐行雲零亂紫金峰天外翠鸞仙侣在城闕晚夢美蓉􅀯郷子近聞吾子有茂陵側室之舉順命故也且在音賢女雖有小星惠下之行不無欝悒自傷之意故首章託以自怨自責忌嫉傷善略不見也然怨不已則夫婦道乖故釋以人子之孝嗣續為重嗚呼啇陵穆子之悲衛荘姜傷已之嘆匪歌詩莫能宣其志此楽府之所以作也庶幾言之者無罪聞之者少有慰焉人物舊温􅀰心事珠簾月半床􅀏裏玉臺重藉手誰量折得楊枝惱孟光得鯉豈思魴老境其如伯道傷但願維羆應汝夢􅁛觴趂取春風慰北堂二癸丑三月廿一日􅀕龍祠回飲張氏草堂喬木色蒼蒼山頂難留落日光燈影碧流深幾許浮觴來醉張家第四􅂣丗事莫論量相對尊前兩鬢霜冨貴幾時當適意杯長問甚春星帯草堂三夏日同王子勉雷彦正王子􅀄納涼西園亭簾影静碁抨平野風來分外清一帶好山供望眼雲屏落日煙霏翠滿亭丗事不須驚底用相逄話醒常使玉瓶沙上酒如澠杖履時來月下傾四春日逰李氏園亭溪水浄灘沙紫動林梢半是花長日馬蹄閑信歩誰家暁入􅀯園到晚霞時事閙􅉕衙一片閑心逐去鴉爛醉玉瓶沙上酒生涯過眼浮雲不足誇五承㫖董公夀登七秩康寜好徳誠可慶也取坡例以玉案香歌之青􅃈漢中郎滿䄂長携玉案香記得賦詩撗槊日臨二氣壓風濤一葦航蓮炬晚分光諌䟽回天豸有霜七十平頭從此数􅁛觴滹水淵源慶未央六一雪静林皐冷壓浮陽氣不驕菜甲榆椒渾不動寂寥賺得輕黄上柳條詩思苦相撩酒盞新來頓絶交連夜客䆫寒佀水無聊誰約春風鎻綺寮七和幹臣楽府南鄊子南楽言懐中間更易两韻盖前人用音意之例也万彚帝城春况是明時選用人愛殺曲山周老子依仁任運不自論六任謾逢辰甚是荣華盡苦辛贏得歸來兒女􅀏蘇秦白馬紅纓衫色新一作潦倒客居雖有甑生塵日有詩來發興新卜筭子辛卯九月二十三日夜夣上層欄北望黒雲截空二龍尾足連卷下埀殊分明也􅁴而賦此秋澗老人識一抹截頭雲靉靆從龍發尾足連卷見半空霽色翻蒼鬣舉手欲攀鱗散我麒麟髮天外雄風祕化機吹落蒼煙峽青玉案賦紫金沙緑隂暗盡西城樹人緫道春歸去裊裊柔條髙幾許絳燈閃爍翠雲萦護元有留春處金鐏未厭傾芳醑醉墨題詩要香露胡蝶飛來何栩栩向人有意繞欄翻舞以約花間住臨江仙壽李莭使桂石中朝黄閣相河山千古􅀯州多君談􅀏覔封侯朱輪繙皂盖錦帶佩呉鈎滿府治聲歌五袴梢梢俊氣横秋今年夀席更風流青雲新甲第一􅀏醉金甌二八月一日同髙仁甫李靖伯史潤之餞伯昌東行韓明日至滑得隂疾後三日舟載西還夕次其門東劉家渡而殁得年五十有九韓予出就外傳時同舎生也哀哉昨日舉盃親餞别六人吟嘯呵呵今朝丹旐颺城阿一棺零落恨都付逝川波萬事轉頭眞是夣两輪來徃如梭人生百􅀊合如何放開眉上鎻得酒且髙歌三送治中李公天上雲衣無定態眼中時事休驚年來鐘鼎到書生一麾仍出守五馬㸔專城千古金陵佳麗地中郎素有先聲一江春浪暮煙平此身眠食外萬事緫虚名四爲曲山作别墅寒梅方入夣多君來報花期野塘流水小橋西南枝香爛熳却恨賞音稀正有玉堂人最愛垂垂兩鬢如絲和羮心事未􅀿遲金樽重醉倒且莫晚風吹蝶戀花賦來禽歇枝今􅀊㝷芳春巳誤一粒丹砂不到來禽樹滿意紅芳春也妬長條簇滿珍禽羽花道無情􅀿有素似惜金樽一醉珠簾暮春自還來花自故人生最恨離筵苦二昔鹿庵顒軒樂育淇上一時秀造號稱多士建中元已來例䆠㳺四方僕二十年間絻三至郷里􅁣然有離索之歎今歳投紱自濟南來歸而諸公頗集所欠者唯王尚書子勉傳漕使士開耳因賦樂府以見歡㑹之不恒聚散之有數也至於義安分定辭兼六客􅀝聲者當自知之恐酒酣耳􅀬後不無倒冠落佩之適也淇水當年麟鳯渚回首飛翔落落風雲舉三疊陽􅀜回首處渭城柳色朝來雨今夕何年天所與白髪歸耒一􅀏同歌舞醉裏相將㝷杖屨苕溪風月無今古三緑暗蘭臯春雨暮露浥風吹馥馥香如霧一曲清歌花觧語落紅羞滿沙頭路錦瑟華年誰與度夜月珠簾腸断春風句我自興來聊一顧醉䰟不到凌波歩四和曲山韻因爲贈之經世此心誰盡了欲􅀞麒麟功業何由到白髪滿頭青鏡曉花開花落人空老適意杯盤從草草甘坐清貧方駕郊和島最愛新詩情致好篇篇直壓元郎倒太常引送王嘉父去年鞍馬客南鄘奈告别苦怱怱今歳又相逢喜客舎清樽屢同仲宣楼上杜陵幕下着處話途窮好去漢元龍道休着青春􅀒公二壽龎咨議髯郎風度幕中蓮已師範使君賢􅂹足快騰騫道好箇龍家土元滄浪髙興寒花晚莭秋色滿淇園一盞願遐年要都釀君家百泉三夀劉同知太行晴色泛簾鈎對書史日優㳺賔從儘風流誰健似東陵故侯人間萬事塵埃野馬一􅀏付紋楸眉宇壽光浮􅂸醉過黄花暮秋四周都運生朝時添壽王村量蟠英偉氣和愉道滄海得遺珠忠義與心俱見漕府歸來轉輸山呈霽色杯添野水春滿野人廬鄭重萬金軀要羽翼當年漢儲五爲王同知壽雍容詩禮冠時髦都忘却貴人嬌横槊見英標道勇佀當年嫖姚黙含萬動德尊一府歌夀聽民謡縁髮映金貂儘千尺青松後凋六爲万奴緫􅃹重於山岳藹如蘭喜一旦得同官裁鑑􅀏談間道不似當年將壇一年好處中秋節近涼露洗金盤丹桂月中看儘耐得人間歳寒七奉􅀉參政李侯仲實自北京行省改授安西王相人來徴詩於予因作此奉􅀉時屯田涇陽規畫財賦北平移鎮入咸秦説睿眷更情親下手見經綸道好箇中原老臣萬屯曉月一鞭農事涇水􅀞中春陸海儘藏珍佀只欠侯封冨民八春風碧水静林丘對書史日優㳺來徃更風流問誰佀東陵故侯黄陂􅁭度曲江譽望山立看􅀭休春釀儘禁篘拚醉盡蟠桃上秋九送叚信卿赴河東憲司經歴北來􅀌劒欎蒼顔聽時事立談間秋隼正騰翻莫便􅀝霜空􅈝寒太行秋色汾川鴈影極目送歸鞍簿領憲司閑道好箇河東幕官十夀陶珉溪南枝梅信􅀧氷妍覺􅀄度得春偏人物鱣堂仙㸔才思渾如湧泉悠悠徃古紛紛俗學鞶帨繡空鮮青鬢莫蒼然要折􅂨陶家講筵鷓鴣引為王太夫人壽簮纚瀟然自謝林一家柔範到周南以賢論母書彤管有子能官盡孝心香霧碧夀樽深歳時春輦醉花隂從今叢慶堂前月翠竹髙梧聽鳯吟二和周幹臣韻中綂五年三月十二日夜陪徒單文與雷彦正夜語門外東風駐馬蹄月明庭樹緑隂稀眼中時事驚天運醉裏㳺談佀口機思逺走擬髙飛此心安得與時違遺書浩蕩三千卷未分窮愁老布衣三韓氏别墅竹映方臺翠滿湖煙靡荷露浄郊居棣花輝映春風􅀍雲錦香翻碧玉壷吟􅀝杖卧看書一家風景輞川圖酒盃儘泛床頭瓮未礙門多長者車四謁太一官贈王季祥來謁齋官又五年道人邀我坐前軒只驚前度劉郎老不見庭松偃盖圓人與鏡兩翛然呼童茶罷炷爐煙壁間一軸煙蘿子依約風流隨眼前五爲樂籍張惠英賦秋水芙蓉鏡裏仙一枝明王濯煙鬟鶯初觧語調柔舌桞不勝嬌拂􅀞欄催疊皷按弓弯樓心低月怯清寒人生莫惜􅆞頭錦能得春風幾度看六野粉宫墙暮雨邊洛京依舊鎻婵姢一聲金縷関情處滿串驪珠訝許圓金谷月石樓煙留連光景待他年襪塵休放凌波去更聽新翻倒玉舩七浴鳯池邊飬相材朝端先肅漢儀開九秋灝爽臨初度千丈恩光動憲臺鏘劒佩望蓬萊翠華南扈拂天來一枝好在霜前菊留待清香薦壽盃八爲耶律緫􅃹太夫人壽遼海千年將相家婺星光動赤城霞囬㸔􅀞㦸淸香地滿意春風玉樹花金椅背紫雲車謝林風度見來賖夀波㶑灔宫壷暖滿泛秋光醉緑華九何處人間淑景新韶光都付牡丹春後庭花老空瓊樹曲水江深見麗人金屑粉香裙近前細看倒芳樽惜教赤壁磯頭月吹散春風陌上塵十何處人間淑景新劉家池舘鮑家春後庭花唱空瓊樹曲水宫粧見麗人金作粉麝爲塵一枝千葉擁黄雲花工可是多情思夢逐凌波問洛神十一丁亥上巳日與諸君宴林氏花圃李氏以歌曲侑觴醉中懇求樂府賦鷓鴣天以歌之李氏字蘭英樂藉之名香者也花草離騷試品量猗猗香色紫蘭芳樂棚擢秀名何麗楚澤含秋思更長金縷曲紫霞觴留連光景醉銀塘竹西歌吹歸時晚也勝楊鞭問􅁑強十二拾翠仙洲野興長樽前一曲杜韋娘人憐暖日明歌扇我愛蘭英媚國香供楚偑􅀏梅粧春風着意泛崇光老懐不到凌波夢要遣琵琶送一觴十三香静堂萱燕處温一家柔範􅀍郷隣三牲奉養真純孝八十康寕是福人巖菊晚嶺梅春半容林下舊精神婺光不動雲衢爛供佛床頭景氣新十四贈馭説髙秀英短短羅桂淡淡粧拂開紅䄂便當􅂣掩翻歌扇珠成串吹落談霏玉有香田漢魏到隋唐誰教若軰􅃹興亡百年緫是逢􅂣戯柏板門鎚未易當十五先相風流德業尊又看天馬五花文飄飄青鎻凝佳思靄靄新詩佀嶺雲淮海秀巳平分珪璋未礙琢來勤呉人元重中州氣繡􅀍何甞擅鄂君十六潦倒衰翁不足尊更堪刺口論詩文經涂江浙多蘭友照眼呉山霽霧雲傷别夕惜經分臨􅄮一語見微勤萬艘未是周郎忘他日經綸要使君十七辛卯九月二十三日靖伯仲先携酒相過客去醺然獨坐以見酣適之意云波蕩江湖萬里餘歸來縮首伴凡魚門從席後軒車盛鬢自霜來䆠味踈思徃事注殘書閑鋤明月種秋􅂼傍人莫􅀏楊雄宅好事時過載酒壷十八閭井錐刀劇戰烘詠歸奚取舞雩風道開聖學千年後春在先生一畆宫敦誨誘見從容絃歌不隔縵紗紅珉溪幾􅀧梅梢雪歳歳吹香入壽鐘虞羙人紅顔緑􅁂無長好日對菱花老頭童齒豁竟何禆只有飢時餐飯飽時嬉因行消散昏和悶却覺筋骸困那錢置箇馬兒􅀐食飲難消終目繋門陲二謝成耀卿僉事携酒芋相過山瓶乳酒甘如􅁡鴟芋堆盤赤見君相贈固多情潤我枯腸一吸破愁城秋光湖碧西湾㶑不到心中慊何時盡煑土芝香醉飽歸來肯把故山忘一作醉後帰時􅀐馬似知章西江月清明拜掃回值田家野飲有頒白者邀余就飲因實老人之意作西江月以歌之社皷驚飛梨雪村簫吹破桑芽清明野飲見田家老叟邀余下馬勸飲一巵芳酒繞看滿樹幽花盃盤草草樂年華不棄同來觀化二閑歩州南古堤返照斜明􅀟塔乱山囬繞􅀌城年來風物侶昇平人説三王善政丗事正冝静待田園好去躬耕雲間歸鳥有遺聲喚起投林髙興三大河凝氷蔽川而下與一二寮友登白樓俯觀賦此詞以歌之散䇿暫辝鳬吏􅀝樓來聽漁歌夕陽西下乱山多白鳥蒼煙衝破一夜朔風吹雪白雲飛滿長河不􅀅幽夣付凌波意在呉􅀰􅀞舸四贈張子文聮轡閑談詩雅停盃髙詠晁詞山城投宿晚凉時邂逅青雲公子濯錦江邊相憶鳴條山下分携秋風摇蕩菊花期竚候翩翩歸􅀐五継張孝純韻郢下空歌白雪琴中誰聽髙山人生何用釘踈頑不過兩盂日飯夣到鈞臺老樹秋風閑煞漁竿沙鷗無數􅀧江干知我忘機去慢六夀王中丞梅蘂暗傳春信菊枝儘傲霜威風姿元與歳寒期况是小春天氣翠實調羮未晚秋香添壽多宜髙名北海舊蟠螭未似東山雅意七壽李彦祥近歳憶㳺竹里今年來遇生朝平生洒落邑中豪邂逅風神不老賞盡山陽煙景去翻毫海雲濤太行晴色任秋髙人與黄花長好黒􅃮弩遊金山寺并序隣曲子嚴伯昌甞以黒􅃮弩侑酒省郎仲先謂余曰詞雖佳曲名佀未雅􅀂就以江南煙雨目之何如予曰昔東坡作念奴曲後人愛之易其名曰酹江月其誰曰不然仲先因請余効顰遂追賦㳺金山寺一闋􅀝其聲而歌之昔漢儒家畜聲妓唐人例有音學而今之樂府用力多而難為工縱使有成未免筆墨勸滛為俠耳渠輩年少氣鋭淵源正學不致費日力於此也其詞曰蒼波萬頃􅀌岑矗是一片水靣上天笁金鰲頭滿嚥三盃吸盡江山濃緑蛟龍慮恐下燃犀風起浪翻如屋任夕陽歸棹縱橫待償我平生不足二曲山亦作言懐一詞遂継韻戯贈休官彭澤居閑乆縱清苦愛吾子能守幸年來所事消磨只有苦吟甘酒平生學道在􅀄心富貴浮雲何有恐此身未許投閑又待看鳯麟飛走好事近過南雲門南北兩雲門竹圃稻畦如􅀞罷亜黄雲萬頃自長渠飛洒太行鍾秀盡三郷形勝逓髙下􅀏我年來用捨佀田間秧馬二嚐􅀧東坡橘楽湯作石鼎響松風茗飲老來多怯喚起雪堂清興瀹鷓斑金屑橘中有楽勝啇山香味不容說覺我􅅐中磈磊􅀍春江澄徹三賦庭下新開梨花軒鎻碧玲瓏好雨􅀄晴三月放出暖煙遲日醉風簷香雪一樽吟遶洗粧看玉笛莫吹裂留待夜深庭院伴素娥清絶四春寒繼蚓君卿韻三首斗柄轉春城向暖小桃開徹不佀今年正月過深冬時節故將新巧發隂機春事未容說且就驅雲風箒掃西山晴雪五宫殿曲江頭漠漠輕隂開徹花栁都城三月正禁煙時節珂鳴轂擊玉泉遊故老向人說一片春風簫皷蕩梨花香雪六華髮一衰翁丗事眼中看撤只爲年來薄䆠􅀒東山髙節􅁳􅁳神理到無憑此外更何說安得百壷春酒掃覊愁如雪玉樓春冬至夜侍祭隂消陽長從今數除客歸來聞好語月明滿地紫煙生暖入刺文添繡縷冷風肅肅生庭户桂酒光清摇燕爼今冬記我致嚴時爆竹聲中聽五皷秦樓月今歳八月自哉生明夜月色如晝及至良夕乃作風雨所謂獨向此時偏者詩人不得無悵然之情也取太白詩例賦秦樓月一闋歌以問之是夜月色亦佳但微雲􅀧綴耳華陽閣一年心賞中秋約中秋約九霄風露有懷都豁桂香和雨風吹落􅀝欄望處秋煙薄秋煙薄一樽能與素娥同酌二花時樂醁樽記醉平津閣平津閣一聲金縷滿堦紅藥小欄此日情瀟索土膏一寸春如削春如削幾時盻到絳燈紅爍已丑􅀊春分前一日栽培衆卉罷晚坐前閣無以觧之偶得催閣芍藥辝秦樓月一闋因放聲自歌浮大白者數行實至元二十六年三月二十一日也時夜漏交二皷燈下書秋澗老人題秋澗先生大全文集卷第七十六
