front:
  text: 秋澗先生大全文集卷第七十八
  hash: sha256:85ce0bcbbefc9794ab88f36db8da685d1bb0c7d1e23a18335a61e422ee042537
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_078-1a}
body:
  text: 進承華事略牋臣惲謹言伏以學止虚文在明時而何􅀘士傳民語恐小道之可觀俯􅄋愚衷仰陳瞽頌臣誠惶誠恐叩頭叩頭恭惟皇太子殿下温文海潤孝敬日暉方丕承天序之時有歴試諸難之命事統殆萬幾之廣君門邈千里之遥雖叡足以有臨明足以繼照仁足以及物智足以周知復多識於前言乃益隆於孝治謹採儲闈之事要庶幾賈傅之遺規儻賜乙觀豈勝至幸波洋少海固不擇於細流徳表華箴􅀼効持於衆美臣惲今所纂集名曰承華事略凢廿篇釐爲六卷謹奉牋投進冐瀆嚴威無任激切屏營之至臣惲誠惶誠恐叩頭叩頭謹言至元十八年十二月日臣王惲進承華事略序臣惲甞讀文王世子賈􅁩保傳篇二者教飬大子之方盡矣苐去古逾逺其典禮有不復行於今者又伏念殿下春秋鼎盛以天挺英叡之資復有不待學焉而後能者故臣愚慮敢述其切時近用可舉於今庻有􅀘於來者著而爲篇然事有先後必循序而進􅀼謂孝者德之本也唯天子之孝以寕親敷教爲大故首之以廣孝愛者孝所生也惟孝友于兄弟故継之以立愛孝愛旣立亟當正者國之本也故繼之以端本本雖端非學無以成其德故繼之以進學學不無異端之害故以擇術謹習次之教尊德成必取正於官非聽政無以驗諸用非逹聦無以周其知故方其聽政即以逹聦繼之國政之外兵戎爲重故以撫軍次之軍國事殷舉措之間恐渉僣悞故以明分次之文武並用長乆之術故繼之曰崇文尚文之實親賢爲夲然不可不辨其邪正故親賢後繼之曰去邪正人之言無匪弘益故繼之曰納誨雖聖人不能無過諌而能改善莫大焉故先以親之幾諌次以已之從諌思互爲儆省爾至􅀂仁民愛物非德澤何以加故預之以推恩德加於民而儉約逸豫居上者尤所當尚戒天下之事無大小官得人則治故以審官終之自廣孝至審官凡二十篇􅁵爲六卷篇有圗俾見古人當時事蹟之偉後有􅀃以致愚慮循序近用之義且易於按觀焉題之曰承華事略臣不自揆㳙埃之微何足以益崇深之海嶽猥以惓惓愚誠庶千慮一得或可仰禆儲闈萬分之一蓋臣素願也臣王惲謹序承華事略目録第一卷廣孝立愛端夲第二卷進學擇術謹習第三卷聽政逹聦撫軍明分第四卷崇儒親賢去邪納誨第五卷幾諌從諌推恩第六卷尚儉戒逸審官承華事略卷第一廣孝禮記文王世子篇曰文王之爲世子朝於王季日三雞􅀄鳴而至於寢門外問内臣曰今日安否内臣曰安文王乃喜及日中又至亦如之及莫又至亦如之食上必在視寒暖之節食下問所膳命膳宰曰未有原末無也原􅂯也無令使先進之物􅄪進恐臭味􅁖也應曰諾然後退武王帥而行之不敢有加唐玄宗開元二年宴京師侍老於内殿八十至九十者版授賜爵及几杖粟帛有差紿一子侍婦人亦如之其孝子順孫終身勿事征防兵父母年七十者遣還民天寳十三載詔天下家藏孝經臣惲伏聞殿下天粹元良日隆純孝其問安視膳於兩宫之間與古契者多矣然於君父之孝復有當廣之者如承顔順志俾聖躬寜於上庻事康於下乃臣子孝敬之至故楊子孝至篇云孝莫大於寜神謂尊祖考安神靈也寜神莫大於寜親終於四表之􅌚心如唐之賜爵給帛孝子勿事征防親年及者還民及詔天下家藏孝經有三王四代飬老之遺風焉豈非德加百姓四表之􅌚心者乎惟殿下詳覧益廣至德立愛書伊訓曰今王嗣厥德㒺不在初立愛惟親立敬惟長始于家􅀖終于四海後漢和帝爲太子時特親愛兄清河王慶入則共室出則同輿及即位待慶尤渥慶或時不安帝朝夕問訊進膳所以垂意甚備唐睿宗諸子傳曰玄宗爲太子甞製大衾長枕將與諸王共之睿宗知喜甚及先天後盡以隆慶舊邸爲興慶宮天子於宫西南置樓其西曰花蕚相輝之樓南曰勤政務本之樓帝時時登之聞諸王作樂必亟召升樓與同榻坐或就幸第賦詩燕嬉賜金帛侑歡丗謂天子友悌古無有者時有鶺鴒千數集麟徳殿廷樹翔棲浹日長史魏光乗作頌以爲天子友悌之祥臣惲切惟父子存乎天性兄弟謂之彜倫友愛親睦人心之良德也孔子曰惟孝友于兄弟施於有政兹蓋言常人以一身齊治尚先悌於兄長故能施政事矧國之儲貳家有四海者歟異時將以立愛立敬睦九族建宗親使維藩維城之􅀔屏翰王室措天下於磐石之安不以友愛爲本可乎故伊尹於太甲嗣位之􅀄不遑它務首以愛敬爲訓太甲竟能誨過思庸言思念常道也復爲殷之賢君唐明皇以一念深至致開元雍熈之化兹非前世之明效歟端夲尚書太甲下伊尹訓太甲曰一人元良萬􅀖以貞唐燕王忠傳許敬宗曰本正則萬事治太子者國之本也魏元忠傳􅀽楚客曰夫安天下者先正其本夲正則天下固國之興衰係焉臣惲謹按孟軻氏曰天下之夲在國國之本在家家之本在身人君者天下之表則故以一身爲天下之本太子者國之儲副天命所係屬人心所歸問是夲正則國正國正則百官正百官正則逺邇莫敢不一於正故伊尹之訓太甲正謂此也且政者正也以正而正不正者也今殿下方開物成務作貞萬􅀖思取法於正者非一而端本澄源其可後哉承華事略卷第一承華事略卷第二進學昔殷髙宗爲王子時問學于甘盤及厥德罔顯得傳􅀃而告之曰爾惟訓于朕志􅀃曰王人求多聞時惟建事學于古訓乃有􅀗事不師古以克永丗匪􅀃攸聞又曰念終始典于學厥德脩罔覺髙宗承說之教至四海咸仰其德漢顯宗立爲皇子師事愽士桓榮學通尚書令荣止􅀫宫中積五年榮上䟽云太子以聦叡之姿明逹經義觀覧古今儲君副主莫能專精愽學􅀂此者也斯誠國家福祐天下幸甚臣惲觀自古人君雖秉聦敏叡哲之資必由學以成其德者蓋所以䆒聖政明新之理以正其心術通古今治亂之源以増其智慮使聖益聖明益明雖比隆唐虞無難且如射弓學書一藝也非習焉尚不能造其妙况治國平天下之道哉故傳說告髙宗使終始常在于學旣無間断則徳之所修有不期然而然者此之謂也伏聞殿下屢召儒臣講肄經史進進不巳非惟緝熈光明抑以仰副聖上訓學之意為國福祐豈不偉哉擇術晉元帝立子紹為太子帝好刑名家以韓非子賜太子庾亮諌曰申韓刻薄傷化不足留聖心太子納之太子是爲晋明帝臣惲按申韓之學非惟刻薄而巳且導人君以驕滛放恣李斯甞以誤二丗矣豈可以教儲貳者邪􅁃亮雖清談之徒然斯言則有益於丗故取焉謹習漢景帝太子徹聦明有智術好詩書善史􅀠時竇太后尚黄老言今太子諸王通讀之太子獨能解其意而心弗好也每還宫取儒書名法之術習讀之及初立即能表章六經罷黜百家舉用俊茂與之立功至號令文章焕焉可述元帝賛曰元帝多材藝善史書鼓琴瑟吹洞簫自度曲􅀍歌聲分刌節度窮極㓜眇及即位牽制文義優游不断孝宣之業衰焉臣惲謹按保傅篇陳教太子首以所習爲言蓋謂性相近習相逺也且常人所習或違逺善性猶云不可况生長深宫極於冨貴者可不慎歟如武帝之黜百家尚儒術尊先王之道知所統守容受直言好賢不倦正由謹其所習於􅀄故也逮其孫孝元習音曲爲樂至牽制優游不果於断二君之用心賢否可不鍳哉然仁孝禮義詩書射御乃所習之正也今殿下仁孝恭謹聞於中外在移飬嗣德之􅀄能所習皆正無一念不謹臣知雖放心快已之事曰陳於前不能奪巳成之習巳定之心矣如此其於守成持盈何有承華事略卷第二承華事略卷第三聽政元魏太武帝燾少聦明大度旣立爲太子明元帝詔臨朝爲國副主以長孫嵩宿徳舊臣歷事四丗功存社稷奚斤辯捷智謀名聞遐邇安同曉解俗情明練於事爲左輔坐東廂西面以崔浩慱聞強識精察天人穆觀逹政要識吾㫖趣丘堆在公專謹爲右弼坐西廂東面百官揔已以聽帝時隱而窺之聽其大說謂侍臣曰以此六人輔相太子吾與汝曹廵行四境伐叛柔服足以得志於天下矣群臣時奏所疑帝曰當决之汝曹國主也臣惲觀歷代明君皆令儲貳監國政者正欲移飬君體厭服臣下審明治道熟知民事爲務猶聖上今日之付殿下豈特使經理機務習熟節目者哉然政之紀綱不過審慎官爵勤恤民隱明信賞罰至公無􅀻而已所謂審官任賢使能與我圗治也所謂恤民輕徭薄賦以厚民生也所謂明信賞罰使功罪允當聞者恱服也誠能如此雖堯舜之治不是過也惟殿下留神省察逹聦唐太宗問魏徴爲君何道而明何失而闇徴曰君所以明兼聽也所以闇偏信也堯舜氏闢四門明四目逹四聦闢四門者謂開闢四方之門廣致衆賢明四目逹四聦者謂廣視聦於四方使天下無壅塞也雖有共鯀不能塞也静言庸違不能惑也故曰君能兼聽則姦人不得壅蔽而下情通矣臣惲謹按尚書舜典曰闢四門明四目逹四聦盖人君居九重之深所聞所見者不過左右前後之事此舜之所以逹聦也故逺聽於忠良者則聞所未聞偏聽於左右者則事多欺蔽伏惟殿下方毓徳春宫重光華夏於圖治有爲之􅀄逹聦廣聽似爲急務又傳曰審所以聽言受事則下不欺蔽矣如中統元年許諸人陳言亦逹聦之一端也撫軍春秋閔公二年左氏傳曰晋侯使太子申生伐東山皐落氏里克諌曰太子奉冡祀社稷粢盛以朝夕視君膳者也故曰冡子君行則守有守則從從曰撫軍守曰監國古之制也西漢髙帝紀帝征淮南王布乃發上郡隴西車􅀐巴蜀材官及中衞卒三萬人令太子監撫関中唐順宗爲皇太子德宗幸奉夭太子常親執弓矢率軍後先導衛及戒嚴朝夕巡城傳宣撫慰督勵戰士故感激􅁬發氣益百倍臣惲切見聖上徃年詔殿下領樞宻院事正古昔撫軍制也每􅀊車駕廵幸兩都以萬乗之冨六軍之衆如大獵以軍律驅馳􅀫衞按羽林環布殿下躬行扈從所當齊整軍容撫慰將士使逺忘䟦渉之勞日聞歌舞之樂夫仗所臨宵嚴晝肅致鸞輅清寕省方之外無他軫慮誠臣子起居之大節也至於樞府軍務比之先日尤冝仰留睿筭廼天下安不忘武備之義也明分西漢成帝紀曰帝爲太子寛􅀶謹審􅀄居桂宫上嘗急召太子出龍樓門不敢絶馳道上遲之問其故以狀對上大􅀃乃著令太子得絕馳道云唐肅宗紀曰􅀄立爲皇太子有司行􅉺禮其儀有中嚴外辨其服絳紗太子曰此天子禮也乃下公卿議蕭嵩等請改外辨於外備絳紗衣爲朱明服乃從之臣惲曰甚矣名分之不可不明也何謂名公卿大夫是也何謂分君臣上下是也一或不正何止動生悔吝且有事言不順之忒矧太子正名辨分者也使天下明知儲副有尊君卑臣之德異曰撫臨萬􅀖安有干名犯分事言不順者哉如漢成之岀龍樓門而不絶馳道肅宗之易絳紗而改服朱明誠可以爲後王之法云承華事略卷第三秋澗先生大全文集卷第七十八
