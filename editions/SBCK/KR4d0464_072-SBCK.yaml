body:
  text: 題䟦題遺山手簡後公道存在上者惟恐士之不才公議廢當涂者惟恐士之有才此古今通病必然之理也昔伊川與韓相維游許昌西湖坐間有以書投韓者程視之蓋干進者也程曰相公亦令人求之耶况尔後乎冝其藩維􅁄􅃈遐想玉堂如在天上也觀此帖者幸不以遺山爲疑可也題張嘉貞北岳碑後余少時喜作擘窠大字甞書岀師表于屋壁房山劉先生過而見之顧謂家府曰毋令輟學後當名家因問余學書覺有進否對曰不知但今日書明日視之有大可惡者又不擇諸人書以余拙視彼善者即黙識於心及省書當之必倣其筆􅀔先生曰此即汝所進也旣而出此碑見贈且提誨曰古人書有當玩而必習者有未易學而當玩者吾今以是授􅀂非欲汝師之也俟盡參衆妙立筆後時時玩其意味可也晚年當有所得此帖藏幾三紀未甞發視仐􅀊巳丑予六十有三追憶徃事時時取觀覺日有所得乃知房山之言爲不妄不然後生愛風華老大即厭之而然歟觀其簡古曠逸􅀄􅀂緩散不收一一視之内方而外圎風骨偉秀殆似夫上簾瞻對鳯鳴朝陽時也前人謂焦山鶴銘乃逸少龍爪書或者謂未􅀂以大辯􅀂訥大巧若拙方之爲近似余於嘉貞書亦云唯具眼者當識之因嘆吾老矣技進而道不至是亦所當懼也然張么唐名相今見千丗者止此耳枝雖微固亦有不可廢焉者剪製巳遂題記於後示阿孫鞬郎且使知嗜古者莫書學爲重何則先賢手澤在焉故也是夏六月二日秋澗老人記題山谷手簡後文瑞名璋侍御于文瑞奉使江西回以山谷訴哀帖見貺觀者致疑其間予曉之曰公孝友純至當痛酷摧裂之際意有不在書者此正言不當文之義也若以微瑕而棄連城之壁非余之所敢知也題竹溪詩筆文獻党公大定間翰墨爲天下第一如雪溪黄山輩皆北面師尊之冝其片言􅃗字爲後丗寳藏仰之如泰山云題家藏禱佛帖後顔魯公書氣洞金石精貫白日然得長史心法筆力日進遂集大成公之書可知冝其使長沙比靣髙閒終不侔也􅀄藏者平章政事盧予時盖自琉璃缾中恊神筴者也大元已丑秋七月秋澗老人曽収題左山所書春露堂後余搆春露堂之明年參政左山商公作三大字自燕見遺因刻而榜之吾廬爲爛然也公今嵗壽登八秩觀其書端莊婀娜略不見衰老之氣吾喜其所飬至剛非唯書之盡善也公爲人雅重深謀其翰墨之工在公爲餘事然嗜好之篤營求之切殆飢渴之於飲食只以功業相逼有不遑專事者當急遽際甞與予論及津津然喜見顔間不知老之將至日之云夕也方在藩府時以分陜之重横當事衝至與貙虎相􅅮者屢矣未甞見志之衂氣之靡降而少屈規其所不可求避其所不可免者此所謂砥柱頽波迄然而莫傾者也求試其心之所在蓋安命順受而巳旣安且順則心乃定心乃定則氣不餒氣不餒則道可以坐進而况枝之云乎醫家有云榮衛可以知人之脩短予亦謂文翰可以卜士君子之盛衰仐觀公書以精神氣􅆋取之是知公之夀考旣􅂄而艾也必矣豈斯文未喪造物者將属之於公耶於是書以自警至元戊子夏四月十二日謹題題張氏所藏先卋手澤後昔人以長不識父對其􅀞像輙拜而垂涕張㑦以勞卒軍中子用道痛乎不覩其没毎得其手澤雖片言􅃗字洞洞焉奉之如恐失墜其於􅀚行速肖之心爲可見矣題時苗留犢圖君子之居官也論其􅁛與無愧而巳苟能致君澤民雖禄之以萬鐘繫之以千駟將受焉而不辭况巳之所當有乎若苗之事持清而近名矯枉過正者耳然使貪墨畏人者聞夀春之風亦可以少知愧矣此京兆王雲筆也以年深色故因之􅀘綴頗踈妙意至布置分數尚當與斬蛟圖氣勢兩相髙也戊子夏五月秋澗老人題題自書歸去來后録事參軍丹陽薛君文曜携佳帋見過請余書晉處士陶靖節歸去來辭是日晨氣頗爽在庚伏中難得朝也乗筆墨調利心手相應忽憶徃年過曲陽見唐宰相張嘉貞所書北岳廟歌歌碑不覺行墨以入其體識者莫訝其刻鵠也題郎官石柱記後眞生行行生草顚之草至稱之爲聖其法蓋先能楷所謂善行而後能走者也郎官石柱記以予聞見今在丗有三本梁崔氏贈余與平陽曹氏所藏壽國公故物同出一石但未知柳城姚氏所寳者何如耳商左山云正刻舊在京兆兵後淪入公堂址下恐不復出矣汝軰冝珎惜之其姿體端方清勁似出歐虞自成一家少陵云卓立天骨森開張者也至元戊子七月朔秋澗老人記䟦蔡㐮書後甞觀心畫水鏡宋一代能書者不少然蘇黄一出爝火難爲光矣㐮之書在當時極爲坡所推重恐是徐行後長之義夢卿好古得於法帖者甚多書學予非深之者不千里逺來求題評此亦不可曉也秋澗老人題題哀江􅀯賦後示韓陳二生史􅁛信有文集二十卷行于丗今秖見者此數篇而巳乙卯􅀊予得之于沙麓蕭茂先家迨今􅀊戊子盖三十四年矣近目疾瞑坐者浹旬二生來問適新是帙令句句詳讀且究其用事非徒然也蓋辭之爲體甚多學者不無利鈍于其間汝等文竇方開然有望而未見者故令觀覧欲彼摩其朴鈍發其清新此老夫之意也嗚呼理者性所自出才者氣之所由形中人以上苟得其養性使可復才也者不可強而致也或曰理重才輕取其重而舎其輕可也曰􅀔有不可偏廢者焉理則體才則用也體與用具然後可以持躬而應物二生其志之䟦楊􅀘之墨梅後花光梅在前宋爲第一賞之者至有買舡來住之語及􅀘之一出變苦硬爲秀潤曽觀春風雪溪二圗者乃知予言爲不妄一有自題云日移清影人立黄昏其用意不分固巳神疑于此君矣昭陵六駿圖後序物之賢否一定論其遇不遇可也昭陵六駿天降毛龍授之英主俾剪隋亂及其功成琢石爲像太宗親題眞賛以傳不朽何存殁遭遇其爲幸也如此冝其聲華氣艶上與房駟争光故潼関之役備體渙汗又何神哉如昭烈之的盧冉閔之朱龍名雖存而形何見焉大史公􅁛閭閻之人雖砥行立名非附青雲之士惡能施于后丗者是巳予藏此圖乆矣特䊋潢以備珎玩因題品卷末以寓余之所感云書送鄭尚書序後韓柳文多同時相顧而作如送鄭􅁠序饗軍堂記之􅀋是也筆􅀔翩翩若相陵跨者柳之記間架曲折宏深雅麗出竒無窮然不過崇洽閈閎饗燕軍容之盛而巳序之爲文􅅻五百餘字雖云後出詞氣絶勝令人讀之抵一部嶺􅀯方志覺海氣拂拂來逼人矣其終篇致意最妙專以貴而能貧仁而不冨爲主委曲謀猷之壯從容箴戒之深誠有関於嶺徼之治亂爲尚書􅁠之藥石也近年某官有奉使句麗煩於乞索者至爲東人易而傷體信乎貪而無威微而無經術者不可以華逺而􅀉邊方重命嗚呼公之斯文曰經丗柔逺之長䇿可也作之明年公卒在諸文極爲老筆又見其氣之至耄不少衰也如此韓生因􅀃有問特書此以示戊子冬十一月十日也䟦蔡蕭閑醉書風簷梨雪瑞香樂府二篇贈王尚書無競王後有䟦語小楷數十字極妍勁可愛樂府尚豪華然非紈綺中人未免隣女效顰耳明秀一集以崇髙之餘發而爲詞章如飲内府酒金沙霧散六府爲之醺酣方之逢麴車而口流涎者固有間矣䟦竹溪所書墨苑篇後東坡先生百丗髙士至自跨􅍳作墨得佳者數百九顧之而􅀏曰足供吾一丗著書及煤發焚舎乃巳冝其竹溪爲墨􅁐作書而不猒所謂子雲相如同工異曲也薛紹彭臨魯公座位帖後魯公此帖純是一叚折魚軍容直氣知此然後可以論書之法度耳書南麓珎翰後龍岩書在顔坡之間然未免有癡絶處此帖殊靖勁可愛豈得意時書邪䟦黄華煙江歸艇圖先生當明昌間以文彩風流照映玉堂仐觀此􅀞所謂金鑣野鹿志在長林豐草也䟦閑閑公草書心經般􅀂經前後文辭重􅃨公書之字字姿態不同所謂堂堂天陣臨機制變出竒無窮者也錦峯真逸王仲元清卿書錦峯書意韻瀟散不减古人但前有黄山後有閑閑公故公之墨妙揜而不彰丗称士之得名有幸不幸者豈其然乎䟦黄華老人二詩后觀公手跡多矣此幅恐是早年所作然澗松出士巳有凌雲之氣識者自當知之䟦龐才卿悲潼関賦後此賦都運龐才卿所作其歩驟全􅀋思子臺賦意則擴充潼関甲辭字􅀞瀟散有法出顔蘇之間前丗士大夫學藝精妙如此豈勝歎慕評楊凝式書楊凝式書維摩等經說皆作行體大字􅅛竒豪邁瀟散中寓正筆左山云魯公後惟少師能得二王之法所謂文起八代之衰也坡公行書大槩􅀋此至元廿年四月􅀄五日過辭左山􅀗觀於座所論如此其王文荆公論云公書不曵之以就長蹴之以就短云題元楊手書後卷中諸公皆一時名勝先生爼豆其間諸賢樂與游者其以道義故也余早嵗讀書蘇門尚及見之􅀊時以文酒吟詠於山水間彬彬然極平時故家風味不知軒冕爲何物孰謂三十年後文物夌替而至於斯拊卷援毫豈勝􅁣慕至元癸未嵗􅅋賔日謹題䟦自書訓儉文後文正公平昔著述純粹深切其有􅀘世教如菽粟之於飲食可斯須離哉後人傳誦敬仰冝矣徳昻茂異喜讀書善居室属余書斯文將置諸坐右取爲修齊矜式所謂儉者徳之共也故樂爲筆之􅀄不計其工拙也䟦羅謙甫醫辨後容齋述醫論二篇求予書將板行以證俗之訛謬因念丗之物理流傳失正漸習成風無復革易者多矣較其所係重者莫醫若也謙甫心存濟物明當然之理不爲流浴所移固自可尚又使藥石亂投之禍日有所弭其於丗豈小􅀘哉所謂砥柱中流回狂瀾於旣倒也故樂爲筆之跋紫絲靸鞋帖後紫絲鞋帖四十六字二十年癸未夏借􅀚於張條山家昔公書太宗送梨帖後云珠還合浦劒入延平葢自謂也此帖雖遒婉可爱然筆虚墨嫰九淵之神宜躍而沕恐臨本也觀者自當識之䟦摹馬圗書與􅀞同一閧紐昔人謂學書者苟非自得雖奪眞妙墨終爲奴書余於􅀞亦然題所臨顔魯公十帖後大名楊君順之家藏劉元剛嘉定間忠義堂所刻魯公書廿一帖予擇其大小尤精者臨一十帋近在京師入翰林復觀顔碑十餘本皆所未見也又與左山商公論其平生所得於公書者數焉一日覺􅎍中頓有所悟及南歸取向所臨裴將軍等帖觀之當時凝神筆端非不玉汝奈非其人而學不至何譬如以羙石追琢瑚璉則不可也癸未􅀊夏六月入伏前二日大􅀨淋浪五晝夜不止開䆫隱几坐見舎東積潦展觀此帖偶爲題其後云字程氏小子癸未夏四月僕還自京師道出梁臺蜀士程天驥自云伊川先生之遣裔有子方黄携而拜予因求其小字乃訓之曰伊傳嗚呼小子其念之哉䟦樗軒壽安宫賦西園雜詩後余生長汴梁八􅀊而北渡河當時風物有能記憶者但如隔丗夢寐中見尓及讀如庵西園雜詩何殊趙家老樹遺臺令人對之有足悲者故孫樵雜報云生恨不爲承平時人良有以哉収卷奉還題其後漢文翁講室􅀞像余讀漢魏五書云成都有漢文翁髙朕石室壁間刻三皇五帝以來聖賢􅀞像蜀太守張収筆也収獻帝時人近過劉氏家塾遂􅀗其本盖自盤古氏以下至仲尼七十弟子百一十三人􅀞極精妙簡古經千有餘􅀊無絲髪剥壤非神物護持疇克尔邪後有東坡所臨王逸少欲摹帖氣韻豪逸有顔魯公風格􅄪四展觀悚然起敬令人有振纓希古之想眞竒蹟也書劉氏屋柱至元甲申夏四月余自泰安平隂東阿撿覆桑灾而西赤日黄塵中馳六百餘里忽得此屋休䕃車怠馬煩之意爲釋然也主壻劉澤克家有禮且云此屋甫成未經寢處而公至可謂彈壓瘴氣矣又說婦翁張學臨終戒作佛事以多誦孝經爲嘱不圗田野間有此端士重午後二曰過此䟦坡公春寒帖茶使分寕李君踵門來謁坐定出春寒帖相示願一言爲審定余曰昔坡公在館閣時每作一石一竹浄爲好事者取去况詞翰乎所謂良金羙玉自有定價尚何言子歸而潜珍東緑吾將見燁然之光不唯在惠州李氏矣龍門寺題名余聞龍門乆矣甞讀故相雲叟公題名風煙形勝盡在目中終以不得一徃爲曠今嵗冬適諸君以事㑹共遂成此逰相與分雲㝷壡攀水隮危抵懸瀑下少焉環坐磐石盡一尊而去凢得詩一十一首偕來者判官李譲州將劉民望陳州長李公恵前憲臺獄丞梁平州學正張賁士人程翼蔡州吏目薛丗英郡人徐英時至元乙酉冬仲望日也䟦鹿庵書玉華宫詩後鹿庵書氣韻滿散甞疑出焦山鶴銘一日問筆法於先生曰平昔於沙河碑致力爲多今􅀚此帖一一較之其瘦健清㧞蓋以廣平作骨而取真逸爲竒放也䟦米元暉書元暉書􅀋王謝子弟以當家論之闇中模索知爲人豪然其間時有圎轉蔵鋒處豈厭家雞而欲歛乃翁之掉率邪䟦虞丗􅀯十二大字虞永興書攀鱗附田異十二大字丗皆以雄偉稱之石刻墨本凢兩見之予特愛其結密無間由智永小楷擴而充之至於如此之極且見夫落筆不難也因悟蔡京書太學首善儀門昊天大帝之􅀋其法度一出於此今夕而有一舉兩得之佒於是乎書題耶律公手書濟源詩後物之有光華者雖微必著况文章翰墨之卓越乎近觀故中書令耶律公當壬辰􅀊過濟瀆留題詩翰逮今歳龍集適一甲子其孫希逸始托揔尹靳榮俾刻石祠下属予題數語于後余曰事之􅂋伏雖數存其間至後大前光在後人固當如是所可敬而仰者玉泉老仙於灑景同翻經綸致澤之餘復發爲文章翰墨鏗然而金石振巍然而冠劔植表裏國華鼓舞元化爲丗􅀝重巳見惡盈好謙恬然静退之心故賡和樂天詩韻爲恱無乃魏公醉白之意歟俾來者􅀚咏將有擊節嘆賞挹髙風而跋絶塵者矣又何翅紀嵗月而傳不朽者哉題臨潜珎銘後潜珎閣銘坡公渡海北爲李光道書於曲江當時眞蹟入石爲龍潭絶勝逮淳祐乙巳東嘉趙汝馭求訪百至巳不復得惜哉今所傳者蓋漢中石刻濮之板本再一傳也此則以濮本較之迫視筆􅀔徃徃有形似者豈踐其迹庶入室之意歟然龍爲神物唯劉累乃能􅅰之或者輙攀鱗進技其氣亦可尚也至元壬辰後六月廉訪任居携以示予曰此李安仁所藏也幸吾子題數語于後故書題山谷苦筍賦帖後臨安漕副喬仲山予爲御史時臺小吏也庚寅冬􅀯行遺杭仲山以是帖贐予或有以真贋爲問者予曰􅀄未甞經意唯其無心於得渠無求而見贈取與兩間皆岀自然􅀂有不爲嗜好所玩者故喜爲収之至於書之真贋君其問諸墨卿䟦朱文公手書子所見手蹟十餘番皆老筆也公何甞以書學名家只以道義精華之氣混混灝灝自理窟中流出一旦揮灑有不期然而然者未易以翰墨畛畦論也前人􅁛孔明岀師表秪見性情不見文字予於公書亦云題杜仲正省􅁺家世卷後先師泌陽府君河中人應進士時石公子堅同舎生也且蒲當秦晉之郊其河山之勝樓觀之冨甲天下而文物之盛如金吾李氏昆季及公皆極一時之選予嘗三走中條登髙望逺追惟師之遺言思其人而不見徒有永言􅁣慕之歎去年冬予持節仝閩有杜君仲正來謁蓋公之甥也與之語誾誾侃侃愿有餘而辝甚雅因念予児時耳公之名閲五十寒暑始識其甥於甌閩越絶之徼所謂老成雖逺典刑得見于玆一日携雷苦齋所述示予且求訓勵數語于後予謂今之士夫思其大而略其細知其雅而不通其俗此大夫士之通患曽不思親其細所以全其大也通其俗所以尊其雅也今吾子含香佩棠所治者皆簿書期㑹米塩􅃈屑之務而能終日黽勉無倦色安知開封府推異時不至忠獻禮絶之地乎䟦郭熈山水巨軸崔生有􅀞二軸不見題誌中隱云此郭熈筆也信當行玆能事熈無疑但立名不正物不得順受所謂山亭避暑者余易之曰江煙晚浦崔抱歸志甚􅀭也然坐而論道謂之王公作而行之謂之士大夫今降而嗜此以爲髙且多識雖屢中何足道哉䟦顔魯公裴將軍帖此帖予見者數本皆大小不同獨忠義堂刻臨摹最善蓋純以􅀠體發其竒特尓至於詩格雄偉壯麗比之清逺等作又何翅十倍曹丕也贈師御史彦貞名頥丗固有難事惟篤好者即能之况氣志清明者乎御史師君彦貞世爲瀚海府人姿英毅逹時應務乃其所長復於公餘以吟咏自樂積而至十數篇非好之篤其克如是耶因求一言見誨子謂詩固一藝心之聲言之至文者也作之者譬猶良工就利器雖有棠谿之金須百錬乃得其精如吾御史君氣不凢意竇方啓能敏修不巳將見與日新之業並驅而前至綴聮雲煙撑霆裂月恐不難矣立夏後十日謹題書歸去來偶題于後古今聞人例善於辭而克行之者鮮踐其所言能始終而不易者其惟淵明乎此所以髙於千古人也僕今年六十有五衰病相仍越在絶域終日役役疲於官守雖云微勞事有無如何者因書此辭不覺慨歎者乆之䟦蘇子美千文帖長史顛草􅀧畫略具意度巳足子美迫近之此帖豪放飛動所謂筆陣堂堂者乎歐公於本朝書獨取蘇蔡三人非虚言也周越軰安得窺其籓籬哉趙生其寳藏之至元庚寅八月謹題䟦拙翁桃華春水圖南華云相拘相沬不􅀂相忘於江湖此正圉圉相忘時也但恐馮驩軰見之即垂涎耳庚寅秋題於西寺䟦文公與子晉伯謨二帖建安諸公徃徃以文公翰墨賜觀視之皆非也此二帖母君希悅所藏其爲眞蹟無疑所謂剛徤含婀娜玉德而温栗者也因知前書皆邑人江春山效顰予特表而出之惡紫之亂朱也至元庚寅九月二十八日夜漏下卅二刻旣寤不能寐起書於府集思堂之燭下歛祍題題三河驛壁余回自海徼暑毒之氣至此方作眩臥於舟中者一伏時蓋以閩中氣節不常水土殊異䆠游之士鮮有不病而歸者因念孔孟之道能治心而不治病倉扁之術治病而不治心安得合而爲一俾治南方不治之病庶乎其有瘳者余言雖鄙庶有関扵丗教故書至元庚寅冬十月十有七日題於三河驛壁尚聞者知所警荅戴生余來官南越凡十有一月戴生叔堅者閩産也以詩文来謁且言其志乆乃見其為人叔均有嵗寒姿扣之所學外又通熟吏事時居閑日乆思以三釡侍親義形于色予告之曰行與止有數存其間者此心不匱則棒檄之喜其來之不逺也傳有之居則曰人不我知如或知爾則何以哉蓋言其學之不可不積行之不可不卓也戴生其勉旃晦翁墨蹟紫陽先生手探月窟足躡天根􅀄非欲書名家唯其道義之氣葱葱欎欎散於文字間者不得不如是耳傳曰愛其人愛及屋上烏况先生之手澤乎韓生其寳藏之䟦香林先生㒹草甞愛甘露寺詩草聖筆􅀔縱横破碎陳敵今觀香林先生遺墨得涪翁歩驟爲多具眼者當知余言爲不妄䟦黃華書後昔黄華老仙方書翰得名求之者衆日不暇給張丹華家傽善於刻鵠公時命代書至眞贋莫辨此又張奴之重胎者也東坡開葑帖後語此借舡一帖耳今人讀之聳然有趍事赴功之意當時民說忘勞槩可知巳使公得坐廟堂􅁵衆務文致太平爲不難矣題米􅀯宫帖後今日客有自河朔山東來者聞時雨霑足蚕麥有望適師孟携此卷相過臨風展玩沾沾然有三安之喜不然奚暇及此且將爲質錢慱米之具耳䟦禊飲序後兩􅀳法書李唐詩騷宋人之論議天機所到有不可企及者獨韓子以右軍書娬媚可傳鶂鶂而已其立論峻絶不詭隨如是亦可愕眙然予綿歴丗故以來士大夫所繫非輕不尔安能有立于丗區區游藝巳是末學令就末以泥其不必者竟何爲哉至元癸巳四月予入院後五日師孟持此卷堅求䟦尾因信筆及此書商司業定武蘭亭本後書學自是吾儕一叚妙韻昔先正商公善書而深識客至多談是爲樂娓娓忘倦公今己矣言復得聞邪去嵗冬予載入京師與台符司業時㑹爱其議論操守識鍳書翰得家法爲多如考定定武拓本辯論隠顯是否眞贋幾數百言截断衆流㑹歸其極予擊節嘆賞何其該且洽也然闇中摸索知爲人豪者􅀄不在是丗家子弟當門户焜燿鮮不以丗味務快一時商子曽有是乎及其順受阨窮以理自信卓爾有立於㒹沛流離之際吾􅅐中耿耿者曽不少挫是則商之最起予者故特表而出之使丗知夫寥寥千載下殷士膚敏者蓋有人焉不只以技進而巳耳􅃴佳客在坐聞予言皆唯之而去因書卷尾以還䟦馬左丞所蔵貫休羅漢後時子卿有未疾不出昔梁直閣將軍張僧繇􅀄作繪事貌天竺二僧侯景之􅅍剖裂爲二一失所在其一後爲唐常侍陸堅所得及堅病亟所藏僧見夢曰吾有同侣今在洛陽李氏能求而合之當以法力護尓平復陸如其言訪之果驗遂以錢數萬贖歸陸疾随愈嗚呼凝思之妙通於神明􅂋諸隂佑者如是此盡云僧貫筆貫平生專藝在唐一代亦號精絶能敬禮有加安知不同繇僧通靈時出光怪而致主人勿藥之喜邪嵗癸已夏四月題秋澗先生大全文集卷第七十二
