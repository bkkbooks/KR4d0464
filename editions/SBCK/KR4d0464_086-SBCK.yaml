front:
  text: 秋澗先生大全集卷第八十六烏臺筆􅀘
  hash: sha256:49ef369b58c2b4ab00ecdeb7596497684f67f41b071f45d64ba8d4b6f440ee20
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_086-1a}
body:
  text: 廉平章廉能合復用狀盖聞進賢受上賞蔽賢􅀩顯戮古今之通論也伏見中書平章政事廉希憲忠誠衛社孝友名家乆侍禁闈常深委仗而又疾惡如讎進賢􅀂渇爰自中綂􅀄年奉將天威仗􅃏陜右其􅁬不顧身弭伏禍亂致寛西顧之憂而謀猷忠壯盖素所蓄積也及歸治裝琴書之外一無長物可謂廉矣旣而平章中省前後七年益勵忠貞之節殊深端揆之方其於賛襄不爲無􅀘邇者罷政就列秪縁新制不聞過愆今也未及踰年卧病數月生理蕭然恬焉自若雖斛律光之忠亮無他魏髙􅁢之清苦自守無以過此誠清白之相乃有爲之材也今年方強仕佀未冝置之散地使後事功方今川蜀未得其人襄陽旅拒不下儻起而用之使當一靣必能收取實効不効則治某以冐妄之罪誠所甘心焉乞尚書柴楨北還事狀切見雲南王府衛行六部尚書柴楨賦性良能爲人簡重嚮捴西曹殊深雅望乆承簡在之恩冝處腹心之地自居大理將及五年今體訪得王府旣還無所事事至於彼方上設宣撫下有􅃹民等官仰頼天威足以填撫其柴楨等一行官吏廿餘人佀不冝乆置遐荒坐老志莭使智能之士不得樹功業於明時誠可惜也近又於奉使張庭珍處問知本官身雖無恙􅂡髮盡白乃心王室無日不在興言未竟涕泗交零中外聞者莫不􅁣嘆昔班定逺哀請臣不敢望到酒泉得生入玉門関足矣古令雖殊其於臣子戀闕之心一也兼楨母在堂年逾八十使母子形影相吊於萬里之外又可憫也伏惟聖朝以孝治天下如楨者儻􅀩矜憫詔賜北還如是豈獨不遺材於絶域抑使忠孝之道得兩全於君親亦激勸臣子之一端也論髙明奔母䘮事狀今體訪得户部貟外􅀰髙明爲母訃至巳經詣告未􅀩明降輙即奔赴致省堂恠責遂差官馳海青馬前去追鎻佀欲以違錯加罪爲此叅詳得􅀂以公廢􅀻純孝之人難以存處􅀂因孝􅀗罪使爲人子者聞父母之䘮皆不敢奔赴是有司教人以不孝何以法爲唯其兩者之間未有定例使澆薄之徒轉無顧忌孝行之士愈惑所守照得舊例斬齊衰三年者並聽觧官其品官任流外職及吏貟司吏諸􅈰分承應人遭䘮卒哭百日令復職願終制者聽聞䘮者並聽奔赴今凢諸職官遭父母之䘮其有告詣奔赴及願終制者如抑不從恐傷孝子之心伏乞省部比及通行定奪巳來合無量職務繁簡權冝定制或以卒哭爲期或見新月復職外據自願觧官終制之人一從所請兼憲䑓以肅清風俗爲首務而古者明王以要道治天下無重於此據此合行具呈彈周咬兒羅魏子等事狀伏見近縁災異减斷囚徒所以詳刑用回和氣故選差朝官宣明至意審理􅁈帶惟䘏惟欽期于􅁢當今體察得某人處心殘忍悖法亂行以重爲輕當出復入如滑州周咬兒打死馬大事詳其造意止縁將妻枉道慮有非爲曽不詳審詔條輙以圖財論殺又驅奴孫佛宝并妻羅魏子於淇州郭家店内同謀親手將本使王二殺死雖佛宝在迯未􅀗其追㑹准服巳是完備自合依奉詔條准酌舊例不分首從論决却將羅魏子止同雜犯决訖四十七下分付本家収􅃹切詳二事旣垂寛大之恩尤先重輕之義足見處心邪枉悖法亂行非唯返戾天地之和氣使䰟􅁈􅅎苦生死兩傷胡可追悔據逐莭事理大属違枉合行弹劾乞依法論罪以慰死者論左丞許公退位奏狀臣聞賢者化之本雲者雨之具得賢而不用猶乆隂而不雨也伏惟中書省禮樂刑政紀綱號令之所出誠朝廷之大柄中外之繫望也丞轄之位不冝用匪其人使曠天職伏見左函許公衡師心大學飬氣至剛獨立危言清苦自守挺然有蹇蹇匪躬之操方之古人不可多得且自立中省迄今十有二年前後相臣如衡竭盡者多矣未􅀂許之切直敢言不以榮貴爲心者本官正以遭不丗之遇當有爲之時十餘年間恩禮􅂭重爰自布衣擢置相位計其􅀄心有盡瘁報國而已然自輔政已來雖中間有所建明未聞以次施行者以謂處任重責深之地無㳙埃􅀘報之功夙夜思惟自慙焉用是憂惶疾日増劇今者恐乆妨賢路故卧病不出哀懇求退至于再三揆度其情恐不特血氣爲病耳伏惟皇帝陛下聖智天臨明燭萬理求治之心亟若飢渇一旦得臣如此夫復何求且君聖則臣直虎嘯則風冽氣所感召理之固然􅀂是則國家之福天下之幸也如左丞許公者伏乞時加體貌置彼論思庻使展盡底藴以荅恩􅀻其於謀王體斷國論必能進盡忠言有所廣益以慰中外之望誠未冝聽其去位以塞忠諌之路也臣職當言責觸冐忌諱惟陛下留神省􅊫論司獄官合行條理事狀伏見比者隨路設置司獄官三十余貟其品與禄不爲微簿足見朝廷重惜人命哀矜庻獄之至意也又照得省部即目以五事考課親民官政治能否獨不見降到獄官合行條件切恐中間不爲用心勾當有名無實縁狴犴之間人命所繫􅀂未經鞠問及抵法以前或因病失所非理死傷者其間縱有􅁈濫當宥之人胡可追悔此與殺之何殊檢㑹故典漢宣帝地節四年詔曰今繫囚或以答掠及飢寒瘐死獄中者朕甚痛焉其令郡國歳上繫囚􅀂笞掠及瘐死者丞相御史課殿㝡以聞今卑職叅詳隨路輕重罪囚一􅀊中不下常有五七百人且冬夏二季又爲苦月其或温凉失所飲食非時藥不當病非理死傷者固亦不少今獄官雖備恐只以無合行條令罔知所恤不過囹圄約束卒吏无致踈虞而已如此是與朝廷矜恤至意大相乖違徒月費俸鈔飬閑人資歴也此與不設何異以某愚見今後兩省冝酌古准今講䆒獄官合行條件使知所守定爲格例付下各路施行如本官任滿日仰緫管有以憑考較優劣復令按察司體察相同申臺呈省用之陞黜以表能否庻望獄官任内盡心勾當不致非理囚禁因循損傷人命上以副朝廷哀矜至意下以感召隂陽之和以消災盭之氣亦聖代善政之一端也外據囚粮毉藥燒燃窠簟等物所在官司湏􅃹按月依例給付却不得因而致有闕乏據此合行具呈太廟行禮蚤晏事狀切惟􅀕禮以嚴敬爲主兼質明行事清朝而徹古今之通禮也伏見今􅀊太宫大祀自十七日夜二更已來行禮至明日辰時􅅻方罷徹計其漏刻幾干一日以致老者不勝其疲壯者委頓于地所謂有司跛􅀝臨事雖有強力之容肅敬之心因倦怠而不存于中矣且􅀕而忘敬鐘皷玉帛似爲虚陳彼執事者却因怠失儀從而得罪是又不可甚矣叅詳合無將見行禮文令尚書禮部與太常寺官重行講議中間節文輕重升降遲速因仍損益使各得攸冝以新一代之典永爲定例則禮容精意兩有餘裕顧不盛歟據此合行具呈乞權免大名等路今秋帶納中都逺倉脚錢粮事狀切見大名彰徳衛輝懷孟等路蝗旱連年闕食者衆嗸嗸告困至今不絶即日又令五路百姓起運官粮千萬餘石限十一月終赴新城交納每石雖官支脚價二兩二錢其寔難以繳計據各路所該粮數官司盡行樁配民間轉令顧脚般載今體訪得每石不下五兩有餘才方可運一石兼大河以南千里蕭條人煙断絶人牛車仗冬月寒苦至於糇粮芻料又須􅀒戴徃返三千餘里其間生受姑置不問而近倉税石及帶納中都逺倉脚錢粮數亦依常例三限􅃹得依期閉納如此督迫人難何以聊生叅詳上項事理除官支脚錢外每石百姓又費二两有餘今畧舉大名見運四萬五千餘石扣筭據百姓餘上所費二两之數且該米兩石爲率是使百姓已納十三萬石到官比附本路逺倉脚錢粮數四萬九千餘石巳出一倍之上今者更要百姓帶納之數委是重併以某愚見合無將今歳五路帶納逺倉脚錢税粮權行蠲免外據近倉税石更爲寛展限次送納且令百姓併力以供新城陸運庻優於辦集且兵法有云國之貧於師者逺輸逺輸則百姓貧由此而觀當國計者誠冝深思逺慮念逺輸之勞傷百姓之困使民力有餘不致展轉靠損貧乏似爲便當舉崔國華􅂶省􅁺狀切見樞宻院前官吏人等徃徃以貪墨敗黜其令史崔國華者練習吏事通曉譯言旣愼所守又以能聞自照刷來隨房例有違錯而國華無一事經問者其掌行簿牘精詳舉皆可觀切詳身居吏職能自振㓗夙夜在公罔累所舉史丞相保理冝加異以勸方來合無將崔國華轉􅀘省􅁺儻試諸難可収實効非唯於廉汚之間黜陟並行抑亦明公道而勉事功也論明經保舉等科目狀今體訪尚書省批送禮部同翰林院官講議科舉事省擬將詞賦罷黜止用經義明經等科其舉子湏品官保舉之人然後許試夫如是恐事出非常中外失望切惟科舉之法上自隋唐迄于宋金數百年之間千萬人之衆講究亦云詳矣如餘科或廢獨賦義䇿論取士而不去者盖以經史道備格律精當至公無私而又可常故也故前人目爲將相科如宋之韓范歐冨金之髙石俟胥皆其選也其保舉在宋諸公雖曽建議令官舉􅀊貢以三百年尚文之丗尚莫能行况㩲輿於今日乎叅詳􅀂依上項所擬將見公道掃地関節大行上下成風相率䛕僞其弊有不可勝言者矣且品流之人􅀂果實人材雖出一切科目不害爲通使特逹之士何獨詞賦無益於學者治道哉至明經設科正使天下之人舎精就簡去難從易不出手抄義䟽口誦集觧心熟箋注其規模不出帖經口試殆童子荅黙義之法耳至有兀兀窮年白首一經餘不暇及者必欲絶去箋䟽断以巳意使微辭奥意超越於道學諸儒之上亦巳難矣由是而觀返不􅀂賦義之淹貫經史扣擊諸子辭理文彩兼備之爲愈也故唐人有進士百一二明經十二三之謡宋人亦云焚香禮進士徹幕待經生足見經生爲易而進士爲貴爲難矣此王安石所以創經義而革明經之輕且泛也外據保舉等事論者不過士不官舉雖盗賊倡優皆得舉進士則賢不肖渾殽無以别矣曽不念亡金舉法如十惡倡優好盗􅂶吏犯􅂍至徒等人明有結罪條理儻舉而行加其詳宻可也不然則草野遺賢閭閻寒士桴終身陸沉不復進用於明時矣且以故事考之又有甚可慮者昔唐􅀭國忠子楊暄舉明經科學術荒陋文不中格禮部侍郎逹奚珣畏國忠權􅀔遣其子先白國忠云郎君所試不中程文然亦不敢落也又楊汝士與錢徽掌貢舉段文昌李紳各以書属所善進士於徽及牓出文昌紳所属皆不預焉及第者裴度之子李宗閔之壻楊汝士之弟或曰今歳取士不公皆子弟無藝以関莭得之上命王起覆試果黜十餘人貶錢徽宗閔汝士由是而觀其明經保舉亦有未便於時者兹非明驗歟以某愚見其詞賦冝公然集議不可遽去其保舉之法恐行不克終徒爲紛紜之變耳當今之務惟以多得人材以備任用爲急據科目之先後人材之速得巳經具呈建國號事狀伏見自古有天下之君莫不首建國號以明肇基之始方今元雖紀而號未立盖未有舉行之者是大闕然欽惟聖朝綂接三五以堂堂數萬里之區宇垂六十年大號未建何以威仰万方昭示後丗愚以謂國之稱冝下公卿大臣及五品以上官集議闕下則天下幸甚弹西夏中興路按察使髙智耀不當狀切惟按察司所行輕則弹劾奸邪重則抑按􅁀亂爲使者務要剛明知體臨事有爲故風彩所加百城震肅今體察得西夏中興路提刑按察兼勸農使髙智耀資性罷輭不聞有爲事佛敬僧廼其所樂迹其心行一有髮僧耳旣乏風憲之材難處搏擊之任兼河西土俗太半僧祗􅀄聞智耀來官已爲望風輕易故理任巳來所行淹阻畧不見惮欲望宣明教化問民疾苦鎮静一道難矣哉如近者習良和尚等事此其驗也合無别選材能以代厥職不然雖復别有區處旣非其人恐終不能震疊不惟虧損朝廷威重使五郡􅁈抑之民一經赴訴彼強􅁀者加怨前時而平民轉罹殃咎其或使之強爲因而别生事端尤爲未便叅詳至此擇人而代佀不冝緩據此合行紏呈論立睦親府事狀書云平章百姓以親九族此帝堯致治之先務也今國家聖子神孫碩大蕃衍維城維藩固􅀂盤石冝請立睦親府選懿親中尊王之賢重者一人判大宗正事使之敦睦宗属奉承王命庻幾於變時雍民徳歸厚矣論屯田五利事狀南北之􅀔我可以取後此必然理也然饋餉轉輸古無良法正有屯田待以􅀊月爲古今上䇿耳朝廷徃年已曽施行不數年積􅂖幾至百萬􅀂行至于今其利有不勝計者盖兵足食民無轉輸之勞邊有備官無和籴之弊兼自古議征不庭莫不留兵在田而後収必勝之道今者宋人出没不時止恃山林阻隘雖云深入如渉虚境今者如復令邊民分地雜耕上自鈞化下至蔡息不數年剪去荒惡蕩爲耕野一利也民則什什伍伍相望三時種藝甲兵在傍彼欲内冦野􅀾實非所長復欲伺便䑕竊又無潜伏出入之便而復嚴烽燧謹斥候少有警急我則収合餘力據守要害而似前日之冦盗不可得矣彼縱來冦如獸處平野獵者蹙而殺之􅀗之無不利矣二利也至於我軍征進適當農􅂩丁力有餘者許隨大軍入討所􅀗悉付本人是民因􅀻利勇於公闘三利也又令向裏一切䝉古奥魯亦編間民屯使之雜耕不惟調習水土可使乆居且免每歳疲於奔命之役四利也不數年根􅀔深固使奥魯軍人倒營南下近則雜兩准之間逺則抵大江之北所謂長江之險我與共之矣五利也合無將河南舊有屯田户計及一切沿邊之民盡折絲銀使之輸􅂖其屯事於山川出没要害去處首爲耕墾官給牛畜自辦農具其條法且一依經畧司元行然後選近侍爲大司農官及内設屯田郎中貟外專領其事使通其奏請趣其應副歳時令披察司或督軍御史按行屯所察其成否而賞罰之不數年田事可成坐収必勝之道矣論百官集議事狀朝廷大事有疑佀未决者當下百官集議漢故事置大夫專掌議論自兩府大臣博士巳下皆得預議以伸已見不嫌以卑抗尊旣盡其衆之所欲言然後附以人主之獨断此漢集議有公天下之意也方今品式未完法制未定事有可行而疑佀者冝遵漢故事五品以上官集議闕下各具所見以聞論宰相兼判兩部事狀今者吏刑二部官備吏具專一分治是朝廷委任旣專且重切見比年以來選法不定刑名無章黜陟逺近多徇􅀻情輕重死生致傷和氣宜考定新制使宰相兼判兩部以責成効論立群牧所事狀伏見古者將帥以大司馬爲官盖兵以馬爲本今冀土雖馬之所出然國朝馬政未遑修舉輿臺皂􅊢皆得乗􅀐駕車拽碾無不駈用一歳之中消耗不少徃年雖有禁令旋復寛㢮甚非強兵之道也冝飬之有素立群牧官略取唐制以定牧産之泫再嚴先禁用壯兵威論官買輝竹事狀切見衛輝路民竹縁三十年前百姓培飬以至今日俱係軍民站户􅀝仰當差兼巳亦數重宣課近年官定四六抽分其實中半􅇮者園户訴難雖􅀩上司定奪經今二年未􅀗明降其竹因斫伐不時徃徃枯死􅀂以竹論通合官拘如曰物力與桑麻無異又與懷孟事體不同據園畒不過四十餘頃冝買属官竹使民无永業之思官有通行之利亦便民之一端也論塞絶沁水事狀切見今年雨水稍作黄沁北泛决壞武陟縣垻閘北與御河合流淇門以下槽岸低狹不能吞伏幸不爲患兼今日隄防未修儻值雨潦大作自衛巳東非惟漂没田廬塩􅂣所在有大可慮者以某愚見將元修閘堰冝塞絶之使無後患甞聞衛土人云金太定二十七年黄沁北泛渰没州城水至浮圗第一級此先事之驗也論范陽種麥事狀切見附京地寒不可以麥而􅀊用不啻數千萬斛止仰御河上下啇販以資京畿今范陽去都百里而逺土風冝麥與稲比之秋田冝令倍種外據荒閑冒占復許諸人開耕驗頃畒免地租三年及减半力役亦完實内地之道也如関中古無麥今盛於天下者盖自武帝始也其種稻事昔北齊皇建中平州刺史嵇曄建議開督元舊陂􅀊収稲數十萬石北境頼以周贍此其驗也督元在今新野縣界論大作水軍事狀征進舟師固未甞闕然可大作一軍召募兩淮黄河上下等人并南人歸順者兼用其力舡艦一依宋法精選大將使之專習水􅀾建以龍驤樓船之號歳師出水陸並進亦多方悞之之法漢武發㑹稽歐之䇿也内則浚太液池造爲輕舟令武衛軍不時習又武帝伐西域而鑿昆明池魏祖之征荆呉許西湖是也論削去科帖俸名民間科帖摽注俸鈔且賦税從古有之必歛之以給禄養是恩出於上今者名之科帖曰此官也是民自以禄食廩給非出國家公飬太恩令削去所謂民可使由之不可使知之也論撫治川蜀事狀宋人以川蜀號爲左臂謂其控制荆吳上流恃所重者迄今奄有垂五十年殆天之所以資國朝也比年以來雖行臺院然未聞境土外拓户口内増盖經畧撫治未得其人故也以某愚見若有能招集流亡和誘諸羗訓農積穀通啇惠工興起伏利撫存遺􅀺文武才幹忠義方畧者擢以不次許於要害城邑令一切從便行事自非邊城可併者併其差税課程權閣三年行有實効使丗守其土外據諸蠻君長如能率衆内徙亦仰依上施行軍前虜􅀗生口不許贖賣將有夫婦及男女成丁者配合作户官爲給田每歳量納本主税石如此待以歳月完實富庻以俟他日順流東行之舉猶愈守駐寨柵﨑嶇山谷間徒費錢粮終無所益取困弊而巳論普加諸王爵號事狀古者封爵或以土地或以勲賢然徃徃遥領不有其土未􅀂我朝天恩曠蕩均同雨露實有其封以供湯沐其未加王號者合無推恩普議及依制頒降印綬使名實兩全以篤親親之義論􅀾士有功遷加官賞事狀士湏以氣作氣因利以鋭而官爵者國家之厚利也故以加級奏遷使兼今後軍前一切􅀾士克敵有功者合無驗所􅀗首級用誥勑遷加散官以作士氣論西川軍役事狀西川軍人俱係山東河北山後户計逐年取要氣力徃還五千餘里比至屯所鮮不困乏求其精鋭不可得巳所謂強弩之未不能穿魯縞也近聞平欒軍人巳䝉替罷至於其餘軍户合無一體定奪亦同仁一視之義也論禁庸毉事狀國家以民爲本五福以壽爲先今民間庸毉及僧道筭人妄行鍼藥民愚無知一旦委命於手至有父殺于前子夭千後終不覺悟是庸毉者猛於苛政也以某愚見除係官名家者流餘者冝漸行禁止記曰毉不三丗不服其藥此之謂也論監選典故事狀監選故事吏部將受除貟數及擬定州縣名職单目付之􅁥察本官但慿數臨視而巳􅀂中間或有資歴先後品從髙下及不應等事許本官陳告御史即推䆒根因與之改正今者􅁥選合無依舊例施行付之吏部以爲定式論置官吏空行簿天下重事無重於州縣得人果得其人臺司何憂不清州縣何憂不治今按察司旣立請中書吏部具各州縣見任官吏姓名爲空行簿所至州縣先暗行躰察然後遍見官吏一一詢考政績得其公廉勤幹者明注實狀於簿其衰老無能顯有不治之迹者以朱書書之其有中人之才雖别無竒効亦不至敗闕者以墨書書之又有雖是常才能專長一事亦以朱書書之還臺具奏以聞然後付之吏部使陞黜􅀘􅂶之際可以坐見群吏賢愚能否不遺一人則天下之才昭然可得矣論益都括出新户事狀益都路括出新户不下萬計俱係貧難老疾分房驅丁攅合作户今秋又值水災比之他路重致因乏􅀂向前科差必避匿逺竄不幸更值災傷展轉流死别生事端非國家之利也以某愚見冝令按察司從實檢覆果堪户計猶冝存恤其不成户者並聽作貧難収係佀爲安便論品官得上封事狀五品以上文資官如遇赴闕授除據所􅃹路分内有利病當興除者得上封事以聞其條件大不過三小者五事而已正本上中書省副則呈御史臺庻望下情得以上通而無壅滯之蔽非唯少見人才優劣亦且知任内有無盡心勾當論立國子學事狀切見朝廷選近臣子孫聦明者付之省部閑習政務或授之儒生講誦書史有無立國子學使學士院官及選通逹政務一人專領其事論嚴禁好細事狀方今宋人規畫止是内嚴城守外用偵謀遂得事情預爲備禦故師出不能大有利益以某愚見急當禁絶人入境將沿邊地靣令軍官上下分掌不時巡邏萬一透漏其當該人貟同知情治罪舉関仲修事狀詮選刑名最爲重事先爲選法未詳已擬丁某􅂶貟外􅀰勾當其刑部亦冝選用舊人整理審定切見在都関某係前朝刑部令史練明法律通逹書史年徳俱髙冝蒙録用不然取宋故事立審刑院使掌理其事論交叅户土着事狀交叅漫散户計本􅃹上司差設㩲府提領招撫緫把之􅀋另行􅃹領中間不無侵擾使失業貧民轉致困弊今後佀此户計合無令見任官司収係上着元藉路分推送除豁論立聘財事狀男女居室人倫之大者也比年以來聘取無法妄増財幣使貧家失娶嫁之時今後合無酌古凖今定立常數庻望内無怨女外無曠夫春旱請祈雨事狀古者龍星見而雩雩者四月禱雨之􅀕也即目已是立夏氣序乖和暑炎驟作今體訪得自彰徳迤北至都去冬無雪經春不雨二麥巳枯春種未下至於大興部内雖雨降數次多者不及二寸切恐蝗旱反成災沴民事之急無重於此據隨路闕雨去處合無令有司擇日行雩􅀕之禮爲民祈􅂖其於農政實所先務據此合行舉呈論倉庫院務官除授事狀舊例倉庫院務皆係流外官除授今者一出人情賄賂其以賄得者取倍常爲心其以情得者務賂遺爲事以致徃徃失䧟賊濫而敗曽无愧惜今後合無依舊例據見勾當人貟定立資品依格遷叙使人人以功名爲心其弊不革而自去矣論􅁥選事狀欽奉聖㫖條畫内一欵莭該應合遷轉官貟如任滿不行遷轉或遷轉不依格者委􅁥察紏察仍令􅁥選欽奉如此近委某􅁥選伏見中書省奏奉到聖旨中綂三年無脚色官貟盡行委用據告叙承襲等事省劄亦有定例其一切求仕官貟各有自來根脚及本路緫府保申文解所當問者升降不等資品不應逺近失當言出事定皆在擬注之際今者監選止是引驗臨視觧由文字中間銓注窠闕是否何由得知􅀂巳除人貟儻或不應有告言者臨時難以折辯亦恐臺官恠問又知得第一選係􅁥察梁貞􅁥選將觧由人貟讀視外驗及將擬定窠闕亦令看讀今某􅁥選除讀視觧由引驗人貟外據擬定窠闕不令看讀若不呈覆縁今日格法日新某等􅁥選亦不當守常而不知變至如亡金故事亦是􅁥視注定名數其間公事􅀂有違錯即告􅁥察與之改正又念今日最害事者以情破格以􅀻害公照得欽奉聖旨莭該仍令􅁥選思忖選者一選之事豈有知其前而不知其後合無依第一選通知前後事理佀望中間不致違錯據此合行呈覆論舉官自代事狀切見内外大小官吏務保禄位鮮有以廉耻自厲者正似庸工計日取直縱有強幹亦爲薄俗所移欲求其公勤忠義竭力以報上者不可得巳其道正須尚廉耻􅅄忠勤抑僥倖進恬退如樹􅀻黨取常格叙故舊等事皆冝杜絶今後合無令内外五品以下至七品官比及考滿中間須得保舉所知有才行声跡顯明者一人以自代令按察司覆察才行􅃀實申臺呈省聞奏如不相應彼此俱罪之其舉官在任内或有故及任滿闕貟即令其人􅀘􅂶兹盖帝舜九官相讓之法唐朝因之亡金亦甞行焉今之天下猶古之天下行之于今何獨不可但二三大臣主之當力耳論修起居注事狀冝令學士院脩起居注逐旋進讀復置起居舎人郎等官使分掌其事爲収復連海事狀專委東路綂軍司據元曽攻㧞漣海將士人貟令陳說當間方畧限以年數專爲収復以窺海道入揚州之路論定興􅊢属􅃰州事狀切見定興新城爰自亡金係京畿属邑况根本所在􅀔無大重合無改正復􅊢􅃰州論服色尚白事狀國朝服色尚白今後合無令百司品官如遇天壽莭及圎坐㕔事公㑹迎拜宣詔所衣裘服一色皓白爲正服布告中外使爲定制論百司吏貟並懸書袋事狀在都百司吏人實繁有徒服色旣無以别察者又不復知以致徃徃輕犯禁令今後有無取舊例令吏貟等人並懸書袋論州縣闕􅇬宇事狀州縣見闕􅇬宇去處冝官爲起盖使有定所及頒降戒諭聖訓書之屏風使朝夕仰視知所懲勸論噐械有常課事狀噐械貴堅強犀利非限以歳月不能如法西漢至昭宣帝間兵甲噐仗方得精粹合無隨路置􅈰以常課造作物勒工名以考其利鈍令逹魯花赤不妨本職􅁥視成造每月開申功程次苐上下半年輸納京都論褒􅅄公能廉幹事狀隨路府官有廉幹政声自民間逹聖聽者冝降德音特加旌擢論宻院置學士事狀樞宻院冝取唐故事置學士一貟選六十巳上通逹古今曉暢軍事及明時務知地理儒者􅂶之以備顧問叅謀議或有可否許以專逹論今後師出不拘常限事狀今師出不可以秋冬爲期冝出不意使蹂踐田苗不得耕稼以成彼邊困弊之漸亦􅂶國伐羗李靖破梁之䇿也論州縣檢括僧道事狀州縣冝檢括出家僧道不上着等人有以妖術扇惑人衆及造作僞金銀者痛行洽罪論均平秤尺斛斗事狀書云同律度量衡帝舜所以資治也今民間升斗秤尺有出入之異徃年雖有禁令有司㓕裂竟莫曽行今後合無製造法物官爲印烙頒降州縣一體施行論軍官以功贖罪事狀軍官之罪重積如北冝許以邊功自贖以攻城畧地伐謀用間爲上以斬將搴旗爲次餘驗所􅀗首級使相當其冐名影替之數古人所謂使功不如使過是也秋澗先生大全集卷第八十六
