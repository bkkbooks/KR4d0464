body:
  text: 碑大元光禄大夫平章政事兀良氏先廟碑銘夫人臣建非常之功垂鴻不朽者罔間存殁俱蒙顯異如配􅀕大烝勒銘彛鼎謚號廟饗濯聲赫靈扶我桓撥况三丗迭將際興運依末光佐収混一之績者哉皇帝握乹符章先業念開濟之艱難感風雲於疇昔爰推䘏典􅁢荅元勛維元貞一年春正月已丑近臣兀突歹奏平章政事不憐吉歹言臣故父榮禄大夫中書左丞相兼都元帥阿术南征北伐汗馬之勞頗効尺寸伏見與臣父差肩宣力者巳􅀩恩奬敢昧死以請制曰阿术乃祖乃父自太祖朝服勞王室多樹功閥名髙諸將可嘉贈謚其在故家不得扳例於是降璽書告明庭特贈開府儀同三司大尉并國公謚曰武宣詔下中外咨嘆大恊輿議嗣侯不憐吉歹承命式抃且舞將即汴梁賜第建祠樹碑昭明三代于以侈大寵光宣揚先羙慰安神靈載德象容昭示無極乃謁翰林學士王某以銘章爲請謹按家略序而系之以辝其先丗出蒙古兀良合部逺祖􅑃里必者爲人音吐洪亮以善歌曲稱生孛忽都拔都衆目爲折里麻漢語深謀略人也其三丗孫合赤温拔都生二子曰哈班曰哈不里哈班生子二長曰忽魯渾次曰速不臺太祖皇帝在班术納海時其父哈班甞以群羊餉帝中途遇盗􅀍執忽魯渾及其弟継至以戈刺盗殺之餘黨逸去遂脫父難餼牽竟逹於上自是昆季孝義之名聞於朔部間太祖朝忽魯渾拔都以善􅀐射充百夫長乃蠻之未服也戰長城南率先鋒摧之彼即驚遁其弟即嗣侯不憐吉歹曽祖也第一室曽祖府君諱速不臺􅀄以質子入侍継爲百夫長壬申歳太祖經略中夏首攻桓州城小而堅􅀔不易拔公匍而先登上壯其勇賜金幣一車歳丙子帝㑹諸將於秃烈河上詢曰滅里吉部未附疇爲朕征之公即應詔選禆將阿你出領百人爲􅀱􅀐仍諭以方略如其言彼果不疑弗爲備大軍至陣蟾河上一戰而潰擒二將鼔下遂降其餘衆辛巳追滅里吉酋長霍都與欽察戰于玉峪敗之壬午年太祖征回回國其國而去命公與只别逐之及于􅁅里河戰不利公駐軍河東戒其衆人􅅡三炬以張軍􅀔其王果夜遁継遣公將萬􅀐由不罕川追襲旣及逃匿海嶼則守其要害彼進退失據不旬月􅁃死􅀗珎貝不貲以獻上諭曰速不臺枕干血戰爲我家宣力朕甚嘉尚賜珠寳一銀罌明年癸未請征欽察許焉遂逺轉寛定吉海取太和嶺壍山開道出其不意至則其酋長方聚不租河縱兵奮擊彼弗能爲計竟収其境又與幹羅思大小宻赤思老金戰降之㝷遣使奏乞以滅里吉乃蠻怯烈杭斤欽察等千户别爲一運歳甲申八入覲驅萬馬爲贄丙戍年取撒里畏吾兒的斤寺門等部又掠西蕃邊部􅀗牝馬五千疋貢於朝一無焉歳庚寅太宗命睿宗循宋徼而北营取河南公亦在行道岀牛頭関遇金將合逹帥歩􅀐甚衆上間方略所便公進說曰城邑中人遇勞苦即勌厭逗撓氣墮與戰易勝是役也大敗合逹於三峰山自是金不能兵矣壬辰夏睿宗還駐官山留公緫諸道兵攻圍汴京金主比走渡河尾敗于黃龍崗殺戰士萬人癸巳秋汴京降俘金后妃寳噐獻闕下其冬圍金主於蔡明年甲午金亾時汴梁受兵日乆歳荒民殍公下令縱其北渡俾就樂土其骨而肉之之恩尚未􅁯也其年詔諸王拔都西征上以公識兵機有膽略選爲先鋒遂虜八赤蠻妻子於寛吉海辛丑歳諸王拔都奉命征兀魯思爲所敗攻秃里哥城不能下奏遣公督戰遂禽兀魯思王也烈班攻秃里哥城三日克之復從攻馬扎部聞其主怯怜兵􅀔張甚諸王分五道以進公出計挑誘至郭寕河大軍㑹戰不利廼於下流木渡直擣其城拔焉公以定宗朝戊申年卒於秃烈河上壽七十有三公深沉有謀略善於用兵勇敢無前臨大事有断初太祖征西夏公請行上念公乆在行陣命還家省未晚復請曰君勞臣逸恐無是理其忠勤􅀋如此今以曽祖妣夫人忽臺帥府君諱兀良合歹緫戎府君長子也輛軍事太祖憲宗方髫齓以公佐命故家付之護育及長用存􅀓勞分掌宿衛辛巳扈定宗征女直國破萬奴於遼東又佐大王拔都征欽察兀魯思等部已酉定宗升遐大王拔都與宗室大臣􅁽立憲宗議乆未决公以大義陳請即定歳壬子時丗祖皇帝在潜奉詔征西南諸夷命公緫督大營軍馬自旦當嶺入雲南境摩些二部酋首來迎降渉金沙江所在砦柵􅀒固自守以次攻下之獨半空和寨依山枕江下臨無地穴石引水牢未可拔覘知絶其汲道公親率精銳前薄越七日寨破勦殺無噍􅀋継進師取龍首関翊丗祖皇帝入大理國城其年秋分兵取附都善闡及烏㸑之未附者前次羅部府大酋髙昇集諸部兵力拒戰大破於洟可浪山下復収合餘燼嬰城自守城際滇池三靣皆水堅嶮不易攻以砲摧其北門縱火前燬皆扞不克入乃大震鉦皷進而作作而止使不知所爲如是者七閱日伺彼方酣困氣靡夜五皷潜師躍入亂斫衆自内潰克焉先時國主叚智興逃匿昆澤併擒以獻又知未降附者逺近嘯聚大爲民梗公曰弗痛爲揃刈不足以震誡之命禆將脫伯押真率麾下掩其右合歹護尉掩其左約三日捲而内向反圍合與子阿术䧟陣擊刺禽獮草薙川谷爲一空是亦制蠻之一竒也自是所向風靡節解不二載平大理五城八府四郡泊烏白等蠻三十七部兵威所加如魯魯厮阿伯等城亦來􅅃附乙卯秋奉命出烏蒙趨瀘江剷秃刺蠻三城宋邊將水陸駐兵來扼戰屢交斬􅀗不勝計遂通道於嘉定崇慶間抵合州濟蜀江與鐡哥帶兒合兵以雲南平定遣使獻捷於朝且請曰西南夷漢甞郡縣之設官料民俾同内地此其時也允焉􅀩賜其軍銀五千兩綵叚二萬四百疋仍授銀印俾還鎮大理丙辰歳九月遣使招降交趾留介不報冬十月進兵壓境國主陳光炳隔江列陣象􅀐歩卒甚盛公分軍爲三隊濟江選鋒徹徹都從下渡先濟大帥居中次駙馬懷都仍受徹徹都方略曰汝軍旣濟勿與之戰彼必我逆駙馬隨断其後蠻必潰走海汝伺便即邀其船艦定成禽矣公旣登岸即縱兵與戰選鋒違節亦來渾闘彼軍雖大壞得駕舟逸去公怒曰違律失期軍自有法徹徹都懼飲藥死遂率止郡治七日軍令静嚴秋毫無所犯光炳震恐崩角請罪内附於是置酒髙㑹饗軍鱗屋喢血崇臺戈舡四艤而銅皷爲寂然矣巳未夏憲宗遣使來諭㫖約明年正月與卿㑹於長沙是秋率四王兵三千􅀐蠻㸑萬人掠横山寨柵闢老蒼関徇宋内地宋陳兵六萬人以俟戰盡殪所至調兵旅拒且戰且行自貴州蹂象州突入静江府遂破辰沅直抵潭州州大出兵断我歸路公與四王掠其後子阿术横擊于前盡破走之公提􅀌軍入絶域殫智竭力同德一心轉闘萬里前後敗殺宋兵四十餘萬州又遺兵來犯蹙之門濠掩溺無筭彼氣褫不復敢出壁城下者月餘聞丗祖皇帝駐師鄂渚㝷遣曲里吉思將千人來援仍慰勞之由滸黄北渡庚申夏孟飲至上都至元八年公卒享年七十有二以祖妣夫人外刺真配實生開府公第三室皇考開府公諱阿术資和粹行義修正沉幾有智謀臨陣對敵英毅果决氣蓋萬人憲宗朝癸丑􅀊以白衣從父都帥公征西南夷率天下精兵爲候􅀐所向摧䧟莫敢攖其鋒至平大理諸部降交趾踐宋境無不在焉一攻一戰禀成庶違教令竭力奉親移忠爲國其碎水寨掀闓城奪國君於馬湖舟指可掬索盗馬於山楪賊將生擒之又鏖戰三湘搴旗五陣是皆樹立之駿偉者也甞􅂪憲宗賞諭有阿术未有名位挺身奉國特賜黄金一百兩以勉將來其降大任於公兆開於先然也中統三年秋九月自宿衛將軍拜征南佩金虎符治兵于汴復立宿州至元元年秋八月詔掠地廬江入滁陽自安府經略两淮軍聲大振四年秋八月􅀚兵襄陽遂入南郡取仙人怗城䓁柵俘生口五萬人江陵晝鎖宋人聞我斾還多掠選兩淮驍悍􅀐五千歩萬人併力邀襄樊間公謂諸將曰􅀂不投宿江北恐落賊便遂自安灘濟江獨留精􅀐陣牛心山下立虚寨設疑火夜半賊果至伏發斬首萬餘級􅀄公過襄陽駐馬虎頭山指顧漢東白河口謂諸將曰􅀂築壘於此以断餉道襄陽可圗也議聞於朝許焉五年九月築鹿門新城白河等堡六年七月大霖兩漢水溢宋大將夏貴范文虎相継以兵來争又遣兵出􅃿東岸林谷間公按􅀚兵􅀔謂諸將曰此虚形不可與戰冝整舟師以備新堡衆從之明日南舡果􅃐新堡大破之殺溺生擒者五千􅀗闘艦百餘艘於是治戰艦教水軍築圜城以陽文虎率舟師來救來知府以百艘泊百山掣肘城役皆邀擊於􅈅灘敗走之禆將百舫躍入襄州尋乗輪舡順流東走分艤戰艦以待燃薪照江兩岸如晝公門関擒張餘衆盡殪是月授驃􅀐衛上將章事都元帥如故九年三月破樊城外郛重之襄樊兩城漢水出其間宋人植木江中鎖以鐡絙中造浮梁樊恃此爲固我以機鋸断木斧絙燔其橋襄援旣絶公率猛士攻而拔之襄守將吕文煥懼而出降秋七月奉命掠地淮東抵維􅀭城下彼以千􅀐出戰公伏師道左佯北賊果乗之擒􅀐將王都統十一年正月公入覲因陳奏兵事曰臣阿术乆在行間備見宋人兵弱於昔削平之期正在今日上付相臣議乆不决公復奏曰今聖主臨御釋亂朝不取臣恐後日又難於今日上喜曰卿言􅁢契朕意詔以兵十萬付之三月進榮禄大夫平章政事秋九月師次郢之塩山得生口四人問知宋㳂江九郡精銳盡萃郢江東西兩城今欲師出其間􅀐兵不得護行兩岸此危道也不􅀂取黃家涴堡東有河口可由中拖舡入湖轉而下江便時雨九晝夜不息公料大軍方集餽餉不継水陸兩間進退無據吾大事去矣遂與右丞相伯顔公議决意前進遂拖舟逹江舎攻郢而去􅀄過郢按行舟路徑大澤中忽􅀐兵千人掩至時從􅀐􅂊數十人公班馬􅀍甲擐摕巳即􅁬槊馳擊所向披靡彼驚走追斬五百餘級擒趙范二統制乙未攻沙陽新城拔之前次復州守將翟貴迎降十一月丁酉公徃覘漢口兵􅀔時夏貴巳鎻大艦扼江漢口兩岸備禦堅嚴叵犯公曰可囬舟輪河口穿湖中從羊羅堡西沙武口入江甚便十二月辛亥大軍至羊羅堡攻之不克公語右丞相曰攻城下䇿􅀂分軍船之半循岸西上泊青山機下伺􅂩擣虚可以得志是夜雪大作􅀺明開霽風息公遥見南岸多露沙洲即率部曲徑渡令載馬後隨宋將程鵬飛來拒戰公横身盪决蹀血大鏖中流敗去得舡千餘艘公登沙洲急擊攀錌闘開而復合者數四賊小却出馬於岸遂苦戰破之追殺至鄂南門岸兵敗走夏貴聞公飛渡大驚以爲從天而下引麾下兵三百艘先遁餘皆潰亂我軍乗之江水爲赤羊羅堡亦拔盡得軍實右丞相議師所向或欲先取蘄黃公謂諸將曰􅀂赴下流退無所據上取鄂漢雖遲旬時可以萬全且將士有家欲上欲下公私兩便事儻蹉跌我任其責從之水陸趨鄂焚其舡三千艘煙炎漲天兩城大恐漢陽鄂渚投兵皆降十二年正月黃蘄江等州降戊戍公率舟師趨安慶府宋殿後帥范文虎出降継下池州宋平章賈似道督諸道兵扼蕪湖先是遣行人宋京來請和二月丁卯師次丁家洲公與右丞相議曰且和議未定間昨我舡出彼已亂射又執我邏􅀐四人宋人無信惟當進兵又曰􅀂避似道不擊恐已降城池今夏難守􅀂欲實和俟渠自來作何語徐爲思之遂與前鋒㤗州觀察使孫虎臣對陣夏貴以戰艦二千五百艘横亘江中以道將後軍殿時我巳令諸將順江兩􅀔樹礮擊其中堅南軍陣動􅃐我舡急進公即挺身登艦手柁衝舡雷鼔大震喊聲動天地我師掠彼舟大呼曰宋人敗矣似道倉皇失措舳艣簸蕩乍分乍合公以小旗麾將校率䡖銳横擊深入宋軍大壞即回棹前走右丞相以歩􅀐夾岸掎之追逩百五十里殺溺死者蔽江而下􅀗戰艦二百餘艘都督府圗籍符印悉爲我有軍資噐仗狼籍不勝計是日似道以輕舸東走揚州夏貴走廬州已已無爲軍太平州和州降癸酉建康禆將徐王榮以城降撫慰城中市不易肆朝廷以宋重兵皆駐江都臨安􅀝之爲重四月甲寅命公困守楊州甲子公次真州與南兵戰珠金沙殱其千人􅀗塩舡三千艘旣抵維􅀭視楊子橋河路漕真粟以助揚之即樹柵断其餉道宋都統姜才領馬歩二萬來争期於必取南軍夾河爲陣公麾􅀐士踰河直斫姜陣才所將多亡命叛降餘皆淮卒勁勇養銳日乆戰數合堅不能却我佯北才軍果逐之我􅁬而回戈萬矢雨集彼不能支􅀐先道去我隨以鐡􅀐蹂之追逩斬馘萬八千餘級兩淮鎮將張丗傑孫虎臣以兵萬艘駐焦山東七月辛未公登石公山萆而望之舳艫連接旌旗蔽江公曰可燒而走也遂摘伉健善彀者千人載以巨艦分兩翼夾射公居中合􅀔進擊継以火矢著其蓬檣煙熖赫赫窘無所出先是虎臣命前舡悉沉鐡䌫於江示以必死至是欲走不能前軍争赴水死後軍閧走追至圗山􅀗白鷂子七百餘艘是後淮東諸城兵不敢出矣十月王寅進拜榮禄大夫中書左丞相仍諭之曰淮南重地庭芝狡獪湏卿守之時諸軍進取臨安公駐兵􅀲洲彼絶應援􅀭不能爲後患兵不血刃而兩浙平定公控制之力爲多十三年二月乙丑夏貴舉淮西諸城來附左丞相謂諸將曰今宋已亾獨庭芝未下以外􅂇猶多故也􅀂絶聲援塞饟道尚恐東走通㤗假息江海乃柵揚之西北丁村拒髙郵寳應粮運貯粟以俻湾頭堡留屯新城用逼㤗州又遣千夫長伯顔察帥甲􅀐三百壯湾頭兵力仍諭之曰庭芝水路旣阻必從陸出冝謹備之如丁村烽起當首尾相應断賊歸路六月已酉姜才知髙郵米運將至出歩􅀐五千果犯丁村與我兵相抗至曉伯顔察來援所將皆牙下精兵旗幟作􅀟赤月大軍望其塵起連呼曰丞相來矣南軍識其幟才脫身走追殺􅀐兵四百歩卒免者不滿百人辛􅆗李庭芝挾姜才東走公率兵追襲殺歩卒千人僅入㤗州廼築壘以守之七月乙巳朱煥以楊州降乙卯㤗州守將開北門納我師執庭芝等出継奉命戮掦州市􅀄􅀭㤗下公申嚴士卒不得入城致毫髮犯有武衛軍校掠民一馬即斬以徇其號令肅賞罰信有古名將風其年九月兩淮悉平冬仲北覲現世祖皇帝於大明朝殿庭陳宋俘設大讌賀平孽宋因上奏曰是皆陛下威德所􅃱臣阿术何與焉君臣慶洽雖䑣弓湛露有不足喻其樂者第功行賞實封興㤗縣二千户卄三年奉命北伐叛王昔刺木等明年凱旋継西征至哈刺霍州以疾薨享年五十有四訃聞上震悼乆之詔諭有司曰阿术平昔多􅀒勤勞其靈車南還給馹􅀐六十疋所過供帳設奠􅁙大同宣寧縣公貴而不有其位難而克任其責料敵明臨幾果聞敵所在忠勇􅁬發不俟嚴辨躍馬挺槊䧟陣深入故士卒感服争出死力南征北討四十年間大小百五十戰未甞敗衂其追降生擒者皆釋而不問及處閑暇恂恂似不能言論者謂公智信仁勇四者兼備與孫呉合云某􅀼甞考昔方叔召虎爲周宣平淮夷詩人述其功績鏗鏘炳燿盪人耳目故宣王之形容與其輔佐由今􅀚之􅀂神人然不過陳其車徒之盛謀猷之壯而已􅀂夫開府公飛渡長江合􅀔先改因舟於敵乗機制変間不容髪恐詩人􅁔功列之于雅有不足諭其羙者况三丗䋲武爲國虎臣身都將相功名自終越古無輩由皇祖元戎推誠事上顯爾都帥竭力殊方開府公􅁬身爲國心􅀂金石忠結人主之知功定天下之半冝乎如營平矦展用於漢宣形圖麟閣郭汾陽輸忠於唐室廟開私第蓋君臣之義始終之禮自相感發固將有以焉爾異代同德古今一時又何假魯靈獨羙龍旂之祀哉爰作樂􅁔以登新廟其辝曰奕奕新廟有侐其庭躭躭四阿桓桓兩楹鼎薦牲牢罇湛玄清三事同儀品物具備上交神明下輔孝治子孫烝烝執爵而升以祼以濯乃伏乃興僾然愾然如聞形聲工􅁔祝告載􅀭我武於赫皇祖方叔召虎翼戴三聖肇開萬宇忠勇奮發所向臣虜威懾西陲削平南土儷景同飜照映中古於爍王父􅁬戈濯征憬彼西夷是懲是膺如霆如雷不震不驚雪山雲静滇水波澄鱗介肆狂皇威載暢掃除妖氛破南海浪踐騰宋境孰敢爲抗﨣﨣堂堂寔曰忠壯文昌上將兩两翼帝羽林壘壁横大利噐於惟顯禰繄時英衛師干之試折衝萬里笳鼔歸來敦詩說禮丗祖再造有䖍秉鉞􅀒固不庭俾徃式遏料敵制勝如火烈烈摧枯爍雪江海有截車書㑹同論功推傑元貞守文載念忠勤登秩錫土光融九原有來酣戰意甚閑暇釃酒臨江投壷􅁔雅歛之一堂泠風灑灑鐘鼔和鳴祖考来假宜其家丗翼翼振振孝孫有慶聲于廟門嗣侯伊誰平章政事爲子爲臣惟敬惟義祉委祥臻忠􅀓孝継子孫承之垂􅁉罔替秋澗先生大全文集卷第五十
