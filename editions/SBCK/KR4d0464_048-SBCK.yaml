body:
  text: 大元故宣武將軍千户張君家傳君姓張氏諱思忠字正言盧龍永清人也曽祖衍大父徳輔世業農金百年來支属蕃息居不異㸑至今以義門稱燕朔間父諱仝資沉粹少以昜業起家爲志大元甲子天兵南略以良家子從軍隷都元帥史公戯下以武幹見稱凡意料且與公契及公鎮守真定得專擢拜以功監領左軍充唐山邑宰既而開府忠武公紹襲閫職首以鎮撫授君􅀊壬辰以千夫長從公略地河南歸德禦堅猝不昜㧞君鼓勇先士卒登且以戎鎧鮮異爲大帥速不䚟所識及賞犒以功譲所善髙信由是信㧞出行伍致身顯逹遂轉戰宻之西山民避兵匿洞窟中往往縱火燻逼君言諸主帥禁爲頼全活者甚衆其後從戍陽夏開邊屯受成整暇兵有餘力而民懷風愛継移鎮入鄧凡百草創都督史侯皆擬易治一新君依前以鎮撫供職於是招流散復田廬治渠堰整屯戍謹斥候咸領辦有方不大聲以色人至以佛張鎮撫目之其慈祥爲可知丙辰春壽六十有一遘疾終鄧之宜舎葬真定縣臨濟里域夫人趙氏後公十九年殁生子六人宣武君即其長也宣武㓜不好弄甞聚嬉里門能威重自居指顧群児不異官府識者巳稱其不凡及知學頴悟不群既長有謀略善􅀐射大都督一見與語竒之命日侍鈴下庸玉汝之幾冠嗣父職適有事江淮風雲交㑹之際宣武年少英發夙夜聽恭不遑寝餗氣益厲志益明事益辦時軍府有疑獄乆不能决命審鞠之畧不加威而窮姦直枉兩造情露闔府與其明察至於繕城壁建樓櫓使號令精彩一軍増雄雖謀出於上其所以廣益於下者多君之力焉丞相忠武公奏降銀符真授都督府鎮撫至元五年朝廷命帥會諸道兵攻取㐮樊爲上流破竹之舉宣武備列戎行首建戍白議曰淯澮于漢冝亟據要害築堡成使遏宋人泝流以資㓂盗不然彼或先之豈惟奪志吾無如之何矣從之分兵壁其㑹宋人爲氣禠時餉道不継行省以君有畫能幹即擬充唐州新野等處提舉粮漕使淯行崗阜間淺深不常艱於綱運君遂揵數堰平水􅀔隨造江軸車餘千兩兼速陸運復設防戍絶去涂梗舟車通便軍餉爲不乏矣樊城小而堅爲㐮之扜蔽省議取之翦其臂翼君率先豼虎既登中流矢戰不輟丞相伯顔公壯其勇止之以勞宣授行省都鎮撫其職掌大槩上承大帥方畧指授諸將諸軍有所関白必因以上逹與夫訓練調遣廵羅等事皆所領治當時諸軍大小四十餘壁每翼鎮撫一貟號之曰接手日聽將令於都鎮撫武弁佩刀弭爾於雲麾之下蓋肅如也其􅀝重漢比軍司馬唐都虞之任君感其知遇誓以􅂢軀報國至元十年春二月㐮州破苐功上聞至􅂪弓矢鏐鞍繡衣之賜明年秋九月詔丞相伯顔等水陸並進鄂渚渡江師次郢宋人以艨艟闘艦横鎻漢面扼之不克前責君辨之君按視對江堡北有枯河可三里許連接一湖湖滙與漢通君喜曰吾事濟矣遂拖舟由港中盡逹于湖舳艫蔽江順流而東無復横草之虞矣大爲丞相嘉賞時主帥從偏禆百餘􅀐行視郢嶮天大霧不覺抵壁下彼潜出兵圍之者數匝衆相顧失色君奮槊突擊殺數十人爲解去因建言於相府曰郢據漢爲池東南又有沙陽䓁城傍爲掎角冝乗銳先破之側郢乃􅀌矣韙其䇿即命君督精甲潜往不移䕃掀沙揚石掇新城降􅃆陽而去隨與諸軍併力破夏貴兵於陽􅚒堡以清江道我師飛渡駐武昌軍矣時朝廷䇿諸將始加散秩以功冣授宣武將軍師旣東前阻鄱湖風浪君力督水師浮梁而濟其敏捷赴功􅀋如此宋相賈罄國力結陣丁家洲塞江路俟與我師鏖决丞相公命君督諸軍前陣君鷹􅀭致師出入行間指授方略意甚暇也一再合而宋人敗績遂入建康丞相阿木即分兵趣􅀲歩回擣維揚擇勇而有謀者偕往君首膺其選丞相公惜不遣令將䇿勝一軍權充萬夫長聞于朝其爲二相􅀝重者􅀂爾命未下竟以勤勞致疾以是年夏五月殁金陵之軍幕得年三十有九丞相公聞驚悼以馬箠擊地有云亡孰継之嘆遣属將祈祐護其轊歸張君爲人美􅂡髯氣量宏事親孝撫諸弟以愛與人交有終始不一言忘盡心所事國爾忘家􅀂饑渇之於飲食其趍事建功臨機制変志慮岀人意表拊循士卒與同􅅴苦皆樂爲之用故其燕趙勁氣所向披靡樹駿功爲􅀹多􅀄渡江凢軍中俘士人爲獻者君與求親属悉資遣之其或願留依庇者事甫定一皆縱還郷里夫人房氏唐相國梁公裔内助有法配君德良稱先君没生子男四人長曰用道嗣君職次用和用康用章女四人適名族継室史氏大尉忠武公之次女生女寕哥孫男四人女孫三人賛曰張氏三世在野純積旣乆固所發攸厚􅀂父鎮撫君起壠畒􅁬􅁄矜致身偏禆亦云顯矣其施若猶未也逮君遭乗機運􅁬發志勇以投風雲之㑹惜乎功名垂就不享其報使英資茂績有欎而未盡者今嗣侯以破静江討江西逋㓂等功進武德將軍行軍緫管風姿文雅延譽士大夫間殊藉藉然蓋將衍夫遺澤而大其世業者耶用道與内弟游交甚􅅃以家傳見属遂直書其事至於筆削其間以俟夫學春秋者焉盧龍趙氏家傳孟倅穆㝷墜緒纉先猷持懇太史王惲通述一傳庻幾遡川流而逺紹淵源漑根本而敷榮枝葉以衰謝辭者載請彌堅謹按趙之得姓肇自周滿䇿造御勞胙土受氏子孫蟬䗡代有聞人時藐譜逸蔑克論次所可知者當唐丗逺祖諱少陽生子簡亮亮生元遂宦游于燕家焉因爲盧龍人遂生子思温字文羙資英栗拳勇絶人尚氣任俠五代􅀄燕帥劉仁恭壯其才武署為偏將晋王存朂來問公率所部挺身逆戰目中走矢為統帥周徳威所推晋王聞其驤勇義而釋之數蒙指蹤逮與梁人戰於莘野䧟陳深入斬戮不勝計弟功㝡加金紫光禄大夫檢校尚書左僕射使持節平州諸軍事平州刺史神冊二年為太祖遣元帥擁大兵来攻城中粮盡猨絶公審形勢之歸察輿情之去就遂欵附太祖素知其才勇可寵遇殊渥東代渤海俾將充都團練使旣餘率敢死士十餘輩突戰先登立㧞其城身􅀍重傷太祖親調藥以傳之武帝即位論㑶敵功檢校太保静軍節度使天顕十一年石晋起義并門來求援命公出師風憲間掎角之敬瑭頼以克濟加特進檢校太尉中書門下平章事燕京留守盧龍軍節度使管内觀察處置等使明年進階開府儀同三司兼侍中封天水郡開國侯食邑一千五伯户仍賜恊謀静亂翊聖功臣兼雲應朔奉聖等道採訪使時方兵後彫瘵未蘇政舉綱條維宏寛簡轉臨海軍節度使㑹同元年使晋行􅁽禮還檢校太師兼侍中進開國公加食邑伍伯戸二年春有星隕於庭俄薄疾以三月廿日薨享年五十有八上聞震悼奠祭􅐠賵有加贈太師衛國公葬昌平縣五華山之陽敕集賢大學士張礪銘其神道公事親孝奉上忠出入行陳三十年大小百餘戰勲業烜赫身都將相備極人臣之貴而謙撝自牧退然􅀂無能爲者冝其以功名終􅀄遼祖殂后述律氏智而忍悉召大將妻諭曰我今寡處汝䓁豈冝有夫復謂諸將曰可往從先帝於地下有過者多殺於木葉山墓隧中公後以事忤后使送木葉山辭不行曰親寵莫后􅀂何不徃曰子㓜國疑未能也廼断其一腕以送之直公而不殺平昔守正不屈􅀋如此配太原王氏贈鄭國太夫人継室清河夫人張氏陽翟夫人翟氏子十有二人長曰延照永清軍莭度使侍衛親軍事特進檢校太尉同政事門下平章事開國公食邑一千伍百户賜號推忠奉節毅勇功臣十一丗孫昞山北遼東道廉訪吏今居鄢陵次曰延祚燕京留守檢校太師開國公食邑一千户十一丗孫朏肥郷三務使今居燕十二丗孫天民遼陽省都事今居平灤曰延卿竭莭匡􅀖保義功臣大同軍莭度使檢校太師開國公食邑一千户曰延搆供奉官東西班都􅀧檢曰延威推忠佐命翊賛功臣保静軍莭度使特進檢校太師開國公食邑一千户十一丗孫明今任兩浙運司知事曰延晞飛龍院使檢校尚書左僕射曰延誨保静軍馬歩軍都指揮使曰延光順義軍莭度使曰延玉彰國軍莭度使曰延煦􅀧檢曰延紹同州兵馬使曰廷旭内庫提􅀧女十四人長適㤗安州刺史傳知寳次適天雄軍莭度使檢校太尉兼侍中韓巨美次適弘農楊氏次適竭誠奉國翊賛功臣東平軍莭度使特進檢校太師兼御史大夫上柱國南陽郡趙國公尚書令判三司使韓徳樞次適榆州刺史張彦英次適彭城劉氏次適左林大􅀅軍張美次適宣徽南院使天平軍節度使檢校太師同政事門下平章事判三司韓勣次適清河張氏次適博陵崔氏其􅄏府太師衛國公苐五子特進府君即穆之十二世祖也葬建州永覇縣白羊峪有乾統七年夫人馬氏所􅀣銘幢特進府君生二子曰匡舜左千牛衛大􅀅軍生子四人曰匡禹臨海軍莭度使生八子第七子爲翰仕至保遂州團練都統使始􅁙大興穴窵别墅即睿智皇后賜田也生三子相之生五子第三子洧生六子第二子公為嗣兼管内􅀚察使一子鎔官鎮國上􅀅軍一子居常驃􅀐衛上􅀅軍七世並襲遼世爵相之府君弟進之永豊庫使尚之生子㳂絶進之一子漬寕昌軍莭度使贈金吾衛上􅀅軍三子仲曰公謹龍虎衛上􅀅軍静江軍莭度使四子孟曰興祥賢而多材仕金海陵世宗两朝以德望門地致仕途顯赫官至􅄏府儀同三司左宣徽使太子少傅申國公封鉅鹿郡王葬良鄉回城劉李里蔡家凹迄今以趙大王墳目之翰林待制趙攄所􅁧神道碑在馬驃􅀐府君生五子曰柄天姿孝友博學克守世範曰挺􅃉星暦術金􅀄任靈䑓司正郎曰機􅅏心軒岐書伎精良􅃟充尚醫侍宣宗官至保宜大夫曰梅善傎殖致屋潤積而能散貧乏者多沾其惠興陵因逰畋􅀫其家聞富而好禮賜銀燭盤二鄉梓榮焉甞監謝邨鎮酒曰植字景道穆之曽祖也姿情淑有操行力學務為无所不窺工作詩甞舉進士不偶輙拂衣去易名皆隱穴别墅教授爲業别墅東二里許即金建春離宫明昌間道陵春水過聞絃誦聲幸其齋舎諷詠壁間所題詩有折脚鐺中烹白薺打頭屋底看青山者乆之㝷召至行殿賞其志趣不凡命之以官固辭曰臣僻性野逸志在長林豐草金鑣玉絡非所願樂况聖明在上容巢由爲外臣可乎道陵益竒之特賜田十頃復之終身士論烜燿自是不呼姓名皆曰建春徴君號其郷曰崇讓尊顯之也終於㤗和二年三月乙丑享年八十五配李氏生子玫司正府君之子曰侃字和之穆之伯祖儀觀秀偉學識該貫􅀹長於音律儀制章宗時用閥閱子弟試太常禮樂科中承安二年登歌甲首由是於禮樂愈覃精爲專門之學矣積勞自工師副正轉恊律郎貞祐播遷禮樂散失不完命楊禮部雲翼馬太􅀶千里詳定府君以掌固得預莭文所不備條理之未暢咨其論說􅀘罅爲多累官定逺大將軍大樂署直長權知太廟署事金未南遷校量鐘律獨黄鐘抑而不􅀭既至汴林鐘復爾雖更鑄尚然􅀼自嘆曰八音與政通隂陽消長所在可以卜時之治忽中興其不竟乎既而金亡甞㑹飲市樓樂甫作語所知曰革有很戾音即去之果有酗而闘死者其沉機先識如此壬辰北渡隱居郷里未甞一日忘其素業廼編集郊祀所記憶者爲祀興樂志辨凡三十卷或譏曰􅀂子所學與時豈不背戾荅曰文武迭用世道之常今向平治以是備他時求訪之具聞者歎其資深而慮逺􅀊戊戍襲封衍聖公孔元措薦府君於朝攝大樂丞乗傳徧歷四方搜訪前代禮官樂師祭器圗集備預制作中綂建元以來文物郁然君有力焉壽八十一卒時已未夏四月廿七日也配金吾李氏一子守忠正大間䇿論進士仕至承徳郎管勾尚書省承發司前君没娶王氏桑氏孫五人柔原圭秀義曽孫継祖榮祖興祖顯祖等八人曽女孫十人玄孫男三人保宜府君之子曰璧字國寳穆之叔祖資沉雄有才幹渉獵經史中武舉第官廣威將軍宣宗麗妃位奉事卒於戊午􅀊九月十九日得年六十五配史氏麗妃兄之女生三女俱適時族建春府君之子玟字文王穆之祖也資長厚耿介不妄交游學問淹貫工辭翰藉門資調遵化三司使昜代後僻居研窮理學申明家法勉子孫興門户爲務自稱貽齋居士壽八十五終於戊辰三月九日配良郷李氏毋儀婦道光範中表生子鉉字仲器㓜􅀌藉伯考定逺君翼誨及長雅淡喜讀書不樂仕進蓫昜學好古多巧思音律占筮咸詣其精妙太宫肇造鐘鼎􅀕器法物朝儀以先生家學精思罕匹命之監視或以方技上聞適營建新都俾灼吉兆基命丕作蒙賜白金五十星重幣十襲相臣因欲官之辭不可止其言人榮悴雖察五行盛必配合道義廣示勸戒名公朝士歆其學識来質疑請益者無虚曰焚香煮茗間出三代鼎彛法書圗籍傳觀披翫論辯皆有證據及談遼金故事揮麈緩頰使聽者忘倦慈祥愷悌之色津津溢眉睫間有承平遺老氣象晩節號鈍軒逸皓諸賢贈遣詩文無慮數百篇甞於祖竁側搆亭爲春秋奠祀所承㫖王文忠公扁曰遺安樞相商左山爲之記其爲名勝稱賞􅀂爾今年登期頥康寕順適壽祉未可量也娶李氏生子穆性純孝早傳家學善􅂐􅀠以敏慧延譽搢紳間得從事翰林出倅孟州轉邢臺尹超授承務中山府判官穆之子遹祖述祖迪祖遵祖孫遷安於戯趙氏自五季迄今三百餘年子孫蕃衍幾於千人忠傳學継世濟其美越不事宦游者學術行義亦昭晣於時與韓劉馬共稱爲燕四大族至比唐李鄭崔盧由開府太師衛國公忠毅􅁬發􅂢軀爲國敦篤大本君子之澤其流淵長亶其然乎惟延威特進府君第五房一傳而二再傳十二人三傳至廿八人四傳四十五人五傳而六十四六傳八十四七傳九十二八傳當建春府君行群從數幾滿百本支子姪廿有八然遭壬辰䘮亂存者僅三人而巳非頼穆之訪緝譜諜則後人無由知其祖考之所自出宗系之所自分今復掦豐功之盛烈發潜徳之幽光傳載無遺垂鴻不朽俾趙氏來者觀感景仰克念無忝是亦顯揚之一莭也傳曰慎終追逺民德歸厚矣又曰惟孝子善継志􅄒事􅀂穆也可謂有志追逺述事者也大德巳亥秋七月翰林學士中奉大夫知制誥同修國史王惲述開府儀同三司中書左丞相忠武史公家傳丞相史公天澤其先燕之永清人世以族茂財雄號農里著姓曽祖倫祖成珪継有純德百年來潤涵淵寖匯而不發逮父尚書府君秉直讀書尚氣義爲一方嚮服生三子天倪天安公其季也國朝癸酉􅀊冬十月太師木花里以王爵帥天兵􅀯畧中夏雷碑霆激震蕩無前府君審興運之㑹歸一群疑之去就倡率義從迎降軍門王炤其誠數千人頼以生仍令府君綂降主漕継從王攻北京下之以勞授行部尚書淵流騰潤千載之㑹實開於此及金將武仙以真定降王命公兄天倪􅂶河北西路兵馬都元帥即鎮守俾仙貳焉時公年二十有三身長八尺音吐鐘鈜然善􅀐射拳勇絶人属櫜鞬署帳前緫校明年乙酉春護母夫人北歸仙尋叛都帥遇害府僚王縉王守道追公及燕曰變起倉猝部曲散走多在近郊即回斾當不招自至公毅然曰不聚國之讎死亦當往遂傾橐昜仗南還以圗報復行次滿城得士馬甚衆餘兵四集牙將毛䓁即推公攝行軍事遣􅁥軍李伯祐言狀於王就請兵濟討即命公紹兄職仍以國將咲乃㝵綂精兵三千爲援合􅀔進攻盧奴仙驍將􅁑鐵槍八主簿擁萬衆來捄公撤圍逆之􅁬先􅀅士灑血馳戰呼聲殷地無不一當十􅁑氣榹㑹曰暮退依􅂀水爲阻公料其墮歸敵必宵遁果然乗之衆大潰主擒鐡槍資其器仗儲㣥軍威大振遂下中山略無極㧞趙州進駐野頭仙懼奔西山之抱犢砦其年夏六月復真定無幾宋􅀅彭義斌隂與仙合又圗竊取公同國􅀅禦諸賛皇扼仙軍不得進義斌􅀔蹵嬰火炎山自固主帥問計於公曰賊衆山扼自䧟圯地此昜破也遂令監軍孫提銳卒五十公略其後継以鐡􅀐蹂之斬義斌戯下自是義勇之名軒襮燕趙間後數月仙潜納諜者匿大曆寺夜斬関爲内應遂反其城公跳走藁守帥董俊以全軍授公復與􅀏乃㝵破走仙主帥忿民之返覆驅萬人出􅀅勦焉以示威公曰是皆吾軍民我力不能及一旦委去不幸爲賊脅制今殺之何罪弗聽復力争良乆乃悟而全釋公乃繕城壁除武備明號令守禦以方爲不可犯之計􅀊荒食艱􅂢甘攻苦與衆共之於是招流散拊瘡痍披荆榛掇瓦礫數年間官府民聚以次完治然髙公抱犢諸柵仙之巢穴也不即揃覆則終遺後患隨攻下之仙䑕竄而去継又取相衛太宗即位公入覲朝議方選三大帥分綂漢地兵上素聞公賢詔爲五路萬户以真定河間大名東平濟南􅀠焉庚寅冬圍武仙於汲小大凢十餘壁金􅀅合逹以衆十萬來援鋒始交不利諸􅀅乗虚一時奔北公獨以千人繞出敵後挺刃横擊敗一都尉軍旣而復與大軍合攻仙逸去復取衛州明年壬辰太宗由白波渡河詔公以兵由盟津㑹河南至則睿宗皇帝巳破合逹軍於三峯山乃命公略地京東遂招降太康柘縣瓦崗睢州追殺守帥慶山奴於陽邑金主東播復自黄龍崗來襲我新衛公聞之輕􅀐馳赴比至巳合圍奮戈突抵城下呼守者韓帥曰汝等勉力援兵継來復躍出敵愕睨爲披靡明曰大軍至内外夾擊敗走蒲城公尾其後金將伯撒所將兵尚八萬我殺掠殆盡金主以單舸東保歸德公與諸軍㑹睢陽同僚撒吉思欲薄城背水而􅩌公曰􅀂敵來犯我進退失據此豈駐兵地耶公争不下以其事赴汴比還全軍皆没其圍蔡也當懸瓠北面潜渉汝險出入壘中血戰者連日蔡兵大衂汝水爲不流金亡公還趙視師自乙未版籍後政煩賦重急於星火以民蕭條倅不昜辦有司貸賈胡子錢代輸積累倍稱謂之羊羔利嵗月稍集驗籍來徴民至賣田業鬻妻子有不能給者時兵民未分賦役互重復遇征戍則趨辦一時中外騷屑殆不聊生公憫焉詣闕併奏其事民債官爲代償一本息而止軍則中户克籍其征賦差貧冨爲定額上皆從之布告諸路永爲定制迨戊戍巳亥間仍􅀊蝗旱復假貸以足貢數積銀至萬三千餘鋌公度民不可重困乃先出其家資次及族属官吏均配以償遂折其劵􅁥郡忙哥撒児以國兵奥魯數萬口散處州郡間營帳所在大致驛騷伐桑蹂稼生意悴然公騰奏太后悉徙居嶺北由是軍民肩息田里遂有生之樂迄今真定兵甲民數勝於他郡由公牧飬其根本故也國朝自金亡巳來􅀊有事於宋公未甞不在戎行􅀥陽之役城小而堅主帥忿其攻乆不㧞命徑乗其城公率馮程二㧞都國朝語謂勇猛士曰㧞都先諸將登太子闊出壯其勇惜其材傳呼止之公戰愈力克焉其攻㐮陽也宋以舟師數千陳峭石灘掎角以綴我肘太子以城不昜㧞可趣利舟楫命公往以陳翟二校自翼驅猛士兩舸直前擣之彼氣旣奪奮槊盪决覆溺者萬計􅀗焉及取光化復引縆首上立䧟其城復州之役敵盛以闘艦三千艘鎻湖面爲柵公進說曰柵破則復當自潰遂募勇敢士四十軰親鼓而前壞蕩無遺復懼而降其攻壽春也公獨當一面宋人以我圍逺􅀔分綏急首尾莫應賊乗夜果來斫營公單􅀐逆戰手格殺數人戯下継至悉驅賊入淮水至於掀滁州蹂盱眙掇寳應瀕江渚且破且降者二十餘所雖㑹諸道兵共事其伐謀制勝愾敵樹功未甞不在群帥之右及䇿勲盟府推譲行間雖寸長不掩故諸􅀅屈盡其智能士卒樂出死力論者謂公智信仁勇堂堂有古良將風壬子􅀊公入覲憲宗察其忠勤特加顯異遂以衛五城封公爲分邑方今聖上潜極知河南困弊請分治培植爲異日包舉殘之本許焉遂奏公􅂶經略使公以河外虚耗日乆封豕存食於内邊㓂日侵於外非大與休濯則不可去之舉賢能汰冗濫抑豪強均賦役信賞明罰訓農勧兵列堡戍以絶㓂衝實屯廪以給邊餉凢政之不便及民所欲而未得者率更張而立行之睢州長楊興封丘簿董極横恣不法􅁀其惡肆諸市萬口稱快明日閭閻間有􅀞公像者不二三年方數千里之間行於野民安其樂郊出于涂商免其露處􅀚善俗旣庻而有教察軍志則又知夫怯􅀻闘勇公戰威行恵布陽開隂肅内外修治略無遺䇿河流速潤衛亦復承平之舊宋人為禜其北門矣丁已春詔左丞相阿藍㝵兒勾較諸路財賦性苛刻鍜錬羅織轉功爲罪上下例遭凌辱公以勲舊獨見容假公請曰經略事我寔主治是非功過理當我責今舎焉而罪餘人心何能安怒叱去公不爲動堅請者數四用是翼蔽頼釋者甚衆戊午秋扈憲宗西征明年夏駐合州之釣魚山秋疫作方議囬鑾宋將吕文德帥艨艟千餘蔽嘉陵江來犯逆戰不利上命公禦之乃分軍為兩翼跨江流縱擊􅟃鉅艦數百艘追至重慶三戰三捷遂班師而還又明年庚申夏六月是為中綂元年皇帝御極首問公治國安民之道遂具䟽以聞皆時所急務上嘉納之旋命公撤江上軍還授河南等路宣撫使兼江淮諸翼軍馬經略使制辭有史天澤自太祖皇帝命木花里國王開拓漢地卿兄有佐命殊勲又扈從朕之父兄勤勞王事文經武略於國有功綏撫河南民懷恵愛有功髙心小夷險不移之㫖明年夏五月由江淮經略使進拜中書右丞相公旣秉鈞衡細大之務知無不爲然言必慮其所終行必稽其所敝不強時之不能不禁民之必犯體時順􅀔通變制冝於是清中書以正紀綱分六部以綜名實設撫司以肅州郡退貪殘以簡賢能霈恩澤以安反側頒禄秩以飬廉節禁賄賂以絶倖門又定省規十條董正其機務憲宗􅀄年括户餘百萬至是諸色占役者強半悉奏還爲民籍以紓疲瘵論思之際處國相儒臣間調諧彌縫必使情通理得期於事集功成澤􅀍生民而巳自是上下交孚帝載熈緝中書無留務矣故中綂􅀄元文物休明階太平之治者公之力爲居多秋九月扈從北征次昔木土與阿里不哥遇命線真爲右軍公爲左軍仍合大􅀔蹵之北兵潰遁三年春璮賊隂結宋人以益都叛上命親王合必赤緫兵討之兇􅀔張甚詔公徃視聞璮入據濟􅀯公曰豨突入苙無能爲也至則進說於王曰璮多譎而兵練不冝力角當以􅀊月斃之遂環以深溝髙壘奔軼應援之計略不能肆四月軍潰出降生擒璮公力主斬於軍門誅同惡者數十餘人悉縱歸傳檄東下爲璮守者皆降及陛見悉歸功諸將乃以擅殺自劾上察公忠誠亦不之罪􅀄臨軒授鉞付公顓征諸將皆聽莭制迨卒事未甞以詔㫖示人三齊平首奏兵民之權不可併居一門行之請自臣家始史氏子弟即日皆解紱而退􅀄公旣相即辭其封邑凢三請乃許其謙遜宻勿􅀋如此至元改元加光禄大夫中書右丞相如故三年皇太子燕王領中書兼判樞宻院以公爲左丞相樞宻副使遂議建三衛及留兵寓農之䇿不二三年國容軍實蔚然可觀六年朝廷營取㐮漢詔公與駙馬忽刺出徃經畫之賜金幣甚渥至則相要害起一字城聮亘諸堡貯兵儲絶聲援示以乆駐必取之基旣而以疾還明年進開府儀同三司平章軍國重事仍令右丞相安童諭㫖曰中書省尚書省樞宻院御史臺或一月或浹旬大事卿可商議小事不煩卿也十年宋將吕文煥以㐮陽内附聖天子赫然有掃清六合混一車書之意明年秋與右丞相伯顔緫大軍行臺荆湖自㐮州水陸並進趣鄂渚渡江中道病不能進上聞遣使賜葡萄酒勞公仍慰諭曰卿自朕祖宗以來躬擐甲胄䟦履山川宣力者多矣又卿首事􅀯伐異日功成皆卿力也勿以小疾阻行便爲􅁨勞可且北歸善自調護公還真定上又遣其子杠與尚毉馳視及賜蔘糖等物因附奏曰臣大限有終死不足惜第請天兵渡江以殺掠爲戒言訖而薨略不及其家事年七十有四計聞上深震悼遣近侍致奠賻白金􅀂干贈太尉謚曰忠武仍勑辭臣製碑表其勲德公忠亮有大莭出入將相近五十年其元勲碩德柱召四朝師表百辟殆古社稷臣而氣貌循循􅀂無所爲者及臨大事論大政夷大難毅然以天下之重自任要以竭忠徇國尊主庇民爲心一以至誠將之其視冨貴􅁠􅀔歛然畏逺􅀂將有凂於巳者其善始令終世擬之郭汾陽而器量􅆂弘識慮明哲又根於天性粹然故累朝賞公忠勤龍光稠疊前後賜賚不可殫紀公􅀄進大拜制下之日朝野交慶公門閤蕭然􅀂無所事有面說公以威權自張者公因舉唐周墀爲相問於韋澳曰力小任重何以能濟澳曰願相公無權墀愕然不知所謂澳曰爵禄刑賞與天下共之何權之有又曰某縁汗馬頗著微勞餘將何有令眷􅀝如此正以軍國事體猥多歷練老夫有通譯其間爲諸公調逹耳相則吾何敢當言者悚服而退至於開誠心布公道集衆思廣忠益用人齊家訓教子姪又有大過人者當歸德城潰脫李大莭於白刃俾叅幕謀留務無巨細一以委之叅卿主昌齡代公治衛亦以聽其注措其禆賛籌畫則王守道納合松年四人推誠委􅀉雖骨肉莫能間故真定治效髙視他郡四方爲之訓北渡後名士多流寓失所知公好賢樂善偕來遊依􅀂王滹􅀯元遺山李敬齋白樞判曹南湖劉房山叚継昌徒單顒軒爲料其生理賔禮甚厚暇則與之講究經史推明治道其張頥齋陳之網楊西菴張條山孫議事擢府薦逹至光顯云􅀄武仙旣害都帥公紹其職及兄子楫長即奏請於朝曰臣始遭家難龜勉承乏以雪讎恥今姪楫等皆可勝任願以職歸之畢臣宿志太宗曰但聞争官者多譲職者鮮卿之此舉殊可嘉尚朕自有官俾之即詔楫爲真定路兵馬都緫管後又奏次姪權􅂶唐鄧軍萬户公因以疾乞退曰臣無大功報國一家處三要職恩寵踰等敢昧死固請上曰卿奕世忠勤有勞於國一門三職何愧何嫌竟不允憲宗駐六盤也詔發民爲兵􅃙使擬公子爲帥公曰吾昆弟三人大兄之子俱顯仲之子未也幸先之使者嘆服竟以姪子拒􅂶新軍萬户􅀄緫衛釣魚也有邊將蒲察琚者􅀠焉日有言偃蹇不爲下公含容之明年渾都海平行臺上功相府獨琚名闕公問焉或以前事對公曰聞平夷隴右􅀂功㝡多其可後哉即命具完文以進遂均賞賚其忘過記功又如此甞集子姪軰戒之曰史氏起龍幹際風雲德凉效薄今身名顯赫宗族昌熾如是何以荅乾坤大造累朝之恩􅀻乎􅀂以王事殁邊褁馬革歸葬吾素願也汝等異時䇿名委質盡忠所事以圗報國又曰惟孝與義可有立於代汝等謹服此訓苟違吾言與􅁀吾丘墓等爾公年四十始抑莭讀書酷􅄝資治通鑑真積力乆義精理貫諷誦略皆上口至成敗是非往往立論出人意表雖老師􅀫儒有不加詳者至矢謀廟堂運籌戎幄良法美意契合融㑹見諸行事者誠無愧於古人云八子格中書右丞樟前新軍萬户棣中山知府杠提刑按察使􅂎前衛輝路緫管梓澧州路同知楷終南陽府同知彬御史中丞孫男一十六人不肖惲猥登公門者有年及與諸子游故聞公言行頗詳以家傳属筆故勉爲譔述異時太史氏勒元勲於帝籍賛盡像於凌煙庻幾有所考焉賛曰忠武公當草昧患難之際憤發義勇收合散亡卒之芟群雄定河朔開國承家光昭父兄遺業其功烈巳不世出然一時佐命儷景同飜者多矣唯公歷事四朝恩遇眷􅀝始終不少衰復能歛百戰之威雍容廊廟以道事君爲時賢相髙名完節爛然獨著福禄永終􅂟流後裔豈偶然致哉蓋由勲德兼備忠智兩全君臣之間有以感召故也􅀂秖以遭際期運依乗風雲論之是豈真知公者哉故推其生平行巳大節爲後來之法云秋磵先生大全文集卷第四十八
