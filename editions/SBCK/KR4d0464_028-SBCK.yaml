body:
  text: 七言絶句故宫遺石華陽遺宫土花碧依然萬石如林立憔悴崩雲偃月姿留與都人作寒食至元十六年㽔賔前二日同賈漢卿逰上方光敎寺謁相上又不遇因賈徃年留題五詩清新婉麗煩􅁭為灑然也亦留詩壁間仍用其韻為鑑堂一􅀏紺碧亭亭午影凉同來共坐賛公牀拖條柱杖誰家去借問山僧有底忙出處何心燠與凉適來真是兩繩床分司不作埋輪去虚抱乖崖救火忙古寺僧殘草木深寳香猶足散煩􅁭雪䆫不到聞猿句幽鳥還驚恨别心謂漢卿明日北㱕萬事無端起六根蟻旋蜂閧苦紛紛間來莫厭僧䆫話暝坐團滿到日矄花木蟬房一徑幽生平竒勝愛窮搜入門便得清凉界信有人間六月秋間閒公正大二年為慈聖兩宫重修寺碑􅀃寺蓋夷山之地唐令狐楚愛其竒勝曽居於此塔係唐新羅僧智照用海船運新羅琉璃甓所建閒人愛作静中忙細和新詩歩繞廊老衲向人誇水異一甌春露雨花香流杯池九曲彎環碧玉圍錦香吹浪下龍池一觴脩褉宫中舊正是梨花雪滿枝太白捫月圖詩中無敵飲中豪四海飄瀟一錦􅂁千丈醉魂無處著青山機上月輪髙閆次于秋山圖五年官守􅀳州城伐石堙山日有程展放畫圖還憶得姑山黄葉正經行李白醉吟圖長庚風彩月爭輝力士傍無識子儀白璧莫嗟疑有玷夜郎風物要新詩題蘭廣寕望海寺詩卷後同年樂用之為録二詩贈仁甫縣令金到明昌事事新粹然一氣變斯文試吟望海楼中詠轉見飄飄思不羣逺懐丗契崈明徳遹述先猷極孝心舉世泯然衰俗裏兩家風􅁩見來深紫陽觀雜詩和西溪嚴韻䄂裏丹砂照夜紅市人爭識漢壷翁南都花木春猶好長在先生杖屨中心安巳契長年詵通寂能開不二門我亦静中存夜氣此身之外欲何存終日沉迷簿領中乗間時過紫谿翁請師莫作功名看心似浮雲度太空片言理到釋群疑不待諸生入􅃹窺收却藥籠無箇事一簾春夣落花知坐忘不戴逺遊冠是是非非了不干欲識紫陽存飬力一簮玄髪頰浮丹緼絪元氣化雖精起㓕漚如一唾􅁿為問壇邉聴􅀴鶴人生何苦未忘情余年齠齔出亰師想像繁華夣覺時前日石壇揮麈䖏故宫真似黍離詩昌􅀺一序了仙翁六絶西溪意匠雄從此夜牕虗白滿滌除玄覧見冲融一壺大地市朝間施藥歸来盡掩関幽睡不知紅日晚青山誰似白雲間壤壞槐宫蟻􅀾空銅駝陌上㡬秋風一身歸潔何難有人重清時濟物功宫井七絶團團鴛甃露盤秋玉潤砂紅湛碧流多向内家供頓後餘甘翻麝入茶甌野粉侵滛暗漆花玉床零亂卧泥沙羸瓶敗繘􅀄無擇波及都城十萬家髙梧隂􅇈掖庭西清比中泠甘比飴今日道傍塵穢滿秋娘憔悴渡江時清時瑶殿引瓶金百尺還聞墜水音想得日長宫閣静玉盤珎果看浮沉金屑離離泛曉光瀛池通氣濕嬰香六龍不挽清波去忍給吹脣燕御牀事事宫庭到可珍我因懷古故来頻一泓雖在當時水終似上陽白髪人行入空宫重嘆嗟􅀝天金碧堕塵沙景陽留在烟脂井似與都人續夣華後三絶和西溪韻武元直雪霽早行圖謝宣慰亂峰疊巘玊崚嶒危棧何人趂早行似我姑山新道就神居東崦聴鷄聲予官平時開姑山道甫成夜雪大作明試車下故云神居雪擁天山六月寒冷雲西北是長安行人馬上楊鞭喜猶勝南荒作􅀬官侯敬甫四題同西溪賦昊天報徳詩人感號慕終身大舜心舉世靡然衰俗裏一家追逺見来􅀷怡怡和氣滿春䑓天􅂋曽忘鞠子哀􅀃似升堂興起客功夫元自孝思耒支于堂徳積于身報自豊君家培植見􅀷功友于堂下看株􅀣漸與三槐氣象同種徳堂紛紛萬變一心微止水能澄見是非客去妙􅀚尤有得滿簾春日静朝暉清心堂跋唐申王􅀞馬圖内府曽􅀚鐵筆騘又扵此􅁓得真龍却疑决電奔虹異不到少陵題品中題劉平妻胡氏殺虎圖獸猛其如義烈何揮刀峻絶魯陽戈哀哀􅂘絶東山婦恨入秋空淚謾多重陽前三日仝大季長畢茂先酌七賢祠下滿眼青山落㡌風七賢祠下一樽仝雲煙頋盻來能幾白髪相看緫老翁蓮社圖莫恠淵明從逺公􅁂絲禪榻偶相同談空􅀃有知多少都在龍眠意匠中二教玄風盛永嘉後來諸子更紛拏淵明興在東籬菊獨泛秋香亦自佳一誕相誇䧟洛郊流傳江左到滔滔杖藜首見淵明􅀞裏龍眠意㝡髙贈唐縣李縣尹按部次堯封教官石雲卿來訪因話縣東有前鄞尹李君年六十四雖武人性憙學巳卯夏自浙東歸載羣書滿家將遺之子孫以醻夙志吁可尚也余聞之喜而不寐明日元旦躍馬來觀出經史子集及未見書七鉅箱凢千有餘冨覧間偶得是詩以贈謂十室之邑必有忠信者李君其人諱忠字彦德縣人為蔡國公將事来向王充閱異書田間炬草照西東止是農家十􅀊豐不為兩􅁺茆屋底白頭還得愛書翁唐之農家元旦然束草扵田間視其􅀁􅅯以十秋成庚辰􅀊唐縣元日堯封今􅀊遇新年欲訪遺風巳渺然願效老人三献祝至元天子夀如天吾皇仁聖邁唐虞寛大恩頒􅀊首書正擬乗風開濁浪忽随䟽綱漏凢魚宣和珍禽圖紫烟阿閣鳯連巢瑶圃飛翔下絳霄踏散木犀花上露翠􅁭丹喙不勝嬌和唐邑教官石雲卿見贈詩韻自􅀏鈆刀效至剛夣中揮箠走群狼東皇􅀂假春風便放使諸山草木香巳卯除夜次唐邑夢登一城有數狼前行以尺箠揮之皆四散而走又見一豹無首前竄完州道中使符按部喜同分首自行唐入保垠誰着分司王老子杏花香裏過今春是年同出廵按官韓君羙梁韓二簽事大使王西溪過蔡􅀦公第宅南衙路断歸時貴東第堂空設繐惟鉅室􅂋知神􅀑瞰一簞顔巷未為悲庚辰􅀊人日前一日書夣中􅀁見碧􅀣翻香滿洞春一聲長笛隔花聞似嫌燕語鶯吟碎暖噴宫音遏夢雲題木蘭廟廟榜曰孝烈将軍在今完州城東北隅至元庚辰正月十日来謁土人稱昔木蘭戰此得功故廟有熈寕間知軍事河南錢景􅀄題記并所刻樂府古辭春風奏凱入明光不願曹􅀰帰故郷今日西山見遺廟蕙蘭根異死猶香迷離撲握雜雌雄萬里持戈此建功因見漢家征戌重盡興閭左尚秦風登完州城樓州是古北平又曰永平即漢曲逆縣地故城在今州東廿五里即髙祖云余行天下見户口夥繁獨此縣與洛陽尔故城西南有大埌土俗相傳為陳平墓土人稱墓曰埌漢家山東二百州當時繁夥此為尤朝来指顧城樓上斜日荒煙草􅀣椆望􅀰山有懐郝陵川太行鰲掀東入海鼓鬛高撑霄漢間一自詩仙黄壌隔風雲空鎻碧峰間張九元帥哀辭并序不肖與公既昧平生哀誄有述似渉無從然聞公㓜敦詩禮長識風雲雄畧英姿為時名將始徇江淮厥績已著及平二王雋功獨髙壽年未遐天􅃍奪去故作是詩于以為國哀而寓天下之所共惜也辭曰瘴海波澄􅀾血紅歸朝無㡬病籠東異時惇史論書法當與将軍死事同盛􅀃将軍禮度寛訃聞中外不勝酸可䏻秋月臺前詔便作悲風易水寒英姿䬃爽􅀾酣来夢裏神交一噱開弓劒永隨秋草没春風吹恨上金䑓一曲鋴歌变八哀扶桑宿霧若為開我雖不識􅀅箄面苦聽􅎏声惜将材蔡國髙勲上将壇九􅀰又領俊功還􅃍教零落蛟龍匣千丈神光失斗間曲中有悞時為頋特見已丘藴藉姿不似九􅀰橫槊裏􅀏驅風月入新詩堂堂萬里常山陣首尾横穿海道空凌屋未圖元帥像樂歌先奏二王功前日長歌入漢関今年埋垠九重泉應怜一段江山秀􅄪到人間又㡬年劒􅀐前頭揭認旗風飄笳皷入雲悲眼中部曲渾依舊不似樓舡入海時摽柱紀功超漢􅀅臨江􅀚陣惜竒材更憐一片金陵月冷送哀声萬里来風吹大樹日瀟瀟雄畧無由覩嫖姚􅁀骨莽如天似悟不容勲伐盖東遼風飜素縵天為慘栁拂朱旗露易乾雞水不供門客淚􅀰山空􅀝㦸支寒水邉臺榭月邉樓􅍑逝彪亡共一立羽扇泠随秋月暗銘旗高颺竹煙愁保下春夜金臺池舘錦幈圍煙栁風荷蕩碧漪景物縱踈猶可愛􅀞舡春水放燈時諺語新年百草靈燕遺禳禬闘多􅀎就中两地風光盛東府風鳶保下燈題抱陽山張燕公讀書堂在完州東北廿里富貴功名恐等閑丈夫臨事莭為難挺然不附姦臣請似覺功夫出此山書龕高􅀝抱陽雲萬壑天葩發異芬莫訝相君潜伏乆東封西祀要鴻文凌閣勲名焕日星豹藏於此貯精英江山萬古風雲筆未覺前賢畏後生贈􅀌月老明月靈䑓到烱如清光元比衆里殊豈知影落千山底以德看来本不􅀌携笻偶入贊公房照眼􅌐珠夜有光臨水起亭他日事為渠題作墨君堂為􅀚蘇黄二公手簡真跡者数幅祝香保定文廟泮宫絃誦育多才視作㝷常事可哀羣吏近霑誾侃色正縁文廟講書来遊張將軍山林至元十七年二月朔同苟嘉甫尚文蔚遊保城東張􅀅軍山林置酒松臺因話郝奉使朱家洲亊亭圯䑓傾老樹欹夕陽淡淡鳥飛遲一樽細話朱洲事天道幽冥未易知䟦雪谷早行圖壷口山深石徑開六花一夕浥浮埃披圖憶得經行事夜半盤車下嶺來題武遂朱君挽章後諱和字信之簿領微勞到贊㐮改圖真見此心良更將一片西湖水波及奎郎見不亡吏業出身子公奎字君璋新安道中長陂極目麥青青揔是當年鴈鶩汀二十四橋春水外野人指示望鵝亭官舎即事酴醿􅀧雪桞垂絲簾映虚庭叔景移八尺風漪紫藤滑清和天氣未暄時題節婦盧氏銘後節婦墳臺愽陸南九原不化是貞心儼然一片松隂石只與西山共古今祁陽道中鶯啼花落巳無春四月田家更可人雨後老農催種早風前紅袖採桑頻行人不為送春忙一雨千林草木香馬上緑隂三百里直看春種到祁陽一春􅂆課歴郊􅇕路入祁陽氣轉愉夾道錦韉州太守隔林紅䄂趙羅敷題孝感聖姑廟壁分司廵歴帶農官来禱靈壇為􅀊寒一炷寳􅃄神意暢祥飈吹下鳯雲冠仙去清溪事渺茫女功留在故園桑春風蘋滿汀洲緑吹作􅓸波歩韈香卒􅀊誰䏻不製衣為蚕来禱聖姑祠何當雲葉翻香雨潤入柔桑緑滿枝題董左丞墳林大樹瀟瀟緑滿林蒼􅃄埋没石麟深兎葵難道無情物猶學􅀅軍捧日心南海揚旍開百越北風漏綱有奔鯢多應奪去怱怱嘆斜日宫中聽皷􅎏董相墳林南董里九門東下槀城西千年孝継忠傳業萬字豊碑看御題明皇􅀻語圖人老逢秋百感催夜深􅀻語自爲媒秪知海嶽情縁在不道生離有馬嵬盈盈一水隔双星不似行雲侍錦幈􅂬樂㡬時􅁨思集碧梧秋雨待君聽秋滿􅌐山有所思海棠紅盛􅁂華滋細思夜半銀幈語揔是三􅀰嫵媚辭戯題階前玉簮露影幽香湿􅀞簾羙人睡起未全忺只疑冷墜搔頭玉月暗雲階欲悮拈題郭都水􅀂思祖行實卷後公善推歩筭數􅀮徳君子也邢臺天元章㑹到玄機星暦推来一理齊㐮國至今傳異事門前鴛水亦曽西龍崗拱木秋風老燕處猶懐􅀮徳尊黄極不埋身後數青雲今見起家孫鎮陽新居行馬門施擁豹幢徳威端􅁛使君堂不應花影潭心月昨夜分光照客牀一作緑水堂前月緑水海子園堂名嵇侍中祠在湯隂縣西門外二里八王雲􅅰乱中華義士何􅇳掩􅀾沙懐惠懦庸猶晋祚争教移䁀入牛家侍中精爽有無間霜葉猶疑血􅀧殷一莭見危能授命陸機回視恐慚顔沙河道中昨夜清霜比雪寒彫殘羣木栁冝先朝來信馬沙河道一一風前翠影圓西門豹祠在豊樂鎮東南一里古人辦事􅀏談中長爱西門禁􅁀功邂逅馬遷稱善史不應排比滑嵇雄光武廟在栢鄉城北十八里寰宇記云其地名壇亭乃帝即位之地也室􅂁鎧鳯花紅一體君臣祭祀同前日洛都城下煙無地認南宫文淵上將功雲臺英烈儘爭雄可能秖爲椒不在龍姿婉孌中㵚陽道中纍纍遺􅊘覆圜瓴半是髙齊與魏陵千古是非仝一盡􅆲攘終爲路人憎王化吕仙翁祠猶炊一枕囬繁華能幾暗興哀仙翁祠下無窮客不道都從夢裏來題杜郎中二子字􅀃卷後燕客儀容雲表鳯紹宗英秀掌中珠故家正有新詩句不到徐卿第二雛于公愼獄起髙門積徳而昌見後昆正似紫峰遺澤逺青衫還有讀書孫題劉大用畫草䖝手卷動翾飛自一天眼中風露發清寒筆端正有坡仙樂莫作宣和藝本看東坡墨戯出新意八詠復見河陽劉夢到草堂風露碧花籬落候䖝秋格物先湏論致知古人圖史發幽竒多君夢到周南出幽澄洽略無􅀻蟻聚蜂喧任一時正要至誠相不湏臨事渉多疑宣和寳石圖凢十六葉雲萬態煥金書染出湖光照坐隅不道漢家規制㤗山磐石是基圖岳廟謝雪偶題至元十六年十二月廿四日也岧嶤觚爵動雲霞慘淡隂靈黒帝家恒岳所臨風雨好不湏飛石示雄誇野老題詩語㝡工表余精禱與神通爐煙散處雲生野祝板宣時雪滿空偶得二絶􅀉府尹史子華離離殘雪􅀧山郊麦壠埋深不見苗春在草根泉脉底淡黄先到緑楊梢人􅀃中山有父風乆從眉宇得冲融燈前近閱虞芮案轉見公明簿領中謂牧羊地議劄等事曲陽道中軟紅沙路栁條風雪擁陽坡見晛融細繞嘉山三靣過唐河東北望堯封癸未年二月九日雪東皇且莫認來眞開折花封占好春一夜雪花􅀷数寸肯教桃李露精神幾日輕隂雨氣氲凍殘花栁望春温不知一夜豐隆意散作銀沙藥麦根冬寒沍過常年節近春分尚凜然驀地雲開風日好暖於南國賣􅄳天大都即事一資半級到銖分徃徃超遷越等倫除目豈徒傷道念饑寒常有幾千人薪如束桂米量珠二月中旬凍未蘇􅀏殺九迁金馬客半年僵卧聽除書創行敢効木求魚例進難於上坂車㑹取一陽潜九地春來葭琯氣舒徐燕都萬壽宫有梅一株毎􅀊移置䕃中逮春仲方發藏今年得花滿枝雖氷姿的皪香色髣髴終強顔也戯題二絶以自况六僊家有術解藏春蠟􅎞雖融凍尚皴􅀂比百門山下見強顔還似聽除人氷姿難􅀝暖回根人力封培氣始伸蓓蕾㸔来雖勉強一枝猶􅃣漢宫春時進献東宫即事無着必湏循體例有依便指是人材區區桃李栽培手恐􅀒東風一例開朝鐘暮皷惜蹉跎有例臺除半􅀊過不是馬周無伎倆翻來覆去幾常何都尉王􅀳卿􅀞着色山齋圖坡僊寶墨妙通神都尉丹青要儗倫欲識淡粧濃抺意髻鬟渾似鏡中人半生翠繞與珠圍不為槐根夢已非老去紛華心自得筆端時到野人扉恵崇蘆鴈圖雪灘風竹映寒澹水􅀫雲飛未易雙不似鴛鴦沙渚暖翠紅相􅀝睡春江小桃小桃開徹淡烟脂不出初春未半時二月朔風吹石裂依然憔悴簇枯枝梅粉飄零栁未煙一枝春色獨當軒今年盻得紅苞拆風雪禁持第幾畨清明莭近無旬日桃蕾含芳又幾朝今日簷前看春色一枝􅅻見褪紅椒題日者詩卷侯鯖熊掌味能甜舉丗看來意欲兼不似君平安素􅂂一爐香燼静垂簾蔡琰歸漢圖明妃光􅃂照龍沙枉說琵琶憶漢家去住兩難心㝡苦就中哀怨是胡笳和劉仲脩見示十首今􅀊餘寒過徃年東風無柰雪花顚幾時不禁燕臺酒蹴踏陽春醉十千野鶴昻藏本不羣剛同秋隼下翔雲近年轉􅁴謀生拙半仰公田半賣文舊城行出入新都驛劄堅求硬聽除馬上相逢還自􅀏背行今見兩茅廬老成生臺多少開花不識名列朝班不厭紛乆踈鴛鷺入行分迫年借就袍笏喜向龍墀拜聖君滿帋新詩􅀃逺遷淮西依例住三年􅀂從清議先才恐不多時又着鞭先聲光動弩臺春入手行司又一新長記髯兄相眄睞一官同作兩淮人角霜稜兩劒寒瘴煙都上筆頭乾十年搏擊秋風裏蜀棧盤空不覺難月旦評中見壯圖不應齊魯揔眞儒别來又嚼氷霜健筆鋒銛似董狐屋燈清語夜闌一杯長記浣離顔朔風半夜驅車去詩在寒雲石嶺􅀜東風剪剪送春寒望望田家惜雨乾無事在家貧亦好有心行道古來難虎豹九􅀜圖九重關鍵錦斑圍蟣虱微言詎可知首闢四門明四目定書深意見宣尼春夜獨坐閃閃寒缸照夜昏眼中時事不容論近來䑕軰欺人踏碎承塵似馬奔寒冷似深冬曉日空燒海色紅一􅀣伴人憔悴􅀝東風梁園節序不相饒正月􅀄旬凍盡消長記東墻微雨後一枝紅艶杏花嬌風物悽凉近禁煙敵寒無酒客衣穿楊花揔道多才思撲乱春衫不當綿細草根深緑自叢山桃含凍尚能紅垂楊可是寒欺得半爲刳中半蠧虫鞭石圖洋海求仙已渺茫又鞭羣石駕飛梁帝功不出仁和聖罔念元來便作狂檀州門外觀隰河春水西山諸水頗􅔿淪合入渾河不自存昨見春氷􅅻泮處滿川都作濁流奔二月廿八日端門街觀乗輿還宫龍煙日暖紫氤氲春水回鑾萬馬奔纓杖逺揮清蹕後漢儀光動御天門麗日紅翻御路沙青山回抱漢宫斜吾皇遊豫諸侯度縱使都人看翠華看一作望年年原廟薦駕鵝春水秋山例一過安得捄時姚右爲靣􅀃湯羅導鸞旂逺玉輦髙象鴐雄賜異不賢思得鎮國寺觀迎佛九曜趍降丗聖尊象車香滿綺羅塵人傳此技中宫製上下雙輪轉十人漢成帝幸張禹第宅圖王氏當朝乆惡譁幸回天鑒絶萌芽恬然不主天人断長恨安昌􅀒漢家孔子曰政事惡譁而善肅出李石博物志與叔謙太常論書翩翩毎愛太常書姿態還同静女姝儘是淡粧宫閣様豈知東抹與西塗桐過閒話味何長字字顔書入品量握手正當吾意處畫須圎勁體須方近年書學果誰優􅀃道寥休有悟頭意態偶從駈字得千金駿馬􅀝山丘一段殘槍路偶逢開鑪便作鏌鎁工君㸔王趙凌雲來自浯溪慘淡中鵬雲九萬平原筆望望蘇黄甘下風誰為南唐金剪手敢將田舎比顔公􅂐􅀠中追三代古風雲重䇿二王功遺山不見裴旻帖枉着雲䑓詫米雄雲蛟家廟駭盤拏著作姿容隠畫沙後丗􅀂從書法論混淪磅礴是承家將軍愾敵鋭於虎舎豈能爲必勝哉今日遺碑見筆英姿䬃爽漢雲臺天山飛將指裴旻書到吾顔逈不羣不為䇿勲陳至今冠劒氣凌雲朝叙卑髙倒屨冠寓書還等義方彈一緘遺草蚓千古狐狸照膽寒檢校秋官禄食囏顔宗收養半煢鱞當時米秉無多􅁖李相因書重㤗山小楷東方出右軍丹青難冩是精神孔門弟子多才藝有􅀂唯能肖聖人次山歌頌漢文章書到磨崖日並光具眼鹿菴曽有語筆間元氣揔三蒼蘇􅁈截耳殷姑節詈賊天津是夫兄断壁幾行移帖九泉相值死猶生雜詩野人家具取宫中適用都輸瓦􅇲功君是荆嵓瑚璉璞得來􅂊待費磨礲較量暮四與朝三初不多爭譲愧慚戀戀不成丹闕夢劒南才了又湖南夢歸故國蒼茫外春老風沙慘淡中辛苦西臺臺下栢不成還作栁花空昨日清明塵障靣今朝上巳却晴明老天氣候􅀄無定敢􅀝虛名作實行人家構室要帡幪小木枝撑易作功汝是連雲棟隆物得來才費梓人工萬壽宫芙蓉杏花三粘瓊島露筆穠迸出高枝見化工不着上林春色底粉香吹滿歩虚滿意春寒強自妍一枝無葉更瀟然莫誇百葉玲瓏巧輸與垂楊護暖煙活色生香貯好春横斜燈影似梅君多情唯有東墻宋夜夜幽䆫夢彩雲閙簇生紅滿故枝今朝㸔處雪離披一春幾日風光好素影幽香只自知徽宗畫周靈臺圖靈沼臺高􅀝碧霄當時魚鳥被恩饒可能積徳千年乆盛丗看來僅四朝徽廟初年布政優丹青揮灑想西周其慾横流后花石綱船墊九州秋澗先生大全文集卷第二十八
