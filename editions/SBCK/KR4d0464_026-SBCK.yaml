body:
  text: 七言絶句華岳廟留題朝來松檜重煙霏仰靣蓮峯翠撲衣自􅀏愛山心不足日斜猶未駐征騑祠前喬木老輪囷閲盡長安道上人千古􅀝空仙掌在好爲回首障兵塵蓮峯卓㧞見雄尊干劫􅀌撑碧玉盆緫被少陵収拾却諸山羅列佀兒孫乖崖一出著髙勲回首猶慙華頂雲應􅀏豹林种處士擬將虛譽售時君東登岱頂雪彌空上徹中封佀不逢應喜此行何豁敞青天白日對三峯渡渭有感當年尚父欲誰親八十西來釣渭濱馬上行人應未老莫教虛􅀒百年身秦亡漢起兩悠悠緫把興亡入海流汀樹岸花三百曲煙波都属釣魚舟安邑道中六合雲蒸一氣埋際空秋稼委枯荄馬頭赤日疑無色望際青林兩氣來洪洞道中望霍岳諸峯老澗灣環兩翼分一川草木氣如薰土人更􅀃山靈異欲雨先占霧頂雲留題霍岳喜遂平時景霍心適逢嚴祀一登臨感通固愧潮陽筆霧雨重開萬壑隂山腰明霽静煙霏岳頂雲􅄥淡欲飛岩壑佀供詩筆徤法身都掛六銖衣題豫譲橋死堅鐡石表􅀌忠一水曽蟠萬丈虹太史注書隨俠例豈知風義本無同過益昌橋盤盤危磴轉山腰下瞰長河漲怒濤霍邑南邊趙城北滿頭風雨過昌橋霍州四雍中坳一豢牢快心唯有霍山髙一條􅇾水從中過日夜隔城聞怒號䟦范蠡歸湖圖覇越髙勲土苴如五湖歸隠號陶朱扁舟共載西施去却恐時人是厚誣題趙城縣環翠亭秀色四圍供坐嘯山城終􅀊早休衙陂塘清淺知秧稲畒嶺横縱看藝麻簡城南北㡬經還赤日紅塵赭背顔歘得解鞍心適喜暫容髙卧對東山趙城道中早發積雨睛來露氣餘風枝成滴草垂珠麻衣半濕溪邉路長記郊原五月居跋米元章蘆鴈圖西風萬里下衡陽水􅀫雲飛固自􅀟佀爲呌群心事苦不教相映睡秋江煙渚潮空退暮沙依稀寒影落蒹葭何人觧化􅀟飛翼拍拍隨君問使華甲戍歳門帖子全家恩飽荷恩榮闔郡清寕歳屢登蟣蝨小臣何所報一公之外百無能不求冨有金成穴不羨官榮曰九遷但願時和身徤在大家無事過今年庖舎門帖子王家供具乳蒸豚石氏庖厨蠟代薪二者侈荒何足論一簞顔巷世歸仁山市晴嵐墟落人家半夕暉太行天上􅀝煙霏喚回二十年前夣共伯城西載酒歸古栢寒鴉亂鴉蒼栢晚相依流水􅀌村句未竒佮佀首陽祠下看夕光翻影上枯枝松䕃寒泉坐䕃髯龍夣已醒更堪幽谷亂泉声遥知緑綺相逢夜幽思中含太古情雲竇飛湍千丈懸淙落碧霄百岩回望冷瀟瀟若爲借得天瓢手傾向人間救旱苗蒲中十詠爲巖卿師君賦并序中條山水雄秀照映河華予兩年以事扺蒲略􅀗遊賞然雲煙勝槩旦夕不去其懐甞思以數語道其髣髴心在而未暇也至元十年秋九月蒲人師巖卿拉王國器李仲和張師諸人携酒過門盃數行䄂出錦囊巨軸曰此河中十詠也因徴詩於不肖逮明年甲戍正月辛巳予以微恙閉閤少休隠几瞑坐神與境㑹既覺晴日滿䆫幽思發越眷焉十題卒然而就顧不足發山水之清音聊以移方寸而外形骸也且爲四老人一盧胡云蒲津晚渡落日西風送棹謳行人無數立沙頭君看一葉顚危甚苦不忙時且少休舜殿薰風巖廊瀟洒壓城闉解愠歌殘又㡬秦一道殿簷涼佀水至今猶有夣華人虞坂曉發雞聲茅店月微茫山逺行人促曉裝良􅂹虺隤身自徤不須拭目認絲楊首陽晴雪前冬兩拜首陽祠野雪揺光晚霽時蒼栢滿山人欲去亂鴉翻影上枯枝鸛雀波聲洶洶河流入断山馮夷無力障狂瀾乘風破浪他年事且挽清雄上筆端東林夜雨瀟瀟風雨暗秋山聲滿踈林萬珮環拂暁開門看晴霽白雲依舊伴僧閑林亭夜月大内扶君不見人野煙碧樹緫傷神應怜一片林亭月曽照司空泪滿巾王官飛湍石竇懸流雪練飛夜深和月映松扉恨予不遇貽溪老一􅀏山間説化機西巖疊巘東山如䯻欝重重人􅀝栖巖第一峯似是晚煙􅄏􅀞幛濃揮淡抹􅋐丰容嬀汭夕陽溪痕春漲碧迢迢一帶斜陽映野橋風土亦涵􅁵降意野花如靨􅀧裙腰贈冩眞賈生氣皃昻蔵野鶴姿賈生模寫有餘師情知不入麒麟畫剛為天朝飾羽儀􅀉李􅁉卿山中風日淡無輝山下騰光欲爍衣辛苦南州李從事三年其柰􅁏山肥交游過眼日紛紛故舊如君有㡬人岸幘一樽蕭寺月此回談􅀏更情真過横望嶺終日山行不厭山出山聊喜慰衰顔朝来横望開頭路滿意風烟看洛川澤潞即事雜詩一十首醲恩三接無旬浹春日春衣未足多沙上歸来聞好語誓殫忠力更無佗裴翁祠晚夕陽催野色横川組練逥我數固多多已辦不愁歸路碧崔嵬自古徒兵澤潞雄選齊尤見四州公堂堂氣與聲聲壯閃閃旗飜日脚紅獵獵清風􅅯斾声南風不競此先徵朝耒小試青油底一鼓仍驚氣倍增闐闐風外鼓聲乾小隧紅牙入細看自古中原雄莫敵麟符准到漢家壇萬命安危一將懸成功端在得人先長江儘飲天山馬莭制應湏閫外顓角聲催日上牙城白羽風清坐閱兵盾鼻恐煩磨檄墨莫教華髪等閑生一檄風馳萬有降天兵開􅀦古無双􅀉聲璧月瓊枝客鐡鎖休誇一葦江結束征􅂁總白丁淮隂一將便横行瀟條此意千年後正賴桓文節制明嗚嗚殘角過三吹整整魚麗待一揮曉凉更覺軍容肅露濕朱旗月滿衣太嶺道中泉眼并雜詩路長坡峻一層層六月行人困鬰蒸多謝山靈解煩暍一泓澄徹冷於冰來路蒼蒼不可尋山風吹馬下遥岑望中斜日行雲掩逺嶺横分一半隂長松磊落不凡材風拂煙霏􅀞障開端佀髙人在嵓壑苦嫌塵土不歸來千古雄藩入控連瀟瀟旌斾莫愁邊最怜天壤清凉界欲買西山二湏田潞州爲太行清凉境界太行南走百山門崗􅀔回環淺作盆瀟洒緑隂臺館静平時尤見使君尊過遊僊李節使墳大定明昌五十年當時人物玉堂仙朝來書案山前路瞥見堂封一􅁣然遊青蓮寺上方層閣􅀝晴煙回合諸峯聳碧蓮午枕不容詩夣就天風吹雨下危巔山間一雨衆壑澮轉石砰崖聲若雷殆佀山靈詫清駃夜深還到枕邊來夜過関嶺山晝鎻壷関戰氣昏自環長塹作孤豚紛紛彼校何爲者媿煞新聲欲死言夏縣一縣隂隂夏木清大賢司馬小賢城河山依舊英靈在重爲生賢作國禎虞郷道中長纓風笠􅁑衣踈裝就唐人早發圖只有才情渾不佀馬頭吟乆却成無猗頓道中玉繩西轉啓明東􅀬擁長途似火攻辛苦平陽王判府三年三伏走蒲中䟦蘭昌宫圖宫斜春草暗驪陽花底春雲覆苑墻怱覩翠罌銀勺事丗間疑有返䰟香乙亥歳門帖子三年判府􅀄無􅀘一寸􅀌􅇆老謾丹㝡喜元正即春節併將和氣到門䦨李潜宛馬圗李生鞍馬見金􅀄彷像殊方職貢圗今去玉門途萬里緫隨鞭䇿入長驅丙相問牛圗牛來近地暑光㣲深愧調元相業非後丗幾人能辨此濘車甘受野人譏用宰相楊再思閉坊門禳水會事謝太􅀓東山圖金黎陽李公泰筆鳯沼春閑湛緑波未容絲竹醉嵓阿儘能經濟蒼生了七寶裝嚴未是過秦兵一掃兩淮清桓氏微來晋鼎平况復中年正多感未妨雲壑􅀉髙情四皓圗事定歸來舊隠深皎然松雪映雲林寥寥髙􅁩千年後佀覺元之㝡賞音先生莭義重丘山􅃣珮遥瞻漢嗣安莫以􅀮淪忘丗論一身歸㓗何難苦諌臣通巳謾爲一書光動紫巖芝後人只說安劉重不道留侯䇿更竒顯宗墨竹離離香粉淡争妍莫作荒寒景趣看絶佀承華宫檻畔春風和露濕闌干一枝蒼雪映遼江滿意春煙鎻建章􅁥國撫軍仁孝在不應游藝較蕭郎雲溪先生􅀞像大定明昌五十年聲明文物出中天􅀞圗一識雲溪老􅂄舊風流墮眼前訪京師故里四紀光隂黍一炊重㝷陳迹巳都迷百年風樹悲凉底更遣朱衣問碧雞秋夕早起鏡裏顔蒼鬢雪如憂心中夜轉民區開門看雨驚連夕堂下秋蘭恐半蕪聞方響時過一苐宅丁東鏗戞碎璆琳掩盡朱絃窈眇音花外粉墻遮不断珮環清徹洞房深壬申門帖子任運喜尋蕭逺論廣騷慵擬楚人辭里兒莫訝三冬蟄一寸丹心用有時題王仲通二友亭治葉倡條占好春轉頭紅雨委芳塵歳寒伴我初心在二友歸來是故人得失之間􅀔利交脅肩何翅夏晆勞淡交自得志言友醉眼螟蛉視二豪此君髙莭對髯龍雪壓霜封傲睨同不羡杏梢春意閙等閑開謝是東風酒蠅閧集霑餘瀝火䑕潜趍媚竈炎誰似歳寒亭上客儘將冰雪澡吾廉老眼相看十五年青青節操貫時賢自怜蒲柳非眞質兩鬢秋風乆颯然題卜􅀮王君手軸洛陽織畚王丞相異事驚逢少室翁我試問渠曽見否太平天子夣非熊百年人事有乖通萬彚流形本不同付與君平都一􅀏滿簾紅日落花風大易幾微得最神闖懷隂穽失崖垠坡仙有句堪書贈醉裏微言更近眞有命何甞論智愚班超傭筆衞青奴一從遇着客閑氣胷中一􅀧無學術源同有淺深如君􅀛䇿入幽尋自怜一片靈臺月才並明時􅀍物侵題松隂訪古圗舟横逺水翻蘭棹人􅀝長林諷楚詞却憶來河南畔路松崗晴雪晚遊時予壬申冬大雪后曾謁司馬相公墳故云春雲出谷圗岫雲􅀄出豈無心擬向人間作􅀓霖萬壑忽為風散去卷舒􅀿見本空隂看雲曽上太山巔淡抹空􅄥緫自然佀慰幽人怡説意故縈林壑弄春妍牧牛圗車邉起飯歌何烈角畔横書丗謾驚何佀短僮無所識夕陽村落見升平溪橋風雨圖前溪才渡又危橋風雨行人已倦勞更着客心􅀌逈䖏逺煙明滅寺樓髙跋後唐莊宗按樂圖王業艱難百戰開洛宫春色醉瑶臺那知兩部仙韶樂緫是君王火葬材紅雲香暖翠屏閑横玉聲清内殿寒誰道畫師無逺意丹青應見守成難群鶻古栢圗振翮蒼巔控老拳霜空利不隔秋煙料應攫裂脩蛇後相與朋來一砉然書夣中語春雲容與春隂輕杏梢點紅楊柳青人在􅀞樓斜照外秋干臨水影亭亭春江獨釣圖前金平陽人孫子安筆十三科皆工渺渺春江碧􅀂空一絲斜裊釣壇風冨春莫擬幽棲穩巳在君王物色中峴山秋晚圖春風漢水大堤平雲静譙樓峴首青千古愴懷羊太􅀓幾時親酹玉􅀟瓶伐石東崗得小山一株􅀟峯並秀􅀂夏雲突元者因命曰湧雲僉謂名之甚稱作詩之坤靈凝秀幾千春一日佳名號湧雲淡僻性便雖老在自挑沙礫看竒文孟光捧按圖爲申主簿受之賦噫歌裏動晨炊一敬還驚按等厝想得主人茅宇下肅雍形出二南詩具門煙暖􅄄衣輕舂賃中間見本情豪蕩阿戎那觧此夣回青􅃈得卿卿稠禪解虎圖宋均政異於莵去魯宰風行野雉馴誰爲碧嵓方外客等閑藜杖也通神楞嚴堆案滿凝塵山下閑來解虎紛千古阿師公案在寳香燻徹百嵓雲乙亥重九日客臺郷板橋里滿川煙雨對南山冷浥重嵓細菊班不着白衣携酒至卧瞻衡字已開顔無人對菊情逾逺有酒盈樽意倦斟十日板橋田舎底似教平子遂􅀄心依依墟落俯山郊雨濕炊煙覆屋茆一夜秋風飜木葉露巢髙下見林梢瀟瀟山雨暮寒生漠漠青林􅀫靄横把菊珮萸俱寂寞卧聽簷溜走湍聲一官殆爲公田秫塊坐渾疑野老禪我喜静中觀物化鹿臺風景佀斜川疊巘相連老雨昏秋香狼藉擁籬根野情本與漁樵熟共席來傾老瓦盆百年悲感登臺社四座驚看落帽嘉野鳥送歌人勸酒閉門風雨醉山家山中佳節欲何酬醉裏閑書醒不休共着一樽相慰藉李卿申子兩江州讀易龕即事朅來採石事間関却得幽潜兩月閑准擬後人重到此指名王子讀書山十三年四月十九日待中渡泛泛輕航破浪花春風自信動檣牙不煩更撃中流楫六合澄清到一家宿開封後署拂拭殘碑覧徳輝千年包范見留題驚烏繞匝中庭栢猶畏霜威不敢棲許昌道中望三封山大河失險已無金不待鈞䑓一雪􅀷十萬選鋒同日死西風吹恨滿遥岑䟦松風醉歸圖南陽脩端卿蔵不向東華踏軟紅夣歸丘􅊤洒松風夜􅀷徤到山間石吹萬從渠總不同危行危言到兩難炎凉時事旋相看放教兩耳秋風裏待與髯龍約􅀊寒題煙江疊障圖楚水呉山萬里秋風㠶吹飽北来舟應怜滿眼新亭客空對江山􅀟淚流江上晴嵐萬疊山㡬縁亡􅀦帶愁顔而今一統無南北滿意風烟送往還昆陽道中同陳莭齋考試河南官事無涯有限身拚教赤日走紅塵十年薄䆠﨑嶇裏􅀏煞羲皇向上人朝趍長路暮郵亭遠自南陽到洛亰馬上唱醻三百里䆠遊無佀此回情路氏子榮飬堂遺􅃵親拜封人廟戯彩重登路子堂二事半生俱不遂看雲凄断蓼莪章退思亭詩卷退食歸來静掩扉比量心事到精微今年京洛重相值一話能知五十非滿壷清醑薦柔毛一尺甘膏遍洛郊緫道使君誠意格至今歌頌滿衡茅拜狄梁公祠下􅂑日虞淵力儘多洗光重照舊山河䧺忠貶入周人列似覺文公立法苛京西道中漢家綿蕝要齋􅀰見説趍程舉子忙一道緑槐梁􅁐樹輕花也學十分黄怨笛落江梅鏡裏青鸞怨獨棲月邊踈影伴横吹誰怜一曲春閨思箇裏幽香是素知栢郷光武廟上谷兵威突􅀐良風塵河朔入披攘蒼凉鄗邑祠前月曽照君王萬歳觴臨制亡疑見理明治隆三代所由行竟從䜟緯論􅀖計地下桓卿恨未平宫武當年兩虎臣丹青千古照麒麟十年紫禁煙花底判府歸來恐􅀏人麥飯蕪蔞誓不忘肯教大􅀣日蒼凉竭忠竟得來呉軰何慮蜀蛙不井亡山行雜詩川隔寒山日上遟槲林平抺霧煙齊晚涼貪趂征􅆖徤却西山四五題亂山合沓四圍青行近星軺路漸平大約太行吾肺腹一重一掩総天成入山不比出山寛回轉青林路詰盤暁色漸分煙店近范寛圗上記曽看太行元氣老洪􅄥草樹風前帶􅃳容山色只冝差逺看近移空翠上髙峯西來游䆠半忙閑六日迢遥道路間回轉羊腸三百里天教馬上飽看山入雲蒼嶺望中賖石逕蜿蜒走白蛇見説碧峯爭秀麗不愁車馬下狼車過山陽縣題七賢祠不到山陽二十年黄壚空􅃈竹林煙盧胡􅀏煞嵇劉軰又向西山着祖鞭七賢來為此君遊終歳相看散百􅁨却為歳寒貞蓈在十年憔悴伴人愁時竹禁􅃊故云山行雜詩門前流水屋頭山馬上行人􅀞葉間清化許梁三十里只除天許此中閒錦窠蓮炬竟虗聞五馬西來忝幕賔似為愛山緑分重着詩模寫太行眞過濯漉城麗不愁車馬下狼車過山陽縣題七賢祠不到山陽二十年黄壚空􅃈竹林煙盧胡􅀏煞嵇劉軰又向西山着祖鞭七賢來為此君遊終歳相看散百􅁨却為歳寒貞蓈在十年憔悴伴人愁時竹禁􅃊故云山行雜詩門前流水屋頭山馬上行人􅀞葉間清化許梁三十里只除天許此中閒錦窠蓮炬竟虗聞五馬西來忝幕賔似為愛山緑分重着詩模寫太行眞過濯漉城炎漢淪精到此􅁅獻皇空使後人哀􅆲成不獨曹罪須信桓靈是禍胎路入蕪城漲麥雲獻靈千古廟猶存一杯誰着濁漳水少爲征西酹餒魂題馬坊乆遊都邑無明畧出判名藩媿不才忽得解鞍俱忘却一聲幽鳥竹邊來題山陽七賢祠黄塵換盡豸􅃣霜薄䆠驅人捄火忙一勺七賢祠下水療飢猶勝食官倉山行雜詩山下良田苦不多耕來山頂作旋螺薰風五月燕南道千里黄雲際兩河唐叔虞廟巍然遺廟枕城崖覇業桓桓自此開剗地不銷昭伯血􅀲分何爲出公哀潞公亭唐都東望故城荒澮水翔山半多陽前日潞公遺愛在至今亭構比甘棠陽城道中兩極坡長馬力窮澤南百里水泉空朝來丹沁東邊路始見河山大地雄南來佀爲亂山囚後擁前􅃒苦見留多謝鍾靈不嫌俗坦然煙谷縱鳴騶守歳夜􅀫太陵田舎今年除夕苦羇栖着我西山更向西一窖太陵田舎火雪龕􅀌坐聽猿啼田家無物具茶餳爐火龕燈建曙明野老向人無别話新年時熟長官清過郊底村聽田父話陜州事張姓名一曾授䇿州軍判離離殘雪􅀧山郊老樹冰崖映断橋縱使林泉有佳趣住山活業本蕭條野叟龍鐘百戰酣目光如炬尚耽耽阿欽一死無由得對坐從渠説趙三時欽叔在阿不早元帥府作經歴官新道成試車東下􅀉德昭書史千仭谿山險已平朝來喜逐炭車行兩郷父老來争賀萬事元輸有志成野歩曵杖山行記可逰﨑嶇􅀄不厭經丘静怜苔色圍􅀌石閑愛長松䕃碧流大石横崖亂作層偶來􅀌坐適幽情春生先自溪流見暖散冰泉繞舎鳴蒼澗行歌不見人草心泉脉動朝曛溪邊􅀝杖看來乆沙水空明散錦紋秋澗先生大全文集卷第二十六
