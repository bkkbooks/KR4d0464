front:
  text: 秋澗先生大全文集卷第八十中堂事記序余自穉􅀊讀書頗有志於丗甫及壯年彈冠應聘􅃴際夫風雲慶㑹千載一遇之時荷囊載筆從事其間以至密邇論思醻酢吏務霑香紅藥之階接武雲龍之地􅀂有所遇而大有以爲也不圗尔後蹭蹬於仕途者廿餘年囬視嚮之鴈行而請署者川泳雲飛觸目皆是比量薄分蓋有無非命者况今日就衰謝百念􅁅冷有求田問舎躬耕種樹而巳然􅁴吾􅎍中耿耿者尚在及閱故書復得當時直省曰録􅀚其諸賢聚精㑹神扵一堂之上所以開太平之基播無􅆠之休者班班可見因略爲修飾題之曰中堂事記庶幾有閱是編者知予生長明時雖無寸􅀘亦甞饜􅀖家之光為閭里之榮也藏之篋笥固不敢以千金享之異時有索野史求史臣中舎之所遺逸者不無一得扵斯焉至元二十四年丁亥􅀊秋九月七日前翰林修撰同知制誥兼國史院編修官左司都事秋澗老人謹序中堂事記上庚申年春三月十七日丗祖皇帝即位於開平府建號為中統元年秋七月十三日立行中書省於燕京劄付各道宣撫司取儒士吏員通錢榖者各一人仍令所在津遣乗驛赴省惲亦忝預其選是年冬十月至燕以三書投獻相府大率陳為學行巳逢辰致用之意頗蒙慰奬令隨省通知計籍使綜練衆務日熟聞見焉時行中書省官四員丞相禡禡資嚴厲凛然不可犯初與趙用行六部於燕至是就用為行省長官平章政事王文綂字以道大定府人前經義進士平章政事趙璧字寳臣西京懐仁縣人賀弘偉能任六事以氣量雄天下叅知政事張易宇仲一太原交城人資剛明尚氣臨政善断符士以誠忤之不復與合左右司郎官八郎中賈居貞字仲明真定􅀗鹿人金尚書右丞益謙之孫資聦敏有左氏學通諸國譯語郭榮祖字榮叔燕人部令史出身廣詳雅能酬應事変自大興府叅謀為今聀晉汝賢字才卿燕人班祗令史出身資隂克有幹局貟外郎王德容字仲寛河間將陵人部令史出身張桐字子華燕人班祗令史出身邢敏字公逹京兆人部令史出身都事劉郁字文季渾源人王徳輔字良臣陳州商水人經童出身提控令史李惟寅字舜臣西京人前進士楊文卿术甲謙字和之遼東人楊恕字誠之左房省􅁺馬璘字文玉燕新城人後叅知楊州行省事楽思齊字齊賢燕人王文藯字仲玉東平人終濟南經歷官劉傑字漢卿益都人王守正字賢之新城人宋筠字庭秀大名人楊顒字伯榮鎮之無極人今為京兆屯田緫管楊湜字彦清鎮之藁城人楊珍字國寳鎮之中山人蔡玠字庭玉相州人馮處厚髙唐人髙明字柔克汴梁人陳鼎字取新真定人閻沂字巨川行唐人李壑字􅁉卿相人右房省􅁺􅀽􅁉字仲寛孟州孟津人終順德緫尹李鼎字噐之相人劉作字述之柘城人呉璧字國噐邯鄲人張安仁字壽之宋璋字國寳柘城人梁徳佐字輔之燕人張適字濟之平灤人劉濟字巨川周鼎字噐之燕人張楫字巨川覃懐人架閣庫官二人􅁁字正卿徳興人經章出身王和卿太原人典吏四人劉謙字伯益盧慎字順之洺州人
