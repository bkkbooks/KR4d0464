body:
  text: 侯康濟字仲澤真定人王顯卿熊岳人黄華姪孫趙文輝字克明燕人張瓉燕人断事官阿虎女麥肖曲天八合赤唐古䚟老塔察兒其子燕真今復為断事官亦捻哥幹脫赤忽都奉御奏事官楊仁風字文卿潞州人今為真定等路宣慰使客省使一人班庭直字舜卿山隂人奉使三人孟甲字文伯太原介休人甞奉使大理有光遠功武茂字荗卿平定州人終鄧州統軍劉芳字丗傑中山人知省印二人許楫字公度太原忻州人杜字純甫通譯使三人阿里和之西域人道奴大哥王合刺王炳字煥卿太原人宣使五人李顯祖字顯卿相人蒲散禧字仲康終涿州尹王好禮字立夫真定人楊帖木児寗澣字清甫平陽洪洞人夾谷忽都虎今為真定䓁路宣慰副使回回譯史一人麥术丁其所譯簿籍搗治方厚尺紙為業以木筆挑書普速蠻字該冩衆事紙四隅用縷穿繫讀則脫而下之今為平章政事書填勘合令史二人馮崧字夀卿今為河􅀯北道按察副使馬紹字子卿李從周字文則東平人仕至東朝断事官掌故二人馮渭字清甫真定人亡金松庵之子省令史出身完顔良輔亡金省知除房令史詳定官三人楊威字震亨太原太谷縣人治春秋義張永錫字孝純太原人周止字定夫濵州人資強發有口多記前人利害事條因言事見稱在當時有足􅀚者都堂懸其卷於幕中用􅂆來者自是㳺道頗廣甞􅁠石司都事講集太常禮樂官三人許靖字唐臣安平人以三䇿終􅂣試太常檢討郭伯逹党仲和昔東平人同講䆒勾當編􅁼一切儀禮及祀典合􅀕諸神等事肄習供衞事官二人樊興嗣字作堅燕人時令彩畫鑾駕一切儀仗服色等物及教習随収到控鶴等人授拱衛大使省理問官二人蔚祚字天禄人律科出身邊字􅀖傑人律科出身張雲鵬字鵬飛燕人今任浙西憲副掌記二人魏􅀄字太􅀄順聖人魏學士姪孫思廉之子初掌書記繼為邊関防令史令編類一切户口差稅宣課地畧塞䓁事宣課自領省立額幾何迄今增益幾何餘皆􅀋此檢法兼縁堂一人沈􅋲字和卿大名人法律出身終陵州同知堂厨局長一人張抄兒赤省醫二人元鐸字振之􅀗吕人楊庸字君卿燕人鑄印局官三人劉淵字仲廣濟南人劉狀元子劉􅂹字思齊通州人前進士劉晉徳新子王利用字國賔大都人交鈔提舉司官三人張介字介甫燕京人部令史出身梁字秀實燕人王煥字紹明又有抄􅁓房即造局機造銀貨局元寳緫庫官李元字唐卿河南緱氏人前進士第王鶚樓􅃀貨司官二人郭儀字冝之真定人部令史出身王諤字諤臣燕人萬億庫官二人魏祥卿魏學工姪交鈔庫官髙澤字濟民平陽人路字子敬潞州人應辦供頓官四人郭汝梅燕人終􅀯京緫管重陽二哥斜飛西域人李瑞字天祥潞州人吏貟終㐮垣縣尹到省聽任人貟康天英字國才相人胡祗遹字紹開武安人終山東按察使李謙字受益令翰林侍讀學士劉宣字伯宣太原忻州人韓瓉字寳之平陽人馬天􅂹字彦良磁州人陳祥字君祥大名人張煥字彦明濟􅀯人劉仲祥東平人張遹祖字仲賢順天人白俞字舜俞呉譲字謙甫時選至省者士人首以有無生理通曉吏事為問及取要所業文字盖審夫資身之術或能否從事及手筆何如耳又擬以士人充省􅁺吏貟􅀘两部令史東平士夫李謙聞之不欲吏辭去時堂議擬令諸􅁺巾褁一衣皁服仍佩書袋於上或曰書袋廢巳乆驟用恐駭􅀚聽􅀂巾褁服止皁􅄄二色儘表於衆遂行焉是月剏建葫籚套省倉落成號曰千斯時大都漕司􅂆農等倉􅀊供營帳工匠月攴口粮此則專用􅀵貯隨路儧漕粮科祗􅁱應辦用度及勘㑹亡金通州河倉規制自是舡漕入都常平救荒之法以次有議焉諸投下五户絲料譯語曰阿合塔木兒自來就徴於州郡堂議云如此是恩不上出事又不一於政體未便奏准皆輸大都緫藏每􅀊令各投下差官赴省驗數関攴其法每户科絲二十二两四錢二户計該絲二斤一十二两八錢其二斤即係納官正絲内正絲色絲各半外將毎户賸餘六两四錢儧至五户滿二斤數目付夲投下攴用謂之二五户絲以十分論之納官者七分投下得其三焉十一月甲子朔二日乙丑時夜禁甚嚴慮公幹有礙今有司置夜行白油木牌雖官府貴近非此不敢輙出徃時一切無頼䓁人侵􅁀不法之事盡行歛息時應乗驛馬皆從省府給降剳子堂議亡金時馬剳子上􅀞墨桃紀數今冝印以墨馬遂用之如三匹者三馬五匹者五馬仍用省印以傳其上癸酉済南宣撫司申宣撫副使王磐先生字文炳永年人前進士第道號鹿庵士致仕棄職去相府以惲係王席生令作書云省留之廼執覆曰鹿菴先生人品髙邁冝膺大受不可處之人下雖招之恐終不應不若從其好遂止􅀄行六部所㑹東平路民賦帳册或有言未盡者堂議欲覆實之令周止劉芳王惲等置局磨勘都事劉郁領其事於上惲等力言其不可不允至于􅂯三曰徃事不冝䆒問此若一行非徒無益適足取怨兼衆怒不可犯也冝詳思遂寢時衆陳言等人以中元所降詔書内一欵節該有上書陳言者皆得實封呈獻􅀂言不可採並無罪責如其可用朝廷優加迁賞以旌忠直至是日有言以求用堂議令詳定官分間其言為三等如體用兼備切中事機文彩可􅀚者為上雖乏文華其指陳利害有興除之方者為中餘皆為下除見區處人數外其餘量給路費省㑹寕家聽候十二月甲午朔時於省東織造局置司集諸路計吏􅀋校一歳簿帳時相領務者退食後日一至按閱程務有未便即改立體式粛如也詳定官楊威以星變陳書省官冝解機務以避賢者不然且有大咎壬寅夜大風雪寒苦時中省官僚未明巳即事過晡始散是蚤僚属有後至者省官諭之曰風雨晦暝常情例懈在公者當夙興益勵可以辦集而儆其餘也闔省為暢然又曰百姓冝安刑罰冝省税歛冝簿􅁈抑冝察追呼冝簡判决冝審用度冝節興作冝謹燕㑹冝戒思患冝豫防此雖古語於治道且盡可不慎哉燕省自來置廢官西臺上囂隘近市不􅁛具瞻以移省事上聞奉聖旨遷四王府其列聖神主奉安聖安寺瑞像前殿明年以楽善老故府為省署仍以金都省舊額榜焉時又於煙霞􅀚摘委房長纂􅁼一切合奏機務如錢糓數目事事比附舊例多寡有本有末使見即目優劣大槩緫撮要領從簡易知極其略殆笏記之体云中統二年辛酉正月癸亥朔丞相禡禡行帳頓拜郊臺下省事日集楽逰南園劉行省所治從便首相故也癸酉左司都事劉郁􅀍譴旣而辭退堂議以前進士楊恕代焉恕字誠之金内相文献公子皐落人經義第成德君子也後爲翰林待制終易州尹省府爲􅀤下中統元寳交鈔榜省諭隨路其文曰省府欽依印造到中統元寳交鈔擬於隨路宣撫司所轄諸路不限年月通行流轉應據酒稅醋塩鐡䓁課程并不以是何諸科名差發内並行收受如有諸人賫元寳交鈔從便却行赴庫倒換白銀物貨即便依數支發並不得停滯毎两止納工墨鈔三分外别無尅􅆇添荅錢數照依下項擬定元寳交鈔体例行用如有阻壞鈔法之人依條䆒治施行據此湏議出給者一諸路通行中統元寳街下買賣金銀絲絹叚疋斛㪷一切諸物毎一貫同鈔一两毎两貫同白銀一两行用永爲定例並無添减臺拾文貳拾文叄拾文伍拾文壹伯文貳伯文叄伯文伍伯文壹貫文省貳貫文省文省如七十足陌八十足陌若使同銅錢便省官司利益鈔文故先作文省二字一各路元行舊鈔并白帖子止勒元發官司庫官人䓁依數􅀵倒毋致虧損百姓湏管日近􅀵倒盡絶􅄪不行使仍於庫司門首張掛省諭諸人各令通知照勘隨路祗應中間多渉冒濫議欲行批劵法曰此法止可約束委奏差疾足而巳逹官巨僚不能盡然遂止明定分例行下各道時圖寫歷代君臣可法政要及自古太子賢孝等事祗備向前進說十日壬子親衛董文炳字彦明藁城人來自北庭知我軍大捷中外􅁛慶省府議所有合行事理剳付各路宣撫司榜諭者其文曰皇帝聖旨裏行中書省禡禡為頭官員欽惟皇帝即位之􅀄下寛大之詔䘏疲困之民除舊弊立新政條􅀞非一期於民共享有生之楽省府恭承聖訓方將撫治間大軍調發供給軍湏轉輸粮餉逐急催辦文繁事冗不無少有騷動照得續奉詔書節文軍方弭而復興民甫休而􅄪擾欽惟聖憲巳甞軫念及此蓋遇一時之変者難拘定例圗逺大之功者未免有劳人費物之舉凡此䓁事皆非得巳為天下害也近奉聖㫖節文大幹魯朶人来也其餘軍人與民户毎亦多投拜了也即目無咱毎迎敵底人也省諭軍民安業務農者欽奉如此欽惟皇帝仁民愛物之心自今已徃復得盡行施設今照得巳未行事理條列于后務要實行非止虚文而已合行榜示者一軍馬之事粮草為大近為大軍調遣方當征進之日未見逥軍之期省府扣筭年銷所用粮料稈草験諸路均科除各處存留祗應外撥赴軍儲省倉分作三限送納省府非不知民力困乏逺倉生受縁為軍儲必用之物􅀂不乗此農閑時分送納將来失悞軍儲不免􅄪行動衆般運如此則今日之勞却無春夏之時也至日不惟雨水泥濘民力轉致生受又是妨奪農務失悞􅀊計所費又甚於今日也近察聖㫖巳將喂馬草料槽萴䓁物盡行住罷省府恭承聖訓恤民之意據巳科逺倉粮以三分爲率􅀄限一分展限至年終赴所指倉分外中末限二分至今年二月終盡數改撥各就附近河倉送納上是帶納水運脚錢將来官爲雇脚般運􅂯不動民扣筭今年逺倉粮數比附上年各處赴軍儲逺倉稅粮三分中争一分數少亦是减省民力即目年銷粮料足用仰省諭農民作活一欽奉聖㫖罷散喂馬稈草䓁事省府照得已曽行下各路宣撫司將巳納到官草數除各路年銷外盡數給還夲户􅀂有未納者亦行停罷并將元准備夫役槽萴䓁盡數教散歸還去来切恐所在官司因而作弊私下拘占人夫槽萴仰宣撫司照依已行罷散據各還本主數目遍行省諭無得隠匿尅减務要實到扵民一今為軍馬調度凡衣襖噐仗馬疋䓁物省府委官支價収買并般運粮斛脚力駱駞車仗皆係官錢雇覔外據毛連夾袋止是借倩民力縫造並無賖借科着䓁事切恐在下官吏䓁中間作弊指托軍湏為名一面掲借或有名和買不支價錢雖支價錢却行尅减上下􅂪蔽以致人難􅀷失朝廷優恤百姓之意如有似此作弊之人許令陳告以憑䆒治施行今後遇有合用物件依前支價和買一爲去􅀊桑􅁞田禾間有災傷去處欽依詔書巳令各路宣撫司驗災傷分數從實减免差發外不􅀍災地面亦令量减分數如此存恤猶恐人難又以漏籍并老弱等户恊濟本處當差户計庶望民力少得休息外據宣課事亦令驗委實偏重去處量行减免所有塩貨聽從民便買賣食用並無樁配給散之家此皆聖主仁政之所先也仰宣撫司照依已行事理施行一欽奉詔書今後各處􅀿有乆逺安屯并時暫經過軍馬合用粮食於官倉内驗數支給􅁍不得搔擾人民仰各處管軍官管民官逓互相照省府照得即目春首正及二麥滋榮桑菓生發布種五榖時分切恐經過軍馬并屯住營寨人等牧放頭疋食踐田禾􅶭咬桑菓樹木及強要酒食欺奪物件搔擾不安失悮農民􅀊計阻礙通行客旅仰宣撫司行下各管官司欽依已奉詔書事理依上照管禁治􅀂有不能断遣者開具緣由申來以憑䆒治施行欽奉詔書農桑衣食之本勤謹則可致有餘慵惰則决至不足正頼有司􅀊時􅂆課省府照得卽目春首農作時分仰宣撫司令已委􅂆農官貟欽依所奉詔書於所管地面内依上􅂆課勾當務要田疇開闘桑麻増盛無得慢易仍於􅀊終考較勤惰明行賞罰以􅂆將來一欽奉詔書鰥寡􅀌獨廢疾不能自存之人於官倉内支粮賑贍仰宣撫司令所在官司依上賑贍仍置􅀌老院存恤住坐一隨路罪囚除犯重刑聞奏待報外其餘罪囚仰宣撫司審問得實别無􅁈枉就便量罪断遣無得留滯一体䆒得随處盗賊徃徃生發侵害良民蓋是所在官司不曽嚴行禁治深為未便省府近為燕京多􅀍盗去處明立罪賞嚴切夜禁督勒官兵捕盗人貟將作過賊人盡數拿獲依條断罪仰各路宣撫司遍行所属州縣􅀂有失盗去處照依燕京体例添氣力多設方略随時捕捉明立賞格嚴行懲誡如有捉􅀗強盗之人除官賞外更於賊人家産内給付充賞􅀂有同伴賊人并安泊之家及两隣知而不首者同罪失􅁴者量行治罪一􅀂有㳺手好閑不紹家業賭􅀶錢物開張酒肆之人仰所在官司常切禁断如有違犯者就便治罪施行一州縣之治俱在官吏􅀂得其人百姓安集差發均平苟非其人定是差發不均民􅀍其害不有黜陟賞罰何由激􅂆懲誡據本路見任官吏如有贓汚事者國有常典其才能異衆廉幹可􅁛者仰宣撫司開坐事跡保申來以慿聞奏超擢任用施行丁已元夕大風雪晝暝有衆盗刼民家是晚官寮聚省出重賞捕賊明日􅀗焉二月癸已朔五日丁酉行省官奉㫖北上後三日惲與偕行者周定夫已刻遇河南經略使史公於居庸南口相與迎謁道左公問禡相所在曰次西南􅁟樓村公相見而去知車駕回鑾北兵已敗遁去行者居者爲熈然也前次北口店復有旨山北寒沍可緩来遂還是日遇張國公於中店􅀃見賫亡金實録赴省呈進省官時繕冩進讀大定政要得此遂更為􅀘益之時鈔法􅀄行惟恐澁滯公私不便省官日與提舉司官及採衆議深為講䆒利病所在其法大約隨路設立鈔庫如􅀤鈔􅀂干隨降銀貨即同見銀流轉據倒到課銀不以多寡即裝垜各庫作本使子毋相權准平物估鈔有多少銀本常不虧欠至互易銀鈔及以昏換新除工墨出入正法外並無増减又中間関防庫司略無少弊所納酒醋稅塩引䓁課程大小一切差􅀤一以元寳為則其出納者雖昏爛併令収受七道宣撫司管限三日午前將彼中鈔法有無底滯及物價低昻與鈔相礙於民有損者畫時規措有法以制之在都緫庫印到料鈔不以多寡除支備隨路庫司関用外一切經費雖緩急不許動支借貸其錢貫顯印鈔面將來以錢鈔互爲表裏此張本也時週歳包銀六萬餘定鈔數人及五十餘萬堂議甞云􅀂印至百萬所􅀗鈔息可盡免天下包差盖以平凖買易諸物一􅀊民間毀廢不貲皆爲官息也又當時鈔法有甚便數事艱得一也經費省二也銀夲常足不動三也偽造者少四也視鈔重於金銀五也日實不虚六也百貨價平七也二十一日已亥未刻淮海都督府申宋人圍我海州堂議飛奏外命惲賫省􅊾馳海青傳催發經略史公令率河外諸軍徃援旣啓行隨得報云宋人巳退走遂止二十二日役來趣闔省北上越三月壬辰五日丙寅未刻丞相禡禡與同僚發自燕京是夕􅀫通玄北郭偕行者都事楊恕提控术甲謙詳定官周止省椽王文蔚劉傑六日丁夘午憇海店距京城廿里凡省部未絶事務於此悉行次遣是晚􅀫南口新店距海店七十里戊辰夘刻入居庸関丗傳始皇北築時居庸徙於此故名两山巉絶中􅀂鐡峽少陵云硤形藏堂隍壁色立積鐡者盖冩真也控扼南北寔為古今巨防午憇姚家店是夜􅀫北口軍營月犯東井􅃏星或者云斧􅃏用兵之兆距􅀯口姚店三十里而逺已巳辰刻度八逹嶺於山雨間俯望燕城殆井底然出北口午憇捧棰店天容日氣與山南絶異以暄凉校之争逾月矣午飯榆林驛其地大山北環夅目巳莾蒼沙磧盖古媯川地也是夜宿懷来縣南距北口五十三里縣東南里許有醸泉井水作淡鵝黄色其曰玉液即此出也官為置務歳供御醪焉庚午泊統墓店詢其名士人云店北舊有統軍墓故稱是夜􅀫雷氏驛亭地形轉髙西望雞鳴山南眺桑乾上流自奉聖東諸山下注白波洶湧􅀂驅山而東雞鳴山者昔唐太宗東征至其下聞雞鳴故名東南距懐來七十里而逺辛未午刻入宣德州申刻使者也鮮乃至傳㫖趣令諸官速赴行殿是夜􅀫考工官劉氏第十一日壬申候禡相為一日留盖有所需也距雷氏驛九十里癸酉行六十里值雪􅀫青麓十三日甲戌至定􅁁城憇焉盖金所築故城也是夜􅀫黒崖子距青麓九十里十四日乙亥抵磪􅂣峪盖金􅀄南北互市之所也是夜露􅀫􅀟城北十里小河之東南距黒崖甸北一百有五里十五日丙子停午至察罕腦児時行宮在此申刻大風作玄雲自西北􅋓起少頃四合雪華掌如平地尺許亂灤河而北次東北土塿下羣山紏紛川形平易因其􅀔而廣狹焉泉流縈紆掲衣可渉地氣甚温大寒掃雪寢以單韋煦如也沙草氄茂極利畜牧按地志灤野盖金人駐夏金蓮涼陘一帶遼人曰王國崖者是也上命平章王文統草荅髙麗手詔其辝有誦經供佛為國祈福良可嘉之語選怯薛丹某官借職伯衛將軍以髙逸民借職禮部貟外􅀰為副使其國將發髙麗丗子来覲止焉􅀄髙麗國相有以書致寒暄於省府者欲以書為荅且以方略撼之俾見我大國文加武暢之盛惲曰不可境外之交非人臣所冝此范文正書諭元昊遂得罪於􅁉陵也可不戒哉遂止十六日丁丑上遣參知政事張易亷名轄亷名希憲字介甫瀚海人資沉毅臨大事不可奪其廉正有大臣風莭傳㫖慰諭行省官時御道不啓拜覲者皆俟故留八日而發距􅀟城七十里二十三日甲申次鞍子山南距灤河四十里二十四日乙酉次桓州故城西南四十里有李陵故臺道陵􅃙建祠宇故址尚在未刻朔風發發兩霰交作傳令方春牧馬不勝寒克瘦弱者悉用氊毳荅覆其背否者以法從事二十六日丁亥時諸王有以宥令行下本管及祝香四岳者朝廷以當否為問省官婉辝以對此無他止是争欲徼福耳􅀂大制一定此事自革晨霜蔽野如大雪日極髙隂凝始釋距鞍子山廿有五里是日完州人髙道字道之来自和林城􅀃迤北正三月間地草自燃東自和林西至炊州其燃極草根而止水温處愈甚人徃来者湏以氊濡水覆其上可越又有黑風掠人面如灼兵械及山椒遇夜皆有火出在山者如列炬然或者云火兵象皆彼自焚消鑠之兆二十七日戊子次新桓州西􅀯十里外􅀯北界壕尚宛然也距舊桓州三十里申刻歘有兎自北来入王相帳中􅀗焉公曰兎隂􅀋惟狡一夅而得吾事其有解矣二十八日巳丑飯新桓州未刻扈從鑾駕入開平府蓋聖上龍飛之地􅀊丙辰始建都城龍崗蟠其隂灤江經其陽四山拱衞佳氣葱鬱都東北不十里有大松林異鳥群集曰察必鶻者盖産於此山有木水有魚塩貨狼藉畜牧蕃息大供居民食用然水泉淺大冰􅀒土夏冷而冬冽東北方極髙寒處也按方志盖東漢鳥桓地也距新桓州四十有五里二十九日庚寅風霾四塞日三丈許方解三十日辛夘立夏風色􅀹慘澹無光夏四月癸巳壬辰日氣極清明有輝二日癸未隂慘盡日三日甲午天氣極晴和四日乙未頗􅁴暑氣是日向巳惲從徴君竇許李洎九道宣撫候雲叟公疾於􅀻第茶畢而退秋澗先生大全文集卷第八十
