body:
  text: 樂府望海潮乙卯歳端午賦比郊􅀐鞠呈節使史侯龍沙王氣恒山秀色徳星光動南州使君髙宴北城佳處薰風紅閃旗旒􅀨翼擁豼貅駭鼉鳴疊鼓杖蒼驚虬一􅀧星飛􅀞柱得意過邉籌貂蟬元自兠鍪􅀏閭閻小子談􅀏封侯萬􅀐平原千艘漢水堂堂小試青油賔從儘風流喜武同張肄書漫韓投樂事更醻醉魂還夢菊花秋二爲故相雲叟公壽炬明珂馬㦸森兵衛日長鈴閣春凝舜朝儀鳯傳巖霖雨丗傳昴􅀫儲精天地入經綸見東山髙卧一念蒼生談􅀏金華故事六合海波平一杯福壽川增請丈人静聽賤子微誠蘇嶺雲霞西溪梅竹風煙􅀞岀共城羽翼漢功成儘山中名在天外鴻􅁳一點台星清光長射老人明三爲子初緫管壽桐郷遺愛于門隂積充閭氣自葱葱霜華封菊橙金泛醁秋香吹滿簾櫳人物漢元龍喜升堂一拜今歳相同洗盡金貂貴氣黄卷貯深功見君雅量雍容信男兒到此方是豪雄林下夫人􅂰前文度摩挲湖玉雙峰福壽儘無窮看一家樂事五縣提封彩䄂歌鍾年年長醉玳筵紅水調歌頭送王子初之太康􅀅軍報書切髙卧起璃蟠悲􅂬離合長事知已古為難憶昔草廬人去欝欎風雲英氣千載到君還歌吹展江底長鋏不湏彈路漫漫天􅄅渺興翩翩西風鴻鵠一舉横絶碧雲端自笑鶺鴒孤影落日野煙原上沙晚不勝寒後夜一相憶明月滿江干二為仲方東園賦野飲不􅁛意歸促紫游韁誰知草堂深處清賞興尤長夢裏佳人錦瑟眼底瓦盆濁酒衣䄂醉牀浪歌罷竹軒晚風細月波涼為東園梅與竹足清香不湏更栽桃李花底駐春光人道􅃮源家丗王謝風流未遠培取桂枝芳讀書貧亦好此語試平章三送王脩甫東還樊川吾所愛老我莫能儔二年鞍馬淇上來徃更風流夢裏池塘春草却􅀍鳴禽呼覺桞暗水邊樓浩蕩故園思汶水日悠悠洛陽花梁苑月苦遲留半生許與詞伯不負壯年游我亦布衣游子乆欲觀光齊魯覊紲在鷹鞲早晚西湖上同醉木蘭舟四和趙明叔韻西山捲殘雨天宇翠眉脩餘霞漸成綺散樓外月如舟􅃞􅃞銀河垂地浩浩天風拂枕吹滿一簾秋覺我清興逺歸夢到嵓幽野猿驚山鳥􅀏欲何求十年一官黄散了不到封侯自有竹林佳處滿酌窪樽貯酒一醉共浮休夔契在廊廟畎畒不湏憂五次前韻紉蘭綴芳佩逺駕振靈脩王成事海無際泛若一輕舟誰著朱衣白簡老坐癡床十日霜鶻漫横秋落日壯心在不􅀒􅀑神幽􅀏咿嚘驚骯􅗣竟何求丈夫出處義在不用計行留萬事味來嚼蠟只有濟時一念未肯死前休驅馬出東郭聊以散吾􅁨六和姚雪齋韻書史有真味誰遣博微官丈夫出處道在義命正湏安浩浩都門冠蓋眼冷雞蟲得失矯首入遐觀時對雪齋老淸議豁襟顔閱名書探理窟警銘盤自嘆空然鼠腹過飲不知繁萬古乾坤清氣散入詩仙脾膈撣洒有餘歡早晚付心訣風雨滿堂寒七夀雪齋髙齋際晴雪萬象入遐觀文章在公餘事聞望到歐韓千古微茫洙泗浩浩發源伊洛百折障狂瀾歌詠武公志儆抑過銘盤濟時心調鼎手未容閑重看印窠垂錦花底壓千官見說梅梢春信一夜蠟㾗香滿光動夀杯寛勲業鼎鐘上留待百年看八壽王子壽時年八十三汾流浥餘潤霜菊滿秋香醸成一堂和氣來薦老人觴七十人生稀有况復年踰八十飲啖日康強骯􅗣欲誰與趙壹􅀝門傍頰浮丹瞳㸃􅃮􅁂如霜平生隂有神相特爲表剛腸丗事語來無味只有讀書一念老矣不能忘九老更添一圖􅀞見髙堂九壽時相佩蘭近佳節髙第照神州西山􅃱有爽氣天際翠眉脩釀作碧霄清露暗滿庭前細菊香淡一簾秋春酒未容㵼壽席巳風流鏘鳴玉香獨歩鳳池頭薦賢貢宰事業藥籠到兼收緫道生平􅁭量一片丹衷為國不􅀒幙中籌齊澣救時語持用壽君侯十文卿提刑自陜西按察改授河東其子東還􅀉聲不肖且徵鄙作因贈樂府水調歌頭以答雅意一峰華不注東望雨􅁳冥黄雲􅀞角回首客舎又幽并喜接西來佳耗聞道東山未老􅀟􅁂為誰青經濟有公論且莫嘆飄零杏花吟山色句儘称停平生風味不淺聊尓冩􅁭靈歩冷東垣秋水坐對汾亭夜月兩地若為情合作碧簫曲留待醉時聽十一宴張右丞遂􅀄園園林足佳勝鐘鼔樂時康去天尺五韋杜此日漢金張誰侣主人好客暫趂金華少暇罇爼共徜徉三館儘英雋簮履玉生光眺東臺登北榭讌南堂露涼玉􅆪零亂竹静有深香醉聽新聲金縷愛仰東山雅量淸賞興何長髙詠遂􅀄賦松柏欎蒼蒼水龍吟壽都督史侯時為東平緫管漢壇千古風流􅀏談自是詩書將兩淮草木一門忠孝先聲逺暢奕丗金貂雄邉韜略三軍獨張道十年漢水旌旗動色春都在投壷唱一㸃徳星廻照光浮動太山千丈㦸門春静人安事簡提封保障漢相規隨蓋公安靖平生心賞見壽毫不逺鳯池消息醉仙家醸二賦蓮花海棠兩株雲錦翻空換根元有丹砂秘綉幃重繞銀缸髙照故家風味翠羽生紅霧紗肌玉風流誰比記況香亭暖貞妃半醉雲􅁂亂耽春睡夢裏昆明􅁅冷怳留在紅幢翠􅃑金盤華屋無心與並朱門桃李一醆傷春臨軒便恐綵鸞交墜倩紫簫喚起霓裳舊曲􅂸花前醉三送焦和之赴西夏行省當年紫禁煙花相逄恨不知音早秋風倦客一杯情話為君傾倒回首燕山月明庭樹兩枝烏繞正情馳魏闕空書怪事心膽墮傷殷浩禍福無端􅀝伏問古今㡬人明了滄浪漁父歸來驚􅀏靈均枯槁邂逅淇􅀯􅀊寒獨在故人襟􅂁恨黄塵障盡西山逺目送斜陽鳥四賦春雪空齋寂寞春寒坐來庭竹風聲悄天低雲暖冰花誰剪須􅁷雲擾好是東君與時呈瑞春廽枯槁快黄塵壓盡千林膏沐休更問青山老我愛春來起早恍芸䆫光摇瓊島玉華城郭炊煙巷陌酒旗風裊髙興悠然沽壚思與文園傾倒為使君預報春城燈火比年時好五壽陳節齋􅀝天望漢臺髙公趙人有鄧􅀅軍望漢臺騫騰便到煙霄上一時殊遇風雲儷景元龍豪爽剛断冰清風流却有東山雅量道十年京洛棠隂遺愛人如醉春風釀一㸃徳星回照光浮動太行千丈㦸門春靜人安事簡功餘保障燕􅃦香凝不妨時在騷壇吟賞為使君預泛鳯池春浪壽金華相六日邉儷景同翻千年髙際風雲㑹堂堂大節中流砥柱狂瀾横制黄閤歸來英姿颯爽故家房魏甚是中却有東山雅量經綸盡金華事緫道丹心為國要春滿人間桃李詩壇風月清時鐘鼓不妨遊戯一點台星五雲縈繞鳯池佳氣為相君滿泛金盤仙露枕秋蟾醉七巳未春三月同柔克濟河中流風雨大作㡬覆者􅂯感念疇昔為賦此詞且以經事之後重有所惜云春流兩岸桃花驚濤極目吞天去孤舟䌫觧棹歌聲沸漁舠掀舞雲影西來片㠶吹飽滿空風雨悵淋漓元氣江􅀯圖􅀞煙霏盡汀洲樹天地此身逆旅笑歸來滿衣塵土功名些子就中多少艱危辛苦北去􅀯來風波依舊行人争渡聽滄浪一曲漁人歌罷對夕陽暮八舜泉在濟南城中自壬子年水去來不常今􅀊秋八月余到官兩日泉流復岀其深可厲回風瀟瀟翠萍盈沼􅀖人以爲神來之兆近陪憲使展敬祠下因索鄙作謹継丞相􅀟溪公懐古嚴韻用紀其異窈然碧玉池方緑波不見還凝佇翠萍痕在金支光澹湘妃無語瑶瑟聲沉􅀞欄愁絕幾回如許甚風煙依約魚龍黯慘空回首珠簾暮一夕翠華臨幸也悲涼故宫塵土石根碧漲天瓢翻出黒灣雷雨思舜亭髙風漪吹散滿空秋暑欲蒼梧回呌鳯簫凄断聽躬耕處九登邯鄲叢臺春風趙國臺荒月明幾照苕華夢從亡横破西山留在翠鬟煙擁劒履三千平原池舘誰家耕壟甚千年事徃野花雙塔依然是騷人詠還憶張陳継起信侯王本來無種乾坤萬里中原自古幾多麟鳯一寸嚢錐􅀄無銛頴也沾時用對殘缸影澹黄粮飯了聽征車動十至元十七年三月廿二日余按部東行梁門劉君仲祥自髙林來餞臨歧把酒長歌不休旣而壷傾猶不忍別復聮鑣㡬三十里踰大尹而去不知劉君得扵余者何乃尔相爱因以水龍吟歌之且酧雅意仍荅見徵之意云緑楊一道飛花綉衣亂點如晴雪玉缾酒盡陽關歌徹未容輕發緑綺論心㡬人淂似劉君風莭記山堂轟醉己成塵迹今又作東城别世事悠悠誰料淡長空􅀌鴻明滅老懷耿耿正湏自信堅彌百折白髮灰心平生㽞在情馳丹闕悵􅀌雲細革東州囬望悵髙城隔十賦秋日紅棃花纎苞淡貯幽香玲瓏軒􅃈秋陽麗仙根借暖㝎應不待荆王翠􅀍瀟洒輕盈玉客渾是金莖露氣甚西風宛勝東闌暮雨空點綴真妃淚誰遣司花妙手又一畚争竒呈異使君髙卧竹亭閒寂故来相慰燕几螺屏一枝披拂綉簾風細約洗粧快瀉玉缾芳酒枕秋蟾醉十二至元二十三年丙戌孟冬廿八日小雪十月中是日雪作連明霑地而釋潤扵春澤其應時顯瑞數年己来未之見也實可為明時慶因作樂府水龍吟以紀其和余平昔屢甞賦此未免掇拾故事張皇景氣而己兹萹之作頗體白􅀾抑老懷略見樸忠之至畎畝不忘之意也􅀞樓十日春隂晚風吹作水花轉􅀄冬中候應時呈瑞幾年未見沽酒㝷梅就中此興撩人不淺更露堂添得虚䆫夜白清於水光如練我老乆諳世味最忻然人安米賤蝗蝝入地麥旗掉壠翠翻平甸大獵清邉為民祈榖睿思何逺在詞臣合取元和賀例拜明光殿十三郭宣徽善甫開宴娯賔命樂工郭仲禮鳴笳佐酒思甚清暢酒闌人散餘音嫋嫋宛猶在耳且有衰年情嚮之感明日嵓甫修撰為求樂府賦越調以歌之春風緑綺堂深樽前初識􅀛年靣煙花紫禁幾年供奉香飄合殿悲壯凄清九天飛下鳯吟鶯轉待近前細看品題銀字知還是紅牙管儘著金黄玉磬泛宫聲五音􅀄遍明簮四合回頭聽處少陵情惋緑酒抛春何心傾倒汾陽金盌為斯人少漏玉堂消息㵼清商怨十四丙戌八月十二日宴季氏宅郡侯扎忽䚟酒酣為予親彈琵琶勸酒明日賦此曲以謝相逢一醉金荷氣豪長恨歡娯少貂蟬貴侍內家聲伎琵琶最好鐡撥鵾絲劃然中有繁音急調􅀏黄雲出塞青衫拭淚恩怨事君休道且聽新聲硬更銀筝與相繚繞空堂雪輥玉盤珠洴清雄縹緲漢殿承恩侯藩作牧此心未老付曲中細㵼他年事業拜紅雲島十五去嵗秋至今年春凢七月不雨有終風徒曀而巳生意殊悴然也逮二月九日雨雖以小言隨妥而釋三日方霽向來焦枯一洗而潤且又在清明節前嘗念一旱所繫甚重詩云舒矣冨人哀此惸獨然衆安我乃能安不然雖屋潤者其可能獨安乎此施旣光誠可賀也作越調以歌之秋澗老人序喜看春雨如膏東風吹作冰花轉海棠紅瘦梨花香澹似嫌春晚縱使寒生猶勝空際陌塵黄捲道佳人拾翠王孫憶草都不􅀒㝷芳眼欲見太平有象除豐年更何可羡田家作苦老臣憂國眉頭俱展最好知時清明前後一犁非淺􅀏樂天空抱元和詩律夢金鸞殿一作典春衫為問隣家新釀發春江靣十六賦筆故家張樂娯賔樂中無似秦筝大華筵聽處一揮銀甲笙竽幽􅄜四座雄聲滿空秋雨來從天外甚脩然思變白翎清調驚飛下金蓮塞長憶桓伊手語撫哀絃醉歌悲慨使君元有不凢風調平生豪邁録酒毺堂為余翻作八鸞海道更張正頼新聲陶冩継中書拜十七送崔中丞赴上都緑楊一道飛花繡衣亂􅀧如晴雪都門幾日翠鸞回軫情馳魏闕頃不忘君時雖多暇逺猶辰說道六條儘備諸人多様卒難應和鸞節物勝自餘芽枿恐都輸豸霜摧折人無定忘事隨雲變莫捫渠舌百歩穿揚空拳搏虎豈容重發望君侯早晚去登黄閣作調元客十八飛卿係出將種余官燕趙時相識讀書尚義􅀂不碌碌者然流離頓挫迄于今十年其窮極矣旣為哀之且求其所以然遂有斯作以越調水龍吟歌之庻幾伯竒履霜自傷窮思返義俾採詩者聞之不無當笞逐兒之感彫零萬木叢中秋霜不隕蒼筠節十年相見燕􅀯趙北無根行客妻病兒殤歸來空在蒯緱彈鋏分躬耕壠山鵲起誰喚與將軍獵腰下鐡絲有箭柰荒煙泠霾虎穴見哀漂母猶勝低首看人顔色百折弥堅一窮終㤗不容終結望伯竒細㵼履霜幽怨洒西風血酹江月東原寒食天涯寒食問東風底事連行客千樹芳菲春不管吹盡枝頭紅雪湖水春波佳人錦瑟腸断非離索西來一劔不堪塵滿霜鍔憑仗誰話春愁一罇濁酒醉了還重酌盡日西歸歸未得怨殺山中猿鶴六印双旌两都無分此去從吾樂太行佳處布衣高卧雲壑平陽府倅第有來禽兩株以托根官舍有空谷幽居之嘆逮亞尹明卿來培植顧護始知重惜今年清明前花盛開芳姿綽約頻增容色侯置酒髙㑹遂極歡賞余因念草木之微豈輕重顕晦亦有数存其間邪乃以酹江月歌之同飲者忽治中英甫劉提舉者哥時至元甲戌春二月十有三日也遺臺樹老獨􅀞䦨春事猶未消歇好在來禽花盛發滿意淸明時莭翠䄂翻香朱顔暈酒緯約冰肌㓗幾年空谷等閑飄墜香雪回首綺閤東風使君情重一顧傾城色只恐花飛春减却來約樽前歡伯起舞山香醉歌金縷細按紅牙拍青鸞髙興恍然歸夢瑶闕三賦王薰爐贈數斈劉文卿客牎涼夕問故家何物能慰岑寂都把龍延二萬斛滿貯宫池􅗌玉立瓊洲雪翻花臆夢繞春江碧看雲失水淋漓元氣猶濕我昨杜杖敲門主人情重預報春消息相對掀髯談􅀏間一縷飛雲摇曳暖透天心冷穿月窟好箇行窩客金盤㵼露約君同醉秋月四爲友人壽中丞子􅀄棲遲林壑甚雍容雅量氣横寥廓人道魁然眞宰輔心在朝家黄閣幾卷閑書一門清樂不羡千金槖諸郎楚楚鳯毛輝映麟角今􅀊錦席雲涼菊香􅄈麝竹樹煙霏薄風愛堂前秋氣好歌裏甘棠如昨十二金􅁫百壷清酒細把紅螺酌年年此日醉看淸獻􅀛鶴五賦雞頭紫荷盤􅀂何波心濈濈鴻頭髙咏滿喙明珠三百顆一夕秋風吹落沙盎圓磋麝湯旋煑香噴佳人嚼杯盤涼夜楚江風味依約今嵗泠淡中秋空堦雨濕坐乆寒生幕草草時新聊應􅀱兒女燈前歡噱趂暖争拈分明闘嚙翠屑紛如削老夫傍看苦吟思與韓較韓􅂚􅀺聮句云鳥頭刺劒石六福建官舎言懷散材無用空擁腫豈是入時花様白髪蒼顔官舎底日把早衙來放主治官書隱􅁨民瘼擬愜澄清望簡章霜在顧余関甚得䘮藕絲能繫况沗爲司長後擁前呵非不欲夢寐山林長徃不憶蓴鱸不懷松桂祗爲身多恙諸公垂顧免教憔悴煙瘴滿江紅爲大丞相史公壽柱石中朝還不减汾陽勲考人盡道今年相府􅀯衙春早肘後不知金印大書中漸覺群疑少問􅀯枝消息幾多春調羮了寳竇暖香雲裊晴雪霽西山曉見一星朝出五雲縈繞漢日舒長鈴閤静雅歌聲入江淮渺願神長對夀眉青應難老二至元十七年十一月十四日夜夢丞相忠武史公坐甲第西閤中余侍立其傍歘急報至云有敵犯府城西靣公佩櫜鞬集將領將出余握玉魚一雙跽請從行公曰不遲不遲因朗誦一樂府意甚欣暇曰此徒單侍講詞也旣覺但記其日月風雲瀟洒六字五夜枕上因足成之覺思來甚易録之以驗他日之祥云雷動雲横驚颷騖北城西下人共駭赤丸夜語電光飛射將領未承諸葛令櫜鞬已在汾陽胯􅀏書生思握玉鱗符從公駕鈴索静雲麾亞追徃事何多暇道一篇樂府翰林情話日月􅊠回黄閣夢風雲慘淡凌煙􅀞儘花邊髙塚卧麒麟終瀟洒三德元來辭求贈言爲榮且及河防利害又聞介甫提刑捍禦衛災有功用殷卿嚴韻聊助行色兼簡徳􅁉彦􅂭二良直冠劒梁園又去作厖眉書客休自嘆功名幾許一家風雪春色似嫌鶯燕老秋霜歷試松筠節愛趙生游刄簿書間昆刀鐵都㑹地繁華歇形勝在猶堪說更諸君表裏玉煇冰㓗水陸􅀂論都漕計夷門忍使黄流拆好相須着力障狂瀾休傷别四復用前韻有懐西溪梁園之游書劒梁園憶曽是青􅍡游客宫苑廢三山依約緑雲紅雪好在西溪王老子留連醉盡花時節記樽前金縷唱新聲忘筝鐵􅁭韻合曽衰歇消客氣歆情説儘暮年心事風霜孤㓗一片黄流翻晚照回驚呉楚東􅀯拆偶追思徃事嘆餘生長年别五不肖目疾中承都運趙侯天章漕副相過自惟衰朽何以得此昨晚又以樂府見示疾讀數過不覺有起予之嘆復尋前盟略醻二公雅意風月溪堂也曽是東州行客長記得相逢一􅀏覉愁都雪又對青山談丗事老懷未减元龍節恨霜蹄蹴踏短轅間論塩鐵官裏事何曽歇公等志吾能說儘縱横鞭筭玉壷冰㓗爛醉春風能幾度桃花未了楊花拆甚一城相望半年過長如别六廿一年二月􅀄四日午夜枕上復継前韻書夢中所見秣馬膏車又去作天涯覊客明見得水雲深處萬花如雪緑暗江城多洞府紅燒燭影翻雙節􅀍曉風吹散枕中春簷間鐡塵丗事無窮歇吾最愛滄浪􅀃恐靈均澤畔祗成孤㓗心事比量無少惡前途何必論􅀛拆儻祥金陶鑄遇良工從區别七至元廿一年嵗次甲申二月廿八日滦口離筵送殷卿同寮西還鎮陽一柱華峰緑翠似芙蓉金削辜􅀒却􅀞舡春水一尊同酌寒食清明都幾日征鞍遽作西歸客漫春風檣燕語留人髙城隔春草碧楊花白粧􅀧就行軒色道不􅀿霜翮能舒長䇿三尺青萍風義在看君冠蓋長安陌對夕陽淡處最関情河梁别八夀康平章用臣柱石中朝人道是漢家眞相試看取鳯他髙歩珮聲清響丗祖功臣三十六䇿勲合在雲臺上欲暫分霖雨霈秦川從時望睿思逺誰能亮空健倒驪駒唱撫一方何似際天夤亮肘後不知金印重玉堂正要吾軍張向五雲深處望三台光千丈鳯凰臺憶吹簫爲張孝先紫簫賦係亡金宫中物宫樹春空御幈香冷誰遺金盌人間愛一枝紫玉􅀟鳯聲蟠秋月春花客思把幽情都付伊傳驚吹處􅄜翻天吹鶴怨空山風流貴家公子記夢裏瓊樓穏跨蒼鵉恍露凝銀浦霜裂琅玕不見雲間弄玉餘音散赤壁江寒秦臺曉碧雲零亂瑶天二贈喬媪張氏碧鳯翹寒玉霄宫晚雲牎誤讀黄庭恨淩波羅洛浦塵生徃事風流雲散但翠衾冷落餘馨人何在淡粧縞􅃑幽樹柴荆相逄一樽芳酒對夜色踈星歌裊雲停記水􅀯佳麗姚魏池亭夢繞芙蓉城闕歸馭稳緱嶺風清桃花晚䓁閑休􅀒瑶英秋澗先生大全文集卷第七十四
