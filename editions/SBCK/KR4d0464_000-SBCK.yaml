舉楊徳柔状論王學士合陞承㫖状保提舉張從仕状特選行省官事状論㓂鍾明亮事状保醫儒胡璉状保儒生韓弘牒草論教官俸給事状論開光濟兩河事状論濟􅀯路所轄逹魯花赤合迁轉事状保提學李昌道状論濟􅀯經歴闕貟状議盗賊舉明山東運官狀保兵部王郎中寅甫狀第九十三卷玉堂嘉話卷之一第九十四卷玉堂嘉話卷之二第九十五卷玉堂嘉話卷之三第九十六卷玉堂嘉話卷之四第九十七卷玉堂嘉話卷之五第九十八卷玉堂嘉話卷之六第九十九卷玉堂嘉話卷之七第一百卷玉堂嘉話卷之八秋澗先生大全文集目録終王秋澗先生文集序元秋澗王先生衞輝汲産也阡墓在城外河西里璽甞展拜其下令有司葺理之先生遺文舊梓行浙中傳四方弘治丁巳冬侍御沁水李公按涖汴梁語璽曰秋澗先生名著于元生長于汲先生之文行不於故址而表章之何以風動郷之大夫士民乎璽曰先生之文曾獲觀宦邸訪之于汲缺典久矣侍御公以茲郷英賢髙行興起其士夫趨向之正非直以其文詞藻贍純粹之取也甞考先生仕元中統至元元貞大徳之間㦄官􅀦史編修監察御史出判平陽路燕南河北按察副使福建按察使翰林學士在省院則有􅀴綸黼黻之才任䑓察則有彈撃平反之譽其散見於奏劄詩文各極其忠藎體裁之工史稱其有材幹操履端方好學善屬文真實錄也斯人也豈徒為一郷一邑之模範而巳邪守廵河北道右叅政祝公直夫僉事包公好問考正疑誤分檄開封衞輝馬矦龍金矦舜臣繕寫翻刻凡一百卷侍御公讀而恱之命璽序次􅂺不揣愚陋僣言于右侍御公名瀚字叔淵􅀁至風紀大振逺邇澄清雅重文藝爲學者講道圗治之資云弘治十一年戊午夏四月吉旦中憲大夫河南按察司副使奉勑提督學政濩澤車璽序秋澗先生大全文集總目頌賦一卷五言古詩四卷七言古詩六卷五言律詩二卷五言絶句附七言律詩十卷七言絶句十一卷六言絶句三五七格附書議一卷記五卷序三卷辨説二卷雜著一卷行狀一卷傳墓誌銘共二卷碑銘十卷碣銘二卷文三卷辤一卷箴銘賛共一卷翰林遺藁二卷詔冊制誥表箋啓詞䟽二卷榜上梁文附題䟦三卷樂府四卷承華事畧守成事鑑共二卷中堂事記三卷烏䑓筆􅀘十卷玉堂嘉話八卷右總壹伯卷附録一卷
