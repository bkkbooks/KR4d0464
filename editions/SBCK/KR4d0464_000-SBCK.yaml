body:
  text: 秋澗先生大全文集目録苐卷頌中統神武頌賦蛾眉硯賦茹野菊賦未央瓦硯賦三峰晴雪賦熈春阮賦弔廉将軍墓賦登常山故城賦鶴媒賦玄猿賦蟠太山賦苐二卷五言古詩拜奠鲁文憲王廟拜奠宣聖林墓陪總管陳公肇祀商少師比干廟擬韓子秋懐十二首九日和淵明詩韵寒雀歎觀􅁙者有感自喻改葬冥漠君青青兩桐􅀣示阿孺鹿喻散歩清溪湄溪田暮歸送宋大使漢臣之任讀林和靖詩集西溪始泛擬古三章過㽞元海􅁜寝静樂堂逰萬固寺舜泉跋席懷逺録老農語吴大使于明致樂堂遣發僕歸瘞淇上感寓陳村待渡沁水道中宿板橋田舎過鹿臺山觀穫蕎麥臨汾節婦吟過鹿臺西崦荅老農語第三卷五言古詩題玉石蓮花洞道院壁御驃出廐圖題吕充隠和陶詩昆陽懐古苦􅀬歎聽講呂刑諸篇謝人贈硯贈仲温教授泛漳篇栢亭嘆九門道中野河渡菊嘆輓漕篇元日示孫阿鞬桑虫嘆靈光塔舂榆嘆折齒吟讀韓子有感董大夫廟條侯祠泥阻大小西門道中鋤鏤牛升哥聞談劉齊王故事過深州故城有懐賢哉霍生行題洪崖先生卷後出香竒石洗硯示孫阿鞬第四卷五言古詩遊百家嵓謝王中丞惠栢㘽飼牛辭種􅂼餞王和之北還汲塚懐古壽弟監使仲略酬紹開提刑見􅀉嚴韻擊訓狐明農亭感興三首苦寒効昌黎體恠石辭疇昔一首􅀉紫山元日吟嗟哉􅀓生行處暑日偶書秋雨中書懐餞侯敬夫還汴望松吟宣城筆㐮邑蒸豚雙廟懐古虞􅁎墓江舡二詠舟宿桃源縣劉营田拜慶詩食鱸魚長至日次赤岸驛平望道中大安嶺自淮口抵宿迁風雨大作吕梁第五卷五言古詩和淵明歸田園教授晋卿連失三孫響板辭海㺜和曲山遊澤宫感舊韓晋公􅀞水牯圖唐邉鵉正靣孔雀琅山望黄金䑓有感和紫山題觀音堂山石記虎骨鎞淵明漉酒圖有懷雪庵禪師李庭珪墨贈唐承㫖成徳堂題嘉山詩卷東征詩覔風字歙硯十月牡丹送范葯荘子楚教授嘉興贈利彦翔贈筆工張進中送張㓜度倅冠州遊嬀川太玄宫筠菊亭祭司徒忠懿公墓書日者卷後題張氏先塋記後送張勝非任汝寕判壮士吟送徐平叔題焦莭婦卷後送許淡齋提舉觀臺劉氏瑞蓮蒲城行黒山秋霽第六卷七言古詩舒辟劒􅁔飛豹行匹􅁓歌金馬門行相從行南風謡長劒行雜言喻彦正失子湧金亭秦川行東方碑帖􅁔墨竹歌乞鴈􅁔晨起理髮衡門行大雹行捕魚歌宿仙山朝元觀贈田生赴監河之召贈孟祝史徳卿還燕城題韓幹􅀞馬圖梁秀才惠棖三勒􅄴􅁔驅蝗行第七卷七言古詩題薛少保稷􅀞鶴圖僧􅀓古坐龍圖題邈齪虎圖行楊祕監百馬圖和左轄姚公梨花詩韵絳州法帖􅁔題趙仲噐冶古齋題都山老人九十詩卷􅁖溝行題趙城王開鋪壁清江引餞􅀰中彦亨平陽官府行鴂詞遊姑射山神居洞北洞銅方爵􅁔短歌行風秀丹山􅁔醉歌行玉壁城懐古聴祥師弹琴㐮陵行贈賈主簿徳逺戴松􅀞牛圖李管丘寒江晚捕圖七夕同府僚觀稼西郊黄崖行曲沃道中與老農語新道成車中即事謝金店馬生贈峴山圖山中礲研歌題董少平廟壁呉娃行鎮州懐古周卿二子􅁔十月朔展墓廻有感簜樽歌西京王生歌第八卷七言古詩入侍行贈董符寳小山行沙堤行羽林萬􅀐歌瑞雪􅁔謁蘇墳送文􅀰中子周義士姜侯􅁔趙穆篆􅀠歌食梅子有感潜齋􅁔長慶行酬暢純甫贈元白二集虎牢関行送齊彦僉事商鼎􅁔歸夢謡日蝕詩南宫老仙雲山圖盧仲傑送所逸東萊集趙僉院許贈歐蘇集作詩問之涇陽鎮中秋小邊行夢陳節齋信陵公子行題子猷廽舟圖山陽早發雄狐行月老招飲望黄金䑓歌越鷄行春溪小獵行野兕行哀老殷辭憫雨行第九卷七言古詩滹沱流澌行布榖詞惡鴟行鴻鴈歌健兒􅁔贈龍教授取新馬天章廬山清曉圖放猿詞田家謡素馨辭宣和寳墨􅁔寳鼎􅁔贈僧法恒義俠行并解題贈僧芝庵題文獻公􅀞鹿圖桑灾嘆後桑灾嘆入奏行紫藤花􅁔聽馬􅁎彈明妃引讀舜廟碑聚星鳯池硯􅁔贈張道士辛夷花􅁔遊封龍山上觀題桃源圖後贈九萬户嗟嗟住河濵滹沲秋漲行謝安從仕贈放生池碑紀夢平原行常山太守歌􅀒籠行第十卷七言古詩華不注􅁔趵突泉歌東坡海南醉歸圖河冰篇短歌行荒雞行龍在田詩楊柳枝詞檀來歌椒蘭怨汜水行劉山人歌後飼牛辭春寒曲驅狼行寳鴨歌漢宣帝幸池陽宫圖入奏行送雪堂南行樂閑老人歌醉道士歌􅀟峰歌過宋義墓中秋吟花工王氏歌河圖篇風字瓦硯歌雷將軍歌革故謡通漕引珎珠菓詞當熊詞東征謡下瀬舡征士謡天星行雨木冰建春樓歌潜蛟行重門行唐申王畫馬歌秋澗著書圖湘中怨第十一卷七言古詩題耆英圖紫芝歌圯上行題長江萬里圖問呉臺辭南臺懐古游九仙閣􅀉中􅀮信宣慰李夫人􅀞蘭􅁔雜言福唐中秋對月題釣䑓洛中吟竹鹿辭游金山寺􅀑車行流民嘆南樓行五色鸚鵡歌福星行白鹿嵬􅁔瓊華露酒􅁔有狐篇􅇁魚􅁔風狸行賀林君玉得重孫二俊􅁔題任南麓華清宫圖和東坡聚星堂雪詩韵鷄蹠劒􅁔飛廉瓦硯􅁔清霜怨賀雨詩題中山劉壽公九十詩卷送李蕭二君使安南継翰属詩韵礱硯詞秦山圖詩送曹仲堅赴建寕教授鴈門公子行泉石雙松圖江南道贈鄒五星湘中後怨摩娑辭街東宅碧玉琱枕淮西行送湯宣慰黄鵠下太液池歌海燕葡萄鏡􅁔贈趙克敬魯公書和張鵬飛韵第十二卷五言律詩壽史開府壽徒單顒軒送韓茂卿北上春夜宴史左丞宅送韓雲卿赴䑓謁武惠魯公林墓靈巖寺壽郡侯贈周曲山夢入閩清府送李􅀰中北還謁光武廟食粽有感番禺杖壽幹臣周宰送趙秉彛赴遼東省幕送忠翁南歸手植檜酒鐘哀曹府君送趙克敬任定武判官省題詩紅藥當堦翻朱干玉戚五言律詩何叅政母夫人哀辭張神和純孝題常運使西覲紀行二首太平宴二首冬日即事壽韓生弘哭完顔仲希墓挽呉衡甫壽王子􅀄秋夜月下獨酌治􅁾贈雷彦正清明日南寺對雨秋夜出門挽史二相君挽武安道壽雷彦正二首白松早發泓芝驛禹廟温國公故宅和周幹臣詩韵秋漲二首題有趙三侯祠禱雨孚惠祠慶王丈壽酬紹開外郎星子鎮道中題栢壁鎮夷齊墓舜井河中歷山聖人嶺題㑹琴圖田間三首過萬泉縣第十三卷五言律詩哀髙尚書詞三首送成耀卿尹温縣題趙禹卿東臯林亭六首謁昭烈帝廟固安道中除蝗秋日過濟衆僧舎送紫陽歸栁塘午憇龍泉寺􅀉龐雲卿元日燈下即事詠史開府宅鶴清宛道中大雪荅蠡州天慶寺英老座中偶得龍門寺辭長樂先壠二首飲食望舍弟消息三首送趙克敬任孟州同知蕭相國廟火獵汴堤道中宿濉寕夢總帥史子明次􅀫迁望紫山不至淮安州寳應道中二首髙郵道中二首召伯埭楊州衢州二首玉山道中常山道中信州道中石溪道中鵝湖寺閩中閩清湯池建寕北􅁐望嶺鵝湖道中題寳巖寺壁二首首夏居家即事方竹林枯燈花送杜簽事之任江西重九日雨中醉歸二首舍弟仲畧題孫鞬郎名字説後贈栾子英詩贈鍊師岳仲和月桂賦白鷴􅀕五祀和曲山冬夜即事二首酬舍弟見􅀉之什挽宋耀州漢臣二首大雪五加皮酒題杜氏六子名後燭花火罐題遇仙宫詩卷牡丹題郝氏世徳碑後夜病不寐大行皇帝挽辭八首題馬同知拜慶詩卷秋日下直玉堂餞安南王弟回鄂渚雪夜聞鐘王氏拜慶賈仲和八秩慶閻氏母壽送喬元朗使安南二首榕􅀣贈高邑趙教諭冬藏和曲山詠懐韵䟦吕丈扇頭秋雲自激夢中得出門三首望淮夏夜安坐讀史詠梅己亥門帖子出門雨後㸔山夢中得喜雨秋夜中秋制中對月披􅁭第十四卷七言律詩哭劉房山中秋月送王家父二首和靖教授詩韵秋日言懐清明日錦堤行樂秋雨晚晴夀節使史􅀳明南城納凉晚歸七夕立秋凉夜八月夜坐雪晴望題何鍊師虚白庵展江亭送紫陽歸柳塘送蕭四祖北上上闊闊學士雅集蕭徵君函文送子􅀄東行杜君羙耕隱堂和术忽詩韵雨中與諸公飲市樓秋漲後訪王柔克報子􅀄以書見慰春望冬夜坐砧􅁓夜歸壽周都運秋夜懷吕子謙壽叅謀王公二首贈元書記和元仲一詩韵二首送百德正臣之汴梁贈王修甫挽趙提學送盧叔賢之鄧州壽王子􅀄自適登熈春閣哀故宮送趙相北上登凌雲閣送子􅀄之鄧州送郝伯常歸保塞贈李幹臣登資聖閣䟦西蒲燕處圖壽史丞相過宋義墓元齋過朝歌銅臺懷古佑德觀早起􅀉蕭茂先晚菊聞詔陽榖道中挽趙御史上王翰林夢受庭訓贈孟文伯壽姚宣撫覔貂㡌邢夫子拜慶詩軸鎮州懷古祗􅄄昭烈皇帝廟燕城書事二首望西陵牧野道中送趙相贈韓義和送常道人送劉同知還鎮陽贈梁􅀖傑和幹臣今晨所見大風雨後草堂􅀰事税李子文三首夜夢遺山指授夏日南堂卽事讀漳濵唱和詩軸二首謝惠瓦甒雷雨大作和幹臣韵雨後言懐二首和幹臣雨晴第十五卷七言律詩蘧大夫廟苦雨吟迎秋明霽箕子廟挽梁􅀖傑二首荅雷彦正酒醒聞雪作泛舟清水三首􅀉子初和節齋詩韵林塘秋晚卜築送子初北上􅀉楊治中上史丞相贈相者訾洞春和高麗李􅂋甫詩韵開平夏日言懐送雲叟公􅀡中書省開平晚歸吊竹和龐雲卿詩韵送陳尚書問筆二李子昭許惠雙筆聞諸軍飛渡鄂渚秋日㑹白雲樓賦西域鸚鵡杯西城郎事挽翟噐之哭郝奉使次楊子英詩韵題開封府後堂壁􅀫洧川驛許昌道中頴封人廟友人䘮馬南陽府試院中作􅀉李士觀南陽北城晚眺宛葉道中次韻􅀫汝樓二首贈提副正立夫二首留别陳節齋􅀫朝元閣下挽呂子謙讌臨武堂􅀉陳節齋鞠餘望月東臺日用送王子壽贈郝孝子白樓晚眺洪洞道中公堂即事和周録事感春詩韵夏縣道中題聞喜廟學古柏餞張子文送朱信卿還吏部霍岳道中霍邑懐古送周幹臣赴都送張漢臣弟壽趙輔之挽陳季淵三首挽殷簽事㣲恙中作㑹醒心亭送郭彦實洛陽懐古逰澤州青蓮寺二首夜過関嶺山虞郷道中謁表聖祠慶潞伯逹八秩為郷人壽第十六卷七言律詩壽陳節齋三首清明日逰長春宮送陳按察東還挽王仲蔚寒食讌韓氏南㽵贈李濟之􅀉王漢臣和趙明叔言懐餞陳簽省行臺西夏五首張夢卿恵竒石考滿日言懷題李錬師崇聖宮圖夏日讌集田氏林亭聞史相受開府御史秩滿上劉太保山人二首和郝子貞䪨二首題韓通甫城南别業送子􅀄出鎮閼臺登臨武堂唐山道中早發懐舊除夕言懐大暑挽王􅁱甫觀稼遊玉泉山書懐題趙宣撫山中雜詠歸安潜洞趙樊川􅃴安堂趙公泉未央硯賀正旦口號贈相者陳士廉登昊天寺寳嚴塔􅀉贈徳長老遊聖安寺書懐送史丞相􅀉陳按察䟦王内翰唱酬詩軸挽歸潜劉先生継張相言懐二首夢衞􅀯郊行䟦梁斗􅀯無盡藏餞叔良西歸秦中􅀉李和甫覔未央硯會飯開㤗丈室壽徒單待制菊嘆送趙明叔赴濟南夀房祖送李仲實北京行省夀胡紹開望西陵送集和之僉事楊叅政出鎮覃懐送陳按察贈羅徵君孟待制哀辭􅀕子㐮先生贈韓通甫哭馬才卿哀史都督題張府君墓姑射山新道成和張仲明韵王衞州挽章哭李州判別盧漢臣挽杜止軒别忽英甫第十七卷七言律詩誄史丞相挽遺山先生哭賈叔良􅀕館主謝緫管挽楊叅政挽張簽省别緫府諸公挽單學士和劉懐州韵三首餞王泉州二首同劉景融過西園送髙飛卿尹順徳同劉景融韵荅客問西􅁐懐古二首虞帝廟吊古和劉懐州韵和髙飛卿韵二首别髙屯田晦之即席夀青陽學士和左山言懐韵遊封龍北麓中溪書院贈劉大用即事别鎮陽諸公經史緫帥戰處閔子墓公堂言懐糟魚元日挽杜止軒挽孟徳卿和張鵬舉韵和張仲常韵賦白舜俞多月亭遊佛首山開化寺遊靈巖寺二首送劉世傑奉使雲南漢柏過沙溝店長清宫舎觀光三首壽王鹿