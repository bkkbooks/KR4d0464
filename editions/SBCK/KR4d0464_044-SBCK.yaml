body:
  text: 辨說日用講䆒義理其用有三體認明白臨事能施為出一也道義傳受必託扵言辝筆頭發明出來二也其􅂉諸生請益發藥啓迪化若時雨三也至若都曽經歴只為自前不曽專心理㑹又不能記誦乍了若無使此心茫然如道傍空舎諸物淂去来住持不敢認為巳有又學既不固及人說着才方省記終了自無􅀁淂前賢力學須先除去此病攻苦食淡不為一毫外物移動屏堕氣收放心一主於敬不雜觀不過分此或未畢輙復它務􅅻作復輟今日已過而有明日管淂無時㝎志帥氣如下硬寨磪乎有不可拔之势一物一事不輕放過窮理盡性至於命而後巳性與命只是一个理而巳若有所淂即極力存養晝見之扵行事夜験之扵夢􅄰使真積之功日新一日不使頃刻間断不恤乎時之利不利不悶乎人之知不知􅀅所樂自喜專以推崇天爵為至古之學者無不尽其極者恐不外是不然困而不學生而為斯民之下不知所以學老而為乾沒之人良可哀也此皆予之錮疾遂書以自訂非敢示諸他人書太極圖後甞觀宋一代道統傳授獨推濓溪元公為首及䆒其功用有渙然氷釋者蓋先生始明太極隂陽五行性命之說以開萬卋沉迷之惑明一出扵中天故也夫太極者何曰有物混成先天地生以一而含三者也老氏􅀁謂一生二二生三三生萬物者是已為太極判而有天地乾坤既位然後萬􅀋育焉故理可見而道由是而生道者循其理之路也其性之與􅒛尤坦然明白性者理之所􅀙出理也者只是純一四端而巳固無有不善􅒛者氣之􅀁􅀙來氣也者変化錯糅有清濁厚薄參差不齊之間曰賢愚曰夀夭曰貴賎曰冨貧一随􅀁遇而禀之者更無旁入曲生之理濂溪先生以前只為先儒不曽㝷出氣質性來雖有混然上中下三品之說終是不無窒礙學者又不致思或求而不可淂者徃徃溺於邪說未免随人作計以至迷惑忘而不返可哀也㢤若先生之圖之說其有功扵聖門恵夫後之學者可謂大且深矣抑使輪回宿習荒誕不可致詰之說一掃而無餘此􅀁以尊居圖首為道綂之宗也若以作一箇分隂分陽之圖說了是齊其末而不揣其本也體認從古至今止是這些人情止是這些事理聖人裁量備具六經罔有不盡後之學者學此也既䏻通曉厥理正要行已臨事之際觸􅀋相應以較其巳之貝合與否若事務之來既不䏻體認前言徃行以酬酢其變此與不曽學者何異是㝡吾儕大病既不䏻踐迹􅀅何以造其室乎亟當思體認之方從何而入可也戊子夏四月十一日晨􅁸偶書小子其志之氣志人志不㝎只是氣為之乱氣既乱却為動静無常於中互相奪爾若安􅒛順䖏不以我之所當得而易其彼之所不當有者人無日而不自得也如是則何患志之不安理之不明氣之不充者㢤或曰所當淂者何即天之所􅒛扵我者是也不當淂者即天之未甞付扵我者此君子之所以亟當知也故曰知􅒛不然則謂之不受􅒛不受命是之謂逆天故孔子責子貢而貨殖焉者是也天人爵天爵志清明而夀人爵氣濁乱而天或天􅂉人䏻夀而不乱者唯素有所飬者􅀎之曰養者何至公無私而巳􅀌立人生天地間立甚􅀌特頼有四端在我然後廼有所􅀝如伊尹之恬扵放甲西伯之安於羑里周公之坦扵東征孔子之泰扵厄陳武侯之必扵復漢盖􅀝是理為用而後大有所立者焉故傳曰君子獨立而不懼其是之謂乎不然一身心之微其何以禦不測無窮之変乎戊子夏五月甲午積雨開霽晨􅁸書扵露堂西序孟荘不相及予甞疑孟與荘皆同時間人終無一言一事相及者恐是蒙荘閉户著書罕與卋接迨身後其書方出適讀陳氏輯語陳名􅀿童字景雲三山人大意畧同說當時無人宗它只是扵僻䖏自說然亦止是楊朱之學但楊氏說得大了故孟子極力排之戊子重九前一日書自得誌者發其心扵内故納諸壙印以告化者碑者表其徳扵外故植諸神道以鑒來者又曰誌者紀其心之跡也碣者掲其事之著也朋友眀友列扵五典其所以為重者志同而義在也故粲然有文以相接驩然有恩以相爱不然其與走者􅀋聚而同逰飛者群分而並集蓋幾希矣詩人以伐木􅆸特表夫友道之缺深有㫖㢤五常五常之道仁為體而四者為用義与智陽中而含隂禮與信即隂之一㝎者也曰陽中而隂盖運動離合有􅁻有㐫者焉故也隂陽之道易曰一隂一陽之謂道九峰曰隂陽以氣言道者隂陽之理余曰理者氣之所以明所以幽所以生所以殺所以舒所以􅃤所以為君子所以為小人丗之所以治丗之所以亂戊子冬十一月十八日成皷作燈下偶書讀孟子􅂉問四書􅂉問獨鄒書多設疑詰難何也孟軻氏終是去聖人一間辯論之際其言英氣發露不無激切輕重之異故文公扵此頗詳講明折􅂨要使不詭扵理先後一揆而後已何則温公大賢也猶有疑孟等篇况觧之云乎此晦翁惓惓扵是亦臨川翼之之意也入伏后三日課讀此書􅂉問偶書晚學小子題恩多怨深此余平日事也􅂉者曰君􅁟􅒛人生物者􅁟也物既長不淂不克制其􅁟自然理也此隂陽家論似亦有理然不若以人事評之謂如我以禮待人人不見荅未免有所不平不平則彼則乃有怨意我當夷其不平以恕心待之寕人􅀒我􅄂著聖人之道如長江大河人人淂以飲之然飲之者有多有寡為江河者不能使之一一均同其量任其自然而已不然恐造物者亦太勞矣余謂師授學者以道亦當如是既以自警且示韓陳二生八月二日偶書分絶伊川先生云常思天下君臣父子兄弟夫婦有多少不盡分䖏况今所為親戚故舊昆弟友朋四者天理當然之分廢将無遺可哀也㢤秪是計較扵我善􅁖有無相益為事與之離合耳静言思之物則既蔽近扵飛走人既與非􅀋相􅄂䖏㡬何不傷而夷也可不慎言堇行凢事􅀧檢以先周身之防而存逺大之至元戊子􅀊臘日書無音萬物受氣於天音者情之所由發也以政有得失而音有乖和雖極亂極困未有情不宣而音不作者如幽厲之世雅固遏宻變則不無也至於當有絶無豈困而不暇作伏而不敢出其或善不足以法惡不足以戒亦若天變之無所見乎三者必有一居於此矣於是感而書之得失人之得失一係夫命之通塞若得則既不當過恩于其所舉揣其已才如何耳失則又不當致怨于其所沮亦當量已命之如何耳若恩有歸是人憐其不才而􅀻之也怨其沮是我妄為言而不安其命分也何益㢤已丑􅀊夏六月客退偶書以自儆黄鳥三良説觀坡和陶三良詩反復詠味似責三良之不當死也當時􅀙死穆公者百七十七人蓋康公􅀙先君亂命迫而納之也三良之不死淂乎若專責康公可也分謗三良豈忠恕之道㢤只以坡之議論英偉辝氣縱横讀之者爱其如此故不􅁴白壁之有微瑕也若晦翁之詩説可謂盡之矣文辭先後文之作其耒不一有意先而辝後者有辝先而就意者意先而就辝者易辝先而就意者難意先辝後辝順而理􅁕辝先意後語離而理乖此必然理也學者最當知之讀淮南子淮南鴻寳書出大山䓁徒􅀁述在藝文言掇百家之緒餘耳特變其文而為小大異同之論然自得者鮮矣讀之者不無􅀁益至於隂陽造化之機治道興衰之理正有吾六經與信史昭在又親扵其身為不善者雖著書立言君子有􅀁不道予􅀁以讀之者􅂑其事實可訓及漢文近古三代之氣有凝而未散者至元丙戌􅀊十月二十三日題􅄂著鸜鵒食蝗秋七月螟生牧野南無幾有鸜鵒自西北踰山来方六七里間林木皆滿遂下啄螟食且盡乃作陣飛去予考漢五行志貪人尸禄猶螟害榖故感而生蝗夫鸜鵒北方之鳥也其觜距有􅅮啄之利又數多如是意在位者不肖􅀅有因貪抵法而敗者不然何食之既邪紀之驗它日之異時至元五年􅀊戊辰也魚歎至元九季春三月余自燕南還前次淇右逆旅主人條桑徹􅁟束藁作炬詢其故曰此􅂑魚之具也既而主人置條圜淺水中外以石擁之夜向寂風息波平炬火􅁸岸側群鯈趍明争集其中回旋徃復千週百匝眎其條為􅅈之大網一不敢出越而㳺去主人俯掇如地芥焉王子喟然嘆曰班生有言山林之士徃而不􅀎返朝廷之士入而不䏻出士乎士乎冐昧行險趍利而不知止者曽何異扵斯乎是􅀊重九前三日寓平陽牙城官舎之待旦軒坐聴秋霖耿不能寐追思所見作魚嘆云非分說甚矣非分之不可求猶鴆毒之不可懐也鴆毒之殺人世知避忌非分之存心其禍有不可測者有人扵此小有材行險僥倖以濟其慾一旦濡首染指攫􅂑公餗是知厥指之可染不知首領之不可保也竒貨之可㞐不知竒禍之不可脫也既而以敗聞抑栁子云立身一敗萬事瓦裂者其是之謂乎夫鳥俛而啄仰而四顧猶懼夫物之為已害也可以人而不如鳥乎今日方食聞府吏藉其家案上一柸蔾藿重扵五䁀七牢矣至元戊辰夏五月重午前三日遺安坣書鏡箴王子醉堕馬傷額既愈日引鏡自照色黳如凝欎者旬餘因愀然曰昔樂正子春下堂􅁕傷追悔不踰閾者累月盖聖人以毀傷髪膚爲深戒必全而歸之爲至孝矧䧟身非義一敗瓦裂之酷㢤是以墨子悲其絲染馬迁痛其刑餘栁州悼其躁進也惟其㞐易俟命不行險毋苟淂􅀙容中道乃爲合理吾知免夫至扵㳺㞐食寝則體安而氣平不然事変之來少有蹉跌又何翅髮膚之毀傷物議之輕重者耶嗚呼小子􅐐其戒之慎之扵是乎書時至元辛未冬十一月十有三日也簮導玉飾辨統軍府􅀙事李良貴上計耒燕過予出示華玉一方長寸許廣如之状􅁼方勝然其文章昭囬刻卧蚕中間髣髴粟粒􅀮起上作蟠螭闖首左頋前足去左其下穴方孔甚邃玉色皦􅃳殆疑脂然余曰魏晋已下無有也李曰然此陽夏壙中物也余時方讀礼書而此物適㑹因攷其制盖大冠横笄之首飾也古者笄長尺二寸諸侯以王大夫士用象其爲神明之噐断無疑矣何以知其然禮云瓦不成沬木不成斵有鍾磬而無簨簴其曰明噐神明之也故􅊴其足之左扵乎魏晋去秦漢未逺兹物也視之猶可仿像一時禮文之盛古人嘆三代吾不淂而見之淂見漢魏斯可矣盖文獻之傳尚足徴扵當時者耳扵是乎書興平閤本說古今名臣􅀞像皆曰興平閤本興平亰兆縣名而曰閤本予􅀄不觧其㫖近襄􅁜吉仲和過予覩壁間李衞公東坡等像此正興平縣學􅀁臨者甞聞諸進士武公張徽君羙云金大㝎間某人自秘書郎出宰兹邑􅊖取平日􅀼模秘府真像而圗形焉故有閤本之目云崇徳堂說余貌不􅀭寫之者未淂盡肖建賈君一貌而見者皆以為余且曰仲器為人不止技􅁛其扵奉親事嫂以孝友聞郷間殊侃侃也既而求名其堂且叙其世家賈系出襄􅁜今汾東有塜巋然曰賈相者乃逺祖也從傍㞐民同族氏者尚百餘家有圭田三百畒耕穫者主其年之守祀終而始焉奉為故事甚恪考夫傳記盖賈䂊州逵之壠耳豫州在魏晉以鉅儒名卿顯冝其世祀至于今而弗絶也今觀仲噐氣質温粹孝友純至似非丹青馳譽者豈豫州之澤淵流而未央邪故以崇徳榜之且用篤其􅀁巳至勉其􅀁未尽者焉至元丙子清明前三日題讀唐徐有功事蹟周革唐命􅃩后煽䖏任威刑而絶異議遂􅁸麗景等制獄縱周来之徒誣搆䧟置膏流節觧之禍莫有捄止大者以剪夷宗子希旨下者以告宻上変徼功􅄦朴滿朝中外股慄時有功以司理之微秉公恕之心扞折兇鋒守死不撓至辯明􅁈抑竟頼全宥者甚衆嗚呼仁㢤公固知上含容􅀌直庸示公道然人慾肆裂之際天理有不可泯㓕者彼中橋突犯清蹕釋之辯扵漢文慎罰之􅀄威衛悮斫􅁜栢仁傑諍髙宗扵受諌之日以􅀔以時司刑為尤難及拜西臺至頓顙流涕有鹿挺懸庖之請何感動自悼若此豈體存正大明哲保身之方非權無以濟之邪紀異至元十三年夏六月王按察立夫同在汴梁試院中告子云前年冬十月益都路緫管于也孫䚟以髀瘡卒扵官􅀄病臥踰浹旬遽召左右具儀從及鷹犬橐鞬者列堂下徐曰吾今日晌午逝矣家人問何徃曰􅀅赴逹官某人府言畢據銀椅而終逹官者故􅁥真㝎路郡沃魯外五赤也蓋公自微時薦擢于朝以致顕逹皆公力云俄有樂安縣吏耒云日晡時三十里外遇公騶􅀐甚盛従者呼某至馬前喻之曰汝歸當告吾家若車徒西還凢過水當以金錢投之􅀄不知公􅂢舘矣翼日又有自濟南来者亦見公獵道左而西如平生然明年丁丑夏四月與公之子某㑹燕以向􅀁聞審焉不少異因念余向在省署識公扵稠人中􅥟幹魁偉望之一雄傑也立夫云公爲人忠謹誠慤厯事三朝多為上􅀁􅀝注世為燕之香河人夀五十有㡬又聞吏部尚書太原髙公亦臨終區䖏後事神志灑灑不少乱問􅀐􅀙具堦下否曰具如期而逝嘗聞聦明正直者生有􅀁自來殁有􅀁自去如􅀓說上為列星韓柱國死作閆羅信有據而然也因併筆以記其異讀魏相傳周書有云論道經􅀖爕理隂陽道者何以正心誠意為體仁義禮樂乃其具耳以此出治隂陽自和萬物咸淂其理舎是非復有調元之術也今觀相之爕理至區區建議舉四人各主一時使衣服禮物朝􅀕百事一切法而行之時至明言所職庶政玉燭之祥何不思之甚也嗚呼西漢去三代殊迩相扵中興為有聲其經綸器業惜乎不岀乎正心誠意之大學而牽扵五行附㑹之小數豈見道未明權衡機務之心有􅀁偏溺㢤御書銀盒事客有云道􅁜朝二近侍以功名利逹由天􅒛人事因私相論誥甲曰天乙曰人上聞之􅂑銀盒中㧗曰可去者某宫遂授乙者使赴尚書省既出衂血大作不克徃適與甲㑹以君􅒛不可緩即就付焉其人拜官而去由是而觀雖云君相造命不知造物使之然耳近一名士甚為聖上所重當軸者力薦以為同列􅀅謂旦夕輔政及上聞喜其奏而徐之既而病卒因記客談併書其事紀肉芝䓁事天興􅀄荆王府弟中庭産􅁏芝一株髙可五寸許色紅鮮可爱既而枝葉流津濡地視之皆成血臭不可聞剷去復出者再遇夜房榻間有物作聲伏其中燭之群狐滿床逐捕失所在未㡬曹王訛可出質王妃蕭氏向予談其事妃尚書貢之孫今為黄冠師㞐衛先友牛講議國瑞牛天祥字國瑞澤州􅁜川人通天文武經占筮風角䓁書正大間甞為恒山公府議事官兵后㞐衛東白皇渡既而著軍前中書省詳議辛亥秋八月應東諸侯聘客死􅂓城夀五十有七􅁙汲縣郭村東郷清水鎮州風俗鎮人以七月六日為七夕莭盖其避王鎔日百餘􅀊俗以為常何恩徳感人心也如是據五州當時四鄰交争併􅁸惟鎮之人古帶遊嬉燕樂安王氏之無事彼懐思不忘愈者豈非是欤則知文忠公筆削真實録矣至巳夘月六日按部次新市縣五夜燈下書僮喻官真定時五月夏至日作秋澗翁自㓜讀書踈扵生事䖏則知渉古今攷治道驗平時所淂扵日用間庶伸微志故從壮􅀊沗列舉家仰食􅅒禄未省飢凍切身者二十有餘年矣雖然􅂊閑即無以資生顧貧乃士之常不敢畧有他騖以覬苟淂非惟不觧亦且耻出諸口汝䓁轉藉翁庇各蓄妻􅈽子日嬉温飽奔走承侍外心則無􅀁苦也汝翁且自已夘秋移官燕南忽復四禩以理􅀅去乃有維揚之􅒛夤縁投獻遂致杫止重叙一官良爲匪易其倖与否汝等朝夕􅀁親覩也及􅀯還滹上復需後􅒛今又數月矣適饑旱相仍食艱口衆事􅀔牽率有進退維谷者况汝翁行年五十有七自惟踈拙與時齟齬加之筯力衰耗百念􅁅冷静退之心日徃來扵其懐甞謂秩天秩也不肖者無乆當之理禄天禄也衰老者無恒􅀼之方躬田力穯本吾家素業稅駕壠􅅿固分􅀁冝然行止有命又非吾之􅀁敢必也此淵明所以有心形相役口腹交病之嘆盻盻一稔歛裳霄逝切甞慨有感焉今日炊㷑晨冷庖人告乏計口而食月淂粟五釡可足時斗直鏹餘二千是旬月􅀁縻湏六萬三千銭耳其賔客之奉􅂟吊之禮塩醢葷茹薪㸑芻抺僦舎之費不在焉諺所謂百指無糲飱食倒黄流灘諒非虚語噫官時来則爲筆耕之􅃳又非所恒㡬何不相胥而困也今日夏至聞東郊穫麥天倉廓開招拾遺秉不爲無益汝等其徃㢤毋忽且令汝知田功之艱一餔之不輕􅀗也暮歸淂新麥斗餘僮奴輩既飯放啜頓失菜色爲一快也又念位雖下近伐冰之家尚爾窘迫在閭閰細民不合釡而坐餒者㡬希矣因援翰作僮喻㑹有餘思不􅁕為暴殄之戒且廣訓儉之遺意云魃妖余行陽榖道中農人有以魃言者余告之曰周宣王詩云旱魃為虐是魃非今見從古有之此盖旱妖之氣感人変􅀁娠而成耳神異經云魃生南方􅁏體長二三尺目在頂上走行如風見之䖏赤地千里執而杸之溷中即死旱氣乃消又云魃字從􅀑􅀑魅之物所生非唯南方也且古者娠婦不使食邪味聴滛聲覩􅁖色恐逐􅀁感而化余故曰変元娠而成妖耳哀辝後衞自壬子􅀊迄今邑中子弟不三十而夭者凡八人季武王範輩皆雋秀有望翩翩而佳者也吁百蛇堕地一或能龍既玉汝之􅂺復奪之不知造物者果何意也余故以咄咄怪事爲言然以理揆之雖一家之㐫変亦斯人有自致者甞記一士人問扵先君子曰粤惟金􅀄已来衛之文秀者極罕間有之多秀而不實先君曰衛地濵河沙薄豈其氣䟽弱故也若使水環州南或城㞐水西氣或可盛時不肖尚穉聞之不存諸心又弗請問其􅀁以故雅意􅀁在每念之而不明了以今􅀚之其言固爲有徴何則如東平汶出府南阿邑濟經縣東且以東阿較之在金一代由進士而位郷相者幾二十人鄆則不湏論也然魯無君子斯焉取斯使衛師有經儒人問學而知義則薄者可厚愚者可明天者可夀也此雖以人事臆度若有􅀘扵世教聞之者庶不惑扵邪妄之說云至元戊子秋八月八日書盧氏墳石泣大都玉馬坊耿氏石獅猛水出如霧予時爲御史目覩其事山陽長流村盧氏墳石表水出如泣者連曰耿盧二人皆出微賤而遽當台鉉此驟淂不祥之極也盖善􅁖以􅀋應故隂沴􅀅至兆見扵石如此予因曰此石泣也二人㝷皆􅀍誅然泣者非憫之也悲乎不知其量也吁龍堕農民王家至元二十年癸未夏六月中大雨河西郷農家王氏甫夕黒霧四塞中庭䆫户間寒􅏮不可勝視之有蒼龍蜿蜒在氣中起而復堕者再時王氏女已笄下堂趍室驚而絶扵地救乃甦問所見亦同歘霆震霧散失所在明日視其地鱗鬛印􅅺尚宛然也王氏世居水上其下潭渦殊深黒可畏雜著太宗英文皇帝天容睟表一􅁼釋迦真像仁厚有餘言辭極寡服御儉素不尚華飾委任大臣畧無疑貳性頗樂飲及御下聽政不易常度當時政歸䑓閤朝野􅌚娱前後十年號􅁛廓廓無事臣向過平隂縣聞校尉陳某所談如此陳早年盖先朝控鶴近侍者云前宋時有日者肆相國寺東一日而識四相謂韓魏公范文正公王沂公張齊賢也自後術不一售竟窮悴而死近年􅀞師覃人孫某奉詔追冩太祖聖武皇帝與睿宗景襄皇帝御容及奉進上顧其惟肖至泣下沾衿宣賜甚渥孫歸及家而殁二人術雖不同其扵發藏泄秘則一也􅀓曰人之患莫大知人之機况神明不測者乎戊子秋目疾後書鶻嘆昔有漁扵河濵者見一鶻摶一禽扵沙渚間禽逸而鶻不起良乆漁者徃視鶻已死矣彼念之曰鶻之􅋧撃性也一舉而坐空拳遂憤而斃有志士之烈焉夫士懐才􅀒氣求用扵卋倘時不我合人不我知則納履而去之豈若小人之求之也不以無耻為耻專以患失為事千思百計阿匼􅂑容雖僇辱在前而不顧期扵必淂老死而後已豈不貽伊鷙之忸㢤余聞其說甚有合扵吾平日之􅀁行者遂著之篇以見微意云戊子􅀊重九後一日書此係石盞正之說齒射寳寳翟姓内郷農家子史侯都督江漢時散卒也為人疊齒多力挽弓幾六鈞發無不中少甞射隼並貫干木寳登而􅂑之木折與堕碎其臂骨治無法肘已下断去自是馳獵以齒控弦括羽左手托月滿逐獸皆應聲而斃史侯異之上逹後授校秩振古以能射名家者多未聞以齒而决者然付之翼者即兩其足與之角者必去其齒盖懼其全而過為物害也又唐李客師善射好獵每出鳥鵲逐之翔噪時人呼為鳥賊亦􅁖其物之多􅂑也今翟一手尚爾断其右殆為天所劓乎弟忱說如此故書􅀞虎先君甞告某曰王氏在前金時家魚行里曽祖府君氣方嚴扵􅁟障􅀞一虎甚獰意者取陳力就列故也後八十餘年當至元已丑偶於樹塞復圗此獸追念前言有常警懼者書云徳明惟明徳威惟畏今雖頓還舊觀其扵惟畏惟明萬不一逮爾又諺曰生子如狼猶恐如㒬曽之意豈復在此邪小子其志之先子善書可以辟之者乃命僮道求鱔淂大小四尾􅀙其法而用焉明日開户視之机案書帙拭如也嗚呼物􅀋之相感也如此何其驗且速㢤余因推其蛀之􅀁致盖木斬不時非經雨露浸漬之乆又任其滋而棟焉濕與氣相閼故生噫蛀者木􅀁産也而為木之賊政者民治之具也而為民之蠧若上焉者治之而昧其方下焉者忽之而不知畏故害無小大有吾無如彼何者􅀎一旦修其政淂其法固雖四㐫之方􅒛圯族群弟之流言畔國從容可辦曽不知其艱也至元廿三年丙戌􅀊秋八月廿五日夜適良醖在壷欣然引大白者再􅒛童子執燭記予之作紀夢二十四年八月乙丑夜夢予逺行過一城市當荘嶽間一逹官觧鞍卓歇過焉呼予回視之盖叅政飛卿也寒暄外髙曰别雖乆食頃不忘也予曰披此彼此握手間予乃曰聞吾友叅政以来多有施為髙曰傳者妄矣􅂙政者􅂙知􅄂􅇵見做不行何施為之有予荅曰渠扵此見打野呵児胡為做不行也遂寤聞夜漏踰四鼓矣古人云至友神交扵冲漠間殆謂是歟次日聞吾友南来論其氣類與同亦夢應也因書此以贈吾三人者相㑹及此當捧腹大為一盧胡也紀夢二十五年春二月十七日夜夢朝上扵端門内彤䑓上聖上椅坐東北惲扵䑓西南角俯伏上問條支國事惲對以其國甚逺出犀牛革為甲甚良號曰黄犀甲上喜甚因窹明日撿通典六條支國去陽関二萬二千一百里在䓗嶺之西城居山上周四十餘里下臨西海水環其南後漢和帝時乃通地暑濕冝稻産五榖果菜出犎牛孔雀大夘如瓮有桃拔師子犀牛桃拔一名符拔似鹿長毛一角或為天鹿師子似大䖝正黄有音髯耏音端尾端者毛大如斗尔雅云狻猊是也記夢至元戊子八月十三日夜送真定􅁎仲實上路就枕熟睡夢在一雪後亭榭尚書夢符宣慰信雲甫御史王子淵三人来訪坐間話及向在東平時遊燕等事夢符衣一素練衫當膺􅀞名士像自遺山已下數人余即題詩杋上云不惜千金買東絹丹青難冩是精神因大噱曰此衫甚佳但到䖏是長􅀒一軸諸公行神也遂蹵踏砌雪而􅁴乃自占其夢復作一聮云恐是隆江方大用故􅀅賢彦貯􅅐中詩夢十一月七日與児子軰祓除回就枕熟睡近四鼓夢與姜君文卿㑹厯下亭酒半酣姜歌鷓鴣曲夀予聲甚􅂬亮巳而以遺山新舊樂府爲問余曰舊作極佳晚年􅁴詞逸意宕似返傷正氣姜以爲然予因賦詩以贈既􅁴頗記其一二因􅁕成之其詩曰􅀞戟清香敞燕㞐分明夢裏到庭除恩醲故里懸車後錦爛秋鷹歛翮􅀄細棹觥舡浮酒海暫停銀管合纍珠賞音千古遺山曲堅意髙歌要夀予既而後夢至一大城府遇老人邀予入王氏邸肆其主即曰汝非王秋澗邪予曰然因口占二句云此生難道無餘幸海上人争識姓名仍詢曰此何䖏曰兹戅州也地在洞庭湖南七百餘里予曰東坡八詠何在曰石刻去此又三百里外其老人又推予賤庚曰誰謂中州無人乎未及問其行藏而窹時二十五年戊子􅀊也十一月十二日夜夢四鼓時夢入一重修大佛閣有鉅蛇長約三丈自閣壁西北而下僧徒以杖擊之不中内一僧揮鍤中断為三叚予稍前視之其蛇首似獸有㕠角若羚羊者膏血淋漓赫赫然尚能舉動次夜復夢人以羽矢一大房若今之鞬者掛于中門記夢中題人手卷娶為無後有子而嗣有餘老為致養子孝而養不闕其􅄝慾或有􅀁未免而年巳及扵耄而扵三者吾子􅀅何擇焉擲筆而􅁴因卧􅀏曰夫子自道也扵是􅁸而書以為儆至元二十六年􅀊在巳丑春二月二十一日辛未夜也予時年六十三明日㑹亡友中丞王君􅁙扵正尚里夢觧予平日夢頗異自今年夏多夢疾厄㐫喪或纒綿墟墓間及故交乆殁者與之宴逰談􅀏如西溪賛拜殿授王中丞需􅀐而作且知其彼死時又不省在寤􅄰中尔覺意甚􅁖之因自觧曰此無他乃一身隂陽消長之漸也毉家有云男子四十隂氣自半况行近八八之數乎雖然氣有盛衰人不能皆然若有餘尤當惜養不至耗竭可也陽為舒為暢隂為􅆭為悽􅃤多而舒少故神才交而魄為之勝矣調此二者柰何有􅅸􅄝慾少思慮檢行已安傃分息形神而植定力旦則以此理坐進夕則以夢相驗一􅂉有差立為除治其病庶少瘳矣昔夫子向衰稱不復見周公扵夢只是老克自持不願乎其外之意也若不量力不安分凢百营為返勝扵昔􅀅見有不任我劳従中躍出辝而去之者矣可不畏慎也㢤故曰知之者強不知者老其是之謂乎作夢解紀風異余年十七八徃蘇門讀書至古城東十里外有旋風自西南截泉水北来望之圍圎約六七里大其髙入天聲勢如甲馬迅馳黒氣蓬勃吹拔草樹飛卷半空余走不及避乃􅊕目􅀝棠樹悚立須􅁷􅁴寒凛氣繳束而過别無它故今日偶讀筆談見元豊間武城縣旋風殺傷人甚衆因念予㓜多灾阨追想徃事有可怖者故書以為来者之警壬辰秋申月已七日記喪紀古之人以送終為大事故即是而察禮者氏􅀅􅁙燕人来觀滕文居廬弔者大悅今􅀚雷白二家祔􅁙甚有関扵風化而出扵常人之表者一則衰絰纍然多従古制二則寝苫枕塊卒哭後日飯􅂼食三則不徇俗而用二家四則穿治壙右製為壁藏土周扵棺畧不施甓五則直壙下􅉎同穴異棺乃北其首六則墓記従實畧無虚飾至扵容色之慼僻踴之數又見夫固􅀁自盡之道以致㑹􅁙者皆歎息有得而去因念唐為衣冠盛代至􅀕不焚􅁳錢唯顔魯公張司業家又伊川先生㞐洛下治䘮不用浮屠法雖風動一時止一二家化之予行年五十有九䆠㳺四方其扵􅂟弔固云不少然由徳風而偃者􅀁見亦姚許與是三家而已嗚呼甚㢤禮之難復俗之不易化也如是述䘮紀以寓予感雷則祔其母夫人侯氏白則􅁙其父頥樂先生云紀夢至元十七年春某官真㝎夢先祖敦武府君親告某曰今濟源縣宋宰相陳堯叟碑文内王其姓者䢻王氏逺祖也汝其識之廿年正月在燕與懐州劉節使相㑹問及陳相石刻云濟源見有陳堯叟讀書堂故碑但不知有無王姓者筆之以志異日求訪紀夢至元十九年八月二日夜分後夢行通衢見大井中一異状人跨青色鉅虵躍出地長約丈餘身廣闊与尾等修鱗濯濯可数若􅀅前迎而復去余俯視井中水波皆成五彩丹色殊煥爛也内中至井漘与􅀁經遺水濡濕尚淋漓然余逐蛇前行相去數歩外因􅂑碎甓擲之者􅄪既而余入一團焦避之蛇復来集其首巳化為馬又有數異馬飛舞環余而立􅀄甚惕息至此無復怖矣㝷登一􅂵閤少頃従閣之西道木陛下降乃窹月異庚辰􅀊十一月十一日長至日日出三丈許月現東北丑位間去日約百餘丈其上數丈隂魄􅇛團畧無虧欠至寅方移時乃㓕因念月與玄象經緯空際太陽既出自掩而不見今太隂於陽生之朝晝見與日並光又未甞月出東北方者吁亦異㢤剱戒哀梁子也梁奉議仲常與予聮事扵憲司者凡四年十九年冬同在京師乃告予曰僕有一劒頗古而犀利自落吾手每臨静夜屢聆悲鳴比復作聲錚然也且聞百錬之精或甞試人者則鳴卋傳以為劒戒予疑焉白此金孽也非戒也旣而梁以事南還陳留到家四日而卒吁亦異㢤因念張蕐授千􅀅而告㐫鄭逵淂吼劒而怪至夫金鏞木鐸中􅀮大聲若無因而自鳴則為不祥之金梁以劒異告予至其死時僅四十九日淂不為劒之孽乎梁諱秉常燕人性機警持事峭急寡譲淂年五十有三金尚書梁肅裔孫見􅀁藏世譜云至元廿年􅀊在癸未端月十有一日王惲書鹿庵先生卒日至元三十年癸已冬十二月廿二日鹿庵先生夀九十二歳無疾而終先是公静坐間忽張目仰視屋廬曰我扵此居淂箇月旬日間尔及薨適滿其數氣比絶呼家人令具鞍馬曰可与兄去矣随有大星隕扵寝室東山其光芒炬然曰兄者盖同母兄文勉先生也爱民榜進士第甞為某縣令終恒山幕官明年二月其壻李惟賔􅁙東平府湏城縣三十一年四月五日李野齋說如此家府遺事先君思淵子通天文又善風角辛亥夏六月憲宗即位明年壬子秋先子以事至相下九月􅀄客鶴壁友人趙􅁥摧家一日夙興見東北方有紫氣極光大衝貫上下如千石之囷時磁人杜伯縝侍側指示之杜曰此何祥也曰天子氣也杜曰今新君御卋其應無疑曰非也十年後當别有大聖人􅁸非復今日也渠切記無忘第老夫不淂見耳至元十五年予過􅇭陽與杜相㑹話間偶出元書片􅁓相付且歎其先軰學術之精有如是也國朝奉使大元太宗朝奉使宣撫王公諱楫字豳人有文武才略金季舉進士不第以武弁降太祖聖武皇帝即授宣撫使佩金虎符時年三十至太宗朝丁酉􅀊假御史大夫持莭使宋議和雖徃返十年有皇其蕐風義言言竟􅀙我議不幸使軺北還前次荊南疽發背卒年六十時癸夘秋也道號􅂵岩翁有文集并使宋録藏扵家元貞改號六月十日偶過其家孫元徳因出示公祕閣􅀞像介胄弓劔姿䬃爽盖儒将之偉者元徳風彩甚肖其祖及􅀚楊􅂵陽楊西庵吕大鵬張徽商左山􅀕文􅀞賛題跋等篇又說公比卒前數日夢一青衣童子傳王溪東舘主人來召既抵其䖏宫􅀚甚麗止公俟門屏間少頃出報曰公旬日後當主是舘吁亦異㢤又􅀚馬雲卿􅀁畫人様吴粧五星廼竒筆也其金水二女形皆散髪金主殺故杖劒水持筆者􅂉謂水官主録過木捧蟠桃火四臂上擎飈輪散火下操弧矢當前一大星旁射土則扶虬杖而已六帖說白樂天作􅀋書名六帖通典選㪯門載唐制曰開元中舉行課試之法帖經者以所習經掩其兩端中間惟開一行裁􅁓為帖凢帖三字随時増損可否不一􅂉淂四得五淂六者為通此六帖之名所􅀙􅁸也六帖云者取中貼之數以名其書期扵必遂中􅃟也金制金人立國作制頗詳雖服御飲膳皆有法以維之然化敝則奢麗奢則嬌嬌則弱弱則萎薾而不振恐亦取亡國之一端也今日因餟粥糝不可對齒偶思穆若卷如之事為感而筆之冠冕始制􅂉者以金人盤領上服與西域素積尖冐皆出本俗余以謂盤領漢之曲領尖冐古弁之制也今晨讀戴禮冠義得鄭氏冠禮􅁸早晚之說􅁛周公對成王云古人冐覆而勾領謂三皇時以冐覆頭勾領繞頸皆以羽皮為之至黄帝則有冕弁又云帝造火食旃冕而用布帛代其羽皮乃知二物皆三皇巳来之遺物也又如山東民家至今亦以長幅皂繒蒙纒首髻西域人用綌絺纒繞其首及食齒人冠絳氊以冐頂髽者其亦本於此欤嗚呼禮失扵中而求之野冨㢤言乎裴中立不引韓愈共事昔裴晋公授鉞平淮辟韓愈為司馬自以度為已知然終不引愈共天下事至作田横墓文微露其憤時貞元十一載公年始踰壮矣予甞思而不淂其􅀁以今乃悟此何異魏公之抑蘇軾也大抵才盛學􅀶之士加以年少未免有軒昻莫降之志卒之臨大事成大業有不當如是者乃知二公厚而惜之非畏而忌之也欲使澄治客氣明夫大學之道懿蓄其文徳以就夫晚成之器耳嗚呼君子爱人以德復有重扵此者乎戊子􅀊冬十一月朔晨􅁸偶書賤生扵無用說萬物􅄹扵兩間未有一物而不為卋用者况人乎人之為物淂氣之全而靈之最者也苟自棄自暴不為卋之􅀁用非惟返不及物而賤之􅀁由生也彼牛溲馬勃敗鼓之皮物􅀋之極賤者也然一旦與用適冝顧惟毫末可以愈竒疾應時需即与玉札丹砂赤箭青芝並芳而同貴貴生扵有􅀁用故也彼衣敝緼袍並夫華簮盛服之士貴賤固有間矣其􅀁以秉有靈􅃔物備扵我者則不殊也故為士者烏可􅁖其居貧䖏賤戚戚然卋之不我用也要當明徳志學思求其致用之方可也世之􅀁謂學者多矣有有為之學有無用之學窮經洞理粹我言議俾明夫大學之道者此有用之學也如分章摘句􅅺逺古而不通今攻治異端昧天理而畔扵道是皆無益之學也士乎士乎扵焉而不擇其有用而致力乎無用及其志與年邁悲嘆窮廬􅀹其世之不我用跡惑矣衍賤生無用說庭芝評郝奉使文李庭芝見郝奉使文字謂陳月觀曰陵川固才髙學􅀶但出入韓文未甚熟耳余甞度之韓文卋􅀁重者其要非一今李之扵郝􅀁以云云者正以韓豊而不踰一辭約而不失一字郝之返是者極多不然是擇焉不精明理未至􅄂以非聖之言故也崖公厲􅀑事跡故荣禄大夫平章政事御史中丞領侍儀司崔公遺言曰人秉四大假合而爲生踐􅂂五常而爲用有偏於學佛者溺扵儒書者各執其一偏􅀁以學者兩不淂其全雖聖人性􅒛之學備載方􅉺而學者多以尋行數黒為務及其遇一事决一疑皆不能自省愚扵七月上旬腦後病瘡􅀄不以為意㑹車駕幸大都跋渉從行瘡益舉彂廿三日問醫者麻􅁥丞曰此為腦疽其源發自五臓急之不可緩之不可當以漸治之自是日詣麻行舘求治後至白海而瘡势益大形疲力瘁心神不寕以此自思盖無他故病之􅀁作也然􅀁恨者㞐無良醫行不能扈從一曰近侍官伯勝等以愚病聞奉旨留麻􅁥丞於白海治之拜命日赧汗浹背伏思平昔畧無報國殊勲致感今日聖恩如此由是􅁴瘡疾頗回然扵夢寐間每為厲􅀑􅀁慿􅀼謂生死是苦樂我心既㝎何從不可八月二日􅀙其醫針者三處􅁴心舒意暢神志帖然視天地之氣月白風清霜露溶溶萬物各淂其􅀁而吾之清氣其静者混然同扵表裏方就􅆍而厲􅀑又見扵夢且曰卋間多少難了難行之事相惱百端向之治功皆不復見而疼痛比前尤加夢中恍愡而􅁴坐而思之非厲也以我􅀁見不㝎淂乗其便耳若吾身􅀗安即与天地萬物混融同一和氣彼厲􅄦安能凂我㢤且天下之事不可不辨扵早人之生死不可不識扵先我旣能悟此白日黒夜自有㝎数彼厲􅄦何預因記其夢以俟知者詳焉時大徳二年八月五日也卷終
