body:
  text: 七言律詩壽緫管陳公當年劒履上星辰諌草曽􅂪帝子恩天上聲華瞻北斗人間詩價逼西崑儘焙桃李開春苑暫遣風雲擁㦸門誰識節齋清白節西山晴雪照吟樽一作洛下梅花淇上竹兩都無地着春温斗間占氣識龍泉兩􅀊公堂拜壽筵河潤巳歌千里逺化行皆自一身先鈴齋晝掩無私謁坐榻朝懸有敗氊愷悌我知神所相墮山喬嶽未為堅黄陂曠度吞秋壑卿月光輝烱士林萬目剸裁無錯節一生匡弼有丹心行春不識甘棠訟濟旱終為傅􅀃霖萬斛明珠百泉水光風都付壽杯深清明日拉友生李士觀遊長春宫因謁純真王練師且陪姚左轄啇簽院二公髙論時至元八年二月十九日也鳴珂振轂滿重城花底春光沸玉笙放眼壷天如隔丗侍談仙馭勝登瀛松風韻瑟金鐺静竹露光寒鶴夢清且莫臨漪門外去夕陽正在緫眞明緫真閣名送陳按察東還把臂論交今十年朅来蕭寺重留連巳驚秋漢盤􅀌鶚更愛清吟障百川桃李春風寒食月関河行色繞朝鞭此來論列尤清峻愈見行身不偶然追挽省􅀰王仲蔚毳幕風翻雪滿床快書􅀄不减元康酒餘綺席氷生頰事解連環頴脱囊青􅃈飛翔天巳老白雲迴􅀏恨應長杏花春色鄰墻酒前日東城是醉郷寒食日韓氏南㽵讌集重城鞍馬厭紅塵春草池塘發興新自擬嘯歌知道在不分賓主更情親青山似喜談時事白髮空慚滿領巾黙數向來投轄飲不應驚坐獨陳遵贈李濟之修撰乆扈紅雲侍帝輿􅁭靈瀟洒氣冲愉絲綸有在人非偶寂寞求音意更殊已爲斯文鏗木鐸共驚滄海得遺珠何當一片鑾坡月時聽論思爲捋須簡􅀉王推官漢臣今從事彰徳幕府表弟韓從益雲卿自相下來伏審雅候佳勝喜慰之餘謹以此􅀉奉别后一􅀏也燕市分携已半年客來首問喜清妍辦教緑鬢看吟鏡儘稱清波泛幕蓮五袴有歌清議裏一方無事曉燈前西溪未減東湖勝滿意河山照酒船和趙明叔言懷我􅀄識子禹卿筵秋月金盆上碧天翔集栢臺幾二載称停文賦毎終篇􅀌忠自信恒多苦萬事安心恐偶然白髪行年四十五向誰重理伯牙絃餞陳簽省行臺西夏鵬摶九万見扶摇五郡河湟付變調版籍輸誠須竇守􅀌寒収淚拜文饒天開相府官儀肅弓掛崑山節制遥荒服甸綏談􅀏事太平勲業在中朝一作如對軒墀問時事便冝先為漢家條虎落雲閒四海家河山􅀄不外幽遐龍荒要廓朝天道别淚休驚出塞笳葛亮貴和書有在君魚砥節老弥嘉多應青澗城頭月無復驚飈漲暮沙漢家威徳際髦蠻牙蘗其中慮阻艱金節逺開丞相府春光先渡玉門􅀜正煩煙火通青海未用梯航致白環銀字詔還知不逺好來彈壓紫宸班五郡河西右臂連懷柔有䇿得人先文昌除目繄誰在帝座囬章得汝賢才氣似公當重􅀉睽違多感是中年黄金臺上西山碧莫厭離觴碎筑絃勑勒川南磧鹵西荒煙回望隔華夷哥書開府固英特老范籌邊貴靖綏漢月流光清朔部隂風無力動牙旗遥知别后相思夢秋鴈聲中第一詩張夢卿恵竒石一峰名曰秀華蓋故家物也拊玩不巳作詩以冩其真云道人解種僝顔玉分供晴䆫思渺然夢去怳為天姥客􅃳餘猶帶鬱林煙夏雲翠聳形模恠海日紅蒸腹背鮮我自愛觀無巨細一拳嵩華墮吾前考滿日言懐書呈侍講顒軒三載區區簿領間癡牀老坐待循遷封章不到回天筆躬稼終歸􅀒郭田嬴得虚名清議裏儘驚白髮暮愁邊只應一片金鑾月似向衡門照獨偏題李練師崇聖宫圖姚左丞索賦滚滚勞生汨丗縁練師獨得静中傳一篇秋水忘言處满眼青山曝皆眠丹井流光傳大藥玉臺積翠􅀝中天方蓬别有泠風鶴華表歸來又幾年夏日讌集田氏林亭御史諸公留别濕雲壓樹􅇈方塘雨洒層軒滿意凉四海交遊有今夕一樽情話惜離觴夢驚紫禁煙花老醉盡佳人錦瑟香老子興來情未已更催銀管按清啇聞丞相史公受開封之拜并引昔鄧禹列矦特參大事晋公入覲重領名司故韓愈拜章称舊壓三司之貴雲臺圖像獨端居諸將之先伏惟開府相公佐翊勲髙封拜寵數以今視昔前後略同養老乞言典常尤異伏自傳聞之審不勝􅂟幸之心敢綴荒蕪式伸頌禱前監察御史王惲謹頓首啓上台鼎春囬極寵光􅀄聞歡喜倒衣裳百官禮絶汾陽拜炎運天開漢道昌義激忠精傾列辟坐調風雨會中央此心乆􅀉華亭鶴夢繞裴家緑野堂御史秩滿日效樂天詩體書懐人㣲毎愧居清要禄厚常憂􅀒素餐勁翮巳輸鷹隼健秋霜空落簡書寒寸心敢謂行身了丗運弥深以理觀三尺素琴中本静又施絃索向誰彈上太保劉公詩中綂二年閒雲出岫便從龍羽翼髙於四皓功黄石有書開兩漢黒頭無地避三公金輪散影連沙界太一浮光動竹宫缾鉢不妨聊尔耳人間桃李滿春風山人較來鐘鼎與山林得失何勞拊髀吟静對清溪忘俗慮醉逢漁父是知音滿梳華髪長年雪一片閒雲欲雨心臨水幾堆黄落葉􅀍風吹去任浮沉王子行年四十餘幽潜心似糝中魚倦談時事便情話静盡靈􅁭信理書遇酒祗堪知味止愛吟誰暇計才踈今冬䖏置行窩了種竹溪南有草廬和郝子貞見贈之什兼餞舟行二首情話滔滔不易量幾年閒處看人忙時清共樂林居好理到能消客氣狂脱頴我慚成事遂論詩君乃起予啇布㠶無恙秋風裏一棹煙波去􅄅茫山人何苦住山城老雪堆門幾度平雅愛雲林無俗態豈知塵土滿長纓薄田粗足充飢了衰俗無依奈物輕三十年来老知已此回相送㝡関情題韓通甫城南别業翠竹連村映白沙横崗回抱一川斜橘林多實長年樂棣蕚留香盡日華雲錦池邉看鴈序秋風門外任蜂衙自憐獨鶴歸来晚夜夜林丘夢水涯送子􅀄宗兄出鎮閼臺飛翔方喜簉朝班一表陳情動日邊列郡剖符聊復爾中年分手倍凄然两鄉憶望三千里一席情親四十年明日萱堂壽親處杏花紅􅀧緑楊煙登臨武堂吏散公庭百慮衡来登臨武敞髙情唐風過陋留遺儉晉譎移民到健爭千障壷山吟際晚一溝汾水眼中明悠悠自愧沙鷗雪更道忘機意亦驚唐山道中早發時至元九年三月􅀄九日由燕達淇上沆瀣横空夜向分行穿林影認前村夢殘旋逐車聲破犬困時牽馬足奔長􅀏未容耕壠畒一官隨分報君恩獨憐三載霜臺月空使流光滿薊門懷舊詩并序至元九年二月十四日濟南劉漢卿出示亡友王仲蔚詩軸三復之餘嘅焉奭傷因憶徃年在東平時與仲蔚諸人暮春之􅀄㑹飲于􅀫城野務趙媪家凢三次歌酣盡懽同㑹者六人明日仲蔚賦詩有楊柳青旗連坐榻杏花春色過鄰墻之句殊爲上軒所賞明年仲蔚從事濟南幕府予亦西歸淇上自是而不復相見秋七月聞仲蔚病疽死歴下忽覩斯作令人又有短氣者七年之間六客者止存井任與予三人耳因為賦此以抒梗㮣云遺詩一讀已凄然玉樹臨風墮眼前心擬酒寛終致疾夀隨中止欲誰愆蜀州􅀉逺猶如昨伯道無兒更可憐轉首惠連春草夢月明愁滿􅀫城煙辛未􅀊除夕言懷此月廿八日尚書省復併入中書省杯盤草草具餳茶燈燼紅垂夜半華抵掌不憂韓愈􅀑住京空在老坡义素餐御史雖無􅀘􅀞省除書有抵差新故送迎長􅀊例春風明日又誰家大暑大地洪爐一氣蒸樓居䑓䖏失髙層庭柯葉静風来絶河漢隂斜氣未澄炎帝戯張千􅏛火老懐思抱五湖氷嗸嗸疲瘵無多力􅃍爾蒸騰恐未勝挽王脩甫時客死于燕君有燕都懷古詞内有恨滿西山秋色之句至元元年在東平時屢向余道大梁東郡衛南􅅠尊酒論文幾度逢少日才情驚小杜中州人物惜元龍長歌老􅂹壷空缺秋色西山恨更濃五十五年成底事一丘露草泣吟蛩奉陪左丞張公尚書李公王學士徒單待制赴趙禹卿􅀚稼之㑹偶得五十八字奉林下一􅀏也至元七年七月三日常杜城南尺五天草堂尊酒接歐韓晴雲望逺禾方秀髙􅀣凉多露未乾䑓館不煩題緑野林花時許覆金鞍因君喚起㱕田興夢到西溪舊釣壇遊玉泉山山腰一逕轉雲蘿照眼平湖漲碧波形勝左蟠遼海逺風烟還􅁴玉泉多自憐俗駕来逋客急遣清樽發浩歌􅀏拂岩花醉㱕去山林鍾䁀兩蹉跎書懐無簡陳節齋羞􅀅􅈴業鏡中看不為無魚動劒弹兩鬢揔隨霜簡白寸心虚傍日華丹間中持論談何易事際操存衆所難羡煞山東陳按察龍光髙射斗牛寒題趙宣撫樊川山中雜詠蒼崖如削静烟霏中有髙人住翠㣲夜鶴聴琴依蕙帳曉泉和月落山扉一龕静體炎涼理兩眼􅀷明􅀝伏機畢竟名髙難乆卧野猿偷禠芰荷衣㱕潜洞眼冷朱門鶴盖隂自開幽洞事幽尋飄瀟書劍三秦客盤礴風雲萬里心竹澗度凉便夏永藥囱留暖愛冬􅀷何時為濯長纓土丹􅍳茶烟共一林趙樊川􅆘安堂上趙樊川擇勝棲心以樂全神武門前抛組紱終南山下買林泉蘭臯秋逺縈吟思釀瓮春香引醉眼洞口野雲􅃒巳断不須重上武陵船適安堂草堂卜築近清溪擬散􅁭顔似紫㣲幽事相関常起早老懷能遂任時違無心出岫和雲卧有客過門盡醉㱕聞道黄家花滿􅀣幾回扶杖到斜暉趙公泉故侯植杖得新泉寛鑿方池漲碧瀾恐泛落花㱕别澗要傳清響入幽弹竹根漱泠縈林曲蔬圃澆餘到藥欄巳與山中留故事一泓難着老螭蟠未央硯為趙明叔賦萬瓦垂雲映碧虛未央􅀟闕想雄圖天荒地老千年後玉潤金堅片月􅀌微物偶因題誌重鈆華留借筆鋒濡一樽難洗興亡恨要發幽光賦兩都至元七年庚午奉陪憲臺諸公闕下賀正口號盤盤帳殿敞彤庭天仗宵嚴擁萬靈玉笱東班分列辟龍墀首拜認前星煙蟠鰲柱霑吟䄂樂泛仙音近御幈􅀊􅀊大酺恩例溥自慙虚薄仰皇扄贈相者陳士廉我游都邑已三年無略匡時待罪愆有問試從陳子决取徴還似客師賢客師􅀽天綱子紜紛半是墦間客髙下能公吏部銓兩眼羡渠明似鏡月評從此索心先為遼人劉信甫慶八秩之壽素髮酡顔八秩春豹韜還是揔戎孫兩都喬木秋光老滿座春風􅀏語温􅂰下盡歡衣有彩人間無似夀爲尊湏知善積餘嘉慶三丗何妨是將門同馬才卿暇日登昊天寺寳嚴塔有懷髙標直上跨蒼穹物外方知􅁚教雄九陌市聲開曉色兩都喬木動秋風遥怜漢馬屯湘渚安得長書附去鴻寂歷村墟野煙外誰家簾幙夕陽紅􅀉贈徳長老先府君無恙時甞話河内徳上人者系出貴族享年最髙行業極精嚴予以懷衞相望毎思以枝覩爲快迄未能也近弟誠甫至自野王云徳僧臘巳丑今年百有一􅀊起居飲啖健􅀂五六十人或問何術臻此荅云無有但休閒心無所用耳性嗜杖所依歸狀特有瑰異者平生樂從賢士大夫遊無衲子氣象予聞而喜之豈墨名而儒行者邪以韓文公有文暢澄觀之作因書近體律詩簡􅀉西堂為它年林下一段閒公案也一條柱杖老龍鱗扶掖西堂百歳春方寸巳明諸佛果典刑還是定年人􅀏拈具葉隨僧供未省緇衣化洛塵我識阿師中所得溪光山色乃心身至元己巳八月一日偕馬才卿游聖安寺滿馬京塵厭市喧捨鞍歩入給􅀌園金鐺響泛松風冷寳月光凝瑞像尊法觀交纒􅀟井閈雨花别是一乾坤布金不是包桑計空抱危言吐復吞謂讀明昌間郝侯党竹溪蔡無可等碑院書懷簡胡貟外應奉束縛長纓領簿曹十年從事獨賢勞癡床坐乆疑禪榻老木風嚴㵼怒濤行路縱誇騘馬貴炬蓮何似玉堂髙一彈未就陽城草虚􅀒秋空白錦毛奉送大丞相史公行臺河南時用兵表陽封衛國公以平章政事副忽刺出附馬督視諸軍時至元六年八月也無勞繞帳揷生犀威徳江淮草木知唐室正諮裴出將楚人休􅀝漢爲池聘通上國無非􅀘節駐長洲果爾爲三百年來常例在忍令矛槊舞嬰児􅀉陳按察慶甫秋天寥落使星明光動山東百二城三本有書天下計一樽為地故人情九江虎渡非無術山東吏人聞公至徃徃投劾告去故云漢節輪埋浪有聲老我簿書三万卷幾時燒尾看雷轟䟦王内翰與木菴唱酬詩軸木菴詩筆唐文暢一作老而妍心印多從吏部傳豹管一窺連璧句月牎慵展碧雲篇風流豈落明昌後真率當隨靖節肩留取人間作遺像􅁂絲禪榻話它年追挽歸潜劉先生我自髠髦屢拜公執經親為發顓蒙道從伊洛􅀓心學文擅韓歐振古風四海南山青未了一丘洹水窮泫然不為山陽笛老屋吟看落月空継張相言懐二首山人蹤跡愧搜羅欲􅀒蚪松學隱和散木分甘遺匠石薦章誰擬動常何􅀞义活計青鳬少曉鏡功名白􅄠多好􅀏住亰王御史一官覊滯半年過獸思深䖏鳥虞羅人自人徒貴體和物有盛衰宜辯早氣從舒􅃤奈時何眼前徑路黃間迅鏡裏功名白􅄠多不只一杯澆磈磊茶􅃄禪榻儘經過和韻一作􅀏􅀝虬松學隱和至元辛未冬仲廿四日夜五鼓夢衛南郊行夢中得頷聮两句既覺為􅁕成之春煙樓觀照堤沙夢裏郊行日未斜幾片雲隂無俗態滿川桑柘有人家㣲茫仙境􅀟鳬客依約春風二月華興􅃴正濃還喚覺一聲鷄唱揭簷牙跋梁斗南先生無盡蔵手軸昇平豪冨林泉主白􅄠歸来一幅巾世與士安籌國計誰云開府是辭臣江頭宫殿千門暗物外雲􅃄万古春休向諸郎訪遺事青山依舊是比鄰叔良西歸秦中感而賦此倦客京師半載過飜成西去柰秋何賛房燈影裁清夜渭水春風已白波三虎自疑終致釋五噫從此不湏歌終南山色昭陵樹剰着新詩醉两坡一作樂遊原上昭陵恨不暇新詩醉兩坡􅀉李和甫覔未央瓦研好在終南李練師未央瓦研􅀉何時卧聞客舎三秋雨夢繞􅀞欄􅀟桂枝􅀌月正堪􅃒老眼片言聊復慰相思研磨縱對蛾眉秀中有漁陽萬馬馳至元辛未秋八月廿八日同長老金灯義方暨馮君用聶文超劉敬臣王仲通馬才卿石夀之座主賈君叔良㑹飲于開泰之丈室約各賦詩道盍簮之歡因為賦此陊殿秋煙老檜蒼春風合座捲吟觴争傾底裏心能見不恡歌呼興更長風調揔輸韋曲杜新詩驚絶碧雲湯人生無似新知樂安得車輪一夜方壽徒單待制至元八年九月十四日静盡紛華道義尊立朝今復見經綸論交最厚先君契提誨終􅀷賤子身丗仰仲淹風雅在見耒元亮性情真一杯滿意浮秋菊照映靈椿看玉麟菊嘆細菊宫傳􅀏靨金結根失所㝡􅀜心鶴欺力弱時耒啄草爲藂荒日益侵寳檻移栽容獨秀秋香吟撚伴􅀌斟朝耒頓覺精神好似喜渊明爲賞音送䑓􅁺趙明叔赴濟南迎侍毋氏耒燕寤寐庭闈逺事承南陔詩裏二毛生悠悠望眼門廬月戀戀春暉孝子情千里秋風吹去䭾一天融樂羨歸程三升紅腐殘年恨老淚縱橫滿仲纓一作零落悲風泊篇纓壽房祖至元八年九月三日山立揚休七尺身接人􅁭度玉能温慶流淇水宗支近恩洽諸房徳義尊扶健不煩鳩刻杖承顔幸備彩衣孫一枝留在霜前菊細撚清香入壽樽送李尚書仲實叅知北京行省遼左要荒節制偏選材眞得濟時賢拊循殊俗尤宜簡調餉東兵貴有權軫慮可寛天北􅏱先聲應徹海東邉頋慙知巳謾馳嚮望入秋空鴈影翩夀紹開外郎十月十四日􅁭期出䖏不多偏秀孕輸君六日先以義取交知已最開談通俗見才全巳將國計籌邊筭㑹見嘉謨沃帝淵相對莫嗟頭共白􅀊寒心在老彌堅継啇樞相韻贈禪師李玄暉􅁭期一見􅀂同􅂁束􅅞㣲官􅀏獨勞方寸證明皆佛果大千起㓕揔浮泡馳聲絶㙯君能辦汨丗天刑我欲逃坐拂天花閲家數凛然淸興雪山髙送和之簽山東按察司事四道山東事最繁按巡當猛亦冝寛丘菑併在虗危分根窟􅀷連魏􅀶間風彩儘承綸命重霜威何待栢䑓寒澄清快理征鞍去望絶峗山與歴山餞叅政楊公出鎮覃懷十載嘉謨沃帝聦人間桃李幾春風從今民事優㳺裏轉見君恩顧盻中寵節我知如李晏救時人道似姚崇洛陽三月春如畫剰着新詩醉仰嵩公􅅟堂名送陳按察赴任山東簡花霜落控􅀌應暫覿清揚俗慮澄四道規模開漢制百城風彩望陳登露盤虚警青冥鶴朔吹驚翻白錦鷹廽首相思定何䖏暮雲春樹憲王陵贈羅徴君風骨飄瀟到九還一壷天地市朝閑神遊物表冲融際道在平生出䖏間􅀏着割烹要摯鼎擬􅀅忠直動龍顔濟時好作啇霖去未礙經年别故山孟待制駕之哀辭我識先生二十年當時過衞亦翩翩遺文載稇聞三語一賦垂天􅀏八塼幾日秋風汾水客一丘宿草茂􅁜阡屋梁暁月驚無復西望今人一泫然􅀕子襄先生半生􅀮徳自崧丘得號􅉹東四十秋結駟退慚知道在詩壇吟苦入􅄀搜眼中耆宿有今日地下雷元是舊逰幾卷閑書繐帷底未容拈讀淚先流􅀉贈緫管韓君通甫暨弟君羙兼簡公弼良友都門贈别栁條青分􅃑南来􅀊屢更三載愧陪騘馬列乆違轉見故人情毎怜夜榻聞風雨羡殺韋家好弟兄蚤晚細傾燕市酒誨堂重醉棣花榮哭馬孟州才卿名甫相州人栢䑓欵晤儘三冬暇日来陪御史騘寺閣納凉怜晝永野塘轟飲喜君同性情逺出機張外禍福真成􅀝伏中至元乙亥濬州同知未滿中堂見召既至以事阻是年秋夜除孟州倅南還至邢病死壽四十乆别已增懷抱惡與君終訣恨何窮哀大都督史公名權中統􅀄授江淮大都督陽夏移軍入鄧封指揮旌壘氣増雄優居􅀅幄元多算威攝荆蠻儘父風士樂死懐羊傅爱戰酣無大上均功應憐千載龍驤業一慟臨江萬事空題張府君墳丘子傃字行甫曽任官孫二人龍公祠下府君墳崗􅀔西耒虎豹蹲翠琰盛傳千字誄青衫還有讀書孫喬林氣鬱丘山重一水春􅆂徳澤温白首故矦長健在緊湏着力大于門姑射北僊洞予既爲新道立石且㑹諸君子明日大雪仲明賢良賦詩光賀因次嚴韻以荅佳貺三年判府苦無聲自断行藏付静聽翠琰銀鈎留故事白波青嶂繞螺亭一官自􅀏頭空白多士相看眼倍青毎謝新詩深慰藉不愁歸詫草堂靈王衛州挽章公諱昌齡字􅂋之滄州人堂堂大厦敞雲居偃植圎权與藉扶六縣耕桑深道爱百年魚水應時需望歸王儉凮流幕我識鄼侯吏隱儒河朔諸侯幾叅佐愛君終始擅良圗又􅁭韻冲融器識先晚年風節見承宣經綸素抱調元事綜覈長深作牧篇寒谷暖回衰日愛老天愁絶劒門煙慇懃尚憶臨􅄮誨惆帳城南是别筵􅂘交親州判李叔洄溪一㑹乃死别送我西行淚滿􅁭四海從師有先子半生急難是􅀄心泉扄不閟無児慼壠樹空瞻挂劒林㑹擬並刋遺爱碣􅅠城䑓首御河深古􅅠邑在今州治東北一十五里與君别業相對公甞云本潞之上黨人五代間東徙居衛唐將李抱貞之後既任潞州為脩治其碑墓焉别盧漢臣男兒出䖏要無慚一意公家性􅀁甘吾子有才無不可老夫於世本無堪痛連臂骨縁心苦耳變風聾阻坐談劒佩趨庭君好去建章宫樹緑覃覃挽杜止軒徴君泰岱東蟠未了青文章公獨萃精英賦方庾信才華壯詩到樊川氣格清平日酒杯追散聖一生高節見陳情風流想在齊梁席未譲鄒枚獨擅名留别忽治中英甫四年相待情偏厚千里分携恨􅀂何别駕見淹時共惜當官能䖏我􅀹多軰流自是青雲噐金印行懸瑞錦窠調古自知終寡和青天白眼望君歌秋澗先生大全文集卷第十六
