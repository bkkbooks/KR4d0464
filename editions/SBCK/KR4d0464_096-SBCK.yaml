body:
  text: 奉迎使發䇿使告期使納成使納􅁻使納采使皆以僕射左右丞攝太尉使六帖説白樂天作􅀋書名六帖通典選舉門載唐制開元中行課試之法帖經者所以習經掩其两端中間微開一行裁􅁓爲帖凡帖三字隨時増損可否不一或得四得五得六者為通此六帖之名所從起也六帖云者取中帖之數以名其書期於必中選也鹿庵命擬復立按察司手詔以一身之微惟萬事之綂不遑夙夜常切憂勤顧七道之提刑擴六條而從事近因省革偶值停閑然非違稽緩之愆縱令弗問恐伺便譸張之者為害滋深仍轉側以詳思非􅁥臨而罔益據所在按察司照依巳降條畫依舊設立施行於戯鷹隼當搏擊之任不與護恐爲反傷琴瑟旣更張之餘識大軆乃為稱軄樂天毎作歌詩成須令其家老嫗聽讀能通解其㫖意辭爲之定軆此無他不過通俗近人情而已特表而出之且為艱澁無謂之戒西溪云減江南冗貟詔草諭江淮軍民等夫張官置吏本以為民非擾民也朕自混一江淮于今五年憂恤元元之心不遑夙夜期於撫定安集以承上天全付所覆之意比聞陳奏不圗設立之際官冗人濫重致煩擾念之憫然罔副朕志今者上自行省宣慰司下及緫府州縣官酌量輕重去處一切冗濫凡有擾於民者盡行革去尔其各安恒業永底而生旣清舊染之風共樂惟新之治其有作姧犯科佀前不應者已敕行御史臺紏察中書省究治外咨尔􅀺庶軆予至懷出正大七年毫州節使趙庭王詔别有擢用其子贄時爲省知除揉旣定省公問以召之之意贄曰以嫌疑故特回避旣而公拜禮部尚書贄入賀予嬰年見神川劉先生三蘇交讀不去手因問於先大夫曰古人有言蘇文熟啖羊肉蘇女生啜菜􅃵豈此之謂也宋未下時江南謡云江南􅀂破百鴈來過當時莫喻其意及宋亡蓋知指丞相百顔也夫熒惑之精下散而爲童謡不尓何先事如此宋真宗東封升中圖嶽頂有五色雲山下環衛以甲馬金道陵元㑹圖及郊天儀仗圖郊天圓丘圖曽聞某官􅀃當時掌礼者房千里中外幾用人三万未知方澤制度與此何􅀂唐張􅀃家藏明皇開元􅀄東封圖有說宋范石湖􅄃轡録記興陵見宋使儀衛戍子干入見循東西御廊北行廊幾二百間廊分三節毎節一門將至宫城廊即東轉又百許間其西亦然亦有三出門中馳道甚闊两傍有溝上植栁廊脊皆以青琉璃瓦覆宫闕門户即純用之北即端門十一間曰應天之門下開五門两挾有樓如左右昇龍之制東西西角樓端門内有左右翔龍門日華月華門前殿曰大安殿使人自左掖門入北循大安殿東廊入敷德門東北行直東有殿宇門曰東宫直北面南列三門中曰書英是故夀康殿母后所居西曰㑹通門自會通北入承明門又北則昭慶門東則集禧門尚書省在門外東西則左右嘉㑹門二有樓即大安殿後門之後至幕次黒布拂廬待班有頃入宣明門即常朝後殿門也門内庭中列衞士二百許人貼金􅀟鳯幞頭團花紅錦衫散手立入仁政隔門至仁政殿下團鳯大花氊可半庭殿两傍有朶殿朶殿上两髙樓曰東西上閤門两廊悉有簾幕中有甲士東西御廊循簷各列甲士東立者紅茸甲金纒竿槍黃旗畫青龍西立者碧茸甲金􅆞竿槍白旗􅀞黃龍至殿下皆然惟立於門下者皂􅂁持弓矢殿两階􅄂列儀物幢節之属如道家醮壇威儀之􅀋使人由殿下東行上東階却轉南繇露臺北行入殿閾謂之欄子金主幞頭紅􅂁玉帶坐七寳榻皆有龍水大屏風四壁帟幕皆紅繡龍拱斗皆有繡衣两楹間各有大出香金獅蠻地鋪礼佛毯可一殿两傍玉帯金魚或金帯者十四五人相對列立遥望前後殿屋崛起甚多制度不經工巧無遺力煬王亮始營此都規摹出於孔彦舟投民夫八十万兵夫四十萬作治數年死者不可勝計和宋書皇云眷命大䝉古國皇帝致書于南宋皇帝爰自平金之後蜀漢荆揚挐兵㡬三十年交聘非一卒無成約比者川蜀擣虗荆湖批亢生靈有塗炭之苦戰士有􅁀露之勞朕甚憫焉是以即位之始首議寢兵用示同仁以彰兼愛期於休息元元馬天下共饗有生之樂而巳且南交廣而西巴蜀北長江而東滄海分兵守險彼所恃以爲國者也今戰艦万艘既渡江以扼海鐡􅀐千群復踰廣而出蜀四塞無結草之禦六軍有破竹之威人所共知不必徧舉於此時也非不能掎角長駈水陸並進秋風虎旅指揮着浙江之潮春露䲔柸談􅀏挹呉山之翠蓋以佳兵不祥素所不喜守位以仁今之本心又况靖康南北釁端􅀄無盤錯大故非如女直西夏惡積􅄷􅀷而不可解者也徃者彼巳勝􅀒之事徃來曲直之辝各有攸當置而勿論自今作始咸取一新故先之以信使申之以忱辝告寳位之􅀄登明朕心之已定准親王上宰能報聘之一來則保國樂天必仁智之两得苟盡事大之禮自有歳寒之盟􅀂乃憂大位之難継慮詭道之多方坐令失圗自甘絶弃則請修浚城池増益戈甲以待秣馬利兵㑹當大舉論天時則炎瘴一無畏憚論地險則江海皆所習知必也窮兵極討一决存亡而後巳力之所至天其識之禍自彼挑此無可慊在我者至誠可保在彼者聽所擇焉母循前例止作虚文時薦清和善綏福履不宣白庚申年四月七日開平府行李翰林欽叔一日與杜仲良在茶肆中有司召公甚急公曰無佗多是要撰文字渠留此勿去少當即來已而果至曰爲戒論百官草詔適當茟者􅀿奉程天翼程􅀄入供職有猝不易稱者公遂立草五百餘字􅁢恊事冝甚称上意其辝曰朕新即大位肇親万機國事寔爲未明政統猶懼多闕尚頼尔文武多士内外庶寮上下同心始終戮力以副遺大投艱之託共成興滯補廢之功然而養資考者毎務於因循啫閑逸者或託於疾病因之積弊習以成風事至於斯朕將何賴蓋甞􅀷惟百姓勤勞之意尚能不忘累聖􅉼養之仁服田力穡而以給租庸輓栗飛蒭而不憚征繕况尔等世􅈾髙爵身享厚恩夫有國乃可以有家而爲臣亦猶爲子未有國不安而家可保必湏臣竭力而君以寕加之事属方殷時丁多故舊彊待平恢復強敵期于削平正當經營之秋難行姑息之政朕既夙宵軫念庻幾弘業以昭功尔其朝夕在公豈冝翫歳而愒日夫湯刑以儆具位周典以正百官兹出話言以爲明訓掌刑者有法可奉母使有􅁈抑之情典選者有格可修毋妄求䟽駮之節錢糓當審知取予母吝千出納之間臺諌當指陳是非毋渉于細碎之事司農以敦本察吏不可苟且而曠聀司牧民以扶弱抑強不可聚歛而營􅀻計至于大而分閫小而掌兵固當志殄㓂讎日闢土宇受朝廷之託必思報國念功臣之後常恐辱先又豈可平居或冐于糗糧臨事或生于畏懼視郡縣之官妄分于彼此後部伍之卒不計于公􅀻凡有我官所當共戒其敬遵于􅀖憲務恪慎于官箴享冨貴于當年垂功名于身後且賞罰期于信必而功罪貴乎正明兹誠前代之良規亦我祖宗之巳事今當仰法要在决行於戯任賢使能周室果聞乎興復綜名核實漢家遂至于肅清公勤者賞不敢􅀻弛慢者刑兹無赦各勤尔聀明聽朕言故兹詔示想冝知悉賜國用安鐵劵文皇帝􅀂白咨尔内族英烈戡難保節忠臣儀同三司都元帥兼平章政兖王完顔用安大􅀖維屏古有格言王府藏勳賞存舊典卿台階孕秀海岳儲靈天賦忠貞性資明敏􅀄爲兒戯營壘巳成長學神機風雲暗曉方將提挈義旅勤勞主家服金革以不辝冐矢石而有勇頃遭逢於多壘偶䧟没於他􅀖而能臨事見機去僞從正変疾風雨謀先􅄦神一舉而患難殄殱不時而州縣㫮復聽聞如此歎曯乆之朕方緫攬英雄興建功業躰天地含弘之德厚君臣終始之恩胙尔以諸王之封寵尔以上公之位氏族巳書于玉牒勲業復紀於太常同三司之威儀建大將之旗皷蓋欲宥及于十丗何嫌恩積于一門泰山黃河永及尔裔皇天后土實聞斯言肆申白馬之盟庸示丹晝之約嗚呼謂予不信鍳詩人曒日之辝弗與同心如文公白水之誓尚奉非常之渥以保無疆之休此是左丞李實之子介然所作時爲翰林修撰鹿庵云丗稱米南宫者言禮部也自唐巳來見稱或云指太常也米芾甞爲太常官宋高宋善書學擇諸王命史彌逺教之視可者以繼統孝宗其一也髙宗因出秘府蘭亭使之各書五百本以試其能孝宗不旬日臨七百本以進司馬公注古文孝經首章作仲尼閑居曾子待坐廣揚名篇於故治可移於官後有閨門之内具禮矣乎嚴父嚴兄之辝續夷堅志載廣府某官苦蛇毒取雄黃貯紗囊中掛四壁間既而承塵上日流黒汁視之有巨虵一衆虵十數皆腐潰而死自是府舎清安絶無毒物蟠蟄鹿庵云青詞主意不過謝罪攘災保佑平安而巳宋史王安石傳論安石謂天變不足畏祖宗不足法人言不足恤雖少正夘言偽而辯行僻而堅王莾以六經文姦言不是過也東坡論浩然之氣在身爲氣見於行事爲節合而言之爲道故剛而不餒歐陽公云韓愈不􅀗用於丗脩用於出而不盡青陽夢炎説春秋書春王正月本無􅀷意周雖建子其紀年實用夏正觀􅃎國風爲可見矣只爲左氏書周正月故後人􅀃謂以夏時冠周月又謂公榖雖迂逺義理最明左氏尚文辝却差了義理許魯齋說班固作古今人表分九等恐昔人心術行事不易知也如孔子称四科言語宰我子貢至哀公問社食稲衣錦曰安皆爲失對称管仲之噐小哉而曰如其仁如其仁伊尹謂不以尭舜之道事君治民是賊君民也而佐湯伐桀其前後不同如此又云聞􅀗玉山賊首害陳宣慰祐者斬楊州市予即曰君陳為善之心不冝罹此今􅀂是命也如果得其賊天理為不泯矣魯齋為肯首栁文五就桀賛序云伊尹聖人也不夏商乎心心乎生民而巳曰孰能由吾言由吾言爲尭舜而吾生人堯舜人矣退而思曰湯誠仁其功遲桀誠不仁朝吾從而暮及於天下可也於是就桀至於卒不可乃相湯伐桀俾湯爲尭舜而人爲堯舜之人吾所以見伊尹急生人之大唐會要貞觀十四年陜州刺史房仁􅁉奏臣所管界内正月九日河變清者首尾三百余里京房云河水清天下平宋少卿云所清處天地之氣上下澄徹故清亦如霜降水潦収而清也弘道又説文與可送東坡通判杭州詩云北客􅀂來休問事西湖雖好莫吟詩坡􅀄以爲常及遭事乃知與可爲知㡬相如傳云倒景者謂人在天上下視日月故曰倒景課税所立於合罕皇帝即位之元年諺云平生避車不逺一舎李受益􅀃宋人文廟位次列子思於孟子上徳州城壁壍髙深城門内起直城前障掩蔽内外左右慢道其尾相属俗傳云皆顔魯公制也宋校正礼部韵􅀃卄字本音入今人作二十字用卅字本音鈒字今人亦作三十字用近杭州遺火焼五萬餘家延及御史臺少府監燼焉至秘書監救得免有人作賦一聮云公道不行臺遂焚於御史斯文未喪省僅存於秘書觀顔魯公忠義堂等帖偶悟公書勁面潤蓋筆善轉面韻勝故也何叅政繼先􅀃大名宣極司叅議烏古論貞區處事機甚有决斷時奉朝旨死囚呈省待報其餘邊関雜犯皆從便處决時圍李璮於濟南人心中外不安烏議一切重刑欲皆戮之使由子明巳下皆以違制不從烏與左丞濶子清謀曰璮賊未下魏爲西鄰不便冝從事無以震讋衆庻竟戮之市人称臨事知權變云貞字正卿小字四和馬前朝近侍局大使晦翁明道論性説生之謂性止生之謂也天之付與萬物者謂之命物之禀受於天者謂之性然天命流行必二氣五行交感凝聚然後能生物也性命形而上者也氣則形而下者也形而上者一理混然無有不善形而下者則紛紜雜糅善􅁖有所分矣故人物既生則即此所禀以生之氣而天命之性存焉此程子所以發明告子生之説而以性即氣氣即性者言之也皆水也止各自出此又以水之清濁譬之水之清者性之善也流至海而不汚者氣禀情明自㓜而善聖人陸之而全其天者也流未逺而巳濁者氣禀偏駁之甚自糿而􅁖者也流既逺而方濁濁者長而見異物而迁焉失其赤子之心者也濁有多少氣之昏明纯驗有淺深不可以濁者不爲水􅁖亦不可不謂之性也然則人雖爲氣所昏流於不善而性未甞不在其中故人不可以不加澄治之功惟能學以勝氣則知此性渾然初未嘗壞所謂元初水也東城云昔之爲性論者孟子以爲善而荀子以爲􅁖楊子以爲善􅁖混而韓愈氏又取夫三子之説而折之以孔子之論離性以爲三品曰中人可以上下而上智與下愚不移言孔子之所謂中人可以上下而上智與下愚不移者是論其材也而至於言性則未甞断其善􅁖曰性相近也習相遠也而巳晦翁象刑説周穆王五刑皆贖復舜之舊不察舜之贖初不上及五刑而穆王之法亦必疑而後贖穆王之事以予料之殆必由其廵遊無度財匱民勞至其末年無可爲計乃特爲此一切權宜之術以自豐而又託於輕刑之􅀃以違道以干譽耳鹿庵問惲匡衡爲相何如對曰學術有餘忠蹇不足先生爲然陳希夷甞有詩云我見世人􅋉箇箇忙如火忙者不爲身爲身忙却可觀蜀工孫知㣲人様渡海觀音像足前有謂小百花者蓋作一大青荷葉上布散諸天花故云又觀馬雲卿臨呉道子轉山北斗圖凡七人中有􅀍甲者又觀周宣王宣榭敦考其欵文至至元戊寅二千年矣顔魯公書岀師表後題乹元元年戊戍歳蒲州刺史顔真卿奉勑書予以謂雖顔氏童僕尚不至此恐是世俗好事者爲之盧摯説甞聞諸先輩漢去三代㝡近髙祖有爲之主不能革去秦弊復井田封建之制此㝡何之可責因與論作文當於易中求難難中求易相鑑之作當以蕭何爲首一日左丞姚公謂余不􅀂自臯夔始而下自無首尾爲間余詳思處變之極反經而不失其正者莫伊周爲大故自阿衡爲首宋賔客云河水清河隂精本濁而反清不惟異常亦水氣之極盛也李受益云祖宗次序自曽祖巳上爲五代祖増而上之也鹿庵云今之聲韻始自沈約及説今禮部韻如十灰十三元音殊不恊何以知其自約始以文選前聲韻不謹嚴乃知鎮國寺栢上生芝中宫有旨令院官䆒其祥以進因與李受益具事實如左論衡云芝生於土土氣和故芝草生古瑞命記王者慈仁則芝草生瑞應圖王者敬事耆老不失故舊則芝草生酉陽雜爼云屋柱木生芝黃者爲喜陶􅀮居云今世用芝此是樹木枝上所生状如木檽音枹朴子云木芝者生於栢脂名曰未威喜夜視有光本草經云霍山生赤芝名曰丹芝常山生黒芝曰天芝㤗山生青芝曰龍芝華山生白芝曰玉芝嵩山生黃芝曰金芝唐公逺靈芝經曰芝木之精也芝四季皆生名曰春精夏精秋精冬精又曰青芝一枝􅀿木酒也宋敏求春明宫退朝録唐禮部􅀰中知省中詞翰爲南宫舎人百日後必知制誥又載􅀄學記唐玄宗爲諸王從學時命徐堅定撰雖名􅀄學終身觀之可也雪庵李禪師與余觀栁懸誠書何進滔碑李云桞書法度最備予曰然然懸誠書令人易厭不􅀂魯公筆法愈觀而意無窮也桞窘於法度取媚於一時中枯而無物顔意無窮蓋以忠義之氣中􅃣之故也雪庵爲肯首劉太保常云中興頌雄偉如駈之一字􅀂千金駿馬􅀝丘山而立歐率更三帖一姚將軍墓誌二化度寺碑三追贈隋禪國公詔時貞觀五年也化度碑李百藥文率更規模一岀黄庭至竒古處乃􅀠書一變尔李禪師説作字有得筆意時有得布置時趙大中庸説甞見遺山與張緯文相謔見碑文過俞曰遺山又貨了一平天冠也鹿庵説堇奉御近贈一歙硯殊發墨且増其色馬雲漢説太庚麥無􅉭圎太謂之和尚麥後宋宰相韓侂胄甞改諸州後園蓮沼爲放生池詞臣髙文虎作記有云鳥獸魚鱉咸􅀂湯王所以基商後髙作主司出硬題困舉子一科生以髙用事惧作一小詞嘲云髙文虎誇伶俐萬苦千辛作箇放生池記從頭無一字説及朝廷只把托胄歸羙夏王道我不是商王鳥獸魚鱉是你劉元城與司馬先生論玄宗􅀄年焚珠玉於前殿時有云焚之前殿蓋欲人知此好名之心也一日侈心復囬其弊有甚於此者晚年果如其言司馬公云惜乎史失其人姓名至今爲恨又云人君去賢任侫譬如治病飲良薬可愈非良薬即死明知之只飲􅁖薬既飲􅁖薬非至死不巳蓋玄宗暮年用相知林甫蕭松之佞用之甚乆知張九龄韓休之賢退之甚速張萱畫則天朝六蕃圖其布置取則天遊上苑詩意明朝遊上苑火速報春知花湏連夜發不待晚風吹及太宗朝蕃玉横軸文皇乗一花輿四近侍肩舁云閻立本筆有詔集百官問鈔輕物重事大學士王鹿庵對云物貴則不足物賤則有餘要以節用而不妄費庶物貨可平宋少卿弘道說葬書分五姓九星又有棊旋正式風水􅁟丈二尺下爲􅁟龍界又丈二尺下爲水龍界過此則吉乂說唐太真改葬祖墓上有紫藤一株隂影甚茂既伐去藤流赤津如血不數年劉氏滅之殆盡因以徃嵗改葬先妣夫人靳氏􅀄啓玄堂其棺蓋上露珠交布成文如所結瓔珞然甚可觀也復有二黃蝶飛出其露華移時方晞宋公云在葬書此子孫潤澤文華之兆别有記以書其詳慶壽長老滿公曽住㤗安天保寨聞土人說党竹溪未第時家甚窘至令其子爲人牧猪燕城西南門曰端禮有大定末劉無黨所撰左丞唐括安禮碑有云尹大興時迎午休吏燕雀語堂下人不知有官府之詞康節與客遊嵩山中涂客指所憇樹問曰此何日枯悴先生乆不對客疑焉曰非不荅吾有所俟也俄一葉墜先生曰比吾二人還亡矣旣回樹巳爲人伐去占法蓋取葉墮時刻而定其存亡者焉鹿庵與顒軒論事顒軒曰天下事亦有不可以理槩知者鹿庵大爲不然徒單公曰謂如大城南栁樹􅀂不親覩如何知東西幾行大小㡬株鹿庵爲默然一座大􅀏晦庵云張良曹參二人皆學黃老子房體用兼備曹得其體而不得其用文云漢自武帝朝宰相但行文書而已秋澗先生大全文集卷九十六
