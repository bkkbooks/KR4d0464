front:
  text: 七言律詩
  hash: sha256:f1626de7184826ca88ba553cf40e697b53059b68387ba6a017e11edff5943f7a
body:
  text: 哭劉房山紫髯山立蔚揚休書學推君到晉流文冢氣嚴驚卧虎墨池星黯失蟠虬眼中人物嗟何及身後珠璣散不收我擬九歌投濁浪重傷我道轉悠悠中秋月夏苦蒸雲嵗晏霜月華還覺此宵良天容澄徹銀池没桂影飛來海氣涼老魄不應秋更苦賞心多為事相妨一杯儘吸清光了洗我平生芥蒂腸送王嘉父新知雖樂道彌親尊酒燈前便故人時宦儘從閒處著浩歌還愛醉時真紅蓮幕府名兼𨼆春草池塘句有神恨煞百門山下水錦波流不到東秦一見襟期倍所聞霧嵓𤣥豹隱奇文清樽皓月應無幾赤日黄塵遽爾分濁酒可因微恙止天葩寧為舞裙芬百年湖海論文地興在江東日暮雲和靖教授送行詩韻出處初心度義行蒼天誰識此精誠十年載質孤懷苦一宦縻人敝屣輕時事失聲驚破釡幕蓮晴闕媿參卿夢歸夜夜栖岩桂猿鶴無勞久怨驚秋日言懷雨後秋堂早暮涼竹風飄蕩藥塵香身閒正坐詩成癖親老何堪病在牀書卷日隨秋草亂壯心愁入野雲蒼摩挲老鏡蓬窻底也效樊川洗鬢霜清明日錦堤行樂浪説蘭亭禊事修年年春好錦堤游花翻舞袖驚歌板栁隔髙城暗酒樓緑樹恐因春事老金鞭重為使君留竹西路晚歸時醉何處珠簾半上鈎八月十九日雨晚晴積雨收霖景氣清物華雖老覺容平閒雲知倦争歸壑飛鳥趨林不計程山偃翠鰲驚突兀天浮圓蓋失枝撐化權舒慘吾何預要擬樊川賦晚晴上史節使晉明夀尚父忠勤歴五朝承家又見鳳遺毛神鋒洒落青㝠闊秋隼鶱騰華岳髙治化載清遵定法德容充擴浹吾曹年年畫㦸清香地常對秋香醉露桃南城納涼晚歸書院歸休日巳曛南城風細晚相親坐來近市喧初息歸到衡門夜向分矮榻趁凉欣稚子疎燈留影伴㕑人一盃粥了從髙卧須向閒身等策身七夕立秋庭竹風生好雨過碧梧飛下鳯凰柯人間一夕驚秋早天上雙星恨别多鈿合蛛絲遺暗網綺樓雲影淡明河栁州羨煞天孫巧其奈㣲生賦分何涼夜祝融怙權不肯退一夕好風吹暑囘雨氣淡從雲尾散秋聲涼自樹頭來渴腸夢濯西江水逸氣欣逢北海杯慿語蘭臺宋公子莫因雲物詠悲哉八月十一日夜坐輾轉秋懷鬰不平憮然方寸若為驚學疎久昧天人理親老尤深喜懼情坐對燈花供笑語近聞庭樹散秋聲大家但使康强了未害窮愁老此生雪晴望滑滑春泥雪意融出門藜杖任西東光風漸好茆簷喜烟火全疎傳舎空三穴既能容狡兔五噫誰復羨㝠鴻更為著眼登臺處頗覺江山王氣雄題何練師巨川虚白菴西風吹下鏡湖船來作空山避世仙採藥逺辭滄海上結茆歸老白雲邊鑑光應物元無物素質能𤣥本不𤣥莫遣碧桃溪畔水暗香浮出洞中天鵬雲蹤跡亦垂天收斂多歸一室間塵境夢空神已止松巢枝穩烏知還潭心映月清無滓谷口行雲意自閒想得翠蘿幽隱處天風和水泄空山太康展江亭籌筆規模盖世功新亭髙構繼遺風乗秋閲武邊聲靜臨水投醪士氣濃騏驥纔聞空塞北樓船行復下江東慇懃淮水東邊月幾照元戎坐折衝送紫陽歸栁塘掛冠神武急趨裝歸隱秦中舊草堂海内共知元氣在井邊已仰德星光眼明華嶽蓮峰翠路入函闗草樹黄預為山林報歸日緑楊陰合鄠南莊送蕭四祖北上丹鳳銜書下紫庭秋宵光動少㣲星蒲輪再起秦遺逸天意將新漢典刑長策正勞黄屋夢故山從使白雲扃中原有幸經綸了天外髙鴻本自㝠上庫庫學士六轡連翩走使車繡衣風采漢相如紛紛漕計歸鞭䇿戀戀丹心在帝居折節不知軒冕貴濟時行奏便宜書從今慰却蒼生望一㸃文星照玊除壬子夏六月陪蕭徴君飲方丈南榮同㑹者烏達使正卿董端卿經歴學士徒單雲甫張提㸃幾道王秀才子初洎家府小子惲隅侍席末云修竹翛翛風滿廊夜深樽俎得追涼浩歌聲繞銀河水畫燭光凝燕寢香雪蟻十分浮大白徳星一夕聚髙堂停杯更待東山月要吸清光洗肺腸送王子初東行岱岳西南碧海東青齊中據震維雄驚猿别鶴休増怨詭觀奇蹤得盡窮劍暈寒輝騰寶氣馬摇金蹀健秋風欲知别後相思夢多在西山紫桂叢杜君美耕隱堂厭喧耻向市朝居歸隱南城舊草廬黄葉落時農事隙青燈明處夜牕虚寫懷草就凌雲賦貯腹㸔殘種樹書翠竹白沙村路晚月明幾駐故人車春懷和珠虎坦夫韻茒屋春深懶閉藏出門藜杖獨相將春光暖透芝蘭谷風色妬殘桃李場論政舉知南國弊賦詩休詠北風涼浮雲軒冕非吾事擬訪無功覓醉鄉雨中與諸公會飲市樓每恨人生會合難興來一醉盡君歡雨沾翠佩簾花細酒凸金杯飲興寛胡舞旋低翻翠袖串珠喉穩怯春寒朝來酒醒篷牕下依舊春風苜蓿盤秋漲後晚訪王柔克書舎種栁堤邊起暮吟黄金不鑄百年心垣墉傾圯水初退門巷蕭條秋向深但遣歌詩酧野逸儘隨鄉社共浮沈鄰墻酒美中秋近明月柴門約重臨報子初以書見慰擁鼻吟成嘆索居眼明驚見故人書邊城秋靜沈寒柝畫㦸門深曳翠裾契闊祇應分一水笑談曽不廢三餘荅君不忍虚來意呵筆裁詩雪滿廬春望黯淡春雲雨意㣲小樓孤影立斜暉書能引睡聊遮眼酒可驅愁任典衣桃蕾有情含笑發雁行無力拂雲歸倚欄不盡登臨意獨對東風咏采薇冬夜坐虚堂人靜鼠窺燈霜葉蕭蕭散雨聲睡眼看書渾勉强夜窻得月喜虚明漫漫長夜何時旦悄悄孤懷百慮横到底麄冠男子事幾回投筆壯班生砧帋鵝溪蠺繭太豪華新紙蒙茸隱細紗不惜秋砧聲夜杵要翻新法自吾家搗匀楮脈光舒練拂散龍煤字㸃鴉我録詩書何所事擬尋源委泛靈槎夜歸月波環暈晚風凄賔館歸時獨杖藜曲巷門深驚剥啄小樓燈影自髙低歸期有限先回鴈世事無心類木雞淡蕩春風二十八忍將書劒坐羇樓夀周都運劍佩龍樓顧遇頻漕臺今復試經綸平生許國丹心壯此日承家玊樹新德量潤涵淇水逺夀杯光動紫川春朝天好在明年日金印重看拜伯仁秋雨有懷吕丈子謙賔館光陰一嵗中飄蕭吟鬢感秋風久諳世事無多味靜覺書編有細功四壁夜蟲秋思苦一窻寒雨客牀空對眠不見蘇州守縱有新詩愧未工夀王參謀二首郁都卿雲靄士林不應止作一方霖無媒致位寧私已有子傳家足慰心巾卷在庭公事簡夀毫浮綵蟻罇深非詩莫頌千春德喜對梅花入細吟典郡風流漢表儀一方春物自熙熙謝公雅量推平昔楊震髙風到四知畫㦸清香凝燕寢東山春酒照芝眉政成不獨褒金爵賢守恩波在鳯池贈元仲一書記名寓緇衣行碩儒蒲輪却走事巖居萬縁擺去聊乗化一念深來為讀書黄閣經綸宜自重青山談笑未全疎相望未入廬山社日暮碧雲思有餘和仲一詩韻世事紛挐八九違未容丘壑淡忘機須知霖雨思賢佐終擬卿雲捧日飛麟閣勲名驚壯節虎溪公案覺前非會看杖策軍門去滿眼行山空夕暉娛志詩書不厭貧蟄龍冬卧不求伸應憐擁篲侯門下何似行歌澗水濵沙鳥㤀機還自樂池蛙睅目欲誰嗔悠悠物理吾難料會得摳衣問上人送百德正臣之汴梁君璋序裏仰髙懷賔館相逢一笑開過眼總非如意事著詩時遣不羈杯人驚駿骨空燕市夢逐秋風上吹臺去去當途足知已未應空使劒鋒摧贈王修甫樊川風調錦囊詩邂逅青樓豁所思得酒愛澆吟舌健放談時露劒鋒差香翻月户情難極風入庭梧鬢巳知過眼紛華終寂寞望君冠盖鳳凰池挽趙父師提舉走馬南來及撫棺磨礱空使憶當年師資有道無虚飾賦業推公得正傳黄鳥此時空止棘青藜何處伴談𤣥緬懷夀德宜無憾可忍羇䰟似粤阡送盧叔賢之鄧州萬里風雲入壯懷斗南人已識奇材重看緑水開蓮幕宛勝黄金築隗臺鈴閣風清談塵靜星旄煙暖漢旗開後期竚聽平安報定逐梅花驛騎來夀王子初彩鳳髙翔欲覽輝十年書史董生帷持心不為紛華奪尚友常先逺大期内富經綸隆事業外涵風雅養詩脾赤霄𤣥圃春風信百嵗相期拾紫芝自適旋收柏實炷爐薰紙帳低垂自有春竹几隱眠無俗夢蒲團容膝勝華裀窻間白日驚濤迅門外黄塵萬事新幸與聖賢相晤語未辭藜藿此生貧登熙春閣封丘門外故宫傍天閣空餘内苑荒瀛海夢空三島没帝城烟慘五雲蒼石䲔照水鱗猶動金鳳凌雲勢欲翔竒貨梁園當日盡為誰留住閲興亡哀故宫掖庭依約粉垣丹行入荒宫重黯然華表忽驚人世換昆明重見刼灰寒石龍委地埋秋草湖玊臨池倚暮烟滿目悲風吹酒醒東華門外淚闌干送趙相君北上漢斾當年入汴州布衣曽此識君侯夏盟自列葵丘㑹驥馬空騰瀚海秋萬里風雲横寶玦九天名姓動金甌南遊正值朝天去望斷春風五鳳樓登凌雲閣布衣塵滿戴儒冠風袂來登上將壇棟藻雲飛朱栱溼簷牙霜重玊梯寒風煙逺勝籌邊逈氣勢雄吞汴水乾經畧江淮有成筭不須重展地圗看送王子初之鄧州東風霽雨泛晴光桃李争妍出短牆春意似留行客住陌城多釀燕泥香三盃别酒清眀後滿眼春愁錦瑟傍一曲劒歌心事逺緑波南浦未應傷送郝伯常歸堡塞書劒南辭杞國天一歡傾倒酒罏邉鳳麟瑞質驚千古江海詞源浩百川吾道莫傷今日否新文将付後來傳驪駒歌㫁青山暮愧未嘗遊從馬遷贈李幹臣少年心事便拏雲不著清談解世紛自得士元參别駕强推伯比具張軍一江夜雨供吟筆萬里征鞍逐雁羣蚤晚春風笳鼓地更㸔詩壘策竒勲登資聖閣傑閣當年瑞靄氤亂餘金碧半塵昏豈知象教移中土猶掲雄名護國門法界冷沈梁苑月寳香難返汝陽魂傷心五嶺騰烟語舉世從風莫與論䟦西蒲老人燕處圗甫脱孤城百戰危蒼茫何處跨鯨歸百年有感悲風樹一旦無依足孝思遺像儼然留故事寸心聊擬答春暉逺游剰袖如瓜棗海岳相逢會有期上史相君夀麟閣勲髙誓不磨㦸門春静雀堪羅盟髙踐土尊王切恩義河南受賜多好學世推同杜預薦賢人道過常何稱觴何限輿人頌細逐春風入凱歌過楚卿子冠軍宋義墓乙卯春三月予東如大名道出内黄鎮有廟在民居之南曰項王廟廟之址即卿子冠軍宋義墓也且以往昔墟墓間恍惚事來告予甚鄙焉獨於義之死有所感焉噫義竒士也初武信君舉兵渡淮而西城攻野戰勢若破竹義之力居多及師入定陶再戰而再勝也見梁志滿氣驕識其奪魄後值奔潰果不踰素義可謂深知兵矣至羽請師救趙執以不可觀其籌畫號令攻取先後之方誠上將之畧惜不使差肩三傑北面以事髙祖反區區委贄天久厭之楚與羽並驅争先西向以舉虎狼之秦何其不幸者哉雖然方秦之失鹿也羣雄蝟起以蛇為龍者不可勝計布衣皇皇之士能眀目識帝王之真而歸之者盖有之矣誠未易一二數也至若淮隂韓信陽武陳平一旦起而盡為楚用初且不知天命集漢而後卒歸於漢功業如此幸也嗚呼使天假義年晚脱身項氏杖䇿以歸真主其功名當代縱不能厠三傑之列未至與噲等伍耳嗚呼義何不幸也哉義何不遇也哉因作詩以弔幷著予之感云老項捐軍勢已孤擣秦遺趙見雄圗竒才惜不遭龍準赤手争教捋虎鬚日月不為荆楚計干戈空為漢家敺因君重起無依歎羨煞中林得止烏元齋生平襟度玊無瑕天馬精神出渥洼北海罇罍無暇日徳公賔主到通家山髙仰止人皆慕齋用元名意匪誇教子以經平日事不應遺實取其華過朝歌山勢西來擁廢宫荒煙回首接南鄘緬懐藝祖初經野忍見狂童到覆宗野水作聲知客恨幽花含露為誰容千年快意商郊戰流謗争教有闕兇銅臺懐古都邑盤盤據四衝登臨形勢覺天雄歌樓聲響春風細綺陌香銷寳氣空笑㸔孱王承宋弊至今奸孽擅唐終憑髙誰識神州恨付與衡漳日夜東佑德觀早起留别道人陳彦逹碧桃花露溼衣涼宿酒醒時夜未央浩浩市聲喧曉枕摇摇星影入虚堂春風醉袖愁分手秋雨吟燈約對床後夜月明東北路吕安歸夢半嵇康望東北方書半空嵇康字兩行寄蕭茂先飄蕭襟韻恥咿嚘醉裏青衫兩鬢秋通介不隨流俗變清貧當向古人求城居貴似玊川子鄉思空懐馬少游早晚臨漪亭畔月一尊重為紫髯留晚菊竹瘦松枯怨嵗寒為誰含露發幽妍早花儘秀開何益晚節能昌固自賢採擷落英悲楚客破除秋色静斜川不辭潦倒東籬下桃李成蹊世舉然聞詔灤水嵩呼萬嵗觴綸章飛下紫泥香九天空有風雲夢萬國争依日月光草木變衰元氣活乾坤開霽老隂藏兩都耆舊欣相告四十年來未省嘗陽榖道中有懐黄石公事寄呈敬齋姚公雪齋請益初心在東郡趨庭宿願償黄石有書開帝業布衣無地著恩光自慚國士思圗報敢暴孤懐不自强巾卷在庭循誘際佩懐言行愈難忘趙御史挽章振藻儒林起趙宗殿前一賦已摩空筆參造化陽氷篆氣屏權豪御史驄飬老正期來祝哽招魂何意入新宫影堂一拜情蕭慘瑞露香殘翠竹風上王翰林白衣如鵠禁闈春九萬曽摶北海鯤獨翼龍顔潜代邸親承雲錦織天孫兩朝耆德尊元老千古雄文説赦恩寂寞黄金臺下客詠歸心久在龍門夢受庭訓其中頷頸二聫盖先君之意云落月驚風夜色蒼羇魂明墮几筵傍音容恍對如生在教戒無多止義方芰歜似傷時祭闕松楸應念墓田荒牽衣未畢城烏起晚枕縱横泪㡬行贈孟文伯秋月堂深劒履寒相逢一語破春顔心君意豁驚嚢頴豹體文竒見霧斑孤節共髙殷侑壯片言誰㧞子卿還笑抛燭影金釵夢長繞天墀十二間夀姚宣撫咸池朝日覩離眀羽翼功髙見老成相體共推安石雅襟期全得伯夷清黄金眼冷燕臺望赤羽心馳魏闕情鄭重一杯千嵗酒調元消息在新正周仲寅處覓貂帽炙手權門已强顔蒯緱未免向人彈晨鐘聲裏霜侵鬢蘭省臺邉雪滿鞍貂帢擬從公子覓客牀應念廣文寒何當花影烏衫側一笑春風拍畫闌邢夫人拜慶詩軸對君如讀開元報厯厯聲眀見典刑欵曲毎憐名父子顧瞻疑是老人星一言楚獄隂功厚百世名談汗簡青濵海歸來非我志春江乗興㸔浮萍鎮州懐古趙武雄圗不可尋風煙東接九門深炎涼到此分南北戰伐無情自古今彈躡流風猶戰國椎埋遺俗帯燕音劒歌不遇平原客落日滹沱動旅吟祗謁昭烈皇帝廟一劒功成百戰塲三年章武事堪傷力扶漢祚圗燃燼規取劉璋出侮亡若論託孤徒啟簒試評含泣到分香秋風一掬宗臣血五丈原頭落日蒼燕城書事二首都㑹盤盤控北垂當年宫闕五雲飛崢嶸寳氣沉箕尾慘淡隂風貯朔威審勢有人觀督亢封章無地論王畿荒寒照破龍山月依舊中原半落暉朔風千里捲孤蓬斗酒難澆磈磊胸清濁滄浪知自取蒙茸狐服竟誰從燕臺坐老黄金客甲第争髙白玊鍾撥土便成千尺榦露恩初不負嵓松望西陵漳川北岸望西陵馳道東連講武城将畧有餘開戰伐墓碑無謂自題評一棺何在彌天力九錫徒誇盜漢名千古遺墟冷烟底定軍山樹拂雲平牧野道中野人川洛振裳衣况接恩波沐鳳池莫訝出門何刺刺須知去國自遲遲河橋飲餞無千騎文物聲明又一時有淚不揮離别際西風空送雁行悲奉送平章趙公赴闕庭之召少答省檄見招之意云龍斾南還沸捷音漢臺凝望㡬登臨洗兵未用挽天漢入夢應知有傅霖暖日晴消青海雪春風重掃黑山隂君王若問來歸策為説虞皇待象心贈鄉先生韓義和草服黄冠玊練顔一壺天地市朝間飄飄野鶴雖無繋戀戀鄉情尚未慳幽睡不妨紅日晚青山誰似白雲閒何當一劒飛空去好為留題過故闗送常道人子明道士何心作羽流擇音應避物為仇泠風身世三千界碧落仙居十二樓無地可留雲表舄有懐終結竹林逰因君喚起西遊興滿眼太行黄落秋送劉同知還鎮陽繼士觀韻㡬人襟韻似君侯潘岳閒居賦逺遊白雪髙歌南郢重夀山長路太行秋隠居正有千林玊濯足何須萬里流一曲驪駒頓丘北碧雲零落使人愁為王朝顯贈梁邦傑兼簡郝勸農漳南客子王朝顯日暮塗窮仗友生今夜逺披回沁水傍冬索米入共城千金諾重河東守一府蓮香白璧卿詩槀不須詢㡬束溪聲山色總闗情和幹臣今晨所見庚金乗火勢相髙一夜秋風散鬰陶氣錯不調伊摯鼎雨涷空續楚臣騷人占樂嵗無遺慮我覺天刑未可逃除治菊荒還寓目青山城郭九回遭大風六合塵沙一混同羣龍無力障驚風旱乾到此誰歸咎天道從中見蔽蒙詩枕夢驚茅屋破山林春老緑隂空雄文便擬昌黎訟九虎當閽未易通雨後草堂即事駭浪崩騰㸃額餘歸來縮首伴沈魚門從席後軒車少鬢自蒼來酒殘疎坐掩殘書懐苦節自鋤眀月種秋蔬鄰人共指揚雄宅只有兒童來喚烏挽李子文一丘宿草縣城東前日花時杖履同白璧不埋連邑價青燈空負十年功鵩來近舍傷君去麟出非時見道窮修短偶然吾適值不須作賦問天公初從拱把見凌雲天意栽培似厚君大厦如傾梁棟在神交遽爾死生分白駒空谷歸何處夜雨他年不忍聞吾道已窮來者替兩行清淚為斯文絳帳絃歌日沸闐去煩從簡屢為言自春卧病無三月一死埋魂入九原桂實未霜驚早落鳥聲解語惜空喧東門最是傷心地老父哀號血洒轅五年六月初八日夜夢遺山先生指授文格覺而賦之以紀其異分眀昨夜夢遺山指授文衡履約間道必細論能出理文徒剽竊亦何顔江流不廢驚千古霧管時窺得一斑落月滿梁清境覺紫桐花露溼銀冠夏日南堂即事一雨清涼恰四朝霧絲縈户見蠨蛸病因戒酒成真止辭免書門絶妄交道拙尚憂兒墜簡家貧且喜稼盈郊閒庭緑蘚泥融遍燕子飛來補舊巢同幹臣讀漳濵唱和詩軸草堂舊雨記相尋細嚼漳濵唱和吟白雪調髙雖寡和朱絃聲邈有遺音犀寒蒼渚竒逾出氣奪元胎理更深一洗向來筝笛耳坐聽三峽瀉瑶琴髙山仰止為千尋更對佳人與細吟藝絶六鈞俱破的調髙千古得知音静藏脱兔無窮變法比滄溟不自深客去洒然心境寂滿軒秋氣入絲琴謝人恵瓦甒老雨崩崕為爾開野人攜贈入芸齋埏陶有意成三代奠獻曽經備兩階上擁圎吭蹲野鶴中横皤腹怒池蛙鈎深免汝居危地時揷秋香慰老懐六月初七日夜雷雨大作落日山雲擁盖幢二更雷起雨翻江六丁怒瀉銀河水千杖齊敲羯鼓腔耕壠揠苗秋有望炎官收傘夜深降一犂聞説西江上蚤晚龍移似老龎和幹臣韻雲漏疎星不滿天坐來風雨黯西山百憂鯨鬛翻滄海一喜涼飇入白閒蜚不成災休紀異暑雖初伏暫知還雨傷旱損俱咨怨讀罷君詩一破顔雨後出門言懐壮年抵死别蕕薰老去收藏省一身禄不妄干時有待道從深探理彌真充腸有薺固云苦舉目無塵可汚人洗我胸襟閒塊磊門前秋水碧粼粼萬書叢裏自陶薰浩浩堪輿寄一身樹静蟄坯存夜氣鳥飛魚泳見天真學從踐履安天命世要經綸有若人林下幼安應未老且教雙足濯粼粼和幹臣雨晴出郭之什飲散公庭樂亦陶西河乘興喜同遨河神偃蹇誇秋水山翠空濛上鬢毛乍脱城居驚眼放縱教詩思與秋髙鴻飛燕集隨時處誰羨傭耕隴上豪秋澗集卷十四欽定四庫全書秋間集卷十五元王惲撰七言律詩
