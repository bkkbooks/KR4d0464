body:
  text: 遷固紀傳不同說余讀宋儒論項羽紀傳不同說以謂遷之意秦有天下五載而後楚楚五載而後漢方秦已亡漢未立天下莫有攸屬不可一日無君况封建王侯政由羽出舎羽孰主哉作紀所以繋天下五載之權也立之傳班固意不過羽不可以抗漢因斷之曰皆非也正以一史之體不得不然爾在遷不得不紀在固不得不傳設使固取遷而紀是天有二日民有二王也其書將載之漢代之首乎次於高紀之下乎其為稱號曰楚史乎曰漢史乎若以封建曰項氏出五年而後漢天下不可無君乃屬之羽曽不察首入函谷者高祖之義師也授降軹道者秦民之真主也天命人心之屬漢明已兆於秦十月五星聚東井之時也胡不考虞芮之質厥成西伯受命之基也當陽之不馳去昭烈得統之年也若籍者正炎漢之一驅除耳矧才封已叛旋取復失安得為一日繼統之主哉若又曰固之意羽不可以抗漢故傳而遷漢太史也獨可紀羽而肩漢乎余故曰子長之所以紀筆削歴代之史也其意葢以歴年相承不可中闕猶存夫以月擊時之法也孟堅之所以傳先漢一代之史也余故曰二體有不得不然者矣若宋儒之論恐求之太過耳讀史余讀留侯傳云沛公入關見秦宫室之盛帷帳狗馬之富重寳婦女之美欲留居之樊噲進諌子房固知其不聽此正教之使先耳葢良以沛公有為而多慾者也至此天理昧而人欲肆矣非驟能一言回也若已諌不入則莫之繼也故先之以樊卿使抑遏横流少殺其方張之勢繼以苦口逆耳之言警懼啟沃使黙識其神器所在何眷眷於此耳高帝能無從乎此乃晉隨㑹諌靈公三進及霤然後以趙宣子繼之之義也不然噲沛之屠狗者也安知大漢之為漢張本於此亟當力諌以成高帝之業哉對張中丞說或者以張廵守睢陽之事為非曰古之人行一不義殺一不辜雖得天下不為况食邑人以為守乎余以謂不然昔李翰表公握節死事與夫造唐之功嬰城之志亦云詳矣然尚有所未厭者翰特以功利為言未極夫臣子當然之理行而宜之之義也昔伊川有以武侯所喪𢎞多亦以不義不辜為疑者先生曰若殺不辜以利一已則不可奉天之命討天下之賊殺戮雖多理固無害且陳恒弑君孔子請討夫子豈得討恒時保不殺一人耶葢誅弑逆之賊有不得顧焉者余有曰此中丞之素心也公以一郡守之力横制百萬日滋之寇公豈不審夫強弱存亡之勢哉正以與城存亡效死不去當然之理也若無廵則無睢陽無睢陽則無江淮無江淮則唐之為唐未可知也由是而觀公之心利一已耶為天下耶夫武侯控全蜀之力燃未灰之燼陳恒以穿窬之盜竊一隅之齊耳彼禄賊者豨突之頃九縣飇馳三精霧塞萬姓以之塗炭大駕為之蒙塵其棄城圗存望風奔赴者又何啻廿四郡哉俾唐祚中㣲禍亂接踵卒至於亡安史階之而已是乃周公所必膺武侯不兩立者也論者不處公以大誼祗擿以捄不至而食盡食盡而及人為非不知李司徒郭中令河朔之舉安陽之役屢戰屢北紛紛藉藉草野被血者幾千萬人能必其事事合誼人人得罪於唐室者乎若又曰上以政荒失國乃殘民以復民何罪焉是則李郭亦不義之舉耳傳不云乎臣民之於君猶子弟之於父兄也君父有難臣子奔救餘有不暇顧者若大義既正安得徇夫區區之小節哉不然則石碏不得為臣之純而王陵乃賊恩之大者也讀張籍書予讀籍遺文公書大率稱公材識明睿當任著書之事又曰不以此時著書待五六十後而有所為或有不可及曷可追乎然公之志豈忘夫著述哉原道不曰斯道也堯舜禹湯傳之文武周公周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與揚擇焉而不精語焉而不詳又曰小醇而大疵意二子者雖云升堂終未窺其窔奥也豈公之心繼孟而下任夫道統者耶何籍之識必待公屢書而後悟哉而伊川亦云公之見道固因文而發耳嗚呼公五十七而殁若假以數年其見於後世者為何如哉夫五百歳而後命世者出造物者固云靳矣而奪之遽何邪予不得而知也彼籍之慼慼而恐公不及者竟如所言其有見於公也特以陽一隂二之理而言耳道之難明也如此噫犬相乳說轉運楊公家有犬生子而斃求哺無所獲鳴咿咿殊可憐有斃犬之母性甚獰既老乳乆絶走而顧睞徬徨躑躅即其棲附而乳之既乳而乳真有遂盡活所棄子噫犬之畜也非有慈祥不忍之性特感於所畜者如此然老而復乳此亦犬之異者楊公北燕人世為鉅族盛年以勇毅從事兵間其活人救物釋難解紛功亦多矣雖敭歴州郡為顯宦其友愛之情日篤一日事姊如事親敬兄如敬長以致弟念天顯兄鞠子哀一門之内兄兄弟弟怡然而理順曖然而氣和若棣華之相承手足之互為用耳何其偉哉傳曰國之本在家家之本在身葢一家之隆替擊一身所行如何爾其善惡感召殆影響之應形聲也昔北平王道行於家有猫相乳之兆董邵南孝且慈有雞哺其犬之祥今楊氏犬感於所畜極不忍棄其後之意者表公樂於為善之心油然生於其中也其乳絶復生意者見公福禄將老而木艾也已棄之物遂獲生全意者勉公故舊之恩所當獲也世之人以犬之悲嘷為不祥非犬也殃自人召也是犬也特性於不忍為姑乳之亦非犬致然也福開有先也夫富貴福禄人之所大欲也故韓子有云得之之難未若持之之難也或得之於功或失之於行或得之於身或失之於子孫今吉祥止於楊氏者如此其厚而有隂所積者必矣宜乎有犬相乳之報云嗚呼楊氏其善持之既談其事懇予以叙故書磔犬者説王子逰於市見羣犬逐一叟號呶而不去詢其故曰屠犬者也於是乎有感夫人之為不善禍從而禨之亦何以異於是歟且犬之吠逐非有見於物也特為氣所感而已至若雷霆之威人有叛父母䙝神明者或下擊而斃之豈造物者區區環域中特索夫若人而斃之邪故先儒有言迅霆者天地之怒氣無良之人其㓙戾與天地之氣自相感激遂震以死此略無疑者彼犬之見逐雖小大不殊理固然也從是而觀人之方寸胡可萌一毫不善之念哉㣲則至於物怒而見搏大則至於天威下罰故横浦云一念善則祥風和氣在於是一念惡則妖星厲鬼亦在於是可不敬畏之哉是知天氣下感於人人氣上通於天者夫昭昭矣因筆此有以明夫感應正理不眩惑於鬼神怪誕之説云鈍說夫器之為制小大輕重適厥用而已然以銛鋭拙鈍用之多寡故有成敗壽夭之異焉趙君仲器博物多藝能喜筮而絶市道觀化而樂誘人古所謂不居朝廷而隱醫卜之中者之流也一日愕然以所感告予曰適過梓人氏顧礱削之器縱横前陳例乏完好因詰之曰操幾何而致然爾豈材質劣弱鍛礪弗精而然邪匠者曰不然彼斧斤刀鋸之屬銛乎其鋭者也特以朝夕從事乎削斵礱銛或半嵗一易或旬月一易逺者不踰朞年比更新而無孑遺矣因指其輳輪之錘曰是置於吾祖用於吾父今傳於予惟其碇然樸鈍用寡而無所損益故能壽於彼而若是其乆也僕因曰豈獨物乎人則亦然進鋭者退必速任重者道能逺是輕銳者不若堅鈍之為愈也夫木訥之仁樸魯之忠外視之若癡絶而緩於事及其臨大節處大政守固宻而罔疏挺健而不奪亦何異乎兹錘之輳圜輪納疊拱刜蟠根櫽錯節支離者周比而無間倔彊者妥帖而端平由是而觀可謂宣力𢎞多収功攸厚者哉彼世之人祗知利之為利曾不悟鈍之為利廣且博而壽且乆矣予聞其説而韙之吾將藏吾器養吾鈍斂吾圭角息吾氣機引重致逺俟時而動以利天下可乎趙君曰嘻子其得用而不括出而有後語成器而動者之道也於是乎書至元壬申二月九日題服色考陳節齋祐以宣聖像設既素而繪仍以服色為言曰冠服之制所從來尚矣然自三代之世變易去取其義有不同者某雖不敏試請而詳之夫冕平而旒笄衡而紘上衣而下裳垂紳而履舄繋而帶佩而綬此三代王者不易之制也今宣聖其紘其芾其純其舄皆丹乎質唯服之色尚𤣥何也考漢晉志書天子以袀𤣥皂繒為大祀之袍服於孔子服色非可據而明也謹按大戴禮云有虞氏皇而祭深衣而養老逮乎夏后氏王以水徳色尚黒易而𤣥端𤣥裳故収而祭燕衣而養老又諸侯以天子燕衣為視朝之正服有殷氏以金符徳色尚白易而練衣縞裳故冔而祭縞衣而養老及周有天下以為火王色尚赤宜乎以赤為養廼白冕而祭𤣥衣而養老何居鄭𤣥云周則兼二代而用之也若夫四代之禮養國老於膠序葢天子師而學之也唐孝明皇帝尊師重道爵孔子以王列弟子為素臣至於冕服之制亞次之秩廟宫之法饗獻之禮講明論定亦云極矣今之制實開元儀也其義正襲鄭氏之説耳故冕服尚𤣥用夏禮也朱芾斯皇示周制也錦紳素質兼祖法也彼領袂縁餙又復純赤何也詩素衣朱襮者是也襮為領諸侯之服也據爾雅黼領為襮黼繡為領丹朱則其縁也范蔚宗云天子祀天地宗廟釋奠先聖皆服袀𤣥縁領以絳漢明帝以紗為中單或者疑此乃中衣表而出之非縁也子以䙝紅紫為非後之賢者加諸乎夏后氏云其色赤則示赤心奉神明而已兹槩祭服而言也在吾夫子則不然特又明夫周所尚之之義也葢孔子帝者之師禮王者之後以天子燕衣為之御周大夫士私朝朝𤣥端夕深衣孔子以時則周人也以臣則魯司㓂也以後則商之孫子也其道則堯舜禹湯文武周公其法則禮樂刑政而後王報功報徳有罔極焉者曰公曰侯曰師曰王曰帝可也宜乎用三代服色而兼備於一躬也尤昭昭矣又有曰方而心者當乎膺曲而領者施於朱襮之上何也此葢漢猶有被之者故朱勃衣方領能矩歩乃學者之服也其象則圓上而方下葢取諸乾坤迨晉隋唐以來天子有事乎郊祀冠通天冠束帛假帶方心曲領猶存乎前代之制耳其十哲服色大同而無有降殺之異下至七十二子佩服皆青士事父母其純衣以青體少陽而致敬也其帶則縞有受道之質也夫諸子乃以士從父師而學者也詩不云乎青青子衿殆學者之常服云鸞刀説余徃嵗客汴梁陳君逹犬出示玉刀長一尺許鋒首斜削廣餘五寸玉水蒼色極光潤叩之聲清越以長其拊容握末有環背通刻柷敔狀端有竅圜徹陳曰亂後入太常官舎得之不審何物於何所用予曰此省牲之鸞刀也其端之圜竅葢用繋鸞來所施環即著和耳傳曰鋒有鸞環有和是也禮云割刀之用鸞刀之貴貴其義也端有鈴取其奏刀中節聲和而後斷環有和取其斷非和則劌和非斷則牽天以秋肅物和之以兑聖人以義制物而和之以仁鸞刀以和濟割此其義也詩云執其鸞刀以啓其毛又曰鸞刀以刲何休亦曰鸞刀宗廟割切之刀然孔氏有古刀今刀之異古刀遲緩難用宗廟用古刀者修古故也由是而觀今刀古刀其實皆以金為之此玉也其何能割切哉豈漢唐而下三代之禮實亡名存者非一刻玉為刀郊祀之際執以示古儀乎至以去質從華亦猶近代用金玉為匜爵代越席以臯比也恐未盡惟彦博太伯詳覧涿州移置攷至元八年秋九月予以省覲來涿因拜謁孔子清廟遂讀唐貞元中使持節都督幽州諸軍事彭城劉公建孔廟碑乃知州治本幽州盧龍軍屬邑范陽縣也至代宗大厯初詔始分范陽歸義固安三縣為涿州治范陽涿州即涿郡故地為名按輿地廣記漢初高祖始立涿郡魏文帝改范陽郡其地左碣石右督亢南控鄚城百里而遥北連幽薊百里而近唐以來中間控制番戎部落甚衆又河流縈帶前後有林麓陂池之利周廣磅礴鬰為雄藩及辨讀遼統和廿八年州刺史廣陵高公移廟碑隂記云舊廟本在南城東北隅是年刺史高公移置南城東南隅康莊之左因復悟今州城南北若連環然意者置州時展築南城而廣大之今市中隔門本故縣城南門也觀此前後證據甚明無可疑者噫予徃來幽涿間葢十年於兹嘗以隔門之制為惑詢訪土俗莫詳其故且方物之辨一事弗知君子恥之不圖聞一得二使數年之疑一旦渙然氷釋亦可喜也特表而出之敢貽涿之好事君子以俟更攷云締觀説吾鄉黄冠師房公體鴻厖貌古而心通讀儒書喜營治嘗作呉殿於棣華菴故址締構曰予與亡友季武子文徃觀且工人數十附立楹顛方納拱駕梁為事其枘鑿縫縮有略不相認者衆上争左右睨材分繩墨曰不少繆即縆驅鎚按呼號半空彊以力相下良乆終無奈木何一工者舉手招衆曰聼無譁衆瞪目東北向率弭耳受嗾予二人從所向顧之見一老道士傴僂擁敗絮曝日坐短垣下俛其首捫風略不一仰睞第抗聲騰言以手畫空而已云東西行若干寸南北起若干尺此蹇傲者彼之所枝撐也彼拗捩者此之所走側也上工即如教歘衆材軋然作聲若相尋而契果安貼停穏不踰若所料予問道士於房曰此始謀畫宫於堵斷手載名其上者也予因有感於中廼知天下之事有大有小人之材有能有不能俾細大不捐區處適當此宰相之職也君人者何憂乎不治苟明大者反知其小任小者反負其大是上下錯謬冠屨倒置欲求功成理定難矣哉持衡者曽梓人體要者之不若也師啞然曰筆之可也於是乎作締觀説屏雜説嗚呼雜之為學其害道也甚矣麴蘖雜醴齊為弗醇烹飪雜鼎羮為之變味宫商雜音奏為之惉滯君子之所不取而不由也况學乎學而雜心則交錯而貳其行言則叢脞而昧於理動則拂亂而失其宜至於文章翰墨一蹂於雜偏駁不振尚何理之能著家之可名乎謂為道尤判然離而曠且逺矣故傳曰攻乎異端斯害也已然博我以文多學而識之又曰君子恥一事之不知能無雜乎葢聖賢為學必務其大者而使小者從焉其所以務之為者明理致知收放心格庶物而已四者既生存於中雖諸子之説百家之言日至於前猶衆川之流朝宗而東常我之主孰能雄而長之撓而濁之者哉况約之以禮詳之以説為之澄滓於其後者非一如是則何患乎問之該洽學之愽雜者哉戊子夏六月庚伏有七日發藏曝書得雜文百餘帙睨而視之皆予稚嵗所閲習多曲學小道廢日力不少不覺喟然曰两漢而下學無師傳安宅曠而弗居正路舍而弗由者其我之謂乎使我老而困困而無所成者職此之由務於粗而害其大之為也於是命兒子輩屏而絶之板為三夾束置高閣且誓之曰今而後非有命不得發而妄閲以蠱惑其心目大抵中人以下之性所偏者多用而特達者或鮮我今是舉正以已之所偏且正汝之或失也是吾不忍以悞我於前者而又悞汝等於其後也天其或者果汝之賢而有全經全史在焉泝流探源剥其華采其實嚼其膏味少有所得以之修身齊家推而及於物將見終身有用而不克盡者尚何以他為哉小子其服之無斁作屏雜説答客問至元廿一年春正月予有中省郎曹之命既而以事不果行或傳余抵燕視其有不可歸者嗚呼誠身之未篤不為所信也如此作答問以自見其辭曰客有過秋澗而問者曰士不旬時而被旌招者三將謂趣裝有期反泥其輪而脱其鞿者何也方今王者無外四海一家渇於得賢以光國華有片善者無不録效一長者靡不嘉故有立談而致卿相略而不及其它士或韋布進無資涯名不登於仕版何得挂銓曹之齒牙子今幸蒙見招未為不遇官列郎曹名都省署切近論思周旋宰輔設或有為澤及黔庻曽若無聞又復何顧豈子志願未克班資尚卑重有所覬其行遲遲予仰而歎俛而思人各有宜孰不自知越分而行有乖無隨予方以再命而傴僂尚敢以鋭進而為期也客曰豈子欲信猶屈道汙未隆甘於泥蟠以固其窮然聞聖哲席有不㬉援溺捄焚予曰世之康濟固自我化道之隆污葢有不為命者然墨突不黔其炊烟孔轍幾環於天下雖遑遑於救世亦觀時而取舎予且何人敢妄為之駕也客復曰子豈年近耳順嵗月將邁心智日強膂力弗逮曰若不肖齒髪未為衰暮顧嘗攬轡外臺峨冠憲府從事有年艾服頗素其責固重即其心則安道可行雖一日不去故黽勉盡瘁不遑寧處通其考則為四百其月則去五予亦知力之有所不及葢嘗以明時可惜憤功業之不顯著也客曰伊懐既然子何見其一而二之不覩投㑹是機進退餘裕忖其不可即以他務尚不失邯鄲之故歩不猶愈於刻舟求劍守株而待其兎耶乃若闕客轉談之悞也今有司以是召我其行或否理之所當喻也若顧量可否以改圖為舉是先以不誠自將上欺君父以幸為利取便已故是又義之不敢與也客曰然則子之志嚮果云何而可哉傳不云乎士有二道出處為大進退無常惟義所在又曰可乆可速其行其止葢平日所素學不容以彼而易此今吾子堅欲推挽扶之使前是茫洋徑渉趣入於無涯之淵設若有為徒勞勉旃至於出處之道論之誠君子之不然此吾之所以不果執宣父之鞭也故為可為於可為之時則從而寧為不可為於不可為之時其咎即徴果其可之與㑹客何勞於勸懲吾年雖耄自顧矍鑠尚或堪於一行客唯而退於是筆之以自銘謗解予作謗解夢人以壊木寓蠧見示意者謗由我興非外至也然謗之惑人深矣公孰與制私無以勝其説至肆行而不少憚以隂擠而為陽助被之者鮮克自處欲弭之而無術也嗚呼世教下衰友道日壊私好惡者愛之者欲其生憎之者即其斃口溢金蘭心包鬼蜮謹其藏已射其形亟為防已螫其毒矣輕則噂沓背憎浸潤膚受妄生事端横造異議忘我大徳利彼小私傾良惠姦傷公害義忍為儉人坐擅形勢苟淺之為量者不自返而縮徒恚夫此胡為而致焉思其稍逹藉勢投畀使恩讎兩明以泄其忿􅓰恐非君子以直而報之義也夫聖人所以列朋友於天倫者示其當重而親匪大故則不容棄也又讀小雅何人斯篇彼暴之譖蘇公也至獲戾失職亦云極矣略不見聲色於辭氣何三代教化和平忠厚成士徳也如是至好歌忠告反以不忍遽絶為言其亦審夫天倫為重枉為小人之為也静言思之大有契予心者予雖愚而懦受人侮者不少然天之所畀於我者似不薄矣矧諺曰禦寒必須重裘弭謗莫若自修大率常情之所未免者其疚有十處已之不恭也御物之不誠也嫌與疑不擇也毁與譽肆行也或以已長格物或以剽義沽名或出戲言犯衆或恃口給凌人責人太重而以驕吝自矜審先去此十病無瑕可摘謗奚自而生哉而復守之以敬慎將之以忠厚以蘇公之心為恕以中庸之教自處其或有作於上力易斯弊上以格儉人之非心下以殄讒口之罔極建中於民歸之以厚彼欲校欲報者亦不得賊其衷而發之如此我之所謂疢者而或有瘳彼之所謂謗者亦庶幾其少熄矣作謗解對魯公問後山云思保歳寒之節徇國家之難耳顔魯公唐一代鉅臣論者當明其心求其迹則非也公始終王室死而後已葢素所藴也不幸值唐中衰以孤忠大節立於傾朝死覬一言有補於國至於老不退休大率朋友之交遭罹患難尚有相死不輕去之義况君臣乎及盧杞當國見其嫉賢亂政公復以正言折之既憎公直復忤杞意至遜辭為謝終不少解巳而有宣慰之命每讀至此未嘗不掩卷而興嘅也於時公豈不知一入賊庭横噬虎口意者此之使杞姦計媒糵其罪銜寃入地暧而不可明是不若履忠蹈義明死於使華之命尚或摧沮逆謀以激忠義之士而愧夫天下後世亂臣賊子之心是乃不以李鄭勸而不行為得而以死於義命為安也要令千百世後義烈言言如嚴霜畏日有不可尚已者此公之心也嘗以忠義者國家之元氣世當顧䕶靳惜使信其已徃不泯之志勵夫將來至薄之俗而為天下之大閑如公者誠不可例與具臣者論其進退之跡也若專以老不致仕為嫌是又失見危授命之義也况唐人之於致政初無定體至元戊子秋八月廿日晨起偶記徃年對翰長之問特為筆此且發所潛之幽光云儉訓人之生於天壤間分所當得者隂有日料涪翁謂一飯先書籍者是也未老前固不應空乏凍餒而死如其暴殄過度以旬時之用為一朝之費促之而不給者信有之矣故諺云兹焉不足徃則太過此言雖㣲可為永喻昔李文饒相而後當飫羊十萬數未充而被斥葢已用者過侈故也此非明驗可不鍳哉今余一家二百指日所費以酌中計之且約五貫文是須千八百餘緡可支一嵗其於慶弔賔客差徭之数又不在内顧余生事四民之業一無所營而終歳所耗如此造物者斡旋供億亦已勞矣吾何徳以堪復欲終日望望然致室之完美此心斷不可萌至量其所入度其所出如且休接闕之説此念不可疏也予今年六十有二向之所謂心焉而志學焉而力者日趨於衰㣲安坐待哺外餘無能為秪有以勤儉律彼使猥承家事而已傳曰家當克儉焉邦當克勤焉又曰生則在勤勤則不匱儉為徳恭侈惡之大也此雖聖賢垂教格言不可斯須離逖然孰不念而知之但齒年未至不經其事之囏難者鮮不忽而畧之是自逺其恭徳昧夫寧固之理可乎但其已困歎彼之豐傷已之窘方思節約以補其不足不亦晚乎汝等其朂哉毋替作儉説遺山先生口誨遺山先生向與頥齋張公諱徳輝字耀卿終河東宣撫使自汴北歸時史相請為實圖羙作碑過衛先君命録近作一卷三十餘首為贄拜二公於賔館同志雷膺在焉先生略叩所學喜見顔間酒數行令張燈西夾曰吾有以示之先生憑几東向坐予二人前侍披所獻狂斐且讀且竄即其後筆以數語攦其非是且見循誘善意而於體要工拙音韻乖叶尤切致懇每篇終不肖跽受教再拜起立夜向深先生雖被酒神益爽氣益温言益厲覺泉䝉茅塞灑灑然頓釋如醉者之於醒萎者之於起也説既竟先生後昌言曰千金之貴莫逾於卿相卿相者一時之權文章千古事業如日星昭回經緯天度不可少易顧此握管銛鋒雖㣲其重也可使纖埃化而為泰山其輕也可使泰山散而為㣲塵其柄用有如此况老成漸逺斯文具在後汝等其朂哉母替坐客四悚有惘然自失不覺嘆而發愧者既而鼔動客去先生覆衾卧予二人亦垂頭倚壁熟睡及覺日上先生與客已觴詠乆矣於是胠篋取一編書皆金石雜著授予曰可疾讀吾聽愜其音節句讀不忒顧先君指而謂之曰孺子誠可教矣老夫平昔問學頗得一二嵗積月累針線稍多但見其可者欲付之耳可令吾姪從予偕徃將一一示而畀之庻文獻之傳罔隕越於下先君起拜謝不敏曰先生惠顧若爾何幸如之王氏且有人矣敢不唯命期以明年春當見先生於西山時嵗甲寅春二月也後三十五年戊子冬十二月臘節前三日小子再拜追述政問至元九年春予以御史滿秩除平陽路判官過辭諸公以臨民處已之教為請右丞相史公曰汝讀書年長乆在朝行今官外郡寅奉之心當常若在朝廷時至於事機變轉不可預料臨時制宜可也翰林學士鹿庵先生曰長次不睦及首沽虚聲今天下之通患推讓有終為上詩云靖恭爾位好是正直神之聽之介爾多福况人事乎餘何言祭酒許魯齋曰臨政譬之二人對奕機有淺深不可心必於勝因其勢而順導之同僚間勿以氣類匪同而有彼此或有扞格當以至誠感發無所争矣其後總管萬奴來尹亦請訓於開府史公曰今判官王某性既直頗諳事儻有所疑當與可否至於左丞姚公吏部尚書高公諱鳴字雄飛毎以事使晉府者必有言顧慰至秩竟僚屬友愛以理而去時十有三年春三月也不肖今年六十有一老不能用追思徃事如此等格言有不可遺逸者因特書云且寓夫強仕之不可復也是嵗戊子秋七月丙戌初二日也醫説贈胡君器之醫者精㣲之術也又曰醫者意也得於中而可以應諸外通乎㣲而後可以達其變此必然理也予素有中脘疾二十年間凡三舉發初得於燕也醫袁以𤣥胡劑療之法既緩再宿而疾乃已在趙藥以神寳名者攻其中堅瞑眩搜索上痛方厲而下動大作猶一敵未退而復生一敵物雖去而泄不止予頺然而卧力不勝而氣已憊矣間日而氣始平其作於邢也陳氏亦以類趙劑者投之而為苦與先尤加劇焉今者蹶動感似輕而痛則一上閧於中州旁刺於兩脅後延於膂􅘡撞擔衝拉頭岑岑而氣翕翕求少寐以休吾煩且不得也胡君器之亦探藥之粒如珠者曰硃砂圓下之予顧其劑㣲於先疑為力更峻器之曰無慮為第下嚥覺腸間少鳴而㣲痢則痛隨止矣已而果然繼以厚朴湯調之忽醒然而寐如釋重負而濯清風也寤日高三丈許予體中已平曽泄之不復作而氣之不少憊也器之天資高業顓而學博識明而善斷出新意而不泥古知其常而通其變嘗曰人其五行禀之者不一天有六氣感之者無常病雖名同而證實有異者苟以一槩治之吾未見其能也故證之壊者徃徃劑而獲安昔霍嫖姚行師少衂多勝正以不至泥古兵法顧所遇吾應之者為如何且予於器之亦然作醫説以貽之秋澗集卷四十五欽定四庫全書秋澗集卷四十六元王惲撰雜著
