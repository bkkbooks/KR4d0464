body:
  text: 擬中書省賀河清表伏以天開昌運統一車書地應休禎河清陜洛如式恭惟皇帝陛下徳昭天漢恩溥淵泉覆露何止於中華洋溢逺霑於方表以致潤涵九折鏡净两涯自陜至汜幾千里之遙由乙至丙逮三旬之久鱗介之泳㳺可鑑山林之形影皆分躍圖馬於龍宫未容專美舞馮夷於鱗屋時出効靈顧兹上瑞之方增特表吾君之至聖臣某等叨居華省幸覩榮光敬傾葵日之誠用代辭人之頌遐荒嚮慕百川宗滄海而王寶祚洪延萬夀等丹丘之固又上澄下澈光昭四表之平國晏民安永溢萬年之夀擬聞捷賀表天網雖疏曾恢恢而有失罪人斯得迓穆穆之來平外侮既消頌聲交作臣某等誠歡誠抃頓首頓首恭惟皇帝陛下仁含動植徳嫓生成振長策而用三驅念天顯而惇九族薦雷之震逺驚而邇懼大風之舉歌動而雲揚側聞喜自於日邊豈止威加於海内臣某等職叨省署阻奉鑾輿竚目龍旂遙伸虎拜歸牧武成於周馬歌功美邁於唐鐃六轡言還春動两都之和氣千官飲至歡騰萬嵗之霞觴如式中書省賀正慶八十表甲午嵗伏以明堂受籍萬方歸一統之尊神策探祥八秩開大椿之首稽諸前古曽未多聞中賀恭惟皇帝陛下徳本至仁天申顯祐維神聖之廣運致功業於獨髙粲然萃三代之英蔚爾創一家之制與天立極躋世於平我澤我威洽乎南而暢乎北曰聲曰教漸于東而被于西方且通達下情蠲除積負肆赦恩而哀矜庶獄扇泰和而煦育羣生冝福夀之貺如川方增見寅畏之心維日不足端臨元㑹光動漢儀舒化日於中天湛露恩於春酒臣某叨承睿鑒久侍瑤階備位秉鈞何補馨香之治捧觴上夀永膺億萬之年如式中書省賀尊號皇帝夀八十表伏以廣二億而輪二億萬方歸一統之尊春八千而秋八千六葉開大椿之首稽之載籍曽未前聞恭惟憲天述道仁文義武大光孝皇帝陛下徳本至仁天申純嘏繼一祖四宗之業兼三皇五帝之功燕翼貽謀動從民志以太孫撫軍而重安國本以新河轉漕而通恵畿民建大學而首善京師清中書而杜絶羣枉緩回鑾輅省秋斂而即田功丕顯前光纂武圖而修信史惟聖神之廣運納福夀於方來神嵩屢聴於三呼籛祖莫多於八百顧茲鉅典稱慶冝先况盛事之難逢幸微生之親見臣某等職司蘭省喜倍輿情順考百王實光千古輸誠報上區區歌天保之詩以億祈年永永同洛書之誦又伏以王正紀月萬方歸一統之尊神筴儲祥八秩啓無疆之夀况得春於上日恊正氣於四時事盛來并禮須交慶恭惟尊號陛下誕膺景命祇紹炎圖載纉三代之英創作一王之制繼天立極躋世於平化行鯨海之南威暢龍廷之北廓廓然可謂無事巍巍乎其有成功方且與冨藏民舉免積年之負方春布徳肆頒咸赦之恩冝夀祉之方隆見嚴恭之克享端臨元㑹光動皇儀舒化日於中天湛露恩於春酒臣等率先列辟拜舞稱觴久侍台階何益體元之政願言洛誦永符垂億之年聖夀節表伏以日符恊夢茂隆探策之祥鳳厯周星方啓同天之運休徵滋至海宇交懽中賀恭惟尊號陛下帝學日新聖謨天縱恢章先業垂裕後昆所欲從民為天立極以太孫撫軍而重屬世望以新河通漕而倍溢民儲建國庠而首善京師清中書而杜絶羣枉方翠鑾之回軫慶玉燭之調元敬展賀儀載臨誕節臣某等承乏鼎鉉同秉國鈞愧無金鑑之書徒切露嚢之獻光瞻北極列衆星環供之先夀等南山伸天保不騫之祝翰林院聖夀節賀表伏以翠鑾回軫屬千官飲至之秋玉燭調元慶萬寶登平之歲載臨誕節煥舉賀儀中賀恭惟尊號陛下内極文明外昭桓撥爰從登極之初未嘗以位為樂思章先業垂裕後昆燕貽謀而以之撫軍清中書而俾之端本于以息肩中夏謹度侯藩上禱下祈為民斂福東征西伐與世除殘文軌一家而不曰治安者乎煙火萬里而可謂和樂者也尚覬惟新之政擴推不忍之仁包舉遐荒涵濡聖澤臣等叨居辭館榮列士林敬奉霓觴俯伸虎拜敢希金鑑之誠仰罄神嵩之頌感生北極歌有商長發之祥夀等南山罄天保不騫之祝謝授翰林學士表臣惲言今月日䝉恩除臣翰林學士者伏以求賢圖治逺邁哲王養老乞言誠為重事况聖代方文明之盛在禁林有超逸之才如臣者學術素疎桑榆垂晚俾擢升於衆上殆選有於無中茲盖伏遇皇帝陛下聖敬日躋文思天縱紹接千年之統光揚列聖之徽舎所短而就所長小成小而大成大敢不凝思螭首益礪辭鋒由外臺而登玉堂固已極當代縉紳之寵約舊章而修信史何敢企髙天日月之輝登寳位賀表伏以承祧主器已欣厯数之歸助順興龍允恊神人之望事光前古運洽重熈欽惟皇帝陛下皇祖聖武之曽孫明孝太子之嫡嗣英武同符於先帝温文早著於春宫扈蹕東征躬勤備至撫軍北邁我武惟揚符命自至而呈祥宗盟樂推而同戴既深丕眷所助冝多覩大寶之昭升將兆民之永賴中統至元之治行見増隆漢文夏后之賢莫之獨美光融化日歡沸民謳臣某等久事先朝備位政府再逢嘉㑹喜邁輿情景命維新按軒厯上元之統太平假樂稱瑶階萬夀之觴老人星致語伏以太平有象治洽金穣至徳無方文綏武暢惟精誠之上感致淵曜之輝臨臣逺自狐南光融狼北龎眉鶴髪月帔霞冠遽踰常度之躔來展流虹之慶恭惟皇帝陛下玉帛萬國庭衢八荒紹列聖之垂休圖舊人而共政幾先物而聪明齊聖量包逺而恩澤無遺敢慿出丙之微明用表後天之遐筭咸躋夀域樂對昌辰南極何深下坤維七十五度北辰伊邇拱乾位億萬餘年爰奉徽章式申善頌其辭曰天地穹蒼一氣氲祥開來表帝皇真九圍覆露堯天大萬有榮懐湯徳新報上疇非思下下推恩及物自親親通明殿裏長生奏願祝元貞萬萬春中書左丞姚公制朕聞世祖睿臨之久有文王多士之稱如種楩楠而備梁棟之材如積璠璵而供瑚璉之器而况先朝故老當代名臣良用慨然想見風采故中書左丞姚某生禀淑質世稱大儒爰自潛藩殆若神授天扶道統力主經筵以聖道而覺斯民燭天理而息邪說智足以達其言行辯足以濟其經綸耕桑開王業之艱征伐佐雲南之舉罷侯置守轉官之制初行論道經邦建極之功斯在是用圖回左轄羽翼春宫永惟佐命之勤式賛承祧之美籥羽東序從容賢傅之嚴綸綍北門寂寞玉堂之話百身莫贖一鑑云亡開國於營用旌直徳可贈某官某諡俯惟英爽歆此寵靈中書左丞許公制朕究觀世數灼見天心粤惟有不出世之君然後得大有為之士運符千載道濟一時中書左丞許某爰自師儒遂拜左相用之不為不重學之不為不深貞一乃心執持苦節謀謨善㫁精識造微既逄堯舜之明用安社稷為悦君聖臣直理明道尊庶幾夷夏之安風以詩書之教衣冠萬國雍容叔孫之儀仁義一家剴切魏徵之諫在中統至元之治有永淳貞觀之風此其效焉功可㤀耶而復養英材於國學齊七政於璿璣白首南歸尚深北顧憂來丘禱㱆欷柱石之哀人去鑑亡瀟洒風雲之契感時懐徳想像其人忍惜䘏章俾疏身後可贈某官某諡尚期窀穸不昧欽承翰林學士承㫖王公制人臣大節忠義為先䘏典推恩古今一致故翰林學士承㫖王某道徳淵深人品峻潔板蕩見忠貞之操文章有正大之風養力息兵貽謀進諌惟軍國正撫監之體將謳歌見厯數之歸白首匡時赤心為國庸示至公之論曾無一己之私而又扶昌運則一代名臣鎮雅俗則百年遺老去日漸逺有念何窮九原之氣猶生不忘宗社三事之報斯在庶極哀榮可贈某官某諡尚冀英靈服我休命請上尊號奏章臣某等言伏見陛下昭受顯號今已十年聖徳神功日新一日又聖夀新嵗茂登八秩考于典禮合行再上尊號上以賛揚功徳之萬一下以罄臣子愛戴歸美之誠謹此奏聞伏冀聖慈特賜允許表聖夀節賀表至元三年電繞中樞寶厯啟千齡之運祥開彌月瑶墀儲八葉之蓂凢在覆臨疇非鼓舞欽惟皇帝陛下聡明時乂聖敬日躋爰從在御之初未嘗以位為樂大慶同符于漢祖宏規逺邁於唐宗纉四聖之丕圗新一家之大典尊崇故老思致隆平委任勲賢迭居宰相文之以詩書禮樂律之以軌度儀刑薄賦輕徭省官定制尚側身而修行毎前席以賔賢察納雅言彌綸元化上所以恢章先業下所以𢎞濟生民凡曰云為務從休息分縂司而去積年之弊更庶尹而削藩鎮之權尊祖配天妥宗祧於九廟敷文柔逺舞干羽於两階功徳兼隆神人交暢以致服前代所不能服臣上古所不得臣東夷航海以來庭西域梯山而欵服可謂振長轡以逺馭敞中國之至仁仰惟極治之難名皆出聖模之廣運載臨盛旦敬舉賀章臣等猥領郡符恩同天造進乏千秋之金鑑遥稱萬歲之霞觴同虎拜于揚休下列阻陪於北闕効嵩呼而獻祝賡歌載詠於南山聖夀節賀表至元四年甲觀開祥嗣大厯無疆之服華封請祝罄後天難老之期凡在夀臨率多呼舞中賀欽惟皇帝陛下文思天縱聖憲日新得漢唐經國之權綱極堯舜知人之濬哲以岳牧治本也疏之而冊授中書化源也清之以弼諧尚兼聽以為明每得賢而恨晚溥覃禄秩優復民田有司荷覆露之恩含氣遂生成之樂家給人足時和嵗豐九歌莫被其神功萬事馴歸於道揆而又順長道而屈羣醜推至悌而御多邦謂本支一出於祖宗重疏恩而立愛江漢終歸於淵海首繼好以息民由既睦而於變時雍以克肖而全付所覆春際八荒之夀域天開一統之徵祥瑞屢見於蒼麟箭罷傳於青海西窮月窟率稽顙以來王東極扶桑復寅賔而朝日繄爾至元之盛烈於昭曠古之深仁瑞節載臨賀儀煥舉臣某等心馳魏闕職限侯藩阻振鷺以陪庭儼天威之在上千官飲至傳聞置酒於南宫萬嵗稱觴第切瞻光於北極两宫正位稱賀表伏以正位建儲舉一代當行之典推仁被化遂萬邦咸喜之心凢在臣鄰同音鼓舞中賀恭惟皇帝陛下道彰坤順徳益離明治首宫闈基隆國本著母儀於天下融少海之波光謳歌見四海之歸教治豈二南之廣壯本支於百世聳官儀於一時某等職忝侯藩心馳象闕徒切煙花之想阻陪鵷鷺之行敢罄丹衷載陳封事徳符寶運拜揚稱三殿之觴慶衍蘿圗綿亘接萬年之統聖夀節御史臺賀表鼎定皇圗接千歲上元之統天開甲觀儲九秋盛徳之祥聲教所加讙呼斯溥中賀恭惟皇帝陛下堯文天縱湯聖日躋爰從在御之初未嘗以位為樂躬勤儉徳夢想幽賢察納雅言恢𢎞治道蕩皇威於北海藉千畝於東郊載崇列聖之鴻基仍創一家之大典漢官儀之漸復唐治具之畢張尚深闕政之思屢下卹民之詔内祓灾而修行外發政以施仁明徳緩刑輕徭薄稅而又天臨睿智坐折遐衝昭曠度以無前振長轡而逺馭爰整干戈之事終歸雨露之恩雲掃黒山孰謂玉闗之久閉春回鴨緑旋聞滄海之維清既荒外服之功尤盡内修之理繄爾至元之盛烈於昭曠古之深仁瑞節賁臨賀儀煥舉臣某等榮叨臺諫願切葵傾陪稱漢殿之觴仰效露嚢之獻光瞻北極罄封人上願之心夀等南山申天保不騫之祝聖夀節賀表寶厯膺期接千歲上元之統日符恊夢開九秋盛徳之祥稱慶惟均際天所覆中賀恭惟皇帝陛下離明繼照乾徤乗時動順民冝更張治化求懿徳而式序爾位任吉士而勱相我家尚深闕政之思屢下子民之詔去網更仁於湯祝敷文思格於苗頑既荒外服之功尢盡内修之理卜營督亢宅壯陪京據山河全勝之區得貢賦適中之地于以隆上都而觀萬國備時巡而禮髙年四聪達羣下之情一豫為諸侯之度臣某等榮叨郡寄心切葵傾阻稱漢殿之觴徒效露嚢之獻運鍾北帝祚有商長發之祥夀等南山申天保不騫之祝御史臺賀正旦表至元八年為御史時作伏以鳳厯頒春三正恊夏王之統鷄人唱曉萬方稱漢殿之觴品彚沖融衣冠環拱恭惟皇帝陛下容徳乃大盛蹟無前載新出震之權端履乗乾之位東漸滄海髙麗䝉再造之恩西極渠搜葱嶺多來庭之使國字創一家之制朝章舉曠代之儀方漢之險何足恃乎髙深蓬萊之波旋復聞其清淺終格羽干之舞始奉文誥之辭咫尺天威趍承鳳闕蕩恩光於萬里醉春色於九重臣某等久侍瑶階叨居憲府獻可替否詎能振臺閣之風拜手揚休仰以祝河山之壽正旦賀表伏以玉燭調元蓂莢啓堯堦之厯椒花獻頌錦封陪漢殿之觴朝野同歡乾坤交泰中賀恭惟皇帝陛下仁涵動植徳備廣淵受籍以朝履端於始爰體春王之月屢頒寛大之書顧軫慮之洪深躋吾民於仁壽而復開明堂而坐治奉帝籍以躬耕總攬皇綱務兹大本鳳城斗轉春回萬里之農桑紫禁天開瑞靄两都之雲氣臣某等叨承列郡逺被恩光敢俯傾葵日之誠仰以效華封之祝遥瞻北闕天威殆咫尺之臨壽等南山神筴授萬千之筭史都督譲總管表臣謹言推賢以位敢希髙世之名以譲移風固有為邦之教志雖自信政亦當然中謝伏念臣某等鷹犬微材邊防舊帥起家燕地分土恒陽累朝荷眷遇之恩報國乏忠貞之效正以先臣之故久膺方面之權﨑嶇提陽夏之師屯戍控荆門之㑹仰憑聖筭十載無虞鎮守長江寸功何有比加寵數方驚都督於諸軍恭被朝章俾襲天倫之舊物君命凜雷霆之重微軀處伯仲之間情有難安禮冝遜譲臣兄某灼知民事素秉忠心功收製錦之能政洽承流之體如黄霸已優於治潁何景宗遽可以臨民伏望聖慈鑒臣愚悃非敢圗私己之便實恐貽不友之譏念念天恭敢後周書之誡堂堂大國務先棠棣之風謹拜表以聞聖節望闕祝文龍馬授圖已肇興王之迹流虹啟聖大開彌月之祥凢居覆載之間疇匪懽忻之至欽惟皇帝陛下聖謀能㫁睿智足臨天祐人歸功崇業廣西平大理蘇雲霓徯望之心南渡長江得風日清明之助爰履神明之祚恭承祖考之休榮示至恩以昭曠度親王昆弟光輝棣蕚之樓異姓勲臣揚厯金華之省尚求賢而若渇毎從諌於如流所期無曠於庶官急欲廣聞於民瘼禮百神而斂福順三時而務農載戢干戈俾安田里施仁發政先困窮無告之人講好息民停邊鄙喜功之奏而又兵民並政惠愛同行鑑古昔之安危立規模於宏逺移官吏而除累年之弊崇儒雅而興文治之風尊京師而强幹弱枝削藩方而如臂使指分宰相於諸道專委任而責成功置統軍於遐陬蓄精銳而消外侮唐世之時雍丕變漢家之治具畢張以致祥風扇和時雨霈徳炎洗蠻邦之瘴春回沙漠之寒車書八方洵曰治平者也煙火萬里可謂和樂者乎民歌徳化之誠心靡帝功之有當萬寶秋風之節適羣龍首出之辰湛珠露於仙盤蕩金風於玉宇香鬱三山之紫霧懽騰太液之蒼波吉旦光臨溥天同慶臣等叨居民部阻奉夀觴不勝葵藿之誠仰荅乾坤之造遥瞻北闕天威建咫尺之臨拜祝南山神筴授萬千之夀十六年賀正旦表任河南河北道提刑時作玉燭調元允恊三朝之始春城回斗茂凝一氣之新正朔所頒邇遐交慶欽惟皇帝陛下端臨左个誕受輿圗仁擴春寛道開時泰化日舒而民力足奔鯨沛而海道空清明際區宇之間鼓舞樂雍熈之治尚惟事統丕顯聖謀孜孜下達於民情念念化隆於邦憲保釐荒服減吏冗而益監司惻憫長征數軍實而免貧役功極見寢兵之漸策長盡馭逺之方履兹肆覲之辰介以如山之祝臣等欣逄盛旦叨領外臺政罔肅於簡花禱徒伸於椒頌遥瞻宸極阻奉觥觩夢聽鈞天霑露恩於春酒對揚休命祝聖夀於南山聖夀節賀表至元十七年八月初二作秋滿皇都荷大駕省方之豫祥歌長發屬千齡應運之辰夙旦載逄儀章煥舉㳟惟皇帝陛下聖惟桓撥智足睿臨用式九圍大開一統爰念盈成之戒每深覆燾之仁挈彼生民躋于夀域兵刑寢措收帝王之極功基業恢𢎞光祖宗之丕緒儲此無量之福有來滋至之休繄爾大元於斯為盛臣等叨持使節違逺天威雖微金鑑之輸誠敢後封人之願祝盤銘至再天心享一徳之新嵩呼者三聖夀永萬年之筭進瑞芝表皇帝聖㫖裏臣某等言於所領汲縣界内今月某日陶工朱良舎中産土芝一大本者伏以至和大來嘉貺昭應爰念開先之兆聿彰承順之祥臣等誠惶誠恐頓首頓首欽惟皇帝陛下政洽慈仁敬事耆舊聖惟廣運恵澤春融徳合無疆瑞草英發彤枝韡韡合為連葉之芳紫葢煌煌夐出銅池之秀木檽漸稱於𢎞景郊歌美並於班書以兹玉質之竒特著吾皇之夀適迎誕節恭覩殊姿臣某等無任忻抃慶賀之至謹具表進獻以聞臣某等謹言甲申嵗正旦賀表山東憲司伏以齊七政于璣衡統允恊於夏正受四海之圖籍喜大溢於周邦香翻白獸之尊光動黄旄之仗恭惟皇帝陛下叡臨神筭武定文綏體元建極於中天顓任責成於諸相惟徳應上天之眷遂運開一統之祥宴錫彤弓樓畫玉闗之使塵清滄海暖回陽谷之春厯觀徃代之規模未見今日之全盛尚軫憂勤之念屢頒寛大之書便民之詔以次舉行煩民之事悉令革去廓廓然可謂無事巍巍乎其有成功臣某等幸際鳩辰敢陳椒頌遙下肅雍之拜如臨咫尺之威紫禁縈花夢想鈞天之奏華封獻夀祝同嵩岳之呼聖夀節賀表伏以氣調玉燭開九秋大有之祥露湛霞觴獻天子萬年之夀賀儀煥舉海宇同懽中賀恭惟憲天述道仁文義武大光孝皇帝陛下立賢無方從諫弗咈畏服得所臨之道威揚極載績之功平内難而以義滅親停遐征而敷文柔逺而又政歸一相事革多門永言夙夜之思大得股肱之助臣某等沗膺郡寄宻邇天顔歌天保以歸休阻陪鴛列罄華封而願祝竊效嵩呼千秋節賀牋至元十八年六月運炎烏火見上天於穆之休一作皇天眷命大間一統之基甲觀呈祥通際誕彌之月帝降𤣥商適長發其祥之月千秋稱慶四海攸同欽惟皇太子殿下徳粹元良道隆純孝允當楚璧厯試堯難未明問寢於龍樓思治望賢於漢苑日深子愛時御經筵擴推不忍之仁陰作無量之賜而又維持臺憲以振朝綱左右端人圗惟國政雖一事仰資於聖㫁致两宫咸得其歡心以兹中外之情顒切撫監之望某等内塵法從外領雄藩恩深少海之波瀾躬侍春坊之劒履玉巵奉夀陪鳳舞於西池鶴禁揚休等嵩呼於北闕一作玉巵獻酒奉鳳舞於西池寳緒分輝俾夀昌於北極上經略史公啟壬子年三月十七日門下王某謹齋沐頓首百拜致啟于經略相公閣下右某言乾坤草昧建諸侯所以濟屯茅土分封惟大人為能開國仰佐龍飛之運須資嶽降之賢擬議以言非公孰可洪惟經略相公閣下器兼文武運偶經綸衆推為上將之材自任以天下之重攀麟附鳳早依日月之光捧轂推輪榮受干戈之命萃一門之忠孝兼五路之侯封終始四朝險夷一節仁温温乎冬日氣凜凜乎秋霜内藴一誠外含萬動推而行陣則勇大敵斂而康濟則澤被生民顧所遇之如何必其材之相應鷹揚虎視收中原百戰之勲蘭婉芝芬靄漢將千金之譽既備過人之智故多及物之功綏斯來動斯和存者神過者化紅蓮緑水盡借籌入幕之賔長劍危冠皆扛鼎䝉輪之士謂蟻穴尚干於天討詔龍驤暫駐於遐陬旌旗未指於淮壖草木先聲於江左虚懐下士冝平原賔客之三千不戰屈人切充國便冝之十二雖閒曠不㤀於武備一周旋悉本乎儒風詩書鞍馬之間談笑風塵之外又且脫屣示譲在人所難當諸邸勝事之初乃一旦奉身而避弃璧而負其子林回雖近於人情捨已而與諸人季札葢存乎教典方慶懸車之樂復承顧命之榮乗騄駟而超天河以腹心而叅廟筭増輝白日叶賛眀時力障羣隂春囘華夏試手已安於漢鼎阜民共拂於薫絃柱石之力初不譲於霍票姚股肱之貞豈復減於蕭相國而又量容江海利先國家顧所收之邑委以不争盖先見之明知其有在果展斗間之紫氣卒收度外之鴻名知其褒有成忠荐膺渥眷復衛邑為之湯沐豈偶然哉錫康侯至於庶蕃固所冝也望符輿議歡動百城顧兹襁負以偕來實出恩威之素著僉曰惟昔有虎苛之政子今無犬吠之虞一新汚穢之風共沐神明之化出幽谷而遷喬木孰不快哉若大旱之望雲霓徯斯久矣此共推於公議匪獨出於私心今衛勢據上流土名沃壌衣冠之所出風化之所生奈何民阽死者積年政弊極之有日治期清静無如宰牧之良俗久浮佻冝審急先之務况仁深改革意切矜憐固非賤子之當陳諒以愚衷之所激伏念某三尺微命一介書生慚非適用之才素負讀書之志無繩以繋白日昔年甘落佩之遷披霧而覩青天今日有彈冠之慶且平昔想聞其風采况終身得為之主盟為喜可勝所憂一寫聞風興起已空北海之濱杖䇿來歸獨愧南宫之謁儻預䝉於剪拂庶得免於駑駘所願無他其心止此借齒牙之餘論煦枯槁於寒鄉燕麥兔葵尚冀春風之摇蕩鼠肝蟲臂敢逃大冶之爐錘庶將螢爝之微仰賀風雲之未過此以往不知所裁某頓首再拜冒凟尊嚴不勝戰慄之至上姚敬齋啟中統元年七月六日席生王某謹齋沭頓首再拜致啟于尚書宣撫先生閤下伏審九天頒詔側聞方岳之分臨四海嚮風喜見太平之有自顧惟孱劣曷勝提撕况朝廷方𢎞治之辰而州縣以得賢為急須獲𤣥徳升聞之士可副大人吐握之懐如某者禀性疎愚與人朴直斷無它技徒切休心爰自穉年特乖庭訓雖讀書鄉曲謾攻童子之雕蟲及學道蘇門徒竊孫登之吟嘯因沾餘溢得列諸生然固窮不輟於絃歌念來事可為者忠孝吾將仕矣未見其人葢女為悦己者容士為知己者死俄瑶翰光臨於圭竇見先生樂育之素心為喜可勝所憂一冩何乃至於此蓋有激而云身賤貧而處世無聞跡泥塗而遇知為貴若夫燕築臺而師郭隗豈天下之無人備奉命而奔孔融所喜世間之有已將摳衣於不日終瀝膽以謝誠伏惟閣下學際天人材兼文武幾年潛邸一變經筵儀表四方股肱元聖方棊聞㨗偉謝安雅量之雍容抗表出師見葛亮忠規之逺大以致佐命收竒功於六詔除殘僨封豕於三秦盪平青海之波濤補就蒼天之日月方聳馬空於冀北首令詔撫於山東杖扶戴白之疲癃春動百城之草木欲隆承流宣化之權故擴併採兼收之路慮一夫之不獲念小子以何堪戴徳若天醻恩無地比遂掃門之役庶堅磨鈍之情利一割之鈆刀享千金於弊帚翮知短鎩敢圗運海之鵬程言至再三恐辱知人之藻鑑過此以往未知所裁上張左丞啟中統元年六月日衛人王某謹齋沭頓首再拜啟事於中書左丞宣撫相公閣下欽聞明詔來鎮雄藩凢在提刑咸増慶抃謂天下大統也尚建侯而不寧初無中外之限方岳至重也惟得賢而俾乂故咨帷幄之臣然念徳非盛大不足以鎮壓夸毗量非𢎞深不足以包總細大才非經綸不足以酬事變望非崇髙不足以饜人心恭惟閣下徳冨天􅂜才為世用望出中朝之勲舊量涵萬里之汪洋兵濟長江符羊祜抗章之志龍興代邸偉宋昌獨㫁之能故得雨闢雲開陰消陽長雷霆驅號令之威朝野擴綱維之治繡衣南下實承流宣化之權蕭斧西臨正摘伏破姦之日而今况河朔數路懐衛兩州世官有晚唐擅據之强風俗近天寶塗炭之苦穢彰隣邑政出多門其為害也權在吏胥之手賄甘黠傑之心敗類者能先去之善人者其自存耳以聖世求直言之士故愚儒及舊政之非伏念某一介布衣半生文吏顧其時之可出念所學之無窮北闕上書愧乏馬周之志南山種豆每懐揚惲之風觀化明時㳺心至道不求鳴於時相終混跡於常流少得見知侯喜顯名於韓狀如䝉所請曾㸃終老於孔門過此以還未知所措授翰林學士同知制誥兼充國史院編修官謝中書省啟中統二年秋七月廿九日王某謹齋沐頓首百拜奉啟事于中書門下伏以㓜學壯行乃吾儒之常事位尊徳薄實君子之深憂况禁林乃清切之資而自昔極人文之選如某者性資樸魯學術靡蕪㓜窺篆刻之文稍服鯉庭之訓而藏修蔑有其素徒佔畢不去其心血指汗顔竊弄栁州斤斧屬辭比事略窺左氏門墻賴鶚薦之先容致嚢錐之立見幸遇鴻熈之世來觀上國之光自嗟坎井之蛙日侍幕蓮之地時乏駿足用駑馬以代馳筆悞素屏㸃蒼蠅而成質方退南飛之鷁重留西掖之垣几筵預使席之榮行李致館人之意念朱雲之恥吏哀王孫而進飱顧影自怜捫心有託特以見知之厚遇不無立仗之長鳴苟丐虛名盡光歸路豈意誕膺綸命峻陟文階忝分蓮炬之光得與玉堂之選固不能奮陽城之觀望無乃自郭隗而權輿儘不負十載夜窓燈火之勤足以瞑九原先子之目其榮已極夫復何求兹盖伏遇中書相公閣下柱石中朝風雲潛邸羽翼四人之勲業文章兩漢之精華秩乃代天門無弃物父子傳温國之學書史備鄴侯之籖公將權衡彼自為之髙下信如寒暑卒皆遂於生成豈謂帡幪䕃及蕭艾某敢不勉修士行恪守官箴仰酬雨露之恩俯荅丘山之徳蓬蓬運海固敢期九萬里之程碌碌因人庶不在十九人之後過此以往不知所裁謹奉啟事以聞王某頓首再拜青詞齋意旱氣隆蟲厯三時而已逺守臣惶懼顧大責之難逃輒先榖雨之辰敢罄雩求之懇預期以告於禮則冝祈雨青詞恐懼自修災有可消之理敬誠斯在天無不饗之心伏念臣惲素昧臨民叨承總寄每荷登穣之恵庶寛撫字之憂爰自去秋迄于今嵗風霾蓬勃生意焦枯時疫大興秋種未下氣將交而寒薄雲己合而風醨既走郡祠載呼洪造恭輸至懇光啓靈壇集道侶於琳宫宣琅函之真誥伏望九天降監列聖垂慈分勅山川之神普下雷霆之詔風災一返膏潤咸霑使春事無訛喜動四郊之耒秋成有望歌賡髙廪之詩臣無任瞻天望聖激切屏營之至祈雨青詞伏以萬物盈於两間亭毒必資於帝力皇天祐于一徳髙明庶格於精誠比者時雨愆常秋種不下重念無辜之衆將罹飢饉之災用是罷將作而弛土木禁市酤而重餱糧循省自修冀回哀眷氣將交而寒薄雲既宻而風醨適當龍見而雩爰致桑林之禱恭延真馭崇建靈壇伏望列聖垂仁九天降鑒易陰陽之恒數幹運化之𤣥機下勅豐霳霈流甘㴻蘇槁麥於南畝播嘉穀於東郊一滌風霾溥含生意豈惟大賚三農免失業之憂嘉與多方髙廪享有年之慶祈雨青詞天地乃萬物父母忍饑饉之荐臻風雨為一嵗咎休顧得失而與應念守臣之不職致春旱以為災終風且霾種不入土近雖霑其濡潤終未至於滂沱二麥就枯羣情懐懼念鰥寡無辜之老有溝壑立至之憂既走郡祠載籲𤣥造瀝愚𠂻之至懇建雨部之靈場伏望真宰鑒臨髙穹陰隲溥同一視之仁大霈如膏之澤興嘉苗於四野際和氣於两間庶寛轉側之勞共慰徯蘇之望所有報禮其敢後歟為春旱蟲災青詞伏念天聽雖髙惟至誠而能感田功未即繄歲事之可憂敢瀝丹衷仰干𤣥造兹者自春徂夏時雨愆期荑桑捲而步屈為災嘉禾槁而風埃蔽野吏則不徳民將何尤非恐懼以自修將藴隆而曷已爰差榖旦乃建靈塲延致羽流恭修法供應蒼精之昏見冀誠意之孚通伏願列聖垂慈九天降鑒俯回哀眷霈甘澤於一方丕顯神功享豐年於髙廪齋意伏以驕陽恒若時雨未沾嘉禾槁而耕壠如焚步屈災而春蠶闕食齋心預告於禮攸冝為張縣尹吉求嗣青詞伏以不孝有三身無後而為大輸誠儻至天雖髙而聽卑敢瀝丹衷用干𤣥造伏念臣某一行作吏壯嵗當官久居簿領之間未免輕重之悞或養志罔終於恃怙或臨民多靳於哀矜以致二子併亡半生惸獨自孽難逃於陰譴隐憂忍及於先人敢資惟惠之仁爰謹籲天之請敬陳清醮上叩髙真伏望大眷垂哀憫孤影零丁之苦維羆應夢廣一門嗣續之祥為鄉人禱疾青詞伏以民固多愚匪易天心之感老惟欲逸何堪豎疾之嬰髙以聽卑用伸懇至伏念臣某生居市閭長失義方凡有作為不無過咎或營營於窺利或昧昧以馮生正以貪癡愈深罪釁又縁移徙多所紛更穿掘既發其盖藏修治悞衝其禁忌以致災徵未己病日彌留和豫既乖眠食稍廢捄藥徒為之瞑眩朝昏遂苦於呻吟伏望上聖垂慈髙真降祐庶憑仁覆得䝉羸劣之安言念愚衷永謹省修之戒秋澗集卷六十八欽定四庫全書秋澗集卷
