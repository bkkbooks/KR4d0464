body:
  text: 題蘭氏三桂堂字説手卷當時山斗仰蘭公此日開封有父風著眼讀書堂下去又㸔三桂發春紅著一作放題玊局公所畫竹石秋壑家藏此老何心作此君一枝中發錦江春無窮露葉烟梢意散作先生百億身闗河形勢圗闗河百二控秦頭滿目斜陽獨倚樓設險守邦須尚徳毎多吳起説文侯秦川展掌華山髙千古闗河締構牢早晚去施通濟手浮航如畫鎻驚濤壓闗樓上醉憑欄一片黄流入㫁山彼索此疆俱寂寞山河空鎻夕陽閒解鞍圖川流縈帯燒痕青萬帳風煙扈漢營長記散軍郊射罷丹青圗上㸔升平蕭蕭牙帳野河春羽獵歸來日未曛轉放畫圗還記得二年鞍馬過牛羣髙空雲逈射鵰還細草平沙困解鞍醉裏清寒将夢去春風吹雪㸃旗竿題黄閒飛鞚圗金錯盤陀絡玊鞿春風飛影下瑶池丹青明見臚傳意花栁深宫燕八姨年年十月幸温湯詔給辭臣半驌驦最見流雲瀟灑處津陽春色曉蒼蒼讀唐武后曌紀秋日花開未是災有𤓰無可摘黄臺鎻間辦著青蛾笑争指朝堂鬼朴來讀狄梁公傳魚鼈霑恩徧九垓鳳池春色接鸞臺敝袍不染梁公血辦作幽囹一聚埃二馬圗振鬛長鳴萬馬瘖肯教閒損絡頭金多應縱駕華清去飛過宫前御栁隂讀富鄭公傳奉詔東來止􅀦門悔将威克動嚴宸繞爐不合終宵眼六丈方知是聖人玉堂閒適圗醉岸烏紗殿影東宫花低映酒波紅興來草罷長楊賦獨占髙槐灑晚風淵明漉酒圗此圗以氣象筆法較之恐是王雲筆也雲秦人意象多偉麗而少雍容余嘗觀斬蛟及内殿横吹等圗故敢指此殆雲之筆也然近代以來如雲之工者亦不可多得云秋澗老人王惲序牀頭新醸漉來空清濁君㸔固不同門外征車揮已去秋香籬落醉西風紛紛葛屨雜華纓何物衣冠可重輕莫若脱來還漉酒一杯時復聖之清􅐕田一粒不霑唇嘗恐春醪負此巾儘著輕紗渾溼却尤勝憔悴染京塵停雲時鳥日從容長在先生醉眼中劉宋禪來非一事五株楊栁自春風蒲輪逺聘亦濃恩處士雖微實晉臣嘗愛紫陽書法當不教輕染寄奴塵荘宗横吹圗郭相西征奏凱還阿嬌歡寵鏡交鸞却嫌暖殿春風燠玉管横翻曉吹寒霸業艱難百戰開侈心何苦溺優俳豈知兩部仙韶器總是君王火葬材繼周南樂見寄嚴韻長慶詞人興寄長當時元白鬭軒昂江山正有潮陽筆千古詩壇自一行一作細嚼君詩興緒長孤吟空效鶴頭昂解教老媪能通曉留與香山作雁行莫嗟朝鏡鬢毛霜總道寒花晚節昌一級散官増正七三升春酒醉公堂茒亭秋月水天上下月微茫冷浸茒亭夜色蒼我欲去尋幽隱客一天風露静琴張括諸山水勢兩分冀北諸山水兩分山西流注㑹龍門脊東衆壑歸幽野號作桑乾入海奔復作詩以贊之職方引據説空繁到底終無一定言愛殺九峰真具眼髙空直下㸔中原寄馬左丞子卿士達察判行求先容不敢書謹以亂道二章聊代起居之問且奉一粲云治道原來有本根聚精多在鳳池春近因拈出中堂記滿眼經綸半魯人一别春坊嵗五過向來心事總蹉跎遥憐紅藥堦前露霑丐茆茨意最多學圃亭崔君隐徳老談經俯仰乾坤一草亭莫為處心親細事正宜烹煮削蕪菁桔橰上下任畦丁春韭秋蔬用不勝若向邵生親問訊𤓰田風味勝東陵明農數事稱周宰抱甕澆園説漢隂兩事若論為拙計空拳搏虎更何心庾郎三韭種來青鄭老秋𤓰結已成食肉飯蔬原有分不應空戀五侯鯖鄭老謂𤓰州刺史審也東鄰近接香山里南浦今稱處士涯活計㸔來原不惡自鋤明月種梅花題紅葉扇頭故宫秋色醉來鮮浥露吟風雜暮蟬折得不浮流水去一枝留伴月中仙深宫不禁水東流賦就幽情孰與酬紅露滿山秋正好等閒休上建章樓今年火盛若為攻盼盼西風一掃空忽見扇頭紅錦色上陽秋意滿吳宫雅歌一十五首并序雅歌者為丞相武公作也公經畧河南之二年有詔上計行臺時權臣承制威振中外拭吻磨牙婪婪横噬凡可以中傷羣辟者靡不畢至公以大忠致謹乃心王室斂衆人之責為己責以天下之憂為己憂一身利害略不為恤也盖欲俾朝廷上存公恕下不失民心為重其大節有如此者竟能感格帝心恩終簡在自非精忠貫日其孰能與於此哉所謂臨大事處大變而後見其真将真相之度焉因追作雅歌一十五章庶㡬流播斯美使後人頌而歌之顧望若神人然其辭曰讀來黄卷有深功都見平時日用中朝下引車常慕藺行間㧞士毎知蒙隂闔陽開制總司諸人何與到傾危微臣有罪天王聖不患朝廷逺不知衮冕桓圭極品榮較來得失一毫輕空傳馬援囊珠謗終見汾陽貫日誠天蓄靁風未動威棲棲遵渚歎鴻飛見知正頼龍庭帝笳鼓歸來有衮衣萬馬蕭蕭入漢巴行臺東下控中華方思霖雨須賢相豈特春風動虎牙萋菲方成貝錦哀睿思熒惑若為開天教中令心如日几几俄瞻赤舄來品彚流形共化權嵗寒都到老松邉欺殘太古隂崖雪始信貞心老更堅儀比鸞凰重比山功髙心小古為艱平生幹當江南事事了聲名兩不闗羣飛鎩翮入􅆯羅棘上青蠅訝許多良玊儘禁三試火周人坐搆百升歌亢則憑陵懦則摧秋霜中烈外低徊虎臣剰有回天力更著閹兒與孽媒拓境毎憂王土窄息肩思與萬方休生平戀闕丹心在風雨何傷一葉秋身任安危五十年老臣懐抱若為宣始終正有汾陽夢不到江湖范蠡船長圍破蔡仁聲著積榖吞呉策畫深三十年來分閫地智名功勇總無心長憶中堂掌固初宛陪髙歩在亨衢百官禮絶真除日門閤蕭然一事無釣魚山下護龍旂嶓冢江邉奏凱歸一馬二僮東下日路人拭目認征衣丁亥嵗門帖子坐賈謀生計已癡歸田無力理耕縻一家風雪渾閒事四海豐穣是素期汴梁故宫寒食人家賣酒繞宫池爭插青旗曲作圍簫鼓漸多寒食近一樽先為典春衣熈春閣傑閣當年燕御頻鼎煙未盡慘兵塵土堦三尺茆茨底人自熈熈物自春倚竹圗錦字挑香翠易顰一枝修竹立湘裙定情正在氷霜操不到琴臺日暮雲粉香沾袖怯輕寒都著幽情寄竹間多是楚山湘水怨不應空待賣珠還己丑嵗門帖子大郎赴部應求叙老子傳心要醉經二事儘能如所願一家編簡有餘青韓生寤寐春秋學陳儒薰酣寳訓文磨礪童孫能寸進一家春滿㸔祥雲題顯宗墨竹撫軍闕思到湖文筆底秋筠見本根絶似承華檻欄㸔露梢煙葉總龍孫堯民圗日出漁佃日夕歌蠶衣耕食樂天和細思厯象星辰外帝力於人更有何己丑五月十五日過王氏祠堂兩軒梅竹足興哀親見春山手自栽前日問安人不見翻翻風葉送愁來兩世規模有逺圗轉頭庭樹影扶疎顧瞻阿大中郎􅒰信覺嵇公徳未孤巢父飲牛圗濁泥常恐汚吾牛特地駈來飲碧流縱使許由辭位去汗顔終是對宸旒耕田鑿井不知勞長恐逃名未得逃最喜帝堯平治事一犂春雨滿江臯徴庸禪譲兩無心駈飲時過碧澗潯若見後人牛傳事入山惟恐不幽深舜授堯傳兩不聞最憐牛力晚來新一鞭了却東臯事潁水箕山分外春若訝箕山易所操雖辭堯譲匪吾曹桐江江上垂綸客一様清風萬古髙清明後二日南莊拜掃回偶占寒食人家節已過秋千猶在院東坡今年春日光風好拜掃歸來笑語多野叟争求醉筆新因書聊歇酒杯頻勸農説有新冠盖要識君侯是老親送𦵏挽歌髙墳嶣嶤沒荒草白楊風悲和鬼歗人生到此是徹頭一倒灰塵無醜好祖筵纔徹哀號起翣栁多儀殯蒿里向來送者各還家𠖇𠖇獨卧黄泉底人世何短白髪多駒隙光隂不奈何才見春風吹草緑又㸔庭樹葉辭柯人命輕微如薤露百年歡樂能㡬度森森鬼伯若來催相将共入黄壚去哭聲交慘簫笳咽樹架争嚴縞素餘昨夜髙堂猶暖熱今宵荒野恨何如相将執紼送華輈母子恩深哭不休報徳不銷埋石痛低空還有㫁雲愁方相擊凶魂攪馬閭里親知滿中野只知哀挽送行人相㸔誰是長年者細君推氏哀辭神情减自女拏捐病後支持又八年最著老懐悲悼處死猶知惜畫义錢性姿貞静伯姬恭四十三年好夢空一閟夜臺無復見悲聲留在白楊風斂來三夜夢平生眀説先姑已侍行喪稱有無能戚了何須易治太經營中堂北隩挂殘䰟戀戀情思在子孫奉祀更當嚴在日忍令哭臨限朝昬水西原上有新塋三世親䘮力助成一旦夢隨先妣去有知當慰未忘情纔過彌誕無旬月遽變辭容只兩朝寳靨暗留嵓菊細黛螺空見逺山遥營葺貧家鵲有巢百年心事憶同牢空餘深夜回溪月獨見淩波采澗毛六十難為夭折悲百年偕老是同期篋衣滿意遺薌在空結纓褵九十儀病倚中廬望大兒娟娟心目已難支朦朣帳影魂衣闇腸㫁燈前擁髻時暗用通徳悲野田荒草事去年扶病到新塋歌管杯盤水曲亭今日重來人不見杏花零落栁條青素棺已盖鋪丹旐舊物難窺瘞玉臺苒苒縱隨仙馭去珊珊猶憶夢中來将持仲子庶同嫡主葺貧家儉作豐存殁較來無少慊正縁余厄致終凶恩榮頗浹魚軒貴禄食同霑石窌田忍死最憐相叩問六旬之上有餘年舒徐委􅍤澣餘衣能盡桃夭灼灼宜四十三年中饋地儼然宗祖饗多儀團圞香火坐庭闈欲話平生氣已微生死慮來真大事㡬回含笑説先歸逝水碧縈長寝地畫簾香暗送時車閒忩不待粧奩感遺恨空存禱嶽書百年同穴是同期一病彌留秋草萎垂老境中成死别九泉相見話真知緡錢灰冷過黄昬閃閃寒釭閉閣門只有此生來夢裏㡬迴含泣認離魂健婦治家勝丈夫維君真與健同符半生黽勉公家事一米私門不累吾勸余過飲省文思切戒無多酒後辭翁媪老來惟我爾百年門户要扶持蘭枯􅈍槁不禁風一夕吹香入殯宫把酒試澆橋下水不容将恨到湘東當餐愁對齊眉案升屋空留復魄衣誰遣兩行知已淚浪浪併向老來揮薦蘩人去考堂空内助功多想肅雍説似老荘休鼓缶固無形氣奈情鍾壺漿朝奠愴蒿焄露溼衰衣半淚痕毎囑兒童莫歸早水邉恐有未招魂忘懐無似老荘盆使作何知委路塵詩到悼亡能自釋情文相稱是安仁禰殯親遷𦵏百泉久謀銘誄入瑶鐫君須少候無多恨行見貞珉表墓前長筵拜慶諸姫上隨宦名邦二紀間秋入池臺芳徑歇春歸庭院落花閒行來古禮不多難含斂堋藏淚涕潸莫訝初終無佛事此心求在有無間衣衾棺槨無遺憾親戚悲哀有至情四十三年庚子月西河原上𦵏先塋李早蕃馬圗羣奔角壮任郊坰已入竿頭莫力爭惜取蹄間三丈逸望雲秋計鐵山程䟦藍闗圗潮陽英氣凛中天愁絶南荒瘴海煙不道生還隂有相自陳哀表亦堪憐曉風吹雪下闗頭㸃綴行人去􅀦愁展盡畫圗還自惜七閩南下即潮州題趙克敬遺安亭襄陽苦節説龎公趙氏貽謀意與同肯羨東鄰驟榮貴轉頭歌舞畫堂空趙生卓爾見青衿及長行身稱克欽為問遺安安所止一家鴻鵠住髙林題張氏致樂堂生前菽水儘餘歡身後追思世所難誰似考城張孝子至今供具潔盤餐刻桷丹楹燕寢新食前方丈處華裀一杯不及慈顔樂負米終慚季路貧夀萱亭葵丘張氏孝無違終嵗承顔着彩衣入户僾然親不見一簾風月澹春輝凱風吹棘棘心柔罔極恩深痛莫醻不羨潘輿花滿縣一枝金鳳儘忘憂潘店早發一鞭行色甌閩道過處人多説險夷忠義此心能自信風波前路不須疑儀封三代漸民道義深抱闗疇匪大賢心披雲纔遂瞻依願便解天教振鐸音睢州道中馳傳北經梁孝苑垂鞭東過宋襄城征人折盡隋堤栁風捲枯蓬逐馬行汴堤近自汴州開夾道逺連淮甸卧長虹若論往返行人便道在勞民却有功寜陵縣早發殘缸斜照耿孤懐夜火吟餘氣頗諧睡暖不知霜力重起㸔梧葉滿庭堦蕭相􅀦廟海㝢清澄入帝圗忍将牛渇飲泥汚不思世教從中降得約秦苛意儘都聞畸人話芒碭山事芒碭山逺欝蒼蒼㫁口雲連十里長兩段素蛇今化石至今神異説髙皇望碭山縣有感裴劉起義晉陽宫三百年來立􅀦雄一旦剪除無噍類厲階誰想在全忠宿州道中辟寒宿酒多難醒數堠前征覺易行前去維揚猶七百黄雲衰草宿州城樓子店道中汴溝已是荒亡跡湖石重開禍亂基徽煬較來同一病九泉相見不相􅅓敗門無策更開邉萬石移來起艮山天意固遺亡􅀦恨兩堤秋草卧孱顔虹縣道中度長直溝望入綏寜接楚雲老婆山逺界溝鄰小河河上淮東地萬頃黄蘆不見人渡江生平夢寐𤓰州渡此日風煙指顧間却恨中流風浪惡雄觀應欠上金山潤州甘露寺近為火焚掃地望空北顧無雙寺行入西津第一州江影隔山摇素練行雲和夢鎻朱樓桃源圗劉君卿索賦淵明既號葛天民流水桃花到處春明見筆端閒寓興武陵休苦殢漁人東來連舸泛長湖兩鬢氷霜儘瘁癯偶值漁郎心已媿更堪三復武陵圗浙西到處武陵溪稍渉幽深路便迷始信避秦原寓説淵明遺世更羈棲虎丘寺真娘誰為惜娉婷李白題詩在竹亭為洗鷓斑金縷盌細烹泉眼較中泠姑蘇館夜雨呉亡越霸兩蝸争朔吹翻江恨未平一夜不眠思往事姑蘇臺下雨連眀宿寒山寺借榻僧忩夜氣清梅花香細燭花眀鐘聲不取唐人例一覺安眠徹五更伏生授書圗遺書灰冷散飛烟老喙重宣即粲然三策竟從名數説潁川方寸殆虚傳題醉隱墨竹清溪映竹竹連雲苒苒晴梢醉墨新却為嵗寒心事苦暖烟淡濃要横陳露梢風葉喜晴春醉掃吟㸔卧竹根欲見此君生意盛滿川煙雨半龍孫西湖一湖碧水山三面滿眼樓臺堰一條只為近年荒廢久花無容色竹無憀飛來峰西湖廢撤無多景靈隱荘嚴有勝幽扶杖冷泉亭上㸔日斜猶為此山留靈隱寺山縁松竹烟光潤寺倚峰巒地位雄凭檻忽驚靈鷲上世間真有化人宫旋開僧牖觀山罷閒逐遊人㸔寺迴買得兩錢乾菓子歩穿經洞引猿來錢塘噫流無壮浙江潮刀削銀塘甃碧牢三十里長無兩用既防崖路障驚濤錢塘西岸市樓接望無三里嶺嶂迴環自一川曉日人家炊爨罷竹籬香滿碧松烟人家邸閤絡江臯十室㸔來四五逃閒向老人詢所以近縁軍過苦相搔富陽縣㑹江樓山光簇簇無連嶂江水瀰瀰漲碧瀾何處風煙見真境富陽樓上倚闌干冨陽道中兩浙風煙入富春眼中形勝鬭嶙峋一樽不吸江山緑笑煞桐廬把釣人江山畫裏㸔清雄魚稻鄉中樂嵗豐不是釣壇壇上客未能忘此就三公早過新城黄山鎮二首水無絶壑山無麓春麥收來秧稻榖行穿松逕㸔烟巒一段碧紗籠水玊奥溪引作長畦浸宿霧空濛破墨山馬上不知行役倦村村都在畫圗間白峯嶺儀曹苦厭為山囚霧幛煙屏㸔未休行過白峯三十里桐廬江上重回頭七里灘桐廬江水緑于藍兩岸山攅碧玊簪前去釣臺猶數里兩峰竒石見巉巉共惜殘年得逺遷豈知天意却相憐筆頭少得江山助便遣空迴亦愜然嚴州道中髙盤山頂下深淵馬足長驅不易前幽鳥背人飛去速一聲津鼓突江煙叢叢吳岫煖煙生峽束江奔徹底清斜日篙師催進棹三灘難上要雄撐蘭溪縣女歩道中豫樟蔽日無黄落竹篠經霜更碧鮮記取江南光景異煖烟晴日是冬天三河道中龍丘風土類中原兩勢山開百里川白鷺水田摩詰畫桃花溪洞武陵船龍游道中路入龍游不見山縱横阡陌縠江邉穿籬臘笋如槍矗夾道寒花似火燃龍游道中聞鴈避寒來趂稻粱肥水逺山長結伴稀已是江湖逺行客一雙猶是向南飛西安道中衢州屬縣西安荒惡路清寜水泛山行夜不停却為近來山冦發大眀猶未撤闗扄紫溪嶺紫溪梯嶺一層層况復鞕羸帯雨登頗笑此山藏行迹世人曾不峻為稱昔杜止軒告余云楊西庵俠黠談諧之雄者也世人不知其然不肖何有竞負天下滑稽之名楊何深而僕何淺也予謂分水與紫溪嶺亦然分水雖大平而易登紫溪雖小峻而難陟今世人以大安至險可畏為言而紫溪畧無聞焉與杜顯晦初不殊也車盤嶺時沾窮臘天多雨路轉巔崕險可驚辦着壯心時叱馭兩程併作一程行武夷山朱文公書院在焉紫陽集裏已曾遊此日輕舟過山右摳衣不獲拜遺祠武夷一棹空回首建陽道中二更到縣山溪流急逺聞聲月暗林深信馬行衆宿斂芒南斗大半天驚㸔六星横謝朱詠道山長來訪名沂今為亭山故縣經兵廢不存考亭依舊泰山尊南來有幸猶親炙得見先生四世孫八仙驛灘峻渦旋陡下危柁師招處和聲齊八仙驛畔山如畫一棹清風下建溪劍浦湛湛雙溪劒浦秋張華祠下更深幽神兵不著奸臣去真是蛟龍亦可羞李延平道南書院延平名侗晦庵之師延平劒躍蛟龍窟黯澹灘危灧澦堆二事聽來皆野語道南書院重徘徊髙桐道中梅花如雪小桃紅夾道修篁翠幄濛折得一枝春在手蠟香吹滿馬頭風上水船亂石叢堆積鐵然湍流翻雪沸洄淵半崖匍匐人如蟻百丈驚㸔上水船杈洋鐵喻篙師紙喻船上灘難比下灘難傳呼緩棹蘭橈去路入杈洋要細㸔蒼峽道中雨後㸔雲滿嶺閒㸔雨後雲空濛疎薄畫難真蒼山巧露青蓮色都著銖衣掛法身蒼峽鎮雨夜地連呉越已夷蠻蒼峽東南更二千鄉夢不成非野宿雨聲還向客忩偏摩天嶺寒雲直上㸔髙層峻極諸山莫與京不作閩清具瞻物摩天空擅最髙名秀才嶺西登盤上卧羊坡東降平川谷口蘿為問蒼巔髙㡬許微行人指樹頭過水口山路捱來僕馬瘏方舟南下頗安徐摧摇柔櫓嫌曛黒行趂漁燈一㸃孤小箬冬陽暖透征衣燠溪曲寛從水口開夜半朔風吹月墮臘寒還逐早潮來湯池湯泉為説盡唐庚一脈温從地氣生滌浄世塵初不汚根源方信本來清甘蔗洲山眀溪静絶纎埃望際川原四面開忽訝兩涯風浪湧舟人云是海潮來雨中江行望甘蔗洲方舟摇颺櫓聲齊細雨篷忩㸔岸移望入蔗洲何眇靄霧江平抹白煙癡懐安縣縣依溪曲兩岡蟠翠竹晴沙轉雪灘前去郡城饒候迓官儀都是夢中㸔總題無窮山轉青龍峽不盡溪蟠碧玊潨西自鎮江南抵福三千里路略相同義門任氏詩并序燕雲風土雄碩故其俗純厚多以孝友稱御史藺君寳臣屢談於余吾鄉有任著飛卿者樂讀書其家風義尤為昭著至三世同爨鄉鄰化而慕之願得一言發越其微因賦二詩于以見蒸蒸所自且勉夫錫類不匱之心焉燕雲任氏世同居和氣薰然樂有餘春在紫荆庭樹底緑隂初不見扶疎一門髙義冠鄉鄰累葉相承棣萼春不學張公書忍訓友于原是孝心純秋澗集卷三十欽定四庫全書秋澗集卷三十一元王惲撰七言絶句遊福州東禪寺闕望鼓山泉流
