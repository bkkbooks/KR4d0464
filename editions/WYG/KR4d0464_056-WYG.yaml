body:
  text: 大元朝列大夫秘書監丞汴梁申氏先徳碑銘并序大徳改號歲之六月越二日癸巳秘書監丞申君敬先詣太史王某再拜而請曰惟申氏逺有世緒逮我先人學紹醫傳心存道濟惠及一方雖遭罹世故譜牒墜逸然自高曾而下班班可考而墓隧無銘神道闕表予小子大懼先徳日遠恐泯昧將無以見於後今粗有纂述俾昭示子孫以傳不朽者敢請筆於下執事某以不敏辭者再請益堅乃為論次之謹按申氏世居汴梁曾祖諱天禄宋徽宗朝以嬰兒科供奉内廷門以金斗為識當時稱揚醫藝精全者有金斗申氏之目宣和末避地家秦州社樹坪祖諱良輔早以方􅇊知名西土祖妣馮俱壽終葬天水郡顯考府君諱仲康字西叔資禀寛裕有長者風弱冠值金季流居陜虢間天兵下河南愛申裕問風土衍沃定謀卜築以甲寅歲東徙今遂為南陽人府君世其業禁方秘訣夙承指授復為該洽軒岐以來其書奥妙悉精究其理學既博􅇊益工在醜不矜其能活人不期其報過客病困逆旅及貧無資者家置病寮躬進湯劑糜粥既平復量給路費以遣之遠邇注瞻以材徳兼稱如南陽富民孟氏夫婦府君以伎能起其死約兼金乗馬謝後恬然不為禮或者不平對府君詬之曰醫以濟物為任若貪圖貨物為心豈天生俞跗保全夭閼安羸劣之意哉子無復言客歎服而退初府君東徙聞盧氏守將堯里公賢而下士往依焉草昧際舉族賴保翼一夕宋冦奄至執堯里而去以不屈遇害熊耳嶺府君聞之糾合義勇者數十輩匍匐奔赴求得其屍葬祭迄成禮兵後内外宗姻散失者衆求訪不少置得姨之夫樵翁於申女叔於穰下既孤且窶收養終其身平生行義類此甚夥今特書其顯著者識者謂府君為善不近於名尚義不謀其利躬弗受祉後世其興乎以至元己巳歳季夏十有八日考終牖下享年六十有七配宋氏系出京兆大家資端重未嘗露嬉笑年既笄歸於我侍舅姑以孝敬聞鞠育諸子極於勤苦後八年以疾棄養壽七十一祔葬南陽縣東泓河之右薛家里子男六人曰政嘗監郡酒稅曰整河渠使曰敬即敬先曰教早世曰敏江陵路醫籍提舉敬先性資醇裕醫學明敏切脈審用藥精至元六年選充太醫世祖皇帝巡幸兩都北狩東征典司藥石皆侍其行嘗于御前修製湯劑品藻藥性敷奏有條理上顧而喜曰汝身雖小口甚辨博又敕治元妃疾獲良愈蒙賜玉鞶帶白金有差至元廿七年由御藥院使陞授朝列大夫選丞祕省旌宿勞而從公論也自昔銓衡經制以方􅇊進者雖有殊勤不轉文武正班敬先讀書勵行有士君子之操故膺是除由是知揚厯清要光顯於親者越兹伊肇敢以府君之積德起宗敬先之肯構克荷者而銘之銘曰醫師之良本天恒徳挾藝時行心貴專一其視患者罔有莫適一盡我誠庸表怵惕顯允申公秉兹良直四世三朝職司疢疾神砭易形靈丸起廢藥惠一方心深道劑羸劣獲安炯我風義活人活國是乃仁術隂積孔多陽報斯必篤生六子季實良器大我醫門學稱善繼藥籠流光馨融帝室六脈和平聖躬福謐三十年間祇勤厥職維皇念功寵數優特簉名仙瀛圖書東壁紆紫腰金揚休山立匪汝是私良用勸激蒼烟故里光賁丘石刻我銘章有煌中國獨山鬱茂白波蕩潏山川鴻濛慶鍾來息子孫振振垂裕罔極大元故奉議大夫中書兵部郎中韓君墓碑銘并序亡友奉議韓君之子沖既禫來謁心焉愴慕有慘而未安者乃出所狀父行曰孤不天先人早世平時所期者遠大挾其所有以前而車傾半道念所銜曷袪惟是發越潛徳使表見於後庶存歿少有攸慰公與家府君交敬而知為詳敢百拜以墓碑為請予以義以分有不能辭者遂追敘而併銘之君諱天麟字伯昌姓韓氏世為漁陽上谷人父琇為人長厚儀觀秀偉少應武舉金季嘗以勞任慶陽府司録判官母王氏誕昆季四人以次君為第三母以克肖故尤所鍾愛長業法家學即能觺然見頭角於輩行間師以能稱之及為郡法曹獄無大小皆悉心極慮必盡彼情辭而後已時有楊參軍者詐冒兵儲公易市户事覺朝遣官來鞫逮捕者數百家弊積有年不易措手知君幹蠱摘之倚辦楊既窘蹙無可得主者悉取償糴家價從時重君曰不可盜糧者已有主名百姓初不預知今從坐配償已是虚負取價合准出倉時估不然將有破産不勝其弊者上官從之衆得以輕脫至元二年辟充懷孟路從事四年勾補中書左三部令史八年由考工轉御史臺有訴民自關陜來未經有司者議不受君執之曰民豈不知此顧憲臺為重因而拒之將無所控告罪彼越驀理其寃抑可也事多解釋以能遷吏禮部員外郎遂建言隨朝掾史已有出職定例外路吏資亦當與議使至公均被准其事行焉未幾遷奉訓大夫出為瑞州路别駕俄超授奉議大夫常徳路宣課都提舉先是亡宋稅塲濫收奇零等課名類甚多君稔其擾曰生財有源初不在此使到官者𣙜之有法所獲多矣於是六色正額外一切蠲去常人稱悅及比附上額羨果倍蓰時方夏官徵民負租追呼鞭扑急於星火君就府僚與議曰今新陳未接人餬口不給兼積久數多非一朝可辦急則必倍息取貸或易及男女若爾是富益巨室怨歸公家非特於征商有所悞也稍俟秋成徵之未晚用是以停征八番大軍道鼎民被騷甚且沮恢辨有司噤不敢誰何君詣行閫陳說主將喜為約束之市肆賴以帖其乗機應變輸誠濟物多類此政籍甚而課最省臺交章薦入授奉議大夫中書兵部郎中尋被檄檢覈河漕回次濬之劉家渡以暴疾卒實二十二年乙酉歳八月七日也享年五十有九以是年十一月壬午葬郡西南親仁鄉康公里家塋慶陽府君墓右從溝合也君氣志明辨有幹局善當官好持論往往出人意表其起身立事不資藉昆弟恥踵跡人後氣之所充力所必至卓然自見於用者蓋天性然初韓氏北故後居衞生事微父俾之經商辭焉曰從政固所願也及顯達分有所資悉推讓不一毫取鄉黨義之又排難解紛樂與人為善教子讀書惟恐其不至配孺人梁氏元帥瑀之長女生子二人曰沖從事郎太平路經厯曰中御史臺令史繼志治家大克播構曰燕曰梅童皆庶出四女已適名族者二二未笄銘曰維天生材畀世作程吏以事主尤資者能理具氣先浩氣廼形倬彼韓卿氣志蠭閎揚厯臺閣外彪中弸初轉相府樂夫有行庶單厥心豈惟祥刑彼良而俘是大僇辱千里求哀情其可恤人以法辭我為理出不以其嫌竟置彼屈天秩有庸曾間内外由我一言至公均被財生多源取自有體算及屨簔徒擾而已以正以公所獲多矣猗嗟韓卿用固强矯年不志充宜若可悼我思古人云誰盡了圖維不朽君亦少慰子孝而賢仕途方軌振厲光揚儘濟厥美尚餘幽光樹石表隧謁我銘詩永朂來裔平陽程氏先塋碑銘南陽府倅程君瑞不肖里閈都司趙公倩也故與定交最早知行已頗詳為人忼朗誠直勁挺尚義而遇事開談洞見肺腑伸吾志而已而利而害初不計䘏由是棖觸物論與時齟齬然識者以跅弛不羈許之與君契闊者餘二十載大徳改號之春自武定終更來京師僕方忝長翰林尊酒叙舊英邁之氣猶夙昔也既而來請曰瑞始以孤童子入侍𨽻實喇謀太子帳下逮事定宗憲宗時朝廷遠駐朔漠屢奉命使襄漢間為互市官歳己未扈世祖皇帝飛渡鄂渚戮力與宋兵戰有功䝉賜銀幣有差及上登極選備膳夫車駕巡幸兩都征伐宴犒割烹供辦蓋三十年於兹中間以軍國係重越分肆直忤犯權倖致縲絏瀕於不測者屢矣以辭氣侃侃事竟實無他幸不死朝貴多其挺志弗撓奏受忠顯校尉尚食局使又七易寒暑積前後勞官武略將軍出知奉聖州今調同知南陽府事自惟愚忠樸直餘將無有供奉闕廷寵膺民社秩中通忠竭誠圖報之念日深一日奈桑榆景迫年與時馳而追遠返本之懷朝夕是切相嘗僑居即是將起新阡奉安考妣神靈又諗登仕版家先世塋域例有碑誌况東西南北之人表識之建尤為切務俾子孫繼嗣拜掃考其世系鄉里遹追來孝免夫有旌紀寂寥之歎尚吾友惠顧賜之銘則程氏為不朽矣某以契舊且素賞其方概迺為書程氏之先代世為平陽府洪洞縣李村農家曾祖大父俱逸名諱所可知者曾祖生子四人祖第三子也金末以勞効嘗攝行本縣令有子玉房行第八暨弟九郎其後裔尚守遺業玉即瑞之父也府君慷慨重然諾風義矯矯有無與衆共之貞祐兵亂以武幹保完墟落國朝壬午歳迎降太祖皇帝從攻鳳翔用愾敵功總西京工匠年三十有九以疾卒夫人曹氏出扶風宦族生子五人曰實曰瑞即武略君曰西京曰當僧曰午兒實之子懷驢職庖人氏次曰伴驢武略之子曰靈童新阡之兆建於彰徳府湯隂縣之北蘭里實大徳戊戌歳某月日也仍為發先世之潛徳懿行與武略之挺志顯親者為之銘俾光賁新壠昭示來者云其辭曰維農秉志篤於儉勤服田力穡鍾氣之醇積厚種邁嘉祥自甄何以為驗慶流子孫猗歟程氏植本浚源藹藹風義超越同倫由農而士奮起艱屯克昌再世攀附鳳麟愚忠朴直祇奉嚴宸典司玉食三十餘春名喧禁篽僉曰藎臣付之民社賞其勞勳貳車五馬皁蓋朱輪大侈寵數顯揚其親有鬱者阡羡里北原光融松檟銘勒貞珉何以訓之孝義忠純昭示不忘垂裕後昆大元故清和妙道廣化真人𤣥門掌教大宗師尹公道行碑銘并序道之大原出於自然而隆而汚繫夫世運顧人力有不能致者如甘河之異見於西秦崑崙之氣表於東海自非素鍾仙分價重一時疇克輔承者哉金貞元正隆間重陽王尊師始倡全真教法逮長春丘公應期濟度道乃大行風聲洋溢丕冒海隅至於靜涵道幾動周妙用驂鶴馭之孤標謁龍庭於萬里絶塵而下稱繼述之善者我清和尹公其人也師諱志平字太和系横海華胄大父而上世以儒業擢進士第厯郡守者凡七人因宦遊東萊遂占籍焉祖公直父行誼皆融徳不耀樂施與鄉黨以善人稱師生金大定己丑初母氏夢羽儀擁導若仙官迎謁者寤而生師有瑞光盈庭之異既長資穎悟不凡杳然泰定了知生前事讀書日記千言及冠行遇道士自關右來約師同詣文登醮祭歘失所在但見羽流乗白黿化現空際師戃恍感遇信道愈篤既而潛訪長生師於洛京父母數追止之至鎖閉靜室無幾遁去寓昌邑之西菴道家者流以禁睡眠謂之消隂魔嘗坐樹隂下一夕假寐間見長生師厲聲曰向祖師來化汝尚未悟耶遂揮刃斷其首剖其腹滌易鄙俗去其自滿由是胷臆洞然靡有所惑二親知志叵奪始聽入道明昌辛亥參長春公於棲霞遂執弟子禮久之偉其有受道資盡以𤣥妙付之曰吾性靈明如鑑不受垢常切瑩拭以湛吾天自是日有所得又問易原於太古傳籙法於玉陽鍊習内精聲光外白遠近尊禮户外之屨滿矣濰陽州將完顔龍虎素慕真風奉亭圃為菴尋賜額曰玉清觀師佩上清大洞符籙主盟齊東者廿寒暑長春聞之喜曰吾宗教託付今見人矣大元己卯歳太祖聖武皇帝遣便宜劉仲禄起長春於寧海之崑崙山聞師為其上足假道於濰以見之遂同宣詔㫖先是金宋交聘公堅卧不起至是師請曰道其將行開化度人今其時矣長春為肯首決意北覲選道行純備者十有八人從行師為之冠致帝眷日隆渥𤣥風遠倡師羽翼弼成之功為多歳癸未長春還燕主太極宫師雅志閒適退居縉雲秋陽觀俄徙徳興之龍陽長春仙去命公嗣主𤣥教即建處順堂於白雲觀奉藏丘公仙蛻壬申四月太宗鑾輅南還師迎謁於保賜坐論道慰諭者久之翊日后妃臨幸祝香琳宇錫道經一藏自是四方學者輻輳堂下歸依參叩于于而來唯恐其後師摘要訣誨之曰修行之害食睡色三欲為重多食即多睡睡多情欲所由生人莫不知少能行之者必欲制之先減睡欲日就月將則清明在躬昏濁之氣自將不生向上達者率自此出人徒知從心為快不悟制得此心有無窮真樂也癸巳冬十月講道經上下篇於義州通仙觀微辭奥義大有發明及演七真造道根源殊灑然也聞者為洗心醫巫閭為燕遼鎮山深秀雄鬱必有𢎞演博大真人往來其間甲午春師往遊焉先是瑞氣蔥鬱封鎖不散者浹旬至是開霽衆以為山靈開先之兆師謝曰吾何徳以當之終南祖師煉化地號活死人墓者蕪沒日久仙柩浮殯朝夕念兹若㷀㷀在疚己未春關輔略定師西遊併圖營建又興復佑徳雲臺二觀太平宗聖太一華清四宫以翼祖觀初道出汾晉沁長杜徳康請設醮籙方章啓𤣥鶴翔空仙侣散壇時雨濟旱丙申秋奉㫖試經雲中度千人為道士俾祈天永命禔福元元師徳望既隆所至風動雲委吏民瞻拜至凶悍無頼輩皆感化弭服戊戌師壽七秩以教門事付真常李公庚子秋葬祖師於白雲堂會送者數萬人時久旱雨雪盈尺咸謂孝誠所致繼董祖菴僝功尋敕額曰十方大重陽萬夀宫初大定七年祖師火其菴東游或惜之曰修人在後吾何亟焉至是殿閣廊廡覆壓千柱終始六甲脗合祖意誠有數存乎秋九月歸五華舊隱己酉賜號清和演道至徳真人金冠錦帔付焉辛亥春二月十有一日沐浴易衣冠書頌曰觀化八十三歳澹薄全真活計臨行踏破虛空開放光明無際落筆而逝馨芬滿室三日不散臨死生際其明了如是師既逝化以皓駒輿襯寜神五華其日終南祖觀有一道士乗白馬來告清和去世竟不知所之後訃音至考驗月日知為神遊化現吁亦異哉師儀觀秀偉風度凝重如瑞人神士不可梯接然即之春風和氣津津溢眉宇間樂傾所得誨誘不倦志專利物感應無方如在濰陽松柏不種自生其寓仙谷叢竹一符卦數學徒徧四方觀宇滿天下徳博道尊過化存神之妙不能具載皆出於至誠感發無一毫詐偽之私宜乎傳嗣道統配列師真上繼長春下授真常前後無愧可謂清而不耀和而不流克肖克荷𤣥之又𤣥者矣師平昔所在求詩頌教戒者無虚日肆筆應答辭理可觀有葆光集北遊録傳於世中統建元誠明張公表師行業於朝追諡清和妙道廣化真人制辭有性天開朗心地坦夷接重陽道統之傳為長春門人之冠宜錫褒章永光仙籍之㫖始終昭顯矣法孫陳徳定出延安士族師事真人門弟子重陽知宫仇志隆以修進餘力祭醮符籙皆通習之居終南四十餘年潔以修己耕而後食處巖穴間妖魔屢梗徳定以正法神力悉驅除之由是名著秦雍至元廿七年耀州少尹姚某以聞蒙世宗文武皇帝召至闕下試驗有徵寵膺玉鼐貂衣之賚元貞二年賜號棲𤣥致道通真法師三年宣授秦蜀道教提㸃踵門來請曰徳定自惟託跡草茅何以致此蓋遠藉先廕思效光揚師祖清和公之返真侍郎趙楠已表松臺祖菴之復實所權輿今紀行之碑未克昭建是殆闕如提㸃溫某等五人已礲樂石幸翰長先生惠之銘是亦不一書而止之意也予曰有是哉探源報本乃吾儒美事道雖不同其理弗異因次其所具而重之以銘其辭曰天之蒼蒼一氣清其視下也猶杳冥真元有道本强名俾而全之須人𢎞甘河感遇世已驚風聲波動東海溟七葉泛灧金蓮英至人挺出開世程崑崙山高古蓬瀛長春再傳何徳馨鶴馭九萬摶雲鵬雷雨之動方滿盈為民請命以道寜維持綱紀誰使令十八大弟光啓行丘仙一笑溘上征清和進脩純粹精傳授道統力主盟潔已應物謙而誠拱璧駟馬非夸矜事惟無心物取衡尹家樓觀青雲程開天演化𤣥元經全之為教乃大明縱說竪説鍊此形方寸莫遣三害攖隂魔大嚼風掩燈嗜慾一肆甚五兵顛木之枿不少萌昬濁之氣何由生志惟不分神乃凝大賢大哲皆此成用之國治如鮮烹重陽祖菴功勃興終南太華高稜層𤣥風浩浩海宇傾竹宫醮記儲祥禎雨暘下遂萬物情錫民五福世道平穰穰復正徳性寧一朝猗蘭升紫庭仙階霞帔光晶晶物縁太盛神或憎進退合正聖所稱谷神不死存至靈未妨委蛻仙山坰瓊樓石室户不扃神遊八表風泠泠道傳千古垂日星門人攀慕涕泗零令威留語會有徵兹惟華表歸來銘衞州創建紫極宫碑銘維衞紫極道宫全真師沖虛子房公所創建也初公既叅丘尊師於海上長春目其氣志非凡殊稱異之居無幾何命公主馬坊之清真觀迨國朝壬寅歳聊攝趙侯請師住持郡之𤣥都宫於是鶴馭東遊道出敝邑汲長趙實扈林聞師道價重一時以治城崇道里隙地廣六十舉武縱則倍之奉師為𤣥覽别館訢然許焉輟其徒張志洞等結茅以居常闕地得石上刻宋太宰張邦昌詩什知為呉越錢氏子孫棣華菴故基也師留博僅紀而西還淇上方屨滿户外每以居逸教無為慮因集其徒而告之曰吾大方家雖清虚自然為宗要以應時衍化為重詎容山林長往歸潔一已乎且吾行天下多矣未若衞之土中而處會俗美而易化不於焉闡吾教尚何往然祝延寶供香火焚修之所非大壯麗不足以張皇教基竦道俗瞻敬之心也乃命門徒孟志𤣥趙志朴率衆下商洛之材䟦涉艱阻以歳月得木萬計遂建宫殿七巨楹内設三清大像示至道之原也中起通明觀以奉玉皇黼扆欽天帝之尊也後復作七真殿五筵敘列仙品見𤣥教之傳也下至壇墠神闥齋室庖湢廐庫蔬圃莫不畢舉師素負巧思志堅而氣充規撫位置意匠中定不待畫宮於堵而為執用者之法要使堅完鞏固為數百年物尋師委蛻仙去遺命志朴等曰今大功將集無以我存歿而作有間勉强前修以卒吾志故志朴等三十年間焦心勞思攻苦食淡繼述師訓猶一日然今則繪彩供帳截然一新金光五雲絢爛溢目宏麗倩深為一方偉觀其工費之廣自力其力初不外假而衆忘勞焉實經始於壬子之春迨至元甲申秋工告迄功志朴乃件右師之行業與夫興造本末踵門磬折謁余文者再余以鄉梓盛蹟且與師有𤣥談之雅勉為敘次之師諱志起濰州昌邑人㓜業儒既而以異夢有覺遂入道為人氣貌魁奇操行清峻通古今善篆籀樂與名士夫遊至於醮祭之獲福雲鶴之顯異所在驚動世之耳目者為多遺山謂師外朴而内敏質直而尚義似夫墨名而儒實者盖確論云宜其事業成就如此至元戊寅志朴以師徳請于朝蒙敕定仙號曰𢎞直體靜真人若志朴者於師弟子之禮始終盡矣尚猶以師不覩道緣大成為欿予慰之曰不然昔真人舎清真而遊博去博而終稅駕於衞今雖神遊無方其眷戀於此也必矣况共衞間名山勝境固為小有洞天如𤣥元化現於仙山公和舒嘯於蘇門海蟾留題於白鶴仙蹤靈貺前後接踵見於方志雜出於傳記之說者昭昭矣異時馭風騎氣追陪真仙安知不過故山而留語俯華表而增懷而為孫劉絶塵之舉也邪仍作歌詩詳見師志俾刻諸樂石雖綿亘千祀庶幾來者有所考焉其辭曰道家者流本靜清杳冥而無迹與形崇慈尚儉貴不爭兹乃黄老之常經有時土苴為世程祈禳醮祭由是生像縁教設雖强名雄樓傑觀爭崢嶸猗嗟先生起營陵魁偉徳業𤣥門英至人未免安素行河山兩戒盤金庭方花古礎排巨楹紫雲為蓋青雲城羣仙嫓統須皇靈紫垣落落羅天星先生演化意有徵孰後倦焉先此營庶用張本道可興隂助政治歌清寧大縁未竟倐上昇門人攀慕涕雨零歳累月積大有成惜不久視為宗盟仙宫洞房本不扃神遊八表風泠泠來過故國宜少停紫極夜氣開蓬瀛追攀逸駕非吾能尚想為國儲休禎風時雨若榖不螟下洗澆俗還淳誠我詩刻石何千齡要作華表歸來銘秋澗集卷五十六欽定四庫全書秋澗集卷五十七元王惲撰碑
