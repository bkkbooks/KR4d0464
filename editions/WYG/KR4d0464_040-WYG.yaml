body:
  text: 蔬軒記并銘安君世有雲中人父善甫亦佳士世有前進士舜臣李公門人性姿善淑言貎謙撝早歲讀書不樂仕進壬辰後徙家大燕今居文明東里有宅一區軒楹外隙地寛閒分畦種蔬日以為樂有人過而以蔬名軒既以祕監新泉即楊武子篆其扁又求秋澗野老銘其心因為之說曰貧家蔬食當米粟之半此正詩書為業蔬淡自娱者也傳有之榖不熟曰饑菜不熟曰饉我有㫖蓄亦以御冬蔬之為用夫豈小補者哉然夫子以吾不如老圃辭而闢須者何君子為學而志其大者逺者遲遊聖人之門以是焉為請失其志之所尚故也大要士之處世隨其窮達本末先後為得昔程氏以人嘗咬得菜根百事可做胡康侯為之擊節嘆賞真西山謂大夫士不可使不知其味斯民不可使有此色此固大人之事但二公為之一轉語耳又比年來士夫例有别號未免封已養高鮮不以清美自衒如以終南而為㨗徑指少室而索高價者徃往有之恬不為怪至於飯疏飲水曲肱自樂庻㡬顔氏克已之功將何不可者哉於是書以為記乃為之歌日翻翻庭蔌雨露濡兮秋高氣嚴碧雲腴兮夕啜朝烹供吾用兮日費萬錢鼎食重兮一蔬餬口吾儕分兮既不知食肉之多憂余胡為之遯悶兮咀嚼飢腸出竒策兮不致蒼生有此色兮歌闋而去漢大司馬博陸侯霍將軍祠堂記蠡吾治城西北郊有漢大司馬霍將軍遺祠址相仍即侯之故封考諸傳注博陸鄉名職方載博野本蠡縣地居博水之野故名終以陵遷谷變疆里蒼莽有不敢摭實者然以地形相度今之博野安知非漢鄉之博陸乎廟權與莫究何代以信傳信必有所自至元十七年予按部次州來謁祠下荒壇喬木宛在目中老屋庫漏不障風日過客惻然心魄動盪疇為神睨而顧之耶因屬守以義起廢具邦人曕吏諾而退逮三十一年甲午予承乏翰林省左署郎官劉源郡人也以東曹掾徐鳳來告曰弊邑霍侯祠耆舊某輩今易而一新内翰幸不忘乆要尚惠一言庻免夫旌紀寂寥之嘆盖嘗論人臣以道事君身名俱全克始克終者世難其人三代而下能膺斯任者惟將軍為然將軍諱光字子孟早以大忠至謨見知武皇及其受顧命付後事至擁昭立宣罔孤所託班固論賛雖殷之伊尹周之姬旦初不是過誠哉斯言也所謂伊周者為天立極為生民永命為萬世開太平是也其生則若爾其殁也與草木同腐豈理也哉且匹夫匹婦以一節獨行表見鄉曲尚能感激後賢尸而祝之於社况將軍乎然神即人之心也誠敬所在乃神心之所在今郡人業新廟歲時䖍享因誠起敬如見風采其為神昭鑒也審矣若曰修復故事敬共神明必獲禮于下執事此則神當然之理吾不當以是心徼之於𠖇𠖇也至元甲午歲上已日翰林學士嘉議大夫王惲謹記趙州栢鄉縣新建文廟記三代治民之具隨時更易百世而下惟學校存而不廢盖所以明天理叙彛倫止民于至善之地故也况在今日有尤不可後焉者惟趙之柏亭本漢鄗邑地隋縣焉宋金以劇稱板蕩來官府生聚日就完美唯吾夫子廟宫鞠為茂草者有年于兹殆中統建元之明歲監縣事蔑都令馮仲徳佐史路彧教官范天祥等相與起廢方經理間或者謂廟基廹亭傳雜民屋囂湫卑隘孰謂神一日居此乎於是輟作徐議至因循閱三十寒暑當至元壬辰新令劉君因前政經營緒餘謀于僚史暨邑中耆宿治城東南陬作新廟而遷之復構堂于後俾肄業者有常處越是年秋仲上丁尹率竂屬諸生釋菜而落成之鐘鼓俱舉籩豆有踐儀威升降肅焉煌煌邑人聚觀拭目興歎僉謂吾尹起百年之廢一旦頓還舊觀勤亦至矣其可使無聞於後迺以某走京師介國子司業王君構以學記來請余以司民政者能以學校風化為先故喜聞而樂道之嘗讀漢志論十五國之風氣剛柔緩急類雖不同在聖人設教作新必因材為篤致諸中和而已然精強多感者易為化底滯不材者難為功向嘗提憲朔南屢至兹邑觀其土壌瘠沮且當南北衝要民之奔走供役勞止備極勞則思思則善生此人情之常也况趙之風聲氣習初不異於古為守令者冝知其俗之易牖乃從而振徳之則前日彈絲跕躧悲歌慷慨之俗將見强仁慕義攸興而不自已者皆是也教基既立道由是生異時風俗丕易人材輩出而曰此權輿於兹不亦善乎匪然司牧者以應上虚行為心士子者不以進修為實務其堵而宫之者作餼羊告朔之所吾不知其可也至元三十一年歲在甲午夏六月十有九日謹記崇𤣥大師榮君壽堂記先妣夫人靳氏系出安陽永和里不肖亦嘗提按兩河相即臬司理所故知鄴中人物風俗為頗詳聞之姻戚間女冠榮鍊師者志行修潔祭醮精嚴以道價重一方逮接際丰儀方頥烟目絲髪童顔風度飄飄有出塵之想然性行敦實言動温摯虚誕荒唐無有也大徳丁酉予方供職館閣師寄示西溪紫山傑作以壽堂記文見囑且曰翰林先生文學名徳與二公伯仲間爾儻遂所請貧道藉之儘不朽矣二公之文載四披讀其稱揚與向所聞見而知者脗合無異今二公已矣其文章氣節尚可振衰懦而傳無窮得簉名其列固所願也乃為筆之師諱守玉相之農家女自幼貞静視紛華泊如聞道家言喜之國朝甲午歲中虚魏大師以全真學主盟彰徳之修真觀時師方齠齔出家往事焉既笄經明行修披戴為道士復硏精正一科式法籙號稱習熟至元乙亥嗣主觀事師淵黙内修聲光外著一旦責當𢎞演主張是者甚力貴族豪宗欲謝愆過而資𠖇福者藉師修静期於感通對越故召請者無虚日法契㑹合風動逺邇學徒踵至信向者聿來迺光昭先業擴充增飾截然一新御吏中丞西溪王公為述觀記稱師興縁𢎞教落落自拔有壮夫不能及者又蒙掌教洞明真人與進授之崇𤣥師號年踰六秩特構静室于焉棲息晨起理𤣥務課學者畢焚香垂簾痛自滌除湛慮澄心審物理之自然悟道體之不息燕處超然而虚室生白矣容齋總尹夙承摩拊仰挹真風榜曰信齋紫山憲使勒銘於石表夫志道力行終始不渝之確其為名賢賞識如此師之志行愈昭昭矣大徳戊戌壽六十有八乃營是室為他日復真寧神之所道俗咸謂師山川炳靈道徳藉潤振清風開後學纂懿流光方期福壽未涯何遽如許也然人生而死猶晝之有夜寓形宇内同歸于盡此理之必然也今師不為虚誕荒唐之說所惑能一生死外形骸追蹤曠達以理自勝較夫烹鍊呼吸期于飛升不死昧理亂常僥倖萬一者可謂賢也已年月日謹記大都宛平縣京西鄉剏建太一集仙觀記金源氏熙宗朝一悟真人蕭公以仙聖所授秘籙剏太一教法於汲郡悼后命之驅逐鬼物愈療疾苦皆獲應驗事蹟惝怳驚動當世一悟傳之重明大定間召住天長觀嘗入禁中論道稱㫖寵賜甚渥三代虚寂師以道價凝重一時泰和四年太極宫初建命師主焉其四代東瀛子即祖房孫諱輔道師人品唆潔博學富才智士論有山中宰相之目大元壬子歲應世祖皇帝潛邸之聘召對稱㫖上以有道之士特隆禮眷賜號中和仁靖真人寳冠錦披副焉及登大位中和已仙去𤣥談粹宇有不能忘者詔五代大師居壽至京師特建琳宇勅額太一廣福萬壽宫命主秘祀其香火衣糧之給一出内府逮今承化純一真人全祐繼奉祀事十載間以受業者衆國之經費日廣堅辭廩料至于再三有司上議禱祠重事供給所需不可闕也全祐撝謙之請亦不可違也良田菓植𨽻大司農者量宜頒賜置為恒産遂賜順之坎上故營屯地四千餘畝復慮未臻豐贍元貞改號歲七月哉生明之二日上御神徳殿平章政事領大司農臣特格等言宛平縣京西鄊馮家里𨽻農司籍栗林叢茂川谷間以株而計者約五千數若盡畀全祐庻㡬資廣道廕永昭祀事制可全祐榮被恩賚乃自諗曰吾道家者流清心繕性歸潔一身何以仰答恩私有廣開福田朝香夕火祈天永命介求多祉而已明年丙申春相栗林隙地重岡環抱主峰面其北下砦寒泉泓澄碧瀲平地衍沃可引灌溉既奠厥居中構正殿三楹像事𤣥元九師祖師真官二堂位其左右前翼兩廡下至寮舍厨庫莫不備具四周繚以石垣前啟𤣥門榜曰太乙集仙觀工既訖乃以不肖猥同井閈且承事太師求文諸石昭示來者若稽載籍如元魏之冦謙之李唐之司馬子微皆以道術昭著顯蒙寵賚史臣屢書特書于以見山林處士禆賛治化延昌鼎祚不以獨善為高時君世主欽挹真風優加禮遇不以崇高為大千古而下光賁簡册今純一師操履貞固精嚴祭醮至蒙兩宫眷顧而圖報之誠惟恐不及是觀之建特其餘事耳其感遇之盛與前世同談而共美者矣是可書大徳元年九月望日記隆福宫左都威衛府整暇堂記元貞二載秋八月隆福宫左都威衛府起堂於肄塲中央度宜面勢不侈不陋于以簡閱車徒角較技能秉號令而觀威武焉既落成榜之曰整暇佐幕張浹盧愷奉威衛王公之命以記文來徵嘗聞公之選師率府繕修戎政桓桓赳赳蔚有成算若夫營壘雲横耕屯繡錯儲廩實而豐饋餉建警樓而謹朝昏歲時都試申明節制旗斾精明鼓角清亮坐作進退又為餘事至于醫藥有局更休以時宣暢恩威撫養士氣以之宿衛宫闈扈從廵幸肅將斧鉞中外辨嚴其趨事赴功士卒緝睦優劣得所自非老臣宿將謀畫素定視若無事者其能如是乎可謂既整而且暇矣顧老生常談安能發越其梗槩然有文事者必資乎武備而武備者所以昭乎文徳也僕雖耄尚能效一辭於尊俎間盖天下之事曰輕曰重皆有體用明其體者必致于用又古之君子不足其已至貴乎善推其所為以極經濟之美今公以重厚英偉之姿膺爪牙委寄之任罄殫忠勤夷險一節智慮精深有古良將之風砥礪廉隅挺士君子之操寓軍政于國容廸師中之貞吉冝其特蒙眷倚有謀猷克壮曉暢軍事之諭所謂明其體而得效用之實矣推而廣之兹惟其時霈洪恩而釐宿弊只在從容一言之頃俾内外諸軍汰冗濫蘇彫瘵極精銳而伸鬱抑咸若兹軍之整暇輔助文治固太平不拔之基億萬斯年實顒顒屬望是則兹堂之構豈特整暇一軍而已哉雖晉楚名卿賢大夫復出優游戎幕相事機而措時宜恐不易吾言矣使榮禄大夫塔喇海資徳大夫中書右丞王慶瑞昭勇大將軍阿爾巴哈其貳武徳將軍諤勒廣威將軍董守敬曰武徳將軍齊蘇特穆爾信武將軍張智榮實簽其事詳書其僚佐之姓名者見禆賔之勤謹興造而重事功也大徳二載龍集戊戌謹記青巖山道院記衛奠太行東麓山形迤􅆔白南運肘北閽其間峰巒歘斷如巨靈初擘望之儼然而巉秀者蒼峪也循峪北鶩越蒼山池山愈深愈雄峻可愛泉溜益清而駛望東北行約十餘里抵青巖山足嵓壑尤美四顧皆崇山茂林列峙環拱其東南有洞府軒豁層崕上寛廣丈許邃四五十歩中泉水洪澄深叵測春仲二日洞出光怪恍惚泉水湧溢漂浮塵滓潨㵼山谷間者一晝夕歲以為信俗呼曰水簾洞山藉之以清物資以潤清潤之氣不特散而為烟霏翠靄鬰而為艮材靈藥銅鏐玉石之美必有卓異幽隠之士炳山谿之英靈増景氣之勝槩如廣施神志存隠卹隂生蒼烟唐甄濟隠居兹山至逺邇化服分死完節不汚禄山近則四仙清修道行留頌委蛻不謂之炳靈増勝可乎洞側道院即四仙棲道遺址山空人去石老雲荒獨一殿巋存至元三禩為全真學者李志和始跧處石磕以修復為已任剷崖堙谷展拓庵地除梗補罅夷為坦陸重構玉帝殿洎東西兩廡山靈㑹聚仙亭下逮庖湢門屛以楹而計者三十數仍改瘞四仙鎮府中統初元太一五代師居壽奉命投龍牒玉簡闕之對以景昭貺厥後闔境旱暵郡長吏來禱車甫旋軫甘澍滂霈逮志和修復增宏郡民於水觱沸日少長畢集願伸曕禮迺盛為儲待人具醉飽而歸于是蒼峪勝蹟靈奕一方而游觀嬉樂亦復承平之舊府僚豕韋國井君徳常嘉師勤瘁為主張資藉者甚力及來京師復以興建記文來請余郡人也不敢託衰老辭切嘗讀金華洞天記中土山林名勝不載于仙籍者尚多惟蒼峪為天脊左戒奥區去郡里餘一牛鳴危峰叠嶂環繞郛郭盤礴風烟秘藏靈異幽隠之士代不乏人亦洞天不載之一也由志和擴而大之其名固亦佳矣然以遺蹟考焉尚有未盡者今廣施有廟四僊紀行而甄公大節雖傳卓行于唐史發幽光于韓筆在山中故事獨乏旌記子歸能屋而祀之俾後之游居者灼知景慕審夫出處大義所在以之勉志節而礪薄俗則子與志和名跡附麗前賢共兹山而傳無窮矣井君曰唯大徳龍集已亥上已日謹記創建伊洛五賢祠堂記大徳丁酉春洛陽薛君友諒即邵氏安樂窩故址起祠屋中設康節迂叟明道伊川横渠肖像庸致歲時香火之奉榜曰伊洛五賢祠神嵩清洛光動户庭明年秋來京師屬不肖為之記迺告之曰二帝三王修已治人之道待孔孟而後明立極垂憲貽則無窮不幸厄于秦雜于漢歴六朝隋唐雖有名公碩士間作迭出其器量足以恢𢎞至道闢除異端奈智識不能盡窺聖賢要奥擇焉不精語焉不詳又局夫章句文辭之末亂以功利禍福之說故學者汗漫支離莫知統紀時則有衛道之士而無傳道之儒陵遲至于五季其斵喪可謂極矣伊洛諸公奮起百世綰持道樞探窮淵源克紹絶學内有以究聖賢規模之大外有以備踐履節目之詳故孔孟之教復明斯文得歸于正後學知所適從盖二百年於兹矣然科舉利禄之習既乆遽未丕變以極夫功用之至伏遇我世祖文武皇帝資挺上聖運啓休明崇尚儒術尊禮賢俊于是許竇王姚諸公宗伊洛學陳說孔孟立極垂憲之教以致二帝三王所以修已治人要道盖已收明徳新民殊效于中統至元之際今内而賛助經綸外而佐理政化多前日執簡傳經之士推原本自則伊洛諸賢發明維持之功不為鮮矣雖配享學宫天下通祀可也况二程世家河南康節迂叟横渠聿來胥宇相從至數十年之乆聚精㑹神推明訂正莫非修齊治平之方性命道徳之理至于談笑游衍亦皆格物致知之餘篤志力行清修苦節専以移風易俗勉勵學者為主今讀遺書按故迹其英邁純粹氣象尚可髣髴復廟而貎之俾向之景仰高風者足以致其誠懇今而後瞻拜清光者可以感其善心尚何俟贅蕪陋於其間哉敢以不敏辭友諒曰昔潮人修韓文公廟東坡有碑南雄三先生祠晦菴作記謹著歲月以示來者不為無例曰若扳援昔賢則不肖年廹衰老懶於筆研乂瞠乎其後惟友諒先世為洛中名士其讀書慎行名簉仕版可謂不墜箕裘矣前任常徳府推復九賢祠今又創茲宇庻㡬有志于修已治人者非特邀取美名而已也是不可不書大徳戊戌歲冬十二月臘日記汴梁路城隍廟記汴梁之廟事城隍神其來尚矣壬辰兵後廢撤不存河南路兵馬都總管劉侯福大懼無以妥靈揭䖍曰事神治人守吏職也可偏廢乎於是相新昌里爽塏地西南二方界以通衢劉侯私第鄰其東北則抵居民萬氏廣袤餘七畝繚以重垣中起正殿像設有儼前敞臺門扃門嚴肅左右則環齊構室敦請女冠孟景禮向妙順朱妙明輩相與住持夤奉香火景禮四元宗獻之女童丱入道以彤管之懿資膺黄冠之妙選享年八十有五無疾而逝妙順亦出名家探賾𤣥理解屬文辭與孟同年仙去景禮臨終貽屬妙明曰汝等祗嚴修潔益守廟祊無負劉侯付託妙明唯曰敢不敬承誨音歲甲辰劉侯命侍人周氏韓氏披戴禮棲雲王真人為師訓周曰妙元韓曰妙温與妙明為徒侣所需衣糧皆出劉侯資給妙温妙明俱壽臻期頥相繼蟬蛻既而劉侯第四子保定路總尹某卒夫人圖克坦氏痛伉儷之中睽感榮華之易歇聿來棲跡法號妙真道俗咨嘆祠宇為増重焉妙元洎妙真罄刮粧奩資藉刻苦撙節遂重修正殿臺門創建獻廡子孫司及道衆寮舍齋厨輪奐一新蒙洞明真人稱賞加妙元以純真素徳散人之號今年登七秩日誦五千𤣥言為課朝夕焚頌祝聖人壽願天下安鶴髪童顔精健不少衰復慮興建本末不能昭晰于後走書幣求記于秋澗翁予宦遊大梁者屢矣京師故國遺跡亦嘗周覽今雖衰老忍無一言載明其間謹按祀典陽氣升而天神降地氣肅而神鬼出自邦國而達于臣庻家祭秩切近者社稷五祀而已城隍初未載也世說秦功臣馮尚見夢於漢高帝曰奉天帝命與王知領城隍隂事雖惝怳不可致詰然自漢訖今遂為天下通祀社與丘祀雖有常尊當時用事莫城隍若也况汴梁為六代都㑹四方輳集城池盤礴衢陌交通人物號稱繁夥精英粹集晝夜開闔死生變化幽明兩間其有神為之主司也審矣夫城隍地道也古人求神各以其類今俾女冠主其祀事宜矣傳曰西子蒙不潔則人皆掩鼻而過之雖有惡人齋戒沐浴可以事上帝言誠潔可以感通神明也如景禮妙元妙明妙真等咸出于詩禮名家薰膏鼎族清修道行敬恭神祗致廟貎完固闔郡瞻仰雖其誠篤致然亦由神明有以護者哉而推源本自不能㤀經始之勤是可書大徳三年十二月吉日記真常觀記大都南城故宜中里真常觀為全真學者重𤣥子樊君所建也惟全真教倡于重陽王尊師道行於丘仙翁逮真常李公體含妙用動應𤣥機通明中正價重一時可謂成全光大矣重𤣥子自童丱受業天資爽朗嶄然已露頭角由是日獲承侍聴其諄誨仰其高風神致灑然春融蟬蛻與之俱化𤣥覽之暇詩章篆𨽻亦時習之既壯辭達體要與事物接無所凝滯衆以不凣許之真常師嗣主法席委掌資用出納明㑹計當已無私焉師為稱賞曰財賄衆所貪得今逺疑怨不為行妨吾將大有以畀之時朝家欽挹真風所在宫觀相望如林都㑹地獨闕焚頌之所乃選充道録俾張皇敖基供奉闕庭雖越在風沙數千里外慨然命駕曾無難色至則潔已應物通變無方致宗風𢎞演王公貴人為之尊禮主張蒙中宫賜錦衣金冠俾降御香於燕都師真紀堂殊光顯也庚戌間真常真人洎十八大師光膺寳冠雲帔下至四方名徳亦獲紫衣師號之寵改觀為宫周旋之力為多繼奉實哷質蕃教主提㸃彰徳路道教事逮誠明真人嗣教念其耆識殊顧念也晚節退休與時消息至元二十二載易張侯故第為幽棲所榜曰真常觀示不忘本也崇堂為殿下至齋厨庫厩修治完整復置蔬圃一區負郭田二百畝資給道衆乃洒掃涓潔廣植花木使境趣清深日端儼丈室炷香撫琴客至問何為曰吾方凝神坐忘與造物者遊凢往來者皆一時名公李敬齋趙虎巖與翰林王慎獨左轄姚雪齋鹿菴王承㫖少傳實公翼國王公愛其風度才識締交方外太史公曰觀友知人亶其然乎元貞元祀某月某日師晨興召門弟子齊道亨劉道安付以後事怡然而逝閱世四百五十六甲子凝神于五華山僊塋道亨純直有持守祗承遺緒朝夕惴惴增飾固執惟恐失墜掌教𤣥逸真人與其進署宗門提㸃加沖𤣥師號一日介劉道録文甫請述觀記予僚契雷若齋與師昔同鄉校夤縁有一日之雅且重劉請勉為件右切有所感乃為之說曰二氣氤氲五行儲精長材秀民無世無之第學以致其道行以效其用功成名遂者㡬何人斯當金季俶擾綱常文物蕩無孑遺其時設教者獨全真家士之慕高逺欲脫世網者舍是將安往乎嘗究其說不過絶利欲而篤勞苦推有餘而貴不争要歸清浄無為而已如重𤣥子扶翊道紀宗覈𤣥務公材吏用藹然見于脫穎游刄之外其妙固翩翩而獨征託遺響于高風者矣然推本原自信其良知良能耿耿有不可掩焉者不謂之長材秀民可乎向使率性以明當然之理務學以廣通變之方列周行握要樞以投功名之㑹樹立巉然恐不如是而止之也撫卷懐人為一慨惜師諱志應字順甫出平陽汾西宦族自稱重𤣥子法號淵静通虚大師廣陽之真常麗澤之靈郁皆别館也仍為門人作望思歸來之篇其辭曰瓊芝峨冠兮青霞襞裳逺引高蹈兮與道翺翔至人出世兮化現無方驂駕鶴馭兮力振𤣥綱仙遊有恨兮門人涕滂蓬萊東望兮雲海茫茫松桂輪囷兮鬰鬰其芳偃息有室兮燕處有堂仙標彷彿兮誨音琅琅師今不見兮莫知我傷宗風通暢兮汨流有光神遊故山兮隂儲吉祥倒景遺照兮土苴是揚庻㡬華表兮歸來之章故翰林學士紫山胡公祠堂記紫山胡公捐館之三載彰徳監尹托里巴哈暨亷訪使旺律與郡士民詢謀僉同乃像公於治城西郭别墅之讀易堂于以揭䖍妥靈致歲時香火之奠諗不肖交款知平生詳請書其事于石酌量契義不敢以衰耄辭夫士有生無聞于時潛徳幽光發越于後盖行義立言曠世而相感也亦有富貴薰天振耀逺邇卒然傾謝磨㓕無紀豈徳薄用淺無可稱述而然耶若夫其生也為人所敬慕其殁也致人所懐思至衡于志慮見于羮墻非人品峻絶事業顯著盛徳至善感格人心悅而誠服有不可忘者安能如是哉紫山固名士才大夫佐理於朝讜言直論不屈權貴作牧名藩吏畏民愛治行為諸郡最擢任風憲擊奸發伏褰衣具曕有風動百城之目其臺閣之清規幕府之公論固在也曰幷汾曰齊魯遺愛善政亦不忘也而於鄉郡未嘗臨莅今像而祀之余初甚疑旣而得其說焉金季喪亂士失所業先輩諸公絶無僅有後生晚學既無進望又不知適從或泥古溺偏不善變化或曲學小材初非適用故舉世皆曰儒者執一而不通迂闊而寡要於是士風大沮惟公起諸生秉雄剛之俊徳負超卓之竒才慨然特逹力振頺風志大學致實用談笑議論揮斥流俗文章氣節振蕩一時其見諸容度事業者皆仁義道徳之餘剛明正大終始一節追配昔賢矯革時弊故天下翕然想間風采皆曰紫山學備四科望高一世真豪傑之士争先覩為快况二侯與郡士民執經傳道質疑請益或親炙而為矜式者哉沒而配社尸而祝之援例祀典其誰曰不然若以匹夫而作百世師一言而為天下法論之振衰激懦屹砥柱之孤標回狂瀾於既倒清風之所激徳澤之所及霑丐後學多矣是則繫斯文之盛衰與士風之輕重非相人所得顓而私也雖然一侯出貴族世胄樂道而自忘其勢尊賢而能知所宗昔鄒孟氏譏列國諸侯不能尊賢迺曰貴貴尊賢其義一也垂訓深矣後世之監牧實古諸侯今二侯取法聖賢於千載之後行古昔所不能行其賢於人也逺矣豈止如是而已後之讀斯文者將有所興感而取法焉公諱祗遹字紹聞自號紫山磁之武安人由中書郎官歴河東山東按察使濟寧總管仕至翰林學士大中大夫大徳五年歲次辛丑清明前一日記胙城縣廟學記國之將興必有世徳之臣儷景風雲戡定屯難賛敷文徳共致太平故孔子曰如有王者作必世而後仁鄒孟氏亦云所謂故國者有世臣之謂也信哉言乎惟胙邑金末城冝村渡行河平軍事以扞禦兵衝既而國朝帥臣薩竒蘇巴哈監總五路兵蹙蹂餘燼攻而㧞焉駐軍守據廹金主東走睢陽斫營夜閧竟殁死城下先是公父綽爾圖嚕卜以萬夫長將選鋒圍困大名中流矢而卒迨金亡朝廷追録載世忠蓋賜夫人楊氏世封户於胙孫布哷齊實嗣其後雖州遷而縣其故家遺風餘俗固在也當金末危急草創際俎豆之事有不遑及國朝甲午歲漕使宗亨肇建禮殿三巨筵壮麗翬飛為諸路冠後三十五歲尹劉庭撤而新之復起明新堂於後其正門賢廡尚闕學舍生徒初不論也迨元貞改號冬嗣侯布哷齊擢任本道亷訪使路出于胙首謁廟宫覩其如是曰欽惟詔條責實在我乃敦諭尹張孔鑄以興修為任尹承命經營有方趣使惟謹首建神閣擇師立學縣中子弟來受業者日衆侯乃出所藏經史數千卷資藉講誦尹復闢良田五頃造祭器百餘事供給二丁釋菜諸生廩料之費兩廡方締構而及𤓰代後尹李君卒成其役仍繪七十子諸大儒肖像于壁胙之廟學五十年間狼籍蕭條始克完具人知敬仰俗興禮讓仰副朝廷崇尚之意皆由賢侯一言勉勵之誠所謂王者必世而後仁世徳之臣戡定屯難賛成太平者於斯可見矣侯今由内臺侍御史進拜行臺中執法將南過鄉國請書其事于石乃為說以告之曰惟孔子之教推明至理敦叙彛倫裁成輔相之道修齊治平之方本末具備細大不捐垂憲立極萬古不易孔子明其道而無其位空言無所施後世帝王必需崇尚卿相守令所當奉行雖無禍福之怵誘而從違之間有真禍福存焉固非利害之牽率得失之際實有利害係焉惟其費不可闕乃修而明之審夫切而不可緩故勉而勵焉惟侯出貴種世胄敦說詩書好尚禮義内剛明而外文雅審事宜而達從政立身揚名已收功于踐履今復以徳施之鄉邑可謂善推其所為矣然君子不安于小知而期于大受况天下之事惟宰相臺諌得言得行擴而充之正在今日昔武元衡修治㕔壁栁子作記孔道輔以直道進用宋史有傳侯姑欲我記胙邑廟學而已耶易曰苟非其人道不虚行又禮云人存政舉誠能繩武賛文光昭先業克盍世臣之義由一邑以達之天下則道被均𢎞俾秉事樞矣僕雖耄將執筆以俟焉大徳庚子歲仲冬既望謹記宜逺樓記奉聖甄君居敬粤自父祖謹身節用保守恒業以篤實稱鄉里居敬尚文雅喜交遊襟韻洒落義氣所在略無凝滯始來居燕都城善心計而擁高貲者甚夥門廬服玩例尚修潔居敬一旦以僑寓簉迹其間不肯碌碌出人後於所栖息起構小樓華而不侈高而不危雖處市㕓闠之間頓出車馬雜喧之境于以合集朋簪暢適幽懐請名于予乃取六一居士天寒山色之句扁之曰宜逺詢義何居復語之曰樓之為用便爽塏而向高明必占據形勢之雄坐得溪山之勝予嘗登斯樓憑欄四顧金城千雉青山三面環繞拱峙嵐光翠色令人顧挹不暇朝暮隂晴變態百出或横脩眉於天宇或出寸碧於雲間雖呈妍貢竒於百里之外不煩蠟吾之屐拄彼之笏雙目以之増明詩脾為之借潤矣其於幽逺不亦冝乎此特形於外者如是其係於内者又有大扵是者焉甄氏先世既以篤實稱其積累之厚藴蓄之深逮居敬而後發之今既崇基構而勤丹雘矣復能傳訓子孫俾為學止善奉承罔替則締構鞏固傳示永逺亦以宜矣傳稱衛公子荆善居室始有曰苟合矣富有曰苟美矣又君子創立基業必垂緒於後其是之謂與居敬跽而謝曰有是哉問一知二皆僕所未聞也請書其詞庸為警戒又何俟燕雀之賀成請善禱於張老也大徳辛丑歲十一月廿一日秋澗老人記移忠堂記王全州之子亢宗敏愿通粹有麟趾雅厚今為魏府别駕一日拱而言曰維先祖驃騎府君起隴畝際風雲奮從戎列收河朔於百戰之餘以至出建大斾入貳行臺槖兜棨㦸總制魏師者四十餘年惟是一二堂廬皆平昔所晏息諸孫無所肖佀承藉徳蔭乃今有光永言追思於維則尚未也幸憲使惠顧念其貽孫之謀燕翼之厚為題扁以示來者俾子孫銜訓嗣服蔚為矜式敢再拜以請余仰而嘆俯而思曰有是哉何其孝之純也夫人之行莫大於孝孝莫大于顯親顯親莫大於立身楊名立身揚名莫重於忠述事盖一致二極臣子之忠孝也傳不云乎教之孝所以求其忠也鳴呼忠之為用至矣故居家則盡心於親進官則竭力於上與友交而言信為人謀而盡誠莅政則有恪戰陳則有勇其見諸日用間者能是一本夫愛之深孝之極也舍是將何所取則焉吾已見汝乃祖府君持心二極屬搶攘之際奮勇畧為先迨分定之後篤忠義為本其竒勲茂績紀太常而勒景鐘者可謂立身揚名之道昭矣汝父嘉議君復能篤繼忠貞勤勞王事其振肅臺憲拊循殊方冠冕於天朝也行有日矣豈非由孝而忠自忠而有立耶将有煒前光濟厥美者責不在吾子乎故題之曰移忠盖取孝於親則可以移其忠於君之義也若夫親安而氣愉家理而官治友信而謀成吾子行焉綽有餘裕尤當勉其所已行而進其所未至俾親顯而名益揚身立而道愈彰蔓為百世無窮之傳可也異時有登斯堂讀斯文慕樂昌之風而興起者將見為是堂一致二極之本又何啻王氏之類也哉於是乎書遊東山記至元辛已歲春三月余按部黎陽膏澍連朝明日夏孟丙寅朔天宇開霽大伾堆阜景風明澹畫如也拉友人宋褀洎諸屬吏囊筆載酒來遊兹山遂自西南騎而陟阻抵岳祠下既祝香歩上中層至鴻濛亭址讀刺史邊元勲亭記文甚竒麗稍北至中項項勢夷衍即李魏公中帳盖伾之絶巔也山形再成峻層石壇稍東北行不百歩隂崕﨑嶇扶掖而下憩龍竇巔上少焉降觀西陽明洞記開元間山人李真題名筆勢飄逸有焦山鶴銘風格其西龍崕方廣天然而龕上竅極大盤旋如螺殻然邃頂而去窅不知其㡬何也意者山澤通氣此正大伾口鼻唅呀吐納之所非有異也宣和以侯爵錫之不㡬於妄濫乎盤礴乆之下山適靈昌諸君繼至尋前盟也相與稽首彌勒尊像其鐫志本末以寺石考之為高齊所造無疑左右磨崕題識甚多得魯元翰張浮休賦詠各一周覽既已與客聨鏕東行踰大河故瀆入牽城登紫金山觀仙人拖裙石石水蒼色苔昏雨流雯華漬裂誠若􅀈積状者其面有元豐政和題記黔刻㡬满皆竒筆也遂探白金泉瞰玉女洞口旁勒建安人徐閎中泉眼銘雨蘚糢糊略辨首尾於是濟巔㑹勝主人取軟脚例開罇連酌觴咏纔交幽懐共暢不知山蹊之迂登頓之勞也既而寒日下悲風來遥經北麓穿蒼城按觀隋唐廩制未刻入自北門讌羣賔於清白堂酒數行張鄭諸君舉觴屬予曰今日之遊樂且有融盍簪而來似非偶然第遷變以來三山濯濯等為丘垤其能極宣城之賞當子長之遊乎然山以賢稱境縁人勝如赤壁㫁岸也蘇子再賦而秀發江山峴首瘴嶺也羊公一登而名垂宇宙况兹山也名載夏書功存禹跡闗河大地形勢依然斯行也垂槖偕來秵載而去幸吾子華之歸為兩郡光且紀蒼烟寂寞之㑹仍得簉名其間為他年林下故事非偶然者不爾甘逋客迴俗駕㡬何不為疊嶂攅譏山靈見謝也耶唐建昌陵石麟記唐昭慶陵在新隆平縣南十有三里使相鄉王尹里其石儀一十八事儼然具在内二石麟身首蹄鬛一與馬同第題顛有觡突出肉葳蕤其端所謂示其武而不用者也兩膊雲艷光拂鬃鬛尾上揭類牛而短雖雨蘚模糊雯華剥裂而制度精絶可愛傳曰麟四靈之瑞麕身牛尾一角五采色備王者至仁則被應而出又云視明禮修則至今刻像列諸陵闕豈顯夫祖宗生有至徳没備盛飾以表其仁厚故耶既而入東南招提讀開元十三年縣尉楊晉所撰碑頌盖知為唐皇祖宣簡公懿王陵墓也儀鳯元年髙宗追謚尊號宣簡曰宣皇帝陵曰建昌懿王曰光皇帝陵曰延光仍配守衛者三千人勅象成令專知檢校州刺史歲别一廵其石儀之制固當追尊崇建歲作也寺即總章間立額曰光業由是而觀其夤奉之嚴守衛之盛累聖明禋之禮郊歌時薦之儀固云極矣今陵園湮滅無復所見有荒烟野田而已嗚呼盛極則隨衰藏侈則厚發此必然理也上世葬之中野不封不樹何摸金暴骼之有文質中判古不能復然則何為而可漢之灞陵其中制乎至元十九年壬午歲夏六月十九日秋澗王惲記汛海小録日本盖倭之别種惡其名不雅乃改今號其國在洋海之東所屬州六十有八居近日出故曰日本國王一姓宋雍熙初已傳六十四世中多女主今所立某氏云大元至元九年上遣秘監趙良弼通好其國次對馬島拒而不納十七年已夘冬十一月我師東伐明年夏四月次合浦縣西岸入海東行約二百里過拒濟島又千三三里至吐刺忽苫倭俗呼島為苫又二千七里抵對馬島又六百里踰一岐島又四百里入容甫口西又二百七十里至三神山其山峻削峰環繞海心望之鬰然為碧芙蓉也上無雜木惟梅竹靈藥松檜杪羅等樹其俗多徐姓者自云皆君房之後君房徐福字海中諸嶼此􅆟秀麗方廣十洲記所謂海東北岸扶桑蓬丘瀛州周方千里者也又說洋中之物莫鉅于魚其背鬛矗然山立彌亘不盡所經海波兩坼不合者數日又東行二百里艤志賀島下與日本兵遇彼大勢結陣不動旋出千人逆戰數十合者凢兩月我師既㨗轉戰而前呼聲勇氣海山震荡所殺獲十餘萬人擒太宰滕原少卿弟宗資盖全宋時朝獻僧奝然後也兵仗有弓刀甲而無戈矛騎兵結束殊精甲往往以黄金為之絡珠琲者甚衆刀製長極犀銳洞物而過但弓以木為之矢雖長不能逺人則勇敢視死不畏自志賀東岸前去太宰府三百里㨗則一舍而近自此皆陸地無事舟楫若大兵長驅足成破竹之舉惜哉志賀西岸不百里有島曰毗蘭俗呼為髑髏即我大軍連泊遇風處也時大小船艦多為波浪揃觸而碎惟勾麗船堅得全遂班師西還是年八月五日也往返几十月省大帥實都副察呼次李都帥牢山次宋降將范殿帥文虎總二十三南一十三隋唐以來出師之盛未之見也秋澗集卷四十欽定四庫全書秋澗集卷
