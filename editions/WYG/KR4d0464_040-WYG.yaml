front:
  text: 玉璽記粤皇王肇興必有靈貺自甄董生所謂天之所大奉使之有非人力所能致而自至者此則受命之符如龜圖龍馬火烏之類是也三代而下視符寳為重以守以傳體用大著維大元至元三十一年甲午春正月辛已御史中丞臣崔彧聞故太師國王孫通政院倅拾得家以窶甚出櫝玉託憲臺象胥庫庫楚者沽諸市以物制非常竟不售令取而視之迺黝玉寳符其方四寸螭紐交蟠四無邊際中洞横竅其篆畫作蟲烏魚龍之状即召御史裏行臣楊桓辨其刻文曰此先秦以藍田璵追琢受命璽也臣彧即持詣宫府介鎮國上將軍都指揮使詹事丞臣王慶瑞通謁投進皇妃御前玉音慰諭賜幣各有差翼日二月壬午朔金紫光禄大夫中書右丞相臣旺扎勒率翰林集賢兩院學士凡十有一人詣直宿閣入賀有間皇太妃命出斯寳賜諸臣傳觀精彩景氣光動宫闕翰林承㫖董文用等相與稱說曰斯璽也自秦迄今千六百餘載其間顯晦固為不常今者方皇太孫嗣服之際弗先弗後適當其時而出此最可重者蒙宣諭而退臣惲等復考其近而明見者按金集禮云玉璽一十五面俱得之于宋内受天璽者宋紹聖間得之咸陽段氏當時命禮部翰林太常等官考驗實係漢前傳璽遂以禮祗受金亡莫究其所在今之所進其文章制度玉色校集禮所載即此璽也昔晉見麟璽于江左唐得賜寳于崔侁事出惝怳傳疑後人元帝猶藉之以中興代宗尚因之而紀號俱未若斯璽實前代有天下者之鎮寳應運呈瑞不涉誕妄非人力所致而一旦自至意者上天申祐奉而大之赫為新朝受命貞符昭昭矣抑表夫厯數斯在開邦家無疆之休者光賁前古矣稽首嘉歎於皇盛哉臣惲自惟職叨詞館獲覩非常老眼増明不為不幸可無文於後遂綴緝本末用紀大瑞翰林學士嘉議大夫臣王惲謹記
