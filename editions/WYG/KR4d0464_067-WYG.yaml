  - {type: page-break, offset: 4, content: '', id: KR4d0464_WYG_067-4b, image: WYG1201/WYG1201-0027b.png}
body:
  text: 授賀某宣諭大理國制㓜懐竒節筮仕昌時及知遇於先朝遂撫綏于大理揚威絶域昔收定逺之功服事彤庭屢抗伏波之請冝旌前效俾煥綸章汝其宣揚皇猷洋溢方外爰體綏懐之意以安遐邇之情轉為招徠式副所託宣諭大理及哈喇章俾還本土手詔嘉汝等逺自雲南導從選鋒轉戰千里直渡鄂渚以達於此勤己至矣今者俾爾各還本土以遂厥性優赐各有差姜真人手詔神以知來智以藏徃言念長江之邁未嘗一日而忘遐想仙標載勤馹傳雍容大厦論用復於細氊寂寞嚴扄雲暫辭於故隠春寒遣書指不多及追封皇國舅安濟諾延濟寧王諡忠武制制曰疏恩異姓無踰王爵之崇追册元勲况在世姻之懿典禮所逮存亡靡殊故皇國舅安濟諾延天挺英姿志宣忠力當祖宗造基之始為股肱佐命之臣衍慶軒星儷輝宸極惟勛閥之茂著冠戚里以獨髙朕紹述丕圖春懐世徳冝錫大邦之號仍褒壹惠之文可進封濟寜王諡曰忠武嗚呼議恊明廷庸布絲綸之命澤流後裔永昭泉壌之光尚想英靈歆此寵渥皇舅濟寧王妃制制曰爵以徳崇既建真王之號婦因夫貴俾隆藩國之儀春我外家徳昭祖母誕彌聖后作配先皇豈惟内助之多光溢徽音之媺是冝管彤韡煒象服委佗顧予冲人獲紹前烈禮崇報本心焉敢㤀可追封濟寧王妃與對邦休服兹寵數重衍姻親之懿永膺伉儷之榮泉壌雖幽歆承罔昧贈諡故光禄大夫左丞相都元帥阿珠制制曰功徳兼隆其所及者既逺存亡靡間故為報也必豐廼春元勲豈同常品故光禄大夫中書左丞相都元帥阿珠挺英將種作世虎臣爪牙兼信布之材韜畧合孫吳之法惟重厚克膺其委寄故謙恭不有其智能當世祖之恢圖自元戎而宣力奠我南服隠若長城秉持旄鉞者三十餘年出入行陳者百五十戰奮身不顧忠如皎日之明愾敵無前勢若迅霆之擊載揚我武飛渡長江佐收一統之功名出諸將之右繼將明命逺震邊庭威方暢於皇靈訃遽聞於瀚海朕承先猷而祗懼念王業之艱難鬰爾風雲追惟往昔優加卹典用勸後人官資超極品之榮封爵建大國之號於戯麟臺畫像豈惟宛轉於丹青甲第賜書庸示昭光於窀穸可特贈開府儀同三司太尉并國公諡曰武宣精爽如在不昧欽承太尉并國公夫人某氏制平章政事布琳濟達母為伯蘇氏父為翼運宗臣嘗有功於社稷夫亦折衝名將屢宣力於封疆位陟中台慶鍾賢嗣惟是數者萃於一身其存殁則俱榮葢始終之鮮儷况内徳壼儀之著而婦規母訓之崇錫之以翟茀之章賁之以銀黄之餙沛殊恩於既往示深勸於將來在邦彞皆所當然於世教其或有補於戲脂田肇啓獨垂範於两宗蘋饋相承尚流芳於百祀可贈并國太夫人追諡司徒鞏公制制曰節惠易名恩禮備餙終之典依光毓徳風雲非一日之期故具官某禀性淑均處心貞亮眷昭考當岐嶷之際侍内廷多傅翼之功奉事两宫勤勞有日爰念邸潛之宿望特班邦教之殊階謀叅宻近而屢効忠誠位極崇髙而愈形謙謹朕方升于大寶將圖任于舊人已聞歌露之悲可後葢棺之議鼎湖未逺想陪仙馭之㳺泉壌生光洞賁綸章之寵可贈金紫光禄大夫諡曰忠懿有來精爽不昧歆承追諡賽平章制制曰人臣罄奉上之忠恩卹奚分於今昔國家有餙終之典光揚亦頼於子孫於惟閥閱之家况復風雲之契某官某儀刑西域柱石中朝以文武之長材藴經綸之大業爰從潛邸早識英資而又圖猷每沃於淵衷度量獨髙於天下四川分陜朝廷無西顧之憂六詔行臺郡縣奠南服之理福星霖雨動應時祥和氣嘉聲撫綏殊俗念匪躬而盡瘁每當饋以興哀朕祗奉先猷循思逺節位兼將相徳全始終况爾孫支光繩家訓弼予孝治進貳文昌用推錫類之恩寵以上公之號於戲鑄金圖像豈惟専媺於前賢告第頒書尚冀傳芳於來世可贈某官某諡英爽不昧其克欽承賽平章國夫人誥國治固先於家齊古今匪易婦秩諒從於夫貴典禮攸冝某官夫人某氏婉自名家嬪我賢輔備法度而供壼職以恭儉而相夫勞委佗儼象服之尊恭懿融管彤之美以正以順如山如河主饋冝家綿休積慶夫延登於鼎祚孫進貳於文昌不以輝稱曷彰内助仍易小君之號榮階極品之封於戲徳容尚肅於舊儀誥鸞有煥脂澤載光於故壠世祚彌昌可封某國太夫人諡某號主者施行追諡故都運梁公通憲先生制制曰望壠思賢臣子無古今之間顯親盡孝國家有推奬之崇矧兹文憲之傳篤我世臣之舊資徳大夫中書左丞梁温都爾故曽祖金中奉大夫司農少卿陟早登科第顯厯仕途履正奉公材優國計持難抗節身為大閑在先儒耆徳之間有泰和能臣之譽經綸事往道義日尊流澤逺及於子孫致位有開於卿相克宣忠力勱相我家不有卹章曷勸來者可赐諡曰通憲先生於戯老成雖逺典刑猶見於國人寵數惟新潛徳載光於泉壌尚期英爽不昧歆承太子少傅竇公制傳經明道既輔立太平之基崇徳報功烏可後非常之典故桓傅致臨雍之敬而甘盤動憶舊之思古今雖殊典秩不異故翰林侍講學士竇黙業尊周孔學際天人詢治體以綱常為言論人臣以功利為末侍謀帝幄剴切多文貞之風論相中書慷慨見陽城之烈而又三代建國明倫是先惟西池儼籥羽之儀故東序擴人文之化風移俗易一變虚文池闢天開載明正學迺春两朝之耆徳實為先禰之宫師稽考規模夢寐風采是用榮分三事光融邦教之階恩賁九泉瀟洒玉堂之契有來精爽服我寵靈夫人賈氏誥辭天人之際若弗可知禎祥之來各以類應凡祖宗父母尊榮夀考未有不以善而致者具官某夫人某氏婉從清望嬪我儒宗恭儉以相其夫勤恪以成其子珩璜中節藻薦多儀清白傳家管彤有煒冝爾從夫之貴寵膺華郡之封鸞誥副加服我休命追諡賈博囉齊制負鼎於時既逢其明主當饋起嘆有懐於昔賢某官藩邸近臣中朝耆徳適際風雲之㑹素多監掌之功割烹調和迺其常事威儀進退曲盡恒規凡侍殿庭望髙徳度方舊人而圖任􅑈薤露以興哀嵗月雖深徳容如在抱茂陵之弓劔婉孌何窮悵華屋之几筵未昭勅奠近因廷奏大霈恩章可加贈某官諡曰某嗚呼授寵數以如生幽明罔間顧諸孫之衍慶福祉方來慰我老成含嘻泉壌追諡果勒齊制揚徽内職固有藉於世臣追錫親榮迺式遵於彞典某官髙閎集慶美行禔身早以謙恭光聯侍從藝則名而威則棣責以己而功於人出入禁闈者幾三十年主典玉食者何百餘事忠勤奉上夙夜在公每多燕饗之儀何止割烹之技方廷章之宣美遽朝露以溘先可贈某官某諡嗚呼祗奉仙逰悵同翻於儷景流光泉壌尚垂慶於後人魂而有靈歆我寵數進呈世祖皇帝實録表臣某等言臣聞典謨述堯舜之功令名顯著方策布文武之政義問宣昭粤自漢隋及夫唐宋皆有信史以貽後來况大業豐功震今耀古惟深善述首議丕揚臣等誠惶誠懼頓首頓首洪惟世祖皇帝仁孝英明睿謀果㫁爰從潛邸有志斯民植根幹而佐理皇綱聘耆徳而講明治道始平大理再駕長江過化存神有征無戰迨其龍飛灤水鼎定上都革弊政以惟新擴同仁而一視規模宏逺朝野清明内則肇建宗祧創設臺省修舉政令登崇俊良外則整治師徒申嚴邊將布揚威徳柔服蠻羌加以聖無不通明靡不燭守之以勤儉朴素養之以慈惠雍和收攬權綱綜覈名實賞罸公而不濫號令出以惟行萬彚連茹羣雄入彀削平下土統正中邦慕義向風聲教奚朔南之暨梯山航海職貢無遐邇之殊方且開學校而勸農桑考制度而興禮樂國號體乾坤之統書畫煥奎壁之文罄所有而醻戰功不待計而救民乏聽言擇善明徳緩刑斂福錫民遇灾知懼得洪範惟皇之理過周宣牧政之勤以致時和歲豐民安吏職葢帝徳克周于廣運故至公均被以無方可謂文致太平武定亂略繼一祖四宗之志兼三皇五帝之功開天建極者三十五年立經陳紀者二萬餘事以謙譲弗遑於備紀故纂修未至於成書欽遇皇帝陛下夤紹貽謀厲精圖治亟鑒觀於成憲思遹駿於先聲深詔下臣俾為實録宅心宗祏凝孝羮墻開館局而增置官僚勅羣司而大紬圖籍編摩既冨搜訪加詳採摭於時政之編參取於起居之注張皇初稾増未見於罕聞承奉綸音俾蠲繁而就簡俯殫管見仰體宸衷盡略虚文一存實事其饗㑹征伐文物典章粲焉列三代之英蔚爾開萬世之業與夫才徳孝亷之士忠良姦佞之臣版圖生齒之實繁財賦畜牧之冨盛謹依條據粗致無遺今具所修成世祖聖徳神功文武皇帝實録二百一十卷事目五十四卷聖訓六卷凡二百七十卷謹繕冩為二百七十秩用黄綾夾複封全隨表上進宸扆臣某等忝備台司幸膺盛典顧惟載筆才何有於三長勉進蕪辭慮庶幾於一得冒凟聖聪不勝兢惕臣等無任瞻天望聖激切屏營之至謹奉表陳進以聞臣等誠惶誠懼頓首頓首謹言元貞元年六月四日開府儀同三司中書右丞相監修國史臣等上進聖夀節賀表至元十四年丁丑代中省作伏以龍徳御天恊千載休明之運星虹流渚開九秋震夙之祥正朔所頒臣民胥慶欽惟陛下長策逺御叡㫁有臨凡經制於宏規思光昭於先業修振古未修之典集累朝未集之勲獨運神機載揚我武削平六詔無好大喜功之心混一三吳見伐罪弔民之舉治道己隆於貞觀風聲仍邁於漢室尚深闕政之虞屢欽迓衡之問詢謀元老懐保小民體羣臣敬其所尊免賦徭以之固本而又禁酒酤而重民食憫兵餘而肆赦恩動順輿情咸躋夀域繄爾至元之盛徳優於行葦之深仁屬節届於誕彌適躬臨於巡省臣某等久承鈞軸列侍瑶墀一作分司蘭省阻列蓂堦愧無金鑑之封章切效露囊之微悃鳳來儀而陪舞聽簫韶九奏之音虎拜手而揚休祝天子萬年之夀甲午賀正表代中省作伏以寅宫建斗洪鈞轉一氣之春漢殿稱觴大禮重三朝之慶衣冠環拱文物昭融恭惟皇帝陛下乾健萃精睿思作聖頓皇綱而開大統備百度而冠前王澤既洽於域中威復加於海外中天而立躋世於平以冨藏民恵免逋懸之賦先春肆赦恩深寛大之書繄至治之惟馨致上天之神祐端臨正旦光動多儀受國籍而膺貢珍醼臣工而湛春酒臣某等率先列辟拜舞揚休政與時新萬有遂生成之樂夀從天降八秩開億兆之祥大都城隍廟設醮保祐青詞伏以天監雖髙曽惕顯思之命基圖寅紹敢忘奉若之誠爰自若臨頗厯年所顧𦕈躬之上託致至理之維艱豈期外侮潛消復荷天休滋至炎風朔雪大開一統金穣玉燭屢致豐年而又雲静祁連春回沙漠晝日有平安之報霜風無偃薄之虞匪凉徳之能然皆聖靈之所祐迺即青陽之月恭修金籙之科誥演琅函真臨玉境導含景蒼精之駕覆垂雲洪蔭之仁鑒兹報謝之䖍重以保持之福干戈止息永惟四海之清邦國有懐亦尚一人之慶如式至元三十年崇真宫設醮齋意大元皇帝紹隆丕構撫御多方欲期中外之安致有憂勤之慮爰資通蔭用介福寧擬於今月初三日就大都崇真萬夀宫設金籙醮筵二百四十分位㳙日既良預期以告青詞伏以纂承有在擴先業以丕隆撫御攸寧皆上天之申佑况年齡之向邁資福廕以彌深念兹一己之微事有萬幾之重邊聲雖捷軫慮良多精力自如過勤或倦而又四氣交更而無不順盭多生感受而未免乖和敢殫禱謝之誠普翼神明之相潛消災滯滋至天休素履安舒符乾剛而不息皇圖鞏固叢景福以維新無任懇禱之至祀廟樂章無射宫之曲昭成於赫皇祖睿知聪明天扶一徳海毓羣生文經武暢治定功成禋祀無期昭垂誦聲無射宫之曲顯寧天啓深仁須世而昌追惟顯考敢後光揚儀尊諡美禮備音鏘皇靈鑒止降釐無疆祝文第一室於赫聖武開運立極啓迪後人奄宅萬域繼體守文爰及𦕈質大位昭升陰相之力奉薦明禋載祗載式尚祈顧歆永深燕翼第二室丕顯睿祖載揚我武左右禰昆耆定區宇慶衍本支紹纂基緒嗣服惟初禮須告祀延洪㓜沖永錫繁祉第三室明明我祖神靈無方武定文綏于先有光運開大統徳冠百王仙馭漸逺攀慕奚極祔廟奉安縟典是式燕翼如在英靈日赫第四室於皇昭考神靈在天民受陰賜餘二十年不饗其位𦕈躬是傳追尊徽號永言奉先爰用昭告齋慄掲䖍尚冀申祐寶祚綿延登明亥元神維神總劾成功尊臨陰位適承歲徳爰誕𦕈躬屬秋仲之佳辰致嚴禋之菲奠仰祈昭格永荷神休歳星木照星維神象緯𤣥穹祥開下土直兹歲事相我沖人恭伸黙禱之䖍爰即絳宫之閟庶慿陰祐聿底丕平栁宿胎星維神光臨初度獲纂鴻圖顧惟凉薄之躬萃集簡穣之福近因多故致祭幽壇尚冀精英更隆安吉新船落至祭歲君文成舟委波謂之落至維神灼知一歲之事汎彼中河轉致厥載上下安輸惟神是頼修五門前橋祭歲君地祇文應門將將前臨天津玉輅所馳虹梁必陳爰構爰締築之陾陾神維垂祐迄于有成五方帝祭文因方殊號尊以帝稱殿臨五部有赫其靈維橋之作鞭石駕梁尚冀擁衛大來百祥擬禁酒詔漢賜大酺歲有常數周申文誥飲戒無彞况糜粟者莫甚於斯崇飲者刑則無赦近縁春早朝議上陳冝禁市酤以豐民食朕詳思來奏實為腆民可自今年某月日民間毋得醖造酒醴致天物暴殄重傷時和其或違者國有嚴典悔其可追故兹詔示想冝知悉中書省牒宋三省文中書省劄該爰自聖上即位之初重惜南北生靈之故一視同仁首主和議故遣信使講信修睦徃年征進大軍即令各還本屯仍嚴勅邊將非奉上命毋得妄動行人御命以來載更嵗律寂無來音何哉不惟有失告辭反起邊釁以致攻圍我上蔡侵軼我鄧鄙襲華陽擾隨州刼掠真陽數犯漣水此皆出於使軺已入彼疆之後將和而戰得無異議乎夫信與義自古所恃以為國者也一旦棄捐自有任其責者矣向也大駕巡狩北庭以平内難今巨魁授首己於正月廿六日還宫飲至頃因行臺入覲陛見之日具以奏聞請重兵壓境以問其故五月初五日奉聖㫖此一事發端在我姑待之省府仰體聖上仁慈尚存兼愛恐咈初心弗允所請且夫朝廷大計已定此特有司之事耳今就委本路發司詳問焉若復遲疑不決秋髙馬肥至時别有區處當司依奉省劄令差諮議官崔明道兵馬副都李合義充詳問使移文淮東副使即今國使安在何稽留不發并節次侵疆之役具由回示以慿呈省施行請早示定議據此須至牒者順徳府大開元寺重建普門塔碑銘國家以神武戡定區夏際海内外悉主悉臣其所以尊顯釋教彌綸元化者方往昔為最重于以推𢎞濟之深仁斂無量之洪福纉大寶錫羣生躋六合於仁夀極樂之域豈特崇奉而已哉順徳府大開元寺爰自聖天子潛邸迄於御極持護寵錫者前後非一至精藍浄衆特命近臣主領不與他寺比三十年間續光起廢集于大成主僧崇嚴以寺之大縁實肇基寶塔今雖雄峙雲衢未有紀述何以為夀無盡藏之傳至元丁丑秋懇輦真國師以其事請于朝制可命奉御脫烈傳㫖翰林院定撰合立碑文者臣謹按提㸃僧崇湛具列事蹟寺舊有塔曰圓照癸酉之兵燼焉逮國朝辛夘萬安恩公來主函丈始圖興復其感驗靈異有神化無方者初公既祝髪心印佛乗機蟠利用錬形辟榖面壁安禪結習於臨城者五年建縁於清泉者有日演法出無礙妙辯濟物現當機應身至回邪入正卻火返風雞悟靈而啄香牛馴致而受戒寒泉復井之波斗粟周衆僧之供復以慈菩根力愈竒疾拯危厄人藏髪餘珠垂舎利潔庖寮而偫館榖代公私而息繹騷其感化方便人叵具舉第以菩薩目之以致逺邇隆嚮願言皈依及廟役興得能仁觀音舎利三顆光大殊常又易塔心柱礎因風自正故勲貴豪冨鉅商世農施獻輸給同竟事縁金幣梓材不期而輦至藝巧工能不率而子來風動雲委畧無虚日不十稔叠構重簷輪奐離立文階層戺勢軋坤軸藻栱􅀈題翬飛塵外若乃紺瓦鱗差金輪眩彩覆法雲於真境曜慧景於康莊絢爛動盪若金光明中現無量化佛即之者火宅晨凉即之者重昏夜曉誠法界之寶宫河朔之傑觀也實經始於重光單閼之仲春㫁手於上章困敦之秋孟簷十有三崇六十仞其工與費不可殫紀癸夘冬師拂衣禪室歸寂真空即日有雨水花之異塔位石像亦怛化流潤若潸焉出涕者及斂大衆聞空中來妙音樂聲雲光變幻環刹成五色樓觀中現三大士像至有升塔投空攀號者其具戒門資萬數内嗣祖傳法解三藏教沙門今亦千計其為世宗師感慕者葢如此己酉嵗嗣僧崇朗因太保劉秉忠奏疏請聖上為大功徳主遂嘉納焉且聞師梵行清修乃遣近侍護𦵏及建塔賜銘諡曰𢎞慈愽化大士勅寺額曰大開元寺塔曰普門之塔爾後累降綸恩優護贍卹靡不備至其紹化住持曰崇潤嗣傳住持曰崇朗崇悟崇瑀至崇嚴凡六代初縁清泉净土寺乃大士宗姪崇音住持云臣竊聞大雄氏之教以清净虛寂為心方便慈悲為用愍念大千衆生墮落苦海洪濤鼓風飄流無際世尊心運慈航拯溺度厄俾登彼岸歸净土正路又慮一切愛慾有迷悶終不覺其本來真心者故假像設教閎厖靈歘至理絶人區事出天外弗爾奚能傳悠久而警悟萬億刼邪窣堵波之建假教髙顯極矣然道自人𢎞功繇縁立非遇間氣傑出智慧開濟大士疇克𢎞通法海鋪敦教基如是光大者哉冝為聖天子終始崇奉如一特詔赐銘以昭永世臣某拜手稽首而獻銘曰釋迦挺生自西域靈山𤣥風暢無極經從白馬肆金光法本誠心歸利益仁皇應世憫言湮大千淪流苦海厄教因象設濟無邊塔廟龍宫争湧出開元大士𢎞慈公五載雷轟奮禪窟法音演出琉璃筒建此道塲化所服髙標突地跨蒼穹一日雄尊三百尺雨華大風韵流鈴師雖示寂此長舌聖皇錫號曰普門臣今思議何惻怛要欲手挈閻浮生躋彼仁夀極樂國臣聞大徳必得夀佛應回施無量福蘿圖鞏固等彌盧聖子神孫千萬億秋澗集卷六十七欽定四庫全書秋澗集卷六十八元王惲撰翰林遺藁
