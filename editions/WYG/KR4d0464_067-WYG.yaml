front:
  text: 朕甚憫焉今予命爾主兹東土非以訟受之也彼所責匪輕敬哉今而後苟不克荷非若汝兄可幸免也
  hash: sha256:39e07e74baf766250fd9715123c8138ccd02440a8fbf900a02cadfed9d3e7774
