front:
  text: 五十一
  hash: sha256:d13be28d0684dfc723af09b54446adcc25bcafde054fd4bb4afc0f5b98175c24
body:
  text: 元王惲撰碑大元嘉議大夫簽書宣徽院事賈氏世徳之碑元貞改元之二載嵗舍柔兆月維㽔賔十有七日甲申駙馬髙唐王臣克哷濟蘇奏簽書宣徽院事臣賈托里巴哈言惟賈氏三世先臣供奉内庭繼典玉食夙夜祗勤頗著㣲效今飾終之典表行之銘未蒙贈賜敢援例以請制曰可仍傳旨翰林文諸石碑傳信後來臣承詔伏念方今追崇宗祖因之懐想舊臣稽之古者實皇王盛事敢再拜稽首攷其世系而論列之謹按賈氏世為燕之大興人髙祖仕亡金職庖人氏祖妣夫人李氏生一子曽祖諱錫喇體貌魁梧箕裘世業資謹愿以孝行聞郷曲國朝甲申間因上元奉御劉公召見莊聖皇后時睿宗駐和林北有大水曰伊克穆稜有峻嶺曰杭愛達巴與中土遼邈以公不憚逺侍闕庭即令典司御食甚稱上意顧而愛之以其髯疎色黄因賜名曰昔刺然慮公漢人與風土不相宜令徙居濓州以優便之既而上思公不置曰賈某在吾左右飲食起居殊安適也復召之供奉其諸色庖丁悉𨽻焉凢宫闥所需政雖繁多事亦辦給人有不逮未嘗挾所長以聲色拒人衆以此敬愛若儒素然加以謹飭周宻動而有為故屢蒙眷諭命與貴近商搉大事深識逺慮出人意表時世祖在潛知其重厚可大用迨中統建元特授提㸃尚食尚藥二局兼領進納御膳生料令佩金符用彰勤恪既而昭睿順聖皇后嘉其克調鼎味以宫人蘇氏妻之年既耄猶不倦勤既而以疾不起將革索賜衣及所乗驄鞚至庭奄然而逝其方寸洒然略無愧慊送終之具一從官給葬漆園先塋實至元五年二月八日也今贈嘉議大夫聞喜郡侯諡曰敬懿夫人李氏淑慎柔嘉光備婦道初奉姑於兵間食少不足供養自以漿脚屑雜菹而食其賢孝可知年五十九没於中山繼姑亦亡夀九十有四夫人生子一人今贈聞喜郡夫人諡曰節孝祖諱綽尼資嶷然殊異及長多力倜儻有襟量甫五嵗世祖皇帝愛其風骨嶢嶢嘗置御坐側既冠昭睿聖順皇后妻以宫女毛氏從征大理嘗躍馬入水捉戰艦一併擒甲士十餘人上重賚壯其勇而惜其輕鋭也自是命與丞相沁津出入而持䕶之及還上欲大用以疾終檀州今贈資善大夫臨汾郡公諡曰顯毅夫人毛氏系出延安有婦道宗族以賢稱撫育孤幼皆致成立賈氏復振夫人之力居多享年六十有一贈臨汾郡夫人諡曰靖淑子男三人女二人孟曰果勒齊仲曰瑪古性沉厚寡言笑幼事裕宗皇帝官奉訓大夫典膳署令卒年四十有一季曰傑古天資慷慨能睦諸親自幼侍安西王官至懐逺大將軍陜西屯田總管府達嚕噶齊卒年三十有七孫二人長曰實勒們官至掌膳局提㸃次曰觀音努女二人長侍中官既笄願披剃為比丘尼賜號崇教大師次曰瑪哈適中書左丞相耶律公第九子㕘知政事希逸顯考諱果勒齊資寛厚美儀容善騎射中統辛酉扈上北巡道出釋壼土風霾晝晦歘有賊來犯遂射而拎馬下上壯之至元初襲祖父職佩金符提㸃尚食尚藥二局兼領進納御膳生料夙夜在公克紹乃職繼授嘉議大夫簽書宣徽院兼尚膳監事出入禁闥三十餘年嘗侍清讌調羮御幄曽無覆餗之憂將命公朝毎抱有終之戒悉心盡慮敬慎如一過則歸巳善則稱人横逆之來直受之不校其雅量有本根於天性自然非矯揉造作而為之也以某年月日以疾卒於位得年四十有三訃聞上哀悼竟日闔朝諸臣弔哭皆失聲下至庖丁宰士紼送長號者無慮數百人自非推誠接物素服人心焉能感召如是今贈榮禄大夫絳國公諡曰忠靖夫人呼爾察皇叔安西王與同乳哺聨貴氣宜室家徳充於容行踐於言爽朗而不掩其柔嚴恪而不失其和奉舅姑則盡孝事夫長則罄節嘗入監宫紀蒙賜珍玩甚厚今封絳國夫人子男七人長曰旺札勒巴哈昭信校尉尚食尚藥局提㸃卒於官次曰額森巴哈蚤世曰托克托布哈嘉議大夫簽宣徽院事曰伊實呼圖克中奉大夫司農卿曰旺禄曰布延巴哈侍皇太后於西宫曰呼圖克巴哈孫六人旺扎勒巴哈之子一人曰竒爾竒塔特托里巴哈之子三人曰額森特穆爾曰達里瑪實哩庶出曰本布王六之子一人曰薩里呼圖克巴哈之子一人曰班格臣嘗觀周禮天官而下即膳夫庖人之職豈人主尊嚴不厚其身無以䕶養元氣根本惟其血氣和平志慮充溢而後使國脈民命乃有所恃而發政施仁散為天下之福今賈氏五世嗣守世官同濟厥美宜其子孫報施昌熾榮顯有如是者銘曰賈氏五世箕裘相承蛇化蛟騰不變其形大安季年萬室南遷天道在北公知其然負鼎北上割烹擊鮮既覲睿莊奉承周旋乃眷乃顧忠力于宣神龍奮淵儷景同飜尚食尚藥聖躬萬安謹飭周宻耆艾敦厖出入卧内將事不遑燕喜龍樓饗獻朝堂鼎鐺刀匕威儀鏘鏘養徳養體其道有光一飯之勤其報彰彰况乎萬乗福賜可量寵數優渥垂裕後昆若若纍纍爛其盈門有來遐祉大集公身八秩之夀五福之尊一笑而逝長遊帝閽迨夫嗣子忠勇絶倫秀而不實大用遂屯于嗟麟趾廼見振振於穆孝孫有儀有藝功歸衆人過則稱巳犯而不校是又人所難爾調和鼎味有相業履其在内助彤管有煒帝曰懋哉徳容嶷嶷朕自邸潛深知所以繼續而行世濟斯美崇徳尚功有例有體曰祖曰禰若孫若子諡以顯號公侯有偉表之豐碑漆園故里臣拜稽首慎終如始臣力方剛圖報無已大元故大名路宣差李公神道碑銘大元以神武戡定區夏長䇿逺馭控制撫御之方甚悉故治無小大例建官臨䕶猶古監郡然而權威眎前代為有加維魏府盤城千里為户㡬十萬其襟帶之雄節鎮之重自昔號建國至署監總者必勛伐世胄練達時體通習漢事忠貞而有材望者膺選在桓撥甫夷之後官府草剏之初布宣皇靈統攝羣屬具民瞻而勝保釐之任者鈐部李公其人也公諱益立山其先係沙陁貴種唐亡子孫散落陜隴間逺祖曰仲者與其伯避地遁五臺山谷復以世故徙家酒泉郡之沙州遂為河西人顯祖府君歴夏國中省官兼判樞宻院事皇考府君用級爵受肅州鈐部其後因以官稱為號喪亂譜亡遂逸名諱公昆弟四人獨公少負氣節通儒釋洞曉音律以廕儤直宫省積勞調沙州鈐部國朝運開乾維時公兄由肅州長奉使於我太祖聖武皇帝異其才辯因與館接使察䍐深相結納情好既宻約輸欵内附天兵圍肅以射書事覺遇害及丙戌冬師次燉煌公審天命之攸歸憤兄忠之不果遂㧞部曲詣軍門迎降太祖以公首効忠赤特加褒命𨽻國王穆呼哩帳下從征羌落毎戰敵王所愾故所向克㨗有功丁亥夏師還乗破竹勢命圉將呼圖克特穆爾偕公招諭沙州守臣率衆偽降伏發擊走之呼圖克馬踣追兵垂及公下所乗授之得逸去乃麾左右逆戰却敵而還上壯其勇召使前勞焉曰當危急際委巳以濟人汝命固不靳邪對曰彼國之勲舊倘墮姦計有辱君命以新附顯被驅䇿效節死事廼所甘心太祖聞而嘉之仍諭曰卿勉宣忠力㑹當以好爵縻汝明年戊子春從攻沙州破之帝怒不時下欲屠其城泣請曰彼逆命者渠魁一二人民何與焉若悉阬之恐堅未降者心且臣賤屬咸在願賜全宥帝録其功忠許焉闔城賴以生既而命貳伊木沁行其部斷事官公不鄙夷其俗故裁遣終日無倦色人服其詳明焉庚寅秋有詔檄諸部精兵忠朂之士西征阿蘓部署公選鋒率轉鬭而前斬艾不勝計進圍城聚踰月不即克一夕公伺守陴者怠帥猛士潛登其墉殺十餘卒即大呼曰城巳陷矣諸軍進隨阿蘓乃潰䇿功居第一擢千夫長自是勲名焜耀朝廷有意大用矣嵗甲辰詔選勛能佐行臺於燕上以公克諧徃焉時節制所及二十餘道機務填委日復一日公輔相聼斷動合事宜政多便於時者辛亥春朝廷稔公綜練國事復有耑面西土之寄以年髙辭不拜憲宗皇帝奨其舊臣處内地便之命錫金虎符充大名路都達嚕噶齊復賚白金御驃以寵其行魏自兵後官府甫建羣豪諸司錯迭長雄不相下致政令不行事多齟齬公知其然無鉅細一以重典從事初則愕然既乃弭耳聼約束惟謹大綱既振於是舉亷能拉奸暴扶良善惠鰥寡凢政之不便民所欲而未得者率力行而更張之至於外而營幕連野内則使者旁午咸畏公方剛莫敢侵分少有牟於民一日釋菜廟學顧禮殿䵝圯公喟然嘆曰澤宫風化所繫今若爾何以興善心於民乎即完治一新其亭傳長府皆以次修舉衡漳嵗霖潦泛溢為民害甚侈公請於朝跨河建堤仍植槐栁萬本苞固峻址捍禦崩囓且充嵗時材爨之用迄今公私賴焉相有劇賊張黨結百餘輩所在為梗官不能鈐潛入境行刼公亷知窮其根株窟穴搜捕無遺自是相魏之郊民安田里暮夜絶桴鳴之警矣巳未春今皇帝南伐駐蹕濮苑起公從征既而知公恙命尚醫診視眷顧殊渥其年秋七月竟以疾薨於位春秋六十有九公資嚴明不妄言笑清峭有機警以忠順上結主知致出㕘大政名聲揚於時利澤施於世平居循循為善若不足惟恐一物之傷及束溼吏曹糾繩姦謬不絲髪少貸虎符麟節長魏師者九年號令明肅豪右屏息四境樂業隣藩悚其威望初公行春近郊見盛擷菓芳者公責之曰此天地秀實以養人多折何為乃扑教而去自是方苞體之物莫敢有暴殄者其始焉以重典立威終之以惠愛及物類如此至元戊寅葬公於大名縣臺頭里之新阡從卜食也夫人田氏白氏祔焉三子長曰阿嚕襲公世爵至元四年遷金齒等國安撫使尋陞授雲南道宣慰使兼都元帥今進拜中奉大夫參知政事行雲南等路中書省次老哈終大名路行軍萬户次舒沁布代兄民職孫三人長嘉琿孝友英發樂問學有藴藉至臨政精覈矯矯有祖風今階正議大夫佩金虎符充大名路總管府達嚕噶齊兼新附軍萬户曰特穆爾敦武校尉固鎮鐵官提舉曰萬努簉中朝侍從官嘗聞活千人者後乃有封公沙州之請何啻千人哉今子孫繩繩承世爵而繼禄次豈非隂積致然耶既襄事之三年嗣侯嘉琿百拜以墓碑來請曰我祖捐館以來將二紀於兹曽是表峙神道無顯刻以昭裔昧朝夕惴惴有不遑息者幸憲使惠顧以畢厥志庻圖報遹追之心有以昭告存殁大獲慰焉某謝不敏禱愈懇以教孝求忠之義固不得辭謹按所具善狀叙而銘之其辭曰乾龍奮飛天北方潛蛟乗時亦雲驤李公材武邦之良㧞身向明佐興王西傾崑崙掃河湟有來羣后何瀼瀼公從鈐校㕘戎行卒能建功出非常天威西收陳堂堂凱歌歸來百戰場龍泉精英百鍊剛試之剸繁尤允當行臺駐燕總皇綱上計委積如陵岡斂伏雄毅歸賛襄於惟致君變時康我聼我理多捄匡一日聞望馳四方醻功便考國有章付之方岳又汝長魏昔建國千里疆徳星出鼎光煌煌憬彼羣屬勢軒昂正名定分我所遑拊摩瘡罷抑豪强百廢具舉用乃張若傳有亭積有倉里不桴警孰竊攘大賁禮殿開兩庠春風絃歌齊魯鄉清民于淵吾閔傷躬督萬民楗隄防濁流不揚耕且桑功餘保障嵗屢穰始焉立威肅秋霜終以惠鮮熈春陽民祝公夀福此邦曽不少留我涕滂公雖遽徃有不亡隂積陽報理乃彰子孫嗣封奕葉昌髙牙大纛宜飄揚河流洋洋沙麓蒼是為元臣衣冠藏惟徳在民久愈光嗚呼此碑古甘棠大元國故衛輝路監郡塔本公神道碑銘并序皇元天縱神武戡定區夏禁網雖濶鈐制有方曰州府曰司縣乃建官監治于上路則復設總監一人其位望之隆控壓之重若古方伯刺史在諸王分地許持選掄委之耑任之久比同封建嗣承世爵校常調為重若夫寵襲漢貂榮分虎節卓爾良碩之才允濟承宣之美其生也愛方召父其殁也思逺桐鄉者繄我衛輝路都監郡塔本公其人也公諱塔本黙色系出瀚海大族王父府君諱鄂倫圖初太祖武聖皇帝龍飛朔漠合一諸部公扈翊開拓屢樹勲伐授鄂勒歡部工匠總管仍佩金符顯考府君諱伊埒烏蘭為人膽勇善騎射早以世胄為内侍官嵗壬午帝西征有獸驀至潛嚙御驃上怒合圍大蒐公蹙獸至帝前射而殪之上喜甚錫百馬以旌異自是歴事莊聖太后憲宗皇帝以先朝勲舊為御前總執法毎大犒饗衣盛服乗名馬麾纓秩肅官儀周行雲幕殊顯赫也府君生四子公即冢嗣也公姿白晳美髯而氣幹魁偉膂力絶人長襲父秩出入禁闥親宻無間已而有言貴近納賂致叛者上命搜索帳橐獨公衣被外廩粟數斛而已由是亷慎為上所知已未秋憲輴西陟棄羣臣而北明年庚申世祖皇帝北還公倉皇東播迎謁中途上素聞其賢為顧恤之及登極俾就宿衛至元三禩詔以衛封皇姪永隆達實為采邑陞州為路遂輟公來監治既下車以衛壤褊狹路交衝㑹使軺營帳騷屑無時不力為撫養遺黎保障一切恐靡然無復綱紀僨瘠豚上如淇控北徼無所附麗公請於朝來𨽻分辨主宰汔民勞為多由是衛以三州五縣列河朔劇鎮明年諸王圖固勒南征道出淇右供頓儲偫至駭民聼公逺迓啓其故下教申嚴衆斂跡而過輝營帳千屯分牧其西夏則避炎潞頂冬則迎燠山陽踐食村落輘轢州縣有不勝其撓者葢十年于兹公落其機牙來就約束輝民植園竹仰供賦税監司掩之入官少有犯民即破産抵以罪非養民之道公上奏力陳利害竟還民産劉忠輩陷軍儲數夥徵甚急雖破産莫克償公憫其窮苦折以鼠雀耗元數不甚虧為申理之得免釋連坐者三十餘家皆蒙其惠孔子廟兵後廢撤不復者五十載公首議修建解二驂馬輟俸稍兩月以佐費既迄工壯麗甲諸郡釋菜告朔文物煌煌其闡厥民彛思樂泮水貽謀後來有深意存焉者六年入奏膚功上喜甚以憲宗嬪賜之金玉鞶帶上賜雪鶻副焉七年河朔大蝗衛獨不為灾識者謂徳政所致其秋科民為兵甲衣需紬製之市闕民不易得公命以繒代之敕使以軍興不可曰脱有悞我則任之民賴省便八年夏四月入覲得疾上命皇姪阿蘇岱同尚醫來視以六月十有三日薨于上都寓館得年三十有九訃聞上嗟惜者久之遣使䕶喪南歸塟汲縣西郭清水之曲公姿剛毅嚴明事上忠奉母孝平居寡言笑凛不可犯及與僚吏共事有量知體通議論樂從善無一毫自用之私要以愛養民力成就王事為亟知總尹陳公祐之賢敬讓歡洽與共施設至事關興除人莫措手者即任其責不自顧惜晨起坐堂上吏抱成牘鳬進公詢尹云何曰得即署及朝貴踵至譯語瀾翻辯論請索關不可支者不動聲色徐以數語應之即聼決而去退食鈴閣下侍立不三數人門庭肅然杜絶私謁當時政令修舉豪强斂迹賦役均簡俗與禮讓河淇間民物雍熈風化大行皆由公處之以公亷楗之以勤强鎮之以安静有以致也時移事易人亡政存三十年間人物有渺然之嘆論者謂仁者當得其夀積善常與其報公位不滿徳夀未遐齡天之報施果何如㦲予曰不然賢者必有其後一世之短百世之長存焉天道可必至子孫而後定者審矣夫人伊濟氏姿淑婉亦瀚海名家後公十七年卒祔安𤣥堂子一人即今嗣侯達實特穆爾女四人長天次適輝長小云實巴哈次適汲尹額森巴哈次適工匠府經厯蘓爾約蘓巴哈孫二人曰巴延特穆爾曰托歡特穆爾女孫一曰巴延徳濟初公薨嗣侯甫三歳後二載太夫人挈之晉謁皇姪阿拉克台令舉頭視曰嘉肖其父仍撫背謂曰汝早成立當繼先業既冠從叔父懐逺覲世祖皇帝詔侍湯液扈東征有勞績至元二十五年命襲爵官懐逺大將軍材識明敏臨事善裁決止酒十年讀書無倦秉志挺特有過人者祗遹先志儷蹤時彦蔚然以賢師帥稱佳聲載路達于天朝蒙賜府第一區賢王亦以錦衣玉帶白金為賚大徳改號嵗冬十一月以書幣走京師請於某曰孤子無所肖似尚賴先人遺澤猥嗣爵位朝夕惴惴以圖報為亟惟是揄揚先美昭示永久庻㡬少有慰焉敢百拜以銘章為請追惟先郡公交最久知行已為詳義有不得辭者謹按善狀系而銘之銘曰金天瀚海包元精斗極通貫氣上蒸地靈人傑古所稱篤生世賢為國楨爰有真人起朔庭風雲儷景争騫騰維公家世開五城執掌大憲昭儀刑帝前盛服麾仗纓雲幕萬士羅天星肅焉約束一氣凝日華光動劒佩鏗渥洼神駿天池鵬維藩采邑啓衛坰其徃視師汝則能衛維小邦勢孤撐民勞事劇力莫勝興滯彌罅須力行繭絲保障事匪輕今則致理宜合并與善知體政大經兹焉吾分非自京坐鎮政有公而清暴强斂跡民敉寜學校修舉禮讓興吏畏民愛化大𢎞紫庭入奏報政成賜金増秩循固應嬪以天御何寵榮蝗不為災嵗屢登民沐膏澤如幪帡願公福夀川方増一夕星殞瞠有聲素旂南下風冥冥民失怙恃疇恤矜昔歌且舞今涕零臧孫有後事可徵嗣侯善述徳日馨豐碑墮淚勒我銘大書世篤忠與貞懐我夙愛為世程龜麟漠漠秋烟生衛人尸祝公之靈桐郷世祀何千齡大元中奉大夫㕘知政事稷山姚氏先徳碑銘至元改元之五載秋七月憲臺肇建于以配肅天徳用昭太微執法之象詔平章政事塔齊爾公為御史大夫其裏行十有二人就舉所知以充員數某亦忝簉與列始識姚侯君祥於肅政堂為人邁閎有膽氣勇於必為又功名自憙尋膺才選由本臺架閣授監察御史朱衣白簡意躍如也時朝廷方勵精圖治思聞讜議振折骩骳崛强之氣君祥一旦責與志合義激于衷殆似與事㑹者嘗與柄臣庭辯得失摧姦發伏見於聲色不少假借彼情露氣褫落其機牙上為動容嘉其峭直因目之為巴爾斯國語謂其不畏强禦威猛猶虎然且喻之曰爾後有違太祖聖訓及干朕之紀綱者許令直達罄所願言由是臺閣生風士論有埋輪都亭膽落金吾之目故四仕風憲入長秋官再尹大府皆著能聲遂進拜中奉大夫㕘知政事因不自遑暇曰愚忠朴直効用何有致兹貴顯追念先考讀書遯世不一見於用潛徳幽光流慶後人欲報之徳昊蒼罔極有求銘太史光賁泉穸霜露之感庻㡬少慰遂以銘章來請自惟君與不肖早以義交友愛之情寔深孔懐况久要不忘其敢以不敏辭謹按東雍之姚系出唐宰相文貞公遐裔逺祖伯禄嘗任絳州觀察判官卒塟屬縣稷山之南陽里子孫因占籍為邑人今姚其氏者尚餘七十家雖莫克昭穆要之同出一祖風聲氣習猶可識也君祥大父以祖竁艱於溝合别起新阡於嘉禾之北原父諱某生十有八值金季搶攘家業蕩盡孑然以孤童子流寓代之雁門鄉貢進士趙公愛其姿性温克館之為門倩其先素以方技行府君幼傳家學或勸售其術以資生事曰利者人所共趨其如不可何醫重事人命死生繫焉今以餬口計措不精之術於其間寜寒莩死義之所不敢為也聞者為歎息遂安貧處分以闡庠為業終身不易非道一介不取與於人簞瓢屢空進修之志不少輟由是逺邇矜式以師儒推重之及二子稍長嘗庭訓曰聖賢千言萬語牖人於善以要領而論不過忠孝兩端而已汝等其勉旃異時立身成人恐不外是夀五十有八以疾終於代遺囑天福等起宗顯親歸塟先隴為切配趙氏治家清嚴教子孫有法君祥初拜御史戒之曰古稱公爾忘私汝既委質為臣當罄殫一心黽勉所事勿以未亡人為卹俾我追蹤陵母死之日猶生之年也君祥亦請於憲府監察責當言路有犯無隱儻因事獲譴乞不親累或以奏聞上為稱之曰巴爾斯母子雖生兹世其義烈之言當於古人中求之命侍臣董文忠傳㫖翰林院特書其事光昭簡冊由是夫人賢淑聞於時元貞元年十有二月晦考終牖下享年八十有七生二子長曰天福即中奉君次曰天禄終和衆縣簿男孫四人女孫二君祥之子曰祖舜終秘書監著作郎曰華善未名女二俱適華族天禄之子燕山魯蘇布特先是君祥總尹平縣絳即屬郡封樹墳圈凢儀制之得為者略皆備具及母夫人之喪方尹真定即棄官奔赴爰奉二親祔之𤣥瘞既償先志遹展孝思維姚氏自文貞公已來歴唐迄今餘五百嵗彯纓若綬代不乏人迨雁門府君遭罹世故家業中衰復能積徳累行躬不受祉遺之子孫中奉君承世徳之清源浚之以蠲潔而端其本采羣言之枝葉滋之以茂實而循其能宜乎起身韋布致位卿相為連為率勵薄俗而振清標也是宜銘銘曰岷山導江發源濫觴豫章蔽空起於毫芒士貴尚志再世而昌天道於赫孰謂茫茫東雍之姚系開鉅唐盛衰靡常善為降祥繄雁門君源深流長不享其報後祉曷量生丈夫子訓以義方一朝奮飛大我門墻峨峨豸冠振朝之綱摧姦發伏恥後趙張嬰鱗上諌屢皂其囊精誠耿耿洞達帝傍以虎喻猛奨其忠良㳺刃恢恢盤錯莫當外臺雄峻搏擊翺翔羣狐闖穴一鶚横霜風動百城孰為暴强遂參大政榮極寵章豈曰子能先代之光追報無及有事顯揚豐碑掲業勒銘煌煌惟孝移忠惟忠孝彰孝繼忠傳大風泱泱子孫訓之昭示不忘秋澗集卷五十一欽定四庫全書秋澗集卷
