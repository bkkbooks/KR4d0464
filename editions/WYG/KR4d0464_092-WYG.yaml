front:
  text: 丘配享祖宗事狀臣謹言伏念我國家列聖相承奄有天下六十餘載今海宇一統自堯舜漢唐以來未有如此之盛兹蓋陛下神聖天縱孝治日隆以不世出大有為之資臨御有道故也然所有未舉大典在臣子分禮宜建言所謂方今大典郊祀是也何則孝莫大于嚴父嚴父莫大于配天自堯舜以來至于金宋上下二十餘代之間莫不郊祭天地及五方帝神以配父祖蓋尊之至也祖宗之聖重熈累洽郊祀之事未暨舉行者縁禮文弗備有不遑及者今陛下即位二十餘年功成治定昭事天地尊禮百神畧無虚歲若大禮一行將咸秩之位合禘於圜丘豈不大通神明降福穰穰者乎又念自古偏方小國尚皆力行尊顯祖宗以為天地百神之主恭惟陛下大􅄻護助際海内外盡付所覆而上帝簡在陛下之心又大可見矣不於此時報本顯祖以答天庥其於繼繼承承之道終為曠闕兼舊有典章自金章宗一行之後湮没遺逸不絶如縷即今就有三二老儒并收拾到亡宋典册講究張皇一旦有成將萬倍於尋常使陛下垂旒被袞對越上帝與三五同功並接數千歳之綂於上新萬方耳目於下使王道明而墜典興天地察而上下順聖政聖教不待嚴肅以成以治所謂聖人作而萬物覩也豈不盛哉由是而觀自古聖帝明王纘承先業所任之責未有重於此者故傳曰國之大事在祀與戎惟陛下裁察
