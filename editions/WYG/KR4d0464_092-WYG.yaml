body:
  text: 鈞州建原廟事狀蓋聞益廣宗廟大孝之本欽惟太上憲宗皇帝雖聖靈在天而神功武烈見於郡國者固當昭布遠暢以盡中外臣民之敬今河南鈞州係先太上皇帝王業所基戰勝龍興之地蓄靈擁休赫焉斯在冝營建原廟俾親王歲奉嚴禋以彰聖德光昭造邦之本誠嗣天子顯揚祖宗之至孝也牒司為中丞王通議病愈狀竊見前行臺中丞王通議去嵗春自揚州赴闕奏事回偶患病疾百日作闕今過朞年已是平復即日居家讀書以教子為事其於已私似為便安若以方今選用人材之切如王通議者才術德望理合起復未宜投置散地若不舉明伏慮憲臺未知久遺録問保士人杜之材賈宗傳狀竊見新鄉縣布衣賈宗傳胙城縣中選儒士杜之材二人性沈厚端亮有文辭而通世務讀書三十餘年安貧守道以耕稼自給未甞枉已妄有干進其於士論畧無瑕玷誠丘園之秀民恬退之良士也今者幸遭明時選材為急理合薦舉使㧞出民間以備内外之用必能行其所學不負所守以之振士氣而抑僥風不謂於時無補彈保定路總管侯守忠狀檢㑹到中書省欽奉聖旨定與提刑按察司條畫内一欵節該所部内應有違枉並聽糾察除欽遵外今體察得保定路總管侯守忠粗魯無識凶暴有名恣意亂行略無忌憚不任以職猶恐敗羣重之以官凶焰何奈以致不遵朝省對抗使人詈辱同僚穢言肆口躭悞經賦縱而不征引帶私人結而成黨取能聲擅斷職官樹威風敗壊官府其吏民枉被陵暴者畏其凶惡不敢聲訴所望察司稍為抑按今又為阻壊如此中外嗟嘆莫不失望叅詳本路近在都南實為要郡所轄一十五處軍民約十萬餘户據根本内北首恩澤固民心非良吏莫可今使凶暴如此之人臨民辦事正猶以豺狼守羊無不傷之理據此合行糾彈體復教授李龍輔狀今體復得本官併與原保相同當職又覩其為人雅厚清純臨事通方有如修整廟學訓𨗳生徒舉皆有法雖淹滯年深未甞妄有干求所謂有德有能可以從政者也兼知得北京南京教授俱蒙遷調理合陞擢以激士風舉楊德柔狀竊見南路録事司軍户楊德柔天姿秀穎不妄干進累厯筦庫繼任本路照磨及奥魯府提控案牘檢法等官俱有廉能之稱其為書學尤所精妙方今少見其比今名在兵籍常以家貧執役行間譬之象犀珠玉要以不宜塵迹泥沙此士論之所共也卑職按巡河南見之廣座其學問行已並與所聞相同據此合行保呈伏乞樞密院照詳施行論王學士合陞承㫖事狀竊見翰林兼國史院承㫖中奉大夫姚樞今已身故據本院翰林學士嘉議大夫王磐人品風節追配前賢議論文章發明聖學方崇儒重道之秋膺養老乞言之眷若陞授承㫖職名以德以材實孚中外之望據此合行具陳中書省照詳施行保舉提舉張從仕狀竊見前綦陽鐵冶提舉司從仕郎同提舉張從仕賦性良明為人謹厚兼通儒吏厯仕年深掌財賦而藹廉潔之稱論刀筆而有裁遣之敏加之嫉邪處正識達時宜試為有用之材皆係廉知之實理合薦舉以俟陞擢特選行省官事狀竊見福建所轄八路一州四十八縣連山負海民情輕譎無常困苦者多其在邊隅實為重地存心撫馭尚慮失宜縱暴侵漁不無生事縁收附以來官吏以朝廷遠貪圖賄賂習以成風行省差擬職官又多冗雜擅科横斂無所不至致政壊民殘草冦竊發指以為名下愚無聊因之蟻附其嘯聚去處附近貧民盡為剽掠内地軍興不免蹂踐中間雖有憲司糾治梢末尚艱所行其於根本有無如之何者甚非朝廷包荒一視同仁之意求其治要無過得人為先且府州司縣等官雖不能一一精擇據見闕行省官僚如平章左丞二府名位特選素著清望簡在帝心文足以撫綏遺黎武足以折衝外侮盡忠所事籌䇿有方不以利賄為心使刪除積弊省剔寃濫肅清邊陲庶幾民安事靖日趨治域以之招諭則彼心可服以之進兵則我直人信今賊之所以滋蔓為梗者正以内缺官僚乗虚有名故也可不深計而熟慮哉設或不爾雖濟濟布列上下相蒙以私害公民之用敝猶焚火溺水日益深且熾矣得失之機實係于此卑職叨居風憲覩此其敢緘黙自惜論草冦鍾明亮事狀竊見福建一道收附之後户幾百萬黄華一變十去其四今劇賊鍾明亮悍黠尤非華比未可視為尋常草竊誠有當慮者今雖兩省一院併力收捕地皆溪嶺囊槖其間出没叵測東擊則西走西擊則東軼凶焰所及煽惑殺掠為害不淺招降則賊心不一攻圍則兵力不敷又兼春氣動時雨行彼負固我持久恐猝難成功似宜益兵力置總戎一節制進奔合圍勢至窮蹙其將自斃惟復特差重臣宣示恩詔招諭撫慰以安中外兩者之行庶幾必有一得保醫儒胡璉狀竊見衛輝路醫儒胡璉資性詳明學術有素凡經治療多獲痊安據本路見缺醫學教官若令璉補充内當教育諸生必有開益據此合行移牒請照驗施行保儒生韓𢎞牒草竊見衛輝路録事司後進儒生韓𢎞性溫雅有士行素明經學兼習詞章甞試以事議論容止舉皆可觀據兹良碩宜備時用以勸後來今將本人所業文字録連在前合行移牒請照驗施行論教官俸給事狀竊念天下之事得其人則治不然雖有紀綱法制將衰苶而不振此必然之理學校者育材出治之本也見承奉御史臺劄付該諸州府皆有受勅教授仰免差儒户内選餘閒子弟入學修習儒業仍令各路正官朔望省視及按察司官選試行義修明文筆優贍可以從政者然後解貢此誠為國育材以備文武内外之用固非細務也却思各路教授多係老儒宿德白首一官不沾寸禄良可哀也今欲修習之業旬省月視責有成效亦以難矣合無照依國子學醫學教官一體頒降俸給不然據見有學田去處於每歳收到子粒内官為明定斗石月充廪給以濟貧乏外無學田去處准復别議定奪如此䘏勸庶幾官無虚設之名學有賓興之實將見文風蔚興有不期然而然者矣論開光濟兩河事狀省議即從所議罷役㑹驗近欽奉詔書内節該自今以始煩民之事一切革去便民之政次第舉行欽此今體知得省部符文准前工部尚書李鄂囉齊等呈開洗東平濟州等河道并剏修閘堰可役人夫一萬餘名計該八十六萬五千餘工合用石材地丁等物且舉德州一處所著該白棗木九千餘條每條長六尺徑四寸石材九千二百八十餘段每段長四尺濶三尺厚七尺計其餘該著數目比之德州豈止數倍雖云和買目今驗户樁俵上户十段中户不下五七餘塊並不見發下價錢即要赴所止送納日夜催併殆不聊生縁石材地丁非民間素有積蓄之物計其採買工價搬運脚力上户已不能辦下户將何以給有破産逃竄而已深為未便近年創開海道益都淄萊濟南東平東昌等路百姓已是疲乏死損數多哀痛之聲至今未息今又東平等一十餘處供辦上項夫役等物比夫海道之役亦為不輕是齊魯魏博數路之民被擾無遺又念前政苛撓去歳不收民多流亡加以今秋風水蟲蚄災傷所在缺食恐又聞此役復業者轉行不來見在者又將逃避山東重地不可不慮兼此役浩煩未審曽無奏聞儻已後不能成功虚費國力百姓實受其敝將來誰任其責然此却訪聞得李尚書等官見行安置土壩九座合無候來春土壩修成更為責委深知水利官員一同相視光濟兩河於深淺不常時月斷流走沙去處試驗土壩委能積深浮重轉漕糧船迤久通行快便然後修理石壩尚為未晚仍於出産石木去處官為差雇夫匠採打用度不致取辦一時逼迫靠損人難卑職謬當言責以鎮静為職親覩其事不敢不言合行移牒請照驗備申御史臺照詳施行論濟南路所轄達嚕噶齊合遷轉事狀竊見濟南路所轄州縣見任達嚕噶齊内承襲勾當及己滿年深未經遷轉者一十三員今朝省庶政稍有未便務從一新若將上項達嚕噶齊人員於本投下州縣内依例遷轉實為便當庶不致恃賴久任樹黨行私官吏因之受弊據别路未經遷轉者亦合一體定奪保李提學昌道狀伏念俊造秀異皆禀氣之清造物者靳固未甞多得今有其人使徒老明時誠為可惜竊見前上都路提舉學校官濟南李師聖經明行修不妄干進文筆性學皆有古風及叩以政事議論通暢皆切時之務可謂年高德邁學富才優韜晦城市不求聞達當今朝省以選材為急如師聖者若擢以風憲或置之館閣俱有所長可收實用論濟南經厯闕員事狀凡厥政務必官吏相須而後能濟若官有其人而吏獲其用二者得一則事無留難竊見濟南路所轄州縣一十三處路當山東要㑹事務頗繁所賴首領官調議規畫為功今本路經厯知事俱各闕員問有經厯孔文貞省部别行差委東平等處勾當却於本司署銜請俸將近朞年又本府憲司親臨於上今檢得簿書未完事理九百餘件久乏其人責以事有兼辦實亦勢之所難理合作急選注材能使補其闕庶不致有躭悞一切事務秋澗集卷九十二欽定四庫全書秋澗集卷九十三元王惲撰玉堂嘉話序中統建元之明年辛酉夏五月詔立翰林院於上都故狀元文康王公授翰林學士承旨已而公謂不肖惲曰翰苑載言之職也莫國史為重遂復以建立本院為言允焉仍命公兼領其事時不肖侍筆中書兩院故事凡百草創經營署置略皆與知其年秋七月授翰林修撰同知制誥兼國史院編修官方帝澤鴻龎賚及四海誥命辭頌咸與撰定再閲月蒙二府交辟不妨供職兼左司都事自後由御史裏行調官晉府秩滿復入為翰林待制時則有若左丞相監修國史耶律公承旨霍魯忽孫安藏前左轄姚公大學士鹿菴王公侍講學士徒單公河内季公待制楊恕修撰趙庸應奉李謙不肖雖承乏幾於一考其獲從容侍接仰其祖宗對天之鴻庥聖訓無窮之睿思皆聞所未聞者至於文章髙下典制沿革朝夕饜飫所得亦云多矣今也年衰氣耄盡負初心因紬繹所記憶者凡若干言輯為八卷題之曰玉堂嘉話其或燈火茆堂之夜尊罍心賞之間吐嘉話於目前想玉堂於天上鳴息有時盛年不再良可嘆也然昔人有宅位鈞衡不得預天子私人為恨顧惟此生不為未遇用藏家櫃以貽將來至元戊子冬季二日前行臺侍御史秋澗老人謹序
