front:
  text: 五十四
  hash: sha256:7314d5d4ebb7ceb80f5e05d952f2d70154301e5829b35df5afb6be49e3692bef
body:
  text: 元王惲撰碑大都復虞帝廟碑幽陵之祠虞帝所從來緜邈廟據金故苑西北維兵後廢不治獨唐貞元間復廟碑宛在顔真卿子頵書人屢欲易去礱焉以它用主者心惝怳若有儆動迺已厥後道士陳志𤣥直廟西百餘武起真陽觀為長春别院復購焉約不犯元刻用石背勒營建本始備力來徙碑與趺坼身挺植重不克舉仆道士惕息磬折向碑祝曰今神顯思若是願置安處且遠荒穢尚敢他用以黷聖靈神維降鑒庶畢兹志安載而去吁亦異哉初樞密趙公良弼嘗建學宫於鄉縣求志𤣥為工師既迄功以徙碑事蹟來告公曰嗚呼噫嘻皇乎休哉惟帝明徳萬古是式况冀土茫茫析而為幽州者帝之所經畫宜乎燕人祠饗不忘廟屢廢而旋復也又遺碑巋然自唐厯五代遼金當大元戊寅凡五百有餘歲神物䕶持俾勿壞汝歸興復之責不在師乎志𤣥曰唯即以道宫丕構作新廟而奉黼扆焉既而趙公將志𤣥之懇以復廟記見屬某拜手稽首而颺言曰日月星辰帝文明也君臣父子帝彛倫也山川風土帝疆域也是則聲教所暨巍巍乎與天地同休孰能名而能報哉今志𤣥黄冠師因趙公一言而復數百年之舊俾來者瞻天就日知慕帝徳如蟻之赴羶可謂推原道本敬其所當敬乃知天理之在人心者曾一息而間斷邪至於稽古樂善因機就功毗贊皇猷思成比封之美又以見趙公事君治民孶孶焉以堯舜之道存其心者也誠宜特書以詔來哲仍繫樂章使都人歳時祀享登以歌焉其詞曰帝降諸馮東方人兮幽幽深山鹿豕羣兮耕稼陶漁至為帝兮風動八區烝乂一兮矧惟析津帝經制兮物不苦窳化土泥兮聖靈在天濡鴻私兮阜財解慍南薰時兮鳶飛魚躍日用而不知兮風移俗變天理存厥彛兮燕人懷思歆明徳而祀兮八音廷陳鳳來儀兮九疑雲深望何依兮我賡九歌言匪空兮皇天降衷克綏惟帝聰兮恫彼下民中庸其鮮充兮嗚呼胡能一天下之慮允執其中兮大元故中奉大夫浙東道宣慰使陳公神道碑銘并序士有奮身韋布作時藎臣志足以有為材足以應變氣足以充守學足以明義毅然以致君澤民為己任雖罔獲克畢厥志不幸而罹患難猶能挺樹名節勵薄俗於當年激清風於來代古難其人今於宣慰陳公見之矣公諱佑字慶甫世家趙之寧晉為人固窮尚志好讀書恥陸出馬授書混泥塗間癸丑歳以藝能應穆王府辟一見而列侍從官公勤勞所事進盡忠言王嘉其大有禆益遂賜號尚書俾顯異於衆及分土陜雒其監與守丞承制封拜以公充本道軍民總管治洛邑關河衝會政荒民耗困於兵賦轉輸不大更張之將無以為治即啓其利病之要者得廿四事率如請又奏免征西屯田軍士數百家歳負糧料及椒竹等課甚衆自是殿夷屎息日就安集之樂八年間規為保障率以身為律度至今人賴其惠至元二年調官制行授奉政大夫南京路治中徐宿大蝗移公督捕役農民數萬度其勢猝不能殲秋稼垂成即散遣收穫自捄不然秉遺無餘或以不可諫曰救菑獲罪迺所甘心朝廷以從權韙之尋授嘉議大夫衛輝路總管其治比洛愈精勵有方正官紀革吏習杜私交審聽斷務以至誠感發期於實惠及民每庸調之下必經畫寛便使民有餘力部内屯戍習豪横眡民司蔑如莫敢誰何公因事致詰落其機牙衆譁噪擁其長以來意在棖觸公坐㕔事上折之以理厲聲色略不相假貸為氣褫而退自是合境肅然奉教條惟謹復比干祠大起孔子廟暇則集諸生肄經史以敦教本至風化大行吏民稱美刻石以頌之時憲臺初立首以材擢授山東東西道提刑按察使公憙其責與志合踔厲英發擊豪右擿姦伏逆見隨決所至以神明稱貪墨者往往投劾而去褰帷具瞻有民動百城之目平時底藴雖略張設而惓惓朝廷之心不食寢忘嘗以三本陳事忠嘉剴切反覆論列至屢數千言大率太子國本建立之除宜早中書政本責成之任宜耑人材治本選舉之方宜審又羣小流言干撓庶政恐習以成風私門萬啓於下公道孤立於上臣知承平吉祥之言必不出於若輩之口事雖不報士論偉焉時機務多出尚書權臣意欲獨專柄用乃以併中書設三公為言事下大臣勅公預其議有説公宜審所向可致大用公不顧乃直言可否曰中書政本所係併尚書為一省便右丞相安圖位尊望重宜端揆如故三公虚位不須設置衆因以聞事遂寢斯皆國家大計人所持難公慨然吐論曾不少顧自是忠直之名聞於蓋代然不悅者衆矣俄遣僉書中興行省事十三年改授南京路總管兼開封府尹屬吏憚公方嚴有不安者仍諭之曰汝昔為顔今跖吾以法繩之昔為跖今顔吾以禮遇之善惡自取吾何心其間衆悦弭耳趨事許蔡郊有劇盜號賊李三黨結其衆軒澒囂嘯公然剽刼兇焰動兩河間及公來逸去以計捕獲即撾殺之萬口稱快明年春進拜中奉大夫浙東道宣慰使時江左初下人情臲􅑶例賂遺相尚公表以廉正濟以恩威遠懷邇乂浙人忘亡其不貪毋擾之戒兹有驗矣福建平大軍俘溫台新附萬餘人而西公力為申援還民伍者什七八越支廩繼米幾萬斛掩為兵食驗籍復於舊行省下令算商酤頗亟公建言兵後瘡痍未復宜停徵以示優䘏遂檄公覆明台營田歸頓新昌值玉山冦出剽報至衆謂可去曰吾守土臣義不當避去之民曷依俄兇黨突入衆寡不敵遂遇害實至元丁丑歳九月七日也得年五十有六靈輀抵越人士素服哭祭皆失聲願留葬起祠以奉嗚呼非守義不囘推忠及物安能感人心如是子䕫請兵討復得首惡七人僇越州市次子臯扶其喪歸殯洛陽縣之北邙原公剛明廉介博學有經濟材信道篤立志堅從政果於應變為尤長氣之所充雖百折不撓故處大事臨大節審量合義挺然力行要欲表表有所見於世而勢利可得奪耶其愛君憂國之忠出天性固然與人交有終始不可干以私官二千石三十年自奉猶寒士不知富貴為何物可謂甘貧苦節不愧神明者也以用罔能盡死非其所訃聞識與不識舉為愴惜之生平喜作詩詞必已出能道所欲言節齋其别號云曾祖懷妣范氏祖忠妣張氏世在野父諱子安性慈祥美丰儀易農而醫壬辰際以其術多所全活陳氏之興豈其是耶用公貴封資徳大夫妣張氏順徳夫人賜錦衣各一襲公夫人翟氏以貞靜能安公貧子三人長曰䕫武畧將軍佩金虎符充某路行軍總管次曰臯讀書克家矯矯偕有父風次庶未名女三俱適士族孫八男女各四人卒事之明年孤子夔等䘮服纍然百拜涕泗以墓碑為請因念公與不肖交素厚死生之際三入予夢皆有明徵豈非精爽交感動於彼而應乎此然耶雖既挽而復誄其感於予心者固有所未盡今屬筆來圖不朽以義以分其敢以不敏辭謹按母弟知府天祥善狀勉為論次之銘曰維天降材畀我共治其道伊何曰忠與義安而行之匪功匪利致君堯虞否乃予愧不曰藎臣其將孰謂堂堂陳公元精貫中貞亮之義謇諤之忠以剛而順以介而通養我浩氣塞乎昊穹一朝遭際奮從雲龍即事進諫礪夫深衷列二千石敏焉赴功以徳以讓凛兩漢風擢登使車攬轡而東三年齊魯一鶚横空治安陳書衮職是縫明我國本如棟之隆充庭預議孰知雷同屹然有立砥柱河衝望公廟朝帝載奮庸持節江海卒與禍逢命也何言其來則豐哀哀嗣侯子職大供臨江一慟揃夷姦兇憤雪九泉與沒其躬癭陶之墟交川溶溶顧瞻佳城祖禰是從魂兮歸來安此新宫忠傳孝繼有泱其風是維慶父之表過者敬恭大元故真定路兵馬都總管史公神道碑銘并序雲雷合奮屯難伊始君子以經綸為艱攙搶廓清恢我文治世臣以守成為重維史氏倡大義起營朔爰自都帥公仗鉞分閫來殿鎮方擴武略以濟屯角羣雄而宣力取威定霸於是乎在繼以太尉留後二公篤忠貞昭嗣服治具粲張民物趨阜至於知垂創之維難審守持之匪易躬念成規洞焉恐墜卒之承先志而推方岳之賢著治效而冠羣辟之列者總尹史公其選哉公諱楫字大濟世為大興永清縣農里大家曰成珪者公之曾大父行北京六部尚書曰秉直者公之大父金紫光禄大夫河北西路兵馬都元帥曰天倪者公皇考也初乙酉歳父金紫公遭罹仙難時侯齒雖稚資禀剛毅沉塞已能從叔父忠武公破走仙復真定衆謂臧孫達其有後於魯矣及長不妄言笑善騎射博戲音樂略無所憙開府公奇其好尚不凡令給事左右俾習知政務己亥歲奏授公知中山府事惟定武衝會務殷使軺營帳中外騷屑公措畫有方數年間民賴以安尋充征南行軍萬户翼經略公徇地蘄黄間當戰攻殊力值阻乏則頓舍樵爨經營百至甘苦與衆共之及還一卒無饑疫疾失所者丞相以公材果從政治兵皆所於可壬寅春引覲太宗皇帝奏曰臣先兄天倪死事際縁姪楫孺攝行其職今業克負荷請解所佩金虎符畀之臣天澤備列戎行俾兄不失舊物臣之願也上大加稱賞即授公真定路兵馬都總管蒞政之初顧惟鎮府表山帶河連屬三十餘城生殺進退咸倚耑決一旦惴惴繼述有夙興夜寐謹身率先明政化信賞罰任良能汰貪墨劭勵農士惠鮮鰥寡庶繭絲輕而保障之功可立辛亥歳朝廷肇議賦額户率徵白金一鍰名曰包垜銀諸路審其重莫敢倡言公毅然請於上曰兵後生意未蘇民恐不堪如銀與物折各減二數庶民力少寛且無逋負允其請詔為定制迄今天下賴焉各道發楮幣貿遷例不越境所司膠固取息二三歲一更易致虚耗元胎商旅不通公騰奏皇太后立銀鈔相權法度低昂而為重輕變澁滯而為通便時又有言食肴之醬請按籍計口樁散者業已從之公詣行臺論其不可曰鹽鐵本貿易物難同差稅一例配著今民資單弱是愈抵於困不若依舊便議遂寢嘗有冦行刼保之南鄙捕罔獲時檄所在如盜數償主公與保將賈會境上議强歸於我公弗辨徐曰盡付之第竊發地約敝邑耕斸去其囊槖以絶後患何如賈悟遂詘我免輸償錢數千緡元氏郭其姓者愬府僚屬於達官按問既而質無實達官怒欲抵郭死公力請釋之曰此人以重辟謀陷汝等何援為公曰殄之以懲後未若宥之死愧其心也況人命至重豈以妄言某等卒窮極戮哉竟杖而遣之辛亥斷事官伊爾根特古斯來按本部性苛察喜事凡被劾者凌轢羅織莫有脫其彀者公能隱忍將順使虐燄斂熇不致濫及非辜害吾事而已其已籍沒者十數家公奏明其寃竟皆復業公之救時濟物民得受一分賜其不自顧藉類多此中統建元首授公真定路總管同判本道宣撫司事遂舉明州縣文學屬吏三十餘人後皆致通顯云三年齊叛平忠武公首奏兵民之職不可併居一門行之請自臣家始公即日解紱以職讓其弟江漢大都督權角巾私第裕如也遂選勝西郊築治亭圃日以植花木玩泉石為佚老之計澤車欵段徜徉遊詠人不知為故侯大將也以至元九年二月遘疾越廿日薨於正寢春秋五十有九某月日葬獲鹿縣明丘鄉安社里之西原公之純正莅官嚴恪親戚左右罔敢一語私於其間至若民情鬱而未宣時政舛而未便寢食為不安思有更張而後已終其身無聲色逸靡之娛其奉上接物刻已自勵不一毫及民前後積負至四百餘定弃官日方議易田宅以償朝廷閔其廉為代輸焉故在官三十年間時和歳豐政平訟理鎮之士民輕裘緩帶鳴絲跕躧嬉遊宴衎樂史氏之無事内則連甍接棟井肆夥繁河朔兵餘獨稱萬家之盛外則阡陌縱横耕桑彌望熈熈然為樂郊之民及朞而報政崇奬聲實俾為諸道法宜矣夫人三完顔氏北京路左副元帥某之女沙卜珠氏金紫光禄大夫北京七路兵馬都元帥烏頁爾長女布薩氏子男廿一人曰炫武徳將軍常徳府管軍總管曰􅀈早世曰煇奉訓大夫孟州知州曰燧朝列大夫東昌府同知曰熒曰􅂱卒曰炷煇曰煊潼關提舉曰燭燃炎曰煬承直郎僉嶺南廣西道按察司事曰爀曰燉行省宣使曰􅀈烘炬炘烜炯女子一十三人俱適華族孫男廿三人長達喇齊武徳將軍鄂州管軍千户餘並㓜女孫一十七人若子與孫服庭訓迪檢押略無紈綺驕豪之習飄纓若綬爛焉盈門詩云靖共爾位好是正直神之聽之介爾景福公誠有焉公薨十年嗣子煇熒介公弟征東經略使樞密御史中丞彬以神門之表來請某惟曩昔為省郎公以民事上計意有未安者憂形於色固已竊歎其有志於民及按部燕南延見故老歌頌遺愛有不能忘者又知夫流風善政感人之深也如是輒第其門士李豹善狀而系之以銘其辭曰繄農之務世服勤正以篤實天為親史惟累葉耕而耘一氣厚積生元臣惟元再傳彪其文弱冠崛起乘風雲中天草昧殊未分亦能當閫收元勲豈其垂裕彌後昆大忠遽掩豺豕羣是為明府皇考君公今嗣封昔孤童已能馳射精絶倫利器小試無輪囷堂堂大府恒山軍一日作牧兩漢循於鑠叔武經且綸大綱一舉萬目振如何畫法參能遵保民無踰家富殷弊去太甚輕絲銀權臣按事何斤斤斂回熇艷燋吾身㧞擢良善脫已焚載其清靜民謐寧丹砂成金頑化仁潭園水滿花氣薰高牙大纛馳朱輪崇高有餘足具陳公曾目覩耳弗聞公堂糲食坐日曛念念民事憂絲棼絃歌萬家和氣縕農夫不識城四闉桑麻蔽日原隰畇熈熈鎮土三十春歳時報政帝乃訢褒顯班上諸侯裀白頭一徳酬國恩用昭先功畫麒麟惟冥報果忠與純慶流又見螽斯孫功成身退素所云笑解留務遠世紛郊原花木清而芬拂衣去作封山神空餘遺愛沾邦氓甘棠懷思墮淚存零落何必西州門嗣侯追報圖不泯哀號罔極悲秋旻我銘騰兮舌可捫擬配大茂增雄尊孝思永言世所敦淇州創建故江淮都轉運使周府君祠堂碑銘郡邑之設因形勝而稱望雄由變遷而有併置至於廢起千載之餘功垂百世之後俾存歿懷思感人心而不忘者非豪傑經濟之士未易致也朝歌殷故都兩漢縣焉魏齊來移理衞縣河朔經途東出鉅橋之西而朝歌遂墟天兵南下鉅橋正途亦廢自太行東接浚郊莽為為林灌行者並山取㨗躡跡於兔蹊鹿町之間又分當相魏汲三會之郊盜賊囊槖其間日禦人為尋常邦君邑長顧目前不遑奚暇遠圖哉故羣行恣雎莫敢誰何者有年於兹壬子秋國家經略江淮擢行臺聽事官周侯充諸道轉運軍儲使仍置司於胙侯道出朝歌登鹿臺遺址顧瞻河山愛其沃壤且歎夫梗阻若爾慨然懷辟易興除之舉己卯歳公以事北覲圖利害上之朝廷為報可詔以彰徳大名衛輝漏版户五千實焉復其徵三年因易號曰淇州縣曰臨淇特勅公領辦其事於是推賢擇能申令講治設官府建倉廩立市㕓外則表疆理布丘聚開阡陌梁津夷險以便行路置淇澳思徳南陽薛村等鎮以間逈曠耕牛田器及飢貧不自存者一仰給於官下至取材於山陶甓於野率躬親規畫略無倦色西山鐵官甆竈公出本資悉發其伏利自是四方流徙願受㕓胥宇者日接踵而至商通工易貨委闤闠餘糧畝棲烟火連甍鳴雞吠犬相聞和樂之氣達於四境侯復以既庶且逸無教可乎遂建孔廟立學師敦化基而厚薄俗不五載内外修治井井可觀邑居過客相與咨嗟歎息曰曩以荒烟廢堞之墟化為樂郊樂國向也流逋傭耕之民今為恒産完美之室雖天休涵濡非我公建白興造之力疇克臻此既而公薨於位子鍇襲職繼述先志有光於前者至元癸亥轉官制行州𨽻於衛耆舊馬良等謀於衆曰公去世逾遠吾輩生理日完嗣侯又厯官他郡其開建本末卵翼深恩匪立祠樹碑奉祀光揚何以報盛徳而圖不朽乃相率度治城乾方爽塏地廟而貌之十三年秋適嗣侯自魏府别駕代歸良等邀過妺邦大合樂以落之相與請予文以紀其實走早辱公知敢以不敏辭念古之君子興事造功率忠愛持心無一毫功利自私克成碩大光明之業故民戴之如父母仰之如神明宜矣如公初以轉致之便興廢棄於荒殘因丘聚之成養流布於完實乂未嘗占據膏腴營治已私為務誠可謂持心忠愛豪傑經濟者矣致感人心存歿罔間耿耿不忘者如是據禮當祀在法宜銘公諱某字徳甫晉之隰人孝弟忠信慷慨尚氣義蚤以材術振耀一時仕至江淮都轉運使其豐功碩徳具載墓碑兹不復云今嗣侯自武徳將軍陞嘉議大夫佩金虎符淮東高郵軍總管銘曰河山兩戒殷故墟自昔土壤稱膏腴千年廢治灌莽區殆似淵藪藏逃逋政以規畫無良圖堂堂周侯烈丈夫一朝王門牽華裾利焉思興害思除南來主漕過此都顧嗟形勝資豺貙何忍蒼赤為肉魚龍庭入奏為允俞一語能沛天恩濡郊圻中畫開井廬連甍表植左右閭日中市集百貨俱荒榛一旦為亨衢流民賴之彫瘵蘇勞來又復三年租夫耕婦織圃有蔬桑無附枝麥兩塗芃芃翠浪西山隅昔焉餬口今贏餘我衣我食公所予欲報之徳父母且胡不鈞𢎞秉事樞天奪之速為世吁公去雖遠愛豈殊身後報謝當何如閟宫盤盤列綺疏繪肖公像儼以居歳時豆籩民駿趨腯牲在几酒在壺坎坎鼔擊吹笙竽睇公風馬乘雲車神兮歸來意恒愉風時雨若蛇蟲菹甌窶滿篝厲鬼驅我詩劖石誠無諛採之民謡與同符大書特書不一書太行礪兮河帶紆黄童白叟相攜扶猶有墮淚沾龜趺資徳大夫中書右丞益津郝氏世徳碑銘有序至元十七年中奉大夫參知政事進拜資徳大夫中書左丞被二品命服中外具瞻越郝氏惟煒公乃顧宗屬言曰自惟疎簿烏能致此兹蓋我祖考勤勞貲積篤祐餘澤集於後人乃克有濟今新壠幸建麗牲有石惟是大書顯刻表飭神道庶幾報明靈昭裔昧而傳永世然非頼篤古達辭者其將伊託遂以銘章見屬某以寮雅故義不當辭謹條其族系世徳祖禰之所以劬躬燾後資徳之所以起宗顯親者廼後之以銘詩維郝氏其先霸州益津縣人資徳之曾諱贇少擢律科第授憲部撿法為人文無害以讞疑平允稱正隆末遷司理叅軍佐進發部歿兵間曾妣鄉進士王公之女徳柔嘉有母儀祖諱誠長身秀髯丰儀甚都早以義勇聞大定初奬死事子孫得敘用材武授衞軍鈐轄盧溝當國都西門水潦時至艱於航杠承安中大起石梁府君首膺選督役醻辦最功陞昭信校尉貞祐初燕不能都扈徳陵南遷得疾卒官下享年六十有七祖妣同閈大家亦王氏姿淑貞事舅姑孝謹生二子曰瑨曰珂壽七十有八終珂早世草場府君瑨即資徳之顯考也天性孝弟初鈐轄府君南徙靡所依藉奉母夫人走汴中塗困乏置母便所與珂索食隖間游兵遇皆驅之去敦武君泣請曰弟㓜不任事又母所鍾愛幸免以視義縱珂還行復念珂終不能遑將其母因跽而訴曰將軍以母故釋弟然母老須瑨可生且為人子不竭力於其親將安用為敢以死請遂伏馬首不動兵怒以佩刀刺之即仆地作死狀兵委去因䕶母與父會後用恩例調京城草塲副使官至敦武校尉至元乙丑某同資徳在東平史侯幕獲升堂謁拜時敦武府君壽期頥氣貌魁偉其齊家勤儉有法若一官府然資徳年向五十佑封君列卿士長已貴朝夕溫凊門内事必咨而後行府君晚樂道家言遵其禁忌以靜黙自處其修嚴如此明年春二月遘疾考卒齊氏寓館春秋八十有四資徳扶柩歸葬真定縣西三里安上原之新阡夫人馬氏祔焉夫人出棗强腴族性貞烈主内務殊儉生平樂於為善至絶葷酒不御每晨興炷香禱曰願聖人壽天下安妾家亦沾餘佑又月具饌食囚繫為常初資徳為郡決曹歳壬寅有盜刼臨城石帥家以疑得劉等十餘人繫之皆誣服上官趣論報夫人訪得里間有稱其寃者歸語資徳曰捶楚下何求而不得汝當盡心詳審恐及無辜資徳亦方以贓驗未白致詰及承教仍文移緩其事尋果獲真盜自是資徳於獄情愈恤慎後復全活張紇兠等十餘輩由是而觀昔雋京兆母聞不疑於囚徒多所平反即言笑異常不然慘而不食以夫人教戒方之賢於人遠甚又近舍有賣餅翁媼併亡喪不克舉夫人鬻粧奩中物掩瘞迄成禮非出天性能然耶中統甲子歳正月十二日以疾化於私居之正寢享年七十有四子男一即資徳公女一適尚書許公孫五人曰思仁謹愿克家次思義資溫雅有幹局材官嘉議大夫諸路人匠府總管次思忠性果達少中大夫同知真定路總管府事次思禮思敬重孫二女孫二竊嘗論古之人因隂積而獲顯報由仕宦而位公卿者多矣然非濟以材徳則卿相之任有不克負荷者今郝氏連世孝友純善罔侈厥報委積流衍介祉於資徳公公廼傳徳襲訓自微而著莫不材稱故能依光藉潤遂貳台輔是皆祖宗載基載播於前而公以材徳肯構肯穫充大光揚於後故也今復援賜鼎歌鐘之例載徳象容刻銘樂石垂示無忘可謂遹追先業濟其世美者矣其詩曰商啓期封肇迹太原因鄉定氏郝姓乃蕃晏相夔將實為裔孫逮晉中圮族系枝分散處朔南異宗同源處俊相唐立朝直聞義形于主忠烈名存維徳繼顯乃理之循暨暨司法奮跡益津平讞庶獄廷無寃民毅然就列奮彼祗勤於赫鈐轄職司徼巡駕梁桑乾萬石鱗鱗神工雲僝增秩醻勛敦武趨父奉母南奔中塗阨阻孝義兩伸施於閨壼徳馨帨􅜳三世一致封培善根宜達而窒歸成後人篤生賢孝夐出人羣持衡機務叶贊經綸華軒駟焉乃大于門不有其美推功本元爰求我銘載苾其芬我觀資徳才全徳洵仁以濟物謙以持身須彼陰積蔚為名臣隆隆新丘萬象傍鄰表列華柱石臥蒼麟神維顯思孰知蒿焄匪義奚立非孝無親移忠於上垂裕後昆恒岳之陽滹沱􅔿淪淵峙無極永昭刻文秋澗集卷五十四欽定四庫全書秋澗集卷五十五元王惲撰碑
