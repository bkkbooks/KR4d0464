front:
  text: 五十八
  hash: sha256:c6a9903cb5d79f9073ddbb233e97d1572680fd172994ab4dbde5441a8a741bfd
body:
  text: 元王惲撰碑渾源劉氏世徳碑銘并序金源氏倔起海東當天㑹間方域甫定即設科取士急於得賢故文風振而人材軰出治具張而紀綱不紊有國雖餘百年典章文物至比隆唐宋之盛若夫篤志力學扶藝應選首破天荒魁冠多士父子昆季相繼擢第為名士夫作良牧守文行端雅門第清峻為金朝第一流者其惟渾源劉氏乎劉氏出彭城望族五季板蕩播遷朔圡遼末逺祖諱用者居𢎞州順聖縣之耀武闗世業耕稼生子翰贈承徳郎配張氏追封彭城郡太君生撝字仲謙即今監察御史鄰之髙祖也始釋耒耜習進士業當遼金革命擾攘際學未嘗一日廢天㑹二年肇闢科塲公以詞賦第一人中選惟遼以科舉為儒學極致文體龎雜萎苶視晚唐五代尤為卑下公勵精種學文辭卓然天成妙絶當世一掃假貸剽竊牽合補綴之弊其後學者如孟宗獻趙樞張景仁鄭子耼皆取法焉金國一代詞學精切得人為盛由公有以振而起之也釋褐右拾遺轉知大城陽曲懐仁三縣擢大理正遷平陽府判官安東節度副使兩貳大理寺出刺石州累官中大夫年六十三卒於位翰林學士張景仁碑其神道公性淳厚見義固執待物誠好誘掖後進三為理官議獄主恕不屈於權貴故多平反尤長於治民興利除害若嗜慾然施設有條理簡便可持乆所去見思圖形奉事素愛渾原山水幽勝買田家焉晚號南山翁夫人渾源雷氏北京轉運使思之女封彭城郡君生四子曰汲曰渭曰滂早世曰濬汲字伯深穎悟絶人早傳家學與弟渭同擢天徳三年進士屢為州縣有聲累官朝散大夫應奉翰林文字西京路轉運司都勾判官平生寡合不羈慕郭林宗黄叔度之為人晚節倦於游宦放浪山水間以遣興讀書為樂稱西嵓子述夀藏記叙其行已甚悉卒年五十八鄆王府文學陳訥銘其墓有西嵓集行於世屏山李之純引其端娶曹氏追封彭城縣君一子偘字稚川大定十年進士第積資奉直大夫豐王府文學兼記室叅軍孫一從䕫字和卿奉職出身善作詩曽孫文祖渭字仲清少好學克紹箕裘既登第授承徳郎知秦州隴城寨事調隰州軍事判官終朝列大夫岢嵐州刺史號闕老人一子价河水泊酒監曰濬廼鄰之曾祖博學强記少有聲場屋間既而用廕入仕至安逺大將軍饒陽令配張氏封彭城縣君生四子佖似儼俁佖字稚行宣武將軍真定府軍資庫使三子從善字澤卿彰徳府酒監從臯字平卿從契字禮卿武義將軍克勝軍副都統孫五人曰郊武義將軍曰郅等俱早世似字稚章孝敬友愛出於天性力學能文稱其家聲四試于庭不偶用恩賜第授承仕郎華州教授再仕承直郎主沂水縣簿娶王氏封彭城郡太君夀五十五終於家遺文雄深簡古有廼祖風嘗訓子孫曰為士當先行檢如絲之潔將立其身慎無㸃汚汝佩吾言則無忝矣故屏山李純甫表其竁曰善人劉公之墓其為士夫之紀盖可見矣一子從益字雲卿自髫齔時已有成人度擢大安元年進士乙科調鄯陽丞長葛簿陳州防禦判官皆有治績投機應變措畫出衆意表進提舉南京路榷貨事丁沂水君憂起復拜監察御史君負材尚氣資之以學欲使事業表表大見於世一旦職與志合所言朝廷紀綱時政利病竟與宰臣辯論得失不屈去職閒居淮陽與諸生講明伊洛學乆之選令葉縣至則鋤强剔蠧豪族惡黨噤不敢少肆請免逋租三萬石致流民自歸者口數千大起孔子廟既樹教本集諸生肄習其中風化大行考課為河南最未幾召入翰林為應奉不踰月而卒得年四十又四雷御史淵誌其墓趙翰林秉文勒銘神道皆稱其噐識明敏剛直敢言學可以輔政教材足以濟時難賫志以沒士論惜焉葉民至廟而祀之孔子稱遺直遺愛者豈近是邪蓬門其自號也盖取南山翁誠子詩元自蓬蒿出門户莫教門户却蒿蓬之句有文集十卷粹而贍通而不流類其為人内子嚴氏封彭城縣君子二祁郁祁字京叔少穎異為學能自刻勵有竒童目弱冠舉進士廷試失意即閉户讀書務窮逺大涵滀鍛淬一放意於古文間出古賦雜説數篇李屏山趙閒閒揚吏部雷御史王滹南諸公見之曰異才也皆倒屣出迎交口騰譽之及與御史公退居於陳相與講明六經直探聖賢心學推於躬行踐履自是振落英華收其真實文章議論粹然一出於正士論咸謂得斯文命脈之傳壬辰北還郷里躬耕自給築室牓曰歸潛歲戊戌詔試儒人先生就試魁西京選山西東路攷試官後征南行䑓拈合公聞其名邀至相下待以賔友七年而沒享年四十有八翰林學士王磐誌其墓娶史氏洛陽名族一女適前監察田芝子文冕一男景山終國史院編修官孫一興同有神川遁士集二十二卷處言四十三篇歸潛志三卷行於世郁字文季亦名士中統元年肇建中省辟左右司都事出尹新河召拜監察御史能文辭工詩翰别號歸愚卒年六十一娶趙氏前禮部尚書璜之女一子景嵓鄴字伯震一子景巒儼字稚昻鄰之袓也登承安二年進士第累官至中奉大夫秘書少監壬辰北渡痛宗國云亾蹈河而死配李氏封彭城郡夫人三子從禹字虞卿登至大七年辭賦第官至朝散大夫同州録判一子曰都從愷字舜卿自幼卓犖不羣稍長入郷校擅能賦聲再舉不契就廕補官授武義將軍登封主簿已而綜覈縣務束溼吏曹人不敢以少年書生易之國初生聚稍集遴選賢能亟於撫字辟府君攝領韶州事繼真授冝陽令縣當兵後庶事草剏髙下闕下車亷知其利病休戚斟酌而更易之凢科取差徭必驗其等第俾均輸焉暇則集俊秀於縣庠講明禮義美善風俗為政才朞月而頌聲四達終更授河南府路經厯素精吏事䂓畫恢恢刃游餘地致六房無滯務公餘與紫陽楊大西庵楊公九山李子徴薛庸齋微之觴詠於泉石間中統四年正月廿八日以疾卒於私居之正寢夀五十有五娶張氏宣徳望族貞静柔懿自在父母家已稱純孝及歸于我事舅姑恭順飲食服御非經其手不進也終於至元廿三年十月廿日享年七十有五𦵏合祔子男三人􅅠字君美平江路匠人提舉至元三十一年十一月以疾殁得年五十有五配段氏享年四十有九鄗袁部場管勾鄰才識警敏練達時務由省掾授承務郎工部主事次陞承直郎順徳路總管府判官選充監察御史女二長適渾源州王氏次適應州元帥韓公之孫孫五紹祖江浙省宣使慶祖澱山廵檢繼祖勝童乞童從稷字賢卿終濟南路儒學教授三子曰郇曰彬曰郛俁承奉班祗侯遂州酒監一子從周字文卿劉氏先壠始𦵏順聖之耀武關南山翁徙祖塋於渾源縣東北黄嵬卿御史君以世故流離起先塋於宛丘神川旅殯洹水歸愚定窆燕山令鄰奉大父中奉公衣冠及考妣柩安厝於河南北邙之原是為渾源劉氏洛陽新阡鄰復欲彰先懿昭孝思圖不朽諗不肖嘗問學於神川先生知其家世頗詳持張陳李趙雷王諸公銘誌求述世徳碑以猥列後進年廹衰謝不能發越先賢事業且何敢秉筆於諸名勝之後堅辭者乆之鄰復曰金亡士之北渡者百不二三今消磨已盡求接見先輩老於文辭而最知名者莫公若也今弗恵顧則先世之事將於何託不獲已乃採掇諸公緒餘及已之見聞而知者㑹歸其極而系之銘銘曰漢庭射策貢士遺風排斥百氏仲舒是崇唐文三變敗北無從振起衰苶尊昌黎公兩公傑出莫之比隆考其𦙍裔孰繼芳蹤大名難再氣數竒窮金源立國網羅才雄首魁多士惟南山翁程文妙絶一世師宗當時景仰韓董攸同子孫克肖家學是攻巍科七決聲華摩空故家文獻泱泱大風蓬門卓爾世業克充言直行果節效匪躬支撐傾頽致時之雍賫志雖殁留名則鴻中奉矯矯職貳大蓬存亡惟義表我孤忠子孫昌熾為報則豐神川力學洞聖心胷明理貫道匪文奚工玉佩瓊琚大振辭鋒道家學之淵流㑹百川而朝東章甫適越惜不時逢隂相同氣先志恢洪朱衣白簡乗御史驄何劉氏之多賢試紬繹其始終種徳植善無踰於農立志務學禄在其中忠義仁恕傳嗣彌縫維人事之克盡見天理之昭融冝澤流渾水之源青蔚南山之峯北邙之原巋然新宫世故牽率匪忘祖封是惟金百年文宗之裔過者敬恭大元故廣威將軍屯田萬户聶公神道碑銘皇元以神道戡定區宇翦金取宋保塞一軍號稱䧺勝帥閫堂堂節制於上亦由部曲宣力得其人故也况聶氏與蔡國張公奮跡布衣義同里閈依乗風雲奕世竭節者哉公諱禎字正卿世為定興沈陶井里人曾祖洎大父皆在野不仕父福堅資豪偉善騎射國初張公圑結鄉義柵西山之東流堝選推為百夫長從定河朔取汴蔡有殊績終襄縣屯田總管母夫人段氏同里大家生四子公其長也㓜沉鷙寡笑言不作羣兒戲及長聰敏好學有謀略慷慨尚氣節年十七嗣襲父職張公察其才武試以攻守之方為問條對灑灑有成算公愕然不復以向之吳下阿蒙為睞歲丁未率本部分功立杞城亳阨宋人出没以絶侵軼之患繼攻泗州前後以功受賞有差已未扈世宗皇帝渡江攻鄂渚拔蝥弧先登陷東南城堞帝督戰親覩壯其勇酌酒飲賚以紀其功其年冬命領千兵迎援大帥烏蘭哈達於長沙水陸轉戰備嘗艱苦竟達漢陽由是陞總轄仍佩銀符中統三年賊璮叛公攝千夫長分圍厯城接戰嘗先諸道兵蒙賜鏐馬俾激士氣璮平遂南城荆山至元六年真授千户易以金符是年朝廷進軍襄樊公屯守鹿門甚力至元七年行臺命公將番漢馬步三千人取新興寨公曰彼衆而恃險我客而力不一惟當神速掩其不備可成功爾遂一戰而克斬馘不勝計生擒者七十人賞楮幣四千緡至元十二年分𨽻元帥博囉歡收連海淮安等州宋守將許安撫者陳艨艟五百艘以俟公帥麾下直擣之許少却水陸乗之彼軍大壊殺死溺水者十七八盡獲其戰艦器伏帥府上功旨陞武節將軍繼攻下昭信泗州階進宣武時孽宋已亡江西湖廣皆内附獨静江恃其險逺旅拒不下上以毫軍素精鋭戰必勝攻必取命摘全軍進撃至則賊勢披猖公率猛士深入殊死鬭首奪西南城堞衆隨之以進城陷㨗聞加授顯武將軍行軍總管桂境雖平大兵後所在草冦竊發充斥山谷間為良民梗衡山茶陵尤稱搶攘帥稔公威名烜赫摘諸翼兵千人往平之公窮竟窟穴夷抉根株其脅從汙染者諭歸田畆井邑安堵軍無私焉所在老㓜擁馬首泣拜曰非公活我吾四縣遺民二十餘萬無噍類矣其戢禍亂威愛兼濟有古良將風既而蒙古漢軍都帥張侯以公部曲故家屢立駿功請於朝復備將佐十七年從張侯入覲進拜明威將軍毫軍副萬户仍賜錦袍一襲旌宿勞也俾鎮建康尋移維揚十九年選充江淮都轉運使二十五年改任廣威將軍大都屯田萬户一載間區盡營屯耕稼有法比前政收穫為倍蓰二十六年更授右翼萬户田旌閃閃有萬屯曉唱之樂至元廿六年三月十六日以疾卒於官享年六十有二𦵏祖塋公資外嚴毅内廓如也孝於事親忠於為國出天秉固然治軍旅號令嚴明部伍整肅臨陣抗敵挺身決戰略無顧惜故每戰有功聲名烜赫暇則讀書不輟左氏傳通鑑戰國策皆通大義古人良法美意竒計偉畫涉獵融㑹多見諸行事方經略南服母夫人陳氏尚在堂公廼心王事不遑暇然遺親之念未嘗置頃刻也一旦心神内動泚流被面曰豈吾親有故動於彼而應於此耶即請歸覲比至太夫人䘮尚未斂公攀號屢絶痛其終之無所存活克襄大事郷里感嘆為平昔孝誠所致夫人郭氏同縣南王里人温純恭謹奉事老姑怡順進退不敢自專年踰四十夫貴子長應對門内事尚以名稱姑病早暮侍養不少懈倦湯劑必嘗而後進及亡朝夕廬祭者三周歲宗黨號曰孝婦待妾媵有恩禮略無嫉妬子一十一人長曰惟義承父爵右翼屯田萬户次曰惟謙峽州夷陵尹曰惟明閤門宣賛舍人曰惟孝惟爵未仕皆郭出也餘㓜未名女四人俱適望族元貞建號之二載冬十一月惟義踵門來請曰自惟無所肖似尚賴先世遺澤嗣守緒業朝夕惴惴愧無光揚惟是鑚石紀銘表諸神門圖報萬一稔開翰學先生學古詞達當代將相家皆有煩於下執事倘得銘則為不朽矣中建元余應召中省獲識蔡國父子及提憲河朔郎山雞水之間亦嘗廵厯載惟疇昔雜次其件右而繋之以辭銘曰丈夫挺志無先外事况乎戰陳聖所慎毖不有諸内孰形於外擴我秉彛克作其氣惟燕南陲聶宗所系奮從雲雷以功名熹侯不封萬志焉罔遂報之後人福禄何既桓桓廣威克昌再世曉暢戎機蔡國首噐發縱指獸俾展其翼横戈長江斬鱷蒼海萬竈同心雅歌奏凱長驅靜江指顧摧敗草砌蟲如肆為民害玉石既分善良攸頼笳鼓歸來旌斾揚彩酬功進爵大蒙天賚髙大門閎郷閭嘆嘅不知其中大本有在子曾有言質而不礙篤孝惟移化而忠義公於臣子存沒無愧巨川騰波郎峯聳翠片石干霄千古光配大元奉聖州新建永昌觀碑銘并序奉聖本秦上谷郡地唐始立新州石晉割賂於遼更今名亡金陞武定軍節度今雖為州當兩都往來之衝其地望尤重於昔雲山環抱川流交貫樹藝茂盛有中土清淑之美風俗雄碩樂施而好善盖燕雲習尚氣義而然也據治城東南里許有道觀曰永昌其初祖寂然子張志𤣥隠㣲世居河東之孟門縣越自髫齔歆挹真風從平水景鍊師為全真學既長正一法籙亦稱精究貞祐南遷所在俶擾聞長春丘公應聘龍庭師喟然嘆曰天道在北吾將逺游雲朔庶有遇合聿隆道紀至永興之清樂郷愛其山水幽勝遂結茒而居凝神坐忘志趣叵測謁漿之家咸異之曰彼其中必有所得豈徒然哉由是風動一方日奉香火羅拜菴前聞有請必恍然開悟乃相與選勝得獨山中水頭地起建琳宇處師為上賔榜曰迎仙尊顯之也師佩上清三洞靈章主盟武定者幾廿載前後化度門人甚衆惟吳張盧三法師得其要妙而吳在伯仲為最寂然謝世藏觀南化臺吳號通𤣥子氣貎魁偉志行誠篤體含妙用動達𤣥機寂然師知為受道器常勉之曰汝舉止異常言論卓犖通文辭知醫藥恐鸞翔鶴翥終非草野間物寂然既終行縁城市人或叅叩誦答如流有一鉢千家飯渾身百衲衣心如江月朗情似野雲飛之句其胸懐洞徹如此加以符水療疾隠痛隨愈衆驚異以有道目之達官豪右共來敬禮至有得望其丰采而為幸者闔境尊信法縁契合遂易亡金劉太監别墅為棲眞所中有亭崇臺層檐為一境偉觀即改亭為殿奉三清睟容下逮齋厨庫廪以次修舉署曰永昌與迎仙為上下院自是徒衆雲集檀越之家設醮筵而徼冥福求符藥而濟灾疢者憧憧而來曽無虛日鐘磬之聲隠然聞於市肆間永昌琳觀為一方名勝道俗歸依之所矣通𤣥仙去寧神於永昌之南以後事付上足弟子虞法師師行業修潔和光同塵心存濟度多蒙藥惠補治遺缺而觀之規為始克完具以推擇􅂶𤣥門道籙虞寂陪𦵏師側其徒崔志善踵而增飾之崔沒盧法師以道籙來住持焉傳之門人李道素道素姿樸實惟恐遏逸前光内則起廢寮舍外則增置田圃朝夕齋戒載勤頌禱望髙羽流擢判管内道門事廼惴惴不遑曰向上師眞刳心勞神披荆榛掇瓦礫鋪敦教基吾輩何有坐享其安惟是刻石紀行俾見興建本末庶垂不朽來丐銘予以道不同不相為謀牢讓者再請益堅乃酌取大方家見於吾儒之紀載者論次而銘之後世所謂道家者流盖古隠逸清潔之士矣巖居而澗飲草衣而木食節欲以清心修己而應物不為軒裳所羈不為榮利所怵自放於方之外其髙情逺韻凌煙霞而薄雲月誠有不可企及者自漢以降處士素隠方士誕誇飛昇煉化之術祭醮禳禁之科皆屬之道家稽之於古事亦多矣徇末以遺其本凌遲至於宣和極矣弊極則變於是全眞之敎興焉淵靜以修己和易而道行翕然從之實繁有徒其特達者各相啟牖自名其家若寂然師弟𢎞衍博濟教行北山是也耕田鑿井自食其力垂慈接物以期善俗不知誕幻之説為何事敦純樸素有古逸民之遺風焉而復畀授得人顯揚斯在是可書定安之白雲觀盧法師建永興之觀張法師建與永昌同一法眷也銘曰道之大原𤣥文五千慈儉不爭清靜自然辭固奮激至理無邊修道為敎由是之焉全眞為學本乎善淵返純還樸復太古天䆒其源委豈忘蹄筌寂然出世私淑其傳雲朔俗勁聞善易遷坐忘感化孰分後先傾心信嚮克興大縁絶塵而下復得通𤣥化行城府重闡法筵一時景仰道履翩翩香火奔走先業昭宣燕處有室耕鑿有田遺我後人基緒緜緜門人繼承持守拳拳光揚有例刻銘瑶鐫流光遺烈億萬斯年大元故正議大夫浙西道宣慰使行工部尚書孫公神道碑銘并序雲西風土雄碩龍山峻極為之奠焉渾流交貫神川清淑資其潤焉故士生其間有􅅛竒宏傑之稱而劉雷為之冠焉然山川炳靈奚間今昔况河洛為帝王之里并汾多攀附之臣儷景風雲依光日月者哉若乃始以才技有光世緒終則挺輸忠藎作時名卿安榮福夀慶流後裔者誰乎故宣慰使工部尚書孫公其人也公諱公亮字繼明世家渾源横山里曾祖諱伯大父諱慶文咸勤力務本不耀其光顯禰諱威為人跅弛不羈早以功名自憙少有巧思肄函人業繕治堅宻出新意於法度之中方太祖皇帝聖武經略中夏總攬豪傑貯儲戎具為急廼挾所業投獻上賞其能應時需赐名伊克烏蘭錫佩金符充諸路甲匠總管太宗朝從征秦晉惻民被屠戮屢以蒐簡工匠為言頼全活者衆顯妣杜氏主内務有綱紀嘗辯雪工徒貿逆之誣因之脱死公生漠北年十許嵗總匠君挈之入覲太宗異其風骨曰此兒他日必大享用蒙赐御饌自是得出入禁闥矣及長資英明多藝能慷慨有大志練習國典通曉譯語所交皆一時豪俊衆亦以通材許之庚子嵗襲父職佩銀符定宗朝換金符嵗進課精例賜錦幣憲宗特賚貂裘仍勅繼稱父赐名世祖皇帝在潛邸上命嵗輸百鎧有中七矢而不貫者具堅完如此及南征果獲用中統建元授都總管上北征駐苦沒敦公出私財置甲胄六十襲以獻天顔喜甚鍚銀笏闕忠甲闕命領諸路雜色一闕奏闕四十妻工之鰥者歳支衣糧贍濟不給闕局廪給自此始又考制度定程式作諸路恒法公自承嗣選材闕下招亡恤弱出私財以代公費闕獲而闕軍興闕蒙賞進秩可謂盡心所事克闕以人材抱負論之干將補衲寳鼎枝車未膺所用有鬱鬱不能自己者至元改元朝廷清明治具畢張公上疏抗言冝設御史臺肅正紀綱雖不能有符士論偉之五年憲府肇建特拜監察御史官忠翊校尉上諭大夫塔齊爾公曰他人則未之識如伊克烏蘭朕熟其忠亷冝與汝共事時官僚極一時之選較夫多識朝廷故事洞達諸色情狀材氣足以投赴事機威望可以懾服豪猾在公無以踰此一日職與志愜思明目張膽鯁言無忌仰答㤙遇由是風生白筆氣凌霜簡論列無虛日時宿衛鷹房憑恃城社頗縱恣在他人弗措手者公優為之如上都濟時門强奪民物東安州縱馬駞齧食桑棗甚至砍伐為薪公痛繩之以法至豪强畏避上聞而以能目之三年考滿憲長奏公自供職無㸃水私至絶闕飲風稜銛利刺督切中裏行無出其右闕時選擢正為此爾可再任俾矜式新進者既而察闕為外事闕還西川行者冒支楮幣二萬餘定闕之義為闕役兵士治第採薪至被虎闕五十仍奏治其罪十年夏宣授金符武徳將軍僉山東東西道提刑按察司事至則務實用顯效張皇憲度故材亷者必薦姦貪者必置于法州郡惴惴奉約束惟謹褰帷具瞻有風動百城之目東平路監尹出貴戚簡重自居監司官至郡未嘗相覿聞公來按部迎謁境上糾治豪縱不法者十數輩曾無一語護援及去復伸餞禮博徳髙唐耆老炷香于頂來迓曰自立憲司未覩稱職如公者我輩獲安田里受赐多矣其威望顯著吏民畏服可知已十二年陞山北遼東道提刑按察副使遼東境土曠逺諸王營帳洎諸部種人雜處其間恃勢相凌為申嚴法禁革去宿弊豪强斂迹小民氣得少伸分司遼陽親王近侍五人刼居民資用且毆撃之有司不敢䆒民來訴即械五人徇通衢王諭釋其罪竟杖決之灤水濶而雜砂石自昔無津梁命造荆絡貯碎石為柱以成橋倣此建者百所自爾遼右免病涉苦十三年進階朝列十四年春陞授中順大夫彰徳路總管分佩金虎符惟相當南北衝㑹民物繁夥自昔為河朔名郡然政務煩重視鄰路為倍蓰公諳練政體材地有餘當王事坌集訟牒交至泛應曲當不失時措之冝平生遇事有為一旦重膺民社廼䆒竟利病俾實惠及民以三事躬請於朝其一比嵗霖潦傷稼民多闕食准免逋稅九千七百石其二諸郡輸逓取道本路徵發車牛越廣平抵順徳往還餘五百里非惟偏倍恐民力不堪蒙以廣平之磁州代焉其三本路稅粟嵗輸大名秦家渡由唐宋渡河東南行百五十里嵗晏寒沍車人告病聽於唐宋倉輸納前政貸民資五百餘定起新附軍營舍至是亦給公帑邢民李閏六嘗殺人累問弗伏干證餘百人移公推宻亷其實遂伏辜餘得釋時以神明稱終更相人懐思至琢石頌焉江浙平上諭中書省造作事重當選能者主之十六年冬授正議大夫浙西道宣慰使兼行工部事籍人匠四十二萬立局院七十餘所每嵗定造幣縞弓矢甲胄等物十八年上命左丞相阿嘍罕等征日本給辦艨艟戰具繕製堅完都將以聞上曰伊克烏蘭豈有誤耶二十年十月來朝大為上所奬諭赐宴於便殿二十二年授江西等處行工部尚書上章致仕間居清苑每風憲洎臨民官來質疑必告以益國便民之方二十四年九月覲上於朝殿上念世臣之舊問年今幾何居某處子孫幾人奏對畢赐食俾坐於御榻之西上遣大府卿納里忽問曰飲飫飽未復賜鹿羮白酒沾醉而出大徳元年子拱總尹大同奉公與夫人張氏還鄉里時公及夫人夀俱髙日與親友相飲宴鄉人榮之改渾源西北山曰晝錦有司亦用名鄉四年正月廿九日以疾薨於私居之正寢享年九十有九遺訓子孫勉力忠考少不及私二月十四日歸𦵏於渾源州西劉村先塋之次送𦵏者數千人哭聲聞數里外盖平生感懐於人者如此夫人張氏梁氏皆出名家張氏終於四年秋夀八十有四梁氏先公沒子三人拱資誠實材果純考力學由工部侍郎陞授少中大夫火同路總管兼府尹本路諸軍奥魯總管管内勸農事擏武畧將軍武備寺丞振忠翊校尉定海縣尹女三長適安平縣尹趙襄次適李氏劉氏孫男四謙襲世職從仕郎保定等路軍器人匠提舉次早世諧承直郎利器庫提㸃誼進義副尉保定等路軍器人匠提舉孫女三適趙氏王氏次㓜曾孫男一㺜頭曾孫女三長適李氏餘㓜公儀觀魁偉器量豐閎美鬚髯容色莊厲􅈺習時體譯語闌翻雜以談謔顧國種貴卿無以易其論列公朝集議竂屬處正奉公詞情剴切毫髪不假借善為鉤距能得小人根株窟穴似夫古之能吏才大夫至於奉上忠事親孝交友誠雖位望顯赫循循謙讓退然如無能為者齊家教子敦篤義方循尚禮法又似夫齊魯質行之士生平疾惡由義激忠其心休休樂善成美出於天禀粹厚放良臧獲百餘人貸貧民子錢七萬緡冝其三任風憲位正總尹丕張世守官簉六卿剛直有守允協士論忠勤無間簡在帝心福夀綿延子孫衆多家門隆盛雖曰依乗亦由平昔操履感召有以致然也可謂材徳具備勲名兩全哀榮終始者矣嗣子拱以墓碑來請因憶至元戊辰憲臺初立公與不肖同擢御史引見世祖皇帝在廣寒殿自爾議事松㕔聫鑣驄馬義氣交孚相得為甚懽後偕官於相迨嵗壬辰應聘北上復私覿保塞追叙契闊當時並峨豸冠今所存者獨吾二人公又奪去僕雖耄忍無一言耶既叙梗槩仍系之銘銘曰雲龍奮飛西北天神武載造坤與乾有來羣后旋戎軒所在戈甲相周旋孫侯挾技善達權賜名訓徒畀任專函惟杆格貴弗穿函雖多樣公發源犀兕七屬光生烟上為嗟惜賞世延風雲儷景同翩翩執藝誎請多活全臧孫有後理固然公其挺生鍾世賢嗣興遺緒心彌丹鯤化躍出天池淵豸冠執法班朝端憲綱未舉為進言太㣲一夕光星躔朱衣白簡相後先忠臣憤激同鷹鸇秋風博撃無空拳上目剛直由孤鶱青齊遼碣海岱連地廣物衆芽蘖間繡衣風采何翩翩積弊一鏟摧邪姦耻令張趙出吾前煌煌金節臨漳洹霜空霽嚴正春妍侯伯正位務固繁剸裁錯節驚龍泉吏惟寛慢猛則殘要本實惠蘇民編上請三事民力殫轉輸省便逋賦蠲横斂追給公府錢去思有頌徳化宣江浙平一俗巧儇訓授程課需世官共工汝賢常伯聨工局染院勞次銓歳時供億物利堅聖皇眷顧稱忠惓一朝上章遽引年功成身退名節完嗣侯亞卿請外遷作牧鄉郡意所便錦衣榮養白晝鮮世期福夀方綿綿丘山零落館舍捐停雲苒苒横之巔時有白鹿馴其阡神遊悽斷招來篇自昔豪傑誇雲燕乗時樹立孰敢肩千年酆劔埋神川鬱鬱紫氣衝斗邊何以驗之瑶有鐫英聲並與斯銘傳秋澗集卷五十八欽定四庫全書秋澗集卷五十九元王惲撰碑
