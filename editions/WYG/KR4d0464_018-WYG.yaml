body:
  text: 哭節齋陳公五詩時為浙東宣慰使按行屬邑回過新昌值羣盜被害年五十有六至元丁丑九月七日事也夷門樽酒罄平生誰料終凶在此行顱髪有靈通帝夢越戈無識斷由纓救時譽在何多得憂道深思恥近名南望兩行知已淚西風吹却又縱横笑談鞍馬最從容逺自南陽到洛中廷議有方先大節丹心無間總清忠餘人老去初何惜四海經綸共望公何日下車傾腹痛橋𤣥林墓哭秋風德音宣暢介麟沾逺調曽辭瘴海炎寒谷變春方煦嫗含沙窺影已隂潛峰摧天柱山雖壊桂折秋風氣􅈝嚴伸雪絳寃誰有疏吞聲空向九天瞻煦嫗一作燠休燠威喻反休虚喻反昭三年晏子曰民人痛疾而或燠休之燠休云痛而念之也若小兒痛父母以口就之曰燠休代其痛也盛氣横空葢代勲揮摩旌壘張吾軍乘時熟計利不利為善但憂聞未聞千里魂歸關塞黒百年精在死生分臨風痛瀉長河淚洒斷江東日暮雲惡棘梟鸞苦未分挺身東擬下䲔吞義醢不信雄貙慘死守庻全君父恩寃碧意凝東粤血大招空返北邙魂恢恢三木遺猶在儘是君侯未沒存夀繼先侍御帡幪雲下鬱雄沉偃植圓杈力儘任持重要端風憲本耐交尤見歲寒心望隆北海螭蟠譽思入南陔孝養吟漏泄光風来獻夀綵萱春滿北堂隂送劉侍御分司上都兼呈中丞何者功名是丈夫細思初不外民區油油雲葉從中合盻盻羣情待一蘇造命豈容論氣數當筵能盡是雄圖聖恩思治方宵旰幾問南熏解愠無題鳳山逸叟王明甫八秩手卷二子長桓字巨川為旭州尹次名構字背堂今為翰林應奉一府名香二十年鳳山歸作地行仙由来和氣薰陶久不獨天彛禀受全扶健漢更鳩有杖伴吟清獻鶴隨肩更憐五馬鑾坡貴并領春風上夀筵杜季明表兄史千載南還荆門索同賦為餞謹詩三首以贈杜時任中書省左右司郎中秀並岷峨萬仞青憶初載酒子雲亭幾年江渚悲鴻雁一日沙隄咏鶺鴒共被載融荆樹樂還家不愧草堂靈中郎儘擅平津閣未分歸槎老客星干戈漂泊中年後邂逅相看抵萬金風景儘收孤客淚山川何限故園心一作去國不知江客恨名家猶是杜陵心眼中棣萼春仍好林下詩盟喜更尋南去瘴江多少阻平安休復到家音咏看錦水東遊日望入停雲北上時憶弟逺衝燕地雪聨芳未賦棣華詩風塵抛入青萍劍一作情思琢出黄金壙去路留連白玉巵歸到荆門霜尚晚月明江樹影㕘差張提刑子敬挽章至元十五年六月十五卒在河南時作塞上曲云對月笛中起愴然傷我情秋風一萬里總向笛中生遙憐漢軍士掩淚下邊城攬轡南来擬拜君逢人忍以訃音聞救焚有志遺深愛博物何心泥欵文卿月儘輝丞相府史評當䇿竹書勲不須更聽西風笛愁滿西風日暮雲深愛謂北京行省郎中時曽救援民户三百餘家詩寄季明郎中中書機務日紛紛海㝢披圖萬國賔善斷獨髙如晦䇿名家復見杜陵人遥憐緑水紅蓮地滿意清江玉壘春正是救時心最切更須探本細經綸暇日登飛仙休逸二臺老圃臺荒草棘深魏公德業古猶今望隆異代瞻儀鳳錦爛輕裘憶昔吟隴陌按行餘利澤山川包總見雄襟羣烏知愛如相語隔葉時聞送好音詩寄劉清卿都事朋簪纔盍脱荷囊蘭到升庭見獨芳毳幕夜書稱快夢氷壺孤抱映秋霜十年紫禁烟花近四海金華姓字香南北相望固迢遞久要情在恐難忘秋日蚤衙示同僚閻簽事子靖憲府潭潭尺五天按臨八道儘繩愆乘時佐理疎明略攬轡澄清愧昔賢寛固可稱須有制事唯無詖乃能全所行果計無尸素放枕能安一夕眠慶趙仲器母八秩遐夀能康世所稀滿前蘭玊更熙熙氣充自得豐長禀德厚能髙九十儀秋月簾籠来婺彩春風堂背看彤芝燕城勝事今誰最聽取共嵓介祉詩椰實詩宣慰髙飛卿開宴出示此菓邀諸君賦詩西溪首唱僕乃賡焉坡仙帖裏藹餘馨炎帝圖經見典刑瓣削異樽陪北海暖包香霧自南溟摩挲枵腹疑藤癭雋永天漿勝楚萍吾子好奇時引飲沙頭閒却玊雙缾寄叅政相公不覿清揚近一年依依情在鳳池邊碧雲思逺餘千里紅藥堦升有二天兒輩初官儋好爵寵光沾喜動重泉白頭無計酬知巳㑹有文章見簡編和西溪韻送良弼提刑赴憲臺之召拳拳幾御大賢車謂張平章張左相姚雪齋也氣量𢎞深見歩趨望重正煩天下計人和愛及屋頭烏百年笑我遽如許一日似君其可無雅俗自来推坐鎮簡花奚待筆端區百城方聳使君車遽應旌軺内殿趨儀羽望清初振鷺柏臺隂肅巳翔烏人材輩向中朝列天下看来一事無數路清寧固佳政經綸何似被綿區南来和氣擁輶車佩玊長裾利走趨阿閣再鳴瞻彩鳳月明三匝笑驚烏事機應運深還淺才氣多君有若無與論功名果何在此心初不外民區送李觀還夀春幕府并序士觀友愛来辭促膝道舊眷眷有不能别者仍以親老别逺佳眠食是祝士觀請即此為贈因率爾賦焉見合淝王尹立夫為寄聲兼逹兹懇云至元巳夘重午前三日也去年首夏别燕城今嵗晴和㑹汴京相顧鬢顔成老醜不縁貧富異交情春蘭句好香生席歸路舟輕月滿旌地接兩淮終瘴溼身安之外總虚名挽禮部郎中丁公筍班出佩紫荷囊漢署當年别雁行學古不回平日守德方誰似老来剛眼中耆舊雲烟盡身後詩書坎掩香臺閣清風有餘凛一丘埋恨吹臺旁相下送舍弟官至鄧鄙時為竹監使十五年中三聚首一千里外兩相望春風邶北重分袂喜雨漳南夜對牀雲路暫淹騏驥足江沙晴䕶鶺鴒霜公餘正要加餐飯陽武同宗只二房舍弟仲略生朝十六歲巳夘五月廿一日時寓史開府宅江漢堂深晝錦妍亭亭花影舞胎仙一樽此夕歌鴻雁滿意眷風醉管絃遺業繼承心共切此身加健夀為先飄零南北初無定正要相看棣萼偏送千秋都司任宻州諸城令竊效贈言代杼衷素梁苑相逢傾蓋初照人秋水出芙蕖應憐世事方多故却恐微官似美除處巳道方何喜愠濟時舌在儘紓徐下車莫後神明政楚幕瞻烏待報書至元十六年歲在巳夘四月十一日偕大同郭天錫佑之大梁劉衝漢卿天党李昌齡千秋遊内梁門西大佛寺寺即審實相院也主僧郭里人臘七十餘相與㑹堂東文室坐話閒文字及壬辰歲京城警嚴令人嘅嘆乆之佑之為放生長歌劉起浮大白者數行懐仰之思渙焉冰釋然後知盛衰之不恒哀樂之無端也開口而笑頻何厭焉遂留題而去侍行者安陽楊韙義甫帝城何處散春悰花木禪房一逕通共訝殘僧談世故却憐閒燕得諸公風雲心事誰能了歡樂朋從豈易逢聽徹清吟歸路晚金明池沼夕陽紅山陽偶與大繼長相遇自辛亥年相别至今廿八年矣追念疇昔作詩為贈解鞍林下振清埃懐抱樽前得好開白髮滿頭心事在青山當眼故人来風流自有髙賢識感慨還深漂母哀讀盡深香轉蕭爽清吟不到伯倫臺深香係繼長父宜之文集號曰深香閒適予此行本擬游百巖不果故云漢東陽武太守臧公廟袁曹形勢兩鳴梟趨向終非翊獻朝歃血正圖扶漢鼎殺身何獨為張超荒城草闇遺壇在喬木風髙烈氣飄琳也為思名節正有書明正苦相招太守劉景融之任滑臺索書謹此為贈十年錦帶佩呉鈎曽翼龍驤控上游平日諸君稱雅厚老来五馬更風流宦遊喜在西溪部閒讌欣同畫舫秋歸雁亭前問遺俗遲回初不為詩留信察判士逹来辭以贈言為榮因此書以送且見余之素行云常憶終軍英妙年此時頭角見巉然百城望重非輕責六品除新實美遷姦弊得情矜勿喜事機到手簡為先河東説是懐恩地未礙蘇章有二天賦湖石得於汴梁華陽萬石説卿雲族聚支分此逺孫叠嶂秀来雖晻靄孤峰崛起更雄尊轉翻蒼背鱗猶動侍近紅雲色尚温覺我露臺光景麗洞庭秋氣鬰吟樽和士觀見贈詩韻鴻飛鷺散聚無時偶喜歸来共一池世路何心論薄宦燈窓同業憶深資但教白璧無微玷問甚青雲有素期却恐桐淮淮上月清光長使照睽離春露堂三首今年卜築露堂春頗覺吾廬發興新書帙盛陳欣有託燕巢不定似嫌貧花枝照眼開還好竹樹當軒植漸匀朝日兩竿濃睡覺不妨門外即囂塵詩書真樂得新文不羨軒車曰過門薄宦到頭終外物一閒入手是寛恩東山不厭蒼生望北海羞霑緑蟻樽花草滿庭從爛漫最憐當路種蘭蓀貧家營構不容常五十年来自此堂春露榜題應有在慈親孺慕詎能忘華滋濡溼趨庭處風采依稀隨日旁我老自强觀志行泫然流淚撫青箱送何叅政北上世事雲翻不易裁君侯真是濟時才若論經制明公道儘足扶持重憲臺霖雨終期賢相在秋風聊應鶴書来草茅亦有雲霄望執法清光接上台幹臣周君邂逅淇上作燈燼紅垂綴玉蟲鵲聲傳喜下霜空故人逺自京圻至青眼依然白髮同道在固常忘勢重官清還復坐詩窮章章久説襄城政早晚褒書示至公鄉人魏先生家藏樂天神一軸作二像對立一則五十時容一則六旬後真也上有樂天自贊别稱為蓬婆仙云三十年前屢獲瞻拜近讀公長慶集偶記此畫為訪問云巳磨滅乆矣遂詩以弔蓬婆洛陽地名魏家一軸樂天神三十年前繪色新欲就醉吟師格律試尋縑素墮埃塵空留池上山中咏謾應花前月下身官品文章吾敢覬似公真樂老能親嘉禾篇并序乙酉歲九月衛之南郊穫稼得嘉禾一莖九穗和之至也田主季縣丞持以示余纍纍秀結大小連比誠可異也人用餘咏忻忭曷巳作嘉禾篇重陽後二日序天地深恩雨露零嘉禾還自氣和生九秋顥爽團孤秀一穗功夫到九成太史書年同合穎漢廷稱瑞比連莖表章莫後丹青賀人道豐穰是太平種玊亭徐子方宣慰有詩因擬作三首昆明雲錦壓凡才玊井移根手自栽不著詩仙分寳供誰攜仙子下瑶臺留連夜月娟娟靜披拂清風細細開不用葉浮滄海去芙蓉城闕有蓬萊靈沼雲深寳氣存素華一夕發芳根烟中彷彿溪娘語波面輕盈越女魂江月借妝増皓彩露華和屑貯芳温夜深更待瑶環供細挹秋香共一樽休誇幻術有仙翁人定端能勝化工淑女固應歌窈窕芳根原自雪玲瓏秋香入户摇江羽羅襪淩波遶漢宮莫向西風吹易散世間聲色本来空西村二首兩月秋霖不出門今朝騎馬到西村高穹氣肅雲歸壑老樹風多葉擁根謾説田園宜野隱争趨朝市羨時奔古人大抵崇髙節飢凍當時所不論秋風泥潦擁柴門兩月幽棲不到邨野鳥伴耕翔水滴寒蟲催織遶籬根半生未免有飢凍舉世其能息競奔仕不力任閒不走一生心苦欲誰論桃花菊四首一名胭脂紅淚洒明妃寄露葩換根非為貯丹砂黄輕白碎空多種碧爛紅鮮自一家騷客賦詩憐晚節野人修譜是頭花九秋霜露無情甚時約行雲䕶彩霞為厭秋容慘淡天故将濃艷發清妍烟霜輕拂呉姬面丹臉能回白帝權寄傲儘淩青女肅閙粧宜刺繡衣鮮留連最是東籬蝶細繞芳叢兩翅翩容色風流操潔蠲一枝紅雪秀霜天氣淩金井欄杆曲香在紅鸞扇影邊塞上閼氏凝夜紫月中仙子怨秋偏少陵若遇情増重肯數重嵓細蘂團葉細枝柔巧翦裁丹砂濃抹入纎荄朱顔肯教劉郎老紅影情圍葛井開慘淡秋容空野圃飄瀟風露際天台晚涼更覺清香異不厭芳叢百匝来苦雨乙酉歲入秋以来晴明止二日輒雨巳三月矣九月十六日作此雲隂交㑹日長昏老雨瀟瀟晝掩門秋氣儘悲騷客志草堂空有少陵樽寵光蘚蔓滋多碧蕪沒蘭蓀似少㤙坐聽寒聲萬家裏幾多繒纊有冬温晴明無幾日朝隮雲不容同霧雨淒便著長風開白日巳令后土汚黄泥冷翻幽壑潛蛟舞温鎖喬林健鶻棲萬象沉沉水光底幾時髙樹看晴霓火烏翅溼日脚昏雨中跳蛙亂登門少陵悲禾嘆黒穗元亮愛酌愁空樽氣惟恊中乃成歲事至霪溢将傷恩詩人吟咏何所補笑熱爐火回春温駑蹇從来䇿不前畏途有戒莫爭先但隨白傅看花約宜信淵明止酒篇人笑苦吟疎巧宦天教多病䕶殘年老夫歲暮歡雖鮮每對諸君一粲然與諸君飲㑹中作赴趙子儀飲㑹忠烈祠前是舊門一樽重約就門傾但成把臂論文飲也勝拖泥帶水行樂事不須應節叙賞心最惬是閒情一秋零雨朝来霽此㑹當題作喜晴秋懐醉頭扶起日三竿掃罷幽軒到藥欄傍架整齊書集亂繞籬料理菊枝殘日融虚閣留餘暖雨積髙空促蚤寒處置身心閒裏過不将勲業鏡中看老去逢秋强作懐莫教閒惱上心来人情寡味隨年薄世事無端觸境開東閣漫傳梅信好西風時送雁聲哀客来茶罷無多話共趂秋陽曝背鮐弔王提舉柔克乙酉九月四日自經于闋王廟驚看神色自今秋奄奄殘魂到鬼幽叢薄未霜猶足蔽事機巳露欲誰尤百方作計難為地一意長歸是徹頭昨日寝門臨弔處兩行哀淚不容流前年除日儘多門獨喜南来弄竹孫入手固知餘利孔刺頭何苦入膠盆海鷗枉訝多機客楚些難招不弔魂漢夀祠前重回首短笻猶恐立黄昏悠悠末路謀生苦穰穰羣奔為利来薄宦得勝閒裏過畏塗合嚮冗時囘誰知竹實療飢鳳却變錢神作禍胎我老不堪多感愴一汚還為素絲哀憶初同舍在共城短小於中最幹精取舍近看臨老節鋪謀全異早年情舌端雄辨堪排難霜後寒蟬了不鳴重念人生生可貴世間萬事一毫輕南来作監無多事舉手差池便兩分細論是非俱有説大綱向背不同羣以身死事從来有為貨輕生古罕聞不獨衆傷非正命秋空低處有愁雲謝道人惠竹春露堂成户牖空閉藏無物禦深冬長梢来覓筠溪種祥祉思憑道䕃功清泛細香添瓦鼎静連秋月想烟叢夜来紙帳梅花夢巳在融融和氣中筠溪軒詩卷補亡筠溪舊有亭雅甚徃年為秋潦所圯亭與詩卷俱波蕩不存今歲冬来游紫微道者丐余詩欲将補亡且致重構之意仍為賦此中間飲客葢廿八年前同游者侍臣陳季淵奉使覃溪煥然平河牧今右丞史晉臣禮部尚書王子勉侍御史雷彦正與不肖紫微道者威儀杜大用也時乙酉十月廿一日重到筠溪二十年眼中風物頗蕭然雙旌尚憶經行處八客同来作飲仙露溼雲梢回曉翠月明瑶圃淡秋烟道人説是潛珍客更看飛檐揷碧淵慶雲鸚鵡杯桂魄淪精貯海波神光分秀入紅螺卿霏䕶暖圍蒼腹丹喙嫌寒縮翠窠縱飲雅當豪客意垂雲無復緑衣歌一樽細浥江山筆夢到芳洲碧草多鸚鵡螺翠衿紅觜漫多知不覺流形入化機淒斷隴雲迷舊宿潤涵炎海有餘輝酒波碧飲珠還浦螺女棲深玊作圍昨日玳筵揮飲處故令歌緩恐驚飛自嘆明言出更難奮形飛入巨螺間中空蜃吐潛珍羽外示文明變炳斑春釀儘供身後樂彫籠全勝向来閒深藏且莫輕為用合浦珠神有徃還何来犀火採螺江一竅重開混沌蒼解語巳迷青鳥使幽居渾是雪衣娘海苔暈碧猶霑溼慧舌能嬌自閉藏莫遣繡簾明月入湘妃窺伺恐攜将隴鳥何年别故山珠房深鎻雪衣閒調音厭落佳人後勸飲来陪狎客間山鬼吹燈驚怪供春風浮酒憶蒼灣興来一吸三江盡醉入無何肯易還醉一作逕肯易一作不要飛潛相化理堪驚老蚌還成隴鳥形鱷汲似憐唐相飲江沉應笑屈原醒坡陀海露神黿窟瀲灔波翻竹葉馨我老探奇心尚在醉来歸夢繞螺亭隴禽辯慧世同誇何事将身學海蝸江月洞空珠有淚卿雲覆體玉生花回天不入深宮夢樂聖欣歸左相家常憶郡樓初飲處頓令觴斚失光華至元十年官居平陽時監郡邀余飲白雲樓上出此器勸客余初見之故云哈喇台斷事官系出中朝勛族喜讀書温雅尚禮樂與賢士夫相接過衛来訪慇厚之意無以相荅謹作是詩為贈且見夫妙齡英發之氣云赫赫金張奕葉崇濟時還屬黒頭公讀書志在諸君右奉命名髙畫省風一札恩光寛大裏八州刑憲笑談中皇家求治如飢渇莫後當朝補衮功餞王倅北行邶衛從来八逹衢三年不易二為車一官聊爾開公道四海能行即丈夫花外驛亭留故事日邊消息聽新除諸君若問民間治最重無輕是使符夀鄉兄君玊評事七十平頭鬢未毛久将家事付兒曹心便教子初無惜日喜延賔不厭勞花木漸成林下趣襟期猶是邑中豪年年櫻筍堂前客常對珍珠滴小槽送從事李廷玊北上邶衛從来四逹衢三年不易曵長裾持心有道清廉在遇事能方長厚餘入幕不知王儉客攜行唯見恕軒書揚清激濁朝家事不信銓曹止舊除秋欄四章為仲畧弟皆有和章丁亥秋季也宜男松竹庭前草半蕪幽花含笑發春腴暖回堂背孤根秀畫出宮池百子圖浥露冷摇金鳳淡翻香重上髻雲烏怡然坐對忘憂外披拂餘芳任蝶鬚寒菊三徑歸来巳就荒更看風雨過重陽自憐楚些清吟苦留在寒花晚節香黄蝶有情時見過緑樽無酒淡相忘蕭蕭五栁門前路何處斜川接醉鄉秋蝶舞困春光興未窮又将心事戲秋風淩晨趂暖翻朝煦薄暮棲香入菊叢幾夜流連迷曉夢誰家圖寫出深宮翻然不逐韶華老飛過欄杆西復東薔薇月下亭臯百卉空秋陽分暖發春叢重滋芳露供坡墨兩見嬌黄出漢宮要伴紫荆昌節晚肯容鮮菊擅西風結根得所原来盛及物為祥恐未公謝趙主簿惠古缾貯藏元氣閟重泉土暈苔滋碧頸圓枵腹戒貪瞠兩餮佳城定日見千年茂陵神盌知金重銅雀澄泥比鐡堅聞説揷花多結實露堂從此得春先上巳日褉飲林氏花圃舍弟仲畧首唱臘蟻香浮金叵羅一聲清艷遏雲過千年盛節稱元巳四座嘉賔到永和曲水風流清興在茂陵依約緑隂多栁圈儘帶餘徵去未擬花枝照鬢皤和韻三首朋盍華簪擁佩羅秉蕑聽我醉時歌栁圈泛灧風漪去樂事迢隨獻歲和坐近緑隂花氣重歩移紅袖野吟多杯行到手須沉醉六客樽前我最皤春晚衡門厭雀羅臨流来咏舞雩歌喜從多士明鄉飲趂此春風扇物和林下幽香蘭草暗樹頭乘暖野禽多楊花也惜芳筵散糁亂溪橋似雪皤麗日晴川艷綺羅琵琶聲趂紫蘭歌衣冠盛集有今日花栁春風覺太和闔郡浮觴從此始百壺載酒不為多醉扶歸路人争看不道花枝笑鬢皤喜雨丁亥歲三月十四日晨起露氣甚潤疑雨兆是日夜大雨作至明日晌午乃霽後二日即立夏四月節時頗旱故有此作一氣先瞻玊露瀼夢驚簷溜曉淋浪洗開塵障千年靜釀出春風百草香人變暵憂為燕喜歲囘時歉作金穰兩盂糲飯朝飢了從仕閒居總未妨題雪堂雅集圖擾擾王城若個閒禪房来結静中縁機鋒為道靈師峻樽酒同傾繡佛前談麈風清穿月窟雨花香細颺茶烟應慙十九人中列開卷題詩又五年瑞麥農使荀正甫過邯鄲得麥一莖九穗葢未之見也作詩以誌其祥是年農司復立一依巳行條格丁亥歲夏五月也麥秀從来説兩岐連枝九穗若為奇物關極數知陽盛人飲天和樂歲宜同穎並歌唐叔稼駢莖休頌漢房芝天公自喜農司復一札恩光總舊規秋風如水聲丁亥歲六月十九日酉正二刻立秋是夜聞秋風自東北来如大水将至静觀天意儘孚誠一夜秋風似水聲志士聽来心未穩客窓聞處夢先驚物華披拂争寒實鷹隼憑陵想迅征常笑晉人無逺用扁舟東下為蓴羮遊白茒寺為愛西山欲徧經春風吹馬上崚嶒千章古木偎崖寺一㸃清光守障燈石䃖題名留故事松隂移榻對殘僧婆娑最樂雙泉水潤入髙峯露氣凝敧器詩三首并序昨飲韓進道家座間出敧器勸酒暮歸醉卧既醒夜四更試作二詩吹燈起書覺筆端甚来之易也投筆就枕復得一詩似勝前作明日示弟忱請行合屬即為之先和神物誰移代酒船轉縣金觶兩楹間纔中便得居安理稍溢還成覆水艱魯廟横陳猶賜寳金鸞揮洒憶朝班汪然能起鯨吞興鸚鵡為螺恐厚顔卿雲垂彩捧宗彛終日持盈伴狄儀滿酌緑波浮灔蟻兩樁春色上修眉致恭幸過神明器勸飲休誇金屈巵抖擻宿酲還頓悟此心纔倚巳惟危几杖槃盂總有箴古人垂戒一何深以漿為酒惟無量覆水藏機恐過斟魯奠兩楹朝復暮崖州一賦古猶今儼然頓獲神明觀常記春風拜孔林賀介甫提刑得雄海中仙菓自珍奇莫訝秋風得子遲瓠晳定推陳氏子蘭芽端咤馬家兒蒼蒼有道旌遺直繼繼無窮見孝思湯餅筵前最忻喜老親時抱笑含飴成耀卿以所釀秬酒相餉賦詩走筆以謝玊色芳魂巳可憐白衣持送飲中仙周書盛説神明誦齊楚休誇桂酒𤣥光透銀觥無表裏法傳真體得蹄筌醺然坐我春風底夢到明禋二卣前丁亥歲重九日同弟忱展墓奠辭二首黄葉畨畨落帽風今年秋祀喜君同生榮没慼無餘憾秋降春生又一終𤣥壤潤涵泉脈逺飢烏飛去夜臺空兩鄉相望幾千里常在神靈顧䕶中馬亂溪流溼鐙金捨鞍齊簇野棠隂千年盛氣通滄海滿袖秋香奠祖林亷石未瞻先世號表行終愧古人心衰年最切光揚事此意從来不獨今右和舍弟仲畧韻奉實野臺之日墳南岸相對一方甚髙平天然一臺弟仲略因曰可為王氏遣興奠拜臺秋興非關觸物哀時經虚落自悲哉重門未署榮親表暗用原渉京兆之事老岸先為下馬臺暗用董生下馬陵事節序登臨車轂擊春風粧㸃野花開一杯共酹清泉水長繞先塋兩面来一作滚滚送弟仲略得假南行舉頭健羨看雲鴟跕跕争教墮水飛假促最先無累保事纒當重早知幾雲連鄧鄙春泥逺路過襄城野店稀去去莫辭鞍馬倦迎門兒女要牽衣緑毛龜四海金明一渥洼伏藏来自水仙家背裘衷屬元居長髪散柔絲翠有華浮出淵泉看處好泳游蓮葉認時差杖扶行嘆陪三老夢繞春烟鶴禁花此龜至元十三年千秋節陪姚左丞許祭酒許榮禄行香東朝禮畢觀交趾所進大蔡故云洛水當年負緯書獻嘉此日野人俱蒼鱗閃閃精分斗暖髮毿毿翠滿軀元氣嚥来終不老芳蓮巢處更堪圖詩成喜覩詞臣賦蚤晚人文與瑞符至元廿九年丁亥秋九月廿四日夀中丞王元復放生者以此龜来獻余以靈物罕見為賦一詩明日偶得大定廿三年壬寅冬党承㫖郝侯張甫所進賦贊墨蹪序説明時嘉瑞甚郁郁也當時竹溪纔以應奉供職文與翰已復如此宜乎金百年以来文章命脈得其正傳者公一人而巳因念余平日所行造物者皆使之前知此節雖出事後其類大同亦可重也故幷及之秋澗集卷十八欽定四庫全書秋澗集卷十九元王憚撰七言律詩
