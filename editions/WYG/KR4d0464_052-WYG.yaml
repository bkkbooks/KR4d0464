front:
  text: 五十二
  hash: sha256:f52f034b549f2b0bb4a50bdbb829588548a45a7397a84116cad6a3434ea8062b
body:
  text: 元王惲撰碑大元故鄭州宣課長官盧公神道碑銘并序至元巳丑冬予提憲福唐識前政大中盧君沉厚謙抑盖卓卓有為者及聞諸僚友間君自平江淛以來治軍撫民俱有成效惜去之遽不暇欵接也後六年予方紬書石室來謁曰天祥負釁深重向任囘甫拜先隴不幸考妣相繼奄逝今祥禫巳終惟是告神明傳永久者不内翰是乞其疇依幸惠顧無讓既而持善狀以墓銘來請廼勉為論撰之公諱元姓盧氏世為許之臨潁縣里仁鄉人曽祖祖代邈名諱俱逸世樂耕稼以善行庇一方父諱某金季以勞主襄城簿有聲妣李氏姿明慧知經史公垂髫教之讀書毎以言動不妄為誡及長存誠尚義挺然有守不為流俗所移嵗壬辰公避地鄭之管城及汴梁下民環鄭而來者日以千數公知衆心去留未定即㑹而諭之曰鄭土號稱沃壤萊荒嵗久畝可數鍾今棄而不耕狃遷避為安其安果何在㦲吾欲捐私廩助種食與汝曹並耕而食一旦有成不猶愈餬其口於四方君等其有意乎衆感而惟命由是遠近孺慕歸依者衆生聚烟火漸復平日之舊迄今鄭人尸而祝之庚子辛丑間朝廷聞公信義多之乃曰智效一官用未可量也遂舉充郡六縣課税長官數年間事辦而民安不知有壟斷也其寛和如此既而嘆曰放利而行不容無怨况非素志遂投牒而去優游田間處身事外有教子讀書立門户盡地利厚盖藏而巳嵗時伏臘擊鮮具釀與親戚父老寜止燕衎樂于胥也先是治第郡城中然未嘗久處杖屨所安多往里仁别業辛夘冬一夕與隣里辭訣曰相親久幸各自重遂命駕入城衆訝其遽如許也已而果微恙召諸子若孫告之曰昔吾翁媪兵燼餘營理生産五十年間勤苦備嘗方致苟完今夀踰八秩嗣子致位通顯吾何修而然是皆祖禰積徳勤力所致第官無髙卑亷慎能安家無肥瘠共儉可保吾平生行巳汝曹猶及見之諸孫温飫不知艱難所自讀書力田慎勿偏廢如是則盧氏其未央也言終而逝享年八十有二夫人薛氏祗嚴貞順母道有光夫婦相處五紀公之意不毫髪少失後一閏無疾而終四子長天祥大中大夫福建閩海道提刑按察使次天麟未仕天祐忠翊校尉行軍總把戰占城殁皆薛出天瑞晉江縣尹前公卒一女適曹氏子孫七人從善從禮從順從道從正從徳從謙從禮襲父天祐職忠顯校尉行軍千户餘皆幼孫女九人四適士族餘在室曽孫一人曰允孫曽女孫一人尚幼某年月日天祥等奉公柩塟大陵先塋某穴夫人薛氏祔焉公為人魁梧重然諾寡言笑言則為衆信服處身治家不侈不陋理恒業課僮僕各得其宜故能上下戮力農事修整子孫朝夕問謁肅若官府雖搶攘際姻親鄉曲賴其依藉與平時無異初江左平公南遊襄漢遇俘者疾病顛頓道塗間憫焉遂罄行橐中物贖而良之者甚衆至于行髙恩積在人又似夫漢樊重之行事也是可銘銘曰天禀中厚百焉可為事以誠應其將孰違暨暨盧氏家潁之涯三世在野篤為農師顧此大本我控我持迨乎府君一誠是思積而能散識符事機大梁既下流氓四馳環鄭而來莫知所依一語還定衆志若歸畇畇鄭圃澹澹沖陂烟火相望雞犬垣籬繄鄭有存曰僑曰皮尸而祝之非公其誰豈惟義豪善人㡬希達而拜官非吾所期解紱南轅幅巾杖藜秩我東作西成可知崇彼禮節張吾四維鳴歌有子幼之樂營産盡吾樊之規流惠閭里賑乏宗支人以為君子富於此見智人所推取諸理化政將同施婆娑故里夀髙期頥子孫簪紱何若若兮纍纍臨終朗朗二者勿遺盖耕稼乃種徳之本教子隆起家之基古人取必於身後公獨享福於平時狼陂淵淪大陵崔巍異時瞻豐碑於木杪其有感於斯者知無媿辭噫金故朝請大夫泌陽縣令趙公神道碑銘并序金自南渡後封壤日蹙軍國調度百色所須悉取辦民間然迄於亡而不知困其良法善經維持而有力者多農師辟令是歸若乃䇿名俊造列官令宰終其職而不負所舉者趙公其一也公諱鵬字搏霄蒲之河東人幼習舉業弱冠有聲塲屋間擢貞祐三年詞賦進士第父元善聲韻筭學世以農致富及公第諸負債者悉折券以貰曰吾所得巳多尚何貪為其知止如此公釋褐主芮城簿秩滿令闕縣請留公行臺亷其能俾攝縣務既而調同州澄城令民安公教政方著左曹請赴入補尚書省掾未㡬用薦者辟授泌陽縣令泌邊邑也户繁俗剽薄多不地著號稱難理公下車設教條督游惰行視田里相民利病而與除之見其土腴而桑鮮及知玉池沲坡等陂民嘗資以蒔稻嵗穫千萬鍾年深堤堰圯漏貪取恣引强者有餘弱者不足田有涸而生埃者致相訟竟嵗公審其若是令曰水為利殊溥旱乾有藉焉正患潤餘而用不均又曰設使菽粟如流寒無袴襦將奚以卒嵗乃楗圯苴漏瀦漶散理溝洫復作斗門提閼十數處量田疇為可溉約束又置鼓畜犬於田畔以警其姦竊自是紛争息民無所私及課植桑嵗至三十萬株縣以之致富焉公曰既殷而教聖人之大經於是謹庠序表善惡以敦其禮讓有射生張青者闖跨兩徼頗横恣不法民嫉之公亷知攝至庭嚴加教戒就給田牛易籍農伍許以自新曰今而後姦枿少萌吾將不汝貸青悔愧自斂迄終更不復為非其興利易俗先教後罰殆召父之治南陽也農司覈實以其績上聞至有州縣得人之諭尋遷豐衍庫使京城變人饑至相啖同僚欲私帑物以易斗食公曰我主吏死則吾分可竊君藏以偷生耶其人慚而止北渡後流寓淇南貧無為資時當路有知公之賢欲以一縣相屈者公聞之曰余方以儉素自守其可榮以仕乎竟不應遂教諸生為業識者多之以甲寅嵗夏六月二十九日觀漲西城歸憇坐席言笑而逝春秋七十有三積官至朝請大夫至元戊寅嵗改葬公郡城東郭顯應祠南百許歩郡君邢氏祔焉公凢五娶楊氏生子庭嘗為郡學官女某適同年何氏子郭氏生女華仙適齊氏次雷氏令狐氏再娶閿鄉邢氏生四子一女男曰康曰廣廣傳家學嘗任管庫以亷能稱曰應曰亷讀書通醫術女舜英適陳嘉謀孫七人良弼遂良濟民從龍顯祖時敏克謙先生資雅厚長身白晳與人接未嘗出一妄言衣冠顔貌望之知為一醇儒也所交皆一時才傑如石御史子堅李右司欽叔暨其弟欽用欽若楊都運煥然王華隂元禮何學博與之嘗觀河華風土秀潤雄碩不隨時髙下先生挺生其間清明之所萃鍾英彦之所沾浹宜其角逐文塲而擢名進士敭歴中外而稱才大夫所居民富所去見思凛凛然有徳讓君子之風詞賦為平生耑門之學其經指授者皆有所成就某年方志學受業門下今老矣凢兩入翰林三贰憲府粗有所聞於時先生之教有力焉子廣來請銘曰是某之責也其敢以不敏辭銘曰於休先生徳讓君子力擢巍科聲馳膴仕二宰劇縣政平訟理敬謹亷勤富開田里化先罰後令行禁止異績殊聞驚目駭耳一夫不獲未免有耻鄒論為邦厥有深旨樹畜耕耘王道伊始史傳漢循龔黄信臣奮髯抵几莫之與倫諒公平生有得於此至今遺黎歌詠餘美天歩改玉士或易節布衣歸來教授為業斗食苟生寧饑不屑銘無愧辭劖此麟碣是為亡社大夫之墓其光有曄大元故奉訓大夫尚書禮部郎中致仕丁公墓碑銘并序金制大定間限以三品至五品職事官承廕子孫内班供奉或省署儤直者同吏員許試六曹令史中其選驗班秩崇庳而收補焉謂之班資出身于以抑任子苟進之風且勵多士特達者之志在當時號稱入流美科如吾奉訓丁公卓然以材術㧞出倫類表見一時可為篤志君子其敢以門資待之乎公諱居實字仲華髙祖孝温仕金朝官金紫光禄大夫臨海軍節度使遂世家錦州曽祖興宣武將軍終興化簿大父從吉明威將軍宜陽令考鐘太康税使累官至宣武將軍公少孤稍長力學不倦每以籍廕入雜流為慊遂去習城旦書用明威資中正大四年部掾甲首例補尚書吏部令史南播後封壤蹙員多闕鮮中外官守代攙滯公詳酌格例若不專泥而銓調以方至事行而人服其當因建言曲阜令孔氏世繼終其身有不便者請優以兩考調他任擢族中賢者嗣秩乃爾則聖人之後材能輩出不致沉鬱朝議從之未幾擢權尚書省令史明惠太后崩暨國信出使皆以材選從事爼豆搢紳間稱其敏達積前後勞官昭信校尉勲雲騎尉金亡流寓天徳黒水間國朝方事江淮總廪餉于衛漕長宗侯亨奏公充軍儲經歴官收徳望也公籌㑹漕計雖内輸外饋應期取辦專以抒民力為心俾人忘飛輓之勞士有足食之樂公力為居多迨中統建元開府史公宣撫河内方圖任舊人以副閫寄故首薦公諮議幕府事公竭誠殫慮思盡心所行簿書外典憲獄情尤所明慎初許民得千户印章於場間以窶甚冒稱偏裨獲戾投欵而南以徼賞格既而潛來事露有司抵之極刑公曰不可原其情非逆不過以譎圖賄爾竟從減死論故制辭有處心純正用事詳明熟識國典之諭其為朝野推重如是四年復應左丞濶公辟署大名宣慰司幕官適青齊用兵調度星火急公晝夜措畫責分而事辦有宿盜抵法上官主以劓刑決之公力辯曰時方閧動肉刑久廢行之恐衆情疑駭且復累公遂處以常法一邊將以辠叛獲奴從欲殺之公請讞于朝左轄公曰從逆者坐死尚何疑公曰彼固有罪為士師則可以僇之况奴為主脅寜知得已乎上之囚果縱釋後來謝公拒絶不見曰向非汝私論國典也其清眘强幹至為子清公賞識且以大用許之五年朝廷大明黜陟調中外官銓法曠久後生晚進有愕然手不易措者以掌故起公遂授吏部員外郎所謂吏勲總格貼簿之類指授大略然後以今酌古裁為新格粲如也痺秩崇資陞降注擬多適其宜以能陞奉訓大夫尚書禮部郎中尋以年及請老諸相謂公齒力健未宜失此老成人請益堅得告沾沾而喜曰自今方為一事了人也其含章有終為可見矣時致仕例末行俗且以奔競患失為風聞公勇退若爾識者莫不歎羨翰林諸公至餞以歌詩美之公氣貌魁偉資頴悟亷直精敏過人挺身正路動以檢押自律與人交雖小信不忒及談典故論法家令人聼之娓娓忘倦故至元以來刪定儀制公毋預其庭議焉嘗有以瓜果為獻者謝去之曰此固微物第生平未省一介妄取諸人其自克治多類此疇謂阿私可得而凂邪中年後勅斷家事毋復關白以書史自娯喜讀司馬温公通鑑日手書為課曰一録則勝數過矣五載間寒暑不輟遂成全帙故晚節識益明志益篤然於世猶有未忘者十三年夏予考試在汴尚憶公危坐一榻吐論猶健間及世道每有所臲􅑶慨然義形于色因泣下沾襟予訝其遽如許也明年秋八月遘疾卒於家春秋七十有五夫人趙氏金大中大夫太常卿文簡公之女孫泗州防判經之女正内主饋壼儀有煒生四子皆讀書公資之殊力長曰誠克家不仕曰詢有文學淇州教官曰訓通吏事任江州某職曰諒能以孝移理於官而胷襟藹如嘗為河南宣慰司提領案牘官尤為公之所鍾愛云孫男女如干公殁後八年子詢諒來謁余跽而請曰維憲使與先君世契厚從遊且久知行已為最詳今墓石未銘敢百拜屬筆庻假寵後人以垂不朽幸先生無讓因第其善狀而表之以銘銘曰士志𢎞毅奚間隆汚譬彼玉瑩丹青不渝顯允丁公志𢎞氣愉脱落門閥奮飛亨衢貞我憲度勵夫亷隅擢居省署以才以譽挈囊佩玉氣貌舒徐表見一時聲光两都開物成務綽然有餘其出其處與時盈虚解紱歸來詩書自娯人曰吏師我曰通儒淺之為夫昧於卷舒公卿之門形勢之涂老不知已伺候奔趨衆眎為常曽何異於我獨翩翩勇退自如以此較彼孰賢孰愚豈惟知止而近不殆古所謂賢哉二大夫者公其庻乎我銘表徳過者嗟吁故武節將軍侍衛新軍千户董侯夫人碑銘有序故武節將軍董侯死事後十有九年當癸巳秋八月庚戌夫人凌其氏卒于藁第之正寢用次月九日嗣子守仁手開𤣥堂祔安武節匶左禮也重念母氏徳全恩至以守仁早備戎行省定嵗有時不幸罹兹大故例同世俗附見於表誌之末何以慰凱風寒泉之思惟是鑱銘列石嫓時神隧用昭懿徳越厥心是恔内翰與叔祖契欵尚惠顧使卒微志豈惟守仁等幸亦母氏之永光也敢百拜為請讓不容巳謹叙而誌之夫人號淑媛系艧澤大家父松岡先生諱軸母元氏先生資剛正有文行嘗提舉真定八州學校夫人㓜聪慧即教之知書既笄容止幽閒組繡剪製巧有餘思班經女誡皆通曉大義故金紫光禄大夫忠獻董公聞其賢淑求配長嗣士元惟董氏勲閥大族世稱有家法者夫人出儒素一旦起家若固有之即能事公姑奉祭祀不爽婦職小大悦懌化行閨閫間穆如也太夫人早棄養忠獻公洎武節扈從出師無虚嵗門内事如麻一委之主治居無㡬何内外齊肅如一官府然審詳而不傷其婉嚴恪而不害於和以致家道昌宜豐儉中禮若乃終之以温惠浹之以恭順四十年間奉承内助夫人之力居多夫人嘗以賜幣為武節作服衣之入侍上目其製精適宜且滅手跡顧左右曰董某妻必女紅之善者或歸語其室多悚而效之者由是夫人賢淑聞於時及武節之喪哀毁㡬絶者再比至奉轊安窆植碑表烈以終大禮其勤悴至矣加以鞠育諸孤朝趨學於外夕朂示於内至祝香空際願克孝而忠若富與貴所非敢希至於時祀雖幼子童孫抱持起拜使習見熟其當然於嬰孩示教又如此故嵗時拜慶瑶環瑜珥停鸞峙鵠玉雪照映樂融怡也至元三十年夫人竟以勤劬致疾既革子守仁越千里來省正容而謂曰宿衛事重何以我為業來吾且逝矣比屬纊呼諸子戒之董氏一門世篤忠貞汝輩當效死報國無貽爾祖禰羞能然吾目瞑無憾矣言畢而終享年六十有一生子男四人長早世次即守仁守禮守謙守仁姿清峻籍聲有父風勤於問學恪於官守初以羽林孤兒襲爵尋有功陞宣武將軍僉右衛指揮司事餘未仕皆謹愿克家子女四人俱適名族武節有次室曰張氏夫人禮遇殊厚生男女各一教育嫁娶不異已出女媵四及所生女一遺命豢而良之其逮下罔嫉有芣苢小星之惠若夫人者在家為淑女既嫁為節婦老而稱賢母以行以法宜有銘銘曰夫婦之道人倫是維内治克雍尤婦之宜毓徳由素承家有基懿懿夫人兩全徳儀譬彼蘭茝馥馥猗猗植根得所馨華日滋求佳耦而得英配融篤實而發光輝主祀孔嘉供養無違以孝以敬心焉與持志閔夫勞而勸義豈特奉几而齊眉庭生玉樹秀擢連枝惟天姿而與教宜豈悌而孝思孰云施而匪報繄美惡兮兩遺雖夀齡兮似靳儘五福兮熈熈煒我彤管刻銘在碑香生七誡聲聞禁闈羌千秋兮百代與班氏兮同歸泰安州長清縣朱氏世系碑銘并序大元以威徳撫有方夏當其摧强暴翦妖孽而收廓清之功者莫不資心膂爪牙之士以宣其力三齊諸軍號稱果鋭就偏裨中論之長清朱氏盖其一也朱氏世為黄山里中人逺祖諱寳寳生珍珍生鎮皆力穡致富積而能散以孝謹聞鎮之配馬氏生五子曰在曰楫曰存曰林曰和洎女弟三人皆適里族而楫與存獨慷慨起昆季間既長並善騎射膽畧過人平居恂恂殆無能為者至于臨事果遇敵勇自眎無前貞祐初金棄燕南渡所在豪强乗亂而起一僨一興迭為雄長各昧夫依歸楫與弟存乃集鄉義年少團大望山以自保聞東平武惠嚴公倡率義師壁青崖山伏俟國兵攸歸楫慕義徃見之遂假楫兵馬都縂領嵗庚寅武惠挈所部歸太師國王王承制封拜徼衆力為用時楫以功從公請授懐逺大將軍同知濟南府事甲申略地而西次冠氏與宋將彭義斌遌陷陣中戰殁母弟存奉柩塟黄山原之先塋禮也存遂襲兄職以信武將軍俾領軍務俄鄆州失守翼武惠復東平就取徐邳乙未嘬鋒棗陽踣之進攻黄光克焉積勞遷廣威將軍繼升昭勇大將軍辛丑嵗軍府第功以最聞賜金符充東平路行軍千户迨巳酉春竟以攻戰得勞疾卒夫人李氏系同郡大家其次室曰呉氏王氏劉氏傳氏生男子五人克正克紹克修克恭克順克正即夫人呉氏出既嗣昭勇軍務仍佩金符改授東平路長清縣行軍千户方荐嵗南伐所在戰有功如壬子攻虎頭關以先登得功主將遥見之召使前免胄識面以鏐匜犒之戊午秋國兵大集釣魚山詔東師掣肘淮海宣武以騎將徇召伯下之復有黄金之賜巳未冬王師渡江取鄂分率拔都穴城以入不解甲者四十晝夜中統三年破歴下城諸校以圍栅功例有銀盌紵袍之賚宣武預焉至元十一年掀荆山鍋河等戍十三年提漢甲從元帥博囉歡掇連海青口淮安寳應水陸相望殊力攻明年秋復掠髙郵西遇賊一戰而殱行樞録勞上聞授武節將軍又准辟兼行省都鎮撫十四年隨右相伯勒黙色入覲進宣武将軍管軍總管仍宿杭以鎮明年處劇賊陳夀浮雲張三八等刼鎮縣殺守吏勢甚張比擒獮馘渠首二十餘級隨以蒙古漢歩七百人收温之五寨以能升本軍萬户十七年庚辰督造下瀨戈船竹頭木材積羨増四十餘艘用是得勞憊疾輿歸卒黄山墅之正寢其壯而事者以宣武自結髪從軍㡬三十年小大戰百餘合忠勇奮發亦可謂無負名之與爵矣夫人張氏系同縣世家姿貞嚴齊家有法與宣武合徳生子啟女三人啟以世叙宣授武略將軍本翼管軍千户就佩父金符守戍臨安繼宣慰呼圖嚕駕海徑占臘闕終朝廷恤其師復伏闕類闕嵗良之寜海部羣盗嘯兇者闕潭闕巴山月雙二谿同茶把闕所也武略獨斬首九十餘級擒介胄者十人巨艦者五十遂平明州冬暴卒於明州之軍舍為人倜儻好施謙撝有祖懐公勤凛父風天不假夀竟止於斯悲夫明年夏四月夫人劉氏自慶元䕶靈轊而歸以從征時久亦以哀悼致疾終孤子昭先就安祔公藏昭先二女長適總管納延次歸今武衛親軍副都指揮使張瑾闕任適闕徳起身戲下義激於衷最不忘其故者於是接挈闕今授昭信校尉管軍千户俾嗣其世業葬之載月昭先介其舅持翰林修撰傳夢攽善狀百拜來丐銘惲嘗讀西漢游俠傳魯人尚儒惟朱家以俠聞長清在漢濟北地面控泰岱右挾滄海與魯封犬牙相入今朱氏世為長清黄山里人家故饒財急難憙施世不乏人豈朱家之逺裔乎且戎閫為國之正臣豪俠乃鄉土武斷其豁達之志雖習俗使然彼風聲氣概尚桓而趨事也如是非來之逺積之厚其流胡能若爾而淵者虖仍系之以銘銘曰天生五材闕一胡可敦能去兵芟夷繁夥繄朱氏先其來么麽三世在田勄而罔墮加以孝友勤儉克荷赳赳懐宣拳勇强果尚桓朂義志不屑𤨏諸父而下乃暨仍孫例生炳彪負隅而賁風塵與㑹雲壨解屯撫定齊魯于桑于耘蕩一江呉席卷䲔吞㑹歸一原張本楫存三世為將道家所忌惟殺不嗜能永厥世偉曹惠武仁而且智臨陣愾敵虔劉鏺刈居當平時蟻封謹避儻存是心絫將何害萬骼雖腊功成而泰於戲朱氏我銘韋佩匪惟光昭惟以是誡絳州重修夫子廟碑絳為州甚劇其地蓄河山之潤縂六縣以三萬户為河東冠俗剛儉尚氣義奄有三晉餘習州治民廬髙下覆壓蟠踞枕跨岡陵是依獨夫子廟學據城之東北隅爽朗夷衍奠澤宫甚宜而素汾北來盤折容與帶郡城而西望之一泮水然廢撤既久莽為榛墟逮州將艧澤郭公來始圖興復遂起犬成殿泮宫門各三楹甫構棧而公卒漠然狼藉者盖三年于兹噫將有待而然邪至元九年秋奉議馬公來尹斯郡既謁告顧瞻咨嗟閔夫垂成之功日就陊剥乃以完故益新為任於是完正殿壯臺門創兩序凢就屋五十餘楹層棟軒翥墀陛整削松桷有舄殖殖其庭中設素王像以顔孟十哲配侍左右東西兩廡繪六十二子及大儒二十有四衮冕哻裳峨峨奉璋奎璧輝映煥焉有光廟既成適選舉令下士子來歸洋洋滿庠既而衆議以州之治化及民者非一其大者著者可無聞於後來謁文於余因勉為撰述且寓夫予之所感焉嗚呼三代之治道莫先於教學無重於育材材弗育則用乏其人民失化則不明乎善善不明則民入於僻民蕩於僻則㡬何不為禽犢也哀㦲欲求吏之良政之善胡可得巳若夫天地絪緼山川開闔蟠精萃靈非有今昔醇醨之間人之秉彛具存天之生材不乏然氣之不充俗之不美者特以教之無素養之未至耳今國家崇聖道開化原建辟雍於京師立學校於鄉遂耑本業者復其身鳴一藝者無不庸是則大易人文之化菁莪樂育之方靡不備至奈何吏治者鮮推其本以簿書獄訟是務為士者不思根極聖道以大學自任區區從事於章句之末是不副上之所求所望焉而曰道不明秦無人也宜矣尹早以學術侍彤庭歴臺閣熟其然故下車之初首事學校作新士民耳目至成就若爾可謂能也巳尹諱某世郡人既書其興建本末而繫之以詩其辭曰厥初生民秉彛昭融物慾外遷良心蔽蒙於鑠元聖乃大有覺何效何則而先乎學于嗟叔世降及漢唐道統湮微絺文繪章士鶩空言吏昧厥治朝夕孜孜匪不磨勵科學異端簿書期㑹愚者不及淪於自棄聖不世出發越道源粃糠虚文浩浩其天廟宫之建序庠是宣穆穆睿思意兹在焉而吏而士尚克勉旃盤盤閟宫完故益新馬公之功本既立矣道由生矣眎為餼羊乃予之耻秋澗集卷五十二欽定四庫全書秋澗集卷五十三元王惲撰碑絳州曲沃縣新修宣聖廟碑曲沃縣學舊矣始完於宋嘉祐初盛於金泰和間貞祐之兵蕩焉無餘前政苟訿初不遑卹園蔬興感薪刈其下者幾五十祀迨至元巳巳邑尹舒穆嚕公慨然以圖復為事工垂構而去尹侯簿賈天衢相與顧嘆曰蕭武弁能事烏可不卒其美然澤宫故地卑陋湫隘不足奠安神觀聳邦民瞻相治城西北陬勢夷且爽遂增崇前規而敞其禮殿焉旣落成董事者許良等感蕭君經始之勤今政贊終之善來謁文將刻石廟庭俾簉名於縣曹諸賢之列用垂示來哲竊不自揆敢以聖道之隆汚廟學之本末互陳而歴告之三代之世家有塾黨有庠術有序國有學以師以令肄俊造其中時書歳考小大有成然後賔而興之其典則六徳六行其藝則禮樂射御書數然不可不思其所自故入學釋菜奠幣于先聖先師示不忘本也彼朝夕見聞無非智仁聖義中和孝友睦婣任䘏之方凡邪説詖行放蕩僻異之術非可輔世教明人倫者率屏絶不容於其間故三代道出一致有學而無廟周衰王者迹熄生民不被庠序之教天理䝉昧心喪厥守異端百家之説乗隙並鶩不無厖雜壅底之蔽此太史公讀功令未嘗不廢書而嘆也及漢興學館林如鴻儒繼作師傳業受學古蒞官守其説而不易故謀王體斷國論一以經㫖為據於時公卿大夫士吏文學氣節雲蒸霧散彬彬然幾三代之風何其盛哉此無他聖道明而百家自息也迨魏晉隋唐以來慕高尚者以虚無為宗干利禄者以科舉為業其視窮理正心修己治人之道懵不知為何事時則三物之教弗明於上先王之澤不及乎下單為廟祀尊孔氏而王之三代教育之實泯泯掃地矣所謂有廟而無學間有卓越特達之士出芟夷浮學羽翼聖道為任然莫能拯起其弊而全濟其溺者何哉盖道之隆汚學之盛衰一繫夫王政好尚而為之有無也嗚呼三代吾不得而見之得見兩漢斯可矣今國家昭至徳建民極勸學敦農崇化勵賢凡可以風四方而開太平之基者靡不興舉故經明行修之士徃徃賔興天府擢位卿相以心正意誠國治天下平之道己嘗佐天子而理百官矣士之不志子古則己苟志于古舍斯時之易將何所求所待焉曲沃自昔以劇稱土腴物阜為絳諸縣甲俗剛儉力穡尚氣義憂深思逺奄焉有唐晉餘烈尤不可後者教也本旣立矣道由生矣師帥者能仰體上之所嚮以明倫實教作新士民耳目俾知所以學異時人材輩出斌斌然追兩漢之風孰謂不張本於斯邪不然釣弋華名為餼羊告朔之所吾不知其可也銘曰維晉曲沃以劇稱絳山左戒汾右傾山川開闔氣上蒸風俗勤儉餘剛稜邑居萬家業有恒旣富而教廼世程嗚呼庠序教所生舒君作尹追良能奉宣徳化根以誠清廟起廢功勃興心計百至經載營惜哉垂構任遽更後人繼之卒有成方華古礎排巨楹文榱藻棟浮雲縈相前增崇尤克承教基鋪敦道日𢎞春風隱耳絃歌聲始謀贊終匪自矜吏民懐感思以銘我詩刻石碑廟庭平陽府臨汾縣重修后土廟碑平陽府治之西有鄉曰晉原帶汾河表姑射林墟櫛比泉流交貫無寸壤閒曠山霏夕景杏靄如畫故河東稱膏腴勝槩之地于斯為最風俗率勤儉盡地利憂深思逺有陶唐之遺化焉用是富庶而事神報本之禮尤恪歲時殫出惟恐居後豈終歲之勞一日蜡者之意歟樊氏里后土祠其來浸邈蒼烟喬木輪囷離披己百餘年物也兵燼來雖正寢巋然日就蕪圮里中父老某等閔其若是乃諗於衆曰吾黨仰滋天休取足厚載歲比豐穰人用樂胥可不知其自耶今神庭未備不足妥靈揭䖍其謂我何咸儆懼聞命柏與經畫起廢完故益新智者作其謀富者資其用取材于河陶甓于野􅀈礎于山然後工者輸其巧壯者服其役營務旣興先後有序於是繚重垣建臺門作重寢列兩序樹庭屏凡三十八楹丹刻翬飛輪奐離立其配侍法從之屬
