body:
  text: 紫山先生易直解序紫山胡公年未強仕應奉翰林潔居官舍者幾十載致力讀書究明義理期於逺大取易卦辭編書屋壁時不肖忝在言列過而見焉詢其故曰吾朝夕洗心将範模四聖人庻幾言行適冝而寡尤悔焉非特說夫言竒而法也識者己以通材有用許之爾即地官佐省幕總尹大郡提憲外臺平生藴藉見諸施設其至公正大之論卓異特逹之舉固不可枚數要之伸吾志行吾道不阿合取容於時不俯仰勉從於衆可行則行不可行則止其晚節脱屣軒冕笑傲林泉進退兩間知命隨時從容中道蓋棺論定皆曰紫山曠逹英邁士也稽余疇昔諗其得於易者為多初不知其有所著述公没之三載嗣子伯馳攜所著易解懇題其端公與僕自弱冠定交氣義契合互為知己今雖衰懶撫其遺書忍無一言發越潛輝夫易聖人憂世書也純粹精深通貫三才理包萬彚其用必須見於開物成務之實然通其變必當逹其辭逹其辭欲見諸用者不於先覺躬行踐履之實跡而取法焉未見能造其窔奥也昔宋名儒劉斯立作學易堂記但序日用常行事而曰余學易矣論者以為得體况紫山踐履工夫形諸事業復推己所得纂而成書啟廸後人可謂得聖賢忠恕之道矣學首復能考公平昔操履得其端倪以之尋繹隠賾奥妙之㫖則思過半矣大徳二年冬十月八日謹序總管范君和林逺行圖詩序燕趙自古多豪邁慷慨之士雖時移俗易不復千古而海山沉雄通貫斗極鐘靈孕秀間亦見其人焉和林廼國家興王地有峻嶺曰哈喇達巴大川曰伊克穆稜表帶盤礴據上遊而建瓴中夏控右臂而扼西域盤盤鬱鬱為朔土一都㑹然去京師數千里地連廣漠氣肅𤣥冥中土人聞話彼間風景毛髪森豎已不勝其凛然矣况行役於其間哉至元丙戌詔皇孫晉王於其地建藩開府鎮䕶諸郡燕人范君徽卿早以湯液供奉徽卿為人讀書尚義以功名自憙識逹時務臨機果决非特以方伎進也凢侍行者三往返焉所謂沙漠寥逈風雪寒沍險阻艱辛備嘗之矣其志益厲氣益振曽無退縮顧避之私今人暫適數百里間者輒有離别可憐之容抱被入直省署傍徨顧妻子語頰刺不能休較以徽卿之事非豪邁慷慨者乎冝遂雅志掇美仕而収功於藥籠者不止邯鄲故歩也友生尚藥長段鼎臣壮夫為人擊節嘆賞之不足復持所繪逺行圖将求名公歌詠庸彰其名譽屬序其端予謂徽卿志行固可振衰激懦為臣子忠勤之勸復欲形諸歌咏庻有聞風而興起者焉大徳二年十二月臘日序易齋詩序予往歳需命延芳東淀識供奉姚君於稠人中儀觀秀偉襟量伉朗及聽其談論灑灑有斷决固疑其非建除流也舜卿河東人少博學起法家為專門嘗從事憲司以平反稱用薦來京師當塗者将處之秋官司平既而侍從官有以善占筮聞者一日緹騎到門以所詢上對多徴驗中事幾由是待詔金門日承恩睞者蓋有年於兹四方稽疑問計者胥以正理示之曰人事順蓍蔡不吾戾也皆知所止而去然舜卿資耿介負才氣思効用於明時者為切顧是覆逆有不屑為者足跡亦未嘗及權貴門墻求展其所藴賢士夫歆其志尚如此樂與之遊從嚴範泉嘗題所居曰易齋率賦詩極口幽賛近持嚴翰相過屬題其端且曰序吾平生閣下十年幸詳之過此非所知也予告之曰昔劉斯立記學易堂但筆其夙昔日用常行之事洗心工夫不一言及論者謂得體蓋易之為書聖人之世為盡人事作也吾用既明道固在其中矣嗚呼舜卿胷中自然之理善學不言之妙與斯立其亦同然者乎元貞乙未冬十月望日序洪洞縣王舜卿敬親堂詩卷序昔賢論孝子之事親也務為敬愛交至恐其恃愛而怠慢生故父子異宅而處復慮孝愛簡而弗洽迺有問搔痒痛之節所以廣其敬愛也然宣尼語孝之大經以不敬其親謂之悖禮徒能養而禮法不足又深警於言游蓋明孝之用固有愛敬之别究其本體主一無適與親之重事之大復何以加於敬乎予官晉府者五年得純孝之士曰王君舜卿舜卿世居洪洞縣東陽里自曾祖惠祖誠祖母張氏繼享遐齡子孫俱以善事聞舜卿夙承家範復知讀書勵行增益其情文之不足者奉其父伯玉君恪供子職謹身節用惟恐甘㫖之有闕也氣和色愉所期致志之樂也孺慕情至洞洞屬屬如不勝而有所失由是取信於朋類傳美於鄉閭僉曰舜卿誠孝人也予嘗過其廬扁曰敬親庸表順徳後廿餘載予在翰林其友人中省東曹掾郭文卿相過而請曰舜卿自經翰學先生題品後信道愈篤家居教授克終孝養有司辟舉辭皆不應邑大夫洎士之能文辭者咸歌贊之然未免為一鄉士也不肖交最欵将求詩什於朝士庻播其清譽幸念疇昔賜以序文予謂文卿曰河東三聖人所都平陽實放勲所理其至徳之所感格深澤之所涵濡至今尚有存者晉卿乃晉産之良孝行既超乎流輩隠居復求其志尚自可追遺風而厲衰俗矣昔唐董召南隠居行義昌黎先生作詩發其潛徳宋徐仲車力學至孝紫陽朱公特書卓行二子之名因之昭晰顧予衰老其言豈能為人重輕哉文卿曰士志獲伸於知己後生借重於先進此理之必然况嘗趨下風而接清光者乎不然幽隠之士烏能名於後世耶予曰有是哉於是乎書大徳二年戊戌歲重陽前二日序雪堂上人集類諸名公雅製序雪堂上人禪悦餘暇樂從賢士夫遊諸公亦賞其爽朗不凡略去藩籬與同形迹以道義定交文雅相接故凡有營建游謁或懇為紀述或贈之詩引三十年間累至數百篇非好之篤求之切安能致多如是耶乃自諗曰緩標玉軸藏之篋笥銀鈎翠琰列之廊廡焚香煮茗玩味者有時拂拭塵埃披讀者有數不若纂為一編刋之版木用廣其傳遂詣秋澗翁以序引為請予詰之曰夫浮圖氏一生死外形骸百年斯世電露起滅事業功名一歸虚寂而後己今吾輩既以不朽計實其空無復欲申衍㣲義其説何居師曰在吾教法中凢嚮善積行述贊偈為之證據今某踵雁塔之故例續千佛之名經集羣英聚衆美期欲布恒河沙界等須彌盧共傳為無盡藏不求詞林大居士為表暴其端倪皷舞其宿緒是猶以明月之璧夜光之珠無因而暗投可乎予曰有是哉昔文暢參寥子愛仰昌黎東坡名徳屢造門墻二公以墨名儒行時與其進至贈之序贊雄深雅健與時俱新膾炙人口由是後世知有二僧之名雪堂其亦文暢參寥子之流與至於行業風義讀其文頌其詩自當知之兹不復云樂籍曹氏詩引樂籍曹錦秀緩度清歌一日來為予壽因詢之曰汝以故家人物才色靘麗風韻閒雅知名京華為豪貴招致逞妙藝而佐清歡日弗暇及不知何取於予而得此哉曰妾雖不慧請解之無猥以薄技陳述古今興亡閨門勸戒必探窮所載記傳詠詩掇採端倪曲盡意趨乆之頗有感悟欲為效顰願乞一言為發越俾妾姓名得見於當代名公才士題品之末庻幾接大雅之高風一時増價飲靈芝之瑞露七竅生香不同落花飛絮委跡於塵泥間耳先生寧無意乎曰予少有志於時中年多故毎感事興懐登高作賦以攄其底蘊由是頗以文字知名今老矣百念灰冷有瞑目澄心燕坐焚香而已惟集賢翰林諸名勝擅文雅而足才情念芳魂而餘蘊藉者肩相摩而踵相接也琢肝腎而製錦綺因咳唾而成珠璣摸冩鶯花之狀形容月露之情只在揮毫之頃耳彼往求而得之如杜秋娘之善謳金縷薛校書之秀發蛾眉元相國杜樊川皆贈寄詩什語意清新膾炙人口自可因之以傳不朽尚何俟粃糠之辭簸掦於前哉曰請即書此語令妾持之以為先容叩蓬萊瀛洲之境而問津焉不亦可乎磁州采芹亭後序采芹亭者前州倅劉漢之所建也予自壮年宦游河朔間毎過滏陽遽必趨拜楊公而去一日先生率予謁州之廟學指其廢而未理者曰此郡庠也此頖池也此頖之采芹故址也承平時學校之盛視數州為冠吾雖耄要當修完庻復舊觀據當時所存者雖一瓦一石俾保之勿壊既而先生下世壬辰冬予復過滏陽所謂芹亭者巍然如翬飛翼跂宛浮波面荷香藻影曉風凉露士子游息徜徉其上沾濡芬霏歌詠思樂殆有登瀛之快已而翰屬曹生因求書其事楊公疇昔之言不覺蹶然於中雖罔及施勞使來者是心不匱實先生有以錫之我其可不念哉先生名威字震享承安人姿剛直有文章議論少嘗以蕃兵為儒将有功西夏建元初年中書嘗召為詳定官已而言事以星變勸大臣宜解機務以避賢路不然且有大咎不聽遂拂衣南歸教授鄉里壽八十終於家迨至元五年㐮陽破吕文煥出降五月北覲過磁先生贈之詩云連隂六十日平地一尺水今朝與明日淋瀝尚未止此者天垂戒其中有至理降将吕太尉飯畢行欲起偶爾得㑹面舍館接爾汝自言鎮㐮陽於此今五紀為惜萬人命此來非為已聖王錫深恩高爵還故里一飯尚有報盡忠從此始余謂我國家萬方同一軌得之無不得東南一隅耳向使君不來宋歴能有幾人生苟冨貴直筆一張紙見説李陵生不如張廵死吕為之斂衽而去撫巻懐賢豈勝感嘆若能取孟亭例祀先生於學宫俾死而不忘儲宫祝香回洒汗而書雪庭裕公和尚語録序至元丙子夏予考試河南由汝抵洛崧前勝槩盡在目中只欠少林一遊耳東行擬取道轘轅庻饜宿願竟以事奪不果耿耿在抱至神遊洞閤兩花繽紛悅與真遇今年甲午冬萬壽主僧圓譲偕少林惠山來謁因及山中物色與向夣不少異相顧一笑乃有是耶遂袖出一編曰先師雪庭語録也仍合爪前請曰公山林清興雖未稱遂幸題辭篇端以為他日張本寧無意乎予以事與心會似非偶然者按所具騰説以應懇求雪庭初參萬松秀公萬松得法雪巖上人縱横理窟深入佛海至於游戲翰墨與閒閒屏山二居士互相贊嘆為方外師友其器業槩可知己師參禮閲十寒暑獨能秀㧞叢林得根據為奥遂出世主奉福精藍繼應少林敦請招提禪刹號中天名勝板蕩後増崇起廢頓還舊觀緇徒具瞻蓊若海㑹於是欵龍庭而振舉宗風敞五林而宏閳家教因縁會合傾動一時以無礙妙辨現當機應身處統堂第一位者蓋有年於兹從是而觀自非克荷佛乘大異倫類機鋒峻整逈出物表者能如是乎今古本己净真如迹空學其法者能鑽研故紙即心印所在求向上一著恐不待夜雪横腰而悟面壁西來之意蓋有之矣吾未之識也是歲仲冬開局前三日書孝節王氏詩巻序傳稱夫有再娶之義婦無二適之文蓋天地之常經人倫之大綱也然風霜别草木之性衰俗表幽貞之節求之於今王氏其人也父振北渡後嘗為州權司年耄無嗣納州将劉六郎為門倩得一子甫半歲而婿亡既而父以女年甚艾且無母氏議復館甥於室女聞之跽父前而言曰家貧無嗣世之常事婦人再醮奈名教乎有誓死而已父壮其志遂寢無幾異母弟用國俗欲行續嫓王氏出好言置叔於姑前以人倫正理折之曰寧守節而死不失節而生且夫者天也天不可逃行違神明天則罰之即欲自戕頼左右救而免叔亦感義烈而止時劉帥歿已乆世業扶疎諸子分居其姑秦氏亦無子孤影㷀㷀空闈索處王氏善組紃以供日需提挈子傑歸養秦氏以極孝恭教其子至通習儒吏致卓有所立於是風動鄉閭義激行路耆舊士夫交章舉保䝉旌表門閭曰孝節王氏之里嗚呼光顯哉及秦亡顧劉氏三代浮殯淺土子孫游宦力不暇及遂獨營墓田總理塟具凢溝合者十餘竁鄉人來觀無不驚嘆曰丈夫兒有不能辦者何賢孝如此王氏處寡四十寒暑言笑未嘗露齒素髪盈簪氣貌幽閒所謂老而益堅者也鄉里偉其徽美一日子傑來請文因泚筆而序之庻幾備采管彤區明風烈者演柏舟之誓云嘉善録序刑者成也一成而不變民之生死俗之慘舒係焉故君子悉其聰明致其忠愛而盡心焉在唐虞三代之際風俗淳教化備已有輕重適冝矜恤哀敬之感况肺石雪寃棘林夜哭之後哉此疑獄折獄等集所由作也大都路總管府推官李君威卿少習城旦書以儒術飾吏事復取經史子集下逮百家之説凢關於刑憲者撮其機要纂而從類先之以歴代法令輕重沿革著明其體繼之以聽斷節目之詳彰施其用凢三十二門名曰嘉善録一日攜示秋澗翁懇題其端予雖衰耄胷中耿耿尚在士有好學而兼善者廼喜聞而樂道之自政教陵遲獄辭繁閧事至持難手有未易措者故職任推理衆為抵諱然協中輔治之具雖聖人視之為切務者孜孜焉存心而盡意可謂超出於流俗之表矣况有致知之資居可行之職當推鞫審决之際屬類比事稽古凖今融㑹貫通俾時有稱平不寃之譽為不難矣昔宋祥符間有獄官張慶者以矜慎自持其囚徒飲食湯藥卧具必加精潔其後子孫奕葉登第顯宦於朝論者謂慶平昔重䘏獄事隂徳致然况殫精覃思盡心於五罰五用者哉威卿尚勉行其所學善推其所得而愛物兼善之澤詎可量耶西巖趙君文集序西巖趙君系出遼勲臣開府公後遭時多故家業中衰西巖崛起􅅵畆從龍山吕先生學金自南渡後詩學為盛其格律精嚴辭語清壮度越前宋直以唐人為指歸逮壬辰北渡斯文命脉不絶如綫頼元李杜曹麻劉諸公為之主張學者知所適從惟虎巖龍山二公挺英邁不凡之材挾邁往凌雲之氣用所學所得偃然以風雅自居視李協律趙渭南伯仲間也雅為中書令耶律公賔禮至令其子雙溪從之問學由是趙吕之學自為燕薊一𣲖西巖受業適丁兹時探究其淵源沉浸乎醲郁加以立志堅篤講肄不倦宜傳遺緒最為知名士捐館後十五年子天民攜所著述西巖集見示求引其端廼為之說曰文章天下之公器與造化者争衡為之甚難故得其正傳者亦不多見豈非天之降才不易而人之器識亦有限量耶惟就其材地所至學問能就以自得有用為主儘名家而傳不朽若必曰須撐霆裂月碎破陣敵穿冗險固者方可為之則後生晚學不復敢下筆矣如西巖之氣淳而學古材清而辭麗自足以攄平生之底藴為後進之規模異時有大辭伯出如王臨川元新興纂李唐之英華續中州之元氣序文章之宗𣲖者則於是集亦有取焉遺安郭先生文集引關輔天下形勝地有終南太華洪河涇渭為之襟帶姬周之所積累漢唐之所經營雖時異事改彼忠厚雄傑之餘風山川英靈之萃秀而在於人也意其必有瓌竒文雅之士生乎其間僕嘗思一遊求其人與之縱竒觀歴遺跡羡山河之良是嘆興亡之無窮豁逹芥蔕以忘吾憂寤寐平生未遂斯願至元乙亥冬猥判晉幕夤縁迎謁扺華隂東歸殊悵然也爾後毎自秦雍來者必為訪問雖得其髣髴而士之聽見初不知也大徳庚子春方謝事不出有客叩門剥啄自稱奉先郭良弼嵒甫攜示先世遺安先生文集請引其端細為披讀蓋信道篤燭理明攻詩文為顓門之業者也豈非向所謂瓌竒文雅之士乎雖未西遊其山川人物已在吾目中矣奈何衰老懶於論載請益勤乃勉為之説曰文章雖推衍六經宗述諸子特言語之工而有理者乎然必需道義培植其根本問學貯蓄其穣茹有淵源精尚其辭體為之不輟務至於圓熟以自得有用為主浮艷陳爛是去方能造乎中和醇正之域而無剽切撈攘滅裂荒唐之弊故為之甚難名家者亦不多見惟周卿先生天資冲粹内守峻潔自㓜力學為健舉子中年流離不易所業故徳望彌高文學益冨致逺近尊禮又少日以外孫行接際蘭泉先生所交麻段孟李諸公皆秦晉名士其資之深學之博與夫淵源講習可謂有素矣故詩文溫醇典雅曲盡己意能道所欲言平淡而有涵蓄雍容而不廹切類其行己藹然仁義道徳之餘孔子曰有徳者必有言信乎其有言也所可惜者連蹇塲屋不遂一第侍謀省幕道弗大行然信於今者不必傳於後晦於始者其終必顯曰顯與晦必時之待揚雄氏所謂五百年必得其人然寥寥四海豈無知音者恐表聖之言乃為通論况有賢子孫為之揚顯者哉今文治蔚興學者日衆異時板本一出有序關右之宗𣲖究蘭泉之命脉者則於是集知所崇尚矣翁三山史詠序自伯魚趨庭宣父訓以學詩俾興起志意通逹事理造夫大學閫域由是後之學者有以取法知所適從伊川先生嘗欲體詩叙童子切務令朝夕諷誦發其意趣蓋遵遺㫖也六經之外其次莫如史然載籍浩博初學者欲遽渉獵譬如算沙海上成功何年故前世有帝王鏡略小學史斷䝉求箋要等編皆誘之易以覧誦速収見效今慶元路總判三山翁侯元臣復擴充前人規模取通鑑編年事跡顯著者綴聨五言絶句二千餘篇其歴代之隆替君臣之得失粲然具列辭直而不晦言簡而意足使初學者讀之易曉而難忘庸他日融會通貫之漸或曰牽合章句破碎全史不幾於篆刻雕蟲之弊乎予曰不然聖賢進修學有大小傳有後先子夏所謂譬之草木區以别者為得之矣况翁侯是作特為童䝉所設就其所成就而論可謂祖聖訓述賢傳攄己志惠後學好古博雅者矣大徳四年月日謹序燕山王氏慶弄璋詩引史館簡閱王生子憲自其先世以篤行至孝培植根本子孫奉承家致屋潤復能尚義好禮為名公賢士夫稱道都城人物浩繁由是王氏以孝義知名子憲㓜䝉訓誨卓有所立以良家子選侍閭門擢直玉堂謹愿文雅出色同輩有光故家所不足者嗣續為念大徳庚子夏佳氣充閭璋輝呈瑞犀錢玉菓已浴蘭湯綵筆柘弓載臨晬旦以予在院中最為耆舊來乞名乃取先世積善而不近名種徳而不求報命之曰餘慶先儒有云善惡之報至子孫而後定又云賢者必有後王氏其有子也冝矣謝庭春好羡玉樹之臨風竇桂枝榮望讀書而有日徐卿二子少陵有歌嗣深晬日涪翁伸頌凡與往來者皆冝作詩用展光賀贈李逹之詩序李逹字逹之汲梁人世将家既長游燕遂占籍焉為人慷慨樂易好閒便静以相術行於時然不以藝自矜與僧西雲相善講主和一日以領宗門事為問切語其徒曰汝師不數日逺行尚欲何為不浹旬而逝又同術者指一井工有坎阨斃不出來日逹曰否坎阨則無将縊而死果然南官程總尹以除日訪之曰喜只在此日口未落而除下其應騐若爾僧龕禪榻曽不惜朝鏡之磋跎醉袖笻杖常歴遍春烟之巷陌世味宦情兩皆泊如其兄顯道以偏師戍𤓰歩殊光顯也書屢招不赴或疑焉逹曰兄安余無所希冀何往其安貧守分如是者有屋數間在崇仁東市門田五頃近潞水澹臺里歲得租粟自餬其口云義齋先生四書家訓題辭義齋先生姓石氏諱鵬字雲卿父璧自五臺東徙唐封家焉世傳儒業中戊戌選終保定路勸農使先生早以文行師範一方至元丙子用辭科魁多士資純篤恬於世味惟閉戸讀書務為無所不窺四書小學尤所致力集其所得遂至成書沉潛玩味者有年反復更易初不去手易簀際屬其子承義等曰吾平昔精力盡在是書藏之家塾詒訓子孫吾世其庻幾乎承宗奉遺命以叙引來請僕憶提憲燕南時按行屬縣與先生有一日之雅今雖衰耄忍蘄一言庸慰存没夫四書所載性命道徳之懿修齊治平之方道統所由傳授學者所以修習推明天理維持世教如水火菽粟日用而不可闕伊洛名公後宋諸儒集解纂疏論之詳矣近年上而公卿大夫下而一邑一郡之士例皆講讀僉謂精詣理極不可加尚先生復能沉浸濃郁含英咀華發先儒之未及附己意之所見自為一家之説其學與志可謂勤而知所務矣蓋士生斯世不可虚拘出則行道濟時隠則立言垂後况性命之理仁義之端非由外鑠皆性分之所固有職業之所當為盡其在我者而已初無先後淺深之間故子貢曰文武之道未墜於地在人賢者識其大者子夏亦云君子之道孰先傳焉孰後倦焉是則先生著述之本意也若秪以篤信好學修辭明志遺訓子孫啟廸後學折𠂻聖賢則義齋之名亦當傳聞於後於是乎書大徳辛丑歲孟夏吉日題義齋先生小學家訓序義齋先生補註小學書藏之家塾未嘗示人治命其子承宗曰當攜謁秋澗翰學庻明吾志先生既没鄉邑士人楊飛卿将板行焉承宗致遺命懇求序引僕向游宦趙北與先生夤縁私覿欵洽則未也用是追念疇昔敢攄臆見昔晦庵朱文公既集註四書俾大學之道體用本末昭然顯著復慮童䝉之士弗知趨向次第不能入道義之門造治平之域復述此書俾為師者知所以教弟子知所以學雖曰小學其文辭雜出於聖經賢傳百家之書言㣲行懿顧先師宿儒究竟踐履有終身不能盡者近年科舉不行士趨實學曰師弟子云者專務講明收功致効舊有標注未極詳備今先生之注究其淵源辭㫖之奥與夫品節度數之詳隨其繁簡而具載焉純直明坦俾初學者觀之易於省解如陟高而得梯階濟深而遇舟楫其急先務應時求不為無補先生諱鵬字雲卿自號義齋保之唐縣人隠居求志潛心著書不求裱襮吾聞積善勤學報施不及其身而發越於後者必大則是書之出先生之志之學光明於時也審矣西溪趙君畫隠小序予既冠受館於漕使周侯因與門下士趙君子玉游乆之熟其為人資清雅而有幹局心機巧而善繪事其初家藏營丘遺墨朝夕愛玩不去其手遂有所得繼遇東丘畫工沈氏指授筆法又嘗西遊太行窮巖岫之深峻視雲烟之變化當其情得意㑹留連忘歸動經旬月由是於仁智妙趣得其動静之理又操觚染翰覺心手洒洒無留思嘗為亷右相董承㫖及僕作亷泉野荘秋澗等圖景氣蕭爽雲烟清潤筆簡而意足其寄興雲霞放情林壑有淡墨冩出無聲詩之譽或譏懐材抱技不沽價以求售曰人物者天地之幻化圖畫者又人物之幻影彼功名烜赫富貴薫天者倐忽之頃已歸磨滅况韋布之士欲取聲華於虚幻之餘不幾於惑歟然所以孜孜於此者特遣興適懐冩吾胷中之丘壑爾聞者為知言大徳辛丑夏邂逅都城為予臨楊息軒緑野探梅圖髣髴三昩不傳之妙復懇於予曰僕老矣技進止此幸惠顧序述平生傳遺子孫乃語之曰昔曹霸樂藝而忘貧賤郭熈頭白餘筆力少陵山谷為賦丹青引秋山歌攀附驥尾名垂不朽顧僕何人敢望於二公哉趙君趙君其奈爾何子玉曰不然前賢後賢其揆一也古徃今來各其時也顧在中朝聞望老於文學者孰出公右言念夙昔能無情乎既不獲已乃援毫而識之趙氏系出桞城宦族當天兵南下父通福以義勇附太師國王帳下從定河朔屢立戰功壽終定武漕使周侯以葭莩故表其勞績䝉先朝收録二子仍復其家仲列名侍從後歴尉完利等州州尹次曰澄即子玉也受中山三司使晦跡管庫餘三十年無毫髪㸃汚蓋其胷次脱洒不為物欲所累故也五子秉仁秉溫縁父好尚亦馳譽丹青云是歲秋七月上旬二日秋澗翁謹述崇真萬壽宫都監馮君祈晴詩序大都辛丑夏仲暑雨大作霑霪不輟至五旬之乆泥塗坎陷車馬不通潢潦漲漫浸貫川澤小民咨怨農夫告病崇真萬壽宫都監石泉馮君乃謀於道衆曰吾輩奉正一法以祈禳為業覩其如是雖不吾以安可坐視而弗救耶於是致齋潔肅儀物籲告穹蒼飛檄諸部懇以七日為開霽之度及期果六丁斂虐曦馭騰光士庻獲覩天日晴明之快免昏墊陷溺之苦於是羽客儒流咸作詩讚揚湖廣儒學提舉戴月澗以序引見屬戴交乆情欵有不能己者廼題數語姑塞其請予嘗讀洪範九疇觀天人相感之際隨所召禎祥災沴應之吁可畏也故三代君臣遇災知懼固曰修己敬天為務而禱謝禋禜盡諸人事者自不容己逮漢静應張公以神道設教體含清虚用周慈憫為國家祈天永命為黎庻祓除不祥由是祈禳祭醮自為一家之學傳授科式符籙具在也然得其人則法靈而著效苟非其人道不虚行傳曰至誠感神又曰至誠動金石道雖殊途其致則一若石泉馮君之祈晴有騐其亦持守誠敬祭醮精嚴善於宏衍宗風者哉諸君作詩稱美不亦宜乎其年秋七月廿三日秋澗翁漫書窮閻飄泛逝川東千里嘉禾一雨空􅑷􅑷複翎雲影外林林萬木水光中慘舒何待鞭奇石禱籲端能格上穹千古盟威神力在崇真壇下振高風紫山胡公哀挽詩巻小序挽章者哀傾逝而寓夫所感之辭也予於紫山既哀之而復有以惜焉紫山起諸生進擢館閣掦歴省臺官至三品壽幾七秩順受委正略無慊愧於何嗟惜所惜者材超卓而不凡氣正大而不替可以挺公論而勵衰俗激清風而作士氣邇日天柱峯摧少㣲彩晦士林憔悴失所景仰不知乾坤純粹之精山川英秀之蘊幾世幾年氤氳感㑹復生斯人此黄鳥之詩薤露之歌有不容己者忝與紫山三世交遊氣合情欵故其子典簿特屢徴鄙作既序夫易解復記其祠堂今夕以斯文為念孝心追逺誠宜嘉尚顧筆力衰薾奚能發潛徳之幽光倡作者之端緒然眷懐疇昔重以陳太常北山之請敢攄平生所得於公而可深惜者冠之篇首云大徳辛丑歲秋仲哉生明秋澗書朝儀備録叙至元辛未歲大内肇建始議講行朝會禮儀蓋所以尊嚴宸極辨上下而示等威也然事出草創不過㑹集故老參考典故審其可行者而用之其後遇有大典禮准例為式祗取嚴辦一時執事首各司品節其禮之全體亦不能究其詳而通貫焉逮侍儀舍人周之翰供職乃纂述物色儀制之品班次度數之則曰朝賀曰䇿立曰開讀皆其己行而可驗復圖注以致其詳皇儀縟典粲然明白目之曰朝儀備録攜于秋澗翁求考辨焉乃告之曰汝外祖文康公羽儀先朝粉飾皇猷號禮文稱首汝父松壑侍儀初事綿蕝獲預選習今汝從事於兹又復有年其見聞之乆講習之熟可謂專門學矣况禮之大綱本乎天理之自然節文儀則由人情而折𠂻不容強知妄擬措私意於其間雖聖人不過祖述既往隨時去取故孔子曰周因於殷禮所損益可知也其所以行之者極乎敬慎而已故曰其在宗廟朝廷便便言唯謹爾則是書纂述非惟備豫考按即事可行若有集國禮而編㑹要者亦将有所取焉大徳辛丑歲立春前五日秋澗退叟題恕齋詩巻序郎中李侯正卿其先世佐金祖開國子孫衍慶傳嗣侯爵易代後軒裳蟬聯猶為燕雲鉅族正卿資明豪踈財樂善有子二人俱教之讀書勉勵資藉之者惟恐不及與古人愛其子教以義方之説吻合衣冠修整僕馬鮮明喜交遊遇事慷慨與物無凝滯蓋有志於冨貴利逹者也人爽約以負之量廓然而能容或非禮以相干但理遣而不校尚恐其守之不堅行之不力乃榜其宴息之所曰恕齋又為未盡也質之於秋澗翁将求諸名勝題咏庸勉其不逮乃告之曰夫人之生禀精五行有情有性仁義禮智生之於中所謂性也喜怒哀樂愛惡欲感之於外所謂情也聖賢存養樽節求合乎中而已其恕云者既盡夫存養之功復推而為應物接人之道故曰推己以及物己所不欲勿施於人蓋由内以逹乎外自漢以來不能體認聖賢求諸己意思遂以恕為寛容之稱雖范忠宣之賢亦有恕己恕人之說是狥外以遺内也何不揣其本而齊其末哉今夫己之善推以及人其不善弗加諸彼則物之應於我者皆善自無出悖來違之戾尚何寛貸容恕之有今正卿既識其用復能明其體由末以逹其本日就月将緝熈光明則違道不逺矣雖然比之貪冒無厭黷於貨財較班資之崇卑計利害之得失不至傾陷攘奪而不止者為之猶賢乎已某年月日秋澗翁叙秋澗集卷四十三欽定四庫全書秋澗集巻四十四元王惲撰
