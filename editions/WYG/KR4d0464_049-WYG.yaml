body:
  text: 蘇門林氏家傳林氏其先兖州曲阜人唐季有官閩中者後復徙家文登至逺祖府君翰葢五世矣翰宋初用子貴贈率府率子諱文受知熈陵官至崇儀副使淮南路提撫刑獄贈領軍衛將軍生子永終屯田員外郎御史臺推直官累階贈光禄卿永生之純字嘉父擢景祐五年進士第釋褐主朝城簿河東犯横壠瀕於不支歸兵恟恟欲亡去公安諭遂帖然事集升知莘縣以屏盜有方受澶州頓丘令未㡬恩信大行時麥黄水盛下囓孫陳闕岸勢危甚公朝服立潰堤上望濤頭拜禱波神為霽威境賴以安改佐著作淮陽軍事判官貳徐惠劾紀著叛獄有匿其家闕者詿誤殊衆公為辨理多致原釋郊禮覃慶加太常博士知大名縣初天王院五代時有韓王賜田甚廣歲久失據鄰伍以僧妄冒致訟累寒暑不能決公按索隣券考明封畔繼得古石記與所按吻合以田付僧令歲輸常賦民乃稱服用丞相程公薦通判青州終得年四十有九官至職方員外郎上騎都尉仍賜五品命服娶吕氏封京兆縣君惠和宜家之純生三子長曰舍字虚白年十九擢熈寜進士第性恬退以髙節自信嘗有詩云世有非常樂人無未老閒未三十以大理評事休官名賢髙其行至方之淵明初先生西遊共城愛其山水明秀廼營𦵏青州府君於縣西處賢郷古郭里母夫人吕氏祔焉自是林氏為衛之蘇門人先生四子曰愚曰恕曰怤曰􅀢愚字貢元亦以節行稱宋亡至焚香告誓不仕而終仲弟介郷貢進士季弟㑹字貫道㓜知嗜書剛正有志操由䕃補郊社齊郎初主成都雙流縣簿令久闕攝公行縣事有能聲部内舊有堰歲例役並水民苴治貧下苦之公乃一責資溉家理辦仍楗石代工衆免告勞頻歲大稔調宿州司理叅軍暮夜民遺火延燒犴屋公出繋散置庭中比熄倉卒際無越逸者上官材之移南京軍廵判官民有戕其子執謀害人者按竟公至疑焉求情得白遂直其枉改新蔡令歲大蝗獨不入縣境人謂公亷平所致由韋城宰歴奉符縣秩滿授通直郎知蘇州常熟縣兩浙頻年大水引溉浦口湮閼無慮三十餘所累政謾不加省公按行故瀆率疏瀹之民受賜不貲元祐庚辰疾終蘇之公館配張氏有淑徳駕部員外郎赤之女封夀安縣君生子男四人聽通直郎西京敦宗院博士聰總隐皆業進士自羈闕至成人太孺人隂教為居多聽生子五人曰巽兑蒙鼎革巽次子諱正國字徳將登金大定十六年進士第終少中大夫北京監使生懐逺大將軍毗陽丞諱茂字漢卿懐逺二子曰思敬郷貢進士曰思徳潁州軍仗庫使生子芳今任江南某府從事思敬府君之子即故衛州交鈔規措大使諱通字子泉為人丰儀修整顔渥丹鼻隆然如膽垂寡言笑善心計顧衛南北衝㑹貨財四通遂積殖與時逐然坐籌能擇人而任故物情得而掇世資生平喜賔客樂施予其克勤躬儉殆憂深思逺者屡以其術事上官獲精幹稱嘗訓子珪曰林氏上世以詩禮傳家代有閒人予惟早失怙恃生長喪亂間以餬口計處四民末業致貽祖襧羞諸孫稍長無忘讀書以復世範汝念兹無置府君以丙辰歲終魚行里之私居夀六十三配宣氏衛之大家主治内務寛儉有母儀燕處榮養期頥而終享年八十有三人以全福歸之子珪以孝義著稱能世其父業嘗任州三務大使次子璋謹愿克家珪子永大名府平凖庫使次子元珪奉遵先訓俾之從學其資籍啟廸乃心罔不盡不數年起家為中書掾至元丁丑予列職太史元來謁拜而請曰元無所肖似析薪之責固不克負荷惟是先世行業非得名筆約而暢之將不能傳逺而人見於後先生尚胥暨顧予以林世叙雖邈其聞而知之見而知之者班班可紀加以世姻之好故勉為傳述之贊曰林氏本出商姓太丁子比干以忠諫死嗣堅逃難長林山易以定氏周衰枝葉扶蘇散處中國如放之聞於魯顔之顯於齊囘以義著至以相名皆其後也繄南安之林唐已來世為魯人豈放之苗裔耶迨唐歴宋金四百餘載間奕葉以儒顯其流風善政表表于時者如是迨規措府君遭時艱虞家世中衰竟能遹追來孝俾盛徳幽光墜而復續豈君子之澤其流淵且長乎南􅅠王氏家傳王氏皆王者之後春秋時王子成父者敗敵有功因賜氏厥後子孫散落中國在晉者靈王太子後齊則畢公髙後其在陳留者齊王和之裔汲郡王氏其先陳留陽武縣七圈里人起家壠畆耕稼河陂間宋靖康初避地徙家衛汲縣長樂郷之白楊里逺祖金天㑹間積勞至杞縣尉髙祖兄弟五人二翁者是為扈王氏初妣父扈素長者聞髙祖賢舍而甥焉生子男五曰三翁四翁五翁十五翁十六翁人見其本支蕃衍稱扈王氏以别因之葢不忘本也三翁贇譜叙為二代祖生二子曰元用曰仲英仲英資頴異是為惲髙祖自田舍即改肄士業嘗語人曰終當以筆代耕衆異其言及長補郡掾為人英特棣棣有威儀主治曹務踔勅角切厲風發明昌初節鎮叅佐例朝授用薦者言遷河平軍都目官上官倚重有黒王殿直立節度之目尋得暴疾卒魚行里舍時年三十有八人惜其年不稱徳生經紀紳三子紀為決曹紳潛徳不耀曽祖經字伯常天禀孝愛垂髫己知事母容止如成人禮氣方嚴内長厚喜施與志不樂禄仕雍容鄉閭以徳度靄一時昆仲七人同居内外無間言以累葉不分家用饒足其賑貧施乏不掩為偏惠人有貸弗忍徵久不克償輒折其券或來謝就復惠濟曰周急素所樂何謝為一田家子要紫大絛來取所附緡繦以醻繋直弗與徐誡之曰農當務實士君子帯非汝當繋悉所有送其家女弟嫁陵氏壻下以俠犯法公曰王氏世鮮女妹先君所鍾愛苦壻置於辟婦能免累吏捕急竟容匿㑹赦嘗出郭門遇里農易菜歸公曰農圃吾事也惰焉取諸市可乎其人謝而去鄉黨有訟者不之官府來求剖正為諭之曰逺親莫若邇鄰同居雜處世所未免親仁和隣古之善道初無大故何至是哉君子愛人以徳曲直非所辯曰吾儕小人聞公言敢不易慮至相戒曰今而後不可使長者復靦吾面顔其為一邦聽直欽服如此王氏北渡後可支分派别者尚十餘房其親喪隨所寓權厝曽之上世亦殯是晉村之南阜曽慮歴年久命封馬鬛漫不可識歎曰吾大宗子合食族墓責實在我遂起新阡大𦵏於長樂郷第四疃祖業之北原及舉祀絶者廿餘柩贈賻率有加凡内外男女孤惸無藉賴者為娶嫁之姻禮踰已出曽祖妣系出新中臨清關宋汲郡公吕氏之裔壼儀母徳宗屬仰法焉生與曽祖歲月日同北兵破衛亦同時怖沒於家春秋七十有六實貞祐二年甲戌春正月十一日也百年來里中宿耆談孝愛而内有則者必曽為稱首生祖宇字彦宇身長七尺二寸儀觀清淑少傳家學尤明習文法至帖問條對義精理當筆洒洒無滯辭行輩無居其右者甫冠遭罹板蕩世業為一空奮身從事卒不失舊物雅為節度公完顔從坦所知遇由郡掾辟刑曹孔目官祖盡心庻獄要本情與法應未嘗用察為明情得為喜也故郡中稱平至有哀矜折獄之譽類注刑統進禄等書既而嘆曰後世知我罪我其此書乎生平樂誨人怡顔和氣不以已長格物雖童孺質問諱諄然無倦色有弗知未始不盡也今梁衛間由吏業而上達者半為門生遂以吏學授先君曰吾治獄平後當有顯者然前賢有言吏以法令為師問而可知其能與否自有資才非學而可此汝最當黙識弟完之子鈞早失怙恃鞠育與先君等至一豆羮一裘褐必加顧恤正大改元四月十六日以末疾終新衛州横堤里之寓館夀五十有一官至敦武校尉祖妣孟氏女縣南草市榆林坊富家姿貞順配祖徳良稱既誕先考以貞祐二年癸酉四月十六日卒於郡之故家再娶韓氏韓宋已來世顯族有累階至司空龍圖者二十九處寡以儉烈聞流寓勤苦保持門户甚力俾先君卓爾早達祖妣資藉之方為多晚嗜道家教號妙清大元中統庚申重九日以疾終安仁里享年七十有六越三日祔葬𤣥堂祖柩之左先君諱天鐸字振之姿精敏㓜知嗜學諸弟出遊嬉獨把書不置既通大義先祖以律學授之即能下筆條對明究情法日嶄然露頭角衆謂能大其先業元光初温國胥公自秦移鎮新衛尚書李特立聞其才由州户曹掾辟權行部令史時上以御馬賜國公圉曹取芻粟比内廏例先君曰不可在閑則路馬既賜則公乗内廏之例容得同乎公聞之曰王掾愛人以禮二年上黨公闓壁馬武京為河朔藩扞分羸兵四千人假食於胙適公儲亦無幾方風雪寒沍衆待哺閭井間公府議省以聞先君進説曰張糾合義兵皆河北遺黎今飢若是不權宜以濟殆非從便副上官意也侍郎梁亨道為肯首然當若何曰今官義兩軍温飽有日若以月給權輟半以應彼急河南漕粟計不時亦至如此則客主兩不失所行臺可其請孱兵賴以安活自是大為省叅康瑭郎中盧芝塘字良輔芝字建瑞二人號載吏事所賞識曰㑹是驥足騰驤一日千里也正大四年用元帥完顔公名額爾克得賊字火燝之號火燎薦㧞所能試京師擢吏員甲首時年二十有六方軍國多故財賦一仰都運司經度實擇才掾集事即選充運司掾長先君夙夜在公游刃餘裕都漕李公芳字執剛承安二年進士號精政務同漕伊喇鄂和爾深加器重鄂和爾公字景先亦藁官入作司藏吏以計盜官物使髙世英受贓初不知從來事覺吏逃失所在及科罪從事帥肅執以監主為罪首抵世英死先君争之不下至詣憲部詰辯曰原世英情本非同謀第行盜後受賕耳據法議罪與原謀共犯不同髙止合坐贓論且法者固當公共師舍焉以即汝心是置法為虚器上官韙之髙竟减死論後懐金來謁先君怒斥去曰母污墨我所争者法非汝私也豐衍庫使劉濬字徳源愛民榜進士先君嘗從問學以卒初業以沿代不審陷名紙三十萬用是追解先君為申理復官如初五年補睦親府掾屬皇兄荆王判府事愛其徳度深加禮遇明年秋皇太后崩制袒免親奔訃有逺邇之限違者從府科罪時有後期者先君請曰南渡來宗室播弱宜從寛宥王然之以為知體園陵禮畢卒無有被劾者六年轉補户部令史時簿書財賦委積音漬紛至先君精力過人故務愈繁志愈明氣愈厲事愈詳不煩書佐裁決如流於是風動臺省有快吏元康之譽開興初用入粟例補滿授户部主事壬辰天興東狩崔黨往往入宫禁竊取金貝或堅約同徃以遜辭免乃竊嘆曰端門不忍過其忍聞此京城下將士争入俘掠尋有令禁止先君偕同志者突冒兵威褫救百餘口於南熏門下乙未歲北還淇上尋朝廷命斷事官耶律瑪魯公括諸道户口柄用顓決得人為意用薦者署行臺從事户制以籍為定互占它縣以死論有潞民馬醫常氏避役匿河内王帥家事露公抵常以死意在籍沒州將且用聳動隣道先君辯之曰常罪止於逋論死則非制書本意公怒曰脱有誤並汝坐之反復辯明常竟獲免又王鳯翔者告崔帥立弟益侃匿金國珍寳適萬户喊失納國闕人受誅公抵益等以喊失罪罪之先君曰初謀竊者崔立今己死况罪不相及國有常憲公遂平反為出益等至有圖像奉報之語明年秋耶律公薨雲中遂南歸或勸為郡縣曰一丘之木安足棲集書歸去來辭於齋壁以見意因號思淵老人日以經史自娛尤嗜春秋左氏傳西漢書晚年一洗心於易嘗質問於華隂王先生名元禮天厯進士第號玉華子曰子學有素吾試先汝問自昔治少亂多君子寡小人衆何也先君曰豈非天一而地二乾陽方始而隂己為之倍歟玉華曰子得之矣集歴代諸儒易説為一書題曰王氏易纂遇朔例一占玩辭明變其應如響下至天文隂陽皇極等學皆通習之聞一異書輒自手録多積至千餘卷友人劉冲曰何矻矻如是曰吾老矣為子孫計耳嵗戊戌詔試儒士時恩制寛或以乃嗣長可從師徃試先君曰吾思以義方為訓若以幸竊非常思非所敢聞嘗誡惲忱曰吾已錯斷不容再寒殍死無吏習能一志於道以儒素起家吾殁則瞑目矣然學貴專精汝不見鑑瑩則乃能别物學苟不精如治鑑不明將安用為不學易昧渉世之道不讀麟經無以知筆削之正吾平昔行已得乎此而己丁已秋八月以疾終牖下先君資剛明簡重善持論慮患深雅以大用自期人亦以此與之握瑜懐瑾羣而不矜事莫可措手者率優為之不聲色少動故官守宦游莫不尊徳樂道問政質疑取决而去事己率如教至吏筆縱横緣以儒術乃餘事耳又善尺牘作真行書勁韻有風格與人交以取容阿匼為恥居家寡言笑以身為律度人望而畏若一官府然外事緩急不一言及家人非疾卧未嘗見日而作三十年兩易裘褐年四十六既奪先妣或勸再娶曰其如不可何老者繼室又先余死是轉余於恤少者後予是吾遺累於後竟不娶初試京師時宿院夜夢人奉一首加胄曰持此若各也及榜出擢甲首云嵗丙辰秋惲亦夢人馳報曰汝父領朝拜且至趣出顧見先君朝服席帽乗而秉簡一卒跳梁馬首唱名翠㣲君節度使後三日先君遘疾乃以所夢上白曰翠㣲者太虚之氣夫精氣為物逰魂為變死生者晝夜之道吾固安之復何憂與明年捐館吁亦異哉先妣靳氏相州永和鎮人進士子𤣥之孫安陽丞顯思之女性淑善於婦道良謹生二子曰惲曰忱孫振孫宜孫重孫鞬郎贊曰謹按家譜惲六代祖昆弟五人五代祖行一十三髙祖行一十五曽祖行一十九王父行一十四禰伯叔行六人由是而觀金百年間本支不為㣲𦕈然自喪亂來或四三世五六世而己者凡二十有四房哀哉唯扈王氏暨相之醫傳房歴八世而傳祀是豈偶然者哉惲觀西漢名臣徃徃決曹獄史致位槐棘雖云明習文法練達故實至論身名烜爀後裔延昌必曰隂積所致王氏自河平府君而下累葉以力穡承家職司城旦迨先考而業有光子孫迄綿綿於今視履考祥其亦有足致然者邪烈婦胡氏傳劉平妻胡氏濱州渤海縣秦臺鄉田家子至元闕年平挈胡洎二子南戍棗陽垂至宿沙河岸次夜有虎虓然突來咥平左􅀈曵之而去胡即抽裝刀前追可十許歩及之徑刺虎劃腸而出斃焉呼夫猶生曰可忍死去此若他虎復來奈何委裝車遂扶平攜㓜渉水而西黎明及季陽堡訴於戍長趙侯焉捄藥之軍中聚觀哀平之不幸咤胡之勇烈也信宿平以傷死趙移其事上聞得復役終身嘻胡柔懦者也非不懼獸之殘酷正以援夫之氣激於衷而知有夫不知有於菟也平雖死其志烈甚矣方之太山號婦何壯毅哉贊曰桓桓壯夫鷙勇而大事出倉猝變色蜂蠆烈烈胡氏憤物為害義激柔衷氣薄於外視虎如䑕所天為大平雖咥死婦節則邁媛折熊衝藴刃賊輩􅊮管流徽清芬匪代員先生傳員炎字善卿固州人性落魄嗜酒業詩有能聲不事生産大元乙亥嵗故人楊紫陽主漕洛帥愍其窶用監嵩州酒時兵後邑居榛荒日與鹿豕伍非所樂也已而隨所徵上謁楊方據桉坐堂上吏鳬雁行立員挂布囊腋下杖巨梃直前曰楊使君不相知置我於此幾為老羆所噬此汝酤鏹持取吾不能為汝再辱遂揖而去其疏誕如此自是長遊河朔以詩鳴諸公間其洛陽懐古分韻得髪字云東雒打空城北邙連廢闕懐古動悲吟逺客生華髪隆徳宫云林花細妥胭脂色水荇輕淤翡翠泥歌舞留連嫌晝短樓臺縹緲覺天低讌集東平湖亭北海樽前人似玉東原城下水如天滿眼荷花三百頃採蓮人語隔秋烟髙唐道中影孤海内干戈滿愁入天涯草樹低桑柘影空蠶己老陂塘涸盡燕無泥濟南金線宿雨乍收雲葉斷猶疑電影掣湖心扇尾羊云馮翊春草香芊綿柔毛食飽飲苦泉卧沙稀肋瓊筯細帶霜小耳春繭圓扇尾一方移種類風頭萬里摇腥膻吾生本無食肉相不煩凂予愁烹煎馬酮云漫説十杯不醉人清光壓倒洞庭春攜行何用紫絲絡渴飲不煩烏角巾摇動革囊成醖釀封藏花盎作逡廵坐中一混華夷俗或有豪吞似伯倫予時能憶者止此西歸過衛先君館焉褐衣麻屨酒近酣巨梃權膝上掉頭吟諷歌謡慷慨之氣軒軼四座素不能騎衆人强之輒色變墮地或以詩戲云靴有鐙青雖可愛面無人色實堪吟嘗懐金一餅曰鎮心不可以闕此後用以易妾繼為人竊去家居壁四立餘詩稾酒瓢而己復有撖舉字彦舉亦陜人面黯慘目光闕慿者少為里嗇夫初不解文字一日忽能作詩吐竒怪語皆古人所未經道雖苦無義意其豪侈之况儕輩屬和終不能及中元冬見予於燕市酒樓浮大白數行徑出歩爐間嚶嚶然忽作露蚓闕來扼余腕忻甚曰吾有以贈子其詩有氣凌太華五千仞詩繞國風三百篇之句醺酣中惜不全憶也嘗謁得楮幣若干醉過里井即投其中曰為爾俾予區區苦此奚用為其狂易如是後客死保塞殯西南門外路北若干歩揭曰詩人撖某墓詩三卷號極谷道人集好事者刋行於世墓誌銘金故忠顯校尉尚書户部主事先考府君墓誌銘先府君諱天鐸字振之族王氏其先陳留郡陽武縣七圈里農家避靖康亂徙居衛汲縣長樂郷逺祖有積勞官杞縣尉者曽祖府君諱仲英特有威望終河平軍節度府都目官祖諱經未仕天性孝愛郷黨化其徳顯考府君諱宇衛州刑曹孔目官精明文法表表為吏學師官至敦武校尉先君少聰敏嗜學不為羣兒嬉讀書通大義先祖授以律學即能下筆論斷推原情法誾誾如老成人衆謂父良為教子能世其家矣正大初自州户徵辟權行部令史時哀宗以御馬賜行省英公圉曹取芻粟欲内廏例同先君曰在閑則路馬既賜則公乗内駟之例非所敢知公聞之喜曰王掾愛人以徳矣上黨公闓壁馬武京為河朔聲援以餽餉不繼間羸卒四千假食於胙適公儲亦無幾部議以省聞方風雪寒沍衆待哺閭井間先君進説曰公府糾合兵力皆河北遺黎今飢苦是不權宜以濟殆非從便副上官意也侍郎梁亨道為肯首然當若何曰今官義兩軍温飫有素若以月給權輟半以應彼急河南漕粟計不時至如此則客主兩不失所可其請孱戍賴以安活自是為省叅康瑭郎中盧芝所器識曰㑹見駿足騰驤一日千里也正大四年用元帥完顔公薦㧞所能試京師擢吏員甲首時年廿有六方軍國多故經費一仰大農調度即選充運司案長時李乾州芳承安二年進士字執剛伊喇鄂和爾領漕計號精吏務先君夙夜盡公審㑹明當二公稱其能入作司吏以計盜官物使髙世英受贓初不知所從來事覺吏逃失所在及科罪從事帥肅執監主為首抵世英死先君争之不下至詣憲部詰辯曰原世英情本非同謀第行盜後受賕耳據法議罪與元謀共犯不同髙止合坐贓論且法者固當公共師舍焉以即汝心是置法為虚器上官韙之髙竟減死論後懐金來謁先君怒斥去曰母污墨我所争者法非汝私也豐衍庫使進士劉濬以沿代不審陷良紙三十萬是用追解先君為伸理復官如初五年補睦親府掾屬皇兄荆王判府事愛其徳度深加禮遇明年秋皇太后崩制袒免親奔赴有逺邇限違者從府科罪時有後期者先君請曰南渡來宗室播弱宜從寛宥王然之以為知體園陵禮畢卒無有被劾者六年轉補户部令史時簿書財賦委積音漬紛至先君精力過人故務愈繁志愈明氣愈厲事愈詳不煩書佐裁決如流於是風動臺省有快吏元康之譽開興初用入衆補滿授户部主事壬辰天興東狩京城下將士争入俘掠尋有令約束先君偕同志者突冒兵威褫救百餘口於南薰門下既而北還郷里乙未嵗朝廷遣斷事官耶律公括諸道户口柄用耑决得人為急前省掾季禎已佐幕府薦先君於公曰王某予弗及也遂署行臺從事户制以籍為定互占他縣者以死論有潞民馬醫常氏避役匿河内王帥家帥名資榮事露公抵常以死意在籍没州將用聳動隣道先君辨之曰常罪止於逋論死非制書本意公怒曰脱有誤並汝坐之反復辨明常竟獲免明年秋瑪魯公薨雲中南歸讀書養晦以厚所待或勸治生曰非予初心也勸仕州郡曰一丘之木安足棲集日以經史自娯尤嗜春秋左氏傳西漢書其天文術數等學皆通習之年既加一洗心於易嘗質問於玉華子先生名元禮華隂人天厯進士大有所得一日先生發問曰自昔治少亂多君子寡小人衆何也先君曰豈非天一而地二乾陽方始而隂已為之倍歟玉華子曰子得之矣集歴代易説為一書題曰王氏纂𤣥且見吾遯世無悶也嵗戊戌詔試儒士時㤙制寛或以廼嗣長可從師取應先生曰以闕為利非敢聞命嘗庭訓惲忱曰吾已錯斷不容再寒殍死無掾習能儒素起家其榮多矣然學貴專精汝不見鑑瑩則乃能别物學苟不精如治鑑不明將安用為不學易昧渉世之道不讀麟經無以見筆削之正吾平昔行己得乎此而已年四十六既奪先妣或勸之娶曰其如不可乎老者繼室又先予死是轉予於恤少者後予是吾遺累於後竟不復娶晚節號思淵老人邦君游宦咸尊徳樂道問政質疑無巨細事已率如教丙辰春平章趙公壁以書來聘時已疾不克徃明年丁已秋八月十有八日考終牖下享年四十有六官至忠顯校尉夫人靳氏相州永和人進士子𤣥之孫安陽丞顯思之次女貞静淑善光備婦道生二子惲忱先卒用戊午春三月葬汲縣親仁郷之新阡先妣袝焉先君資剛明簡宻議論長慮患深雅以大用自期人亦以此與之握瑜懐瑾羣而不矜其當官宰務人莫能措手者率優為之不聲色少動外事緩急不一言及家人至於吏筆縱横縁以儒術乃其末耳又善尺牘簡而盡書勁韻有風格作楷字日滿萬聞一異書佔畢如不及多積至千餘卷友人劉冲見之曰何自苦如是先君曰素無長物非此無以遺子孫其逺大如此所交皆一時名士以取容阿匼為恥生平非疾病未嘗見日而作三十寒暑兩易裘褐居家寡言笑以身為律度人望而畏愛苦一官府然嗚呼先君以刀筆起身垂聲當世於先業為光大惟其秉彛粹慤思欲克其所未至進進焉不容自已絶不齒故習一肆於學根極羣經務明大本復旁通天人之術以濟厥用其修已應時開物成務之志是可涯際邪然時與命捩夀止於斯不獲卓犖大見於世今惲等聆風樹而含悽履霜露而興感抱昊天明發之悲也愾想平生鏤兹礦石庻幾慰安神靈永閟窀窆之藏銘曰繄扈王氏世業農髙曽而下掾習同大風泱泱動南􅅠於爍先子徳所鍾一日奮起蛇化龍樹立先業何光融獄惟平反匪厥躬要以明恕剛而中廷平釋之唐有功漢二千石世業公剖裁錯節輸神鋒庻幾凛凛徳讓風虞淵日入不可曈布衣歸來黙而容春秋大易羅心胷跡蟠於泥氣則虹冀北一顧凡馬空道雖人𢎞繋其逄維弗卒施為世恫兒能讀書亢吾宗白首孰計達與通閉門蔬水甘長終翠㣲之居窈以重一僨不起胡閔凶悠悠大鈞問無從太行西峙泉流東九原盤盤佳氣葱魂兮歸安此新宫先妣夫人靳氏墓誌銘先妣縣君姓靳氏相州安陽永和鎮人永和自唐歴宋為名縣鴻儒鉅族代櫛比出靳氏其一也家故饒財世以孝義著聞鄉里祖諱師揚字子𤣥舉進士詩賦聲動場屋間以恩賜第授彰徳府教官金百餘年鄴下論人文之選者殿元為稱首闕人外祖其季也為人儀觀秀偉髯滿闕喜闕馬闕滿經犬游獵横漳間有河朔故家豪習嘗官安陽丞生二女先妣其次也姨母適李氏令為召居鄉里有一子既歸王氏先祖時已殁祖母韓性貞明持門户益嚴先妣孝養恭順故閨門内事僅絲髪比不敢專須請之後行祖母以是賢之非大故未嘗踰外閾姻黨有以合二姓㑹諸親者先妣與焉里中諸媪至顧而不知為誰平居課兒輩讀書旁治絲枲須夜分乃休樂聞古人母儀女誡及善惡興衰等事怡然有得至寤寐思服旦起愛晴爽問或旱則晴矂溢則闕隂輒愀然不懌曰嵗功一失憂有大於闕不然喜津津見顔色先妣性温純慈祥居家闕容儀無啞啞言笑闕人物不忍少休内外闕以厚平生不能易闕物心慊慊惟恐我之闕人也世方以服飾相髙闕羽耀閭閻甚者託燕游以私謁為事先妣聞而闕之朝夕志女功主中饋被服在躬承祀孔時嘗以事當出乃歸而不自安者移時其幽閒貞順之徳葢可知矣嵗戊申夏六月竟以憂勤致疾越明年已酉秋七月廿有九日化於私居之適寢夀四十有五先君識明達既失内助斷不復娶祖母倦勤稍以内事傳新婦崔氏每取先妣婦道是訓因追悼曰汝姑醮王氏二十有五年有子有孫未嘗以主母自居失為婦禮勤已至矣不獲少慰劬勞而止於斯可勝痛哉嗚呼天道悠悠報施善人果可必而恃邪故臨終闕嗚呼哀㢤天乎惲何罪而至此極耶追念祖母疇昔之言隱然恫於心故茹哀銜恤於兹八年惟是伸荼毒慰下泉發幽光而圖不朽宜銘徳莫若哀號泣涕以畢其辭銘曰坤柔之徳婉以從健而幹蠱匪婦功伯姬之卒諡以共淑慎先妣柔所鍾主夫中饋成肅雝春秋承祀被僮僮善人獲報天乃公嗚呼福夀不一逢歸咎無處恫厥躬窆祔無憾哀送終萬家之原偃斧封泉流可竭恨不窮故權左司都事趙君墓銘君諱謙字和之世為葢州人中統元祀用薦者言以材幹補行臺左三房提控令史二年春考政上都與予同遊居者數月用是情好日洽夏六月闔臺南還君為中省苛留乃以都司擬之作駐久計君怫然不樂求亟去甚鋭事業已不許信宿疽發於腦户呻吟無聊殆不能堪醫庸藥妄一刺而肆裂越三日予與楊易州恕謀曰常山瘍醫麻澤民今之俞跗也適召至若禱於院使王君儀之可一來救藥凡三徃得請踵及門中使趣去之自是内侍不出者幾浹旬後五日夜聞君聲漸嘶報燭起視向壁卧頭岑岑不舉矣比明臭惡達户外傔從止一老傖戅且愚瞪不知若何訪求知故無一人予惻然感傷冒臭惡易衣衾視其疾緩急困則對榻衣寢自疾亟迄盖棺凡五旦夜得年五十有七實中統二年七月廿有五日也嗚呼哀㢤以義以友喪無歸責實在我既斂詣堂中請曰吏趙謙以守官客死禮以公給喪郎中賈君仲明憐之官為賻緡錢千躬為護喪出郡城東門郊外適表親徐貞者至付之俾轊載歸燕君短小精幹審於吏計蚤嵗從事課府以亷介稱杯酒間言笑啞啞殊不知為肅慎氏之族也术甲稱者聲近趙家故以趙定氏云銘曰志樂而奚庸氣信而弗窮曽不知安於命而為通也心與事捩卒與禍逢奈何乎趙公故南塘處士宋公墓誌銘并序南塘處士宋公捐舘之九年當强圉赤奮若其月建亥夫人魏氏奄棄榮養仲子繼祖等託叅卿趙君禹卿致其命來請曰先人墓壙未克埋銘今將啟幽堂祔安妣喪于柩之左窆有日幸吾子速銘以光此大事某追維雒尹平生之言重以禹卿孔懐之義勉為次序之公諱珍字子玉姿秀偉有徳度早能詩華藻𤣥深造理窟散髪揮塵瀟洒有出塵想故中書令耶律公一見偉其貌竒其才至贈詩稱與有柱石中原之目遂薦為朝廷侍從官既而嘆曰吾志在長林豐草間清泉白石金馬玉堂非所樂也乃辭去中舍復授以資使職亦不就嵗甲辰自雲中徙家燕都得金溝水南形勝地十餘畆䟽沼種樹中構堂曰麗澤碧瀾秀挺景氣二勝日以琴書自娛教子孫為業野服髙閒漠然不以世務攖其懐然性喜賔客樂觴詠所交皆一時俊人如王慎獨之愷悌張隣野之諧傲醖藉如楊西庵才鍳若姚雪齋王鹿庵之品潔一世商左山之凝重朝右每光風霽月過其居者燕樂衎衎必極歡而後去太史公曰視友知人公之行已槩可見矣夫人魏氏有賢淑行輔承内治能遂公初心四子㓜服庭訓皆賢孝負藝學長曰紹祖少中大夫河南府路總管次繼祖不仕次光祖侍儀法物庫使次仁祖以琴阮供奉孫十人曽孫四女孫一十四人時節賀慶蘭芽玉樹瑶環瑜珥秀映庭户以次列拜上酒介夀公與夫人亦舉觴酬酢一家之内樂融融也公以至元已已秋八月考終牖下春秋七十有七越明年庚午冬葬大興縣招賢郷之南原夫人之殁實至元十四年冬十月廿五日也夀八十宋氏上世本蜀成都人逺祖有官吉州之吉郷者遂為河東人曽祖元祖信考章俱有儒行不耀其幽光潛徳發於公之身者宜烜赫然公復謙抑不盡享其篤祜遺其子孫至光盛如此銘曰名籍朝端身心考磐貞不絶俗道出夷惠之間以儒雅而擅一時儋天爵而享髙年服食華鮮子孫滿前飄纓若綬照耀後先沒而從祖是之謂祉全我銘納壙復慰下泉千年而見白日尚知為青山白雲之僊大元故蒙軒先生田公墓誌銘金源氏踵唐宋舊制以舉業取士號稱文武正科大定明昌間人材輩出天下英雄盡入吾彀中南渡後境壤蹙時事艱其自淵源見聞中來者多憂深思逺忠義奮發懐赳赳干城之况其風聲氣習歌謡慷慨而有故家遺俗者㢤公諱文鼎字仲徳姓田氏其先世京兆醴泉縣人曽祖俊正隆初董升宫役因家太康之侯陵祖秀徙居蒙城遂占籍焉祖用御史君貴贈上輕車都尉雁門郡開國伯妣君氏贈雁門郡君父芝貞祐二年進士第官至嘉議大夫鎮南軍節度副使資雅重有相望妣楊氏雁門郡君公生而爽朗稚時已軒露頭角棖觸物論為竒童嘗問學燕山張公一見即以不羈許之為人有膂力善挽强汴京受兵得請於香林先生應募自効執政以公書生年少初不之意及觀其拳勇試以方畧詢之宛如宿將射敵慮無策遺以勞授武節將軍西南面元帥府總領仍佩金符以寵異之京師饑遣公將五百人取封丘麥既還去城逺倐千騎來襲衆欲鳥獸散公曉之曰彼騎我歩若前遮後蹂逃將安之即分為二隊相去各里許結陣而待戈矢外翼負者居中轉戰轉退手先作氣敵叵測不敢追比至城下不亡斗麥一卒執政才其為命監鄭門前後出活飢民甚衆汴梁下縱民四出護二親北渡時同發者數百家奉親外救死問疾徃來保庇不少倦如渾源劉祁母洎祖母病死半塗二子相顧號泣而莫之何公為死瘞生負兩皆得所其處患難中自捄不暇能急人之急如此何義烈哉遂來居相下以養親讀書為事淅米負薪日供所需以盡子職既而應亷訪劉汝翼辟為幕察官時朝廷逺駐龍朔凡上計三徃返事集而無難色嵗壬子輔國賢王定封彰徳為分地擢用賢雋特授公為本道課税所經歴時持政者多不法公諌止不從即投劾去後果敗中統初又為叅政商挺辟署河東行臺幕屬無幾罷歸公少負氣挺節持論髙料事明義之所在勇于必為自視以為一世竒士幅巾藜杖掉頭吟諷不知去古為逺邇惟其學髙六藝名重一時邦君時相争以禮幣招致尚期有可為而為之者然以天性太剛又不屑取媚於時故其抱負治具竟不百一試晚節與西巖張豸緱山杜瑛以詩酒自娛不復談經世事矣臨終語其子復曰士之出處莫非義命道行志通伊周不為之泰道窮志湮顔原不為之否從古迄今有才不遇窳死溝壑者豈獨予㢤是非所當戚戚於吾衷也蒙軒其自號云公善作詩工書學遒麗有楷法至於丈尺大字尤極精妙云癸酉春二月七日以疾終廣川客舍享年六十有三夫人慶陽李氏系出唐薛王前進士司農丞無黨女恭儉淑善母道光備教子孫有法白首一節安公之貧後公八年辛已嵗亦二月七日終於家夀六十有八生二子一女嫁士族子復傳家學有詩聲終河間漕司從事衍富文學通吏事由憲臺史轉補中書掾今為禮曹主事庻克光紹遺緒云孫六人曰伯耕曰叔耘叔耨叔耜曰重曰某衍將以年月日舉公柩葬彰南新阡再拜來請銘惲雖後進嘗獲拜履綦知公為頗詳既序其行已敢以生平底藴未克展盡為士論所痛惜者銘之銘曰士貴尚志趨事赴功况作而行之迺士夫之所崇矯矯田公繄時之雄振靈修之逺駕思從事而匪躬文章足潤身之具才武是將領之風桓桓英挺明夫戰攻解臨機而制變張國威於小戎奔走急難笑談折衛朔漠三徃冀羣一空顧曷職而弗辦曽漕計之是供政不我俾坐困簿叢寜窘澗阿肯與彼同利器百而不一試在先生為不逢道義蟠胷伊周是宗既得喪之不我與吾何為而戚乎衷有軒曰蒙獨善固窮閉户讀書飲水長終人邪天邪問大鈞而無從惟子孫之可卜見徳澤之所鍾繄臺閣之就列蔚珪璋之顒顒洹流毖北太行之東雖髙深兮易位尚知為蒙軒先生之封故正議大夫前御史中丞一王公墓誌銘并序至元二十六年二月丙辰辰刻正議大夫御史中丞横海王君以疾卒於私第正寢斂有七日其子庸彛輩衰服纍然持事狀百拜以壙銘來懇以義以分有不得辭者公諱復字子初初名趾麟伯其字曽祖瑜大父松世家滄州俱隱徳不仕禰府君諱昌齡金季嘗逰宦河南大梁亡起從恒山史侯叅議軍府事後以公命來攝衛州事有惠化於民惟君器識早為經畧公所知已未冬自齊絰中起君襲父職仍領州務明年中統建元真授衛輝二府同知又明年由州而路就陞贰總尹君遵守成憲越先正有光至元甲子轉官制行授朝請大夫改倅彰徳路無幾以徳望入為中書兩司郎中調議宻勿宰相至以佳士上聞魏河朔鉅鎮吏重而俗囂號難理特輟君以少尹來治迺曰清心不如省事省事莫若先殺吏權於是汰冗濫屏姦惡絶私謁尚徳化民有李氏者珥筆搆黨持短長嚇官府張甚君發其姦杖踣之萬喙稱快自是合郡向風書葉翻香曹務為清簡八年辛未春自中書舍人出知歸徳府府居河下流其秋水大至環城為海衆胥沉為慼君乃督櫂師浮舟楫濟民於丘陵林木上遂相水衝循横堤疏二渠一注汳瀆一達河故道水隨退得腴田萬頃佃貧民仍請廩粟得萬五千石活飢殍者既而復揵治囘龍堤葛邑壩於府西以絶永患曰烏可使吾民重漬於泉故水去而民益親繼丁母夫人憂去職未朞詔起君充河南道宣慰副使國家方有事襄漢順流以成破竹之勢故軍需百色羽書交督急於星火一責於我中間籌辦君力為不少時大軍復東掀五河戰力而餽乏河走陵蔽川不易轉致衆艱於行君毅然以漕事自任至撞氷東下一夕凍歘解軍威藉以振衆且服君事不辭難而害不苟避有如此者明年超擢陜西四川道提刑按察使尋進拜嘉議大夫行臺御史中丞用膺才選既署事有告蘇州應草竊以城叛者或議調急兵徑討公曰維揚去呉纔三百里不當猝有此變恐憸人流言激之閧乗間以利賄耳與省議合遂駐兵迎郊偵其實繼發未晚已而果如料呉人得無虞而妥其臨大事處置明審例如此淮甸沃壤千里公於上前論奏宜設農司募游食者開耕屯以盡遺利若爾非惟實内地且威剔遐陬坐銷外侮韙其議付有司施行俄加正議大夫徙按河東山西道以事免歸居三年竟以疾縛之遂至於斯哀㢤享年六十有四前後寵錫凡十有一命官極通貴哀榮終始不為未遇以是月壬申葬汲縣親仁卿王尚里襧塋三昭首穴夫人𤓰爾佳氏前公卒再娶夫人秦氏生二子曰彛曰範範前公九月暴卒二女長歸徒單衍亡次適趙常白夫人杜氏生子曰庸曰子度二子並愿而有文學皆公所自教云曰女夀適陳氏皆先亡孫二人曰青牛範之子一在褓公為人器量𢎞深有經史學善持論識變通無贅言居養甚重周防甚謹及開物成務當其可為推致所學惟恐不臻於極然事無巨細率以大體中持恥近效取譽所謂以道事君者近之至威儀柔嘉小心式訓又類夫仲山甫衛武公之行已承旨鹿庵王公人品清峻慎許可嘗有詔詔公舉可執政者廼以君名進奏其經濟徳業可知已初官河東時憲府争索隐幣以副上需分司者不計應否悉掩為已功弊久恬不為怪至是公以前行沒入十萬餘緡盡給之民又平陽府胥有以母喪甫窆輒從吉執役者公曰忘孝之人胡可與處廼按而斥之其惜體正俗又如是可書者尚多惟著其擊夫事之重者恐亦公之志也歟銘曰大學為道將何為俾明一徳新民彛行焉而底善是依要本平治先修齊俾明厥體用或違其在孔學非吾知倬㢤王公天秉岐自稚細行初不遺若考翼事子肯基一日雲厦看巍巍敭歴中外厚自持柔嘉維則非公誰又復當用行不疑翰音登天翅屢垂越若有物中縶維從心罔單體非羸期于俯仰無忸怩人或咨惜我獨熈以道事君其庻幾六十四載麟儀儀綬何若兮印何纍賁夫松檟餘光輝天其或靳將後貽俾為清廟璧與圭奉之天門光陸離仙山東麓朝氣霏佳城鬱鬱君所歸殁而從襧為受釐足慰下泉含笑嘻零落不必西州悲我銘昭昭惟昧詒秋澗集卷四十九欽定四庫全書秋澗集卷五十元王惲撰碑
