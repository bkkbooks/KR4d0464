front:
  text: 蒲大夫文大元國至元十八年嵗次辛巳三月丁酉朔十有九日乙卯朝列大夫燕南河北道提刑按察副使謹遣從事賈汝霖以清酌庶羞之奠致祭于河内公之靈惟公德挺羣哲獄清片辭列髙弟于聖門揚仁風於蒲邑三善之美庸能既耶適星垣有分按之行過神宇致一杯之奠庶祈靈貺以益不能尚享
  hash: sha256:a154e7463bed03807f4c643ba64102b199e30a50b692f022249e8766f13a026c
