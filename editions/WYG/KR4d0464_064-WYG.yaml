body:
  text: 祭孝感聖姑文惟神肇迹博靈遇仙滆浦柔懿昭靈作蠶聖母干祀永頼神功斯溥食弗再則飢衣弗製則窶念此嵗事惟神其恵顧之尚享故江漢大都督河間路縂管兼府尹史公祭文幽霫萃氣招摇耀芒合是二者篤生忠良惟公應運挺出起家朔方奮父兄之餘烈荷天衢而鷹揚武濟文經為旹棟梁宿一軍於陽夏號東南之精强枳棘非所移旌鎮襄撫我瘡痏靖我邊疆其恵春雨其威秋霜掇我殘棄變而金湯復我陂障積而陵岡孰慮鱗介易我衣裳彼氣日索我師堂堂果上鈞之一載掃敗葉於秋商毎出竒而制勝初不知古人之所長殆羊傅之乆駐控上流於荆襄雖飛渡之無及呉之所以亡者本由此而用張能回百戰之餘勇效政蹟之章章鬱公堂之佳樹至今三鎮指為公之甘棠然干將而補履終所用而失常如憂深而思逺此夙夜之所以皇皇也竟風悲於大樹奄龍劒於幽藏嗚呼才有餘而用不悉位雖髙而志靡償曽桃李不言而天下為之傷也公常幕余二年倘徉促膝言笑執手飲觴略吏事而不肅謂國士之或當茲奉恩綸按部滹陽望龍驤之塋域能我涕之弗滂寫平生於此辭庸表公之衷腸噫慟臨江之哭在公則萬事已矣有子孝繼以後則其流未央神之聴之庶少慰其所望也尚享祭郝奉使墓文大元國至元十七年嵗在庚辰二月十有二日甲申朝列大夫燕南河北道提刑按察副使友生王惲謹以清酌之奠致祭于故翰林學士國信太史陵川郝公之墓嗚呼甲寅之冬仲月之尾公自杞来道出鄘邶始覿清揚重於夙契把酒論交笑談㳺藝顧睞回翔吾子可誨臨别之時一何勉慰維中元春雲龍交際我時㳺梁與公再㑹東館相遇四并同醉所學所行盡發其秘北次龍罔嘔血而癘書来及予愈見友義我車北轅公也南逝自茲及薨凡十六嵗追憶平生澘焉出涕公之問學閎肆汪濊公之文章豹炳虎蔚萬斛淵泉出不擇地太史與倫皇墳可嫓浩浩江漢萬古不廢藴為忠貞見諸行事著書垂聲諒非本意匪予得私乃世公議今我想公令人短氣斯文綫如忍復殄瘁直筆疇歸大册孰畀偉績鴻休光潜揚厲而最傷公為國出使初館儀真主成和計奉持國書以死自誓方介外侮羣狵内猘節落瘴烟精誠益勵属國平原同歸一致長星墜芒使軺還轡玉上青蠅何啻一二惟皇聖明見萬里外録勞弃瑕予豈汝罪士無賢否入朝見忌膚愬再行與病交劇一僨不起萬事瓦弃感時懐人憂来拊髀昔賢有言當論我輩大槩無差節目或滯如公之才如公之志雲夢九吞曽弗芥蔕俯掇勲名髙視一世意廣思長反為物制豈惟公傷因以自識茫茫大鈞形流萬彚幾世幾年生此偉器贄用德宗誼逄漢帝百未一施胡奪之易雞水淪光郎山斂翠隠然一丘保之西遂車過腹痛我懐曷既黄鳥聲悲助我歔欷臨風拜公哭而載酹嗚呼哀哉孤忠伊鬱幽憂憔悴生罔能伸死而永閟寓哀斯文庶昭枉昧公如有靈恐予言為知己也尚享祭武强南龍池神文維神威洞淵府奮飛天衢致雨興雲執帝之樞顧此冀野時極焦枯桑半捲而蟲作祟穀出壠而氣未蘇農官至無可而勸窮民將失所需匪惟吏責恐亦神之所當虞也况蒼精昏見適時之雩望靈池而致禱庶少全其區區嗚呼上帝命汝以下衛民居也我當供厥職耳免吏責而嵗有成兢惕之念其敢後諸尚享北嶽祈雪文冀之為分方數千里惟嶽峻極于天神奠安之水旱疾癘神主宰之今者地不藏陽寒氣失序嵗律向終未霑冬澤俾野土不膏宿麥無望春疫将興已足深慮饑饉荐至民何以生祈穀請命憂人之憂是亦部刺史之責也縷縷微誠敢用昭告尚享祭侍講學士竇公文惟公性極肫誠道深養浩幼學壯行出人意表於周吉士在漢有道以術濟人方德則小丁巳春識公於沙麓之墟辛巳夏弔公於肥縣之保憶忝列於瀛洲閱嵗華者再杪世知公漢家之羽翼我以為中朝之元老謀方膺於理咨憂遽遺於丘禱今也云亡士林悴槁据憖遺而論斯民有無禄之歎以順受而言得五福終命之考再拜墳阿奠酹草草顧藥籠之纎微葢以答平日之不我少也尚享丞相史公明忌日祭文十六年十二月十九日按部中山府維公出入將相存殁哀榮公自去世于今幾齡定人思公雖殁猶生永言不忘曰忠曰貞見之範圍履也大成勛藏盟府德為世程赫赫堂堂如山不傾定人那知功被齊民惲向侍燕几謦咳親承今遇明忌来拜神庭感念在昔依依我情有樂陳列有酤在罌碧草映堦酹兹一觥尚享定人像公於西北隅皆享祀謂忠孝公史公祭文惟公德冠羣后望隆漢儀一節四朝知無不為收武定文綏之畧有金聲玉振之規發至仁於易簀識大運之盈虧何已私之曽及顓戒殺而為嬉雖羊祜知吴亡而勸進房喬以征遼而未宜固足與之等夷也嗚呼柱石巍巍歘然中微風雨震凌帡幪者誰俾為善者㗳然而若喪變怪者百出而不疑此又世之歔欷而含愴也公殿是邦尤極恩威峩豐碑於國門宜鎮人之涕洟切嘗荷公左提右攜豈孺子之可教在卵而翼之之恩大有濟於艱危及聞公薨身縶情馳曠一奠而如負葢五年于茲也今我何幸改畀燕陲歴河山之故封悵音容之依稀念公平生其能已而公雖亡兮為世蓍龜公爽在天尚克念之葢生而矜其愚曽有以省録豈殁而知其来復漫無所維持也追盛德而曷報庶不辱我公之所知尚享岱岳祠禱雨文嵓嵓岱宗雷雨宅兮艮震對代生物仁兮片雲膚合天下澤兮茲者春霜例灾桑柘空兮二麥含實勒将槁兮秋雖下種不出土兮無褐無糗嵗何卒兮衣被饜飫膚合力兮仰惟岳神其念茲兮憂民之憂而亦部刺史公之責兮縷縷微誠神其鑒兮尚享黄石公祠乞靈文惟公鍾秀崇丘降神圯上靈氣驚世惝怳莫詰如子房以韓亡之餘開炎漢之業為帝師之崇其顯授隂翼竟濟世美者先生之神之功也不肖猥叨時名艾服官事餘廿年每以昧於事機動成乖戾為愧然非其材而樂之者有賢父兄故也矧先生之明靈乎至若矜其愚昧濯其固陋増益其所不能非先生其誰用是乞靈祠下區區之懐神其鑒茲尚享修治新阡告成文餬口四方幾二十載嵗時拜掃禮有不逮水泛雷轟未免惶駴於其事亡不孝之大即此良月躬為修治芟蕪翦棘増髙夷圯補植林空再釐風水郭以周垣隆阿四起樹門神㳺題阡表氏掲䖍妥靈非直觀美功今有僝以告以祀神之聽之以克永世尚享韓君大祥祭文嗚呼王宗韓氏通家往来三十年間情好孔懐矧惟亡友吾門上第貞幹風生發强剛毅其在諸生先子所器年近而立敭歴中外臺掾郎曹名聲噦噦前嵗之秋告别何遽曽未越境夢隨川逝日月云邁奄復祥祭論其受年校夫禀氣老而益强期頥可致衆維䀌傷去之太蚤古云五十不為之夭宛彼二雛卓有所樹翺翔仕途儘持門户依依孝思以永終譽君如有靈亦足以慰夫懐之素也尚享為姓氏告亡妻文維丁亥嵗六月十八日丁丑夫惲謹以茶果之奠告于夫人之靈推之為姓世不多有故嘗詢其所從出為汝討論者有年一無所見適讀潜夫氏姓論曰推氏建氏南氏舒堅氏魯陽氏黒肱氏皆出楚之芊姓者先君熊繹氏之裔其来光且逺矣嗚呼夫人殁而有靈亦将歆慰其光且逺者用是不敢不告尚享中丞王公祭文大元國至元二十六年嵗在己丑二月辛亥朔越八日戊午友生王惲謹以清酌之奠昭告于正議大夫中丞王兄之靈嗚呼朋友之重義列天倫切切偲偲疇非弟昆惟君顧我而我宗君以志則一以分則親如漆斯固如蘭斯馨而敬而愛乆而益新爰自垂髫以及於冠受業蘇門各伸志願智愚雖殊道則一貫君衷淵塞浩無涯岸脫畧辭華好謀能㫁嘗論士心酬酢萬變如匪中立鮮不棼亂此予少君餘何足筭我時念君大器已見敦我鄙薄激我愚懦治任将歸而予獨眷繼分使符有最無殿在昔相度有若昌黎辟佐戎幕大為已知及論國計莫之與規裴非少韓有崖其間隠忍就事材為實難穆穆忠武曰伊曰吕桃李盈門多士如雨同升諸公曰僎是與初疑中舎謂輕所處長屋六曹是為之所自後騰揚又知所主曰史曰張曰姚曰許交口薦揄螭蟠鳳翥望君廟堂致君堯禹其經綸國業固足以見君之器宇彼或無知奚我齟齬淮海歸來道在心小角巾私第日事墳討周防有餘蛇虺結繳讒火燒城甚於原燎伊鬱積中不無熱惱嘗切諗予憂世心悄覯閔何多受侮不少每見慰寬外物一掃擴量沖融致養强矯死非所憚此何足擾如金在鎔百鍊不撓白首窮塗亦足枯槁留使咨謀為世儀表此天下之公論非一已之私禱云何不淑不憖遺此一老吾乃知蒼蒼報施於焉有未曉者念君問學天人理皦臨終永訣投我腹稾語何琅琅秋空日杲淚洒行間茂陵遺草哀哀二子越玉陳寳賢而有文遹追来孝所存者長况不為夭鍾鼎一事古人誰了嗚呼事至葢棺夫復何道尚精爽不昧而来者是保我奠兩楹腹痛如攪言念平生相期逺到苦樂行違知者惟鮑悠悠常情異心同貌老夫知音自深痛悼我過孰寡我履孰蹈有慟無聞徒辟而摽淚下河傾寄茲一抱嗚呼哀哉尚享路祭中丞王兄永訣文維君丰度凝逺内明而外閟以予交㳺之久頗髣髴其一二其所以斯疾而至於斯者而皆命之所致耶豈用有餘而嗇於行耶物或犯而隠不校耶欲求合而反得乖耶翦所愛而戕老懐耶不然何氣運衰謝叢一躬而菑耶方謗之興予適在燕嘗表裏乎西溪致一言於諸公之間力雖微而莫辯庶幾友義盡予心之拳拳用是生有以書慰之殁有以文誄之又罔以不敏復銘而賁之辭固斐然思罄亶無愧而已今者執紼徒送永隔泉路然古人神交罔間存殁臨岐贈言故不憚其再瀆伏惟明靈鑒茲微悃尚享御史中丞王公誄文大元至元廿五年嵗在戊子秋八月十有一日前禮部尚書御史中丞東魯王公薨於維揚之客舍友生王惲謹遣子某致奠以不腆之文誄焉其辭曰顯允王公天姿粹精文辭翰墨外彪中弸年甫弱冠四擅華聲從元問學館申作甥二公提撕大漬于成繼以賔師主善共城始拜公面歡如平生忘年定交實為畏兄青燈孔序絳帷趙廰尊酒文㑹桐隂滿庭既謁寥休偉其豪英力薦于上與之同升帝曰汝冕秉心和平乃眷乃顧詔扈南征潜鱗縱壑天衢何亨一命卿貳尋擢歴亭改漕京兆以亷見稱擢之提憲以顯以榮搴帷杖節激濁揚清移鎮三晉八州敉寜載臨恒衛兩河肅澄霜空千里一鶚獨横走參戎車峩冠振纓言議甚衎王事毎兢其臭斯蘭其堅斯金兩秩五年愈親愈誠訌賊俱息王度載貞整我六曹春官首徴再執行憲居中作丞守以大體與時浮沈西湖㶑碧呉岫空青公餘吟醉若慰羇情用是北歸伊誰云憎徜徉淮海子潜疾嬰俟其少間偕之北行豈其奄忽痛乖延陵剛弗愛克遂傷厥生疇昔之夢飲予兕觥予欲從之扞格莫能今悟死别神交匪冥今嵗夏仲手書是承寄是新作託之稱停豈意期月遘此凶屯初接傳聞既疑且詢繼来訃告大為震驚於戱已矣王兄殁而有靈鄙懐我聽以公夀言六十六秩未嘗疾痛體胖心逸以公宦業通貴之極三十年間略無空隙以公文章不事雕飾平易温雅簡而有式以公聞望揚休山立聲價一時荊金趙璧以公繼嗣怡怡蟄蟄翠竹髙梧鸞停鵠植所為福全百福無逆是用慰公能事可畢方之吾儕又有大弗克及者秉彛豐厚度量寛𢎞愷悌樂易碩大光明不以達貴我崇彼輕不以已長格物自矜心無城府口絶否臧孰為機張以虞以防坦為蕩蕩内敬外方汪汪黄陂撓之不渾嵓嵓髙山仰之彌尊天下之人不間識否聞君之名僉曰良友是喜是愛稱不容口我觀氣運有通有窒或負而乘君子冝息遺逸阨窮固足摧抑遽思飄蕩忽還穹碧是用䀌傷載悲載泣維此善人天地之紀幾世幾年生此偉器一朝云亡歎興殄瘁茫茫九原愛莫之起悠悠此懐曷維其已上以愾斯民之無禄下以惜平生之知己嗚呼哀哉尚享推氏卒哭祭文至元廿四年嵗次丁亥二月壬辰朔十七日戊申中議大夫王惲謹以𤣥酒庶羞之奠敢昭告于亡妻推氏之靈嗚呼禮嚴卒哭氣渝一時愾然興感悠悠我思去日漸逺神而明之爰仰道宫有求戚知哀薦成事用光其儀君子與孫衰衣纍纍心焉寸草恩則春暉伸哀報德泣涕交頥而於自致其殆庶幾惟靈降鑒以慰永悲嗚呼哀哉尚享祭三藏佛圗澄文惟師薄游襄國實開帝聰聞音知物變眩幽通非此無以回猛鷙而神事功我師真詮不亡在空来拜祠下辛嵗初冬酹觴乞靈徘徊呪龍庶一勺之達水澆至人之心胷也尚享祭宋文貞公墓至元十九年嵗次壬午五月己未朔十一日己巳謹以清酌之奠致祭于唐太尉文貞宋公墓下嗚呼惟岳降神生甫及申為周之楨如公之生於唐廼開元之治具也昔𤣥宗能逺而不忘一旦召而相之何其明邪及惑伶人一謔公終老于家何其昧哉豈天寳之亂於後有不容置大器於乆安故耶於戯徃者何咎國家方以親賢為急天或寵綏四方若公者復克降靈作甫與申免夫望隴思賢之歎此吕子所以再瞻隧道動曠世相感之意也區區之誠惟神其鑒之尚享授少中大夫福建閩海道提刑按察使告祖宗文己丑秋八月四日至元卄六年嵗次己丑八月丁未朔越四日庚戌孝孫惲敢昭告于王氏三代祖宗祖妣之靈惲不肖獲承祖宗遺訓以至今日又於此月初三日欽奉宣命進授少中大夫福建閩海道提刑按察使是皆祖宗奕葉德積之故越小子何能存殁光顯宜知所自特陳薄奠是用昭告尚享祭待制圗克坦衍文維至元廿六年嵗次己丑冬十月丁未朔十二日己未少中大夫福建閩海道提刑按察使王惲致奠于故待制徒單公之靈嗚呼禍與福善惡以應之變其常理有不復致詰者惟翰林侍講學士顒軒先生厥心孔嘉樂善修德及其立朝行道罔不傾悉晚嵗得子又復良碩學由家傳志乃早立先生云亡相與咨惜念渠零屏繼任翰職淹留京師豈造物者将有俟而補先生之不及一旦天奪松摧玉折云何不淑而臻此極睠若堂之三封悵遼海之不溢何一氣之衰謝逮子身而迹熄余愈知善惡之叵量蒼蒼之不可必也不然豈行焉忽諸致􅆏陶庭堅之不食吾不可而識也噫辭墳祝文伏以甌閩東南之極徼憲使外臺之正名受命以来夙夜祗懼有不遑寧處者於是月十七日卯刻與子公孺輩前赴任所伏惟明靈相其不逮以道䕶之尚享祭雙忠文至元卄六年嵗次己丑冬十月丁未朔二十六日壬申謹以清酌之奠敢昭告于唐臣中丞張公睢陽太守許公之靈惟神忠抗全節義摧賊鋒既障江淮載清河洛精爽在上其生炳如惲等適有事於維揚特乞回新眷顧惟朽質逺渉畏塗過覬之心㫁非敢萌不虞之變庶祈黙祐尚享祭淮水文惟神發源桐山横界楚甸德參四瀆潤涵百川惲恭奉綸恩逺臨殊域險阻炎蒸有所自惜者惟神鑒祐其安以濟是則神上有以欽承明命下有以教臣子之義也尚享亡妻推氏祭文遣奠祭文維至元廿三年嵗次丙戌冬十一月癸亥朔十有二日甲戌中議大夫前行臺行御史王惲謹以牲醪之奠致祭于夫人推氏之靈維君為婦克恭以母則式助我内治其宜其適四十三年廼猶一日眷我貧家勤亦之極惟是盡瘁遂臻于疾彌留八年屢值已棘孰祓其災稍復安息孟冬辛酉遽變容度孰褫其魄溘先朝露惟此喪制我實主之布冠齊衣我具舉之木美藏嚴恐速腐之美慰汝心汝其顧之我卜甲戌窆焉襲吉奉安汝柩皇姑之側升輴發引爰用控告汝宜勿憾我未為恔魂兮歸来些四荒不可以徃兮惟汝子孫是依是保黯黯精魂悁悁心目旬浹之間重有所祝日薄西山一語不復念之䀌傷又増悒鬱於戱零落山丘生存華屋自古皆然非汝之獨惟弗偕老天為之酷有淚如泉永注河曲嗚呼哀哉尚享過趙祭忠武史公祠文夫用物精多者英爽罔昧垂顧異常者死生不殊我丞相忠武史公以丘山之重顧草芥之微其生也卵而翼之其殁也寐而訓之茲者奉詔比上展拜新祠敢乞明靈増益不逮葢愚魯之性惟其素知於言動之間庶幾黙佑尚享秋澗集卷六十四欽定四庫全書秋澗集卷六十五元王惲撰辭
