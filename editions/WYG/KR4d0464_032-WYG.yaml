body:
  text: 詠早梅四首早梅香信臘前開竹外横斜暎野臺待㸔一林相慰藉約君同往肯前來松風亭下一樽開終日徘徊醉竹臺霑帯冷香歸去晚夜深猶傍枕邊來花開花謝催人老花木無心人自哀折得一枝香在手且分春色入城來梅花風韻不凡才氷雪方凝始見開任使和羮無翠實等閒斤斧不為災夢酒張鍊師道人尸解栢陰臺三尺瑶鐫卧緑苔昨夜月窓清底夢分明霑醉謝文來題劉總管宅御愛峰太湖清潤岱宗雄金宇宣和第一峰絶佀水晶宫裏㸔一堆寒碧玊玲瓏詠梅銅切塗黄㸃酪酥細薰婆律發温罏老夫鼻觀多知見不用燈前問玉奴一脈陽和擅獨根滿枝金蕾鎖春温惜花人老情縁在翦斷春風倩女魂尚愛梅君佀細君題詩重過去年門經年不見春風面為恐啼痕似蠟痕梅花開在百花前苦節貞心只自憐縱使孤根有餘暖玊顔于世為誰妍為愛梅花徹骨清冷香能幾謾含情春風果有和羮用未害肝腸似廣平江路吟㸔發興長西湖浮動月昏黄冷香本是幽人供枉自疎籬比玉堂日日雙瓶換水温為憐幽谷似佳人夜來紙帳青燈夢繞遍羅浮樹下春蠟削肌膚玉作顔淡粧終不入時㸔苦吟正有西湖老凍繞枯枝賞嵗寒芳叢百繞問花開夢在仙人萼緑臺為報主人多置酒臘前冬後約重來我識西湖處士心一生梅竹是知音誰知二百餘年後又見諸孫鶴在陰偶題記參政飛卿語睡起東齋日上牕醉扶頭罷炷爐香佀勝東華相里闕夢繞鐘聲入省堂曲山見示古雪詩云盡道豐年瑞豐年瑞若何長安有貧者為瑞不冝多西山反其意又和瑞尤多一絶云人言盡道豐年瑞其奈無衣貧者何曷若方春發生際不愆時雨瑞尤多予細思之古詩雖如此佀不若少陵無食思樂土無衣思南州哀而不怨也因繼韻為解嘲云暑雨祁寒俱致怨無私造化待如何呈祥剛道豐年雪却恐吾儕怨更多題竹林七賢詩并序竹林七賢觀今為長春别館昔誠明張真人嘗集諸公題詠欲刋置祠下迨至元辛卯鍊師劉文甫始遵命以紹宿志求詩于予且誌其刻名本末用題於石凡得詩若干首始于王文康公終之鄙作非敢先後之盖因其所書之次第焉使後之觀者詠詞懷舊得信高風絶塵之想云秋澗序漠漠筠林指舊栖幾年於此避危機奇才最惜􅄞中散空聽鸞音月下歸談𤣥髙出萬物表七子風流有典刑三十年間凡五過塵容慚愧草堂靈竹林髙卧世稱賢隱放看來未中權千古歸潛書法在一迴來讀一翛然作者當年亦七人粗聞名姓孰能親山王首作彈冠舉却恐筠林是要津嵇中散識短材長蓄禍機放懷獨惜養生嵇後人莫坐談𤣥罪秋水篇中物物齊粉飾青黄乃木災當年中散固奇才髙風不逐鸞音去柳下奚為打鍛來阮步兵口腹無嫌乞步兵蝨藏裩絮又堪憎浪為廣武山頭嘆尺鷃何能况大鵬王司徒兩簏收來蔽以身不應顔面愧佳賔燈前手執牙籌算枉對河山説隱淪山吏部從來吏選苦紛紜過眼羣材得所甄若論雅懷闗得喪山公於晉是能臣劉參軍荷鍤隨埋見性真等閒談笑解時嗔竹林七子多沉酗醉裏乾坤獨可人向散騎心醉𤣥談外此形自知中有未忘情異時未達堯心對枉泥南華與理争阮始平禮法疎來萬事沉琴心鐘律是知音聖門論樂中和止不佀吾威到樂淫題范文正公真像岳記梁碑冠古今當時文筆見忠忱細思後樂先憂説士子今誰抱此心題長沙醉草圖萬有龍蛇落筆端滿堂風雨夜深寒書家最是通神處疊指懸鋒不作難堂堂萬里長沙陣曽與張顔角長雄信道書家同一法提鋒應解入神功又題謝東山江東全倚謝家安雅量形容對弈閒勝負胷中前定了風聲何賴八公山題家藏顧虎頭畫謝安曳杖圖一枰初散竹間碁杖屐歸來喜可知欲見虎頭無畫意㨗音讀罷到門時獅猫何年變體自條支錦爛修毛見兩耏夢裏䑕山京觀了午欄花影淡離離和苦齋見寄嚴韻不才自分賦閒居薄有山田與敝廬鄭重漢庭楊得意薦賢心也到相如兩首詩來以動言徴車早晚出山門苦齋刋落紛華盡獨有忠君一念存病裏行藏未易言夢中待詔望君門囘頭碌碌因人去自笑張儀舌謾存題日者壁三尺神鈴手内提㸔來萬命幾曽齊百錢餬却談天口一片風簾日未西乾坤一氣本中和其奈人情六鑿何帝道已還皆末刼不須苦泥貴人多當年卜隱不明誰四相行藏見側微從此閉門終寂寞老天似厭太知機星槎逺泛斗牛杓萬里歸來齒髪凋碌碌又教攀附去不知何有補清朝鍛鍊五行分造化斟量四柱别公卿百錢贏得生涯了一片風簾任晦明喜彦祥生還故里千里西還已五年枝巢雖在不勝寒半生歴試何清慎依舊春風苜蓿槃寄苦齋老友今年一病到龍鍾遲速前驅有不同健羨苦齋攀附意秋風雙翮欲摩空題何鍊師又𤣥堂大道難名説又𤣥取為堂扁示蹄筌函闗紫氣經臺月又見先生一再傳題眼科杜金山卷白日青天墮晦冥百年未滿若為生金鑱一刮神光爛此藝争傳杜氏精心火燔空水下濡外腴中涸已堪吁雙眸眊眊青燈底忍更㸔書似老奴自戒過王化店王化岡頭四望開西山吹盡凍雲埋東風借暖憐衰老滿馬晴暉曝背鮐羣鼠盗茄圖食飽官倉到落蘇嗜甘不計首深濡丹青似見公儀意紅女園蔬戒併圖題閑閑種德堂記後轉折掉躧軒豁頓挫態度不同乃猶人面要能自成一家為貴予於公書亦然闕香色臭味而荔實為美推類至極須以江瑶為比者豈易牙雋永而當然之理固如是乎斯文斯翰兩翩翩與試稱名孰可肩一贊吕温真傑作更開生面到凌烟倦書圖書貴凝思在筆前欲揮還止想翩翩畫師若作行雲了妙興天機兩索然題洛神賦畫後凄斷西陵松栢聲將身自試謾為情陳王正是無聊賴流眄川妃欲目成屈原卜居圖用舎行藏聖有餘却從詹尹卜攸居乾坤許大無容處正在先生見道疎山林長往眇難攀死不㤀君世所難邂逅去從詹尹卜八方歴過果何安遂初亭韋杜城南尺五天眼中朝市有林泉不須苦泥興公説絲竹何妨解倒懸厭喧思寂尋常事以隱為髙拙宦人出處似君應不爾西池東閣見經綸山林長往懷髙致冨貴逼人將奈何閒向遂初亭上坐一樽髙詠採芝歌宋太祖蹴踘圖凡六人對蹴者趙普傍㸔者太宗八王一道士與從者一人劉向别録蹴踘黄帝所作或曰起戰國時蹴踘兵勢也所以練武士知有才也榻邊咫尺夢金陵欲下河東勢未能畫史意傳當日事丹青圖上見軍興婉孌龍姿五客隨内庭深處共遊嬉筆端欲見無窮意一㸃香塵欲起時太平朝野日歡娱肯效三郎和碧梧治定不應忘武備花間蹋鞠是雄圖倦書圖六朝人愛倦書圖唐閆令喜而臨之妙在約畧濃淡之間玊堂昨夜醉厭厭格筆傭書見未忺似待指端餘力散卧㸔花影轉疎簾筆陣堂堂到倦書紫蕉欹暖錦氍毹細㸔三子從容處當日安知不有吾二美人圖錢選筆春醉瓊枝意未諧行雲空鎖望仙臺九重不隔簫聲㫁喚得長空赤鳯來右趙飛燕璧月瓊枝醉舞裀泠泠蘭舌半詞臣國亡只咎傾城色滿眼胭脂井底春右張麗華固陵雪鴣圖取鑒前王有覆車三韓風色儘愁予長江飲馬年年事筆底寒禽辨得無韓文公重屏圖熈載南朝亦宰臣後來狂放欲全身比教乞食歌姬院坐閲棋枰佀可人名教之中樂有餘底須棊槊可歡娱晦翁微貶文昌意正為先生不著書張麗華手擎白鸚鵡自調雲間三閣綺成霞閣上仙人萼緑華蘭舌不應詞客巧自調鸚羽按庭花西施西施為物一何尤吳已荒亡越可憂一枕勾王春殿夢抱氷寒苦變温柔孤舟横笛王晉卿筆秋風葉下洞庭波横吹歸時逸興多筆底分明詩外意武昌南岸老人歌淵明漉酒圖趙子昻筆牀頭釀香奚待壓脱巾漉酒良愜人興來酣適無不可過論總非公所真雪舟夜話劉文甫藏大定明昌五十年當時文物蔚中天雪篷夜話無多味黨蔡風流墮眼前跋張真人雙頭蓮手卷嫣然池面出雙蕖花本無心道自如若與主人論逺近闕香當闕愛蓮書有虞鼓琴趙霖筆逑匹誰如帝子崇和鳴還與五絃同異時愠解吾民阜本自君王正始功送張鵬飛同知兩浙漕事張侯又見走踆踆雲海相望四十春記取都城相别處細炊香飯煑金鱗送司毅夫之任共城皂盖東歸五馬榮太行南下是共城春林布穀應饒舌剰著青衫竹馬迎司君才調號能官駿足終陪十二閑天意似教優此任政成坐嘯㸔青山中州佳麗百山門太守風流兩漢循細酌百泉亭上酒政煩留意鑄斯民題姬義士卷後掩瘞無歸責己任凱風吹棘遂初心絶交端為西華發較似劉標義更深題紀伯新詹判如溪詩意通人無滯與溪友坎止流行到兩忘羨殺胸中瀟洒意一横烟景夢滄浪源源不絶産蛟鼉若論潛玲一勺多莫惜玊瓶沙上酒醉來閒聽濯纓歌題麻姑壇記後麻姑來㑹蔡經家麟脯珍盤間異花海上仙人多狡獪半盂白粲走丹砂黄初平牧羊圖金華春草碧凄迷牧到亡羊事可疑風袖一揮岩石起道人還有此神竒題泰和名臣碑後金源肇跡海東隅奄有綿區亦壯圖最是泰和嘉靖日朝廷綱紀盡文儒為當時自宰相至掾吏全用進士云癸巳嵗二月六日自得仁甫西歸和李樂齋詩行宫朝散馬騑騑喜動都城白板扉鄭重小桃深有意留花不發待予歸題姜詩躍鯉圖舎邊泉出躍雙魚感自龎姬孝有餘畫史載容非小補丹青渾是蔚宗書清泉故里兩無蹤坡老詩成竹樹風展放畫圖増永嘅丹青于世不無功後二句取唐張彦逺畫記序畫者掛也以彩色掛物象也故鼎鐘刻則識魑魅而知神姦旗章明則昭軌度而備國制以忠以孝盡在於雲臺有烈有勲皆登于麟閣紀傳所以敘其事不能載其容賦頌有以詠其美不能備其象圖畫之制所以兼之也陸士衡云丹青之興比雅頌之述作宣物莫大于言存形莫善于畫此之謂也清明日南城訪友客裏清明散滯懐也隨游子出城來東風佀惜春光爛栁眼雖青細細開題嚴子陵還山圖借其意而反之癸巳夏㕔除間作冨春不起最為賢星彩空輝帝座寒縱便放還江上去已應慚見釣魚壇跋徽宗退朝圖唐虞道統不知傳師事林靈信妄言三十六宫春寂寞玊清雲上夢朝元漫説烟空有九霄朝元仙路碧迢迢轉頭風雪韓州地方悟簪裳是服妖水車圖人定真能力勝天一車翻水溉髙田漢陰機在終無力長憶郊居值旱年題實魯公奉使江左圖闕照江東馬首雙旌反見公三十年來和議定闕當代不無功和戰當年楚已空一丘衰草葬南􅅠卷中題詠真名筆褒羡人言是景鐘孫登長嘯圖先生可想不可見秋月千山白鹿臺吹作半空鸞鳳應公和真是不凡材闕意不妨𤣥髪散麒麟不幸遭逢晉魏間先生出處兩為難才長識寡嵇中散只待明言覺膽寒秋江待渡圖兩崖鐵峽束蒼江風浪無時一葦航險阻備嘗無太穩臨流將渡復囘徨秋江極望圖乾坤清氣滿詩脾望入霜空思未迷誰著畫工横截斷一行秋影雁飛低韓生冩真圖後韓郎落筆凌烟面嘉老摛文造物權名下自來無妄譽伯時多為九歌傳乙亥夏重午日偶得一扇畫與吾鄉龍頭谷形勝相似因書一絶于上太行西北是龍門便面圖㸔爽客魂千尺緑蘿飛瀑布浩歌還憶醉䨟樽定羌李氏昆季三人係李遊仙之裔同歸三教走筆為賦徳積繇來慶自餘三英同秀定羌家從今沮汝汾西曲三教堂中㸔棣華大定明昌五十年一時文物說游仙料應書案山前月更覺秋空皓彩圓史院即事聖德神功浩有餘竹書何趐十三車近觀養士闕開局而來已六旬倉皇曽不計殘身一朝汗簡闕有敢説兼修為乏人宋徽宗石榴圖安石赤榴自漢來十年西域武皇開冩生若論丹青妙金馬門前待詔才顯宗墨竹筆藝初非羨顯宗承華主鬯兩從容天教二十年陰賜䕶養風雷見籜龍午窓畨盡顯皇書問寢龍樓孝有餘夢到承華欄檻底露梢烟葉儘扶疎題冀州趙節孝侍祖母韓詩卷眼前諸子芝蘭秀堂上慈親九十儀若取陳情論樂養趙生心事勝犍為五福君家有自開閨門全是孝慈來異時旌表膽榮觀髙似陳思燕處臺野春亭為劉仲文賦出仕清朝接俊游閉門閒處更風流君㸔緑野堂中客未必心安勝素侯春滿青林花滿烟風光深鎖市㕓間都城何限豪家樂輸與劉郎未老閒鶴閒無意上揚州果熟能勝萬户侯近日治家尤有法課兒書誦五更頭韋杜城南尺五天千金不惜買林泉左山信手拈春出一片浮光鎖翠烟憶昔過門得故人示予亭記思清新白頭青竹題詩客一笑揮毫到野春沙頭乾盡玊瓶雙香冷牙籌刮錦囊長日閒庭有忙事青衫時課讀書郎四皓圖尺一招來四老翁冥㝠髙興振孤風少微不是閒人像調䕶前星最有功人慾横流不易攻留侯真是帝師雄笑將二老歸周意翻作商顔羽翼翁夜壑藏舟未厭深皎然松雪映髙林閒雲終作從龍雨唯有留侯識此心蕭然亭澄淵横壑東坡語窓竹驚秋太白辭解使六塵能此净不煩華構與新詩坡仙信筆張園記冩盡豪家隱仕情出處兩間無不可最憐婪入使商名遂州張氏出家資修建學舎僧鎮公來索詩因題其後三闗控接阨邊塵四十年來草棘眷不為兩庠燈火事孜孜求義到斯人太白獨酌圖九重春色醉仙桃何佀江山照賜袍千丈氣豪天不管青山磯上月輪髙李太初元齋時為濮陽主簿一氣中含萬善根夫何為善即吾仁不煩力剖藩籬破已覺軒中浩浩春魏提學授闕路膠水令菁莪樂育為求賢十載京華柄學權今日一官滄海去春風千室聽鳴絃贈相士梅心長嗟躍冶不祥金忽漫求名竟陸沉萬事不如方寸好愛渠開口便論心贈相士秋巖乾坤清氣滿秋岩顧我行藏試一談早晚得歸林下去北山重掃讀書龕跋單檢校吉甫所藏江孝卿手書真草二帖徴君諱紱曹南人我初不識檢校面見此可嘉平昔心光景片時争屬目獨憐遺翰是知音有客臨風惜壯圖不從竒耦計榮枯因卿憶起江君事閒氣銷來一㸃無讀韓文外集韓子為書有正傳精詳無出穆修編不應集外生浮誕三簡誣公夢大顛瑞鶴詩方平家近鬰蕭臺視履推祥有自開拈出扈山交感説胎仙非止異香來龍虎堂甲午秋九月廿八日迎謁自懷來四過其下玊華行殿拂明開北狩南廵此往迴長憶先皇重遺老玊堂今嵗幾人來一作長憶先皇恩治切天顔喜動老臣來百靈拱䕶走風雷萬馬雲屯駐漢臺今日鼎成弓劒逺西風吹淚不勝哀觀光嚴森弓劒拱重圍蕩蕩髙空日月輝先帝老臣今有幾瞻依恒勅近天威三秋迎駕走居庸一道青山返照紅新店到都才九十坐車乗馬兩籠東抱闗休訝去翩翩霜滿征衣月滿鞍只為冕旒初未拜至今眠食未能安紅雲現處拜瑶亭皂盖歸時午夜行半醉喜乗歡勸酒居庸闗下聽雞聲噶布拉川在上都西北七百里外董侯承㫖扈從北迴遇於榆林酒間因及今秋大獮之盛書六絶以紀其事絡野籠山捲朔陲盡隨湯祝懾天威客卿莫詫長楊賦聽説今秋第一圍詩詠騶虞發五豵漢家圍合萬車同料應老上龍庭北谷静川空説儁功千里陰山騎四周休誇西伯渭濵游今年較獵饒常嵗一色天狼四十頭萬里宣威見令行君王耀徳豈觀兵我詩擬配岐陽鼓要與周宣作頌聲今年大獮殢林秋青兕黄羊以萬籌摇吻戍兒欣有語好雲從此到南樓今秋天餉住冬糧萬穴空來殺氣蒼渴飲馬酮飢食肉西風低草㸔牛羊隆福行宫詩裏山河瞻象服女中堯舜宋宣仁從今隆福宫闈月聖夀輝煌一萬春四海坤儀自正家垂簾休獨羨瑶華側聞聖善如先后在昔天皇有懿誇賤名猥被平章奏供奉詞林舊老臣細酌金罍宣勸出一年三荷寵光新題沙門宣公手卷後海藏龍宫鬰紫烟逢辰曽到赤烏年白髦千丈渠能制何俟韓書重大顛秋澗集卷三十二欽定四庫全書秋澗集卷三十三元王惲撰七言絶句野莊圖并序
