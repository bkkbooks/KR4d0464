body:
  text: 秋澗集卷十二元王惲撰五言律詩夀史開府開府羣公表山河間氣鍾飛翻同儷景婉孌獨從龍慶㑹千年運中原百戰功一門傳畫㦸列聖錫彤弓霖雨思賢久中朝注望隆詔居華衮地徳邁古人風學並征南癖心肩尚父忠翦䲔清碧海煉石補蒼穹脱畧三朝儁從容萬石恭都俞明治體風俗變時雍薦達多名士經綸極至公功成心轉小量廓孰非容柱石嘉謨壯朝廷睿眷崇何心貪寵數圖報罄丹衷降典維公共羣疑可適從欽承能致恤度作貴惟中漢紀三章約秋荼一掃空與時弼五教致主冠三宗夀席恩光老梅梢蠟蔕融翠梧雛鳳秀燕寢霧香濃毫彩知神相顔酡匪酒紅武公强不息羅結懿而聰袖手調伊鼎刋名溢景鐘耆英追洛㑹遐夀等喬松賤子何多幸凡金久在鎔寸誠芹擬獻五福日來藂徳潤餘燕桂簮纓滿漢宫一杯千嵗酒遐邇此心同夀徒單顒軒間氣無時歇先生嶽降申慶流椒室裔袖有鴨江春漢苑稱多士青雲早致身縱横蘇氏學英特賈生倫盛徳應如此文章固有神玉堂看步武滄海忽揚塵飄泊心逾壯歸來道日新因懷盤谷隱怡悦太行雲歘命竹林駕來陪楚醴賔詞源窮造化講席見經綸小子嗟何述先生樂育諄顧非清廟器時辱郢人斤既佩雕鐫厚長懷頌禱勤微誠方獻炙誕節遇兹辰酌以義泉水清泠勝飲醇贈以湘纍菊馨香如友人水澄性不撓菊老氣彌振道體同康謐窮途任屈伸年年華表底同拜白頭親送外弟韓茂卿北上外弟韓從愿奉檄轉補尚書部掾自梁過衛留三日而去臨行求言為訓因書是詩以贈華省開新制尚書右六曹官嚴程有限吏職最為勞受簡聨鳬行隨時覆契刀論量天下事承接眼中豪吾弟方强仕頭顱未二毛荷囊初佩服公務久薰陶未害居煩劇休辭任動慅一勤無不辦多慢豈難操所事先懷慎當官貴可逃古人淹典制多暇戒遊遨簿領雖山積身心樂戰鏖苦辛天不負聲實日能髙况汝韓宗盛從來衆士髦華纓彯繡弁象簡映青袍光禄何稠疊司空見贈褒非儒即政務致力釣溟鰲繼述無多闕公清善吏毫老夫雖潦倒聽汝鶴鳴臯春夜宴史右相宅勲閥汾陽業金貂漢相家陽春元有腳玉度瑩無瑕神駿推宛馬跳梁笑井蛙相逢成夜集暢飲厭流霞綺席圍聲妓銀筝合鳳琶晚妝添粉黛雜舞見渝巴爐暖融螺甲盤香供露芽透空敲雨杖促節摻漁撾侑食増陽盛紓懷發興賖舊聲今漸逺新體此無加樓轉三更月燈垂半夜花歌長縈曲調師猛奮須牙辭謝寧容退留連暫樂佳直須窮薄伎尤異是雄蹅登踏寒林判軒呈迓鼔丫侍筵更紀僕歸燭黯籠紗下客陪簮玉清吟擁鼻瓜嗣侯非自樂先業念無涯待士無疎宻籌邊静譟譁有時陳樂籍張宴為賔嘉此夕真儀鳳明朝等散鴉寵光需北闕春禴動南衙豈特調銀字重看拜白麻轉頭雖契濶後話足雄誇碧草傷淹賦清江弔屈沙别懷増惓惓獨雁謾啞啞霄漢嗟垂翼庭階愧倚葭情悠天共逺心在地無遐㑹作登樓客聊停泛斗槎朱門三十載未分鬢空華送表弟韓雲卿赴臺才幹稱吾弟名行邁友生煙霄須致力蘭署久留情練事言無訒臨機敵莫勍趨朝元有日去魯不無名榮映荷囊紫聲嚴柏府清外司歆簡潔内憲惜紛更輕重量時制銓除慮旦評責人無自恕乗勢可將迎息櫂非逾出覦情怨自平斯言當首議大體先居貞行已雖多轍開心罄赤誠諒能持衆美不必論前程自笑行藏拙潜看嵗月驚清時悲杜舎白璧愧虞卿遊宦幾三紀殘棋任一枰鐘鳴宜少息時戾尚何營塵委慚芻狗歌長振孺纓十年希豸觸一旦謾葵傾道在吾何慊憂深汝備明見渠由爾達著眼在兹行聰作章徒紊行難累匪輕南山與秋色依舊兩崢嶸謁武惠魯公林墓金馭成隂朽山東自古彊限田標鎮戍積憤致搶攘武惠當年傑天心霸業匡雲龍時際㑹風虎日翺翔五十連城重三千戰士良一朝歸版籍遺愛在耕桑甫定先文治來威戒伐張儉恭希大帛號令肅秋霜氣革耰鋤擾風還禮義鄉頌方歌魯盛人駴隕星鏜雲出青崖頂烏瞻泰岱傍驅車經鵲里故宅似汾陽山倚祁連冢祠荒緑野堂門旌虛將幄燕寢尚清香有客追疇昔懷人動慨慷王師初破汴河朔久淪綱文物隨雲散招徠不一亡盡收周禮樂重闢漢科塲清秩銓華省羣英萃郡庠有金皆冶器無玉不追章蓄徳需明主流波及四方星躔從落落奎彩獨煌煌嗣相圖光紹先猷在益彰雪山宜久重世業寖丕昌帝道開中統皇風煽八荒重推黄閣相輕是尚書郎兩署分荷橐千官列雁行至今稱濟濟所在見蹌蹌原治無多術推賢用叵量措材真得所收效儘非常侯國能如此朝家化更皇闡明雖實理勉勵乏明揚一代徐通議中流號巨防試圖援手助潜有跋胡妨薄宦新過魯諸生懼面牆泮田饒樂育師授奈無望可惜絃歌地虛成笱在梁力扶雖切切事廹去遑遑量分功名薄傷時涕泗滂野煙知客恨先自柏城蒼靈巖寺二十六韻中土論名刹兹山第一巖地靈連海岱境勝隔仙凡紺殿通虛閤丹崖間翠嵐天低神寶嶺佛出證明龕雞警隂魔暴僧馴怒虎眈定師興寺始党刻不辭慙石狀殷公怪眉厖老袖毿鐘聲盤絶壑幡影走枯柟法䕶雙欏樹經嚴七寶函巢棲松鶴赭茗瀹露泉甘化雨濛沙界巖圍抱碧潭布金仍趙魏仰食不耕蠶富覽山無盡幽尋力不堪微官嗟縛律小隱欲投簮吟就籃輿住禪師玉版參靜縁天或假世味苦相諳城市蛙居坎功名蟻戰酣有來求福利誰復減嗔貪風化吾儒在慈恩釋氏覃教崇縁世主風靡過周南以此山林勝皆為佛老探兹遊聊適意他日儘横談翠琰詩如此清吟口詎緘顧瞻因咄咄前後至三三山主留昏宿征程畏峻碞夕陽人影澹猶惜動歸驂夀郡侯瀚海流餘慶金天間氣昌風姿先相肖節概更鷹揚衛郡民何幸君侯徳最良幾年承此治一日意曽遑仕膴學彌勵身修志自强民情諳漸熟巵酒不聞香順事蠲苛嬈持難懾暴狂親賢咨政體捐俸起公堂舉意從人便何心恃已長行春㤀逸獵發語見周防門靜無私謁絃調戒急張早衙長待旦退食到斜陽奉上惟知謹當機每克莊清亷安本分孝悌出天常聽訟從輸臆安羣順牧羊行方端比矢處當斷如鋼誕席陳微獻歌詩代頌章自憐鮐背叟長對德星光却恐流雲駿終峨豸角霜所期松柏夀喬嶽共蒼蒼贈周曲山官滿周南樂城居漢徳翁酒杯隨老減詩句自窮工甕料黄虀剰瓶儲白粲空畫义錢幾塊人事日相攻昨暮招添夀今辰去弔凶新除雖有望舊債積來重咄咄時書怪悠悠任轉蓬伸眉無寸樂接物儘多容憔悴麟遺野昻藏鶴在籠固知吾道在未免此心忡夕講詩書共朝遊杖屨同暗消秋澗鄙卓有苦齋風一覺平明睡三竿曉日紅計資徵麴價分口訓村童縣邑多遺愛文章不濟窮曲肱而飲水樂亦在其中夢入閩清府己丑秋九月二日五夜夢閩府來迓品節儀物之盛有不可殫紀者既覺即其意賦此夢入閩清府郊迎罄海圻初從亭傳發迓自憲司歸萬目瞻新使中天仰國威康衢囘曲曲香霧靄霏霏罩􅐸雲垂蓋行歌錦作幃申嚴森赤棒緩進佇朱衣鼓吹連天動旌旄映日微髙乗三丈轎前導一雙騑花覆朝袍紫沉薰象簡緋散班行有叙社直見來稀覆地裀如織蒙山繡若絺籠官衫赤褐花㡌翠蕤葳天逺綸恩重霜清豸角巍繁華驚極盛心事豈輕肥白璧防汚玷黄金惜帯圍六條申漢制八郡斂炎輝庶政惟蠲嬈流風可漸徽氣和樓吐蜃官肅浦還璣後擁才中道前呵近憲扉一聲雞唱白推枕蝶分飛塵世真如夢蓬纍未覺非日髙詩已就清思尚依依送李郎中德昌北還情見乎辭一自清河别經今已十年為尋江表傳重㑹嶺南天鴻鵠乘風健驊騮得路先雞香分省署襟誼動星躔洒落平生契留連祖送筵自嗟衰病客愁卧瘴江烟嵗月隣期耄鄉闗近五千依依枝逺鵲跕跕水飛鳶外望何其切中堅未易鐫崇髙疇弗戀筋力若為前落日鄉音杳秋空望眼穿委心歌已矣適意俟終焉行止雖存數周旋正賴賢省臺公道在萬一故人憐謁光武廟奉詔趨龍朔驅車過鄗南壇傾餘里陌廟古老松杉建武重明後中原百戰酣同飜思儷景懷古暫停驂像儼雲臺畫炎開漢燼燂道深柔作理亂自武能戡於穆吾皇聖英明世祖參有賢勞夢想無物不春涵賤子嗟前進殘年謾一堪材疎徒意廣學古不時諳杖策非髙宻扶真愧耿弇乞靈期睿眷登對恊時談景已桑榆晚恩非雨露貪所思吾道重少負此生慙補報功微效歸休老亦甘冷飈知客意吹靉御罏馣和幹臣食粽有感詩韻傑句欣三復情辭浹且黏君吟元在北我詠實維南粽品雖云衆名勞不自嫌懷沙悲楚屈設祭入湘潭憶昨聞辰告周防致思嚴裹纒需彩縷竊食逺腥鮎節届朱明近家同玉版參飣盤犀偃角帯籜笋遺尖製變菰筒質香浮九子纎長腰烹得所木􅁡助餘甜老腹防留膩多餐不過三縛從堂上解爽覺箸頭添應候然微物因騷有細談貞賢餐愈潔讒佞對宜慚我本餔糟客何心論滯淹番禺杖異種來番國知名自老坡杖才任操倚節目喜摩挲尺度天然足柑黄氣自和奇姿含海霧孤植映江沱物眇離鄉貴材稀審實訛聲音鏗爪甲鱗介訝鮫鼉鞭馭真雷䇿批亢格魯戈重輕欣得所長短稱閒拖扶老攜行便持危得力多金蛇僵自勁鮐背痒忘苛不自浮槎使來從老伏波見歸情鄭重未許老婆娑入手嗟神物傳看駭玉柯支頥看月出横膝伴詩哦選勝尋泉石窮幽入薜蘿有時兒女觸却恐鬼神呵蓋節空笻竹神鋒黯太阿笑揮堪解虎静倚可降魔靈夀輕無賴梅條皺可捼花藤昏玳暈斑㸃慘湘娥桃竹那能比桄榔未足歌望塵甘却立斂迹總無過用舎時當審敲撞責果何更防雷雨夜衝屋學陶梭秋月篇夀幹臣周宰取杜黙為李文定公廸詩例五任稱賢宰平頭數七旬分輝郎宿炯鍾秀曲山春懷寶須時用騰蛟自蠖伸所期千室富匪為一家貧文彩唐儒雅規模漢吏循刃游無節錯佩服藹蘭紉訟簡縁情得民安為賦均處高希亮潔宣化見恭仁今嵗逢初度賔筵聽具陳分安貧愈厲詩健老能神報政長書最居間任甑塵從容黄卷樂浩蕩白鷗馴大器成應晚烟霄漸可隣既淹千里足終遇九方歅况復崇公道明揚到逸民新除行有日舊政説難倫湛露金莖濕清樽雪蟻新朗吟秋月句來醉白綸巾再拜添睂夀無勞頌大椿願同蟾窟桂千嵗鬱輪囷送趙都司秉彞赴遼東省幕世味無餘雋羣居底事爭疾徐誰長者紾拉到諸兄吾子方强仕襟期最老成喧聞烏亂集歘聽鳳孤鳴行已謙而讓持心厚且誠相看情欵洽有問對詳明再世儒冠素三年秘閤榮以除遴所選論省諒非輕營帳稱強翰天威想濯征海澄鯨已戮地曠物多萌望重官儀肅民安吏務清濟時紛筆議展用幾書生抱志能兹念流勞在此行秩卑猶吏屬禄足代躬耕曉日灤江渡秋風鶴野城蒼茫連渤澥控帯本營平緑水開蓮幕青山送去程宦遊真衣錦别思任懸旌有道開先世孤標振直聲遼陽囘首處未用愴離情送忠翁南歸元貞乙未春翰長忠翁年七十七致仕南歸行有日平章侯同諸僚寀祖道於遂初亭館予亦忝陪席次明日賦律詩廿四韻非敢以為詩庶幾表吾皇元崇儒重道跨越前人府相睠懷始終盡禮張大續鹿庵之貺詠歌見楊尹之榮豈惟上國之光華永作翰林之故事其詞曰供帳都門讌非縁嵗例過左相城南别墅每嵗春例一讌諸公時清連日勝簮盍半鑾坡酒美凌金谷歌酣掩艷娥盛於清洛禊用裴晉公上已同劉白泛舟洛水柰此别筵何愛客終青顧傷離賦緑波散花簮席帽泥飲捲鸚螺人世真浮梗年光易擲梭𤨏軒凉吹急綺席落花多散粉霑裀繡吹香入袖羅暫留春色住莫戀去程蹉峻秩慚同列醺容慘弗酡新亭收老淚官舸送長河聖代吾儒重詞林寵數頗諾從丞相允義見柏臺畨祖餞賢疏傅衣冠似永和生還梁庾信贐重魯鄒軻盛事傳千古儒流聳四科丹青前日畫歎息路人歌有客孤吟悄臨風兩鬢皤圖南鵬運海遶樹鵲依柯早晚同長往徜徉隱澗阿此懷從落寞起舞且婆娑道在無南北朝家立賢無方果才何間南冠北土材非謾琢磨醉歸扶路晚里巷認鳴珂賦手植檜酒鍾千載東家檜榮枯與道俱鐸沉金絶響鳳去洛遺雛元氣蟠根柢斯文見盛汚器圓傷失制梭削嘆非柧梁棟無隆用杯盤伴飲徒泛香宜盎齊奠獻嫓龍觚沾溉餘周魯淵源挹泗洙雅同吳夀鼎髙亞博山鑪刺口論三代髙歌共一壺或延中聖客或約醉經儒閲古因懷昔相看醉捋鬚蒼烟空左紐偃蓋凜相扶歸詠絲堂樂摳衣闕里趨囘思鐘鼎事一笑付桑榆哀曹府君詞維至元乙亥夏四月癸卯前行尚書省左右司郎中曹君卒於鄉里後九日聞訃適有令開廪拯隰予特請行將致一哀既而不果逮十四夜見君於夢邀予坐故第前楹汎滌供具促膝晤言話其平生甚悉夢中相對為歔欷也覺而賦此聊伸白馬素車之願二十日辛酉命州屬吏路材代予往奠俾火其詩於柏原以告君墓魂而有靈尚克昭鑒嗚呼哀哉君諱松年字夀之享年七十有五世為隰川人聞訃纔三日衣冠夢兩楹㳙除開故室拂鬱話平生息弱哀無託才清老有聲撫懷思攬轡將事過持盈細札紛遺簡謂二月有書寄予故云山煙慘樹旌素車空佇望柩馬想悲鳴懷舊星臨曙傷貧淚滿纓紫川西邁意端欲為君行送趙克敬判定武趙子公侯裔雍容館閣才美除官定武増秩自邢臺喜溢家人敬春融處士懷沼蓮香幕府衙鼓響㕔階雲靜靈光塔風清雪浪齋敢辭推按劇那憚簿書埋任貴騰聲譽隨時免謗猜不教民事緩肯失上官諧人樂家餘袴官清甑任埃鼎祥新有説世系舊為裁華胄淵流逺慈親夀域開嚮來餘藻飾此去要培栽惜别輕三載離筵重一杯君看忠獻業超擢此中來紅藥當堦翻紫殿春光晚芳叢夏景暄緑萱垂地合紅藥當堦翻粉帯金腰束嬈旗絳艷繙涼飈飄碧砌清影動朱軒白傅吟何婉𤣥暉思不凡顧瞻栖鳳地折贈詎容言朱干玉戚詩至元二十五年戊子秋八月五日夢先師泌陽府君命賦此題寤寐中得成韻語者數句既覺因足成之禮制詳三代軍容備百王錫干朱作飾戚柲玉為章特總如山立張皇見武揚逺伸三令肅近作一身防商翦歌周雅夷清頌漢昌格苖先此用萬古仰虞皇以謂帝舜敷文舞干全不尚武致苖頑自格後世以征伐有天下然後象干戈備樂舞以章其成功此後王之徳不及也挽何參政母夫人哀辭三首友義當匍匐無從涕泗漣升堂原有約臨奠不容愆念子初何冀嗟予重惘然㑹須陳漬酒孤酹廣平阡享福年幾百升堂拜慶三丰容宜象服隂教動周南子孝終身慕家貧極㫖甘并將風樹感彤史後來譚徳邁魚軒貴恩涵鳳沼春遽遺彤管美凄斷素車塵在母稱賢範康時産異人故家桃李月何止詠蓁蓁仲和張君孝友純至來求詩因賦此以贈落拓滄江客康寧白髪親宦游非不達純孝與為隣養志曽參事遺羮考叔仁汴都三萬户和氣一家春致樂如君少長歸便母安物生皆有養色順最為難夏凊簾幃暑冬温枕被寒慈顔何所喻庭奈見來丹題常仁卿運使西覲紀行九萬鵬摶翼孤忠駕使軺功名元有數風雪不知遥抵北踰鰲極維南望斗杓胡生摇健筆且莫詫東遼出五代史突厥附録同州郃陽縣令胡嶠亾歸中國三策條民便逾年致節旄夢驚羊胛日嶮歴幻人刀碧盌堅昆異黄金甲第髙白頭書卷裏留滯敢辭勞太平宴二首海㝢初無外王師信有征秉旄麾戰旅漏網得奔鯨清晝來三㨗歡謡沸百城從今田舍客白首樂昇平西北烽煙靜東南海祲清太平元有象帝世見餘禎愾敵無多殺推恩屢減輕公堂歌舞處瑞氣正凝平冬日即事闕饑火衰榮笑物情百年能幾日半世太勞生白首耽書苦黄金過眼輕有懷如此癖何往不艱征夀韓生𢎞闕秉天然厚青金雅韻多闕室鄙揮戈闕壘吟來細韓墻氣闕見奉璋峨哭友親完顔仲希墓宿草西河客隆顱塞外春死留朋義重生與醉鄉隣天老株林雨魂香蟻穴塵我來還獨酹黄葉鳥聲頻挽吳衡甫浩蕩江湖士來從隱逸居醉吟忘楚越箋學到蟲魚拊髀驚凶訃霑巾覩故書慨然西望斷山色照空廬夀王子初近世佳公子詩書看起家處身何不可致養畧無加仁厚歌麟趾文章粲劒華一尊添夀酒猶及泛黄花秋夜月下獨酌時囘自燕都堂虛生夜白院靜散蟲聲月下一杯酒胸中無限清艱難吾道事冷暖故人情為報南枝鵲安棲不復驚治穢聖戒防微漸常懷蔓莫圖菊荒疏苯䔿竹宻斬繁蕪舉目晴山近當軒怪石孤放教入夜月清影滿庭隅贈彦政副使一世佳公子氣涵渾水春衣冠逾遶澤麴糵豈謀身白璧詩名重清燈客舍新不妨宛馬足暫屈到河神清明日南寺對雨寒食無家客禪房喜雨餘坐深僧話永心逺世縁疎厭捲椰瓢醁來參貝葉書傍人從不悟有待曳長裾酒燼尋春曉茶甌破睡餘庭虚花寂寂雲淡雨疎疎有待存終始無心望簡書何當玉堂客脱此馬闕秋夜卧榻鋪筠簟風簷遞晚涼雲枯涵旱氣星爛射寒芒鐘鼓寒更永乾坤夜色蒼時危闗百慮低首拊空床出門因酒敗佳意方知百拜輕㤀機甘李喻重賦赤霄行疎拙傷吾性傾危見俗情出門山氣好秋色浪崢嶸挽真定史二凭鳳攀龍起貂蟬弈世侯九天資岳牧一夢忽山丘樹挂延陵劒驂停魯相輈八州遺愛在滹水日東流挽武安道故失邯鄲步憂分陋巷簞持身心已亂得病衆知難夜月琴絲暗秋風旅殯寒人生罹此極命矣復何嘆夀雷彦政南渡衣冠後如君不數人氣涵渾水秀色映塞垣春靈沼周儀鳳商郊魯獲麟夀杯傾菊露同拜倚門親去嵗龍沙月流光共薊門寒華驚晚節客舎夀明樽取友襟期在傳家命脉存今年秋色好笑語北堂温白松霍岳祠南寺竒松勝所聞孤根生得地衆木逈難羣霜雪封琪樹丹青變錦紋山靈應見惜時與䕶晴雲早發泓芝驛西邁經猗頓鳴珂夜半過天低平卧斗野逈陡懸河赤日三庚伏紅塵兩鬢皤老懷多故闕禹廟玉帛中天㑹謳闕周幹臣詩韻和近得閒中趣都無俗物侵風霜驚老鬢道德負初心枕倦書横膝庭虚樹有陰殷勤周吏隱時遣道清音和秋漲二首泉峪從今㑹奔流到衛雄新詩來幕下歸興滿舟中取少陵胡為只合例怒捲濤山北雄吞海若東我思泛舟役用左氏泛舟之役輕惜幾千功謂太宫之順流而下雨後聞溪漲先聲噴薄來氣嚴千騎駛波急萬窠囘終古朝宗去神功念禹開寄言歸義子欵塞莫遲徊題有趙義士三侯祠雙冢連遺廟風雲擁義壇難興忠可壯事集死尤難烈日丹衷皎青山白骨寒一杯來酹祭用激懦夫肝禱雨孚恵靈祠夜半清源道來伸禱雨誠壝圜形覆釡泉邃碧為泓霸業開三晉風烟暗九京一杯臨水坐便欲濯塵纓慶王丈子夀八秩之夀遺愛汾西政耆英故里居期頥八十夀精健五旬餘捨䇿春流憇龕燈夜注書更憐温凊際蘭玉滿庭除奉酧胡紹開外郎畫省胡員外都城憶昔遊分攜無半載渴仰若三秋已辦催科拙寧煩任智憂何當償宿願相望兩山州星子鎮道中北下星闗道川開百里寛夢殘傾錦帢吟細緩征鞍土峽深囘洞山田疊醮壇一杯亭傳酒來為敵霜寒題柏璧鎮峽古疑天設營空故壘存捐金行楚間力戰决齊吞馬足沾霜健山烟漲日昏治安誰有策一笑出闗門夷齊墓逺避東鄰塵還遮北伐頻與天重立極叩馬死成仁落日悲歌壯東風紫蕨春一饑雖可療終媿是商臣愛井廣孝銘遺井千秋仰有虞側微多在困捐蓋失之誣喬木非三代雲烟接兩都依依風樹感不待露霜濡河中歴按河東道蒲津勢最雄河山全晉鄙土俗半秦風野日連虛壘孤烟認佛宫論功無汗馬極口説先公登歴山聖人嶺形勢開三面臨觀醉魄醒松悲虞泣涕石老象頑冥澗水縈𤓰蔓荒山卧虎形野人無所解尊禮九真靈跋運使張君㑹琴圖雪徑尋無路東林素有期琴絲凍欲折風袖曉還披偉觀疑韓愈幽林付穎師無由陪杖屨只悟畫中詩田間斜日秋瓜圃雲閒雨過初平疇交晚吹涼意滿輕裾草木浮元氣河山擁草廬拊心欣有得重展故人書雲帯山籬薄溪横舎屋斜卷懷㤀仕版作苦事田家疎散藏吾拙敷榮眷物華晚凉沙岸靜植杖自耘瓜漠漠西山雨東來意甚徐潤深滋厚壤洒宻下平蕪巢燕歸飛急林鳩得雨呼有金堆積斗能捄暵乾無過萬泉縣今廢縣倚孤山碧岡圍落照紅一丘歸慘淡千室想豐融絶澗縈樵徑懸崖半土宫物華耕壤狹寧得不唐風秋澗集卷十二欽定四庫全書秋澗集卷十三元王惲撰五言律詩哀尚
