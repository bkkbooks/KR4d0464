body:
  text: 烏臺筆補序至元改元之五年秋七月憲臺肇建於以配肅天德用昭太㣲執法之象詔前平章政事塔沁公為御史大夫曰中丞曰殿中侍御史以塔齊茂巴爾博果宻貳焉曰侍御史曰治書曰監察御史純用漢人一切事宜率循舊典其裏行十有二人令各舉所知以充員數侍御史太原髙公乃以相人梁貞前翰林修撰左司都事惲俾膺遴選方朝廷嚮治思有以重之其監察到臺特詔廷見以肅其氣優祿稍以厲其嚴朱衣衮板雖以七品就列秩望清峻天下事無非所當言者其出使四方佩金符分屬掾馳驛傳中外具瞻凛然聳繡衣直指之望至有恨其崇資不得與之同事者内則號下臺通論駁設六察畫坊廂縱㳺詧小大事月限以數於是騰章抗狀紛畨迭作霜逐簡花風聲動臺閣矣僕偎厠裏行頗收薄用比受更凡三十有二月尸素既久具藁紛然併以外臺所言一二凡得臺綱書記事狀時務等篇總一百五十餘章釐為五卷題之曰烏臺筆補客有覽而謂予者曰昔人諫草往往削而去之子今是舉不㡬於自用昭晰以章時事之非乎予曰客何見之晚也裏行言責也人與言雖卑而㣲其見於此者皆本臺已行底至而不遺者也故書之䇿正欲表夫朝廷寛忌諱重臺諫顧惟蕘言曽不少棄見乎微則其至者可知己至於政貴有恒辭尚體要予雖不敏中或有一得焉是又不可因己陳而廢之也客唯唯而退於是乎書以為序烏臺筆補牒呈監察御史王惲今呈謹集錄到御史臺典故條例上自秦漢迄於宋金凡七十三事逐一開列於左有可行於今者伏乞鈞覽采擇須至呈者一古今名號更易御史大夫奏大司空漢大司憲唐御史府漢憲臺後漢蘭臺魏晉宋齊左右肅政臺唐左右御史臺唐一員數品從唐制御史大夫正三品百官志一員六典二員中丞二員百官志正四品六典正五品侍御史百官志六員從六品六典四員正六品殿中侍御史從七品百官志九員六典六員監察御史正六品百官志十五員六典十員錄事二員從九品金制御史大夫一員從二品中丞一員從三品侍御史二員從五品治書侍御史二員從六品殿中侍御史二員正七品監察御史十二員正七品典事二員從七品檢法四員從八品一三院人數唐制臺院令史七十八人書令史二十五人亭長六人掌固十二人殿院令史八人書令史十八人察院計史三十四人令史十人掌固十二人金制獄丞一員架閣庫管勾一員令史一十人分掌名頭上臺機宻房掌察到應干公事下臺機宻房掌同上臺謂監察糾到公事申臺吏户禮兵刑工房斟酌繁簡分掌刷案一三院例一曰臺院其僚曰侍御史呼端公知雜事謂之雜端非知雜者號散端二曰殿院其僚曰殿中侍御史呼侍御新入者知右巡以次左巡號兩巡使三曰察院其僚曰監察御史亦呼侍御每公堂㑹食雜端在南榻主簿在北榻皆絶笑言一臺門例舊日御史臺在宫闕西南其門北開取隂殺之義一置獄例舊臺中無獄有須留問寄禁大理若尋常之獄推訖斷於大理唐李乾祐為大夫請置獄於臺中雖按問為便而増鞫獄之弊至開元間御史大夫崔隠甫奏罷之須留問者仍寄禁大理一班簿例治平元年閏五月詔御史臺閣門十日一具細書班簿以進自今大書為冊月上之一兩臺發使例舊例兩臺嵗發使八人春曰風俗秋曰廉察以四十八條察州縣一受事例舊例隻日臺院受事雙日殿院受事一職官始置御史大夫秦官位上卿銀印青綬掌副貳丞相其監察御史掌監郡一彈奏進止例舊例彈奏皇帝視事日御史奏之景龍後皆先進狀聽進止許則奏之不許則止一伺詰寃獄例凡為三司伺詰三司為御史大夫中書門下省大事奏裁小事専達一衣冠例秦御史冠柱後惠文蓋用鐡為柱取其審固不撓唐大夫中丞遇大事押奏冠法冠謂豸冠也衣朱衣纁裳白紗中單以彈之小事常服而已一大禮例國有大禮則乗輅車為之前導一審覆例若有制使覆案囚徒則刑部參擇之一三司理事例則與給事中中書舍人更直於朝堂受表一中丞與皇太子三公相遇例元魏朝故事中丞出與皇太子分路三公皆遙駐車去頓軛於地以待其過其或遲違則前驅以赤棒棒之一六職例一曰奏彈二曰三司三曰西推四曰東推東西朝堂五曰贓贖六曰理匭一侍御史五曹例漢皆用公府掾屬髙第者為之一曰令曹掌律令二曰印曹掌刻印三曰供曹掌齋祠之事四曰尉曹掌廏馬之事五曰乗曹掌䕶駕之事一新除有罰例舊例新除者未曉制度有罰至罰有逾萬錢者若議罰則詢於雜端一侍御等裏行例唐龍朔元年置侍御裏行殿中裏行監察裏行武后文明後耑以裏行名官長安二年復置内供奉官一供奉例舊例掌殿庭供奉之儀式每朝與侍御史隨仗入位在中丞下給事中中書舍人後一持書故事持書侍御史者本漢宣帝元鳯中因路温舒上書宜尚德緩刑帝深采覽之季秋請讞時帝幸宣室齋居而決事令傳史二人持書故曰持書侍御史一四推莅太倉左藏出納例舊例以殿中侍御史第一人同知東推莅太倉出納第二人同知西推莅左藏出納號四推御史一大朝㑹例凡冬至元正大朝㑹則具服升殿若皇帝郊祀巡省則服從旌門往來檢察視其文物之有虧闕則糾之一䘖署例凡彈劾之事御史言於大夫若遇大事則方幅奏彈小事則署名而已一監察不得供奉例舊例監察正門無籍非因奏事不得入至殿廷開元間勅並令隨仗而入不得供奉一監察例凡冬至祀圜丘夏至祀方澤孟春祈榖季夏祀明堂季冬祀神州五郊迎氣及享太廟則二人共監之朝日夕月及祭社稷孔宣父齊太公蜡百神則一人率其官屬閲其牲牢省其器服辨其輕重有不修不敬則劾之一㑹議例尚書省監司七品以上官㑹議先牒報臺亦一人往監若據狀有違及不委議意而署名者糾彈凡有勅令一御史往監即監察受命而行亦監其過謬一監齋例凡京都忌齋日則與殿中侍御史分察寺觀七品以上清官皆顧行香不到則牒送法司一監決囚徒例凡決囚徒則與中書舎人金吾將監之一在京監察例分知左右巡各察其所巡之内有不法之事謂左降流移停匿不去及妖訛宿宵蒱博盜竊獄訟寃濫諸州綱典貿易隠盜賦斂不如法式諸此之類咸舉按而奏之若不能糾察及故縱蔽匿者則量其輕重而坐所由御史一監察御史雜例分察百僚巡按郡縣糾視刑獄肅正朝儀朝廷有不肅欽者御史則糾而劾之每二人五日分知東西朝堂一邉功例凡將帥戰伐大克殺獲數其俘馘審其功賞辨其真偽一門直例凡自監察御史以上每日一人於本司當門直以檢察臺中出入及令史領詞訟過大夫之事若縁詞訟事須推勘者大夫便委門直御史以推之一風聞例舊日御史臺不受訴訟有通詞狀者即於臺門候御史御史徑往門外收采知可彈者畧其姓名皆云風聞訪知一相遇例凡御史以下遇長官於路去載下馬長官斂轡止之一監圍例舊例蒐狩則監圍察斷絶失禽者一監選例舊例吏部將除定員數及擬到州縣付之監察於吏部别置監察一幕御史閲數臨視而已若甲間或有資歴先後品從髙下及不應等事許授除官陳告御史即推究根因與之改正一進帖例監察舊例所進帖子止是今呈子様但内為腰封其囊上用黄紙作帖黄上書奏帖二字下書臣某謹封一照刷例舊例照刷所司先具事目到臺其文卷後粘連刷尾具公事本末赴臺照刷監察御史於正位坐閲朱銷簿臺令史一人在旁亦坐執掌具到事目其當該人員引卷通讀若係筭數文卷更設帳科司吏一名與臺令史一同刷磨其中但有違錯稽遲監察將文卷收訖申臺量情治罪餘無違錯者即令大程官於刷尾騎縫近下先用刷訖銅墨印然後蓋以監察御史朱印及於朱銷簿上結尾後亦用刷訖銅墨印一督軍御史晉職官志光武建武初征伐四方始權置督軍御史事竟罷東晉孝武太元六年復置隋煬帝時置監軍御史一符節御史前漢百官表其治書符璽者印綬比二百石以上皆銅印黄綬漢官儀尚璽四人掾史趙堯為符璽御史尚璽者也晉職官志符節御史秦符璽令之職也漢因之位次御史中丞掌綬節銅虎符竹使符及泰始中武帝省併蘭臺置符節御史掌其事焉一防禁御史晉職官志按魏晉官品令又有防禁御史第七品蘭臺之職也一漢六條漢官儀云部刺史周行郡國省察治狀黜陟能否斷治寃獄以六條問事非條所問即不省其一條曰强宗豪右田宅踰制以强陵弱以衆暴寡其二條曰二千石不奉詔書遵承典制背公向私旁詔中利侵漁百姓聚斂為奸其三條曰二千石不卹疑獄風厲殺人怒則任刑喜則淫賞煩徭刻暴刺截黎元為百姓所病山崩石裂妖祥訛言其四條曰二千石選署不平苟阿所愛蔽賢寵頑其五條曰二千石子弟恃怙榮勢請託所監其六條曰二千石違公下比阿附豪强通行貨賂割損政令一巡案官選判官支使例舊例十道巡案則選判官二人為之佐如本道務繁得量差官八歴清幹者號為支使一巡案出入例漢監者每三嵗一更常十一月奏事三月還監焉唐巡案使率三月以後出都十一月終入奏事宰相李嶠請率州置御史一人以週年為限一巡案州縣例諸監司每嵗分上下半年巡案州縣具平反寃訟案訪利害及薦舉循吏案劾奸贓以聞一案察所部有犯諸案察官知所部官有犯若事理重者躬親廉察部民訴訟縣令同餘事聽先委不干礙清强官體究有無實跡結罪保明申所委官司於案章内明坐所差官體究到事因並不得出榜召人首告即犯贓私罪雖已離任被告論或因事彰露者聽案治一具發摘過贓吏例諸案察官每嵗終具發摘過贓吏姓名置籍申尚書省一巡案許見賔客例諸監司巡案許接見賔客惟不親謁一直指使漢直指使持斧衣繡衣直指者為指事而行無阿私也衣以繡衣尊寵之也出討奸猾治大獄一知班受百官及命婦入宫帖子例舊例百官入朝知班一人於宫門受百官及命婦入宫帖子其上書某官某職某爵上用職印令執事人授知班蓋使知其百官是日有疾病有故者其所告狀謂之曹狀一知班糾彈例殿中侍御史下設知班十人如百官朝㑹知班四人於四方臨視如有失儀墮簡者知班向其人前問何姓氏然後具狀糾彈一主簿例隋大業三年始置隋二員唐省一員掌印綬事發辰勾檢稽失及管轄臺中雜務公廨厨庫檢督令史奴婢配勲散官職事每食則執黄卷書其譴罰至元三年十一月一五使例謂廊下使入閣監食使監香使掌國忌行香二使臨時􅂶通謂之五使三京留司御史臺元和十三年後但以侍御史殿中侍御史監察御史共主留務三院御吏亦不常備焉宋朝西京於分司官内差一員權闕即差官權掌南京止令留守通判權掌後北京置臺専差官天禧四年以翰林學士承㫖兵部侍郎知制誥晁逈為工部尚書集賢院學士判西京留守司御史臺他官止云權而逈云判者以三品故也理檢使宋朝淳化三年置院在宣徳門外西北廊鼓院之西令登聞鼓司進狀人有稱寃濫沉屈者即引送理檢院審問登聞鼓院宋朝鼓在宣徳門南街之西廊院在外門西之北廊舊曰鼓司景徳四年五月改今名凡文武臣僚閣門無例通進文字者諸色人進狀並先經登聞鼓院除告軍機宻事及論訴在京臣僚即依例實封如進入後審狀有異同虛妄及夾帶他事並科違制之罪所論事理重依格勅施行仍令進狀人别冩劄子節畧要切事件連粘於所進其餘所進文字並先拆開看詳定奪或有原本文字照證速牒合屬司分取索若事合施行及所進利濟有可觀採便通進若顯有違礙不可施行即當日内告示本人知委不識文字者許陳白紙據所論事件判院官當面抄劄詣實口詞仍當日據收接到所進文狀都數逐件開坐行與不行因依具單狀聞奏若進狀并遇白紙人稱鼓院看詳不盡情理即許經登聞檢院進狀披訴仰檢院詳酌事理若鼓院所定不行為當即據不行為當縁由判押審狀與進狀人收執如鼓院所定不當即其不當事件并原進狀繳連進呈其收接所進文狀亦於當日内具都數開坐行與不行因依單狀聞奏其被訴人即時判審狀給付即許於御史臺陳訴其登聞鼓院檢院委實行遣不當者方得接駕及繳所判審狀披訴當付所司勘鞫如披訴得實判鼓檢院官必行朝典如是虚妄本人科上書詐不實之罪未經鼓院進狀檢院不得收接未經檢院不得接駕進狀違者依法科罪判院官二人舊以内臣勾當至道三年改用朝臣監鼓内侍二人令史一人登聞檢院唐置匭宋朝太平興國九年改匭為檢東延恩曰崇仁南招諫曰思諫西申寃曰申明北通𤣥曰招賢改匭院曰登聞院院在宣徳門東廊之北景徳四年五月改為登聞檢院是月勅如急速文字畫時進入常程文字一例每五日一次於檢院内通進天聖七年上因讀唐史見匭函達下民寃枉之事乃謂左右曰天下九州之大豈無寃枉之人若至京師檢院鼓院理雪者必是州縣官吏提典刑獄轉運使不能理雪若又不為申理則赤子無告矣乃置匭函仍専命御史中丞為理檢使應諸色人除竒巧法術邪妄干正道事不得上言及常程公事自依久來體式令逐處官司并鼓院收接外如有指陳軍國大事朝政得失大段寃枉累經訴理未獲辨明或事干機宻並許詣匭函投進内委是急速文字畫時進入其餘並每五日於檢内進納如無亦具單狀聞奏如檢院進狀人稱寃濫沉屈者畫時引送理檢使審問判院官一人舊止舍人兼掌淳化二年始命他官判之都䕶府都䕶一人掌所統諸蕃慰撫征討斥堠安輯蕃人及諸掌罰叙録勲功總判府事副都䕶二人長史司馬各一人録事功曹户曹倉曹兵曹法曹叅軍各一人叅軍事二人其安北單于唯有司馬倉曹兵曹各一人餘並不置射聲校蔚漢掌待詔射聲士工射者㝠㝠中聞聲射則中之因以名也須待所命而射故曰待詔射聲戊巳校尉漢元帝初元元年置甲乙丙丁庚辛壬癸皆有正位唯戊巳寄治耳此所置校尉亦無常居故取戊巳為名一説戊巳居中鎮覆四方漢所置校尉亦處城之中撫諸國也散騎常侍騎馬並乗輿車騎而散從無職事也舊日監察所行一差監察例本臺且以三人為率本臺備具本官脚色伴奏日進呈御筆㸃差假如首先一人是臺家注意者御筆或㸃却次者第三者一無故入御史臺杖六十撾鼓者先杖八十一臺諫檢院鼓院臺既立餘皆合行鼓院在掖門東檢院在掖門之西一舊來監察照刷止是徹卷㸔讀但有稽遲即有杖罪如違錯等事更不消説監繋取招訖送法司斷定然後決罰據勾當限次如瘡未愈勾當瘡已愈不出又是罪及照閲朱銷簿一金國省院臺為三省一舊有六臺六院一上下臺大夫中丞為上臺侍御史以下為下臺一治書侍御史乃是臺奏事官為制一臺事也一報午時省即起然後臺起六部視臺起然後部起一按察兼運使其意以為按察中間一切欺隠不公事則不敢犯早晨先與書史判按察司事次乃與同知副使判運司事一舊日監察如某吏行止不修及贓濫者監察於本人門或帖子或粉壁書云某人行止如此身事便索廢却一臺有三臺上臺下臺外臺一舊日監察出使帶牌起驛馬一監察有急事至撒合門納帖子無問早晚自宫中傳入奉御傳於門娘門娘轉於承御承御聞奏上如熟寢承御直夜者不敢聲言擊所懸之玉謂之襲聲既寤進讀某人奏到帖子如此等事若上即裁決令承御批送省部臺上用小方玉印印之所司得㫖登時勾當趁明日朝奏對一舊日監察外路有體究公事差部官一員并部令史事得其實官人申臺吏人杖一百以下皆決之若有大段公事臺司覆察得實闗所該部分差部官與監察一同致勘如所察不實監察所得罪只是罰俸贖銅一舊日三品以上官有罪監察體究得實申臺呈省聞奏若宣勘本官不問虛實即便承伏如中間實有寃枉令家屬告登聞檢院不理然後撾鼓以聞秋澗集卷八十三欽定四庫全書秋澗集卷八十四元王惲撰烏臺筆補彈
