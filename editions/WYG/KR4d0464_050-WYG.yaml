front:
  text: 大元光禄大夫平章政事烏蘭氏先廟碑銘夫人臣建非常之功垂鴻不朽者罔間存殁俱蒙顯異如配祭大烝勒銘彛鼎諡號廟饗濯聲赫靈扶我桓撥况三世迭將際興運依末光佐收混一之績者哉皇帝握乾符章先業念開濟之艱難感風雲於疇昔爰推䘏典允答元勲維元貞一年春正月已丑近臣烏裕台奏平章政事布琳濟達言臣故父榮禄大夫中書左丞相兼都元帥阿珠南征北伐汗馬之勞頗効尺寸伏見與臣父差肩宣力者已蒙㤙奬敢昧死以請制曰阿珠乃祖乃父自太祖朝服勞王室多樹功閥名髙諸將可嘉贈其在故家不得扳例於是璽書降告明廷特贈開府儀同三司太尉并國公諡曰武宣詔下中外咨歎大協輿議嗣侯布琳濟達承命式抃且舞將即汴梁賜第建祠樹碑昭明三代于以侈大寵光宣揚先美慰安神靈載徳象容昭示無極乃謁翰林學士王某以銘章為請謹按家畧序而系之以辭其先世出蒙古烏梁海部逺祖諾爾布者為人音吐洪亮以善歌曲稱生闕
