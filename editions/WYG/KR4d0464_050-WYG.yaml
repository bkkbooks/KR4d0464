body:
  text: 以羣羊餉帝中途遇盜被執哈勒琿及其弟繼至以戈刺盜殺之餘黨逸去遂脱父難餼牽竟達於上自是昆季孝義之名聞於朔部間太祖朝哈勒琿巴圗以善騎射充百夫長奈曼之未服也戰長城南率先鋒摧之彼即驚動其弟即嗣侯布琳濟達曽祖也第一室曽祖府君諱蘇布特初以質子入侍繼為百夫長壬申嵗太祖經略中夏首攻桓州城小而堅勢不易拔公匍而先登上壯其勇賜金幣一車嵗丙子帝㑹諸將於圗喇河上詢曰摩哩齊部未附疇為朕征之公即應詔選裨將阿爾齊領百人為候騎仍諭以方略如其言彼果不疑弗為備大軍至徹辰河上一戰而潰擒二將鼓下遂降其餘衆辛已追摩哩齊部長呼圗與欽察戰於玉峪敗之壬午年太祖征囘囘國其酋棄國而去命公與哲伯逐之及於呼哩河戰不利公駐軍河東戒其衆人爇三炬以張軍勢其王果夜遁繼遣公將萬騎由布爾罕川追襲既及逃匿海嶼則守其要害彼進退失據不旬月瘐死獲珍貝不貲以獻上諭曰蘇布特枕干血戰為我家宣力朕甚嘉尚賜珠寳一銀罌明年癸未請征欽察許焉遂逺轉衮騰吉斯海取太和嶺壍山開道出其不意至則其酋長方聚布克坦河縦兵奮擊彼弗能為計竟收其境又與烏魯斯大小穆爾奇扎爾戰降之尋遣使奏乞以摩哩齊奈曼克哷哈爾吉欽察等千户别為一運嵗甲午入覲驅萬馬為質丙戌年取薩里輝和爾徳濟巴莽等部又掠西畨邊部獲駝馬五千疋貢於朝一無私焉嵗庚寅太宗命睿宗循宋徼而北營取河南公亦在行道出牛頭關遇金將哈達帥歩騎甚衆上問方畧所便公進説曰城邑中人遇勞苦即勌厭逗撓氣惰與戰易勝是役也大敗哈達於三峰山自是金不能兵矣壬辰夏睿宗選駐官山留公總諸道兵攻圍汴京金主北走渡河尾敗於黄龍岡殺戰士萬人癸已秋汴京降俘金后妃寳器獻闕下其冬圍金主於蔡明年甲午金亡時汴梁受兵日久嵗荒民殍公下令縱其北渡俾就樂土其骨而肉之之㤙尚未忘也其年詔諸王巴圖西征上以公識兵機有膽略選為先鋒遂擄伯竒王妻子於衮騰吉斯海辛丑嵗諸王巴圖奉命征烏魯斯為所敗攻圖嚕格城不能下奏遣公督戰遂禽烏魯斯王伊埓巴勒攻圗嚕格城三日克之復從攻瑪察部聞其主竒凌兵勢張甚諸王分五道以進公出計誘至郭寜河大軍㑹戰不利乃於下流木渡直擣其城拔焉公以定宗朝戊申年卒於圖喇河上夀七十有三公深沉有謀略善於用兵勇敢無前臨大事有斷初太祖征西夏公請行上念公久在行陣命還家省闕未晚復請曰君勞臣逸恐無是理闕其忠勤類如此今以曽祖妣夫人呼都台闕帥府君諱烏蘭哈達總戎府君長子也闕輛軍事太祖憲宗方髻齓以公佐命故家付之護育及長用存傳芳分掌宿衛辛已扈定宗征女直國破萬努於遼東又佐大王巴圖征欽察烏魯斯等部已酉定宗升遐大王巴圗與宗室大臣册立憲宗議久未決公以大義陳請即定嵗壬子時世宗皇帝在潛奉詔征西南諸夷命公總督大營軍馬自旦當嶺入雲南境摩些二部酋首來迎降渉金沙江所在砦柵負固自守以次攻下之獨半空和寨依山枕江下臨無地穴石引水牢未可拔覘知絶其汲道公親率精鋭前薄越七日寨破勒殺無噍類繼進師取龍首關翊世祖皇帝入大理國城其年秋分兵取附都善闡及烏爨之未附者前次羅部府大酋髙昇集諸部兵力拒戰大破於夷可浪山下復收合餘燼嬰城自守城際滇池三面皆水堅險不易攻以砲摧其北門縱火前燬皆扞不克入乃大震鉦鼓進而作作而止使不知所為如是者七閲日伺彼方酣困氣靡夜五鼓潛師躍入亂斫衆自内潰克焉先時國主段志興逃匿昆澤併擒以獻又知未降附者逺近嘯聚大為民梗公曰弗痛為揃刈不足以振誡之命裨將托卜阿津率麾下掩其右哈逹護尉掩其左約三日捲而内向及圍合與子阿珠陷陣撃刺禽獮草薙川谷為一空是亦制蠻之一竒也自是所向風靡節解不二載平大理五城八府四郡洎烏白等蠻三十七部兵威所加如魯魯斯阿伯等城亦來欵附乙邜秋奉命出烏蒙趨瀘州剷秃刺蠻三城宋邊將水陸駐兵來扼戰屢交斬獲不勝計遂通道於嘉定重慶間抵合州濟蜀江與特格岱爾合兵以雲南平定遣使獻㨗於朝且請曰西南夷漢嘗郡縣之設官料民俾同内地此其時也允焉蒙賜其軍銀五千兩綵段二萬四百疋仍授銀印俾還鎮大理丙辰嵗九月遣使招降交趾留介不報冬十月進兵壓境國主陳光炳隔江列陣象騎歩卒甚盛公分軍為三隊濟江選鋒察察爾圖從下渡先濟大帥居中次駙馬輝圗仍授察察爾圗方略曰汝軍既濟勿與之戰彼必我逆駙馬隨斷其後蠻必潰走海汝伺便即邀其船艦定成禽矣公既登岸即縱兵與戰選鋒違節亦來渾鬭彼軍雖大壊得駕舟逸去公怒曰違律失期軍自有法察察爾圗懼飲藥死遂率止郡治七日軍令静嚴秋毫無所犯光炳震恐崩角請罪内附於是置酒髙㑹饗軍鱗屋插血崇臺戈船四艤而銅鼓為寂然矣已未夏憲宗遣使來諭旨約明年正月與卿㑹於長沙是秋率四王兵三千騎蠻卒萬人掠横山寨柵闢老蒼關徇宋内地宋陳兵六萬人以俟戰盡殪所至調兵旅拒且戰且行自貴州蹂象州突入静江府遂破辰沅直抵潭州州大出兵斷我歸路公與四王掠其後子阿珠横擊于前盡破走之公提孤軍入絶域殫志竭力同徳一心轉鬭萬里前後敗殺宋軍四十餘萬州又遣兵來犯蹙之門濠淹溺無筭彼氣折不復敢出壁城下者月餘聞世祖皇帝駐師鄂渚尋遣竒爾濟蘇將千人來援仍慰勞之由滸黄北渡庚申夏孟飲至上都至元八年公卒享年七十有二以祖妣夫人外刺真配實生開府公第三室皇考開府公諱阿珠資和粹行義修正沉㡬有智謀臨陣對敵英毅果决氣盖萬人憲宗朝癸丑嵗以白衣從父都帥公征西南夷率天下精兵為候騎所向摧陷莫敢攖其鋒至平大理諸部降交趾踐宋境無不在焉一攻一戰禀承無違教令竭力奉親移忠為國其碎水寨掀闓城奪國君於馬湖舟指可掬索盗馬於山諜賊將生擒之又鏖戰三湘搴旗五陣是皆樹立之駿偉者也嘗蒙憲宗賞諭有阿珠未有名位挺身奉國特賜黄金一百兩以勉將來其降大任於公兆開於先闕然也中統三年秋九月自宿衛將軍拜征南都元帥佩金虎符治兵於汴復立宿州至元元年秋八月詔掠地廬江入滁陽自安慶府經略兩淮軍聲大振四年秋八月觀兵襄陽遂入南郡取仙人怗城等柵俘生口五萬人江陵晝鎖宋人聞我斾還多掠選兩淮驍悍騎五千歩萬人併力邀襄樊間公謂諸將曰若不援宿江北恐落賊便遂自安灘濟江獨留精騎陣牛心山下立虚寨設疑火夜半賊果至伏發斬首萬餘級初公過襄陽駐馬虎頭山指顧漢東白河口謂諸將曰若築壘於此以斷餉道襄陽可圖也議聞於朝許焉五年九月築鹿門新城白河等堡六年七月大霖雨漢水溢宋大將夏貴范文虎相繼以兵來争又遣兵出沒東岸林谷間公按觀兵勢謂諸將曰此虚形不可與戰宜整舟師以備新堡衆從之明日南船果趨新堡大破之殺溺生擒者五千獲鬭艦百餘艘於是治戰艦教水軍築圜城以圍襄陽文虎率舟師來救來知府以百艘泊百丈山掣肘城役皆邀擊於灌灘敗走之裨將矮張以軍襖百舫櫂入襄州尋乗輪船順流東走公與都帥整分艤戰艦以待燃薪照江兩岸如晝公追至櫃門關擒張餘衆盡殪是月授驃騎衛上將軍同平章事都元帥如故九年三月破樊城外郛重圍逼之襄樊兩城漢水出其間宋人植木江中鎖以鐵絙中造浮梁樊恃此為固我以機鋸斷木斧絙燔其橋襄援既絶公率猛士攻而㧞之襄守將吕文煥懼而出降秋七月奉命掠地淮東抵維揚城下彼以千騎出戰公伏師道左佯北賊果乗之擒騎將王都統十一年正月公入覲因陳奏兵事曰臣阿珠久在行間備見宋人兵弱於昔削平之期正在今日上付相臣議久不决公復奏曰今聖主臨御釋亂臣不取臣恐後日又難於今日上喜曰卿言允契朕意詔以兵十萬付之三月進榮禄大夫平章政事秋九月師次郢之鹽山得生口四人問知宋沿江九郡精鋭盡萃郢江東西兩城今欲師出其間騎兵不得護行两岸此危道也不若取黄家涴堡東有河口可由中拖船入湖轉而下江便時雨九晝夜不絶公料大軍方集餽餉不繼水陸兩間進退無據吾大事去矣遂與右丞相巴延公議决意前進遂拖舟達江舍攻郢而去初過郢按行舟路徑大澤中忽騎兵千人掩至時從騎纔數十人公班馬被甲擐帶已即奮槊馳擊所向披靡彼驚遁走追斬五百餘級擒趙范二統制乙未攻沙陽新城㧞之前次復州守將翟貴迎降十一月丁酉公徃覘漢口兵勢時夏貴已鎖大艦扼江漢口兩岸備禦堅嚴叵犯公曰可囘舟輪河口穿湖中從羊羅堡西沙武口入江甚便十二月辛亥大軍至羊羅堡攻之不克公語右丞相曰攻城下策若分軍船之半循岸西上泊青山磯下伺隙擣虚可以得志是夜雪大作黎明開霽風急公遥見南岸多露沙洲即率部曲徑渡令載馬後隨宋將程鵬飛來拒戰公横身盪决蹀血大鏖中流敗去得船千餘艘公登沙洲急擊扳岸歩鬭開而復合者數四賊小却出馬於岸遂苦戰破之追殺至鄂南門岸兵敗走夏貴聞公飛渡大驚以為從天而下引麾下兵三百艘先遁餘皆潰亂我兵乗之江水為赤羊羅堡亦㧞盡得軍實右丞相議師所向或欲先取蘄黄公謂諸將曰若赴下流退無所據上取鄂漢雖遲旬時可以萬全且將士有家欲上欲下公私兩便事倘蹉跌我任其責從之水陸趨鄂焚其舟三千艘烟炎漲天兩城大恐漢陽鄂渚援兵皆降十二年正月黄蘄江等州降戊戌公率舟師趨安慶府宋殿後帥范文虎出降繼下池州宋平章賈似道督諸道兵扼蕪湖先是遣行人宋京來請和二月丁邜師次丁家洲公與右丞相議曰且和議未定間昨我船出彼已亂射又執我邏騎四人宋人無信惟當進兵又曰若避似道不撃恐已降城池今夏難守若欲實和俟渠自來作何語徐為思之遂與前鋒泰州觀察使孫虎臣對陣夏貴以戰艦二千五百艘横亘江中似道將後軍殿時公已令諸將順江兩勢礟撃其中堅南軍陣動趨我船急進公即挺身登艦手柁衝船雷鼓大震喊聲動天地我師掠彼舟大呼曰宋人敗矣似道倉皇失措舳艫簸蕩乍分乍合公以小旗麾將校率輕鋭横擊深入宋軍大壊即囘棹前走右丞相以歩騎夾㟁掎之追奔百五十里殺溺死者蔽江而下獲戰艦二百餘艘都督府圖籍符印悉為我有軍資器仗狼籍不勝計是日似道以輕舸東走揚州夏貴走廬州已已無為州太平州和州降癸酉建康裨將徐王榮以城降撫慰城中市不易肆朝廷以宋重兵皆駐江都臨安倚之為重四月甲寅命公困守揚州甲子公次真州與南兵戰珠金沙殱其千人獲鹽船三千艘既抵維楊視揚子橋河路漕真粟以助之即樹柵斷其餉道宋都統姜才領馬歩二萬來争期於必取南軍夾河為陣公麾騎士踰河直斫姜陣才所將多亡命叛降餘皆淮卒勁男養鋭日久戰數合堅不能却我佯北才軍果逐之我奮而囘戈萬矢雨集彼不能支騎先遁去我隨以鐡騎蹂之追奔斬馘萬八千餘級兩淮鎮將張世傑孫虎臣以兵萬艘駐焦山東七月辛未公登石公山而望之舳艫連接旌旗蔽江公曰可燒而走也遂摘伉健善彀者千人載以巨艦分兩翼夾射公居中合勢進擊繼以火矢著其篷檣烟焰赫赫窘無所出先是虎臣命前船悉沉鐵䌫於江示以必死至是欲走不能前軍争赴水死後軍閧走追至圌山獲白鷂子七百餘艘是後淮東諸城兵不敢出矣十月壬寅進拜榮禄大夫中書左丞相仍諭之曰淮南重地庭芝狡獪須卿守之時諸軍進取臨安公駐兵𤓰州彼絶應援揚不能為後患兵不血刃而兩浙平定公控制之力為多十三年二月乙丑夏貴舉淮西諸城來附左丞相謂諸將曰今宋已亡獨庭芝未下以外助猶多故也若絶聲援塞饟道尚恐東走通泰假息江海乃柵揚之西北丁村拒髙郵寳應糧道貯粟以備灣頭堡留屯新城用逼泰州又遣千夫長巴延徹爾帥甲騎三百壯灣頭兵力仍諭之曰庭芝水路既阻必從陸出宜謹備之如丁村烽起當首尾相應斷賊歸路六月已酉姜才知髙郵米運將至出歩騎五千果犯丁村與我兵相抗至曉巴延徹爾来援所將皆牙下精兵旗幟作雙赤月大軍望其塵起連呼曰丞相來矣南軍識其幟才脱身走追殺騎兵四百歩卒免者不滿百人辛夘李庭芝挾姜才東走公率兵追襲殺歩卒千人僅入泰州乃築壘以守之七月乙已朱煥以揚州降已夘泰州守將開北門納我師執庭芝等出繼奉命戮揚州市初揚泰下公申嚴士卒不得入城致毫髪犯有武衛軍校掠民一馬即斬以徇其號令肅賞罰信有古名將風其年九月兩淮悉平冬仲北覲見世祖皇帝於大明朝殿庭陳宋俘設大讌賀平宋也因上奏曰是皆陛下威徳所致臣阿珠何與焉君臣慶洽雖􅊮弓湛露有不足喻其樂者第功行賞實封興泰縣二千户廿三年奉命北伐叛王錫喇珠等明年凱旋繼西征哈喇至霍州以疾薨享年五十有四訃聞上震悼久之詔諭有司曰阿珠平昔多負勤勞其靈車南還給馹騎六十疋所過供帳設奠葬大同宣寜縣公貴而不有其位難而克任其責料敵明臨機果聞敵所在忠勇奮發不俟嚴辦躍馬挺槊陷陣深入故士卒感服争出死力南征北討四十年間大小百五十戰未嘗敗衂其追降生擒者皆釋而不問及處閒暇恂恂似不能言論者謂公智信仁勇四者兼備與孫武合云某竊嘗考昔方叔召虎為周宣平淮夷詩人述其功績鏗鏘炳耀盪人耳目故宣王之形容與其輔佐由今觀之若神人然不過陳其車徒之盛謀猷之壯而已若夫開府公飛渡長江合勢先攻因舟於敵乗機制變間不容髪恐詩人歌功列之於雅有不足諭其美者况三世繩武為國虎臣身都將相功名自終越古無輩由皇祖元戎推誠事上顯襧都帥竭力殊方開府公奮身為國心若金石忠結人主之知功定天下之半宜乎如營平侯展用於漢宣形圖麟閣郭汾陽輸忠於唐室廟開私第盖君臣之義始終之禮自相感發固將有以焉爾異代同徳古今一時又何假魯靈獨美龍旂之祀哉爰作樂歌以登新廟其辭曰奕奕新廟有侐其庭耽耽四阿桓桓兩楹鼎薦牲牢罇湛𤣥清三事同儀品物具備上交神明下輔孝治子孫烝烝執爵而升以祼以濯乃伏乃興僾然愾然如聞形聲工歌祝告載揚我武於赫皇祖方叔召虎翼戴三聖肇開萬宇忠勇奮發所向臣虜威攝西陲削平南土儷景同飜照映中古於爍王父奮戈濯征憬彼西夷是懲是膺如霆如雷不震不驚雪山雲浄滇水波澄鱗甲肆狂皇威再暢掃除妖氛破南海浪踐騰宋境孰敢為抗赳赳堂堂實曰忠壯文昌上將兩兩翼帝羽林壘壁横大利器於惟顯襧繋時英衛師干之試折衝萬里笳鼓歸來敦詩説禮世祖再造有䖍秉鉞負固不庭俾徃式遏料敵制勝如火烈烈摧枯爍雪江海有截車書㑹同論功推傑元貞守文載念忠勤登秩錫土光融九原有來酣戰意甚閒暇釃酒臨江投壺歌雅斂之一堂泠風灑灑鐘鼓和鳴祖考來假宜其家世翼翼振振孝孫有慶聲於廟門伺候伊誰平章政事為子為臣惟敬惟義祉委祥臻忠傳孝繼子孫承之垂裕罔替秋澗集卷五十欽定四庫全書秋澗集卷
