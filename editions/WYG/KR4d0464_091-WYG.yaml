body:
  text: 翰林院不當以資例取人竊惟人材不岀政事文章而已政事但曽諳練尚可勉為至於文章自非天材有學者不可强為今翰林職掌人等樂其安簡占處名位守以歳月以次而遷有從書冩至修撰待制者今後合無從本院精人材之選為勾當不宜循遷以塞賢路定奪黄河退灘地一黄河兩岸多有退灘閒地有塔察大王位下頭目冒占作投下稻田令側近農民冩立種佃官文字每歳出納租課自餘不得開耕竊詳河水走卧不常今日河槽明日退灘安得為投下屬地今後合無將一切退灘地面許令諸人開耕種蒔實為便益舉耶律張商焦四相事狀一竊見前中書左丞相耶律鑄中書左丞張文潛前安西王府王相商挺秘書監焦仲益皆係朝廷勲德天下重望方今之務以親賢為急此之求訪疎遠如四相者識達政體綜練時宜若使之叅預大政必能禆補缺漏有所廣益傳稱圖任舊人共政此之謂也復許諸人陳言一中統元年許諸人陳言當時主意不為徒然蓋一則舉知羣下休戚之情二則視時政得失之弊三則見人材可用之實今政務方殷惟慮廣求直言採議得失今後合無復許諸人陳言内設詳定奪等官使掌其事舉明宣慰胡秪遹事狀竊見前荆湖路副使宣慰胡秪遹自中統元年至今敭厯中外二十餘年所至皆以能稱其識時應務通方有為求之時輩不可多得誠經濟之良材時務之俊傑也内外劇職皆可迭居今居閒日久理合起復以應清朝之選乃天下公論非卑職之所得私也議司獄官竊見隨路所設司獄官致恤囚徒最為切務蓋使暮夜不致疎虞寒暑罔令失所飲食以時醫藥無缺此縁當罪不使苦楚無聊損傷人命此其職也近年多以年老無能之人使充其任致獄事狼籍囚繫失所是與不設等爾若選得如徃年大都路司獄劉彦禄十數人使之盡心獄事或今後應重囚未斷非理獄死者治司獄等罪如此庶仰副朝廷哀矜庶獄之本意也禁約興利無效等人竊見近年開挑淄萊路石河致死損夫役甚衆終不能成事竊詳若輩妄開利孔明知無成萬一有效功歸一已不成害及衆人所該之家其將何罪山東之民至今咨怨今後若復有如此妄言僥倖之人宜嚴行禁約如見役興工者將來無驗合無量事重輕究治庶免傷財害民之悔又安知非姦人之計可不審慎之哉議大名劵軍竊見大名見屯生劵軍一萬二千餘人不及三年所費錢糧至甚浩大米一千萬石鈔七萬餘錠若上司近前别無驅用宜同徃年熟劵軍發還南中使分隸諸翼以備邊防其中若有年老者放還為民不宜使仰食縣官坐糜經費總三萬大名一萬五千衛輝路五千太原五千理財事狀即今包銀課程茶鹽之數歳入不貲用度不患缺少所當更張者在于一切管掌之人染瀆舊習中間多方掊取盡入私門官不得用民實受敝使國家虚受重利之名切要立法革弊使民力蘇息取之不致用乏馬政事狀竊謂三軍之本以馬為先今遇有用度不免和買拘刷和買官吏作弊拘刷則遠駭觀聽乞請於塞垣水草宜牧之地分立羣牧使通政院專掌其事預備事狀除有司常例支持外振武屯田輸粟補官最為上策易稱君子儲戎器以備不虞兼預備則造作如法犀利可用晁錯謂甲不能禦矢與無甲同矢不能入堅與無矢同可不重慎今後合無將隨路常課再行整㸃督勒使成造如法於上書冩官匠姓名以考其程於所須去處起庫收貯如是庶得造作如法不致臨時併造多不如法朽鈍不堪用度為審斷罪囚事狀竊見隨路淹禁罪囚極多省部自從以來遠踰年歳今追銀者有人填撫者有官檢災亡者有使未聞曽差一官審理罪囚者古人稱遭遇旱災多縁刑獄淹延所致即目已是秋分乞精選精詳官員曉知刑名者同按察司官分路前去審録歸斷一切獄囚恐亦感召和氣之一端又使百姓具知省部不獨於錢穀留意也為革部符聽偏辭下斷事狀竊見部吏符文之弊謂如甲以田宅告部便以偏辭有理斷付甲主乙復上訴新吏不照先行却以乙辭有理即付乙主路官知其徇弊欲從理長者歸給二人各倚原符互相不服其兩造或赴察司陳告照卷明見亦欲與之改正又縁省例部斷者不許輒改以致躭悞有累年經嵗不能杜絕者乞請上司定奪歸一母令止憑偏辭輒下斷語庻免人難開種兩淮地土事狀一竊見黃河迤南大江迤北漢水東西兩淮地面係在前南北邊徼中間閒歇歳久膏肥有餘雖有居民耕種甚是稀少宜設立大司農司招集大江南北無産業人民驗丁力標撥頃畝令一定住坐為立官給牛隻農具差税並不取要若成就後别議定奪如此不數年間開耕作熟貧民既得濟虚地又行内實萬一緩急以食以兵皆可倚用祝香百門山神事狀一輝米凖差者二千和買又不下二三千石又淇水係是御河上源一切漕運供給大都甚有功用比之濟瀆及物濟國潤民之功非細據上源水神似宜特降香火以答神休司官不勝任者即行奏代事狀照得條畫内一欵按察官聲迹不好者即行奏代今南北察司廿道每司正官與首領人員除新任未滿者是遷調員數常幾于半材不易知安得人人而當之然即其所知於初選時稱停搭配不致偏重可也其已除而不勝者若姑息待滿是知其無能令徒占位次月費俸料養資厯而己於司事何益乞請令監察上下半年巡行督察之嵗取其功罪之尤者明著之以示天下不次陞黜一二人所謂臺諌急則監司警監司警則郡縣肅誠激勸賢否振勵衰弊之一法也精選首領官員事狀近年憲司首領官多取自雜流有案牘文墨絶不通曉者其懦者備員素餐强者挾私害公紊亂官府若今後止於息任州縣八品七品職官内選兼該儒吏通曉世務風采人望出總幕之右者使充可也且憲司職雖糾强其體面全是禮法二者為用不同管民參佐衝撞辦集為能若必其取强梁䟦扈務尚口吻者是無良之人假其重勢使之行私耳伏乞詳思以存大體添書吏奏差人員禄食資厯事狀竊見按察司書吏奏差人員據照掌文案糾察等事其品雖微其職甚要今百物湧貴俸稍不足以育廉賢愚混淆資敘不足以激勸循名責實似有所難惟其養之厚故可責之重乞請將禄食資厯再行定奪稍得加重久則人自為勸若責罰黜退其將何辭關支俸錢事狀竊見遷轉官吏例攜幼扶老千里區區而就一官照得十八年正月内朝廷令州縣依舊與俸却為各處官無見在至今有未關支者是國家霈恩如常而州縣不蒙均惠方餬口不贍而責曰爾無貪吾有法豈理也哉今後乞請將隨路百姓納到俸錢另行收貯專以按月支付庶幾官吏日得養廉易於責辦罷孫招討户一孫招討户自都督史權鎮鄧州時投拜約八百餘户名之曰射生户即日散處襄鄧西山一帶合行分屬所在州郡為民當差不致别生事端罷南陽屯田户一南陽府屯田三十户徃年亦曽言其當罷其後省差官與河南宣慰司一同前徃屯所勘當定奪其本管官見户齊斂鈔四兩打發來官以此却言不罷便至今依前屯種理合罷散兼南陽縣民該驛程在城見管當差户止十餘户遇有一切遞轉差役委不能當若將上項屯田户放還為民甚為便當罷規運硝減山楂等官一隨處見立規運所硝減局并河泊山楂山場等官侵漁百姓其害非一謂如一切販買山貨等物其賣主已有認辦課程買主赴務起税及其貨賣又行依例商税今來山楂等官鎖闌山路或半道巡捉更行驗物抽分至於來自他所經過地方不憑關引取要錢物稍涉疑似監收鎖索百方侵擾竊詳山野小民貲本輕微仰之經營以供一切差役今者有此重併實不聊生所立州府為上司設置辦課衙門坐視亂行又不敢問致内負既屈控告無所據上項一切創立局司侵奪民利等事理合革罷以慰民心定奪儒户差發照得丁酉年欽奉聖旨節該中選儒生若種田者輸納地税買賣者出納商税開張門面營運者依行例供出差發其餘差發並行蠲免又照得中統二年欽奉聖旨節該己前聖旨裏如今咱每的聖旨裏華善伊囉勒琨先生達實愛滿例裏漢兒人河西秀才每不揀甚麽差發休著秀才的功業習者欽此至元十三年蒙上司差官試驗分揀原籍除差儒人該試中儒人内两丁近下户計撰充太常寺禮樂户竊見試中儒人户内多有户下餘丁不曽就試官司收係當差又有因故不及就試儒人亦行全户收差若蒙將原籍試中儒人户下餘丁不曽就試户計照依丁酉年試驗儒人聖旨體例全免本户差發外及因故不及就試儒户乞差官再行試驗試中者依例免差黜落者收係當差實為受賜外有至元八年欽奉聖旨保勘到委通文學續報倚差儒人於至元十三年亦行就試中選若蒙依例除差以為後勸薦前御史康天英狀早膺劇任備見長材當官有通變之方持論熟經事之慮考據實迹委號良能如憲臺初立首以材望擢拜御史繼授南京幕職時攻取襄樊本官支持餽運務繁益辦若以材能可以從政八路之間少見其比自秩滿居閒恬於仕進于今四年抱用未伸中外嘆惜伏惟聖朝方致理有為之秋如天英者不宜使才德空老田間以遺明時之用理合舉明以激貪鄙保郝彩麟狀竊見故翰林侍讀學士國信使郝經奉使亡宋幽囚十有六年以沈鬰致疾還朝未幾隨即物故據以勞死事誠當優恤其家今嗣子彩麟年長負學卓有所立似宜超等擢用以酬父勞且為立功立事者之勸申明宣慰使陳祐狀蓋聞忠義者天下之大閑聖王常推而褒之所以砥礪生民為當世不忠者之勸竊見故中奉大夫浙東道宣慰使陳祐厯事兩朝家無儋石迹其為官舉皆善政生而竭匡濟之忠殁而有砥礪之效孤身遇冦無路可生奮然不去為國扞賊甘心白刃正色就死雖李司徒之握節死事顔魯公之抗志捐軀無以過也至使越之部民感愴忠節萬口一辭願留葬㑹稽世奉其祀自非精誠洞貫儆動一時何能致此其於助世教厲薄俗豈小補哉况忠義者國家之元氣所宜養而不可衰也今本官淪忠泉壤不蒙顯異竊為朝廷惜焉伏惟哀憐推而褒之不惟於贈典殊常將見仗義守節之臣自兹為不少矣嗣子夔今為福建路行軍千户蓋出特旨不由門資次子皋未仕通文學有孝行如録之從政必有可稱亦旌顯之一端也修理大都南京石經事狀三聖人之教其揆則一尊其師重其教此理之當然也竊見大都南京廟學所有九經石刻刋琢極精近年以來舊制既廢舉皆散落於荒烟草棘間日就摧圮甚可寳惜且經之遺制自漢唐至今厯代聖王無不尊崇修理蓋重夫經世大法故也今海宇混一方息馬論道之時據上項石經理合修立以彰國容兼所費不過夫匠灰石而已只係有司一言力耳論黃河利害事狀夫古人作事慮未然不治已然治未然用力少而收功多况預備不虞古之善教也河為中國經瀆遷徙不常自古為患非小川細流可比竊見今夏自中堡村南卧去京城廿里而近撞圈水三百餘步勢湍悍舊築月堤一蕩而盡又自河抵京北郊地勢漸下南北争懸七尺之上中間土脈疏惡素無堤防固護以捍水衝又見犯去處不下五六十步南接陳橋六丈故溝至甚寛浚北勢既髙水性趨下斷無北泛之理故識者云已隠犯京之勢似非過論也若向前霖潦大至瀑汎之際意欲所之崩摧潰決其害有不可勝言者每歳有司規畫不過今夏役夫數千明年興工半萬縷水築堤以應一時極其所至僅能防備渰水終非緩急可恃得濟之用但幸其不為舊耳况大梁自古雄鎮今又為江淮總㑹要津日當修理不可任河作祟視為尋常萬一侵犯豈惟使民居蕩析且廢通漕控制之利民之大命又所係有重焉者蓋開封祥符陳留通許等數縣之地耕種不下數萬餘頃若漫為淀濼嵗計先失民何以生此最可慮也又聞徃年兩次南犯酸棗陳橋二門止是支流水小京尹錫吉圖們行省崔斌等極力堵閉幾不能塞况今大河正流直指南卧常人尚慮將漸為患而増卑培薄分流殺勢之議其可後哉今體訪得河自臺頭寺西東接杞縣西界兩勢平無槽岸行流虚壤中故卧南卧北大勢走作所以漸為京城害者不出此百里間而已若能舍小就大廣為規制如前金新衛所修石岸者遮障奔衝使東過三汊散為巨浸可母慮也當職竊詳每歳興工築隄防捍真成戲劇恐徒費人工損踐民田其為河防經久之事曽無少補如蒙以國家大計論之河防之議其説甚多合行重為講究方來利害舍小就大廣為規制以圖一勞永逸之舉實為便當不然據要害去處建立祠廟專使以重禮禱祭仰賴洪庥庶回神眷使河有定流不致傷財動衆亦捄災禳福之一端也秋澗集卷九十一欽定四庫全書秋澗集卷九十二元王惲撰事狀郊祀圜
