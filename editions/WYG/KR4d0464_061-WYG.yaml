body:
  text: 故善士張君墓碣銘并序善士張君諱從禮字仲和順州龍山人大父德仁有耆行鄉人尊敬之襧義嘗任燕工技府總管既老君當襲職請於府曰親老需倚余志已定弟從順賢而克荷願畀之竟以從順嗣仲和姿清介不隨俗上下嘗從澹泊先生學詩甚自憙也事母教弟以孝友聞承顔讀書外室屢空宴如也君既不樂仕進嘗曰菽水䀆歡不害養志三釡五鼎非所願也至傭筆以供朝夕平生友非逾已而不交曰吾将安倣施非當受而取曰畏将曷勝弟從順洎婦併殁孤姪敏方三嵗為鞠育成人過於已出至贅子智於友生羊舌氏家仍為敏納室是亦人難能也詹事張侯髙其孝義憐其窮獨出楮幣數千緡付之約得子錢悉助親養君以義重德薄謝弗敢當郡國知其賢以孝亷累辟亦不就臺憲亷得其實旌焉復之終身君悚然嘆曰人子奉親理固當然因而有加邦之教也顧從禮何足以為勸其自處明分有如是者所居曲水里有事告值花闕挺若儼侍温凊假日我其間有問者闕事子姑去自號栢溪主人左山商公闕得賛之闕京師之明年君來謁闕見眉間今雖已矣尚能闕以孝止善者也至元癸已春母氏弃養以哀毁致疾是年冬十月三日考終牖下得年五十有六配劉氏亦能安君貧窶早世生子智及二女適裴氏王氏再娶董亦前君殁生子曽𦵏檀州宻雲鄉之王冢原友人劉某重契義介嗣子智請表其墓以君篤行有類古人者為之銘銘曰堪輿兩間子職不易孝為化原融而友悌君於二者行不少匱濟以亷貞大錫厥類目為善士吾言匪比其善伊何可欲之謂况乎質美而學行方而義繄匹夫而化鄉人曽克施之弗異五十六年為樂也洩洩去水來山宻雲之隰隠然斧封山冢屹立是惟吾曽張仲之室過者必式後漢張霸性孝讓舉動合禮鄉人號張曽子故雲中髙君墓碣銘并序君諱祐字仲和其先雲中人髙祖已來逺昭穆無可詳者伯父與考金季家撫州以財雄邊伯父德真字伯諒潜德不仕考諱德榮伯寛其字也姿醇厚鄉黨以德人稱嘗以勞榷豐利酒伯母暨君之妣皆張氏女以姒娣而列妯娌伯生子曰信字仲禮曰義字仲仁信美丰儀虎睛豐頥載珠赴海以樂終君實仲之嗣貌敦龎性孝悌及長雖混迹闤闠衆不敢以尋常期初燕雲失守豐利府君避地南還汴梁壬辰嵗例北徙以實衛墟君與兄信素負心計相與謀曰衛居天中寔通都劇邑百物夥繁合散於此若以什一與時馳逐可致屋潤遂主貨殖為業君為人篤信明敏不底藴留既易彼取此收息且亷故聲實四出商販輿集其門貲既饒足不忍顓利自濡以東多鹽寡為得毎毎貸子錢有不克償及羣居邸舎積僦直而負者審其窘悉折券無難色由是三郎以長者稱於中外至元十九年五月四日以疾終于家夀六十有五三日𦵏汲縣汲城鄉南王里之原從新阡也配張氏與君德良稱生四子長曰明福以通幹由泰鹽管勾任河南府交鈔庫使次世英世顯世昌孫二人曰蔓曰莘姪三人曰夢得鄉貢儒士前君卒曰世傑世寧姪孫二曰革曰華重孫一曰復亨明年明福以墓碣来請銘余以同里巷者五十年知髙氏為最詳即其富潤齒息而論葢自髙曽而降凡六世雖荐更世故以孝義勤儉同居不析故也至君承父兄餘業益光大於後内則齊理嚴肅以身率先族属家僮千有餘指無間言日趨事惟謹屋廬被服務從朴素常以驕靡為戒外則持心近厚與物無滯敬畏官府奔走輸辨未嘗少厭所患謀生之不勤胡恤王事之時亟也自壬子通閱後髙氏迄今為河朔名族之冠豈偶然哉故逺服賈者雖千萬里外念寛厚饒裕獨以髙氏為讓矧髙氏以義致利義重於生因貲致富富而不驕為子孫又能求銘以昭世德是又好禮而知本者也焉得辭銘曰惟富夀五福先匪欲厚能畀全有髙氏起雲燕凡六世財雄邊至豐利始南遷編衛氓迹市􅆵居家里無間言我屋豐利匪顓益寡乏貫子錢長者稱動河堧供厥賦日翩翩曽不憚生勉旃業攸乆族蟬嫣服而食恥華鮮孝與義為周旋勤不匱理固然繼之者當鑒焉行山秀淇水淵髙氏裔與並傳新鄉縣尹劉君去思碣銘并序衛之属邑曰新鄉者其地距太行東麓桑土衍沃浸以清泉之潤民俗敷阜自昔號河朔望縣惟其物廣而訟嚚路衝而務劇故治稱為難然渴餒而易飲食者民之心也得其人苟有以拊而安之将見民戴之如父母仰之如神明惟恐來之暮而去之遽也維至元之六年南宫劉君理由江淮漕幕來主縣治君姿幹敏有機警相時處宜果於裁㫁既視事思有以事集於上民便於下於是舉條章明約東均賦役却造請凡轡馭之急遽者馴而致之不務髙逺率先以身為度縣當闗陜驛程使驛轉致日相望於道吏民疲於供頓君量其輕重處之有方無名而求索者皆以理謝之故乘間侵牟之弊日就斂息廨舎一縣具瞻陋不克治事非所以整暇也計材庀工易故而新増葺者十餘楹復起蕭相祠俾吏曺不自鄙薄以信景慕邵公橋跨清水上嵗乆墊齧兢於履危乘隙大揵硔鍤斧官栁為梁方之舊締既髙而固役不知勞而民免病涉至治道塗取通快堙汙夷峻徒行輦致坦不少阻嵗時劭農裹糧自隨周行田里未嘗追呼俾妨時作耕稼蠶績檢括課視切扵已私復諭之以勤儉申之以孝悌使遷善而逺罪由是邑里感念勤於作勞生理且滋殖矣下迨鰥寡顛連亦行得所流逋聞之稍稍復業故賦税輸納不及期而辨詞訟繁囂不俟約而簡君以令行民信教烏可後乃出己稍崇飾廟學如葢瓦級塼之破壊者丹堊漶漫之不鮮者一完而奐之復葺黼座陶祭器周繚崈垣外障儀閈春秋釋菜禮容為増肅暇則禮師儒率僚吏暨邑之子弟聴其講說使知所務故三載間庭無留訟牢户為屢空至隣有疑讞滯而未決者上官倚之丕蔽而縣之治否為可知已君既更耆舊苗仲牛古麟慕賓羅從玉郭昌祚席安等懐其夙愛有思㒺置者来謁文以垂示於後辭再四不克仍覽觀件狀而次第之且寓夫余之所感焉嘗觀兩漢循吏政顓風化子視生民訓牖惠養如恐不及凛然有三代遺風惟其浃洽於民者深至故所居即化所去見思有起祠樹碑以表夫永賢載道之意非幸也宜也迨叔世司牧者昧於治體苟簡貪墨習為當然其可見者不過曉簿書以為能飾矯偽以干譽其於民之休戚漠然如秦人視越人之肥瘠甚者因之以急張臨之以形勢剥民之肌以膏其身傾民之産以肥其室使民畏之甚豺虎惡之劇㓂讎告訐謗讟無所不至以理勢論之亦宜也今劉君以勤强幹敏力矯時弊致績用章著吏民稱道如是可謂能也已是宜銘銘曰天下之事孰覈孰綜政發於上相臣是控事終于下疇致厥用相須成務匪令奚共雖百里間務實煩閧有社有民有賦有貢兵之貧難民之疾痛期㑹簿書風俗獄訟我剖我決我承我奉粤惟良能治之有統千室鳴絃五袴流頌以致朝堂令無太偬庶事日康四方風動増秩賜金璽書褒諷繄爾責望得人為重暨暨劉尹事功自憙挺身頽流卓爾為治不務髙逺不涉苛細相時致宜因利而利瘼自我蠲聲由實致所以懐思去而㒺替截鐙願留非愚敢覬胡若稱述垂聲来世刻石縣門永照􅅠衛故太一二代度師先考韓君墓碣銘并序君諱矩字某其先為大梁望族曽祖璹五季時官司諫以銀青榮禄大夫致仕避地北渡遂占籍為衛人祖奕大觀末舉茂才數為縣有聲父渤金初登進士第有文采終獲嘉令君自少以疾不仕資慈祥家故饒財心樂施與凡親舊貧窶里喪有不克襄事者至傾刮槖箧以賙其急或者来謝曰非初心也鄉黨以長者稱天眷間太一始祖真人以神道設教逺邇嚮風受籙為門徒者嵗無慮千數君舉族清修信禮為尤至香火之奉雖寒暑風雨不爽厥德已而君内子閻以嗣事為禱真人篆丹符令吞之且曰汝家積善乆當産異人既誕師果有竒表真人目之曰他日輔興吾教者此兒也甫免抱即留養道宫三嵗識字七嵗善書既長儀觀秀偉慧悟絶人批答辭章捷若影響由清虚師主盟法席二十餘年輔興之言有充而至於極者今追定仙號曰太一二代嗣教重明真人由是而觀韓氏一門之積其來固逺以有是子而論之君之德槩可見矣雖年甫中夀師易韓為蕭至於克荷𤣥綱光隆教本在韓宗亦為不朽君既殁重明躬𦵏君於四門里祖塋之次母閻氏祔焉禮也六代度師全祐顧惟傳嗣之重猥及微末將何以圗報維是師真所從出者其潛德幽光表而銘之中心庶獲少安乃以刻文来請師於某祖妣妙清君列叔父行義不可辭遂叙其世次而系之以銘銘曰作善降祥長惡得厲在理必然隨感而至赫赫韓宗德顯河衛衍慶及君滀而奫淪俟著而發乃生異人異人伊何太一次祖提挈𤣥綱鵬騫鳳翥庇及本宗光隆丘土松栢蕭園連岡接武神格仙遊有来容與風駕雲軒同飜共馭純化追逺歸厚來昆泝流尋源以表道根勒銘墓石永賁四門太一三代度師先考王君墓表君姓王氏諱守謙字受益博之堂邑人世以播種為業致資産豐阜田以井而計者九桑以株而㑹者葢萬數焉遂為里中鉅家然闔門善良薄於世味奉道之心亟若饑渴聞太一教以符籙濟度世厄所在奔走惟恐其後君乃與其配李氏欽挹真風不逺千里求為門弟子量家嵗費外悉以贏餘為本宫香火供有子曰志沖即今太一三代度師也師生而岐嶷七嵗出就外傅應對進退皆中禮度及毁齒善記誦喜讀老莊等書初君董田務於野午憩䕃下寤寐間若聞呵喝聲見數青衣人導一童子前来且曰天仙過此可少避恍視之無有適師持壺􅄴來饁君異而不出口自度是兒恐終非田舎中物也及長父兄與議婚不許曰去家入道乃所願也遂禮二代師為黄冠以經明行修得度入道士列既嗣法席遭遇道陵特賜號𤣥通大師君聞而喜曰天仙之異誠有驗矣且曰平生奉道獲此實報王氏為有後矣享年七十有六考終牖下師以禮𦵏本縣王莊里祖塋之右母李氏祔焉今度師勅定仙號曰體道虚寂真人其師真之德靈應之蹟詳見墓碑茲不復云六代度師全祐嗣教之七年自燕命提㸃張居禮等以禮幣来謁且致其意曰道家者流雖崇尚𤣥黙而太一教法専以篤人倫翊世教為本至於聚廬託處似疎而親師弟之在兩間傳度授受實有父子之義焉今三代師真其在宗門表墓有碑嗣法有傳可謂光且顯矣然物之在天壤間未有無本而出者今末有餘榮而本為寂然豈厚人倫輔世教之理哉敢百拜以表辭為屬幸憲使無拒予以師之言誠為知所本矣遂諾而作之表故真靖大師衛輝路道教提㸃張公墓碣銘并序道有綱紀需人而後𢎞如上承師真下綜法務以公材吏用而開𤣥佐之功者其錬師張公乎公諱善淵字幾道趙郡平棘人生有異相比長言灑灑有序父溥嘗任衛真縣酒坊使時太一四代祖中和真人提㸃亳之太清宫溥素挹真風日侍師於几席間沾沾然而喜曰吾見師聴以説遂􅄁禮為門弟子中和人品髙邁道價重一世與㳺者公卿賢士夫一動靜語黙皆中倫慮公親炙既乆日有所得與之俱化若時雨然嵗壬辰河南大兵公與中和隔離者乆之既而聞師北渡税駕於趙迴奔奉焉師忻甚曰奔走疏附吾宗門有人矣即令知太清觀事丙午夏四月侍中和赴太后幄殿及見亦霑寵眷奏受真定路教門提㸃仍賜白錦法服命侍中和頒錦幡寳香於崧髙太華二嶽以祈福祐時衛之祖觀兵燼後鞠為草棘中和畀之經理不三數年神庭燕處頓還舊觀壬子夏六月復從中和北覲嶺邸加號真靖大師改提㸃衛輝路道教事甲寅嵗復奉㫖致禮嶽瀆癸丑冬詔天下名師赴燕長春宫修羅天清醮公奏五代貞常真人與㑹其所以致顯宗教推轂嗣師髙出衆表俾道流光闡公力居多已未春上南巡臨幸夀宫時公以疾不克朝謁上言念舊眷命近侍存問仍賜御藥葡萄酒服之病良已故中統二年換受宣詞有云操持堅正祭醮精嚴隨師逺覲於闕庭奉命敬祠於嶽瀆已加𤣥號宜煥新章之㫖道論為榮焉公資清峭貞幹臨事敏而善㫁馭衆肅而有方雖一言話出人意表不肯碌碌混常流中生平憙讀書於老子最有得故行已接物多掇其微妙至於禱禳醮祭内嚴外辨綽有餘裕兩從中和北上沈幾先物徃返萬里無不如志嘗奉㫖給諸道度牒鶴馭所經例有贐公略無私焉其清介逺大又如此夀七十委蛻於太一順事齋室實至元乙亥正月廿五日也越三日陪𦵏祖塋之次後八年六代祖純一真人念公有力宗門在𤣥士為傑出有不當泯於後者丐予銘之以識墓竁因摭其行實而系之以辭銘曰真靖受業始於中和荆璞雖美器成琢磨東瀛北渡載造𤣥科用匪其人道将若何公綜𤣥務辦於益多龍庭再召萬里周旋竹宫咸秩羽服雲闐尊師顯教我力孔宣𤣥綱張弛委曲而全道價軒輊濟之以權千塵而下歎其才賢僊游有限道館驚捐斲石紀行以大斯傳雖髙深兮易位尚知為𤣥門之𤣥提㸃彰徳路道教事寂然子霍君道行碣銘并序國朝甲辰乙已間鹿庵先生教授共城不肖亦忝侍几杖時有為全真學者重𤣥李鍊師自相下来買田於卓泉立棲真别館既而重𤣥北歸委紀綱士霍君明道為之營建不數年剏堂殿廊廡煥然一新際泉兩涘盡植巨竹隂翳數百畝中構筠溪亭招致吾徒徜徉笑傲其上由是卓泉道院聞於逺邇簉名洞天福地之末維重𤣥則始之勤而霍君明道實有力焉師諱志真號寂然子明道其字也系出安陽縣秋口農里大家父諱澤嘗夢一麻衣道士云自天壇来求託宿許焉寤而誕師幼不好㺯寡言笑既長性淡泊不樂榮利弱冠辭親學道父憶夙徴即允其請廼詣相之天慶宫禮重𤣥子為門人全真家禁睡眠謂之消隂魔服勤苦而曰打塵勞以折其强梗驕吝之氣師從事於此者閲三十寒暑略無憚色重𤣥驗其為受道器命主治𤣥門事挺志誠確措畫井井有法及卜築蘇門委之輔敦教基𢎞演宗緒俾特達而有所樹立焉師披荆榛掇瓦礫攻苦食淡擴充師志復闢農畝創水磑廣資生理培植教本致逺邇尊禮樂者日衆至於齋廬深静井竈修潔遊人過客如歸而仰給焉道俗推舉任輝之威儀師滌除𤣥覽痛自澄治務正已以格物有辨訟者率用理遣不知官府為何事羽流敬安一方凝重至二十載之久年踰耳順相之民宿仰道價請主天慶宫既至受提㸃彰德路道教事凡十有三祀年尊德重不俟言論而衆自化服以某年月日沐浴易衣冠無疾而逝夀八十有一𦵏安陽縣王裕里重𤣥仙冢之側師丰度清逸若山澤之臞外朴而内敏質直而尚義簡重自居處事得時措之宜和同光塵接物無徇俗之弊其訓導徒輩言約理到以身為律度可謂純乎其純𤣥之又𤣥者也門人杜志用夙承提誨圖報無方琢石紀銘期傳不朽乃介太一純一真人李公来属筆予既重李請又與師有夙昔之雅既叙其行已而系之以辭銘曰道之大原𤣥文五千誕誇索隠匪其正傳質禀貞素心地善淵惟畀也全内思静専耕田鑿井順乎世縁修已求志繕吾性天無欲觀妙是為道之自然尚無徃而不可孰間朝市之與林泉若人者雖乘化而委蛻安知其精純之氣不乘泠風而仙耶門人攀慕向雲蹁蹮勒銘松臺何千百年凝寂大師衛輝路道教都提㸃張公墓碣銘并序師諱居祐字天錫世為汲郡人父道用居樂善東北坊以茗飲為業師早失怙恃兄居仁訓育有方甫長愿立如成人然向慕𤣥風亟若飢渴思得大宗師依歸以果其腹嵗壬辰天兵下河南時太一四代度師自柘城北渡應大将薩濟蘇請主新衛昭順聖后祠居仁舉家崇奉遂命師為門弟子居無幾何度師北遷住趙之太清宫以師童侍有年謹敬不怠念焉遂度為道士俄命掌觀之廪料出納詳明儉而中禮曽無撮龠之悮度師稱其能時衛之祖觀兵後燬廢掃地度師遣提㸃張善淵詣衛興復且請師以佐葺理允焉師為戮力從事小大之役率以身先之既而張侍鶴馭北覲營建事師獨任之不十稔壇殿齋室下暨庖湢庫廐井井一新已酉春中和真人還衛顧視喜其得人已酉冬中和昇寂師辦易𦵏事焦勞為多丁已冬以事召赴行殿勞歸霑衣幣有加還貞常真人以師貞幹有節命知宫事繼陞充提舉中統三年上遣使植碑夀宫師復趣辦不踰其素於國事有光至元十九年六代純一真人嗣主法席以師道行純粹勤恪有功言於朝宣授凝寂大師衛輝路道教都提㸃七年間道流推服教門増重焉廿六年二月五日得寒疾再宿談笑而逝及斂予臨視面如生吁亦異哉享年七十有二越七日提㸃范全定等𦵏師於四門里祖塋之側禮也師為人樂易無機械苟有過須問之人而無憚於改不然咽若有物所梗其歴事三師前後五十餘載護道服勤始卒德不爽純一真人以予鄉曲故持狀来謁銘因憶十九年冬予寓大都道宫適師與㑹宵永無寐龕燈爐火尊俎談舊嘗及萬靈坑事悲世故之無常悼逝者之如是凄然動華表歸語之感故師毎嵗例清明後一日丐斂酒肴楮幣等物斗量車載展祭冢次以慰鄉梓㝠漠之魂惟恐其心之不盡也其於存殁兩間亦追逺歸厚之意也歟是可銘銘曰太一設教幽顯兩通凡曰云為須人乃崇猗歟張公德度沖融致身福地逢教之隆敦兮若朴發之天衷寂不俗絶勞而有功師事三葉㒺異初終一朝委蛻為報何豐祖垠之東萬栢葱蘢陪𦵏其側若堂有封鑱銘表石永示無窮故卓行劉先生墓表先生諱德淵字道濟襄國中丘人性癖直有操守好學能自刻厲及游滹南王先生門思索辨惑等說自是饜飫史學為專門之業古心古貌非禮義不妄言動一介不取於人朋友死雖千里逺徒步必至覩前賢竒蹟偉行擊節嘆賞而不能自已至椎耕牛以饗竇王殺乘馬而祭昭烈其或憫時之艱急人之難切於已私而不置也始則人大以為異既而疑焉終廼嘆服曰先生篤行直躬守死善道者也北渡後赴戊戌試魁河北西路逮中統建元三府辟其行能授翰林待制晚節知圎鑿方枘不能與時阿匼乃以所得成就學者立言傳後著三為書數萬言其説為天地立極為生民立本為聖賢立法敷析温公通鑑數百條枝翊章武俾承正統及見考亭綱目書多所脗合沾沾而喜曰吾天地間可謂不孤矣又通古文竒字士多傳習之凡經指授者類節目磥砢表表有所立或惜其獨善不顯諸用然振衰善俗激厲後人多矣太保劉公左轄張公以鄉曲義来周卹皆却之曰吾非踽踽涼涼閹然媚於世者也至有以禮願交而弗之允者許魯齋毎道邢必式閭致恭而去壬子秋不肖始覿先生於胙對榻學館夜參半歘起撼予曰吾於漢丞相亮論議際有所得惜不並時當有說云云至元壬午予按部夷儀謁先生於天貺齋棲遲蓬蓽心融一天自樂其樂英發之氣至老不衰問先生近何述曰適作四凶辨天府七星挽章于以張皇幽渺振濯精靈一何壯也臨訣握予手曰吾耄矣斯文未喪子其自朂行有以畀之既而聞卧疾慮乏調養詢諸友生始知先生有子樸早世女孫一適康氏子新婦女孫皆不聴侍疾卒年七秩有八時至元丙戌九月廿二日也𦵏蓬山之西丘後十五年晚進王寧合鄉國議来請曰先生學貫三才養素丘園行嫓於古人望髙乎一世没當易名用垂先範予謂寜曰士風之不振也久矣道義之斵喪也微矣安得髙風苦節如先生者哉昔孟東野以詩鳴唐張籍私諡曰貞曜程伯淳以道自任潞公揭之曰明道今扳二例如以卓行加之則名與行為顯允矣門生民部尚書戎益将礲石表墓以圗不朽大德三年龍集已亥仲冬吉日翰林學士中奉大夫知制誥同修國史秋澗王惲為之表秋澗集卷六十一欽定四庫全書秋澗集卷六十二元王惲撰文
