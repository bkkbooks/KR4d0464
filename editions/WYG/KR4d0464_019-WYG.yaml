body:
  text: 老境六詠并序夫人百歲如馳駟過隙能幾七十者又復幾人所謂倘来外物猶浮雲過目亦何足道哉因感壮年所行多輕生之事趨前太猛一也讀書過分二也飲酒無量三也妄慮坐馳四也喜談耗氣五也戰藝多勞六也不肖今年巳踰六旬念此六失覺五十九年之間何翅是耳而驚而愕且畏且怖豈勝道哉故養生之念蹶然生于中葢其勢有不得不然者因作老境六咏庻幾與我同疚者聞之不無稍有所戒亦老者安之之意也至于直逹性情以救徃失初不以工與拙為計也幸觀者無誚至元二十四年冬十一月一日秋澗老人謹白飯後即歩殘書讀罷午飱餘信歩徐行當澤車接武經過道德里談𤣥時到故人廬老便歩穩靴無襪靜愛聲璆佩有琚相送歸時燈巳上到牀一枕即華胥目倦忘書辛苦雙明六十强滿前花黒理應常酒盃縱對甘無分書卷相㸔任久忘虚室静深便黙坐午窓晴爛怯餘光悠悠未了三千牘吟諷從今付窟郎言慎養氣聚首閒談足是非到頭贏得小人歸屬垣有耳當捫舌守口如瓶慎動機珍惜無先吾氣浩坐忘深識道心微客来客去俱恬静克巳存誠恐庻幾食甘戒飽食前方丈肉如林莫遣分毫胃氣勝百解盡從中所過微軀能不病相仍已飢便飫甘能止過軟雖鮮熱則乘此是老坡真聖藥免教攜杖去騰騰寤寐絶思夢神依例倒殘更目似鰥魚了不瞑正為膽寒増展轉不縁身老惜伶俜滌除𤣥覽蹄安静宰制心君入杳𡨕昨日早興襟韻足不知青鏡鬢星星息藝休心辭筆縱横更老成秪来虚譽不根經風雲滿眼嗟何有月露盈笥笑未停肆口成章終妄作忘言休思是頤齡子淵直在心齊妙一字何嘗及性靈坐倦即眠坐暖蒲團倦自然夢歸先到蝶飛邊膂􅘡癡絶疑盤石肩井斜傾似墮鳶香散餘馨栖翠被竹摇寒影掩殘編老来境界無多味飢即思餐困即眠一作不教意氣加我體愛殺中和論性篇香冷燈殘静枕幃竹窓幽思獨依依時情乆與詩情淡鋭氣今從夜氣歸空控孤膺堅鶻坐漸驚縫掖擁腰圍黑甜滋味雖同體未分甘從朽木譏汲城懐古尚父祠荒草滿扉五城猶在陣圖圍飛梁水落横霜瀨石馬門空半夕暉竹簡有光陵寝破山川今是昔人非臨風笑煞安釐事甘著虚名博禍機夢王尚書子勉時罷中丞在揚州丁亥八月二日分明昨夜夢王褒海上歸来從鳳毛燈下留連乘醉月筆端揮洒挟風濤滿囊文具為余贈四座春風倦士豪與客忽從窓隙去惘然驚覺聽鷄號冬藏木葉歸根到閉關遇藏初匪避冬寒孔宣何苦韋三絶顔氏胡為樂一簞庭户信知吾道在光隂移入畫圖看此邦雖小無窮事定力先須似石盤小邑都来掌許間紛紛人事日多端敢言絶學来希孟不解呼盧去效韓身老轉驚謀道拙時艱難作强歌歡正須一室虚明地時著閒身引睡㸔丁亥歲十月十日夜夢乘舟渡一大河既濟望南岸一閣髙數百尺窓户北向自簷至地上下以琉璃大簾垂蔽翠色半天甚奇麗也雲問髙閣翠為簾疑是仙居擁衛嚴虹影蕩摇青帝闕海風吹墮寳陀嵐半空倒影驚奇絶千丈遥光入顧瞻我自平生多異夢似憐方朔詫雄談篘飲李縣丞靖伯約嘗新釀坐客有云酒之醇粹莫胚胎若也遂篘而飲之偶得獨脚句醉歸為足成之如能可君等雅意便當屬和時至元丁亥冬十月八日也瑟縮松風滿甕春甕頭篘飲有餘薰醉鄉日月時須到太極胚胎昔未分肯教小槽珠作滴換傾浮蟻玊為羣人間愁緒知多少一醆能消正要君誰擬鯨吞罄緑樽一盃聊示試芳温中含妙理何多味細捲春江儘帶渾談藉清光摇北海詩凴風韻繞西崑知君預報時須意免致来敲月下門透月巖偶到君家思適然一峯奇石墮吾前千金欲買初無價百穴潛通小有天花露透香滋碧潤月娥含影愛幽妍從今紫翠芙蓉夢不到齊州落照邊成氏西灣即事栽種西灣趣已成主人置酒約同傾小車来駐林間閣藜杖閒看雨後耕老圃生涯非細事滄浪清濁任吾纓少陵苦愛溪居好興在千章夏木清南陌東城占却春西灣深處最藏身青芽破粒柔桑穉紅袖迎門杏蕾新醉裏風光多樂事老来清貴是閒人就中更愛清溪水隔斷西風庾亮塵壮年心事幾虧成每對蒼髯聽細傾夢裏江河幾走遍林間雞犬却歸耕潘輿正要閒居賦蘭佩誰堪海縣纓脱却烏紗有忙事甕頭春釀漉生清海縣纓暗用解蘭縛塵纓事海縣調周彦出為海縣令也清明日花下獨酌時戊子歲廿七日游泗溪作也人家拜埽重清明羅綺翻香曉吹輕不欲把書成兀坐也隨游子出重城閒雲弄日何多態春水平橋不礙行勝事自知還獨徃一壺来就淺沙傾後一日雨中招林韓李三君子小酌且為梨花洗粧時新植梨花一株盛開花滿金瓶酒滿樽一杯歡飲得佳賔近年樂事無今歲此際閒身有幾人禄美勝於三品料臘香清徹六根塵風簷數㸃催妝雨辦與梨花作好春東坡汲乳泉圖儋州遷客玊堂仙服食天教得乳泉三咽遽驚滋浩氣一甘無壊是泠泉中朝清議孤忠裏瘴海鯨波九死邊落月淡隨人不見滿襟風露獨翛然道宮獨發乳泉香似與坡仙養浩方井冽不從炎海瘴味甘還比上池觴化機軒豁元胎溼孤影追隨月色蒼天地此身忠義在一杯三咽濯肝腸送姬仲寔隱士比還紛紛末術例從諛邂逅淇南論有餘賈傅自憐多感慨東門何意泥孤虚雨連賔館留三宿天遣幽懐為一抒覺我胸中聞未有九峯新説厯家書夀器之國醫學開金櫃得真傳濟物功深不自賢前輩衆推楊獨歩後来誰與子争先青黏有術扶衰謝白髮相看度歲年此日樽前祝君夀一杯還代上池淵白簽事彦隆哀辭素菴一氣本龍終心苦時違孰與同强仕有為三品料發言多是四書功愁隨野草憂春雨恨滿山城對月宮誰謂魯齊興起地古共門外便秋風王師中哀辭玊樹庭堦自㓜看九霄雲露到鵬摶天門折翼嗟何及宅相論微理未安咄咄向空書怪字涓涓揮淚溼門闌應憐遺愛祠前柏恨鎖秋風月影寒夀少尹寳同知寳丁平章子秀禀金天一氣晶規模全是漢專城當官治劇有餘裕臨事知機見老成門閥起身真相種天池刷羽㸔鵬程一杯領取千秋夀細看檀槽合玉筝顔氏冠詩寄浦城主仲白祠李知觀一握儒冠緻七梁金絲匀織玊為相顧瞻遺製從顔始陪侍先師見色荘巾卷在庭聊束髮玊簪横影夢升堂切雲莫羨如箕大曽冠三千弟子行紋背籐梁玊色瑳師傳原與薛同科薛模為西漢冠師出髙帝紀要盤白髮三千丈閒過春風十二窠衰俗幸存加冠禮滄浪無用濯纓歌敝餘改作須重丐玉導先期為細磋朱砂餅菊詩并序秋澗翁觀花于秀春園見菊之種甚多有所謂硃砂餅胭脂紅予謂白與黄菊之正色今變幻若爾何哉或曰接之於艾致然予試為之説曰艾火草也菊亦陽種也以二物方盛之時使客於艾之末未有不隨其主之盛氣而變者又赫以鮮者陽之精也故有硃砂之異此雖小事亦氣化之類也格物者不可不知故序玉餅金蟬爛漫秋朱砂為質更風流天機欲測司花巧物色先從氣類求孕秀似鄰勾漏井分香當上絳霄樓朱顔厭對柴桑客恐睹空杯笑不休送録事薛彦暉秩滿北上秦隴風聲化有邰規模況自左山来三年敝邑淹良驥一日銓曹得茂才撫字論功書上考廉能覈實到兼該春風領取新除去喜動關山兩翼開王尚書子勉挽辭三章淚洒行間閲尺書訃聞三至尚疑虚佳城一閟無開日聫事三年忝貳車詞筆早推韓愈健曠懐未覺孔融疎那知一夢終天别惆悵春風隔綺疏少孤綿厯太迍邅杜甫光榮四十年氣運倘来方出限愛心先斷便終天魂飛楚些和雲慘淚洒淮壖與海連左袒客衣三匝去延陵宜為聖稱賢婉孌英姿自妙年奎光空照玉堂仙空教一世龍門重誰遣三王鼎足偏曠度包荒無徼畧秋濤翻海失䲔鱣百觚未醉螺臺酒重為斯文一泫然遊蒼峪青嵓山有懐烈士甄濟重義於生視若歸封刀無復逞霜威千年喬木髙風在一片青嵓烈日暉元稹論忠真不愧杲卿摧逆與幾希環山弋獵猶知畏白鳥沖烟自在飛商左山副樞承屢念及作詩以答雅意四十年間凡九遇感公翦拂使長鳴三蒼論法傳餘藴七札量能綴賤名曉日岳祠留語别秋風韋曲餞予行傷心緑野堂前月空遣留光照斗城賀士常侍御授吏部尚書識見久歸清議裏恩光今著履聲中文章曹植波瀾小星斗潮陽譽望隆除重不知黄散目翰誠思補燮調功從今不鎖春風部管取銓衡被至公題懐孟路宋總管太夫人九秩詩卷七十邦君九十親人間此事少同倫柏舟髙節徽彤管鸞誥清光照畫輪歩履不縁扶杖健精神猶比結褵新河陽莫説潘安樂沁水花前别有春身寵家温親老健福全無似宋門榮漢宮傳訓班儀在萊子承顔綵袖横孤節勁餘湘水竹九齡春動野王城年年夀席聞佳語南極星邊婺女明和陶主簿見寄詩韻時主肥鄉簿平生鄉國共游居老去文交樂更餘苦厭物情多薄相毎吟風雅入吾廬一官稍得寛民力三飯何憂進野蔬聞説故人真吏隱竿頭還有再懸魚哀挽亾友中丞王兄五首百蛇墮地一能龍知已相須不易逢僧孺固應知杜舍臧洪初不負張公扶摇羽翮翻溟海作養功名上景鐘自笑澗松居不巧半生清露到虚蒙嚶嚶求友呦同聲五十年来好弟兄零落山丘有今以下原闕小園即事閒来無事欲何營總是栽花種栁情汲水溉餘紅藥秀遶欄看得緑隂成身參化育行當健物喜安舒悟養生放下虚窓時倦卧夢驚還聽乳鳩聲小園清潤稍堪觀翠有庭筠馥有蘭未放薔花金作蕾巳開梨蕊雪為團鳥欣有託扶疎樹客喜来頻話曲欄深院日長須細履也勝愁坐兩眉攢託陶晉卿借鄭氏所藏劉房山行草效呉體出入格房山一字三過筆此帖揮洒何其殊臨池親覩長史作透綃又是涪翁書春葩舞女多姿態逺韻髙風見歩趨手追心摹情正切託君為借今何如復作一詩以繼前韻鄭家數幅房山書自笑伎癢須臨摹五陵裘馬見年少兩漢劍履多文儒游談得叙真可壮破塚求法何其愚煩君更擊馮夷鼓未信驪龍不吐珠戊子歲榖雨日中丞王兄令李子師中攜名酒洛花相餉作詩以謝殷厚洛艶紅嬌醴味佳併攜春色照人来豐苞細拆先三嗅醁蟻連傾盡數杯北里定應香作陣西園休詠眼慵開維摩久病行當問好在春光紫錦臺括九峯禹貢解北條北境之山晉北諸山自代来自寰武嵐憲四州而来胚凝首自霍山開連延脊脈為壺口南作析城王屋排復折而西雷首出一支北走太行崖又次一支為大茂四條明白不須猜大卿徐先生挽章諱世隆字威卿金進士第陳州西華人官至集賢閣大學士故注明壮歲巍科擢上游如公樂易更風流文章海内原推轂議論行間孰與儔鄉校功成東魯盛炬蓮恩在北門優自憐狂散慚提奨争遣鱣堂一拜休至元廿一年予按部東平拜公于私第之前堂公時巳在病眷眷于予者甚欵既而卒于家夀總尹劉公一家英氣葢遼東聞説君侯有父風作牧首分青社土䇿勲誰比黒河公化行屬邑謳歌裏春自慈幃孝養中今歲夀筵光景好榴花渾似舞裙紅龍教授哀挽東郡教授龍君名華字取新廣安人善賦學及五星等術士子從之學者多所沾丐至元辛巳與予相遇於滑朝夕從游者旬日一良德君子也後至魏縣簿政有聲及兹云亾其子夔来求哀挽章特賦當年按部館南衙日夕相過興未涯楚産例佻開實學天星推度見名家大伾山下遊龍洞歸雁亭邊望暮沙此日題書重惆悵為君回首眷西華商左山哀辭商孫膚敏矯游龍千載留芳見此公佐魯謀猷原克壮定秦功力更沉雄城門被爇池魚涸臣罪當誅聖主聰老淚不縁知巳痛麒麟臺上又秋風𤓰爾佳尚書哀挽名之奇字士常終吏部尚書品彚流形萬不同銓量平允儘消通恩非出巳知誰怨天不遺賢見道窮三復苦辭歸汶上一官催老淹曹東茫茫大塊升沉裏重為清朝惜至公追挽承㫖王文康公文章四海一康公炯炯元精貫日中盧肇名先金榜重歐陽仙去玊堂空道由實學明真用義不忘君見至忠惆悵當年門下士斷雲低處望曹東左丞史公哀辭并序左丞史公之薨客有云云者余曰事機之来雖理有難處度不違於義其寵辱有不足驚者當倉卒之㑹無定力以順受輕則伊鬰而自阻重則憂悸而隕越正以不安而無定力故也嗚呼史公不少隱忍以光先正之業而至於斯其命耶抑以有未安於所受之正耶於是作是詩哀之兩鬢金貂漢九卿霜威平日柏臺清儘将事業傳鐘鼓不特家聲藉父兄自忖行藏無所歉此身榮辱不須驚辨姦聽徹唐君説淚洒西風滿豸纓丙戊歲中秋後二日夢過真定與宣慰張鵬舉相㑹作詩為贈既覺頗記首尾意韻因足成之九月十一日忽英甫過衛説張子是月日卒于真定千里提封入控臨不知秋氣上華簪紫泥頒寵何三詔丹扆輸忠見六箴機務固方前日簡論思尤比向来深無端共得團圞月轉覺孤懐愧此心蔓慶憲副良友十年局促伏轅駒解鞅歸来樂自如奔走止縁餬口計支離況是不材樗常因客過知安健多謝人来問起居把酒竹軒猶昨日清思想似向来臞寄贈介甫憲倅聞除興元總尹方聽新除入厯城忽傳改授漢中行霜空暫息鶱飛翮民社教優撫字聲興利試尋山水堰逺征先恤異鄉兵如承髙省相垂問老我山田二頃耕送徐正卿秩滿還漳南共華燈窓憶昔時只今相顧鬢成絲三年調議良多益一道将迎不易持辭别巳餘連日惡直清畱在後人思漳南术是歸棲地要與朝家作羽儀謝湯宣慰惠書閒来何物慰窮愁細把調元入校讐相業有方無限事室書能幾不容抽巳欣惠賜承蘇集復夢翻香上郡樓揷架萬籖容易覽鄴侯人道是湯侯代書寄友舊二首匪為窮愁日者書閉門經史且相娯為憐魯酒無多味任使陶缾乏見儲黄卷能教吾道在青雲未覺故人疎有時夢到烏臺月奄奄猶勝載五車半紙功名不足書暮年心事若為娯背時伎倆輸鳩拙度歲生涯儉擔儲為寂恐貽髙宻笑不才争似孔融疎退藏入宻真吾事誰遣門多長者車西村三首和韻種来佳樹日扶疎秋草當堦不忍鋤城府事囂閒静重林墟秋熟物情舒溪行改徑農耕後漁捕移梁水退餘我自興来成獨徃手拖拄杖不巾車近歲行藏匪自疎胷中刺鯁要誅鋤通明縱使同方進樸鈍何知似魏舒堂上吚嚘從肉食橘中游戲喜霜餘八騶前馭非吾事正要安徐下澤車忖量身世兩乖疎去學淵明荷短鋤時事未容閒裏過人心安得老来舒沙鷗逺泛機先識穴鼠深藏壤有餘我輩所行多倒置旱資舟楫水資車寄道之憲使仁兄匪為場苗賦白駒别来多事復何如臣門最喜心如水故地猶知里號樗落落壯為天下客潭潭老向府中居為近日二憲使不出府故云使君若問年来況山澤依然老病癯聞平章游公薨于維揚以詩挽之邂逅灤江讌語頻外臺初建首先分風雲契厚真吾相魚水情深有分民名在諫垣稱鯁直力輸王室最公勤豐碑㑹見十年後猶是中朝第一人丙戌除夜盤花紅卷燭花摇一歲迢迢盡此宵凍合臘香浮柏葉暖移春意上梅梢拊心自信愚忠在流涕還悲髀肉消揣分要知温飽力此生無地荅清朝賀文卿同簽宣慰河朔時真定連年旱灾春風花發四隣香曲巷時過笑語長議論有方消鄙薄功名無地不輝光簽書樞府孤忠壮愾敵長江一葦航今日八州歸總轄又煩和氣致時祥同簽趙公挽辭諱良弼字甫之遼東人至元二十三年南遊京洛卒明年正月二十四日夜見于夢託予合易其名諱情意甚切不然目将不暝矣遂作是詩以記其意識逺幾沉任獨勞不将虚譽冠時髦使華光動扶桑日樞府謀深尚父韜四海樊川遺隱在九年精爽與秋高分明夢裏来相託抵掌猶能似叔敖禮部尚書許公挽辭當年劍履上星辰忠謹持心老益振藥籠功名開夀域朝端風度見誠臣勒漿有味霑餘論卿月分光照近隣吾自訃音増悵望白雲長處是滹垠凶訃初傳不忍聞惜從朝著失忠臣安常每懼非常寵格物還深濟物仁貶損定交何眷厚燕閒相過更情親轔轔細約車聲去長憶同遊過闕晨宋賔客𢎞道挽辭景𤣥絶學到縱横此老猶能見典刑相府才華推上客少微光彩動前星誠身初不離儒行進學何妨雜貝經正有莫教傷餒恨併隨神劍閟泉扃公舊有舒辟劍萬有紛華入醉吟都将誠靜粹靈襟雲松卧壑存初志望苑霑恩豈本心談並齊諧疑志怪學空滄海别穿深斗間縱有龍泉氣淒斷春風緑綺琴追悼㕘政李公仲寔詩并序至元丁亥二月十日夜夢李㕘政仲寔再拜向予顧指所佩鞶囊曰吾平生盡在於此他日㑹須累君但不敢輕易發也既寤悵然者久之因追作此詩以見其神交之不昧也昔李衛公見夢于令狐綯懇其北還綯畏其精爽白于帝得以歸𦵏今李侯明以後事来託予老且閒不知何所賴焉冠劍風雲擁漢庭斗邊喉舌振孤聲漢儲羽翼非輕託蜀酒雖多每細傾身後哀榮光諡冊夢中精爽似平生分明指顧鞶囊事一縷幽光要累卿挽教官石仲遷名與義鄭州人少為縣吏後從李野齊學終于南京教官臨試東過僕射坡封書投贄識君時生猶櫝玊期三獻死愧囊金昧四知塵世驚回黄落夢帝京悲動白雲辭因思吾輩豪雄處貧賤能安貴不移送府判李侯赴調東曹其懐政備見乎辭邶衛交衝辦事難送迎終日不停鞍去官不到𤓰期代在分能教幕職安衙鼓通嚴披訟牒㕑烟吹碧淡蔬盤回看奔走風塵際却惠新除是振冠代書奉寄子明宣慰時為濟南宣慰五載因官寓濟陽朋簪盍處佩聲鏘金盤亂醉雲溪酒綉镼同披燕寝香樂事有懐終㑹合名泉無計共徜徉空餘情似康崖水一脈勾連到海長镼一作倔其物反乃今之半臂也出光武紀夀子初中丞鼓瑟春風記㸃同轉頭俱作白頭翁逺遊長得知時報微恙行收勿藥功巾卷在庭隨燕几嬰風和露溼簾櫳暮年縱有周公夢輸與浮雲度太空送史邦直之任竹山縣在房陵更在西一官雖逺儘施為王風漸被無遐邇異俗能安戒鄙夷㑹待竒姿超駿足試教銛頴發囊錐彩旗閙簇清江渡想見春風到任時丙戌歲除夕去歲椒盤一笑欒今冬除夕倍悽然奠餘靈案鐘聲後坐對隂容燭影前存沒不堪思徃事康寧還喜過今年數家剩説新春好夢到梅花小雪邊奴星具糗送窮歸夜久蘭堂燭影低梅雪溢寒嚴厲鼓枕香留暖潤盤犀試傾臘醖歆椒頌巳覺春風拂畫雞明日書雲臺上去蒼精横角看杓攜答何劉二端公屢有人来問起居近年為況果何如毎承首録常深感欲話行藏不敢書逐末有慚規什一歸田無力把犁鋤時時夢到霜臺月靜聽烏聲尚起予挽李子揚早歲龍門接茂才相攜有意上台階夜書肯信元康在詩思争髙岳掌開落月滿梁清夢斷旅墳三尺野烟埋微官殆似台州鄭拊卷題詩擬八哀三十年前成邂逅酒罏傾徹醉顔開筆端力挽狂瀾倒袖裏親攜太華来淚洒行間遺草在恨埋泉壤劍鋒摧因思秋雨蒼苔句何限令人不飲哀餞士逹御史送臺通家世契鬰蘭金驄馬南来屢見臨披露義襟餘悃愊酌量時務入精深眼中白璧真無價調外朱絃有賞音回首炎荒四千里一杯不惜為重斟秋澗集卷十九欽定四庫全書秋澗集卷二十元王惲撰七言律詩西奚
