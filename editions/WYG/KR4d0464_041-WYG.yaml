  text: 四十一
  hash: sha256:181626f3e3b4a870fcf03683f80290d5ace9fe7dd7541d627e1e3818a38c7038
body:
  text: 元王惲撰序南􅅠諸君㑹射序君子之學貴乎有用不志於用雖曰未學可也聖門之藝有六而射為重蓋射者男子之事志有事於四方也近嵗南􅅠諸君于二仲月肄諸射事予雖不敏亦從事其間嗚呼鄉飲廢而長㓜之序乖大射廢而君臣之義缺今之去古也逺矣欲人之知禮也難矣兹射也匪曰嬉逰為樂将少長是序匪曰僥倖為得将心體是正匪曰致逺為功将中鵠為善匪勝已是怨反諸已為賢匪酒醴是嗜而辭讓為恭匪多筭為能而進退可度夫如是其於修盛徳逺不肖習威儀復鄉飲而適世用不由斯而有漸乎若夫野曠天清露禾棲畆霜氣折膠秋聲厲木土氣充而耦同燕角勁而寒裂張侯去百歩之外揖遜務君子之争得之心應之手箭如鴻呌羽若星飛雖未敏及參連神凝刻注追騶虞牧野之風致矍相堵牆之觀庶幾繹已之志張本乎四方之事誠君子有用之一端也孔子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已矧君子正已之具也哉因序其事而賡之以歌歌曰古道下散文武岐中原氣折兵塵飛四郊多壘乃我責誰云武事非吾知不見東家矍相事當年凛凛無全齊丈夫况當志四方射先禄後非吾欺只今天地一射圃國俗靡靡從風披圗書束置奎宿黯弧矢高射騰寒輝冥冥天道既如此智者相時行所冝又不見臺城陷辱古所嗤舞干不捄高皇危諸人清談不適用晉室竟墮東門機乃知六藝射尤重世不可廢誠有為寄謝一丁相誚子恐人迂乃坐書癡投壺引古之人心正意誠之學無或不在也予於投壺見之矣壺之義三代之遺制也自諸侯至於卿大夫靡不行焉或堂或庭野外軍中必設兩階以明賔主之禮置壺楹問取其中也北面受矢尊其賔也兩黨相向比其誠也絃以貍首殺其等也鼓以魯薛節其事也勝欲不勝養弗能也司射申誡儆其慢也若夫左右盍簪臨壺荷矢身跛倚則壺不相直也氣渙散則志不能定也手不端則矢弗能順也必也心正意誠神凝於内坐與壺相當扶與矢相應故的然而中無過不及之差豈非誠心正已之道歟且古之為學怠惰之氣不設於身其或少焉必有休息之具曽不以奇技淫巧令人心蕩而狂也故壺之義有足尚焉然壺亦兵象也與射禮畧同蓋兵凶戰危人情之所惡燕飲娛賔人心之所欲也先王因其所欲而寓其所惡於其中俾樂為之不厭則平日之所尚乃異時之所用也且漢唐以來博戲之事多矣獨奕之技行於今不廢然迹其用心傾危扺巇一著一機司明以之眊亂靈臺為之攙搶必決其存亡而後已傳曰性相近也習相逺也術之不善擇也如此悲夫予自憲臺秩满居閒不出者動渉旬朔時雨霽堂廬清停披之餘無以休息用此以佐雅歌之樂庶幾動静周旋其心一出於正方之既飽而嬉莫知所向者其賢乎哉其賢乎哉至元辛未夏六月望日序遊洄溪序夫燕遊觀覧蓋所以増放曠而攄煩滯也故君子所不廢馬嵗戊辰夏四月既望時雨霽景氣清嘉苗擢秀二麥含實翰林先生拉二三子聨騎出郭由郡之西南按轡原隰周覽物華既而棹鞅東首尋盟洄溪之上於是歩蘭臯俯清流䕃佳樹藉碧草烏嚶嚶而遺音魚躍躍以騰水飛鳴潛泳各遂所宜悠然之思與淵流俱而莫際其涯渾顥之氣與造物遊而不知其所極先生曰吁樂哉斯遊也於是談麈屑飛朱絃聲𣺌從容質問不覺前席二三子怡然洽所歡充然有所得不知老之将至日之云夕也風乎詠歸又何啻遺塵衽而攄壅鬰者哉因援毫為之序帝王鏡略序東萊云六藝文學者之大端也其次莫如史然則史書浩博自遷固而下不啻數百萬言學者雖資禀精強至於極其致而得其要者或寡矣矧童子初學者歟近讀遺山先生鏡略書所謂立片言而得要者也其馳騁上下數千載之間綜理繁㑹數百萬言之内駢以四言叶以音韵世數代謝如指諸掌歴代之能事畢矣然先生北渡後力以斯文為已任孰謂斵大材而就小室扺和璞而輝丘陵者乎是書之出若為童䝉學習者之所設也然傳不云乎君子之道孰先傳焉孰後倦焉循序而進有不可躐等者士人張敬叔貧而好學家藏是書今刋之以廣其傳亦可以見其用心焉爾彼初學者一旦心志通達由堂入奥又且得博觀約取之法焉是則一鏡之略不為小補者也至元四年嵗丁邜重午前二日題王氏藏書目録序河南房扈王氏為衛之著姓百有餘年祖宗以孝友相傳略無長物逮先君思淵子北渡後亦不治生産怡然以閉户讀書為業聞一異書惟恐弗及其弱冠時先君氣志精強目覧手筆日且萬字不下年得書數千卷或者曰藏書如是尚爾為先子曰吾老矣為子孫計耳有能受而行之吾世其庶矣乎世人知榮保其爵禄不知一失足赤吾之族知富寳其金玉不知一慢藏已為盜所目也何若保書之為寳乎若子若孫由是而之焉為卿相為牧守為善人為君子上以致君澤民下以立身行道道其在於是矣由是而觀先君立世之志貽厥之謀何其逺且大哉嗚呼先君去世将近二紀不肖某今年四十有一遺言在耳遺書在櫝感念平昔不覺泣下因復慨嘆仕不為進退足自樂蓋所恃者此爾然置之而不力其讀讀之而不踐其道與無書等矣傳曰遺子黄金滿籯不如教之一經此誠先君之志也可不懋敬之哉至兀四年秋七月曝書於庭與兒子孺校而帙之則各從其類也述書傳目録叙汲郡圖志引客有過僕而問曰子之經求衛事纂集圖史所向欲何為哉僕應之曰述先君之志也昔先子無恙時嘗訓某曰衞有圖經舊矣北渡以來百訪而不一見世郡人也生於斯長於斯宦學於斯聚族屬於斯由宋而金而皇朝百有五十餘祀不謂之遺俗可乎且衞得天中桑土之野北通燕趙南走京洛太行峙其西大河經其南河山之間盤盤焉一都㑹也及論其郡國之本末輿地之因草牧守政教之賢否土產風俗之醇醨山澤利益之隠顯人物古今之盛衰則藐然不知責将誰歸至如淇水名川也而指為李河銅闗近防也而曰壁列門羌公顯號也而曰康叔塚殷溪明表也而稱太公泉共城伯國也而曰段天子城趙越太守也而曰越王墓淇口㑹亭也而曰衞新臺岡名博望而記張騫山號仙翁而歸葛氏眎獲嘉而曰故城以頓方而作頓丘枋𠂻而為枋頭而又汲水湮而無聞金堤蕩而失據其甚則白圭訛而為雞黒麓謬而為鹿迷惑忘返以至於斯可勝嘆哉是皆吾平昔欲正之而不忘者也吾老矣終當畢此一事付之青箱無幾先君捐館雅志罔就嗚呼痛哉中統建元之三年予自堂吏來歸閒中紬繹經史得先人所藏遺書淚洒行間愾嘆乆之曰精爽不昧有繼志述事庶少慰爾於是聚書一室研精致思蟫蠧羣言外則訪諸耆宿雜採傳記碑刻復為按行屬邑以覆其所得噫汲雄望也自康叔迄今幾二千餘嵗其幽光潛徳靈蹤盛跡隨陵谷起滅不可殫紀徴文獻則墜簡已亡懐舊俗則高年無幾瞻言丘壠旌紀寂寥不肖何人能發越其間哉然先子遺教不可墜也良史所載傳信後也故特取其人物政教風俗關於治亂為後世之法者羣分而類聚之復著辯論等篇凡若干卷題之曰汲郡志曰郡者何包上下而言也書成因自笑曰諺有之家畜弊帚享之千金其不肖之謂歟然非敢示諸作者庶幾來者志存肯構其治梓作室以是為樸斵垣墉之始丹艧塈茨之本可乎客唯而退時至元丙寅秋九月重陽日引㑹玉簪花詩序玉簪花之名品也然唐宋以來騷人賦客歌詠不多見豈花之種昌於近代歟較其繁昌在京師為㝡盛豈花之性憙凉風土使之然耶當其庭軒暑退幽砌凉新翠筳高聳瑶花盛陳湛露氣於碧霄映仙姿于月戸素影以之輕盈芳心為之容與至若肌膚綽約來姑仙也緑雲婆娑墜曉鬟也幽香濃逺𣺌不知其幾許也其畏景便隂低昻倚佇意韻飄瀟如欲輕舉所謂玉華同駕紛簪導以何翩風標可人占高秋而原闕所安神不為之餒而敢告來者能永遵儀法不惟徳歸於厚有以見吾皇考繼述啟廸之方祖妣承家守節揚厲無窮之意也至元三十年夏四月翰林學士中奉大夫知制誥同修國史裔孫惲百拜而為之序南陽府瑞芝詩卷序天地之大氣無不周也其至和純粹之極隨徳感召而禎祥之故應於上則有卿雲景星發於下則有醴泉芝草芝為物尤瑞然產之不恒秀之而特異者蓋不一二數焉完顏公尹南陽之明年有芝產於方城民家凡四本誠秀麗而殊常者也其駢枝連葉突如雲興幢然蓋植有累至十六七者英華瞱瞱顏如渥丹可翫而愛郡之吏民視履考祥奔走庭下咸謂公視事以來行有以召之故也如役使時而田里安賦斂均而物情允疲痏者為之息肩苞體者使之不夭是慈祥愷悌之方拊循惠養之實浹洽備至感召休徴物效靈光者也公曰方今王澤丕流皇風逺暢意者仁厚之化行乎江漢或者衣被草木昭回光而為開先之兆也昭昭矣予何敢以當之即篚置以聞衆復曰非常之瑞歸美於上臣分當然弗產於鄰郊它邑而呈祥於提封涵濡之下不蒸於顛枿棟隆而擢芳於陂澤野人之圃亦由布宣中和𨗳揚徳化下克靈承之自也是不可無聞於後遂繪彩靈姿求太史紀瑞者屬之俾上以頌天休滋至之繁下以見郡守惟良之美適余將事在申因其請樂為書之卷端文府英華叙僕自弱冠時從永年先生問學先生以科舉既廢士之特立者當以有用之學為心於是日就通鑑中命題或有其義而亡其辭或存其辭而意不至者課之以為日業雖云此何時也然觀多事之際斯文有不可廢焉者小子其勉旃及長年以來綿立世故愈知先生之言為有徴至元三年予自魯返衞居閒痛悼墮窳日以書史振勵厥志因觀古人臨大節處大事征伐號令渙汗云為之際含章時發以之功業成而聲名白者良竊慨慕焉遂斷自戰國以上迄於金取其文字粲然適用於當世觀法於後來者得若干首題曰文府英華非敢妄意去取第類集以廣怡悦其或從事力列屬辭比事庶有效於時實自先生之教之中來也是不可不序四年丁邜秋孟三曰引宋總尹母夫人慶八秩詩序人與天地參所貴者生所欲者壽福全徳邵此又壽者之可樂也予宦遊燕朔接世家甚多至於享高年之安具五福之慶者總尹宋君母夫人其一也夫人姓魏氏濟南人出膏浸醲薰世為名族及歸處士貞順儉約被服僮僮早夜以中饋是承處士姿沖適樂易以文儒重一時為中令耶律公所知憙賔客樂施予尊俎談詠有承平故家風味故軒車填咽鶴蓋交隂於門者無虚日夫人躬儉内助壼儀有則賔至率擊鮮供具佳肴名醸齊潔嚴整未嘗計家有無俾不足於賔所也處士嘗與客語乆夫人適於户間有所聞客去即曰直諒易言我雖誠人則有愛惡焉再思可也其順成輔佐君子至意類多此四子俱教之讀書雖出就外傅庭訓之際以孝弟忠信為主曰孝者行之源悌者順之至忠者臣道之極信又朋友所須以成者立身揚名本其在於是汝等敬之勉之古稱隂教有助夫人之謂也長曰漢臣河南府路總管忠勤長厚不類今人次魯臣愿而克家恬於仕進次唐臣才碩有幹局侍儀司法物庫使次楚臣博學多藝能有處士風上邸潛時以琴阮侍左右有年今以致養日嚴為事夫人今年壽登八秩康寧精爽髪㣲艾容睟然飲啖如五六十人嵗時拜慶子孫滿前斑衣綵袖雁行玉立其圑圞香火之情雍肅閨門之化融融洩洩萃於一堂之上不謂福全徳邵可乎吾是知二南美化本於正始而有麟趾鵲巢之應洪範之九五根於攸好徳一言而壽為五福之尊禎祥有自於宋氏槩可見矣求諸公賦詩歌詠其可貴可樂之美屬惲而為之序總尹湯侯月臺圖詩序蘇門山水明秀為天下甲蓋有東南佳麗瀟洒之勝而無卑溼蒸炎之苦誠中州之江南也湧金門外西南行三里而近曰蘇氏别墅中有大石月如周列座鼓八因得名曰月臺其形勝大槩溪環竹外山倚雲旓空翠湖光動盪無際蒼烟白鳥容與鳴集渡野彴穿林篁而入中鑿蓮塘削方洲構亭其上青梅蒼檜四面間植竒花異卉繡錯其下牡丹臺酴醿洞又為東西别圃春則醉其香夏則清其暑秋月可玩冬梅可探而賞也四時之景皆新而其樂亦無窮也暮春初郡人遊歴始於百泉曉翠經栁湖雙塘梅溪而南迄焉止息故共頭月臺實為一方首尾之冠至元丙子春予自晉東還取道共城友人於焉觴予為一日留覩其廢磑修復堰溪高敞雲烟竹樹光賁疇昔詢之知為府尹湯侯易而主也是年冬與湯㑹燕出所繪月臺圖且曰為仕宦牽率罔獲徜徉其間以遂初心今欲求諸公題詠庶見其素藴雖南北東西時得展玩猶一到其中也吾子為我序之嘗念天壌間佳境幽人勝士樂之而不能有豪宗貴族有之而不暇樂三十載間吾見此四易主矣不知當時賔從輪蹄凡幾徃返得窮雲烟魚鳥之趣彼幽人勝士暢情適意不以物之有無為樂而貴游豪宗雖有之能遂其樂而樂方為己有雖然今君以才術通顯投功名之㑹膺長沙方岳之寄而能以此為懐豈他時倦游知止之心急流勇退之舉將張本於斯歟十四年上元日序博古要覽序予性澹癖無他嗜好獨於古彞器愛而不置雖造次必摩挲瞪視辨其銘欵為何代何物間有所得則悚然起敬想見當時氣象令人有不能已者第所見不廣究其義未詳耳十四年春余入翰林四十有七日侍左丞相耶律公於玉堂坐間出宣和博古圖三十卷示予因假以歸與院史趙復取鐘鼎韻歐陽子薛尚功欵誌吕氏博古李羣舒考古等圖㕘讀而節約之觀其制作之精㣲錫用之所以篆籀之古而不苛文章之雅而不廹取物象形垂儆萬世其為法深且逺矣因念三代吾不得而見之得見是器斯可矣矧㣲辭奥㫖引據考證於昭粲著生平所疑前賢或闕而莫可致詰者一覽而盡得怡然理順渙焉氷釋筆削既己從其類而作若干卷題之曰博古要覽客有過而笑曰子之學棄俗尚從寂寞惟恐其不古也其如適越而冠章甫何予應之曰不然方今明天子御極神聖慈武撫四海而有之禮器縟興將維新是圖一日告功神明郊祀饗獻之禮行有每事而問者據所得而告之曰此鼎也彞也卣也匜也爵也罍也犧也象也如是而己其於魯兩生間安知無一日之長乎客笑而退於是書以為序書畫目録序登崑崙之墟者知宇宙之大臨滄海之淵者見魚龍之富故逹人大觀必於物之所萃而致意焉乃能窮古今之變極天下之觀否則與管窺等耳若夫歴代之法書名畫唐以太宗嗜好之篤宋以徽廟耽湎之甚搜訪百至品第裝潢比三代傳寳至陪𦵏昭陵閟藏内殿仍置官典校署之曰秘府何其崇哉當時自非寵錫貴近賜觀諸王思欲頫首一窺胡可得已且唐迄今五百有餘歳幸而存者又無幾唐亡而五季宋殘而金源氏金滅而國朝興其問兵亂相繼散亡劘燼又不可勝紀聖天子御極十有八年當至元丙子春正月江左平冬十二月圖書禮器並送京師勅平章太原張公兼領監事仍以故左丞相忠武史公子杠為之貳尋詔許京朝士假觀予適調官都下日飽食無事遂與左山商台符叩閤披閱者竟日凢得二百餘幅書字一百四十七幅畫八十一幅怡然有所得冲然釋所願精爽洞逹滯思為一攄所謂升崑巔而見洪荒之大俯溟渤而駭光怪之多也嗚呼三光五岳之氣絪縕盤礴發於人為精華傳於代為英物以數百載萃聚藴藏之盛積而為崇丘澮而為淵府一旦顒顒然拭目而觀可謂千載一遇也因念人與事機其㑹與否皆有數存其間九年春予一夕夢謁平章張公名易字仲一太原人於府第之東堂酒數行發書一櫃示予皆彩圖繪本金文玉牒今觀中秘所有璀璨輝赫與夢中所見者盡同吁亦異哉傳曰嗜欲将至有開必先信哉斯言也作書畫目録序故翰林學士河東南北路宣撫使張公挽詩序嵗甲寅冬先生奉故經略史公委過衞惲以諸生贄文上謁承顧睞獨異迨中統辛酉先生自河東宣撫改授翰林學士兼中書省叅議其秋惲亦以都司就列機務之暇接論思殊欵至元二年公以前東平宣慰起復簽山東等路行省事適惲從事在魯又奉閒燕者兩月六年已已冬不肖應御史辟出真定候公於頥齋尊酒從容言笑竞日因及西臺故事時公精力未衰慨然經世之懐尚眷眷不置也厥後惲官平陽飫聞公鎮撫時政蹟章章在人心不去者甚悉私念自甲寅迄壬申嵗廿年間與公㑹合者五聨事者再似不偶然也故知公為頗詳公資剛嚴有經濟器業遇事風生果於斷畫其廷議愷切矯矯有長孺志節至扶善良嫉姦惡又似夫王義方對仗時辭氣生平素藴在河東展也盡至今三晉問愛仰如神明乃以霹靂手目焉雖時致齟齬其耿耿自信不疑者氣終不少下公殁後三年甥王革來過進惟疇昔愴然動零落丘山之感余亦為歔欷也想遺直之不復悼斯文之如綫勉為哀挽庻荅顧遇知已之厚且待封龍招來之些魂而有靈鍳兹哀悃公字耀卿姓張氏太原友城人早與進士聲籍塲屋既而以臺掾進為人儀觀秀偉山立揚休望而知為正人端士壽八十終鎮州頥齋其自號云不書名貴之也至元丁丑秋謹序趙徳明母劉氏慶八十詩序人皆以壽為樂然使吾親壽壽而康寧兹人子之至樂也鼓邑趙君徳明予官晉府時幕從事也每與之接不下帶而存者皆和氣愉色其臨事行已洞洞屬屬若持盈奉玉惟恐弗勝予異之而不及問戊寅春㑹京師稱其母劉氏金進士都水監勾之女穣縣簿耆徳唐甫之妺年雖高聰明安健紉縫在手不持杖作筋力先懐逺府君不幸早世三十年問昶暨二弟靖炳頗試所歴及有孫六人女孫二人重孫二重女孫六同居無間言是皆母氏慈愛恭儉隂教有方之力也昶等不肖愧弗能紆青拖紫儋爵錫圭以顯榮為養用報劬勞之徳今嵗壽開八秩将南歸省慶尚頼賢士大夫見之歌詠歸慰母心以為閭里光予告之曰壽福冨貴衆人之所欲也若今之富貴似可求而得惟壽與福命之於天不可幸而致彼高明家雖三牲日養未免使親有顧慮可憂之慼崇髙而安者子孫多親不迨之嘆今君職雖卑禄雖薄與仲弟輩怡然以志為養其樂也融融吾知案上一杯菽水過於吾鼎七牢矣時也恒山之陽滹池之濵風和而晝明鳥嚶而葉粲緑萱婆娑於堂背舞袖斕斑於膝下朝而倚其門夕而倚其廬俟子之來歸君其行矣試以吾言語之鄉人而曽閔和樂之氣将有聞風而興起者焉至元十五年季春清明日序潔古老人注難經序醫之有難素猶六經之有春秋易也書雖盡言言不極意神而化之存乎其人潔古張先生醫師之大學也以是書注釋雖博未免有仁智殊見體用不同之問於是研思凝神探索𤣥奥發遺意於太素之初出妙理於諸家之表使體用一源得失兩判復隨其疾證附以禁忌方論述經觧廿四卷先生高弟東垣老人以其書授羅君謙甫兵後文多墜簡及得田氏口傳易水遺㫖百餘條苴補脱漏遂為完書予嘗觀其㫖要顧天下之事未有不極其理而能臻于妙者矧醫術精㣲主司萬命惟其至精非一世之所能備惟其至㣲非一賢之所能窮故軒岐開天如大易之書其卦越人撮要猶三傳之贊其經迨潔古講觧古今之善傳注之能事畢矣誠生民之命脉醫學之淵㑹也嗚呼醫固難事學即能至至於提挈造化㑹歸一身如秦扁闚五臟而洞癥結察形聲而辨死生推原本自心融手應坐収神聖康濟之功要以理明學博精詣其極有不期然而然者其功用之實咸在是書學者宜盡心焉而太史公稱扁之術得於餌桑君之藥飲上池之水特以診視為名恐未之思爾謙甫将板行以壽其傳求題諸篇端予嘉其學術及物之外能光昭師道如是可謂知本也己先生諱元素易水人潔古其自號云至元十七年歲次庚辰中伏日序宋東溪墨梅圖序性之所得於天有不行而至不學而能者况托物游藝意存所寓者哉總尹漢臣善寫梅樂之終身而不厭且梅以墨繪黯淡枯寂無聲色臭味可嗜而悦蓋性之所得有不容自已者余嘗踏雪過南塘入東閤主人開尊小酌醉中出示所製溪雪春風等圖亦以淡僻故為把玩者乆之覺冷香疎影動蕩於几案間令人翛然有孤山籬落之想後考試洛陽復與君㑹府署之梅花堂庭之所植者皆是也因舉觴相屬曰永南梅之淵菽又乆官於此殆将俾使君移船花光臻超然之極致耶東歸悉以近作贐予其風味之勝瀟洒之工又非向時吳下矣及入汳觧装盡為好事者索去嗚呼君今己矣梅寧復得耶其弟唐臣義夫輩追憶風流事亡如存聨綴遺墨求名士夫題詠将昭大兄游藝之美來屬引其端漢臣於余契乆且敬故知為人頗詳君天姿誠悃與人交有終始於修身齊家孝友純至一門之中融融怡怡以及於政是知託物寓意於歲寒三友之間者不徒模寫形似俾自得之趣冠時人而名後世也十七年立秋日秋澗序新修調元事鑑序士之有志於道者當以聖人為則有志於天下者當以宰相自期降是夫何言焉然宰相者輔天子坐廟朝經綸一世豈偶然哉是在彼者得之為有命而在我者烏得而不盡之哉况相之為任正已以格君心之非進賢以盡知人之鑑理物以代天地之化權宜以成天下之務尤需以學術而為之先若不學無術則闇於政體是最大臣之所深敝故賢如傅説典學初終聖若周公思兼四事迨夫叔世多故大學之道不明於上燮理化為權衡論思變成機務相之徳業其所存而不亡者幾希矣此事鑑之所以作也嗚呼三代而上如禹益稷契其謨猷徳業光極臣道日星麗天尚何議擬故斷自殷周已來終之近代上下千有餘載間其相之賢否具列無遺俾歴朝之用舍一代之安危前後差易咸集於是至若善或當與詳其所可法惡或可奪書其所由然凖以夔契伊周之所行斷以孔孟諸儒之正論問以臆見附之要本徳學材識公明正大以道事君為事業經綸之最至如遭際聖傑不善更化祗以權謀功利為尚雖濟一時而不可多得終非鑑之所先務也僕老矣壮而所期見於世者百不能一必故朝夕覃思是編庶成一書亦畎􅅕不忘之心也俾後之君子有志於斯民者識前言而明治體稽徃行而處事機其於衮職不無少有補焉至元二十年歲次癸未夏六月十有七日序顔魯公書譜序古人以書學名家者甚衆今獨取魯公而譜之者重其人以有關於風教故也兼公之書上則窺三蒼之餘烈中則造二王之㣲妙下則極古今書法之變復濟之以文章氣節之美故後人作之終莫能及東坡云評書兼論其平生苟非其人雖工不貴昔莆陽鄭樵嘗集公代有金石刻得七十有五予之耳聞目覩洎有其名而亡其書者得六十有二備録家藏實有五十有一只以澹僻酷愛營求三十年之乆纔所得如是念其嗜之無力自非夤縁物聚於所好亦己難矣嗚呼公之書今存於世者無幾加之歲刓月敝有磨滅而己可勝惜哉若夫千金之璧為世重寳人能碎而不蘄者以求而可復有也若公之書寕復再得邪故余作譜按公春秋與所書碑刻歲月官封詳考而次第之俾觀者知公之書因物賦形變態百出其胷中忠義之氣葱葱鬰鬰散於筆墨之間者至終老而不少衰所謂止見性情不見文字令人想見當時氣象有興起而不能已者是不亦關於風教者乎譜既成客有過予而問曰二王乃真行之祖顔陳縱横曽不踰矩曷若即而為法乎余曰不然孔子吾徒之願學也然升堂入室固當有序若即此而求臨池之妙則思過半矣客謝而退至元癸未得伏日序衞生寳鑑序醫與造化參學之精者為難至著書垂訓冀後世必然之用者為尤難羅君謙甫東垣先生之高弟嘗謂予言初授簡席下東垣曰汝将為為人之學歟聞道之士歟請曰徒雖不敏幸䝉先生與教理之深詣乃所願也故十年間雖祁寒盛暑親炙不少輟真積力乆盡傳其秘淑不傳之妙大抵人之疢疾不外夫隂陽變徴我能叅兩間㑹一身推窮其所受根源方為可爾用是以所得騐於日用之問如敵在目中然後審藥為攻未嘗不如吾之所必取也因集為一書題曰衞生寳鑑曰辨誤者證世之差謬明其理之所自也曰擇方者别夫藥之精粗寒燠以酌其疾證之宜否也曰紀騐者述其已之拯料與彼之深淺見其功効之實也僕平生所得者如是吾子其為我序之子聞醫之為學古聖賢致知格物之一端也軒岐以來難素靈樞等書累數千萬言自非以醫為己任者孰克而究之若羅君者可謂以醫為任而究其理之所自歟昔王彦伯醫聲既白列三四竈煑藥於庭老㓜塞門來請彦伯曰熱者飲此寒者飲此風者氣者各飲此初不計其酬謝今羅君亦以道心濟物復能著書垂後冀必然之理其仁心普眼當與彥伯同流其誰曰不然故樂為題其端云至元癸未歲清明日序王彥伯酉陽雜俎云唐人為道士善醫術秋澗集卷四十一欽定四庫全書秋澗集卷四十二元王惲撰序與左山商
