body:
  text: 秋澗集卷二十六元王惲撰七言絶句華嶽廟留題朝來松檜重烟霏仰面蓮峯翠撲衣自笑愛山心不足日斜猶未駐征騑祠前喬木老輪囷閲盡長安道上人千古倚空仙掌在好為回首障兵塵蓮峯卓㧞見雄尊千刼孤撑碧玉盆總被少陵收拾却諸山羅列似兒孫乖崖一出著高勲回首猶慙華頂雲應笑豹林种處士擬將虚譽售時君東登岱頂雪彌空上徹中封似不逢應有此行何豁敞青天白日對三峯渡渭有感當年尚父欲誰親八十西來釣渭濵馬上行人應未了莫教虚負百年身秦亡漢起兩悠悠總把興亡入海流汀樹岸花三百曲烟波都屬釣魚舟安邑道中六合雲蒸一氣埋際空秋稼委枯荄馬頭赤日疑無色望㫁青林雨氣來洪洞道中望霍岳諸峯老澗彎環兩翼分一川草木氣如薰土人更説山靈異欲雨先占霍頂雲留題霍嶽喜遂平時景霍心適逢嚴祀一登臨感通固愧潮陽筆霧雨重開萬壑隂山腰明霽静烟霏嶽頂雲濛淡欲飛巖壑似供詩筆健法身都挂六銖衣題豫讓橋死堅鐵石表孤忠一水曽蟠萬丈虹太史注書隨俠例豈知風義本無同過益昌橋盤盤危磴轉山腰下瞰長河漲怒濤霍邑南邊趙城北滿頭風雨過昌橋霍州四擁中坳一豢牢快心唯有霍山高一條彘水從中過日夜隔城聞怒號跋范蠡歸湖圗霸越高勲土苴如五湖歸隠號陶朱扁舟共載西施去却恐時人是厚誣題趙城縣環翠亭秀色四圍供坐嘯山城終嵗早休衙陂塘清淺知秧稻畝嶺横縱看藝麻簡城南北幾經還赤日紅塵赭背顔歘得解鞍心適喜暫容高臥對東山趙城道中早發積雨晴來露氣餘風枝成滴草􅂷珠麻衣半溼溪邊路常記郊原五月居跋米元章蘆鴈圗西風萬里下衡陽水宿雲飛固自雙似為呌羣心事苦不教相映睡秋江煙渚潮空退暮沙依稀寒影落蒹葭何人解化雙飛翼拍拍隨君問使華甲戌嵗門帖子全家温飽荷恩榮闔郡清寧嵗屢登蟣虱小臣何所報一公之外復何能不求富有金成穴不羨官榮日九遷但願時和身健在大家無事過今年庖舎門帖子王家供具乳蒸豚石氏庖厨蠟代薪二者侈荒何足論一簞顔巷世歸仁山市晴嵐墟落人家半夕暉太行天上倚烟霏喚回二十年前夢共伯城西載酒歸古栢寒鴉亂鴉蒼栢晚相依流水孤邨句未奇恰似首陽祠下看夕光翻影上枯枝松䕃寒泉坐䕃髯龍夢巳醒更堪幽谷亂泉聲遥知緑綺相逢夜幽思中含太古情雲竇飛湍千丈懸淙落碧霄百巖回望冷瀟瀟若為借得天瓢手傾向人間救旱苗蒲中十詠為巖卿師君賦并序中條山水雄秀照映河華予兩年以事抵蒲畧獲遊賞然雲烟勝概旦夕不去其懐嘗思以數語道其髣髴心在而未暇也至元十年秋九月蒲人師巖卿拉王國器李仲和張師徳諸人攜酒過門盃數行袖出錦嚢巨軸曰此蒲中十詠也因徴詩於不肖逮明年甲戌正月辛已予以微恙閉閣少休隠几瞑坐神與境㑹既覺晴日滿忩幽思發越眷焉十題卒然而就顧不足發山水之清音聊以移方寸而外形骸也且為四老人一胡盧云蒲津晚渡落日西風送棹謳行人無數立沙頭君看一葉顛危甚何不忙時且少休舜殿薰風巖廊瀟洒壓城闉解愠歌殘又幾春一道殿簷涼似水至今猶有夢華人虞坂曉發雞聲茅店月微茫山逺行人促曉裝良驥虺隤身自健不須拭目認孫陽首陽晴雪前冬兩拜首陽祠野雪摇光晚霽時蒼栢滿山人欲去亂鴉翻影上枯枝鸛鵲波聲洶洶河流入斷山馮夷無力障狂瀾東風破浪他年事且挽清雄上筆端東林夜雨瀟瀟風雨暗秋山聲滿疎林萬珮環拂曉開門看晴霽白雲依舊伴僧閒林亭夜月大内扶君不見人野烟碧樹總傷神應憐一片林亭月曽照司空淚滿襟王官飛湍石竇懸流雪練飛夜深和月映松扉恨予不遇貽溪老一笑山間説化機西巖疉巘東山如髻鬱重重人倚西巗第一峯似是晚烟開畫障濃揮淡抹鬬丰容媯汭夕陽溪痕春漲碧迢迢一帶斜陽映野橋風土亦安􅁵降意野花如靨㸃裙腰贈寫真賈生氣貌昻藏野鶴姿賈生模寫有餘師情知不入麒麟畫剛為天朝飾羽儀秋澗集卷二十六欽定四庫全書秋澗集卷
