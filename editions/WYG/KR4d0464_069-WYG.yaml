front:
  text: 六十九
  hash: sha256:9d944a73c9cec48d82772c5a616cbb05a003e4799a1807c125c15a4962c9a5b2
body:
  text: 元王惲撰疏衛輝路創修文廟疏竊以廟而通祀國家極典禮之尊教以多方庠序乃風化之本子焉而父臣焉而君大凡日用之間無匪聖人之道既冨而教以時則冝猗嗟君子之邦久曠素王之位吏之不職孰此重焉學之不講是我憂也爰興丕構庸示教基擴前日輪奐之規敞百代神明之觀經始雖先於一府賛襄實賴於諸公蓋土木之資瓦甓之用須豪傑而共濟庶程度之可完仰止翬飛永鏘玉振春秋二祀肅豆籩三代之儀衮冕而王還文物昔年之舊凡我同盟之者即當聞斯行之謹疏大成殿上梁疏伏以起百年之廢不渝乎素心合四境之人用扶其修棟凡曰有生之者孰非吾道之中功將底以落成衆能無於小助况鄉校半讀書之子而師帥舉稽古之流重瞻邶衛之文久被絃歌之化推求治本一出儒宗敢紆長者之車來聽兒郎之偉謹疏重修衛州蒼谷山廣施王廟疏伏以民所欲而神必從冝深乎報神有享而民乃主否則疇依顧維明神爰處蒼谷司分兩部權控龍威時罹暵乾禱輒靈應且王號已昭於舊典而秩恩又見於新條比者祠宇年深榱楹日圮塵昏畫像慘雷轟電掣之雄瓦落宫墻動木老雲荒之嘆今將上完霧棟旁奕蒼池及時瞻山雨之來闔郡享豐年之賜神報久已豐矣公等冝何如哉謹疏隰州蒲縣重建嶽廟臺門疏伏以鐵鳳翔雲固神棲極於壯觀銀臺墮墜必天廢假於人謀眷岱嶽之行宫據蒲城之古麓豐碑具述厯代増崇雖作鎮於東方實普臨於率土有禱輒應顯化殊常盖幽明不測之秘神而生死總歸之巍府茲非尊奉曷致敬恭今將大復神譙俾還舊觀計百廢以實博顧一己而難為衆力經營厥功可僝舉䝉少助不日告成靈威肅喬木之風雲氣動孤山之色璇題藻棟儼九天來格之儀僚宷黎民獲三殿護持之福幸垂藻鑒請署芳題玉清觀化縁疏竊以雲飛鶴舉固所去以為常火食屋居在有生其可闕未遂山林之徃所期性命之安如某者忝鄭圃之居久滿户間之屨慕子真之隠擬耕谷口之雲雖南鄰北里総是檀那而凌雨震風可疎寢處為歸翼數飛於夢蝶奈拙謀復甚於林鳩王録事倘助於草堂庚桑楚庶休於畏壘田園成趣平分乎二頃煙霞杖屦它時共樂此一庵風月凡曰通方之士能無尚義之心鄆城縣普濟寺化縁疏伏以建升道塲不獨為天女散花之供祈聖人夀庶或盡臣子永命之心眷髙魚之北鄉迺獲麟之西鄙古瞻勝槩地發龍光已霑普濟於明經未覩華嚴之寳界今將百堵具舉精藍聿修需仗衆縁能成妙果道昭者雲龕野衲托鉢者海嶠行縢卓錫得泉了此這場諸佛事投竿在水肯教空載月明歸謹疏請黄先生徳新主善疏三年至穀諸生忍廢於光陰一卷立師學行首明其模範惟大冶有鑄金之妙良工收琢玉之功况漢庭發䇿本之明經而近代程文自有定體欲造科塲之㨗徑須求事業之專門伏惟殿元先生藻發儒林道傳絶派繼踵于黄氏三山之後探頥乎上古八索之前而又馳騁乎百家通貫乎一藝春圍陣合筆驚風雨之聲夢澤胷吞文麗江山之秀久矣倦㳺之興偉哉樂育之心倘䝉憫小子之斐狂永以為國人之矜式髙懸絳帳嗣音敢自於吾儕仰屬青衿固讓毋勞於謙徳謹疏㐮陵縣重建飛橋化縁疏伏以平水澮川依約金城之舊彩虹沉影空餘華表之遺矧當晉秦南北之衝有秋夏泛溢之阻僧清者心存肯綮力振前修經營者已數年奔走者幾千里毎以力微而事大懼夫始作而終衰驅石必東海之鞭洪波可駕銜木仰西山之鳥尺喙徒勞在他邦果於義為豈鄉國獨無至意倘垂一諾過重千金少分有限之功陰受無量之福公私安濟免勞鄭國之乗輿遐邇具瞻復覩河東之舊觀謹疏追薦孤魂化縁疏切以辭辯㳺魂雖著長終之變傳明􅆡魄深詳為厲之文久失所依誠為可憫痛彼河南之戰重為天下之傷血殷溱水之波尸蔽奉寧之野兵自休者已三紀祀而存者能幾家野祭不來愁絶喪元之勇士沙塲半殁盡為亡社之餘黎蕭條蒿里之悲風黯慘棘林之老月尚過者動虆梩之嘆况仁人同桑梓之情為所當為祭而非諂凡吾見而知者忍不聞斯行諸故謁同盟畢兹大事魂兮來些庶幾貴賤之攸歸心獲所安不謂幽明之有識倘䝉金諾請挂銀鈎上張宣慰疏為劉進之作切以辱甲子於泥塗趙武有由吾之嘆轉江沱之窮鮒昌黎云投足之勞懐古傷今而復有此進之先生文摩屈壘心醉麟經學詩得東野之窮好學有征南之癖以壯嵗負幷汾之氣幾年為河朔之逰老雖益堅空至於屢拭白首窮途之淚夢黄雲畫角之秋思歸敝廬得甘饘粥撫孤松而弔影望先隴以含悲具爾是逢翻然可駕麥船惠顧一㠶助順濟之風華表歸來獨鶴遂長鳴之願伏惟使相學士閣下氣嚴霜簡名在帝心炳趙衰愛日之輝聳吏部泰山之望爰從公議两鎮名藩承流已浹於河汾宣化又漸於海表去國見似之者喜同聲亟相應之情嗚呼託子而來嘗竊慕古人之義請書而去思㳺揚足下之名為代悲鳴爰成尺素幸念鄉枌之舊與分鄰燭之光倘鑒私衷請題芳字謹疏為宋儒楊從龍贖身醵金疏切以觀軍府而釋鍾儀𫝊美晉侯之徳解左驂而贖石父世稱晏子之仁古則云然今亦能爾唐風雖儉舉義則豐荆璞未逢遇和則售士人楊從龍者晉州羇客呉㑹諸生念江湖當波蕩之餘得升斗遂安身之計在士庶官寮之署當體寛恩以吹嘘惠費之仁不過一讌倘䝉金諾請署芳題筭學士善疏眷言六藝數居衆技之先訓彼羣䝉業必專門之老伏惟冝之先生術窺海鏡心洞神機以勾股而測髙深極乗除而推盈縮挾此九章之妙屢為一卷之師倘許光臨豈辭擁篲口傳要訣同趨開悟之方手筭萬夀庶無倒顛之誚謹疏為刋字醵金疏汲郡志者發明潛徳豈惟鄉國之賢闗繫民風庶見古今之事為書者凡一十五卷計字數近六七萬言欲廣其𫝊必録諸梓惟是閒居之久苦無力量之多凡工費口糧倘䝉少助雖夜光明月不為暗投公等自優為之我正賴有此耳謹疏太康縣剏建忠武史公祠堂疏伏以臨危脫難無深骨肉之恩報徳靡忘莫重春秋之祀惟太尉忠武公曩分帥閫東徇京畿擴仁心而斂兵鋒招柘城而降陽夏繼來臨戍尤盡撫綏雜耕無相擾之私按堵享維新之樂百年父老廕自餘休三尺兒童慶延史氏今將啟神祠於舊里昭大徳於新邦某等雖經始於一時敢獨專其至美庶憑衆力易見成功具我時瞻要擬甘棠之木眷言遺愛豈惟墮淚之碑凡我同盟請題芳字秋澗集卷六十九欽定四庫全書秋澗集卷七十元王惲撰疏衛輝路總管
