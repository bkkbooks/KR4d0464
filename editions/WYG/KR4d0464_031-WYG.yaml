seq: 31
front:
  text: 鼓嶺青林欲盡頭半崖渾作白煙浮應知昨夜山中雨石上寒泉散漫流
  hash: sha256:466ad06db965c9b36a6cf822ba44b17a653e5c9f97f41a2edae87126f755f748
body:
  text: 荔枝樓在按察司潭潭大府號澄清一道綱維控八城舊説憲僚憐夜宴荔枝樓上月三更題米元暉楚江清曉圗元暉筆力儘清雄兩岸青山似越中六鑿近年攘欲盡蒼煙無復曉𠖇濛江邉墟落静荒煙林隖依然井臼全若比石壕更瀟灑入山多避過都錢禽語自感鷓鴣行呼行不得杜䳌切祝不如歸長憐二鳥知㡬早苦戀眀時日自鞿小樓晚眺逺客逢秋苦憶家小樓登眺日初斜忽驚海上風來迅吹亂鄰墻一架花白沙漢舊名歸舟漾漾度林菲兩岸芙蓉間木犀最是遊蹤堪記處一篙秋水白沙西天涯久客得還家喜動秋風八月槎絶似武陵回棹處後山都被亂雲遮岸宿閩清縣門清江一曲抱城根此夜孤舟宿縣門已是客心幽逈處更堪疎雨溼黄昏小箬水師横棹卧江頭三日風篷喜順流縱使不攜西子去烟鬟都是苧蘿秋醻劉憲使仲修嚴韻舟次建寜書史孔元敬自浙東改任福唐得憲使仲修詩因繼髙韻為答孔氏中卿係襲封元措行也從來海徼全閩地閲盡烟江疊嶂山越槖不憂無重致班超今喜得生還安嶺北遮千里目全閩東掩萬重山江花江草争含笑一事無成謾往還夢筆山異禀鍾來氣自豪先生藻思湧秋濤斯文本逐年衰壮取與何嘗有彩毫題北苑亭柱羇懐牢落獨登臺㡬被時人笑不材只有青山最憐客翠屏如畫四圍開贈相者雪庭東谷二絶道人宛有雪山清顧我眉毫近九齡最喜一生心事好又㸔黄色起天庭雪裏疎梅儘耐寒功名都在晚年㸔煩君與卜趣裝日早晚孤舟發建安全氏小樓與南山相對殆几案間物也暇日觴予其上索賦鄙作因口占三絶句閭閻撲地不容閒疊起重棚翠靄間樓下市聲喧午枕藥爐頭上㸔青山東籬遥見喜悠然况在風煙咫尺間滿勸銀盃留客醉夕陽佳處鳥飛還南山秋色兩争髙終日相㸔不待招一炷龍涎滿樽酒安排詩思苦相撩過朱家府并序至元廿七年孟冬過朱家府謁太師遺祠瞻拜禮像懐徳不已敬留四詩付林彬二孫庶㡬見鑚仰之意云晚進小子汲郡王惲斂祍百拜書世仰遺祠愛及烏不縁喬木緑隂餘題為通徳猶膚淺云是文奎所次墟濓洛尋源到聖功八方吹偃舞雩風一椽得近東家住瓢飲肱眠樂在中金聲遺響已千年聖道重光自子傳不為武夷山水窟拏舟還艤杏壇邉神而能化自人存毳冕凝旒以道尊徳澤未應移五世青山長見讀書孫張家灘在建陽縣南五里張家灘下石縱横舟楫經過與水争行路險巇皆一例溪聲何苦不平鳴武夷溪口謝諸生來迓諸生濟濟半深衣鞭馬來迎侯武夷把酒向前争致語精神全在去年時望武夷諸山武夷山水儘清竒石作龜麟玊作溪望入神清虧一到壁間空擬老歐題崇安道中十月山間不覺秋青林依舊鎻深幽西風老却黄雲稻野水溝溝澗澗流贈石堂和尚梅花樹下石堂僧楚語咻咻碧眼稜盛説補陀神力大碧丹療疾百能徴道人來自武夷山袖有千金起廢丹専意濟人無所取一年强半在崇安過大安嶺愛山不厭入𠖇搜薄霧空濛為少留意似范寛誇老筆亂峰明處露礬頭大安形勢鬱峥嶸閩海東蟠未了青往返兩回煙雨暗不容詩筆冩真形前有羣狐後有豺老懐悽㫁嶺猿哀此行可卜新年順無是無非下嶺來萬里生還豈偶然一聲長嘯下蒼巔闗頭若要留詩去記我今冬下嶺年下嶺人言出厄年一杯湔祓瘴江煙紫溪嶺下重回首已勝班生到酒泉過稼軒先生墓在鉛山州南十五里陽原山中廿七年歸自福唐作青銅三百了時文大節知公在致君朝野不應傳樂語六宫春動鬱金裙相秦審勢不明理坐使炎興失逺圗力主備邊伸大義先生真是孔明徒遺編三復美芹辭睿眷曽蒙孝廟知黄壤不埋忠義氣至今煙草見蟠螭老徽北狩七陵空奉命南來見匪躬誰遣廟謀空坐老一椽精舎帯潮東招提遺像見英材喬木秋風過客哀通厯縱令追削盡疊山文是漢雲臺次鉛山示州尹杜君西連兩廣天荒處東接三山水盡頭喜見寛平風土美鉛山今合作中州余去冬過此今嵗復由此北歸觀其田里城居比之前日精彩數倍詢之盖杜侯新政之所致也喜為留詩而去題寒碧井在鉛山州東五里寒泉湛碧石為嵓鯨口長噴色更藍六月行人方困暍一杯氷雪蜜同甘沙溪道中馬知驛近趨行迅詩為山竒捉句難行過沙溪都忘却際空原野喜平寛喜得臺報弓刀霜冷五更初破睡無方有疾驅不為殘年誇老徤暫教粧㸃早行圗欲進行難愧素餐當機坐視更何安從今漸覺身心適秋水鳴蛙不屬官下山風袖任披披來路回㸔在翠微貪戀紫溪山路峻不知寒霧溼征衣玉溪登舟捨鞍乘木玊溪煙坐聽吳歌踏兩舷東抵餘杭西自信一千里路月明船食柑黄柑香熟夜來霜比似休官味更長道出三衢冬十月石塘林圃記初嘗夜發嚴州亭亭白塔過嚴州漫漫清江不盡流慚愧釣臺臺上月分光也照逺迴舟桐江待發柁師説似小兒童一覺平明意莫忽待發桐廬遲是速舟隨潮退疾如風夜過七里灘都俞無㡬已還山自笑蹣跚老一官為恐石壇松鶴笑夜深舟過子陵灘錢塘道中長路人家不㫁頭冨陽東下接杭州如今不似勾吳日猶自歌聲沸酒樓余自閩中北還舟行過常秀間卧聼櫂歌殊有愜余心者毎一句發端以聲和之者三扣其辭語敷淺而鄙俚曽不若和聲之驩亮也因變而作十二闋且道其傳送艱苦之状亦劉連州竹枝之意云露華冷浥蒼山碧江水平鋪素練光半夜棹歌相應起發揮無用詫鳴榔今秋湖濼兩相通差遣雖頻力易攻度險却防連夜發泝流還怕打頭風兩浙人稠不易安少罹凶慊即流遷今年苦惱蘇常地易子營生不計錢睡思朦朧苦未休棹歌催發五更頭兩盂悶飯無鹽菜雨雨風風一葉舟朝來回棹喜空舩坐唱吳歌踏兩舷淘米墩頭風浪起最防吹入太湖煙中産攅來六七家終年執役在浮槎今年水渰田苗盡少米争前乞使華水色山光不易吟却教欸乃發幽深舂陵不作吳兒事道是雲山韶濩音岊江灘石苦經過音節聼來噪未和不似吳儂音韻美遺聲全是竹枝歌夢驚蓬底卧秋江一句纔終和者雙任使再歌聴未已不知寒日上船忩幹當江南有許多往還冠盖似攛梭因兹力役無朝暮欸乃翻成懊惱歌路長江濶霧煙埋盡日長征帯夜開記得往年從宦日被差冠盖有時來迢迢江上亂峰青路轉山回逺作程來使共稱星火急不容停待晚潮生水仙萱草三詠并序余行次赤城兩浙憲司屬吏侯仲卿拏舟自杭追余四十餘里及之拱立水次致紫山之意仍索賦水仙萱草詩詢渠别有何故曰無有余笑曰澹癡好名有如是者遂書三絶以付時至元二十七年冬十月二十二日也片帆歸自海東頭何限煙江疉嶂愁展放畫圗還一笑世間名品果忘憂緑萱不得獨忘憂江草江蘺總帯愁若使花神真解事一枝金鳳也垂頭雪作肌膚翠作裙淩波微歩襪生塵筆端欲見錢郎意重為陳王賦洛神望歌風臺西風殘照舊山河故􅀦遺臺憶獨過四百威靈歸寂寞㫁碑猶記大風歌漢家豐沛有周邰四百炎輝自此開舉目不瞻龍虎氣寒鵶翻日上荒臺奉春一説即西行百二江山敞帝京不似楚人無逺略錦衣東帝詫韓生石勒問道圗位號真來變故多溥天無地不干戈養成豺豕蕭墻禍更向伊蒲問甚麽題范亞父増墓在徐州城南臺頭寺下大塜劒舞鴻門失此機重瞳成敗可前知猜嫌只待捐金後決意東歸去已遲單父琴臺武侯治蜀毋輕赦宓子彈琴不下堂風俗變移難復古後人為政貴論量讀佛圗澄傳慧眼前窺事有徴最慈祥是化淫刑阿師更欲矜神異塔上風鈴要細聴雪漲千山圗六合雲同雪自寛千山都變玊孱顔限量不似年來雨多處淋淫儉處慳二月廿一日河南雨三尺河北全無喜周宰來居友道年來棄若泥白頭傾盖似新知短轅麈尾闗渠甚誚殺當年蔡克兒筋力覺衰防酒困生涯從澹願詩工尚憐繆悞今何幸長在周郎顧盼中吾友西歸喜可知殘年心事得追隨朝來僦舍清談久憶得西齋共被時諸子當年甫冠婚執經同在鹿庵門相逢正有謀生急裂月撐霆不要論嚴風夜發雪初霏踏雪攜壺扣夜扉長記孔門多樂事共披風袖詠而歸泉水思歸有故交共山無地可誅茅羨他僦舍同來燕終日銜泥補舊巢周兄所至號能官既幹而清事更難昨日借車還故里囊空留得一錢㸔一别淇南又十春此回相見更情親河山不隔黄壚㫁屈指同㳺有㡬人翻雲覆雨到澆漓長愛吾周重所持四十五年同一日物情心事兩相知人生七十一衰翁比老能閒樂事融著手不遮西去日閉門同卧北忩風山陽髙興在雲林痛飲狂歌總賞音四十五年雖轉首白頭同賦故山吟柱頭化鶴千年事松下懐人一聚塵撥置老懐休悵惋且來同醉酒壚春纔沾公禄能餬口縱得居官奈老何暫借麴生供日事何嫌酤醸近林婆過郝教授子貞故居三首雲際曽瞻處士星竹間無復草堂靈喚回三十年前夢壓酒槽邉寫六經一言抛却羽人冠長喜先生不逺還故隱只今誰作主詩瓢空挂百門山平生詩卷㡬牛腰身後遺文便寂寥事業文章原有分自餘辛苦枉相撩回河常年動磑踰三月孟夏中旬見稻芽今嵗使君先玊食清眀分水與農家題胡笳十八拍圗漢世婦人傳家業善文辭者前曰班氏後稱文姬琰不幸遭亂失身發憤知恥至發而為辭章者而已如是在東漢文章清而不俚者也其音調悽楚縁琴翻聲律恊笳拍而於音學曲盡窈𦕈可謂不墜中郎之業矣今觀是圖其情義相牽不克自制之懐猶可想見於當時也此辭即唐劉商所作以七言較之益無疑矣因題五詩於後擬之騷人之意云畫却春山理素琴翠簾香鎖落花深豈知中有胡笳恨吹折關山一寸心胡笳翻曲太含情不道倉皇義重生舊怨未平新恨叠雁聲纔罷又邉聲乾翻坤覆困蛇龍女子柔衷鮮克終全著靡他論蔡琰不知何地置揚雄憔悴風沙十二年得歸情義轉相牽董郎庭户雖依舊已是蘭摧白露前才慧其如薄命何猶能知恥見悲歌寥寥誰識班姬後得續離騷幸儘多跋徽宗畫格物心存養聖功老徽游藝眩青紅四靈瑞世渠何有也在君王物色中牧牛圗垂紖徐行信自如一揮鞭策見齊驅近來不似圗中况旱塊敲蹄百草枯青青春草滿郊原放飽歸時不用牽何似人牛俱不見碧天明月静姢姢緑楊堤岸曉風清碧草陂塘暮雨晴村落近年乾旱損却将圗畫㸔升平兩童相顧意何為猶恐渠飢趂草歸一道牧民無所事處心當在趂家肥飽耕飢放事年年放去收來任自然莫訝兩童無所識至今牛背是堯天䟦徽宗畫馬圗為愛瑶池噴玊龍麝烟移入畫圗中宣和殿上揚休處忘却熙河汗馬功問雨六月五日雨三寸前日西村雨有餘東村曽不少霑濡望中雲氣西南重為問村束果有無從來暑雨多隔轍且喜一槩蘇焦枯敲蹄旱塊如盆火為問秋田勾得無近日甘霖徧四周闕隆都在郡城闕䟦武陵圗淵明髙興託𠖇鴻流水桃花事本空好笑武陵狂太守謾回烟棹月明中題數學鄭斗南詩卷洛圗河數發天機萬彚中來理莫違却有一言煩説作貴人何廣福人稀數學規模自易齋不煩衰薄究予懐朝家謀㫁須房杜早晚相攜上泰階巢父飲牛圗巢由真隐本同儔細論吾巢節更優老牸渇來何所擇徑須牽避是非流靈照度丹霞圗衆生種業到無該愛海沉迷喚不廻對證處方唯一捨不應真假比如來西江萬有已沉沙更有何心到散花狠似入門三十棒欵将一語了丹霞性定情移逐物開力能剛制見英才金沙灘畔風流骨恐是逢塲作戲來克己先論定力優後從屋漏驗清修禪家多少閒拈弄糞掃堆頭覔悟頭和彦正憲使寄周宰詩韻且酬前日見贈之什紛紛黨議到無如常愛林宗智有餘金谷聚交潘在數一生空枉賦閒居自憐處事太遲回㡬被傍人笑懦哉勘破南華山木喻支離甘作散樗材山陽水竹接雲荘真是閒人避世鄉殺馬毁車渠莫訪風波平地更羊腸殺馬毁車東漢馬良事故舊追歡不厭頻甚時王翰作比隣相㸔比老都能㡬猶作離羣索處人時與心違真倒顛且将書史度殘年樂天仁厚知㡬逺好箇香山獨往篇佳人倚竹圗失路青雲恨未深更㸔空谷日幽沉天寒翠袖相依處却是琴中對竹心和幹臣詩韻六首清江百折萬重山倦鳥翩翩不易還有客又來詢動静不知馮道已癡頑一雨蕉黄荔子丹去年今日宴東山山僧勸酒賔僚唱醉裏肩轝月下還樓閣三山景氣鮮萬家簾映荔枝妍紅雲酒美香粳滑只枉風煙是海邉泉石鷗盟尚可尋老懐其奈世縁深将詩細嚼要予和有酒深藏待子斟吾儕從事思行道尺未容伸已枉尋不若将心隨所好物情眀見古猶今人生兩足無不到去嵗天涯今故山古語在家貧亦好更憐吾子適東還復用苦齋韻作五詩以自警剽竊詞章笑自如何曽經㫖醉三餘早凡自處有如此誰復如軻以聖居終日如愚莫哂回克先復後並生哉從初一著髙空上即是盆成死矣才學須一念主端荘漸次通融理義鄉况是四端生已具㡬曽由外貯肝腸濓洛諸儒問答頻道雖未富亦其鄰異時酬酢無窮變不比禪林面壁人刺口髙談慢聖顛人心能淑變堯年孔門多少齋心學見用還存問政篇四月廿六日西溪睡起城居喧隘一蛙坑乍到郊墟眼倍眀濃睡覺來村塢静緑楊深處栗留聲灌園倚鋤㸔水立斜陽最愛春風菜圃香自笑老饕須肉飽却思竒客出蔬腸馬歎足輕行穏不揚塵種性來從野馬羣昨日緑楊亭下路郡人爭羨五花文市來一馬性馴良竹耳雙批秃尾蒼笑殺飬牛王武子便教銅鬲𦵏人腸擊壤軒軒旱塊大於盆朴擊都教細作塵便覺闕静少陽原隰㸔畇畇老子過闗圗韓虬筆論道休将坐井觀逢時為用見真詮漢家注措纔糟粕嘉靖寰區近百年柱下潛輝跡已賖青牛苦要渡流沙料應紫氣浮闗後夢繞春風巨勝花贈武昌相士秋雲羨君兩眼眀如鏡萬事都歸一盼中自笑本無食肉相虚名空似豹林种扣門有客號秋雲偶弄微言最近真過眼無窮軒盖士急流中退果何人品彚雖殊智欲周江南江北去悠悠多應未遇商嵓叟㸃破長空萬里秋䟦漆園田氏手澤金源取士自科文臺閣公卿半鳳麟後進且休輕訾議試從田氏㸔潛珎䟦顧虎頭所畫謝安東山像幽處當年繋重輕枉将浮議論蒼生異時兩袖東山雨待與君王洗甲兵䟦香林先生顛草涪翁醉草甘露帖勢與江山争長雄㡬世㡬年争復得香林筆底有遺風嘗愛甘露詩草聖筆勢縱横破碎陣敵今觀香林先生遺墨得涪翁歩驟為多具眼者當自識之時至元元年闕魯義姑祠闕有所思莫道當時無義闕闕間四題謝太傅安勝負胸中料已明又從堂上出竒兵怡然一笑文楸裏未礙東山是矯情周将軍肯向江東注伯仁茂𢎞中忮本孤恩異時淚洒中書省空慰将軍石上魂髙司空允獨抗龍顔震電威伯恭持正見臨危挺然不應前星教只道人臣要不欺王丞相猛笑傲當年北海螭對談捫蝨果何為華陽未入君王夢就裏風雲只自知謁玊泉真像五首昔年㡬讀九山碑管葛襟期漢相規思欲執鞭那可得徘徊松下獨來時濟世安民五十年後人經濟渺難攀須知浴日回天手只在丹崖翠嶺間闕伊周原不是庸人丞相祠堂憶重尋㡬年西崦柏森森入門再拜夫人表忘却登山力不任總道書生吏事疎米鹽無術應時須試㸔中統元年事濟得朝廷半老儒豫譲邀襄子圗智氏頭顱到溺旋趙襄謹避墮空然若圗伯也非常報合有嘉謀在死前一言感激命為輕九死酬恩不為名千古晉陽橋下水不應嗚咽恨無成酬温仲敬以櫻筍見遺四月人間櫻筍時喜将二物特相遺故家風味依然好獨有温郎是素知春睡起偶書西墅東軒壁留連春色花隂蝶㫁送林歌雨栁鶯更愛静中消遣處春愁滴破聼槽聲題玉眀村老黄店壁八絶壬辰嵗三月廿五日𦵏曲山而作西山千疊玊稜層踏雪當年過灞陵破帽不知風力𦂳夜忩歸趂讀書燈荒荒野店日東西路入蘇林草樹低記得鹿菴傳授日饐𤓰亭上識西溪今年上廟客紛紛賸具黄粱與酒樽白髪故人渾不見青衫多是子和孫曲山靈柩夜來過腸㫁春風薤露歌同軰眼中多顯達一生心事最蹉跎危嶺南蟠縮尾尻伍城東望俯坑壕蹇驢䭾過玊眀店􅈝覺西山百倍髙古槐盤石緑隂垂下馬行人倦午馳毎過黄翁閒話舊亭驂長到日西時中陽川逈屬新中店舎初開暎棘叢四十九年纔一瞬黄郎今日老黄翁筠林同業憶當初㡬醉黄翁舊酒壚鄰笛聲中何限恨不堪零落曉星孤五丑今獨予在當時同門者十三四人止有李士觀傅士開秋日即事風軒兀坐髪鬅鬙凉入簷花露氣凝詞客感秋驚嵗暮半生虚負讀書燈題嘉山段宜之讀書堂圗山水雖佳以士名誦聲曾動草堂靈至今松桂林中夢不識無禾養百齡墨梅偶賦梅華天質本紅黄玉潔氷清徹骨香近為世間貪墨客硬隨時世作新粧秋澗集卷三十一欽定四庫全書秋澗集卷三十二元王惲撰七言絶句
