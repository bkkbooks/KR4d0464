body:
  text: 玉堂嘉話卷一大元中統二年秋七月惲自中省詳定官用兩府謂内外兩省薦授翰林修撰其宣詞云行已無忝博學能文顧超絕之軼材足鋪張於偉蹟宜司綸命以贊皇猷可特授翰林修撰同知制誥兼國史院編修官當振斯文以宣朕命其修撰雷膺詞云昔年詩禮已聞鯉過于庭前今日絲綸復見鳳毛於池上參政楊公筆也既拜命謁承旨王公於寓館公曰唐人題名記謂之千佛名經其充詞臣者即為一佛出世國家文治伊始汝等首膺是選於士林有光矣八月上都文廟告成公命某官作釋菜諸文頗立論其間公曰如此文字有稱功頌德而已又云作文亦有三體入作當如虎首中如豕腹終如蠆尾虎首取其猛重豕腹取其楦攘蠆尾取其螫而毒也此雖常談亦作文之法也初公既草諸相宣辭通作一卷實封細銜書名上用院印付惲呈省問焉曰白麻蓋自中出今實封防其漏泄亦唐人鎖院之意也其立史院奏帖有云自古有可亡之國無可亡之史兼前代史册必代興者與修蓋是非與奪待後人而可公故也公又親筆作史大略付惲如帝紀列傳志書卷怢皆有定體其傳須三品有顯烈者公又云太史張中順金一代天變皆有紀録就此公未老亟與論定亦是志書中一件難措手者竊念太史公諱鶚字百一曹之東明人正大元年甲申獲承牓狀元第遂應奉翰林文字殊為金主眷顧天與二年官通議右司員外郎後遇聖上寵光益隆如諮大計以斯道覺民為先論日蝕以撤樂罷宴為對開禮樂之源則釋菜先師明慶威之權則張皇治本又以葬祭故主為請允焉後為位哭汝水上哀動左右天日為變色仍私諡為義宗據法君死社稷曰義其忠不忘君如此冬十月侍中和者思傳旨都堂與文字召靜應姜真人去者惲時為左司都事宰相命具詔草其詞曰靜以知來智能藏徃念前言之有效方庶事之惟幾遐想仙標載勤馹傳幡然而至暫辭嘉遯之鄉罄爾所懐與復細氊之論至元十四年丁丑歳春二月庚申朔獲授翰林待制是日赴院供職為春旱禁酒詔漢賜大酺歳有常數周申文誥欽戒無彝况糜粟者莫甚於斯崇飲者刑則無赦近縁春旱朝議上陳宜禁市酤以豐民食朕許來奏實為腆民可自今年某月日民間母得醞造酒醴俾暴殄天物重傷時和故兹詔示想宜知悉為春祈雨青詞伏以萬物並生於兩間亭毒必資于帝力皇天佑命于一德精誠可格于髙穹比者時雨愆常秋種不下念無辜之民將罹荐至之災循省自修庶回哀眷爰因雩祭崇建靈壇伏望列聖垂仁九天降鑒易隂陽之恒數幹造化之𤣥機下敕豐隆霈流甘㴻蘇稿麥於南畝播嘉穀於東郊一滌昬霾溥洽生意豈惟大賚三農免失業之憂嘉與多方髙廪享有年之慶同諸公觀張九齡等誥於玉堂其詞曰門下春秋之義尚重卿材王國克楨莫先相位用増其命必正其名中奉大夫守黃門侍郎同中書門下平章事𢎞文閣學士賜紫金魚袋上護軍裴耀卿正議大夫中書侍郎同中書門下平章事集賢院學士副知院事兼修國史賜紫金魚袋上柱國曲江縣開國男張九齡經濟之才式是百辟正議大夫檢校黃門侍郎賜紫金魚袋上柱國李林甫泉源之智迪惟前人既樞密載光而親賢稱首審能羣㑹所莅有孚寧惟是日疇咨故以多年厯選國鈞繫賴邦禮克清宜命曰鼎臣置之廊廟耀卿可銀青光禄大夫守侍中學士勲如故九齡可銀青光禄大夫守中書令學士知院事修國史勲封如故林甫可銀青光禄大夫守禮部尚書同中書門下三品勲如故主者施行開元二十二年五月二十七日上用尚書吏部之印凡五顆制可下旁作細字某月日某時都事某左司郎中闕又後細銜相臣與部官同列去姓而名名作大字署曰尚書左丞相曰金紫光禄守尚書右丞相集賢院學士修國史上柱國徐國公嵩曰吏部尚書上柱國武都縣開國伯暠曰朝請大夫檢校吏部侍郎上柱國豫曰吏部侍郎曰朝議大夫守尚書左丞賜紫金魚袋挺之後書年月日印同前後稍下以細銜書銀青光禄大夫守中書令集賢院學士知院兼修國史上柱國曲江縣開國男臣張九齡宣曰中書侍郎曰朝議大夫中書舍人内供奉集賢院修撰上柱國臣徐安貞奉行復作髙行細銜曰銀青光禄大夫守侍中𢎞文館學士上柱國臣耀卿曰黃門侍郎曰朝請大夫給事中内供奉臣昱等言復大字與銜平頭書制書如右請奉制付外施行謹言復大字與前平書告銀青光禄大夫守中書令集賢院學士知院事兼修國史上柱國曲江縣開國男張九齡奉被制書如右符到奉行自告字以下作五行用印二十九顆唯制字上空後復與前平頭書郎中惲下細字書主事懐琛令史王烈書令史姚元開元二十二年五月二十一日下印同前用告用柿黃斗底綾作卷凡七幅上下約一尺或者謂曲江與林甫通作一告除拜以鸞梟並集駑驥同槽為嫌予曰帝堯在上咎䕫與驩鯀同列恐自昔有所未免正在明君别其賢否用與不用耳然唐自開元後九齡竟罷而相林甫治亂之分於斯已見矣二月壬戌題唐李紳拜相後有徽宗御書䟦門下興化致理必資作礪之功納誨弼違實賴將明之效苟非材擅人傑道茂時宗蘊經濟之宏規積巖廊之素望則何以光我注意允于具瞻其惟至公克舉成命淮南節度副大使知節度事管内營田觀察處置等使銀青光禄大夫檢校尚書右僕射兼揚州大都督府長史御史大夫上柱國贊皇縣開國男食邑三百户李紳氣禀清剛體含沖穆抱金石之正性挺松桂之貞姿識達古今慮周微隠詞源濬發洞學海之波瀾智刄髙揮森武庫之矛㦸中立不倚方嚴寡徒長慶一朝委遇斯極入參禁密出總紀綱王猷多潤飾之能邦憲著肅清之稱洎領版圖之任尤彰均節之宜而又寵辱靡驚得喪齊致河洛留神明之政浚郊恢將帥之謀威令播於軍戎豪黠屏迹惠澤洽於封部疲羸息肩俗變阜安人知禮義日者錫其髙第換彼雄藩當淮海之要衝控舟車之都㑹風望並峻僉諧莫踰朕䖍恭寳圖夢寐良輔爰膺審像果副虚求爾宜踐台席之崇嚴司中樞之密勿外以底綏華夏内以勤恤黎元視同列猶塤篪期君臣如魚水無使仲山補衮獨見美於周詩汲黯匡時甞推髙於漢史祗率訓典徃惟戒哉可守中書侍郎同中書門下平章事散官勲封如故主者施行㑹昌二年二月十二日年月日上下凡用印五顆其文即尚書吏部之印旁近下細銜書中書令次右僕射兼中書侍郎平章事臣珙宣奉次中書舍人臣孔溫業行復作髙行與告文齊細銜曰侍中次司空兼門下侍郎平章事臣德裕次給事中臣泰章等言作大字與細銜齊制書如右請奉制付外施行謹言㑹昌二年二月日印文同前大字平書制可下細書月日時都事及左司郎中復作髙行與制可齊書細銜曰吏部尚書次吏部侍郎次尚書左丞以上皆闕後大書與銜平頭曰告銀青光禄大夫守中書侍郎同中書門下平章事上柱國贊皇縣開國男食邑三百户李紳奉被制書如右符到奉行自告字至行字用印一十九顆全空制字後復平書司勲郎中判懿下細銜曰書主事次張𢎞亮次令史楊溫次書令史㑹昌二年二月日下印同前徽宗御䟦云恭讀太祖皇帝實録載偽蜀李昊自言紳之後仕孟昶至司空趙國公方昶與江南通好時遣其臣趙季札使景季札回得李紳唐武宗朝自淮南節度使入相告以遺昊昊欲誇詫其事結綵為樓置告于中朝服前導盡呼聲妓雜奏歌樂迎歸私第即召將相大臣宴飲仍以帛二千疋謝季札詳閲告文正昊所詫之告也然自武宗逮今三百年苟人以忠諒功業聞於時有不必金石而堅者可不勉哉因節文以載其實後有復古殿寳四字上用御書之寳又有范仲淹富弼吳中復韓縝王汝已未季秋觀於承旨東㕔先儒論漢人大綱正節目不備唐人大備而純正謂此等制耳秋澗云洛陽竹齋先生李得之云制誥二體不同宣辭必須散誥辭乃用四六今宣詞皆作四六非也蓋宣則王言親諭誥則牒奉敕行如蔡正甫作道陵諭孟宗獻詞云朕新即大寳詔有司以取天下士卿自鄉選至於殿陛四為舉首非材之髙學之博識之優何以臻此今陞以北門應詔之職朕之待卿不薄然君子志於遠者大者無以此為自足爾其勉旃又諭沁州刺史李楫云有司以卿資應未當得郡朕以識卿最久愛卿專對詳明進止審當故有此授卿當悉力為民政成以稱朕意爾其勉之是也其誥如狄梁公顔少師李文饒等詞唐人純用四六是也又云知制誥為三字詞臣故唐詩有云三字詞臣求識面九重天子望低顔之句得之先生名國維淄川人浮陽王頔文叔説初鹿菴先生奉敕定撰趙秘書先世碑文纔畢先生旋車過予於崇寧里迎視若有喜色未審何為坐定出此文至其論説噫古人有言風霜别草木之性危亂顯貞良之節夫危亂世常有而全節死義之士不可常得或相去數百年或相望數千里時有一二焉獨趙氏一門之内父子兄弟乃有四人真可尚哉昔比干效忠於殷而受封於周堯君素盡節於隋而唐太宗為文祭之蓋天下之善一也聖人一視同仁寧有彼此之分哉今趙氏父子兄弟盡忠乎金而聖天子為之立碑淵衷睿鑑蓋與夫唐太宗周武王之心不謀而同矣敢對揚休命繫之以銘先生不覺自讀者再公氣養素厚且復爾耳諒以自得用事切當為喜乃知文士氣習至其適意不知手舞足蹈古今通一致也又記吕遜甞談趙著吕鯤以詩鳴燕朔間二人皆出耶律相門下虎巖每得一聯一詠即提擲其帽於几壟山從旁謂曰不知李杜平時費多少帽子聞者捧腹待制楊恕字誠之金文獻公楊尚書子常談其父正大間所陳奏議曰臣間讀聖旨節文六品以下官有請見詣登聞檢院進奏帖者聖訓廣大蓋將博詢兼覧以盡臣下之智也臣實愚懵無妙謀長䇿仰禆聖聽之萬一獨取事之切於今日者列為二事以言之一曰簡卒二曰理財簡卒之説復有三焉一曰取人材二曰募願為三曰括驅丁理財之説復有二焉一曰納官從便二曰和買可罷請言簡兵之説臣去嵗在鄉里見其簡卒之時不以人材優劣為等差而以物力多寡為次第故所得富民之子弟彼生長於衣食豐裕之中居則役僕𨽻行則䇿堅肥未甞諳習天下勞苦之事使之負斗區之重徒步數十里則憊且顛矣况能被堅執鋭以為我軍之前行而逆戰哉倉猝之際非徒無益適足為我軍之累不若無之之為愈也為今之計莫若行三説以簡卒則庶乎其可用矣何謂取人材蓋十人所聚必有為之雄者在千萬人亦然如總州縣之丁男不以物力多寡為先後惟軀幹勇壯是求則所得皆能戰之人矣何謂募願為蓋天下之民虚為游手不業者甚衆平日無事則使氣以侮人無賴而犯法其中或有果敢勇健奮不顧身良民所不及者如願出身加以束帛之賞募之為兵則所得皆樂戰之人矣何謂括驅丁蓋天下之奴𨽻自㓜及壯備甞勤勞艱苦之事其筋體氣力之所服習馳走負任之所慣狃豈常人之所能及哉如簡其人材之勝甲胄者免當房之賤籍之為兵則所得皆能戰之人且有樂戰之心矣簡卒如是則與夫富民之子弟僝弱而不能戰恇怯而不樂戰者相去豈不遠哉臣請言理財之説臣竊見數年前北邊有事之時天下錢鈔遍塞不通交鈔庫不勝換易之多乃邏卒持梃力與勝之當是時小民有􅅷遷之艱商旅有不行之病比年以來漸無此弊者但以多取故也今以南鄙軍興支給浩繁户部乃日増印鈔之數以救目前之急然所出者方來而無窮所入者歳増而有限以有限而待無窮則鈔有時而不通矣為今之計莫若行二説以理財則庶乎其無滯矣何謂納官從便國家慮鈔之不行不若錢之通也故院務所輸之課皆使入之其術固善矣然限之以路分拘之以分數則所入之鈔傷太少耳夫已收大半之鈔而臣猶謂之少者誠恐後日所出者太多故也如使凡入官之數銀錢鈔三者一聽民便或全以銀鈔入者亦聽之如此則三者之價常平而不偏鈔法以通流矣且以目前行價論之不及錢鈔者每兩該一千三百錢如納從民便則銀入者多而價與錢鈔適平矣此取之之法也知所以收則所支之法又不可不知臣竊見國家之取於民有曰和買有曰和雇者徒被其虚名之美而不究其利害之實也蓋和雇和買之有損于實無補于民適足為吏卒之利耳且科斂之限方急州縣之官以鞭笞撻楚從事於怱遽之間小民奔走趨命之不暇故出數倍之直以應上之求恐恐然惟以不得罹於州縣為幸國家憫小民趨辦如是之勞故出直以償之意固善矣奈何州縣官之明幹者少胥吏鄉保里正主首之屬因縁為姦官直之及貧民者十纔二三則是官有費損之實民無饒益之利也為今之計莫若罷和雇和買之虚名凡有科斂一驗貧富多寡之數而均之民不必出直以償之國家方事殷之時雖户賦口斂亦不為過何必取公帑不及支之財欲以益當賦之民而要和雇和買之名哉且以括馬一事言之前年馬之取於民者既議與之直今歳所括之馬如又償之則所費蓋不貲矣况畜馬者皆有餘力之家待南方平定之後而償之亦未晚也若夫邊方攻守之䇿兵家竒正之術固非愚臣所能識也雖然臣竊料宋人為此無名之舉者上無竒謀秘䇿可以摇動中國特以過聽逋逃之言以為彼軍朝發則我民夕應矣然兵交以來所過敗衂我民之心安然不動則是狂狡之素智計已屈矣如秋髙馬肥之後鼓行而進則淮南可折箠而定也雖然臣竊有私憂過計者國家之慮不在於未得淮南之前而在於既得淮南之後何以言之蓋得淮南則江之南北盡為戰地進而相與争利於舟楫之間我之勁弓洞貫之卒不得環冦而發飛騎越蹂之足不得望風而騁當是時宋人扼江為屯潛師於淮以斷我軍之糧道或決水以瀦淮南之地則我軍當如何應接使彼計不知出此則固善矣如使能為此計聖主豈可不與二三大臣預為之謀哉雖臨敵制宜千變萬化然如臣子所言者上宜先有成筭也臣愚狂瞽不識國之大計冒昧陳列不勝恐悚待罪之至時每㑹集日課讀平宋事蹟若干編類者其間機畫三二顯事多歸賈楊二人安藏意不能平至有言鹿庵先生徐謂曰無容異時修輯正書豈容及此從繁就簡不得不然安公色為夷且㑹體要之有方也䟦僧花光梅後語蜀僧超然字仲仁居衡陽花光山避靖康亂居江南之柯山與參政陳簡齋並舍而居山谷所謂研墨作梅超凡入聖法當冠四海而名被世甞有移船來近花光住冩盡南枝與北枝之句其丰度可想見矣雲夢趙復題云如王謝子弟倒冠落珮舉止敧傾自有一種風味此蓋前金髙丞相家舊藏四幅暗香疎影溪雪春風今失其溪雪見為宋子玉所收古者婦人無諡雖后妃之貴止從其氏至東漢顯宗始加隂后以諡自是遵為定制宋相李昉春日玉堂即事有云一院有花春晝永四方無事簡書稀予夏日玉堂即事亦有二絕句隂隂槐屋羃閒庭靜似藍田縣事㕔細草近縁春雨過映階侵户一時青日長上直玉堂廬思入閒雲待卷舒重為明時難再遇等閒羞老蠧書魚頒髙麗厯日詔云云惟厯象日月星辰乃能成歳自侯甸男邦采衛要欲同文髙公學士詞也古墓中玉器血清者蓋尸以水銀烹其血能漬其尸沁者蓋尸之膏油所沁也其玉器以手拭光襯生白暈者即尸沁也秋澗集卷九十三欽定四庫全書秋澗集卷九十四元王惲撰玉堂嘉話卷
