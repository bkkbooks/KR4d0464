body:
  text: 題戒仲希出金源世胄少以孤兒𨽻羽林宿衛者有年為人慷慨尚風誼善馳射北渡後折節讀書樂與士夫交㳺賙急解紛空厥棐橐奔走風雨不少顧惜至於識名馬善隼羽知常通變談笑一世翩翩為佳公子也如遺山先生一代鉅公雖汎愛無間翰墨之作初不輕與至於君題其居曰元齋繼其徳曰吾弟復有篇贈稱道其志向非尚友重義得如是乎自是完希之名軒翥於河朔者三十餘年非不顒也予既冠與君傾葢於酒罏間一言定交伸眉吐氣歡若平生及合好議米曰風雅之道吾所取也此乂㧞出流俗義之所可重者嗚呼君沒世已逺撫卷懐人不覺増喟然義之所在猶耿耿也汝曹固當思其所尚求其所當重者充類至義之盡昭然使身名齒録於賢士夫之行曰此則某之孫也則某之甥也是則汝外祖姻於吾家之意也不然得衞公故物知其賢而不踐其迹徒以服器為世家傳嗣之寳非所望於汝曹也作題戒廿四年丁亥二月伯父秋澗老人書畀姪阿宜其聽之母怠名王氏子説王氏子嘗以小學從予一日來求其名與字因得讀張戸部復亨所撰其祖墓碑廼知王氏自逺祖以來以文章儒行世其家於保者也小子今吾語汝汝曽祖在承安間擢巍科為一時名卿明昌初官真定録事叅軍政聲藉甚汝父遭罹世故以孤身卓爾自㧞見知於漕臺周侯騰揚仕版若有所為而不幸蚤世良可嘆惜然人有隂積者必有陽報苟不在乎身必及其後人如汝高祖教授君志竟不遂厥類錫於爾曹今汝父復罔克所紹而止於斯而汝也今亦孤童子方保持門户為事長身如此所當愿而恭柔而立操惟危之心念肯構之戒日切一日吾見王氏之慶未艾昭然之報將不逺而復可不勉旃也故用構名汝以徳基字之中統甲子夏五月望日書呼雅治中名字説予官御史時聞尚書工部郎中今治中别乘海拉蘇憙功名樂善言而與士君子㳺某嘗望君於稠人中飄然有玉立雲飛之舉欲願交而未暇也至元壬申秋得同竂平陽相接如平生懽共事既乆愛其才識通敏亷介有守處心臨政多中事宜殆與曩聞無異一日請名於予且求其説予曰上古之民林林而生系出一本聖人見其厥類蕃庻惡夫無别於是因官因封或勲或守王父之字賜姓氏以明之立名諱以識之表徳業以貴之乂以性有剛柔進退好惡之異而寓抑揚與奪之義焉君姓呼雅葢闕父字也世為唐瀚海軍都䕶府人其國郊於乾兊之間據雲天之雄故其人多沉潛剛克内明而外毅若吾子秉彝竒特超㧞倫萃表著於一時豈非能明其初徳而光揚於外者乎傳曰徳明惟明其是之謂歟故以徳輝名君而英甫字之葢英者徳之光發見於外者甫者男子之美稱也吾子以為如何廼書以贈李氏子名説故河東連帥李公以忠勇佐征伐建殊勲受封河東葢三世矣有孫一十四人一日元孫萬户某率諸弟相過鴈行玉立映照前後與之語挺然有燕雲遼鶴之勁氣吾知其先代之澤淵流而未央也次五弟因求名於余予以為李氏世以武顯繼武而善可守者其惟文乎故名之曰嗣文以文叔字之傳不云乎文武之道未墜於地在人賢者識其大者莫不有文武之道焉李氏子其服之無斁至元十年嵗癸酉前六月十一日予自河解北還過絳書於園池之華萼堂王氏四子字訓中丞王兄子初一日因子名而告予曰人之生世貴善良而材用譬夫羊豕性馴而乏可用之資虎豹材逸而無可馴之理惟牛與馬乘服耕播性馴狎大有濟於世故弱息四人取其義名之曰犄犆牥犅吾友其為我字之予即訓曰徳驎徳駼徳騵徳駺雖然牛不駕習則有破車之暴馬不控馭則有泛駕之虞士不學習至跅􅋸而無所用四子尚涵養其徳性修治平聲其才學異時任重道逺無以襟裾貽誚兹汝父之志也其勉旃毋忽書字訓以貽之温總管字説古人制名與字本以假代稱道因其材而進退之非欲求勝而滋美也温生世將家容止雍雅殆素嫺於詩禮者嘗攝從戎事及兄之子衣甫勝即以職畀之時人多其譲一日踵門來謁再拜而請曰初膺字仲傑傑也者智過萬人之謂竊意聲聞過情君子恥之且於名理又弗類假而稱之誠有所未安者願先生易厥初得因名衍義可用以自儆者為稱則所貺多矣予嘉其情實而辭遜卑牧而不自矜也廼以大賢之事告之昔顔氏子得一善則拳拳服膺而莫之失服膺者能持貯心胷以為終身之行用是夫子至興其殆庻幾之嘆予因為之説曰人心虚明而廣大衆善畢具惟其人慾淨盡則道心孔昭道心者何四端用中而已雖然仁為體三者乃仁之用而敬者又禮之實克已復禮庸焉而入徳尤在視聽言動之先惟其善擇能守從容中道則此心弗曠既有物而且有則矣傳曰甘受和白受采忠信之人可以學禮苟無其質禮不虚行况乎天姿温粹樂善而克恭者焉故敢易傑曰禮以仲敬字之庻幾因名衍義用以加修者歟然前賢致恭不以聲音笑貌為事欲誠著於中而藴篤實之光氣發於外而粹安和之色道見於用而極靖嘉之方其事上則忠戰陣則勇與人交則信將見名實兩得禮容偘偘與大賢同歸異時詩書謀帥豈唯投壺雅歌而已哉吾子以為何如膺曰意中事先生能言瑩如是敢再拜受教於是書以為則張掾史名説元貞建號之前嵗丞相伯顔公受開府儀同三司太傅知樞宻院事許開幕置屬於是選擢材儁以崇時望至安定簿張楚者以掾史進一見即蒙眄睞是嵗公以疾薨謝於位嗚呼哀哉楚追感殊顧懐恩不忘至圖公像奉之懇集賢翰林兩院題讃俾昭葢代亦來叙哀徴辭言念勛徳辭情慷慨義形於色因知楚河東九原人少失怙恃養於外家徐氏子然以孤童子從計公度學氣貌修楚早負幹局甫冠先生以楚訓名是用勉夫修習俾趨於成今以事為所著者論之可謂樂事大賢知恩所自以義圖報有始有終者也其在衰俗誠可嘉尚予乃悚然而器之曰楚今當作礎矣既而來求其説乃告之曰古者制名皆存義例有像其類而命之者因其材而篤之者或審其剛柔而抑揚之者或察其氣焰而取與之者非徒觀美誇大而已也今予以汝美在其中用見於外篤實輝光有不可掩焉者若夫氣志堅凝如鉅石出霧洞達無隠既敦固其材實復砥礪其亷隅方嚴正大奠夫鼇植之下而収任重持乆之效者是正汝之責也易曰介于石不終日貞吉其是之謂乎嗚呼礎乎其聽之無斁二年丙申重九日叙説儒用説士農工賈謂之四民四民之業惟士為最貴三者自食其力能傃所守時雖不同固不失生生之理唯士也貴賤用舎繋有國者為重輕葢其所抱負者仁義禮樂有國者恃之以為治平之具也國不為養孰樂育之君不思庸孰信用之不幸斯道中㣲我𤣥尚白阨窮遺逸隨集厥躬此士之所以遑遑於下而可弔者也幸有連茹為引用為主張者曰鄙儒俗士烏足有為也切嘗惑焉謂有用也時不見其所用謂無用也一為時用卓越宏達莫可企而及者烏可以時偶無用槩有用悉為無用之具哉國朝自中統元年以來鴻儒碩徳躋之為用者多矣如張趙姚商楊許三王之倫葢嘗忝處朝端謀王體而斷國論矣固雖文武聖神廣運於上至於弼諧賛翼俾之休明貞一諸人不無效焉今則曰彼無所用不足以有為也是豈智於中統之初愚於至元之後哉予故曰士之貴賤特係夫國之重輕用與不用之間耳嗚呼國之所以為國者有其人也今天下之心同然而深惟者天統大開六合同軌及其選一材取一士舉目望洋無所於可正孔子稱杞宋二邦無足徴證葢傷其賢既不足文典之傳有不可強而為者復以時務論之今選行其上材乏於下是有國者之最所當病故唐取士之法嵗萬人為率猶三十年可盡况法未備而無所取哉又老成先進文學經制之士舉海内而計之不三數人耳故州郡所謂學校勉勵進修之方從而無實埽地何有嗚呼儒乎其㣲至於兹乎斯文在天無可絶之理是恐不止不行不塞不流之意邪然士不用則巳如或用之固非一朝可就必須廣學校録師儒振士氣而勃興設衆科而肆取故得人材輩出以膺文武之選以成乆長之業斯則適其時矣任是責者庻聞之油然有蹶於中述儒用篇吏解甚矣吏之不學取之無術也紛紜苟且自進自退據其名則正校其實則非而官之形勢衆之情偽習不相逺也故諺曰畫地為圄不可入削木為吏期不對此葢傷其持心近鄙之之辭也然非吏之性也勢也今夫一縣之務領持大槩者官也辦集一切者吏也簿書期㑹之所交錯也利害督責之所相須也鍛煉酬酢日復一日大體細行有不遑顧者少或蹉跌輕則窘折困辱重則搒責退黜吏之為役賤已極矣安得不持其事而逾急欺其心而後語哉或不經事昧於自信聞其名則憎見其人則易意復少忤至忿嫉訾毁不以禮貌相接也是皆不澄其源而責其流之濁也若使上之人能清心省事一其法政簡而不擾雖有桀黠苛刻急遽苟且之心將安所施哉余故曰非吏之性也勢使然也若從其流而責之所可鄙而傷者甚矣今天下之人干禄無階入仕無路又以物情不齊惡危而便安不能皆入於農工商販故三尺童子乳臭未落羣入吏舎㺯筆無幾顧而生奸重至於刑憲細至於詞訟生死曲直高與下奪紛紛藉藉悉出於乳臭孺子之口手幾何不相胥而溺也以至為縣為州為大府門戸安榮轉而上達莫此便且速也人烏得不樂而趨之嘗聞近代吏之出身難矣由州而吏員由吏員而部掾法律乃筆人材行止舉明有官否財結罪然後考試有司寸歩不移設法既嚴百不選一猶恐中非其人而害於政以今觀之其可鄙而傷者當如何哉且兩漢之世丞相御史下至三槐九棘蔚為名臣者多吏也固必學之有素進之有道初不若此紛紜苟且嗚呼弊極而變變則通此必然之理也然非持衡者孰為立法而興革之哉作吏解篇田訟民之致訟者多矣未若田訴之未能決也自井地散而為限田限田變而為無法此事端之所由興也又以兵農勢異兩有相犯各持其是而不相下治兵者曰吾軍力之所自出親民者曰吾征賦之所由辦居上者若是為下者將安適從至官諉吏而搏拏吏眎賄而與奪牽制蔽欺卒無定論幸有審兩造而克荷者情裁臆斷明同仁一視之公釋累嵗積年之弊徃徃廹於形勢顧後患亦因循而莫之問故僥倖者覩其如此又以彼弱易欺也紿冒敓攘靡所不至甚者損衆益已閧一方之訟必被擾而後已以致乖戻抑滯之氣鬱積於上烏得無水旱之異哉水旱之來又弱者所先苦欲政能行民之不困也難矣余嘗讀犬雅綿之詩虞芮質厥成文王蹶厥生葢言二邑訟田徃正於周及入其境履其庭禮譲之風無或不在二君感而中愧生其固有之心相與罷歸棄所争為閒田自是歸周者四十餘國先儒以是為西伯受命之符冝矣孔子曰能以禮譲為國何有其是之謂歟鳴呼三代而上教有餘而法不足兩漢而下法有餘而教不足教不足法猶足治也矧教與法俱至闕然者乎民不險而訟也又難矣施於今者冝若何曰惟有明其教一其政立其法於其上然後擇官宣化守其法於下庶幾民志日定而訟者少為之熄矣述田訟篇黄石公説秦惑李斯之説燔書坑儒以愚黔首故一時豪傑之士醜厥徳而恥食其粟者多笑如葢公盧敖倉海君商山皓皆是也若黄石公者後世獨以鬼物為疑非也觀圯上一節公葢逆知其炎劉將奮非良無以輔成漢業雖然顧狙擊始皇於博浪沙中良之氣固以為葢世雄傑惜有其材而未至者學耳及一旦相值輒令取履跪進旬日間徃返三至先折以禮繼稱其可教特重夫師教之傳抑使動心忍性徴於色發於聲而後喻也兼使執履効弟子之職非有惚怳可怪之事而班固亦以非有賛焉設若良欲神其所遇不過使高帝異其非常平時智計皆自神異復不輕其所授教而已使是公果有黄石即我之語亦不過古人事了徑去剷跡韜光令千載而下仰其高風可聞而不可詰也又嘗讀公遺書皆明哲警㧞之道殆黄老氏之精英者也不然何自託於荒丘􅀈确而為是素隠行怪之舉哉由是而觀東坡稱公為秦隠君子可無疑矣距祠東里許曰黄山下有阜有孔穴其巔巨石嵬立土俗相承云公出於此尤為不經云至元甲申嵗夏五月余覆灾祠下顧瞻山川慨焉興感書是説以辯云筆説燕之筆霜雪頴也勁而莫為屈楚之毫炎蒸之毳也柔而易為書勁與柔何俟多論獨念夫用之有難易也余以心無所用近集三代以來輔臣相業述調元事鑑筆為日課資間中一樂机格間燕楚之材皆具柔和者易於得手腕不知勞也勁挺者艱於如意手指既据致牽其臂而為困然不數日燕鋒方練布畫愈精顧楚産已敗而不任吾用矣予於是乎感焉曰此何異於相之用人也昔霍將軍子孟欲顓事權利其庸鄙者故相李蔡石慶王訴楊敞使之充位而已霍終不聞讜言其族隨敗而無餘唐相蕭嵩亦以韓休柔易而薦之及其當位持議方剛殆不少撓至有不意能爾之嘆而開元之政蔚有可觀後之君子居於人上者正當毋友不如已者可也苟專以庸鄙便已為心其如邦家何作筆説至元丙戌夏六月三日也龜蛇説已丑嵗秋八月癸亥有𤣥龜丹蛇見於太乙宫之書院鍊師范君再拜以禎祥來請予為之説曰蛇虺所在有而𤣥龜不常見一旦蹣跚蜿蜒並出而偕行此又覩之罕也二者化精水火𤣥武衷甲以自壯靈蛇摇毒以螫人故古者師行圗形旟旐用先啓行加招摇於上俾急繕其怒以示禦侮毒暴之戒今六代純一師奉命醮斗積有歳時豈精誠感格當進作之際堅勁衆怒俾禦侮警暴隂為之祥邪然禋於彼而見於符籙所在者豈祭法從出昭其教之本邪不然昔昭應宫因二物畢至靈宇斯建抑亦壽宫將欲復増光舊物此為有開之先兆邪吾不得而詳也作龜蛇同出説冬十月三日書牛生字説全閩鐡官屬吏曰牛生者東平人世儒家尚氣義好刀劍或欲之雖千金不恡聞余名甚喜通謁來拜予曰汝非文星者乎唯而不敢當吾自壯嵗亦以論文説劍為喜今雖耄氣習未除也遂與談古今劍器雄雯雌縵者數品至有所未聞而未見者若欲吐燕趙勁氣而來呉越之清風也已而跽請曰星之表字走有所未安幸憲使與易而淬礪之因謂之曰維北有斗不可以挹酒漿然經緯昭布天之至文也昔龍泉下伏紫氣上鬰張雷識之得二者於幽囹之下嗚呼一物之靈有如是者傳曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫物猶能以氣而上達人固當以文而致昌其以文昌字之可也牛生其朂哉毋怠於是書以為赠米少尹名字説人之性有生而即敏者有學而後敏者要之生而開敏者為上習而成性者次之劍倅米君燕産世為西域人性開敏樂於為善嘗憶其兄中丞丁多故際衆無異議中外稱其善良予過劍浦米來求名因訓之曰闓闓者生其善心顯其可踐迹也内不先開英何為而發故字之曰英甫東汝年方壯功名鼎來若能以乃兄為法篤其良心踐其善迹是不負天性㓜成訓夫闓之之義也英甫其勉旃庚寅九月十二日書於南劍㕔事孫鞬郎名字説六藝以射為重三代所以觀徳而貢士也故男子始生懸弧矢於門俾射上下四方示有事於他日也元孫鞬將生之夕總戎晉人杜侯以竹簳五十遺余侯甫去而鞬生其開先慶璋名逐生來之兆為不偶然者昭昭矣今生十有八嵗姿妍静學習頓嚮方訓名象徳不即開先之祥而用之將何求故以笴名之而以君貢字焉亦因饋命鯉之義乃告之曰雲夢之竹天下之美材其采而貢之者將達之於王庭修夫射宫大用以明擇士之道其為物豈不重哉然矢之為矢必須辨隂陽相搏勁矯揉以端其紆趮文彩以煥其羽筈堅鋭以利其鋒鏃而後可以洞逺而㨗鵠不然雖公佗養由之伎且將不吾取矣嗚呼笴王氏由農而士嗣志讀書迨於汝葢五世於兹吾老矣其所以望於汝者端重持其中和易接於外不使一毫怠惰之氣設於而身以之效用致逺而光大先世之業小子笴其服之母斁至元壬辰秋九月十二日少中大夫祖父秋澗老人訓示又因而詩以戒之云訓汝諄諄意竒文見乃翁洞堅威可大棲鵠體須中既應開先兆當知矯揉功逺期遺近效羽夾看摩空樂全老人説昔太史公傳貨殖以素封而名家甚夥然冨而好禮享所有而全其樂者葢亦鮮矣林氏系蘇門望族君玉雖治産時遂處心逺大資之以發其身者良有足取為人志明而氣鋭樂賢好客教子孫讀書顧一事不肯屑屑出人後通都大邑居竒貨儈贏羨掉臂於陶朱猗頓間千金之産有過而弗觀者至親近名士大夫風雨寒暑奔走不避如鹿庵顒軒二大老愛其疏通知變皆欵與其進遂資藉子仲先為時聞人故其好事之名高出行輩達官時貴踵接於門者無虚日家則藏書有閣圃外思親有亭植佳花醸名酒客至則撃鮮為具賔醉而後已窮年而不厭也今年七十有五視聽聰明行歩加健飲啖如五六十人既富而壽壽而安安而能享承家有子純孝而特達釋負有孫善繼而克荷嵗時讌喜朋簪四盍兒孫滿前奉觴拜壽樂融融也一門之中百順坌集何其秉之厚樂之全且見其禮義之生於家也予以世姻故㳺最狎因舉曽有慶謂子仲曰若廼父克享所有以齒以徳援古人之例冝易名以顯異之若等以為何如曰謹唯命遂以樂全老人目之異時瞻喬木禮高年使誥雲絢綵爛焉盈門是將望於若子若孫者未必不張本於斯耶已而子元來請其説於是乎筆以為贈嵗壬辰至元廿九年履端日書劈正斧辯斧斷蒼玉為之長徑九寸有幾鍼之刃滿六寸頦下畧齟齬之中堅厚二寸強龍首呀脗齧於口作兩段吞答腦與刃通以柯貫之上以雙蟠螭冒其端下以玉為琯承其竅華潤緻宻無㣲疵可摘神兵凛肅真秘寳也且斧者黼也黒白二色相次故以水蒼玉象之三代之制云兵刑喪祀用之餙怒以賜殺執之以就列示威以啓行而已今則天子正衙朝㑹命冕執中立以劈正為義莫究所從來然法物變易多自陳隋李唐因之有不能廢焉者歟又制度追琢以近代工較之非隋唐莫之能作豈劈正之論權輿於二代間邪嗚呼斷之為徳至矣昔孝成以優㳺不斷漢鼎遂傾憲宗知惟斷有成淮西克平是既繡於裳繪於扆織於箔畫於幕今復植立以肅正朝古之人納君於正去邪勿疑寓徳威於物以將其果毅者俾無或忽也垂戒之義深矣至元癸已春三月二十六日因閲實偕御史商琥修撰魏必復觀於侍儀法物庫偶憶近嵗夢先師命予賦朱干玉戚今日廼與神物㑹遇焉所謂嗜慾將至有開必先者也作劈正斧辯王氏冬藏圗説夫出處語黙君子固由其中然造物者不無意於其間也適事殷之時引之静處使逺其咎人意若中百所惜我可忽其所事哉曰事謂何静而積學以俟夫動而有為也傳不云乎居則曰不吾知也如或知爾則何以哉况苒苒而來我悠悠而遇心放而不思其求學雜而不至於穀坐靡光景日就衰謝則曰人不我知時不吾用其為惑也亦已甚矣今將収放豚以入其苙屏吾雜以絶其害朝焉而經暮焉而史經則所以端吾體於中史則所以驗吾用於外旦為夕之所不能夕補旦之所不足要本先定力以固窮終精思以求道貫夫六藝之㫖而醻酢乎事變之來者如斯而已矣至於無益之談不切之務昬怠之氣過分之思合俗徇情徴逐佻達一日三秋之戒廢日廢身之喻又見夫左箴右銘儆其敬之未莊心之所不力也嗚呼昔孔宣父稱顔氏子其殆庻幾豈非三月不違其仁乃優入聖域之要也歟予嘗求是心渾然無間於一時之文者無他政自敬與義夾持動與静交相養故也若夫冬者嵗之一時猶夜之所當息也又易曰艮其趾時止也雖止止不終已而須其所止者葢成於終而後有以成乎物之始此冬藏之所以作也至元二十四年丁亥陽月朔日云度曲説敬齋李先生晚年以歌酒自娯既耄雖不復而情猶獨至每興來輒持空杯令門人酈生放聲長歌以導歡暢或不如指先生以已之所得教之遂㦸其手而高下之使視焉以諧其節奏雲起雪飛窮要眇而後已公亦醺然也丁亥冬十月八日飲李氏新篘偶及分刌歌節信主士達仍為發此沖沖然殊有所適昔孔宣父與人歌善必使反之而後和焉又漢人例蓄聲樂唐之士夫皆有音樂由是而觀歌之為藝亦术可少也先生以材徳主盟斯文六十餘年予纔得一拜履綦及過元氏先生墓草已宿何先賢風流藴藉不容多得也如是可勝嘆哉吾特書此異時㑹與蕳之酈君相值於光風霽月之前拊掌談笑中郎之文采風流不無彷彿於眉睫之間也士達其志之又從而為之辭曰我觀夏禮杞固不足徴兮吾道綫如賢獻日以零兮斯文未喪其將孰為興兮噫中説聖人垂教千言萬論獨以中為天下之達道者天體如是也且天地周圍三百六十五度而南北二極揆上崧高乃天之中心也故定極焉然後天地位而萬象則其法為故過則為差不及則氣不能成嵗折而中半二九一十八則度之數又稱停不偏矣人出於兩間受其中以生是謂之理理者仁義禮智之謂由是觀之聖人之為教所以因其材而篤焉舎是何以為物何以為則故董子有言道之大原出於天其斯之謂歟於是述中説至元戊子端午日雨中書命説姬仲實者名思誠真定靈壽人㓜業儒兼該隂陽氣數之學今年四十有九以耕稼歸隠孤虚取名非本志也至元二十五年自趙過衛將還裕之方城縣合河鄉之新居為予作一日之留得略談三命之理知姬之所得絶與衆人不同其法大抵取先天二氣五行萃合一處以盛衰偏枯尅陷扶助就其胚胎截長補短互相乘除度其造化虗實得中與否然後斷其衰旺成敗何如耳且謂予身自乙巳至甲辰兩運極安静得壽垂老若無疾恙予莞而謂曰所獲多矣尚何冀云又云人不富貴者若有學問即與享用者同樂又曰品秩入格局者極難因説賤庚即今大運見在乙已已中闇戊人皆以破丁官者戊也然戊居已若無力不妨姬曰不然秪為戊字居已無力故官氣不旺何則日居丁夘火取月壬子為水丁之官子却為卯相刑尅使壬子散漫卒不得用若戊土建旺即成涯岸其水自可浮舟楫潤物類今年嵗君雖是戊子戊旅寓於子非土之正位亦不克助燥開嵗已丑用神戊辰皆土恐却得扶藉作内作外皆獲助益葢上下氣體皆順故也又以六壬占得一課其名見幾初傳功曹次傳從魁末傳天綱中間所有動静不渉虚妄其占云功曹者官府之吏長起發其事者也從魁氣母之杓斟酌與奪是大人之主斷者天綱即斗之標係從而賛輔者也謂如杓有挹用柄自然來隨將來所應多是武秩文用今嵗窮臘來春孟仲間其事可驗門下自來占決無得似此課皆順無逆有成不妄也幸切記勿忘時嵗八月十二日甲子未刻事也因念逺㓙近吉君子之恒心故數占而不厭惡直喜諛世俗之常態多願聞而受愚至有求其所不可得避其所不可免中無蔽志一聴於卜神亦不為之占矣且不測者隂陽之神也孰為細人寡聞者可得臆而度思彼妄意受愚者是特疏釋一時之隕獲耳苟非理之所在義之所當行者其將憤警俗虚高務悦之説君子雖聞之而弗由也然所以見其彼之云云者試以吾之所在而當行者且念夫彼之殊異於衆人之所謂者果孰得而孰失哉作命説金從革説予嘗侍坐於丞相史公昭文先生談嵗序攙搭之説不爾四時不續嵗功不成開府以未之聞而喜甚繼以鼓鑄事語予曰汝知夫金之從革乎工人摶沙為範力甚疏弱以金燬烈之氣㵼而就器彼様度之方圓文章之緻宻顧雖丝髪之㣲其脈絡縱横莫不克滿爛然可觀有非人力所能然者何則方金之在鎔也猶氣之氤於範圍間也彼􅂱􅂱融融揚彩委質既為之氣葢有無不肖者所謂氣無不周者是也予以晚進學淺尊卑勢殊有所聞不敢質其所從來後乃知據易説莊解而云其敷言甚覼縷也以今思之為予而發者多矣予平生疏直強項氣不少人下而於世每竒而不耦先生以不屑誨之葢先説欲學者紬繹其道貴夫造之深也後一説以變化氣質為先欲澄治粗厲俾就夫氣之中且和也此豈唯予益實於世教有補惠夫後學者深矣因追録前言述從革説馬氏子處禮世治家氣清而志學來求予訓辭特書此以貽之古文今文難易不同説訓誥誓命等文體固不同要本聖賢以彛典明天理本人情統羣心而已然古今辭文有難易相反者先儒論難終未明了以予度之書之為䇿須史氏潤色櫽括既出衆手性異好尚學有深淺才有高下筆有強弱而辭有澀易故也九峯疑其勝女口傳者偏記其難孔壁後得者反為平易反覆究説似逺而泥謂如尹之訓賢君也當深而易庚之誥民庻也當易而深又周書五誥􅲪牙詰曲叮嚀委曲有不易曉者此無他一繋夫當時人情勢有不得不然者更值夫史氏之尚竒者一向艱澀韜其幽光以成噩噩灝灝之體耳蔡氏復以紀實難工雅辭易好為辯是亦主其措辭為言然不辨此恐杜後來者詳説使學者躍如求於耳目聞見之外也商魯頌次叙説韓陳二生問魯繼周頌商次魯頌之後何居余曰三百篇皆周詩魯則列國葢周之後裔僖公又魯之賢君天下無王蕩蕩板板而周禮盡在於魯故孔子曰如有用我者吾其為東周乎賢諸侯不與將疇歸恐亦書終以秦誓繼之之義也若商頌次之魯下殷周之先代前後不叙意者孔子殷後又當斯文之主那等樂歌皆成湯高宗盛烈其聲其靈赫赫濯濯如此為子孫者刪次之際偶得是篇於太師可忽而不録仍附於後以終其絃誦之意恐或然歟百獸率舞説百獸率舞先儒皆無明文所以然者豈上世四靈在郊樂與天地應氣故幽則神和於上明則物和於野正縁史官形容四靈等瑞以見其氣和之至且如唐明皇舞馬止是一時教習即能驤首振鬛銜杯上進應樂節不差况聖人教化極和感發動盪上下同流信及咸若有自然而然者予故曰獸之率馴葢實有之非溢美辭也不然則鳯凰來儀亦可為疑乎雹説陶晉卿説獲嘉縣今年五月初雨雹為灾真大如杯裷桑棗皆戕折無餘及多㧞大木有提去百歩者如此凡一十八村其可畏也予曰天地間無别物只是隂陽二氣交感而已雨露霜雪如常者天地和恒之氣也唯其弗和致有此氣異葢隂沴乖戾之氣從中脅而成之其大小即隨所感輕重而然木㧞與去此是伏隂搏陽而奮木適與之值遂突而出耳氣盛物㣲吹而去之氣散自墜於下予二十嵗時行共山道中望羊角風自西南來蓬勃方數百畆吹駕大枿於塵坌上者數十株正此同耳申豊云雨雹山有氷不藏藏無棄餘所致且一嵗山谷間隂積不釋者若一一藏之庸能既乎又夷堅志説有人雨過山行覩大木忽㧞至聞其隂靈用力過而自絶倒者是皆齊東野人之語士當教子説予嘗疑士大夫多不教子求其情而不得乃臆為之説曰儒家者流博而寡要勞而少功學者有牛毛麟角之嘆其成難也如此豈謂是歟且以已况之攻苦茹辛焦心勞思積數十寒暑之勤僅得猥列士行否者將何所冀哉故徃徃多不以所難強其所不能寜從彼好使易為立身耳然蜾蠃蟲之最㣲者尚能負螟蛉振羽而祝之曰類我類我况人乎彼或不賢為父兄者固當擇其師課其力誘之掖之俾極其所進之方果鞭而不前然後隨其所樂以畢父兄之責此吾儕當然之理也然自非下愚不移天下無不易之俗人無有不變之姿只在夫發藥者如何耳為子弟者至此日當愧恥無地心憤口悱勉立志節人十之已百之人百之已千之若恐不及為心又使昬惰之氣不設於其身可也先君亦嘗有言四民士為重學有成高出一世如其無成不衆人若委而棄之此何足以有為是則賢不肖其間不能以寸孟軻氏之言責固不為過矣又父兄不能乆視長在一旦衰謝覩彼之子孫若是之高我之門户如此之卑家聲日替世業一空幾何不嘆息而悒悒於斯也近一素宦以家學授其子三俱有所立尚以未登仕版至告人曰吾死目且不瞑矣父母之心天下一也况其所業未就學幸得而不自強才可進而乃自畫其為父母者安得其心不攸困者哉作士須教子説周景王大泉説世之嗜古者多尚鼎鐘鼎鐘徃徃偽出古而真者莫錢若也陶簿晉卿好古泉而得大泉五十者攷之譜籍葢周景王所更大錢大夫單旗諍之以為不可者是也其形徑一寸二分其重積十二銖今則半兩也以嵗月計之自景王迄今幾二千年矣其文與周郭肉好精緻堅凝略不為之齧蝕信哉前代制作後人有不可企及者嗚呼陶子其寳之無斁安知無被􅀈杖策踵門而來丐者乎昨日歸卧春露堂既覺適有筆研在几偶為書之覺體中不佳拂拂然從筆端出去矣至元二十四年秋七月丁酉戲題賣兔説伊川先生見賣兔云此亦可以畫卦或者曰何謂也余曰物盈天地間皆從氤氲一氣中來所謂萬物一太極也卦之畫一隂一陽而已兔亦具其一者之氣耳見兔亦可以畫卦葢謂有此理耳故又曰不特龜馬之顯著者焉二馬圖説明昌初西夏國母病章廟遣尚醫徃治愈之獻名馬回謝一日進御以試良徳即旋焉上怒命太僕驅去窮日力斃之未夕返徃馳五百餘里歸望天廏振鬛長鳴若無事然自是以一骨當御今觀此二馬毛烙駭異黄門飛鞚迅若㳺龍豈非當授轡之初邪嗚呼馬臣類也食三品芻豆立内伏一鳴則黜之矣其或猥靡於心取媚於上以速見知皆非馬之良徳也然則馬之為如之何而可曰有受策服勞不有其力以報芻豆秣之恩庻幾或從王事無成有終之義也作二馬圖説稼齋説崔文字文卿稼齋者府從事崔君之自名也求余以𨽻書冠於卷首余曰渠年少氣鋭方馳聲膴仕以調議理務為事何以稼為豈起家隴畆掲焉而不忘其本耶豈食貧口衆禄不足以代其耕邪豈仕不為貧動乆而思其静邪曰崔氏世居茌平薄有田廬近在郊遂與城居不殊其静僻殆谷耕林隠也徃嵗自海上罷官西歸脱煩鞅謝人事郊居者數月沖然大有所適方夏之初三農在田耘耔底績予開軒卧治觀良苗之懐新有田畯之至喜及夫多稼雲如薿薿彌望奄觀銍艾偃然覩崇墉之積賡豐年之歌動高廪之詠田里熈熈物情交暢以已之樂而為衆樂因衆之安而為吾安是乃平昔明農私有所得於此也其為稼也不亦宜乎余曰四民之分各有攸業而進莫榮於仕退莫安於農仕則思吾所當安而明夫學之用也農則安吾所當遇而樂其身之適也若當仕而農將貽老農吾不如之鄙當稼而仕恐渉大易知進不知退之譏然進而懐静退之心不猶愈於退而存不已之念也歟崔君其艾服官政而於進退能先求其所安而安之而後思已之所安是亦先憂其所憂而後樂其所樂之意也作稼齋説貽之李郎中二子名説郎中李侯正卿有子二人俱教之讀書從劣孫問學其勉勵資藉之者甚力其長姿頗篤厚次則似涉輕俊然奉若父命周旋唯謹一日請訓名字於予廼告之曰古人立名命字取義多端俱不若酌其才性優劣即為教誠而抑揚之最為親切夫篤厚者必藻之以才華所以彬其文質也故其長用質命名而字之華甫輕俊者須濟之誠實所以備其材徳也故次者名之以俊而誠甫字焉嗚呼二子今而後當克制其偏勝涵養其不足以造夫中庸之極他日立身行已不致有過不及之差庻克荷汝父平昔提誨之責尚佩服之母斁秋澗集卷四十六欽定四庫全書秋澗集卷四十七元王惲撰
