body:
  text: 承㫖董公繪野莊圖為求諸賢題詠中齋草序以同人致亨晦叔撰銘以儗倫溢美恐未盡公臆之所在若夫士君子出處固皆有命不可以遲速工拙為言然當得行道時静退之心何嘗食頃而不在懷也以艱于自云必託物以表其志雖未能挂冠神武斂裳霄逝較之鐘鳴漏盡不已行者猶賢乎已喜為賦詩初不計其不自量也其辭曰午橋吟醉平淮後商嶺鴻㝠定漢餘正恐野莊歸未遂九重思治望新書老筆錬餘詩律細事機諳久宦情疎輞川圖上王摩詰静退為心是本初寶珠換却杖頭鳩空見秋𤓰憶故丘白首相㸔官舎底晚年心事轉優游輥馬圖馬蹄立論見天機四輥塵沙更適宜恰似解袍隨意處小齋盤礴退朝時題錢舜舉畫梨花香飜玊笛真妃怨雨暗霓裳樂語凄不佀錢郎能駐馬滿庭風日醉如泥水西千樹閙春華莫把芳容帯雨誇㸔取一枝横絶處洗粧還是漢宫娃題廏馬圖前年扈從獵長楊偶雜髯騶宿野莊一撁玊華三百疋老人垂淚説先皇三笑圖元聖開天一理融推心不外善為宗後人剛作無同論三子相逢笑殺儂題劉道引卷末傳家素有延齡録手澤珍藏鏡李辭吹就棘心親不在每觀凄斷凱風詩題朝元宫劉道人秋聲圖紫極宫深景氣秋翛翛牕竹發詩愁謫仙千古風流句輸與歐公作巧偷少年心事讀書臺凉入郊墟已快哉星漢在空人未寢一聲猶憶樹頭來寗戚叩角圖長夜漫漫志未伸單衣雖敝霸圖新一匡已在夷吾佐激烈商歌惜自陳覺山寺題示貞元改號夏四月九日為勅建司徒鞏公墓碑同朝貴來㑹需命間客有談盧師當遊者闕山闕道阻遂折而入覺山精舎觀泉闕景氣瀟爽不復留宿為恨山僧泚筆請留詩于壁偶書此以記來曽偕遊者太一李宗師承㫖董野莊太學李内翰東平賈彦載秋澗老人王惲題為樹瑶鐫未奠間杖藜尋勝一躋攀世間萬事真難必來訪盧師入覺山誰削蒼巔峻作崖碧瀾直上妙髙臺静功儘辦瞿曇鉢石罅清泉送玊來山因寺勝寺依泉雲自無心景自閒懶陟上方窮逺目黄塵深處是人間丙吉問牛圖休驚宣父才難歎兩漢調元見是公後世幾人能辦此救時纔得一姚崇右軍觀鵝圖照眼雙鶂引頸來胸中妙思與之偕寥寥尚友千年後只有涪翁識此懷又跋問牛圖坐理論思一相功只今機務簿書叢後人刺口無輕議世事㸔來總不同閩海道憲司書吏張禧事母以孝聞本道具辭上達得請乃以所居論秀坊為純孝坊時禧母近百嵗健如五六十人諸人賦詩為慶吏業傳家説寧馨炎方享夀見徐庭婉容還憶相㸔處燭治官書在憲㕔養親致樂固多岐無重承顔志不違純孝表門纔兩字四山和氣動春暉平生快吏元康筆俯就功名力不難邂逅南陔見深愛為親初不厭卑官鄉閭顯異有新書衣錦還家喜不如歸到建園春正好里人拭目拜潘輿寸心擬報春暉養禄食榮同潁叔羮兩地月明思最切倚門心事正懸旌建人悍勁尚氣節不爾秀狎多文儒鄉間今説張忠孝還佀中林返哺烏淵明臨流賦詩圖秋水門前有令姿先生非是好吟詩因觀逝者如斯説天運何嘗有息時題存樂堂詩卷當年膝下侍慈顔蒲樹悲風入夢寒不及一杯菽水養對君慚愴淚䦨干寸心不到南陔養空羨中林反哺烏最是范公含恨處百年温飽見妻孥題成經歴晚翠堂雙檜堂前晚翠新嵗寒相對更情親東家桃李君休羨爛漫光風幾日春七十平頭恰數朝望秋蒲栁到松喬何當醉闕處滿院秋煙濕翠翹明皇驪山出獵圖都尉王晉卿筆五家錦繡迷川谷萬馬旌旗獵帝師治亂兩途明在眼丹青渾是黍離詩玊泉巖并序元貞二年正月中旬兩夢登海山絶島明日隣人葛巨川以此圖見示巖巒四面皆自天成色深翠秀麗惜其淪落泥塗慘淡有未之發者上刻五題曰夀山曰玊泉巖其傍絶頂有懸流一脈下注山足甚鮮明也曰崆峒洞曰子陵灘曰白石瀨皆以金填形勢與玊泉山不殊疑前金宫中物也兩夜登臨倚碧岑夢中驚絶此﨑嶔朝來翠射娉婷底笑煞平生未足心送韓推官之任廣陵歴試諸難貴逺期休言為吏莫為推煩渠細讀瀧岡表恐是廬陵積慶基花樹韋郎好弟兄當時同宦最闗情三年不見諸韓面却為儀山即送行元貞丙申立春日作前嵗徴車起陸沉清優特置在詞林明知不是商顔客當體先皇養老心終日思歸憶故山玉堂金馬有堪憐只知蓮炬君恩重其奈山公啟事偏六藝蹴空成底物龍鍾何有玊為堂眼明愛殺韓忠獻到了蘇坡一議郎題西湖圖東南形勢説餘杭誰辦山谿作國防踏雪欲尋龍井去表忠祠下謁錢王丙申嵗京師元日門帖子三冬露處無家客七十殘年有限身强項一生今潦倒更將低首嚮何人中舎無心喜外遷非縁詞筆厭雕鐫眼中故舊飄零盡嗤㸃從渠最可憐錢舜舉折枝圖探花走馬醉西城嵗與東君佀有情不是今春風色惡折枝圖上㸔清明院中即事元貞元年為修實録移在北中書省内有時下直出銀臺三昧楞伽亦快哉不似近年官事急小車還聽御批來李肇翰林志説前輩傳楞伽經一本函在屋壁每下直出門相謔謂之小三昧出銀臺門乘馬謂之大三昧如釋氏云解縛而自在也重遊玊泉井序元貞二年龍集丙申三月二十八日大駕北狩同翰林諸君送次大口囘獨與孫笴西過玊泉因憶至元七年御史裏行時來遊者一十有五人嵗月如流轉首廿五年今在者李司卿輔之温漕使次霄與不肖三人耳人欲久不死而于人世何如也凡得詩三絶留三間而去輕轆澤車轉碧崖山煙喜客望中開畸人問我從何自適送鑾輿大口來進水山僧去未迴日長空閣獨徘徊尋詩不到瑶華境踏遍松間碧色苔山頭亂石鬭槎枒水底浮光浸碧霞絶似蘇門山下路惜無修竹與梅花清白圖為何掾舜舉賦傳家素有游鯈㓗竊禄生憎碩鼠貪三考臬司如一日眼中何掾得無慚題韋偃十馬圖浮深角壯恣游嬉沙苑春風碧草齊聞説紫宸初立仗内家正要不鳴嘶國初鞍馬説江都今見韋侯十駿圖獨愛少陵忠義氣艱危安得濟時需賀東泉翁山中雜詠一十三首過眼紛華興未䦨人生難得老來安山中致爽饒清賞不是悲秋强自寛山居為愛淵明不自賢夕陽飛鳥兩㤀言已邀白日羲皇上况復青山是故園清美堂啟期三樂素非狂帯索行歌老自量明理已安循理轍息心元是養心方歸來亭生平游刃擬青萍一日歸來與道寧繞樹每憐驚木鳥思親時上望雲亭望雲亭丹砂玊屑燕窠瓷臺閣風流見一時桃李春光能幾日惜君元有嵗寒姿幽芳軒朝三暮四本來齊誰為兒童較栗梨今嵗見花欣實美山中風物要通知香雪原田家剥棗暮秋初野甑蒸香木蜜酥不富正縁無滯貨芋魁牆外又成區木蜜圖山中處士玊堂仙兩地相望思渺然説有詩來多勝槩含情多在碧雲牋杏塢静約幽人品羽茶偶來稚子去鋤瓜問君何佀東陵日猶是峗山故老家𤓰堰門外清泉兩㲼流臣心如水更何求濯纓濯足終多事已分心身到逸休東泉樹影扶疎聽鳥音可堪時事百年心髙情愛殺陶元亮一醆秋香見獨斟西泉徳澤涵濡得二難百年祠館見遺安蒼蒼一片墳臺石留在行人下馬㸔墳館士論推稱諡最公瑶鐫三尺刻文通因君喚起西南興夢寐洄溪碧斂中先君衛士夫私諡為文通先生曹右丞生祠手卷前年拜掃玊墳廬笑逐雙肩到並驅林薄氣清侵邃宇人家春社樂于胥農樂無如嵗有年更將民瘼細為蠲應憐右轄祠邊月花栁深村有二天李白醉歸圖雲陣横陳大渡河一書能解六蠻和仙韶莫詫君王寵七寶莊嚴未是多襲美堂詩雲中張釭母姓楊氏性資淑惠小心敬畏早見知于宫中出入禁掖垂三十年前後賞賚濃渥楊殁上思保育之功贈安翼趙國夫人生子六人長曰鎮出刺荆門沂水二郡其四曰鑑知東勝州餘皆宿衛宸庭襲美㸔來媺在中當時安翼有深功春風吹下蓬萊閣二子歸來五馬驄自題冩真白髪刁騷一幅巾遺書浩浩百年身縱令不入麒麟畫已是三朝館閣臣李德裕見客唐韓晃筆徽宗臨并御題在後金鑾載筆寵光多三鎮風聞自削磨開運中興元兩樣相君勲業邁蕭何恩讎平日太分明胷次㸔來氣未宏不鎖宅坊停衛士諒知堂上有奇兵闕動華夷機務論思儘有為一貶未應生重闕崖州山色要新詩經綸心事在思亭據榻髙談佀自矜不見省中温室樹孔光終了説何曽有才善處是無權朋比為心自黨偏邂逅郡樓囘首處杜門應羡晉公賢意氣揚揚與脅肩較來失德兩同然春風滿眼桐花鳳不是當年諤諤賢送同知范君璋之任平灤昆明授法起虢嗣民瘼洗蠲宜飽知後日鳴絃千室邑豈惟活國説良醫三紀承恩鶴禁深一官灤海任浮沉固應天上張公子好識當年大范心張遂初詩鶴禁辛勤四十秋端功端品可封侯一官纔入尋常選猶被時胥問解由需軒閉閣陽城醉佀泥諫臣為論在韓疑一朝力折延齡相識得三陽出險時據按事從中道處洗心思與繇辭新小軒不佀朝來喜倒屣門前不速賔則天朝囘圖萬有潛隨一氣囘武炎如火李如灰上陽宫殿春風暖花底朝鞭隱若雷過瓮山記老人語刑清兵寢嵗豐穰五十年來帝道光駝馬欄東逢老叟向人猶解説先皇題劉元禮挽詩卷後有得歸為怙恃榮三年索米可憐生一杯不及慈闈養空有殘䰟繞斗城三尺旅墳燕地鬼一篇新序翰林詞友生最是情鍾處夢斷空梁月落時客死無歸最痛心李生哀慟惜知音只縁識得天倫重不為黄金緑綺琴任氏具慶堂積善中來慶自全一堂和氣覺春寛人間兩字風流處貼在兒曹額上㸔夀援諺語應餘七數比名泉更益三婺女老人元瑞世兩星今見濟之南劉僉事友竹亭詩退食歸來對竹吟相㸔同抱嵗寒心只今眼底交情薄不似環亭翠影深公子清標有足多紫微垣外侍雕戈料應瞻彼猗猗興瑟僴功夫見琢磨題錢選臨曹將軍臙脂驄圖涪翁醉草丹青引秘省珍藏獵騎圖老眼再觀知有數喜從唐本玩臨摹龍種生來見異姿春風舞影下瑶池馬中岳湛錢郎筆冩盡坡仙七字詩刻烙天全固可悲不應顧影自驚嘶君㸔慘淡經營意重為莊生解馬蹄首脱金羈藉帝閑春風沙苑草芊綿承恩幸在林園地誰與争鳴八駿先良驥初非以力聞丹青傳冩畫圖新超超説是千金駿踶囓何曽到圉人相馬圖駑駘安分老青芻騄駬論才白璧酬相馬只今誰伯樂解教駑驥兩垂頭題趙嵓人馬圖嵓五代人常為朱温駙馬都尉天廏真龍自不凡未妨束縛具羈閑當時一筆千金重今恨無人説趙嵓甲午嵗門帖旅食京華兩見春衰年來作玉堂臣一家温飽恩光裏補報無方愧此身題徐中子方愛蘭軒詩卷吏部尚書實魯衮索賦幽蘭在谷似幽人相近相親有使君獨愛遜綿詩律細宛從平淡發竒芬手治蘭臺種竹圍䕶香籠日淡炎暉絲綸閣下文書靜却似當年對紫薇山行還喜得夷途路轉蘭臯更可娱十里曉煙香不斷春風吹袂過鵝湖予嘗往來饒信間景物多異惟鵝湖山氣清淑土脈馨潤所産花卉非蘭即翠竹其餘有不敢與之並者晦菴先生少時愛其地勝嘗讀書于此特表而出之濟南録事參軍解君瑞芝圖曄曄亭亭紫葢光氣和無地不芬芳一枝特秀溪堂下似表參軍政異常從來腐朽化神奇正自餘精發菌芝浩蕩上林春色裏自憐蒲柳望秋衰題李巨川衆芳亭引水溉餘紅藥秀遶欄㸔得縁隂春帝城擾擾黄塵底獨惜幽香亦可人傾囊不惜買花栽釀酒留香待賞來説是西園蕭索客從今無復眼慵開主人襟韻有餘馨俯仰乾坤一草亭餐菊佩蘭當此際江漁休笑屈原醒淵明歸來圖獨遊初不為良辰歩入斜川别有春多是斂裳宵遁日眉間歸色喜津津徽宗花鳥圖無逸圖空冷御屏醉香珍羽惜娉婷不思三代池臺樂感致中和本四靈疎梅寒雀圖吾愛梅花結素縁野莊胷次本瀟然枝頭凍雀何為者時許分香到夢邊長記扁舟過武夷仙家梅竹滿清溪山禽盡日憐幽致争揀寒枝趁晚栖題邢君用意齋萬城方伎響邢君顧我龍鍾老病身賦就瘁梨空自惜幾時相對意齋人百疾中來有變常智人察色信能量細㸔難素縱横説到了何曽有定方醫言意也精微而危不誠無物誠斯明斯意誠心正以至國治治國尚可奚難于醫仲尼無意人孰能追莊生任意我非敢知惟神聖功巧意行不疑然後是齋之所謂意者庶幾得軒岐之遺甲午嵗門帖子新春元日兩争妍氣朔分齊本自然不待書占雲物喜上旬壬子是豐年題張太師浩家集後功名有分事無難談笑貂蟬素履間松菊堂深歸未老西州扶病歎丘山跋雪峯居士顛草後筆從簡古發濃纎書到顔樵兩具瞻不意雪峯揮翰手怒轟雷火學秦蟾濡墨池邊説醉顛書家初不數鍾權縱横詰曲千文帖篆𨽻中間有正傳元貞二年秋偶至新店觀光驛迴思往事葢三十五年矣因書壁以記重來漢署風雲控北坡萬方奔走聽虞羅偶思三十年前事夜半郵亭索傳過湘江晚渡賈傅懷騷動楚悲退之伸禱謫潮時黄陵廟下山如畫暮鼓聲聲聽竹枝寒溪四友霜下溪南氣已凝物華從此見衰榮漫山桃李春能幾愛煞寒溪四友清枯木寒鴉枯樹寒梢凍欲氷野鴉飜影若為情錦鳩呼雨烟林外紅杏香中過一生楚水歸舟漢東歸興楚江帆老我南宫百不堪莫訝西宫烟棹速秋霜香滿洞庭柑菊軒姜君美係斗南先生外甥姜家籬落似斜川野圃秋容淡淡烟何待白衣人送酒一軒風物已陶然生平愛菊菊名軒細撚秋香憶昔賢似續外家無盡藏壁間渾冩和陶篇子路問津圖轍環天下老于行二子相㤀不輟耕休為聖賢分二致本來出處不同情元貞三年門帖子平生報國宦情疎千里思歸意未舒只有暮年心健在一燈清影課殘書大簡之山水横披雨濕溪烟凍不飛一船燈火曉光遲風篷冷泛東山月記我茶洋早發時知本齋先生憲府舊乗驄骨鯁人稱鐵面翁此日籌堂見餘慶一門和氣樂融融人物原原有自來特將知本榜新齋歸根返壑皆吾事庭草春來緑滿堦灞陵風雪圖詩瘦清于飯顆山蹇驢駝入畫圖間姓名得挂金鑾月風雪長途是等閒跋左山公書東坡醉墨堂詩閉户經年翰墨場鐵心人道漢王常折衝不縮堂堂手思入顔楊鴻雁行夢囘仙以丹劑療疾黄鶴留題世已驚又遺丹劑化盧生夢囘仙馭無從見何處秋風一劒横碧桃青鳥圖上林春滿漢宫烟翠雀飛來態度閒王母西歸方朔去碧桃花影語闗闗瀛洲仙集海微茫翠鳥湘桃更異常似為碧霄宫寂寂故傳芳信到劉郎孟母三遷圖卷贈新軒子張孟母三遷養聖功芬芬千古振髙風披圖欲識頥齋意人道神交管鮑同題張昭信濟江調兵記日堂堂大將伯顔公萬舸浮江節制雄今日河山歸一統却從遺槀見元功題蕭氏承顔亭曾門為孝固多聞不侣承顔孝節純人説小亭如斗大一䦨花木四時春東坡赤壁圖先生胷次有天遊萬里長江一葉舟欲託悲風㵼遺響恐驚幽壑舞潛虯題錢舜舉牡丹折枝圖翠帷髙捲出傾城並髻凝粧别有情似為洛人驚絶艷兩枝相倚鬭輕盈李擇善甫貰錢詩卷營營市井逐錐刀戈㦸相尋較一毫焚券貰錢如棄屣丘陵宜並泰山髙宫廊校書新簡朝章報恐差青編搓碎旋添加就中書削無多意坐到宫廊柱影斜任泊如慶母夫人八十之夀婺光簾幙寶煙濃八十慈顔夀樂融健羨鹿泉新句好一堂和氣畫圖中風髙雲夢夕江連雲夢夕多風萬斛龍驤簸蕩中長記𤓰州乗醉渡片帆幾落海門東枯木寒鴉亂鴉翻影上枯枝㸃綴荒寒見野祠絶似首陽山下路滿陂晴雪祭餘時秋蟬堂詩霹靂湘琴得正傳新聲曽擅泰和年五音又與人俱逝時賴秋蟬續斷絃屈原對漁父國既無人不我知秋風澤畔一湘纍君臣大義明如鏡底用漁翁辯啜醨題張君利甫秀巖琴譜手卷故家人物秀岩仙一曲瑶琴有正傳鄭重張君寶遺譜不殊親授廣陵篇題紡績圖三晉遺黎樂士農綌絺為業略相同紬思七月豳風詠不到春坊錦繡工千里秋晴圖出門藜杖思飄飄千里晴霄見羽毛特為樊川發清興南山秋色兩相髙秋澗集卷三十三欽定四庫全書秋澗集卷三十四元王惲撰七言絶句附六言三五七言
