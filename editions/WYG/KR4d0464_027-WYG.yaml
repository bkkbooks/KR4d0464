front:
  text: 二十七
  hash: sha256:903ca45a58ef77dc43c29014f35b993e5fab7a62d8d33028554cff5ddaa07775
body:
  text: 元王惲撰七言絶句過文貞宋公墓廣州去闕幾千里中使銜恩信貴僚莫訝簡驩無一語太平勲業見風標沙丘宫齊梁霸趙何雄壯探鷇因鋒遽懦庸千古興亡酷相似武靈而後有莊宗栢鄉道中聨鑣時喜笑談開不覺淒風漲面埃曉日栢亭橋畔路青山一道栁邊來大都小雪時聞兩廣㨗至雪翻廣陌飄梅粉雲覆宫墻抹竹烟預為新年傳喜慶㨗書一夜到甘泉宫杖亡宋物也左丞姚公以上所賜出示座客故有此作效王建體六宫催上木蘭舟百色輸來不敢留親見紫宸新製杖金盤龍地玉虬頭過中山府紅旗鐵馬響春氷儒將清邊世莫驚遼吏不知溏泊險使來先問二蘇名過梁門漠漠蒼溏海氣霾銅梁此照遂城開不知坡漲能遮甚萬騎藪淵索戰來毳幕卓歇圗牙旗風軟馬蕭蕭渭水歸來氣更豪想得龍沙西北道際天秋草黒山高題花光墨梅二絶蜀僧超然字仲仁居衡陽花光山避靖康亂徙江南之柯山與參政陳簡齋並舎而居山谷所謂研墨作梅超凡入聖法當冠四海而名後世嘗有移船來近花光住寫盡南枝與北枝之句其丰度可想見矣趙雲夢題云如王謝子弟倒冠落佩舉止欹傾自有一種風味葢前朝高丞相家物暗香疎影溪雪春風四圗今失其溪雪見為宋漢臣所收僧號花光道人山谷少游皆贈以詩者滿溪明月影扶疎只枉緇塵照雪膚展放畫圗還記得孤山籬落漲西湖破墨能開雪裏芳道人花供老猶香移船要近花光住笑殺涪公有底忙裕卿李兄來别復效樂天體以贈晤語從游喜任真玉堂僧舎幾相親河梁莫厭重攜手明日共為千里人題朱彦暉三陪手卷謂木菴陪飯竇漢卿陪針陳學士陪口也陳名時可字秀甫余年五十覺籠東左臂偏枯右耳聾説道燕城陪手客此針傳授到朱公江村訪友圗江東宰相説風流賈嗣吳潛果孰優今日國亡公道出時須來訂晉陽秋亷公竹牧古無雙聞道旌招别楚邦何計挽留陪老我似來謀及鹿門龎兩椽茅屋枕江濆杖屨來敲月下門不是愛梅多看竹冷香疎影坐黄昏韓幹畫照夜白圗開元天子燕遊多一骨承恩玉色瑳所養自來非所用雨中蜀棧要青騾纓紱騶衣一色紅玉華光照苑門空昭陵六駿秋風裏辛苦文皇百戰功沉香亭下牡丹芳宫漏穿花夜未央輦路傳呼停鳯燭内家歸詫玉麟光松忩雜録云開元中明皇嘗乘照夜白與楊太真賞牡丹于沉香亭政捐金鑑九齡歸聲色糊塗醉不知天意種深天寳禍故生尤物配妖姬題何侍御所藏雪霽江行圗雪霽澄江照眼開常年十月蔽兵埃而今風物真堪畫衮衮行商兩浙來栢臺霜信肅江楓寒入黄茅瘴已空一線暮江春雪外枉將新意詫清雄炎瘴清殘一雪餘勾吳無地不亨衢江山正要燕公筆却㸃騾綱入畫圗滕王蛺蝶圗劉侍御家藏兩翅輕翾暈粉金内人無計撲羅襟南昌閣底花如霧迷殺春香一寸心槐壤紛紛事暫歡枕中栩栩伴周閒丹青欲識滕王意須著人間此夢間粉香金翠夢能甜細寫春悰入筆尖却恐尋香飛便去六宫争下水晶簾王建宫詞有傳得滕王蛺蝶圗之句夏日玉堂即事悠悠時事百年心嵗月徒成昨與今萬一寸長能及物不愁華髮已盈簪失時巳抱周人恨濟物常深永叔懐鈴索不鳴朝日静坐看簾影轉苔堦世願登瀛不作卿玉堂更比憲臺清只縁白獸樽中醴當日元王為穆生隂隂槐幄羃閒庭静似藍田縣事㕔細草近縁春雨過映堦侵户一時青日長上直玉堂廬思入閒雲待卷舒重為盛時難再遇等閒羞老蠧書魚故開府儀同三司中書左丞相贈太尉諡忠武史公挽詞并序維大元國至元十二年嵗乙亥二月七日中書左丞相忠武史公以疾薨于位訃聞天下痛悼嘆哲人之云亡哀斯民之無禄在某又有感焉而不能巳者初壬子嵗公受封于衛其年秋來視師某以諸生啓事上謁特睠焉録用實資藉之俾進其所未至以需時用逮中統建號之明嵗公入當鈞軸時某掌記中堂館門下者半嵗首奏擢為翰林修撰兼内省都司既而以事詿誤得公辨明免歸至元改元總尹都督移鎮東魯辟某充幕官遵公命也公之意葢欲革舊事行新用也九年壬申由御史得調平陽謁公授嗾去曰若綿力頗乆同列貴和餘復何云明年朝議經制南伐詔公開府襄州節制諸軍又將以僚屬召尋輿疾北還事雖不果於菲薄實加重嗚呼昔韓愈從事汴州於隴西公有惓惓不忘者在悲中令為可知不肖某何敢望昌黎之清光而忠武勲徳為世宗臣逺邁中令而某也始終沐公裁成卵翼使聲光爝耀於時其感戴當何如哉一旦遡大樹之悲風痛吾儕之安仰此李平廖立淚下而沾襟者也爰賡薤露之歌用表素旂之末前十章頌公徳業之萬一後五章攄平昔顧遇辱知之厚傳武侯於近代敢躡蹤張栻之知贊充國於麟臺庶張本揚雄之作尚冀神靈鑒茲誠悃其詞曰補衮功深作帝箴片言能沛萬方霖白頭無地酬知己重為蒼生淚滿襟冦鄧高勲上將材丹青圗畫冠雲臺舉頭納納乾坤大辛苦中原百戰來南臨江漢北無垠英衛軍機祜預仁百代盛從青史見漢家羣后有元臣遺表陳情不及私南征無嗜殺為嬉身雖不覩吳平後羊祜恩威有素規元勲高在麒麟上曠度初無智勇名欲見令公隂徳厚一門八子總公卿幾年黄閣見調元福浸蒼生奠枕安兩號改元幾二紀不教波及海南天閫節堂堂五路尊繼承諸姪動天閽推恩不為夷齊讓要慰先臣地下魂身後論功誓不磨徳鐫高冢鬱峩嵳千年零落丘山底忍聽唐鐃作露歌上計歸來愈謹忠又從潛邸識真龍十年浴鳯池邊夢不到歌鐘甲第雄逆齊節志竊桓文鯨鬛翻波海氣昏堂上有兵能制勝一言料死苙中豚時子都司中堂公聞逆璮突入濟南有豨入圈無能為之句至成擒竟如所料先皇登極公封衛賞識初縁啓事陳二十年間門下客愧無椽筆贊經綸昻藏緑野堂前鶴飲啄當年在鳯池一諾見推連省署九泉埋骨荷深知中統二年余在上都公館日陪侍左右幕圍火烈燕巢傾此際誰能託死生一語保全微命去聖安方丈記辭行拂衣歸去老田園木屑筠頭苦見憐尺一起為蓮幕客東平門下又三年征南開府控襄州舒也何為預唱籌報徳愧無千字誄峴山南望淚空流萬夀節同宋太常出左掖門口號禁漏穿花夜已央宫槐籠曉色蒼蒼慇懃一㸃東華日先到紅鸞扇影光隔夜端門分板位平明簪笏列鵷行紫雲低覆千官拜潤入金爐百和香羯鼓聲高吹管清九天合作鳯鸞鳴侍儀贊唱三成後磬折齊呼萬夀聲花映巖廊近紫宸宫官行酒過三巡共攜滿袖香烟出散作都城十日春對品班分玉筍行一時望拜殿西廂百官燕出宫闈静疎雨濛濛溼建章過王太師廟在夀張縣西三十里老雨莓苔滿露臺野棠花映廟門開地中鐵㦸消沉盡時有隂風樹杪來題開州驛亭壁并序昔有宋之三葉也遼人大舉入冦南抵澶淵有併吞席卷之勢堯叟以蜀産主議西巡欽若以吳人請狩建業社稷安危在此一舉萊公審勢明料敵果挺不拔之忠任投瓊之責奮不顧身竟夷國難當時遼舉國之兵膽巳堕公北狩一言奚待斃延夀一矢之力也庚申秋予應辟東魯道出是邦按轡周覽想河流之奔洶仰壁壘之雄峻斯亦宋之金湯也遂盤礴回鑾碑下慨然有懐古人臨大節處大難胷中素有所定不然淮隂以漢中畧對烏得還定三秦武侯以南陽一論遽能西取劉璋東向以争天下者哉幸蜀巡吳避鋭鋒竟從孤注助天功千年草木餘威在野老猶能説冦公顯宗畫三教晤言圗兩晉𤣥風倡永嘉晤言新意出承華後人莫作無同論剖破藩籬即大家微言初不出吾書正恐雄誇渉誕虚座上若拈花葉問發端當自仲尼居承華宸翰日重光大定聲明有父皇若以撫軍監國論長沙書疏未容忘緇衣蔽路樂清修羽客談𤣥日自由眼孔似憐吾輩小終年平地看錢流謂儒户印造寳鈔鬢絲禪榻喜相依休問珠英果是非巳看孔林殘照裏青衿漸染變緇衣徽宗臨張萱宮騎圗􅆙胯頳衫玉帯圍騣華翻影下瑶池老徽筆底無留思貌盡春風出閣儀碧暈紅裁思有餘較來經國太工夫大風歌裏雲飛逺不畏高皇笑煞渠戊寅嵗燕都元夕萬家簫鼓憶升平九陌銀華璧月澄此夕薊門南北望風簷隨分兩三燈九齡忠諫圗挺笏摧姦論巳萌帝心唯恐悮忠貞開元所事呈來足只欠成都萬里行樂士宣鸂􅈑圗宣和畫工彩羽翬明照影閒蓼汀沙暖睡初殘鷙揚寄謝霜空鶻輸與江湖百頃寛四皓圗山中日月到華胥澗飲芝餐樂自殊苦被留侯容不得須教人彘事相汚送南冠徐子懌兵後還武昌臥老盧龍塞下春故鄉心緒異鄉身燈前一展平安報照眼清江月近人故里依稀竹樹烟白頭此日是歸年多應秉燭東湖夜夢裏相看一泫然王摩詰驪山宮圗安逺門西萬里餘耕桑烟火總民居只因勤政樓中夢百倍華清樂不如憶昔風流王右相開元親侍玉堂廬細吟凝碧池頭句政恐丹青是諫書跋張龍丘簪花圗醉吟賞盡洛陽春老與坡仙作近隣未礙一枝長在眼静菴方寸本無塵龍丘子晚居黄岡號静菴居士與東坡為隣荆氏周急圗九縣飇馳到杞天禾㕓櫛比豈容全指囷能繼前賢舉亦是君家識事權宣和梅蘭圗暈碧裁紅奪化權氷姿芳魄鬬春妍只因五柞宫中夢不到幽香淡影邊木有寒梅草有蘭色香宜作一圗看曽憂荆杞生庭户嵗暮芟夷有至難題張寳臣手卷華裾織翠萬金身名動春坊劔字新全是當年天策府經綸王業半儒臣跋船子和尚圗戢戢波間萬鮪遊一鈎那得盡回頭何如收却綸竿坐明月千江任自由漁樵閒話圗艤舟弛擔兩欣然千古興亡話眼前忘却前溪歸路晚暝烟横合碧山巔觀稼朝餐不再腹為虚多稼雲連仰雨濡今日東城看佳色預知糞壤是金珠今年薪桂米量珠日聽閭閻有殍夫縱使積金高北斗不知能濟此饑無烟鋪雲委泛晴光平逺風來粒米香鄒孟最深王道本徑從五畆論耕桑雨後看山西山盡日塵土面一雨晚來膏沐容晴霽最堪圗畫處白雲零亂㸃高峯竹林七賢圗森森烟玉太行秋七子徜徉結勝遊笑殺阿戎真俗物出山能幾執牙籌魏晉清談倡若徒永嘉東播洛為墟大書不削陽秋筆更著丹青詫隠居讀文中子傳書成復性纔稱訓道見原人本自文聖學操存原不易白溪猶有淺深分山壑萬松圗髯龍落落不凡材萬壑蒼烟鬱未開絶似澗阿幽隠士苦嫌塵土不歸來巖風謖謖泛秋聲展放横披眼便明酷似龍山山正北兩崖隂合記經行大厦圮傾要棟梁萬材于此鬱蒼蒼正須叮囑工師輩為桷為榱細選量構厦先論大匠賢杗楹椳闑不相捐何當翦伐長材外乞與坡仙作竈烟讀開元天寳間事庭燔錦繡初年事矯枉情過乆復歸鄒孟一言􅂷至戒大臣無似格君非常山不屈平生節中令能明死後忠未若廣平還具眼當朝終不賞邊功李龍眠二駿圗突齧相忘絡腦羈沙平春浄草萋迷後人莫作丹青看特為南華釋馬蹄遼夏尋盟静塞塵駉駉歸逸華山雲當時騋牝三千匹辦與龍眠策畫勲候亷相病詩書素業清時樂草木平泉四季春議取相君無妄疾自來憂道不憂貧金華恩眷見來深李泌初無富貴心琴裏南風如解愠正煩吹起傅巖霖一作况是岱雲能寸合肯教空作傅巖隂當年匹馬走雷風氣壓秦川百二雄今日露華欄檻底秋絲争吐看青蟲貧不能移貴不驕丈夫到此是雄豪何當慰滿蒼生望臥看東山月影高明皇按樂圗羽曲調音到克諧宫中花栁四時開五絃儘有南薰手却喚花奴解穢來興慶宫池水殿深帝心横潰溺娃淫讓皇友愛情何切獨為君王辨八音逸圗零落御前屏心醉華清按樂聲擊損碧梧縁底事促教秋雨劔關行李伯時二馬圗肉騣連錢汗血無絶足日與駑駘俱何當與馭虎將髀蹴踏逋孽閩東隅承顔堂舉世紛紛説奉承色窮愉婉古難能近因細讀蘇公傳眷戀庭幃有足稱太子府戊寅夏六月二十日千秋節同承㫖姚公尚書許公行香口號入朝巳盡三嚴鼓禮佛重行繞殿香洞户啓時宫燭逈五雲高處少微光前星光彩日重暉幼海風烟動羽旗曲暝未終閒委佩朶頥廊下看靈龜将入宫夜夢一大龜飛舞余前明日祝夀畢遂得觀大龜沉沉蘭殿寳香薰濟濟衣冠四皓賓識取元良無算夀斂時多福錫生民時奏停運司題沁州杜敬夫醉經堂沁春秋時地名銅鞮即文中子祖父故居銅川地金沙霧散滿懐春總為從來味道醇酣適愈深心愈樂不任桮杓復何人聖賢真味日陶然王氏遺書有正傳河上丈人如見問却還糟粕到銅川飲食誰非飽即嬉至論真味幾人知六經奥㫖醲于酒不到沉酣總啜醨李相師詩并序伏以簾􅂷坐卜蜀君平禄命雖高目擊道存袁客師人倫尤妙嵩巖處士李君術窺鬼眼鑑洞清霄馳聲於京華二十年閲人于市樓幾百輩多因勢解棼之説無虚高過喻之辭待詔公車屢承恩眷直氣曽驚於户牖微言預兆於禨祥為賦新詩先書小序霧隐雲驤虎豹文眼中厯厯説承恩羨君風鑑何精切曽博紅雲一笑温萬事心藏到隠微一言能發静中機聖皇臨御思賢切識取新豐馬布衣過仁宗陵道出黒石渡同宣慰陳慶甫遊仁宗陵後宋人曽有詩云干戈銷弭嵗年登邊將無功吏不能四十三年那忍説暗􅂷雙淚過昭陵見朱晦翁語録猗蘭被路栢圍城此日秋禾滿廢陵伊洛水南崧少後丙年六月記來曽題承顔堂卷近讀程氏遺書論曽子耘𤓰誤斬其根曽晳建大杖以擊其背曽子仆地不知人事良乆而蘇欣然而進曰大人用力教參得無疾乎乃退援琴而歌使知體康孔子聞而怒曽子至孝如此亦有這些失處若是舜百事從父母只殺他不得又問申生待烹之事如何曰此只是恭也若舜須逃也前日題此卷詩意偶與此合喜為録附其後小雅報勞天罔極南陔致養戒何深浚完井廪從多故一順能全是舜心題理宗所題宫扇拱手深宫四十年只將詩酒鬬清妍料應一片江湖夢不到謝𤣥淝水邊跋嘉祐熈寧間李昭珙所受告身三通愛樹懐賢自昔然眼中真宰見差肩因思近代文明最無似嘉熈慶厯年跋秦王擒竇建徳圗天命人心已有歸怒猊抗嶽欲何為自將五載飛揚舉辦作秦王破陣辭王昭君出塞圗絶色當年冠漢宫誰移尤物使和戎流連不重君王慾延夀丹青似有功朔漠風沙異紫臺琵琶心事欲誰開人生正有新知樂猶勝昭陽赤鳯來讀趙飛燕傳朱閣蒼廊向夜開富平騶騎欲誰猜微行笑殺張公子併引昭陽赤鳯來題黠䑕賦後䑕喻雄深過栁州竊時欺暴果誰尤惠卿未死舒王在悄悄孤懐為國憂社䑕城狐固細微不勞區處動嫌疑何當論報堂堦下免使區區若輩欺豺豕磨牙到暴殘容身應媿豸為冠咄哉此輩何為者未用區區許面謾黄荃蜂蝶圗翅粉翻香卷鐵鬚亭亭花影小華胥黄生筆底留深思似與齊丘釋化書鳯輦隨渠逺幸臨隔花望斷翠嬪心春風上下撲不得飛過畫欄情更深題劉君用可菴手卷忤物能全古未聞正須多可應時人保身猶落婁公後唾辱須防潔面嗔題樂天不能忘情圗病來心事轉蹉跎身外猶嫌長物多况是春歸留不得侍兒無用蹙雙蛾里陌鳴珂嵗月深栁枝清唱伴長吟一朝並逐春風散却是維摩示病心悲鳴絡馬莫回頭説似余情乆倦遊滿眼清伊石樓月杖藜來往亦風流龍門八節鑿來平千首新詩貯佛經只為暮年無可做又留公案入丹青青衫憔悴老江州放逐歸來萬事休止有醉吟情未減又翻新様栁枝愁春風不到豸冠霜甚是温柔與醉鄉展放畫圗還自笑鬢絲先比樂天蒼年四十二髪已上白題醉仙圗瑶池清讌世空聞想像仙桃物外春畫史恍從蓬島見丹青貌盡醉時真等是高陽舊酒徒醉鄉真樂到華胥不然有口難言際同向春風倒一壺何物諸人作怪顛眼花落井口流涎滔滔總是胡盧輩强著冠巾作散仙公堂即事自箴兩衙相並無尋丈一處煩囂一寂然間有事來還徇却俯慙於地仰慙天門帖子不期北里富薰天敢羨中朝日九遷喜見上旬壬子㑹大家豐足過今年題杜氏近仁堂青青庭草我何殊物體方苞戒薙除致養此心能類長一軒和氣際堪輿一作一天生意見方輿我欲斯仁仁即至主人此理乆相安兩椽寓舎中堂後莫作王孫火竈看心徳由來萬善宗舉斯加彼即沖融不須苦向遺編泥收取平時濟物功漢署郎曹實要津不移居養幾何人粹然一㸃慈祥氣辦與人間作好春嫂趨井坎争援手牛為觳觫免釁鐘天理在人曽間斷多君操守便從容顔子拳拳善服膺豈徒歸美重名稱寥寥此意千年後復禮名家見杜陵博愛功多到静深虚懐猶用近為箴煩君試閲金華事何限當機利益心跋燕肅牧羊圗行飲溪流喜降阿歸鞭影淡夕陽坡似將濈濈維千角辦作宣王考牧歌平秩東臯事有餘荒烟平楚散林墟牧人例有繁多慶蓑底秋江夢衆魚題温居士畫像盛集賓筵每㑹逢笑談端有古人風如公耆舊今能幾又逐秋江月影空太真丰采動并門處士流芳實裔孫今日坐看磐石上老成雖逺典刑存自稱晉温太真之後題魯人張仲和卿舒嘯亭手卷蟻穴蜂衙起事機人心無路到清夷翛然笑煞東皇客月白風清世不知千山秋月照螺臺兩吻清風萬壑來吹作半空鸞鳯去和公原是不凡材己夘清明日雜詩時巡按南京東風吹浄鎻忩塵落盡桃花别有春一樹青梅芳色老小湖山畔翠蛾顰早衙例向中時散宿酒禁持到日西歩繞芳叢春不見閒情還與碧雲低千門萬户記經行瓦礫塲中問舊名一片清光春夜月照人依舊十分明吏散公堂日向西暮雲樓閣自高低呢喃何處飛來燕似為巢新快穏棲雪妥紅翻㸃綴春桃花錦爛栁條新那知春事都無意燕子争來强語頻我近南來石濟津暖烟晴日欲烘春自從入得清明節連日春隂殢殺人汴梁清明連日風沙此日晴東君有意作清明垂鞭醉入宫城去一片傷心畫不成寒食日過隆徳宫當年陸海駭珍藏此日繁華墮渺茫春草不隨人事換依然分翠入宫墻題孫郎中孝友峯小穿沙齧到玲瓏底事題為孝友峯長著紫荆庭樹影鞠哀天顯表沖容館史開府第宅石欄春静雨留臺江漢堂深又獨來前日平泉門下客一花一草總興哀宫墻一片摧頽當道危風前竹色想依依偶逢白髪宫前叟指顧因渠得禁闈秋澗集卷二十七欽定四庫全書秋澗集卷二十八元王惲撰七言絶句
