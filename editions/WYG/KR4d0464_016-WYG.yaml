front:
  text: 管陳公當年劍履上星辰諌草曽蒙帝子恩天上聲華瞻北斗人間詩價逼西崐儘培桃李開春苑暫遣風雲擁㦸門誰識節齋清白節西山晴雪照吟樽一作洛下梅花淇上竹兩都無地着春温斗間占氣試龍泉兩嵗公堂拜夀筵河潤已歌千里逺化行皆自一身先鈴齋晝掩無私謁坐榻朝懸有敗氊愷悌我知神所相隨山喬岳未為堅黄陂曠度吞秋壑卿月光輝炯士林萬目剸裁無錯節一生匡弼有丹心行春不識甘棠訟濟旱終為傅説霖萬斛明珠百泉水光風多付夀杯深
