body:
  text: 清明日拉友生李士觀遊長春宫因謁純真王鍊師具晤姚左轄商僉院二公髙論時至元八年二月十九日也鳴珂振轂滿重城花底春光沸玉笙放眼壺天如隔世侍談仙馭勝登瀛松風韻瑟金鐺靜竹露光寒鶴夢清且莫臨行門外去夕陽正在總真明總真問名送陳按察東還把臂論交今十年朅來蕭寺重留連已驚秋漢盤孤鶚更愛清吟障百川桃李春風寒食月闗河行色繞朝鞭比來論列尤清峻愈見行身不偶然追挽省郎王仲蔚毳幕風翻雪滿牀快書初不减元康酒餘綺席氷生頰事解連環頴脱囊青鎖飛翔天已老白雲廻笑恨應長杏花春色鄰墻酒前日東城是醉鄉寒食日韓氏南莊讌集重城鞍馬壓紅塵春草池塘發興新自擬嘯歌知道在不分賔主更情親青山似喜談時事白髪空慙满領巾無數向來投轄飲不應驚座獨陳遵贈李濟之修撰久扈紅雲侍帝輿襟靈瀟洒氣沖愉絲綸有在人非偶寂寞求音意更殊已為斯文鏗木鐸共驚滄海得遺珠何當一片鑾坡月特聽論思為捋鬚簡寄王推官漢臣今從事彰德幕府表弟韓從益雲卿自相下來伏審雅候佳勝喜慰之餘謹以此寄奉别後一笑也燕市分攜已半年客來首問喜清妍便教緑鬢㸔吟鏡儘稱清波泛幕蓮五袴有歌清議裏一方無事晚燈前西溪未减東湖勝滿意湖山照酒船和趙明叔言懷我初識子禹卿筵秋月金盆上碧天翔集栢臺幾二載稱停文賦每終篇孤忠自信恒多苦萬事安心恐偶然白髪行年四十五向誰重理伯牙絃餞陳僉省行臺西夏鵬搏九萬見扶摇五郡河湟付燮調版籍輸誠須竇守孤寒收淚拜文饒天開相府宫儀肅方挂崑山節制遥荒服甸綏談笑事太平勲業在中朝一作如對軒墀問時事尤宜先為漢家條虎落雲間四海家湖山初不外幽遐龍荒要闢朝天道别淚休驚出塞笳葛亮貴和書有在君魚砥節老彌嘉多應青磵城頭月無復驚飈漲暮沙漢家威德際髦蠻芽蘖其中慮阻艱金節逺開丞相府春光先渡玉門闗正煩烟火通青海未用梯航致白環銀字詔還知不逺好來彈壓紫宸班五郡河西右臂連懷柔有策得人先文昌除目繄誰在帝座回章得汝賢才氣似公當重寄睽違多感是中年黄金臺上西山碧莫厭離觴碎筑絃勅勒川南磧鹵西荒烟囘望隔華夷哥舒開府固英特老范籌邊貴靖綏漢月流光清朔部陰風無力動牙旗遥知别後相思夢秋鴈聲中第一詩張夢卿惠竒石一峯名秀華盖故家物也拊玩不已作詩以冩其真道人解種孱顔玉分供晴窗思𣺌然夢去恍為天姥客潤餘猶帯鬰林烟夏雲翠聳形模怪海日紅蒸腹背鮮我自愛觀無巨細一卷嵩華墮吾前考满日言懷書呈侍講顒軒三載區區簿領間癡牀老坐待循遷封章不到回天筆躬稼終歸負郭田贏得虚名清議裏儘驚白髪暮愁邊只應一片金鑾月似向衡門照獨偏題李鍊師崇聖宫圖姚左丞索賦滚滚勞生汨世縁鍊師獨得靜中詮一篇秋水㤀言處滿眼青山曝背眠丹井流光傳大藥玉臺積翠倚中天方蓬别有凌風鹤華表歸來又幾年夏日讌集田氏林亭御史諸公留别溼雲壓樹罩方塘雨洒層軒满臆凉四海交遊有今夕一樽情話惜離觴夢驚紫禁烟花老醉盡佳人錦瑟香老子興來情未已更催銀管按清商聞丞相史公受開封之拜并引昔鄧禹列侯特參大事晉公入覲重領台司故韓伯拜章稱舊壓三司之貴雲臺圖像獨端居諸將之先伏惟開府相公佐翊勲髙封拜寵數以今視昔前後畧同養老乞言典常尤異伏自傳聞之審不勝慶幸之心敢綴荒蕪式申頌禱前監察御史王惲謹頓首啟上台鼎春回極寵光初聞歡喜倒衣裳百官禮絶汾陽拜炎運天開漢道昌義激忠精傾列辟坐調風雨㑹中央此心久寄華亭鶴夢繞裴家緑野堂御史秩满日效樂天詩體書懷人㣲每愧居清要禄厚常憂負素餐勁翮已輸鷹隼健秋霜空落簡書寒寸心敢謂行身了世運彌深以理觀三尺素琴中本靜又施絃索向誰彈上太保劉公詩中統二年閒雲出岫便從龍羽翼髙于四皓功黄石有書開兩漢黒頭無地避三公金輪散影連沙界太乙浮光動竹宫缾鉢不妨聊爾爾人間桃李滿春風山人較來鐘鼎與山林得失何勞拊髀吟靜對清溪忘俗慮醉逢漁父是知音滿梳華髪常年雪一片閒雲欲雨心臨水幾堆黄落葉被風吹去任浮沉王子行年四十餘幽潛心似槮中魚倦談時事便情話靜盡靈襟信理書遇酒祗堪知味正愛吟誰暇計才疎今冬處置行窩了種竹溪南有草廬和郝子貞見贈之什兼餞舟行二首情話滔滔不易量幾年閒處㸔人忙時清共樂林居好理到能消客氣狂脱頴我慙成事遂論詩君乃起予商布帆無恙秋風裏一棹烟波去渺茫山人何苦住山城老雪堆門幾度平雅愛雲林無俗態豈知塵土滿長纓薄田粗足充饑了衰俗無依奈物輕三十年來老知已此囘相送最闗情題韓通甫城南别業翠竹連村映白沙横岡細抱一川斜橘林多實長年樂棣蕚留香盡日華雲錦池邊㸔鴈序秋風門外任蜂衙自憐獨鶴歸來晚夜夜林丘夢水涯送子初宗兄出鎮閼臺飛翔方喜簉朝班一表陳情動日邊列郡剖符聊復爾中年分手倍悽然兩鄉憶望三千里一席親情四十年明日萱堂夀親處杏花紅㸃緑楊烟登臨武堂吏散公庭百慮衡來登臨武敞髙情唐風過陋留遺儉晉譎移民到健争千嶂壺山吟際晚一溝汾水眼中明悠悠自愧沙鷗雪便道忘機意亦驚唐山道中早發時至元九年三月初九日自燕逹洪上沆瀣横空夜向分行穿林影認前邨夢殘旋逐車聲破人困時牽馬足奔常笑未容耕隴畝一官隨分報君恩獨憐三載霜臺月空使流光满薊門懷舊詩并序至元九年二月十四日濟南劉漢卿出示亡友王仲蔚詩軸三復之餘慨焉衋傷因憶往年在東平時與仲蔚諸人暮春之初㑹飲于宿城野務趙媪家凡三次歌酣盡懽同㑹者六人明日仲蔚賦詩有楊柳青旗連坐榻杏花春色過鄰墻之句殊為上軒所賞明年仲蔚從事濟南幕府予亦西歸淇上自是而後不復相見秋七月聞仲蔚病疽死厯下忽覩斯作令人又有短氣者七年之内六客者止存井任與子三人耳因為賦此以抒梗槩云遺詩一讀已悽然玉樹臨風墮眼前心擬酒寛終致疾夀隨中止欲誰愆蜀川寄逺猶如昨伯道無兒更可憐轉首惠連春草夢月明愁滿宿城煙辛未嵗除夕言懷此月廿八日尚書省復併入中書省杯盤草率具餳茶燈燼紅垂夜半花抵掌不憂韓愈鬼住京空在老坡义素餐御史雖無補畫省除書有底差新故送迎常嵗例春風明日又誰家大暑大地洪爐一氣蒸樓居臺處失髙層庭柯葉靜風來絶河漢陰斜氣未澄炎帝戲張千傘火老懷思抱五湖氷嗸嗸瘦廢無多力遽爾蒸騰恐未勝挽王修甫時客死于燕君有燕都懷古詞内有恨滿西山秋色之句至元元年在東平時屢向余道大梁東郡衛南􅅠尊酒論文幾度逢少日才情驚小杜中州人物惜元龍長歌老驥壺空缺秋色西山恨轉濃五十五年成底事一丘露草泣吟蛩奉陪左丞張公尚書李公王學士圖克坦待制赴禹卿觀稼之㑹偶得五十六字奉林下一笑至元七年四月三日韋杜城南尺五天草堂尊酒接歐韓晴雲望逺禾方秀髙樹凉多露未乾臺館不煩題緑野林花時許覆金鞍因君喚起歸田興夢到西溪舊釣壇遊玉泉山山腰一逕轉雲蘿照眼平湖漲碧波形勝左蟠遼海逺風烟還覺玉泉多自憐俗駕來逋客急遣清樽發浩歌笑拂巖花醉歸去山林鐘鼎兩蹉跎書懷兼簡陳節齋羞將勲業鏡中㸔不為無魚動鋏彈兩鬢總隨霜簡白寸心虚傍日華丹閒中持論談何易事際操存衆所難羨煞山東陳按察龍光髙射斗牛寒題趙宣撫樊川山中雜詠蒼崖如削靜烟霏中有髙人住翠㣲夜鶴聽琴依蕙帳曉泉和月落山扉一龕靜體炎凉理兩眼深明倚伏機畢竟名髙難久卧野猿偷褫芰荷衣歸潜洞眼冷朱門鶴盖陰自開幽洞事幽尋飄蕭書劒三秦客盤礴風雲萬里心竹澗度凉便夏永藥窓留暖愛冬深何時為濯長纓土丹竈茶煙共一林趙樊川適安堂上趙樊川擇勝棲心以樂全神武門前抛組綬終南山下買林泉蘭臯秋逺縈吟思釀甕春香引醉眠洞口野雲遮已斷不須重上武陵船適安堂草堂卜築近清溪擬散襟顔似紫薇幽事相闗常起早老懷能遂任時違無心出岫和雲卧有客過門盡醉歸聞道黄家花满樹幾回扶杖到斜暉趙公泉故侯植杖得新泉寛鑿方池漲碧瀾恐泛落花歸别澗要傳清響入幽彈竹根漱冷縈林曲蔬圃澆餘到藥欄已與山中留故事一泓難着老螭蟠未央硯為趙明叔賦萬瓦垂雲映碧虚未央雙闕想雄圖天荒地老千年後玉潤金堅片月孤㣲物偶因題誌重鉛華留借筆鋒濡一樽難洗興亡恨要發幽光賦兩都至元七年庚午奉陪憲臺諸公闕下賀正口號盤盤帳殿敞彤廷天仗宵嚴擁萬靈玉筍東班分列辟龍墀首拜認前星煙蟠鼇柱霑吟袖樂泛仙音近御屏嵗嵗大酺恩例溥自慙虚薄仰皇扄贈相者陳士亷我游都邑已三年無畧匡時待罪愆有問試從陳子決取徴還似客師賢客師袁天綱子紛紜半是墦間客髙下能公吏部銓兩眼羨渠明似鏡月評從此索心先為遼人劉信甫慶八秩之詩素髪酡顔八十春豹韜還是總戎孫兩都喬木清光老滿座春風笑語温膝下盡歡衣有綵人間無似夀為尊須知善積餘嘉慶三世何妨是將門同馬才卿暇日登昊天寺寶嚴塔有懷髙標直上跨蒼穹物外方知象教雄九陌市聲開曉色兩都喬木動秋風遥憐漢馬屯湘渚安得長書附去鴻寂厯邨墟野烟外誰家簾幙夕陽紅寄贈德長老先府君無恙時嘗話河内德上人者系出貴族亨年最髙行業極精嚴予以懷衛相望每思以披觀為快迄未能也近弟誠甫至自野王云德僧臘已丑今年百有一嵗起居飲啖健若五六十人或問何術臻此答云無有但休閒心無所用耳性嗜杖所依歸杖特有瑰異者平生樂從賢士大夫遊無衲子氣象予聞而喜之豈墨名而儒行者耶以韓文公有文暢登觀之作因書近體律詩簡寄西堂為他年林下一段閒公案也一條拄杖老龍鱗扶掖西堂百嵗春方寸已明老佛果典刑還是定年人笑拈貝葉隨僧供未省緇衣化洛塵我識阿師中所得溪光山色乃心身至元已已八月一日偕馬才卿游聖安寺滿馬京塵壓市喧捨鞍步入給孤園金鐺響泛松風冷寳月光凝瑞象尊法觀交纒雙井閈雨花别是一乾坤布金不是芭桑計空抱危言吐復吞謂讀明昌間郝侯党竹溪蔡無可等碑閒院書懷簡胡員外應奉束縛長纓領簿曹十年從事獨賢勞癡牀坐久疑禪榻老木風嚴瀉怒濤行路總誇驄馬貴炬蓮何似玉堂髙一彈未就陽城草虚負秋空白錦毛奉送大丞相史公行臺河南時用兵襄陽封衛國公以平章政事副呼喇珠駙馬督視諸軍時至元六年八月也無勞繞帳插生犀威徳江淮草木知唐室正諮裴出將楚人休倚漢為池聘通上國非無補節駐長洲果爾為三百年來常例在忍令矛槊舞嬰兒寄陳按察慶甫秋天寥落使星明光動山東百二城三本有書天下計一樽為約故人情九江虎渡非無術山東吏人聞公至往往投劾告去故云漢節輪埋浪有聲老我簿書三萬卷幾時燒尾㸔雷轟跋王内翰與木菴唱酬詩軸木菴詩筆唐文暢一作老而妍心印多從吏部傳豹管一窺連璧句月牕慵展碧雲篇風流豈落明昌後真率當隨靖節肩留取人間作遺像鬢絲禪偈話它年追挽歸潜劉先生我自髠髦屢拜公執經親為發顓蒙道從伊洛傳心學文擅韓歐振古風四海南山青未了一丘洹水出無窮泫然不為山陽笛老屋吟㸔落月空繼張相言懷二首山人蹤跡愧搜羅欲負虬松學隠和散木分甘遺匠石薦章誰擬動常何畫义活計青鳬少曉鏡功名白髪多好笑住京王御史一官羇滯半年過獸思深處烏虞羅吾自人徒貴體和物有盛衰宜辨早氣從舒慘奈時何眼前逕路黄門迅鏡裏功名白髪多不盡一杯澆磈磊茶煙禪榻儘經過和韻一作是傳虬松學隠和至元辛未冬仲廿四日夜五鼓夢衛南郊行夢中得頷聨兩句既覺為足成之春烟樓觀照堤沙夢裏郊行日未斜幾片雲陰無俗態滿川桑柘有人家㣲茫仙境雙鳬客依約春風一月華興適正濃還喚覺一聲鷄唱喝簷牙跋梁斗南先生無盡藏手軸昇平豪富林泉主白髪歸來一幅巾世與士安籌國計誰云開府是辭臣江頭宫殿千門闇物外雲烟萬古春休向諸郎訪遺事青山依舊是比鄰叔良西歸秦中感而賦此倦客京師半載過翻成西去奈秋何賛房燈影裁清夜渭水春風已白波三虎自疑終致釋五噫從此不須歌終南山色昭陵樹剰㸔新詩醉兩坡一作樂遊原上昭陵恨不暇新詩醉兩坡寄李和甫見未央瓦硯好在終南李鍊師未央瓦硯寄何時卧聞客舎三秋雨夢繞畫欄雙桂枝孤月正堪遮老眼片言聊復慰相思研磨縱對峨嵋秀中有漁陽萬馬馳至元辛未秋八月廿八日同長老金燈義方暨馮君用聶文超劉敬臣王仲通馬才卿石夀之座主賈君叔良㑹飲于開泰之丈室約各賦詩道盍簮之歡因為賦此陊殿秋煙老檜蒼春風合座捲吟觴争傾底裏心能見不恡歌呼興更長風調縱輸韋杜曲新詩驚絶碧雲湯人生無似新知樂安得車輪一夜方夀圖克坦待制至元八年九月十四日静盡紛華道義尊立朝今復見經綸論交最厚先君契提誨尤深賤子身世仰仲淹風雅在見來元亮性情真一杯滿意得秋菊照映靈椿㸔玉麟菊嘆細菊言傳笑靨金結根失所最闗心鶴欺力弱時來啄草為藂荒日益侵寶檻移裁容獨秀秋香吟撚伴孤斟朝來頓覺精神好似喜淵明為賞音送臺掾趙明叔赴濟南迎侍母氏來燕寤寐庭闈逺事承南陔詩裏二毛生悠悠望眼門盧月戀戀春暉孝子情千里秋風吹去馱一天融樂羨歸程三升紅腐殘年恨老淚縱横滿仲纓一作零落悲風滿泊纓夀房祖至元八年九月三日山立楊休七尺身接人襟度玉能温慶流淇水宗支近惠洽諸房徳義尊扶健不煩鳩刻杖承顔幸備綵衣孫一枝留在霜前菊細撚清香入夀樽送李尚書仲實叅知北京行省遼左要荒節制偏選材真得濟時賢拊循殊俗尤宜簡調餉東兵貴有權軫慮可寛天北闕先聲應徹海東邊顧慙知已謾馳嚮望入秋空鴈影翩夀紹開外郎十月十四日襟期出處不多偏秀孕輸君六月先以義取交知已最開談通俗見才全已將國計籌邊算㑹見嘉謨沃帝淵相對莫嗟頭共白嵗寒心在老彌堅繼商樞相襟期一見若同袍束縛微官笑獨勞方寸證明皆佛果大千起滅總浮泡馳聲絶藝君能辯汨世天刑我欲逃坐拂天花閲家數凛然清興雪山髙送和之簽山東按察司事四道山東事最繁按巡當猛亦宜寛丘菑併在虚危分根窟深連魏愽間風彩儘承綸命重霜威何待栢臺寒澄清快理征鞍去望絶峗山與厯山餞參政楊公出鎮覃懷十載嘉謨沃帝聰人間桃李幾春風從今民事優游裏轉見君恩顧盼中寵節我知如李晏救時人道似姚崇洛陽三月春如畫乗着新詩醉仰嵩公廰堂名送陳按察赴任山東簡花霜落控孤應暫覿清揚俗慮澄四道規模開漢制百城風采望陳登露盤虚警青㝠鶴朔吹驚翻白錦鷹回首相思定何處暮雲春樹漢王陵贈羅徴君風骨飄瀟到九還一壺天地市朝閒神游物表沖融際道在平生出處間笑看割烹要摯鼎擬將忠直動龍顔濟時好作商霖去未礙經年别故山孟待制駕之哀辭我識先生二十年當時遇衛亦翩翩遺文載稇聞三語一賦垂天笑八磚幾日午風汾水客一丘宿草茂陵阡屋梁曉月驚無復四望令人一泫然祭子襄先生先生隱德自崧丘得號墻東四十秋結駟退慚知道在詩壇吟苦入冥搜眼中耆宿有今日地下雷元是舊游㡬卷閒書繐帷底未容拈讀淚先流寄贈總管韓君通甫暨弟居美兼簡公弼良友都門贈别柳條青分袂南來嵗屢更三載愧陪驄馬列久違轉見故人情毎憐夜榻聞風雨羨煞韋家好弟兄蚤晚細傾燕市酒誨堂重醉棣花榮哭馬孟州才卿名甫相州人栢臺欵晤儘三冬暇日來陪御史驄寺閣納凉憐晝永野塘轟飲喜君同性情逺出機張外禍福真成倚伏中至元乙亥濬州同知未滿中堂見召既至以事阻是年秋復除益州倅南還至邢病死夀四十久别已増懷抱惡與君終訣恨何窮哀大都督史公名權中統初授江淮大都督陽夏移軍入鄧封指揮旌壘氣増雄優居將幄元多算威感荆蠻儘父風士樂死懷羊傅愛戰酣無大上均功應憐千載龍驤業一慟臨江萬事空題張府君坟丘子傃字行甫曽任官孫二人龍公祠下府君墳岡勢西來虎豹蹲翠琰盛傳千事誄青山還有讀書孫喬林氣鬱丘山重一水春涵德澤温白首故侯長健在𦂳須着力大于門姑射北仙洞予既為新道立石且㑹諸君子明日大雪仲明賢良賦詩光賀因次嚴韻以答佳貺三年判府苦無聲自信行藏付静聽翠琰銀鈎留故事白波青嶂繞螺亭一官自笑頭空白多士相㸔眼倍青每藉新詩深慰藉不愁歸詫草堂靈王衛州挽章公諱昌齡字顯之滄州人堂堂大厦蔽雲居偃植圓權與藉扶六縣耕桑深道愛百年魚水應時需望歸王儉風流幕我識鄼侯吏隱儒河朔諸侯幾參佐愛君終始擅良圖又襟韻沖融器識先晚年風節見承宣經綸素抱調元事綜覈長深作牧篇寒谷暖回衰日愛老夫愁絶劍門煙殷勤尚憶臨岐誨惆悵城南是别筵哭友青州判李叔洄溪一入乃死别送我西行淚滿襟四海從師有先子半生急難是初心泉扃不閟無兒慼壠樹空瞻挂劍林㑹擬並刋遺愛碣􅅠城臺首御河深古􅅠邑在今州治東北一十五里與君别業相對公常云本洛之上黨人五代間東徙居衛唐將李抱貞之後既任潞州乃修治其碑墓焉别盧漢臣男兒出處要無慚一意公家性所甘吾子有才無不可老夫於世本無堪痛連臂骨縁心苦耳變風聾阻坐談劒佩趨庭君好去建章宫樹緑覃覃挽杜徴君止軒泰岱東蟠未了青文章公獨萃精英賦方庾信才華壯詩到樊川氣格清平日酒杯追散聖一生髙節見陳情風流想在齊梁席未讓鄒枚獨擅名留别忽治中英甫四年相待情偏厚千里分攜恨若何别駕見淹時共惜當官能處我尤多軰流自是青雲器金印行懸瑞錦窠調古自知終寡和青天白眼望君歌秋澗集卷十六欽定四庫全書秋澗集卷十七元王惲撰七言律詩奉誄大丞相忠武史公萬國鞭笞走帝庭堂堂爭識漢孤卿元勲高出麒麟上曠度初無智勇聲儷景去翻髯影駕柱天留在笏端銘白頭無地酬知己痛為蒼生淚滿纓追挽元遺山先生文奎騰彩憶光臨孺子何知喜嗣音余年廿許以時文贄于先生公喜甚親為刪誨且有文章重于相權泰山微塵之説即欲挈之西行以所傳畀余以事不克至今有遺恨党趙正傳公固在陽秋當筆我奚任天機翻錦餘官様月户量工更苦心野史亭空遺事墜荒烟埋恨九原深哭賈叔良别駕今夏書来墨尚新並冬誰料訃音聞忍看玉樹摧崑火空遺歌聲遏嶺雲氣㑹可能鍾厄例天葩似靳吐奇芬拊膺慟絶華顛母老淚珠傾滿練裙祭館主謝總管老帥英威上将壇愛君雍雅戴儒冠依依孺慕懐丘壠煦煦交情出肺肝枳棘鸞棲終鎩翮蜀江梁險失驚湍傷心最是蒲中客馬首歸旌揭素竿㕘政楊公挽章公墓在河南府甲戌以事入潞拜其下賦是詩以弔天孫機杼五雲章簪珥飄瀟侍帝旁一札恩光慚賤子予一命翰林修撰其詞頭葢出公手有云行已無玷博學能文顧超絶之異材足鋪張于偉績百年清議在中堂望隆鳳詔絲綸美吟繞瑶臺雪片
