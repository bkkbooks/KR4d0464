front:
  text: 七十六
  hash: sha256:460089a18fd767218a13639c3ce25329948e4ad09c4d5e17f9358b25afc10b17
body:
  text: 元王惲撰樂府玉漏遲答南樂令周幹臣來篇竹林幽思杳栖遲自嘆離羣孤鳥萬里雲翔海樹去相依遶隣􅅇一聲喚起憶共聽朱絲雅調還自笑當年已愧孫登清嘯情擾回首分飛悵落落相期望髙崧少㑹鮮離多經世又誰曾了二子況成陳迹落月滿梁空照庭户曉得意眼中人少二子謂西溪春山二越山征路杳東南澹澹長空飛鳥儷影同翻明月一枝烏遶共道有心避事甚未若從渠相調君莫笑南樓苦要胡牀舒嘯空擾畫裏江山總輸與風流眼中年少也學癡兒官事㡬時能了一曲驪歌未動還夢到三山晴照江月曉莫為賞音稀少前一篇懐舊有感曰鄰吹者為見寄樂府也朱絲雅調者為鹿庵先生也孫登者為足下與諸君也二子者為西溪春山兩忘年友也後一闋將行即事曰三山者福城中山也㡬夢者為不肖拜命前後凡夢三至其處曰賞音不少者為彼中宋吏部陳菊圃者甚衆故云二篇自覺語硬意凡固非樂府正體望吾子取其直書可也三留别淇上諸君浙江江路杳蒼茫自嘆南飛烏鳥故國回頭夢裏青山吟遶手把一麾南去道不比八州常調君莫笑南樓苦要胡床舒嘯休擾歸去扁舟若比似陶朱尚猶年少飛泳雖殊友義固應明了擬覽九江秀色誰凄斷闗河殘照霜月曉去去眼中人少風入松觀燈下半開杏花一枝穠豔照華堂暖蘂貯春光寫生莫羨徐熈筆風流在百子池傍㸃綴紅妝玉頰簾苫粉淡宫粧静憐疎影伴昏黄添麝入爐香惜花人老情縁在雲屏晚銀燭髙張細㵼一杯春露浩歌微雨東牆三奠子都城七夕𣺌新秋節物客思天涯巖桂重碧雲賒煙華縈紫禁心事夢長沙青銅裏人未老鬢先華鈎簾望月得巧誰家兒女輩語空譁露翻梧葉重河映綺樓斜傾雲液歌金縷岸烏紗二登河中迎煦樓樓故址即唐崔徽白樓也壯河山表裏百二喉襟形勝地古猶今風雲全晉在草木故都深淡長空孤鳥沒總消沈東山髙卧梁甫長吟人未老鬢毛侵平生多古意落日更登臨倚危欄窮逺目恐傷心三辛夘七夕時久雨未霽中以感寓焉湛新秋風露曖曖㣲霄梧葉下桂香飄鵲翻銀漢水人渡玉闌橋歡能㡬虹影斷渚宫遙人間多巧天上無憀今古恨苦相撩菓𤓰絲曲綴兒女思空饒層軒晚香露溼可憐宵四悵神光奕奕天上良宵花露溼翠釵翹風回鸞扇影愁滿紫雲軺恨相望雖一水隔三橋朱絃寂寂心思迢迢人未老鬢先凋翻騰驚世故機巧到鮫綃涼夜永簫聲咽篆烟飄五隔盈盈一水歡㑹今宵梧葉上雨蕭蕭星沈開帳燭雲黯渡河橋渚宫深離思苦兩無憀金針縷細彩舫花嬌兒女輩漫情饒巧來心愈拙絃促韻難調西樓月銀漢影碧天遙江城子為張同知夀灤江晴漾首山前玉為淵秀相連總把華英都付使君賢梅竹堂深歌吹動香似霧酒如川列城千里聽鳴絃頌聲喧覺春偏争遣翺翔猶是貳車權滿泛一杯添夀酒懸斗印看他年二賦拜月圖一枝繁杏宋牆東翠帷重捲春風留得殘妝簾月拜玲瓏雲作鬢蟬霞作袂香霧溼玉鬟鬆閒情都付燭華紅瑣牕中照芳容細逐行雲零亂紫金峰天外翠鸞仙侣在城闕晚夢芙蓉南鄉子近聞吾子有茂陵側室之舉順命故也且在昔賢女雖有小星惠下之行不無鬱悒自傷之意故首章託以自怨自責忌嫉傷善略不見也然怨不已則夫婦道乖故釋以人子之孝嗣續為重嗚呼商陵穆子之悲衞莊姜傷已之嘆匪歌詩莫能宣其志此樂府之所以作也庶㡬言之者無罪聞之者少有慰焉人物舊温郎心事珠簾月半床笑裏玉臺重藉手誰量折得楊枝惱孟光得鯉豈思魴老境其如伯道傷但願維羆應汝夢稱觴趂取春風慰北堂二癸丑三月廿一日祭龍祠回飲張氏草堂喬木色蒼蒼山頂難留落日光燈影碧流深㡬許浮觴來醉張家第四場世事莫論量相對尊前兩鬢霜富貴㡬時當適意杯長問甚春星帶草堂三夏日同王子勉雷彦正王子初納涼西園亭簾影静碁枰平野風來分外清一帶好山供望眼雲屏落日煙霏翠滿亭世事不須驚底用相逢話醉醒常使玉瓶沙上酒如澠杖履時來月下傾四舂日遊李氏園亭溪水浄灘沙紫動林梢半是花長日馬蹄閒信歩誰家曉入南園到晚霞時事閙蜂衙一片閒心逐去鴉爛醉玉瓶沙上酒生涯過眼浮雲不足誇五承㫖董公夀登七秩康寧好德誠可慶也取坡例以玉案香歌之青瑣漢中郎滿袖長攜玉案香記得賦詩横槊日臨江氣壓風濤一葦航蓮炬晚分光諌疏回天豸有霜七十平頭從此數稱觴滹水淵源慶未央六一雪静林臯冷壓浮陽氣不驕菜甲榆椒渾不動寂寥賺得輕黄上栁條詩思苦相撩酒盞新來頓絶交連夜客窓寒似水無聊誰約春風鎖綺寮七和幹臣樂府南鄉子南樂言懐中間更易兩韻盖前人用音意之例也萬彚帝城春況是明時選用人愛殺曲山周老子依仁任運無心不自論六任謾逢辰甚是榮華盡苦辛贏得歸來兒女笑蘇秦白馬紅纓彩色新一作潦倒客居雖有甑生塵日有詩來發興新卜算子辛夘九月二十三日夜夢上層欄北望黒雲截空二龍尾足連卷下垂殊分明也覺而賦此秋澗老人識一抺截頭雲靉靆從龍發尾足連卷見半空霽色翻蒼鬛舉手欲攀鱗散我麒麟髮天外雄風見化機吹落蒼煙峽青玉案賦紫金沙緑隂暗盡西城樹人總道春歸去裊裊柔條髙㡬許絳燈閃爍翠雲縈䕶元有留春處金樽未厭傾苦醑醉墨題詩要香露胡蝶飛來何栩栩向人有意繞欄翻舞似約花間住臨江仙夀李節使柱石中朝黄閣相河山千古南州多君談笑覔封侯朱輪繙皂葢錦帶佩呉鈎滿府治聲歌五袴稍稍俊氣横秋今年夀席更風流青雲新甲第一笑醉金甌二八月一日同髙仁甫李靖伯史潤之餞伯昌東行韓明日至滑得隂疾後三日舟載西還夕次其門東劉家渡而殁得年五十有九韓予出就外𫝊時同舎生也哀哉昨日舉盃親餞别六人吟笑呵呵今朝丹旐颺城阿一棺零落恨都付逝川波萬事轉頭真是夢兩輪來徃如梭人生百嵗合如何放開眉上鎖得酒且髙歌三送治中李公天上雲衣無定態眼中時事休驚年來鐘鼎到書生一麾仍出守五馬看專城千古金陵佳麗地中郎素有先聲一江春浪暮烟平此身眠食外萬事總虛名四為曲山作别墅寒梅方入夢多君來報花期野塘流水小橋西南枝香爛漫却恨賞音稀正有玉堂人最愛垂垂兩鬢如絲和羮心事未應遲金樽重醉倒且莫晚風吹蝶戀花賦來禽歇枝今嵗尋芳春已誤一粒丹砂不到來禽樹滿意紅芳春也妬長條簇滿珍禽羽化道無情應有素似惜金樽一醉珠簾暮春自還來花自故人生最恨離筵苦二昔鹿庵顒軒樂育淇上一時秀造號稱多士逮中元已來例宦㳺四方僕二十年間纔三至鄉里慨然有離索之嘆今嵗投紱自濟南來歸而諸公頗集所欠者唯王尚書子勉傅漕使士開耳因賦樂府以見歡㑹之不恒聚散之有數也至於義安分定辭兼六客倚聲者當自知之恐酒酣耳熱後不無倒冠落佩之適也淇水當年麟鳳渚回首飛翔落落風雲舉三疉陽闗回首處渭城栁色朝來雨今夕何年天所與白髪歸來一笑同歌舞醉裏相将尋杖屨苕溪風月無今古三緑暗蘭臯春雨暮露浥風吹馥馥香如霧一曲清歌花解語落紅羞滿沙頭路錦瑟華年誰與度夜月珠簾腸斷春風句我自興來聊一顧醉魂不到凌波歩四和曲山韻因為贈之經世此心誰盡了欲畫麒麟功業何由到白髪滿頭青鏡曉花開花落人空老適意杯盤從草草甘坐清貧方駕郊和島最愛新詩情致好篇篇直壓元郎倒太常引送王嘉父去年鞍馬客南􅅠奈告别苦匆匆今嵗又相逢喜客舎清樽屢同仲宣樓上杜陵幕下著處話途窮好去漢元龍道休著青春負公二夀龎咨議髯郎風度幕中蓮已師範使君賢驥足快騰騫道好箇龎家士元滄浪髙興寒花晚節秋色滿淇園一盞願遐年要都釀君家百泉三夀劉同知太行晴色泛簾鈎對書史日優㳺賓從儘風流誰健似東陵故侯人間萬事塵埃野馬一笑付松楸眉宇夀光浮拌醉過黄花暮秋四周都運生朝時添夀王村量蟠英偉氣和愉道滄海得遺珠忠義與心俱見漕府歸來轉輸山呈霽色林添野水春滿野人廬鄭重萬金軀要羽翼當年漢儲五為王同知夀雍容詩禮冠時髦都忘却貴人驕横槊見英標道勇似當年嫖姚黙含萬物徳尊一府歌夀聴民謠緑髪映金貂儘千尺青松後凋六為萬努總管重於山岳藹如蘭喜一旦得同官裁鑑笑談間道不似當年將壇一年好處中秋節近涼露洗金盤丹桂月中看儘耐得人間嵗寒七奉寄參政李侯仲實自北京行省改授安西王相人來徴詩於予因作此奉寄時屯田涇陽規畫財賦北平移鎮入咸秦說睿眷更情親下手見經綸道好箇中原老臣萬屯曉月一鞭農事涇水畫中春陸海儘藏珍似只欠侯封富民八春風碧水静林丘對書史日優㳺來往更風流問誰似東陵故侯黄陂襟度曲江譽望山立看揚休春釀儘禁篘拌醉盡蟠桃上秋九送段信卿赴河東憲司經歴北來孤劍鬱蒼顔聴時事立談間秋隼正騰翻莫便倚霜空陡寒太行秋色汾川鴈影極目送歸鞍簿領憲司閒道好箇河東幕官十夀陶珉溪南枝梅信㸃氷妍覺初度得春偏人物鱣堂仙看才思渾如湧泉悠悠往古紛紛俗學鞶􅍤繡空鮮青鬢莫蒼然要折衷陶家講筵鷓鴣引為王太夫人夀簪纚瀟然自謝林一家柔範到周南以賢論母書彤管有子能官盡孝心香霧碧夀樽深嵗時春輦醉花隂從今叢慶堂前月翠竹髙梧聴鳳吟二和周幹臣韻中統五年三月十二日夜陪徒單文與雷彦正夜語門外東風駐馬蹄月明庭樹緑隂稀眼中時事驚天運醉裏㳺談似口機思逺走擬髙飛此心安得與時違遺書浩蕩三千卷未分窮愁老布衣三韓氏别墅竹映方臺翠滿湖煙霏荷露浄郊居棣花輝映春風被雲錦香翻碧玉壺吟倚杖卧看書一家風景輞川圖酒盃儘泛床頭瓮未礙門多長者車四謁太一官贈王季祥來謁齋宫又五年道人邀我坐前軒只驚前度劉郎老不見庭松偃盖圎人與鏡兩翛然呼童茶罷炷爐烟壁間一軸煙蘿子依約風流墮眼前五為樂籍張惠英賦秋水芙蓉鏡裏仙一枝明玉濯煙鬟鶯初解語調柔舌栁不勝矯拂畫欄催疉鼓按弓彎樓心低月怯清寒人生莫惜纒頭錦能得春風㡬度看六野粉宫牆暮雨邊洛京依舊鎖嬋娟一聲金縷闗情處滿串驪珠訝許圎金谷月石樓煙留連光景待他年襪塵休放凌波去更聴新翻倒玉船七浴鳳池邊養相材朝端先肅漢儀開九秋灝爽臨初度千丈恩光動憲䑓鏘劔佩望蓬萊翠華南扈拂天來一枝好在霜前菊留待清香薦夀盃八為耶律總管太夫人夀遼海千年將相家婺星光動赤城霞回看畫㦸清香地滿意春風玉樹花金椅背紫雲車謝林風度見來賒夀波灎瀲宫壺暖滿泛秋光醉緑華九何處人間淑景新韶光都付牡丹春後庭花老空瓊樹曲水江深見麗人金屑粉麝香裙近前細看倒芳樽惜教赤壁磯頭月吹散春風陌上塵十何處人間淑景新劉家池館鮑家春後庭花唱空瓊樹曲水宫妝見麗人金作粉麝為塵一枝千葉擁黄雲花工可是多情思夢逐凌波問洛神十一丁亥上巳日與諸君宴林氏花圃李氏以歌曲侑觴醉中懇求樂府賦鷓鴣天以歌之李氏字蘭英樂籍之名香者也花草離騷試品量猗猗香色紫蘭芳樂棚擢秀名何麗楚澤含秋思更長金縷曲紫霞觴留連光景醉銀塘竹西歌吹歸時晚也勝揚鞭問葛彊十二拾翠仙洲野興長樽前一曲杜韋娘人憐暖日明歌扇我愛蘭英媚國香供楚佩笑梅妝春風著意泛崇光老懐不到凌波夢要遣琵琶送一觴十三香静堂萱燕處温一家柔範被鄉鄰三牲奉養真純孝八十康寕是福人巖菊晚嶺梅春丰容林下舊精神婺光不動雲衢爛供佛床頭景氣新十四贈馭說髙季英短短羅衫淡淡妝拂開紅袖便當塲掩翻歌扇珠成串吹落談霏玉有香由漢魏到隋唐誰教若輩管興亡百年總是逢場戲拍板門鎚未易當十五先相風流徳業尊又看天馬五花文飄飄青瑣凝佳思靄靄新詩似嶺雲淮海秀已平分珪璋未礙琢来勤吳人元重中州氣繡被何甞擅鄂君十六潦倒衰翁不足尊更堪刺口論詩文經涂江浙多蘭友照眼吳山霽霧雲傷别夕惜輕分臨岐一語見微勤萬艘未是周郎志他日經綸要使君十七辛夘九月二十三日靖伯仲先攜酒相過客去醺然獨坐以見酣適之意云波蕩江湖萬里餘歸來縮首伴凡魚門從席後軒車盛鬢自霜來宦味疎思往事注殘書閒鋤明月種秋蔬傍人莫笑揚雄宅好事時過載酒壺十八閭井錐刀劇戰烘詠歸奚取舞雩風道開聖學千年後春在先生一畆宫敦誨誘見從容絃歌不隔縵紗紅珉溪㡬㸃梅梢雪嵗嵗吹香入夀鍾虞美人紅顔緑鬢無長好日對菱花老頭童齒豁竟何禆只有飢時餐飯飽時嬉因行消散昬和悶却覺筋骸困那錢置酒馬兒騎食飲難消終日繫門陲二謝成耀卿簽事攜酒芋相過山瓶乳酒甘如蜜鴟芋堆盤赤見君相贈固多情潤我枯腸一吸破愁城秋光湖碧西灣瀲不到中心慊何時盡煑土芝香醉飽歸來肯把故山忘一作醉後歸時騎馬似知章西江月清明拜掃回值田家野飲有頒白者邀余就飲因實老人之意作西江月以歌之社鼓驚飛梨雪村簫吹破桑芽清明野飲見田家老叟邀余下馬歡飲一巵芳酒繞看滿樹幽花盃盤草草樂年華不棄同來觀化二閒歩州南古堤返照斜明雙塔亂山回繞孤城年來風物似昇平人說三王善政世事正宜静待田園好去躬耕雲間歸鳥有遺聲喚起投林髙興三大河凝氷蔽川而下與一二竂友登樓俯觀賦此詞以歌之散䇿暫辭鳬吏倚樓來聴漁歌夕陽西下亂山多白鳥蒼煙衝破一夜朔風吹雪白雲飛滿長河不將幽夢付凌波意在吳郎畫舸四贈張子文聫轡閒談風雅停盃髙詠晁詞山城投宿晚涼時邂逅青雲公子濯錦江邊相憶鳴條山下分攜秋風搖蕩菊花期竚候翩翩歸騎五繼張孝純韻郢下空歌白雪琴中誰聴髙山人生何用訂疎頑不過兩盂白飯夢到釣臺老樹秋風閒煞漁竿沙鷗無數㸃江干知我忘機去慢六夀王中丞梅蘂暗傳春信菊枝儘傲霜威風姿元與嵗寒期況是小春天氣翠實調羮未晚秋香添夀多宜髙名北海舊蟠螭未似東山雅意七夀李彦祥近嵗憶遊竹里今年來遇生朝平生洒落邑中豪邂逅風神不老賞盡山陽煙景去翻亳海雲濤太行晴色任秋髙人與黄花長好黒漆弩遊金山寺并序隣曲子嚴伯昌甞以黒漆弩侑酒省郎仲先謂余曰詞雖佳曲名似未雅若就以江南煙雨目之何如予曰昔東坡作念奴曲後人愛之易其名曰酹江月其誰曰不然仲先因請余效顰遂追賦遊金山寺一闋倚其聲而歌之昔漢儒家畜聲妓唐人例有音樂而今之樂府用力多而難為工縱使有成未免筆墨勸淫為俠耳渠輩年少氣銳淵源正學不致費日力於此也其詞曰蒼波萬頃孤岑矗是一片水面上天竺金鼇頭滿嚥三盃吸盡江山濃緑蛟龍慮恐下燃犀風起浪翻如屋任夕陽歸棹縱横待償我平生不足二曲山亦作言懐詞遂繼韻戯贈休官彭澤居閒久縱清苦愛吾子能守幸年來所事消磨只有苦吟甘酒平生學道在初心富貴浮雲何有恐此身未許投閒又待看鳳麟飛走好事近遇南雲門南北兩雲門竹圃稻畦如畫罷亞黄雲萬頃自長渠飛洒太行鍾秀盡三卿形勝遞髙下笑我年來用捨似田間秧馬二嘗㸃東坡橘藥湯作石鼎響松風茗飲老來多怯喚起雪堂清興瀹鷓斑金屑橘中有樂勝商山香味不容說覺我胷中磈磊被春江澄徹三賦庭下新開梨花軒鎖碧玲瓏好雨初晴三月放出暖烟遲日醉風簷香雪一樽吟遶洗妝看玉笛莫吹裂留待夜深庭院伴素娥清絶四春寒繼楊君卿韻三首斗柄轉春城向暖小桃開徹不似今年正月過深冬時節故将新巧發隂機春事未容說且就驅雲風箒掃西山晴雪五宫殿曲江頭漠漠輕隂開徹花栁都城三月正禁烟時節珂鳴轂擊玉泉遊故老向人說一片春風簫鼓蕩梨花香雪六華髪一衰翁世事眼中看徹只為年來薄宦負東山髙節𠖇𠖇神理到無慿此外更何說安得百壺春酒掃羇愁如雪玉樓春冬至夜侍祭隂消陽長從今數除客歸來聞好語月明滿地紫烟生暖入刺文添繡縷冷風肅肅生庭户桂酒光清搖燕俎今冬記我致嚴時爆竹聲中聴五鼓秦樓月今嵗八月自哉生明夜月色如晝及至良夕乃作風雨所謂獨向此時偏者詩人焉得無悵然之情也取太白詩例賦秦樓月一闋歌以問之是夜月色亦佳但微雲㸃綴耳華陽閣一年心賞中秋約中秋約九霄風露有懐都豁桂香和雨風吹落倚欄望處秋烟薄秋烟薄一樽能與素娥同酌二花時樂醁樽記醉平津閣平津閣一聲金縷滿堦紅藥小欄此日情蕭索土膏一寸春如削春如削㡬時盼到絳燈紅爍己丑嵗春分前一日栽培衆卉罷晚坐前閣無以解之偶得催閣芍藥辭秦樓月一闋因放聲自歌浮太白者數行實至元二十六年三月二十一日也時夜漏交二鼓燈下書秋澗老人題秋澗集卷七十六欽定四庫全書秋澗集卷七十七元王惲撰
