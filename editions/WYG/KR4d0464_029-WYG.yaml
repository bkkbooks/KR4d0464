body:
  text: 題武元直畫巢雲曙雪圗千丈雲巢曙雪寒清談誰似二公閒京師三到凡三見夢遶煙林紫翠間蒼雪亭為劉參政賦将軍塵市有山林亭下雙松鎻翠隂一夜雪花來㸃綴蒼蒼特表嵗寒心蒼雪詩成玉局翁左山題扁取清雄翛然坐對横枝處不到東華踏軟紅過賈左輔墳林雲陣横陳賈氏林蒼煙埋沒石麟深堂堂地下開天業只聼黄鸝送好音桃花鸂鶒圗桃花鸂鶒滿春江睡暖晴沙夢亦香何處秋風南去鴈㫁雲寒影不成行答揚元甫問勁於屈鐵無强梗媚比嬌姝峻潔貞元甫見詢曹妄答筆端流潤自圎生答劉少卿顔書之問仙壇郭廟八關文襄國濠州半籕分五帖論來皆具體就中勁甚是殷君留别簽事張鵬飛闕鵬飛簽事以三詩餞行甚有情致但愧襄闕筠林暮雨共山山下送征騑卓水歸時趂醉題十萬壮夫飄灑處一燈長記宿筠溪入定州北門偶得千雉嚴城皷角寒當年韓富倚為安後人苦笑書生懦白羽風雲屬将壇雲林曉汲家住清林杳靄間瓦瓶乗月汲泠淵山中道士金椒客煮盡溪頭白石圎山中雜詩路回峰轉認山形周折東來似曲肱偶倚斷崖南比㸔兩鯨挾輔一龍騰長風催雨入山門洗浄埃霾面目真領取封靈相敬意儘堆空翠待詩人騎乘藍輿歩總宜雨晴龍首有餘姿興來題破蒼苔石紀我青山獨到時徐童絶觀曉煙蒼盡得東風草木香鞍口迤西山更好惜教無力到禪房山前三院説中溪蕙帳空來夜鶴悲一片短碑空晤語宣尼堂下久搘頥又題鹿庵與王子襄先生手書後一代髙人王鹿菴幽潛來住百門龕詩瓢藥竈當時友政有先生徳不慙劉齊王讀書堂在阜城北墉下當年齊相讀書堂此日金華表佛幢碧色尚餘書帯草綺疏猶是聚螢牕平原縣有懐顔太師忠節羯奴獵火九州空平地孤城與抗雄十七郡兵同日集奮從吾首倡孤忠記右脅誌文昔相工謂王欽若貌異當貴㦯云鼻斜何如曰他日作相自正後果然予右脅有六紅誌一黑子状成斗文其黒子終非同色又逺而不應曲詰至元廿年二月廿一日因浴出見一紅誌忽生其下遂足成杓状吁亦異哉因書此以紀其生發月日云脇間素有七星文黒誌權杓逺且昏忽出一星為補正隠然髙起更紅温讀老泉先生審勢審敵二篇清時無故厲兵刑審勢雖深衆目驚轉首翠華牽率去老泉㡬策見來眀二虜先須一掃清萬方然後論升平周文未免昆夷患却訝先生以筆爭赴任濟南前次黄岡作征車轆轆二旬間泥雨長途備阻艱行近黄岡都忘却一峰金翠得華山今年東赴濟南行帯雨拖泥二十程只為此身飢凍迫㡬回辛苦歎勞生過濟河縣北晏嬰城一製狐裘四十年當時功烈管差肩細思欵對崔門語又見臨機勝趙宣三士輕生死二桃善謀誰似晏卿豪朝來采邑城東路欲訪林丘挂佩刀濟河道中今稱為齊河盖偶忘㸃水耳地名耿濟後漢耿弇破張布于此故名甲子東遊入泰安封壇日觀總躋攀誰知二十年來後却向齊西㸔泰山匡山匡山説有舊茅廬李白當年此讀書嵐氣宛如吟醉重野雲時學簡編舒公堂鳬吏前頭擁簿書午衙急散日停晡南山翠倚公堂上終日相㸔有若無九日登厯下亭當年厯下冨材賢李杜文章兩謫仙此日風流俱不見秋煙空溼採菱船周文矩雷劍化龍圗圄底幽光見斗間張華腰領不勝寒躍淵又作雙龍去在晉當為變怪㸔飛躍陶梭化葛笻潛飛無跡與神通披圗勘破延平事又在雷公劍室中右軍書扇圗偶愛蒲葵扇影寒拈将揮灑動雲煙情知龍躍天門筆肯與兒童調百錢王謝當年奕世豪東山清興更滔滔不應經畧中興志留在書名與日髙春閨怨花落閒庭燕語新東風吹夢溼行雲就中最是闗情處一寸春光爛錦文爛者爛漫之爛也甲申門帖子一尊春酒酹門扉入手新年所事宜却愧白頭官舍底苦無眀略佐眀時偶書人無定志何從好事到難量尚口行一理縱能消百妄物情其柰正逄迎周文矩勘書圗宫槐隂合玉堂清書葉翻香入細聴内苑近來遊迹少太平天子要傳經鈴索無聲到玉除一時人物在瀛壺細㸔簪盍翻經處當日安知不有吾花壓欄干淑景移一枰閒煞玉堂棊日長正有繙書樂未礙從容下直遲周昉畫楊妃噤齒圗海棠春睡儘紅嬌苦殢三郎厭早朝人到愛深無説處捧心顰處更妖嬈題張季雲先生山莊圗儒将風流素所期兒時㡬讀霽闕後喜對張卿賦此詩却馬巗居楚素懐莫嗟終老未曽諧天闕氣散作恩威震兩淮思長本與風雲㑹山逈空圍水竹幽説似闕望建封勲業在徐州公與徐州帥牙吾答相得甚驩官幕府參軍至蔡改吏部郎中死沛縣牙吾答即盧天瑞也樓居春望圗翠斂雙蛾底事愁不縁春去落花稠歸鞍未得朝天信望㫁東風燕子樓徐熈折枝果圗紫陌春風窈窕歌昇平花果夢宣和寫生忽見徐卿畫碧爛紅鮮發興多後庭新唱滿深宫已覺金陵王氣空畫手忍将忘國淚筆端秋實染春紅趙大年雪霽聚禽圗風雪龍沙萬里行當時先兆見丹青不然紈綺豪華習滿意荒寒落鴈汀㸃綴煙林意儘妍沙洲鳬鴈見荒寒君㸔小景多盈尺展放江湖萬里寛又題美人却扇圗中饋蘋蘩女所思春風何意醉瓊枝畫家解寫嬌羞意不見樊姬脱珥時大禹泣辜圗真淳氣散不復古科條漸似秋荼深道逢胥靡漣洏泣灼見當時罪已心陶潛夏居圗宗華杜亨甫家藏襟懐嘯傲羲皇上晉宋興亡筆削中千古此心誰㑹得颯然時有比忩風吾廬瀟灑風煙外詩思扶疎樹影中典午廢來何限事五株楊栁自春風庭樹交柯緑䕃濃欣然忘却草堂空更憐披稷懐新處漠漠平疇遞逺風題李伯時畫陽闗圗霍清甫家藏晚唐聲教限羌戎才唱陽闗慘意濃逺節每矜殷侑壮略無離别可憐容别淚重於烟栁雨離愁長似玉闗程就中儘是銷魂處不待聴歌第四聲題梵隆古畫雅集圗係内府畫上有紹興印今為霍清甫家藏龍章紅爛紹興文入手休驚玉盌新奎壁細㸔輝映處半為元祐黨中人第二句一作内府芸香秘㡬春題杜莘老春融秋嶺圗三分春事二分空料峭寒生破曉風今日簷前天色好山嵐全似卷中融甲申春大寒題李龍眠畫九歌圗闕不忘君死即休修辭空説闕遊厯山南寺園題其壁暖煙散處只空崖俯瞰城居亦壮哉寸闕出不容濯濯嘆無材江貫道畫江山萬里圗抖擻衣塵整豸冠囂囂終日簿書間何時一葉煙波裏飽㸔江南萬里山繁杏錦鳩圗繁杏梢頭淑景新錦鳩呼雨雨初匀儘㸔活色生香裏擁頸雙棲過一春過青崕山上有圎臺㡬頃餘上有老巖公手植今為大林麓矣鵲巢東下望青崖武恵當年㡬往來欲謝雄圗中最重至今東魯號多才一作欲話霸圗應寂寞蒼烟深處柏圍臺過道郎寄時伯威泰安教授名震岱宗回望漸微茫空翠隨人過道郎三日曾瞻亭上客一樽風味詎能忘題山谷家乘後闕初㸔喜小康宜州天氣固難量一壺醉倒牂柯闕古南樓飲恨長宿東平南衙昔年曾預幕中籌白首重來此地遊却似絳園春睡醒一聲鶗鴂五更頭黄石公祠雜詩闕闕祠南翠阜重闕都在先生指授中此邑彬彬富碩儒山川英氣未嘗虚何須苦泥神仙説夜半重來覓素書東阿前金時自張萬公髙子升清鄉侯莘卿已下進士第者二十餘人此老當年一隱淪後稱黄石怳疑神野人莫託山間事洞穴無情草自春謂黄山洞穴山顛折立石也良授書來智益竒一時籌策係安危楚人不逐哀歌散白首空懐抱石悲千古陳言雜偽真丹青難寫是精神護軍史筆端如畫北上風雲逐日新今古文章不自工後人公論見清雄壁間細閱題詩客笑煞騰騰兀兀翁黄石祠有詩云天其既與赤帝子我亦願師黄石公題曰騰騰老後復曰兀兀翁騰騰老盖楊紫陽也兀兀翁楊飛卿也二公爭相為已詩者數年遺山聞之曰詩則非佳争之意甚可為一豦也郭将軍巨廟在肥城縣西水里村南山上土人云巨嘗趂熱來此欲瘞其子於村傍果然余以謂孝忍者也家窶時供菽水難豈堪孫息共盤餐生埋設若同純孝不念将慈變忍端水里山頭郭巨祠嵗時香火野人思交哺因羨慈烏鳥斜日歸飛滿樹枝一作啞啞却羨慈烏鳥繼司毅夫韻題野堂壁毅夫名仁郊居静有耽書樂客至都忘慊嵗災喜向壁間留語去草堂樽酒記曾來眠中故友三年别霜後春桑一例災暫解嵗憂誠士樂馬頭遥指野莊來武恵公故里在長清西五十里今稱鵲里者是也鵲里西連武恵林蒼烟埋沒石麟深固應千古桓公業長聴黄鸝送好音遊百家巖雜詩月池懸溜落蒼窪岩竇分居可百家不羨碧瀾秋色好倚天驚絶赤城霞龍鬚草細雪婆娑石樹玲瓏碧玉窩欲訪煅爐懐舊隠老僧指示隔煙蘿山居最苦水泉慳明月池深湧碧瀾寺仰以清山藉潤細教螭口瀉髙寒山煙起處竹林蒼白鹿嵬髙半夕陽長嘯至為鸞鳳去公和當冠七賢堂𤣥髓丹書兩遇難碧山猶説有仙壇千年留在嵇康恨石上清風漠漠寒亂山合遝排青闥細路縈紆走白蛇十里風煙吟醉底柘園莊北日初斜清醑蒸秔户户香百門山下喜初嘗太平有象豐年是翠竹梢頭㸔簸揚欲往蘇門半月過青帘巷裏總高窩寓形宇内知能㡬對酒當歌不樂何十月山陽黄落秋􅈝風寒色入貂裘蹉跎非泥林婆酒更為諸賢一日留晉隱祠邉落照紅自來伐木竹林中且休輕議前賢軰自執牙籌笑阿戎黄烈清泉在碧巔當時瓢飲致髙年情知泥水能充腹空使人間作笑傳題朱孝子詩卷道傍積土作髙標存殁中間慰寂寥見説一方多錫類秋風惡水變鳴梟中古識封髙四尺朱生覆簣到三尋所憐哀俗頽波裏能見終喪不匱心門閭旌異對堂封春在林墟洩樂中白首已慚朱子孝荒阡望入漢堤東予家三代祖塋夾堤東西相望凡三處長至日同李靖伯過髙仁甫新居即事禮義為方邑不多處心極厚已澆訛首從吾輩家風異其奈閭閻鄙俗何藩籬限隔苦無多撤去寛於四海和昨晚杖歸心適喜樂於常棣燕時歌中唐一席間維藩嶺眼髙於嶺嶂㠝愛煞西家髙老子晚沙能暖鶺鴒寒讀明皇雜事西内凄凉慘落暉髙将軍去事猶危起居聽徹公卿表淚溼龍袍祗自悲元日門帖子闕堂落有成永思逺慰嵗時闕近逢季主親闕構新年儘笑聲世事雖闗覺累輕閒心有味勝時榮不妨鄉社浮沉醉一曲酣歌樂太平䟦醉道士圗床頭傾盡玉雙瓶已醉猶能百態生若問一壺中所樂醉鄉白月自昇平䟦墦間圗乞食歸來意有餘豈知内子涕沾濡相逢半是墦間客底用經營畫作圗䟦理宗題馬驎畫折枝木犀圗花中神品趙昌師又向臣驎見折枝不惜一天風露潤百林樓晚要新詩䟦醉漁父圗浪急舟輕任自由得魚歸去博新篘醉來省記靈均語獨速煙簔笑不休題卜者詩卷卜筮精微未易通静能知逺要深功裹糧去訪賢師友喜為題詩送易東乙酉元日門帖子莫認時榮真福順休從勢利論人情願将風日輝輝氣散作豐年笑樂聲題徳長老夢齡圗髙情千古一坡仙夢入西堂豈偶然只著吾家公案論嗜心将至有開先修齡親説夢中傳寫出梅花老樹禪更愛鹿菴人品峻不隨王導共周旋鹿菴云好将半桶井華水過與闇黎洗面顔露堂夏日即事日長人在露堂間何物相㸔慰我顔碧㶑方池湖水滿一峰蒼翠出君山題遺山先生手書雜詩後河間王成之收文鍵親承謦欬餘又從珠碧見遺書常疑落落江山筆不放奎光到玉除江鄉雪景圗勢利嬰兒百尺竿雲臺争似釣臺閒料因篷底秋江夢不到君王物色間秋江待渡圗楓林沙步夕陽蒼一棹秋煙待野航江上西風晚多急行人歸路不須忙寒林圗溪山一雪自幽深都付騷人入苦吟最是畫工留意處晚煙瀟灑萃寒林題水牯圗姚黄魏紫動遊觀何似田家黒牡丹萬有囷倉由爾出論功消得畫圗㸔秋山訪友圗蕭蕭楓葉映青山詩在風煙紫翠間早晚得歸林下去一溪秋水伴君閒闕峙石樓連佛屋灘横八節走青伊杖藜都是香山老斜日青山獨往時讀後漢西域傳論世外鴻荒古罕聞角端人語鳥雄尊縱横最愛宣城筆理絶人區略不論角端獸名極壯大能諸國語題樂天不能忘情圗駱馬悲鳴頓玉珂停杯重聽栁枝歌做成一段閒公案轉覺香山長物多楊栁新聲滿洛陽尊前風味老難忘筆端拈出新詩句似為樊姬作嫁装韓白二公老境日月閒心要破除香山晚節亦區區藏詩葺寺皆餘事猶勝昌黎聚博徒籍也胡為勸著書要将斯道濟時須情知千古潮陽筆肯作分章摘句儒太一宫華表人歸鶴未歸空從雲氣望蓬萊西池一望桃千樹猶記中和手自栽露溼庭松偃盖青一聲幽磬隔疏櫺多應金簡朝元罷自炷爐香讀道經庭樹瀟瀟緑滿廊日長深鎻碧忩凉隔簾遥見秋來處一葉輕黄望井床漠漠隂風轉石壇長廊踏破碧苔寒徑呼徹放松扉鑰㸔罷梅花問竹安倚竹圗天寒翠袖儘輕盈暮倚湘筠思不勝何異澗阿幽隱士長材空抱乏賔興遊龍門雜詩一十首共西山名山到龍門勢轉竒千年軒豁露朝曦從教馬足徐徐進正是山紅澗碧時百丈瑶泓湛碧崖杖黎不到是空廻諸人也解詩人樂挽葛攀藤一例來龍門形勝自天開細㵼銀河灑碧崕我老世間塵土夢百年能得㡬回來直上危巔弄瀑流空濛飛灑翠雲裘㸔來潭面無纎翳人道龍泓是炭湫冷泉飛下碧峰尖鮫客綃長萬縷纎却為夜潭霜月苦山靈長下水精簾龍門峽束石嶙峋只有懸流􅆟可人才到寺臺心已喜竹梢眀處拖天紳竹上題詩石上休劉郎勸酒薛郎謳竒探不識風雷窟若比潮陽更欵留安行舍䇿上稜層醉裏陳州羨不勝𤣥極近南雖峻絶似君筋力尚能登不惜登危馬力微歸時風袖喜披披紫煙暖藉青鞋溼歩下蒼陘不覺疲山喜詩人作晚粧野煙不幻碧峰蒼婆娑醉藉横披草更為山英倒一觴筠溪軒留題山川眀秀在共西人問其中㡬杖藜三十年間還黙數青燈兩度宿筠溪筠溪溪上好風煙又向幽人借榻眠欲就龕燈尋道話却成尊酒醉留連題天慶觀壁至人心孔有天遊何似歸潛徳日休千尺澗松終自老一菴閒地且相留擾擾城居足是非静觀秋水物空齊近年豁盡争衡氣卧㸔虚忩日影西春畦緑滿桔橰閒吟眺髙城有往還不著人光牛背上時來支笏㸔西山闤闠都來掌許中白頭相㑹㡬人同時将一榼如氷酒傾㵼春風滿太空題史仲威修鄧州文廟詩卷禮殿修完到大成仲威一日得嘉聲却憐吾郡膠庠地二十年來㫁不行題嵗寒齋松柏青青貫四時木中推重為幽姿史君特用為齋榜要見貞心老不移題東坡手簡文章大節中所立海岳英靈未易招只為峻髙人競仰有時秦吉作鸚嬌題山谷手卷書學推公果若何紆餘全似右軍鵝兩行醉墨南樓帖一字千金未足多寄楊參政紅藥堦前露氣新五花行判舊經綸除章莫厭鈞陶細散在人間是好春閒中何物是窮愁細把調元入校讐勘破漢中三策意忍從刀筆論鄼侯謝太傅奕棋圗勝負胸中料已眀又從堂上出竒兵怡然一笑文楸裏未礙東山是矯情秋澗集卷二十九欽定四庫全書秋澗集卷三十元王惲撰七言絶句
