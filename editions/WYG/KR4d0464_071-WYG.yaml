body:
  text: 䟦蔡中郎𨽻書後科斗書當秦有天下未盡廢而程邈易篆作𨽻特用便牘削耳逮中郎蔡邕去取丞相斯大小篆為八分實秦𨽻書也近觀公建寧三年所書五官功曹掾夏承墓表真竒筆也如夏金鑄鼎形模怪譎雖蛇神牛鬼龎雜百出而衣冠禮樂己胚胎乎其中所謂氣凌百代筆陣堂堂者乎故書家評公書骨氣洞達爽爽為有神宜矣昔張長史作書多先觀古鐘鼎科斗文字遂楷法妙天下不然則無漢晉己來髙古氣骨不肖往年道出襄國讀宋文貞神道碑見其筆畫一一涵篆𨽻古意迺知其言為有徴後之學者苟志於古舎兩漢孰宗匠哉至元辛未中秋前二日同相人馬才卿觀於省掾呉萼慶之寓舎衛人王某斂袵書䟦中興頌歐陽公稱浯溪頌帖嵗久剥裂字多訛缺獨李西臺家藏最為完好予當得而見之宦學四方來藏魯公書甚多兹獨闕然及調官平陽㑹郜君和之出故家墨刻八軸葢浯溪臨本也命兒子孺臨摹雖精氣轉索庶幾典刑具爾嘗聞公平生書五百餘石其風骨氣韻率洞洞有神如忠臣正色立朝羣姦魄褫又如元氣賦物流形都異因其人而為變耳始泰越人探丸起死不主故常在邯鄲則為帯下過洛陽則稱老人西入秦又以嬰兒醫名也故評兹帖者謂閎偉發揚狀巨唐中興勲徳之盛豈虚言哉閑閑公偶以銀鈎鐵書目之恐未盡善也至元十二年乙亥嵗夏四月六日卧病中書于謝帥第之北軒䟦郎官石柱記後唐尚書左司員外郎陳九言文古人稱長史得草聖不傳之妙豈知真書在唐為一代精絶所謂能行而後善走者也魯公書學氣侔造化真楷得法多自公始郎官帖精絶為至舊刻在京兆今亡或云淪瘞㕔事址下近從曹生季衡得墨本全文葢丞相夀國髙公故家物也老眼增明伏翫不置者累旬真希代寶也十有三年春正月人日題於西山之讀易龕䟦手臨懐素自叙帖世傳懐素自叙帖有數本劉御史文季云昔吾從祖河東君所藏本最佳後有蘇才翁䟦云前紙糜潰親為裝褙且為補書不自媿其糠粃也有杜祁公題云狂僧草聖繼張顛卷後兼題大厯年堪與儒門為至寶武功家世久相傳後又有山谷楷書釋文蔡無可家故物也北渡後觀金城韓侯及祕府所收俱無蘇杜二公題䟦似亦非長沙真筆至元辛未秋九月晦余謁左轄姚公出示太保劉公家藏帖前三十三字亦云子美補亡按玩之餘令人仿像意韻盤礴於胷中者累月冬十月甲午是日極暄妍可愛乗筆墨調利喜為臨此拙惡非所慮庶幾見其典刑云耳監察御史汲郡王某仲謀甫題識題懐素草書千文後予觀藏真大厯二年海西寺所書千文極縱横捭闔之狀其欲㫁還連似斜復整筆増妍而不繁其減者意足而悉備如風檣陣馬驟不可當倒冠落珮狂莫得制至於氣凌過庭勢追張顛雄偉豪邁超於法度之外者一一視之皆篆𨽻之古文耳兹本雖出臨摹精氣固哀骨脈具在所謂雖無老成人猶有典刑十一年正月五日風日清麗手桑筆利乗興學書覺胷中煩滯拂然從筆端出矣䟦張嘉貞書近攷瘞鶴銘乃知為右軍龍爪書也予所藏唐中令張公嘉貞北嶽廟碑其意韻骨氣敦龎古怪如衝戈植劔特龍爪遺法為正書之一變耳張公當開元初拜大將提重兵卧䕶北門其氣固已䧺一世矣及繼璟而相以强敏風操聞然史臣稱公性疏簡與人交不疑内曠如也古人以書學為心畫故其筆不得不雄放竒偉象乎為人然未免夫捧心效顰也如優孟抵掌談話與叔敖俱化一一較之有不然者葢其嚴辨有餘而髙風絶塵為少衰矣戊辰中元日書䟦麻姑壇記後平陽盧氏家藏歐陽永叔云仙壇記有大小二本此大書者也其興寄縹𣺌穠纎妍麗無不可人正如覩麻姑手爪令人背痒時不待爬搔已渙然氷釋矣魯公書大抵與元氣渾淪千態萬狀不可端倪因其人而為變耳第記中皆戃怳不經之事公特為書之豈王中令謝太傅文彩勲名陵跨百代未害登東山而有髙世雲霞之志也題魯公書臧氏碑後魯公書三原臧氏二碑所謂糺宗者作擘窠大字體端整而頗瀟散如羽林壁壘横天作陣勢相戛摩與衆星争光而色正芒寒之氣為有間耳其懐恪神道銛鋒勁畫望之凜然挺植戈㦸一一較之不無利鈍惜乎出秀岩臨摹使千金駿足困伏皂櫪間其超逸絶塵之想索寞無光惜哉乃知太師忠義之氣發於筆端者諒非積學而後能也至元乙亥秋七月朔得此帖於參政李公䟦竹谿所題東坡墨􅃧後竹谿書所見多矣未有若此帖之真楷蕭散者大似虞中舎諫獵奏狀間以側筆學坡之媚耳乃知公當大定明昌間不秖以篆𨽻獨歩於玉堂金馬矣輔之韞櫝愛玩亦醉翁之意也可謂真知賞音者哉䟦孫過庭書太宗以英偉之氣陵跨百代萬機之暇㳺心翰墨故二王法書盡入秘府摹倣臨搨然後以牙籖玉軸徧賜諸王何好尚如此其篤臣下得不從風而靡過庭適當其時今觀此書規模步驟一宗二王得飛鳥出林驚蛇入草之勢然㸃畫散落往往㫁而弗連葢體具二王而章草為羽翼也東坡謂陶詩初若緩散不收反復觀之乃得竒趣余於呉郡亦然但近代名公品題不到豈具眼者未暇及之邪予特表而出之至元辛未冬十一月廿四日與兒子孺童觀於京師咸寧里之寓舎時雪霽氣清率爾而作汲郡王某謹題䟦荆公墨蹟予嘗觀夀國髙公所藏心畫水鏡知此為臨川所書無疑雖風骨遒勁而筆勢散落無繩削可據殆似公當軸時燮新法調夸毗子青苗助役無所紀極噫一念之差至於筆墨間尚能髣髴其為人如此後之學者處心擇術當如何哉至元壬申重陽前四日書於平陽官舎䟦黄華墨蹟予觀公書多矣曰黄華山主者盖公中年筆也其格調步趍要本二王氣韻蕭散得元章之勝勁厲初不逮之然如王謝子弟以生長見聞猶足以超人羣也殷溪云題黄華與李彦明太守一十三帖彦明係公同年友也此数帖盖公官翰林時書也至有飢寒之厄近在旦夕又云収拾扈從秋山貧家至甚不易令人披讀可勝嘆惋當明昌嚮文之世公以文彩風流照映一時其窘廹乃爾豈官散禄薄未為道陵所知不然貧乃士之常事造物者庸玉汝於成邪至於文翰之妙如荆金和璞自有定價不待稱而後重也䟦任龍巖烏夜啼帖南麓書在京師為最多其擘窠大書往往體莊而神滯獨此帖豪放飛動超乎常度而未庵師謂醉後興逸妙能天成豈長沙率爾而顛字字圓轉之意邪然古人得意處非一如去乖就合意居筆先乗其調利例多髙風絶塵不止藉歩兵作氣而能奪三軍之帥也䟦任南麓所臨潛珍閣銘為大陽津張提舉彦亨賦縂一百八字提刑王子勉目曰數珠帖南麓書在金大定間號稱獨歩然擘窠大書徃徃體莊而神滯今觀此帖筆勢超逸氣韻兼勝豈非抵掌談笑善學叔敖者邪宣聖小影後䟦語金正隆六年大學生馬雲卿筆襲封衍聖公孔元措題識宣聖肖像繪者非一據聖儀四十九表儗之猶潢潦之於河漢培塿之於泰山也孔氏云家廟所藏衣燕居服顔子從行小影最為真像此本盖再一傳也嗚呼尊其道踐其迹是謂之恭敬不然天容日表雖參於前而倚諸衡是不幾於黷乎至元乙亥夏四月命士人王友仁臨冩小子惲百拜敬書䟦周處府君斬蛟圗後役萬物而君之者莫靈於人而處尤以氣勝者也彼司馬彤之虺鄙未若神蛟之變怪也老於菟之殘猛不減氐萬年之嘯兇也處一旦視之猶尺蠖與孤豚耳乃知擁殳之際其氣固己葢西戎矣然有憾無援受制於人卒為二豎所害噫千載而下令人讀臨戎之篇凛凛然猶有生氣其睨梁王不糞土若也雲史筆之諒有激而云䟦貫休比丘像釋貫休比丘像予二見之此幅與東平王氏所藏衣紋精粗不同恐學道子兩部圗鬼物筆法也䟦陶縝生菜圗蔬果猶犬馬然以其恒見而難為工故生意彩色有郊圃水濱之異縝之筆不見收于御譜而為金陵所題詠所謂一杯宻雲龍足以知名於當代也䟦范中立茂林秋晚圗中立初年本學營丘極平逺迥秀之狀至於山骨鬱茂林麓幽邃咫尺杳靄逺隔千里蓊然若太陰雷雨不可端倪兹盖居終南晚年之筆也故當時有弃墨如泥之目是知㳺藝雖宗匠前修唯其胷中自有一天乃能造微入妙題寄寄老人陳氏詩卷昔帝舜陶於河濱噐不苦窳而陶之為噐最近古而適用廣長安寄寄翁得適用近古之法削為鼎研諸噐堅潤精緻粹然含金玉之質誠可方駕保張逺紹澤之吕道人矣題王生臨道子横吹等圗後書與畫同一闗紐唐賢善臨書宋人工㸃本要之極形似而出神爽為佳蒲江王生以讀書餘暇㳺藝丹青於臨放為尤能葢致思詳雅不為法度窘束筆與意㑹探天機所到近為予㸃道子馬融横吹營丘寒江晚浦為可見昔龍眠作李北平射邊騎圖觀矢之所直迺應絃斃也若向作著矢狀則風斯在下矣知此則能造微入妙文甫其沉潛可也丙子清明日書于行館之敬止堂䟦馬氏家譜圖後夫源深則流長本盛則末茂至於家世蕃衍碩大亦由忠厚之培植徳澤之淵浸者耳燕著姓馬氏自遼厯金代有顯人故居河朔者多大墳是歸昔狄武襄以族係不明不敢附梁公之後時人韙之今絳尹馬君出示兹譜曰此某之髙曾也皇顯也降而下之曰伯曰從曰昆曰仲聯綿次序蔚為一宗盖亦有自來矣於戲盛哉遊澤州青蓮寺題示至元甲戌夏四月戊午予以分閱澤潞州兵且需後命乗暇同州尹皇甫琰來遊兹山相與登福嚴佛閣置酒小酌歘林風振響山雨驟至煩襟塵思灑然一醒少焉返照入壑其西南諸峯雲起曳縷及頂而散縈紆披拂如六銖僧衣空濛法身既暮羣動俱闃溪流有聲潨澮丹壑如萬馬千兵奔赴敵場静夜逺聞耿耿㤀寐顧謂皇甫君曰此豈非山靈化現以清雄之狀娛逰人之耳目邪凡所得唱和詩若干首因留題釋院壁間以為它年林下故事從逰者沁水尹大原李汝翼屬吏丘山甫承直郎平陽路總管府判官汲郡王惲題子翁孺侍行絳州後園題名絳以兩州六縣三十萬户之盛守治一園甲河東而名天下者宜矣至元壬申春予自霜臺來官平陽適陽威人有獄疑而未能决者四年遂被命來讞授館絳園留十有七日既集事因披讀唐巳來園池圖記按觀遺跡莽為汚宫獨有老樹欹臺荒池漲水想像當時亭榭竹木之勝環合覆壓倒影明滅猶在瑶翻碧瀲中耳感今懐古因以見物理之盛衰知哀樂之不恒也同來者屬掾李諶鄭扆子翁孺侍行是嵗夏六月初伏後二日汲郡王惲題䟦秦得真墨軸後墨之名家者唐己來不數人其難工也若是如坡公尚煤松自劑放潘谷漆法至竈發舎焚曾無倦色冝乎秦君嗜之而不厭也盖將紹潘張之絶藝發潛徳之幽光耶予近以沉煙寶劑就龍尾石試之其黒而能光清而不沍迺知精妙入神方駕前軰為諸公所稱道宜矣祭霍山祠題名至元九年冬朝廷以郡邑鎮山大浸載諸典秩者所司三載一祀霍岳在河東實為靈鎮故事每嵗以仲夏土屬之日用信報禮昭䖍度也明年癸酉夏六月廿二日惲行縣北走霍邑前次洪洞雨不克邁赿翼日抵趙城適嚴祀省牲之夕迺率霍州判官連漢臣監縣事塔的尹裴國用主縣簿劉偉齋宿祠下將事之夕霧雨交作既祀之朝陰霾四開三獻禮成泠風肅然神峯鷲嶺軒豁呈露雖韓潮陽之禮衡岳孔廣州之祀南海不足以喻其快也陪祀者府兵曹解禎縣佐史髙政稅監張承慶邑人薛昌齡嶽廟道士李志真興唐寺僧普光執事者史王庭玉等一十五人遂相與饜飫神貺而退承直郎平陽路總管府判官汲郡王惲題記從行者閭山張思誠子翁儒䟦唐忠祚柘條白頭翁圖忠祚前宋人宣和盡譜有傳前人稱忠祚畫不唯極其形似如花美而艶竹野而夭能狀物之性為好耳余尤愛其科條勁挺放筆而成得妙意於法度之外殆書家所謂錐畫沙也乃知畫與翰墨同一闗紐豈虚言哉䟦楊息軒江灣漁樂圗予初不解畫工拙非所知但開卷瀟洒見漁家風味令人𣺌然有江湖塵外之思不知何時得帶笭箵以駕船獨聱牙而揮車去作西溪漫叟為畫家所傳冩似亦不虚負此生矣䟦甫田圖後近與李野齋讀岷隱先生詩説沖沖然殊有所得及觀是圗其經國備物之制傷今懐古之思令人想見三代忠厚氣象如在乎其間親承其事至於禽魚草木車服豆籩之盛一一視之皆具古意又有可觀可興者撫卷三嘆不覺慨然孰謂丹青形容起予至於斯邪至元戊寅入夏五日題䟦藏春劉公東亭等帖此太保劉公書也觀其筆法若不作意故飄逸如此絶似長沙素苔磯静釣等帖識者當以予言為不妄黄氏裝潢者能愛之以為珍藏豈性與藝習而相近然邪自題所書草字後今日午睡起偶作草字數行因悟筆勢貴其神速要如李愬夜半乗雪出其不意乃能入懸瓠城縛取元濟爾又題草書後草書筆勢至傾欹㫁續當如歌三百篇㑹意時手舞足蹈不知其為顛頓也題丙愽陽問牛圗後蕭曹稱漢賢相然未免有牛飲池汚之論豈狃於休息重夫更化者乎及愽陽秉鈞闊略細務每以爕和為心神爵五鳳間蔚然有聲為中興名臣以二公較之佐命外吉寅亮之功有足多者胡氏謂體元者人君之事調元者宰相之職信哉彼闔里門而消沴因淖車而被謗者坐享堂封無所事事曽不若丞相嘔茵吏耳予適纂述調元事鑑友人敬之之子公譲請題其後故書題贗本蘇才翁帖後蘇滄浪書多出懐素山谷草聖本學才翁如戎州所書漫興九詩何啻青出於藍真超凡入聖筆也若此者何為者哉所謂真贗不較可知至於樗軒所題真蹟盖自别卷移之於此耳至元戊寅夏六月十六日午睡覺後題王郎中國範所藏唐翰林供奉畫𤣥宗幸蜀圖世知天寶之禍階於九齡罷相政歸楊李不知枉害忠良一言𤣥宗已為聲色蠱惑其明理亂顛倒莫知所從逮夫九縣飈馳越在草莾方思曲江忠諌遣使祭墓嗟何及矣今觀是圖自馳出大内宫衛依然供頓咸陽父老進說次馬嵬而六師不前痛九廟而太子北駕至犒遣扶風蹭蹬蜀道彷徨躑躅惄焉如擣之懐去五百餘載按圗思事如在目前令人動被髮伊上之感可謂畫中有史其垂戒深矣䟦黄華題郭夀卿雙溪圗雙溪余家山物也今觀公此作所謂詩中有畫畫未必能得真矣題閑閑公書祈宰傳後此祁忠義賛也盖公在河北時所書以老筆所至自成一家觀之似未免效顰耳然堂堂之氣己破碎陣敵矣題坡軒先生詩卷後予嘗于鹿庵讌席見老人數軰衣冠楚楚容止足觀當時顯宦有不復及者詢之皆前朝榷醸官也而况坡軒者乎先生在大定間調監相酒其風流文采照映一世時賢與之不在明昌詞人之下所存片言隻字猶當享之千金自非篤好有睨而不頋者夢卿出將家喜詩學固能寶而藏之異時釃酒臨江助吾横槊之氣者不為無得於斯文也題李懐逺世系後李鎬字之京涿之定興人父金大定間進士第終蘭州刺史先生姿沖澹樂山水初蘭州府君官鳳翔府近山多勝槩公日登覽怡說至樂而㤀歸自是畫品日進北渡后留寓淇上僕猶及識之番番然一良士也嘗作樊樓風雨春雲出谷二圗大為東瀛子蕭公所賞識曰士夫間不多見也以門勞官至懐逺大將軍集慶軍節度副使夀六十五卒于衛子師孟字希賢今年七十有五為人質直好義無它腸精力强明飲啖不少衰時時尚能浮大白酣適簪花曳枤㳺行閭里予每遇諸塗更忙與從容抵掌談平日心事初不以惸獨而屑懐也然未免作句讀師自給其日料焉復為一慨然耳戊子嵗端月上元日秋澗老人書且得載郡志寓居之列云䟦桑維翰手簡國僑在五代間本無書名今觀是帖其策勲於鐵研間者恐不獨専美於凝式也具眼者當以予言為不妄秋澗老人題䟦澹㳺王先生詩後黄華先生以海嶽精英之氣發而為文章翰墨當明昌間照映一時惟其早世識者至今惜之余向客京師好事家屏圍幀軸無非澹㳺詩翰迺知老成雖逺典刑盡見于是此幅公之老筆尤瀟洒可愛豈神完守固氣自清明雖耄而不衰者邪戊子冬陽生後一日秋澗惲謹題題雲麾帖後李北海書融液屈折紆餘妍溢一法禊飲序但放筆差增其豪豐體使益其媚如盧絢下朝風度閒雅縈轡回䇿儘有藴藉三郎顧之不覺歎美東坡云予書初學李江夏後來自成一家及以雲麾帖一一較之坡第按之稍扁而青出於藍耳蘭亭在古今為真行之祖自太宗崈尚一代學者争師宗之然如徐季海軰尚未免誥體之俗况餘人乎公于斯時獨能髙視逺步造微入妙臨池策勛固當為右軍忠臣矣有具眼者出乃知余言為不妄戊子冬孟秋澗老人王惲謹題䟦米南宫書曾夫人墓誌後顔魯公稱殷成已雅善填書嚮見唐人作禊飲序每行特留二三白者使見其己者之功夫耳初觀是帖即疑其神爽索然之飛動縹緲之勢再視之乃知為成已法也縁㐮陽出竒無窮雖憑軾縱觀不無㸔朱成碧耽嗜者心摹手追豈不踐迹終不入于室邪夢卿來託審定所見如此於戯夢卿其寶之安知飛電流雲之駿不踵門而至者乎戊子嵗秋八月廿七日秋澗老人題䟦香林先生老饕賦後真楷有常規而顛草無定態魯公傳長史之法東坡得魯公之妙至于率爾而顛餘未見能旭也今觀此帖馳騁長沙氣劘禱佛之壘耳嗚呼百年來人物淵源之盛槩可見矣先生姓田字信之前進士䝉城人學顔而至者也晚進王惲謹題䟦唐韋臯畫像予嘗觀臯王畫像魁偉竒傑顔赫奕視猛而髯㦸如老羆抗首有百獸不敢傍之氣不如是何以破吐蕃四十八萬之衆擒殺節度都督籠官千五百名乎至外臣自預政抗章勸進軍旅之目以定秦鏤號其豪侈横恣在所不論及殁有司欲追繩其咎頼門士陸暢者得解至今盛名有光于蜀嗚呼竹頭木屑其可忽也哉秋澗老人偶題題三百家詩選後潛溪稱唐人尤用意小詩其命意與所叙述初不减長篇而促為四句意工理盡髙簡頓挫所以難耳故心有可書之事如王摩詰云西出陽闗無故人故行者為可悲而勸酒者不得不飲陽闗之詞不可不作余亦曰自簡古而發穠纎由穠纎而出議論此小詩所以最難工者也且唐詩名世者千有餘家此特三百而已又鄱陽初選時意不到此間有三合者亦足以見侏儒一節之驗也且書學成于晉歌詩極于唐而論解之學盛于宋雖然非數百年涵養積習之久不克成就如是迹其所以然盖皆自上之所好中來何則嘗觀初學記載太宗文皇帝御製無題無詩及其文子文孫例能賦詠又唐之士人不能是者不復清流比數習俗安得不從風而靡哉二生經史外行若有餘此亦不可不知故令一讀使見前賢雖小道其用意有如此者因書以為示己丑重午日秋澗老人題秋澗集卷七十一欽定四庫金書秋澗集卷七十二元王惲撰題䟦
