body:
  text: 大元國衛輝路創建三皇廟碑銘伏義神農黄帝舊為醫家所奉衛之廟祀三皇權輿於國初醫家者流因城隍祠右故壇屋而像之庸申嵗時瞻仰之懇然位置迫隘規制卑陋不足以安靈揭䖍為神明觀府監尹達實特穆爾顧其如是蹶然於中私自念言當尊而侈大之心有所在而時則未遑也伏承登極詔條聖帝明王守吏致祭廟宇傾圮官為修葺至大徳庚子嵗夏仲祠部頒降三皇禮秩以春秋二時享獻葢宗本醫學拯恤元元也而昔構不稱安能儼肅禮容光昭祀典哉侯乃咨謀于僚屬曰明詔所當寅奉民力不可妨奪工匠不可徒役公帑不敢擅發也當首出俸稍以為倡率少尹帕克斯巴因判竂髙興仁推官馮琚相與賛襄下逮屬吏醫師筮士從風皆靡聿来胥宇於是相治城北郭汲署故址爽朗方正奠敞神居經始於是嵗冬孟㫁手於明年季夏為禮殿三巨棟松桷旅楹奕奕梴舄望雲就日儼若帝者之所其臺門洎醫學講堂齋室以次修舉其秋因常禋禮奉安神棲儀物肅備薦獻通暢士民來觀歡忻賛嘆謀斵石紀蹟傳示方來持學正祁伯易事狀以修建碑銘為請不肖念鄉榆盛事其敢以衰耄辭夫德髙太上者宜垂不朽之名澤及萬世者當享天下之祀鴻荒肇判為生民害者多矣三聖繼作觀象化民創物垂範如畫八卦以通天地之情造書契以代結繩之政耒耜以資耕耨舟楫以濟不通衣裳宫室既厚其生棺槨斂𦵏復䘏其死交貨賄而易有無制弧矢以威強暴然後民得安居以粒食優游以卒嵗孔子繫易叙太皥神農軒轅氏功德如此其見于醫家說者謂神農氏一日嚼嚙物毒七十餘種軒岐論難本乎大道而究乎死生之奥故近代猥為主祀若以三聖人開天建極利生民而仁後世者論之特一事爾在泝流求源雖出於人心之至情而報本反始乃有國之令典按歴代祀秩曰皇曰帝惟唐嘗置廟京師餘雖舉祭定於故都三年一祭而已我國家掃欃槍以清華夏㫁鰲足以立四極還淳返樸崇德尚功三年故都之祀亦嘗舉行迨聖天子當宁道嫓生成仁含動植秖嚴毖祠克作神主開建醫學德洽好生故有司推廣睿意俾同通祀致祠廟徧于天下其敬恭之典越至矣乎伊守土臣奉承唯謹規為有方不傷財不役民未及閱嵗而起百年偉觀事神治人可謂能也已是宜銘銘曰林林總總厥初民生理具畫一七鑿方萌乾端坤倪軒豁露呈孰措其一底於和平聰明惟亶體用含𢎞三聖繼作見天地情裁成功化以逸以寜躋民仁夀萬世稱仁德至孰邁道大難名功同元化㒺知中行推原報本任理攸應大德之政思治幽明在在通祀尊隆莫京惟守土吏恪於奉承載敞新廟閟安神靈聖靈在天與時降升雲行雨施品物咸亨云何事神而瘠于氓翼翼禮殿有儼神庭民初不預吏亟經營維皇降止庶監嚴誠風雨時若嵗事屢登民浸福澤豈曰吏能謹夫嵗月爰勒斯銘事神治人績用昭稱煌煌麗石永垂頌聲碑隂先友記曹居一字通甫北燕人有文章善談議以謨畫佐征南幕府官員外郎卒劉祁字京叔渾源人資純粹早以文章擅名有神川遯士集行于世弟郁以篆𨽻真行名家終監察御史牛天祥字國瑞上黨人深天文武經學歴恒山公府講議官應東諸侯聘客死聊城孟道字伯達瑯邪人性沉毅有機果威儀抑抑以學業顯東海趙澄字公靖共城人性純古有儒行終衛州教授司之才字進道淇門人業詞科有聲塲屋間性峭直有口盧武賢字叔賢燕人資雄俊憙談兵以客卿游諸侯間王之綱字德柔湯隂人通世務以儒術縁吏事有鹽鐡諸論傳于相下邢敏字公達秦人性公直明法令以亷自持用薦授左司員外郎終大名府判官李貞字彦祥黎陽人先考同年吏員轉尚書户部掾性温粹以善淑稱釋朗秀廩延人行精嚴内典外五經子史無不究覽逮耄期不倦示滅衛之仁化寺楊果字正卿蒲隂人詞賦第歴劇縣皆有能聲文采風流照映一世拜㕘知政事終懐孟路總管董瀛字巨源亷臺人精力有幹局常從王滹南問學今為淮東按察使董民譽字端卿陽夏人詞賦第為人渾厚無圭角與時浮沈常㕘預江漢都督府事劉方字元卿陵川人性清古善歌詩終衛輝路提學宰沂字魯伯洛陽人才長氣豪抱負竒節嘗與中書楊維説降西山主帥時人壯之後為王府徵士張豸字義大相人性僻直數從事郡府少不合輒望望棄去趙鵬字摶霄蒲隂人純粹有耆舊風金詞賦進士用辟舉令泌陽以亷能稱持嘉德玉字君寳蓋州人性至孝與人交剴悌篤信義嘗與友共事惡其不直遂絶而不較勾龍瀛字英孺河南人性方直在河南有詩聲述姓譜行於世烏庫哩貞字正卿遼東人沈毅果敢用䕃任内侍官得幸北渡後薄顯仕於去就不屑周惠字德甫隰州人性慷慨有大志早貴幸樂與賢士夫逰終江淮都轉運使王昌齡字顯之滄州人藴藉有經濟才由叅議史忠武府知衞州有惠政李瑞字天祥汲人性強果重義急難凛古人風達吏務有調議於先考執弟子禮終身焉仕至潞州判官王賛字子襄登封人性直諒生平游元劉間好詩學劉沖字進之太原人性剛克敦友義嗜學安貧樂道人善事與心㑹激節感慨有幽并豪傑氣尤長於左氏春秋馬寅字致逺許州人性雅重嗜古學恬於仕進丁居實字仲華錦州人用䕃以吏起身有亷德北渡後以前代掌故授禮部郎中致仕馬佐字佐之滄州人金明昌太學生有賦聲完顔孟陽字和之遼東人用門資起身為部掾北渡後不仕好古書家藏至千餘卷沈侃字和卿魏人資端方精律學嚴而疾惡由憲臺司法調陵州倅致仕張善淵字機道譙人少為黄冠師性機警有幹局表表為𤣥門綱王磐字文炳永年人經義第人品髙邁儀範一世文章精極理要臨大節不可奪今為翰林學士承㫖圖克坦公履字雲甫遼海人經義第學問該貫善持論世以通儒歸之性純孝樂誨人官至侍講學士陶諒字信之獲吕人有吏幹歴邑長著能稱程和字仲美武涉人長管庫材以聚書教子為志竟莫遂而没哀哉胡璉字國瑞武安人詞賦第為人慈祥樂易風流偉德度子祗遹有俊材光大其先業朱萬齡字夀之雲夢人生平以道學自負星厯占筮乃其所長楊𢎞道字叔能淄川人氣髙古不事舉業磊落有大志文章極自得之趣有小亨集行于世王信字信之南燕人少為律吏美丰儀嗜酒有氣義李班字晉伯北燕人性介特以品官子補部掾趙非熊字周卿安陽人貞祐間嘗以材武選為春官衛率為人資嚴厚可任以重事長樂阡表并序汲郡王氏其先河南陽武縣圈亭人避靖康之亂北渡河至汲樂其風土衍沃遂占籍為長樂鄉西晉里人今墟落南原纍纍而阜者葢自肇遷以來丘壠也族衍代深法不可溝合率藁殯兆外時我曽祖府君以大宗子覩其然而歎曰禮當改卜新阡為王氏第二塋明靈其舎諸况責實在我乎於是擇𦵏而東得地於第四疃清溝之北自禰而上三世合羣從凡厝者廿餘竁其紹已絶而力弗逮者率棺衾畢具逺近聚觀莫不欽其孝之至仁之厚也及夫嵗時墓祭先西後東傳於今而不墜百年來墓栢蔚茂蒼烟梨雪光動林陌識者謂君子之澤淵流而未央也時則泰和之末大安初年也迨我有元至元十五年戊寅不肖孫惲由翰林待制授朝列大夫充河北河南道提刑按察副使明年春三月按部而南過家上塚首從二墳以封以饗其東阡則繚以短垣周若干步武復欲發達幽光慨焉莫究訪耆舊則商年俱盡考世德則旌紀寂寥因念天下之物未有無本而立捨祖而豐昵者也然逺則疏疏則不親不親則塗人此世俗之常情也今王氏二百載間丘墓移置者三始焉西晉里再卜白楊疃分白楊而祖西河鄉勢固有當然者彼子孫浸逺吾豈敢必其不源委泮渙枝葉扶疏者哉惟其泝流尋源推末求本明夫當然之理因不得親其親而豐于昵者矣後之來者能以吾言世守而不易雖百世可親也而我祖建遷之義是不可不表見于後曽祖諱經字伯常讀書不仕以仁厚庇一鄉衛人至今以長者稱銘曰族萃蕃理則遷尊而祖獲所安論本根不易存祭先河祖所遵致時祀首逺墳取此法裕後昆繄我曽寔古人仁之厚孝之純西晉里長樂原憶墓栢鎖蒼烟鬱相望見蟬嫣孰不曰王氏阡銘貞石表先德陵谷遷庶可識管勾推公墓碣銘并序公諱德字濟之姓推氏其先相州隆慮人宋季有起身刀筆至州録事㕘軍者以政尚嚴明不畏強禦名大父暨兄金初避仇徙家衛之共城伯祖以掾補縣吏不幸皆早世考復字永亨時在襁褓母李氏貧不能家提之再醮邑醫杜氏及長就傳其術遂以良醫稱公少穎異能紹其家學軒岐雷扁以來書浩博不易究悉研窮機要所得為甚多正大丁亥以方痬兩科中選由醫工補省司管勾公有藴藉以德藝為上官推重生平志存濟物故其詮治疾症未嘗以貧富易心理或未安歸若芒刺在背隠不敢著席初貞佑大兵後比屋疫作與考謀曰今用厄如是我實司命可坐視不救遂大措湯劑厯飲閭里問其乏粥瀋者復以米遺之全活甚衆天興初盜起西山約衆東走汴中塗遇刼賊熟視為公遽放伏前謝曰推君父子曏以藥惠脱我輩命忍以非義加諸餘亦獲免壬辰秋歸隠蘇嶺老者尊其德病者賴以安而少者訪其學然神膏傅痬靈丸起癈醫家者流正有定法而僻隠贅異等疾在方伎所無者公率能一望而知意料而決翕忽死生之變如程氏子得腹痛疾以食毒治而苦愈亟謁公狀聞曰此臟疽也已無及矣程不應公曰後三日當有腐血下而絶及期果然晚節躭翫史籍酣適醪醴浮沈得喪一寓情杯酌間或勸焉曰吾方陶然逰太和之鄉君可去毋呶竟以飲致疾終享年七十有二配桑氏鄉進士彦周之女壼儀母道有承平故家風範生女子三人長適司候張顯仲女鉅家李氏季歸王某後公五年卒夀八秩聓顯等合𦵏古郭里栢門山南原殿士桑君塋西南隅實至元二年二月四日也後十五年春惲按部南下躬奠墓次泫然興感縱羊曇之淚下沾襟時思㒺替終伯道之自遺伊戚為恨何如惟是鑚石紀銘昭告下泉庶幾少有慰焉推為氏厯考姓書不見惟潜夫論載餘推氏出楚之芉姓公豈其苗裔乎銘曰軒岐有書是為内經洞達病機惟明克能於惟我公天禀粹靈靈丸起癈神膏續肱不主故常以意智行推本所自其源淵渟藝精多挾度貨可居髙下其手類夫吏胥繄公處心德度愉愉拯溺救焚已焉是圖相彼陽施宜嗣厥後本支顛兀理莫可究纍纍堂封栢山南元刻銘表公以慰下泉雖髙深兮易位尚知為鄉先生推氏之阡故將仕郎潞州襄垣縣尹李公墓碣銘并序世有風誼之士粹出天禀不俟激昂藹鄉曲之譽稱於士大夫間者李公其人也公諱瑞字天祥其先潞州上黨人系出唐昭武公抱玉之裔五代季逺祖以官家衛公為人慷慨有機警長身鋭目髯糢糊蝟磔酒酣吐氣抵掌談話而英姿颯爽之餘猶隠然溢眉睫間少為縣吏録録無所見正大間恒山公僊提孤軍宿汲連九公聲援君時給事幕府叅軍季公愛其武幹委以赤白嚢事公感其知遇晝則荷戈捍侮于外夕則抱牘上軍務于府殊赳赳然及宜津撤守跳大梁既而京城疫作縱飢民出公倡率流播救死扶羸歸郡延撒吉似悉編為氓者千七百餘口逮乙未春家府一見喜曰此跅弛士也教之當有用遂礲磨砥厲日致其詳謹焉州召為吏主掾數不屑去壬子秋詔以衛六縣為丞相忠武公采地參卿王公來主州治舉能理劇署之典簿領聴其指縱躍如也巨細之務釐補肅叙效其用居多俄薦授録事参軍兼汲邑長將順拊循至有惠愛至元三年總尹陳公以材辟府從事六年積前後勞赤牒授潞州判官棲遲下位德及民為艱故寛簡持大體謙讓睦僚友聴共佐理中多裨益了不露已出至上敬下安惟恐秩竟而去之遽也九年夏予調官晉府過家上冢胙飲水濵話平生甚悉翼曰鷄一鳴送予逺郊外泣且言曰吾老矣不能為升斗禄走形勢途第相見期邈未知復無恙否遂哽噎訣去余亦欷歔乆之且訝其遽如許也其秋以訃来告嗚呼哀哉公事家府執弟子禮三十年始終如一日一别終天𦵏弗逮送弔不及哀銘誄未彰有恨何如嗣子震既礲石墓道百拜来請銘曰無庸固所願也公姿孝悌喜賔客賑貧繼乏雖脫驂指囷略無難色至於排難解紛不自顧藉猶焚溺之在已復能通下情知疾苦姁姁欵欵老安少懐與人接無貴賤禮夷故牛童馬走䀆得其懽心生平備嘗世故小心儉畏以省事為樂有訟來質成公温言理喻曰緩急人時有也其忍以小忿興怨可退思自省既而偕謝曰公長者過不敢復聞又善營構事不為巧飾要以敦鞏延百載上如衛之泮宫潞之儲廩是也初農民發野塚市甓下令禁焉暴委之患遂絶士人牛國瑞聞公義託妻子東逰客死聊城為經紀其家又石其氏者坐事累猝不易辨明索之急投公匿焉竟賴以脱里有喪率匍匐救視孔懐之情踰於兄弟至貧不能舉者棺衾坎壙楄柎之物必具𦵏乃已其周急趨難甚於已私類若此終飲徳不伐閒居灌鑿樹藝麄衣糲食與老農老圃為伍殆将終身焉噫衰俗頺波中矯矯然有古義士風出則智效於官處則行比一鄉可謂不凡者矣士方以夀祉期公一旦暴僨不及中夀為惑豈氣盛亟衰物剛易折推原本自理或亶然然觀義之所在有不亡者存焉異時有帶劔喬林讀予文而興起者未必不拜酹公墳俾配食於縣社也公仕至将仕郎潞州襄垣縣尹命已下卒春秋六十有四實九年壬申七月十九日也配張氏先卒女二人長曰阿醜女甥魏珍次未笄皆繼公没嗣子震實主其喪𦵏汲縣南唐津里清水之南源銘曰太史著書游俠與侉不軌正理匪暴豪邪行而宜之義莫有加李公之先奮跡將家餘烈有光流而義華故俠焉負巨先之氣行焉佩仲由之猳家府與訓化而柔嘉據理施惠如有等差趨人之難甚於已私孤不自存我衣食之貧不喪舉我棺窆之野塚纍纍公助半之夷考其行匪義則那以之蒞官敏而外和絲棼我理瘡痍我摩方百里之命下俄舂者之不歌心則罔單其如命何念公平生涕泗滂沱番番良聲公榮實多泉流西東太行嵯峨我銘刻石等於不磨秋澗集卷五十九欽定四庫全書秋澗集卷六十元王惲撰碣銘
