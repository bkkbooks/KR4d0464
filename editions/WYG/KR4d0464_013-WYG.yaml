front:
  text: 書髙公詞
  hash: sha256:c96c39ed97429a6542de3a7f0149f1386b0464b500b48ec6a3ae0147de10d7ce
body:
  text: 維至元十一年甲戌十月壬子故吏禮部尚書髙公以疾薨於位嗚呼哀哉明年乙亥夏四月丁巳考工使者蔡鉉自相抵晉始知公靈櫬歸葬安陽秋口鄉臨穴者幾萬人僚屬士友㑹哭皆失聲惲辱知最厚嘆斯民之無禄痛知己之難遇自非歌詞無以寓餘哀而露情臆也乃作挽詩三篇表於素旂之末尚冀神靈鑒兹哀悃其詩曰翰學期公淺謨猷冠一時立朝稱極諌連茹愧深知斗舌承天眷風神夢羽儀北揮千字誄悲絶七哀詩一作思公情曷已漳水日東馳風調祥麟士文章太史辭行身無少玷持論有餘師落日孤忠壯秋風兩鬢絲幾行知己淚東望重淋漓聞望羣公表枝撐大厦材印窠空瑞錦風憲黯蘭臺反拭驚麟出云亡動國哀千年遼海鶴華表倘歸來枝撐一作扶持送成耀卿尹邑古仍卿采民屎待尹蘇千年留故事一治聼歌襦鼎鼐調應切山川慘未濡莫辭淹兩考留潤溉焦枯奉題趙侯禹卿東臯林亭雅性便林壑紛華厭市城庭柯交美蔭好鳥變新聲喜見桑麻長誰知寵辱驚門前輪鞅滿一醉共秋成物長同天壤流年遽代更髙臺方畏景喬木已秋聲黙熟盛衰理多忘悔吝情只須都釀酒時與故人傾今年秋穫早臺逈暮登時野徑人歸絶烟林鳥去遲有來飛盖客日課讀書兒適意有如此此外安所期築臺連野色架木繫匏瓜舎外開三徑壺中自一家愛吟歌白紵漉酒脱烏紗更喜南牕下秋風菊半華野逈門開早心閒起自慵林香篘社甕山暝倚吟笻半醉留佳客深耕愛老農晚眠誰復覺墻外月明春趙侯敬愛客每云相見稀不辭髙㑹數但恐賞心違白酒夜來熟黄花香正菲賔僚多暇日無惜過柴扉重謁樓桑昭烈帝廟百里燕南道山河統帝宫荒村仍故里喬木幾秋風簡策經綸在丹青户牖空寥寥千載下無愧孔明公固安道中十月燕南道提封入按巡青霜嚴比雪枯樹老於人尚逺經綸妙須勞撫字頻前林烏鵲盛喧集戀餘春除蝗千杖呼聲急人懷愾敵看日長旗尾困圍促鼓聲乾人與蝗交戰天將雨助殘東林茅屋底客枕夜來安秋日過濟衆僧舎院靜鐘鳴後僧閒暑退初過門無俗客閲古得名書衲潤香留几心清月印疏仲殊襟爽在開口見真如送紫陽歸柳塘千古文章事江河不廢流苦心分正閏書法繼春秋夢繞秦山逺天教闕里遊㑹將洙泗教行復丐西周午憇陽城北龍泉寺倦客鞭催急龍泉一解鞍在家貧亦好行路古來難寺古松杉老山空水石寒萬松亭廢久重拂短碑看碑大定間刺史楊庭秀撰真奇作也簡寄龎雲卿軹井千年邑提封百里侯剖繁人有賴治簡事彌優白鳥翻林表青山滿樹頭訟堂歸去早總是釣詩鈎九日夜燈下即事五十又加三行藏黙自諳去年留薊北今嵗客漳南官事何容了君恩未報慚白頭青鏡裏衰謝百無堪詠史開府宅鶴迢遥華表客吹落故侯家孤潔真仙驥飛鳴稱彩霞困眠依竹石饑啄半蟲沙㑹待秋風舉巢雲養頂砂清苑道中野店春風裏行人避繡衣劍華寒有暈山日慘無輝孤隼捎雲下羣鴉結陣飛驚鷗無逺泛事外本㤀機又作澄清吾有志天意肯從達至元十七年正月十三日巳刻出完州抵暮入保定夜未分雪大作至翼日午刻方止偶得此詩預喜嵗事之有成也曲逆連清苑相㤀兩舎中朝驅塵没馬夕捲雪填空已滌崇隆盡仍歌嵗事豐小紅燈影底一笑覺春融一作誰云吾分薄所向得災凶答蠡州天寧寺英老洒落天寧老攜尊復袖詩逢塲閒作戲來謁老監司白頂憐香土清吟説阿師一盃供客笑聊用當門搥一作枉教頭腦異初下間天彛座中偶得示舜舉舊遊仲賢良醫半載東州客﨑嶇笑自淹事隨時即改老與病相兼發伏遺奸枿搴帷愧具瞻君恩如許報白髮且休添龍門寺寺古僧何在山空石作門碧崖懸瀑影蒼峽掩朝暾不惜山公屐重登謝傅墩一杯須軟脚掃葉煖清尊辭長樂先壠二首己丑嵗秋九月二十六日將赴任福唐拜辭長樂先壠歸宿野竹趙氏田舎且喜聞村之故名因有是作别逺辭先壠歸遲宿近莊客牕疑夜煖野雨變晨涼游宦嗟吾老窮居仰嵗穰故鄉猶足樂誰遣去殊方展墓過農里銜恩使逺方氣隨天北轉人與雁南翔肝膽孤忠在江湖去路長此回當自信不必泥行藏飲食飲食資吾耄行年六十過三升元有料一口不容多過爽心隨滯長嘘氣便和不須移逺步聖藥有東坡辭先壠後臨行作義重煙嵐薄人微使節光桑榆雖晚景事業見炎方回轡知非逺趣裝苦未涼交親留少住馬足健秋霜望舎弟消息憶弟居穰縣嗟予宦建陽三書曽未報一别謾相望喜信占晨鵲清唫夢夜牀殘年能幾許長與汝參商後㑹期初夏遐征動暮秋方吟書𣺌𣺌兩地思悠悠問竹過門巷看雲倚郡樓南遊曽有話㑹上沔陽舟居守縈家累懷歸畏簡書人憐英簜重我覺宦情疎緩進需安信頻呼斫素魚後溪溪上月北望想躊躇送趙克敬任孟州同知趙穆從英妙詩書性所安向為太史屬今作孟津官事辦時為切民恬政貴寛老夫江海去州縣莫辭難蕭相國廟下栗東南陸都城井邑空圖書秦府夢簫鼓漢家宫喬木秋烟慘頽垣野燒紅數鄉供野祭嵗嵗不期同火獵緑竹連罝逺蒼烟散野昏兩傍羅草伴一火趁羣奔徒手遮麛鹿張弓得艾豚縱觀思獵較積柴散燒痕汴堤道中細竹沿堤緑秋烟蔽野蒼路荒經栁子山逺指芒碭勉進心還尼懷歸事詎量縱令空往返猶得看維揚十一月十三日宿濉寧夢總帥史子明見教矯矯常山帥相望間楚齊夢中親與誨身外别無提切囑心何朗臨辭手重攜何時揮老淚墓額拜征西次宿遷望紫山不至河廣舟航小堤長市屋卑宿遷元隔楚淮甸舊連邳濁浪隨清變香粳問客炊紫山前有約底事北來遲淮安州平野淮園甸雙城入楚州喉襟開重地鼓角動邊樓聞雁思鄉信歌魚換劒緱此行安所遇江海任浮鷗是夜驛亭無祗待故有歌魚之句寶應道中共説淮南冷今冬氣陡増雲垂梅野雪風結漕渠冰事弊網常宻吾衰用不能據鞍時自笑休苦直如繩出寶應雪中舟行避冷乗官舸風篷去若奔兩陂雲影黒一片雪花繁景與詩相㑹寒無酒可温泥橋投宿處寒日暮鴉昏髙郵道中二首築甬餘三百彎環䕶漕溝重橋穿寶應一岸入髙郵水陸開亭轉烽烟靜塞愁腰纒無十萬官遣上揚州湖浸通淮水盂城隱楚防百年勞士卒一擲失金湯陸走無闗禁舟行半海商此邦多秀彦國士説秦郎召伯埭謝傅留遺愛千年尚不㤀埭名同召伯郡號屬維揚烟火今中土干戈舊戰場離離平野樹人指是甘棠一作新橋穿市過十里藕花香揚州淮海維揚域金湯勢尚存車書歸一混鯨鰐失孤吞樓鎖行雲夢岡環洗玉盆治安君有策長嘯出東門衢州我歴江南郡凋殘不似衢兩坡稱閙市一炬變荒蕪反側誰無識瘡痍意未蘇殷勤陳别駕不厭拊循劬早發三衢驛開闗放曉裝江風吹帽側山月照衣蒼馬渡浮航水雞號野店霜爛柯聞有局無分躡仙梁州南三十里有天然石梁長約十丈謂之爛柯仙界玉山道中石徑行無盡清溪送馬蹄啾啾啼野鳥滑滑喚多泥松宻増晨黒川斜入望迷比明三十里已過玉山西常山道中晚行土蹬盤黄嶺人家住碧峰焚林人逐獸競渡木為龍水穫無過夏山行不識冬斜陽留絶景不放晚烟烘信州道中控帯谿山嶮襟喉福建門吳音饒鴃舌越鼓聳邊屯岸闊浮航小城卑夕靄昏不煩詢土俗烟嶺互相吞石溪道中赤嶺鉛山界清溪野店橋株林煙漠漠沙路雨瀟瀟馬慣行安險禽幽語弄嬌西山晴更好詩思苦相撩鵝湖寺已丑冬仲望日雨中過此坐間為主僧希聲留題湖頂開鵝沼川形偃法船寺留金粟影僧結草鞋禪地勝多珍木山空響夜泉寺僧談逺跡張本永貞年唐順宗年號閩中錦繡無諸國曽經漢武荒祝融開火宅􅄓母擅風囊淵萃逋逃藪人依虎兕鄉閩中不識雪可有豸冠霜閩清湯池留題熈寧十年八月赴福唐元豐元年九月被召還朝往返皆經此十五日南豐曽鞏題僕以大元至元廿六年巳丑秋按部來閩與令裔孫冲子同事明年秋以理去官與先生往還時月畧同曠世相符有似非偶然者摩挲蘚刻留詩而去重九前四日小子惲序潦倒嗟吾耄淹留近嵗終客星囘海上桂棹發閩中逺宦無遺累歸帆得順風湯池㸔蘚刻往返似南豐建寧北苑北苑繁華歇名猶博望尊野花疑靨珥徑草半蘭蓀軒縣歌鐘暗宫樓峻地存我來凝眺久喬木晚烟昏望嶺谿嶺無千里崎嶇半月間事機須勇退天意許生還順處從多厄趨時免强顔越禽忻我往長路語闗闗鵝湖道中細路山園靜烟蘿野寺濃俯躬升峻嶺仰面看喬松道在從時背才疎防性慵有身官不屬一任老龍鍾是日得臺報故云題何山寶嚴寺壁同遊者山長趙文龍前教授徐夢龍兟友教官余性道二人皆廣信人徐友文筆最健府推官保定張式儀卿别駕東平陳珪國寶子公孺侍行至元庚寅冬十月望日秋澗老人題龜阜西南麓名山世少雙爛柯仙有局絶觀石為矼事去空遺史風恬愛此邦來遊情眷眷留咏寄僧牕喜得陳張友來遊興不孤江山開怪供風月閟清都閲世驚棋局看題倒酒壺暮歸應稛載只欠畫為圖首夏家居即事懶幘從鬅鬢披衣任曳裾多忘身外事貪讀意中書比老心能爾雖貧樂有餘繞園欣細履樹影緑扶疎竹茂資泉潤花榮藉圃沙鈎簾來舞燕鎖樹䕶栖鴉客至留酤酒吟長待煮茶幾時容却掃一向似仙家方竹杖節勁嫌圜甚形方與衆殊任從炎漢斷不變魯人觚心曠謙中守姿堅直外扶蜀笻非我友釐簡是吾徒枯燈花步入東瀛丈吟看北檻花春風收翠葉烈景發炎葩一氣元無間孤根乃爾差鄭箋初不及党咏只空誇送杜僉事之任江西憶在齊州日同聨憲府鑣郡居推健羡孤繋更迢遙此去雖殊域規為祗舊條將身能道䕶所至儘風標和幹臣重九日雨中醉歸韻髙㑹有成約寧為一雨妨烹雞酌白酒煮芋嗅秋香落帽同嘉興霑寒等陛郎醉歸從健到聊復少年狂今嵗登髙節佳招兩有妨閉門時隱几掃地靜焚香安得黄金酎同傾白首郎醉鄉多樂事何祗發詩狂事一作地舎弟仲畧題孫鞬郎名字説後訓汝諄諄意奇文見迺翁洞堅威可大栖鵠體須中既應開先兆當知矯揉功逺期遺近效羽夾看摩空贈欒子英詩子英外郎孝亷士也十年前子與共事於沙麓者凡兩月今嵗秋將命過衡踵門來謁話間因及親䘮事予以伏臘一氣遇之者固然其殁而不壞及膚髮猶生如欒氏二親者蓋亦罕見豈迺翁與媪生有所積而殁有以孝心之所感者然邪乞言顯親書此為贈其辭曰孝感元多異欒翁見化形初終神不昧將袝面猶生盡謝青蠅吊堪書翠琰銘百年風樹底腸斷蓼莪情贈岳鍊師仲和今年八十四健勝去年時豈假還丹力沉潜繕性辭骨清儀野鶴神爽見毫眉更有虚明處物來多預知月桂花名誰品藻嵗與月華新不屬孤根細能留四季春子深丹竈術葉映碧苔裀我近雕欄側終朝倚杖頻賦白鷴羽族幽閒品霜毛縷黒章聳冠矜耿介盖因栖止不雜于衆禽也顧影惜飛翔去備虞人貢行觀上國光刷毛琪樹底無夢海山蒼京華舊俗嵗終廿四日諸神上界夜家人設祭遣奠致詞且有遏過揚善之囑遂作小詩庶見風物五祀開三代人間閲嵗華交更同選調遣奠具餳茶天闊神驂馭燈青喜結花逢新如有問萬一善相誇和曲山冬夜即事韻二首清苦周南樂居官素有聲老天抑汝困公道欲誰明瓶罄憐三白衾寒盼五更捋鬚疇賞識吟苦撚霜莖雪夜清無寐瓶笙細有聲茶鐺吟待熟虚室白生明白髮催人老青陽廹嵗更湛恩盤露重何意望修莖春酧舎弟仲畧見寄之什隔闊三年别囘還萬里程細吟違逺句深見友于情路𣺌霜風勁吾衰體履平家貧渠亦老一動不為輕挽宋耀州漢臣二首每有遊秦士慇懃問宋侯相望無兩紀一别便千秋斗酒新豐客堂封渭水丘題詩何限恨老淚不成流斗酒新豐客龍門接上遊相望纔兩紀一夢便千秋銘德辭無愧親民政最優兩行知已淚撫卷為君流辛卯嵗十二月望日大雪連明信宿開霽日色暄妍如春乾坤漬淑之氣肅肅可挹數年來未之見也作小詩以紀我覺今冬氣全闗燮理權一寒嚴往嵗三白見豐年地掩浮陽靜天開麗景妍不應薪米價愁計畫义錢五加皮酒服食閩中士加皮説異常精華含五氣補益最多方不羨黄金載長澆白玊觴豈惟除濕痺志意日安强題杜氏六子名後六子名三老餘芳見故家翰音鳴彩鳳翠茁映蘭芽出拜濟南日今看漳水涯一謙能事畢題咏復何加燭花詩李真人索賦燦燦銀臺燭清光散彩霞誰分壺内景來種火中花一轉芝垂蓋孤芳蕙茁芽殘年如喜合世事任無涯火鑵兩手寒來瘃摩抄負汝温形骸雖土物氣勢炙權門燕玊休誇暖湯婆可比尊心兵全不起留在谷神存題甘河遇仙詩卷恍惚甘河遇生龜脱殻時二仙形姓字一酌晤天􅂜入道兹𤣥竅尋源接上池崞山文最雅畧不見䛕辭和仲常牡丹詩并序仲常良友氣温而德雅余愛之重之未有擬之形容爰因賦咏遂見賡歌故情之所鍾有不嫌於太切者其詞曰漢殿承恩早金盤薦露新色酣中省藥香重錦窠春儘殿羣芳後誰辭載酒頻清如司馬相也作插花人題郝氏世德碑後故國非喬木雄藩有世臣河山盟帯礪勲業畫麒麟白羽沉蛟匣青雲滿後塵雅歌平日事遺愛在斯民草昧經綸際恩威見郝侯功成韜將略徳洽配汾流金甲春農野黄雲畫角秋哀榮何百世千古仰山丘八月十二日夜病不能寐步月達曙官事未易了癡兒昧獨勞病多和夢異蛩若為秋號事業青燈苦星河紫極髙帝城人海裏汎汎一漁舠大行皇帝挽辭八首至元三十一年嵗次甲午正月廿二日癸酉夜亥刻帝崩於大内紫檀殿既殮殯于蕭墻之帳殿從國禮也越三日乙亥寅刻靈駕發引由建徳門出次近郊北苑有頃祖奠畢百官長號而退臣惲職在詞館追思不已作挽辭八章庶幾鼎湖攀髯之意其辭曰灤水龍飛日長楊羽獵時天顔凡五見雨淚遽雙垂化日中天赫陰靈萬國馳何由知帝力耕鑿樂雍熈晏駕纔經宿幬車出建門千官紛雨淚六御迅龍奔雲氣蒼梧逺天山禹穴昏依光瞻日月頌徳象乾坤威破羣雄膽恩藏四海心聲明三五盛垂拱九重深國論多儒斷天機入睿臨小臣剺面血無路洒松林聖神由廣運纂述到無加禹甸逾輸廣殷邦極靖嘉尊臨三紀久遽陟九天遐白首金鑾舊長號自倍嗟端月辰臨酉淵衷弗寤興紫垣逢彗孛杞國駭天崩法從嗟何及朝臣痛不勝聖靈知在上春草認封陵去嵗囘鑾輅旌旄擁萬靈今春辭畫翣弓劒閟泉扄黼扆虚瓊島雲龍慘帝庭是夜殿庭有光若燈燭然良久方散詞臣思補報淚溼簡編青論治方堯禹求賢到釣耕民區無二上廟算有竒兵萬㝢風烟靜中天日月明小臣思頌德終了是難名帝系三宗上麟經一統尊火盤承正據虎落入雄吞窮蹵南交獸奔騰北海鯤不教擒一索遺恨付皇孫題冀州馬同知拜慶詩卷矍鑠征南將忠勤為國知任官無調轉享壽到期頣錦爛行春里香生拜慶詩眼前蘭與玊又見福生基秋日下直玊堂下直玉堂廬閒拖過市車秋風殘暑候積雨暮涼初撥置難行事尋看未見書萬縁前巳定不樂復何如餞安南國王弟囘鄂渚萬里朝天道歸軒寓武昌觀光吳季札助順漢閩王寵渥心逾赤新詩桂有香庾樓囘首處秋月興尤長雪夜聞鐘元貞元年冬無雪十一月廿一日夜大雪喜而作此雪屋燈青夕疎鐘定夜鳴撞餘周逺韻聽久喜雙清爐火留孤坐茶鐺待一烹已眠猶未寐詩向枕邊成王氏拜慶詩并序集賢大學士王顒太夫人張氏元貞丙申夀八十有八視聽聰明起居康健剪製纂組之事老猶能工正月十四日蓋生辰也中書右丞張公以外堂拜禮義重諸人前期誕彌啟之太母特召見宫閤存問再四嘉其賢淑留讌賜幣下暨二孫皆霑寵渥明日翰林諸君相與奉觴上夀百拜獻詩猥當卷首九秩康寧夀親承燕賜恩香融彤管煒春滿繡輿温世與名郎孝天全五福尊佩環聲合度清響徹宫門賈仲和慶八秩君前宋魏國文元公遠裔其家世備見遺山所撰千秋後録太史徴文獻陰功滿諌章諸孫宜曼衍八秩見康强孝義聞東魯簮纓慶北堂千秋遺録後弈葉又生光慶閻庭直夀母詩洗髓黄眉夀儀尊五福全雍容班母訓瀟洒謝庭仙致樂孫能養居官子更賢霑恩行有日香重誥鸞牋送喬元明疆理初無外乾坤大統齊漢恩同一視星鳥望中低海甸沉銅鼓天書坼紫泥皇威能逺暢歸斾拂雲霓榕樹南來過劒府嶺岸樹多榕繳結如蛇蚓堅凝比柏松葉芽生挺茂陰影散芳濃鶯羽羣飛日凋零却是冬五言絶句贈髙邑趙教諭坐久槐花落黄金滿石牀一林春露冷情話不知長冬藏和曲山詠懐原韵吾道有汚隆人情逐冷暖自憐心事佳不覺天機淺一作克教俗意無任使天機淺貧居固鮮歡漏盡行當止只有苦吟心時時為商起巨鈎釣鮮鱗其勢兩難著何當掩長圍為君獵麟脚却掃吾未能人事日復日泛愛聖所稱亦復論損益才疎詩倦吟年老酒當止君看古井波澄湛自不起安坐此心與天游老我無繫著炕頭有春温安坐收兩脚讀史紛紛世利塗翳翳桑榆日賢哉向長心一損勝三益咏梅折來何處梅自掇孤根暖寒花本強顔風味空不淺己亥嵗門帖子不羨陶朱富非悲阮籍窮愛君思道泰憂國願年豐跋吕友扇頭井道養不窮濟人非望報過飲投青錢取亷非正道秋雲自激行雲映空明媕娿飛輕縠風吹不成雨日落空相逐夢中得燈殘細暈黄月落孤忩白惡夢不成眠幽魂驚撇捩望淮朝日慘無色昏昏水氣間到淮猶數里隔岸見尖山夏夜庭竹影扶疎清風晚騷屑夜涼人未眠卧看牕間月出門東風吹陰霾朝來晴霽開放眼門前去青山城際來雨後看山西山色蒼蒼雨後如新沐天髙晴意寛歸雲滿巖谷夢中得持酒濯利劒青蛇光黯然金鞭鞭駿馬汗血粘錦韉喜雨癸丑六月旱草木變萎黄夜來聞雨落起舞亂登牀秋夜西風入庭樹掩冉衆葉鳴幽人不能寐愛此秋雨聲中秋制中對月露冷庭梧墜天髙月影長清光不堪掇和淚溼衣裳披襟凉風東北來蕩盡中夜熱起視河漢星㣲雲淡明滅秋澗集卷十三欽定四庫全書秋澗集卷十四元王惲撰
