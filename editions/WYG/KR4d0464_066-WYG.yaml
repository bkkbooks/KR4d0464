body:
  text: 憲司箴肅肅憲司虞夏九牧其在漢唐刺史都督控臨百城靡不約束既重其權匪輕所責治𢎞務簡望隆威赫有臺閣清嚴無州郡急迫繡衣四出輶軒金節命服有彰非爾徒設奉宣詔條巡省按決官之邪正政之得失酌汝之言以明黜陟俗之媺惡民之休慼恃汝注措以安以息國有重典越惟刑辟圜土幽囚肺石寃抑仰汝審察哀矜致恤毫髪或差追悔何及剛不可憚憚則氣怫弱不可欺欺則衆忽事無避難避之愈集法毋情破破之有窒何以處之必正必式一有私萌力為之克如松斯貞如鷙斯擊其嚴秋霜其平砥石是乃所云邦之司直我玉無瑕彼疵可録志行氣伸吏畏民服一道清寜乃稱所屬其或暗夫大體苛細是燭較利害之孰多至首尾之畏蹜甘於慵身計日而禄官謗奚逭顔厚有忸爰作斯箴敢告司僕言箴語戒過繁論先期用我之樞機寜唯妄動動躁輕易違理取勝過慮思邪皆言之病一不知檢有害於性審察安詳時然後應非法不言一出於正其或不然自䧟於穽念之念之忍箴忍之為字以刃加心少或弗隠其傷必深家府維訓挺挺而全謂予平生半在官聯萬變前陳履薄臨淵少觸與競其心即燃自救弗暇理何有焉量汝之性以忍為先惟忍則濟欽哉聖言銘楷杖銘并引孔林之木瓌異者為多魯人世不知其名者葢夫子没弟子各持其方之木來樹焉在枌柞毚檀中名殊顯者獨文楷耳前朝斵之板持以備新進之儀豈思其人重其文敬其手植之意也歟紫陽公攜二杖過衛一以贈予因識其楷之所以為楷也如是吁昔而簡今而杖用雖不同至於重其文敬其手植之意一也銘曰體堅而微色正則瑩庚庚其文挺挺其性本根傳萬世之芳枝葉蔭百王之聖斵而杖之以扶吾道之衰兮庶由乎義路之正且予年之方盛是不可施於其鄉兮復將斃蛇妖於異日于以叩原壌之脛惟桑與梓必恭且敬矧吾家之草木敢不同甘棠而加愛兮故賡之以舞雩之詠檳榔杖銘體堅而柔節促而澤赤藤桃竹非所狎兮青蛇奮蟄腹紋鱗鱗入手滑兮質挺炎徳出入有聲豈特鏗爪甲兮堂堂許公國喉舌兮杖而登朝表孤節兮是將代太尉之笏擊奸慝於未孽也芝枕銘并引予觀神農氏之經芝之種有五焉紅者如珊瑚青者如翠羽黄者如紫金白者如截肪黒者如澤漆皆光明洞徹如氷之堅五岳之山産焉後之以芝名者率若是豈栁栁州所謂天澤餘潤雖枯枿敗腐猶能幻出芝菌以為瑞物是枕之芝或間産名山或蒸出枯枿予不得而知也但不斤不斵底平面傾犀文外繞疊成枕形誠可以薦牀笫而承幽人之憇息也銘曰體似重而輕性似柔而剛豈顛木之餘枿薦幽人之野牀質似芝而秀文似犀而光果齋房之瑞氣化竒形而不忘但髣髴兮一枕之妙至於為芝為菌吾不知其物化之常秀比連葉清凝寝香枕或强名用適則良俾欹之藉之勿邪其所思兮是可以夢周公而接羲皇也砥柱銘水之為力無物不從津門之險壮夫砥之為雄洪濤西來萬夫前攻而戰而薄我當其衝狂瀾勢倒安流而東屹嵩華之隆崇也吾儕小人弱植淺中衰俗外誘羣邪内訌苟内省而不疚有碇心而直吾躬也金銀沙二泉銘山之清潤澤氣以通兮坤之靈秀醴泉以發兮太行蟠亘元陽所軋兮天門左界二泉並窣出兮巨鼇背鑿寶藏泄兮靈淵奫淪海眼徹兮泓澄一碧金瓊屑兮金流石爍爽氷雪兮雲煙藉潤為改色兮酌而瀹茗甘冷冽兮挹之薦帝明水潔兮淋漓膏液補天缺兮女媧鍊石用不竭兮夸娥弛擔濯困暍兮七賢尋盟沈醉達兮幽響傳谷鏘瓊玦兮山空月落仙人掲兮闕生肥悟真訣兮我銘勒石泉不涸兮端石硯銘硯之同功甲與鋋試之敵塲惟利堅其或不爾安用焉嗚呼此硯雩而圓神黿足跧舌有泉既利我頴墨且便青州絳州何所賢題品入格因公權處士或託斯銘傳黙齋銘語寂滅者涉於絶類談自然者入於虚無嗚呼黙乎其天地閉賢人隠括嚢无咎无譽者與至於明良相遇治具畢張一言而可以興除者如宣父夾谷之盟孔明隆中之論兹吾儒之事也豈得退藏於黙乎豈得退藏於黙乎閑邪齋銘噫嘻是心既岌而放内閧外膠靡不馳嚮忘返從流于焉板蕩維禮與義以戒以懼存之以誠為閑之具有人于斯言動聴視庸信庸謹造次於是成徳雖中慮萌邪侈一念或非為奸所餌易演文言閑之義宣一聖精心權輿於乾譬海乘載一碇能安如馬泛駕受羈則旋險去而夷浪平斯淵彼碇與勒曷能舎旃何似李侯周防未然操心知要惕焉拳拳言信行謹其殆庶幾一誠存中太山可移素志不昧聖賢同歸洮石硯銘吁爾洮水中沚翠欲流礪於砥考之譜端歙齒波及余古月子斵而泓堅澤玼孰為尸王御史瑇瑁龜洗銘毉月槃漢洗噐制爾形從相類漢維魚我龜賁取彼夀綰元氣宜子孫傳後裔銘者誰王子系訥齋銘堪輿两間事變靡極成始要終非言莫立𤣥聖垂教訥言為先匪曰終黙時然後言喋喋利口返為事愆覆邦亂家身溺于淵猗嗟郜君内思靖顓一訥銘齋浩浩其天人亡道存實大其傳尚來者而恪守猶丹書與湯盤也文貞公笏銘呈竇學士公家物唐有天下垂三百年於粲者貞觀之治焉其效盖仁義之一言世之望公三辰在天是則公之徳何俟笏而賢耶銘存物亡實大其傳則是樵之文伊笏之曾𤣥也猗歟竇公國老之元神物有歸寶之几筵安知無望壠而求後因甘棠而思邵伯於燕者耶仙臺金跡硯銘為宋少卿𢎞道作盤盤嘯臺一碧千尺湛月露以洗空隠松風之蕭瑟仙㳺何之留此真跡斵而硯之是將晦靈蹤於翕欻藉𤣥雲而掩抑神物有歸蘭臺之客㑹登玉清蕩空碧斗挹滄溟醉慿鼇極拂海苔之霞牋揮仙火之巨筆也楮都䕶銘漢開西域國三十六中置都䕶控制約束强凌弱折迺有攸屬我嗜羣經視為席珍繙閲不時未免絲棼亦作䕶府仰兹楮君統之有要無相奪倫侵損日逺緝熈日新揷架安書曰史曰墳勒銘于上策燕然勛太湖峯銘丁生贈余湖峯一株頂足背面蒼鱗隠隠渾然天成無微竇可隙植立几案間殆與頎頎君子相對殊可翫也昔元舂陵作榱溪杯樽等銘命名既異垂戒又深予嘗讀而愛之因銘兹石仍掇其義片石何状天然自若鱗鱗蒼窩背露蛟鰐一氣渾淪略無巖壑太湖凝精示我以朴我思古人真風𦕈邈變詐百出孰知誠確心深洞府混沌六鑿剛徤篤實君子之質惟其似之是用比徳嗚呼安得誠天下之意如兹石之挺特也書厨銘至元十七年八月三日夜與子孺燈下觀丹書銘因擬而作此置之於室胡若載之腹也名汝曰厨以其無不蓄也腹至於餒返為汝所忸也子其戒之惟朂鸚鵡啄金桃研銘大名劉總尹求予作忍濟堂銘奉此研見謝翠鸚啄桃翩欲飛去棲影片洮以慧之故芸閣風簾疑若與晤助彩毫端辯夫詞語槌黄鶴而倒芳洲賡正平之賦邪復明辟而以夢諌草梁公之疏也菊井銘余到官两月移居司西官舎治舊井而新之方衆菊爛然擇其佳者植諸欄傍因銘之曰菊井其辭曰養而不窮者井之徳也服而能夀者菊之靈也我潔斯井罔羸其缾彼窈然而深泓然而澄葢南山之餘溢迺濟清而未名思欲沉浸醲郁皆菊之馨庶幾西河南陽之意仁吾民而制頺齡也冬藏圖右銘太極中分有靜有動氣與理錯未免交閧孰盡聖哲不思而中思而或邪奚翅荒縱理明伊何精一為重閑邪存誠發而可衷内莊全體外致吾用旦也奚思尹則孰覺一洗妄心盡易前錯學孔之學樂顔之樂華去實存玉礱石斵道最中害或輟或作不學而衰即成枯落念至于兹立敢不卓靳惜分陰守之以恪敬入為門補我不足足豈三餘日新一日動静云為是為之則敢告靈臺服之無斁左箴其目曰定力以固窮為冬藏圖作天運循環有泰有否人生其間迺一氣類乏財曰困弗通為塞苟遇不安習坎而阨自昔君子噐藏俟時出門有礙吾將安之仲由愠見阮籍窮哭惟昧困理于臲于卼安之有道説不徒泛堅我定力不容少濫氣養以剛志明由澹少焉堕昏亟為澄湛衣敝服緼一温而止飯糗茹蔬一飽而己茫茫厄臺悠悠羑里文明為夷孔玉櫝毁聖賢猶然况弗至此我道未亨克念終始敬義齋銘維天生民畀之者全氣有澄滓因之以偏惟聖立極俾復其天困而弗學民斯為下甘彼顓䝉時有不暇間有知悔或窺厥竅遺緒茫茫又昧其要大哉文言聖學之宗致力兼補䝉而聖功一敬内主義須外克凡百君子有云有為行而宜之心宰物随秪直而莊匪方於動事物之來未免變閧惟其夾持務成徳尊既銘吾心復書我紳始終是則日新又新垂龍圖銘所翁姓陳氏福州人嗜飲恬於仕宦善圖龍見知於宋理宗嘗以商舶越海與真竜遇自是盡其情狀其作也必乗醉潑墨為之天機所到非學而能殆邈㮶之噀墨法云醉墨翻雲族聚所翁圖竜與真遇黒風吹海作太陰大火出山雷奮豫是將執雨機而飛天儘滂沱而洗吳楚宿雲軒銘并序吾友中丞王君買宅蘇門得竒石一峯厥狀如雲靄然輝􅀢於庭户間甚可愛也因名其軒曰宿雲徵文於余乃以是文表之其辭曰睠此峯雲態度容與觸石而生與石為伍宛彼南山宿我庭宇主人名軒其義安取是將停靄靄之容為思友之故邪伴東山之卧抱濟時之雨也雲兮雲兮出两者之間固無心兮其從竜也須以時兮吾豈欲度之以自潔徒為怡恱而已邪水晶筆格銘玉瑩氷清太陽之精孰琢肖山之形鎮我几案虚白夜生息我矛矟摩壘之聲空明洞徹爛氷峯之孤撑物有形似吁足可驚若倚之而固寵旭日已升恐潰釋而摧崩也頥軒銘為洪同簽作堪輿两間物所充兮而長而養一氣融兮人惟法天浩焉同兮頥以象觀四陰内訌惟養之以中正不我舎而彼從是以得終吉而在躬洪公孕秀海山沉雄其材足以經制其量足以含𢎞賛翊樞務既貞且忠故謀謨應事機之㑹談笑折尊爼之衝不恃全美方致養以為功果我枵腹以正以中虎耽其視而始而終見寒思煦恐邊衣之未備寸膚失養念一士之或癃扁吾軒而匪外餙起居飲食在日用常行之中吾將養已以及物致事業於無窮是知大易迺萬世之龜鑑尚何俟授一編於圯上之翁也愛菊堂銘草木之品色中氣清有隠逸之稱唯菊為能含精益齡晚而芳馨又類夫君子退譲而不争圯橋老仙友而堂名雖墮履之弗進亦足以卜幽人之永貞華構傳芳三世相仍其孺慕也孝凝然心深而愛中樂不勝口欲言而不能自鳴者此郭氏之所以尋盟也若夫平泉草木固䕶封植亦充厥承是或一道終未極愛之之至情親存親没觀志視行曰如其道終身是程嗚呼郭君至性愉色豈得於尹氏者拳拳而服膺吾今取為銘以告草堂之靈安知不入戸聞愾然之聲也邪虹霓硯銘并序趙太博彦伯出示紫石大方硯請銘余以石有竒雲類虹霓然因以字之銘曰蒼梧雲蒸九疑溼碧海風濤翻出日江山通秀鬱紫煙産此珍材比玉徳金繩繞腹泄精英電激神光掣蛟室雌霓㫁影飲丹池暮雨連蜷一千尺虢泥鄴瓦稱善墨石中乃有此竒質子墨客卿尤所惜大率縱横供夢筆左招恊律揖孫通出入英莖五音飭楊氏雕玉寶章銘并序故參政楊公之子朂家藏漢雕玉印章二方者丞相吉圓者太尉震也其愽陽章即乃祖息軒所傳故物大定十二年崔憲可詩序云長安許惟寧以是傳秘自米家船入手摩挲三嘆息趍君文彩珊瑚鈎禮樂監畫于闃花驄圖得之嗚呼二公以通明正直師表两漢今去千餘載其風烈凛然思其人而不得覩物增嘅乃為作銘士桓愽雅好古今為集賢直學士庶幾能紹其家風者漢丞相愽陽矦丙吉印銘吁寶章纔寸許紐𤣥龜綰漢組𨽻為刻見邈祖神物䕶照千古此何夕得摩汝恍坐我丞相府初望氣郡邸圄詔夜殱拒户樞是雖天公可無偃栁興將舊圖乳褓恩其可孤獄有牘秘不舒是章緘金縢如歸有數子與俱什襲藏无太踰防有光夜衝閭六丁取嫓貞符在愽陽宜特書漢太尉司徒楊震印銘伊𢎞農漢巨儒道自任聖為徒主鱣堂閱羣書表氏諱兹為符位台鼎綰國樞赫漢炎走羣貙堂堂氣忠義軀四知金厲貪夫殆是章玉不渝内寵横哲人殂與雀環瘞幽墟見白日歸子裕世失系紛莫區伊莘楊豈公莩苟不爾胡為乎致大鳥止丘隅淚如雨洗寃誣佩之行可舎諸我作銘此嘻嘘張指揮甘白堂銘我識先帥于清之野緩帶輕裘投壺歌雅伊時張君侍立親傍虎豹在穴己炳其章及將羽林肯構其堂榜以甘白于先有光試嘗聽其言論諒天姿之殊常是將調和衆味羮傳鼎之美邪彰施五彩絺上公之裳邪噫吾說已竟必一居於此恐徳業之未易量也忍濟齋銘改作為楊子英題多變而莫測者事機淺深殊跡而難度者人心善惡我㨿事㑹忤激交作彼以機成客氣外鑠或當懲而乃忿可理遣而反愕隘不自容事安能若因小端而致大亂又奚翅九州之鐵而鑄一錯也理貴含𢎞量崇濩落功若與即是心先怍言不可出我舌為齚故堅伺桓門者收康濟之功俛出胯下者辦戡定之畧冝成王之戒君陳見周書之噩噩海印奎星研銘宋祕監𢎞道索賦詩被東宫㫖編節世宗實録奎麗空文之宗秀孕石與歙逢礲而研以類從海有瀾穹浮蓋印天光終古在拱前星問有待霮𤣥雲集毫彩酌前言作帝誡歙石璧研銘并序至元癸未嵗正月二日謁左山先生坐間出兹硯示客僕以形質異常略狀􅂾語公喜甚曰汝言殊有契予心者吾子其為我銘之銘曰玉徳而金聲縠紋而紺理湛兮虚見明生於旁魄恍兮惚疑璧投於山鬼𤣥雲横馭風生燕几顯諸用起經綸於心上發餘輝綰秋蛇於筆底是則公事業之美也我將静濯碧空洞徹表裏觀春雨之散絲似商霖之復起也醉仙石銘為韓通甫作爬沙蟇縁蹣跚鼈跛化而醉仙蓬首不裹傾欹落魄對客程裸惟不適用得脱秦火黯桂樹之秋香普故宫之青鎖推堕人間無可不可頑碧凝蒼肩袖垂嚲留賔筵而盡餘歡每蹲蹲而舞我也殷乳鼎銘并序韓生𢎞以瓦鼎示予制極古而可愛余曰此從何而得曰得之於帝辛之故墟然不知其為何制也余曰此殷之乳鼎也即為之銘曰惟殷墟廢己久代所居止野叟殁而𦵏此何有其為物故商埴千年後見白日乳至四冝蟄蟄萬有生皆此出取為形穀瑑璧嫓龍觚飲而食秋澗銘渾沌鑿韓生藏深夜壑後來者見必作賛老人星賛月帔雲衣金支翠旂御星騑而淩沆瀣騰淵耀而表明時爛祥光於萬丈湛南海之清輝我見我出為瑞為禧厯朱方而朝北極祝皇夀之無期何南山之鞏固等旻天而峻齊然後廓夀域兮無際挈斯民而溥躋倚盖霏霏蒼茫曷歸貝闕珠宫羣仙與嬉歌東皇而逺引随升降而入氣機但天容海色𣺌不可以涯涘兮䀭朝日之重暉先君思淵子畫像賛徳之厚其所受也全學之博其所守也専游刃恢恢利周物先占氣斗間世之龍泉卒之臨大事以益辦曽何以惠文而為賢望之儼然即之温然治之隆汚持衡以權一言吏師世真可痊孰謂神而化之之妙託丹青而可傳耶王内翰冩真賛總管蕭君出示承㫖内翰冩真木庵師題賛其上似有所未盡者因為之賛云充氣之粹兮與材無忤靈襟之廓兮以道為腴延譽在龍門之上視草冠玉堂之廬其及物則見百里之寄其託輔則可六尺之孤天步改玉婆娑两都悵蒼蒼之秋色鬰喬松而未枯尚能賔扶桑之出日振人文於燼餘見之丹青清風穆如人徒知百年之遺老我以謂中朝之鉅儒彼晬然而容盎然而春見於眉睫之間者固非山澤之臞也耶鮮于純叔冩真賛遙遙華胄世藹令聞沇水之集其源奫淪老成雖逺而典刑今見于斯人髯踈而秀心吉而仁藤白而冠紗烏其巾豈見夫身外之身予但知仁者之必夀其風姿落落百嵗猶畫中之真也麟匜賛噏嬴匜脹豕腹背負厥角挺竒骨列泰階職盥滌今歸于我研與匹薊門市南冬日得滄溟之波浩無極挹彼注兹泚我筆姦枿誅絶旌直徳子孫寶傳金玉式桑泉老人畫像賛徳與學専行為世傳是之謂有年雙瞳炯然蒼髯㦸然人目曰山澤之仙庸鉅知抱長孺之直甘骯髒於門邊者耶范文正公畫像賛堂堂范公三代之佐致君澤民盡夫在我曰義與仁經綸之具篤信力行曽不易慮受知裕陵千載一遇其施幾何貞我百度狺狺羣言激公而去天下之事匪材莫為遭時富材中靳固之治止斯耶由數竒耶再拜公像涕洟咨嗟乖崖公真賛堂堂益州元精之傑用智馭權以氣逹節在徳克剛得吏之訣其捄時也若乖崖而極經綸其擿姦也不鉤距而洞窟穴噫太華之雲清淮之月豈無閒心大厦火爇較以出處此兼善而彼獨潔冝公平生日新事業皂裘褐衣有將之威我拜公像清風凛而悠悠九原愛莫起之吕仙翁真賛金道陵祕府物今為王簽省家藏元精貫中老不息先生煉形與之一氣機出入我所乗世間甲子管不得有時變現稱劔客三江五湖風袖碧江雲紅爛岳陽樓醉飛星馭鞭金虯騎驢歘上長安道來看西風渭水秋古人事業垂不朽八表神㳺欲誰友乾坤况復一洪爐萬古消沉竟何有先生遺照滿人間己是真詮不死傳只須袖裏青蛇氣夜夜人驚在斗邉駮華􅔕圖賛并序馬之有駮猶人表之異常也昔骨利幹貢馬百匹中有駮者太宗愛之親為製名曰決波騟又秦胡公有乗馬號忽雷駮此馬毛質特異豈骨利之遺種歟故供奉官圖形以獻見方物一峕之盛云吁神騟骨相殊振蒼雲散華軀供帝閑馭虬鬚厯八極塊清都非所覬三品芻有物制噤不舒絡青絲伍髯奴終奮鬛躍天衢君無癡兹畫圖填星神像賛坤元之精積而上曜厚載之徳至静而妙爛然黄明有嵗之兆僧繇像之其神杳杳冠著牛首類其順也手綰方玦取乎填也非夫知鬼神之情狀者何以測其奥隠也二十四大儒賛并序堯舜之道得孔子而後明六經之㫖俟諸子而後發逮秦火燔蕩先王之迹一向熄滅而天理之在人心者何嘗有一息之間斷哉漢興諸儒挺出如董生劉向孔安國毛萇楊雄號稱鴻碩斯皆摘奎之光發輝孔壁探聖之幾取訂口傳致興學立官文風彬彬可謂盛矣然六經之㫖有師授而無傳著東漢己來師說並行馬鄭賈何服虔王肅之流網羅衆說正誤刋繁流藻箋注復使聖道粲然如大明當空蔑不耿昭以之斷國論建民極有不可斯須離者至唐踵七代之衰理雜文弊道統益微及韓愈氏出以道濟自任隄障末流廓清義路盖皇皇如也故大儒位置終之以昌黎伯者良以此歟若夫闕三才彌綸元化前世比闕圖像列配神庭闕為不刋之闕至元癸未冬十月齊府廟宫两廡繪事告成閽明靈儼然如在爰作賛文昭掲於上庶幾乾端坤倪軒豁呈露聳齊人之敬為邦家之光也左丘明麟經垂憲百王是懲素臣筆傳日星益明文開史統世咀華英儷景同翻永播休聲榖梁赤封襲丘伯聖道羣用見有深淺赤也明經辭清義婉漢儒推轂大開學館繼我國政論益光顯公羊髙封臨淄化麟出魯郊筆終史削公一再傳若聆徇鐸冝其資深裁辯辭諤折衷羣疑匪斯孰託苟卿封蘭陵伯金聲絶響詭辯縱横蘭陵著書吐辭為經憤彼譎變欺世迷民性惡之說有激而云伏勝封乗氏伯秦火驪坑儒厄斯極天不没公俾副孔壁渾灝之義垂範後王賴公口授帝道復光照耀齊國文奎煌煌毛萇封樂夀伯風雅三百一歸無邪絃歌音𦕈孰為傳耶温温樂夀漢初名家訓傳首出遂正而葩敦厚之風永煽幽遐髙堂生漢愽士封萊蕪伯秦尚法制禮喪無幾雝雝堂生當炎之始議定官儀國容有頠㑹弁澤宫赤舄几几孔安國封曲阜伯書出漢初壁傳口授古𨽻未分詎免訛漏天開聖孫以傳以定帝制復明翼我國政戴勝封楚丘伯曲臺傳經有千其儀戴君發揮其詳可知履之則貴悖焉來違煌煌天序相我民彛劉向封彭城伯彬彬中壘帝胄惟英授經草諌力扶漢傾已志伊鬰聖學崇明鷩冕𤣥端山立神庭楊雄封成都伯有漢鴻儒述作之賢體易之妙衍夫太𤣥映聖之心繼成法言大醇小疵其然豈然惟寂惟寞天禄之閣出處两間其何以怍何休封任城伯髙也傳經心深而文秦漢而下莫闚其門任城解詁堅守如墨開户兔脱破碎陣敵馶我漢事㑹歸其極鄭衆封中牟伯喧啾梁門師也威鳳志棲阿閣學明三統皇皇使華漢鼎取重諒夫通材中藏大用馬融封扶風伯扶風氣豪愽精羣集賢如鄭賈執經在席暢我休風彬彬文質尚想絃歌漢南之國盧植封良鄉伯海山沉雄精貫斗極篤生大儒文武之特以道事君以經翼國劔佩赫然氣掩羣慝鄭𤣥封髙宻伯秦燔六經天理曽熄漢興諸儒臆說雜出司均網羅刋繁正誤箋注皇皇流藻終古服虔封滎陽伯卓越九江清介不羣雅材文論為世所珍任城巨敵左氏忠臣光簉漢彦蔚乎其聞賈逵封岐陽伯偉哉侍中好問而愽通明四經大肆厥作綱維國論張皇帝學東觀石渠光寵於爍杜子春封緱氏伯周官大典興王之迹制古辭約我解我釋入海穿深薄霄透碧品物詳明千載是式范寗封新野伯藻發儒林學淹墳籍嫉世浮虚著論詣實盤盤學臺膠庠大開至今豫章有來羣材杜預晉大將軍開府儀同三司當陽侯贈司徒堂堂征南經制晉室袵席金革研精麟筆學方武庫世號經癖有開後來理順氷釋繄公存殁戃怳靈氣我曰猶龍焉取虺異王肅魏衛大將軍太常蘭陵侯贈司空猗歟子雍英發妙年書易陽秋傳列學官制刋朝典秩煥郊壇汪汪東海載觀其瀾王弼字輔嗣魏尚書郎封偃師伯龍出河圖經成三聖輔嗣窮幽乾旋坤静漢說多門唯公取正伊洛淵源流光與盛韓愈字退之唐吏部侍郎封昌黎伯維天有文公材命世擴義滂仁黜邪闢異世溺方深力以道濟百折彌堅死而後己倒影滅没藐不可企文中子賛顯允文中希聖之徒闡教河汾宛然泗沂斤斤随文不足與事挾策歸來心醉經史曰魏曰房曰杜曰李學傳聖心有樂有禮貞觀至治有三代風論夫源委先生之功千古而下與唐比隆鍾氏先世畫像賛為鄉人大明作顯允鍾公肇跡自秦金季家衛以財發身闤樓卉圃照暎河濵優㳺卒嵗夀開八旬維嗣强矯結髪從軍奮提干將屢收戰勲釣臺雪潰死節酬恩伊恕之父蛇化其文憤志讀書行比鄉鄰陳力漕府克公克勤是知善繼述者豈無其因不過積徳與崇仁故培之厚者其發茂浚之深者其流奫嗚呼鍾氏之子孫能不封植其本根也趙曹州畫像賛宓子宰單鳴琴在堂琅琅玉音齊魯之鄉流清芬於異代得趙公之循良峩冠惠文貯書撑腸不竊榮而易素守曽格物而恃已長貳政两州治績章章字民折獄仁恕内將體春陽而休燠孰如秋荼之繁張觀两漢之卿相自卒史而翺翔以材以術公其可方固沉底於下位浩淵流兮未央維嗣善繼乗􅔕奮驤慶之所鍾于焉厚償匪槐棘而就列將禮文之有光又何啻簪白筆而飛簡華之霜也九公子畫像賛史開府子名􅀈喜莊列學屢為萬夫長有時麻衣草履以散仙自號鋭目豐頥氣貌魁竒被褐懐寶有儼其儀出紈綺之間無豪貴之習抱夷惠之志蔚熊豹之姿齊物我於一致感盛衰之無時其或戴逺㳺之冠甘元氣之委騎將軍之馬掃干將之霓歘坐臯比𤣥談四馳提筆揮灑以遨以嬉斂凌雲之劔氣等尺鷃而蓬飛恥以藝進與時推移希達人之大觀每先事於幾微與其身之外樂何若心之内怡是則散之為僊見於丹青者如是又何計騰寓説而横氣機也試捋須而為問恐吾言之庶幾漢諫議大夫王章博士朱雲賛并序孝成之朝劔履間健者猶百位然挺身為國直言忠諫者誰歟盖當時皇綱紐弛威福柄移赤伏陰凝堅氷日至獨能痛國統之將微憤中外之單弱毅然與天子合謀厲具臣矯朝曲以社稷大計為言有殺身以成其仁者在漢二百餘載之間唯仲卿與朱㳺二人而己何忠直剛果之氣寥寥如是哉論者方以不量輕重陷於刑戮為譏吾恐為人臣者不以容身保禄是耻將何以為訓作諫議大夫王章博士朱雲賛其辭曰天厚之剛百折不撓履霜而氷辨之當早漢至元成國統中熄陰掩陽精九廟不食劔履羣卿孰非逺識坐眂淪胥權歸外戚厄㑹中來詎容人力公豈不知言出禍入殺身成仁臣子之職彼牛衣言固非所恤諤諤南昌感公奮激抗書申明路開忠直三復斯言冩我心慼維皇有師禮自天秩動静安危以物以則矧惟中材性可善惡俟我儀刑狂聖迺作安昌師漢腹心之疾竊我崇髙容奸隠慝社稷大計莫此為亟雲位下僚自任稷契犯顔嬰鱗為漢藥石諫雖弗行彼氣則折欄檻嶙峋我舌不結少師劘軀龍逄挺節以分以職於死為説並㳺無慙終古有烈嚴子陵賛漢有天下本以霸興陵遲世季其弊莫勝光禹阿腴雄歆狂鄙元成以來從風而靡維炎中熾故人作帝先生慨傷為漢砥礪潔我一己訓彼四方腹惟可加萬世之光幽幽冨春𣺌𣺌桐江釣絲裘褐終焉倘徉是則柔理之道先生助治者其維皇哉噫漢議郎田疇賛炎漢淪精羣雄蠭起士昧所擇依强而己附袁臣曹風從雲委倖而有成終焉自凂堂堂幽州志在安劉信我大義掃清國仇先生委質名正言順報以國使力扶衰運間闗歸來大事已去君讐未復吾將孰與躬耕故山有死無貳白狼之役諒非本志是懲是膺權以濟事何以明公龍盧之封繋以千駟禄之萬鍾曽不少聣肯縻其躬嗚呼智如荀彧識似田豐明不自保竟貽終㐫千古而下死魄英風牴􅲨賛并序郡譙門两棖下有石獸左曰牴右曰􅲨為狀特異隠其齒而吻張崩其角而顛兀頂髪雲委垂卷两膊世傳殷宫中故物自衛縣移置於此攷之集韻云秉心甚靈盖忠直獸也彼物爾得氣之偏者也何以識其性之云然以屈軼指佞神羊觸邪麟趾厚而不踐虎蜼仁而有威是以忠與直可得而推也其所以表之以為世儀者古人制物有所取而垂戒焉葢忠者衛上之謂直者不骫之稱此則臣子之所固有而所當為者物能如是可以人而不如獸之云乎作牴􅲨賛賛曰吁竒龎三代制賢其徳與獸異體具存神則逝逐比干而下逰悲獨夫之狂猘牴兮􅲨兮無效麟之出非時兮使吾拭面而反袂西溪真賛秩秩其徳曄曄其英天禀之厚固非學之所能用晦而明與時偕行愚常與公從事雅量有餘曽不知趙張之蠭閧豈鷹隼迅擊終不若鸞鳳之和鳴也我賛公像庶幾典刑道義視文章為重浮雲同富貴而輕至于生也順事没而吾寧疇為丹青可得而名也邪雪堂普仁真賛栁州序浩初讀書樂山水有文章父子咸為其道泊焉而無求賢於惟印組為務以相軋者逺矣道行貞純初不絶俗機鋒灑落即之可親苦空任沒膝之雪處心探濟物之仁草坐容身雨花繽紛雷音淵黙獸伏鳥馴咄此圓神澹如凝雲耿金粟之孤影笑人間之幾塵愛而賛之葢浩初一流人也中書左丞許公真賛古人以道濟為任者時雖見於行藏心不間于微著於皇先生道深絜矩以希聖為心律已為度上明君道之方下易薄夫之慮危言立朝聞者悚懼公于斯時屹傾波之砥柱非天下至誠其孰能與瞻拜公像魁然真輔奉璋峩峩其儼而裕至於體用一源先後有叙試以中元之治較之見論思與機務念公平生其丹青可得而喻也耶醫學教授趙公仲康真賛洹水流潤太行唯峩篤生異人司時之瘥顯允趙公被服委蛇道髙而施博脈明而智多世以醫名者衆如公之醫中而不頗䕶養氣元玉池生波攻以峻劑我禁我呵鬰焉有餘揮之以戈俟其半衰濟之以和開夀域者五十年良聲番番其所以得于公者如是被之賛歌知陽報之有在福子孫而為那也王子明傳賛古人稱殺身易成事難雖然事有大小公私之間如不有己私專以公心除天下之害此其成尤為難能而可重唐代宗以萬乗之權羣公卿之謀至取一家奴宛轉畏懦不敢明言竟以盗歸之而觀著之節可謂壯矣刻栢夏禹像賛并序衡岳有怪栢一株世傳夏禹手植長沙温將軍得斯木一枝堅勁苾芬愛仰不已以為神明之物也刻帝像以奉之亦臣子望舜九疑呌雲蒼梧之義也求潤色於余秋澗王惲稽首而為之賛曰亹穆神禹𤣥功格天見之羹墻况手植之所刋帶不下而道存體雖微而儼然所謂斂之管窺浩浩淵淵嗚呼三代吾不得而見之得視斯像固足以掲吾之虔是將同啓石而不朽耶抑以與九疇而共傳也田仲徳先生畫像贊言論固樞機之先作行在士大夫為重卓越田公二者錯綜氣無虚談才見實用翺㳺侯伯之間擬擴香林之供幅巾横策掉首吟諷予嘗聞鄒蒙之辯說有以卜先生之定動於戯文獻不足以柯為棟載瞻遺像安得不有人物𣺌然之痛栢溪主人張仲和真賛堅以持其心直以養其浩用是二者以全純孝得其時而濟斯媺安其貧而取進效其樂也融融為行也慥慥氣温而和貌儼以肖豈惟夀考兮康寧永以為鄉黨後來之教趙瓠瓜冩真賛丹頰秀眉疎髯方頥目朗炯欲曙之星氣吐若垂天之蜺畧施為而見底藴據懐卷而藏器機曩也為平津之上客今而乃瓜田之布衣注酒满瓠溉此鴟夷醯雞笑甕天之舞醉袖拂西山之低趦趄囁嚅尚肯效夏畦之病為浮雪富貴軒冕􅂗泥况尺鷃享鐘鼓之樂㳺談到六印之纍卧元龍之樓下覺許汜未全痴也耋杖圖賛先生姓馬氏名天昭字雲翰汾州介休人自號師易老人丁丑嵗夀八十有一徳維懿其存則不謂之命氣維克其定也能勝乎天故衝風之火易熄溉旱之禾有年而况有道君子者焉矯矯先生匪曲而全静以仁樂健為徳先應獵無夢絶韋有編通而得夷恵之介黙而契消長之權何軒冕之可累豈山林而後賢氣精而鶴夀松貞而嵗堅故得甲子幾七七之數乾陽符九九之𤣥道與貌粹峙而停淵儼乎若介山之鬰茂濟兮如素汾之淪漣方吾道之如線頼此老之康延豈造物者卑西河南陽之夀固將為斯文無窮之傳也耶趙徵士畫像賛君名鉉字仲器多巧思精藝術今年六十有一自號鈍軒逸皓所謂隠居求志行義達道者也祖質字景道家大興之穴􅀢里金建春離宫在焉常有詩題學舎壁間云折脚鐺中烹白薺打頭屋底㸔青山道陵春水過見之為賞識左右以公之名對召見殊加優禮仲器公之曽孫也蒼髯于思雙瞳炯然勁逸鬱幽燕之氣端倪賾太易之𤣥挫止其鋭鈍而名軒曽於物而不滯浩胷中之一天是謂建春徵士之後其青山秀句猶隠見於眉睫之間也故金滎陽令傅輔之畫像賛其父霖明昌年間進士行部臨潢沒於王事玉潔含光蘭幽藹芳孰為氣機貌温而良我嘗陪公杖屦徜徉沖善為植徳之本撝遜厚周身之防見之丹青衣冠堂堂維玉田之傅其故家文物尚髣髴明昌之煌煌若子若孫既衍慶以襲吉又將見再世而昌也耶韓御史畫像賛晦其明而於物也周以旋介而通其於事也曲以全神湛秋水顔如渥丹藹藹蔚和愉之氣怡怡為孝友之賢施之有政其達固然同我冠于豸府愛諤節之孤鶱所可見而知者如是其不可企而得者殆丹青之黙然而淵也渡水十六羅漢賛為聖安容老賦誰吮澹墨作佛事顧頴含光開太始稽首尊者十六相金沙灘頭渡淵水魚竜異獸同一家背負鱗浮供役􅀈碧蓮泛灔百花小两脚何曽踏泥滓法身化現炯孤月海風吹堕千江裏補陀巖竇寶香濃滄浪石上觀生死白毫光滿海西岸航此洪濤悲一世玉溪老子出示余意匠經營親說似禪機己落慘淡中我今試下第二義九年面壁度竜象一日西歸攜隻履菩提樹下喜相逄拍板髙歌聊爾耳香木琴賛并序南海石隠禪師合沉檀二木為琴絲而撫之其音克諧有不譲於槁梧者段生得之以珍異丐余文以賛之其辭曰繄琴之胎以桐為材製自虞氏其來邈哉斵以香木南海之僧絲而理之有嶧陽之清物逐所好歸之伯寜脫燎爐之融液拉玉雷而為朋藹然雜芬菲之韻琅然泛韶濩之聲嗚呼琴乎學者寡而其將孰聽倘鍾期之與遇又何啻一再行也劉巨川簽事真賛事機之棼非材則務弛天質之美逄時則道行於維劉卿志氣蠭閎臺閣肇建鶚書應徵豈惟夜書快吏見稱及佐府幕游刃發硎人奉承而不暇我持難而肆能致駕五馬心奚以榮律身束吏明倫恤刑陟而提憲風動百城褰帷聳具瞻之美控拳無虚搏之名抵几或迅盤根莫勍天或假年蔚為名卿宜大用而乃靳殆收功於嗣興卓彼二子力振家聲彯纓若綬何天衢亨將見一日千里騁駿足而躡雲鵬也黄落老人畫像賛猗歟趙公以古為徒燕居磐石定力有餘萬坌前陳付之一壺身心翛然浮雲太虚自號曰黄落散人世指為山澤之臞見于序文者如是我說是嘉遯之自如不居山林匪樵匪漁安我素分而與道俱醉以酒而適意晦其明而内娯夀幾九齡健不杖扶有子有孫簪纓仕途天之報施善人也合若契符甚矣吾衰愛公起予拊卷嘅嘆遂斂袵而特書軟背椅賛并序昔李山人詔隠衡岳得虬松一枝即形作椅名之曰隠和終莫能曉其何義故左丞史公之子假予為道其安四體養老妙意有不可勝言者繩而網之以軟其背把而執之以駕其肘至托承臀臂曲盡其冝甚矣工者得老者安之少者懐之之遺意歟名之曰軟背且賛之曰咄此為具其製非一坐促背峻似恭而蹐傍無兩把予肘安適而最苦者磨隠傴脊未若此君温柔旖旎譬彼姬姜擁抱而息不髙不充老者所仰爰從何來藍輿之狀管幼安濯足圖賛天下有二道出與處而己然審時處己有未易言者先生遭三國雲擾蹈海而東髙尚其事如度之致禮以加敬丕之逺聘以拜官皆恬然若無所聞所謂隠居求志行義達道者也至於嘯傲物表澡洒溪流特一時閒適若歆輩俾進履拱杖猶恐自汚抗疏代位此何理哉自惟老繆待罪翰林赤日長驅㑹集寓館背汗浹流暍而欲踣歘挹清風豈勝愧仰乃再拜稽首而為之賛曰吁先生古逸民素所友夷惠倫傲狐瞞東海濱著皂帽蹋碧潾尚恐染三臺塵若歆輩進履徒破壁手乃敢汚抗疏請代三孤昧平生何足誅百世下孰知己翛然心見終始大起予有蘇子古燕印賛并引叅政何公世家易州常於燕丹廢城中耕得圖書小印雖百枚制皆殊一日以所得者贈予形如方斗其文曰韋宙唐昭宗時宰相豈古今人姓名有偶相同者耶入手摩挲甚可惜也作斯賛以答雅厚其辭曰燕有國八百餘維易容奭故都按壁壘見雄圖萬組印雜簪裾人與骨朽己無耕壠間獨得渠一粒小丹砂如其文宙亦盛夫紐岑樓或龜趺纍纍多一皆殊彼斗大黄金塗懸肘後擊賊奴氣雖豪空淪胥三摩挲重嗟吁猗叅相好古徒知澹癖為贈予何所誌遺惠書四子問孝圖賛天地之經其維曰孝魯人所瞻巨室是效四子致問庶幾要道因材為篤聖答各異發藥其偏從容和氣思煽皇風永錫厥類怡聲粹色玉佩華裾表之丹青清風穆如嗚呼安得一天下之慮宛同是圖梁太師王彦章畫像賛堂堂太師勇冠萬夫曽精甲之幾何破南城於一呼三日奏捷數果不逾大厦將仆一木可扶衆且頋望我誓捐軀蒼髯糢糊目光炬如戰酣歸來氣鬰犀渠惟孝與忠同歸異途繄錦囊之三矢與長矛而不殊冝乎文忠之筆大書特書不一書而己也吁劉珍母王氏真賛嗟嗟母氏恩斯勤斯自期寸草庶答春熈况復身後有養何施履霜濡露感懐嵗時嗟嗟母氏健幹而慈奉已以約保家之肥致家之完乃有今日我食我衣皆母之力靄靄停雲泉水湯湯我思母氏何日而忘重華鼓琴圖賛幽幽深山𤣥徳聞兮二女釐降媯水春兮乾健坤順其道恒且久兮袗衣鼓琴固若我所有兮手揮五絃正始此其時兮琅然玉音一氣為之熈兮鏘然和鳴鸞鳳以之儀兮衣垂手拱其道本於斯兮升道蒼梧惋莫從兮淚浥湘筠思何窮兮噫故處士牛了齋真賛眼髙一世舌本懸泉噴噀珠璣孰為後先樂育自好以全性天生也順受沒吾寧焉彼顔渥而丹野服翛然尚知為雁門儒將之裔庶幾青山白雲之仙也故翰林應奉陶珉溪真賛貌古而氣清言訥而行純此見於外者皆曰儒學之醇若夫該貫經史筆斡千釣玉佩瓊琚大玩斯文足以泛珉溪之雪浪追顒軒之絶塵然綸恩甫沾而不禄夀靳固於七旬天之報施果何有於善人峩弁朱衣正笏垂紳雖未及直玉堂之署尚知為元貞辭翰之臣也房星賛粉色黯淡雙絲浮絳冠箕如拄劔􅚆陽環夜半海氣湧火輪欲上鞭金虬赤㕙躍入𤣥闗幽殆佀戰勝褰雲兠千金漢將非吾儔中令化筆通神謀冷風拂座寒颼飀大徳四年臘八日作房四星為明堂布政之宫亦四輔也下一星上將次次將次次相上即上相所以理陰陽正教化南二星君位北二星夫人位又為四表中間黄道之所從為天衢又為天闗南闗曰陽環其南曰太陽北闗曰陰環其北曰太陰亦曰天廐亦曰天馬主車駕南星曰左驂次左服次右驂又主開闔畜藏之所也松化石賛燕城超彦清家藏伊石與松秉彞堅潤雯華根節鱗皴挺勁儼髯童之淵潛蛻康溪之深濬伊艮震之交感化而為他山之璡逮霧巖之𤣥豹隠錦斒而如抆水木清華坤靈藉重氣變無方静含妙用物貴異稱金鏗玉振昔焉不封於秦今也罔言於晉但摩挲而三嘆非張華而孰綜然室無滯而不冨况殊方之竒貢嚮為山人隠和之具今作仇池怪石之供一線爐熏靄若雲蓊栩栩蝶去夢繞神清之洞蛻齋劉先生真賛先生諱思齊燕人猗歟蛻齋蚖肆螭蟉擴充家傳資深善誘愛波瀾之老成宛黼黻之絺繡曾管窺於一斒竟韞匵而莫售我瞻遺像氣豐而蔀一官廣文禄才升斗挈簞瓢兮屢空曽臧否之何有嗟共盡而奚言豈獨哀於吾友蛻齋初與胡國瑞同年登第中統初為中書省掾後辭歸為彰徳路學官卒秋澗集卷六十六欽定四庫全書秋澗集卷六十七元王惲撰翰林遺藁増諡睿宗仁聖景㐮皇帝玉册文臣再拜稽首言伏以至徳難名於穆乾坤之大孝思罔極有嚴祖考之稱稽遺美而載揚迺守文之先務𢎞宣令問茂對耿光伏惟睿宗景㐮皇帝秀㧞神支淵潛龍徳英武内根於仁孝温文外表乎謙恭先事而謀臨機善㫁當軍國撫監之際赫風雲册伐之功川蜀威加宋人為之褫氣鈞臺戰捷金源遂不能兵闢土宇而靖中邦翊炎圖而隆寶運策勲天府歸美皇靈方請命於上蒼思保安於宗社祥開後聖光啓皇元致今日之隆平蓋孫謀之燕翼惟天縱其睿智故澤流於子孫爰伸凝慕之誠虔舉増徽之典詢諸輿議允恊至公謹遣某官某奉玉册玉寶加上尊諡曰仁聖景㐮皇帝廟號睿宗遹守先猷仰聖靈之如在式垂歆鍳降福祉于無疆追諡先太子册文皇帝若曰於戲故皇太子某天姿玉裕茂徳淵沖朕紹纂丕圖仰遵太祖聖武皇帝遺訓以爾世嫡元孫譽望攸屬爰從燕邸正位春宫愈貴能謙居貞益慎及夫聽政揆叙有方至於睦親昆仲無間尊師問道日御經筵視膳候安時詢内豎佐予柔理惠彼小民方念神器匪輕投艱有託豈期前星揜耀永隔幽明日居月諸懐思曷已比者大臣敷奏冝易名奉祀光崇彞典今遣某官特册赐爾諡曰明孝太子永昭遺懿式慰朕懐尚翼明靈歆承寵渥皇太后玉册文維至元三十一年嵗次甲午五月朔某日嗣皇帝臣妥懽帖睦爾謹稽首再拜言洽萬國者莫隆於孝治揚懿徳者必著其徽稱洪惟我㓜沖人嗣無疆大厯服率先風化無尚於斯恭惟太母聖善懿恭睿識逺慮力行善事陰赐及民隆孝敬於先朝軫憂勤於内助宫壼仰其規範宗族化其肅雍誕眇躬而底于有成翊燕謀而俾登大寶深恩至徳蕩焉難名匪極鴻一作權尊曷伸至願載惟昭考已祔升於宗祧言念宸闡冝大崇其典禮庶幾均報仰答恩慈今遣某官謹奉玉册寶上尊號曰皇太后伏惟皇太后殿下端處福宫誕膺顯册儼母儀於四海徳配坤元期聖夀於萬年祥開神筴永資慈訓保我子孫臣誠歡誠抃稽首再拜謹言改元詔朕祗遹先猷嗣承丕構訪予落止在夙夜以靡遑永言孝思閱嵗時而増愴惟春秋之謹始實古今之成規適届履端聿新紀號可改至元三十二年為元貞元年咨爾有衆體予至懐手詔侍郎楊大淵省表具文朕恪守王封遽膺推戴即位之始不遑康寜惟爾逺戍邊陲久服戎政身外心内來陳賀章宜加寵答之辭以勵忠貞之節故兹詔示想宜知悉詔罷東平路管民總管兼行軍萬户嚴忠濟爾父承國家興運左右將士同心戮力封植東平屹為名藩我祖宗嘉爾父之功乃建為侯自爾嗣位又二十年朕初即政命復襲爵往即乃封敬之慎之其脩徳砥行自立名節勉圖後效無忝先猷十七日戊寅己刻上臨軒親諭諸路總尹遂以前東平總管嚴忠濟弟忠範為東平總管仍戒之曰兄弟天倫事至於此
