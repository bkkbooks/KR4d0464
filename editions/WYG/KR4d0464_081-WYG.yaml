body:
  text: 一中統元年科訖差發多有不盡户計所據今嵗科差須管子細照勘務要盡實科徵不致隠漏兼各路投下户計差發欽奉見降聖㫖亦從各路總管府驗數科徵仰各路管民官照勘本管地面内見住人民户及不以是何人等應合收係當差者須管從實盡數科徵見了數目開坐闗部轉行申省聞奏若是中間却有漏落不盡實去處事發到官定將當該官吏嚴行斷罪外宣撫司有失體究者亦行治罪仍先取管民官甘結文字一中統二年差發雖已立定限次仰各路管民官更為斟酌彼中事勢催徵如限内併納者聽務要民户安差發辦乃為稱職一起置信牌事縁為各路遇有催督差發勾追官吏等事多用委差官併隨衙門勾當人及伊喇祗候人等投下文字不得騷擾民間轉致遲悞官中事務為此議定今後止用信牌催辦一切公事據置到信牌編立字號令長官次官圎簽於長官㕔事對鎖收掌如總管府行下州府科催差發并勾追官吏等事所用信牌隨即附簿粘連文字上明標日時定立信牌迴日勾銷并照勘稽遲限次䆒治施行若雖有文字無信牌或有信牌無文字並不准用迴日即仰本人賫擎前來赴總管府當㕔繳納當該司吏不得一面接受落闕如違䆒治據府行下司縣其司縣行下所管地面並仰依上施行一各路所設急遞鋪委自宣撫司提領仍禁約沿路不得奪要文字本管官司亦不得科取差發錢物并照刷遞轉文字如有稽遲日時約量治罪據鋪側近住坐或開店買賣聽過往軍馬使臣人等並不得騷擾遞轉文字除申朝廷省并本路行移官司𦂳要文字外其餘閒慢文字不得入遞亦不得私下夾帶一毫物件轉送仍常切存恤不致逃竄失所若有違犯仰宣撫司䆒治施行一宣撫司若遇𦂳要并機宻公事須當赴朝省計禀即仰乘坐鋪馬走遞如是尋常公事止令入遞轉發除降去起馬劄子外本司更不得别給起馬劄子宣撫司起馬五匹副使四匹委差官令史人等三匹一宣撫司官比及頒俸以來權依使臣分例批支一宣撫司伊喇祗候人比及定奪止設人數每司權設二十午刻諸相大合食於省堂之西偏奉㫖命平章王文統舉讀史一人遂以詳定官周止膺選廿五日丙辰諸相按問髙麗質子王淳與淇甫事未刻新舊宣撫拜命於省中就付條畫新制及諸換授官資者悉裁遣之廿六日丁巳辰刻入見上以錢榖大計問平章文統敷對明敏慮無遺䇿凡軍國大事皆有成算然後撮其要領使例相比廿七日戊午上命平章王文統與前省官庭辨中元民賦虚實比上年多寡之數若人為語塞廿八日巳未暑氣甚隆有㫖昨者比附前政甚優終未服其心也奏准差宣使蒲散禧悉起燕帑所有金帛等物是日特㫖命趙璧平章政事知政其夜諸掾以會計故達曙不寐廿九日庚申王相以簿書委積重為規畫授諸掾成算以備不時顧問三十日辛酉前相臣安天合授西京路宣撫大使仍錫金虎符特寵異焉未刻堂命惲草宣諭大理及哈喇章俾還本土手詔其辭有云嘉汝等逺自雲南導從選鋒轉戰千里直渡鄂渚以達於此勤已至矣今者俾爾各還本土以遂厥性之語各優賜人有差是日九通所造狐貂衣裘其數畢具王相命省掾王文蔚并惲用棋方抹子通類比附使見估直髙下孰省孰費且曰兹蓋史臣年表遺法固非吏輩所能知也蓋有所為而云五日甲午壬戌朔黎明達官巨僚畢集中省遂檢前省民賦以上年比中元數多而所入者鮮以中元比上年户同而所入者廣論辨者久之前省官屈服始無異議焉諸相僉曰先後之事明矣遂具以聞夜漏下八刻亷右丞賈郎中傳㫖曰若輩無狀凡所以欺蔽不應等事悉索焉以聞明日癸亥天威雷震前省官始知懼待罪矣中外聞者有萬口一辭之快是日巳刻東平宣撫司申國信使郝經等為宋人扼駐蘄州渦口不遣入國事既而知為宋人所誑我實不審所在也未刻復遣户部貟外郎王煥催發燕藏諸物初三日甲子晴朗盡日詰問前省官事是日九道宣撫其先赴攸司及諸換授官入朝陛辭歡聲和氣洋洋郁郁滿皇都而載歸路矣上京路總管忙占都喜見諸相於都堂識所謂海魚九尾者四日乙丑問前省官事五日丙寅問前省官事巳刻寥休上人來自南庵諸相就謁於龍光北寺識所謂温庵主者未刻有㫖命宣撫姚樞赴省同議軍須調度等事姚字公茂栁城人資明亮深識有理學嘗從征大理有佐命至元改元轉天下官公力為多上嘗曰公茂善談論物之圎者只說出枘來官至中書左丞終翰林承㫖是日左司都事楊恕傳都堂鈞㫖令惲草移宋三省牒文向夕隂晦大風其牒草云大蒙古國行中書省移宋三省皇帝即位之初重惜南北生靈之故一視同仁首主和議特遣信使敬奉國書講信脩睦往年征進大軍即令分還本屯仍嚴勅邉將非奉上命毋得妄動爰自行人銜命已來載更嵗律寂無來音其餘講脩之事將如何哉不惟有失忱辭反啟邉釁以至攻圍我上蔡侵軼我鄧鄙襲華陽擾隨州刼掠真陽數犯漣水皆出於使軺已入彼境之後夫信與義自古所恃以為國者也一旦捐棄曲直所在自有任其責者矣若和議可必即當速遣重使與我行人偕來其或逗留嵗月别有異議請選師徒具戈甲預致師期相與會獵于江南之地可也於斯二者惟所擇焉比來閫將屢請出師以報侵疆之役省府謹守聖訓弗允所請不識日者數舉果何為而然耶今大駕北狩已是南還陛見之日何以為奏冀早示定議毋坐失良圗以貽後悔七日戊辰夘刻百夷奉使劉芳成行巳刻入見多所陳奏皆常例事内一條禁不得以馬挽車引碾及無故屠宰重兵力也是日發郎國遣人貢獻卉服諸物其使自本土達上都已踰三年說其國在囘紇極西徼常晝不夜野䑕出穴乃是入夕人死衆竭誠籲天間有甦者蠅蚋悉自木出婦人頗姸美男子例碧眼黃髪所經涂有二海一則踰月一則朞月可度其船艘大可載五六百人其所獻醆斚蓋海烏大卵分而為之酌以凉醑即温豈世所謂温凉盞者耶上嘉其逺來囘賜金帛甚渥是日懐孟路勸農官王秉中字仲撝來王相令訪問枋口去路六十里屬濟源縣所開水利即今溉民田㡬何仲撝曰水舊名古秦渠蓋魏末司馬孚創脩至隋盧賁復開治唐太和間河陽節度使大加疏導溉河内河陽温濟武陟五縣民田五千餘頃宋天聖初枋堰始壊至是仲撝復為起廢又云初興役時掘地丈餘得柏枋數十段稱曰枋口豈因是得名乎是夜内庭官呼嚕布哈布琳濟逹第二子時年三十一嵗飲諸相於中省既夕繼之以火二鼓方散八日已巳對問前行部尚書馬烏呼納事所牒宋三省又移河南宣撫史公令改作經略司牒宋淮東制司施行就令選官充詳問官者經略公以太原士人崔明道為使南京兵馬副都李合義貳焉以往其意蓋以或有不順先以省檄牒之則後無繼焉故也堂議中書出政之地人雜遝莫能禁奏准令集賽丹二人監約省庭間自是中省之務頗清肅焉是日都堂命惲編類歴代水利營屯田漕運錢幣租庸調等法及漢唐已來宫殿制度等事已刻上御萬安閤四川楊侍郎遣其子以弓矢等物具表來獻及迴上以手詔答之楊大淵省表具之朕恪守王封遽膺推戴即位之始不遑康寧惟爾逺戍邉陲久服戎政身外心内來陳賀章宜加寵答之辭以勵忠貞之節故茲詔示想宜知悉又一囘紇醫者貢橐駝三十頭鞍具幪帕全光彩照地鳴皷吹螺自􅆏門而入又一囘紇贄栗色宛馬入拜玉面鹿身聳立如畫所謂脫必察者也申刻省起諸相候亷右丞疾九日庚午推問馬烏呼納事已是日皇弟穆克大王世子昌童封永寧王仍改父王玉寳為金印命惲討論古今諸侯王印制遂製紐為駝作三䑓其文曰永寧王印十日辛未堂議欲以元寳鈔背用闗防印誌既而議不便但令比户粉壁嚴偽造之禁從楊宣撫果議也有㫖遣上都同知阿哈瑪特㸃燕京萬億庫諸色物貨十一日壬申堂議曰古者天子有八寳蓋所以崇天授而鎮萬方也今朝廷所用止一寳而已欲議奏令印工季并餘寳皆刻而為之用古文竒篆殆受命璽然惲曰此非可輕議也又務繁需再議焉巳刻上手詔宣諭四川侍郎楊某曰勇冠諸將名配古人知大義之可為籍諸城而來附獻以金帶示以誥牋載詳終始之誠宜示褒崇之禮可特賜虎符充䕫府路行省兼安撫勾當更宜招懐未附共底丕平但桑䕃不移而能立其功雖茒土至重而朕無所惜其賜卿某物至可領也諸相大合食達官巨僚於都坐皆霑醉而罷十二日癸酉有㫖先召首相二三人入朝餘俟命於省署既而以大宴不克見上都留守同知阿哈瑪特兼太倉使請立和糴所以溢廪庾堂議以曹人李亨字通甫勾當和糴事改和糴為規措所亨脩人事極經畫已而粒米狼戾少尹愛其能焉十三日甲戌䆒問前省官一切事理皆有定論今左右司官具奏目然後詳聽已上聞以見上下通知故也午轉大雷電以雨且有電蔽地向夕内省官呼嚕布哈傳㫖令前省官及諸路在都管民等官詰旦集闕下以聽聖訓明日巳亥寅刻詔罷東平路管民總管兼行軍萬户嚴忠濟仍敕戒諸路官寮無是效焉國有常刑犯不容不嚴其初授制辭有云爾父承國家興運左右將士同心戮力封植東平施為名藩我祖宗嘉爾父之功乃建為侯自爾嗣位又廿年朕初即政復命襲爵往即乃封敬之慎之其脩德砥行自立名節勉圗後效無忝先猷至是未見顯咎遽為黜罷或者不知而異焉未刻諸相退朝圎坐按問李宣撫王正之等事既而亷右丞傳㫖召平章王文統遂入見上於香閣夜漏不廿刻方退十五日丙子誅東平經歴官邢衡銓初邢以事告叅政張易詰對於上前邢欵服命諸相監戮於都城東十里外張手剚其腹從初請也十六日丁丑雨亷右丞耶律中書張叅政王平章推攷定奪諸路户口等事十七日戊寅諸相復定擬大明西京北京賦稅户口未刻藏春仲晦來朝諸相就見於李虞卿宅略話而退是日巳刻上臨軒親諭諸路總尹遂以前東平總管嚴忠濟弟忠範為東平總管仍戒之曰兄弟天倫事至於此朕甚憫焉今予命爾尹茲東土非以訟受之也彼所責匪輕敬哉今而後茍不克荷非若汝兄幸而免也至是知忠濟之失皆為其弟所發因各賜馬酮慰遣復有改故從新之諭又黜大名路達嚕噶齊阿嚕嚕河西人小李鉗部之子也十八日巳夘晴暑上召前濟南宣撫宋子貞真定宣撫劉肅河東宣撫張德輝北京宣撫楊果於内殿以擢用輔弼為問楊果等前奏曰王文統材略規模朝士罕見其比然以驟加登庸物論不無新舊之間如史天澤累朝舊臣勲碩昭著若使宅百揆大饜人望令文統輩經畫其間則省事成矣上曰置史某相位念之久矣卿等所言允協朕意因賜食而退十九日庚辰入見奏裁大拜及六部事詔以世臣巴哈經略史天澤為右丞相巴哈時三十三嵗憲宗朝集賽丹長領斷事官其祖太祖神元皇帝朝功臣父伊遜圖哈憲宗朝萬夫長呼嚕布哈耶律鑄為左丞相呼嚕布哈時年三十一嵗父布琳吉台官人塔齊爾亷右丞平章政事塔齊爾時年廿八嵗其父憲宗朝世臣千夫長張叅政為右丞宜撫楊果宣撫商挺叅知政事餘如故是日諸相入見將退上慰平章文統曰卿春秋髙恐勞於奏請今後可運籌省幄若有大議須面陳者及朕有所咨訪入見小事令人奏來不必煩卿也上以王姬下嫁午刻幸新桓御營廿日辛巳奉㫖命承㫖王鶚定撰諸相制詞廿一日壬午時暑闔省大燕慶新除也時既相史公所事皆倚重焉丞相曰天澤武臣何克負荷但物務未安者老夫通譯其間為諸君條逹耳相則予曷敢當衆愈服其謙抑皆霑醉而散是晚承㫖王公命惲賫所撰制詞呈省其文通作一卷實封細銜書名上用院印或問焉曰白麻蓋自中出令實封防其外泄亦唐人鎖院之意也既披詳或欲有所更定惲力言其不可昔楊億以一壤字不勝其恧况改作乎第修飾之可也其史相詞頭有惟卿世篤忠貞材兼文武樹戰功於疆場卿力良多論機務于廟堂朕心允協宜示百寮之式俾居諸相之先可特授中書右丞相卿其振紀綱崇體要往服新寵以壯舊猷亷希憲惟卿秀拔父兄學尊師友往綏諸道視民一似如傷就建行䑓臨事毅然有斷宜從政轄進署相銜可超授平章政事惟暨乃心以荅朕命楊果擢秀詞科馳聲劇縣佐南州之經略才已見稱専北郡之撫綏人皆受賜政之叅決僉曰汝諧可特授叅知政事祗服寵休益思報稱廿二日癸未申刻堂議定省規一十條其一曰凡三日一奏事軍國急務不拘此限其二曰置勤政簿一扇凡公議已定事詳見於簿讀一譯不得增减言得日標題於逐欵之上還省立檢圎覆定行其三曰圎議定時首領官先擬定其事自下而上相次剖決議定題押批判若事闗利害情見不同者各具奏禀其四曰圎議時非定貟不與知本房者不在迴避之限若事渉機宻者以次請退其五曰同僚赴省日出為期停午乃起旬一日暇事遇急速不拘此限有疾故者須令報知庶免延待而已其六曰省府官并屬官各家不許受詞訟公文其七曰如遇闕貟圎議公選不得用門下人補充其八曰省府通譯史額定選充餘者不與其九曰奏事上前宣讀通譯人各一員其十曰凡告事說事者聽畢避其人公議定然後囘答僉曰所畫理到遂施行焉廿四日乙酉巳刻奏准紐赫中書授平章政事北京行省前歸德府管民總管張子良為河南宣撫使張字漢臣以名行午刻令郎中賈居貞照勘一切換授宣牌事無有稽緩廿五日丙戌平章塔齊爾日令叅政楊公説通鑑三五段是日至吳太子明蜜中䑕矢事塔公掩卷曰我試為論之與正説合一省為屬目富察禧起燕京帑藏至上都辰刻上觀於内藏喜甚曰自祖宗已來未有如是之多也申刻平章亷公郎中賈居貞掾髙明赴新桓御營奏事堂議専委叅政楊公定奪内外新舊官資是日諸相授麻制於都堂詔下中外稱賀不勝其喜曰自國朝開創已來論其得賢於斯為盛時有言綦陽鐡官不便者大扺其民皆殷實上户嵗官得鐡甚鮮不能當嵗輸包絲稅石之數若用此易鐡可増官煽數倍之上堂議曰若奏上朝廷即從然不重慮恐未免横議仍令惲與工掾李鼎計勘一嵗常課所造㡬何橫造㡬何一嵗通可用鐡㡬何在都廣備庫見有鐡㡬何且可支㡬年用度其外路應有鐡貨可支㡬年用度既已公曰未也若令民間興煽官為抽取凡㡬爐一嵗通可得鐡㡬何既已公曰未也若都除内外見有數目止以民間一嵗抽到鐡數可供㡬年正橫造作用度既已公曰未也若將冶户合人差稅取酌中價直一嵗委可易鐡㡬何有無少餘既已公曰未也更為積算一嵗合用礦炭支役且以酌中定數有無虧損官民既已公曰未也更為大約鐡官一嵗及上下一切侵漁掊克虚耗官物㡬何既已公曰可矣明日奏上果有恐失悞造作為言者以是應之遂罷冶户歸民因訓惲等曰書生論事大槩不差及詢其所以方略鮮有不遲疑者若將讀書苦心移之治此只一燈之功爾於政事何有汝等勵精焉可也何患茲位之不到哉是日布琳哈雅授御史大夫兼大司農省諭一切言告事人不得私家請謁投訴遵新令也廿七日戊子亭午右丞相史公赴永寧王榮授改鑄駞紐金印餘相圎坐照對燕京路民賦未刻掌記魏初來自燕城申刻定議公府署押事右丞相史公與丞相呼嚕布哈五日輪番一秉筆長官從上押右者處外邉一左一右以次而下圓坐亦然所謂廟坐廟畫也日將夕有大流星隕自巽位白光照野移時方散是日劉宣撫才卿説前朝省府各房止立鈞㫖簿無行卷六部應呈事務左右司官議定可否粘方帖於部呈上書送字得都座准議省雜批鈞㫖於後其左右司元書送帖亦不掲去用省印傅其上蓋上下互為之防然後送部施行燕京路宣撫徐世隆威卿說舊日户部設審計科以料週嵗所入幾何經費幾何遇有支發至十萬貫部方呈省大扺係常例有定體者如百官貫石之類是也外郎邢敏説舊日郎中與外郎都事另幕坐是年秋與郎中不同處矣及有所編省䑓定式亦有可取者劉宣撫又説舊日殿上奏事止左右兩司郎中其人賢遇執政有闕即拜叅知政事廿八日巳丑右丞相史公首秉判署是日命掌記魏初令史馮崧執掌奏事諸簿午刻奉㫖定擬中行兩省去留人員抵暮張右丞下朝説所奏事天顔甚喜交史丞相張左丞楊叅政留中王平章亷平章張右丞行省事於燕廿九日庚寅催督中外一切未經換授宣牌等事恐留難故也省退王相置酒私第會劉才卿宋周臣姚公茂王百一竇漢卿張耀卿許仲平李士都蓋留别故也是日嚴忠範授東平路總管李士都授翰林侍讀學士其制辭曰李昶學禮傳家明經登第練國家之故典經士行之操脩方當青史之編宜與玉堂之選宜公褒貶以示勸懲夏六月辛夘朔夘刻艮方有青紫二氣橫亘間錯長袤數十丈移時弗散已而霧雨交作不見天官書云凡星變氛祲三日内有雨大小㐫咎即亡嘗以理推之乖則致異和則為雨既和而雨其災自無經曰往遇雨則吉是也秋澗集卷八十一欽定四庫全書秋澗集卷
