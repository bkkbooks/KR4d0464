front:
  text: 中堂事記中五日丙申隂晦王相同左右司郎中賈居貞始入朝陛見上喜甚既退侍中和者思傳㫖命與諸相集議六曹并九道宣撫事於中書堂六日丁酉諸相會左丞張仲謙第左丞名文謙字仲謙邢州沙河人資安和靖公内敏於政不大聲以色惲為都司暏公來催帳竿棊二事因數曰朝家事有大小事需議可取奏稍緩無妨餘則不然吾子切念之今日思之可為至言也以决前議大抵選官薄賦平鈔法等事論者頗交雜王曰何傷取其長便者用焉未刻諸相入見進大定政要因大論政務於上前聖鑒英明多可其奏班退諭相曰翼日朕郊祭驪馬駉馬卿等不必扈行凡内外之務比還悉裁定以聞八日己亥天日極晴朗上祀天於舊桓州西北郊皇族之外皆不得預禮也九日庚子晴暖諸相圓坐都省集兩曹掾史讐九道民事十日辛丑王張亷三相洎賈郎中會議政事因論功利等事且曰世代下衰其勢有不得不爾者時惲亦預坐因徐起而言曰功利既不能弛心與術亦不可不辨也且心以居正為體術以應變為用總之體不失而有成者為上此大臣所先務也三相愕而起十一日壬寅保定總管蔡國公嗣子和略以本道鈔法事來議都堂為經畫之已刻張參政亷右丞會王相第令詳定官周止縷讀衆士嘉謨而詳聽焉僉曰不為無益也繼會九道宣撫定議官制輕減民賦等事申刻東北雲起蓊若潑墨雨東來散絲千門間乍暑霑潤為一快也十二日癸邜諸相集亷右丞第審定前議臚進之飯焉晌午鑾輅還宫有頃侍中和者思傳㫖召諸相入朝遂以軍國大政上聞都俞際衆悉之以對天顔為喜動且有恨其見晚之歎是日平章趙璧以軍儲事被譴胥靡於家甚嚴惲時從承㫖王公上詣趙公心雖惕厲氣量裕如也從而不去者唯門下士李革在焉趙事為結東平糧事李九山謂此事蓋意起於陳德秀禍成於杜彦深公實不知也藺仁輔之是日河南宣撫兼經略使史公至自汴梁十三日甲辰夘刻會亷右丞第辰刻諸相入朝以議定六部等事上聞綸音撫慰大允所奏曰向來羣疑渙然氷釋比出宫小雨浥塵緩轡沙堤有不覺其喜者晡時張叅政亷右丞會王相第已奏允諸務來審聽焉十四日乙巳雨午刻開霽會楊宣撫果張宣撫德輝劉宣撫肅張右丞再議民賦事蓋有所未盡故也十五日丙午有㫖就上都長春宫作清醮三晝夜為民祈福奏告文字交王鶚定撰者其辭有既獲畀矜之福宜隆敷錫之恩六轡屬還歸之際一家孚保乂之休言念蒼生不無累擾或㓙荒之災相望或轉徙之苦相成雖勅有司俾修善政更祈照鑒普洽鴻私是日已刻亷右丞張叅政會王相第呼金齒蠻使人問其來庭之意及國俗地理等事言語侏離重譯而後通國名百夷蓋羣蠻之總稱也其國在大理西南數千里外而隸六詔焉曰阿吉者龍川部長塔亨所遣偕來者八人始自戊午冬發於本土至是方達上都其人衣冠装束髻髪于項裹之絳氊復以白疊布盤繞其首衣以皂繒無衿領之制膝以前裂而編之如懸索然眉額間塗丹墨為飾金其齒蓋國俗之賤者也意思野逸殆驚麕然其土宜稻有牛馬山羊雞豚鵞鴨之屬兵械有刀槊手弩而無弓矢甲胄既而遣還上命中山人劉芳借職兵部郎中使其國都堂命惲草詔其辭有嘉爾等跋渉修阻懐德逺來首輸事大之誠克謹畏天之戒轉為宣暢皇猷告諭隣附俾知國家威靈無逺弗屇之意是日耶律中書來自漠北十六日丁未史經畧張右丞洎衆宣撫集都堂條具民政十七日戊申辰刻諸相入朝以集議聞上一允所奏向夕出宮十八日巳酉省奏准條畫民事凡廿七欵為施行之十九日庚戌百僚入見少頃出會東省奉㫖召九路總管頒示新典若有所陳即具以聞除河間眞定餘畧有異同復為商確奏裁以定二十日辛亥内宴不克見是晚工部石里忽即李被問堂命都司楊恕提控趙謙同惲等磨勘工匠支銷等簿達曙不寐廿一日壬子都堂令惲檢討唐人置信牌鎖長官㕔事諸相辨析石里忽事責遂有所歸已刻既雨而雪寒沍盡日廿二日癸丑入見午刻諸相圎坐讐校九道宣撫殿􅆟時東平撫司民賦有未足者某官對云云省官曰不聞詔條使户口増差發辦方為稱職某官以不敏謝及議中外新舊官改授定制轉午雨雹蔽地大者如弹丸俄而風作土下如雨黃霧四塞逮酉刻間開霽廿三日甲寅司天臺官中順大夫張為雨土事以民勞上聞明年新都之建遂經始焉廿四日癸邜極晴朗諸相入朝奏准七道宣撫司所行條畫
