  text: 集卷一
  hash: sha256:3eda7a3aed1388c4f30a0d442c6c3133dfe56210636ee600a8afe45ebbedff62
body:
  text: 元王惲撰頌中統神武頌并序維二年春王正月逆璮悖負天恩扞我大刑裒奸株頑嘯兇東土於是命将致討天戈一麾不五月而克清大憝兹盖皇帝陛下寅奉天心布昭神武睿智足臨有征無戰故也昔肅宗中興唐室而元結獻頌用歌大業垂示無極臣惲忝屬太史親覩盛事頌聲不作咎将曷歸敢綴緝所聞謹撰中統神武頌一首凡千有一百二十四字雖辭理未應庶㡬神武仁聖之徳鏗鍧炳燿播宣金石振一代之徽烈也萬冀微誠仰蒙天聽臣惲惶懼昧死拜手稽首而獻頌曰皇帝踐阼粤維三年萬靈清蹕廼狩于燕曰寒而寒曰燠而燠百度修明朝廷清肅東截海表西亘庸濮悉臣悉貢罔不率服時維逆璮禍心久纒再世鴟張顓征擅權奄殿全齊厲階泗漣煮鹽涸海剷銅夷山地夥物衆蘖芽其間懵恃奸嚚海波可田背脅疽根怒而自鞭時徼邉功外示忠惓警我宋急騎通甘泉帝以徳御聽之誠然再命不庭穢彰溥天浪駭鯨奔擬騰百川投袂東來盜我西偏天意有在聚而殲旃皇帝神武不震不愆燎我神鼎烹此小鮮命将興師策出萬全方叔召虎爪牙利宣爰命宗王相臣是丞顓彼封拜虎符發兵赫赫禁旅犀甲熊旌相臣曰璧維周之禎氣盖一世徐方震驚皇帝曰嘻殱厥渠魁脅從罔懲既誓我師鋭莫與争賊謂我怯蠆蜂來乗一戰而退曠懐自矜誰以有待孤城自嬰皇帝曰嘻璮不時下我民是恫武略神機運之淵衷相與謀謨丞相天澤乃拜稽首賊出下籌狶突于苙不死何求繚以巨堙畢克于秋帝曰元老壮哉謀猷其往視師代予以休馬首既東零雨其濛精彩一變氣吐而虹萬杵一動月暈而墉山㫁外援水防内通髙壘深溝俟其自斃日壓賊營雲頽死氣賊勢既窘魄褫心悸鼠㧞其牙獸奔厥角斧偃螳濳鋒推蝟縮七月壬戌環陴内訌賊伺我隙悉甲来攻萬死幸脱突我梯衝相史相趙出竒無窮既敗而壁衆猶嘯凶迨其癸酉有星蓬蓬騞若矢石妖聲堕空因之出降羣兇率同彼狡狂卒不知所圖銜窶鼠竄自投于湖宛轉不死可知其愚童子執戈縛之以趨比梟逆首磔裂其軀并取同惡牽攣就誅林林部曲面縛俟死皇帝曰噫皆朕赤子若蠢何知一從先㫖解甲投戈縱歸田里東際海壖西逾膠濟殺氣一空歡聲四起既定厯城東趣廣固比傅城下降幡内豎凡厥士女無或畏懼取彼逆屬取其府庫市肆農耕按堵如故纍纍婦妾婉婉弱齡三木囊頭来獻闕庭既令市朝咸即厥刑盡頒所獲大犒将旅稛載驩呼各歸禁伍勞我元臣其安爾所視我民政衮闕則補肆赦東方皇恩斯溥録我陣歿䘏我孤苦舊染惟新各安爾土皇帝曰噫􅋕􅋕厯城横燎兇􅀈干戈所厯復其租歛恵賜榖帛拯其昏墊陰伏陽開乾旋坤奠海岱重清一出聖筭奄奄北風讋而逺竄威憺蠻陬東夷来獻盖代稱觴萬口交慶再拜稽首皇帝神聖天錫勇智萬邦以正億萬斯年受天明命皇帝孝友敦序九族有爵有土煌煌車服終嵗燕賜克諧克睦帯礪山河與天齊福皇帝睿哲别白忠直天賚虎臣左輔右弼孰敢予侮為天立極皇帝聖慈約法好生奚取八辟三章更輕大獄之起寜失不經如璮之誅萬死何容罪止一族餘無所從漢制黨錮唐興羅織濫及無辜慘莫之惕天地大徳曰生曰植致討已來帷天是則吾皇之心堯仁舜徳海宇熙熙春臺夀域羣臣歸美度越前古唐平淮西漢滅呉楚以今方之其烈斯鉅規規孝景計誅臣錯岌岌憲宗皇咨于度兵纒四載吳縳于愬惟此齊功五月而成斷以睿筭畀之戎衡皇帝執謙弗居弗處宗廟之靈将士之助敢告成功于考于祖祀事載闕牲牢鐘虡樹羽崇牙應田縣鼔肅雝和鳴先祖是聽神靈曰都嗣皇之英持盈之徳守成之能保我丕祚萬福是膺夀等南山不騫不崩小臣眷眷職司述稱屬辭比事獻芹之誠親覩盛事拭目太平淵嘿無言咎将孰勝冐昧狂斐觸犯雷霆敢摭輿議用垂頌聲賦蛾眉硯賦并序余家所役二硯研磨有年殆與瓦礫不異書生作計朝夕筆研間所用若是欲善其事而不能也宜矣乙卯春偶得是硯於販夫之手質名于譜盖歙石蛾眉之種也噫豈天誘愚衷将為文字之祥邪抑亦有數自王氏而發潛徳之光耶遂筆而賦焉其辭曰嘿齋主人行年廿有九日從事于翰墨将逰心于道囿家畜二硯形模老醜研磨嵗深埃塵瓦缶歎材石之莫遇偶見授于野叟發此秘藏殆天所誘歸予之月卯插其斗從吾囊之羞澁喜溪光之照牖其質圎以古其色緑而黝鬼擲滈璧鏡蝕秦紐太初之面目已露元氣之肧胎未剖涵玉徳之餘潤鑑金聲于一扣其閲人多矣㡬墨翻於醉䄂也肌理細膩豐而不蔀顧溪痕之隱然旋摩挲而無有雪浪翻江映日光走其瑩滑温純之徳誠硯中之瓊玖也若夫蒼文上横眉嫵初就濃抹逺山濯如春栁其横雲却月之状又似開乎成都之畫手質名于譜茲歙石蛾眉之右也予想夫龍山之英歙溪之瀏醖醸㡬年種此竒秀信神物之有歸不圗為嘿齋座中之友也當其書幌晝明筆耕而耨一嘘泫然雲蒸霧湊試墨花於春融覺松風之瀉竇縱未灑薔薇之春露聽此亦足以醒張顛之宿酒也相期百年以介爾夀硯兮硯兮汝名雖異儻浮于寔兮終有愧于屋漏故東坡有云澁不拒筆滑不褪墨兹乃硯之佳焉又何必鸜其目而鳯其咮也耶茹野菊賦并序丙寅春三月予以司明告病避忌食物無可供嚼嚙者家人輩采菊芽為蔬考之圗經味甘平療風熱于頭目極順適也遂筆而賦之其辭曰蹇予投劾而來歸兮守先人之故廬日閉闗而却掃兮殆幽潛之不殊視外物其敝屣兮将游心於聖書何庖㕑之逺戒兮㡬釡中之生魚嗟肉食其無相兮喜盤蔬之有餘潔我晨羞出於不虞擁案未前露香滿裾童子啞然而告予曰兹野菊之方苗適采擷于林墟考之圗經食有益于頭顱也若夫春芽翠茁芳莖碧腴湯沃苦盡鼎調氣濡甘湧舌本味欺園蔬拉晚菘以為友役春蒲而作奴貯空腹而不厭恐落英之不如彼寒花之可愛寄髙情于一壺縱傲睨乎秋霜踰佳晨而日踈此方騰藉春陽中拆而敷收微生於全體供野人之所需吾乃瀝芳馨而三嚥覺眼花之掃除其氣平夷其樂舒徐豈一杯之野馥等悦人之豢芻雖草木之誑口亦因兹而起予世有啖糠覈而瓠肥厭梁肉而黒癯豈非適於口而心苦濡以膏而體劬吾知甘菲薄以自樂能充恱其體膚既而隠几㝠坐心明志虚佳境翛然恍與夢俱以神為馬以凥為舁既發軔于菊潭或弭節于山隅訪淵眀於栗里尋天台之隠居然後鼓東南之歸枻追散人於江湖覺而賦之猶足以續離騷而弔三閭也未央瓦硯賦贈終南李錬師和甫斗直寅日維酉栩栩蝶化夢入靈囿覺而扣門有來𤣥叟投我天硯形圜色黝鬼擲滈璧鏡蝕秦紐文章鬱嵂蛟蟠虺走以長樂無極而言乃漢殿燼餘之瓦首也當其炎運天開禹卑秦陋未央屹建長樂丕構體紫極之圎方壮神麗於九有俾子孫無復加于後也若夫萬疊雲浮跨凌天宇鱗影參差鰲背掀舉瓊綴簷牙香團桂樹倒景激日馭之光流潤浥金莖之露聳萬􅀦之衣冠蔭千秋之歌舞礪太華而帯河渭謂斯瓦之貞固天落妖彗一掃而去咄爾微質歸復其土何千嵗而不化偶野人之與遇今歸乎我又係厥數摩挲漢月碧花燦吐似喜余之主也試𤣥蛟兮海運瀉松風于牕户滑不墨褪澁不筆拒然復其天則御陽周宣王宫名之耳孫較其古乃銅雀之鼻祖彼鸜其眼而羅其紋咮則鳳而形則闕用或闕奚足取是不若兹瓦之闕而闕屋廕生聚帡幪霜雪蔽虧風雨是則用得其所付大任于汝也豈其棐几呈材辭客與伍處雖失宜其功尚溥鍜我銛鋒藉汝涵湑乞英靈於班馬鑑興亡于今古大書特書猶足以旌朱游而削張禹也道士顧笑吾子其為我賦之三峰晴雪賦并序乙亥嵗冬十一月余以守吏将事自蒲抵華倉皇待命于塵坌間望三峰晴雪煥爛髙潔皜不可尚已顧而自憐豈勝慚穢適與左山商公遇于祠南柏行間歸作是賦以寄其詞曰華於衆嶽峻極莫之京兮三峰絶觀松雪益其清兮倒景旁射銀闕爛峥嶸兮仙掌翻空灝爽下青㝠兮豈玊井蓮芳仙遊擁霓旌兮巨靈變現咤崑丘之瓊兮金天移仗敞瑶華之宫兮冷飇吹而不滅海月照還空兮軒豁呈露何物外之雄兮又如螭蟠之老子與希夷之鉅公朗出天表飲太泉而遊封中兮安得杖仙人之九節登神丘之崇兮問真源于白帝追二公之踪兮胡一行而作吏搶塵土之容兮對清都而不克往世故驅以東兮掉塵鞅而北騖刺梗滿吾胸兮望岳神而三歎歸夢挂岩松兮縱靈移之罔誚獨不愧于躬兮歸而賦之吾言固誇猶足以為執熱者之清風也熙春阮賦并序𤣥暉上人得隆徳故閤餘材斵而為阮因以熙春目之亦文殊之義也至元戊寅春同寗尹端甫劉御史叔謙趙太博彦伯坐心逺軒師為鼓緑水悲風二曲清越悲壮坐客感歎興亡有愴然于懐者師請予賦之其辭曰天新雨風日妍心與閒㑹境趣静便拉曠懐之逸士過雪菴之老禪歛袂危坐添爐注箋於是出桂阮調素絃控朏月而當抱撫筠柱之横駢師曰兹熈春之斷餘偶絲之而清圎者也遂鼓一再行清越悲壮如泉咽水底風行樾間翛翛兮欲斷而復作淙淙兮似潄而還湲鏗爾擿銅丸之韻淒兮聆髙樹之蟬又如游士騁説劒歌去燕何辭氣之從横激太清而沈羽淵客乃呀然而驚慘然而悲信乎物之感人有不期然而然者想老徽之般樂盪侈魄以無前厭華陽之湫隘敞樓居而致仙海鼇首抃金鵬翼騫鬱鼎蓮之香霧鎖月殿之嬋娟蔭千秋之歌舞夀艮岳而不騫俄龍移而鼎去繼金亡而閣遷殆露槃之聲折悵秋風而涕澘興廢一瞬兩朝百年委繁華於野草鎖莽苑之荒煙咄此木之何幸遇幽人之達觀納須彌于芥子寓餘哀于一彈猶足以舞魚龍于海曲洗亡􅀦之愁顔也嗚呼噫嘻向之使人凛而悲者物詎能動于人哉人之哀樂妄為物之所牽不知太虚寥寥既寂而𤣥唯此理之嘿識何繁華廢興之足歎師曰子其為我賦之吾欲秋月當户松風滿軒寫仲容之别操合清商而洞宣使雲陰蔽空古鶴下蹮走商延於濮上掩新聲於師涓也弔亷将軍墓賦并序三代而下功利之説興人臣擅恃功能鮮以禮譲為􅀦者觀頗挾勲内忿忸居人下加諸彼不淺乎相如引車避嫌有犯無校盖出天禀粹然處之為非艱至頗聞先急一言遽能握髪數罪受責門庭在将臣為寔難若将軍者可謂不逺而復得無祗悔之義哉遂摛文以弔辭曰渉滹沱而北騖兮遇常山之故城何髙丘之突兀兮鬱劒氣之峥嶸野人指而告予曰此亷将軍之封陵也人與骨而塵朽兮義於粲乎日星遂陳辭而弔古兮命僕夫以停征嗚呼休哉昔伯禹之所以聖兮始不伐而不矜秦誓之所以經兮善悔過而胥盟觀戰􅀦之多士兮依稀猶三代之英惟功利之時尚兮天理有時而蔽眀能不逺而復初兮其惟趙之亷卿方􅀦都之中立兮資内附而兵精頗分閫而秉鉞兮騰茂實而蜚英聲梁從隨而楚讋兮燕弭伏而齊并時有以卜将軍之意氣兮殆雷動而滿盈遽相臣之出右兮何發言之盈庭㡬肉餧而食甘兮奮兩虎之必争及聆先急之一言兮輙弭耳而服膺復頓顙而悔過兮折節負贖罪之荆在引車而不必多兮将臣及此所以為古今之難能也逮漢起而帝稱兮禮飲至而策勲何諸将之失度兮至擊柱而紛紜安得将軍從容為一言兮解販繒屠狗之棼彼臣濬之冒窒兮加充渾之貪蒙詫呉平於帝前兮互貪天而為己功安得将軍滌易其褊薄兮俾無成而有終嗟鄂􅀦之列公兮挾勲勞而凌帝宗縱私忿而無忌兮一墮夫臣子之恭安得将軍北面而同列兮以中和之氣銷悍戾于未然之胸也雖哀之而不能鍳兮文空言其奚庸繄慨慕其耿光兮日三省乎微躬蕩吾伯夷之隘兮擴乎穆公之容希前賢而同升兮負驥尾而竭忠雖斷斷而無他兮庶㡬廪廪徳譲君子之風衝山煙而暮去撫鳴劍兮増雄登常山故城賦我登常山心慨歎兮斷城連絡蛇陳蜿兮憶當全盛兩漢間兮萬井歌吹魚龍淵兮椎埋劍擊習俗然兮光沈響絶夫何言兮有懐古人秉心延兮交如餘耳始足賢兮烈如顔袁抗偽燕兮垂光竹帛星日懸兮壮哉子龍屋而祀兮膽氣滿軀勇夫志兮賊瞞臣漢得所事兮天理在人一符契兮千載仰止初無異兮諒彼有立忠與義兮鶴媒賦并序中統二年予在上都掌記中堂客有負青障挾長闕二鶴馴于後以廪繼來請問其役曰以鶴取鹿者也嗚呼鶴善類也喙雖長不鈎銛以噬爪雖巨無􅘆指以攫而於麀伏容有忮害其如人之不仁何至元壬午偶與禮部王兄子晃因話及此慨然有感曰今人以智計相傾内險外易者何殊於鶴之取鹿也作鶴媒賦其辭曰萬物者元氣之盜氣之靈者莫人若也既役物而君之其忍以盜作智而為得計乎如絓塵草間圗鷓絜地胔紙求蜂葉城網雉盜物矜雄此何足異以智獵愚理固宜然用愚戕愚斯則不仁之極也鶴本善類與物無忮飛翔寥廓仙游之驥教之羽舞已違元性詐以摽鹿遂戕彼命是則鶴之善人則用而險之返有過於機穽也鶴了不知鹿終弗悟嵗供庖厨皆鶴之故何殊人心内險外易以詐假仁顯比陰忌将取彼有則必姑與彼昏不知日狎而伍一落其機投足無所誠何異以鶴而媒取也吾然後知物之顯暴者既得預而防之愚而深中者尤不可玩而侮也示我同志筆而賦之元猿賦并序效庾開府體至元十七年二月己卯清明日陪經畧助祭丞相忠武公墓適嗣侯平章稽自静江籠致是猿以獻西溪王通議命余賦之以紀竒觀其辭曰寳符之野滹沱奫淪人初樂嵗華新峴山正有墮淚感走馬逺出西州門映堂堦之碧草陪開府之嚴禋覩萬物之來享宛有勝于攸聞繄爾猿之黒質尚其性之能馴素面掌許𤣥裳若纁尻不識尾臂長于身一動一静既恒且仁澗飲岩棲有彝有倫木方華而不折菜視熟而呼分思全生于物表時隱見於冬春三峽秋月九嶷暮雲雪嘯煙啼子從母奔動射者傷弓之慘驚山人應聘之輪哀楓林之逐客助永夜之霑巾其或隱挂虚壁幽尋窈㝠避羣猱之喧躁悟善惡之難并去王孫而夐絶誠可愛而靡可憎也故或者謂衰周之士夫從昭王而南征痛膠船之不返化若類而成羣恐此事之戃慌伊誰問諸水濵淡夕陽于平野送歸鞍之逡巡偶吐辭而為賦念此物之貞純或體𤣥而尚寂要擇善而相親以升木而取喻庶有感於斯文蟠木山賦丁亥之冬夜氣清淑夢遊石林萬玉崷崪明日與客步入李叟叟字希賢之塾燎爐却寒有蟠者木輪囷離竒大屬吾目負之與歸而為秋澗坐中之物其為状也左抱右擁或疊或窪蹄股交峙口鼻互呀於是抉洞穴振泥沙分嶺嶂翦杈枒坳者壑突者丫去朽剔蠧磨光出華丹丘赤城凌空散霞不知沇洑於地中者㡬年一旦聽吾喙之横誇若乃峰頂改色湧雲倒懸岩崦層出峽門洞穿刻畫嫫母與施并妍其磊落盤錯自一成而有足觀也咄此怪供强名曰山然為幸也盖有大于是焉不腐而為朽壌不化而為飛煙收槁梧于爨下遇中郎而獲全蔭居華屋之底植立几席之前聳太華三峰之秀有象江六石之堅終日與伍似非偶然徙倚蒼精之盖摩挲白鹿之巔何澹僻之苦樂掇衆人之所捐吾愛夫始賤而終貴先汚而後蠲出神竒于腐朽蜕凡骨而得仙者也噫以静而致夀者山之性隨帝而出震者木之權唯動静之交見渾體用於一源吾固衰謝拙于變遷以静為樂以安為便藏吾所别之器浩吾固有之天守介節而不易庶兹蟠之可鐫安時處順出艮震兩者之間不然造物者憐其不材辭翦伐而終天年其将與惲周旋孰得惡而舍旃客曰汝言雖夸以山木而較之似不膠于一偏子其為我賦之若足以折詭辯於荘叟發新意于老泉也秋澗集卷一欽定四庫全書秋澗集卷二元王惲撰
