body:
  text: 七言絶句寄張孝先愛而不見我心勞好在天池刷羽毛一曲紫簫風露冷黒山無際月輪高寄贈王嘉父十日休閒一到衙冷官滋味賈長沙醉歸多趂湖南月馬上披香直到家送王子勉天壇行香山川望秩走星軺藩府懐賢夢想勞不為碧鷄金馬異漢家優禮起王褒蕭徴君哀詞東瀛先生有道之士也余以里閈故獲展履綦之拜葢十有一年矣今茲云亡謹摭其見聞之實作追懐之詩六首姑逹乎感慨云爾圯上求書約重過豈期遐想仰山河適來適去公常事親見先生曳杖過含悲空炷影前香風袂泠然返帝鄉鶴馭不來塵世隔芙蓉城闕月茫茫李白長鯨汗漫期秋山魂冷未來歸傷心執紼西川路何止羊曇淚滿衣欎欎佳城晝不開玉霄東望靄蓬萊空懐華表城頭柱㑹有他年化鶴來萬事生平委自然竹風松月共清圎衣塵纔拂朝元去忍向人間乆棄捐樓觀纔成人已非身前毫髮恨無遺空餘讀易壇邊竹露葉青青若淚垂比干墓玉骨琅琅盡古丘凛然英氣尚横秋朱游訕訐何為者敢辱先生地下遊雪夜暮雪紛紛亂掩忩牀頭無酒只空缸壯懐俱與爐灰冷惟有詩魔苦不降旋呵凍筆吟氷柱急掃風花煑夜茶客去焚香閉門坐小齋初不羨山家八月十四夜與雷彦正歩月秋聲入户夜蟲多辜負金樽漾月波燭暗香殘人欲去滿庭風露影婆娑車水鏡中流水畫中山酒盡銀缾興未闌碧玉沼深人不見栁花飛度翠琅玕夜過滑州黒悄軍聲動地來魏人宵濟宋師迴而今一統無南北月下摇鞭過滑臺跋龍眠二駿圗玉塞沙平苜蓿繁渥洼春水泛晴瀾幾時扈從長楊獵一片紅雲拂繡鞍漢家天子狩隂山萬馬憑陵汗血殷早晚華陽春草地兟兟得似畫圗間美人却扇圗寳檻承恩妬露華背金翻日羨宫鴉幽閒好備關雎徳望絶羊車失自誇絶代佳人擬罕儔幽閒無夢到河鳩春風静鎖昭陽院落盡庭花轉自愁游瓊華島中統元年作鳥語山容喜客來耿純襟抱若為開六龍冷駐隂山雪暫擬層巔作望臺芙蓉水殿紫巖松六月雲蒸比雪宫樂部不聞清夜曲舜絃聲裏詠南風蓬萊雲氣海中央薫徹璚華露影香一炬忽收天上去謾從焦土説阿房五雲仙島戴靈鼇老盡瓊華到野蒿惆悵津陽門外去春風飄亂酒旗高大定明昌五十年論功當出漢唐前儘消一島承清讌且置堯階頌采椽躡盡寒雲最上層土花春碧夢觚稜江山如畫人空老更倚殘陽望道陵玉樹歌聲繞北墟朔風吹恨入南都六鼇不戴三山去留與都人泣鼎湖光泰門東日月躔五雲仙仗記當年不煩細讀江南賦老樹遺臺倍黯然杜莘老荒山訪友圗隆中人有鹿門期梁父吟餘獨杖藜殆似老龎歸向晚釣船猶艤暮江西秋懐效樂天體閒書遮眼睡昬昬飽食無茶腹自捫斜日倚門風乍起滿庭黄葉擁籬根早起星河黯淡湛𤣥雲露下庭柯落葉紛夜氣逺從天際斂秋聲時向樹頭聞冬日與吕丈讀毛詩二十二首婦道防閑貴有初文姜失御從雲如何殊笱敝梁空在秋水誠多得計魚敝笱服御鮮明擬大君轔轔轂撃汶陽春載驅既匪勤王事隠惡能無播萬民載驅濟濟儀威美且都詩人流詠入嗟吁齊家為失防閑禮禦亂無多金僕姑猗嗟為國規模以徳將恬然風俗入安疆新婚服襋既匪禮葛屨淩霜尤失常葛屨汾水悠悠宛一方條桑採藚僕夫當誰知粲粲軞車子終日傾筐沮洳旁汾沮洳得民方可固邦基此道幽深莫我知却憶賓庭陳百旅棘桃猶足備多儀園有桃地狹民稠十畝間來歸來逝共閑閑何當一復周家制各守封疆絶往還十畆之間邦畿蹙近四鄰侵行役無時怨抑深陟岵遐瞻私自慰倚門應甚望雲心陟岵不畋安得獸懸門匪稼胡為禾積囷但恃鄙貪居禄位不能無愧伐檀人伐檀碩䑕歌詩怨已成三年貫汝未聊生熈熈彼土雖云樂猶抱遲遲去國情碩䑕皂綈示約人從化玉樹歌淫國旋空蟋蟀戒深垂萬世由來奢儉貴乎中蟋蟀隰原尚賴樞榆䕃人主憂勤貴一身堪鄙晉昭徒自苦只將鐘鼓樂他人山有樞粼粼白石水揚揚宗國由來日盛強本末倘從師服諌争教耦國似田常揚之水沃土分封自晉昭子孫蕃衍喻園椒大夫休起盈升嘆宗本顛披爾逺條椒聊束楚綢繆仰見星時危婚嫁禮難成却思王季興岐日内外俱無怨曠情綢繆骨肉凋零失所親徒行踽踽一身存不如杕杜春前樹枝葉猶能庇本根杕杜服御羔裘豹餙袪國人不恤反居居豈無他所攜持去恩好猶懐未忍疎羔裘孝養庭幃士乃常反教執役事戎行悠悠仰面蒼天𣺌失所何如鴇在桑鴇羽晉國流風屬變攜武公反正思依依誰知問鼎傷肩際肯獨尊王請命衣無衣道左漙漙枤杜春清隂猶得庇行人國強須賴羣賢輔孤特何為任一身有枤之杜蘝生蔓野葛蒙枝女子從人得所依衾枕未温征役逺庶幾百嵗願同歸葛生晉獻聽讒似采苓竟從微隠殺申生後王采察能明逺譖愬雖多自不行采苓梁園對月兒時曽住汴梁城二十年來重此行一片鳯凰池上月向人還似舊時明過蕩隂東周留村一灣流水麥青青楊栁隂中野彴横幾樹桃花如舊識隔溪無語笑相迎喜蕭茂先得雄未聽啼聲骨已奇桂林安取野棠枝老髯嗜學初心在剩備箱書付阿宜滿紙新詩羨寧馨慰心尤喜老來情夀兒此去如春筍玉節亭亭脱錦䙀夏夜野雲明處電飛光海縴青浮落日黄想得近山多雨過滿庭風竹月波涼夢中賦月燈詩風外筠竿倚暮烟忽驚羣日帝堯年天公兩眼何常暗底用分光照一偏遊泰山雜詩胚融萬化羣龍首丘垤諸山五岳宗遺草茂陵欺後世岱神何意望東封祖龍東巡擅雄豪風雨天門幾遁逃虞帝不來天自老秦碑空倚禪壇高衆山迤邐朝西東帝孫突出天之中巨靈不劈蒼崖斷雖有絶頂誰能通何年氣母此融結大小天門五十盤三峰自是神明觀漠漠隂風走石壇岱宗巖巖靈氣宅雲烟物外争新奇世事難必有如此吾欲入海從安期綰茁元氣通滄海霧湧雲蒸一水山五十連城望霖雨少分餘潤到人間萬壑璚林映碧崖雲間三頃欎霄臺摩挲御帳殘松樹曽見秦皇漢武來路從御帳北艱屯松頂雲癡日脚昏上盡曲盤十八折仰看猶自有天門盪胸滃欎隂雲生行出天門路漸平脚力有餘中頂近徘徊應為紀山銘朝暾爛爛烘層巔天門直下屯蒼烟乾坤故為作開闔世界幻入兠羅天何限詩人不克登杖藜直到最高層壁間速即留題去雲起封中冷不勝東山何高四十里萬古通天只一門不知洞府深幾許宿雲無數儘雄吞雄觀駭絶東溟日逸駕高於北海鵬更看山靈出奇貨千巖蒼雪玉稜層雪林虎跡過新蹄石磴雲霾歩歩低多謝山靈相擁護一杯無事到中溪中溪神祠名在山門口贈相者李吉甫仙機分自洞中春閲盡長安市上人留取神光牛背上要其著眼過天津跋豐稔還鄉圗廟堂真宰拜姚崇斗米三錢四海同今日太平應有象畫家消息恐難工過邯鄲層臺高與暮雲齊全趙河山入望低貪和野花雙塔句夕陽又下故城西我自驅車下九門眼中襄國動吟魂從教兩鬢渾如雪猶喜歸來故歩存黄粱夢短不須驚滿馬紅塵過趙城獨上荒臺重惆悵野烟無處認温明題雪谷早行圗頭痛風災萬里程行人何限把雙旌犯寒休訝征車早冷嶺東邊是帝城新店看山望京樓喜入關南百里川朔風邊雪頓醒然夕陽欲下蒼烟起看盡西南破墨山秋雨靖山道中一重一掩吾肺腑老雨荒山記北還人在碧烟深澗底仰看元氣擁雲間酌百泉水去時蘭佩惹春烟歸日羸驂跨敗韉賴有百門山下水療飢猶可度終年偶書郝卿持節使江臯子勉翺翔主御曹我幸閉門無一事醉餐秋菊讀離騷跋司馬温公燕處圗獨樂園深百草香一編心與道相忘不妨臥老琴書裏破散青苗有百章道與晴雲任巻舒心存廊廟跡江湖石君被譴公孫死轉愧先生燕處圗擁馬留公作帝箴人心大抵是天心惠卿未死舒王在一集傳家了古今壬戌嵗除夜坐乆虚忩夜氣澄未容心事淡於氷滿襟忠血傷時淚㸃清光教子燈春風萬里圗人間塵土日紛拏流水空山半落花自是道心游物外不須誇誕説流沙蓮社圗二首人間廬阜東南勝兩晉名流最賞音阿麟因之出新意秋香和月冩東林鬢絲禪榻喜相同詩在秋香月影中千古風流社中客不隨江月照還空跋滄江待渡圗朝醉新篘暮錦鱗一篙獨占上游行且休熟睡秋蓬底無限津頭望濟人隆中高臥恥為邦雪裏呼船渡晚江耆舊幾人堪晤語徑須特訪鹿門龎贈别王晉卿漢署千官列鴈行九天獨被繡衣光布衣自笑題詩客空抱澄清望八荒青鎖仙郎被服新寵光千丈爛盈門何時得侍紅雲表竭節同酬一命恩劔履翩翩趣北歸秋衾日夜夢彤幃長楊輦路都門栁恰及飛花㸃繡衣挽蘭同知進之留心藥籠縁多病厯任鄰藩便暮年回首西州門外道偃然長寢兩相捐行年六十不為殀貳政三州有足稱伯道有兒終抱恨夜忩無及讀書燈一丘黄土清溪曲三尺蒼髯六十身千古桐鄉遺愛在只須秋草臥麒麟得調澶淵幾載考自營墓穴已三年幾回對客親曽説埋近清溪性所便翩翩老騎赴征車前日東城别路隅酒榼素筝今寂寞河山依舊繞黄壚戊辰後正月七日雪北風一雪麥田空坑谷堆平滿棘叢近日化工無素物總將春色到蒿蓬戊辰門帖子安分愛尋蕭逺論廣騷慵讀楚臣辭里人莫訝三冬蟄一寸丹心用有時送劉主簿文逺赴都仕途坦坦駕輕車殆似劉君赴部除不枉洛南温處士半生清苦待徴書終南㨗徑霾荒靄吏部銓衡到至公相過不須論出處季鷹門巷幾秋風除官限自三年例計月須憑一考優聞説聖皇思治切夢賢無夜不岩幽貢璧輸琛買喣濡萬言不博一除書秋風兩戒河山底自把鋤犂計未疎求官自古近長安格法如應事不難説與磻溪溪上叟且須寧耐把魚竿題薛微之遺安堂静思富貴履危機醉著人心死不知愛殺遺安堂上客此心還與應門期清樾蘭臯百畝隂兩椽精舎倚雲深一鞭春事東風裏劉表何人識此心因題前詩偶書山林長往廟堂居一襲時衣飯兩盂温飽較來均大槩忍尋機穽博頭顱挽趙教授公浄目擊冠裳一老儒争教滄海失遺珠細思晚起山齋語地下修文事本無淵源分派大中君偶讀殘碑得古文河潤秪能霑再世不須回首愴蒿焄儒林游戲入禪關晚節浮沉里社間異日衛人徴故事為公援例取香山辛苦生平篆刻勞也霑汀草亂春袍有兒不肄中郎業却是先生一著高是是非非到葢棺誤身無似戴儒冠蒼涼一片空山月照徹先生苜蓿盤生理蕭條奈老何春風著處是行窩哀歌偶及生存事却恐羊曇淚更多因著圗經大起予發揚潛徳到幽墟案頭幾卷遺編在愛惜過於汲冢書跋申達夫藍采和扇頭一踏高歌了世縁春風兩袖地行仙無端忙殺癡兒輩貫朽都來有幾錢謁梁太師王彦章祠太師祠廟汶城西塚土纍纍日漸低唯有英聲消不得至今高與泰山齊雨後溪田即事朝來一雨曙光微高樹涼多露未晞喜約老農來看稼不辭霑溼芰荷衣清寒墟落漲秋濤溪上行吟樂已陶洞口未容烟鎖斷更須時上武陵舠平明新漲復溪痕曉月摇光映棘門騷客不愁漁箔短縱教魚鱉長兒孫三年耕養一經通水旱豐凶更在中貢法不來神聽逺此生窮逹仰天公種樹書殘倚釣竿日長微暑喜清寒華堂去水無多地雙足時來踏碧瀾録役者語十人供役二三廻困似車輪半道摧眼底去留生死隔争如先作陌頭灰士戰何年是了期為王從此不知疲一門親削宣尼筆為國勞民貴有時一夫詛祭九魂知護我南行爾亦歸惆悵桑乾河畔月至今寒影惨無輝或云河南役夫既罷歸九者皆殁其一負衆骨而西渡盧溝因祭而祝曰今汝等既歿我幸獨全抱汝骨以歸汝等有靈當佑我使與汝父母妻子行相見也其人前次范陽亦病死工無役鬼必勤民萬雉功成嵗月因從古有庸三日止未聞膏血化灰塵今春疫氣是天災百日為期力儘能三尺席菴連雨夜杵聲纔歇哭聲來火中渙汗土中蘇却被車轟殞半途六月炎風一千里大河南北看巢居病骸困苦自知休叮囑同行瘞故丘父母秖知安健在計程今日過盧溝父來接子值同途欲話渠儂涕泗俱昨日道邊因困臥不知今日有還無病軀甫瘥須扶護趂伴貪程日夜奔大半殠遺多為此故鄉歸去有殘魂蕩蕩王城玉削裁青山三面壯圗開興功計産能中止狼籍春風一露臺數口為家尚聚廬一王經野古良圗限期百日非為逺部役羣工事太劬觀風浪中回舟風蕩輕舟一葉迴望中掀舞碧濤堆舟人若解臨觀恐迂緩甘從逺道來清溪晚眺洲渚横陳水退餘兩行風栁映菰蒲暝烟誰踏扁舟去望際漁燈一㸃孤題陳徳秀東臺手卷井落星躔一炬殘市門留入畫圗看祇應千載東臺月長照鄉人説社壇至元戊辰應聘憲臺留别淇上諸公夢中得金馬門中金馬臣銅駞巷陌嵗華新閒雲也被風吹散去作千門萬户春竹林幽隠圗西晉風流號七賢筆牀茶竈共林烟􅄞琴響絶千年後喜見清風一再傳清時有味此閒身不可一日無此君著脚嵗寒堂上去秋風門外葉繽紛蘇嶺桑麻杜曲田嵗寒誰似見君賢嗚歌不種南山豆千畆風烟學渭川昔賢愛竹與竹友出處總得高人名今人未著林頭屐里社歸來晝錦榮共城瀟洒似江南萬竹幽棲老所堪李沆似為諸子計北山先掃讀書龕烟雨溪南百畝春盡將清景屬閒身河山不隔黄壚斷却恐功名老逼人春夜獨坐讀書聲歇燭華殘潤入琴絃覺夜寒寂寞小忩雲影薄隔簾梧葉雨聲乾仙遊曲五絶春山雲白紫芝肥嵗嵗征騑動漢儀政自修身傳治本不縁幽睡試希夷鶴護龍香醮夜壇露桃花影記驂鸞碧雲暮合秋空逈石上清風漠漠寒庭竹無人緑滿忩幽香和露溼霓幢日長孤絶壇邊鶴啄徧晴苔影一雙漢家拜望竹宫壇環珮聲沉碧落寒遥憶受釐宣室夜一言前席萬方安金簡朝元擁玉華碧壺香滿謫仙家石壇冷桂銀潢水㑹待秋風送客槎六度寺荒村到寺纔一里古屋懸崖廢幾間從此重經題品過衛人方識有壇山山下石田百畝餘子孫眷戀祖來居向人争説新官好二税輸來雜泛無縈紆一水蟠深澗野叟何知説太公壇下古碑堪晤語大書深刻太康中太行東麓太公泉喬木蒼烟擁壊垣千載秪應尊有徳不須深泥竹書言老鶻餔雛百丈崖羽毛纔鷇獵人來孤懐牢落風埃底何處呼鷹是故臺聖泉流潤過南村共説來年雨水匀山若有靈能假手六花先壓壠頭塵支撐佛宇老風烟嵗月仍題聖厯年零落亂山終悵望捫蘿應欠入香泉先子能聲以吏聞生平游戲見詩文遺書忽入孤兒眼淚洒西山日暮雲鷹揚來自鎬豳西草木荒山壁壘低賣食解牛真妄説斷碑明指是殷溪山中宿麥苦無多喜見團科際雨坡縱未庸收終有望入城容易掲差科同劉勸農彦和葛縣令祐之遊蒼谷口四山遮盡外來風山崦人家不覺冬獨立蒼崖重回首山形渾似入居庸夕陽西下暮山稠崖下蒼池似炭湫把釣不愁雷火出品題應為此山留近山風俗果温純知有從來縣令尊癃老杖扶争致語不嫌山野過柴門山神説是宰官身野老争來話本因採玉得仙俱慌惚至今功利及斯民九龍分部中天雨何處癡蟠睡不開一勺鳯凰山下水有時風雨洗天來方山忽斷兩崖開中有蒼河自北來行出山門俱不見玉龍翻作地中雷不須犀火瞰蒼灣萬古幽隂鬼所寰山下黄塵三百丈巢居安忍揷天山地爐火在壁燈昬睡覺山堂笑語温豆粥一盂官事了緩摇吟轡出山門贈星斗客冷景發六甲星躔入苦心術窮滄海别穿深滕王閣上三盃酒曽博相如換賦金萬類芸芸固不齊一推能盡未來機向渠待闕福早晚台光映紫微炯炯雙瞳楚語紛闖懐隂穽失崖垠坡仙有句堪書贈醉裏微言更近真有命何曽論智愚班超傭筆衛青奴自從遇着洪都客豁得胷中俊氣無半生心事苦蹉跎其奈胷中不朽何鳬鶴短長俱有數魯卿三昧聖之和遊霖落山雜詩東山削出翠芙蓉西壑㟏岈貯雪風人説魏王曽避暑殿基猶是舊離宫嶐嵸悲臺倚寺西山空留在舊禪扉老猿呌月蒼烟去曽伴山僧夜半歸青山斷處塔層層廢殿臨崖枕虎形千丈畫屏宜晚對野烟飛去助空青絶磴穿雲老蘚蒼捫蘿行到贊公房寳香今徹華嚴壁木客猶誇夜有光滴乳巖前挂瀑流青林飛洒動高秋玉龍躍入青冥去堆疊蒼烟萬壑愁秋澗集卷二十四欽定四庫全書秋澗集卷二十五元王惲撰七言絶句
