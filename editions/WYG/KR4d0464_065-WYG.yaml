body:
  text: 中林有烏辭唁姨母而思親也哀哀母氏壼儀光兮我鞠我育其勞昌兮植思静佳風飄颺兮顧惟蒿蔚擬蘐芳兮菽水奉歡其憂忘兮母恃子豫亦所望兮一朝致樂初未嘗兮夜夢見之晝微茫兮嵗月逾邁拱木蒼兮履此霜露中心傷兮我行宗城如渭陽兮瞻戀姨闈自不遑兮展我孺慕聞母香兮贈乏瓊瑰幣帛将兮枝同氣連何殊於幽明間兮庶幾母心慰下泉兮中林有烏翩其反兮情極反哺鳴聲應而􅚓兮可以人而不如鳥之志兮别淚盈睫下霑袂兮停雲在空浩無際兮我思母氏曷有既兮哀友生季子辭并序中統五年甲子嵗夏五月廿有九日晝漏盡三十刻府從事周貞以友生季子之喪来告聞之驚怛廼為輟食因憶予弱冠時始識渠于教官張文紀學舎性資純雅似不能言者叩其禮經皆能成誦于口既長從泌陽趙公業詩賦故日夕翺翔相得為甚狎逮壬子秋顒軒徒單公自甯来居曰今而後執經問學吾知所從矣於是摳衣席下大玩厥辭含章既貞士論乃厭毎自嘆古人讀書患其無書今人置書不觀何居乎必廣萃羣書使之滿家而已及三史甫畢而病嘻學之難成也如此可勝嘆哉子天性孝友為人簡静不羣喜作詩其較量體格推敲聲律有過人者然識者以骨清而癯耳小而傴恐非夀相也今年春顧見憊氣烝出顔間僕謂曰子殆病矣不然何神與氣索然無光耶子少休學本潤身守身為大吾子其慎之既而卧病在牀以迄于死初其父命其子曰而吏而商㫁不汝為惟士與農廼所願學吁為父者可謂知其子而得其教為子者可謂盡其孝而養其志者矣維其天不假年聲光潜窒不少白於世是廼可惜也於戱天道無親常與善人若季氏者可謂一門善人矣遘罹㓙極一至於此天之報施善人果何如哉予不得而知也噫武死矣非文曷以攄予之哀而見若之志如李觀歐陽詹之不幸終復聞於世者以昌黎之文故也君諱武字子文世為青齊人夀三十有四遂掇毫寓哀以抒其辭誄曰猗嗟季氏以善傳兮種德及嗣培福田兮父母之心一何賢兮子奉以行周且旋兮學根於心浩浩天兮再世而昌其流淵兮有物忌媢坎􅇄纒兮云何不淑遘此邅兮自古有死豈子然兮維卒不施涕所漣兮哀哀父母白垂顛兮狎于弗順葢子棺兮東城之野子之原兮悲風瀟瀟淇水寒兮㳺魂一去不復還兮永矣無聞閟九泉兮反袂拭面慨其嘆兮禍淫福善此何愆兮天道悠逺疑其無所聞兮其脩與短不幸之間兮嗚呼哀哉夫我何言子所安􅀆故中奉大夫浙東宣慰使趙郡陳公哀辭并序至元十四年嵗次丁丑秋中奉大夫浙東道宣慰使陳公按營田東下歴明逾召九月七日歸屯新昌為賊姦所乘遇害嗚呼哀哉公未殁前五月予夢公柩轊而過衛再夢坐越府上望公而不得接後閲月復夢把臂談詠如在試院中時第霧氣盪胸終不覩其面明日卜奉常宋君不吉曰後幾日當有惡報至予魄動而不忍聞既而公故吏張永錫以訃来告乃審公之所以亡嗚呼哀哉初癸丑嵗公侍謀于漢邸聞走名而喜之及尹洛師一見如平生歡至元三年以邦伯釐衛日夕得㳺從燕處為文章徃復時或持論古今傾底裏無間至於振衰礪懦視予志殊鋭四載間猶一日也後五年予自裏行得調公亦移鎮河湟自是不相覿者五易嵗維十有三年夏四月壬辰胐堂移考試河南得式公行躍躍不能寐遂自梁抵申由宛葉入洛而竟事於汴寢飰㳺居不斯須離者餘七十日公以平昔出處素所藴而毖者一彂而盡於予竊壯夫志𢎞而毅氣剛以直學切而有用器逺而足識皜皜乎有不可尚已者及祖帳夷門酒酣歔欷悲不能訣去至揚觶而歌曰孤忠耿耿信不疑兮匪席匪石可卷移兮與子論交乃所期兮日暮途逺将何之兮彼蒼悠悠其聞斯兮予上馬歸念且訝其遽如許也嗚呼噫嘻公今死矣予尚忍言哉或者以玉山賊門庭冦也終宋亡而不克揃新昌下邑也惡而無所頋盍去諸予曰公之不去者以弭禍亂懐新附分也事不辭難患不苟免志也去之民何賴焉賊或有知使洞貫之誠一言開悟于以窮根窟掃餘孽宣威海道以靖東南在公為弗難不幸擁馬直前言未及諭而兇鋒閧加葢公之所能者天也其不能者命也嚮使因鼠輩而喪厥守以偷生而為得計名節委地坐眎民殘豈公之志也哉况公生平忠誼表表審量素定晚節操履益堅其遇當行可為得少伸抱負分一死乆矣昔顔太師知賊狀已明将命而徑徃李司徒視逆刀交下握節而不去二公之甘心劘躬者正以忠烈之氣寜以一不幸遽可慊然於其心哉今以公事節槩之不少異矣然不使公從朱雲王遵瀝丹衷於折檻之前抗忠諫於伏蒲之地奈何徒死道路纓絶於穿窬之手此士論共惜僕尤哀而為之辭也公諱祐字慶甫趙之寜晉人固窮力學工為詩尚氣能道所欲言節齋其自號也嗣子䕫繼請兵討賊得害公者七人戮越州市次子臯扶其喪𦵏北邙之新阡其辭曰維天降材深有謂兮清明萃躬經此一世事兮伊逢昌辰臣子尤不可易兮鴻毛沛夙宜乎奮厥翼兮百纔幾施有物訶以忌兮固窮善道退而甘所棄兮何縻以好爵足将進而躓兮擠之禍賊天胡為而厲兮俾姦惡者何所懲忠善者将何恃兮豈福善禍淫之戒持或撓而弛兮豈命數一定善惡闕而致兮豈一氣偶然乘之者隨所值兮不然何厚其所可薄而賢者莫錫類兮嗚呼言至於此天道悠悠此心盡而俟兮自古有死死非以義等草木之敝兮堂堂節齋明是義兮夫我何尤公所求兮既獲死所公乃休兮有子而孝復厥讎而歸故丘兮是或蒼蒼者有足賴神理於焉在兮魂歸来些歆予文之一愾兮固亢身不殁名永肩於崧岱兮噫故中奉大夫山東東西道宣慰使史公哀辭事有曠世相感欷歔不自己者豈非義激於衷黙有所契而然耶况神交罔間没而隂相者哉故宣慰史侯五路萬户留後之嫡長太尉忠武公之猶子也不肖自早嵗䝉開府盼睐獲識侯于明而合并有數欵狎則未也逮提憲朔南適平宋来歸時接燕談三載之間猶一日然既而起公慰宣東方走亦持節甌越前次甬東一夕夢公相戒云君方從事閩徼得喪有命尚慎眠食不宜中動臨岐握手有戀戀不已者予又嘗銘公兄墓以名驃見貺及是倦㳺思歸公復見夢曰逺回在邇但吾乗不得與同耳後數日聞公訃馬亦隨斃計公卒辰適始夢甬上時也吁亦異哉嗚呼公於余深矣徃有以教歸有以啟迪之非神交而何哭墓草宿且惡夫涕之無從也癸巳冬予在翰林公之子親衛指揮使煥弟秘監煇来謁出諸君銘章仍有徵於余感念疇昔廼抒願言公為人深靖有識量善謀㫁生長豪貴不以居養自髙周知物情未嘗臧否出口平居褒衣素裙以琴書自娛賔從宴㳺若與世浮沈者及其治兵作牧撫循籌畫二者並用不相底滯有成筭而無遺慮所謂縂戎作氣帥尹而寓軍容者公其有焉宜乎為世父鍾愛名聲昭於人功烈著于後也至元甲申夏六月余将徃歴下見公於所居南樓置酒酌别既酣談論古今成敗傾徹底裏且及平時寤寐風雲破碎陣敵等舉如濟南珍闕横槊臨江之役皆是也曰異時倘經故處當知予敵王所愾志也吾老矣将無復再得去三年公薨謝官下於戱公今已矣顧視一時鉅室世臣其麗不鮮較其德業聞望哀榮終始略無遺憾鮮有及公者焉然尚何辭而哀之惟是存殁隂相乆要之言耿耿在抱義激愚衷故特發其隠而未書者俾告公靈庶慰車過腹痛繫劒喬木之意云其辭曰天之降才實為艱兮用應時需又所難兮文武一轍造物者靳其全兮合而兼濟粤惟世之賢兮堂堂史公北方强兮知柔知剛萬夫望兮依乘風雲秉鉞戎軒蕩無前兮有來羣后䇿勛盟府相後先兮收斂豹韜作牧民編于蕃宣兮國倚以重民懐夙愛動海堧兮神而化之人亡政息伊時邅兮嗚呼哀哉若公者其英其靈有無間兮豈隨化歸盡魂無不之渺逝川兮其或奮為神明司幽𤣥兮明復為人續其志之淵兮若或亶然又不知其幾世幾年兮論至於此尚何言兮所以増我永慨者正復哀斯民之不幸抑且感知己而涕漣也祝辭為劉孝先子迪作古者名訓冠前字加冠後改而推稱葢以責其禮之成全成人之道孝悌忠信莫重而先四者有立吉孰大焉曰禹曰益九官讓賢及陳儆告也如是况余人然山木取義併其名而字之予以四行擴充迪傳劉氏子其服膺拳拳猶日見鄉先生于朝端也周氏小女祝辭元貞元年秋過總尹孟戡家出小女拜且命誦孝經論語等篇殊琅然也仍請訓辭為祝因書以付之蘭即燕故家留判趙公外孫也英英女孥何静嘉兮翁初見之燕故家兮牙牙㸃粧玭瓊珈兮學語未正鶯囀花兮今年拜予雙鬟鵶兮洞簫有賦非所誇兮孝章魯語誦無涯兮謝以藴稱汝其昭兮詢以小字曰蘭嬌兮葳蕤芳華幨翠翹兮猗猗揚揚茲容馤兮女惟德馨幽閒在兮佩而服之儀與誡兮女紅蠶休尤所賴兮守以貞順敬毋怠兮付之汝誦于以書帨兮觀溟漲辭山雲蒸兮杳而昏大壑澮兮涇流奔渚崖曲兮千里一夕平兮光瀰二水之充兮無幽無深逺朝滄溟兮臣妾之心幽人觀其瀾逝者何嘆兮周而復還萬物化結水之仁功成而退兮殆君子之逡巡日三徃而睇視兮悟夫嘘噏於此身又何必酌樽中之醁問江山之神也耶鳴榔曲壬申春三月予自京師南還十八日夜半過平棘西洨水上聞漁人鳴榔中流聲響甚厲駐車起聴令人杳然有江灣漁樂之思作鳴榔曲以冩其音節云其詞曰榔鳴葦間回風逺遞洲空月寒音節愈厲響應虛谷波翻木際驚羣魚而入槮笑古人之用智至于駐車而三聴欲拏舟而同逝田横墓歌辭至元丙子夏六月奉堂移偕節齋陳公以事東之偃師過横墓下慨慕耿光悲歌而去歌曰秦以帝稱魯連之所恥兮漢以劒起布衣之所極兮横王東海意不充其覬兮天命攸歸吾将奚所適兮死或當理庶烈士之則兮秋澗集卷六十五欽定四庫全書秋澗集卷六十六元王惲撰箴
