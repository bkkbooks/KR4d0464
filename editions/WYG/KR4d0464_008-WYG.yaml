body:
  text: 入侍行贈董符寳君家大兄吾故識君家三兄乃友執遊談仰止有嵗年只有八郎初未覿八郎内侍五雲深五雲宫闕何沈沈此時密邇司獻納夙夕忠謹餘丹心人知掌中金窠篆屈蟠螭重豈識兩袖中有蒼生霖採聴民瘼懐惻怛納至稼穡艱苦歌謡情聖皇逹聰豈有既天語夜久何丁寧御屏香暖代鳴玊髙枕安寢神逰清輸忠徃徃捄時弊筆諌不數公權誠君不見西漢元封神爵間兩朝貴幸張與金長楊蓮句滿宫館正以世閲逰從列九卿何如董侯剛方見持正大冠修劍明月簪日華光動鬱金袍鳴鳳翔集朝陽岑一從通籍愈忠慤四海知有萬石不為冨貴之所淫書生薄㳺不足惜風化正爾基周成炎蒸幽朔今一軌好承清閒之燕請君一皷解愠南風琴小山行我昔東登泰山頂直度天門厯参井十年西走華隂東仰面蓮峰落天影岱宗坐如太華立夢寐至今猶耿耿朅來塵土客京師長徃無時空自省愛山復得馬僉書相對髙談冠佩整馬卿有石寄禪疏䕶持擬與金函俱中峯魁岸大人坐兩峯傍翼殆若庭立面議相承趨我因閒逰叩僧户見之清興為起予摩挲攜去便許諾喜過中流失舟還得千金壺汲泉滌濯抉泥滓特置棐几為膏濡君不見羅池謾作萬石記娛悦己棄荒夷嵎一拳泰岱堕吾前寸碧㸃出遥岑圗愽山香煖黄金爐細烟蒸潤翻飛鳬芳菲來助怪石供縞帶一縷山腰紆有如岫雲雨歇歸洞府變化滅沒還須臾羌予本是山澤臞澹然對之氣安舒年來便靜百念冷今復樂此依稀仁者之徒歟山容忽開欣我主瞑目便到秦觀吳觀之仙都茶甌去手風生臆飄飄如駕天門輿月明窗影印庭柏落落恍倚秦松株地爐火熾紅艶發又似日觀坐看日出海湧金輪孤茅齋一夕得此樂冷却案上熊蹯腴微官不到竒章公甲乙乃有竒章之太湖它時南歸富潤屋不愁室無僕孥居無廬殷勤厚貺何以謝我欲贈之雙瓊琚瓊琚雖美未足報拜贈新詩永為好沙堤行君不見漢家日月四百載比隆三代追唐姚經綸帝業顧多士規隨始自曺與蕭又不見丙與魏孝宣中興賴宏濟佀慚爕理化權衡重以文儒縁吏事羽毛千古動雲霄黄閣清風兩無愧潭潭政府中書堂朝廷思治具畢張厯觀至元中統間諸公翺翔位時昌相君繼踵叅摹畫快决不數陳元康况今炎風朔雪混一統軍國庻務何穰穰一朝鳴佩見獨步恩波鳳沼飜晴光小心清慎冨籌策人望翕爾稱賢良房謀古推帷幄傑匪以杜斷疇能將璣旋衡斡日萬計夙夜宻勿心靡遑愛君南選儘公允要使四海桃李俱芬芳我常叩君見餘藴選進大已歸鞶囊栁隂大道沙堤長迤邐逺並宫圍傍錯金金軑襯珂馬火城前導光煌煌行人走避歎禮絶焜耀赫奕何非常相君報國有能事澤民三代君虞唐火城沙堤誠足當况兹三陽排疑出九地君子道長羣隂亡惜哉時乎不易得為君一言陳斐狂蕭曹開濟固云重丙魏論思詎可忘羽林萬騎歌至元丙子嵗立春後三日醉入奉御宅明日酒惡隠几坐殆不能為懐遂取通鑑閲唐明皇帝清宫事蹟作古樂府一章號曰羽林萬騎歌書付表弟韓從益且浮大白數四覺酒氣拂拂從指間去矣其辭曰韋娘雞晨遵篡武牝雞啄李求太女履霜得氷忽深戒禍始房陵帝私語神龍殿前虹貫日王氣龍池濯烟縷羽林萬騎驍且雄守捉内外生隂風韉裁文豹虎衣炳扼腕久弗諸韋同潞州别駕眼横電虬髯英姿真太宗暗中結納許清禁繼以幽求𤣥禮仙鳬忠𤣥武門前聴二鼓散亂天星隕如雨平明一掃妖氛空相王已是𤣥真主東城瑞靄朝日鮮五王甲第臨天淵三郎歸來龍在沼晴波翠灧終南烟開元隆平此張本烟火萬里春熙然誰圗勇斷蛾眉劔翻作環兒並轡鞭盡家有玊環並轡圗瑞雪歌丁丑嵗正月初六日夜作去嵗一冬無雪雨地不藏陽變恒煦就中氣運北自南江表嚴凝比燕土今年正月日丙申我游中堂聞好語聖㤙滂霈來九天四海租徭盡蠲取宰臣奔走播徳音雷厲風飛開萬㝢油然雲葉合中天一雪平明幾尺許建章宫闕玊崔嵬華栁蓬萊氣先吐漢家燕南三百州千里飛章賀㤙溥天人上下本一致和氣致祥乖則異方春甫頒寛大書埃翳四開天地閉春秋盈尺書有例太史紀言真上瑞都城十日沸歡聲宿麥連雲見豐嵗民賴聖皇千萬春長開明堂布恩惠元和老臣愛君深賀雨詩成伸戒勵小臣今作瑞雪歌要見天心愛民意謁蘇墳神嵩崩騰萬馬東汝流西來横玊虹山川秀潤不少悴知有峨眉老仙宅其中先生立朝有大節南逰天使完其忠胷中英氣蟠不盡餘藴散作文章宗天章昭回爛雲漢下探萬古英靈空前年西堂覩先生之真像今年此山拜先生之堂封嗟予何者有此幸青藜得照龍淵宫汝陽樓上重回首安得追逐逸駕攀髙風滌濯固陋開顓蒙公雖僵卧其猶龍雜言送文郎中子周宣慰江西道君侯交逰二十秋胷次磊落誰與儔湖海豪氣老不減百尺髙卧元龍樓三年亰師驄馬客搏撃快佀鷹脱鞲郎官民部纔十月持節特慰江西州堂堂提封幾千里陽開隂闔無深幽滕王閣上洪都酒孤鶩殘霞重回首江山滿目詠我歌一曲陽闗渭城栁聖㤙柔逺思悠久化自周南同九有大司綜理固多端急手先須撫瘡痏四民樂業兵有制盡徹湖陂變耕畝時驅大節擁行軒布徳揚威趂春首丈夫此時不有為何者功名垂不朽我雖鍛翮思奮飛㑹把一麾仍出守義士姜侯歌并序嵗辛亥秋燕留守府㕘謀劉坐事就死屬其孤於友人姜君諾焉既籍沒姜為伸理其子逹官怒其僭張弓射之姜不少懼即裸胸以逆遂義而從其請自是姜君義烈聞燕趙間後折節從趙雲夢學非其義一介不取諸人丞相史公賢之以賔客禮焉至元丙子冬同張彦魯入燕聞姜云亡追念徃事為欷歔者久之渡易水之悲風荆卿已去念朱家之長者今復何人爰作歌詩庶幾紹撃筑之遺音云姜諱迪禄世燕人子尚其子也叅軍屬孤出鬼幽姜侯諾之無滯留一朝赤手編虎鬚義氣凛凛横霜秋命輕義重泰山比白羽迎射身熊侯孤兒挈歸免孥戮姜子拂衣無所欲朱家素擅長者風睚眦椎埋真碌碌魚紋三尺澹秋波千丈聲華光輦轂至今燕市人嘆羨五百年來未之見張卿説似予作歌庶激清風代君傳趙穆篆𨽻歌古人富席珍璀璨玊無玷兼善不並稱例為長所掩予觀當塗文雄放雜淒渰一朝玊筋名餘作鋒鍔斂是知學與才相須成琬琰六經學淵㑹熙緝光自燄道藝貴自得舍瑟想曽㸃陽氷嚮匪斯文徒秪解篆盡方圜撫千言落紙極停穏一雋而後將無餘明昌王趙稱文儒問書竹溪真起予微言提撕何理到歸讀六經兹本歟趙郎翛翛姿態殊十年弄筆好古書嚮來客燕見其作殆似蟬欲蛻殻蛇遺膚去冬丙嵗復入燕趙郎篆學超於前我為驚戄問所以答云近得松巖之秘傳惜哉髙君今已矣黄壤不沒蛟龍蟠嶧碑岐鼓得遺法趙郎手追忘寢餐我因為渠概一言書至形似真徒然行逢碧落卧其下發塚親得中郎編胸中塵俗何由蠲正需力讀經與史他日㑹見將與松巖並驅相後先食梅子有感穉嵗食梅矜行輩並撥連揮嘬長喙近年羅列雖滿前黄熟有餘聊雋味極餐不過三數枚老翁流酸牙莫對物逐時新嵗嵗同人到中年凡事退潮陽南還幸不死齒豁頭童足悲嘅我今五十齒雖牢食不能多行亦憊只有區區行志心昔與今同人不逮潛齋歌贈中山知府史子華潛齋有志操不為浮榮汚彞衷剷豪習概之詩與書吳鉤佩錦帶寳校千金駒溢目不回顧棄如履中苴嘗出試所學三年事徵輸衛人樂安便嵗計公有餘淵潛不自珍昭然靄芳譽不覿五載強去冬㑹燕都與語覺道勝行身老諸儒神王氣骨清兩目秋鷹瞿叩門來别我朱幡擁髙車去作定州尹志意何安舒余思潛之功於焉見容與中山物繁稱奥區燕南劇郡此要途大兄持節官衡湖四郎按部参旗墟一門鼎足列清要正有報國忠而劬凝香燕寢供坐嘯紅旗鐵馬無邊虞心清事簡自多暇輕裘錦爛光鄉閭况君才髙足為治聲聞日向天朝趍書來不必諮蕘議丈八盆邊有二蘇長慶行酬暢純甫贈元白二集長慶詞人幾勍敵名動華夷説元白拾遺樂府即諌章相國絲綸號新格天教韓栁出仝時要使詩壇鬭清逸年來愛白復愛元老厭風花喜情實圗書東壁黯晶熒五十年來無是集有時擬賦三兩題斷簡殘編僅佔畢暢君好書似鄴侯荷囊去躍龍驤舟臨光釃酒參幕盡佳麗㸔盡東南州棄人所取取所棄青帙萬卷堆行輈蒼江夜靜虹貫月不羨充室琳琅璆三吳歸來巾一幅蝦蟆池頭兩椽屋足跟不踏貴人門磊落羣書載其腹自欣滯貨潤有餘贈我兩編償不足恍遊赤水得𤣥珠笑入荆巖抱和玊翛翛庭竹北窓風准備殘年霑賸馥虎牢闗行至元二年夏六月予與總管陳慶甫考試洛陽東還汴京道出其下鞏原北望河洛郊嵩邙東走脊尾髙憶初洪水勢方割湯湯北滙深淵壕千年水去兩崖出天險東扼開成臯中原失鹿在所逐河山戰氣秋蕭騷當年劉項儘勍敵阮生猶為嘆非豪竇生掎角更可笑如蛾赴燎其能逃秋烟古戍深黄蒿狐狸夜上闗頭嘷空餘千古荒城路輸與行人説爾曹送齊彦簽事湖南廣平一生真相業老坐朝堂振孤節理明有守見不欵萬事坌來能勇决我游洛師北盧龍嗣侯共事多相從文章翰墨有定價落落真有先相之遺風今年白麻拜新寵去去按部江西東朝廷妙選正有謂雅志不負温郎驄江南緑水天四圍秋風吹野百草腓煩君華岳峯尖舉着眼飛翔覽徳輝商鼎歌并序燕士張君文季讀書不求官治生不務冨稍有贏餘即購求古器畫為事故其家藏三代已來鼎彞敦卣及前賢法書名畫甚富素負藻識遇夫竒妙不惜資貨期於必得既得之後傳觀借玩初不吝惜暇則明窓棐几展玩陳列迺沾沾而喜曰古人不作古意尚在三代之英精諸賢之純粹今吾何修一朝盡得而有之其稽古尚友之誠靜觀適懐之樂於斯時也中心充實意得所寓回視晉楚之冨趙孟之貴不啻如雲烟之過目遇佳客踵門焚香煑茗盡發秘藏為序説家數評論其優劣雍容文雅有都城故家風味信足稱也仙露寺僧寳藏商鼎有年不惜百金易而得之愛玩不足復求館閣諸公詩詠予喜為序其平生淡癖仍以古調歌之其辭曰維商賢君六七作禮重烝嘗制於鑠只縁近古俗忠厚象形作器窮精鑿敦􅂜鐘鼎賜臣工重比謚贈縻天爵當時文獻不足徵故家餘俗歸寥索蒼銅不逐太社凶千古流傳誇灝噩供佛牀頭夜壑深物歸所好得真託張君稽古負精識入手摩挲三嘆息兩耳髙撑足拱三六乳附觚何的厯饕餮繞腹雜雷紋紫翠英英悵猶溼細觀欵識商父丁崑玊南金非所惜平生澹癖心不足此日大嚼情暢適模形逺紹考古圗發揮假手詞人筆君不見當年莘叟負謁湯髙宗肜祭雉雊鬲黄金塗耳玊鉉光此事傳聞已陳迹一朝怳墮三亳間神明之器今目撃或裊沈烟讀誥盤或挹殷谿煮巖石尚友直探三代英平生閲古心方畢歸夢謡丁丑嵗九月二十三日夜夢陳總管作時為浙東宣慰使十二月二十日密縣王縣尹至知公於九月七日為越之玊山賊所害五更歸夢東南長越州城府山蒼蒼我遊不省夢中客浮雲樓觀争翺翔節齋枉駕來就見上簾遥喜瞻清光倒衣走欲降堦接陳公出避朱門傍斯須往請登西堂要話乆别傾肝腸我公不之見蕃師滿禪牀卉服魋結舌碧眼鬚眉龎争先問訊展恭恪青松亂踏天花香就中老沙彌合𤓰伸圓吭向予致呪語隂福來穰穰思公罔覿對佛子坐久心思方彷徨傔來促起公召汝導我前往穿行廊追奔接踵歘不見如瞽失相徒倀倀平頭闖首告前路終惑所往心為狂惘然推枕若有䘮但㸔落月滿屋梁我思與君别屈指一載加相思葉黄江水碧神交日夜心魂遐自春徂秋三入夢似恨海角天之涯吹燈信筆成詩句病眼溪藤亂紫花時病新愈又暗用樂天元九紫藤花日蝕詩至元十四載維龍集丁丑孟冬丙辰朔詰旦隂風吼朝家有移吿日蝕百司守伐鼓幣用牲庶嗇閧奔走都城十萬家竟日喧釡缶壯於甲軍兵聲勢助衝掊盎水觀日景占刻入午辰蝕午正二刻陽精從西虧若有物噬吞初㸔偃珥玦再覩已半輪終風轉蓬勃天影惨以昏斯須食之既陽光蔀無垠始似昏暈鏡久乃挂鐵鉦團團溢隂影環輪玊為繩晴天朗晝藏厚夜九衢草草人面青衆宿不多出争光見三星謂填星角大角三宿也只愁六鑿渾沌死蒼生百萬淪幽㝠盼盼向申正輪圎復其明炷香再拜立前廡心魄動盪人尚驚隣翁行年八十一如此災變見未曾我聞長老説日月中有烏兔精顧固微物性狡隂邪萌人間三窟厭不處縁雲入月為家庭太陽養火烏赫赫森神兵飼肉祝融家渇飲咸池泠三足利鈎㦸炬火燃兩睛婪婪鐵作喙喙雲下開變隂晴曜靈壯汝觜與距外侮有犯烏維憑六龍頓轡或少軔知有神物擁䕶終是隂為懲不然日圍千里不一蓄棲爾其内將何營及兹隂精盛所厯乖常經陽烏雖神力寡弱勢重不敵從侵陵避集扶桑枝噤縮潛威靈想當既厄時如何炎官赤熛不率其徒來助勢與聲彤幢絳天鼓雷霆振烏挟日騰兩翮火吻噴薄摧隂凝逐兔入月脇隠伏跧其形撲朔知所懼彌離黯光晶含章合𤣥度安曜周八絃天公此兩目萬古更不盲嗟予既匪羲和官區區空抱傾陽誠天髙不可階此事難具陳作詩擬月蝕欲見此志終或伸盧仝撫掌韓愈笑吾等狂徳君其隣南宫老仙雲山圗米襄陽筆應奉李受益藏南宫玊堂春晝晴瑣忩霧垂幽思清先生胸次幾丘壑淡墨落紙詩無聲白雲滅沒春山碧萬木淋漓元氣溼風煙自昔鹿門深似愛龎公不浪出襄陽雲卧思怡悦不為濃纎争巧拙虚堂生白定何如玊氣拄空虹貫月盧仲傑送所逸東萊集二帙盧卿贈我東萊編偶逸二帙心茫然朝來覔送喜欲舞有似合浦珠還蠙要書不必三萬軸揷架所貴皆成全風軒讐校忘午寢一讀三嘆鏗朱絃每逢佳處時再欵不惜兩眼遮昏煙就中細味官箴作覺我疎愚性最便僉院趙公許恵歐蘇集作詩以問之平生性癖耽墳籍細字牛毛早年筆只今五十眼昏花清晝㸔時滿行墨投身散地百無事不着書遮如有失趙公嗜書似鄴侯不為章句非雕搜綰持樞紐日多暇借箸自有胸中籌更尋往事較所處有夢不到琳瑯璆嗟余向者登瀛洲殘膏未免窺前修奫然潤海鮫鰐翥洞視千古蘇韓歐文如不作作取法捨是三子將誰求窮閻雖具何足玩破碎熏黒支吟頭牙籖揷架三萬軸誰省浙本鋪銀鈎或蘇或歐兩俱可勿使石壁成空投仁存義舉侯門事却恐乘機似巧偷仁存義舉用史記侯之門仁義存晉石壁見管子涇陽鎮中秋贈馬君去年中秋客燕山把酒望月空雲烟今秋此夕涇陽鎮六合一鏡懸青天乾坤軒豁開真境萬籟無聲露華冷京居多華賞心違長路無家此清景湏知世事皆偶然賸却私憂胸刺梗同行喜得馬少逰月下一樽遥對影愛君才氣白眉良攬轡澄清知所省豸冠自古出儒冠老鶴何為隨露警人生幾度中秋月不學羣兒欲圓缺舉杯酹月月應聞安得𤣥霜變華髪追逐諸君昌晚節小邊行一百五日同總尹張彥亨赴小邊口相視河流回馬上偶作此詩北趨小邊相河害坐㸔長堤驚裂壊中流忽起劉子歎疏濬神功思禹大憶當殘金竟河界兩涯峡束如縈帶靈鼉萬鼓動地來洶洶聲聞千歩外堤防不議四十年河行虚壤任從遷乃今去京無一舍衝波南卧翻鯨鱣今年築堤捍渰水明年捲掃防洄淵濤頭况與酸棗直南北髙下尤相懸既非經瀆乆逺計徒費民力妨農田止有避移簡上聞放之曠野從奔衝不然建議以土湮大堤縷水横西東楗以木石束逾鐘逓河東去過京角此是永逸無窮功作詩擬逹宣房宫夢陳節齋至元十六年巳卯寒食夜卧開封後堂夢節齋陳公既覺呼童吹燈信筆賦此追憶往事令人短氣書示正甫敬甫二君子同為一嘅也花枝入簾春夢香遊絲翻空清晝長今年寒食客梁苑追憶徃事心彷徨前年考試登斯堂陳侯館予羅酒漿扶杖髙詠逸興發不覺燈前大雨聲淋浪生平胸臆向予盡使我肝膽争開張重來物是人不復夜夢見之晝微茫誰期此㑹乃死别口血不滅呉雲蒼攬衣起行步落月梅影滿庭空斷腸信陵公子行與西溪同遊春風獵獵吹輕裘聨鑣來作夷門遊令人逺憶魏公子徑上吹臺臺上頭却秦存趙震九土誰意抱闗老吏能此帷幄之良籌飢腸自古出竒策功成何害屠酤流髙皇布衣重公賢大梁城邊幾遲留一朝龍驤開漢業舉功不復詢來由豈非慕藺承餘休嘗讀太史公今日把酒酹墓周當日朱門滿歌舞此時野草荒山丘醉歌信陵行碧雲日暮冩我憂英雄割據雖已矣髙義凜凛横清秋追攀逸駕那復得落日倚劔㸔神州題子猷迴舟圗勾吳四時無正天𤣥冬之月猶春妍朝來一雪天地白田父適喜争狂顛宜其佳客逸思發乗興徑上山隂船煩襟囂慮一洗為瀟然江東名流説戴逵髙談禮法殷春雷子猷恐是虚華士竟棹空舟夜半回山陽早發疎星綴空殘月炯我行早發山陽境太行九月未黄落一片秋光蕩林影愛山竟作三日留心下快活還自省江山登覽幾能度素髪飄蕭已垂領愧無明略濟清時性蹇才堪卧雲嶺長疑造物苦倒顛馬使守閭車拄鼎十年欲作百巖游此度徑來猶事梗勒迴俗駕似有意未許嵓畊遂幽屏醉臺劔沼兩寂寞夢寐賞心終耿耿馬頭回首望山門白雲抹盡青山頂雄狐行黄蒿古城狐晝行窟宅深固通精靈羣貍闖首潛助勢跳煙嘯月妖腰輕社翁不神名則在將假其柄先憑陵西隣有雞奪已饜東家有羊頥指烹乗機侵刻恣所欲草棘蔽翳無田鷹老羆惑媚過不睨飢烏噤啄寒無聲我雖老鷙爪距秃一撃欲示終身懲遽然脱去成漏網固厚其毒羣心驚眼中雉兔盡何益使我怫欎難為情斂翮坐覺秋風生月老招飲禪師慰我從事勞臨臯置酒來相邀西軒雖小面流水栁塘風物春飄瀟觥船一棹入法海照眼孤月翻雲濤既逢方外對佳景不飲亦復心陶陶况師有酒藏已久快吸儘足供鯨鼇張侯引吭歌未闋嘉甫􅎨首賡其騷杜卿尚子噪于側冠佩倒落軒鬚毛僧云劉君更開爽惜不同醉持霜螯連揮大白不知數醉眼四顧天為髙出門乗馬復班如罍酌已罄猶瓢操一聲隣笛起落日追憶徃昔懐英髦陵川已矣九帥死此樂無復争禪逃眼中文武驚墜地悲風為我從空號予雖老驥志有在為國涕下沾綈袍陌頭栁色春向晚南塘碧水深幾篙簡書有程促又去悠悠離思懸干旄醒來信筆紀其事雅集難再誇吾曺阿師深藏莫輕示政恐見哂螟蛉豪望黄金臺歌君不見孔子􅁱春秋二百四十有二年燕人歃血纔一見下逮戰國尤茫然維南聲教恥不與苦羨齊魯多英賢黄金不惜築此臺當眼何限郭隗材政縁市駿售其骨雲烟轉盼龍媒來古稱得士國無小甘棠世業如天開悲風蕭蕭易水暮徃事不復令人哀昭王之名傳永世黄金髙臺安在哉越雞行贈柔眀憲使君家素雞何異常來自越裳天一方又聞越溪之女天下白臨流照影長相將乆之氣感與俱化不覺粲粲争輝光兩足不盈握軟玊紅鱗芳孤唱有餘韻滿喙鏘風簧丹砂暈頰絳冠小雪氄覈背銀絲長雅宜宫閣催曉箭欄干五夜凝秋霜玊人前頭列朝行風雲劔珮争翺翔歸來故家對此物夜夜夢到雞人傍呼童愛養無逺出飲啄長使居中堂深沈庭院縈回廊離離花影翻春陽今春哺雛凡幾輩晴雪亂㸃筠籠香我從公子偶見索苦要鄙語為相償初心玩物物反玩戲吐綵綬信鳴吭他日雛孫求執贄不愁無物餉鞬郎春溪小獵行經畧史公子明春溪小獵九公子有詩以紀其樂索予同作至元庚辰三月三日五夜燈下走筆賦此春風兩岸春草碧漫漫溪流野鳬集花邊髙塚卧麒麟拜掃歸來見豪習一聲畫鼓警鳬飛霜鶻翻空㸔横撃離披五色墮馬前血洒平蕪警半溼野橋淡淡夕陽低回風䬃䬃溪神泣不愁歸具衆賔須紅燭金盤快鮮食將軍徃嵗東西征苦竹崖傾江島赤髙勲烈烈在雲臺婉孌龍姿見平昔平生得意在戰酣州羣徒勞非我職眀時政有逐禽樂醉聴清商還自適鼻端出火耳生風夢裏弦聲聞霹靂君不見姚崇奉詔趨新豐徑入長圍吐竒策呼鷹縱犬少年事大拜曽從指蹤得君侯逸興浩無邊老作獵師三萬日帕車過市掩新婦此事終為景宗叱自憐白髪兩眼昏矻矻窮年太𤣥筆君王有夢渭濵畋苦恨非熊深自惜野兕行東山何髙與雲齊松柏薈蔚深巖棲龍潛虎伏變叵測野兕何者依貔羆暮學豼怒嘷朝循羆所蹊睥睨弱者肉獵食長林麋内助隂血盛外増長豐肌龎然非不偉椎魯初何知時時具饜餘啖羆假其威復從羣猱弄舉指甘傾危同類忌投䑕將為真得二獸之幾微漫淫犯行路跋扈恣所為窺竊乗物便大笑狸怯狐多疑孤鶚憚弗撃林鳥噪而飛獵師厚其毒使之自猖披一朝果投穽慘悴兩耳垂掉尾乞衆憐趨蹌曽不如狐狸吁嗟野兕兮一懲不省為福基惴惴且免行人悲哀老殷辭至元十七年三月二十日南詔進象過安肅州軍户老殷為象鼻束而死余適覩其事乃作此辭哀老殷平時皥皥為王民荷戈幸不死鋒鏑胡為此獸戕其身哀老殷賤且貧有兒十嵗纔解語有婦出户無完裙髪膚一旦委巨齒身後名在征南軍朝來棺斂哭過市惨惨悲動梁臺人我聞白傅引馴象為君諷諫何忠勤珍禽竒獸貴不蓄此雖至馴安用云偉哉樂天古良臣憫雨行至元十七年夏四月廿四日自束鹿縣入深澤午憇西河鄉録父老語車中足成此詩時所在祈雨旱蟲食桑桑葉無榖不出壠麥欲枯人間四月號清潤物色慘悴幾焚如車前田畯向予説半嵗無雨祈霑濡春蠶滿箔棄欲盡鋤户趂熟多空廬社翁致禱略不神仰盼一雨何時蘇嘗聞古人遇災懼牲幣徧走山川雩外倄政務内自責念及女謁并苞苴昨朝冠葢稱觀使田務督責須勤劬農非耕稼何所事勸至無勸將何趨一和繆戾良有謂蜥蜴滿盎真無辜我初聞言顔已厚食不下咽心為瘉憑軾歸時長嘆息欲對畸人意先屈因思漢相問行牸燮和恐是三公職近年氣運例儉食忍待須臾莫倉猝驅車疾去指前途落日蒼茫下喬木秋澗集卷八欽定四庫全書秋澗集卷九元王惲撰七言古詩
