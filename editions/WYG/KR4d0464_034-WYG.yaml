body:
  text: 讀漢武帝外事汾水西風岱頂柴侈辭稱自馬遷開誰知留謗千年後還向班生筆底來瀟颯神飈下寢園玉衣晨舉馬嘶煙不容夢語加明譴應是千金漢相賢白髪劉郎一帝巫老方服食悟前圖首言要格君心妄萬古鄒卿一大儒太一蓬仙杳不聞龍輿三駕海東雲明知求訪終無驗才悟文成又少君嬴傑而顛武黷兵較來遺跡不多爭内園甘分秋風裏流血争教到市氓鷁艦龍旗照水開昆明都試想雄才眼中不惜肌膏盡博得西南拘闕來晝獵南山夜不歸白龍幾中豫且危論功正有髙皇帝不為諸孫濟所私二喬觀史圖二喬絶艷煽江東一札龍韜閟未終多是周郎傳報㨗華容燒虜夜來空劉永年棘兔周身有術無牙角出没中林草棘深幸自得沾閒静處枉將陰巧見機心神明之後管城封埋骨詩書有駿功原野暖煙三穴樂縁雲無夢入蟾宫月中搗藥伴蟾蜍嘯傲秋風桂影疎今日棄捐茆棘底免冠申謝不中書旅獒圖厖然織氄褐毛鮮閃閃蒼精照帝軒誰為此監楊得意一言曽逹漢文園何人刺繡旅獒圖慘淡風煙較獵餘不寶珍奇安逺邇至今人味召公書風雪藍闗圖天威不逺雷霆迅雪擁藍闗惜自傷不似老坡南竄夜一天風露縱浮航兇鋒笑折王庭湊赤手嬰鱗笑憲皇可惜堂堂忠義氣枉將衰朽託吾湘庚子歳門帖子庭驚爆竹驅儺鬼門掩春風貼畫雞戀闕丹心老猶在夢中來趁玉班齊庚子元日即事春融官閣梅仍好暖透牆陰雪盡消長記紫宸朝退後洋洋猶説太師韶覔酒正月三日皆風色陰寒門外風霾障日昬地壚吹火發春温牀頭説有青藤釀好遣麻姑送一樽敬甫英豪盖代聞三年幸得作比隣閒來屈指從頭數得見青瓶有幾人時以佳酒貯青瓶來貺題文殊院壁吳僧久住文殊院千里東歸未有涯十二通衢春雪滿又攜藜杖去誰家跋梁中憲無盡藏手卷四首人物風流晉永和一樽觴詠百年歌邇來水檻中台宴更比當時樂事多長橋春露濕吟鞋共警時思怵惕懷只為一終天理在晚香何有百花崖鐘皷山林窮勝事衣冠韋杜似樊川一門顯允稱多士野老猶能説定年馬頭旌斾八騶行劒佩鏘鏘尹洛京特就房山嵓畔月百花潭水濯冠纓海岸古木圖古木螭蟠鬱有華輪囷竒崛欲誰誇何年海藏龍宫使推出秋風八月槎題蕭齋詩卷生如泥塑程明道笑比河清孝肅公一字名齋見操守儼然思有古人風外自形骸内自心敬恭交養理尤深用功不必求他説細讀西山夜氣箴再題梁氏無盡藏月白風清世不知園林鐘鼓想當時萱堂此日南陔樂又見肩輿拜慶詩洹水郎山雨露春江山如畫見横陳世臣喬木千年事長配先生德日新吳郡張總管代輸民租手卷吳郡張侯潤屋餘嵗供民賦濟貧居二十四考中書令此樂融融未必如庚子歳冬與僧印相對見其頗瘦戲作一詩相贈雲往青天水在瓶禪闗終日不曽扃莫疑磨衲松形瘦午夜吹燈唱佛經又題逺僧定禪東林法第隱峨嵋風雨中途避樹枝千刼塵縁終共盡枉將公案詑神奇題王國祥適安齋詩卷神光仰面􅇭流東睡起東窓日已紅適意有詩樽有酒曉堂休訝草堂空斷崖烟隔回通駕山鳥山花樂亦佳一夜山靈來軟脚盡分空翠濕吟鞋起居有道遭之安况復山人已考槃辛苦東曹馬觀復簿書燈火五更寒兇鋒北折恒山逆鰐暴南移窟宅空天地此身無定在適安何佀一盤中馬卿來索適齋詩終嵗思歸未得歸羨殺昌黎盤谷叙山林長往最知機呈徳昌郎中太平朝野足娱歡漢日舒長省府閒前日景陽臺上讌一堂絲竹兩東山江山大筆硬盤空跨海歸來不自雄紅藥滿堦春露濕看君給事大明宫沉沉宫漏出華遲曉日雲龍簇仗齊前日彤庭青瑣客只今騎馬欲鷄栖蘭陽僧榮説昔聞汴河得入定隋僧令移葬寶相藏寺前殿趾下手爪纎長纒繞兩胯或問彌勒下生否未也榮説寺中見有碑記漢家習戰鑿昆明刼火留灰憶見曽誰謂大梁蘭若底土中入定有隋僧錢舜舉桃花黄鶯圖金衣公子絳桃芳飛下喬林過錦江細按玊琴能巧囀絳紗髙捲薛濤窓夀陽公主折梅圖滿庭梅影媚春陽粉萼封香散麝囊折得一枝春在手含章宫閤鬬新粧寶檐么鳳探芳叢瓊蘂飛翻入卧中一自粉痕輕拂散暗香吹滿夀陽宫題武教授峨嵋山谿堂圖野水林塘淡欲秋日長繒繳在沙頭故山咫尺峨嵋外未擬因人作逺遊張金吾慎獨堂赤丸下語飛電如徼巡雄猛張金吾能于不覩不聞際一妄纔生制得無中和堂草隨風偃理之常况是京師首善鄉聞説開元天子聖羽林多半授經郎慶夀東西二橋慶夀精藍丈室前松蕤盈庭景氣蕭爽嘗引流水㶁鳴其間東西梁貫以通往來今水堙橋廢止存二石屏上刻飛渡橋飛虹橋六字筆力遒婉勢若飛動有王禮部無競風格寺中相傳昔金道陵筆也主僧西雲安公喜作詩通書學以無礙妙辯現當機應身軒露頭角價重統堂緬懷遺跡修讓珍惜屬秋澗翁作詩讚嘆傳示後來謹賦二絶奉答雅意秋澗王惲和南化木禪房逕竊通卧波曽覩未雩龍摩挲一片西山石依舊宸奎照碧松飛渡飛虹總舊名玉淵無復繞松棚偶投静境便僧話指顧瑶鐫説道陵半山石詩一拳山骨動溪神小字金書爽醉魂竊吹濫中非我事約公同賞謝家墩王公精舎定林居蔣廟相過恰半途不意半山亭下路溪光一夕照吾廬農里嘆并序至元廿八年秋九月檢視水災趙之東偏自平丘至劉村渡凡一十一處因老農問答集為十絶句庻以見農家有終嵗作苦卒至于無成者可哀也哉作農里嘆其辭曰今嵗馮夷勢蹇驕漫流西岸不知遥枯槎聚沫猶然在時見田間擁樹腰洨水南來接北滹兩河㑹合泛田廬官來檢驗承尊重所望申圓早得除寧晉東南舊馬頭今年秋稼被灾稠至今田畯揚旌處猶作長河水漫流漲痕到處盡翻耕隴畝縱横宿麥青馬首野人争説似肯教欺昧老提刑薄有田疇在逺坰近村减掩不能耕今年已損秋禾了庶望來年麥有成野漲平田一漫蒼只縁溝澮失隄防田廬相近初無礙賴有莊東白草岡馳傳東來相水灾並河村分盡俱該莫疑詢訪多諄復切恐文移不細開每年秋漲賴横堤水縱漫堤尚害㣲近為鹿城偷堰破放教潦流到柴扉每嵗灾傷走吏曹何當南陌到東臯正縁事重人微甚特遣官來慰爾勞穀穂虚穰草色燻滿前堆積漫如囷一餐到口還無濟辛苦田間力稼人火雲六月旱如灾嘉穀方苖大水來老牸瘦來無可飼放教河底嚙枯荄辛苦農民尚可哀况遭今嵗水為災得除與否渾閒事最喜分司檢踏來責備利為人後責居先子細評來不苦偏鄭重左山親有語天心責備最相憐相鄉懷古整整唐旗向日開賊兵來陣亦雄哉膽寒已落銀刀手不待騎河百戰來汦水倚空趙壁漢旗殷褫魄南隨逝水寒自是炎劉方爾熾不應儒將貴成安題趙總尹書堂趙氏諸郎玉不如籯金雖貴樂三餘朝來放眼芸香閣信有人間未見書河内許生希顔愿而有立志予在襄國問學者月餘及其行也求一言為訓故書此以貽之筮仕常深未信懷孔門惟有漆雕開治平果得真知理青紫何愁俯拾來題陳居士歸真谷圖三首林下山間本寂寥只縁久動思漁樵君㸔白首争名者攘攘依前滿市朝桂樹巖幽謾見招風煙圖畫儘髙標一從五柳歸來後此事人間久寂寥舉世誰能未老閒風煙空對畫圖間應憐心逺陳居士杖屨西山夢往還松林秋月萬壑松聲月色開夜深清景湛靈臺放懷不為樽中醁坐聽蒼髯説法來題劉道濟所藏石屏石中乃有此奇文來策臨池障墨勲絶似雞鳴南下望桑乾東捲入寒雲過寧晉北陳村題陳節齋故居草廬壁皎皎丹心與義俱要須身外更無餘截然不負平生志依舊陳村一草廬生死分岐又六年野煙行入北陳阡不煩更聽山陽笛老淚臨風已泫然過後趙右侯張賔墓自擬籌兵借筯倫品量何必果誰親風雲慘淡龍蛇裏獨識將軍亦可人一劒横談動世龍掃除河朔晉為空運歸曽不論夷夏乾没并門坐嘯功勒遇光皇並駕先右侯端有子房賢一時瀟洒君臣契虎視鷹揚豈偶然鉅鹿懐古寰宇記平鄉秦鉅鹿也項王解趙圍于此鐵鎖秦圍一戰開羣雄稽顙拜平臺君王邂逅東城敗驕氣須知自此來趙圍纔解已亾秦六合雲風霸業新逆取不思須順守區區空抱婦人仁沙丘懷古一從奇貨落韋機秦自莊襄統已非大寳前依王命論牛當馬後一何微滈璧投來䜟已真沙丘臺下位宫臣事機説到還元處造物于中天戲人時苖墓苖魏人官夀春滿留犢寰宇記云墓在平鄉縣東北二十里至今二村以時南時北為稱典郡風流若可稱當官明允復氷清來時孤牸歸遺犢却恐存心似近名笑却青鳬取大錢去留黄犢縣門邊就中處置人情近似覺山隂守更賢苦熱炎官人虐不容安背汗翻漿厭午餐遥憶百門山下水玻璃盆面萬珠寒沙丘懷古六國平夷甚虎狼擬從一世到無疆誰期五十餘年後生處元來是死鄉擬就靈仙不死期翠華拂面事皆非須知一把亡羊火望望驪山待汝歸萬靈訶䕶到東巡一死沙丘等棄焚不直鮑車曽具惡萯陽宫事儘腥聞萯如字花名玉萯四月開見廣韻陌上行人去不還眼中豺虎滿朝班齊雲樓下陂陀血紅比龍袍色更殷右讀唐昭宗紀東就梁營怒重岐傾危何處託苕枝日斜袖搭欄干曲花滿春宫去住時讀明皇雜事梧桐葉上雨聲繁絶似花奴羯鼓畨不待迫遷西内後上皇當此已消魂讀肅宗雜事凄凉南内廢晨昏興慶宫官不一存進藥失嘗蒙大惡肅宗當以弑君論擁憐愛子遽聞言天理中還帝泫然龍德本非乾健體不應良娣健而顓廣中早發武道亭西望沛陽趣裝猶是四程强夜來一雨杈炎傘借得長途兩日凉贈擒虎張侯第三子飛卿射虎聲雄發五豝三郎閒損玉梢花雍容詩禮相逢處不信風姿是將家大學淵源在六經振振儀鷺儘充庭君㸔萬字長沙䇿不到詩家月露形黄巾墓洶洶黄妖聚一呼棘矜元是力耕夫人心莫作平常㸔易動難安最可虞再過隆平我欲臨流濯鬢埃沙鷗橋畔莫驚猜亭亭一㸃隆平塔半嵗還成兩度來銅馬祠古鹿城西野廟新戰勲猶説馬將軍甲光千丈雲臺畫只有荒烟對夕曛昭慶陵紫雲仙李隴西宗又向隆平見祖宫陵寢栢城俱掃盡石麒麟鬛動秋風過唐山望禱帝堯祠光宅宫庭歳祀新壤歌猶是昔時民遥祈一勺龍泓水痛與山前洗旱塵讀李斯傳常笑秦斯訴巳忠豈知身墮趙機中沙丘不負先王託雖死猶能保霸功盧處道處覔書米家詩畫滿江船月貫長虹夜色鮮欲識廣収多蓄意北歸分賜到諸賢題塗水老人趙君璵詩卷豪傑并門自昔聞儻來軒冕等浮雲瀟然獨老琴書樂塗水㸔來只趙君老鶴昻藏不受羈九臯心與野雲期翩翩不墜中郎業又向詩書得蔡姬廣武君李左車墓廣武籌兵見未形規模儘敵漢威靈天其不奪成安魄赤幟何由下井陘早發銅梁旱損滹南二十城蠶沙充食葉為羮朝來夢覺梁門驛幾處坊場聽皷聲春宫元日口號日融欄檻猊金麗春滿松廊鶴禁深四海謳歌皇子夀一年得拜老臣心色目依班向殿趨入門一字並青蒲侍臣直上牙牀啟拜畢分觴當大酺獸樽人立逺傳臚軋軋聲來啟左樞玊馬抱牽當殿過一時肅拜不聞呼沉沉蘭殿鬰穹窿一㸃前星現半空事事㸔來臣分裏中單奚取絳紗紅暖烟宫殿嵗華新入賀東朝異紫宸内外百官皆便服紫衣獨見海東臣三薰來獻野人芹不請芻蕘得上聞銀研柘弓非所覬庶憑春鐸振斯文朝拜歸來户晝扄小齋孤坐喜春晴太平儻許斯文致未礙明窓管墨卿偶書唐到開元極盛年見人説似即欣然時時夢裏長安道驢背詩成雪滿肩闕在風聲何頼八公山沛公洗足見酈生圖氣折狂豪一洗間要令游士吐嘉言初從沛長咸陽帝此術施來第幾畨喭然洗腆孰為賔中隱炎劉四百春一説便能延上客君王肯效婦人仁包總綿區細故捐未妨揮洗酈生前一嚬一笑非無謂不似髙皇氣馭權落魄髙陽一酒徒畧除邊幅展雄圖桓門堅忍須㬰去長為東山出此模布褐昻藏七尺身不容空老酒壚春風雲慘淡龍蛇際首識隆顔亦可人書壬午歲十二月廿二日夣中所見青山隱隱水悠悠鶴盖前頭列火篝江閣連延三十里停輈看處古昇州孫陽相馬圗龍眠筆昭王墓老秋蕪合虞坂人歸暮靄蒼屈産何嘗無駿足世間能有㡬孫陽渭橋迎代王圖龍眠筆古人作事洞胚胎畫到龍眠見大材勘破丹青揮灑意英宗還自濮陽來李臨城挽章桂香坊裏推時雋爆竹聲中見孝心人道臧孫今有後惜教含笑九原深榮歸亭䇿勲自合畫麒麟佚老榮歸帝里春開卷賦詩還自笑滿纓塵土向時人身外功名敝屣輕一亭歸卧有餘榮分明昨夜南山獵夢裏弦驚裂石聲再題胡烈婦殺虎圖丈夫不作屠龍舉健婦能成刺虎威試㸔五行參運化二陰何盛一陽微耽耽哆口摧天去死地求生有若人寸鐵竟能伸義烈大臣當國合横身古稱政猛苛于虎揃暴除殘惜壯圖蹀血兩坊真義俠袖錐揮處幾於菟汗它全用倀鬼事皮骨皆為吻虎腴鬼幽曽不悟當初棘林夜黒相逢處猶恐倀倀泣有餘石鼎聨句圖衡山何物老彌明氣壓侯劉震震驚笑向半空盤硬語火爐頭上把降旌海上游談接大顛鼎邊聨句託軒轅不須苦泥中間事二者㸔來總大言渭橋辭謁圖閃閃鑾輿擁大弧八方臣妾效嵩呼君王莫以來同喜衛霍功成萬骨枯周文矩畫金步摇宫人圖螭玊珠華兩翅排髻髙雙鳳拂雲來玊笙合就新翻曲恰值碧桃花正開雪中同郡僚遊達活泉訟牒聽餘事未圓日長誰辦枕書眠出門偶作閒人計踏雪來觀達活泉淵碧澄泓一畆池勝遊都在郡城西潛蛟免致騰雲潤嵗嵗分香入稻畦取東坡夏壠餅餌香之例也雪窓無寐夜深雪晃客窓明更比西樓月色清老大㸔書無眼力偃然倚枕數寒更早秋夜坐候蟲唧唧掩荆扉落索𤓰簍滿敗籬凉氣已隨新鴈至小齋燈火便相宜飲醯圖一勺儘調鼎味三升鼻吸試難翁不去為卿相何人禁此辛酸江南道閩越自方千里冥冥海角天涯野竹疎梅沙路江邊到處人家早起效三五七字格東方明清風發白露下無聲步久寒侵襪撫楹歌罷酒微醒月明滿地蘆花雪秋澗集卷三十四欽定四庫全書秋澗集卷
