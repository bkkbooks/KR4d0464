body:
  text: 樂府行香子乙酉嵗九月二十五日過林氏西圃與主人公洎張道士看花小酌林曰若作數語以記其來使通俗易解甚佳既歸不百步得樂府行香子一闋醉立斜陽浩歌而去秋霽遥岑何處登臨水西頭來散閒心遶園細履栽種成隂撚秋香浮酒盌入孤斟老境駸駸里社浮沈醉顔酡白髪盈簪夕陽歸路聽我長吟待野梅芳多載酒再相尋江神子金朝遺風冬月頭雪令僮輩圑取比明抛親好家主人見之即開宴娛賔謂之撇雪㑹去冬無雪今嵗初白如此燈下喜賦此詞録奉達夫且應撇雪故事為一觴之侑也小窻遥夜失冬嚴覺春添捲疎簾掌許氷花撩亂撲風簷喜倒坐中兒子輩争指似謝家鹽一盃燈下醉掀髯處窮閻最情忺萬壟含春江上麥纎纎應笑凍吟蘇老子揩病目認青帘眼兒媚賦燕子樓用幹臣繼路宣叔樂府韻横塘烟淡冷涵秋寂寞舊粧樓珠簾夜月露桃幽怨總是閒愁形消骨化情縁在此恨若為休長河解浣佳人無那倒捲黄流二滿簾夜月耿霜秋雲夣黯歌樓殘燈伴曉夕陽催暮海水添愁天涯地角相思恨誰道此生休一篇照映唐人詩雅千古風流三我來弔古過悲秋徙倚夕陽樓畫堂歌舞都能㡬日何限幽愁合懽牀冷孤眠苦争向死前休憑欄閒看一雙鸂鶒對起中流四西風歸燕㡬經秋人老水邊樓一燈孤枕滿襟清血花也含愁前堂歌吹新聲有争佀去來休長河若解將姝遺恨與淚俱流五呈周幹臣桑榆晚景日駸駸莫厭數相尋静憐幽境閒談情話與滌煩襟濟時幸有諸公在鄉社好浮沈閒雲却恐西風吹去認做商霖鵲橋仙夀胡紫山秋香懸桂光風轉蕙掩盡尋常花卉西城來往已風流更㸃檢生涯次第堂名休逸䇿杖流憩占盡閒中風味雞聲纔動已扶頭紅日上花梢未起二調羮粉桂愛香種蕙自笑秋風野卉兩椽茅屋對青山初不羨入雲髙第將心自逸欲行且憇為愛清時有味桐江波上一絲風儘容得嚴光不起三金蓮蜜炬紫山仙侣夢寐青門𤓰圃春風著處是行窩要一笑人間今古錦箋佳句新聲金縷灑遍薔薇清露東華待漏滿靴霜恐輸與西城杖屨四和劉夢吉韻髙人非古沖襟粹宇要覽德輝飛舉伊周原不是庸人吾志在箕山巢許蘭紉有賦菊香釀黍夢斷糟牀秋雨淵明卧老北窻風猶勝佀清談夷甫五沈酣往古棲遲衡宇劇有方招此舉長林豐草野塵心是中散生平自許日邊草賦矛頭炊黍誰道閒雲有雨周宣補衮要深功除喚起當年山甫六金鑾視草蒲輪應召客路人情殊好豈知野鹿飾金鑣志却在長林豐草霜風料峭形容枯槁愁緒百端縈繞故山歸去有茅廬任束置長沙諌藁七五窮作祟百端相滯破帽一風吹碎邯鄲道上斷人行銷鑠盡元龍豪氣商顔綺季當時不起悞甚漢家經濟書生薄相到還元要結果黄虀滋味八為何繼先夀調和謀斷論思機務許大茫茫疆㝢當年姚宋捄時才聽沙路歸來好語堦翻紅藥省連温樹滿貯春風瑞露眼中庭檜鬱蒼蒼道晚節昌於韓圃浣溪紗夀李衛尉矍鑠當年漢伏波紫㣲垣外侍雕戈笑騎天駟下天河華髪雅宜麟閣畫春風先送武城歌朱顔休情捲金荷二内黄道中風柳婆娑半畆隂兩株巧與道相隣樹頭幽鳥佀知音馬上行人思困睡天邊赤日欲流金解鞍休惜濯煩襟三送王子勉都運闗中薊北分攜已六年秋風淇上又離筵一樽情話重留連内史調兵推漢相春潭通漕笑韋堅嶽雲拖翠上吟鞭四題韓氏别墅翠竹連村映白沙小岡回抱一川斜旋開幽沼聽鳴蛙樵客局邊驚橘樂黃塵門外任蜂衙樹頭山色曉来佳五客亭觀漲老雨長河壮怒濤客亭夜乆聽喧號平明兩涘𣺌江􅆏沙尾沒來漁箔短危檣看處客㠶髙斜陽汀草亂青袍六夀周幹臣十載相期紫禁逰一官誰想客西州春風閒倚仲宣樓四海論交真益友一年好處是中秋夀波無惜捲金甌七吳村道中在平陽府北三十里汾水西三月十五日送客回作緑樹連村際碧山春風吹水漲黃灣沙汀蘋滿釣舟閒薄宦﨑嶇清議裏風烟吞吐畫圖間夕陽明處鳥飛還八至元九年秋九月登秋風亭觀雨呈賦曹叅軍周幹臣雨勢蒼山共一雲雨聲作氣張三軍秋風亭下葉繽紛官事何憂嚴限促天心不負老晨勤夜窻孤客儘先聞九乙亥自夀時二孫闕行一女孫闕兒時避人事在汾西廣福院梅㸃氷梢蠟蔕凝蘭芽珠樹鬬鮮明團欒香火此時情避世逺慚金馬客覘山人道老人星雪侵巖檜儘青青十夀湯總管十載烟花紫禁逰嘉謨曽補翠雲裘歸來尤荷寵光優畫㦸清香髙北里虎符金節照南州夀波無惜捲吟甌十一夀王子初六合澄清到一家顒顒文物望中華未容詩禮養蘭芽松柏後彫原有待珪璋涵潤本無瑕誥恩行墮五雲花十二王中丞許贈新香不至書此以催之珍品無多百和濃露沾婆律溼蘭叢喜分新供到南豐螺甲未融金雀餅芳菲已夢碧湘宫寳猊先障繡簾風十三六月初三日與學官髙伯祥夜話於魏府之清潤堂露榻風簾燭影摇故人留話慰蕭條徘徊花月可憐宵天淡有雲空漠漠月明無雨更翛翛洞天歸路踏瓊瑶十四送劉仲元赴平定州親迎青鳥西傳燕爾期乗龍喜氣見脩眉芳悰濃似去年時禁臠名香天盼重玉䑓春暖鏡鸞棲人生樂處是新知十五賦筝朋盍華簪醉未霑主人張樂見厭厭一聲銀甲裂霜縑澗水咽氷翻隴怨將軍出塞憶蒙恬碧桃花底玉笙惉十六付髙彦卿紅翠叢中様度新桃花扇影駐行雲隋唐嘉話閲來真一片錦帆浮汴水兩京花栁暗風塵彩聲曽動鳳城春十七雨㸃鳴鐃裂竹聲併隨牙板一時停詞源都作建瓴傾白羽揮開諸葛陣蒼濤翻動憲王陵低空知有彩雲横十八隋末唐初與漢亡干戈此際最搶攘一時人物盡鷹揚褒鄂有靈毛髪動曹劉無敵簡書光争教含泣到分香十九旅館燈青夜色曛據牀談劇作春温胸中雲夢入雄吞清議素髙烏府月秋霜低壓漲江雲吳山山下惜輕分二十中秋雖見月桂魄出沒于雲影間有不快人意者作此詞以歌之月色都輸此夜㸔人心偏處即多慳碧雲吹恨滿瑶天儘著氷壺凉世界故將隂巧妬婵姢桂香和露溼幽彈二十一贈朱簾繡滿意苕華照樂棚緑雲紅灧逐春生捲簾一顧未忘情絲竹東山如有約烟花南部舊知名秋風吹醒惜離聲二十二為張右丞夀補衮功深浴鳳池好賢人道佀緇衣佩聲清響見委蛇千嵗壽祺隂有積兩宫恩睠古來稀東山歌酒樂時熈二十三紙帳梅花夜色清行雲香溼墮銀屏惜花人老若為情對酒當歌須適意凌烟圖像是虛名千年編簡㡬人青㸃絳脣夀周幹臣秋氣平分畫欄桂樹秋香底良辰美景拌取花前醉彭夀添君白也詩堪擬髙歌起月波如水長照金樽裏二夀涿郡房二尊親露影庭萱一枝金綻釵頭鳳寳花香供夀席光浮動懿範閨門姻族同推重瓊盃捧二親安寵共醉玻璃甕三送董秀才西上楊栁青青玉門闗外三千里秦山渭水未是銷魂地坦卧東牀恐減風雲氣功名際願君著意莫揾春閨淚四癸酉夏六月五日同河中府官宴白雲樓倚檻清歌一聲髙遏行雲住長河傾注不煞曦輪暑燕寢清香畫棟珠簾兩人何處一尊緑醑滿眼青山暮五題絳州花萼堂時大暑回自河中一榻清風故山邂逅欣相遇緑隂池樹蕩漾瑶翻處赤日紅塵前日中條路人良苦壮心如故快叱王陽馭六後六月二十二日同府僚宴飲白雲樓時積雨新晴川原四開青障白波非復塵境忽治中英甫索鄙語酒酣耳熱以樂府歌之晴倚層欄飄飄醉上青鸞背飛雲崩墜萬疊銀濤碎青障白波非復人間世人懐霽夕陽有意返照千山外七為房祖母夀婺女呈祥瑞光分自雲衢爛鳳萱金燦留待佳辰綻林下丰容閨壼瞻儀範香縈篆玉顔如練嵗嵗長康健八夀周幹臣千古詩壇苦吟誰得風騷妙羨君才調一蹴無邊徼嵗嵗中秋喜見朱顔好霜蟾皎一樽傾倒萬事秋毫小九為承㫖唐夀卿夀秋氣平分鬱葱都作充閭喜玉堂風味磊落青雲器醉墨烏絲緑綺傳湘水千秋嵗月波如洗長照金樽裏十雨中故人相過誰惜幽居故人相過還晤語話餘聨步來看花成趣春雨霏㣲吹溼閒庭户香如霧約君少住讀了離騷去十一春夜喜雨好兩知時萬金欲買初無價種花纔罷似為芳枝下花重宫城好箇風人雅從飄灑探花走馬明日春如畫十二雨宵即事春雨空濛晚來㸃綴閒庭景一牀燈影潤入琴絲冷清夜沈沈誰慰孤懐耿雲生景倚窻髙詠愛此春宵永十三探花春雨添花繞欄來看花開否海棠紅瘦緑葉花如豆梨雪生香近在清明候花為友莫輕孤負預問隣家酒十四喜芍藥萌芽紅藥當堦朝來撥土紅芽秀畫欄晴晝凭暖佳人袖一粒丹砂誰㸃仙根透從今後為渠釀酒去作花間友十五春雨後小桃端正樓空一枝春色誰偷得夜來消息暮雨臙脂溼倚竹佳人翠袖嬌無力須相覔一樽休息轉首春狼籍十六己丑清明前一日春露堂即事時既雨快晴明日書示友人主人出名酒相屬因放歌數闋而去實至元二十六年三月七日也可謂不虚度此節矣春雨如膏最憐適與清明遇晚晴庭宇畫出樊川賦苒苒行雲低拂垂楊度春如許亂花深處㡬㸃薔薇露十七西灣即事碧玉環深一樽同醉清明後緑隂晴晝多少閒花栁身世塵舟日月驚跳走誰豪右忘懐惟有拍泛船中酒平湖樂十章平湖雲錦碧蓮秋香浥蘭舟透一曲菱歌滿樽酒暫消憂人生安得長如舊醉時記得花枝仍好却羞上老人頭二鑑湖秋水碧於藍心賞隨年淡栁外蘭舟莫空纜典春衫觥船一棹汾西岸人間萬事暫時放下一笑付與幽巖三平陽好處是汾西水秀山挼翠誰道㣲官淡無味錦障泥路人争笑山翁醉西山殘照闗卿何事險忙殺暮鴉啼四秋風嫋嫋白雲飛人在平湖醉雲影湖光淡無際錦屏圍故人逺在千山外百年心事一樽濁酒長使此心違五採菱人語隔秋烟波静如横練入手風光莫流轉共留連畫船一笑春風面江山信美終非吾土問何日是歸年六秋風湖上水増波水底雲隂過憔悴湘纍莫輕和且髙歌凌波幽夢誰驚破佳人望斷碧雲暮合道别後意如何七緑荷相背倚西風凉露烟霏重翠蓋銀瓶醉時捧使君公徑須傾倒玻璃瓮青山城郭暮雲樓閣髙下一重重八安仁雙鬢已驚秋更甚眉頭皺一笑相逢且開口玉為舟新詞淡似鵞黃酒醉歸扶路竹西歌吹人道似揚州九水邊楊柳緑絲垂倒影竒峰墜萬叠蒼山洞庭水碧玻璃一川烟景涵珠媚㑹須滿載百壺春酒撾鼓蕩風漪十黃雲罷亞捲秋風社瓮春來重父老持盃十分送使君公秋成不佀今年頌太平天子將何為報萬夀與天同十一乙亥三月七日宴湖上賦春風吹水漲平湖翠擁秋千柱兩葉蘭橈鬬來去萬人呼紅衣出沒波深處遨頭逰賞浣花風物好箇暮春初十二山隂修禊說蘭亭佀覺平湖勝春服初成靚粧瑩玉雙瓶興來徑入無何境使君髙燕年年此日歌舞樂昇平十三栁邊飛蓋簇晴烟人在平湖讌碧㶑瑶翻映歌扇綺羅筵人生㡬度春風面江山畫裏一時人物斜日重留連絳桃春黨廟秋社社壇烟漠散林鴉把酒觀多稼霹靂絃聲鬬髙下笑諠譁壤歌髙外山如畫朝來致有西山爽氣不羨日夕佳二夀李夫人六首眼明欣見太平人環佩嬰香潤洞裏瑶華自髙韻八千春裊烟已報長生信一盃更買麻姑蒼海安坐看揚塵三謝林髙韻本蕭然百嵗春風面白髪兒孫羨康健誥鸞鮮彩雲扶下長生殿鄉閭盛說一家榮養初不羨魚軒四南枝消息小春初香滿閒庭户見說仙家舊風度夀星圖瑞光浮動雲衢婺繡筵開處散花傳琖彩袖不曽扶五小園不惜買花錢粧㸃蟠桃燕傳語風光莫流轉百來年人生㡬度春風面細思誰佀君家阿媽康健地行仙六牙牙長憶㸃粧紅曽得含飴弄此日筵前一杯捧白頭翁紫簫吹斷繁華夢百年留在故都瓊樹依舊動春風七慈親康健說誰家李氏人難亞鏘鳳筵中見多暇醉簪花肩輿勝佀宫門畫從今看取君家餘慶門户爛生華八夀府僚錦貂千騎朔方豪瀚海淵波浩畫㦸清香看傾倒醉仙桃秋光雖晚人難老烟花紫禁玉魚金帶新寵照朝袍九辛卯九月二十五日夜解衣欲睡適有飲興顧樽湛餘醁燈綴玉蟲而樂之然酒味頗酷乃以少蜜漬之浮大白者再覺胸中浩浩殊酣適也仍以樂府絳桃春歌之少年鯨吸酒如川甘苦從人勸老大含飴最深戀要中邊一甜掩盡黃柑釅更憐中有百花風味一笑為君妍十笑分花露出粧奩香軟金盃㶑滿著華池潤吾咽展眉尖坡仙釀法真堪羨却憐蜜課蜂兒官府辛苦為誰甜如夢令和曲山韻仕宦須求遭遇不顧已沾泥絮穰穰世間人總被虚名引去引去引去光景促於朝暮半世隨波從衆㡬被狙翁調弄富貴苦相謾一枕槐根春夢春夢春夢况復此身無用友道雨翻雲覆膠漆㡬人持乆遣興漫題詩客至有錢沽酒沽酒沽酒徑入醉鄉無有老境心便多暇束縛塵纓髙掛飯飽去尋君閒步閒吟閒話閒話閒話過眼紛華都罷栁圈辭六章暖烟飄緑楊橋旋結柔圈折細條都把發春閒懊惱碧波深處一時抛野溪邊麗人天金縷歌聲碧玉圏解祓不祥隨水去盡囘春色到樽前問春工二分空流水桃花颺曉風欲送春愁何處去一環清影到湘東步春洄喜追陪相與臨流酹一杯説似碧茵羅襪客逺將愁去莫徘徊秉蘭芳俯銀塘迎致新祥祓舊殃不似漢􅆏空解珮歸時襟袖有餘香醉留連賞春妍一曲清歌酒十千說與琵琶紅袖客好將新事曲中傳樂府合歡曲讀開元遺事去取唐人詩而為之一名百袖錦因觀任南麓所畫華清宫圗而作驛塵紅荔枝風吹斷繁華一夢空玉輦不來宫殿閉青山依舊御牆中亂横戈奈君何扈從人稀北去多塵土已消紅粉艷荔枝猶到馬嵬坡嵗東廵洛陽城天樂宫中夜徹明不意李謩偷曲去酒樓吹笛有新聲雨霖鈴却歸秦猶是張徽一曲新長記上皇和淚聽月明南内更無人憶開元掌中仙入侍深宫二十年長記承天門上燕百官樓下拾金錢錦城頭錦江流回望長安帝儘愁那更血魂來夢裏杜鵑聲在散花樓驛坡前掩嬋娟慘亂旌旗指望賢無復一生私語事柘黃袍袖淚潸然九龍池百花時樂按梁州愛急吹掲手便拈金椀舞上皇驚笑勃拏兒信音沈淚沾襟秋雨鈴聲閣道深人到愁來無㑹處不闗情處也傷心後庭破子晚眺臨武堂緑樹連逺洲青山壓樹頭落日髙城望烟霏翠滿樓木蘭舟彼汾一曲春風佳可逰驀山溪氷姿綽約翠袖翻清露林下謝夫人依然是故家風度搔頭玉重雲髻不勝寒繡簾疎凉月細一㸃香來處清標一種脈脈秋如許無語對西風恍當年六朝瓊樹幽窻深鎖莫厭惜娉婷瑶臺路藐姑仙恐跨青鸞去鵲橋仙大德辛丑嵗八月初四日夀平章相公夫人金波秋静桂欄香重瑞應熊羆佳夢錦綳擎出玉麟兒道釋氏老君親送夀筵増慶朝鞍歸控恰及瑶觴拜捧平津起舞棣華歌好一醉玻瓈春甕秋澗集巻七十七欽定四庫全書秋澗集卷
