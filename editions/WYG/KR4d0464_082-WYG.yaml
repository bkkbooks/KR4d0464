  text: 八十二
  hash: sha256:d6a16174029946789d86847d47568201a3911e53110cddfdeee64fb9a5a3c193
body:
  text: 元王惲撰中堂事記下三日癸巳京兆參知政事商挺字夢卿子叔子馳奏闗陜重地大亂後餘風有未殄者非廉希憲不能鎮撫中外右丞相史公以聞允焉未刻復入見平章王文統請廉希憲依已議同政不許遂以左丞相耶律鑄代廉赴燕是日追諡魏璠曰靖肅先生當改後從此四月甲午有㫖趣平章王文統南行於是定省府掾屬去留者是曰燕京路宣撫賽典只兒回紇之有良德者自云世家同中國孔子宗系累朝為斷事官輕財安民甚有人望後以平章政事終於雲南真定宣撫劉肅授吏户禮三部尚書以上都太倉使宋紹祖邢人郝子明為郎中益都等路宣撫宋子貞授兵刑工三部尚書以太醫院官焦仲益李子敬為右三部侍郎劉前進士自職官勾補省掾北渡後佐東平幕上聞其有經濟才召治邢州省部之建諮其議論為多五月乙未左右兩部官望謝恩命於省中都堂為諸投下招收人户取索錢債奏奉聖㫖諭十道宣撫司今體知得諸投下差使臣告奉到聖㫖及令㫖文字不經由本路官司徑直於州縣開讀拘刷民户人匠便行拘收起移及取索錢債搔擾為此特降聖㫖今後遇有各投下拘刷起移民匠取索錢債先須經由本路宣撫司行下達嚕噶齊官民官不係大數民匠合拘刷起移者依上拘刷並不得似前徑直於州縣一同搔擾如委實不係大數合拘刷起移底民匠各路官司却不得遮當外據錢債公事不得一同拘收人員取索若委係己身借過錢債照依先降聖㫖於宣撫司定奪立限歸還違者並行治罪巳刻雷雨大作其驟烈可怖六月丙申入奏行臺一切事理其㫖有云管民官管軍官鷹房打捕諸色造作一切大小公事並聽行省從宜處置申刻宋劉二尚書來謝王相曰公等皆朝廷遴選謝于私門未敢聞命辭不見七日丁酉奏准八座職印以白金作三臺鑄造其方寸皆從品秩有差午刻藏春上人以王相南下令僧逸以良馬二疋來餞陞户部員外郎王煥為左三部郎中是日加尚書賽典只司農卿領左部如故從再請也八日戊戌益都申宋人侵軼漣水與戰敗之是日追諡前經義狀元李俊民為莊静先生云云先生字用章菏澤人明昌間進士道號鶴鳴老人在河南時於隠士荆先生傳皇極數學已未間聖上在潛令張仲一就問禎祥優禮有加至是先生已殁其言盡徴故有是命以旌其德學云初張辭去田繼請以蒲輪來起公先生笑不答贈詩以見方來其辭曰丹鳯銜書下九霄山城和氣動民謠久潛龍虎聲相應未戮鯨鯢氣尚驕萬里江山歸一統百年人事見清朝天教老眼觀新化白髪那堪不肯饒明年正月先生卒於家愚觀其遺書所得葢康節之傳云嘗與劉尚書才卿講究焚黄故事劉曰間嘗聞之髙士美云其勅之全式尚書省牒故某官某職某人牒奉勅可追諡某名牒至准勅故牒年月日後備具相卿圓押其勅封上題給付某人第其子孫録全文如式火於本官家廟以告謂之焚黃九日未刻右丞相布哈來約王相行期平章以行臺未辦事同丞相赴省議決申刻右相布哈入朝見焉陳邃授濵棣勸農使陳君錫大名宰懐州劉淵西京十日庚子諸相座省劉尚書議部官署押事王相為裁定焉辰刻得宋荆湖制使與右相史公書并公文所贈遺禮物時宋景定二年也具其事以聞是日髙麗世子植來朝詔館于都東郊官舍從行者一十八人選筆且齊太原張大本字仲端美丰儀辯而有文采為館伴焉繼命翰林承㫖王鶚郎中焦飛卿犒慰有詔翼日都省官與髙麗使人毎就省中戱劇者十一日辛丑都堂置酒宴世子植等於西署其押燕者右丞相史公左丞相忽魯不花王平章張右丞張左丞楊參政姚宣撫賈郎中髙聖舉從西榻南頭至東北作曲肘座掌記王惲通譯事李顯祖皆地座西嚮其髙麗世子與参政李藏用字顯甫尚書李翰林直學士南榻座亦西嚮又有龍舒院書狀等官凡六人尚書以下三人皆襪而登席相次地座酒數行語既不通其問答各以書相示丞相史公首問曰汝國海中所臣者凡㡬處軍旅有無見征戍者掌兵者何人官號何名參政李藏用對曰掌兵者金氏史曰豈復猶以莫利支為名乎曰此名廢去已久其官亦皆帶樞府兵部之號史曰聞汝國亦嘗與宋人通好然乎曰但商舶往來耳平章王曰汝國今嵗亦収成否曰仰頼聖恩雨暘時若溥霑豐稔又曰聞汝國用宋人正朔然乎曰第商人私有賫至本方者實不為用耳參政楊公曰聞汝邦亦設科舉曰然曰今嵗試題為何曰賦則某題論則西門豹為政其炎如火詩則天砥礲兆民也又曰除詩賦䇿論外科名極多如經學隂陽醫方武舉筭學之類皆是也宣撫姚公曰傳聞汝邦有古文尚書及海外異書曰與中國書不殊又曰聞聖上近賜餼牽想已饜飫曰悉亡之矣曰愽塞亡之乎讀書亡之乎曰愽塞亡之矣遂哄堂大笑左丞張公問曰汝國王世系説是世臣𦙍裔曰非也其來是唐順宗第十三子逃難而立於此以王家後易姓為王時李叅政手持玳瑁聚翣史相曰執政官當以端方表德今所用非方非圓或聚或散何居李不能答有頃即以葛藤語亂之實飾辭也其世子與李叅政衣白縠上衽袍冠則漆紗圓頂巾履舄皆以絲為之帶則烏犀小革也其李顯甫面滿月白晳鬚髪皓然年十八以詞賦狀元第時六十一嵗通禪學善作詩蓋世子之岳翁也酉刻皆霑醉而去其導從儀物張蓋乘馬馬首復持一大紫蓋比常蓋四垂極長問之曰引蓋也名曰儀則明日諸相入見上聞燕語甚懽遂以手詔玉帶遣還制詞有云出水而陸去危就安宜寛漢法之拘續議楚宫之作蓋准元年先奏便民之請也至元七年朝廷遣平章趙璧郎中宋道字𢎞道終太子賔客徙王都於海西岸江華島一炬為焦土矣十二日壬戌辰刻耶律中書張左丞傳㫖今後應奉朝㫖如無御寳并印信文字不得輒行未刻王相陛辭皇后及皇太子於青宫太子慰奬甚厚有元老克壯謀猷之諭申刻復入朝遂陛辭焉遂出自南門郊餞者廉平章楊叅政賈郎中及留冬諸掾屬比至南平藏春令左右迊候於道者踵相接也上人待遇甚恭極賓主之禮十三日癸亥辰刻齋畢而去十四日甲子藏春來自南菴午刻㑹食史相行館寥休以灑墨玉盂斚贈公及觀所作玉鏡命諸公賦詩西菴有幸自得辭塗抺手照人毋用太分明之句仲晦為忻然也十五日乙丑欲移寓太儀使王儀之館舍史公不許令與叅議納哈君同寢處者四十餘日時惲管陳言文字就命日左右楊相權供中舍之職十六日丙寅詔封保定張柔為安肅公制辭曰大夫當七十之後致仕則宜國家列五等之封攷勲而授張某功成百戰眷荷累朝方深補衮之思遽有懸車之請宜疏上爵用荅元勛可特封某公致仕事業一時宜使古今之獲寵子孫後世要知忠義之可為宜保永年以全耆德濟南張榮為濟南公其詞曰大夫謝事得進退之宜國家定封明始終之義某官功髙舊德教備義方方深分閫之期遽有懸車之請宜疏上爵以示殊恩可特封某公致仕廣及子孫常保山河之世名垂竹帛永為忠義之門頤養遐齡保全耆德十八日戊辰權中省都事趙謙得腦痬極熾惲與楊都司誠之求療於太醫王儀之遂以真定麻澤民與視凡三往諾焉踵及門中使促而去之自是澤民内侍不得出者旬日趙之疾遂無及矣攜一僕既老而癡時臭惡聞户外予絮兩鼻孔為湯藥之夜則對榻而卧伺其緩急義之所激曽弗之倦十九日已已堂議選中省兩司都事遂以左司授惲此出史楊二公雅意辭曰據某何人過蒙擢用得文翰職足矣廿五日甲戌都堂奉㫖諭各路宣撫司宣聖廟國家嵗時致祭如月朔釋奠宜恒令洒掃修潔今後禁約諸官員使臣軍馬毋得於廟宇内安下或聚集理問詞訟及褻凟飲宴管工匠官不得於其中營造違者治罪管内凡有書院亦不得令諸人㮻擾使臣安下廿七日丙子都堂奉㫖夫五岳之中恒屬其一豐阜峻極作鎮北土爰古迨今祀典存焉粤自國朝開創以來祠祭之禮亦未嘗闕其岳廟中今後仰過往使臣軍馬毋得安下搔擾毁折樹木及不得於㸔廟人處奪要鋪頭口仍仰常切脩葺毋致疎荒廿八日丁丑都堂奏奉聖㫖道與真定路宣撫司據懐孟達嚕噶齊摩哩齊總管覃澄奏告管下地分多有屯住蒙古頭目遇有闗涉詞訟公事不肯前來對證往往不伏勾追以致遲滯公事准奏仰遍諭諸路宣撫司今後各州城管民官遇有闗涉蒙古軍人公事理問時分管軍官一員一同聽斷施行毋得偏向准此秋七月丙申辛酉朔前河東宣撫使張公以怨家有言去留維谷是日得行省諮保及史相庫左丞互為申理奏准充行中書省叅議方得解去良不易也嗚呼天道冥冥報施其間令人有可疑者今張以正獲罪然聖人所事不為過甚公豈犯此忌耶可不戒之哉其宣辭云張德輝宅心剛正處事精明及居風憲之司遂有澄清之志巨猾望風而屏迹疲民受賜以到今不示顯膺何彰獨立可特授翰林學士參議行中書省事尚資婉畫庶底成功十七日丁丑大司農左三部尚書賽典只改授平章政事制辭曰兩朝眷遇凡事精勤常辦集於軍前能經營於意外欲旌成績宜處台司當奉至公用遵大體盡爾贊襄之力副予委任之誠至於辦集經營當時論者謂於公甚為切當公遂置酒重以潤筆為答惲謝不敏十八日戊寅翰林國史院保雷膺與惲􅂶本院屬官十九日已邜石抹剛紇答授右三部尚書制詞曰望髙門第業不墜於箕裘身侍禁闥勞久服於嵗月宜分膺於三部俾庸列於六卿可特授某官當副朕心毋瘝厥職廿日庚辰行省諮者數事都堂議有可否史公曰雖分兩省其實一也若非闗利害者不宜妄有阻駁使王事成就可也今後凡行省所諮須三日内咨報自是上下云為如流水之源矣予當時嘆賞以為不多得也廿一日辛巳詔世臣敏珠爾孩兒圖喇太傅姓耶律氏在前金時戍桓州官愛里德漢語守戍長也其後與一十八人從太極神元皇帝同飲於黑河子於佐命元酌公其一也敏珠爾太傅第二子早卒其子明安岱爾時年十有三嵗今衛輝路總管耶律漢傑即其兄也聖㫖宣諭了也教省家與文書去者其制詞曰我家當開拓之初乃祖有經營之力人今不見功豈可忘雖爾身未及成人在朕心忍令無後姑承舊爵用顯元勲直須長立之年許領職司之務廿二日庫庫學士授中書左丞庫庫字子清時年三十九嵗嘗受學於王百一張耀卿其父潛邸舊臣世為阿塔齊漢語羣牧所官也廿三日癸未鄭江授侍衛官其辭曰鄭江職在承宣誓從征役跡去易就難之意有忘家憂國之誠不示褒崇何明勸激就帶已降金牌充侍衛軍副都指揮使同判武衛軍事景州軍民長官如故更宜戮力以奏膚功是日有㫖與老王姑護持玉華宫聖㫖者其詞曰煉師王道婦賦性純正執志不回挺然有古烈婦之風奉侍我太上皇皇太后積有年矣周旋之間曽無過舉當時雅為敬重使之入道為此先帝常加賜予已勅令真定管民官選擇佳地起蓋宫觀資給衣糧仍以玉華之名賜之以為我家祈福之地朝夕焚誦用報我皇考妣罔極之恩所在有司宜加持護毋容它人妄相侵奪毋以差役相毒以致不安常教告天與皇家子孫祝延福壽准此廿五日乙酉權中省都事趙謙終於上都客舍惲為棺斂并封視隨行衣装請于郎中賈君仲明蒙賻錢千五百緡廿六日丙午遣送趙君焚於都城東十里外回適趙氏親知徐總管者至其僕與所封装篋付焉三十日庚戌時前軍儲所官察察爾台舒固納錫喇筆且齊馬烏呼納等爭相為用丞相史公與庫左丞議曰今南邊極逺江淮又不用兵所事宜廢至於異時征進一行部官可辦既而中止特㫖以前都運周恵子鍇領其事七月廿七日丁亥前大名路宣撫史幕官雷膺前東平路宣撫司同議權詳定官王惲同日授翰林修撰雷詞頭云家學有傳士行無玷昔年詩禮已聞鯉過於庭階今日絲綸復見鳯毛於池上可特授某官同知制誥兼國史院編修官宜振斯文以弼予治王詞頭云行已無忝博學能文顧超絶之逸材足鋪張於偉績宜司綸命以贊皇猷可特授某官同知制誥兼國史院編修官當振斯文以宣朕命承㫖笑謂膺等曰汝二人可謂佛子出世矣惲等謝不敏既而奏准行翰林院事中省既以院印授承㫖公因與惲議曰前朝士人無㡬若比老使得霑一命儘有光矣遂保奏廿餘人擬為隨路提舉學校官是日有詔照㑹立翰林國史院道與翰林承㫖王鶚據保奏翰林官修國史事准奏收拾者在這裡底先與職名者外未到人員候來時定奪今開坐原保人數并已除翰林院官職名如後一已除翰林學士承㫖兼修國史王鶚翰林侍讀學士郝經差􅂶國信史翰林侍講學士李昶兼同議東平路軍民事翰林學士知制誥同修國史李冶翰林修撰同知制誥兼充國史院編修官雷膺王惲一未除見收拾王盤直學士徒單公履待制孟攀麟待制宋思誠修撰胡祗遹應奉右仰照㑹收拾者准此承㫖王公字百一曹州東明人知人榜詞賦狀元皇帝在潛時首以禮幣徴焉以老儒故上甚敬重每見以狀元呼之以元年七月受是職公上章言修史事云自古國亡而史不亡唐取隋史焉宋取五代亦然金不為遼作史至今天下有遺恨我國家以神武定四方皆太祖聖武皇帝廟謨雄斷所致若不乗時紀録以詔萬世切恐嵗久漸至遺亡又舉前朝名筆數人於是上特降是詔焉廿八日戊子丞相史公遣修撰雷膺送安肅濟南二國公誥命公曰若所有潤禮汝二新人中受之且代光院之贈廿九日巳丑申刻丞相史公臥閣中前刑部馬烏呼納來謁辭不見曰若公務當於都省相見秋八月丁酉辛卯朔徴君許衡授懐孟路教官制曰許衡天姿雅厚經學精専大凢講論之間深得聖賢之奥受罰者恐陳君所短為盜者畏王烈之知所在向風真堪正俗可令于懐孟等處選揀子弟俊秀者舉歸教育取作範模冄令董子帷前有傳授之子弟重使王通門下皆經濟之名臣毋喪斯文以弼予治竇傑授太子少傅制曰德全天懿學得聖傳文章足以徽帝猷言行足以為世範屬周世本支之盛要漢家羽翼之成宜導春宫用嚴師訓可特授太子少傅早為諭教當自誠心左右前後皆正人宜公所選干戈羽籥在東序行見其儀以上二篇皆楊公西菴筆也宣撫姚樞授太子少傅制詞曰姚樞天彛素厚聖學有傳能全踐履之功發自誠明之性養成耆德無非禮樂詩書當侍春宫爰置左右前後可特授某官要明早諭以贊元良用傳震索之祥得繼離明之照二月壬辰奉㫖諸路學校久廢無以作成人材今擬選博學洽聞之士以教導之凡諸生進修者仍選髙業儒生教授嚴加訓誨務要成材以備他日選擢之用仍仰各路官司常加主領敦勸隨頒降從六品印信勾當癸巳總帥汪某授鞏昌路便宜都帥其制曰某官勲髙再世勇冠諸軍向因犯順之徒遽起稱兵之釁賴茲戮力殱厥渠魁及當來覯之時殊乏自矜之色觀其誠赤深可尚嘉就帶已降虎符可授鞏昌路同簽便宜都總帥事宜盡贊毗以裨遺逸垂功名於千載萃忠義於一門尚副朕懐以固吾圉甲午奏遣宣使王好禮閲鄧州軍實仍送萬户史權改授江淮大都宣命及奬諭軍將等詔其辭曰朕即位之初深以戢兵為念故前年遣使於宋以通和好宋人不務逺圖伺我小隙反起邊釁東剽西掠曽無寧日朕自還宫諸大臣皆以舉兵南伐為請朕重憫兩國生靈之故猶待信使還歸庶有悛心以成和議留而不至今已一載往來之禮遽絶侵擾之暴不已彼嘗以衣冠禮樂自居理當如是乎曲直之分灼然可見今遣使往諭卿等當整爾士卒礪爾戈矛矯爾弓矢約㑹諸軍秋髙馬肥水陸分道而進以為問罪之舉尚賴祖宗社稷之靈其克有勲卿自當宣朕命明諭將士各當自勉予其大賫汝仰下項把軍頭目毋替朕命四日乙未前奉使賀某復授宣諭大理國使其詞曰賀某幼懐竒節筮仕昌時及知遇於先朝遂撫綏於大理揚威絶域昔收定逺之功服事彤庭屢抗伏波之請宜旌前效俾煥綸章汝其宣暢皇猷洋溢方外爰體綏懐之意以安遐邇之情轉為招徠式副所託五日巳亥承㫖命惲與某同撰釋奠諸文某人所撰中涉論議公曰文自有體此等文字皆是贊頌功德不當如是徐莞爾曰不知謂我云何至於散文亦有三説入作須若虎首取其猛而重也中如豕腹取其釀而多也末同蠆尾取其臨出螫而毒也此雖常談亦可為之法也六日丙申詔追諡真定五路萬户府叅謀李大蔡州破將被戮萬户史侯救免之撫治真定有法其詞曰政書仕籍聲振諫垣至於今代以有為方之古人而無愧適將擢用遽爾憖遺既乖顯異於生前忍使湮没於身後宜錫如綸之命用増拱木之光可諡曰貞肅魂其有知歆此無斁又同日復追諡前監察御史中庸先生張特立其辭曰學有淵源行無玷缺雖經䘮亂不改故常向潛邸之升聞降璽書而褒重未遂丘園之賁俄興窀穸之悲宜煥絲綸用光泉壤可依前號中庸英靈如在寵數其知又復追諡故徵君魏璠恬退自如剛毅有守常謂生前之不達忍令死後之無聞宜定嘉名以光後裔可諡曰靖肅先生名璠字邦彦金貞祐初詞賦進士第道號一峯老人正大末以修撰使武仙不屈大元庚戌上徵至潛邸條陳三十餘事如定官號頒俸祿功罪有賞罰能否有升降署治天下之急務又曰農桑天下之大本不可不重是故明君重五榖而賤金玉告訐之俗興罰及無辜僥倖之門啟官及不善漢之常平宋之講筵萬世可常行也又薦中州名士大夫六七十人今之施為多出先生餘論也今曽孫必復已為翰林修撰七日丁酉許教官衡改授國子祭酒其辭曰懿德素全經學洞貫視聽言動皆合禮宜進退周旋舉皆中道所在滿禦冦之屨疇非趨董子之帷宜處成均以全樂育可特授某官務講明於聖道為矜式於國人八月戊戌太傅姚樞改授大司農其詞曰學明經㫖徳備天彛由本邸而知名從王師而伐罪黽勉從事於今有年可改授某職務要克謹農時一遵詔㫖民舉縁於南畝嵗有望於西成庸厚民生以强國本九日巳亥鄭汝翼授大理寺丞其詞曰某官法律深明臺寺徧歴常謹少恩之戒共推斷獄之平任此舊人弼予新政可特授某官宜在簿書之際更詳朱墨之工十日庚子賜髙麗國王倎手詔時值權臣金氏之變其辭曰世居東土封自西周中國之姓雖更外邦之貴不闕向以權臣之専寵至於隻矢以相加卿慨發純誠來修覲禮敬形于色濟濟然殊可觀情見乎辭謙謙而不自伐宜還舊服往紹新休可封髙麗國王仍統治東方諸國如故尚服寵光益加奮勵十一日辛丑徵君李治字仁卿樂城人前進士初公徵至詢以時事但以真定木場抽分官錢修蓋文廟而已道號敬齋授翰林學士制詞曰某官秀擢巍科力窮聖學據縱横之文筆足潤色於皇猷况當青史之編宜與玉堂之選可特授某官知制誥庶得腹心之助以光綸綍之司十二日壬寅劉秉恕授中書吏部侍郎其詞曰家學有傳天資素厚向處副車之地已全製錦之功榮示褒崇以明奬勸可特降金牌授某職兼邢州安撫使往膺朕命毋廢攸司儻中心不異於此時豈後寵反薄於今日十三日癸卯太醫王儀之授太醫院判兼教授其詞曰厯學精髙儒術通貫肱不待於三折術已底於丕全久侍禁闥共惟耆德可授某官勾當尚傳素業用授諸生儀之林慮人沉静有議論每有所陳禆益時政甚多十四日甲辰賜劉元帥手詔兼宣諭䕫府路新附軍民人等其詞曰且土地定其疆固有朔南之異而父母愛其子曽何彼此之分朕嘗以四海為家萬方在已凡有來賔之俗敢忘同視之仁近因宋國之未臣遂致蜀川之重擾彼軍旅焉老淹於屯戍彼民人焉力盡於轉輸况值㐫荒舉皆轉徙保聚山麓者延生於嵗月潛匿澤藪者横死於風霜彼君有昧於天時在朕心亦有其慙德今茲劉整慕我國朝既能順德而來當副徯蘇之望市肆勿易田里俾安爾有貨財毋令刦掠爾有禾稼㒺使踐傷諸回回通事人等逃在彼軍者許令自還為良不屬舊主除已行下陜西行省常加存䘏不使侵攘外今降金牌五銀牌十以旌有功者當續具姓名頒降宣命凡在軍民各寧處所故茲詔示想宜知悉十五日乙巳董文炳授親衛軍都指揮使其詞曰某官性秉忠貞才堪任使積年事上不違咫尺之天今日定封當處爪牙之地可特降虎符授親衛軍都指揮使同簽武衛軍事尚嚴宿衛益効勤勞用副朕心以成爾績十六日丙午宣諭歸附段實曰向率我師往臨爾境重拒國人之請以從城下之盟欵附而來忠勤益著庸示至優之渥以彰同視之仁尚修前效無負初心撫安已附之民招集未降之衆國典有常卿其勉之十七日丁未宣諭青居山帥臣某官爰從變故明審事機攜赤子以來歸保青居而不失要明實志屢立戰功儻不示於寵章何以旌其忠懇用錫虎符之命以彰鴻渥之殊餘如故尚盡乃心無瘝厥職儻忠心不異於始豈後賞反薄於前前通許屯田萬户宋抃字文卿授某路勸農官其詞有天資忠慤儒學専精昔蘭省之荷橐久勤王事近栁營之積穀大備兵儲宜崇褒奬之恩以盡始終之義其弟宋彰字夀甫屯田府諮議其詞曰明切事機用抒誠欵能釋樂成之業以明懐德之心宜示褒崇取為勸激可充鄧州屯田總管下諮議兼招撫未降軍民勾當更當自勉期有成勲終折州總管邢州張安撫耕字耘夫真定靈壽人年二十用資入仕以名臣子補俸職大元癸丑授邢州安撫使至是超拜以施治效為人長身白晳氣貌沉厚犯而不校改授吏部尚書其詞曰德備忠純材優經濟及試臨民之職首馳報政之聲保安全於久廢之餘集流亡於四散之後以茲明效宜示寵章可超受吏部尚書兼前職仍易虎符以昭鴻渥往膺朕命恪守攸司十八日戊申奉㫖頒降中統權宜條理詔參政楊公筆也制曰事非前定無以啓臣民視聽不惑之心政豈徒為必當舉帝王坦白可行之制我國家以戎旌而開建於禁網則闊疎雖嘗有所施行未免涉於簡略或得於此而失於彼或輕於昔而重於今以兹奸猾之徒得以上下其手朕惟欽恤期底寛平迺姑立於九章用頒行於十道比成國典量示權宜務要遵行毋輕變易據五刑之中流罪一條似未可用除犯死刑者依條處置外徒年杖數今擬遞减一等決杖雖多不過一百七下著為定律掲示多方闕嗚呼六計周官所以弊羣吏之治三章漢法所以慰百姓之心詳酌舊規著為新制惟上令昭垂如日月則下情易避如江河雖曰從輕期於不犯咨爾有衆體予至懐故茲詔示想宜知悉十九日巳酉辰刻同雷彦正㳺宣撫子明平章政事赴南平山辭藏春上人時入壇不克見㳺於菴門外大呼曰師父顯等謹來拜辭時丞相史公第四子杠侍上人於此遂置酒相别比回朔風振野吹砂礫射人殆勁矢然寒已不可勝矣廿日庚戌詣都堂辭諸相南歸廿一日辛亥辰刻由都西門出是夜宿桓州廿二日壬子抵舊桓州廿三日癸丑前次半羣頭取直東南下崖嶺夜半宿山南農家明日甲寅宿雲州張繼先家廿五日乙夘自望雲㳂龍門河南行入寒山峪遇大雨憇寒山逓舖午霽渡泥澗人馬縋而下挽而上登靖邊北嶺有虎突起澗東嘯而去人馬為辟易投宿碧落崕下崖峻絶方廣如畫屏然泉流縈帶環山根一匝秋稼已熟黃雲滿川蓋朔方之武陵溪也廿六日丙辰下十八骨了泥滑不能騎比至平地僕馬為痡矣行約兩舍抵田家止宿廿七日丁巳宿北口小店明日踰灰嶺試桃花峪温湯山間殊有竒觀石為盤渦如碧玉盆者非一壽藤灌木交䕃左右其水泉蓋潞河之上源也是晚宿新店又二日至燕粤自中元九月奉檄北上至是年辛酉九月凡十有三月實歴三百八十四日秋澗集卷八十二欽定四庫全書秋澗集卷八十三元王惲撰
