body:
  text: 大元國故尚書省左右司員外郎韓公神道碣銘并序夫朝廷山林之士有徃而不返入而不能出者惟其勇於静退貞不絶俗是則為丈夫之事吾於鄉先生韓公得之矣公諱仁字義和父顯有融德不耀公甫冠而孤事母以至孝稱好學强識聞一善事樂為而不厭正大間舉孝亷辟為州孔目以能充元帥府令史方羽書交馳際公勵精所事為上官推重畨譯史安天合為相友善壬辰北渡隠居鄉間澹黙無所營庚子嵗詔行臺於燕開幕府選參佐得良能為亟用安侯薦首聘公充尚書省都事癸卯春以國計北覲上詢以金粟川流蘿圖鞏固将何策可濟對者以十數獨公敷陳詳明簡而得要有鑒古訓用賢材之説上喜甚仍奏天下困窮者實繁有徒方發政施仁之秋宜子惠俾霑大賚允焉迄今貧子月給廩料葢自公伊始是年秋丁母梁氏憂尋奪哀起授左右司員外郎公早夜在公以吏務自任郎中李獻卿才望重兩朝亦許公和光解紛能就吾事又明年冬以祔母夫人得告南歸既襄事偕内子張氏棄俗入道號逍遥子遂西逰太華終南諸山黄冠野服偃然閱世如老松卧雲壑者逾三紀焉公資明淑生平與物無忤其薦賢周急有大過人者宗族藉之通達者甚衆嘗買僮即約之曰汝等以世故不幸及此義則黽勉相從否則任渠所徃晚節專以方書濟人為事聞一秘方竒訣求訪百至易千金不恡嵗乆得益多如煙霞醫林等集悉鋟梓流布猶虞所傳未暢擇標治者遍書閭巷壁間京師物繁嵗多竒疾賴公起死者不勝紀例來謝辭不見曰吾庶幾道念濟苛苦而己餘何計當時少傅竇公亦以醫方談客多獵神農經所載為用公則博採經驗所謂海上方者録之無遺二公雖趣向不同於博施則一也故竇韓之名並傳於世先是道人謝志賢等歆公進退有道心存濟物殆非尋常所可及遂請主神寳修真二觀餘三十年奉公猶一日公有二姪長曰天祐泰鹽提舉次德旻由後衛從事充樞宻院令史德旻以公耄期迎至家庭與妻苑氏侍養送終禮無少憾士論賢之公以至元十九年十月望日考終牖下享年八十有四某月日將歸窆汲縣耿岡之新壠墓須銘以鄉耆故來屬筆其敢以無斐辭銘曰顯允韓公生有淑質陳力周行孝亷應辟移而為忠載揚厥職濟物之心一何云亟漢署千官含香入侍經國之對允合眷思片言回春仁者之賜脫屣榮貴神武挂冠退身急流又人所難全真為教樂在一簞青囊集驗救夫世癏旁搜博施一壺市間保合太和浩浩其天我錬我形我駐我顔較彼獨善九鵬一鸇棲遲有窠逍遥有篇青山白雲𤣥門老仙黄岡北原睠焉故山惟耿新壠繄公改遷魂兮來歸諒先生之所安大元故濛溪先生張君墓碣銘并序余官晉府者四年得進修之士一人曰濛溪張君每暇與相徃來把酒論文最可尚者君無求於人人之有得于君殊沖然也私自念異時禮文興舉吾儻與當任渠責及承乏翰林君墓草已宿已未夏其子思敬來京師謁予以墓銘為請慰唁餘為欷歔者久之言猶在耳其忍以不敏辭君諱著字仲明姓張氏世為襄陵縣張相里人曽祖諱某雅重然諾顧義所在雖死生以之祖愿父彬皆潜德不仕讀書治田子孫相傳以為家法君少頴悟不待勉勵卓然自志於學國初戊戌嵗設科取士君以詞賦中選既而嘆曰士當逺大自期雕蟲篆刻将何為哉適貽溪麻先生洎前進士兊齋曹丈來主經局君喜且不寐曰今而後吾學有所正矣遂刮去故習沈潜伊洛諸書雖饑渴寒暑貧窮得失不易其初心所謂道之體用文之華實探涉其源流咀嚼其膏味積而為文詞發而為事業不盈不矜介然家居以樂育諸生為業中統建元頤齋張公以直道清操宣撫河東亷君才行擢主潞城簿政亷能以畏愛稱明年公見事齟齬不可為以親老西歸有司累辟不就至元乙酉用薦者授平陽路儒學教授於是衆論大饜士風為一變先生年彌髙德彌邵學益博文益竒士友知所依嚮吏民咸有矜式秩竟不聴其去者逾再考厥後子思敬自南陽教官來省聞彼中風土樂焉曰名山大川平日所願見遂命駕南逰以至元壬辰夏六月廿六日考終寓舎享年六十有九初娶陶寺里大家趙氏一子思敬二女長嫁同邑王黼次適洪洞梁龜齡繼室曲沃靳氏孫男二曰世權世衡思敬以家學今充隆福宫宫教先生姿明亮色夷而氣清為人誠厚寡慾不戚戚於貧賤與人交始若疎淡乆之愈敬而愛人百負之終不較望而知為雅德君子其成就後進為已任故晉人以文名而達者多出其門竊惟亡金百年來平陽號稱多士毎嵗舉子赴選大約數倍諸郡至有白首塲屋庶幾一第餘有不暇及者唯君年甫冠即能知所學所從拔出習俗潜心古道踐履外詩文雜著曰濛溪集者五百餘篇何多矣哉晉絳諸人未之有也况一辭一藻典雅有法理明辭約以自得為主是可銘銘曰四科稱賢曰德與藝其在聖門用不偏廢文乃道輿經天緯地苟遺其本剽竊何異利禄科塲疇非誕誇聮綴補緝是何言邪濛溪為學其復不遐洗心程張正藝曹麻閉門窮經其書滿家玉佩瓊琚粲焉辭華含章時發其助也多士之生世濟時行道時既我乖立言明教生榮没傳朝菌夕蓼達人大觀彼此奚較大川河宗名山華崧地靈氣異先生所鍾一朝長逝杳焉飛鴻世皆知仁智之所樂吾獨為歸根返壑乃先生之所終凌倒景而不滅其元精耿耿固浩乎其所不窮適來吾時適去吾從先生之心與造物也從容尖山西東相里新宫我銘斯石如勒景鐘雖陵遷兮谷變尚知為濛溪先生之封故趙州寧晉縣善士荆君墓碣銘并序元貞元年春亷訪荆侯改道北燕過京師來謁再拜以先表屬筆因念予與侯初定交于癭陶一見如平生後十年復㑹於東楚握手道舊勉予南行忠厚之氣藹然萃顔間令人有不能忘者今以是來託載惟疇昔其敢以固陋辭謹按典瑞少監焦養直善狀君諱祐字伯祥趙之寧晉人世陶洨濱逺祖暨禰以改工是圗曰與其供器用於一鄉曷若以善及人為愈於是板行五經等書不二十寒暑荆氏家籍布滿河朔君甫冠而孤毎以保大家業為志貞祐兵起取五經泰和律義篇廣韻板閟墟壙中亂定來視盜發掘無幾君悉力補購隨復為完部或者云初藏書時善本固多唯取是三者何哉曰經者道之本法者治之具韻者字之始文籍所由生其為善己多聞者謂知本于時官府生聚雖稍稍有立詩書法律晚生後輩不知為何物一旦得是如瞽者復明迷者之知津也而又印模精取直亷故售者廣屋日為之潤所可重者積而能散縣人王壹者坐事累繫獄吏挾私欲死之君力與營救彼不顧且諷而徼賄竟傾貲出之渠來謝却不見曰吾區區若然者憐爾妄陷非辜餘何有壬子嵗州縣通籍冒占者有禁里嫗瞽而來依者惻然以乳姆收恤轉易書輩徃徃宿負審其窶既折元券復惠之書嘗有以女奴來償者辭不克聘而遣焉斯皆風義矯矯人難能者率樂為之故鄉里無親疏以善人稱君以丁巳秋遘疾遺命仲子元綱曰伯叔二喪未克𦵏汝勉襄大事以卒吾志言終而逝實是年八月八日也夀五十有九藏先塋昭穴君資和易處事明敏終以失學為愧憾及諸子長皆教之讀書嘗訓飭曰吾已面牆無及今幸嗣先業庭户間書帙紛繙豈有資人進修睯不自力將何以免君子之譏且先世易冶而裘所期正爾汝曹其勉旃君初娶劉氏繼室蘇氏生四子長國器中戊戌詞科次國用善屬文皆前卒次元綱自幼有成人風君嘗語所親異時保家子也竟如言季幼紀為人雅重信道篤少從敬齋李先生學所得為多由典瑞貳卿擢任風憲今為山北遼東道亷訪使女一適進士張景賢孫懐寳男孫九人曰諶曰詢曰誠曰謙曰謐曰誼曰諒曰詡曰諏女孫五人一在室餘皆適士族曽孫九女孫如之於乎盛哉予然後知善惡之報至子孫而後定者審矣銘曰繄士居業擇術是先有篤者志善乎變遷捨鈞治書理幾於研顯允荆君思深業專誓教子而亢宗見藏書之有權要本孝義奉而周旋萃英敷華煥乎簡編迪我後人學者賴焉磊落載腹宛從蹄筌積厚能散憫窮拔寃不有其祉委順百年慶流後裔子孫蟬嫣人定彼勝其然亶然二子翩翩遺珠在淵仲克世荷愿而稱賢季由近侍三使輶軒較夫善利孰大斯傳固惟自稽古之力實資藉之所縁欲報之德有昊者天刻我銘章于晉之阡遹追來孝以慰下泉異時推耆德而祀鄉社尚有攷于瑶鐫洪嵒老人石琖公墓碣銘并序公姓石琖氏諱德玉字君寳遼東葢州人疎髯炯目氣骨臞清超超然如萬里之鶴貞祐初以良家子從軍􅐁夏折橋功得官積勞至武德將軍北渡後歴仕在相衛間母杜氏唐相如晦後公天性能孝愉色婉容斑衣垂白朝夕孺慕雖菽水無餘有南陔白華之志時杜氏夀登八秩清修絶葷茹素日庭除間生白菌百餘本掇去復茁者數月人以為孝感所致時名公贈詩有似憐甘㫖闕春風茁玉芝之句闕趨人之急逾於已私至遇不闕竹木花石時釀名酒客至輙闕而後已眼花耳熱與之扶策闕之某處手植而即蕃者也此闕眄柯怡顔喜津津溢眉睫間曰吾且闕有闕不闕壁矣嘗種竹當户或謂太迫曰待其藂茂秋霽月明之時俾清樾透簾為此君寫真耳故終日翛然對之揮灑為樂其清澹如此晚年游心命書人有問必以修已安分為答能此不待孤虚旺相吾言固有徴矣歳丙子公年八十有五嘗繪洪山歸隠圗以自歌其所樂因號洪嵒老人是嵗冬灑然而逝若委蛻焉孺人劉氏能遂公初心主治中饋不知其為貧家也生女子二人長適御史康天英次適河東道提刑按察使姜彧家府與公交欵曲篤世契三十年一别終天有恨何如尋步入街西故里眄睞竹樹慨然有聞篴懐人之愴老淚濡毫而有斯作銘曰貧而樂有類乎黔婁安而隠似慕夫德公事親極融融之樂逢辰出蹇蹇之忠布衣歸來黙而自容將徘徊而孰友侣藂筠而伍嵒松生也順事没寜吾躬古之所謂鄉先生死而祭于社者其處士之堂封乎大元故廣威將軍寧晉縣令李公墓碣銘并序公諱讓姓李氏其先易水黄山人也父海資善良世樹藝為業公既孤母張氏以儉持家就熟南遷至寧晉唐城鄉愛其風土遂占籍為縣人公初生顱骨有異狀及冠羙鬚髯聲音如鐘為人善騎射勇於赴義為一方推服貞祐初河朔失守所在㓂盜充斥日相吞噬公慨然輟耕壠上團結鄉豪㳺獵陸澤荆藺間以保庇井邑為事葢有所需以明歸附之志嵗已卯天兵南下公與兄直首率里人迎拜耨埓諾延於軍門嘉其效順授直行寧晉縣事公管軍總校仍聴元帥蔡國公節制時嵗荒民饑道殣相望田東有水栅曰歴城大澤瀰漫周浸百餘里菱芡魚鳬資生之物甚富民徃依大獲厥所庚辰秋金冀州将柴茂以兵來取兄與公力戰而前直死焉公憤大兄敗没衆又失所庇以圖報復瀝血為誓雖食頃不忘也繼從縣長王帥復奪其栅居無幾茂復合大勢来争前次滿氏公聞之盡匿精鋭于歴旁二十里叢葦間以弱誘茂令之曰伺彼過聴金聲而作親驅數百人前逆鋒纔交即佯北逗茂逾紀氏塢金鳴伏發茂腹背受兵大挫其鋭公回戈追奔五戰皆捷自是冀人聲熸不敢復窺滹垠矣歴城用以全安帥閫酬勞授主本縣簿乙酉冬武仙以真定叛麾下劇節副鄭進等乘勢剽掠趙癭陶迤東悉為丘墟公度力不可支收合餘衆乃與鼓藁二主帥合勢併破劇鄭諸砦馘數百級而還所失保聚生齒皆得復故丙戌冬仙復令劇鎮戍趙州明年春從大兵規取克焉時太師穆呼哩以奏得専封拜録公前後功授公行鼓城帥府右監軍並授銀符使顯異焉既而陞充本縣令以寧昌為世封於是招流亡布恩惠畫井閈起市集㕓居有貿易之利田里無追呼之擾四民樂業外戸為不扃矣又為勸田務抑㳺惰扶寡弱治姦蠧是又公之所必行而求自慊民有衣食不自給者公發私藏以贍之富足帥府聞之為復其三年貴矣公必耕而食蠶而得衣居常以榜揭門扉私囑干謁請無相覿其亷守如此癸丑春以老致仕令男天澤嗣職優㳺里社日課子孫耕鑿為務嘗斧桑田間或勸之公曰官時來耳為農吾家素業我若爾兒輩尚惰而自安或者謝而去古人稱貴而能賤丈夫之事公其有焉以至元十一年十月廿二日考終牖下享年八十有七越四月𦵏縣西北下王里之新塋禮也祖送者幾萬人夫人宓氏趙氏張氏子男六人長曰天澤歴寧晉元氏兩縣簿次天禄本縣鄂囉千戸次天祐監寧晉酒次天祚不仕次天祥次天祜某鎮巡檢女四人長與次俱適趙氏次適牛氏次適郝氏男孫一十九人女孫一十三人重孫男一十八人重孫女一十三人初公畜家僮數百指悉縱遣為良曽無鬻身分役之責人又欽其德厚云天禄性孝義仡仡有父風以孟舊塋屢為滹浸所囓遂改卜於此既襄事贄禮幣百拜来請銘予方問俗洨濵見其遺黎故老脱離兵革六十餘載猶為懐思王李諸人眷眷不忘有配社尸祝之報嗚呼貞祐之亂可謂離且瘼矣元元之民莫適所歸不為人所魚肉必轉死溝壑如王李諸公雖奮棘矜起隴畝至于父子昆弟出死力角羣豪經營捍蔽使一方奠安又識夫天運所在挈民去危邦而就興國誠亦出人意表一時賢豪者也甫定後復能俾官府生聚日就完好今歴官鄉曲嵗時拜墓于于而来者皆曩時不能自存之嗣續也其德民之厚感民之深又何止童不雉捕長江之虎渡者哉其宜子孫繩繩蟄蟄皆有所立然後知德施于民功被一時者天之垂報何其豐且阜哉銘曰癭陶北郊里號下王顧瞻佳城蔚乎蒼蒼是為晉長李公之藏惟是李公千夫之防果毅之勇木訥之剛奮身隴畝舉圗義匡貞祐南播雲擾之俶割據侵陵互相魚肉民匪殱夷轉死溝谷宛彼歴城居水之腹菱芡魚鳬大益不足聞公来依襁負相續如鹿走音如鳥棲木四境騷然獨為樂國耿氏昆仍旌旗部曲既復兄讎又知所屬草昧初分官府始置戢我武幹明夫吏治内守以亷外方以義撫循有方興滯補弊扶弱抑强繩姦束吏百戰遺黎竟保終惠民之戴公頌聲噦噦尸而祝之懐恩罔替勒銘豐碑尚克永世大元故河中府南北道船橋總管謝公墓碣銘并序公諱某字仲進其先燕之香河人世守儒業父某金吾衛上将軍河東路總帥公其仲子也為人性行淑均沈實有顧慮既冠嘗從父西破川蜀毎領牙隊居前當破竹際掩目隱心未嘗以嗜殺為快雖執訊獲醜力為全活者甚衆用勞充秦鞏路軍儲大使辦集有方餉道為不乏丁已夏先帥薨君實主其喪縗杖瘠立躬起塋壠棺衾儀物既易可觀㑹者大恱復樹豐碑昭德神道具表新阡有光焉大兄維石襲父職殁軍中行臺檄君以例繼執不可曰兄念天顯極友愛顧某不啻若手足然家事一聴予處鞠立之責正在今日竟以其嗣往代其遹追永言之思友于恤孤之義葢終身焉然其過於人逺甚者多類此晚節以故侯失將駕下澤乘欵段逰居中條田間耕牧卒嵗裕如也至元已亥冬十二月廿有六日以疾終平陽府崇道里私第之正寢得年五十有五官至河中府船橋總管越三日厝於府東神泉鄉之南里原從遷壠也萬口稱惜咸以善人歸焉夫人劉氏晉之平陽人德柔嘉主内事殊嚴生三子長曰純克家有立志次曰繹謹愿盡子道季夭女一適裴氏子孫男一人未名既卒哭嗣子純來求表其墓道予私念其故昔孔子遇舊館人之喪脱驂馬以賻曰吾惡夫涕之無從也君於予西道之主人也從㳺讌語姁姁然葢三年於茲殆非過客之有頃其可辭不敏君生長秦晉出身軍旅間而禮度雍雍不知為将家子與人交信而誠人無有間言其在諸弟間棣華輝映惟恐弗及又出天禀粹然也嗚呼以君之徳之壽較之有不相稱及者仍哀之以詞銘曰蒼茫兩間生也倐寓一氣之來命有定數彼修短予奪理則有之若不繫夫積習善惡之故嗚呼謝君一僨而去孝友淑善曽不終始渝素天之報施如此豈定者不可奪來者固所與也將子孫延昌以永其終譽邪吁故將仕郎汲縣尹韓府君墓銘并序府君姓韓氏諱澍字巨川其先陳留酸棗人世以儒業顯逺祖有方官至大司空六代祖璹累階銀青榮禄大夫五季間北渡河遂占籍為衛人榮禄生朝奉大夫秪德朝奉生八十一秀才奕山山生渤亦舉進士渤生柜善居室遂用富饒於君為曽祖祖悦有淳德不耀父仲字仲寛所居以善行稱君自穉齒性沈潜寡言笑羣兒劇里中過不少睨宗黨異焉少長以刀筆起家用言者為安陽吏主掾以能入為府屬吏丙辰嵗朝廷以相之五縣封太弟為采邑繼郡帥例肆覲君毅然以民計從行及敷對稱㫖擢為本府戸曹孔目官明年春降璽書起聘君太原髙公鳴為彰德路總管遂汰冗員擢羣能新舊圗至設府史不數人君首以才選無幾轉案牘提控官夙夜在公勵精所事閱六嵗克勤猶一日大為總尹所知轉録事㕘軍至元二年轉官制行積前後勞授以縣尹下車首以美俗劭農為務顧謂竂屬曰富足者禮義之資耕桑者風化之本至于飾亭傳謹迎候奉上官徼目前之譽非吾所知也於是下教條課戸丁斸藂薄植桑果以敦大本非農隙不許入城市暇則行縣檢視勤惰而賞罰焉自是原隰畇畇榛惡為之開鄉隣有以忿䦧訟於庭者君曰孝悌力田親仁善鄰古之善道初無大故何乃至爾諭而遣之至頑不率教則曰聴兩造明曲直是不難恐一置于罰終身玷辱為鄉黨指誚吾惜汝者此也儻不吾念論如法比秩滿五事備舉所獲来暮之歌厥聲載路矣五年用新銓法勅授將仕郎王髙唐縣簿凡九月輿疾歸明年卒於絃歌里舎得年四十有八實至元庚午春二月一日也越十有九日從𦵏安陽縣西陵鄉武官原之新塋母李氏時年八十拊柩而哭之慟曰天乎遽奪我純孝至此酷乎聞者憫其賢孝縣君金相人進士秦公之孫配君德良稱生子男三長曰從益自憲臺六察史今為燕南河北道提刑按察司書史次從愿從革女明童適王氏子男孫四人後九年嵗戊寅冬十一月七日終祔安𤣥堂之左禮也初縣境夏大旱比致禱私念事之壅底獄之鬱滯亦沴氣是致乃裁決牢繫為一空及禱蒼山祠雩舞未收雲幢幢起中豁翼日雨盈尺繼謝祠下車還衆曰尹精誠若是當有回馬雨表公䖍至半途果然尋鄰道以蝗災告備已而竟不入境縣狀其異以聞是秋為有年君温雅有沉量慮事逺善措畫臨政暇裕略不動聲色亦未嘗矜喜以已長掩物其孝愛友悌出天秉粹然不忍一朝違母氏側嘗行役逾時眷焉陟岵寢餗為不安於承顔孺慕若此其至初見弟季既多枝葉蕃衍門户事繁重故挺身吏案䀆心所事匪厥躬是私期於庇本根寛父母抱者幾三十年若府君者可謂克孝克恭念顯養志者矣某祖妣韓是為君女叔曰女叔者稱父之妹也出六帖君之嗣從益次某行為外弟一日跪而請曰先人棄養奄踰八年坎不及誌有銜未袪唯是表於墓左者又闕罪惡之大無可言若銘則尚於兄焉有託某追惟祖妣平生之言得君行為最詳因繫之以銘銘曰於鑠韓氏世為儒之宗兮彯纓若綬揚歴位乎公兮猗嗟裔孫掾習匪其躬兮黽勉從事養夫親之志兮庇我本根殆葛藟之義兮聖哲所稱吾今見其人兮於穆府君諒彼古之倫兮兩漢循吏鑄頑以成仁兮嗚呼令尹誠亦吏之循兮予銘摭實其敢過為文兮魂而有靈尚愾嘆之一呻兮秋澗集卷六十定四庫全書秋澗集卷六十一元王惲撰碣銘
