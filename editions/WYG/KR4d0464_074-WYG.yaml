body:
  text: 秋澗集卷七十四元王惲撰樂府望海潮乙卯嵗端午賦北郊騎鞠呈節使史侯龍沙王氣恒山秀色徳星光動南州使君髙宴北城佳處薰風紅閃旗旒兩翼擁貔貅駭鼉鳴疊鼓杖奮驚虬一㸃星飛畫柱得意過邊籌兜貂蟬元自兜鍪笑閭閻小子談笑封侯萬騎平原千艘漢水堂堂小試青油賔從儘風流喜武同張肄書漫韓投樂事更醻醉魂還夢菊花秋二為故相雲叟公壽炬明珂馬㦸森兵衛日長鈴閣春凝舜朝儀鳳傅巖霖雨世傳昴宿儲精天地入經綸見東山髙卧一念蒼生談笑金華故事六合海波平一杯福壽川増請文人静聽賤子微誠蘇嶺雲霞西溪梅竹風煙畫出共城羽翼漢功成儘山中名在天外鴻冥一㸃台星清光長射老人明三為子初縂管壽桐鄉遺愛于門隂積充閭氣自葱葱霜華封菊橙金泛醁秋香吹滿簾櫳人物漢元龍喜升堂一拜今嵗相同洗盡金貂貴氣黄卷貯深功見君雅量雍容信男兒到此方是豪雄林下夫人膝前文度摩挲湖上雙峰福壽儘無窮㸔一家樂事五縣提封彩袖歌鐘年年長醉玳筵紅水調歌頭送王子初之太康將軍報書切髙卧起螭蟠悲歡離合常事知已古為難憶昔草廬人去鬱鬱風雲英氣千載到君還歌吹展江底長鋏不須彈路漫漫天𣺌𣺌興翩翩西風鴻鵠一舉横絶碧雲端自笑鶺鴒孤影落日野煙原上沙晚不勝寒後夜一相憶明月滿江干二為莊仲方東園賦野飲不稱意歸促紫游繮誰知草堂深處清賞興尤長夢裏佳人錦瑟眼底瓦盆濁酒衣袖醉淋浪歌罷竹軒晚風細月波涼為東園梅與竹足清香不須更栽桃李花底駐春光人道漆園家世王謝風流未逺培取桂枝芳讀書貧亦好此語試平章三送王脩甫東還樊川吾所愛老我莫能儔二年鞍馬淇上來徃更風流夢裏池塘春草却被鳴禽呼覺栁暗水邉樓浩蕩故園思汶水日悠悠洛陽花梁苑月苦遲留半生許與詞伯不負壮年游我亦布衣游子乆欲觀光齊魯羇紲在鷹鞲早晚西湖上同醉木蘭舟四和趙眀叔韻西山捲殘雨天宇翠眉修餘霞漸成綺散樓外月如舟漾漾銀河垂地浩浩天風拂枕吹滿一簾秋覺我清興逺歸夢到嵓幽野猿驚山鳥笑欲何求十年一官黄散了不到封侯自有竹林佳處滿酌窪樽貯酒一醉共浮休夔契在廊廟畎畆不須憂五㳄前韻紉蘭綴芳佩逺駕振靈脩玉成事海無際泛若一輕舟誰作朱衣白簡老坐癡床斜日霜鶻漫横秋落日壮心在不負鬼神幽笑咿嚘驚骯􅗣竟何求丈夫出處義在不用計行留萬事味來嚙蠟只有濟時一念未肯死前休驅馬出東郭聊以散吾憂六和姚雪齋韻書史有真味誰遣博微官丈夫出處道在義命正須安浩浩都門冠葢眼冷雞蟲得失矯首入遐觀時對雪齊老清議豁襟顔閱名書探理窟警銘盤自嘆空然鼠腹過飲不知繁萬古乾坤清氣散入詩仙脾膈揮洒有餘歡早晚付心訣風雨滿堂寒七壽雪齋髙齋際晴雪萬象入遐觀文章在公餘事聞望到歐韓千古微茫洙泗浩浩發源伊洛百折障狂瀾歌詠武公志儆抑過銘盤濟時心調鼎手未容閒重看印窠垂錦花底壓千官見説梅梢春信一夜蠟痕香滿光動壽杯寛勲業鼎鐘上留待百年看八壽王子壽時年八十三汾流浥餘潤霜菊滿秋香釀成一堂和氣來薦老人觴七十人生稀有沉復年踰八十飲啖日康强骯髒欲誰與趙壹倚門傍頰浮丹瞳㸃漆鬢如霜平生隂有神相特為表剛腸世事語來無味只有讀書一念老矣不能忘九老更添一圖畫見髙堂九壽時相佩蘭近佳節髙第照神州西山致有爽氣天際翠眉脩釀作碧霄清露暗滿庭前細菊香淡一簾秋春酒未容瀉壽席已風流鏘鳴玉㸔獨步鳳池頭薦賢貢宰事業藥籠到兼收總道生平襟量一片丹衷為國不負幙中籌齊澣救時語持用壽君侯十文卿提刑自陜西按察改授河東其子東還寄聲不肖且徴鄙作因贈樂府水調歌頭以答雅意一峰華不注東望雨㝠㝠黄雲畫角回首客舍又幽并喜接西來佳耗聞道東山未老雙鬢為誰青經濟有公論且莫嘆飄零杏花吟山色句儘稱停平生風味不淺聊爾寫襟靈步冷東垣秋水坐對汾亭夜月兩地若為情合作碧簫曲留待醉時聽十一宴張右丞遂初園園林足佳勝鐘鼓樂時康去天尺五韋杜此日漢金張誰似主人好客暫趂金華少暇罇俎共徜徉三館儘英雋簪履玉生光眺東臺登北榭讌南堂露涼玉簪零亂竹静有深香醉聽新聲金縷愛仰東山雅量清賞興何長髙詠遂初賦松栢鬱蒼蒼水龍吟壽都督史侯時為東平縂􅃹漢壇千古風流笑談自是詩書將兩淮草木一門忠孝先聲逺暢奕世金貂雄邊韜略三軍獨張道十年漢水旌旗動色春都在投壺唱一㸃徳星迴照光浮動太山千丈㦸門春静人安事簡提封保障漢相規隨葢公安靖平生心賞見壽毫不逺鳳池消息醉仙家釀二賦蓮花海棠兩株雲錦翻空換根元有丹砂秘繡幃重繞銀缸髙照故家風味翠羽生紅霧紗肌玉風流誰比記沉香亭暖貴妃半醉雲鬢亂耽春睡夢裏昆明灰冷怳留在紅幢翠袂金盤華屋無心與並朱門桃李一醆傷春臨軒便恐綵鸞交墜倩紫簫喚起霓裳舊曲􅂸花前醉三送焦和之當年紫禁煙花相逄恨不知音早秋風倦客一杯情話為君傾倒回首燕山月明庭樹兩枝烏繞正情馳魏闕空書怪事心膽堕傷殷浩禍福無端倚伏問古今幾人眀了滄浪漁父歸來驚笑靈均枯槁邂逅淇南嵗寒獨在故人襟袍恨黄塵障盡西山逺日送斜陽鳥四賦春雪空齋寂寞春寒坐來庭竹風聲悄天低雲暖氷花誰剪須臾雲擾好是東君與時呈瑞春迴枯槁快黄塵壓盡千林膏沐休更問青山老我愛春來起早恍芸窗光搖瓊島玉華城郭炊煙巷陌酒旗風裊髙興悠然沽壚思與文園傾倒為使君預報春城燈火比年時好五壽陳節齊倚天望漢臺髙公趙人有鄧将軍望漢臺騫騰便到青霄上一時殊遇風雲儷景元龍豪爽剛斷氷清風流却有東山雅量道十年京洛棠隂遺愛人如醉春風釀一㸃徳星回照光浮動太行千丈㦸門春静人安事簡功餘保障燕寢香凝不妨時在騷壇吟賞為使君預泛鳳池春浪壽金華相六日邉儷景同翻千年髙際風雲㑹堂堂大節中流砥柱狂瀾横制黄閤歸來英姿颯爽故家房魏甚是中却有東山雅量經綸盡金華事總道丹心為國要春滿人間桃李詩壇風月清時鐘鼓不妨逰戲一㸃台星五雲縈繞鳳池佳氣為相君滿泛金盤仙露枕秋蟾醉七已未春三月同柔克濟河中流風雨大作幾覆者再感念疇昔為賦此詞且以經事之後重有所惜云春流兩岸桃花驚濤極目吞天去孤舟纜􅄙棹歌聲沸漁舠掀舞雲影西來片帆吹飽滿空風雨悵淋漓元氣江南圖畫煙霏盡汀洲樹天地此身逆旅笑歸來滿衣塵土功名些子枕中多少艱危辛苦北去南來風波依舊行人争渡聽滄浪一曲漁人歌罷對夕陽暮八舜泉在濟南城中自壬子年水去來不常今嵗秋八月余到官兩日泉流復出其深可厲回風蕭蕭翠萍盈沼邦人以為神來之兆近陪憲使展敬祠下因索鄙作謹繼丞相雙溪公懐古嚴韻用紀其異窈然碧玉池方緑波不見還凝佇翠萍痕在金支光澹湘妃無語瑶瑟聲沉畫欄愁絶幾回如許甚風煙依約魚龍黯慘空回首珠簾暮一夕翠華臨幸也悲涼故宫塵土石根碧漲天瓢翻出黒灣雷雨思舜亭髙風漪吹散滿空秋暑欲蒼梧回呌鳳簫凄斷聽躬耕處九登邯鄲叢臺春風趙國臺荒月眀幾照苕華夢縱亡横破西山留在翠鬟煙擁劔履三千平原池館誰家耕壟甚千年事徃野花雙塔依然是騷人詠還憶張陳繼起信侯王本來無種乾坤萬里中原自古幾多麟鳳一寸囊錐初無銛穎也占時用對殘缸影澹黄糧飯了聽征車動秋澗集卷七十四欽定四庫全書秋澗
