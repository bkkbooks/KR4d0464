front:
  text: 聊城縣官汚濫事狀今體察得博州聊城縣周縣尹至元六年冬與部内良人妻阿曹通奸其秦主簿亦於當年秋前往上口鎮倉部糧與部民馮貨郎女通奸俱各私下用錢折合休和了當就問得本路司吏朱勉與所察相同今來竊詳縣尹主簿俱係牧民之官承流宣化肅正風俗者也今侵犯部民其汚濫非為如此合行糾勘
  hash: sha256:0b96b9ee4f755e919d0c063fe24b23e9f5f743670a60d4830f1c04b082221ea0
  markers:
  - {type: page-break, offset: 71, content: '', id: KR4d0464_WYG_084-1b, image: WYG1201/WYG1201-0219b.png}
body:
  text: 論中都喪祭禮薄事狀竊惟送終人子之大事今見中都風俗薄惡於喪祭之禮有急當糾正者如父母之喪例皆焚燒以為當然習既成風恬不知痛敗俗傷化無重於此契勘係契丹遺風其在漢民斷不可訓理合禁止以厚薄俗外據除該無問貴賤多破錢物市一切紙作房室侍從車馬等儀物不惟生者虛費於死者實無所益亦乞一就禁止據此合行具呈皇太子親政事狀蓋聞武丁學於甘盤號殷髙宗孝宣起於民間為漢令主昔唐太宗視朝以子治觀政世宗東巡以允恭監國斯二君者豈特為元嗣廣聰明達民事而已蓋將正神明之器分夙夜之憂繋臣鄰之心慰億兆之望撫軍監國皆其事也而賈生亦云太子正而天下定矣恭惟燕王殿下春秋鼎盛教敬日隆今者守中令領樞府然首居重器未嘗視事且古之聖人宜莫如舜尚歴試諸艱用彰𤣥德以惲愚慮誠宜早正位號俾躬理庶務仰承黄屋之心俯署青宫之事如每嵗春車駕巡幸上都燕王殿下居守陪京撫臨漢地握一府之樞控百辟之重俾睿智足臨日深治道又念方今聖天子以仁厚恭儉率先天下而繼體者於稼穡艱難之事又不可不知也不然沿邉將士自較閲以來上下負責不蒙自新雖欲功過相當將何所明若秋髙馬肥奉將天威撫巡江漢以之頒犒祿秩赦宥過悞豈特旗幟壁壘精彩一新亦將作士氣逷蠻荆懐逺方安新附復有奮忠竭力建非常之功於目前者矣其争先快覩謳歌慶幸倍於尋常萬萬也又省記頃者太子哈斯台在先朝時已以位號之正判署教條親諭漢官茲非其事與能若是固磐石之基定天下之本計孰大於此者惲職分雖卑猥當言責國之大事敢冒敷陳彈博州總管楊庭訓不之任狀今體察到前博州路總管楊庭訓本官爰自宣州次官陞􅂶河間路總管同知再考授博州路總管於今年七月内祗受宣命虎符􅂶延安府總管朝廷恩私待以不薄不期録連保狀輒自獻投以延安為下路欲難其行以少中為稍降妄攀别例一意徼求有虧廉節兼照得之官程限已有定例其楊庭訓自祗受以來經今四月有餘推延事故逗遛不行恐臣子之分不當如此事屬非違合行糾劾第二狀近為延安路總管楊庭訓不赴任事已經具呈未蒙定奪竊聞上臺照勘體察本官原行文卷意者豈謂憲司已有先行故遲遲其意却縁惲體訪此事前後月餘纔方得實據本臺事理並不知㑹至於愚見偶與鈞意畧同行之似不相妨縁原狀止彈本官為路小官降故違朝命八十餘日不行之官至於旬投保狀曽不知愧即係彈章中引據事意本非正情設若在先亦有此等事體未嘗糾彈倘今後更有似此事同而情理深重者惲等合無具行與否據此合行載呈論河南行省屯田子粒不實分收與民事狀㑹驗河南行中書省咨該去嵗屯田子粒一百萬石内明該屯户收分語句今體訪得止收到稻榖又馬料粟通計約四十餘萬石其收分與民數目至今不曽給付使失業之民二萬三千餘户往還千里却於往貫般易餱糧以供朝夕貧者至嚙食草木陳告無所以致往往逃竄至有舉屯全空者竊惟屯田大計當草創之際所宜務逺圖固根本開布恩信撫養新集遵固宇之道植久駐之基不務出此將上項子粒公文明該除數實惠曽不及民使官食前言民有饑色張虚數以邀上知顧小利而斂衆怨既非國家之便又非計久成大功之逺畧也其昧上虐下是屬姦欺據此合行糾呈論河南分作四路事狀竊見河南係邊防重地耕戰之大本所在今國家用兵江漢開置屯田示其久駐非特取襄陽而己為今之計宜分治撫養以實河南根本為急照得河南地方寛濶東西二千南北一千餘里跨州連郡大小七十餘城軍民一十八萬户雖不及往時實亡金一國也今止設總府一道使都轄於上府治又處北偏東南州郡半與南郡犬牙交入如唐鄧徐邳亳潁等州去京近者五六百里少有緩急其簿書期㑹往返交錯首尾相應動輒月餘不惟辦集生受其實難以控制兼平時與多故事勢不同自攻守襄陽以來轉輸調度百色所須取辦有司急於星火今而亦同止轄三兩州者張官置吏一體勾當縱彼人才固難負荷此特官府之難易耳所可慮者迤南屯田大復壊散往往避役至有舉屯全空者其患在不𨽻州府衆人躭悮無有專任責者故也又值蝗旱連年軍民困苦譬猶羣羊數萬被擾不安雖居牧地且乏水草又令一人看管放牧未見其安且便也以惲愚見合無將河南地面分作四路以歸德為一路而徐邳宿亳𨽻之以蔡州為一路而陳潁睢息𨽻之以節州為一路而申裕唐𨽻之以南京為一路而鈞許嵩汝鄭延𨽻之其選任官吏比之常調増加品秩庶勉勸事功人争効用外據所該屯田地面其府官令兼帶營田使職名於上提㸃勾當外三路所有屯田户主常加存卹將彼此事情互相照料撫養其生業休息其困乏使一方軍民及居者屯者兩不失所方為稱職然後限以嵗年責其成效以慿考較别議陞降如此庶得軍民兩安政成化理事無曠慢邊防之重地既安耕戰之大本又立以攻以守投之所向無不如意若貪外虛内置已有而不卹圖必争之要害是猶荒膏腴之土不為耕稼而求不可治之石田竊恐為鄰人之輕且笑也外據真定平陽兩路亦宜標撥州縣另立散府使直𨽻省部管領其於官民亦為兩便且免夫尾大不掉之虞得强幹弱枝之道矣據此合行具呈論集賽台加散官事狀竊惟自古殿庭之間内而近侍外而宿衛凡有職掌俱帶散階理無一槩白身領宫掖之事者今伏見朝廷一切侍從宿衛集賽台等官員多係功臣子孫及歴年深逺辛勤勞績人員據見掌職事就中固分輕重上下終是朝家未嘗普覃加帶勲散階號使寵異其身名倘議而行在國家大為恩惠於臣子益勵忠勤且古人有言人主之尊譬如堂羣臣如陛階増則堂髙是近臣榮顯則人主愈尊崇矣今後合無將内外一切近侍環衛等官據見掌職事依驗色目普加散官如龍虎驃騎金吾奉輔國昭安懐定明武將軍之官下至丞昭忠尉之號更定奪俸秩為一代新制所謂立制自近貴始昨聞集議宫官服色是欲辨上下定民志也據散階事理誠宜先有定奪然後服色可議蓋服色因官品而定官品由服色而顯也伏乞御史臺照詳論收訪野史事狀竊惟古者修史雖野史傳聞不以人廢伏見國家自中統二年立國史院令學士安藏收訪其事數年以來所得無㡬蓋上自青吉斯皇帝迄于先帝以神武削平萬國中間事功不可殫紀近又聞國史院於亡金實録内採擇肇造事蹟豈非慮有遺忘歟然當其間從征諸人所在尚有旁求備訪所獲必富不然此輩且老將何所聞合無榜示中外不以諸色等人曽扈從征進凡有記憶事實許所在條件或口為陳説及轉相傳聞事無巨細可以投獻者官給賞有差如此庶望人効衆美國就成書使鴻休盛烈晦而復明備見一代之史顧不盛歟論品官懸帶弓箭事狀竊見國家往年禁斷弓箭事久弊生中間似有未䀆者今體訪得軍户幹脱弓手打捕囘囘等人皆得懸帶而外任三品至七品以下官員皆不許懸帶據上項官員重則控制數州小則肅清百里其間懸佩符命赴任在官往返道路緩急有虞無寸刃隻矢以禦强暴是國家命官不若打捕等户之有備也且此法之行止能禁絶良民近年所在失事多係挾持弓箭馬賊其擅助賊威奪去民救莫此為甚據外任三品以下官員今後合無照依品官合得舊例定奪似為長便據此合行具呈彈甲局首領官張經影占工役事狀今體察得中都甲局首領官張外郎至元四年五年影占合造甲人匠劉仲禮私下取要工價鈔四十四兩五錢却將本人合造甲數逐作抑令其餘人匠分造了當今就問得張外郎名經是實據此合行開坐糾呈為驛程量事緩急給限事狀竊惟隨路毎嵗差遣人員赴都如計禀公事押運差發課程一切等物者既還心欲速得到家不問舖馬生受日行數站其馬匹不無走損倒死以惲愚見今後除軍情急速人員外其餘所差人員合無照依舊例量事緩急定立往囘地程使各站出給闗文於上分明書寫日行站數依上走遞仍令按察司體究違者治罪施行如此似望舖馬少有倒死站户不致生受為典雇身良人限滿折庸事狀竊見在都貧難小民或因事故往往於有力之家典身為𨽻如長春一宫約三十餘人原約已滿無可償主致有父子夫婦出限數年身執賤役不能出離又有親生男女詭名典嫁其實貨賣此又大傷風化甚不可長其典雇身人如原限己滿無財可贖者今後合無照依舊例令限外為始以日折庸准筭原錢使之出離其或典數口内有身故者除其死者一分之價至於願求衣食者聽外據典價不實者乞嚴行禁止如此不致以久成俗而雇身者免轉良為賤混淆無别不然迷失門户躭悞差役深為未便合行舉呈為不宜先浚新城壕塹事狀竊見隨路連年蝗旱百姓饑乏者衆今春首農務將作大興力役擬浚治新城壕塹不惟妨奪民時竊恐轉致困敝合無伺候秋熟舉作似為未晚不然若從重論理合先築宫城正宸極之位使内外有限以壯皇居然後宫室可得而議據浚鑿壕塹工役似未宜先行為春秋時預期告諭事狀近知得河間路任丘縣南史村軍户劉阿李為殘害海青事將本婦人處斷訖㕘詳在先為鷹隼海青公事然省部欽奉聖㫖遍行隨路出榜省諭而農民愚戅月日深遠不無遺忘兼且海青飛舉動輒千里竊恐逺方之人不知係是車駕飛放禽羽以惲愚見今後御前鷹隼海青合無懸帶記驗如前朝牙牌之制毎遇春秋飛放之時更令所司預期將一切禁忌違犯之事重行嚴切省諭使農民臨時又得曉然通知如此豈惟易避難犯亦不致悮有損害似為便當令後設或復有違犯之人乞送有司照依扎撒斷罪施行秋澗集卷八十四欽定四庫全書秋澗集卷八十五元王惲撰烏臺筆補為
