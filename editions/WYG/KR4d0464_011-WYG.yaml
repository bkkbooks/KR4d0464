body:
  text: 題耆英圗奉呈子初中丞張生好竒兼尚友古畫古書長在手欣然示我洛英圗便覺奎光生户牖衣冠磊落十三人閒著一枰談治否堂堂文富兩具瞻天下倚安真大叟平頭七十是尋常獨有端明未期夀方辭晚進不敢班列宿光中已瞻斗北門易慮望佳招王拱辰字君貺千里馳書恨官守升平盛事那得再夢寐席間把巵酒吾儕起敬當如何再拜乞靈三叩首君不見西周文物稱全盛除却邑姜纔得九神崧間氣萃此多周鳳魯麟紛在藪鄭郎繪事固入神自是徳星傳不朽我思仁祖慶厯中慶厯政有三代風斯民皥皥樂其樂六合一氣開時雍扶持有位總是諸賢功熙寧天子錯料事以忠為邪邪作忠放教公等在散地擢置安石司羣工恵卿繼用二惇起當時何止驚三空嗚呼以人為鑑古所取安得獻此與論治道之汚隆願君深藏勿輕出世代雖逺多青蟲紫芝歌繼胡紫山集瑞堂詩韻己丑秋八月有紫芝産陶户朱良舍下凡五六本此最異者陶坑削崖蝸作室和氣所鍾無不及非縁石澗木之精平地抽英昭茂徳蓬忩一夕爛生光紫葢彤枝照鄉國氤氲五彩畫不如駢秀連莖瑩於漆考祥吻合農帝經表瑞無慚柳州筆老翁百嵗見未曽醉將蒼髯漫如㦸郡人争欲飲至和奔走來觀恐無及出門秋望稼連雲汝芝汝芝安所吉圯上行邳州道中作十一月初四午刻書於宿遷馬驛楚兵東來殺為嬉烈火西捲騰颷吹為藂驅爵恐過惨天賜漢以興王師憶初椎秦天下震盛氣不折將徒為泥中進履屈亦至不爾安制重瞳兒往年親視濟北石此日還賦圮橋詩神龍變化不復見仿像鬼物來隂機素書三卷不必怪要本老子持其雌題長江萬里圖後稚年屋居三十春老境誰遣東南奔去秋有詔使持節此自邶衛官甌閩閩中水淺百味澹但覺草木多精神展放江山萬里圗卷中瀟洒似堪娱寄聲故國游觀客卜築蘇門儘可居問吳臺辭吳江宫殿尋無跡只見山蒼湖水碧歩上髙臺散客愁十月江南看春色曉風翠雨溼闌干簷花泫露宫娃泣欲遮愁烟問故臺愁烟無語空蕭瑟是邪非邪不必辨且為興亡求亂隙夜半娃宫作戰塲總罪君王以色荒春秋責備大法在不道延陵退耕吳已亡聖賢處變貴逹節審勢不得同曺臧當年泰伯終三讓明見丕承有聖昌南臺懐古封君姒遥裔重光麗無諸憶提越甲佐天討翦嬴摧項開雄圗保邦事大霈龎澤至今國俗猶薰濡石樽劔沼兩寂寞山川良是先生都越人感徳知所尊簫鼓猶陳藻薦殷潮去潮來朝又暮花謝花開秋復春千年事徃遺烈在草木澟澟來威神廟中筠簽萬有卜陳説禍福穪靈珍我因拜禱問來事繇辭灑灑何其真殊方逺宦乃氣數品秩雖到多邅迍正須耐辱安所遇不及㧞出東南閩生平行已半流坎雖老而夀猶朝紳鞠躬黙謝神貺厚得遂歸隠餘何云我來正值羣祀日伎樂朝獻争趨奔越巫紛拜靈欲駕冷風滿斾翻凝雲迴首笧臺祠下路蕭蕭寒雨溼蒼麟今廟基即漢髙帝封笧臺也游九仙閣三郎百戰開閩國欃槍基圗專詐力二嬖恩光象服尊九龍帳設香雲溼朝参寳雲宫暮禮妖師席國事一從神所質九仙結構豈此時萬瓦鱗鱗跨空碧閣中景象四時新徃事如雲散無跡我來登陟縱遐觀一榻清風抵萬錢暫與塵襟豁煩滯横欄直下看三山雜言寄申隠信宣慰時在泉州近辱書過蒙逺問倥偬間不時奉答獲罪多矣人行謹以雜言為報奉别後一粲蹇予元年東魯客初識君侯髪如漆平生豪氣樂新知一笑論交真莫逆凉風八月中秋節月滿金尊惜輕别邂追溪堂又五年情好比前尤欵洽髙堂轟飲幾連明四座歡呼倒冠幘當時樽前鬭年少豪邁不知家立壁興來為我掃雲烟思入天機妙無迹我識君侯此餘事落筆縱横見竒策自是睽違三十秋只今同客嶺南州天涯牢落儘愁絶况復兩翁俱白頭書來慰我見安好細字滿紙紛銀鈎故園風物信如舊栁子初起為山囚春雲夢溼蘭苕翠壯觀雄翻海岳樓近從潭府閲家數筆力已復追營丘煩君吮墨留餘溢重為靈均作逺逰中隠乃雲甫道號近于魏参政處看雲甫山水畫故云近從潭府閲家數李夫人畫蘭歌清閟堂深不知暑瑶草佳期夢𤣥圃孫郎笑折紫蘭來素影盈盈映􅁱渚李夫人澹丰容天然與蘭相始終剡藤一筆作九畹落筆不減江南工芳姿元與凡卉異曄曄况是湘纍藂離騷不復作遺恨千古沈幽宫君看此花有深意似寫靈均幽思悲回風君家大雅堂文采東野翁併入惨澹經營中秋風拂簾秋日長芳霏霏兮汜崇光澹粧相對有餘韻畫欄桂子空秋香淡軒託物明孤潔五十年來抱霜節固知色相皆空寂妙得于心聊自適仿像湘娥倚暮花黄陵廟前江水碧生平佩服真賞音升聞紫庭非素心喚起謫仙摇醉筆為翻新曲冩瑶琴李夫人名至規號澹軒亡宋狀元黄朴之女長適尚書李珏子早寡今年七十有二善畫蘭撫琴近為郎中孫榮父作九畹圗若與蘭為知聞也且自叙其後云予家雙井公以蘭比君子父東野翁甚愛之予亦愛之毎女紅之暇嘗寫其真聊以備閨房之玩初非以此為求聞于人也郎中以蘭省之彦一日來徵予筆遂誦㸃汚亦何忍但覺難為辭之詩以應之孫求歌詩于予固樂為賦此者正取其節而不以其藝故也秋七月初吉秋澗老人題雜言我今行年六十五得至從心能幾許憂愁風雨毎大半念至於斯足悲楚縱令得邁七十夀比老於心當悦豫不然終日疲事役殁而後已真愚魯君不見人間聲利藏禍機迷着世人曽不知得之志揚失之沮一死如傳争奔馳又不見朝花纔榮暮雨惡火竈方熾寒灰随攀援髙貴鄙卑賤得勢未必皆便宜至人大觀出世表肯為造物相調戲豁逹一篇莊叟論太山毫末較來齊福唐中秋對月醻劉端友見贈之什少年愛月長苦吟賞玩不知清夜深擬揮玉斧手盡掃丹桂隂髙歌起舞㺯清影直入月脇穿天心節序依然人耄矣所事感懐無可喜少陵有淚溼金波歎息無家清夜美當時流落止鄜州况在甌閩數千里此夕常娥海上來謂三山距海九十里氷輪蹴踏驚四開牀頭有酒不復飲追憶少壯令人哀老人病骨防風露靜卧空齋深閉户却從虛幌看清光四壁秋蟲饒夜語題釣䑓至元二十六年己丑嵗冬仲九日予自桐廬舍鞍鼓棹取道嚴瀨既午艤舟祠下登拜遺像肅如也厯觀古今題記多論其形迹未有明先生之心者天下有二道出與處而已先生之起義明君臣順乎天也浩長歸氣信名節遂其志也夫三公坐而論思明是理而表萬方者也是則佐理之功多矣尚何為因留詩招隠柱間入客星閣眺羊裘軒降觀釣臺書院山光叢簇江流有聲若有以回俗駕而謝逋客也江行有程促之而去回望雙臺顔厚有忸少中大夫福建閩海道提刑按察使汲郡王某歛袵書劉郎少年同几席繡裾朱衣稱謹飭六龍一日飛上天豈為故人談徃昔嚴陵欲臣意有在大隠何心學夷隘當時雖落物色中肯以三公易其介先生豈是烟波徒奕奕星芒動帝車一言稍峻得狂鄙况復好爵縻其軀君臣大義既明著助順又見懐仁書君房初不識㣲意尚欲求益何其迂一竿雖老桐江月儘着清風厲薄夫洛中吟有序近讀邵氏所書洛中雜事撫卷三歎令人有不能己者嗚呼五代間亂離相繼其否極矣生逄兹辰一何幸哉故孫樵有生恨不得為太平人良有以也因效康節謝温公買園詩格綴集所見賦洛中吟一篇其辭曰萬方文物洽堯雍若論聲明極洛中地自滎南連洛北化從真廟到神宗總將六合清明氣散作三川禮讓風道統有傳程邵在勲名無比富文崇棚車載酒都人賞名教傳家習俗同花木四時春不老耕桑彌野嵗長豐三千步幛家雖侈十二行窩樂最融春酒泛香沽翠幙夜花和露買筠籠小車髙閣期真侣魏紫姚黄擅化工愛育總歸君父聖論思不出廟堂公荆舒變法無朞月社稷垂亡到一空讀罷適然清興逺一簾花影曉光紅竹鹿辭并序竹鹿出南海布哈拉國赤毳雪文狀若龜背然頂有雙茸葳蕤如珊瑚巨枝至元廿七年秋八月上進過福唐予獲見之昔梁武王逰兔園宴忘憂館命諸臣賦苑中諸物文鹿其一也余因即其所賦攷之正此鹿也因作竹鹿竹鹿亦瑞獸頂有珊瑚茸素綦為紋闕極騰仙蹤􅄓風吹墮海洋闕玉樹青葱瓏攸伏日與羣甡從一則闕道通君不見漢武獲異獸非闢西南封迢迢兹鹿來漢道相比隆東南際海國萬數將見珠香犀象等物相率皆來同游金山寺我登金山江似練金山突兀神鼇抃樓閣参差四五層覆壓崖巔瞰江靣壁間不見老坡詩空厯長廊瞻湧殿江山形勢互為勝直上金鼇窮偉觀徘徊乆眺呑海亭海門兩㸃烟螺澱就中望處不爭多大抵蒼茫烟一片平生歌詠古人詩此日一樽償宿願攛牌纔過璞墓西水作磴痕風四轉放船北渡返東行一葉中流去如箭瓜州西北墮杳靄照眼鶴崖迫焦巘獨遊髣髴蘇公興冒險比方章子愞夕陽西下烟四起欲進何之退無畔倒裝漁艇入荒村百計無由登北岸柂師失色都船驚暗觸江神豈予譴我為使者初不然先盡人為論事變力微艦巨酒半酣正坐忽焉遺此患金山雖竒極淵險洎老登危非所便書生氣習不一到慊慊此心孤所戀量非謝傅與婁相驚定老懐彌懔戰間闗投宿野人廬因賦此詩為永嘆至元庚寅冬予自福建北歸渡江作此詩未嘗示人逮大徳己亥十年矣衛輝判官井君徳常陞倅鎮江來别因話及焉并索書此詩云歸刻寺壁以増江山勝概予謝不敢當然使讀者為遨逰之戒云鬼車行鬼車一身編九頭黒夜來過聲啾啾半空瀝血洒人屋所遭之家無空休窮兇極惡煽威虐妖孽幾徧江南州奸黨蔽事莫能發百計捕逐無縁由聖王明見萬里外一網掩來同治罪憶初百鬼擁行車此日行車載孤鬼琅璫繫頸纒車軸涕淚淋淋不時哭死聲宛轉尚嘔啞晝夜催行不停轂路人借問欲何之詔赴行臺加顯戮揮刀臠食快衆心奔鯨四沛無遺育萬里歡聲動大江百城歌舞喧華屋我思善惡人自取禍福不應深倚伏寸心少慊獲隂譴天網大刑敢輕觸為誡兇人不足心鬼車罪例猶檮杌流民嘆我家本燕雲未省離鄉國前年一霜秋稼空望入田間禾穗黒忍饑猶待下年收一澇髙原水三尺人生重遷乃本心一餒催人忘南北水採無菱芡山収闕橡栗雖云生處樂乏物得生活扶攜逺趂河南豐道路無資日行乞毳衣穿結杖蒿藜氣力凌兢雙脛赤我聞堯水與湯旱民免流移少損瘠不出九年畊長有三嵗食朝家勸課儘憂勞只為有名多少實常平嚮為前省壞義廪近年無廣積江南最苦過都錢更著營司日騷屑營司已罷民力蘇大府兼農制徒設捄荒發廪最上策近井乃能療近渇君門萬里安得知作詩代洒流民血南樓行送信御史佐鄂岳行院武昌南樓跨空碧滿目江山猶往昔笑抛霜簡佐行樞去作南樓幕中客羌予游宦江之南江南軍務多疎濶摘差押取固多弊甚是養威并練習十羊九牧苟非人未免因縁出枝節卒然警急幸無事若論罪功孰褒黜就中貧難􅇰可憫孀婦盲翁死應絶依然名姓在軍書按籍末微豈容説唐兵六十即放免七十一丁令侍側當時貞觀開元間三代仁風畧無别幸今守戰有專職整暇虞奸正今日兵惟禁暴本衛民不致侵漁乃良策蠻陬溪洞既荒逺顛枿其間不無孽畬軍新附用得宜以彼為政易摧折前年盜起江西東千萬為羣恣衝突只縁浪戰乏總戎還使民殘兵耗力請君諍此能一行四院規模自吾出此時乗月庾南樓談笑胡牀能事畢五色鸚鵡歌滄溟浴日麗火荒飛走衣被昭回光隴禽鍾秀更竒絶翟翬絢煥紛天章越裳野雉太縞素上與朱鳥參翺翔環玉得之不敢愛為是珍物歸天王山川迢遞來林邑䕶送慇懃飼紅粒海樹雖殘舊宿枝君門萬里承恩入香瑣金籠暖御烟盡日充君眼中物一鈎紅觜儘多知兩葉翠衿真聚鷸六宫共説鸚鵡嬌天使傳呼供内職且莫低回訴苦寒卿雲長捧蓬萊日福星行河南雨足餘三尺河北嗷嗷千里赤河南榖麥賤於土河北齊民有饑色爽氣空吹五日凉火雲不散三農泣天有貴神名太一前嵗人傳豫州域連年大稔風雨時全是福星照臨力幸今六合入提封聖上同仁視如一又聞天下猶一身氣脈周流體能適福星福星宜憫斯少分餘溢霑河北白鹿嵬歌太行西來萬馬奔嶺嶂横截摩青雲山陽西北望鹿嵬突兀絶似東山􅀈孤撐直上幾千丈雲烟覆露垂天根憶初夸娥擔負分太華萬古雄跨諸峰尊有懐孫公和自是物表人半嶺騰鳳吹萬壑飄游氛纒身雖有一文髪以火保耀先吾薪嘗嗟中散寡於識三載堅扣如無聞當年清嘯杳何許此日乃有由巢隣苦齋老清而敦才豐識逺兼多文人見長松偃蹇卧雲壑豈知浩浩之氣藏彌綸有首不頂丞相帽有足不踏公卿門詩來三復有餘馥如茹秋菊紉蘭蓀平生尚友抱苦節逸興特愛淵明真不居城府盡髙尚况欲卷迹同其倫白鹿嵬髙輪囷望之可仰不可親徜徉終嵗竹林下回視七子徒紛紛回視七子徒紛紛東坡云孔子不取微生髙孟子不取於陵仲子惡其不情也陶淵明欲仕則仕不以求之為嫌欲𨼆則𨼆不以去之為髙飢則扣門而乞食飽則鷄黍以迎客古今賢之貴其真也瓊華露酒歌酒之為齊釀法先趜生玉粒聴其然百方百醖品各異要以色味清為賢井君出職光禄寺容止醖藉涵清妍朝來相過憐衰翁開樽小酌何從容銀罌細寫疑匪酒玉色照眼清如空停杯題品賞超絶瓊枝湛露吹天風一酌氣馥烈再酌心沖融憶初蜀使分餘瀝老頰不到潮春紅為君三咽儘鯨吸便覺輔安五臟夷三蟲吾聞此術煮酎法連罌氣化開鴻蒙多君屢製轉精粹儀狄拊掌驚神工橘中游戲商山樂玉薤策勲俱妄作浩歌為約飲中仙世間原有揚州鶴有狐篇黄蒿古城人絶迹有狐綏綏出復沒近郊夷曠兀兀靜獵食無求蟄無窟依憑城社嵗月深羣犬噤聲畏不逐或曽為孽化而人漢有曺瞞楚奚䘏蒼形雪面妥彗尾氣出隂邪餘譎詭振毛出大嘷黒夜竊食人家翻盎錡鬼行胷臆神不容彼為一饑還爾耳况今白畫雜人居厥兆有占羣小侈郡侯執徳儘勝妖要絶其根心乃已老姦急捕驚脱兔遺育燻夷滌腥穢彼狐微物徒妖訛朝來一掩虞人羅叔敖殺蛇韓逐鰐公等去狐誠可歌張綱埋輪非不問事有難易先重科人面獸心當若何罩魚歌稻秧針如溪可掲春水桃花魚失勢野人乗捕趂農間風暖溪深張水戲輕舠前漾撒巨網後擁罩竿遮兩際大魚赤鯉如有神一夕雷風先逺逝終朝罩上盡常鱗栁貫壺攜不餘棄行觀窟宅幾一空河伯波神為􅆭悴君不見天生萬物盈兩間物物資人供所嗜用唯有節取有時食不能勝非小恵山不幽來水無阻智出羲皇結繩罟上焉神理下物情以類相通無過舉於戲三代根此心後世胡為棄如土東軒歸夣二李生我夢何辜遽如許風狸行風狸出桂海厥狀即猨狨晝伏如蝟縮夜躍衝樊籠咄彼乳與溺愈疾收竒功或云識風候飛行半空中置之危檣顛順勢蹲西東越人豈此異逺進燕山宫不思汝悖疾持此以自攻幡然效順如狸聰交州况復七縣地枉著螳臂當車衝南風不競汝親見戈船下海驅羣龍聖皇神武包九有任土之物皆吾賨養之如春涵如海聲教所暨開唐封汝不聞蕭梁天監間林邑之范觀天風審知中天御明主一旦職貢應來同兹焉罔念從爾耳嗚呼彼狸何所庸賀君玉林兄得重孫共山老仙號虚白未老而閒見髙節琅琅玉骨隱含滋散入雲仍衍遺澤林兄今年幾八旬飲啖行歩餘精神阿元游宦已通貴慰眼又見元之孫犀錢玉果蘭湯温洗教啼泣吾試聞充閭之氣當煴煴繞牀阿堵莫輕動留待他年讀書用二俊歌并序總管温卿蓄一鶻一犬毎出獵不即則已即則必獲其失一願以羔見償予以二者雖自籠養指嗾中來非俊無留賞其何能爾作二俊歌以美之其詞曰温郎年少温如玉老作獵師知所蓄不勞赤羽膳千夫眼底韓盧手中鶻太行東麓雲雪岡飛鞍鳴鞘幾馳逐暮歸不省錦鞍空獵獵霜風靜三窟我觀二俊固竒毛擊取無虚指縱力數朝解鞍何所從鎖牕弄筆圍春風螺香不到眉嫵秀鶴翎細抹丹砂紅㑹當捋鬚賞不凡為君一醉琉璃鍾題任南麓畫華清宫圖後并序圖有閑閑公題詩作擘窠真書葢與畫世為三絶此卷初藏于僧遜公繼為媯川松公所寳興定初松間關兵亂中保持與歸燕都今為子英家藏至元廿四年楊示予披玩者累日嘗欲賦一詩以發偉觀竟以事未暇今林谿殁畫復在燕不知且歸何人隨閱釡水集見公題詩偶書此以償宿昔初弗計其不自揆也廿八年冬十一月十四日秋澗老人序三郎年耄誇精健嵗嵗華清事游宴玉蓮湯殿浴行雲傾城幾顧環兒倩一掬游塵散馬嵬餘波不涴香囊怨龍巗畫筆寫興亡墨花暈出真仙傳謫仙辭翰雨起色嫓以任公世三絶我昔西遊不到秦披圗空夢驪山月林谿家藏什襲珍楊生已殁歸何人䕶持當有松公神和東坡聚星堂雪詩韻天風一夜吹枯葉清曉開門驚天雪林林萬木凍已僵漠漠長空來不絶南畮能滋壠麥肥東牀任使琴絲折𤣥㝠用壯見肅殺疫氣迎春盡消滅少年雪獵狐兔羣夢寐韝鷹思一掣凍封窟宅龍挺蟄色晃書帷繒失纈中庭食飽方散歩行襯春泥思木屑一冬三白積餘威不比尋常應時瞥炎凉一氣不自如苦樂人生有難説羊羔金帳暖如春布被藜牀冷于鐡鷄蹠劔歌前年官閩中偶遇牛斗客醉解胯下劍壯我逺行色劍名雞蹠來岷峨鐡花鏥出雄雯多似連還斷斷復續蒼精含景争横羅南游萬里非浪走彈鋏豈為無魚歌飛空欲作黄鶴舉劈浪下斬岊江鼉誰期雨事俱大繆歸來挂壁如陶梭吾衰物壯終汝悮不見漢相劍佩紛相磨春雷奮蟄當如何春雷奮蟄當如何飛㢘館瓦研歌洛邑西遷漢靈泣一炬南宫三月赤飛㢘鎩翮化青鳬老瓦淪胥何所得太隂凝魄袐興亡土花千年不敢蝕劉郎杳杳秋風客神鳥㝠飛憶初格豹章爵首尾蟠蛇建章千門風冽冽磨礱頭入孤圜收劍淬松聲聴蕭瑟墨花供筆發幽光長日玉堂生五色張華博物見初心笑泚𤣥泓為渠説昭陵柏城初覩汝十五年來莫渠别䕶軍紀漢明有書應劭箋形更精潔道初在邇求轉遐半世看書眼空纈沖霄持贈有深意淡癖憐予如任侠一朝入手與神㑹過户不知吾屐折嗚呼三代不復見兩漢規模儘堪説寳藏宜與瓦礫殊隄備有人來胠箧清霜怨日落偶過吳郎家入門兩欄姚魏花金盤洗粧都幾日已覺鬢亂釵横斜韓卿秉燭惜佳麗便恐翠袖倚竹空春華鶴翎紅糝玉蝶粉墮髻睡美吳宫娃我欲問花不解語何故忽爾令人嗟東皇醉著初不問青女潛妬飛銀沙花神斂袂避隂惨駐顔何有仙人砂京師名圃花不少今嵗閒殺逰春車客懐豈獨被花惱俗事擾擾驚無涯西風巷陌塵障面酒樓寂寂空簫笳我因未事得閒在盡日飲客煎溪芽天教世務不挂口遮眼幸有詩書葩時時㺯筆散幽滯錢裹忘計東坡义為花作譜見衰盛自笑思澀頥空呀因聲寄謝紫山老落落髙舉淩青霞賀雨詩并序通恵河自壬辰秋間治至今年夏六月中穿土未已時方旱暑氣極熾兵民頗困于役是月二十日有司請少間以紓民力首相主減役止留軍夫五千庭議已下而雨作盈尺賦賀雨詩以紀其事一畝泉深龍滙碧逺引入城通大液不縁蝦口洒郊塵又匪𢎞農獻琛璧稻禾流脂粟米白嵗與饑民豐粒食靈臺靈沼須民力并力一勞思永逸今年旱氣罩火傘赫赫焚如驚赭赤萬人雲鍤揮汗雨薰染經時不無疫有司陳請避炎輝役敢辭辛時少息已聞停議出中堂未午朋隂蓊東北都城一雨幾尺餘何俟巫吁而雩盎浮蜥天人相感本無間金鉉調元不多術誠心公道即天心元氣洪濛開太極餘糧栖畝禾滿載御廪天囷若京積夕陽澹灎斗門深一片波光連畫鷁題中山劉夀翁九十五詩巻按部過中山憶嘗謁王丈眼明欣見百年人談塵詞鋒轉清亮故都喬木幾秋風精力有餘無少恙盤盤定武古戰國耆舊例多神所相于今又得劉家翁人説殆與王丈同康寧好徳九十五篤實外著心和沖世事不挂口外物不役躬軒冕真倘來眎若雲浮空子孝以志養家温樂時雍固云賦予厚亦自存養功常笑鷄窠祖雖見九世宗不食又不語夀齊彭籛安足顒何如此老人雙瞳炯如兩耳聰子孫滿前樂融融嵗時燕喜北潭緑常日睡起東忩紅稱觴宜有鮐詠背祝噎不用鳩為笻行聴鄉閭尊二老丹青蘭若見儀容送李蕭二君奉使安南李仲賔假部侍郎蕭假部郎中蕭隆興人以神童出身字平則安南九城海中沚黒誌彈丸良蕞爾扼吭控背相簒弑正倚大邦為表裏畏天事大自前王念彼人臣以忠至先帝包荒不遐遺南北肯分同赤子嵗時宣諭極忱誠都䕶諸畨殆三紀豈惟璽書意曲盡錦幣殊恩兼藥餌至仁臨御海波平銅鼓聲沈邊四敉父恭于前子遵後臣子於焉正其理前年奉表餘翠具再嵗象奴紛異議執迷託故謂來庭彼孰能欺自徒骫先皇赫怒安逺人邊將請征思一洗秋風少約茂陵寒已復夷遷空越鄙嗣皇龍飛擴神武盡雪前愆昭曠度兩階首舞有虞干正以自新開彼路皇元一氣包六合榻外他人非所慮豈有父子一家還異趣使華重照欝林光積懼懐恩深悔悟二奉使心何誾逢時吐氣思經綸縱横正有三寸舌不在犀翠充庭珍嗣皇仁聖自天眷又非人力之所能徳澤如海涵如春彼交雖𦕈宜知聞眼穿一宥盼已久去去莫緩都亭輪繼翰屬詩韻昨觀諸君光和所謂眼中有鐵皆勍敵也復為渗漉以見鄙懐蹇予一生空濩落心侶虚舟藏夜壑誰教浪走半九州潦倒不容停兩脚前年尺一遽呼起峻以文階深自愕投閒置散乃分宜未免老為文字縛青綾被暖玉堂清鶡雀何為集阿閣太平典策不縁麟顧我削書寧不作滿牀堆積簡編青其奈曲江雖老林甫惡礱硯詞并引予家藏風字歙硯石色斵手二者佳甚所患褪墨略不得色聞師道吾友有竒石善勵鈍發鋭能一礱治亦太𤣥之一助也遂作詩以懇之其辭曰硯之同功甲與鋋試之敵塲惟利堅其或不爾安用焉咄嗟此歙肌理妍和光挫鋭今幾年本圖殺墨不任入殆似兩鏡光相研聞君有石善礱鈍武昌赤砥銛龍泉碧絲吐鋩瀝𤣥酒濡首亦快張家顛我今白髯玉堂客結習未了文房縁自憐癡絶渠復爾堆積音漬汗簡何由前儆抑正賴公和賢秦山圖秦之為山何峻雄西連太白東華峯特隆天府樹巨屏固蓄積祜開邰封黍離變雅西周東雲烟幻出肴函宫不信詩書顓法制百二山河纔兩世後來漢唐亦盛代文物雖多終霸氣千年事往遺跡在留與來今鑒成敗君不見烽燧臺羯皷樓祖龍墓在山東頭丹青比興雅頌作畫史固是非凡流半生薄宦走踆踆毎恨西逰不到秦我今年老百事懶唯有懐古一念心猶存嘗聞雪滿秦山圗天機貌畫終南真又聞髯張醉裏頭挿筆洒徧人間雪色壁西溪君范華原嗚呼二者不復作令人氣短心茫然一朝全秦大物忽當眼著我如在龍首山之顛卷舒巨軸閲幾年兩都喬木今蒼烟其歸有數開有先昔藏夀國今聰山二公異世俱稱賢畫兮畫兮得其傳送曺仲堅赴建寧路教武夷書院今畫圗建安林館鄒魯如攷亭文公宋世儒主盟大學持文樞六經要是平治基上際圎葢蟠方輿正誠兩字有抵力皇皇仁義真亨衢人倫大統既攸叙不爾天理私慾同一區先生去世初未逺得私淑者君其徒昨聞赤牒下建府圓冠喜動甌閩隅君今見秩八品貴官守言責一事無育材不闕學田粟挿架剰有官樓書講經㑹課有餘裕修已繕性深涵濡今之所教教以此而彼所授授此歟仲堅世系乃華胄出入鶴葢垂文魚箕裘幸不失素業儒林振藻今璠璵友于誰似君家樂鶚荐重看入石渠雁門公子行鴈門山髙幾百仭風土雄尊號全晉李侯年少出紈袴裘馬輕肥冠時俊古來豪侠數幽并栁子不徒誇晉問蹇予三嵗東州客塵滿青衫鬢雙白書生無策伴侯鯖尺蠖泥蟠甘退縮此時同君在幕中時君居史公幕下佐理邦經大有力焉袖手旁觀駭超越絛籠脱落不受羈意表出竒人叵測健于義鶻快一擊霜翮拏雲鷙無敵愛君肝膽向人開遇事剖析無留材世人刺梗塞靈府米事挂眼生嫌猜丈夫所貴氣為主行義不虧誠可取區區心計簿書間束縛疇非抱官虜春光澹沲東湖亭素筝濁酒攄離情豹藏深霧出竒質未害蹉跎魯客卿我懐井谷君隂積葢代聞涂鄉五十户一語為生存子孫衍慶宜英偉鬱鬱其能乆于此伊蘇呼密行省四川辟公員外郎大展其用後授順天宣課大使甲戌年任成都路防城軍總管乙亥冬卒于成都得年四十有八白帝城髙玉壘深定秦戈甲紛西鄙民政兵機雨肅然當時豔豔東西川公不少留我涕漣洗心棲寂中和篇空餘遺愛歌臯賢一别人間三十秋又從圖畫挹風流至今劍北羅江道往往旌旄見出遊見鄉人王小五于羅江縣道中囑以家事公既没蜀人至今思之精魂如此泉石雙松圖江烟霏霏江雨溼滿壑秋風蕩虚壁何生雖老筆有神寫出雙松䕃泉石君看磊落横澗枝黑入太隂凝積鐡它時不作澗窟虬定向風巖聞虎裂煩君什襲為深藏隄備六丁來電掣江南道江南道翠竹晴沙靜如掃風霜終日畫圖間不覺行人暗中老笑行人自枯槁名利誰能死前了我行貪路發五更馬上人看亂山曉聴閩猿聞越鳥總道先生歸去好只縁老病日相仍非為知機辨之早清時正有一閒髙天涯何處無芳草贈五星鄒宜齋建安山水何􅅛竒宜齋氣禀宜清夷天星飛跳括萬命落筆一剖無藏機蹇予歸舟次甌寧子孺病卧咄可驚為予刺口論灾咎火頭孛尾相纒嬰推原根植甚安固五日而後知和平疾勿藥言果徵願丐一詩為發明我今憂國渠試聽去年越冦何縱橫朅來赤囊日三㨗分崩䑕穴逃餘生此時脅從弗與殊玉石併燬真無辜腰間縱有五真劍坐視罔救空長吁煩君拭目維南斗此去妖氛可盡無湘中後怨至元十八年嵗辛巳冬十月按事順徳晨起燈下讀沈下賢文集偶賦此或云鄭即子春也洛橋曉月光朦朦彼姝嬌啼橋水東鄭生早發與之遇挈去媵御甘長終霧綃烟縠已戃怳九歌招魂皆楚風一朝謫滿與鄭談云是蛟娣非凡庸岳陽樓髙花映紅滿筵歌舞鮫人宫海市蜃樓看不見倚雲望入湘江空摩莎辭我從洹東來枯皮滿畸人駐馬驚問之云握摩莎根摩莎一斗舂為塵聊飫飢肚充朝飱雨自南來至趙止彼壤可游兹若焚東西跬步間乾潤墐兩分龍公執雨機行事太不均野人前致辭荷鍤立傴僂翻淘此物又將空戀戀無他為鄉土一飢濵死不足慮大税今秋何所取用帖猶來徵事故街東宅效樂天體嘆暴貴而戒貪得也街東萬宅瓦新晴雲煙披拂青粼粼滿堂歌吹樂新貴豈知賀者在室弔在門根株已為鬼所斧藻棟竟起髙比隣古云暴貴不祥事巢覆未省雛能存俄聞斵棺招隠慝應有籍入無疏親福由積善尚恐失忍用隂遹戕其身作歌為飭附炎子未必貧賤非髙人碧玉琱枕歌夀王承㫖君不見靈夀賜孔光俾之扶衰杖于朝安車起申公未免逺駕趨旌招我思碧玉琱枕貺養老之意更比西京饒宛如大士冠馳送下九霄春氷藉紅牙當晝凝不消寵光照室幾千丈寳華璀粲翻雲蛟人間有眼未省見况用顯異張吾曺先生大年八十一視聴不減神超遥先生節操玉比徳先生文章匪玉琱以言以行國所仗明堂大鼎須待調聖皇丙夜不安寐作行尚復思羣豪漆園蝶栩固不到赤舄夢與周公遨荐賢行見及遺逸莊嚴七寳先瓊瑶從此鹿菴春更好怡然髙卧養松喬淮西行送湯侯宣慰廬江郡淮西風土髙且凉桐波悠悠帶陵岡流俗勁決喜戰鬭自昔尚農今重商今人逮我百餘載况復限隔為邊荒八州𨽻轄勢亦重慰宣正爾咨忠良君侯磊落識已久吐論能與時低昻上承下接不須慮幽逖澤及先痍瘡兵今畏法民有食鎮以簡靜無更張丈夫逺役存事業治公如家功可量行行斾旌指淮甸弩䑓曉日翻春陽憶昨傾葢長安陌一笑軒豁生輝光功名有在心未已相顧但惜鬚眉蒼打門來辭興不淺思有以贈因吹楊别來不用作酒惡梅花滿枝休斷腸㑹把一麾淮海去與君終嵗約徜徉黄鵠下太液池歌贈張詹丞子有君不見西京全盛時黄鵠飛下太液池雄聲東來蕩鳬鷺波濤千頃翻琉璃菊裳肅肅金為衣至今樂府留歌辭只縁罕見稱祥輝較之世用將何為張侯家住太液傍寵眷乆沐恩波光金閨時彦推獨歩大冠修劍明月璫烟花鶴禁正縈繞翩如彩鳳鳴朝陽張侯本是濟時傑游刃有餘歸以徳津津和氣粹眉宇皎皎氷壺湛胸臆兩都巡撫嵗有常守䕶無虞嘆先識臨機益辦固餘事端本澄源更超逸潭潭詹府開兩坊春桂香濃露華溼鄭莊好客未足多桃李公門半簪紱况今六合裊鸞分霜風靜野惡木寂太平有望公等事為國荐賢時所急顒顒士論問還期它日明堂須柱石昔聞黄鵠下太液今覩池邊威鳳集作歌自笑贈君侯一片野心猶獻炙海燕蒲萄鏡歌贈趙克敬趙郎少年有澹癖抉古搜竒曽不息神京陸海魚龍窟入市驚呼得𤣥璧何年軒鑑覷天巧百鍊隂精開素質玉臺人去玉燈滅洞映千秋猶有日粉膏銷盡漢宫香背像㝠薰臘茶色翩翾海燕喜春晴的皪蒲萄泫秋碧寶奩才拆走神光秋月横江露華溼森然毛骨溢清寒野魅山精墮幽泣藏明入晦古所尚物不將迎汝之徳土花鏥澀學妖蟇桂影團團恣吞蝕照人似惡太分明俯仰取容非我職蹇予行年五十七落魄功名尚南北青衫拂拭照衰朽増進一階真可惜鑑裁不到魏文貞金鏡輸誠志當畢趙郎從傍抵掌笑識㧞羣材有時特悽然斂衽問鏡神我髮何由黑如漆和張鵬飛詩韻魯公平生書百碑衆筆腐朽驚神竒長沙大笑稱老賊當時未必為真知太師忠義膽身大寓意於書忘弔賀君不見路逢碧落三日觀一字未厭書萬過秋澗
