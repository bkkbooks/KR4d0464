body:
  text: 樂籍殷氏醵金疏量珠買笑空憶當時餬口為生重過故里李弄玉幾年西邁杜秋娘未老東歸載瞻光禄池臺總是舊逰桃李樂籍殷氏者名香佳麗天賦芳温曽將兩字風流占㫁八州煙月此日紛華都識破向來心事欲誰論鳳凰臺上有伴吹簫皷笛塲中何堪弄色惟行丐歌姬之院且少分隣燭之光萬水千山得得來一瓶一鉢垂垂老桑間㳺女固能憐暮雨之詩芳草王孫尚不棄春風之面倘霑餘潤儘冨歸裝多寡隨冝以疾為妙謹疏李府君建碑醵金疏故汲縣長官李公天祥素負義襟號稱能吏急難多國士之風宰邑有桐鄉之愛去世能幾日有家為一空短碑卧草未覩瑶鐫孤壠含悽豈勝冥感凡曰相知之舊能無墮淚之傷庶少分魯肅之囷共建此陽城之碣睠言故里永賁幽光請靳顯卿山陽闡庠疏切以嬰孩教子貴在父兄詩禮傳家必資師範伏惟顯卿學師性資純厚賦業優長規模有乃岳之風句讀得故家之習久訓䝉於柘里今閒處於山陽煩於白杜之間載闡青衿之教邑雖十室使盡為忠信之人喜動七賢不負此風煙之勝恭惟短疏具列同盟重修泰山廟疏伏以物有生死維岳主司事至式微須人興葺睠新中之左地儼泰岳之行宫當年廟貌壯麗有餘此日嵓廊摧毁無幾賴陳將軍之果毅曹鄉老之經營一備餱糧一鳩工役周垣已興於百堵正殿將復其五楹度其工之實繁計所費於不少若慿衆力可見成功喜車馬風雲使降臨之有所官僚户庶獲福賜於無窮謹疏重修河内公廟化縁疏惟公徳並羣哲材優四科為邦致三善之稱折獄有片言之譽顧瞻喬木懐想其人况此蒲鄉實維舊治民淳訟簡猶沐休風世逺祠存不㤀久敬然塵昏像設殆緼袍敝故之餘草滿露壇起燕麥動摇之嘆惟夫興葺可表尊崇凡我同盟義當少助謹疏省齋裴先生建碑疏伏以辭焉不愧縁景行之獨髙得之無財於人心而能悦故武昌節度同知省齋先生兩朝名士一世龍門在鴻文大學之間有瑞錦秋濤之譽里雖稱其通徳墓未表乎豐碑眼中縫掖半門生身後殘膏丐來者知歸報本復有望於諸君礲石劖銘庶落成於不日嶷嶷麒麟之碣輝輝星漢之光匪惟裴氏之獲安誠亦士林之美事為耶律伯明醵金疏伏以分財曰惠莫先賙急之心見義當為切戒後時之嘆伯明秀造漆水東丹之後右丞文獻之孫學則有餘空至於屢為子娶婦禮尚未完急乎謀生力有不及顧同志多狐貉之列忍一家有風雪之寒少分半宴之資可合二姓之好倘䝉薄助請署芳題張漢臣醵金疏張漢臣者監司故掾淇澳諸生緼袍傷此日之貧客舎嘆故人之雨心闗桂玉運阻風波既久淹吏部之除未免索長安之米况臺閤半為鄉舊而燕雲古有義風哀王孫者世為尋常付裝資者日云不少舉船望恵財固菲於建封指囷不難時豈乏於子敬望升水而為恩於目下奉千金而敢㤀於他時困涸能濡多寡惟命梁彦昇醵金疏太原人山頺木壊永哀賢哲之萎髙上坎中未遂窀穸之窆兾彼齊卿之悦傷哉季路之貧前進士太原梁公子彦昇詩禮名家羮墻純孝思雙親而不見抱孤影而自憐秋草凄兮恨隔於九原春露濡而履兹者二紀惟得脱驂而賻乃能大事之襄四十萬非敢望於郭代公五百斛庶少分於范左相凡為同好寧不興哀淇水東傾渺逝者如斯之嘆太行西望慰異鄉久客之心大繼長醵金疏國破家亡老作無依之客衣單糧絶誰堪卒嵗之憂大先生繼長者渤海名家中朝顯貴功名冨貴竟無有文彩風流今尚存黒貂盡季子之裘短布纔寗卿之骭雖黄髪髙年之列奈清霜九月之寒甘窮餓而陪西山束荊薪而煮白石哀哀漂母進簞食於何難戀戀故人贈綈袍而何有大凡同志能不興懐所願不過一金未免上煩多士謹疏南宫縣文廟三門化縁疏切惟衣無袖領難以為全行舎户庭將何自出南宫廟學修建有年大殿既完兩序已具獨臺門而未稱在衆意以未安須資多助之方可就三楹之勝雲煙動色嵗采泮水之芹雷霆乍驚玉振殷人之輅倘垂重諾請署芳衘滑州文廟化縁疏天下之事無大小得人則興郡國之學由古今似緩而急葢庠序乃禮文之地而絃歌為風化之原繄爾侯邦號稱文治載瞻清廟有乏宏規廊廡卑棲狹僅容拜宫垣頽圯髙不及肩我將易故而増卑衆欲妥靈而掲敬輪奐動泮池之藻丹青一繪事之新審致大成需資多助垂旒委佩復誾誾侃侃之儀趨事赴功得磊磊落落之彥賢使君業為倡率同僚屬理當賛襄毋吝援毫重書所諾謹疏鉅鹿縣講堂化工疏粤惟大陸實曰古任創興釋菜之宫舊有明經之室年深疎陋日就傾危今擬修崇務敦風化大弓長劔其備可㤀三綱五常匪學不立稍聽一丁之諭將成百室之歌敢仗斯文共成勝事謹疏為周府君立碑醵金疏伏以起千年已廢詎能㤀利益之恩顧喬木而言尚未覩麒麟之碣故江淮都轉運周侯除興義重撫字恩深公雖云亡徳其可後今也有銘不愧堕淚無從惟斵石而為特書可於公而見不朽庶圗少報永振休聲凡我同盟共成盛事謹疏汴梁路相國寺化工疏汴梁路大相國寺住持僧柴某欽奉聖㫖修葺前殿所有化疏合行開具者伏以梵宫盤鬱無踰相國宏規傑閣巋存猶是李唐遺構浩刼黯浮雲之衛秋風動喬木之悲顧二三之殘僧將修完而何力幸䝉睿眷尚賴人謀况有生趨向而孰非善心在稽首皈依者當體上意能傾心而樂施或分囷以捐金同新般若清光與復天人偉觀風鈴如語響泛潮音天女散花有來衆士祝延聖夀載繙貝葉之香翊賛皇圗永此彌盧之固謹疏請陶教授主善疏竊以擇師教子孰無希驥之心傳道解疑須藉鑄金之手况木非揉則無自圎之理玉惟斵則就成噐之名伏惟主簿先生經明行修學博才贍閒望素高於儒館淵源逺自於顒軒講論造精一之微文辭知古今之變惟是青衿之子常瞻絳幔之儀敢瀆師嚴再新函丈心専志致深傳體用之方日就月將最切後先之序以茲誘掖庶正斐狂所有束脩開呈於後重修開泰寺大功徳疏伏以道不逺人善無先於利益物興有數勢須藉於英豪迺眷燕山昔為遼府開泰禪寺者爰因鄴第建自樞臣雖復兩朝之増葺何堪雙樹之蕭條如聲色香味布施能圎則上下虚空何修不可伏惟參政相公才優鞭筭義重規為禪叩愚機派流臨濟逺暢神通妙力幾開方便法門莊嚴已擴净慈天庇廕證明羅漢夢况兹金粟影巋爾古精藍雨花翳空得還舊觀登壇判㫁重振𤣥闗盡刮衣盂已是多餘香積飯有來福徳何嗟不到佛如來載經載營同心同徳永拱寶祚為國拈香前進士李舜臣姪求子婦醵金疏切以燕雲尚志情深友義之懐婚媾及時詩美桃夭之詠前進士李公舜臣之姪元徳為子求婚納徴有日奈嚢空而羞澀須力濟於英豪或米幣以相投或青鳬而見賜迓續先人之𦙍配合二姓之歡如種玉而獲珪璋在貧家而得箕帚豈曰小補實荷鴻私兒女債還敢云遂尚平之志簪纓顧恤庶幾接仲郢之風請署芳衘用昭金諾謹疏銅臺阿丑石氏疏年方破𤓰在故里樂籍者凡四年今嫁李氏相得甚懽辛已春於良家來見酒間叙話心事追念舊逰葢廿有二年矣且有滄洲之行求余言為重因書此以付去國朞年見似者而輒喜改圗故步念此意之可嘉銅臺石氏者穠艶呈霞髻雲綰緑白雪擅郢中之曲絳羅捲薛氏之窓玉秀蘭芳風尖月細荏苒四年之塵土稱量幾斛之珠琲悔失此身得逢佳配回金沙灘頭之夢吹碧桃花下之笙顧自憐度日之難未免有當壚之役試㸔長樂坊頭雪猶曰春風醉裏香將安排老嵗生涯預准備藥壚經卷已䝉重顧來謝鈞慈滿地流錢共說平生鞭筭了投竿在水肯教空載月明歸謹疏饒州路創建書院疏前泉州路總管推官朱淮故太師徽國文公嫡孫今擬於饒州路擇湖山勝地創建書院中起文公祠堂教誨子弟奉承香火上祝聖壽無疆次為宗族朋從續考亭道脈之傳伏望公卿士大夫喜聞樂助庶資衆力克遂初心者伏以明經傳道深有頼於後人圗報起祠必資成於多士况在曽𤣥之列當膺倡率之勤恭惟晦庵先生學貫六經名髙諸子始焉講學克紹程張之緒餘展也成功直造孔顔之堂奥發揮義理昭若日星沒未及於百年道大行乎四海凡曰進修之者孰非沾溉之餘方國家之右文冝天下之通祀迺眷餘杭名郡未瞻道像清光聿修香火之新祠爰擇湖山之勝地計所需而甚廣嘆獨力以難勝少分涓滴之餘波同濟經營之盛事絃歌不絶敢云家學之有傳俎豆斯陳庶使宗風之罔墜倘䝉金諾請署珍衘謹疏牓張氏秋香館酒牓伏以三尺紫簫吹破金臺之月一竿青斾飄颻淇水之春孝先張君系出豪華長居䊵綺壯狃五陵之裘馬老尋中聖之家風左顧東城名香新館雖借作育亷之地己大蒐破敵之兵瀧春溜於連牀貯秋香於百瓮與同至樂任價寛沽罄翠罌銀勺之歡是非何有聽白雪陽春之曲風月無邊信不比於尋常莫等閒而空過任使髙陽公子從他宫錦仙人争貫金貂紛摩劔珮繋馬鳳凰樓柱掛纓日月􅐼扉白骨蒼苔古人安在流光逝水浮世堪驚况百年渾是者能幾迴一月開口者不數日忍辜妙理也作獨醒莫思身後無窮且鬬尊前見在那愁紅雨春圍繡幕之風來對黄花共落龍山之帽快傾銀而注瓦任枕麴以藉糟只空工部之囊扶上山翁之馬前歸後擁盡日而然約林評事花約伏以良辰樂事雖曰難并㫖酒嘉肴豈容獨饗兹者小園竹木粗有堪觀故里賓僚可陳一宴忍教康節獨擅花時敢擬右軍同修禊事伊誰有語花枝羞上老人頭來日無多此樂莫教兒輩覺玉盤濯月已煩竹裏行厨繡勒攅香暫簇花邊駿馬擇於今月二十八日就弊圃聊備芳罇伏望羣英早垂光降茶約伏以歡情漸減豈任杯酌之娛老境相宜正有茶香之供今䇿勲茗盌集勝薰爐須分旗葉槍芽選甚鷓斑螺甲破紙帳梅花之夢叅老夫鼻觀之禪要追陪七椀家風共消遣一冬月日勿謂淡中無味且從靜裏著忙老懐自嚮故人多此樂莫教兒輩覺我今首倡盟可同尋湯響松風己減却十分酒病日拖竹杖長行攜兩袖香烟顧此聞思咸歸歡樂謹約禊約四序節氣春極和而季月為之盛故古人因三日盛時而為元已之節然鮮克與已相㑹今嵗兹辰適值癸已又一盛也用是約二三知友讌集林氏花圃所有事冝略具真率舊例各人備酒一壺花一握楮幣若千細栁圈一春服以色衣為上其餘所需盡約圃主供具秉蕳續詠辦追洧水歡遊禊飲賦詩修復蘭亭故事秋澗集卷七十欽定四庫全書秋澗集卷七十一元王惲撰題䟦
