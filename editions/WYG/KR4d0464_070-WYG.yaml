seq: 70
front:
  text: 府重修帥正堂疏伏以聽共民事必先處所之安絡繹星軺無匪王人之重顧衛輝之公署實民庶之具瞻起葢年深疏陋日甚飭傳舎固為微末論總治此則本根今將重構一新増光六縣俸稍先輸其兩月餘力須藉於衆官勢惟乗其一時工可就於不日清香畫戟雖云都尹之居聖節公筵永祝皇家之夀敢祈同志各署芳䘖
  hash: sha256:6e254731e282af2c65d2c10c00b0abe2f8e98ca02e229a41402f24bd3902284f
