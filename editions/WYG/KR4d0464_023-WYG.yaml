body:
  text: 贈西雲上人係海雲高第前日賔筵偶遂披睹一言有機口有不能言者如雲之在天水之在缾不復喻其快也謹裁鄙詩奉為上人一噱吏用公才不易逢茶烟多颺落花風登壇懸斷羣機息面壁傳心萬法通慧眼正來珠媚浦浮雲飛盡月當空虎溪公案原瀟洒㑹酌松軒一笑同謝岳昭文惠新厯夢破敲門蝶栩翩一編星厯衍堯天人憐短景催殘臘斗轉嚴城永日躔天外春回龍集闇林間香動紫生烟迢迢細付宫壺漏正是昭文進徳年跋祈真人畫像何處人間有洞天青藜曽探寳珠𤣥柱頭留語疑遼鶴物外孤吟覔閬仙木食草衣原澹泊竹風松月自清圓夀宫舊有燒丹竈空憶靈砂漬夜泉送安叅政南還汴梁并序參政安公與僕定交於中統初元契濶者廿寒暑大徳戊戌春邂逅於京師樽酒談話追憶疇昔念故舊之凋零感嵗月之易邁情不能己者謹以唐律為贈既光回斾且寓愚意之所託云黒頭早揷侍中貂當日雲霄一羽毛忠翊殿庭稱謹宻量吞河海見雄豪風雲夣繞調元鼎琕琫光含切玉刀此去斯文應有託豐碑還擬泰山高題南塘居士宋公畫像卷後南塘結夏水芝香對展蘇黄拜燕堂文獻在公推故舊琴樽娛客盡徜徉傷心此日空圗像照眼庭堦失雁行白首那堪題往事未容拈筆涕先滂跋東門祖道圗二首東門祖帳盛官儀淠淠鸞旂動漢騑燕几道尊邉有踐碧空雲静日重暉飄瀟物表桑榆景洒落人間寵辱機東海西邊兩丘土至今書畫見宫闈二疏心跡本鴻冥解紱南還敝屣輕劍履中朝陪百辟風雲高駕𣺌雙旌問金奚有田廬計歸夣都忘寵辱驚詔獄浡然賢傅死虛勞明主問蕭生奉和寅甫學士九日迎鑾北口高韻青山紅樹映晴霓玉削方臺積粟西不憚陂陀屢登渉喜陪朝謁共扶攜霜風偃薄千林静雲海蒼茫萬象低心自屏營瞻戀切佩聲常在筍班齊翠華南下拂雲霓駐驛軍都漢縣西龍虎臺高驚峻絶蓬瀛人老許扶攜又鷺鵷班廹許扶攜九天日月瞻光近萬國衣冠入望低佳節迎鑾得清賞牛山初不羨東齊過趙瓠𤓰林墓靄靄停雲有所思樂天池上獨來時瓠𤓰散落和雲墮籬菊扶踈帯醉移樽酒草堂前日夢小山叢桂夜猿悲朅來因憶桓伊事却撫松楸為解順長至日即事睡起閒來催賀節牙牙紅㸃雁成行灰飛琯透千門逺繡刺功添一線長極夀百年驚過半從心七秩有三霜發身不羨錢神潤要把青箱付窟郎挽平章御史中丞克齋公豸冠高聳絳為韝霜色横空一鶚秋癘鬼遽來闕日露泰山歘裂駭黄流氣從温造行間闕龍逐闕下游反袂兩行知己淚黄雲衰草夢西州西州者蓋暗取羊曇西州門事也哭挽母弟略監使分攜洹水儘離愁誰料儀真是徹頭留别有詩驚咄咄逝波無夢便悠悠逺遊不負江山興鞭䇿誰知管樂疇老子慮來非一事后溪溪上暮山頭雪後即事一雪都城二尺强桂珠生事日尋常羣烏懆懆飛不下萬木林林凍欲僵頭戴鶡冠甘潦倒氣同尺蠖伏泥藏倘為得放歸田去亦是明時盛事彰原有注闕翰林即事闕湘雲彌月二首是日先府君忌辰珍菓犀錢粲洗盆鎻牕香霧溼湘雲春風暖透青綾被初度祥開貝葉文穉竹翠含筠籜嫩猗蘭紅茁露芽芬細裁百叠清江錦留待鞶囊備綵紛彩檻移春照綺牕酒船浮臘進中堂負暄比獻茒簷日燕寢先分鈿几香缸燼翠凝鏘鳯蠟蘭膏春滿洗兒湯顧應我父情鍾愛一笑燈前撫坐牀送杜熈正省掾考滿授四川省都事扣門有客稱熈正考滿西歸得蜀除照眼鄉鄰韋曲好趨程閣道劍門墟烟霄顧接新桃李勲業紛翻舊簿書鄭重故人高左轄雪山清興近何如闡長春宫溪水復至臨漪門外碧波融又見分流入道宫閬苑烟霞増景氣寳山松桂動春風㤀機静玩沙鷗雪潤物中涵上善功道脈川流原一致滔滔東注浩無窮謝徐容齋贈梅燕釵宫額蠟妝匀夢繞羅浮雪裏村持贈一枝遮老眼淡依疎影度黄昏風流燈下佳人面瀟洒吟邊竹葉樽我老㤀情被花惱曲屏深鎻惜芳温容齋清節揚州遜贈我官梅興寄深宫額黄嬌渾綴蠟綺忩香淡不盈襟春融壺浸催先發雪壓溪橋憶細尋茒舎玉堂初不間似將渠表嵗寒心弔鄭徴君悦心江南長洲人年將四十以氣疾死大都官舎善五星有易學注鄭氏新説春風雙節入閶門吳市東􅆵遇異人大易有靈蟠化筆天星飛跳見凝神燈幽竁室驚媧畫槎泛銀潢挂析津反袂兩行尼父淚定中臺下泣吾麟范徽卿風雪和林圗天䇿桓桓控上遊邊庭都付晉藩籌河山表帶連中夏風雪洪濛戍北樓笑看奇謀收藥籠未妨民賦課甌婁丈夫志在飛而食不讓班超定逺侯題劉處士墓碑後劉君襟韻晉人清耆舊風流有典刑三代鼎彜資噩噩一家鴻鵠自冥冥胷中素貯文康訓雲際曽瞻處士星花落草堂人去後隣翁時過看埋銘大徳二年冬十一月同昭文大學士若思登太史新臺周覽儀象乆之而下侍行者妷子公特徙倚靈臺萬象新仰窺圎葢偃鼇􅘡龍沖都柱驚坤軸望入星躔候北辰日挾陽烏符盎晷春浮元氣上儀輪思侔𤣥化稱平子太史于今恐後身贈布呼齊侍御奕世威名大樹蕭孫支騰秀見英標肅清吏黠懐三畏摩拊民瘼入六條烏府共推清廟器黒頭行揷侍中貂仕優政有詩書樂洗耳齊竽聽舜韶廣平毛巨源夀萱堂百順無尊五福榮華堂高掲緑萱名鳯花雅負忘憂草蟻酒香翻獻夀觥蘭玉照庭連秀氣珮環合節有儀刑東風細颺簾旌繡㑹見鸞書下玉京張子惠母夫人手卷夫人内治日嚴貞定省歸時有訓懲孝感庭幃深色養徳融民社見春凝凱風吹棘心何切宿草含輝樂不勝七子有材俱茂異慶門從此福川増王太君授誥正月十四日拜慶家庭隆福宫深淑景長今年夀席倍恩光鸞回紫誥擎來重花覆璠輿暖更香象服委蛇儀範逺兩宫朝賀珮環鏘細傾洗玉池邊酒常領春風拜北堂送趙提舉之順昌縣尹字仲逺望入江城鴈影翩春風吹上洞庭船幾年戰藝東湖上一日觀光北斗邊慶賞莫誇王勃序吟鞍歸裊繞朝鞭詩雖六義功非易未厭蟲魚學鄭箋送李司馬任順徳總尹司馬桓桓漢徹侯十年藩府佐邊籌氣淩朔漠三秋雪人在元龍百尺樓已濟時艱完大節又宣風化入南州知君致澤平生事行聽民謡詠八騶順徳道中魏勃何人擁使軺鵲山東下半林臯清霜原野鵰盤健明月關河鴈影高遊宦有心空載質宰平無䇿漫操刀黄金臺上燕昭相甘為摳衣授六韜贈中山賈仲器刻書工賈仲器中山永平人諱徳玉為人誠信多巧思平生好讀許慎説文解識字意故刋書之際多所助益衆工讓能推為方今第一手近趙人珠嘉氏亦稱善碑刻者膠書紙於石立鐫全文略不失真未審與仲器所刻氣韻為何如也賈今年近七旬技精不少衰白髮蒼顔兩目鵠視似恥與凡禽為伍耳來求詩書此為贈翠琰梁停有異觀賈生昆削近烏蘭須知成已填書藝信是春坊刻玉官千字誄精山鬼泣一鐙思苦夜臺寒惜君不致山隂禊八法從渠入木看乙亥嵗京師除夜住京誰計畫义錢戀闕心丹力不全干禄自慙三釜粟借車津遣五窮船故鄉此夜偏多感衰鬢明朝又一年乞得殘骸便歸去草堂猿鶴已悽然庚子元日賀荀嘉甫授徽政院長史忠孝堂堂漢宇孫更忙相見每留髠掃愁不為青籐酒展賀來敲白版門中議素高徽政府清吟時接謝公墩老夫幸有西池遇東閣垂思合細論詩呈平章公漢家六合恢文治雨露恩深到海涵機務救時傳世業衣冠故里仰華簪闔門饑凍心雖切七秩歸休分亦堪一語倘蒙天盼去故山春滿讀書龕謹按遺山筆録載梁氏家世甚詳中有云斗南先生登明昌二年進士為人讀書精熟喜作詩有幹局吏能剖繁治劇不肯下一世之人今公長于機務可謂有乃祖之風矣故有傳世業之句附于詩左雲卿郎中方以嗣續致慮側聞弄璋喜作詩為賀平生隂徳爛于門况復昌黎一氣氲詩夢占祥原有兆大賢之後豈無人蘭芽秀茁根初異海果生遲實自珍我老喜為湯餅客一杯光動竹亭春夢昇天詩庚子春正月壬午日夜夢天風吹來星漢未曙梯雲上征極天宇而止予倚雲下視倒影四垂滉漾滅沒有不可望焉者既而覺清寒逼人神思飄颺毛髮為森豎也遂躡空而下入道室與張仙翁遇良乆出翠拂紫端相遺而寤夜漏下二十刻矣予平日異夢甚多皆莫之比因作詩以紀其詳沉沉玉漏三更後鵬背扶摇九萬摶彤管夢傳江令筆紫袍歸抱上巖端蒼溟赤日瞻天近碧落銀河照眼寛欲躡帝廷誰汝畫九霄風露不勝寒繼張參政守嵗詩韻兼寓鄙懐道號秀江官冷何心日九遷雀羅庭户任蕭然盍簪省闥和三益珥筆螭頭整八年臘味漫斟燕市酒春風誰送米家船西山日暮歸何晚自斷行藏不問天庚子正月十一日夜夢中丞崔公顧揖間已知身故談笑盼睞殆若平生殊朗然也宿露紅蒸海日曈分明來與一樽同烟開紫禁門䦨外思遶金根豹尾中鐵柱高標臺闑在遊魂悽斷夜堂空一宵鬼伯相催去天上人間獨有公介郡君王太夫人夀寳香鸞誥欎宫羅春動麻姑送酒歌森玉堦庭花映座試燈門下月舒波華筵燕喜乘軒貴白髮光隂得夀多五福人間誰得似金盤傾露醉紅螺送曠秀才奎東還廬陵并序奎家世為吉州安成人㓜讀父書弱冠遊學四方嵗丁酉由長沙泛荆湘泝巴蜀寓錦城邂逅高相一見傾葢留連二嵗戊戌春學士菊巗降香至蜀會於錦官辱相知夜雨連牀春風嘯詠臨别且贈以言而有天都之約㑹有司以茂異舉逹之風憲適高相移鎮江浙附驥東來分攜于驪山之下臘月抵京師諸公協薦于春官但奎以親老家貧倚門有望而動高堂式微之嘆遂丐之當塗欲安分義俾行省于學官委任焉因賡嚴韻為饑且寄聲左相高公云廬陵俊造以奎名投刺來登北海瀛白璧定交高相義錦官持論蜀江清幾年書劍悲游宦一曲滄浪聽濯纓聞説歐詹歸有徳停雲回首夢柴荆大徳四年五月中旬余從太史郭若思求畫周文公肖像者數日竟以事奪因作此詩以見鄙意幸賜采覽十年寤寐周公像幾向軒墀拜紞紘宗祖配天終北面洗兵回雨見東征道存履舄歌狼跋天動威靈表聖誠乆矣吾衰嗟不復仰儀臺下候神明賀威衛王公夀威尉龎眉七秩春不車不杖曵朝紳氣嚴樞筦王猷壯光動蛟龍羽扇新衛武賦詩申儆抑亷頗一飯見精神因公重惜麒麟筆待與金城老冩真無盡藏山海沉雄斗極邊洹江東滙玉為淵停雲晴佇思親望繡帶香翩上塚船山色水光無盡極竹風松月共清妍千年山立梁中憲長與坡仙共一天夀梁太夫人雲開真館桂華新婺彩穿簾瑞靄氲羽翼兩朝梁左相起居八座太夫人香翻錦字鸞回誥花滿金盤脯擗麟聞道麻姑來獻夀一杯春露餉平津贈相士李逹蒼狗雲衣耐事何都城風物閱人多神光爛爛開嵓電法語琅琅振玉珂每詫顱奇觀慶厯閒評鈞幹過銅駝春融不逐秋陽老一笑西風付踏歌題無名亭詩韓右司雲卿築亭於所居後圃不侈不陋面勢軒檻爽朗静深窈而有容公餘盤礴披玩法書名畫其間心適體胖沖然有得所收家數内陳無名卷最為之冠其文甚蔚如春雲出谷態度不一信可怡悦而友也用扁為亭名且見夫主人平昔篤志立行務造實理不事表曝之意喜為賦詩以歌詠之其詞曰朝回守口澹於缾觸事初無寵辱驚道自上經原有説顔瞻新扁本無營書傳遺帖如倉古披構高堂似雪成快意只須輝獻議出門一笑大江横題萬知府瑞麥圗二岐至五岐汝南今嵗麥連雲一氣祥蒸徳化循春露潤含千壠秀薫風披拂五岐新嘉禾共穎宜同頌神草聨莖恐謾珍旌異潁川原有例㑹聽増秩佐經綸送李景山宣慰夜郎仍用畱别詩韻雪山瀘水兩迢遥天暢恩威壯本朝萬卷堂中人寂寂雙旌門外馬蕭蕭雄文喻蜀知無敵虎韔垂弨不待招許國壯心如此健夜郎風教儘敷條感舊書懐宫漏穿花隔掖垣彤庭雲静鎻秋烟中堂載筆三千牘玉署觀光四十年麟獲削成周柱史座寒誰憶廣文氊應憐春草東郊思老馬何心覬二天簾筆貯雲含霧來江浙紗罩金盤舞鳯􅊏裁翦細筒裝紫穎卷舒彤管束紅簾䑕鬚挫鋭藏燕拂内史傳經寄道龕自是陸卿多巧思猩毛貂尾兩無慙作者南江陸秀卿一作誰是玉堂龜鶴夜蓬瀛仙火寄雲参送普蘭溪行臺中丞漢家二十六將軍忠孝如君萃一門痛惜鯨波吹屬甲盡將臺憲付諸孫維持根底餘忠厚包總時情貴直温攬轡澄清吾志在風沙先霽石城昬寄何參政郎山山下讀書堂萬卷芸香綴夜光贊善皆推東道主賢參高臥北忩涼林烏返哺犍為守易水悲風劍客鄉擊筑㑹傾高麥酒滿壇秋草酹昭王贈雕鏉舒穆嚕世亨石郎來自汝之墳性解雕鏉到奪真一握錕刀修月巧滿龕龍像雨花紛趨庭過我求名諱刻木先君表世臣家廟薦蘋吾祭在露堂冠佩待三薫贈道者李雲叟道人姓李氏諱道謙出東齊世家年十六歘有悟棄家入道禮丹陽馬公高弟劉為師既冠長游諸方洞天參求𤣥契又嘗圜居於陜多積静功時人以有道許之今主東雍之神霄宫曰雲叟者葢其别號云昔王逸少與謝安石常東遊海嶠飄然有雲霞高舉之志今亦以是稱豈其遺意耶秋澗翁序生龜脱笥豈易事假手柱史驅羣魔平生繕性契真訣萬應刳中付踏歌遼鶴歸飛三島近道心安處一瓢多超然獨立雲霞表浩浩流光看擲梭題葛氏臨漳五福堂澹澹河流紫陌長青林東下望臨漳蒼烟拱木三臺里書頁翻香五福堂通徳絳帷多故老謝家庭樹見諸郎兩公出處有深意常記吾親託故鄉龜詩呈閻學士數尾已知三百嵗息胎更活幾千齡誤投罝網寧無夢曽獻箕疇信有靈好共鶴嬉當碧逕莫趨鼇負向滄溟松間竹下婆婆地長伴霜髯老夀星送僧印東還鍾離詩并序予寓居安貞里東行百舉武有精舎曰文殊僕方謝事需命間一往焉與僧法印號無文晤言以適吾懐因知師系出濠之郭氏其先東平人祖班常為弋陽部將死王事遂𦵏於此父珍亦為州之機宜官師㓜讀儒書長習隂陽風角等術既而悟塵世虚幻遁入招信嘉山尋師學浮屠法清修苦行致價重一時為兩淮朱制閫所尊敬特起華嚴禪院為棲息之所仍誦其品目追報母恩江淮平飛錫五臺禮文殊光相遂抵京師參印叢林富觀大乘其氣象安心枯寂脫屣榮利飄飄然如孤雲野鶴任其去來若不為形迹所累者因其東歸賦詩以贈其詞曰鍾離老衲印無文燕薊常游寄此身一片野雲横碧落半窓寒日弄游塵經龕入定依殘供帝里相逢有故人我亦天涯倦游客幾回歸卜問通津保定曽總管清隠亭詩卷平生不識將軍面開卷題詩得姓名清隠已安三徑樂賓筵時雜五侯鯖春郊羽獵來緹騎烟渚沙鷗有憶盟聞説懿公多賜物過門求閲儘名卿餘慶堂銅臺趙御史鴈塔題名奕葉香教開婉婉亦多方需知培植根基厚遂見滋榮世業昌沙麓昔聞王氏積桂花今接竇家芳豸冠高映斑衣爛嵗嵗春風拜北堂慶耶律秘監九秩之夀大徳辛丑三月初郫離山色照中華孝繼忠傳自一家閲世光隂縁服食過庭詩禮儘柔嘉啓期榮樂神多與衛武箴規慶未涯見説夀筵香霧暖誥恩行墮五雲花贈雪堂雲間徙倚妙高臺蠡吹喧喧海會來佛界雨花香有信石塘流水浄無埃過溪破界東林約乞米藏書李勉哀想得大千香積供維摩方丈白皚皚贈順徳天寧方丈水晶心孔碧雲思方外高閒有阿師滿院緑隂人别後一欄紅藥客來時簾扉掩映爐烟直僧榻留連茗椀遲何處虚舟虚未得冷翻吟棹衆波隨送荆書記幹臣北還詩并序幹臣參議覆事南來與余遇于襄國連日道舊契濶之懐豁如也君素能詩及得日本諸作清雄奇麗拂拂然挾海上風濤之氣令人豈勝嘆賞且聞駕海之舉千載盛事然江海之險非丘陵可比若以衣裳鱗介論之任責者當以萬全為言因贐鄙詩敢以略及邁往淩雲見妙年東征書檄更翩翩萬艘瀛海參戎畫九㸃齊州漫野烟卉服終期歸禹貢異聞無復訪奫然舞干不作三苗舉好為清朝論萬全董氏家庭拜慶詩順徳少尹董君舜卿太夫人蘇氏系出冀州大家今年九十有四起居飲啖精健如五六十人以董氏論之親老而夀家温而禄雖云賦予攸厚亦孝感所致壬午夏季十有三日葢拜慶辰也以歌詩求榮謹書此以侑夀觴之末婺光分秀下含真來閲人間百嵗春子孝毎能忠作訓家肥還自徳為鄰庭萱吐鳯明珠樹蓮葉翻香溼繡裀一曲南薫薦蒲酒慶筵長對歲華新近按部襄國提舉張子厚為僕留連者月餘既而得代裕如也因念其治燕南鐵官之人最不可得同僚給浄由以付張子之臨財莅政其為亷幹可知已將行以贈言為榮喜書此以貽三十年來舊弟昆紫髯落落照鄉鄰白圭磨徹光無玷青眼看餘分更親均幹有方留後法泳游何患作潛鱗一杯回首河橋栁亂擺春風約去塵挽中書左丞魯齋許公經綸根極自朱程小學從容到大行安漢固當煩綺聘要湯初不待伊烹辨姦素有批鱗直旌墓當書積善銘兩夜天官臺下夢分明危坐話平生庚伏日大雨屏翳驅雲障日昏雄風吹雨怒翻盆天高地厚初無際電激霆砰入并吞造化有神藏妙用枯焦回潤沛深恩客忩更喜終宵爽滌盡煩歊夜氣存廣宗董主簿二親同夀八十求詩為慶七十人間古已稀况登八秩夀眉齊慶延為厚于門積松茂同欺鵲嶺低棣蕚堂深鴒接翼碧梧枝老鳯雙棲年年長至花開後滿泛春風薦玉蠡留别鎮陽諸公梧桐葉上雨瀟瀟涼透疎簾夜寂寥長往有懐深霧隠虚聲何意望弓招三年滹水人情好千里維揚去路遙多謝諸公挽留意敢將衰謬枉清朝哀清和公振轡咸池挾日飛識先秦府帶圗輝氣縁剛果疎沉慮變出倉皇落禍機尚賴聖朝明樸直豈防讒口重緋衣誰令諸武留遺育悵望烟雲借敬暉圗回東别鶴鳴軒脱却山衣相有元汲直寢謀推國老羽淵沉鯀論綸言參旗不掩千年氣楚些難招九死魂欲雪絳寃吾舌在有書無路逹天閽詩送宋克温郎中北還神駼出水氣淩雲一顧曽空冀北羣鷄舌試香封事秘紫宸陪仗絳纓紛茂陵弓箭空秋草麟筆公侯削魯文從騎不愁逢醉尉暮歸猶識舊將軍一作茅屋兩檐書萬卷門前冠葢盡浮雲西池幸遇詩壬午嵗十月十二日惲以承華事略求見引見者工部尚書張九思已刻拜太子於宫西射圃内北前命近侍趨入者再既見問秦始皇何如主惲以所行過暴為對太子首讀明分篇問漢成帝不敢絶馳道事喜甚至輟射繙閲悉問其各篇主意所在張九思舒固鼐略為應對讀訖以書付近侍董布格㑹静時細聽未刻賜酒沾醉而出射殿風清己午間曳裾挾䇿拜龍顔首詢帝子龍樓召喜輟犀弓偃月灣葵藿儘酬承日志簡編不負半生閒滿樽春露沾恩處光動西池玉筍班挽元倅善長危并長遊士子間襟顔相接藹于蘭身縁吏隠多時尚事與心違仗酒寛千日醉吟愁儘在一朝臥病衆知難空懐去嵗中秋㑹六郡歌頭聽細攤今春酌别鎮東門誰料歸來便哭君毎愛醉歌増慷慨若論友誼更慇􅮆谷駒夢杳驚炊甗寒雁行疎斷朔雲撫卷題詩倍惆悵有知當徹九泉聞贈張詹丞子有二首一拜龍顔見赫臨繼開詹府更良箴執言博士議當取端本後朝縁自今千慮徒懐愚者料片芹難盡野人心倘蒙銀字沾恩去未礙東山擁鼻吟中護名香鶴禁深津津芝宇見雄襟兩坊春色烟花地一片丹誠羽翼心夜祲不容侵翠鑰布衣仍藉盍華簪五雲長近前星潤正要乘時作傅霖贈史中丞并王高二侍郎天吹驚翻白錦鷹搶揚還復藉飛騰嚴城鐘鼓殘更月客舎風霜半夜燈老境幾何心未已清時有味愧無能一麾倘便公私去大事生平幸不勝贈趙禹卿燕市分攜又六年眼中雙鬢兩皤然槖金周急為真樂猷畝思君類昔賢韋曲去天纔五尺田文食客尚三千相看一笑風神在不似長鯨吸百川夀楊奉御五郎黒頭宜揷侍中貂華岳秋高見隼標滿眼風雲承眷顧四科言語獨超遥時陪采鳯巢阿閣又領春暉上栁條端尹後朝斯任重祝君眉夀等松喬贈楊吏部子裕載覿清揚又六年充庭儀鳯更翩翩事條不獨山公啓風鑑能知漢相賢黄散許除伸素志銓衡停乆正吾權春風宻鎻天官署常訝唐人緩所先劉禮部歸國詩卷朱邸同文易舊傳使華光動海西堧十年都護清如水百險歸來雪滿船壯節氣淩殷侑序悲吟忠到子卿氊錦窠未是春風地㑹見吹嘘侍日邊贈崔中丞秀拔氷天一氣晶幾年宫閣作先聲閉門著論驚崔實審勢陳書似賈生鐵柱宛從貂珥出簡霜能肅栢臺清堂堂正有文貞笏撃暴摧姦是小成月波引清商六調其一寒光相射其二冷侵牛斗其三静聽龍吟其四遊魚躍浪其五風蹙成紋其六深夜回舟雙溪相公首唱和韻者澹游張緯文僧本菴趙虎嵓著苗君瑞之姪良弼求詩於余勉為奉和以續五賢之右露洗金波蕩碧空清商傳調自天風看來冷浸雲間斗聽乆幽吟水底龍孤棹泛溪回雪夜跳魚翻藻避蛟宫一彈曽感神人暢何翅平公為斂容謝平章聰山公見惠東陽佳醖大同枸杞書院春風静掩關洞庭春漲浪滄灣雲腴釀自東陽酎仙杞香來大若山二物并遺沾雅貺一樽端為駐衰顔應慙潦倒登瀛客尚覬哀憐賜珮環秋澗集卷二十三欽定四庫全書秋澗集卷二十四元王惲撰
