seq: 6
front:
  text: 七言古詩
  hash: sha256:56417f7029ec75c586769e6e6709992127661b13a9578fb6ee11c879b8061c3c
body:
  text: 舒辟劍歌為太常公𢎞衜賦龍泉之精老蛟血躍入洪爐凝夜雪至今元氣老不死粲粲碧華浮兩脅雀環金錯赤絲絛蒼水夜擲天為髙或云徑度海西陲佩非其人有所歸夜飛入燕人不識天以神兵示中國宋侯磊落書中傑碧眼風胡物情格窮幽抵秘竟圗經羽窟崑崙騰口說黄金臺下喜相逢醉眼髙歌得玉龍摩挲神物萬金重箕冠傾倒琉璃鍾蹇予元年燕市客走馬來觀嘆奇絶雪屋燈青寶匣開紫氣横衝箕尾滅悲風凛凛入座寒山鬼吹燈中夜爇當年天矯龍性在入手無方恣舒辟金精固列五材首堅質柔資苦差别彼人之性而與同太柔失威剛則折咄嗟此劍陰陽全雄雯雌縵俱赫然君不聞淮陰未遇賤且貧愛而服之良有因無何大遭跨下辱亦如此劔能屈伸一朝攀附赤龍飛六合風雲入指揮漢家日月四百載亦從此劔騰光輝宋侯篤我卓所立一日三看曽不惜我今作詩私自激重為歌之感疇昔多君振厲義且誠羨君小試妖氛清三年盜㺯潢池兵亞夫持節東南征此時宋侯佐戎車一揮逆儔生白鬚縵纓短衣非我事談笑自有聊城書斬繮歸來茒屋底拂拭海西心自喜不須夜半舞荒雞得君亂絲為君理况君天冨席上珍胸蟠萬卷餘經綸天王未入非熊夢此劍應須檢子身飛豹行中統二年冬十有一月大駕北狩時在魚兒泊詔平章塔齊爾以虎符發兵于燕既集取道居庸合圍於湯山之東逐飛豹取獸獲焉時予以事東走幕府駐馬顧盼亦有一嚼之快因作此歌以見從獸無荒之樂也予時為左司都事二年幽陵閱丘甲詔遣謀臣連夜發春蒐秋獮是尋常况復軍容從獵法一聲畫鼓肅霜威千騎平岡捲晴雪長圍漸合湯山東兩翼閃閃牙旗紅飛鷹走犬漢人事以豹取獸何其雄馬蹄蹴麋歘左興赤縧撤鏇驚龍騰錦雲一縱飛塵起三軍耳後秋風生豹雖逸才不自惜雨血風毛摧大敵風烟慘淡晚歸來思君更上單于臺血埋萬甲戰方銳爪牙正藉方剛才古人以虎喻天下得失中間係真假元戎兹獵似開先我作車攻補周雅大笑南朝曹景宗誇獵空驚强霹靂何曽夢見北方强竟墮閉車甘偃息揚鞭回首漢家營一㸃槍纓野烟碧匹紙歌謝王道人子寧楚山修竹森如玉千杵鳴碪響空谷溪翁鬬巧紙愈佳渌泛秋江連百幅春斂籠燻素練輕鳯梭停織天孫顰聲光一日天下白萬古作配中書君道人來自蒼陵天名品閱䀆東吳船惠然贈我以此紙入手展放銀河飜脂凝玉瑩絶纎滓風流綽約貌似姑射之真仙扶餘綿繭固堅膩中有雲影霮䨴浮秋瀾金華五色非不佳不放墨松使者光通𤣥何如此君貴重百金比當與澄心玉屑並驅争後先媿無少陵詩魯公筆如椽揮毫一掃空雲烟文章元氣古無問玉堂人物今翩翩此而不贈返惠我夜光暗投真可憐道人一笑春生頰琢腎雕肝爾心折千首新詩意未窮分取烟江愁萬疊我今靈臺久荒穢老樹秋蕪餘廢垤何時除治若此紙一片冰壺貯秋月深藏且須珍惜之准備虚堂夜生白金馬門行十年金馬門中客萬里風雲横上䇿貂蟬要自出兠鍪拏舟渡江江水窄新豐樹色繞千官一片丹心懸魏闕洞庭白波木葉下千里臨江思飲馬堂堂大帥晉龍驤聲振南陲無吕賈止則如山戰則克更著君侯㕘幕畫淮陰何止一軍驚滿眼旌麾動秋色萬竈連營楚戍烟一樽回首銅駞陌功名年少貴力取行與諸兄垂竹帛蹇予久事筆研間天東倦客未能還夢回破屋見星斗商聲夜半歌南山虚名不到麟閣上白日能飢苜蓿盤何如乗此長風去濁浪吹破東南天相從行贈宋兄𢎞道宋君茂異誰其儔事業當向前人求羣書磊落載其腹人道聰明似鄴侯黄陂千頃不足泳入海簸㺯龍驤舟十年霧豹棲巖幽毎恨南海北海風馬牛碧雲望㫁西山陬愛而不見心為憂向來文采珊瑚鈎寧胡一曲不自休公嘗作寧胡閼氏曲行于世壯懐似欲冩孤憤筆力倒挽西江虯古今樂府非不優例以哀怨更相酧蛾眉命薄黄金貴青塜凝雲紫塞秋多君變體不師古一掃萬古琵琶愁我忻得之三過讀如入武庫森戈矛乃知鳯凰在岐世自瑞春風百鳥空啁啾乾坤吾道方悠悠天公畀子鳴中州喚回海嶽三生夢獨倚元龍百尺樓今年冠劍平津閣積憂一見心為廖識君恨晚愧仝志正似羔羊之鞹縁飾青貂裘古今為諱分清流不用倒飜鸚鵡洲期君有道興東周不然君為龍我亦同雲浮自兹攀逐不相失四方上下從之游南風謡送董瑞卿之鄧州軍幕南風不競兵塵鏖兩淮春燕趨林巢吾皇明見萬里外欲以徳服兵無勞已聞灌莽極目地方屯春事開林臯紫髯將軍賢且豪智略往往超龍韜一軍壁楚號勁利眼中勍敵無劉曹今年分閫鎮鄧鄙旌旗改色天為髙芙蓉幕府固多士更以厚禮羅英髦君侯漢庭選經濟䕫與咎揮畫乃餘事白羽風蕭騷年雖哀樂境兩鬢無霜毛如君名宦不可逃繡花未滿千金刀鸞凰忽爾辭蓬蒿此行莫起觸熱嘆將軍好士心忉忉得君豈止解鬱陶投竿如掣東溟鼇飛牋走翰鈴閣底駸駸欲逼令家綯秋風皷角驚江濤軍中氣和投楚醪兵家耕戰諒有待雷雲隠伏池中蛟一杯漢水春蒲萄楚人雖猛輕秋毫知君談笑辦此事長江聴渡龍驤艘長江聴渡龍驤艘長劍行為王子初賦老蟾破雲光走庭清風西來散幽扃北斗芒寒色欲見太白睒爍無光晶燈前忽值蒼水使示我寶劍喜且驚芙蓉匣開吐奇怪分光䀆萃此劍之精英蒼虬翻風白日動秋水背露龜鱗青昔之所遇今乃愛覺我炯炯雙瞳明青衫試拂拭磈磊難自平平生疾惡腸為爾芒角生我聞乾剛甲五材鍛成玉龍復以首利庶物稱佩非其人尚不可况乃用之髙庳而無經君不見趙文失所好日夜徒擾曼胡纓朱雲伸其請折檻反取訕訐名劍之於人無適莫用之得術如雷霆又不見周公管蔡舉謗息四國寧聖師兩觀誅正大貫日星遂令千載下妖腰亂領寒於氷引杯感古我自惜儒冠突鬚嗟無成之子風雲士慕藺如長卿飄飄四方志早以文章鳴君與劍無久蟠決雲㑹看昇青天黄金錯環蒼玉佩攬環結佩天王前慇懃祝子無多言不誅已然誅未然雜言喻為彦政失子作堂上慈親頭白絲慰心賴有寧馨兒巉巉頭角日方露誰揮如意擊碎珊瑚枝不知與奪果何主變滅歙歘無旬時驪龍失頷珠海窟黯慘鬚眉垂老鶴憶别雛淚眼呌㫁秋天低彼蒼坱圠於我本無有何事誕說立象為鑪錘陽春艷艷木自榮非春一一㸃化青紅姿秋風蕭條羣木脫物感秋氣彫悴又匪行陰機乃知生死天地間花開花落殆似東風吹蜂房魚腹得至理子夏失眀傷天彞西家因果蠱流俗東家聞之為朶頤蕃延疎薄無定分慰懐當取昌黎辭父子自天性東野能不悲君年正鼎盛情鍾感非宜况夫先子澤渾水清而漪吾友賢且孝舉案加有梁鴻妻捧檄為親屈晨昏歸來侍庭闈我聞善積有餘慶他日當有螽斯詩湧金遊并序予回轡共山有容過而問曰湧金之遊樂乎曰樂矣不無詩乎曰無有也客曰事樂㑹之於心心樂寓之于口且蘭亭之勝至今尚為美談者其以有託於斯文也客退於是乎書長短句以歌時孟夏十四日也曉雲拂山山氣昬坐來萬壑烘朝暾丹崖翠壁畫莫出但覺詩境供愁新地靈祠古秘幽怪天授神柄専其尊年年簫皷祠下路東風十里楊花春我來愛此山水窟天氣著物清而温漫金亭上一䃲礴主人留髠醉金罇水邊滉瀁多麗人往來但看珠翠裙不知仙家足奇貨明珠脫串一一浮出摩尼真波間可翫不可掇雲錦飜動玻璃盆書生潤身那羨此席上正有吾家珍舉杯酌水但黙禱山靈垂意哀王孫願分秀色貯詩腹一洗萬斛胸中塵仙官有請固不拒山鬼竊笑君無因不然結茅傍修竹雲烟占㫁西湖曲月明舒嘯碧山巔喚起公和跨黄鵠秦川行送張孝先北燕豪俠南州客去嵗辭家今八月霜風偃薄一貂裘不為無金少顔色平生弓劍只餘事滄海風雲居上策今年棄繻復入闗春光澹沲迎征鞍周侯磊落天下士槖鞬賴子為周旋我知黄鵠志千里此舉横絶青雲端長安西望白日近解鞍多在清明前新豐美酒斗十千長樂坡頭楊栁烟曲江花滿樹春風怨啼䳌對時感慨能不動鄉思丈夫有涙肯洒離别間驊騮得路足神駿我非繞朝愧乏黄金鞭君不見古人勲業貴少壯莫待拊髀悲流年東方碑帖歌謝子初魯公筆法天下雄東方一賛其猶龍嗟予愛之力莫致夢魂㡬到平原東我雖不解書慕此忠義風有唐天寶初禍首營州奴羣兇一朝起氛祲連神都二十四名郡風靡隨盜區堂堂顔使君徇國思捐軀竟以七千衆不為邊塵汚乃知大節初不以藝自殊胸中義氣蟠不䀆往往翰墨攄其餘况兹游藝君子責古人以字為心畫先生不知作何狀覩此寶墨事可測書學到君稱絶筆凛凛英名貫星日晉漢名書凡幾家奄奄為君皆敗北宜乎眉山公謂此能事畢出於右軍擴以大比並離堆當第一豢氏龍蟠古井波將軍虎卧南山石又如大人垂紳正笏廊廟上忠厚之氣了弗事縁飾嗟此至神物毎為好事得君家父子賢向歆只今好古喧詞林幾年秘此分賜我拜嘉不翅千黄金君心若此真尚友我報愧無瓊與玖歌成大笑不自量擬與君名傳不朽墨竹歌為共嵓處士持嘉吾生愛竹兼嗜石手不能書漫成癖憶從林下七賢游終日摩挲㺯寒碧山河一自隔黄壚塵土填淤百憂集得君此畫忽洒然元氣淋漓障猶溼滿空月露下寒塘人去山陰鎖幽寂又如湘妃廟前風雨晴翠袖紛披山鬼泣幾竿迸出太古崖老節雪欺初不惜表將一片嵗寒心不與繁華競朝夕東欄牡丹鶴翎紅西沼芙蓉紺珠色歌鐘傾國樂芳年以色事人能幾日何如鴨江居士詩骨清而臞手種此君忘肉食不須拄杖敲人門萬斛清風破窗北月中看竹掃秋影妙得於心發之筆興來落紙出塵表擬學湖州滅形迹嗚呼湖州已矣蕭郎逺今代名家淡游客君不見李杜文章萬丈光一日齊名偉髙適乞雁歌吕東平江海客一鶚盤霄鷙空百老來機械淡相忘雙雁隨行聲格格階除得食藏頸眠惱不及鄰甘亂聒兩堆晴雪春不消暮映書窗生夜白終朝司警代黄耳夢破烟江秋拍拍主人對之心愈閒感念物情終桎梏家中又厭食蟻蟲一夕籠歸山下澤今春卵哺衆雛息百日己能過所出青山滿眼映一羣泛浦眠沙白勝雲稻梁棲畮秋正美約我充庖潔口飱能鳴見害古所惜我心念之生隠仁勸君深藏饔子刀解縛歸來養雪毛右軍閒適久無伴許贈一隻相與遨西溪秋水深㡬篙江天漠漠秋風髙歸飛不隔暮雲逺放爾縱觀心亦滔俯歌雙雁行仰送孤鴻杳洞庭歸客𣺌無音萬斛羇愁坐中老節旄零落瘴海烟冠盖都門閙昏曉我欲因之附尺書西北烟塵静如掃夏夜晨起理髮時目疾新愈居閒早眠復旦起繞樹行吟殘月底鄰雞聲裏候東方曉色雞人氣清美雙瞳自為苦所纒兩鬢鬅鬙思旦理青絲髪散滿肩雲千梳未暇百梳勤餘邪細逐老櫛散風露氣入秋蓬根疏通百竅勝新沐一洗耳目清而明朝有蠅子暮有蚊事隨日出更紛紜侵晨有此至良劑肯羨卯盌松醪春詩成因謝草堂客􅄞康養生非妄論衡門行送陳長卿衡門棲遲樂吾樂甘著流輩譏束閣長河其奈不療飢誰暇物情論厚薄前時行臺領漕計處士半為餬口起長年巨䑕有餘壤比比吾儕廢生理嗟哉陳君何苦節天東游子天西客監河勢去餘業在客舍半椽淇水側書生辛苦學干禄入手青衫得藜藿塵埃風雨蹇驢瘦日就空倉自羈縛今年幸得解脫了超海挾山初不惡暮春之初日東作陳君叩門聲剥啄向予長跪話逺行上計又須趨薊朔攜書五車煮不堪舉室舟行更蕭索前因未必是亨衢著脚如堪戒前錯若於金粟例言拙誰著裴劉供調度逢時正有利不利有命豈論前與郤長歌西北酒一杯浮雲漸逺天寥廓東曹若見王春官道我行藏事如昨幾年奔走一墮甑蕙帳歸來慚怨鶴濟時幸有公等在擬把一竿尋釣壑因君悟我向來非相送出門還一噱大雹行至元四年五月十五日也雷師掠地西山麓北㑹豐隆出蒼峪崩雲掩落赤日烏烈缺光騰燭龍目黒風駕海天外立萬騎先聲振林谷雲濤怒捲惡雨來中雜冰丸幾千斛殺聲咆哮屋碎瓦百萬神兵自天下奮然横擊合陣來昆陽之戰何雄哉又如馬陵之道萬弩發矢下雨如無魏甲斧形鷄卵見自昔異狀奇模此其匹野人庭戸變綃館霧湧烟霾與龍敵又疑鮫人泉客泣相别涙洒珠璣恣狼籍葉穿鳥死庭樹慘禾麥擊平驚赭赤神威收斂俄寂然瀟瀟合浦還珠聨整冠變色立前廡但見土窩萬杵一一皆深圎五行有占非小變調元失所誰之愆又聞夏冬愆伏之所致亦以坎治持化元孔子修春秋二百四十有二年特書雨雹凡兩次大率敗黜臣下侵君權况今朱明壯陽月胡為縱此羣慝之所顓厯闗上訴九虎怒蟣虱小臣非所言獨憐田家被菑者寒耕熱耘手足成胝胼差科大命寄一麥盼盼見熟療飢涎一新到口不得食哀哉何以卒嵗年捕魚歌塢西溪水深及篙漁戸曉集拖輕舠縱横張網截兩涘挺义逺混驚銀魛栁陰潛涔深且宻大魚小魚争遁逃須㬰合網環深碧薄槮提綱從掇拾小魚骨罣半死生口頰噞喁無足惜就中一魚匪常材黄金作鱗尾砂赤泳游本在孟津居波蕩江湖事行役中塗遇厄夢不神騰躍舟中有時立漁郎迴艇催歸急幾處金盤待鮮食夕陽澹澹洲渚空回風蕭颯溪神泣網罟設兮水不深惜物之君戒貪得古人數罟不入池以時漁捕須盈尺今人古道棄如泥竭澤焚丘意方畢野人有樂在濠梁澤畔行吟三嘆息宿仙山朝元觀題示太行北走開四門川原落落風烟屯仙山西峙如虎踞石嶺東抱猶龍奔道林中蟠百餘畆顧揖殿寢何雄尊仙翁得仙事惝慌碧霞洞主𤣥元孫百年朝元去不返寶籙秘泄風雷燉陰雷訶護石壇古老雨溜漬蒼苔痕緬懐矯矯東瀛老變化能大天溟鯤謝公本是濟時具誰使卧老東山墩豐碑不愧蔡邕筆再拜遺像儼以温我來夏交樹陰翳萬橘翠瑣芬蘭蓀平生素有林壑癖苦厭闤闠埃霾昏毎來福地愛蕭爽跬步乃與仙凡分山川景氣得入勝喜對羽客開清樽夜深静卧月東出林影布地翻瑶琨天風吹空萬籟息明星當坐手可捫恍然人境兩竒絶月露一洗清心魂世間塵土幾千尺有夢不到瑶臺垠人生幾何胡不樂例自跼束駒服轅惜哉清景不可駐一聲啼鳺開林烟明朝人事隨日出坐看蟻穴蜂衙喧雁門公子行贈李仲明萬戸鴈門山髙㡬千仞風土雄尊號全晉君侯年少出紈袴裘馬輕肥冠時雋古來豪傑數幽并栁子不須誇晉問蹇予三年東魯客塵滿青衫鬢雙白書生無䇿伴侯鯖尺蠖泥蟠甘退縮此時仝君幕中游袖手旁觀看超越絛籠脫落不受羈意表出奇人叵測健於豪鶻快一擊霜翮盤雲鷙空百愛君肝膽向人開遇事剖析無留材世人荆棘塞靈府末事掛眼生嫌猜丈夫特貴氣為主行義不虧誠可取區區心計米鹽問束縛真為抱官虜相期心事李西平錦鞬家世蜚英聲天其藉此作事業未害蹉跎魯客卿眼中人物真知已舉世論交多逐勢贈君一片百年心意氣相傾岱如礪羨君才氣真英耳鬱鬱安能久于此烟華紫禁正縈繞臺閣羣卿半鄉梓明年焰焰動北方騰踏風雲乃吾子贈田生赴監河之召田生操履淩髙節三載奔馳秦隴月長年愈覺世事艱中道毁車思逺業故人戀戀監河侯願分斗水相為留古人有志患不立抱闗擊柝非所羞君不見黄河一尺鯉風濤終化禹門秋贈孟祝史徳卿還燕城孟侯落落明時佐從祀歸來喜相過探囊擲下珊瑚鈎海岳英靈驚甑墮淋漓元氣星斗光照徹龍淵得奇貨我初把玩三歎息不覺秋風吹屋破太一真仙令綺季入奏行宫瞻紫氣受釐宣室想所陳不獨碧雞金馬異朝家望望董賈賢祝史孟君今偉器明年艶艷動北方館閤風生驚一世因之啟賀亷行臺為國得賢真宰惠題韓幹畫馬圗韓御史君羨所藏索賦火輪凝空汗如洗日坐烏臺簿書裏韓君忽出天馬圗蕭䬃朔風生駿尾吁嗟此馬來西極細看一骨千金直當時開元監牧盛赤岸千羣雲錦織奚官袍帶蒼髯㦸碧眼深藏九方識豈其此骨獨當御轉盼君恩仗前立㡬年扈從東封還霜蹄蹴踏長楸間驪山武事厭不講剪刷日應供帝閑鸞旗百里臨潼道華清宫殿春風早黄金羈勒玉華騣遊幸君為玉環老幹時供奉屬車塵思入星精奪天巧興來承詔貌真龍冀北驊騮歸一掃古人畫馬需神品骨相權奇氣深穏將軍曹霸幹所師萬古丹青少陵引韓公得法固入室十丈光輝誰所凖自今題品雪堂仙韋偃龍眠徒滚滚嗟予何者牛馬走開卷賦詩還自哂韓卿朝騎御史驄暮擊凡禽健秋隼更煩牢鎖玉麒麟隄備雷風轟秘本梁秀才惠橙梁時在制中君家堂前橙兩株汝父當年手親植洞庭波兮霜滿林摘惠晴窻慰幽寂夜堂張燈動春酌脫帽驚呼夢疇昔摩搓兩手三日香感舊懐人淚霑臆一雙照耀黄金苞露香冷落銀觥桃呼兒走問隣牆酒早晚珍珠滴小槽三勒漿歌有序唐代宗大厯間幸太學以三勒漿賜諸生此後不復聞於世今光禄許公復以菴摩訶毗棃三者釀而成漿其光色油然如蒲萄桂醑味則温馨甘滑渾涵妙理及薦御天顔喜甚謂非餘品可及遂以時供内府不肖以霑瀝之餘發為歌詩以見國朝徳被四表萬物畢至之盛許公愛君之心以湯液醪醴躋聖夀於無疆之休也金天一氣何奇特異品珍材表馨徳翠籠萬里入貢來赤佛堂西漢家邑異哉三勒見圗經秪解有靈能愈疾豈知用外藏妙理瓊醴蔗漿非所敵誰傳釀法自太古滿甕春雲元化溼就中至味真𤣥酒豁達靈根三益友許公得法神所傳一醖天成漢重酎儀狄拊掌耆伯驚五百年來未之有芹香背炙固區區推以愛君忠且厚彤芝盖影擁紅雲湯網初收在靈囿月華冷落露盤冰三嚥芳温挹大斗金壺㶑灧承案不能餐我輩何功飲天卣秋澗集卷六欽定四庫全書秋澗集卷七元王惲撰七言古詩
