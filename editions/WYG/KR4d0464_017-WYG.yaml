seq: 17
front:
  text: 香欲弔風流俱寂寞滿丘秋草近宮墻
  hash: sha256:828414a6060fa52f2d8b1993cfb1c908e868b28f64fad4f6bfba445728fcf46c
body:
  text: 挽張簽省自號順齊老人中統元年授太原平陽宣撫再簽東平行省漢庭冠劍擁羣雄曽建嘉謀沃帝衷白筆剛稜驚柱後繡衣風采照河東鵬来近舍魂先褫麟出昌時道未窮一掬西州門外淚不應悲絶獨羊公留别總府諸公超超天馬五花紋少日能空冀北羣事梗不成旬月雅材駑空抱四時勤情馳北闕烟花禁夢到西山日暮雲一曲驪歌應恨别麒麟髙閣總殊勲單學士挽章二首生平才氣浩無雙彭蠡秋連萬里江庭議儘髙清禁月苦心終對玉堂釭百年世契先君厚萬斛龍文筆力扛最喜誨人曽不倦洪鐘無憚寸莛撞時論生平愛贄賢縱横條列果無前屈身為道思𢎞濟遇事明言見惡圓韋杜去天纔尺五衣冠埋恨便千年遥憐晚景山齋意地下修文恐浪傳和劉懐州韻二月燕城氣未華添衣風起漫吹花背隂凝慘松猶凍藉潤含嬌草有芽得失正須論定分低回初不為謀家長河有路通霄漢誰遣孤星滯客槎荏苒風埃老歲華羞将勲業照菱花暖催回鴈舒雲翼寒勒幽蘭茁露芽嚼蠟宦情無少味轉蓬身世不知家客窓一夜江湖夢醉把長竿繫釣槎蛛絲拂面喜生華照眼青燈夜有花雪屋苦吟饒客思茶鐺寛煮試新芽一官除後三移次十夢驚来九到家遥想西溪墳下水碧翻瑶灧待浮槎餞王全州二首衛連􅅠邶號交衝比屋休驚未可封鄉校廢来風俗壊野田闢後歲年豐租徭雖免離民衆官府全更宿弊重新政慮来無此切正煩裁減與優容二十年来舊使君又瞻皂蓋擁朱輪試評異政三王果何似天姿兩漢循田里務從安靜了使軺誰計送迎頻先聲洽久民情喜聽到隨車一雨春同劉景融西園懐古錦摛西苑正隆修大定明昌是讌遊海露恩波鼇抃首花翻瑶艷雪迷樓三千歌舞繁華地一片風烟慘淡愁興廢筭来無五紀至今靈沼咏西周送高飛卿尹順德朝家一革舊官空整整新除示至公善政擬超循吏上寛恩却在詔條中如君悃愊無虚譽所至絃歌有實功馬首快從紅斾去百泉花栁待春風用劉景融韻荅客問寂寂從教笑仲華羇懐坐老竹生花新除海隔無從問喬木春深恐有芽追逐昔賢慚下惠比量時軰愧劉家萬家倘作無聞去枉説張侯泛斗槎西苑懐古和劉景融韻彩鳳蕭聲徹曉聞宮墻烟栁接龍津月邊横吹非清夜鏡裏瓊花總好春行殿基存焦作土踏錐舞歇草留茵野花豈解興亡恨猶學宮妝一色匀踏錐舞名見景元所録金人遺事瓊苑韶華自昔聞杜鵑聲裏過天津殿空魚藻山猶碧水涸龍池草自春民樂尚歌身後曲弓彎不見舞時茵絳桃誰植宮墻外露溼胭脂恨未匀和虞帝廟弔古分開幽野自虞分上海雄沉載厚坤𤣥德共瞻天北極殿基空對苑西門蒼梧雲駕無從呌翠琰顔書固可尊聞説二陵堪比德東風啼損杜鵑魂和劉懐州韻雨露中天日有華暖私幽圃亦多花事機不料先根本顛木其能絶蘖芽老去戀時兼戀闕愁来憂國不憂家幾多至者星邊客空望秋風八月槎和髙飛卿韻錢郎滿腹好精神人物當年見絶塵常惜仕途知已少不愁花樣入時新趙張而後材難繼季孟之間德有鄰蚤晚青雲臺閣底楊何同作眼中人春来百草解通神其奈淒風漲野塵一為化權無定宰百般生意不能新栁含凍眼迷陶宅杏簇枯枝倚宋隣和氣阻乖關治體仰空欲問待何人别髙屯田晦之十年冠葢幾相逢邂逅燕城讌喜同清賞已歌梨雪白歸期休負牡丹紅千屯曉月鞭聲底一片田旌夕照中自笑欲歸歸未得草堂無地著盧鴻即席夀青陽學士湖海秋風駐節頻此来猶侶漢平津如公今得無期夀笑我還先不速賔櫻筍厨香驚咄辦江山筆健老能神玉堂未羨台階貴人道詞臣是重臣和左山言懐韻投獻王門非自謀白駒雖白欲誰留烏飛魚泳有常分漏盡鐘鳴合少休老驥志存終伏櫪野人機靜不驚鷗㑹依緑野堂邊隱一抹青山屋打頭遊封龍北麓行近龍峰已稱心栗留聲裏轉青林雨如散髮来無際山似幽人喜見臨樹宻連岡横逺障雲低隨馬布輕隂鹿泉葢薄何慇厚伴我幽尋到碧岑中溪書院幽尋不為愛山吟李相巖棲是賞音身世正堪閒處著時情尤比嚮来深風烟物外開三觀塵土人間望一霖山若有靈歆素禱滿泓寒碧代孤斟贈知事劉大用兩椽茅屋打頭低中有林丘翠作圍無限雲烟供落墨總從胸次發天機一枝湘竹臨江活萬叠晴山照眼霏疇昔過門清話乆前身疑是米元暉即事和王鹿菴作徹備虚驚已可懲更堪行事日紛更創行有例推諸老責備無端悚衆情遼海兵連思魏鄭延齡麻壊見陽城窮愁正逺聞佳報喜動皇都豈席生留别鎮陽諸公赴任濟南梧桐葉上雨瀟瀟有似留連助寂寥身世未容歸壟畮羽毛誰欲見雲霄三年滹水人情好六月齊州去路遥回首北潭花上月時應歸夢到蘭橈經史總帥戰處乾石橋邊野澗横分圍曽列亞夫營雲烟眼底縈蛇陳草木風前有戰聲故壘按行傷徃事青山依舊繞孤城十年帶礪河山誓輸與汾陽貫日誠閔子墓聖門嫓德亞賢顔季氏何知欲浼然三釡恐胎親老恥一㕓歸取汶陽田山禽容與和聲裏墟墓荒涼落日邊兩下潁濵碑下拜滿杯秋菊薦寒泉公堂言懐勲業羞将鏡裏看遭時自擬寸心丹勉從仕版無㣲巧硬著精神博一官寤枕夜長憂思悄公堂人靜雪花寒眼中少事能如意管甚林梢又日殘糟魚霜刀截斷玉腴芳暖貯銀罌釀粉漿錦尾帶頳傳内品金盤堆雪喜初嘗解酲未減黄柑美雋味能欺紫蟹香一筯饜餘乘醉卧夢横滄海聽鳴榔甲寅歲元日癡絶何堪應事機閒心思與野雲期靦顔身世縁飢凍覺老筋骸强拄持馬怯力微朝進處鳥知飛倦暮栖時日斜凭暖烏皮几靜看爐烟裊碧絲挽杜止軒貧樂能安貴不淫百年宦海寄浮沉閒中今古資談具物外江山助醉吟氣義見来先急難文章拈出更雄深追攀逸駕嗟何及時向逃空得苦心一代人文杜止軒海翻鯨掣見詩仙細吟風雅三千首獨擅才名四十年劍在不沉衝斗氣神游多了住山縁老天未覺斯文䘮齊魯諸生有正傳挽孟德卿龍驤東下破呉年談笑從軍似仲宣亡國不驚三月火捷書先動六朝烟當時籌筆何其發此日題詩倍黯然湖海賢郎宜少慰光揚重見葺遺編和張鵬舉詩韻誰分先覺與凡民天理中来一氣春肯效寒螿吟月苦敢教宛馬列河神六經之外皆非學諸子以来宜有人自嘆半生蟫蠧裏白頭無術動嚴宸和張仲常韻强顔陳力媿周任關盡當年得失林白首逢時能幾日虚舟相觸果何心行身誰是無瑕玉合志能裁躍冶金退易進難吾道事此懐更比向来深賦白舜愈多月亭海岱東開迥地寛小亭千里入凭闌一軒風露金莖溼滿地瓊瑶桂影寒興比庾樓宜不淺飲豪舒杓肯留殘使君未老風流在八表神遊夢采鸞何處人閒不夜天月亭高倚月初圓玉壺光轉青冥路桂影香浮畫棟烟一耀蓬瀛知海近滿庭金粟見秋偏素娥若待停杯問愁絶當年李謫仙遊佛首山開化寺至元廿一年四月八日挈行者孫鞬郎盤盤石磴轉蒼崖山似青蓮四面開寺古説從兵後廢官忙喜向靜中来半泓寒碧供僧飲一㸃烟螺認佛臺我本婆娑林下客樹頭幽鳥莫驚猜遊靈巖寺三首行入山門已可吟葱蘢佳樹總幽尋氣分嶽秀開金界鶴警隂魔䕶道林竹溜逺縈雲磴落烟螺濃並寺巖深喚回三十年前夢此日登臨慰宿心余三十年前夢遊一寺其形勢殿舍殆與此無異路轉峰回墮翠窠陽崖擁抱更嵯峨泉通碧澗来無盡寺並青山永不磨林壑勝遊縁興適乾坤清氣與詩多晚鐘似惜遊人去逺泛餘音遶澗阿絶景亭高勝賞多杖藜到處即婆娑巖虚應磬聲長殷寺古題名字半訛幾樹幽葩明寳供滿空金色下烟蘿何時暫謝人間事放眼雲巒入浩歌送世傑郎中奉使雲南節旄堅駐海西陲奮自陳湯一布衣朔雪不辭霜鬢老長纓直繫六王歸恩波重浹滇池浪赤羽何勞漢将威想得諸羌迎拜處使華先動玉門霏余按部奉髙故人劉君之子持此詩来謁感念疇昔已二十五年矣顧其紙札刓弊因為重書以遺之庻幾孝標憐西華之意云爾贅華如左漢柏樹蒼柏無城擁漢陵閟宮遺樹鬱峥嶸崔巍不植明堂礎造物潛通岳頂靈萬壑烟飛扶傑幹半天風雨撼秋聲白頭㑹見東封日照映鸞旂一色新過沙溝店髙栁長途送客吟暗驚時序啞鳴禽清風破暑連旬日好雨宜時抵萬金逺嶺抱村回野色行雲隨馬㺯輕隂摇鞭喜入淝城界桑柘隂濃麥浪深長秋官舍十載隨人戴豸冠望離清秩實多難一身許國無知己萬事關心空汗顔花樣況非時制巧功名宜為老天慳季鷹何待秋風起一夜歸心滿故山觀光三首十三年在都下作漢家宮闕碧岧嶤六合同来不待招非此詎能隆上國有臣何幸際昌朝光連帝極環𤣥象翠積中天仰鬱霄葵藿寸心深向戀日華明處五雲嬌大元天子壮陪京盡蔽燕雲作苑城彩鳳應門千仗肅蒼龍雙闕五雲明千秋日月低宸極萬國衣冠拜紞紘蟣蝨小臣何所祝年年嵩岳聽呼聲長樂宮成孽宋廷紫微垣外紫烟生明昌受欵真兒劇洛邑營周是小成正朔一家堯厯日青山三面漢金城君王神武髙千古緘口長沙建治平夀鹿菴大學士三首十一月初一日大節中流砥柱標髙風孤振張吾曹眼中元老恩方渥林下淵明氣正豪萬事縱心縁理勝三峰當面與秋髙玉堂更覺台星重蓮炬長看照夀毫陽春門裏開新第魚藻宮中侍講筵晚節不縁三徑屈髙風終愛五噫賢雅懐老去從多可萬事諳来愈自然千古六經常道在就中能契是知權風節生平以烈聞詞章獨與大蘇親天人重為斯文主甲子洪開夀域春行草縱心書愈聖歌詩吟老語彌真穆修亦是華巔客肯把韓編付授頻贈友人張彦魯并序友人彦魯别予四年今歲秋有秦中之行道出淇右時予亦北邁有期尊酒道舊為數日留既而分岐就駕次日彦魯復追及予於朝歌南遂偕與北上前次保塞逆旅追念徃事耿不能寐為賦是詩以贈且傷其㑹合之靡常歡樂之無幾也彦魯諱著世遼東人北邁南遊有定期半途回駕喜追隨心因年老便多可馬信車前亦緩馳緑綺素深平日雅碧雲償盡向来思一樽逆旅燈前話莫忘燕陲抵足時趙州石梁華表亭亭擁石麟車書萬里此通津天垂螮蝀卷千尺月吐蟾蜍隠半輪片石鞭来能濟險大臣當用合横身征鞍歸路明年事一片春風栁色新三臺懐古萬里三臺作厲階漳流東注若為哀才教逆叛羯奴去又得癲痴帝子来紫陌衣冠森鬼樸芳華林苑墮兵埃姦夷不獨西陵樹苟或穿窬止自裁夀姚雪齋散髻飄蕭玉局仙竹風松月共清圓雲閒正際商霖後學奥能窺太極前瀛館寵光開夀域太平勲業在經筵慇懃春雨堂前檜細結冰花㸃翠妍慶宋尹母八十夀樹萱堂背已憂忘金粉蓮苞貯靜香風景四時藏秀麗慈顔八秩見康强賦中潘岳閒居樂詩裏燕山桂子芳㑹看肩舁宮户底更勝陳氏配東牀贈鄉先生逍遥子姓韓氏曽為尚書都省鶴髪飄蕭玉練顔一壺天地市朝間集芳有驗扶羸劣野鳥知歸謝徃還幽睡不妨紅日晚青山誰似白雲閒㑹當華表歸来日重為留題方過關送裕卿都司南還前日翰林君送我今朝幽薊我辭君十年契闊凡三覿五月重遊此重分世事有機難預料後期無恙要相聞何時從北從東稼解綬歸来約共耘任懐逺慶九十詩卷朱顔青鬢萬金身九十康强是福人擺脱世紛隨所適棄抛家事見何親花香北渚盤杯具月滿南樓杖履頻更為武公歌夀德一溪淇水照秋筠挽楊春卿先生曽為衛輝路勸農官山澤臞仙老使君十年談笑接多聞襟期自是羲皇上肝膽初無楚越分冀北羣空逢伯樂斗南名重見田文一丘宿草情何極淒斷無終日暮雲寄夀博山趙總管予方從事東平日君適分符濮水濵歲厯喜聞開九秩客来争説好精神背鮐宛與龜紋秀面頰丹渝鶴頂新特似麒麟圖上見形容全不老於真夀平章張公時為樞副故作著之十年黄閣富經綸落落蒼髯社稷身公道救時仍此在龍門歸譽見来新菊香已辦南豐供緑蟻無煩靖節巾夀席今年得佳語太平勲業在麒麟送商台符赴行臺御史器識沉明義外方青衫難屈校書郎暫虚東閣郎君位要聳南臺豸角霜八道風稜馳使節兩淮殘困是維揚就中驄馬吾儕事匡正官邪最大綱病目書懐效樂天體病眼何時視物疑更禁風火内交馳越蛙悍目将誰怒鮫淚傾珠盡日垂氣鬱方函昏暈鏡瘡連剛斂痛磨錐悠悠伏枕三旬苦安得黄金刮目鎞送按察王煥卿之任建康三首滿移投上謝癡牀五郡河湟作省郎白筆冷摇𤓰歩月緑橙香泛洞庭霜虚懐正切平時慮逹變終垂後代芳我老壮心猶未已彈冠端有羨王陽十年臺省共翺翔機識沉雄義外方金節喜酬平昔志緑橙香動夜来霜老懐雅有思深慮世故何憂事過防眼看澄清開八道就中風動是丹陽五郡河湟已有聲繡衣直指又煩卿恩寛注意務新集附衆於今慮孽萌牛渚犀燃防過察呉江霜落要維清行司此去猶堪喜地爽山髙眼倍明送李敬之按察淮東遼陽三載淹㕔幕并府終年貳鐵官桃李門庭慚自致冰霜肝膽見来寒摧姦老手監司舊復業遺黎暮枕安想得桐淮東畔月清光先照使君鞍送馮夀卿簽事小邑鳴絃踰兩考外臺簽事是榮遷未妨躡足青雲上已著先聲白鴈前三世名家遺直在百城新附望恩偏銀鞭莫緩青驄去野鶩羣飛正刺天寄子初提刑自陜西改授行臺中丞治揚州監司西去無三月建節東遷路八千仕宦得君當重地澄清有路是瞻天霜封淮甸妖氛静春入瓊花老樹妍一䇿想能康濟了儘堪歸隠百門烟目疾自警效樂天體目手相須最切身連宵慘痛可傷神老縁貪得書為祟壮為傷多酒入脣四大假来皆是苦萬般急遣亦忘真悠悠未了三千牘束置從今不要親寄梁幹臣簽事滿移未貢别癡牀去作襄州省幕郎遷拜總縁才力致激揚猶稱老懐剛離情轉惡中年别衰鬢相望兩鏡霜每度思君傷馬甫漳州南望白雲長夀趙同簽九月廿五日丙年正月下江東榮拜人驚此日同破竹固成王濬手侍謀多見茂先工松形秀並眉毫健軍務能開世道公夀席今年更堪賀廟宮修治越裝空送劉侍御超騰高品數年間遊刃恢恢顧不難百越逺開炎漢域兩淮爭識恵文冠燃犀牛渚魚龍慘霜落呉江草樹寒成事自来輸有志不教勲業鏡中看雨聲敲破寒更韻未諧芭蕉未了更空堦隔簾響絶丁東珮入耳愁生索寞懐孤嶼有舟添夜話殘燈無焰耿幽齋凴君寫入瑶琴曲並與秋風洛水排夢焦簽事坐在一官署論余除授於某官前十月十一日夜神交初不間幽明夢裏相看儼若生顧接宛同蘭省日薦揚猶重故人情楓林魂黯人何在落月梁空思未平枕上兩行知已淚覺来揮却又縱横送寗端甫宣慰東平瀟洒風神見德隅走趨知不利長裾老諳所事無多味却覺閒官是美除恩詔纔離温室樹甘霖先沛泰山墟憲陵山色溪堂月剰有詩来富尺書送杜時舉歸平陽四載河東頗閲人愛君能靜復能貧一朝夜雨韋郎話滿眼晴雲玉壘春未分風塵淹駿足不妨麴蘖暫謀生因君西邁添余興兩夜青山入夢頻哭張總判行甫并序公諱傃北燕人姓張氏字行甫姿藴藉好賔客官至平陽府通判官詩所謂愷悌君子民之父母者也家藏書數千卷後以累落職年五十有七終于家晚作龍祠别墅溪風松月境趣瀟洒酒罏茶竈筆牀釣具有幽居草堂之樂至元壬申余官冀府暇日與俱徜徉其間者葢三年於兹醉山頭之落日起舞鳴歌弄茂隂之清泉沙鷗靜玩追思徃事傷何如之爰作悲歌以賡薤露其詞曰酒病人看指日瘳扣牀辭别竟彌留歸軒東下纔幾月哀訃聞来已兩秋石壁冷埋泉壤閟黄壚不隔暮山稠分明昨夜龍祠夢醉卧藤隂唱石州君善歌石州慢婆娑杖履桂叢幽常恐山中識故侯野約授書黄石在菊香浮瓮草堂秋一作滿瓮秋香陶令酒一川風月武陵舟宦情瀟洒陶彭澤老境浮沉馬少游何日下車傾腹痛春風吹淚拜荒丘秋澗集卷十七欽定四庫全書秋澗集卷十八元王惲撰七言律詩
