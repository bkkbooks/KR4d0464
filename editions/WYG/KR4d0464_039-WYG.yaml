front:
  text: 三十九
  hash: sha256:7b0b97a622fca679317b65abe6ca71ca68aac16e8f41f1618e2c522489bdf2e6
body:
  text: 元王惲撰記重建衛輝路總管府帥正堂記汲之為郡其來乆矣自唐初易而為州歴五季宋金率以防禦節度使來尹治之故其公廨制度廣狹規厥秩夷而不敢越逮國朝中統建元之明年陞州為府前政因仍不及改作加以歲月深土木弛狹隘頽敝朝夕視事有不堪其處者後二十五年嗣侯達實特穆爾暨總尹耶律漢傑判官常徳繼軫來任既而相與議曰維大府距河朔衝㑹部二州四縣一司治稱匪易堂則乃赫焉具瞻之地其承宣王澤聴斷民事齊肅禮容號令約束盡在于是今狹陋若爾殆非所以恪王事而儼官守也又以品秩等威視堂之隆殺固不可與嚮也相類於是張皇前規構而一新凢為楹三鉅筵東西六尋有竒南北邃三十有七尺髙爽靖深公居儼稱復作左右翼㕔各三楹及增榮儀閈俾與新廨映帶相奐仍扁其顔曰帥正復舊觀也凣三月告成詢其費曰安取輟公稍以給之越六月某日命饗于新堂㑹僚佐屬吏與郡之士夫肅四方之賔旅大合樂以落之望之儼然與飛雲傑構相雄誇矣故老歎息以謂百年來方覩官府若斯之盛吁治其可忽也哉而忽而治只在公正從違而已然則何為公事不私之謂也故公則生明何為正正已而正不正者也故正則可大天下之事未有不公而治民未有不正而格官孰有不順而穆者乎於斯之際當官者固未暇以清心省事為職而守正從心何嘗有時不可聞之哉大凢人之心公而有恒徳者苟事有可為必為不怠詎肯以歲月去留容心於其問哉今斯役之作惟其若然故能于供億鞅掌外又能于興滯補弊如此可謂賢也已既卒事來丐文于余以邦大夫之賢者方事之以相勉况鄉國盛事其敢以不敏辭于是乎大書于石庸告來者抑又知公等必葺之意云至元廿六年歲在已丑五月日記郭氏挹翠樓記共人郭子忠起書樓于所居之西市以地形爽塏髙甫尋丈而有縹渺飛動之勢既落成來丐名與記予以共為邑距太行東麓連山叠阜映帶回抱矯首而觀盡得西南林壑風烟之勝因扁其顔曰挹翠顧惟澹癖仁智之樂蚤歲有懷嘗從諸賢讀書山房洒洒然如有所得如龍門石門白鹿嵬百家巖等山皆左右絶觀雖嘗歴覽而屢至然蠟吾屐而踐其形固未嘗支手板而當其氣之爽也若夫積翠横空一碧萬仭空濛霏微騰滋泛潤眷我樓居壺開碧供而又秋雨霽殘陽暮夕氣轉佳千鬟溼霧主人于是詠飛鳥與還之詩誦烟光凝紫之句攬其秀則詩脾儘清挹其輝則芳罇溢渌至于野風吹來江月引去曽黎明而已集喜虚懐之延佇吾想夫共之全盛時愛山而起構者若湧金之麗譙公廨之危榭太師張公之溪亭丞相蔡侯之别墅其餘臺亭觀閣層軒曲楹前後非一雖昔人已非而山川良是嚮之挼藍潑黛争妍競秀為名家之竒貨供騷客之珍玩者一旦悉為郭氏奄去不知一樓之勞之費其將㡬何乃為造物所偏而獨饗者乃爾其富冝乎釋然而樂興有餘而樂無窮也因念萬物盈于兩間洪纎高下固云不齊要其氣體物與吾一也彼山之丕凝篤實發光輝若然猶家之絫積善行致慶流餘裕今郭氏在承平時為衛之大家世以藥石為業迺若爾考爾叔秉彛藴秀稱鄉里善人其翼其肯者斯美具在子今不失舊物能擴而充之齊其本而大其末與霏霏微微者日新干華構之下俾後之來者挹而注之以膏其末光霑而漬之以衍其餘慶安知方寸之木不高于岑樓也耶至元廿四年歲次丁亥上元日記秋澗記山之有澗壑猶人之有量數也苟夷隘以狹人將無以自處况能物之容乎太行諸山去郡西五十里而近予昔逺遊西自百家巖東盡靈山北崦並山之麓深溪鉅澗縱横交絡折而東騖秋水而時至萬壑潨澮允猶翕合咸就約東滔滔汨汨迤􅆔而去或清或濁無逺無邇不擇細大順受而倂客者此澗之量也至于流潤決壅激而為飛湍旋而為盤渦匯而為淵渾束而為細流巖屋以伏其怒巨石以殺其勢就泛長傾順流逺引溉平田而有秋浮大木而出谷不致肆濫横潰使一漫流害至大川而後已者此澗之功也及其忽焉收潦千里一空曽少遺用以自潤縈紆盤折沉深而濶逺漲痕在而流沬空沙尾平而崖涘峻紛兮交貫曠兮長虚水之去來雖有緩急澗之吞吐初自若也又類夫含章可貞或從王事無成有終者是又澗之不有其量之與功也嗚呼澗乎其見用于秋之時乎余嚮在京師客有善推策者嘗有所請渠曰子非王秋澗乎予日然客曰既云秋澗致用有在第未之至耳然觀子之流行異時當有東南逺役大富厥覧不特泛長江而觀七澤也願子思存乎見少不自以為多可也是則澗之量数不其容乃大歟余唯而退至元廿六年已丑歲秋八月望日記堆金塚記國朝癸酉歲天兵北動奄奠中夏明年分道而南連亘河朔衛乃被圍粤三日城破以州旅拒不即下悉驅民出泊近甸無噍類殄殱初星妖下流淇上羣兒氣吐成謡閧歌里陌間曰團練冬半破年寒食節絶人烟之讖尋罹厄實貞祐二年春正月十有二日也時太一度師蕭公當危急際以智逸去是年冬十一月師自河南來歸睨其城郭為墟恭骨如莽師惻然哀之遂括衣盂所有募人力斂遺骸至斷溝眢井攓蓬披塞掇拾罔漏乃卜州西北二里許故陳城内地鑿三坎瘞而丘之仍設醮祭以妥厥靈游魂褫魄薤露焄蒿同歸一竈其深林暮夜之號陰壁枯血之火熒沈啾寂無復光怪盖因㝠薦而脫異滯之幽依道廕而復坤靈之厚幽明雖殊存殁雨有慰焉而師之掩覆仁心於鄉梓之義極矣今其封俗呼為堆金塚言人骨乆而化金石也每歲清明後一日邦人聚奠以信些招本宫為尸而祝之六代師全祐懇予文紀其事以鳴先徳嗚呼三代而下以智力相角其勢不干戈血肉而莫之已何天地生物之仁返如是其盩哉豈周天之運厄㑹有時中來而不可逭耶豈立極之道仁義迹熄自取陵遲而然耶豈蒼茫兩間初無關係物盛而衰自然而然耶皆不可得而必也第嘉師生平以道濟衆力苟可及不忍以一物失所類如此初師既葬主柘之延祥觀壬辰冬大兵至城下師懲前日河朔兵􅇯之慘復以一言活萬家于鋒鏑之下古稱澤及枯朽矧生人乎師之謂也向使師遭時得位其仁民愛物之功豈如是而已耶因併及之師諱道輔字公弼甫冠嗣主宗教後加謚號中和仁靖真人云至元十九年龍集壬午窮臘日謹記霍岳肇祀記至元九年冬朝廷以郡邑鎮山大浸載諸典秩者所司三載一祀霍岳在河東實為靈鎮故事每歲以仲夏土極之日用信報禮昭䖍度也明年癸酉夏六月廿六日惲行縣北走霍邑前抵洪洞雨不克邁越翼日抵趙城適嚴祀省牲之夕乃率霍州判官連漢臣監縣事塔的尹裴團用主縣簿劉倖齊宿祠下將事之夜風雨交作既祠之朝隂霾四開三獻禮成陰風肅然神峰鷲嶺軒豁呈露雖韓潮陽之禮衡岳孔廣州之祀南海不足以喻其快也陪祀者府兵曹解禎縣佐史高政稅監張承慶邑人薛昌齡嶽廟道士李志貞興唐寺僧普光執事者吏王庭玉等二十五人遂相與饜飫神貺而退承直郎平陽路總管府判官前監察御史汲郡王惲題記從行者閭山張思誠子公聘表忠觀碑始末記至元庚寅冬予自福唐得告北歸前次臨安客有以表忠觀碑為言者字作擘窠大書殊偉麗也詢之馬御史徳昌如所聞云觀在龍井不十里逺能一到其下豁先覩為快何如予以長淮廹凍為謝適鮮于生在坐屬伯機他日打一本惠及足矣日諾既而杳然明年辛夘秋吾友傅君士開赴官兩浙仍託以取逮壬辰夏六月傅自杭特令人付來其碑作四巨軸裝潢如法盖亡宋故家物也噫坡書在霄壌間忠義之氣鬱鬱然秋色争髙雖片言隻字不可遺逸宜其世寳而力致之也故心存夢想求以三歲之乆跨越江湖至自二千里之逺一旦高堂素壁如天球河圖𢎞璧琬琰對越左右誠可貴也左山云古人不可復作所得見者筆蹟而已况公斯文闗係世教令人讀之有忠孝之勸烏可祗以翰墨為之論乎然一一較之盖即印泥折􅁫股之法也是月廿八日書于春露堂之扶疎軒睢州儀封縣創建廟學記道之大原出于天以之修齊治乎格非心而叙彛倫者孔孟之教之功也其為天下通祀冝矣况存神過化之地乎儀封縣金正大問割考東明襄三邑地立治干黄陵之通安堡以古儀城在焉故名攷之儀即春秋衛之邊邑其為孔輅頓次封人請見之處諒無疑矣兵後縣廢歲壬子國家經略河南移理于通安南平城里桑土衍沃民俗便安然官府初創禮文之事有未遑暇者吾夫子歲時假公舍而釋菜馬其邑長盛君即議起廟堂于艮方後為風雨攸壊癸酉秋裴滿君自陳留令來尹斯邑既告謁顧清廟如是惴惴不少安乃與監縣昻阿喇等謀曰承流宣化事神善俗皆我之責吾夫子政之本教之宗也嚮以濟時行道轍環中國以木鐸而徇衛者屢矣千古而下時移事在雖眇邈聆遺音而二仲行奠車聲轔轔肅焉來格不侈大宫庭將何以發越奎光致邑人觀感之深者焉遂與繼任和爾齊暨僚屬各捐俸易爽塏地于東南陬士庻聞風亦翕然響應于是定方中繚崇垣起禮殿敞神闕下至講堂齋舍庖湢之所莫不完美元聖素臣黼坐有儼宏麗靖深蔚為東南宫廟之冠教諭張庭珪等實董其役君既代之明年尹程亮簿劉楫嘉其謀作之勤烏可使無聞于後乃令學直李攀鱗持状來丐文以紀其本末小子惲向提憲閩海道出兹邑親覩斯美周行慨嘆何有志成事也如是是可書也因重為告之曰風化者致治之原人材者為政之具人材盛衰民俗淳漓一係夫學校之興替故前人以庠序為國之元氣誠知言哉我國家以神武戡定區宇至戊戌間生聚甫集首闡猷設科擢賢儁復户役其所以開太平之基者固權輿于兹矣逮聖天子嗣復張皇潤色越先朝有光如釋奠具儀禁䕶著令内而開國學教胄子庻㡬成均遺法外而勉郡縣鄉社置師儒以揉鄙朴擢用講明條格甚悉於明徳新民之具崇尚循誘之方可謂備矣而任師帥者承宣賛理以副上之所尚宜何如哉裴筮仕初以通國字充胄子教授冝其下車首議教基敦風俗為本可謂知所務矣君諱翼世為遼右顯族資明達以廟學一節觀之知其為能官者某年月日謹記義勇武安王祠記汲縣縣治即故尉司公廨内舊有武安王祠莫究其所始而可見者金泰和初信武將軍完顔師古重加修飭昭黙禱而答靈貺也兵後廢撤不存有元中統癸亥簿聶元擒詰強禦未即厥事假靈于神已而如所願遂即治左復廟而貎之癸未之水又從而圮焉至元丙戌真定録判劉聚來主縣簿以游擊有功田里頗安不敢居其能越神明是歸遂以起廢為已任星甫周神栖像設一切修而廣之妥靈揭䖍中外交肅既落成來懇文以紀本末仍表夫神之所以昭昭者予乃為之說曰忠義者天下之大閑良心者衆人之素有惟夫超倫逸羣之士得時行道毅然不㧞乃能見二者之用而使後世畏仰愈乆而愈不忘者豈非公與公遭漢室傾頺羣雄血閧𤣥黄之際識昭烈而翊戴之紹延漢基而明君臣一定之分報效曹公不為利怵以決去就當然之機至氣淩三軍威振中夏而擅國士之風者此無他不過擴秉彛之良心信濟時之大義耳公既沒其隂相餘烈加於生者殊多豈豪傑英偉之氣無時而息加以人心素有聚精於此黙相動盪有不期然而然者邪是則公為不沒矣嗚呼其可不敬也夫故百世而下宫居血食衮冕而王宜矣及夫世教下衰禍福儆動之說興淫祀妄禱唯知曰我祭則受福此豈理也哉孰謂神顧而饗之耶今汝等既新斯宇當念夫人之所以致斯者義而已吾之所以感神者能極夫義之所至則幽明兩間豈惟感格之理名實俱得將見簡簡穣穣之福降而孔那矣俾刻諸麗石以告來哲至元廿八年五月重午日謹記勉齋記人有不若之恥天下事未有行而弗至者况彛秉昭融從容于循勉者乎郎中杜君季明聞僕名而喜之書所著勉齊等篇贈予疾讀數過其修辭行已一以經㫖為據有味哉斯言也誠信道篤持志堅進進而不畫者也予乃為之說曰夫聖人之道體微而用費辭要而理奥雖聖賢有所弗知故學之者弗措也充而至于極愚必明柔必強書之懋哉詩之匪懈皆是也子思子因道述教發越微奥曰勉强而行之信聖賢善誘致用自得之艮規也然乏粹美之姿者不可得而勉無資深之志者勉焉而未易得二者皆具無致用之位徒勉一切俾兼善之功不及于物斯亦君子之所恥也故傳曰幼而學壯而欲行之由是而觀士志于學不止徒善乃為循勉之極今君彛秉超卓言慎行敏挺身頺波砥柱屹立遊公卿之門當形勢之途毅然以道義自任不為外物所移日廣忠益思成具瞻之美推轂多士以伸兼善之心正以負彊矯之姿明當勉之理自誠而明由已以達物其大者逺者還有功而立致效也為不難將見一拳之石聳泰岱於目前一勺之水沛霖雨于天下是則嚮之思而得勉而中從容中道聖賢與同歸矣僕壮年竊有志於世已嘗少用於試間或勉中思得念天下之事莫此樂也今行就衰謝及聞伯夷之風振衰激懦耿耿有不去其懐者因為長歌揄揚吾子之勇且寓夫余之感焉歌曰安肆日偷衆情之常乎黽勉日強君子之志乎施之有用斯又古人之難乎矯矯杜君知恥近勇之倫乎見諸行事而復徳日新乎牙磋玉琢殆起余者商乎行雖衰矣衷或誘其愚乎雖佩玉長裾尚足以利乎走趨也於是乎書終南山集仙觀記予自壮歲宦游四方經渉河山大地昔賢遺蹟未嘗不彷徉臨望富覽勝槩而去尚自視欿然者獨欠秦中一游每聞談闗輔形勢漢唐間風聲氣習翹翹褰裳夢寐長往今年夏四月有虚齋道人楊姓者踵門來謁拈香具禮罄折而前曰側聆先生名徳乆矣自惟何幸于焉得遇繼出一圖示余指似云終南縣重陽祖庭西南甘源水左由石碧入峪道即陡陰磴山行二十里而逺抵望仙坪得唐以來集仙庵故址山中人傳云昔有古僊人吕翁者嘗學道於此近代有長生師劉公愛其崦曲幽勝清泉灌木隂湛連壑迺結茅雲隠畧有興築兵餘雲荒石老無復人跡林光空翠景氣長清當時貧道從三洞𢎞𤣥師真侍香重陽丈室既而以法籙事辭師入山結習修静遂步上甘谷東峰不覺適喜曰此吾巢松稅駕之地也乃與方外二三友道宣聪真輩定居而建其所當奉壇場神室等祠歲時清供鐘磬之音隠然山谷問如回嶺丹棲諸峰漢洞神湫之境雲烟動色亦欣吾來盟洞明真人祁公聞之嘉其志堅可與有立給觀名曰集仙至元癸未皇姪永昌王易其額有玉清昭應之號經營未已洞口有光人跡踵至復避喧趣静斂裳宵逝東入商嶺廬天柱峯及漫川之青崕往來逋止將終身焉居無㡬何悮為尺一唤去待詔闕下付以禱爾上下之事自是齋居致敬焉感召幽貺呵禁不祥扈從法駕往還兩間者凢二年于兹癸已春蒙恩復以傳送還本山將行切自揆遭過明時莫大之幸越𤣥門儘光重念山齋寂寥歸無片辭以勒巖石使後之尋盟曷以見住山歲月開先樓觀而雲龕石室亦曽覩鶴書赴壠鳴騶入谷之賁哉敢再拜以記文為請且償先生平時所願言余嘗謂道家者流以淡泊虚無為宗以忘言絶俗為事或者須人為徒心存濟度如三洞五雷盟威正一等法行符勅水驅逐疾疫鞭笞鬼物使邪氣罔奸兩間其于補助世教有不得後焉者方之與世相遺歸潔一身槁死山林長往而不來者為有間矣故樂為書之楊法諱道謙蜀之銅梁人號保光子上世有以進士為已西令者某年月日記彭澤縣創修二賢堂記自昔宰彭澤者其麗不鮮獨二賢者至今屋而祀之在縣西市里者靖節陶公也其在東門内者唐相梁公也歲貌殘圮揭䖍斯在盖其高風義烈上薄雲日千載而下大有闗于世教者然也總尹周侯諒其如是越到官之明年既治廟學遂遷二賢祠于神閉之右作新宇以合饗之仍榜之日二賢堂至元甲午春侯㑹予於京師迺以祠事相告且曰二公皆宰兹邑行已去就有畧不同者先生試為錯言之余曰淵明以長沙世胄起而絃歌知其不可而去及宋業漸隆不復仕進義熙而後止書甲子明見恥臣于宋豈惟隠居求志抑且勵薄俗而明大義也故綱目以晉徵士卒書之梁公有唐忠臣被讒逺謫志在復辟此隠忍就功可乆可速藏器侯時之意逺若二公者考其跡則異揆其心則同孟軻氏謂禹稷顔回同道易地則皆然者是也一堂並祀何嫌何疑周侯曰嘻有是哉不肖初心固不外此特取正扵公耳今將謁諸公賦詩合異同而萃全美幸内翰以首倡題諸篇端㑹歸付之邦人俾刻石祠下以告二公雖云義起烏可闕其說焉于是乎書是歲三月望日記克已齋記御史中丞崔公作新齋于私第中門之内為朝夕見賔客廣忠益之所扁其顔日克已中外士夫聞而疑焉盖以公忠亮簡在帝心四方想見其風采勲名事業無愧于昔賢方且孜孜焉汲汲焉致力于方學者所務僕為之說日天之降大任于斯人也俾經綸一世之事其時政之得失思有以論列之生民之利病思有以興除之人材沉滯頼之而薦舉奸邪横恣仰之而糾繩况辯公私於時事不同之後論紀綱於功利競進之餘是恒處於憂患之役而踐乎艱險之塗矣職臺憲者可謂責之重而任之不易矣自非材徳備具卓爾千人之英志氣剛明信乎萬物之表偏蔽躁妄力制嗜欲之私視聴云為粹發性情之正厲忠直而靡他無瑕疵之可擿既正身而格物先律已而治人者詎能厭公論而服衆心振清風于臺閣者哉而公端本澄源之志實有在于此冝其于聖賢傳授心法切要之理黙識心通景仰取法有不能自已者惟公歴事兩朝乆執臺憲忠君愛物之念若飢渴之於飲食當其論列主宰之際犯顔匪躬挺然以直道偉論獨步一時曽無顧忌退縮之私固已循天理之至公思復本心之全徳矣雖然顔子入室大賢得聖人為之依歸夙承善誘鎻仰篤信猶不免違仁于三月之後矧餘人哉盖天理人欲只在于公私一念之頃惟致知是期物格知至者動静以察其變朝昏以精其思乆蹈彛則靡息厥修者方造聖賢閫域故衛武公年登九秩作抑詩以自警司馬文正存守一誠終身不易今公既循聖賢治心行已之要道復如二公貞固自持服膺勿失日就月將豈惟緝熙于光明將見與昔同歸而賢不殊矣公以齋記見屬僕年衰老懶于筆研直書臆見姑塞雅命云秋澗集卷三十九欽定四庫全書秋澗集卷四十元王惲撰記傳國
