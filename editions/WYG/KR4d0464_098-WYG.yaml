body:
  text: 陳氏曰人子之於親飲食與藥必先嘗而後進四時新物必先獻而後食寢廟之薦新亦推其先獻之禮以盡誠敬而已宋秦益公檜家廟制紹興中命立家廟於私第中門之左一堂五室世祖居東東二昭西二穆堂飾以黝堊神板長一尺博四寸五分厚一寸八分大書某官某夫人神座貯以帛囊藏以漆函用神厨嵗四享用孟月柔日具三獻有司言時享用常器常饌上倣政和故事命制祭器賜之舞雩臺雩祭盖龍見建已之月已乃陽亢之時隂氣難達用女巫舞雩女隂也舞所以達陽中之隂也又吁嗟而禱雨曰雩社稷位社五土之神稷五榖之長首種先成故長蔡邕曰其位在中門之右社主隂其壝故北向天子曰大社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫為民族居百家以上共立一社曰里社各以所宜木立而表之大社廣五丈諸侯半之盖方廣二丈五也皆冒以黄土其主以石謂石土類也其位社東而稷西王之祭也南面其服也絺冕其牲黝其祭血取其隂類其罇大罍其樂應鐘其舞帗舞其鼓靈鼓凡皆因其物以致其義庶人蒙其社功故亦祭之春有祈而秋有報也稷非土無以生土非稷無以見生生之效以其同功均利養人故也地載萬物天垂其象取財於地取法於天是以尊天而親地故敎報焉家主中霤田主社示本也陳氏禮書諸侯城郭之制典命云上公九命子男五命其國家宫室車旂衣服禮儀皆以命數為節國家國之所居為城方也公之城方九里宫方九百步侯伯之城方七里宫方七百步子男之城方三里宫方三百步五土所宜鴻烈子曰土地各以類生故山氣多男澤氣多女障氣多喑風氣多聾林氣多癃木氣多傴岸下氣多腫石氣多力險阻氣多癭暑氣多夭寒氣多夀谷氣多痺丘氣多狂衍氣多貪輕土多利重土多遲清水音小濁水音大湍水人輕遲水人重堅土人剛弱土人肥壚土人大沙土人細息土人美耗土人醜七水所宜汾水濛濁而宜麻濟水通和而宜麥河水中濁而宜菽濰水輕利而宜禾渭水多力而宜黍漢水重安而宜竹江水肥仁而宜稻平土之人慧而宜五榖爾雅曰大平之人仁丹穴之人智大蒙之人信空桐之人武釋菜鄭司農云古者士相見於君以雉為贄見於師以菜為贄釋即舍也始入學必舍菜禮先師也菜蘋藻之屬盖以泮宫有芹藻猶子事父母有堇荁也姓族氏説詩曰振振公姓振振公族書曰錫土姓左氏衆仲曰天子建徳因生以賜姓胙之土而命之氏諸侯以字為氏因以為族官有世功則有官族邑亦如之周語曰伯禹疏川通滯鍾水豐物皇天嘉之祚以天下賜姓曰姒氏曰有夏堯賜禹姓曰姒封之有夏謂其能以嘉利富生物也祚四岳國命為侯伯賜姓曰姜氏曰有吕謂其能為禹股肱心膂以養物豐人也姓非天子不可以賜而氏非諸侯不可以命姓所以繫百姓之正統氏所以别子孫之旁出族則氏之所聚而已古者或氏於國則齊魯秦吳是也氏於諡則文武成宣是也氏於官則司馬司徒是也氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東門北郭氏於志則三鳥五鹿氏於事則巫土匠陶是也盖别姓則為氏即氏則有族族無不同氏氏有不同族故八元八凱出於髙陽氏髙辛氏而謂之十六族是氏有不同族也商氏條氏徐氏之類謂之六族陶氏施氏之類謂之七族宋氏華氏謂之戴族向氏謂之桓族是族無不同氏也贄禮帛有衣被之仁皮有炳蔚之文故孤執之羔有跪乳之禮有羣而不黨之義故卿執之進必以時行必以序雁也故大夫執之交有時别有倫被文以相質死分而不變者雉也故士執之可蓄而不散遷者鶩也故庶人執之可蓄而不違時者雞也故工商執之食邑説秦爵二十級惟徹侯乃得食縣其闗内侯本無食邑其加異者列之闗内之邑食其租税漢初士大夫以上皆令食邑食者除租每户一嵗更輸錢二百貨殖傳所謂千户之君則二十萬是也漢因鄉評取士謂因人共推之也如公孫𢎞以文學萬石君以孝謹聞漢初入仕者不限年如劉向陳咸以八十為郎劉辟疆以八十為衛尉公孫𢎞以八十為相趙充國以七十為将軍貢禹八十遷御史大夫漢集議漢置大夫専掌議論事茍疑似未決合中朝之士雜議之自兩府大臣以下至博士議郎皆得議之不嫌於卑抗尊也如呼韓邪單于欵塞卒用郎中侯應之䇿朱博得罪議獄者五十八人王嘉得罪議者六十人故曰漢集議有公天下之心漢封侯號有宰相封侯者公孫平津是也有婦人封侯者蕭何夫人同封鄼侯樊噲妻吕嬃封臨光侯是也以地名封者平陵宜春是也以功封者冠軍驃侯是也以美名封者博望博陸是也太行山水皆洑流地中闗中諸水皆行流地上金銀魚袋唐髙宗給五品以上隨身銀魚袋以防詔命之詐出内必合之三品以上金飾袋垂拱中都督刺史始賜魚中宗景龍中令特進佩魚散官佩魚自此始宋張師正倦遊録云魚袋者取事君夙夜匪懈之義以金為飾亦身之華也上公桓圭侯信圭伯躬圭鎮圭冒圭公謂二王之後及王之上公雙植謂之桓桓宫室之象所以安其上也信當為身與躬圭盖皆象以人形為瑑但文有麄縟耳欲其慎行以保身也鎮圭尺二寸天子守之鄭氏曰鎮安也所以安四方以四方鎮山為飾崇髙敦厚而萬物附焉者山也冒圭孔氏曰冒以齊瑞信方四寸邪刻之然冒之以知諸侯之信偽猶今之合符也子榖璧男蒲璧榖所以養人蒲為席以安人璧皆徑五寸子男不執圭者未成國也盖桓强立不撓而安上為任故公圭瑑之身伸而躬屈伸者尊足以侯外而蔽内屈者卑足以長人故侯伯之圭瑑之子不足以長人而可以養人故璧瑑以榖男不足以養人而可以安人故璧瑑以蒲圭者天之用璧者天之體盡其用者必盡其體得其體未必盡其用此圭璧所以不同也王后駔琮駔音組作方玉五寸上有鼻以組繫之因名駔盖古者建國王立朝后立市用以為權也牙璋中璋典瑞曰牙璋起兵旅治兵守鄭司農曰牙璋瑑以為牙牙齒兵象故以牙璋發兵又牙璋中璋皆有組牙之飾賈公彦云軍多用牙璋軍少用中璋白虎通曰璋位南方南方陽極而隂生兵亦隂也故以兵起為義如漢有銅虎符魏有兵符以發郡國兵豈牙中之類歟白琥刻虎為形者以形成於秋也琥禮西方之玉也以鹽為虎形者亦示武之謂也瑗説文瑗大孔璧也人君上除陛以相引環玦荀子曰絶人以玦反絶以環范甯釋榖梁曰君賜之環則還賜之玦則往盖環之為物或施於佩或施之於反絶佩環則不佩玦六幣相合行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼何也昔太王事狄人以皮幣繼之以犬馬終之以珠玉是珠玉重於犬馬犬馬重於皮幣則合珪以馬合璋以皮宜矣繡黼皆隂功也繡則五色之全黼則黑白而已是繡備於黼也則合琥以繡合璜以黼宜矣婚禮納徴以束帛享禮贈送者以束錦聘禮享君夫人以束帛私覿以束錦上大夫與下大夫致賔介饔餼皆以東帛賔介儐之以束錦食禮君侑幣小東帛大夫相食以束錦是帛宜於錦也合璧以帛合琮以錦宜矣圭東方也馬動物也璋南方也皮文物故以文琥西方也萬寳之成莫備於此故以繡璜北方也隂陽之辨莫㫁於此故以黼此六幣所以合之之意也皮馬不上堂故圭璋特達於上然則璧琮琥璜皆非特達者歟伏日厯忌釋曰伏者何也金氣伏藏之日也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏於火故至庚日必伏庚者金故也臘日風俗通曰禮傳夏曰嘉平殷曰清祀周曰大蜡漢改曰臘臈者獵也因獵取獸祭先祖也漢火行衰於戌故曰臘也漢舊儀曰臘者報諸神鬼古聖賢有功於民者禮記伊耆氏始為蜡蜡者索也嵗十二月合聚萬物而索享之也周禮祭蜡則龡豳頌撃土鼓以息老物節有八節玉節玉節之制以玉為之以命數為大小守邦國者用之角節用犀角角在鼻上是角中之貴守都鄙者用之虎節山多虎者用之謂晉國之類以金為節鑄象焉必自以其國所多者於以相别為信人節平地多人者用之謂衛國之類龍節澤多龍者用之謂鄭國之類皆以金為之以英簜輔之英簜畫函也以竹為之而有飾焉盛節器也輔之節者使不損也旌節道路用之道路謂鄉遂大夫也符節都鄙用之都鄙謂公之子弟及卿大夫采地之吏也管節以竹為之析竹節為符節全竹為管節如今之竹使符也其有商者通之以符節門關者與市聨事節可同也康誥曰越小臣諸節春秋宋司馬握節以死司城效節於府人而去司馬牛致其邑與珪而適齊珪守邑土信符則守節不特於邦國都鄙雖官府小臣亦有之矣漢竹使符銅虎符各分其半右留京師左付郡守傳司闗凡所達貨賄者則以節傳出之如今移所過文書凡通達於天下者必有節以傳輔之漢制門關用傳作兩行書繒帛上各持其一出入合之豈古之遺制歟秋澗集卷九十八欽定四庫全書秋澗
