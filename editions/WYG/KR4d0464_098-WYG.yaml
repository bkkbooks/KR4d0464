seq: 98
front:
  text: 又祭統曰昭穆者所以别父子逺近長幼親疏之序而無亂也藏主開元禮義鑑曰藏主合在處何所按五經異議云藏主於廟西壁中備水火之災必在西者長老之處地道尊右鬼神幽隂也祭薦檀弓有薦新如朔奠謂重新物為之設奠王制大夫士宗廟之祭有田則祭無田則薦祭二以首月薦二以仲月士用特豚大夫用羔庶人春薦韮夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以雁髙堂隆曰天子諸侯月有祭祀其孟月四時之祭也大夫以上将之以羔或以犬而已士以豚庶人則唯其時宜魚雁可也又薦新雖在廟皆不出神主五禮精義曰但設神座
  hash: sha256:608305a58737471d78de3d390cdf9eb1d728c028dbd174eace186a436e508f5a
