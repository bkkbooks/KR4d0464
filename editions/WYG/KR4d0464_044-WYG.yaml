body:
  text: 辨說日用講究義理其用有三體認明白臨事能施為出一也道義傳受必託於言辭筆頭發明出來二也其或諸生請益發藥啟廸化若時雨三也至若都曽經歴只為目前不曽專心理㑹又不能記誦乍了若無使此心茫然如道傍空舍諸物得去來住持不敢認為已有又學既不固及人說著方才省記終了自無所得前賢力學須先除去此病攻苦食淡不為一毫外物移動屏墮氣収放心一主於敬不雜觀不過分此或未畢輒復他務纔作復輟今日已過而有明日管得無時定志帥氣如下硬寨確乎有不可㧞之勢一物一事不輕放過窮理盡性至於命而後己性與命只是一個理而已若有所得即極力存養晝見之於行事夜驗之於夢寐使真積之功日新一日不使頃刻間斷不恤乎時之利不利不問乎人之知不知将所樂自喜專以推崇天爵為至古之學者無不盡其極者恐不外是不然困而不學生而為斯民之下不知所以學老而為乾没之人良可哀也此皆予之錮疾遂書以自訂非敢示之他人書太極圖後嘗觀宋一代道統傳授獨推濓溪元公為首及究其功用有渙然氷釋者蓋先生始明太極隂陽五行性命之說以開萬世沉迷之惑明一出於中天故也夫太極者何曰有物混成先天地生以一而含三者也老氏所謂一生二二生三三生萬物者是已為太極判而有天地乾坤既位然後萬物育焉故理可見而道由是而生道者循其理之路也其性之與命尤坦然明白性者理之所從出理也者只是純一四端而已固無有不善命者氣之所從來氣也者變化錯糅有清濁厚薄參差不齊之間曰賢愚曰壽夭曰貴賤曰冨貴一隨所遇而禀之者更無旁入曲生之理濓溪先生以前只為先儒不曽尋出氣質性來雖有混然上中下三品之說終是不可窒礙學者又不致思或求而不可得者往往溺於邪說未免隨人作記以至迷惑空而不返可哀也哉若先生之圖之說其有功於聖門惠夫後之學者可謂大且深矣其使輪廻宿習荒誕不可致詰之說一掃而無餘此所以尊居圖首為道統之宗也若以作一個分隂分陽之圖說了是齊其末而不揣其本也體認自古至今止是這些人情止是這些事理聖人裁量備盡六經罔有不具後之學者學此也既能通曉窮理正心行已臨事之際觸類相應以較其己之相合與否若事務之來既不體認前言往行以酬酢而應變此與不曽學者何異是最吾儕大病既不能踐跡将何以造其室乎亟當思體認之方從何而入可也戊子夏四月十一日晨起偶書小子其志之氣志人志不定只是氣為之亂氣既亂却為動静無常於中互相奪爾若安命順處不以我之所當得而易其彼之所不當有者人無日而不自得也如是則何患志之不安理之不明氣之不充者哉或曰所當得者何即天之所命於我者是也不當得者即天之未嘗付與我者此君子之所以亟當知也或曰知命不然則謂之不受命不受命是謂之逆天故孔子責子貢而貨殖焉者是也天人爵天爵志清明而壽人爵氣濁亂而夭或天或人能壽而不亂者惟有素所養者能之曰養者何至公無私而己孤立人生天地間立甚孤特頼有四端在我然後廼有所倚如伊尹之恬於放甲西伯之安於羑里周公之坦於東征孔子之泰於厄陳武侯之必於復漢蓋倚是理為用而後大有所立者焉故傳曰君子獨立而不懼其是之謂乎不然一身心之㣲其何以禦不測無窮之變乎戊子夏五月甲午積雨開霽晨起書於露堂西序孟荘不相及予嘗疑孟與荘皆同時間人終無一言一事相及者恐是䝉荘閉户著書罕與世接迨身後其書方出適讀陳氏輯語陳名應童字景雲三山人大意畧同說當時無人宗他只是於無處自説然亦止是楊朱之學但楊氏説得大了故孟子極力排之戊子重九前一日書自得誌者發其心於内故納諸壙中以告化者碑者表其徳於外故植之神道以鍳來者又曰誌者記其心之迹也碑者揭其事之著也朋友朋友列於五典其所以為重者志同而義在也故粲然有文以相接驩然有恩以相愛不然其與走者類聚而同遊飛者羣分而共集蓋幾希矣詩人以伐木廢特表夫友道之缺深有㫖哉五常五常之道仁為體而四者為用義與智陽中而含隂禮與信即隂之一定者也曰陽中而隂蓋運動離合有吉有凶者焉故也隂陽之道易曰一隂一陽之謂道九峯曰隂陽以氣言道者隂陽之理予曰理者氣之所以明所以幽所以生所以殺所以舒所以慘所以為君子所以為小人世之所以治世之所以亂戊子冬十一月十八日戍鼓作燈下偶書讀孟子或問四書或問獨鄒書多設疑詰難何也孟軻氏終是去聖人一問辨論之際其言英氣發露不無激切輕重之異故文公於此頗詳講明折𠂻要使不詭於理先後一揆而後己何則溫公大賢也猶有疑孟等篇况觧之云乎此晦翁惓惓於是亦臨川翼之之意也入伏後三日課讀此書偶問偶書晚學小子題恩多怨深此余平日事也或者曰君上命人生物者土也物既長不得不克制其土自然理也此隂陽家論似亦有理然不若以人事評之謂如我以禮待人人不見答未免有所不平不平之彼則乃有怒意我當夷其不平以恕心待之寧人負我雜記聖人之道如長江大河人人得以飲之然飲之者有多有寡為江河者不能使之一一均同其量任其自然而已不然恐造物者亦太勞矣余謂師授學者以道亦當如是既以自警且示韓陳二生八月二日偶書分絶伊川先生云嘗思天下君臣父子兄弟夫婦有多少不盡分處况今所親戚故舊昆弟朋友夫四者天理當然之分廢将無遺可哀也哉祗是計較於我善惡有無相益為事與之離合耳静言思之物則既蔽近於飛走人既與非類相雜處幾何不傷於夷也可不慎言謹行凡事㸃檢以先周身之防而存逺大之謀哉至元戊子歲臘日書無音萬物受氣於天音者情之所由發也以政有得失而音有乖和雖極亂極困未有情不宣而音不作者如幽厲之世正音遏宻變則不能無也至於當有絶無豈困而不暇作伏而不敢出其或善不足以法惡不足以戒亦若天變之無所見乎三者必有一居於此矣於是感而書之得失人之得失一係乎命之通塞若既得則不當過恩於其所舉揣其已才如何耳失則又不當致怨於其所沮亦當量己命之如何耳若恩有歸是人憐其不才而私之也怨是沮是我妄為言而不安其命分也何益哉己丑歲夏六月客退偶書以自儆黄鳥三良説觀坡和同三良詩反覆詠味似責三良之不當死也當時從死穆公者百七十七人蓋康公從先君亂命廹而納之也三良之不死得乎若專責康公可也分謗三良豈忠恕之道哉只以坡之議論英偉辭氣縱横讀之者愛無如此故不覺白璧之有㣲瑕也若晦翁之詩説可謂盡之矣文辭先後文之作其來不一有意先而就辭者有辭先而就意者意先而就辭者易辭先而就意者難意先辭後辭順而理足辭先意後語離而理乖此必然理也學者最當知之讀淮南子淮南鴻寳書出大山等徒所述在藝文言掇百家之緒餘耳特變其文而為小大異同之論然自得者鮮矣讀之者不無所益至於隂陽造化之機治道興衰之理正有吾六經與信史具在又親以其身為不善者雖著書立言君子有所不道予所以讀之者取其事有可訓及漢文近古三代之氣有凝而未散者至元丙戌歲十月二十三日題雜著鸜鵒食蝗秋七月螟生牧野南無幾有鸜鵒自西北踰山來方六七里間林木皆滿遂下啄螟食且盡乃作陣飛去予考漢五行志貪人尸禄猶螟害榖故感而生蝗夫鸜鵒北方之鳥也其嘴距有搏啄之利又數多如是意在位者不肖将有因貪抵法而敗者不然何食之既邪紀之驗他日之異時至元五年歲戊辰也魚歎至元九年春三月余自燕南還前次淇右逆旅主人條桑徹土束藁作炬詢其故曰此取魚之具也既而主人置條圜淺水中外以石擁之夜向寂風息波平炬火起岸側羣鯈趨明争集其中回旋然復千週百匝眎其條為罟之大綱一不敢出越而游去主人俯掇如拾地芥焉王子喟然數曰班生有言山林之士往而不能返朝廷之士入而不能出士乎士乎冒昩行險趨利而不知止者曽何異於斯乎是歲重九前三日寓平陽牙城官舍之待旦軒坐聽秋霖耿不能寐追思所見作魚歎云非分説甚矣非分之不可求猶鴆毒之不可懐也鴆毒之殺人世知避忌非分之存心其禍有不可測者有人於此小智有材行險僥倖以濟其欲一旦濡首染指攫取公餗是知厥指之可染不知首領之亦可保也奇貨之可居不知其禍之不可脱也既而以敗聞抑桞子云立身一敗萬事瓦裂者其是之謂乎夫鳥俯而啄仰而四顧猶懼夫物之為己害也可以人而不如鳥乎今日方食聞府吏籍其家案上一杯藜藿重以五鼎七牢矣至元戊辰夏五月重五前三日遺安堂書鏡箴王子醉墮馬傷額既愈日引鏡自照色黶如凝鬰者旬餘因愀然曰昔樂正子春下堂足傷追悔不踰閾者累月蓋聖人以毁傷髪膚為深戒必全而歸之為至孝矧陷身不義一敗瓦裂之酷哉是以墨子悲其絲染馬遷痛其刑餘桞州悼其􅏥進也惟其居易俟命不行險母苟得從容中道乃為合理吾知免夫至於游居食寢則體安而氣平不然事變之來少有磋跌又何翅髪膚之毁傷物議之輕重者耶嗚呼小子孺其戒之慎之於是乎書時至元辛未冬十一月十有三日也簪導玉飾辨統軍府從事李良貴上計來燕過予出示華玉一方長寸許廣如之状類方勝然其文章昭回刻卧蠶中間髣髴粟粒隠起上作蟠螭闖首左顧前足去左其下穴方孔甚邃玉色皦潤殆凝脂然予曰晉魏以下無有也李曰然此陽夏壙中物也余時方讀禮書而此物適㑹因考其制蓋大冠横笄之首飾也古者笄長尺二寸諸侯以玉大夫士用象其為神明之器斷無疑矣何以知其然禮云瓦不成沬木不成斵有鐘磬而無簨簴其曰明器神明之也故開其足之左嗚呼魏晉去秦漢未逺兹物也視之猶可彷像一時禮文之盛古人嘆三代吾不得而見之得見漢魏斯可矣蓋文獻之傳尚足徴於當時者耳於是乎書興平閤本說古今名臣畫像皆曰興平閤本興平京兆縣名而曰閤本予初不觧其㫖近㐮陵吉仲和過予覩壁間李衛公東坡等像此正興平縣學所臨者嘗聞諸進士武公張徽君美云金大定間某人自秘書郎出宰兹邑悉取平日竊模秘府真像而圖形焉故有閤本之目云崇徳堂記余貎不揚冩之者未得盡肖建賈君一貎而見者皆以為余且曰仲器為人不止技稱其於奉親事嫂以孝友聞鄉閭殊侃侃也既而求名其堂且叙其世家賈系出㐮陵今汾東有塜巋然曰賈相者乃逺祖也從傍居民同族氏者尚百餘家有圭田三百畆耕穫者主其年之守祀終而始焉奉為故事甚恪考夫傳記蓋賈豫州逵之壠耳豫州在魏晋以鉅儒名卿顯宜其世祀至乎今而弗絶也今觀仲器氣質溫粹孝友純至似非丹青馳譽者豈豫州之澤淵流而未央耶故以崇徳榜之且用篤其所已至勉其所未盡者焉至元丙子清明前三日題讀唐徐有功事蹟周革唐命豔后煽處任威刑而絶異議遂起麗景等制獄縱周來之徒誣搆陷置膏流節觧之禍莫有捄之大者以翦夷宗子希㫖下者以告宻上變徼功鬼撲滿朝中外股慄時有功以司理之㣲秉公恕之心扞折兇鋒守死不撓至辨明寃抑竟頼全宥者甚衆嗚呼仁哉公固知上含容孤直庸示公道然人恣肆裂之際天理有不可冺滅者彼中橋突犯清蹕釋之辯漢文於慎罰之初威衛悞斫陵栢仁傑諍高宗於受諫之日以勢以時司刑為尤難及拜西臺至頓顙流涕有鹿挺懸庖之請何感動自悼若此豈體存正大明哲保身之方非權無以濟之耶紀異至元十三年夏六月王按察立夫同在汴梁試院中告予曰前年冬十月益都路總管子也孫䚟以髀瘡卒於官初卧病踰浹旬遽召左右具議仗及鷹犬橐鞬者列堂下徐曰吾今日晌午逝矣家人問何往曰將赴逹官某人府言畢據銀椅而終逹官者故監真定路郡沃魯外五赤也蓋公自㣲時薦擢於朝以致顯逹皆公力云俄有樂安孫吏來云日晡時三十里外遇公騶馳甚盛從者呼某至馬前喻之曰汝歸當告吾家若車徒西還凢過水當以金錢投之初不知公捐館矣翌日又有自濟南來者亦見公獵道左而面如平生然明年丁丑夏四月與公之子某㑹燕以向所聞審之不少異因念余向在省署識公於稠人中軀幹魁偉望之一雄傑也立夫云公為人忠謹誠慤歴事三朝多為上所倚注世為燕之香河人壽五十有幾又聞吏部尚書太原高公亦臨終區處後事神志灑灑不少亂問騎從具堦下否曰具如期而逝嘗聞聰明正直者生有所自來殁有所自去如傳説上為列星韓柱國死為閻羅信有據而然也因併筆以紀其異讀魏相傳周書有云論道經邦燮理隂陽道者何以正心誠意為體仁義禮樂乃其具耳以此出治隂陽自和萬物咸得其理舍是非復有調元之術也今觀相之燮理至區區建議舉四人各主一時使衣服禮物朝祭百事一切法而行之時至明言所職庻政玉燭之祥何不思之甚也嗚呼西漢去三代殊近相於中興為有聲其經綸器業惜乎不出乎正心誠意之大學而牽於五音附㑹之小數豈見道未明機務權衡之心有所偏溺哉御書銀盒事客有云道陵朝二近侍以功名利逹由天命人事因私相論詰甲曰天乙曰人上聞之取銀盒中批曰可去者某宫遂授乙者使赴尚書省既出衂血大作不克往適與甲會以君命不可緩即就付焉其人拜官而去由是而觀雖云君相造命不知造物使之然耳近一名士甚為聖上所重當軸者力薦以為同列将謂旦夕輔政及上聞喜其奏而除之既而病卒因記客談併書其事紀肉芝等事天興初荆王府第中庭産肉芝一株高可五寸許色紅鮮可愛既而枝葉流津濡地視之皆成血臭不可聞剷去復出者再遇夜房榻間有物作聲伏其中燭之羣狐滿牀遂捕失所在未幾曺王訛可出質王妃蕭氏向余談其事妃尚書貢之孫今為黄冠師居衛先友牛講議國瑞牛天祥字國瑞澤州陵川人通天文武經占筮風角等書正大間嘗為恒山公府議事官兵后居衛東白臯渡既而著軍前中書省詳議辛亥秋八月應東諸侯聘客死聊城壽五十有七𦵏汲縣郭村東鄉清水鎮州風俗鎮人以七月六日為七夕節蓋其避王鎔闕百餘歳俗以為常何恩徳感人心也如是闕據五州當時四隣交爭併起惟鎮之人士闕帶遊嬉燕樂安王氏之無事彼懐思不忘愈闕者豈非是歟則知文忠公筆削真實録矣至闕己卯闕月六日按部次新市縣五夜燈下書僮喻官真定時五月夏至日作秋澗翁自㓜讀書疎於生事處則知渉古今考治道以自驗平時所得於日用間庻伸㣲志故從壮歲忝沾恩例舉家仰食廪禄未省飢凍切身者二十有餘年矣雖然纔閒即無以資生顧貧乃士之常不敢略有他務以覬苟得非惟不為亦且耻出諸口汝等轉藉翁庇各蓄妻抱子日嬉溫飽奔走承侍外心則無所苦也汝翁且自己邜秋移官燕南忽復四䙫以禮将去乃有維揚之命夤縁投獻遂致扯止重叙一官良為匪易其倖與否汝等朝夕所親覩也及南還滹上復需後命今又數月矣適饑旱相仍食艱口衆事勢牽率有進退維谷者况汝翁行年五十有七自惟疎拙與時齟齬加之筋力衰耗百念灰冷静退之心日往來於其懐嘗謂秩天秩也不肖者無乆當之理禄天禄也衰老者無恒竊之方躬田力穡本吾家素業稅駕壠畆固分所冝然行止有命又非吾之所敢必也此淵明所以有心形相役口腹交病之嘆盻盻一稔斂裳宵逝切嘗慨有感焉今日炊釡晨冷庖人告乏計口而食月得粟五釡可足時斗直鏹餘二千是旬月所縻須六萬三千錢耳其賔客之奉慶弔之禮鹽醢葷茹薪爨芻秣僦舍之費不在焉諺所謂百指無糲飱食倒黄流灘諒非虚語噫官時來則為筆耕之潤又非所恒幾何不相胥而困也今日夏至聞東郊穫麥天倉廓開捃拾遺秉不為無益汝等其往哉母忽且令汝知田功之艱一餔之不輕獲也暮歸得新麥斗餘僮奴輩既飯放啜頓失菜色為一快也又念位雖下近伐氷之家尚爾窘廹在閭閻細民不合釡而坐餒者幾希矣因援翰作僮喻㑹有餘思不足為暴殄之戒且廣訓儉之遺意云魃妖今行陽榖道中農人有以魃言者余告之曰周宣王詩云旱魃為虐是魃非今見從古有之此蓋旱魃之氣感人變所娠而成耳神異經云魃生南方肉體長二三尺目在頂上走行如風見之處赤地千里執而投之溷中即死旱氣乃消又云魃字從鬼鬼魅之物所生非惟南方也且古者娠婦不使食邪味聽淫聲覩惡色恐逐所感而化余故曰變所娠而成妖耳哀辭後衛自壬子歳迄今邑中子弟不三十而夭者凡八人闕季武王範闕輩皆雋秀有望翩翩而佳者也吁百蛇墮地一或能龍既玉汝之輒復奪之不知造物者果何意也余故以咄咄怪事為言然以理揆之雖一家之凶變亦斯人有自致者嘗記一士人問於先君子曰粤惟金初己來衛之文秀者極罕間有之多秀而不實先君曰衛地濵河沙薄豈其氣疎弱故也若使水環州南或城居水西氣或可盛時不肖尚穉聞之不存諸心又弗請問其所以故雅意所在毎念之而不能明了以今觀之其言固為有徴何則如東平汶出府南阿邑濟經縣東且以東阿較之在金一代内進士而位卿相者幾二千人鄆則不須論也然魯無君子斯焉取使衛師有經儒人問學而知義則薄者可厚愚者可明夭者可壽也此雖以人事意度若有以補於世教聞之者庻不惑於邪妄之說云至元戊子秋八月八日書盧氏墳石泣大都玉馬坊耿氏石獅猛水出如霧予時為御史目覩其事山陽長流村盧氏墳石表水出如泣者連日耿盧二人皆出㣲賤而遽當台鉉此驟得不祥之極也蓋善惡以類應故隂沴将至兆見於石如此等因曰此石泣也二人尋皆被誅然泣者非憫之也悲乎不知其量也吁龍墮農民王家至元二十年癸未夏六月中大雨河西鄉農家王氏甫夕黑霧四塞中庭忩户問寒凛不可勝視之有蒼龍蜿蜒在氣中起而復墮者再時王氏女已笄下堂趨室驚而絶於地救乃蘇問所見亦同歘霆震霧散失所在明日視其地鱗鬛印泥尚宛然也王氏世居水上其下潭渦殊深黒可畏雜著太宗英文皇帝天容晬表一類釋迦真像仁厚有餘言辭極寡服御儉素不尚華飾委任大臣略無疑貳性頗樂飲及御下聽政不易常度當時政歸臺閣朝野歡娯前後十年號稱廓廓無事臣向過平隂縣聞校尉陳某所談如此陳早年蓋先朝控鶴近侍者云前宋時有日者肆相國寺東一日而識四相謂韓魏公范文正公王沂公張齊賢也自後術不一售竟窮悴而死近年畫師覃人孫某奉詔追冩太祖聖武皇帝與睿宗景㐮皇帝御容及奉進上顧其惟肖至泣下沾襟宣賜甚渥孫歸及家而歿二人術雖不同其於發藏泄秘則一也傳曰人之患莫大知人之機况神明不測者乎戊子秋日疾後書鶻歎昔有漁於河濵者見二鶻搏一禽於沙渚間禽逸而鶻不起良乆漁者徃視鶻已死矣彼念之曰鶻之鷙急性也一舉而坐空拳遂憤而斃有志士之烈焉夫士懐才負氣求用於世倘時不我合人不我知則納履而去之豈若小人之求之也不以無耻為耻專以患失為事千思百訃阿合取容雖僇辱在前而不顧期於必得老死而後己豈不貽伊鷙之忸哉余聞其説甚有合於吾平日之所行者遂著之篇以見㣲意云戊子歲重九後一日書此係石盞正之說齒射寳寳瞿姓内鄉農家子也史侯都督江漢時散卒也為人疊齒多力挽弓幾六鈞發無不中少嘗射凖並貫於木寳登而取之木折與墮碎其臂骨治無法肘已下斷去自是馳獵以齒控絃括羽左手托月滿逐獸皆應聲而斃史侯異之上逹後授校秩振古以能射名家者多未聞以齒而决者然付之翼者即兩其足與之角者必去其齒蓋懼其全而過為物害也又唐李客師善射好獵每出烏鵲逐之翔噪時人呼為烏賊亦惡其物之多取也今瞿一手尚爾斷其右殆為天所劓乎弟忱說如此故書畫虎先君嘗告某曰王氏在前金時家魚行里曽祖府君氣方嚴於土障畫一虎甚獰意者取陳力就列故也後八十餘年當至元己丑偶於樹塞復圖此獸追念前言有常警懼者書云徳明惟明徳威惟畏今雖頓還舊觀其以惟畏惟明萬不一逮爾又諺曰生子如狼猶恐如尫曽祖之意豈復在此耶小子其志之紀夢二十四年八月己丑夜夢予逺行過一城市當莊嶽間一達官觧鞍作歇過馬呼予回視之葢參政飛卿也寒暄外髙曰别雖久食頃不忘也予曰彼此彼此握手間予乃曰聞吾友參政以來多有施為髙曰傳者妄矣參政者參知雜劇見做不行何施為之有予答曰渠於此見打野呼兒胡為做不行也遂寤聞夜漏踰四鼓矣古人云至友神交於冲漠間殆謂是歟次日聞吾友南來論其氣類亦同與夢應也因書此以贈吾三人者相㑹及此當捧腹大為一盧胡也紀夢二十五年春二月十七日夜夢朝上於端門内彤臺上聖上椅坐東北惲於臺西南角俯伏上問條支國事惲對以其國甚逺出犀牛革為甲甚良號曰黄犀甲上喜甚因寤明日檢通典六條支國去陽關二萬二千一百里在䓗嶺之西城居山上周四十餘里下臨西海水環其南後漢和帝時乃通地暑濕冝稻産五榖果菜出幇牛孔雀大卵如甕有桃㧞獅子犀牛桃㧞一名符㧞似鹿長毛一角或為天鹿獅子似大蟲正黄有􅀈音髯耏音端尾端者毛大如斗爾雅狻猊是也紀夢至元戊子八月十三日夜送真定姬仲實上路就枕熟睡夢在一雪後亭榭尚書夢符宣慰信雲甫御史王子淵三人來訪坐間話及向在東平時遊燕等事夢符衣一素練衫當膺畫名士像自遺山已下數人予即題詩機上云不惜千金買東絹丹青難冩是精神因大噱曰此衫甚佳但到處是負長一軸諸公行神也遂蹴踏砌雪而覺乃自占其夢復作一聨云恐是隆江方大用故將賢彦貯胸中詩夢十一月七日與兒子輩袚除回就枕熟睡近四鼓夢與姜君文卿會歴下亭酒半酣姜歌鷓鴣曲壽予聲甚懽亮已而以遺山新舊樂府為問余曰舊作極佳晚年覺詞逸意宕似返傷正氣姜以為然予因賦詩以贈既覺頗記其一二因作成之其詩曰畫㦸清香敞燕居分明夢裏到庭除恩醴故里懸車後錦爛秋鷹斂翮初細棹觥船浮酒海暫停銀管合纍珠賞音千古遺山曲堅意高歌要壽予既而復夢至一大城府遇老人邀予入王氏邸肆其主即曰汝非王秋澗耶予曰然因口占二句云此生難道無餘幸海上人争識姓名仍詢曰此何處曰兹贑州也地在洞庭湖南七百餘里予曰東坡八詠何在曰石刻去此又三百里外其老人又推予賤庚曰誰謂中州無人乎未及問其行藏而寤時二十五年戊子歲也十一月十二日夜夢四鼓時夢入一重修大佛閣有鉅蛇長約三丈自閣壁西北而下僧徒以杖擊之不中内一僧揮鍤中斷為三段予稍前視之其蛇首似獸有雙角若羚羊者膏血淋漓赫赫然尚能舉動次夜復夢人以羽矢一大房若今之鞬者挂於中門紀夢中題人手巻娶為無後有子而嗣有餘老為致養子孝而養不嗣其嗜慾或有所未免而年已及夫耄而於三者吾子将何擇焉擲筆而覺遂卧笑曰夫子自道也於是起而書以為儆至元二十六年歳在己丑春二月二十一日辛未夜也予時年六十三明日㑹亡友中丞王君𦵏於正尚里夢解予平日夢頗異自今年夏多夢疾厄凶䘮或纒綿墟墓問及故交乆殁者與之晏遊談笑如西溪贊拜殿授王中丞需騎而作且知其彼死時又不省在寤寐中爾覺意甚惡之因自解曰此無他乃一身隂陽消長之漸也醫家有云男子四十隂氣自半沉行成八八之數乎雖然氣有盛衰人不能皆然若有餘尤當惜養不致耗竭可也陽為舒為暢隂為慘為悽慘多而舒少故神才交而魄為之勝矣調此二者奈何有絶嗜慾少思慮檢行已安素分息形神而植定力旦則以此理坐進夕則以夢相驗一或自差立為除治其病庻少瘳矣昔夫子向衰稱不復見周公於夢只是老克自持不願乎其外之意也若不量力不安分凢百營為返勝於昔将見有不任我勞從中躍出辭而去之者矣可不畏慎也哉故曰知之者強不知者老其是之謂乎作夢解紀風異余年十七八往蘇門讀書至古城東十里外有旋風自西南截泉水北來望之圜圓約六七里大其高入大聲勢如甲馬迅馳黒風蓬勃吹㧞草樹飛卷半空余走不及避乃瞑目倚棠樹悚立須臾覺寒凛氣繳束而過别無他故今日偶讀筆談見元豐間武城縣旋風殺傷人甚衆因念余㓜多災厄追想徃事有可怖者故書以為來者之警壬辰秋申月七日記䘮記古之人以送終為大事故即是而察禮者重之也孔氏将𦵏燕人來觀滕文居廬弔者大悦今觀雷白二家祔𦵏甚有關於風化而出於常人之表者一則衰絰纍然多從古制二則寝苫枕塊卒哭後日飯蔬食三則不狥俗而用三家四則穿治壙石製為壁藏土周於棺略不施甓五則直壙下窆同穴異棺乃北其首六則墓記從實略無虚飾至於容色之戚躃踴之數又見夫固所自盡之道以致㑹𦵏者皆歎息有得而去因念唐為衣冠盛代之祭不用冥錢唯顔魯公張司業家又伊川先生居洛下治䘮不用浮圖法雖風動一時止一二家化之予行年五十有九宦游四方其慶弔固云不少然由徳風而偃者所見亦姚許與是二家而已嗚呼甚哉禮之難復俗之不易化也如是述䘮記以寓予感雷則祔其母夫人侯氏白則𦵏其父頥樂先生云紀夢至元十七年春某官真定夢先祖敦武府君親告某曰今濟源縣宋宰相陳堯叟碑文内王其姓者即王氏逺祖也汝其識之廿年正月在燕與懐州劉節使相會問及陳相石刻云濟源見有陳堯叟讀書堂故碑但不知有無王姓者筆之以志異日求訪紀夢至元十九年八月二日夜於醉後夢行通衢見大井中一異状人跨青色鉅蛇躍出地長約丈餘身廣濶與尾等修鱗濯濯可數若将前迎而復去余俯視井中水波皆成五彩丹色殊煥爛也由中至井漘與所經遺水濡濕尚淋漓余逐蛇前行相去數歩外因取碎甓擲之者再既而余入一圑焦避之蛇復來集其首己化為馬又有數異馬飛舞環余而立初甚惕然至此無復怖矣尋登一紫閤少頃從閤之西道木陛下降乃寤月異庚辰歲十一月十一日長至日日出三丈許月現東北丑位間去日約百餘丈其上數丈隂魄團圑畧無虧欠至寅方移時乃滅因念月與𤣥象經緯空際太陽既出自掩而不見今太隂於陽生之朝晝見與日並光又未嘗月出東北方者吁亦異哉劍戒哀梁子也梁奉議仲嘗與予聨事於憲司者凢四年十九年冬同在京師乃告予曰僕有一劍頗古而犀利自落吾手毎臨静夜屢聆悲鳴比復作聲錚然也且聞百錬之精或嘗試人者則鳴世傳以為劍戒予疑焉自此金孽也非戒也既而梁以事南還陳留到家四日而卒吁亦異哉因念張華授干将而告凶鄭逵得吼劍而怪至夫金鏞木鐸中隠大聲若無因而自鳴則為不祥之金梁以劍異告予至其死時僅四十九日得不為劍之孽乎梁諱秉常熟人性機警持事瑣急寡譲得年五十有三金尚書梁肅裔孫見所藏世譜云至元廿年歲在癸未端月十有一日王惲書鹿庵先生卒日至元三十年癸巳冬十二月廿三日鹿庵先生壽九十二歲無病而終先是公静坐間忽張目仰視屋廬曰我以此居得箇月旬日爾間及薨適滿其數氣比絶呼家人令具鞍馬曰可與兄去矣隨有大星隕於寝室東山其光芒炬然曰兄者葢同母兄文勉先生也愛民榜進士第嘗為某縣令終恒山幕官明年二月其壻李惟賔𦵏東平府須城縣三十一年四月五日山齋説如此家府遺事先君思淵子通天文又善風角辛亥夏六月憲宗即位明年壬子秋先子以事至相下九月初客鶴壁友人趙監摧家一日夙興見東北方有紫氣極光大衝貫上下如千石之囷時磁人杜伯鎮侍側指示之杜曰此何祥也曰天子氣也杜曰今新君御世其應無疑曰非也十年後當别有大聖人起非復今日也渠切記無忘第老夫不得見耳至元十三年予過滏陽與杜相㑹話間偶出元書片紙相付且歎其先輩學術之精有如是也國朝奉使大元太宗朝奉使宣撫王公諱楫字闕豳人有文武才略金季舉進士不第以武弁降太祖聖武皇帝即授宣撫使珮金虎符時年三十至太宗朝丁酉歲假御史大夫持節使宋議和雖徃返十年有皇其華風義言言竟從我義不幸使軺北還前次荆南疽發背卒年六十一時癸卯秋也道號紫巖翁有文集并使宋録藏於家元貞改號六月十日偶過其家孫元徳因出示公秘閣畫像介胄弓劍姿䬃爽葢儒将之偉者元徳風彩甚肖其祖及觀楊紫陽楊西庵吕大鵬張徽商左山祭文畫贊題䟦等篇又說公比卒前數日夢一青衣童子傳玉溪東館主人來召既抵其處宫觀甚麗止公俟門屏間少間出報曰公旬日後當主是館吁亦異哉又觀馬雲卿所畫人様呉妝五星迺竒筆也其金水二女形皆㪚髪金主殺故杖劍水持筆者或謂水官主録過木捧蟠桃四臂火上擎飇輪散火下操弧矢當前一大星旁射土則扶虬杖而已六帖說白樂天作類書名六帖通典選舉門載唐制曰開元中舉行課試之法帖經者以所習經掩其兩端中間惟開一行裁紙為帖凢帖三字隨時増損可否不一或得四得五得六者為通此六帖之名所從起也六帖云者取中帖之數以書其書期於必在中選也金制金人立國作制頗詳雖服御飲膳皆有法以維之然化敝則奢麗奢則嬌嬌則弱弱則委薾而不振恐亦取亡國之一端也今日因餟粥糝不可對齒偶思穆若卷如之事為感而筆之冠冕始制或者以金人盤領上服與西域數積尖冒皆出本俗余以為盤領漢之曲領尖冒古弁之制也今晨讀戴禮冠義得鄭氏冠禮起早晚之說稱周公對成王云古人冒覆而勾領謂三皇時以冒覆頭勾領繞頸皆以羽皮為之至黄帝則有冕弁又云帝造火食㫋冕而用布帛代為羽皮乃知二物皆三皇已來之遺物也又如山東民家至今亦以長幅皂繒䝉纒首髻西域人用絺綌纒繞其首及食齒人冠絳氊以冒頂髻者其亦本於此歟嗚呼禮失於中而求諸野冨哉言乎裴中立不引韓愈共事昔裴晉公授越平淮辟韓愈為司馬自以度為已知然終不引愈共天下事至作田横墓文㣲露其意時貞元十一載公年始踰壮矣予嘗思而不得其所以今乃悟此何異魏公之抑蘇軾也大抵才盛學博之士加以年少未免有軒昻莫降之志卒之臨大事成大業有不當如是者乃知二公厚而恤之非長而忌之也欲使澄治客氣明夫大學之道懿蓄其文徳以就晚成之器耳鳴呼君子愛人以徳復有重於此者乎戊子歲冬十一月朔晨起偶書賤生於無用說萬物盈於兩間未有一物而不為世用者况人乎人之為物得氣之全而靈之最者也苟自棄自暴不為世之所用非惟返不及物而賤之所由生也彼牛溲馬勃敗鼓之皮物類之極賤者也然一旦與用適冝顧惟毫末可以愈竒疾應時需即與玉札丹砂赤箭青芝並芳而竝貴貴在同於有用故也彼衣敝縕袍並夫華簪盛服之士貴賤固有間矣其所以秉有靈彜物備於我者則不殊也故為士者惡可惡其居貧處賤戚戚然世之不我用也要當明徳志學思求其致用之方可也世之所謂學者多矣有有為之學有無用之學窮經洞理粹我言議俾明夫大學之道者此有用之學也如分章摘句泥逺古而不通今攻治異端昩天理而畔於道若是皆無益之學也士乎士乎於焉而不擇其有用而致力於無用及其志與年邁悲嘆窮廬尤其世之不我用亦己惑矣衍賤生無用說庭芝評郝奉使文李庭芝見郝奉使文字謂陳月觀曰陵川固才高學博但出入韓文未甚熟耳余嘗度之韓文世所重者其要非一今李之於郝所以云云者豈以韓豐而不踰一辭約而不失一字郝之返是者極多不然是擇焉不精明理未至雜以非聖此有故也崔公厲鬼事跡故榮禄大夫平章政事御史中丞領侍儀司崔公道言曰人秉四大假合而為生踐履五常而為用有溺於學佛者溺於儒書者各執其一偏所以學者兩不得其全雖聖人性命之學備載方䇿而學者多以尋行數墨為務及其寓一事决一疑皆不能自省愚於七月上旬腦後病瘡初不以為意㑹車駕幸大都跋渉從行瘡益舉發廿三日問醫者麻監丞曰此為腦疽其源發自五臟急之不可緩之不可當以漸洽之自是日詣麻行館求治後至白海而瘡勢益大形疲力瘁心神不寕以此自思葢無以知病所由作也然所恨者居無良醫行不能扈從一日近侍官伯勝等以愚病聞奉㫖留麻監丞於白海治之拜命日赧汗浹背伏思平昔畧無報國殊勲致感今日聖思如此由是覺瘡疾頗回然於夢寐間毎為厲鬼所慿竊為生死是苦樂我心既定何從不可八月二日從其醫鍼者三處覺心舒意暢神志帖然然視天地之氣月白風清霜露溶溶萬物各得其所而吾之清氣其静者混然同以表裏方就寝而厲鬼又見於夢且曰世間多少難了難行之事相腦百端向之治功皆不復見而疼痛比前尤加夢中恍惚而覺坐而思之非厲也於我所見不定得乗其便耳若吾身獲安即與天地萬物混融同一和氣彼厲鬼安能凂我哉且天下之事不可不辨於早人之生死不可不識於先我既能悟此白日黒夜自有定數彼厲鬼何豫因記其夢以俟知者詳焉時大徳二年八月五日也秋澗集卷四十四欽定四庫全書秋澗集卷四十五元王惲撰說
