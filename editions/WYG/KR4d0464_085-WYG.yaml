front:
  text: 運司併入總管府選添官吏事狀照得隨路總管府自至元元年止是管領民訟差稅而已以故總府州縣往往員數不備其或闕員去處多不補差今者已將運司所管酒稅醋稅倉庫院務工匠造作鷹房打捕金銀銅鐵丹粉錫碌茶場窰冶鹽竹等課并奥魯諸軍䀆行併入各路總管府通行節制管領比之在先職掌事務其煩冗增劇豈止數倍之上所賴用得其人員設必備方可辦集不然將來事有失悞不惟官吏枉被罪戾上以員數不敷為辭至於都轄上司嵗終考課倘無成效竊恐不得獨免言責以某愚見即日注擬總管官員理合精選材望素重强幹有聞清慎明著之人使之統紀於上其衰老罷輭不職素無政績者亦合體究得實量加黜罰外據總管同知州同府尹以下官員驗部分大小事務繁簡照依舊例添設員數如總府之治中散府之推官上中州之觀察節判并劇縣之特設丞簿是也其府州司縣首領官吏亦合添設員數令掌案牘無致遺失依上勾當如此庶望上下分職各率其屬以治其政則民安事辦不致内外事務有所曠闕據此合行具呈
