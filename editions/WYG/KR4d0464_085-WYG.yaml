body:
  text: 論省部掾内選擇檢法官事狀竊照近日見設檢法官多取自州府司吏等人如刑部之檢法官安某是也且刑部人命所繫法家自非專門善於其事者察則過於深刻昧者不知所守輕重髙下鮮能適宜其或處心徇私唯法是玩尤為利害兼照得檢法係八品正官亦無州府吏人既非才選輒用補充者今後合無於省部令史内選擇知經史明法律識政體明良公平之人著充似為相應合行舉呈為添設按察司八道事狀竊見四道按察司部内寛逺一出巡按動經半年往返萬里不惟官吏生受其實艱於周察又體知得高麗島夷小邦尚設按察八道今東寧府内屬鳳州等郡縣乃一道也况堂堂十萬里之大國乎據見設四道按察司毎道合無添作兩道依上勾當實為便益論起移懷孟路新民事狀伏見懷孟新民二千户大小一萬餘口今將差官分間起移前往中興路安置止恐因而别生事端然狂悖有言者特本管頭目三數人耳今以在官審實有狀罪之可也據中間事情恐小民或不預知兼此等俱係車駕渡河時軍前好投拜人户前後恩卹十年一旦徙就逺地誠當念慮若萬一生事深繫利害且即日春首當國家布徳施惠助長生之氣又蝗旱連年所在生受今者遷徙逺去不惟費用浩大經過州縣飲食供頓人兵防送必致騷擾其間更多猝難起移之事而老弱因流離道路困乏疾疫不無死損恐轉傷和氣又非來逺人之道也㕘詳莫若分移使實近裏州郡破散支黨列之編戸一𨽻有司管領甚為長便論丞相史公位師保事狀蓋聞崇徳報功聖君之盛事尊賢敬老有國之常經伏見前中書左丞相平章政事史公某徳望素高忠勤兩著比者朝廷以元老勲臣累聖眷遇詔離重地時錫寵光蓋所以安老臣而崇徳業也今史公年雖耳順精力未衰謀猷風采足以儀刑中外表正羣卿而坐鎮雅俗僉謂宜封公爵又聞將歸真定設若允俞不過角巾私第安榮一身耳伏念師保之列久曠其人合無奏聞使居斯位以備論思必能進䀆忠言有所廣益也如此不獨養老乞言之䀆道抑以激勸人臣罄竭忠藎之節天下幸甚據此合行具呈請明國朝姓氏狀蓋聞自古有國之君皆推原世系以明姓氏如軒轅以有熊為氏帝堯以陶唐為氏夏以姒商以子周以姬亡遼以耶律姓殘金以完顔姓是也伏惟聖朝奄有區宇六十餘載際天所覆罔不臣屬而又禮文制度粲然一新欽惟國朝姓氏廣大徽赫逺降自天今輝潛未發無以啓悟臣民視聽之願兼體知得有親散賜姓等氏誠宜區别親疎使貴賤之間各有攸序然後詔告萬方使如日麗天焜燿六合上以接千嵗之統下以垂無疆之偉蹟也惲職居言責細大之事似宜敷陳故愚慮所及不敢少隠請論定徳運狀蓋聞自古有天下之君莫不應天革命推論五運以明肇造之始如堯以火舜以土夏以金殷周以水木王漢唐以火土王是也據亡金泰和初徳運已定臘名服色因之一新今國家奄有區夏六十餘載而徳運之事未嘗議及其於大一統之道似為闕然何則蓋關係國體誠為重大况際今文治煟興肄朝章制儀衞若徳運不先定所王而車服旗幟之色將何所尚矣合無奏聞令中書省與元老大臣及在廷儒者推論講究而詳定之然後詔告萬方俾承天立極之序粲然明白實光揚祖烈貽厥子孫之永圖也惲謬當言列無以塞責重大之事敢冒昧敷陳為中省兩部私使貼書事狀竊見中書省左右部所設掾史其員數足以分務俸給足以養廉又明注出身定擬資歴是國家以品官待人未嘗以胥吏相期也所望公勤精幹躬行所事今則不然私使貼書通知公務毎房少者不下六七人官不係名私有形勢例皆掌案牘主裁決甚則至於闗節導達開閉倖門泄露事機滋長奸弊私謁既行公道多廢近者制司偽貼事發此其驗也重念都省致治之源兩部天官之列建綱立極所貴肅清以明庶務奈何使幼孺無知之人混淆錯雜紊煩官紀其為害弊孰甚於此若曰此等吏習而巳事何預焉是中書兩省為童子吏習之所此尤不可之甚者今者積弊有年曾不更張革去冗吏欲望激濁揚清選擢計密抑吏權謹公道帝載以之能熙期㑹至於不失不可得也又照得省劄行下州郡則減吏冗使有定員本謂省官不若省事省事不若省吏若此者􅃕本趨末欲清其流而反濁其本源也兼舊例私使貼書者律有明禁據中書省樞宻院左右部及隨朝衙門占恡貼書等人合行禁罷為百官賀正未見私先相賀狀伏見國家修習朝儀漸有成法是將表儀萬國肅正百官為一代之制兼朝廷之上禮宜過肅殿陛之間尊無二上今者百官賀正趨集闕下未蒙陛見私先拜賀讙呼雜遝似失無二上之義合無比奉朝儀以來誡飭百僚革此習俗庶令宫庭之間先致清肅若大禮一行隨即可觀不然限於門闈令在内者不許私賀以將其肅敬之心亦禮治之一端也為太廟薦新并前幛輭垣事狀伏見國家建宗廟奉祖考嵗時享祭禮文昭備今職貢萬國方物畢至惟薦新之禮尚闕而未行非所以交神明廣孝思也又禮下公門式路馬况太廟乎今廟宫正門前幛輭垣據東西外門即神靈出㳺之道使内外臣民經過者不知寅畏趨避為心又非致敬恭之道按金制五品以上官過廟去傘屏人從疾過六品以下並下車馬合無照依舊例遵行竊詳二事違闕至今誠有司之慢也為春寒馬牛損傷課程帶納馬匹事狀伏見上都路今春雪寒損傷馬牛數多其山東等處災傷亦然竊惟馬牛耕戰之本會驗明有條禁馬不得駕拽車碾牛不得私下宰殺隨路有司奉行甚嚴今京畿之間其牛馬非理用度甚者至於駝犂耕種公然屠宰以為尋常兹有司之過也今後犯者宜加重論罪庶幾民知畏避不致日有虛耗外據各路課程毎季乞約量分數帶納全課馬匹有差就令本道總府官或次貳一員兼監牧職各毎年終驗孳息數目考課能否而賞罰之亦漢武帝二千石兼馬政之制也倘議而行上供天子之六廏下備征進之大舉一旦果用足以收良牡而振兵威比之倉猝和買或籍取民間不惟人不被擾抑以減省國用力不勞而辦矣據此合行舉呈論監司僉事職劇祿薄狀伏念官守有常而事分繁簡時制雖寛祿隨品給惟其加優則心專心專則事理蓋廉以處己而免喪節之恥勤於按部而無苟且之虞竊見按察司僉事係隨朝正五品官執掌既繁部分寛逺如刷磨案牘審鞫刑獄糾正官邪肅清風化勸課農桑體究一切公事終嵗驅馳不離鞍馬其在山北尤為匪易今月給俸值止三十貫文實為鮮薄似難養廉近體訪得隨路勸農使刷定為從五從六資品又所任之事止勸課而已其品從高下事為繁簡俱與僉事不同今者祿秩爭懸反加一倍合無比附約量添支使勸來者以勉事功據此合行舉呈用厯日銀修祖廷孔廟事狀竊見聖朝修崇嶽祠緣為國家鎮山與民祈福而宣聖三綱五常之本君臣父子以之而生成者也其祖廷殿宇至於闕然攷諸故典皆歴代有國者所係增修又會驗世祖皇帝聖㫖節該諸路厯日銀一半修宣聖廟據東平益都兩路䀆數分付襲封修完曲阜本廟合無欽依先朝聖訓將隨路及山東兩路銀數併修祖廷正廟就用洒掃户以供力役可不勞而辦如此不惟善繼祖宗之志抑亦尊崇之盛典也論闗陜事宜狀竊見京兆乃闗陜重鎮其居民大半南驅放良歸順等戸兼地負山險其義雍等峪口皆係南賊出没道徑如前年深入華嚴殺掠人民幾犯城郭兹蓋腹心有應然也又如已獲平陽陳丑勞并本處李顔等詳其事情正以狃被前習故勾連内外謀叛歸宗皆其事也體訪得東連鄭縣西踰義峪其間多有四方作過避罪逋逃無名等户聚散山林間十百為羣彼負罪避匿不獲自新小則聚而草竊侵害良民重則結連外郡窺伺簡便何所不至其陜西官府雖向奉聖㫖節文將放良析居交㕘等户令所在招刷未聞實效况目今蝗旱如此流民不安其行府與總府宜專一選差有幹局官屬多方用心出榜招集懷以恩信使出離山林安撫存卹限以三年免徵差賦能此既喜從新又獲其所則前日反仄之心不測之擾可以永絶矣若因循姑息視為細微上下蔽匿竊恐因而别生事機如華州官司明知如此數百餘戸不行申報私下隠匿聚斂差發足見奉行滅裂不為䀆心曾無實效之明驗也若曰金商己戍兹不復慮消患未萌古人深戒又照得本路總管己闕三年雖有一二次官望輕地微恐難鎮服是則分陜之任未得其人誠不可緩也宜早為遴選材徳威望素著足以鎮撫軍民者以膺重寄庶幾秦隴之間弊政一新狂妄消弭其元元之民感念恩徳知朝廷雖逺其憂民慮患深至如此孰不慶幸是天下一臂大得安全矣曹州禹城縣𨽻側近州郡事狀竊見曹州所轄禹城縣去本州七百餘里其親管并投下約四千餘户一嵗之間事為不少如科撥催徵打算勾集及軍馬詞訟申禀一切事理人吏往還一千四百餘里其於難易不較可知若官得其人政平訟理民受其賜苟非其人恃賴上司窵逺不復聞知凡有剖決鮮不徇情直行其或枉錯使無力小民卒不能上訴有受屈而巳今照得本投下和斜拜荅漢止係千戸功臣之家不同諸王公主駙馬等族人合無五户照依例分付本投下外據縣司一切事理就令側近州府節制照管官民以為兩便其濟州亦撥到平隂縣五百户亦請一體定奪施行為完顔投魯訛欺誑事狀近見在都咸寧坊人户完顔投魯訛告稱耶律丞相於本宅地虛晴井眼内藏課銀五百餘錠既而翻掘一無所見竊詳京師風化之原政令之本一旦信從小民狂妄至欺誑省堂侵誣大臣動擾人衆指無為有徼倖萬一舉云此風漸不可長兼白晝都城監臨發掘似非平時之事其投魯訛若不痛加懲誡以勵其餘竊恐小民因緣别生事端請百官上尊號事狀蓋聞古者天子臨御日久功徳昭著百官表上徽號至於再三鴻惟聖天子登極以來神功聖徳不可殫紀今者宜請中書省恭率内外百司奉表具上尊號以聞視朝奏事有常限狀竊以天下之事日有萬幾事重而當即行者必須取自聖裁宜恭請皇帝陛下自非嵗時巡幸於端居兩宫之時視朝進奏定立常限非惟庶事康理亦使臣下不敢稽緩請建臺閣圖功臣肖像狀昔兩漢之麒麟雲臺唐金之凌煙衍慶皆所以褒奬忠義激勸一時竊見國朝開創以來謀臣猛將勲徳顯著者甚多合無建立臺閣圖繪肖像不然則使嵗時配享廟廷非惟存殁獲寵亦一代之盛事也立襲封衍聖公事狀伏見歴代尊禮孔聖世有襲封以奉祀事㑹驗國朝自壬辰年間欽奉聖㫖於南京取到五十一代孫孔元措赴闕令襲封於魯自元措之後嗣襲遂闕嵗時主祀止令曲阜令治承權祀事甚非大宗主祭之義我國家尊師重道焜燿百代三教九流莫不崇奉豈惜一人爵禄而不議封建蓋未有奉行者合無聞奏明考族譜令宗親推其賢而有文者襲其封爵俾奉祀事以明天下風俗之本實聖代殊常之盛典也為教孔顔孟子孫事狀伏見國朝尊師重道徳及後裔其孔顔孟子孫故往者特設教官使之養育比年以來不聞一人有學業問望者雖親炙祖庭其淵源聞見終是寡陋今後合無選三家徳性頗明俊者使入京師國學令學士等官教育庶幾有成以昭先世之徳史丞相封公爵事狀竊見丞相史公係四朝勲臣今雖引年宜加公爵給其半禄時加禮貌以存顧問合無更依舊典毎十日一至中省平章軍國重事不然使卧護諸將規取荆襄亦周宣王唐憲宗之舉也請禁止異様服色事狀竊惟衣服之制所以别貴賤定尊卑故歴代相沿各有定制今民間以侈靡相尚雖工商皂𨽻皆得衣被金繡龍鳳衣物以致貴賤混淆無以差别今國家以儉徳化下服之不衷反為妖災今後合無將一切金繡衣物異様除令得服用外其餘即聽與鞍轡等事一體嚴行禁止亦辨上下定民志之大端也論節婦雷姑狀今體訪得京兆府三白渠副使郭時中妻雷氏係前監察御史雷晞顔女自三十一嵗夫郭身故雷止生女子一人長已適元氏經今十有六年窮居守志誓死靡他貞順堅確殊有父風宗族稱賢鄉閭服化在雷門善繼先聲居郭氏實為節婦理宜旌表風勵多方伏乞御史臺照詳施行史丞相子格合任用狀伏念崇徳報功聖王之盛事推賢繼世有國之常經竊見前中書左丞相平章政事史公中朝元老累世勲臣夙夜奉公小心翼翼而又忠孝傳家險夷一節今行年七十總戎湘漢御將籌邊衝冒矢石瘴烟暑雨偃薄侵凌内懷未效之憂外愾敵王之宼用是憂勞日增衰疾伏惟朝廷憫其如此故屢頒宣賜式慰老懷先之以御醥藥餌繼之以内廏乗騾其為恩寵固已隆重然史氏一門諸子振振未蒙擢用今者魯蔡二公之後内外分任各有其人豈期柱石之元臣未覩簪纓之嗣子據嫡長子格天姿高明達於為政前任衞州節使已有能聲後從西征多歴艱險合無依例任用置彼周行不惟慰史公之心於垂老之年抑亦激忠風於當代也秋澗集卷八十五欽定四庫全書秋澗集卷
