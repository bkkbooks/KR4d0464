front:
  text: 集卷九十六
  hash: sha256:82fa4a5a5da4d70fe2acb8cb7852df381943663c2bf2120b7dc7a51ea90b346b
body:
  text: 元王惲撰玉堂嘉話卷之四榖梁子曰獨隂不生獨陽不生獨天不生陽也隂也天也三者合然後生天極謂南北極天之樞紐常不動處譬則車之軸也河圖言崑崙者地之中也下有八柱互相牽制名山大川孔穴相通素問曰天不足西北地不滿東南注云中原地形西北髙東南下今百川滿湊東之滄海則東西南北髙下可知或問邵子曰天何依乎曰依乎地地何附曰附乎天天地何所依附曰自相依附天依形地附氣其形也有涯其氣也無涯但天之形圓如彈丸朝夜運轉其南北兩端後髙前下乃其樞軸不動之處其運轉者亦無形質但如勁風旋之當晝則自左旋而向右向夕則自前降而歸後當夜則自右轉而從左将旦則自後升而趨前旋轉無窮升降不息是為天體而實非有體也地則氣之渣滓聚成形質者但以其束於勁風旋轉之中故得以兀然浮空甚久而不墜耳黄帝問于岐伯曰地有慿乎岐伯曰大氣舉之亦謂此也曰九重則自地之外氣之旋轉益逺益大益清剛究陽之數而至於九則極清極剛而無復有涯矣豈有營度而造化之者先以幹維繋於一處而後以軸加之以柱承之而後天地乃定位哉鹿菴先生江南平告天地文伏以時逢喪亂嶽瀆分疆運屬休明乾坤一統睠靖康之餘孽據江表以偷生依阻山谿動摇戈甲不修嵗幣久虧事大之儀留止行人永絶親鄰之好既興師而問罪即列陣以長驅戈船浮鄂渚之波鐵馬度松闗之險方知力屈始悔前非遂奉表以求哀願納地而入覲宋主某已某月日來至闕下其江南郡縣人民已委官撫治了當是皆上帝垂祐靈祇降祥欲康功普被於黔黎故盛事施及于沖眇尚祈昭鑒永錫休嘉告太廟文伏以踐阼守文雖奉已成之業繼志述事敢忘未集之勲眷靖康亡滅之餘擅吳㑹膏腴之壤依慿江險壅隔皇風累興問罪之師猶守執迷之意逮戈船飛渡列城土崩始悟前非方圖改過遂稱臣而奉表願納地以歸朝宋主某已於某月日來至闕下其江南郡縣人民已委官撫治了當朔雪炎風盡書軌混同之地商孫夏裔皆烝嘗助祭之臣顧沖眇以何功實祖宗之餘䕃尚祈昭鑒永錫嘉休瀛國公制辭時逢屯否嶽瀆分疆運值休明乾坤一統眷靖康之餘裔擅吳㑹之奥區逺隔華風久睽鄰好我國家誕膺景命奄有多方炎風朔雪之鄉盡修職貢若木虞淵之地無不來庭罄六合以混同豈一方而獨異用慰徯蘇之望爰興問罪之師戈船飛渡而天塹無憑鐵馬長驅而松闗失險宋主趙某乃能察人心之嚮背識天道之推移正大姦悞國之誅斥羣小浮海之議決謀宫禁送欵軍門奉章奏以祈哀率親族而入覲是用昭示大信度越彛章位諸台輔之尊爵以上公之貴可開府儀同三司檢校司徒瀛國公主者施行凉威肅酒與甘張沙是燉煌𤓰晉昌徒單侍講括至元六年行用元寳鈔止七十餘萬錠子時為御史曽照刷提舉司文案故知至元七年天下軍民并析居總二百三十二萬户天干地支天有五隂五陽為十幹地有六柔六剛為十二支九州地畝數後漢郡國志注九州之地凢二千四百三十萬八千二十四頃定墾者九百二十萬八千二十四頃不墾者一千五百萬二千頃哲宗孟后元祐七年太皇太后以六禮儀制聘入宫奉迎使發䇿使告期使納成使納吉使納采使皆以僕射左右丞攝太尉充使六帖説白樂天作類書名六帖通典選舉門載唐制開元中行課試之法帖經者以所習經掩其兩端中間㣲開一行裁紙為帖凡帖三字隨時増損可否不一或得四得五得六者為通此六帖之名所從起也六帖云者取中帖之數以名其書期于必中選也鹿菴命擬復立按察司手詔條以一身之㣲維萬事之統不遑夙夜常切憂勤顧七道之提刑擴六條而從事近因省革偶值停閒然非違稽緩之愆縱令弗問恐伺便譸張之際為害滋深仍轉側以周思非監臨而罔益據所在按察司照依已降條畫依舊設立施行於戲鷹隼當搏撃之任不與䕶恐反為傷琴瑟既更張之餘識大體乃為稱職西溪云樂天每作歌詩成須令其家老嫗聴讀能通解其㫖意辭為之定體此無他不過通俗近人情而已特表而出之且為艱澁無謂之戒正大七年亳州節使趙庭玉詔别有擢用其子贄時為省知除掾既定省公問以召之之意贄曰以嫌疑故特迴避既而公拜禮部尚書贄入賀予嬰年見神川劉先生三蘇文讀不去手因問於先大夫曰古人有言蘇文熟啖羊肉蘇文生啜菜根豈此之謂也宋未下時江南謡云江南若破百雁來過當時莫喻其意及宋亡盖知指丞相伯顔也夫熒惑之精下散而為童謡不爾何先事如此宋真宗東封升中圖嶽頂有五色雲山下環衛以甲馬金道陵元㑹圖及郊天儀仗圖郊天圜丘圖曽聞某官説當時掌禮者房千里中外幾用人三萬未知方澤制度與此何若唐張説家藏明皇開元初東封圖有説宋范石湖攬轡録記興陵見宋使儀衛戊子日入見循東西御廊北行廊幾二百間廊分三節每節一門将至宫城廊即東轉又百許間其西亦然亦有三出門中馳道甚濶兩旁有溝上植栁廊脊皆以青琉璃瓦覆宫闕門户即純用之北即端門十一間曰應天之門下開五門兩腋有樓如左右昇龍之制東西兩角樓端門内有左右翔龍門日華月華門前殿曰大安殿使人自左掖門入北循大安殿東廊入敷徳門東北行直東有殿宇門曰東宫直北面南列三門中曰書英是故夀康殿母后所居西曰㑹通門自㑹通北入承明門又北則昭慶門東則集禧門尚書省在門外東西則左右嘉㑹門門有樓即大安殿後門之後至幕次黒布拂廬待班有頃入宣明門即常朝後殿門也門内庭中列衛士二百許人貼金雙鳯幞頭團花紅錦衫散手立入仁政隔門至仁政殿下團鳯大花氊可半庭殿兩旁有朶殿朶殿上兩髙樓曰東西上閣門兩廊悉有簾幕中有甲士東西御廊循簷各立甲士東立者紅茸甲金纒竿槍黄旗畫青龍西立者碧茸甲金纒竿槍白旗畫黄龍至殿下皆然惟立於門下者皂袍持弓矢殿兩階雜列儀物幢節之屬如道家醮壇威儀之類使人由殿下東行上東階却轉南由露臺北行入殿閾謂之欄子金主幞頭紅袍玉帶坐七寳榻皆有龍水大屏風四壁帟幕皆紅繡龍栱斗皆有繡衣兩檻間各有大出香金獅蠻地鋪禮佛毯可一殿兩旁玉帶金魚或金帶者十四五人相對列立遥望前後殿屋崛起甚多制度不經工巧無遺力煬王亮始營此都規模出於孔彦舟役民夫八十萬兵夫四十萬作治數年死者不可勝計和宋書皇天眷命大蒙古國皇帝致書于南宋皇帝爰自平金之後蜀漢荆揚拏兵幾三十年交聘非一卒無成約比者川蜀擣虚荆湖批亢生靈有塗炭之苦戰士有暴露之勞朕甚憫焉是以即位之始首議寝兵用示同仁以彰兼愛期于休息元元使天下共饗有生之樂而已且南交廣而西巴蜀北長江而東滄海分兵守險彼所恃以為國者也今戰艦萬艘既渡江以扼海鐵騎千羣復踰廣而出蜀四塞無結草之禦六軍有破竹之威人所共知不必遍舉於此時也非不能掎角長驅水陸並進秋風虎旅指揮看浙江之潮春露䲔杯談笑挹吳山之翠盖以佳兵不祥素所不喜守位以仁今之本心又况靖康南北釁端初無盤錯大故非如女真西夏惡積仇深而不可解者也往者彼我勝負之事往來曲直之辭各有攸當置而勿論自今作始咸取一新故先之以信使申之以忱辭告寳位之初登明朕心之已定惟親王上宰能報聘之一來則保國樂天必仁智之兩得茍盡事大之禮自有嵗寒之盟若乃憂大位之難繼慮詭道之多方坐令失圖自甘絶棄則請修浚城池増益戈甲以待秣馬利兵㑹當大舉論天時則炎瘴一無畏憚論地險則江海皆所習知必也窮兵極討一決存亡而後已力之所至天其識之禍自彼挑此無可歉在我者至誠可保在彼者聴所擇焉毋循前例止作虛文時薦清和善綏福履不宣白庚寅年四月七日開平府行李翰林欽叔一日與杜仲良在茶肆中有司召公甚急公曰無他多是要撰文字渠留此勿去少當即來已而果至曰為戒諭百官草詔適當筆者應奉程天翼程初入供職有猝不易稱者公遂立草五百餘字允協事宜甚稱上意其辭曰朕新即大位肇親萬機國事實為未明政統猶懼多缺尚賴爾文武多士内外庻寮上下同心始終戮力以副遺大投艱之託共成興滯補廢之功然而養資考者每務于因循嗜閒適者或託於疾病因之積弊習以成風事至於斯朕将何賴盖嘗深惟百姓勤勞之意尚不能忘累聖涵養之仁服田力穡而以給租庸輓粟飛芻而不憚征繕况爾等世膺髙爵身享厚恩夫有國乃可以有家而為臣亦猶夫為子未有國不安而家可保必須臣竭力而君以寧加之事屬方殷時丁多故舊疆待乎恢復强敵期于削平正當經營之秋難行姑息之政朕既夙宵軫念庶幾𢎞業以昭功爾其朝夕在公豈宜玩嵗而愒日夫湯刑以儆具位周典以正百官兹出話言以為明訓掌刑者有法可奉毋使有寃抑之情典選者有格可循毋妄求疏駁之節錢榖當審知取予毋吝于出納之間臺諫當指陳是非毋涉于細碎之事司農以敦本察吏不可茍且而曠職司牧民以扶弱抑强不可聚斂而營私計至於大而分閫小而掌兵固當志殄冦讐日闢土宇受朝廷之託必思報國念功臣之後常恐辱先又豈可平居或冒于糗糧臨事或生于畏懼視郡縣之官妄分于彼此役部伍之卒不計于公私凡我有官所當共戒其敬遵于邦憲務恪慎于官箴享富貴于當年垂功名于身後且賞罰期于信必而功罪貴乎正明兹誠前代之良規亦我祖宗之已事今當仰法要在決行於戲任賢使能周室果聞于興復綜名核實漢家遂至於肅清公勤者賞不敢私弛慢者刑兹無赦各勤爾職明聴朕言故兹詔示想宜知悉賜完顔用安鐵券文皇帝若曰咨爾内族英烈戡難保節忠臣儀同三司都元帥兼平章政事兖王完顔用安大邦維屏古有格言王府藏勲賞存舊典卿台階孕秀海岳儲靈天賦忠貞性資明敏初為兒戲營壘已成長學神機風雲暗曉方将提挈義旅勤勞王家服金革以不辭冒矢石而有勇頃遭逢于多壘偶陷沒於他邦而能臨事見機去偽從正變疾風雨謀先鬼神一舉而患難殄殱不時而州縣皆服聴聞如此歎矚久之朕方總攬英雄興建功業體天地含𢎞之徳厚君臣終始之恩胙爾以諸王之封寵爾以上公之位氏族已書于玉牒勲業復紀于太常同三司之威儀建大将之旗鼓盖欲宥及于十世不嫌恩積于一門泰山黄河永及爾裔皇天后土實聞斯言肆申白馬之言庸示丹書之約於戲謂予不信鑒詩人皦日之言不與同心如文公白水之誓尚奉非常之渥以保無疆之休此是左丞李實之子介然所作時為翰林修撰鹿菴云世稱米南宫者言禮部也自唐以來見稱或云指太常也米芾嘗為太常官宋髙宗善書學擇諸王命史彌逺敎之視可者以繼統孝宗其一也髙宗因出秘府蘭亭使之各書五百本以試其能孝宗不旬日臨七百本以進司馬温公注古文孝經首章作仲尼閒居曽子侍坐廣揚名篇於故治可移於官後有閨門之内具禮矣乎嚴父嚴兄之辭續夷堅志載廣府某官苦蛇毒取雄黄貯紗囊中掛四壁間既而承塵上日流黒汁視之有巨蛇一衆蛇十數皆腐潰而死自是府舍清安絶無毒物蟠蟄鹿菴云青詞主意不過謝罪􅓙災保佑平安而已宋史王安石傳論安石謂天變不足畏祖宗不足法人言不足恤雖少正夘言偽而辯行僻而堅王莽以六經文姦言不是過也東坡論浩然之氣在身為氣見于行事為節合而言之為道故剛而不餒歐陽公曰韓愈不獲用於世修用於世而不盡青陽夢炎説春秋書春王正月本無深意周雖建子其紀年實用夏正觀豳國風為可見矣只為左氏書周正月故後人説謂以夏時冠周月又謂榖梁雖迂逺義理最明左氏尚文辭却差了義理許魯齋説班固作古今人表分九等恐昔人心術行事不易知也如孔子稱四科言語宰我子貢至哀公問社食稻衣錦曰安皆為失對稱管仲之器小哉而曰如其仁如其仁伊尹謂不以堯舜之道事君治民是賊君民也而佐湯伐桀其前後不同如此又云聞獲玉山賊首害陳宣慰祐者斬揚州市予即曰若陳為善之心不宜罹此今若是命也如果得其賊天理為不泯矣魯齋為首肯栁文五就桀賛序云伊尹聖人也不夏商乎心心乎生民而已曰孰能由吾言由吾言為堯舜而吾生人堯舜人矣退而思曰湯誠仁其功遲桀誠不仁朝吾從而暮及于天下可也於是就桀至於卒不可乃相湯伐桀俾湯為堯舜而人為堯舜之人吾所以見伊尹急生人之大唐㑹要貞觀十四年陜州刺史房仁裕奏臣所管界内正月九日河變清者首尾三百餘里京房云河水清天下平宋少卿云所清處天地之氣上下澄澈故清亦如霜降水潦收而清也𢎞道又説文與可送東坡通判杭州詩云北客若來休問事西湖雖好莫唫詩坡初以為常及遭事乃知與可為知幾相如傳云倒景者謂人在天上下視日月故曰倒景課税所立於哈罕皇帝即位之元年諺云平生避車不逺一舍李受益説宋人文廟位次列子思於孟子上徳州城壁塹髙深城門内起直城前障掩蔽内外左右幔道其尾相屬俗傳云皆顔魯公制也宋校正禮部韻説廿字本音入今人作二十字用卅字本音鈒今人亦作三十字用近杭州遺火燒五萬餘家延及御史臺少府監燼焉至秘書監救得免有人作賦一聨云公道不行臺遂焚于御史斯文未喪監僅存于秘書觀顔魯公忠義堂等帖偶悟公書勁而潤盖筆善轉而韻勝故也何㕘政繼先説大名宣撫司㕘議烏庫哩貞區處事機甚有決斷時奉朝㫖死囚呈省待報其餘邊闗雜犯皆從便處決時圍李璮於濟南人心中外不安烏議一切重刑欲皆戮之使由子明以下皆以違制不從烏與左丞濶子清謀曰璮賊未下魏為西鄰不便宜從事無以震讋衆庶竟戮之市人稱臨事知權變云貞字正卿小字四和馬前朝近侍局大使晦翁明道論性説生之謂性止生之謂也天之付與萬物者謂之命物之禀受於天者謂之性然天命流行必二氣五行交感凝聚然後能生物也性命形而上者也氣則形而下者也形而上者一理渾然無有不善形而下者則紛紜雜揉善惡有所分矣故人物既生則即此所稟以生之氣而天命之性存焉此程子所以發明孟子生之説而以性即氣氣即性者言之也皆水也止各自出此又以水之清濁譬之水之清者性之善也流至海而不汚者氣禀清明自幼而善聖人性之而全其天者也流未逺而已濁者氣禀偏駁之甚自幼而惡者也流既逺而方濁者長而見異物而遷焉失其赤子之心者也濁有多少氣之昏明純駁有淺深不可以濁者不為水惡亦不可不謂之性也然則人雖為氣所昏流於不善而性未嘗不在其中故人不可以不加澄治之功惟能學以勝氣則知此性渾然初未嘗壊所謂元初水也東坡云昔之為性論者孟子以為善而荀子以為惡揚子以為善惡混而韓愈氏又取夫三子之説而折之以孔子之論離性以為三品曰中人可以上下而上智與下愚不移然孔子之所謂中人可以上下而上智與下愚不移者是論其材也而至于言性則未嘗斷其善惡曰性相近也習相逺也而已晦翁象刑説周穆王五刑皆贖復舜之舊不察舜之贖初不上及五刑而穆王之法亦必疑而後贖穆王之事以子料之殆必由其巡遊無度財匱民勞至其末年無可為計乃特為此一切權宜之術以自豐而又託于輕刑之説以違道以干譽耳觀蜀工孫知微造様渡海觀音像足前有謂小百花者盖作一大青荷葉上布散諸天花故云又觀馬雲卿臨吳道子轉山北斗圖凡七人中有被甲者又觀周宣王宣榭敦考其欵文至至元戊寅二千年矣顔魯公書出師表後題乾元元年戊戌嵗蒲州刺史顔真卿奉敕書予以為雖顔氏童僕尚不至此恐是世俗好事者為之盧摯説嘗聞諸先輩漢去三代最近髙祖有為之主不能革去秦弊復井田封建之制此蕭何之責因與論作文當於易中求難難中求易相鑑之作當以蕭何為首一日左丞姚公謂余不若自臯夔始而下自無首尾為間余詳思處變之極反經而不失其正者莫伊周為大故自阿衡為首宋賔客云河水清河隂精本濁而清不惟異常亦水氣之極盛也李受益云祖宗次序自曽祖以上為五代祖増而上之也鹿庵云今之聲韻始自沈約及觀今禮部韻如十灰十三元音殊不協何以知其自約始以文選前聲韻不謹嚴知之鎮國寺栢上生芝中宫有㫖令院官究其祥以進因與李受益具事實如左論衡云芝生於土土氣和故芝草生古瑞命記王者慈仁則芝草生瑞應圖王者敬事耆老不失故舊則芝草生酉陽雜爼云屋柱木生芝黄者為喜陶隠居云今世用芝此是樹本枝上所生状如木檽音軟抱朴子云木芝者生於栢脂名曰木威喜夜視有光本草云霍山生赤芝名曰丹芝常山生黒芝曰天芝泰山生青芝曰龍芝華山生白芝曰玉芝嵩山生黄芝曰金芝唐公逺靈芝經曰芝木之精也芝四季皆生名曰春精夏精秋精冬精又曰青芝一枝應木酒也宋敏求春明宫退朝録唐禮部郎中知省中詞翰為南宫舍人百日後必知制誥又載初學記唐𤣥宗為諸王從學時命徐堅定撰雖名初學終身觀之可也雪菴李禪師與余觀栁誠懸書何進滔碑李云栁書法度最備予曰然然誠懸書令人易厭不若魯公筆法愈觀而意無窮也栁窘於法度取媚一時中枯而無物顔意無窮盖以忠義之氣中貫之故也雪菴為首肯劉太保嘗云中興頌雄偉如驅之一字若千金駿馬倚丘山而立歐陽率更三帖一姚将軍墓誌二化度寺碑三追贈隋譚國公詔時貞觀五年也化度碑李百藥文率更規模一出黄庭至竒古處乃𨽻書一變爾李禪師説作字有得筆意時有得布置時趙大中庸説嘗見遺山與張緯文相謔見碑文過余曰遺山又貨了一平天冠也鹿菴説董奉御近贈一歙硯殊發墨且増其色馬雲漢説大庾麥無芒圓大謂之和尚麥後宋宰相韓􅇑胄嘗改諸州後園蓮沼為放生池詞臣髙文虎作記有云鳥獸魚鼈咸若湯王所以基商後髙作主司出硬題困舉子一科生以髙用事悮作一小詞嘲云髙文虎誇伶俐萬苦千辛作箇放生池記從頭無一字説及朝廷只把􅇑胄歸美夏王道我不是商王鳥獸魚鼈是你劉元城與司馬光嘗論𤣥宗初年焚珠玉於前殿時有云焚之前殿者盖欲人知此好名之心也一日侈心復回其弊有甚於此者晚年果如其言司馬公云惜乎史失其姓名至今為恨又云人君去賢任佞譬如治病飲良藥可愈非良藥即死明知之只飲惡藥既飲惡藥非至死不已盖𤣥宗暮年用相知林甫蕭嵩之佞用之甚久知張九齡韓休之賢退之甚速張萱畫則天朝六蕃圖其布置取則天遊上苑詩意明朝遊上苑火速報春知花須連夜發不待曉風吹又太宗朝蕃王軸文皇乘一花輿四近侍肩舁云閻立本筆有詔集百官問鈔輕物重事大學士王鹿菴對云物貴則不足物賤則有餘要以節用而不妄費庻物貨可平宋少卿𢎞道説葬書分五姓九星又有棊旋正式風水土丈二尺下為土龍界又丈二尺下為水龍界過此則吉又説唐太真改葬祖墓上有紫藤一株隂影甚茂既伐去紫藤流赤津如血不數年劉氏滅之殆盡因以往嵗改葬先妣夫人靳氏初啓𤣥堂其棺盖露珠交布成文如所結纓絡然甚可觀也復有二黄蝶飛出其露華移時方晞宋公云在葬書此子孫潤澤文華之兆别有記以書其詳慶夀長老滿公曾住泰安天保寨聞上人説党竹溪未第時家甚窘至令其子為人牧猪燕城西南門曰端禮有大定末劉無黨所撰左丞唐括安禮碑有云尹大興時迎午休吏燕雀語堂下人不知有官府之詞康節與客遊嵩山中途客指所憇樹問曰此何日枯悴先生久不對客疑焉答曰非不答吾有所俟也俄一葉墜先生曰比吾二人還亡矣既回樹已為人伐去占法盖取葉墜時刻而定其存亡者焉鹿菴與顒軒論事顒軒曰天下事亦有不可以理槩知者鹿菴大為不然徒單公曰謂如大城南栁樹若不親覩如何知東西幾行大小幾株鹿菴為黙然一座大笑晦菴云張良曹參二人皆學黄老子房體用兼備曹得其體而不得其用又云漢自武帝朝宰相但行文書而已秋澗集卷九十六欽定四庫全書秋澗
