body:
  text: 遊百家巖四十一韻兩紀山陽城行役凡七過佇瞻百巖雲屢往屢不果亭亭白塔顛望逺㡬招我今秋若有相老玃脫籠鎖二三㑹心友與遊無不可初從萬户門迤邐陟層坷石林轉幽深到寺氣㡬愞截雲駭巨屏勢軋坤軸妥天闗瞰絶巔黛色潑峻朶三纒上杳㝠兩袖巧包裹谷深餘繚曲石怪欲垂嚲何年緇衣徒詩境闢飰顆或疑巨靈斧擘削乃爾硪僧殘失珠寶寺圮驚甑墮寒猿從何來跳踉百十箇近人不少怖掇拾落殘菓有草名龍須纎潔豈容涴崖絶不可攀殆似衒奇貨最憐明月泉流瀉不細瑣玉虹貫山透噴灑螭口拖我嘗遊三嵓景氣固云哿未有此泉勝翕合瑶峪大怳疑神物潛供飲結僧課徘徊醒酒臺石老書字娜憶當沉酣時萬象入眺卧八荒敞庭衢日月螘旋磨下視區中人宜為蜾與羸復尋淬劍池履􅇖不辭跛澗黒不可渡悵望藉草坐山僧似嗔余空踏苔蘚破萬槲霜葉丹鍛竈烘熾火有懐中散公材大識或麽至人戒其偏康銳不自挫當時朝右奸如㑹鬼見唾吹毛不此施淬礪安用那徒為論養生竟落非命禍長歌下山門世累訝許夥寵辱未足驚門閭續弔賀吾須人為徒長往非所荷正煩日用間克我偏與頗賦詩約重遊備豫木客和謝王中丞惠柏栽我家西河阡清陰不多植白楊風蕭蕭萬葉空戛擊君家手種柏蒼榦照城壁移栽滿山丘鬱鬱嵗寒質丐餘補不足雅意許波及恣取不我貪廣種庶多得慇勤教之法水土要相適又云樹平壌根柢雜沙礫蒼宫雖鬼庭在木躋夀域根蟠泉窟深氣接太行碧佗時兩喬林黛色看千尺大招逺遊魂納此衆香國百年見諸孫鶻立太陰黒若問物從來渤海王氏出飼牛辭我性本疎拙壯年樂郊居况兹二頃田近在城之隅兩紀官為家耕牛老無餘秋翻已失計春種烏可虚浮陽漲林坰我甽猶荒蕪傾囊買雙牸典却杯與壺齒嵗固云穉野牧多形癯角浪黯無光寒氄躁不濡服耒試壠頭喘息久未蘇田家作雖苦大本誠在渠嘗聞老農言力盛出壯軀時時過皂隖付囑飲食劬早晏日有常鎖屑豆與芻均匀細為和回噍皆至腴顧立終所䑛對之為嘻吁半生遊宦間代耕竊官租雖乏濟物功遇事多直愚鬬怯公戰勇不知夏畦諛古人發畎畆開務荷天衢有莘伊衡耕南陽孔明廬大賢吾敢望恥作遊說徒咄哉奚戚輩販鬻庸自汚百里西入秦炊扅感妻孥養生五羖皮其志還自如越褐不掩骭夜半歌嗚嗚應憐南山粲中有尺半魚一朝遇霸主立談開逺圗我歌意有在歸來事耕鋤水溢繼旱乾二年儉缾儲力田漢重科躬耕需壯夫我老理當佚反與若等俱塗霑固不及風日儘瘁枯筋力日衰耗毛髪不滿顱平頭七十數温煖帛肉須舉家二百指張口待爾鋪田間一笑起謀生太區區非闗效周人白首悲窮塗庶配耒耜經因之補叢書種蔬風人憫東周饑饉何薦臻一飢未為窘二事何並云當其榖歉時一菜真偏恩減粒倍蔬茹儘足濟餓貧我田在溪曲有圃逾一㕓十年廢不治草闇野井眢飯糗日兩盂舉桉蔬為先顧瞻畫义手日食無幾錢甘受宣父誚課兒斸荒烟嘗聞饉不驚示貶中書堂况我田野人鄙事亦備嘗東家乞蔬子西家學種方分土作長塍繚垣為周防劬勞不旬時緑畦變天荒朝來見生意次第青與黄春韭存夜氣夏葵茁屯芒努力辦一飽藉爾為半穣大哉烈山柱濟物心遑遑草木别真味擴充神祖嚐雨露天地恩水土仍君王智能創而述功用有至藏皇風𦕈無及庶物昭回光配社徳罔極萬代詎可忘餞王和之北還王郎自燕來不見凡四載拜起寒暄餘命坐至於再靡然衰俗中持身敬勝怠出言口不能遇事意何慨瀾翻譯語詳宛轉刀筆快幾年民部間奔走事多賴負責在人先利心非所在所以郎曹官倚用例深愛朅來衛南􅅠治任將北邁為余閒著書論說餘教戒探微尋墜緒發源疏九派贈言為至榮在公猶謦欬賤名見諸編儘足光四代常觀長厚人往往福未艾行矣愿所守揚名此無外芸香霏版籍鴈署雜書袋飛翔得所止早夜更匪懈㑹當長安陌軒翥看冠盖汲冡懐古丁亥嵗三月十八日觀稼西疇遂至伍城抵安釐王陵下歸作是詩者盖自江左平後竹書多傳於世余憂好奇攻異者讀之恐有致逺汨泥之弊故不得不辯云濔迤伍城郡背水猶陣圗魏陵廢已久磅礴如覆盂草樹慘不春穿穴狐狸墟我來登其顛懐古心躊躇憶當戰國際安釐亦狂且澤麋被臯比坐為秦人驅敗亡自此始保邦何乃疎不知身後藏安用書十車上窺姒與商下逮蒼周書汗漫亂竹簡詭說何紛挐征南辨已詳多出行怪徒稽古不適正死為毛穎誣其中亟當辨阿衡被夷誅孔子修六經亦已防奸汚大書一徳後薨𦵏開亳都在易最奇法安取理所無兹焉萬世程洋洋真聖謨何煩事幽賾致逺泥所趨長歌望陵去樂過風乎雩夀弟監使仲略淇澳望鄧鄙迢迢千里途吾弟官其間筠林辦公租十年㡬兩見聚散何須㬰今嵗乃天幸同歸在鄉閭朝昏對無時談笑樂愉愉春風露堂飲盤餐雜肴蔬絲竹厭啾聒却去從歌呼曽及兩耳熱仰空作嗚嗚張燈更大白要盡罍與壺都將積年懐一洗中無餘健倒不知曙醉頭同與扶扣瓶得餘醖忘却公堂趨時以事侯府下兩宵對牀眠百篇詠徐徐静聴未容再恍陟西崑墟鬼窟易作計犬馬艱為摹吾弟擅所長愈吟辭愈都意圎兼理到韻逺幾風疏宛從尋常中奇倔驚專車又如荷盤露細大皆成珠章郎五字吟花樹欣遊車今夕復何夕香滿先世廬近復示新作篇篇商起予玉美韞櫝中得價不待沽倡者凡幾輩賞識風雅殊今者重有喜不為文字娛君今知命年我亦耳順踰素髪各滿領不樂復何如况逢初度朝怡怡與之俱膝下分戯綵朋徒日依於我有一尊酒殷勤三禱渠一酌願君夀金石堅不渝再酌官事利百谷為一攄三酌日康寧神相千金軀貴冨天所與道義我所儲居閒未落寞畏途足崎嶇家理即邦政繄孝與友于長歌復一杯此外非吾圗縱詩皆漫與此詩吾特書酬紹開提刑見寄原韻我老不足畏閉門欲誰親案頭有遺經卷舒無時旬平生未嘗學於焉究彞倫既非目擊者補拙需以勤其或少有得庶浹羲和春吾子四科哲勲名逐時新邇來亦斂翮淵潛思自珍有時縱諧笑傾倒冠與巾豈知寄傲餘落筆摛雄文客來示新作郁郁皆卿雲擊訓狐訓狐本惡鳥飛潛林谷間眎夜反為晝聲勢何軒軒矜凶聚妖異其氣㡬神姦家僮夜得之縛致庭階前目光爛兩炬狂躍倖一鶱羣兒顧之駭四走入席眠我因為沈思善惡以氣宣古云鷹隼輩不如鳯與鸞以兹惻隠心逺彼凶與殘胡為止我屋夜半呼聲乾女奴前致辭此物何足患西家養已久逸飛偶翩翻内疑始冰釋念之心稍安緬懐昌黎公心炳陽烏丹彎弧親斃之絶類不使蕃揮䇿碎厥首亦與韓意然長令杖端血著此一綫殷比跡於段笏異世同不刋起視夜何其斗揷西南天蒸雲變曉黒漠漠來輕寒明農亭我田僅二頃近在清水涯宦遊苦不巧歸來把鋤犁樊須被聖闢彼士當有為時有利不利一飢胡可醫士而食其力安分至極冝繄予事農圃三嵗慘不怡四郊氣隆蟲澗毛成悴萎釋耒得窮處日坐詩書癡樵蘇甫有積瓶儲復無幾餬口恐不給奚暇卒嵗衣明農榜新亭此意空規規有懐靖節翁起為三徑資分種秔與秫一稔欣有期豈知事大謬折腰困憸微斂裳即宵逝一粒不入頤蕭然環堵間老飢日相持九華安足服嚼句充朝飢士貧理雖常念之令人悲空餘身後名萬古流清輝天運既若爾吾道將安之過此或有作殆與天相違怪石辭巉巉荒谿石濁滓凝太古顧雖一拳小岌立有足覩牛神兩顛撑山魍一足拄移來夸娥擔劈截巨靈斧蒼雯裂荒寒老峽濯秋雨千年洪水餘石浪尚掀舞又疑秋江蛟蛻骨委幽渚却愁出雷火下取還洞府要從五色族軒鼎入練煮元精儻不充備豫女媧補從渠置散地不第奇章譜疇昔一首寄胡紫山戊子十二月二十二夜疇昔夢紫山燕集街西居又撑瓦傘底一笑春帖餘四顧盡佳客半是髙陽徒紫山正襟坐手把一卷書疾讀且稱嘆照眼皆驪珠乃云某近作商也真起予吾儕惜無㡬炯如曉星疎正須佳眠食善保千金軀别久得一㑹喜與老叟俱呼兒具罇酒張燈列肴蔬觴予不數行致辭前見揄平頭七十數眉毛雪糢糊投閒天或憐有書心便娛又云悼亡來不以再娶圗老懐固鰥鰥宿業一掃除殘年累幸輕恐是得夀符敘濶夜向深對牀卧斯須輾轉寤寐間恍然到吾廬春明煥庭軒門縶雪色駒倐忽坐壌舍意若傷道汚彼豈能我凂髙氣初自如體融合若一樂適歸不殊安得自伊始終嵗同步趨或乗欵段馬或駕下澤車春風十二窩醉墨翻瓊琚相看以佚老脫屣榮與枯夜寒薄重幃夢清誰遣呼枕邊有鐘鼓鼕鼕應更壺起聴夜何其漏下三更初念兹夢何異自况良可吁紫山俯秋澗玉峰映汚渠固知瞠其後庶可山澤臞援毫記所遇一字不敢渝代書寫離索涸魚聊自濡何當拊素筝醉捋桓侯鬚取其使君不凡之意元日吟深院咤祭餘黎明紛賀拜齊飲藍尾杯傳嗅辟瘟馤獻嵗事多冝晚景福未艾鄉隣最善禱有錢無病害兒童樂新年添嵗漸壯大老人死生忙應接筋力憊元正貴清明其占君子泰多連人日陰野老足吟嘅今年天氣晴日色暄可愛相竿絶微風羲馭飛火盖牆陰凍全消水陽冰自壊布席坐前簷欹傾餘醉態一冬苦凝沍乍暖欣曝晒頺然曲肱眠夢到華胥界宿酲與臘嚴融暢無内外放教原壌肆大豁伯夷隘温温泰和湯股痺為一差覺來喜不勝嚼有屠門快持美欲獻君癡絶覬霑丐嗟哉𫝊生行客從大梁來投刺謁蕙帳再三相之坐氣貌何骯髒袖攜一卷詩照映青藜杖起立懇予觀詩竟見雅唱傅生南樂人明兩自㓜喪聴官奉心君入耳物能狀曖然内含光記誦殊通暢我思篤廢人氣志多散放苟能豢此軀那記非所養傅生痼而卓出入知所嚮不學陰陽流甲乙肆虚妄復惡鄭衛哇恥列師瞽行六經天浩浩義理無盡藏游心於其間取友千古上古人不復見古心胡可忘古心果云何姬孔乃心將循夫天理公絶去私慾王神光滿牛背安取内外障師傳庶西河爽識或晉曠不吐張籍奇猶可祖珽相世人非禮視外蔽内隨蕩思屏心過易眼過最難愴一根塵幸空内動息孟浪作詩還自笑示勸隨彼量大匠無棄材長短皆有望文昌藉終譽尺書軍欲張豈知我非韓徒増山斗仰處暑日偶書丙戌嵗七月長夏便幽居動静得交養杜門逺炎囂人事息來往三年謝簪紱倦鳥脫籠網生涯書滿屋汎覽極遐想欣然欻有得志却折俎饗一涼沐新恩允治多峻朗殘暑竟餘熾木葉戞清響好風從西來一雨為滌盪氣骨増老健絺綌䬃餘爽赫然酷吏去而得故人訪草木行變衰騷客重悲愴况復迫暮景嵗月驚俯仰浮生太奔忙壯志非昔曩時至氣自衰心在不忘嚮要知配義剛毎戒揠苗長人生老當佚我老事耕壌有田不及蘇開徑謾希蔣一貧非所憂俗事苦紛攘娱心筆補衮甘分弨居䩨兹焉庶有成心體日胖廣窮兒即暴富孰羡軒冕儻何煩問大鈞自㫁示諸掌㪣門看竹來一笑豁心賞秋雨中書懐秋氣何泬寥寒序變淒渰木葉與時謝芳菊得秋冉生涯無少營書史有餘覽静尋古人心理亂見忠諂薄田待耕食雖苦猶嚼欖稍豐不外求卒嵗飽羮糝既獲飯蔬樂又免素餐忝吾儕當壯年頭角露嶄嶄一為客氣乗前進率勇敢才行有所疐欲止不容憺尚恨才術疎而不大其膽隨即事變來長網驚一掩天意深有惜不遣入習坎委心聴自然致用毎縮斂宦巧輸晉衍戅直終漢黯世途伏莽間舉足中機險虚名竟何用抵事纒􅇄坎唯餘讀書心連綴若紘紞秉徳思一心覺衰誡多感古人了婚嫁家事㫁不攬賢哉靖節翁歸卧斜川崦怡然擁敗絮一笑慰佟儼多生各有分過慮譲憂貶當時曠達懐樂過鼓瑟㸃因復念涪翁亦厭俗累染異世同其流漆板書何醰青山與白雪江湖𣺌而湛終古無少異曽有不足窞窮年為形役膏火自煎欿齒髪况日衰神情豈任晻正須慎圭璧不致有瑕玷惟天有盈虚賦分自豐歉天運審如此終老樂貧儉世或昧兹理遇塞强鐫鏨我恐傷天和作詩時自檢餞侯敬甫還汴侯君司竹君調度去聲纔年半去春特停罷公私或云便繼差上官來新舊盡交散衣袍到緼弊未免積垢綻支持一載强非汝不易辦天姿公戰勇奔北獨與殿昨從汴梁來相過為飲讌坐間出片紙喜色睟於面乃云監復立將集此微霰財賦至復任斯人不多見愀然忽變容不覺當饋嘆操刀截鼎肉有味誰為雋半生媿兹心而向此中轉若來期半嵗整示見闗鍵蠲潔七賢譏去應一鶚薦脫落小規為追逐接時彦擬慿素所懐髙舉酧吾願仍說解由事不了無一件俄爾來告别牽率復還汴祝余贈言榮歸代賔朋羨厯聞君所談行止渠自判何庸待余言樂處戒久戀最哀同寮子臨事本怯愞壯士被蝮螫慷慨有解腕懸絙即自經而釋身後患更無拙計人一死循鳬貫常嗟白面生時務少諳練大概說不差節目多自絆米鹽瑣屑間居之要無倦君看韓侍中張本府推幹行矣夷門侯前塗况多援髪壯吾舌在槖罄志曽變花様又時直何患不光炫望崧吟至元丙戌長至日追作二十韻往嵗試洛師憶與節齋約同作崧少游心賞為一豁羸驂鞭欲前竟為事所却宛循洛水東馬首眺陰壑洪濛元氣湧磊落雷雨惡不有此峻極安得雄四岳只縁不得登萬象負酧酢諸峯罷六六景氣終慘錯披榛入㑹靈宋離宫名吟倚廢宫角陳公最健者師可三軍奪空餘墜仙興出世說飛墮迷嶺崿歸尋黒石渡易馹指鞏洛行行嘆不勇失此寧復作吾儕貴乗時過慮自羈靮至今有餘恨夢繞神崧脚盤空轉危磴矯首看飛閣探穴不知畏入室不挽葛兹焉即神清洞户四開濶山人喜余至供具為止泊㑹淩列宿嶺一笑動寥廓宣城筆己丑秋八月三十日晨起試宣城筆前一夜夢對御陳事故有入閤侍立之語江夏無雙公翰墨能事畢平生稱快意揮洒得此筆圎如棗心大銳比囊穎直横馳屈産良細揷蜂膂悉鋒柔得字易心勁腕能適赤管纔握餘貶削失勍敵䇿勲嫓中山落紙生五色或簪豸冠霜或泚螭首墨入閤與賛書侍立天咫尺雖非山甫儔萬一補衮職賦㐮邑蒸豚尹劉濤字君玉予為都司時部提控令史相州人我行錦㐮野田間多牧豚不沾欄苙溷不識糟酵渾渴飲苑溪飽嚙香阜根所以味佳美萬有空其羣故人得劉宰紅蒸具盤飱俵淺食不饐體芳腥未聞今日復何日大嚼過屠門他鄉固肥腯性燥空突奔有時嘬其肉一筯増餘惽乳烹謝晉豪禁臠未必尊柔毛詫沙苑盛餐厭羶葷未减貨所饋往拜禮合殷物産貴得地橘與枳遽分藍田異崑丘而别璠與珉人生與物殊善變觀鵬鯤雙廟懐古鐵舉動地來獵火燼九縣睢陽東南衝江淮國所援蔽遮不使前恢復可立見二公明此機死守誓不變雖危所保大如蝮螫解腕最難結衆心存没匪石轉彼蒼畀全節誰為落賊便已矣君不忘握爪掌為穿竟能濟中興淮海了清奠至今忠烈氣皎皎白日貫賀蘭觀成敗不飲浮屠箭殺亡計多寡此論誠可辯我來拜遺像凛對如生面乞靈激懦衷剸決剛同鍊朔風大樹聲尚想登陴戰暮依暈月城悲歌淚如霰虞姬墓在靈壁縣東三十里虹縣道南陰陵山北舊有廟在山上今廢重瞳鮮情人鍾愛獨虞美五年有天下寵幸想無比一朝走陰陵楚歌聞四起君王大事去飲訣共欷歔感君伉儷恩死不為漢鬼一丘鳯陽東粉黛見石紀空餘山頭草纔歌葉披靡定應月下魂長繞烏江水江船二詠蓬尺簀編黄蘆節次數須隻長短隨所宜張弛易為摘長者二十七節廣二丈餘一傍繫脚索若網綱總緝北人布為帆南俗蓬以荻舟師貪重載髙挂借風力順流與遡波巨鷁添羽翮望從逺浦來一片雲影墨亂衝渚烟開重帶江雨溼百里不終朝用捨從順適夕陽見晚泊堆疊紛襞積水雖物善利其助乃爾益櫓江船一鉅魚櫓柂乃尾鬛當其淵水深棹弱不捄乏故今施航後前與棹力合濟川具有五此物乃其甲一聲天際來欸乃中流發我浮大河東並岸行若狎終朝卧舷間蘭槳但空揷緬懐剡木皇智創萬古法舟宿桃源縣長路風日淒逺征力難勝捨鞍事舟行庶便寢與興蓬底坐秋江􅋏如在鞲鷹有時縱逺目汎若孤槎星河從西北來勢建東南瓴萬艘水上下浩浩無時停利名任風波醉著誰復醒間看兩岸移轉盼烟中汀晚泊桃源下波光亂漁燈静卧船舷間拍拍風水聲舟人話夜潮使君老毋驚又云此水樂君其細為聴劉營田拜慶詩人生所欲夀有夀貴健安接物心思瞶曵履行步艱雞窠日省定此又何足歎耿濟劉營田字太初事親有餘歡母氏夀期頤髪艾顔渥丹步趨不扶杖目視分遐觀怡神奚服餌終朝例三餐共云子致樂諒自家有閒結䄜見壼儀教兒列時官豈惟一門樂化及濟岱間徳盛福自備百嵗到不難朝家重貞静露恩不時頒行當見旌崇寵光爛門闌車簾蹙繡額誥錦回翔鸞肩輿王與陳一旦相追攀兹焉荅春暉寸草心能單我詩嫓彤管要作後代看食鱸魚鱸魚昔人貴我因次吳江秋風時已過滿意蓴鱸香我非為口腹物異可闕嘗口哆頰重出鱗纎雪争光背華㸃玳斑或圎或斜方一脊無亂骨食免刺鯁防肉膩勝海鯈味佳掩河魴燈前不放箸愈啖味愈長張翰為爾遊我今赴官忙出處要義在不須論行藏倚裝足朝睡且快所欲償夢驚聴吳歌海日方蒼涼長至日次赤岸驛扁舟下餘杭逺客逢佳節呼童起四更理棹未明發燈前一杯酒持飲聊自恱江行官有程貴重敢中輟此身得安舒行止聴驅䇿去冬一陽生露寢樂良夕餳茶雖草草初不失家食今年赤岸亭野宿雜亂聒鄉闗天一涯雲水㡬重隔殘年無定居餬口走閩越眷焉不無情念久意為惻兩舷暗浪喧拍拍若嗚咽寄聲紫山翁此懐多不别時任蘇州提刑平望道中今日風色好舟行喜清和吳江抵嘉興逺不百里過解衣坐蓬底閒聴吳儂歌大艑從東來帆穡鬱嵳峩云是淮海公赴召躭微痾倉皇不少住進棹如飛梭物情忌太盛從者不得多尚餘蔽川載意氣隘兩河有懐陶朱公霸業到不磨功成委之去敝屣與棄蠡左顧萬金槖右顧西施婆可想不可見五湖𣺌烟波太安嶺亂山從閩來勢若萬馬騁六丁闢坤闔通道取此嶺仰觀已可怖初陟戒太猛乗班事推挽氣鬱頸生癭既升頗平夷六折到絶頂最慮泥雨滑沙磴足易整俯臨盡黒澗一漫漲雲影佀矜吾年衰不遣見􅇖景一山勢兩殊限隔示外警北登儘坡陀南下峻深井牛肩抵風門岐東轉幽逈湍泉激南駛噴薄萬壑冷人生此兩足停輟不俄頃舉縁聲利牽走險不知挺我獨喜壯觀大嚼快雋永好奇與馮生比較略相等漢家截海表兹嶺乃内境行人無晝夜闗吏初未省徒令踠馬足安用障巨屏暮投大安傳燈火破窗炯吐我胸中奇削此疊嶂梗此事特遊戯夜久凍生穎控馭稍得宜雖險勢莫逞黎明呌雲去有懐為耿耿自淮口抵宿遷值風雨大作拖舟入清口適喜亂淮碧崔鎮抵宿遷徐行讒半日朔風殆驚余不爾何凛慄江雲作陣來凍雨矢四集行牽人力微泥爛漕岸側打頭為旅拒遇淺殆鯨吸波神鼓餘勇洶洶波浪黒勢張互相薄力進硬與敵欹傾乃平常簸蕩不少息秋江𣺌無涯終日困跼蹐夜眠任倒懸晝坐自撞擊試身一葉舟淩轢蛟蜃窟逺道胡為來行止吾豈必相值當奈何安順險能出有塗莫舟行此語聞自昔君看坦塗間風浪猶莫測處身苟無方往往半乾沒居安貴不㤀遇險戒無佚所以長樂老進諌及御失行行入吕梁持守要愈惕吕梁吕梁世所畏往往舟碎破我來相其衝說者無乃過南洪一石垠北梁更么麽水淺但湍急欲上船旋磨更縁暗石多重載防石左舟空人力衆徑往彼無那豈云水至柔内涵沉溺禍至人特為名過者戒微墮舟行四千里冒涉銳盡挫髙歌幸無虞猶呼細茵卧寄聲畏塗間識者當有和秋澗集卷四欽定四庫全書秋澗集卷五元王惲撰五言古詩
