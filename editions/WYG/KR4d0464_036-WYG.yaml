body:
  text: 醉經堂記王子築室于中唐既落成掲之曰醉經客有過而疑焉曰古之人名其室廬盖皆砭所欲而儆不逮今吾子年踰强仕讀書學道積有寒暑方以醉經為志且平日所尊何經所嗜者何學耶予應之曰人孰不飲食而得其味者或寡矣且天下之事必綦其所嗜而後得如易牙之别味養叔之治射秋之于奕伯倫之于酒惟其嗜之酷故能造其極而嚌其胾者矣矧五經者聖人之成法生民之大命係焉若夫盡乾坤之變極萬物之情神鬼之所以幽吉凶消長之所以著使人窮神知化樂而不憂遯而無悶者易之道也性情之所發禮義之所當止天地鬼神之所以感動草木昆蟲之所以能區别俾多聞博識益耳目之聰明者詩之教也五帝之建極三代之授受邦本所以基而固生民所以厚而康布在方䇿示人主以軌範者書之奥也飲食有節進退有度使君臣父子兄弟朋友之間上下志定而無僭越危亂禍者禮之實也公是非明褒貶君子小人之所以分亂臣賊子之所以懼萬世而下使大中至正之道綱維世教不至于魑魅魍魎者春秋之法也斯五者天下之達道堯舜以之無為湯武以之順守周公以之輔相孔孟以之垂教伊尹之致其君顔子之樂其樂其皆出于此乎然非嗜之酷資之深守死善道殆未窺其窔奥也若予也幼而學以舉業汨其真壯而仕以㝠行易所守内乏中和以植其本外欿禮義以制其宜望道而未見歠醨而失醇所謂清廟之𤣥酒至道之膏腴時或揚觶一嚼卒未造乎古人中聖之地故事變之來酬酢倒置鮮中律節此無他志之不立經之不明故也嗚呼予乎其將醉于經乎朝而浸六藝之濃郁夕而味百家之異同然後躡丘臺而望千鍾之聖騁奥府而追百觚之賢神凝妙理心粹太和浩浩其天淵淵其淵不知我之醉經經之醉我是則醉經為志不其曠且樂歟重為之歌曰能者在人不能者在天幼學壯行訂夫學之正偏道之隆汚一聴天之云然彼君子兮盡其性之所全故無入而不自得焉有河上丈人者出庶幾知予心之拳拳客曰若子之志似酣且適矣尚何言哉迺揖而退因書其言于壁不惟志其所欲亦且規未至者日就月将果能粹于全經者乎時至元丁夘夏六月中伏日醉經堂主人王仲謀父記博望侯廟辨記頓坊距汲縣東北二十五里川原衍沃泉流交貫盖蒼水沇洑至此而後發厥田宜稻與麻平時修竹彌望號稱小蘇門按圖誌其地殷墟近郊太行之朝陽也坊北不百舉武有岡陂陀際山西來岡首有祠俗相承云漢博望侯張騫廟侯之冢在焉予讀西漢書騫自建元中使西域通烏孫而卒冢今在漢中此安得騫之墓所哉是乃樂史所辨汲縣東北三十里有岡曰博望上有石墳洎二石表云張騫冢非也乃故原武典農高府君之神道呼為石柱國者是也然不明府君何代人而典農魏晉間秩號見晉書何曽傳曽為汲郡典農中郎将其于郡人有功因屋而祠之昭昭矣今縣治去頓坊二十里而遥曰五十里者攷之盖距古汲城而言也又按唐志書武徳六年改共城為共州置博望縣此亦因岡而為名故土人不究是非直以岡縣名與騫侯封相同遂指為騫之冢廟何其誤哉至元四年外叔韓澍來官數以廟辨見囑予因為說曰明則有禮樂幽則有鬼神幽明雖殊其理㒺間騫若有靈恐不能一朝居此且以名亂實者君子惡之守令者民神之主也一旦有事祠下幣祝交獻明以典農髙君而曰博望張侯吾誰欺欺神乎言且不順而望神之妥靈肸蠁吾未之信也嗚呼正名實明祀典有司之事也今侯之為縣首以孚誠感通神明致雨暘之應以利其鄉人故正兹名實之不正足以見侯之莅官興事不苟云嵗丁夘壯陽月夏至後三日郡人王惲記洄溪記有銘王子性僻野喜泉石樂之窮老而不厭間嵗買田郭西廣且百畆土瘠而甌寠特以溪流回護居水之腹景氣古澹令人有足愛者且清泉二水近自蘇嶺逺發黒山至共西南而後合縈帶林野百里而後渡汲予嘗登丘望逺溪自郭氏林塢徑北流運肘而東指盡三里而北騖沈沈無聲若白虹西來束田為腹視兩際為最深惟其崕岸峻曲故淵流紆緩黛滀膏渟倒影空碧其或滙而為盤渦漾而為浦溆横烟漠漠魚鳥飛沒此溪曲之大率也至若林霏未開披拂縞練風漪遡行殆縈而轉夕月秋霽瑤琨滿溪流光空明蕩而復回金支翠旂有來虙妃鷗汎汎而不下舟搖搖而若維是則淵洄泱泱容態百出澄萬慮駐景色可喜可觀者也若夫􅔿淪淵黙溪之靈也浸潤原野溪之徳也窟宅蛟鼉溪之神也變態曲折隨物賦形溪之文也衆壑來㑹翕聚呷納溪之量也湯湯洋洋旦夜不息是又溪之無䀆藏也豈幽人志士樂而不饜者良以此歟予久閒寂若為時所遺也日以杖屨倘徉溪上屏蓊翳逺馬牛疏薉惡以潔溪之流居無㡬溪之神似喜予之主也林壑從而増華雲烟為之動色臨溪而漁藉草而坐不勞登涉指顧之頃其溪山之勝魚鳥之樂䀆在吾目中矣王子于是醉而歌起而舞振靈修之逺駕襲九淵之神童不知世之逺我我之逺世將淵潛以自珍也昔栁州謫永易冉而為愚元結刺道以潛而銘溪今予援二公之例錫汝曰洄溪其誰将不然安知夫溪神不擊節嘆賞喜其名嘉而實得時出歌舞以樂其不世之遇也耶銘曰浩浩川流逝何速兮涓涓石霤時或窮兮水維淵淪物所鍾兮吾庸名汝亦自容兮汝安吾命尤沖融兮邑無君子吾適從兮偭彼蟂獺追神電兮匪惟自珍俟吾道之隆兮殷太師廟重建外門記廟有外門舊矣金泰和四年節度使孟公鑄易而新之近代以來廢撤不復者盖三紀焉維皇朝至元元年郡侯渤海王復命汲縣令葛祐作新太師之祠奉明詔而緝廢典也越明年春二月神宇甫完移治令下逮夏五月郡人韓澍來令兹邑奠謁祠下顧瞻臺門未克完具殆無以稱新宫而掲虔敬明年秋七月乃經始焉順嵗成而樂民用也九月初吉告成厥功輪奐爽塏神游敞然風馬雲車肅焉來臨左林右泉奕奕動色既而主縣簿髙顯洎其屬願以事文諸廟石遂再拜請書于惲惲曰太師之墓在衛境聖蹟也按祭秩常祀也自殷迄今二千有餘嵗矣神之所以凛然如生血食不絶者豈非忠義之氣萃而為喬嶽融而為列星窮天地亘萬古作大閑為民極故也孔子稱殷有三仁焉盖至誠惻怛之心其揆一也太師之進諫不去箕子之法授聖也太師之殺身成仁㣲子之志存宗也前代以二賢配饗廟庭亦見夫顯異尊崇之禮宜矣然一門之役不可不謂全功重嘉令之為縣民安政簡而復致敬恭於明神繼成前功可謂能也己故詳書本末以示來哲至元丁夘秋九月重九日謹記種栁記古之人十年種木俟以時而充吾用也然五十不藝樹者謂嵗月之不我予也物之易生莫栁若也其自拱把而合抱特十餘嵗耳今年春命家僮斧東城之栁七十有二本植諸洄溪之上清流溉其根時雨澤其顛甫閱月枝葉扶疎已復可愛異時材則充吾家棟宇之用薪則供吾爨下朝夕之須斧斤以時有不勝其用者矣不然畏日凝空炎風灼野長條美蔭拂堤㟁而庇清流使龜魚㳺泳為牛馬憩息之所亦田家之一快也吾今年四十有二小子其識之且念夫天之生物無匪益於人者人為物靈役萬有而君之亦莫不極焉不知加我數年能有益于物也果何如哉時至元戊辰夏六月洄溪主人記社壇記田之置社所從來尚矣自天子至於庶人莫不有社盖所以神地道而美民報也其制壝而不屋俾之受霜露風雨以達天地之氣社者五土之示田主之所依也各以方所宜木樹之以表其位夏以松殷以柏周以栗是也祀以春秋始用祈而終有報也日用甲祭之常而取其始也配以稷盖稷為五榖之長且稷非土無以生土非稷無以見生生之效以其同功均利更相載養故也至元三年秋予買田于清水之南墾斸樹藝且厯歳時得田二百餘畆方之圭潔盖以倍蓰矣若夫水土之賜莫非君恩乾溢豐凶實維神所託焉是不可不明乎本觀衛土所宜惟棠為然故于舎之西南若干步就其木以為神表著之位春祈秋報用安以妥嗚呼社禮之廢乆矣背本趨末者衆矣古之為民者四各有恒業不相哤雜今三者不易為士者獨失所守遑遑載質不相弔于道路者㡬何人斯若予也工商賤事非所宜為以幸為利義之所不敢出也是則耕而後食藉之為育亷之地誠又性之所便身之所安爾予一夫耳其能化鄉人乎以為告朔餼羊使田正有所依而知載養之功徳合無彊矣於是乎書時四年丁夘冬十月也孔履記孔子殁千有八百餘嵗小子惲獲拜履綦于先進趙公學舎吁可敬也履之制極古長尺有二寸其圈以絲藉則以枲為之紋作古方花角結駢羅紕絡如畫不可端倪厥首几几似圎而方状若物勾勢欲上達循口有衣如罾可相掩覆傍綴繩絇長約數寸殆用拘縛以斂口哆環脣之周中貫繶紃疉踵之後辮結方舒犢鼻穿徹色蒼艾無光枲之纎尫者殆敝絲之堅凝者不變也于是拂拭睇眎起敬起愛怳如升君子之堂仰高風攀逸駕而聆足音之跫然也若夫履者禮也君子所履小人所視况吾夫子踐履之物哉吾儕小人可不敬而視之且夫子相魯七日誅夘也于兩觀之下如由賜之徒尚愕然而驚况魯人乎然視其所履其祥可得而考也夾谷之㑹齊以莱兵劫公孔子履階而上不䀆一等是履也凝然山立兵却魯張其無嚴諸侯之勇可得而見也然後退而閒居従容中道與三千之徒翩翻于洙泗之間接武于杏壇之上其素履之往坦坦幽人之貞可得而觀也俾後之君臣父子兄弟夫婦順而履之者昌捨而違之者亡宜乎吾夫子萬世之下凝旒被袞履帝位而不疚其道光明者焉嗚呼當崇奉者聖人之功也當踐履者聖人之跡也苟知其功而不踐其迹與嗜古物為耳目之玩者等矣是誠不可不知其所當履也中統三年夏五月同宣撫徐世隆都司劉郁幽陵張著觀汲郡王惲拜手稽首而為之記殷少師比干廟肇祀記總管趙郡陳公治衛之明年政平訟理一日謂僚佐曰太師比干之神古今之盛烈也以視事之初未遑致祭為守臣者是殆闕如况在明詔又當寅奉神不于其祭吾烏乎用吾祭意斯典之廢乆矣禮失而野當以義起且四時以秋為金五行以金為義而太師之徽烈忠貞剛毅盖與秋律一也今以秋令祀之庶幾氣可應而神来格也僉曰俞公于是擇穀旦謹齋沐得秋九月十有四日戊戌夜漏下四十刻公乃延郡之賓友府之幕屬畢集于祠下質明公斂袵以入乃即厥事鼓鐘既陳賓從就列籩豆靜嘉牲醪香腯奠獻禮成泠風穆然忻忻康樂神具醉飽從祀者凡十有九人對越靈威精魂動盪殆肅如也既闔戸賓主序位主人示曠度略苛禮歌管交奏饜沃神貺公乃詠擬騷之九誦賦伐木之卒章洗爵揚觶以極歡暢顧謂坐客曰祀以秋期肇自于是可乎客乃聞而賛之為之歌曰沈寥兮九秋神粹兮一氣百卉兮具腓貞松兮勁厲來雲兮度帟迴風兮滿斾坎坎兮蹲蹲人神兮具醉雨暘兮時若神賜兮屢嵗爰祀兮清商自公兮無替宴既終賓主揖而退繹之明夜大雨信宿乃止咸曰時雨之應豈非公之至誠所感耶公以謙撝自牧乃謝不敏曰適雨與㑹予何徳以致之既而府從事李端告予曰公自下車跡其善政有不可揜焉者其于事神治人可謂備矣宜文諸廟石以旌厥美衛人王惲韙其言而嘉之于是乎記至元丁夘冬十月也楊氏塑馬記至元二年春三月運副楊君祝香濟瀆道宿承恩夢人驅乗馬而西寤而異之及投誠流海出紵衣以賜因黙祝曰幽靈如此當復來以答神貺越翼日馬無病而斃即火之俾授隂䇿明年春再走祠下追念驥徳與相之權竒有足見于土木而聳隂馭之儀者迺命工塑設于庭之右驤首振鬛勢殆躍如既而楊再拜請記于予予謂清濟在天地間一水耳唯其不常流亂涉河溢滎沇洑地中獨達于海故曰瀆此濟之所以神也祭秩視諸侯有國者祀之近代來嵗時香火奔走百郡世之人豈以靈淵閃欻變幻百出能驚動人耳目以為瀆不測之神耶夫神聰明正直者恐不必爾矣且楊君誠心所貫發于夢夢之所得見于行事其于敬恭篤信聴于神而不疑者也然心即神也神即心也吾恐方正靈明之地即天地百神之主而吉凶禍福不由乎已而由神乎哉昔昌黎公碑羅池神筆李儀醉踣廟下以為靈尚何怪于此哉至元丁夘秋七月日記㳺霖落山記州西北四十里有山曰霖落寺曰香泉者初自寺莊入山門約行六七里峰回路轉得古浮圖亭亭出杳靄間青嶂回抱真畫圖也望東北諸峰頂磨蒼穹足注絶壑山之椒萬石林立極太湖竒特之狀半空磊落勢若飛來蒼松老柏儼侍上下雲烟空翠顧揖不暇即霖落山也行百餘步徑漸峽束石犖确不能騎青鞋竹杖推挽以進還自絶澗底陟西磴道入寺殿廢基枕巔崕上東西二佛龕嵗月崢嶸皆開元間物也南瞰哀壑心魄為動王子與客循東崕而下抵霖落山足仰看青壁斗絶如削今謂之捨身崕者是也少憩轉而東北升石磴攀蘿蹴蘚度滴乳古巗再折而抵華嚴壁下壁磨崕為之作𨽻書刻華嚴部特精緻可觀字約萬數木客誕誇時出光怪中鑿巨龕古佛護以龍象其香泉自經洞石罅中流出穿雲霤石復從乳巗半腹下㵼作瀑布流飛濺叢石間珠跳玉迸頃刻百斛山藉以潤寺仰以清也西崕對峙老色積鐵怪石出槲樹間蹲踞騰挐衆獸相搏望之愕然而恐野人指予而告曰此獅子嵓也其西北一峰天成如臺石徑作梯盤屈而上若雌霓掛樹連蜷未收即寺之眺月臺也寺故址山中相傳昔魏安王起雪宫於此故宋人石刻皆引魏離宫故事有﨑嶇一逕入禪扉魏主離宫在翠㣲之句金盛時殿閣極侈今祇稠禪師一殿巋然獨存所恨薄暮不獲陟連雲絶頂放曠逺目以盡諸山之勝令人仰視飄然有整翮凌雲之志既而林風振壑寒日下山蒼然暮色自逺而至猿鳴兕嘯凛不可留遂自南山半腰厯蘚磴俯渃岸盤馬謹轡而還回顧寺塔瞑烟四合無復所見但覺西山爽氣清潤雄秀溢我心目襟袂以之淋漓詩脾為之清壯也夫㳺覽細事也功名之士有所不取然謝傅之放情丘壑羊公之興懐峴首二賢者其功業豈下于人哉要之髙人勝士不無瀟洒出塵之想闤闠塵俗觸眼可惡時于山川風烟勝處垂橐而往稛載而歸俾廓落之懐心凝形釋與萬化冥合然後知吾向之未始遊焉如何若曰功名顯赫如二公而後可噫高天厚地須富貴何時耶癸亥冬十二月望日記新井記有銘水之滋人至矣予城居三十年口衆而無井亦一苦也盖飲食酒茗之用日不下二十斛率以僕奴逺汲取足誠可憫也中統四年夏六月朔召井工鑿井於舍南隙地告成于是月上旬之戊午凡用錢布四千五百役傭三十六甃甓三千二百其深四尋有一尺既汲果食冽而多泉味之莫予井若也且夫汲之為郡一咽㑹也吾聞生聚繁夥之地水率鹹苦井而得美泉者百不一二數何則腐穢滲漉之餘故也予生也多疾鹹苦之味尤所禁忌今新泉若是而甘且冽天其或者湔浣我心肺滌濯我五臟沛然助往来衆生之資而供無窮之用也是宜銘銘曰四年季夏日戊午鑿井得泉甘勝乳古云飲之疾可愈朝來汲引己堪覩金沙離離流百股一泓寒碧蒼烟吐黒知蠻環瀠水府劇郡之水率斥鹵此泉扶衰殆天與我罌重潔繘修組尚餘來者無窮數登鸛雀樓記予少從進士泌陽趙府君學先生河中人故兒時得聞此州樓觀雄天下而鸛雀者尤為之甲及讀唐李虞部暢當王之渙等詩壯其藻思令人飄飄然有整翮淩雲之想擬一登而未能也至元壬申春三月由御史裏行來官晉府因竊喜幸曰蒲為屬郡且判府職固㕔幕而闗掌有顓務國制判官典郵傳季得乘馹檢劾稽緩西南河闗勝槩固形于夢寐中矣其嵗冬十一月戊寅奉堂移偕來伻按事此州遂獲登故基徙倚盤礴情逸雲上于是俯洪河面太華揖首陽雖傑觀委地昔人已非而河山之偉風烟之勝不殊於往古矣于是詠採薇之歌有懐舜徳起臨河之嘆而思禹功坐客顧笑舉酒相屬何其思之深而樂之多也噫昔韓吏部欲造登南昌閣者屢矣至于刺潮移袁濱潭卒莫之遂秖獲載名其上列三王之次今雖罄適盡夙昔登臨之美而不覩瓌偉􅏭嶫之觀迺知勝賞有數樂事不可并也偕來者合肥戴剛柔克滏陽馬昫徳昌營州張思誠誠叔子翁儒侍行是嵗陽復後一日承直郎汲郡王惲仲謀甫記平陽府新修星丸漏記經漏之法盖所以司天地之朝昏儆官民之動息郡邑皆置之遵古制也平陽府治舊有漏設臺門上自近代来名存器亡具鐘鼓而已視事初思有以更張之遂得遺法所謂木漏星丸者也其制為夾屏高幾尋廣則半之中布敔道七折用棘作丸彈如凡六十數以循環六千分晝夜百刻之度又按中星制十一圖定日月寒暑消長遲速之候注丸為分積分取㸃積㸃成刻均平五更定為成式至元十年春二月丁未新漏告成法簡而易知理明而度應信乎可恒用而不息者也噫君子之為政自一已而達之物因物而取信于民茲漏之設苟不自信而勤于政豈惟伊漏之愧将何以化齊民㦲爰作箴以自警其辭曰在昔上古挈壺有職堯水懐山欽若星厯繄爾經漏亦政令所棘不夙則暮匪時動息今也具成官民攸則彼寧不勤政荒業􅈥嗚呼有官率先是思太平縣宣聖廟重建賢廊記二帝三王之道逮孔子而後明然師授私淑傳之後世俾彛倫攸叙而不斁者七十子有力焉是則配侍於聖人也宜矣太平晉國故封今為綘之劇邑襟山帶河衝㑹南北故其俗率勤儉剛義憂深思逺有陶唐之遺風焉為縣者必欲明倫復古吾夫子之教其可後乎縣有廟學國朝以来具法宫而虚兩序春秋奠獻自侯已降位設牖下其于典憲是殆闕然至元八年夏進義副尉平徭任興嗣来主縣簿覩其如是慨焉興感乃祇㑹教官張鑄孫某暨邑之士人相與庀材僦工經營以方凡為室東西各五楹翬飛矢棘奐焉維新遂圖七十子肖像于壁元哲當座素臣儼如載尊載儀咸列斯宫吁其偉哉以至元癸酉秋八月行釋菜之禮用安神棲邦人向化士興于學若任君者其于承宣之職可謂知所先務矣爰作詩以歌之其辭曰元聖垂教先天後終用廣發越羣賢之功於赫魯語如日在空建極明治萬古是崇宜其報禮極熾而隆奕奕兩序厥功固㣲小善罔棄大焉可希刻詩廟門來者庶㡬澤州新修天井關夫子廟記舜澤南逕太行左腹百里而遥走懐洛道也當天井闗衝有殿屋巍然高出林表曰夫子廟廟之建莫究所從来嵗年滋乆物不能終壯故脊圮瓦裂桷折榱傾障盖日疏風雨攸斁寖及于壞行人過客朝頓夕處車隠戸間火燧桂下燻翳蕪躪惡不可睨孰謂神能一朝而妥于此乎莫瀆慢此若某以至元九年夏四月調官平陽道出祠下愕眙嗟咨詎可下墜教基禆守土者大貽神羞吾儒安得不受其責于是屬州尹皇甫琰以營新圖越明年冬十月乃維始焉完固益新克壯于昔而復繚周垣建崇門固扃鐍既治既除神宇肅敞又明年春正月州判官張漢来告迄功且致尹意求予文以記之曰祠雖新葺而稍固不足為成功然轍跡事不辨諸廟石無以警山甿野俗若載之可以無傳誣伊明府有以述之嗚呼惟夫子之道本原于天天理出于人心故有周衰王者迹熄邪說暴行又作天以堯舜禹湯文武周公之道恐遂湮微又不能聲臭諄諄下誨于人故誕生元聖祖述憲章振鐸下土于是觀周如陳䀻楚轍環于齊魯宋衛之郊盖將以明人倫建極復其固有之天俾君臣義父子恩夫婦别朋友信長幼序天地萬物位育而已其道則禮樂刑政其文則詩書易春秋如水火菽粟日用而不可離非有誕謾詭異難行不經之事萬世而下順而履之者昌逆而違之者亡論夫神化無方之妙復有大于此者歟又何俟草間之䑕石上之轍驚流俗而駭衆目者哉然按世家孔子將西見簡子于晉聞鳴犢舜華之死臨河而歎曰吾之不濟命也今澤實晉之東鄙廟之設豈非出于人心景慕篤信如瞻天就日有不可廢焉者先賢因之以神道設教明夫聖道溥博無所往而不在彌六合而滿坑谷也故并及之尚來者無惑尹諱琰字國瑞姓皇甫氏潞之襄垣人賢而有文為政勤而彊練宻聲藉甚于時十一年嵗在甲戌正月既望承直郎平陽路總管
