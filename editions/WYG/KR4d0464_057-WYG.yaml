body:
  text: 輝州重修玉虚觀碑嘉平道士介煉師范君贄禮幣來謁拜而請曰敝觀在蘇門顧惟狹陋然厯年乆實為自昔名額敢託斯文俾見興造本末暨師真住持所自用傳不朽廼宿昔所願見幸憲使惠顧越為光有赫按所具事狀州西郭曰草市城北走出廣新門百舉武有觀曰玉虛攷其肇基盖始於前宋政和間所建大定初仍賜今額為正殿一旁小殿二中設三清四聖元辰等像函丈後列神閍前敞下至真官齋壇賔客庖庫之仁咸叙而即宜承平乆法供大行鐘磬齋魚之音隠然聞山水間蔚為其前儲祥勝地壬癸兵餘日就荒落厥後清虛𢎞道真人來主治之月殿星壇稍復於舊尋冷公西歸屬之通妙嚴君顯奉師訓惟恪乃創水磑稻田禇莊等業雖罄刮衣盂資贍徒侣大有方便丙申冬嚴既示化真人志慮𢎞深召上足通真師梁志一謂曰玉虛道塲藐爾於共今繕修頗完資用茍有第道匪人𢎞何以行逺矧共山羣彦所集半為方外眷屬㣲汝曷克洞玉清之虛靜承文獻之顧接哉於是唯而來嗣飭治焚修其用􅂶儼已有者守之日固方來者增而歲新復於百泉西涯買田數畆築致爽亭貯經吏植松竹號嘉惠别館晤言一室㒺間儒墨暇則鼓琴詠歌將以挹蟾房之景氣接鸞鳯之遺音豈惟與泉石而為伍也雪齋姚公愛其幽勝亦嘗徜徉其間與師為蒼烟寂寞之友傳曰尚友知人梁之為道槩可見矣既而師倦勤盡以後事付高弟道燦燦為人丰姿疏秀氣爽而象恭志繼而本立守䕶傳繼惟恐墜越其徒稱之曰能燦姓張氏自童行入道一今三十六年矣嘗觀道家説有玉清玉虛等號亦猶天有九霄神霄為最高然冲而用之於道體何在是固老子法虛心實腹守為清修要者盖心不虛則道無以入物無以容教無以受而腹無以充矣坐進之功茍疎凝存之理或熄若道燦者法夀方爾主治院門甚力至於接外務崇本宗誠能中虚而應物以道腴而充腹者哉正自師祖師梁庸玉汝於成之旨也若然則其為後來紀綱是者矜而式之繼為不朽無窮之傳也必矣仍為門人作詩俾歸來望思以極道真之本其辭曰蒼蒼共巖桂連蹇兮杳焉予懐仙遊逺兮山空日寒悵疊巘兮宫居粒食思展轉兮遐想仙標玉雪質兮彤車載花紅一色兮醉鞭星馭金虬蜿兮粃糠塵世宅閬苑兮嗟嗟堪輿一烘爐兮往古來今爍無餘兮世外無物須人徒兮刳滌𤣥覽歸靜虛兮服餌節飲差少瘉兮弱志强骨夀吾軀兮庶幾真詮師同符兮大元國大都創建天慶寺碑銘并序大雄氏之為教如慈雲慧日覆燾無際惟得其人道乃大行宫居像設亦從而熾盛之我國家鼎定全燕教隆内典故精藍勝刹莊嚴寳界金碧相望有佛國大乗氣象惟永泰寺肇基自遼彌陀者泰之别號也大安兵燼廢撤不存鞠為茂草者五十餘年大元至元壬申有僧雪堂始來結菴而主之先是師業嗣法猶窟潜天徳以經戒嚴機鋒峻越在雲朔名動京師嘗假息間有以天慶名所棲而告之者初不諭其故既而有駙馬高唐郡王聞師名徳喜之既覯止即依慈䕃叩真詮師順事指方日有所覺以至承嗔獲譴非罪而罹苦毒者因師一言多所縱釋其後王請師住豐之法藏院仍赠貝錦法衣用著顯異尋以道行上聞有詔所在䕶持及觀光大都郡王乃出重幣易是院為師待問駐錫之所與其徒奉香火修潔精進而已至於建大道塲擴充無量功徳盖遵養而有俟也迨甲申冬皇孫紺蔴刺以師持誦保釐故欲辟靜室處之宫府辭不可翼日出貨泉二千五百緡洎名驃二仍諭留守段禎詹事丞張九思即所居庀徒蕆事起三大士正殿丈室七巨楹下至門閭庖湢賔客之所略皆完美始於乙酉之春成於丙戌秋仲役初作闕地得廢鐘所刻天慶二字考之盖有遼建號也事夢既協即為新寺名額於是倚睟像於金光沸潮音於空際有來諸天普臨雙樹顧諟永泰廢餘復為清凉法觀矣後三嵗奉皇孫奩香禮江浙名刹起造藏經師冒涉江湖往返萬里存神過化髙風所及奔走供養且有金仙通靈伽藍主䕶之應吁亦異哉凢得經四藏計二萬八千餘卷分貯大都之開泰天慶汴洛之惠安法祥及永豐法藏院仍以法物付之使人無南北通暢𤣥風夀聖皇賛寳緒天花雨紛􅆊唱雷動日開八方之供者此師之所圖維也宜其經來神衛號應基先雖老栢重榮神松囘指有不是過者遂不千里逺持待制王之綱事狀以寺碑來請曰山僧空疎無足比數以義以契尚憲使與顧以銘章貺之始終之願畢矣予以師喜儒學有器識所交皆藩籬大臣文武豪士緩急於士大夫周旋不榮悴間解紛振乏要有實效然去來其間殆雲凝而風休也嘗即寺雅集自鹿庵左山二大老以下至野齊東林凢一十九人作為文字道其不凢時方之廬阜蓮社云是亦將因儒釋僧之特達者也冝其行業成就如此固可以著金石而垂不朽矣師諱普仁字仲山姓張氏雪堂其道號也世為許昌人父世榮官至豐州司録叅軍母夾谷氏師生有禎祥甫毁齓不葷酒齋初祝髪於夀峯湛老再具戒於竹林雲和尚及叅永泰贇公一見器異即蒙印可至有機鋒灑落瑩徹氷輪頭角崢嶸光騰星緯之喻贇派出臨濟第而上之師乃慧照十九代孫也過鎮陽樹碑表行濬源接派以昭其本於尊祖追逺光又赫焉余嘗論天下之事雖小大有殊醻酢注措皆有本末就釋氏教論之佛法者本也塔廟者末也崇其末而遺其本求進於道亦已難矣若師也可謂持用有方審所先後者哉乃隨喜賛嘆而作偈曰道之大原出於天物生而靜乃本然扶持有術繋後傳惟聖日逺湮其言奪攘矯䖍紛目前佛乗自西來竺乾慈愍濟度心為先衆生迷惑不知覺沉溺苦海甘流連人乂安得以手濟以法為枻經為船奉持頂戴破黒業火宅變幻生青蓮龍宫紺殿儘瞻禮具香須滿黄金田阿師振錫下南海豈為頭角爭昻軒向來四萬八千偈重與震旦開經筵燕豐汴洛還舊貫佛界珠網摇秋煙羣昬再曉歸至善如夢日月金沙淵漢人得經纔四十未若此舉思無邊功圓行滿師不有歸之帝孫祈永年八方奠枕磐石靖天子萬夀南山堅聖孫神子麗不億惟城惟藩復惟宣歸來丈室炷香坐但覺鐘鼓清而圓從此桫欏雙樹底知師澄定草鞋禪大都路漷州隆禧觀碑銘漷州距今新都東南百里而近本漢泉州地遼為鎮而亡金縣焉兵後井邑蕭索僅存縣治原隰平衍渾流芳淀映帯左右建元以來春水澄融之際上每事羽獵歲嘗駐驆民庶覩羽旄之光臨樂遊豫之有賴故生聚市閧旋踵成趣至元十有三年遂升縣為州從吏民之請也爰有道館據城西北維亦由是而修崇焉住持圓素大師劉志實者許之長葛人夙秉淑質自童行入道師希真劉志永永即長春丘公高弟清虛韓志谷一再傳也初師永誅茒於都之東郊刳心坐忘凝塵空竁者十年盤山王棲雲道價高一時歆其精修枉道造謁自號麻衣老夀八十有四怡然而逝師之在弟子列也侍晨昏服勤勞人所不堪己自若也積寒暑三紀猶一日然麻衣見其持守不易皮毛盡而真實在可與有立於是以通真觀屬院曰玉晨菴者令主張是戊午間誠明真人愛其地佳而氣腴囑之增建以應有開之先始焉荒㕓二十餘畆敝屋數間蔽風雨而已師乃以和光同塵朴實感物為方至一鄉欽向願言信施有不期然而然者助益既多功用漸集遂起三清殿繪𤣥聖於堵所謂上九位者居其中又畫日月星官歲徳師聖嶽瀆等神列侍兩傍雲舒霞蔚灝彩絢目殆𤣥像肇分端倪呈露下至嚴禋有壇靜棲有室凢所需皆具以屋而計者三十楹歲時清供真仙來臨鐘磬之音隠然空際誠迎祥之别館一方之榮觀也既落成洞明宗師以今名榜之及𤣥逸真人張公嗣教嘉師之勤命書石以昭厥後遂介鍊師劉文甫來請銘予以謂肯心而構易故而新豈惟瞻者增敬其因衆成功同延慶夀荅鴻休而畢師志使來者祝嚴㒺逸而隆福降簡穰之本是固所當書者仍以黄庭七言體歌以系焉其辭曰道家者流𤣥黙稱抱持其雌無所矜居屋火食相奉承鳶飛戾天魚在泓疇不若爾休其生爰因像設心自兢仍用善俗滋良萌漷州維南泉故城玉晨有庵無所營敝廬數間僅幪帡一旦締結三十楹烟光粼粼萬瓦青正自肯構今有成要擴師授昭予誠為國迎祥禱上清鑾輿歲幸實省耕延芳春水紛霓旌遊豫何翅歌三登千秋萬歳樂事并道人百拜乞此銘隆禧因之播永馨雲間難賞聞愾聲安知不有成公興大元故關西軍儲大使吕公神道碑銘盡瘁以事上忠也守志以完節貞也忠貞之澤流潤後人俾功名奕葉富貴一時而親弗逮者天也故聖人垂光揚之典可以貫幽明而慰存沒斯亦孝之至義之盡也若夫負卓越之竒材抱鶱騰之逸志起家侍從收功轉漕臺閣藉風雲之舊門庭絢組綬之榮始以故家遺俗終以令聞令望振門閥而紹先猷者吾於遂城吕氏見之矣吕氏世為燕陲鉅族值金季搶攘譜牒墜逸髙曾而下澷不可昭穆公諱嗣慶字昌齡考諱祐仕皇元由行尚書省掾充諸路人匠府總管妣李氏公㓜喜讀書不從羣兒嬉既冠氣貎魁傑學通經史善騎射長於辭令思以竒節偉論表見於世恥齷齪出人後時朝廷逺控北庭詔龍門劉公元帥黄公建行臺於燕柄用頗耑决公策時務所急及便益民編者十數事以撼二公果竒其材識以國士許焉既而挈之北覲引見太宗皇帝薦其材應時需堪備供奉上偉其儀觀收𨽻御帳下碌碌初無所知名居無幾何譯語國體嫻習通曉如素宦於朝者由是稍得近侍上前公資穎悟應對周旋動恊睿思自爾顧遇頗異出入殿庭寒暑夙暮十載間謹畏小心未嘗易常度上審其可用命提㸃尚食局事國朝大事曰征伐曰蒐狩曰宴饗三者而已雖矢廟謨定國論亦在於樽爼饜飫之際故典司玉食供億燕犒職掌視前世為重凢羣臣預燕衎者冠珮服色例一體不混肴號曰只孫必經赐茲服者方獲預斯宴于以别臣庶踈近之殊若古命服之制公前後被賜只孫錦服十餘襲寵數之隆于斯可見歲已未憲宗下詔伐宋車駕由隴山道漢蜀趣合州之釣魚山大兵既興糧餫為大計庭議推公宜膺將漕乃降璽書金符充關西興利軍儲大使公轉致有方給授均一士無飢餒之色民寛飛輓之勞竟用勤劬致疾以庚申年正月廿四日卒於京兆府官舎得年四十有三歸𦵏隧武之西原從祖竁也公資倜儻有大志奉上忠事親孝交友誠進不隠謀退無私議古今成敗胷中皎然吻縱波濤屢中倫慮材優器幹事無盤錯膂力方剛經營伊始謂利澤施於人功名昭於時可力致也一旦濟浩浩之長川中流柂折涉漫漫之逺路半道車傾士論于焉為之歎惜夫人王氏系保定大家姿温恭靖淑公殁之歲纔廿有八舅總匠府君尚在堂二子方髫齓挺志自誓仰事俯育亢起大宗為任遂嚴奉舅嫜夀終八秋教育二子至於成人為長子㴻娶金名臣追諡通憲先生梁公孫女今以才華英邁練達政務任樞幕經厯為次子淵娶漕僚清苑王君仲女資秉幹敏棣萼輝映任承仕郎管勾中書承發司昆季簉名朝籍校世宦故家不失舊物皆由夫人節義有方以之扶持者也姻戚鄉閭至爰稱行美取為訓範女一人適大都郝氏孫五人㴻之子道安女恵鸞淵之子定安季安赐安夀五十一終於大都私居之正寢越三日袝安𤣥堂實至元八年十一月十六日也㴻既長樞幕秩中通貴一日與弟淵謀曰今粗有所立猥荷析薪可不知其所自邪惟我先人大志不遂賫恨下泉妣貞幹内事克隆遺緒潜徳遺淑大懼墜佚有求銘太史揭石神道賁松檟而垂示不朽融管彤而發越幽光罔極之恩庶幾昭報廼以不腆之文來請某自惟昔任裏行與㴻婦翁孝可定交時㴻方聫姻婭自是交義日篤于今三紀以契以舊有不得辭者謹掇其義烈之言振衰風而厲薄俗者銘之其辭曰惟趙北際保為名城風聲氣習而燕與并越此兩間古多豪英游談尚氣芥拾功名矯矯吕侯資秉忠貞濟以學問又多藝能文武備具冨之邦經囊錐脱穎已為世驚一朝麟趾來儀紫庭入侍帷幄即允帝情錦衣分賚寵數光榮佐商有道奚翅割烹大駕南征如靁如霆食惟兵本以先啓行曰轉曰漕職焉汝勝民安飛輓師樂均平心計鞭算以經以營鵬圖海運九萬初程一僨不起其孰使令秦川惨澹有來英靈不隨朝露溘焉涕零化之閨壼義烈烝烝二子承慶若綬彯纓婉婉幕畫執樞之衡顯揚有例聖經義明郎峯西峙雞距東傾武隧西原風水攸寜𦵏復從祖多祉是膺元身不殁永振家聲古所謂不於其身而在於子孫者其言有徵何以驗之視我刻銘大元故昭勇大將軍北京路總管兼本路諸軍奥魯總管王公神道碑銘國家當肇造之際所在豪傑應期效順畀世侯疊將鎮據一方父死子繼兄沒弟及蹈故步而執成規固自若也迨夫守成尚文登庸賢俊通遷調而革舊習明治道而考殊功所謂閥閲子弟持崇髙之體不學無術噤不能有所施為備員而尸禄者多矣論其藉父祖之緒餘卓爾以才傑著聞膺朝廷之選遴藹然稱為良牧伯者誰乎予於孤竹王公見之矣公諱遵字成之世家平州之遷安縣祖諱誥亡金貞祐初任興平軍節度幕官攝府事方大元經略中夏皇太弟國王奉命率兵出榆關循盧龍塞而南雷砰電激所向無前府君審天命之眷臨憫生民之塗炭遂挈二州五縣版圖投獻轅門王嘉其忠赤首倡大義即聞於太祖聖武皇帝蒙授榮禄大夫興平路兵馬都總管知興平府事尋錫金虎符加左副元帥兼安撫使父諱徳明字才卿早嗣世爵屬遼右初定撫養遺黎職修藩翰光奕先業焉公㓜穎悟好讀書年未弱冠入侍藩邸即能練習國體通曉譯語及長資沉毅負高氣所交皆一時豪傑立志宏達恥碌碌隨人後歲戊申襲父職仍佩金虎符公自祗承先政夙夜惴惴惟恐失墜視民事為難不敢忽易遇政令之不便時俗之未安思而不置憂形於色必咨訪更張俾理順事得而後已未嘗恣情躭於游宴二十年間猶一日然咸謂臧孫有後於魯榮禄之澤未艾也辛亥嵗入覲憲宗授本路總管兼萬户俾專兵民之政殊光寵也世祖皇帝踐阼分朔南為十路肇建總管府以公奕世材賢授平濼路總管換佩金虎符且有奉公忘私當副所委之諭至元乙丑轉官制行授懐逺大將軍知中山府事三年升昭勇大將軍彰徳路總管六年改懐逺大將軍總尹順徳路九年復昭勇大將軍升授太原路總管兼府尹本路諸軍奥魯總管十四年遷北京路總管兼大定府尹以疾不赴廿一年上章致仕日與故交雅士用琴書棊槊相娛樂序宿好暢幽情裕如也不幸於至元廿五年正月廿有七日薨於私第之正寢享年六十有四越七日𦵏于遷安縣東石橋西原祖塋之次夫人安氏山東東西等路軍撫使安公之女和柔貞順光備婦道今夀登期頥夫人高氏出盧龍處士家資賢明勤於内助主持家務營辦公䘮預有力焉子男五人曰國彦蔚州採木提舉曰國傑俱先公沒曰國英不仕曰國士早世曰居仁高所出忠翊校尉湯隂縣尹子女三人長適宋氏次畢氏嚴氏男孫三人不花永興闕公資雅重智慮周宻奉上忠接下有禮善養名馬識别鷹隼衣冠修潔車從閒雅有承平豪貴風度人徒知氣習體貎頥養如是而已不知其當官蒞政持法謹嚴聽㫁明察以公正自處凛然有不可犯之色務要紀綱立號令行其治相尹并皆監司理所工匠羣不逞之所集公與辯曲直折姦横不絲髪貸同僚以相假藉示并容為言曰為之在我者當如是因公道而致私憾吾不恤也雖時不相能後竟以事直而心服焉所至興修廟學尊禮師儒崇禮讓而抑豪强致差賦辦集民安俗阜然悃愊無華不示表襮持守剛果終始如一故治績渾然不可指摘有古良吏風當中統至元間聖天子勵精政事以成效責中書一時宰輔皆極老成選咸謂素無選舉篤責之漸惟師帥得人上澤可下宣下情可上達庶幾徳化之成太平有象矣故各路總尹慎擇其人至有虛曠歲月不肯輕以畀受者公之擢拜適丁茲時故四厯名郡兩增崇資皆出公論之所在卒以職稱聞亦足以伸眉高談有光故家含笑瞑目無愧先世矣公既𦵏之十載嗣子居仁念潛徳遺懿恐遂湮沒聞不肖乆忝太史屢銘當代名公貴人乃件右事狀請碑其神道向公移鎮洹上不肖適退居淇右相衛之交相去不百里迨尹晉陽亦判平水幕汾晉兩府南北相望故稔知其政績後以迎迓事南來㑹遇於張少尹昊公館張與公為風雲故契談其家世行已為詳是則今日論述已有開先之兆矣敢勉為次第而重之以辭銘曰遼西惟漢右北平自昔用武地必爭榆關北控盧龍横夾右碣石山海扃沉雄氣鬱貫斗精王公孕秀時之英天兵南下轟雷霆羣情恟恟孰敢嬰惟先奮效忠與貞𤣥黄于篚王師迎兩州千里不震驚寒谷陡覺春陽生風雲儷景同飜騰載世柄總民與兵一朝繩武光嗣承鯤鵬變化天東溟六合澄清朝日升修文偃武論治經唐虞黜陟公幽明罷侯置守除因仍徳讓凛凛望乆凝漢二千石任可勝政刑相時量重輕剸裁錯節需鋒稜善良與䕶奸惡懲大綱既振道自𢎞興庠育材昭世程吏畏民愛風化行厯典四郡稱循能趙張才氣恥近名白頭一節匪變更庶幾無忝先業榮世期福夀方川増勤勞致疾孰使令生存華屋丘山零嗣惟克肖孚孝誠銀鈎翠琰勒我銘蔽芾用播甘棠聲遺黎伏讀為愴情墮淚當與征南并秋澗集卷五十七欽定四庫全書秋澗集卷
