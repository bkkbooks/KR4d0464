front:
  text: 集卷七十五
  hash: sha256:ba0116c3249d558d651ab426f3ef9a5700dcd64ff535a899f1a90032202ba0ff
body:
  text: 元王惲撰樂府木蘭花慢憲陵臺畔客笑幾度送人行對一道青山兩行官栁去住人情蒼生望初不繫問此身何用絆虚名宦味真成畫餅隠居却伴侯鯖十年慚愧草堂靈自分苦飄零甚一片閒雲幾迴歸夢野釣林耕浮沈待從里社覺儻來軒冕縂堪驚寄謝竹林舊友且休筆削寒盟二送史誠明縂管還洛陽春日飲餞任氏園亭時紅梅爛開愛春光淡沱歌吹暖竹西亭正花簇金鞍香生雪樹碧酒同傾誰將翠帷雙捲擁紅粧臨水照娉婷縹緲凌波仙子依稀羅襪塵生使君髙興動青㝠心事怯流鶯對如畫江山一時豪傑湖海交情自憐年華如此且相逢一笑惜飄零明日河陽客舍春風栁色青青三嘆西山歸客又愁裏過清明記幕燕巢傾朝堂人去往事堪驚行藏固非人力頓塵纓終愧草堂靈潘岳無閒可賦淵明何地堪耕漢家一論到書生六合望澄清甚樓上元龍山中宰相何止虚名當年卧龍心事儘羽毛千古見青㝠憔悴中堂故吏醉來老淚縱横四河内人焦其氏者作樂器僅容一握張以二絃隠彈袖間因雙鳴起舞周旋跕躧曲盡音節昔人未之見也座間承待制翰學命不肖以樂府木蘭花慢歌之因狀其名曰鳴鳯雙棲曲愛雙鳴棲鳯趂舞袖共婆娑恨疊鼓凝笳繁絃急管悲壯何多金泥小檀花面儘凄清翻盡雪兒歌幄殿悄聞私語銅龍冷􅉡秋波明妝髙燭洗金荷心賞重經過聽一曲留連珠簾畫棟幾度斜河紅雲島仙音部説新聲得意掩雲和看取長安日近春風搖蕩鳴珂五至元七年京師除夜燈下與兒子孺讀文正范公行已且憶馬賔王來事可為之語因感而賦此以見其志云淡中庭暝色初遣奠夜寒凄對草草杯盤昏昏燈火客裏京師比量舊年心事笑蹉跎書劒向來非誰著朱衣白簡春風三拜龍墀山妻稚子竟何為温飽汝嘻嘻悵故國丘山蒼煙喬木鄉月空輝葵心要須傾日道等閒休遣鏡鸞知自信蒼顔如鐵不堪雙鬢如絲六奉送節使賢侯分帥譙軍兼簡仲季諸卿為一噱也且寄聲子初知府壯東南一柱分閫寄事非輕見雨露恩綸河山帶礪勲府元盟依依汴堤楊栁甚一朝光彩動旗旌曉日千梁浮蝀春風百雉嚴城臨軒鼙鼓正凝情忠孝舊家聲看奕世功名麒麟髙閣宛轉丹青緑波北潭花影又一年春好是清眀彩袖一杯壽了望中三楚雲平七十三年平陽秩满清明日賦老西山倦客喜今嵗是歸年笑鏡裏衰容吟邉華髮薄宦留連功名事元有分且著鞭休羨祖生先望重芙蓉天府夢餘禪榻茶煙恨無明畧卧林泉平子太拘牽儘俛首轅駒寸心能了猶勝歸田前塗事如抹漆又向誰重理伯牙絃自是一生心苦非闗六印腰懸八望郝奉使墓洒西風老淚又馬上望郎山對紅露秋香芙蓉城闕依舊雄藩碧雲故人何在憶扶搖九萬看鵬搏賦就鳯凰樓晚星沈鸚鵡洲寒一丘宿草鎖蒼煙零落復何言似燕許才名風雲際㑹自古天慳皇皇使華南下愛丹衷擬締兩朝歡恨殺姦回秋壑月眀愁滿江干九憲臺諸公九日登髙闕首唱樂府諸公賡和以紀雅集之盛余時移病在告既而君美御史以嚴韻見徴勉為續貂云逺風臺上客説雅集玉生光縱樽俎無情登臨佳節此興能忘龍山㑹君莫羨愛緑蘿影裏到山莊驄馬長安清貴留連春草池塘淵明骯髒倚門傍多病對秋香悵嵗晚田荒㡬多稂莠薿薿登場人間事如意少且同來一笑共匡牀寄謝牛山公子何須揮涕殘陽十壽史中丞相門佳公子都忘却貴人驕有萬石忠勤伯魚詩禮才氣飄飄風流謝家玉樹説妙齡英譽冠東朝桂殿親承弓研豸冠髙映金貂睿兩臺清議聳風標幾眷見恩饒要寳瑟朱絃羮梅伊鼎試手更調鳯凰池還浴鳯看羽毛奕世動雲霄鄭重嵗寒貞節青松千尺難凋十一再和何侍御前府韻前章所謂變風終章止乎禮義而已六合一家統依日月到重光道太岱封書雲龍接踵此意難忘西園萬花繡錯好枕中蝶化似蒙莊斂翅深棲金粉貪芳更度銀塘一生白眼貴人傍贏得姓名香幾戲影棚邉隨人鼓笛賀老當場雖可笑猶有用似也勝陳許怒争牀静想行藏有命且休眼熱王陽十二為史縂帥尊夫人之壽靄長筵拜慶似眉壽幾人同更緑髮垂肩方瞳炯漆五福尊崇風流大家儀範甚能移子孝作臣忠獵獵征東漢斾堂堂南下殊功一江春浪醉醒中都捲入歌鐘看和氣怡聲承顔起舞袖錦翻紅雲間婺光分彩儘蕭然林下謝家風笑擁滿庭蘭玉年年樂事無窮十三賦芙蓉杏花聴夜來風雨甚一霎過東墻愛活色生香芙蓉標格暖貯春光瓏鬆寳團瓊綴笑海棠能睡更無香爛漫宋郎心眼風流時世新粧少年走馬杏花岡勾惹興偏長記誇酒青旗樹頭招颭喚客初嘗别來吴姬粉面比舊年風韻轉芬芳似覺生紅閙意未容説與東皇十四至元十七年上已日同西溪公飲鎮陽城南髙氏勝遊園歸賦此詞聞城南花栁最好處勝遊鄉對湖水微茫搖翻碧㶑脩禊浮觴比量今春樂事憶去年書劒共逰梁曉日繁臺古寺春風碧草宫墻人生離别是尋常兩嵗喜徜徉更金縷新聲佳人錦瑟踏遍春陽多君嵗寒心在似西溪松栢鬱蒼蒼記得醉時笑語夢回枕上猶香十五愛一枝香雪幾暮雨洗粧殘儘空谷幽居佳人寂寞淚粉闌干芳姿似嫌雅淡問誰將大藥駐朱顔塞上燕支夜紫雪邉蝴蝶朝寒風流韻逺更清閒醉眼入驚看甚底事坡仙被花熱惱惆悵東䦨細傾玉瓶春釀待月中横笛倩雲鬟吹散碧桃干樹盡隨流水人間十六穀雨日王君徳昂約牡丹之㑹某以事奪北來祁陽道中偶得此詞以寄問城東春色正穀雨牡丹期想前日芳苞近來絳艶紅爛燈枝劉郎為花情重約栁邉娃館醉吴姬羅襪凌波微歩玉盤承露低垂春風百匝繡羅圍看慣彩雲飛甚著意追歡留連光景回首差池半春坐長亭畔漫一杯藉草對斜暉歸縱酴醿雪在不堪姚魏離披十七和國範郎中見贈嚴韻卧孤松雲壑愛青貫四時心自絶澗幽蟠蒼煙髙擁氣壓千林氷霜幾年凌傲甚九天一日露恩深白璧無雙國士朱絃三歎遺音春風草木變蕭林又復見雄襟想直犯龍顔片言曽霽萬里重隂相逢莫驚白首更明時幾世似于今只恐南陽壠底空懐梁甫長吟十八賦白蓮和王西溪愛玉華仙供偶移影下瑤池悵野渚蒼煙結根非所繁艶争欺風清月寒半墜道無情有恨欲誰知羅襪凌波微步淡香髙韻幽姿風煙回首夢共溪采采畫舩歸趁粉露和香秋光細釀瓊液淋漓招呼謫仙共飲記兩舷脚踏醉吴姬一曲清吟未了翠盤狼藉珠璣十九武邑縣王楫善居室母俎氏出隆平富家今年八十有九慈祥康健精彩如五六十人教授馬君向余説如此因介紹拜求余文將為母氏百世之光予方以善俗任責楫之孝養致樂實有闗於風化者故作是辭以付俾來者庻有所勸焉爛雲衢彩婺如曉月满庭闈正梅粉香飄林梢紫動淑景初遲觀津盛傳王氏道孝心重見老萊衣和氣一家瑞靄慈顔九十柔儀香燒静院趁朝暉未省杖扶持縱徳厚流長遐齡能健此事應稀婆娑緑萱堂背愛一竿蒼竹六孫枝照映西山秀色年年翠㸃脩眉二十賦酴醿愛雪團嬌小開較晚儘春融似麝染沈熏檀輕粉薄費盡春工緑隂小庭晴晝放繡簾輕度竹梢風待著一天香韻醉吟留伴詩翁洗粧不用露華濃玉樹溼青葱欲細挽柔條重圍錦幄不放春空春殘未應多恨道典刑猶在酒杯中何似留芳翠枕夜深歸夢瑤宫廿一壽崔子交際河山兩界道此地正臨衝纔北渚離筵南亭奔迓終嵗倥偬風流故家從教暫淹留蓮幕簿書業更辦錦箋詩句筆端暈碧裁紅今朝壽席且從容賔客喜相同就雪蟻浮香眉毫舒彩莫放杯空人生正須適意儘氷梢蠟蒂未沖融海曲尚存遺愛稼齋自有春風廿二寄王宣慰立夫飄泊龍灤海曽同醉鳯凰樓記獵較河南並持英蕩萬里長流風流故家人物愛賦詩鞍馬氣横秋落日隆中懐古薰風洛水浮舟重逢春色入東州小試統清流看坐嘯江淮風連臺閣名動金甌經綸半生心事細推量合在百花頭此日清香畫㦸不應談笑封侯廿三為張詹事壽愛承平宿彦傳絶學更雄襟甚瀟洒清吟半生夢寐銅輦秋深為論量歸計早恐未容亭扁遂初心共道東山絲竹何時雲雨商霖春坊桃李满清隂氣幹鬱千尋看旭日眀堂圓杈偃植棟宇雄沈家近上林春早覺花香浮酒動華簪滿酌一杯為壽魯連不用千金廿四望巉巉鐵峽誰設險劈蒼岑擁萬里風煙一栓横鎖形勝雄沈漢王陽闕憶當年叱馭走駸駸半夜郵亭索酒平明燕市長吟追思往事不堪尋山色古猶今甚三十年來青雲垂翅素髮鬅簪投閒却教應聘笑委身從事老難任立遍西風殘照山光翠滿踈林廿五伏聞鑾輅近在山北以疾不能前迓愚衷有不能已者作樂府木蘭花慢一闋以見葵藿傾嚮之萬一云悵居庸北口愛蒼靄擁千岑澹秋满陪京翠華南狩萬騎駸駸從千官瞻天㐲望清塵齊拜聽車音日月中天統在風雲龍虎臺深馬遷留滯卧周南戀闕破丹心恨伏枕悠悠情闗藥裹夢共秋衾豈知金鑣野鹿恐暮年分薄是長林却為有恩未報許身愧比南金望月婆羅門引舜舉宋子由幕官也與予一見有忘年之歡既而告别東遊賦此星屯落落當年旌斾擁雍丘西風騰踏清秋回首寒雲畫角吹斷夕陽樓且杯傾竹葉歌戛吴鈎功名浪求枉敝盡黒貂裘重恨人生無定長負歡逰行蹤南去悵秋水秋煙縂是愁江浦晚稳宿汀洲二小牕人静梅枝香細月華眀博山一縷雲蒸好个臞仙風骨詩思苦憑陵有閒書遮眼欹枕松聲素無宦情較得失一毫輕自歎髙歌白雪寡和誰聴瀟然巾卷見芝宇光浮壽頰生春酒緑何礙頻傾三燕城元夕有感且憶去嵗汴梁行樂去年元夕飄零書劒大梁城春風九市花燈尚憶東樓行樂談笑故人情對一樽苦酒滿意歌聲今年可能人與境兩竛竮寂寞黄昏陌巷戍鼓㫁人行梅花歸夢正一笑柴門稚子迎庭樹鵲何苦頻驚四太行晴霽孤墉髙處揖清寒雲間萬髻千鬟底事春風面目一變玉㠝岏淡夕陽平逺野鳥飛還青雲莫攀吾髙興在東山偃􅏝孤松丘壑不礙春慳背隂桃李正藉得春光亦强顔長劒鋏且莫輕彈五栁邉層榭倚闌人共月孤髙亂雲脱壊崩濤一片廣寒宫殿桂影數秋毫儘掀髯老子露濕宫袍人生此朝能幾度可憐宵況對清樽皓齒舞袖纎腰碧天如洗拌一醉河傾轉斗杓今夕樂歸路逍遙六昨者觀唐津舟車之盛通凑南北誠為燕南一咽㑹也第吾輩居此有抱瑟竿門之嘆以婆羅門歌之河山清眺風烟兩戒見殷都唐津浩浩舟車一水東浮滄海寳帶束燕吴更中州雄跨竒貨堪居平生壯圖笑到此反區區正似齊門抱瑟不解吹竽視吾耿耿道玉佩或能利走趨如不爾歸老樵漁七為吹頭管張解愁賦愁懐索寞悠悠心事野鷗邉幾回崔九堂前照眼故家風調人物尚依然按清商一曲傾動華筵新聲巧翻道且莫詫真元愛煞珠繩銀管滿意清圓風花無夢待回放春光與少年杜陵老悽㫁隣船春從天上來承御韓氏者祖母之妷也姿淑婉善書年十一選入宫既笄為承御事金宣宗天興二年歴十有九年正大末以放出宫眀年壬辰鸞輅東巡又明年國亡於蔡韓遂適石林子昭相與流寓許昌者餘十年大元至元三年弟澍為汲令自許迎致淇上者累月一日酒間談及宫掖故事感念疇昔如隔一世而夢鈞天也不覺泣下予亦為之欷歔也今將南歸贅兒子醜於許既老且貧靡所休息而抱秋娘長歸金陵之感迺為賦此庻幾攄㵼哀怨洗亡國之愁顔也且使好事者倚其聲而歌之不必覩遺臺而興嗟過故都而動黍離之嘆也嵗丙寅秋九月重陽後二日翰林修撰王惲引羅綺深宫記紫袖雙垂當日昭容錦封香重彤管春融帝座一㸃雲紅正臺門事簡更捷奏清晝相同聴鈞天侍瀛池内宴長樂歌鐘待回頭五雲雙闕怳天上繁華玉殿珠櫳白髮歸來昆明灰冷十年一夢無蹤㵼杜娘哀怨和淚把彈與孤鴻淡長空看五陵何似無樹秋風摸魚子賦白蓮至元廿二年乙酉九月重九後三日雨中作澹亭亭影搖溪水芳心知為誰吐正華寳供年年事消得一天清露私自語君不見仙家玉井無今古淡粧誰妬儘千頃昆明紅幢翠盖雲錦爛秋浦瓊綃襪自有凌波故步賞心莫遣遲暮風清月冷無人見零亂碧烟脩渚間好去待醉浥秋香不羨風標鷺逺遊重賦擬太一真仙共浮滄海一葉任掀舉二送雷彦正西還時授恩州倅望都門滿山晴雪怱怱君又西去當時漢將征西幕氣壓瘴江烟雨還自許儘虎穴雄探萬里班超舉燕臺再遇甚牢落髙情霜風偃薄似厭貂裘土絃歌事正爾邯鄲故歩功名從此軒翥一麾回首甘陵樹千室正歌來暮須記取拊摩外催科未礙陽城古征鞍莫駐趁渭北春天升堂拜慰捧檄為親舞奪錦標君卿宣慰來别索鄙作贐行賦樂府奪錦標為贈庻酒酣相憶倚聲歌之六朝老樹不無動色也六郡雄藩㑹稽旁帶兩浙風烟如昔碧草莫傷春浦冠盖東南幾多行客正新亭父老望雲霓苦思休息道朝家雨露同春問甚江南江北賀監歸舟逸興何似雙旌儘慰元郎行色鏡水緑通朱閤威暢恩宣海波春寂笑東山老去此心初非泉石約海樓翡翠同遊醉裏山隂陳迹喜遷鶯祁陽官舍早春間鶯五更殘夢聴緑牕鶯語羅衾香擁百囀多情嬌啼無淚枕上一聲時送真成翠娥雙笋當户玉琴初㺯欲誰共趁風和求友喬林煙蓊春動花氣重暗度垂楊暖入酴醿洞倦客芳蹤佳人幽思愁滿彩牋金鳯自憐比來心事兩翅果誰搏控聴指縱望髙城落日黄塵飛鞚二題聖姑廟仙姓郝氏博陵縣㑹渦里人里去􅋤水甚邇水多蘋蘩蘭茞仙年方笄姿態殊麗嘗同女郎輩採蘋溪中樂而忘返一日歘蒼煙盛起白晝異色龍淵鮫室金支光爛飄飄然有波神泝流而上衆姝驚散仙獨留不去遙見與神顧語乗碧茵同逝俄煙開日晶遂失所在其母哀求水濵願言一見良乆覺異香襲人仙霧鬟風馭隐約於波渚間若有以謝曰兒以靈契託跡綃宫隂主是水塵縁已斷毋庸悲悒今而後使鄉梓田蠶嵗宜有感而通乃為吾驗時魏青龍二年也後人相與館仙於博陵城臺制甚宏麗縣教諭李曜告余如此今燕趙間合竈日香火趨祀者所至風動以孝感聖姑稱云至元庚辰夏四月按部至縣喜其事甚異為民禱蠶祠下以仙吕命曲庻為迎送神辭俾邦人嵗時歌以祀焉汀洲蘋滿記翠籠采采相將隣媛蒼渚烟生金支光爛人在霧綃鮫館小鬟頓成雲散羅襪凌波不見翠鸞逺但清溪如鏡野花留靨情睠驚變現身後神功緑滿吴蠶繭漢女菱歌湘妃瑤瑟春動倚雲層殿彤車載花一色醉盡碧桃清燕故山晚嘆流年一笑人間飛電三已丑秋八月廿六日雨中飲賈方叔家樂籍劉氏歌以侑觴衆賔欣然為之賞音劉因求樂府於予遂賦此且道坐客醉語秋懐誰寫聴一聲金縷同傾芳酒嬌囀林鶯圓纍珠串春在碧羅雲袖宫中磬簧齊發字外五音何瀏坐間友道江南風月此聲無有回首傷離乆三疊陽闗不到青青栁得意石州片帆雲影翻動海山明秀風流故家未減自笑杜陵衰叟再相遘卷中人正好崔徽消瘦感皇恩贈李士觀諱儀霸州人予廿時鹿庵先生門同舍郎也性端方嘗為刑司經歴官好學不倦與人交有終始回首山林遊山隂陳迹洒落襟期記疇昔論文把酒醉盡清泉白石幾年江海上空相憶邂逅淇南羇愁都釋兩鬢憐君更如漆幽懐重叙不待小槽紅滴新詩隨咳唾驪珠溼二贈元舜舉嘗為宋文卿屯田官以善歌聞天下祁州人與叅政楊西庵為通家今夕是何年故人相遇快著銀杯瀉春露髙陽舊友要聴一聲金縷行雲留不去驚如許鳯喙微吟珠繩低度夜半銀屏恍私語庭花零亂掩盡六朝瓊樹眀朝南浦道傷平楚三題沙河南堼鎮壁留别元舜舉濃緑漲千林征鞍東去十日祁陽為君住幾回清溜飛盡海棠紅雨人生當適意何良苦簿領閒堂風沙長路贏得佳人怨遲暮沙頭滔盡猶惜玉鞭輕舉一聲聲不㫁歌金縷四㿃下晉州卧病中謝故人相訪暴下晉州城茫然心曲卧對風軒數竿竹暑光不受似我腰圍束病機還自恃非寒燠力仕難任居閒不足風雨憂愁更相促星星鬢影中有利名千斛省來都外物真蠻觸五史公縂帥子明命題其弟柔明所寫平江捕魚圖乃以樂府感皇恩歌之古人稱文章與畫同一闗紐所媿辭意恐不稱於晝也疊嶂際清江楓林輝映潮落波平鏡光静六朝興廢都付漁郎煙艇蓴鱸香正美秋風冷笳鼓歸來風雲増勝夢裏無煩想幽景風流公子寫出五湖髙興畫中還領取江山影六至元十七年八月八日為通議西溪兄壽三十年前西溪授館蘇門趙侯南衙予始相識時初夏桐隂滿庭故有南衙清晝之句少日竹林逰鳯麟飛走一段江山最英秀南衙傾蓋滿院桐隂清晝鬢絲清鏡裏渾依舊雲夢心胷文章山斗好个經綸玉堂手婆娑桂影涼入露槃仙酎一杯先領取喬松壽七昔向長年老敕㫁家事無令子孫闗白時人髙之今縂帥公以鴻名茂績照映一世未老得請于朝亦慕子平為人盡以内務付之諸郎其賢於人逺甚某喜聞而樂道之為賦此以歌其盛徳云節序四時間功成還退此事君侯與心㑹幽亭髙卧眼冷畫堂金翠越粧都付與諸郎輩虎帳籌邉錦韉歌凱慘淡風雲夢江海大弨掛壁小隠一枝松盖清閒人道勝中書拜八送子初中丞赴燕時予在真定憲司坐間作勸子初酒燈火夜䦨珊故人相對忘盡南牕引書睡情談亹亹時帶少年風味門前霜月炯停吟轡湖海相望金蘭交契白髮中年能幾㑹明朝趙北又是搖搖風斾一杯還到手休辭醉九夏日同延陵君過簽事順之心逺堂以感皇恩歌之書葉散芸香牙籖無數案上藜羮當膏乳地偏心逺日與聖賢晤語市聲飛不到横披處一炷龍涎滿甌春露旋掃幽軒約賔住清談有味縂是故家風度子雲亭户好龍津路十廣平道中寄縂管甯端甫風雨暗公堂故人晤對邂逅燕城又三載偶因官事喜向廣平重㑹照人光彩好心期在萬里功名半生湖海十五年間鬢顔改笑談尊俎比老幾回傾蓋秋風横漯上期相待十一癸未重午日治頭回轡得感皇恩一闋他時倚聲歌之不能無相憶之情也示秀才鄭彦通流水小橋横治頭沙路一道清隂轉林塢滿襟涼潤猶是夜來新雨幽禽忺客至如晤語坐䕃辛夷閒揮吟麈澤畔行歌恐良苦人生適薏正要時情容與却憐身處世初無補十二乙酉嵗八月九日晚積雨開霽碧空如洗月色入户似與幽人約者遂披衣步月於庭中乆之覺風露凛然怳疑去青冥無幾也因以感皇恩歌之且寓幽懐之梗槩云佳節近中秋秋霖晴快飛净殘雲碧空大金波穆穆掩盡玉繩光彩坐來風露冷青冥外世運難前儒冠何賴四壁相如到沽賣紛紛過眼多少時情物態杳然清夢去桴滄海十三與客讀辛殿撰樂府全集幽思耿秋堂芸香風度客至忘言孰賔主一篇雅唱似與朱絃細語恍疑南澗坐揮談麈霽月光風竹君梅侣中有新亭淚如雨力扶王畧志在中原一舉丈夫心事了驚千古十四贈提刑曹仲明把酒愛髯卿故家風度不為臨江老能賦飽諳世事成敗見來無數嵗月如流睽離良苦春事瓓珊飛花落絮更著佳人怨暮遲羇愁頓解一笑團圓兒女慇懃君記取周郎語十五登樓即事斜日倚髙樓亂峯圍繞山色湖光翠如掃天涯倦客目㫁野烟髙鳥老境駸駸憂心悄悄拂袖歸來菟裘草草也待癡頑事須了故園三徑已是菊荒松老諸君應有語歸來好十六辛夘年秋八月與周宰逰王氏祠堂日日午餐餘即須幽討拄杖長行覔周老三杯兩琖不致玉山傾倒與君何處去乾岡好松影閒庭長吟藉草白髮多來故人少春山何在兩樹寒梅枯槁一聲鄰笛起催歸早十七史縂管誠明伯還洨州老懐悽然有不能已者賦感皇恩歌以送之十里走徴車笑余游宦老馬為駒望英盼客懐相慰時對凌煙生面浩歌雖慷慨南山粲公子翩翩沈酣經傳不是當年閉門衍揚花歸路肯逐東風流轉且遮西日去長安逺十八壽表弟韓雲卿臨事羨君才笑余拙宦待詔雲龍更英盼夢回孤枕依舊新豐旅爨明時無寸補空留戀綠泛蓮波望髙霄漢洒洒元康濟時彦諸公廷譽莫為驥淹臺院百年安健裏千千􅄸十九壽左司吴君草母夫人曉色靜簾櫳婺光千丈香滿含真泛春釀洛花呈瑞照眼一枝先放要將金屑粉粧仙仗月榭焚香松隂扶杖好箇人間壽星様斕斑舞袖輝映鳯池春浪年年稱慶日長無恙三月十二日時庭下有牡丹両闌内一花獨先開二十壽董野莊健羨玉堂仙中朝元老過眼浮華任紛擾百年心事愛煞野莊春好南枝誰道是調羮了風月吟懐氷霜節操千尺青松儘難槁春宫調䕶好箇當年商皓日邉消息近中書考秋澗集卷七十五欽定四庫全書秋澗集卷
