front:
  text: 集卷八十七
  hash: sha256:8a0bf320bcb9b5f36d0622605cb8b3bbbe3af0d6d5a0f0781a3962f6a20c2652
body:
  text: 元王惲撰烏臺筆補彈順天路總管祖世傑不合支俸事狀照得尚書省劄付節該今後官吏辨證私罪但離本職其禄不給承此今體察到順天總管祖世傑於至元七年二月為道大言語公事尚書刑部勾喚本官前來歸問至當月十七日到部至至元八年二月二十二日纔行還府乃本官却將正二兩月俸秩于本路䀆數關支了當事屬違錯合驗曠闕月日於本官處以依數追理施行論借貸飢民米糧事狀竊見益都淄萊衛輝洺磁等路農民因連年蝗旱闕乏餱糧自去秋至今春闕食草木至結死中毒病腫自縊死者㡬於累百其壯者迫於飢寒往往去為盜賊外據現闕食者宻州莱陽等處二萬九千餘户西京一路三萬餘户上下累申前後十月纔聞尚書省將三路飢民分開約量許貸米糧接濟却令今秋還納而上年以此等事依例催徵欠數叅詳極有未當者夫張官置吏本以為民至如為郡縣者承流宣化牧養元元為本主監司者以按治撫察問民疾苦興利除害為務且救荒守臣職也今坐視民飢大失所天至於此極不敢權宜畧為營救方循守常例行移申詳經由官府數重至於再三尚不獲請即救其轉死溝壑之禍誠可痛也又慮任内户口流㪚别致違礙虚言安諭隨以鄰佑團結保甲不使東西就食他處苟延朝夕以致殍餓死亡逃竄如此是上慢下殘而與有司殺之何異使監司管民等官當位食禄何顔安處民上而以牧養興除為治哉夫邦以民為本民以食為天宰相者代天理物下遂其宜者也今民急如此理合以哀痛為心猶已飢溺開陳事宜作急聞奏使朝廷曉然知利害所在大發倉廪寛貸鹽法或停罷夫役蠲除差税重加惠恤以賑濟撫養為事庶可以上副聖主天地雨露之恩仁民愛物之念不務出此視為細㣲方以借貸還官為事所謂聞荒不救見饉不驚者也兼所謂貸糧多有名無實竊恐虛行了無所濟且近年以來為百姓貧乏省部雖差官賑濟止是營救一時不見逺有安濟弭静之方以至於此如西京一路見闕食者三萬餘户今許借貸米糧倉斛二萬石約户給七斗家以五口為率日食二小升是僅能支持月餘兼山後地寒霜雪早至設或天災依然一月之外不知復何存活而秋田又無所望此又當慮者照得前宋時毎遇水旱饑荒必摘選京朝才幹重臣以體量安撫為職其一切規畫悉以便宜從事如富弼之活青州韓琦之救利益前後所活百有五十萬口足見規為有方雖多益辦况二三萬之衆乎又檢㑹得金監司條例遇災傷闕食去處有能以物賙濟困窮與民興利除害者按察司保申朝廷酌量旌賞其或今後遇有此等事理許令守臣從長規畫營校更乞將已借米糧即充賑濟之物外據上年懸欠舊税截日住徵其於官民兩得便濟某今當去職有見不言實為負責合行一就具陳據乞御史臺照詳聞奏施行舉李户部稱職合特加寵數事狀竊惟財賦天下之大計民部六卿之劇曹昔李唐一代以調度見稱者裴劉二公而已竊見户部尚書李德輝資禀忠純精詳政體夙夜在公克盡所事而又疾邪持正吏不敢欺爰自厯職以來實為允稱可謂蹇蹇匪躬盡瘁於國者也近聞尚書省亦以喉舌得人不許改充别職誠然照得唐例如裴劉諸人於度支鹽鐡本職上帯中書門下兼同之稱據尚書李德輝官資禄秩理宜特加寵數顯異良能以慰中外之望而當國者且復塞進賢之責矣烏臺日事自至元五年冬十一月終至元辛未夏四月請舉行科舉事狀竊見科舉事理往年翰林院已經具陳中書省乞聞奏定擬頃者尚書省亦下禮部復有講究條目至今未聞施行蓋未有度其事宜而力為言者伏惟朝廷凡有大小勾當聖意毎云尋好人者且好人者大槩解官事識廉恥以公滅私不作過犯之人若科舉事行必須先立學校使人人力學學校者國家之化原人材之大本也但自教育中來人終是通古今解公事知亷恥識名義鮮過犯如此豈非好人歟由是觀之庠序科舉以之育材取士最為急務理合舉行兼自立銓選以來内外郡官其品從散官俸禄職田子孫䕃序其為寵數亦已不薄至於功能陞賞之科過犯降罰之例又復備具蓋所以磨鈍厲世欲官得其人以之致理故也然取人之道未覩其由應選之人嵗有定數謂如目今隨路府州司縣見設正官一千五百餘員槩以中材較之其實良能著稱者少又中間身故老病因罪黜罷及闕員去處毎嵗極多據格法之外雖有適用長材又不敢枉法叅注一人是應選常調之者不數年所存固無㡬矣若科舉取人之法於此不早詳定是猶工巧者得製錦之方而無錦可製將何以就裘服之功乎又如儒人户計委係深通文學者依例免差若此科不立恐不能鏡别是否使屢通文藝之人終身不被其澤而又無路可進得展實用於明時誠可惜也以此叅詳科舉為法以之取人實為公當故厯代因仍雖格制異同終不能少廢此明驗也鴻惟太宗哈罕皇帝聖模宏逺戊戌年間以程戍之法畧為施行當時翕然向化所得人材不少據設科事理既係先朝已行故事理宜追述聞奏定奪施行如此則上可以副聖主求賢致理之心下庶㡬多得人材大補銓選内外百官之用不然人情急於進用勢利所在僥競成俗若此風一煽治道無由而隆風俗因之而靡尚何選法之有哉故時政所先莫此為重秉國鈞者宜深思逺慮預防其將來之弊則天下幸甚論職官公私有犯不聽收贖皆的決事狀古者刑不至大夫禮不及庶人兼爵禄者所以待材能亷恥者所以厲節行此自古之常法蓋斷不可易者今訪聞得尚書省奏擬到一切内外職官如公私有犯不聽收贖皆以的決論罪甚非待才能而厲臣節也如此則是有司教人以頑鈍無恥奊詬亡節亷隅不立而當職任者既無貴貴尊尊之義且以官徒自處苟日計庸而已假如外路一州縣官聽斷民訟其或無理者必諭之使遂彼執迷不聽至於再三官偶以怒詈遣出民必曰汝雖無私罪猶得以辱詈為公罪是當官者手足無措為小民者恣得羅織矣兼目今官弱民强例以授侮把持為事若此法一行官府決不能立上司亦不復制矣論者必曰相臣得罪且受杖責此何所措是大不然夫相臣受責出自人主一時權斷舊例即非永格體制不得引為後例今欲以的決施之天下必將為常行格法所謂非常之論民必懼焉恐此言一出斷不可訓徒傷天地之恩為國家斂怨之舉耳據此合行糾呈論重刑決不待時事狀竊見中統建元詔内一款犯刑至死者如州府審問獄成便行斷決則死者不可復生斷者不可復續案牘繁冗須臾決判萬一差誤人命至重悔將何及朕實哀矜今後但有死刑仰所在官司推勘得實見事情始末及斷定招款申宣撫司照詳宣撫司再行審覆無疑呈省聞奏待報決斷至今依上施行理實允當此聖主天地好生之大德雖堯舜無以踰此今訪聞得朝廷諭尚書省今後合行的便打了者合死的便施行者省官回奏云以前重刑待報俟秋分後斷決為這般儹下多有便似淹禁一般今後至如省部問了監察重審無寃不待秋分逐旋施行呵怎生聖㫖恁道得是一般所聞大槩如此設或在京者能然外路何以區處卑職叅詳刑者侀也一成而不可變故君子盡心焉謂如明白重刑其正犯干連贓仗准服進勘審覆臨案須經厯官府數重少者不下半載之上不能一切完備尚慮事情始末恐有差疑人命至重無致枉錯有傷和氣故舊例重刑不限催舉待以嵗時欲于三覆五奏之間脱有寃誣庶正犯敗露不敢濫及無辜以極哀矜欽恤之意見不嗜於速殺也至於秋分後行刑蓋自古帝王體天行道以順四時生殺之理此又大不可悖也如舊例決不待時蓋所以待惡逆以上罪也今者將一切常犯死罪者數月之間案牘稍具止令省部監察審問無寃同惡逆罪犯決不待時雖臯陶在上不能保曲盡獄情一無寃濫今畧舉近年北京髙烏呼鼐壻銀延夀奴將隨逐妻家驅男長壽轉賣上都民家在後事發到官以殺害驅男自誣又經中書省審明官審問無寃至將延壽奴作死罪斷訖一百七下及將妻髙氏離異既而驅男以親書達于部使乃知本人誣服本道按察司方為改正以此叅詳捶楚之下何求而不得兼法者天下之公並非倉猝間所可擬議伏惟尚書省總持紀綱號令天下命之安危民頼一言之所繫誠當審量事宜集議允當可為永格者而後更改聞奏以救既往則天下幸甚據此合行舉呈髙唐州州尹張廷瑞稱職事狀今體得髙唐州州尹張廷瑞自到任以來甫及朞年五事可稱一方受賜蓋其人强幹有為廉能素著凡所興除率先律已如待僚佐以禮束胥吏以法勸課耕桑裁抑游惰宣明教本則首興學廟拯濟羸劣則課習醫流井井有條吏安民便而又曉暢軍機勇於臨敵向軍虎嘯以肅邊聲今尹齊西號稱治最誠有用之全材一時之良大夫也理宜聞奏擢置監司不然百里之地不能盡其所長為可惜耳據此合行具呈請立登聞檢鼓院事狀竊見一等狂妄小民若無寃抑如婚姻田宅户門等事往往輒便接駕唐突聖主愛民心切以為事重致使聖顔未嘗不為之動其唐突者必奉將勅㫖令有司理問然後退去則是萬乘帝王之尊下行有司之事萬無此理臣下能不駭懼合無建立登聞檢鼓院如有指陳軍國大事朝政得失大段寃抑累經訴理未獲辨明或事本機宻者許令投進以聞如此使天下寃抑之情得以上達而朝廷尊嚴之勢彼狂妄小民亦不能咫尺輕近論立司諫等官事狀蓋聞朝無諍臣則不知過國無達士則不聞善至於諸侯卿大夫士庶人皆有諍臣諍友則國安而令名可保矣况萬乘之帝王歟伏見朝廷近年以來雖或事小情有似重者天威震怒出於一時輒至不測欽惟聖慈隨復追悔以至有失常問如何無人題奏來所聞大槩如此今憲臺雖立或有所論執卒不能上達得開陳利害於前合無選近侍重臣輔以剛正儒者使為司諫等官如此則聖益聖而明益明且免夫既往追惟之悔天下幸甚論職官子孫試補省臺院部令史狀照得舊例皇家緦麻於上親及曽任宰執之子聽試尚書省令譯史皇家袒免親及宰執孫并弟若三品以上職事官之子弟及終塲舉人聽試臺院令譯史其散官五品以上職事子孫兄弟皆聽試部令史譯史及姪或散官不及五品曽任五品子孫兄弟皆聽試部令史譯史通事竊見朝廷近年將大根脚官員子孫分付都省臺院習學政務此正前代宗室宰執職官試補之意也至於宗室子孫不敢輕議如宰執職官弟姪理宜舉行蓋宰執職官子孫弟姪終是有門地大根脚中出來人其所聞所見無非宦體時務有所顧惜且不急於財賄此最可取者今後合無酌凖上項格例限以嵗月試驗克堪相應之人令於省臺院部與吏員相叅勾當實為兩有便益且吏員職掌文字皆係國家庶務刑政機宻動闗利害自非守慎公幹者鮮不害事若以宰執職官子孫相叅勾當驗事務輕重上下分掌使逓至琢磨長短相補持體倚辦各有所司豈非兩有便益者哉為吏員者漸磨既久務知逺大聲迹漸好易其鍛煉積習之心為子弟者通曉政事一適於用革去驕惰侈靡之氣不數年使朝廷之上備任用者比皆良能公正閥閲素宦之人將見私己門下僥倖泛濫之弊不革而自去矣舉都事馬甫并選用儒者事狀竊念臺之為司不同省部職掌上所以肅朝廷之紀綱下所以正百官之邪僻至於軍民利害刑政得失皆得糾而繩之故一臺綱領必須擇得其人使内外官府動或過舉則曰有某人在恐不宜然可也又古者用人唯出至公雖父子相舉兄弟同臺官府有舊皆不以為嫌如或不才抑濁揚清正臺司之職耳竊見都事馬甫性詳静嫻吏事凡所論議務先大體以儒飾吏者相叅勾當方為允稱不致事務差謬為外望所易論陳提刑改除不宜取解由事狀伏見尚書省奏擬山東東西道提刑按察使陳祐簽中興等路行尚書省事就令本司取無粘帯解由前來叅詳見設按察司五道據祐忠直剛果毅然有為脱略苛細務明大體凡所興除民安吏畏風采所加百城震肅以聲迹比量最為稱職兼山東東西阻山負海地廣物衆連年蝗旱軍民不安所仰祐等以之鎮静今祐所除名雖相列其實左遷若向前代官苟非其人是一道監司殆虛設耳憲臺理合開陳可否以之執奏别議選注外據取解由一節照得舊例凡省除官例除者止是給據别無取解由體例且按察官係朝廷耳目之使以按劾糾彈為職不同州府掌管事理今也擠同有司一例取解由赴省似為非體乞一就定奪據此合行舉呈論五品以上官殿授事狀訪問得舊例五品以上官得除者殿授皆奏請六品以下官於嚴祗門授而無謝禮今者内外大小官員其宣命勅牒皆於中書省授祗受似有未當者且三品至五品官僚職掌難分内外俱係國家係重臣子而朝廷誠不可不察視其人之邪正能否也昔唐太宗將都督刺史姓名疏於屏風欲坐卧觀覽得善惡之跡注於名下以備黜陟至𤣥宗將已除職官延之内殿詢訪治道然後諭遣至人人感激莫不各以名節自奮故貞觀開元之治號稱隆平今後合無將五品以上官員盡令陛見祗受宣命使人人躬被恩寵於朝抑且革去僥倖非安之徒外據六品以下官員且於中省祇受權宜門授之制如殿廷定立然後别議施行論貧難軍合從所屬定奪事狀竊見天下新舊軍户極有生受難以應當者如貧難年老單丁女户消乏者是也至如新簽軍人近年上司畧行分檢難易不堪者却行收係為民二千餘户况在前年分舊軍中間年老單丁女户消乏貧難數多獨不分間優恤何事情一體而舊軍偏重如此蓋有司之不省故也其最可傷者如貧難等户往往陳告經年累嵗乃無投向如告到總府府司止備申兵部部即曰非我當問即行下令申合屬本路依准申覆樞宻院院即曰我主調發但恐闕少正數而已仍散押入案亦别無定奪叅詳遂使貧難軍人無所控訴而軍前氣力亦不濟用是軍力又難上下既無分解兩相躭悮今畧舉懐孟路舊軍李用姚三秦義等三名俱各單丁年八十餘嵗無人供給逐日沿營乞食應役向申樞宻院不蒙明降其秦義近於軍前因病身故本路又將李用等二名申詳兵部又行下令申合屬别無定奪此明驗也今檢㑹到唐制健兒在軍皆有年限更來往為煩勞敝又諸軍鎮量閒劇利害置兵防健兒於諸色征行人力及客户中召募取丁壯情願者充健兒常住造局者每年加常例給賜兼給永年優復其家口情願去者聽至軍州各給田土屋宅人賴其利中外獲安是後州郡之間永無徴發之役又舊例諸軍健年六十者罷役如秦義者八十老人使之守戍禦敵何所賴其勇健哉今後合無應貧難軍人陳訴許從合屬受理定奪勘當的實准復寛減差役或别議優恤庶免致靠損人難進退無據不然請依分間新軍體例將貧難極生受者亦從長定奪似為安便外據闕少合補之數官為召募情願者聽仍優復其家口遇有戰功普例給賜如此可以收壯健而活疲民其為惠恤小民豈不倍於尋常萬萬也據此合行舉呈薦臺掾趙文昌事狀竊惟臺之為司以禮法繩官邪用儒術飾國事近世以來文學之士專尚才華少諳吏業一旦從事鮮克有為苟有盡心誠可嘉尚竊見前濟南副提學趙文昌自為臺掾强幹有稱夙夜在公精研政事文儒有飾吏之才養氣負嫉邪之志求之等倫誠難多得今去繁居簡明見甄奬若臺司將來闕員如文昌者誠宜推用必能不負所學克堪所任儻升霜簡之流􅀹屬素餐之勵某今當去職有見不言實為負責據此合預申薦舉左丞姚公充經筵等職狀伏惟朝廷凡有大政大議必須清問故老茲蓋詢諮黄髪恐有所愆之盛意也竊見前中書左丞姚樞潛邸舊臣中朝元老生平以聖學為心輔政多嘉謀入告近簽南省為衆牽持罔伸所懐今年雖耆艾精力未衰謀猷論議足有規為未宜閒退使後事功至於侍講經筵監修國史保傅儲闈承㫖樞宻實為克堪負荷必能進盡忠嘉有所廣益兼翰院集賢等員如許竇二公者已蒙恩眷如是有此體例合行舉言者伏乞憲臺詳照施行論衛輝路不宜通管竹課事狀竊見衛輝路見管竹課據所該地面懐洛嵩汝唐鄧徐邳益都泰安等處方圓萬有餘里其實難以勾赴今止令衛輝總府並𨽻管領恢辦課程不致虧兊失悮叅詳極有未便者蓋衛輝路分㣲小當四衝驛程民訟課差諸軍鄂囉一切課程等事比之他郡百倍其劇今又將諸路竹課並令管領雖極慮盡心勾當決有力所不及去處又縁竹雖官貨實係經商交易不問商税認辦宣課事體至於斫伐有時搬運有法價值低昻使官民兩便自非通知貨殖善於理財者鮮能首尾相應彼此皆辦兼上項有竹地面必須差設監司巡竹等官吏又令聽受本道節制前去各路營運其間交關往來其路分既平牒衙門而監巡皆差委客寄少有蹉跌輒成沮阻與其廢力如此何若各令所在總府兼行管領以為長便又照得濱樂清滄解鹽依舊專設司事恢辦合無將上項竹課亦另行設立監司同鹽塲一體管領勾當庶氣力專一終是易為責辦今省部若不如此從長别行定奪將來衛將官府不惟因此負累其所辦課程倘有虧兌失悮深係利害據此合行舉呈儒士楊𢎞道賜號事狀伏念髙尚之士何代無之國家必遂其素志賜以處士先生之號蓋其材學節義可髙足以勵薄俗而敦風化故也竊見益都路耆儒楊𢎞道文章德業師表一世至於賊璮頃年徼功經營海道欲遂奸計先生預有所見發為歌詩聲言不可今行年八十有三窮居守道垂老丘園誠天民之先覺清時之隱逸也合無照依莊靖李公恩例乞賜處士先生之號以表其康節且令本路嵗時常加存恤請職官依舊三十箇月遷轉事狀竊見即日到部聽除職官縁員多闕少填積停滯人數以致進退兩難有礙銓調似失材能樂於從政之望深有未便者至如尚書省奏准令大小職官皆以六十月為一考蓋出一時權宜本為收拾户計等事恐考限短促中間不能盡心勾當而已近聞隨路户口事理已是檢括版籍見數别無隱落若止擬六十月成考嵗月既久則官府人情不無厭怠輕易之弊又於選調有所窒礙據一時之制似宜復舊合無聞奏復依舊例三十月為滿考選調或得通行庶官免致間曠實於官民兩得便當彈劉汝翼事狀今體得知中路教授劉汝翼今月初七日於崇孝寺與提學楊榮因議事間用言侵犯遂將楊榮輒行毁詈及攬捽髯鬚至於脱落却行私下勸和叅詳教官為人倫師表宣明教本訓導生徒為任乃劉汝翼者兇悍荒􅒬陵犯官長為細人所不為既傷儒風大失士體使京師首善之地何所矜式應遴選師儒以代其職據此合行糾彈論隨路闕員及未到任官員事狀竊惟張官置吏本以為民官得其人員不曠闕庶得民安事辦今體察得隨路見闕總管八員正從七品二百七十餘員兼州縣省併以來所轄地面極有寛濶去處加以蝗旱大作民心嗸嗸似為未安况京兆平陽太原濟南等處皆係重鎮􅀹不可闕員勾當合無遴選才德兼備素為朝廷所知者掇注總管及州縣被災重處員闕多者省部從長講究於見守逺闕官内選摘或令内外五品以上官辟舉廉幹相應人借注補充勾當又知得四月中受除官員已踰兩月尚有未到任者五十餘員亦當作急催督别議究治不然竊恐中間規避致悞一方事務又於國家法制有所滅裂合行一就舉呈為起蓋良鄉縣南留里河橋梁事狀㑹驗中書省條畫内一款該若有利害可以興除者申臺呈省遵此竊見中都迤南係四方官員客旅朝㑹經行驛程正路近體知得良鄉縣南十三里有舊來經由留里河橋官道南至涿州六十里兵革以來橋廢不行目今靠西由繼陽套遶轉至涿州七十五里若經夏秋河水泛漲濘泥虚陷致使鋪馬客旅來往生受兼繼陽套地形卑下村坊逺窵接連溝澮屢常失盜深為未便竊詳若依舊起蓋留里河橋道不惟道路髙平徑直使鋪馬客旅往返近三十餘里又免水潦濘泥盜翦之患官民實為兩便伏乞御史臺備呈中書省行下相視起造施行益津縣尹張英非違等事狀今察到益津縣尹張英自到任以來甫踰四月其逐節非違為私蠧害等事開具于後據此合行糾彈一縣尹張英到任及今兼掌尉印凡失盜三起明有窟穴顯跡不即督勒弓兵嚴限緝捕却為擗問失盜李鄭二家親屬及勒要訖事主王伯英自願不行申告文狀其縱滋盜賊以有為無匿而不申度其主意止恐不獲停罰月俸本縣民心因此失望其張英字民之官務在肅清所部盜賊消弭方為稱職今所行如此非唯違錯實為以私滅公一前益津縣尹張文郁主薄李璋使訖鹽折粟鈔三十餘錠其張英明知前官侵使官錢不即依理舉問又不正約本官申明使州知會於九月十九日反行送出還家去訖及發下馬駝一千餘匹已悮料粟纔於十月初十經隔二十餘日不由所管上司擅自赴府而越言上説稱前官張文郁並不交代往豐閏去訖乞勾追發下依理交代及總府退訖月申縣解却就都於州司吏李讓處詭取本州空解依前申覆竊詳上項事理非惟失悮支持事屬欺罔詐冒兼張英係監臨之官知代官有犯故不舉問遂令還家其徇私害公孰甚於此若弗糾治竊恐因而循習别生事端所據前項事情就問得州吏目王文進司吏吕仲榮與所察相同一霸州益津縣分俱該河流陂浸地面其驛程係山東要路中間津梁最為急務又照得省劄修理橋道事明該簿尉闕員委自己上正官兼管及令長官檢校其縣尹張英將本縣合修橋道堤口畧不省問止委弓手盧得用管領工役致使人夫逃散冬月寒冷修叠不能了畢使經行人員罷役城夫及發下馬駝蕩涉氷水人幾有漂沒者就問得縣達嚕噶齊實哩布逹吏目王文進與所察相同其於公不幹違錯怠慢如此不可臨民一守令百里寄命苟非其人則一方被害其張英性荒嗜酒昧于事體又乘酒縱暴不居公廨將公使人符首領等非禮毆擊致有逃避之者及本州行下事理如橋道見禁等事往往違拒輟不申報至於縣司所行或不應者典吏報覆畧不聽從恃賴曽為部掾蔑視上司如委棄尉印令弓手張典掌管將實哩布逹私己人赫舍哩為巡捕祗侍官見於煎茶鋪勾當其恣意亂行如此致將公務窒塞兩躭非止一事兼張英前任唐縣其部民告發不公等事上司未曽歸結不審縁何依前遷除益津縣尹勾當合無一就究問彈左巡院官休和趙仲謙事狀今體察得趙仲謙於至元五年十二月内詣中都左巡院告王四打死妹趙喜蓮事其郝警使馬警判蕭典史提控張仲禮將被論人王四不行撲捉到官及在都見有干證人亦不勾喚虛調行遣及將潞縣取發到干連等人並不與原告被論當官對問縱放還家其事主趙仲謙見為巡院故意遷延再行告到總府并右三部行下巡院其巡院官吏止是依前虚調行遣並不理問却於今年二月二十日有郝警使沈警副等當􅆹公然省㑹原告被論人等與限二日勸和了者竊見巡院係京畿親民正㕔務要禮義興行肅清所部據前項違錯事理合行糾彈為添科南京不任差户事狀竊見南京路兵興以來百色所須盡出民間如挑河運糧和買和糴採打木植造作船隻器甲等事三年之間畧無寧息加以蝗旱相仍物價湧貴其被災去處至今有闕食者而賑濟天恩又不霑被中外嗸嗸財殫力困已是生受又即日蟲蝻比之去嵗滋生極多近體訪得今嵗將本路新收二萬四千餘户盡行添科差發須管不失原額却縁照得上項户計内一萬餘户俱係交叅重抄老疾不任差下户竊恐絲銀一出别致逃竄將閃下差發必洒於現在户數可敷原額如此是百姓重併轉増困斃兼目今襄漢未下攻取之本首仰湖南據已困之民為國計者誠宜深慮撫摩存恤得小利為易固邦夲為重合無欽依近奉聖㫖減免益都差發恩例再行勘當堪與不堪從長定奪聞奏施行據此合行具呈御史臺照詳施行為除豁河南屯田户差發事竊見河北路分新簽軍户省部將原當盡數除豁了當今體知得南京路屯田户計相近二萬方其絲銀止除訖正額餘尚垜下數目却令現在民户包納即日夲處軍馬調度百色所須民力已是生受更將額外絲銀敷納竊恐靠損不安合無依見起新軍差發一體除豁以望百姓蘇息不致因而重困為劉古鼐打魚事竊見雄霸武清等處魚官劉古鼐所管專一打魚人户七十六户毎年納魚二千餘頭自去年納至五千四百餘頭比舊數増一倍之上儘供官司用度今體知得嵗納魚數増至萬頭竊詳雄霸等處俱係河泊斥鹵地面其間貧難人户别無營産止仰捕魚為生應當一切差役又兼依例認辦課程其古乃毎年以民間抽分魚貨已是侵擾今來本官為増數及萬陳告上司將應有河泊盡拘屬官禁絶諸人不得採捕就問得魚户趙知事與所察相同若依上項所告不惟下奪小民衣食而於國家賑恤貧難之意大相乖違又兼天地生物有數嵗取萬頭不㡬于竭澤乎據古乃所請理宜裁抑合行舉呈秋澗集卷八十七欽定四庫全書秋澗集卷
