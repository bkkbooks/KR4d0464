front:
  text: 行狀
  hash: sha256:528a475b172078170f1f7c3343746302784b879de336da2a40cb915143179866
body:
  text: 故真定五路萬戸府參議兼領衛州事王公行狀曽祖諱某祖諱某父諱某昔王延州有云君子有恵政而無異政史臣傳循吏而無能吏故班孟堅叙龔黄鄭召諸人曰生有榮號死見奉祀廪廪徳讓君子之遺風矣徳既肆乎循政復極乎惠求之今人其惟王衛州乎公諱昌齡字顯之姓王氏滄州人世雄於財以孝義著稱鄉里公少穎悟不凡業儒學嶄然見頭角故大父臨終嘆曰王氏之宗善積有素嗣續弗絶必矣然大起吾門者必在此子也貞祐初滄景被兵破公以孤童子能依彊濟難間行歸汴抱負竒節時人未之知也正大末京城戒嚴北面元帥府以材幹辟公授帥府經厯官積勞遷明威將軍陳州防禦判官適書大丞相政總兵民撫鎮河朔開幕府舉艮能恢𢎞父兄之業用薦者起公參議幕府事公遂悉心畢力知無不為故得感同風雲合若符契國朝有事東南城攻野戰餘二十年公籌畫戎幄應變機權無戰無之以至冒矢石輸忠力作士氣雖一時輔佐有不克負荷者初王師次安陸負險之民盤結山谷間備禦完固艱於力取公慨然以招諭降集請行時人危之既抵壁宣示恩信喻以祻福竟以招降而全活之嵗丙申冬天兵次光州時餉道不繼主帥命公率十餘人乘筏入焦湖督運中流遇賊甚劇衆怖亂筏傾身没於水者半公獨神色益壯持兵殊死戰賊潰䕶所運以濟軍士頼之大振遂取光州凱還丞相嘉公伐謀制勝之略遂留公居守公遂附安反側市肆不易安堵如故幾於一載及策勲盟府主帥累公之績以聞朝廷褒寵之而後奉命北覲通名於天朝者數矣每以生民休戚軍國利病為已任西風沍寒徃返之勞略不之卹也於今良法善政守而不失者多公所請云辛亥秋七月先皇帝即位正封邑錫勲舊復以汲胙共獲新中山陽六縣之地封戸書大丞相若古采地然昭其功也時朝廷以汴洛荆徐畀丞相經畧之以衛乏人為憂且曰衛當四達之衝民疲事劇非得二千石循良者無以剷夷積弊涵養瘡痍也既難其人特命公領其事公下車以來敬以奉上恭以執事巨細不遺知所後先哀民之困於繭絲也均徭平賦以畜其力痛政之極於汚染也治官汰吏以清其源并容細民不擾市肆懋遷有無以通舟車楗隄防以捍水灾課農桑以抑㳺手尊王人則修餙官舎免病涉則平治橋梁勵薄俗扶善良禮賢俊贍貧乏行郛郭廣居㕓通商惠工興滯補弊民不見吏而無吠警之虞士格所恥咸有聞知之懼葢公之治化謹身帥先居心亷平不至嚴而已衛自亂餘以來民耕植居郡東者多而泉水自􅅠城而下崖岸平流駛如掌上稍東復與淇水合秋潦時至涇流之大南際漢金堤田廬為之一空公為隄黒蕩陂以禦之遂絶横清之患清水出山陽白鹿嵬公乃度原隰創溝澮溉田餘數百頃其興起洑利如此朝歌介邶􅅠之間地廹山麓灌莽極目盜闖出没越人於貨行者苦之公乃建議於漕臺周侯徳甫州而縣之驛亭平襄南棲頓丘於是淵藪之患息馹騎之力紓焉而徳之波及鄰土者又如此既而丞相材公之為酬公之功以其子復充同知衛州節度使事遂有撫卹軍氏均平差役勸課農桑裁決詞訟治效極多之譽誠以八年之間熈然而春郁乎其文樂國多士之風還舊觀矣已亥春例上計行臺惟法苛猛公不忍甫息之民横被侵暴遂乃道巴峽扺忠渝哀鳴相府中有以彌綸之也雖獲所請竟以憂勞致疾東歸以是年十月廿日卒於虢縣之斜坡里春秋六十有三越十一月葬於汲縣王尚村之西原送喪者餘萬人攀號祖奠凝慕不已其貴官名士若庫庫左丞姚司農張左轄參卿王仲禮宣撫張子敬耆徳孫元輔段季昌咸逺道而致祭衛人思之如戴父母明年相與起祠宇立遺像植豐碑壽遺愛嵗時香火之奉其嚴如生公姿明良安雅徳量無涯涘風鍳表表口不出臧否飭吏以儒外彪中弸慈祥豈弟喜愠不形於色務明大體悃愊無華持論深長操守匪石其待人御物純以至誠感發人心諄諄訓導若嚴師慈父有銘骨不能忘者初京城被圍友人某以罪逮捕抵公為舍匿之竟以獲免焉制徒單雲甫肥遯鄰邑聞公之典衛也幡然來歸為治堂黌極賔禮選子弟之開敏者從而師之自是郡之文風尤為熠興又曹取齋通甫由趙來依疽發背自病至終公醫拯殯送曲盡友義北渡後元遺山號稱一代士林之宗愛慕高義乃有今而後寒士知所歸之嘆每自公退食盤饌稍盛必撤去之曰無暴殄天物及宴樂賔客供具豐腆盡於殷厚曰儉於人則不可也餘暇則閲書史接文士晚年尤喜作詩歌詠風流不知老之將至至雄章傑句間見層出兼善尺牘行書嘗謂下客王惲曰吾少業儒以時艱罔卒所志然胷中緒餘之氣勃勃然日新矣其好學又如此愛其子擇師而教之因訓之曰我不願若富貴能儒素起家敝廬饘粥生養死葬足矣故於諸生奨藉作成為尤至所交皆天下豪傑其推賢譲能而升諸公者如中山揚西庵盧龍盧叔賢河南鄭子周陽夏董端卿皆一時材大夫也公之殁丞相墓祭而哭之曰昔公勤勞我家三十餘年事無巨細咸仰決焉豈其天奪之速而至於斯俾予㷀㷀然在疚至有失目折肱之喻哀號之聲感動左右其為賢主人所惜如此不可謂不遇也不可謂不達也故論者評公之惠愛類鄭子産忠貞類漢王常智周事悉類蘇令綽權闕望雅闕事闕之其樂於為善之心乂如飢渇之於飲食也茍推而行之天下其功烈豈止是哉夫人姓陳氏闕人生子男一人諱復少負鑒裁無所於間通達政體用丞相廷薦宣授衛輝路總管事其綸章諭之曰故參議王顯之才行相輔政恕中行俾治衛輝民安事辦今子復良有父風以繼述之事考之誠無愧負矣孫二人曰雪山曰鐵山女孫一人曰㓜安嗚呼公生平事業智名勇功囊括無迹恐蕪類之辭不足發越盛徳之萬一敢以區區聞見播在輿頌之實者勉為具述託立言君子而圖其不朽焉中統三年秋九月廿有九日門下王某謹狀太一二代度師贈嗣教重明真人蕭公行狀師諱道熈字光逺本姓韓氏其先汴州人五代祖銀青榮禄大夫璹自唐季來𨽻於衛曽祖奕山舉茂材祖渤進士第父矩隠徳不仕度師其仲子也師為人英偉眉目疎秀豐下美鬚髯三嵗識字六嵗能書棲心教法儼然注蕭門二葉之望金正隆間始祖一悟真人以神道設教上動人主所在翕然從風韓氏舉族清修師母閻尤極信心深入法海既孕若病父請禱於真人真人曰汝韓氏素植善根當産異人且昭陽報然將來必佐吾法門可服吾丹書以安胎息乆之母感異夢既寤師生果禀竒相充閭之氣肅如也纔免懐留養道宫受度為道士復先訓也再命而受清虚大徳之號大定六年冬十有一月真人羽化於萬壽丈室師縗絰哀慼如喪考妣於是相宅兆具葬儀及殯整整有法綱而不紊觀者咸嗟異之時師甫滿十祀耳既窆師乃陳寳籙法物具香火陞堂以二代嗣事諭衆有門弟子芋道省劉道固等思有以大厭衆心稽首求頌且問師它生云何賢聖師即走筆批曰明月清風大徳頗訝愚人未識忉忉詢吾為誰只是從來太一衆遂讋服歸心焉九年朝廷歆其行異勅立萬壽額碑於本觀是後聲教大振門徒増盛東漸於海矣初真人謂靈章寳籙率天神持䕶遺命起臺中央上為壇屋鐵作戸牖庻幾神靈㳺居有以妥安之師乃擴充尊訓尊光圖籙締構層閣制極壯麗掲以靈章寳藴之名嵗時醮祭為衆生進階之地復建朝元觀為祖師墳原道塲仍植豐碑表襮景行不數寒暑内外修治輪奐中度師直以徳教感化曽聲色不動門人子來如趨父事十一年時師殆十有四臘門人鉅鹿李悟真者造請何為仙道師曰做仙佛不難只依一弱字便是耳曰弱者道之用也悟真既授㫖辭還師曰可速還汝當遷矣明年李不疾而逝殯七日形色如生及壙舉棺蔑如開視之從中一白錫飛去餘衣衾而已衆始悟師㫖當遷者即仙也其慧悟如此一日師曵枤逍遥謂左右曰吾旦夕欲馳四方可趣治行裝已而世宗詔求海内名師宗主天長觀事師遂幡然應詔不閲月戸外之屨滿矣師宻削疏聚精以備儲乏既而秋旱京師物涌貴提㸃陳公者請行化畿内師曰君休矣吾已辦之或者疑焉不數日陸輦川舟坌集於門下衆服其幾沉物先徳博而化時大定十四年也明年春辭還鄉里後四年復徃趙之太清觀適境内大旱衆禱雨於師曰今藴氣隆鍾願垂慈請命上帝師曰若等冝先竭誠徧走羣祠弗應當以吾法行之越三日不雨師乃書飛雷捄旱符一道張净几上復呪法水數石令州將已下人酌水沃符畢雨即來矣行未竟雷電雨且尺嵗頼以熟迄今趙人能道其事後二年興陵夢師冠履上謁寤思之遂徴至内殿問以攝生之道對曰􅌵噏精氣以清虚自守此野人之事今朝廷清明陛下當允執中道恭已無為而已聖躬為之興禮及還寵錫甚渥廿六年秋師忽思棲真巖壑因宻謂蕭道宗曰吾門衆萬數試經具戒者完顔志寕王志沖而已然志沖特純精亷潔可屬後事遂設大醮告禰廟畀之傳代秘籙曰君太一第三祖也及銘所付法具云有徳輔徳天孰可欺慎之敬之永保教基居無何棄几席謝去或問安所之曰吾將遍禮名山與心君作天逰耳遂去後不知所終師丰儀瀟爽徳宇沖粹博學善文辭動輒數百言樂與四方賢士大夫㳺談𤣥論道造極精妙書畫矯矯有魏晉間風格嘗自題畫像云來自無中來去復空中去來去總一般要識其間路其明達又如此生平好賑施養老卹孤近百人人以鏹五千月給為率死乃已貧者喪不能舉衣被棺椁為俱具之至於持行法籙捕逐鬼物風聲肅肅除治戸庭間殆古之能吏然精一之誠貫達幽顯降度之功洋溢一世矣師之𤣥孫某以貞常温裕為五代人天之師服膺先訓追逺盛徳心藏不忘越已夘春具大招之禮葬衣冠於祖塋之側今皇帝登極之三祀光崇𤣥化貞常師以祖徳範圍請諡於朝追贈嗣教重明真人噫道家者流其術固已多矣而太一之法輔行世教有不可勝言者其鴻靈幽秘變化叵測通徹神明之功幾於上下天地把握隂陽者矣然茍非其人道不虚行一傳而至推廣悉備若真一人𢎞衍博文繼志述事之善者也翰林修撰兼國史編修官王惲狀故金吾衛上將軍景州節度使賈公行狀曽祖鑑祖璋父政公諱徳字克仁姓賈氏景州蓨縣從教鄉劉卿里人其系緒見學官王鼎所撰衍慶碑賈氏前宋時出行管都團練使用威府君之後曽祖鑑志操高潔恥襲䕃不仕家素饒財以周急賑之為事祖璋性勤儉專事農務故貲益雄鄉里父政事親孝處昆弟間無間言宗族以純至稱生二子長曰贇早卒次即公資秀穎在垂髫時舉止如成人禮既冠慷慨有逺志樂施予不屑屑拘小節嘗與鄉人處事談辯雄偉無出其右衆屬目異焉曰興賈門者必此子也自是事有疑率質成於公貞祐初燕不能都徳陵南幸汴郡盜蠭起河朔在冀部滋甚澒洶囂混兇焰所灼里陌為蕭條公慨嘆壠首曰大丈夫生世不能除暴薙亂建勲名於時掇取富貴戴履兩間寜無愧怍羣俊少壯其言恃其勇徃徃依附為用州將材公為且知衆素所推服自白衣署公為故城縣丞專徼廵事於是設方畧窮根株破機牙擒捕招諭不數月冦難盪平尋國兵入中夏太師國王營屯彌亘原野聲勢大烈震掀河岳元州將某舉城降無幾宋將李益都全乘隙西畧甲戌嵗州遂為全所得盡縶官屬妻子以東太師聞變赫怒擁盛兵為屠城之舉公白於州將曰反復際明以力不支故至此况天道人事嚮背皦然詎能以智計免哉不早為所祻將噬臍願躬詣軍門請命遂間行至深州帳下太師察公忠誠慰諭殊渥許其請闔城頼以全活太師承制拜公定逺大將軍賜金符提控本州兵馬事丙戌嵗太師帯孫郡王南畧晉衛明年復東徇魏齊皆從以行其破上黨馬武大名濟南及信安水柵與三齊動兵關穆陵厯山下俱獲大功英威騰奕冠諸將列益為太師郡王所知遷鎮國上將軍節度副使兼右副元帥仍改佩金虎符時江陵齊東寧晉與益都界犬牙相入賊李蠻奴寗主簿者引海冦不時侵軼為百姓患公連戰破之東鄙遂安陞授金吾衛上將軍景州節度使嵗丙申以蓨縣城東光阜城呉橋故城𨽻焉嵗丙申六太子復命以分地所入江陵齊東寧晉八城俾公總治其事公為人恬退每物盛為戒丁未嵗年五十有二即致政閒居日課家僮輩躬瑣事澤車欵段優㳺田野間人不知為故侯宿將也至元十一年甲戌秋七月二十八日以疾終於劉卿里私第之正寢享年八十有三公臨政剛明有斷僚友間容辭謙讓急於持吏惠以養民卒之畏而愛威而不猛循循然有古良吏風初州將以甫離搶攘人心轉側頗任刑立威所犯有事重而情輕者有情連而力嚇者公為析理營救多所昭雪以從輕議又同列馬侯子趙君妻男幼女彈壓宋某氏者被擄胥靡營幙間公傾橐資購而良之其輕財重義類多此生平喪祭為尤重嘗謂宗屬曰兵荒來上數世殯淺土徳又早失怙恃其於大葬之禮非竭力盡心罔極之恩何所圗報遂大治塋域表叙昭穆封植林丘而安而厝禮莫不備復樹豐碑紀世徳以見夫祖宗隂積所致之厚一郡有光焉性喜修潔裘馬鮮整自少若素宦然稍涉書傳善左右騎射矢不虚發時輩無與之比公八秩時徃讌從教别墅二㕙起田間飛鞚囘射獲焉其精力老不少衰葢如此夫人高氏蘇氏魏氏劉氏魏氏以賢配稱夫人梁氏施氏張氏馮氏王氏李氏亦俱有淑行如夫人者三人楊氏張氏趙氏子男一十八人曰茂宣授金虎符昭勇大將軍左翼侍衛親軍都指揮使行淮東左副都元帥府事謨勇忠謹以良將稱善射葢家法云曰著前宣差景州管民長官曰莘未仕曰芳樺車弩千户曰蔚未仕曰英宣差滄州節度同知性方直有從政才曰仲温前景州課税所長官亷能有幹局曰毅前河間路諸軍鄂囉總管曰萍前征行千戸曰僖曰蕙未仕曰玉前征行千戸曰芝未仕曰嵩前景州勸農提領曰彬曰仲信曰進曰璧俱未仕女一人嫡夫人高氏所出適侍衛親軍千戸張琬男孫四十九人茂之子奈曼岱宣授金牌侍衛千戸重孫一十八人兄贇子一人曰榮前景州鄂囉千戸榮之子三人重孫二人嗚呼盛哉十四年丁丑春元帥嗣侯茂暨弟仲温介參謀趙君禹卿提㸃李練師子𤣥來謁予曰先都帥祔葬墓木已拱比年國朝方平一江左不肖忝居戎右用是其未見神道者未即樹立以慰下泉霜露之愴不遑寜處今將託立言君子圖其不朽焉敢再拜以事狀為囑遂勉為次第之故蠡州管匠提領史府君行狀府君諱忠字良臣姓史氏蠡州愽野縣孟家里人曽大父暨祖世在愽野俱以伯仲稱父諱成繼業耕稼善因地利自高祖以降昆弟宣多至府君凡五世同居藹然以孝義風一鄉君兒時日痔錢鎛為戲及長姿純厚與人交不妄言謹身節用致桑土滋植然慷慨有顧盧料事多合情得宜里人推其識量凡所疑滯必諮焉而後行貞祐初國兵入中夏蠡被圍太守特格嬰城自固民懔懔崩角莫知所屬欲鳥獸散公約衆合謀曰金駕而南委河朔去州又自顧不暇事勢至此吾輩將安所託正有畏天順時得全性命為計之上不然何為束手俟死衆以君素有畫可仰聽焉遂率孟莊鐵千兩河夏村等老稚百餘人持牛酒詣太師國王行帳投附王矜其情許焉命公前慰論者良乆且給符約遣各歸田里尋州破鄰鄉多被屠掠惟孟莊兩河等里得安堵如故兵後嵗飢疫公惻然興感曰家幸贏餘胡可坐視鄉人轉死溝壑即出葢藏粟五百餘石計口而惠之頼安活者甚衆其散而復業者徃徃力殫具乏公為假牛畜耒耜畼種有因疾田蕪不克治者公廼侣結義社相捄助於是秋穫皆有得家具酒食勞公以謝其徳公曰患難相卹人之常道奚謝為第比年來仰荷天休稍即温飫不以禮道維持羣居雜處未免侵犯争鬬之事衆對惟君見訓俾終厥惠君雖不經見聞遇子弟必申以孝義父兄則勉以恩愛聞順而善事者必需之飲食以蓄其良心彼㳺惰有安狎於不順者即畏以官府使其懲戒於是田里安集不知出喪亂之餘而有讓畔敬饁之漸毎入夏設粥瀋於路以濟行人其周急濟物類如此聲稱傳播時人有義門史氏之目州總匠王公興秀賢其為曰吾嘗聞居家理可移治於官遂薦於行省劉公署工匠提領府君感其見知盡心所事於是配能否均程課革舊弊皆有條次不紊及考工器率堅良精緻且合時度不為巧虚積料餘繳幹局稱入未嘗竊徙工治已私以自腴總匠每稱能以勵其餘某年月日以疾終於家享年八十有五葬孟莊北原先塋之次識者謂公徳純行美効官及物者甚廣其儲祥萃慶不在其身而子孫將有勃然興者娶同里某氏柔順勤儉克配公徳生二子長曰伯祥次曰伯福㓜承訓道俱孝而友或以襲父職為言伯祥曰吾家世服井畆以孝弟相傳逮吾先人輕財重義表率一鄉雖遭罹世故所直挺挺然大先業為光今予昆弟二人無所肖似繼守田廬負薪之責惟罔克是愓第知勤敷菑修疆畎寒耕熱耨濬源培本使光世之澤渟蓄汪濊霑溉後人俟其可以起史氏者乃所職耳聞者歎其志逺而有所見也及子弼長性謙謹寡言笑顔赫然軀幹魁偉孔武有力年十六七時耕牧田間午枕桑䕃下父徃饁遥視睨有𤣥虺穴其口父大駭趣呼之寤問焉曰無所覺自是手力愈若神助遂精習挺槊又善左右騎射﨣﨣然負干城之氣總匠王公子前潼關使彦弼異而妻焉舉於左丞相耶律公一見竒之得給事省府適考工上新製鐙弩力踰十鈞近臣有言弼材勇善挽此者即召見試有驗命列名扈從仍賜白金御驃以壯其勇不一二嵗譯語國字皆通習之嘗奉㫖數軍實於邉營岳祠於洛精簡而敝去壯麗而費省由是亷幹之稱聞於朝上知其可用至元已已命佐帥臣劉整南伐轉戰江漢間若鏖峨眉掀松楊㧞樊城下襄陽飛渡大江併圍維揚率肉薄先登及論功每在諸將右寳鞍錦服寵賚殊渥始自漢兵總管授金虎符懐逺大將軍行軍萬戸加定逺安逺陞昭勇大將軍淮東大都督改揚州達嚕噶齊今由鎮國上將軍進中奉大夫參知政事行黄州路宣慰使既拜命乃謀於婦翁奉直曰弼自惟起身壠畆遭際風雲被沭恩遇以汗馬㣲勞不十五年間仕至將相其於史氏榮之極矣兹葢祖宗勤苦純儉累積攸厚一旦發越於藐焉之躬者如是丕顯可不知其所自哉欲報之徳有懇求懿筆著信於後者論述隂積表樹丘壠而傳不朽庻幾顯揚之道奉直曰宜矣遂託樞相賛皇趙公及關使王君以事狀求屬因勉為次弟之中奉大夫之父今年六十母夫人某氏若干壽皆享有全福叔之子曰輔管軍千戸次曰翊未仕中奉之子曰蠡奴女一人曰燕哥至元戊寅三月晦日謹狀太一五祖演化貞常真人行狀師姓李氏諱居壽字伯仁道號淳然子衛之汲縣西晋里人生有淑質沉黙寡言笑自㓜喜道家之學年十三拜太一四代祖中和仁靖真人為師旦夕給侍左右進退應對容度詳謹中和知其可教甚善待之戊戌嵗受戒為道士命典符籙科式等事籙文部帙靈章寳篆仙階顯職稱號廣愽師裝繕嚴整銓次詳明大稱所委壬子嵗聖主居潛邸駐蹕嶺上以安車召中和真人於衛既至燕見之次薦師才識明敏志行淳和請傳嗣為五代祖仍從誓約易姓為蕭即蒙允可賜為貞常大師仍授紫衣其年冬中和謝世中和人品道價高􅀈一世師嗣挈𤣥綱以簡重堅潔持守成規洞洞屬屬若恐失墜及其張皇道紀醻酢事宜其應如響由是徒衆厭服聽約束惟謹前人之光曽不少佚時衛大旱守官致禱於師即書太一靈符浸巨盎中騰呪未畢雲葉膚合㴻雨霑足致徳譽日廣上聞於朝已未春上南廵駐蹕淇右重師之請幸所居萬壽宫悵真仙之倐去喜十界之得人周厯殿廡詢慰者久之師敷對誠欵允恊睿意眷顧光寵於焉伊始明年庚申中統建元春正月命師即本宫設黄籙静醮冥薦江淮戰殁一切非命者迎奏際隂風凄凄若有趨赴慘泣之狀秋九月詔赴闕下上親諭修祈袚金籙醮筵翼日特賜號太一演化貞常真人二年冬上命禜斗於厚載門親詣祝香仍賫錦紋綾帔四年秋遣近侍䕶師頒香嶽凟等祠仍賑濟貧乏至元三年以京師劉氏宅賜師為齋潔待問之所六年春皇嗣請師禱祀上真用介繁祉受􅁵之餘遂賚師金冠錦服玉佩符焉八年螟蝗為災命師即岱宗汾睢設驅屏法其秋乃大熟十年正月就上都大安閣演金籙科儀時春寒賜黒狐裘貂帽各一冬十月奉安真武神位於昭應新宫禮畢中官衣以異製綾道服大内青宫肇造之初皆詔師按太一符云禳鎮方所十一年特㫖於奉先坊創太一廣福萬壽宫中建齋壇繼太保劉秉忠禋六十神將嵗給道衆粟帛有差十五年奉㫖祭七元星君於西府鐘室啓告之初期以風動所樹幡標為神君格思之驗既而儲皇親臨炷香冷颼䬃至幡影飃颺從官劍佩鏗鏘肅然為起敬明日具陳其事上甚喜越明年以事辭結遁壇命易七元斗位聖上儲皇以師積年祭禱精誠多獲靈應前後賜與如玉尊像寳粧劍安車龍杖金銀器皿等物不可殫紀師爰自傳嗣以來奏言始祖曰太一一悟傳教真人二代祖曰太一嗣教重明真人三代祖曰太一體道虚寂真人四代祖曰太一中和仁靖真人焚黄昭告典禮華縟存殁有榮焉至元三年以重修祖觀殿宇告成以聞蒙勅辭臣製碑鋪敦教基具紀本末復奏授保舉師張善淵真靖大師教門提㸃監度師高昌齡保真崇徳大師高弟李全祐觀妙大師范全定希真大師及欽承璽書䕶持𤣥門其𢎞闡宗教殊為光顯師以至元十七年七月二十六日羽化於西堂方丈享年六十治命令觀妙大師李全祐嗣主法席訃聞上嗟悼乆之儲皇賻楮冥三十定仍諭中書省給威儀祖送其年十月遣使䕶喪歸葬衛州汲縣四門村祖塋之次師丰儀修偉清修有操行謙虚篤實不事表襮混然與物無忤而胷中風鍳殊皜皜也與人交誠欵有藴藉所談率以忠信孝慈為行身之本未嘗露香火餘習生平問學不斯須離如饑渇之於飲食其易傳皇極三式等書皆通䆒其理晚節徳量𢎞衍博大不可涯涘宜其為聖皇挹真風屬祕祀留宿宫禁參預庭議師素以憂深思逺理或未暢形於顔色設因方便而霈徳澤之厖即詢訪而裨時政之闕横覆道䕃成敷鍚之美者多矣惟其𤣥黙不出叵得而詳論者謂師雖方外士其至誠上感葢有君臣慶㑹之契古人稱上士學道輔世主以洽好生之徳師其有焉既窆之二年嗣教真人將以師官行請於朝植碑神門揄揚追報以慰華表歸來之想以不肖惲與師義同里閈交且乆知師為頗詳以事狀見託謹按綱首楊某等所具行實勉為件右庻幾太史秉筆者得以採擇焉至元十九年十二月二十一日中議大夫治書侍御史行御史臺事王惲謹狀秋澗集卷四十七欽定四庫全書秋澗集卷
