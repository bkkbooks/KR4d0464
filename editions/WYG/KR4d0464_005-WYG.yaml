body:
  text: 和淵明歸田園庚寅冬余自閩中北歸年六十有二老病相仍百念灰冷退閒静處乃分之宜辛夘三月十七日風物閒暇偶遊溪曲眷彼林丘釋然有倦飛已然之念城居囂雜㑹心者少因和淵明歸田園詩韻以寓意云寡智空樂水便静思潛山性既時與戾况復迫暮年邇者事逺役冒涉江海淵意令不家食餬口不問田因之委順去强顔官府間道逺䇿疲蹇跬步鞭莫前天幸脫羈靮放歸坰野烟鄉曲喜我至迎拜衣倒顛雖云有限軀且遂未老閒一洗矯拂性俯仰從天然教授晉卿旬月間連失三孫子孫續吾後上繼祖與先何家無予奪與奪非我偏夀夭况彼命賢愚亦偶然生者撲死去死者捄不全又况諸囝屬夭折皆債寃不爾造物戯欲見不測權所以達觀者怡然于其間死者不深嗒生者不溺憐東野昧此理悲歌淚漣漣負我十年恩此豈達者言延陵合中道夫子亦悲酸掩坎三帀去一慟不復澘曠懐聖為取情鍾世所嘆懼傷吾子和為擬昌黎篇響板辭笙篌雜筝笆悲篥合蕃唱喧然一堂間餘音胡得抗紅牙掩自無按拍喜時向響板出新聲激烈極清亮都來三臠木手拉若爾壯逺疑啄木禽扣戸何畢剥近驚老鸛喙頓處振林壑劃然透空去夜静秋戍柝方能節衆音乃見終始作我本幽吟人避喧便淡泊奈何將兩耳聴此終日聒君不見陶琴無絃趣有餘子幼鳴歌死哀樂海㺜海氣發異産兹㺜世無雙壅頤滿修耏被體紛奇狵睛黄猱玃古喙促歇獢胮斗尾纔尺許直立森幢幢跳踉顧自見喜極狂莫降夜風動庭草信吠聲爾哤不近穢與惡不竊鼎與缸勢猛性乃馴見罕人多􅋏有時威見齒迫視防嚙撞東坡詠烏喙量移近蠻邦喜公得北還渡險無濤瀧此犬從閩來氣骨不喙胦厭隨吳獵陸喜逐龍移龎伴予水陸行足輕音不跫導予為前驅健迅逾駿駹辭炎得吠雪寢處不夢江堂無紅絲罽欄有碧蘚樁繫之護燕几足以増雄厖戀主義不爽傳書心爾悾作詩見物性寄傲倚南窗和曲山遊澤宫感舊詩二十一韻三代闡判辟菁莪育英材六經治平具致澤需吾儕君看絃誦堂明新揭横牌新民果何事五典惇克諧平生勉勵心雖老時往來名存到實忘過者宜興哀上行意固盡下效理或乖文章將相科勲業麒麟臺倚席了不講若人安取哉文憲日如綫逝者不復迴嘗觀亡宋學丕冒江與淮考亭洎西山兩公生海隈天遣闢異教不使為妖災前年拜遺像鑚仰心徘徊文明麗東南淵源公所開至今號多士翺翔與時偕嘗思萬有選細考勲與階青絲不素養格例空崔嵬棟梁胡可得摩挲到莓苔萬員備兩紀一夢南柯槐此說誠至論忍使空學齋人微喙雖尺有言輕薄埃畎畆不忘憂念之傷老懐韓晉公畫蒼牯出水圗蒼牯水所喜泳遊溪水中物情便所適頓立不我從但見鼻吻長可知力挽雄小大制有法驅牽任此童東臯夜來雨催辦耕稼功一飽賴爾力髙廪歌年豐畫師亦敦本大意與訓同用五代劉訓指水牯為黒牡丹事吮墨變花賞指為洛花叢妙哉韓相筆逺意老明農唐邊鸞正面孔翠邊鸞弄丹青思入造化窟平生雀寫真多作正面筆圎張金花扇逈與鸞彩匹暖圍姚魏春翠射琅玕碧瑶池百丈鏡顧影時自惜峩冠赤墀間朝午見孤立年深粉色暗元氣悵猶溼逺來米家船復出王涯壁髯温玉臺後素有書畫癖一見易以歸不惜金與璧繄君具眼士鑒定能事畢竹亭展觀餘異夢憶疇昔當時文字祥其應在此夕琅山太行西南來萬馬騖東北奔騰走蛇陣一眷千里碧夸娥負補餘弛擔於此息神功見天巧削出千仞壁亭亭十二峰上與霄漢逼髙張巨靈擘羅列黒帝㦸枝撑圓盖傾間映落景黒或云琅為郎說是郎君石物類無不偶逺與巫峽匹不爾氣變常萬化無定質巨細一概觀何異𤓰駢析天機我偶泄山鬼中夜泣萬石鎮雞川亦可稱峻極望黄金臺有感樂生與郭隗儗徳非同儕九九乃小數正可訓提孩樂生復國讎强齊捲輕埃燕昭師事隗竟築黄金臺我思賢王心要罄初始懐在昭固至徳賛㐮誠衆哉卧龍以力食躬耕亦堪哀昭烈昧三顧孔明甘草萊一語萬代譽正獨龎公開鳯皇巢千仞一舉出九垓翺翔覽徳下千年能㡬來捄時不易得况復管樂才毅然好賢心無為古所咍和紫山題觀音堂山石詩韻我行滏水陽思有登臨舉佳處得一遊不計寒與暑盛聞臨水間猶是鄴西圃山滋與水潤不識田家苦陰壑閟靈景石林氣清楚又云龍洞水清可濯纓土我無適俗韻樂與泉石伍此行應旌招敢覬烟霄侣閒雲本無心安取濟時雨紫山知㡬人夢與邯鄲黍題詩見歸隠真隠果能否作配不自景賡此山石語張鵬飛治虎骨為鎞揷作詩以贈張侯骨鯁士志節何誾誾英發見早嵗智效今埋輪赤手搏於莵脫略狐狸羣今復􅋀其骨整此烏角巾持贈壯我氣能復冠惠文吾老無所用胡為走踆踆忝落麟鳯網或可解糾棼一薦不可負上有文思君倘遂寸補去所得亦已殷要當簮此揷醉看西山雲淵明漉酒圗晉人尚放曠不受羈與束虚髙失之傲降志到自辱淵明性真率順適無矯慾清風凛一時千古仰髙躅得錢送酒家况我新醸熟渴來夢吞江奚計巾一幅有槽不得壓露頂手自漉清濁即聖賢併欲貯吾腹悠然對南山夕鳥送以目還我浩浩天世運任伸縮泠然風度林澹若雲在谷俯仰霄壌間出處一往復過此設有論正為蛇畫足宛轉出新意便可激流俗不思皇上人方寸許撑觸欲求先生心用意不當曲縱使欲自况此老烏可黷吾言誠漫與得酒且兀兀有懐雪菴禪師雪菴圎通士我非方外人毎來扣禪扉坐暖蒲團春有時論書翰兩耳聞未聞自笑以技進斵輪非郢斤吾學師所知師傳吾所珍擅書三十年臨池墨􅔿淪手提八陣法論入三昧神功多誠懸骨勁擢平原筋蹴踏龍巖勢髣髴黄山真何心山陰鵝不計羊欣裙興來追醉素堂堂張其軍驚蛇雜走虺入草猶龍奔縱横與捭闔真積力可臻具眼世所難雪菴洞無垠道存見目擊靉靆知見薰孔竅灑有開滌我胸中塵十年風馬牛茒塞未易耘去冬喜北來將謂晤語頻逺遊久未歸此抱將何伸懐人敘游藝愧乏昌黎文何如太行道梯空下秋雲李廷珪墨墨龍奮晚唐五季相繼出林林歙溪松黒入太陰窟老奚綰天機萬竈出𤣥笏松聲玉質堅走硯風肅肅神爽漆㸃光湛湛童子目二者既得兼髙明宜擅獨妙劑秘千古何有遇與谷理馨六經笥滿網龍在陸横罹相國阨復值永寧酷迨及宣和間千金購無復郁郁蒙城田文獻世相屬香林秀孫支善繼踐芳躅傳家無長物寶此一寸玉客居大于年豐潤蔀華屋阮生幾緉屐舜樂一䕫足公餘日摩挲寧使食無肉古人不復作精絶見此物傾囊任借觀不許一磨倐田郎固淡僻清賞儘不俗書生臭味同往往溺所欲吾家眉子歙隠隠修蛾緑客來恣濯玩亦弗容少黷墨不知研良研不沾墨馥譬猶藏書人終嵗不一讀揷架徒好觀新若手未觸相看兩癡絶一笑為捧腹贈承㫖唐夀卿論士須詣實相馬先其神周秦何貴賤變化存吾身唐侯金閨彦動有鸞鳯馴飄飄瀚海翮上拂明月輪憶初識君面轉盼二十春朅來客京師君為玉堂臣時於管中窺斑斑見其文髙適四十韻便與作者隣青紅桃李塲天葩散奇芬有徳諒有言君侯性誾誾最愛發策際不迫意獨臻理明中事機士氣借以氲重念朋友交敬毅多不倫或者一顰笑意在交相因令人氣最短標置分畦畛愛君略城府吐詞爛天真不作崖異奉不學游說秦信厚等麟趾為人解絲棼所以多士間堂堂張吾軍蹇予自結髪汎愛而親仁當其立事嵗亦復求蠖伸長風萬里浪蹭蹬無縱鱗今雖老伏櫪尚友心猶振都城交游海因依㡬當親如君辱識久辦與陪祥麟人事有乖合對面如離羣徒從樽俎間一笑傾冠巾只今友道衰耐久將何人相馬論其力取友非所尊天機到没滅君今九方歅心期既有在形迹不必云因題樂山詠聊書代吾懃成徳堂詩卷蹇予客京師詩卷日交至此風近日長珍饌互相餌張君構新堂乃以成徳示再拜來懇予一言願明志成徳以徳成何啻餘愷悌徳者得于中行已見於外是乃君子稱實為聖賢事一時扁之者無乃躐等第太朴自六鑿衰俗日零替剽竊糟粕餘色取仁為利遽然以兹名豈速蒲盧意意我開入徳試說第一義厥修貴有初主敬聖不易孜孜先此念優入匪難致收功心日休不匱將錫類㑹見堂中人事業稱不器題趙文卿嘉山詩卷徐公序嘉山衆美掠已竟復儌諸公作落筆先漫應我雖乏新意不為蛇足賸文卿慷慨士意氣掩趙孟識君二十年毎對豁滯興談噱傾底裏議論老能正以儒乃毉名以毉實儒行誰為幽并豪虎變伏延炳先賢去世逺一氣猶包凝蒼蒼嘉嶺山玉立想照映士㑹懐秦䇿宣尼喜衛磬我常登汾睢西眺河山勝延安東北秦得士敢小鄭彼嘉冝降神英物復趙孕儒毉有顯道孝愛發天性惟其嗇世用裔逺有餘慶㑹生甫與申駟牡擁髙乗我詩匪䛕辭探頥神理證有子教讀書服此恒起敬東征詩東藩擅艮隅地曠物滿盈漫川計畜獸蕩海驅羣鯨盛極理必衰彼狡何所懲養虺得返噬其能遁天刑逺接强弩末近訹乳臭嬰一朝投袂起氊裘擁矛矜天意盖有在聚而𠞰其萌荓蜂有螫毒大駕須徂征寅年夏五月海甸觀其兵慿軾望兩際其勢非不勍横空雲作陣裹抱如長城囂紛任使前萬矢飛欃槍我師静而俟銜枚聴鼙聲夜半機石發萬火隨雷轟少須短兵接天地為震驚前徒即倒戈潰敗如山崩臣牢最愾敵奮擊不留行夘烏嗢都間天日為晝㝠僵尸四十里流血原野腥長驅抵牙帳巢穴已自傾彼狡不自縛䑕竄逃餘生太傅方窮追適與叛卒迎選鋒不信宿逆頸縻長纓死棄木臠河其妻同一泓彼狡何所惜重念先王貞擇彼順祝者其歸順吾氓萬落脅罔治無畏來爾寧王師固無敵况復多算并君王自神武豈惟廟社靈三年哂東山殪戎營栁清都人望翠華洗兵雨何零長歌入漢闗喜氣鬱兩京小臣太史屬頌徳職所承雖非平淮雅動盪耳目精赫赫桓撥烈仰之如日星珥筆為紀述發越吾皇英召穆美常武且莫誇雷霆覔風字歙硯詩贈侍其府尹硯本發墨具不爾安用他碧紫暈鸜眼黝黒深宫鴉彼端類髙人風姿固云佳逺韻不少吝清談浩無涯但於當機時未免思棼拏若或砥礪用茫然手空义硬則墨為褪軟則磨泥沙惟歙士之傑體性何交加羅紋與刷絲一寸皆可嘉回視端溪公有名實則差新安山水窟澤大生龍蛇舉世被其利有何蛭與鼃山髙溪水清其芒利如碬常聞右軍硯風字琢手奢是名為水箕朶頤駭唅呀松煤燼無餘惟恐中書丫池寛水瀰漫挹彼如尊洼陂陀浸半海揮洒生雲霞平生未嘗有夢寐江之涯君今去為邦過此空成嗟包公尹端州歸不一硯拏彘肝類安邑一笑春生華書生乞索態殆是心貪邪襧衡溺所愛竟撡漁陽撾今冬與來春㑹有泛斗槎雄雯或雌縵分送張華家十月牡丹彰徳路監郡沃哩嘉議治甚有聲壬辰秋辭職讓其叔伊囉布哈中順是嵗冬十月新侯府第發牡丹二本明年秋計吏伯耕香林先生孫不逺千里來求詩於翰林諸公因首為賦此𤣥冥氣折膠草木餘萎悴鄴城樂土郊畫戟清香地誰留翠被暖小試丹砂藝一枝鶴翎紅照映朝袍貴散彩冰雪中造物有深意正縁二侯賢撫字見早嵗藹然禮讓餘涵蓄坤靈秘歐九譜花神百種第佳麗洛花固芳妍根盛氣或異春華復冬榮彼祥端可記無乃後來者踵治更和惠雖云有淺深錫類由不匱奚煩鑒傍州一段中和氣慇懃將二美千里偕計吏徧求翰林詩擬薦金盤瑞我欲論五行推測涉茫昧浩浩二氣中事或有闗繫重榮說紫荆偏反詠唐棣佳花原致祥惡草終可畏未若中庸篇繼述皆自致栽者即封培傾者隨覆墜由來衰盛間為善不中廢曰善即胡為不出讓與悌神明與扶持聲譽日四至君能馴是理獲利餘百倍何翅天香臺卿雲摛四季送范葯莊子楚教授嘉興范君號葯莊杖屨屢來謁坐間話行藏曽是憲幙客投我詩一編細嚼讀恐徹詩從晚唐來髙風日淩折君才何清峻略不見萎苶渾涵中州氣佳處毎擊節朝來又相過喜色浮兩頰迺云子楚來得調官兩浙南歸行有日一舸赴吳越懇予送行詩我樂為渠說路教雖冷官佀緩繫實切化源開兩庠彼秀富才傑朝家急得賢訓勉宜屑屑一門在清流聲譽儘昭晰君雖客京師破帽幾風雪兩椽省東牆一片江南月羇栖思不無相視為一豁君歸稍如意晝日抵三接何俟老夫詩長路絢行色贈大同利彦祥金天一氣皛以理乃為義兼包體用言藴蓄和與利𢎞居大同東去都為近地風塵雜四方豪貴猶大魏聖賢貴有教初不限氣類彦祥孕金皛用雅變華裔斂袵昨過門偉矣髯卿麗開談一老僧略不見本氣諒知六合表固多瑚璉器示予野齋辭把玩愛不置丹書冩虚影經史含至味舍此或與彼恐墮為善志因將與進心更擴讀書意周邵兩邠産文獻垂萬世由余出西戎斯也以賢議吾賢即能賢此論古不易守之有餘師何俟吾言贅贈筆工張進中書藝與筆工兩者趣各異工多不解書書不究筆製一事互相能萬穎率如志進中本燕産茹筆鐘樓市雖出劉逺徒妙有宣城致我藏一巨拂用久等篲弊授之使改作切厲鋒健銳疏治近月餘去索稱不易先生莫促迫致思容子細中書不中書安用從新繫朅來歘見投入手知利器文房三貴人刮目喜相視正縁兩資藉辦此揮洒技吾錐原不銛甘分置散地馳騁翰墨場又匪老人事不辭束縛坐但愧簡拔意子正來索詩一笑吐吾喙束老豪頴辭遂擬徘徊戱送張幼度倅冠州前年走京師忝與北海薦白首官詞林意若遂少願雖非玉堂人幸接金閨彦供奉得張子為人良可羨豈惟文字間辭理見兼善言行兩無擇容度升回轉温純韞櫝玉樂易不崖岸何心與物忤有問即冰渙宛如鸞鳯姿肯作麒麟楦相看二載餘謹若初覿面朅來過門别新除得倅冠坐久兩不懌去住相慰浣我心愛莫留官屬亦深戀其如行止何物情復多變鑾坡禮文窟一仕儘清宦古人貴任運况去有三便家近得侍親州孤無劇辦請益願一言偏倚時揉鍊我忻聞其說解事語不漫常思歐九說可為後來賛摛文止潤身及物自貞幹休辭米鹽碎莫厭衙起晏不見忠獻韓鼎鉉出推判行俟官有程民事不可緩遊媯川水谷太𤣥道宫迎謁次媯野將為旦夕間尚餘百里逺却得三日閒追陪玉堂翁清遊指仙山窮秋草木盡諸峯慘無顔兩崖蓄餘暖嵓樹如春妍洞口疑有光望中已欣然始至覺夷曠稍深更幽寛山英喜客來夜雨濯翠鬟層巒與疊巘供我拄笏看雲封石上鉢初火道酈五祖者逃難此山衆追及弃衣鉢石上而匿其物重衆莫能舉衆為異遂請主其教今道院盖酈生所創也玉潄山腰泉濯溉滋樹藝一脈窮灣環西臺頗峻絶兩折躋其巔詩翁見精健登䪺不作難䃲礴凛莫留松風吹袂寒降阿集情疏髙談𣺌孤攀山荒苦無稱似待新詩傳諸君垂槖來稇載風烟還因公得勝賞此詩其可諼但恐雲霞舉暮景去猶慳我非桓野王今識東山安題筠菊亭有客昨過門挾卷攜酒壺我老厭人事汝謁將奚圗自云有老親倦遊樂閒居終年築亭圃筠菊心所娛二者諒微物一日不可無餐菊制頽齡種竹來鵷雛牀頭㡬頁書隨意日卷舒欣然有所得聲鮮忘朝晡脫畧少年事呼鷹走韓盧治生不求冨教子供讀書近隨計吏來一命沾堂除南歸不徒手豈計巴與俞眼中倚門親慰浣當何如瞻烏噪乾鵲過戸縣蟢蛛竹色動虚牖秋香滿庭隅計量到家釀山槽滴珍珠江山漢陰國耆舊稱名都從今王氏亭而與吾孟俱題為五字書稇載樂有餘路教為再拜歸當牓吾廬陪張右相祭奠司徒忠懿公墓王城西北郊有山曰盧師岡逺見蟠互野曠欣平夷我嘗以事來旋軫思遲遲匪縁蛇虺靈不羨風烟奇有懐徳育公攀附隨潛飛一朝際風雲振燿生光輝我初拜英表富貴非公誰内焉幽國助上焉兩宫知孰云恩澤侯以徳中自持近侍足恭謹接物餘謙撝由家化而國在理乃所宜及夫司徒公衍慶尤熙熙再世保傳功大書見豐碑神龍襲九淵奮起須鱗鬐伊公漢大横庚庚隠天機厯數既有在大器將安歸君王自神武監撫非細微寶章猶傳璽啟沃貴知幾堂堂忠愛心畫此廟社規其報宜伊何子孫保無期倐歘三十載山丘兩巍巍生死固常事盛衰有足疑昌黎銘殿監所以含餘悽我老自多感黄鳥聲正悲駐車不忍去日下山烟霏書日者卷後稔聞曰者名不識詹尹面共云推未來符驗如契券因之求題詠有學難自衒郭生序已詳奚待余眷眷雖非青囊翁嘗讀李生傳為憐長沙傅三策動漢殿及夫行藏間而抱不遇怨綘灌夫何為藝能止自羨弗思前席夜有舌不少嚥况彼倀倀徒能不逐利轉正直神所與言行士之觀悔尤兩克寡禄秩中自辦宣尼敞亨衢天理不吾謾山人有來問此語告無緩庶刳萬有心一聴三聖㫁題張氏先塋記後禹城張氏先起跡自農伍力田與孝悌内助半賢姥夫婦人倫常松竹表寒苦柔姿不易立流離復艱阻隻影攜孤兒避地韓城隝飢寒兒不知採拾治絲縷訓育至成人衣食能自取去着仙人衣春風三十許若將終其身一室老環堵天其表媪慈再世沾煦嫗蔚為庶門清在野不多覩南薰吹棘夭衣冠見楚楚孑然九齡迪信厚稱幹蠱或欲以節聞顧視為告語近名道家忌此事莫予吐夫家已不幸在我分當處里南築幽栖竹木映庭圃還我浩浩天香火湛靈府晨昏省定際迪也禮容與一朝委蛻去神光照東土我紬石室書逸事須世補國初迄元貞節義幾人數豪族易昭晰里俗多草腐况保晚節難往往變所素猗歟望亭君雅志遂初舉凛凛百年間毫髪不少沮竟續所天家時祀苾籩俎豈惟勵衰俗清風激千古裁文為歌詩流詠徧齊魯送張勝非任汝寧府判汝流漾玉虹望入東南楚雲連懸瓠城形勢見今古有鄉以龍名旦評擅諸許山川氣不易舊蔡變新汝名芳土亦馨理在物争覩張生太史屬三載戰文圃開朗中有為一變至于魯朝來得新除破甕起欲舞踵門來告别一言求小補試將吾已行聊用勉君舉吾年四十餘彈冠判晉府通宵思闕遺未明聴衙鼓上焉事官長下焉宿民苦簿書雜米鹽塵土相與伍抗容不少倦公散日常午任責在人先見得思義取争輸公堂益不惜寸金吐堂堂五十城利病繫區處心平知所宰有衆孰敢侮御史至束溼未省聼渠主最憐絳陽獄五嵗閉幽圄一朝得其情久旱霈尺雨當時官府清至今傳好語伻來一宴過蓄縮畏於鼠正縁中省嚴經制得其所後來府無人所事䀆乖忤官寮自兹壞政荒嵗飢阻毎用誡平生艾服絜其矩皇家重師帥爵禄不輕與汝寧本寧安未用厭勞拊聲華月旦評粲粲珠還浦補缺公與卿去去力當努壯心横落日髙歌當梁甫壯士吟題郝奉使所書手卷使節駐淮海人望兩好熙宋人足變詐觀望占成虧不知破武事中伏混一機壯士死則已不死將有為宋琚凛風概天馬不受羈拘隔一館間激之見連雞事久變乃生勢去心恫疑奄奄十六年慘悴甘湘纍内開既首鼠外侮宜紛披盛氣屈使降壯心終不移睨柱欲碎首忍見王人微松嚴操愈厲草緑秋更萋蕭爽隠霧豹脫略觸藩羝老賊在一殺幽憤將何施庭芝一援手所惜良不貲兵交使其間天理或可期子卿才屬國所報亦以卑至今郎山塚突兀空蟠螭兩行清汝帖只有老天知送徐平叔還廣平因次其韻全趙古多士炫服見吾琛我生自有命其肯枉尺尋結交半豪右翔集依雲林當年平津閣箕冠明月簪乗時頗展翼天髙氣横參談詩似髙適走翰驚陳琳忽騎將軍馬縛賊虎穴深嚮來三數公朱絃得遺音長劍一樽酒洒落開雄襟自笑我何有踵門來載臨袖攜長沙書囊乏魯連金白髪老親健晚境毛義駸時清竭明略有義多同衾躬耕食不足從仕力儘任秋風吹易水游子動歸吟深藏㑹有待莫負平時心題焦節婦卷後焦氏有賢女姿禀與衆殊既笄樂貧素出嫁南征夫一朝聞卧病尋訪邊之隅怙恃力眷挽在妾夫何如竟能遂初志扶䘮歸里閭朝昏事蠶織恭侍舅與姑百年終孝養𦵏祭何勤劬拊畜兩孤幼嫁娶禮與俱孫門固衰謝賴一貞節扶夫婦人倫始因之變時汚一端青縠信至死誓不渝采詩論國風彤管宜沾濡誰謂閭閻間凛此風烈媰猗猗谷蘭馨落落青松孤豈惟表門閭抑備太史書達卿昧平生容齋文可娛美節冠東州亦用播友于清風振孤標讀者宜嘻歔送許澹齋提舉隆興學校我初入玉堂喜識澹齋面忠翁兩朝士極口為稱羨子逺東嘉人文綵金百煉妙年登巍科巧宦厯㡬遍風儀聳四筵目光雙炯電前年來京師得遂依劉願校書天禄閣音吐見雄辨長河㵼建瓴洒洒江左傳三釡固禄微一官争鶚薦行李日羇栖猶是多士冠今來得美除提舉江西彦在吳到朝行客燕領詞翰洪都儘經學文藝業多擅好將鑄顔手主善志無倦習俗與命脈風雅為一變江烟送行舟瀟洒離亭餞清吟代驪歌别思空眷戀依依鄉國情去逐南飛鴈我老歸未得松菊夢秋澗衣冠拱清朝粲焉珠㑹弁自慚老無能零落秋風扇君行重感慨黽勉磨鐵研長江控髙閣百丈驚井幹梅花散春妍蒼烟開禹甸江山有清眺風月興不淺南昌地卑溼衆流争湊衍去年水為灾孤城江四轉兒童化魚鱉萬竈産鼃黽慨然為開陳此事豈小便一鍤濬東湖澄江静如練淡齋素有為肯遣空懐卷觀臺鄉劉氏瑞蓮遥遥觀臺鄉近接魏西圃風來紫陌香臺傾金鳯去繁華一夕空風物猶可據劉君號素侯林野敞亭宇貯藏物外春中有百花隝池開一泓多雲錦漲秋渚亭亭玉井花十丈冰絲比一茄十三蘤秀發乃如許輝映天泉淵飄洒横塘雨風流似六郎澹艷疑静女髙情太極翁愛玩吐奇語根植汚泥中香韻儘容與褰帷對佳麗淩波看微步烟霏動簾櫳漢女出歌舞當其爛漫時固已表雙舉豈惟見家祥分秀孕先母重臺與雙頭連莖同合跗封章稱嘉祥夸者徒媚嫵由來草木蕃造物不予侮氣蒸物自盛事異未之覩百年霈遺澤宅相煥圗譜君家邯鄲望馬服迺􅈹祖諸孫藉餘慶雋拔一何楚起家漢賢良接踵泛蕖府一門集清芬嬋娟冨簪組為君續夷堅作詩劖石鼔􅇭陽有石鼓山蒲城行效韋蘇州體示異姓弟喬百順蒲城今樂郊兩翁處東西相别二十年顔鬢䬃以悽加餐似平時捨杖矜健移置酒前拜夀喜定垂涕洟擁膝侍終日念不共提攜幸有聶與喬治生事鋤犁云誰知異姓一作派孝養日孜孜雖違心獲安慰我悠悠思官書促前去望入雲林低黒山秋霽我度居庸闗天峽四十里巉巉積鐵色兩勢蒼壁倚何由剷疊巘一撮峙燕几長令幼輿心喜溢秋壑底朅來遊京師訪友棠陰里入室得兹山欣躍倒雙履攜歸坐卧觀論列忘兩紀黒山凛氷尖玉色何粹美連峰卑髙陳夾嶂蹊逕逶逺勢走脩坂秋骨濯清泚絶巔蒼穹盤哀壑太妃圯奇狀出天然弃墨妄模擬又如蒼間虎怒伏驚獵箠昂頭入四顧徐起妥蒼尾書生眼孔曠百見心未已不為此僝顔照映横玉壘烘香作怪供揚觶問山鬼不知天壤間劖刻此能幾魁岸狀木假甲乙第湖玼達人有大觀太華拳石比曽為物外誘沾沾抱徒喜屹立萬物表景行世仰止詩成贈山主我豈鬱林齒巖棲未有期對此聊爾耳大開致爽軒拄笏約吾子秋澗集卷五欽定四庫全書秋澗集卷六元王惲撰
