body:
  text: 告家廟文維至元四年嵗次丁卯六月丁巳朔廿三日己卯孝曽孫王惲等謹以香酒時果之奠敢昭告于曽祖考府君曽祖妣臨清吕氏顯祖考修武府君先祖妣孟氏韓氏皇顯考忠顯府君皇顯妣夫人靳氏之靈先以丙寅嵗十有二日為子公孺聘婦得宣慰石君之第三女茲者徃之女家躬展禮幣令龜告吉日維斯時廟授有儀式伸䖍告尚享祭元神祝文嵗次丙辰九月戊戌廿九日丙辰臣某等謹以清酌庶羞之奠敢告于嵗德之君惟神一嵗之君百臣是統端臨異位獨秉威權悔吝灾祥維神是與臣某父某年踰知命心切齊家動静之間既乖攝養公私之際尤重愆違而又庭戸積殃子孫不孝於七月廿七日遽嬰末疾将抵時冬困致沈綿力疲舉履日因元命躬薦愚衷幸冀神明蚤躋和豫尚享告家廟文維至元四年八月丙辰十七日壬申孝子惲忱等謹以清酌百羞之奠敢昭告于皇顯考忠顯府君顯妣縣君靳氏之靈嗚呼哀哉維丁巳嵗八月至今年丁卯秋仲府君捐館十週星矣實至元四年秋八月丙辰朔十有八日癸酉也十者數之盈天道之小變也祭法以春秋享奠葢因其氣之終始而致思焉矧履霜露瞻拱木嵗月近紀親日愈逺得不極其志而重其感傷乎今之所謂道供豈古致齋饗親之意歟茲者爰即正寢敬演靈章庶仗真詮以證妙果神維格思式伸䖍告尚享至聖文宣王奉安祝文於赫元聖萬世作凖曰義曰仁風化之本顧瞻清廟曠茲有年咎将孰執廼吏之愆爰自下車心弗遑安靡朝匪夕載經載營誕彌八月厥功告成奕奕新廟桓桓旅楹峻以文階重以神幄有翼有嚴乃丹乃艧爰居爰處以清以寜神其格思享茲菲誠爰暨厥民日焉啟迪仰止瞻依聿修厥德庶幾報本以謝不職尚享兖國公奉安文伏以庶工告成新廟孔碩於穆素王之亞聿陪元聖之居仰底攸寜永欽厥祀尚享鄒國公奉安文伏以有嚴閟宫載新祀典仍増光於肖像永配享於神庭於穆維清尚安且妥尚享辭墓祭文維大元國至元九年嵗次壬申四月乙未朔十七日辛亥男孫惲謹以清酌之奠敢昭告于曽祖王父顯考王府君之靈惲自至元五年冬十月被召赴臺九年春用前資翰林修撰由監察御史改授承直郎平陽路總管府判官已擇此月十九日赴任所今當逺離墓次伏冀明靈特垂隂祐尚享祭孚惠神祠文六月十四日祈雨至十八日申刻大雨至十九日黎明方止惟神淵懿徽柔德配乾方觱沸其泉實為淵浸屋而祀之禮固宜矣茲者時雨愆常蒲絳兩州旱暵頗甚吏實不職民将何尤夏麥勤而半成槁稼嘘而可燎衆仰一溝之水待為卒嵗之安然得之有限溉之不齊與其施及乎有數之田何若膏潤夫一境之内恵卹哀憫繄神能然伏望起伏龍鞭電轂神泓為之變動川雲隨而蓊從細挹天瓢溥霑壠畆使槁者勃興而如揠熱者得濯而輒醒雲漢昭回一滌藴隆之氣甌窶滿載卒成大有之年神能鑒茲敢忘昭報尚享祭耶律丞相文大元國至元九年嵗次壬申六月丁亥朔初八日甲午承直郎平陽路縂管府判官汲郡王惲謹以清酌庶羞之奠致祭于有齊忠臣大丞相咸陽王耶律公之神伏念惲以監察御史叨承郡幕視事之初来讞茲獄求情罔獲非神疇依惟神心秉塞淵氣餘忠謹始焉義合於神武終以威馳於栢壁生為良弼殁為明神對越英靈凛然如在以德以功宜永嚴祀惲授館絳園迫近神廡號呶朴擊不無震驚然兇悍禍賊寔神所憝尚矜不逮俾集厥事式伸明薦以克来享康澤王廟謝雨文惲訊獄絳陽回經太平百里之間秋禾如槁物之生植時方尚養民之告病不能不動俾驕陽亢甚耕隴塵翻誠守吏不職之所致也近雖致禱於鼓􅀈行復展誠於祠下及次襄陵油雲四興甘澤霈作郊野灑然溥獲沾足且神化無方龍德為大山澤一氣初無間然雖愚衷適與之㑹寔神顧䘏而恵之也用薦明禋以答靈貺尚享拜奠夷齊墓文維大元國至元九祀嵗𤣥黓涒灘冬十二月既望承直郎平陽路縂管府判官王某恭以牢醴之奠致祭于孤竹二賢之墓嗚呼天下有當然難舎之事惟特立者能成之天下有至中大正之道惟齊聖者能明之三代而下建天地之極定君臣之義掲若日月亘萬古而不息者其惟二賢而己壬申之冬某以守吏按事蒲坂仰止髙山其立卓爾所謂聞凛凛之風者貪夫亷懦夫有立志也趨拜几像山烟四起奠以牲醪若恐将凂有薇在山有粒在簋潔以馨誠薦我明水尚享祭黄崖山神文節彼南山奠安一方爰産竒石紫質青章王宫繕興爾焉来營伐而材之不無震驚用是昭告惟神降寜庶憑黙佑迄用有成尚享謁西岳廟文維神德嫓坤維氣涵崑潤際四海洪荒之内位實雄尊在提封宻邇之間禮當趨謁仰止三峰之峻来伸一禱之誠僥倖之求㫁不敢萌憂戀之心庶幾昭鑒爰生申甫来佐明時冒瀆顯靈豈勝悚惕尚享安二賢神文某以壬申之冬来拜祠墓悼其傾圮几像暴露載經載營今也告成睠彼雷首肅焉神庭繄二賢之德聖之清兮以孔聖之哲極所稱兮掲若日月何廟貌之尚兮封而匪屋来者何瞻仰兮蒼煙喬木何山爛其光兮盤非周粒桂酒苾其香兮神其格思嵗永此而康兮肇祭霍岳文大元國至元十三年嵗次癸酉六月壬午朔二十有六日丁未承直郎平陽路總管府判官王某謹以牢醴之奠致祭于霍岳中鎮應靈王之神維神峻秀靈異鬱為鎮山冀州之野嶽麓所盤致興雲雨祀典載新報本信敬茲焉其辰顧維守吏嵗奉嚴禋籩豆孔修敢告駿奔乃祝之曰髙宜麻麥兮下宜稌蛟蛇結盤兮物不窳王事庶集兮神所與康澤王廟祈雪文大元國至元十年十二月己酉朔承直郎平陽路總管府判官王惲謹以清酌之奠敢致禱于康澤王之神伏念一冬三白嵗事之常今者云暮未覩其祥寒律徒切風埃澒洞宿麥雖萎猶含餘凍載憂載忡春疫為重彤雲油油既合而收和氣致盭政或未修吏實不職民将何尤惟神降鑒一雪孔周灾沴不作恵我来牟吾儕小人敢後神休尚享祭靖應真人姜公文大元國至元十一年嵗在甲戌二月戊申朔十有二日已未承直郎平陽路總管府判官王某謹以茗果之奠設祭于靖應真人姜公之靈某以中統元載列職省郎得掌綸命帝遣使臣奉宣詔㫖起公於晉有遐想仙標載勤驛乘之語眷眷之意何其隆信者哉逮明年春獲拜下風寳𤣥之宫野服黄冠道淳德沖曽無一言及乎本宗其揄揚稱頌若恐隕越者堯舜禹湯文武之道之功建祠奉祀竭夫一躬退而論思豈墨名而行與儒同者耶及官平陽載覩儀容振袂談舊一沛平生之胷愈知靖專之性精誠之德足以動三河而沃淵衷也云何一别上仙三峰杳黄鵠其何邁将神㳺乎太空天藐雲髙涕泗無從過故都而眷戀庶斯文之可通尚享兵次孟津祭靈源王文維十有一年甲戌夏五月丙子朔越七日壬午承直郎平陽路總管府判官王某敢昭告于靈源王殿下我國家将有事於南服桓桓兵甲例作于晉顧予小子實縂其一焉今茲南邁前次河壖尚克顯相其安以濟豈惟可免簿責誠以威靈隂隲以先啟行之力也尚享祭平陽府東城門文維神職司啟閉氣積隂凝今者淫霖為祟已及浹旬害彼粢盛動妨民作伏望導迪陽和逺成開霽尚享祭臯陶文惲以到官四日奉憲部符鞫絳陽獄大小之情心敢不盡恍惚暧昧有不可致詰者使讞議適當生死兩明愚衷不逮神惟能誘之寃滯沈痛捶楚之下求而不獲者神惟能伸之伏惟明靈尚克顯相中元節祭三代告生孫汾郎文伏為男公孺新婦石氏於今月十有二日辛巳生子名曰汾郎葢人倫之事繼續為大因時以享式伸䖍告庶憑神佑其安且宜尚享立社稷祭告文維神五土之祇百穀之本血食于社萬世依凖禮墜而興張本自茲牲醪香脂鼓鐘清夷迄用康年神其妥而維神百榖是長萬民之天配食于社古莫能遷名存實亡乃吏之愆張本于茲神其鑒焉有酒斯㫖有牲肥鮮維神格思嵗其有年范陽房族祖九翁祭文維至元十三年嵗次丙子冬十月壬戌朔十有八日己卯房孫謹以清酌少牢之奠百拜致祭于故軍資府君族祖九翁之靈嗚呼哀哉十二年春予守官平陽祖母慕容氏書来以公訃告國有常制莫敢擅離然聞母弟忱自疾亟於引柩納壙皆與及喪次雖不獲戴星奔赴中為少遑也越翼日即縞素為位於府北郊之僧舎發哀以祭婦推氏子公孺新婦石氏在焉慼不視事者五日迨今年春三月秩滿東還将為指日即路得哭墓而唁親老也復為中書檄去考試河南四道滿三月而歸日月逾邁霜露之感積諸中而至于攸乆也如是曠慢不恭之責将何所逭今茲之来駿奔露處不遑安者凡十有四日含凄茹辛實以祭告為事伏惟神靈鑒茲哀悃嗚呼哀哉尚享祭中書左丞姚公文聖維天開寵綏九有必誕賢輔以左以右手斡機衡代天旋斗伊公挺生奮迹營桞長白之英遼江之瀏元氣絪緼鍾此靈秀脫落俗學沈浸道囿姬情孔思伊淵洛藪一物致知千古尚友起而翼漢雲雷交遘啓沃淵衷達聰纊黈至元之初公綰機紐謀謨廟堂股肱元首職分六卿綱維結糾帝載用熈豐而不蔀大明黜陟罷侯置守萬鈞機張賴公克彀霖雨一濡載清宇宙我武維揚荆襄恃乆大闢屯田櫛比糧糗公善開物務深耕耨豳風良耜十千為耦繼倡農司萬邦是揉明彼王道始夫南畝䕶軍来歸雪髯垂脰長江失險萬介北趣特置館筵體貌耆耉眷我儒臣甘盤之舊天理人私自公判剖國勢民機倚公安否有辯懸河而惡利口四海具瞻漢更商叟龍光稠疊玉鬯秬卣望公百年以佐元后胡不憖遺梁木壊朽彼蒼悠悠莫之能究嗚呼公之為學知所先後味道飫經太羮𤣥酒平生㳺藝組繡雕鏤公視餘事為世瓊玖公之逢辰道合非偶来儀舜廷台鼎鳳雊揚歴中外足展抱負八十之春已極眉夀考終牖下載啟其手有子承家公復何疚嗟吾道之如綫念後學之孤陋與斯民之不幸孰思濟而云救惲自束髪辱知㝡厚拔擢提撕兩端親叩至登瀛州再承善誘弦晦一週玉堂清晝今公云亡此㑹難又情悄悄以填膺淚浪浪而霑袖今也送不遑執紼𦵏不得撫柩寓哀斯文為一觴侑尚享故尚書禮部郎中致仕丁公祭文嗚呼維至元十三年夏六月惲考試河南拜公牀下留語終日言不及私維是治之隆汙民之殿屎法具未完涕下漣而至於亷於律已老而知止教子以義方勅㫁家事其在倫列如公一人而已此天下之公論非予得而私議也區區之誠幸惟鑒茲尚享故吏部尚書髙公祭文至元十五年閏十一月十一日大雪中拜奠惟中統壬戌之春惲以事累退耕于壠畝者再罹寒暑既而擇御史開憲府人文之選公以予主不肖誤䝉公知擢置言路三年裏行我盼我顧豈惟使之増先迄薄用于今者實公之載舉及官平陽公判吏部不以契濶怜我椎魯毎借譽於時人為聲勢之一助是又見公終恵且勤不我遐遺之故也至於雄文大冊忠規治具三峡秋濤危波砥柱茲公論之有在匪鄙言之能喻念公平生藹藹德度霑賸馥於蘭臺悵嵗律之已暮敢以受知丁巳之私抒予哀而告公之墓也神惟有靈鑒茲誠素尚享外祖安陽縣丞靳公祭文十五年後十一月十五日惲年垂髫省識公而蒼髯堂堂山立而異逮予成童受訓母氏公之世家頗聞一二或官鄉縣或擅科場歴年五百財雄一方至公而衰亦理之常厥後一紀公殁於鄉惟嗣罔續我為䀌傷春秋時思合食祖傍是用傳訓子孫奉行公殯淺土幾三十霜棺衾改卜未就深藏姨母雖在顧力弗遑有劣其甥按部洹漳東望堯城心焉靡寧迎置姨母如拜儀形爰念𦵏事與之經營及茲春首窆公于塋庶幾畢考妣之志慰安公之神靈也尚期不昧俯鑒微誠尚享左丞董公祭文至元十六年嵗次己卯九月乙巳朔越有三日丁巳朝列大夫燕南河北道提刑按察副使汲郡王惲謹以清酌嘉肴之奠致祭于故資德大夫中書左丞簽書樞宻院事贈金紫光禄大夫平章政事諡忠獻董公之靈觀夫大燕南陲全趙北垠峰尖鬱茂滹池奫淪蟠精萃秀篤生異人公應運挺出絶類離倫悦敦詩禮感㑹風雲奮父祖之餘烈䇿冦鄧之髙勛其志慮良實又濟以武恵惻隠之仁謙而接物勇見於大敵恭以持已孰知夫世臣至於肅齊家範友于弟昆忠結主知德庇生民功愈大而心轉小寵既厚而憂益殷無私蓄為子孫之計不樹黨收門墻之恩其公亮謹厚又似夫董侍中與萬石君也幾世幾年孕此忠純方沐恩於鳳沼俄星隕於中軍痛丹青之宛轉追畫像於麒麟此非一已之私議在中外哀悼所不忍聞也惲爰自布衣仰公清塵接樽酒於中統之首與賔筵於至元之春毎燕語之衎衎顧若楊顒之可賔矧二弟之欵曲辱交乆而情親雖草宿而罔哭􅂓寓哀於斯文伸孺子之薄奠庶劒繫於徐公之墳也尚享遷奉曽外祖殿試靳公祭文并外妣李氏惟公才德兼備元精孕和早擅塲屋三中巍科人文之譽在公實多正大初元公卒宜津權厝新壠幾七十春殯而未𦵏譬彼行人歸不及家曷寧其身茲者日吉時良奉安祖傍祔以元配永閉深藏魂而有靈以賁幽光尚享遷奉安陽縣丞外祖并外媪王氏祭文惲以前嵗後十一月廿三日為遷奉之事已告尊靈今者應期舉厝永慰幽㷀以順從祖以安其藏祔我外妣閟此𤣥堂靳雖衰宗在公未傷有甥妷以主祀重時思而不忘是則不必其子而光揚也有牲斯羜有酒斯香神惟昭鑒歆此一觴尚享及𦵏公伯兄孝思貢士及姆氏秋澗集卷六十三欽定四庫全書秋澗集卷六十四元王惲撰祭文祭
