body:
  text: 宋廣平梅花賦後語廣平梅花賦予嘗聞雙溪耶律公求斯文乆矣得之者當以乘馬相貺願見之心與公略同至元癸巳春予待詔闕下秘書郎趙天民來謁趙之父故中書門客也因詢賦之隠見曰已得之矣翌日録似本來獻老眼増眀疾讀數過至獨歩早春自全其天貴不性移儷夫君子之節之句當時巳為從父撃節而襲美謂公鐵石肝腸吐婉辭為疑以予觀之風人託物詞尚華麗況徐庾之體乎當時公甫踰冠而嵗寒之姿調羮之事固巳表表於未第之前如淵眀髙風逺韻又何害見閒情於一賦者哉跋董右丞師中撰李道源先生隂徳記後董號漳川居士道源名泌廣平人葢儒而醫者泌九十嵗而終于家子師孟眀昌間進士昔昌黎公以醫師而喻相業范文正不作相而願良醫醫之與相體用固殊其於濟物則一也然宰輔柄用必需時命醫師拯治心術為先故良醫賢相寥寥百載間得其人匪易今皆萃見於一巷中觀之者當起敬起慕又何特題咏而已哉至元癸已立夏日書跋鍼者李君玉詩卷前賢有以注易與神農經為論者客曰當解易何居曰易􅄙悮後世辨眀者不少本草悞立能殺人世謂鍼法亦然予右髀有寒疾將雨先痛一日謁黙齋先生於沙麓見其求鍼者滿室先生笑謂予曰汝亦入吾安樂窩邪如痿者躄者瘖啞者癥結者氣蹷者法雖有重輕莫不撤鍼而滯散舍䇿而起行而予之骨痛今三十年曽不再作後官東平一日與李公巨川話及此曰予客淮南時以茲術授竇公今青出於藍今君玉與少𫝊同鄉不知其術傳之李邪竇邪而别有所授而然邪向聞李君嘗遊江淮間曽遇異人鍼法葢以神授未若李竇相傳人事著明者也如太史公論方技以怪而志者吾皆不取也跋眼科醫師卷後心為衆善之宗眼具五官之氣故中有所動思或稍邪則司眀為之眊昧吾嘗念治眼病則易變目眊為難嗚呼安得一中和之氣瞭萬有之目使一歸於正不知龍目立論亦將有此法邪跋玉田傅氏家傳後金有國餘百年専以詞科取士曰相曰將多出此途議者以學涉剽竊不眀義理為言然不可一概厚誣事至於弊祗能拘限常流通人何所凝滯及金祚垂亡其仗節死義者皆前日之進士也吾於北地得三人焉順州刺史剛忠王者行部傅公父子是也公諱霖字汝濟眀昌五年詞賦進士第大安二年授崇義軍節度副使二年行部臨潢殁於王事嗚呼其為烈盛矣哉題漢使任少公招李陵歸漢圖後自古有死將而無降將至於兵敗力屈此正人臣授命之秋更無他議譬猶弱婦不幸而遇强暴有殺身而已曽不此思而曰雖受汚一時吾將有以報之此正李左校之妄圖也子孟専使逺招縦復南歸將何為顔予始讀陵傳壯其初心憤發哀其一敗而瓦裂也中統辛酉春予扈蹕北上次桓之北山或曰此李陵臺也徘徊四顧朔風邊草為之悽然於是詠河梁之詩嘆曹柯之議又且惜武皇信親近而族陵家安在其為雄材大略也自辛酉迄今三十餘年復覩斯畫因感而書此以為人臣忠上之勸跋南蠻朝貢圖海中島夷際東南天地者以萬數有唐盛時率置都䕶而羈縻之不特以力而臣服也此即庶方小侯不能専達附於大邦而致貢繪而為圖以表中國聖人在上徳教洋溢無逺弗届之㫖不然意匠慘淡何取於此書霹靂琴賛後文章翰墨善效顰者徃徃體極形似至於得意韻之妙出畦畛之外天姿限量其間有不能以寸者學鹿庵書正坐是耳或謂此帖子聓代作非也可秘藏之防風濤擁棹雷霆破屋將有下取而豪奪者矣書娑羅樹碑後李北海娑羅樹碑筆畫勁韻全是歐率更態度但縦之使行耳碑見在淮安州題王尚書無競小字東坡論語􅄙甲午夏五月方外掾由師孟出是本見示卒然問曰公此書何法予曰渠以謂奚自曰此栁侍書步驟也予顧笑曰公瑾有云天下智謀之士所見略同其師孟之謂乎跋趙大年畫王摩詰詩意大年分天潢之秀馳譽丹青當其瑣牕春明繡閣香静以倒暈連眉之嫵寫荒寒平逺之思非天機所到未易企及所謂風流貴介筆頭有五湖之心者葢盡之矣題東坡災傷卷後東坡先生論事如陸宣公剛直不容於朝似顔太師今觀此帖云覽其災傷肺肝如焚公憂國恤民之心為可見矣然士無功名分者雖毫髪細事終不得一入手做公之謂也後又有云有聞不惜頻示及是此老又待招人物議也臨風展玩重為慨嘆眀皇驪山宫避暑圖明皇驪山宫避暑圖郭忠恕筆也宫館隨勢作三層覆壓華清居上方殿四圍垂簾宫人隠見簾隙類望逺而外窺者中腰樓閣參差冠山跨壑半為宫栁蔽虧其下水榭極峻内人上下雜沓無數疑供帳也波間漁郎艤艇持網罟延佇者非一駕自閣道乗腰輿擁仗將升榭而觀漁樂者少陵云簾下宫人出樓前御栁長忠恕意匠正掇此两句為主題然人物界畫慘澹取次不甚精絶恐亦後人臨摹至善體詩人之意殆與少陵同賦而親覩者云跋山谷發願文元貞元年朝謁之眀日余燕息不出偶展此軸為娛因念黄太史禪機翰墨號入神三昧至與仇池公並驅爭先如發願等文皆平生傑作但恐益公題評止好事者竊取綴之於此耳牕明目眊筆虚筆實有能强為力者技癢悠悠又復損一若可喜也題李龍眠畫班昭女孝經圖後道義出乎天然文章貴乎自得昭以大家師範六宫作女誡孝經通二十五篇范史備載誡辭而初不及經訓豈擬聖太迫殆法言之嫌乎至於公麟畫筆當時聖賢言行情深義奥後世有未易窺測者天機所到千古之事如墮目前所謂出新意於法度之中寄妙趣於言意之表若三百篇比興宛從絃而歌之一唱三嘆有遺音者矣激薄揚清助世教多矣此畫予也三見茲雖張仁所臨殊有分數昔東坡稱晉人法書今何所及得唐人硬黄足矣其什襲秘藏遇知者一觀可也題東坡赤壁賦後余向在福唐觀公惠州醉書此賦心手兩忘筆意蕭散妙見法度之外今此帖亦云醉筆與前略不相類豈公隨物賦形因時發興出竒無窮者也跋黄華先生墨戲近過雪庵案上有黄華山水一卷或問云何如曰此先生醉時行書也只為龍岩學中立太迫故作是噀墨法耳跋党竹溪篆趙黄山文王子端書党篆趙文黄華書正如打鼓弄琵琶合著兩㑹家也跋米南宫靈臺戴華卷後僕觀南宫書多矣未若此幅韻勝而不鼓努者也然雄冠豭佩氣終行行惟其自成一家迺可貴耳跋漁人鷸蚌圖自戰國功利之説興視仁義為無物時君世主以衆暴寡以强陵弱干戈相尋互相吞噬惟知利之為先不究害之在其後也故漁人鷸蚌之利例皆被焉非獨代之喻燕趙也雖為當時妄舉貪得之誡而孟軻氏云善戰者服上刑連諸侯者次之闢草萊任土地者又次之可謂正大而有味矣跋山谷所書王建宫詞後唐人詩風雅意韻陵跨百代況建之宫體為世絶唱加以涪翁揮洒醉墨宜其天章雲錦為之爛然生光也跋鹿庵先生所書鸚鵡賦後此鹿庵先生二十年前所書也嚮嘗問筆法於席下曰予早年於沙河碑用功最多今觀此賦乃知其言為有徴先生人品峻潔文章字畫皆有自得之妙然珠璣散落有限得者幸珍藏之跋左山公書東坡醉墨堂詩卷左山公書端重沈著本出離堆記其氣韻豪逸比之魯公似為放曠初不知其所宗不肖澹癖留心筆硯悞為公所知每過謁必談論書學利病留連竟日不聽辭去一日出示楊凝式維摩帖筆勢縦横天真爛漫顧謂予曰魯公後得其筆法者獨少師耳由是知公書體兼顔楊然古之論書兼及人品非其人雖工有不必貴者公姿沈毅博學富經綸器業生平底藴未展盡者葱葱鬱鬱一散之翰墨間其風流藴藉有不可梯接者今已矣片紙隻字為世珍惜況門客故吏邪簡卿尚寳藏之題遼太師趙思温族系後遼氏開國二百載跨有燕雲雄長夷夏雖其創業之君規模宏逺守成之主善於繼述亦由一時謀臣猛將與夫子孫蕃衍衆多克肖肯構有以維持藩翰而致然也故開府儀同三司侍中贈太師衛國趙公早以驍勇善戰受知遼太祖烜赫貴顯生子十有二人其後支分派别官三事使相宣徽節度團練觀察刺史下逮州縣職餘二百人迄今燕之故老談勲閥富盛照映前後者必曰韓劉馬趙四大族焉嗚呼盛哉孟子稱故國非謂喬木而有世臣者其是之謂歟裔孫穆聯綴遺譜裝潢完整攜示求跋予竊有感焉近代公侯將相之後方一再傳溷跡閭閻甘心貧微故家遺族懵然不知者多矣尚何望於考厥世而復其初哉論者多曰盛氣已過大福不再予以為不然其説則孔子所嘆文獻不足故也夫子孫苟能讀書立志雖愚必眀雖柔必强族固寒微可至清貴況藉餘潤而承休光者乎克敬潛心字學慎言行由史館從事歴州縣職復保傅舊物昭明宗系則其紹述遺美而又有望於他日也題離堆記後魯公書號稱大雅尤可重者以忠義之氣發而為心畫然端人不為枉者作計此天下之通論公平生書五百餘年略無異議獨離堆記文與字併出公手或者少有疑焉葢鮮于氏附炎國忠天寶間竊取柄用致位顯赫及䘮師瀘南反以㨗聞建碑省户公然獻諛向之為人槩可知矣然觀記之所述詳見者止向未第時卜築讀書等事豈與其潔不保其往之義也若歴臺省􅏗風憲持節劍南作尹京兆中間云為一無稱道是則不待抑揚賢不肖之分昭昭矣不然方元載以大奸當國庭議之際公直言折之曰朝廷豈容公再壊邪舉朝危公曽不少撓又郭定襄以勲貴振耀一時行次失序毅然陳書極論其不當由是而觀公剛嚴之氣如秋霜烈日皜不可尚已何𤨏𤨏姻婭能降公志諛彼枯胔者哉正以子昱等拖舟涉險歸𦵏先壠純孝克成之志有足嘉尚如犂犢騂角山川其舍諸乎此葢公述作之微㫖也趙氏子穆年十八好古學篆𨽻皆通習之請予以題記後作是説以貽之書中興頌後唐中興頌石刻字徑數最大立法最宻就魯公平生所書合而論之此為最善其法度特變大篆為真楷耳所謂只見性情不見文字至元十三年春正月江左平圖書珍異悉達京師孟秀州徳卿以是本見贈把玩不釋手者累月從弟韓從益求予臨寫因勉為刻鵠耳題蘇氏寳章後忠定二公書金聲玉振如清廟之瑟一唱三嘆有遺音者矣今觀迨過等帖筆勢圓熟俱有伯父氣韻而遲之此幅為尤佳所謂王謝子弟以生長見聞猶足以超人羣也東坡我有帖係與外姻子曹正字書内云去逸就勞不知脱去有道乎外郡雖麄俗止早衙紛紛一時辰許餘蕭然皆我有也觀公此帖正以姻家故假設已意儆以官守爾至於早衙紛紛一時許餘蕭然我有此又見公材力餘裕酬酢萬變若鑑之應物妍媸巨細靡不洞徹物去湛然如澄淵横壑耳跋馬融卧吹圖古人因技以達事者多如㸃瑟暢風雩之樂廣陵見魏室之微正平以鼓撾反折曹瞞野王之筝歌疑釋晉帝是不圖為樂之至斯也若南郡之通樂律度聲節以畢五音可謂能也已然畏威刓方裁成固罪為端士所鄙雖雄吹逸響穿裂雲石又何足貴之哉其畫格簡古如書中有筆自非唐人夢不到此夷門圖後語孫樵讀開元雜報至生恨不為太平人豈聲明文物矯首拭目聞可喜而觀可樂乎近閱夷門市㕓圖其風物氣習備見政和間流宕浮靡之俗然非盛極無以臻此予長生汴梁及見百年遺老徃徃常能談當時風物令人不覺有孫氏之嘆但二帝播遷已兆眹於此所謂治亂之迹接踵相尋也畫品則穠纎巧麗出内供奉手無疑正可與夢華録互為之覽耳至元丙子二月觀於平陽寓舍夏六月重見於汴京試院中明年夏六月立秋後一日連雨中静坐偶書於燕東開陽坊李黄門之故堂題蘭府君望海寺二詩後昔張燕公南遷歸詩筆益壮人謂得江山之助今觀蘭廣寜望海寺二詩清雄竒逸令人覺海上風濤之氣拂拂襲人所謂眀昌雅製風斯在下矣題石曼卿手書古檜行後中允姿豪放有髙山氣故其筆不得不瑰偉清勁一世推重至有河傾崑崙雪壓太華之語何其壯哉今繼先待御家藏古檜行所謂愈大而愈竒者也風格修整類唐人誥書手豈公早年書邪跋孫過庭書譜名䖍禮唐髙宗時人過庭垂拱間名善書其草字譜風韻蕭散一宗二王有飛鳥驚蛇之趣予嘗愛而臨之然以古今題評不及為訝今日觀米襄陽書史云孫公在唐人得二王法為最追憶前言與南宫偶同所謂愚者千慮亦有一得也題政和鼎識後鼎之為器鎮方所辨神姦惟其制作創於夏后氏故後世寳重至有力求而不可得也唐武后妄意制作固無可論崇寜倣而為之還復不能保當時神秘不啻宗社之重一旦其鼎之神主為鈍軒几席間物吁可嘆也鈍軒遼金公侯裔博古有學識既得銅主迺為竒遇訓名字焉後以技能命監鑄太宫鐘鼎實應開先之兆子穆復繪圖懇諸公題跋于以重古物而揚父美由是知物之無間重輕大小由徳而後可保因所好而聚待人而後傳也跋諸葛公逺涉帖諸葛武侯逺涉遺帖余既冠時與鮮于純叔獲覩於沙麓張氏家迨大徳庚子冬詔集賢所貯書畫賜其院之官屬吕司直所得者亦有是帖老眼復觀煥若神眀頓還舊觀然比之向所見者後有東坡跋語辨其印章玉泉公家曽收彦瞻博雅好古可謂物得所歸矣跋宋漢臣臨丹華經後篆生𨽻𨽻生楷變𨽻篆二體入真草而出古意者惟魯公能然故洛尹宋君漢臣善八分體古而畫勁嘗臆其有所從來及觀所臨丹華經筆勢天矯奪真第朱墨異色耳故𨽻書之妙有以不期然而然者雖衆期逺到中道車傾亦足以追蹤擇木陵跨李潮矣二弟每一披玩僾然如對其面嗚呼方風俗衰靡無足言者唐臣義夫能永懐不忘可謂克念天顯者也讀漢魏五書两漢繼三代而下為最盛但官儀略見於班史表序予穉年讀昌黎科斗記文知衛宏有漢官儀書兵後典籍散亡何從而得之壬午冬再入京師始獲借觀於宋秘監葢青宫賜書也其一代之制粲然完備皇乎休哉宜其光武以軍容過洛父老有復見官儀之喜嗚呼三代吾不得而見之得見兩漢斯可矣宏書才两卷求訪三十年之乆方遂一讀豈亦有數存乎其間邪矧功名富貴可倖而致哉因其奉還筆之以紀嵗月時壬午十二月八日也跋髙宗臨右軍帖二王真跡不可復見唐人硬黄臨倣自當愛玩沉出建炎手書顧龍跳虎卧之意隠然在目中矣跋雪齋書宋孟州獵虎詩卷後昔興陵選廷臣奉使江左須得才辨有聞望者可若宋孟州射虎詩清雄振厲逺而有光華大定人文之盛槩可見矣雪中展觀於曽孫祕監處令人三復清興四發今祕監以學問徳藝又為青宫所賔禮所謂黄門有父風者也跋臨本蘭亭序此帖在臨本間最佳却疑是唐人填書年深墨花脱落若透絹影耳又當以蔷薇露盥手爇玉蕤香觀之可也題中興頌後中興碑本行於世者有三其字頗小而加瘦者蔡之所臨也其搨印完好苦無剥齧者永之再勒也予嘗謂魯公此筆用忠義為本然後以大篆變而為楷體故後之學者終莫能及院主書趙穆博古通篆𨽻今復研思於是是将求筆意而通其變爾吾知夫識斗間氣者而得龍泉於豐城之獄必矣趙生其勉旃跋謝靈運帖謝康樂以風雅鼓吹兩晉善書則未知也今觀節卷金華二誥與張芝萎形帖相上下可也至於筆勢豪宕殆是伐山開道氣象千載而下専舉一節足見其為人而當時隣略得不以山戎為駭乎答宋克温問魯公書法余觀魯公書分數布置稱停深稳雖豪髪精極楷法至於韻勝温潤正周旋曲折剛健中出婀娜爾極其所至第見性情不見文字所謂性情以忠義之氣為之大本也平日所得如是未審吾友為如何耳
