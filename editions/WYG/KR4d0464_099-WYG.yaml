front:
  text: 集卷九十九
  hash: sha256:34c9a8a5490a8f78b31c3993957d7ef4d72354fc2d9a7b07b4ac87a51b12e287
body:
  text: 元王惲撰玉堂嘉話卷之七喪服小記别子為祖繼别為宗繼禰者為小宗故有五世而遷之宗宗其繼髙祖者也是故祖遷於上宗易於下尊祖故敬宗敬宗所以尊祖禰也大傳曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗則繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也禰繼禰小宗小宗禰繼禰小宗小宗小宗禰繼禰小宗小宗小宗禰繼禰小宗小宗小宗别子繼别為祖為宗大宗大宗大宗大宗諸侯繼世之君君君君君君陳氏禮書云公子不得禰先君故為别子而繼别者族人宗之為大宗逺雖至於絶屬猶為之服衰三月庶子不得祭祖故諸兄弟宗之為小宗以其服服之大宗逺祖之正體則一而已小宗髙祖之正體其别有四則繼禰者兄弟宗之繼祖者從兄弟宗之繼曽祖者從祖兄弟宗之繼髙祖者從曾祖兄弟宗之四世親盡屬絶而不為宗矣然言繼别為宗又言繼别子之所自出者言繼禰為小宗又言宗其繼髙祖者則繼别子者子之子也繼别子之所自出者即别子也繼禰者庶子之子繼髙祖者五世之孫也繼禰言其始繼髙祖言其終繼别言其宗繼别子之所自出言其祖經言繼别子之所自出頴達言别子之所由出然則别子所由出即國君也其可宗乎璽衛宏漢書舊儀曰璽白玉螭虎紐文曰皇帝行璽天子信璽凡六又曰諸侯玉印黄金槖駞紐文亦曰璽列侯黄金印龜紐文曰印丞相将軍黄金龜紐文曰章中二千石銀印龜紐文曰章千石六百石四百石銅印鼻紐文曰印孫堅得傳國璽方圍四寸上紐盤五龍然則漢天子之璽其方不過四寸諸侯王以下其小可知土牛制義月令季冬命有司出土牛以送寒氣正義曰出猶作也丑為牛牛可牽止也送猶畢也其月建丑又土能剋水持水之隂氣故時作土牛以畢送寒氣也土勝水故可以勝寒又且以升陽唐月令季冬出土牛以示農耕之早晚若立春在十二月朢則䇿牛人近前示其農早立春在十二月晦及正月朔則䇿牛人當中示其農平立春近正月朢則策牛人近後示其農晚也後漢書季冬作土牛六頭於國都郡縣城外丑地其牛色以嵗之榦色為首甲乙木其色青丙丁火其色赤戊已土其色黄庚辛金其色白壬癸水其色黒以支色為身寅夘木其色青巳午火其色赤申酉金其色白亥子水其色黑辰戌丑未土其色黄納音色為腹若甲子乙丑金其色白丙寅丁夘火其色赤他倣此以立春日榦色為角耳尾支色為脛納音色為蹄設令甲子嵗甲為榦其色青則青為牛首子為支其色黒則黒為牛身納音金其色白則白為腹又若丙寅日立春丙為榦其色赤則赤為角耳尾寅為支其色青則青為脛納音火其色赤則赤為蹄九州釋義兖州兖信也五行星流而為兖豫州豫舒也又序也言隂陽分布各得其序荆州荆彊也陽盛物堅其氣急冀州冀近也爾雅云河兩間曰冀青州元命苞曰虗危星精流而為青雍州雍壅也唐地紀曰雍兼得梁之地西北位陽所不及隂氣壅遏故取名焉益州益謂溢也徐州徐舒也揚州揚輕也鍾山徐爰曰建康北十餘里有鍾山漢末金陵尉蔣子文討賊戰亡靈發於山因立蔣侯祠故世號蔣山神赤縣張衡靈憲圖曰崑崙東南有赤縣之州風雨有時寒暑有節苟非此土南則多暑北則多寒冬則多隂故聖王不處焉史記鄒衍曰中國於天下八十一分居其一分耳中國名赤縣赤縣内自有九州禹之叙九州是也不得為州數中國外如赤縣州者又有九乃謂九州也有神海環之如一區中者乃為一州也如是者九乃有大瀛海環其外天地之際焉三川河洛伊也司馬光言行録有司奏言日當食不食光言食不滿分或京師不見皆賀臣以為日食四方見而京師獨不見天意人君為隂邪所蔽天下皆知而朝廷獨不知其為災當益大不當賀詔從之後以為常漢宫中有宣室武臺召文臣則於宣室召武臣則於武臺春夏秋冬釋義禮鄉飲酒云春之為言蠢也産萬物者聖也夏之為言假也養之長之假之仁也秋之為言愁也愁之以時察守義者也冬之為言中也中者藏也天地嚴凝之氣始於西南盛於西北此天地尊嚴之義氣也温厚之氣始於東北而盛於東南此天地盛徳之仁氣也按地志今衛州城即殷牧野之地周武王伐紂築也又云武王至於商郊牧野乃築此城祭説唐韋彤議曰祭非外至生於心者也是故聖人等牲牢布籩豆昆蟲草木可薦者莫不咸在所以享宗廟交神明而全孝敬也遺山嘗與張噥齋論文見有竊用前人辭意而復加雌黄者遺山曰既盜其物又傷事主可乎一座為絶倒噥齋即張緯文先生盖遺山戲語也嘗有詩云因君寄謝噥齋老道我今年六十七作論法鹿菴云論與義體式一般亦是冒原講證結但論入作獨句直下不似義兩句扇對而入如麻先生漢書貫五經論最明白得體金清漳老人南宫人曾撰本縣二閬神廟碑遺山見之謂進士張和之有讀得行之語光武同馮異遇雨燎衣處在今南宫東北二十里馮邨内外制翰林學士所撰者為内制中書舍人定撰者為外制金哀宗朝有親軍殺其子者法家斷不至死上曰親軍宿衛之人父子之間殘忍如此與常人不同竟坐死論徐大卿云詔命之體莫如兩漢以其典實故也餘則何能又大卿等論及子告母事孟徳卿有荘公文姜之説徐公主義重於母李侍講説中和真人在龍庭時以瞻對無時恒備物以充咀嚼時一士人同在邸舍師每與之分甘一日師復求之彼辭無有託便旋食焉師知之因曰沙漠之羊與中土為用略同肉充飢毛作氊皮為裘角為杯匜此人所共知不意近來羊尿又何以配餅食也聞者為大笑彼徐悟其方已甚有愧色楊勸農春卿夜讀書有鼠出躍書几上忽投膏罐中楊子取一方木覆之隨突以出環書冊走不輟作人語曰油著油著楊笑起曰吾避汝燕城閣前晌午市合更忙猝不能過即擎虚器云油著油著人即開避故鼠亦云云聞者為笑圖克坦公説石丞相琚大定末致仕居鄉中一日㑹客間聞司録呵喝過門公即起立既逺復位客曰丞相何若此公曰參軍雖㣲國家命官也吾敢不敬衆客為嘆息丞相字子美中山人王西溪嘗云表章體臣無居首之理故今之表式皆以帝㫖冠首王西溪云元遺山録冊中云東平范尊師菴内見化飯王先生説渠海州為吏時嵗貢糟薑糟蟹海棠出州東入海八百里峽島島是龍宫地生海棠作矮樹花色深紅大如茶盌而百葉香韻殊絶開時可持一月久既衰不落而萎每嵗自島中移百本入海州御園明年再移百本而以先所種者供御每花一金籖牌記之脚花乃得入州官民家每一花必三葉承之重九開鹿菴先生為學士日命應奉編修輩取金實録内各臣事蹟欲集為長編俾士大夫家易於觀録或問其去取法曰大抵人之功勞必須具載如西漢曹參樊噲傳此其例也又曰西漢列傳是多少好墓誌碑銘格様學之有餘師矣既而侍講某多畧去其人勲效鹿菴聞之曰某不解此平日於書多謾讀過去了秋澗集卷九十九欽定四庫全書秋澗集卷一百元王惲撰玉
