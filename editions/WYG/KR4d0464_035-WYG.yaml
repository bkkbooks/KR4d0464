front:
  text: 三十五
  hash: sha256:adc7d6d8c5ca19cde8397e95c95e8a1c58f1e4a9cba3a03e6a23bf8a6a774a77
body:
  text: 元王惲撰書上世祖皇帝論政事書臣近蒙禮部符承中書省劄該憲臺欽奉聖㫖召臣惲馳傳赴闕庭者臣惲伏自欽承明命夙夜祗懼不知所為意者憲臺過舉俾備顧問庻有所發明因自忖量國家之事日有萬幾非愚下所能識然臣自中元迄于今日久叨仕進區區管窺不無一見輒敢以時務所宜先者數事昩死上聞臣聞自古創業垂統之君必定制畫法傳之子孫俾遵而守之以為長世不拔之本欽惟皇帝陛下聖文神武以有為之資膺大一統之運長䇿撫馭區宇民數逺邁漢唐其所守者特治道而巳然三十年間勵精為治因時制宜良法美意固已周悉今也有更張振勵講明畫一若懸象而昭布之使臣民曉然知其法之所以豈不便哉故臣以立法定制為論治之始一曰議憲章以一政體傳曰法者輔治之具一日闕則不可君操於上永作成憲吏承於下遵為定式民曉其法易避而難犯若周之三典漢之九章是也今國家有天下六十餘年大小之法尚無定議内而憲臺天子之執法外而亷司州郡之法吏是具司理之官而無所守之法猶有醫而無藥也至平刑議斷旋漸為理未免有酌量准擬之差彼此輕重之異臣愚謂宜將已定律令頒為新法或有不通未行盡該者如累朝聖訓與中統迄今條格通行擬議參而用之與百姓更始如是則法無二門輕重適當吏安所守民知所避而難犯天下幸甚二曰定制度以抑奢僭夫制度者明尊卑别貴賤法天道而立人極也故古者衣服飲食輿馬屋廬皆有恒制至于庻人僕妾其禁尤嚴惟在君人者制節謹度率先化下為務何則上之動静為人勞逸之本上之奢儉為人富貧之源可不鑒哉欽惟皇帝陛下臨御以來躬先儉素思復淳風如輕紵衣而貴紬繒去金飾而樸鞍屨至衣服等物銷織鍍呀之類一切禁止以奉行漸逺不無弛緩今也臣民衣飾踰于公侯婦女衣著等物貴賤以致聘財過于卿相男女不能婚姻正以用之無制僭越暴殄有不能供億者故物價不得不踴而貴錢幣不得不虚而輕上下困弊日甚一日假若巨室之家親屬奴隷衣飾一切自有等差若例而一之寧不困乏臣愚以謂冝一切定奪大行禁止使民志定而不少僭越用既有度物自豐饒恐亦實楮幣殺物價之一端也三曰節浮費以豐財用夫一世之財足周一世之用不必専豐其財去其害財者可也今國家財賦方之中統初年歳入何啻倍蓰而每嵗經費終不阜贍者豈以事勝于財過有所費故也為今之計正當量入為出以過有舉作為戒除饗宗廟供乘輿給邊備賞戰功捄荒歳外如冗兵妄求浮食冗費及不在常例者宜撿括一切省减以豐其財財豐事勝食足氣充以政則取以戰則勝以柔則服將何為而不成何求而不獲古之善為國者君不必冨冨藏于民故用雖多而取不竭孔子曰百姓足君孰與不足此之謂也且財非天來皆自民出竭澤焚林其孰禦之但力屈財殫非所以養民而强國也昔日金世宗諸王有以不給而請告者世宗曰汝輩何騃殊不知府庫之財乃百姓之財耳我但總而主之安敢妄費迄今稱説以為君人至言可不鑒哉四曰重名爵以攬威權古人稱官爵謂之天秩王者代天爵人鼓舞一世使天下之人奔走為吾用者此也惟爵與禄不輕以付人曰賢曰材乃能得之所以為礪世磨鈍之具若得之輕則視之輕視之輕則人不重人不重將見君子逺小人至此必然之理也惟其磨礪轡馭之權世主操于上不輕授人與當其材何患氣之不振力之不竭事之不成者哉今四海一家權宜假借之舉日漸疎濶正國家收攬威權之時如近年委任稍重者㒺考其素即授崇品激之建功立事固是駕馭英雄大權苟非其人不無叨竊不安之懼今中外無事朝廷宜重而惜之昔有唐使職或帯相印然止行見職曽無分省實權五曰議亷司以厲庶官臣聞古之善為國者不使人有怠惰不振之氣若作于心而害于政苟非以徳振起必須度時宜本人情齊之以法故得小大畢力上不勞而衆事舉今州郡之官品流殽雜既無選舉甄别止循常資紛紛藉藉聚散于吏部例得一官鮮不因循苟且以歳月養資考而巳欲望承流宣化趨事赴功卓有維新之政亦已難矣嘗觀漢唐之馭吏也能者増秩賜金公卿缺則表之以觀其賢否者放田里而不事事唐則召七品官以上集于闕庭親與訪問究得失而進退之然二者不過爵禄為勸爵禄極則意滿足意滿足則怠心生亦有無如何者故持斧直指採訪黜陟等使歳相望于道而本朝之舉高出前代比者亷司之設初氣甚張中外之官悚然有改過自新之念大姦巨猾致畏懾而不自安庸人懦夫將卓爾而有所立行無幾何法禁稍寛使監視者勁挺之氣不息而自斂聽從者奸弊之萌潛滋而復興恐徒易其名而不能革州縣之故習夫刑罰崇寛固自國家美政然分别善惡以示勸懲豈得専務寛恤昔者金大定間尚書省奏順州軍判崔伯時受贓不枉法准制當削官停職世宗曰受財不至枉法以習知法律故也所為奸狡習與性成後復任用豈能自悛雖所犯止于追官非奉特㫖無復録用以致犯禁者鮮此光事之明驗也今風俗澆薄遇有所犯苟免無恥臣愚謂法宜稍重以權一時其要在人法並任精擇官僚優加吏禄憲網既立公道大行官有作新之氣吏無餬口之虞我之氣既伸彼安得不振我之政既肅彼安敢或私所謂上行下效源清流長將見風采百倍有登攬澄清之望矣六曰議保舉以覈名實方今親民與參佐官幕縣令經歴為重縣令迺百姓師帥師帥賢則徳澤宣參署為一路紀綱紀綱振則政務舉今例出常流安取殊績臣愚以為若行品官保舉法庶得其人其法品量舉止與所保者資歴相應果皆兩可復精加磨勘無謬妄私意然後許令入狀相小大之才授繁簡之任限以歳月如唐制釐務出二百日者是也課其殿最升黜舉主得人者受知賢之賞不識者坐不當之罰舉官自然盡心受保者常恐相累如此庶立功而寡過矣獻選尤宜施用此法何則江南北至平定諒為不易凡所𨽻附秋毫無犯可謂仁義之師即以調省調官賄而毎放行省注擬尤為濫雜侵漁掊克慘于兵凶至盗賊竊發指此為名仰頼天恩幸其無事今宜委官分揀以行此法其停革人貟不至罷黜者降之邊逺其見職委有聲迹者使之内遷亦激勸一法盖自漢唐五代以迄于金皆遵而行之當時號稱得人然必須内設審官考功等職専掌其事七曰設科舉以收人材方今名儒碩徳既老且盡後生晚進既無進望例多不學州府鄉縣雖立教官講書㑹課舉皆虚名畧無實效以致非常之才未聞一士州郡政治苦無可稱思得大儒碩德難矣臣愚以為不若開設選舉取驗之速也夫進士選號歴代取士正科將相之才皆從此出前代講之熟矣理有不可廢者若限以歳月而考試之將見士争力學人材輩出可計日而待也論者必曰今以貟多闕少見行壅滯若復此舉是愈壅而滯之也臣謂不然盖科舉之設本以覈實學而收多士清仕途而息雜流庶得將相全材為國論治道備大用也豈不愈于學校徒設汗漫而無所成乎八曰試吏員以清政務前代取吏之法條目甚嚴如宰相子辟舉令取充省雜終場舉人試補臺掾品官子孫吏員班祗閤門等人出身者試補六部令史夫令者明法令曰令史者通經史曰史今府州司縣應用一切胥吏自帖書中來官無取材勢須及此所習既凡聞見亦寡欲望明刑政識大體務清無革難矣臣愚以謂為今之計莫若將合歳貢吏人以吏貟法試之中選者仍許上貢補充隨朝身役外州府郡見役者從亷司以校法試驗庶幾激之積漸肯學其月請俸給亦合定奪能使得餬其口然後可責以亷何則今亷司專抑吏權察非為少有貪鄙不計養亷即按而治之是縱之竊而責以何盗之為豈理也哉九曰恤軍民以固邦本近命新省整治以來一切事務盡從簡静可謂不嚴而治不肅而成者也中外熙熙翕然有拭目太平之望兹盖皇帝陛下屏去奸惡保合太和嘉靖邦本專任責成之效也然猶有當軫慮者夫為政之道政貴均一不少偏重否則必更而張之使至公均被國家且自破圍襄陽以來簽取軍役盖四舉矣將著中物力等户盡充軍站中間抛下上户其能有幾皆貧難下户而軍興百色所須皆何供辦江南甫下遭值前省和顧和易急徴暴斂侵漁不法又將軍站閃下差税不問多寡止除四兩餘者分洒見户其逃亡差税又行每歳陪納數年之間編氓已是靠損其小户困苦不較可知臣以時屬方殷其代輸差税宜令蠲免涵養存恤小康若一旦别有征求易為責辦其軍站户富者至有田畆連阡陌家資累巨萬丁對列什伍貧者日求生活有儲無甔石田無置錐者今也不分難易一體應役又至元十一年簽充到軍役者都是近户不計當時起遣已是生受臣愚謂俱合分揀定奪庶不致困乏逃竄有悮臨時調不均之弊莫此為重十曰復常平以廣蓄積常平倉設自至元八年隨路收貯斛粟共約八十餘萬今倉廩久空起運具存甚非朝廷捄荒恤民本意天朝常平法嵗豐増價以糴之則農重榖而敦本嵗荒則减價以糶之故民倚安而無菜色如往年定時估以平物價竟不克行殊不若常平之有粟也葢低昻權在有司兼併利無専擅故也若復實常平倘遇凶歉出糶三二千石穀價自平楮幣亦復加重且免賑濟破用軍國正儲實為古今良法十一曰廣屯田以息逺餉臣聞邊儲逺餉自古未有良法如飛輓負載賣爵贖罪引種和糴未免弊困多不能行俱未若留兵屯田為古今之長策也臣試以唐振武事言之憲宗元和七年李絳言天德振武今豐州等處左右良田約四千八百頃收粟四十萬斛歳省度支錢二十餘萬緡兹非明驗歟今振武豐州界河兩傍除營帳百姓耕占外其餘荒閒尚多若大治屯田自非水旱田功稍集國儲必有所濟唐陸䞇所謂縁邊土沃而久荒所收必厚又近嵗山後流移户多將見抛地土時暫借令營屯亦是一法冨弼曽言此事及檢括冐占仍招募願户者聽外邊屯已置營屯去處亦宜差强果為國盡心有為能臣重與檢勘其間一切可行未舉已行不盡者極人為而盡地力仍將迤南一切置屯見閒户數併徙邊防以捄一時此急於治外之意也十二曰恤撫畧以撫已有臣常聞老子以恬淡為宗孔宣父戒及其在得二聖人垂教以天理當然為言非徒設也欽惟皇帝陛下聖神文武臨御天下三十餘年昭丕天之功接千嵗之統三五已來未有若斯之盛其於太祖聖武皇帝垂創之業可謂大集厥成然有其有者安務廣徳者强審今之勢譬猶蓄牧大家川量谷計數已殷富正在牧圉擇人芻豢得所而已如此則牛羊茁壯日蕃而無耗不然㒺恤見有又務多得將見復求者未獲則已有者􅇤而耗之可不惜哉伏願陛下息逺畧撫已有以恬淡為心以在得為戒頥養聖夀配天無極此宗廟神靈四海臣民之願也臣又嘗觀天地之氣四時行萬物生皆自然而然又其升降止三萬里之中其範圍不出三萬里之内餘則混淪旁礴雖聖人有置而不論者伏惟陛下憲天體道裁成輔相功已不能殫紀尚何言而何慮哉十三曰感和氣以消水旱夫兵者凶器戰者危事不得已而用之且以强勝為戒我國家以神武戡定海宇日月所出没霜露所霑墜莫不臣而主之然地廣物衆不無孽芽其間故三十年之久十有餘舉如征大理雲南渡鄂渚平内難討賊璮取江南破襄漢駕洋海下占城定高麗問罪交州掃清遼甸皆除暴固存彼動此應不得已而用之之舉也然士卒愁苦死傷暴露邊郡困乏中外憂勞之氣不得不傷陰陽之和而致水旱之報是以聖人重之畏之故老子曰大軍之後必有凶年師之所處荆棘生焉故比年以來水旱無時霜災屢作山崩地震變出非常奸臣柄用盜賊竊發百姓嗷嗷日趨于困臣常讀中元以來國書詔條未嘗不以生靈為念棄捐細故講信修睦以用兵為重此堯舜好生之徳禹湯克寛不自滿假之仁也願陛下躬體𤣥黙頥養聖夀與天無極以初元之心為心以恬淡之慮為慮為民祈天禱命灾害不生禍亂不作使黎庶知其無好兵之心天地鬼神諒其不得已之意庶幾天回哀眷易乖戾而為和平變荒歉而為豐稔斂時五福敷錫庶民咸躋仁夀之域天下幸甚十四曰崇教化以厚風俗自昔風俗美好由禮義所生今也禮義既衰故日趨于薄一法出則衆奸作一令下則百詐起何則民所欲而生者嵗不加益我過為之求者日有所増所謂救生而不贍奚暇治禮義哉有司釋此不念毎以厚風俗為務如孝行有復役節婦有旌議婚姻立學師表淑慝忠臣義士嵗有常秩之類非不家至户曉然終無分寸之效者徒文具虚名而巳夫天下之事有本有末知所先後則教立而化行臣愚以謂風化之行莫若國家先以四教為本曰仁以養之義以取之禮以安之信以行之何為仁父愛子育懷生樂業温飫以養其心何為義輕徭薄賦取斂合冝寛裕以暢其氣何為禮上下有分無妄侵辱誅責以當其功罪何為信發號施令一出不易忱誠以明其約束是也而前政者謂僧格也曽不務此専以威虐肆心督責為令取辦一時流毒四海不知陵遲偏詖有不可救藥至于今為厲者如逋負差徭有巳蠲未蠲者貧難軍人有巳間未間者民出祗應不蒙撥降反覆償其不應民辦和買雖蒙官遝曽何敷其元價杖刑重責不上大夫崇卑之品曽不少間悉被其戮辱夫如是將何以責民心之近厚風俗之淳也哉而惟其四者本立而天下有悚然亷恥之心而忠厚後敦之以禮讓謹之以庠序觀之以鄉飲教之以冠婚喪祭民將目擊而心諭安行而有得二三大吏匡直輔翼之于上時從而振徳之孰有子遺其親臣後其君者哉所謂父子有親君臣有義不曰風恬俗美將安歸乎十五曰減行院以一調遣伏見近者立行院四處葢欲養兵力分省權而免横役然不可多設多設則一旦遇有調遣號令不相統一至合而征苟進涉險難不肯併力一向以趨成功况江嶺阻隔動輒數百里賊去此而盜彼即欲加兵則曰我已降于彼此縁知㑹巳殺掠而去如向者鍾賊是也其在江西我逐而出境即睨而不視其在福建復逐而出境亦坐而不問以至朝廷專差重臣㑹三道之兵總統于上才方𠞰絶臣故曰不可多立者縁此也雖止設一院于江州地既酌中號令四出復命皇子震統于上使跨有江淮遥制兵勢夫何衝而不折何令之不一哉誠為簡便十六曰絶交貢以示曠度夫邊方小國外示臣屬内實觀望我以誠往彼輒譎來何則恃其險僻昧夫天理而懷苟且假息之念故也非修文以來易以計破難以兵碎也今交趾漢數郡之地耳數年之間雖貢奉伻來終未稽顙闕下􅅃輸誠赤今年羾一犀象明年獻翠具若干是皆我物藉為巳有調書詞廷嵗月而已此最不可信者昔漢文帝却千里馬詔郡國勿令來獻而越王尉佗曽未幾何怨艾自新去號北面終其身内屬正以德禮懷柔然爾臣愚以謂彼之交貢自今宜辭而無受則我之所得者有三不寶逺物示以曠度一也鱗介之屬叵測淺架不知我之虚實彼用自絶使私計内窮二也又使駭夫天子明見照萬里之外畏天事大之心庶有以自省其曲直所在三也刺竹藥弩緩則津行奸詐急則曲盡服從伏乞下公卿而集議以付有司臣之所言雖至淺近然當陛下無忌諱之時逺被寵召無一言補報緘黙旅退豈惟自棄大負朝廷虚求之心顧臣庸愚何足重輕萬一片言而有可取使四方大賢大德之士聞之曰如臣者且蒙採擇將訑訑而來皆為陛下用矣臣不勝俯伏待罪憂恐之至臣惲昧死再拜謹言上御史臺書至元五年十月日前翰林修撰王惲言盖聞御史周官也其職掌贊書受法令秦漢以來乃副貳丞相任耳目司察之寄唐制二臺左以糾朝政右以繩郡縣職非不要責非不重也至于天下之大奸郡國之大豪時務之得失生民之利病京官之迭居内外郡吏之歴事臧否莫不劾視按問以之定功罪而權賞罰不待稽覆證左㑹有失實而抵坐之也是以天下之人惴惴焉凛凛焉惟恐有毫髪詿誤風聞疑佀名絓憲章至于顛越不恭者盖千百一人而已故朝廷清而萬事咸理逺近一正而奸邪屏跡矣我國家列聖相承重熙累洽奄宅區夏垂六十年迨聖天子登極典憲日新百度具舉于是建臺司置僚屬盖將示公道抑澆私折奸萌救内重之弊也切惟風憲條目古今一致也强宗豪右田宅踰制凌弱暴寡二千石刻損政令不恤疑獄倍公向私侵漁百姓苟阿所愛蔽賢寵頑通行貨賂選署不平此漢六條之制也唐之目四十有四今不具見雖繁簡不同以近事攷之或有可詳若聽覽未充衮職有闕彌縫匡救之者不敢後也中書政本機務所出整肅糾繩之者不可闕也官或備員未得其人擢任薦升之者不可寛也綜劾之權内外惟一强禦巽懦之際不可異也大臣當任責也反循嘿而無所建明小臣當奉職也或僭越覬覦徼倖而至於臣門如市請謁公行名器大權假授失當學校久廢以為非所急而起青衿之譏賢材在下以為不必用而興白駒之嘆選部無法徇情故而害至公鄉愿賊徳亂朱紫而敗俗化守令不職怨讟交興刑罰失衷手足無措胥吏舞文而亂紀羣小告訐以成風服色僭越尊卑無章工技淫巧交靡日蠧將帥狃于掊克而邊防弛上下習于垢亂而積弊深若是者皆國家之急務臺諌所當亟言而不可後者也今聖天子體國子民度越百代大經良法志在必行然以今觀之臺憲一司整綱頓紀所以肅清内外其可不申明大體姑務毛辛細事苟以塞詔命而已耶然未易有以一二言者試以其事之切于今者明之凡臺之所糾擿者皆百官有司踰于法之外者也今承積弊之後法制未完品式未具官無定資人無定分數年以來抵法冒禁者人人皆是也舉一而遺其九是九者幸免其一者雖置于理亦未能服其心也何則盖其罪均而刑殊罹于法者少漏於網者多也若欲人人而劾之内自京畿外及州郡極刑之間圜土之内將不勝其繁者矣異日法之不行二者必居一于此古者大弊之後必有更始之制然後法得以行莫敢犯故能洗舊染之汚而成維新之化果克若斯善之善者也其或不然當舉其大而遺其細大者伏其罪而小者栗矣若張綱之埋輪陽城之伏閤貴戚斂手若鮑中丞金吾膽落如温御史如是則吾之法行矣今中外大小百司于未立法制已前其奸贓不發者不可以枚舉此朝廷有識之士所共知共見者也制立之後有畏罪懼法改而奉公為能吏矣亦有狃于故習未能盡革少有贓私而輕者矣極有怙奸自終長惡不悛觸冒公禁無所忌憚姦私狼藉者矣所謂不能人人劾之者盖謂此也如能區别其類刋去其太甚者董勅懲艾其情輕者革心而奉公為能吏者宜皆褒異奬顯堅其自新之心如此則贓私者去矣雖然事猶有可慮者贓汚雖去内外闕員者必多而事有曠矣必欲備官而無曠于事其法有五曰科舉曰吏員曰門廕曰勞效曰選舉其四者前代遺法具在舉而行之則辦矣獨選舉之制舊例雖存擬之當今權冝節目固有不同今日選舉之法子孫弟姪其材可備用者皆得預選所貢者賢舉主當令内外官五品以上各舉所知不拘親故門下及當以次旌擢所貢者不肖與减等致罰使不得進預京官之例此五事既行付之吏部定為選格所謂去前之惡收後之善承其乏備其曠使選舉有例品節有章朝廷無可指之瑕不惟法制一定後世有所持循使天下徼倖覬覦非望無行之徒將不革而自去矣今憲司既建所當行者其目甚多然切于今者獨此五事為要耳所謂一代之制綱舉而衆目張者矣伏惟二三賢執事天挺髙明剛而不撓忠言讜論洞達政體毅然以大節任天下之重盖素所蓄積耳而復内貳鈞軸外領雄藩山立揚休坐鎮雅俗㡳柱障乎頺波風稜肅乎霜簡見諸行事上為聖天子所知非一朝一夕是可謂據得致之位又有可行之資者矣若惲也草茅一介遭遇明時違逺朝廷盖八年于兹雖越在草野乃心未嘗一日不在王室今復蒙被寵召拔起于泥塗之中犬馬之力思所以報效而愧其僝弱不材然愚衷内激情有不能已者敢觸犯忌諱抒狂昧以獻冒凟尊威不勝戰懼之至上張右丞書中統元年冬十一月朔布衣王惲謹齋沐頓首再拜致書于右轄相公閣下夫布衣窮悴之士混閭閻之下處嵓穴之間欲砥行立名非附驥尾而託青雲之士惡能施于後世哉昔夷齊讓國之賢君也在彼則僻處海濵在此則晦迹中國周武北伐二人相與叩馬而諫太公以義士扶而去之時人未之知也及宣父贊之曰古之賢人也求仁而得仁故得名粲星斗望隆嵩華奮乎百世之上通乎千載之下其名日益彰矣此太史公所以感激而傳之也向非夫子表而出之吾知其寥寥寂寂西山一餓夫耳又焉能亷頑鄙而厲懦夫者哉惲衛人也生于窮巷之中長于蓬茨之下意廣才疏無所肖似徒以欲罷不能之心雪其窓螢其几蟫蠧書史自娱自喻而已其于聖學之藴治國平天下之術懵不知也以故年近不惑而無成于一藝迹混常流而不登于士林傳曰四十五十而無聞焉斯亦不足畏也已僕每讀至此未嘗不廢書長嘆傷歳月不我與也于是中夜興起徬徨四顧思得出大賢之門脱囊中之穎攀逸駕附驥尾固瞠乎其後矣庶幾碌碌因人成事免夫湮滅無聞之恥方今聖賢在上治具畢張朝廷清明百度改正内都省而統宏綱外總司而平庶政雷厲風飛皇猷攸塞因自謂曰彈貢禹之冠捧毛義之檄兹非其時乎遂乃應東魯之辟參賔僚之末席不暇煖而簡書之召已飛馳于汶水之上矣伏自俟命以來倉皇失措不知所以自通知于閣下尚賴往者知遇之故拜下風接清燕藉乎尺書俯憐駑鈍以致翦拂顧盼俾之長鳴而増倍價是遇知于閣下者佀不偶然矣伏惟閣下剛健文明練達政體挾漢日則洗光咸池分蘭省則坐鎮俗雅忠結主知學為世用承恩綸于夜半洞律管于天心而復闚其經綸之業大有為于天下者不得不為閣下頌之昔房喬善斷而如晦矢之以謨姚崇應變而宋璟守之以文四賢者雖所行不同同歸于正故相須以成俾無悔事今閣下極推讓規隨之度收清寧畫一之功誠漢室之蕭曹聖朝之房杜也然念朝廷日逺天下之事盡在中書中書之權實在二三執政今閣下繫國安危為世輕重進退百官號令天下所謂仕進之烟霄一世之龍門也尚何驥尾青雲之比擬哉天下之士欲掇青紫招名聲者捨閣下而將安歸乎如惲之心非敢必其自逺方而來以黔驢之技名聨仕版身造蘭臺投書宰相遂韓愈早達之心擁帚侯門要魏勃見知之遇既聞達于諸侯歸顯揚于閭里正以千里一召寵幸遇矣是則足以挽布衣之賤刷無聞之恥而抱一壺千金之貴也尚何富貴之心之有哉伏願明明在上穆穆布列聚精㑹神相得益章無疆之休與世共之而惲也處畎畆之中樂堯舜之道辭編户之役為太平之民守先人之弊廬甘考鼎之饘粥亦足以餬口而蔽風雨矣不然登西山而追伯夷之風游東魯而觀洙泗之教豈得不謂由烟霄而附青雲自閣下而攀驥尾顯名當時施于後世者哉觸犯尊威不勝惶恐之至上元仲一書記書正月十四日王惲頓首再拜白盖聞居天下有二道焉出與處而已伏惟書記上人聰明特達居天下至静之中窮聖學大衍之道積有年矣囘視斯世若不足玩至于或出或處安往而不可哉第所可惜者時也朝廷嚮明而治聖王順應而行圖囘天功混一區宇網羅英俊片善俾舉彼聞風興起者雖山澤之芻蕘布衣之賤士思砥節礪行竭力悉智願仰副上之好賢樂善之實焉若曰薦舉不私用養得所其職在于賔師之賢遇知至上之人朝夕引翼一歸于正俾賢者進而不肖者退此天下重事而治亂之所繫也故傳曰得士者昌失士者亡又詩云濟濟多士文王以寧盖言世顯之士能如是也嗚呼何君不聖何王不明必得聰明至静之士見微知著臨事不惑斷于中而察于外夫然後可得非常之士而能建莫大之功當今之時可以與權者舎上人一二輩其孰舉哉若僕也蟫蠧書史兀坐窮年佔畢之外百事不解邇來二十有八年矣傳曰四十五十而無聞焉斯亦不足畏也已僕每讀至此未嘗不掩卷嘆息内増愧赧噫自治不勇而喋喋于左右者何哉盖僕恨以荒疎無似不能卓然自表于世而上人遭際乃爾君臣之義既不可廢今日之出可謂千載一時也伏惟書記上人藉有為之資乗可致之勢出則為王者之師處則不失髙尚其事若僕所謂可惜者如是而已矣但未知生民幸不幸耳西狩尚遥想當逺去略布鄙懷惟上人其圖之惲載拜檄李秀才士觀取淵明文集書前六月五日嘿齋主人頓首白余家舊藏靖節文集一編盖王掾濟川之所録也此本自入王氏不復備翻閲有年矣今吾子所秘于篋者實出敝家所藏之舊本數欲一觀吾子愕然以無有力辭余且謂誠然而止夫何天牖其衷手足悞敗云此集我家實有之盖次兄手所録也不知吾子前日之拒之辭誠何心哉且靖節之詩正如清風明月四時何嘗闕焉既非秘異世得莫聞之詩一旦譸張自欺其心又欺其友抑不知吾子誠意之學尚友之義果安在哉傳曰人誰無過過而能改善莫大焉望吾子無以前日之辭為愧不致有抵璧投珠之舉復惠然許諾以備舊好是吾黨中改過自新之友豈不快哉如其不然而存此心是吾子終絶于長者也吾且將長驅問罪以圖進取之計不知吾子將何所逃罪焉縱吾子限以學海峻以文府堅以詩壘整筆陣以前與吾義師抗正煩腰間之箭重射魯連之書也若曰堅守力盡乃降謝罪于轅門之下將唯命是聽俾介忠胄信之士干仁櫓義之師盡取所有稛載而歸以貽執事羞固非所願也惟吾子詳擇焉嘿齋主人頓首白答周南樂書惲再拜白來書承勉以割愛致夀為喻雅意甚佳然僕近六旬以來老病相仍百念灰冷何止此一事爾至云情之過差似未相悉也且老妻推自結髪迄今與相生活者四十餘年内助之力既勤孔多一旦決去即漠然若無所係豈人情也哉故非夫人之慟有不期然而然者如足下所喻是耄嗟者既非鼓缶者為是恐三極之間人倫大致造端之理未易可輕也兼聖人垂世以近情為貴静念來章殆以無情者為髙而不及者亦未為下也無乃泛應不相關之論哉此説一行又佀夫足下平日于吾老嫂處樂爾之懷絶藐然也其如諸餘何相顧偕老方以道業相規之不暇忽辱以風花為貺不幾以當悲而歌哀樂失所乎且風花之愛盖少年妄念不圖吾友老大尚未厭斁情之所鍾果多焉臨紙信筆不覺喋喋如此幸併為之一嘻也來索㕔事題扁等書不恤拙惡勉為作去未申尚民社自愛惲再拜白與子初中丞書為喪子慰釋惲再拜白聞吾友以季子之喪情之所鍾時雖易有未克遽已者竊恐重傷天和且緩勿藥之喜欲有陳慰以目疾故敢奉書以寓其説夫事機臨衆得所處為難憂患切身處之者尤不易也何則盖驗吾平時存養定力為何如耳死喪固已大矣然有常有變父之于子以愛為主子之于父以顧養為先傷其愛莫逆于父送其子雖為戚僅朞畧無弗忍過隆之禮豈養老送終人子之順事其或失養自天者豈惟不順是亦門庭之孽也往年寗人程氏喪其佳兒程氏名和其子翰聰明有文卒時年二十哭而過市匪朝伊夕竟以哀而􅆷其生識者譏之盖以理哀之情之正以事而哀則情之私也自今觀之使程氏不死其子而所圖稱遂其後事蹉跌大有過于夭閼之痛者向使程知幾先見何有于事哀而殞其生者哉乃知禍福倚伏未可以向謀而得一旦遽失輒以永傷為抱也古之賢者為能以禮制心以義制事處乎中而無不及之差然而哀之于情固為不細發欲中節聖不吾法吾何所揆哉昔伯魚之死宣父不以弗忍易事而徒以隆其喪有以見適于中而不敢越也然哭子淵從者曰子慟矣兹盖痛其道無所屬也子者一巳之至情道者天下後世之所公共也故于仲由發無己之責在子鯉有過甚之嘻又傳曰君子所履小人所視巨室之所慕一國慕之古人當其無可奈何則安之念夫一身之重而以衆人之所視而慕者為慮其于私憂故有不遑専卹者兼盛衰吉凶循環迭至吾之定力正在順受而已况氣之為孽理之不順者哉嘗以子夏喪子哭而至失其明曽子數之以為過後人鑒之以為懲嗚呼聖門之徒猶未免溺于所愛矧其餘人哉要之能截然剛制納諸中而不失其正有以義割愛而己故延陵季子其子死于嬴博之間袒還三號掩坎而即去曰骨肉歸于土魂氣無不之也意者父子雖天性而修短亦命也觀其所處儉而有度哀而有節可謂達生死之變酌古今之冝適恩義之中而存後世久逺之慮者矣故孔子嘆其合于禮而賢之此無他能以義制恩也今吾友沉潛剛克明理而達變修其身而齊其家刑于家而達于人者也僕尚何言然一身之重存養之功逆順之理適中之義尤當以延陵之心為心以西河之過為戒而為後來久逺之慮者乃所以望于閣下也惟髙明亮之信筆為言不罪疎拙惲再拜白謝張詹丞書六月日中議大夫治書侍御史王惲頓首再拜奉書于詹丞相公閣下昔韓昌黎以聲光未白屢用文章投獻知巳若于汴則售董公時於徐則撼張公建封在朝廷則取知于宰相度予嘗讀其書想其人何激揚奮發鋭于進而希當世之用哉盖欲遇夫大人君子假其休光餘烈以斯文効用將託于不朽故也惲猥厠士行役志于簡編者有年于兹縁技之癢時吐辭自喜亦欲効用于世受知于大人君子之門且驗夫平日勉行之素徘徊四顧曽不能遂其知遇之願者亦有年矣側聞閣下以明亮之姿操特達之用推賢薦士持衆美効于上以端宫府之望孜孜焉惟恐片善或遺一士之倀倀而去也切自喜幸今重華繼明羣彦周列茲非求知効用之時邪故奉書上進斷不自疑意承閣下不以愚疏見鄙周旋備至俾峩冠而前顒對麾仗致有西池非常之遇豈惟身都顯異抑為吾道中外之光其知遇之幸何董張裴晉公之倫可得而比儗者哉自是而後足跡踵于門牆者數矣未嘗不顧盼翦拂使之増華當時葵藿微誠睠焉孰無然不敢有一毫過覬上凂左右者以本然之分固在尚何他覦而自取貪冒無厭之譏乎閣下才識明亮固雖逺計不㤀此時之愚也既而行止靡定淹延茫洋莫知其然進退維谷之間實有出于無聊賴者不知于已託是自疏也因不自揆庶藉休燠少熙寒谷之凛又使遇知明時之幸庸有以將之也故伸鳴執事有不嫌于屑屑者况聞省録不㤀又有過于前日顧盼翦拂之厚叙别之際欲負愧伸感且謝其不敏復恐倉卒具辭重得罪于左右用是不果于披露也違離以來夙夜慨嘆至于今而有不遑安者何則言不復于後進不保其徃此最君子之所深病在閣下固已融而不留而惲也不知量之慊若復往而不咎又恐貽自棄自絶之悔將何以復登中護之堂接君子之清光庶幾不負之意者乎敢布愚衷惟君侯詳恕之惲再拜白議貢舉議貢舉人材肇自唐虞而法備于周漢興乃用孝亷秀才等科策以經術時務以州郡大小限其嵗貢之數以賞罰責長吏極其人材之精猶古貢士法也歴魏至於後周中間因時更革固為不一要之不出漢制之舊迨隋始設進士科目試以程文時勢好尚有不得不然者至唐有明經進士等科既明一經復試程文對䇿中者雖鮮號稱得人至有龍虎將相之目其明經立法敷淺易于取中當時亦不甚重又有設制科以待天下非常之士故前宋易明經為經義其賦義法度嚴備攷較公當至于金極矣後世有不可廢者然論程文者謂學出剽竊不根經史又士子投牒自售行誼蔑聞亷恥道喪甚非三代貢士之法伏遇聖天子臨御之初方繼體守文以設科取士為功若止用先皇帝已定格法與時適宜可舉而行之邁隆前代創為新制可不詳思揣其本末酌古今而用之惟古貢士率從學而出後世不詢經行徒採虚譽因循薦舉狃于私恩不顧公道此最不可者也莫若取唐楊綰宋朱熹等議參而用之可行于今綰之法曰令州郡察其信友孝義而通經學者州府試通經習所業貢于禮部問經義十條對時務策三道皆通為上第其經義通八策通二為中第其論語孝經孟子兼為一經熹之議曰分諸經史如易書詩周禮二戴禮經春秋三傳各為一經將大學中庸論孟分為四科並附已上大經逐年通試及廷試對䇿兼用經史對以已意以明時務得失愚謂為今之計宜先選教官定以明經史為所習科目以州郡大小限其生徒㨂俊秀無玷汚者充員數以生徒員數限歳貢人數期以歳月使盡修習之道然後州郡官察行攷學極其精當貢于禮部經試經義作一場史試議論作一場題目止于三史内出廷試策兼用經史斷以已意以明時務如是則士無不通之經不習之史進退用舎一出于學既習古道且革累世虚文妄舉之弊必收實學適用之效豈不偉哉外據詩賦立科既久習之者衆亦不宜驟停經史實學既盛彼自絀矣翰林臣王惲謹議秋澗集卷三十五欽定四庫全書秋澗集卷三十六元王惲撰記
