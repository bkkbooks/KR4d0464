body:
  text: 便民三十五事自此係監司時建白皇帝聖旨裏中議大夫治書侍御史行御史臺事伏見朝廷勵精為治百度從新中外顒顒有太平之望然弊積日久事端非一必更張其大者重者使有定制則實惠可及於民今國家疆宇民數遠過漢唐歳入經費又為不貲所急者立法選官恤民息兵力養人材節浮費之用停不急之務而已盖大法立則宏綱振庶官舉則萬務修兵民安則邦本固人材廣則任使周省費用則百姓足停不急則農務勸至於侵奪民利不便於時者一切革去之然此要須大臣力任其責以經國遠圖為念使治體一定始終無間開誠心布公道授羣材而作行之使上有所守而不勞下知奉行而不亂尚虞箝勒未嚴吏有勤惰明其賞罰黜陟以威厲其不事事者將見激昂奮發人争立效則治定功成可計日而待也不然究錢穀之已然緩綱維之大柄未見其可也某以不材謬當言責區區之誠有不能自己者謹條陳切時便民三十五事開列于後伏乞御史臺備呈中書省照詳施行事目立法定法制置發兵符契通行奏事選官議保舉立審官院選參佐卹民議卹民除軍户閃下差發捄災秋税准喂養馬駝草料復常平倉論匠户括户土斷七品以上官言任内利病息兵力軍人交番緩逺征合併十一年軍定奪軍戸析居地税養人材設學校附復立國子學議用中選儒士試吏員節費用古者因官府而立人今則因人而立官府併州縣省官吏行劵法減秪應禁醖酒振武屯田輸粟充監當官停不急之務權停一切工役省罷鐵冶户侵奪民利不便等事課程再不添額論鈔法論鹽法輝竹還民分閒官占民田定奪官地給民禁約侵擾百姓立法定法制自古圖治之君必立一定之法君操於上永作成憲吏行於下視為凖式民知其法使之易避而難犯若周之三典漢之九章一定不易故刑罰省而治道成今國家有天下六十餘年大小之法尚未定議内而憲臺天子之執法外而廉訪州郡之刑司也是有司理之官而闕所守之法至平刑議獄輾轉為理不免有酌量凖擬之差彼此重輕之異合無將奉敕刪定到律令頒為至元新法使天下更始永為成憲豈不盛哉若中間或有不通行者取國朝扎撒如金制别定敕條如近年以來審斷一切姦盜省部略有條格者州縣擬行特為安便此法令當亟定之明驗也如此則法無二門輕重當罪吏無以高下其手天下幸甚置發兵符契竊見朝廷防馬劄妄濫也御前給發奉使欲遠方取信也佩圓符為徵况兵戎大事乎近者王著矯偽發兵利害非細合議關防契勘厯代緩急調遣兵馬皆驗符契然後得發今後合無依上起置符契庶免臨時别致事端通行奏事竊見憲臺初立遇有軍國重事中書省臺院約㑹一同聞奏若事或不便許廷議以從所長其於朝廷大為有益近年稍乖舊制至於大政大刑其事已行不得與聞任言責者既不及論救且得箝口不職之謗于天下乞請申明舊例不致似前濶畧以絶壅蔽天下蒙幸選官議保舉夫親民之官守令為急竊惟選法自近年大壊後府州司縣官例多阿權通賄僥倖而得其南選尤濫至目之曰海放此等賢否不較可知庸懦者因循苟且奔走承奉外政務盡廢小材者視時所尚營治已私略不以官事為念爰自新政以來外望雖聳根源舊弊依前未除易舊而新今雖汰冗濫選材能然一或譽之則為賢一或毁之則為否是非惑亂終無所憑莫若將素有聲迹資品實至者令三品官入狀舉保量短長之材授小大之任然後明察臧否精覈殿最得人者行進賢之賞謬舉者坐不當之罰舉官自然精詳受保者惟恐有累如此則官得其人庶事修舉昔周世宗令除目仍署舉者姓名若貪穢敗官並當連坐金朝正大間亦行此法當時號稱得人方今教養無素科舉未行權宜矯弊似為良法立審官院竊詳省院臺部皆得選署官屬若公當則人心自服稍或未安中外之人皆得指言數年以來省臺壊亂多此之由夫省臺大僚近君之重臣也古人稱投䑕忌器當尚深戒况天官天秩一旦使羣小得恣情阻壊非所以體重臣而存大體也兼若輩處心鮮公不為己私且泄怨謗比比若此合無立審官院選用有德望公正大臣次取知典故識大體剛直而敢言者為之輔其中外一切選舉官員通得論列而疏駁之不猶愈于若此紛紜之不定也耶檢㑹得金朝章宗時臺司用一諸科人為監察審官院竟奏而罷之致臺望増重遠近肅然當時大為有益或曰若立此官臺諌何為曰臺諌論列至廣審官係封駁之事古人設立以用人為為治之本惟其責之專則事精詳而得實理所謂開公道而庶人不私議也伏乞熟慮而深思之選參佐近聞朝省選用隨路總管其法甚妙然參佐尤當精析所謂掌司經厯者務要識大體有議論通案牘臨事不疑剛正有斷振一路之紀綱辨大小之衆務下至調和官府驅役吏人上下伏從官長有賴方為稱職近年徃徃用非其人不惟誤事且復害事如非流望者有之不通文墨者有之老病庸懦不勝任者有之如得其人斯弊盡絶契勘至元二年隨路總管許令帯行參佐二員此固唐自辟所知良法今既妙選大尹亦宜令各官保所知職官以任參佐却恐朋黨成風因時作弊莫若將保到人員交相為用如真定府尹所保用之保定保定所保用之他路之類是也若本人任内汚濫不職保官亦行坐罪其各道按察司首領官非常依上精選使出總府幕職之右庶幾官吏推服臺綱人望因之取重卹民議卹民竊見隨路百姓自攻取襄樊以來節次將中强等户簽充軍站其見在下户供給百色軍需已是生受及江南平定中外佇望庶得休息復致前政煩苛横取白著急於星火州縣官吏視其如此因縁作弊科斂無度如遇和雇和買夫役等事即驗包銀分俵每一兩週歳約出横泛錢三十餘貫止以四兩户論之是一歳著二十倍也又軍户逃户閃下差税復灑見户包納割剥民肌未見如此之甚致愁嘆不絶感傷和氣歳旱不收百物湧貴衣食艱難民安得不困救之之方在於將和雇和買必不可闕者畫時支價兩平和買雇賃並不科俵民間饑荒去處官為賑濟累年逋負已徵入官者還民未徵者盡免其逃亡復業者付原抛事産量免三年差役庶居者安集而去者思還然後下寛大之詔布告中外使民曉然知朝廷優卹元元本意又阿哈穆特及其黨與所没贓賄不可勝計此物既非天來皆係生民膏血向肆威虐聚為已私可謂贓穢不祥之物昔漢籍梁冀家財遂充國用減天下租賦之半散其苑囿使業窮民合無亦將上項財賄全代天下今歳租賦之數使二十年愁怨之苦一旦消釋誠國家結民心感和氣其曠蕩希世之恩過於尋常萬萬也一照得近年和買造作等事其弊有三如立限甚促畫時不支價錢必須科派民間然後可辦致百姓添價轉買或官吏搭攬多搭錢數及取納使用糜費等錢上下通同作弊一也縱降到價錢止依各處虛報時估比之百姓實費不及半價虧損人戸二也其官降不敷價錢内官吏又行剋減且有全不到民或三五年間並不給降者三也如近日科下真定皮裘皮袴明該不得樁派百姓官給見錢官無見錢皮無見在送納有程却恐躭悞不免分科民間其弊依然復作是上司實有愛民之心而百姓名受其惠而隱受其虐也今欲革弊不過降給見錢從實支價責委正官辦集其事何則蓋近年遇有工役官長但領畧其間率委本把里正信實等人營辦將百姓恣行侵牟無有紀極或事發到官止將上項人量情追斷民苦已受將何所補若革去三弊將一切違錯明該止坐正官不究餘者庶幾多方用心顧恤百姓不致里正諸人作弊一隨路遞運車仗脚錢近者五六十貫逺者不下百貫官支價錢十不及二三其不敷數百姓盡行賠備名為和雇其實分著年來披擔極是生受乞請驛程去處官立車甲頭兩平雇募從實支價以紓民力一戊戌年中選儒户比之僧道百分無一前省收入民編却有告難蠲除者合無依舊除免併十三年試中儒人亦行一體定奪一弛山林河泊材木魚蒲之禁令民得恣採取以捄饑乏不足除軍户閃下差發查爰自收復殘宋以來人皆有息肩之望近年差役豈惟不蒙減免又將九年十一年内原簽軍戸差發每户止除四兩餘有數目俱於見在戸内樁科及自戊午年准申逃户之後續逃戸計上司並不准申州縣亦不敢申報閃下差發仍令見在戸計包納又至元七年取勘出協濟户計原奉條畫止令協濟見當差户近年編造入額另行科差加以和雇和買不絶如流比之初取襄樊差役轉増數倍上司若不哀矜量加優恤恐不免轉徙流離之患乞將原簽軍户氣力全行除豁及取勘續逃户計蠲免分數庶望貧民少得休息實為便益捄災竊見今歳真定等處春夏亢旱穀菜皆無米價湧貴小民久已闕食徃徃採食青棘槐花榆葉拂子等根加之流竄驚擾甚為不安諺云春旱泥倉秋旱離鄉盖言比接新來歳月日遠故也百姓多趂熟河南今者米粟亦貴愈無所徃是將坐視饑饉以待其斃其救之之術宜在於早設不然不過發倉廪散楮幣倉廪所在皆空寳鈔幾許得濟莫若將被災州縣合納税石併即今收糴事故等糧盡行停免使百姓少寛且得自救責委按察司親臨官吏多方置計賑濟饑乏及弛山林河泊之禁權停門攤酒醋等課庶幾不致流亡失所秋税准喂養馬駝草料竊見保定等路百姓每歳撥赴遠倉送納又樁配各和買各位下馬駝所用草粟設立倉場官收支中間官吏作弊百姓重併生受如按察司每歳各處追首鈔使民免遠倉納税之勞有三五百錠者盡係添搭多取于民若於百姓所納秋税内盡行折作草粟赴各處喂養馬駝倉場送納使民免遠倉納税之勞無和買樁配之擾及革去給降剋減之弊實為便益復常平倉竊見至元八年設立常平倉驗隨路户數收貯米粟約八十萬石以備緩急接濟支用近年以來起運盡絶甚非朝廷䘏民捄荒本意如徃年差官定奪時估以平物價縱使能行終非久遠通便之法當時僉謂若常平有粟各路不過依時價出糶三五千石則物價自平人心倚安低昂權在有司兼併不復高下其手向前收成去處依前收糴以實常平恐亦恤民平估之一䇿也論匠户一省部為各處富强之民徃徃投充人匠影占差役以致靠損貧難户計奏奉聖旨差官與察司總府一同磨勘到各户根脚氣力手狀已是精當類攅冊帳各路赴部分簡實為善政中外喜望比及今歳科差必得上項富户依應當差庶幾貧難稍得息肩近聞省部止為外路帳冊體式與大都不同此上差官復同三家再行磨問不惟中間動摇實恐遷延有失人望若將已分簡定帳冊勒令各路照依大都體式攅報以望善政早得成就或謂若依己行體例將匠户富强者還民當差其見當身役止除一丁差税却恐一家兩役日久靠損人難終致紛紜不定莫若將見行分簡匠户委係高手人匠存者存之外據户眼高手藝平常者放罷為民若必須補添再於民間將酌中户内取手藝極高者充庶免紛紜不定且失民望其江南户口一家分作數户其名甚多其數不實括户土斷國家自壬子歳抄數後迄今未甞通檢中間等第高下大成偏重故唐制三載一定户每歳一團貎恐因仍舊額貧者轉貧富者愈富况三十年之久稍候年歳豐收民大安息合行從實檢括察其存亡均其貧富則庶功以興國富家足不然是縱令州縣每歳増減高下以滋官吏之弊故前人云與其潛資于姦吏何若均助于疲人以免其偏苦哉其各路流徙户計抛下差務即令盡行樁洒見户賠納徃徃靠損人難今四海一家民之去此即為逋逃寓彼即為見在若通行括數只令彼處土著當差除此之逃額實為便當此厯代遺制我如行之不為無例或曰恐涉動摇曽不思偏重包納不均之苦甚於一動多矣七品以上官言任内利病竊詳方今大病國之惠化下罔盡行民之情偽上不周知今後合無令外路五品官部内利病可以興除者許令任内或秩滿赴部直言要以指陳實事一出己見庶使民間疾苦艱難悉得上聞其官之盡心與否不校可知其當興除者即諭所司施行日新政治誠表裏相維上下盡心之良法也息兵力軍人交番一隨路軍人爰自南征以來攻城野戰萬死一生及平定江南舉望停征稍得休息今軍前勾起逃亡事故等軍歳無虚月如父死子繼兄亡弟行以至一户有病殁陣亡父子兄弟四五丁者又有死絶止存老父母與妻孥者尚然不蒙撫存况征南將校例多遷賞其軍士亦宜優䘏合無將見屯戍軍士或二年或三年使之分番相代省家父母親戚歳時有相㑹之樂所謂悦以使民民忘其死契勘唐制征防軍年及者還民父母八十者聽一子歸侍况今四海一家正息馬論道之秋如兵戎稍寢天下幸甚緩遠征伏見方今聖德天覆海宇一家獨以日本未霑王化致煩征討竊詳倭奴自後漢始通中國多以義懐來未聞專事征伐盖限隔洋海數千里之遠此與彼接我以衆命先甞其險嗚呼殆哉昔三苗來格虞帝以修文為先後倭始通光武以廣德為務伏望聖朝鑒法前代先遣材辯綏遠之臣申之以文告喻之以逆順柔以文德結以恩信使民見包荒不遐遺之意若猶未至然後興師未為晚也此係國家大事任責者宜悉心以明其利害合併十一年軍竊見近年朝廷將舊軍與至元九年所簽軍貧難消乏之家皆行合併甚為便益其十一年所簽軍人當時已是近下户計經今九年多有生手不堪役者合無一體從實合併使貧富難易兩得均平又得兵力精强且見國家同仁一視之義定奪軍户析居地税一軍户析居貼户即目見行取要地税當間本是一户謂如有田六頃除四頃外納餘上税石既是析居其地兩分各有地三頃不在合納之數即目止憑一户時取要餘上地税理合分間定奪除免養人材設學校夫自昔設立學校非唯尊師重道盖欲養育人材以備内外任使方今名儒碩德既老且盡晚生後輩以上乏教育下無進望例皆不學而吾道不絶如綫設若構一大厦必用衆材可成况治天下之廣居乎今府州縣道雖設立教官講書㑹課止是虚名皆無實效其隨處教官冷署寒毡餬口不給奚暇治禮義而及人若與醫學一體給降俸禄復官撥學地資贍生理然後選職官子弟及鄉民之秀異者使之入學專以講明經史以趨有用實學不三五年間一處止有成材五七人則天下可得數百人以須國家之用豈不偉哉如以後設立科舉尤須預先教養不然將見數年之後非惟無材可取恐禮義廉恥掃地矣將何以論治乎隨路醫學亦合一體整理施行不致虚請俸錢有名無實議復立國子學附竊見至元七年朝廷立國子學命許衡為祭酒選朝右貴近子弟令教授之不滿五嵗其諸生俱能通經達理彬彬然為文學之士及其入仕皆明敏通疏果于從政如子諒侍儀之正大子金中丞之剛直康提刑之仕優進學弟親臣之經明行修堅童君永之識事機子亨待制之善書學企中客省之貞幹揚厯省臺蔚為國用豈小補哉必欲設學校養人材京師首善之地宜先復立國學以風勵天下用中選儒士竊見十三年隨路試中儒人於内多有材堪從政者若委自各路并按察司取勘相驗得實申報上司遇臺院六部百司按察司令史書史闕員以憑補充勾當是猶勝謬亂雜取州縣無例無學等人此輩設若吏業非素終是通曉義理例有文筆使官事稍習皆可勝用假令學校吏試便行須待歳月猝急不能得用能此不但㨗於得人亦是激厲天下為學之方豈為小補兼金人舊例臺掾書吏皆於終場舉人内試補勾當但在有司持擇使之精當不致妄濫請託而已試吏員竊見方今内而省部臺院百司外而按察司府州司縣合用吏員俱出自州縣校書貼冩等人因而上達以致僥倖成風廉恥掃地只以學術無素選取無方中間求其廉慎可稱熟練吏事者甚鮮而天下之務繁而詞訟錢穀重而刑名銓選生死曲直高下與奪悉出於乳臭若輩之手欲望治道清明風俗美好難矣合無講究近代考試法式從府州官公共保舉其法律刀筆行止或不相應罪及保官其餘非此而進者不許補充隨朝勾當設法既嚴人自力學如此非惟用得羣材禮義廉恥風動四方下可以革去僥倖苟且之人上可以成公平肅清之化端本澄源此最急務節費用併州縣省官吏伏見方今州而為府縣而作州復有不必縣而縣者此盖王進建言欲務為夸大以示外方意也以至増置人員添給俸禄無有虚歳彼所臨户口曽不加多差税轉成虚耗所謂十羊九牧為政大弊也今四海一家郡縣版籍何止數倍夸大之名將何所用不若依舊便將當省者省可併者併豈惟事簡官清不致國家縁虚名而受實費既省其官據禄薄者亦宜増而厚之盖清其吏而不厚其禄則飾詐而不廉知厚其禄而不省其官則財費而不足知省其官而不知選其能則事壅而不理此三者迭為表裏相須而成者也又江淮興兵以來諸道使府一切把軍官員權宜而置職及見設提舉司官及因聚賄妄立官府者多矣亦宜減削使職有常員事不煩冗則人無紛擾之勞矣行劵法省秪應今訪聞得真定路週歳秪應錢萬有五千餘錠以天下計之不下數萬錠矣此縁省部差遣繁冗及當該官吏因之作弊致費用如此之廣雖禁約關防甚悉不若澄治本根今後若路官得人凡事公幹并將急遞鋪整㸃如法據行下事務嚴立程限管得時刻不悞如是則不必使者旁午而重費館穀也若軍國大事必須差官者照依前金給付劵頭據合得分例令於上批冩某日經過某日宿頓回日繳納年終將報到秪應文冊查照同否多取並多與者同罪將見使人不敢多取掌行者不能妄添稍有分毫差别誠為方今節省費用良法至於朝廷重使别議給與如此減省故不少矣禁醞酒一目今自真定路以南直至大河地方數千里自春至秋雨澤愆期旱暵成災致米麥湧貴無處糴買例皆闕食百姓徃徃逃竄莫能禁戢有司誠宜多方計置救災卹民竊見民間醖造秠酒所用米麥日費極多畧舉真定一路在城每日蒸湯二百餘石一月計該六千餘石其他處所費比較可知若依至元十五年例將民間醖造秠酒權行禁止庶幾省減物料以滋百姓實用誠救災息民之大事也振武屯田竊見每歳北邊於新城沙并靖州三倉和糴糧儲不下五七萬石如遇軍馬調遣又豈特十萬石而已近年穀價湧責且以十萬石為率所費不貲用度終不寛廣兼自古饋餉雖有智者終無良法惟邊地屯營最為長筭契勘唐憲宗元和七年李絳言天德今豐州振武左右良田約萬餘頃擇能吏可開置營田以省費足食從之四年間開田四千八百頃收粟四十萬斛歳省度支錢二十餘萬緡今體訪得振武與豐州界河兩旁地廣民稀除營帳牧放百姓耕墾外其餘閒荒地甚多若差公幹官僚踏視其宜留兵營田一切取武清屯例假以歳月自非水旱不熟田功稍集國儲必有所濟故陸宣公云縁邊土沃而久荒所收必厚如此省費足食官無規措和糴之勞民免輸納虚耗之費恐亦安固邊防之一䇿也輸粟除監當官竊見上都北邊每歳臨幸及屯戍重兵歳用糧斛甚廣雖官司和糴商旅興販終是遠窵不能多廣得濟昔漢文景時亦為艱于轉致令民輸粟塞下賜與爵級謂之賣爵級遂致邊兵饒足方今院務官别不見入仕格例以曩日論之不過貨賂請託若以弊革有益於國家不若令辦課官驗額輕重使輸粟上都及迤北州郡幾何者則任某處監當官一年立為定制謂如某處務場周歳課額十錠設官二員每員輸米或粟上都者若干迤北州郡者如之不半歳上都及縁邊州郡便得米數十萬石豈不大便益哉又如州府務官經營幹勾比得差遣所費不貲一任之内必百方作計取償於民羨餘復入於已是使明損民力暗將官錢盡入私門若此法一行將見私錢盡入公家時息奔競官革請託軍國坐收饒足之利故令民輸粟充院務官最為當今良法停不急之務權停一切工役竊見大都雜役五臺拖木等夫及諸寺院營造比年以來未甞停輟古人有云工不使鬼必待人興財不天來終須地出不動百姓將何所求况今真定至大河迤南年穀不登百姓嗸嗸例皆乏食自捄不暇據上項工役似合權且停放以見國家罷不急節浮費救災恤民至意省罷鐵冶户竊見燕北燕南通設立鐵冶提舉司大小一十七處約用煽煉人户三萬有餘週歳可煽課鐵約一千六百餘萬自至元十三年復立運司以來至今官為支用本貨每歳約支三五百萬斤况此時供給邊用雖所費浩大尚不能支絶為各處本貨積垜數多其窺利之人用官司氣力收買其價不及一半當時既是設立提舉司煽煉本貨以備支持除支外止合存留積垜以備緩急今來却行盡數發賣竊詳此事虧官損民深為未便今來止合依驗舊日有名曽煽爐座存留三五處依例興煽據煽到本貨除支持外盡數存留積垜並不許發賣外據近年新添去處悉行停罷將所占百姓分撥所屬州縣依例當差仍許諸人認辦課額興煽小爐或抽分本貨或認辦鈔數臨時定奪如綦陽鐵官中綂二年省部已曽將冶户差發比較歳煉鐵貨數甚争懸以此罷去其便與否乞追照原卷備見其詳侵奪民利不便等事課程再不添額契勘課程自四十年前天下正額止萬有餘錠今者從萬至於十倍可謂極致每歳考較尚有増餘前省定奪歳歳添作正額且財不天來皆自民出恐亦困人之一節也兼商税金資物貨凑集買賣多寡市肆遷移皆趂州郡㑹合津要去處歳各不常若累累一體添額恐有輕重不等之弊可依已定額數外從實恢辦或依相永法増籌者量皆遷賞否者黜罰停歇朞年告敘所増等第以五十錠為上三十錠為中二十錠為下如此民喜額定而不増官樂有功而陞用羨餘之數自然盡實入官論鈔法竊見元寳交鈔民間流轉不為澁滯但物重鈔輕謂如今用一貫纔當徃日一百其虚至此可謂極矣究其所以法壊故也其事有四其至元十三年已後據各處平凖行用庫倒到金銀并原發下鈔本課銀節次盡行起訖是自廢相權大法此致虚一也其鈔法初立時將印到料鈔止是發下隨路庫司換易爛鈔以新行用外據一切差發課程内支使故印造有數儉而不溢得權其輕重令内外相制以通流錢法為本致鈔常艱得物必待鈔而行如此鈔寧得不重哉今則不然印造無筭一切支度雖千萬錠一於新印料鈔内支發可謂有出而無入也其無本鈔數民間既多而易得物因湧貴而難買此致虚二也又總庫行錢人等物未收成預先定買惟恐或者先取故視鈔輕易添買物重幣輕多此之由此致虚三也又外路行用庫令庫子人等私下倒易多取工墨以圖利息百姓昏鈔到庫不得盡時回換民間必須行用故昬者轉昬爛者愈爛流轉既難遂分作等級其買市物必需上等除是則必需搭價然後肯接此致虚四也今謂救其虚莫若用銀收鈔大路止用得課銀一二千餘錠小處一二百錠民間鈔儉必須將銀赴庫以倒換鈔貨是鈔自加重銀復歸于官矣今却以鈔回換則愈致子虚矣則是當官只重銀不重其鈔此復致虚一也或更造銀鈔以一伯當元寳二伯遞漸收回見鈔盖事久則變變則通輕重相濟之法也不然其利病又當與中統原議立法者如張介夫王紹明等講明舊法以定新行如此年載間庶可復舊使資財大柄常操於上權不移於下矣論鹽法竊詳調度鹽法以便民為心者莫若於所轄州縣量其數多寡將原認課額均分依已定價錢一十四兩一錢仰各處管民官設立鹽官赴運司關支鹽貨置局發賣納舊課關新鹽挨次送納其沿路脚錢於各處鹽局之官用已錢出備却於發賣鹽價上搭帶仰各道按察司不時計㸃多餘之數既分鹽課為正額聽從各處從實發賣中有比别路賣不盡去處督勒本處須管驗合關數目依限關支課亦依期送納何故當原驗民户多寡均分食鹽之家既等縁何却有不盡數目防有私鹽生發仰各路正官提調不致阻滯正課亦不須設立巡鹽官擾民其先行賣訖去處必須再來關支是為増餘近年以來人人増添食鹽既多别無虧失止有増羨可不勞而辦也一官為調度者從省部差有根脚慎行止諸錢穀人充規措所官聽運司節制於用糧去處設立許諸人赴倉送納或米或粟納獲米鈔赴規措所關引支鹽近見運司官差規措官於南京等處不問人之貧富有無抵業九一抽分虚立文契指於某處中納糧斛其實將引到家不問價直高低貨賣了當或償舊債或納官錢或别作營至今五七年間錢糧不能到官者不可勝計深為未便今者止合明出榜文召募諸人於所措倉分先行送納糧斛納獲米鈔然後赴規措所支引次後來關鹽釐勒監主毋得刁蹬停滯立便支發似此别無阻礙鹽法大行倉廪充實不須和糴和中豈小補哉一長蘆本處除收米粟外並不得收受諸物止收寳鈔赴萬億庫送納止收米粟者以備御河上下官為支持不收諸物者諸物官司無用中間作弊不無阻礙鹽法若以收鈔納鈔其便有三一則鈔法通快二則革去舊弊三則官民兩便一便商賈為利者許諸人赴場買引關鹽釐勒監主不得刁蹬客旅最為急務盖禁官吏不得買引賣引是也既許諸人興販官吏亦用已錢何故不可若使本管官吏得買其間客旅深為未便課程不能恢辦何故鹽價貴則官吏盡數拘買客旅不能得買鹽價賤則官吏並不收買客旅謂曽赴倉場不能得買甞被躭悞又知鹽價遲澁亦不興販虧損官庫皆此之由又官吏買鹽先揀離場近便去處次揀潔浄乾白好鹽又不依序先行攙支使客旅人等無所措手其弊不能一一徧舉竊惟鹽場天下號為争利之所况本管官吏乎盖防微杜漸尚有不能禁者以官物為已有之資放縱由我可不戒哉一運司上下大小請俸人員近七百名其中虚設者大半行户部都轉運司之名可易為提舉鹽使司大使副使各一員次以管勾催煎足以辦集自然官減俸省亦便利之一端也一解州池鹽天然自成不同清滄犯本煎造費用浩大徃年陜西運司為課額重大立法頗峻山谷遠人不知禁忌食既艱得未免私煎冒販事發到官情罪不小徃徃有破家戕生者良為可哀昔隋初罷酒坊通池鹽鹽井之利與民共之至今稱為仁政若於見定解鹽價直内更為減免分數使民易得食用亦國家惠民而不費之一端也輝竹還民竊見衛輝路輝州園竹皆係百姓自來栽植置買物業軍站差徭仰之出備自姜毅建言將頃畝官量見數斫伐四六抽分民得六分官又拘取量給價直當時百姓已是不堪近年以來不依時月不問去留恣意斫伐盡行枯廢其合得價錢給既非時多不完備又巡竹人等絡繹徃來稍有疑似恐嚇錢物事非一端徃徃有破家失業者致百姓顧視竹值甚于仇讐竊詳天之生物本以養人乃反為害豈造物意哉且量頃畝無多抽取四分以之輸官未為大益百姓得之實非小補合無將上項園竹依舊令民為主官不抽分出備一切差役氣力亦寛弛山澤之禁不奪民利之美事也若謂於干係官竹法有礙據輝竹造到器物令給引印烙亦可通行其見設提舉司並不將竹園耰蒔名為辦課轉以侵擾百姓營治已私為務亦宜罷去令總府就便管領其省官吏息民擾實為便當分閒官占民田一總庫將束鹿縣民田以為官地約一千四百餘頃每歳包納麥課每畝麵三斤合無除免明諭百姓使為永業一去歳取勘到滑州御麥地畝約八百餘頃中間多係軍站農民祖業莊産種養年深今來一例打入數内理合分閒民田令依舊為主定奪官地給民一京兆路州郡所有營盤草地極廣舊為探馬赤牧馬地面近年遷徃西州屯駐其悉為開空地畆并隨路營盤草地空濶去處量給側近無田農民耕種併贍不足禁約侵擾百姓一每歳鷹房子南來所經州縣市井為空因官吏非理淩辱百姓畏之過於營馬及去又須打發撒花等物深為未便乞嚴行禁約以安吏民一四萬户軍馬遇有調度經過去處嚴加禁約不得非理騷擾致驚農民責所在達嚕噶齊巡護勾當但有失事坐所委官罪一冀州管内河西軍户閒處村落不時騷擾如强耕田白采桑欺淩農民等事告發到官司縣不能追理至元十七年省院已曽差官究治此其顯然也合行嚴切禁約不致别有侵漁一隨處監官非奉上司文移不得一面將門攤定課額上擅行添搭數目一御河上下一切官司阻礙客旅船隻不能通快如開關錢漫河索岸例等事乞悉行禁約秋澗集卷九十欽定四庫全書秋澗集卷九十一元王惲撰事狀
