front:
  text: 壬寅夜大風雪寒苦時中省官僚未明已即事過晡始散是早僚屬有後至者省官諭之曰風雨晦暝常情例懈在公者當夙興益勵可以辦集而儆其餘也闔省為惕然又曰百姓宜安刑罰宜省稅斂宜薄寃抑宜察追呼宜簡判决宜審用度宜節興作宜謹燕㑹宜戒思患宜豫防此雖古語於治道且盡可不慎哉丞相瑪穆特燕省自來置廢官西臺上囂隘近市不稱具瞻以移省事上聞奉聖㫖遷四王府其列聖神主奉安聖安寺瑞像前殿明年以樂善老故府為省署仍以金都省舊額榜焉時又於烟霞觀摘委房長纂類一切合奏機務如錢榖數目事事比附舊例多寡有本有末使見節目優劣大槩縂撮要領從簡易知極其略殆笏記之體云中統二年辛酉正月癸亥朔丞相瑪穆特行帳頓拜郊臺下省事日集樂逰南園劉行省所治從便首相故也癸酉左司都事劉郁被譴既而辭退堂議以前進士楊恕代焉恕字誠之金内相文獻公子􅆏落人經義第成德君子也後為翰林侍制終易州尹省府為發下中統元寳交鈔榜省諭隨路其文曰省府欽依印造到中統元寳交鈔擬於隨路宣撫司所轄諸路不限年月通行流轉應據酒稅醋鹽鐵等課程并不以是何諸科名差發内並行收受如有諸人齎元寳交鈔從便却行赴庫倒換白銀物貨即便依數支發並不得停滯毎兩止納工墨鈔三分外别無尅減添搭錢數照依下項擬定元寳交鈔體例行用如有阻壊鈔法之人依條究治施行據此須議出給者
