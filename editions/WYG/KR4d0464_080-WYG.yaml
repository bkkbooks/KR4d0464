body:
  text: 一諸路通行中統元寳衘下買賣金銀絲絹段匹斛㪷一切諸物毎一貫同鈔一兩毎兩貫同白銀一兩行用永為定例並無添减壹拾文貳拾文叄拾文伍拾文壹伯文貳伯文叄伯文伍伯文壹貫文省貳貫文省文省如七十足陌八十足陌若使同銅錢便省官司利益鈔文故先作文省二字一各路元行舊鈔并白帖子止勒元發官司庫官人等依數收倒毋致虧損百姓須管日近收倒盡絶再不行使仍於庫司門首張掛省諭諸人各令通知照勘隨路秪應中間多渉冒濫議欲行批劵法曰此法止可約束委奏闕差疾足而已達官巨僚不能盡然遂止明定分例行下各道時圖寫歴代君臣可法政要及自古太子賢孝等事秪備向前進說十日壬子親衛董文炳字彦明藁城人來自北庭知我軍大捷中外稱慶省府議所有合行事理劄付各路宣撫司榜諭者其文曰皇帝聖㫖裏行中書省瑪穆特為頭官員欽惟皇帝即位之初下寛大之詔恤疲困之民除舊弊立新政條畫非一期與民共享有生之樂省府恭承聖訓方將撫治間大軍調發供給軍需轉輸糧餉逐急催辦文繁事冗不無少有騷動照得續奉詔書節文軍方弭而復興民甫休而再擾欽惟聖慮已嘗軫念及此蓋遇一時之變者難拘定例圖逺大之功者未免有勞人費物之舉凡此等事皆非得已為天下除害也近奉聖㫖節文大鄂爾多人来也其餘軍人與民户毎亦多投拜了也即目無咱毎迎敵底人也省諭軍民安業務農者欽奉如此欽惟皇帝仁民愛物之心自今以往復得盡行施設今照得已未行事理條列于後務要實行非止虚文而已合行榜示者一軍馬之事糧草為大近為大軍調遣方當征進之日未見回軍之期省府扣算年銷所用糧料稈草驗諸路軍均科除各處存留祗應外撥赴軍儲省倉分作三限送納省府非不知民力困乏逺倉生受縁為軍儲必用之物若不乗此農隙時分送納將來失悞軍儲不免再行動衆搬運如此則今日之勞却無春夏之擾也至日不惟雨水泥濘民力轉致生受又是妨奪農務失悞嵗計所費又甚于今日也近奉聖㫖已將喂馬草料槽等物盡行住罷省府恭承聖訓恤民之意遽已科逺倉糧以三分為率初限一分轉限至年終赴所指倉分外中末限一分至今年二月終盡數改撥各就附近河倉送納上是帶納水運脚錢將来官為雇脚搬運再不動民扣算今年逺倉糧數比附上年各處赴軍儲逺倉稅糧三分中争一分數少亦是减省民力即目年銷糧料足用仰省諭農民作活一欽奉聖㫖罷散喂馬稈草等事省府照得已曽行下各路宣撫司將已納到官草數除各路年銷外盡數給還本户若有未納者亦行停罷并將元准備夫役槽等盡數教散歸還去來竊恐所在官司因而作弊私下拘占人夫槽仰宣撫司照依已行罷散據各還本主數目遍行省諭無得隠匿尅减務要實到於民一為軍馬調度凡衣襖器仗馬匹等物省府委官支價收買并搬運糧斛脚力駱駞車仗皆係官錢雇覔外據毛連夾袋止是借倩民力縫造並無賖借科著等事竊恐在下官吏等中間作弊指託軍須為名一面掲借或有名為和買不支價錢雖支價錢却行尅减上下蒙蔽以致苦難深失朝廷優恤百姓之意若有如此作弊之人許令陳告以憑究治施行今後遇有合用物件依前支價和買一為去嵗桑蠶田禾間有災傷去處欽依詔書已令各路宣撫司驗災傷分數從實减免差撥外不被災地面亦令量减分數如此存恤猶恐人苦難又以漏籍并老弱等户協濟本處當差户計庶望民力少得休息外據宣課事亦令驗委實偏重去處量行减免所有鹽貨聽從民便買賣食用並無樁配給散之家此皆聖主仁政之所先也仰宣撫司照依已行事理施行一欽奉詔書今後各處應有乆逺安屯并暫時經過軍馬合用糧食於官倉内驗數支給却不得騷擾人民仰各處管軍官管民官遞互相照省府照得即目春首正及二麥滋榮桑稞生發布種五榖時分竊恐經過軍馬并屯住營寨人等牧放頭匹食踐田禾嚙咬桑稞樹木及強要酒食欺奪物件騷擾不安失悞農民嵗計阻礙通行客旅仰宣撫司行下各管官司欽依已奉詔書事理依上照管禁治若有不能斷遣者開具縁由申来以憑究治施行一欽奉詔書農桑衣食之本勤謹則可致有餘慵惰則必至不足正賴有司嵗時勸課省府照得即目春首農作時分仰宣撫司令已委勸農官員欽依所奉詔書於所管地面内依上勸課勾當務要田疇開闢桑麻増盛毋得慢易仍於嵗終考校勤惰明行賞罰以勸將來一欽奉詔書鰥寡孤獨癈疾不能自存之人於官倉内支糧賑贍仰宣撫司令所在官司依上賑贍仍置孤老院存䘏住坐一隨路罪囚除犯重刑奏聞待報外其餘罪囚仰宣撫司審問得實别無寃枉就便量罪斷遣毋得留滯一體究得隨處盜賊往往生發侵害良民蓋是所在官司不曽嚴行禁治深為未便省府近為燕京多被盜去處明立罪賞嚴切夜禁督勒官兵捕盜人員將作惡賊人盡數拿獲依條斷罪仰各路宣撫司遍行所屬州縣若有失盜去處照依燕京體例添氣力多設方略隨時捕捉明立賞格嚴行懲誡如有捉獲強盜之人除官賞外更於賊人家産内給付充賞若有同伴賊人并安泊之家及兩隣知而不首者同罪失覺者量行治罪一若有㳺手好閒不務家業賭博錢物開張酒肆之人仰所在官司常切禁斷若有違犯者治罪施行一州縣之治俱在官吏若得其人百姓安集差撥均平茍非其人定是差撥不均民被其害不有黜陟賞罰何由激勸懲誡據本路見任官吏如有贓汚事者國有常典其才能異衆亷幹可稱者仰宣撫司開坐事跡保申來以慿聞奏超擢任用施行丁巳元夕大風雪晝暝有衆盜刼民家是晚官寮聚省出重賞捕賊明日獲焉二月癸巳朔五日丁酉行省官奉㫖北上後三日惲與偕行者周定夫已刻遇河南經略使史公於居庸南口相與迎謁道左公問瑪相所在曰次西南土樓村公相見而去知車駕囘鑾北兵已敗遁去行者居者為熙然也前次北口店復有㫖山北寒沍可緩來遂還是日遇張國公於中店説見齎亡金實録赴省呈進省官時繕寫進讀大定政要得此更為補益之時鈔法初行惟恐澁滯公私不便省官日與提舉司官及採衆議深為講究利病所在其法大約隨路設立鈔庫如發鈔若干隨降銀貨即同見銀流轉據倒到庫銀不以多寡即装垜各庫作本使子母相權准平物估鈔有多少銀本常不虧欠至互易銀鈔及以昏換新除工墨出入正法外並無増减又中闗防間庫司略無少弊所納酒醋稅鹽引等課程大小一切差發一以元寳為則其出納者雖昏爛併令收受七道宣撫司管限三日午前將彼中鈔法有無底滯及物價低昻與鈔相礙於民有損者畫時規措有法以制之在都總庫印到料鈔不以多寡隨支備隨路庫司闗用外一切經費雖緩急不許動支借貸其錢貫顯應鈔面將來以錢鈔互為表裏此張本也時週嵗包銀六萬餘錠鈔數人及五十餘萬堂議嘗云若印至百萬所獲差息可盡免天下包差蓋以平準貿易諸物一嵗民間毁廢不貲皆為官息也又當時鈔法有甚便數事艱得一也經費省二也銀本常足不動三也偽造者少四也視鈔重於金銀五也日實不虚六也百貨價平七也二十一日己亥未刻淮海都督府申宋人圍我海州堂議飛奏外命惲持省檄馳海青傳催發經略史公令率河外諸軍往援既啟行隨得報云宋人已退走遂止二十二日役來趣闔省北上越三月壬戌五日丙寅未刻丞相瑪公與同寮發自燕京是夕宿通𤣥北郭偕行者都事楊恕提控珠嘉謙詳定官周止省掾王文蔚劉傑六日丁夘午憇海店距京城廿里凡省部未絶事務於此悉行決遣是晚宿南口新店距海店七十里戊辰夘刻入居庸闗世傳始皇北築時居庸徙於此故名兩山巉絶中若鐡峽少陵云硤形藏堂隍壁色立積鐡者蓋寫真也控扼南北實為古今巨防午憇姚家店是夜宿北口軍營月犯東井鉞星或者云斧鉞用兵之兆距南口姚店三十里而逺己巳辰刻度八達嶺於小雨間俯望燕城殆井底然出北口午憇棒棰店天容日氣與山南絶異以暄凉較之爭逾月矣午飯榆林驛其地大山北環舉目已莽蒼沙磧蓋古媯州地也是夜宿懐來縣南距非口五十三里縣東南里許有釀泉井水作淡鵝黃色其曰玉液即此出也官為置務嵗供御醪焉庚午泊統墓店詢其名土人云店北舊有統軍墓故稱是夜宿雷氏驛亭地形轉髙西望雞鳴山南眺桑乾上流自奉聖東諸山下注白波洶湧若驅山而東雞鳴山者昔唐太宗東征至其下聞雞鳴故名東南距懐來七十里之逺辛未午刻入宣徳州申刻使者也鮮乃至傳旨趣令諸官速赴行殿是夜宿考工官劉氏第十一日壬申候瑪相為一日留蓋有所需也距雷氏驛九十里癸酉行六十里值雪宿青麓十三日甲戌至定邉城憩焉蓋金所築故城也是夜宿黒崖子距青麓九十里十四日乙亥抵𣙜場峪蓋金初南北互市之所也是夜露宿雙城北十里小河之東南距黒崖西北一百有五里十五日丙子停午至察罕諾爾時行宫在申刻大風作𤣥雲自西北突起少頃四合雪花掌如平地尺許亂灤河而北次東北土塿下羣山糾紛川形平易因其勢而廣狭焉泉流縈紆掲衣可涉地氣甚温大寒掃雪寢以單韋煦如也沙草氄茂極利畜牧按地志灤野蓋金人駐夏金蓮凉陘一帶遼人云王國崖者是也上命平章王文統草荅髙麗手詔其辭有誦經供佛為國祈福良可嘉之語選集賽丹某官借職伯衞將軍以髙逸民借職禮都員外郎為副使其國將發髙麗世子來覲止焉初髙麗國相有以書致寒暄於省府者欲以書為荅且以方略撼之俾見我大國文加武暢之盛惲曰不可境外之交非人臣所宜此范文正書諭元昊遂得罪於裕陵也可不戒哉乃止十六日丁丑上遣參知政事張易亷右轄亷名希憲字人甫澣海人天資沈毅臨大事不可奪其亷正有大臣風節傳㫖慰諭行省官時御道不啟拜覲者皆俟故留八日而發距雙城七十里二十三日甲申次鞍子山南距灤河四十里二十四日乙酉次桓州故城西南四十里有李陵故䑓道陵勅建祠宇故址尚在未刻朔風發雨霰交作傳令方春牧馬不勝寒克瘦弱者悉用氊毳撘覆其背否者以法從事二十六日丁亥時諸王有以宥令行下本管及祝香四岳者朝廷以當否為問省官婉辭以對此無他止是爭欲徼福耳若大制一定此事自革晨霜蔽野如大雪日極髙隂凝始釋距鞍子山廿有五里是日完州人髙道字道之來自和林城説迤北正二月間地草自然東自和林西至炊州其燃極草根而止水温處愈甚人往來者須以氊濡水覆其上可越又有黒風掠人面如灼兵械及山椒遇夜皆有火出在山者如列炬然或者云火兵象皆彼自焚銷鑠之兆二十七日戊子次新桓州西南十里外南北界濠尚宛然也距舊桓州三十里申刻歘有兔自北來入王相帳中獲焉公曰兔隂類性狡一舉而得吾事其有解矣二十八日己丑飯新桓州未刻扈從鑾駕入開平府蓋聖上龍飛之地嵗丙辰始建都城龍岡蟠其隂灤江經其陽四山拱衞佳氣蔥鬱都東北不十里有大松林異鳥羣集曰察必鶻者蓋産於此山有木水有魚鹽貨狼籍畜牧蕃息大供居民食用然水泉淺大氷負土夏冷而冬冽東北方極髙寒處也按方輿志蓋東漢烏桓地也距新桓州四十有五里二十九日庚寅風霾四塞日三文許方解三十日辛夘立夏風色尤慘澹無光夏四月癸巳壬辰朔日氣極清明有輝二日癸巳隂慘盡日三日甲午極晴和四日乙未頗覺暑氣是日向已惲從徵君竇許李洎九道宣撫候雲叟公疾于私第茶畢而退秋澗集卷八十欽定四庫全書秋澗集卷八十一元王惲撰
