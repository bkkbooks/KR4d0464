front:
  text: 玉堂嘉話卷之八甲午九月朢日東原五六友人㑹於孫侯小軒話及前朝得失之漸座客問云金有中原百有餘年将來國史如何爾或曰自唐以降五代相承宋受周禪雖靖康間二帝蒙塵縁江湖以南趙氏不絶金於宋史中亦猶劉石苻姚一載記爾衆頗惑焉僕曰正閏之論愚雖不敏試以本末言之夫耶律氏自唐以來世為名族延及唐末朱温篡唐四方幅裂遼太祖安巴堅乘時而起服髙麗諸國并燕雲以北數千里改元神冊與朱梁同年即位元年丁夘在位十九年遼太祖嗣位諱徳光太祖第三子改元天顯元年丙戌與唐明宗同年即位十一年河東節度使石敬瑭為清泰來伐遣使求救于遼奉表稱臣仍以父禮事之遼太宗赴援以滅後唐石氏號晉晉以燕雲十六州獻於遼太宗歲貢帛三十萬疋天福七年晉髙祖殂出帝嗣位大臣議奉表稱臣告哀于遼景延廣請致書稱孫而不稱臣與遼抗衡太宗舉兵南下㑹同九年入汴以出帝為負義侯置于黄龍府石晉遂滅大同元年太宗北還仍以蕭翰留守河南劉知逺在河東乘間而發由太原入汴自尊為帝及乎宋受周禪有中原一百六十餘年遼為北朝世數如之雖遼之封域褊于宋校其兵力而澶淵之戰宋幾不守因而割地連和嵗貢銀絹二十萬兩疋約為兄弟仍以世序昭穆降及晚年遼為翁宋為孫至天祚金朝太祖舉兵西來平遼克宋奄有中原三分之二子孫帝王坐受四方朝貢百有餘年今以劉石等比之子故不可不辨夫劉淵石勒皆晉之臣庶叛亂國家以臣伐君縱能盜據一隅僭至姚泓終為晉将劉裕所擄斬於建康市返本還元兹作載記理當然也夫完顔氏世為君長保有肅慎至武元時而天下南北敵國素非君臣若依席上所言金為載記未審遼史復如何况方遼太祖神冊之際宋太祖未生遼祖比宋前期五十餘年已即帝位固難降就五十年之後也於宋史為載記其世數相懸名分顛倒㫁無此法既遼之世紀宋不可兼其金有中原更難别議以公論處之據五代相因除荘宗入汴復讐伐罪理勢可觀朱梁篡逆甚於莽新石晉因遼有國終為遼所虜劉漢自立父子四年郭周廢湘隂公而立以五代之君通作南史内朱梁名分猶恐未應遼自唐末保有北方又非簒奪復承晉統加之世數名位逺兼五季與前宋相次而終為北史宋太祖受周禪平江南収西川白溝迆南悉臣大宋傳至靖康當為宋史金太祖破遼克宋帝有中原百有餘年當為北史自建炎之後中國非宋所有宜為南宋史或曰歐陽宋之名臣也定立五代不云南史當時想曾熟議如何今日復有此論僕曰歐陽公作史之時遼方全盛豈不知梁晉漢周授受之由故列五代者欲膺周禪以尊本朝勢使而然至於作十國世家獨稱周漢之事可謂難矣請事斯語厥有㫖哉愚讀李屏山詠史詩詠五代郭周云不負先君持節死舉朝惟有一韓通愚嘗驚哀此詩命意宋自建隆以來名臣諸大夫議論篇章不為不多未嘗有此語非不能道也盖禘之説也故列五代者良可知隋季文中子作元經至晉宋以後正統在中原而後大唐南北一統後至五代天下擾擾無由再議降及今日時移事改商確前人隠約之迹當從公議論者又曰金有中原雖百餘年宋自建隆於今幾三百年况乎今年春正月攻䧟蔡城宋有復讐之迹固可兼金愚曰元魏齊梁世數已逺恐諸公不以為然請以五代周漢之事方之漢隠帝乾祐三年遇弑太后詔立帝弟武寧軍節度使嗣位名贇河東節度使劉旻之子後雖廢為湘隂公旻尋亦即皇帝位於晉陽終旻之世猶稱乾祐四帝二十九年至宋太祖興國四年歸宋依今日所論旻係劉髙祖母弟在位四年其子承鈞嗣位改元天㑹五年郭周已絶郭周三主九年東漢四主二十九年東漢四主逺兼郭周郭亦不當稱周固當為閏宋太祖不曰受周禪傳至太宗方承東漢之後歐陽不合作五代史合作四代史司馬光通鑑當列東漢為世紀歐陽不合作十國世家嗚呼國家正閏固有定體不圖今日輕易褒貶在周則為正在金則為閏天下公論果如是乎况蔡城一事盖天朝征伐之功是時宋之邊将専權率意自撤藩籬快斯須之忿昧唇齒之理自謂愛已而惡他延引强兵深入遵行覆轍徽宗跨海助金破遼之事媒孽後禍取笑萬世何復讐之有也宋自靖康以來稱臣姪走玉帛嵗時朝貢幾於百年豈其今日私論遽稱尊大果使宋廟有靈必可其議也泰和間南宋寒盟起無名之師侵漢唐鄧宿泗章宗分遣應兵其淮漢川蜀之間大為所破宋遣臣方信孺等卑辭告和請叔為伯進増嵗幣獻權臣之首韓􅇑胄侯師旦也繪其容漆其首函送幽都至於闕下信孺有古調一篇猶能草畧記之大朝君相仁且慈小麥未熟休王師姦臣豈足贖民命既往不咎來可追此詩書於上源驛壁間館伴使入朝題奏上頗哀憐是時中原連年蝗旱五榖不登山東猶甚章廟自責之心深重形於歌詠者頗多每以偃兵為念故詔百官議曰朕聞海陵有言我國家雖受四方朝貢宋猶假息江左亦天下兩家邪故有親征之行去嵗宋人兵起無名摇蕩我邊鄙今已敗衂哀懇告和朕思海陵之言宜如何爾時臣下本希上意故進言曰先于靖康間宋祚已衰其游魂餘魄今雖據江左正猶昭烈之在蜀不能紹漢之遺統大可見也和議乃定今日校之此語乃當時繼好息民之大畧非後世正統之定論或曰何以知之曰夫昭烈之于漢雖云中山靖王之後其族屬疏逺不能紀録世數名位南宋髙宗乃徽宗之子欽宗之弟嵗月不易以即位奄有江南似與昭烈頗異若以金史專依泰和朝議特承宋統或從今日所論包為載紀二論俱非至公座客又云遼之有國僻居燕雲法度不一似難以元魏北齊為比僕再拜而言曰以此責之膚淺尤甚若以居中土者為正則劉石慕容苻姚赫連所得之土皆五帝三王之舊者也若以有道者為正苻秦之量雄材英畧信任不疑朱梁行事篡奪内亂不得其死二者方之統孰得焉夫授受相承之理難以此責况乎泰和初朝廷先有此論故選官置院創修遼史刻期榜状元張檝預焉後因南宋獻馘告和臣下奏言靖康間宋祚已絶當承宋統上乃罷修遼史縁此中州士大夫間不知遼金之興本末各異者向使泰和間若是遼史早得修成天下自有定論何待余言座客愕然曰數百年隠顯之由何其悉也問一得三實出望外幸卒言之僕因就毫楮録狂斐以俟憙事者刪之庶備他日史官之採摭云爾燕山修端謹記鹿菴云古詩句多平字不能得健如杜詩古調一句七字有至六字無平者律則當如樂律和應否則不成音矣
