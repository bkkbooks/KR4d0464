body:
  text: 右迎神淡林扄兮山煙乗囘風兮雲軿神欲旋兮何邁奄上征兮朝元衆紛舞兮羅拜欲神留兮無言望極浦兮渺渺愁予目兮娟娟神篤我祐兮歳有季右送神解州聞喜縣重修廟學碑銘堯舜用道以治天下孔子任道以垂萬世其所以明倫建極論政造士邇悦逺懐者不外夫術有序國有學而己後之君人者思欲化隆唐虞坐収牖易之道舍夫子之教將安法歟我國家尊師重道明徳新民風動海寓爰自京師達於郡邑鄉遂率建教官勉士以徳趨民於學其比隆郅治之意固云極矣而承宣鼓舞實守令之責是則道生之本教始之基其可後乎聞喜在秦曰左邑桐鄉迨漢元鼎間始易今名其為縣浸董澤奠嗚條雄盤逺帶風土夷沃通晉走蒲古為咽會名卿碩徳代不乏人顧山川之氣鍾靈萃秀必自人文徳化薰陶涵浸者爾縣廟學舊矣枕城之艮隅地勢穹窿如神龜負圖背露淵水蒼官薈蔚環列庭戺秋煙方色望之儼然皆數百年物也按廟碑由宋迄今宰是邑者增崇非一故制度宏麗甲於諸縣遷革以來神棲碑屋幸脱煨燼然歳年綿邈人跡罕至浸淫于壤藂草棘而宅狐狸盖有年于兹至元已已從仕郎張君來尹是縣首以營治為任旣而監縣事托迪簿司天禄佐史劉瑞爭出廪料資所費而濟厥媺如榱棟桷櫨之傾腐者瓴甋階陛之缺裂者舉易而新之復起講肄之堂齊廬之位至于神門庖庫畦圃游息之所莫不畢備用十年春二月釋菜禮告成厥功百年偉觀頓還於舊粤明年春史劉瑞介汾西前尹王延年持温國文正公學記踵門而請曰不腆蔽邑猥致力于鄉校功甫僝而尹適去烏可俾上官之善藐焉無聞於後以職以分瑞也實任其責擬掲諸麗石以告來哲不肖素陋於文以懇請堅切辭不能己敢勉為書之又竊喜幸得列名於司馬公之下風固所願也尹晉州臨汾人諱仲祥資明良果於從政故其為善卓卓有成也如是較夫從事於簿書期會之末者不曰有志於本知教之所基者歟誠可歌也己其辭曰維漢聞喜古桐鄉東浸董澤南條岡千年喬木秋烟蒼廟宫盤盤枕艮方平時絃誦溢兩庠代不乏賢古明良如儉顯魏度相唐風雲感會龍虎驤至今徳業何昭彰神居雖存地土荒蒿萊没人狐兔藏風雨穿漏摧棟梁張君下車心慨傷首以營治如弗遑同寮見義為贊襄咨嗟吾道百孔瘡頓還舊觀蔚有光齊廬有室講有堂我南走蒲過此邦親覩盛事思徬徨吾儒有例善則揚作詩豈惟示不忘士民向化此本張嗚呼廟碑古甘棠衛州胙城縣靈虚觀碑胙之為邑久矣昔周以黄帝後姞姓封此是為燕國至秦廢燕為胙貞祐初金駕南遷竟河為界建帥府宿重兵繫浮梁扼為汴京北門歳壬辰金人撤守天兵徇取之明年京城大饑人相食出逃死北渡者日不下千數旣抵河津人利其財賄率不時濟莩死風雪間及己濟而沉溺者亦無慮千百數時全真教大行所在翕然從風雖虎苛狼戾性於嗜殺之徒率授法號名㑹首者皆是也師時在衛目其事愀然嘆曰人發殺機一至於此邪吾拏舟而來正為此耳兹焉不化安徃而施其道哉遂稅駕河上起觀距城之北墉曰将以此道塲為設教張本之自於是仁風一扇比屋囘心貪殘狠戻化而柔良津人跋俗悔禍徼福於門者肩相摩而踵相接矣凶焰燎原樸殺心於已熾慈航登岸夷天險為坦途由是而觀非好生大徳洽於人心者其能若是哉師一日晨起集大衆謂曰吾學道有年所得而為心印者一與虚而己昔之得一者天以之而清地以之而寧神以之而靈又云致虚極守靜篤萬物並作吾以觀其復惟其虚則能靈靈則自虚矣且天地虚而成亭毒之妙日月虚而盪照臨之光山岳虚而蒸雲雷之變谷神虚而通天地之根致虚而要其極不過煉精守寂滌除𤣥覽耳故得心善淵居善地因題其額曰靈虚二三子其敬奉吾教且曰大徳不徳今業漿之家十饋其八九吾不可久於此明日遂行自是風聲教習大被於河朔矣師諱仲美秦元月山人年三十弃妻子入道師浮山碧虚子遂盡得真傳深入性窟故為大宗主推徳分掌𤣥教於終南祖庭者逾三紀焉生平以濟物為本事具重陽宫碑兹不復云歳丙午詔大醮京師預焉旣受釐特加師𤣥㣲真人號且即膺寳冠霞帔之寵世以酒李先生稱云甲寅夏六月羽化於燕之長春宫及西歸門人啓柩顔色如生冬十有一月扶䕶至衛門徒王志安等以衰絰成禮醮祭之夕朔風震屋將濟河即止吁亦異哉後十有二年志安等圖為不朽用光昭師徳遂以禮幣來謁曰先師教之所及師之所在也然過化存神興修道宇之自無文以詔來者責其誰歸吾子屬列太史鄉枌盛事幸為我論道之敢再拜以請僕儒家者流道不同不相為謀獨嘉其尊師重教推原知本其篤信有如此者故略為序説云全真為教始以修身絶俗逺引高蹈㝠滅山林如標枝野鹿漢然不與世接此其木也終之混迹人間蟬蜕泥滓以兼愛濟物為日用之妙其混沌氏之風邪不然天命之性有物有則彛倫一叙終不得而蔽之邪如長春丘公在先朝時皇帝清問首以治國保民為本其利亦云博矣今觀𤣥㣲李公處身行已若易地則皆然爾於是乎書且為門人作詩追逺仙遊以極遐想之意渺渺帝鄉乗白雲而何在依依𤣥鶴抱黄石以空悲其辭曰道之大原出於天柱史首探𤣥中𤣥後人依假土苴傳刺口論説書百千祈禳服食金鼎鉛耬居紫青致蓬仙全真獨抉龜王筌只以方寸為福田七子大鑿疏河源龍章鳯質炳後先風聲波動東海堧李公躍出秦月山天禀至性虚静專一物不獲乃我愆黄流洶洶飜鯨鱣貪噬一世垂飢涎汴人脱死乗膠船葬之爾腹誠何寃先生有道光日躔手覆醉袖敗履穿鱷牙笑拔鬚為編濁波吹破為澄淵遺黎北渡賴以全功成不居世愈賢超出物表㝠鴻翩千年喬木鬰紫煙以靈掲宫含至言頭頭具道道眼圓伐柯睨村開蒙顓門人奉行周且旋如入鄭圃居漆園至今遺照無徼邊皎焉靈臺霜月懸黄鶴一去不復還終南太華空巍然山中瑶草春芊芊何時真遊來羽軒赤霄望入崑崙顛我詩刻石不可諼用作華表歸來篇總管陳公去思碑銘至元三年朝廷以衛之六城為先大王分邑許就設監郡敞府治跨有􅅠邶復為河朔一路是年夏四月河南尹陳公承命分符來莅此邦先是衛併于懐前守之良法美政班班具在然連率逺控者盳洋而未之悉子弟資授者侵欲而無所顧不朞年法防狃弛羣小氣横民遂殿屎公知其然思有以拊循振濯扶剔姦蠧一新厥民旣視事乃緩其急張不為小惠持以大體從宜處約率以身先之及前規當法者仍遵而勿失於是案簿棼者井之而有綱公吏讟者肅之而趨事教條旣周小大得職時自春及夏暵不雨秋種未覆公曰龍見而雩其可後乎乃齊居禱蒼山祠下車甫還甘澍需作闔境沾足秋乃大熟旣而監郡公聿來視師為人詳靖明惠樂於為善一見公歡然如平生其承宣注措云為之意吻與公合此倡彼和如響之應聲及其倅王君文斡簡重諧讓以之贊副㑹歸政成化洽而已用是徳風草偃翕然稱治初共之西營幕習不法侵漁無時民苦之公以理將命遂折其須牙來就約束又以毒民莫盜賊若乃下令屬邑曰今而後若輩一汚記籍者以類别如農者畎畆商者市歸俾督之營務以恒厥心時視其勤惰懲勸之果終其任悉悛革不二為致狴犴屢空時熙春撤木萬計當輦輸以東陸輦之勞汴衛兩集其事公曰汴大衛小役與之埒民將不堪力請於上竟以汴輸之河漘且遣軍士三百整桴而下我止壅遏水勢而已無幾治甲令下頗急官易牛革鄰道例配科民間以辦農至解耕牛以屠猶有不堪其輸者公曰不可遂一易於市旣而衆相率相謝曰脱東鄰之禍者繄明府是賴於是田里盡樂安之農暮夜有不扄之户矣殷太師比干墓在部内祭秋乆替公請於朝遂載諸祀典時秋陽再驕繹享之夕大雨越明年二麥倍常噫亦異哉及再朞政平訟理民安吏法一日謂監郡公曰夫政以風俗為先俗以教化為本今國家文治蝟興百廢具舉牧養元元日就富庶教所未至實我之責矧衞古稱多士今者春秋釋菜享獻無所上無以副朝廷右文之意下何以啓吾民向善之心遂大起孔子廟内外具瞻克壯於昔諸生執經咸得依仰旣落成有芝産殿梁連莖秀發童童如葢僉謂邦君誠敬所致由是而觀其於事神治人亦以至矣公尤辦於先事有方臨機應變用儒飾吏聽訟以情理明氣温推見至隱卒齊之以禮不知缿筩桁楊為何物故寃者抑者每有所伸强者暴者日安馴服至相戒曰陳公明良不容奸欺吾不可以過聞由是人興禮讓風化大行蔚然為諸道帥朝廷嘉其能擢充山東東西道提刑按察使旣趣裝吏民祖道填郛溢郭炷香而頂構綵而門徒竊垂洟興感用伸願借之心至有攀轅遮道不忍使去者旣乃衛民懐思不忘求文於余予以鄉國盛事敢勉為論譔之愚竊觀西漢之名臣如黄潁川劉東海之為郡而能績用章章者皆由明允篤誠遂懿厥徳故所居民愛所去見思况公自明而誠勤强練宻以道自信所謂推忠及物衆瘼自蠲懐我風愛永戴遺賢者也且為吏民作詩庶幾紹甘棠之遺音以永衞人無窮之思公諱祐字慶甫世為趙之寧晉人其詩曰維古作牧紛治稱兩漢具載循與能趙張固猛徳不勝捄時沸炎多創懲漢家三尺世有程下昧所守徇厥情一得千失例不經陳公為邦大厥稱三年撫字猶鮮烹頑則伊教孰汝刑執中以權適重輕吏畏民愛政迺平會歸其極誠與明吁嗟七月政報成戴其清靜民敉寧里門夜啓深春耕雨暘時若歳屢登何以教之庠序興春風絃歌衛六城槐隂幄帳掩訟㕔圜扉無人秋草生高軒北來障緹屏翩翩振鷺朝天庭郡民祖悵繽斾旌昔何來暮今遽更漢民借冦惠我氓我則不獲心乃㷀使君雖逺徳日馨彼風僾兮我佩銘願公壽福川方增坐之廟朝調鼎羮流惠載使邑里清我詩刻石亮有徵千載擬嫓甘棠聲平陽府創建靈應真君廟碑𤣥黄判天地闢鼇足斷四極立而隂陽五行之精上為經星恒宿環拱經緯幹化機而成歳功真武盖北極之鎮宿也端處𤣥宫赫睨四部在昔王者圖形旟旐以肅擁衛之儀道家取制爰設神像蓬勃其赫靈焉若夫振緑髪提干將履𤣥㝠綰元氣也被𤣥衣衷屬甲戴雲旂耀武徳也靈虺穹龜踴躍前導取形似而從隂類也復役丁甲六神撝指隂兵備將佐也廟而貌之于以填方域祓不祥而來福祐故在在奉祀以謂天神之尊極者焉我國家運開龍朔帝發其祥京都之建神特顯化焉遂先啓應宫用彰靈貺矧齊民敢後其寅奉哉冀都真君壇其來久矣先時府莊岳間有閣巍然山峙設四聖像於其上神奠其北户焉兩廂豪右貿易綵幣市集宇下春秋奉香火甚恪里俗踵祠用為故事厥後傑觀雖火禋嚴之禮藏於人心者耿耿固在歳丁亥故老董威霍斌等顧相諗曰吾儕事神之心旣不以閣之興替為有無然俾神明棲格無所謂揭䖍妥靈可乎於是與趙常柴邢凡七族共輸私財得地於平陽里起正殿神門社賔之位庖湢之所凡十有三楹莫不攸當神儀法從光怪絢爛飈馳雲擁陟降自空内外具瞻光動里陌後十年丙子里社程政等以前人興建本末不可使無聞於後且恐歳月綿逺祀典湮㣲乃介㕘軍陀滿君用來謁文於予將揭諸麗石以告來者且知廟之所自予官晉四載間稔其風聲氣習思深而好禮尚儉而隆義奄焉有陶唐遺化故幽明兩間各盡所事若東里之曹相國西郛之霍博陸南遂之帝堯祠是皆敬其人神有徳於民也是祠之建前倡後繼不憚服賈之勤歴年之久臻其成就若爾可謂富而好禮敬共神明罔墜休聲者哉至于施與厚薄之差時饗周行之次具列石背又見隆義向化所悦者衆云仍繫樂歌用伸幽贊其辭曰列象蒼蒼周天緯經𤣥枵之次虛危之精羽林北落廪焉神兵奠我邦家衛羣生兮奕奕新宫士民之功逺彼囂閧極夫尊崇神庭肅敞景氣葱蘢風馬雲車歳時來同兮神維來降冷飈先颺應鼓田田悲簫洞湯紛進拜祼秬鬯將將洋洋如在上有物蜿蜒來肸蠁芳芬滿堂神人暢兮神鑒孔明我民之誠旍麾下拂風雨攸寧攘除祅災大來庶禎介我繁祉時和歳登踵祠罔替繼繼承承永垂其休聲兮重修孤竹二賢廟碑首陽山孤竹二賢祠肇建於李唐增隆於前宋金貞祐末為戍兵撤而􅀢之國初郡人徐帥因廢基而屋焉後四十載當至元九年𤣥黙歳某自御史裏行來官河東以是年冬十有一月按部至於蒲坂適致祭令下遂齋沐奉祝祗拜墟墓庭序藂繄路寢傾圮遺像黯昧陊剥就滅於戲前政之不舉至於斯邪非惟不稱明詔尊顯風烈之義而大懼不職下隕教條吏隳不恭惡可徇狃於是祗會屬吏作新是圖資聚旣營衆工趨事仍命府掾長吳舉董治厥役改新肖像以儼神儀迨明年夏五月復行縣次蒲吏告訖功用六月丁亥躬率僚屬以少牢之奠敬妥神棲帶河表華新宫敞然山烟庭木奕奕動色守吏不任之責庶乎其少塞矣知府楊君寛請書其事于石以詔來者噫二賢聖之清者也其出處大節求仁本心興懦厲貪之操息邪懼亂之功孔孟稱之詳矣揭若日月亘終古而不熄小子其敢儗諸然讀黄太史所述去國諌伐盖宗國有不説好事者為之説耳竊有所疑焉若曰非讓而逃國人惡而逐之烏在其為賢也且以避紂不有其位孔子何為稱求仁得仁子貢何以審夫子不為衛君乎至於義抗白旄耻食周粟亦謂事不經見臧哀伯何獨稱武王克商義士猶或非之不然二賢者北自海濵聞善養來歸當周命維新明義崇徳之世不知俯仰何所愧怍僵踣於兹山之下乎故特表而出之必有能辨之者仍為蒲人作迎享神辭俾歳時歌以祀焉瓊蘼潔兮蘭馨錯嶶蔬兮薦神庭條之山兮河之水迴風蕭蕭兮波瀰瀰神之逺遊兮邇何歸南叫虞舜兮帝禹與追以暴易暴兮吾知其非國極所欽兮祀典載熙槃非周粒兮桂酒芬菲民之戴神兮清風庶幾偃迴斾兮入室陳鐘鼓兮載考載擊千秋兮萬歳於焉兮永息故普濟大師劉公道行碑銘有序晉州景行里有觀曰𤣥應其徒謝志堅梁志端介寓館主謝純踵門來謁而告予曰先師純熙子化形已久今雖像而事之其平昔道術及於人者班班可紀然非文之貞珉無以示來者而傳不朽明府嘗列官太史六家之㫖所宜論述也敢百拜以請謹按所持狀師諱志貞字子常族劉氏陜之三堂人㓜沉潛不好弄及長趣尚沖曠嗜黄老書遂棄家入道旣而尋師來晉止舄𤣥都宫與方士韓仙翁遇傳寳珠照法覺靈府戃怳日有啓悟歳己亥披雲宋公首暢宗風力紹絶學起道藏書於河汾間師幡然喜曰此人天師也吾皈依有所即執弟子禮事之受紫虚籙訣香火修持晨夜不少懈宋偉其志後以上清三洞五雷籙法畀焉師操履益精勵神經怪牒大賾㝠奥氣志旣凝洞知來物簪裾所加法力所至疾痛呻吟隨失所在中外喧播以靈異稱今聖上邸潛時聞其名遣使召至試以籙法三驗諸事逺邇幽深靈應昭著時旣雨且風勢幾恒若命師以誠祈止少頃豐霳囘御蜚亷為不颺矣上異之賜御醪仙氅加號普濟大師特光寵焉留館堂下以需時召自是道價隆隆風動一時矣中統庚申冬詔就長春宫設羅天清醮師攝行大禮凡七旦夜神人和暢且有天光現朗之異上聞之喜甚咸謂師精誠所致明年秋奉㫖馳乗祝香岳瀆事已還過故隱語志堅曰吾雅性僻逸恬於世味偶以兼術供奉闕庭恩遇優渥已渝素分物㣲近盛吾道家所忌遂謝使者而輟裝焉後復來徵竟辭疾不起以至元某年夏五月終所居丈室夀六十有六師丰儀秀整面如滿月紫髯垂脰翛然有獨立出塵之趣接物不以貴賤易其禮度人之有疾若已受之推誠齊物惟恐不力時人以此多之予嘗以道家者流以清寂為宗一死生外形骸自放於萬物之表是不以一毫世故攖拂其心至於挾方術出秘藝捄時行道者世有其人如砭劑膏肓笞逐鬼物驅役社翁安人區而逺不祥徃徃驗於事者盖世所不廢也普濟師其斯人之徒與較夫遺世絶俗歸潔一身自放於萬物之表誠法教中有禆於世者耳且以費長房訓子事猶傳於東京方伎之列者師之行業出處又足嘉尚吾烏得而辭哉乃繫之銘詩庶幾門人歸來望思之意其辭曰大河湯湯南紀蒼蒼兩戒勢分爰自陜疆蓄潤蟠精萃於三堂篤生異人孕氣之良截然入道濟物為方山立髯張劒佩煒煌霆轟暗室星壇夜光玉鈴金紐呵斥不祥隱若勍敵隂魔遁降四十年間𤣥門之綱鶴馭仙去白雲帝鄉何謝世兮已逺顧其道而彌光嗚呼劉根術驗而不及物長房及物而鬼所殃我銘勒石孰為短長庶千年而語華表見門人之涕滂秋澗集卷五十三欽定四庫全書秋澗集卷
