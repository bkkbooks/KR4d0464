front:
  text: 旄纛儀衛之數金碧絢爛森布左右莫不畢備遊人過客載瞻載儀溪山草木亦為動色凡費枲幣僅萬疋旣落成某人等以禮幣求文於予將以幽贊神明紀夫廟貌興衰之自謹按汾隂后土祠乃魏鄈丘之制其典秩華縟肇於漢武元鼎行幸之初千載而下令人歌秋風之辭咏汾隂之曲想夫泛樓船濟汾河千乗萬騎威靈震赫囘旌駐蹕躬祀㫿上祈榖報功於是乎在故歴代因仍以為聲明盛事曠古當然之典是則崇奉者國家之事非鄉民所得擬也以理究之祀睢者即有國之大社而社者自天子至於鄉遂皆得置而通祀第禮文制節有隆殺之異爾况土為神廣大博厚無窮所徃而不在又汾隂在晉為屬邑以兹為離宫異館神游美報之所其誰曰不然嗚呼三代已降教化衰而禮樂廢禮樂廢而祀典亡林林總總之民物則旣􅆷心惑所向有射利徼福而己故祀非其類僥倖于萬一者胡可勝數哉今冀方之民獨能敦本返始奉所當祀俾歴世相承之俗敬共誠潔永永是尊以答高厚無疆之休較夫淫祀野祭者可謂知所向矣乃為作送迎神辭春祈秋報歌以祀云其辭曰汾流兮容與林葩兮繡組彼汾兮一曲坎坎兮擊鼓薦瓊芳奠桂醑俟神來欣樂胥芳菲菲兮滿堂偃金枝兮翠羽報神徳兮徳何溥
