  text: 三十八
  hash: sha256:8d829c653d8fec9cfff372f4a5750fe567e2faa610cd722d45ee652c1bd77ee4
body:
  text: 元王惲撰記河内修武縣重修廟學記覃懐風土距太行之陽川夷氣淑山水秀麗逺而舒發于甯者為多故人傑地靈自昔無荒寒僻野之陋至元壬午冬前州将劉暉與予同在京師間相㑹肆談懐衛間勝槩娓娓忘倦因及縣之廟學與夫本末告予曰廟自宋厯金雖制量邑作當時徙建甚備罹壬辰雲擾爼豆不遑賴先帥家府為主張是故當葺者隨葺堅完者俾勿壞乃以有道王君文玉陳復趙宜中輩前後頋筦得巋然獨存于兵燼之餘力也非幸也至元癸酉不肖自鄭秩滿來歸故殿廡像肖歳月浸乆風雨侵剥黓昧傾藉無復於舊荷薪之責懼不克舉遂倡帥官庶日以修治崇飾為事御史柏徳孝思又從而賛焉經調官蒲楊去三明府十年間皆次第而作新之遂延致學師日誘諸生講肄在其中復請有司得灑掃十餘人春秋具獻鐘鼓鏗鏘禮容升降盖肅如也僕之素願雖畢而明徳新民之效尚未敢議也余曰不然郡縣之政似有緩而急者學校是也學校者三代之所以明人倫也人倫明于上則小民親于下其所以關係風化不的然而彰歟若夫山川英粹之氣氲氤開闔毓竒孕秀曽無今昔醇醨之間至于涵養薄俗作成善類實庠序為之基本而後之来者復能尊崇勉勵以極菁莪樂育之美異時人材輩出如近代進士張夢弼郭黻張衮祈文秉趙尚賓文彩風流照暎一時誠不難矣劉侯曰有味哉子之言也請筆之歸而刻之麗石庶幾有讀斯文而興者焉二十年嵗在癸未二月十八日謹記蘭亭石刻記蘇門盧君茂之得玉色碑石中斷塈酒壚間偶見眎之乃禊飲序也即懇求得之予自穉年留心翰墨閱是本無慮十數此帖極清勁有神而不厖雜與定武石本畧同其背有勅書字塗以黄金光彩尚煥下復刻祁公字二豈裕陵賜宰相衍家物也嘗謂二王墨妙雖片言隻字如寸珠尺璧見者皆當寶惜不可使混泥沙今一旦為吾所遇免夫淋洿齧蝕委棄劘滅之厄果神物護持時有授受然耶異時歸来當臨溪起亭位置壁間扳長史齋新例榜其亭曰右軍且詫鄉賢曰此乃我王氏真行之祖也庶㡬有摳衣而請益者其于奎璧兩間不無煌煌者焉但未知在㡬年後耳又諺云室無滯貨不為潤屋矧吾儕以多文為富乎然物之堅者莫金石若也兹刻也豈敢保其必夀抑不敢矜其長為已有特記焉以付子孺庶王氏来者能弓而箕之是所謂薪有盡而火無窮之傳也二十年嵗在癸未夏五月十七日謹記御史箴後記此帖閑閑公為師中丞仲安所書亂餘李侯輔之掇于西臺著間後為義士張伯寜所有至元戊寅因獲觀于張隣野家孝純愛玩不已命子逺摹臨略不失筆意壬午秋予至京師鄰野子来謁遂及曩之所摹明日持以見贈墜逸之餘僅得百一十八字公之書世固不少論夫擘窠大書雄勁瓌竒體兼顔蘇而自成一家者此平生􅆟得意書也余性僻而好古于書學嗜而不厭故所欲見者每每如意豈歐陽子謂物聚于好然耶抑亦有契分故耶二十年癸未夏五月雨中與子孺裝潢歸藏春露堂以為書林寶鎮且懌同志願見之心中議大夫治書侍御史汲郡王惲謹記祥露記先母夫人平昔顧惲讀書作言辭喜見於色曰好此吾殁且無憾若汝長仍能辦日飯一盂啖我過于鼎餗榮矣亡後十有四祀方得廪食于官而菽水自供之養曽不少及第新婦推代中饋勞者僅六年風樹之慼其何有涯故毎讀文正范公饗若􅈠之歎未嘗不撫卷流涕也甫十年不幸先君亦捐館以治命建新阡于河西鄉用明年百五日奉遷二親藳殯于沁曲𤣥堂纔開有二黄蝶飛出其先妣柩盖珠露凝綴晶明煥爛駢羅角結殆寶幢纓絡蒙覆其上且聞清香襲人觀者異焉天日照臨移刻乃晞嗚呼夫人自己酉秋棄養至是三十祀矣在窀穸間祥見如此恐非偶然也昔人有夢持炬下入祖禰壙中識者謂光照先世之兆兹夢也或有異不異焉夫野蔭之氣化為真露露膏澤也復聨綴而成文華意者先妣之徳有幽光而未發耶不然将澤及子孫有以文而興起者耶開之先慶固當有在惲固不得而知也至元廿一年嵗在甲申正月二十有八日中議大夫山東東西道提刑按察副使男惲百拜泣血追記均幹堂記財賦者生民之命國家之大本也善理者古今無㡬焉盖鹽鐵事興漢庭諸儒紛紜辨論竟莫能一其艱在于不傷財而不害民故也濟南漕長趙侯洎其貳儲君天章過余求扁其公堂之顔遂題曰均幹盖取孟堅志書之辭也均者使四民常均公有餘而私不乏幹者所以齊衆度而抑兼并也二者為義如此何古人憂後世之心深且重哉顧諟新政意若在兹第不自著者形與跡耳葢嘗思之其所以經制于一堂之上者不過以廉自澡以靜内守而以法外御也故務雖繁而愈辦羨比常而益増此自然理也異時總㑹民賦鼓鬻山海低昂物貨之權佐理軍國之用從容朝珂籌之以䇿未必不由主靜而法以均幹為得計而以籠絡為末䇿也未知以為何如二公唯而退于是乎書以為記游華不注記濟南山水可游觀者甚富而華峰濼源為之冠余到官八月湖光山色朝夕與對于庭戸几席間若無所覩心有所不在焉然每以厯居卑溼為念或有云堰頭者乃自昔潨引諸泉入大清之峻口也一鍤之力不崇朝可徹而陸之常欲一往而未遑也冷竈節得暇且寛憲使耶律君游邀余暨簽書杜君為兹小遊且尋堰頭之盟諾焉逮十有一日遂自厯下亭登舟亂大明湖經㑹波樓下出水門入廢齊漕渠所謂小清河者是也汎灧東行約里餘運肘而北水漸瀰漫北濟黄臺東連疊徑悉為稻畦蓮蕩水村漁舍間錯烟際真畫幀也于是緑萍蕩漿白鳥前導北望長吟華之風烟勝賞盡在吾目中矣是日也天朗氣淑清風徐来水平不波鳴絲歌板響動林谷舉酒相屬開口而噱少頃扶掖登岸相與步入葉陽道觀主人方布几延賓僕以疾作遽還二君為愀然也至于罔獲陟連雲絶頂追謫仙之逸駕呌蒼梧之暮雲富覽江山以盡㳺觀之美特閒適餘事初不訝其從違正恐山靈獨回俗駕造物者有所靳耳既歸伏卧舟中怦怦焉如宿醒在懐殊伊鬱也但聞兩舷間風水之聲自宫自商拍拍盈耳殆魏獻子之歌鐘石鐘山之水樂也且念華峰之勝樂在近郊因以步里計之自厯亭北至華陽院下廿里而逺遊水門抵黄臺北渚十八里而近以葦汀漁箔周折灣溆從城東北阿至艤舟山家盖且十曲矣時至元甲申清明前一日也謹記春露堂記王氏居安仁西里有宅一區湫隘近市或者謂宜易此而就爽塏余應之曰遺簪之求聖人有取焉况先人之敝廬乎然嵗深屋老枝撐欹側有不堪託處者於是謀為新室不侈不陋于以藏遺書閟宗器節序致嚴設裳衣而安寢祭且將奠吾居明嚮晦入偃息之所已酉春既落成遂榜其顔曰春露盖取霜露既降感時思親之義也嗚呼思乎我將從其重乎思其重念吾親之志也敬其止慮夫不克析薪之荷也昔吾先君思淵子握瑜懐瑾經世之志甚逺恬澹無所營専事于學務為無所不闚要歸適用有為而已嘗曰吾年未老持此而明吾道行吾志于天下庶乎開物成務大有見于世不然吾遯則無怍無悶矣悲夫曽不少施而卒賫志以殁至為有為者所惜此不肖所以仰穹罔極而抱終身之慼也盖吾親之去日愈逺不肖之受年益深去親邈則子孫有悠而無宻受年多則氣志漸怠而生不蹶追其逺所以厚来者之徳也重其思所以勉吾心之述也傳不云乎孝也者繼志述事之謂也周公善焉是則為達孝學也者學為周孔而已矣至於履霜濡露感念嵗時入室肅焉如覩乎容色之睟出戸愾然若聞其歎息之音齊則見其所為饗者悽愴怵惕爽動于中是皆時思之常君子之所同也後之嗣服者登斯堂讀斯文求予心之所泊能先其所重而不忘其所常將見堂構無盡孝思為不匱矣至元廿二年十月日記熈春閣遺制記梓人鈕氏者向余談熈春故閣形勝殊有次第既而又以界畫之言曰此閣之大槩也構高二百二十有二尺廣四十六步有竒從則如之雖四隅闕角其方數紆餘于中下斷鼇為柱者五十有二居中閣位與東西耳構九楹而中為楹者五毎楹尺二十有四焉其耳為楹者各二共長七丈有二尺上下作五檐覆壓其檐長二丈五尺所以蔽虧日月而却風雨也閣位與平座叠層為四毎層以古座通藉實為閣位者三穿明度闇而上其為梯道凡五折焉世傳閣之經始有二子掖醉翁過前将作者曰此即閣之制也取其成體故兩翼旁構俯在上層欄檻之下止一位而已其有隆有殺取其縹緲飛動上下崇卑之序此閣之形勢所以瑰偉特絶之稱也予因念汴自壬辰兵後故苑蕪沒惟熈春一閣巋然獨存昔甞與客三至其上徙倚周覽雖悵然動麥秀黍離之感且詫其嶻嶪壯麗如神營鬼構洞心駭目有不可端倪者至不藉井幹不階峻址飛翔突起于清霄而矗上又似夫鼇掀而鳯翥也予厯考秦漢以来宫殿之制漢不復于秦而唐不及于漢如未央長樂曽何得阿房之萬一含元華清又奚敢跂兩都之規制也盖天地氣衰國資民力與林林之材不取盈而尺度不足其數故也然而熈春遺構亦可為近代之傑觀彼騷人詞客雖稱述賦詠極其偉麗是猶臆説建章而徒彷像其千門萬戸而已終非梓匠不能知其規模與勝槩之所以然閣廢撤已乆及聞鈕氏之說使觚稜金爵上干雲霄而飛舞空際者盡在吾目中矣然不文之以言不足以達逺因作文以遺之鈕氏者葢世所共稱工師之良者也至元廿三年冬十月記徴夢記某官真定時夢一老人長身縞衣杖而告曰若遇而祖能識之乎憶祖妣妙清君平時語惲者熟視之為吾大父敦武府君無疑載拜已乃跪而請曰惟王氏上世嘗有顯者否先祖曰今濟南陳堯叟祠碑所刻王姓者即逺祖也切識之時至元庚辰春二月也惲以是異念之者無時後八年戊子二月韓氏子中西謁濟瀆託之為求訪果于司馬端明所撰四令祠堂記碑脇得之元符二年春二月左中散大夫知軍州事拜謁題名乃陳之外孫王恱名氏吁亦異哉題名云外孫左中散大夫知軍州事王恱奉詔詣靈祠禱雨畢恭拜堂下元符二年春二月廿九日也刻碑之右脇文即前宋王文簡公曽拜參知政事䂖舉正字伯中係堯佐之婿其子誨恱舉正坡公所謂清徳之老是也其二子名諱見東坡飛白記不肖平生凡事幾将至必警先于寤寐間如先君将殁以翠微節度傳迓召為御史人即以刀迎刺于口斷絳陽獄斛律神自牖來告待制翰林有瑶階參筆月殿芸香之詠馳奏行宫中統二年十二月為都事時事有雪漠三更雲輜萬兵之作進讀東朝夢紫閣連延龍馬飛翔之異是皆徴明而不可誣者故古人論夢有官物之至靈非但藏往固能知來凡天地古今之所有無一外乎此而有明晦逺近通塞之間此人之所以有夢夢之所以多變也然有真有象有精有想唯精誠感薄神靈之所告者乃有占而可徵是夢也求其所以似亦涉因想盖不肖毎以先世旌紀寂寥念在懐者有年今先祖昭告如是此亦理之所必至所可異而重者據其夢而得其實于二百載之前若合符節此豈只勞于想可致而論耶又知吾先世神爽雖逺而昭昭矣嗚呼既誘其衷明夫系之有自所謂闕而有待者不知復能鑒祐使遂其初心少副明靈之精應乎其或亶然是垂老之日即受生之年也是不可不識至元廿五年春二月九日記透月巖記王子塞向冬蟄不出户者兩月適寒曦回燠乗休郊㳺步過故人子額森伯之居有竒石儼侍堂背銳上而豐下百竅洞達大者為巗小者為竇聳者為岑絡者為脈復形勢之所當出者又皆人意與㑹表裏瑩潔渾然天成顧晲之如華峰半圭高挿雲表余乃百匝摩挲襟袖霑清主人因乞名于余即目之曰透月巗何居石堅凝篤實物也今玲瓏秀麗實而能虛疏風逗月回伏景氣如神劖鬼刻出竒乃爾誠百中不一見也主人喜其名佳而物稱明日過門懇文其狀予告之曰昔汝父新中府君熟其平生乆矣為人安靜遇禮而用和者也嘗買一石日與之伍呼為石友乃臨終曰吾國俗近古不封不樹然我殁當以此石表吾岡西墓田何嗜好其篤也如是因念昔陸績官鬱林裝鉅石以越海鄭璠守象江輦六石以歸秦前人稱道筆之簡冊非特見其澹僻也正以二賢操履當莅官行已之際以亷靜為心由篤實而致輝光之用者在此而不在彼也吁汝父之志固有慕于昔賢今汝能箕裘世業亦亷潔自厲復輦置竒石思繼靜觀之樂因跡以求心庶能堅其所已至而厲其所未至者焉又得一悃愊無華吏矣不然将以物為玩徒成喪志之癖非予之所敢知也於是乎書以貽之至元廿四年丁亥立春節前三日記林氏酴醿記人之愛其物也培植顧䕶之意必致其曲物既得養榮華茂盛之氣而自與人意㑹理則或然我未之察耳林氏别墅有酴醿一株自初植至今特二年于兹戊子清和節予杖而來觀花雖未而根節枝葉條達舒暢盈盈然有不勝其茂宻者清淑之氣有漬窻戸間若喜其相遇而㡬之相㑹也然所以盛者種之非常一也地之氣美二也人力所至而不失其養者三也一圃之間異卉殊富而獨致曲于兹者豈饜彼紅紫而特惜其芳之白且潔歟近以是花置之露堂西序晨起將啟戸香自隙作陣而出有襲人鼻觀之烈至于簾櫳之縈拂几席之薰染著幕而不散者數日且花之為物香與色而已若夫香之清郁色之孤潔殿春餘而獨開于夏初者其風流藴藉餘品有不得伉且儷者其為世之珍重而不厭其多者良以是歟余幽居日無事隨其隙地亦以栽種為樂城中糞壤瓦礫土之正氣悉為穢汚所易百植而不一生非獨一家比比皆是木之美者愛雖篤力雖至返得憔悴可憐之色幸生致枯之歎是知紫庭之蘭不生于枳棘之野丹崖之木不産於犖确之丘也必矣又傳曰苟得其養無物不長苟失其養無物不消是以君子惡居下流可不懼哉林君為人氣勝者也凡一事一物之作不肯碌碌落于人後必極其精粹而後已今年七十有二目明耳聰强步健啖壯嵗嘗從侍講徒單公游教其子讀書致身顯達今也謝其所必為而安其所已致者日一㳺其圃非特物之為玩將思其老而縱心憐夫生發之意而明其馨香之徳云秋澗翁喜其如是既與之欵因書以為記時二十五年立夏後十有五日也清蹕殿記維衛州府太一廣福萬夀宫伏為憲天述道仁文義武大光孝皇帝赫臨之盛易常然丈室大起行殿邇天威而貯寵光焉既落成嗣師蕭全祐以其事上聞賜名曰清蹕全祐将文諸貞石以傳不朽謂臣嘗忝屬太史于法得書乃具其本末来請臣謹按初上之在潛也思得賢俊以禆至理聞太一四代度師蕭輔道𢎞衍博大則其人也於是以安車来䀻既至上詢所以為治者師以愛民立制潤色鴻業用隆至孝者數事為對上喜甚錫之重寶辭不受曰真有道士也賜號中和仁靖真人冠帔尊崇之禮前後有加迨已未春鑾輅南駕次牧之野時師仙㳺已邈上以隠居所在特枉駕來幸周覽殿廡間奠享犬室詢慰宿昔者久之所以欽挹真風懐思不忘且從五代嗣師居夀之請也及登大寶復降璽書追寵師徳有清而能容老而不曜富文學知變通嚮朕在潛與之同處何音容乍逺冠履遽遺殊用悵然之歎居夀等以遭際聖明顯異家教其臨幸之榮又為前代希闊之遇顧惟丈室罔稱躍淵思丕御天之構者念兹在茲繼承詔住燕之齊宫致有待而未遑焉逮六代度師全祐既主法席首以繼述先志為切始克丕建實至元廿三年丙戌嵗冬十一月也桓楹松桷孔曼且碩藻棟文榱龍鸞交暎内拱宸居宸居穆穆中闢應門應門鏘鏘玉宇開于前方壺翊于後蒼官鉅竹儼侍左右其宏麗靜深宛然帝者之居望雲就日奕奕動色于以焚修頌禱仰介萬夀無疆之祉其於貯寵渥廣敬恭報恩徳而圖不朽者亦以勤矣載顧載瞻中外咸若轔轔焉如聴屬車之音肅肅焉若覩羽旄之美千古而下焜燿煒煌何啻振碧霞之孤風為郡國之盛事也臣以為自昔聖帝明王崇𤣥重道以萬乗之尊求一言之要者不過體尚𤣥黙企慕真純載其清淨躋民夀域擴充無為之化耳如軒后訪道于崆峒漢文受經于河上是也以今方之越光顯有加焉異時史臣有鋪張洪休揚厲無窮之美者因蹟以求聖皇睿意之所在其於斯宇亦将有所取焉至元廿五年戊子歳夏四月廿有五日謹記重修録事司㕔壁記治有常處則視瞻尊而政迺肅此必然理也維衛録事司自辛亥嵗州里復舊凡百草次其司事權寓于委巷間逋舍靡有定所厥後官易雷氏私居即為今署然敗屋數間而已頽垣四達汙潦旁浸夏不足以辟炎歊冬不足以禦寒凍公吏勃豀簿案委積執事聴理者安于湫隘踐居塵泥與鼃黽混殽者盖有年於兹逮上郡薛君来莅是職顧惟若爾恥狃故習且有以需焉治之明嵗衆務舉下安教條審其信而可使迺與其監額森巴哈司判趙寓起廢易故将惟新是圖上之府允焉於是作㕔事敞後閤署佐幕創架庫下至吏廡門閭戒飭之石胥靡之所莫不畢具僚友聴決夏冬為適安吏曺升降次列有攸叙中外具瞻一司為齊肅其材木之用取辦廩餘而甓石工役等費願言趨事有不期然而然者經始于丁亥之春畢工於是冬之季凡為屋十有八楹室既成薛君暨其貳屬吏湯瑀踵門来謁載拜而言曰文曜等不敏猥有營治固為瑣屑不足以見于後然恐迤乆為有力者豪據致虚勞民力官失恒處於人心大無所恔幸憲使惠言記本末於石將陷置㕔壁使觀者取重知改作匪易不致妄有異議予以有味哉斯言也今之職州縣者丁此繁劇匪朝伊夕惴惴焉奔命共事惟恐其後故往往翹足瓜代幸免責而去今薛君等能以從事餘力改葺斯宇且慮乆有侵干可謂臨政不苟重民力敬王事心公而慮逺者矣後之來者知政由是出無匪王事一以公道為心越前政有光又何患焉苟公心不存徒知居必日葺以為觀美之具非余之所敢知也明年戊子夏六月記扶疎軒記予構春露堂之明年循牆種木思有以蔽于外而奥於内也又明年衆木鬱茂布柯散葉隂暎雖㣲葱蘢可恱于是題其軒曰扶疎四月維夏露華湛滋扶光疏翠􅁮􅁮離離健晚凉而層出媚晴霏而自持鳥交欣而有託物争妍而見熈我固知吾廬之可愛過客睠焉而去之而遲遲客曰今子取陶詩名軒見于外者如是其安于靜而樂乎中者不無意于其間試為我道之予乃仰而思俛而嘆曰客何見之晚也秋澗叟讀學四十餘年從事其間亦嘗明其學而行其道於時矣然方駕而泥盛行自拘吾豈惡彼利達樂此閒且寂也天道盈虚時而用舍安吾所遇委吾時運而已嘗頌淵明饑凍雖切違已交病心為形役深愧平生之語大有契于余衷良竊慨慕者焉况復衰謝不堪世用有晤言一室嘯傲兹軒之下迺所便爾物來即應客去讀書遇事與心㑹輒忻然忘倦其或抽思雜著旁搜逺紹竟日忘返盖尋常焉今又厭斁倦於作為知饑而食困而眠蹣跚其跡扶疎其心任衰榮之無定樂閒身於茲時騁懐逰目極夫吾之所好斯亦適意壺觴寓興于草木之意也客曰有是哉覺吾清興翛翛横陳于疏風秀樾之間者且無邊際矣予廼賡之以歌曰庭下之木日惟喬兮封而植之春生意之浩兮軒中之人日益耄兮任喜與愠無所闗於抱兮天運如此孰敢此咈道兮偉哉靖節獨立物之表兮今我何人議論安敢到兮願為擁篲以備三徑之掃可乎客笑而去于是筆以為記至元戊子秋孟廿有六日書萬夀宫方丈記夫天下之事得人則興否則萎苶而不振此必然理也萬夀宫既易常然丈室起清蹕行殿越明年作夏屋于新宫之背盖所以拱辰居而復師位也方之舊制一切充而大之其傳度之位賓友之筵淵嘿之室髙明靜深顯敞誠超越矣既考室迺以壁記来懇維太一教興于金初始祖垂創顧雖一事而本而末皆有次第其植根豐末濬源衍派傳無窮于後者惟恐其不𢎞且博也逮重明嗣法至創靈章誦仙品有充類至極者大定一水漂泛無㡬再傳而得虚寂堂宇齋壇刻期而復貞祐之兵燼為飛烟四代中和仁靜真人披荊榛掇瓦礫成難為易不十年略見完具其有侈而未廓大者以俟夫後之肯構者焉然顯仁藏用已胚胎于其中矣貞常師持守成業而光揚恢廓之志規模未竟而奪之遽今六代純一師感其如此思有以大慰先志裨有俟而未竟既易而必葺者八年之間一新而改觀誠可謂繼述之善者矣異時真仙偕來華表留語曰吾之析薪也如是乃今克荷者若爾其至則知欣然顧諟蕩雲光於廣福致佑䕶于王室者尚有重于此者乎然修道為教有體有用體雖具而用不彰其為道也亦已微矣嗚呼嗣音而来者固當惴惴焉以思道生之本使更有所進則拱璧先馬未足為先後之光也至于興建之方資用之費土木之工主治者㑹計之事兹不復云唐中書令贈尚書右僕射馬公祠堂記予嘗道出荏平顧視俗多濶達膏壤夷曠俯仰控衛兼齊薄魯海岱之所鎮浸禮義之所漸摩宜其鍾靈萃秀篤生異人有如中令公者曰山東出相亶其然乎仍訪公陳迹得遺祠于里之北壞垣敗屋大有不稱公聲華烜赫於葢代者適去職不遑顯圖略致稽古象賢微意今年冬郡從事邑人崔君文懇予書以掲公祠他日持歸将丕崇厥構有來具瞻式廓民傚以為東人光庶㡬必恭敬止之義其懐賢樂善殊有屬予心者就述中令公之出處大致且寓夫予之所梗槩者焉唐既剗隋亂治具畢張公挺曠邁之資負詩書之業寤寐風雲思立談以取卿相及遭遇太宗由布衣論天下事飛章抗疏展盡底藴一時劍履鏘翔何翅百位獨能婉孌龍姿宥宻基命如房杜以佐命就列先生以機務稱賢至隆貞觀文物聲明之治寵受之光前後有赫卒全君臣始終相得之分何其盛哉然向非中郎何之賢心焉休休越彦聖而達不違則公之事業烏得施展經綸如是其至者乎書稱邦之榮懐杌􅑾其原實繫於此信哉故昔之以致澤存心進賢為職者未嘗不眷眷于斯焉至想見二公風采欣其餘光邁烈厲衰俗而激頽風者亦已多矣崔君曰有是哉吾子固當同稱大美大書特書而已也至元二十五年戊子嵗冬十一月謹記靈應觀世音記新樂李氏藏觀世音像盖宋淑徳尹后家物也李世奉之甚恪䘮亂間失所在一夕見于夢曰吾今寓某家犨塢中可訪求以歸為物色之獲焉家人疾乞藥嘗得丹粒于杯案間服之者即間嗚呼其可謂靈也已釋經有曰觀音大約人羅厄難持誦䖍禱世音以慈悲威力能解脫諸苦雖悍夫戾婦莫不信然吾儒者釋之道初未之學其善惡感格之理且以吾之所得者明之夫萬善生于心而庶徴應于外又嗜欲将至有開必先天之所以福善禍淫者只是一理或否屈而伸之也故一念善則祥風和氣即在于是一念惡則妖星厲鬼亦在于是彼疾痛率籲而云聞聲應願濟而渡之者所謂以心感心不入諸相而氣志如神者歟不然恐是聖賢立教使人篤敬速于背惡而向善耳若孚誠不立妄意虚想亦釋氏之所惡也昔有寶菩薩板者重其道子筆也今李氏世奉尊像如此敬其神之靈也既曰靈有不敢以一概論者如東坡外祖父程公遇蜀亂絶糧困不能歸有僧十六人往見之曰我公之邑人也各以鏹二百貸之程以是得歸竟不知僧所在公曰此大阿羅漢也嵗設大供四公年九十凡設四百餘供然坡跋于尾云或曰羅漢慈悲深重急于接物故多現神變倘其然乎是亦自疑而不敢必也幸觀者瑩鑒畫年深繪色黯昧筆法極精妙非近代所可及李伯母孺人王氏今年夀九十一聰明不衰自少至老供養尤謹可謂孚誠立而不入諸相者哉至元己丑嵗五月六日係先妣夫人靳氏明忌書二本以薦㝠福云秋澗集卷三十八欽定四庫全書秋澗集卷
