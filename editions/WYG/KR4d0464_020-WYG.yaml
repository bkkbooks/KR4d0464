seq: 20
front:
  text: 見夢十月初八日夜五鼓初拄面相看凡格間笑談似與浣離顔趣裝巳辦宜趨徃江路雖遥不久還魯國自来尊北海謝家誰更作東山瀟瀟夜雨蓬窓曉細酹清樽與淚澘
  hash: sha256:4ccc2eaa244fd34a0979c81872235e04e198689b956d4662b12a9750376d9c99
body:
  text: 儀封道中驛舘殘釭曙色分馬䭾殘夢走跋跋去家巳逺誰為侶到處相逢有故人健羨鵰盤慚始擊靜便蠖蟄返求伸一杯拜酹睢陽廟激懦扶衰尚有神睢州道中寄友人奉詔東行獲所安却憐衰朽强為顔恩縁至渥酬無地事不預防多後艱逺馭有方清百越纎埃何補奠三山殘年正要相料理既不容辭望蚤還過歸德寄何相白髮年前六十三强扶衰朽去江南心知義重吾何惜老不身安事恐躭弩末縱能穿魯縞病軀何可敵閩嵐鄉關回首四千里正累君侯與細參十月廿七日過下邑喜與趙彦方侍郎相遇作詩而别暮色増寒慘驛亭燈垂紅燼盡情明長年幾夢溪堂月此夜相看下邑城流落蠻方真可畏笑談樽酒且同傾回頭楚水楓林下焰焰聲華定彦卿宿宋家山趙氏田舍白髮搔来不滿簪就中誰遣世塵深野烟遥認圯橋月霜夜初聞楚户砧長路苦吟支睡思客窓無夢耿鄉心前行説似安夷道隱隱青山轉槲林揚州送劉漢卿東歸汴梁海鶻翻雲下錦韝眼中人物見風流誰期淇水三秋别却作維揚數日留樽俎留連江上月風烟吟眺竹西樓馬頭細嚼梅花句又領春風入汴州西湖西湖三面簇青山净拭菱花照翠鬟蒼海月寒龍穴露彩雲仙去鳳簫閒無多樓觀猶圖畫最好風烟近市闤鄭重繡衣周漕使畫船春酒待余還留别左轄台相兩浙江山漠霧雲呉儂輕剽到羣奔纔寛防異須威霽稍困隨方以德存龍寵優来心愈小義方嘉處勢㤀尊忠傳孝繼平生事長見風烟擁㦸門一作薦賢正是台衡職桃李何須在一門乙亥冬仲三日與宣慰楊子秀總管髙瑞卿侍郎田榮甫三君子邂逅於餘杭其喜有不勝者以詩留别情見乎辭北来冠葢拂呉雲試計分飛動十春意外論交縁義重天涯相值更情親放懐樽酒難同舊照眼梅花總可人明日浙江江上去寄聲多逐荔枝塵下大安嶺俗云分水嶺宿霧霾山苦未收馬衝寒雨下關頭紅雲軟脚揮三爵碧玊攒峯擁萬丘日月麗天從北轉山川分水盡南流漢家分教今無外誰遣氛妖孛斗牛時汀漳等州鐘㓂作耗未平故云三山元日臺爇天香簇絳紗三山簫鼓樂年華竹枝歌後多淫祀燕子歸来識故家荷鬢閙妝餘翠貝蔬盤匀飣雜魚蝦殊方風物雖堪賞争遣衰年客海涯贈之問前尹福州庚寅三月廿一日作社燕秋鴻十載餘天涯邂逅兩臞儒九遷論秩心何有百折當年氣自如喬木故都思徃事月明滄海炯遺珠春風囘首桐城郡時訊平安見簡書送李司卿輔之北還李司卿名天佑安次人與予同年為御史今為户部尚書北還憲府乘驄憶舊遊白頭相見嶺南州地連瘴海三山月人在元龍百尺樓此日又驚成契濶異方誰與慰淹留交親若問衰年況夜夜秋𤓰夢故丘庚寅春三月與張參政獻子李司卿輔之㑹飲九仙絶頂其道室榜曰滿目雲山四千里外同羇旅三十年来老弟兄樽俎喜陪今日宴江山難得晚来晴巖花帶露春容溼醉袖翻香笑語清莫對雲霞説輕舉蒼生料理正煩卿時張㕘政奉㫖科八州民數暇日登道山亭懐古亭在烏石山巔有碑刻南豐記文其上刻鄰宵臺三大字閩㑹東南控嶺溪斗牛無孛歲無饑文風興盛猶唐館霸氣沉雄入劍池海近重城朝日蚤山蟠平野暮江遲危亭一片瑶鎸在晤語殘陽倚杖時送師彦貞藺寳臣二御史庚寅四月十九日半歲相陪百越東救時人道向来驄劍花光動蛟螭匣豸角霜嚴簿領叢明月共看千里隔屴峯回憶一樽同偕来不及成偕徃目斷三山羨去鴻大中德長老見贈竹輿作詩為謝人老筋骸不自持乘堅䇿駿兩非宜憐師雅意慇懃甚惠我斑輿結束奇花底徐行閒看處陌頭趨進早衙時醉歸更比籃舁稳一任山公倒接䍦贈鼓山長老平楚不下禪牀四十年老軒頭角出泠淵久從貝葉傳心印来與雲山結静縁蘭馥蕙光増撫媚竹風松月共清圓荔丹有約重登覽轉首天風恐䬃然楚有畫蘭絶句故云庚寅夏四月送二御史回淮安道中即事語知巳者五千里外一衰翁八郡規為一省同衆口鑠金方作異諸生鳴鼓欲誰攻寒封老柏常年慘暖借繁葩盡日紅夢到垂虹亭下水雲帆千尺挂秋風遊鼓山五首并序鼓山在閩中為特秀余到官五月王事鞅掌未遑登覽以盡江山之勝迨明年四月庚辰遂與天平張㕘政獻子大都李郎中德昌御史聊城師彦貞居延藺寳臣提刑東原曹仲明憲幕張遂良程舜臣何舜卿来游尋前盟也辰刻抵戒院捨鞍肩輿迤􅆔而進至望州亭主僧平楚来迓用軟脚例酒數行厯松關由石門入白雲寺適簽省樂公亦供佛来此遂相與禮像殿浴佛於西寮既而飯屴峯丈室眺上方重閣降觀湧泉歩入靈源洞度喝水巖登天風海濤亭觴咏閒獻子德昌扶攜上征徑欲造大頂峯足觀紫陽遺刻石與雲荒中途而返時宿雨濯山林壑争秀烟霏空翠有顧揖不暇者莫不欣然忘歸沖沖若有所得僉曰樂哉今日之游也吾儕越在絶域縱此重来恐無復此歡可至元歲月不可以不紀詩亦不當無也明日探囊得唐律五詩俾刻諸亭上以為山中故事峰迴路轉巳層雲望逺風烟接海門海霧去收千嶂雨老僧迎勸半山樽巖幽選勝窮詩境山迥登危黯客魂濶絶殊方同大塊坡仙心事强為論筍輿同駕躡鼇􅘡冷帶秋深入白雲雪竇有禪容暫叩名山無分與平分雲憐嶺斷聨松䕃雨惜題芳䕶蘚紋㑹約贊公重借榻鼓音同向夜深聞上方游遍雨花天洞壑尋幽得壮觀林影蕩空金界闊天風吹袂海濤寒江山若爾不一醉杖履再来無此歡詩在眼前拈不出碧瀾秋色上層巒杖藜尋壑游初遍倚檻𡨕搜興未闌濁酒一杯方大嚼暮烟千頃要奇觀放教眼界寛無際徑上山椒不作難若欲攀蘿窮絶頂海濤風勁不勝寒複嶺重岡奠七閩鼓山東峙最重尊嶼亭詩好風濤湧靈洞龍移窟宅存千尺翠層宜晚對一泓滄海儘雄吞雲烟稇載歸時晚月偃松梢玊一痕道山亭燕集霜簡無華鷙鳥朋追隨飛葢上髙亭霏霏空翠沾衣溼浩浩雄飛拉瑟聲巳愧東山空雅志枉教南斗避文星憂来猛把欄杆拍轉覺詩情未易評酬余招討見贈詩韻秀孕江山氣自靈余君襟度玊亭亭髙軒過訪承佳什世事開談見逺經秋色望空喬木國海商争泛客槎星又聞占籍多隂積一户從良近百丁送魏參政赴邵武時與江西三省合㑹破賊畫省分麾出越營跳梁黠鼠巳潛驚環郊多壘真吾責報國丹衷在此行獸困可擒須急縛民安無畏是佳兵遥知帳遶生犀地草木風前總戰争戰一作捷省郎李應中見示所藏書畫因題其後畫省官書不片閒撥忙能結淡中縁吟餘紅藥堦前露夢到蒼苔月上船鑒定正煩君具眼收藏還擬世珍傳古人巳矣精華在時復横披一洒然八月八日雨中書懐自到閩中十月餘老懐未省兩眉舒命縁限蹇行多拙心與時違意轉疎夜枕有蛩妨睡思秋空無雁繫鄉書桂香簾幙中秋近愁對清暉憶故廬小樓秋望芙蓉吹老白蘋風隰有游龍草有蛩湖水巳翻寒日影火雲猶作夏時峯清時還負無能貴老境其如所事慵推放小窓閒寓目秋来無物不愁容腹聨一作時方多故增心苦人到髙年所事慵寄紫山憲使去冬相從入臺叅君任平江我更南不惜殘年趨海嶠擬将風義壓烟嵐得時可進成虚歩縱説知難到强談歸見紫山如有問此身於世百無堪腹聨一作碧雲暮合人千里白髪愁多雪滿簪秋雨秋景蟠空勢莫驚西風吹起傅巖霖驅雲湧海連三日潤物囘空抵萬金火傘炎收閩嶠瘴烟螺重拭越山岑滂沱未洗戈船甲愁絶孤臣一寸心御史陳君濟来知紫山病告巳滿浩然北歸余以微官自絆留滯閩中未卜歸期定在何日慨然感而賦此南来同仕君先徃自絆微官固可憐書考巳甘揚子下着鞭又為祖生先碧雲暮合人千里白髮愁多雪滿巔去去呉江西下路姑蘇臺上月空圓寄叅政何公黄閣年来相業多忠腸輸瀉畧無他物情雖異歸包總鼎味能甘賴燮和客子逺聞欣欲舞海風何慮偶揚波時草竊蠭起故云殘年喜見昇平事歸老田間儘浩歌寄左丞馬公黄閣風清相業多漢家機務到賡歌黙涵羣動歸包總力贊孤卿罄燮和春草閒嘶沙塞馬秋霖行洗越船戈古今多少調元樣兩魏聲華未減何即事耳聵瞳昏久病翁暮年遊宦又閩中一旬好快無三日百計隨人到五窮毎署細衘慚巳曠雖無私過亦何功揣量薄分宜歸去免着通人笑未通卧病中即事萬慮消磨只一身一身猶為病邅迍老饕纔助脾神喜溼熱還攻眼力昏蔬飯半盂嗟强食物情千古苦難論前期七日多能幾更有何心到競奔即事地僻天荒自一方江山還鎻瘴烟鄉炎涼失節人多病勁躁難馴俗反常媚竈王孫方怙勢背時郭老怎當塲欲行莫克行還阻乞取閒身且六藏芙蓉草生不識翠苞纎真色還欣到爾瞻嬌綻葵芳無兩樣閙裝橙葉更多尖一溪野水明粧鏡滿樹清香拂繡簾開謝巳甘秋色晚碧桃紅杏我何嫌卧病吟四大尋思孰主張百般調䕶不康强火頭孛尾方為祟肝氣脾神互見傷秋月欄干吟袖冷曉烟庭户藥鐺香夜来一笑伸眉喜夢裏分明到故鄉閩中即事誰作新詩採衆謡八州淵藪萃逋逃蒼烟滿樹驚梟嘯白日西山聞虎號取辦急征農最仰空哀愬彼苦何髙内奸不止終多冦鬬敵徒教殺爾曹八月十八日野奠囘入西湖開化寺廪禄巳沾三品料浩然歸志苦遲遲宦情老去無多味花様看来總背時庭下宜尋歌鳳侶澗阿閒詠考槃詩免教方寸為形役惆悵終年抱獨悲送趙提舉職滿還江西字仲逺眼中薄俗日紛紛信厚如麟見趙君學館久淹雖散秩士林輝映總多文三年提調無遺育回首歸飛隔暮雲忠孝堂前秋色好淡烟吹滿泮池芹即事人微職峻作提刑正似禪僧放海青痴坐久為山鳥怪急歸巳愧草堂靈甕邊吏部方酣飲澤畔靈均謾獨醒樂得便行無窒礙雲間髙躡鳳凰翎悠悠心事欲誰同甚是留侯智與功幸有釣舟藏夜壑免教官事縛微躬旬多病假慚虚位獄有繁寃謾􅉯中稳送布帆無恙去小樓昨夜有西風西風吹老一川秋劍水東南送客舟寒雁逺賔方漸陸野鳧羣聚正乘流飛鳴聊欲伸吾志飲啄非徒為食謀通塞既知皆有定平泉何為志窮愁題建寧府建安堂壁郡名改自炎興後官事多從五代年草木不知黄落候江山渾是寳巖天風時雨若囘天眷味厚泉甘覺氣全城府自来多險隘髙蹤誰躡漢梅仙東山稱梅隐云梅福常隐于此子孺腹病良愈謝全王二醫官全名立夫王名貴和喜向醫林得二髦河魚為祟免憂勞調和臟氣事為切䕶養丹元論最髙曽未浃旬收勿藥並驅二豎不容逃難忘更有真誠意荅荷千金恐一毫活庵方伎若為髙濟物心驚不代勞子孺病来方作祟脈原看處若為毛臨機制變元多算勿藥收功大可褒自是理眀窮隐爽不縁潛授老龍韜非六韜之韜葢借用孫思邈昆龍所授之法也贈三岐儒醫徐登孫升伯徐卿奕世傳醫道學濟岐人蔚有功方自千金開夀域肱非三折見良工經横烏几筠籬静門掩朝暉藥竈紅我似病梨無可賦略煩料理少陵驄又題石橋山龜阜烟霞小有天半空奇絶石橋山蒼龍背倔雲千叠寳月光涵玉半環當局仙人閒遣興爛柯樵子不知還一樽醉上山翁馬却逐流紅到世間繼李昌道見贈詩韻以寄當年初識厯亭仙貴眼相㸔意惬然把臂喜談天下事洗心如聽玉琴絃時文變古多君雅逺馭長驅並我先比渚風烟儘瀟洒興来詩思想無邊遐觀亭南劍州總尹張侯所構閩右江山第一州危欄髙倚九峯頭大書快覩淩雲榜神化空驚躍劍舟冠葢送迎無少暇烟波吟眺暫相酬曉涼多趂蔷薇露醉墨淋漓想未休九日南劍道中龜山山長林元中和韻有云萬里好風南去雁兩溪明月一歸舟颯沓弓刀入劍州登臨髙出碧山頭松風度嶺吹紗帽烟水漫溪送客舟萬里故山今得徃一年佳節儘為酬滿樽緑湛茶洋酒空對黄花一笑休憫雨呈幹臣詩友四月十一日作時闔郡祈雨天人消息兩交通和自羣情雨意濃一旱迄今幾五月四民作苦最三農雷燒赤尾空驚電雲捲黄頭又變風傳語龍棚棚下客孚誠終始要相通嗷嗷羣動日焦枯何處痴龍睡未蘇穀未見苗耰可望麥方含實穫来無九闗變豹無餘藴百郡承風恐失圖試手天瓢儻微恡斯民斯苦果何辜和錢神咏解毅開難到處行雖云銅臭最關情世縁利益稱泉貨時便流行託楮生武子矜豪編竟埒魯褒貽笑愛如兄細思最是通神處買盡人間事不平巨室權門坦蕩行反於窮薄略無情散飛庭樹来無迹汚濁羣心到處生取象有天還有地縱貪無父亦無兄存心思革交征幣何處銅山剷可平芭蕉扇輕箑如蕉一様新楮衣筠骨製来匀隔窓雨落驚真葉洒面風清来故人常羨楚材為晉用却嫌紈素化緇塵㑹當柄在調元手與播南薰解愠民近讀夜永不寐等作覺清而頗寒吾恐傷中和而病吾子也因復繼前韻假辭而薰炙之亦晁補之擬騷之遺意也幸笑覽燭影横摇夜色侵香添菱葉鬱重衾鳳琶調軟歌能合竹葉杯深醉易沉緑鬢追歡燕市樂翠屏歸夢越江吟平明剰買扶頭酒不向諸兒計橐金夕坐虚窓氣夜侵欲眠還未擁孤衾書因倦讀從燈暗物不攖懐任思沉肥遁世髙雷子節清貧時見曲山吟舊游相望成三老既老能閒抵萬金和曲山覓菜詩韵鼎餗藜杯一概平見君胷次匪瓶罌屢聞飯糗同鰥舜似要侯封號戛􅅅靈府天和流玉薤露盤詩思湛金莖腹腴蹯脆皆吾欲二者難兼恐物情貧富因君嘆不平食前方丈對羸罌一簞雖具黄梁飯滿豆常空碧澗􅅅甕料不聞波底語秋光時見鬢間莖細思清苦多吾輩愈見蒼蒼責備情和幹臣詩魔韵倦懐欲罷不能回啾唧吚嚶雜嘆欬清禁事嚴微服入華山峰好倒看来禁持作祟非無謂狂斐縁渠不解裁島瘦郊寒遺像在至今追想日悠哉詩家何苦似魔為逺紹旁搜没了期鼓舞有舒還有慘禁持似醉復如痴鼎邊苦思多窮夜江上寃魂獨語時伴老此身成底事乾坤清氣㡬人知睡魔和韻醺然一氣熱相纒不是晡時即午前臲􅑶枕丸無所濟昏明心境陡相懸見侵多是羣疑後澄治無如一敬先不羨老歐能善變化為鸜鵒舞翩翩欠呵舒挽速如神不是愁縈即思棼釀就黒甜濃有味撓昏靈府闇無聞魂遊纒老三峰客茗戰摧空七碗勲經事不為渠所泥邊韶便腹見多文和幹臣齒痛詩韻硬嚙豪餐養老饕先生編貝若為牢熱流肢脈知来漸痛拔孤根訝許髙縱使舌存宜晦黙更堪心苦恣焦勞休休事事從輕減急手先須止濁醪折齒吟自慰朝来折齒五神驚勢若山為朽壤傾缺豁醜于韓子態嘯歌妨似幼輿情病根何益華池潄五色空傳幻術生駢潔浮危雖自取世間何物不虧盈適見總府應詔薦章偶得一詩庻明鄙意呈幹臣齒牙缺豁雪蒙頭更有何心接俊遊一自詔條頒雨露盡催遺逸起林丘韞藏櫝玉知無限刻畫無鹽最可羞經濟斯時公等在此身天地一虚舟寄胡紫山提刑蒼顔白髮兩衰翁前歲将翔馬首東常喜笑談猶不淺静思行止略相同閶門凍鎻連江雨瘴海炎開發屋風兩度生還幸無事更何心到炬蓮紅寄六祖真人渉世筋骸百不堪只堪老坐老書龕眎難逺矚目全眊聽不能聰耳謾耽臂痛帶来沙嶺溼心煩漸逺瘴江炎客来問訊承佳意蓄縮其如自老蠶五月八日同幹臣遊耿家池上侷促城居鶴縶籠緑荷池上暫從容花明淡灧波光外詩在扶疎樹影中老厭宦游追俊彦天教閒處著疎慵日斜尚約遲遲去散坐髙槐洒晚風和幹臣山居細想山居有足論既便嘉靖不知貧霜封幽谷收明栗水漲前溪送束薪茂樹坐移隨所適良苗耘罷見懐新隱居不見求髙意千古淵明最可人腹聫一作樽洒相勞隣曲厚樹枺交蔭鳥聲新山中有樂試為論石上無禾未是貧溪隔圃田多滯穗霜摧林葉自添薪醉談有味漁樵熟野飯加餐笋蕨新大朴散来非復古隐居求志果何人一作半道閒談留荷簣隔林孤唱聽樵薪瓮篘春釀雲移舊園摘秋葵露葉新朝吟樽湛芳醪􅽼夜話爐煨紫芋新時耕白水親收稻日斫青山自負薪隐仕初終絶異論淵明憂道不憂貧比如違巳心反病何似行歌自負薪意外風波平地險山間烟景四時新此生只向黄塵老笑煞羲皇向上人和幹臣以目疾詩相儆老来襟抱百無圖遮眼唯便㡬頁書不爾心神渾散漫豈知目力陡乖疎晚年愈種𤣥花盛平日豪吞緑醑餘氣習屏除原易事急須顛倒坎離居常倚精神壮未殊有時豪飲痛觀書形骸未化無非苦寝食其間敢自如赤貫瞳人昬若蔽溼留肩井冷難除人憑手眼今如此更有何心望玉除時徃徃傳余有翰苑之命故云埽晴婦今年夏六月初方雨凡六日不止前去秋節止廿三日亟晴秋種生發能有幾日又諺云秋後一十八日百粒不結巳種者為雨拍艱於出壠方種者場土粘溼不易耰作兒子輩戲作埽晴婦懸之前簷明日開霽因作是詩以見其意云淡粧烏鬢緑衣衫一線髙懸舞畫簷笑着苕枝揮素手盡驅雲影入蒼巖埽晴既出兒曹戲指日何殊艾子談百榖近秋苗未茁羲和先斂瓏頭粘江山萬里圖勝覽何人作此圖雄誇天險亦區區經營意匠羣工上慘淡風烟百戰餘並轡相夷嗤宋魏舞干来逺美唐虞只今一統無南北正要懐柔謹厥初一作指顧漢封真采聚追奔秦鹿比山虞江山列地出新圖限隔東南見奥區與校廟謨雖有間細看邊備則無餘忌功去玠甘捐蜀併力亡金笑假虞千古美芹髙議在不應成敗論終初䘮馬和幹臣韻大夫之後不徒行為罄囊金市此乗耳削秋筠分額鬛臆團孤月映鉤膺長鳴尚憶看雲立論力空懐以德稱得失塞翁深領㑹天教閒坐看飛騰過郭璞墓墓在金山西北大江中流亂石間有叢薄鴉鵲棲集望之如蒼雪者葢鳥矢也青囊書秘造精深𦵏法人傳冠古今一死秪縁撩虎尾孤墳何故𦵏江心師從鬼谷宜多怪山湧胥濤不寸侵世言江雖大漲水不及墓我特回舟酹公去翻翻寒鵲落蒼岑一作舟過亂灘無所見寒鴉蒼雪滿﨑嶔狒狸祠在𤓰洲城江山照眼舒清眺千古興亡墮眼前𤓰歩市長連野戍佛狸祠古慘荒烟柂樓看取平呉日父老空傳飲馬年此日不須開濁浪好風都屬徃来船即事三詩奉呈幹臣明府詩友辛夘四月廿六日作鯀殛苗夷併放驩九官相讓濟時艱閭閻有喜科差少烟火全疎傳舍閒兩澤潤寛無逺邇詔條恩溥到惸鰥聖恩撫御超前古慶厯元和未易攀恩書一札變虞驩盡革前非免後艱星影不摇天宇静邊庭無事羽書閒震霆摧惡無留枿霖雨思賢到有鰥若把古先相比擬周成唐憲敢躋攀占法云民勞則天星動摇巖廊吁咈處工驩萬死猶難謝世艱向奉御圖哷死先令野貍爪嚙其膚今僧格自請死同圖哷上謂之曰若教汝便死天下人謂我何為念民碞深顧畏自裁書詔盡防閑求賢不啻飢和渇發政常先寡與鰥蟣虱小臣雖片善一時鱗翼盡期攀今歲自二月至五月凡兩降詔條皆出自聖裁秋澗集卷二十欽定四庫金書秋澗集卷二十一元王惲撰七言律詩
