body:
  text: 題薛少保稷畫鶴圖晉公化筆神胎禽超超中有萬里心通泉老壁墮茫昧此幅冩影逾精深細㸔粉墨色欲盡元氣突兀開雲林雙脛森碧玊老頂朱砂丹舞風警露兩無謂理此修羽何翛然毰毸不受世塵汙真骨照影蓬壺僊王恭雪氅忽散亂幾㸃冷卧瑶池烟恍疑坐我九臯下髣髴清唳聞秋天華陽宫深春畫閒晴苔冷啄松隂寒宣和六客儘摹冩夢不到此宫清妍􅏝予三年事擊搏俛仰隨人空飲啄長纓塵滿􅎨凡容比擬孤清餘愧怍君不見坡仙作嘆真可人退易進難良自度摩挲老背忽驚心以倖乗軒非所樂仙槃月露濯金莖緑野風烟連竹閣得陪髙歩繞池塘老我何心望寥廓僧傳古坐龍圖嚴東平所藏至元二年秋九月張僉省耀卿處觀七年閏十一月甲戌公退馬上偶得時秋苦旱冬天無雪深山大澤物所蟄千丈懸淙挂青壁潭隂水黒不見底老雨初開元氣溼蒼龍何處行雨歸闖首踞坐紅雲堆山僧駭絶噤不語萬壑隂霧生緇衣咄哉傳古隠龍性隔户冩影窺天機一從元化墮此筆飲海不復觀晴霓世間畫本萬尺蠖尾鬛一掩無晶輝比年一旱㡬焚如牲幣空事山川雩羣龍癡睡洞府黑六合任使黄霾汚何當鐵匣出雷火衝屋而去騰天衢六丁奔命僕射御倒捲溟渤天瓢􅆽滂沱一洗乾坤净却斂神功寂若無趙邈齪虎圗行田給事和卿所藏巔崖老樹纒氷雪石觜枒权横積鐵北平山深林樾黒下雖有逕人跡滅眈眈老虎底許來抱石踞坐何雄哉目光夾鏡尾束胯百獸却走潛風埃趙侯欲盡神妙功都著威稜阿堵中想當䃲礴噀墨時衆史縮手甘凡庸至今元氣老不死神物所在纒隂風年前驅馬下靖邊崖東突起草底眠腰間恨無鐵絲箭寢皮食肉空長嘆今朝過喜一嚼快熟視鬚頂為摩編貨馴跖服暴戾息弭耳道義思拳拳主人愛玩中有謂遇事炳變通經權我聞漢家大獵阹氷天豸冠思賦長楊篇四方猛士今雲合早晚龍旂到渭畋楊秘監百馬圖孫子譽藏冀北之土馬所生息軒英爽房良精定年苑馬凡幾抹故老一說驚龍騰大青小青帝所馭勢與八駿争馳衡先生此時行秘監扈從幾賦汾陽行翔麟日給盡龍種春風不覺鳴鞘聲楊侯凝神洞化窟筆底抹電流雲傾當時一紙萬金重曺霸撫掌江都驚生平冩影幾千疋未若此圗真傑筆明窗一日百回㸔元氣淋漓悵猶溼隂風獵獵吹旌竿雲黄草白沙漫漫大奴乘秋閲清峻渥洼洶湧翻晴瀾浮雲角壯遂天性不數南山之下汧渭間安得武宗三萬騎濁浪蹴破東南天蒼茫回首鍾山渡一凱歸來入漢闗華陽春草三千里還似駉駉畫裏閒和姚左轄梨花詩韻主人愛花情不薄淚粉䦨干愁寂寞東欄一樹要洗粧走報詩仙揮翠杓醉歌不惜玊山頽明月春風紛雪落杜詩韓筆世所驚大敵無前鬬清廓王城春事嵗如許三載痴牀如酒惡何時翳鳳驂羣仙華時吟眺青山郭絳州法帖歌謝張元禮兼呈按察先生君不見晉人九亰吾莫與天遣元精留網楮絳州一帖天下竒要以鍾王為藝祖内家中秘無雜收餉間等書為世取固知瓦注覷天巧虎卧龍跳照今古羌予嗜書昧所守集古無由似歐九王城陸海幾燃犀不照光怪駢萬首管窺雖得見一斑隨即遺忘非我有承君恵此石本佳銀字糢糊真敝帚奔蛇走虺幾千丈詭伏竒形驚户牖手追心摹日有得顔氏服膺承善誘明窗一日百回㸔什襲深藏重瓊玖就云好竒家四壁破屋潤餘豐且蔀三杯適喜逕醉眠墨池濡首追狂顛覺來捉筆便揮洒徃徃逸興驚蒙顓裴旻劔舞凌雲烟作詩聞君君豈然料應一笑絶倒乃父中令前題趙仲器治古齋我官御史二十月秩滿身閒在京闕朋從日約扣人門閲盡名書古饕餮古人不作古意在鬼刻神劖多叵測喜逢治古齋中老論説精英探天巧反觀吕氏博古書照眼形模總傳寳趙君陶鑄真好手元氣鴻濛驚冄剖典刑髣髴三代英賜器政宣皆敝帚免憂躍冶不祥金蟲臂鼠肝争好醜題都山老人慶九十詩卷次胡貟外韻古風三百聖所刪福履詠歌先夀耈後人作計競朝昏徇利覔官甘妄繆正縁得䘮損天和禀受不只歸薄厚劉公九秩固天與護養風神逾稚㓜脫遺外物委路塵保蔽元精若勲舊嵗寒霜檜自後凋露影朝菌不終晝笑㸔蒲水鴨頭緑細捲春風釀重酎一杯吟醉頬浮丹不羨周人台背皺古來紀孝錫類多行見諸孫紛彩綬惡溝行在平陽翼城縣北大尖山中西烏嶺下唐都鄙歘得平川心適喜馬煩車殆問前途人說北山路無幾朝來徑走山南坡岡勢稜層登陛址峯回路轉十里餘驚度惡溝深井底偃身直下幾百尺十歩徘徊九還止南來山行五百坐屐齒磨平無可跐仰升雲頂俯哀壑山似鯨翻掀鬛尾羊腸絶磴盤不盡盼徹前峯後如指王陽叱馭心固壯老馬凌競垂兩耳胷中大物已隠然又為此山相角踦我觀晉文非眼見今日河山真表裏畦田髙下畫不如烟崦人家穴藏蟻晉人勤儉風土然山頂開耕自山趾一丘一壑凡幾家而復唐侯風化始河東大抵九分山民既能勤生自敉繭絲保障兩雖拙獨有一安差可擬山間一笑自絶倒汝亦何為論治體忽當疑徑問畸人欲荅子詢思所以如君面帶麋鹿姿遽縛塵纓解蘭芷優逰文史恐難任涉險乗危胡至此世人欲逸見利心捷徑趨時豈君子終南譏誚責未了千古坦途人所履笑揮植杖指東張汝急去予無我視若非隠者荷篠徒行念斯言真到理暮投僧舍不能眠走賦鄙詩還自箠題趙城南王開堡樓壁老澗盤回幾千曲洪水平來兩崖出邑居逺邇依地形南北經行看不足羣山掩映肺腑如河水縈紆衣帶足畦田雖狹水所腴風俗儉勤仍嵗熟東西南北總除官此心少盡物自安區區薄宦封丘耳有懐莫遂空長嘆為問霍河橋下水驚湍能激懦夫肝清江引為僧永真賦秋江水清深幾竿漁郎放舟煙渚間中流舉網紫鱗出不祗博酒供盤餐借問漁翁樂何主泛宅浮家無定所賣魚生怕近城門肯到紅塵汚人處蘆花兩岸晚潮平憶着蓴鱸思徑去朝廷物色那可得澤畔行吟何自苦滄浪水清濯我纓林婆酒熟容賖取人間萬事一醉休睡煞江南烟與雨覺來滿眼是青山獨速緑蓑還自舞漁父樂真可與細冩焦桐入新譜謂琴操有清江引也朅來山城官事紛簿書鳧吏對斜曛開圗空㑹漁家趣我恨不若江頭人張郎中彦亨督太原秋運道出平陽索鄙語為餞因賦此詩兼簡子初宣慰元年天策開明堂千官劔佩争翺翔當年張君正年少快書不減陳君康我初得子知逺到自笑野鶴空昻藏河山分陜嚴津吏六道煩君居右地十年坐聴棹歌聲置散投閒非所喜試難去易凡幾書思遇蟠根伸利器南來督運并門煙鞭籌心計驚孤騫萬材蔽河晉山兀目中已具龍驤船生平故人王衛州東南開府羊杜儔竹頭木柹方並蓄如君俊才當見收自憐右屬櫜鞬意射圃何時補唱籌平陽官府行奉送部掾劉文偉北還兼簡省臺諸公平陽官府居上㳺我來視事星未周眼中之人競筆得東西兩曹李與劉一朝嵗貢入民部折獄論文欲誰語老夫雖獨心所喜雙鶻乗秋看掀舉自憐白髮一衰翁終日區區簿領中米鹽細碎固當略要以不盡心為忡君不見鄭公温國兩通判至今徳業昭河東嗟余何為秩與等止有報國公而忠何顒至言豈易得渺渺孤懐庸自適因風寄謝臺省公倘有信來慰岑寂鵯鵊詞甲戌夏六月宿李將軍林館聞之有感而作寄友生王宣慰子初樹頭𤣥衣郎往徃人罕識汝舌幾許長音響乃爾激穿空裂霜竹借問何所職農家呼汝為夏雞隴月向斜鳴不失田間趣起早耕人秀樾深藏曉無迹隂隂夏木共山邑二十年前讀書客一聲驚夢入幽窗露氣滿空庭樹黒只今早暮無所為兩眼眵昏頭雪白咄嗟禽鳥逐時新我髮何由黒如漆㳺姑射山神居洞幽巖洞如瞰隂壑洞口飛甍架虚閣真仙乗龍竟何在香火千年事如昨蒙莊一言疑萬世稿死荒山凡幾輩何殊山石老且頑我欲砭訂其能還呼児笑折山花看淡白長紅恐自然北洞名王母洞南山截然如案齊東西兩崖相抱圍洞中仙人去不返老柏滿巖空翠微我來天氣二月初山鳥山花皆友于野情本於樵漁熟莫遣逰人避使車銅方爵歌荒陵盤盤枕山坰石林埋沒秋草平隂燐夜出金作聲牧児走避羣雉驚佳城一朝見白石神物還從野人得勒銘壬子嵗幾許考究古書猶可識篆文鐫刻非近世周鼎殷盤迺倫比兩柱作撑闕貝形四趾垂象齒雷章繞腹隠觚稜老鳳喙長驚下陊玉花鏥澀不敢蝕飜成翠羽丹砂紫我觀三代制飲器多圎體咄爾形模方劖刻殆神鬼秋菌春蕭非可比物之隠顯固有數流落君家得所止士雖好尚具眼少博雅如卿古君子補亡吕氏尤取重元氣淋漓開太始君不見逹人大觀者今古一昏曉人生極夀百嵗止作計千年意何藐我歌君試聴古人誰盡了九原不復作此器君當寳一笑樽前為傾倒短歌行山中寒食作花枝入籠晴晝長逰絲翻空網春光一聲金縷酒滿觴聴予短歌踏春陽雲淡風輕日將午信馬東城厯煙隝人家野祭澆墓田白白紅紅滿原圃飢鳶欲下影婆娑不待墦間徹盤爼陂陵髙下麥青青貴賤賢愚同一所况兹百嵗忽如寄過眼浮榮誰比數古人感此由重論力取功名照千古東岡畸人說隴西攀附雲龍總風虎鉅株枝散勢莫依蕭索荒丘穴鼯鼠豈期健婦持户門一片豐碑論世譜林宗不作蔡邕死旌紀紛紜争媚娬銀罌酒煖藉草坐滿引一杯私自語吾家先壠在衛南老柏如林百年許起身耒耜世有澤嗣及先君擬掀舉生平抱負奈數竒賫志下泉良獨苦悲纒風樹逾一紀業在青箱恨難杼我柯有斧睨不逺負荷至予尤莫取一官羈靮晉州城竚望南雲淚如雨風秀丹山歌至元壬申來官平陽得之於録事叅軍周幹臣處周予弱冠時同舍郎也十一年春三月十五日與兒子孺讀王黼朱勔傳及僧祖秀華陽宫記因作此詩以贈周云宣和寳石真淵藪萬狀卿雲照靈囿當年幾鑿太湖空贏得綱船枯九有丹山風秀徽所譜裊裊金書瘦於栁周郎攜自河陽城夜壑雖深縱豪取一峯突兀玉潺顔曾在紅雲顧盼間先榮後悴物常理我今感汝為長嘆朅來伴予茆屋底憔悴秋娘歸故里清燈摇摇光滿几爐烟作雲研涵水老虬蟠倔似求伸隠隠猶能鱗甲起此時對君心境閒人為物遷今亶然掩書瞑坐清思逺夢繞華陽松桂寒我思象江老守尤酷嗜不惜千金輦致來長安家無婦兒居無廬六石與伍歡有餘義山賞識豈徒爾愛蟠好尚極類古人之意歟一杯下咽歌者誰南􅅠小子王共谿醉歌行燕平湖作時為平陽府判蒼陂水漲玻璃滑堤栁含烟翠蒲茁當年亭館已陳迹老樹遺臺猶秀㧞我來置酒池上頭使君不負驄馬逰縣曺供帳散平碧呼集妓樂羅珍羞君侯一笑開懐抱十日東風醉芳草自嗟客子何所有春色三分二分老人生歡樂不易得况值清明時節好終年塵土簿書裏未礙金罇重傾倒湖光照眼明羅綺碧瀲瑶翻歌扇底氣酣急遣張水􅀈取樂不論冠佩委溪風吹面縠紋生兩葉蘭舟鐃皷起紅衣飛墜彩繩髙沒入蒼烟驚躍鯉郡人亦喜嵗華新四面縱觀空巷里佳人弄水祓不祥公子聨鑣特觀美錦筵香細酒不空既醉窮歡忘誇靡溪神捧出柘枝娘翠袖娉婷矜便體繡鞋畫鼓隨節翻羅襪塵生歩秋水一春盛集固云樂此㑹賔僚尤燕喜山隂修禊晉諸賢暢叙幽情差可擬客言行春似蜀守醉到浣花而已矣樹梢晴日向斜暉使君皂盖先醉歸就中二公冣愛敬移次臨流盡餘興一杯未了風翻浦山公倒載尋歸路自憐白髪非春事多為湘妃厭歌舞呼児覔紙紀嵗時不以斯文烏所覩至元乙亥三月春元已纔過日在寅浩歌月底還自笑醉裏詩成似有神上二公謂同知張明卿治中呼英甫玊璧城懐書至元甲戌冬十月廿五日由稷山入萬泉道出故城臨風弔古慨然有作我行河東幾欲徧大抵盤回山阜轉南崖髙與北山齊玊璧城根分一綫荒烟廢壘㸃杯土砲具梯衝經百戰短碑盛説鄭君靈萬騎隂風想平甸一曲悲歌敕勒川當時神武已悽然韋公守禦儘良策更着百升飛上天乃知誣殺咸陽日即是邕皇入鄴年鄭君韋孝㝟封號有宋元祐間廣碑邕即宇文武帝名建徳六年平齊入鄴聴祥師彈琴冠帶對鳬吏三年簿書叢王事固鞅掌我禄亦已豐有時意不惬耐此磈磊胸濁酒餘妙理中堅若為攻朝來偶過野僧話禪房花木幽而通坐中靈府覺虚寂祥師為我彈秋風古人不復作古意留焦桐秋聲瀟瀟隨指發烟篆裊裊索簾重悠然拂衣起逺日翻㝠鴻閒愁積思失所在槁葉一掃千林空襄陵行暮春庚辰日維丙駕言出游事耕省西郊微雨半晴隂幾㸃殘雲霧山頂馬蹄踏破落紅香飛葢追隨垂栁影晉人熟食一月節店舍無烟竈厨冷春到襄陽滿縣花緑隂池館總姚家清尊逺酌㑹心賞不與鶯燕争春華畫輪歸輾故堤沙金店西頭酒更嘉舉杯為憶劉漢事雲龍風虎何紛拏帝淵東開蓄峻址青衣行酒真驚䴥搴帷一笑兩寂寞野老指㸃宫臺窪萋迷碧草荒城曲依舊溪流帶北斜贈賈主簿徳逺赴春官唐風思逺非難治竊戒官僚多自棄賈君三載趙城簿一縣至今稱事事秋風告别赴春官千里辭親不憚難須知捧檄毛卿意要盡平生菽水歡戴嵩畫牛圖吳儂四時耕瘴烟吳牛見月心茫然戴郎此本極閒逸筆意逺出韓公前解縻脱鞅春事畢江臯野草香芉綿歸鞭影亂散平楚考牧大佀斯干篇因渠喚起歸耕興夢到西山谷口田李營丘寒江晚捕圖古人不地著所向無賦租漁蠻舟為家一葉縦所如斜陽淡淡明江湖萬魚戢戢依寒蒲幾家􅊻網晚未已博酒欲得松江鱸卧檣傍舫宿波面不爾風浪防艱虞何當醉帶笭箵去添我煙波作釣徒七夕日同府僚觀稼西郊秋風蕭蕭次逺林兩山極望秋禾深同來觀稼憇𣗳下把酒一笑髙槐隂天公成事乃爾易一雨變作豐年金田家耘耔心未已當午相㸔理荒􅁾鋤端信有三寸澤更為禾頭添粒米自憐微宦西復東且喜所向無災凶丘民得所能事了我禄雖薄亦已豐老農堅話使君恵我曰論功歸太空天子仁聖感召和氣致時雍黄崖行黄崖峪深能幾許殆似赭餘無足數寧知竒石産山腰一脈砌如縈綬組青章紫質含玉潤錦􅄢斕斑驚製縷楚雖有材為晉用山節星馳來厯覩簡書専摘正官臨敢惜筋骸甞險阻褰裳上下谿谷間石角鉤衣互撑拄是時秋暑八月交背汗浃流氣烟吐班荆坐憇還自笑汝是愛山王判府守官四載愧無功今次於公竭肱股役夫分功日有程荷􅓩持鑱編什伍摧堅抉礙先墓脚不假鞭驅矜智取風埃蔽壑散雲烟巨石砰崖轟戰鼓不遑蠟􅄚阮孚逰真作伐山靈運舉老翁炷香適何來冄拜向山親呪詛溟涬􅂊分有此山其在晉邦羣玉圃山靈萃秀不自􅃷埋沒荒山幾風雨材為世用出有時一旦承㤙藉君武漢家制度陋嬴秦大起明堂朝海㝢堂堂天策干維城建國分茆開雍土正須壯麗稱王宫不爾何能為萬舞我今問翁汝何為扶杖丁寧前致語翁云匠業居此山薄伎傳家自吾祖我雖垂老喜見此側陋明揚遇時主夕陽欲下山更好疉巘攅峯争媚娬人為物蠧固亶然石兮石兮今玊汝曲沃道中與老農語大尖山前好原隰隴畝横縱忘南北人家種麥秋社前一涉蒼烟朝雨溼田家稍豐即昇平十年逰宦初無成㑹須了却人間世白髪歸家伴汝耕新道成車中即事蜀山天險古所畏少陵有懐真宰罪壯哉此舉見成功一日連峯驚破碎老農傴僂向余言所謂一勞而永逸相攜徑下弱羊顛鳥語山容兩豁然牛箱籠負連連出坐看輕塵抹白烟金店馬生者贈余峴山圗走賦是詩以謝之平生愛山復愛畫近嵗長逰石林下暫還大府宿金城喜得馬生同夜話共云馬生非畫徒見來情性温而愉坐間贈余峴首畫江山秀潤與馬俱取之非云奪所好開卷即與馬生對坐隅物微意厚將何答走賦新詩當乗珠山中礲研歌寄商左山副樞有石有石玳瑁色逺出姑山兩崖側我來伐采偶得之玉潤金堅駭清越海霞蒸發爛朝暾蒼雪糢糊㸃晴碧石中乃有此理存斵就庚庚𤣥色璧又如神龜負山出淵水偃仆沙頭曝秋日山中長夜有餘暇老眼看書苦無力挑燈礲洗愛竒章憑几坐餘腰膝屈書生習氣老不除筆研留心朝復夕自憐持此果安用欲擬三冬文史畢呼兒起視夜何其斗柄参横揷東北題董少平廟壁湖陽蒼頭虧政刑湖陽新貴帝女兄漢家三尺有成約臣宣守法身為輕直前取奴縛車下洛陽一市為震驚大奴走匿魄已褫小奴側足回輿行含悽入奏温明殿後漢殿名萬乗起謝難為情祗知強項古遺直我愛世祖英而明一丘荒土青山道下馬陵前拜秋草應笑權姦百鍊剛比比柔荑指堪繞吳娃行至元十三年丙子嵗冬十月廿八日亡宋皇太后謝氏次衛州唐津渡是日即舟行東下故有是作元年長星竟天芒謂至元元年也十年而後江東亡元城老嫗忍不死奉璽北走朝天王内家監領分嬪嬙魚冠髙髻猶宫粧翠衿縞袂不曵地言語無異甌閩傖南來初渡鍾山江羅襪去踏燕雲霜風塵千里河朔道惨淡粉黛無晶光憶昔掖庭初選入十五十六先後行深宫花滿春晝長芙蓉水殿薰風凉朝儀雙引垂紫袖珠櫳曉侍熏籠香祗知螓蛾一生花裏活眉嫵老學吳山蒼一朝兵合景陽宫故國繁華佀夢中兩宫問寢紫宸仗往事盡逐江煙空黄帷羃野待水次郡縣䕶送浮航東萬人山立看且嘆亡國大略今古同太極殿前天子班玊觴上夀頳龍顔柴家母子何負汝賜與僅免飢與寒悠悠萬事不可必天道好還歸有徳就中此理誰㑹得蓮花峯下髙眠客鎮州懐古吏部聲華山斗重身處平時若無用積年王湊失臣度諉使賊庭撩虎閧舉朝嘆惜誠不測天意中間表竒節血衣滿前盛氣臨一語未畢兇鋒折鎮人萬目矚使華五紀得瞻唐日月嗚呼蔵器於身利有餘不遇蟠根何所别周卿二子歌周曺兩家世系長伯仁之徳再世昌諸生詵詵見身後不數謝家闌樹芳大兒讀書書滿箱小兒竹馬青衫颺掌中瑜珥生輝光紅㸃杏蕾争晨粧外家碧冶東西堂金粉滿貯芙蓉香今冬書來召歸省要畫百子春池塘伯仁有靈亦含笑紫川淵流殊未央紫川淵流真未央冬十月朔展墓回有感新壟多故人少野祭蕭蕭滿荒草十年重到故鄉山前日児童冠佩好我時引鏡還自憐五十衰翁能不老正須萬事聴天公不用時情生熱惱流行坎止即吾師試看古人誰盡了簜樽歌海居兩間勢雄尊地維大荒足怪珍春雷奮蟄地軸裂氣雄簜木驚輪囷雲蒸露濯玊幾圍癭異不數蒼筤孫洞蜑抔飲變古法欎屈斧斷蒼龍根一朝六鑿混沌竅海潤猶帶風濤痕初疑神螺闖首髻鬟古復訝凍芋出土鴟鴞蹲坤隅古非禁酒國桂醑碧㶑滇池春木蘭花發雲鸚囀野飲挹彼供鯨吞江妃竊弄山鬼㸔深夜嘯擲吹燈昏炎洲北走落君手孝節閲世清而敦廣平磊落書載腹時浥妙理開清樽金罍玊斚非我事正須一日不可無此君殷彞周鼎列左右碧花縮澀腥龍紋簜之為尊尤可人蹇予蕭散稽劉客黄壚乆為河山隔來逰都邑徒永久若戀明時無寸策新豐樹色繞千官滿馬京塵歌偪側何時為渠醉倒花底眠一夢婆娑竹林國西京王生歌君不見西京王生一布衣游談公卿奚事為解紛畫策作隂助顧盼勢利輕塵泥廷中結襪似倨傲一語能釋當時疑惜哉太史偶失世與諱至今義烈猶光輝乾坤英氣初不間乃今復得是子趨人之急逾己私襟期在在許諾重駿足肯受黄金羈凍雲曉拂銅駞陌雪花澹與梅争白平明東閤給事回家近沙堤儘春色新詩吟繞錦窠香笑作平原眼中客人生百嵗駒過隙只有聲光為可惜丈夫適意杯酒間義氣愛君多感激岷峨秀色錦江波萬斛醲薰貯胸臆綱紀都作濟時具辦與朽株為粉飾吹嘘寒律變陽春未讓王生謀緩急君家義鶻固有歌更為樊川摇醉筆秋澗集卷七欽定四庫全書秋澗集卷八元王惲撰七言古詩
