front:
  text: 公論書序嚮伏觀所類諸賢法書平生所未足於焉盡償公云如楊少師維摩等帖天真爛漫上法二王下與魯公争衡至從心所欲皆寓正筆而不踰矩所謂出新意於法度之中寄妙理於豪放之外知此乃悟涪公云余書不可學學者輒筆愞而無勁氣似非虚語也因復出坡公所書寒食詩二帖方之在顏楊兩間蘇黄為入域之賢爾嗚呼古人不可作所得見者書蹟為最真今吾左山商公掇拾於二十載後剔去纎妍而留精偉復始終條理俾金聲玉振以集大成是又智者之事諒非禪中有眼者疇克辨此邪第恨不得時時聽教以盡古今之變㑹歸其極耳然歸裝翩翩已復稇載矣至元二十年四月六日書於所寓壽宫之道室
