body:
  text: 上己日林氏花圃㑹飲序四序言讌氣有慘舒不無哀樂從違之問維暮春元已物華澹豔極夫舒樂者也故昔之人迓續維新祓不祥於川流之上其來逺矣然例以三日為節縁不克與已㑹者蓋尋常焉今歲人和氣稔適與已契又可重也不揆援永和之舊例嗣舞雪之清音徴賢合友禊飲林氏花圃尋盟而至者凡一十二人於是登野彴酹清波折桞板楊袖蘭採藥歌絲問發羽觴交獻不數行四座紛然迭為賔主酒既酣秋澗老人繼以栁圈新唱詠四者之來并喜三樂之同集揚觶侑賔傾冠倒佩不知其不可也己而客有稱於坐者曰昔㑹稽諸賢禊集雖雅未免因述梗懐俯仰今昔動終期盡歸之感今吾與子一攄底滯増暢老懐顧知已而無雜賔聆歌聲而免詩苦以此方彼疑若可繼樂有所踰也是不可以不志明日弟忱輩來觧酲首賦佳篇乃以其序屬予予亦以㑹鮮離多樂之不易再也筆泚餘酣率爾而作時至元二十四年歲在丁亥甲午日也謹序編年紀事序史書浩博殆藥山然用之不盡取之不竭苐掇之者不易區别編記之書有不得不作者然務博者或詳其不必書從簡者至略其所當取斯蓋漫然中無所主故也大抵觀史者湏當見其一代興衰之自要本不出君與相好尚治忽而己如賢否之用舍治亂之所由生刑政之寛虐民情之所從易安危之機㨗若影響此理之必然也是皆吾儒法之而為明時治平之具者得不詳且備歟若筆之而無所用則上下數千載之事績特斷爛翰報耳廿一年余觧印西歸休焉而無所事日纘相務為業編年者尤不可斯湏而去手遂與韓生宏因其舊編増而廣之事備於前統明於舊若夫世主之御天接統輔相之登庸宅揆前後繫屬一不敢闕所謂該天運之盛衰者則思過半矣明年冬既斷手生曰増輯之意不可不序諸篇端吁吾年尚耄前日所進今日不覺其忘小子其秘之於以備吾家藥籠中用可也時則二十四年丁亥歲夏仲日序王氏易學集說序先君思淵子昔掾民部尚書張公諱正倫字公理曰引一叟連榻坐與之問辨甚欵察之蓋講易經㫖也每叅署已輒抱牘傍侍張公曰汝亦樂聞斯乎曰唯自是日熟所聞遂潛玩焉造次顛沛樂之而不釋也北渡後遇玉華王先生復得窺其門牆而覃思焉既而有問答理亂之說玉華子訢然曰推是而進何憂乎不造夫深奥也然專静之功不可以不至藏往知來實本於此吾子其志之既而家居屏逺人事取歴代諸儒所傳探㣲賾妙日一卦為業真積既乆静見之心遂大以肆曰吾老矣非述何以見於後示子孫以大受也乃紐節羣言使如出一手辭約而意貫諸家之善蓋無餘藴矣嗚呼易之為書三聖人憂世而作也其道有四互為之用然身外無可論之道道外無可談之理天理人事不出乎日用行已之間而已是書之集四者其列要以近人情為本使學者切身以求用易知而不雜其於易道庻彬彬然有煒矣不肖今亦向耄先世庭訓墜失無緒大懼夫不學而衰也乃沉潛是編冠修述之意於篇首仍題曰王氏易學集說使後之來者知先君學道立世其博文約禮有如此者小子惲復續所得以綴於後蓋先君所未見也庻幾五十家之說左右逄原矣至元二十五年戊子春二月一百五日序送信生士逹北行序勾呉之分豫章之野有神物焉雄雯隂縵世不多得佩而服之可以檢非常而走光怪礪而用之可以决浮雲而開白日當其鋒鍔翳昧沉静於幽圄之下然衝霄之氣不自逹於斗間雖有精鍳愽識之士安得佩服提攜檢非常而神利用者哉君子之仕也上需志於逹而後可以見於用用則先其材之云何而後其時之利與否也逄乎辰而匪其才何克應事機而成吾務負其才而艱厥時吾固知攸徃而終有所濟矣故伊尹不以其時而有間於所行孟軻氏不為齊梁不吾與而必意於速去何則天之所畀於我者如是我烏敢自棄不力其在我者焉奚暇計其可否俟彼有待而後我為之應哉士逹少問學於予嘗以政試於諸生間惟士逹知所以對當時己異夫姿之敏志之逺到也厥後敭歴州郡果在大受直罔怠其事者之列及例歸河東又見夫居養有得器藏諸身與時消息者蓋素所積蓄耳斯舉也又非底滯於下求逹於上方試用於公卿之間也顧時與仕吾無所慮矣然理有所當燭者試以吾嘗從事於斯者告之夫仕宦雖或巧拙而其問有容力不容力者彼自然之來吾順受而安之是則力之所可必也吾分既爾吾行足為即其所受而充其義之所至是則力之不可不勉而前也所勉者何用晦而明以訥為辦竭誠心於所事見實用於當行察其機而發人之幾通吾滯以逹人之事不以資之㣲卑為嫌不以與之依附為得盤桓居貞以俟夫君子之大受何患乎聲名之不昭事業之不顯而著也於其往也故書以為贈禮部尚書趙公文集序至元丙子夏五月予考試河南道出臨汝館望崧樓下經宿歴覧後圃縱求陳迹所謂汝海虚舟者於蒼烟老樹間巋然獨存因得防禦趙公亭記於壁問倚杖披讀者乆之令人想見承平官府之盛惜公遺文不多見也後七年予自齊還衞日與公孫維宏杖履徜徉言笑者無時一日出耐辱集一編示予曰此先祖通奉君之遺藁也予請而讀之者數日得辭賦古律詩及雜著樂府等篇若干首其氣渾以厚其格精以深不雕飾不表襮遇事遣興因意逹辭畧無幽憂憔悴尖新囏險之語信乎太平君子假樂有餘而神明與祐者也維宏遂以集序見屬予曰以遺山先生之論之詳此固已為之足矣然士君子之學文章徳業名為兩塗其實一致有以事業而垂世有以文章而名家者傳曰我欲載之空言不如見諸行事之深切著明也吾儕孰不欲得時行道使利澤施於人名聲昭於代蓋有幸不幸遇不遇者焉如仕宦利逹復擅文雅以事業盛而揜其所謂文者從其重焉可也若文彩絺紩竟不得以片善及物者其或曰若何克為一文士而己此真為妄人尚何知兩塗一致之理者哉既為其序且寓夫予之所感云先生諱斯文字庭玉明昌五年進士官至通奉大夫禮部尚書初河朔雲擾公流離兵間挺身歸國遂為徳陵所知故其仕宦通顯而為兩朝名徳一世之龍門者云至元戊子秋八月朔旦謹序宫禽小譜序三百篇之作風人多引物以比事或託物以發興其氣類情性學者不可不識也是謂致知格物之道十一年江左平宫籞禽玩畢逹京師戊寅夏予待制在京師獲都諸禽於㑹同館之西位者凢一十七種誠有可愛而當識者厥後珍禽奇獸陸貢川輸歲相望於道彼𨽻鳥官入上林集萬年之芳枝䝉天顔之一盻振羽和鳴固有喙同而如瘖者矣其為物不可為不遇也因念九州風氣各殊其所産常異有無亦然非遍遊歴覧有終老而不識其狀與其物之情者况來自閩廣之逺乎㐲見近年求訪嘉士車徴幣聘歲亦不絶其或抱負器業谷耕巖隠偶不及時賢之論者未免阨窮遺逸反不若斯鳥之採擇薦進光耀如比之幸且遇也至元廿五年戊子秋八月壬戌偶逄江外鳥使因追作宫羽小譜叙其所觀而識者今列於後秦吉了状如大鸚鵒毛羽青黒色閃閃有光翅兩稍皆白翎耳與人肖耽腦上相答及喙距皆黄色聲雄烈善作人語蘋茄兒形状毛色一與白鸚鵡同養者云性極乖戾尖尖帽灰緑色形如燕許毛頂上銳下豐高約一寸故名百舌兒状如􅀈略同毛羽蒼白花色江南三月問盛作聲今四月尚未鳴蓋北方地寒故也白頭翁状如䲳色純白喙距皆青頂毛冗細蓬蓬然上起故名桞鶯純緑色甚嬌可愛性靈如黄鶯其状差小切倉子一名鐡觜兒毛純赤褐色状如雀鳴聲啁啾調之能頂負紙殻介胄人騎像放一欄内分兩陣作衝撃状甚馴狎也相思兒灰赤色状如小雀白鸚鵡一其大如鳬𤣥鹤二比常鹤差撡極清癯金絲雞毛褐色上有蒼斑細文疊積如雉鷹尾翅末秀翠金雙團花絶類孔翠聞他鳥鳴皆能效之水老鴉形高大如鷀體斑斕修首如卵形喙尖長蜿蜒俯仰絶與蛇類爪掌則鴨也疑烏鬼即此也花鷺鷥褐色中白毛紛然問出長喙趾青緑比雞差又名曰嘌小鸕鷀純白色黒喙青足但其頸骨状曲折為一曲料哥形毛全是鸜鵒其光采濯濯然丹喙人耳作梔黄色耳後有黄眉兩抹上連於腦能作人語喜則兩耳開聳烏雞骨與肉皆黒其蒼者亦然送薛參軍北行序承宣供億莫司屬為切然户鮮而居衝俗囂而不知教制於上而梗於下誠有所特難者焉又恒人之情視難易為行不乘初以取其名即傍縁以徼利苟安依阿䕶養資歴愒日以俟代而已丹陽薛君彦暉由藩府掾從事於斯者四十餘月為人外簡樸而内亷能供王事理民訟直而有方雖當急遽二者並行而不相遺自始迨更猶一日然其邁迹尋常立於能者之行卓矣惜乎心儘公而罔間於易難用有餘而不遑於風化因念令便於亟行化安於永乆苟使民知義方其趨事赴功有不待致期而然者倘教有所未至俗有所未醇能者日鮮不能者日衆而供歴事理政務固不得一日曠第恐物情治宜兩有不自盡者此昔人以化為先而令次之師帥者又化令之本也安得惟良如薛君者百有餘輩俾用焉而顓靖嘉治焉而有餘裕我不以徒法為政彼不復顧難易為心事雖衝而亦辯俗雖囂而可醇方之亟便特緩夫前後之間然能使物情紓而政本固官有儀而民不輕民不輕則吾之令行将見如流水之源矣不然使韓范復出職思其屬處簿書米鹽間雖終日無倦亦且有所顧矣薛君行來辭飲之酒再拜以送言為懇因書此以贈庻幾條治宜者聞之亦将有所頷焉廿五年戊子冬十月晦序贈日者張翺序隂陽家者流秦漢以來如五行堪輿建除叢辰歴學天人太乙等書其目雖多及臨事占决各開户牖吉凶得失互皆不同故漢人類以五行主之予因究其理而為之説曰夫太極判而五行具五行具而萬物生一物而一五行也纔有所闕物不得為之物矣静而體動而用剛柔迭制而吉凶生焉矧二氣良能以不測為神人於其問亦一物也吾何以逭其為術也天人之際有未易知者得之深者其理明索之淺者其説近又世道下衰人不安分以狂妄横於中徼倖鶩於外貪者以苟得為心狷者以速逹為念詢其命曰吾此去可亨相其時曰吾今年可動彼知其然即順情悦意售其術而已我審彼䛕竟沾沾自喜圖一豁隕穫為惬是天理兩滅而人欲肆矣嗚呼風俗之移人也如是可勝嘆哉有張生翺者姿甚高業是而志篤語直而不隠觸數知變若夫誇嚴苟售其術而已者挾是游行州郡億焉而多中故士子往往與之顧接在翺固亦榮矣雖然吾将進翺於學鑪其粗而造於精資之深而遺其淺不為世俗所移不以虚高務悅習其所已能知其所未至其要安在道其在於是矣能此将見聲光四白義置百錢坐來衆問不愈於行而求其售乎翺曰唯有是哉然行襥已且敢扳康節之例願先學於四方可乎於是書以為贈星丸漏詩序司録判官趙寓到任之明年置星丸木漏於衛之汲門上仍繪彩為圖攜之來謁再拜請題辭於後予以為政有緩而似亟事有㣲而實著者更漏是也雖因象制器特挈壺氏一士之職也然天地朝昏我則司之官民勤息我則警之上而日月運行於三百六十度之中外而二氣渾淪磅礴於三十七萬里之表使不出於五尺之帡百有餘丸之數非格物善政者其能之乎予向官平陽亦嘗創此以考述測騐知為匪易今司録小秩也首此為務舉行廢典其儀物有足觀者是欲勤政率先因器警民者矣然年少氣鋭當筮仕之初能推廣是心始終罔間則張希顔以夜漏分明等數事得稱為好官員者恐他日不難至矣至元二十五年戊子夏六月入伏三日題淇奥唱和詩序心有所思思而有所言託物以永其言者莫詩若也曲山河君尹南樂終更将歸西山舊隠以吾故道税駕鐏酒談笑杖履游從日夕不少間既老日閒心無運用感物興懐情有弗能已者即作為歌詩以示同志顧不揆乃相與更唱迭和參積日乆遂成卷束總得詩大小凡若干首曲山慮其散亂遺逸欲命劉生琛第而為帙且告予以為何如予曰彼王公大人羈旅草野之士遇其志得意滿與夫幽憤無聊見於詞章者多矣然未免有豪宕夸毗之意幽憂憔悴之状吾輩不過道閒適安命分遣興寄詠性情而已又非欲示之他人俾後之來者萬一視所履而踐厥跡安知不有撞破烟樓者乎已而客有謂吾等不以有用為心而廢日力於此為可惜也予應之曰不然是将俾予守兎園之册耶削汗簡之青耶抑欲續太𤣥之經耶客笑而不答於是乎書以為淇奥唱和詩序老子衍義序壬辰冬予應聘至都既館壽宫嗣教𤣥逸張公與一杖者相陪來謁須眉皓白氣貌魁偉敦兮其若樸聽其言冲冲然殆有所深藴隨見所賦詩顧非澹泊忘言者尋西還求辭方知君為重陽公主𤣥學師也既而其徒執老子書請見稽首再拜為致師求序取重之懇避席拱立需命而退因勉為説云天下所謂聖人者以其理之所在治從而出焉舍是何所望於著書立言者哉然聖道溥博該貫羣倫其為用也為天地立極為世主明道要不過以静制躁以簡御繁以真黜偽以樸還淳以正息妄以公去私以理勝欲以法防亂而己惜也老耼氏濳輝柱下不出於文武周召之時當王道中㣲禮壊樂崩仁殘義缺之後萬偽竝作猝莫能觀其復思逺駕沙流高出物表抉天機體𤣥化吐辭為經闕憤激自成一家之言庻幾廓清澆偽再造堪輿之謂歟雖然矯枉者必過其正迨夫末流仁智異見户牖各開曲暢旁通肆為駕説養生者以乆親為心尚𤣥者以清談為樂宜乎晉史譏王政之虧知幾㸃河公之注今王文蜀産皓首𤣥學獨能㧞出衆流問索正政根於治平者為多無乃見幾而作由儒而逃墨者耶因特樂而序云玉淵潭讌集詩序都城西郊佛官真館勝槩盤鬱其問有潭玉淵蓋丁氏故池也桞堤環抱景氣瀟爽嵐烟瑞藹霑漬襟袂方秋是焉横陳都人游觀誠為佳麗財賦總管王侯明之尚義好客高出時彦甲午秋孟置酒潭上邀翰林諸公為一日之娛既而雨不克成懽是月晦復折簡來召用尋前盟也簪舄既集風日清美紅幢翠蓋間見層出天光雲錦澹灔尊席沙鷗容與於波間幽禽和鳴於林際若有以知野老之忘機代清唱而侑觴也酒有饜飫賔主胥樂煩襟滯慮頓然一醒清適夷曠綽有餘思然賞心樂事良難四并雅㑹清吟烏可多得信口吐詞不計工拙諸公走筆賡和咸有所得殆山隂禊事之修幽情暢叙笑金谷羽觴之罰酒數何多苐以率爾居前殊愧其粃糠也八月哉生明序易解序易之為書廣大精㣲範圍乾度經紀世道以一理而含萬變辭雖有盡理則無窮故說之者吹萬不同仁智各異要以修辭通變近人情關世教為切練師李公嘗謂予言監丞張君在河南為衣冠清流多藏書得前代以易名家者數千種早治其學精占筮術比歸以藝能得官如支離覆逆建除叢辰等伎有不屑為者於是廣詢博究師心自斷集易解十卷於以抉聖心而明素志駙馬高唐郡王天資英明雅好經術一覧偉其述作勤至發題篇端有正大純雅本乎仁義與經㫖不殊其於世教大有補益命藩府板行賜觀中外者無慮數百餘帙用廣發越以表其志尚義山來屬俾序其事予謂古之君子立言垂世必藉王公大人為之主張方能信其說而傳不朽如曲臺禮經由獻王而明遺制毛公詩傳得河間而置學宫今張君遭遇賢王得成其美将見與大雅不羣之英異世而同談者矣至於淵源之傅授辭理之深奥讀者自當知之又何俟見賣鬼而設喻遇俑人氏而致問者邪元貞二年冬十一月謹題天徳柴氏悅親圖詩卷序昔四子問孝於孔宣父雖因材而篤所答各異不過使親無所憂怡順顔情為難鄒孟氏復探源推本論臻其極曰此身能誠則親為之悅矣意者謂倘違於理雖奉承之至溫清之勤日養三牲猶為不孝如其愛敬交至氣和色愉則菽水乃盡其歡矣在孔孟時去古未逺垂教警俗亦復如是况天理斵䘮人欲横流於千載之後哉天徳柴氏上世為邢臺堯山人後遷絳之曲沃逺祖有軍功以鐡劵賜其家祖諱堅金季仕至将仕郎裕州萃縣尹生子懋字秀實以世故復徙居於豐治家接物廉慎有法推其嬴餘尚義好施鄉里以善士稱今壽登八秩有二配邢氏壽七十有四生四子長曰伯璵次仲謙仲玉仲祥伯璵天性孝友善治生與人交誠慤有終始慈祥愷悌見於顔間清淡不樂仕進惟致養二親友愛諸弟為務至一門之内上下安宜和樂且耽憲司亷實開於朝榮加旌異嗚呼世之貪狠無頼不顧父母之養且貽親憂與夫所争僅毫髪比更相媢嫉視同氣為㓂讎者聞紫氏之風亦知其愧赧矣雪堂禪師雖處方外素樂君臣父子之懿喜從吾徒遊以鄉里盛事乃繪諸圖畫形容其歲時家庭拜慶之歡将求館閤名卿見之歌詠以序引為請予為說以勉之曰方今孝治光隆仁風徳教洋溢海宇臣民感格理勢應爾然雲朔之俗素號雄勁以氣義相許今論其孝友之行固當以柴氏為稱首復能如孟氏所論誠之於身詩人所詠不匱永錫者而致力焉将見化儕類而美暢彜倫觀人風者簉名於史籍矣以是為贊倡之始云清香詩㑹序道不同謀咫尺兩間𣺌隔千里心有所㑹上下八方溥同一雲法性三藏宏教佛智大師江浙總統沙羅巴者聞予名而喜之不知於渠何所取也一曰介應奉曹顯祖來約以清香閒適與同一㑹於是開禪室敞賔席蒲團烏几列坐其次佳醸數行意甚怡悦主人出實薰娛客溫鑪回春楮煤凝雪牕日含暉岫雲借潤先之以青桂繼之以緑洋糅以熟結加之都梁棧融沉爇氣鬱膏煎黄雲作穟碧霧濛筵吟佩未染鼻觀先參或袖籠而斂瑞或心融而氣宣於是健詩脾却蒸濕燕飲助其清勝志慮以之冲粹不知佛齊勃泥婆律大食真臘占城而相去幾何通為一洞天也衆客稽首向師曰今夕何夕餘膏賸馥沾丐如是有不可思議者第恐造物者訝其多取而饜飫也師日庸何傷且吾之為香者衆而心香為最曰戒香定香慧香解脱香解脱知見香是為五分香天之所賦於我者如是而馨解脱知見為妙用之極即諸所謂天生蒸民有物有則民之秉彛好是懿徳也貴夫能復其初而為物之靈也願此香雲徧滿空界作為無量佛事以奉五老香供且合三百五十歲之壽祺傳初庵七十五雷若齋七十三閻静軒六十三王秋澗七十一賈評事七十而為無盡藏說法不亦可乎於是衆賔讚嘆曰昔逺師以廬阜清勝即於東林結社絶塵清寂之士不期而至者甚衆諸人於逺遊止獨淵明范寗召而不赴豈非有不屑者哉以今論之殽雜一也心有所局二也香色執著似累乎中三也何若師心境雙清賔主兩忘不知我之為香香之為我也而以心香為主也師曰有是哉遂相與一胡盧而别大徳元年三月吉日謹序送丁主簿南還序古人以良能竝稱欲以善而将其能也不然豈惟敗事亦且有害於而身此必然理也丁生元諒主榖城簿之明年以事抵衛來謁有頃避席而言曰敝縣僻在漢南事雖簡山甿獵户氣甚鄙悍思有以教廸之於是請書其廟學殿堂門廡等額乃曰歸當辦茲一事先此之作用碇余初志耳遂授書沾沾而去後七年冬十月復見吾於京師曰嚮云而廟而學者今已落成且有加於前及出馮雪崖所撰學記讀未竟不覺慨嘆曰一簿力之專廼致如是非有志能然乎雪崖吾熟其為人慎許可記中件右恐匪徒言雖然年少氣鋭乘勢作事似或不難至於知喜其事而不虞其中顧其近而不思其逺無後悔者鮮矣况能保已成之功而享有無窮之辭乎又嘗聞士之當官公心多而取名薄者設有過舉往往人怒而紛解汝今此來遇非常之恩千百人不一二值其為幸不幸誠不敢必所當念者此心不使有一毫之私可也丁生其勉哉如以吾言可取念之戒之将見悔尤日寡良能並著何患乎禄秩之不吾至也既行來辭書以為贈是歲癸已仲冬五日序兌齋曹先生文集序北渡後斯文命脈主盟而不絶者頼遺老數公而己夤縁䝉元李諸公與進親承指授惟貽溪兊齋未之見也及調官平陽私竊喜幸雖不獲瞻拜履綦而遺文得遂觀覽迨識公仲子輗首為詢及謝以纂録未就然徴文獻論家世而私淑諸人者固以昭昭矣先生父清軒公資豪邁以文學起家受知榮國高公雷李諸賢交遊甚欵先生接迹詞林㓜知力學早擢巍科既而與遺山同掾東曹機務倥偬聞商訂文字未嘗少輟至以正脈與之其奨藉如此後居汾晉閉户讀書屏去外物嚅嚌道真及與諸生講學一以伊洛為宗衆翕然從之文風為一變後二十年予在翰林前長葛薄子輶持遺編來謁屬予序其端方得伏讀者再四不去手者累日因為之說曰文章天下公器造物者不私所畀然非淵源有自講習有素力為之任者未易與議若先生之作其析理知言擇之精語之詳渾涵經㫖深尚體之工刋落陳言極自得之趣而又抑揚有法豐約得所可謂常而知變醇而不雜者也所可惜者古文雜詩僅三百首蓋先生年方不惑瞑廢於家又為人慎許可片言隻字不輕付人嚮使展盡底藴大開文竇極其所到肆波瀾而侈光豔則與元李麻劉竝驅為不難矣異時版本一出學者争先快覩俾中和之氣沖融粹盎裕四體而適獨坐如太羹𤣥酒寄至味於淡泊者庻幾先生之所尚云不肖衰老懶於筆研敢直言所聞見而知者以塞其請焉大徳二年人日謹序秋澗集卷四十二欽定四庫全書秋澗集卷四十三元王惲撰序
