body:
  text: 滹沱流凘行馮征西傳云世祖自薊馳至饒陽蕪婁亭南渡滹沱入信都王將軍霸稱氷堅可渡處今鼓人指縣東北龍華鄉故河道曰全渡者即其處也且以饒陽取直趣兾其經皷縣東界無疑但河自遜國庚午徙縣南行流問諸父老云今七十有一年矣春秋鼓聚在今縣西五里廢城尚在今曰下曲陽者是也至元庚辰夏余按部是州士子張春卿者請余紀其事因為賦此王郎何人著柘黄欲與赤伏争翺翔漢炎中斷天復熾肘後頑石胡為光蕭王揮戈指幽薊戰血滿野風塵蒼募兵返得市人噱當時南馳亦蒼皇鳶鞮城東滹水長北風烈烈天雨霜前驅候騎兩失色河雖流凘無可舫菟肩麥飯未下咽大氷横水堅於梁古稱王者阨不死淮陵一言殆天使赤龍已渡凌四開白魚躍舟未逾此壇亭王氣如水清妖氛邯鄲死灰耳彼蒼有意開真主固令若輩先驅處君㸔隴蜀最健者一旦等蛙終漢虜王郎區區安足數蒼茫此日龍華渡漠漠野煙生緑樹留在長河閲世人萬古朝宗浩東騖布榖辭按部饒陽行次劉楚馬上聞布榖偶得此辭平卯寒凉朝雨溼耕壠離離引繩直一聲布榖動前林臺笠相望竟朝夕良苗芟芟入我鋤結舌深潛緑隂密田家衣食仰堪輿一勤之外初無餘嗚呼禽鳥司農務勸課之吏當何如惡䲭行有鳥不世用其名曰䲭鴞前林崖窟黒飛鳴假狐妖啄食公私間遼野為蕭條嬉飽摩髙空逺觀聳盤鵰不憂穴破老妖死惡聲向人恣喧囂正為腐䑕嚇虎鬚無廼撩病鶻困孤撃霜秋此其朝我病非若飢我困非為調跕跕乗兩翅坐使窺雲霄老拳固有利不利搏逐之志常超遥倘不與之䕶返為物所撓主人一呼良未報不縁自獵矜風標㑹當攫犬惡併驅若類直出六合分鸞梟錦鞲脱落青絲絛鴻雁歌膠船幸脱長河津朔風惨惨吹兵塵天摧地圯岸谷易骨肉離散如驚麕吾宗積徳僅不死有淚空洒天街雲歘傳伯姊落斥漳女固有行逺弟昆怙恃既失寧復得得見女壻如見親最虞身在墮羈彀彼此契闊尤酸辛裹糧物色不憚逺西走懐洛東嬴秦眼穿足繭幾萬里歳月荏苒三十春朅來古鄆天假便鴻雁遽接秋風羣相㸔喜極淚如雨恍若夢裏招離魂軒軒喜氣溢須眉此事希有争讙聞金鸞誥書五花文紫藤肩輿繡羅茵馬君初非羡此樂一念有在明天倫君不見守真禄養殆常事慎矜母奉宜相隣髙平王氏觀津馬兩族丕顯全親恩更因識姊表宗系衰俗乃爾逢斯人為君濡毫紀孝愛長使竹帛流清芬健兒歌贈李裕卿南來見君喜殊常不為秩滿身精強掌中擎出一珠新大覺門户生輝光此生抱㺯萬事足晚景雖迫心無遑頭圎骨緊眉目爽已解顧語呼爹娘阿宜自是樊川秀剰備詩書滿百箱贈滑州龍教授取新蜀山相繆欎蒼蒼龍君來自西南方馳聲場屋少年事筆底秀色翻巴湘滑臺一落三十載冉冉青鬢今秋霜勅書在手無所得坐老茅屋青衿庠朅來聞君擅術數萬有飛跳天星光方圖據説窺藴奥解我中熱心遑遑又聞天人本一致物欲將至先開祥紫垣昨夜動光彩進賢奕奕三台芒書生薄命何足道此去蒼生得少康馬天章畫廬山清曉圗平生愛讀廬山髙不識廬山何面目眼中忽墮此山真萬疉蒼烟彭蠡曲江南地卑苦炎蒸暖翠濃嵐氣多欎馬卿幻作清曉圗特為千峯濯秋骨恍疑坐我瀑流下净盡煩襟貯清淑何當杖履東林逰一樽共吸江水醁放猿詞霜林萬果翻朝紅老狙夢到秋巖重幾年胥靡辦兒劇物失本性心為忡主人誰似俯仰翁放之逺野將何從封龍雲深洞穴暖東山之西西山東衝煙嘯月恣汝嬉曉驚無復山人扉歸時物情喜兩適豈為爾心知不知田家謡君不見紇干山頭雀翔集止其所正縁生處樂凍死不飛去人生重鄉情疇非戀吾土丘壟葢世守耕鏊自父祖一旦委之去倉皇事羇旅豈不知朝辭弊廬空暮宿何人塢身負逋逃名此别心良苦我本耘田客挨排為主户嵗無儋石儲日有箕斂聚刻肌醫却眼前瘡肉至無剜瘡愈腐支持非一朝窘至空捶楚東鄰冨室日優㳺西里豪家厭温飫平時皥皥等王民一苦一甘遽如許兩淮悠悠田四開差徭不及無天災比之老稚轉溝壑一飽而死猶春臺水深林茂魚鳥樂此雖古語為時哀可堪大府督州縣親臨之官胡為哉我初聞言為嘆息天網恢恢疎不失只今六合混一家此雖逺逃何所適但思逋負洒餘民似此催科轉疲極素馨辭并序五代漢劉隠女曰素馨死其墓生花甚香因以女名目之後人削降香作薄採以此花蒸之及爇比本品極清逺無濃重勃欎之氣顔公仲復謁余試之誠然作是辭以紀其異紫檀為屑世所珍降香變體吾未聞漢宫有女號素君殁而墓花香若薰降檀氣味多濃鬱蒸以素馨清且淑顔公袖出赤龍鱗入手如游衆香國夜深一炷雲滿室素馨之魂降鶴骨君不見西施苧蘿山下子膏沐深㤙轉清美一朝吳亡隨范蠡隣女效顰終莫擬素馨得名從此始宣和寶墨歌宣和殿深春晝長老徽宸翰昭回光墨卿入奏少許可追逐五季参三張猶卑古法出新意萬笏細搗和龍香宫鴉借色翻朝日三十六宫香霧溼鳳飛龍舞九天來雙影盤盤落𤣥璧流傳人間今幾春顔公得之知所珍有時一勺試龍溪翠研霮䨴㸔𤣥雲錦囊舉世為寶玩何知尤物反玩人以兹過客自有屬重以連璧輕埃塵龎眉書客秋澗子老不進道伎乃伸右軍筆端有陣法需此甲盾方通神作歌一笑師應聞寳鼎歌贈開元僧法恒僧回來自勾吳天袖攜寳鼎心欣然逺遊萬里無長物愛此古色暈碧玊有烟土華千年不敢嚙夾底錚錚堅比鐡雲雷繞腹走神光兩耳孤撑伸蠖屈我初驚見心魂動老眼増明喜生頰憶在玊堂觀博古此鼎依稀冠周譜摩挲龍欵四十九王自成周徙居楚細㸔云是季妘彞享錫臣夌無乃祖君不見殷盤夏鼎今何有此物區區厯年乆供佛牀頭夜壑深一旦胡為落吾手斯文三代周為郁孔意姬情子素守嗜心既至開有先夜半燈前負之走僧恒拊掌喜有歸却恐獅王怒如吼義俠行予為王著作劔歌行繼更曰義俠或詢其所以因為之解曰彼惡貫盈禍及天下大臣當唯天吏得以顯戮而著處心積慮一旦以計殺之快則快矣終非正理夫以匹夫之微竊殺生之柄豈非暴豪邪不謂之侠可乎然大姦大惡凡民罔不憝又以春秋法論亂臣賊子人人得以誅之不以義與之可乎又且以游侠言古今若是者不數人如讓之止報己私軻之劘軀無成較以此舉出于尋常萬萬也凡人臨小利害尚且顧父母念妻子慮一發不當且致後患著之心孰為不及此哉然所以略不顧惜者正以義激於衷而奮捐一身為輕為天下除害為重足見天之降衷仁人義士有不得自私而己者此著之心也何以明之事之露著不去自縛詣司敗以至臨命氣不少挫而視死如歸誠殺身成名季路仇牧死而不悔者也故以劔歌易而為義侠云著字子明益都人少沈毅有膽氣輕財重義不屑小節常為吏不樂去而從軍後與妖僧髙北假行千夫長歸有此舉死年二十九時至元十九年壬午嵗三月十七日丁丑夜也君不見悲風蕭蕭易水寒荆軻西去不復還狂圗祗與蝥蛛靡至今恨骨埋秦闗又不見豫讓義所激漆身吞炭人不識劘軀止酬一已恩三刜襄衣竟何益超今冠古無與儔堂堂義烈王青州午年辰月丁丑夜漢元策秘通神謀春坊伐作魯兩觀卯魄已褫曽夷猶袖中金鎚斬禹劔談笑馘取佞臣頭九重天子為動色萬命拔出顛崖幽陂陀燕血濟時雨一洗六合妖氛收丈夫百年等一死死得其所鴻毛輶我知精誠耿不滅白虹貫日霜横秋斬頭不作子胥怒地下當與龍逢遊長歌落筆増慨慷覺我鬢髪寒颼飀燈前山鬼忽悲歗鐵面御史君其羞贈僧芝庵我吟越溪行君在西溪席軒然一笑喜相逢秋水為神犀揷骨西溪提筆顧余言渠乃芝庵名甚籍下階揚袂遽别去三載不聞音與迹朅來扣門忽相過促膝髙談論平昔升堂幾作獅子吼雨花散衣空不溼近便野水洗心法塔廟龍宫知避敵南游梁園東入魯所在英豪多舊識公材吏用衆所稱風土河東見雄碩皇皇仁義昌黎公當時救世心何亟浮屠徃還非一輩例欲加冠嗟莫及芝庵洒落澄觀流我匪潮陽徒感激厯山風烟春事深七十二泉俱可吟一庵靜卧挂飛錫布地不羨千黄金只縁萬象森羅妙到處行窩是賞音題右相文獻公畫鹿圗明昌昇平兵四偃帝樂餘閒見丕顯時從靈囿集嘉賔復引詞臣事秋獮風流右相東丹孫不為丹青待游輦睠焉徳業魏文貞下遂物宜隨氄毨泰和行宫漢五柞槲葉秋山如繡錯鹿鳴不盡君臣歡扈從歸來雁麚角羣奔知擇美䕃逰雅馴似應騶虞作食苹呼友見天全筆底龍騰驚濯濯蒼然角尾千金姿我拭老眼三見之至元甲寅年觀王氏所藏公畫即鹿一十六年李正之處觀所畫行鹿二十一年甲申三月十四日于曽孫耶律義甫處又觀三鹿圖就中雪毳何多出恐是當年獻瑞圗桑災嘆穉桑發暮春緑葉光旎旎田家嵗計固不常農婦相桑掃蠶蟻黒霜一夜從天來萬樹焦枯遭燎燬今春繼以海多風翦碎枝條生意靡天孫仰訴錦機空寓氏倚壇如䘮妣蠶生時序三月尾過晚終非應時美只縁闕飼勒遲生徃往中乾空滿紙山東自古絲纊窟大収之年有不熟一婦不蠶天下寒况復例災過惨酷緼袍雖敝嵗可卒所嗟盛陽月隂凝返爾肅府州文移速於火稍緩申期慮難復不知和氣誰所傷田野疲氓先被毒部家科勘動正月中省限催嫌不促老農拊樹嘆不已頃年桑災免絲徵楮幣人言此是前省過但恐已免復徵又似去年秋税例入奏行美聖政而重民急也君不見燕南饑民行且泣膏澤屯來三百日蠶沙齧盡木皮空剉末草根充糗食追胥星火縣帖嚴官不汝憐需税石人生鄉土孰不戀一殍迫臨那得惜扶羸載瘠總南逋鵠面鳥形猶努力比之坐斃不相保趂熟庶幾延旦夕刑司府解兩虚文道路無言空嘆息吾皇徳並唐虞聖軫慮斯民期日靖傳聞一介或可相不問草茅分政柄因思治道責有歸未洽鴻熙臣下病纔豐禄秩即患失又以材疎難仰稱蹲而不去噤無聲老鳳飢烏同一證西臺入奏沃淵衷蹴踏羣癡聞善政盡蠲秋賦出御女百色支供皆省併若稽黄屋帝堯心一語乂安無不聴萬方歡喜聲一概逺過漢家寛大今三錢斗米説開元免税户除聞大定限田固是平世法未免區區與民競况今江淮嵗入數不貲經畫有方財恐賸人和天地氣自舒一雨行隨明詔應老癃扶杖願少留又賴鴻恩極懸磬兩河千里麥青青預賀有年天子慶紫藤花歌并序癸未嵗三月二十八日宋賔客乗澤車過道宫訪余時庭中紫藤花盛爛若錦摛道師蕭公邀宋與余坐藤隂下尋友人張明之亦至酒數行開口笑粲殊適然也宋因出名紙屬予作字一春天氣不佳此日頗清潤可愛既援毫覺幽香馥郁時集筆端放手喜書初不計其工拙也遂話及樂天夢元九故事予曰二公雖神交如此恐未若今日之樂衎也若取紫桐詩例賦長句歌之以為他年林下一段竒事可乎宋曰吾子便可承當遂率爾而作歌曰竹宫瑣窗雲霧垂紫藤花發何葳蕤仙家駐景出異供橫揜桃李無晶輝羣蛟奮蟄力猶困鱗鬛不耐淒風吹天孫夜擲紫霞帔滿意下覆須春曦幽禽縮喙不敢啄囚鎖恐泄蒼精機又如王愷紫絲障誇雄鬭侈光陸離倒冠落珮衆賔醉臨風零亂千纓縷虬柯扶疎散蒼翠季倫撃碎珊瑚枝青宫賔客今園綺杖藜來扣仙人扉遥驚紫艷翻半空造物乃爾争新竒君不見香山老居士夢與元九神交馳覺來清吟増悵望紫桐花下空懐思何如吾儕時燕集對牀話乆藤隂移興餘屬我掃牋素爛柯不著山間棊刺簷入户要學騰蛟螭鳥歸花落香撲來時集毫彩霑人衣一杯春露助香潤清氣貯滿詩人脾依依青裊厨烟起好命庖人辦新醑炷香供具禱羣龍莫學癡藤蟠未已燕南飢民飢欲死聴馬姬彈明妃引疎簾映閤春晝晴篆香一線浮雲縈主人娱賔出雅樂疑是雪江一派分得岷峨清當忩初調逸餘響大絃琅然小者音泠泠衣冠四顧靜且好漸覺指頭淅瀝風沙驚自云明妃出塞引當時去國難為情黄雲馬上幾千里昭陽宫殿孤鴻㝠琵琶恨絶環珮冷漢月空照黄昏城千年謾向圗畫見一曲能冩離鸞聲我非聲學固不解古道古琴誰復聽洋洋盈耳紛秦筝續舜廟碑至元廿年二月七日同劉節使景融由西園過舜祠入真陽庵觀唐貞元間魯公子頵所書幽州節度使韋稔重修舜祠碑書畫端莊殊有父風劉君邀予閒散適行過西園感疇昔來遊長憶至元初隠隠故墻猶竹色半陂春水浸遺臺嵗與都人作寒食緑波乾後燕無泥野粉飄香土華碧相將􅇍入野人廬求訪真元虞廟迹我欲逺叫蒼梧雲重華一去寧復得殘碑不逐刼灰空扶持信有神明力道人拱手説向予拂拭顔書三嘆息星聚鳳池硯歌宋賔客𢎞道出端硯示予背有七眼題曰星聚鳳池其狀皆作人目平豎葢未嘗見也先生喜翰墨又目疾新愈即得此硯豈尤物有歸將為文字之祥耶抑洞發神光増雙明於桑榆之境耶喜為作詩以歌之其詞曰硯之同功甲與鋋試之敵場惟利堅其或返是奚用焉嗚呼此硯從何傳墨華猶帶紅雲鮮景星㑹弁舌有泉鳳池春漲光流淵松風瑟瑟聴磨研君看淚眼真茫然斵手愛惜猶珠蠙江山秀發駭一世乃今碧眼開癯仙先生神光還舊觀皎如明月澄秋烟潛心雖澹開有先不爾此物胡為前何因喚起襄陽米走虺驚蛇見醉顛贈張道士大方之家本靜虛天地俯仰真蘧廬鷃鵬氣化分小大二者角勝相乗除天真所至自行火閬風蓬苑皆焚如先生超超萬里鶴跼蹐肯受樊籠拘潛心大易中有得南華禦冦資譚餘未容飲啄逺雞鶩厯徧物表須人徒紫微二兄老且健一念天顯存斯須今春掛囊海子觀此身之外簞瓢無鶺鳹何嘗沙水寒心迹自與閒雲俱君不見三茆道士稱博洽當暑講説方舒徐怪魅適從何處來怒罵似泄仙經樞張鍊師宜何居談天有舌儘雄辨閲世雖泊寜忘軀神仙近日足官府道心原與時情疎屨盈鄭圃適為累慎勿出口他人狙河南秋熟一萬里遁身丘壑真良圗少室山玊華溪紫芝曄曄青松肥吾獨胡為坐長飢約君歸袖風投披辛夷花歌樂城城南沙水渳在漢名為新市里中山遊燕此離宫亭沼當年百花底至今辛夷植縣圃我初來觀欣細履碧桐為身梅作葉好雨初晴更姢美千年故苑風土香草木含滋猶泥泥每逢臘盡花已苞滿眼故家毛穎子宛然白筆揷秦冠載事彤庭紛内史春風芙蓉散木末紅影亭亭失秋水騷人取爾為楣梁託物豈獨誇芬芳柔姿中有孤潔操首出庶物翻春陽我因繞樹三嘆息喚起湘纍共一觴至元癸未夏四月廿五日同獲鹿主簿葢義甫同遊封龍上觀宋人碑云昔趙駱元遇徐來勤授丹元素服之返老還童白日飛升乂云徐童花徐所種龍首峰髙幾千尺暮雨濯山山更碧我游上觀風日清手弄寒泉看龜石幽人愛泉説向余藉此嵒棲從自昔駱元真遇事微茫丹素曽傳不死方山林長徃世所有白日仙去誠荒唐祗言徐童花色異秋風開處滿山香題桃源圗後至元癸未夏五月二十日經略史公邀余樓居蕪語仍出示桃源古畫二大軸葢佳筆也公因詢兹事有無其意果云何者明日賦此詩以呈君侯示我桃源圗絹素剥裂丹青渝衣冠爼豆三代古髣髴物色開華胥當時傳記羨樂土序説本末何敷腴半山歌詠似摭實昌黎論列疑其虚千年繪彩見遺跡桃源之境誠有無君不見淵明千古士心逺與世疎羲皇而上毎自况肯隨澤雉樊籠拘絃歌歸來朝市改故山田園松菊蕪斜川風景固足佳未免結廬人境車馬時喧呼復讐宣力兩不可天運乃爾將無如遐觀髙舉深意在安得超出物表冥鴻俱因縁聞此武陵説託彼奥隠稱樵漁不然果有繼問津雲烟出沒何須㬰又不見山林不外天壤間迥與世隔皆仙居桃花流水竊然在放浪而即斯人徒放浪而即斯人徒贈九萬户昻藏野鶴誰能馴澤雉雖美終無神一篇秋水江海闊兩袖醉墨雲烟春猿翁學劒事跡袐蘭舌解紛詞調新萬事人間歸一噱雙旌燭影見來頻用淮西將劉沔事沔常為捉生將及拜大將有人授燭二枝後常見燭影在雙旌上出酉陽雜爼嗟嗟住河濵嗟嗟住河濵瀕河之患愁殺人虎狼雖暴猶可禦秋水時至其容奔農民家近野河居活計趂種河之淤比年旱暵我頗穫餬口之外供王租昨時一雨川澤通黒浪夜捲田廬空畸人何止賦分薄有家舉葬魚腹中嗚呼山虞虎害水即毁捐瘠斯民老則已滹沱秋漲行君不聞蒙莊説秋水兩涘猶見馬與牛今年滹沱水大漲墟落濈濈生魚頭雲蒸老雨注萬壑上不少止下可憂馮夷不受上所制黒浪怒蹴黿鼉逰望洋東視誇海若似憤蛙比跳躍井坎湫金行氣肅坎宜縮狂瀾不逐西風收東行我濟小范口水勢淼漭方淫流秋水盡為魚鱉餌廬舍漂蕩迷田疇二年旱暵例乏食彼稷幸得逢今秋嗟哉一飯到口角渰沒無望將誰尤河防乆廢不復古惟預楗治為良疇翻堤決岸勢不已雖有人力誰能謀近年遇災幸無事其或有患徒嗟諏兩河農民被災者逃避無所棲林丘夜深投宿聞聚哭悲聲暗與蟲聲啾謝安從事見贈放生池碑本我嗜顔書觀欲徧獨有放生碑未見昨過髙齋偶得之喜氣津津睟吾面安卿捧持即見遺物遇真賞兹何為掇渠所愛適余願風義矯矯非君誰君不見集古書成叙説長玩而欲老希歐陽最憐苕霅溪邊月一夜分光照客牀紀夢癸未夏六月十一日夜夢劉使君相過腰間佩二寶劍解以示予又袖出書一卷曰此君先世筆也帋色黯慘字類離堆用朱鉤填若新髹漆者與之語甚洽劉貌肖河間劉清卿既而為風雨驚覺間夜漏下三十刻矣劉使君跨蒼驎翩然而來空際雲腰間寳玦佩兩劍青蛇躍出光粼粼誰謂昧平昔欵語情何親復為袖出先書一卷紙色黯慘皆竒文大如離堆幾百字鉤絡朱墨殆似髹漆新殘夢忽隨風雨斷破忩驚聴怒濤奔平原行禄山騁兵傷濫恩天寳之禍將自焚三郎宫中略不省履霜有戒知何人平原蹇蹇真王臣沈慮乆識幽營氛泛舟從酒運竒略一日樓櫓驚雲屯鐡轝南來縱獵火河朔風靡烟塵昏孤城平地獨與􅎨勇皷義旅争鯨吞西開土門掎蛇陣南激睢守遮淮垠滿天塵氛思一掃誓與此冦不兩存書生信能立大事竟掣賊肘西南奔事雖曠代有足感魯公之義世所尊我來弔古増永慨蒼烟草樹連荒闉欲尋遺廟不復見寳刻留在東方珉棲葢亭前野日曛平原城下酹忠魂朝廷何嘗容直道志士蹈難甘捐身此心自視無愧色一時知否非所論嗟余何者敢跂慕屢書不厭梟鸞分當年紀載兩鬼蜮九泉奄奄隨埃塵先生一死固不朽雅操何翅同松筠故應烈日秋霜氣千古堂堂凛若神常山太守歌天寳之政植禍根明皇宴安如不聞海棠紅嬌荔支緑玊笛吹滿長安春潼闗之車空璘璘曲江水邊多麗人禄山東歸叛意決先以羽獵驅其羣朔風萬馬捲遼碣殺氣已惨滹沲垠常山太守臣顔昕聲勢東合平原軍憤提一旅徇國難捦馘心手遮横奔桓桓袁侯復何壯傍翼勁翮張其鱗長蛇中撃斷首尾後掣其肘前行屯西開土門引義幟再廓宇宙清埃氛天令完節畀二子漁陽㳺騎徒紛紛天津一死有餘烈夢入帝寢何其神只應千古雷霆氣長與先生洒怒嗔負籠行炎風吹沙髙路赫穰穰羣奔密如織筠籠修擔不留行一寸蔞藤土膏溼蔞藤來自海南陬厥貢不入禹所收熙朝進御列珍品何異草澤加公侯昌黎不須感二鳥物有時遇非人謀志士何苦身巖幽秋澗集卷九欽定四庫全書秋澗集卷十元王惲撰七言古詩
