body:
  text: 溪田晚歸百物秋成次第芳野人籬落散幽光晚禾結穗争垂露髙樹吟秋未有霜瓢飲空思樽湛緑盤餐新喜黍炊黄歸時更得茅簷美下澤車輕背夕陽辛夘重九嘲幹臣周宰九日寒花不見芳西灣招飲儘相妨驅車共載差原約冒雨長行有底忙野吹掀翻緇布帽冷香滂盡紫萸囊踏泥踏水歸時晚也道龍山㑹一塲夀李夫人時九十四歲􅜳帨風流見二南洞天真侶記驂鸞慈顔媛娩丹浮頬素髮飄瀟雪滿簪九十平頭添二二百齡餘慶欠三三今年更覺秋容好薦夀寒花滿菊潭寄竹林劉隱君文甫兼簡苦齋詩老蓬莱清淺到揚塵林下幽蘭有異芬萬壑烟霏分野色一庵閒地占溪雲鸞音時接公和歗樵隱休驚豹峪君儘着青山映華髮東州人事日紛紛周曲山挽章壬辰三月十五日四十年来老弟兄忍看埋玉入佳城子輿正斃酬初志東野詩鳴豈本情六任在官無少玷一貧到骨有餘清易車令辦棺衾事猶恐臨行累友生哀馬希驥人夀幾何鬼伯催抱羸赴官吁可哀乃知生死有定處挽斷衣衫喚不回千室望空絃誦樂一枝風折桂林材儀牀最是傷心目愁拂春山劍字埃競渡詩并引予前年客福唐寓舍在西湖上問俗自四月中為龍船戲船鑿長木為槽首尾鱗鬛皆作龍形以五彩粧繪漆髹其腹取其澤也上坐五六十人人一棹江面對翻並進如箭鐃歌鼓吹自明竟夕殊諠譁也大率争取頭標以為劇戲踰重午乃巳壬辰蕤賔節追念徃事偶為賦此且記越俗之好尚焉又平時花竹亭館四面環合不減臨安故亦以西湖名之五月沅江競渡頻遺風此日見東閩大夫淪溺甘魚腹舟子招呼問水濵鐃鼓轟翻鮫鱷室繁華淒斷綺羅塵曲終人散青山暮招屈祠前獨愴神獨頭木香荅吉甫索賦水晶簾外日初長一架酴醿雪覆墻艶冷不争春事晚香繁還愛獨頭芳看来玉蘂唐昌供幻出天真虢國粧壺酒風流名字在醉魂千文助詩狂元夕斗轉春城送臘寒暖回阡陌紫生烟春風兩市華燈閙夜色千門璧月圓書卷光隂清議裏梅花消息喜吟邊厭厭醉裏南樓角無復情悰似少年和曲山見贈之什竹林舊友今無㡬白髮歸来對曲山詩似春雲儘有態倦如飛鳥共知還淵明髙興羲皇上葛亮丹衷伊呂間鐘鼎山林兩無濟塵埃空負半生閒和紫山見寄四詩正月二日作百險歸来萬里江旁人剛羨老能强閒居自苦笑鳩拙逺宦空成捄火狂少日搶揚猶雀躍只今蓄縮宛龜藏𡨕然却掃關門坐過簡還疑近子桑晉公鐵面恥将迎天遣汾亭醉六經麟出近郊休袂拭鳳巢阿閣要儀刑菌摇露影從團葢草腐墻根任化螢天賦美材終大用不然編簡為誰青一作大器晚成疑定義山立揚休見老成輶車風采動蠻荆兩鄉相望三年别四海論交六日兄諸葛奇材如汝滯漢庭公議欲誰明只将健筆淩雲句亦是詩壇不朽名一作望君重為斯文惜一頌寧堪以酒名七十人生百事休莫将閒惱蹙眉頭看來世運恢恢網剰却孤懐悄悄憂肉食廟堂均一飽笑談樽俎更何求樂章聽徹醒還醉夢繞黄壚憶舊遊立春日五詩正月初九枕上作今年春晚暖何遥庭院輕隂鎻寂寥香散南衙牛已碎水封北岸凍微消老逢月閏憐多日前去燈宵不五朝居士病来花不染閉門詩思苦相撩妄心風斾只摇摇且著清樽永此宵詩句得吟如有助生涯無幾強顔料平生肉食聊爾耳此日蔬盤更寂寥休笑少陵垂白老還家曽散紫宸朝是年元日立春子時為待制同百官望内廷西北拜曲山一病保無他卧老行㕑閱歲華貧富較来原有分鄉關歸到却無家粥盂得味憑虀梗詩陣無前聽鼓檛早晚黄綢綢被底醉頭舒出使排衙暗用文潞公宰翼城詩意輕裘錦帶佩呉鈎曽作江湖萬里遊彩仗春烟縈越省為是年擊牛省中梅花詩興在揚州在家貫好誰餬口萬事痴如慮破頭收取琴書林下去葢頭茒把要先謀為子孺欲起緑稼軒故云立春節物最風流釵燕蔬盤鬬獻酧暖律潛回交泰琯香塵飛散送寒牛令龜有喜迎新歲任運何心接俊遊鬱鬱林梢看紫氣悠悠吾道付滄洲是日卜得泰卦故云令龜有喜守歲夜靈案囘飇闔户樞赤囊懸井漬屠蘇罇留臘味為春酒門挿新桃換舊符歲事守来人潦倒窮愁推去鬼揶揄明朝最是新年喜寛大書来聽杖扶頷聨一作糟塗竈户酣司命火結儺神夜打胡元日朔夜兒童問寝餘莫催予起動長吁圖書萬國朝元㑹鐘鼓千門走嗇夫璿象謾回齊政斗赤靈何有辟邪符沉沉未覩三陽泰愁絶灰心一寸蘆和曲山詩韻寄紫山年兄官業初無一事成誰云禄足代吾耕最憐獨學無良友擬託鄰居度此生天外鳳凰難得見山間風月喜相迎詩来健羨淩雲句轉使孤懐不暢情百計謀生百不成薄田無㡬不任耕洗心大易韋常絶拊髀劉郎肉不生勢有持盈虧倚伏人無定志漫将迎果哉去作山林計却恐吾儕訝不情壮年力學老無成白髮何堪事筆耕張子田園歸有賦老龎話語到無生一作巳分歸田慕張子有時結襪待王生拏雲心事輸年少拭目時和喜迓迎有客過門聞詔語一言或補不無情人日有懐紫山年兄效少陵清明詩格前年人日客殊方此日相望憶故鄉酒醆不虧工部詠梅花空斷蜀川腸休驚老態連眉白又喜春風上栁黄君豈笑談稱曠逹我非用舍定行藏風雲北海朝捫虱花木西城夢對牀晚節得同林下飲不妨閒處看人忙紫山别業在府城西郭多植棉栁課僮奴以桮棬為事故以栁黄為言和曲山見贈髙韻我愛周兄不倚中平生臨事見豪雄從旁誰掣拏雲手妙用多歸製錦工勿藥病懐須止酒運斤詩筆自成風浩然一㸃胷中氣莫問時汚與道隆肉豉肉豉傳方出異庖玉盆凝就破昆刀縱横碎漬氍毹錦瑩潔光翻琥珀膏暖入餳華防性爽味方禁臠想京鏖年髙饜飫便便腹不負吾坡養老饕人日贈曲山周宰近書雲物見豐年寛大書頒兩日前為榖未知明日事得官休羨小兒權翦花作勝徒為爾覓紙題詩一粲然遺愛祠前周老子幾時扶杖過思淵客㕔舊名先大夫所扁為靳嘉議夀時年八十有三人生享福夀為先不似君家樂事全春色不隨喬木老眉毫光動百齡前風雲藥籠多隂積蘭玉堦庭㸃翠妍九老圖中休着眼世間原有地行仙琉璃肺擊鮮為具樂朋簪辣品流馨漲緑沉犀箸喜辛㤀海味霜刀爭割快牛心四筵談屑霏餘烈一縷氷漿濯病襟勝過屠門矜大嚼夢雲飛遶蹛林深簡寄魏叅政兼謝白紵之貺草木先聲漢嫖姚一軍畬洞掃虵妖碧雲望杳江南道白紵情深鄭國僑水閣燕閒時有待銀坑心計苦相撩看看銅柱南邊月又見弓旌萬里招樂全老人詩樂全老子見輕安杖屨西城日徃還論福有孫應有子閒居非水亦非山春風滿意花遮眼曉境浮光酒暈顔九老有圖宜健羨一生班列素喬間耳聵自感人生五十未全老天遣吾聰用晦明志怪虚傳三耳異省心先得一根清腦鳴日作蜩蟬噪霆迅時無匕鬯驚物壮而衰自然理家翁稱異轉尊榮過顒軒先生林墓正月十三日與陶晉卿送客回同拜墓予二人為愴然者久之故有是作庻見夫當哀切禱之意云詩後七日其孫以脾疾亡整冠趨拜柏林烟事徃懐賢一慨然翼羽有圖期四皓風雲埋恨便千年斯文未欲吾儕䘮乳穉宜為造物憐宿草黄岡重回首大書猶是廣平阡公母夫人封廣平郡君三字蓋公親筆良宵散歩詩并序至元廿八年冬十一月十四日同曲山小酌林兄北軒既醺相與至珉溪家夜話歸見月色烟霏殊有春意因念數日寒沍今夕乃爾恐一冬不三二朝而已遂歩入春露坊衝口而成詩何夜無月何家無酒但少閒適如吾四人耳散歩閒行不厭頻暖烟門巷趂冬温話深不厭城頭鼓歸晚長敲月下門一枕黑甜饒熟睡兩螯風味夢清樽竹宮梅信今年早整備新詩問蠟㾗和曲山題太一宮詩韻蒼精宮闕五雲髙千劫塵縁謝世勞太一旂常王母使真官裘被吉光毛仙家功行何多品人物中和第一曹近日蓬壺到清淺獨留春色醉仙桃蕭爽神庭積翠髙東瀛修復堵宮勞法傳四葉光前後望重層霄一羽毛粉飾皇圖開治道庇庥廣厦到吾曹慇懃太一池邊月曽照銀觥醉露桃粉飾皇圖謂初見今上時首陳修國史立臺省等事醉露桃謂四十年前陪諸公讌集方丈前除庇庥廣厦接禮士夫也喜雨秋冬不雨到中春壠麥黄芽起旱塵輸販乘時祈湧貴賤貧無䇿救饑民誰知一雨連三日走逐羣巫謝大鈞愚俗豈知皆帝力年年豐稔太平人即事言懐一病三年白髮翁今年自覺更疎慵硯池敗墨無新瀋書册凝塵養蠧蟲時向醫方求服食誰從卜者問窮通正同農畝憂春旱三日甘霖洗歲凶涼夜氣機開闔貴循常極慘隆炎物反傷大暑遽離前日酷萬金難買此宵涼商飈借爽清庭户白露先秋洗肺腸一枕夢歸天外境廣寒宮殿夜蒼蒼跋御史梁公題祖隐君墓碑後中憲大定二十七年進士任至河南府少尹當年中憲煥人文久仰修齊表隐君三尺瑶鐫堪晤語一家庭訓儘恭懃詩書有種餘金穴簪紱傳芳見世勲孝子思親同一致幾回瞻洒太行雲賈秘監宅畜大龜来自海南盈尺三尾真靈物也瞻玩之餘賦詩以詠為提㸃老友一粲神龜来自海中央登薦君家五福堂盈尺要開黄髮夀巢蓮不羨緑毛香蒼鱗弇鬛垂三尾元氣絪緼善六藏昨日朶頤觀不足搘牀常在老人旁夀韓生𢎞待扣鐘邊弟子行當年風度巳汪洋循循試看青衿子濟濟渾如上舍庠将就緝熙從洒埽刮磨蒙垢到輝光束脩藉手嗟何有重為韓生夀一觴一作青青矜佩西門塾濟濟衣冠上舍庠和曲山冬日述懐嚴韻幾年青𤨏列朝班萬里江湖又徃還浮世舉從愁裏過人生能肯老来閒時方多故難前料家任長貧免後艱更有行身思寡過未能蘧瑗毎慚顔送叅政飛卿時改遷西省辛夘冬十二月七日漢廷冠劍擁羣雄開濟都輸畫一功暫試邊籌來徼外又分春色入秦中風雲平歩無餘謹肝膽酬知有至公帝使救時公等健老夫何有炬蓮紅奉和曲山胡桃詩嚴韻藤藜為菒性甘良今歲收成滿市行褐殻外包金作皺黄衣中裹玉為穰似憐淡泊陪樽俎滿嚥芳馨潤肺腸聞説開元全盛日十金一柈喜新嘗又嘗喜蓬瀛傳美法與膏同嚙便非常彼桃根植自羌南遺種攜来漢使驂雷斧斫開驚蟄卵雪穰翻出合歡蟾華池増潤酥同膩老頬含飴蜜比甜想得上林初結實百官分賜露恩沾餞中丞羲甫還闕下并序予與中丞羲甫同官厯下自後君由維揚移秦中不肖亦承乏福唐地之相去也萬里時之契闊葢八年于兹壬辰春正月邂逅衛南樽酒間握手道舊殊歡暢也因話及敝居醉經堂珉溪曰今易為春露矣予即曰春露堂中秋澗老君應聲云可對梅花軒下栁溪生葢君遊蘇門稱栁溪生提憲開封以梅軒自號故云即舉酒囑予曰可足為一詩見贈因輒聫成篇以壮行色其辭曰緑波春水浄長亭樽酒相逢話故情春露堂中秋澗老梅花軒下栁溪生十年一别渾如昨兩地相望不易并三箧補遺蒙睿眷寵光浮動漢公卿衛南讌集纔終日厯下分攜巳八年玉樹風神猶夙昔彈丸詩句轉清圓傳家有學光先業望壠求書憶昔賢從此玉墀冠劍地漢家勛業有貂蟬第五句一作肯堂有構傳光業和曲山見示十六夜詩三杯兩醆醉朦騰門巷歸時月色澄人影共三驚傑句元宵過五賸殘燈遊觀縱美吾誰與老病相仍子不勝昨晚詩来知勿藥樂於相對逺方朋非隱非商處市寰出門即礙覺行難虚名藉藉知何有世事悠悠興易闌化日舒長饒驟暖新詩吟苦有餘寒書生伎倆宜人笑兩束賡章要不刋為曲山欲以近日唱和等作編集成帙以示来者故云寄贈總帥便宜汪并序前日劍騎過衛幸得一識英表勉贈二章庻見微懇瑊晟袍鎧鳳花紅颯爽英姿百戰雄歌雅有懐千里隔停驂還喜一樽同忠傳孝繼来家法谷静川空見驗功自古詩書出名将将軍今日漢膠東隴西名将相山東與别諸侯總不同隴右風塵天一柱将壇恩禮漢元戎秦風儘詠車粼富魯泮重看獻馘功想得朝天承讌衎教坊金纛彩雲中燈市行樂人喜時和更上元春城風物覺清妍樽罍傾倒非吾事杖屨遊觀有樂全澹澹陌塵燈散後迢迢春箭醉吟邊新詩不獨書閒適待與清時備管絃為曲山久病作詩以慰之曲山隱儿一冬餘心事中間合減除委巷莫悲来結駟蒯緱休詠食無魚禾欺脾土宜甘養詩梗吟吭可暫疎六十坡仙年未老萬縁灰冷覓方書再和前韻慰曲山一身之外總為餘應有閒憂合屏除出宰莫悲淹足驥研精休效蠧書魚兩盂充腹宜相調一盞和顔未可疎休信安心泥禪術内經還是不刋書一作若以老年閒遣興或作若以遣懐餘習在内經還足𦂳看書予拜顒軒墓後七日其孫以脾疾亡復作詩以哀之悲風吹野白晝隂吞聲不作短歌吟尚期穉子有餘慶少慰先生未了心玉樹凋殘天巳老蘭芽助長思空深因懐此老含飴語地下相持淚滿襟穉子一作委蜕委蜕出列子子孫者天地之委蜕也或易之僮哀詩并序僮姓李氏字八齡十有六歲壬辰夏後六月二十九日因戲水濵溺死猊渦予時卧病不知以數日不来見疑其有異且覺夢思恍惚及旬餘窮竟所以乃云巳死矣為惻然者累日其辭曰来從西蜀六千里執役家僮一載餘兵死不教承舞槊陸沉誰料𦵏河魚樵蘇晚到虞疎失寝户晨興憶掃除善遇力傭平日事一朝不見意何如挽總尹湯侯井幹臺邊始識君共山山下酹新墳攀髯猶是風雲夢分陜仍髙牧伯勛翠琰能書無媿筆石麟休認辟邪文泉扄儘慰承家望又見賢郎逈不犀題珠簾秀序後七竅生香詠洛姝風流不似紫山胡半牀夢冷珠簾月用烟中怨事一序情鍾樂籍圖鎚破小山犁舌獄倒翻卓氏拍沽壚芳蹤苦殢同心賞遏斷行雲唱鷓鴣題香山寺畫卷送客當年過玉泉醉中遊賞得奇觀一泓湛碧浮僧鉢幾葉秋黄打石欄山色空濛金界溼松聲清泛海波寒吟鞭回首都門道斜日歸時翠滿鞍過朝歌與苦齋馬上聫句三十年来老友生論文道舊足交情清時健在巳多幸白髮相從復此行朔吹號寒摧破帽重隂掃盡喜新晴憂先樂後平生事一笑長驅過故城題府判黄􅅷卿詩卷簿領當年憲府㕔巳期公叔與同升為觀臨事多難際素有持平獲厚稱荷橐儘髙蘭省諭判花清映玉壺冰漳南未是淹留地變化重看九萬鵬送舍弟南歸穰下壬辰十月廿日彰德相别相思渭北常年事逺送漳南恨别心沙暖暫聫鴻雁序霜寒悽斷鶺鴒音兩鄉健在都能幾千里含情老更深慰浣此懷知懇切不教消息到浮沉觀光化日舒長静八埏夔龍布滿紫宸班閭閻有喜科差少烟火全疎傳舍閒象緯拱環天北極聲明漸及海東蠻春潭不用𢎞農寳斗米三錢濟歲艱夀石平章布呼珠黒頭便挿侍中貂滹水春風憶共僚學術自初希聖哲羽毛今果見雷霄心存經濟開公道天與精神福本朝紫禁烟花縈繞裏青松千尺儘難凋遍閲清朝玉笋班龍鱗誰似相君攀事多簡省經綸大道在從容奏對間黄閣不知金印重思亭清似玉堂閒鳳池剩有如澠酒細瀉瓊杯暈夀顔一作梅花香有如澠酒常醉春風玉鍊顔劍履光清斗極邊秋風庭户净吟壇北門視草情何宻東閣觀梅暖更妍白髮詞臣從寂寞青天鵬背鹵三千一樽細㵼新豐酒此際於君分合偏漢相規随有典刑讚書今傍太微星甄陶品彚均元化業履貂蟬自六經養浩以剛鄒孟直誠心無愧魯齋銘細傾東閣梅花釀長對西山未了青時為御史中丞賦王詹丞宣賜玉杖王諱慶端字玉甫藁城人青宮宿衛舊将軍家世今誰萬石君千騎寵光承眷顧一枝方杖表忠勤靜臨春桂堂階月暖帶紅鸞扇影雲若把璠璵比良德健於羅結更温文一作前日倚毗今有效雲臺從此䇿髙勲同鵬飛遊長春宮歩入方壺别有天茫茫雲海道家山甘河真過自伊始鐡鎻髙垂不可攀黒入太隂松桂老望空𤣥圃水雲閒臨漪門外春風暖将復流紅到世間張鵬飛治虎骨為鎞挿作詩以贈張侯骨鯁霜稜稜削出雄軱瑩且精厭猛細将鵝作項差肩羞與鹿同名寝皮食肉真吾事理髮繙經入小成持贈有懐増老健一簪秋氣見初横虎腦杯二首帳竿圍錦稱談兵猛腦刳来正可觥製就要為元惡戒飲餘便覺谷風生𤨏紋潰血紅猶溼酒力増嚴氣未平廣㑹長筵莫輕出慮妨倀鬼淚縱横犀船螺斚脂粉具老頂刳作元戎觥撩頭無復盜跖怒持飲頓覺隂風生𤨏紋漬血紅猶溼酒力増嚴氣未平䲔吸長筵莫輕出揶揄倀鬼恐潛驚一作更啜棄􅃵戒元惡却思倀鬼恐潛驚十一月十八日夀宮小集六祖真人牛教授伯祥張按察鵬飛十稔相望不易逢一樽誰料此賔同笑談偶得陶元亮賔主不分龎德翁竹葉添春冬後緑燭花留喜夜深紅鼎邊句就東方白却恐彌明訝不工訝一作笑贈牛教授伯祥牛君伯祥以失馵詞見示意甚悽惋雖情之所鍾正在我軰然思而不置恐傷天和而病吾子也故終之以電露之意朝看頏頡燕于飛夜聽城烏百暗啼風拉綺絲疑細語鏡翻鸞影夢雙棲屢空曽改安貧樂當饋難忘舉案齊不見六如亭上客此情斷度不容悽夀長春張真人絳闕蓬山不易求春風瑶草夢麟洲未如華表千年鶴纔閲人間七十秋道紀有方傳妙用𤣥談登對動宸旒慇懃一炷嬰香供吹滿壺天十二樓登對謂嘗以老子言上對稱㫖送王講師歸終南舊隱青城仙馭本翩􅀈自惜繙經老閉關藜杖偶隨雲暫出草堂今喜鶴飛還道凝甘壑從容際詩在終南紫翠山去去黄塵今古道幾人回首似君閒吾友張君鵬飛壮歲論交十年三遇少聞如意多見隱憂燕越相望契闊復爾衰年逺别互深相愛之情判案頻煩例有三惑之誚氷清玉潔餘熱何堪下怨上疑自昔如此在李華而未免於吾子以何如若作計以處時宜貴和而容衆子其行矣詩以送之四任邊除見壮猷空拳搏虎踣三彪得便宜處休再徃當機㑹時須逺謀花栁都城終歲好江山南上暫時遊倚門妻子愁仍破檣燕聲中莫少留送左丞董君行院金陵壘壁光寒海徼深未容緩帶畀分臨旌旗動色真餘事節制無方是自侵纒索要知今日馭戒機還盡老人心迎仙門外生祠柏親見森森緑滿隂朝謁栁林行宮二詩并叙至元癸巳二月四日臣膺惲臣文海儼居信朝謁春水行宮於瀘曲之栁林優蒙睿眷詔録年名以聞引進者中丞崔或被沐天恩敢綴為唐律二詩以表殊常之遇臣惲謹序漢家天子獵非熊五柞長楊是近宮萬騎逺臨滄海右五人同拜栁林東自憐賤子承恩眷重為斯文惜至公更擬論思㕘政識老臣何有沃淵衷千官扈蹕翠華東詔許諸生見雪宮商嶺採芝慚綺季新豐需命似姚宮名輝彤管猶通籍簡在儒臣要勸忠歩出禁門還少俟長楊髙樹動春風癸巳清明後三日偕孟津李士觀登太史臺客中何處散幽懐放眼髙明恐易裁兼覺形神未全老試凴筋力共登臺山河繚繞陪京壮樓觀參差落照開曵杖不知雙髀困銅駝巷陌晚歸来奉和李樂齋登太史臺詩韻衷苶形骸俱諱老較量筋力共登臺漸欣就日瞻天近不憚捫參厯井回歩下玉堦驚峻極立殘夕照尚徘徊銅駝巷陌歸時晚一笑傞傞曵杖来靈臺璇象兩巍巍夢寐三年始一窺日挟陽烏翻倒影天浮圓葢入銅儀當時東觀張平子此日吾元郭若思羨殺漢時皆實學幾曽分異限藩籬和李樂齋馬病詩韻緑栁都城約勝遊閉門翻作抱官囚血糊駿足幾無計眼昧庸工悔暗投䇿杖恐招徒歩誚求全翻得蹙眉憂自今安驥君須記鍼法從来是把頭為中丞博陵公夀憲府如君富逺圖報恩多半薦賢書義方對上言何婉𤣥素回天力有餘論入事機包細大望来行止見舒徐近年黙數康時奏儘是汾陽極品除喜答李六祖病後見憶詩韻鄉心兩叠稠竹宮長記半年留橘房嬉戲有真樂鵬背逍遥忘逺遊清夢偶便旬月寝巖花空抱一春愁朝来好得平安報香滿經臺紫氣浮送呉僧清琬長遊上都顱骨巉巉犀挿腦繙經休作越僧看潔蠲心地抛塵累飛跳天星得妙觀化日閻浮天竺小秋風蘭若野僧殘回頭清磬千門裏曇鉢花鮮照眼寒挽樊君道録每嘆𤣥門道有綱樊君扶翊冠簪裳公材絶似張嵩岳術異初非費長房樽酒笑談才宿昔玉棺飛墮便蒼茫仙遊久厭人間世華表歸来意莫量荅晉卿教授蒼狗雲衣日易翻桂薪珠来住京難百司扈送回鑿輅一室虚潛盼冷官老境静思林下樂鄉書喜向枕中看絳紗幔底絃歌樂政恐天教耐歲寒挽趙公同簽不肖惲自壮歲辱知頗厚意廣才疎竟成墮窳日暮懐人豈勝慨嘆魂而有知庻幾少慰其詩曰氣鬱元龍漢魏豪豈容空見卧林臯力籌戎務開樞府瞻落僧􅔿拜節旄隂授有機黄石略夢歸何處赤松遥傷心此日題詩客老淚縱横溼佩刀公使日本回相㑹于平陽以日本國佩刀見贈詩純用留侯事者以公全似漢初異人也詩餞王中丞復任中慶諸路行臺愛荷之懐義形於辭知音者無惜同賦復詔行臺自昔無恢恢天網未容疎滇池逐鱷真餘事霜簡收炎見壮圖報政果符銀作驗立朝回看玉鳴珂此身雖逺吾民晏肯憚風沙萬里塗銀為驗初赴雲南時缺二笏乃缺諭缺田若委缺將来以此銀為驗過樞東府二首呈王院判仲常曽侍延英殿廡風道傳宮語近軍容自從文武岐分後更覺韜鈐勢轉雄畫戟凝光連嫖衛出長楊賦云乃命嫖衙嫖指霍去病衛指衛青赤囊封愾折邊衝郤縠莫詫詩書将鐘鼎旂常要駿功白首英雄見致隆折衝樽俎沃淵衷庭花露重凝深翠屏石犀寒辟軟紅國綸動能㕘兩勢朝堂一作屏翰寧使嘆羣空歸鞍細嚼輪臺詔兵寝刑清是極功題峗山白石洞野齋序文後岧嶤東北望峗山滿馬風埃憶徃還白石久聞經洞古碧雲誰似老僧閒夢驚三十年前事詩在推敲月未圓安得野齋相約去松風巖壑共躋攀送王司業嗣能倅衢州前年持節使閩甌端是騎䲔汗漫遊兩浙江山真罨畫三衢風土是中州兵餘獨重瘡痍苦政異無逾孺子謳此去新詩更瀟洒所思多在望濤樓完顔士慶赴任蜀省来别索詩係金内族秋滿長安落葉紛天葩根異獨竒芬氣酣不在新豐酒志逺先馳蜀棧雲幕府文書無整肅郎官心事足忠勤腰間四世千金劍又見清光湛斗文輔提刑正臣挽詩并序臺憲者順長道而服羣醜也昔魯人以泮水頌僖公而曰敬慎威儀維民之則載色載笑匪怒伊教如提刑輔公有焉又如老生廪繼于邁思樂何啻采芹藻而巳不有猥繼公後親覩斯美豈勝欣嘆葢學校乃國家之元氣故予特以崇學為言使留心於簿書米鹽間者聞先生之風庻幾知所自云秋澗王惲謹序澄清心事見褰帷只道剛稜未盡知霜逐簡華森憲府力宣風化作邦基廟堂留像瞻遺愛寒藻翻香舞泮池夢到養源堂上月至今鐘豉似清時前年學館拜遺祠此日看君墮淚詩飲食固云飢渇易教條能盡後先宜豸霜肅政潛梟歗文藻翻香舞泮池夢到養源堂上月至今鍾鼓樂清時李廷珪墨瀋世傳能定人神志予病久思苦恍惚因假之師孟研汁一龠飲之戲漬餘香復賦詩少見無聊賴之緒時癸巳八月朔日也龍劑如珪獨擅唐洗心今試秘闕蒲意濃薰月露香靈府策闕文戰非吾事正闕送鄧郎倅繹州我客京華識鄧郎恍如身在玉山旁三年載筆同詞館一字綸文憶夜牀老去光隂多幾許别来雲海尚相望玉堂昨夜秋風冷夢裏歸心到汶陽秋澗集卷二十一欽定四庫全書秋澗集卷
