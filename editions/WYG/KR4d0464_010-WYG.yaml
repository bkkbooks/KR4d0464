body:
  text: 華不注歌齊州山水天下無濼源之峻華峯孤秦鞭有力驅不去天遣一柱標齊墟初疑太素女蝸氏補天斷手兹遺餘又如翠鳳翥郊藪來應世瑞開昌圗南山連絡雖可愛未免阿附相承趨孤撐直上夾石碣猛視大似天門貙慶封齊豹兩元惡哆嚙猶露雄牙鬚不然齊太史寃血凝碧老不渝化成直筆揷天外堂堂使表春秋誅乾坤乃有此雄跨未許鵲藥爭頭顱江山勝概儘軒豁逺客吟眺増躊躇李白上天不可呼雲烟變化何須㬰後人摹寫覷天巧百匝空遶青芙蕖文章李杜光燄在有詩無詩將何如我思齊晉迭雄長山靈枉被兵戰汚桓公九合猶霸事三周其下真誇諛㑹須扶策淩絶頂望入蒼梧叫帝虞趵突泉歌沇流峻發王屋顛世以獨逹神其源不知悍駃勢所激玊虹那待馮夷鞭洑流渇馬穿厯背海眼洞徹開龍淵嘗聞棄糠黒灣復此出明見下與地脈相勾連雲魚吹浪雪濤湧鱗屋撃鼓春雷翻我初來觀冬十月隂火下煮陽池烟洪濛元氣東山作蒼江屈注倒景懸少陵拊掌嘆竒絶未若玊塔突起掀晴瀾天機幻出此怪供欲洒飛雨清塵寰當年小白㑹水上春秋見書名不刋咄哉齊晉兩蠻觸千古事徃風雲閒漢家包海歸一統霸氣何有諸侯壇清泠無復歃血汙觱沸不洗陳恒姦我讀太史書風聲氣習隨山川齊人闊逹多匿智政恐功利為當然安得此泉盡變作醇酎一醉浩浩還吾天東坡海南醉歸圗元祐諸人等圭璧司馬之相國柱石仆碑錮黨無不至棄若泥沙初不惜當時何有雪堂翁一斥南荒無復比那知兹逰竒絶神所相海水天容清一色鐡杖横秋瘴霧空新詩落筆魚龍泣楓香樹髙溪雨濛醉挽黄衫兩頰紅多隨父老燕同社或喜契順來相從一朝竟作遷客沒造物未見哀龍鍾豈其中州淑氣到爾恐終絶故令著此眉山公河氷篇庚申前三年予以事赴汴途中行值雪者三日時大河走凌因卧船蓬間聴河氷拉船而下其聲瑟瑟可愛嘗欲一詩執筆輒罷今日率爾得此殊適然也時至元廿二年秋七月廿一日也大河凝寒氷走片岸深争逐盤渦轉沙頭卧艑凍欲僵細戛船舷聲自顫幽人蓬底閒何清錚錚劔佩相磨鳴鳴如竹軒瀟洒帋半罅醉枕夢破風泠泠錢塘水樂世所愛求音寂寞將誰聴安得湘妃皷瑶瑟波間細冩宫商聲朝來賦就河氷篇胸中餘韻猶翛然浮聲切響何足異記我深津待渡年短歌行君自分攜今一紀疇昔四更來夢裏金鞍相值癭陶南君亦逺回還故里酡顔喜意見眉間欲叙寒暄先稱椅君諱也相隨行過縣廨西指説民居昔何美邀臨甲第予力辭亦為前征趣行李夢中不悟死生分别後寄聲無棄鄙探囊傾下粔籹香送余不到河之梁囑余南去路亦逺持此贈君為裹糧恍然形開無所見落月照屋空微茫蕭蕭春草宫墻緑暮雨梨花寒食曲樽前浩唱意何長轉首先輸光景促我思夢境再目開君侯施施胡為來賦詩非欲徵後事今世死别真堪哀因見故人雖逺猶在當時懐荒雞行茆簷月落霜稜稜半夜起聴荒雞聲不知首唱自何處喔喔滿城爭亂鳴爾縁氣類司早晏乃今失職能無驚淒風吹空星斗黒漫漫長夜何時明萬事紛紜毎如此不須劍舞蹴琨興龍在田詩我夢長橋秋水落俯瞰澄淵見蛟鰐絳綃百尺卧彩虹足尾鱗蒼閃烟壑我因投石起幽潛不待雷轟隨奮躍神光照野驚在田驤首徐行嶄觺角野人奔看若雲從洶洶呼聲動寥廓余方闖視女墻間走欲攀鱗不知却超危坦坦略無難歘墮嵓梯叩丹閤寳香佛界幾龍龕萬栱千梁金碧錯恍然夢覺聴夜漏四鼓將闌更五作因車夢葢此何因無乃吉徵先我覺龍為乾陽主善幻既見禾田徳施博乗髙臨下近清光雖險當前無所遏行穿嵓閤得金界動止其間為善樂援毫億度兼記時仲冬辛卯之夕嵗在噩讀五代史記作古樂府五首楊柳枝辭唐昭宗天復三年梁王温辭歸鎮留宴夀春殿又餞於延喜樓上臨軒泣别因賜楊栁枝辭今亡乃為補作楊栁枝風吹何裊裊暖烟如織緑絲柔延喜樓前春色好臨軒奏曲送行頻梁王重有回天勲一忠之外何復云安得髙祖太宗之業如栁新檀來歌汎樓船下淮浦百萬豼貅歌且舞不殺降不掠虜吾君弔伐真湯武爾檀來不欺汝皥皥王風樂吾土椒蘭怨昭皇迫東遷望絶忠臣援堂堂雁門兵秪足速禍變帝酣長星杯醉魄迷椒殿神龍失水机上肉惡裊啄門夜漏半龍興赤霧天為紅一竁三百皆皇宗唐家大業至此盡自古亡國未有若此之哀恫梁王歸罪將誰紿奴輩雖誅天有在金祥殿空殺氣髙賊珪白刄專相待汜水行五季權在兵逆順係財賄同光當宁能幾朝牝雞司晨傾内外添都買宴物山積盡入掖庭充内費君王政􅂽優宦狎將相無辜恣誅殺蜀資百萬賊所徼縱有其能供近渇一夫夜呼汜水東絳霄樓頭兵反攻雍陵竟墮所好死英武杳逐仙音空先皇有識如相問三矢雖還未克終劉山人歌劉山人黄鬚糢糊衣袖褸蓍囊藥笈手自攜親詣宫門來省女將軍物色不少差其奈后方争寵嫵被驅吾父已兵死何物田翁來辱汚椒房恩遇望遂空破帽東歸心痛楚長吁行念樂天歌不重生男重生女此事對君為妄語嗚呼五季皆天民人倫濁亂疎反親當時乖戾同一氣天理何有劉山人劉山人莫悲泣伎方終老固賤貧却免誅夷為外戚後飼牛辭春半我田耕未辦兒童休稱牛力緩自冬皂養日已久當用猶羸功有間吾今朂汝汝則聞朝昏飲食無過勤兩家計口三百指一飽入手皆渠身三公投筆當歸畂况我本是蓬蒿人微茫烟雨孤村底思與天隨作近隣春寒曲家居對病妻書空咄怪事人生百嵗能幾時風雨憂愁還半是一春寒光中傷人紅朋碧友潛酸辛今朝晴暖烏鵲喜寒食數日無多春脱巾自漉牀頭釀待與東皇共一樽驅狼行隔溪衆號呼驚視驅兩狼竄伏草莽間毛色隨蒼茫此物胡為來顧睨何揚揚我觀五行書據理論災祥吏貪政暴狼囓人此説聞自蔡邕與京房近傳共縣東殺人食路傍獸威孰擅恐自爾竿不擉刃良弓藏又云村墟去山邇羣行獵食為尋常豺狼當道無所畏野獸走壙何庸傷君不見漢家良吏龔與黄當年異績何章章嘉禾朱草滿郊藪麒麟鳳鳥争翺翔寳鴨歌天雨新晴秋氣肅時秋霖晴霽暗用賈誼宋昌訪司馬季主事秘書遷住城西曲入門坐定有餘清既領𤣥談出竒物翩然寳鴨立玉洲儘著龍香貯脩腹麝煤融液須臾間藍田春暖煙生玉引吭不惜吐氤氲要徹天心穿月窟漢宫豈數博山髙晉惔休談鵲尾秃劉著作勿輕出長慮王孫金彈丸醉中疑似來相觸漢宣帝幸池陽宫圗武皇雄吞老無已嵗嵗開邊兵四起嫖姚出塞屢策勲武縶陵降終國恥騰淩蹂藉五十年饗功歸到曽孫宣萬方解辮盡内屬龍庭南北無烽煙池陽五柞郊歌裏五日賜酺餘燕喜呼韓稽顙謁甘泉欲示雄誇先就邸大陳還縱萬人觀豈獨珍竒紛錦綺歡呼歸作北庭藩萬代稱觴甥舅禮君王燕犒不知勞鸞旗直上中渭橋茂陵王氣如水清建章宫殿春雲髙從此臨軒舒化日一聲宫漏出花遥入奏行送右丞史侯十年不見汾陽面萬里朝天來海甸神鋒照眼倚青冥黄色充庭明羽扇張燈開宴見談噱惨澹風雲餘百戰嚮來作牧與開府總道臨機能制變漢家六合頓宏綱民事正煩真空便只縁報國忠義炯幾度恩綸回睿眷我識君侯禮數寛徳威無地不交驩此行入見想膚奏大計不出兵民安兵民安古人念此良為難因思先相台衡日退食歸來事簡編送雪堂南行雪堂矯矯僧中英今年逺作餘杭行朅來過衛首謁余特以贈言為寵榮君不見韓潮陽昔交僧徒暢與澄詠歌序别欲傾倒秪以文雅為推稱不以阿師髙義炯要飛花雨到南溟樂閒老人歌努格總管姓伯特名繼昌以爾字行葢灞陜舊將軍也今閒居鄧下自號樂閒老人聞予名甚喜詢所以襟􅈽有不期同而同者千里求詩此意不可孤也因賦是歌以贈庶幾酒酣耳熱後放聲而歌之猶足以見故家餘習云浮生擾擾駒過隙守虜􅈽囚真可惜晦明光景一月間開口笑談能幾日一閒未老方是閒已老謀閒何所及須信閒人是貴人束縛軒裳梏亡客况復筋骸血氣衰聖有嘉言戒貪得樂閒老人逹此理自放閒身樂山水君侯年甫五十踰解官歸卧南陽廬風雲寤寐鞍馬事錦韝脱落秋鷹孤飛揚䟦扈竟何用此身健在閒為娱大弨挂壁龍在匣追逐弋釣須鳬魚有時逸氣蟠不盡猶擬去射南山菟君不見邵平東陵時何若瓜田心自如後堂種竹前圃蔬月下自理淵明鋤客來大笑猶有事茶鐺煮月糟丘餔古人徃徃以樂老此意殆與君相符我今天地一佚老聞君此懐良起予何當杖屨與君約江山佳處身巖居半山喚起浮休仙窪尊一醉傾吾餘風流肯落六客後吟嘯常作三賢圖醉中為捋桓侯鬚君其樂矣歌嗚嗚醉道士歌秋九月二十四日予方曵杖出門有道士野服鶡冠倚立棖下予邀坐階所瞪目視予者久之曰觀君風骨葢李唐人也心事好但蹤跡蹉跎多失事機可惜可惜雖然得年八十餘數八八後當有顯權予言可切記也飲之酒醺然而去時至元二十四年丁亥嵗也因作歌以紀事其辭曰門前落葉秋風哀麻衣道士從何來翛然倚立兩棖下若有所諭心悠哉我因植杖邀與坐拂拭熊韋堂之階無言瞪目視余乆徐謂風骨真文楷前生落拓晚唐士心事最好無纎埃所嗟蹤跡多後時勃崒不顧羣兒咍雖然得儒譽極廣八八而後聨星台呼兒沽酒與之飲勸以數行浮大杯醺然徑去不少顧恍若仙遇神為開當生所賦諒自知過望榮顯青黄菑書稱五福夀為至得到八十真洪崖生平夢異復此遇晚節無乃其行諧吾看浮世孰不死我已天篤培其才濁醪粗飯有餘幸過此以往非予懐君不見通都與大邑真仙往返時為偕蒼蒼雲路望不及為渠更上淩風臺雙峯歌士逹察判攜手植檜小山見贈願愽一詩為信生家傳其志殊可嘉也遂賦此歌并以其山奉還葢詩非山無以見狀物之體山非詩無以表處靜之用抑又在彼猶在此之義也金絲堂前雙檜碧氣幹淩雲三百尺蒼精乆墮刼灰寒蟠柢輪囷堅似石枝條已䕃百王芳膏潤猶含三代澤土花漬嚙又幾年為象為山豈多得君不見召公甘棠武侯柏時以兩賢為愛惜後人歌詠尚如此况是東家手親植憶昔逰魯得餘材入手摩挲三嘆息信生為予好竒觀攜來比視吾家蟠泰山梁木方世仰何翅如到日觀秦觀雙峯間顧瞻巖巖儘足樂譬彼物有小大聖學俱能全此雖體微道則具終日儼侍参吾前古人尚行不尚説正可安靜如山然我今木朽不可雕後來聳壑争昻霄君家兒子玉雪比好學説是神超遥還汝山聴我謡仰止兹木思惟喬學該本末貴通徹無使磊磊落落徒有㧞俗之髙標過宋義墓予徃年東走魏過楚上將軍宋義墓欲作詩為弔而未暇今日與諸生講讀至義之本末前後諸儒略不見論説因賦此篇以發前賢之所未發者秦兵西來勢莫當羣雄假義尊懐王我雖三户秦可滅彼蝱可搏微者或莫傷將軍乗勢惡一掃當時籌策誠難量項家父子本強暴以謀制勝非渠長義雖去暴失之易一死竟墮貪如狼重瞳子何猖狂只知帳中竒兵化青血不悟鉅鹿之戰開天亡風雲惨淡蛇作龍安得即遇隆準翁使我目亂狐裘茸髙陽酒徒號狂客醉中兩眼何其瞳攀鱗掉舌纔數語兩女輟洗來趨風英雄有時利不利俛首何限甘長終楚王店頭土一丘至今草棘荒烟愁我來弔古還一嘅西風黄鳥聲啾啾中秋吟中統二年予客上都館于太醫使王宜之家中秋夜伯禄宣慰攜酒相過同㑹者館主王丈洎省郎宋庭秀近人來索舊賦亂道今亡之矣因追作是詩以寄二年中秋客灤陽灤江陸海天中央秋風吹空一萬里誰復斫桂増清光年分秋氣無少陂但覺霜露非尋常玉繩滅沒澹鳷鵲衆宿何有争光芒烟霄幸附應時翼佳節共下今宵堂鳯池鳴佩有餘暇白兔搗藥秋正香故人攜酒喜見過慰我久客同一觴謫仙杯杓思浩浩芙蓉城闕天茫茫眼中賔主侯與宋胡牀更對墻東王九遷初不羨時貴一醉徑入無何鄉人生相逢貴適意浮世聚散真参商當時少陵客愛國心遑遑夜深飲散卧不寐醉聴金鑰鏘瑲琅夜如何其夜未艾被衣顛倒尋封章只今潦倒百事廢感嘆嵗月徒悲傷書來索詩敘徃事盛集難再須揄揚興來追作固狂斐念君乆要曽不忘鄭重西樓花上月金波重約醉秋凉花工王氏歌城南劉郎攜斗酒與客來參秋澗叟當隅踧縮不敢坐王姓珪名三十九平生有技真可人好箇春風接花手木翁奪秀孕黄婆轉眼紅朋栖碧友劉郎秀春趣已成徃徃豪家鬬招誘王生本出方技家品味神經無不有流芳轉入百花香豈比槖駝法堪取只今家住園田西小橋流水遮髙栁㑹邀一醉百花堂要藉我書傳不朽我自東歸今五年小園栽種期幽妍城中糞壤雜瓦礫雖有美植何由蕃結根失所固可惜異品奚獨氷霜纒君不見芳蘭種不生惡草翦不去此事人間自今古田園子聴予語本根或撥非所宜一接千金戒輕與河圗篇答伯明學官河龍負圗自崑崙庖羲畫出乾與坤聖昌拘幽演餘藴六十四卦相氤氲姬情孔思本傳注行簡别出尊皇墳經從東漢亂古制綴合爻象為全文韓康輔嗣轉殽雜糅以莊老何紛紜東萊探賾復古定太極既判二氣終然分女媧拊掌為驚絶天地再位開𤣥根易包萬象無不至若以一爻為一事其道反局而不伸考亭専以筮為主豈非天道似逺人事親當時厄火燎九地不爾亦墮秦坑屯君緘越本逺見贈老眼一洗空花昏細披五賛得要妙餘作孰敢光争新君不見行逢市兔具此理桶底有見為伊新作詩寄謝君應聞風字瓦研歌示陳生平生蓄研空纍纍其名曰端猶可嗤世間萬有珉作玉堅則墨褪軟則泥或濃或淡不成字終日與伍空嗟咨東家瓦研面尺五其狀宛似維南箕松風小試漲𤣥霧臨視黯霮羲之池朝來揮洒儘快意一筆掃出千蛟螭東坡黼研不可見咄此朽壤争神奇君不見莫耶神寳不適用補履曽不如囊錐雷將軍歌雷舉秦人家將種不學齊髙賈餘勇温然醻接逢掖流照眼容刀輝玉琫朔風憶捲闗隴破西走巴渝為勢擁宋人重漢不内任閫責豪英制邊聳將軍守戍分劍闗劍門天險石巃嵸當時一軍號安靖玠去重狺閫呼洶余玠字義夫官至侍郎在亡宋時最善守蜀者也龍旂西狩萬壁空石角此心隨北拱天顔喜動詔賜金一日康侯三接寵盤盤大獲金湯牢雲間猛將鬚髯豪片言因壘引降出風義不減曹王臯蜀山破碎凱歌裏六軍喜溢秋天髙破岡山頭望囘斾小臣墮地空烏號囊弓歸來血洗箭又許拜舞趨新朝命妻賜第恩轉渥纔得主漕浮綱艘憶昨先聲躡鼓鼙只今騎馬似雞棲朝來攜酒過予飲細話徃昔非余悲事機翻覆古如此一椽僦舍甘調飢我方讀詩至秦仲車鄰駟驖生光輝乃知風聲氣習逺自文武始歌頌不到秦家非革故謡南城囂囂足汚穢既建神都風土美燕人重遷朽厥載睿意作新思有泚一朝詔從殊井彊九陌香生通戚里煬城密邇不剗去適足囊姦飬狐虺城復池隍莫歎嗟一廢一興固常理令年戊子冬十月天氣未寒無雨雪禁軍指顧舊築空郊遂坦夷無壅隔寂寞千門草棘荒佗年空有銅駝説我詩雖小亦王風庶配商盤歌帝哲通漕引漢家鼎定天西北萬乗千官必供億近年職貢仰江淮海道轉輸多覆溺東阿距泉清泉縣二百八瀹闕西來與清合安流取直民力省積水浮綱纔兩日自昔河防争横議秪辦薪芻不勝計宣防瓠子至今悲以彼方兹功極細役徒三萬朞可畢一動雖勞終古利裹糧荷鍤去莫遲行㸔連穡東過薊休説春潭得寳歌長笑韋郎空侈麗從今粒米斗三錢狼籍都城樂豐嵗珍珠菓詞有菓有菓名珍珠厥苞葱翠二寸餘絶類王𤓰未變赤紺瓤滋膩甘酸俱就中結核大于指狀似萆麻色微紫逺供來自廣南州臣子獻芹心爾耳然觀夏賦皆邦用口腹所充須錫貢若論橘柚亦常材此物胡為勞驛送當熊詞戊子冬十二月廿五日聴韓陳二生讀通鑑綱目至中山馮太后事蹟壯其貞節感而作當熊詞馮元帝偼伃哀帝祖母也漢家九葉時清晏帝拱深宫樂游讌魚龍萬舞閲來饜鬭戰雄觀臨虎圈老熊駭逸突笠出被髮攀楯來御殿昭儀散走虎士驚盛氣當前無少變大駕臨軒問物情斂容前對香雲顫妾聞獸猛得人止萬一不虞身殉難日華翻動喜歸來香飄合殿春風轉君不見東西兩漢五百載班馬徽音儘堪羡元城投璽馮當熊能以至柔馳至健大笑陳妃望幸心千金空買長門怨東征謡闕春涵物生廣芽孽中闕先王志忠奬馳驅鱗介闕海波騰沸聚使纎怒鰐奔鱷歸闕渠魁谷靜川空骨如莽今年復作欲盡殪逸徳闕駭天吏孽餘走死黑龍東詔勿窮追令自斃就中縱殺勢難分桑婦畊夫同闕例天兵南伐六十年楚女吳兒供北婢欲知天道闕覆心看取東人復為𨽻下瀨船家中之木同灰槁炎海波翻震天討彼交事大天理常嵗嵗卑辭悼虛表舟師陸騎問罪來力審難支施機巧彈丸所據五郡地瘴氣為災稱地利我來彼遁還則尾一弩千人不容避老天限作羈縻邦不以衣裳介鱗易昔賢有戒是貪兵若論彼資才具翠南越志尉佗將安陽王治交趾有神人曰臯通造神弩一張一放殺越軍萬人後佗子始質于安陽王竊其弩毁其機馳報佗佗興師擊之漢家聲教初無外下瀨戈船微主帥一軍膽落陷泥湖二萬選鋒同日敗裹糧載甲力有餘正坐無人作吾愾軍聲稍振需所援春水旋船可𢎞濟古人堂上有竒兵安得營平與動輩征士謡東風連日沙塵昏兵威掩盡春氣温漢家武備徧九有南來探騎絡繹何紛紛今年十抽一北去千里起赴和林屯御河西岸殷牧野萬甲照水光粼粼觀容有使親閲實不許代名須正身神牙獵獵見北靡精鋭全是嫖姚軍嫖姚出塞路幾千逺戰不過封狼山征人莫憚行役苦廟謀素具車攻篇君不聞王師有征古無敵何况強弩之末魯縞其能穿念渠愛惜腰間箭㑹聴長歌入漢闗天星行天星蓬蓬若為祟彗掃長空徂㢲位六龍推墮日車翻萬火分崩碎于地老天變色赤祲如西北絶天間狗吠行人匍伏羣雉驚澟澟甚于崩角畏君不見天星懸象萬象精一物下亡一星墜春秋二百四十年孛斗經天無此異不然大火示厥罰下熛人間為沴氣月寅嵗丑丁酉辰東方向明時又寅老翁百嵗見未曽何况地上蟣虱臣天雖髙變雖大災反為祥果何賴正有徳修知儆戒雨木氷晝㝠㝠雲族聚知氣滿闕作雨闕和變而凝氷著樹巧裁細翦千萬狀闕翁縮頸凍欲僵辦着乾坤開大素其詳闕三朝古説大官為最忂曦輪過午始消釋膏闕如雨泣少陽為臣氷即兵麟史書徵臣闕者互長雄此事胡為兆今日建春樓歌闕頭春日長建春樓闕與東闕門香層闕髙掲富觀覽春潭照暎千帆穡吳商楚女莫空過渠是京様河馬西京張世間忘憂唯食飲越羅蜀錦空千箱登臨人具醉飽去共城齊氏真非常共城齊氏真非常潛蛟行謝温將軍恵石温郎少年姿潤秀好古探竒出予右叩門相訪得怪供鬼刻神劖未嘗有我欣植杖三摩挲秋水潛蛟見蟠紐何年囚鎖出禹穴不磔鬚牙驚水母毅然見贈初不惜澹癖憐予象江守深藏夜壑空有戒當晝兒童負之走千金求買何所得一旦攜歸定非偶清泉湔祓庸玉汝屹立花間冠吾囿蒼鱗照水勢若動口鼻唅呀欲䲔吼常疑尤物即神物隠伏地中諒難乆宣和族聚失所在却恐雷霆下來取一春病酒日欲眠忽得此峯如至友娉婷翠袖喜欲舞復訝舞仙來勸酒君不見九成論樂一夔足萬石不須誇栁栁人生意氣貴相傾走筆酬洒當瓊玖重門行瀟條共西野有域號重門重門幽幽深幾許齊芳歸藩何足云公卿老淚空沾巾天道好還非少恩青山斜照自今古禪陵西望猶比隣曺瞞搤吭忍不殺終我四百為虞賔乃云得之羣盜手吾將誰欺欺彼旻君不見鄧城南頭漢濁漉至今草樹淒無春唐申王畫馬歌花萼樓前閲庭實布乗黄朱笑羣辟奔虹凝露故家物詔冩真形出東壁申王夭矯龍一種揮洒元精固無匹龍池十日霹靂聲房駟無光韋偃泣千年事徃失所在此紙流傳見真蹟明忩不厭百回看飛電流雲悵猶溼當年圗畫樂昇平轉首雲屯散榛棘儲皇纔藉河隴餘旋復廓清唐再闢物盛而衰固有時校以倉皇易為力漢家拓地封狼山萬騎騰淩已無敵更求駿骨張吾軍一綍風飛能事畢雖云中夏號雄強富不民強孰供億聖謨經世了不刋收卷入囊三歎息秋澗著書圗歌贈畫工張仁卿張生冩出秋澗圗先生胡為此逰居知余讀書樂幽寂况復野麋之性宜與水石俱西風蕭條秋氣餘浮雲身世將何如江蘺託詠太哀怨老松卧壑甘扶疎逢時不作棟梁用且須著論希潛夫盤盤澗曲深幾許長吞逺泛知攸徂百川横障使東徃細大不擇羞潢洿考槃有歌誰與伍山鳥山花吾友于張畫師王宰徒雲烟落紙何舒徐吾今平居日已久為我作此真良謨平生未嘗學學焉於此初古人尚交無老壯要欲靜泊志可明而逺可逾駸駸晚景幾桑榆不知此去澹泊得似畫中無目明神王骨相臞一丘一壑著㓜輿畢此一事為成書此外何有於余乎此外何有於余乎比集録古今相業為調元事鑑秋澗集卷十欽定四庫全書秋澗集卷十一元王惲撰七言古詩
