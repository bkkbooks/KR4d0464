  text: 二十二
  hash: sha256:8f4058e1381ee09c1c4d531e1cfb7566ec6ede463740a4c47658c737d16ac163
body:
  text: 元王惲撰七言律詩誠説堂三牲致養應為易楊子怡親志所難滿抱忱誠無少慊一杯菽水見真歡詠歌豈取時人譽温清思貽後嗣看想得歲時稱慶處春風香藹紫庭蘭史宣慰子明友松亭詩壮歲英威大樹馮老依松翠養襟靈秋風幾泛投壺唱偃葢空懐倚杖形華屋丘山驚夢斷玉堂編簡為君青千年貞魄棲修榦不信龍泉閟夜扃夀張左丞子友甲午正月十六日箕尾儲精一氣氲仰看風骨秀而神青宮羽翼風雲舊黄閣調和鼎鼐新若論救時非易得與同熙載更誰親一杯重為君侯夀紅藥堦前要好春春坊碧月桂璚枝人物風流映一時四海蒼生欣望惬兩宮和氣對時熙西池進讀霑時遇東閣追攀辱舊知此日夀君宜有頌載歌箴儆武公詩供職詞林巳四年今春添夀倍増妍詩如東閣梅花細人在春坊璧月圓漢業翼成無跡考遂初亭暖覺春先沙堤有語蒼生福好在論思拱御筵今歲調元事體新風雲開闔入經綸兩宮受賀安磐石萬國歸心有老臣相業儘髙麟閣讚醉吟時到野亭春五雲深處台星爛常見清光拱北辰甲午歲正月二十三日右丞何公闕麟華旦謹奉唐律二章以介眉夀松柏婆娑一畝隂貞姿不受歲寒侵侍謀東閣時情恊養浩南窓夜氣深閒縱詩懐穿理窟静觀羲易見天心百觚剩有春風釀重為明時要細斟叢臺袨服士如雲又見聰山一氣春帷幕細談天下事典刑渾是老成人詩来東閣梅花細歌入民謡漢法新健羨武公宜自儆太平勲業畫麒麟過左副賈相公新阡左副新阡何處尋斜陽東北望喬林連城政美無瑕璧萬卷書多遺子金冠劍圖形淩閣重風烟埋恨石麟深峴山欲墮豐碑淚桃李公門緑滿隂彭澤二賢堂為江州周使君賦斂形宵逝無三月待罪鳴琴滿五年與論行藏原有異比量心事本同然浴光力取虞淵日示貶忠凝甲子編千古新祠祠下月不應獨照二公賢謂分光於使君也李清甫分齋鷃飛不過丈尋間鵬翼雲垂九萬搏毎自忖量彝秉外就中増損一毫難洗心俠習從多可放眼青天有逹觀拈取榜齋纔隻字此身還有泰山安送表弟雲卿經厯赴上都先時韓夀院判仲常詩有通介不隨新進士虀鹽依舊老書生之句大為王君稱貫及北行仲常用元韻餞贈韓持詩見示亦請予依韻相送因勉為賡賦樞廷機務貴謀成調議中間執倚平經事莫深吾弟慮臨機能盡上官情正煩謨畫孤忠壮肯着車輪四角生明日馬頭新店路居庸山色照吟觥秋日宴廉園清露堂并序右相康公奉詔分陜七月初一日宴集賢翰林兩院諸君留别中齋有詩以記燕衎因繼嚴韻作二詩奉平章相公一粲時座間聞有後命故詩中及之何處新秋樂事嘉相君絲竹宴芳華風憐栁弱婆娑舞雨媚蓮嬌次第花照眼東山人未老舉頭西日手空遮賔筵醉裏聞佳語喜動金柈五色𤓰頷聫一作高雲錦席翻涼吹翠葢紅粧簇藕花朝野歡娯到靖嘉五年經制見金華先聲逺動秦川樹後命光融紫禁花歸騎不妨沙路晚留中恐為國人遮暗用司馬端明留臺西洛事自慙忝列絲綸地憔悴秋風一繫𤓰德夀殿玉方池研理宗所御德夀殿為太上皇後所居殿緝熙講經殿也硯即碧絲歙也玉斵坤形霮四溟丹書猶認夀宮名紛紛落墨騰蛟霧淅淅秋風拉瑟聲神物不知崑火烈碧絲今對玉堂卿眼中多少興亾事白髮孤臣最愴情當時同僚承㫖留中齋學士劉東崖侍讀趙方塘皆宋人也甲午秋七月九日扈山約赴李君水芝之㑹予以事不克徃明日例徵詩因繼中齋韻陪京秋早物華清杖屨迎秋出綺城蓮社與吟千葉白盤餐非為五侯鯖眼中閣老何瀟洒意外浮名任易更唯有柯山山上月歸心同照石梁横飛葢追隨野興清冷烟疎雨溼層城兩舷踏足空蓮唱大嚼過門得鼎鯖錦席髙雲増爽朗秋風殘暑喜交更竹西歸晚留餘思詩在夕陽澹處横為周紫巖賦冬日牡丹蘇州人右職出身新簽兩浙行省事留中齋索賦翦翦江風十月霜寒梅時序見花王一枝重薦金盤瑞滿幄濃薰麝粉香恊氣暗持忠節壮名葩来伴紫巖芳故園從此恩光爛卷裏題詩半玉堂再繼前韻贈中齋承㫖先生襟韻氣之清開府歸来客薊城雅集不知河朔飲名談有味德麟鯖歸心落日常躑躅世事浮雲任變更夢到柯山山上月流光還愛石梁横賀梁㕘政陞拜左轄故都喬木百年春累葉簪纓得相君馬出渥洼騰逸氣豹藏𤣥霧見竒文十年佩玉何清響一見英標勝素聞剰説鼎調多至味兼收時到野人芹題奉常李謙甫歸覲詩卷十載馳香望玉關一朝羅拜喜生還温顔孺慕猶親側秉燭相看似夢間棣蕚香凝姜被暖故鄉誰羨錦衣斑鶺鴒庭樹春多少車馬西行總詔頒首句一作雁足馳書四十年阻離殊域喜生還腹聫一作棣蕚華承餘讌樂錦衣誰夢照卿班賀唐承㫖新堂落成碧鷄華構喜新成軒𤨏虚明夜白生花影入簾詩思淑琴聲當户月華清人生孰若安居樂樽酒重尋風雨盟不作老張輪奐頌玉堂清議正煩卿甲午八月一日赴李總管蓮塘之㑹坐中走筆賦此斗酒初醺倚畫欄藕花紅映萬珠盤野烟髙栁吹衣溼碧落銀河照眼寒老去自知情味減興来思盡故人歡相逢一笑真難得況復君侯禮數寛諸人酬詠既巳復和前韻垂栁横橋轉赤欄望中清興散愁盤玉淵堂逈山光碧秋水臺髙午景寒爛漫不知前日㑹唱酬當記此時歡平生肝膽向人盡不是悲秋强自寛甲午中秋日宴同簽洪公東第賔僚集賢翰林兩院而巳将暮雲隂四合既歸月明如晝偶賦此詩且記盛筵三首今年秋夕賞心何絲竹堂深間雅歌三院盍簪都下少四筵登味海東多休辭皂葢停車轂盡倒清樽待月娥兩袖桂香翻米盡更憐歸路影婆娑赤囊無騎海無波今歲中秋樂事多為愛頤軒吟興逸来陪詞客醉時歌紅雲照眼瞻天近白髮欺人奈老何連夜暮歸驚夢翼林間金背看陂陀稍稍英氣秀横秋此日青雲接燕遊賔府笑談詩酒帥故家人物鳳麟洲為憐桂影饒清賞歸避金吾怯晚留為見頤軒慇厚意更将遺興較詩籌題髙和甫侍郎先世圖譜後故都喬木幾蒼蒼髙氏宗支慶緒長兩世簪纓登相府百年忠孝見諸郎解紛晉漢多隂積斂袵韓劉避耿光什襲寳藏防墜佚衛公遺物要同芳送東崖學士縂尹建昌軍九月十三日待詔詞林整十年黄金横帶列朝班紅雲黼扆瞻天屢白晝鄉關著錦還顔筆謝詩増曠逹銅陵碧澗夢躋攀慇懃華子岡頭月先借清光浣别顔遊水峪雨沐山容曉更鮮峪深行入洞中天林間石綻傳經鉢嶺崦雲封種玉田世味酸鹹誰自信人生聲利古難全道人歸潔宜諳此抱石歸来煮夜泉今秋山北迓囘鑾偶得新詩記徃還臣子要知吾分在功名休問老天慳滿軒光寵居庸道兩袖風烟水峪山同見同遊又同樂從容恰及一旬間過誨之髙兄新居髙子幽居逺若村北城城下栁藏門寒因霜早收梨栗貧喜家安遺子孫閒裏有詩渾漫興客来止酒對空樽自慙過訪成疎曠戀戀相看到日昏為洪同簽書譜公中秋燕集詩卷因題于後新詩靉靉碧空雲一様書来更可人落墨空翻蟾影黒清吟真有鴨江春鷄林取重吾何有樞相知音世罕倫還笑愛鵝王内史寫經時與羽流親夀泉平章兩朝元老漢刑儀宣室深香侍受釐博識不遺三篋秘拜公應較十年遲敢從汗簡聫清秩喜為裁詩薦夀巵瀚海綵波三百曲歲浮春色上芝眉夀董承㫖正月十一日百觚春酒遐年夀千首新詩二品官窮逹不為身外計功名儘向後来看細圖野隱明歸志靜撫孤松愛歲寒此日稱觴宜有頌兩宮恩眷古為難送縉雲教官伯讓之任瀏陽仍和見贈韻縉雲遥裔以才聞逺任長沙弔楚臣論學拜官甘冷職過門求益有斯人道傳伊洛真吾事詩到齊梁恐後塵領取漢家聲教去六經何地不陽春元貞二年丙申元㑹日大雪萬寳陳庭未是竒千官朝處玉為墀静看整整斜斜態不礙蹌蹌濟濟儀法部氣嚴催箾舞御爐烟澹溼鸞旂小臣歸美豐年慶不數元和賀雨詩送省掾李希賢隆興總判西京人春水延芳扈從辰笑談鞍馬見情真幾年畫省含香掾一日公堂入幕賔政異莫如官事簡心丹回夢帝城春古稱四海皆兄弟洒落如君有幾人夀彭夀之慶八十詩軸竹色宮墻野粉黄百年遺老見張蒼青雲仕宦思疇昔白髮光隂在故鄉健歩不知鳩杖勁眼明猶炯竹書光若從九老徵遺事好著丹青畫寳坊大賢詩三首甲午歲正月廿二日癸巳偕翰林諸君謁太傅巴延公於東城甲第之北堂公姿威不見猛簡不失和真魁傑人也公初至燕首詢諸何右轄曰翰林諸老今右者誰及是厯問各官夀期今供何職酬禮間顧相謂曰朝家所以養褚老者正以乞言論政而巳如事㑹議各顧官守未免或偏若集之同僚則議綸通一所益良多某曰前世立益政院者正此意也中丞崔相亦以為然乃知公深謀逺至氣量含𢎞朝廷之上軍國大計心無或不在所謂大臣以道事君者也既而公出衆俟門屏間遣紀綱来謝曰不敢多勞遂退因得大賢詩一首紀其披覩之快後二年公府掾張楚持畫像懇題哀挽既書鄙辭載惟疇昔情有不能已者且念六合雖一相業未展天不憖遺老哀斯民之不幸也噫因附録于後萬馬龍驤宿漢陲朔雲邊月避旌麾麟遊近藪人歌瑞虎在深林氣甚夷解甲齊山降宋日鞠躬趨陛入朝時有懐不盡蒼生事空詠皮公七愛詩使華来自海西邊一日風雲擁将壇仁信有餘收戰格旌麾不動下臨安應憐文武匡時切忍對麒麟畫像看不獨臨淮開府㧻追思勲德淚闌干軍容機政兩儀刑自有胸中節制兵直道事君忘智勇丹心為國儘忠貞風雲感㑹千年契笳鼓歸来六合清遥想翠華秋獮祭聖情凝佇聽鼙聲異菊圖一枝十花容色各異未之見也故賦枉説重巖細菊斑連眉十様更清妍不辭老圃秋容淡要見花神景氣偏越被香濃薰百和柴桑人去已千年醉吟不用江州白此日東籬得董仙百品流芳見已稀一枝獨秀更堪奇秋陽借暖留三徑翠袖分香到十眉竹外晚粧明閣院月中青女要新詩繁華悽斷長沙夢畫裏淵明又一詩聞友人買犀帶聞君饒價買犀纒似為精神見老年綸品要勝華衮異垂腰猶欠玊魚懸通天即是裴公賜素髮其如白傅顛留取百錢休妄費安排開歲置貂蟬贈瀋州樸生子温踵門来謁樂新知自説容城指授師孤鶴逺從華表下六經都向管中窺西山掃墓懐私淑東郡趨庭儼聖思莫把一簞顔氏樂春風吹作錦囊詩送總統佛智師南還釋教總統佛智大師姓積寧氏名沙囉巴華言為吉祥慧也西畨人祖相嘉屹囉父沙囉觀以象胥王譯諸經至師八世矣師早侍帝師發思已受知先朝精詳内典又喜儒書樂與吾屬游元貞初選師為江浙總統明年率諸山長老入覲獲侍清燕啟沃一言煦煥三呉同游大覺未歸江東父老投牒行臺趣師南還将行以贈言為榮因賦是詩以送白足毗耶不易逢鬢絲禪榻偶相同經来震旦三千界人在天龍八部中滿送酒船浮北海細薰香霧供南豐江東父老催飛錫要沸潮音與海通與梁總判楊少監武子劉總管叔謙㑹梁都運髙舍别墅夜話帳中樂怡怡也梁君索詩因書此以荅雅意元貞三年二月十八日也問字嘗思過子雲一樽梁墅喜情親清燈夜話逢知友喬木蒼烟憶世臣野水添杯無盡藏侯門儲慶有餘春五枝休數燕山竇黄閤經綸見秉鈞挽子敬楊君終唐州知州子裕母弟青血陂陀閟夜泉鶺鴒庭樹巳蕭然一樽共飲留情話五馬長歸足别筵黄壤冷埋林下璧緑波空泛幕中蓮息軒未覺風流逺行見英彪厯試年送李敬甫之任靖江總管海山蟠亘十州環桂嶺西南隘漢闗吾子有材稱吏治土風從古號時慳老天形勢開炎德赤子龍蛇雜洞蠻交致恩威民事了雙旌歸早慰慈顔呈髙麗世子霞綺紅潮鴨緑清風姿渾是父王英禮文曲折猶周制脂澤涵濡見漢甥衡宇接談今日欵中堂陪宴向来情鳳皇池上應回憶慚愧朱絃一再行冬日海棠玉環朝醉緑雲鬆晴旭幽軒不信冬春色暖私神草異丹砂重見海洲紅銀釭侍寝留髙照青女憐嬌為動容似與方平慰親老金盤佳品不教空夀唐承㫖母王氏承㫖五六歲教授孝經論語于母氏教子堂深映謝幃碧梧停鵠發英㽔臙脂㸃額猶宮様懿範齊家備母儀香裹鸞花回紫誥雪封梅信動横枝百年好在升堂拜歲歲分香入夀巵慶王彦舉太夫人九袠之壽花栁西池㸃翠妍婺光曾現竹宮烟年髙賜幣承恩重子孝能忠見母賢女誡看来彤管煒雲花行墮誥鸞鮮風流九十人間福纔是平頭第一篇和樞院王仲常雪詩嚴韻龍武新軍宿禁墻鐵闗風急走降王雅歌望絶皇華使朔雪春回黒帝祥四海同風有今日九天清吹表戎行兩宮和氣春如水併捲流霞入夀觴夀王仲常院判顴骨清竒類左山紅雲香軟侍天顔處心久在升沉外着我何妨伯仲間宻學潛隨空底轉新詩清與化機閒太平有象邊聲静醉聽長歌入漢關題節婦寗氏手卷蘭有幽姿竹有筠秋霜庭户藹清芬誦詩已矢靡他節在禮初無再醮文蟋蟀聲寒思曉織焄蒿魂黯夢孤墳楚王祠下秋原迥消得旌書倚碧雲贈髙麗樂軒李㕘政甥樸學士中統初予載筆中堂常陪先相文㑹且有唱和今覩髙標日暮懐人不覺慨嘆因賦是詩為贈情見乎辭鴨緑江頭老謫仙醉中吟諷得微言當年翰學推賢相此日髙風得樂軒白雪陽春原寡和翠鸞朱鳳看同翻蓬山秀色鷄林筆歲歲封章入紫垣題保定醫學劉教授慶八十詩卷八秩光隂積慶多笑看金狄手摩挲前知来事疑思邈集驗儒門似子和藥籠功名閒等第醉鄉風月飽經過雞川如畫郎山秀好在春風十二窠和贈髙麗鄭學士詩韻豹管潛窺見異姿雞林詩好動京師恩深自比滄溟闊國小方資節相毘寳瑟聽来多雅唱人生樂處是新知蓬山歸到梅花在千樹清香醉拾遺和雪中鄭樸二學士金司業来訪詩韻風雪長安撲玊塵詩成驢背欲誰親海東游子興不淺醉裏微言語更真膜拜尚思瞻國老過門今喜得陶賔人生適意無南北宮錦淋漓未厭頻挽馮副廉夀卿友契漢署千官列兩曹當時儀物聳清標鞶囊議事驚孤注霜簡摧姦見六條樂府名香金鳳管楊橋風細月明簫雪崖遺恨埋千古大樹風悲日寂寥養志堂詩為前江西省郎中孫居仁宇謙甫作幾年臺省到清班一作聖門垂教色為難莱子嬰嬉舞袖斑游刃恢恢政務閒順志如詹推致養為親捧檄即承顔餘歡方在恩榮際純孝初非口體間開卷諸公足歌詠自今錫類滿鄉關高麗國王謝事詔世子嗣位東還詩以送之禁臠東牀得象賢逺持龍節赴真傳靜看麗海風雲契更覺天東雨露偏萬里寵光隆帝館三韓春色入吟鞭百年藩屏敦姻好合有精忠在日邊秋澗集卷二十二欽定四庫全書秋澗集卷二十三元王惲撰七言律詩
