body:
  text: 故宫遺石華陽遺宫土花碧依然萬石如林立憔悴崩雲偃月姿留與都人作寒食至元十二年蕤賔前二日同賈漢卿遊上方光教寺謁相上人不遇因賈往年留題五詩清新婉麗煩襟為灑然也亦留詩璧間仍用其韻為鑑堂一笑紺碧亭亭午影凉同來共坐賛公床拖條拄杖誰家去借問山僧有底忙出處何心燠與凉適來真是兩繩床分司不作埋輪去虚抱垂崖捄火忙古寺僧殘草木深寳香猶足散煩襟雪窓不到聞猿句幽鳥還驚恨别心謂漢卿明日北歸萬事無端起六根蟻旋蜂鬬苦紛紛閒來莫厭僧忩話暝坐蒲團到日曛花木禪房一徑幽生平竒勝愛窮搜入門便得清凉界信有人間六月秋閒閒公至大五年為慈聖兩宫重修寺碑説寺盖夷山之地唐令狐楚愛其竒勝曽居於此塔係唐新羅僧智照用海船運新羅琉璃璧所建紀之以詩閒人愛作静中忙細和新詩步繞廊老衲向人誇水異一甌春露雨花香流杯池九曲灣環碧玉圍錦香吹浪下龍池一觴修禊宫中舊正是梨花雪滿枝太白捫月圗詩中無敵飲中豪四海飄瀟一錦袍千丈醉魂無處著青山磯上月輪髙閻次千秋山圗五年官守晉州城伐石堙山日有程展放畫圗還憶得姑山黄葉正經行李白醉吟圗長庚風彩月争輝力士旁無識子儀白璧莫嗟疑有玷夜郎風物要新詩題蘭廣寜望海寺詩卷後同年樂用之為録二詩贈仁甫縣令金到明昌事事新粹然一氣變斯文試吟望海樓中詠轉見飄飄思不羣逺懐世契崇眀徳遹述先猷極孝心舉世泯然衰俗裏兩家風誼見來深紫陽觀雜詩和西溪嚴韻袖裏丹砂照夜紅市人争識漢壺公南都花木春猶好長在先生杖屨中心安已契長年説通寂能開不二門我亦静中存夜氣此身之外欲何存終日沉迷簿領中乘閒時過紫谿翁請師莫作功名看心似浮雲度太空片言理到釋羣疑不待諸生入管窺收却藥籠無個事一簾春夢落花知坐忘不戴逺逰冠是是非非了不干欲識紫陽存飬力一簪𤣥髪頰浮丹絪緼元氣化雖精起滅漚如一唾輕為問壇邉聽經鶴人生何苦未忘情余年齠齔出京師想像繁華夢覺時前日石壇揮麈處故宫真似黍離詩昌黎一序了仙翁六絶西溪意匠雄從此夜忩虚白滿滌除𤣥覽見沖融一壺天地市朝間施藥歸來静掩闗幽睡不知紅日晚青山誰似白雲閒壤壊槐宫蟻戰空銅駝陌上㡬秋風一身歸潔何難有人重清時濟物功宫井七絶團團鴛甃露盤秋玉潤砂紅湛碧流多向内家供頓後餘甘翻麝入茶甌野粉侵淫暗漆花玉床零亂卧泥沙羸瓶敗繘初無擇波及都城十萬家髙梧隂羃掖庭西清比中泠甘比飴今日道旁塵穢滿秋娘憔悴渡江時清時瑶殿引瓶金百尺還聞墜水音想得日長宫閣静玉盤珍果看浮沉金屑離離泛曉光瀛池通氣溼嬰香六龍不挽清波去忍給吹脣燕御床事事宫庭到可珍我因懐古故來頻一泓雖在當時水終似上陽白髪人行入空宫重歎嗟倚天金碧墮塵沙景陽留在臙脂井似與都人入夢華後三絶和西溪韻武元直雪霽早行圗謝宣慰亂峰叠巘玉崚嶒危棧何人趂早行似我姑山新道就神居東崦聼雞聲予官平陽時開姑山道甫成夜雪大作試車下故云神居雪擁天山六月寒冷雲西北是長安行人馬上揚鞭喜猶勝南荒作熱官侯敬甫四題同西溪賦昊天報徳詩人感號慕終身大舜心舉世靡然衰俗裏一家追逺見來深永思亭怡怡和氣滿春臺天顯曾忘鞠子哀説似升堂興起客功夫原自孝思來友于堂徳積於身報自豐君家培植見深功友于堂下㸔珠樹漸與三槐氣象同種徳堂紛紛萬變一心微止水能澄見是非客去妙觀尤有得滿簾春日静朝暉清心堂䟦唐申王畫馬圗内府曽觀鐵筆驄又於此紙得真龍却疑決電奔虹異不到少陵題品中題劉平妻胡氏殺虎圗獸猛其如義烈何揮刀峻絶魯陽戈哀哀哭絶東山婦恨入秋空淚謾多重陽前三日同文季長畢茂先酌七賢祠下滿眼青山落帽風七賢祠下一樽同雲煙顧盼來能㡬白髪相㸔總老翁蓮社圗莫怪淵明從逺公鬢絲禪榻偶相同談空説有知多少都在龍眠意匠中二教𤣥風盛永嘉後來諸子更紛拏淵明興在東籬菊獨泛秋香亦自佳一誕相誇陷洛郊流傳江左到滔滔杖藜首見淵明傲畫裏龍眠意最髙贈唐縣李縣尹按部次堯封教官石雲卿來訪因話縣東有前鄞尹李君年六十四雖武人性喜學己卯夏自浙東歸載羣書滿家將遺之子孫以酬夙志吁可尚也余聞之喜而不寐明日元旦躍馬來觀出經史子集及未見書七鉅箱凡千有餘帙富覧間偶得是詩以贈傳謂十室之邑必有忠信者李君其人也君諱忠字彦徳縣人為蔡國公将闕來向王充閲異書田間炬草照西東正是農家一嵗豐不謂兩椽茒屋底白頭還得愛書翁唐之農家然束草于刈穫田間視其所偃以卜秋成元旦日庚辰嵗唐縣元日堯封今嵗遇新年欲訪遺風已𣺌然願效老人三獻祝至元天子夀如天吾皇仁聖邁唐虞寛大恩頒嵗首書正擬乘風開濁浪忽隨疏網漏凡魚宣和珍禽圗紫烟阿閣鳳連巢瑶圃飛翔下絳霄踏散木犀花上露翠襟丹喙不勝嬌和唐邑教官石雲卿見贈詩韻自笑鉛刀效至剛夢中揮箠走羣狼東皇若假春風便放使諸山草木香已夘除夜次唐邑夢登一城有數狼前行以尺箠揮之四散避走又見一豹無首前竄完州道中使符按部喜同分首自行唐入保垠誰著分司王老子杏花香裏過今春是年同出廵按官韓君羙梁韓二簽事大使王西溪過蔡國公第宅南衙路斷歸時貴東第堂空設繐帷鉅室顯知神鬼瞰一簞顔巷未為悲庚辰嵗人日前一日書夢中所見碧樹翻香滿洞春一聲長笛隔花聞似嫌燕語鶯吟碎暖噴宫音遏夢雲題木蘭廟廟牓曰孝烈将軍在今完州城東北隅至元庚辰正月十日來謁土人稱昔木蘭戰此得功故廟有熈寜間知軍事河南錢景初題記并所刻樂府古辭春風奏凱入眀光不願曹郎歸故鄉今日西山見遺廟蕙蘭根異死猶香迷離撲朔雜雌雄萬里持戈此建功因見漢家征戍重盡興閭左尚秦風登完州城樓州是古北平又曰永平即漢曲逆縣地故城在今州東廿五里即髙祖云余行天下見户口夥繁獨此縣與洛陽爾故城西南有大埌土俗相傳謂陳平墓土人稱墓曰埌漢家山東二百州當時繁夥此為尤朝來指顧城樓上斜日荒煙草樹稠望郎山有懐郝陵州太行鼇掀東入海鼓鬛髙撐霄漢間一自詩仙黄壤隔風雲空鎻碧峰間張九元帥哀辭并序不肖與公既昧平生哀誄有述似渉無從然聞公幼登詩禮長識風雲雄畧英姿為時名将始徇江淮厥績已著及平二王雋功獨髙夀年未遐天遽奪去故作是詩於以為國哀而寓天下之所共惜也辭曰瘴海波澄戰血紅歸朝無㡬病籠東異時惇史論書法當與將軍死事同盛説将軍禮度寛訃聞中外不勝酸可能秋月臺前照便作悲風易水寒英姿䬃爽戰酣來夢裏神交一噱開弓劒永隨秋草没春風吹恨上金臺一曲鐃歌變八哀扶桑宿霧若為開我雖不識将軍面苦聽鼙聲惜将材蔡國髙勲上将壇九郎又領俊功還遽教零落蛟龍匣千丈神光失斗間曲中有悞時為顧特見巴丘藴藉姿不似九郎横槊裏笑驅風月入新詩堂堂萬里常山陣首尾横穿海道空淩屋未圗元帥像樂歌先奏二王功前日長歌入漢闗今年埋恨九重泉應憐一段江山秀再到人間又㡬年劒騎前頭掲認旗風飄笳鼓入雲悲眼中部曲渾依舊不似樓船入海時標柱紀功超漢将臨江觀陣惜竒才更憐一片金陵月冷送哀聲萬里來風吹大樹日蕭蕭雄畧無由覩嫖姚暴骨莽如天似暗不容勲伐盖東遼風翻素縵天為慘栁拂朱旗露易乾雞水不供門客淚郎山空倚㦸衣寒水邉臺榭月邉樓虎逝彪亡共一丘羽扇冷隨秋月暗銘旗髙颺竹煙愁保下春夜金臺池館錦屏圍煙栁風荷蕩碧漪景物縱疎猶可愛畫船春水放燈時諺語新年百草靈燕遺禳禬鬬多能就中兩地風光盛東府風鳶保下燈題抱陽山張燕公讀書堂在完州東北廿里富貴功名恐等閒丈夫臨事節為難挺然不附姦臣請似覺功夫出北山書龕髙倚抱陽雲萬壑天葩發異芬莫訝相君潛伏久東封西祀要鴻文淩閣勲名煥日星豹藏於此貯精英江山萬古風雲筆未覺前賢畏後生贈孤月老明月靈臺到炯如清光元叱衆星殊豈知影落千山底以徳㸔來永不孤攜笻偶入賛公房照眼驪珠夜有光臨水起亭他日事為渠題作墨君堂謂觀蘇黄二公手簡真蹟者數幅祝香保定文廟泮宫絃誦育多才視作尋常事可哀羣吏近霑誾侃色正縁文廟講書來遊張将軍山林至元十七年二月朔同苟嘉甫尚文蔚遊保城東張将軍山林置酒松臺因話郝奉使朱家州事亭圮臺傾老樹欹夕陽淡淡鳥飛遲一樽細話朱州事天道幽冥未易知䟦雪谷早行圗壺口山深石徑開六花一夕浥浮埃披圗憶得經行事夜半盤車下嶺來題武遂朱君挽章後諱和字信之簿領微勞到贊襄政圗真見此心良更将一片西湖水波及奎郎見不亡吏業出身子公奎字君璋新安道中長陂極目麥青青總是當年鴈䳱汀二十四橋春水外野人指示望鵝亭官舍即事酴醿燕雪栁垂絲簾映虚庭淑景移八尺風漪紫藤滑清和天氣未暄時題節婦盧氏銘後節婦墳臺博陸南九原不化是真心儼然一片松隂石只與西山共古今祁陽道中鶯啼花落已無春四月田家更可人雨後老農催種穀風前紅袖採桑頻行人不為送春忙一雨千林草木香馬上緑隂三百里直㸔春種到祁陽一春勸課厯郊墟路入祁陽氣轉愉夾道錦韀州太守隔林紅袖趙羅敷題孝感聖姑廟壁分司巡厯滯農官來禱靈壇為嵗寒一炷寳煙神意暢祥颷吹下鳳雲冠仙去清溪事渺茫女工留在故園桑春風蘋滿汀州緑吹作淩波歩襪香卒嵗誰能不製衣為蠶來禱聖姑祠何當雲葉翻㸔處門外山桑緑滿枝題董左丞墳林大樹蕭蕭緑滿林蒼煙埋沒石麟深兔葵難道無情物猶學将軍捧日心南海揚旍開百越北風漏網有奔鯢多應奪去怱怱歎斜日宫中聴鼓鼙董相墳林南董里九門東下槀城西千年孝繼忠傳業萬字豐碑㸔御題眀皇私語圗人老逢秋百感催夜深私語自為媒祗知海嶽情縁在不道生離有馬嵬盈盈一水隔雙星不似行雲侍錦屏歡樂㡬時憂思集碧梧秋雨待君聴秋滿驪山有所思海棠紅盛鬢華滋細思夜半銀屏語總是三郎嫌媚辭戯題堦前玉簪露影幽香溼畫簾美人睡起未全忺只疑冷墜搔頭玉月暗雲階欲悞拈題郭都水若思祖行實卷後公善推歩算數隠徳君子也邢臺天元章㑹到𤣥機星厯推來一理齊襄國至今傳異事門前鵷水亦曾西龍岡拱木秋風老燕處猶懐隱徳尊皇極不窮身後數青雲今見起家孫鎮陽新居行馬門施擁豹幢徳威端稱使君堂不應花影潭心月昨夜分光照客床一作緑水堂前月緑水海子園堂名嵇侍中祠在湯隂縣西門外二里八王雲擾亂中華義士何辜掩戰沙懐恵懦庸猶晉祚争教移鼎入牛家侍中精爽有無間霜葉猶疑血㸃殷一節見危能授命陸機回視恐慙顔沙河道中昨夜清霜比雪寒凋殘羣木栁宜先朝來信馬沙河道一一風前翠影圎西門豹祠在豐樂鎮束南一里古人辦事笑談中常愛西門禁暴功邂逅馬遷稱善史不應排比滑稽雄光武廟在柏鄉城北十八里寰宇記云其地名壇亭乃帝即位之地也雲臺袍鎧鳳花紅一體君臣祭祀同前日洛都城外望野煙無地認南宫銅柱文淵上将功雲臺英烈儘争雄可能祗為椒房戚不在龍姿姚耿中滏陽道中纍纍遺塚覆圜瓴半是髙齊與魏陵千古是非同一盡簒攘終為路人憎邯鄲吕仙翁祠邸飯猶炊一枕回繁華能㡬暗興哀仙翁祠下無窮客不道都從夢裏來題杜郎中二子字説卷後燕客儀容雲表鳯紹宗英秀掌中珠故家正有新詩句不到徐卿第二雛于公慎獄起髙門積徳而昌見後昆正似紫峰遺澤逺青衫逺有讀書孫題劉大用畫草蟲手卷蠢動翾飛自一天眼中風露發清寒筆端正有坡仙樂莫作宣和藝本㸔東坡墨戱出新意八詠復見河陽劉夢到草堂風露裏碧花籬落侯蟲秋格物先須論致知古人圗史發幽竒多君夢到周南國繪出豳風七月詩闕題清風澄治畧無私蟻聚蜂喧任一時正要至誠相推與不須臨事渉多疑宣和寳石圗煙雲萬態煥金書染出湖光照座隅不道漢家規制久泰山磐石是基圗嶽廟謝雪偶題至元十六年十二月廿四岧嶤觚爵動雲霞惨淡隂靈黒帝家恒岳所臨風雨好不須飛石示雄誇野老題詩語最工表余精禱與神通爐煙散處雲生野祝板喧時雪滿空偶得二絶寄府尹史子華離離殘雪㸃山郊麥壠埋深不見苗春在草根泉脈底淡黄先到緑楊梢人説中山有父風久從眉宇得沖融燈前近閲虞芮案轉見公明簿領中謂牧羊北議劄等事曲陽道中軟紅沙路栁條風雪擁陽陂見煦融細繞嘉山三面過唐河東北望堯封癸未年二月九日雪東皇且莫認來真開拆花封占好春一夜雪花深數寸肯教桃李露精神㡬日輕隂雨氣氲凍殘花栁望春温不知一夜豐隆意散作銀花藥麥根去冬寒沍過常年節近春分尚凛然驀地雲開風日好暖於南國賣餳天大都即事一資半級到銖分往往超遷越等倫除日豈徒傷道念飢寒常有㡬千人薪如束桂米量珠二月中旬凍未蘇笑殺九遷金馬客半年僵卧聽除書創行敢效木求魚例進難於上坂車㑹取一陽潛九地春來葭管氣舒徐燕都萬夀宫有梅一株毎嵗移置窨中逮春仲方發藏今年得花滿枝雖氷姿的皪香色彷彿終强顔也戲題二絶以自况仙家有術解藏春蠟蔕雖融凍尚皴若比百門山下見强顔還似聽除人冰姿難倚暖回根人力封培氣始伸蓓蕾㸔來雖勉强一枝猶冠漢宫春即事無著必須循體例有依便指是人材區區桃李栽培手恐負東風一例開朝鐘暮鼓惜蹉跎有例臺除半嵗過不是馬周無伎倆翻來覆去㡬常何都尉王晉卿畫著色山齋圗坡仙寳墨妙通神都尉丹青要儗倫欲識淡粧濃抹意髻鬟渾似鏡中人半生翠繞與珠圍不謂槐根夢己非老去紛華心自得筆端時到野人扉恵崇蘆雁圗雪灘風竹映寒塘水宿雲飛未易雙不似鴛鴦沙渚暖翠紅相倚睡春江小桃小桃開拆淡臙脂不出初春未半時二月朔風吹石裂依然憔悴簇枯枝梅粉飄零栁未煙一枝春色獨當軒今年盼得紅苞拆風雪禁持第㡬畨清明節近無旬日桃蕾含芳又㡬朝今日簷前㸔春色一枝纔見褪紅椒題日者詩巻侯鯖熊掌味能甜舉世㸔來意欲兼不似君平安素履一罏香燼静垂簾蔡琰歸漢圗眀妃光寵照龍沙枉説琵琶憶漢家去住兩難心最苦就中哀怨是胡笳和劉仲修見示十一首今嵗餘寒過往年東風無奈雪花顛㡬時不禁燕臺酒蹴踏陽春醉十千野鶴昂藏本不羣剛同秋隼下翔雲近年轉覺謀生拙半仰公田半賣文舊城行出入新都驛劄堅求更聽除馬上相逢還自笑背行今見兩茅廬闕多少開花不識名侍列朝班不厭紛久疎鵷鷺入行分今年借就袍簪笏喜向龍墀拜聖君滿紙新詩説逺遷淮西依例住三年若從清議先才智恐不多時又着鞭先聲光動弩臺春入手行司又一新長記髯兄先盼睞一官同作兩淮人畫角霜稜兩劔寒瘴煙都上筆頭乾十年搏撃秋風裏蜀棧盤空不覺難月旦評中見壮圗不應齊魯總真儒别來又嚼氷霜久健筆鋒銛似董狐茒屋燈青語夜䦨一杯長記浣離顔朔風半夜驅車去詩在寒雲石嶺闗東風剪剪送春寒望望田家惜雨乾無事在家貧亦好有心行道古來難虎豹九闗圗九重闗鍵錦斑圍蟣蝨微言詎可知首闢四門眀四目定書深意見宣尼春夜獨坐閃閃寒缸照夜昬眼中時事不容論近來䑕軰欺人慣踏碎承塵似馬奔夜來寒冷似深冬曉日空燒海色紅一樹梅花春院靜伴人憔悴倚東風梁園節序不相饒正月初旬凍盡消長記東墻微雨後一枝紅艶杏花嬌風物凄凉近禁煙敵寒無酒客衣穿楊花總道多才思撲亂春衫不當綿細草根深緑自叢山桃含凍尚能紅垂楊可是寒欺得半為刳中半蠧蟲鞭石圗洋海求仙己渺茫又鞭羣石駕飛梁帝功不出仁和聖罔念原來便作狂檀州門外觀隰河春水西山諸水頗奫淪合入渾河不自存昨見春氷纔泮處滿川都作渇流奔二月廿八日端門街觀乘輿還宫龍煙日暖紫氤氲春水回鑾萬馬奔纓杖逺揮清蹕後漢儀光動御天門麗日紅翻御路沙青山回抱漢宫斜吾皇遊豫諸侯度縱使都人㸔一作望翠華年年原廟薦駕鵞春水秋山例一過安得捄時姚右相為開三面説湯羅闕導鸞旂逺玉輦髙闕象駕雄賜異不闕鎮國寺觀迎佛九曜趨降世聖尊象車香滿綺羅塵人傳此伎中宫製上下雙輪轉十人漢成帝幸張禹第宅圗王氏常朝久惡譁幸回天鑒絶萌芽恬然不主天人㫁長恨安昌負漢家孔子曰政事惡譁而善肅出李石博物志與叔謙太常論書翩翩每愛太常書姿態還同静女姝儘是淡粧宫閣様豈知東抹與西塗相過閒話味何長字字顔書入品量握手正當吾意處畫須圎勁體須方近年書學果誰優説道寥休有悟頭意態偶從駈字得千金駿馬倚山丘一段殘槍路偶逢開罏便作鏌鋣工君㸔王趙凌雲體來自浯溪慘淡中鵬雲九萬平原筆墨望蘇黄甘下風誰謂南唐金剪手敢将田舍比顔公篆𨽻中追三代古風雲重策二王功遺山不見斐旻帖枉著雲臺詫米雄雲蛟家廟駭盤拏著作姿容隠畫沙後世若從書法論混淪磅礴是承家将軍愾敵鋭於虎舍豈能為必勝哉今日遺碑見䧺筆英姿䬃爽漢雲臺天山飛将指裴旻書到吾顔逈不羣不為䇿勲闕陳至今冠劍氣淩雲朝序卑髙倒屨冠寓書還等義方彈一緘遺草如蚯蚓千古狐狸照膽寒檢校秋官禄食囏顔宗收養半㷀鰥當時米秉無多惡李相因書重泰山小楷東方出右軍丹青難寫是精神孔門弟子多材藝有若唯能肖聖人次山歌頌漢文章書到磨崖日並光具眼鹿菴曾有語筆間元氣總三蒼蘇寃截耳殷姑節詈賊天津是大兄㫁璧㡬行移闕帖九泉相值死猶生雜詩野人家具取宫中適用都輸瓦缶功君是荆岩瑚璉璞得來纔待費磨礲較量暮四與朝三初不多爭讓愧慙戀戀不成丹闕夢劔南纔了又湖南夢歸故國蒼茫外春老風沙慘淡中辛苦西臺臺下柏不成還作栁花空昨日清明塵障面今朝上己却晴眀老天氣候初無定敢倚虚名作實行人家構室要帡幪小木支撐易作功汝是連雲棟隆物得來纔費梓人工萬夀宫芙蓉杏花三粘瓊島露華醲迸出髙枝見化工不著上林春色底粉香吹滿歩虚空滿意春寒强自妍一枝無葉更瀟然莫誇百葉玲瓏巧輸與垂楊護㫁煙活色生香貯好春横斜燈影似梅君多情唯有東墻宋夜夜幽忩夢彩雲閙簇生紅滿故枝今朝㸔處雪離披一春㡬日風光好素影幽香只自知徽宗畫周靈臺圗靈沼臺髙倚碧霄當時魚鳥被恩饒可能積徳千年久盛世㸔來僅四朝徽廟初年布政優丹青揮灑想西周其如逞慾横流後花石綱船墊九州秋澗集卷二十八欽定四庫全書秋澗集卷二十九元王惲撰七言絶句
