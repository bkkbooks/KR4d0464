  text: 集卷九十五
  hash: sha256:cfbd7bc9e24ea891966c46b21fb102e5f38f9b926f3151025b59401aec71fbe1
body:
  text: 元王惲撰玉堂嘉話卷之三楊凝式小字詩式字虚白五代時人號希維居士又云闗西老人心印帖李老君枕中經招客同飲帖皆唐人書韓魏公書杜少陵畫鶻詩擘窠大字墨蹟山谷書繼月帖云繼月學書未知其要處東坡先生云大字難于結宻而無間小字難於寛綽而有餘又云學書時臨摹可得形似大要多取古書細看令入神乃到妙處惟用心不雜乃是入神要格山谷為甥張大同書擘窠大字一卷中云涪翁自黔南遷於僰道二年矣寓舍在城南屠兒村側蓬藋柱宇鼪鼯同逕然頗為諸少年以文章翰墨見强尚有中州時舉子氣習未除耳至於風日晴暖䇿杖蹇蹶雍容林丘之下清江白石之間老子於諸公亦有一日之長時涪翁年五十六病足不能拜心腹中蒂芥如懐瓦石未知後日復能作如此字否其筆勢縱横意韻瀟散絶類􅄟鶴銘書少陵畫鶻等詩山谷練湖夜雨草聖瘦藤草聖十三篇辛未人日書皆公詩也草聖贈元亮姪兩首草書亷頗傳書韓非子十六篇後跋云姪從萬里來求書法此不急務也以萬里來故不能已山谷書一十幅内此君軒詩擘窠大字體極瘦勁又起草墓銘一草聖詩三首書王摩詰詩山谷書一十幅内草聖一為李華重試南豐鄭熈棗核筆崇寧四年南樓書盖公絶筆也達觀臺詩草聖六言詩内行書五首皆摩詰王建王介甫東坡詩後自云老眼昏花書不能佳如醜婦昏鏡梳装似亦妍耳蘇才翁草聖少陵二首逺涉帖予二十年前觀於大名魏氏家未敢必為孔明書及入秘監見宣和書譜乃知宋御府所收為武侯書明矣蘇氏寳章東坡黄門邁遲等帖遲即潁濵子也米書黄龍寺碑宋相張商英撰襄陽書一十幅内兩卷佳蔡襄元祐續帖凡九帖帖帖筆法不同宋少卿𢎞道説嘗見李徳新所藏碑本云書學之傳蔡邕得之於神人邕傳女文姬姬傳鍾繇繇傳衛夫人夫人傳羲之羲之傳獻之獻之傳羊欣欣傳蕭子雲子雲傳王僧䖍僧䖍傳智永永傳智果果傳虞世南世南傳歐陽詢詢傳張長史長史傳顔魯公閻立本畫古帝王一十三人漢文昭帝光武皇帝魏文帝蜀昭烈皇帝吳孫權晉武帝陳宣帝陳文帝陳廢帝後主叔寳齊文宣帝周武帝隋文帝隋煬帝前宋楊褒家藏後入秘閣富弼韓琦題識其後但文昭帝有解云漢文廟樂曰昭徳故曰文昭帝又云偽蜀李夀曽立號曰漢興廟諡曰昭文此文昭又恐非也十四帝除漢文陳宣廢帝後主煬帝餘皆衮冕若五方帝之儀其曹丕司馬炎宇文邕容色皆嚴毅可畏其宇文邕髯模糊滿頷兩顴上亦有長鬚下垂晉顧愷之青牛道士圖道士即封君達畫洛神賦後有梁普光間題跋臨本吳道子䕶法善神閻立本阮孚蠟屐圖老子出闗圖老子西昇經下虞世南楷書各段事跡王維山水圖輞川圖驪山圖韓幹出水馬李思訓崆峒山圖李昭道避暑宫圖戴嵩牛李将軍鶻唐人翦驄馬貫休竹韓幹正面馬韋偃羣衛圖後主收唐人化行天竺荆浩江村早行韓幹四馬圖七人解衣下水李昪水墨滕王閣圖合幅上畫人物宴集甚盛張萱界畫宫閣侍女圖及醉女圖内有以紫色粉塗面者韓幹三花御馬真張萱虢國夫人夜逰圖小李将軍翠㣲宫圖合幅一幅畫十四人皆騎者二步者一幅騎者十九人牧馬者十四人曹将軍霸獵騎圖人物結束類開元初羽林守捉衣雜色錦袍裹方平巾帶長刄兩鞬箭左手握弧右抽矢于房驊騮馬豹韉紅錦襴胷鞅同勒有鑣朱絲絛鞚馬迅疾殆逐獸然筆畫勁硬如鐵屈者御題神品上上宋諸帝御容自宣祖至度宗凡十二帝内懐懿皇后李氏用􅂵粉色自眉以下作兩方葉塗其面頰直鼻梁上下露真色一線若􅂵紗羃者後見古今注魏文帝宫人有巧笑者以妬錦絲作􅂵粉塗拂其面宋郊天儀仗圖衮冕圖車輅圖易元吉獐猿蓼花草蟲楊棐象李伯時水墨馬羣馬圖丘慶餘花禽鍾隠雙禽圖黄筌碎金圖猨崔白梅竹寒雀李公年桃溪春色艾宣竹鶴胡􅅛馬騎契丹人凡畫毛尾取狼毫疏渲張戡騉馬圖崔慤江鴨李伯時着色馬郭忠恕避暑宫作界畫黄居寀鹿艾宣雞冠黄葵杜鵑花圖崔白秋塘戲鴨郭忠恕界畫著色宫閣圖李伯時著色夜遊宫圖嬪十人奄四人皆騎徽宗臨張萱宫騎圖李伯時淵明圖蓮社圖趙大年小景郭忠恕飛仙圖郭熙秋山圖因念人與事機會合皆有數存其間九年春予一夕夢謁平章公於府第之東堂酒數行發書一櫃示予皆粉圖繪本金文玉牒今觀中秘所有璀璨溢目與夢中所見略同吁亦異哉傳曰嗜慾将至有開必先信哉斯言也作書畫目録序王晉卿煙江叠嶂圖并和坡詩李伯時畫明皇乘三鬃赤驃後跋云昔李將軍思訓畫明皇擁嬪御數十騎摘𤓰伯時仍為山路小橋至元元年與翟處正觀於東平武濟之家又觀東坡與蒲資政傳正書并覓柿霜無核棗四帖後又有張行簡董師中元遺山跋語僧傳古坐龍至元元年宣慰張順齋為春旱於范大師觀迎此龍於嚴東平北宅每旱張是圖輒雨此日亦然龍蒼胡蹲坐火雲中頂與鱗甲間皆有緑髪世所畫皆蝤蚓耳宣和題妙品趙邈搠噀墨虎至兩目夾鏡睛隨人轉同史左丞觀於田尚書和卿家以上二畫皆有詩人意古人欲以一藝名世者必精思入神極古今之變而後已故能洞達天機氣隨物在至觀之者亦有感格相應之理如摩詰苔磯静釣水閣閒碁令人不覺身在其間傳古龍出雨應氣來噀墨虎睛隨人轉鄰姬顰蹙馬踐家具之變此長沙云精筆感人有如此者盖非虚談也秋澗老人題丁丑秋奉御圖埒傳㫖本院定撰順徳資戒碑及普門塔碑銘鹿菴曰老夫作資戒碑乃令不肖撰塔銘惲謝不敏先生曰但作吾深意存焉及畢聞奏頗稱㫖令日乃悟先生其誘掖成就後生如此陳希夷嘗有詩云我見世人忙箇箇忙如火忙者不為身為身忙却可商左山云顔平原中興頌盖變玉筯大篆為真楷耳劉房山嘗説海陵欲南征先以十八人服御與上一同私行抵淮上以覘虚實號曰黒䕶衛前次相下宿南郭逆旅張燈置酒聞有新進失職劉其姓者先在邸中召與飲劉素善謳能詩即以歌侑觴詞氣慷慨禮貌甚恭上喜甚遂詢其所以至此之意而黙識之黎明劉復持酒餞謝上既乘以手札付劉曰府尹我親知也可用此投獻取錢幾千緡劉依命謁府尹疑通刺久不報見左右遑遽具儀物受㫖方悟疇昔為海陵云及還宫即特㫖起復劉為京朝官後從南狩同殁江上至元十五年戊寅正月甲寅乙酉朔同李侍講徳新應奉李謙陪百官就位望拜行在所凡七拜其侍儀司先一日於端門兩闕間灰界方所以板書百官號隨各司依品秩作等列班定以次入宫行禮畢即由左掖門出風埃大作所謂出門塵漲如黄霧始覺身從天上來曾有口號一絶隔夜端門分板位平明簪笏列鴛行紫雲低覆千官入潤作金爐百和香讀韓文孔戣墓銘孔子三十八世孫戣字音作蘇回反王承㫖慶八秩詩西菴云人才落落自天成千佛經中第一名已令貳膳常珍進但入朝行以杖行商左山云藥裹封災隨臘去酒杯稱夀逐年新胡紫山云堅辭不允老而傳几杖恩光又十年勇折桓文匡政弊力扶周孔上經筵又云塞破乾坤享重名玉堂東觀又尊榮香山如礪瀘溝帶纔與斯文作主盟宋人畫瓊花圖花蕊團團作九葉如聚八仙花揚州人説近嵗其花已枯朽矣米元暉所藏古端硯其背刻云此硯色青紫而潤下岩石也先公得於山谷若文室中磨李廷珪墨試諸葛氏筆世間真有揚州鶴也後題曰元暉山谷云虎兒筆力能扛鼎好著元暉繼阿章米因以字之亦羲之獻之例也祠堯舜禹於所都唐開元五年為始從褚無量請也見無量傳王黄華稱香品有蟠螭小月夜窓幽几之辭公夀止五十三官至承務郎翰林修撰黄華論汴河前宋以洛河入汴為京西漕路其後黄河漸南洛水舊道斷絶今汴河名存其實止是京索須三水自滎澤南入汴河故道行流徽宗臨張萱宫騎圖其侍從有挈金槖駝者盖唐制宫人用金駝貯酒玉龜藏香趙同簽説髙麗東北有第五頭城其地有五城此盖從南第一城也宋克温説今隂山古金山也古于闐今曰幹端古烏孫今幹落孫瀚海桁海薛良河今悉連哥回鶻今外五回紇今回回不谷寒毗伽可汗身毒印都吐蕃土波柘枝舞本拓拔舞金人以名不佳改之屈原湘中廟題曰清烈公唐車服志帶拖尾取順下之義魚袋取其清㓗魚目不瞑勤而不懈也契丹以其國産鑌鐵迺為國號故女真稱金以勝之或謂以水生金非也髙麗盖州盖葛牟城也明昌初易名曰辰州鹿菴云有㫖講究光禄寺職掌寺與卿漢官也應劭曰光明禄爵勲功也言光禄典郎謁者虎賁羽林舉不失徳賞不失勞故曰光禄勲郎中令秦始置掌宫殿門户及諸郎在殿中之侍衛者故曰郎中令漢因之不改北齊隋唐止掌餚膳許左丞作新定官制圖大抵以唐為則品從略與金同杭州畫工潘氏寫真其法不用朽先草直以筆寫又不粉背言形似易容色難晦菴云周之肅拜今之長揖也唐檢校名盖正官上加官也沅州安撫使郭彦髙大名人説廣中風土其地皆山如水之波浪然盖古盤瓠國在夜郎西南數百里與大理東境相接郭詩有地連兩廣多蛇窟水隔三湘絶雁書丁丑嵗二月初黄河自陜州靈寳清澄至河南府或云自潼闗至三門集津王子年拾遺記丹丘千年一燒黄河千年一清又曰聖人生鹿菴曽命擬中省賀表天開昌運統一車書地應休徴河清陜洛恭惟徳照天漢恩溥淵泉覆幬何止於中華洋溢逺沾於方表以致潤涵九折鏡浄兩涯自陜至巴幾千里之餘由乙踰丙殆三旬之久鱗介之泳游可鑑山林之形影皆分躍圖馬於龍宫未容専美舞馮夷於鱗屋時出効靈顧兹上瑞之方臻特表吾皇之至聖臣某等叨居華省幸覩榮光敢傾葵日之誠用代詞人之頌遐荒嚮慕百川宗滄海而王寳祚洪延萬夀等丹丘之固正月上句歌括云甲子風災丙子旱戊子蝗蟲庚子叛唯有壬子最豐穰正月上旬子細㸔竇先生云近嵗頗有應驗故録聞㨗鹿菴命擬中省賀表天網雖疎曽恢恢而不失罪人斯得迓穆穆以來平外侮既消頌聲交作恭惟仁含動植徳嫓生成振長策而用三驅念天顯而惇九族荐雷之震逺驚而邇懼大風之舉歌動而雲揚側聞喜自於日邊豈止威加乎海内臣某等職叨省署阻奉鸞輿佇目龍旂遥伸虎拜歸牧武成于周馬歌功美邁于唐鐃六轡言還春動兩都之和氣千官飲至歡騰萬嵗之霞觴馮渭金詔赦録序有云灞陵森栢荒凉白露之中明惠寝園寂寞蒼梧之逺又云荏苒十霜竟摧一戰指哀帝也東坡我有帖云外郡雖麄俗然每日唯早衙一時辰許紛紛餘蕭然皆我有也内慰字不挑心寫宋人蕭山則題云今専官横将肆咆哮于庭太守色羞對吏民豈復有畫㦸清香意象耶然坡非置公事不問時平事自少耳為潁州時久雪一夕不寐欲造炊餅救飢人又發義倉數千石作院炭數萬稱酒務紫數十萬稱濟之未必常蕭然也所謂皆我有者特不以外物之有累吾内樂之有而已惟以逸處心以勞處事是之謂能官太常少卿宋𢎞道以先農燔肉來致適李應奉受益攜毛詩青蠅至甫田諸圖請跋其後有云觀其禽魚草木車服籩豆之盛而經國備物之制令人想見三代忠厚氣象如在其間親承其事孰謂丹青形似起予至於斯耶大都城隍廟設醮青詞代鹿菴作天鑒雖髙曾惕顯思之命基圖寅紹敢忘奉若之誠爰自君臨頗歴年所顧眇躬之上託致至理之維艱豈期外侮潛消復荷天休滋至朔雪炎風大開一統金穰玉燭屢致豐年而又雲静祈連春回沙漠晝日有平安之報霜風無偃薄之虞匪凉徳之能然皆神靈之所祐乃即青陽之月恭修金籙之科誥演琅函真臨玉境導含景蒼精之駕覆垂雲洪廕之仁監兹報謝之䖍重以保持之福干戈止息永維四海之清邦國榮懐以尚一人之慶新船落至祭嵗君文成舟委波謂之落至惟神灼知一歲之事泛彼中河轉致厥載上下安輸非神曷賴修端門前橋啟土告嵗君地祇文應門将将前臨天津玉輅所經虹梁必陳爰構爰締築之陾陾神維垂祐迄於有成五方帝祭文因方殊號尊以帝稱殿臨五部有赫其靈維橋之作鞭石駕梁所冀擁衛大来百祥減江南冗員詔草諭江淮軍民人等夫張官置吏本以為民非擾民也朕自混一江淮於今五年優恤元元之心不遑夙夜期於撫定安集以承上天全付所覆之意比聞陳奏不圖設立之際官冗人濫重致煩擾念之憫然罔副朕志今者上自行省宣慰司下及總府州縣等官酌量輕重去處其一切冗濫凡有擾於民者盡行革去爾其各安恒業永底爾生既清舊染之風共樂維新之治其有作姦犯科似前不應者已勅行御史臺糾察中書省究治外咨爾黎庶體予至懐誡諭官吏詔草朕自統一南北以來設置羣官大小畢備俾上下承宣慰安元元而已近縁冗濫省併一新自爾厥後各慎攸司以興滯補敝為心以便國益民為事務施實惠毋尚虚文夙夜在公尚期予治若有狃習故常傷殘蠧害者國有常刑朕其敢赦故兹詔示想宜知悉唐申王六馬圖一曰奔虹赤二曰飛霞赭三曰騰霜白四曰凝露驄五曰決波騮六曰發電烏内奔虹赤與決波騮綰結其尾絡首皆鞗銜皆有鑣撁籠者服色皆以朱砂紅石緑粧染蘇門郭氏家藏西溪折檻銘直言骨鯁天威雷霆非賴此檻資斧曷勝檻既折矣從修不修佞臣見之面靦心羞檻謂直臣可無結舌爾氣不撓吾寧憚折世多張禹代無朱雲直欄横檻整整而陳噫徐子方繭瓶詩一竅鬼功開混沌八蠶神繭墮扶桑秋澗集卷九十五欽定四庫全書秋澗
