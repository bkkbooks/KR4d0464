front:
  text: 四十八
  hash: sha256:79c5544dd96fc4cdf3b48a7060483b6c58f5715c9ad286a8f8d6c7f03cff14b3
body:
  text: 元王惲撰傳大元故宣武將軍千戸張君家傳君姓張氏諱思忠字正言盧龍永清人也曽祖衍大父徳輔世業農金百年來支屬蕃息居不異爨至今以義門稱燕朔間父諱仝姿沉粹少以易業起家為志大元甲子大兵南畧以良家子從軍𨽻都元帥史公麾下以武幹見稱凡意料且與公契及公鎮守真定得專擢拜以功監領左軍充唐山邑事既而開府忠武公紹襲閫職首以鎮撫授君嵗壬辰以千夫長從公略地河南歸徳禦堅猝不易㧞君鼓勇先士卒登且以戎鎧鮮異為大帥蘇布赫所識及賞犒以功讓所善高信由是信㧞出行伍致身顯達遂轉戰宻之西山民避兵匿洞窟中徃徃縱火薰逼君言諸主帥禁焉頼全活者甚衆其後從戍陽夏開邉屯受戍整暇兵有餘力而民風愛懐繼移鎮入鄧凡百草創都督史侯皆擬易治一新君依前以鎮撫供職於是招流散復田廬治渠堰整屯戍謹斥堠咸領辦有方不大聲以色人至以佛張鎮撫目之其慈祥為可知丙辰春壽六十有一遘疾終鄧之官舎葬真定縣臨濟里域夫人趙氏後公十九年殁生子六人宣武君即其長也宣武㓜不好弄嘗聚嬉里門能威重自居指顧羣兒不異官府識者已稱其不凡知學穎悟既不羣及長有謀畧善騎射大都督一見與語竒之命日侍鈴下庸玉汝之幾冠嗣父職適有事江淮風雲交㑹之際宣武年少英發夙夜聼恭不遑寢餗氣益厲志益明事益辦時軍府有疑獄乆不能決命審鞫之畧不加威而窮奸直枉两造精露闔府與其明察至於繕城壁建樓櫓使號令精彩一軍増雄雖謀出於上其所以廣益於下者多君之力也丞相忠武公奏降銀符真授都督府鎮撫至元五年朝廷命帥㑹諸道兵攻取襄樊為上流破竹之舉宣武備列戎行首建戍白議曰淯澮於漢宜亟據要害築堡戍使遏宋人泝流以資冦盜不然彼或先之豈惟奪志吾無如之何矣從之分兵壁其㑹宋人為氣褫時餉道不繼行省以君有畫能幹即擬充唐州新野等處提舉糧漕使淯行岡阜間淺深不常艱於綱運君遂揵數堰平水勢隨造江軸車餘千兩兼速陸運復設防戍絶去涂梗舟車通便軍餉為不乏矣樊城小而堅為襄之扞蔽省議取之翦其臂翼君率先貔虎既登中流矢戰不輟丞相巴延公壯其勇止之以勞宣授行省都鎮撫其職掌大槩上承大帥方畧指授諸將諸軍有所關白必因以上達與夫訓練調遣廵羅等事皆所領治當時諸軍大小四十餘壁每翼鎮撫一員號之曰接手日聽將令於都鎮撫武弁佩刀弭於雲麾之下葢肅如也其倚重比漢軍司馬唐都虞之任君感其知遇誓以捐軀報國至元十年春二月襄州破第功上聞至蒙弓矢鏐鞍繡衣之賜明年秋九月詔丞相巴延等水陸並進鄂渚渡江師次郢宋人以艨艟鬬艦横鎖漢面以扼之不克前責君辦之君按視對江堡北有枯河可三里許連接一湖湖滙於漢通君喜曰吾事濟矣遂挽舟由港中盡達於湖舳艫蔽江順流而東無復横格之虞矣大為丞相嘉賞時主帥從偏裨百餘騎行視郢險天大霧不覺抵壁下彼潛出兵圍之數匝衆相顧失色君奮槊突擊殺數十人為解去因建言於相府曰郢據漢為池東南又有沙陽等城旁為掎角宜乘鋭先破之則郢乃孤矣韙其策即命君督精甲潛徃不移䕃掀沙揚石掇新城降沔陽而去隨與諸軍併力破夏貴兵於陽􅚒堡以清江道我師飛渡駐軍武昌矣時朝廷策諸將始加散秩以功最授宣武將軍師既東前阻鄱湖風浪君力督水師浮梁而濟其敏㨗赴功類如此宋相賈似道罄國力結陣丁家洲塞江路誓與我師鏖決丞相公命君督諸軍前陣君鷹揚致師出入行間指授方畧意甚暇也一再合而宋人敗績遂入建康丞相阿珠即分兵趣𤓰歩回擣維揚擇勇而有謀者皆徃君首膺其選丞相公皆不遣令將䇿勝一軍權充萬夫長聞於朝其為二相倚重者若爾命未下竟以勤勞致疾以是年夏五月殁金陵之軍幕得年三十有九丞相公聞之驚悼以馬箠擊地有云亡誰繼之嘆遣屬將祁祐䕶其轊歸張君為人多鬚髯氣量宏事親孝撫諸弟以愛與人交有終始不一言忘盡心所事國爾忘家若飢渇之於飲食其趨事赴功臨機制變志慮出人意表拊循士卒與同甘苦皆樂為之用故其燕趙勁氣所向披靡樹駿功為尤多初渡江凡軍中俘士人為獻者君與求親屬悉資遣之其或願留依庇者事甫定一皆縱還鄉里夫人房氏唐相國梁公裔内助有法配君徳良稱先君殁生子男四人長曰用道嗣君職次用和用康用章女四人適名族繼室史氏太尉忠武公之次女生女寕哥孫男四人女孫三人贊曰張氏三世在野純積既乆故所發攸厚若父鎮撫君起壠畆奮棘荆致身為偏裨亦云顯矣其施若猶未也逮君遭乘機運奮發志勇以投風雲之㑹惜乎功名垂就不享其報使英姿茂績有鬱而未盡者今嗣侯以破靖江討江西逋冦等功進武徳將軍行軍總管風姿文雅延譽士大夫間殊藉藉然葢將衍大遺澤而大其世業者耶用道與内弟闕㳺交甚欵以家傳見屬遂直書其事至於筆削其間以俟夫學春秋者焉盧龍趙氏家傳孟倅穆尋墜緒纉先猷特懇太史王惲通述一傳庻幾遡川流而逺紹淵源溉根本而敷榮枝葉以衰謝辭者再請彌堅謹按趙之得姓肇自周穆䇿造御勞胙土受氏子孫蟬嫣代有聞人時邈譜逸蔑克倫次所可知者當唐世逺祖諱少陽生子簡亮亮生元遂宦㳺於燕家焉因為盧龍人遂生子思温字文美姿英栗拳勇絶人尚氣任俠五代初燕帥劉仁恭壯其才武叙為偏將晉王存朂來問罪公率所部挺身逆戰目中流矢為統帥周徳威所摧晉王聞其驤勇義而釋之數蒙指縱逮與梁人戰於華野陷陣深入斬戮不勝計第功最加金紫光禄大夫檢校尚書左僕射使持節平州諸軍事平州刺史神册二年遼太祖遣元帥擁大兵來攻城中糧盡援絶公審形勢之攸歸察輿情之去就遂欵附太祖素知其才勇可重任寵遇殊渥東伐渤海俾將全師充都團練使既至旬餘率敢死士十餘軰突戰先登立㧞其城身被重傷太祖親調藥以敷之武帝即位論敵愾功加檢校太保静軍節度使天顯十一年石晉起義并門來求援因即命公出師風憲間掎角之敬塘賴以克濟加特進檢校太尉中書門下平章事燕京留守盧龍軍節度使管内觀察處置等使明年進階開府儀同三司兼侍中封天水郡開國侯食邑一千五百戸仍賜恊謀静亂翊聖功臣兼雲應朔奉聖等道採訪使時方兵後彫瘵未蘇政舉綱條惟從寛簡轉臨海軍節度使㑹同元年使晉行册禮還檢校太師兼侍中進開國公加食邑五百戸二年春有星隕於庭俄薄疾以三月廿日薨享年五十有入上聞震悼奠祭賻賵有加贈太師衛國公葬昌平縣五華山之陽敕集賢大學士張礪銘其神道公事親孝奉上忠出入行陳三十年大小百餘戰勲業烜赫身都將相備極人臣之貴而謙撝自牧退然若無能為者冝其以功名終初遼祖殂后述律氏智而忍悉召大將妻諭曰我今寡處汝等豈冝有夫復謂諸將曰可徃從先帝於地下有過者多殺於木葉山墓隧中公後以事忤后使送木葉山辭不行曰親寵莫后若何不徃曰子㓜國疑未能也廼斷其一腕以送之直公而不殺平昔守正不屈類如此配太原王氏贈鄭國太夫人繼室清河夫人張氏陽翟夫人翟氏子十有一人長曰延照永清軍節度使侍衛親軍事特進檢校太尉同政事門下平章事開國公食邑一千五百戸賜號推忠奉節毅勇功臣十一世孫两山北遼東道廉訪使今居􅋣陵次曰延祚燕京留守檢校太師開國公食邑一千戸十一世孫朏肥鄉三務使今居燕十三世孫天民遼陽省都都事今居平灤曰延卿竭節匡邦保義功臣大同軍節度使檢校太師開國公食邑一千戸曰延構供奉官東西班都㸃檢曰延威推忠佐命翊賛功臣保静軍節度使特進校太師開國公食邑一千戸十一世孫明今仕两浙運司知事曰延晞飛龍院使檢校尚書左僕射曰延誨保静軍馬歩軍都指揮使曰延光順義軍節度使曰延玉彰國軍節度使曰延煦㸃檢曰延紹同州兵馬使曰延旭内庫提㸃女十四人長適泰安州刺史傅知寳次適天雄軍節度使檢校太尉兼侍中韓巨美次適𢎞農楊氏次適竭誠奉國翊賛功臣東平軍節度使特進檢校太師兼御史大夫上柱國南陽郡趙國公尚書令判三司使韓徳樞次適榆州刺史張彦英次適彭城劉氏次適左林大將軍張美次適宣徽南院使天平軍節度使檢校太師同政事門下平章事判三司韓勣次適清河張氏次適愽陵崔氏其開府太師衛國公第五子特進府君即穆之十二世祖也𦵏建州永霸縣白羊峪有乾統七年夫人馬氏所樹銘幢特進府君生二子曰主舜左千牛衛大將軍生子四人曰匡禹臨海軍節度使生八子第七子為翰仕至保遂州團練都統使始𦵏大興穴􅀈别墅即睿智皇后賜田也生三子相之生五子第三子洧生六子第二子公為嗣兼管内觀察使一子鎔官鎮國上將軍一子居常驃騎衛上將軍七世並襲遼世爵相之府君弟進之永豐庫使尚之生子沿絶進之一子漬寕昌軍節度使贈金吾衛上將軍三子仲曰公謹龍虎衛上將軍静江軍節度使四子孟曰興祥賢而多材仕金海陵世宗两朝以徳望門地致仕途顯赫官至開府儀同三司左宣徽使太子少傅申國公封鉅鹿郡王𦵏良郷回城劉李里蔡家凹迄今以趙大王墳目之翰林待制趙攄所撰神道碑在焉驃騎府君生五子曰柄天資孝友博學克守世範曰挺邃星厯術金初任靈臺司正郎曰機留心軒岐書伎精良選充尚醫侍宣宗官至保冝大夫曰梅善貨殖致屋潤積而能散貧乏者多沾其惠興陵因㳺畋宿其家聞富而好禮賜銀燭盤二鄉梓榮焉嘗監謝邨鎮酒曰植字景道穆之曽祖也姿清淑有操行力學務為無所不窺工作詩嘗舉進士不偶輒拂衣去易名質隠穴􅀈别墅教授為業别墅東二里許即金建春離宫明昌間道陵春水過聞絃誦聲幸其齋舎諷詠門間所題詩有折脚鐺中烹白薺打頭屋底看青山者乆之尋召至行殿賞其志趣不凡命之以官固辭曰臣僻性野逸志在長林豐草金鑣玉絡非所願樂况聖明在上容巢由為外臣可乎道陵益竒之特賜田十頃復之終身士論烜燿自是不呼姓名皆曰建春徴君號其鄉曰崇讓尊顯之也終於泰和二年三月乙丑享年八十五配李氏生子玫司正府君之子曰侃字和之穆之伯祖儀觀修偉學識通貫尤長於音律儀制章宗時用閥閲子弟試太常禮樂科中承安二年登歌甲首由是於禮樂愈覃精為專門之學矣積勞自工師副正轉恊律郎貞祐播遷禮樂散失不完命楊禮部雲翼馬太愽千里詳定府君以掌故得預節文所不備條理之未暢資其論説補罅為多累官定逺大將軍大樂署直長權知太廟署事金末南遷校量鐘律獨黄鐘抑而不揚既至汴林鐘復爾雖更鑄尚然竊自嘆曰八音與政通隂陽消長所在可以卜時之治忽中興其不竟乎既而金亡嘗㑹飲市樓樂甫作語所知曰革有狠戾音即去之果有酗而鬬死者其沉機先識如此壬辰北渡隠居鄉里未嘗一日忘其素業廼編集郊祀所記憶者為祀典樂志辨凡三十卷或譏曰若子所學與時豈不背戾答曰文武迭用世道之常今向平治以是備他時求訪之具聞者嘆其資深而慮逺歳戊戌襲封衍聖公孔元措薦府君於朝攝大樂丞乘傳徧厯四方搜訪前代禮官樂師祭器圖集備預制作中統建元以來文物郁然君有力焉壽入十一卒時已未夏四月廿七日也配金吾李氏一子守忠正大間策論進士仕至承徳郎管勾尚書省承發司前君殁娶王氏桑氏孫五人柔原圭秀異曽孫繼祖榮祖興祖顯祖等八人曽女孫十人𤣥孫男三人保宜府君之子曰璧字叔寳穆之叔祖姿沉雄有才幹渉獵經史中武舉第官廣威將軍宣宗麗妃位奉事卒於戊午嵗九月十九日得年六十五配史氏麗妃兄之女生三女俱適時族建春府君之子玫字文玉穆之祖也資長厚耿介不妄交游學問淹貫工辭翰藉門資調遵化三司使易代後僻居研窮理學申明家法勉子孫興門戸為務自稱貽齋居士壽八十五終於戊辰三月九日配良鄉李氏母儀婦道光範中表生子鉉字仲器㓜孤藉伯考定逺君翼誨及長雅淡喜讀書不樂仕進邃易學好古多巧思音律占筮咸詣其精妙太宫肇造鐘鼎祭器法物朝儀以先生家學精思罕匹命之監視或以方伎上聞適營建新都俾灼吉兆基命丕作蒙賜白金五十星重幣十襲相臣因欲官之辭不可止其言人榮悴雖察五行盛衰必配合道義廣示勸戒名公朝士歆其學識來質疑請益者無虚日焚香煑茗問出三代鼎彛法書圖籍傳觀披玩論辯皆有證據及談遼金故事揮麈緩頰使聽者忘倦慈祥豈弟之色津津溢眉睫間有承平遺老氣象晚節號鈍軒逸皓諸賢贈遺詩文無慮數百篇嘗於祖竁側構亭為春秋奠祀所承㫖王文忠公扁曰遺安樞相商左山為之記其為名紳稱賞若爾今年登期頥康寜順適壽祉未可量也娶李氏生子穆性純孝早傳家學善篆𨽻以敏慧延譽搢紳間得從事翰林出倅孟州轉邢臺尹超授承務中山府判官穆之子遹祖述祖廸祖遵祖孫遷安於戲趙氏自五季迄今三百餘年子孫蕃衍幾於千人忠傳學繼世濟其美越不事宦㳺者學術行義亦昭晰於時與韓劉馬共稱為燕四大族至比唐李鄭崔盧由開府太師衛國公忠毅奮發捐軀為國敦篤大本君子之澤其流淵長亶其然乎推延威特進府君第五房一傳而二再傳十二人三傳至廿八人四傳四十五人五傳而六十四六傅八十四七傳九十二八傳當建春府君行羣從數幾滿百本支子姪廿有八然遭壬辰喪亂存者僅三人而已非頼穆之訪緝譜牒則後人無由知其祖考之所自出宗系之所自分今復揚豐功之盛烈發潛徳之幽光傳載無遺垂鴻不朽俾趙氏來者觀感景仰克念無忝是亦顯揚之一節也傳曰慎終追逺民徳歸厚矣又曰惟孝子善繼志述事若穆也可謂有志追逺述事者也大徳已亥秋七月翰林學士中奉大夫知制誥同修國史王惲述開府儀同三司中書左丞相忠武史公家傳丞相史公天澤其先燕之永清人世以族茂財雄號農里著姓曽祖倫祖成珪繼有純徳百年來潤涵淵寖滙而不發逮父尚書府君秉直讀書尚氣義為一方向服生三子天倪天安公其季也國朝癸酉嵗冬十月太師穆呼哩以王爵帥天兵南畧中夏雷砰霆激震蕩無前府君審興運之㑹歸一羣疑之去就倡率義從降軍門王炤其誠數千人頼以生仍令府君統降主漕繼從王攻北京下之以勞授行部尚書淵流騰盛千載之㑹實開於此及金將武仙以真定降王命公兄天倪充河北西路兵馬都元帥即鎮守俾先贰焉時公年二十有三身長八尺音吐鐘鈜然善騎射拳勇絶人屬櫜鞬署帳前總校明年乙酉春䕶母夫人北歸仙尋叛都帥遇害府僚王縉王守道追公及燕曰變起倉猝部曲散走多在近郊即回斾當不招自至公毅然曰不共國之讎死亦當徃遂傾槖易伏南還以圖報復行次滿城得士馬甚衆餘兵四集牙將毛等即推公攝行軍事遣監軍李伯祐言狀於王就請兵濟討即命公紹兄職仍以國將笑乃旱統精兵三千為援合勢進攻盧奴仙驍將葛鐡槍八主薄擁萬衆來捄公撤圍逆之奮先將士灑血馳戰呼聲殷地無不一當十葛氣褫㑹日暮退依𣲖水為阻公料其惰歸敵必宵遁果然乘之衆大潰生擒鐡槍資其器仗儲偫軍威大振遂下中山略無極㧞趙州進駐野頭仙懼奔西山之抱犢砦其年夏六月復真定無幾宋將彭義斌隂與仙合又圖竊取公同國將禦諸賛皇扼仙軍不得進義贇勢蹙嬰火炎山自固主帥問計於公曰賊衆山扼自陷圮地此易破也遂令監軍孫提鋭卒五千公略其後繼以鐵騎蹂之斬義贇戲下自是義勇之名軒襮燕趙間後數月仙潛納諜者匿大厯寺夜斬關為内應遂反其城公跳走藁守帥董俊以全軍授公復與薩納台破走仙主帥忿民之反覆驅萬人出將𠞰焉以示威公曰楚皆吾軍民我力不能及一旦委去不幸為賊脅制今殺之何罪弗聽復力争良乆乃悟而全釋公乃繕城壁除武備明號令守禦以方為不可犯之計嵗荒食艱捐甘苦與衆共之於是招流散拊瘡疾披荆榛掇瓦礫數年間官府及民聚以次完治然高公抱犢諸柵仙之巢穴也不即翦覆則終遺後患隨攻下之仙䑕竄而去繼又取相衛太宗即位公入覲朝議方選三大帥分統漢地兵上素聞公賢詔為左路萬戸以真定河間大名東平濟南𨽻焉庚寅冬圍武仙於汲小大凡十餘壁金將哈逹以衆十萬來援鋒始交不利諸將乘虚一時奔北公獨以千人繞出敵後挺刄横擊敗一都尉軍既而復與大軍合攻仙逸去復取衛州明年壬辰太宗由白波渡河詔公以兵由盟津㑹河南至則睿宗皇帝已破哈達軍於三峯山乃命公略地京東遂招降太康柘縣瓦岡睢州追殺守帥慶善努於楊邑金主東播復自黄龍岡來襲我新衛公聞之輕騎馳赴比至已合圍奮戈突抵城下呼守者韓帥曰汝等勉力援兵繼來復躍出敵愕睨為披靡明日大軍至内外夾擊敗走蒲城公尾其後金將巴哈所將兵尚八萬我殺掠殆盡金主以單舸東保歸徳公與階軍㑹睢陽同僚薩吉斯欲薄城背水而營公曰若敵來犯我進退失據此豈駐兵地耶公争不下以其事赴汴比還全軍皆沒其圍蔡也當懸瓠北面潛涉汝險出入壘中血戰者連日蔡兵大衂汝水為不流金亡公還趙視師自乙未版籍後政煩賦重急於星火以民蕭條卒不易辦有司貸賈胡子錢代輸積累倍稱謂之羊羔利嵗月稍集驗籍來徴民至賣田業鬻妻子有不能給者時兵民未分賦役互重復遇征戍則趨辦一時中外騷屑殆不聊生公憫詣闕併奏其事民債官為代償一本息而止軍則中戸充籍其征賦差貧冨為定額上皆從之布告諸路永為定制迨戊戌已亥間仍嵗蝗旱復假貸以足貢數積銀至萬三千餘鋌公度民不可重困乃先出其家貲次及族屬官吏均配以償遂折其券監郡蒙古薩里以國兵鄂囉數萬以散處州郡間營帳所在大致驛騷伐桑蹂稼生意悴然公騰奏太后悉徙居嶺北由是軍民肩息田里遂有生之樂迄今真定兵甲民數勝於他郡由公牧養其根本故也國朝自金亡以來嵗有事於宋公未嘗不在戎行棗陽之役城小而堅主帥忿其攻乆不㧞命徑乘其城公率馮程二巴圖爾國語謂勇曰巴圖爾先諸將登太子庫楚壯其勇惜其材傳呼止之公戰愈力克焉其攻襄陽也宋以舟師數千陳峭石灘掎角以綴我肘太子以城不易㧞可趣利舟楫命公徃以陳翟二校自翼驅猛士兩舸直前擣之彼氣既奪奪槊盪決覆溺者萬計獲焉及取光化復列絙首上立陷其城復州之役敵盛以鬬艦三千艘鎖湖靣為栅公進説曰栅破則鎖當自潰遂募勇敢士四十軰親鼓而前壊蕩無遺復懼而降其攻壽春也公獨當一靣宋人以我圍逺勢分緩急首尾莫應賊乘夜果來斫營公單騎逆戰手格殺數人戲下繼至悉驅賊入淮水至於掀滁州蹂盱眙掇寳應瀕江渚且破且降者二十餘所雖㑹諸道兵共事其伐謀制勝敵愾樹功未嘗不在羣帥之右及䇿勲盟府推讓行間雖寸長不掩故諸將屈盡其智能士卒樂出死力論者謂公智信仁勇堂堂有古良將風壬子嵗公入覲憲宗察其忠勤特加顯異遂以衛五城封公為封邑方今聖上龍潛即知河南困敝請分治培植為異日包舉殘闕之本許焉遂以公充經畧使公以河外虚耗日乆封豕存食於内邉冦日侵於外非大與祓濯則不可去之舉賢能汰冗濫抑豪強均賦役信賞明罰訓農勸兵列堡戍以絶冦衝實屯廪以給邉餉凡政之不便及民所欲而未得者率更張而立行之睢州長楊興封丘簿董極横恣不法暴其惡肆諸市萬口稱快明日閭閻間有畫公像者不二三年方數千里之間行於野民安其樂郊出於塗商免其露處觀善俗既庻而有教察軍志則又知夫怯私鬬勇公戰威行惠布陽開隂肅内外修治略無遺䇿河流逺潤衛亦復承平之舊宋人為禜其北門矣丁已春詔左丞相阿勒格爾勾較諸路財賦性苛刻鍛鍊羅織轉功為罪上下例遭凌辱公以勲舊獨見容假公請曰經略事我實主治是非功過理當我責今舎焉而罪餘人心何能安怒叱其去公不為動堅請者數四用是翼蔽頓釋者甚衆戊午秋扈憲宗西征明年夏駐合州之釣魚山秋疫作方議回鑾宋將吕文徳率艨艟千餘蔽嘉陵江來犯逆戰不利上命公禦之乃分軍為兩翼跨江列陣文徳軍至截流縱擊􅐁鉅艦數百艘追至重慶三戰三㨗遂班師而還又明年庚申夏六月是為中統元年皇帝御極首問公治國安民之道遂具疏以聞皆時所急務上嘉納之旋命公撤江上軍還授河南等路宣撫使兼江淮諸翼軍馬經畧使制辭有史天澤自太祖皇帝命穆呼哩國王開拓漢地卿兄有佐命殊勲又扈從朕之父兄勤勞王事文經武略於國有功綏撫河南民懐惠愛有功高心小夷險不移之㫖明年夏五月由江淮經畧使進拜中書右丞相公既秉鈞衡細大之務知無不為然言必慮其所終行必稽其所敝不強時之不能不禁民之必犯體時順勢通變制宜於是清中書以正紀綱分六部以綜名實設撫司以肅州郡退貪殘以簡賢能霈恩澤以安反側頒禄秩以養亷節禁賄賂以絶倖門又定省規十條董正其機務憲宗初年括戸餘百萬至是諸色占役者強半悉奏還為民籍以紓疲瘵論思之際處國相儒臣間調諧彌縫必使情通理得期於事集功成澤被生民而巳自是上下交孚帝載熈緝中書無留務矣故中統初元文物休明階太平之治者公之力為居多秋九月扈從北征次昔木上與額埒布格遇命沁津為右軍公為左軍仍合大勢蹵之北兵潰遁三年春璮賊隂結宋人以益都叛上命親王哈必齊總兵討之兇勢張甚詔公徃視聞璮入據濟南公曰豨突入笠無能為也至則進説於王曰璮多譎而兵練不宜力角當以嵗月斃之遂環以深溝高壘奔軼應援之計畧不能肆四月軍潰出降生擒璮公力主斬於軍門誅同惡者數十餘人悉縱歸傳檄東下為璮守者皆降及陛見悉歸功諸將乃以擅殺自劾上察公忠誠亦不之罪初臨軒授鉞付公顓征諸將皆聽節制迨卒事未嘗以詔㫖示人三齊平首奏兵民之權不可併居一門行之請自臣家始史氏子弟即日皆解紱而退初公既相即辭其封邑凡三請乃許其謙遜宻勿類如此至元改元加光禄大夫中書右丞相如故三年皇太子燕王領中書兼判樞宻院以公為左丞相樞宻副使遂議建三衛及留兵寓農之䇿不二三年國容軍實蔚然可觀六年朝廷營取襄漢詔公與駙馬呼喇珠徃經畫之賜金駱甚渥至則相要害起一字城聨亘諸堡貯兵儲絶聲援示以乆駐必取之基而繼以疾還明年進開府儀同三司平章軍國重事仍令右丞相安圖諭㫖曰中書省尚書省樞宻院御史臺或一月或浹旬大事卿可商議小事不煩卿也十年宋將吕文煥以襄陽内附聖天子赫然有掃清六合混一車書之意明年秋與右丞相巴延總大軍行臺荆湖自襄州水陸並進趣鄂渚渡江中道病不能進上聞遣使賜葡萄酒勞公仍慰諭曰卿自朕祖宗以來躬環甲胄䟦履山川宣力者多矣又卿首事南伐異日功成皆卿力也勿以小疾阻行便為憂勞可且北歸善自調護公還真定上又遣其子杠與尚醫馳視及賜參糖等物因附奏曰臣大限有終死不足惜第請天兵渡江以殺掠為戒言訖而薨略不及其家事年七十有四訃聞上深震悼遣近侍致奠賻白金若干贈太尉諡曰忠武仍勅辭臣製碑表其勲徳公忠亮有大節出入將相近五十年其元勲碩徳柱石四朝師表百辟殆古社稷臣而氣貌循循若無所為者及臨大事論大政夷大難毅然以天下之重自任要以竭忠徇國尊主庇民為心一以至誠將之其視富貴權勢斂然畏逺若將有凂於巳者其善始令終世擬之郭汾陽而氣量涵宏識慮明哲又根於天性粹然故累朝賞公忠勤龍光稠疊前後賜賚不可殫紀公初進大拜制下之日朝野交慶公門閤蕭然若無所事有面説公以威權自張者公因舉唐周墀為相問於韋澳曰力小任重何以能濟澳曰願相公無權墀愕然不知所謂澳曰爵禄刑賞與天下共之何權之有又曰某縁汗馬頗著㣲勞餘將何有今眷倚如此正以軍國事體猥多厯練老夫有通譯其間為諸公調達耳相則吾何敢當言者悚服而退至於開誠心布公道集衆思廣忠益用人齊家訓教子姪又有大過人者當歸徳城潰脱李大節於白刃俾參幕謀留務無巨細一以委之參卿王昌齡代公治衛亦以聽其注措其裨賛籌畫則王守道納哈塔松年四人推誠委寄雖骨肉莫能間故真定治效高視他郡四方為之訓北渡後名士多流寓失所知公好賢樂善偕來㳺依若王滹南元遺山李敬齋白樞判曹南湖劉房山段繼昌徒單顒軒為料其生理賔禮甚厚暇則與之講䆒經史推明治道其張頥齋陳之綱楊西庵張條山孫議事擢府薦達至光顯云初武仙既害都帥公紹其職及兄子楫長即奏牘於朝曰臣始遭家難黽勉承乏以雪讎恥今姪楫等皆可勝任願以職歸之畢臣宿志太宗曰但聞争官者多讓職者鮮卿之此舉殊可嘉尚朕自有官俾之即詔楫為真定路兵馬都總管後又奏次姪權充唐鄧軍萬戸公因以疾乞退曰臣無大功報國一家處三要職恩寵踰等敢昧死固請上曰卿奕世忠勤有勞於國一門三職何愧何嫌竟不允憲宗駐六盤也詔發民為兵勅使擬公子為帥公曰吾昆弟三人大兄之子俱顯仲之子未也幸先之使者嘆服竟以姪子樞充新軍萬戸初總衛鈞魚也有邉將富察琚者𨽻焉日有言偃蹇不為愜公含容之明年渾都海平行臺上功相府獨琚名闕公問焉或以前事對公曰聞平夷隴右若功最多其可後哉即命具完文以進遂均賞賚其忘過記功又如此嘗集子姪輩戒之曰史氏起龍幹際風雲徳凉效薄今身名顯赫宗族昌熾如是何以答乾坤大造累朝之恩私乎若以王事殁邉裹馬革歸葬吾素願也汝等異時䇿名委質盡忠所事以圖報國又曰惟孝與義可有立於代汝等謹服此訓茍違吾言與暴君丘墓等爾公年四十始折節讀書酷嗜資治通鑑真積力乆義精理貫諷誦略皆上口至成敗是非徃徃立論出人意表雖老師宿儒有不加詳者至矢謀廟堂運籌戎幄良法美意契合融㑹見諸行事者誠無愧於古人云八子格中書右丞樟前新軍萬戸棣中山知府杠提刑按察使杞前衛輝路總管梓澧州路同知楷終南陽府同知彬御史中丞孫男一十六人不肖惲猥登公門者有年及與諸子游故聞公言行頗詳以家傳屬筆故勉為譔述異時太史氏勒元勲於帝籍賛畫像於凌烟庻幾有所考焉賛曰忠武公當草昧患難之際憤發義勇収合散亡卒之芟羣雄定河朔開國承家光昭父兄遺業其功烈己不世出然一時佐命儷景同翻者多矣惟公厯事四朝恩遇眷倚始終不少衰復能斂百戰之威雍容廊廟以道事君為時賢相高名完節爛然獨著福禄永終慶流後裔豈偶然致哉葢由勲徳兼備忠智兩全君臣之間有以感召故也若祗以遭際期運依乘風雲論之是豈真知公者哉故推生平行己大節為後來之法云秋澗集卷四十八欽定四庫全書秋澗集卷四十九元王惲撰傳
