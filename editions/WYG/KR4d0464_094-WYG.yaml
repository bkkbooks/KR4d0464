front:
  text: 之二看古玉器當解其刀刻碾刻者刀刻為上碾與刀盖相去甚逺丞相史公嘗收太康墓中玉環名曰泥湫龍係昆吾刻也磨李廷珪墨法商台符嘗云向抄合萬户用聚星玉版硯磨李廷珪墨求木菴書硯為墨所畫木菴亟止之曰用李氏墨有法若用一分先用水依分數漬隔一宿然後磨研乃不傷硯論硯先觀其石性麄細枯潤不必須有眼者其膩潤視之有紫芒而不拒筆者即端之佳者也看畫當觀其氣次觀神而畫筆又次之用漆㸃睛朱砂紅石緑者皆唐畫也予嘗觀閻立本老子西昇如此許魯齋云古人看漢書皆有傳授不然有難曉者豈律厯天文之謂乎太康冢或云漢梁孝王墓或云晉何曾墓以地里物色考之恐皆非也予向與吳教授㑹真定因及此吳曰此晉司馬文王陵也曰何據吳曰昔居太康時冢前有廟晉文王祠至田夫野叟皆以文王呼之及發其龜趺皆有南征並夀之字以史考之文王南征數矣豈其然歟鹿菴先生曰前漢列傳多少好様度於後揷一銘詞篇篇是箇碑表墓誌作者觀此足矣不必他求曹南湖亦嘗説作銘辭法度謂如一人有數事好處取其重者論之及詳史漢論賛其原盖出於此坡詩雖二十字者皆有莫大議論歐陽文尊經尚體於中和中做精神鹿菴曰文章以自得不蹈襲前人一言為貴曰取其意而不取其辭恐終是踵人足跡俱不若孟軻氏一字皆存經世大法其辭荘而有精彩也南湖又云非莊無以雄其辯非騷無以清其氣予嘗問匡衡相業於先生先生曰汝以為何如曰學術有餘而忠謇不足先生為首肯地震説周語伯陽父曰陽伏而不能出隂迫而不能烝於是有地震孔晁云陽氣伏於隂下見迫於隂故不能升以至於動以地道安静反動為異也又靈臺秘苑云地本於隂而生萬物其形至厚其徳至静定而不動者也若忽震動是謂臣强陽伏而不能出隂迫而不能入隂有餘也若外戚擅權后妃專政則土為變異小人用下有謀及民擾則地震其分多兵飢若動於宗廟宫庭或動而不己者國有叛臣讒佞並進大臣數動誅罰不以理而上下不相親或政在女子或秋行冬令則地裂若裂而有聲四方不寧地忽陷臣專政民離散亦為失地若火燃者火為陽精地為隂主若或燃則越隂之道行陽之政傷而不克之象臣專恣而終以自害也若地忽生毛為金失其性人将勞役又漢應奉云人氣内逆則感動天地天變見於星氣日蝕地變見於竒物震動者陽用其精隂用其形猶人之有五臟六體五臟象天六體象地故臟病則氣色發於面體病則欠伸動於貌前世術者乃以日辰分配國土為占嵗日月時辰及災見所在之地皆同用之又有只以日時相加為占者如漢成建始三年日蝕地震杜欽云殆為後宫何以言之日以戊申蝕時加未戊未土也土者中宫之部也其夜地震未央宫殿中今本朝大臣無不安之人外戚無乖剌之心諸侯無强大之國四方無逆理之節此必適妾将有爭寵而相害者其法甲為齊乙為海外東夷丙為楚丁為江淮南蠻海岱戊為韓魏中州河濟已為韓魏庚為秦辛為華山以西之國壬為燕趙衛癸為常山以北北方之國子為周丑為狄魏亦主遼東寅為趙楚卯為鄭辰為晉邯鄲趙已為衛午為秦未為中山梁宋之國申為齊晉魏酉為魯戌為趙吳越亥為燕天鳴有聲人主驚憂而百姓勞失厥土五福太已所在每嵗須利一事大斿三十六年一交十二年司天十二年司地十二年司人小斿三年一交大斿所在天開眼小斿所在人相食以上皆東平占星劉明之説如此日月徑一千里周三千里何以知之曰周天三百六十有五度以太陽日行一度考之知之矣周公以陽城土圭測日自王城四面去千里則減一寸凡日食於窓隙間穿紙如錢許取影視之可見食之多寡東缺則西見西缺則東見樞府典故
