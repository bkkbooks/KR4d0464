body:
  text: 唐初典兵禁中出於帷幄之議故機密名官開元中設堂後五房而樞密自為一司其職祕獨宰相得知舎人官屬無得預也貞元之後藩鎮旅拒重以兵屬人乃以中官分領左右神策軍而樞密之職歸於北司然常寄治省寺廡下延英㑹議則屏立殿西勢猶奄奄傳道宫省語而已至其盛時其貴者號中尉次則樞密使得貼黄除吏唐末乃除北司幷南北軍於樞密使遂總天下之兵五代以來多以武人領使而宰相知院事至宋復置副貳簽書直學士之名大略文武參用間以宰相兼領故得進退大吏預聞機政其任職蓋重矣西使記壬子嵗皇弟實哷統諸軍奉詔西征凡六年拓境㡬萬里已未正月甲子常徳字仁卿馳驛西覲自和林出烏孫中西北行有二百餘里地漸髙入站經瀚海地極髙寒雖暑酷雪不消山石皆松文西南七日過瀚海行三百里地漸下有河濶數里曰昏木輦夏漲以舟楫濟數日過龍骨河復西北行與伯實巴哩南以相直近五百里多漢民有二麥黍穀河西注瀦為海約千餘里曰赫色勒巴斯多魚可食有碾磑亦以水激之行漸西有城曰業瞞又西南行過博囉城所種皆麥稻山多柏不能株絡石而長城居肆囿間錯土屋牕戸皆琉璃城北有海鐵山風出往往吹行人墮海中西南行二十里有闗曰鐵木兒懴察守闗者皆漢民闗徑﨑嶇似棧道出闗至阿里麻里城市井皆流水交貫有諸菓唯𤓰蒲萄石榴最佳回紇與漢民雜居其俗漸染頗似中國又南有察穆爾城居民多幷汾人有獸似虎毛厚金色無文善傷人有蟲如蛛毒中人則煩渇飲水立死唯過醉葡萄酒吐則解有㗜酒博囉城迤西金銀銅為錢有文而無孔方至瑪哈中以馬撁拖牀遞鋪負重而行疾或曰竒布密肆易馬以犬二月二十四日過伊都兩山間土平民夥溝洫映帶多故壘壊垣問之盖契丹故居也計其地去和林萬五千里而近有河曰亦運流洶洶東注土人云此黄河也二十八日過達喇寺三月一日過薩蘭城有浮圖諸回紇禮拜之所三日過伯什蘭諸回紇貿易如上已節四日過呼喇章河渡船如弓鞋然土人云河源出南大山地多産玉疑為崑崙山以西多龜蛇行相雜郵亭客舍甃如浴室門户皆以琉璃飾之民賦嵗止輸金錢十文然貧富有差八日過撏思干城大而民繁時羣花正坼唯梨花蔷薇玫瑰如中國餘多不能指名城之西所植皆蒲萄粳稻有麥亦秋種又其滿地産藥十數種皆中國所無藥物療疾甚效曰阿扎爾状如苦參治馬鼠瘡婦人損胎及打撲内損用豆許嚥之自消曰阿實爾状如地骨皮治婦人産後衣不下又治金瘡膿不出嚼碎傅瘡上即出曰努格薩爾形似桔梗治金瘡及腸與筋斷者嚼碎敷之自續餘不能盡録十四日過諳布河夏不雨秋則雨溉田以水地多蝗有飛鳥食之十九日過里丑城其地有桑棗征西鄂囉屯駐於此二十六日過馬蘭城又過納商城草皆苜蓿籓籬以栢二十九日殢掃兒城滿山皆鹽如水晶狀近西南六七里新得國曰穆爾納延牛皆駝峯黒色地無水土人隔山嶺鑿井相沿數十里下通流以溉田所屬山城三百六十已而皆下唯擔寒西一山城名乞都不孤峯峻絶不能矢石丙辰年王師至城下城絶髙險仰視之帽為墜諸道並進敵大驚令相大者納失兒來納欵已而烏嚕鳥鼐蘇勒坦出降蘇勒坦猶國王也其父領兵别據山城令其子取之七日而陷金寳物甚多一帶有直銀千笏者其國兵皆刺客俗見男子勇壮者以利誘之令手刃殳兄然後充兵醉酒扶入窟室娛以音樂美女縱其慾數日復置故處既醒問其所見敎之能為刺客死則享福如此因授以經呪日誦盖使蠱其心志死無悔也令潛使未服之國必刺其主而後已雖婦人亦然穆爾納延在西域中最為兇悍威脅鄰國霸四十餘年王師既克誅之無遺類四月六日過竒勒爾城所産蛇皆四跗長五尺餘首黒身黄皮如鯊魚口吐紫艷過阿爾丹城瑪扎察爾人被髪率以紅帕勒首衣青如鬼然王師自入西域降者幾三十國有佛國名竒布密肆在印毒西北盖傳釋迦氏衣鉢者其人儀状甚古如世所繪達摩像不茹葷酒日啖粳一合所談皆佛法禪定至暮方語丁巳嵗取布逹國南北二千里其主曰合里法其城有東西城中有大河西城無壁壘東城固之以甓繪其上甚盛王師至城下一交戰破勝兵四十餘萬西城陷皆盡屠其民尋圍東城六日而破死者以數十萬合里法以舸走獲焉其國俗富庶為西域冠宫殿皆以沉檀烏木降真為之壁皆以黒白玉為之金玉珍貝不可勝計其妃后皆漢人所産大珠曰太嵗彈蘭石瑟瑟金剛鑚之類帶有值千金者其國六百餘年傳四十世至合里法則亡人物頗秀於諸國所産馬名脱必察合里法不悦以橙漿和糖為飲琵琶三十六絃初合里法患頭痛醫不能治一伶人作新琵琶七十二絃聴之立解土人相傳布達諸國之祖故諸國皆臣服布達之西馬行二十日有天房内有天使神國之祖葬所也師名癖顔八兒房中懸鐵絙以手捫之心誠可及不誠者竟不得捫經文甚多皆癖顔八兒所作轄大城數十其民富實西有宻乞兒國尤富地産金人夜視有光處誌之以灰翌日發之有大如棗者至布達六千餘里國西即海海西有富浪國婦人衣冠如世所畫菩薩状男子僧服皆善寝不去衣雖夫婦亦異處有大鳥駝蹄蒼色鼓翅而行髙丈餘食火其卵如升許其失羅子國出珍珠其王名襖思阿塔卑云西南海也採珠盛以革囊止露兩手腰絙石墜入海手取蛤并泥沙貯于囊中遇惡蟲以醋噀之即去既得蛤滿囊撼絙舟人引出之往往有死者印毒國去中國最近軍氏一千二百萬户所出細藥大胡桃珠寳烏木雞舌賔鐵諸物國中懸大鐘有訴者撃之司鐘者紀其事及時王官亦紀其名以防姦欺民居以蒲為屋夏大熱人處水中巳未年七月烏林國阿早丁算灘來降城大小一百二十民一百七十萬山産銀黒契丹國名乞里灣王名呼教豐迪音蘇勒坦聞王賢亦來降其㧞里寺大城獅子雄者鬃尾如纓拂傷人吼則聲從腹中出馬聞之怖溺血狼有鬃孔雀如中國畫者惟尾在翅内每日中振羽香猫如土狗糞溺皆香如麝鸚鵡多五色風駝急使乘日可千里鵓鴿傳日亦千里珊瑚出西南海取以鐵網髙有至三尺者蘭赤生西南海山石中有五色鴨其價最髙金剛鑚出印毒以肉投大澗底飛鳥食其肉糞中得之薩巴爾出西海中盖玳瑇之遺精蛟魚食之吐出年深結為香價如金其假者即犀牛糞為之也骨篤犀大蛇之角也解諸毒龍種馬出西海中有鱗角牝馬有駒不敢同牧每被引入海不復出皂鵰一産三卵内一卵生犬灰色而毛短隨母影而走所逐禽無不獲者壟種羊出西海羊臍種土中溉以水聞雷而生臍系地中及長驚以木臍㫁齧草至秋可食臍内復有種又一胡婦解馬語即知吉凶甚驗其怪異等事不可殫紀往返凡一十四月郁歎曰西域之開始自張騫其土地山川固在也然世代寖逺國號變易事亦難考今之所謂瀚海者即古金山也印毒即漢身毒也曰駝鳥者即安息所産大馬爵也宻昔兒即唐拂菻地也觀其土産風俗可知已又新唐書載拂菻去京師四萬里在西海上所産珍異之物與今日地里正同盖無疑也中統四年三月渾源劉郁記堂叔伯者是並父之兄弟也父之姊妹謂之女伯女叔鄂王岳飛諡忠武文主而忘身茲謂人臣之大節諡以表行必稽天下之公言申錫贊書追告幽穸故太師追封鄂王諡忠武岳飛威名震于中外志略根乎詩書結髪從戎前無堅敵枕戈勵志誓清中原謂恢復之義為必申謂忠憤之氣為難遏上心密契詔札俱存夫何權臣力主和議未究凌烟之偉績先罹偃月之隂謀李將軍口不出辭聞者流涕藺相如身雖已死凜然猶生宜髙皇眷念之不忘肆孝廟哀矜之備至還故官而禮𦵏頒祠額以旌褒逮于先帝之時禭以真王之爵既解誣於累聖可無憾于九京然而易名之典雖行議禮之言未一始為忠愍之號旋更武穆之稱朕獲覩中興之舊章灼知皇祖之本意爰取危身奉上之實仍采克定禍亂之文合此兩言節其一惠昔孔明之志興漢室若子儀之光復唐都雖計效以或殊在秉心而弗異垂之典册何言今古之同符賴及子孫将與山河而並久英靈如在茂渥有承鹿菴先生曰作文之體其輕重先後猶好事者以畫娛客必先示其尋常而使精妙者出其後予偶悟曰此倒食甘蔗之意也作文字亦當從科舉中來不然豈唯不中格律而汗漫披猖無首無尾是出入不由户也又云後學雖不業科舉至於唐一代時文律賦亦當披閲而不可忽其中體制規模多有妙處二王行書其蜿蜒欹傾之妙若行雲流水似不拘於律然即於筆意求之其端莊流麗皆有餘韻唯具眼乃能識之鹿菴先生嘗以厯代史學試問於不肖惲對曰自史漢而下文字率猥併無法如新唐書雖事増於前辭省於舊字愈竒而氣愈索不若新五代一唱而三嘆有餘音者矣先生為忻然西方之地物香而人臭或者謂飲食致然與草木之氣所奪故也予曰不然西方者乃中國之隂也陽為馨香陰為臭穢西方氣偏不得中和之正故香臭異常辛殿撰小傳棄疾字幼安濟南人姿英偉尚氣節少與泰安党懐英友善肅慎氏既有中夏誓不為金臣子一日與懐英登一大丘置酒曰吾友安此吾將從此逝矣遂酌别而去既歸宋宋士夫非科舉莫進公笑曰此何有消青銅三百易一部時文足矣已而果擢第孝宗曰是以三百青銅博吾爵者耶其為授觀文殿修撰及議邊事主和者衆公曰昔齊桓公雪九世之恥春秋韙之況我與金人不共戴天讐邪今日之計有戰伐而已時丞相􅇑胄當軸與公議合自是敗盟開邊用兵於江淮間者數年公方略居多開禧二年除知紹興府至陛辭復以金人内亂宜亟攻為言辭情慷慨義形於色繼􅇑胄再議恢復乃以樞密都承㫖召公於越中道以疾卒道號稼軒上人今文集中夀南澗翁者蓋􅇑胄也初公在北方時與竹齋嘗遊泰山之靈巖題名曰六十一上人破辛字也至元二十年予按部來遊其石刻宛在聖上御極十有八年當至元十一年丙子春正月江左平冬十二月圖書禮器並送京師勅平章太原張公兼領監事尋詔許京朝官假觀予遂與左山商台符叩閣披閲者竟日凡得書畫二百餘幅今列於左王羲之四月帖四十字獻之三帖一洛中二杜昔三北問王羲之與謝安石評書帖後有跋云古人作字悉平生用功安有不出於古今者耶觀王謝首所爭若此况他哉盖帖中有云自於山谷中臨學鍾氏張芝等書二十餘年竹葉樹皮山石板木不可知數至縠牋藤紙反復書之佳者收採自書背記不能得而云此公何時用功夫深不達耳獻之鄱陽帖右軍威略帖八十二字入梁唐御府至宋入蘇大簡家崇寧癸未襄陽米芾審定真跡其圖書有秘玩手臨智永禪師臨右軍四帖後東坡跋云臨書如聴響切脈知其美惡則可謂必能名之者過也予觀秘閣墨跡皆唐人硬黄臨本但得臨本皆可蓄惟鵞羣一帖似是獻之真筆熈寧五年子瞻書褚遂良臨黄庭南唐昇元三年装褙紙則硬黄米芾學右軍書并論其筆法後一幅亦學右軍書退之詩俗書趂姿媚此公不為石鼓發想亦見此等物耳獻之草洛神賦紙極殘缺向明視背萬綻縱横謝安東山帖右軍快晴帖米襄陽臨本蘭亭五言帖後跋云唐虞世南臨本晉王恬帖三十一字晉王敦帖作草聖書皆晉史中語獻之書洛神賦後有梁普光間題跋云唐人臨本不名何人獻之書陸士衡文賦鍾太傅墨蹟議事表後錢惟演范堯夫薛道祖題錢文僖公題尚父嘗寳此帖尚父謂武肅王鏐也唐太宗二帖一兩行十字若珠還合浦劔入延平泰和二年三月司封員外郎栁公權記唐𤣥宗賜道士李涵光勅李陽氷墨蹟篆侍御帖上有李後主合同印李陽氷篆二十六字後有韋處厚李商隱題商隱字體絶類黄庭經時開成三年也髙閑上人詫得韓序帖後有韓琦劉敞富弼歐陽修宋敏求題云此卷蠟紙書非摹本也歐云如此韓公稱實録云書係顛草歐陽率更帖二臨本度尚帖襄陽審定真蹟秘玩智永禪師春雨帖又真草千文墨蹟唐相李憕聨句帖後跋云筆勢似北海李北海毒熱帖臨本李邕手簡後題觀者黄魯直張浮休邵䶵王詵張舜民等凡六十九人僧髙閑觀張旭顛逸帖唐史惟則墨蹟篆𨽻韻係小篆體例修狹後張浮休李公麟跋李太白醉歸墨迹後自題云吾頭懵懵試書此不能自辨賀生為我讀之汝年少眼明上有四世三公之印懷素草千文草聖遊京師帖論草字帖自叙帖布帘帖上林花發帖唐髙宗以下諸帝墨蹟手詔李北海休休帖白太傅墨蹟六偈子唐元和大理評事呉通㣲行書千文唐人草北山移文垂拱二年寫貞元甲戌陸贄觀筆法似是孫過庭唐僧亞栖書呉彩鸞龍鱗楷韻後栁誠懸題云呉彩鸞世傳謫仙也一夕書廣韻一部即鬻于市人不測其意稔聞此説罕見其書數載勤求方獲斯本觀其神全氣古筆力遒勁出於自然非古今學人可及也時泰和九年九月十五日題其冊共五十四葉鱗次相積皆留紙縫天寳八載製懷素洛中帖近於洛中得王右丞苔磯静釣水閣閒碁二畫其林野之思物景之清不覺身在其間信精筆感人也如此李白墨蹟送賀八歸越詩顔書與兄常山太守書乞米帖與宗室李太保勉奉辭帖與盧八倉公快雪晴時帖二十八字與李太保狀後有唐陳銓印誌祭濠州文孫過庭墨蹟草書譜過庭字䖍禮陳留人髙宗垂拱二年書徽宗書譜云孫草書皆逼羲獻妙于用筆雋拔剛斷出於天材非積習所可至孫思邈書計二十一字東坡書洗玉池銘擘窠真書瘦勁神奎閣碑墨蹟及上清儲祥宫碑墨蹟皆後書老泉撰商左山云盖避黨禍故改云東坡醉書盧仝詩為團練使書東坡觀世音讃靖康元年五月書盖將殁前二月絶筆書也秋澗集卷九十四欽定四庫全書秋澗
