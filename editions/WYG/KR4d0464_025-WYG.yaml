body:
  text: 五年夏四月朔日即事朝衣絺綌暮綿裘氣運天和不自由吹損緑隂風不定晚來庭院似深秋贈周幹臣槐府潭潭吏隠周青衫騎馬亦風流入門休問生涯事讀罷離騷待菊秋題風雨回舟圗江雨江烟萬里秋幾年汗漫事長游憐君巳落風波裏只恐回舟不自由題王武子觀馬圗五花吹散滿身雲掣電追風八駿奔好尚祗誇毛骨異不思戎馬在東門題李伯時所畫開元御馬圗閲武驪山是近游霜蹄蹴踏厭長楸料應扈從東封了一片烟雲赤岸秋題山堂㑹琴圗静夜山堂萬籟沉抱琴來泄古人心個中真趣知誰㑹門外松風是賞音聖賢思治先琴事子賤為邦舜阜民莫訝松軒來㑹數要從心指起經綸寄潞尹侯伯禄分攜不及都門别情話長懐午夜燈蘭省未妨虚儉幕郡人争喜識黄丞太行絶頂潞州城竹馬兒童逺見迎聞説下車公事簡不勞衙鼓報新聲題李伯時畫支遁觀馬圗晉人大槩尚虚談外物遷移等㣘貪千丈神光渠自有却將神駿馬中參金城店麻葉翻風稻映畦道邊垂栁䕃横溪一竿青斾誰家酒金店東頭野彴西金城懐古典午能延邂逅生柘弓銀研未忘情較量成濟揮戈慘天道中還固未平絳陽道中山自南來兩翼開分岡横亘隔金臺伯宗驅傳無輕去聽取輿人論絳災絳州公廨即事終朝據案訊纍囚日暗風凄動鬼幽草黯池荒人不見絳紗燈影看懸流河東池館絳園優才守豪王樂讌遊興闕見斛王祠畔暮山稠挈鷺提鷗次第開碧圍丹障鎖重臺可憐一炬成焦土却似汚宮為世哀樊守文章世已驚富公遺愛闕水假借羣蛙徹夜鳴鼓水西來竇北墉絳園形勝日増雄依稀罨畫樓臺影猶在瑶翻碧㶑中水聲激激枕邊來臥看倡池碧鑑開三尺短碑樊記在苦無多意發雄猜莽望黄原勢際天驚驂南走削孤顛東臺何限消沉意目送汾流落日邊讀絳陽園池記樊守文章未易窺艱深宜被後人譏一言能盡興衰理愛殺當年李格非周孔文章載道輈定刪原自典謨留不知魁紀操觚意地絶天通孰與儔題斛律王廟壁玉壁威騰却日戈蜚謡其奈百升歌須知地下陂陀血氣壓南山翠不磨祝融堆廩表韓公神理雖冥正可通自愧不求來折獄亦蒙隂相誘愚衷過絳州北哺饑坂晉趙宣子飯靈輒處也舊有祠屋今廢釣采華名世有人微勞高擬泰山勲此心報徳誠堪尚事了身名兩不聞血肉獒牙白晝寒挾輪來脱趙卿艱悠悠鶴葢隂中子高揖清風恐厚顔晉國平時有殍夫趙宣為政果何如哺飢坡下重回首一飯酬恩實起予題夏當務壁村落人家櫛比稠平時分水細為籌朝來一雨郊原足門外長溝滿意流龍祠禱雨巾岸烏紗角半摧馬蹄泥滑晚相催郡人莫訝麻衣溼適自龍祠禱雨回禱雨龍祠訪張總判不遇因題其壁甲第分攜半月餘逺回相過得須㬰松隂滿院溪流碧孤負臨風一捋鬚登白雲樓百日區區簿領間白雲樓閣幾憑欄秋來政有西山爽兩度還容拄笏看山泬雲高暑退初簟紋如水葛衣疎邇來郡府無多事臥對西山把性書贈墨卿秦得真壯心零落羽林槍老劑𤣥圭入退藏為報鳯池池上客不應神品擅潘張麝團小印栁枝龍不減唐人入漆工留得玉堂揮翰日桂香欄檻聽松風聽一作泛秋望客忩十日雨聲中雲影朝來綻碧空不上西樓能幾日滿城黄葉動西風題子猷山隂圗閉門一雪天地白乘興即上山隂船愛煞此君真率意至今人境兩翛然自嘲踏月聞鷄出郡齋逐朝撾鼓放衙來盤盤三晉河山地兵賦民情使汝諧自夀二年岱頂富奇觀今嵗姑山對霧鬟笑拂巗花指歸路黄塵深處是人間待旦軒假寐而作待旦軒虚曙色分瓦爐煙煖有餘薰細思日用無多事一静能消萬有紛題永安刁氏别墅壁一川百頃數家邨瓊嶺重岡擁澗垠樹藝自勤民自儉勸民冠葢不須勤南崖刻畫似城闉北勢耕桑聚落匀所願廟堂論至理萬方風俗再還醇聚逺亭刁氏别墅壁間題示墨猶新聚逺軒中入幕賓還喜晉人風土舊一邨名姓似朱陳莊武王馬燧廟北平英氣凛如生千古精忠勒御名過客賦詩増感激西風原上鼓鼙聲奔鯨吹浪蕩蒲津堂上奇兵算巳神老賊􅂷降還赴召比量先軫乃純臣汾脽懐古三首坤倪三面削蒼崖中擁汾脽寳氣開夾道老槐君莫訝虬枝曽拂漢旗來武皇誇大喜雄為鼎出汾隂恐事奇更著夀王相嫵媚守經深見漢儒卑東封泰岱西汾隂始自嬴劉好侈心只為一非無所格儘令方士出妖淫過聞喜縣有懐元鼎故事窮兵無似漢皇雄六合為家意未充一喜政能留故事舞干終愧有虞風過太寜宫披雲臺晚野烟荒宫掖坊深半夕陽獨有太寜祠畔土碧花猶自學宫粧安邑道中匡墻烟火暮微茫樂嵗人家半未康漢至孝文纔四葉便能三萬里農桑謁司馬温公墓河山兩界夏西分孕秀鍾靈産異人可惜秉鈞纔八月不教仁澤浸生民鳴條山逺聳孤墳千古嵩高仰甫申有意誕彌無實用竟將新法逐詞臣遊棲巖寺七絶上盡雲間十二盤一杯松下散襟顔老僧近晚堅留客争指西南見華山河山形勝見棲巖萬壑秋聲度碧杉竒絶此遊還有恨杖藜不到冷雲菴翠巖迴抱鬱蒼顔絶境軒横杳靄間老矣瑞峯應健在護持長伴八龍閒宇文周末年大禁釋教有曇延師者遯隠北山乆之有樵叟日來聼經後師道成復有七人者來師問故曰余八人皆龍也其一巳傳師教故余等亦來受戒一徑縈紆入杳㝠望川亭逈夕陽明欲知眼界寛多少放出秦川似掌平層巖重倚尚斜陽山下風烟一漫蒼恨煞愛山王老子不來同宿贊公房暮烟遮斷嶽蓮青低壓河流一線明巳被山靈嫌俗駕更堪留榜彦倫名安然乘馬到烟蘿一笑山間對鳥窠詩句滿前拈不得一作出風烟還比石樓多鐘聲出谷尚依依穏送詩人帶暝歸自笑野猿山鳥性夜深幽夢到巖扉跋提刑王副使航海圖天險無踰海與江得人一葦即能航懸知恢廓髙宗志夢繞商巖夜月蒼鯨翻鼉作大江流舟檝顛危咽棹謳忽展畫圖還自悟當年風雨過封丘遊普救寺晚寺人歸憶㑹真夢雲花氣鎖忩春重簾不隔西廂月一㸃香來是襪塵讀破口先事迹釋氏功夫向上尋一身歸寂雪山隂片言能脱盈城命少似先公濟物心贈船篷姚道人一龕塊坐已忘身陸海船篷别有春却為梨花枝上雪等閒踏破緑苔茵臨晉道中野雪晴消滿道泥茫茫銀海際烟霏日斜信馬中條北愛煞山光照客衣春雪小雪霏微不滿空亂穿庭樹舞春風餘威似掣調元肘不與東皇擅化工曳龜圖駮説瀾翻已自欺更堪身世兩相遺抱麟痛為東周泣争遣宣尼不及時公堂午後吏散一首吏散公庭日轉西蟻旋蜂静閧無時人無定志常居逺悄悄孤懐祗自知清明後一日作里巷春遊鬬鈿車午忩睡起日西斜閒書讀罷焚香坐淡對一枝山杏花卧數忩櫺對日曛一簾晴影弄游塵隣墻㡬片桃花雨㸃破苔堦更可人懊惱春悰困宿酲偶隨游子到溪亭多情㡬樹城南栁三度春風見汝青跋李提㸃和甫筠溪亭和甫開封人早年應神童碧鮮庭戸玉琤琮影透疎簾翠㡬重中有道人髙節在青青初不易秋冬洗耳無煩近潁川虚心獨愛此君賢何時拄杖敲門去讀罷離騷聽夜泉題鄠縣簿雷損之景程齋詩卷道統㡬微孰繼傳景程還得此名賢須知二帝三王事要以仁民愛物先理窟名言嫓典墳發源伊洛見經綸千年鄠杜遺風在更著雷卿繼後塵題田使者玉泉􅂷釣圖渭畋應未兆非熊底是胷蟠萬丈虹辦與澄湖三百頃一絲斜裊緑楊風挽平陽教授崔君度心醉羣經四十年老成身後見波瀾蒼涼一片姑山月空照先生苜蓿盤孟浩然灞橋圖金鑾消息逺相招雪滿吟鞍過灞橋處士夲無經世志强將詩句杜清朝髙鳯漂麥圖疾雷破柱雨翻盆甑堕何煩顧惜頻倘為把書都不省先生應是太癡人跋蘇武持節圖使華往返見交兵老我何嘗繫重輕已分横身膏草野茂陵松栢夢秋聲君臣義合以忠持十九年間節可知邂逅論闕㡬侮死區區纔得典諸夷兩行衰淚血沾襟一節酧恩北海深衛律有知慙即死更來遊説此何心慶趙汲古八秩之夀效樂天體人生八十今極夀况復兒孫滿眼前汲古園中趙夫子燕京城裏地行仙摩挲金狄門前客精健耆英㑹裏人坐對天津橋畔月池塘春草㡬回新崇慶初年縈組綬至元八載享康寜人間八秩風流事無似君家種徳馨至元辛未嵗八月十二日拉馬都事才卿遊韓氏南莊歸效樂天體得詩十絶皆書目前所見覺信手拈來也開門不問主人無幽鳥時來應竹呼僮僕巳知賓客敬與奴白飯馬青芻吟邊踏破緑苔堦自挂幽軒數菊栽半日杖藜横膝坐絶勝前日醉歌來浮雲冠葢六街塵老盡朱顔白髮新贏得身心兩閒在水邊林下果何人滿庭竹影鎖秋烟倒盡池蓮看菊斑墻外緑畦澆巳徧一園秋老桔橰閒小亭獨坐淡忘機山鳥山花笑我癡萬事看來皆偶爾此間休遣世人知亭臺涼吹晚留連樹遶岡回自一川野菽未霜溪栁盡烟光渾是早秋天陶園松菊餘秋色趙氏林亭滿夕霏人自晚年多静暇每來吟賞便忘歸淡雲烟樹事幽尋指㸃平蕪起醉吟但使眼前無俗子一杯時與野人斟醉墨淋漓字半斜枉將霜壁亂雲遮一杯先洗黄泥瘴似我閒情逺世譁蛙鳴水底强為聲酒盡沙頭卧玉缾我自近來無不是白雲舒卷暮山青裴晉公緑野探梅圖息軒筆淮西平後兩河清緑野梅花照眼明霜鬢未容閒裏老南枝消息要和羮當年韓白兩詞人吟賞天教在相門邂逅有詩窮勝事最憐疎影月黄昏東臯八咏為趙參謀題匏瓜亭君家匏瓜盡樽彛金玉雖良適用齊為報主人多釀酒葫蘆從此大家題幸齋人生知足一瓢多未老得閒非幸何堪笑矯情楊子幼嗚嗚空縱醉時歌東臯邨陽春門外望東臯三載相邀醉濁醪早晚回溪溪上路桃花紅雨滿漁舠耘軒草盛苖稀苦見侵荷鋤歸晚月生林須知種豆南山意唯有淵明識此心遐觀䑓自説無堪不出村一杯藜藿樂閒身就中不負登臨興滿眼青山是故人清斯池塵冠挂後無纓濯漁父從歌濁與清待與田家占水旱年年池上聽蛙聲流憇園養素丘園趣巳成斜陽林影看春耕手中三尺枯藤杖不羨人間六印榮歸雲䑓從龍致雨固油然巖壑歸飛意本閒况是東臯已沾足不妨來伴宿簷間夢中又賦開元御馬圖毛龍天降馭龍韜歴塊過都乃爾曹安得錦韉三萬騎令浮秋水下江臯予寓舍前有所謂水官珠者客曰此即薏苡也因呼兒採實作詩以識之堂前薏苡因人悟不處嫌疑信至言豈獨斐萋成貝錦令人還憾伏波寃讀開元雜事水殿涼多暑氣微薰風華萼正相輝争教明月梨花院玉笛聲長到枕幃興慶宫池景氣深薰然四海友于心讓皇篤愛情尤切力為君王辨八音海棠紅綴棣華零樂裏西涼巳變聲總把大衾長枕夢老天移魄入華清歸去來圖長沙勲業武侯忠劉宋規摹操懿雄虐焰儘烘寰宇裂五株楊栁自春風彭澤遺黎不幸何斜川魚鳥共婆娑先生踐迹高千古不似終南㨗徑多解綬歸來百日强東籬松菊未全荒細觀厯贊高賢傳一出頭來恨已長煑茶枯腸拍塞貯春雲洗盡囂煩六腑昏山木策勲存夜氣天河流潤下崑崙胷中宿酒閧殘兵一椀澆來敵陣平蒙頂得仙疑妄語月波千丈與詩清瀟瀟風雪薄虚忩細貯槍旗煑夜缸若論廓清真武事一天幽思為詩降四皓圖羽翼横飛四皓鴻楚歌悲絶趙王宫高皇英睿商賢節俱堕留侯計畫中萬古規模一漢皇保全母后捨僝王商山邂逅招園綺出自留侯畏吕强題楊息軒盤谷圖石峪盤盤百畝蒿野烟秋色淡林臯雄文一出潮陽筆頓覺山人索價髙闗山秋霽圖望京樓上晚凭欄常記居庸八月還一段紫烟吟不盡枉分秋色與南山生平懐霽是初心捲盡江山萬里隂十載夕佳亭上客卷中還對玉千岑寗戚叩角圖舜授堯傳老不逢商歌愁絶國門東小哉恨煞夷吾器竟列齊桓五霸中五王避暑圖挈幄留香郁棣華紅雲縈暖鶺鴒沙豆萁不免陳思嘆朱李寒泉是浪誇蓮鳥窺魚圖嘴距初非搏擊流翠香深處樂清幽㳺魚何限相吞噬秪得臨風一瞪休門帖子廪食京華兩見春全家飽暖荷深恩自慙補報應無地夢到青蒲白獸尊題袁安臥雪圖曲突無烟雪擁闗引書高臥自怡顔須知四世三公業不在人情冷暖間突不烟黔雪擁扉一編羲易療朝飢火城莫羡沙堤相論士當觀未遇時窮巷無人與叩闗長安風雪一家寒挺然不為飢驅去肯逐時人作熱官題顯宗承華殿墨戲大青小青兩龍種承華墨戲真天人春思欲見昇平事立仗歸來不動塵題東海徐白魚㸃額雷燒不到渠相忘何必在江湖細吹藻荇充飢了兩頷腥涎儘自濡酹祭宋先生子缶六首山立揚休七十春閒中今古醉中真傷心麗澤堂前月空照先生漉酒巾一代波瀾獨老成百年人物見耆英茂陵身後多遺藁一賦梅花到廣平我識空澄海印心生平游戲在禪林寳珠儘照青藜杖雅韻先空緑綺琴玉堂仙去渺翩翩冷落梅花樹下禪疇昔過庭言在耳炷香傾酒大蘇前水映林亭竹映山四時風景樂天閒一從零落丘山夢頓覺風光向客慳酒榼詩筒白玉珂春風到處是行窩百年愛仰都人士哀此羊曇淚更多跋龍陽松隠圖學君象數别穿深又向龍陽得洗心前日小山叢桂客不煩春草賦歸吟承華殿墨戲圖天廐雲屯八尺龍總輸神駿付青宫細看絶電流雲筆天寳諸王恐未工主人愛馬憐神駿一骨千金什襲藏却恐雷霆還下取九重天上看龍驤感寓逢人驚問但慙然自信文章老益堅來坐癡牀一千日恰如無事草鞋禪至元七年十月二十二日過順州與梁御史話金節侯剛忠王公子明死節事馬上為賦此詩以弔州舊治唐歸順州見大厯五年試太子洗馬鄭宣力所撰開元寺碑雉堞蜿蜒隠塊城剛忠於此殁天兵千年英氣如生在草木風前動戰聲題趙仲器銅芝膽瓶滴陂陀金背兩眉酥不屬官池與研居老筆策勲餘潤在一生何啻五車書足跡蹣跚几硯間太隂何苦汝為餐寸腸不磔盧仝鐡更吐隂寒上筆端題張夢卿雙清圖月影氷魂奪化工捋鬚直是不凡公漫山正有閒桃李爛漫春風幾日紅花光品格黄華筆一段風流付後人誰為九衢塵坌底兩枝摇蕩浙江春淡妝疎影兩依依㸃綴横斜畫總宜恰似孤山籬落畔小溪如練月如眉王右丞輞川圖騷詠禪談意未央欹湖烟月堕微茫園林鐘鼓清時樂好個裴公緑野堂狀物何如及物功開元真宰説姚崇未妨僦屋招提裏斗米三錢四海同凝碧池邊野鹿過空垂雙泣賦悲歌論忠不到平原列馳譽丹青未足多文采風流映一時丹青三昧有餘師戲將萬斛欹湖水寫盡南山五字詩遷張氏新居四首我自三遷到巽隅市朝雖近似郊居東隣有竇西鄰許不羨門多長者車院静忩虚淑景閒戎葵凝笑海榴丹莫令兒輩輕傷折為與渠儂理一般聽雪思堂與筆耕主人寓意强為名錙銖得及斯民了日出何方事又生羞將勲業鏡中看不為無魚動鋏彈兩鬢總隨霜簡白寸心虚傍日華丹題秋江月夜摘阮圖月夜朱絃激烈聞縱横詞舌得儀秦忘言何似陶元亮直作羲皇向上人易水悲風動急彈小絃鏗爾摘銅丸多應一片松梢月併入茅亭作夜寒闕下元日口號五首筍班春仗簇初齊贄馬行牽望拜時臘雪未消雙鳯瓦春風先到萬年枝平明瑞雪滿蓬萊島樹瓊花次第開人在建章馳道外四邊鞍馬唱歌來建章宫樹玉嶙峋雲近蓬萊氣自春帳殿忽開齊舞蹈紫衣獨見海東人春前移仗島東邊大禮稱觴最重年何幸小臣陪虎拜一杯春露共瞻天千官錫宴瞻天喜萬里休兵立仗閒擬效堯封三獻祝太平天子夀南山魏豹故城兵渉西河豹出迎亡姬還作漢儀程事機倚伏真相戲一笑長驅過故城題解梁廨壁丘壟依稀井幹殘人家烟火甫兵還就中不負官曹眼簿領堂前坐看山再過絳陽二年三度過金臺盛暑祁寒不憚懐臥聽水聲何所憶一軒秋雨竹間來夜宿李氏林館困眠欹枕未容休睡起闗心事最幽鶗鴂一聲忩色曙月明滿地緑隂稠禹廟大地河山繡錯明野烟孤廟枕荒城杜鵑饒舌知何事血洒東風怨未平路村道中鹽澤條山動寵光天書來坼紫泥香老癃扶杖欣相告五十年來未省嘗解州㕔壁題示至元癸酉五月二十三日奉宣明詔至於解梁因得王貴州壁間所題解池詩序云鹽池之大自唐以來凡臨蒞者無一辭以紀勝槩觀覽之際賁然成章或繼之者實自予始僕竊有所感焉因勉成三詩以附驥尾之末庶㡬因公而使天下知有惲云偕來者府兵曹解􅐃子公孺侍行承直郎平陽總判汲郡王惲題物色分留付後人暗將風雅欲誰親琨珠在側知形穢尚友何妨繼後塵日融池面爛生紅更著南山障碧空一夜高臺汗如洗州人説是廣南風解梁城下解鹽池萬寳騰光奪目暉我欲大觀窮化窟乳泉一賦了天機題平正縣堡樓壁盤盤峻嶺上青山兩度南來㸃堡翻义手老兵前致語此回霜鬢又加繁
