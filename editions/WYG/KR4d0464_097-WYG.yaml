  text: 集卷九十七
  hash: sha256:5747f6163bdd28d734265ed10cf6622b22b00f973fb6d3f9fc635b835b113344
body:
  text: 元王惲撰玉堂嘉話卷之五燕展築南城係金海陵天徳二年見蔡無可大覺寺碑史記不載蕭何修未央宫事此非細事馬遷作漢史而不見書何謂青居山古果州也唐張嘉貞為相弟嘉祐為金吾将軍每上朝軒盖騶從盈閭巷時號所居為鳴珂里源乾曜為相建言大臣子併求京職俊乂率任外官非平施之道臣二息俱任京官請出以補外以示自近始詔可又議者言執政與國同休戚不崇異無以責成功上乃詔中書門下共食實户三百堂封自此始焉裴耀卿遷長安令舊有配户和市法人厭苦之裴一切責豪門坐賈豫給以直僦欺之弊遂絶李之儀端叔説遺教經係徐季海書李善尺牘東坡所謂手簡三昧者也三昧者正定也李屏山釋迦賛盖出王勃成道説李但約散文而為韻語耳其達磨賛曰榔櫪者稱杖也遺山新渠記有云水至平而善利物今以至平而為不平不爭而為必爭雖有萬折必東之心終有七遇皆北之勢佛書曰獅子吼者言説法與無畏也四萬八千言大數也嘗讀後宋布衣徐理所進律鑑書其序云律者以實統虛者也何謂虚氣與聲也氣之在天地間或聚或散聲之無色無形故氣成於管聲成於樂首取司馬遷法度又説班固所作律志全取對韻説期於必中選也鹿菴先生説為學務要精熟當鎔成汁瀉成錠團成塊按成餅惲以謂作文尤當如是又云東坡草字寫時為以肘著紙上故筆轉處多不圓草書體貴輕筆當持重楷書筆貴精謹而體尚寛綽又説顔子夀夭不當只去顔子身上論他自堯舜以降臯䕫稷契周孔和氣所生者多矣至於顔子命數偶夭亦不足怪譬如人家昆仲五人有三箇賢的必有兩箇不肖的郭若思説天之分界南至臨邑郡北至鐵勒部日去地八萬里交趾國日中人影在南王黄華西京留守廰題名記説趙武靈王既破林胡始城雲中秦紹漢襲其名不改元魏之興也為京師焉西際大河東連上谷南扼中山北控五原廣袤千餘里規以為甸服逮遼徳于晉晉割山前代北十有六州以賂之遼即魏之故基考位為宫闕是曰西京六典曰父之姊妹其姪稱之曰女伯女叔唐陸贄傳云人君徳合於天曰皇合於地曰帝合於人曰王父天地以養人治物得其宜者曰天子皆大名也三代而上所稱象其徳不敢有加焉至秦乃兼曰皇帝流及後世皆稱之君始有聖劉天兀之號故人主重輕不在稱謂視其徳如何耳宋𢎞道説其舅劉景𤣥先生善記一日友人與遊市取染工簿令讀數回試之一覽背誦一字不差又圖克坦侍講與孟解元駕之亦善誦記取新刋稼軒樂府吳子晉前序一閲即誦亦一字不遺詳定官張孝純説一士人候某官疾既去遺一藁於坐視之盖預作祭文也一日又問一病友友曰且休放入待探懐無祭文相見聞者大笑米先生端州斧柯山石説云端州石出髙要縣斧柯山山前臨大溪其絶頂匠者於此鑿石嵗久乃成洞穴今已極深邃洞中常有水至春冬水涸採石中隂黒無所覩但以手捫石隨大小取之凡石理之精粗即良工往洞中尚不能别至于瑕玷璺脈須出洞乃可識故有累日月而不得一佳者大抵以石中有眼者為最貴世謂之鸜鵒眼盖石文精美如木之有節也不知者反以為石病吁可痛哉凡取石有四曰上岩下岩西坑後厯上岩之石最精下岩次之惟上岩之石乃有眼之美者皆緑黄二色相重多者自外至心凡八九重其状皆圓以色鮮美重數而圓正者為上其大者尤為稀有絶大者乃如彈丸有布列硯中或如北斗或五星心房之形者價不減數萬其生於墨池之外謂之髙眼其内者為低眼曰髙眼者以其不為墨所漬掩常可覩于前也無眼者雖資質甚美不出千錢石之品有數種其色正紫而㣲有青潤無芒叩之無聲此近水者也其色㣲紫而不深重近日視之略似有芒叩之有聲此巖壁之石二者最為發墨乃石之至精者其次青紫參半或紫而近赤或青多紫少皆石之下也端人為硯凡色之不佳者須用佛桑花染漬之初亦可愛經水即如故又山有自然團子或云剖其璞而得焉謂之子石又謂石之有金線者為美此正其病也端人亦不取云唯材之大者尤為難得每搆求方六七寸而無病脈者固亦少矣比嵗所貢方硯者五皆以及為凖然止于岩石之中品或眼工人輒鏨去之恐異日復求不可必致也太常新樂祭祖宗於藩邸文時開邸嶺上其辭曰惟我烈祖誕受上帝之命肇造區夏先皇帝嗣守大業卒其伐功圖惟奉答神祐光昭前烈而祀典闕如爰命多方旁求先王之樂八音遏逸未潰於成今予小子肅将天子之明命俾殿南服聞時周禮将具於我魯邦欽命攸司是徴是舉匪攸敢私聞庶用畢我先志以對天之休命神其格思翰林學士徐威卿先生筆也官至集賢院大學士金登科記序云道散而有六經六經散而有子史子史之是非取證於六經六經之折衷必本諸道道也者適治之路天下之理具焉二帝三王所傳是巳三代而上道見於事業而不在乎文章三代而下道寓於文章而不純於事業故鄉舉里選取人之事業也射䇿較藝取人之文章也兩漢以經術取士六朝以舉薦得人莫不稽舉於經傳子史焉隋合南北始有科舉自是盛於唐增光於宋迄於金又合遼宋之法而潤色之卒不以六藝為致治之成法進士之目名以鄉貢進士者本周之鄉舉之遺意也試之以賦義䇿論者本漢射䇿之遺法也金天㑹改元始設科舉有詞賦有經義有同進士有同三傳有同學究凡五等詞賦於東西兩京或蔚朔平顯等州或凉庭試試期不限定日月試處亦不限定州府詞賦之初於經傳子史内出題次又令逐年改一經亦許注内出題以書詩易禮春秋為次盖循遼舊也至天眷三年析津府試迨及海陵天徳三年親試於上京貞元二年遷都於燕自後止試於析津府收遼宋之後正隆二年以五經三史正文内出題明昌二年改令羣經子史内出題仍與本傳此詞賦之大略也經義之初詔試真定府所放號七十二賢榜迨及蔚州析津令易書詩禮春秋専治一經内出題盖循宋舊也天徳三年罷去經義及諸科止以詞賦取人明昌初詔復興經義此經義之大略也天眷二年令大河以南别開舉塲謂之南選貞元二年遷都於燕遂合南北通試於燕正隆二年令每二年一次開闢立定程限月日更不擇日以定為例府試初分六路次九路後十路此限定月日分格也天徳二年詔舉人鄉府省御四試中第明昌三年罷去御試止三試中第府試五人取一名合試依大定間例不過五百人後以舉人漸多㑹試四人取一名得者常不下八九百人御試取奏㫖此限定塲數人數格也自天眷二年析津放第於廣陽門西一僧寺門上唱名至遷都後命宣陽門上唱名後為定例此唱名之格也明昌初五舉終塲人直赴御試不中者别作恩榜賜同進士出身㑹元御試不中者令榜末安插府元被黜者許來舉直赴部初貞祐三年終塲人年五十以上者便行該恩此該恩之格也大定三年孟宗獻四元登第特授奉直大夫第二第三人授儒林郎餘皆從仕郎後不得為例明昌間以及第者多第一甲取五六人状元授一十一官第二第三人授九官餘皆授三官此授官之法也進士第一授丞簿軍防判第二任縣令此除授之格也近披閲金國登科顯官陞相位及名卿士大夫間見迭出代不乏人所以翼賛太平如大定明昌五十餘載朝野閒暇時和歲豐則輔相佐佑所益居多科舉亦無負於國家矣是知科舉豈徒習其言説誦其句讀摛章繪句而巳哉篆刻雕蟲而已哉固将率性修道以人文化成天下上則安富尊榮下則孝悌忠信而建萬世之長䇿科舉之功不其大乎國家所以稽古重道者以六經載道所以重科舉也後世所以重科舉者以維持六經能傳帝王之道也科舉之功不其大乎庚子嵗季秋朔日東原李世弼序唐人黄金臺詩云燕昭北築黄金臺四方豪俊乘風來秦家燒書殺儒客肘腋之間千里隔去年八月幽州道昭王墓前哭秋草今年五月咸陽闗秦家城外悲河山河山闗頭車馬路殘日青烟五陵樹徒單顒軒云此詩議論深長甚可學也皇甫湜編年紀傳論云古史編年至漢司馬遷始更其制而為紀傳相承且編年之作豈非以事繫日以日繫月以月繋時以時繋年者哉司馬氏作紀以項羽氏承秦以吕氏接之亦以歴年不可中廢也均輸法起桑𢎞羊謂市井百貨皆輸官坊商賈不復貿易唐禮部貟外郎為瑞錦窠員外廰前有大石碎諸州廢印於上又掌圖寫祥瑞令狐楚元和初任此員外郎嘗有詩曰移石幾回敲廢印開箱何處送新圖是也退朝録漢疏廣云賢而多財則損其志愚而多財則益其過且富者衆之怨也吾既無以敎子孫不欲益其過而生怨待君子以誠治小人以術反是為不仁不智矣東銘似乎兼愛其實理一而分殊漢制州郡佐史自長史以下皆太守自辟如杜髙則楊震所辟李膺則胡廣所辟唐制採訪節度官屬自判官以下得自辟舉未報則稱攝已命則同正如杜甫則嚴武所辟韓愈則董晉所辟三司使謂鹽鐵度支置制條例司歐叅政云天下之事惟宰相得行惟臺諌得言漢時長安北七百里即匈奴之地長城始築自趙簡子議者亘千里人治一步役三十秦制商鞅佐秦以為地利不盡更以二百四十步為畝百畝給一夫又以秦地曠而人寡晉地狹而人夥誘三晉之人耕而優其田宅復及子孫使秦人應敵於外非農與戰不得入官大率百人以五十人為農五十人習戰故兵强國富漢故事云漢興七年長樂宫成諸侯朝畢復置酒侍坐殿上依尊卑以次起上夀故事上夀四㑹曲注言但有鐘鼓無歌詩魏青龍二年以古置酒曲代四㑹曲又易古詩為羽觴行用為上夀古者司㑹今之尚書也周官司㑹以參互考日成以月要考月成以嵗㑹考嵗成以周知四國之治以詔王及冢宰廢置笮復引一索其名為笮人懸半空度彼絶壑此獨孤及招北客辭也天子之門以通十二子謂甲與子為干支之首總而言之也六壬壬為水其數皆六如六丙六丁之類百六之㑹章㑹統元考漢以黄帝上元甲子為首至太和元年所積之數至百六十年為一厄也漢律厯志髙麗官制其品從論穿執傘有陪盖為從傘也金國初問宋索金文玉册宋曽册為東懐國温公通鑑無髙祖廢孝惠留侯招四皓從太子事伊川易傳取之者善其智而能諫以明納約之義温公去之者為後世慮逺矣去取之意兩不相悖學者當黙識之楊龜山云箕子疑亦可死而佯狂以避盖以父師之義死之則傷勇矣老莊之學衡麓胡先生云老莊見周末文勝人皆從事於儀物度數不復以誠信為主故欲掃除弊迹以趨乎本真而矯枉太過立言有失𤣥虚幻渺不切事情遂使末流遺略禮法忽棄實徳浮游波蕩其為世害更甚於文而滅質漢開西域三十六國後稍分至五十餘國皆在匈奴之西烏孫國之南逺者萬有二千餘里近者不下九千餘里或問上蔡先生講論經典二三其説者當何從謝答曰用得即是驗之於心而安體之於身而可行斯是矣如求之或過於幽深證之或出於穿鑿将破碎大體不見聖賢之用心宜無取焉劉元城云説得一丈不如行取一尺楊龜山語游執中云常以晝驗之於妻子以觀其行之篤與否也夜考之於夢寐以卜其志之定與否也伊川先生云讀書當平其心易其氣闕其疑則聖人之意見矣東坡先生云聖人之言當以數句成文而求其意若學者率以一字為㫁遇其不同則異説生焉朱文公語學者觀書法云且當玩味大意就自已分上著實體驗不須細碎計較一兩字異同學問之道無他求其放心而已矣東坡論老荘之教君臣父子夫婦之間汎汎乎若萍游於江湖而適所值者商鞅韓非得其所以輕天下齊萬物之術是以敢為殘忍而無疑大抵於所厚者薄則無所不薄者理勢然也陳履常云士大夫視天下不平之事不當懐不平之意平居憤憤切齒扼腕誠非為已一旦當事而發之如決江河其可禦耶必有過甚覆溺之至竊謂陳子之論有大學所謂有所忿􅓰則不得其正之義要當豁廓然大公物來而順應之胡文定公云有志於學者當以聖人為則有志於天下者當以宰相自期降此不足道矣石徂徠曰士之積道徳富仁義於一身盖假權位以布諸行事利於天下也豈有屑屑然謀夫衣食者與侯師聖曰事君者以行道為志非為禄也然亦有時而為貧若専以禄為事則厮役之志也胡衡麓曰士之器大槩有三志於道徳者功名不足以累其心志於功名者富貴不足以累其心志於富貴者苟富貴而已則亦無所不至矣孔子所謂鄙夫之事横渠曰徳未成而先以功業為事是代大匠斵鮮不傷手也堯夫詩有云慎勿輕言天下事伊周元不是庸夫陳述古曰大丈夫當容人勿為人所容伊川云别事人多强得唯識量不可强如鄧艾位三公年七十處得甚好及因下蜀有功便動了謝安當謝𤣥破苻堅對客圍碁報至不喜及歸折屐齒强終不得又云堯舜事業亦只是太虚中一㸃浮雲過目胡文定公語楊訓曰人家切不要事事足意得常有些不足處便好人家纔得事事足意便不恰好事出亦體消長之理言也青苗錢如今之預取麥錢也假如目下麥價一貫借與五百将來徴麥一石助役錢國家遇有大役均取錢於民官為僱傭也唐故事奉使四夷其印章曰大唐入某國之印見蜀王建世家五代吳越貢賦朝廷遣使皆由登萊泛海嵗常漂沒其使吳越王錢鏐嘗遊衣錦軍作還鄉歌歌曰三節還鄉兮挂錦衣父老逺來相追隨牛斗無孛人無欺吳越一王駟馬歸唐開元二年制選京官有才識者除都督刺史都督刺史有政迹者除京官使出入常均永為恒式漢制由郎官而出宰百里由郡守而入為三公漢少府掌山海陂澤之税以備天子私奉大司農掌國貨以供軍國之用漢制武帝北伐乃置萬騎太守而馬政兼於郡二千石錢譜劉更生傳舜父盲其母常鬻薪以自給舜時糶米返貯錢于米囊中以還其母則重華之世錢已行矣此唐代錢之驗也賈逵注夏商金幣三等錢為下等先儒所傳有錢明矣梁大司馬顧協所撰錢譜序云漢尚書郎主作文起草月賜赤管一雙秋澗集卷九十七欽定四庫全書秋澗集卷九十八元王惲撰玉堂嘉話卷之六野合者女子七七四十九隂絶男子八八六十四陽絶此時婚謂野合時叔梁紇過六十四娶顔氏少女故曰野合宋紹興中衍聖公渡江而東者孔玠也蠶為龍之精按馬質云禁原蠶注天文辰為馬蠶書曰蠶為龍精月值大火則浴其種是蠶與馬同氣李林甫月令釋曰先蠶天駟也先蠶之神或以為苑窳婦人寓氏公主或以為黄帝或以為西陵氏或以為天駟歴論不一然蠶其首馬首其性喜温惡溼其浴火月而再養則傷馬此固與馬同出於天駟矣然天駟可為蠶祖而非先蠶者也蠶婦人之事史記黄帝娶西陵氏始蠶漢祝苑窳婦人寓氏公主此或有所傳然其祭設壇或少牢或太牢或一獻或三獻禮必皇后親享北齊使公卿祝之非也其曰龍精見荀子賦蠶唐制開府儀同三司謂置府辟吏儀同三公也感生帝唐王仲丘傳引鄭𤣥注云天之五帝遞王王者必感以興故夏之正月祭所生於郊以其祖配之因以祈榖感帝之祝貞觀用之矣廟制古者天子七廟自虞至周不易之制也七廟者即寝廟前廟後寝漢自明帝詔遵儉約無起陵寝藏主世祖廟魏立二廟晉宋齊隋及唐皆同一廟而異其寝宋遼因之廟所以象生之有朝寝所以象生之有寝也建之臯門之内不敢逺其親也位之觀門之左不忍死其親也諸侯五廟謂二昭二穆與太祖之廟五鄭氏曰太祖始封之君王者之後不為始封之君廟盖諸侯不敢祖天子故王之子弟始為諸侯不得立出王之廟後世子孫祖其始封者而其或有大功徳特命祀其祖先則立廟可也魯有姜嫄文王之廟鄭祖厲王是也若王者之後始封之君非有功徳不可為祖則祖其先代之王也宋祖帝乙是也大夫三廟王制大夫三廟一昭一穆與太祖之廟三鄭氏曰太祖是别子始爵者雖非别子始爵者亦然鄭志答趙商謂王制商制故雖非諸侯之别子亦得立太祖之廟周制别子為太祖若非别子之後雖為大夫但立父祖曽三廟隨時而遷不立始爵者為太祖也然左氏曰大夫有貳宗荀卿曰大夫士有常宗則大夫有百世不遷之大宗有五世則遷之小宗是太祖之廟常不遷也祭法曰大夫三廟考與王考皇考有廟顯考祖考無廟太祖正東向之位劉歆曰孫居王父之處以正昭穆父以明察下曰昭子以敬事上曰穆位則與祖相代此遷之殺也張純曰父子不並坐而孫從王父決疑要注曰凡昭穆父南面故曰昭昭者明也子北面故曰穆穆者順也杜佑曰太祖於室之中奥西壁下東面太祖之子南面為昭次之昭之子北面相對為穆張純曰元始中禘禮父為昭南面子為穆北面相對為穆父子不並坐也
