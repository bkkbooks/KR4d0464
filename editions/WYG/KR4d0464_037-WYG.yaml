front:
  text: 府判官汲郡王惲謹記
  hash: sha256:58b036dfff4a4cd04ec551571de471495cb64b4a675d71e9b382f829618fbf98
body:
  text: 秋澗集卷三十六欽定四庫全書秋澗集卷三十七元王惲撰記平陽路景行里新修岱嶽行祠記岱宗東方之鎮山有國者得以旅焉祭典下衰世以神司命萬類死生禍福幽明㑹歸故所在駿奔奉祀惟恐居後去之逺者其敬篤祀之肅者祠愈崇盖其風俗使然復何怪焉平陽故族張士信等信之篤事之尤謹者也常以匪貌而廟之不足妥靈掲䖍牖人于善也于是傾貲擇勝得東南陬景行里爽塏之地甚延奠其神觀焉實經始于辛夘嵗之三月落成于至元之戊辰凡締屋㡬三十楹前殿後寢兩廡廊翼中設㝠府諸像曰昭恵君蒿里相祈嗣位五重闕直及隂圄變相擁衛環列罔不畢備巍巍煌煌帝居輝光俾觀者起敬加畏知所勸戒善油然而生于衷洋洋焉對越靈威如在其左右也下至作樂有亭省牲有湢便戸鑿乎西臺門敞其南槩曕餘祠號稱整肅吁勤亦至矣一日來丐文于予将紀其興建本末洎信助者之名氏永昭于後因畧為論述之嗚呼古人以神道設教今也作新祠宇為事理雖殊而勢有固然者自禮義亡而世教不明于下一鄉之士秉彛心而私淑人者不爾則弗克悟陋民而儆薄俗是則後人之意也歟然神也者聰明正直福善禍淫乃其職耳奉之者嵗時儀獻能齋荘沐潔逺惡遷善可薦而不為神羞吾知夫朋酒饗而獲簡穰之祉矣不然歉負中積象恭于神雖鏘之以鐘鼓之音腆之以牲幣之禮芳菲滿堂三獻具舉神將厭而不顧尚何福之有哉幸來者詳特書之意庻乎其逺黷矣十有二年春二月平陽路總管府判官汲郡王惲謹記絳州正平縣新開溥潤渠記至元改號之六載詔立大司農司其品秩僚屬特與兩府埓盖以農桑大本滋殖元元莫斯為重故崇職掌開籍田以率先天下外建行司曰使曰副嵗時巡視責郡縣長吏條綱甚悉考其成績而明殿最凡先農之遺功陂澤之伏利崇山翳野前人所未盡者靡不興舉東雍之地厥土赤埴墳雖潤蓄兩河島則腴而亢下者鹵而瘠時雨稍愆嵗功不稔州尹馬君患之遂按行川浸思有以濟其艱而敬承天子之明詔曰澮吾所用也于是度原隰順水勢距郡治東南三十里曰楊程鄉澮入汾所至横截水衝揵石為堰者三袤可六十步武穿崖壍阜激之北騖波神委蛇來就東帶郭門而西注汾其間長溝通洫蔓引枝分溉田度二千餘畆水性濁滓流惡溢腴於田甚宜業已波及穫可畆一鍾凡役工若干計未周嵗而渠事告成盖君以規度有方衆樂其溥博之施也盖自始迄終曽不告勞絳下老人相與材公之為感公之勤欽明命霈利澤終以實恵及民懇予文以記之予嘗有事鼓溪之神登高望逺觀隋令梁公某曽引用鼓水分溉田疇㡬絳之西北郊于今蒙被其澤者衆其水有餘蓄而河為限截隔之故每當旱暵思以一杯沃枯槁而不可得嗚呼何跬步相望而有苦樂之間哉今馬君銳興茲役出衆慮之所不及行前世所未行俾汾左之田溥含膏潤仁民之功其利溥哉百載而下將見有君與梁公並祀而同談者矣董其役者實縣尹趙某簿王某能事其事而不負所責勤亦至矣故并及之且採民謠而為之歌歌曰新渠成汾之滸我溉田流㵼鹵公雖勤民獲所昔也豐穰穫㡬許今縱旱暵決渠雨甌寠滿篝公所與公恵我兮母速去我報公兮烏所覩刻石河濱照千古遊王官谷記山之與水相胥而後勝山非水則石悴而雲枯水非山則勢夷而氣泊二者雖具得其人而後名中條山王官谷其萃美之尤者也山闖首河曲連亘北騖為雷首為栖巖為萬固運肘而東為五老又東而得王官谷谷漢故壘名有唐司空表聖之别業至今遺像休休亭在焉至元甲戌夏六月予以檢括民田澮溝已而奔命珣瑖取道于虞王官諸峰指顧東邁後八日因恙小休暑雨向霽遐想風烟情逸雲上遂幡然來遊始自固氏西南行約四五里抵山門厯磴平進無顛頓推挽之勞不百許步已入山堂隩中矣其繚而曲深而容垂條灌木盤石美䕃草香而土肥環峰叠嶂碧壺瑤甕濃淡覆露内曠而外掩無擁遏怫鬱之氣葢谷田中高狀作層陛勢相覆壓耐辱所謂上下方者是也東西兩山曰壺門夕陽青壁矗立卓絶如削中峰曰天柱秀拔特起如鼇鼻嘘空髙齴雲表不與衆峰聨絡真觀之竒也峰半有石突然曰落鶴臺又西有石拱立曰雙人左右斷崕水作瀑流下㵼如仙人解佩天紳未收西則泉脈出縮以乾溢為度東則飛灑噴薄隂壑恒雨砰崖激石下注幽磵是謂貽溪者是也山藉以潤人仰以清物滋以榮也王子于是斂袵薦茗謁司空祠下退觀休亭諸詩既高公之名節且詫谷之深秀也青鞋竹杖扶掖上征抵天柱峰足望東嵓瀑布䃲礴三詔亭下因留宿焉時月出山豁萬籟沈寂涼露洗空失暑所在青嶂瑶光非復塵世其東溪水聲如逺鼔􅔿􅔿隠動林壑顧謂兒子孺曰此山靈張樂喜其来而作予氣也深夜久聞毛髪森豎山人李珏出司空一鳴集相與披讀于露幌風簷之際顧瞻林影如見須眉乃酌水再酹乞靈于公詠休休之歌思考槃之樂安得黄金買堪乘之鹤追仙逰于寥廓也耶不然搖江山之筆吸撑霆之氣貯濯詩脾以増益其未至庶㡬列王駕李生之次其亦所願也日既昃徘徊乆之出山林霏烟翠漠然四合回望谷口無復所見庚伏中旬後三日共溪雲隠記待旦軒記至元壬申嵗予自御史調官平陽扁私居之軒曰待旦盖所以礪厥志而儆不逮也矧河東列城五十棋布相望大府實根本所在而風俗係焉國制張官五㕔幕例下僚位東西與别駕嚮至扶筆剖斷一定于上官僚若無所事及占署牘尾無細大通得可否之是則位雖下所責亦不輕第以品位有崇卑材術有優劣得其人則分安而政舉非其材則身骩而事隳自惟氣質疎散心雖勉强撫字無方故就列以來朝夕惕厲如恐弗勝當其夜漏將盡晨鷄始興矍然盥潄即夫清明假寐之際得無深思者乎其汙澤川流何宣布焉而庠序煟興何申重焉綱維未振何主張焉風俗未醇何肅清焉吏沸務棼何理亂焉訟繁獄滯何簡恤焉屬邑不共何先率焉賢才在下何薦揚焉靜言念之有公以處心勤以集事耳噫周公聖人也負扆履藉以當冢宰之位至于思兼三王而施四事坐以待旦勤强不息况其下者乎盖勤則為補拙之質公即其生明之本無私則心平心平則理得理得則言順克勤則匪懈匪懈則力行力行則事隨事隨則物化此理之固然無復疑者苟不是念而甘糞土其身臯臯訿訿藉廩禄為代耕之地與夫工不事事計日取傭者奚異哉恐食焉氣怫寢焉而體臲卼尚何根本是賴風化得喪之所係焉若此者豈惟愧負中積而獲罪于時將見嘯于梁者下瞰其室矣于是乎大書屋壁庶抑詩之自警云明年夏五月二日靖共堂主人汲郡王惲記畫記近世之沒者以平時服玩遺宗屬賓友諺云留念緒然非故舊知愛之至則不爾平陽刁君嘗飲予於私第酒酣出古畫一簏中得龍嵓山水兩幅其山骨鬱茂林屋黯宻盖學中立而逼真者也上題云丙申春孟留汾水時康玉潤屬所作時金大定十六年也嵗月崢嶸迄至元甲戌九十餘嵗矣予歎賞者久之刁即前用為夀辭焉明年乙亥春君以疾終既卒哭其家持畫來貺遵治命也嗚呼君與余非故交而深知者且南麓畫在士大夫間固有品格然不過一物耳其可重者氣與義也昔曽子易簀而後殁愛其禮也今君當萬事已矣之際事有不遑及者乃以是為囑篤夫義故也吁衰俗波蕩中耿耿取信能如此可謂信義不失者矣時于軒楹間展對斯畫愾然想見其人未嘗不為之嘻欷也君諱國器資敦純早以勲閥為征西帥臨敵決戰以果毅稱軍中後因疾去職僻居田間怡然自得人不知為故侯大將也西山經行記至元乙亥秋七月被藩府檄偕來伻盧君採文石於晉丙申如襄陵董治厥事館許氏東堂八月庚子次西梁質明致祭黄崕山下遂命工即役借榻普照僧舍凡再宿有以義成石為言者壬寅馬北首山行入臨汾界過侯氏四水等谷踰山尾得王荘峪峪口敞豁夷衍北連白陵砦脚既夕宿龍子祠南晉掌里癸夘下井峪渡麻柵澗自獅子鼻登山越石門是為姑射峪西山諸峪凡十有九處姑射王荘實為之要盖南達吉鄉北走紫川道也前臨渃岸觀隂定關關形峽束若石門然僅通人過想夫秋潦澮汾羣壑來注掀騰勃怒萬馬東駛遽阨茲口激而為飛流銀濤雪浪百丈湍㵼亦壯觀也躡澗西騖厯馬蹄纒山雨奄至且作且止指望仙臺眺玉女樓望生馬壇頂諸峰烟霏翠溼空濛無際蹊蹬縈紆盤十有八折抵神居洞下洞腹寛肆窿穹巉嵓仰窺欲墜後有竅逶邃山之噫氣穴也遂解衣盤礴憇洞閣上尋復開霽山紅澗碧景氣爛漫凉風吹面自逺而至煩襟翛然如夢仙府雖遇四子于汾水之陽不足以喻其樂也因留題壁間且辨其誕少焉游太一洞觀陰罅玉柱葢石鐘乳也稍西踰馬鞍嶺上弱羊坂坂長約七八里極峻折艱于登陟馬力不能勝抵暮宿西陶謝氏林屋甲辰由鄭峪入義成分循澗槽西行徑嶮狹草木蒙茂步履錯迕過水磑折而東北上嶺視石之所在石陛砌覆壓隠山之半腹𤣥質白章又有綘其色若雲然者尤秀潤竒特降横岡石溜間得枯枿一株矯如龍騰竒崛可愛于是按行澗道眎輦運所經稍東入深峽亂澗水峽形曲折中藏堂皇其根足沙水齧蝕似口似圈似窪呀焉而頥張突焉而角出者不可殫記兩崕峻削嶄嶄壁立髙入雲表大石阜如齟齬左右勢犖确殆不能騎造愈深而峽愈竒又東行十餘里顛崖横絶水潨㵼石甕中鏘然如環佩鳴兩山間峻絶不可越矣遂自南脚嶺攀援北上峰回路轉行可六七里抵宿東陶家山乙巳復自羊坂東降取姑射北道過龍堂澗望仙門謁王母洞道人致酒山閣以軟脚例飲余浮大白者三世傳北山中復有玉蓮古洞下與此穴暗相通連旁有水泉曰漉錢名者事涉誕怪不復紀遂由側嶺白石溜下參峪抵西段里午飯郭氏田舎日昃還府吁天壤間山水佳處唯幽人勝士得徜徉其間與顥氣造物俱㳺而共樂不圖官守急遽中而獲兹㳺雖不能窮幽極勝㺯雲烟而狎魚鳥亦非常之舉也歸筆所覩以志且見夫因事機攄煩滯而不為徒然也船篷菴記船篷道人姚氏太平相里人自童丱入道甲子㡬四百矣棲心淡泊草衣木食全其生而樂其樂穴居野處于澗之阿削懸崖為土室廣不踰尋丈迴環洞如一嵗之中而有結夏蟄冬之適塊坐塵凝與時啟閉温燠清深去闤闠咫尺殆塵壤隔予嘗與事走絳與故人張器之遇把臂道舊步入縣西溪遂来㳺兹菴道人因丐名于余題之曰船篷菴請其說船篷者取形似而言然其意不無所寓焉盖水浮天而載地中土者天地之虛舟也萬類雜處魚頭濈濈其陵蕩傾覆之虞日復一日何若斯人處斯室而獨為一天肱眠瓢飲樂其樂而曽無錙銖之患哉余乃為之歌曰𤣥㝠之曦兮朱夏之清兮木歸其根蟄吾形兮梨花雪開啟吾扃兮人區鮓瓮全吾生兮篷底秋江汎然無所攖兮余復何求心營營兮道士顧笑舉酒相屬後余歌而言曰銘吾廬甚當于是乎書平陽府臨汾縣姑射山新道記晉人善用水而盡地之利山之奥藏未有以悉發府治西山行五十里曰東西陶鏐炭所萃連山亘谷根苗洞窟軒豁呈露然澗壑嶺嶂號稱天險坳深峻削摩雲穴地蟠錯交凝跬步間登頓駭汗不勝其憊雖中伏厚利用是限隔川居邑聚獲十不一二並山農氓悉圖開鑿力單罔逮睨之而心愾者盖有年矣皇子安西王以維城之重分茅開府胥宇雍土爰命幹使伐石兹山輦出之途仍宣理焉乃西自李琚疏度而北踰南山截義成澗盤土塿東上脅嶺脅折而東北行度鄭封峪其上盖炭之膏盛于焉為􅇰又嘗置鐵官出車連連之咽㑹也循崕崦取易東務緣西陶北麓其顛走延隴四道過東陶里出斷崕南分而兩岐其一履級東降越疳溝旋鞾脚嶺腦懼其蹊良田也落生馬澗槽穿南北石峽山形櫃如極險迾處也遂中貫而上南則駕駞嶺轉弱羊石盤抵夀山平壑下㑹馬鞍嶺口以備北道石峽水潦時至之虞躡竜溏而東經望仙北洞跨南北溝首由前後石門嶺下白石溜厯參峪注赤埴坡陽盡西段里當峰回路轉復作避車塲六防其致阻塞也其間踣鉅石擘老峡峻絶者坦焉阨窄者廓焉犖确者火馬刋落摧陷去危就安變壅鬱為疏通夷峻惡為平易西東一瞬略無梗澁雖並崕旋阜紆回曲折方之故蹊曽弗加逺凡為里一萬八千餘步摠役度五百徒工萬五千其始至于迄工才十有八日于是山輸委貨人休永勞逶迤安舒坦坦東下籠負車牽魚貫而出居者行者笑歌載路相與言曰伐他山之材而獲兹山之秀因輦運之役遂致道途通暢之便西山伏利以之盡起不惟俾一方之民賴厥功而富所用抑以見我國家封建之制肇造藩維之方陰陽于民者将張本于是不爾山澤無窮之利将終古而奥藏矣守土吏大小之役實董其事是不敢不志某年月日記平陽府臨汾縣新廨記平陽當河汾間為鉅鎮屬邑五十餘城臨汾劇而􅇰要經界纔百里占籍者幾萬五千戸凡丘賦之重徭役之煩十常居其二而風聲氣習勤儉果譎宛然雜唐晉餘俗惟其物浩壤狹且不相能故人嚚于訟必直曲乃已聴約束俟審辨者動填里閈縣舊署在府右廂康寧坊之南城易代来為土人氏豪據有司假老屋隙舎寓理曹務一嵗間輒三五易處簿書儀具坌集委積棼不可瞫奔趨執事者當夏熾冬冽赭汗僵立尤實艱苦前政狃故常盼瓜代日復一日漫不加省庶㡬赫今尹之威具眎瞻之儀清承宣風化之源其唯艱哉逮今縣監某洎尹某稔其如是適時和政理向化有漸乃以其故詢諸衆僉曰念兹在兹竊有年矣第率先無自訖于今唈唈也既度其人之樂用遂經辦焉因購得景行里次氏之故第凡成室一十有五楹畧不加易其來如歸㕔事適中吏舎兩列形閎前啟衡達里逵於是逺湫隘處髙明委蛇安舒各有攸叙中外竦然大易觀仰既而史亢淵曰其興滯易弊之勞趨事樂成之懇公倡私應共濟厥美匪劖書珉石代而縣者烏能究根據而見經始贄禮幣来謁文予以厯官内外因知天下之治在于宰相師帥得人而已佐天子理百官發號施令以遂物宜者宰相也推君治宅民生供事取決㑹歸有極撫字百里間者師帥也是則宰相師帥勢雖霄壤以本末體要而言實相須成化耳故前代選重其人眘柬于清流冊授于軒陛疏名殿屏盖繇是也今國家條章具舉百度惟貞顓任責成垂寄殊切作縣者而苟非恪勤官守推忠及物何以稱經緯相需之望今一縣之署置固匪政之大者類能若是尚何患仕之不優俗之不易責罔塞而績用弗章於時哉予特喜縣僚屬達于從政有志于民得春秋憫雨之義故以所繫重者告焉幸來者無忽至元丙子三月日記懷先賢記至元甲戌冬予既復首陽山夷齊祠繹之日亞尹張侯聿来㑹祭遐想故家佇曕墟墓對越靈威泫焉泣下盖風誼激哀有不能已焉者顧謂予曰走世為孤竹人自穉及壮經行㳺獵往来南山故城間覩夫廟貌不稱旌記寂寥言念于懐顔實有靦吾子幸為我大書特書歸掲海濱以為邦人光且表夫山川之重鎮二賢出處之大致也按圖經箕尾之分勁氣下蟠控帶遼碣北平乃一大咽㑹故其俗雄碩尚氣義敦諾急難凛焉有戰國餘習平州經界殷本諸侯孤竹君世封春秋為肥子國秦漢以來列郡縣不恒實燕之肥如盧龍邑肥如因水得名耳開皇間始陞為州直灤江而西二十里有古城宛存枕於東山之麓盖孤竹故都今指曰竹城者是也州治南三十里而近有山巋然盤亘中野其名曰孤屋二賢其上遂亦首陽呼焉於戲二子之英烈言言窮天地亘萬古皎乎日月不足以喻其明巍乎嵩華不足以喻其峻俾後之為人臣者取標凖而知所懼其為世教豈小補哉尚何俟山稱號而為之顯晦也然侯懐賢思齊之意何其盛歟荘周有言去國期年見似人者而喜盖敬恭桑梓曽不較其愛惡矧國之古賢世之大老特立而不羣者乎若張侯者可謂尚友千載敦鄙薄而有志者也侯諱昊字明卿資果達嗜魯論為顓學故莅官行已多據經指為言已而沾沾然喜見顔間曰吾中有所得矣其篤信好學如是至有以張侯論目之者十有三年丙子春正元日謹記遺廟記金海陵煬王以天徳七載乙亥定議南伐明年正隆改元詔大營汴京擬混一江左遷而都焉故廟社之志于是乎興然清廟實前宋之故物也在景祐間止屋有七楹考金之記曰正隆四年己夘嵗之十有一月禮部尚書同修國史王競銀青榮禄大夫參知政事敬嗣輝開府儀同三司尚書左丞相上柱國魯國公張浩監修實金為之増廣加飾非創作也何以明之覩其梴桷旅楹大而徑三尺者比皆腐朽餘㡬丈若曰金朝創始不及百年安得如此之朽腐哉廟直大内之南馳道之東殿法吳制東西列二十五楹袤四十丈廣七丈其神室内地廣一十步餘四步為室前虛明廟兩首各限一楹中以二十三楹分十有一室從西以三楹作一室餘每室以兩楹為之龕之數其西位夾室六南向者三北向者三東俱兩龕自餘率一龕所向皆東西而已總十有八龕殿階作二層列升道三前井亭二東西相向外作重堧四繚而沿門角有樓門南角五闔餘三而已其東北中垣之外即冊寶殿也國制凡帝后寶冊暨郊廟金玉禮器皆在焉令太常官一員每季檢視用印封緘謂之典寶禮器者何爵瓉圭璧是也玉冊者何先代哀諡是也其冊帝以寳玉作簡后以象齒為之賁以金書貫以朱絲封縢甚秘世莫之見南則更衣亭亭前舊有湖石瓌竒名曰瑞芝其東南外垣之内即神庖刲取血膋之所環重垣之内東西為廡各五十楹旁夾廟門各廿有五于以分布齋郎駿奔執事之列正北則闕焉其西南外垣即廟署位前有門以表循外垣西北復鑿偏戸一意者備執事出入之便也予聞之遺老舊制祀廟率以親王上宰攝太尉以享太祝奉祀宗祏置地用色羅上羃帝以黄后以絳所謂至敬無文也茵以臯比器設陶皿用血肉以獻上下之樂畢備此金朝典秩之大槩也國亡以来汴之宫室毁撤掃地顧惟茲廟以貯儲得巋然獨存皇朝中統五年夏四月詔河南前宣撫張子良撤焉以北浮御河入燕就為今之太宫従堂議也據正隆己夘至今甲子以厯考之適百有六年也識者異之且今初建燕多撒汴材其木皆以燕用為誌今是廟亦復用燕之故址有數存乎其間耳自有能辨之者夫君子将營宫室宗廟為先祖宗胡可以無廟然一廟之用有不勝之費今也撤亡廟而為新宫其尊祖息民而可謂恭儉者哉是廟宋制也按禮經天子七廟太祖之廟居中三昭三穆為之左右其七主曰壇曰墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟月一祭之逺廟為祧去祧為壇去壇為墠壇墠者有禱焉祭之無禱則否此三代不易之制也逮東漢變而為一廟同宇異室耳李唐自貞觀開元後増置九數後宋因之亦列九世為十二室而金朝以九帝有天下百餘年上自景太至于宣廟不審天興奉祀之日其間升祔祧出得列于太室者凡幾廟何者得祔何者為祧耶故并及之以俟更考云至元五年夏六月十一日記泰安州長清縣樂育堂記趙君明叔尹長清之明年政夷訟簡眂其民可教迺就廟垣為構泮宫於是治學舍植松竹聚書史立教條率儒生屬吏日講授其中雖造次多故未嘗少輟不半載士勤其業吏循其風禮容文物郁郁可觀十四年春與予㑹於京師因以曏所聞為問曰有是哉奚足多為然清今為中縣顧瞻岱宗背負河濟士風教習出齊魯間在昔距濟南近邑生徒率就學于省府故禮殿序庠之屋卑隘無足稱於前爼豆絃歌之數不接見于閭里青衿之耳目盖有年於兹矣此僕之所以不敢狃安故常鄙薄其俗勉有此舉也已而以學記來請嘗試論之古之君子以先知覺後知以先覺覺後覺是天之所責于我者甚重我烏得而避之况有能致之資居可行之位尤當急先務也令尹雖出宰百里實為一方師帥政之得失俗之善惡一繫夫志嚮所在知先後之序耳人之秉彞惟其物則故好是懿徳此天理均有人心之本然也苟得其養無髙卑大小之間故狂而聖愚而明始也致知格物身修而家齊終則明徳新民國治而天下平由是而觀學校庠序之教豈小補哉叔世道微功利說興督責之令宻士以區區之末學苟禄代耕奔走鞅掌于簿書期㑹之間我躬不閱遑恤乎爼豆禮器之事哉今君以修敏之材奮跡諸生間厯事臺省由省臺而宰劇邑卒於簿書期㑹奔趨督責之餘遵詔條確志曏務以徳義牖民力行不倦為樂俾羣材長育如中陵者莪菁菁然而盛可謂能也已昔韓潮陽牒置鄉校曰刺史縣令不躬為師使後生無所從學為恥又以養育人材為吾宰相之事顧天之所責于我者當何如哉若趙君者庸知夫異日得時行志以斯道覺斯民為天下之樂且儀乎吾見有開必先之兆于是乎始君諱文昌濟南人至元丁丑嵗三月丙申記逺風臺記豐宜門外西南行四五里有鄉曰宜遷地偏而囂逺土腴而氣淑郊丘帶乎左横岡亘其前中得井地三九之一卜築耕稼植花木鑿池沼覆簣池旁架屋臺上𨽻其榜曰逺風以為嵗時賓客宴㳺之所者韓氏之仲昆也至元戊寅百有六日主人來邀予顧瞻河山形勢在北則近連圻甸南則逺際河朔東控海門碣石之雄西眺太行桑乾之勝千里一瞬略無限隔少頃風翛翛然自太虛中来浸淫乎谿谷蕩漾乎林野春和明霽㣲埃不興聲先乎羣木之顛氣鬱乎崇丘之外然後度叢桂入亭檻轉蘭獵蕙泛溢乎層棟軒楹之間座客欣然動蘭臺之興暢方外之適披襟當之曰信乎滌煩臆抒滯思而其來之之逺也余仰而思俯而歎曰子知風之来逺未究夫臺之得斯名於士大夫間也韓氏自鄅城府君以来孫謀底法以燕翼子者義則昭昭矣通甫君美遵誨承志光大先業懽然若父菑之數播􅁮然如棣花之相輝泝流尋源其遺風所從來逺矣故賢士大夫莫不重其好賢樂善登茲臺而願與之㳺由是而觀慈祥豈弟之風又賢于人逺甚况兹墅也出而入仕跬步于廟朝之上退而隠處偃薄于山林之下得行義達道存志俟時無不安適其清風穆如流芳于後人者又有逺而不可極之致不然天壤間林泉佳處第欲暢幽情而滌煩慮何所往而不可客曰嘻有旨哉今韓氏卜築之意信得其趣而吾子可謂發不言之秘勉其所未然者焉既而囑余筆記之因綴前言俾刻諸臺上以貽來者至于風交平疇良苗懐新行之而喜者兹植杖野人之事故不復云後三日記韓氏遵誨堂後記人子之事親存殁之間觀志由行三年無改為孝之至况終身而維則者乎燕今為大都㑹世家鉅族飄輕裾䕃華穰非不侈而盛也及論夫居室善而内有則者韓氏為足稱長即總管通甫次即君美判府予御史裏行在燕者凡三年用是交好甚欵知為人甚詳修身齊家讀書治生禮賓客應外務一以忠信孝弟為主怡愉雍睦如賓友之相敬棣華之相輝也過庭者佩詩禮之嚴居家者無言笑之雜超然而處熈然而遊几筵多燕衎之娛田野有烹歌之樂以致一門之内而百順坌來昆弟之間無庸少間所謂身不求達而達有餘屋不期潤而潤自至者予嘗獲拜鄅城府君畫像望之粹然一淳徳君子其嘉言善行無非後嗣可遵而法者乃知韓氏淵流之深長枝葉之茂盛疏之溉之者功于前繼之承之者復善其後故永年先生作堂名曰遵誨良有㫖哉噫李唐在前代為盛世至以家法相傳獨京兆栁氏為稱首予每讀玭傳求其修齊之要不出以忠信為本孝弟為先至曰此飲食醯醬可一日無哉未嘗不撫卷歎息三復格言方衰俗頽靡中而韓氏昆仲亦能以孝弟忠信為飲食之醯醬揚令名而顯祖考奉潛徳而發幽光推是心不匱至錫類也如是将見垂芳奕葉不獨栁氏専美于前史也秋澗集卷三十七欽定四庫全書秋澗集卷
