body:
  text: 五言古詩四言間亦附見拜奠魯文憲王廟二十八韻丕承固云烈嗣王幼而沖嬉戯翦桐事安知多難衝公乎居斯時岌岌遵渚鴻外謗流四國内疑叢一躬負扆令百辟天心昭懿忠想當假寐際寅亮天地工陳誥開治源奠遷營洛宫南服静海波東征殄元凶吐握下白屋憲章矢淵衷罄單一徳聖思兼三王功及夫就臣位畏脊何匑匑制作方萬古世道仍汙隆至今豐鎬間凜有三代風饗以宫懸樂報之不為豐宣父稱大哲寤寐雲從龍垂老無復夢慨焉吾道窮丹青見遺像皜皜日在空臣子知所止仰之餘敬恭悠悠蒼姬下輔相業不同論思機務地典調簿書叢豈其世務棼經權有違從顧惟大臣體一節貴始終伊公狼狽間不失體與容几几兩赤舄儼立如岱宗我嘗集衆美一言蔽其中至公絶貪私廓與天人通作詩庶補衮九章一華蟲精誠有來格寒雲動龜蒙拜奠宣聖林墓庭訓墮渺茫師授悖嚴誡羌予不惑年行已得夷隘今嵗客東魯佀為神所介駕言逐秋風得展闕里拜遥遥魯甸餘汶水走湍瀨慿軾望雲林鬱鬱佳氣靉齊莊趨兩楹奠獻成孤酹巋然三聖封仰止髙泰岱恨生千年後今夕備掃洒披雲覩天日太極開一畫彼蒼詎能言諄諄聖為代三綱與九法範圍無内外君臣以之定乾坤以之泰東周不可為述作萬世賴藐聆徇鐸音元化雷雨解敬想燕居容金聲鏘玉佩當時七十子授受儼如待鳯兮鳴幾時諸子沸秋籟一朱亂紅紫百榖茷稊稗愚者甘下達誕者樂語怪韞藏寶康瓠斡棄清廟鼎明倫得不泯而有六經在天髙孰可階一氣包厚載兹道固難言嘿契心有㑹胸中九雲夢吞納失蔕芥循循善誘辭師也書之帶緬懐伯禽業郁郁文獻最三柦張公室霸功熾而忲一奢去無復荒陵餘石獬煌煌天乙孫膚敏半冠帶徳博慶自修道大世能邁金尼貫元精泗波來逺派汪濊一聖海不隨梁木壊歸侍金絲堂攝齊聞謦欬恍如到帝所鈞天廣樂備洗我兩耳聰肉味忘一嘬詠歸冩遺音風雅變􅅠􅆁一簞老東家吾知其樂大遲遲不忍去寒日下蒼檜陪總管陳公肇祀商少師比干廟元化形萬彚浩浩無時無云何忠貞氣大畀先生軀念昔有殷季天步移獨夫滛酗蕩祀典下民為毒痡所崇盡奸回啟遯箕子奴師保乃云爾餘敢編其鬚炎炎鹿臺火已兆明珠襦先生豈不知蔓草不可圗顧親叔父尊以位仍三孤強諌誠我任剖心不為瘉自靖暨殺身要之宗社扶所以宣父筆三仁同一途繄公存亡間所係重有殊堂堂柱天手能縶火徳烏當時戡黎兵所侵良及膚周雖彼蒼眷加翼十亂謨令其諌少行終鄙西人居稱師止觀政安取商郊車一朝嘆云亡宗國隨之墟丹誠皎白日餘烈光八區卒爾來代臣大節知所趨嗚呼介士嘆萬萬狂童且今來二千載殷周兩榛蕪巍然一丘土髙與西山俱清霜九月節肇祀陪干旟肅拜列階下精爽動佩裾世道有淪喪一忠千萬諛商歌振林樾日下悲風徂擬韓子秋懐十一首出郭行時稼秋風正薿薿臨川閲逝波浩浩去不已冨貴來㡬時及此行樂耳把酒對西山坐㸔秋雲起天矯化龍蛇異狀紛莫似世態初不殊儻來安可恃我懐拔俗標干霄仰逸軌酒酣歌嗚嗚振衣私自喜秋風拂庭柯物意自含悴松柏抱貞心表表嵗寒地長年豈致養易衰匪自恣浩浩一氣中所禀盖殊異人尤物之靈要以天爵貴天運健不息君子戒靡曼讀書下梗塞飢餓充藿飯造道苦不深紛華非所願秋風動黄鵠千里奚足歎風濤北溟鯤變化摶九萬大邦易為仁郁郁文獻半出處貴有時莫遣夜鶴怨攬衣起秋早露氣清淩淩偶書秋懐篇悮筆成蒼蠅吾言固不佞未免人屢憎聖域有坦途學步髙山陵尋源有靈槎臨池㺯鮋罾我生恐不偶鄙事從多能虚室生夜白清露發鶴警空庭海月上愛此良夕永今年苦煩歊似值苛政猛盼盼秋風來汲深持短綆庭菊被焚燎脫禍乃差幸朝來有佳色一笑倚軒屏露叢低寒花促織泣暮景呼兒曝羣書趂此秋日炯弊帚享千金利途競纎梗二者昧所思厥病失坐騁既悟前日非敢事子淵請長夜苦漫漫長空星斗暗商歌南山翁遺佚有餘憾祇知享髙明曽何恤鬼瞰而我獨於世滋味嚼蠟淡畏途足風波汹汹洪水濫濯足尚云可浣纓豈冝暫此身矧虚舟敢不慎簡䌫天心幸私我書史日與勘庶還浩浩天禾害家儲甔殘暑不肯退秋陽麗庭軒静觀消長理警此嵗月奔成功嘿嘿去天道何曽言斂衣坐一室書帙散我前開卷飫至味忘却盤中餐最愛歸去辭雋嚼了一篇作者古不少文字浩萬千感君固窮節當年亦辛酸遥持酒一瓢同醉東籬邊九原不可作念之終嵗年青竹不耐暑索寞衆葉乾白露下天字洗此青琅玕風枝簌餘潤暗滿佳菊團依依南飛鵲遶枝擇所安感時賦秋懐古井翻晴瀾我生分已定安用智走丸出門安所之呼兒解征鞍閉門秋月上静院圍蟲聲幽人掩窻卧一室翻虛明四序倐以周代謝何其誠物華有盛衰天地從虚盈君子順所履持身嚴五兵牛羊旦旦伐山木何以榮所慎獨處際心蕩韓盧令離離壠上禾望望日攸好不勤耘耔功秀實苦不早西風卷黄雲收穫走隣保荒田棄足惜揠之速其槁致役貴厥初無為宋人道九日和淵明詩韻九日天氣好淡遊無友生懐哉曠達士愛此佳節名野逈秋山髙逺目増雙明手把霜菊枝吟泛風葉聲人生天地間強矯無百齡嵗月不我與大川日東傾且酌一尊酒遺彼五鼎榮滿挹風露香陶我醉後情遇坎且復止吾器期晚成今嵗節序晚天氣秋夏交衰草伴佳菊藉暖亦後凋居閒愛節物不辭逺升髙川澄涵鴈影空曠暖微霄舉觴酧時人塵坌迺爾勞中間百年集龜卜將日焦何如遺世士空杯樂亦陶得酒且歡喜誰能保來朝寒雀歎閒庭有遺粒寒雀往還飛盼睞傍無人翔集下疎籬一啄復四顧慮為物所闚幽人負暄坐玩之淡忘機一笑拂衣起羣驚向空歸因之感吾生分外非所期冨貴倘僥倖何殊鳥驚疑吾儕以義榮先賢有良規觀𦵏者有感走筆為賦西鄰送喪車前後餘百人少壯亦歔欷老大尤悲辛殯歸焄蒿里奄忽隨沙塵逝者長悠悠魄散還蒼旻存者但追悼簠簋時空陳人生天地間變化朝菌新冥冥夜臺下念之傷心神大限百嵗止憂喜還相因况且不滿百忍使憂纒身青春不􅄪至嵗月波注輪有醸不來飲負此頭上巾自喻吾性懶且拙置書未嘗觀興來一披讀暫涉意已闌因傷中道畫勉力鞭使前奈彼外物誘既往輒復還年來天與幸繆當函文間朝昏迫童課未免親書編開緘三嘆息知學今十年雖傳失自習所得亦已偏正如乗跛馬十步九躓顛引領望聖域尺綆汲丈泉有時尋墜緒意㑹亦愜然務敏脩乃來自棄誠可憐譬彼執銚鎒緩治榛蕪田縱弗曰收熟猶愈埋荒烟進進乆不輟功豈止百㕓九原雖不復聖道具蹄筌堯舜等人耳悉自學至焉從兹自發藥浩浩還吾天改𦵏冥漠君買樹植中唐下鍤得髐骨生世何為者何年此埋没周身瓦作棺上有刼灰覆黄泥滿髑髏麥枕餘故物神奇到腐朽貴賤辨無復惻然戒僮僕掇拾百骸足徹我牀上簀包裹𦵏城隩奠酒一杯祭遣汝一盂餗同區三十年今始改兆卜死者謂有知夢寐不一囑幽沉起有時掩骼適春燠豈復識此為庶慰我心曲不無攓蓬嘆何必桃茢袚免汝踐辱羞我豈儌㝠福長眠一杯土野祭霑賸馥莫羨麒麟塚發掘為珠櫝自買身後禍安用髙突兀去去冥漠君九原春草緑青青兩桐樹示兒子阿孺青青兩桐樹乞自幽人居植我庭階下護養嬰孩如汲水時一溉要令地脈濡起架障炎曦揷籬周四隅眄柯日怡顔手把種樹書及夫始華月春芽茁蒼珠朝來秀色發衆葉卷且舒終朝三摩挲愛此青玉株亭亭一尺影翠盖遮門廬嗟爾琴瑟材中與霜籟俱達哉蔡中郎救爾煨燼餘我望十年後直幹淩碧虚秋聲泛韶濩雲表來鵷鶵且天生萬物因材而篤諸栽者厚其生傾者不爾扶譬彼青衿子致養在厥初必擴心與志毋適尺寸膚然有才不才學焉因爾殊緬懐孟軻訓書以示阿奴鹿喻我本麋鹿性出處安自然金鑣非所慕志在長林烟得逺機穽地食苹飲清泉呦鳴錫同類甘以辭華軒野兕出其側暗蹂山前田農家向所害乃知獸之愆彼兕以計去嘉禾嵗芊芊野人居山中數畆事墾斸慮為町疃場指鹿乃兕屬雖無擉刄心見之惡且逐鹿心素無機淡與標枝閒遁跡入幽谷擇音逺人寰尚為山中人置疑齒頰間送宋大使漢臣之任延安四海王翰林髙情比雲月一甌宻雲龍過門誰復啜宋君平生交矯矯峻風節况經患難間邂逅叙契濶毎來倒屣迎所請無不說賦詩近盈軸沽酒慰久客都門冠盖場聲華愈昭晰我初識君面論交心莫逆相看自淇水燕地最多日吟鞍賞春華茶鐺煮晴雪劇談挾銳槊洞達失堅壁兹焉一載強相從復相覔喜聞得新除腰金出省闥烏臺退食歸入户屐齒折朝來髙軒過打門欣告别情親近中年何啻數日惡天涯兩淪落嵗暮悲風發人生㡬河梁底物慰愁結觴君病不能贈言素所拙君侯天下士抱負經世業鞭算致錢流論吐究時瘼吾子兩餘裕他人雙落寞黄鵠志千里秋天擬横絶誰能雜鳬鴈羣飛争飢啄兹行固非傃歸愈垂空槖儘新僮僕敬大慰妻子色延安西北秦地與羌渾接王民六十載厥賦尚寡弱保障慮不遑徴收肯騷削緑樹空野烟山澤入籠絡秦風與隴月慘悴自兹作邊氓靖為重聚斂聖所怍臨淵得河潤當念逺井渴得書下下考吾子亦云樂我詩春秋法責備賢與哲此心能不爽蓬蓽乃麟閣不煩雙鯉魚時遣慰離索溪田暮歸疎林烟火㣲草露溼芒屩遲遲歸路長清月掛林杪依依南飛鵲幾回驚且繞一枝幸得安誰復睇雲表田家固作苦遺安子孫寶彭澤百日令解紱徑歸老我心黙有契縻爵豈有好違已病交攻飢凍正枯槁躬耕南澗垂浩歌槃樂考散步清溪湄散步清溪湄林飱憶鮮食沙頭有漁梁呼童樂閒逸波清滿遊鯈鬚鬛分纎悉雖微知所避罾之不可得悠然逐風漪相忘萍藻宻達人濠上樂政自觀其適人生風埃中與爾何差别區區一已私奔走抵溟極萬事恐偶然胡為較得失舉網出深淵髙樹掛㝠色長笑歸去來吾道無固必讀林和靖詩集枯梢振驚颷茅齋寒日短幽懐久不樂訪友橋南館探囊得逋集塵臆欣一浣賡歌竟遺編佳處時再欵先生𤣥豹姿清風滿朝簡仿像詩骨清雲嶺松雪偃湖光與山緑几席供奇産呼吸貯肝脾元氣筆下綰逸情薄雲月幽律發葭管静觀周物靈逺覽豁襟散清遺郊島寒淡入陶韋坦孤山富梅竹香動春江暖篇中㡬致意似慰平生眼客來佳話餘横琴浮茗椀是中有真趣風味亦不淺廬洛與寺閤意適欲忘返長空𣺌孤鶴容與歸舟晚如斯六十春笑傲一何衎相去羲皇間不到牛鳴逺暮歸傍窻眠清興江湖滿雋永愜初心有味叅玉版燈花喜共妍一笑成微莞人生無百嵗胡為日憂懣擾擾聲塵中任事同蝜蝂西溪初泛同王子初訪柔克王公自此多經遺山先生㸃竄閒人無所適心向静境趨今日欣有得快如脱籠拘步出郭西門偶與佳友俱舍杖棹清溪忘授圯上書舟輕風浪平泛若乗流鳬波光灧船頭雲陰翳平蕪畸人驚見之輟耕立河淤白鳥去不逺前飛如導予故人喜我至就船與相娱呼童下泝流載入酒滿壺促膝兩舷間鰕蟲雜肴蔬吟杯斟且停要看傍岸漁從下恐忘返欲上意轉徐瞪目看銀刀不知寒日晡纎鱗竟莫獲豈謂吾網疎顧此一溝水安比松江鱸舟人云不爾近多狡獪徒散毒河伯宫掇取地芥如卵毁鳯不至禁罟自有餘釣網詎可並况乃詭計圗射利一至此世途足崎嶇歸時還一笑兩岸風生蒲擬古北山介公夀也公之徳澤及物如山之蓄殖焉是宜得厥位而享其夀也故作是詩以頌焉瞻彼北山維石嵳嵳邦民仰止匪丘匪阿既峻而極復委而佗元氣中宰所蕃實多維公之徳如山而峩瞻彼北泉維滮于垠淵淵其源浩浩其春澄之弗澈撓之莫渾潤餘一方波彼四隣維公之澤如泉之新瞻彼北山有松桓桓氣榦千尺盡嵗之寒棟樑大厦是依是安未宏厥用心怡體胖美蔭所庇物為一天匪惟蔦蘿有蕭有蘭受徳匪報茅菅厚顔維公之夀如松之年北山三章二章章十句一章十六句過劉元海陵寢漢統天久絶漢恩一何深隔逺魏晉代猶足收民心咄嗟呼韓子崛起蒲離陰自云漢壻甥赫怒開實沈左顧龍在野右咤虎嘯林吹嘘炎燼餘五部來謳吟阿聰奮餘烈兩京隨掃平竊據二紀强文物有足矜我來拜陵寢悚然振冠纓風雲𣺌何許廢堞餘金城賢哉劉淑妃成此直諌名在聰未為疵假義淵可稱孰云仁義師可敵不可征桓桓祁山舉一出三輔驚天其假公年載洗六合清此志竟莫遂此邦還有成所以廣武嘆痛惜無豪英山烟知客意斜日生荒陵遊萬固寺中條鬱蒼蒼首尾固雄大連山一卧虎矯首盡兩戒東南方峪門犖确入幽阨空青上絶壁嶻嶪兩崖對南山開畫屏髙下蔚萬檜扶藜到山門黄衣六七輩寺殘薄心賞一水良可愛尋源入雲蘿不惜阮屐敗掬飲清臆塵坐睨巨石怪山空響佩環林逈騰怒獬行聴溪聲回周覽詢勝概當年爽心亭萬竹争映帶碧鮮照清泚襟袂濯沆瀣人境兩𣺌茫佳句儘誇邁舊有石刻坡詩云水自竹根流出風從松頂飄來座上盡為佳士更無一㸃塵埃開軒邀客飯放目欣一快盤餐固疎糲泉冽㡬肉嘬少焉林風振萬壑一氣噫前林疑虎嘯作勇助吾憊筆落還自驚一掃衆峰靉寺僧請書殿閤名故云山僧喜醉顛海㑹得珠貝興來本無心游戯詫佛界夕陽送歸鞍依約虎谿外風烟作破墨塔廟失所在鍾英厭摹冩閟狀化機藹盤空乏硬語技癢苦無賴馬首詩遽成一笑豁吾隘静樂堂人生霄壌間動静藏妙用一為外物遷舉足非禮動惟夫操存人而與天地共紛紜萬變來一一皆折衷問之果何因性定心自統心宰物隨化奚俟人指縱體安氣静徐内熱失急閧兹焉須㬰離不啻天地雺梁君出豪右表表聳儀鳯意氣杯酒間談笑百金重一旦刮餘習紛華不復夢省躬日有得守約還自諷霜餘波自澄雨退雲知洞復我浩浩天多言譏屢中客來掩書坐香動玻璃甕融然一室中萬象入持控知君樂無涯五絃歌雅頌舜泉在河中府南三十里夏陽村東厯山聖人嶺下舜峪内至元壬申冬十二月十四日來遊舍鞍夏陽西褰裳躡雲頂盤折下濬溝失身墮幽阱孤松突危巔望望雙目炯不圗兩芒屨踐迹聖人嶺重華不復返欽此孝慕炳降觀臨帝泉冠佩為肅整泓澄一勺多浩若淵水逈彷徉不忍去抔飲濯蔕梗慨焉念髙風滅沒翻倒景野人前致辭此事傳嵗永有鰥昔在下怒為瞽所屏窮歸此來田號泣痛自省空山無所得扶耒孑孤影彼蒼彰聖誠渴餒恐成𤯝一入兩崖間二水出俄頃北崖縈帶流南壑湛寒井至今山中人飲食了二頃我生千載後懐古心耿耿風俗日淪喪道義奚所秉安得天瓢手挹此霜露等千林摧姦枿比屋化封穎滌易臣子心骫骳變骨鯁暮歸田舍眠有志安得騁此心恐未能作詩聊自儆且當就巖蕨酌水煮殷鼎跋席懐逺臨終語録人當易簀際發言罔不善昏矇迷本真狂者涉誕幻猗嗟席懐逺洞徹生死變日氣薄西山皦乎天理見諄諄忠孝言垂戒漢馬援洒然明月懐身後照鄉縣賡歌諸賢詩清風一家傳録老農語陽曲道中作老翁揭溝水駐馬待樹間雙脛怯朝涉欹傾激衝湍既濟問老翁荷鋤何所還筋力一何弱甲子今幾焉斂手前致辭星紀凡七旋有妻喪已久有子病且残舉家無營業止有田一㕓禾生迷東西老雨荒草芊耘鋤庶有穫聊以卒嵗年饘粥乃餘事要輸包垜錢有身古當復垂老聖所安二者不能必聞之鼻為酸我食爾所粒作詩告京官吳大使子明致樂堂人生有至樂榮貴了不干人子有至養三牲非所先宣父語經訓承顔首為難南陔著深戒不獨馨盤餐眷戀庭闈心朝夕靡遑安問寢與侍膳樂在融融間所以極愛敬要罄平生歡吳君出紈綺孝純思力殫垂領髪已素娛親衣尚斑天意亦有在一官仕鄉闗稱觴嵗上夀香火欣團欒此身不願貴有家從苟完願親日康寕丰容紫庭蘭毫彩神與相慈顔渥而丹婺光藹萱室嬰香芬珮環壼族化柔懿周南詠幽閒髙堂敞温清題扁存鉅觀致樂無復尚守身老彌堅庶㡬寸草心少報春輝妍堯都三萬家清風𣺌誰攀作詩頌匪匱錫類君其端㑹當蒙顯異寵光爛門闌三釜我祿餘履霜非謂寒一飽及妻子因君起長嘆瀟瀟風樹底悲絶仲由冠遣發僕夫李老櫬歸瘞淇上至元癸酉後六月十九日死于平陽寓舍來自東西劍相看二十年因罹兵燼厄重結主奴縁薪水嗟初服耕耘遂所天挈身辭戮辱得病便沈綿藥餌功無效棺衾禮罔愆汝魂應有識歸到水西田感寓荆巖産奇寶輝山生五色鳯鳥集其上採者終莫識卞生具神眼抱泣天地珍稱喻日百至比璠比玞珉一世竟莫售指卞為瞽人負之献楚子致前須近臣豈知事大繆反取按劍嗔獲譴或不賞戮辱終其身所以苦節士萬古潛悲辛陳村待渡河行虚壌間隨意東西卧我遵汾水行十日凡兩過沮濡變深澗野航驚漏破篙師怯吾衰傳呼細扶柂朝來大陳渡細擺得久坐山川隠佳句軒豁矜寡和秋風吹馬去行看林葉墮沁水道中蒼巔互出縮峪勢曲走蛇回眺驚後擁迎看復横遮雲林蕩髙秋半嶺翻清霞十里九渡水清流帶寒沙山溪本幽寂激之聲乃譁解鞍憇美蔭覺我心静嘉風枝滿秋實野菊被水涯幽馨散蘭馥紅鮮綴丹砂二物固瑣碎託興騷人誇我欣記所見信筆書田家􅀫板橋田舍山村極幽僻坡嶺還四面麋鹿日與伍自餘無所見朅來事文石供給半山縣倦枕聴呼號相次過夜半過鹿臺山在澤州沁水縣南二十里時被安西王命伐石於此逺尋文石岡來厯南山纒鹿臺臺為山幽徑蟠古篆後峪行未盡前嶺已當面秋聲蕩林樾風露凄以泫陰壑氣蓊鬱疑有虎豹變山田苦無多溝崦耕已遍柴援結半空羅絡碧巖轉自憐終嵗勤獸患防一旦我本山中人束帶對郵掾頓然還舊觀瀟洒償夙願行經雙蟾嶺石怪驚變現闖首槲樹間氣自太古練月中誰推墜囚鎖屬山縣乃知北平守認虎飲一作拍羽箭物肖本偶然長歌下層巘觀穫蕎麥搖搖珊瑚枝浥浥露光潤霜餘秋實繁壠畆欣一瞬野人趂時穫拖車施素刃前椎約步長偃仆為一順風來湯餅香玉粒夢炊甑田間還自笑三載總山郡肥甘與菲薄一飯吾有分坎止與流行何思復何悶臨汾節婦吟松筠四時青特與凡木别弱草不自持風霜易摧折坤柔變乾剛彤管古所說臨汾孫氏媪寡操抱貞節之死誓靡它棲心入霜月事姑極孝養教子承世業神明與扶持骨健丹浮頰我觀中壘傳於粲古英烈作詩備採官徽名繼前哲過鹿臺西崦乙亥八月二十九日偕沁水縣尹李君飛卿眎治道馬上作鹿臺西南麓石路何杈枒青林轉幽深一水中可嘉逺從半山來長流石為窪一泓湛寒碧野飲供麕䴥溼雲擁絶壁灝爽霑巾紗我忻為緩轡睠立溪之涯恍疑桃花源錦樹蒸紅霞畸人指前途兩㸃蒼山髽荅老農語風梢怒號寒駕言復西邁吟鞭趂羸驂直走壺口阨俯縁絶澗源仰看孤石大陽崖柏青青陰嶺雪全盖詩脾儘餘清灝氣溢襟帶行行遇老農馬首言笑載前時使君公治此逮困憊事成固國力規晝良匪懈一朝文石去永利予等賴兹焉詎可忘衆意見遺愛連章供監司大嚼伸一快既聞老父言慚汗流浹背道開非吾功物出數有在况予分當然添足恐成怪夕陽澹前峯凝睇飛鳥外是中有佳趣毁譽吾敢介秋澗集卷二欽定四庫全書秋澗集卷三元王惲撰五言古詩
