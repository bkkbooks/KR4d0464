body:
  text: 蘧大夫廟芒鞋兩自近闗行頗訝先生岀處輕道亟卷懐傷䘮亂仕因公飬辟尊榮輟車仿彿公門敬寡過依稀聖者清故國令名喬木老至今君子號鄉名苦雨吟禾頭生耳駭輪囷一雨霖霪近數旬蛙出故塘喧鼓吹蟻連封垤失君臣隂沉便恐陽烏慘飛舞争㸔石燕神寄謝碧雞坊裏客不煩羮釜怨生塵迎秋大暑回推酷吏休先聲傳喜到梧楸清商載路歌夷則白駱前驅候蓐收氣肅衮裳初復辟露清行殿拜凝旒若論成給功尤著不解詞臣九辨愁眀霽雷霆威霽雨初迴戰罷昆陽萬馬推成給嵗功真有望洗清天宇覺重開秋菌出木驚朝暮野水増波阻往來腰足痺頑欣一散約攜藜杖晚登臺箕子廟廟在汲郡刳剔忠良詫肉林當年愁絶父師心道傳未害奴為辱俗古方知化獨深上念聖湯思自獻下逢周武是知音野烟無地尋遺廟空咏芃芃麥秀吟挽梁防禦邦傑二首酒船茶竈栁溪烟把臂論交記昔年列郡剖符方再考銘旌埋玊便終天風纒大樹摧蘇廟雲黯歸魂近赫連四十三年成底事一抔慟絶九山前梁侯躍馬英妙年大冠修劍身傾然閉車過市殊不樂快意耳後抨驚弦朝吟醉卧石樓上暮歸射虎南山前聞説三城足遺愛令人空憶使君賢奉答彦正參議書問清晨庭鵲喜相呼薄暮敲門得素書地重毎愁屯􅓃䏰人來還喜駐清居煙開瘴嶺三軍壯氣壓巴江百戰餘一檄我知邉報静西南争識漢相如酒醒聞雪作呈陳侯隂雲低壓溼衡茅暖透衾裯地氣交縞色漸生眀月幌風聲先到碧筠梢誰家獵騎長圍去何處柴門向曉敲開嵗春風兩岐秀竚㸔晴浪際農郊至元四年嵗在丁卯暮春之初陪陳王二郡侯泛舟清水兼攜妓樂山圍牧野青未了河抱􅅠城勢轉雄髙㑹逺為開府設仙舟還許李膺同春光淡沲眀歌扇吹管飄蕭颺逺風鄭重使君雙皂盖月灘留醉恨匆匆風暖溪深夾岸花緩移蘭棹轉灘沙醉停杯酒清歌静看弄漁舟白日斜誰與浣花徴故事行觀春物到山家沙堤不用雙紅燭馬首歸時月有牙故事太守自正月廿日浣花止山迴路轉無多曲風軟舟輕恰數人汀樹弄晴供望眼岸花迎笑喜行春千年勝賞蘭臯在五郡謳吟使節新多謝恵風吹醉帽惺惺恰及到城闉寄王總管子初新築茅堂並水扉栁隂連接到漁磯平疇緑滿禾方秀髙樹凉多露未晞挾䇿不干丞相府入山終製芰荷衣故人好在龍津府書葉飄香吏事稀和節齋言懐詩韻元龍湖海見平生老我韜鈐未易兵格物志精先實學救時心切恥虚名風雲自是龍頭客吟笑空懐壠上耕袖裏驪珠三百顆毎從開宴得晶眀林塘秋晚躡足煙霄謝俊遊野人髙興在林丘近山欲雨先衣潤秋水増波拍岸流木葉静時存復理人心安處即天休隔溪田父治荒􅁾斜日疎煙滿樹頭卜築塢溪流水抱村斜林杪青山隔岸賒平日買田惟樂此他時成趣要移家溪邉種栁眠黄犢竹底開門繞白沙任使旁人呼漫浪雨簑無負釣魚槎送王子初總管奉詔北上聖代崇儒意匪輕徴車相望半諸生九天雨露思賢相十載經綸見老成更化有方先定制救時無驗是虚名煙霄未遂攀鱗志葵藿空懐向日誠簡寄楊治中文卿貳車沁水瞻髙駕簿領南臺有舊遊邂逅一樽淇上酒笑談千古庾南樓豐狐闖首藏三穴一鶚盤空健九秋聞道清源足佳景竹林烟雨夢西州上史丞相百揆端歸一相尊中臺潛隠北溟鯤人間桃李浄晴晝天上風雲擁㦸門駑蹇遇知思一顧家山回首惜空奔幸蒙翦拂長鳴去㑹有文章報至恩題相者訾同春野隠東過滄海翁醉吞秋日入心胸神機深探乾坤袐真氣曽驚户牖龍驢背老髯掀一笑春風歸路指三峰昂藏我似賔天鶴夢遶仙盤露影濃和髙麗參政李顯甫恩波如海際天隅一日京師識老蘇喜向巖廊瞻漢相疑隨仙仗聴嵩呼衣冠自是乗槎客文采還驚照乗珠共羨朝天蒙寵渥三韓秋色滿歸塗開平夏日言懐土屋甖燈板榻虚一缾一鉢似僧居半編翰草從人讀兩鬢霜華向曉梳客子衾裯殘夢短暑天風物暮秋初故園松菊荒多少豈不懐歸畏簡書郊送雲叟公寳鞍塵土滿香羅因送行臺振玊珂出郭快於鷹脱韝歸懐争奈鷇移窠夕陽眀處亂山淺碧草深時毳帳多自恨囊錐無利頴青雲臺閣半常何直中書省紫禁彤廷尺五天沉沉碧綺鎻秋煙鳳池波暖鏘鳴珮翰苑才疎愧昔賢人世好懐能㡬度風埃長路已三年緑隂好在西園樹辜負移牀聼晚蟬開平晚歸七月一日授翰職龍首堈邉野草深秋風灤水動歸心百年蓬巷開圭竇一日恩光照士林吟鬢有光浮鏡玊家書封喜認泥金料應曉月簾櫳底乾鵲飛來報好音弔竹三徑歸來已就荒更堪庭實歎云亡忩間月出思清影簾底風來憶細香便擬碧蘚留嘯詠恐應塵滓到膏肓未容分斸蒼苔破拄杖敲門有底忙和龎參軍雲卿詩韻萬事雲翻總釋然不禁哀樂近中年此身得處便為樂自㫁從今不問天最喜遇知傾底裏譬如食蜜味中邉吾鄉賴有諸卿在歸隠終期覔魯連送陳尚書經畧成都暫辭喉舌去籌邉調餉中間别有權拓境要當成算後務農思在訓兵先雪山已覺公來重玊壘休誇蜀險偏東北更㸔諸葛表春風晴霽錦江煙太原筆工李子昭許贈予雙筆久不見付作詩以問之子昭過晉喜新知雙筆親承逺見遺脱帽一從休老頴臨池㡬負躍蟠螭正煩筠管麄於臂細理毫鬃健作錐久向夢堂驚五彩貯雲含霧莫來遲聞諸軍飛渡鄂渚前次建康節駐長洲已浪傳鐡縆鎔冷瘴江煙膠舩浮海從南遁潢日行天總北旋牛後舉知非晉祚厯期應訂遇唐年至元天子如天覆莫遣虚陳坐榻氊秋日㑹牙城白雲樓讌行院使者及嘉定府新附諸校座中觀西山風雨望際煙霏溼翠屏雄風先作雨前聲鴻濛氣合先天境慘淡州迴得意兵凉吹逺隨悲管發壮懐還傍醉吟生三年畫㦸清香地慚愧終童繋越纓賦西域鸚鵡螺杯老月淪精射海波珠繩分秀貫神螺鷓斑清粉垂金薤鸚喙嫌寒縮翠窠樽出癭藤紋浪異瓢成椰子腹空皤飲餘疑與溪娘遇一笑相㸔發浩歌乙亥夏六月念四日西城即事馬上望姑山煙雨濃淡開闔有不可端倪者偶賦是詩以紀其竒觀云連山中㫁欎蒼陘全晉蟠紆未了青方訝野煙沉澗壑忽驅凉吹滿林坰天邉雨脚排銀竹物外仙家列畫屏擬是姑仙遊八表笑迴龍馭下滄溟挽翟器之八月十七日清晨夢翟君器之晤言者良久覺後賦此以悼魂而有靈恐當撃節也淡癖相㸔忽四年襟期樗散鄭家䖍𨽻書思入錕刀法畫品人推具眼禪滿壁滄洲驚絶筆一樽别酒是終天不須更聼山陽篴日暮懐人已慨然哭郝内翰奉使大河東滙杞連城之子南來器宇盈義契重於平昔友新文公與後來盟苦心問學唐韓愈全節歸來漢子卿十六年間成底事長編惟見使華名次楊子英詩韻十年芸閣想差肩曽侍紅雲尺五天幕府蓮波知幾泛麟臺勲業浩無邉劒埋古獄終衝斗玊藴藍田煖自煙留取胸中疎俊氣他年揮手障汾川題開封府後堂壁至元十三年被省院檄同開封尹陳侯試河南儒士四月十九日抵京授館開封後署相與握手話舊且及包范二公事業時予耳疾止酒談噱間暮雨大作連眀因述鄙語以奉一笑使軺南下入京華滿眼交親笑語譁共訝老螭蟠北海自憐賤子宿南衙闗河痛别襟期豁風雨翻空夜氣嘉負殺清樽三百爵胡牀相對㸔簷花投宿洧川驛時病耳話長不覺道途修馬轉河堤入宋樓時事未容談笑了故園誰遂去來休一天梅雨方初夏兩耳蟬聲已入秋最喜此行陪逸駕未妨吾道付滄洲許昌道中一雨長途送曉凉陌塵壓盡燕泥香醉歌金縷辭梁苑笑拍吟肩入潁昌人物消沉清議在風雲開閤野煙蒼應憐一片西河水空照行人兩鬢霜潁封人廟在宋樓鎮西三里古堤上至元十三年夏四月考試河南同陳節齋過其廟陳為索賦故有是作潁封遺廟枕髙墉窈窕丹青户牖空治道得人無國小孝心錫類與天通當年大隧融融樂此日喬林凛凛風總道茅焦賈餘勇從容難似片言功友人䘮馬老驥龎然燕色蒼今春常記逺乗将翻江風雨曽何夢伏櫪飢寒想備嘗既乏敝帷酬逸徳忍令銅鬲𦵏人腸玊鞭剪㫁春遊興驢背清吟要細償南陽府試院中作牙堂瀟灑敞晴疏薜荔墻深五畝居起敬對瞻元凱廟訂頑欣得鶴山書心非道義為充實身與乾坤恐自疎暮望城闉還一笑竿頭蚯餌引鰲魚寄李士觀拌醉清樽洗别顔我來君往轉悽然遥㸔漢水無三百不覿青揚已五年甕舞未收輸鬼笑候蟲多足反䕫憐義襟誰似張京兆早為吹嘘使北旋京兆謂張好古時在襄陽徴理錢榖等事南陽北城同陳節齋晚眺大野東豬楚塞遮清川西鶩抱城斜𤓰分鼎峙連三國地闊天開到一家丞相大名垂宇宙龎公髙節動雲霞千年事往空遺跡立遍殘陽數去鴉宛葉道中六合雲蒸一氣霾漫漫長路渇生埃詩從白雨眀邉得人在青山盡處來世路有機難預料劇談供笑不時開濟時賴有諸君在漢苑秋風愧不才次宿汝樓韻二首解却征鞍細履園月明深夜倚危闌㑹慳共惜飄零久必逺應憐話語殘尚友共尋佳樹傳逢辰不戴鵕鸃冠傾囊擲下驪珠頷依舊晶瑩照乗寒微雲河漢半晴隂夜景蕭森夢化成山色不隨喬木老月華偏對故人眀鶴緑露警清無寐蛙屬官居重有聲廊廟只今紛治具正容堅坐㸔昇平贈别按察王立夫二首時在洛陽試院作當年畫省憶同襟此日南來又盍簮夜雨喜成連榻夢秋霜尤見故人心義方外覺紛華逺話久中傾底裡深他日買田相約老兩椽茆屋共雲林眼中機括審時張事外論量見直方白璧不酬金屑璧烏霜能䕶豸冠霜煙花紫禁期推轂風雨南州夢對牀更就信陵陵上月一樽分手上河梁留别節齋公因次嚴韻雨露乾坤不少私至人出處與同期松筠氷雪有定操人物江山見一時着手正便捫蝨話㸔雲難受絡頭絲平生慕藺公應識秋水長河有令姿夜宿朝元閣下禁垣樓觀天中央星斗拱列靈壇蒼月中清露翻碧瓦殿角泠風摇玊鐺炎歊似殺赤縹怒霧雨漫成𤣥豹章時考試儒士於此故云長纓土滿未容濯金溝泛曉空蒼凉挽吕權漕子謙維至元十年嵗癸酉夏六月闕日江淮都轉運使幕官吕公終於私第之正寢享年六十五越明年春二月東平尹信𢎞毅自衛過晉始知公墓草已宿嗚呼哀哉公諱遜字子謙系出東平望族父松金詞賦進士第官至隰州刺史興定問城䧟死節公其次子也為人疎直愷悌樂道人善早嵗有賦聲生平喜作詩格律精嚴長於七言近體或有問須盡吐乃已然如法家㫁案不絲髪貸問者知所趣居漕府㡬十年良謀黙計便公私為多某辱知最厚悼斯文之不幸痛知已之難遇非歌詩無以攄予衷也乃作是詩告公墓左魂而有靈鍳茲誠悃其辭曰凌烟詞氣吕衡州一語神交二十秋漕府議髙推獨步詞壇吟苦入冥搜眼中耆宿有今日地下周馮是舊遊秋草滿丘新吕道未容車過淚先流臨武堂宴醉後有懐省臺諸公桂月流光雪滿臺月明人影兩徘徊行雲不逐歌塵散往事還隨去鴈哀雙鬢入秋無可白寸心於世未全灰遥憐紅藥堦前客玊樹相依一笑開簡寄陳節齋别來碧海三山客偶得新詩慰逺情晝接夜談懐鄧鄙風荷煙栁夢都城好翻故里三千牘且按秋風九萬程最喜新凉換炎暑梁王臺上月孤眀鞫餘望月東臺即事崕陴詰屈張煩疴老樹遺臺悵獨過山色滿樓簾影簿栁隂横治鳥聲多兩河蓄潤開東雍千古秋風動漢歌誰著梗陽人有獄鬢華尤比向來皤日用萬彚何能臭味同洪纎强梗貴沖融屹於砥柱標天險淡似浮雲度太空意㦯近私隨有礙事因無已即成功莫将此理求諸逺總在平時日用中送王丈子夀南下河中白髪今年八十過故園歸興足蹉跎啟期三樂人争仰汲直髙風古所多照眼闗河増喜色過門香火盡行窩後期望嶽棲岩上一笑雲煙入浩歌郝提舉子某至元八年冬見於京師楊氏書院與之語温醇有禮愉色睟然意謂奉身周謹篤於其親者也今年春予官平陽一日介吳君子眀來謁具道郝南還之事相與撃節嘉歎久之噫方衰俗頽波中其孝飬有如此者孰謂曽閔之門和樂之氣有時而息邪此心不匱豈特錫類而已哉故傳曰惟孝友於兄弟施於有政其是之謂歟喜為賦詩以贈且廣其敬飬致樂之心色難無違之㫖云古稱百行孝為先就飬辭榮事更賢戀戀庭闈心向切依依親眼望來穿蓼莪報徳歌周雅令伯陳情感母年衰俗陵遲有如此見渠福禄日綿綿白樓晚眺條山東峙畫屏開樓外長河一線來簷瓦蘸波鴛夢渚鏡奩空影月臨臺千年事往情如昨滿目春傷恨未裁更著野花留寳靨女墻隨意㸃晴苔洪洞道中送客回有懐子初舍人親朋零落故人稀白首相望天一涯花底夢歸連夜酒栁邉情在送行詩賞心嵗月能多日人物江山又一時許國壮心雖未老向人孤抱欲誰知公堂即事雁鶩行趨日出前潭潭槐府静秋烟漁陽摻急三撾後簿領山如萬慮旋圗報每虞遺少愧焦勞何敢獨稱賢更堪清畏堂中夢夜夜歸心到日邉清畏自榜寓居堂名和周録事感春詩韻微官休苦日奔忙須信行藏在彼蒼心計自憐嘗越膽鬢花何計避呉霜暫容巾挂三花樹任使聲喧百鳥塲昨日平湖湖上過緑波如縠要浮觴夏縣道中溼雲壓樹際岡平溽暑還因小雨增官事困人如縛虎秋風吹野夢翻鷹趨時未必儒冠誤並隠端為野鶴憎遥憶筠溪亭下水萬竿蒼雪照吟燈題聞喜廟學古柏世傳清廟聖湯墟老柏環除十六株黛色青煙千古上石根銅榦百城無虬龍閱世蒼髯磔疎影凌歊冷翠鋪眄汝自慙詩禮客摩挲三向孔庭趨送張子文驛送戈甲前赴成都子文雲中人至元八年冬相識於大都李𤣥暉南菴吟君一軸餞行詩西望峨嵋有所思山險不憂巴道路雨多防溼漢旌旗雄邉有策堪回奏諭蜀能文正及時儻見總戎煩告語雪山輕重有謀為總戎渭彦清軍帥寄送朱信卿還吏部故都喬木已蒼烟朱翼城人故都謂翼唐叔故都也玉樹臨風照眼鮮暫着印窠封瑞錦要從鞭箠㸔流錢燕山夜月縈歸思平水春風夢别筵不得一杯光祖道汾岡回首轉悽然霍岳道中郡僚招致逺相過冒雨乗登荷笠筤比入廟宫三渡水再尋蘭若重攀蘿傍山凉早疑秋近碎澗溪喧覺雨多庭下古碑堪晤語倚餘笻杖更摩挲謂劉神州修岳洞碑霍邑懐古堂堂義幟下并門六合風雲已併吞軟甲不憂三日雨妖氛唯厭兩都昏緬懐戍火城頭語死愧忠精地下魂謂宋老生也慘淡鑾鈴原上月至今英氣凛生存送周録事幹臣任满赴都青衫白髪老參軍銀管聊鋪兩考勲公吏檢身知禮度兒童争語説清勤春官吏選多書最祖帳東門惜重分匣劒莫将塵自翳諌章論草要新文送漢臣張弟青青衿珮讀書郎邂逅姑汾意叵量老大正深鄉國念飛翔不負少年場行沾紅藥堦前路夢到秋風豸角霜此去固當强不息更須人事卜行藏夀趙祕監輔之時奉使日本回西歸京兆報國心丹氣益振一帆直徹海東垠三年契濶中朝客百險歸來萬里身曠古使華清議在照人精彩夀毫新終當清淺蓬萊水經制金華要老臣陳季淵挽章三首至元十年十二月望陳季淵子次翁道出平陽以其父季淵喪來告且請詩哀挽故勉為賦此筆頭詩話硬盤空詩自工來老更窮玉斧驚傳修月手旦評推絶斫雲翁幽穿洞穴愁山鬼壯極秋濤駕􅄓風千古杜陵原上月一丘分照渭城東大駕西廵始拜公從容樽酒兩都同杖歸河朔忠尤壯詩到秦州氣更雄蓮府晴波竒策在杜陵殘月草堂空傳家儘慰元龍望湖海諸郎有父風憶扈龍旂狩蜀年渡江詩並選鋒先江花冷墮波神泣醉袖來披玉井蓮已訝羽淵淪老月遽教風骨閟重泉緬懐春草池塘興雨夜分眀夢恵連挽殷僉事獻臣扶病南來喜盍簮激揚似為失前禽氣衝豸角空餘烈響絶朱絃得好音一節儘髙完璧事百年誰了盖棺心醉魂不到黄壚夜夢繞三山碧海深微恙蒲團倚煖病維摩春满晴窓氣未和兀坐暫容心境静好懐安得故人過鐵花鏥澀青萍暗世事栽培白髪多却喜郡人相説似春風門巷雀堪羅至元十一年嵗在甲戌上已日㑹府倅張侯眀卿治中呼英甫總判張行甫禊飲於晉源鄉蘭莊刁氏之醒心亭張侯行甫之子思誠息翁孺侍讌禊飲蘭亭不可尋蘭莊山水儘清音楊花糝雪溪流碧野卉留香竹樹深暫脱帕車三日婦却憐時序百年心一樽恰趂芳時醉明日池塘是緑隂次日奉命簽南征新軍中外騷然者數月送郭案牘彦實東西南北送行頻長路青山輾欲塵蓮府有聲推雅望栁條無計絆行人緑波未要傷春浦白璧難酧入幕賔後夜月眀川口道夢歸先到晉溪春洛陽懐古重城繚繞枕邙腰二水交纒㑹洛橋勢即土中多漢制錦圍林苑訝隋妖山川開闔悲今昔陵谷更遷失市朝萬古消沉竟何有總成閒話付漁樵逰澤州青蓮寺知州事皇甫琰薰風吹雨不沾衣馬趂清凉入翠微硤石兩楹天斧㫁好山四面畫屏圍我來勝地清心地僧説禪機與教機剰有文章賢判府徘徊登眺久忘歸斜分一逕下林巒金碧觚稜紫翠間羣嶺秀攅青菡萏孤峯突出玉湖山鑿開一握乾坤小占㫁千年日月閒浩浩兵塵满河朔天風吹不到禪闗和前韻盤盤石磴轉層巒寺隠青蓮六葉間天削㫁崖開老硤雨将空翠繪蒼山偶因戎治終朝畢暫得僧窓半日閒清曉出山還一笑㡬時塵事不相闗覧勝都忘帯葛衣溪風吹雨散霏微霞眀殿脚金千界雲抱山腰玉一圍林壑有靈憐俗駕人心無路息危機風流幸對文章守安得岩棲不更歸夜過闗嶺山山行四月似凉秋夜半摇鞭下嶺頭心苦自憐嘗越膽歌長不用換吳鈎風煙動色開中鎮禾稼連雲際四州碌碌一官成底事春風歸夢仲宣樓虞鄉道中中條如畫色蒼蒼過雨晴嵐帯夕光望入王官饒水竹路經虞坂足耕桑未容岩桂相招隠自笑微官有底忙多謝曉風驅暑退笠簷吹作馬頭凉謁王官谷唐司空表聖祠堂人去空山草木香撐霆非為漢文章三休方擬遺身累一債應憐為國亡明月不汚黄浪濁清風髙並首陽芳满斟三詔亭前水拜乞襟靈滌肺腸慶路伯達八秩之夀素髪酡顔八十春昇平人物典刑存兩都喬木秋光老四座春風笑語温膝下盡歡衣有綵人間無似夀為尊試從九老圗中㸔獨覺光榮萃潞門為鄉人夀壮年虎穴喜竒探老去幽潛一道龕倚杖㸔雲追往事閉門留客了𤣥談開元氣欎丹浮頰鬒髪雲如緑满簮今嵗夀堂春色好一簾空翠撲晴嵐秋澗集卷十五欽定四庫全書秋澗集卷十六元王惲撰七言律詩夀總
