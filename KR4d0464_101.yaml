body:
  text: 授翰林修撰王惲行已無忝博學能文顧超絶之逸材足鋪張於偉績冝司綸命以賛皇猷可特授翰林修撰同知制誥兼國史院編修官當振斯文以宣朕命封謚制曰文章與時髙下陋乎宋而追乎唐人材隨世汚隆尊其官而羙其謚僉謂賁戔之信度大兹渙號以楊庭故翰林學士中奉大夫知制誥同修國史王惲慱學修能雄文逸氣五持憲節誅鉏吏弊而翼植民彛三入詞林敷潤皇猷而表章帝典進承華之昭鑑恢儲聖之良規勸其遺書蓋抱經綸之志詢夫成績豈徒黼黻之才惟治朝蓍蔡之是稽繄晚生斗山之所仰式遄歸而請老遽興歎於云亡睠彼壽耆議斯節惠於戯有斐君子何盛徳之可忘無競維人尚𥙿昆之克紹肸蠁巳朕魂魄猶強可贈翰林學士承㫖資善大夫追封太原郡謚文定主者皇帝聖㫖裏中書省御史臺呈據監察御史呈切見故翰林學士秋澗王文定公文才愽雅識見老成廼中州之名士也頃在翰林曁居臺察觀其因事匡時立言傳丗未甞不以致君澤民爲心端本澄源是務進呈承華事略蒙𥙿宗皇帝嘉納俾諸皇孫傳勸弘益良多近日又蒙聖上特命張司農等再行繪冩以賜東宫若非深有可取豈能如是哉即係兩朝御覧珎重文集又有元貞守成事鑑中堂事記烏臺筆𥙷玉堂嘉話并其餘雜著光明正大雅健雄深皆出於仁義道徳之奥禆益政務百関風教足爲一代之偉觀故追贈制詞有云觀其遺書蓋抱經綸之志詢夫成迹豈徒黼黻之才惟先朝蓍蔡之是稽繄後生斗山之所仰其子太常禮儀院司直公孺編類成書計一百卷字幾百萬家貧不能播刋無以副中外願見之心翰林國史院已甞爲言未蒙定奪若依祕書少監楊桓六書統郝奉使文集例具呈都省移咨江浙或江西行省於學田子粒錢内刋行昭布諸路學校以示後進非惟儒風有所激勵實彰聖朝崇儒之盛事也具呈照詳得此送據禮部呈照到郝文忠公例著述陵川文集一十八冊三國志三十冊巳經具呈都省於江南行省所轄儒學錢粮多處就便刋行去訖本部議得翰林學士王秋澗文集合准監察御史所言比依郝文忠公例移咨江浙行省於儒學錢粮内就便刋行相應具呈照詳得此照得郝文忠公文集巳咨江西行省委官提調如法刋畢各印二十部裝褙完備咨來去訖今據見呈今將秋澗王文定公文集隨此發去都省合行移咨請照驗依上施行湏至咨者右咨江浙行中書省王翰林文集年月日諸賢慶壽哀挽詩并序壽七十詩卷序翰林學士知制誥同修國史秋澗王公自文聲予方弱冠時人有持公詩文至東平者子讀之以未及識面爲恨中統建元始遂願見未幾被召至京師時一款接情相好也旣而予求養成契闊至元十二年予應奉翰林文字復嵗公入爲待制玉堂多暇日得考古論文知其所未知聞其所未聞爲樂可勝旣哉予賦分凉薄公尋又舎去出貳提刑按察雖聲問數相及十五年間僅一再㑹晤迨予移疾返鄊里而公膺璽書之召予亦蒙誤恩趣還寓舎頗相逺自非公集率不得相過用惘然公長予六年今平頭七十神明不襄事理至精熟下筆作文不减平昔至其論古今利害援引據有條不紊毎賔友期集未甞後約而至歩履輕便不事杖䇿行且曵之而鏗然作聲院屬聞之知爲公矣少日多飲酒近歲浸復不喜遇良辰嘉㑹驩得意適猶能滿引舉白至數杯不亂子賢孫孝以學問丗其家晚景㤗然順適所欲夀祉方隆未有涯也予著作公孺置酒爲具稱觴上慶諸公例作詩稱頌予謂公孺言七秩之壽未足爲君家公賀也申公􅈾束帛之招䘙武公作詩箴警之曰㑹當副士林之望是席也㱠爲賛詠張本云元貞二年夏五月東平李謙序詩閻承㫖七十人生福壽隆耆英纔入畫圖中耆英㑹七十方入静吟秋澗雲泉緑安歩花磚暁日紅玉樹芝蘭方秀發詞源筆力愈清雄鹿庵慎獨傳芳派㑹見遐齡繼兩公王瓠山文衡始字文康公敬齋鹿庵聲望隆共城三王稍後出秋澗早直蓬萊宫升華屢赴延英召下筆咸推言語妙邊臣獎諭相臣麻百粤三韓同荅詔烏臺𥘉立公選掄輟之持憲材益伸宗祐不嚴考工罪忠言亹亹逹楓宸繡衣山東又河北民不媮浮吏姦戢累牋進上青宫圖玉𥙿淵冲垂典則出處平生唯自足使節何堪上閩蜀搜窮學海思遒贍練多世事機圎熟天朝養賢恩禮殊中統而後元貞𥘉東門賜金開祖幄西園束帛隨徴書重來地尊年未老積行弸中外敷藻鈎深輯略手編研謹而月之仍細考共山不煩頻勒移耆英今日非公誰九十司徒昔甞有康強七十歸豈冝晚生幸際扶摇便前軰風流親接見中州元氣三數公介壽同饗公堂燕楊損齋方平家世有公賢三壽纔行七十年秋澗未容歸舊隱瀛洲方且㑹群仙向來政事流遺愛此去文章論正傳我幸巷南瞻巷北時時訪問得周旋陳北山秋澗仙翁年七十五色筆頭百鈞力應龍淵潜忽天飛白日湧雲轟靂靂湏臾雨止風亦霽萬頃淪漪舞秋碧真書透𥿄錐畫沙行草入神綰驚蛇胷中政有不平事搦管一掃無邊涯平生六籍不去手刋落枝葉收菁華世無公是有公器跳出百家成一家癸巳之秋皆赴召晚生何堪從諸老長楊館裏共瞻天承明廬中同視草别公南去五閱春邇來拜公情更親公雖引年乞謝事看公神觀老益振當年上壽客滿座奉觴迭起爲公賀犀軸綺語光陸離𥿄尾挂名惜欠我八十行及李東軒九十㑹到鹿菴年願從期頥數滿千我亦預備長生篇王鹿泉蚤歲聲華便軼群學擾不輟向來勤兩宫垂顧逢千載三世讀書萃一門蘭省柏臺留讜論玉堂金馬愌雄文平頭七十無多賀㑹見諸孫子又孫故翰林學士秋澗王公哀挽詩序内翰秋澗公謝事之明年終命於家春秋七十八寔大德甲辰六月辛丑也儼聞之悼心失圖彌日曩自幼挹公盛名知衞有三王與吾魯有四傑並甞求其所爲文諷誦之愛其氣格雄㧞不窘近世繩尺毎以不獲樞衣趍隅一問津焉爲疇昔恨旣而公提憲山東按部過鄆始遂一拜履絇輙辱折行軰以待聽其論說古今文字淵淵浩浩有源有委如法家議獄絲髮不少貸一歸公是而止使人胷中之滓都盡嚮來瓣香於是爲贈爾後參商相望瞻拜弗獲徒有江空歲年晚之歎壬辰同𬒳召詣公車入見世祖皇帝于上林苑癸巳又同拜北扉之命甲午抑又同在史局纂修世祖皇帝實録幸哉日得聆謦欬備准諾惠教弘多尋儼移病歸及再入奉常公巳登七秩矣乃出諸名勝賀章見示且命追𥙷前作爲賦七言長句公過爲激賞辛丑拜章引年甚力朝議以公三朝耆宿特命進秩二品且授子公孺鄊郡府推以便養仍官孫笴祕書郎以寵其歸恩至渥也比哀問至京師縉紳之流皆失聲相謂曰玉堂東觀寕復有此翁邪往住見諸哀誄是則哀生文邪文生哀邪詞之有七哀八哀豈容巳邪一日公孺走書需予引篇首儼以公宏才碩學揚歷清華殆四十年其事業顯顯着人耳目之表庸何俟贅言哉惟公嗜古力學凢所未見書訪求百至必手爲謄冩老大尤篤視盛孝章爲無讓平生詩文幾四千篇雜志緫八十卷方易簀始停筆其勤可謂至矣其振耀來世宜矣嗚呼儼從大人先生游能幾時乙未紫山胡公卒丙申苦齋雷公卒祗惟公一个焉今又卒嗟後生小子於何考德問業焉少陵所謂長嘯宇宙間髙才日凌替豈不重可哀邪廼擬楚騷之亂以抒余哀其詞曰太行壁天兮横亘坤維篤生偉人兮企其齊而鞭赤龍兮駕白霓凌倒景兮㓕没其可追䟽决雲漢兮黼黻明時渾渾灝灝兮孰闚端倪雄咮一鳴兮喑萬溘塵埃野馬之一瞬兮浩江河之獨馳嗟形蛻而神往兮逝者如斯與造物者爲徒兮萬萬古猶一朞大冠如箕兮珮玉陸離耿音容之在目兮眇一去而不復來叶顧四方上下安所止兮雖巫陽九招竟奚爲諒冥冥或昭昭兮知邪弗知哀鐸有詞兮尚以聲吾悲陳儼歛祍端拜學與天淵慱名隨事業新文章早無敵字畫晚逾神冥躅追前哲遺芳澤後人獨憐秋澗月猶照玉堂春劉敏中斂祍書司馬凌雲氣逼真廣川精學道爲隣文章舘閣三朝舊冨貴児孫八十春醴酒常存沾講舌内帑特賜表詞臣歸來勘破浮生夢白玉樓成筆愈神劉愻頓首上文章字畫世争傳四海飛聲自早年冠豸一方騘馬使腰犀二品玉堂仙承家素學児孫貴謝事清朝壽福全零落山丘懐謝傅西州門道獨澘然王徳淵載拜儒林冝有傳汗竹藹餘青筆陳如飛電詞源若建瓴方登群玉府遽憶湧金亭欲扣平生學撞鍾愧寸莛疇昔聞淇上三王藉有聲共推天下士獨擅斗南名吾道光昭代斯文属老成玉堂佳話在一讀一傷情中統文明治都司政事堂寵分鰲禁燭名重栢臺霜空谷藏遺藁餘哀寄挽章鳳毛今有子染翰侍君王劉𢋫瓣香書上嗟哉秋澗公立志恒矯矯文章尤苦心傑出千仭表公之筮仕初庻務猶草草毎以正自期臨事無大小閩中憲節回淇上風煙好徴書下九天鑾坡湏故老一旦幡然歸群情惜其早餘慶及後裔心事粗能了生平英靈氣因風人冥杳明月太行顛詩名同皎皎王約頓首德業中朝望文章蓋代名誨人循善誘接物極推誠春露傳家記洄溪别墅銘殁寕無少恨三世荷恩榮表弟韓從益再拜縱横筆陣知無敵如將升壇拜韓白先登劘壘特勇夫投石翹関乏風格黄金端可鑄鴟夷坐困強呉覇全越文埸自有萬人英豈尚虚浮棄真實唐興継代重詞科往往篇章見家集世衰䑕尾競喧啾天下幾人能事畢王公才敵異徹侯悄焉夜壑藏虚舟倐焉有力負之去不譲横槊劉并州勢如偃屋建瓴水熟如平地馳輕輈味如調羮夏鼎臠温如器琢崑山璆平生無意修邊幅丈室凝塵勝華屋詩腸耿耿少陵心經笥便便孝先腹豸冠繡斧滌源清視草判花隨意足南歸郷里未揮金寂寞荒阡竟埋玉獨存秋澗大全文來者相傳誦芬馥至大改元春三月望日洛客暢師文再拜束髪躭經晚益勤平生精力盡斯文先朝十老今餘幾當代三王獨數君李賀屡煩韓愈駕羊曇空阻謝安墳玉堂寥索人何在落日淇川滿白雲濟南張飬浩拜手大元故翰林學士中奉大夫知制誥同修國史贈學士承㫖資善大夫追封太原郡公謚文定王公神道碑銘并序皇慶壬子歲朝廷推恩舊學贈先考中奉府君翰林學士承㫖資善大夫追封太原郡公謚文定先妣推氏追封太原郡夫人眷恤隆渥上及二代明年春正月丙午焚黄祭告寵賁松檟越王氏有煒是用追述先公立身行道致兹顯揚者敢昭告于神道先公諱惲字仲謀世家于衛曾祖諱經隠居讀書郷黨化其徳謚文元先生曽祖妣吕氏臨清大家祖父諱宇亡金衛州刑曹孔目官精於文法官敦武校尉用公貴贈集賢侍讀學士太中大夫追封太原郡侯謚敏懿祖妣孟氏韓氏並追封太原郡夫人顯考諱天澤資剛明决科律學魁多士亡金忠顯校尉户部王事中年折節讀書務教子起宗所交皆海内名士易名文通先生用公貴贈正奉大夫大司農卿追封太原郡公謚莊靖顯妣靳氏追封太原郡夫人先公㓜有至性勤學好問若飢渇然弱冠受教於鹿庵王公詩文字畫巳有聲紫陽遺山一見爲指授所業期以國士楊西菴曹南湖髙吏部徒單顒軒愛其材器折行軰與交極口爲延譽中統建元左丞姚公宣慰東平辟充詳議官尋𬒳中書召特授翰林修撰同知制誥兼修國史院編修官制詞有行已無玷愽學能文顧超絶之逸才足鋪張於偉績之㫖士論榮耀焉一時詔制辭命皆出其手共稱敏瞻既而兼中書省左司都事建言曰廟堂出治之源今機務草創當究其本末先後酌而行之允焉遇事詳處得冝同列許其眀逹至元五年肇立御史臺首拜監察御史獻書曰憲臺執法紏正邪枉今無法可守取人無路冝講法制以立紀綱設科舉以取人材體用旣明朝廷不勞而肅矣憲寮爲首前後申明典制彈劾姦邪凢一百五十餘章竊直敢言不畏強禦於政體多所裨益如劾劉都水怙勢作姦䧟公儲四十萬石權貴爲側目九年陞授承直郎平陽路緫管府判官晋大府也先是吏風盛民嚚於訟公用誠敬待官長威嚴肅吏屬作勸諭文二一則勉飭州縣革弊勤政一則諄告百姓務本畏法致吏民感化奉約束惟謹歷二考如一日絳兵卒陳姓者殺同産兄社獄因鬻緩逮繫者三百餘人延滯至五年之乆逺近爲憤惋省檄鞠問廉得實跡一問即服時晋絳乆旱是夕大雨霑足咸謂伸理冤抑所致各路設辦課官例分門下平陽所轄院務幾百按籍點差終任不易藩府採姑射山文石藉夫匠力闢山蹊爲坦途者六十里西山伏利由之而出土人刻石紀其事大起府學敦勉師生傳授暇率吏屬聽講風俗爲一丕變又復囬車嶺孔子廟首陽山二賢祠修建廨傳逓鋪以間計者千數増户餘三千敕使過晉者以政績上聞至蒙奉公勤政之諭十三年奉命同陳節齋考試河南五路儒士語於陳曰吾道如綫不冝用平時取法凢就試者皆以通文學第之十四年授翰林待制奉訓大夫鹿菴大學方執文衡屢稱其文章精妙眀年秋選授朝列大夫河北河南道提刑按察副使改除燕南秩競移山東東西道先公之任風憲甞諗僚屬監司職在繩愆紏繆肅清政務惟自治而後可以治人又憲府非有錢榖詞訟之繁特明大體布公道事當熟議極乎中正方可服衆惟克已自勵故按治州郡褰帷具瞻有風動百城之目部内府尹恃占名鷹房恣爲不法公納賄賂莫敢誰何即按劾罪狀以聞蒙杖而黜焉憲臺徧諭諸道逺近為肅然兾州監從人因造作掊衆利甚夥與監逸去事白曰行司廵歷動經歲時俟獲而治則姦人得計矣質其田宅償其民南宫弭筆者號尹庫因告訐曽蒙賞賚沮嚇官府肆㓙侔利或言其擅殺耕牛歷數奸惡痛校之而死萬口稱快又辨釋徳平民劉氏疑獄一十八年除行臺治書侍御史下赴進承華事略於東宫廣孝立愛端本類二十篇採古儲貳善事前有圗後断以已意蒙𥙿皇徧覧稱善賜酒有極用心纂述之諭令諸皇孫傳觀宫寮稱其弘益良多聖上命近臣繪冩以賜東宫二十二年奏充中書省左司郎中屢趣不應時小臣盧以理財用事或問其故曰力小任重剥衆利巳未見能乆者可近乎旣而果敗衆服其識先而有守卄六年授少中大夫福建閩海道提刑按察使甌閩僻在海隅歸附後官貪民殘奄爲盗區黜尤貪惡者數十人乃上章彈劾行省官非其人冝選文武備具有籌䇿大臣矯正枉濫肅清邊陲則民心服而㓂盗息巨賊鍾眀亮嘯聚洪閩郊東繫則西逸西逐則東奔彼此玩冦師老無功乃請立主帥專號令朝廷允焉賊果潰㓕卄七年以疾得告北歸卄八年朝廷以耆宿來徴明年二月謁見丗祖皇帝於柳林行宫蒙慰諭义之継上萬言書條陳時政一曰議憲章以一政體二曰定制度以抑奢僣三曰節浮費以豐財用四曰慎名爵以攬威權五曰重廉司以勵庻官六曰議保舉以覈名實七曰設科舉以収人材八曰試吏貟以清政務九曰恤兵民以固邦本十曰復常平以廣蓄積十一曰開屯田以息逺餉十二曰息逺略以撫巳有十三曰感和氣以銷水旱十四曰崇教化以厚風俗十五曰减行院以一調遣十六日絶交貢以示曠度上嘉納焉授翰林學士嘉議大夫與議政事凢預庭議知無不言成宗嗣位獻守成事鑑曰敬天法祖愛民恤兵凢十五篇逐事直說本諸經㫖侍臣謂純正親切有魏文貞司馬端明之風元貞改元加通議知制誥同修國史纂修丗祖實録作表進呈及封謚除拜大典冊皆經定撰大徳元年進中奉明年戊戌春以三朝舊臣賜楮幣萬緍其年七十請老不許五年再上章懇請除公孺自祕著司刑鄊郡以便侍養仍官孫笴祕書郎榮其歸方優游鄊里樂遂安閑不幸於大德甲辰歲六月辛丑以疾薨於私第正寢之春露堂享年七十有八越九月已酉葬河西里之先塋夫人推氏祔焉送葬餘萬人及四方來弔祭者哭皆失聲曰五百年那復生此公耶先妣共城人尚醫推公季女資婉順事舅姑睦婣親以孝敬聞先公所得俸給均之家人惟恐失所若稍越規矩即治之如法故皆恱服而不敢犯女侍生二子善加撫育無異已出内助力爲多先十八年卒生子公孺奉議大夫知頴州事孫三笴朝列大夫中書刑部郎官次詵詵侃侃尚㓜女孫二長適昭文館大學士耶律伯強子著作郎楷次適寗氏子重孫五男漢璋德璋潤璋女二皆幼庻子二公儀廕授承務郎同知磁州事公説衞輝路儒學學正生子瑣住先公資明敏正大材器英邁操行純古慱學有經濟器業與人交樂易直諒不能詭隨與時俯仰常曰士當行其所學明義逹道一以至誠將之窮逹得失有不在巳者當官持重有體守正奉公表表欲見於丗故所至有聲遇不平事及惡之可疾者憤然必窮治廼巳官清要四十年自奉如寒士平生篤於禮義視勢利蔑如藩國丗子且貴顯於朝招翰林諸公讌集私覿禮衆議未一曰禮上國卿當下國君遂平揖而巳省掾趙和之病疽迎毉救視没爲殯歛以行橐付其家友人周曲山能官至廉卒無以葬營治至成禮南官劉文卿善數學客死于衛旣周其䘮妻少嚢珎具甚冨求一室相依以禮謝去其廉正類此少與西溪春山友善時目曰淇上三王别號秋澗晚莭名德俱重爲丗尊仰不穪姓字但曰秋澗公作爲文章不蹈襲前人要自肺腹中流出平居談話無異於人及操觚染翰經㫖之義理史傳之鋪陳子集之英華古今體制間見疊岀雄深雅徤辝古而意不晦以自得有用爲主冝乎綰持文柄獨歩一時字畫遒婉以魯公爲正所書卷帖爲世珎玩樂教掖後進明義理工文章必盡所得又善因材致篤故藉之多顯逹者自少至老未甞一日不學易簀方停筆平昔著相鑑五十卷汲郡志十五卷其承華事略守成事鑑中堂事記烏臺筆𥙷玉堂嘉話賦頌詔誥表啓書䟽詩文碑誌銘賛樂府號秋澗大全文集者一百卷延祐六年蒙朝廷公議爲之刋播焉冨哉言乎其勤篤至矣其振耀後丗冝矣至於論列時務利害互明得失兼著忠愛情切聞一事可行一士可用必爲建白雖未盡行後竟如所言較其藴奥見諸行事者纔十之二三故贈謚制詞有觀其遺書蓋抱經綸之志詢夫成蹟豈特黼黻之材惟治朝蓍蔡之是稽繄晚生山斗之所仰蓋公論云敢用是爲銘辭曰士惟有立德功與言能一於此不朽者存顯允先公睠兹克勤䇿勲學海力振斯文擴我浩氣塞乎乾坤手抉雲漢大放辝源鴻文大冊帝載昭宣人所共知方駕昔賢紹韓歐之宗派得文章之正傳臣時禆政人有未知志存經濟惟日孜孜拜章奏記罔或少遺有物禁訶百纔幾施時耶命耶而止於斯載瞻遺藁爲世蓍龜山斗聞望後學仰規内相羙謚恤典恩推見諸行事功止一時著書傳後千古是希孰得孰失必能辨之又何俟曠丗相感則吾道爲庻幾用是昭告神寕無疑大行峻極清泉漣漪淵峙無窮永照豐碑嗣子公孺撰
