body:
  text: 記傳國玉璽記粵皇王肇興必有靈貺自甄董生所謂天之所大奉使之有非人力所能致而自至者此則受命之符如龜圗龍馬火烏之類是也三代而下視符寶為重以守以傳體用大著維大元至元三十一年甲午春正月辛已御史中丞臣崔或聞故太師國王孫通政院倅拾得家以窶甚出櫝玉託憲臺象胥闊闊出者沽諸市以物制非常竟不售令取而視之乃黝玉寶符其方四寸螭紐交蟠四可邊際中洞橫竅其篆畫作蟲鳥魚龍之狀即召御史裏行臣楊桓辨其刻文曰此先秦以藍田璵追琢受命璽也臣彧即持詣宫府介鎮國上將軍都指揮使詹事丞臣王慶端通謁投進皇妃御前玉音慰諭賜弊各有差翼日二月壬午朔金紫光祿大夫中書右丞相臣完澤等率翰林集賢兩院學士凡十有一人詣宿閣入賀有間皇太妃命出斯寶賜諸臣傳觀精彩景氣光動宫閣翰林承旨董文用等相與稱説曰斯璽也自秦迄今千六百餘載中間顯晦固為不常今者方皇太孫嗣服之際弗先弗後適當其時而出此最可重者蒙宣勸而退臣惲復考其近而明見者按金集禮云玉璽一十五面俱得之于宋內受天璽者宋紹聖間淂之咸陽段氏當時命禮部翰林太常寺官考驗實係漢前傳璽遂以禮祗受金亡莫究其所在今之所進其文章制度玉色校集禮所載即此璽也昔晉見麟璽于江左唐淂賜寶于崔侁事出惝恍傳疑後人元帝猶藉之以中興代宗尚因之而紀號俱未若斯璽實前代有天下者之鎮寶應運呈瑞不涉誕妄非人力所致而一旦自至意者上天申佑奉而大之赫為新朝受命貞符昭昭矣抑表夫曆數斯在開邦家無疆之休者光賁前古矣稽首嘉歎於皇盛哉臣惲自惟職叨詞館獲覩非常老眼增明不為不幸可無文于後遂綴緝本末用紀大瑞翰林學士嘉議大夫臣王惲堇記𬞞軒記并銘安君世有雲中人父善甫亦佳士世有前進士舜臣李公門情性姿善淑言貌謙撝早歲讀書不樂仕進壬辰後徙家大燕今居文明東里有宅一區軒楹外隙地寬間分畦種𬞞日以為樂友人過而以𬞞名軒既次祕監新泉即楊武子篆其扁又求秋澗野老明其心因為之説曰貧家𬞞食當米秉之半此正詩書為業𬞞淡自娛者也傳有之穀不熟曰飢菜不熟曰饉我有旨蓄亦以御冬𬞞之為用夫豈小輔者哉然夫子以吾不如老圃辭而闢須者何蓋君子為學志其大者逺者遲逰聖人之門以是焉為請矣其志之所尚故也大要士之處卋隨其窮逹本末先後為淂昔汪氏以人嘗咬淂菜根百事可做胡康侯為之擊節歎賞謂大夫士不可使不知其味斯民不可使有此色此固大人之事但二公為之一轉語耳又比年耒士夫例有别號未免封已飬髙鮮不以清美自衒如以終南為捷徑指少室而索髙價者往往有之恬不為怪至于飰疏飲水曲肱自樂庶幾顔氏克巳之功將何不可者哉于是書以為記乃為之歌曰翻翻庭􅉡雨露濡兮秋髙氣嚴碧雲腴兮夕掇朝烹供吾用兮日費万錢䁀食重兮一𬞞糊口吾儕分兮既不知食肉之多憂余胡為之遁悶兮咀嚼飢腸出竒䇿兮不致蒼生有此色兮歌闋而去漢大司馬博陸侯霍將軍祠堂記蠡吾治城西北郊有漢大司馬霍將軍遺祠俗相承即侯之故封考諸傳注博陸鄉名職方載博野本蠡縣地居博水之野故名終以陵遷谷變疆理蒼莾有不敢托實者然以地形相度今之博野安知非漢鄉之博陸乎廟權輿莫究何代以信傳信必有所自至元十七年豫按部次州來謁祠下荒壇喬木宛在目中老屋庳漏不障風日過客惻然心魄動蕩疇為神睨而碩之邪因屬守以義起廢具邦人瞻吏諾而退逮三十一年甲午豫承乏翰林省左署郎官劉源郡人也以東曹掾徐鳯來告曰弊邑霍侯祠耆舊某輩今易而一新內翰幸不忘久要尚惠一言庶免夫旌紀寂寥之嘆蓋嘗論人臣以道事君身名俱全克始克終者世難其人三代而下能膺斯任者惟將軍為然將軍諱光字子孟早以大忠至謨見知武皇及其受顧命付後事至擁昭立宣罔辜所托班固論贊雖殷之伊尹周之姬旦𥘉不是過誠哉斯言也所謂伊周者為天立極為生民永命為萬丗開太平是也其生則若爾其殁也與草木同腐豈理也哉且匹夫匹婦以一節獨行表見鄉曲尚能感激後賢尸而祝之于社况將軍乎然神即人之心也誠敬所在乃神心之所在今郡人業新斯廟歲時虔享因誠起敬如見風采其為神昭鑒也審矣若曰修復故事敬共神眀必獲禮于下執事此則神當然之理吾不當以是心徼之于冥冥也至元甲午歲上已日翰林學士嘉議大夫王惲謹記趙州柏鄉縣新建文廟記三代治民之具隨時更易百世而下惟學校存而不廢蓋所以明天理敘彛倫止民于至善之地故也况在今日有尤不可後焉者維趙之柏亭本漢鄗邑地隋縣焉宋金以劇稱板蕩耒官府生聚日就完美唯吾夫子廟宫鞠為茂草者有年于兹逮中統建元之明歲監縣事蔑都令馮仲德佐史路彧教官范天祥等相與起廢方經理間或者謂廟基迫亭傳雜民居囂湫卑隘孰謂神一日居此乎于是輟作徐議至因循閲三十寒暑當至元壬辰新令劉君因前政經營緒餘謀于僚吏暨邑中耆宿治城東南􅑍作新廟而遷之復構講堂于後俾肄業者有常處越是年秋仲上丁尹率寮屬諸生釋菜而落成之鍾鼓具舉籩豆有踐威儀升降肅焉煌煌邑人聚觀拭目興嘆僉謂吾尹起百年之廢一旦頓還舊觀勤亦至矣其可使無聞于後乃以某走京師介國子司業王君搆以學記來請余以司民政者能以學校風化為先固喜聞而樂道之嘗讀漢志論十五國之風氣剛柔緩急類雖不同在聖人設教作新必因材為篤致諸中和而巳然精強多感者易為化底滯不材者難為功嚮嘗提憲朔南屢至兹邑觀其土壤瘠沮且當南北衝要民之奔走供役勞止備極勞則思思則善生此人情之常也况趙之風聲氣習𥘉不異于古為守令者冝知其俗之易牗乃從而振德之則前日彈絲跕屣悲歌慷慨之俗將見強仁慕義攸興而不自巳者皆是也教基既立道由是生異時風俗丕易人材輩出而曰此權輿于兹不亦善乎匪然司牧者以應上虛行為心士子者不以進修為實務其堵而宫之者作餼羊告朔之所吾不知其可也至元三十一年嵗在甲午夏六月十有九日謹記崇玄大師榮君夀堂記先妣夫人靳氏系出安陽永和里不肖亦嘗提按兩河相即臬司理所故知鄴中人物風俗為頗詳聞之姻戚間女冠榮錬師者志行修潔祭醮精嚴以道價重一方逮接際千儀方頥煙目緑髮童顔風度飄有出塵之想也大德丁酉豫方供職館閣師寄示西溪紫山傑作以夀堂記文見屬且曰翰林先生文學名德與二公伯仲間爾儻遂所請貧道藉之儘不朽矣二公之文載四披讀其稱揚與向所聞見而知者吻合無異今二公巳矣其文章氣節尚可振衰懦而傳無窮淂簉名其列固所願也乃為筆之師諱守玉相之農家女自幼貞靜視紛華泊如聞道家言喜之國朝甲午歲中虛魏大師以全真學主盟彰德之修真觀時師方齠齓出家往事焉既笄經明行修披戴為道士復研精正一科式法籙號稱習熟至元乙亥嗣主觀事師淵默內修聲光外著一旦責當弘演主張是者甚力貴族豪宗欲謝愆過而資冥福者藉師修淨期於對越感通故召請者無虛日法契會合風動逺邇學徒踵至信向者聿來乃光昭先業擴充增飾截然一新御史中丞西溪王公為述觀記稱師興緣弘教落落自拔有壯夫不能及者又蒙掌教洞明真人與進授之崇玄師號年踰六秩特構靜室于焉棲息晨起理玄務課學者畢焚香垂簾痛自滌除湛慮澄心審物理之自然悟道體之不息燕處超然而虛室生白矣容齋總尹夙承摩拊仰挹真風榜曰信齋紫山憲使勒銘于石表夫志道力行終始不渝之確其為名賢賞識如此師之志行愈昭昭矣大德戊戌夀六十有八乃營是堂為他日復真寧神之所道俗咸謂師山川炳靈道德藉潤振清風開後學纂懿流光方期福壽未涯何遽如許也然人生而死猶晝之有夜寓形宇內同歸于盡此理之必然也今師不為虛誕荒唐之説所惑能以生死外形骸追蹤曠逹以理自勝較夫烹煉呼吸期于飛升不死昧理亂常僥幸萬一者可謂賢也巳年月日堇記大都宛平縣京西鄉創建太一集仙觀記金源氏㷩宗朝一悟真人蕭公以仙聖所授祕籙創太一教法于汲郡悼后命之驅逐鬼物愈療疾苦皆獲應驗事迹惝恍驚動當卋一悟傳之重明大定間召住天長觀嘗入禁中論道稱旨寵賜甚渥三代虛寂師以道價凝重一時泰和四年太極宫𥘉建命師主焉其四代東瀛子即祖房孫諱輔道師人品峻潔博學冨才智士論有山中宰相之目大元壬子歲應丗祖皇帝潛邸之聘占對稱旨上以有道之士特隆禮眷賜號中和仁靖真人寶冠錦帔副焉及登大位中和已仙去玄談粹宇有不能忘者詔五代度師居夀至京師特建琳宇敕額太一廣楅萬夀宫命主祕祀其香火衣糧之給一出內府逮今承化純一真人全祐繼奉祀事十載間以受業者衆國之經費曰廣堅辭廩料至于再三有司上議禱祀重事供給所需不可闕也全祐謙撝之請亦不可違也良田果植隸大司農者量冝頒賜置為恆産遂賜順之坎上故營屯地四千餘畒復慮未臻豐贍元改號歲七月載生明之二日上御神德殿平章政事領大司農臣怗哥等言宛平縣京西鄉馮家里隸農司藉栗林叢茂川谷間以株而計者約五千數若盡卑全祐庶幾資廣道廕永昭祀事制可全祐榮𬒳恩賚乃自諗曰吾道家者流清心繕性歸潔一身何以仰答恩私有廣開福田朝香夕火祈天永命介求多祉而巳明年丙申春相栗林隙地重岡環抱主峯面其北下寨寒泉泓澄碧瀲旁地衍沃可引灌溉既奠厥居中搆正殿三楹像事玄元九師祖師真官二堂位其左右前翼兩廡下至寮舍厨庫莫不備具四周繚以石垣前啓玄門榜曰太一集仙觀工既訖功以不肖猥同井閈且承乏太史求文諸石昭示來者若稽載藉如元魏之寇謙之李唐之司馬子微皆以道術昭著顯蒙寵賚史臣屢書特書于以見山林處士禆贊治化延昌䁀祚不以獨善為髙時君丗主欽挹真風優加禮遇不以崇髙為大千古而下光賁簡册今純一師操履貞固精嚴祭醮至蒙兩宮眷顧而圖報之誠惟恐不及是觀之建特其餘事耳其感遇之盛與前卋同談而共美者矣是可書大德元年九月望日記隆福宫左都威衛府整暇堂記元貞二載秋八月隆福宮左都威衛府起堂于肄場中央度冝面勢不侈不陋于以簡閲車徒角較伎能秉號令而觀威武焉既落成榜之曰整暇佐幕張浹盧愷奉威衛王公之命以記文來徴嘗聞公之選帥率府繕修戎政桓桓﨣﨣蔚有成算若夫營壘雲橫耕屯繡錯儲廩實而豐饋餉建警樓而謹朝昏歲時都試申明節制旗斾精明鼓角清亮坐作進退又為餘事至于醫藥有局更休以時宣暢恩威撫養士氣以之宿衛宫闈扈從巡幸肅將斧鉞中外辨嚴其趍事赴功士卒輯穆優劣得所自非老臣宿將謀畫素㝎視若無事者其能如是乎可謂既整而且暇矣顧老生常談安能彂越其梗槩然有文事者必資于武備而武備者所以昭乎文德也㒒雖耄尚能效一辭于尊爼間蓋天下之事曰輕曰重皆有體用明其體者必致于用又古之君子不足其巳至貴乎善推其所為以極經濟之美今公以重厚英偉之姿膺瓜牙委寄之任罄殫忠勤夷險一節智慮精深有古良將之風砥勵廉隅挺士君子之操寓軍政于國容迪師中之貞吉冝其特蒙眷倚有謀猷克壯曉暢軍事之喻所謂明其體而淂效用之實矣推而廣之兹惟其時霈洪恩而釐宿敝只在從容一言之頃俾內外諸軍汰冗濫蘇雕瘵極精鋭而伸鬱抑咸若兹軍之整暇輔助文治固太平不拔之基億萬斯年實顒顒屬望是則兹堂之構豈特整暇一軍而巳哉雖晉楚名卿賢大夫復出優遊戎幕相事機而措時冝恐不易吾言矣使榮祿大夫塔刺海資德大夫中書右丞王慶端昭莮大將軍阿刺不花其二武德將軍完者廣威將軍堇守敬曰武德將軍曲失帖木兒信武將軍張智榮實簽其事詳書其僚佐之姓名者見稗賔之勤謹興造而重事功也大德二載龍集戊戌堇記青巖山道院記衛奠太行東麓山形迤邐自南運肘北闖其間峰巒歘斷如巨靈𥘉闢望之儼然而巉秀者蒼峪也循峪北騖越蒼池山愈深愈雄峻可愛泉溜益清而駃望東北行約十餘里抵青巖山足嵓壑尤美四顧皆崇山茂林列峙環拱其東南有洞府軒豁層崕上寬廣丈許邃四五十步其中泉水泓澄深叵測春仲二日洞出光怪恍愡泓水湧溢漂浮塵滓潨㵼山谷間者一晝夕歲以為信俗呼曰水簾洞山藉之以清物資之以潤清潤之氣不特散而為煙霏翠靄欎而為良材靈藥銅鏐玉石之美必有卓異幽隱之士炳山溪之英靈增景氣之勝概如廣施神志存隱恤隂主蒼嵓唐甄濟隱居兹山至逺邇化服分死完莭不汚祿山近則四仙清修道行留頌委蛻不謂之炳靈增勝可乎洞側道院即四仙棲遁遺址山空人去石礐雲荒獨一殿巋存至元三祀為全真學者李志和始跧處石磕以修復為已任剷崖堙谷展托庵地除梗輔罅夷為坦陸重構玉帝殿洎東西兩廡山靈位聚仙亭下逮庖湢門屏以楹而計者三十數仍改瘞四仙鎖府中統𥘉元大一五代師居壽奉命投龍牒玉簡之對以昭景貺厥後闔境旱暵郡長吏來禱車甫旋軫甘澍􅗈霈逮志和修復增宏郡民於水觱沸曰少長畢集願伸瞻禮乃盛為儲偫人具醉飽而歸于是蒼峪勝迹靈奕一方而逰觀嬉樂亦復承平之舊府僚豕韋國井君德常嘉師勤瘁為主張資藉者甚力及來京師復以興建記文為請豫郡人也不敢托衰老辝切嘗讀金華洞天記中土山林名勝不載于仙藉者尚多惟蒼峪為天脊左戒奧區去郡里餘一牛鳴危峰疊嶂環繞郛郭磐礴風煙祕藏靈異幽隱之士代不乏人亦洞天不載之一也由志和擴而大之其名固亦佳矣然以遺迹考焉尚有未盡者仐廣施有廟四仙紀行而甄公大莭雖傳卓行於唐史彂幽光于韓筆在山中故事獨乏旌記子歸能屋而祀之俾後之遊居者灼知景慕審夫出處大義所在以之勉志莭而礪薄俗則子與志和名迹附麗前賢共兹山而傳無窮矣井君曰唯大德龍集巳亥上巳曰堇記創建伊洛五賢祠堂記大德丁酉春洛陽薛君友諒即邵氏安樂窩故址起祀屋中設康莭遷叟明道伊州橫渠肖像庸致歲時香火之奉榜曰伊洛五賢祠神嵩清洛光動户庭明年秋來京師屬不肖為之記乃告之曰二帝三王修已治人之道待孔孟而後明立極垂憲貽則無窮不幸厄于秦雜于漢歷六朝隋唐雖有名公碩士間作迭出其氣量足以恢弘至道闢除異端奈智識不能盡窺聖賢要奧擇焉不精語焉不詳又局夫章句文辝之末亂以功利禍福之説故學者汙漫支離莫知統紀時則有衛道之士而無傳道之儒陵遲至于五季其斫喪可謂極矣伊洛諸公奮起百卋綰持道樞探窮淵源克紹絶學內有以究聖賢規模之大外有以修踐履節目之詳故孔孟之教復明斯文得歸于正後學知所適從蓋二百年于兹矣然科舉利祿之習既久遽未丕變以極夫功用之至伏遇我卋祖文武皇帝資挺上聖運啓休明崇尚儒術尊禮賢俊于是許竇王姚諸公宗伊洛學陳説孔孟立極垂憲之教以致二帝三王所以修已治人要道蓋巳收明德新民殊效于中統至元之際今內而贊助經綸外而佐理政化多前日執簡傳經之士推原本自則伊洛諸賢發明維持之功不為鮮矣雖配享學宫天下通祀可也况二程丗家河南康莭遷叟橫渠聿來胥宇相從至數十年之久聚精會神推明討正莫匪修齊治平之方性命道德之理至于談笑遊衍亦皆格物致知之餘篤志力行清修苦莭專以移易風俗勉勵學者為主今讀遺書按故迹其英邁純粹氣象尚可髣佛復廟而貌之俾向之景仰髙風者足以致其誠懇今而後瞻拜清光者可以感其善心尚何俟贅兼陋于其間哉敢以不敏辝友諒曰昔潮人修韓文公廟東坡有碑南雄起三先生祠晦庵作記謹歲月以示來者不為無例曰若扳援昔賢則不肖年迫衰老懶于筆研又瞪乎其後惟友諒先丗為治中名士其讀書慎行名簉仕版可謂不墜箕裘矣前任常德府推復九賢祠今又創兹宇庶幾有意于修巳治人者非特徼取美名而已也是不可不書大德戊戌歲冬十二月臘日記汴梁路城隍廟記汴梁之廟事城隍神其來尚矣壬辰兵後廢撤不存河南路兵馬都總管劉侯福大懼無以妥靈揭虔曰事神治人守吏職也可偏廢乎于是相新昌里爽塏地西南二方界以通衢劉侯私第鄰其東北則抵居民萬氏廣袤餘七畝繚以崇垣中起正殿像設有儼前敞臺門扄閟嚴肅左右則環齋搆室敦請女冠孟景禮向妙順朱妙明輩相與住持夤奉香火景禮四元宗獻之女童丱入道以䑣𬋩之懿資膺黃冠之妙選享年八十有五無疾而逝妙順亦出各家深賾玄理解屬文辭與孟同年仙去景禮臨終貽屬妙明曰汝等祗嚴修潔善守廟祊母負劉侯付托妙明唯曰敢不敬承誨音歲甲辰劉侯命侍人周氏韓氏披戴禮棲雲王真人為師訓周曰妙元韓曰妙溫與妙明為徒侣所需衣糧皆出劉侯資給妙溫妙明俱夀臻期頥相繼蟬蛻既而劉侯第四子保㝎路總尹某卒夫人徒單氏痛伉儷之中睽感榮華之易歇聿來栖迹法號妙真道俗咨嘆祠宇為增重焉妙元洎妙真罄刮粧奩資藉刻苦撙莭遂重修正殿臺門創建獻廡子孫司及道衆寮舍齋厨輪奐一新蒙洞明真人人稱賞加妙元以純貞素德散人之號今年登七秩日誦五千玄言為課朝夕焚頌祝聖人夀願天下安鶴髮童顔精健不少衰復慮興建本末不能昭晣于後走書幣亰師求記于秋澗翁豫宦逰大梁者屢矣故國遺迹亦嘗周覽今雖衰老忍無一言載名其間謹按祀典陽氣升而天神降地道肅而人鬼出自邦國逹于臣庶家祭秩切近者社禝五祀而巳城隍神𥘉未載也丗説秦功臣馮尚見夢于漢髙帝曰奉天帝命與王知領城隍隂事雖儻恍不可致詰然自漢訖今遂為天下通祀社與五祀雖有常尊當時用事莫城隍若也况汴梁為六代都會四方湊集城池盤礴衢陌交通人物號稱繁夥精英之粹集晝夜開闔死生變化幽明兩間其有神為之主司也審矣夫城隍地道也古人求神各以其類今俾女冠主其祀事冝矣傳曰西子蒙不潔則人皆掩鼻而過之雖有惡人齋戒沭浴可以事上帝言誠潔可以感通神明也如景禮妙明妙元妙真等咸出于詩禮名家薰膏鼎族清修道行敬恭神祇致廟貌完固闔郡瞻仰雖其誠篤致然亦由神明有以護持者哉而推源本自不忘劉侯經始之勤是可書大德三年十二月吉日記真常觀記大都南城故冝中里真常觀為全真學者重玄子樊君所建也惟全真教倡于重陽王尊師道行于丘仙翁逮真常李公體含妙用動應玄機通明中正賈重一時可謂成全光大矣重玄子自童丱受業焉資爽朗嶄然巳露頭角由是日獲承侍聽其諄誨仰其髙風神志灑然春融蟬蛻與之俱化玄覽暇詩章篆隸亦時習之既壯辭逹體要與事物接無所凝滯衆以不凡許之真常師嗣主法席委掌資用出納明會計當巳無私焉師為稱賞曰財賄衆所貪淂今逺疑怨不為行妨吾將大有以卑之時朝家欽挹真風所在宫觀相望和林都會地獨闕焚頌之所乃選充道録俾張皇教基供奉闕庭雖越在風沙數千里外慨然命駕曽無難色至則潔已應物通變無方致宗風弘演王公貴人為之尊禮主張蒙中宫賜金冠錦服俾降御香于燕都師真紀堂殊光顯也庚戊間真常真人洎十八大師光膺寶冠雲帔下至四方名德亦獲紫衣師號之寵改觀為宫周旋之力為多繼奉旭烈賢藩教旨提點彰德路道教事逮誠明真人嗣教念其耆識殊顧眛也晚莭退休與時消息至元二十二載易張侯故第為幽棲所榜曰真常觀示不忘本也崇堂為殿下至齊厨庫廄修治完整復置𬞞圃一區負郭田二百畒資給道衆乃灑掃涓潔廣植花木使境趣靖深日端儼丈室炷香撫琴客至問何為曰吾方疑神坐忘與造物者逰凡往來者皆一時名公如李敬齋趙虎岩翰林王慎獨左轄姚雪齋鹿庵王承旨少傅竇公冀國王公愛其風度才識締方外交太史公曰視友知人亶其然乎元貞元祀正月五日師晨興召門弟子齊道亨劉道安付以後事怡然而逝閲丗四百五十六甲子寧神于五華山仙瑩道亨純直有持守祗承遺緒朝夕惴惴增飾固執惟恐失墜掌教玄逸真人與其進署宗門提點加沖玄師號一日介劉道録文甫請述觀記豫僚契雷若齋與師昔同鄉校夤緣有一日之雅且重劉請勉為件右切有所感焉乃為之説曰二氣氤氲五行儲精長材秀民無卋無之弟學以致其道行以效其用功成名遂者幾何人斯當金季俶優綱常文物蕩無孑遺其時設教者獨全真家士之慕髙逺欲脫卋網者捨是將安往乎嘗究其説不過絶利欲而篤勞苦推有餘而貴不爭要歸清淨無為而巳如重玄子扶翊道紀綜核玄務公材吏用藹然見于脫頴遊刃之外其妙固翩翩而獨征托遺響于髙風者矣然推本原自信其良知良能耿耿有不可掩焉者不謂之長材秀民可乎向使率性以明當然之理務學以廣通變之方列周行握事樞以投功名之會樹立巉絶恐不如是而止也撫卷懷人為一慨惜師諱志應字順甫出平陽汾西宦族自稱重玄子法號淵靜通虛大師廣陽之真常麗澤之靈郁皆别館也仍為門人作望思歸來之篇其辭曰瓊芝峨冠兮青霞襞裳逺引髙蹈兮與道翶翔至人出卋兮化現無方驂駕鶴馭兮力振玄綱仙逰有恨兮門人涕滂蓬萊東望兮雲海茫茫松桂輪囷兮欎鬱其芳偃息有室兮燕處有堂仙標倣佛兮誨音琅琅師今不見兮莫知我傷宗風通暢兮羽流有光神逰故山兮隂儲吉祥倒景遺照兮土苴是揚庶幾華表兮歸來之章故翰林學士紫山胡公祠堂記紫山胡公捐館之三載彰德監尹脫里不花暨廉訪使完閭與郡土民詢謀僉同乃像公于治城西郭别墅之讀易堂于以揭虔妥靈致歲時香火之奠諗不肖交𣢾知平生詳請書其事于石酌量契義不敢以衰耄辝夫士有生無聞于時潛德幽光發越于後蓋行義立言曠卋而相感也亦有冨貴薰天振耀逺邇卒然傾謝磨滅無紀豈德薄用鮮無可稱述而然邪若夫其生也為人所敬慕其沒也致人所懷思至衡於志慮見于羮墻非人品峻絶事業顯著盛德至善感格人心悅而誠服有不可忘者安能如是哉紫山固名士才大夫佐理于朝讜言直論不屈權貴作牧名藩吏畏民愛治行為諸郡最擢任風憲擊姦發伏褰衣具瞻有風動百城之目其臺閣之清規幕府之公論固在也曰并汾曰齊魯遺愛善政亦不忘也而于鄉郡未嘗臨涖仐像而事之余𥘉甚疑既而淂其説焉金季喪亂士失所業先輩諸公絶無僅有後生晚學既無進望又不知適從或泥古溺偏不善變化或曲學小材𥘉非適用故舉世皆曰儒者藝一而不通迂闊而寡要于是士風大沮惟公起諸生秉雄剛之後德負超卓之竒才慨然特逹力振頽風志大學致實用笑談議論揮后流俗文章氣莭振蕩一時其見諸容度事業者皆仁義道德之餘剛明正大終始一莭追配昔賢矯革時弊故天下翕然想聞風彩皆曰𬗋山學備四科望髙一卋真豪傑之士爭先覩為快况二侯與郡士民執經傳道質疑請益獲親炙而為矜式者哉沒而配社尸而祝之援例祀典其誰曰不然若以匹夫而作百卋師一言而為天下法論之振衰激懦屹砥柱之孤標回狂瀾于既倒清風之所激德澤之所及霑丐後學多矣是則係斯文之盛衰與士風之輕重非相人所淂顓而私也雖然二侯出貴族世胄樂道而自忘其勢尊賢而能知所宗昔鄒孟氏譏列國諸侯不能尊賢乃曰貴貴尊賢其義一也垂訓深矣後卋之監牧實古諸侯今二侯取法聖賢于千載之後行古昔所不能行其賢于人也逺矣豈止如是而巳後之讀斯文者將有所興感而取法焉公諱祗遹字紹開自號𬗋山磁之武安人由中書郎官厯河東山東按察使濟寧揔管仕至翰林學士太中大夫大德五年歲次辛丑清明前一日記胙城縣廟學記國之將興必有世德之臣儷景風雲戡定屯難贊敷文德共致太平故孔子曰如有王者作必世而後仁鄒孟氏亦云所謂故國者有世臣之謂也信哉言乎惟昨邑金末城冝村渡行河平軍事以扞禦兵衝既而國朝帥臣撒吉思不花監總五路兵蹙蹂餘燼友而拔焉駐軍守據迫金主東走睢陽斫營夜閧竟殁死城下先是公父槊只秃魯花以萬夫長將選鋒圍困大名中流矢而卒逮金亡朝廷追録載世忠藎賜夫人楊氏世封户于胙孫不闌奚實嗣其後雖州遷而縣其故家遺風餘俗固在也當金末危急草創際爼豆之事有不遑及國朝甲午歲漕使宗亨肇建禮殿三巨筵壯麗翬飛為諸路冠後三十五載尹劉庭撤而新之復起明新堂于後其臺門賢廡尚闕學舍生徒𥘉不論也逮元貞改號冬嗣侯普闌奚擢任本道廉訪使路出于胙首謁廟宫覩其如是曰欽惟詔條責實在我乃敦諭尹張孔鑄以興修為任尹承􅒛經營有方趣辨惟謹首建神閍擇師立學縣中子弟來受業者日衆侯乃出所藏經史數千卷資藉講誦尹復闢良田五頃造祭器百餘事供給二丁釋菜諸生廩料之費兩廡方締搆而及瓜代後尹李君卒成其役仍繪七十子諸大儒肖像千壁胙之廟學五十年間狼藉蕭條始克完具人知敬仰俗興禮讓仰副朝廷崇尚之意皆由賢侯一言勉勵之誠所謂王者必卋而後仁卋德之臣戡㝎屯難贊成太平者于斯可見矣侯今由內臺侍御史進拜行臺中執法將南過鄉國請書其事于石乃為説以告之曰惟孔子之教推眀至理敦敘彛倫裁成輔相之道修齊治平之方本末具備細大不捐垂憲立極萬古不易孔子明其道而無其位空言無所施後卋帝王必需崇尚卿相守令所當奉行雖無禍福之怵誘而從建之間有真禍福存焉固匪利害之牽率淂失之際有實利害係焉惟其費不可闕乃修而明之審夫切而不可緩故勉而勵焉惟侯出貴種世胄敦説詩書好尚禮義內剛眀而外文雅審事宜而逹從政立身揚名已收功于踐履今復以淂施之鄉邑可謂善推其所為矣然君子不安于小知而期于大受况天下之事惟宰相臺諌淂言得行擴而充之正在今日昔武元衡修治廳壁栁子作記孔道輔以直道進用宋史有傳侯姑欲我記胙邑廟學而已耶易曰苟非其人道不虛行又禮云人存政舉誠能繩武贊文光昭先業克盡卋臣之義由一邑以逹之天下則道𬒳均弘俾秉事樞矣㒒雖耄將執筆以俟焉大德庚子歲仲冬既望謹記冝逺樓記奉聖甄君居敬粵自父祖堇身莭用保守恆業以篤實稱鄉里居敬尚文雅喜交遊襟韻灑落義氣所在略無凝滯始來居燕都城善心計而擁髙資者甚夥門廬服玩例尚修潔居敬一旦以僑寓簉迹其間不肯碌碌出人後于所棲息起構小樓華而不侈髙而不危雖處市㕓闤闠之間頓出車馬雜喧之境于以合集朋簮暢適幽懷請名于豫乃取六一居士天寒山色之句扁之曰冝遠詢義何居復語之曰樓之為用便爽塏而向髙明必占據形勢之雄坐淂溪山之勝豫嘗登斯樓慿欄四顧金城千雉青山三面環繞拱侍嵐光翠色令人顧揖不暇朝暮隂晴變態百出或橫修眉于天宇或出寸碧于雲間雖呈妍貢竒于百里之外不煩躐吾之屐拄彼之笏雙目以之增明詩脾為之借潤矣其于幽逺不亦冝乎此特形于外者如是其係于內者又有大于是焉者甄氏先世既以篤實稱其積纍之厚藴蓄之深逮居敬而後彂之今既崇基搆而勤丹艧矣復能傳訓子孫俾為學止善奉承罔替則締搆鞏固傳示永逺亦以冝矣傳稱衛公子荊善居室始有曰苟合矣冨有曰苟美矣又君子創立基業必垂緒于後其是之謂歟居敬跽而謝曰有是哉問一知二皆僕所未聞也請書其詞庸為警戒又何俟燕雀之賀成請善禱于張老也大德辛丑歲十一月草一曰秋澗老人記移忠堂記王全州之子亢宗敏願通粹有麟趾雅厚今為魏府别駕一日拱而言曰維先祖驃騎府君起壠畒際風雲奮從戎列收河朔于百戰之餘以至出建大斾入二行臺槖兜棨戟㧾制魏師者四十餘年維是一二堂廬皆乎昔所晏息諸孫無所肖似承藉德蔭乃今有光永言追思于維則者未也幸憲使惠顧念其貽孫之謀燕翼之厚為題扁以示耒者俾子孫銜訓嗣服蔚為矜式敢再拜以請余仰而嘆俯而思曰有是哉何其孝之純也夫人之行莫大于孝孝莫大于顯親顯親莫大于立身揚名立身揚名莫重忠述事蓋一致二極臣子之忠孝也傳不云乎教之孝所以求其忠也嗚呼忠之為用至矣故居家則盡心于親進官則竭力于上與友交而言信為人謀而盡誠蒞政則有恪戰陳則有勇其見諸日用間者能是一本夫愛之深孝之極也舍是將何所取則焉吾已見汝乃祖府君持心二極屬搶攘之際舊勇略為先逮分㝎之後獵忠義為本其殊勳茂績紀太常而勒景鍾者可謂立身揚名之道昭矣汝父嘉議君復能篤繼忠貞勤勞王事其振肅臺憲拊循殊方冠冕于天朝也行有日矣豈非由孝而志自忠而有立耶將有煒前光濟厥出美者責不在吾子乎故題之曰移忠蓋取孝于親則可以移其忠於君之義也若夫親安而氣愈家理而官治友信而謀成吾子行焉綽有餘𥙿尤當勉其所已行而進其所未至俾親顯而名益楊身立而道愈彰􅟵為百卋無窮之傳可也異時有登斯堂讀斯文慕樂昌之風而興起者將見為是堂一致二極之本又何啻王氏之類也哉于是乎書逰東山記至元辛巳歲春三月余按部黎陽膏澍連朝明日夏孟丙寅朔天宇開霽大伾堆阜景風明淡畫如也拉友人宋祺洎諸屬吏囊筆載酒耒遊兹山遂自西南騎而陟阻抵嶽祠下既祝香步上中層至𪷟鴻亭址讀刺史邊元勳亭記文甚竒麗稍北至中頂頂勢夷衍即李魏公中帳蓋伾之絶巔也山形再成崚層石壇爾東北行不百步隂崖﨑嶇扶腋而下憩龍竇巔上少焉降觀西陽明洞記開元間山人李真題名筆勢飄逸有焦山鶴銘風格其西龍崖方廣天然而龕上竅極大盤旋若螺殼然邃頂而去窈不知其幾何也意者山澤通氣此正大伾口鼻唅呀吐納之所非有異也宣和以侯爵錫之不幾于妄濫乎盤礴久之下山適靈昌諸君繼至尋前盟也相與稽首彌勒尊像其鐫鑿本末以寺石麟考之為高齊所造無疑左右磨崖題識甚多得魯元翰張浮休賦詠各一周覽既巳與客聮鑣東行踰大河故瀆入牽城登𬗋金山觀仙人拖裙石石水蒼色苔昏兩溜雯華漬裂誠若積狀者其面有元豐政和題記黥刻幾滿皆竒筆也遂探白金泉瞰玉女洞口傍勒建安人徐閎中泉眼銘雨蘚糢糊略辨首尾于是躋巔會勝主人取軟腳例開樽連酌觴詠才交幽懷共暢不知山蹊之迂登頓之勞也既而寒日下悲風來遙北麓穿蒼城按觀隋唐廩制未刻入自北門宴群賔于清白堂酒數行張鄭諸君舉觴囑豫曰今日之逰樂且有融盍簮而耒似非偶然第遷變已來三山濯濯等為丘垤其能極宣城之賞當子長之遊乎然山以賢稱境緣人勝如赤壁斷岸也蘇子再賦而秀發江山峴首瘴嶺也羊公一登而名垂宇宙况兹山也名載夏書功存禹邇關河大地形勝依然斯行也垂槖偕來稛載而去幸吾子筆之歸為兩郡光且紀蒼煙寂寞之會仍得簉名其間為他年林下故事非偶然者不爾甘逋客回俗駕幾何不為疊嶂攢譏山靈見謝也耶唐建昌陵石麟記唐昭慶陵在新隆平縣南十有三里使相鄉正尹里其石儀一十八事儼然具在內二石麟身首蹄鬣一與馬同第題顛有觡突出肉葳㽔其端所謂示其武而不用者也兩膊雲豔光拂􆈄鬛尾上揭類牛而短雖雨蘚模糊雯華剝裂而制度精絶可愛傳曰麟四靈之瑞麕身牛尾一角五彩色備王者至仁則𬒳應而出又云視明禮修則至今刻像列諸陵闕豈顯夫祖宗生有至德殁備盛飾以表其仁厚故耶既而入東南招提讀開元十三年縣尉楊晉所撰碑頌蓋知為唐皇祖宣簡公懿王陵墓也儀鳯元年髙宗追諡尊號宣簡曰宣皇帝陵曰建昌懿王曰光皇帝陵曰延光仍配守衛者三千人敕象成令專知檢校州刺史歲别一巡其石儀之制固當追尊崇建歲作也寺即揔章間立額曰光業由是而觀其夤奉之嚴守衛之盛纍聖明禋之禮郊歌時薦之儀固云極矣今陵圍夷滅無復所見有荒煙野田而已嗚呼盛極則隨衰藏侈則厚彂此必然理也止卋葬之中野不封不樹何模金暴骼之有文質中判古不能復然則何為而可漢之灞陵其中制乎至元十九年壬午歲夏六月十九日秋澗王惲記況海小録日本蓋倭之别種惡其名不雅乃改今號其國在洋海之東所屬州六十有八居近日出故曰曰本國王一姓宋雍熙𥘉巳傳六十四卋中多女主今所立某氏云大元至元九年上遣祕監趙良弼通好而國次對馬島拒而不納十七年巳卯冬十一月我師東伐明年夏四月次合浦縣西岸入海東行約二百里過拒濟島又千三百里至吐刺忽苫倭俗呼島為苫又二千七里抵對馬島又六百里踰一岐島又四百里入容甫口又二百七十里至三神山其山峻削群峰環繞海心望之欎然為碧芙蓉也上無雜木惟梅竹靈藥松檜桫羅等樹其俗多徐姓者自云皆君房之後君房徐福字海中諸嶼此最秀麗方廣十洲記所謂海東北岸扶桑蓬丘瀛洲周方千里者也又説洋中之物莫巨於魚其背鬛矗然山立彌亘不盡所經海波兩坼不合者數日又東行二百里艤志賀島下與日本兵遇彼大勢結陳不動旋出千人逆戰數十合者凡兩月我師既捷轉戰而前呼聲勇氣海山震蕩所殺獲十餘萬人擒太宰藤原少卿弟宗資蓋前宋時朝獻僧奝然後也兵仗有弓刀甲而無戈矛騎兵結束殊精甲往往以黃金為之絡珠琲者甚衆刀製長極犀鋭洞物而過但弓以木為之矢雖長不能逺人則勇敢視死不畏自志賀東岸前去太宰府三百里捷則一舍而近自此皆陸地無事舟楫若大兵長驅足成破竹之舉惜哉志賀西岸不百里有島曰毗蘭俗呼為髑髏即我大軍連泊遇風處也大小船艦多為波浪揃觸而碎唯勾麗船堅得全遂班師西還是年八月五日也往返凡十月省大帥欣都副察灰次李都帥牢山次宋降將范殿帥文虎揔二十三南一十三隋唐以來出師之盛未之見也秋澗先生大全文集卷苐四十
