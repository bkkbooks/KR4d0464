body:
  text: 七言絶句故宫遺石華陽遺宫土花碧依然萬石如林立憔悴崩雲偃月姿留與都人作寒食至元十六年㽔賔前二日同賈漢卿逰上方光教寺謁相上又不遇因賈往年留題五詩清新婉麗煩襟為灑然也亦留詩壁間仍用其韻為鑑堂一笑紺碧亭亭午影涼同來共坐贊公牀拖條柱杖誰家去借問山僧有底忙出處何心燠與涼適來真是兩繩床分司不作埋輪去虛抱乖崖救火忙古寺僧殘草木深寶香猶足散煩襟雪窗不到聞猿句幽鳥還驚恨别心謂漢卿明日北歸萬事無端起六根蟻旋蜂閧苦紛紛間來莫厭僧窗話暝坐團滿到日矄花木蟬房一徑幽生平竒勝愛窮搜入門便得清涼界信有人間六月秋間間公正大二年為慈聖兩宫重修寺碑説寺蓋夷山之地唐令狐楚愛其竒勝曽居於此塔係唐新羅僧智照用海船運新羅琉璃甓所建間人愛作靜中忙細和新詩步繞廊老衲向人誇水異一甌春露雨花香流杯池九曲彎環碧玉圍錦香吹浪下龍池一觴修褉宫中舊正是梨花雪滿枝太白捫月圖詩中無敵飲中豪四海飄瀟一錦𫀆千丈醉魂無處著青山機上月輪髙閻次于秋山圖五年官守晉州城伐石堙山日有程展放畫圖還憶得姑山黃葉正經行李白醉吟圖長庚風彩月爭輝力士傍無識子儀白璧莫嗟疑有玷夜郎風物要新詩題蘭廣寧望海寺詩卷後同年樂用之為録二詩贈仁甫縣令金到明昌事事新粹然一氣變斯文試吟望海樓中詠轉見飄飄思不羣逺懷丗契崈明德遹述先猷極孝心舉世泯然衰俗裏兩家風誼見來深紫陽觀雜詩和西溪嚴韻袖裏丹砂照夜紅市人爭識漢壷翁南都花木春猶好長在先生杖屨中心安巳契長年詵通寂能開不二門我亦靜中存夜氣此身之外欲何存終日沉迷簿領中乘間時過紫溪翁請師莫作功名看心似浮雲度太空片言理到釋群疑不待諸生入𬋩窺收却藥籠無箇事一簾春夢落花知坐忘不戴逺遊冠是是非非了不干欲識紫陽存飬力一簮玄髮頰浮丹緼絪元氣化雖精起滅漚如一唾輕為問壇邉聽經鶴人生何苦未忘情余年齠齔出亰師想像繁華夢覺時前日石壇揮麈處故宫真似黍離詩昌黎一序了仙翁六絶西溪意匠雄從此夜窗虗白滿滌除玄覽見沖融一壺大地市朝間施藥歸來盡掩關幽睡不知紅日晚青山誰似白雲間壤壞槐宫蟻戰空銅駝陌上幾秋風一身歸潔何難有人重清時濟物功宫井七絶團團鴛甃露盤秋玉潤砂紅湛碧流多向內家供頓後餘甘翻麝入茶甌野粉侵淫暗漆花玉床零亂卧泥沙羸瓶敗繘𥘉無擇波及都城十萬家髙梧隂羃掖庭西清比中泠甘比飴今日道傍塵穢滿秋娘憔悴渡江時清時瑶殿引瓶金百尺還聞墜水音想得日長宫閣靜玉盤珍果看浮沉金屑離離泛曉光瀛池通氣濕嬰香六龍不挽清波去忍給吹脣燕御牀事事宫庭到可珍我因懷古故來頻一泓雖在當時水終似上陽白髮人行入空宫重嘆嗟倚天金碧墮塵沙景陽留在煙脂井似與都人續夢華後三絶和西溪韻武元直雪霽早行圖謝宣慰亂峰疊巘玊崚嶒危棧何人趂早行似我姑山新道就神居東崦聽雞聲豫官平時開姑山道甫成夜雪大作明試車下故云神居雪擁天山六月寒冷雲西北是長安行人馬上楊鞭喜猶勝南荒作熱官侯敬甫四題同西溪賦昊天報德詩人感號慕終身大舜心舉世靡然衰俗裏一家追逺見來深怡怡和氣滿春臺天顯曽忘鞠子哀説似升堂興起客功夫元自孝思耒支于堂德積于身報自豐君家培植見深功友于堂下看株樹漸與三槐氣象同種德堂紛紛萬變一心微止水能澄見是非客去妙觀尤有得滿簾春日靜朝暉清心堂跋唐申王畫馬圖內府曽觀鐵筆驄又于此𥿄得真龍却疑決電奔虹異不到少陵題品中題劉平妻胡氏殺虎圖獸猛其如義烈何揮刀峻絶魯陽戈哀哀哭絶東山婦恨入秋空淚謾多重陽前三日同大季長畢茂先酌七賢祠下滿眼青山落帽風七賢祠下一樽同雲煙顧盻來能幾白髮相看總老翁蓮社圖莫怪淵明從逺公鬢絲禪榻偶相同談空説有知多少都在龍眠意匠中二教玄風盛永嘉後來諸子更紛拏淵明興在東籬菊獨泛秋香亦自佳一誕相誇陷洛郊流傳江左到滔滔杖藜首見淵明畫裏龍眠意最髙贈唐縣李縣尹按部次堯封教官石雲卿來訪因話縣東有前鄞尹李君年六十四雖武人性喜學巳卯夏自浙東歸載羣書滿家將遺之子孫以酬夙志吁可尚也余聞之喜而不寐明日元旦躍馬來觀出經史子集及未見書七巨箱凡千有餘冨覽間偶得是詩以贈謂十室之邑必有忠信者李君其人諱忠字彥德縣人為蔡國公將事來向王充閲異書田間炬草照西東止是農家十歲豐不為兩掾茆屋底白頭還得愛書翁唐之農家元旦然束草于田間視其所偃以十秋成庚辰歲唐縣元日堯封今歲遇新年欲訪遺風巳渺然願效老人三獻祝至元天子夀如天吾皇仁聖邁唐虞寬大恩頒歲首書正擬乘風開濁浪忽隨疏綱漏凡魚宣和珍禽圖紫煙阿閣鳯連巢瑶圃飛翔下絳霄踏散木犀花上露翠襟丹喙不勝嬌和唐邑教官石雲卿見贈詩韻自笑鉛刀效至剛夢中揮箠走群狼東皇若假春風便放使諸山草木香巳卯除夜次唐邑夢登一城有數狼前行以尺箠揮之皆四散而走又見一豹無首前竄完州道中使符按部喜同分首自行唐入保垠誰著分司王老子杏花香裏過今春是年同出巡按官韓君美梁韓二簽事大使王西溪過蔡國公第宅南衙路斷歸時貴東第堂空設繐惟巨室顯知神鬼瞰一簞顔巷未為悲庚辰歲人日前一日書夢中所見碧樹翻香滿洞春一聲長笛隔花聞似嫌燕語鶯吟碎暖噴宫音遏夢雲題木蘭廟廟榜曰孝烈將軍在今完州城東北隅至元庚辰正月十日來謁土人稱昔木蘭戰此得功故廟有熙寧間知軍事河南錢景𥘉題記并所刻樂府古辭春風奏凱入明光不願曹郎歸故鄉今日西山見遺廟蕙蘭根異死猶香迷離撲握雜雌雄萬里持戈此建功因見漢家征戌重盡興閭左尚秦風登完州城樓州是古北平又曰永平即漢曲逆縣地故城在今州東草五里即髙祖云余行天下見户口夥繁獨此縣與洛陽爾故城西南有大埌土俗相傳為陳平墓土人稱墓曰埌漢家山東二百州當時繁夥此為尤朝來指顧城樓上斜日荒煙草樹椆望郎山有懷郝陵川太行鰲掀東入海鼓鬛高撑霄漢間一自詩仙黃壤隔風雲空鎖碧峰間張九元帥哀辭并序不肖與公既昧平生哀誄有述似涉無從然聞公幼敦詩禮長識風雲雄略英姿為時名將始徇江淮厥績已著及平二王雋功獨髙壽年未遐天遽奪去故作是詩于以為國哀而寓天下之所共惜也辭曰瘴海波澄戰血紅歸朝無幾病籠東異時惇史論書法當與將軍死事同盛説將軍禮度寬訃聞中外不勝酸可能秋月臺前詔便作悲風易水寒英姿颯爽戰酣來夢裏神交一噱開弓劒永隨秋草沒春風吹恨上金臺一曲鋴歌變八哀扶桑宿霧若為開我雖不識將箄面苦聽􅎏聲惜將材蔡國髙勳上將壇九郎又領俊功還遽教零落蛟龍匣千丈神光失斗間曲中有誤時為顧特見已丘藴藉姿不似九郎橫槊裏笑驅風月入新詩堂堂萬里常山陳首尾橫穿海道空凌屋未圖元帥像樂歌先奏二王功前日長歌入漢關今年埋垠九重泉應憐一段江山秀再到人間又幾年劒騎前頭揭認旗風飄笳鼓入雲悲眼中部曲渾依舊不似樓船入海時摽柱紀功超漢將臨江觀陳惜竒材更憐一片金陵月冷送哀聲萬里來風吹大樹日瀟瀟雄略無由覩嫖姚暴骨莽如天似悟不容勳伐蓋東遼風翻素縵天為慘栁拂朱旗露易乾雞水不供門客淚郎山空倚戟支寒水邉臺榭月邉樓􅍑逝彪亡共一立羽扇泠隨秋月暗銘旗高揚竹煙愁保下春夜金臺池館錦幈圍煙栁風荷蕩碧漪景物縱踈猶可愛畫船春水放燈時諺語新年百草靈燕遺禳禬鬪多能就中兩地風光盛東府風鳶保下燈題抱陽山張燕公讀書堂在完州東北草里富貴功名恐等間丈夫臨事莭為難挺然不附姦臣請似覺功夫出此山書龕高倚抱陽雲萬壑天葩發異芬莫訝相君潛伏久東封西祀要鴻文凌閣勳名焕日星豹藏於此貯精英江山萬古風雲筆未覺前賢畏後生贈孤月老明月靈臺到炯如清光元比衆里殊豈知影落千山底以德看來本不孤携笻偶入贊公房照眼􅌐珠夜有光臨水起亭他日事為渠題作墨君堂為觀蘇黃二公手簡真迹者數幅祝香保定文廟泮宫絃誦育多才視作尋常事可哀羣吏近霑誾侃色正緣文廟講書來遊張將軍山林至元十七年二月朔同苟嘉甫尚文蔚遊保城東張將軍山林置酒松臺因話郝奉使朱家洲事亭圯臺傾老樹欹夕陽淡淡鳥飛遲一樽細話朱洲事天道幽冥未易知跋雪谷早行圖壷口山深石徑開六花一夕浥浮埃披圖憶得經行事夜半盤車下嶺來題武遂朱君挽章後諱和字信之簿領微勞到贊襄改圖真見此心良更將一片西湖水波及奎郎見不亡吏業出身子公奎字君璋新安道中長陂極目麥青青揔是當年鴈鶩汀二十四橋春水外野人指示望鵝亭官舍即事酴醿點雪桞垂絲簾映虛庭叔景移八尺風漪紫藤滑清和天氣未暄時題節婦盧氏銘後節婦墳臺博陸南九原不化是貞心儼然一片松隂石只與西山共古今祁陽道中鶯啼花落巳無春四月田家更可人雨後老農催種早風前紅袖採桑頻行人不為送春忙一雨千林草木香馬上緑隂三百里直看春種到祁陽一春勸課歷郊墟路入祁陽氣轉愈夾道錦韉州太守隔林紅袖趙羅敷題孝感聖姑廟壁分司巡歷帶農官來禱靈壇為歲寒一炷寶煙神意暢祥飈吹下鳯雲冠仙去清溪事渺茫女功留在故園桑春風蘋滿汀洲緑吹作􅓸波步襪香卒歲誰能不製衣為蠶來禱聖姑祠何當雲葉翻香雨潤入柔桑緑滿枝題董左丞墳林大樹瀟瀟緑滿林蒼煙埋沒石麟深兔葵難道無情物猶學將軍捧日心南海揚旍開百越北風漏綱有奔鯢多應奪去匆匆嘆斜日宫中聽鼓􅎏董相墳林南董里九門東下稿城西千年孝繼忠傳業萬字豐碑看御題明皇私語圖人老逢秋百感催夜深私語自為媒秪知海嶽情緣在不道生離有馬嵬盈盈一水隔雙星不似行雲侍錦幈歡樂幾時憂思集碧梧秋雨待君聽秋滿􅌐山有所思海棠紅盛鬢華滋細思夜半銀幈語揔是三郎嫵媚辭戲題階前玉簮露影幽香濕畫簾美人睡起未全忺只疑冷墜搔頭玉月暗雲階欲悮拈題郭都水若思祖行實卷後公善推步算數隱德君子也邢臺天元章會到玄機星曆推來一理齊襄國至今傳異事門前鴛水亦曽西龍岡拱木秋風老燕處猶懷隱德尊黃極不埋身後數青雲今見起家孫鎮陽新居行馬門施擁豹幢德威端稱使君堂不應花影潭心月昨夜分光照客牀一作緑水堂前月緑水海子園堂名嵇侍中祠在湯隂縣西門外二里八王雲優亂中華義士何辜掩戰沙懷惠懦庸猶晉祚爭教移䁀入牛家侍中精爽有無間霜葉猶疑血點殷一莭見危能授命陸機回視恐慚顔沙河道中昨夜清霜比雪寒雕殘羣木栁冝先朝來信馬沙河道一一風前翠影圓西門豹祠在豐樂鎮東南一里古人辦事笑談中長愛西門禁暴功邂逅馬遷稱善史不應排比滑嵇雄光武廟在柏鄉城北十八里寰宇記云其地名壇亭乃帝即位之地也室𫀆鎧鳯花紅一體君臣祭祀同前日洛都城下煙無地認南宫文淵上將功雲臺英烈儘爭雄可能秖為椒不在龍姿婉孌中㵚陽道中纍纍遺冢覆圜瓴半是髙齊與魏陵千古是非同一盡篡攘終為路人憎王化吕仙翁祠猶炊一枕回繁華能幾暗興哀仙翁祠下無窮客不道都從夢裏來題杜郎中二子字説卷後燕客儀容雲表鳯紹宗英秀掌中珠故家正有新詩句不到徐卿第二雛于公愼獄起髙門積德而昌見後昆正似紫峰遺澤逺青衫還有讀書孫題劉大用畫草蟲手卷動翾飛自一天眼中風露發清寒筆端正有坡仙樂莫作宣和藝本看東坡墨戲出新意八詠復見河陽劉夢到草堂風露碧花籬落候蟲秋格物先須論致知古人圖史發幽竒多君夢到周南出幽澄洽略無私蟻聚蜂喧任一時正要至誠相不須臨事涉多疑宣和寶石圖凡十六葉雲萬態煥金書染出湖光照坐隅不道漢家規制泰山磐石是基圖嶽廟謝雪偶題至元十六年十二月草四日也岧嶤觚爵動雲霞慘淡隂靈黑帝家恆嶽所臨風雨好不須飛石示雄誇野老題詩語最工表余精禱與神通爐煙散處雲生野祝板宣時雪滿空偶得二絶寄府尹史子華離離殘雪點山郊麥壠埋深不見苗春在草根泉脈底淡黃先到緑楊梢人説中山有父風久從眉宇得沖融燈前近閲虞芮案轉見公明簿領中謂牧羊地議劄等事曲陽道中軟紅沙路栁條風雪擁陽坡見晛融細繞嘉山三靣過唐河東北望堯封癸未年二月九日雪東皇且莫認來真開折花封占好春一夜雪花深數寸肯教桃李露精神幾日輕隂雨氣氲凍殘花栁望春溫不知一夜豐隆意散作銀沙藥麥根冬寒沍過常年節近春分尚凜然驀地雲開風日好暖於南國賣餳天大都即事一資半級到銖分往往超遷越等倫除目豈徒傷道念飢寒常有幾千人薪如束桂米量珠二月中旬凍未蘇笑殺九遷金馬客半年僵卧聽除書創行敢效木求魚例進難於上坂車會取一陽潛九地春來葭琯氣舒徐燕都萬壽宫有梅一株每歲移置蔭中逮春仲方發藏今年得花滿枝雖氷姿的皪香色髣佛終強顔也戲題二絶以自况六仙家有術解藏春蠟蒂雖融凍尚皴若比百門山下見強顔還似聽除人氷姿難倚暖回根人力封培氣始伸蓓蕾看來雖勉強一枝猶冠漢宫春時進獻東宫即事無著必須循體例有依便指是人材區區桃李栽培手恐負東風一例開朝鐘暮鼓惜蹉跎有例臺除半歲過不是馬周無伎倆翻來覆去幾常何都尉王晉卿畫著色山齋圖坡仙寶墨妙通神都尉丹青要擬倫欲識淡粧濃抹意髻鬟渾似鏡中人半生翠繞與珠圍不為槐根夢已非老去紛華心自得筆端時到野人扉惠崇蘆鴈圖雪灘風竹映寒淡水宿雲飛未易雙不似鴛鴦沙渚暖翠紅相倚睡春江小桃小桃開徹淡煙脂不出初春未半時二月朔風吹石裂依然憔悴簇枯枝梅粉飄零栁未煙一枝春色獨當軒今年盻得紅苞拆風雪禁持第幾畨清明莭近無旬日桃蕾含芳又幾朝今日簷前看春色一枝才見褪紅椒題日者詩卷侯鯖熊掌味能甜舉丗看來意欲兼不似君平安素履一爐香燼靜垂簾蔡琰歸漢圖明妃光寵照龍沙枉説琵琶憶漢家去住兩難心最苦就中哀怨是胡笳和劉仲修見示十首今歲餘寒過往年東風無奈雪花顚幾時不禁燕臺酒蹴踏陽春醉十千野鶴昻藏本不羣剛同秋隼下翔雲近年轉覺謀生拙半仰公田半賣文舊城行出入新都驛劄堅求硬聽除馬上相逢還自笑背行今見兩茅廬老成生臺多少開花不識名列朝班不厭紛久踈鴛鷺入行分迫年借就袍笏喜向龍墀拜聖君滿紙新詩説逺遷淮西依例住三年若從清議先才恐不多時又著鞭先聲光動弩臺春入手行司又一新長記髯兄相眄睞一官同作兩淮人角霜稜兩劒寒瘴煙都上筆頭乾十年搏擊秋風裏蜀棧盤空不覺難月旦評中見壯圖不應齊魯揔真儒别來又嚼氷霜健筆鋒銛似董狐屋燈清語夜闌一杯長記浣離顔朔風半夜驅車去詩在寒雲石嶺關東風剪剪送春寒望望田家惜雨乾無事在家貧亦好有心行道古來難虎豹九關圖九重關鍵錦斑圍蟣虱微言詎可知首闢四門明四目定書深意見宣尼春夜獨坐閃閃寒缸照夜昏眼中時事不容論近來鼠輩欺人踏碎承塵似馬奔寒冷似深冬曉日空燒海色紅一樹伴人憔悴倚東風梁園節序不相饒正月𥘉旬凍盡消長記東墻微雨後一枝紅艷杏花嬌風物悽涼近禁煙敵寒無酒客衣穿楊花揔道多才思撲亂春衫不當綿細草根深緑自叢山桃含凍尚能紅垂楊可是寒欺得半為刳中半蠧蟲鞭石圖洋海求仙已渺茫又鞭羣石駕飛梁帝功不出仁和聖罔念元來便作狂檀州門外觀隰河春水西山諸水頗􅔿淪合入渾河不自存昨見春氷才泮處滿川都作濁流奔二月草八日端門街觀乘輿還宫龍煙日暖紫氤氲春水回鑾萬馬奔纓杖逺揮清蹕後漢儀光動御天門麗日紅翻御路沙青山回抱漢宫斜吾皇遊豫諸侯度縱使都人看翠華看一作望年年原廟薦駕鵝春水秋山例一過安得救時姚右為靣説湯羅導鸞旗逺玉輦髙象鴐雄賜異不賢思得鎮國寺觀迎佛九曜趍降丗聖尊象車香滿綺羅塵人傳此技中宫製上下雙輪轉十人漢成帝幸張禹第宅圖王氏當朝久惡譁幸回天鑒絶萌芽恬然不主天人斷長恨安昌負漢家孔子曰政事惡譁而善肅出李石博物志與叔謙太常論書翩翩每愛太常書姿態還同靜女姝儘是淡粧宫閣樣豈知東抹與西塗桐過間話味何長字字顔書入品量握手正當吾意處畫須圎徑體須方近年書學果誰優説道寥休有悟頭意態偶從驅字得千金駿馬倚山丘一段殘槍路偶逢開爐便作鏌鎁工君看王趙凌雲來自浯溪慘淡中鵬雲九萬平原筆望望蘇黃甘下風誰為南唐金剪手敢將田舍比顔公篆隸中追三代古風雲重䇿二王功遺山不見裴旻帖枉著雲臺詫米雄雲蛟家廟駭盤拏著作姿容隱畫沙後丗若從書法論混淪磅礴是承家將軍愾敵鋭於虎舍豈能為必勝哉今日遺碑見筆英姿颯爽漢雲臺天山飛將指裴旻書到吾顔逈不羣不為䇿勳陳至今冠劒氣凌雲朝敘卑髙倒屨冠寓書還等義方彈一緘遺草蚓千古狐狸照膽寒檢校秋官祿食囏顔宗收養半煢鱞當時米秉無多惡李相因書重泰山小楷東方出右軍丹青難寫是精神孔門弟子多才藝有若唯能肖聖人次山歌頌漢文章書到磨崖日並光具眼鹿菴曽有語筆間元氣揔三蒼蘇冤截耳殷姑節詈賊天津是夫兄斷壁幾行移帖九泉相值死猶生雜詩野人家具取宫中適用都輸瓦缶功君是荆嵓瑚璉璞得來才待費磨礲較量暮四與朝三初不多爭讓愧慚戀戀不成丹闕夢劒南才了又湖南夢歸故國蒼茫外春老風沙慘淡中辛苦西臺臺下柏不成還作栁花空昨日清明塵障靣今朝上巳却晴明老天氣候𥘉無定敢倚虛名作實行人家構室要帡幪小木枝撑易作功汝是連雲棟隆物得來才費梓人工萬壽宫芙蓉杏花三粘瓊島露筆穠迸出高枝見化工不著上林春色底粉香吹滿步虛滿意春寒強自妍一枝無葉更瀟然莫誇百葉玲瓏巧輸與垂楊護暖煙活色生香貯好春橫斜燈影似梅君多情唯有東墻宋夜夜幽窗夢彩雲閙簇生紅滿故枝今朝看處雪離披一春幾日風光好素影幽香只自知徽宗畫周靈臺圖靈沼臺高倚碧霄當時魚鳥被恩饒可能積德千年久盛丗看來僅四朝徽廟初年布政優丹青揮灑想西周其欲橫流后花石綱船墊九州秋澗先生大全文集卷第二十八
