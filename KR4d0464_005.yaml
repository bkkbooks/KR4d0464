  text: 秋澗先生大全文集卷第五
  hash: sha256:cdbe47c064e4ac1bdf34e263a27701103bb125a93fb513322be9f6088b6784c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_005-1a}
body:
  text: 五言古詩和淵明歸田園庚寅冬余自閩中北歸年六十有五老病相仍百念灰冷退閑静處乃分之冝辛卯三月十七日風物閑暇偶游溪曲眷彼林丘釋然有倦飛巳焉之念城居囂雜會心者少因和淵明歸田園詩韻以寓意云寡智空樂水便静思潜山性旣時與捩况復迫暮年邇者事逺役冐渉江海淵意令不家食餬口湏閩田因之委順去強顔官府間道逺䇿疲蹇跬歩鞭莫前天幸脱覊靮放歸埛野煙郷曲喜我至迎拜衣倒顚雖云有限軀且遂未老閑一洗矯拂性俯仰從天然教授晉卿旬月間連失三孫子孫續吾後上継祖與先何家無與奪與奪非我偏壽夭况彼命賢愚亦偶然生者撲不死死者捄不全又諸囝屬夭折皆債冤不尔造物戯欲見不測權所以逹觀者怡然於其間死者不深嗒生者不溺憐東野昧此理悲歌淚漣漣負我十年恩此豈逹者言延陵合中道失子亦悲酸掩坎三匝去一慟不復澘曠懷聖為取情鍾丗所嘆懼傷吾子和為擬昌黎篇響板辝笙篌雜筝琶悲篥合蕃唱喧然一堂間餘音胡得抗紅牙掩自無按拍喜時向響板出新聲激烈極清亮都來三臠木手拉若尔壯逺疑啄木禽扣户何畢剥近驚老􅔏喙頓齒振林壑劃然透空去夜静秋成柝方能節衆音乃見終始作我本幽吟人避喧便淡泊奈何将兩耳聽此終日聒君不見陶琴無絃趣有餘子㓜鳴歌死哀樂海㺜海氣發異産兹㺜丗無䨥壅頥滿脩耏𬒳體紛竒狵睛黄猱玃古喙促歇獢胮斗尾纔尺許直立森幢幢跳踉顧自見喜極狂莫降夜風動庭草狺吠聲尔哤不近穢與惡不竊鼎與缸勢猛性乃馴見罕人多􅋏有時威見齒迫視防嚙撞東坡詠烏喙量移逺蛮邦喜公得北還渡險無濤瀧此犬從閩來氣骨不喙胦厭随呉獵陸喜逐龍移龎伴予水陸行足輕音不蹵導予爲前驅健迅逾駿駹辝炎得吠雪寢處不夢江堂無紅絲罽欄有碧蘚樁繫之護燕几足以增雄厖戀主義不爽傳書心尔悾作詩見物性寄傲倚南䆫和曲山遊澤宫感舊詩廿一韻三代闡頖辟菁莪育英材六經治平具致澤需吾儕君看弦誦堂明新掲横牌新民果何事五典惇克諧平生勉勵心雖老時徃來名存到實忘過者冝興哀上行意固盡下効理或乖文章将相科勳業麒麟䑓倚席了不講若人安取哉文憲日如綫逝者不復廻嘗觀亡宋學丕冐江與淮考亭泊西山兩公生海隈天遣闢異教不使為妖災前年拜遺像鑚仰心徘徊文明麗東南淵源公所開至今號多士翺翔與時偕甞思萬有選細考勲與階青絲不素養格例空崔嵬棟梁胡可得摩挲到莓苔萬貟備兩紀一夢南柯槐此説誠至論忍使空學齋人微喙雖尺有言䡖薄埃畎畆不忘憂念之傷老懷韓晉公畫蒼牯出水圖蒼牯水所憙泳游溪水中物情便所適頓立不我從但見鼻吻長可知力挽雄小大制有法驅牽任此童東臯夜來雨催辦耕稼功一飽頼爾力髙廪歌年豐畫師亦敦本大意與訓同用五代刘訓指水牯為黒牡丹事吮墨变花賞指為洛花叢妙哉韓相筆逺意老明農唐鸞正面孔翠鵉弄丹青思入造化窟平生雀冩真多作正靣筆圓張金花扇逈與鵉彩匹暖圍姚魏春翠射琅玕碧瑶池百丈鏡顧影時自惜峩冠赤墀間朝午見孤立年深粉色暗元氣悵猶濕逺來米家船復出王涯壁髯温玉䑓後素有書畫癖一見易以歸不惜金與璧繄君具眼士鍳定能亊畢竹亭展觀餘異夢憶疇昔當時文字祥其應在此夕琅山廿九年冬十月廿九日北上過保塞馬上賦太行西南來萬馬騖東北奔騰走蛇陣一春千里碧夸娥負𥙷餘弛擔於此息神功見天巧削出千仭壁亭亭十二峯上與霄漢逼髙張巨靈擘羅列黒帝戟枝撑圎蓋傾間映落景黒或云琅為郎説是郎君石物類無不偶逺與巫峽匹不尔氣変常萬化無定質巨細一㮣觀何異瓜駢析天機我偶泄山鬼中夜泣萬石鎮雞川亦可稱峻極望黄金臺有感樂生與郭隗儗徳非同儕九九乃小數正可訓提孩樂生復國讎強齊捲輕埃燕昭師事隗竟築黄金臺我思賢王心要罄𥘉始懷在昭固至徳賛襄誠衆哉卧龍以力食躬耕亦堪哀昭烈昧三顧孔明甘草萊一語萬代譽正獨龎公開鳯凰巢千仭一舉出九垓翺翔覧徳下千年能幾來捄時不易得况復管樂才毅然好賢心無為古所咍和紫山題觀音堂山石詩韻彦良馬君索賦我行滏水陽思有登臨舉佳處得一遊不計寒與暑盛聞臨水間猶是鄴西圃山滋與水潤不識田家苦隂壑閟靈景石林氣清楚又云龍洞水清可濯纓土我無適俗韻樂與泉石伍此行應旌招敢覬煙霄侶閑雲本無心安取濟時雨紫山知幾人夢覺邯鄲黍題詩見歸隱眞隱果能否作配不自量𢋫此山石語張鵬飛治虎骨爲鎞挿作詩以贈張侯骨鯁士志節何誾誾英發見早歳智效今埋輪赤手搏於莵脱略狐狸群今復切其骨整此烏角巾持贈壯我氣能復冠惠文吾老無所用胡爲走踆踆忝落麟鳯網或可解紏棼一薦不可負上有文思君倘遂寸𥙷去所得亦己殷要當簮此挿醉看西山雲淵明漉酒圖為表弟韓雲卿賦晉人尚放曠不受覊與束虚髙失之傲降志到自辱淵明性眞率順適無矯慾清風凛一時千古仰髙躅得錢送酒家况我新醸熟渇來夢吞江奚計巾一幅有槽不待壓露頂手自漉清濁即聖賢併欲貯吾腹悠然對南山夕鳥送以目還我浩浩天丗運任伸縮冷然風度林澹若雲在谷俯仰霄壌間出處一徃復過此設有論正為蛇畫足宛轉出新意便可激流俗不思皇上人方寸許撑觸欲求先生心用意不當曲縱使欲自况此老烏可黷吾言誠漫與得酒且兀兀有懐雪菴禪師雪菴圎通士我非方外人毎來扣禅扉坐暖蒲團春有時論書翰兩耳聞未聞自笑以技進斵輪非郢斤吾學師所知師傅吾所珍擅書三十年臨池墨􅔿淪乎提八陣法論入三昧神功多懸誠骼勁擢平原筯蹴踏龍巖癡髣髴黄山眞何心山隂鵝不計羊欣裙興來追醉素堂堂張其軍驚蛇雜走虺入草猶龍奔縱横與捭闔真積力可臻具眼丗所難雪菴洞無垠道存見目擊靉靆知見薰孔竅灑有開滌我胷中塵十年風馬牛茆塞未易耘去冬喜北來将謂晤語頻逺遊乆未歸此抱将何伸懐人叙游藝愧乏昌黎文何時太行道梯空下秋雲李庭珪墨墨龍奮晚唐五李相繼出林林歙溪松黒入太隂窟老奚綰天機萬竈出玄笏松身玉質堅走研風肅肅神爽􅃮點光湛湛童子目二者旣得兼髙名宜擅獨妙劑秘千古何有遇與谷埋馨六經笥漏網龍在陸横罹相國阨復值永寕酷殆及宣和間千金購無復郁郁蒙城田文獻丗相属香林秀孫支善継踐芳躅傅家無長物寳此一寸玉客居大於斗豐潤蔀華屋阮生幾緉屐舜楽一䕫足公餘日摩娑寕使食無肉古人不復作精絶見此物傾嚢任借觀不許一磨倐田郎固淡僻清賞儘不俗書生臭味同徃徃溺所欲吾家眉子歙隱隱脩娥緑客來恣濯玩亦弗容少黷墨不知研良硯不沾墨馥譬猶藏書人終歲不一讀挿架徒好觀新若手未觸相看兩癡絶一笑為捧腹贈承旨唐壽卿論士湏詣實相馬先其神周秦何貴賤変化存吾身唐侯金閨彦動有鵉鳳馴飄飄瀚海翮上拂明月輪憶𥘉識君面轉盻二十春朅來客京師君為玉堂臣時於管中窺班班見其文髙適四十詩便與作者隣青紅桃李埸夭葩散竒芬有徳諒有言君侯性誾誾最愛發䇿際不迫意獨臻理明中事機士氣借以氲重念朋友交敬毅多不倫或者一顰笑意在交相因令人氣最短標置分畦畛愛君略城府吐詞爛天真不作崖異奉不學游説秦信厚等麟趾為人解絲棼所以多士間堂堂張吾軍蹇予自結髪汎愛而親仁當其立事歳亦復求蠖伸長風萬里浪蹭蹬無縱鱗今雖老伏櫪尚友心猶振都城交游海因依幾當親如君辱識乆辨與陪翔麟人事有乖合對靣如離群徒從樽爼間一笑傾冠巾只今友道衰耐乆將何人相馬論其力取友非所尊天機到没㓕君今九方歅心期旣有在形迹不必云因題樂山詠聊書代吾懃成徳堂詩卷蹇予客京師詩卷曰交至此風近曰長珍饌互相餌張君􅌟新堂乃以成徳示再拜來懇予一言願明志成徳以徳成何翅餘愷悌徳者得於中行巳見於外是乃君子稱實為聖賢事一時扁之者無乃躐等第大朴自六鑿衰俗日零替剽竊糟粕餘色取仁為利遽然以兹名豈速滿盧意我開入徳門試說第一義厥修貴有𥘉主敬聖不易孜孜先此念懮入匪難致収功心日休不匱将錫類㑹見堂中人事業稱不噐題趙文卿嘉山詩卷徐公序嘉山衆美掠巳竟復徼諸公作落筆先漫應我雖乏新意不為蛇足賸文卿慷慨士意氣掩趙孟識君二十年毎對豁滯興談噱傾底裏議論老能正以儒乃毉名以毉實儒行誰為幽并豪虎変伏延炳先賢去丗逺一氣猶包凝蒼蒼嘉嶺山玉立想照映士㑹悚秦䇿宣尼善衛磬我常登汾睢西眺河山勝延安東北秦得士敢小鄭彼嘉宜降神英物復趙孕儒毉有顕道孝愛發天性惟其嗇世用裔逺有餘慶㑹生甫與申駟牡擁髙乗我詩匪䛕辭探賾神理證有子教讀書服此恒起敬東征詩東藩擅良隅地曠物滿盈漫川計畜獸蕩海驅群䲔盛極理必衰彼狡何所懲養虺得返噬其能遁天刑逺接強弩末近訹乳臭嬰一朝投𬒮起氊裘擁矛矜天意盖有在聚而勦其萌荓蜂有螫毒大駕湏徂征寅年夏五月海甸觀其兵慿軾望兩際其勢非不勍横空雲作陣裏抱如長城囂紛任使前萬矢飛攙搶我師静而俟衘枚聽􅎏聲夜半機石發萬火随雷轟少湏短兵接天地為震驚前徒即倒戈潰敗如山崩臣牢最愾敵奮撃不留行夘烏嗢都間天日為晝冥僵尸四十里流血原野腥長驅抵牙悵巢穴已自傾彼狡不自縛䑕竄逃餘生太傅方窮追適與叛卒迎選鋒不信宿逆頸縻長纓死棄木臠河其妻同一泓彼狡何所惜重念先王貞擇彼順祝者其歸順吾氓萬落脅罔治無畏來爾寕王師固無敵况復多算并君王自神武豈惟廟社靈三年哂東山殪戎營栁清都人望翠華洗兵雨何零長歌入漢関喜氣欎两京小臣太史属頌德職所承雖非平淮雅動盪耳目精赫赫桓撥烈仰之如日星此筆為紀述發越吾皇英召穆羙常武且莫誇雷霆覔風字歙硯詩贈侍其府尹硯本發墨具不爾安用他碧紫暈鸜眼黝黒深宫鴉彼端類髙人風姿固云佳逺韻不少吝清談浩無涯但於當機時未免思棼拏若或砥礪用茫然手空义硬則墨爲褪軟則磨泥沙惟歙士之傑躰性何交加羅紋與刷絲一寸皆可嘉囘視端溪公有名實則差新安山水窟澤大生龍蛇舉丗𬒳其利何有蛭與鼃山髙溪水清其芒例如碬甞聞右軍硯風字琢手奢是名爲水箕朶頥駭晗呀松煤燼無餘惟恐中書了池寛水瀰漫挹彼如尊洼陂陀浸半海揮灑生雲霞平生未甞有夢寐江之涯君今去爲邦過此空成嗟包公尹端州歸不一硯拏彘肝類安邑一笑春生華書生乞索態殆是心貪邪禰衡溺所愛竟摻漁陽撾今冬與來春㑹有泛斗槎雄雯或雌縵分送張華家十月牡丹彰徳路監郡完閭嘉議治甚有聲壬辰秋辝職譲其叔也里不花中順是歲冬十月新侯府弟發牡丹二本明年秋計吏伯耕香林先生孫不逺千里來求詩於翰林諸公因首為賦此玄冥氣折膠草木餘萎悴鄴城樂土郊畫㦸清香地誰留翠𬒳暖小試丹砂藝一枝鶴翎紅照映朝𫀆貴散彩氷雪中造物有深意正縁二侯賢撫字見早歲藹然禮譲餘涵蓄坤靈秘歐九譜花神百種第佳麗洛花固芳妍根盛氣或異春華復冬榮彼祥端可記無乃後來者踵治更和惠雖云有淺深錫類由不匱奚煩鍳傍州一段中和氣慇懃将二羙千里偕計吏遍求翰林詩擬薦金盤瑞我欲論五行推測渉茫昧浩浩二氣中事或有関繋重榮說紫荆偏反詠唐棣佳花元致祥惡草終可畏未若中庸篇継述皆自致栽者即封培傾者随覆墜由來衰盛間爲善不中廢曰善即胡為不出讓與悌神明與扶持聲譽日四至君能馴是理獲利餘百倍何翅天香臺卿雲摛四季送范葯莊子楚教授嘉興范君號葯莊杖屨屢來謁坐間話行藏曾是憲幕客投我詩一編細嚼讀恐徹詩從晚唐來髙風日凌折君才何清峻略不見萎薾渾涵中州氣佳處每撃節朝來又相過喜色浮兩頰廼云子楚軰得調官兩浙南歸行有日一舸赴呉越􅈤予送行詩我畧為渠説路教然冷官佀緩係實切化源開兩庠彼秀冨才傑朝家急得賢訓勉冝屑屑一門在清流聲譽儘昭晰君雖客京師破帽幾風雪兩椽省東墻一片江南月覊栖思不無相視為一豁君歸稍如意晝日抵三接何俟老夫詩長路絢行色贈大同利彦祥名翥西域人金天一氣皛以理廼為義兼包軆用言藴蓄和與利弘居大同東去都為近地風塵雜四方豪貴猶大魏聖賢貴有教𥘉不限氣類彦祥孕金皛用雅変華裔歛祍昨過門偉矣髯郷麗開談一老生略不見本氣諒知六合表固多瑚璉噐示予野齋辭把玩愛不置丹青寫虚影經史含至味舎此或與彼恐墯為善志同将與進心更擴讀書意周邵兩邠産文獻垂萬丗由余出西戎斯也以賢議吾賢即能賢此論古不易守之有餘師何俟吾言贅贈筆工張進中字子正書藝與筆工兩者趣各異工多不解書書不䆒筆製二事互相能萬頴率如志進中本燕産茹筆鍾樓市雖出劉逺徒妙有宣城致我藏一巨弗用乆等篲弊授之使改作切属鋒健銳䟽治近月餘去索稱不易先生莫促迫致思容子細中書不中書安用從新繋朅來歘見投入手知利噐文房三貴人刮目喜相視正縁兩資藉辦此揮灑技吾錐元不銛甘分置散地馳騁翰墨場又匪老人事不辭束縛坐但愧簡拔意子正來索詩一笑吐吾喙束老豪頴辭遂擬徘為戯送張㓜度倅冠州前年走京師忝與北海薦白首官詞林意若遂少願雖非玉堂人幸接金閨彦供奉得張子為人良可羡豈惟文字間辝理見兼善言行兩無擇容度升回轉温純韞櫝玉樂易不崖岸何心與物忤有問即氷渙宛如鵉鳯姿肯作麒麟楦相看二載餘謹若𥘉覿面朅來過門别新除得倅冠坐乆兩不懌去住相慰浣我心愛莫留官属亦深恋其如行止何物情復多變鑾坡禮文窟一任儘清䆠古人貴任運况去有三便家近得侍親州孤無劇辦請益願一言偏倚時揉錬我忻聞其說解事語不漫常思歐九說可為後來贊摛文止潤身及物自貞幹休辝米塩碎莫厭衙起晏不見忠献韓鼎鉉出推判行俟官有程民事不可緩遊嬀川水谷太玄道宮迎謁次媯野将為旦夕間尚餘百里逺却得三日閑追陪玉堂翁清游指仙山窮秋草木盡諸峯慘無顔兩崖蓄餘暖嵓樹如春妍洞口疑有光望中巳欣然始至覺夷曠稍深更幽寛山英喜客來夜兩濯翠鬟層巒與疊巘供我柱笏看雲封石上鉢𥘉大道酈五祖者迯難此山衆追及弃衣鉢石上而匿其物重衆莫能舉異焉遂請主其教今道院盖酈所創也玉漱山腰泉灌漑滋樹藝一脉窮湾環西臺頗峻絶兩折躋其巔詩翁見精徤登頓不作難䃲礴􅏮莫留松風吹袂寒降阿集晴䟽髙談渺孤攀山荒苦無稱似待新詩傳諸君垂槖來稇載風煙還因公得勝賞此詩其可諼但恐雲霞舉暮景去猶慳我非桓野王今識東山安題筠菊亭有客昨過門挾卷携酒壷我老厭人事汝謁将奚圗自云有老親倦游樂閑居終年築亭圃筠菊心所娯二者諒㣲物一日不可無餐菊制頺齡種竹來鵷雛牀頭幾葉書随意日卷舒欣然有所得擊鮮忘朝晡脫畧少年事呼鷹走韓獹治生不求冨教子供讀書近随計吏來一命沾堂除南歸不徒手豈計巴與俞眼中倚門親慰浣當何如瞻烏噪軋鵲過户懸蟢蛛竹色動虚牖秋香滿庭隅計量到家釀小槽滴珎珠江山漢隂國耆舊稱名都從今王氏亭而與吾孟俱題為五字詩稛載樂有餘路教為再拜歸當榜吾廬陪張右相祭奠司徒忠懿公墓元貞元年歳乙未夏四月九日王城西北郊有山曰盧師崗逺見蟠互野曠欣平夷我甞以事來旋軫思遲遲匪縁蛇虺靈不羡風煙竒有懷徳育公攀附随潜飛一朝際風雲振燿生光輝我𥘉拜英表冨貴非公誰内焉豳國助上焉兩宫知孰云恩澤侯以徳中自持近侍足恭謹接物餘謙撝由家化而國在理乃所冝及夫司徒公衍慶尤熈熈再丗保傳功大書見豐碑神龍襲九淵奮起湏鱗鬐伊公漢大横庚庚隱天機歴數旣有在大噐将安歸君王自神武監撫非細微寳章猶傳壐啓沃貴知幾堂堂忠愛心畫此廟社規其報冝伊何子孫保無期倐歘三十載山丘兩巍巍生死固常事盛衰有足疑昌黎銘殿監所以含餘悽我老自多感黄鳥聲正悲駐車不忍去日下山煙霏書日者卷後稔聞日者名不識詹尹靣共云推未來符驗如契劵因之求題詠有學難自衒郭生序巳詳奚待余眷眷雖非青嚢翁嘗讀季主愽為憐長沙傅三䇿動漢殿及夫行藏間而抱不遇怨絳灌夫何為藝能上自羡弗思前席夜有舌不少嚥况彼倀倀徒能不逐利轉正真神所與言行士之觀悔尤兩克寡禄秩中自辨宣尼敞亨衢天理不吾謾山人有來問此語告無緩庶刳萬有心一聽三聖断題張氏先茔記後禹城張氏先起跡自農伍力田與孝悌内助出賢姥夫婦人倫常松竹表寒苦柔姿不易立流離復囏阻隻影携孤児避地韓城隖飢寒児不知採拾治絲縷訓育至成人衣食能自取去著仙人衣春風三十許若将終其身一室老環堵天其表媪慈再丗沾煦姬蔚為庶門清在野不多覩南薰吹棘夭衣冠見楚楚子然九齡迪信厚稱幹蠱或欲以節聞顧視為告語近名道家忌此事莫予吐夫家已不幸在我分當處里南築幽栖竹木映庭圃還我浩浩天香火湛靈府晨昏省定際迪也禮容與一朝委蛻去神光照東土我紬石室書逸事湏丗𥙷國𥘉迄元貞莭義幾人數豪族易昭晣里俗多草腐况保晚節難徃徃変所素猗歟望亭君雅志遂𥘉舉凛凛百年間毫髪不少沮竟續所天家時祀苾籩爼豈唯勵衰俗清風激千古裁文為歌詩流詠遍齊魯送張勝非任汝寕府判汝流漾玉虹望入東南楚雲連懸瓠城形勢見今古有卿以龍名旦評擅諸許山川氣不易舊蔡変新汝名芳土亦馨理在物争覩張生太史属三載戰文圃開朗中有爲一変至於魯朝來得新除破甕起欲舞踵門來告别一言求小𥙷試將吾巳行聊用勉君舉吾年四十餘彈冠判晉府通宵思闕遺未明聽衙皷上焉事官長下焉宿民苦簿書雜米塩塵土與相五杭容不少倦公散日常午任責在人先見得思義取争輸公堂益不惜寸心吐堂堂五十城利病繫區處心平知所宰有衆孰敢侮御吏至束濕未省聽渠主最怜絳陽獄五歲閉幽圄一朝得其情乆旱霈尺雨當時官府清至今傳好語伻來一宴過蓄縮畏於鼠正縁中省嚴經制得其所後來府無人所事盡乖忤官寮自兹壞政荒歲飢阻每用誡平生艾服絜其矩皇家重師帥爵禄不輕與汝寕本寕尔未用厭勞拊聲華月旦評粲粲珠還浦𥙷缺公與卿去去力當努壮心横落日髙歌當梁甫壮士吟題郝奉使所書手卷使節駐淮海人望兩好熈宋人足変詐觀望占成虧不知破武事中伏混一機壮士死則巳不死将有為宋琚凜風槩天馬不受覊拘隔一舘間激之見連鷄事乆変乃生勢去心恫疑奄奄十六年慘悴甘湘纍内閧旣首䑕外侮宜紛披盛氣屈使降壮心終不移睨柱欲碎首忍見王人微松嚴操愈厲草緑秋更萋蕭爽隱霧豹脱略觸藩羝老賊主一殺幽憤将何施庭芝一援手所昔良不貲兵交使其間天理或可期于卿才属國所報亦以卑至今郎山塚突兀空蟠螭两行清汝帖只有老天知送徐平叔還廣平因次其韻全趙古多士祇服見吾琛我生自有命其肯枉尺尋結交半豪右翔集依雲林當年平津閤箕冠明月簮乗時頗展翼天髙氣横参談詩似高適走翰驚陳琳忽騎将軍馬縛賊虎穴深嚮耒三數公朱絃得遺音長劍一樽酒灑落開雄襟自笑我何有踵門來載臨䄂携長沙書囊乏魯連金白髪老親健晚境毛義駸時清渇明略友義多同衾躬耕食不足從仕力儘任秋風吹易水㳺子動歸吟深藏會有待莫負平時心題焦節婦卷後焦氏有賢女姿禀與衆殊旣笄樂貧素出嫁南征夫一朝聞卧病尋訪邊之隅怙恃力眷挽在妾夫何如竟能遂𥘉志扶䘮歸里閭朝昏事蚕織恭侍舅與姑百年終孝養葬祭何勤劬拊畜两孤㓜嫁娶禮與俱孫門固衰謝頼一貞節扶夫婦人倫始因之変時汚一端青縠信至死誓不渝采詩論國風彤管冝沾濡誰謂閭閻間凛此風烈媰猗猗谷蘭馨落落青松孤豈惟表門闕抑備太史書逹卿昧平生容齋文可娱美節冠東州亦用播友于清風振孤標讀者冝嘻歔送許澹齋提舉隆興學校我𥘉入玉堂喜識淡齋面忠翁两朝士極口爲稱羡子逺東嘉人文綵金百煉妙年登巍科巧宦歷幾遍風儀聳四筵目光雙烱電前年來京師得遂依劉願校書天禄閣音吐見雄辨長河瀉建瓴洒洒江在傳三釡固禄微一官争鶚薦行李日覊栖猶是多士冠今來得羙除提舉江西彦在呉列朝行客燕領詞翰洪都儘經學文藝業多擅好将鑄顔手主善志無倦習俗與命脉風雅爲一変江煙送行舟瀟洒離亭餞清吟代驪歌别思空眷恋依依鄉國情去逐南飛鴈我老歸未得松菊夢秋澗衣冠拱清朝粲馬珠會弁自慚老無能零落秋風扇君行重感槩黽勉磨鐡硯長江控髙閤百丈驚井幹梅花散春妍蒼煙開禹甸江山有清眺風月興不淺南昌地卑濕衆流争湊衍去年水為灾孤城江四轉兒童化魚鱉萬竈産鼃黽慨然為開陳此事豈小便一􅓩濬東湖澄江静如練淡齋素有為肯遣空懐卷觀臺鄕劉氏瑞蓮遥遥觀臺郷近接魏西圃風來紫陌香臺傾金鳳去繁華一夕空風物猶可據劉君號素侯林野敞亭宇貯藏物外春中有百花隝池開一泓多雲錦漲秋渚亭亭玉井花十丈氷絲北一茄十三蘤秀發廼如許輝映天泉淵飄洒横塘雨風流似六郎澹豔疑静女髙情太極翁愛玩吐竒語根植汚泥中香韻儘容與褰帷對佳麗凌波看微歩煙霏動簾櫳漢女出歌舞當其爛熳時固巳表䨥舉豈惟見家祥分秀孕先母重臺與㕠頭連莖同合跗封章稱嘉祥夸者徒媚嫵由來草木蕃造物不予侮氣和物自盛事異未之覩百年霈遺澤宅相煥圖譜君家邯鄲望馬服廼鼻祖諸郎藉餘慶雋拔一何楚起家漢賢良接踵泛蕖府一門集清芬嬋姢冨簮組為君續夷堅作詩劖石皷滏陽有石皷山蒲城行効韋蘇州体示異姓弟喬百順蒲城今樂郊兩翁處東西相别二十年顔鬢䬃以凄加飡似平時捨杖矜徤移置酒前拜壽喜定垂涕洟擁膝侍終日念不共提携幸有聶與喬治生事鋤犁云誰知異姓一作派孝養日孜孜雖違心獲安慰我悠悠思官書促前去望入雲林低黒山秋霽我度居庸關天峽四十里巉巉積鐡色兩勢蒼壁倚何由剷疊巘一撮峙燕几長令㓜輿心喜溢秋壑底朅來遊京師訪友棠隂里入室得兹山欣躍倒雙履携歸坐卧觀論列忘兩紀黒山凛氷尖玉色何粹羙連峯卑髙陳夾嶂蹊逕逶逺勢走脩坂秋骨濯清泚絶巓蒼窮盤哀壑太妃圯竒状出天然弃墨妄模擬又如草間虎怒伏驚獵箠昻頭入四顧徐起妥蒼尾書生眼孔曠百見心未巳不為此僝顔照映横玉壘烘香作怪供揚觶問山鬼不知天壤問􅥵刻此能幾魁岸状木假甲乙弟湖玼逹人有大觀太華拳石厸曾為物外誘沾沾抱徒喜屹立萬物表景行世仰止詩成贈山主我豈鬰林齒巖棲未有期對此聊尔耳大開致爽軒柱笏約吾子秋澗先生大全文集卷第五
