  text: 秋澗先生大全文集卷第五
  hash: sha256:cdbe47c064e4ac1bdf34e263a27701103bb125a93fb513322be9f6088b6784c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_005-1a}
body:
  text: 五言古詩和淵明歸田園庚寅冬余自閩中北歸年六十有五老病相仍百念灰冷退間靜處乃分之冝辛卯三月十七日風物間暇偶遊溪曲眷彼林丘釋然有倦飛巳焉之念城居囂雜會心者少因和淵明歸田園詩韻以寓意云寡智空樂水便靜思潛山性既時與捩况復迫暮年邇者事逺役冒涉江海淵意令不家食糊口須閩田因之委順去強顔官府間道逺䇿疲蹇跬步鞭莫前天幸脫羈靮放歸埛野煙鄉曲喜我至迎拜衣倒顚雖云有限軀且遂未老間一洗矯拂性俯仰從天然教授晉卿旬月間連失三孫子孫續吾後上繼祖與先何家無與奪與奪非我偏壽夭况彼命賢愚亦偶然生者撲不死死者救不全又諸囝屬夭折皆債冤不爾造物戲欲見不測權所以逹觀者怡然於其間死者不深嗒生者不溺憐東野昧此理悲歌淚漣漣負我十年恩此豈逹者言延陵合中道失子亦悲酸掩坎三匝去一慟不復澘曠懷聖為取情鍾丗所嘆懼傷吾子和為擬昌黎篇響板辝笙篌雜筝琶悲篥合蕃唱喧然一堂間餘音胡得抗紅牙掩自無按拍喜時向響板出新聲激烈極清亮都來三臠木手拉若爾壯逺疑啄木禽扣户何畢剝近驚老􅔏喙頓齒振林壑劃然透空去夜靜秋成柝方能節衆音乃見終始作我本幽吟人避喧便淡泊奈何將兩耳聽此終日聒君不見陶琴無絃趣有餘子幼鳴歌死哀樂海㺜海氣發異産兹㺜丗無䨥壅頥滿修耐𬒳體紛竒尨睛黃猱玃古喙促歇獢胮斗尾才尺許直立森幢幢跳踉顧自見喜極狂莫降夜風動庭草狺吠聲爾哤不近穢與惡不竊鼎與缸勢猛性乃馴見罕人多􅋏有時威見齒迫視防嚙撞東坡詠烏喙量移逺蠻邦喜公得北還渡險無濤瀧此犬從閩來氣骨不喙胦厭隨吳獵陸喜逐龍移龎伴豫水陸行足輕音不蹴導豫為前驅健迅逾駿駹辝炎得吠雪寢處不夢江堂無紅絲罽欄有碧蘚樁繫之護燕几足以增雄厖戀主義不爽傳書心爾悾作詩見物性寄傲倚南窗和曲山遊澤宫感舊詩草一韻三代闡頖辟菁莪育英材六經治平具致澤需吾儕君看弦誦堂明新揭橫牌新民果何事五典惇克諧平生勉勵心雖老時往來名存到實忘過者冝興哀上行意固盡下效理或乖文章將相科勳業麒麟臺倚席了不講若人安取哉文憲日如線逝者不復回嘗觀亡宋學丕冒江與淮考亭泊西山兩公生海隈天遣闢異教不使為妖災前年拜遺像鑽仰心徘徊文明麗東南淵源公所開至今號多士翺翔與時偕嘗思萬有選細考勳與階青絲不素養格例空崔嵬棟梁胡可得摩挲到莓苔萬貟備兩紀一夢南柯槐此説誠至論忍使空學齋人微喙雖尺有言輕薄埃畎畝不忘憂念之傷老懷韓晉公畫蒼牯出水圖蒼牯水所喜泳遊溪水中物情便所適頓立不我從但見鼻吻長可知力挽雄小大制有法驅牽任此童東臯夜來雨催辦耕稼功一飽賴爾力髙廪歌年豐畫師亦敦本大意與訓同用五代劉訓指水牯為黑牡丹事吮墨變花賞指為洛花叢妙哉韓相筆逺意老明農唐鸞正面孔翠鵉弄丹青思入造化窟平生雀寫真多作正靣筆圓張金花扇逈與鵉彩匹暖圍姚魏春翠射琅玕碧瑶池百丈鏡顧影時自惜峩冠赤墀間朝午見孤立年深粉色暗元氣悵猶濕逺來米家船復出王涯壁髯溫玉臺後素有書畫癖一見易以歸不惜金與璧繄君具眼士鑒定能事畢竹亭展觀餘異夢憶疇昔當時文字祥其應在此夕琅山草九年冬十月草九日北上過保塞馬上賦太行西南來萬馬騖東北奔騰走蛇陳一春千里碧夸娥負輔餘弛擔於此息神功見天巧削出千仭壁亭亭十二峯上與霄漢逼髙張巨靈擘羅列黑帝戟枝撑圎蓋傾間映落景黑或云琅為郎説是郎君石物類無不偶逺與巫峽匹不爾氣變常萬化無定質巨細一概觀何異瓜駢析天機我偶泄山鬼中夜泣萬石鎮雞川亦可稱峻極望黃金臺有感樂生與郭隗擬德非同儕九九乃小數正可訓提孩樂生復國讎強齊捲輕埃燕昭師事隗竟築黃金臺我思賢王心要罄𥘉始懷在昭固至德贊襄誠衆哉卧龍以力食躬耕亦堪哀昭烈昧三顧孔明甘草萊一語萬代譽正獨龎公開鳯凰巢千仭一舉出九垓翺翔覽德下千年能幾來救時不易得况復管樂才毅然好賢心無為古所咍和紫山題觀音堂山石詩韻彥良馬君索賦我行滏水陽思有登臨舉佳處得一遊不計寒與暑盛聞臨水間猶是鄴西圃山滋與水潤不識田家苦隂壑閟靈景石林氣清楚又云龍洞水清可濯纓土我無適俗韻樂與泉石伍此行應旌招敢覬煙霄侶間雲本無心安取濟時雨紫山知幾人夢覺邯鄲黍題詩見歸隱真隱果能否作配不自量𢋫此山石語張鵬飛治虎骨為鎞插作詩以贈張侯骨鯁士志節何誾誾英發見早歲智效今埋輪赤手搏於莵脫略狐狸群今復切其骨整此烏角巾持贈壯我氣能復冠惠文吾老無所用胡為走踆踆忝落麟鳯網或可解紏棼一薦不可負上有文思君倘遂寸輔去所得亦己殷要當簮此插醉看西山雲淵明漉酒圖為表弟韓雲卿賦晉人尚放曠不受羈與束虛髙失之傲降志到自辱淵明性真率順適無矯欲清風凛一時千古仰髙躅得錢送酒家况我新釀熟渴來夢吞江奚計巾一幅有槽不待壓露頂手自漉清濁即聖賢併欲貯吾腹悠然對南山夕鳥送以目還我浩浩天丗運任伸縮冷然風度林淡若雲在谷俯仰霄壤間出處一往復過此設有論正為蛇畫足宛轉出新意便可激流俗不思皇上人方寸許撑觸欲求先生心用意不當曲縱使欲自况此老烏可黷吾言誠漫與得酒且兀兀有懷雪菴禪師雪菴圎通士我非方外人每來扣禪扉坐暖蒲團春有時論書翰兩耳聞未聞自笑以技進斫輪非郢斤吾學師所知師傅吾所珍擅書三十年臨池墨􅔿淪乎提八陳法論入三昧神功多懸誠骼徑擢平原筯蹴踏龍巖癡髣佛黃山真何心山隂鵝不計羊欣裙興來追醉素堂堂張其軍驚蛇雜走虺入草猶龍奔縱橫與捭闔真積力可臻具眼丗所難雪菴洞無垠道存見目擊靉靆知見薰孔竅灑有開滌我胸中塵十年風馬牛茆塞未易耘去冬喜北來將謂晤語頻逺遊久未歸此抱將何伸懷人敘遊藝愧乏昌黎文何時太行道梯空下秋雲李庭圭墨墨龍奮晚唐五李相繼出林林歙溪松黑入太隂窟老奚綰天機萬竈出玄笏松身玉質堅走研風肅肅神爽􅃮點光湛湛童子目二者既得兼髙名宜擅獨妙劑祕千古何有遇與谷埋馨六經笥漏網龍在陸橫罹相國厄復值永寧酷殆及宣和間千金購無復郁郁蒙城田文獻丗相屬香林秀孫支善繼踐芳躅傅家無長物寶此一寸玉客居大於斗豐潤蔀華屋阮生幾緉屐舜樂一夔足公餘日摩娑寧使食無肉古人不復作精絶見此物傾囊任借觀不許一磨倐田郎固淡僻清賞儘不俗書生臭味同往往溺所欲吾家眉子歙隱隱修娥緑客來恣濯玩亦弗容少黷墨不知研良硯不沾墨馥譬猶藏書人終歲不一讀插架徒好觀新若手未觸相看兩癡絶一笑為捧腹贈承旨唐壽卿論士須詣實相馬先其神周秦何貴賤變化存吾身唐侯金閨彥動有鵉鳳馴飄飄瀚海翮上拂明月輪憶𥘉識君面轉盻二十春朅來客京師君為玉堂臣時於管中窺班班見其文髙適四十詩便與作者鄰青紅桃李埸夭葩散竒芬有德諒有言君侯性誾誾最愛發䇿際不迫意獨臻理明中事機士氣借以氲重念朋友交敬毅多不倫或者一顰笑意在交相因令人氣最短標置分畦畛愛君略城府吐詞爛天真不作崖異奉不學遊説秦信厚等麟趾為人解絲棼所以多士間堂堂張吾軍蹇豫自結髮泛愛而親仁當其立事歲亦復求蠖伸長風萬里浪蹭蹬無縱鱗今雖老伏櫪尚友心猶振都城交遊海因依幾當親如君辱識久辨與陪翔麟人事有乖合對靣如離群徒從樽爼間一笑傾冠巾只今友道衰耐久將何人相馬論其力取友非所尊天機到沒滅君今九方歅心期既有在形迹不必云因題樂山詠聊書代吾勤成德堂詩卷蹇豫客京師詩卷曰交至此風近曰長珍饌互相餌張君􅌟新堂乃以成德示再拜來懇豫一言願明志成德以德成何翅餘愷悌德者得於中行巳見於外是乃君子稱實為聖賢事一時扁之者無乃躐等第大朴自六鑿衰俗日零替剽竊糟粕餘色取仁為利遽然以兹名豈速滿盧意我開入德門試説第一義厥修貴有𥘉主敬聖不易孜孜先此念懮入匪難致收功心日休不匱將錫類會見堂中人事業稱不器題趙文卿嘉山詩卷徐公序嘉山衆美掠巳竟復徼諸公作落筆先漫應我雖乏新意不為蛇足賸文卿慷慨士意氣掩趙孟識君二十年每對豁滯興談噱傾底裏議論老能正以儒乃醫名以醫實儒行誰為幽并豪虎變伏延炳先賢去丗逺一氣猶包凝蒼蒼嘉嶺山玉立想照映士會悚秦䇿宣尼善衛磬我常登汾睢西眺河山勝延安東北秦得士敢小鄭彼嘉宜降神英物復趙孕儒醫有顯道孝愛發天性惟其嗇世用裔逺有餘慶會生甫與申駟牡擁髙乘我詩匪諛辭探賾神理證有子教讀書服此恆起敬東征詩東藩擅良隅地曠物滿盈漫川計畜獸蕩海驅群鯨盛極理必衰彼狡何所懲養虺得返噬其能遁天刑逺接強弩末近訹乳臭嬰一朝投𬒮起氊裘擁矛矜天意蓋有在聚而勦其萌荓蜂有螫毒大駕須徂征寅年夏五月海甸觀其兵慿軾望兩際其勢非不勍橫空雲作陳裏抱如長城囂紛任使前萬矢飛攙搶我師靜而俟銜枚聽􅎏聲夜半機石發萬火隨雷轟少須短兵接天地為震驚前徒即倒戈潰敗如山崩臣牢最愾敵奮擊不留行卯烏嗢都間天日為晝冥僵尸四十里流血原野腥長驅抵牙悵巢穴已自傾彼狡不自縛鼠竄逃餘生太傅方窮追適與叛卒迎選鋒不信宿逆頸縻長纓死棄木臠河其妻同一泓彼狡何所惜重念先王貞擇彼順祝者其歸順吾氓萬落脅罔治無畏來爾寧王師固無敵况復多算并君王自神武豈惟廟社靈三年哂東山殪戎營栁清都人望翠華洗兵雨何零長歌入漢關喜氣欎兩京小臣太史屬頌德職所承雖非平淮雅動蕩耳目精赫赫桓撥烈仰之如日星此筆為紀述發越吾皇英召穆美常武且莫誇雷霆覔風字歙硯詩贈侍其府尹硯本發墨具不爾安用他碧紫暈鸜眼黝黑深宫鴉彼端類髙人風姿固云佳逺韻不少吝清談浩無涯但於當機時未免思棼拏若或砥礪用茫然手空義硬則墨為褪軟則磨泥沙惟歙士之傑躰性何交加羅紋與刷絲一寸皆可嘉回視端溪公有名實則差新安山水窟澤大生龍蛇舉丗𬒳其利何有蛭與蛙山髙溪水清其芒例如碬嘗聞右軍硯風字琢手奢是名為水箕朵頥駭晗呀松煤燼無餘惟恐中書了池寬水瀰漫挹彼如尊窪陂陀浸半海揮灑生雲霞平生未嘗有夢寐江之涯君今去為邦過此空成嗟包公尹端州歸不一硯拏彘肝類安邑一笑春生華書生乞索態殆是心貪邪禰衡溺所愛竟摻漁陽撾今冬與來春會有泛斗槎雄雯或雌縵分送張華家十月牡丹彰德路監郡完閭嘉議治甚有聲壬辰秋辝職讓其叔也里不花中順是歲冬十月新侯府弟發牡丹二本明年秋計吏伯耕香林先生孫不逺千里來求詩於翰林諸公因首為賦此玄冥氣折膠草木餘萎悴鄴城樂土郊畫戟清香地誰留翠𬒳暖小試丹砂藝一枝鶴翎紅照映朝𫀆貴散彩氷雪中造物有深意正緣二侯賢撫字見早歲藹然禮讓餘涵蓄坤靈祕歐九譜花神百種第佳麗洛花固芳妍根盛氣或異春華復冬榮彼祥端可記無乃後來者踵治更和惠雖云有淺深錫類由不匱奚煩鑒傍州一段中和氣殷勤將二美千里偕計吏遍求翰林詩擬薦金盤瑞我欲論五行推測涉茫昧浩浩二氣中事或有關繫重榮説紫荆偏反詠唐棣佳花元致祥惡草終可畏未若中庸篇繼述皆自致栽者即封培傾者隨覆墜由來衰盛間為善不中廢曰善即胡為不出讓與悌神明與扶持聲譽日四至君能馴是理獲利餘百倍何翅天香臺卿雲摛四季送范藥莊子楚教授嘉興范君號藥莊杖屨屢來謁坐間話行藏曾是憲幕客投我詩一編細嚼讀恐徹詩從晚唐來髙風日凌折君才何清峻略不見萎薾渾涵中州氣佳處每擊節朝來又相過喜色浮兩頰乃云子楚輩得調官兩浙南歸行有日一舸赴吳越􅈤豫送行詩我略為渠説路教然冷官似緩係實切化源開兩庠彼秀冨才傑朝家急得賢訓勉冝屑屑一門在清流聲譽儘昭晰君雖客京師破帽幾風雪兩椽省東墻一片江南月羈栖思不無相視為一豁君歸稍如意晝日抵三接何俟老夫詩長路絢行色贈大同利彥祥名翥西域人金天一氣皛以理乃為義兼包體用言藴蓄和與利弘居大同東去都為近地風塵雜四方豪貴猶大魏聖賢貴有教𥘉不限氣類彥祥孕金皛用雅變華裔斂祍昨過門偉矣髯鄉麗開談一老生略不見本氣諒知六合表固多瑚璉器示豫野齋辭把玩愛不置丹青寫虛影經史含至味舍此或與彼恐墯為善志同將與進心更擴讀書意周邵兩邠産文獻垂萬丗由余出西戎斯也以賢議吾賢即能賢此論古不易守之有餘師何俟吾言贅贈筆工張進中字子正書藝與筆工兩者趣各異工多不解書書不究筆製二事互相能萬頴率如志進中本燕産茹筆鍾樓市雖出劉逺徒妙有宣城致我藏一巨弗用久等篲弊授之使改作切屬鋒健鋭疏治近月餘去索稱不易先生莫促迫致思容子細中書不中書安用從新繫朅來歘見投入手知利器文房三貴人刮目喜相視正緣兩資藉辦此揮灑技吾錐元不銛甘分置散地馳騁翰墨場又匪老人事不辭束縛坐但愧簡拔意子正來索詩一笑吐吾喙束老豪頴辭遂擬徘為戲送張幼度倅冠州前年走京師忝與北海薦白首官詞林意若遂少願雖非玉堂人幸接金閨彥供奉得張子為人良可羡豈惟文字間辝理見兼善言行兩無擇容度升回轉溫純韞櫝玉樂易不崖岸何心與物忤有問即氷渙宛如鵉鳯姿肯作麒麟楦相看二載餘謹若𥘉覿面朅來過門别新除得倅冠坐久兩不懌去住相慰浣我心愛莫留官屬亦深戀其如行止何物情復多變鑾坡禮文窟一任儘清宦古人貴任運况去有三便家近得侍親州孤無劇辦請益願一言偏倚時揉錬我欣聞其説解事語不漫常思歐九説可為後來贊摛文止潤身及物自貞幹休辝米鹽碎莫厭衙起晏不見忠獻韓鼎鉉出推判行俟官有程民事不可緩遊媯川水谷太玄道宮迎謁次媯野將為旦夕間尚餘百里逺却得三日間追陪玉堂翁清遊指仙山窮秋草木盡諸峯慘無顔兩崖蓄餘暖嵓樹如春妍洞口疑有光望中巳欣然始至覺夷曠稍深更幽寬山英喜客來夜兩濯翠鬟層巒與疊巘供我柱笏看雲封石上鉢𥘉大道酈五祖者逃難此山衆追及棄衣鉢石上而匿其物重衆莫能舉異焉遂請主其教今道院蓋酈所創也玉漱山腰泉灌溉滋樹藝一脈窮灣環西臺頗峻絶兩折躋其巔詩翁見精健登頓不作難磐礴􅏮莫留松風吹袂寒降阿集晴疏髙談渺孤攀山荒苦無稱似待新詩傳諸君垂槖來稇載風煙還因公得勝賞此詩其可諼但恐雲霞舉暮景去猶慳我非桓野王今識東山安題筠菊亭有客昨過門挾卷携酒壷我老厭人事汝謁將奚圗自云有老親倦遊樂間居終年築亭圃筠菊心所娛二者諒微物一日不可無餐菊制頺齡種竹來鵷雛牀頭幾葉書隨意日卷舒欣然有所得擊鮮忘朝晡脫略少年事呼鷹走韓獹治生不求冨教子供讀書近隨計吏來一命沾堂除南歸不徒手豈計巴與俞眼中倚門親慰浣當何如瞻烏噪軋鵲過户懸蟢蛛竹色動虛牖秋香滿庭隅計量到家釀小槽滴珍珠江山漢隂國耆舊稱名都從今王氏亭而與吾孟俱題為五字詩稛載樂有餘路教為再拜歸當榜吾廬陪張右相祭奠司徒忠懿公墓元貞元年歲乙未夏四月九日王城西北郊有山曰盧師岡逺見蟠互野曠欣平夷我嘗以事來旋軫思遲遲匪緣蛇虺靈不羡風煙竒有懷德育公攀附隨潛飛一朝際風雲振耀生光輝我𥘉拜英表冨貴非公誰內焉豳國助上焉兩宫知孰云恩澤侯以德中自持近侍足恭謹接物餘謙撝由家化而國在理乃所冝及夫司徒公衍慶尤熙熙再丗保傳功大書見豐碑神龍襲九淵奮起須鱗鬐伊公漢大橫庚庚隱天機歷數既有在大器將安歸君王自神武監撫非細微寶章猶傳璽啓沃貴知幾堂堂忠愛心畫此廟社規其報冝伊何子孫保無期倐歘三十載山丘兩巍巍生死固常事盛衰有足疑昌黎銘殿監所以含餘悽我老自多感黃鳥聲正悲駐車不忍去日下山煙霏書日者卷後稔聞日者名不識詹尹靣共云推未來符驗如契劵因之求題詠有學難自衒郭生序巳詳奚待余眷眷雖非青囊翁嘗讀季主博為憐長沙傅三䇿動漢殿及夫行藏間而抱不遇怨絳灌夫何為藝能上自羡弗思前席夜有舌不少咽况彼倀倀徒能不逐利轉正真神所與言行士之觀悔尤兩克寡祿秩中自辨宣尼敞亨衢天理不吾謾山人有來問此語告無緩庶刳萬有心一聽三聖斷題張氏先塋記後禹城張氏先起迹自農伍力田與孝悌內助出賢姥夫婦人倫常松竹表寒苦柔姿不易立流離復囏阻隻影携孤兒避地韓城塢飢寒兒不知採拾治絲縷訓育至成人衣食能自取去著仙人衣春風三十許若將終其身一室老環堵天其表媪慈再丗沾煦姬蔚為庶門清在野不多覩南薰吹棘夭衣冠見楚楚子然九齡迪信厚稱幹蠱或欲以節聞顧視為告語近名道家忌此事莫豫吐夫家已不幸在我分當處里南築幽栖竹木映庭圃還我浩浩天香火湛靈府晨昏省定際迪也禮容與一朝委蛻去神光照東土我紬石室書逸事須丗輔國𥘉迄元貞莭義幾人數豪族易昭晣里俗多草腐况保晚節難往往變所素猗歟望亭君雅志遂𥘉舉凛凛百年間毫髮不少沮竟續所天家時祀苾籩爼豈唯勵衰俗清風激千古裁文為歌詩流詠遍齊魯送張勝非任汝寧府判汝流漾玉虹望入東南楚雲連懸瓠城形勢見今古有卿以龍名旦評擅諸許山川氣不易舊蔡變新汝名芳土亦馨理在物爭覩張生太史屬三載戰文圃開朗中有為一變至於魯朝來得新除破甕起欲舞踵門來告别一言求小輔試將吾巳行聊用勉君舉吾年四十餘彈冠判晉府通宵思闕遺未明聽衙鼓上焉事官長下焉宿民苦簿書雜米鹽塵土與相五杭容不少倦公散日常午任責在人先見得思義取爭輸公堂益不惜寸心吐堂堂五十城利病繫區處心平知所宰有衆孰敢侮御吏至束濕未省聽渠主最憐絳陽獄五歲閉幽圄一朝得其情久旱霈尺雨當時官府清至今傳好語伻來一宴過蓄縮畏於鼠正緣中省嚴經制得其所後來府無人所事盡乖忤官寮自兹壞政荒歲飢阻每用誡平生艾服潔其矩皇家重師帥爵祿不輕與汝寧本寧爾未用厭勞拊聲華月旦評粲粲珠還浦輔缺公與卿去去力當努壯心橫落日髙歌當梁甫壯士吟題郝奉使所書手卷使節駐淮海人望兩好熙宋人足變詐觀望占成虧不知破武事中伏混一機壯士死則巳不死將有為宋琚凜風槩天馬不受羈拘隔一館間激之見連雞事久變乃生勢去心恫疑奄奄十六年慘悴甘湘纍內閧既首鼠外侮宜紛披盛氣屈使降壯心終不移睨柱欲碎首忍見王人微松嚴操愈厲草緑秋更萋蕭爽隱霧豹脫略觸藩羝老賊主一殺幽憤將何施庭芝一援手所昔良不資兵交使其間天理或可期于卿才屬國所報亦以卑至今郎山冢突兀空蟠螭兩行清汝帖只有老天知送徐平叔還廣平因次其韻全趙古多士祇服見吾琛我生自有命其肯枉尺尋結交半豪右翔集依雲林當年平津閣箕冠明月簮乘時頗展翼天髙氣橫參談詩似高適走翰驚陳琳忽騎將軍馬縛賊虎穴深嚮耒三數公朱絃得遺音長劍一樽酒灑落開雄襟自笑我何有踵門來載臨袖携長沙書囊乏魯連金白髮老親健晚境毛義駸時清渴明略友義多同衾躬耕食不足從仕力儘任秋風吹易水遊子動歸吟深藏會有待莫負平時心題焦節婦卷後焦氏有賢女姿稟與衆殊既笄樂貧素出嫁南征夫一朝聞卧病尋訪邊之隅怙恃力眷挽在妾夫何如竟能遂𥘉志扶喪歸里閭朝昏事蠶織恭侍舅與姑百年終孝養葬祭何勤劬拊畜兩孤幼嫁娶禮與俱孫門固衰謝賴一貞節扶夫婦人倫始因之變時汚一端青縠信至死誓不渝采詩論國風彤管冝沾濡誰謂閭閻間凛此風烈媰猗猗谷蘭馨落落青松孤豈惟表門闕抑備太史書逹卿昧平生容齋文可娛美節冠東州亦用播友于清風振孤標讀者冝嘻歔送許淡齋提舉隆興學校我𥘉入玉堂喜識淡齋面忠翁兩朝士極口為稱羡子逺東嘉人文綵金百煉妙年登巍科巧宦歷幾遍風儀聳四筵目光雙炯電前年來京師得遂依劉願校書天祿閣音吐見雄辨長河瀉建瓴灑灑江在傳三釡固祿微一官爭鶚薦行李日羈栖猶是多士冠今來得美除提舉江西彥在吳列朝行客燕領詞翰洪都儘經學文藝業多擅好將鑄顔手主善志無倦習俗與命脈風雅為一變江煙送行舟瀟灑離亭餞清吟代驪歌别思空眷戀依依鄉國情去逐南飛鴈我老歸未得松菊夢秋澗衣冠拱清朝粲馬珠會辨自慚老無能零落秋風扇君行重感槩黽勉磨鐡硯長江控髙閣百丈驚井幹梅花散春妍蒼煙開禹甸江山有清眺風月興不淺南昌地卑濕衆流爭湊衍去年水為災孤城江四轉兒童化魚鱉萬竈産蛙黽慨然為開陳此事豈小便一􅓩濬東湖澄江靜如練淡齋素有為肯遣空懷卷觀臺鄉劉氏瑞蓮遙遙觀臺鄉近接魏西圃風來紫陌香臺傾金鳳去繁華一夕空風物猶可據劉君號素侯林野敞亭宇貯藏物外春中有百花塢池開一泓多雲錦漲秋渚亭亭玉井花十丈氷絲北一茄十三花秀發乃如許輝映天泉淵飄灑橫塘雨風流似六郎淡豔疑靜女髙情太極翁愛玩吐竒語根植汚泥中香韻儘容與褰帷對佳麗凌波看微步煙霏動簾櫳漢女出歌舞當其爛熳時固巳表䨥舉豈惟見家祥分秀孕先母重臺與雙頭連莖同合跗封章稱嘉祥夸者徒媚嫵由來草木蕃造物不豫侮氣和物自盛事異未之覩百年霈遺澤宅相煥圖譜君家邯鄲望馬服乃鼻祖諸郎藉餘慶雋拔一何楚起家漢賢良接踵泛蕖府一門集清芬嬋姢冨簮組為君續夷堅作詩劖石鼓滏陽有石鼓山蒲城行效韋蘇州體示異姓弟喬百順蒲城今樂郊兩翁處東西相别二十年顔鬢颯以凄加餐似平時捨杖矜健移置酒前拜壽喜定垂涕洟擁膝侍終日念不共提携幸有聶與喬治生事鋤犁云誰知異姓一作派孝養日孜孜雖違心獲安慰我悠悠思官書促前去望入雲林低黑山秋霽我度居庸關天峽四十里巉巉積鐡色兩勢蒼壁倚何由剷疊巘一撮峙燕几長令幼輿心喜溢秋壑底朅來遊京師訪友棠隂里入室得兹山欣躍倒雙履携歸坐卧觀論列忘兩紀黑山凛氷尖玉色何粹美連峯卑髙陳夾嶂蹊徑逶逺勢走修坂秋骨濯清泚絶巔蒼窮盤哀壑太妃圯竒狀出天然棄墨妄模擬又如草間虎怒伏驚獵箠昻頭入四顧徐起妥蒼尾書生眼孔曠百見心未巳不為此僝顔照映橫玉壘烘香作怪供揚觶問山鬼不知天壤問􅥵刻此能幾魁岸狀木假甲乙弟湖玼逹人有大觀太華拳石厸曾為物外誘沾沾抱徒喜屹立萬物表景行世仰止詩成贈山主我豈鬱林齒巖棲未有期對此聊爾耳大開致爽軒柱笏約吾子秋澗先生大全文集卷第五
