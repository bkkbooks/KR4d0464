front:
  text: 秋澗先生大全集卷第八十九烏臺筆補
  hash: sha256:48b7745df3392be30eb45c2f0ead48caa8b6d7d523bd9ed41954fa98f8ff4d30
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_089-1a}
body:
  text: 舉河南士人陳天祥事狀今體訪得河南府士人陳天祥沈正有爲達於從政隱居嵩少相近十年讀書種田不求仕進中綂三年大名宣慰司曽將天祥擢充新軍千户勾當鎮守三汊等處聊復効用已有能稱今國家經畧江漢得才爲急其陳天祥乆播學優之譽適丁強仕之年合無就令河南行中書省舉用以試所長爲盗賊紏治真定官吏事狀今體訪得真定府即目群盗公行或竊或刼無所畏避據前月上半月内一夜之間失事者凡二十餘處如髙奴千户任子齊等家縱火恐喝盗取財物是也其府官司巡捕無方但薄暮聲鐘辨明啓閉使闔城之民遇夜驚懼寢處不安顯見府司官吏罷愞不職威令莫行不能消弭擒制以至如此且真定爲燕南劇鎮又連年蝗旱艱於衣食者衆此風大不可長叅詳上司若不早爲規畫督責官吏嚴行禁止切恐因而别生事端深繫利害據此合行紏呈請禁治穢惡語言狀切見中都市井小民行言立語多作穢談以至父子兄弟不能迴避行歷切恐乆而成俗以爲尋常據穢濁風俗莫此爲重叅詳係有司不能肅清所部以至如此兼京兆風俗之厚合行禁止以革薄俗論居官身故等官貟子孫承廕事狀㑹驗中書省欽奉聖旨條畫内一欵諸取廕官不以居官去任致仕身故其承廕人年及二十五以上者聽照得今者身故官貟子孫巳擬叙廕其居官去任子孫應廕者至今未見施行外據致仕官子孫徃徃亦未蒙定奪如真定張宣撫子復前泰安州尹趙德庸子符是也卑職叅詳即今貪冐成風恬不知退如一二以理致仕者冝蒙顯異若應廕子孫返爲遲疑不䝉定擬秖以身故者聽叙是使爲子孫者得父祖早故爲幸非所以進廉隅而激貪鄙也兼照得舊例諸養素丘園徴聘不赴者子孫尚得以徴官爲廕况聀官清要歷年深逺之者理合比父祖身故者即令叙廕爲當其居官去任子孫亦合依奉聖旨條畫定奪施行爲救治䖝蝗事狀盖聞天災流行國家代有氣和則致祥氣乖則致異此必然之理也然災有大小而蝗旱爲㝡今㑹驗得隨路莭次申蝗蝻生發至今月内計二萬一千九百三十三頃四十三畒除巳絶外未絶一萬五千八百六十二頃三十三畒又有不見頃畒一百餘處炎炎不巳深為可憂如比年以來山東等處連值蝗旱民至有麵橡實掘黄精煑野菜而食者雖包銀權倚而盡徵到官課額訴難而依前恢辦向非聖恩賑濟鮮不飢殍轉死溝壑今者蝗之氣勢滋盛如此是上天之意儆戒深至誠不可不謹苟非以德勝妖全藉人力恐百姓重困過於前日其爲利害孰大於斯今來叅詳其或大臣不和政事有闕官吏不公百姓失所刑賞雖行而或戾風俗極惡而未醇又如各路見禁一千三百餘人幽閉囹圄不無冤滯加之用兵興役僉軍屯田包添絲銀恊濟軍力分房益户輸粟餉邊逺近騷然未爲無事從是而觀致傷和氣恐此之由而又迤南州郡蚕麥薄收嗸嗸之民止望秋成以供王事不幸継以蝗旱萬一成災將若之何豈惟經費不足貧民衣食先乏衣食乏則飢寒至飢寒迫則盗賊生盗賊滋則非國家之便也竊見朝省近年巳來救捕雖力終莫殄絶不過差官督責州郡併功撲滅不致流㣧而巳未有以時事言者以某愚見爲大臣者當恐懼修省恪謹天戒任責極言陳其所以不然㘦慮朝廷不能盡知何則方今明天子在上聖慈仁惠子愛兆民哀矜憫䘏軫慮惟切今災異如此又恐逺方小民不知存恤之意誠冝緩不急之務下寛大之詔發倉廪振貧乏致禱山川爲民祈謝據𬒳災去處驗其輕重量減今歳差税又冝先遣相臣分省中都使鎮撫中外規畫事宜以安以慰庻望京畿之間民心妥帖物不踴貴災沴漸消民易爲力不致重困因而别作事端爲犧牲在滌不及九旬事狀盖聞國之大事實先祀典祀禮以敬爲主物品以㓗爲先故唐金之制大祀飬牲在滌九旬中祀二旬今體知得太廟歳祀犧牲有司臨時取辦在滌不及兩月即用就事看詳三牲之飬逺期三月本欲盡誠敬而極精㓗也今者大祀之禮降而甫踰中制於理寔為未應誠有司之慢也合無照依舊例改正施行舉陜西儒士楊元甫狀伏聞國朝議國學教胄子遴選師儒以充司業助教慱士之職切見京兆儒士楊恭懿資禀髙明學淹經史千言過目成誦不遺今年幾知命教授郷閭其孝行足以化服一方其廉介足以振勵薄俗隱徳丘園不求仕進如往者兩省交辟欲置之幕府庻諮論議以勸將來至職名禄飬辭皆不受德業日新簞瓢自若誠清廟之珪璋士林之杞梓也其或擢彼國庠置之舘閣試其行能可収實用又念即今上而監司下而州郡凢所薦舉多蒙省録其在憲臺尤冝獎率伏乞詳酌施行爲罪囚醫藥事狀許獄行體訪得大興府在禁罪囚自今年二月初至今月二十日節次死訖二十一人俱係因病身故切詳見禁四百餘人又照得隨路巳立司獄官三十餘處即目暑氣蒸騰病者甚衆雖官差醫工輪流看治合用藥物悉皆自備如遇重證止是依例應付實非對證條合以致徃徃耽悮人命又念犯得罪當死不可於未鞠問及抵法以前因醫庸藥闕而以病殺之也其間雖有冤濫當宥之人悔將何及檢㑹舊例獄囚病患官給醫藥救療合無將應用藥餌官爲収買給付獄官臨時對證用度庻望不致躭悞死損人命論成造衣甲不冝責辦附餘物料事狀伏見國家即目征伐四出所除甲噐㝡為重事縁甲不如法所係人心勇怯勝負関於一時故晁錯有云甲不堅宻與祖楊同今體察得在都甲局并外路今年納到至元六年常課皮甲斤重不同者在都局有三十五斤及三十七八斤者真定順天東平䓁處却重四十斤四十一二斤者斤重旣是争懸生活不無好弱又體知得省部遍下隨路四十餘局取要排年附餘數目佀有未便者若上司元降物料一切合冝不當取要附餘旣取附餘是元降物料上司不曽確實計料有無相應致有多餘之數若此是在有司立法當與不當耳至如弓局舊例毎弓一張物料錢鈔两貫文有傅忽都告减作一貫二百文聖㫖爲乆逺生活上定作一貫四百文造弓一張上司旣無打筭工匠又甚便當卑職叅詳今後亦合將衣甲事理再行定奪實用酌中物料使一切合冝及甲之斤兩定擬畫一体例𬋩得成造如法其少有不中程度者嚴行究治可也不冝責辦附餘以致官匠兩難兼衣甲難比其餘噐械所貴堅良精緻及主者之功匠氏之能也若專以要取附餘爲功不以甲之好弱爲念一旦用之陣敵斷不能遮護身體有悞人命是有司以附餘為重以人命爲䡖也據此合行具呈彈阿海萬户屯田軍人侵占民田事狀欽奉聖㫖條畫内一欵該兼并縱暴及貧窮冤苦不能自伸者委監察並行紏察欽此今察到武清縣北鄉等處有阿海萬户下屯田軍人於至元二年倚頼形勢於上司元撥屯田地段四至外強將諸人莊子及開耕作熟桑棗地土侵奪訖二十餘頃俱是各家係税地數徃年雖經陳告緫𬋩府行下本縣歸着本縣累次約㑹夲官不到至今不曽吐退就責得各地主狀供與所察相同卑職看詳本郷兩面河占中間地土窄狹今者強為軍人奪占使農民至有失業者所謂兼并縱暴貧弱冤苦不能自伸者莫此爲甚據此合行紏彈伏乞御史臺照詳施行今將侵占訖諸人地段數目開具如后彈西夏按察司行移違錯事狀今體察得西夏中興提刑按察司於今年二月内爲本處納憐等站脱脱禾孫等告鋪馬瘦弱見無料食事備詞申覆户部爲此追照行卷與所察相同今來叅詳各道按察司凢有合申事理即令申臺照詳即與六部元無行移體例今有西夏中興提刑按察司官署衘連名不經御史臺徑爲申覆尚書户部佀爲不應據此合行具呈論渾河泛溢請修治堤堰事狀伏自今月内武清縣北郷按部回至洪濟鎮值渾河泛漲其瀕水民家巳爲渰没若湯湯不巳大有可慮者因行視堤堰水勢東南至孫家務西北至本鎮南東西横亘約十五餘里其堤堰低狹髙闊不過丈餘又年深頺剥衝渲一土埨而巳河水伏槽時視堤南平地尚下數尺兼土脉踈弱水性善崩黄猫野䑕穿穴又多固不足以禦大患捍水衝萬一泛决沛然莫禦而堤南二十餘村人畜田廬盡爲漂没其害又非䖝蝗之可比也就問得孫家務一帶去年秋巳𬒳災傷但不致太甚耳外據漷隂縣東北沙渦口等處畧與武清縣北郷事勢相同即目縣西北近河堤南田禾巳在水中及有渰死頭畜合無專令各縣正官一貟晝夜廵防隄備破决佀望不致踈虞才候農隙令都水監官相視堤岸踈惡去處如法修築使一方永逸以絶水患寔畿内兩縣之大利也某職當司察親覩利害不敢緘黙自取言責據此合行具陳請立四方舘事狀伏見逺方朝貢使人毎歳至京師者旣無館舎以輙於民間豪貴之家倉皇安置佀有未便者三堂堂大國不以全盛之勢昭示逺人一也旣擇朝官豈非示其文物有人然處之民家殆非得體又無窺測民間事情以見淺深二也至於騰移房争與奪之際致𬒳竊笑三也如近日交阯使人大夫黎仲陀中散大夫丁拱垣等舘於王子華及安置使貢物狼籍于外者是也合無建立四方舘以一切奉使處之如此不惟聖朝盡懐逺遇下之禮抑使逺方來者觀上國之光我免夫三者之虞寔爲便當彈漕司失䧟官粮事狀欽奉聖旨條畫節該倉廪减耗爲私蠧害委監察並行相察欽此伏見國家歳計粮儲必湏百有餘萬方可足用朝廷爲恐中間失悞爰自徃年特改漕司併令劉晸等提舉一切勾當故合設官吏内外必備奉又爲不輕所期盡心俾稱厥職今體察得數年之間其盗用失䧟短少及糜爛等粮一十六萬四千餘石又察得至元五年未到倉粮一十五萬餘石除巳䧟外八萬九千餘石至今不知運納所在就間朱英與所察相同問者省部摘差官親詣盡真本司欺昩止將六年粮數緫作入納隨倉見在飾詞破説用相抵牾中間虚明不可五年守凍粮斛一十五萬餘於本年人數目至今年二月尚餘石不知所向却稱至元六年粮數至今年九月終隨倉起運交納止有二千餘石且綱運先後交輸程期自有次苐不應攙亂如此豈有五年未畢委棄不問而復越漕六年新粮恐萬無此理詳此一端其虚冐飾說槩可見矣叅詳上項事理不過非其人故也盖自古錢糓大計莫不精選才能清愼明著善於其職者充固非素不綜練挾私蠧公之人可以倚辦因體察得本司官属其晸者㧞自行間素乏心計剛愎自用不有同僚佐貳者因不和同互相雄長上下苟且因仍耽悞遂失関鈐致綱紐觧㢮廢壞如此至於中外聞者莫不憤嘆其在有司理當云何其劉晸又於通州等處爲起盖倉敖用便巳私營置物業撤橋梁而阻滯驛程奪民利而一空舊渡倉司旣非久許運道又不快便公私之間兩有所害今復改作重費國用其爲私蠧害又所當問照得欽奉聖旨節文該勾當了的公事不稱所倚付的心據劉晸等廢亂職務不稱所倚孰大於斯據夲司官吏不爲盡心大失関鈐冝一切替罷公選廉能清慎善於其職者充及隨路河倉楊村守凍失䧟損壞已未納見在粮數乞選差清幹職官親詣盤點如此庻望上下一新積弊可革不然無以敕勵其餘以救將來外據都城内外倉分有無照依漢唐故事隷属司農司兼行𬋩領深爲長便某職司言責利害深重愚衷所激誠不敢避忌罔盡所言合行一就紏呈論復立博野縣事狀照得至元三年欽奉聖旨節該州城畸零去處不滿千户者斟酌改併民户多者從長定奪更當衝要驛程不湏改併欽此今體知得自去年新抄户後隨路州縣往往有至三四千户者至今依舊合併𬋩領極有不便當者畧舉順天路初州博野縣併入蒲隂縣分是也其博野縣即目諸色人户二千八百餘户中間百姓事不便當者非一如科着船户𥙷闕蒲隂縣弓兵故將本處上户啇堅等六户取充及撥降一切差役徃徃偏向不均至於送納賦税勾攝聚集詞訟等事不惟徃復逺窵其沙溏磁三河經值秋夏水發潑漫相接抵祁州迤東一槩流行阻滯人難又兼本縣蠡州南至安平界首相去七十餘里正當衝要驛程爰自合併巳來節次失過盗賊截刼訖官民財物致傷人命者無慮十數就問得本處人户賈佐等與所察相同叅詳博野正縣理合依舊復立縣事深爲安便外據隨路見併州縣如新抄户後數滿千户之上者亦合從長定奪復立舊治爲當至於隨路在先曽合併縣分爲中間百姓不便巳有復立去處如上都縉山平灤撫寕真定賛皇太原樂平俱係三五百户縣道又如無城邑者亦復設立如河間無棣縣於八湖口置司延州延津縣於史逈店置司順德廣宗止於夲鎮置司是也據此合行舉呈論科舉事冝狀伏見朝廷發明詔議科舉以取進士盖欲明公道廣仕途以革徼競之風選人材収實用致隆平之化然聞禮部所擬止以經義詞賦兩科取人伏慮淺狹拘窒於國於士兩有未盡必期登俊良逺庸鄙緫覧群材經理丗務盖有後其所先先其所後者矣鴻惟聖天子渇於文治聽言如流凢所制作取唐爲多兼國朝科舉之設自戊戌以後未遑再議天下之士徃徃留心時務講眀經史捉筆著述一尚古文顧惟舉業移素習一旦取非其人不適於用返爲科舉之累矣今檢㑹到李唐之制其取士科目不常率相時置科以待非常之材其初試殿試止以䇿問取人如時務則試方畧止五道直言極諌等䇿秀才則博學宏辭及道侔伊吕才堪郡縣下筆成章茂材異等皆其選之首也故得士之多唐㝡爲盛以某愚見審量時勢必欲急得人材以収實用莫若以時務對䇿直言極諌切中利病有經畫之略者爲首選何則試以殘宋爲言自渡江以來以一隅之地偷生百年者正以多士齊濟崇尚議論有用之學故也其次以博學宏詞兼試典禮議一道如禘祫齋郎之議者爲中選其經義詞賦兩科乞轉經出題先爲布告中外使學者明知所嚮謂如今年書眀年詩限以幾時然後赴試其格律畧除竒細如故實㬌象明水干羽金在鎔之類例皆爲命題如此不致隔礙長材使得展手筆以盡其噐能不數年則五經可以通治矣然後使天下之人知大聖人制作出於㝷常萬萬其有用實學爲聖朝英特之選一洗遼金衰薾不振之氣其不盛歟如此當國計者上可以副朝廷用儒之實下可以待俊造非常之士盡遺賢於網羅收實用於中外則文治之功隆平之化可計日而待矣某職當言責事或未便不敢緘黙輙冐昧敷陳彈博州路烏緫𬋩老病狀今體察得烏古論居真殘忍嗜殺貪冐無厭向列東曹以尸禄位及審囚徒大致違錯今年近八十氣志昏耄當官臨事轉首遺忘就問得本路司吏張玠與所察相同而又不時昏發頭目調眩至提視衣物畧不知識庻望裁断如流神明其政不可得巳兼照得博州路䪌𬋩軍民三萬三千餘户一方休戚繋在師帥今而若此其於大小事爲少有蹉跌斯民何辜横𬒳抑屈若以老病不勝本官首冝論列合行紏舉以勵其餘冬旱請祈雪事狀切見隨路蝗災經今數年山東河南其勢尤甚今遺種遍地儻災更不已飢荒盗賊何所不有若比及出冬已來得三兩大雪庻可消弭以絶根種古語有云冬雪一尺蝗子入地可丈今去春節僅三十餘日照得中都及迤南路分自八月至今天不雨雪小麥青黄半掩乾土雖雲隂屡作終無大潤叅詳唯有以精誠感格神明致禱岳瀆爲民祈謝而巳不然令各路緫𬋩府官或郡守躬親祀禱部内山川并社稷等神以示朝廷憂䘏元元至意庻望和氣一回普霑嘉瑞使民心慰安且忘積年飢乏撲㓕之苦太廟祭噐合改造事狀伏念古之君子朝服祭噐不假於人况太廟之祭噐乎今體訪得太宫大祭所用鼎彛等噐多係殘宋賜功臣家物如臣京敏中邦昌等噐是也叅詳自古有國有家者未聞祖宗神靈而以人臣所用遺噐陳列爲享於禮誠爲未冝然嚮者清廟初建毎事草次未遑一新不得不爾今後合無改造新噐張皇一代縟典且極夫尊嚴無上之義使聖子神孫傳之無窮不其盛且當歟論求仕官就家聽候宣勑事狀體知得吏部先奉中書省劄付該求仕官貟毎季遷轉在後慮恐生受擬令毎月銓注今切見隨路求仕官貟有自去年八月間摘勾到部經今七箇月餘未蒙銓轉中間百端生受客寄守待措借無所以致典賣鞍馬等物供給盤費尚然不足不幸更值病疾因而身故尤可矜䘏即日在都聽除等官約二百餘貟少者不下半載又州縣闕貟甚多佀此淹延兩爲未便今後合無將求仕人貟自到部月日爲始限以旬月對憑引驗旣畢省㑹還家若有合祗受宣命官貟依舊例差人擎送外據授勑官貟將合授勑命發付各路緫𬋩府收𬋩令本路祗授照依定去裝束省限催督赴任庻免人難據此合行呈覆彈大興府擅注案牘官事狀今照得隨路緫𬋩府元設提領案牘官已是罷去今體察得大興府却將司吏韓仲禮充案牘官勾當叅詳緫府司吏除額設外尚不得増添人數今來本府擅自將報過司吏韓仲禮擬作首領官與朝省差設經歴知事一同繫歷勾當豈惟干名犯分其於格制是属違錯據此合行糾呈彈四州濫給觧由事狀欽奉聖㫖條畫内一欵諸監臨之官知所部有犯法不舉劾者罪五等紏彈之官知而不㪯劾者等欽此又會到中書省條畫内一欵節該各路州府司縣任满官貟當該官司循情濫給觧由體究得實申臺呈省今察到涿州等處州縣去官於任内侵使訖塩錢工俸累蒙上司追徴並不還家其代官到任亦不依公理問却行循情濫給與無粘帶觧由如此逓互欺昧上司致將合追錢鈔至今不能到官事属違錯據此合行開坐紏彈彈甲局官玉魯等抵搪造甲皮貨欽奉聖㫖條畫内一欵節該造作不如法者委監察紏察欽此又照得上司元料毎甲一副舉吊并裁線古􅴤皮一十張四分前制府劄付下甲局緫𬋩府該依年例計料厘勒人匠如法成造無致用别色低歹皮貨抵搪成造卑職於今年八月内體察得中都𬋩甲局官玉魯楊三合自今年二月内造作至元五年常課已造訖甲一百二十副依巳料関訖古􅴤皮一千二百四十八張於内却用馬項子抵搪即問得玉魯等招說爲闕少古􅴤皮上是用馬項子作線是實却問得守支古􅴤皮人高庭傑熟皮提控菜榮稱自至元六年六月内収支成造五年皮甲古􅴤皮至七年八月内計收到古􅴤皮一千二百五十三張俱係甲局王知事支訖又問得王知事名居實稱實関訖古􅴤皮一千二百三十張據巳造了底甲數内委的四次用訖馬項子八十五箇折訖古􅴤皮一百七十張是實今來卑職叅詳旣知事王君實依料節次関支訖上項古􅴤皮貨玉魯等不合却用馬項抵搪事属違錯合行紏呈論革罷撥户興煽炉冶事今切見各處鐡冶撥出户計設立頭目𬋩領周歳額辦鐡貨令人户常川煽煉納官官民兩便今畧舉綦陽并乞石烈楊都事髙撤合所𬋩四處鐵冶見分𬋩戸九千五百五十戸驗毎戸包鈔四兩計該鈔七百六十四定今緫青黄鐵二百四十七萬五千六百九十三斤半價直不等該價鈔四百六十八定二十三兩三錢三分半比包鈔虧官二百九十五定二十六兩六錢半及其人戸俱各漫散住坐毎遇秋冬煽煉逐旋勾集徃復人難豈爲官民有辦如將上項戸計罷去當差許從諸人自治窑冶煽煉據官用鐡貨給價和買深是官民兩便據此合行具呈伏乞御史臺照詳施行湏至呈者綦陽户二千七百六十四户毎户四兩計鈔一百二十一定单六两辦鐡七十五萬斤毎十斤價鈔一錢計鈔一百五十定乞石烈户一千七百八十六戸毎户四兩計鈔一百四十二定四十四兩辦鐡二十六萬斤毎十斤價鈔一錢計鈔五十二定楊都事戸二千戸毎户四兩計鈔一百六十定辦鐡五十三萬二千三百三十三斤半毎十斤價鈔一錢該一百六定二十三兩三錢半髙撒合户三千户毎户四兩計鈔二百四十定辦鐵九十三萬三千三百四十斤計鈔一百六十定内青鐡五十三萬三千三百四十斤每十斤價鈔一錢計鈔一百单六定三十三兩四錢黄鐡四十萬斤毎十五斤價鈔一錢計鈔五十三定一十六兩六錢紏彈良郷尉司非理拷勘劉德林事狀欽奉聖旨條畫内一欵節該廵尉捕盗官捉獲盗賊隨時發與本縣圎坐推問是實觧赴本州再行鞠勘施行不得轉委吏人及弓手人等拷問欽此今體察得良郷縣尉司於至元七年九月内夜本縣館驛内失盗於當月二十五日有弓手髙伯山渉疑捉到涿州人户張德林不曽申官私下拷勘抑令虚招及妄指姐夫劉得林寄藏上項贓物將劉得林拿到亦不申官一靣拷打爲無證佐在後撒放於二十七日止將張德林申發到縣尉司有縣尉楊仲玉又將劉德林勾追到官重復拷問非理加刑上爲無指證明白事跡於當月三十日保放還家有劉德林於閏十一月十三日因拷瘡身死今問得尉司司吏劉君祥并苦主劉得林妻阿張并當元𬒳摭人劉得用詞因俱與所察相同今來叅詳髙伯山止是本縣弓兵别無拷勘問人體例及縣尉楊仲玉止慿張德林妄指便加拷勘以致本人因瘡身死又於劉得林劉得用等處掠取交鈔衣物有此違錯據此合行紏彈論肅山住等局人匠偏負事狀伏見吕合刺児𬋩民户内撥出人匠二百二十五户内謂如眞定路萇叅謀甄榮祖呉信魏友係納三定包銀戸計餘者雖是不及例各酌中户計然則一丁入局全家絲銀盡行除免近又將上項户計撥付本局另行𬋩領其人匠自來按月支請米四斗塩半斤不時更有賞賜錢物其爲幸民無甚於此且如肅山住儲普花兩局人匠俱係迤北人匠抛失家業移來中都今全家入局造作又爲衣食不給致有庸力將男女質典者至甚生受按月支請又無食塩毎口止得官粮二斗五升今來切詳造作乃一體工役然成造之物固有輕重工役各無閑歇何其塩粮不一若將上項局分相比據肅山住儲普花兩局實爲偏負外據吕合刺所𬋩民匠二百二十五户月支塩粮合行從長定奪據此湏合具呈論六部職掌繁簡事狀伏見朝廷設立六部其官吏品秩相同而職掌繁簡有異如禮兵二部禮以祭祀爲大而有太常寺兵以軍旅爲重而有樞宻院今者錢榖造作一切等事盡歸户工至甚繁劇若曹務不有所分則緩急難於辦集今無酌量䌓簡令兵禮二部將可分之事一以兼𬋩似爲便當又且職掌均一使兩部官吏免尸素之責不然䌓者愈䌓而簡者日簡矣據此合行紏呈論覇州道路事狀切見覇州部分俱該河流陂浸地面其驛程却係山東正路據本州南至保定縣見行西道相去四十五里中間經過橋梁七座毎歲必湏依時拆盖更有修疊水口去處其功役不細須旁縣挾濟方可辦集甚是生受兼西道元係前代阻障溏泊堤堰本非正路近一十七里止蓋橋梁三座若行莫金口東道官民寔為兩便據此合行呈覆論革罷魚牙岸例事狀伏見魚牙岸例等錢比年以來隨路俱無今體察得中都通判等一十一處其魚牙岸例一依宣課三十分取一至今徴収叅詳魚貨蓆葦一切諸物於所在已納數重課程今者於上更爲収分此等錢穀寔是重併兼見蒙聖恩免差發减課額正爲百姓生受故也據上項等錢理冝罷去不然亦不當依宣課一體分收有此不應合行紏呈彈不孝子楊大事狀盖聞父母有婢子甚愛之雖父母没終身敬之不衰况父在之姬妾乎今體察得懷孟路緫𬋩子某冥頑無知悖逆有迹近者將父才妾就於寢所輙行毆擊父方營護隨即推仆致令乃父牒發夲路䆒治其同僚看徇視爲細微在後畧無施行雖行路聞之莫不憤疾叅詳禮義由賢者出豈有衣冠之胄而爲禽犢之行如是其敗壞風化孰大於此合行紏彈乞痛加懲戒以勵薄俗舉三道按察使事狀今山東東西河北河南山北遼東三道提刑按察使見行闕貟未經選注如山東道前任陳祐苟非其選罔継前聲河北道近爲元維新事闔司𬒳問威望沮弱山北道上係重地闕貟日乆此三使舉惟其人能復震疊安靖切見前中書省給事中賈居真揚歴朝省積有歳年夙夜在公練逹政體又廉訪得濟南府緫𬋩趙炳莅政迤來民安盗息強幹著稱及吏部侍郎王椅通儻才能和而有守旣掌銓衡又稱公當論其才品俱各相應如任以監司必能振舉綱維不負輿望據此合行舉呈論順天清苑縣尉石昌璞繫獄事狀切見隨路州縣官如縣尉人貟職小責重㝡爲不易其合捕盗賊有任終不獲至經年累月停罰俸給者幸有一二強幹肅清所部冝加遷賞以勵其餘或事有罣悞情寔可恕今體訪得順天路清苑縣尉石昌璞強幹有爲廵捕得法察賊推情遂破窟穴自到任巳來甫及一年擒捕強竊及印造僞鈔知名劇賊郝榮楊留児等凢一十七起計賊黨九十八名俱係積年作過流毒數州所在官府皆不能制所謂不待教而誅者也致使保州方數百里間道途清寜稱頌在路誠消弭安静廵捕之㝡者也今止爲郝榮等事𬒳問到部本部即行枷収同重囚繋獄寔爲未當叅詳據巳結案強賊郝榮䓁反獄殺人情理深重舊例刼死囚殺人者無首從皆處絞斬彼郝榮拘執死囚巳成得刼况石昌璞依奉府命摧拉㐫威惧有折傷因之損死度其情莭誠可恕原盖公心除害之理多私計故殺之意無據所犯設若扺罪理合照依舊例量情施行佀為相應兼夲官前後敗獲賊數合得未給賞賚甚多將功贖過亦不至此不然恐當斯職者遠近聞之因以觧體使賊軰潜知幸快禍心且長其剽刼侵牟之勢深爲未便據此合行申理至元八年六月初三日尚書省陳赦訖論隨路交鈔庫令緫管府提點事狀夫時有通塞亊貴改更故古人因時制宜不拘常法而憚變更也切見隨路鈔庫行用元寳鈔数多者三五千定少者不下二三千定毎歳差設庫官止慿一二保官即聽注擬近年巳来如失䧟去處雖監督正人及着落元保湏管陪納数足至經渉数年徃徃有破家不能結絶圎備者兼保官多不親即故出於一時面分又何甞計保者家産之虚實錢糓之果能通曉也方今鈔法極是通快但委用非人少有侵䧟便是一路鈔法因人爲累少有澁滯足滋長奸弊與其治於巳然無可耐之後何若防於未然易為力之前愚見今後合無公同選舉其抵業信實委通錢糓人貟勾當就令夲路緫𬋩府官毎月以次計點見在題押赤暦其府官却不得因而恃勢借貸官錢違者許庫司申覆上司照驗如此使朝夕得相臨視上下逓互関防官無失䧟之虞人逺奸欺之弊照中綂元年巳来巳曽依上施行至是便當今各庫雖按月赴提舉司申報單狀赤暦於関防寔無所係盖非切近臨視中間作弊旣無畏避又不能即時知覺䆒治是申押本司徒常例虚行而巳據此合行舉呈伏乞照詳定奪施行論待闕官預爲照㑹各處事狀切見省部將隨路守闕官貟不計月日逺近受除后即行下各路照㑹曰某年月日某代某甚者至於預徃任所守待要結所在風俗凋弊致一方吏民將舊官輕視㓕裂或督責所行則曰汝計日去官耳見任者旣爲齟齬不苟且保禄爲心以俟其去者幾何人斯如此是官府吏民上下離合且使無事猶云不可况軍民宣課工匠一切事務今皆取辦州縣中間脱有失悮利害所関非輕今後合無除將守闕人貟令祗受還家聴候外省部驗赴任月日旣近然後照㑹各路佀爲未晚能然庻幾官民去留之際兩得安便不致上下苟且耽悞一切亊務深爲便當據此合行舉呈論外任官展裹公服事狀切念古人制作冠服盖所以别上下而尊嚴也今者隨朝百官與隨路管民官上自宰相緫府官下至簿尉其品從散官俸禄公田子孫廕叙等事畧皆備具獨公服展裹之禮未見施行合無照依舊例使各官自備冠服公􅈦展裹理事如此不惟見國家禮文有漸其於官府威儀寔為尊崇論撫勞襄陽軍士事奏狀切惟古之用人能盡力忘死者不過下通物情閔其勞苦説以使令而巳兼兵以氣為主所貴感發振作不致有懈怠堕歸之意戌役雖乆事功可成伏見襄陽之役以十萬衆頓堅城之下經今四年暑天炎瘴攻守暴露不戰而疫死者無日無之即目巳属炎瘴江水向發設如去歳夏宋人復以舟師來援内以窮㓂必出相應其利害所関非輕當此正帥臣籌畫之秋將士竭忠之時也今省官雖節制於上朝廷固冝特與撫勞感發人心振作士氣以愾所敵此以夜戰聲相同晝戰目相見之意也以某愚見合無聞奏選差近侍信臣奉將恩命詣彼軍前宣諭撫慰使功過兩明賞罰必信然後序其情而閔其勞使三軍之士僉曰我之生死有所歸矣我之勤苦爲上知矣旣喜如此雖以歳月置之重地人將奮發忠義心力一殫勇氣自倍而親上死長以謂當然所謂説以使民民忘其死且使煩暑可變為清凉矣兼襄陽窮㓂料其時勢日就困蹵以冝重懸賞格射書城中諭以禍福有能禽致主帥或番城出降者授以某官某賞至於軍校預謀有功各以次論授外據老弱疾疫軍人旣非精壯可用復使疫氣蒸染又為未便有無分㨂暫還休養如此則人有所望去留兩安故兵法云視卒如子可與俱死兼丞相史公去歳巳曽如此施行師律軍心兩寔真順以時勢觀之據上項事理恐佀是一法伏乞御史臺照詳聞奏施行論宣課折納米粟實常平倉狀切見隨路起盖常平倉敖二千餘間巳是功畢今秋豊収見得官為和籴以實廩庾然有未便者如近年上都中興西京等處和籴粮斛所委官吏徃徃作弊官錢旣為欺隱粮斛又不數足隨復差輟省部官打筭追徴經隔數年不能結絶不惟官司紊煩公家急無所濟體訪得去歳尚書省為山東道軍闕乏粮儲將附近州郡課程折納米粟接濟甚是便益合無照依巳行事理趂夏麥收成及向前秋収將農民六色課程約量折納粟豆等物公私寔為兩便免致有欺隠紊煩之弊據此合行舉呈論州縣官經断罰事狀切惟禮義廉耻國之四維諺又云無瑕者可以戮人今切見仕途之間廉耻道䘮贓濫公行自立部以來州縣職官徃徃贓濫不公經值断罰者毎選不下數人例皆遷叙不過降等邊逺而已叅詳爵禄者勵世磨鈍之具據見行降逺格例係亡金弊法固非懲惡勸善之道似不足取兼州縣字民之官務要宣明教化禮義興行乃所任責彼身經断罰處民之上豈惟内懷慚德先不自安部内之民將何化服欲望四善具五事備難矣照得唐例職官任終驗所犯輕重有𢾗年停勒之法合無依倣定奪如贓濫不公罪應罰俸至幾貫以上及經断及若干者今後盡行停殿庻幾懲一勸百逺去甚者不致敗群使士興廉耻之風俗𬒳肅清之化四維張皇内外之職修矣秋澗先生大全集卷第八十九
