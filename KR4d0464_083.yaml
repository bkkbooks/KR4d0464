body:
  text: 烏臺筆輔序至元改元之五年秋七月憲臺筆建于以用昭太微執法之象詔前平章政事塔察公為御史大夫曰中丞曰殿中侍御史以帖赤木八刺撥灰二焉曰侍御史曰治書曰監察御史純用漢人一切事冝率循舊典其裏行十有二人令各舉所知以充貟數侍御史太原髙公乃以相人梁貞前翰林修撰左司都事惲俾􅈾遴選方朝廷嚮治思有以重之其監察到臺特詔庭見以肅其氣優祿稍以厲其嚴朱衣哀板雖以七品就列秩望清峻天下事無非所當言者其出使四方佩金符分屬掾馳馹傳中外具瞻凛然聳繡衣直指之望至有恨其崇資不得與之同事者內則號下臺通論駁設六察畫坊廂縱遊察小大事月限以數於是騰章抗狀紛畨迭作霜逐簡花風聲動臺閣矣僕偎厠裏行頗收薄用比受更凡三十有二月尸素既久具藁紛然併以外臺所言一二凡得臺綱書記事狀時務等篇揔一百五十餘章釐為五卷題之曰烏臺筆輔客有覽而誚豫者曰昔人諌草往往削而去之子今是舉不幾於自用昭晣以章時事之非乎子曰客何見之晚也裏行言責也人與言雖卑而微其見於此者皆本臺巳行底至而不遺者也故書之䇿正欲表夫朝廷寬忌諱重臺諌顧惟蕘言曽不少棄見乎微其至可知已至於政貴有恆辭尚體要豫雖不敏中或有一得焉是又不可因巳陳而廢之也客唯而退於是乎書以為序烏臺筆補監察御史王惲今呈謹集録到御史臺典故條例上自秦漢迄於宋金凡七十三事逐一開列于左有可行於今者伏乞釣覽采擇須至呈者一古今名號更易御史大夫秦大司空漢大司憲唐御史府漢憲臺後漢蘭臺魏晉中齊左右肅政臺唐左右御史臺唐一貟數品從唐制大夫正三品百官志一貟六典二貟中丞二貟百官志正四品六典正五侍御史百官志六貟從六六典四貟正六殿中侍御史從七百官志九貟六典六貟監察御史正六百官志十五貟六典十貟録事二貟從九金制大夫一貟從二中丞一貟從三侍御史二貟從五治書侍御史二貟從六殿中侍御史二貟正七監察御史十二貟正七典事二貟從七檢法四貟從八一三院人數唐制臺院令史七十八人書令史二十五人亭長六人掌固十二人殿院令史八人書令史十八人察院計史三十四人令史十人掌固十二人金制獄丞一貟架閣庫管勾一貟令史一十人分掌名頭上臺機密房掌察到應干公事下臺機密房掌同上臺謂監察紏到公事申臺吏户禮兵刑工房斟酌繁簡分掌刷案一三院例一曰臺院其僚曰侍御史呼端公知雜事謂之雜端非知雜者號散端二曰殿院其僚曰殿中侍御史呼侍御新入者知右巡以次左巡號兩巡使三曰察院其僚曰監察御史亦呼侍御每公堂會食雜端在南榻主簿在北榻皆絶笑言一臺門例舊日御史臺在宫闕西南其門北開取隂殺之義一置獄例舊臺中無獄有須留問寄禁大理若尋常之獄推訖斷於大理唐李乾祐為大夫請於臺置獄雖按問為便而增鞠獄之弊至開元間御史大夫崔隱甫奏罷之須留問者寄禁大理一班簿例治平元年閏五月詔御史臺閣門十日一具細書班簿以進自今大書為册月上之一兩臺發使例舊例兩臺歲發使八人春曰風俗秋曰廉察以四十八條察州縣一受事例舊例隻日臺院受事雙日殿院受事一職官如置御史大夫秦官位上卿銀印青綬掌副二丞相其監察御史掌監郡一彈奏進止例舊例彈奏皇帝視事日御史奏之景龍後皆先進狀聽進止許則奏之不許則止一同詰冤獄例凡為三司同詰三司為御史大夫中書門下省大事奏裁小事專達一衣冠例秦御史冠柱後惠文蓋用鐵為柱取其審固不撓唐大夫中丞遇大事押奏冠法冠謂牙冠也衣朱衣纁裳白紗中單以彈之小事常服而已一大禮例國有大禮則乘賂車為之前導一審覆例若有制使覆案囚徒則刑部參擇之一三司理事例則與給事中中書舍人更直於朝堂受表一中丞與皇太子三公相遇例元魏朝故事中丞出與皇太子分路三公皆遙駐車去頓軛於地以待其過其或遲違則前驅以赤棒棒之一六職例一曰奏彈二曰三司三曰西推四曰東推東西朝堂五曰贓贖六曰理匭一侍御史五曹例漢皆用公府掾屬髙第者為之一曰令曹掌律令二曰印曹掌刻印三曰供曹掌齋祠之事四曰尉曹掌廄馬之事五曰乘曹掌護駕之事一新除有罰例舊例新除者未曉制度有罰至罰有逾萬錢者若議罰則詢於雜端一侍御等裏行例唐龍朔元年置侍御裏行殿中裏行監察裏行武后文明後顓以裏行名官長安二年復置內供奉官一供奉例舊例掌殿庭供奉之儀式每朝與侍御史隨仗入位在中丞下給事中中書舍人後一持書故事持書侍御史者本漢宣帝元鳯中因路溫舒上書冝尚緩刑帝深采覽之季秋清讞時帝幸宣室齋居而決事令侍御史二人持書故曰持書侍御史一四推蒞太倉左藏出納例舊例以殿中侍御史第一人同知東推蒞太倉出納第二人同知西推蒞左藏出納號四推御史一大朝會例凡冬至元正大朝會則具服升殿若皇帝郊祀巡省則服從旌門往來檢察視其文物之有虧闕則紏之一銜署例凡彈劾之事御史言於大夫若遇大事則方幅奏彈小事則署名而巳一監察不得供奉例舊例監察正門無籍非因奏事不得入至殿庭開元間勑並令隨仗而入不得供奉一監察例凡冬至祀圎丘夏至祀方丘孟春祈穀季夏祀明堂季冬祀神州五郊迎氣及享太廟則二人共監之朝日夕月及祭社稷孔宣父齊太公蠟百神則一人率其官屬閲其牲牢省其器服辨其輕重有不修不敬則劾之一會議例尚書省監司七品巳上官會議先牒報臺亦一人往監若據狀有違及不委議意而署名者紏彈凡有勑令一御史往監即監察受命而行亦監其過謬一監齋例凡京都忌齋日則與殿中侍御史分察寺觀七品已上清官皆顧行香不到則牒送法司一監決囚徒例凡決囚徒則與中書舍人金吾將監之一在京監察例分知左右巡各察其所巡之內有不法之事謂左降流移停匿不去及妖訛宿宵蒲博盜切獄訟冤濫諸州綱典貿易隱盜賦斂不如法式諸此之類咸舉按而奏之若不能紏察及故縱蔽匿者則量其輕重而坐所由御史一監察御史雜例分察百僚巡按郡縣紏視刑獄肅政朝儀朝廷有不肅欽者御史則紏而劾之每二人五日分知東西朝堂一邊功例凡將帥戰伐大克殺獲數其俘馘審其功賞辨其真偽一門直例凡自監察御史已上每日一人於本司當門直以檢察臺中出入及令史領詞訟過大夫之事若緣詞訟事須推勘者大夫便委門直御史以推之一風聞例舊日御史臺不受訴訟有通詞狀者即於臺門候御史御史徑往門外收采知可彈者略其姓名皆云風聞訪知一相遇例凡御史以下遇長官於路去戴下馬長官斂轡止之一監圍例舊例搜狩則監圍察斷絶失禽者一監選例舊例吏部將除定貟數及擬到州縣付之監察於吏部别置監察一幕御史閲數臨視而已若中間或有資歷先後品從髙下及不應等事許授除官陳告御史即推究根因與之改正一進帖例監察舊例所進帖子止是今呈子樣但內為腰封其囊上用黃𥿄作帖黃上書奏帖二字下書臣某謹封一照刷例舊例照刷所司先具事目到臺其文卷後粘連刷尾具公事本末赴臺照刷監察御史於正位坐閲朱銷簿臺令史一人在傍亦坐執掌具到事目其當該人貟引卷通讀若係算數文卷更設帳科司吏一名與臺令史一同刷磨其中但有違錯稽遲監察將文卷收訖申臺量情治罪餘無違錯者即令大程官於刷尾騎縫近下先用刷訖銅墨印然後蓋以監察御史朱印及於朱銷簿上結尾後亦用刷訖銅墨印一督軍御史晉職官志光武建武𥘉征伐四方始權置督軍御史事竟罷東晉孝武太元六年復置隋煬帝時監軍御史一符莭御史前漢百官表其治書符璽者印綬比二百石以上皆銅印黃綬漢官儀尚璽四人掾史趙堯為符璽御史尚璽者也晉職官志符節御史秦符璽令之職也漢因之位次御史中丞掌綬節銅虎符竹使符及泰始中武帝省併蘭臺置符莭御史掌其事焉一防禁御史晉職官志按魏晉官品令又有防禁御史第七品蘭臺之職也一漢六條漢官儀云部刺史周行郡國省察治狀黜陟能否斷治冤獄以六條問事非條所問即不省其一條曰強宗豪右田宅踰制以強陵弱以衆暴寡其二條曰二千石不奉詔書遵承典制背公向私旁詔中利侵漁百姓聚斂為姦其三條曰二千石不恤疑獄風厲殺人怒則任刑喜則淫賞煩搖刻暴刺截黎元為百姓所病山崩石裂訞詳訛言其四條曰二千石選署不平苟阿所愛蔽賢寵頑其五條曰二千石子弟恃怙榮勢請託所監其六條曰二千石違公下比阿附豪強通行貨賂割損政令一巡案官選判官支使例舊例十道巡案則選判官二人為之佐如本道務繁得量差官人歷清幹者號為支使一巡案出入例漢監者每三歲一更常十一月奏事三月還監焉唐巡案使率三月巳後出都十一月終入奏事宰相李嶠請率州置御史一人以周年為限一巡案州縣例諸監司每歲分上下半年巡案州縣具平反冤訟案訪利害及薦舉循吏案劾姦贓以聞一案察所部有犯諸案察官知所部官有犯若事理重者躬親廉察部民訴訟縣令同餘事聽先委不干礙清強官體究有無實迹結罪保明申所委官司於案章內明坐所差官體究到事因並不得出榜召人首告即犯贓私罪雖巳離任𬒳告論或因事彰露者聽案治一具發摘過贓吏例諸案察官每歲終具發摘過贓吏姓名置籍申尚書省一巡案許見賓客例諸監司巡案許接見賓客惟不親謁一直指使漢直指使持斧衣繡衣一知班受百官及命婦入宫帖子例舊例百官入朝知班一人於宮門受百官及命婦入宫帖子其止書某官某職某爵上用職印令執事人授知班蓋使知其百官是日有疾病有故者其所告狀為之曹狀一知班紏彈例殿中侍御史下設知班十人如百官朝會知班四人於四方臨視如有失儀墮簡者知班向其人前問何姓氏然後具狀紏彈一主簿例隋大業三年始置隋二貟唐省一貟掌印授事發辰勾檢稽失及𬋩轄臺中雜務公𪠘厨庫檢督令史奴婢配勳散官職事每食則執黃卷書其譴罰右呈誥朝逈為工部尚書集賢院學士判西京留司御史臺他官止云權而逈云判者以三品故也理檢使宋朝淳化三年置院在宣德門外西北廊鼓院之西令登聞鼓司進狀人有稱冤濫沉屈者即引送理檢院審問登聞鼓院宋朝鼓在宣德門南街之西廊院在外門西之北廊舊曰鼓司景德四年五月改今名凡文武臣僚閣門無例通進文字者諸色人進狀並先經登聞鼓院除告軍機密事及論訴在京臣僚即依例實封如進入後審狀有異同虛妄及夾帶他事並科違制之罪所論事理重依格勑施行仍令進狀人别寫劄子節略要切事件連粘於所進其餘所進文字並先拆開看詳定奪或有元本文字照證速牒合屬司分取索若事合施行及所進利濟有可觀採便通進若顯有違礙不可施行即當日內告示本人知委不識文字者許陳白紙據所論事件判院官當面抄劄詣實口詞仍當日據收接到所進文狀都數逐件開坐行與不行因依具單狀聞奏若進狀并遇白紙人稱鼓院看詳不盡情理即許經登聞檢院進狀披訴仰檢院詳酌事理若鼓院所定不行為當即據不行為當緣由判押審狀與進狀人收執如鼓院所定不當即具不當事件并元進狀繳連進呈其收接所進文狀亦於當日內具都數開坐行與不行因依單狀聞奏其披訴人即時判審狀給付即許於御史臺陳訴其登聞鼓院檢院委實行遣不當者方得接駕及繳所判審狀披訴當付所司勘鞠如披訴得實判鼓檢院官必行朝典如是虛妄本人科上書詐不實之罪未經鼓院進狀檢院不得收接未經檢院不得接駕進狀違者依法料罪判院官二人舊以內臣勾當至道三年改用朝臣監鼓內侍二人令史一人登聞檢院唐置匭宋朝太平興國九年改匭為撿東延恩白崇仁南招諌曰思諌西申冤曰申明北通玄曰招賢改匭院為登聞院院在宣德門東廊之北景德四年五月改為登聞檢院是月勑如急速文字畫時進入常程文字一例每五日一次於檢院內通進天聖七年上因讀唐史見匭函逹下民冤枉之事乃謂左右曰天下九州之大豈無冤枉之人若至京師檢院鼓院理雪者必是州縣官吏提點刑獄轉運使不能理雪又若不為申理則赤子無告矣乃置匭函仍專命御史中丞為理檢使應諸色人除竒巧法術邪妄干正道事不得上言及常程公事自依久來體式令逐處官司并鼓院收接外如有指陳軍國大事朝政得失大改冤枉纍經訴理未獲辨明或事干機密並許詣匭函投進內委是急速文字畫時進入其餘並每五日於檢內進納如無亦具單狀聞奏如檢院進狀人稱冤濫沉屈者畫時引送理檢使審問判院官一人舊止舍人兼掌淳化二年始命他官判之都護府都護一人掌所統諸䉒慰撫征計斥堠安輯蕃人及諸賞罰敘録勳功揔判府事副都護二人長史司馬各一人兵曹各一人餘並不置射聲校尉漢掌待詔射聲士工射者冥冥中聞聲射則中之因以名也須待所命而射故曰待詔射聲戊已校尉漢元帝𥘉元元年置甲乙丙丁庚辛壬癸皆有正位唯戊巳寄治耳此所置校尉亦無常居故取戊巳為名一説戊巳居中鎮覆四方漢所置校尉亦處城之中撫諸國也散騎常侍騎馬並乘與車騎而散從無職事也舊日監察所行一差監察例本臺且以三人為率本臺備具本官腳色伴奏自進呈御筆點差假如首先一人是臺家法意者御筆或點却次者第三者一無故入御史臺杖六十撾鼓者先杖八十一臺諌撿院鼓院臺既立餘皆合行鼓院在掖門東檢院在掖門之西一舊來監察照刷止是徹卷看讀但有稽遲即有杖罪如違錯等事更不消説監繫取招訖送法斷定然後決罰據勾當限次如瘡未愈勾當瘡巳愈不出又是罪及照閲朱銷簿一金國省院臺為三省一舊有六臺六院一上下臺大夫中丞為上臺侍御史以下為下臺一治書侍御史乃是臺奏事官為制一臺事也一報午時省即起然後臺起六部視臺起然後部起一按察兼運使其意已為按察中間一切欺隱不公事則不敢犯早辰先與書史判按察司事次乃與同知副使判運司事一舊日監察如某吏行止不修及贓濫者監察於本人門或帖子或粉壁書云某人行止如此身事便索廢却一臺有三臺上臺下臺外臺一舊日監察出使帶牌起驛馬一監察有急事至撒合門納帖子無問早晚自宫中傳入奉御傳於門娘門娘轉於承御承御聞奏上如熟寢承御直夜者不敢聲言擊所懸之玉為之襲聲既寤進讀某人奏到帖子如此等事若上即裁決令承御批送省部臺上用小方玉印印之所司得旨登時勾當趂明日朝奏對一舊日監察外路有體究公事差部官一貟并部令史事得其實官人申臺吏人杖一百巳下皆決之若有大改公事臺司覆察得實關所該部分差部官與監察一同致勘如所察不實監察所得罪止是罰俸贖銅一舊日三品巳上官有罪監察體究得申臺呈省聞奏若宣勘本官不問虛實即便承伏如中間實有冤枉令家屬告
