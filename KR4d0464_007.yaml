front:
  text: 秋澗先生大全文集卷第七七言古詩
  hash: sha256:5e7dfac998f755b99fc4a03800c505ec3ed5a87c786841240c891bc12f2ac65f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_007-1a}
body:
  text: 題薛少保稷畫鶴圖晉公化筆神胎禽超超中有萬里心通泉老壁堕茫昩此幅冩影逾精深細看粉墨色欲盡元氣突兀開雲林雙脛森碧玉老頂朱砂丹舞凬警露两無謂理此脩羽何翛然毰毸不受世塵汙真骨照映蓬壼僊王恭雪􅌁忽散亂幾點冷卧瑶池煙恍疑坐我九臯下髣髴清唳聞秋天華陽宫深春晝閑晴苔冷啄松隂寒宣和六客儘模冩夢不到此宫清妍蹇予三年事撃搏俛仰随人空飲啄長纓塵滿抗凡容比擬孤清餘愧怍君不見坡仙作嘆真可人退易進難良自度摩挲老背忽驚心以倖乗軒非所樂仙槃月露濯金莖緑野風煙連竹閤得陪髙歩繞池塘老我何心望寥廓僧傳古坐龍圖嚴柬平所藏至元二年秋九月張簽省耀卿處觀七年閏十一月甲戌公退馬上偶得時秋苦旱冬天無雪深山大澤物所蟄千丈懸淙掛青壁潭隂水黑不見底老雨𥘉開元氣濕蒼龍何䖏行雨歸闖首踞坐紅雲堆山僧駭絶噤不語萬壑隂霧生緇衣咄哉傳古隱龍性隔戸冩影窺天機一從元化墮此筆飲海不復觀晴霓世間畫本萬尺蠖尾鬛一掩無晶輝比年一旱㡬焚如牲幣空事山川雩群龍癡睡洞府黒六合任使黄霾汚何當鐡匣出雷火衝屋而去騰天衢六丁奔命僕射御倒捲溟渤天瓢㪺滂沱一洗乹坤净却㰸神功寂若無趙邈齪虎圖行田給事和卿所蔵巔崖老樹纒冰雪石觜枒杈横積䥫北平山深林樾黒下雖有逕人迹㓕耽耽老虎底許来抱石踞坐何雄㢤目光夾鏡尾束胯百獸却走潜凬埃趙侯欲盡神妙功都着威稜阿渚中想當䃲礴噀墨時衆史縮手甘凢庸至今元氣老不死神物所在纒隂凬前年驅馬下靖邊崕東突起草底眠腰間恨無䥫絲箭寢皮食肉空長嘆今朝過喜一嚼快熟視湏頂為摩編貨馴跖服暴戾息弭耳道義思拳拳主人愛玩中有謂遇事炳変通經權我聞漢家大獵阹冰天豸冠思賦長楊篇四方猛士今雲合早晚龍旂到渭畋楊秘監百馬圖孫子譽蔵兾北之土馬所生息軒英爽房良精定年苑馬凢幾抹故老一說驚龍騰大青小青帝所御勢與八駿争馳衡先生此時行秘監扈從㡬賦汾隂行翔麟日給盡龍種春風不省鳴鞘聲楊侯疑神洞化窟筆底抺電流雲傾當時一𥿄萬金重曹霸撫掌江都驚生平寫影㡬千疋未若此圖眞傑筆明䆫一日百回看元氣淋漓悵猶濕隂風獵獵吹旌竿雲黄草白沙漫漫大奴乗秋閱清峻渥洼􅍅湧翻晴瀾浮深角壯遂天性不數南山之下汧渭間安得武鬃三萬騎濁浪蹴破東南天蒼茫囬首鍾山渡一凱歸來入漢関華陽春草三千里還似駉駉畫裏閑和姚左轄梨花詩韻主人愛花情不薄淚粉闌干愁寂寞東欄一樹要洗粧走報詩仙揮翠杓醉歌不惜玉山頽明日春凬紛雪落杜詩韓筆丗所驚大敵無前闘清廓王城春事歳如許三載癡牀如酒惡何時翳鳯驂群僊華時吟眺青山郭絳州法帖歌謝張元礼兼呈按察先生君不見晉人九京吾莫與天遣元精留網楮絳州一帖天下竒要以鍾王爲藝祖内家中秘無雜收餉間等書爲丗取固知瓦注覷天巧虎卧龍跳照今古羗予嗜書昧所守集古無由似歐九王城陸海㡬燃犀下照光恠駢萬首管窺雖得見一斑随即遺忘非我有承君惠此石本佳銀字模糊真弊帚奔蛇走虺幾千丈詭狀竒形驚户牗手追心慕日有得顔氏服膺承善誘明䆫一日百回看十襲深蔵重瓊玖就云好竒家四壁破屋潤餘豊且蔀三杯適喜徑醉眠墨池濡首追狂顚覺來捉筆便揮灑徃徃逸興驚䝉顓裴旻劒舞凌雲煙作詩聞君君豈然料應一笑絶倒乃父中令前題趙仲噐治古齋我官御史二十月秩滿身閑在京闕朋從日約扣人門閱盡名書古饕餮古人不作古意在鬼刻神劖多巨測喜逢治古齋中老論說精英探天巧及觀吕氏愽古書照眼形模緫傳寳趙君陶鑄真好手元氣鴻濛驚再剖典刑髣髴三代英賜噐政宣皆弊帚免憂躍冶不祥金蟲臂䑕肝争好醜題都山老人慶九十詩卷次胡貟外韻古風三百聖所刪福履詠歌先夀耉後人作計競朝昏徇利覔官甘妄繆正縁得喪損天和禀受不只歸簿厚劉公九秩固天與護餋風神逾稚㓜脫遺外物委路塵保蔽元精若勳舊歲寒霜檜自後凋露影朝菌不終晝笑㸔蒲水鴨頭緑細捲春風釀重酎一杯吟醉頰浮丹不羡周人台背皺古耒純孝錫類多行見諸孫紛彩綬悪溝行在平陽翼城縣北大尖山中西烏嶺下唐都鄙歘得平川心適喜馬煩車殆問前途人說北山路無㡬朝來徑走山南坡崗勢稜層登陛址蜂回路轉十里餘驚度悪溝深井底偃身直下㡬百尺十歩徘徊九還止南来山行五百里屐齒磨平無可跐折升雲頂俯哀壑山似鯨翻掀鬛尾羊腸絶磴盤不盡眄徹前峰後如指王陽斥馭心固壯老馬淩兢垂兩耳胷中大物巳隱然又爲此山相角掎我觀晉問非眼見今日河山真表裏畦田髙下畫不如煙崦人家穴蔵蟻晉人勤儉風土然山頂開耕自山趾一丘一壑凢㡬家而復唐侯風化始河東大抵九分山民既能勤生自敉蠒絲保障兩雖拙獨有一安差可擬山間一笑自絶倒汝亦何為論治體忽當疑逕問畸人欲荅予詢思所以如君面帶麋鹿姿遽縛塵纓解蘭芷優游文史恐難任渉險乗危胡至此世人欲速見利心捷徑趨時豈君子終南譏誚責末了千古坦途人所履㗛揮植杖指東張汝急去予無我若非隠者荷篠徒行念斯言真到理暮投僧舎不能眠走賦鄙詩還自箠題趙城南王開鋪樓壁老澗盤回㡬千曲洪水平來兩崖出邑居逺邇依地形南北經行看不足羣山掩映肺腹如河水萦紆衣帶促畦田雖狹水所膄風俗儉勤仍歳熟東西南北緫除官此心少盡物自安區區簿䆠封丘耳有懐莫遂空長嘆為問霍河橋下水驚湍能激懦夫肝清江引為僧永真賦秋江水清深㡬竿渙郎放舟煙渚間中流舉網紫鱗出不祗愽酒供盤飱借問漁翁樂何主泛宅浮家無定所賣魚生怕近城門肯到紅塵汚人䖏蘆花兩岸晚潮平憶着􅐜鱸思徑去朝廷物色那可得澤畔行吟何自苦滄浪水清濯我纓林婆酒熟容賖取人間萬事一醉休睡煞江南煙與雨覺來滿眼是青山獨速緑蓑還自舞漁父樂真可與細㵼焦桐入新譜謂琴操有清江引也朅來山城官事紛薄書亮吏對斜曛開圖空㑹漁家趣我恨不若江頭人張郎中彦亨督太原袱運道出平啺索鄙語為餞因賦是詩兼簡子𥘉宣慰元年天䇿開明堂千官剱佩争翺翔當時張君正年少書不减陳元康我初得子知逺到自笑野鶴空昻蔵河山分陜嚴津吏六道煩君居右地十年坐聽棹歌聲置散投閑非所憙試難去易凢㡬書思遇蟠根伸利噐南耒督運并門煙鞭籌心計驚孤騫万材蔽河晉山兀目中巳具龍􅋮舡生平故人王衛州東南開府羊杜儔竹頭木柹方並蓄如君俊才當見收自憐右屬槖鞬意射圃何時𥙷唱籌平陽官府行奉送部掾劉文偉北還兼簡省臺諸公平陽官府居上㳺我来視事星未周眼中之人競誰得東西两曹李与劉一朝歳貢入民部折獄論文欲誰語老夫雖獨心所喜雙鶻乗秋看掀舉自憐白髮一衰翁終日區區簿領中米塩細碎固當略要以不盡心為忡君不見鄭公温國两通判至今德業昭河東嗟余何為秩与等正有報國公而忠何顒至言豈易得耿耿孤懷庸自適因凬寄謝臺省公儻有伻耒慰岑寂鵜鴂詞甲戍夏六月宿李将軍林舘聞之有感而作寄友生王宣慰子初樹頭玄衣郎徃往人罕識汝舌㡬許長音響乃尔激穿空裂霜竹借問何所軄農家呼汝為憂雞隴月向斜鳴不失田間趣起早耕人秀樾深蔵曉無迹隂隂夏木共山邑二十年前讀書客一聲驚夢入幽䆫露氣滿空庭樹黒只今早暮無所為两眼眵昬頭雪白咄嗟禽鳥逐時新我髪何由黒如􅃮逰姑射山神居洞至元十一年正月二十九日也幽巖洞如瞰隂壑洞口飛甍架虚閣眞僊乗龍竟何在香火千年事如昨䝉莊一言疑萬世槁死荒山凢㡬輩何殊山石老且頑我欲砭訂其能還呼兒㗛折山花看淡白長紅恐自然比洞名王母洞南山截然如案齊東西两崖相抱圍洞中僊人去不返老柏滿巖空翠微我耒天氣二月𥘉山鳥山花皆友于野情本与撨漁熟莫遣遊人避使車銅方爵歌為翟噐之賦荒陵盤盤枕山埛石麟埋没秋草平隂燐夜出金作聲牧兒走避群雉驚佳城一朝見白日神物還從野人得勒銘壬子歳幾周考䆒古書猶可識篆文䥴刻非近世周鼎殷盤廼倫儗两柱作一作撑貝形四趾垂象齒雷章繞腹隠觚稜老鳯喙長驚下陊土花繡澁不敢蝕飜成翠羽丹砂紫我觀三代制飲噐多圎體咄尔形模方􅥵刻殆神鬼秋􅌲春蒲非可比物之隠顯固有數流落君家得所止土雖好尚具眼少愽雅如卿古君子𥙷亡吕氏尤取重元氣淋漓開太始君不見逹人大觀者今古一昏曉人生極壽百歳止作計千年意何藐我歌君試聽古人誰盡了九原不復作此噐君當寳一笑尊前為傾倒短歌行山中寒食作是日逰李馬二墳花枝入簾晴晝長㳺絲翻空網春光一聲金縷酒滿觴聽子短歌踏春陽雲淡風清日将午信馬東城歴煙隖人家野祭須墓頭白白紅紅滿原圃飢鳶欲下影婆娑不待播閭徹盤爼陂陵髙下麥青青貴賤賢愚同一土况兹百歳忽如寄過眼浮榮誰比數古人感此由重論力取功名照千古東崗畸人說隴西攀附雲龍揔風虎鉅株枝散勢莫依瀟索荒丘穴鼯䑕豈期健婦持户門一片豊碑論世譜林宗不作蔡邕死旌紀紛紜争媚娬銀罌酒煖藉草坐滿引一盃私自語吾家先壠在衛南老栢如林百年許起身耒耜世有澤嗣及先君擬掀舉生平抱負奈數竒賫志下泉良獨苦悲纒風樹逾一紀業在青箱恨難抒伐柯有斧睨不逺負荷至予尤莫取一官覊靮晉州城竚望南雲淚如雨風秀丹山歌至元壬申耒官平陽得之於録事叅軍周幹臣䖏周予弱冠時伺舍郎也十一年春三月十五日與兒子孑焉正讀王黼朱勔傳及僧祖秀華陽宫記因作此詩以贈周云宣和寳石眞渊藪萬狀卿雲照靈囿當年㡬鑿太湖空嬴得綱舡枯九有丹山風秀徽所譜嬝嬝金書瘦於栁周郎携自河陽城夜壑雖深縱豪取一峰突兀王潺顔曽在紅雲顧眄間先榮後悴物常理我今感汝為長嘆朅來伴予茒屋底憔悴秋娘歸故里清燈摇揺光滿几爐煙作雲研涵水老虬蟠倔似求伸隱隱猶能鱗甲起此時對君心境閑人爲物遷今亶然掩書瞑坐清思逺夢繞華陽松桂寒我思象江老守尤酷嗜不惜千金輦致來長安家無婦兒居無廬六石與伍歡有餘義山賞識豈徒爾愛蟠好尚極類古人之意欤一杯下咽歌者誰南鄘小子王共谿醉歌行燕平湖作時為平陽府判蒼陂水漲玻璃滑堤栁含煙翠蒲茁當年亭舘巳陳迹老樹遺䑓猶秀㧞我來置酒池上頭使君不負騘馬逰縣曹供張散平碧呼集妓樂羅珍羞君侯一笑䦕懐抱十日東風醉芳草自嗟客子何所有春色三分二分老人生歡樂不易得况値清明時節好終年塵土簿書裏未礙金尊重傾倒湖光照眼明羅綺碧㶑瑶翻歌扇底氣酣急遣張水孅取樂不論冠佩委溪風吹靣縠紋生两葉蘭舟鐃皷起紅衣飛墜彩䋲髙没入蒼煙驚躍鯉郡人亦喜歲華新四靣縱觀空巷里佳人弄水祓不祥公子聮鏕特觀羙錦筵香細酒不空既醉窮歡忘誇靡溪神捧出柘枝娘翠袖娉婷矜便軆繡靴畫皷隨節翻羅襪塵生歩秋水一春盛集固云樂此㑹賔僚尤燕喜山隂修禊晉諸賢暢叙幽情差可擬客言行春似蜀守醉到浣花而巳矣樹稍晴日向斜暉使君皂蓋先醉歸就中二公㝡愛敬栘次臨流盡餘興一杯未了風翻浦山公倒載尋歸路自忴白髪非春事多爲湘妃厭歌舞呼児覔𥿄紀歲時不以斯文烏所覩至元乙亥三月春元巳纔過日在寅浩歌月底還自笑醉裏詩成似有神上二公謂同知張明卿治中忽英甫玉璧城懷古至元甲戌冬十月廿五日由稷山入萬泉道出故城臨風吊古慨然有作我行河東幾欲遍大抵盤回山阜轉南崖髙與北山齊玉璧城根分一綫荒煙廢壘點杯土砲具梯衝經百戰短碑盛説鄭君靈萬騎隂風想平甸一曲悲歌敕勒川當時神武巳凄然韋公守禦儘良策更着百升飛上天乃知誣殺咸陽日即是邕皇入鄴年鄖君韋孝寛封號有宋元祐間廣碑邕即字文武帝名建德六年平齊入鄴聽祥師彈琴十二年四月𥘉四日野奠崇福院作冠帶對鳬吏三年簿書叢王事固鞅掌我禄亦巳豐有時意不愜耐此磈磊胷濁酒餘妙理中堅若為攻朝來偶過野僧話禪房花木幽而通坐中靈府覺虚寂祥師爲我彈秋風古人不復作古意留焦桐秋聲瀟瀟随指發煙篆裊裊縈簾重悠然拂衣起逺日翻冥鴻閑愁積思失所在盡随槁葉一掃千林空㐮陵行暮春庚辰日維丙駕言出逰亊耕省西郊微雨半晴隂幾點殘雲霧山頂馬蹄踏破落紅香飛盖追隨垂栁影晉人熟食一月節店舎無煙竈厨冷春到㐮陵滿縣花緑隂池舘揔姚家清尊逺酌㑹心賞不與鶯燕爭春華畫輪歸輾故堤沙金店西頭酒更嘉舉杯為憶劉漢事雲龍風虎何紛挐帝渊東開蓄峻址青衣行酒真驚䴥褰帷一笑兩寂寞野老指點宫臺窪萋迷悲碧荒城曲依舊溪流帶北斜贈賈主簿徳逺赴春官唐風思逺非難治竊戒官僚多自棄賈君三載趙城簿一縣至今稱事事秋風告别赴春官千里辭親不憚難湏知捧檄毛卿意要盡平生菽水歡戴松盡牛圖呉儂四時耕瘴煙吳牛見月心茫然戴郎此本極閑逸筆意逺出韓公前解縻脫鞅春事畢江臯野草香芊綿歸鞭影亂散平楚考牧大佀斯干篇因渠喚起歸耕興夣到西山谷口田李营丘寒江晚捕圖古人不地着所向無賦租漁蠻舟為家一葉縱所如斜陽淡淡明江湖萬魚戢戢依寒蒲幾家罾網晚未巳愽酒欲得松江鱸卧檣傍舫宿波靣不爾風浪防艱虞何當醉帶笭箵去添我煙波作釣徒七夕曰同府僚觀稼西郊秋風瀟瀟吹逺林兩山極望秋禾深同來觀稼憇樹下把酒一笑髙槐隂天公成事乃尔易一雨變作豐年吟田家耘耔心未巳當午相㸔理荒穢鋤端信有三寺澤更為禾頭添粒米自憐微䆠西復東且喜所向無災㐫丘民得所能事了我禄雖薄亦已豐老農堅話使君惠我曰論功歸太空天子仁聖感召和氣致時雍黄崖行黄崖峪深能幾許殆似赭餘無足数寕知竒石産山腰一脈砌如縈綬組青章紫質含玉潤錦罽孄斑驚製縷楚雖有材為晉用山節星馳来歴覩簡書専􅎥正官臨敢惜筋骸甞險阻褰裳上下谿谷間石角鉤衣互撑拄是時秋暑八月交背汗浹流氣煙吐班荆坐憇還自笑汝是愛山王判府守官四載愧無功今次扵公竭肱股役夫分功日有程荷鍾持鑱編什伍摧堅抉礙先墓脚不假鞭驅矜智取風埃蔽壑散雲煙巨石砰崖轟戰鼓不遑蠟屐阮孚逰眞作伐山靈運舉老翁炷香適何來再拜向山親呪詛溟涬纔分有此山其在晉邦羣玉圃山靈萃秀不自衒埋没荒山幾風雨材爲世用出有時一旦承恩藉君武漢家製度陋嬴秦大起明堂朝海寓堂堂天䇿干維城建國分苑開雍土正湏壮麗称王宫不爾何能回萬舞我今問翁汝何為扶杖叮嚀前致語翁云匠業㞐此山薄伎傳家自吾祖我雖垂老喜見此側陋明揚遇時主夕陽欲下山更好疊巘攅峯爭媚娬人為物蠧固亶然石兮石兮今玉汝曲沃道中與老農語大尖山前好原隰隴畒横縱忘南北人家種麥秋社前一片蒼煙朝雨濕田家稍豊即升平十年逰䆠𥘉無成㑹湏了却人間世白髮歸來伴汝耕新道成車中即事蜀山天險古所畏少陵有懐眞宰罪壯㢤此舉見成功一日連峰驚破碎老農傴偻向余言所謂一勞而永逸相携徑下弱羊巔鳥語山容兩豁然牛箱籠負連連出坐㸔輕塵抹白煙金店馬生者贈余峴山圖走賦是詩以謝之平生愛山復愛畫近歳長逰石林下暫還大府宿金城喜得馬生同夜話共云馬生非畫徒見來情性温而愉坐間贈余峴首畫江山秀潤與馬俱取之非欲奪所好開卷即與馬生對坐隅物㣲意厚将何荅走賦新詩當乗珠山中瓏研歌寄商左山副樞有石有石玳瑁色逺出姑山兩崕側我來伐采偶得之玉潤金鏗駭清越海霞蒸發爛朝暾蒼雪糊模點晴碧石中廼有此理存斵就庚庚玄色璧又如神龜負圖出渊水偃仆沙頭曝秋日山中長夜有餘暇老眼看書苦無力挑燈礲洗愛竒章慿几坐餘腰膝屈書生習氣老不除筆研留心朝復夕自憐持此果安用欲擬三冬文史畢呼児起視夜何其斗柄參横挿東北題董少平廟壁湖陽蒼頭虧政刑湖陽新貴帝女兄漢家三尺有成約臣宣守法身為輕主前取奴縳車下洛陽一市為震驚大奴走匿魄巳裭小奴側足回與行含悽入奏温明殿後漢殿名萬乗起謝難為情秪知強項古遺直我愛世祖英而明一丘荒土青山道下馬陵前拜秋草應笑摧姦百鍊剛比比柔夷指堪繞呉娃行至元十三年丙子歳冬十月廿八日亡宋皇太后謝氏次衛州唐津渡是日即舟行東下故有是作元年長星竟天芒謂至元元年也十年而後江東亡元城老嫗忍不死奉璽北走朝天王内家監領分嬪嬙魚冠髙䯻猶宮粧翠衿縞𬒮不曵地言語無異甌閩傖南來𥘉渡鐘山江羅韈去踏燕雲霜風塵千里河朔道慘淡粉黛無晶光憶昔掖庭𥘉選入十五十六先後行深宫花滿春晝長芙蓉水殿薫風凉朝儀雙引垂紫䄂珠櫳曉侍熏籠香秪知秦娥一生花裏活眉嫵老學呉山蒼一朝兵合景陽宫故國繁華佀夢中两宫問寢紫宸仗徃事盡逐江烟空黄帷羃野待水次郡縣護送浮航東万人山立看且嘆亡國大略今古同太極殿前天子班玉觴上壽頳龍顔柴家母子何負汝賜與僅免飢與寒悠悠万事不可必天道好還歸有德就中此理誰㑹得蓮華峯下髙眠客鎮州懐古吏部聲華山斗重身處平時若無用積年王湊失臣度諉使賊庭撩虎閧舉朝嘆惜試不測天意中間表竒節血衣滿前盛氣臨一語未畢兇鋒折鎮人萬目矚使華五紀得瞻唐日月嗚呼蔵噐扵身利有餘不遇蟠根何所别周卿二子歌周曹两家世系長伯仁之德再世昌諸孫詵詵見身後不數謝家蘭樹芳大児讀書書滿箱小児竹馬青衫郎掌中瑜珥生輝光紅點杏蕾争晨粧外家碧沼東西堂金粉滿貯芙蓉香今冬書來召歸省要畫百子春池傍伯仁有靈亦含笑紫川渊流殊未央紫川淵流真未央冬十月朔展墓囬有感新壟多故人少野祭瀟瀟滿荒草十年重到故郷山前日兒童冠佩好我時引鏡還自憐五十衰翁能不老正湏萬事聽天公不用時情生熱惱流行坎止即吾師試㸔古人誰盡了簜樽歌為宋少卿弘道賦海居两間勢雄尊地維火荒足怪􅎇春雷奮蟄地軸裂氣擁簜本驚輪囷雲蒸露濯玉幾圍癭異不數蒼筤孫洞蜑柸飲變古法欝屈斧断蒼龍根一朝六鑿混沌竅海潤猶帶風濤㾗初疑神螺闖首髻鬟古復訝凍芋出土鴟鴞蹲坤堣古非禁酒國桂醑碧㶑滇池春木蘭花發雪鸚囀野飲挹彼供鯨吞江妃竊弄山鬼看深夜嘨擲吹燈昏炎洲北走落君手孝節閱丗清而敦廣平磊落書載腹時浥妙理開清樽金壘玉斚非我事正湏一日不可無此君殷彜周卣列左右碧花繡澁腥龍紋簜之為尊尤可人蹇予蕭散嵇劉客黄爐乆為河山隔來逰都邑徒永乆若恋明時無寸䇿新豐樹色繞千官滿馬京塵歌偪側何時為渠醉倒枕渠眠一夢婆娑竹林國西京王生歌君不見西京王生一布衣㳺談公卿奚事為觧紛畫䇿作隂助頋盻勢利䡖塵泥延中結襪似倨傲一語能釋當時疑惜哉太史偶失丗與諱至今義烈猶光輝乹坤英氣初不問乃今復得是子趨人之急逾巳私襟期有在許諾重駿足肯受黄金覊凍雲曉拂銅駞陌雪花澹與梅争白平明東閤給事囬家近沙堤儘春色新詩吟繞錦窠香笑作平原眼中客人生百歳駒過隙只有聲光爲可惜丈夫適意杯酒間義氣愛君多感激岷峨秀色錦江波萬斛醲薫貯胸臆絪緼都作濟時具辨與朽株為粉飾吹嘘寒律變陽春未讓王生謀緩急君家義鶻固有歌更為樊川摇醉筆秋澗先生大全文集卷苐七
