front:
  text: 秋澗先生大全文集卷第七七言古詩
  hash: sha256:5e7dfac998f755b99fc4a03800c505ec3ed5a87c786841240c891bc12f2ac65f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_007-1a}
body:
  text: 題薛少保稷畫鶴圖晉公化筆神胎禽超超中有萬里心通泉老壁墮茫昧此幅寫影逾精深細看粉墨色欲盡元氣突兀開雲林雙脛森碧玉老頂朱砂丹舞凬警露兩無謂理此修羽何翛然毰毸不受世塵汙真骨照映蓬壼仙王恭雪􅌁忽散亂幾點冷卧瑶池煙恍疑坐我九臯下髣佛清唳聞秋天華陽宫深春晝間晴苔冷啄松隂寒宣和六客儘模寫夢不到此宫清妍蹇豫三年事擊搏俯仰隨人空飲啄長纓塵滿抗凡容比擬孤清餘愧怍君不見坡仙作嘆真可人退易進難良自度摩挲老背忽驚心以幸乘軒非所樂仙槃月露濯金莖緑野風煙連竹閣得陪髙步繞池塘老我何心望寥廓僧傳古坐龍圖嚴柬平所藏至元二年秋九月張簽省耀卿處觀七年閏十一月甲戌公退馬上偶得時秋苦旱冬天無雪深山大澤物所蟄千丈懸淙挂青壁潭隂水黑不見底老雨𥘉開元氣濕蒼龍何處行雨歸闖首踞坐紅雲堆山僧駭絶噤不語萬壑隂霧生緇衣咄哉傳古隱龍性隔戶寫影窺天機一從元化墮此筆飲海不復觀晴霓世間畫本萬尺蠖尾鬛一掩無晶輝比年一旱幾焚如牲幣空事山川雩群龍癡睡洞府黑六合任使黃霾汚何當鐡匣出雷火衝屋而去騰天衢六丁奔命僕射御倒捲溟渤天瓢㪺滂沱一洗乾坤淨却㰸神功寂若無趙邈齪虎圖行田給事和卿所藏巔崖老樹纒冰雪石觜丫杈橫積鐵北平山深林樾黑下雖有徑人迹滅耽耽老虎底許來抱石踞坐何雄哉目光夾鏡尾束胯百獸却走潛凬埃趙侯欲盡神妙功都著威稜阿渚中想當磐礴噀墨時衆史縮手甘凡庸至今元氣老不死神物所在纒隂凬前年驅馬下靖邊崕東突起草底眠腰間恨無鐵絲箭寢皮食肉空長嘆今朝過喜一嚼快熟視須頂為摩編貨馴跖服暴戾息弭耳道義思拳拳主人愛玩中有謂遇事炳變通經權我聞漢家大獵阹冰天豸冠思賦長楊篇四方猛士今雲合早晚龍旗到渭畋楊祕監百馬圖孫子譽藏兾北之土馬所生息軒英爽房良精定年苑馬凡幾抹故老一説驚龍騰大青小青帝所御勢與八駿爭馳衡先生此時行祕監扈從幾賦汾隂行翔麟日給盡龍種春風不省鳴鞘聲楊侯疑神洞化窟筆底抹電流雲傾當時一𥿄萬金重曹霸撫掌江都驚生平寫影幾千匹未若此圖真傑筆明窗一日百回看元氣淋漓悵猶濕隂風獵獵吹旌竿雲黃草白沙漫漫大奴乘秋閲清峻渥窪􅍅湧翻晴瀾浮深角壯遂天性不數南山之下汧渭間安得武鬃三萬騎濁浪蹴破東南天蒼茫回首鍾山渡一凱歸來入漢關華陽春草三千里還似駉駉畫裏間和姚左轄梨花詩韻主人愛花情不薄淚粉闌干愁寂寞東欄一樹要洗粧走報詩仙揮翠杓醉歌不惜玉山頽明日春凬紛雪落杜詩韓筆丗所驚大敵無前鬪清廓王城春事歲如許三載癡牀如酒惡何時翳鳯驂群仙華時吟眺青山郭絳州法帖歌謝張元禮兼呈按察先生君不見晉人九京吾莫與天遣元精留網楮絳州一帖天下竒要以鍾王為藝祖內家中祕無雜收餉間等書為丗取固知瓦注覷天巧虎卧龍跳照今古羌豫嗜書昧所守集古無由似歐九王城陸海幾燃犀下照光怪駢萬首管窺雖得見一斑隨即遺忘非我有承君惠此石本佳銀字模糊真弊帚奔蛇走虺幾千丈詭狀竒形驚户牗手追心慕日有得顔氏服膺承善誘明窗一日百回看十襲深藏重瓊玖就云好竒家四壁破屋潤餘豐且蔀三杯適喜徑醉眠墨池濡首追狂顚覺來捉筆便揮灑往往逸興驚蒙顓裴旻劒舞凌雲煙作詩聞君君豈然料應一笑絶倒乃父中令前題趙仲器治古齋我官御史二十月秩滿身間在京闕朋從日約扣人門閲盡名書古叨餮古人不作古意在鬼刻神劖多巨測喜逢治古齋中老論説精英探天巧及觀吕氏博古書照眼形模總傳寶趙君陶鑄真好手元氣鴻濛驚再剖典刑髣佛三代英賜器政宣皆弊帚免憂躍冶不祥金蟲臂鼠肝爭好醜題都山老人慶九十詩卷次胡貟外韻古風三百聖所刪福履詠歌先夀耉後人作計競朝昏徇利覔官甘妄繆正緣得喪損天和稟受不只歸簿厚劉公九秩固天與護餋風神逾稚幼脫遺外物委路塵保蔽元精若勳舊歲寒霜檜自後凋露影朝菌不終晝笑看蒲水鴨頭緑細捲春風釀重酎一杯吟醉頰浮丹不羡周人台背皺古耒純孝錫類多行見諸孫紛彩綬惡溝行在平陽翼城縣北大尖山中西烏嶺下唐都鄙歘得平川心適喜馬煩車殆問前途人説北山路無幾朝來徑走山南坡岡勢稜層登陛址蜂回路轉十里餘驚度惡溝深井底偃身直下幾百尺十步徘徊九還止南來山行五百里屐齒磨平無可跐折升雲頂俯哀壑山似鯨翻掀鬛尾羊腸絶磴盤不盡眄徹前峰後如指王陽斥馭心固壯老馬淩兢垂兩耳胸中大物巳隱然又為此山相角掎我觀晉問非眼見今日河山真表裏畦田髙下畫不如煙崦人家穴藏蟻晉人勤儉風土然山頂開耕自山趾一丘一壑凡幾家而復唐侯風化始河東大抵九分山民既能勤生自敉繭絲保障兩雖拙獨有一安差可擬山間一笑自絶倒汝亦何為論治體忽當疑徑問畸人欲答豫詢思所以如君面帶麋鹿姿遽縛塵纓解蘭芷優遊文史恐難任涉險乘危胡至此世人欲速見利心捷徑趨時豈君子終南譏誚責末了千古坦途人所履笑揮植杖指東張汝急去豫無我若非隱者荷篠徒行念斯言真到理暮投僧舍不能眠走賦鄙詩還自箠題趙城南王開鋪樓壁老澗盤回幾千曲洪水平來兩崖出邑居逺邇依地形南北經行看不足羣山掩映肺腹如河水縈紆衣帶促畦田雖狹水所膄風俗儉勤仍歲熟東西南北總除官此心少盡物自安區區簿宦封丘耳有懷莫遂空長嘆為問霍河橋下水驚湍能激懦夫肝清江引為僧永真賦秋江水清深幾竿渙郎放舟煙渚間中流舉網紫鱗出不祗博酒供盤飱借問漁翁樂何主泛宅浮家無定所賣魚生怕近城門肯到紅塵汚人處蘆花兩岸晚潮平憶著􅐜鱸思徑去朝廷物色那可得澤畔行吟何自苦滄浪水清濯我纓林婆酒熟容賖取人間萬事一醉休睡煞江南煙與雨覺來滿眼是青山獨速緑蓑還自舞漁父樂真可與細㵼焦桐入新譜謂琴操有清江引也朅來山城官事紛薄書亮吏對斜曛開圖空會漁家趣我恨不若江頭人張郎中彥亨督太原袱運道出平啺索鄙語為餞因賦是詩兼簡子𥘉宣慰元年天䇿開明堂千官剱佩爭翺翔當時張君正年少書不減陳元康我初得子知逺到自笑野鶴空昻藏河山分陜嚴津吏六道煩君居右地十年坐聽棹歌聲置散投間非所喜試難去易凡幾書思遇蟠根伸利器南耒督運并門煙鞭籌心計驚孤騫万材蔽河晉山兀目中巳具龍􅋮船生平故人王衛州東南開府羊杜儔竹頭木柿方並蓄如君俊才當見收自憐右屬槖鞬意射圃何時輔唱籌平陽官府行奉送部掾劉文偉北還兼簡省臺諸公平陽官府居上遊我來視事星未周眼中之人競誰得東西兩曹李與劉一朝歲貢入民部折獄論文欲誰語老夫雖獨心所喜雙鶻乘秋看掀舉自憐白髮一衰翁終日區區簿領中米鹽細碎固當略要以不盡心為忡君不見鄭公溫國兩通判至今德業昭河東嗟余何為秩與等正有報國公而忠何顒至言豈易得耿耿孤懷庸自適因凬寄謝臺省公儻有伻耒慰岑寂鵜鴂詞甲戍夏六月宿李將軍林館聞之有感而作寄友生王宣慰子初樹頭玄衣郎往往人罕識汝舌幾許長音響乃爾激穿空裂霜竹借問何所職農家呼汝為憂雞隴月向斜鳴不失田間趣起早耕人秀樾深藏曉無迹隂隂夏木共山邑二十年前讀書客一聲驚夢入幽窗露氣滿空庭樹黑只今早暮無所為兩眼眵昏頭雪白咄嗟禽鳥逐時新我髮何由黑如􅃮逰姑射山神居洞至元十一年正月二十九日也幽巖洞如瞰隂壑洞口飛甍架虛閣真仙乘龍竟何在香火千年事如昨蒙莊一言疑萬世稿死荒山凡幾輩何殊山石老且頑我欲砭訂其能還呼兒笑折山花看淡白長紅恐自然比洞名王母洞南山截然如案齊東西兩崖相抱圍洞中仙人去不返老柏滿巖空翠微我耒天氣二月𥘉山鳥山花皆友于野情本與撨漁熟莫遣遊人避使車銅方爵歌為翟器之賦荒陵盤盤枕山埛石麟埋沒秋草平隂磷夜出金作聲牧兒走避群雉驚佳城一朝見白日神物還從野人得勒銘壬子歲幾周考究古書猶可識篆文鐫刻非近世周鼎殷盤乃倫擬兩柱作一作撑貝形四趾垂象齒雷章繞腹隱觚稜老鳯喙長驚下陊土花繡澀不敢蝕翻成翠羽丹砂紫我觀三代制飲器多圎體咄爾形模方􅥵刻殆神鬼秋􅌲春蒲非可比物之隱顯固有數流落君家得所止土雖好尚具眼少博雅如卿古君子輔亡吕氏尤取重元氣淋漓開太始君不見逹人大觀者今古一昏曉人生極壽百歲止作計千年意何藐我歌君試聽古人誰盡了九原不復作此器君當寶一笑尊前為傾倒短歌行山中寒食作是日逰李馬二墳花枝入簾晴晝長遊絲翻空網春光一聲金縷酒滿觴聽子短歌踏春陽雲淡風清日將午信馬東城歷煙塢人家野祭須墓頭白白紅紅滿原圃飢鳶欲下影婆娑不待播閭徹盤爼陂陵髙下麥青青貴賤賢愚同一土况兹百歲忽如寄過眼浮榮誰比數古人感此由重論力取功名照千古東岡畸人説隴西攀附雲龍揔風虎巨株枝散勢莫依瀟索荒丘穴鼯鼠豈期健婦持户門一片豐碑論世譜林宗不作蔡雍死旌紀紛紜爭媚嫵銀罌酒暖藉草坐滿引一杯私自語吾家先壠在衛南老柏如林百年許起身耒耜世有澤嗣及先君擬掀舉生平抱負奈數竒賫志下泉良獨苦悲纒風樹逾一紀業在青箱恨難抒伐柯有斧睨不逺負荷至豫尤莫取一官羈靮晉州城佇望南雲淚如雨風秀丹山歌至元壬申耒官平陽得之於録事參軍周幹臣處周豫弱冠時伺舍郎也十一年春三月十五日與兒子孑焉正讀王黼朱勔傳及僧祖秀華陽宫記因作此詩以贈周云宣和寶石真淵藪萬狀卿雲照靈囿當年幾鑿太湖空嬴得綱船枯九有丹山風秀徽所譜裊裊金書瘦於栁周郎携自河陽城夜壑雖深縱豪取一峰突兀王潺顔曽在紅雲顧眄間先榮後悴物常理我今感汝為長嘆朅來伴豫茒屋底憔悴秋娘歸故里清燈搖搖光滿几爐煙作雲研涵水老虬蟠倔似求伸隱隱猶能鱗甲起此時對君心境間人為物遷今亶然掩書瞑坐清思逺夢繞華陽松桂寒我思象江老守尤酷嗜不惜千金輦致來長安家無婦兒居無廬六石與伍歡有餘義山賞識豈徒爾愛蟠好尚極類古人之意歟一杯下咽歌者誰南鄘小子王共溪醉歌行燕平湖作時為平陽府判蒼陂水漲玻璃滑堤栁含煙翠蒲茁當年亭館巳陳迹老樹遺臺猶秀拔我來置酒池上頭使君不負驄馬逰縣曹供張散平碧呼集妓樂羅珍羞君侯一笑閛懷抱十日東風醉芳草自嗟客子何所有春色三分二分老人生歡樂不易得况值清明時節好終年塵土簿書裏未礙金尊重傾倒湖光照眼明羅綺碧瀲瑶翻歌扇底氣酣急遣張水孅取樂不論冠佩委溪風吹靣縠紋生兩葉蘭舟鐃鼓起紅衣飛墜彩繩髙沒入蒼煙驚躍鯉郡人亦喜歲華新四靣縱觀空巷里佳人弄水祓不祥公子聮鏕特觀美錦筵香細酒不空既醉窮歡忘誇靡溪神捧出柘枝娘翠袖娉婷矜便體繡靴畫鼓隨節翻羅襪塵生步秋水一春盛集固云樂此會賔僚尤燕喜山隂修禊晉諸賢暢敘幽情差可擬客言行春似蜀守醉到浣花而巳矣樹稍晴日向斜暉使君皂蓋先醉歸就中二公最愛敬栘次臨流盡餘興一杯未了風翻浦山公倒載尋歸路自忴白髮非春事多為湘妃厭歌舞呼兒覔𥿄紀歲時不以斯文烏所覩至元乙亥三月春元巳才過日在寅浩歌月底還自笑醉裏詩成似有神上二公謂同知張明卿治中忽英甫玉璧城懷古至元甲戌冬十月草五日由稷山入萬泉道出故城臨風吊古慨然有作我行河東幾欲遍大抵盤回山阜轉南崖髙與北山齊玉璧城根分一線荒煙廢壘點杯土炮具梯衝經百戰短碑盛説鄭君靈萬騎隂風想平甸一曲悲歌敕勒川當時神武巳凄然韋公守禦儘良策更著百升飛上天乃知誣殺咸陽日即是雍皇入鄴年鄖君韋孝寬封號有宋元祐間廣碑雍即字文武帝名建德六年平齊入鄴聽祥師彈琴十二年四月𥘉四日野奠崇福院作冠帶對鳬吏三年簿書叢王事固鞅掌我祿亦巳豐有時意不愜耐此磈磊胸濁酒餘妙理中堅若為攻朝來偶過野僧話禪房花木幽而通坐中靈府覺虛寂祥師為我彈秋風古人不復作古意留焦桐秋聲瀟瀟隨指發煙篆裊裊縈簾重悠然拂衣起逺日翻冥鴻間愁積思失所在盡隨稿葉一掃千林空襄陵行暮春庚辰日維丙駕言出逰事耕省西郊微雨半晴隂幾點殘雲霧山頂馬蹄踏破落紅香飛蓋追隨垂栁影晉人熟食一月節店舍無煙竈厨冷春到襄陵滿縣花緑隂池館揔姚家清尊逺酌會心賞不與鶯燕爭春華畫輪歸輾故堤沙金店西頭酒更嘉舉杯為憶劉漢事雲龍風虎何紛拿帝淵東開蓄峻址青衣行酒真驚麚褰帷一笑兩寂寞野老指點宫臺窪萋迷悲碧荒城曲依舊溪流帶北斜贈賈主簿德逺赴春官唐風思逺非難治竊戒官僚多自棄賈君三載趙城簿一縣至今稱事事秋風告别赴春官千里辭親不憚難須知捧檄毛卿意要盡平生菽水歡戴松盡牛圖吳儂四時耕瘴煙吳牛見月心茫然戴郎此本極間逸筆意逺出韓公前解縻脫鞅春事畢江臯野草香芊綿歸鞭影亂散平楚考牧大似斯干篇因渠喚起歸耕興夢到西山谷口田李營丘寒江晚捕圖古人不地著所向無賦租漁蠻舟為家一葉縱所如斜陽淡淡明江湖萬魚戢戢依寒蒲幾家罾網晚未巳博酒欲得松江鱸卧檣傍舫宿波靣不爾風浪防艱虞何當醉帶笭箵去添我煙波作釣徒七夕曰同府僚觀稼西郊秋風瀟瀟吹逺林兩山極望秋禾深同來觀稼憩樹下把酒一笑髙槐隂天公成事乃爾易一雨變作豐年吟田家耘耔心未巳當午相看理荒穢鋤端信有三寺澤更為禾頭添粒米自憐微宦西復東且喜所向無災凶丘民得所能事了我祿雖薄亦已豐老農堅話使君惠我曰論功歸太空天子仁聖感召和氣致時雍黃崖行黃崖峪深能幾許殆似赭餘無足數寧知竒石産山腰一脈砌如縈綬組青章紫質含玉潤錦罽孄斑驚製縷楚雖有材為晉用山節星馳來歷覩簡書専􅎥正官臨敢惜筋骸嘗險阻褰裳上下溪谷間石角鉤衣互撑拄是時秋暑八月交背汗浹流氣煙吐班荆坐憩還自笑汝是愛山王判府守官四載愧無功今次于公竭肱股役夫分功日有程荷鍾持鑱編什伍摧堅抉礙先墓腳不假鞭驅矜智取風埃蔽壑散雲煙巨石砰崖轟戰鼓不遑蠟屐阮孚逰真作伐山靈運舉老翁炷香適何來再拜向山親呪詛溟涬才分有此山其在晉邦羣玉圃山靈萃秀不自衒埋沒荒山幾風雨材為世用出有時一旦承恩藉君武漢家製度陋嬴秦大起明堂朝海寓堂堂天䇿干維城建國分苑開雍土正須壯麗稱王宫不爾何能回萬舞我今問翁汝何為扶杖叮嚀前致語翁云匠業居此山薄伎傳家自吾祖我雖垂老喜見此側陋明揚遇時主夕陽欲下山更好疊巘攢峯爭媚嫵人為物蠧固亶然石兮石兮今玉汝曲沃道中與老農語大尖山前好原隰隴畒橫縱忘南北人家種麥秋社前一片蒼煙朝雨濕田家稍豐即升平十年逰宦𥘉無成會須了却人間世白髮歸來伴汝耕新道成車中即事蜀山天險古所畏少陵有懷真宰罪壯哉此舉見成功一日連峰驚破碎老農傴僂向余言所謂一勞而永逸相携徑下弱羊巔鳥語山容兩豁然牛箱籠負連連出坐看輕塵抹白煙金店馬生者贈余峴山圖走賦是詩以謝之平生愛山復愛畫近歲長逰石林下暫還大府宿金城喜得馬生同夜話共云馬生非畫徒見來情性溫而愈坐間贈余峴首畫江山秀潤與馬俱取之非欲奪所好開卷即與馬生對坐隅物微意厚將何答走賦新詩當乘珠山中瓏研歌寄商左山副樞有石有石玳瑁色逺出姑山兩崕側我來伐采偶得之玉潤金鏗駭清越海霞蒸發爛朝暾蒼雪糊模點晴碧石中乃有此理存斫就庚庚玄色璧又如神龜負圖出淵水偃仆沙頭曝秋日山中長夜有餘暇老眼看書苦無力挑燈礲洗愛竒章慿几坐餘腰膝屈書生習氣老不除筆研留心朝復夕自憐持此果安用欲擬三冬文史畢呼兒起視夜何其斗柄參橫插東北題董少平廟壁湖陽蒼頭虧政刑湖陽新貴帝女兄漢家三尺有成約臣宣守法身為輕主前取奴縳車下洛陽一市為震驚大奴走匿魄巳裭小奴側足回與行含悽入奏溫明殿後漢殿名萬乘起謝難為情秪知強項古遺直我愛世祖英而明一丘荒土青山道下馬陵前拜秋草應笑摧姦百鍊剛比比柔夷指堪繞吳娃行至元十三年丙子歲冬十月草八日亡宋皇太后謝氏次衛州唐津渡是日即舟行東下故有是作元年長星竟天芒謂至元元年也十年而後江東亡元城老嫗忍不死奉璽北走朝天王內家監領分嬪嬙魚冠髙髻猶宮粧翠襟縞𬒮不曵地言語無異甌閩傖南來𥘉渡鐘山江羅襪去踏燕雲霜風塵千里河朔道慘淡粉黛無晶光憶昔掖庭𥘉選入十五十六先後行深宫花滿春晝長芙蓉水殿薰風涼朝儀雙引垂紫袖珠櫳曉侍熏籠香秪知秦娥一生花裏活眉嫵老學吳山蒼一朝兵合景陽宫故國繁華似夢中兩宫問寢紫宸仗往事盡逐江煙空黃帷羃野待水次郡縣護送浮航東万人山立看且嘆亡國大略今古同太極殿前天子班玉觴上壽頳龍顔柴家母子何負汝賜與僅免飢與寒悠悠万事不可必天道好還歸有德就中此理誰會得蓮華峯下髙眠客鎮州懷古吏部聲華山斗重身處平時若無用積年王湊失臣度諉使賊庭撩虎閧舉朝嘆惜試不測天意中間表竒節血衣滿前盛氣臨一語未畢凶鋒折鎮人萬目矚使華五紀得瞻唐日月嗚呼藏器于身利有餘不遇蟠根何所别周卿二子歌周曹兩家世系長伯仁之德再世昌諸孫詵詵見身後不數謝家蘭樹芳大兒讀書書滿箱小兒竹馬青衫郎掌中瑜珥生輝光紅點杏蕾爭晨粧外家碧沼東西堂金粉滿貯芙蓉香今冬書來召歸省要畫百子春池傍伯仁有靈亦含笑紫川淵流殊未央紫川淵流真未央冬十月朔展墓回有感新壟多故人少野祭瀟瀟滿荒草十年重到故鄉山前日兒童冠佩好我時引鏡還自憐五十衰翁能不老正須萬事聽天公不用時情生熱惱流行坎止即吾師試看古人誰盡了簜樽歌為宋少卿弘道賦海居兩間勢雄尊地維火荒足怪􅎇春雷奮蟄地軸裂氣擁簜本驚輪囷雲蒸露濯玉幾圍癭異不數蒼筤孫洞蛋柸飲變古法鬱屈斧斷蒼龍根一朝六鑿混沌竅海潤猶帶風濤䀶初疑神螺闖首髻鬟古復訝凍芋出土鴟梟蹲坤堣古非禁酒國桂醑碧瀲滇池春木蘭花發雪鸚囀野飲挹彼供鯨吞江妃竊弄山鬼看深夜嘨擲吹燈昏炎洲北走落君手孝節閲丗清而敦廣平磊落書載腹時浥妙理開清樽金壘玉斚非我事正須一日不可無此君殷彜周卣列左右碧花繡澀腥龍紋簜之為尊尤可人蹇豫蕭散嵇劉客黃爐久為河山隔來逰都邑徒永久若戀明時無寸䇿新豐樹色繞千官滿馬京塵歌逼側何時為渠醉倒枕渠眠一夢婆娑竹林國西京王生歌君不見西京王生一布衣遊談公卿奚事為解紛畫䇿作隂助顧盻勢利輕塵泥延中結襪似倨傲一語能釋當時疑惜哉太史偶失丗與諱至今義烈猶光輝乾坤英氣初不問乃今復得是子趨人之急逾巳私襟期有在許諾重駿足肯受黃金羈凍雲曉拂銅駝陌雪花淡與梅爭白平明東閣給事回家近沙堤儘春色新詩吟繞錦窠香笑作平原眼中客人生百歲駒過隙只有聲光為可惜丈夫適意杯酒間義氣愛君多感激岷峨秀色錦江波萬斛醲薰貯胸臆絪緼都作濟時具辨與朽株為粉飾吹噓寒律變陽春未讓王生謀緩急君家義鶻固有歌更為樊川搖醉筆秋澗先生大全文集卷苐七
