body:
  text: 七言律詩哭節齋陳公五詩時爲浙東宣慰使按行属邑回過新昌縣值玉山群盗𬒳害年五十有六至元丁丑歲九月七日事也夷門樽酒罄平生誰料終凶在此行顱髪有靈通帝夢越戈無識断由纓救時譽在何多得憂道思深耻近名南望兩行知已淚西風吹却又縱横笑談鞍馬最從容逺自南陽到洛中廷議有方先大節丹心無間揔清忠餘人老去初何惜四海經綸共望公何日下車傾腹痛喬玄林墓哭秋風徳音宣暢介鱗霑逺調曽辭瘴海炎寒谷變春方燠休含沙窺影已隂潜峰摧天柱山雖壊桂折秋風氣陡嚴伸雪絳冤誰有䟽吞聲空向九天瞻煦嫗一作燠休燠於喻反休虚喻反昭三年晏子日民人痛疾而或燠休之眠虚云痛而念之也若小児痛父母口就之日燠休代其痛也盛氣横收蓋代勲揮摩旌壘張吾軍乘時孰計利不利為善但憂聞未聞千里魂歸関塞黒百年情在死生分臨風痛㵼長河淚灑断江東日暮雲惡棘梟鸞苦未分挺身東下擬䲔吞義酣不信雄貙慘死守庶酬君父恩冤碧意凝東粤血大招空返北邙魂恢恢三本遺書在儘是君侯不殁存壽継先侍御幈幪雲厦鬱雄沉偃植圎􅒎力儘任持重要端風憲本耐交尤見歲寒心望隆北海螭蟠譽思入南陔孝養吟漏泄光風來獻壽緑萱春滿北堂隂送劉侍御分司上都兼呈中丞何者功名是丈夫細思𥘉不外民區油油雲葉從中合盻盻群情待一蘇造命豈容論氣數當言能盡是雄圖聖恩思治方宵旰幾問南薰觧愠無題鳯山逸叟王眀甫八秩手卷二子長桓字巨川為旭州尹次日構字肯堂今為翰林應奉一府名香二十年鳯山歸作地行仙由來和氣薰陶乆不獨天彛秉受全扶健漢更鳩有杖伴吟清獻鶴随肩更憐五馬鑾坡貴併領春風上夀筵杜季明表凡史千載南還荆門索同賦為餞謹書三詩以贈杜時任中書省左右司郎中秀並岷峨萬仭青憶𥘉載酒子雲亭幾年江渚悲鴻鴈一日沙堤詠鶺鴒共被再融荆樹樂還家不愧草堂靈中郎儘擅平津閤未分歸槎老客星干戈漂泊中年後邂逅相看抵萬金風景儘收孤客淚江山何限故園心一作去國不知江令客名家尢是杜陵心眼中棣蕚春仍好林下詩盟喜重尋南去瘴江無少阻平安休復到家音吟㸔錦水束逰日望入停雲北上時憶弟逺衝燕地雪聮芳未賦棣華詩風塵抛擲青萍劒一作情思琢出黄金礦去路留連白玉卮歸到荆門霜尚晚月明江樹影參差張提刑子敬挽章至元十五年六月十五日卒在河南時作塞上曲云對月笛中起愴然傷我情秋風一萬里揔向笛中生遥怜漢軍士掩淚下邉城攬轡南來擬拜君逢人忍以訃音聞捄焚有志遺深愛博物何心泥欵文卿月儘輝丞相府史評當䇿竹書勲不湏更聽西風笛愁滿西山日暮雲深愛爲北京行省郎中時曾捄援軀户三百餘家詩寄季眀郎中中書機務日紛紛海寓披圗萬國賔善断獨髙如晦䇿名家復見杜陵人遥隣緑水紅蓮地滿意清江玉壘春正有捄時心㝡切更須根本細經綸暇日登飛仙休逸二䑓老圃䑓荒草棘深魏公徳業古猶今望隆異代瞻儀鳯錦爛輕裘憶細吟隴陌按行餘利澤山川包揔見雄襟禽烏知愛如相語隔葉時聞送好音詩寄劉清卿都事朋簮纔盍脱荷囊蘭到升庭見獨芳毳幕夜書稱快吏氷壷孤抱映秋霜十年𬗋禁烟花近四海金華姓字香南北相望固迢逓乆要情在恐難忘秋日早衙示同僚閻簽事子靖憲府覃覃尺五天按臨八道儘繩愆乘時佐理踈明略攬轡澄清愧昔賢寛固可稱湏有制事唯無詖刀能全所行果計無尸素放枕能安一夕眠慶趙仲噐毋八秩遐夀能康世所稀滿前蘭玉更熈熈氣冲自得豐長稟徳厚能髙九十儀秋月簾籠來婺彩春風蟾背看彤芝燕城勝事今誰㝡聽取共嵓介祉詩椰實詩宣慰髙飛卿開宴出示此菓邀諸君賦詩西溪首唱僕乃賡焉坡僊帖裏藹餘馨炎帝圗經見典刑辦削異樽陪北海暖包香霧自南溟摩挱枵腹疑藤癭雋永天漿勝楚萍吾子好竒時引飲沙頭閑却玉雙缾寄叅政相公不覿清揚近一年依依情在鳳池邉碧雲思逺餘千里紅藥階深有二天兒輩𥘉官儋好爵寵光霑喜動重泉白頭無計醻知巳㑹有文章見簡編和西溪韻送良弼提刑赴憲䑓之召拳拳幾御大賢車謂張平章張左相姚雪齋也氣量弘深見歩趍望重正煩天下計人和愛及屋頭烏百年笑我遽如許一日佀君其可無雅俗自來推坐鎮簡花奚待筆端區百城方聳使君車遽應旌招内殿趨儀羽望清𥘉振鷺栢䑓隂粛已翔烏人材軰向朝中列天下看來一事無數路清寕固佳政經綸何似被綿區南來和氣擁輶車佩玉長𥚑利走趨阿閣再鳴瞻彩鳯月明三匝笑驚烏事機應運深還淺才氣多君有若無輿論功名果何在此心𥘉不外民區送李士觀還夀春莫府并序士觀友愛來辭促膝道舊眷眷有不能別者仍以親老地逺佳眠食是祝士觀請即此為贈因率尔賦焉見合肥王尹立夫為寄聲兼逹兹懇云至元己夘重午前三日也去年首夏别燕城今歳清和㑹汳京相顧鬢顔成老醜不縁貧冨異交情春蘭句好香生席歸路舟輕月滿旌地接两淮終瘴湿身安之外揔虗名挽禮部丁公郎中荀班出佩紫荷囊漠署當年列鴈行學古不囬平日守徳方誰佀老來剛眼中耆舊雲烟盡身後詩書坎掩香䑓閣清凬有餘凛一丘埋恨吹䑓傍相下送舎弟之官鄧鄙時為竹監使十五年中三聚首一千里外两相望春風弼北重分袂夜雨漳南喜對床雲路暫淹騏驥足江沙睛護鶺鴒霜公餘正要加餐飯陽武同宗只二房舎弟仲略生朝十六年己夘五月廿一日時寓史開府宅江漢堂深晝景妍亭亭花影舞胎僊一樽此夕歌鴻鴈滿意薫凬醉管弦遺業継承心共切此身加健夀爲先飄零南北𥘉無定正要相看捸蕚偏送千秋都司任宻州諸城令竊㿰贈言代抒裏素梁苑相逢傾蓋𥘉照人秋水出芙蕖應憐丗事方多故却恐㣲官是羙除處已道方何喜愠濟時舌在侭舒徐下車莫後神明政楚幕瞻烏待報書至元十六年歲在已卯四月十一日偕大同郭天錫祐之大梁劉衝漢卿天黨李昌齡千秋逰内梁門西大佛寺寺即宋寳相院也主僧郭里人臘七十餘相與㑹堂東丈室坐間話文字及壬辰歲京城警巖令人嘅嘆乆之祐之爲放聲長歌劉起浮大白者數行懐仰之思渙焉氷釋然後知盛衰之不恒哀樂之無端也開口而笑頻何厭焉遂留題而去侍行者安陽楊韙義甫帝城何處散春悰花木禪房一逕通共訝殘僧談世故却憐閒燕得諸公風雲心事誰能了歡樂朋從豈易逢聽徹清吟歸路晚金眀池沼夕陽紅山陽偶與大継長相遇自辛亥年相别至今廿八年矣追念疇昔作詩為贈解鞍林下振清埃懐抱樽前得好開白髮滿頭心事在青山當眼故人來凬流自有髙賢識感慨還深漂母哀讀盡深香轉蕭爽清吟不到伯倫䑓深香係継長父冝之文集号曰深香閑適予此行本擬逰百嵓不果故云漢東陽武太守臧公廟袁曹形勢两鳴泉趣嚮終非翊獻朝歃血正圖扶漢鼎殺身何獨為張超荒城草闇遺壇在喬木風髙烈氣飄琳也為思名莭正有書明正苦相招太守劉景融之任滑䑓索詩謹書此為贈十年錦帶佩吴鈎曽翼龍驤控上㳺平日諸軍称雅厚老來五馬更風流宦㳺喜在西溪部閑讌欣同畫舫秋㱕鴈亭前問遺俗遲回𥘉不為詩留信察判士達來辞㠯贈言為榮因書此㠯送且見余之傃行云常憶終軍英妙年此時頭角見巉然百城望重非輕責六品除新寔羙遷姦弊得情矜勿喜事機到手簡爲先河東說是懐思地未礙蘇章有二天賦湖石得於汴梁華陽萬石說卿雲族聚支分此逺孫疊嶂秀來雖晻靄孤峰崛起更雄尊轉翻蒼背鱗猶動侍近紅雲色尚温覺我露堂光景麗洞庭秋氣鬰吟樽和士觀見贈詩韻鴻飛鷺散聚無時偶喜㱕來共一池世路何心論薄宦燈牎同業憶深資但教白璧無㣲玷問甚青雲有素期却恐桐淮淮上月清光長使照睽離春露堂三首今年卜築露堂春頗覺吾廬彂興新書帙盛陳欣有託燕巢不定佀嫌貧花枝照眼開還好竹樹當軒植漸匀朝日两竿濃睡覺不妨門外即囂塵詩書眞樂得新聞不羡軒車日過門薄宦到頭終外物一閑入手是寛㤙東山不厭蒼生望北海羞霑緑蟻樽花草滿庭從爛熳㝡憂當路種蘭蓀貧家營構不容常五十年來自此堂春露榜題應有在慈親疑慕詎能忘華滋濡湿趨庭處風彩依稀隨目傍我老自強觀志行泫然流涕撫青箱送何叅政北上世事雲翻不易裁君侯真是濟時材若論經制明公道儘足扶持是憲䑓霖雨終期賢相在秋風聊應鶴書來草茆亦有雲霄望執法清光接上台幹臣周君邂逅淇上作燈燼紅垂綴玉蟲鵲聲傳喜下霜空故人逺自亰圻至青眼依然白髮同道在固常忘勢重官清還復坐詩窮章章乆說㐮城政早晚褒書示至公郷人魏先生家蔵楽天神一軸作二像對立一則五十時容一則六旬後真也上有楽天自賛别稱爲蓬婆仙云州年前屢獲瞻拜近讀公長慶集偶記此盡為訪問云已磨㓕乆矣遂作詩㠯吊蓬婆洛南地名魏家一軸楽天神三十年前繪色新欲就醉吟師格律試㝷縑素墮埃塵空留池上山中詠謾應花前月下身官品文章吾敢覬佀公真樂老能親嘉禾篇并序乙酉歲九月衛之南郊穫稼淂嘉禾一莖九穂和之至也田主李縣丞特以示余纍纍秀結小大連比誠可異也人用餘咊忻忭曷已作嘉禾篇重陽后二日序天地深㤙雨露零嘉禾還自氣和生九秋灝爽團孤秀一穗功夫到九成太史書年同合頴漢庭稱瑞比連莖表章莫後丹青賀人道豐穰是太平種玉亭徐子方宣慰有詩因擬作三首昆明雲錦厭凢材玉井移根手自栽不着詩仙分寳供誰携仙子下瑶䑓留連夜月姢姢净披拂薰風細細開不用葉浮滄海去芙容城闕有蓬莱靈沼雲深寳氣存素蘤一夕發芳根烟中髣髴溪娘語波面輕盈越女魂江月借粧増皓彩露華和屑貯芳温夜深更待瑶環供細挹秋香共一樽休誇幻術有仙翁人定端能勝化工淑女固應歌窈窕芳根元自雪玲壠秋香入户摇江羽羅襪凌波遶漢宫莫訝西風吹易散世間聲色本來空西村二詩兩月秋霖不出門今朝騎馬到西村髙空氣粛雲歸壑老樹風多葉擁根謾說田園冝野隱争趨朝市羡時奔古人大抵崇髙節飢凍當時所不論秋來泥潦擁柴門两月幽棲不到村野鳥伴畊翔水潏寒蟲催織繞籬根有生未免憂饑凍舉世其能息競奔仕不力任閑不足一生心苦欲誰論桃花菊四首一名烟脂紅淚洒明妃寄露葩換根非為貯丹砂黄輕白碎空多種碧爛紅鮮自一家騷客賦詩怜晚節野人修譜是頭花九秋霜露無情甚時約行雲護彩霞為厭秋容慘澹天故將濃艶彂清妍烟霜䡖拂吴姬面丹臉能回白帝權寄傲儘凌青女粛閙粧冝刺繡衣鮮留連㝡是東籬蝶細繞芳叢两翅翩容色風流操潔蠲一枝紅雪秀霜天氣凌金井欄干曲香在紅鵉扇影邉塞上閼氏凝夜紫月中仙子怨秋偏少陵若遇情増重肯數重岩細蘂圓葉細枝柔巧剪裁丹砂濃抹入纎荄朱顔肯逐刘郎老紅影晴圍葛井開慘淡秋容空野圃飄滿風露際天台晚凉更覺清香異不厭芳叢百匝來苦雨乙酉歳入秋巳來不過二日晴輙雨如此者已三月矣九月十大日作雲隂交㑹日長昏老雨瀟瀟晝掩門秋氣儘悲騷客志草堂空在少陵樽寵光蘚蔓滋多碧蕪没蘭蓀佀少㤙坐聽寒声萬家裏幾家繒纊有冬温晴明無幾日朝隮雲不容同霧雨凄便着長風開白日巳令后土汚黄泥冷翻幽壑潜蛟舞湿鎻喬林健鶻棲萬象沉沉水光底幾時髙樹看晴霓火烏翅温日脚昏雨中跳蛙亂登門少陵悲嘆禾穗黒元亮獨酌愁空樽氣惟恊中乃成歲事至霪溢將傷㤙詩人吟詠何所𥙷笑爇鑪火回春温與諸君㑹飲中作駑蹇從來䇿不前畏涂有戒莫争先但隨白傳看花約冝信渊明止酒篇人笑苦吟踈巧宦天教多病護殘年老夫歲暮歡雖鮮毎對諸君一粲然赴趙子儀飲㑹忠烈祠前是舊盟一樽重約就門傾但成把臂論文飲也勝拖泥帶水行樂事不應須節叙賞心㝡愜是閑情一秋霖雨朝來霽此㑹當題作喜晴秋懷醉頭扶起日三竿掃罷幽軒到藥欄傍架整齊書帙乱繞籬料理菊枝殘日融虗閣留餘暖雨積髙空促早寒處置身心閑裏過不將勲業鏡中看老去逢秋強作懐莫教閑惱上心來人情寡味隨年薄丗事無端觸境開東閣謾傳梅信好西風時送鴈聲哀客來茶罷無多話共趂秋陽𦢊背鮉吊王提舉柔克乙酉九月丑四日自經関王廟内驚看神色自今秋奄奄殘魂到鬼幽叢簿未霜猶足蔽事機巳露欲誰尤百方作計難為地一意長歸是徹頭昨日寢門臨吊處两行衰淚不容流前年除目儘多門獨喜南來弄竹孫入手固知餘利孔刺頭何苦入膠盆海鷗枉訝多機客楚些難招不吊魂漢夀祠前重囬首短笻猶想立黄昏悠悠末路謀生苦穰穣羣奔為利來薄宦得勝閑裏過畏涂合嚮冗時回誰知竹實療飢鳯却変錢神作禍胎我老不堪多感愴一汚還為素絲哀憶𥘉同舎在共城短小於中㝡幹精取舎近看臨老節鋪謀全異早年情舌端雄辨堪排難霜後寒蟬了不鳴重念人生生可貴世間万事一毫䡖南來作監無多事舉手差池便两分細論是非俱有說大綱向背不同羣以身死事從來有為貨䡖生古罕聞不獨衆傷非正命秋空低䖏有愁雲謝道人恵竹春露堂成户牖空閉蔵無物禦深冬長梢來覔筠溪種祥祉思慿道䕃功清泛細香添瓦鼎静連秋月想烟叢夜來帋帳梅花夢巳在融融和氣中筠溪軒詩卷𥙷亡筠溪旧有亭甚雅徃年為秋潦所圯亭與詩卷俱波蕩不存今歲冬來逰紫㣲道者丐余詩將欲𥙷亡且致重搆之意仍爲賦此中間飲客蓋廿八年前同逰者侍臣陳季渊奉使覃煥然河平牧今右丞史晋明禮部尚書王子勉侍御史雷彦正與不肖紫微道者威儀杜大用也時乙酉十月廿一日重到筠溪二十年眼中風物頗瀟然䨥旌尚憶經行䖏八客同來作飲仙露濕雲梢囬曉翠月眀瑶圃澹秋烟道人說是潜珍客更看飛檐揷碧淵慶雲鸚鵝杯桂魄淪精貯海波神光分秀入紅螺卿霏護暖圍蒼腹丹喙嫌寒縮翠窠縱飲雅當豪客意垂雲無復緑衣歌一樽細浥江山筆夢到芳洲碧草多鸚鵡螺翠衿紅觜漫多知不覺流形入化機悽断隴雲迷舊宿潤涵炎海有餘輝酒波碧飲珠還浦螺女棲深玉作圍昨日玳筵揮飲處故令歌緩恐驚飛自嘆明言出更難奮形飛入巨螺間中空蜃吐潜珍羽外示文眀變炳虨春釀儘供身後樂雕籠全勝向來閑深蔵且莫輕為用合浦珠神有徃還何年犀火採螺江一竅重開混沌蒼觧語巳迷青鳥使幽㞐渾是雪衣娘海苔暈碧猶霑温慧舌能嬌自閉蔵莫遣繍簾眀月入湘妃窺伺恐携將隴鳥何年别故山珠房深鎻雪衣閑調音厭落佳人後勸飲來陪狎客間山鬼吹燈驚恠供春風浮酒長蒼灣㒷來一吸三江盡醉入無何肯昜還肯易一作不要醉一作徑字飛潜相化理堪驚老蚌還成隴鳥形䲔吸佀憐唐相飲江沉應笑屈原醒坡陀海露神黿窟㶑灔波翻竹葉馨我老探竒心尚在醉來㱕夢繞螺亭隴􅨛辨恵丗同誇何事將身學海蝸江月洞空珠有淚卿雲覆體玉生花回天不入深宫夢樂聖欣㱕左相家長憶郡楼𥘉飲䖏頓令觥斚失光華至元十年官居平陽時監郡邀余飲白雲樓上出此器勸客余初見之故云札刺䚟斷事官系出中朝勛族憙讀書温雅尚禮樂與賢士夫相接過衞來訪慇厚之意無以相荅謹作是詩為贈且見夫妙齡英彂之氣云赫赫金張奕葉崇濟時還属黒頭公讀書志在諸君右奉命名髙畫省風一札㤙光寛大裏八州刑憲笑談中皇家求治如飢渇莫後當朝𥙷衮功餞王倅北行邶衞從來八逹衢三年不易貳為車一官聊尔開公道四海能行即丈夫花外驛亭留故事日邊消息聽新除諸君若問民間治㝡重無輕是使符夀郷兄君王評事七十平頭鬢未毛乆將家事付兒曹心便教子𥘉無惜日喜延賔不厭勞花木漸成林下趣襟期猶是邑中豪年年櫻笋堂前客常對珎珠滴小糟送從事李庭王北上邶衛從來四逹衢三年不易曳長𥚑持心有道清㢘在遇事能方長厚餘入幕不知王儉客携行惟見恕軒書揚清激濁朝家事不信銓曹止舊除秋欄四詠為仲略弟皆有和章時丁亥秋季也冝男松菊庭前草半燕幽花含笑彂春腴暖面堂背孤根秀畫出宫池百子圗浥露冷摇金鳯淡翻香重上髻雲烏怡然坐對忘憂外披拂餘芳任蝶鬚寒菊三徑歸來已就荒更堪風雨過重陽佀憐楚些清吟苦留在寒花晚節香黄蝶有情時見過緑樽無酒淡相忘瀟條五栁門前路何處斜川接醉郷秋蝶舞困春光㒷未窮又將心事戲秋風凌晨趂暖翻朝煦薄暮栖香入菊叢幾夜留連迷曉夢誰家圖冩出深宫翩然不逐韶華老飛過畫欄西復東薔薇葉下亭皐百卉空秋陽分暖彂春叢重滋芳露供坡墨两見嬌黄出漢宫要伴紫荆昌晚節肯容鮮菊擅西風結根得所元來盛返物爲祥恐未公謝趙主簿惠古鉼貯藏元氣閟重泉土暈苔滋碧頸圜枵腹戒貪瞠两餮佳城見日定千年茂陵神盌知金重銅爵澄泥比玉堅聞說揷花多結實露堂從此得春先上已日禊飲林氏花圃舎弟仲略首唱臘蟻香浮金叵羅一聲清艶遏雲歌千年盛節稱元已四座佳賔到永和曲水風流清㒷在茂林依約緑隂多柳圈儘帶餘徴去未礙花枝照鬢皤和韻三首朋盍華簮擁佩羅秉蘭聽我醉時歌柳圈泛灔風漪去樂事追随獻歲和座近緑隂花氣重歩携紅䄂野吟多杯行到手湏沉醉六客樽前我㝡皤春晚衡門厭雀羅臨流來詠舞雩歌喜從多士明郷飲趂此春風扇物和林下幽香蘭草暗樹頭乗暖野禽多楊花也惜芳筵散糝乱溪槁佀雪皤麗日晴川艶綺羅琵琶聲趂紫蘭歌衣冠盛集有今日花柳春風覺太和闔郡浮觴從此始百壷載酒未爲多醉㱕扶路人争看不道花枝笑鬢皤喜雨丁亥歲三月十四日晨起露氣甚潤疑㠯爲雨兆是夜雨大作至明日晌午方霽後二日即立夏四月節時頗旱故有此作一氣先驅玉露瀼夢驚簷溜曉淋浪洗開塵障千山静醸岀春風百草香人變暵憂爲燕喜歲囬時歉作金穰兩盂糲飯朝飢了從仕居閑緫未妨題靈堂雅集圗擾優王城若箇閑禪房來結静中縁機鋒爲愛靈師峻樽酒同傾繍佛前談麈風清穿月窟雨花香細颺茶烟應慚十九人中列開卷題詩又五年瑞麥農使苟正甫過邯鄣得麥一莖九穗蓋未之見也作詩以紀其祥是年司農司復立一依巳行條格丁亥歲夏五月也麥秀從來說两岐連枝九穂若爲竒物關極數知陽盛人飲天和樂歲宜同頴並歌唐叔稼駢莖休頌漢房芝天心佀喜農司復一札㤙光揔舊規秋風如水聲丁亥嵗六月十九日酉正二刻得秋是夜聞秋風自東北來如大水將至静觀天運儘孚誠一夜秋風佀水聲志士聽來心未穏客牎聞䖏夢先驚物華披拂争含實鷹隼慿凌想迅征常笑晉人無逺用扁舟東下爲蓴羔遊白茆寺為愛西山欲徧經春風吹馬上稜層千章古木偎崖寺一點清光守障燈石磕題名留故事松隂移榻對殘僧婆娑㝡樂雙泉水潤入髙峰露氣凝欹噐詩三首并序昨飲韓進道家坐間出欹噐勸酒暮㱕醉卧既醒夜四更試作二詩吹燈起書覺筆端甚來之易也投筆就枕復得一詩佀勝前作明日示弟忱請行下合属即爲先和也神物誰移代酒舩轉懸金觶兩楹間纔中便得居安理稍溢還成覆水艱魯廟横陳猶賜寳金鑾揮洒憶朝班汪然能起鯨吞興鸚鵡爲螺恐厚顔卿雲垂彩捧宗彛終日持盈伴狄儀滿㪷醁波浮灔蟻兩椿春色上脩眉致㳟幸奉神明器勸飲休誇金曲巵抖擻宿醒還頓悟此心纔倚便惟危几杖槃孟揔有箴古人垂戒一何深以漿爲酒雖無量覆水藏機恐過斟魯奠兩楹朝復暮崖州一賦古猶今儼然頓獲神明觀長記春風拜孔林賀介甫提刑得雄海中仙菓自珍竒莫訝秋風得子遲瓠晢定輸陳氏子蘭芽休咤馬家児蒼蒼有道旌遺直継継無窮見孝思湯餅筵前㝡忻喜老親時抱說含飴成耀卿以所釀秬酒相餉走筆賦詩爲謝玉色芳温巳可憐白衣持送飲中仙周書盛說神明齊楚誦休誇桂酒玄光透銀觥無表裏法傳真體得蹄筌醺然坐我春風底夢到明禋二卣前廿四年丁亥歳重九日同弟忱展墓奠辭二首黄葉畨畨落㡌風今年秋祀喜君同生榮沒戚無餘憾秋降春升又一終玄壤潤涵泉脉逺飢烏飛去劵䑓空兩郷相望幾千里長在神靈頋護中馬亂溪流湿鐙金捨鞍齊簇野棠隂千年盛氣通滄海滿䄂秋香奠祖林麗石未瞻先丗號表行終媿古人心衰年冣切光揚事此意從來不獨今右和舎弟仲略韻奉實野䑓之目墳南岸相對一方甚髙平天然一䑓弟仲略因曰可為王氏遣奠拜䑓秋興非關觸物哀時經墟落自悲㢤重門未署榮親表暗用原涉京兆斥事老岸先爲下馬䑓暗用董生下馬陵事節叙登臨車轂擊春風粧點野花開一杯共酹清泉水長繞先塋兩面來一作滚滚送弟仲略得假南行頭健骨看雲騅帖帖爭教墮水飛假促㝡先無累保事纒當重早知機雲連鄧鄙春泥逺路過襄城野店稀去去莫辝鞍馬倦迎門兒女要牽衣緑毛龜四海金明一渥洼伏蔵來自水仙家背衷屬甲玄居長髪散柔絲翠有華浮出渊泉看䖏好泳㳺蓮葉認時差杖扶行嘆陪三老夢繞春烟鶴禁花唐州城北一井專産此龜至元十三年千秋節陪姚左丞許祭酒許榮禄行香東朝禮畢觀交趾所進緑毛大祭故云洛水當年負緯書獻嘉此日野人俱蒼鱗閃閃精分斗暖氄毿毿翠滿軀元氣嚥來終不老芳蓮巢䖏更堪圖詩成喜覩詞臣賦早挽人文與瑞符至元廿四年丁亥秋九月廿四日夀中丞王兄復放生者以此龜來献余以靈物罕見為賦一詩明日偶得大定廿三年壬寅冬党承旨郝侯張甫所進賦賛墨蹟序說眀時嘉瑞甚郁郁也當時竹溪纔以應奉供職文與翰已復如此宜乎金百年以來文章命脉得其正傳者公一人而已因念余平日所行造物者皆使之前知此莭雖出事後其類大同亦可重也故併及之秋澗先生大全文集卷十八
