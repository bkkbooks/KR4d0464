body:
  text: 七言律詩哭節齋陳公五詩時為浙東宣慰使按行屬邑回過新昌縣值玉山群盜𬒳害年五十有六至元丁丑歲九月七日事也夷門樽酒罄平生誰料終凶在此行顱髮有靈通帝夢越戈無識斷由纓救時譽在何多得憂道思深耻近名南望兩行知已淚西風吹却又縱橫笑談鞍馬最從容逺自南陽到洛中廷議有方先大節丹心無間揔清忠餘人老去初何惜四海經綸共望公何日下車傾腹痛喬玄林墓哭秋風德音宣暢介鱗霑逺調曽辭瘴海炎寒谷變春方燠休含沙窺影已隂潛峰摧天柱山雖壞桂折秋風氣陡嚴伸雪絳冤誰有疏吞聲空向九天瞻煦嫗一作燠休燠於喻反休虛喻反昭三年晏子日民人痛疾而或燠休之眠虛云痛而念之也若小兒痛父母口就之日燠休代其痛也盛氣橫收蓋代勳揮摩旌壘張吾軍乘時孰計利不利為善但憂聞未聞千里魂歸關塞黑百年情在死生分臨風痛㵼長河淚灑斷江東日暮雲惡棘梟鸞苦未分挺身東下擬鯨吞義酣不信雄貙慘死守庶酬君父恩冤碧意凝東粵血大招空返北邙魂恢恢三本遺書在儘是君侯不殁存壽繼先侍御幈幪雲厦鬱雄沉偃植圎􅒎力儘任持重要端風憲本耐交尤見歲寒心望隆北海螭蟠譽思入南陔孝養吟漏泄光風來獻壽緑萱春滿北堂隂送劉侍御分司上都兼呈中丞何者功名是丈夫細思𥘉不外民區油油雲葉從中合盻盻群情待一蘇造命豈容論氣數當言能盡是雄圖聖恩思治方宵旰幾問南薰解愠無題鳯山逸叟王眀甫八秩手卷二子長桓字巨川為旭州尹次日構字肯堂今為翰林應奉一府名香二十年鳯山歸作地行仙由來和氣薰陶久不獨天彛秉受全扶健漢更鳩有杖伴吟清獻鶴隨肩更憐五馬鑾坡貴併領春風上夀筵杜季明表凡史千載南還荆門索同賦為餞謹書三詩以贈杜時任中書省左右司郎中秀並岷峨萬仭青憶𥘉載酒子雲亭幾年江渚悲鴻鴈一日沙堤詠鶺鴒共被再融荆樹樂還家不愧草堂靈中郎儘擅平津閣未分歸槎老客星干戈漂泊中年後邂逅相看抵萬金風景儘收孤客淚江山何限故園心一作去國不知江令客名家尢是杜陵心眼中棣蕚春仍好林下詩盟喜重尋南去瘴江無少阻平安休復到家音吟看錦水束逰日望入停雲北上時憶弟逺衝燕地雪聮芳未賦棣華詩風塵拋擲青萍劒一作情思琢出黃金礦去路留連白玉卮歸到荆門霜尚晚月明江樹影參差張提刑子敬挽章至元十五年六月十五日卒在河南時作塞上曲云對月笛中起愴然傷我情秋風一萬里揔向笛中生遙憐漢軍士掩淚下邉城攬轡南來擬拜君逢人忍以訃音聞救焚有志遺深愛博物何心泥欵文卿月儘輝丞相府史評當䇿竹書勳不須更聽西風笛愁滿西山日暮雲深愛為北京行省郎中時曾救援軀户三百餘家詩寄季眀郎中中書機務日紛紛海寓披圗萬國賔善斷獨髙如晦䇿名家復見杜陵人遙鄰緑水紅蓮地滿意清江玉壘春正有救時心最切更須根本細經綸暇日登飛仙休逸二臺老圃臺荒草棘深魏公德業古猶今望隆異代瞻儀鳯錦爛輕裘憶細吟隴陌按行餘利澤山川包揔見雄襟禽烏知愛如相語隔葉時聞送好音詩寄劉清卿都事朋簮才盍脫荷囊蘭到升庭見獨芳毳幕夜書稱快吏氷壷孤抱映秋霜十年𬗋禁煙花近四海金華姓字香南北相望固迢遞久要情在恐難忘秋日早衙示同僚閻簽事子靖憲府覃覃尺五天按臨八道儘繩愆乘時佐理踈明略攬轡澄清愧昔賢寬固可稱須有制事唯無詖刀能全所行果計無尸素放枕能安一夕眠慶趙仲器毋八秩遐夀能康世所稀滿前蘭玉更熙熙氣沖自得豐長稟德厚能髙九十儀秋月簾籠來婺彩春風蟾背看彤芝燕城勝事今誰最聽取共嵓介祉詩椰實詩宣慰髙飛卿開宴出示此果邀諸君賦詩西溪首唱僕乃賡焉坡仙帖裏藹餘馨炎帝圗經見典刑辦削異樽陪北海暖包香霧自南溟摩挲枵腹疑藤癭雋永天漿勝楚萍吾子好竒時引飲沙頭間却玉雙瓶寄參政相公不覿清揚近一年依依情在鳳池邉碧雲思逺餘千里紅藥階深有二天兒輩𥘉官儋好爵寵光霑喜動重泉白頭無計酬知巳會有文章見簡編和西溪韻送良弼提刑赴憲臺之召拳拳幾御大賢車謂張平章張左相姚雪齋也氣量弘深見步趍望重正煩天下計人和愛及屋頭烏百年笑我遽如許一日似君其可無雅俗自來推坐鎮簡花奚待筆端區百城方聳使君車遽應旌招內殿趨儀羽望清𥘉振鷺柏臺隂肅已翔烏人材輩向朝中列天下看來一事無數路清寧固佳政經綸何似被綿區南來和氣擁輶車佩玉長𥚑利走趨阿閣再鳴瞻彩鳯月明三匝笑驚烏事機應運深還淺才氣多君有若無輿論功名果何在此心𥘉不外民區送李士觀還夀春莫府并序士觀友愛來辭促膝道舊眷眷有不能別者仍以親老地逺佳眠食是祝士觀請即此為贈因率爾賦焉見合肥王尹立夫為寄聲兼逹兹懇云至元己卯重午前三日也去年首夏别燕城今歲清和會汳京相顧鬢顔成老醜不緣貧冨異交情春蘭句好香生席歸路舟輕月滿旌地接兩淮終瘴濕身安之外揔虗名挽禮部丁公郎中荀班出佩紫荷囊漠署當年列鴈行學古不回平日守德方誰似老來剛眼中耆舊雲煙盡身後詩書坎掩香臺閣清凬有餘凛一丘埋恨吹臺傍相下送舍弟之官鄧鄙時為竹監使十五年中三聚首一千里外兩相望春風弼北重分袂夜雨漳南喜對床雲路暫淹騏驥足江沙睛護鶺鴒霜公餘正要加餐飯陽武同宗只二房舍弟仲略生朝十六年己卯五月草一日時寓史開府宅江漢堂深晝景妍亭亭花影舞胎仙一樽此夕歌鴻鴈滿意薰凬醉管弦遺業繼承心共切此身加健夀為先飄零南北𥘉無定正要相看捸蕚偏送千秋都司任密州諸城令竊㿰贈言代抒裏素梁苑相逢傾蓋𥘉照人秋水出芙蕖應憐丗事方多故却恐微官是美除處已道方何喜愠濟時舌在侭舒徐下車莫後神明政楚幕瞻烏待報書至元十六年歲在已卯四月十一日偕大同郭天錫祐之大梁劉衝漢卿天黨李昌齡千秋逰內梁門西大佛寺寺即宋寶相院也主僧郭里人臘七十餘相與會堂東丈室坐間話文字及壬辰歲京城警巖令人慨嘆久之祐之為放聲長歌劉起浮大白者數行懷仰之思渙焉氷釋然後知盛衰之不恆哀樂之無端也開口而笑頻何厭焉遂留題而去侍行者安陽楊韙義甫帝城何處散春悰花木禪房一徑通共訝殘僧談世故却憐間燕得諸公風雲心事誰能了歡樂朋從豈易逢聽徹清吟歸路晚金眀池沼夕陽紅山陽偶與大繼長相遇自辛亥年相别至今草八年矣追念疇昔作詩為贈解鞍林下振清埃懷抱樽前得好開白髮滿頭心事在青山當眼故人來凬流自有髙賢識感慨還深漂母哀讀盡深香轉蕭爽清吟不到伯倫臺深香係繼長父冝之文集號曰深香間適豫此行本擬逰百嵓不果故云漢東陽武太守臧公廟袁曹形勢兩鳴泉趣嚮終非翊獻朝歃血正圖扶漢鼎殺身何獨為張超荒城草暗遺壇在喬木風髙烈氣飄琳也為思名莭正有書明正苦相招太守劉景融之任滑臺索詩謹書此為贈十年錦帶佩吳鈎曽翼龍驤控上遊平日諸軍稱雅厚老來五馬更風流宦遊喜在西溪部間宴欣同畫舫秋歸鴈亭前問遺俗遲回𥘉不為詩留信察判士達來辭以贈言為榮因書此以送且見余之傃行云常憶終軍英妙年此時頭角見巉然百城望重非輕責六品除新實美遷姦弊得情矜勿喜事機到手簡為先河東説是懷思地未礙蘇章有二天賦湖石得於汴梁華陽萬石説卿雲族聚支分此逺孫疊嶂秀來雖暗靄孤峰崛起更雄尊轉翻蒼背鱗猶動侍近紅雲色尚溫覺我露堂光景麗洞庭秋氣鬱吟樽和士觀見贈詩韻鴻飛鷺散聚無時偶喜歸來共一池世路何心論薄宦燈窗同業憶深資但教白璧無微玷問甚青雲有素期却恐桐淮淮上月清光長使照睽離春露堂三首今年卜築露堂春頗覺吾廬彂興新書帙盛陳欣有託燕巢不定似嫌貧花枝照眼開還好竹樹當軒植漸勻朝日兩竿濃睡覺不妨門外即囂塵詩書真樂得新聞不羡軒車日過門薄宦到頭終外物一間入手是寬恩東山不厭蒼生望北海羞霑緑蟻樽花草滿庭從爛熳最憂當路種蘭蓀貧家營構不容常五十年來自此堂春露榜題應有在慈親疑慕詎能忘華滋濡濕趨庭處風彩依稀隨目傍我老自強觀志行泫然流涕撫青箱送何參政北上世事雲翻不易裁君侯真是濟時材若論經制明公道儘足扶持是憲臺霖雨終期賢相在秋風聊應鶴書來草茆亦有雲霄望執法清光接上台幹臣周君邂逅淇上作燈燼紅垂綴玉蟲鵲聲傳喜下霜空故人逺自亰圻至青眼依然白髮同道在固常忘勢重官清還復坐詩窮章章久説襄城政早晚褒書示至公鄉人魏先生家藏樂天神一軸作二像對立一則五十時容一則六旬後真也上有樂天自贊别稱為蓬婆仙云州年前屢獲瞻拜近讀公長慶集偶記此盡為訪問云已磨滅久矣遂作詩以吊蓬婆洛南地名魏家一軸樂天神三十年前繪色新欲就醉吟師格律試尋縑素墮埃塵空留池上山中詠謾應花前月下身官品文章吾敢覬似公真樂老能親嘉禾篇并序乙酉歲九月衛之南郊穫稼淂嘉禾一莖九穗和之至也田主李縣丞特以示余纍纍秀結小大連比誠可異也人用餘和欣忭曷已作嘉禾篇重陽后二日序天地深恩雨露零嘉禾還自氣和生九秋灝爽團孤秀一穗功夫到九成太史書年同合頴漢庭稱瑞比連莖表章莫後丹青賀人道豐穰是太平種玉亭徐子方宣慰有詩因擬作三首昆明雲錦厭凡材玉井移根手自栽不著詩仙分寶供誰携仙子下瑶臺留連夜月姢姢淨披拂薰風細細開不用葉浮滄海去芙容城闕有蓬萊靈沼雲深寶氣存素花一夕發芳根煙中髣佛溪娘語波面輕盈越女魂江月借粧增皓彩露華和屑貯芳溫夜深更待瑶環供細挹秋香共一樽休誇幻術有仙翁人定端能勝化工淑女固應歌窈窕芳根元自雪玲壠秋香入户搖江羽羅襪凌波繞漢宫莫訝西風吹易散世間聲色本來空西村二詩兩月秋霖不出門今朝騎馬到西村髙空氣肅雲歸壑老樹風多葉擁根謾説田園冝野隱爭趨朝市羡時奔古人大抵崇髙節飢凍當時所不論秋來泥潦擁柴門兩月幽棲不到村野鳥伴耕翔水潏寒蟲催織繞籬根有生未免憂飢凍舉世其能息競奔仕不力任間不足一生心苦欲誰論桃花菊四首一名煙脂紅淚灑明妃寄露葩換根非為貯丹砂黃輕白碎空多種碧爛紅鮮自一家騷客賦詩憐晚節野人修譜是頭花九秋霜露無情甚時約行雲護彩霞為厭秋容慘淡天故將濃艷彂清妍煙霜輕拂吳姬面丹臉能回白帝權寄傲儘凌青女肅閙粧冝刺繡衣鮮留連最是東籬蝶細繞芳叢兩翅翩容色風流操潔蠲一枝紅雪秀霜天氣凌金井欄干曲香在紅鵉扇影邉塞上閼氏凝夜紫月中仙子怨秋偏少陵若遇情增重肯數重岩細蘂圓葉細枝柔巧剪裁丹砂濃抹入纎荄朱顔肯逐劉郎老紅影晴圍葛井開慘淡秋容空野圃飄滿風露際天台晚涼更覺清香異不厭芳叢百匝來苦雨乙酉歲入秋巳來不過二日晴輒雨如此者已三月矣九月十大日作雲隂交會日長昏老雨瀟瀟晝掩門秋氣儘悲騷客志草堂空在少陵樽寵光蘚蔓滋多碧蕪沒蘭蓀似少恩坐聽寒聲萬家裏幾家繒纊有冬溫晴明無幾日朝隮雲不容同霧雨凄便著長風開白日巳令后土汚黃泥冷翻幽壑潛蛟舞濕鎖喬林健鶻棲萬象沉沉水光底幾時髙樹看晴霓火烏翅溫日腳昏雨中跳蛙亂登門少陵悲嘆禾穗黑元亮獨酌愁空樽氣惟協中乃成歲事至霪溢將傷恩詩人吟詠何所輔笑爇爐火回春溫與諸君會飲中作駑蹇從來䇿不前畏塗有戒莫爭先但隨白傳看花約冝信淵明止酒篇人笑苦吟踈巧宦天教多病護殘年老夫歲暮歡雖鮮每對諸君一粲然赴趙子儀飲會忠烈祠前是舊盟一樽重約就門傾但成把臂論文飲也勝拖泥帶水行樂事不應須節敘賞心最愜是間情一秋霖雨朝來霽此會當題作喜晴秋懷醉頭扶起日三竿掃罷幽軒到藥欄傍架整齊書帙亂繞籬料理菊枝殘日融虗閣留餘暖雨積髙空促早寒處置身心間裏過不將勳業鏡中看老去逢秋強作懷莫教間惱上心來人情寡味隨年薄丗事無端觸境開東閣謾傳梅信好西風時送鴈聲哀客來茶罷無多話共趂秋陽𦢊背鮉吊王提舉柔克乙酉九月丑四日自經關王廟內驚看神色自今秋奄奄殘魂到鬼幽叢簿未霜猶足蔽事機巳露欲誰尤百方作計難為地一意長歸是徹頭昨日寢門臨吊處兩行衰淚不容流前年除目儘多門獨喜南來弄竹孫入手固知餘利孔刺頭何苦入膠盆海鷗枉訝多機客楚些難招不吊魂漢夀祠前重回首短笻猶想立黃昏悠悠末路謀生苦穰穰羣奔為利來薄宦得勝間裏過畏塗合嚮冗時回誰知竹實療飢鳯却變錢神作禍胎我老不堪多感愴一汚還為素絲哀憶𥘉同舍在共城短小於中最幹精取舍近看臨老節鋪謀全異早年情舌端雄辨堪排難霜後寒蟬了不鳴重念人生生可貴世間万事一毫輕南來作監無多事舉手差池便兩分細論是非俱有説大綱向背不同羣以身死事從來有為貨輕生古罕聞不獨衆傷非正命秋空低處有愁雲謝道人惠竹春露堂成户牖空閉藏無物禦深冬長梢來覔筠溪種祥祉思慿道蔭功清泛細香添瓦鼎靜連秋月想煙叢夜來紙帳梅花夢巳在融融和氣中筠溪軒詩卷輔亡筠溪舊有亭甚雅往年為秋潦所圯亭與詩卷俱波蕩不存今歲冬來逰紫微道者丐余詩將欲輔亡且致重搆之意仍為賦此中間飲客蓋草八年前同逰者侍臣陳季淵奉使覃煥然河平牧今右丞史晉明禮部尚書王子勉侍御史雷彥正與不肖紫微道者威儀杜大用也時乙酉十月草一日重到筠溪二十年眼中風物頗瀟然䨥旌尚憶經行處八客同來作飲仙露濕雲梢回曉翠月眀瑶圃淡秋煙道人説是潛珍客更看飛簷插碧淵慶雲鸚鵝杯桂魄淪精貯海波神光分秀入紅螺卿霏護暖圍蒼腹丹喙嫌寒縮翠窠縱飲雅當豪客意垂雲無復緑衣歌一樽細浥江山筆夢到芳洲碧草多鸚鵡螺翠襟紅觜漫多知不覺流形入化機悽斷隴雲迷舊宿潤涵炎海有餘輝酒波碧飲珠還浦螺女棲深玉作圍昨日玳筵揮飲處故令歌緩恐驚飛自嘆明言出更難奮形飛入巨螺間中空蜃吐潛珍羽外示文眀變炳虨春釀儘供身後樂雕籠全勝向來間深藏且莫輕為用合浦珠神有往還何年犀火採螺江一竅重開混沌蒼解語巳迷青鳥使幽居渾是雪衣娘海苔暈碧猶霑溫慧舌能嬌自閉藏莫遣繍簾眀月入湘妃窺伺恐携將隴鳥何年别故山珠房深鎖雪衣間調音厭落佳人後勸飲來陪狎客間山鬼吹燈驚怪供春風浮酒長蒼灣興來一吸三江盡醉入無何肯昜還肯易一作不要醉一作徑字飛潛相化理堪驚老蚌還成隴鳥形鯨吸似憐唐相飲江沉應笑屈原醒坡陀海露神黿窟瀲灔波翻竹葉馨我老探竒心尚在醉來歸夢繞螺亭隴􅨛辨惠丗同誇何事將身學海蝸江月洞空珠有淚卿雲覆體玉生花回天不入深宫夢樂聖欣歸左相家長憶郡樓𥘉飲處頓令觥斚失光華至元十年官居平陽時監郡邀余飲白雲樓上出此器勸客余初見之故云札刺䚟斷事官系出中朝勛族喜讀書溫雅尚禮樂與賢士夫相接過衛來訪殷厚之意無以相答謹作是詩為贈且見夫妙齡英彂之氣云赫赫金張奕葉崇濟時還屬黑頭公讀書志在諸君右奉命名髙畫省風一札恩光寬大裏八州刑憲笑談中皇家求治如飢渴莫後當朝輔衮功餞王倅北行邶衛從來八逹衢三年不易二為車一官聊爾開公道四海能行即丈夫花外驛亭留故事日邊消息聽新除諸君若問民間治最重無輕是使符夀鄉兄君王評事七十平頭鬢未毛久將家事付兒曹心便教子𥘉無惜日喜延賔不厭勞花木漸成林下趣襟期猶是邑中豪年年櫻笋堂前客常對珍珠滴小糟送從事李庭王北上邶衛從來四逹衢三年不易曳長𥚑持心有道清廉在遇事能方長厚餘入幕不知王儉客携行惟見恕軒書揚清激濁朝家事不信銓曹止舊除秋欄四詠為仲略弟皆有和章時丁亥秋季也冝男松菊庭前草半燕幽花含笑彂春腴暖面堂背孤根秀畫出宫池百子圗浥露冷搖金鳯淡翻香重上髻雲烏怡然坐對忘憂外披拂餘芳任蝶鬚寒菊三徑歸來已就荒更堪風雨過重陽似憐楚些清吟苦留在寒花晚節香黃蝶有情時見過緑樽無酒淡相忘瀟條五栁門前路何處斜川接醉鄉秋蝶舞困春光興未窮又將心事戲秋風凌晨趂暖翻朝煦薄暮栖香入菊叢幾夜留連迷曉夢誰家圖寫出深宫翩然不逐韶華老飛過畫欄西復東薔薇葉下亭皋百卉空秋陽分暖彂春叢重滋芳露供坡墨兩見嬌黃出漢宫要伴紫荆昌晚節肯容鮮菊擅西風結根得所元來盛返物為祥恐未公謝趙主簿惠古鉼貯藏元氣閟重泉土暈苔滋碧頸圜枵腹戒貪瞪兩餮佳城見日定千年茂陵神碗知金重銅爵澄泥比玉堅聞説插花多結實露堂從此得春先上已日禊飲林氏花圃舍弟仲略首唱臘蟻香浮金叵羅一聲清艷遏雲歌千年盛節稱元已四座佳賔到永和曲水風流清興在茂林依約緑隂多柳圈儘帶餘徴去未礙花枝照鬢皤和韻三首朋盍華簮擁佩羅秉蘭聽我醉時歌柳圈泛灔風漪去樂事追隨獻歲和座近緑隂花氣重步携紅袖野吟多杯行到手須沉醉六客樽前我最皤春晚衡門厭雀羅臨流來詠舞雩歌喜從多士明鄉飲趂此春風扇物和林下幽香蘭草暗樹頭乘暖野禽多楊花也惜芳筵散糝亂溪稿似雪皤麗日晴川艷綺羅琵琶聲趂紫蘭歌衣冠盛集有今日花柳春風覺太和闔郡浮觴從此始百壷載酒未為多醉歸扶路人爭看不道花枝笑鬢皤喜雨丁亥歲三月十四日晨起露氣甚潤疑以為雨兆是夜雨大作至明日晌午方霽後二日即立夏四月節時頗旱故有此作一氣先驅玉露瀼夢驚簷溜曉淋浪洗開塵障千山靜釀出春風百草香人變暵憂為燕喜歲回時歉作金穰兩盂糲飯朝飢了從仕居間總未妨題靈堂雅集圗擾優王城若箇間禪房來結靜中緣機鋒為愛靈師峻樽酒同傾繍佛前談麈風清穿月窟雨花香細揚茶煙應慚十九人中列開卷題詩又五年瑞麥農使苟正甫過邯鄣得麥一莖九穗蓋未之見也作詩以紀其祥是年司農司復立一依巳行條格丁亥歲夏五月也麥秀從來説兩岐連枝九穗若為竒物關極數知陽盛人飲天和樂歲宜同頴並歌唐叔稼駢莖休頌漢房芝天心似喜農司復一札恩光揔舊規秋風如水聲丁亥嵗六月十九日酉正二刻得秋是夜聞秋風自東北來如大水將至靜觀天運儘孚誠一夜秋風似水聲志士聽來心未穩客窗聞處夢先驚物華披拂爭含實鷹隼慿凌想迅征常笑晉人無逺用扁舟東下為蓴羔遊白茆寺為愛西山欲遍經春風吹馬上稜層千章古木偎崖寺一點清光守障燈石磕題名留故事松隂移榻對殘僧婆娑最樂雙泉水潤入髙峰露氣凝欹器詩三首并序昨飲韓進道家坐間出欹器勸酒暮歸醉卧既醒夜四更試作二詩吹燈起書覺筆端甚來之易也投筆就枕復得一詩似勝前作明日示弟忱請行下合屬即為先和也神物誰移代酒船轉懸金觶兩楹間才中便得居安理稍溢還成覆水艱魯廟橫陳猶賜寶金鑾揮灑憶朝班汪然能起鯨吞興鸚鵡為螺恐厚顔卿雲垂彩捧宗彛終日持盈伴狄儀滿斗醁波浮灔蟻兩椿春色上修眉致恭幸奉神明器勸飲休誇金曲巵抖擻宿醒還頓悟此心才倚便惟危几杖槃孟揔有針古人垂戒一何深以漿為酒雖無量覆水藏機恐過斟魯奠兩楹朝復暮崖州一賦古猶今儼然頓獲神明觀長記春風拜孔林賀介甫提刑得雄海中仙果自珍竒莫訝秋風得子遲瓠晢定輸陳氏子蘭芽休吒馬家兒蒼蒼有道旌遺直繼繼無窮見孝思湯餅筵前最欣喜老親時抱説含飴成耀卿以所釀秬酒相餉走筆賦詩為謝玉色芳溫巳可憐白衣持送飲中仙周書盛説神明齊楚誦休誇桂酒玄光透銀觥無表裏法傳真體得蹄筌醺然坐我春風底夢到明禋二卣前草四年丁亥歲重九日同弟忱展墓奠辭二首黃葉畨畨落帽風今年秋祀喜君同生榮沒戚無餘憾秋降春升又一終玄壤潤涵泉脈逺飢烏飛去劵臺空兩鄉相望幾千里長在神靈顧護中馬亂溪流濕鐙金捨鞍齊簇野棠隂千年盛氣通滄海滿袖秋香奠祖林麗石未瞻先丗號表行終愧古人心衰年最切光揚事此意從來不獨今右和舍弟仲略韻奉實野臺之目墳南岸相對一方甚髙平天然一臺弟仲略因曰可為王氏遣奠拜臺秋興非關觸物哀時經墟落自悲哉重門未署榮親表暗用原涉京兆斥事老岸先為下馬臺暗用董生下馬陵事節敘登臨車轂擊春風粧點野花開一杯共酹清泉水長繞先塋兩面來一作滚滚送弟仲略得假南行頭健骨看雲騅帖帖爭教墮水飛假促最先無纍保事纒當重早知機雲連鄧鄙春泥逺路過襄城野店稀去去莫辝鞍馬倦迎門兒女要牽衣緑毛龜四海金明一渥窪伏藏來自水仙家背衷屬甲玄居長髮散柔絲翠有華浮出淵泉看處好泳遊蓮葉認時差杖扶行嘆陪三老夢繞春煙鶴禁花唐州城北一井專産此龜至元十三年千秋節陪姚左丞許祭酒許榮祿行香東朝禮畢觀交趾所進緑毛大祭故云洛水當年負緯書獻嘉此日野人俱蒼鱗閃閃精分斗暖氄毿毿翠滿軀元氣咽來終不老芳蓮巢處更堪圖詩成喜覩詞臣賦早挽人文與瑞符至元草四年丁亥秋九月草四日夀中丞王兄復放生者以此龜來獻余以靈物罕見為賦一詩明日偶得大定草三年壬寅冬黨承旨郝侯張甫所進賦贊墨迹序説眀時嘉瑞甚郁郁也當時竹溪才以應奉供職文與翰已復如此宜乎金百年以來文章命脈得其正傳者公一人而已因念余平日所行造物者皆使之前知此莭雖出事後其類大同亦可重也故併及之秋澗先生大全文集卷十八
