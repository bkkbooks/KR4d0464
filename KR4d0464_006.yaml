front:
  text: 秋澗先生大全文集卷第六七言古詩
  hash: sha256:8957e90082cf53a1a4157f63f086a12d822a7d3dca3d4f79b875727eeb944b4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_006-1a}
body:
  text: 舒辟劒歌為太常公弘衜賦龍泉之精老蛟血躍入洪爐凝夜雪至今元氣老不死粲粲碧華浮两脅雀環金錯赤絲絛蒼水夜擲天為髙或云徑度海西陲佩非其人有所歸夜飛入燕人不識天以神兵示中國宋侯磊落書中傑碧眼風湖物情格窮幽抵祕竟圖經羽窟崑崙騰口說黄金臺下喜相逢醉眼髙歌得玉龍摩挲神物萬金重箕冠傾倒琉璃鐘蹇予元年燕市客走馬來觀嘆竒絶雪屋嬁青寳匣開紫氣横衝箕尾㓕悲風凛凛入座寒山鬼吹燈中夜泣當年夭矯龍性在入手無方恣舒辟金精固列五材首堅質柔資苦差别彼人之性而與同太柔失威剛則折咄嗟此劒隂陽全雄雯雌縵俱赫然君不聞淮隂未遇賤且貧愛而服之良有因無何大遭跨下辱亦如此劒能屈伸一朝攀附赤龍飛六合風雲入指揮漢家日月四百載亦從此劒騰光輝宋侯篤我卓所立一日三看曽不惜我今作詩私自激重爲歌之感疇昔多君振厲義且誠羡君小試妖氛清三年盗弄潢池兵亞夫持節東南征此時宋侯佐戎車一揮逆儔生白鬚縵纓短衣非我事談笑自有聊城書斬䲔歸來茆屋底拂拭海西心自喜不湏夜半舞荒鷄得君亂絲爲君理况君天冨蓆上珍胷蟠萬卷餘經綸天王未八非熊夣此劒應湏檢子身飛豹行中統二年冬十有一月大駕北狩時在魚児泊詔平章塔察公以虎符發兵于燕既集取道居庸合圍於湯山之東遂飛豹取獸獲焉時予以事東走幕府駐馬顧盻亦有一嚼之快因作此歌以見從獸无厭之樂也予時為左司都事二年幽陵閱丘甲詔遣謀臣連夜發春蒐秋獮是尋常况復軍容從獵法一聲畫皷粛霜威千騎平崗捲晴雪長圍漸合湯山東两翼閃閃牙旗紅飛鷹走犬漢人事以豹取獸何其雄馬蹄蹴麋歘左興赤縧撤鏇騖龍騰錦雲一縱飛塵起三軍耳後秋凬生豹雖逸才不自惜雨血凬毛摧大敵凬煙慘淡晚歸來思君更上單于臺血埋萬甲戰方銳瓜牙正藉方剛才古人以鹿喻天下得失中間係真假元戎兹獵似開先我作車攻𥙷周雅大笑南朝曹景宗誇獵空驚弦霹靂何曽夢見北方強竟堕閉車甘偃息揚鞭回首漢家營一點槍纓野煙碧匹𥿄歌謝王道人子寕楚山脩竹森如玉千杵鳴碪響空谷溪翁鬪巧紙愈佳渌泛秋江連百幅春歛籠燻素練輕鳯梭停織天孫顰聲光一日天下白万古作配中書君道人耒自蒼陵天名品閱盡東吴舡恵然贈我以此𥿄入手展放銀河飜脂疑玉瑩絶纎滓凬流綽約藐似姑射之真僊扶餘綿蠒固堅膩中有雲影霮䨴浮秋瀾金華五色非不佳不放墨松使者光通玄何如此君貴重百金比當与澄心王屑並驅争後先媿無少陵詩魯公筆如椽揮毫壹掃空雲煙文章元氣古无間玉堂人物今翮翩此而不贈返恵我夜光暗投眞可憐道人一㗛春生頰琢腎雕肝爾心折千首新詩意未窮分取煙江愁万疊我今靈臺乆荒穢老樹秋蕪餘廢垤何時除治若此𥿄一片冰壷貯秋月深蔵且湏珎惜之准備虚堂夜生白金馬門行䝲董叅謀彦才之元帥府十年金馬門中客万里凬雲横上策貂蟬要自出兠鍪拏舟渡江江水窄新豊樹色繞千官一片丹心懸魏闕洞庭白波木葉下千騎臨江思飲馬堂堂大帥晉龍驤聲振南陲無呂賈止則如山戰則克更着君侯叅幕畫淮隂何止一軍驚滿眼旌麾動秋色万竈連营椘戍烟一樽回首銅駞陌功名年少貴力取行与諸兄垂竹帛蹇予乆事筆研間天東倦客未能還夢回破屋見星斗啇聲夜半歌南山虚名不到麟閣上白日能饑首蓿槃何如乗此長凬去濁浪吹破東南天相從行贈宋兄弘道宋君茂異誰其儔事業當向前人求羣書磊落載其腹人道聦明似鄴侯黄陂千頃不足泳入海簸弄龍􅋮舟十年霧豹棲巗幽每恨南海北海風馬牛碧雲望断西山陬爱而不見心為憂向耒文彩珊瑚鉤寕胡一曲不自休公嘗作寕胡閼支歌行於世壯懷似欲冩孤憤筆力倒挽西江蚪古今楽府非不優例以哀怨更相酬蛾眉命薄黄金貴青塚雲凝紫塞秋多君變體不師古一掃万古琶琵愁我忻得之三過讀如入武庫森戈矛乃知鳯凰在歧世自瑞春凬百鳥空啁啾乾坤吾道方悠悠天公卑子鳴中州喚回海嶽三生夢獨倚元龍百尺樓今年冠劒平津閤積憂一見心為瘳識君恨晚愧仝志正以羔羊之鞹縁飾青貂裘古今為諱分清流不用倒飜鸚鵡洲期君有道興東周不然君為龍我亦同雲浮自兹攀逐不相失四方上下從之㳺南風謡送董端卿之鄧州軍幕南凬不競兵塵鏖两淮春燕趨林巢吾皇明見万里外欲以德服兵无勞巳聞灌莽極目地万屯春事開林臯紫髯将軍賢且豪智略徃徃超龍韜一軍壁楚號勁利眼中勍敵无劉曹今年分閫鎮鄧鄙旌旗改色天爲髙芙蓉幕府固多士更以厚禮羅英髦君侯漢庭選經濟䕫与咎婉畫乃餘事白羽凬蕭騷年雖哀樂境两鬢無霜毛如君名䆠不可逃繡花未滿千金刀鸞凰忽爾辭蓬蒿此行莫起觸熱嘆將軍好士心忉忉淂君豈止解欝陶投竿如掣東溟鼇飛牋走翰鈴閣底駸駸欲逼令家綯秋風皷角驚江濤軍中氣和投楚醪兵家耕戰諒有待雲雷隠伏池中蛟一杯漢水春蒲萄楚人雖猛輕秋毫知君談㗛辨此事長江聽渡龍􅋮艘長江聽渡龍􅋮艘長劒行爲王子𥘉賦老蟾破雲光走庭清風西來散餘醒斗間紫氣望不見太白睒爍無光晶燈前惚値蒼水使示我寳劒喜且驚芙蓉匣開吐竒怪分光盡萃此劒之精英蒼虬翻凬白日動秋水背露龜鱗青昔之所愛今乃遇覺我烱烱㕠瞳明青衫試拂拭磈磊難自平平生疾惡腸爲爾芒角生我聞乾剛甲五材鍜成玉龍復以首利庻物稱佩非其人尚不可况乃用之髙庳而無經君不見趙文失所好日夜徒優曼胡纓朱雲妄其請折檻反取訕訐名劒之於人無適莫用之得術如雷霆又不見周公管蔡舉謗息四國寕聖師两觀誅正大貫日星遂令千載下妖腰亂領寒於氷引杯感古我自惜儒冠突鬚嗟無成之子凬雲士慕藺如長卿飄飄四方志早以文章鳴君与劒無乆蟠决雲㑹看昇青天黄金錯環蒼玉佩攬環結佩天王前慇懃祝子無多言不誅巳然誅未然雜言喻爲彦政失子作堂上慈親頭白絲慰心頼有寕馨兒巉巉頭角日方露誰揮如意擊碎珊瑚枝不知與奪果何主變㓕歙歘無旬時驪龍失頷珠海窟黯慘鬚眉垂老鶴憶别雛涙眼呌断秋天低彼蒼坱圠於我本無有何事誕說立象為鑪錘陽春豔豔木自榮非春一一點化青紅姿秋凬瀟條羣木脱物感秋氣彫悴又匪行隂機乃知生死天地間花開花落殆似東風吹蜂房魚腹得至理子夏失眡傷天彛西家因果蠱流俗東家聞之為朶頥蕃延踈薄無定分慰懐當取昌黎辭父子自天性東野能不悲君年正鼎盛情鍾感非冝况夫先子澤渾水清而漪吾友賢且孝舉案加有梁鴻妻捧檄為親屈晨昬歸來侍庭聞我聞善積有餘慶他日當有螽斯詩湧金遊并序予回轡共山有客過而問曰湧金之逰樂乎曰樂矣不無詩乎曰无有也客曰事樂㑹之於心心樂寓之於口且蘭亭之勝至今尚為羙談者其以有託於斯文也客退於是乎書長短勾以歌時孟夏十四日也曉雲拂山山氣昬坐耒万壑烘朝暾丹崖翠壁畫莫出但覺詩境供愁新地靈祠古秘幽怪天授神柄專其尊年年簘皷祠下路東凬十里楊花春我耒爱此山水窟天氣着物清而温湧金亭上一䃲礴主人留髠醉金罇水邊滉瀁多麗人徃耒但看珠翠裙不知僊家足竒貨明珠脱串一一浮出摩尼真波間可翫不可掇雲錦飜動玻璃盆書生潤身那羡此席上正有吾家珎舉杯酌水但黙禱山靈垂意哀王孫願分秀色貯詩腹一洗万斛胷中塵仙官有請固不拒山鬼竊笑君無因不然結茅傍脩竹雲烟占断西湖曲月明舒嘯碧山巔喚起公和跨黄鵠秦川行送張孝先北燕豪俠南州客去歲辭家今八月霜凬偃薄一貂裘不為无金少顔色平生弓劒只餘事滄海凬雲居上䇿今年棄繻復入關春光澹沲迎征鞍周侯磊落天下士櫜鞬頼子為周旋我知黄鵠志千里此舉横絶青雲端長安西望白日近解鞍多在清明前新豊酒斗十千長樂坡頭楊栁煙曲江花滿樹春凬怨啼䳌對時感槩能不動鄊思丈夫有涙肯洒離别間驊騮得路足神駿我非繞朝愧乏黄金鞭君不見古人勲業貴少壯莫待拊髀悲流年東方碑帖歌謝子𥘉魯公筆法天下雄東方一賛其猶龍嗟予愛之力莫致夣魂㡬到平原東我雖不解書慕此忠義凬有唐天寳𥘉禍首營州奴羣兇一朝起氛祲連神都廿四名郡凬靡随盗區堂堂顔使君徇國思捐軀竟以七千衆不為胡塵汚乃知大節𥘉不以藝自殊胷中義氣蟠不盡徃徃翰墨攄其餘况兹游藝君子責古人以字為心畫先生不知作何狀覩此寳墨事可測書學到君稱絶筆凛凛英名貫星日晉漢名書凢幾家奄奄為君皆敗北宜乎眉山公謂此能事畢出於右軍擴以大比並離堆當第一豢氏龍蟠古井波将軍虎卧南山石又如大人垂紳正笏廊廟上忠厚之氣了弗事縁飾嗟此至神物毎爲好事得君家父子賢向歆只今好古喧詞林幾年秘此分賜我拜嘉不翅千黄金君心若此真尚友我報愧無瓊与玖歌成大笑不自量擬與君名傳不朽墨竹歌爲共嵓䖏士石盞公作吾生愛竹兼嗜石手不能書漫成癖億從林下七賢游終日摩挲弄寒碧山河一自隔黄壚塵土填浙百憂集得君此畫忽灑然元氣淋漓障猶濕滿空月露下寒梢人去山隂鎻幽寂又如湘妃廟前風雨睛翠柚紛披山鬼泣㡬竿迸出太古崖老節雪欺𥘉不惜表將一片歲寒心不与繁華競朝夕東欄牡丹鶴翎紅西沼芙蓉紺珠色歌鍾傾國樂芳年以色事人能幾日何如鴨江居士詩骨清而臞手種此君忘肉食不湏柱杖敲人門万斛清凬破䆫北月中看竹掃秋影妙得於心發之筆興耒落紙出意表擬學湖州㓕形迹嗚呼湖州巳矣䔥郎逺今代名家澹㳺客君不見李杜文章万丈光一日齊名偉髙適乞鴈歌呂東平江海客一鶚盤鷙空百老耒機械淡相忘㕠鴈隨行聲格格階除得食藏頸眠惱不及鄰耳乱聒两堆睛雪春不消暮映書䆫生夜白終朝司警代黄耳夢破煙泣秋拍拍主人對之心愈閑感念物情終桎梏家中又厭食蟻蟲一夕籠歸山下澤今春邜捕衆鶵息百日已能過所出青山滿眼映一群泛浦眠沙白勝雲稻梁棲畮秋正羙約我充庖潔口飱能鳴見害古所惜我心念之生懚仁勸君深藏饔子刀解縛歸耒餋雪毛右軍閑適乆無伴許贈一隻相与遨西溪秋水深㡬篙江天漠漠秋凬髙歸飛不隔暮雲逺放尔縦觀心亦滔俯歌㕠鴈行仰送孤鴻杳洞庭歸客渺无音万斛覊愁坐中老節旄零落瘴海煙冠蓋都門閙昬曉我欲因之附尺書西北煙塵静如掃夏夜晨起理髮時目疾新愈居閑早眠復旦起遶樹行吟殘月底鄰鷄聲裏候東方曉色雖分氣清羙雙瞳自為苦所纒两鬢鬅鬙思旦理青絲髪散滿肩雲千梳未暇百梳勤餘邪細逐老節散風露氣入秋蓬根䟽通百竅勝新沐一洗耳目清而暾朝有蠅子暮有蚊事随日出更紛紜侵晨有此至良劑肯羡夘盌松醪春詩成因謝草堂客嵇康養生非妄論衡門行送陳長卿衡門棲遲樂吾樂甘着輩流譏束閤長河其奈不療飢誰暇物情論厚薄前時行臺領漕計䖏士半為餬口起長年巨䑕有餘壌比比吾儕廢生理嗟哉陳君何苦節天東㳺子天西客監河執去餘蘖在客舎半椽淇水測書生辛苦學干禄入手青衫得藜藿塵埃風雨蹇驢瘦日就空倉自覊縛今年幸得解由了超海挾山𥘉不惡暮春之𥘉日東作陳君叩門聲剥啄向予長跪話逺行上計又湏趨薊朔携書五車煑不堪舉室舟行更瀟索前因未必是亨衢着脚如堪戒前錯若於金粟例言拙誰着裴劉供調度逢時正有利不利有命豈論賢不屑長歌西北酒一杯浮雲漸逺天寥廓東曹若見王春官道我行藏事如昨幾年奔走一堕甑蕙帳歸來慚怨鶴濟時幸有公等在擬把一竿尋釣壑因君悟我向來非相送出門還一噱大雹行至元四年五月十五日也雷師掠地西山麓北㑹豊隆出蒼峪崩雲掩落赤日烏烈缺光騰燭龍目黒風駕海天外立万騎先聲振林谷雲濤怒捲惡雨耒中雜冰丸幾千斛殺聲咆哮屋碎瓦百万神兵自天下奮然横擊合陣來昆陽之戰何雄哉又如馬陵之道万弩發矢下雨如无魏甲斧形鷄卵見自昔異狀竒模此其匹野人庭户變綃舘霧湧煙霾與龍敵又疑蛟人泉客泣相别涙灑珠璣恣狼藉葉穿鳥死庭樹慘禾麦擊平驚赭赤神威收歛俄寂然瀟瀟合浦還珠玭整冠變色立前廡但見土窩萬杵一一皆深圎五行有占非小變調元失所誰之愆又聞夏冬愆伏之所致亦以坎治持化元孔子修春秋二百四十二載間特書雨雹凢两次大率貶黜臣下侵君權况今朱明壯陽月胡為縱此群慝之所顓歷関上訴九虎怒蟣虱小臣非所言獨憐田家𬒳菑者寒耕熱耘手足成胝胼差科大命寄一麦眄眄見熟療饑涎一新到口不得食哀哉何以卒歳年捕魚歌塢西溪水深及篙漁户曉集拖輕舠縱横張網截两涘挺义逺混驚銀魛栁隂潜涔深且宻大魚小魚争遁逃湏臾合網環深碧薄摻提綱從掇拾小魚骨罣半死生口頰噞喁無足惜就中一魚匪常材黄金作鱗尾砂赤泳㳺本在孟津居波蕩江湖事行役中涂遇厄夢不神騰躍舟中有時立漁郎逥艇催歸急幾䖏金盤待鮮食夕陽澹澹洲渚空回凬瀟颯溪神泣網罟設兮水不深役物而君戒貪得古人數罟不入池以時漁捕湏盈尺今人古道棄如泥竭澤焚丘意方畢野人有樂在濠梁澤畔行吟三嘆息宿仙山朝元觀題示太行北走開四門川原落落凬煙屯仙山西峙如虎踞石嶺東抱猶龍奔道林中蟠百餘畒顧揖殿寢何雄尊仙翁得僊事惝慌碧霞洞主玄元孫百年朝元去不返寳籙秘泄風雷燉隂靈訶護石壇古老雨留漬蒼苔痕緬懐矯矯東􅌡老變化能大天溟鯤謝公本是濟時具誰使卧老東山墩豊碑不愧蔡邕筆再拜遺像儼以温我耒夏交樹隂翳万橘翠瑣芬蘭蓀平生素有林壑癖苦厭圜圚埃霾昏毎耒福地愛瀟爽跬歩乃与仙凡分山川景氣得人勝喜對羽客開清樽夜深静卧月東出林影布地翻瑶琨天風吹空万籟息明星當上手可捫恍然人境两竒絶月露一洗清心魂世間塵土㡬千丈有夢不到瑶臺垠人生㡬何胡不樂例自跼束駒服轅惜哉清景不可駐一聲啼鳺開林煙明朝人事随日出坐看蟻穴蜂衙喧鴈門公子行贈李仲明万戸鴈門山髙㡬千仞凬土雄尊號全晉君侯年少出紈袴䘮馬輕肥冠時雋古耒豪傑數幽并栁子不湏誇晉問蹇予三年東魯客塵滿青衫鬢雙白書生無䇿伴侯鯖尺蠖泥蟠甘退縮此時仝君幕中㳺䄂手旁觀看超越絛籠脱落不受覊意表出竒人叵測健於豪鶻快一擊霜翮盤雲鷙空百爱君肝膽向人開遇事剖析无留材世人荆棘塞靈府米事掛眼生嫌猜丈夫所貴氣為主行義不虧誠可取區區心計米塩間束縛真為抱官虜相期心事李西平錦鞬家世蜚英聲天其藉此作事業未害蹉跎魯客卿眼中人物真知巳舉世論交多逐勢贈君一片百年心意氣相傾岱如礪羡君才氣真英耳鬰鬰安能乆扵此煙華紫禁正縈繞臺閣群卿半郷梓明年熖熖動北方騰踏風雲乃吾子贈田生赴監河之召田生操履凌髙節三載奔馳秦隴月長年愈覺世事艱中道毀車思逺業故人戀戀監河侯願分斗水相為留古人有志患不立抱關擊柝非所羞君不見黄河三尺鯉凬濤終化禹門秋贈孟祝史德卿還燕城孟侯落落明時佐從祀歸耒喜相過探囊擲下珊瑚鉤海岳英靈驚甑堕淋漓元氣星斗光照徹龍淵得竒貨我𥘉把翫三歎息不覺秋凬吹屋破太乙真僊令綺季入奏竹宫瞻紫氣受釐宣室想所陳不獨碧鷄金馬異朝家望望董賈賢祝史孟君今偉噐明年豔豔動北方舘閣凬生驚一世因之啓賀廉行臺為國得賢真宰惠題韓幹畫馬圖韓御史君羙所藏索賦火輪凝空汗如洗老坐烏臺簿書裏韓君忽出天馬圖瀟䬃朔凬生駿尾吁嗟此馬耒西極細看一骨千金直當時開元監牧盛赤岸千群雲錦織奚官𫀆帶蒼髯㦸碧眼深藏九方識豈其此骨獨當御轉盻君㤙仗前立㡬年扈從東封還霜蹄蹴踏長楸間驪山武事厭不講剪刷日應供帝閑鵉旗百里臨潼道華清宮殿春凬早黄金覊勒王華騣凶鬯匕遊幸君為玉環老幹時供奉属車塵思入星精奪天巧興耒承詔貌真龍冀北驊騮歸一掃古人畫馬需神品骨相權竒氣深穩将軍曹霸幹所師万古丹青少陵引韓公得法固入室千丈光輝誰所凖自經題品雪堂僊韋偃龍眠徒滚滚嗟予何者牛馬走開卷賦詩還自哂韓卿朝騎御史騘暮擊凢禽健秋隼更煩牢鎻玉麒麟隄備雷凬轟秘本梁秀才惠棖梁時在制中君家堂前棖两株汝父當年手親植洞庭波子霜滿林摘恵晴窓慰幽寂夜堂張灯動春酌脫帽驚呼夢疇昔摩搓两手三日香感舊懐人淚霑臆一㕠照耀黄金苞露香冷落銀觥桃呼兒走問鄰墻酒早晚珎殊滴小槽三勒漿歌有序唐代宗大暦間幸太學以三勒漿賜諸生此後不復聞扵世今光禄許公復以菴摩訶毗棃三者醸而成漿其光色曄曄如蒲萄桂醑味則温馨甘滑渾涵妙理及薦御天顔喜甚謂非餘品可及遂時供内府不肖以霑瀝之餘發爲歌詩于以見國朝德𬒳四表方物畢至之盛詩公愛君之心以湯液醪醴躋聖壽於無疆之休也金天一氣何竒特異品珍材表馨僡翠籠萬里入貢來赤佛堂西漢家邑異哉三勒見圖經秪解有靈能愈疾豈知用外蔵妙理瓊醴蔗漿非所敵誰傳醸法自太古滿甕春雲元化濕就中至味眞玄酒豁逹靈根三益友許公得法神所傳一醖天成漢重酎儀狄拊掌耆伯驚五百年來未之有芹香背炙固區區推以愛君忠且厚彤芝蓋影擁紅雲湯網初収在靈囿月華冷落露盤冰三嚥芳温挹天斗金壺㶑灔乆承案不能餐我輩何功食天禄秋澗先生大全文集卷第六
