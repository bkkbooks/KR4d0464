front:
  text: 秋澗先生大全文集卷第六七言古詩
  hash: sha256:8957e90082cf53a1a4157f63f086a12d822a7d3dca3d4f79b875727eeb944b4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_006-1a}
body:
  text: 舒辟劒歌為太常公弘衜賦龍泉之精老蛟血躍入洪爐凝夜雪至今元氣老不死粲粲碧華浮兩脅雀環金錯赤絲絛蒼水夜擲天為髙或云徑度海西陲佩非其人有所歸夜飛入燕人不識天以神兵示中國宋侯磊落書中傑碧眼風湖物情格窮幽抵祕竟圖經羽窟崑崙騰口説黃金臺下喜相逢醉眼髙歌得玉龍摩挲神物萬金重箕冠傾倒琉璃鐘蹇豫元年燕市客走馬來觀嘆竒絶雪屋嬁青寶匣開紫氣橫衝箕尾滅悲風凛凛入座寒山鬼吹燈中夜泣當年夭矯龍性在入手無方恣舒辟金精固列五材首堅質柔資苦差别彼人之性而與同太柔失威剛則折咄嗟此劒隂陽全雄雯雌縵俱赫然君不聞淮隂未遇賤且貧愛而服之良有因無何大遭跨下辱亦如此劒能屈伸一朝攀附赤龍飛六合風雲入指揮漢家日月四百載亦從此劒騰光輝宋侯篤我卓所立一日三看曽不惜我今作詩私自激重為歌之感疇昔多君振厲義且誠羡君小試妖氛清三年盜弄潢池兵亞夫持節東南征此時宋侯佐戎車一揮逆儔生白鬚縵纓短衣非我事談笑自有聊城書斬鯨歸來茆屋底拂拭海西心自喜不須夜半舞荒雞得君亂絲為君理况君天冨席上珍胸蟠萬卷餘經綸天王未八非熊夢此劒應須檢子身飛豹行中統二年冬十有一月大駕北狩時在魚兒泊詔平章塔察公以虎符發兵于燕既集取道居庸合圍於湯山之東遂飛豹取獸獲焉時豫以事東走幕府駐馬顧盻亦有一嚼之快因作此歌以見從獸無厭之樂也豫時為左司都事二年幽陵閲丘甲詔遣謀臣連夜發春搜秋獮是尋常况復軍容從獵法一聲畫鼓肅霜威千騎平岡捲晴雪長圍漸合湯山東兩翼閃閃牙旗紅飛鷹走犬漢人事以豹取獸何其雄馬蹄蹴麋歘左興赤縧撤鏇騖龍騰錦雲一縱飛塵起三軍耳後秋凬生豹雖逸才不自惜雨血凬毛摧大敵凬煙慘淡晚歸來思君更上單于臺血埋萬甲戰方鋭瓜牙正藉方剛才古人以鹿喻天下得失中間係真假元戎兹獵似開先我作車攻輔周雅大笑南朝曹景宗誇獵空驚弦霹靂何曽夢見北方強竟墮閉車甘偃息揚鞭回首漢家營一點槍纓野煙碧匹𥿄歌謝王道人子寧楚山修竹森如玉千杵鳴砧響空谷溪翁鬪巧紙愈佳渌泛秋江連百幅春斂籠燻素練輕鳯梭停織天孫顰聲光一日天下白万古作配中書君道人耒自蒼陵天名品閲盡東吳船惠然贈我以此𥿄入手展放銀河翻脂疑玉瑩絶纎滓凬流綽約藐似姑射之真仙扶餘綿繭固堅膩中有雲影霮䨴浮秋瀾金華五色非不佳不放墨松使者光通玄何如此君貴重百金比當與澄心王屑並驅爭後先愧無少陵詩魯公筆如椽揮毫一掃空雲煙文章元氣古無間玉堂人物今翮翩此而不贈返惠我夜光暗投真可憐道人一笑春生頰琢腎雕肝爾心折千首新詩意未窮分取煙江愁万疊我今靈臺久荒穢老樹秋蕪餘廢垤何時除治若此𥿄一片冰壷貯秋月深藏且須珍惜之準備虛堂夜生白金馬門行贐董參謀彥才之元帥府十年金馬門中客万里凬雲橫上策貂蟬要自出兜鍪拏舟渡江江水窄新豐樹色繞千官一片丹心懸魏闕洞庭白波木葉下千騎臨江思飲馬堂堂大帥晉龍驤聲振南陲無呂賈止則如山戰則克更著君侯參幕畫淮隂何止一軍驚滿眼旌麾動秋色万竈連營椘戍煙一樽回首銅駝陌功名年少貴力取行與諸兄垂竹帛蹇豫久事筆研間天東倦客未能還夢回破屋見星斗啇聲夜半歌南山虛名不到麟閣上白日能飢首蓿槃何如乘此長凬去濁浪吹破東南天相從行贈宋兄弘道宋君茂異誰其儔事業當向前人求羣書磊落載其腹人道聰明似鄴侯黃陂千頃不足泳入海簸弄龍􅋮舟十年霧豹棲巗幽每恨南海北海風馬牛碧雲望斷西山陬愛而不見心為憂向耒文彩珊瑚鉤寧胡一曲不自休公嘗作寧胡閼支歌行於世壯懷似欲寫孤憤筆力倒挽西江蚪古今樂府非不優例以哀怨更相酬蛾眉命薄黃金貴青冢雲凝紫塞秋多君變體不師古一掃万古琶琵愁我欣得之三過讀如入武庫森戈矛乃知鳯凰在歧世自瑞春凬百鳥空啁啾乾坤吾道方悠悠天公卑子鳴中州喚回海嶽三生夢獨倚元龍百尺樓今年冠劒平津閣積憂一見心為瘳識君恨晚愧同志正以羔羊之鞹緣飾青貂裘古今為諱分清流不用倒翻鸚鵡洲期君有道興東周不然君為龍我亦同雲浮自兹攀逐不相失四方上下從之遊南風謡送董端卿之鄧州軍幕南凬不競兵塵鏖兩淮春燕趨林巢吾皇明見万里外欲以德服兵無勞巳聞灌莽極目地万屯春事開林臯紫髯將軍賢且豪智略往往超龍韜一軍壁楚號徑利眼中勍敵無劉曹今年分閫鎮鄧鄙旌旗改色天為髙芙蓉幕府固多士更以厚禮羅英髦君侯漢庭選經濟夔與咎婉畫乃餘事白羽凬蕭騷年雖哀樂境兩鬢無霜毛如君名宦不可逃繡花未滿千金刀鸞凰忽爾辭蓬蒿此行莫起觸熱嘆將軍好士心忉忉淂君豈止解鬱陶投竿如掣東溟鼇飛箋走翰鈴閣底駸駸欲逼令家綯秋風鼓角驚江濤軍中氣和投楚醪兵家耕戰諒有待雲雷隱伏池中蛟一杯漢水春蒲萄楚人雖猛輕秋毫知君談笑辨此事長江聽渡龍􅋮艘長江聽渡龍􅋮艘長劒行為王子𥘉賦老蟾破雲光走庭清風西來散餘醒斗間紫氣望不見太白睒爍無光晶燈前惚值蒼水使示我寶劒喜且驚芙蓉匣開吐竒怪分光盡萃此劒之精英蒼虬翻凬白日動秋水背露龜鱗青昔之所愛今乃遇覺我炯炯雙瞳明青衫試拂拭磈磊難自平平生疾惡腸為爾芒角生我聞乾剛甲五材煆成玉龍復以首利庶物稱佩非其人尚不可况乃用之髙庳而無經君不見趙文失所好日夜徒優曼胡纓朱雲妄其請折檻反取訕訐名劒之於人無適莫用之得術如雷霆又不見周公管蔡舉謗息四國寧聖師兩觀誅正大貫日星遂令千載下妖腰亂領寒於氷引杯感古我自惜儒冠突鬚嗟無成之子凬雲士慕藺如長卿飄飄四方志早以文章鳴君與劒無久蟠決雲會看升青天黃金錯環蒼玉佩攬環結佩天王前殷勤祝子無多言不誅巳然誅未然雜言喻為彥政失子作堂上慈親頭白絲慰心賴有寧馨兒巉巉頭角日方露誰揮如意擊碎珊瑚枝不知與奪果何主變滅歙歘無旬時驪龍失頷珠海窟黯慘鬚眉垂老鶴憶别雛淚眼呌斷秋天低彼蒼坱圠於我本無有何事誕説立象為爐錘陽春豔豔木自榮非春一一點化青紅姿秋凬瀟條羣木脫物感秋氣雕悴又匪行隂機乃知生死天地間花開花落殆似東風吹蜂房魚腹得至理子夏失視傷天彛西家因果蠱流俗東家聞之為朵頥蕃延踈薄無定分慰懷當取昌黎辭父子自天性東野能不悲君年正鼎盛情鍾感非冝况夫先子澤渾水清而漪吾友賢且孝舉案加有梁鴻妻捧檄為親屈晨昏歸來侍庭聞我聞善積有餘慶他日當有螽斯詩湧金遊并序豫回轡共山有客過而問曰湧金之逰樂乎曰樂矣不無詩乎曰無有也客曰事樂會之於心心樂寓之於口且蘭亭之勝至今尚為美談者其以有託於斯文也客退於是乎書長短勾以歌時孟夏十四日也曉雲拂山山氣昏坐耒万壑烘朝暾丹崖翠壁畫莫出但覺詩境供愁新地靈祠古祕幽怪天授神柄專其尊年年簘鼓祠下路東凬十里楊花春我耒愛此山水窟天氣著物清而溫湧金亭上一磐礴主人留髠醉金樽水邊滉漾多麗人往耒但看珠翠裙不知仙家足竒貨明珠脫串一一浮出摩尼真波間可玩不可掇雲錦翻動玻璃盆書生潤身那羡此席上正有吾家珍舉杯酌水但默禱山靈垂意哀王孫願分秀色貯詩腹一洗万斛胸中塵仙官有請固不拒山鬼竊笑君無因不然結茅傍修竹雲煙占斷西湖曲月明舒嘯碧山巔喚起公和跨黃鵠秦川行送張孝先北燕豪俠南州客去歲辭家今八月霜凬偃薄一貂裘不為無金少顔色平生弓劒只餘事滄海凬雲居上䇿今年棄繻復入關春光淡沱迎征鞍周侯磊落天下士櫜鞬賴子為周旋我知黃鵠志千里此舉橫絶青雲端長安西望白日近解鞍多在清明前新豐酒斗十千長樂坡頭楊栁煙曲江花滿樹春凬怨啼鵑對時感槩能不動鄊思丈夫有淚肯灑離别間驊騮得路足神駿我非繞朝愧乏黃金鞭君不見古人勳業貴少壯莫待拊髀悲流年東方碑帖歌謝子𥘉魯公筆法天下雄東方一贊其猶龍嗟豫愛之力莫致夢魂幾到平原東我雖不解書慕此忠義凬有唐天寶𥘉禍首營州奴羣凶一朝起氛祲連神都草四名郡凬靡隨盜區堂堂顔使君徇國思捐軀竟以七千衆不為胡塵汚乃知大節𥘉不以藝自殊胸中義氣蟠不盡往往翰墨攄其餘况兹遊藝君子責古人以字為心畫先生不知作何狀覩此寶墨事可測書學到君稱絶筆凛凛英名貫星日晉漢名書凡幾家奄奄為君皆敗北宜乎眉山公謂此能事畢出於右軍擴以大比並離堆當第一豢氏龍蟠古井波將軍虎卧南山石又如大人垂紳正笏廊廟上忠厚之氣了弗事緣飾嗟此至神物每為好事得君家父子賢向歆只今好古喧詞林幾年祕此分賜我拜嘉不翅千黃金君心若此真尚友我報愧無瓊與玖歌成大笑不自量擬與君名傳不朽墨竹歌為共嵓處士石盞公作吾生愛竹兼嗜石手不能書漫成癖億從林下七賢遊終日摩挲弄寒碧山河一自隔黃壚塵土填浙百憂集得君此畫忽灑然元氣淋漓障猶濕滿空月露下寒梢人去山隂鎖幽寂又如湘妃廟前風雨睛翠柚紛披山鬼泣幾竿迸出太古崖老節雪欺𥘉不惜表將一片歲寒心不與繁華競朝夕東欄牡丹鶴翎紅西沼芙蓉紺珠色歌鍾傾國樂芳年以色事人能幾日何如鴨江居士詩骨清而臞手種此君忘肉食不須柱杖敲人門万斛清凬破窗北月中看竹掃秋影妙得於心發之筆興耒落紙出意表擬學湖州滅形迹嗚呼湖州巳矣蕭郎逺今代名家淡遊客君不見李杜文章万丈光一日齊名偉髙適乞鴈歌呂東平江海客一鶚盤鷙空百老耒機械淡相忘雙鴈隨行聲格格階除得食藏頸眠惱不及鄰耳亂聒兩堆睛雪春不消暮映書窗生夜白終朝司警代黃耳夢破煙泣秋拍拍主人對之心愈間感念物情終桎梏家中又厭食蟻蟲一夕籠歸山下澤今春邜捕衆雛息百日已能過所出青山滿眼映一群泛浦眠沙白勝雲稻梁棲畝秋正美約我充庖潔口飱能鳴見害古所惜我心念之生懚仁勸君深藏饔子刀解縛歸耒餋雪毛右軍間適久無伴許贈一隻相與遨西溪秋水深幾篙江天漠漠秋凬髙歸飛不隔暮雲逺放爾縱觀心亦滔俯歌雙鴈行仰送孤鴻杳洞庭歸客渺無音万斛羈愁坐中老節旄零落瘴海煙冠蓋都門閙昏曉我欲因之附尺書西北煙塵靜如掃夏夜晨起理髮時目疾新愈居間早眠復旦起繞樹行吟殘月底鄰雞聲裏候東方曉色雖分氣清美雙瞳自為苦所纒兩鬢鬅鬙思旦理青絲髮散滿肩雲千梳未暇百梳勤餘邪細逐老節散風露氣入秋蓬根疏通百竅勝新沐一洗耳目清而暾朝有蠅子暮有蚊事隨日出更紛紜侵晨有此至良劑肯羡卯碗松醪春詩成因謝草堂客嵇康養生非妄論衡門行送陳長卿衡門棲遲樂吾樂甘著輩流譏束閣長河其奈不療飢誰暇物情論厚薄前時行臺領漕計處士半為糊口起長年巨鼠有餘壤比比吾儕廢生理嗟哉陳君何苦節天東遊子天西客監河執去餘蘖在客舍半椽淇水測書生辛苦學干祿入手青衫得藜藿塵埃風雨蹇驢瘦日就空倉自羈縛今年幸得解由了超海挾山𥘉不惡暮春之𥘉日東作陳君叩門聲剝啄向豫長跪話逺行上計又須趨薊朔携書五車煮不堪舉室舟行更瀟索前因未必是亨衢著腳如堪戒前錯若於金粟例言拙誰著裴劉供調度逢時正有利不利有命豈論賢不屑長歌西北酒一杯浮雲漸逺天寥廓東曹若見王春官道我行藏事如昨幾年奔走一墮甑蕙帳歸來慚怨鶴濟時幸有公等在擬把一竿尋釣壑因君悟我向來非相送出門還一噱大雹行至元四年五月十五日也雷師掠地西山麓北會豐隆出蒼峪崩雲掩落赤日烏烈缺光騰燭龍目黑風駕海天外立万騎先聲振林谷雲濤怒捲惡雨耒中雜冰丸幾千斛殺聲咆哮屋碎瓦百万神兵自天下奮然橫擊合陳來昆陽之戰何雄哉又如馬陵之道万弩發矢下雨如無魏甲斧形雞卵見自昔異狀竒模此其匹野人庭户變綃館霧湧煙霾與龍敵又疑蛟人泉客泣相别淚灑珠璣恣狼藉葉穿鳥死庭樹慘禾麥擊平驚赭赤神威收斂俄寂然瀟瀟合浦還珠玭整冠變色立前廡但見土窩萬杵一一皆深圎五行有占非小變調元失所誰之愆又聞夏冬愆伏之所致亦以坎治持化元孔子修春秋二百四十二載間特書雨雹凡兩次大率貶黜臣下侵君權况今朱明壯陽月胡為縱此群慝之所顓歷關上訴九虎怒蟣虱小臣非所言獨憐田家𬒳災者寒耕熱耘手足成胝胼差科大命寄一麥眄眄見熟療飢涎一新到口不得食哀哉何以卒歲年捕魚歌塢西溪水深及篙漁户曉集拖輕舠縱橫張網截兩涘挺義逺混驚銀魛栁隂潛涔深且密大魚小魚爭遁逃須臾合網環深碧薄摻提綱從掇拾小魚骨罣半死生口頰噞喁無足惜就中一魚匪常材黃金作鱗尾砂赤泳遊本在孟津居波蕩江湖事行役中塗遇厄夢不神騰躍舟中有時立漁郎回艇催歸急幾處金盤待鮮食夕陽淡淡洲渚空回凬瀟颯溪神泣網罟設兮水不深役物而君戒貪得古人數罟不入池以時漁捕須盈尺今人古道棄如泥竭澤焚丘意方畢野人有樂在濠梁澤畔行吟三嘆息宿仙山朝元觀題示太行北走開四門川原落落凬煙屯仙山西峙如虎踞石嶺東抱猶龍奔道林中蟠百餘畒顧揖殿寢何雄尊仙翁得仙事惝慌碧霞洞主玄元孫百年朝元去不返寶籙祕泄風雷燉隂靈訶護石壇古老雨留漬蒼苔痕緬懷矯矯東􅌡老變化能大天溟鯤謝公本是濟時具誰使卧老東山墩豐碑不愧蔡雍筆再拜遺像儼以溫我耒夏交樹隂翳万橘翠瑣芬蘭蓀平生素有林壑癖苦厭圜圚埃霾昏每耒福地愛瀟爽跬步乃與仙凡分山川景氣得人勝喜對羽客開清樽夜深靜卧月東出林影布地翻瑶琨天風吹空万籟息明星當上手可捫恍然人境兩竒絶月露一洗清心魂世間塵土幾千丈有夢不到瑶臺垠人生幾何胡不樂例自局束駒服轅惜哉清景不可駐一聲啼鳺開林煙明朝人事隨日出坐看蟻穴蜂衙喧鴈門公子行贈李仲明万戶鴈門山髙幾千仞凬土雄尊號全晉君侯年少出紈袴喪馬輕肥冠時雋古耒豪傑數幽并栁子不須誇晉問蹇豫三年東魯客塵滿青衫鬢雙白書生無䇿伴侯鯖尺蠖泥蟠甘退縮此時同君幕中遊袖手旁觀看超越絛籠脫落不受羈意表出竒人叵測健於豪鶻快一擊霜翮盤雲鷙空百愛君肝膽向人開遇事剖析無留材世人荆棘塞靈府米事挂眼生嫌猜丈夫所貴氣為主行義不虧誠可取區區心計米鹽間束縛真為抱官虜相期心事李西平錦鞬家世蜚英聲天其藉此作事業未害蹉跎魯客卿眼中人物真知巳舉世論交多逐勢贈君一片百年心意氣相傾岱如礪羡君才氣真英耳鬱鬱安能久于此煙華紫禁正縈繞臺閣群卿半鄉梓明年熖熖動北方騰踏風雲乃吾子贈田生赴監河之召田生操履凌髙節三載奔馳秦隴月長年愈覺世事艱中道毀車思逺業故人戀戀監河侯願分斗水相為留古人有志患不立抱關擊柝非所羞君不見黃河三尺鯉凬濤終化禹門秋贈孟祝史德卿還燕城孟侯落落明時佐從祀歸耒喜相過探囊擲下珊瑚鉤海嶽英靈驚甑墮淋漓元氣星斗光照徹龍淵得竒貨我𥘉把玩三歎息不覺秋凬吹屋破太乙真仙令綺季入奏竹宫瞻紫氣受釐宣室想所陳不獨碧雞金馬異朝家望望董賈賢祝史孟君今偉器明年豔豔動北方館閣凬生驚一世因之啓賀廉行臺為國得賢真宰惠題韓幹畫馬圖韓御史君美所藏索賦火輪凝空汗如洗老坐烏臺簿書裏韓君忽出天馬圖瀟颯朔凬生駿尾吁嗟此馬耒西極細看一骨千金直當時開元監牧盛赤岸千群雲錦織奚官𫀆帶蒼髯戟碧眼深藏九方識豈其此骨獨當御轉盻君恩仗前立幾年扈從東封還霜蹄蹴踏長楸間驪山武事厭不講剪刷日應供帝間鵉旗百里臨潼道華清宮殿春凬早黃金羈勒王華騣凶鬯匕遊幸君為玉環老幹時供奉屬車塵思入星精奪天巧興耒承詔貌真龍冀北驊騮歸一掃古人畫馬需神品骨相權竒氣深穩將軍曹霸幹所師万古丹青少陵引韓公得法固入室千丈光輝誰所凖自經題品雪堂仙韋偃龍眠徒滚滚嗟豫何者牛馬走開卷賦詩還自哂韓卿朝騎御史驄暮擊凡禽健秋隼更煩牢鎖玉麒麟隄備雷凬轟祕本梁秀才惠棖梁時在制中君家堂前棖兩株汝父當年手親植洞庭波子霜滿林摘惠晴窗慰幽寂夜堂張燈動春酌脫帽驚呼夢疇昔摩搓兩手三日香感舊懷人淚霑臆一雙照耀黃金苞露香冷落銀觥桃呼兒走問鄰墻酒早晚珍殊滴小槽三勒漿歌有序唐代宗大曆間幸太學以三勒漿賜諸生此後不復聞于世今光祿許公復以菴摩訶毗梨三者釀而成漿其光色曄曄如蒲萄桂醑味則溫馨甘滑渾涵妙理及薦御天顔喜甚謂非餘品可及遂時供內府不肖以霑瀝之餘發為歌詩于以見國朝德𬒳四表方物畢至之盛詩公愛君之心以湯液醪醴躋聖壽於無疆之休也金天一氣何竒特異品珍材表馨僡翠籠萬里入貢來赤佛堂西漢家邑異哉三勒見圖經秪解有靈能愈疾豈知用外藏妙理瓊醴蔗漿非所敵誰傳釀法自太古滿甕春雲元化濕就中至味真玄酒豁逹靈根三益友許公得法神所傳一醖天成漢重酎儀狄拊掌耆伯驚五百年來未之有芹香背炙固區區推以愛君忠且厚彤芝蓋影擁紅雲湯網初收在靈囿月華冷落露盤冰三咽芳溫挹天斗金壺瀲灔久承案不能餐我輩何功食天祿秋澗先生大全文集卷第六
