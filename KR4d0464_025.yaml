body:
  text: 七言絶句五年夏四月朔日即事朝衣絺綌暮綿裘氣運和天不自由吹損緑隂風不定晚來庭院似深秋贈周幹臣槐府潭潭吏隱周青衫騎馬亦風流入門休問生涯事讀罷離騷待菊秋題風雨廽舟圖江雨江煙萬里秋幾年汗漫事長遊憐君巳落風波裏只恐回舟不自由題王武子觀馬圗玉華吹散滿身雲掣電追風隱駿奔好尚秪誇毛骨異不思戎馬在東門題李伯時所畫開元御馬圗閲武驪山是近遊霜蹄蹴踏厭長楸料應扈從東封了一片雲煙赤岸秋題山堂會琴圖靜夜山堂萬籟沉抱琴來㵼古人心箇中真趣知誰會門外松風是賞音聖賢思治先琴事子賤為邦舜阜民莫訝松軒來會數要從心指起經綸寄潞尹侯伯祿分携不及都門别情話長懷五夜燈蘭省未妨虛儉幕郡人爭喜識黃丞太行絶頂潞州城竹馬兒童遠見迎聞説下車公事簡不勞衙鼓報新聲題李伯時畫支遁觀馬圖晉人大槩尚虗談外物遷移等徇貪千丈神光渠自有却將風駿馬中驂金城店麻葉翻風稻映畦道邊垂桞蔭橫溪一竿青斾誰家酒金店東頭野彴西金城懷古典午能延邂逅生柘弓銀研未志情較量成濟揮戈慘天道中還固未平絳陽道中山自南來兩翼開汾岡橫亘隔金臺伯宗驅傳無輕去聽取輿人論絳災絳州公𪠘即事終朝據桉訊纍囚日暗風凄動鬼幽草暗池荒人不見絳紗燈影看懸流河東池館絳園優才守豪王樂宴遊興不見斛王祠畔暮山稠挈鷺提鷗次第開碧圍丹障鎖重臺焦土却似汚宫為世哀樊守文章世已驚冨公遺愛水假借群蛙徹夜鳴鼓水西來竇北墉絳園形勝日增雄依稀奄盡接臺影猶在瑶翻碧瀲中水聲激激枕邊來卧看逼池碧鑑開三尺短碑樊記在苦無多意發雄猜莽望黃原勢玦天驚驂南走削孤巔東臺何限消沉意目送汾流落日邊讀絳陽園池記樊守文章未易窺艱深冝𬒳後人譏一言能盡興衰理愛煞當年李格非周孔文章載道輈定刪元自典謨留不知魁紀操觚意地絶天通孰與儔題斛津王廟壁玉璧威騰却日戈飛搖其尞伯升歌須知地下坡陀血氣壓南山翠不磨祝融堆廩表韓公神理雖冥正可通自愧不求來折獄亦蒙隂相誘愚衷過絳州北哺飢坂蓋晉趙宣子飯靈輒處也應有祠屋今廢釣采華名丗有人微勞髙擬泰山勳此心報德誠堪尚事了身名兩不聞血肉􅋙牙白晝寒挾輪來脫趙卿艱悠悠鶴蓋隂中子髙揖清風恐厚顔晉國平時有殍夫趙宣為政果何如哺飢坂下重回首一飯酬恩實豈豫題夏當務壁村落人家􅌨比稠平時分水細為籌朝來一雨郊原足門外長溝滿意流龍祠禱雨中岸烏紗角半摧馬蹄泥滑晚相催郡人莫訝麻衣濕適自龍祠禱雨廽禱雨龍祠訪張總判不遇因題其壁甲第分携半月餘逺廽相過得須臾松隂滿院溪流碧辜負臨風一捋鬚登白雲樓百日區區簿領間白雲樓閣幾慿欄秋來致有西山爽兩度還容拄笏看山沉雲髙暑退𥘉簟文如水葛衣疏邇來郡府無多事卧對西山把性書贈墨卿秦得真壯心零落羽林槍老劑玄圭入退藏為報鳯池池上客不應神品擅潘張麝團小印栁枝龍不減唐人入􅃮工留得玉堂揮翰日桂香欄檻聽松風聽一作泛秋望客窗十日雨聲中雲影朝來綻碧空不上西摟能幾日滿城黃葉動西風題子猷山隂圗閉門一雪天地白乘興即上山隂船愛煞此君真率意至今人境兩修然自嘲踏月聞雞出郡齋逐撾鼓放尚來盤盤三晉河山地兵賦民情使汝諧自壽二年岱頂冨竒觀今歲姑山對霧鬟笑拂巖華指歸路黃塵深處是人間待旦軒假寐而作待旦軒虛曙色分瓦爐煙暖有餘薰細思曰用無多事一靜能消萬有紛題永安刁氏别墅壁一川百頃數家村復嶺重岡擁澗垠樹藝自勤民自儉勸民冠蓋不須頻南崖刻畫似城闉北勢耕桑聚落勻所願廟堂論至理萬方風俗再還醇聚逺亭刁氏别墅壁間題示墨猶新聚逺軒中入幕賔還喜晉人風土舊一村名姓似朱陳英武王馬燧廟西平英氣凜如生千古旌忠勒御名過客賦詩增感激北風原上鼓􅎏聲奔鯨吹浪蕩蒲津堂上竒兵算已神老賊垂降還赴召比量先軫乃純臣汾睢懷古三首伸倪三面削蒼崖中擁汾睢寶氣開夾道老槐君莫訝虬枝曾拂漢旗來武皇誇大喜雄奇鼎出汾隂恐事為更著壽王相嫵媚守經深見漢儒卑東封泰岱西汾隂始自嬴劉好侈心只為一非無所格儘令方士出妖淫過聞喜縣有懷元鼎故事秦左邑桐鄉地窮兵無似漢皇雄六合為家意未充一喜政能留故事舞干終愧有虞風過太寧宫披雲臺晚野煙荒宫掖坊深半夕陽獨有太寧祠畔土碧花猶自學宫粧安邑道中匡墻煙火暮微茫樂歲人家半米粳漢至孝文才四葉便能三萬里農桑謁司馬溫公墓河山兩界夏西分孕秀鍾靈産異人可惜秉鈞才八月不教仁澤浸生民嗚條山逺聳孤墳千古嵩髙仰甫申有意誕彌無實用竟將新法遂諛臣遊棲嵓寺七絶上盡雲間十二盤一枉松下散襟顔老僧近晚堅留客爭指西南見華山河山形勝見栖嵓万壑秋聲度碧杉竒絶此遊還有恨杖藜不到冷雲菴翠嵓回抱欎蒼官絶境軒橫杳靄間老矣瑞峯寺僧名應健在護持長伴八龍間宇文周末年大禁釋教有曇延師者遁隱北山久之有樵叟日來聽經后師道成復有七人者來師問故曰余八人皆龍也其一已傳師教故余等亦來受戒一徑縈紆入杳冥望川亭逈夕陽明欲知眼界寬多少放出秦川似掌平層巖重倚尚斜陽山下風煙一漫蒼恨煞愛山王老子不來同宿贊公房暮煙遮斷嶽蓮青低壓河流一線明巳被山靈嫌俗駕更堪留榜彥倫名安然乘馬到煙蘿一笑山間對鳥窠詩旬滿前拈不得風煙還比石樓多得一作出鐘聲出谷尚依依穩送詩人帶瞑歸自笑野猿山鳥性夜深幽夢到嵓扉跋提刑王副使航海圖天險無踰海與江得人一葦即能航懸知恢廓髙宗志夢繞啇嵓夜月蒼鯨翻鼉作大江流舟楫顚危咽棹謳忽展畫圖還自悟當年風雨過封丘遊普救寺晚寺人歸憶會真夢雲花氣鎖窗春重簾不隔西廂月一點香來是襪塵讀破口先事迹釋氏功夫向上尋一身歸寂雪山隂片言能脫盈城命少似先公濟物心贈船蓬姚道人一龕塊坐巳忘身陸海船蓬别有春却為梨花枝上雪等間踏破緑苔茵臨晉道中野靈晴消滿道泥茫茫銀海際煙霏日斜信馬中條北愛煞山光照客衣春雪小雪霏微不滿空亂穿庭樹舞春風餘威似掣調元肘不與東皇擅化工曵龜圖馭説闌翻已自欺更堪身世兩相遺抱麟痛為東周泣爭遣宣尼不及時公堂午吏散一首吏散公庭日轉西蟻旋蜂閧靜無時人無定志堂居逺悄悄孤懷抵自知清明后一日作里巷春遊鬨鈿車午窗睡起日西斜間書讀罷焚香坐淡對一枝山杏花卧數窗櫺對日曛一簾晴影弄遊塵鄰墻幾片桃花雨點破苔階更可人懊惱春悰困宿酲偶隨遊子到溪亭多情幾行城南栁三度春風見汝青跋李提點和甫筠溪亭和甫開封人早年應神童碧鮮庭户玉琤琮影透踈簾翠幾重中有道人髙節在青青𥘉不易秋冬洗耳無煩近頴川虛心獨愛此君賢何時拄杖𫾣門去讀罷離騷聽夜泉題鄠縣簿雷損之景程齋詩卷道統幾微孰繼傳景程還得此君賢須知二帝三王事要似仁民愛物先理窟名言嫓典墳發源伊洛見經綸千年鄠杜遺風在更著雷卿繼後塵題田使者王泉垂釣圖渭畋應未兆非熊底是胸蟠萬丈虹辦與澄湖三百頃一絲斜裊緑楊風挽平陽教授崔君度心醉群經四十年老成身後見波瀾蒼􅋽一片姑山月空照先生首蓿盤孟浩然灞橋圖金鑾消息逺相招雪滿吟鞍過灞橋處士本無經世志強將詩句枉清朝髙鳯漂麥圖疾雷破柱雨翻盆甑墮何煩顧惜頻儻為把書都不省先生應是太癡人跋蘇武持節圗使華往返見交兵老我何嘗繫重輕巳分橫身膏草野茂陵松柏夢秋聲君臣義合以忠持十九年間節可知邂逅論詩幾侮玩區區才得典諸夷兩行衰淚血霑襟一節酬恩北海深衛律有知慚即死更來遊説此何心慶趙汲古八秩之壽效樂天體人生八十今極壽况復兒孫滿眼前汲古園中趙夫子燕京城裏地行仙摩挲金狄門前客精健耆英會裏人坐對天津橋畔月池塘春草幾回新崇慶𥘉年縈組綬至元八載享康寧人間八秩風流事無似君家種德馨至元辛未歲八月十二日拉馬都事才卿遊韓氏南莊歸效樂天體得詩十絶皆書目前所見覺信手拈來也開門不問主人無幽鳥飛來應竹呼僮僕也知賓客敬與奴白飯馬青芻吟鞭踏破緑苔階自挂幽軒數菊栽半日杖藜橫膝坐絶勝前日醉歌來浮雲冠蓋六街塵老盡朱顔白髮新嬴得身心兩間在水邊林下果何人滿庭竹影鎖秋煙倒盡池蓮細菊斑墻外緑畦澆巳影桔橰間淡忘機山鳥山花笑我癡萬事看來皆偶間休遣丗人知臺涼吹晚留連樹繞岡回自一川野菽未霜溪栁煙光輝是早秋天園松菊餘秋色趙氏林亭滿夕霏人自晚年便靜每來吟賞便忘歸雲煙樹事幽尋指點平蕪起醉吟但使眼前無俗一杯時與野人斟墨淋漓字半斜枉將霜壁亂雲遮一杯先洗黃泥似我間情逺丗譁蛙鳴水底強為聲酒盡沙頭卧玉瓶我自近來無不是白雲舒卷暮山青裴晉公緑野探梅圖息軒茟淮西平一兩河清緑野梅花照眼明霜鬢未容間裏老南枝消息要和羮當年韓白兩辭人吟賞天教在相門邂逅有詩窮勝事最憐踈影月黃昏東臯八詠為趙參謀題匏瓜亭君家匏瓜盡樽彛金王雖良適用齊為報主人多釀酒葫蘆從此大家題李齋人生知足一瓢多未老得間非幸何堪笑矯情揚子幼嗚嗚空縱醉時歌東臯村陽春門外望東臯三載相邀醉濁醪早晚洄溪溪上路桃花紅雨滿漁舠耘軒草盛苗稀苦見侵荷鋤歸晚月生林須知種豆南山意雄有淵明識此心遐觀臺自説無堪不出村一杯藜藿樂間身就中不負登臨興滿眼青山是故人清斯池塵冠挂後無纓濯漁父從歌濁與清待與田家占水旱年年池上耵蛙聲流憩園養素丘園趣已成斜陽林影看春耕手中三尺枯藤杖不羡人間六印榮歸雲臺從龍致雨固油然巖壑歸飛意本間况是東臯巳霑足不妨來伴宿簷間夢中又賦開元御馬圖毛龍天降馭龍韜歷塊過都乃爾曹安得錦韉三萬騎冷浮秋水下江臯豫寓舍前有所謂水官珠者客曰此即意苡也因呼兒採實作詩以識之堂前薏苡因人悟不處嫌疑信至言豈獨菲妻成貝錦令人還憶伏波冤讀開元雜事水殿涼多暑氣微薰風華蕚正相輝爭教明月梨花院玉笛聲長到枕幃興慶宫池景氣深薰然四海友于心讓皇篤愛情尤切力為君王辨八音海棠紅綴棣華零樂裏西涼巳變聲㧾把大衾長枕夢老天移魄入華清歸志來圖長沙勳業武侯忠劉宋規摹操懿雄虐熖儘烘寰宇裂五株楊栁自春風彭澤遺黎不幸何斜川魚鳥共婆娑先生踐迹髙千古不似終南捷徑多解紱歸來百日強東籬松菊未全荒細觀歷贊髙賢傳一出頭來恨已長煮茶枯腸拍塞貯春雲洗盡囂煩六府昏山木䇿勳存夜氣大河流潤下崑崙胸中宿酒閧殘兵一碗澆來陳敵平濛頂淂仙疑妄語月波千丈與詩清瀟瀟風雪薄虛窗細貯搶旗煮夜缸若論廓清真武事一天幽思為詩降四皓圖羽翼橫飛四皓鴻楚歌悲絶趙王宫髙皇英睿啇顔節俱墮留侯計畫中萬古規摹一漢皇保全母后捨僝王啇山邂逅招園綺出自留侯畏吕強題楊息軒盤谷圖石峪盤盤百畒蒿野煙秋色淡林臯雄文一出潮陽筆頓覺山人索價髙關山秋霽圖望京樓上晚憑欄長記居庸八月還一段紫煙吟不盡枉分秋色與南山生平懷霽是𥘉心捲盡江山萬里隂十載夕佳亭上客卷中還對玉千岑寧戚叩角圖舜授堯傳老不逢啇歌愁絶國門東小哉恨煞夷吾器竟列齊桓五霸中五王避暑圖翠幄留香郁棣華紅雲縈暖鶺鴒沙豆萁不免陳思嘆朱李寒泉是浪誇蓮鳥窺魚圖觜距𥘉非搏擊流翠香深處樂清幽遊魚何限相吞噬秪得臨風一瞪休門帖子廪食京華兩見春全家飽暖荷深恩自慚輔報應無地夢到青蒲白獸尊題袁安卧雪圖曲突無煙雪擁關引書髙卧自怡顔須知四世三公業不在人情冷暖間突不煙黔雪擁扉一編犧易療朝飢火城莫漢沙堤相論士當觀未遇時窮巷無人與叩關長安風雪一家寒挺然不為飢驅去肯逐時人作熱官題顯宗承華殿墨戲大青小青兩龍種承華墨戲真天人春思欲見升平事立仗歸來不動塵題東海徐白魚點額雷燒不到渠相忘何必在江湖細吹藻荇充飢了兩頷腥涎儘自濡酹祭宋先生子缶六首山立楊休七十春間中今古醉中真傷心麗澤堂前月空照先生漉酒巾一代波瀾獨老成百年人物見耆英茂陵身後多遺藁一賦梅花到廣平我識空澄海印心生平遊戲在禪林寶珠儘照青藜杖雅韻先空緑綺琴玉堂仙去渺翩翩冷落梅花樹下禪疇昔過庭言在耳炷香傾酒大蘇前水映林亭竹映山四時風景樂天間一從零落丘山夢頓覺風光向客慳酒榼詩筒白玉珂春風到處是行窩百年愛仰都人士哀比羊曇淚更多跋龍陽枌隱圖學窮象數别穿深又向龍陽得洗心前日小山叢桂客不煩春草賦歸吟承華殿墨戲圖天廄雲屯八尺龍總輸神駿付青宫細看絶電流雲筆天寶諸王恐未工主人愛馬憐神駿一骨千金十襲藏却恐雷霆還下取九重天上看龍􅋮感寓逢人驚問但慚然自信文淵老益堅來坐癡牀一千日恰如無事草鞋禈至元七年十月草二日過順州與梁御史話金節侯剛忠王公子明死節事馬上為賦此詩以吊州舊治唐歸順州見大曆五年試太子洗馬鄭宣力所撰開元寺碑雉堞蜿蜒隱塊城剛忠於此殁天兵千年英氣如生在草木風前動戰聲題趙仲器銅芝蟾瓶滴坡陀金背兩眉蘇不屬官池與研居老筆䇿勳餘潤在一生何啻五車書足迹蹣跚几研間太隂何苦汝為餐寸腸不磔盧同鐡更吐隂寒上筆端題張夢卿雙清圗月影氷魂奪化工捋須真是不煩公漫山正有間桃李爛熳春風幾日紅花光品格黃華筆一段風流付後人誰為九衢塵坌底兩枝搖蕩浙江春淡粧踈影兩依依點綴橫斜畫揔冝恰似孤山籬落畔小溪如練月如眉王右丞􅡞川圖騷詠禪談意未央欹湖煙月墮微茫園林鍾鼓清時樂好箇裴公緑野堂狀物何如及物功開元真宰説姚崇未妨僦屋招提裏斗米三錢四海同凝碧池邊野鹿過空垂雙泣賦悲歌論忠不到平原列馳譽丹青未足多文彩風流映一時丹青三昧有餘師戲將萬斛欹湖水寫盡南山五字詩遷張氏新居四首我自三遷到巽隅市朝雖近似郊居東鄰有竇西鄰許不羡門多長者車院靜窗虛淑景間戎葵凝笑海榴丹莫令兒輩輕傷折為與渠儂理一般聽雪思堂與筆耕主人寓意強為名錙銖得及斯民了日出何妨事又生羞將勳業鏡中看不為無魚動劎彈兩鬢捴隨霜簡白寸心虛傍日華丹題秋江月夜摘阮圖玄璧朱絃激烈聞縱橫詞舌得儀秦忘言何似陶元亮直作羲皇向上人易水悲風動急彈小絃鏗爾摘銅丸多應一片松梢月併入茅亭作夜寒闕下元日口號五首筍班春仗簇初齊贄馬行牽望拜時臘雪未消雙鳯瓦春風先到萬年枝平明瑞雪滿蓬萊島樹瓊花次地開人在建章馳道外四邊鞍馬唱歌來建章宫樹玉嶙峋雲近蓬萊氣自春帳殿忽開齊舞蹈紫衣獨見海東人春前移仗島東邊大禮稱觴最重年何幸小臣陪虎拜一杯春露共瞻天干官錫宴瞻天喜萬里休兵立仗間擬效堯封三獻祝太平天子壽南山魏豹故城兵涉西河豹出迎亡姬還作漢儀程事機倚伏真相戲一笑長驅過故城題解梁廨壁立壠依俙井幹殘人家煙火甫兵還就中不負官曹眼簿領當前坐看山再過絳陽二年三度過金臺盛暑祁寒不憚懷卧聽水聲何所憶一軒秋兩竹間來夜宿李氏林館困眠欹枕未容休睡起關心事最幽鶗鴂一聲窗色曙月明滿地緑隂稠禹廟大地河山繡錯明野煙孤廟枕荒城杜鵑饒舌知何事血灑東風怨未平路村道中􅐭澤條山動寵光天書來坼紫泥香老癃扶杖欣相告五十年來未省嘗解州廳壁題示至元癸酉夏五月二十三日奉宣明詔至於解梁因得王黃州壁間所題解池詩序云盬池之大自唐以來凡臨􅊩者無一辭以紀勝槩觀覽之際憤然成章或繼之者實自豫始僕竊有所感焉因勉成三詩以附驥尾之末庶幾因公而使天下知有惲云偕來者府兵曹解槇子公孺侍行承直郎平陽總判汲郡王惲題物色分留付後人暗將風雅欲誰親琨珠在側知形穢尚友何妨繼後塵日融池面爛生紅更著南山障碧空一夜髙臺汗如洗州人説是廣南風解梁城下解鹽池萬寶騰光奪日輝我欲大觀窮化窟乳泉一賦了天機題平正縣鋪樓壁盤盤峻嶺上青山兩度南來點鋪翻義手老兵前致語此回霜鬢又加繁秋澗先生大全文集卷苐二十五
