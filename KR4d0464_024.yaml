  text: 秋澗先生大全文集卷第二十四
  hash: sha256:d70488da41f6076d9672c6f21dc5e1d172845b21a6101e9d008d90d46052c972
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_024-1a}
body:
  text: 七言絶句寄張孝先愛而不見我心勞好在天池刷羽毛一曲紫簫風露冷黒山無際月明髙寄贈王嘉父十日休閑一到衙冷官滋味賈長沙醉歸多趂湖南月馬上披香直到家送王子冕天壇行香山川望秩走星軺藩府懐賢夣想勞不爲碧雞金馬異漢家優禮起王褒蕭徴君哀詞東瀛先生有道之士也予以里閈故獲展覆綦之拜盖十有一年矣今茲云亡謹摭其見聞之實作追懐詩六首姑逹乎感慨云耳圯上求書約重過豈期遐想仰山河適来適去公常事親見先生曵杖歌含悲空炷影前香風𬒮泠然返帝郷鶴馭不来塵丗隔芙蓉城闕月茫茫李白長鯨汗漫期秋山魂汵未来歸傷心執紼西州路何止羊曇淚滿衣鬱欎佳城晝不開玉霄東望靄蓬萊空懷華表城頭柱㑹有它年化鶴来萬事生平委自然竹風松月共清圎衣塵才拂朝元去忍向人間乆棄捐樓觀才成人巳非身前毫髪恨無遺空餘讀易壇邉竹露葉青青若涙垂比干廟玉骨琅琅盡古丘凛然英氣尚横秋朱㳺訕訐何為者敢辱先生地下遊雪夜暮雪紛紛亂撲牕牀頭無酒只空缸壮懐俱與爐灰冷惟有詩魔苦未降旋呵凍茟吟氷柱急掃風花煑夜茶客去焚香閉門坐小齋𥘉不羡山家八月十四夜與雷彦正歩月秋聲入户夜䖝多辜負金樽漾月波燭暗香殘人欲去滿庭風露影婆娑卓水鏡中流水畫中山酒盡銀瓶興未闌碧玉沼深人不見桞花飛度翠琅玕夜過滑州黒矟軍聲動地来魏人宵濟宋師廽而今一綂無南北月下揺鞭過滑臺跋龍眠二駿圖玉塞沙平苜蓿繁渥洼春水泛晴闌㡬時扈從長楊獵一片紅雲拂繡鞍漢家天子狩隂山萬馬慿凌汗血殷早晚華陽春草地兟兟得似盡圖間羙人却扇圖寳檻承恩妬露華背金翻日羡宫鴉幽閒好備関雎徳望絶羊車失自誇絶代佳人擬罕儔幽閒無夣到河鳩春風静瑣昭陽院落盡庭花轉自愁游瓊華島中綂元年作鳥語山容喜客来耿純襟𫀆若爲開六龍冷駐隂山雪暫擬層巔作望䑓美蓉水殿紫岩松六月雲蒸此雪宫樂部不聞清夜曲舜絃聲裏詠南風蓬莱雲氣海中央薰徹瓊華露影香一炬忽收天上去謾從焦土說阿房五雲仙島戴靈鰲老盡瓊華到野蒿惆悵津陽門外去春風飄亂酒旗髙大定明昌五十年論功當出漢唐前儘消一島承清讌且置堯階頌采椽蹋盡寒雲㝡上層土花春碧夣觚稜江山如畫人空老更倚殘陽望道陵玉樹歌聲繞北虚朔風吹恨入南都六鰲不戴三山去留與都人泣鼎湖光㤗門東日月躔五雲仙仗記當年不煩細讀江南賦老樹遺䑓倍黯然杜莘老荒山訪友圖隆中人有鹿門期梁甫吟餘獨杖藜殆似老龐歸向晚釣舩猶艤暮江西秋懐効樂天體閑書遮眼睡昏昏食飽無茶腹自捫斜日倚門風乍𧺫滿庭黄葉擁籬根早起星河黯淡湛玄雲露下庭柯落葉紛夜氣逺從天際歛秋聲時向樹頭聞冬日與吕丈讀毛詩廿二首婦道防閑貴有𥘉文姜失御從雲如何殊笱敝梁空在秋水誠多得計魚敝笱服御鮮明擬大君轔轔轂擊汶陽春載驅既匪勤王事隱悪能無播萬民載驅濟濟威儀美且都詩人流詠入嗟吁齊家爲失防閑禮禦亂無多金僕姑猗嗟爲國規模以徳將恬然風俗入安疆新婚服襋旣非禮葛屨凌霜尤失常葛屨汾水悠悠宛一方條桑采藚僕夫當誰知粲粲軞車子終日頃筐泪洳傍汾沮洳得民方可固邦基此道幽深莫我知却憶賔庭陳百旅棘桃猶足備多儀園有桃地狹民稠十畒間來歸來逝共閑閑何當一復周家制各守封疆絶徃還十畒之間邦畿蹙近四鄰侵行役無時怨抑深陟岵遐瞻利自慰倚門應甚望雲心陟岵不畋安得獸懸門匪稼胡爲禾積囷但恃鄙貪居禄位不能無愧伐檀人伐檀碩䑕歌詩怨巳成三年貫汝未聊生熈熈彼土雖云樂猶抱遲遲去國情碩䑕皂綈示約人從化玉樹歌淫國旋空蟋蟀戒深垂萬出由来奢倹貴乎中蟋蟀隰原尚頼樞榆䕃人主憂勤貴一身堪鄙晋昭徒自苦只将鍾鼓樂他人山有樞𥻘𥻘白石水揚揚宗國由来日盛強木末儻從師服諌争交竊國似田常揚之水沃土分封自晋昭子孫蕃衍喻園椒大夫休起盈升歎宗本顛披爾逺條椒聊束楚綢繆仰見星時危婚嫁禮難成却思王季興岐日内外俱無怨曠情綢繆骨肉凋零失所親徒行踽踽一身存不如杖杜春前樹枝葉猶能庇夲根枤杜服御羔裘豹飾袪國人不恤反居居豈無它所携持去恩好猶懐未忍踈羔裘孝飬庭闈士乃常反教執役事戎行悠悠仰面蒼天渺失所何殊鴇在桒鴇羽晋囯流風屬変移武公反正思依依誰知問鼎傷肩際肯獨尊三請命衣舞衣道左團團枤杜春清隂猶得庇行人國彊湏頼群賢輔孤特何爲任一身有枤之杜蘝生蔓野葛蒙枝女子從人得所依衾枕未温征役逺庶㡬百歲願仝歸葛生晋献聴䜛似采苓竟從微隱殺申生後王采察能明逺譖愬雖多自不行采苓梁園對月児時曽住汴梁城二十年来重此行一片鳯凰池上月向人還似舊時明過蕩隂東周留村一湾流水麥青青楊柳隂中野彴横幾樹桃花如舊識隔溪無語咲相迎喜蕭茂先得雄未聴啼聲骨已竒桂林安取野棠枝老髯嗜學𥘉心在剰備箱書付阿冝滿帋新詩羡寕馨慰心尤喜老来情壽児此去如春筍玉節亭亭脫錦䙀夏夜野雲明䖏電飛光海牽青浮落日黄想得近山多雨過滿庭風竹月波涼夣中賦月燈詩風外筠竿倚暮烟忽驚群日帝堯年天公两眼何甞暗底用分光照一偏遊㤗山雜詩肧融萬化群龍首丘垤諸山五嶽宗茂陵誕荒誇後丗岱神何意望東封祖龍東廵擅雄豪天門風雨㡬遁逃虞帝不來天自老秦碑空倚禪壇髙衆山迤邐朝西東帝孫突出天之中巨靈不劈蒼崖㫁雖有絶頂誰能通何年氣母此融結大小天門五十盤三峰自是神明觀漠漠隂風走石壇岱宗巖岩靈氣宅雲烟物外争新竒丗事難必有如此吾欲人海從安期綰茁元氣通滄海霧湧雲蒸一水山五十連城望霖雨少分餘潤到人間萬壑瓊林映碧崖雲間三頂欎霄䑓摩挲御帳殘松樹曽見秦皇漢武来路從御帳北艱屯松頂雲癡日脚昏上盡曲盤十八折缷看猶自有天門盪胷滃欎隂雲生行岀天門路漸平脚力有餘中頂近徘徊應爲紀山銘朝􅚐爛爛烘層巔天門直下屯蒼烟乹坤故爲作開闔丗界幻入兠羅天何限詩人不充登枎黎直到最髙層壁間速即留題去雲起封中冷不勝東山何髙四十里萬古通天只一門不知洞府深幾許宿雲無數儘䧺吞䧺觀駭絶東溟日逸駕髙於北海鵬更着山靈出竒貨千岩蒼雪玉稜層雪林􅍑跡過新蹄石蹬雲霾歩歩低多謝山靈相擁護一柸無事到中溪中溪神祠名在山門口贈相者李吉甫仙機分自洞中春閱盡長安市上人留取神光牛背上要渠着眼過天津跋豐稔還郷圖廟堂真宰拜姚崇斗米三錢四海同今日太平應有象盡家消息恐難工過邯郸層䑓髙與暮雲齊全趙河山入望低貪和野花雙塔句夕陽又下故城西我自驅車下九門眼中㐮國動吟魂從教两鬢渾如雪猶喜歸来故歩存黄粮夣短不湏驚滿馬紅塵過趙城獨上荒臺重惆悵野烟無處認温明題雪谷早行圖頭痛風炎萬里程行人何限把雙旌犯寒休訝征車早冷嶺東邉是帝城新店看山望京樓喜入関南百里川朔風邊雪頓醒然夕陽欲下蒼烟起看盡西南破墨山秋雨靖山道中一重一掩吾肺腑老雨荒山記北還人在碧烟深澗底仰看元氣湧雲間酌百泉水去時蘭佩惹春烟歸日羸驂跨敗韉頼有百門山下水療飢猶可度終年偶書郝卿持節使江臯子勉翺翔主御曺我幸閉門無一事醉餐秋菊讀離騷跋司馬温公燕處圖獨樂園深百草香一編心與道相忘不妨卧老琴書裏破散青苗有報章道與睛雲任卷舒心存廊廟跡江湖石君被遣公孫死慚愧先生燕處圖擁馬留公作帝箴人心大祗是天心恵卿未死舒王在一集傳家了古今壬戌歲除夜坐乆虗䆫夜氣澄未容心事淡於氷滿襟忠血傷時涙一點清光教子燈春風萬里圖人間塵土曰紛拏流水空山半落花自是道心㳺物外不湏誇誕說流沙蓮社圖二首人間廬阜東南勝两晋名流㝡賞音阿麟因之出新意秋香和月冩東林鬢絲禪榻喜相同詩在秋季千古風流社中客不随江月照還空跋蒼江待渡圗朝醉新篘暮錦鱗一篙獨占且休熟睡秋蓬厎無限津頭望濟人隆中髙卧耻為邦雪裏呼舡渡晚江耆舊幾人堪晤語徑湏持訪鹿門龐贈别王晋卿漢署千官列鴈行九天獨𬒳繡衣光布衣自咲題詩客空抱澄清望八荒青鎻仙郎𬒳服新寵光千丈爛盈門何時得侍紅雲表竭節同酬一命恩劔履翩翩趣北歸秋衾日夜夣彤闈長楊輦路都門柳恰及飛花點繡衣挽蘭同知進之留心藥籠縁多病歴仕鄰藩便暮年廽首西州門外道偃然長寢两相捐行年六十不爲夭貳政三州有足稱伯道有兒終抱恨夜窓無及讀書灯一丘黄土清溪曲三尺蒼髯六十身千古桐鄉遺愛在只湏秋草卧麒麟得調澶淵㡬載考自營墓穴巳三年幾廽對客親曽說埋近清溪性所便翩翩老騎赴征車前日東城别路隅酒榼素筝今寂寞河山依舊繞黄壚戊辰後正月七日雪北風一雪麦田空坑谷堆平滿棘叢近日化工無棄物揔将春澤到蒿蓬戊辰門帖子安分愛尋蕭逺論廣騷慵讀楚臣辞里人莫訝三冬蟄一寸丹心用有時送劉主簿文逺赴都仕途坦坦駕䡖車殆似劉君赴部除不枉洛南温處士半生清苦待徴書終南捷徑霾荒靄吏部銓衡到至公相過不湏論岀處季鷹門巷幾秋風除官限自三年例計月須慿一考優聞說聖皇思治切夣賢無夜不岩幽貢璧輸琛買喣濡萬言不博一除書秋風两戒河山底自把鋤犂計未踈求官自古近長安格法如應事不難說與磻溪谿上叟且湏寕耐把漁竿題薛微之遺安堂静思冨貴履危機醉着人心死不知愛煞遺安堂上客此心還與鹿門期清樾蘭臯百畞隂两椽精舎倚雲深一鞭春事東風裏劉表何人識此心因題前詩偶書山林長徃廟堂居一襲時衣飯两盂温飽較來均一槩忍㝷機穽博頭顱挽趙教授公净目撃冠裳一老儒争教蒼海失遺珠細思晚起山齋語地下脩文事本無淵源分派太中君偶讀殘碑得古文河潤秪能霑再丗不湏囬首愴蒿莙儒林游戯入禪関晚節浮沉里社間異日衞人徵故事為公扳例取香山辛苦生平篆刻勞也霑汀草乱春𫀆有児不肄中郎業却是先生一着髙是是非非到盖棺誤身無佀戴儒冠蒼凉一片共山月照徹先生苜蓿盤生理蕭條柰老何春風着處是行窩哀歌偶及生存事却恐羊曇淚更多因著圖經大起予發揚潜徳到幽墟案頭幾卷遺編在愛惜過於汲塚書時予作汲郡志乃類集蘇門事迹一編甚詳番見贈故云跋申逹夫藍采和扇頭一踏髙歌了丗縁春風两䄂地行仙無端忙煞癡児軰貫朽都来有幾錢謁梁太師王彦章祠太師祠廟汶城西塚上纍纍日漸低唯有英聲消不得至今髙與㤗山齊雨後溪田即事朝来一雨曙光微髙樹凉多露未晞喜約老農来看稼不辞霑濕芰荷衣清寒墟落漲秋濤溪上行吟樂已陶洞口未容烟鎖断更湏時上武陵舠平明新漲復溪痕曉月榣光映棘門騷客不愁漁箔短縱教魚鼈長児孫三年耕飬一經通水旱豐凶更在中貢法不来神聽逺此生窮逹仰天公種樹書殘倚釣竿日長微暑喜清寒草堂去水無多地隻足時来踏碧瀾録役者語十人供役二三逥困似車輪半道摧眼底去留生死隔争如先作陌頭灰土戦何年是了期為王城此不知疲一門親削宣尼茟為國勞民貴有時一夫詛祭九魂知護我南行爾亦歸惆悵桑乹河畔月至今寒影慘無輝或云河南役夫既罷歸九者皆殁其一負衆骨而西渡瀘溝因祭而祝曰令汝等俱没我幸獨全抱汝骨以歸汝等有靈當佑我使與汝父母妻子行相見也其人前次范陽亦病死工無役鬼必勤民萬雉㓛成歲月因從古有庸三日止未聞膏血化灰塵今春疫氣是天烖百日為期力儘能三尺席菴連夜雨杵聲才歇哭聲来火中渙汗土中蘇却被車轟殞半途六月炎風一千里大河南北看巢居病骸困苦自知休叮嘱同行瘞故丘父兄秪知安健在計程今日過瀘溝父来接子值同徒欲話渠儂涕泗俱昨日道邊因困卧不知今日有還無病軀甫差湏扶護趂伴貪程日夜奔太半殠遺多為此故鄉歸去有殘魂蕩蕩王城玉削裁青山三面壮圖開興功計産能中止狼籍春風一露䑓數口爲家尚聚廬一王經野古良圖限期百日非為遠部役群宫事大劬觀風浪中囬舟風蕩輕舟一葉廽望中掀舞碧濤堆舟人若觧臨觀恐迂緩甘從逺道来清溪晚眺洲渚横陳水退餘两竹風栁映菰蒲暝烟誰踏扁舟去望際漁灯一點孤題陳德秀東䑓手卷井落星纒一炬殘市門留入畫圖看秪應千載東臺月長照鄉人祝社壇至元戊辰應聘憲䑓留别淇上諸公夣中得金馬門中金馬臣銅駞巷陌歲華新閑雲也被風吹去散作千門萬户春竹林幽隱圗西晉風流號七賢茟牀茶竈共林烟嵇琴響絶千年後喜見清風一再傳清時有味是閑身不可一日無此君着脚歲寒堂上去秋風門外葉􅌭紛蘇嶺桑麻杜曲田歲寒誰似此君賢鳴歌不種南山豆千畒風煙學渭川昔賢愛竹與竹友出處揔得髙人各今人未著林頭屐里社歸來晝錦榮共城瀟灑似江南萬竹幽棲老所堪李沆似為諸子計北山先掃讀書龕煙雨溪南百畒春盡将清景属閑身河山不隔黄壚断却恐㓛各老逼人春夜獨坐讀書聲歇燭華殘潤入琴絃覺夜寒寂寞小窓雲影薄隔簾梧葉雨聲乾仙遊曲五絶春山雲白紫芝肥歲歲征騑動漢儀政自修身傳治本不縁幽睡試希夷鶴護龍香醮夜壇露桃花影記驂鵉碧雲暮合秋空逈石上清風漠漠寒庭竹無人緑滿窓幽香和露濕電幢日長孤絶壇邉鶴啄遍睛苔影一雙漢家望拜竹宫壇環珮聲沉碧落寒遥憶受釐宣室夜一言前席萬方安金簡朝元擁玉華碧壷香满謫仙家石壇冷掛銀潢水㑹待秋風送客槎六度寺荒村到寺才三里古屋懸崖廢幾間從此重經題品過衞人方識有壇山山下石田百畒餘子孫眷恋相來居向人争說新官好二稅輸來雜泛無縈紆一水蟠深澗野叟何知說太公壇下古碑堪晤語大書深刻太康中鶴啄遍睛苔影一雙漢家望拜竹宫壇環珮聲沉碧落寒遥憶受釐宣室夜一言前席萬方安金簡朝元擁玉華碧壷香满謫仙家石壇冷掛銀潢水㑹待秋風送客槎六度寺荒村到寺才三里古屋懸崖廢幾間從此重經題品過衞人方識有壇山山下石田百畒餘子孫眷恋相來居向人争說新官好二稅輸來雜泛無縈紆一水蟠深澗野叟何知說太公壇下古碑堪晤語大書深刻太康中太行東麓太公泉喬木蒼煙擁壞垣千載秪應尊有德不湏深泥竹書言老鶻餔雛百丈崖羽毛才鷇獵人來孤懷牢落風埃底何處呼鷹是故䑓聖泉流潤過南村共說來年雨水匀山若有靈䏻假手六花先壓壠頭塵枝撑佛宇老風煙歲月仍題聖暦年零落乱山終悵望捫蘿應欠入香泉先子能聲以吏聞生平游戯見詩文遺書忽入孤児眼淚洒西山日暮雲鷹揚來自鎬豳西草木荒山壁壘低賣食觧牛真妄說断碑明指是殷溪山中宿麦苦無多喜見團科際两坡縱未痛収終有望入城容易揭差科同劉勸農彦和葛縣令祐之遊蒼谷口四山遮盡外来風山崦人家不覺冬獨丘蒼崖重囬首山形渾似又居庸夕陽西下暮山稠崖下蒼池似炭湫把釣不愁雷火出品題應爲此山留近山風俗果温純知有從来縣令尊霳老杖扶争致語不嫌山野過柴門山神說是宰公身野老争来話本因採玉得仙俱慌愡至今功利及斯民九龍分部中天雨何䖏癡蟠睡不開一勺鳯凰䑓下水有時風雨洗天来方山忽断兩崖開中有蒼河自北来行出山門俱不見玉龍翻作地中雷不湏犀火瞰蒼湾萬古幽隂鬼所寰山下黄塵三百丈巢居安忍挿天山地爐火在壁燈昏睡覺山堂笑語温豆粥一盂官事了緩摇吟轡出山門贈星斗客冷景發六甲星䠱入苦心術窮滄海别穿深滕王閣上三盃酒曽愽相如換賦金萬類芸芸固不齊一推能盡未来幾向渠待福早晚台光映紫微烱烱雙曈楚語紛闖懐隂穽失崖垠坡仙有句堪書贈醉裏微言更近真有命何曽論智愚班超傭筆衞青奴自從遇着洪都客豁得胷中俊氣無半生心事苦蹉跎其柰胷中不朽何鳬鶴短長俱有數魯卿三昧聖之和遊霖落山雜詩東山削出翠美蓉西􅊤􅚱砑貯雪風人說魏王曽避暑殿基猶是舊離宫巃嵸悲䑓倚寺西山空留在舊禅扉老猿呌月蒼烟去曽伴山僧夜半歸青山断䖏塔層層廢殿臨崖枕虎形千丈畫屏冝晚對野烟飛去助空青絶磴穿雲老蘚蒼捫蘿行到賛公房宝香冷澈華嚴璧木客猶誇夜有光滴乳岩前掛瀑流青杯飛洒動髙秋玉龍躍入青冥去堆疊蒼烟萬壑愁秋澗先生大全文集卷第二十四
