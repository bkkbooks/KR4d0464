  text: 秋澗先生大全文集卷第二十四
  hash: sha256:d70488da41f6076d9672c6f21dc5e1d172845b21a6101e9d008d90d46052c972
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_024-1a}
body:
  text: 七言絶句寄張孝先愛而不見我心勞好在天池刷羽毛一曲紫簫風露冷黑山無際月明髙寄贈王嘉父十日休間一到衙冷官滋味賈長沙醉歸多趂湖南月馬上披香直到家送王子冕天壇行香山川望秩走星軺藩府懷賢夢想勞不為碧雞金馬異漢家優禮起王褒蕭徴君哀詞東瀛先生有道之士也豫以里閈故獲展覆綦之拜蓋十有一年矣今茲云亡謹托其見聞之實作追懷詩六首姑逹乎感慨云耳圯上求書約重過豈期遐想仰山河適來適去公常事親見先生曵杖歌含悲空炷影前香風𬒮泠然返帝鄉鶴馭不來塵丗隔芙蓉城闕月茫茫李白長鯨汗漫期秋山魂汵未來歸傷心執紼西州路何止羊曇淚滿衣鬱欎佳城晝不開玉霄東望靄蓬萊空懷華表城頭柱會有它年化鶴來萬事生平委自然竹風松月共清圎衣塵才拂朝元去忍向人間久棄捐樓觀才成人巳非身前毫髮恨無遺空餘讀易壇邉竹露葉青青若淚垂比干廟玉骨琅琅盡古丘凛然英氣尚橫秋朱遊訕訐何為者敢辱先生地下遊雪夜暮雪紛紛亂撲窗牀頭無酒只空缸壯懷俱與爐灰冷惟有詩魔苦未降旋呵凍茟吟氷柱急掃風花煮夜茶客去焚香閉門坐小齋𥘉不羡山家八月十四夜與雷彥正步月秋聲入户夜蟲多辜負金樽漾月波燭暗香殘人欲去滿庭風露影婆娑卓水鏡中流水畫中山酒盡銀瓶興未闌碧玉沼深人不見桞花飛度翠琅玕夜過滑州黑矟軍聲動地來魏人宵濟宋師廽而今一統無南北月下搖鞭過滑臺跋龍眠二駿圖玉塞沙平苜蓿繁渥窪春水泛晴闌幾時扈從長楊獵一片紅雲拂繡鞍漢家天子狩隂山萬馬慿凌汗血殷早晚華陽春草地兟兟得似盡圖間美人却扇圖寶檻承恩妬露華背金翻日羡宫鴉幽間好備關雎德望絶羊車失自誇絶代佳人擬罕儔幽間無夢到河鳩春風靜瑣昭陽院落盡庭花轉自愁遊瓊華島中統元年作鳥語山容喜客來耿純襟𫀆若為開六龍冷駐隂山雪暫擬層巔作望臺美蓉水殿紫岩松六月雲蒸此雪宫樂部不聞清夜曲舜絃聲裏詠南風蓬萊雲氣海中央薰徹瓊華露影香一炬忽收天上去謾從焦土説阿房五雲仙島戴靈鰲老盡瓊華到野蒿惆悵津陽門外去春風飄亂酒旗髙大定明昌五十年論功當出漢唐前儘消一島承清宴且置堯階頌采椽踏盡寒雲最上層土花春碧夢觚稜江山如畫人空老更倚殘陽望道陵玉樹歌聲繞北虛朔風吹恨入南都六鰲不戴三山去留與都人泣鼎湖光泰門東日月躔五雲仙仗記當年不煩細讀江南賦老樹遺臺倍黯然杜莘老荒山訪友圖隆中人有鹿門期梁甫吟餘獨杖藜殆似老龐歸向晚釣船猶艤暮江西秋懷效樂天體間書遮眼睡昏昏食飽無茶腹自捫斜日倚門風乍起滿庭黃葉擁籬根早起星河黯淡湛玄雲露下庭柯落葉紛夜氣逺從天際斂秋聲時向樹頭聞冬日與吕丈讀毛詩草二首婦道防間貴有𥘉文薑失御從雲如何殊笱敝梁空在秋水誠多得計魚敝笱服御鮮明擬大君轔轔轂擊汶陽春載驅既匪勤王事隱惡能無播萬民載驅濟濟威儀美且都詩人流詠入嗟吁齊家為失防間禮禦亂無多金僕姑猗嗟為國規模以德將恬然風俗入安疆新婚服襋既非禮葛屨凌霜尤失常葛屨汾水悠悠宛一方條桑采藚僕夫當誰知粲粲軞車子終日頃筐泪洳傍汾沮洳得民方可固邦基此道幽深莫我知却憶賔庭陳百旅棘桃猶足備多儀園有桃地狹民稠十畒間來歸來逝共間間何當一復周家制各守封疆絶往還十畒之間邦畿蹙近四鄰侵行役無時怨抑深陟岵遐瞻利自慰倚門應甚望雲心陟岵不畋安得獸懸門匪稼胡為禾積囷但恃鄙貪居祿位不能無愧伐檀人伐檀碩鼠歌詩怨巳成三年貫汝未聊生熙熙彼土雖云樂猶抱遲遲去國情碩鼠皂綈示約人從化玉樹歌淫國旋空蟋蟀戒深垂萬出由來奢儉貴乎中蟋蟀隰原尚賴樞榆蔭人主憂勤貴一身堪鄙晉昭徒自苦只將鍾鼓樂他人山有樞𥻘𥻘白石水揚揚宗國由來日盛強木末儻從師服諌爭交竊國似田常揚之水沃土分封自晉昭子孫蕃衍喻園椒大夫休起盈升歎宗本顛披爾逺條椒聊束楚綢繆仰見星時危婚嫁禮難成却思王季興岐日內外俱無怨曠情綢繆骨肉凋零失所親徒行踽踽一身存不如杖杜春前樹枝葉猶能庇夲根枤杜服御羔裘豹飾袪國人不恤反居居豈無它所携持去恩好猶懷未忍踈羔裘孝飬庭闈士乃常反教執役事戎行悠悠仰面蒼天渺失所何殊鴇在桑鴇羽晉國流風屬變移武公反正思依依誰知問鼎傷肩際肯獨尊三請命衣舞衣道左團團枤杜春清隂猶得庇行人國強須賴群賢輔孤特何為任一身有枤之杜蘝生蔓野葛蒙枝女子從人得所依衾枕未溫征役逺庶幾百歲願同歸葛生晉獻聽讒似采苓竟從微隱殺申生後王采察能明逺譖訴雖多自不行采苓梁園對月兒時曽住汴梁城二十年來重此行一片鳯凰池上月向人還似舊時明過蕩隂東周留村一灣流水麥青青楊柳隂中野彴橫幾樹桃花如舊識隔溪無語笑相迎喜蕭茂先得雄未聽啼聲骨已竒桂林安取野棠枝老髯嗜學𥘉心在剩備箱書付阿冝滿紙新詩羡寧馨慰心尤喜老來情壽兒此去如春筍玉節亭亭脫錦繃夏夜野雲明處電飛光海牽青浮落日黃想得近山多雨過滿庭風竹月波涼夢中賦月燈詩風外筠竿倚暮煙忽驚群日帝堯年天公兩眼何嘗暗底用分光照一偏遊泰山雜詩胚融萬化群龍首丘垤諸山五嶽宗茂陵誕荒誇後丗岱神何意望東封祖龍東巡擅雄豪天門風雨幾遁逃虞帝不來天自老秦碑空倚禪壇髙衆山迤邐朝西東帝孫突出天之中巨靈不劈蒼崖斷雖有絶頂誰能通何年氣母此融結大小天門五十盤三峰自是神明觀漠漠隂風走石壇岱宗巖岩靈氣宅雲煙物外爭新竒丗事難必有如此吾欲人海從安期綰茁元氣通滄海霧湧雲蒸一水山五十連城望霖雨少分餘潤到人間萬壑瓊林映碧崖雲間三頂欎霄臺摩挲御帳殘松樹曽見秦皇漢武來路從御帳北艱屯松頂雲癡日腳昏上盡曲盤十八折缷看猶自有天門蕩胸滃欎隂雲生行出天門路漸平腳力有餘中頂近徘徊應為紀山銘朝􅚐爛爛烘層巔天門直下屯蒼煙乾坤故為作開闔丗界幻入兜羅天何限詩人不充登枎黎直到最髙層壁間速即留題去雲起封中冷不勝東山何髙四十里萬古通天只一門不知洞府深幾許宿雲無數儘雄吞雄觀駭絶東溟日逸駕髙於北海鵬更著山靈出竒貨千岩蒼雪玉稜層雪林􅍑迹過新蹄石蹬雲霾步步低多謝山靈相擁護一柸無事到中溪中溪神祠名在山門口贈相者李吉甫仙機分自洞中春閲盡長安市上人留取神光牛背上要渠著眼過天津跋豐稔還鄉圖廟堂真宰拜姚崇斗米三錢四海同今日太平應有象盡家消息恐難工過邯鄲層臺髙與暮雲齊全趙河山入望低貪和野花雙塔句夕陽又下故城西我自驅車下九門眼中襄國動吟魂從教兩鬢渾如雪猶喜歸來故步存黃糧夢短不須驚滿馬紅塵過趙城獨上荒臺重惆悵野煙無處認溫明題雪谷早行圖頭痛風炎萬里程行人何限把雙旌犯寒休訝征車早冷嶺東邉是帝城新店看山望京樓喜入關南百里川朔風邊雪頓醒然夕陽欲下蒼煙起看盡西南破墨山秋雨靖山道中一重一掩吾肺腑老雨荒山記北還人在碧煙深澗底仰看元氣湧雲間酌百泉水去時蘭佩惹春煙歸日羸驂跨敗韉賴有百門山下水療飢猶可度終年偶書郝卿持節使江臯子勉翺翔主御曺我幸閉門無一事醉餐秋菊讀離騷跋司馬溫公燕處圖獨樂園深百草香一編心與道相忘不妨卧老琴書裏破散青苗有報章道與睛雲任卷舒心存廊廟迹江湖石君被遣公孫死慚愧先生燕處圖擁馬留公作帝針人心大祗是天心惠卿未死舒王在一集傳家了古今壬戌歲除夜坐久虗窗夜氣澄未容心事淡於氷滿襟忠血傷時淚一點清光教子燈春風萬里圖人間塵土曰紛拏流水空山半落花自是道心遊物外不須誇誕説流沙蓮社圖二首人間廬阜東南勝兩晉名流最賞音阿麟因之出新意秋香和月寫東林鬢絲禪榻喜相同詩在秋季千古風流社中客不隨江月照還空跋蒼江待渡圗朝醉新篘暮錦鱗一篙獨占且休熟睡秋蓬砥無限津頭望濟人隆中髙卧耻為邦雪裏呼船渡晚江耆舊幾人堪晤語徑須持訪鹿門龐贈别王晉卿漢署千官列鴈行九天獨𬒳繡衣光布衣自笑題詩客空抱澄清望八荒青鎖仙郎𬒳服新寵光千丈爛盈門何時得侍紅雲表竭節同酬一命恩劔履翩翩趣北歸秋衾日夜夢彤闈長楊輦路都門柳恰及飛花點繡衣挽蘭同知進之留心藥籠緣多病歷仕鄰藩便暮年廽首西州門外道偃然長寢兩相捐行年六十不為夭二政三州有足稱伯道有兒終抱恨夜窗無及讀書燈一丘黃土清溪曲三尺蒼髯六十身千古桐鄉遺愛在只須秋草卧麒麟得調澶淵幾載考自營墓穴巳三年幾廽對客親曽説埋近清溪性所便翩翩老騎赴征車前日東城别路隅酒榼素筝今寂寞河山依舊繞黃壚戊辰後正月七日雪北風一雪麥田空坑谷堆平滿棘叢近日化工無棄物揔將春澤到蒿蓬戊辰門帖子安分愛尋蕭逺論廣騷慵讀楚臣辭里人莫訝三冬蟄一寸丹心用有時送劉主簿文逺赴都仕途坦坦駕輕車殆似劉君赴部除不枉洛南溫處士半生清苦待徴書終南捷徑霾荒靄吏部銓衡到至公相過不須論出處季鷹門巷幾秋風除官限自三年例計月須慿一考優聞説聖皇思治切夢賢無夜不岩幽貢璧輸琛買喣濡萬言不博一除書秋風兩戒河山底自把鋤犂計未踈求官自古近長安格法如應事不難説與磻溪溪上叟且須寧耐把漁竿題薛微之遺安堂靜思冨貴履危機醉著人心死不知愛煞遺安堂上客此心還與鹿門期清樾蘭臯百畞隂兩椽精舍倚雲深一鞭春事東風裏劉表何人識此心因題前詩偶書山林長往廟堂居一襲時衣飯兩盂溫飽較來均一槩忍尋機穽博頭顱挽趙教授公淨目擊冠裳一老儒爭教蒼海失遺珠細思晚起山齋語地下修文事本無淵源分派太中君偶讀殘碑得古文河潤秪能霑再丗不須回首愴蒿莙儒林遊戲入禪關晚節浮沉里社間異日衛人徵故事為公扳例取香山辛苦生平篆刻勞也霑汀草亂春𫀆有兒不肄中郎業却是先生一著髙是是非非到蓋棺誤身無似戴儒冠蒼涼一片共山月照徹先生苜蓿盤生理蕭條奈老何春風著處是行窩哀歌偶及生存事却恐羊曇淚更多因著圖經大起豫發揚潛德到幽墟案頭幾卷遺編在愛惜過於汲冢書時豫作汲郡志乃類集蘇門事迹一編甚詳番見贈故云跋申逹夫藍采和扇頭一踏髙歌了丗緣春風兩袖地行仙無端忙煞癡兒輩貫朽都來有幾錢謁梁太師王彥章祠太師祠廟汶城西冢上纍纍日漸低唯有英聲消不得至今髙與泰山齊雨後溪田即事朝來一雨曙光微髙樹涼多露未晞喜約老農來看稼不辭霑濕芰荷衣清寒墟落漲秋濤溪上行吟樂已陶洞口未容煙鎖斷更須時上武陵舠平明新漲復溪痕曉月榣光映棘門騷客不愁漁箔短縱教魚鱉長兒孫三年耕飬一經通水旱豐凶更在中貢法不來神聽逺此生窮逹仰天公種樹書殘倚釣竿日長微暑喜清寒草堂去水無多地隻足時來踏碧瀾録役者語十人供役二三回困似車輪半道摧眼底去留生死隔爭如先作陌頭灰土戰何年是了期為王城此不知疲一門親削宣尼茟為國勞民貴有時一夫詛祭九魂知護我南行爾亦歸惆悵桑乾河畔月至今寒影慘無輝或云河南役夫既罷歸九者皆殁其一負衆骨而西渡瀘溝因祭而祝曰令汝等俱沒我幸獨全抱汝骨以歸汝等有靈當佑我使與汝父母妻子行相見也其人前次范陽亦病死工無役鬼必勤民萬雉㓛成歲月因從古有庸三日止未聞膏血化灰塵今春疫氣是天災百日為期力儘能三尺席菴連夜雨杵聲才歇哭聲來火中渙汗土中蘇却被車轟殞半途六月炎風一千里大河南北看巢居病骸困苦自知休叮囑同行瘞故丘父兄秪知安健在計程今日過瀘溝父來接子值同徒欲話渠儂涕泗俱昨日道邊因困卧不知今日有還無病軀甫差須扶護趂伴貪程日夜奔太半殠遺多為此故鄉歸去有殘魂蕩蕩王城玉削裁青山三面壯圖開興功計産能中止狼籍春風一露臺數口為家尚聚廬一王經野古良圖限期百日非為遠部役群宫事大劬觀風浪中回舟風蕩輕舟一葉廽望中掀舞碧濤堆舟人若解臨觀恐迂緩甘從逺道來清溪晚眺洲渚橫陳水退餘兩竹風栁映菰蒲暝煙誰踏扁舟去望際漁燈一點孤題陳德秀東臺手卷井落星纒一炬殘市門留入畫圖看秪應千載東臺月長照鄉人祝社壇至元戊辰應聘憲臺留别淇上諸公夢中得金馬門中金馬臣銅駝巷陌歲華新間雲也被風吹去散作千門萬户春竹林幽隱圗西晉風流號七賢茟牀茶竈共林煙嵇琴響絶千年後喜見清風一再傳清時有味是間身不可一日無此君著腳歲寒堂上去秋風門外葉􅌭紛蘇嶺桑麻杜曲田歲寒誰似此君賢鳴歌不種南山豆千畒風煙學渭川昔賢愛竹與竹友出處揔得髙人各今人未著林頭屐里社歸來晝錦榮共城瀟灑似江南萬竹幽棲老所堪李沆似為諸子計北山先掃讀書龕煙雨溪南百畒春盡將清景屬間身河山不隔黃壚斷却恐㓛各老逼人春夜獨坐讀書聲歇燭華殘潤入琴絃覺夜寒寂寞小窗雲影薄隔簾梧葉雨聲乾仙遊曲五絶春山雲白紫芝肥歲歲征騑動漢儀政自修身傳治本不緣幽睡試希夷鶴護龍香醮夜壇露桃花影記驂鵉碧雲暮合秋空逈石上清風漠漠寒庭竹無人緑滿窗幽香和露濕電幢日長孤絶壇邉鶴啄遍睛苔影一雙漢家望拜竹宫壇環珮聲沉碧落寒遙憶受釐宣室夜一言前席萬方安金簡朝元擁玉華碧壷香滿謫仙家石壇冷挂銀潢水會待秋風送客槎六度寺荒村到寺才三里古屋懸崖廢幾間從此重經題品過衛人方識有壇山山下石田百畒餘子孫眷戀相來居向人爭説新官好二稅輸來雜泛無縈紆一水蟠深澗野叟何知説太公壇下古碑堪晤語大書深刻太康中鶴啄遍睛苔影一雙漢家望拜竹宫壇環珮聲沉碧落寒遙憶受釐宣室夜一言前席萬方安金簡朝元擁玉華碧壷香滿謫仙家石壇冷挂銀潢水會待秋風送客槎六度寺荒村到寺才三里古屋懸崖廢幾間從此重經題品過衛人方識有壇山山下石田百畒餘子孫眷戀相來居向人爭説新官好二稅輸來雜泛無縈紆一水蟠深澗野叟何知説太公壇下古碑堪晤語大書深刻太康中太行東麓太公泉喬木蒼煙擁壞垣千載秪應尊有德不須深泥竹書言老鶻餔雛百丈崖羽毛才鷇獵人來孤懷牢落風埃底何處呼鷹是故臺聖泉流潤過南村共説來年雨水勻山若有靈能假手六花先壓壠頭塵枝撑佛宇老風煙歲月仍題聖曆年零落亂山終悵望捫蘿應欠入香泉先子能聲以吏聞生平遊戲見詩文遺書忽入孤兒眼淚灑西山日暮雲鷹揚來自鎬豳西草木荒山壁壘低賣食解牛真妄説斷碑明指是殷溪山中宿麥苦無多喜見團科際兩坡縱未痛收終有望入城容易揭差科同劉勸農彥和葛縣令祐之遊蒼谷口四山遮盡外來風山崦人家不覺冬獨丘蒼崖重回首山形渾似又居庸夕陽西下暮山稠崖下蒼池似炭湫把釣不愁雷火出品題應為此山留近山風俗果溫純知有從來縣令尊霳老杖扶爭致語不嫌山野過柴門山神説是宰公身野老爭來話本因採玉得仙俱慌愡至今功利及斯民九龍分部中天雨何處癡蟠睡不開一勺鳯凰臺下水有時風雨洗天來方山忽斷兩崖開中有蒼河自北來行出山門俱不見玉龍翻作地中雷不須犀火瞰蒼灣萬古幽隂鬼所寰山下黃塵三百丈巢居安忍插天山地爐火在壁燈昏睡覺山堂笑語溫豆粥一盂官事了緩搖吟轡出山門贈星斗客冷景發六甲星躅入苦心術窮滄海别穿深滕王閣上三杯酒曽博相如換賦金萬類藝藝固不齊一推能盡未來幾向渠待福早晚台光映紫微炯炯雙曈楚語紛闖懷隂穽失崖垠坡仙有句堪書贈醉裏微言更近真有命何曽論智愚班超傭筆衛青奴自從遇著洪都客豁得胸中俊氣無半生心事苦蹉跎其奈胸中不朽何鳬鶴短長俱有數魯卿三昧聖之和遊霖落山雜詩東山削出翠美蓉西􅊤􅚱砑貯雪風人説魏王曽避暑殿基猶是舊離宫巃嵸悲臺倚寺西山空留在舊禪扉老猿呌月蒼煙去曽伴山僧夜半歸青山斷處塔層層廢殿臨崖枕虎形千丈畫屏冝晚對野煙飛去助空青絶磴穿雲老蘚蒼捫蘿行到贊公房寶香冷徹華嚴璧木客猶誇夜有光滴乳岩前挂瀑流青杯飛灑動髙秋玉龍躍入青冥去堆疊蒼煙萬壑愁秋澗先生大全文集卷第二十四
