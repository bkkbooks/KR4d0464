body:
  text: 玉堂嘉話卷第一大元中統二年秋七月惲自中省詳定官用两府謂内外兩省薦授翰林修撰其宣詞云行巳無忝博學能文顧超絶之逸材足鋪張於偉蹟冝司綸命以賛皇猷可特授翰林修撰同知制誥兼國史院編修官當振斯文以宣朕命其修撰雷􅈾詞云昔年詩禮巳聞鯉過於庭前今日絲綸復見鳯毛於池上二詞叅政楊公筆也旣拜命謁承旨王公於寓館公曰唐人題名記為三千佛名經其充詞臣者即為一佛出世國家文治伊始汝等首膺是選於士林有光矣八月上都文廟告成公命某官作釋菜諸文頗立論其間公曰如此文字有稱功頌德而巳又云作文亦有三軆入作當如虎首中如豕腹終如蠆尾虎首取其猛重豕腹取其楦穰蠆尾取其螫而毒也此雖常談亦作文之法也𥘉公旣草諸相宣辝通作一卷實封細銜書名上用院印付惲呈省問焉曰白麻蓋自中出今實封防其漏泄亦唐人鎻院之意也其立史院奏帖有云自古有可亡之國無可亡之史兼前代史纂必代興者與修蓋是非與奪待後人而可公故也公又親筆作史大略付惲如帝紀列傳志書卷秩皆有定體其傳湏三品有顯烈者立又云太史張中順金一代天變皆有紀録就此公未老可亟與論定亦是志書中一件難措手者切念公諱鶚字百一曹之東明人正大元年甲申獲承牓状元第遂應奉翰林文字殊為金主眷頋天興二年官通議右司貟外郎後遇聖上寵光益隆如諮大計以斯道覺民為先論日蝕以撤樂罷宴為對開禮樂之源則釋菜先師明慶咸之權則張皇治本又以葬祭故主為讀允焉後為位哭汝水上哀動左右天日為變色仍私謚為義宗據法君死社稷曰義其忠不忘君如此冬十月侍中和者思傳㫖都堂與文字召静應姜真人去者惲時為左司都事宰相命具詔草其詞曰静以知來智能藏往念前言之有効方庻事之惟㡬遐想仙摽載勤馹傳憣然而至暫辝嘉遯之郷罄爾所懷與復細氊之論至元十四年丁丑歳春二月庚申朔復授翰林待制是日赴院供職爲春旱禁酒詔漢賜大酺歲有常數周申文誥飲戒無彛况糜粟者莫甚於斯崇飲者刑則無赦近縁春旱朝議上陳冝禁市酤以豐民食朕詳來奏寔為腆民可自今年某月日民間母得醖造酒醴俾暴殄天物重傷時和故兹詔示想冝知悉爲春旱祈雨青詞伏以萬物盈於兩間亭毒必資於帝力皇天佑于一徳精誠可格於高穹比者時雨愆常秋種不下重念無辜之者將罹荐至之災循省自修庶囬哀眷爰因雩祭崇建靈壇伏望列聖垂仁九天降鍳易隂陽之恒數幹造化之玄機下勑豐隆霈流甘澍蘇槁麦於南畒播嘉糓於東郊一滌昏霾溥洽生意豈惟大賚三農免失業之憂嘉與多方髙廩享有年之慶同諸公觀唐張九齡等誥於玉堂其詞曰門下春秋之義尚重卿才王國克楨莫先相位用増其命必正其名中奉大夫守黄門侍郎同中書門下平章事弘文館學士賜紫金魚袋上護軍裴耀卿正議大夫中書侍郎同中書門下平章事集賢院學士副知院事兼修國史賜紫金魚袋上柱國曲江縣開國男張九齡經濟之才弍是百辟正議大夫檢校黄門侍郎賜紫金魚袋上柱國李林甫泉源之智迪惟前人旣樞宻載光而親賢称首審能羣㑹所莅有孚寕惟是日疇咨故以多年歷選國鈞繄頼邦禮克清冝命曰鼎臣置之廊廟耀卿可銀青光禄大夫守侍中學士勲如故九齡可銀青光禄大夫守中書令學士知院事修國史勲封如故林甫可銀青光禄大夫守禮部尚書同中書門下三品勲如故主者施行開元二十二年五月二十七日上用尚書吏部之印凡五顆制可下傍作細字書某月日某時都事某左司郎中光奴後細衘相臣與部官同列去姓而名名作大字署曰尚書左丞相曰金紫光禄守尚書右丞相集賢院學士修國史上柱國徐國公嵩曰吏部尚書上柱國武都縣開國伯暠曰朝請大夫撿校吏部侍郎上柱國䂊曰吏部侍郎曰朝議大夫守尚書左丞賜紫金魚袋挺之後書年月日印同前後稍下以細銜書銀青光禄大夫守中書令集賢院學士知院兼修國史上柱國曲江縣開國男臣張九齡宣曰中書侍郎曰朝議大夫中書舍人内供奉集賢院修撰上柱國臣徐安貞奉行復作髙行細銜曰銀青光禄大夫守侍中弘文舘學士上柱國臣耀卿曰黃門侍郎曰朝請大夫給侍中内供奉臣昱等言復大字與衘平頭書制書如右請奉制付外施行謹言復大字與前平書告銀青光禄大夫守中書令集賢院學士知院事兼修國史上柱國曲江縣開國男張九齡奉𬒳制書如右符到奉行自告字巳下作五行用印二十九顆唯制字上空後上與前平頭書郎中惲下細字書主事懷琛令史王烈書令史姚元開元二十二年五月二十一日下印同前用告用杮黄斗底綾作卷凡七幅上下約一尺或者謂曲江與林甫通作一告除拜以鸞梟並集駑驥同皂爲嫌子曰帝尭在上咎夔與驩鯀同列恐自昔有所未免正在明君别其賢否用與不用耳然唐自開元後九齡竟罷而相林甫治亂之分於斯巳見矣二月壬戍題唐李紳拜相後有徽宗御書跋門下興化致理必資作礪之功納誨弼違實頼將明之效苟非材摽人傑道茂時宗藴經濟之宏規積巖廊之素望則何以光我注意允于具瞻其惟至公舉成命淮南節度副大使知節度事管内營田觀察處置等使銀青光禄大夫檢挍尚書右僕射兼楊州大都督府長史御史大夫上柱國賛皇縣開國男食邑三百户李紳氣禀清剛體含冲用抱金石之正性挺松桂之貞姿識逹古今慮周微隠詞源睿發洞學海之波瀾智刄髙揮森武庫之矛㦸中立不倚方嚴寡徒長慶一朝委遇斯極入參禁宻出緫紀綱王猷多潤飾之能邦憲著肅清之称洎領版圖之任尤彰均節之冝而又寵辱靡驚得䘮齊致河洛㽞神明之政浚郊恢將帥之謀威令播於軍戎豪黠屏迹惠祕洽於封部疲羸息肩俗變阜安人知禮義日者其髙第換彼雄藩當淮海之要衝控舟車之都㑹風望並峻僉諧莫踰朕䖍恭寳圗夢寐良輔爰􅈾審像果副虚求尔宜踐台席之崇嚴司中樞之宻勿外以底綏華夏内以勤恤黎元視同列猶塤箎期君臣如魚水無使仲山𥙷衮獨見羙於周詩汲黯匡時常推髙於漢史祇率訓典徃惟戒哉可守中書侍郎同中書門下平章事散官勲封如故主者施行㑹昌二年二月十二日年月日上下凢用印五顆其文即尚書吏部之印傍近下細衘書中書令次右僕射兼中書侍郎平章事臣珙宣奉次中書舎人臣孔温業行復作髙行與告文齊細衘曰侍中次司空兼門下侍郎平章事臣徳𥙿次給事中臣㤗章等言作大字與細衘齊制書如右請奉制付外施行謹言㑹昌二年二月日印文同前大字平書制可下細書月日時都事及左司郎中復作髙行與制可齊書細衘曰吏部尚書次吏部侍郎次尚書左丞巳上皆闕後大書與衘平頭曰告銀青光禄大夫守中書侍郎同中書門下平章事上柱國賛皇縣開國男食邑三百戸李紳奉𬒳制書如右符到奉行自告字至行字用印一十九顆全空制字後復平書司勲郎中判懿下細衘曰書主事次張弘亮次令史楊温次書令史㑹昌二年二月日下印同前徽宗御跋㐮讀大祖皇帝實録載偽蜀李昊自言紳之後仕孟昶至司空趙國公方昶與江南通好時遣其臣趙季礼使景季礼囬得李紳唐武宗朝自淮南節度使入相告以遺昊昊欲誇詫其事結綵爲樓置告於中朝服前導盡呼聲妓雜奏歌樂迎㱕私第即召將相大臣宴飲仍以帛二千疋謝季札詳閲告文正昊所詫之告也然自武宗逮今三百年苟人以忠諒功業聞於時有不必金石而堅者可不勉哉因節文以載其實後有復古殿四字上用御書之寳又有范仲淹冨弼吴中復韓緽玉汝已未季秋觀於承㫖東􅈦先儒論漢人大綱正節目不備唐人大備而純正謂此等制耳秋澗云洛陽竹齋先生李得之云制誥二體不同宣辝必湏散誥詞乃用四六今宣詞皆作四六非也蓋宣則王言親諭誥則牒奉勑行如蔡正甫作道陵諭孟宗獻詞云朕新即大寳詔有司以取天下士卿自郷選至於殿陛四爲舉首非材之高學之愽識之優何以臻此今卑以北門應詔之職朕之待卿不薄然君子志於逺者大者無以此爲自足爾其勉旃又諭沁州㓨史李楫云有司以卿資應未當得郡朕以識卿㝡乆愛卿占對詳明進止審當故有此授卿當悉力爲民政成以称朕意尔其勉之是也其誥如狄梁公顔少師李文饒等詞唐人純用四六是也又云知制誥爲三字辝臣故唐詩有云三字詞臣求識面九重天子望低顔之句得之先生名國維淄川人浮陽王頔文叔說𥘉鹿庵先生奉敕定撰趙秘書先丗碑文纔畢先生拖車過予於崇寕里迎視若有喜色未審何為坐定出此文至其論說噫古人有言風霜别草木之性危亂顯貞良之節夫危亂丗常有而全節死義之士不可常得或相去數百年或相望數千里時有一二焉獨趙氏一門之内父子兄弟乃有四人真可尚哉昔比干效忠於殷而受封於周尭君素盡節於陏而唐太宗為文祭之盖天下之善一也聖人一視同仁寕有彼此之分哉今趙氏父子兄弟盡忠於金而聖天子為之立碑淵衷睿監蓋與夫唐太宗周武王之心不侔而同矣敢對揚休命繫之以銘先生不覺自讀者再公氣養素厚且復尔耳諒以自得用事切當為喜乃知文士氣習至其適意不知手舞足蹈古今通一致也又記吕遜嘗談趙著吕鯤以詩鳴燕朔間二人皆出耶律相門下虎巖毎得一聮一詠即提擲其帽於几龍山從傍謂曰不知李杜平時費多少㡌子聞者為捧腹待制楊恕字誠之金文獻公楊尚書子甞談其父正大間所陳奏議今録於此臣伏讀聖㫖節文六品以下官有情見詣登聞檢院進奏帖者聖訓廣大蓋將博詢兼覧以盡羣下之智也臣實愚懵無妙謀長策仰禆聖聽之万一獨取事之切於今日者列為二事以言之一曰簡卒二曰理財簡卒之説後有三焉一曰取人材二曰募願為三曰括驅丁理財之説復有二焉一曰納官從便二曰和買可罷臣請言簡兵之説臣去嵗在鄉里見其簡卒之時不以人材優劣爲等差而以物力多寡為次第故所得冨民之子弟彼生長於衣食豐𥙿之中居則役僕隷行則䇿堅肥未甞諳習天下勞苦之事使之負斗區之重徒歩數十里則憊且顛矣况能𬒳堅執銳以為我軍之前行而逆戰哉倉卒之際非徒無益適足為我軍之累不若無之之為愈也為今之計莫若行三說以簡卒則庻乎其可用矣何謂取人材蓋十人所聚必有為之雄者在千方人亦然如揔州縣之丁男不以物力多寡為先後惟軀幹勇壯是求則所得皆能戰之人矣何謂募願為蓋天下之民虚為游手不業者甚衆平日無丨則使氣以侮人無頼而犯法其中或有果敢勇徤奮不顧身良民所不及者如束帛之賞募之爲兵則所得皆樂戦之人矣何謂括驅丁盖天下之奴隷自㓜及壮偹甞勤勞艱苦之亊其筋體氣力之所服習馳走負任之所慣狃豈常人之所能及哉如簡其人材之勝甲胄者免當房之賤藉之爲兵則所得皆能戰之人且有樂戦之心矣簡卒如是則與夫富民之子弟僝弱而不能戦恇怯而不樂戦者相去豈不逺哉臣請言理財之說臣切見數年前北邊有事之時天下錢鈔遏塞不通交鈔庫不勝換易之多乃邏卒持挺力與勝之當是時小民有懋遷之艱啇旅有不行之病比年以來漸無此弊者但以多取故也令以南鄙軍興支給浩繁户部乃日増印鈔之數以救目前之急然所出者方來而無窮雖入者雖増而有限以有限而待無窮則鈔有時而不通矣為今之計莫若行二說以理財則庻乎其無滯矣何謂納官從便國家利鈔之不行不若錢之通也故院務所輸之課皆使入之其術固善矣能限之以路分拘之以分數則所入之鈔傷太少耳夫已收太半之鈔而臣猶謂之少者誠恐後日所出者太多故也如使凡入官之数銀錢鈔三者一聴民便或全以銀鈔入者亦聴之如此則三者之價常平而不偏鈔法以通流矣且以目前行價論之不及錢鈔者毎兩該一三百錢如納從民便則銀入者多而價與錢鈔適平矣此取之之法也知所以收則所支之法又不可不知臣切見國家之取於民有曰和買有曰和雇者徒愛其虚名之羙而不捄其利害之實也蓋和雇和買之有損於國無𥙷於民適足爲吏卒之利耳且科歛之限方急州縣之官以鞭笞捶楚從事於怱遽之間小民奔走趍命之不暇故岀數倍之直以應上之求恐恐然惟以不得罪於州縣爲幸國家憫小民趨辨如是之勞故出直以償之意固善矣柰何州縣官之明幹者少胥吏鄉里正主首之属因縁爲姦官直之及貧民者十纔二三則是官有費損之實民無饒益之利也爲今之計莫若罷和雇和買之虚名凡有科歛一驗貧冨多寡之數而均之民不必出直以償之國家方事殷之時雖户賦口歛亦不爲過何必取公帑不及支之財欲以益當賦之民而要和雇和買之名哉且以括馬一事言之前年馬之取於民者旣議與之直今歲所括之馬如又償之則所費蓋不貲矣况畜馬者皆有餘力之家待南方平定之後而償之亦未晚也若夫邊方攻守之䇿兵家竒正之術固非愚臣所能識也雖然臣切料宋人爲此無名之舉者上無竒謀秘䇿可以揺動中國者特以過聽逋逃之言以為彼軍朝發則我民夕應矣然兵交巳來所遇敗衂我民之心安然不動則是狂狡之素計巳屈矣如秋髙馬肥之后鼓行而進則淮南可折捶而定也雖然臣切有私憂過計者國家之慮不在於未得淮南之前而在於旣得淮南之後何以言之蓋得淮南則江之南北盡為戰地進而相與争利於舟楫之間我之勁弓洞貫之卒不得環寇而發飛騎越蹂之足不得望風而騁當是時宋人扼江爲屯潜師于淮以断我軍之粮道或决水以瀦淮南之地則我軍當如何應接使彼計不知出此則固善矣如使能爲此計聖主豈可不與二三大臣預爲之謀哉雖臨敵制宜千變萬化然如臣子所言者上宜先有成筭也臣愚狂瞽不識國之大計冐昧陳列不勝恐悚待罪之至時毎㑹集日課讀平宋事跡若干編類者其間機畫三二顯事多歸賈楊二人安藏意不能平至有言鹿庵先生徐謂曰無庸異時修輯正書豈容及此従繁就簡不得不然安公色爲夷予且㑹躰要之有方也䟦僧花光梅後語蜀僧超然字仲仁居衡陽花光山避靖康乱居江南之柯山與叅政陳簡齋並舎而居山谷所謂研墨作梅超凢入聖法當冠四海而名𬒳丗甞有移舩來近花光住冩盡南枝與北枝之句其丰度可想見矣雲夢趙復題云如王謝子弟倒冠落珮舉止欹傾自有一種風味此蓋前金髙丞相家藏舊四幅暗香踈影溪雪春風今失其溪雪見爲宋子玉所收古者婦人無謚雖后妃之貴止従其氏至東漢顯宗始加隂后以謚自是遵爲定制宋相李昉春日玉堂即事有云一院有花春晝永四方無事簡書稀予夏日玉堂即日亦有二絶句隂隂槐幄幕閑庭静似藍田縣事㕔細草近縁春雨過映階侵户一時青日長上直玉堂廬思入閑雲待卷舒重爲明時難再遇等閑羞老蠧書魚頒髙麗暦日詔云云倠暦象日月星辰乃能成歲自侯甸男邦采衛要𣣔同文髙公學士詞也古墓中玉噐血漬者蓋尸以水銀烹其血能漬其尸沁者蓋尸之膏油所沁也其王噐以手拭光襯生白暈者即尸沁也秋澗先生大全文集卷九十三
