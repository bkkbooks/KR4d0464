body:
  text: 七言律詩西溪見夢十月𥘉八日夜五鼓𥘉拄靣相看几格間笑談似與浣離顔越裝已辨冝趍往江路雖遙不久還魯國自來尊北海謝家誰更作東山瀟瀟夜雨蓬窗曉細酹清樽與涕澘儀封道中驛館殘釭曙色分馬馱殘夢走踆踆去家已逺誰為侶到處相逢有故人健羡雕盤慚始擊靜便蠖蟄返求伸一杯拜酹睢陽廟激懦扶衰尚有神睢州道中寄友人奉詔東行獲所安却憐衰朽強為顔恩緣至渥酬無地事不預防多後艱逺馭有方清百越纎埃何輔奠三山殘年正要相料理既不容辭望早還過歸德寄何相白髮年前六十三強扶衰朽去江南心知義重吾何惜老不身安事恐耽弩末縱能穿魯縞病軀胡可敵閩嵐鄉關回首四千里正賴君侯與細參十月草七日過下邑喜與趙彥伯侍郎相遇作詩而别暮色增寒慘驛亭燈垂紅燼盡情明長年幾夢溪堂月此夜相看下邑城流落蠻方真可畏笑談樽酒且同傾回頭楚水楓林下熖熖聲華定彥卿宿宋家山趙氏田舍白髮搔來不滿簮就中誰遣世塵深野煙遙認圯稿月霜夜𥘉聞楚户砧長路苦吟支睡思客窗無夢耿鄉心前行説似安夷道隱隱青山轉槲林楊州送劉漢卿東歸汴梁海鶻翻雲下錦韝眼中人物見風流誰期淇水三秋别却作維楊數日留樽爼留連江上月風煙吟眺竹西樓馬頭細嚼梅花句又領春風入汴州西湖西湖三靣簇青山淨拭菱花照翠鬟蒼海月寒龍穴露彩雲仙去鳳簫間無多樓觀猶圖盡最好風煙近市闤鄭重繡衣周漕使畫船春酒待余還留别左轄台相兩浙江山漠霧雲吳儂輕剽到羣奔才寬防異須威霽稍困隨方以德存龍寵優來心愈小義方嘉處勢忘尊忠傳孝繼平生事長見風煙擁戟門一作薦賢正是台衡職桃李何須在一門已丑冬仲三日與宣慰楊子秀揔管髙瑞卿侍郎田榮甫三君子邂逅於餘杭其喜有不勝者以詩留别情見乎辭北來冠蓋拂吳雲試計分飛動十春意外論交緣義重天涯相值更情親放懷樽酒難同舊照眼梅花揔可人明日浙江江上去寄聲多逐荔支塵下大安嶺俗云分水嶺宿霧霾山苦未收馬衝寒雨下關頭紅雲軟腳揮三爵碧玉攢峰湧萬丘日月麗天從北轉山川分水盡南流漢家聲教今無外誰遣氣妖孛斗牛時汀漳州鍾冦作耗未平故云三山元日臺爇天香簇絳紗三山簫鼓樂年華竹枝歌後多淫祀燕子歸來識故家荷鬢閙粧餘翠貝𬞞盤勾飣雜魚蝦殊方風物雖堪賞爭遣衰年客海涯贈之問泉尹福州庚寅三月草一日作社燕秋鴻十載餘天涯邂逅兩臞儒九遷論秩心何有百折當機氣自如喬木故都思往事月明滄海炯遺珠春風回首桐城郡時訊平安見簡書一作小書送李司卿輔之北還名天祐安次人同年御史也今為户部尚書憲府乘驄憶舊逰白頭相見嶺南州地連瘴海三山月人在元龍百尺樓此日又驚成契闊異方誰與慰淹留交親若問衰年况夜夜秋瓜夢故丘庚寅春三月與張參政獻子李司卿輔之會飲九仙絶頂其道室榜曰滿目雲山四千里外同羈旅三十年來老弟兄樽爼喜陪今日宴江山難得晚來晴巖花帶露春容濕醉袖翻香笑語清莫對雲霞説輕舉蒼生料理正煩卿時張參政奉旨料八州民數暇日登道山亭懷古亭在烏石山巔有碑刻南豐記文其上刻鄰霄臺三大字閩會東南控嶺溪斗牛無孛歲無飢文風興盛猶唐館霸氣沉雄入劒池海近重城朝日蚤山蟠平野暮江遲危亭一片瑶鐫在晤語殘陽倚杖時送師彥貞藺寶臣二御史庚寅四月十九日半歲相倍百越東救時人道嚮來驄剱華光動蛟螭匣豸角霜嚴簿領叢明月共看千里隔屴峯回憶一樽同借來不得成偕往目斷三山羡去鴻大中德長老見贈竹輿作詩為謝人老筋骸不自持乘堅䇿駿兩非冝憐師雅意殷勤甚惠我班輿結束竒花底徐行間看處陌頭趍進早衙時醉歸更比籃舁穩一任山公倒接籬贈鼓山長老平楚不下禪床四十年老軒頭角出泠淵久從貝葉傳心印來與雲山結靜緣蘭馥蕙光憎嫵媚竹風松月共清圓荔舟有約重登覽轉首天風恐颯然楚有畫蘭絶句故云庚寅夏四月送二御史回淮安道中即事語知已者五千里外一衰翁八郡規為與省同衆口鑠金方作異諸生鳴鼓欲誰攻寒封老柏常年慘暖借繁葩盡日紅夢到垂虹亭下水雲帆千尺挂秋風遊鼓山五首并序鼓山在閩中為特秀余到官五月王事鞅掌未遑登覽以盡江山之勝逮明年庚寅四月庚辰遂與天平參政獻子大都李郎中德昌御史聊城師彥貞居延藺寶臣提刑東原曹仲明憲􅊷張遂良程舜臣何舜卿來遊尋前􅉀也辰刻抵戒院舍鞍肩輿迤邐而進至望州亭主僧平楚來迓用軟腳例酒數行歷松關由石門入白雲寺適簽省樂公亦供佛來此乃相與禮像殿浴佛於西寮既而飯屴峯丈室眺上方重閣降觀涌泉步入靈源洞度喝水巖登天風海濤亭觴詠間獻子德昌扶㩗上征徑欲造大頂峯足觀紫陽遺刻石礜雲荒中途而返時宿雨濯山林壑爭秀煙霏空翠有顧揖不暇者莫不欣然志歸沖沖若有所得僉曰樂哉今日之遊也吾儕越在絶域縱使重來恐無復此歡耳至元歲月不可以不紀詩亦不當無也明日探囊得唐律五詩俾刻諸亭上以為山中故事峰回路轉已層雲望逺風煙接海門宿靄去收千嶂雨老僧迎勸半山樽巖幽選勝窮詩境山逈登危黯客魂闊絶殊方同大塊坡仙心事強為論筍輿同駕躡鰲􅘡冷帶秋聲入白雲雪竇有禪容暫叩名山無分與平分雲憐嶺斷聮松蔭雨惜題芳護蘚雯會約贊公重借榻鼓音同向夜深聞上方遊遍雨花天洞壑尋幽得壯觀林影蕩空金界闊天風吹袂海濤寒江山若爾不一醉杖屨再來無此歡詩在眼前拈不出碧瀾秋色上層巒杖藜尋壑遊初遍倚檻冥搜興未闌濁酒一杯方大嚼蒼煙千頃要竒觀放教眼界寬無際徑上山椒不作難若欲攀蘿窮絶頂海濤風徑不勝寒復嶺重岡奠七閩鼓山東峙最崇尊嶼亭詩好風濤湧靈洞龍移窟宅存千尺翠屏宜晚對一泓滄海儘雄吞雲煙稇載歸時晚月偃松梢玉一痕道山亭燕集霜簡無華鷙鳥朋追隨飛蓋上髙亭霏霏空翠沾衣濕浩浩雄風拉瑟聲已愧東山空雅志枉教南斗避文星憂來猛把欄干拍轉覺時情未易評酬余招討見贈詩韻秀孕江山氣自靈余君襟度玉亭亭髙軒過訪承佳什世事開談見逺經秋色望空喬木國海商爭避客槎星又聞占籍多隂積一户從良近百丁送魏參政赴邵武時與江西三省會合破賊畫省分麾出越營跳梁黠鼠已潛驚環郊多壘真吾責報國丹衷在此行獸困可擒須急縛民安無畏是佳兵遙知帳繞生犀地草木風前揔戰聲戰一作捷省郎李應中見示所藏書畫因題其後畫省官書不片間撥忙能結淡中緣吟餘紅藥階前露夢到蒼江月下船鑒定正煩君具眼收藏還擬世珍傳古人巳矣精華在時復橫披一灑然八月八日雨中書懷自到閩中十月餘老懷未省兩眉舒命緣限蹇行多拙心與時違意轉踈夜枕有蛬妨睡思秋空無鴈繫鄉書桂香簾幕中秋近愁對清輝憶故廬小樓秋望其下即福之西湖芙蓉吹老白蘋風隰有遊龍草有蛩湖水巳翻寒日影火雲猶作夏時峰清時還負無能責老境其如所事慵推放小窗間寓目秋來無物不愁容景聮一作時方多故增心苦人到髙年所事慵寄紫山憲使去冬相從入臺參君任平江我更南不惜殘年趍海嶠擬將風義壓煙嵐得時可進成虛步縱説知難到強談歸見紫山如有問此身于世百無堪景聮一作碧雲暮合人千里白髮愁多雪滿簮秋雨秋暑燔空勢莫禁西風吹起傳巖霖驅雲湧海連三日潤物回枯抵萬金火傘炎收閩嶠瘴煙螺重拭越山岑􅗈𩃱未洗戈船甲愁絶孤臣一寸心御史陳君濟來知紫山病告巳滿浩然北歸余以微官自絆留滯閩中未卜歸期定在何日慨然感而賦此南來同仕君先往自絆微官固可憐書考巳甘陽子下著鞭又為祖生先碧雲暮合人千里白髮愁攻雪滿顛去去吳江西下路姑蘇臺上月空圓寄參政何公黃閣年來相業多忠腸輸㵼略無他物情雖異歸包總鼎味能甘賴燮和客子逺聞欣欲舞海凬何慮偶揚波時草竊蜂起故云殘年喜見升平事歸老田間儘浩歌寄左丞馬公黃閣清風相業多漢家機務到賡歌默涵羣動歸包總力贊孤卿罄燮和春草間嘶炒塞馬秋霖行洗越船戈古今多少調元樣丙魏聲華未減何即事耳聵瞳昏久病翁暮年遊宦又閩中一旬好快無三日百計隨人到五窮每署細銜慚已曠雖無私過亦何功揣量薄分冝歸去免著通人笑未通卧病中即事萬慮消磨只一身一身猶為病邅屯老叨才助脾神喜濕熱還攻眼力昏𬞞飯半盂嗟強食物情千變苦難論前期七十都能幾更有何心到競奔即事地僻天荒自一方江山環瑣瘴煙鄉炎涼失節人多病徑躁難馴俗返常媚竈王孫方怙勢背時郭老怎當場欲行莫克行還阻乞取間身且六藏芙蓉平生不識翠苞纎真色還欣到爾瞻嬌綻葵芳無兩樣閙裝橙葉更多尖一溪野水明粧鏡滿樹清香拂繍簾開謝巳甘秋色晚碧桃紅杏我何嫌卧病吟四大尋思孰主張百般調護不康強火頭孛尾方為􅑂肝氣脾神互見傷秋月欄干吟袖冷曉煙庭户藥鐺香夜來一笑伸眉喜夢裏分明到故鄉閩中即事誰作新詩採衆謡八州淵藪萃逋逃蒼煙滿樹驚梟嘯白日四山聞虎號取辦急徴農最苦仰空哀訴彼何髙內姦不止終多寇鬪敵徒教殺爾曹為官軍民義八月十八日野奠回入西湖開化寺廪祿已沾三品料浩然歸志苦遲遲宦情老去無多味花樣看來總背時林下冝尋歌鳯侣澗阿間詠考槃詩免教方寸為形役惆悵終年抱獨悲送趙提舉仲逺職滿還江西眼中薄俗日紛紛信厚如麟見趙君學館久淹雖散秩士林輝映總多文三年提調無遺育回首歸飛隔暮雲忠孝堂前秋色好淡煙吹滿泮池芹即事人微職峻作提刑正似禪僧放海青癡坐久為山鳥怪急歸巳愧草堂靈甕邉吏部方酣飲澤畔靈均謾獨醒樂得便行無窒礙雲間髙躡鳯凰翎悠悠心事欲誰同甚是留侯智與功幸有釣舟藏夜壑免教官事縛微躬旬多病假慚虛位獄有繁冤謾熱中穩送布帆無恙去小樓非夜有東風謂諸君津遣也西風吹老一川秋劒水東南送客舟寒鷹逺賔方漸陸野鳬群聚正乘流飛鳴聊欲伸吾志飲啄非徒為食謀通塞既知皆素㝎平泉何為志窮愁題建寧府建安堂壁郡名改自炎興後官寺多從五代年草木不知黃落候江山渾是寶嚴天風時兩若回天漏味厚泉甘覺氣全城府自來多險隘髙蹤誰躡漢梅仙謂東山稱梅隱云梅福嘗􅋣於此子孺腹疾良愈謝全王二醫官全名立夫王名貴和喜向醫林得二髦河魚為祟免憂勞調和臟氣事為切護養丹元論更髙曽未浹旬收勿藥併軀二竪不容逃難忘最是真誠意答荷千金恐一毫活庵方伎若為髙濟物心均不伐勞子孺病來方作祟脈源看處弱于毛臨機制變元多算勿藥收功大可褒自是理明窮隱粵不緣潛授老龍韜非大韜之轁蓋借用孫思邈昆龍所授之法也贈三衢儒醫徐登孫升伯徐卿奕世傳醫學道濟衢人蔚有功方自千金開壽域胘非三折見良工經橫烏凡筠籬靜門掩朝暉藥竈紅我似病梨無可賦略煩料理少陵驄又題石橋山龜阜煙霞小有天半空竒絶石橋山蒼龍背倔雲千疊寶月光涵玉半環當局仙人間遣興爛柯樵子不知還一樽醉上山翁馬却逐流紅到世間繼李昌道見贈詩韻以寄當年𥘉識歷亭仙青眼相看意愜然把臂喜談天下事洗心如聽玉琴絃時文變古多君雅逺馭長驅並我先北渚風煙儘瀟灑興來詩思想無邊遐觀享南劒州揔尹張矦所構閩右江山第一州危欄髙倚九峰頭大書快覩凌雲榜神化空驚躍劒舟冠蓋送迎無少暇風煙吟眺暫相酬曉涼多趂薔薇露醉墨淋漓想未休九日南劔道中龜山山長林元甲和韻有云万里好風南去鴈兩溪明月一歸舟颯沓弓刀入劒州登臨髙出碧山頭松風度嶺吹紗帽煙水漫溪送客舟萬里故鄉今得往一年佳節儘為酬滿樽渌湛茶洋酒空對黃花一笑休憫雨呈幹臣詩友四月十一日作時闔境祈雨天人消息兩交通和自羣情雨意濃一旱汔今幾五月四民作苦最三農雷燒赤尾空飛電雲捲黃頭又變風傳語龍棚棚下客孚誠終始要相同嗷嗷羣動日焦枯何處癡龍睡未蘇穀未見苗耰可望麥方含實勒來無九關變豹無餘藴百郡承風恐失圗試手天瓢儻微吝斯民斯苦果何辜和錢神詠幹臣二首解毅開難到處行雖云銅臭最關情世緣利益稱泉貨時便流行托楮生武子矜豪編竟埒魯褒貽笑愛如兄細思最是通神處買盡人間事不平巨室權門坦蕩行反於窮薄略無情散飛庭樹來無迹汚濁羣心到處生取象有天還有地縱貪無父亦無兄存心思革交征弊何處銅山剷可平芭蕉扇輕箑如蕉一樣新楮衣筠骨製來勻隔窗雨落驚真葉灑面風清來故人嘗羡楚材為晉用却嫌紈素化緇塵會當柄在調元手與播南薰解愠民近讀夜永不寐等作覺清而頗寒吾恐傷中和而病吾子也因復繼前韻假辭而薰炙之亦朝輔之擬騷之遺意也幸笑覽燭影紅搖夜色侵香添菱葉鬱重衾鳯琶調軟歌能合竹葉杯深醉易沉緑鬢追歡燕市樂翠幈歸夢越江吟平明剩買扶頭酒不向諸兒計槖金夕坐虛窗夜氣侵欲眠還未擁孤衾書因倦讀從燈暗物不攖懷任思沉肥遁世髙雷子節清貧時見曲山吟舊遊相望成三老既老能間抵萬金和曲山覔菜詩韻鼎餗藜杯一槩平見君胸次匪瓶罌屢聞飯糗同鰥舜似要矦封號頡羹靈府天和流玉薤露盤詩思霮金莖腹腴蹯脆皆吾欲二者難兼恐物情貧富因君嘆不平食前方丈對羸罌一簞雖具黃糧飯滿豆長空碧澗羹甕料不聞波底語秋光時見鬢間莖細思清苦多吾輩愈見蒼蒼責備情和幹臣詩魔韻倦懷欲罷不能回啾唧咿嚶雜嘆欵清禁事嚴微服入華山峰好倒看來禁持作祟非無謂狂斐緣渠不解裁島瘦郊寒遺像在至今追想日悠哉詩家何苦似魔為逺紹傍搜沒了期鼓舞有舒還有慘禁持似醉復如癡鼎邉苦思多窮夜江上冤魂獨語時伴老此生成底事乾坤清氣幾人知睡魔和韻醺然一氣熱相纒不是晡時即午前臲􅑶枕丸無所濟昏眀心境陡相懸見侵多自群疑後澄治無如一敬先不羡老歐能善變化為鸜鵒舞翩翩欠呵舒挽速如神不是愁縈即思棼釀就黑甜濃有味撓昏靈府黯無聞魂遊纒老三峰客茗戰摧空七碗勳經事不為渠所泥邊韶便腹見多文和幹臣齒痛詩韻硬囓豪餐養老叨先生編具若為牢熱流支脈知來漸痛拔孤根訝許髙縱使舌存冝晦默更堪心苦恣燋勞休休事事從輕減急手先須止濁醪折齒吟自慰朝來齒折五神驚勢若山為朽壤傾缺豁醜於韓子態嘯歌妨盡幼輿情病根何益華池漱五色空傳幻術生駢潔浮危雖自取丗間何物不虧盈適見揔府應詔薦章偶得一詩庶明鄙意呈幹臣齒牙缺豁雪蒙頭更有何心接俊遊一自詔條頒雨露盡催遺逸起林丘韞藏櫝玉知無限刻畫無鹽最可羞經濟斯時公等在此身天地一虛舟寄胡紫山提刑蒼顔白髮兩衰翁前歲將翔馬首東常喜笑談猶不淺靜思行止略相同閶門凍鎖連江雨瘴海炎吹發屋風兩地生還幸無事更何心到炬蓮紅寄六祖真人涉丗筋骸百不堪只堪打坐老書龕視難逺矚目全眊聽不能聰耳謾耽臂痛帶來梅嶺濕心煩漸染瘴江炎客來問訊承佳意蓄縮其如向老蠶五月八日同幹臣遊耿家池上局促城居鶴縶籠祿荷池上暫從容花明淡灎池光外詩在扶踈樹影中老厭宦遊追俊彥天教間處著踈慵日斜尚約遲遲去散坐髙槐灑晚風和幹臣山居細想山居有足論既便嘉靖不知貧霜封幽谷收朋栗水漲前溪送束薪茂樹坐移隨所適良苗耘罷見懷新隱居不見求髙意千古淵明最可人景聮一作樽酒相勞鄰曲厚樹林交蔭鳥聲新山中有樂試為論石上無禾未是貧溪隔圃田多滯穗霜催林葉自添薪醉談有味漁樵熟野飯加餐筍蕨新大朴散來非復古隱居永志果何人一作半道間談留苛蕢隔林孤唱聽樵薪甕芻春釀雲腴舊園摘秋葵露葉新朝呤樽湛芳醪􅽼夜話爐煨紫辛新遠壠秋餘多帶穗中林霜後半蒸新時耕白水親秧稻日斫青山白負薪隱仕𥘉終絶異論淵眀憂道不憂貧比如違巳心交病何似行歌自負薪意外風波平地險山間煙景四時新此生只向黃塵老笑煞羲皇向上人和幹臣以目疾詩相警老來襟𫀆百無圖遮眼唯便幾業書不爾心神渾散漫豈知目力陡乖踈晚年愈種玄花盛平日豪吞緑醑餘氣習屏除元易事急須顛倒坎離居常倚精神壯未殊有時豪飲痛觀書形骸未化無非苦寢餗其間敢自如赤貫瞳人昏若蔽濕留肩井冷難除人慿手眼今如此更有何心望玉除時往往傳余有翰苑之命故云掃晴婦今年夏六月初方雨几六日不止前去秋節止草三日亟晴秋種生發能有幾日又諺云秋后一十八日百粒不結巳種者為雨所拍艱於出壠方種者􅡡土粘濕不易耰作兒子輩戲作掃晴婦懸之前簷明日開霽因作是詩以見其意云淡粧烏髻緑衣衫一線髙懸舞畫簷笑著苕枝揮素手盡驅雲影入蒼巖掃晴既出兒曹戲指日何殊艾子談百穀近秋苗未立羲和先斂壠頤粘江山萬里圗勝覽何人作此圖雄誇天險亦區區經營意匠羣工上慘淡風煙百戰餘並轡相夷嗤宋魏舞干來逺美唐虞只今一統無南北正要懷柔謹厥𥘉一作指顧漢封真采聚追奔秦鹿此山虞江山列地出新圖限隔東南見奧區與校廟謨雖有間細看邊備到無餘忌功去介甘捐蜀併力亡金笑假虞千古美芹髙議在不應成敗論終初喪馬和幹臣韻大夫而後不徒行為罄囊金市此乘耳削秋筠分額髮臆團孤月映鉤膺長鳴尚憶看雲立論力空懷以德稱得失塞翁深領會天教間坐看飛騰過郭璞墓墓在金山西北大江中流亂石間有叢薄鴉鵲棲集望之如蒼雪者蓋鳥矢也青囊書祕造精深葬法人傳冠古今一死秪緣撩虎尾孤墳何故葬江心師從鬼谷冝多怪山湧胥濤不寸侵丗傳江雖大漲水不及墓我特回舟酹公去翻翻寒鵲落蒼岑一作舟過亂灘無所見寒鴉蒼雪滿崎嶔佛狸祠在瓜洲城江山照眼舒清眺千古興亡墮眼前瓜步市長連野戍佛狸祠古慘荒煙柂樓看取平吳日父老空傳飲馬年此日不須開濁浪好風都屬往來船即事三詩奉呈幹臣明府詩友辛卯六月草六日作鯀殛苗夷併放歡九官相讓濟時艱閭閻有喜科差少煙火全踈傳舍間雨澤潤寬無逺邇詔條恩溥到惸鰥聖皇撫御超前古慶曆元和未易攀恩書一札變虞歡盡革前非免後艱星影不搖天宇靜邊庭無事羽書間震霆摧惡無留枿霖雨思賢到有鰥若把古先相比擬周成唐憲敢躋攀占法云民勞則天星動搖巖廊吁咈處工歡萬死猶難謝世艱向奉御秃列死先今野貍瓜嚙其膚今相哥自請死同秃列若交汝便死天下人謂我何為念民碞深顧畏自裁書詔盡防間求賢不啻飢和渴發政常先寡與鰥蟣虱小臣雖片善一時鱗翼盡期攀今嵗自二月至五月凡雨降詔條皆出自聖裁韓齋小集呈幹臣詩友辛卯十月十日十日秋霖不出門偶同黎杖步城根故人雅有平生好尊酒時陪一笑溫野菊翻香忴晚節露􅌲團蓋任朝暾暮歸欲乞天孫巧却歎儀曹是妄論送同仁甫之任武陟寬則民輕猛則殘化行州縣固應難紀綱綜務見常操臺閣推勞不素餐能使弦歌千室樂何憂風雪一家寒來辭請益吾何有一札恩書與細看秋澗先生大全文集卷二十
