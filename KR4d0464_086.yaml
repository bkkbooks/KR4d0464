  text: 秋澗先生大全集卷第八十六烏臺筆輔
  hash: sha256:1bf2f319d5a7fdaa251cd78ee33bb2f0ca205ab66a47a732e972a897274cb21d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_086-1a}
body:
  text: 廉平章廉能合復用狀蓋聞進賢受上賞蔽賢蒙顯戮古今之通論也伏見中書平章政事廉希憲忠誠衛社孝友名家久侍禁闈常深委仗而又疾惡如讎進賢若渴爰自中統𥘉年奉將天威仗鉞陜右其奮不顧身弭伏禍亂致寬西顧之憂而謀猷忠壯蓋素所蓄積也及歸治裝琴書之外一無長物可謂廉矣既而平章中省前後七年益勵忠貞之節殊深端揆之方其於贊襄不為無輔邇者罷政就列秪緣新制不聞過愆今也未及踰年卧病數月生理蕭然恬焉自若雖斛律光之忠亮無他魏髙允之清苦自守無以過此誠清白之相乃有為之材也今年方強仕似未冝置之散地使後事功方今川蜀未得其人襄陽旅拒不下儻起而用之使當一靣必能收取實效不效則治某以冒妄之罪誠所甘心焉乞尚書柴楨北還事狀切見雲南王府衛行六部尚書柴楨賦性良能為人簡重嚮捴西曹殊深雅望久承簡在之恩冝處腹心之地自居大理將及五年今體訪得王府既還無所事事至於彼方上設宣撫下有𬋩民等官仰賴天威足以填撫其柴楨等一行官吏草餘人似不冝久置遐荒坐老志莭使智能之士不得樹功業於明時誠可惜也近又於奉使張庭珍處問知本官身雖無恙鬚髮盡白乃心王室無日不在興言未竟涕泗交零中外聞者莫不慨嘆昔班定逺哀請臣不敢望到酒泉得生入玉門關足矣古令雖殊其於臣子戀闕之心一也兼楨母在堂年逾八十使母子形影相吊於萬里之外又可憫也伏惟聖朝以孝治天下如楨者儻蒙矜憫詔賜北還如是豈獨不遺材於絶域抑使忠孝之道得兩全於君親亦激勸臣子之一端也論髙明奔母喪事狀今體訪得户部貟外郎髙明為母訃至巳經詣告未蒙明降輒即奔赴致省堂怪責遂差官馳海青馬前去追鎖似欲以違錯加罪為此參詳得若以公廢私純孝之人難以存處若因孝獲罪使為人子者聞父母之喪皆不敢奔赴是有司教人以不孝何以法為唯其兩者之間未有定例使澆薄之徒轉無顧忌孝行之士愈惑所守照得舊例斬齊衰三年者並聽解官其品官任流外職及吏貟司吏諸局分承應人遭喪卒哭百日令復職願終制者聽聞喪者並聽奔赴今凡諸職官遭父母之喪其有告詣奔赴及願終制者如抑不從恐傷孝子之心伏乞省部比及通行定奪巳來合無量職務繁簡權冝定制或以卒哭為期或見新月復職外據自願解官終制之人一從所請兼憲臺以肅清風俗為首務而古者明王以要道治天下無重於此據此合行具呈彈周咬兒羅魏子等事狀伏見近緣災異減斷囚徒所以詳刑用回和氣故選差朝官宣明至意審理冤帶惟恤惟欽期于允當今體察得某人處心殘忍悖法亂行以重為輕當出復入如滑州周咬兒打死馬大事詳其造意止緣將妻枉道慮有非為曽不詳審詔條輒以圖財論殺又驅奴孫佛寶并妻羅魏子於淇州郭家店內同謀親手將本使王二殺死雖佛寶在逃未獲其追會準服巳是完備自合依奉詔條準酌舊例不分首從論決却將羅魏子止同雜犯決訖四十七下分付本家收𬋩切詳二事既垂寬大之恩尤先重輕之義足見處心邪枉悖法亂行非唯返戾天地之和氣使魂冤魄苦生死兩傷胡可追悔據逐莭事理大屬違枉合行彈劾乞依法論罪以慰死者論左丞許公退位奏狀臣聞賢者化之本雲者雨之具得賢而不用猶久隂而不雨也伏惟中書省禮樂刑政紀綱號令之所出誠朝廷之大柄中外之繫望也丞轄之位不冝用匪其人使曠天職伏見左函許公衡師心大學飬氣至剛獨立危言清苦自守挺然有蹇蹇匪躬之操方之古人不可多得且自立中省迄今十有二年前後相臣如衡竭盡者多矣未若許之切直敢言不以榮貴為心者本官正以遭不丗之遇當有為之時十餘年間恩禮隆重爰自布衣擢置相位計其𥘉心有盡瘁報國而已然自輔政已來雖中間有所建明未聞以次施行者以謂處任重責深之地無涓埃輔報之功夙夜思惟自慙焉用是憂惶疾日增劇今者恐久妨賢路故卧病不出哀懇求退至于再三揆度其情恐不特血氣為病耳伏惟皇帝陛下聖智天臨明燭萬理求治之心亟若飢渴一旦得臣如此夫復何求且君聖則臣直虎嘯則風冽氣所感召理之固然若是則國家之福天下之幸也如左丞許公者伏乞時加體貌置彼論思庶使展盡底藴以答恩私其於謀王體斷國論必能進盡忠言有所廣益以慰中外之望誠未冝聽其去位以塞忠諌之路也臣職當言責觸冒忌諱惟陛下留神省察論司獄官合行條理事狀伏見比者隨路設置司獄官三十余貟其品與祿不為微簿足見朝廷重惜人命哀矜庶獄之至意也又照得省部即目以五事考課親民官政治能否獨不見降到獄官合行條件切恐中間不為用心勾當有名無實緣狴犴之間人命所繫若未經鞠問及抵法以前或因病失所非理死傷者其間縱有冤濫當宥之人胡可追悔此與殺之何殊檢會故典漢宣帝地節四年詔曰今繫囚或以答掠及飢寒瘐死獄中者朕甚痛焉其令郡國歲上繫囚若笞掠及瘐死者丞相御史課殿最以聞今卑職參詳隨路輕重罪囚一歲中不下常有五七百人且冬夏二季又為苦月其或溫涼失所飲食非時藥不當病非理死傷者固亦不少今獄官雖備恐只以無合行條令罔知所恤不過囹圄約束卒吏無致踈虞而已如此是與朝廷矜恤至意大相乖違徒月費俸鈔飬間人資歷也此與不設何異以某愚見今後兩省冝酌古準今講究獄官合行條件使知所守定為格例付下各路施行如本官任滿日仰總管有以憑考較優劣復令按察司體察相同申臺呈省用之升黜以表能否庶望獄官任內盡心勾當不致非理囚禁因循損傷人命上以副朝廷哀矜至意下以感召隂陽之和以消災盩之氣亦聖代善政之一端也外據囚糧醫藥燒燃窠簟等物所在官司須𬋩按月依例給付却不得因而致有闕乏據此合行具呈太廟行禮蚤晏事狀切惟祭禮以嚴敬為主兼質明行事清朝而徹古今之通禮也伏見今歲太宫大祀自十七日夜二更已來行禮至明日辰時才方罷徹計其漏刻幾干一日以致老者不勝其疲壯者委頓于地所謂有司跛倚臨事雖有強力之容肅敬之心因倦怠而不存于中矣且祭而忘敬鐘鼓玉帛似為虛陳彼執事者却因怠失儀從而得罪是又不可甚矣參詳合無將見行禮文令尚書禮部與太常寺官重行講議中間節文輕重升降遲速因仍損益使各得攸冝以新一代之典永為定例則禮容精意兩有餘裕顧不盛歟據此合行具呈乞權免大名等路今秋帶納中都逺倉腳錢糧事狀切見大名彰德衛輝懷孟等路蝗旱連年闕食者衆嗸嗸告困至今不絶即日又令五路百姓起運官糧千萬餘石限十一月終赴新城交納每石雖官支腳價二兩二錢其實難以繳計據各路所該糧數官司盡行樁配民間轉令顧腳般載今體訪得每石不下五兩有餘才方可運一石兼大河以南千里蕭條人煙斷絶人牛車仗冬月寒苦至於糇糧芻料又須負戴往返三千餘里其間生受姑置不問而近倉稅石及帶納中都逺倉腳錢糧數亦依常例三限𬋩得依期閉納如此督迫人難何以聊生參詳上項事理除官支腳錢外每石百姓又費二兩有餘今略舉大名見運四萬五千餘石扣算據百姓餘上所費二兩之數且該米兩石為率是使百姓已納十三萬石到官比附本路逺倉腳錢糧數四萬九千餘石巳出一倍之上今者更要百姓帶納之數委是重併以某愚見合無將今歲五路帶納逺倉腳錢稅糧權行蠲免外據近倉稅石更為寬展限次送納且令百姓併力以供新城陸運庶優於辦集且兵法有云國之貧於師者逺輸逺輸則百姓貧由此而觀當國計者誠冝深思逺慮念逺輸之勞傷百姓之困使民力有餘不致展轉靠損貧乏似為便當舉崔國華充省掾狀切見樞密院前官吏人等往往以貪墨敗黜其令史崔國華者練習吏事通曉譯言既愼所守又以能聞自照刷來隨房例有違錯而國華無一事經問者其掌行簿牘精詳舉皆可觀切詳身居吏職能自振潔夙夜在公罔纍所舉史丞相保理冝加異以勸方來合無將崔國華轉輔省掾儻試諸難可收實效非唯於廉汚之間黜陟並行抑亦明公道而勉事功也論明經保舉等科目狀今體訪尚書省批送禮部同翰林院官講議科舉事省擬將詞賦罷黜止用經義明經等科其舉子須品官保舉之人然後許試夫如是恐事出非常中外失望切惟科舉之法上自隋唐迄于宋金數百年之間千萬人之衆講究亦云詳矣如餘科或廢獨賦義䇿論取士而不去者蓋以經史道備格律精當至公無私而又可常故也故前人目為將相科如宋之韓范歐冨金之髙石俟胥皆其選也其保舉在宋諸公雖曽建議令官舉歲貢以三百年尚文之丗尚莫能行况㩲輿於今日乎參詳若依上項所擬將見公道掃地關節大行上下成風相率諛偽其弊有不可勝言者矣且品流之人若果實人材雖出一切科目不害為通使特逹之士何獨詞賦無益於學者治道哉至明經設科正使天下之人舍精就簡去難從易不出手抄義疏口誦集解心熟箋注其規模不出帖經口試殆童子答默義之法耳至有兀兀窮年白首一經餘不暇及者必欲絶去箋疏斷以巳意使微辭奧意超越於道學諸儒之上亦巳難矣由是而觀返不若賦義之淹貫經史扣擊諸子辭理文彩兼備之為愈也故唐人有進士百一二明經十二三之謡宋人亦云焚香禮進士徹幕待經生足見經生為易而進士為貴為難矣此王安石所以創經義而革明經之輕且泛也外據保舉等事論者不過士不官舉雖盜賊倡優皆得舉進士則賢不肖渾殽無以别矣曽不念亡金舉法如十惡倡優好盜充吏犯贓至徒等人明有結罪條理儻舉而行加其詳密可也不然則草野遺賢閭閻寒士桴終身陸沉不復進用於明時矣且以故事考之又有甚可慮者昔唐揚國忠子楊暄舉明經科學術荒陋文不中格禮部侍郎逹奚珣畏國忠權勢遣其子先白國忠云郎君所試不中程文然亦不敢落也又楊汝士與錢徽掌貢舉段文昌李紳各以書屬所善進士於徽及榜出文昌紳所屬皆不預焉及第者裴度之子李宗閔之壻楊汝士之弟或曰今歲取士不公皆子弟無藝以關莭得之上命王起覆試果黜十餘人貶錢徽宗閔汝士由是而觀其明經保舉亦有未便於時者兹非明驗歟以某愚見其詞賦冝公然集議不可遽去其保舉之法恐行不克終徒為紛紜之變耳當今之務惟以多得人材以備任用為急據科目之先後人材之速得巳經具呈建國號事狀伏見自古有天下之君莫不首建國號以明肇基之始方今元雖紀而號未立蓋未有舉行之者是大闕然欽惟聖朝統接三五以堂堂數萬里之區宇垂六十年大號未建何以威仰万方昭示後丗愚以謂國之稱冝下公卿大臣及五品以上官集議闕下則天下幸甚彈西夏中興路按察使髙智耀不當狀切惟按察司所行輕則彈劾姦邪重則抑按暴亂為使者務要剛明知體臨事有為故風彩所加百城震肅今體察得西夏中興路提刑按察兼勸農使髙智耀資性罷軟不聞有為事佛敬僧乃其所樂迹其心行一有髮僧耳既乏風憲之材難處搏擊之任兼河西土俗太半僧祗𥘉聞智耀來官已為望風輕易故理任巳來所行淹阻略不見憚欲望宣明教化問民疾苦鎮靜一道難矣哉如近者習良和尚等事此其驗也合無别選材能以代厥職不然雖復别有區處既非其人恐終不能震疊不惟虧損朝廷威重使五郡冤抑之民一經赴訴彼強暴者加怨前時而平民轉罹殃咎其或使之強為因而别生事端尤為未便參詳至此擇人而代似不冝緩據此合行紏呈論立睦親府事狀書云平章百姓以親九族此帝堯致治之先務也今國家聖子神孫碩大蕃衍維城維藩固若盤石冝請立睦親府選懿親中尊王之賢重者一人判大宗正事使之敦睦宗屬奉承王命庶幾於變時雍民德歸厚矣論屯田五利事狀南北之勢我可以取後此必然理也然饋餉轉輸古無良法正有屯田待以歲月為古今上䇿耳朝廷往年已曽施行不數年積穀幾至百萬若行至于今其利有不勝計者蓋兵足食民無轉輸之勞邊有備官無和糴之弊兼自古議征不庭莫不留兵在田而後收必勝之道今者宋人出沒不時止恃山林阻隘雖云深入如涉虛境今者如復令邊民分地雜耕上自鈞化下至蔡息不數年剪去荒惡蕩為耕野一利也民則什什伍伍相望三時種藝甲兵在傍彼欲內冦野戰實非所長復欲伺便鼠竊又無潛伏出入之便而復嚴烽燧謹斥候少有警急我則收合餘力據守要害而似前日之冦盜不可得矣彼縱來冦如獸處平野獵者蹙而殺之獲之無不利矣二利也至於我軍征進適當農隙丁力有餘者許隨大軍入討所獲悉付本人是民因私利勇於公鬪三利也又令向裏一切蒙古奧魯亦編間民屯使之雜耕不惟調習水土可使久居且免每歲疲於奔命之役四利也不數年根勢深固使奧魯軍人倒營南下近則雜兩準之間逺則抵大江之北所謂長江之險我與共之矣五利也合無將河南舊有屯田户計及一切沿邊之民盡折絲銀使之輸穀其屯事於山川出沒要害去處首為耕墾官給牛畜自辦農具其條法且一依經略司元行然後選近侍為大司農官及內設屯田郎中貟外專領其事使通其奏請趣其應副歲時令披察司或督軍御史按行屯所察其成否而賞罰之不數年田事可成坐收必勝之道矣論百官集議事狀朝廷大事有疑似未決者當下百官集議漢故事置大夫專掌議論自兩府大臣博士巳下皆得預議以伸已見不嫌以卑抗尊既盡其衆之所欲言然後附以人主之獨斷此漢集議有公天下之意也方今品式未完法制未定事有可行而疑似者冝遵漢故事五品以上官集議闕下各具所見以聞論宰相兼判兩部事狀今者吏刑二部官備吏具專一分治是朝廷委任既專且重切見比年以來選法不定刑名無章黜陟逺近多徇私情輕重死生致傷和氣宜考定新制使宰相兼判兩部以責成效論立群牧所事狀伏見古者將帥以大司馬為官蓋兵以馬為本今冀土雖馬之所出然國朝馬政未遑修舉輿臺皂􅊢皆得乘騎駕車拽碾無不驅用一歲之中消耗不少往年雖有禁令旋復寬弛甚非強兵之道也冝飬之有素立群牧官略取唐制以定牧産之泫再嚴先禁用壯兵威論官買輝竹事狀切見衛輝路民竹緣三十年前百姓培飬以至今日俱係軍民站户倚仰當差兼巳亦數重宣課近年官定四六抽分其實中半曩者園户訴難雖蒙上司定奪經今二年未獲明降其竹因斫伐不時往往枯死若以竹論通合官拘如曰物力與桑麻無異又與懷孟事體不同據園畒不過四十餘頃冝買屬官竹使民無永業之思官有通行之利亦便民之一端也論塞絶沁水事狀切見今年雨水稍作黃沁北泛決壞武陟縣壩閘北與御河合流淇門以下槽岸低狹不能吞伏幸不為患兼今日隄防未修儻值雨潦大作自衛巳東非惟漂沒田廬鹽埸所在有大可慮者以某愚見將元修閘堰冝塞絶之使無後患嘗聞衛土人云金太定二十七年黃沁北泛淹沒州城水至浮圗第一級此先事之驗也論范陽種麥事狀切見附京地寒不可以麥而歲用不啻數千萬斛止仰御河上下啇販以資京畿今范陽去都百里而逺土風冝麥與稻比之秋田冝令倍種外據荒間冒占復許諸人開耕驗頃畒免地租三年及減半力役亦完實內地之道也如關中古無麥今盛於天下者蓋自武帝始也其種稻事昔北齊皇建中平州刺史嵇曄建議開督元舊陂歲收稻數十萬石北境賴以周贍此其驗也督元在今新野縣界論大作水軍事狀征進舟師固未嘗闕然可大作一軍召募兩淮黃河上下等人并南人歸順者兼用其力船艦一依宋法精選大將使之專習水戰建以龍驤樓船之號歲師出水陸並進亦多方誤之之法漢武發會稽歐之䇿也內則浚太液池造為輕舟令武衛軍不時習又武帝伐西域而鑿昆明池魏祖之征荆吳許西湖是也論削去科帖俸名民間科帖摽注俸鈔且賦稅從古有之必斂之以給祿養是恩出於上今者名之科帖曰此官也是民自以祿食廩給非出國家公飬太恩令削去所謂民可使由之不可使知之也論撫治川蜀事狀宋人以川蜀號為左臂謂其控制荆吳上流恃所重者迄今奄有垂五十年殆天之所以資國朝也比年以來雖行臺院然未聞境土外拓户口內增蓋經略撫治未得其人故也以某愚見若有能招集流亡和誘諸羌訓農積穀通啇惠工興起伏利撫存遺黎文武才幹忠義方略者擢以不次許於要害城邑令一切從便行事自非邊城可併者併其差稅課程權閣三年行有實效使丗守其土外據諸蠻君長如能率衆內徙亦仰依上施行軍前虜獲生口不許贖賣將有夫婦及男女成丁者配合作户官為給田每歲量納本主稅石如此待以歲月完實富庶以俟他日順流東行之舉猶愈守駐寨柵﨑嶇山谷間徒費錢糧終無所益取困弊而巳論普加諸王爵號事狀古者封爵或以土地或以勳賢然往往遙領不有其土未若我朝天恩曠蕩均同雨露實有其封以供湯沐其未加王號者合無推恩普議及依制頒降印綬使名實兩全以篤親親之義論戰士有功遷加官賞事狀士須以氣作氣因利以鋭而官爵者國家之厚利也故以加級奏遷使兼今後軍前一切戰士克敵有功者合無驗所獲首級用誥勑遷加散官以作士氣論西川軍役事狀西川軍人俱係山東河北山後户計逐年取要氣力往還五千餘里比至屯所鮮不困乏求其精鋭不可得巳所謂強弩之未不能穿魯縞也近聞平欒軍人巳蒙替罷至於其餘軍户合無一體定奪亦同仁一視之義也論禁庸醫事狀國家以民為本五福以壽為先今民間庸醫及僧道算人妄行針藥民愚無知一旦委命於手至有父殺于前子夭千後終不覺悟是庸醫者猛於苛政也以某愚見除係官名家者流餘者冝漸行禁止記曰醫不三丗不服其藥此之謂也論監選典故事狀監選故事吏部將受除貟數及擬定州縣名職單目付之監察本官但慿數臨視而巳若中間或有資歷先後品從髙下及不應等事許本官陳告御史即推究根因與之改正今者監選合無依舊例施行付之吏部以為定式論置官吏空行簿天下重事無重於州縣得人果得其人臺司何憂不清州縣何憂不治今按察司既立請中書吏部具各州縣見任官吏姓名為空行簿所至州縣先暗行躰察然後遍見官吏一一詢考政績得其公廉勤幹者明注實狀於簿其衰老無能顯有不治之迹者以朱書書之其有中人之才雖别無竒效亦不至敗闕者以墨書書之又有雖是常才能專長一事亦以朱書書之還臺具奏以聞然後付之吏部使升黜輔充之際可以坐見群吏賢愚能否不遺一人則天下之才昭然可得矣論益都括出新户事狀益都路括出新户不下萬計俱係貧難老疾分房驅丁攢合作户今秋又值水災比之他路重致因乏若向前科差必避匿逺竄不幸更值災傷展轉流死别生事端非國家之利也以某愚見冝令按察司從實檢覆果堪户計猶冝存恤其不成户者並聽作貧難收係似為安便論品官得上封事狀五品以上文資官如遇赴闕授除據所𬋩路分內有利病當興除者得上封事以聞其條件大不過三小者五事而已正本上中書省副則呈御史臺庶望下情得以上通而無壅滯之蔽非唯少見人才優劣亦且知任內有無盡心勾當論立國子學事狀切見朝廷選近臣子孫聰明者付之省部間習政務或授之儒生講誦書史有無立國子學使學士院官及選通逹政務一人專領其事論嚴禁好細事狀方今宋人規畫止是內嚴城守外用偵謀遂得事情預為備禦故師出不能大有利益以某愚見急當禁絶人入境將沿邊地靣令軍官上下分掌不時巡邏萬一透漏其當該人貟同知情治罪舉關仲修事狀詮選刑名最為重事先為選法未詳已擬丁某充貟外郎勾當其刑部亦冝選用舊人整理審定切見在都關某係前朝刑部令史練明法律通逹書史年德俱髙冝蒙録用不然取宋故事立審刑院使掌理其事論交參户土著事狀交參漫散户計本𬋩上司差設㩲府提領招撫總把之類另行𬋩領中間不無侵擾使失業貧民轉致困弊今後似此户計合無令見任官司收係上著元藉路分推送除豁論立聘財事狀男女居室人倫之大者也比年以來聘取無法妄增財幣使貧家失娶嫁之時今後合無酌古凖今定立常數庶望內無怨女外無曠夫春旱請祈雨事狀古者龍星見而雩雩者四月禱雨之祭也即目已是立夏氣序乖和暑炎驟作今體訪得自彰德迤北至都去冬無雪經春不雨二麥巳枯春種未下至於大興部內雖雨降數次多者不及二寸切恐蝗旱反成災沴民事之急無重於此據隨路闕雨去處合無令有司擇日行雩祭之禮為民祈穀其於農政實所先務據此合行舉呈論倉庫院務官除授事狀舊例倉庫院務皆係流外官除授今者一出人情賄賂其以賄得者取倍常為心其以情得者務賂遺為事以致往往失陷賊濫而敗曽無愧惜今後合無依舊例據見勾當人貟定立資品依格遷敘使人人以功名為心其弊不革而自去矣論監選事狀欽奉聖旨條畫內一欵莭該應合遷轉官貟如任滿不行遷轉或遷轉不依格者委監察紏察仍令監選欽奉如此近委某監選伏見中書省奏奉到聖旨中統三年無腳色官貟盡行委用據告敘承襲等事省劄亦有定例其一切求仕官貟各有自來根腳及本路總府保申文解所當問者升降不等資品不應逺近失當言出事定皆在擬注之際今者監選止是引驗臨視解由文字中間銓注窠闕是否何由得知若巳除人貟儻或不應有告言者臨時難以折辨亦恐臺官怪問又知得第一選係監察梁貞監選將解由人貟讀視外驗及將擬定窠闕亦令看讀今某監選除讀視解由引驗人貟外據擬定窠闕不令看讀若不呈覆緣今日格法日新某等監選亦不當守常而不知變至如亡金故事亦是監視注定名數其間公事若有違錯即告監察與之改正又念今日最害事者以情破格以私害公照得欽奉聖旨莭該仍令監選思忖選者一選之事豈有知其前而不知其後合無依第一選通知前後事理似望中間不致違錯據此合行呈覆論舉官自代事狀切見內外大小官吏務保祿位鮮有以廉耻自厲者正似庸工計日取直縱有強幹亦為薄俗所移欲求其公勤忠義竭力以報上者不可得巳其道正須尚廉耻獎忠勤抑僥幸進恬退如樹私黨取常格敘故舊等事皆冝杜絶今後合無令內外五品以下至七品官比及考滿中間須得保舉所知有才行聲迹顯明者一人以自代令按察司覆察才行確實申臺呈省聞奏如不相應彼此俱罪之其舉官在任內或有故及任滿闕貟即令其人輔充兹蓋帝舜九官相讓之法唐朝因之亡金亦嘗行焉今之天下猶古之天下行之于今何獨不可但二三大臣主之當力耳論修起居注事狀冝令學士院修起居注逐旋進讀復置起居舍人郎等官使分掌其事為收復連海事狀專委東路統軍司據元曽攻拔漣海將士人貟令陳説當間方略限以年數專為收復以窺海道入揚州之路論定興􅊢屬涿州事狀切見定興新城爰自亡金係京畿屬邑况根本所在勢無大重合無改正復􅊢涿州論服色尚白事狀國朝服色尚白今後合無令百司品官如遇天壽莭及圎坐廳事公會迎拜宣詔所衣裘服一色皓白為正服布告中外使為定制論百司吏貟並懸書袋事狀在都百司吏人實繁有徒服色既無以别察者又不復知以致往往輕犯禁令今後有無取舊例令吏貟等人並懸書袋論州縣闕𪠘宇事狀州縣見闕𪠘宇去處冝官為起蓋使有定所及頒降戒諭聖訓書之屏風使朝夕仰視知所懲勸論器械有常課事狀器械貴堅強犀利非限以歲月不能如法西漢至昭宣帝間兵甲器仗方得精粹合無隨路置局以常課造作物勒工名以考其利鈍令逹魯花赤不妨本職監視成造每月開申功程次苐上下半年輸納京都論褒獎公能廉幹事狀隨路府官有廉幹政聲自民間逹聖聽者冝降德音特加旌擢論密院置學士事狀樞密院冝取唐故事置學士一貟選六十巳上通逹古今曉暢軍事及明時務知地理儒者充之以備顧問參謀議或有可否許以專逹論今後師出不拘常限事狀今師出不可以秋冬為期冝出不意使蹂踐田苗不得耕稼以成彼邊困弊之漸亦充國伐羌李靖破梁之䇿也論州縣檢括僧道事狀州縣冝檢括出家僧道不上著等人有以妖術扇惑人衆及造作偽金銀者痛行洽罪論均平稱尺斛斗事狀書云同律度量衡帝舜所以資治也今民間升斗稱尺有出入之異往年雖有禁令有司滅裂竟莫曽行今後合無製造法物官為印烙頒降州縣一體施行論軍官以功贖罪事狀軍官之罪重積如北冝許以邊功自贖以攻城略地伐謀用間為上以斬將搴旗為次餘驗所獲首級使相當其冒名影替之數古人所謂使功不如使過是也秋澗先生大全集卷第八十六
