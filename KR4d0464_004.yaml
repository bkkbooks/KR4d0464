body:
  text: 五言古詩遊百家巖四十一韻兩紀山陽城行役凡七過佇瞻百巖雲屢往屢不果亭亭白塔顚望逺幾招我今秋若有相老玃脫籠鎖二三會心友與逰無不可𥘉從萬户門迤邐陟層坷石林轉幽深到寺氣幾耎截雲駭巨屏勢軋坤軸妥天關瞰絶巔黛色潑峻朵三纒上杳冥兩岫巧包裹谷深餘繚曲石怪欲垂嚲何年緇衣徒詩境闢飰顆或疑巨靈斧擘削乃爾硪僧殘失珠寶寺圯驚甑墮寒猿從何來跳踉不能箇近人不少怖掇拾落殘果有草名龍須纎潔豈容涴崖絶不可攀殆似衒竒貨最憐明月泉流瀉不細瑣玉虹貫山透噴灑螭口拖我嘗遊三嵓景氣固雲哿未有此泉勝翕合瑶峪大恍疑神物潛供飲結僧􅮮徘徊醒酒臺石老書字娜憶當沉酣時萬象入眺卧八荒敞庭衢日月蟻旋磨下視區中人冝為蜾與裸復尋淬劒池履巇不辭跛澗黑不可渡悵望藉草坐山僧似嗔余空踏苔蘚破萬槲霜葉丹煆竈烘熾火有懷中散公材大識或麼至人戒其偏康鋭不自挫當時朝右姦如會鬼見唾吹毛不此施淬礪安用那徒為論養生竟落非命禍長歌下山門丗纍訝許夥寵辱未足驚門閭續吊賀吾須人為徒長往非所荷正煩日用間克我偏與頗賦詩約重遊備豫木客和謝王中丞惠柏栽我家西河阡清隂不多植白楊風蕭蕭万葉空戞擊君家乎種柏蒼幹照城壁移栽滿山丘鬱鬱歲寒質丐餘輔不足雅意許波及恣取不我貪廣種庶多得殷勤教之法水土要相適又云樹平壤根柢雜沙䃯蒼官雖鬼庭在木躋壽域恨蟠泉窟深氣接太行碧他時兩喬林黛色看千尺大招逺遊魂納此衆香國百年見諸孫鶻立大隂黑若問物從來渤海王氏出飼牛辭我性本踈拙壯年樂郊居况兹二頃田近在城之隅兩紀官為家耕牛老無餘秋翻巳失計春種烏可虛浮陽漲林埛我甽猶荒蕪傾囊買雙牸典却杯與壷齒歲固云稚野牧多形癯角浪黯無光寒氄躁不濡服來試壠頭喘息久未蘇田家作雖苦大本誠在渠嘗聞老農言力盛出壯軀時時過皂塢付囑飲食劬早晏日有常瑣屑豆與芻均勻細為和回噍皆至腴顧立終所舐對之為嘻吁半生遊宦間代耕竊官租雖乏濟物功遇事多直愚鬪怯公戰勇不知夏畦諛古人發畎畝開務荷天衢有莘伊衡相南陽孔明廬大賢吾敢望耻作遊説徒咄哉奚戚輩販鬻庸自汚百里西入秦炊扅感妻孥養牲五羖皮其志還自如越褐不掩骭夜半歌嗚嗚應憐南山粲中有尺半魚一朝遇霸主立談開逺圖我歌意有在歸來事耕鋤水溢繼旱乾二年儉瓶儲力田漢重科躬耕需壯夫我老理當佚返與若等俱塗霑固不及風日儘瘁枯筋力日衰耗毛髮不滿顱平頭七十數溫飫帛肉須舉家二百指張口待爾餔田間一笑起謀生太區區非關效周人白首悲窮塗庶配耒耜經因之輔叢書種𬞞風人憫東周飢饉何荐臻一飢未為窘二事胡並云當其榖歉時一菜真偏思減粒倍𬞞茹儘足濟餓貧我田在溪曲有圃逾一㕓十年廢不治草暗野井眢飯糗日兩盂舉按𬞞為先顧瞻畫義首日食無幾錢甘受宣父誚課兒斸荒煙嘗聞饉不驚示貶中書堂况我田野人鄙事亦備嘗東家乞𬞞子西家學種方乂土作長塍繚垣為周防劬勞不旬時緑畦變天荒朝來見生意次第青與黃春韭存夜氣夏葵茁屯芒努力辦一飽藉爾為半穰大哉烈山柱齊物心遑遑草木别珍味擴充神祖嘗雨露天地恩水土仍君王智能創而述功用有至藏皇風眇無及庶物昭回光配社德罔極万代詎可忘餞王和之北還王郎自燕來不見凡四載拜起寒暄餘命坐至于再靡然衰俗中持身敬勝怠出言口不能遇事意何慨闌翻譯語詳宛轉刀筆快幾年民部間奔走事多賴負責在人先利心非所在所以郎曹官倚用例深愛朅來衛南鄘治任將北邁為余間著書論説餘教戒探微尋墜緒發源疏九派贈言為至榮在公猶謦咳賤名見諸編儘足光丗代常觀長厚人往往福未艾行矣願所守揚名此無外藝香霏版藉鴈署雜書袋飛翔得所止早夜更匪懈會當長安陌軒翥看冠蓋汲冡懷古丁亥歲三月十八日觀稼西疇遂矣伍城抵安釐王陵下歸作是詩者蓋自江左平後竹書多傳於丗余憂好竒攻異者讀之恐有致逺汨泥之弊故不得不辨云濔迤伍城郡背水猶陳圖魏陵廢巳久磅礴如覆孟草樹慘不春穿穴狐狸墟我來登其顚懷古心躊躇憶當戰國際安釐亦狂且澤麋𬒳臯比坐為秦人驅敗亡自此始保邦何乃䟵不知身後藏安用書十車上窺姒與商下逮蒼周書零亂竹簡光詭説何紛拿征南辨已詳多出行怪徒稽古不適正死為毛頴誣其中亟當辨阿衡𬒳夷誅孔子修六經亦巳防姦汚大書一德後薨葬開亳都在易最竒法安取理所無兹焉万丗程洋洋真聖謨何煩事幽賾致逺泥所趨長歌望陵去樂過風乎雩壽弟監使仲略淇澳望鄧鄙迢迢千里途吾弟官其間筠林辦公租十年凡兩見聚散何須臾今歲乃天幸同歸在鄉閭朝昏對無時談笑樂愈愈春風露堂飲盤餐雜肴𬞞絲竹厭啾聒却去從歌呼曾及兩耳熱仰空作嗚嗚張燈更大白要盡罍與壷都將積年懷一洗中無餘健倒不知曙醉頭同與扶扣瓶得餘醖忘却公堂拸時以事候府下兩宵對牀眠百篇詠徐徐靜聽未容再恍陟西崑墟鬼窟易作計大馬艱為摹吾弟擅所長愈吟辝愈都意圎兼理到韻逺幾風疏宛從尋常中竒倔驚專車又如苛盤露細大皆成珠章郎五字吟花樹欣遊居今夕復何夕香滿先丗廬近復示新作篇篇商起豫玉美韞櫝中得價不待沽倡者凡幾輩賞識風雅殊今者重有喜不為文字娛君今知命年我亦耳順踰素髮各滿領不樂復何如况逄𥘉度朝怡怡與之俱膝下分戲綵朋徒日依於我有一樽酒殷勤三禱渠一酌願君壽金石堅不渝再酌官事利百吝為一攄三酌日康寧神相千金軀貴冨天所與道義我所儲居間未落寞畏塗足﨑嶇家理即邦政繄孝與友于長歌復一杯此外非吾圖揔詩皆漫與此詩吾特書酬紹開提刑見寄嚴韻我老不足畏閉門欲誰親按頭有遺經卷舒無時旬平生未嘗學於焉究彛倫既非目繫者補拙需以勤其或少有得庶浹羲和春吾子四科哲勳名逐時新邇來亦斂翮淵潛思自珍有時縱諧笑傾倒冠與巾豈知寄傲餘落筆摛雄文客來示新作郁郁皆卿雲繫訓狐訓狐本惡鳥飛潛林谷間視夜返為晝聲勢何軒軒矜凶聚妖異其氣幾神姦家僮夜得之縛致庭階前目光爛兩炬狂躍幸一騫群兒顧之駭四走入席眠我因為沉思善惡以氣宣古云鷹集輩不如鳯與鵉以兹惻懚心逺彼凶與殘胡為止我屋夜半呼聲乾女奴前致辝此物何足患西家養巳久逸飛偶翩翻內疑始氷釋念之心稍安𬗟懷昌黎公心炳陽烏丹彎弧親斃之絶類不使蕃揮策碎厥首亦與韓意然長令杖端血著此一線殷比迹孔段笏異丗同不刋起視夜何其斗插西南天蒸雲變曉黑漢漢來輕寒明農亭我田僅二頃近在清水涯宦遊苦不巧歸來把鋤犁樊須披聖闢彼士當有為時有利不利一飢胡可醫士而食其力安分至極冝繄豫事農圃三歲慘不怕四郊氣隆崇澗芼成悴萎釋耒得窮處日坐詩書癡樵蘇甫有積瓶儲復無幾糊口恐不給奚暇卒歲衣明農榜新亭此意空規規有懷靖莭翁起為三徑資分種粳與秫一稔欣有期豈知事大謬折腰困憸微斂裳即宵逝一粒不入頥蕭然環堵間老飢日相持九華安足服嚼句充朝飢士貧理雖常念之令人悲空餘身後名万古流清輝天運既若爾吾道將安之過此或有作殆與天相違感興詩三首中丞子𥘉過訪憫及生事述此以見志亦古人感遇意云不製衣日僅兩杯飯得年過期頥此亦何足羡是非華軒口悅芻豢平生未嘗學晚歲似有見盈望五秉粟禦此飢凍患閉門了一經庶幾思過半到羞澀百計若為辦人生霄壤間所卑恐有限分外思錙銖有力不容綰傷哉道難或拊掌發浩嘆士不吾知胸次何磊落少當利害間鮮有不顚患在無定方多學昧所樂出處况大節未用從人開談話艱辛汝豈有求託譬彼飲與食孰不知飢渴區區俟渠決肥瘠不相腭在我弗能了彼豈吾可校讎天祿閣我嘗讀其書辝旨徒意何有止得寂與寞物來有當行道在吾面事所在俗爭取維抱見售耕韞侯其沽陷入中可為征又昧出困舉須利所有客語豫固宜僂所論誠足門有時且入此室處苦寒昌黎體四年丁亥冬玄冥肅坎治太除包元陽少苦無風色惡積雪不在地隂機發新玄霜佐隆嚴宿助重曀長空浩乾冷於虎甚伯有厲一氣粟生膚酸鼻冰涕酒澤水空破裂山石潛獸忘群巢鳥交倚熒惑慘不芒崑火淡不熾東皇約祝融縮首避權勢天弧弦屢折何有琴瑟輩薄帷透三衾夢凛神不寐暖老玉無憑炙手竈可媚閭巷稀往來雞犬噤嗚吠茫茫堪輿間欲逭何所逝若將肅殺威一變寬大制時當謹蓋藏理合絶掩蔽雖威貴不猛革故不失惠明知勢非恆其奈日增劇冨人尚云哿貧弱胡為濟里門有殣僵穴處返得計我時幸深藏順此天地閉無餐又無褐不易卒此歲有客過豫談歲律何時易九陽消一隂萬象回生意豫因語過客無庸心過亟四序本平分過差自成盩此雖節氣正未免急恆致循環万化輈一刻何嘗滯昨晨履中園芳樹一為睨枯枝雜凍條芽孽巳萌綴都無十日春迎致勾芒祭土牛送餘威斗柄插寅位汝冝姑待之能作幾日崇我間亦已久幽空懷霽偶書苦寒辭又成韓筆贅何當凌景風下折炎洲桂古云玉燭和調燮由獻替冥冥於兩間侣恐不關係天運諒自然何俟呶吾喙怪石辭巉巉荒溪石濁滓疑太古顧雖一拳小岌立有足觀牛神兩顛撑山魍一足拄移來夸娥簷劈截巨靈斧蒼雯裂荒寒老峽翟秋雨千年洪水餘石浪尚掀舞又疑秋江蛟蛻骨委幽渚却愁出雷火下取還洞府要從五色族軒鼎入練煮元精儻不克備豫女媧輔從渠置散地不第竒章譜疇昔一首寄胡紫山戊子十三月草二夜疇昔夢紫山燕集街西居又撑瓦􅏛底一笑春怗餘四顧盡佳客半是髙陽徒紫山正襟坐手把一卷書疾讀且稱嘆照眼皆驪珠乃云某近作商也真起豫吾儕惜無幾炯如曉星踈正須佳眠食善保千金軀别久得一會喜與老嫂俱呼兒具樽酒張燈列肴𬞞觴豫不數行致辝前見揄平頭七十數眉毛雪糢糊投間天或憐有書心使娛又云悼亡來不以再娶圗老懷固鰥鰥宿業一掃除殘年纍幸輕恐是得壽符敘闊夜向深對牀卧斯須展轉寤寐間恍然到吾廬春明煥庭軒門縶雪色駒俸忽坐壤含意若傷道汚彼豈能我凂髙氣𥘉自如體融合若一樂適歸不殊安得自伊始終歲同步趍或乘欵段馬或駕下澤車春風十二窩醉墨翻瓊琚相看以佚老脫屣榮與枯夜寒薄重幃夢清誰遣呼枕邉有鐘鼓鼕鼕應更壷起聽夜何其漏下三更𥘉念兹夢何異自况良可吁紫山俯秋澗玉峰映汚渠固知瞪其後庶可山澤臞援毫記所遇一字不敢渝代書寫離索涸魚聊自濡何當拊素筝醉捋桓侯鬚取其使君不凡之意元日吟深院吒祭餘黎明紛拜賀嚌飲藍尾杯傳嗅辟瘟馤獻歲事多宜晚景福未艾鄉鄰最善禱有錢無病害兒童樂新年添歲漸壯大老人死生忙應接筋力憊元正貴清明其占君子泰多連人日隂野老足吟慨今年天氣晴日色暄可愛相竿絶微風曦取飛火蓋墻隂凍全消水陽氷自壞布席坐前簷欹傾餘醉態一冬苦凝沍乍暖欣曝曬頽然曲肱眠夢到華胥界宿醒與臘嚴融暢無內外放教原壤肆大豁伯夷隘溫溫秦和湯股痹為一差覺來喜不勝嚼有屠門快持美欲獻君癡絶覬霑嗟哉傳生行客從大梁來投刺謁蕙帳再三相之坐氣貌何骯髒袖携一卷詩照映青藜杖起立懇豫觀詩意見推唱傳生南樂人明兩自幼喪聽官奉心君入耳物能狀曖然內含光記誦殊通暢我思篤廢人氣志多散放苟能豢此軀那計非所養傳生痼而卓出入知所嚮不學隂陽流甲乙肆虛妄復惡鄭衛哇耻列師瞽行六經天浩浩義理無盡藏遊心於其問取友千古上古人不復見古心胡可忘古心果云何姬孔乃心將循夫天理公絶去私欲王神光滿牛背安取內外障師傳庶西河爽識或晉曠不吐張籍竒猶可祖珽相丗人非禮視外蔽內隨蕩思屏心過易眼過最難愴一根塵幸空內動息孟浪作詩還自笑示勸隨彼量大匠無棄材長短皆有望文昌藉終譽尺書軍欲張豈知我非韓徒增山斗仰處暑日偶書丙戌歲七月長夏便幽居動靜得交養杜門逺炎囂人事息來往三年謝簮紱倦鳥脫籠網生涯書滿屋泛覽極遐想欣然欻有得忘却折爼饗一涼沐新恩兊治多峻朗殘暑竟餘熾木葉戞清響好風從西來一雨為滌蕩氣骨增老健絺綌颯餘爽赫然酷吏去而得故人訪草木行變衰騷客重悲愴况復迫暮景歲月驚俯仰浮生太奔忙壯志非昔曩時至氣自表心在不忘嚮要資配義剛每戒揠苗長人生老當佚我老事耕壤有田不及蘇開徑謾希蔣一貧非所憂俗事苦紛攘娛心筆輔衮甘分弨居韔兹焉庶有成心體日胖廣窮兒即暴冨孰羡軒冕儻何煩問大鈞自斷示諸掌敲門看竹來一笑豁心賞秋雨中書懷秋氣何沉寥寒序變淒淹木葉與時謝芳菊得秋苒生涯無少營書史有餘覽靜尋古人心理亂見忠諂薄田待耕食雖苦猶嚼欖稍豐不外求卒歲飽羮糝既獲飯𬞞樂又免素餐忝吾儕當壯年頭角露斬斬一為客氣乘前進率勇敢才行有所疐欲止不容憺尚恨才術踈而不大其膽隨即事變來長網驚一掩天意深有惜不遣入習坎委心聽自然致用每縮斂宦巧輸晉衍戇直終漢黯丗塗伏黃間舉足中機險虛名竟何用抵事纒坎壈唯餘讀書心連綴若紘紞秉德思一心覺衰誡多感古人了婚嫁家事斷不攬賢哉靖節翁歸卧斜川崦怡然擁敗絮一笑慰佟儼多生各有分過慮讓憂貶當時曠達懷樂過鼓瑟點因復念涪翁亦厭俗纍染異丗同其流漆板書何醰青山與白雲江湖渺而湛終古無少異曾有不足慘窮年為形役膏火自煎欿齒髮况日衰神情豈任暗正須慎圭璧不致有容玷惟天有盈虛賦分自豐歉天運審如此終老樂貧儉丗或昧兹理遇塞強鐫鏨我恐傷天和作詩時自檢餞侯敬甫還汴侯君司竹君調度去聲才年半去春持停罷公私或云便繼差上官來新舊盡交算衣𫀆到緼弊未免積垢綻支持一載強非汝不易辦天姿公戰勇奔北獨與殿昨從汴梁來相過為飲宴坐間出片𥿄喜色睟於面乃云監復立將集此微霰財賦至復任斯人不多見愀然忽變容不覺當饋嘆操刀截鼎肉有味誰為雋半生愧兹心而向此中轉若來期半歲整示見關鍵蠲潔七賢譏去應一鶚薦脫落小規為追逐接時彥擬慿素所懷髙舉酬吾願仍説解由事不了無一件俄爾來告別牽率復還汴祝余贈言榮歸代賔朋羡歷聞君所談行止渠自判何庸待余言樂處戒久戀最哀同察子臨事本怯愞壯士𬒳蝮螫慷慨有解腕懸絙即自經而釋身後患更無拙計人一死循鳬貫常嗟白靣生時務少諳練大概説不差節目多自絆米鹽瑣屑間居之要無倦君看韓侍中張本府推幹行矣夷門侯前塗况多援髮壯吾舌在槖罄志曾變花樣又時冝何患不光炫望嵩吟至元丙戌長至日追作北韻往歲試洛師憶與節齋約同作嵩少遊心賞為一豁羸驂鞭欲前竟為事所却宛循洛水東馬首眺隂壑洪朦元氣湧磊落雷雨惡不有此峻極安得雄四嶽只緣不得登萬象負酬酢諸峯羅六六景氣終慘錯披榛入會靈離宮名吟倚廢宫角陳公最健者帥可三軍奪空餘墜仙興出丗説飛墮迷嶺崿歸尋黑石渡易馹指鞏洛行行嘆不勇失此寧復作吾儕貴乘時過慮自羈靮至今有餘恨夢繞神嵩腳盤空轉危磴矯首看飛閣探穴不知畏入室不挽葛兹焉即神清洞户四開闊山人喜余至供具為止泊會凌列宿嶺一笑動寥廓宣城筆巳丑秋八月三十日晨起試宣城筆前一夜夢對御陳事故有入閣侍立之語江夏無雙公翰墨能事畢平生稱快意揮灑得此筆圓如棗心大鋭比囊頴直橫馳屈産良細插蜂膂悉鋒柔得字易心徑腕能適赤管才握餘貶削失掠敵䇿􅈴嫓中山落紙生五色或簮豸冠霜或泚螭首墨入閣與贊書侍立天咫尺雖非山甫儔萬一輔衮職賦襄邑蒸豚尹劉璹字君玉豫為都司時部提控令史相州人我行錦襄野田間多牧豚不沾攔笠溷不識糟酵渾渴飲兔苑溪飽嚙香阜根所以味佳美萬有空其群故人得劉宰紅蒸具盤飱俵淺食不饐體芳腥未聞今日復何日大嚼過屠門他鄉固肥腯性燥空突奔有時嘬其肉一筯增餘惛乳烹謝晉豪禁臠未必尊柔毛詫沙苑盛餐厭羶葷未減貨所饋往拜禮合殷物産貴得地橘與枳遽分藍田異崑丘而别璠與珉人生與物殊善變觀鵬鵾雙廟懷古鐡輿動地來獵火燼丸縣睢陽東南衝江淮國所援蔽遮不使前恢復可立見二公明此機死守誓不變雖危所保大如蝮螫解腕最難結衆心存殁匪石轉彼蒼卑全節誰為落賊便巳矣君不忘握爪掌為穿竟能濟中興淮海了清奠至今忠烈氣皎皎白日貫賀蘭觀成敗不飲浮屠箭殺亡計多寡此論誠可辦我來拜遺像凛對如生靣乞靈激懦衷剸決剛同鍊朔風吹樹聲尚想登陴戰暮倚暈月城悲歌淚如霰虞姫墓在靈壁縣東三十里虹縣道南隂陵山北舊有廟在山上今廢重瞳鮮情人鍾愛獨虞美五年有天下寵幸想無擬一朝走隂陵楚歌聞四起君王大事去飲訣共欷歔感君伉儷恩死不為漢鬼一丘鳯陽東粉黛見石紀空餘山頭草才歌葉披靡定應月夜魂長繞烏江水江船二詠蓬尺簀編黃蘆節數須隻長短隨所冝張弛易為摘長者二十七節廣二丈餘一傍繫腳索若網綱揔緝北人布為帆南俗蓬以荻舟師貪重載髙挂借風力順流與遡波巨鷁添羽翮望從逺浦來一片雲影黑亂衝渚煙開重帶江雨濕百里不終朝用捨從順適夕陽見晚泊堆疊紛襞積水雖物善利其助乃爾益櫓江船一巨魚櫓拖乃尾鬛當其淵水深棹弱不救乏故令施航後前與棹力合濟川具有五此物乃其甲一聲天際來欵乃中流發我浮大河東並岸行若狎終朝卧舷間蘭槳但空插𬗟懷剡木皇智創万古法舟宿桃源縣長路風日凄逺征力難勝捨鞍事舟行庶便寢與興蓬底坐秋江􅋏如在韝鷹有時縱逺目泛若孤槎星河從西北來勢建東南瓴萬艘水上下浩浩無時停利名任風波醉著誰復醒間看兩岸移轉盻煙中汀晚泊桃源下波光亂漁燈靜卧船舷間拍拍風水聲舟人話夜潮使君老母驚又云此水樂君其細為聽劉營田拜慶詩人生所欲壽有壽貴健安接物心思瞶曵履行步艱雞窠日省定此又何足歎耿濟劉營田字太𥘉事親有餘歡母氏壽期頥髮艾顔渥丹步趍不扶杖目視分遐觀怡神奚服餌終朝例三餐共云子致樂諒自家有間結䄜見壼儀教兒列時官豈惟一門樂化及濟岱間德盛福自備百歲到不難朝家重貞靜露恩不時頒行當見旌崇寵光爛門闌車簾蹙繡額誥錦回翔鵉肩輿王與陳一旦相追攀兹焉答春寸草心能單我詩嫓彤管要作後代看食鱸魚鱸魚昔人貴我行次吳江秋風時巳過滿意蓴鱸香𥘉非為口腹物異可闕嘗口哆頰重出鱗纎雪爭光背華點玳斑或圎或斜方一脊無亂骨食免刺鯁防肉膩勝海薊味佳掩河魴燈前不放箸愈啖味愈長張翰為爾逝我今赴官忙出處要義在不須論行藏倚裝足朝睡且快所欲償夢驚聽吳歌海日方蒼涼長至日次赤岸驛扁舟下餘杭逺客逢佳節呼童起四更理棹未明發燈前一杯酒持飲聊自悅江行官有程貴重敢中輟此身得安舒行止聽驅䇿去冬一陽生露寢樂良夕餳茶雖草草𥘉不失家食今年赤岸亭野宿雜亂聒鄉關天一涯雲水幾重隔殘年無定居糊口走閩越眷焉不無情念久意為惻兩舷暗浪喧拍拍若嗚咽寄聲紫山翁此懷多不别時任蘇州提刑平望道中今日風色好舟行喜清和吳江抵嘉興逺不百里過解衣坐蓬底間聽吳儂歌大艑從東來帆檣鬱嵳峩云是淮海公赴召耽微痾倉皇不少住進棹如飛梭物情忌太盛從者不得多尚餘蔽川載意氣隘兩河有懷陶朱公霸業到不磨功成委之去敝屣與棄蠡左顧萬金槖右顧西施婆可想不可見五湖渺煙波大安嶺亂山從閩來勢若萬馬騁六丁闢坤闔通道取此嶺仰觀巳可怖𥘉陟戒太猛乘班事推挽氣鬱頸生癭既升頗平夷六折到絶頂最慮泥雨滑沙磴足易整俯臨盡黑澗一漫漲雲影似矜吾年衰不遣見巇景一山勢兩殊限隔示外警北登儘坡陀南下峻深井牛肩抵風門峽束轉幽逈湍泉激南駃噴薄萬壑冷人生此兩足停輟不俄頃舉緣聲利牽走險不知挺我獨喜壯觀大嚼快雋永好竒與馮生比較略相等漢家截海表兹嶺乃內境行人無晝夜關史𥘉未省徒令踠馬足安用障巨屏暮投大安傳燈火破窗炯吐我胸中竒削此疊嶂梗此事特遊戲夜久凍生頴控馭稍得冝雖險勢莫逞黎明呌雲去有懷為耿耿自淮口抵宿遷值風雨大作拖舟入清口適喜亂淮碧崔鎮抵宿遷徐行才半日朔風殆警余不爾何凛栗江雲作陳來凍雨矢四集行撁人力微泥爛槽岸側打頭為旅拒遇淺殆鯨吸波神鼓餘勇洶洶波浪黑勢張互相薄力進硬與敵欹傾乃尋常簸蕩不少息秋江渺無涯終日困局蹐夜眠任倒懸晝坐自撞擊試身一葉舟凌轢蛟蜃窟逺道胡為來行止吾豈必相值當耐何安順險能出有塗莫舟行此語聞自昔君看坦塗間風浪猶莫測處身苟無方往往半乾沒居安貴不忘遇險戒無佚所以長樂老進諫及銜失行行入吕梁持守要愈惕吕梁吕梁世所畏往往舟碎破我來相其衝説者無乃過南洪一石埌北梁更么磨水淺但湍急欲上船旋磨更緣暗石多重載防右左舟空人力衆徑往彼無那豈云水至柔內極沉溺禍至人特為名過者戒微墮舟行四千里冒涉鋭盡挫髙歌幸無虞猶呼細寄聲畏塗間識者當有和秋澗先生大全文集卷第四
