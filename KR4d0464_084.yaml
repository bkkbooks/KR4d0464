front:
  text: 秋澗先生大全集卷第八十四烏臺筆輔
  hash: sha256:4b22b4d1db1e9a5a601ed66618f7eeddd65384b295d0c79a3d91f30b1d1fbac4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_084-1a}
body:
  text: 彈聊城縣官汚濫事狀今體察得博州聊城縣周縣尹至元六年冬與部內良人妻阿曹通姦其秦主簿亦於當年秋前往上口鎮倉部糧與部民馮貨郎女通姦俱各私下用錢折合休和了當就問得本路司吏朱勉與所察相同今來切詳縣尹主簿俱係牧民之官承流宣化肅政風俗者也今侵犯部民其汚濫非違如此合行紏劾論中都喪祭禮薄事狀切惟送終人子之大事今見中都風俗薄惡於喪祭之禮有亟當紏正者如父母之喪例皆焚燒以為當然習既成風恬不知痛敗俗傷化無重於此契勘係契丹遺風其在漢民斷不可訓理合禁止以厚薄俗外據除六無問貴賤多破錢物市一切紙作房室侍從車馬等儀物不惟生者虛費於死者實無所益亦乞一就禁止據此合行具呈皇太子親政事狀蓋聞武丁學于甘盤號殷髙宗孝宣起於民間為漢今主以唐太視朝以子治觀政丗宗東巡以允恭監國斯二君者豈特為元嗣廣聰明逹民事而巳蓋將正神明之器分夙夜之憂繫臣鄰之心慰億兆之望撫軍監國皆其事也而賈生亦云太子正而天下定矣恭惟燕王殿下春秋鼎盛孝敬日隆今者守中令領樞府然首居重器未嘗事事且古之聖人宜莫如舜尚歷試諸難用彰玄德以惲愚慮誠冝早正位號俾躬理庶務仰承黃屋之心俯署青宮之事如每歲春車駕巡幸上都燕王殿下居守陪京撫臨漢地握一府之樞控百辟之重俾睿智足臨日深治道又念方今聖天子以仁厚恭儉率先天下而繼體者於稼穡艱難之事又不可不知也不然沿邊將士自較閲以來上下負責不蒙自新雖欲功過相當將何所明若髙秋馬肥奉將天威撫巡江漢以之頒犒祿秩赦宥過誤豈特旗幟壁壘精彩一新亦將作士氣逖蠻荆懷逺方安新附復有奮忠竭力建非常之功於目前者矣其爭先怏覩謳歌慶幸倍於尋常万万也又省記頃者太子合昔歹在先朝時巳以位號之正判署教條親諭漢官兹非其事與能若是固盤石之基定天下之本計孰大於此者惲職分雖卑猥當言責國之大事敢冒昧敷陳彈博州總管楊庭訓不之任狀今體察到前博州路總管楊庭訓本官爰自宣州次官升充河間路總管同知再考授博州路總管於今年七月內祗受宣命虎符充延安府總管朝廷恩私待以不薄不期録連保狀輒自獻投以延安為下路欲難其行以少中為稍降妄攀别例一意徼求有虧廉莭兼照得之官程限巳有定例其楊庭訓自祗受以來經今四月有餘推延事故逗遛不行恐臣子之分不當如此事屬非違合行紏劾第二狀近為延安路總管楊庭訓不赴任事巳經具呈未蒙定奪切聞上臺照勘體察本官元行文卷意者豈謂憲司巳有先行故遲遲其意却緣惲體訪此事前後月餘才方得實據本臺事理並不知會至於愚見偶與鈞意略同行之似不相妨緣元狀止彈本官為路小官降故違朝命八十餘日不行之官至於自投保狀曽不知愧即係彈章中引據事意本非正情設若在先亦有此等事體未嘗紏彈儻今後更有似此事同而情理深重者惲等合無其行與否據此合行載呈論河南行省屯田子粒不實分收與民事狀會驗河南行中書省咨該去歲屯田子粒一百萬石內明該屯户收分語句今體訪得止收到稻穀又馬料粟通計約四十餘萬石其收分與民數目至今不曽給付使失業之民二萬三千餘户往返千里却於住貫般易糇糧以供朝夕貧者至嚙食草木陳告無所以致往往逃竄至有舉屯全空者切惟屯田大計當草創之際所冝務逺圗固根本開布恩信撫飬新集遵固豫之道植久駐之基不務出此將上項子粒公丈明該除數實惠曽不及民使官食前言民有飢色張虛數以要上知顧小利而斂衆怨既非國家之便又非持久成大功之逺略也其昧上虐下是屬姦欺據此合行紏呈論河南分作四路事狀切見河南係邊防重地耕戰之大本所在今國家用兵江漢開置屯田示其久駐非特取襄陽而巳為今之計冝分治撫飬以實河南根本為急照得河南地方寬闊東西二千南北一千餘里跨州連郡大小七十餘城軍民一十八万户雖不及往時實亡金一國也今止設總府一道使都轄於上府治又處北偏東南州郡半與南界犬牙交入如唐鄧徐邳亳頴等州去京近者五六百里少有緩急其簿書期會往返交錯首尾相應動輒月餘不惟辦集生受其實難以控制兼平時與多故事勢不同自攻守襄陽巳來轉輸調度百色所須取辦有司急於星火今而亦同止轄三兩州者張官置吏一體勾當縱彼人才固難負荷此特官府之難易耳所可慮者迤南屯田大復壞散往往避役致有降屯全空者其患在不􅊢州府衆人耽誤無有專任責者故也又值蝗旱連年軍民困苦譬猶群羊數萬𬒳擾不安雖居牧地且乏水草又令一人看管放牧未見其安且便也以惲愚見合無將河南地面分作四路以歸德為一路而徐邳宿亳􅊢之以蔡州為一路而陳穎睢息􅊢之以鄧州為一路而申𥙿唐􅊢之以南京為一路而鈞許嵩汝鄭延􅊢之其選任官吏比之常調增加品秩庶勉勸事功人爭效用外據所該屯田地靣其府官令兼帶營田使職名於上提點勾當外三路所有屯田户主常加存恤將彼此事情互相照料撫飬其生業休息其困乏使一方軍民及居者屯者兩不失所方為稱職然後限以歲年責其成效以慿考較别議升降如此庶得軍民兩安政成化理事無矌慢邊防之重地既安耕戰之大本又立以攻以守投之所向無不如意若貪外虛內置巳有而不恤圗必爭之要害是猶荒膏腴之地不為耕稼而求不可治之石田恐切為鄰人之輕且笑也外據真定平陽兩路亦冝標撥州縣另立散府使直􅊢省部管領其於官民亦為兩便且免夫末大不棹之虞得強幹弱枝之道矣據此合行具呈論怯薛歹加散官事狀切惟自古殿庭之間內而近侍外而宿衛凡有職掌俱帶散階理無一槩白身領宫掖之事者今伏見朝廷一切侍從宿衛怯薛丹等官貟多係功臣子孫及歷年深逺辛勤勞績人貟據見掌職事就中固分輕重上下終是朝家未曽普覃加帶勳散階號使寵異其身名儻議而行在國家大為恩惠於臣子益勵忠勤且古人有言人主之尊譬如堂群臣如陛階增則堂髙是近臣榮顯則人主愈尊崇矣今後合無將內外一切近侍環衛等官據見掌職事依驗色目普加散官如龍虎驃騎金吾奉輔國昭安懷定明武將軍之官下至丞昭忠尉之號更定奪俸秩為一代新制所謂立制自貴近始昨聞集議宫官服色是欲辨上下定民志也據散階事理誠冝先有定奪然後服色可議蓋服色因官品而定而官品由服色而顯也伏乞御史臺照詳論收訪野史事狀切惟古者修史雖野史傳聞不以人廢伏見國家自中統二年立國史院令學士安藏收訪其事數年巳來所得無幾蓋上自成吉思皇帝迄于先帝以神武削平萬國中間事功不可殫紀近又聞國史院於亡金實録內採擇肇造事迹豈非慮有遺忘歟然當間從征諸人所在尚有旁求備訪所獲必冨不然此輩且老將何所聞合無榜示中外不以諸色等人有曽扈從征進凡有記憶事實許所在條件或口為陳説及轉相傳聞事無巨細可以投獻者官給賞有差如此庶望人效衆美國就成書使鴻休盛烈晦而復明備見一代之史顧不盛歟論品官懸帶弓箭事狀切見國家往年禁斷弓箭事久弊生中間似有未盡者今體訪得軍户斡脫弓手打捕回回等人皆得懸帶而外任三品至七品以下官貟皆不許懸帶據上項官貟重則控制數州小則肅清百里其間懸佩符命赴任在官往返道路緩急有虞無寸刃隻矢以禦強暴是國家命官不若打捕等户之有備也且此法之行止能禁絶良民近年所在失事多係挾持弓箭馬賊其擅助賊威奪去民救莫此為甚據外任三品以下官貟今後合無照依品官合得舊例定奪似為長便據此合行具呈彈甲局首領官張涇影占工役事狀今體察得中都甲局首領官張外郎至元四年五年影占合造甲人匠劉仲禮私下取要工價鈔四十四兩五錢却將本人合造甲數逐作抑令其餘人匠分造了當今就問得張外郎名涇是實據此合行開坐紏呈為驛程量事緩急給限事狀切見隨路每歲差遣人貟赴都如計稟公事押運差發課程一切等物者既還心欲速得到家不問鋪馬生受日行數站其馬匹不無走損倒死以惲愚見今後除軍情急速人貟外其餘所差人貟合無照依舊例量事緩急定立往回地程使各站出給關文於上分明書寫日行站數依上走遞仍令按察司體究違者治罪施行如此似望鋪馬少有倒死站戶不致生受為典雇身良人限滿折庸事狀切見在都貧難小民或因事故往往於有力之家典身為􅊢如長春一宫約三十餘人元約巳滿無可償主致有父子夫婦出限數年身執賤役不能出離又有親生男女詭名典嫁其實貨此又大傷風化其不可長其典雇身人如元限巳滿無財可贖者今後合無照依舊例令限外為始以日折庸準算元錢使之出離其或典數口內有身故者除其死者一分之價至於願求衣食者聽外據典嫁不實者乞嚴行禁止如此不致已久成俗而雇身者免轉良為賤混淆無别不然迷失門户耽懼差役深為未便合行舉呈為不冝先浚新城壕塹事狀切見隨路連年蝗旱百姓飢乏者衆今春首農務將作大興力役擬浚治新城壕塹不惟妨奪民時切恐轉致困弊合無伺候秋熟舉作似為未晚不然若從重論理合先築宫城正宸極之位使內外有限以壯皇居然後宫室可得而議據浚鑿壕塹工役似未冝先行為春水時預期告諭事狀近知得河間路任丘縣南史村軍户劉阿李為殘害海青事將本婦人處斷訖參詳在先為鷹隼海青公事然省部欽奉聖旨遍行隨路出榜省諭而農民愚戅月日深逺不無遺忘兼海青飛舉動輒千里切恐逺方之人不知係是車駕飛放禽羽以惲愚見今後御前鷹隼海青合無懸帶記驗如前朝牙牌之制每遇春秋飛放之時更令所司預期將一切禁忌違犯之事重行嚴切省諭使農民臨時又得曉然通知如此豈惟易避難犯亦不致誤有損害似為便當今後
