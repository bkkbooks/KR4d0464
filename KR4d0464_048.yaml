body:
  text: 大元故宣武將軍千户張君家傳君姓張氏諱思忠字正言盧龍永清人也曽祖衍大父德輔世業農金百年來支屬蕃息居不異㸑至今以義門稱燕朔間父諱同資沉粹少以昜業起家為志大元甲子天兵南略以良家子從軍隸都元帥史公戲下以武幹見稱凡意料且與公契及公鎮守真定得專擢拜以功監領左軍充唐山邑宰既而開府忠武公紹襲閫職首以鎮撫授君歲壬辰以千夫長從公略地河南歸德禦堅猝不昜拔君鼓勇先士卒登且以戎鎧鮮異為大帥速不䚟所識及賞犒以功讓所善髙信由是信拔出行伍致身顯逹遂轉戰密之西山民避兵匿洞窟中往往縱火燻逼君言諸主帥禁為賴全活者甚衆其後從戍陽夏開邊屯受成整暇兵有餘力而民懷風愛繼移鎮入鄧凡百草創都督史侯皆擬易治一新君依前以鎮撫供職於是招流散復田廬治渠堰整屯戍謹斥候咸領辦有方不大聲以色人至以佛張鎮撫目之其慈祥為可知丙辰春壽六十有一遘疾終鄧之宜舍葬真定縣臨濟里域夫人趙氏後公十九年殁生子六人宣武君即其長也宣武幼不好弄嘗聚嬉里門能威重自居指顧群兒不異官府識者巳稱其不凡及知學頴悟不群既長有謀略善騎射大都督一見與語竒之命日侍鈴下庸玉汝之幾冠嗣父職適有事江淮風雲交會之際宣武年少英發夙夜聽恭不遑寢餗氣益厲志益明事益辦時軍府有疑獄久不能決命審鞠之略不加威而窮姦直枉兩造情露闔府與其明察至於繕城壁建樓櫓使號令精彩一軍增雄雖謀出於上其所以廣益於下者多君之力焉丞相忠武公奏降銀符真授都督府鎮撫至元五年朝廷命帥會諸道兵攻取襄樊為上流破竹之舉宣武備列戎行首建戍白議曰淯澮于漢冝亟據要害築堡成使遏宋人泝流以資寇盜不然彼或先之豈惟奪志吾無如之何矣從之分兵壁其會宋人為氣禠時餉道不繼行省以君有畫能幹即擬充唐州新野等處提舉糧漕使淯行岡阜間淺深不常艱於綱運君遂揵數堰平水勢隨造江軸車餘千兩兼速陸運復設防戍絶去塗梗舟車通便軍餉為不乏矣樊城小而堅為襄之扜蔽省議取之翦其臂翼君率先豼虎既登中流矢戰不輟丞相伯顔公壯其勇止之以勞宣授行省都鎮撫其職掌大槩上承大帥方略指授諸將諸軍有所關白必因以上逹與夫訓練調遣巡羅等事皆所領治當時諸軍大小四十餘壁每翼鎮撫一貟號之曰接手日聽將令於都鎮撫武辨佩刀弭爾於雲麾之下蓋肅如也其倚重漢比軍司馬唐都虞之任君感其知遇誓以捐軀報國至元十年春二月襄州破苐功上聞至蒙弓矢鏐鞍繡衣之賜明年秋九月詔丞相伯顔等水陸並進鄂渚渡江師次郢宋人以艨艟鬪艦橫鎖漢面扼之不克前責君辨之君按視對江堡北有枯河可三里許連接一湖湖滙與漢通君喜曰吾事濟矣遂拖舟由港中盡逹于湖舳艫蔽江順流而東無復橫草之虞矣大為丞相嘉賞時主帥從偏禆百餘騎行視郢嶮天大霧不覺抵壁下彼潛出兵圍之者數匝衆相顧失色君奮槊突擊殺數十人為解去因建言於相府曰郢據漢為池東南又有沙陽等城傍為掎角冝乘鋭先破之側郢乃孤矣韙其䇿即命君督精甲潛往不移蔭掀沙揚石掇新城降沔陽而去隨與諸軍併力破夏貴兵於陽泳永羅堡以清江道我師飛渡駐武昌軍矣時朝廷䇿諸將始加散秩以功最授宣武將軍師既東前阻鄱湖風浪君力督水師浮梁而濟其敏捷赴功類如此宋相賈罄國力結陳丁家洲塞江路俟與我師鏖決丞相公命君督諸軍前陳君鷹揚致師出入行間指授方略意甚暇也一再合而宋人敗績遂入建康丞相阿木即分兵趣瓜步回搗維揚擇勇而有謀者偕往君首膺其選丞相公惜不遣令將䇿勝一軍權充萬夫長聞于朝其為二相倚重者若爾命未下竟以勤勞致疾以是年夏五月殁金陵之軍幕得年三十有九丞相公聞驚悼以馬箠擊地有云亡孰繼之嘆遣屬將祈祐護其轊歸張君為人美鬚髯氣量宏事親孝撫諸弟以愛與人交有終始不一言忘盡心所事國爾忘家若飢渴之於飲食其趍事建功臨機制變志慮出人意表拊循士卒與同井苦皆樂為之用故其燕趙徑氣所向披靡樹駿功為尤多𥘉渡江凡軍中俘士人為獻者君與求親屬悉資遣之其或願留依庇者事甫定一皆縱還鄉里夫人房氏唐相國梁公裔內助有法配君德良稱先君沒生子男四人長曰用道嗣君職次用和用康用章女四人適名族繼室史氏大尉忠武公之次女生女寧哥孫男四人女孫三人贊曰張氏三世在野純積既久固所發攸厚若父鎮撫君起壠畒奮棘矜致身偏禆亦云顯矣其施若猶未也逮君遭乘機運奮發志勇以投風雲之會惜乎功名垂就不享其報使英資茂績有欎而未盡者今嗣侯以破靜江討江西逋寇等功進武德將軍行軍總管風姿文雅延譽士大夫間殊藉藉然蓋將衍夫遺澤而大其世業者耶用道與內弟遊交甚𣢾以家傳見屬遂直書其事至於筆削其間以俟夫學春秋者焉盧龍趙氏家傳孟倅穆尋墜緒纘先猷持懇太史王惲通述一傳庶幾遡川流而逺紹淵源溉根本而敷榮枝葉以衰謝辭者載請彌堅謹按趙之得姓肇自周滿䇿造御勞胙土受氏子孫蟬䗡代有聞人時藐譜逸蔑克論次所可知者當唐丗逺祖諱少陽生子簡亮亮生元遂宦遊于燕家焉因為盧龍人遂生子思溫字文美資英栗拳勇絶人尚氣任俠五代𥘉燕帥劉仁恭壯其才武署為偏將晉王存朂來問公率所部挺身逆戰目中走矢為統帥周德威所推晉王聞其驤勇義而釋之數蒙指蹤逮與梁人戰於莘野陷陳深入斬戮不勝計弟功最加金紫光祿大夫檢校尚書左僕射使持節平州諸軍事平州刺史神册二年為太祖遣元帥擁大兵來攻城中糧盡猿絶公審形勢之歸察輿情之去就遂欵附太祖素知其才勇可寵遇殊渥東代渤海俾將充都團練使既餘率敢死士十餘輩突戰先登立拔其城身𬒳重傷太祖親調藥以傳之武帝即位論㑶敵功檢校太保靜軍節度使天顯十一年石晉起義并門來求援命公出師風憲間掎角之敬瑭賴以克濟加特進檢校太尉中書門下平章事燕京留守盧龍軍節度使管內觀察處置等使明年進階開府儀同三司兼侍中封天水郡開國侯食邑一千五伯户仍賜協謀靜亂翊聖功臣兼雲應朔奉聖等道採訪使時方兵後雕瘵未蘇政舉綱條維宏寬簡轉臨海軍節度使會同元年使晉行册禮還檢校太師兼侍中進開國公加食邑伍伯戶二年春有星隕於庭俄薄疾以三月草日薨享年五十有八上聞震悼奠祭賵賵有加贈太師衛國公葬昌平縣五華山之陽敕集賢大學士張礪銘其神道公事親孝奉上忠出入行陳三十年大小百餘戰勳業烜赫身都將相備極人臣之貴而謙撝自牧退然若無能為者冝其以功名終𥘉遼祖殂后述律氏智而忍悉召大將妻諭曰我今寡處汝等豈冝有夫復謂諸將曰可往從先帝於地下有過者多殺於木葉山墓隧中公後以事忤后使送木葉山辭不行曰親寵莫后若何不往曰子幼國疑未能也乃斷其一腕以送之直公而不殺平昔守正不屈類如此配太原王氏贈鄭國太夫人繼室清河夫人張氏陽翟夫人翟氏子十有二人長曰延照永清軍莭度使侍衛親軍事特進檢校太尉同政事門下平章事開國公食邑一千伍百户賜號推忠奉節毅勇功臣十一丗孫昞山北遼東道廉訪吏今居鄢陵次曰延祚燕京留守檢校太師開國公食邑一千户十一丗孫朏肥鄉三務使今居燕十二丗孫天民遼陽省都事今居平灤曰延卿竭莭匡邦保義功臣大同軍莭度使檢校太師開國公食邑一千户曰延搆供奉官東西班都點檢曰延威推忠佐命翊贊功臣保靜軍莭度使特進檢校太師開國公食邑一千户十一丗孫明今任兩浙運司知事曰延晞飛龍院使檢校尚書左僕射曰延誨保靜軍馬步軍都指揮使曰延光順義軍莭度使曰延玉彰國軍莭度使曰延煦點檢曰延紹同州兵馬使曰廷旭內庫提點女十四人長適泰安州刺史傳知寶次適天雄軍莭度使檢校太尉兼侍中韓巨美次適弘農楊氏次適竭誠奉國翊贊功臣東平軍莭度使特進檢校太師兼御史大夫上柱國南陽郡趙國公尚書令判三司使韓德樞次適榆州刺史張彥英次適彭城劉氏次適左林大將軍張美次適宣徽南院使天平軍節度使檢校太師同政事門下平章事判三司韓績次適清河張氏次適博陵崔氏其開府太師衛國公苐五子特進府君即穆之十二世祖也葬建州永霸縣白羊峪有乾統七年夫人馬氏所樹銘幢特進府君生二子曰匡舜左千牛衛大將軍生子四人曰匡禹臨海軍莭度使生八子第七子為翰仕至保遂州團練都統使始葬大興穴窵别墅即睿智皇后賜田也生三子相之生五子第三子洧生六子第二子公為嗣兼管內觀察使一子鎔官鎮國上將軍一子居常驃騎衛上將軍七世並襲遼世爵相之府君弟進之永豐庫使尚之生子沿絶進之一子漬寧昌軍莭度使贈金吾衛上將軍三子仲曰公謹龍虎衛上將軍靜江軍莭度使四子孟曰興祥賢而多材仕金海陵世宗兩朝以德望門地致仕途顯赫官至開府儀同三司左宣徽使太子少傅申國公封巨鹿郡王葬良鄉回城劉李里蔡家凹迄今以趙大王墳目之翰林待制趙攄所撰神道碑在馬驃騎府君生五子曰柄天姿孝友博學克守世範曰挺邃星曆術金𥘉任靈臺司正郎曰機留心軒岐書伎精良選充尚醫侍宣宗官至保宜大夫曰梅善傎殖致屋潤積而能散貧乏者多沾其惠興陵因逰畋宿其家聞富而好禮賜銀燭盤二鄉梓榮焉嘗監謝村鎮酒曰植字景道穆之曽祖也姿情淑有操行力學務為無所不窺工作詩嘗舉進士不偶輒拂衣去易名皆隱穴别墅教授為業别墅東二里許即金建春離宫明昌間道陵春水過聞絃誦聲幸其齋舍諷詠壁間所題詩有折腳鐺中烹白薺打頭屋底看青山者久之尋召至行殿賞其志趣不凡命之以官固辭曰臣僻性野逸志在長林豐草金鑣玉絡非所願樂况聖明在上容巢由為外臣可乎道陵益竒之特賜田十頃復之終身士論烜耀自是不呼姓名皆曰建春徴君號其鄉曰崇讓尊顯之也終於泰和二年三月乙丑享年八十五配李氏生子玫司正府君之子曰侃字和之穆之伯祖儀觀秀偉學識該貫尤長於音律儀制章宗時用閥閲子弟試太常禮樂科中承安二年登歌甲首由是於禮樂愈覃精為專門之學矣積勞自工師副正轉協律郎貞祐播遷禮樂散失不完命楊禮部雲翼馬太博千里詳定府君以掌固得預莭文所不備條理之未暢咨其論説輔罅為多纍官定逺大將軍大樂署直長權知太廟署事金未南遷校量鐘律獨黃鐘抑而不揚既至汴林鐘復爾雖更鑄尚然竊自嘆曰八音與政通隂陽消長所在可以卜時之治忽中興其不竟乎既而金亡嘗會飲市樓樂甫作語所知曰革有很戾音即去之果有酗而鬪死者其沉機先識如此壬辰北渡隱居鄉里未嘗一日忘其素業乃編集郊祀所記憶者為祀興樂志辨凡三十卷或譏曰若子所學與時豈不背戾答曰文武迭用世道之常今向平治以是備他時求訪之具聞者歎其資深而慮逺歲戊戍襲封衍聖公孔元措薦府君於朝攝大樂丞乘傳遍歷四方搜訪前代禮官樂師祭器圗集備預制作中統建元以來文物郁然君有力焉壽八十一卒時已未夏四月草七日也配金吾李氏一子守忠正大間䇿論進士仕至承德郎管勾尚書省承發司前君沒娶王氏桑氏孫五人柔原圭秀義曽孫繼祖榮祖興祖顯祖等八人曽女孫十人玄孫男三人保宜府君之子曰璧字國寶穆之叔祖資沉雄有才幹涉獵經史中武舉第官廣威將軍宣宗麗妃位奉事卒於戊午歲九月十九日得年六十五配史氏麗妃兄之女生三女俱適時族建春府君之子玫字文王穆之祖也資長厚耿介不妄交遊學問淹貫工辭翰藉門資調遵化三司使昜代後僻居研窮理學申明家法勉子孫興門户為務自稱貽齋居士壽八十五終於戊辰三月九日配良鄉李氏毋儀婦道光範中表生子鉉字仲器幼孤藉伯考定逺君翼誨及長雅淡喜讀書不樂仕進蓫昜學好古多巧思音律占筮咸詣其精妙太宫肇造鐘鼎祭器法物朝儀以先生家學精思罕匹命之監視或以方技上聞適營建新都俾灼吉兆基命丕作蒙賜白金五十星重幣十襲相臣因欲官之辭不可止其言人榮悴雖察五行盛必配合道義廣示勸戒名公朝士歆其學識來質疑請益者無虛曰焚香煮茗間出三代鼎彛法書圗籍傳觀披玩論辨皆有證據及談遼金故事揮麈緩頰使聽者忘倦慈祥愷悌之色津津溢眉睫間有承平遺老氣象晚節號鈍軒逸皓諸賢贈遣詩文無慮數百篇嘗於祖竁側搆亭為春秋奠祀所承旨王文忠公扁曰遺安樞相商左山為之記其為名勝稱賞若爾今年登期頥康寧順適壽祉未可量也娶李氏生子穆性純孝早傳家學善篆隸以敏慧延譽搢紳間得從事翰林出倅孟州轉邢臺尹超授承務中山府判官穆之子遹祖述祖迪祖遵祖孫遷安於戲趙氏自五季迄今三百餘年子孫蕃衍幾於千人忠傳學繼世濟其美越不事宦遊者學術行義亦昭晣於時與韓劉馬共稱為燕四大族至比唐李鄭崔盧由開府太師衛國公忠毅奮發捐軀為國敦篤大本君子之澤其流淵長亶其然乎惟延威特進府君第五房一傳而二再傳十二人三傳至草八人四傳四十五人五傳而六十四六傳八十四七傳九十二八傳當建春府君行群從數幾滿百本支子姪草有八然遭壬辰喪亂存者僅三人而巳非賴穆之訪緝譜諜則後人無由知其祖考之所自出宗系之所自分今復掦豐功之盛烈發潛德之幽光傳載無遺垂鴻不朽俾趙氏來者觀感景仰克念無忝是亦顯揚之一莭也傳曰慎終追逺民德歸厚矣又曰惟孝子善繼志𫐠事若穆也可謂有志追逺述事者也大德巳亥秋七月翰林學士中奉大夫知制誥同修國史王惲述開府儀同三司中書左丞相忠武史公家傳丞相史公天澤其先燕之永清人世以族茂財雄號農里著姓曽祖倫祖成圭繼有純德百年來潤涵淵寖匯而不發逮父尚書府君秉直讀書尚氣義為一方嚮服生三子天倪天安公其季也國朝癸酉歲冬十月太師木花里以王爵帥天兵南略中夏雷碑霆激震蕩無前府君審興運之會歸一群疑之去就倡率義從迎降軍門王照其誠數千人賴以生仍令府君統降主漕繼從王攻北京下之以勞授行部尚書淵流騰潤千載之會實開於此及金將武仙以真定降王命公兄天倪充河北西路兵馬都元帥即鎮守俾仙二焉時公年二十有三身長八尺音吐鐘鈜然善騎射拳勇絶人屬櫜鞬署帳前總校明年乙酉春護母夫人北歸仙尋叛都帥遇害府僚王縉王守道追公及燕曰變起倉猝部曲散走多在近郊即回斾當不招自至公毅然曰不聚國之讎死亦當往遂傾橐昜仗南還以圗報復行次滿城得士馬甚衆餘兵四集牙將毛等即推公攝行軍事遣監軍李伯祐言狀於王就請兵濟討即命公紹兄職仍以國將笑乃得統精兵三千為援合勢進攻盧奴仙驍將葛鐵槍八主簿擁萬衆來救公撤圍逆之奮先將士灑血馳戰呼聲殷地無不一當十葛氣榹會曰暮退依派水為阻公料其墮歸敵必宵遁果然乘之衆大潰主擒鐡槍資其器仗儲㣥軍威大振遂下中山略無極拔趙州進駐野頭仙懼奔西山之抱犢寨其年夏六月復真定無幾宋將彭義斌隂與仙合又圗竊取公同國將禦諸贊皇扼仙軍不得進義斌勢蹴嬰火炎山自固主帥問計於公曰賊衆山扼自陷圯地此昜破也遂令監軍孫提鋭卒五十公略其後繼以鐡騎蹂之斬義斌戲下自是義勇之名軒襮燕趙間後數月仙潛納諜者匿大曆寺夜斬關為內應遂反其城公跳走藁守帥董俊以全軍授公復與笑乃得破走仙主帥忿民之返覆驅萬人出將勦焉以示威公曰是皆吾軍民我力不能及一旦委去不幸為賊脅制今殺之何罪弗聽復力爭良久乃悟而全釋公乃繕城壁除武備明號令守禦以方為不可犯之計歲荒食艱捐甘攻苦與衆共之於是招流散拊瘡痍披荆榛掇瓦礫數年間官府民聚以次完治然髙公抱犢諸柵仙之巢穴也不即揃覆則終遺後患隨攻下之仙鼠竄而去繼又取相衛太宗即位公入覲朝議方選三大帥分統漢地兵上素聞公賢詔為五路萬户以真定河間大名東平濟南隸焉庚寅冬圍武仙於汲小大凡十餘壁金將合逹以衆十萬來援鋒始交不利諸將乘虛一時奔北公獨以千人繞出敵後挺刃橫擊敗一都尉軍既而復與大軍合攻仙逸去復取衛州明年壬辰太宗由白波渡河詔公以兵由盟津會河南至則睿宗皇帝巳破合逹軍於三峯山乃命公略地京東遂招降太康柘縣瓦岡睢州追殺守帥慶山奴於陽邑金主東播復自黃龍岡來襲我新衛公聞之輕騎馳赴比至巳合圍奮戈突抵城下呼守者韓帥曰汝等勉力援兵繼來復躍出敵愕睨為披靡明曰大軍至內外夾擊敗走蒲城公尾其後金將伯撒所將兵尚八萬我殺掠殆盡金主以單舸東保歸德公與諸軍會睢陽同僚撒吉思欲薄城背水而􅩌公曰若敵來犯我進退失據此豈駐兵地耶公爭不下以其事赴汴比還全軍皆沒其圍蔡也當懸瓠北面潛涉汝險出入壘中血戰者連日蔡兵大衄汝水為不流金亡公還趙視師自乙未版籍後政煩賦重急於星火以民蕭條倅不昜辦有司貸賈胡子錢代輸積纍倍稱謂之羊羔利嵗月稍集驗籍來徴民至賣田業鬻妻子有不能給者時兵民未分賦役互重復遇征戍則趨辦一時中外騷屑殆不聊生公憫焉詣闕併奏其事民債官為代償一本息而止軍則中户克籍其征賦差貧冨為定額上皆從之布告諸路永為定制逮戊戍巳亥間仍歲蝗旱復假貸以足貢數積銀至萬三千餘鋌公度民不可重困乃先出其家資次及族屬官吏均配以償遂折其劵監郡忙哥撒兒以國兵奧魯數萬口散處州郡間營帳所在大致驛騷伐桑蹂稼生意悴然公騰奏太后悉徙居嶺北由是軍民肩息田里遂有生之樂迄今真定兵甲民數勝於他郡由公牧飬其根本故也國朝自金亡巳來歲有事於宋公未嘗不在戎行棗陽之役城小而堅主帥忿其攻久不拔命徑乘其城公率馮程二拔都國朝語謂勇猛士曰拔都先諸將登太子闊出壯其勇惜其材傳呼止之公戰愈力克焉其攻襄陽也宋以舟師數千陳峭石灘掎角以綴我肘太子以城不昜拔可趣利舟楫命公往以陳翟二校自翼驅猛士兩舸直前搗之彼氣既奪奮槊蕩決覆溺者萬計獲焉及取光化復引縆首上立陷其城復州之役敵盛以鬪艦三千艘鎖湖面為柵公進説曰柵破則復當自潰遂募勇敢士四十輩親鼓而前壞蕩無遺復懼而降其攻壽春也公獨當一面宋人以我圍逺勢分綏急首尾莫應賊乘夜果來斫營公單騎逆戰手格殺數人戲下繼至悉驅賊入淮水至於掀滁州蹂盱眙掇寶應瀕江渚且破且降者二十餘所雖會諸道兵共事其伐謀制勝愾敵樹功未嘗不在群帥之右及䇿勳盟府推讓行間雖寸長不掩故諸將屈盡其智能士卒樂出死力論者謂公智信仁勇堂堂有古良將風壬子歲公入覲憲宗察其忠勤特加顯異遂以衛五城封公為分邑方今聖上潛極知河南困弊請分治培植為異日包舉殘之本許焉遂奏公充經略使公以河外虛耗日久封豕存食於內邊寇日侵於外非大與休濯則不可去之舉賢能汰冗濫抑豪強均賦役信賞明罰訓農勸兵列堡戍以絶寇衝實屯廪以給邊餉凡政之不便及民所欲而未得者率更張而立行之睢州長楊興封丘簿董極橫恣不法暴其惡肆諸市萬口稱快明日閭閻間有畫公像者不二三年方數千里之間行於野民安其樂郊出于塗商免其露處觀善俗既庶而有教察軍志則又知夫怯私鬪勇公戰威行惠布陽開隂肅內外修治略無遺䇿河流速潤衛亦復承平之舊宋人為禜其北門矣丁已春詔左丞相阿藍得兒勾較諸路財賦性苛刻煆錬羅織轉功為罪上下例遭凌辱公以勳舊獨見容假公請曰經略事我實主治是非功過理當我責今舍焉而罪餘人心何能安怒叱去公不為動堅請者數四用是翼蔽賴釋者甚衆戊午秋扈憲宗西征明年夏駐合州之釣魚山秋疫作方議回鑾宋將吕文德帥艨艟千餘蔽嘉陵江來犯逆戰不利上命公禦之乃分軍為兩翼跨江流縱擊􅟃巨艦數百艘追至重慶三戰三捷遂班師而還又明年庚申夏六月是為中統元年皇帝御極首問公治國安民之道遂具疏以聞皆時所急務上嘉納之旋命公撤江上軍還授河南等路宣撫使兼江淮諸翼軍馬經略使制辭有史天澤自太祖皇帝命木花里國王開拓漢地卿兄有佐命殊勳又扈從朕之父兄勤勞王事文經武略於國有功綏撫河南民懷惠愛有功髙心小夷險不移之旨明年夏五月由江淮經略使進拜中書右丞相公既秉鈞衡細大之務知無不為然言必慮其所終行必稽其所敝不強時之不能不禁民之必犯體時順勢通變制冝於是清中書以正紀綱分六部以綜名實設撫司以肅州郡退貪殘以簡賢能霈恩澤以安反側頒祿秩以飬廉節禁賄賂以絶幸門又定省規十條董正其機務憲宗𥘉年括户餘百萬至是諸色占役者強半悉奏還為民籍以紓疲瘵論思之際處國相儒臣間調諧彌縫必使情通理得期於事集功成澤𬒳生民而巳自是上下交孚帝載熙緝中書無留務矣故中統𥘉元文物休明階太平之治者公之力為居多秋九月扈從北征次昔木土與阿里不哥遇命線真為右軍公為左軍仍合大勢蹴之北兵潰遁三年春璮賊隂結宋人以益都叛上命親王合必赤總兵討之凶勢張甚詔公往視聞璮入據濟南公曰豨突入苙無能為也至則進説於王曰璮多譎而兵練不冝力角當以歲月斃之遂環以深溝髙壘奔軼應援之計略不能肆四月軍潰出降生擒璮公力主斬於軍門誅同惡者數十餘人悉縱歸傳檄東下為璮守者皆降及陛見悉歸功諸將乃以擅殺自劾上察公忠誠亦不之罪𥘉臨軒授鉞付公顓征諸將皆聽莭制逮卒事未嘗以詔旨示人三齊平首奏兵民之權不可併居一門行之請自臣家始史氏子弟即日皆解紱而退𥘉公既相即辭其封邑凡三請乃許其謙遜密勿類如此至元改元加光祿大夫中書右丞相如故三年皇太子燕王領中書兼判樞密院以公為左丞相樞密副使遂議建三衛及留兵寓農之䇿不二三年國容軍實蔚然可觀六年朝廷營取襄漢詔公與駙馬忽刺出往經畫之賜金幣甚渥至則相要害起一字城聮亘諸堡貯兵儲絶聲援示以久駐必取之基既而以疾還明年進開府儀同三司平章軍國重事仍令右丞相安童諭旨曰中書省尚書省樞密院御史臺或一月或浹旬大事卿可商議小事不煩卿也十年宋將吕文煥以襄陽內附聖天子赫然有掃清六合混一車書之意明年秋與右丞相伯顔總大軍行臺荆湖自襄州水陸並進趣鄂渚渡江中道病不能進上聞遣使賜葡萄酒勞公仍慰諭曰卿自朕祖宗以來躬擐甲胄跋履山川宣力者多矣又卿首事南伐異日功成皆卿力也勿以小疾阻行便為憂勞可且北歸善自調護公還真定上又遣其子杠與尚醫馳視及賜蔘糖等物因附奏曰臣大限有終死不足惜第請天兵渡江以殺掠為戒言訖而薨略不及其家事年七十有四計聞上深震悼遣近侍致奠賻白金若干贈太尉諡曰忠武仍勑辭臣製碑表其勳德公忠亮有大莭出入將相近五十年其元勳碩德柱召四朝師表百辟殆古社稷臣而氣貌循循若無所為者及臨大事論大政夷大難毅然以天下之重自任要以竭忠徇國尊主庇民為心一以至誠將之其視冨貴權勢斂然畏逺若將有凂於巳者其善始令終世擬之郭汾陽而器量涵弘識慮明哲又根於天性粹然故纍朝賞公忠勤龍光稠疊前後賜賚不可殫紀公𥘉進大拜制下之日朝野交慶公門閣蕭然若無所事有面説公以威權自張者公因舉唐周墀為相問於韋澳曰力小任重何以能濟澳曰願相公無權墀愕然不知所謂澳曰爵祿刑賞與天下共之何權之有又曰某緣汗馬頗著微勞餘將何有令眷倚如此正以軍國事體猥多歷練老夫有通譯其間為諸公調逹耳相則吾何敢當言者悚服而退至於開誠心布公道集衆思廣忠益用人齊家訓教子姪又有大過人者當歸德城潰脫李大莭於白刃俾參幕謀留務無巨細一以委之參卿主昌齡代公治衛亦以聽其注措其禆贊籌畫則王守道納合松年四人推誠委寄雖骨肉莫能間故真定治效髙視他郡四方為之訓北渡後名士多流寓失所知公好賢樂善偕來遊依若王滹南元遺山李敬齋白樞判曹南湖劉房山假繼昌徒單顒軒為料其生理賔禮甚厚暇則與之講究經史推明治道其張頥齋陳之網楊西菴張條山孫議事擢府薦逹至光顯云𥘉武仙既害都帥公紹其職及兄子楫長即奏請於朝曰臣始遭家難龜勉承乏以雪讎恥今姪楫等皆可勝任願以職歸之畢臣宿志太宗曰但聞爭官者多讓職者鮮卿之此舉殊可嘉尚朕自有官俾之即詔楫為真定路兵馬都總管後又奏次姪權充唐鄧軍萬户公因以疾乞退曰臣無大功報國一家處三要職恩寵踰等敢昧死固請上曰卿奕世忠勤有勞於國一門三職何愧何嫌竟不允憲宗駐六盤也詔發民為兵敕使擬公子為帥公曰吾昆弟三人大兄之子俱顯仲之子未也幸先之使者嘆服竟以姪子拒充新軍萬户𥘉總衛釣魚也有邊將蒲察琚者隸焉日有言偃蹇不為下公含容之明年渾都海平行臺上功相府獨琚名闕公問焉或以前事對公曰聞平夷隴右若功最多其可後哉即命具完文以進遂均賞賚其忘過記功又如此嘗集子姪輩戒之曰史氏起龍幹際風雲德涼效薄今身名顯赫宗族昌熾如是何以答乾坤大造纍朝之恩私乎若以王事殁邊褁馬革歸葬吾素願也汝等異時䇿名委質盡忠所事以圗報國又曰惟孝與義可有立於代汝等謹服此訓苟違吾言與暴吾丘墓等爾公年四十始抑莭讀書酷嗜資治通鑑真積力久義精理貫諷誦略皆上口至成敗是非往往立論出人意表雖老師宿儒有不加詳者至矢謀廟堂運籌戎幄良法美意契合融會見諸行事者誠無愧於古人云八子格中書右丞樟前新軍萬户棣中山知府杠提刑按察使𣏌前衛輝路總管梓澧州路同知楷終南陽府同知彬御史中丞孫男一十六人不肖惲猥登公門者有年及與諸子遊故聞公言行頗詳以家傳屬筆故勉為撰述異時太史氏勒元勳於帝籍贊盡像於凌煙庶幾有所考焉贊曰忠武公當草昧患難之際憤發義勇收合散亡卒之芟群雄定河朔開國承家光昭父兄遺業其功烈巳不世出然一時佐命儷景同翻者多矣唯公歷事四朝恩遇眷倚始終不少衰復能斂百戰之威雍容廊廟以道事君為時賢相髙名完節爛然獨著福祿永終慶流後裔豈偶然致哉蓋由勳德兼備忠智兩全君臣之間有以感召故也若秖以遭際期運依乘風雲論之是豈真知公者哉故推其生平行巳大節為後來之法云秋澗先生大全文集卷第四十八
