body:
  text: 上世祖皇帝論政事書臣近蒙礼部符承中書省劄該憲䑓欽奉聖㫖召臣惲馳傳赴闕庭者臣惲伏自欽承明命夙夜秪懼不知所為意者憲䑓過舉俾備顧問庻有所彂明因自忖量國家之事日有萬幾非愚下所能識然臣自中元迄於今日乆叨仕進區區管窺不無一見輒敢以時務所冝先者數事昧死上聞臣聞自古創業垂統之君必定制畫法傳之子孫俾遵而守之以爲長卋不拔之本欽惟皇帝陛下聖文神武以有爲之資膺大一綂之運長䇿撫馭區宇民數逺邁漢唐其所渇者特治道而巳然三十年間励精爲治因時制冝良法羙意固巳周悉今也有更張振勵講明畫一若懸象而昭布之使臣民曉然知其法之所以豈不便㢤故臣以立法定制爲論治之始一曰議憲章以一政體傳曰法者輔治之具一日闕則不可君操扵上永作成憲吏承於下遵爲定式民曉其法易避而難犯若周之三典漢之九章是也今國家有天下六十餘年小大之法尚逺定議内而憲臺天子之執法外而廉司州郡之法吏是具司理之官而無所守之法猶有醫而無藥也至平刑議断旋旋為理未免有酌量准擬之差彼此輕重之異臣愚謂冝将已定律令頒為新法或有不通行未盡該者如累朝聖訓與中綂迄今條格通行議擬參而用之與百姓更始如是則法無二門輕重適當吏安所守民知所避而難犯天下幸甚二曰定制度以抑奢僣夫制度者明尊卑别貴賤法天道而立人極也故古者衣服飲食輿馬屋廬皆有恒制至於庶人僕妾其禁尤嚴惟在君人者制節堇度率先化下為務何則上之動静為人勞逸之本上之奢儉為人冨貧之源可不鍳㢤欽惟皇帝陛下臨御以来躬先儉素思復淳風如輕紵衣而貴紬繒去金飾而朴鞍履至衣服等物銷織鍍呀之類一切禁止以奉行漸逺不無㢮緩今也臣民衣飲踰於公侯婦女衣着䓁扵貴戚以致聘財過扵卿相男女不能㛰姻正以用之無制僣越暴殄有不能供億者故物價不淂不踴而貴錢幣不得不虚而輕上下困弊日甚一日假若巨室之家親属奴隷衣飲一切自有等差若例而一之寕不困乏臣愚以謂冝一切定奪大行禁止使民志定而不少僣越用既有度物自豊饒恐亦實楮幣殺物價之一端也三曰節浮費以豊財用夫一世之財足周一卋之用不必專豊其財去其害財者可也今國家財賦方之中綂𥘉年歲入何啻倍蓰而每歳經費終不阜贍者豈以事勝於財過有所費故也為今之計正當量入為出以過有舉作為戒除饗宗廟供乗輿給邊備賞戰功捄荒歳外如冗兵妄求浮食冗費及不在常例者冝撿括一切省减以豊其財財豊事勝食足氣充以攻則取以戰則勝以柔則服将何為而不成何求而不獲古之善為國者君不必冨冨藏扵民故用雖多而取不竭孔子曰百姓足君孰與不足此之謂也且財非天來皆自民出竭澤焚林其孰禦之但力屈財殫非所以養民而強國也昔亡金世宗諸王有以不給而請告者世宗曰汝軰何騃殊不知府庫之財乃百姓之財耳我但緫而主之安敢妄費迄今稱説以為君人至言可不鍳哉四曰重名爵以攬威權古人稱官爵謂之天秩王者代天爵人鼓舞一世使天下之人奔走為吾用者此也惟爵与禄不輕以付人曰賢曰材迺能淂之所以為礪世磨鈍之具若得之輕則視之輕視之輕則人不重人不重将見君子逺小人至此必然理也惟其磨礪轡馭之權世主操於上不輕授人與當其材何患氣之不振力之不竭事之不成者哉今四海一家權宜假借之舉日漸希濶正國家收攬威權之時如近年委任稍重者罔考其素即授崇品激之建功立事固是駕馭英雄大權苟非其人不無叨竊不安之懼今中外無事朝廷冝重而惜之昔有唐使職或帶相衘然止行見軄曽無分省實權五曰議㢘司以勵庻官臣聞古之善為國者不使人有怠惰不振之氣若作扵心而害扵政苟非以徳振𧺫必湏度時宣本人情齊之以法故淂小大畢力上不勞而衆事舉今州郡之官品流殽雜既無選舉甄别止循常資紛紛藉藉聚散扵吏部例淂一官鮮不因循苟且以歲月飬資考而已欲望承流宣化趨事赴功卓有惟新之政亦已難矣甞觀漢唐之馭吏也䏻者増秩賜金公卿缺則𥙷之以表其賢否者放田里而不事事唐則召七品以上官集扵闕庭親與訪問䆒淂失而進退之然二者不過爵禄為勸爵禄極則意滿足意滿足則怠心生亦有無如何者故持斧直指採訪黜陟䓁使歲相望於道而本朝之舉髙出前代比者㢘司之設𥘉氣甚張中外之官悚然有改過自新之念大姦巨猾致畏懾而不自安庸人懦夫将卓爾而有所立行無㡬何法禁稍寛使監視者勁挺之氣不息而自歛聴從者奸弊之萌潜滋而復持恐徒易其名而不能革州縣之故習夫刑罰崇寛固是國家羙政然分别善悪以示勸懲豈淂專務寛恤昔亡金大㝎間尚書省奏順州軍判崔伯時受贓不枉法准制當削官停職世宗曰受財不至枉法以習知法律故也所爲奸狡習與性成後復任用豈䏻自悛雖所犯上扵追官非奉特㫖無復録用以致犯禁者鮮此先事之明驗也今風俗澆薄遇有所犯苟免無耻臣愚爲法冝稍重以權一時其要在人法並任精擇官僚優加吏禄憲綱旣立公道大行官有作新之氣吏無餬口之虞我之氣既伸彼安淂不振我之政既肅彼安敢或私所謂上行下效源清流長将見風彩百倍有登攬澄清之望矣六曰議保舉以覈名實方今親民與参佐官莫縣令經厯爲重縣令迺百姓師帥師帥賢則徳澤宣参署爲一路紀綱紀綱振則政務舉今例出常流安取殊績臣愚以爲若行品官保舉法庶得其人其法品量舉主與所保者資厯相應果皆兩可復精加磨勘無謬妄私意然後許令入状相小大之才授繁簡之任限以歳月如唐制釐務出二百日者是也課其殿最升黜舉主淂人者受知賢之賞不職者坐不當之罰舉官自然盡心受保者常恐相累如此庶立功而寡過矣献選尤冝施用此法何則江南北至平㝎諒爲不易凢所隷附秋毫無犯可謂仁義之師只以前省調官賄而海放行省注擬尤爲濫雜侵漁掊克慘扵兵㐫至盗賊竊發指此爲名仰頼天恩幸其無事今冝委官分㨂以行此法其停革人貟不至罷黜者降之邊逺逺見職委有聲迹者使之内遷亦激勸一法兹盖自漢唐五代迄扵亡金皆遵而行之當時號稱淂人然必湏内設審官考功等職專掌其事七曰設科舉以収人材方今名儒碩徳既老且盡後生晚進既無進望例多不學州府郷縣雖立教官講書㑹課秪皆虚名畧無實効以致非常之材未聞一士州郡政治若無可称思淂大儒碩徳難矣臣愚以謂不若開設選㪯取驗之速也夫進士選厯代號取士正科将相之材皆従此出前代講之熟矣理有不可廢者若限以歲月而考試之将見士争力學人材軰出可計日而待也論者必曰今以貟多闕少見行壅滯若𣸪此㪯是愈壅而滯之也臣謂不然盖科舉之設本以覈實學而収多士清仕途而息雜流庶淂将相全材為國論治道備大用也豈不愈扵學校徒設汗漫而無所成乎八曰試吏貟以清政務前代取吏之法条目甚嚴如宰相子辟舉令取充省雜終塲㪯人試𥙷䑓掾品官子孫吏貟班秪閤門䓁人出身者試𥙷六部令史夫令者明法令曰令史者通經史曰史今府州司縣應用一切胥吏多自帖書中来官無取材勢湏及此所習既凢聞見或寡欲望明刑政識大體務清弊革難矣臣愚以謂為今之計莫若将合歲貢吏人以吏貟法試之中選者仍許上貢𥙷充随朝身役外州府郡見役者從㢘司以校法試驗庶幾激之積漸肯學其月請俸給亦合定奪能使淂餬其口然後可責以㢘何則今㢘司專抑吏權察非違少有貪鄙不計養㢘即按而治之是縦之竊而責以何盗之為豈理也㢤九曰恤軍民以固邦本近命新省整治以来一切事務盡從簡静可謂不嚴而治不肅而成者也中外㷩熈翕然有拭目太平之望兹蓋皇帝陛下屏去奸慝保合大和嘉靖邦本專任責成之効也然猶有當軫慮者夫為治之道政貴均一不少偏重否則必更而張之使至公均𬒳國家且自攻圍㐮陽以来簽取軍役盖四舉矣将着中物力等户盡充軍站中間抛下上户其䏻有幾皆貧難下户而軍興百色所湏皆仰供辦江南甫下遭值前省和顧和易急徴暴㰸侵漁不法又将軍站閃下差稅不問多寡止除四兩餘者分洒見户其逃亾差稅又行每歲陪納數年之間編氓已是靠損其小户困苦不較可知臣以時属方殷其代輸差稅冝令蠲免涵養存恤小康若一旦别有征求易為責辦其軍站户富者至有田畒連阡陌家資累巨萬丁對列什伍貧者日求生活有儲無甔石田無置錐者今也不分難易一體應役又至元十一年簽充到軍役者多是近下户計當時起遣巳是生受臣愚謂俱合分㨂定奪庶不致困乏逃竄有悮臨時調遣不均之弊莫此為重十曰復常平以廣蓄積常平倉設自至元八年随路収貯斛粟約八十餘萬今倉廩具存起運乆空甚非朝廷捄荒侐民本意夫常平之法歲豊増價以糴之則農重榖而敦本歲荒則减價以粜之故民倚安而無菜色如徃年㝎時估以平物價竟不克行殊不若常平之有粟也盖低昂權在有司兼併利無專檀故也若𣸪實常平倘遇㐫歉出糶三二千石榖價自平楮幣亦復加重且免賑濟破用軍國正儲實爲古今良法十一曰廣屯田以息逺餉臣聞邊儲逺餉自古未有良法如飛輓負載賣爵贖罪引種和糴未免弊困多不能行俱未若留兵屯田爲古今之長䇿也臣試以唐振武事言之憲宗元和七年李絳言天徳振武今豊州等處左右良田約四千八百頃収粟四十萬斛歲省度支錢二十餘萬緡兹非明験欤今振武豊州界河兩傍除營帳百姓耕占外其餘荒閑尚多若大治屯田自非水旱田功稍集國儲必有所濟唐陸贄所謂縁邊土沃而乆荒所収必厚又近歲山後流移户多将見抛地土時暫借令營屯亦是一法冨弼曽言此事及撿括冐占仍招募願户者聽外邊屯已置營屯去䖏亦冝差強果為國盡心有為能臣重與撿勘其間一切可行未㪯已行不盡者極人為而盡地力仍将迤南一切置屯見閑户数併徙邊防以捄一時此急扵治外之意也十二曰息逺畧以撫已有臣常聞老子以恬淡為宗孔宣父戒及其在淂二聖人垂教以天理當然為言非徒設也欽惟皇帝陛下聖神文武臨御天下三十餘年昭丕天之功接千歲之統三五巳来未有若斯之盛其扵太祖聖武皇帝垂創之業可謂大集厥成然有其有者安務廣徳者強審今之勢譬猶蓄牧大家川量谷計數巳殷冨正在牧圉擇人芻豢淂所而巳如此則牛羊茁壮日蕃而無耗不然罔恤見有又務多淂将見復求者未獲則已有者瘠而耗之可不惜哉伏願陛下息逺畧撫巳有以恬淡為心以在淂為戒頥養聖夀配天無極此宗廟神靈四海臣民之願也臣又甞觀天地之氣四時行萬物生皆自然而然又其升降止三萬里之中其範圍不出三十萬里之内餙則混淪芳礴雖聖人有置而不論者伏惟陛下憲天體道財成輔相功巳不䏻殚紀尚何言而何慮㢤十三曰感和氣以消水旱夫兵者㓙器戰者危事不淂巳而用之且以強勝為戒我國家以神武戡定海宇日月所出没霜露所霑墜莫不臣而主之然地廣物衆不無孽茅其間故三十年之乆十有餘㪯如征大理雲南渡鄂渚平内難討賊璮取江南破㐮漢駕洋海下占城定髙麗問罪交州掃清遼甸皆除暴固存彼動此應不淂已而用之之舉也然士卒愁苦死傷暴露邊郡困乏中外憂勞之氣不淂不傷隂陽之和而致水旱之報是以聖人重之畏之故老子曰大軍之後必有㐫年師之所䖏荆棘生焉故比年以来水旱無時霜災屢作山崩地震變出非常奸臣柄用盗賊竊彂百姓嗸嗸曰趍扵困臣常讀中元已来國書詔条未甞不以生靈為念弃捐細故講信修睦以用兵為重此堯舜好生之徳禹湯克寛不自滿假之仁也願陛下躬體玄黙頥養聖夀與天無極以𥘉元之心為心以恬澹之慮為慮為民祈天請􅒛灾害不生禍亂不作使黎庶知其無好兵之心天地鬼神諒其不淂巳之意庶幾天回哀眷易乖戾而為和平變荒歉而為豊稔㰸時五福敷錫庶民咸躋仁夀之域天下幸甚十四曰崇教化以厚風俗自昔風俗羙好由禮義所生今也礼義既衰故日趍扵薄一法出則衆奸作一令下則百詐𧺫何則民所欲而生者歲不加益我過為之求者日有所増所謂救生而不贍奚暇治礼義㢤有司釋此不念每以厚風俗為務如孝行復役莭婦有旌議􅽰姻立學師表㳤慝忠臣義士歲有常秩之類非不家至户曉然終無分寸之効者徒文具虚名而已夫天下之事有本有末知所先後則教立而化行臣愚以為風化之行莫國家若先以四教為本曰仁以養之義以取之礼以安之信以行之何為仁父愛子育懐生樂業温飫以養其心何為義輕徭薄賦取㰸合冝寛𥙿以暢其氣何為禮上下有分毋妄侵辱誅責以當其功罪何為信發號施令一出不易忱誠以明其約束是也而前政者謂桑葛也曽不務此專以威虐肆心督責為令取辦一時流毒四海不知陵遟偏詖有不可救藥至于今為厲者如逋負差徭有巳蠲未蠲者貧難軍人有巳間未間者民出祗應不蒙撥降反復償其不應民辦和買雖蒙官還曽何敷其元價杖刑重責不上大夫崇卑之品曽不少間悉𬒳其戮辱夫如是将何以責民心之近厚風俗之淳粹者㢤惟其四者本立而天下悚然有忠厚㢘耻之心而後敦之以禮譲堇之以庠序觀之以郷飲教之以冠㛰䘮祭民将目擊而心諭安行而有淂二三大臣匡直輔翼扵上時從而振徳之孰有子遺其親臣後其君者㢤所謂父子有親君臣有義不曰風恬俗羙将安歸乎十五曰减行院以一調遣伏見近者立行院四䖏盖欲養兵力分省權而免横役然不可多設多設則一旦遇有調遣號令不相綂一至合而征苟進渉險難不肯併力一向以趍成功况江嶺阻隔動輒数百里賊去此而盗彼即欲加兵則曰我已降扵彼比縁知㑹已殺掠而去如向者鍾賊是也其在江西我逐而出境即睨而不視其在福建復逐而出境亦坐而不問已至朝廷專差重臣㑹三道之兵緫綂於上才方勦絶臣故曰不可多立者縁此也若止設一院於江州地既酌中號令四出復命皇子震綂於上使跨有江淮遥制兵勢将何衝而不折何令之不一哉誠為簡便十六曰絶交貢以示曠度夫邊方小國外示臣属内實觀望我以誠徃彼輒譎來何則恃其險僻昧夫天理而懐苟且假息之念故也非脩文以來易以計破難以兵碎也今交趾漢數郡之地耳數年之間雖奉貢伻來終未稽顙闕下𣢾輸誠赤今年羾一犀象明年献翠具若干是皆我物藉為巳有調書詞延歲月而巳此最不可信者昔漢文帝却千里馬詔郡國毋令來獻而越王尉他曽未幾何怨艾自新去號北面終其身内属正以德禮懐柔然尔臣愚以謂彼之交貢自今冝辞而無受則我之所得者有三不寳逺物示以曠度一也鱗介之属叵測淺深不知我之虚實彼用自絶使私計内窮二也又使駭夫天子明見照萬里之外畏天事大之心庻有以自省其曲直所在三也刺竹藥弩緩則津行奸詐急則曲尽服從伏乞下公卿集議以付有司臣之所言雖至淺近然當陛下無忌諱之時逺𬒳寵召無一言𥙷報緘黙旅退豈惟自棄大負朝廷虚求之心顧臣庸愚何足重輕萬一片言有可取使四方大賢大徳之士聞之曰如臣者且蒙採擇将􅑲􅑲而來皆為陛下用矣臣不勝俯伏待罪憂恐之至臣惲昧死再拜堇言上御史臺書至元五年十月日前林脩撰王惲言盖聞御史周官也其職盖賛書受法令秦漢以來乃副貳丞相任耳目司察之寄唐制二䑓左以紏朝政右以繩郡縣職非不要責非不重也至於天下之大奸郡國之大豪時務之得失生民之利病京官之迭居内外郡吏之歴事臧否莫不劾視按問以之定功罪而賞罰不待稽覆證左㑹有失實而抵坐之也是以天下之人惴惴焉凛凛焉惟恐有毫髮詿悞風聞疑佀名絓憲章至於顛越不恭者盖千百一而巳故朝廷清而萬事咸理逺近一正而奸邪屏跡矣我囯家列聖相承重㷩累洽奄宅區夏垂六十年迨聖天子登極典憲日新百度具舉扵是建䑓司置僚属盖将示公道抑澆私折奸萌救内重之弊也切惟風憲修目古今一致也強宗豪右田宅踰制凌弱暴寡二千石刻損政令不䘏疑獄倍公向私侵漁百姓苟阿所愛蔽賢寵頑通行貨賂選署不平此漢六條之制也唐之目四十有四今不具見雖繁簡不同以近事攷之或有可詳若聴覧未充衮職有闕弥縫匡救之者不敢後也中書政本機務所出整肅紏䋲之者不可闕也官或備貟未淂其人擢任薦升之者不可寛也綜劾之權内外惟一強禦巽懦之際不可異也大臣當任責也返循嘿而無所建明小臣當奉職也或僣越而覬歈徼倖至扵臣門如市請謁公行名器大權假授失當學挍乆廢以為非所急而起青衿之譏賢材在下以謂不必用而興白駒之嘆選部無法徇情故而害至公郷原賊徳乱朱紫而敗俗化守令不職怨黷交興刑罰失衷手足無措胥吏舞文而亂紀群小告訐以成風服色僣越尊卑無章工技滛巧澆靡日蠧将帥狃扵掊克而邊防㢮上下習扵垢乱而積弊深若是者皆國家之急務䑓諌所當亟言而不可後者也今聖天子體囯子民度越百代大絰良法志在必行然以今觀之憲䑓一司整綱頓紀所以肅清内外其可不申明大體姑務毛辛細事苟以塞詔􅒛而已耶然事有未易以一二言者試以其事切扵今者明之凢䑓之所紏擿者皆百官有司踰扵法之外者也今承積弊之後法制未完品式未具官無㝎資人無㝎分數年以来抵法冐禁者人人皆是也舉一而遺其九是九者幸免其一者虽置扵理亦未能服其心也何則盖其罪均而刑殊罹扵法者少漏扵網者多也若欲人人而劾之内自京畿外及州郡拯行之間圜土之内将不勝其繫者矣異日法之不行二者必居一扵此古者大弊之後必有更始之制然後法得以行人莫敢犯故能洗舊染之汚成維新之化果克若斯善之善者也其或不然當㪯其大而遺其細大者伏其罪而小者栗矣若張綱之埋輪陽城之伏閤貴戚㰸手若鮑中丞金吾膽落如温御史如是則吾之法行矣今中外大小百司扵未立法制已前其奸贓不發者不可以枚計此朝廷有識之士所共知共見者也制立之後有畏罪懼法改而奉公爲能吏矣亦有狃於故習未能尽革少有贓私而輕者矣極有怙奸自終長惡不悛觸冐公禁無所忌惮姦私狼籍者矣所謂人人不能劾之者盖謂此也如能區别其類刋去其太甚者董敕懲艾其情輕者革心而奉公為能吏者冝加褒異奨顕堅其自新之心如此則贓私者去矣虽然事猶有可慮者贓汚雖去内外闕貟者必多而事有曠矣必欲備官而無曠扵事其法有五曰科舉曰吏貟曰門廕曰劳效曰選㪯其四者前代遺法具在㪯而行之則辦矣獨選㪯之制舊例雖存擬之當今權冝莭目固有不同今日選舉之法當令内外官五品以上各舉所知不拘親故門下及子孫弟姪其材可備用者皆淂預選所貢者賢舉主當以次旌擢所貢者不肖與之减等致罰使不淂預京官之例此五事既行付之吏部定為選格所謂去前之惡牧後之善承其乏備其曠使選㪯有例品莭有章朝廷無可指之瑕不惟法制一定後世有所持循使天下徼倖覬覦非望無行之徒将不革而自去矣今憲司既建所當行者其目甚多然切於今者獨此五事為要耳所謂一代之制綱舉而衆目張者矣伏惟二三賢執事天挺髙明剛而不撓忠言讜論洞逹政體毅然以大節任天下之重蓋素所藴積耳而復内貳鈞軸外領雄藩山立揚休坐鎮雅俗底柱障乎頽波風稜粛乎霜簡見諸行事上為聖天子所知非一朝一夕是可謂據淂致之位又有可行之資者矣若惲也草茅一介遭遇明時違逺朝廷盖八年于兹雖越在草野乃心未甞一日不在王室今復蒙被寵召拔𧺫扵泥塗之中犬馬之力思所以報效而媿其僝弱不材然愚衷内激情有不能巳者敢觸犯忌諱贄狂瞽以獻冐瀆尊威不勝戰懼之至上張右丞書中綂元年冬十一月朔布衣王惲堇齋沭頓首再拜致書于右轄相公閤下夫布衣窮悴之士混閭閻之下䖏嵓穴之間欲砥行立名非附驥尾而託青雲之士惡䏻施於後世㢤昔夷齊譲囯之賢君也在彼則僻䖏海濵在此則晦迹中國周武北伐二人相與叩馬而諌太公以義士扶而去之時人未之知也及宣父賛之曰古之賢人也求仁而得仁故淂名粲星斗望隆嵩華奮乎百世之上通乎千載之下其名日益彰矣此太史公所以感激而傳之也向非夫子表而出之吾知其寥寥寂寂西山一夫耳又焉能㢘頑鄙而厲懦夫者㢤惲衛人也生於窮巷之中長扵蓬茨之下意廣材踈無所肖似徒以欲罷不能之心雪其窓萤其几蟫蠧書史自娱自愈而巳其扵聖學之藴治國平天下之術懵不知也以故年近不惑而無成扵一藝迹混常流而不登於士林傳曰四十五十而無聞焉斯亦不足畏也巳㒒每讀至此未甞不廢書長嘆傷歳月不我與也於是中夜興起徬徨四顧思淂出大賢之門脫嚢中之頴攀逸駕附驥尾固瞠乎其後矣庻幾碌碌因人成事免夫堙㓕無聞之耻方今聖賢在上治具畢張朝廷清明百度改正内都省而綂宏綱外緫司而平庻政雷厲風飛皇猷攸塞因自謂曰弹貢禹之冠捧毛義之檄玆非其時乎遂乃應東魯之辟沗賔僚之末席不暇煖而簡書之召巳飛馳扵汶水之上矣伏自俟命巳來倉皇失措不知所以自通知扵閤下尚頼徃者知遇之故拜下風接清燕藉手尺書俯憐駑鈍以致剪拂顧盻俾之長鳴而増倍價是遇知扵閤下者佀不偶然矣伏惟閤下剛徤文明練逹政體挾漢日則洗光咸池分蘭省則坐鎮俗雅忠結主知學為世用承思綸扵夜半洞律管扵天心而復闚其經綸之業大有髙扵天下者不淂不為閤下頌之昔房喬善断而如晦矢之以謨姚崇應変而宋璟守之以文四賢者雖所行不仝同歸于正故相須以成俾無悔事今閤下極推譲規随之度収清寕畫一之功誠漢室之蕭曹聖朝之房杜也然念朝廷日逺天下之事尽在中書中書之權寔在二三執政今閤下繫國安危為世輕重進退百官號令天下所謂仕進之煙霄一世之龍門也尚何驥尾青雲之比擬㢤天下之士欲掇青紫昭名聲者捨閤下而将㱕乎如惲之心非敢必其自逺方而来以黔馿之技名聮仕版身簉蘭臺投書宰相遂韓愈早逹之心擁帚侯門要魏勃見知之遇既聞逹扵諸侯㱕顕揚扵閭里正以千里一召寵幸過矣是則足以脱布衣之賤刷無聞之恥而抱一壷千金之貴也尚何冨貴之心之有㢤伏願明明在上穆穆布列聚精㑹神相淂益章無疆之休與世共之而惲也䖏畎畒之中樂堯舜之道辝編户之役為太平之民守先人之弊廬甘考䁀之饘粥亦足以餬口而蔽風雨矣不然登西山而追伯夷之風游東魯而觀洙泗之教豈淂不謂由煙霄而附青雲自閤下而攀驥尾顯名當時施扵後世者㢤觸犯尊嚴不勝惶恐之至上元仲一書記書正月十四日王惲䪺首再拜白盖聞居天下有二道焉出與䖏而已伏惟書記上人聦明特逹居天下至静之中窮聖學大衍之道積有年矣囬視斯丗若不足玩至於或出或䖏安徃而不可㢤第所可惜者時也朝廷嚮明而治聖王順應而行圗囬天功混一區宇網羅英俊片善俾舉彼聞風興起者雖山澤之蒭蕘布衣之賤士思砥節礪行竭力悉智願仰副上之好賢樂善之實焉若曰薦舉不私用養淂所其職在於賓師之賢遇知主上之人朝夕引翼一歸扵正俾賢者進而不肖者退此天下重事而治乱之所係也故傳曰得士者昌失士者亡又詩云濟済多士文王以寕盖言世顕之士能如是也嗚呼何君不聖何王不明必淂聦明至静之士見微知著臨事不惑断于中而察于外夫然後可淂非常之士而能建莫大之功當今之時可以與權者舎上人一二輩其孰與㢤若僕也蟫蠧書史兀坐窮年佔畢之外百事不觧爾来二十有八年矣傳曰四十五十而無聞焉斯亦不足畏也已僕每讀至此未甞不掩卷嘆息内増愧赧噫自治不勇而喋喋扵左右者何㢤盖僕恨以荒踈無似不能卓然自表扵世而上人遭際乃爾君臣之義既不可廢今日之出可謂千載一時也伏惟書記上人藉有為之資乗可致之勢出則為王者之師䖏則不失髙尚其事若僕所謂可惜者如是而巳矣但未知生民幸不幸耳西狩尚遥想當逺去略布鄙懐惟上人其圖之惲載拜檄李秀才士觀取淵明文集書前六月五日嘿齋主人頓首白余家舊藏靖莭文集一編盖王掾済川之所録也此本自入王氏不𣸪備翻閱有年矣今吾子所秘扵篋者實出弊家所蔵之舊本數欲一觀吾子愕然以無有力辝余且謂誠然而止夫何天誘其衷手足悮敗云此集我家實有之盖次兄手所録也不知吾子前日之拒之辭誠何心㢤且靖莭之詩正如清風明月四時何甞闕焉既非秘異世莫淂聞之書一旦譸張自欺其心又欺其友抑不知吾子誠意之學尚友之義果安在㢤傅曰人誰無過過而䏻改善莫大焉望吾子毋以前日之辝為愧不致有抵璧投珠之舉復惠然許諾以脩舊好是吾黨中改過自新之友豈不快㢤豈不快㢤如其不然是吾子終絶扵長者也吾且将長驅問罪以圗進取之計不知吾子将何所逃罪焉縦吾子限以學海峻以文府堅以詩壘整筆陣以前與吾義師抗正煩腰間之箭重射魯連之書也若曰堅守力盡乃降謝罪扵轅門之下将唯命是聴俾介忠胄信之士干仁櫓義之師尽取所有稇載而歸以貽執事羞固非所願也惟吾子詳擇焉嘿齋主人頓首白荅周南樂書惲再拜白來書承勉以割爱致夀為喻雅意甚佳然僕近六旬已來老病相仍百念灰冷何止此一事爾至云情之過差似未相悉也且老妻推自結髮迄今與相生活者四十餘年内助之力既勤孔多一旦决去即漠然若無所係豈人情也㢤故非夫之慟有不期然而然者如足下所喻是耄嗟者既非鼔缶者為是恐三極之間人倫大致造端之理未易可輕也兼聖人垂世以近情為貴静言来章殆以無情者為髙而不及者亦未為下也無乃泛應不相關之論㢤此說一行又佀夫足下平日扵吾老嫂䖍楽尔之懐絶藐然也其如諸餘何相頋偕老方以道業相規之不睱忽辱以風花為貺不幾扵當悲而歌哀樂失所乎且風花之愛盖少年忘念不圗吾友老大尚未厭斁情之所鍾果孰多焉臨帋信笔不覺喋喋如此幸併為一嘻也耒索㕔事題扁䓁書不䘏拙悪勉為作去未中尚民社自愛惲再拜白與子𥘉中丞書為長子慰釋惲再拜白聞吾友以季子之䘮情之所鍾時雖易有未克遽巳者切恐重傷天和且緩勿藥之喜欲有陳慰以目疾故敢奉書以寓其說夫事機臨衆淂所䖏為難憂患切身䖏之者尤不易也何則盖驗吾平時存養㝎力為何如耳死䘮固己大矣然有常有変父之扵子以愛為主子之扵父以顧養為先傷其愛莫逆扵父送其子雖為戚僅朞畧無弗忍過隆之礼豈養老送終人子之順事其或失養自夭者豈惟不順是亦門庭之孽也徃年寗人程氏丧其佳児程氏名和其子翰聰明有文卒及年二十哭而過市匪朝伊夕竟以哀而戕其生識者譏之盖以理哀之情之正以事而哀則情之私也自今觀之使程氏不死其子而所圖稱遂其後事蹉跌大有過扵夭閼之痛者向使程知幾先見何有扵事哀而殞其生者㢤乃知禍福倚伏未可以向謀為淂一旦遽失輒以永傷為抱也古稱聖與賢者為䏻以禮制心以義制事䖏平中而無過不及之差然哀之扵情固為不細發欲中莭聖不吾法吾何所揆㢤昔伯魚之死宣父不以弗忍易事而徒以隆其䘮有以見適扵中而不敢越也然哭子淵従者曰子慟矣兹盖痛其道無所属也子者一已之至惰道者天下後世之所公共也故扵仲由發無已之責在子鯉有過甚之嘻又傳曰君子所履小人所視巨室之所慕一國慕之古人當其無可柰何則安之念夫一身之重而以衆人之所視而慕者為慮其扵私憂故有不遑專䘏者兼盛衰吉㐫循環迭至吾之㝎力正在順受而已况氣之為孽理之不順者㢤甞以子夏䘮子哭而至失其明曽子數之以為過後人鍳之以為懲嗚呼在聖門之徒猶未免溺於所愛矧餘人㢤要之䏻截然剛制納諸中而不失其正有以義割愛而已故延陵季子其子死於嬴博之間袒還三號揜坎而即去曰骨肉㱕扵土魂氣無不之也意者父子雖天性而脩短亦命也觀其所䖏儉而有度哀而有莭可謂逹生死之變酌古今之冝適恩義之中而存後世乆逺之慮者矣故孔子嘆其合扵禮而賢之此無他䏻以義制恩也今吾友沉潜剛克明理而逹變脩其身而齊扵家刑扵家而逹扵人者也僕尚何言然一身之重存養之功逆順之理適中之義尤當以延陵之心為心以西河之過為戒而為後耒乆逺之慮者乃所以望扵閤下也惟髙明亮之信筆為言不罪踈拙惲再拜白謝張詹丞書六月日中議大夫治書侍御史王惲頓首再拜奉書于詹丞相公閤下昔韓昌黎以聲光未白屢用文章投獻知已若扵汴則售董公旹扵徐則撼張公建封在朝廷則取知扵宰相度予甞讀其書想其人何激揚奮發鋭扵進而希當世之用㢤盖欲遇夫大人君子假其休光餘烈以斯文効用将托扵不朽故也惲猥厠士行役志扵簡編者有年于兹縁技之痒時吐辭自喜亦欲效用扵世受知扵大人君子之門且驗夫平日勉行之素徘徊四顧曽不能就其知遇之願者亦有年矣側聞閤下以明亮之姿操特逹之用推賢薦士持衆羙効扵上以端宫府之望孜孜焉惟恐片善或遺一士之倀倀而去也切自喜幸今重華継明群彦周列兹非求知効用之時邪故奉書上進断不自疑竟承閤下不以愚䟽見鄙周旋備至俾峩冠而前顒對麾仗致有西池非常之遇豈惟身都顕異抑為吾道中外之光其知遇之幸何董張裴晋公之倫可淂而比儗者哉自是而後足跡踵扵門墻者數矣未嘗不顧盻剪拂使之增蕐當時葵藿微誠睠焉孰無然不敢有一毫過覬上凂左右者以本然之分固在尚何他覦而自取貪冐無厭之譏乎閤下才識明亮固雖逺計不忘此時之愚也既而行止靡定淹延茫洋莫知其然進退維谷之間寔有出扵無聊頼者不知扵已託是自䟽也因不自揆庶藉休燠少熈寒谷之凛又使遇知明時之奉庸有以将之也故伸鳴執事有不嫌扵屑屑者况聞省録不忘又有過扵前日顧盻剪拂之厚叙别之際欲負愧伸感且謝其不敏復恐倉卒共辝重淂罪扵左右用是不果扵披露也違離已来夙夜慨嘆至千今而有不遑安者何則言不𣸪于後進不保其徃此最君子之所深病在閤下固已融而不留而惲也不知量之慊若𣸪徃而不咎又恐貽自棄自絶之悔将何以復登中護之堂接君子之清光庶幾不腐之意者乎敢布愚衷惟君侯詳恕之惲再拜白議貢舉議貢舉人林肇自唐虞而法備扵周漢興迺用孝廉秀才等科䇿以經術時務以州郡大小限其歲貢之数以賞罰責長吏極其人材之精猶古貢士法也厯魏至扵後周中間因時更革固為不一要之不出漢制之舊迨隋始設進士科目試以程文時势好尚有不淂不然者至唐有明經進士等科既明一經復試程文對䇿中者雖鮮號稱淂人至有龍虎将相之目其明經立法敷淺易扵耴中當時亦不甚重又别設制科以待天下非常之士故前宋易明經為經義其賦義法度嚴備攷較公當至亡金極矣後世有不可廢者然論程文者謂學出剽竊不根經史又士子投牒自售行誼蔑聞㢘恥道䘮甚非三代貢士之法伏遇聖天子臨御之𥘉方継軆守文以設科取士為切若止用先皇帝已定格法與時適冝可舉而行如邁隆前代創為新制可不詳思揣其本未酌古今而論之惟古貢士率從學而出後世不詢經行徒採虚譽因循薦舉狃為私恩不顧公道此最不可者也莫若取唐楊綰宋朱熹䓁議叅而用之可行扵今綰之法曰令州郡察其孝友信義而通經學者州府試通所習經業貢扵禮部問經義十條對時務䇿三道皆通為上第其經義通八䇿通二爲中第其論語孝經孟子兼爲一經熹之議曰分諸經史如易詩書周礼二戴礼經春秋三傳各為一科将大學中庸論孟分為四科並附巳上大經逐年通試及廷試對䇿兼用經史断以已意以明時務得失愚謂為今之計冝先選教官定以明經史為所習科目以州郡大小限其生徒㨂俊秀無玷汚者充貟数以生徒貟数限歲貢人数期以歲月使尽修習之道然後州郡官察行攷學極其精當貢扵禮部經試經義作一場史試議論作一場題目止於三史内出廷試䇿兼用經史断以已意以明時務如是則士無不通之經不習之史進退用舎一出扵學既復古道且革累世虚文妄舉之弊必収實學適用之效豈不偉哉外據詩賦立科既乆習之者衆亦不冝驟停經史實學既盛彼自絀矣翰林學士王惲謹議秋澗先生大全文集卷苐三十五
