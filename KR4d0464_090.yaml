body:
  text: 便民三十五事自此係監司時建白皇帝聖旨裏中議大夫治書侍御史行御史臺事伏見朝廷勵精為治百度從新中外顒顒有太平之望然弊積日久事端非一必更張其大者重者使有定制則實惠可及於民今國家疆宇民數逺過漢唐歲入經費又為不資所急者立法選官恤民息兵力養人材節浮費之用停不急之務而已蓋大法立則宏綱振庶官舉則萬務修兵民安則邦本固人材廣則任使周省費用則百姓足停不急則農務勸至於侵奪民利不便於時者一切革去之然此要須大臣力任其責以經國逺圖為念使治體一定始終無間開誠心布公道授群材而作行之使上有所守而不勞下知奉行而不亂尚虞箝勒未嚴吏有勤墮明其賞罰黜陟以威厲其不事事者將見激昻奮發人爭立效則治定功成可計日而待也不然究錢穀之已然緩綱維之大柄似未見其可也某以不材繆當言責區區之誠有不能自巳者謹條陳切時便民三十五事開列于後伏乞御史臺備呈中書省照詳施行事目立法定法制置發兵符契通行奏事選官議保舉立審官院選參佐恤民議恤民除軍户拋下差發救災秋稅凖喂養馬駝草料復常平倉論匠戶括户土斷七品巳上官言任內利病事息兵力軍人交畨合併十一年軍三緩逺征二定奪析居地稅養人材設學校用試中儒士試吏貟節費用古者因官府而立人今因人而立官府併州縣省官吏行劵法減祗應禁醖酒振武屯田輸粟充監當官停不急務權停一切工役省罷鐡冶户侵奪民利不便等事課程再不添額論鈔法論鹽法輝竹還民分間官占民田二事定奪官地給民禁約搔擾百姓五事立法定法制自古圖治之君必立一定之法君操於上永作成憲吏行於下視為凖式民知其法使之易避而難犯若周之三典漢之九章一定不易故刑罰省而治道成今國家有天下六十餘年大小之法尚逺定議內而憲臺天子之執法外而廉訪州郡之刑司也是有司理之官而闕所守之法至平刑議獄旋旋為理不免有酌量凖擬之差彼此重輕之異合無將奉敕刪定到律令頒為至元新法使天下更始永為成憲豈不盛哉若中間或有不通行者取國朝扎撒如金制别定敕條如近年以來審斷一切姦盜省部略有條格者州縣擬行特為安便此法令當亟定之明驗也如此則法無二門輕重當罪吏無以髙下其手天下幸甚置發兵符契竊見朝廷防馬劄妄濫也御前給發奉使欲逺方取信也佩圎符為徵况兵戎大事乎近者王著矯偽發兵利害非細合議關防契勘歷代緩急調遣軍馬皆驗符契然後得發今後合無依上起置符契庶免臨時别致事端通行奏事竊見憲臺𥘉立遇有軍國重事中書省臺院約會一同聞奏若事或不便許庭議以從所長其於朝廷大為有益近年稍乖舊制至於大政大刑其事巳行不得與聞任言責者既不及論救且得箝口不職之謗于天下乞請申明舊例不致似前闊略以絶壅蔽天下蒙幸選官議保舉夫親民之官守令為急竊惟選法自近年大壞後府州司縣官例多阿權通賄僥幸而得其南選尤濫至目之曰海放此等賢否不較可知庸懦者因循苟且奔走承奉外政務盡廢小材者視時所尚營治已私略不以官事為念爰自新政巳來外望雖聳根源舊弊依前未除易舊而新今雖汰冗濫選材能然一或譽之則為賢一或毁之則為否是非惑亂終無所憑莫若將素有聲迹資品實至者令三品官入狀舉保量短長之材授小大之任然後明察臧否精核最得人者行進賢之賞謬舉者坐不當之罰舉官自然精詳受保者惟恐有纍如此則官得其人庶事修舉昔周世宗令除目仍署舉者姓名若貪穢敗官並當連坐亡金正大間亦行此法當時號稱得人方今教養無素科舉未行權冝矯弊似為良法立審官院竊詳省院臺部皆得選署官屬若公當則人心自服少或未安中外之人皆得指言數年以來省臺壞亂多此之由夫省臺大僚近君之重臣也古人稱投鼠忌器當尚深戒况天官天秩一旦使群小無知者得恣情阻壞非所以體重臣而存大體也兼若輩處心鮮公不為巳私且泄怨謗比之若此合無立審官院選用有德望公正大臣次取知典故識大體剛直而敢言者為之輔其中外一切選舉官貟通得論列而踈駮之不猶愈於若此紛紜之不定也檢會亡金章宗時臺司用一諸科人為監察審官院竟奏而罷之致臺望增重逺近肅然當時大為有益或曰若立此官臺諫何為曰臺諫論列至廣審官係封駮之事古人設立本意以用人為治之本惟其責之專則事精詳而得實理所為開公道而庶人不私議也伏乞熟慮而深思之選參佐近聞朝省選用隨路總管其法甚妙然參佐尤當精折所謂掌司經歷者務要識大體有議論通案牘臨事不疑剛正有斷振一路之紀綱辨大小之衆務下至調和官府驅役吏人上下伏從官長有賴方為稱職近年往往用非其人不惟誤事且復害事如非流望者有之不通文墨者有之老病疲懦不勝任者有之如得其人斯弊盡絶契勘至元二年隨路總管許令帶行參佐二貟此固唐自辟所知良法今既妙選大尹亦冝令各官保所知職官以任參佐却恐朋黨成風因時作弊莫若將保到人貟交相為用如真㝎府尹所保用之保定保定所保用之他路之類是也若本人任內汙濫不職保官亦行坐罪其各道按察司首領官亦當依上精選使出總府幕職之右庶幾官吏推服臺綱人望因之取重恤民議恤民竊見隨路百姓自攻取襄樊巳來節次將中強等戶簽充軍站其見在下户供給百色軍須已是生受及江南平定中外佇望庶得休息復致前政煩苛橫取白著急於星火州縣官吏視其如此因緣作弊科斂無度如遇和雇和買夫役等事即驗包銀分俵每一兩周歲約出橫泛錢三十餘貫止以四兩户論之是一歲著二十倍也又軍户逃戶閃下差稅復灑見戶包納割剝民䏎未見如此之甚致愁嘆不絶感傷和氣嵗旱不收百物踴貴衣食艱得民安得不困救之之方在於將和雇和買必不可闕者畫時支價兩平和買雇賃併不科俵民間飢荒去處官為賑濟纍年逋負巳徵入官者還民未徴者盡免其逃亡復業者付元拋事産量免三年差役庶居者安集而去者樂還然後下寬大之詔布告中外使民曉然知朝廷憂恤元元本意又聞阿合馬及其黨與所沒贓賄不可勝計此物既非天來皆係生民膏血向肆威虐聚為巳私可謂贓穢不祥之物昔漢籍梁冀家財遂充國用減天下租賦之半散其苑囿使業窮民合無亦將上項財賄全代今歲天下租賦之數使二十年愁怨之苦一旦消釋誠國家結民心感和氣曠蕩希世之恩過於尋常萬萬也一照得近年和買造作等事其弊有三如立限甚促畫時不支價錢必須科配民間然後可辦致百姓添價轉買或官吏接攬多搭錢數及取納使用糜費等錢上下通同作弊一也縱降到價錢止依各處虛報時估比之百姓實費不及半價虧損人户二也其官降不敷價錢內官吏又行尅減且有全不到民或三五年間並不給降者三也如近日科下真定皮裘皮袴明該不得樁配百姓官無見錢皮無見在送納有程却恐耽誤不免分科民間其弊依前復作是上司實有愛民之意而百姓虛受其惠也欲革其弊不過給降見錢從實支價責委正官辦集其事何則蓋近年遇有工役官長畏其利害但領略而已一委本把里正信實等人使之營辦將百姓恣行侵牟無有紀極或事發到官止將上項人等量情追斷其事巳然將何所益今若革去三弊將一切違錯明該止坐正官不究餘者庶幾多方用心顧恤百姓不致諸人作弊一隨路遞運車仗腳錢近者五六十貫逺者不下百貫官支價錢十不及二三其不敷數百姓盡行出備名為和雇其實分著年來披擔極是生受乞請驛程去處官立車甲頭兩平雇覔從實支價以抒民力一戊戌年中選儒户比之僧道百分無一前省收入民編却有告難蠲除者合無依舊除免併十三年試中儒人亦行一體定奪一弛山林河泊材木魚蒲之禁令民恣得採取以救飢乏不足蠲免軍户閃下差發一爰自牧復殘宋巳來人皆有息肩之望近年差役豈惟不蒙減免却又將九年十一年元答軍户差發每户止除四兩餘上數目俱於見在户內樁科及自戊午年準申逃户之後續逃户計上司並不凖申州縣亦不敢申報閃下羞發仍令見在户計包納又至元七年取勘出協濟户計元奉條畫止令協濟見當差户近年却行入額另行科差加以和雇和買不絶如流比之𥘉取襄樊差役轉增數倍上司若不哀矜量加優恤恐不免轉徙流離之患乞將元簽軍户氣力全行除豁及取勘續逃户計蠲免分數庶望貧民少得休息實為便益救災竊見今歲真定等處春夏亢旱穀菜皆無米價踴貴小民久巳闕食往往採食青棘槐花揄葉拂子等根加之流竄驚擾甚為不安諺云春旱泥倉秋旱離鄉蓋言比接新來歲月日逺故也百姓多趂熟河南今聞米粟亦貴又無所往是將坐視飢饉以待其斃其救之之術冝在於早設不然不過發倉廪散楮幣倉廪所在皆空寶鈔幾許得濟莫若將𬒳災州縣合納稅石并即今收糴事故等糧盡行倚免使百姓少寬且謀自救責委按察司親臨官吏多方計置賑濟飢乏及弛山林河泊之禁權停門攤酒醋等課庶幾不致流亡失所秋稅準喂飬馬駝草料竊見保定等路百姓每歲撥赴逺倉送納又樁配和買各位下馬駝所用草粟設立倉場官收支中間官吏作弊百姓重併生受如按察司每歲各處追首鈔有三五百定者盡係添答多取於民若於百姓所納秋稅內盡行折作草粟赴各處喂養馬駝倉場送納使民免逺倉納稅之勞無和買椿配之擾及革去給降尅減之弊實為便益復常平倉竊見至元八年設立常平倉驗隨路户數收貯米粟約八十萬石以備緩急接濟支用近年巳來起運盡絶甚非朝廷恤民救荒本意如往年差官定奪時估以平物價縱使能行終非久逺通便之法當時僉謂若常平有粟各路不過依時價出糶三五千石則物價自平人心倚安低昂權在有司兼併不復高下其手向前收成去處依前收糴以實常平恐亦恤民平估之一策也論匠戶一省部為各處冨強之民往往投充人匠影占差役以致靠損貧難戶計奏奉聖旨差官與察司總府一同磨勘到各户根腳氣力手狀巳是精當類攢册帳各路赴部分間實為善政中外喜望比及今歲科差必得上項富户依應當差庶幾貧難稍得息肩近聞省部止為外路帳册體式與大都不同此上差官復同三家再行磨問不惟中間動搖實恐遷延有失人望若將巳分間定帳册勒令各路照依大都體式攢報似望善政早得成就或謂若依巳行體例將匠户富強者還民當差其見當身役止除一丁差稅却恐一家兩役日久靠損人難終致紛紜不定莫若將見行分間匠户委係高手人匠存者存之外據户眼高手藝平常者放罷為民若必須輔添再於民間將酌中户內取手藝極髙者充庶免紛紜不定且失民望其江南戶口一家分作數户其名甚多其數不實括戶土斷國家自壬子歲抄數後迄今未嘗通檢中間等第髙下大成偏重故唐制三載一定戶每歲一團貌恐因仍舊額貧者轉貧冨者愈冨况三十年之久稍候年歲豐收民大安息合行從實檢括察其存亡均其貧冨則庶功以興國冨家足不然是縱令州縣每歲增減髙下以滋官吏之弊故前人云與其潛資於姦吏何若均助於疲人以免其偏苦哉其各路流徙户計拋下差賦即今盡行樁灑見戶陪納往往靠損人難今四海一家民之去此則為逋逃寓彼則為見在若通行括數只令彼處土著當差除此之逃額實為便當此歷代遺制我如行之不為無例或曰恐涉動搖曽不思偏重包納不均之苦甚於一動多矣七品已上官言任內利病竊詳方今大弊國之惠化下罔盡行民之情偽上不周知今後合無令外路五品官部內利病可以興除者許令任內或秩滿赴部直言要以指陳實事一出已見庶使民間疾苦艱難悉得上聞其官之盡心與否不校可知其當興除者即諭所司施行日新政治誠表裏相維上下盡心之良法也息兵力征防軍交畨一隨路軍人爰自南征巳來城攻野戰萬死一生及平定江南與望停征稍得休息今軍前勾起逃亡事故等軍歲無虛月如父死子繼兄亡弟行以至一户有病沒陳亡父子兄弟四五丁者又有死絶止存老父母與妻孥者尚然不蒙撫存况征南將校例多遷賞其軍士合無將見屯戍軍士亦冝優恤或二年或三年使之分畨相代省家父母親戚歲時有相會之樂所謂恱以使民民忘其死契勘唐制征防軍年及者還民父母八十者聽一子歸侍况今四海一家正息馬論道之秋如兵戎少寢天下幸甚緩逺征伏見方今聖德天覆海宇一家獨以日本未霑王化致煩征討竊詳倭奴自後漢始通中國多以義懷耒未聞専事征伐蓋限隔洋海數千里之逺此與彼接我以衆命先嘗其險嗚呼殆哉昔三苗來格虞帝以修文為先彼倭始通光武以廣德為務伏望聖朝鑒法前代先遣材辨綏逺之臣申之以文告喻之以逆順柔以文德結以恩信使民見包荒不遐遺之意若猶未至然後興師未為晚也此係國家大事任責者冝悉心以明其利害合併十一年軍竊見近年朝廷將舊軍與至元九年所簽軍貧難消乏之家皆行合併甚為便益其十一年所簽軍人當時已是近下户計經今九年多有生受不堪役者合無一體從實合併使貧冨難易兩得均平又得兵力精強且見國家同仁一視之意定奪軍戶析居地稅一軍戶析居貼戶即目見行取要地稅當間本是一户謂如有田六頃除四頃外納餘上稅石既是析居其地兩分各有地三頃不在合納之數即目止憑一户時取要餘上地稅理合分間定奪除免飬人材設學校夫自昔設立學校非唯尊師重道蓋欲養育人材以備內外任使方今名儒碩德既老且盡晚生後輩以上乏教育下無進望例皆不學而吾道不絶如線設若構一大厦必用衆材可成况治天下之廣居乎今府州縣道雖設立教官講書會課止是虛名皆無實效其隨處教授名實學官糊口不給奚暇治禮義而及人若與醫學一體給降俸祿復官撥學地資贍生理然後選職官子弟及鄉民之秀異者使之入學專以講明經史以趍有用實學不三五年間一處止有成材五七人則天下可得數百人以須國家之用豈不偉哉如巳後設立科舉尤須預先教飬不然將見數年之後非惟無才可取則禮義廉恥掃地矣將何以論治乎隨路醫學亦合一體整理施行不致虛請俸錢有名無實議復立國子學一竊見至元七年朝廷立國子學命許衡為祭酒選朝右貴近子弟令教授之不滿五歲其諸生俱能通經達禮彬彬然為文學之士及其入仕皆明敏通疏果於從政如子諒侍儀之正大子金中丞之剛直康提刑之仕優進學弟親臣之經明行修堅童君永之識事機子亨待制之善書學企中客省之貞幹揚歷省臺蔚為國用豈小輔哉必欲設學校養人材京師首善之地冝先復立國學以風勵天下用中選儒士竊見十三年隨路試中儒人於內多有材堪從政者若委目各路并按察司取勘相驗得實申報上司遇臺院六部百司按察司令史書史闕貟以憑輔充勾當是猶勝繆亂雜取州縣無例無學等人此輩設若吏業非素終是通曉義理例有文筆使官事稍習皆可勝用假令學校吏試便行需待歲月猝急不能得用能此不但捷於得人亦是激厲天下為學之方豈為小輔兼亡金舊例臺椽書史皆於中場舉八內試輔勾當但在有司持擇使之精當不致妄濫請托而巳試吏貟竊見方今內而省部臺院百司外而按察司府州司縣合用吏貟俱出自州縣校書帖寫等人因而上逹以至僥幸成風廉恥掃地只以學術無素選取無方中間求其廉慎可稱熟煉吏事者甚鮮而天下之務繁而詞訟錢穀重而刑名銓選生死曲直髙下與奪悉出於乳臭若輩之手欲望治道清明風俗美好難矣合無講究近代考試法式從府州官公共保舉其法律刀筆行止或不相應罪及保官其餘非此而進者不許輔充隨朝勾當設法既嚴人自力學如此非惟用得群材禮義廉恥風動四方下可以革去僥幸苟且之人上可以成公平肅清之化端本澄源此最急務節費用併州縣省官吏伏見方今州而為府縣而作州復有不必縣而縣者此蓋王進建言欲務為誇大以示外方意也以至增置人貟添給俸祿無有虛歲彼所臨户口曽不加多差稅轉成虛耗所謂十羊九牧為政大弊也今四海一家郡縣版籍何止數倍誇大之名將何所用不若依舊便將當省者省可併者併豈惟事簡官清不致國家緣虛名而受實費既省其官據祿薄者亦冝增而厚之蓋清其吏而不厚其祿則飾詐而不廉知厚其祿而不省其官則財費而不足知省其官而不知選其能則事壅而不理此三者迭為表裏相須而成者也又江淮興兵巳來諸道使府一切把軍官貟權冝而置職及見設提舉司官及因聚賄妄立官府者多矣亦冝減削使職有常貟事不繁冗則人無紛擾之勞矣行劵法省祗應今訪聞得真定路周歲祇應錢萬有五千餘定以天下計之不下數萬定矣此緣省部差遣繁冗及當該官吏因之作弊致費用如此之廣雖禁約關防甚悉不若澄治本根今後若路官得人凡事公幹并將急遞鋪整點如法據行下事務嚴立程限管得時刻不誤如是則不必使者旁午而重費館榖也若軍國大事必須差官者照依前金給付劵頭據合得分例令於上批寫某日經過某日宿頓回日繳納年終將報到祗應文册搽照同否稍有差别多取與多與者同罪將見使人不敢多取掌行者不能妄添分毫節省費用誠為方今良法至於朝廷重使别議給與如此減省故不少矣禁醖酒一目今目真定路巳南直至大河地方數千里自春至秋雨澤愆期旱暵成災致米麥踴貴無處糴買例皆闕食百姓往往逃竄莫能禁戢有司誠冝多方計置救災恤民竊見民間醖造杯酒所用米麥日費極多略舉真定一路在城每日蒸湯二百餘石一月計該六千餘石其它處所費比較可知若依至元十五年例將民間醖造杯酒權行禁止庶幾省減物斛以滋百姓食用誠救災恤民之大事也振武屯田竊見每歲北邊於新城沙井靖州三倉和糴糧儲不下五七萬石如遇軍馬調遣又豈特十萬石而巳近年榖價踴貴且以十萬石為率所費不資用度終不寬廣兼自古饋餉雖有智者終無良法惟邉地屯營最為長算契勘唐憲宗元和七年李絳言天德今豐州是也振武左右良田約萬餘頃擇能吏可開置營田以省費足食從之四年間開田四千八百頃收粟四十萬斛歲省度支錢二十餘萬緡今體訪得振武并豐州界河兩傍地廣民稀除營帳牧放百姓耕懇外其餘荒間地尚多若差公幹官僚踏視其冝留兵營田一切取武清屯例假以歲月自非水旱不熟田功稍集國儲必有所濟故陸宣公云緣邊土沃而久荒所收必厚如此費省食足官無規措和糴之勞民免輸納虛耗之費恐亦安固邉防之一策也納粟除監當官竊見上都北邊每歲臨幸及屯戍重兵歲用糧斛甚廣雖官為和糴啇旅興販終是逺窵不能多廣得濟昔漢文景時亦為艱於轉致令民輸粟塞下賜與爵級謂之賣爵級遂致邉兵饒足方今院務官别不見入仕格例以曩日論之不過貨賂請托若以弊革有益於國家不若令辦課官驗額輕重使輸粟上都及迤北州郡幾何者則任某處監當官一年立為定制謂如某處務埸周歲課額十定設官二貟每貟輸米戓粟上都者若干迤北州郡者如此不半歲上都及緣邉州郡便得米數十萬石豈不大便益哉又如州府務官經營幹勾比得差遣所費不資一任之內必百方作計取償於民羡餘復入於已是使明損民力暗將官錢盡入私門若此法一行將見私錢盡入公家則息奔競官革請托軍國坐收饒足之利故令民輸粟充院務官最為當今良法停不急之務權停一切工役竊見大都雜役五臺拖木等夫及諸寺院營造比年巳來未嘗停輟古人有云工不使鬼必待人興財不天來終須地出不動百姓將何所求况今其定至大河迤南年榖不登百姓嗸嗸例皆乏食自救不暇據上項工役似合權且停放以見國家罷不急節浮費救災恤民至意省罷鐡冶户竊見燕北燕南通設立鐵冶提舉司大小一十七處約用煽煉人户三萬有餘周歲可煽課鐵約一千六百餘萬自至元十三年復立運司以來至今官為支用本貨每歲約支三五百萬斤况此時供給邊用雖所費浩大尚不能支絶為各處本貨積垜數多其窺利之人用官司氣力收買其價不及一半當時既是設立提舉司煽煉本貨以備支持除支外止合存留積垜以備緩急今來却行盡數發賣竊詳此事虧官損民深為未便今來止合依驗舊日有名曽煽爐座存留三五處依例興煽據煽到本貨除支持外盡數存留積垜並不許發賣外據近年新添去處悉行停罷將所占百姓分撥所屬州縣依例當差仍許諸人認辦課額興煽小爐或抽分本貨戓認辦鈔數臨時定奪如綦陽鐵官中統二年省部巳曽將冶户差發比較歲煉鐵貨數甚爭懸以此罷去其便與否乞追照元卷備見其詳侵奪民利不便等事課程再不添額契勘課程自四十年前天下正額止萬有餘定今者從萬至於十倍可謂極致每歲考較尚有增餘前省定奪歲歲添作正額且財不天耒皆自民出恐亦因人之一節也兼啇稅金資物貨湊集買賣多寡市肆遷移皆趂州郡會合津要去處歲各不常若纍纍一體添答恐有輕重不等之弊可依巳定額數外從實恢辦或依相永法增籌者量加遷賞否者黜罰停歇期年告敘所增等第以五十定為上三十定為中二十定為下如此民喜額定而不增官樂有功而升用羡餘之數自然盡實入官論鈔法竊見元寶交鈔民間流轉不為澀滯但物重鈔輕謂如今用一貫才當往日一百其虛至此可謂極矣究其所以法壞故也其事有四自至元十三年已後據各處平凖行用庫倒到金銀并元發下鈔本課銀節次盡行起訖是自廢相權大法此致虛一也其鈔法𥘉立時將印到料鈔止是發下隨路庫司換易爛鈔以新行用外據一切差發課程內支使故即造有數儉而不溢得權其輕重令內外相制以通流錢法為本致鈔常艱得物必待鈔而後行如此鈔寧得不重哉今則不然印造無算一切支度雖千萬定一於新印料鈔內支發可謂有出而無入也其無本鈔數民間既多而易得物因踴貴而難買此致虛二也又總庫行錢人等物未收成預先定買惟恐或者先取故視鈔輕易添買物重幣輕多此之由此致虛三也又外路行用庫令庫子人等私下倒易多取工墨以圖利息百姓昏鈔到庫不得畫時回換民間必須行用故昏者轉昏爛者愈爛流傳既難遂分作等級其買等除搭價然後肯接此致虛四謂救其虛莫若用銀收鈔大路止用得課銀一餘定小處一二百定民間鈔儉必須將銀赴庫倒鈔貨是鈔自加重銀復歸于官矣今却以鈔回則愈致子虛矣何是又官只重銀不重其鈔此復虛一也或更造銀鈔以一伯當元寶二伯迤漸收見鈔蓋事久則變變則通輕重相濟之法也不然利病又當問中統元議立法者如張介夫王紹明等講明舊法以定新行如此年載間庶可復舊使資財大柄常操於二權不移於下矣論鹽法竊詳調度鹽法以便民為心者莫若于所轄州縣量户數多寡將元認課額均分依巳定價錢一十四兩一錢仰各處管民官設立鹽官赴運司關支鹽貨置局發賣納舊課關新鹽挨次送納其沿路腳錢於各處鹽局官用已錢出備却於發賣鹽價上搭帶仰各道按察司不時計點多餘之數既分鹽課為正額聽從各處從實發賣中有比别路賣不盡去處督勒本處須管驗合關數目依限關支課亦依期送納何故當元驗民户多寡均分食鹽之家既等緣何却有不盡數目防有私鹽生發仰各路正官提調不致阻滯正課亦不須設立巡鹽官擾民其先行賣訖去處必須再來關支是為增餘遠年以來人口增添食鹽既多别無虧失止有增羡可不勞而辦也一官為調度者從省部差有根腳慎行止諳錢榖人充規措所官聽運司節制于用糧去處設立許諸人赴倉送納或米或粟納獲朱鈔赴規措所關引支鹽近見運司官差規措官於南京等處不問人之貧冨有無抵業九一抽分虛立文契指於某處中納糧斛其實將引到家不問價直髙低貨賣了當或償舊債或納官錢戓别作營運至今五七年間錢糧不能到官者不可勝計深為未便今者止合明出榜文召募諸人於所指倉分先行送納糧斛納獲朱鈔然後赴規措所支引次來關鹽釐勒監主母得刀蹬停滯立便支發似此別無阻礙鹽法大行倉廩充實不須和糴和中豈小補哉一長蘆本處除收米粟外並不得收受諸物止收寶鈔赴萬億庫送納止收米粟者以備御河上下官為支持不收諸物者諸物官司無用中間作弊不無阻礙鹽法若以收鈔納鈔其便有三一則鈔法通快二則革去舊弊三則官民兩便一便啇賈為利者許諸人赴場買引關鹽釐勒監生不得刁蹬客旅最為急務蓋禁官吏不得買引賣引是也既許諸人興販官吏亦用已錢何故不可若使本管官吏得買其間客旅深為未便課程不能虧辦何故鹽價貴則官吏盡數拘買客旅不能得買鹽價賤則官吏並不收買客旅為曽赴埸不能得買嘗𬒳耽誤又知鹽價遲澀亦不興販虧損官課皆此之由又官吏買鹽先揀離埸近便去處次揀潔淨乾白好鹽又不依序先行攙支使客旅人等無所措手其弊不能一一遍舉竊惟鹽埸天下號為爭利之所况本管官吏乎蓋防微杜漸尚有不能禁者以官物為已有之資放縱由已可不戒哉一運司上下大小請俸人貟近七百名其中虛設者太半行户部都轉運使之名可易為提舉鹽使司大使副使各一貟次以管勾催煎足以辦集自然官減俸省亦便利之一端也一解州池鹽天然自成不同清滄犯本煎造費用浩大往年陜西運司為課額重大立法頗峻山谷逺人不知禁忌食既艱得未免私煎冒販事發到官情罪不小往往有破家殘生者良為可哀昔隋𥘉罷酒坊通池鹽鹽井之利與民共之至今稱為仁政若於見定解鹽價直內更為減免分數使民易得食用亦國家惠民而不費之一端也輝竹屬民竊見衛輝路輝州園竹皆係百姓自來栽植置買物業軍站差徭仰之出備自薑毅建言將頃畝官量見數斫伐四六抽分民得六分官亦拘取量給價直當時百姓巳是不堪近年巳來不依時月不問去留恣意斫伐盡行殘廢其合得價錢給既非時多不完備又巡竹人等經絲往來稍有疑似恐嚇錢物事非一端往往有破家失業者百姓至顧視竹柏甚於仇讎竊詳天之生物本以飬人今乃為害豈造物意哉且量頃畒無多抽取四分以之輪官未為大益百姓得之實非小輔合無將上項園竹依舊令民為主官不抽分出備一切差役氣力亦寬弛山澤之禁不奪民利之美事也若謂於係官竹法有礙據輝竹造到器物令給引印烙亦可通行其見設提舉司並不將竹園優蒔名為辦課專以侵擾百姓營治巳私為務亦冝罷去令總府就便管領其省官吏息民擾實為便當分間官占民田一總庫將束鹿縣民田以為官地約一千四百餘頃每歲包納麥課每畒麵三斤合無除免明諭百姓使為永業一去歲取勘到滑州御麥地畒約八百餘頃中間多係軍站農民祖業莊産種飬年深今來一例打入數內理合分間民田令依舊為主定奪官地給民一京兆路州郡所有營盤草地極廣舊為探馬赤牧馬地面近年遷往西州屯駐其地悉為間田并隨路營盤草地寬闊去處量給側近無田農民種養併贍不足禁約侵擾百姓一每嵗鷹房子南來所經州縣市井為空將官吏非理凌辱百姓畏之過于營馬及去又須打發撒花等物深為未便乞嚴行禁約以安吏民一四萬户軍馬遇有調度經過去處嚴加禁約不得非理搔擾致驚農民責所在達魯花赤巡護勾當但有失事坐所委官罪一兾州管內河西軍户間處村鄉不時搔優如強耕田白采桑欺凌農民等事告發到官司縣不能追理至元十七年省院巳曾差官究治此其顯然也合行嚴切禁約不致别有侵漁一隨處監官非奉上司文字不得一面將門攤定課額上擅行添搭數目一御河上下一切官司阻礙客旅船隻不能通快如開關錢漫河索岸例等事乞悉行禁約秋澗先生大全文集卷第九十
