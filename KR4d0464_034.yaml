body:
  text: 七言絶句讀漢武帝外事回詩汾水西風岱頂柴侈辝稱自馬遷開誰知留謗千年後還向班生筆底來瀟颯神飈下寢園玉衣晨舉馬嘶煙不容夢語加明譴應是千金漢相賢白髮劉郎一帝巫老方服食悟前圖首言要格君心妄萬古鄒卿一大儒太一蓬仙杳不聞龍輿三駕海東雲明知求訪終無驗才悟文成又少君嬴傑而顛徹黷兵較來遺迹不多爭戾園甘分秋風裏流血爭教到市氓鷁艦龍旗照水開昆明都試想雄材眼中不惜肌膏盡博得西南拘醬來晝獵南山夜不歸白龍幾中豫且危論功正有髙皇約不為諸孫濟所私二喬觀史圖二喬絶艷煽江東一札龍韜閲未終多是周郎傳報捷華容燒虜夜來空劉永年棘兔周身有術無牙角出沒中林草棘深幸自得沾間靜處枉將隂巧見機心神明之後管城封埋骨詩書有駿功原野暖煙三宄樂緣雲無夢入蟾宫月中搗藥伴蟾蜍嘯傲秋風挂影踈今日棄捐茆棘底免冠井謝不中書旅熬圗厖然纎氄褐毛鮮閃閃蒼精照帝軒誰為此監楊得意一言曽逹漢文園何人刾繡旅􅋙圗慘淡風煙較獵餘不寶珍竒安逺邇至今人味召公書風雪藍關圗天威不逺雷霆迅雪擁藍關惜自傷不似老坡南竄夜一天風露縱浮航凶鋒笑折王庭湊赤手嬰鱗撼憲皇可惜堂堂忠義氣枉將衰朽托吾湘庚子歲門帖子庭驚爆竹驅儺鬼門掩春風貼畫雞戀闕心丹老猶在夢中來趂筍班齊庚子元日即事春融官閣梅仍好暖透墻隂雪盡消長記紫宸朝退後洋洋猶説太師韶覔酒正月三日皆風色隂寒門外風霾障日昏地爐吹火發春溫牀頭説有青藤釀好遣麻姑送一樽敬甫英豪蓋代聞三年幸得作比鄰間來屈指從頭數得見青瓶有幾人時以佳酒貯青瓶來貺題文殊院壁吳僧久住文殊院千里東歸未有涯十二通衢春雪滿又携藜杖去誰家跋梁中憲無盡藏手卷四首人物風流晉永和一樽觴詠百年歌邇來水檻中台宴更比當時樂事多長橋春露濕吟鞋共警時思怵惕懷只為一終天理在晚香何有百花崖鍾鼓山林窮勝事衣冠韋杜似樊川一門顯允稱多士野老猶能説定年馬頭旌斾八騶行劒佩􅟚􅟚尹雒京特就房山嵓畔月百花潭水濯冠纓海岸古木圗古木螭蟠鬱有華輪囷竒崛欲誰誇何年海藏龍宫使推出秋風八月槎題肅齋詩卷坐如泥塑程明道笑比河清孝肅公一字名齋見操守儼然思有古人風外自形骸內自心敬恭交飬理尤深用功不必求他説細讀西山夜氣針再題梁氏無盡藏月白風清丗不知園林鍾鼓想當時萱堂此日南陔樂又見肩輿拜慶詩洹水郎山雨露春江山如畫見橫陳丗臣喬木千年事長配先生德日新吳郡張總管代輸民租手卷吳郡張矦潤屋餘歲供民賦濟貧居二十四考中書令此樂融融未必如庚子歲冬與僧印相對見其頗瘦戲作一詩相贈雲在青天水在瓶禪關終日不曽扃莫疑磨衲松形瘦午夜吹燈唱佛經又題逺僧定禪東林法第隱峨嵋風雨中途避樹枝千劫塵緣終共盡枉將公案詫神竒題王國祥適安齋詩卷神光仰靣滏流東睡起東窗日巳紅適意有詩樽有酒曉猿休訝草堂空斷崖煙隔回逋駕山鳥山花樂亦佳一夜山靈來軟腳盡分空翠濕吟鞋起居有道適之安况復山人已考槃辛苦東曹馬觀復簿書燈火五更寒凶鋒北折恆山逆鰐暴南移窟宅空天地此身無定在適安何似一盤中馬卿來索適齋詩終歲思歸未得歸羡殺昌黎盤谷敘山林長往最知機呈德昌郎中太平朝野足娛􅌚漢日舒長省府間前日景陽臺上宴一堂絲竹兩東山江山大筆硬盤空誇海歸來不自雄紅藥滿階春露濕看君給事大明官沉沉宫漏出華遲曉日雲籠簇仗齊前日彤庭青瑣客只今騎馬欲雞棲蘭陽僧榮説昔開汴河得入定隋僧今移葬寶相藏寺前殿趾下手爪纎長纏繞兩胯或問彌勒下生否未也榮説寺中見有碑記漢家習戰鑿昆明劫火留灰憶見曽誰謂大梁蘭若底土中入定有隋僧錢舜舉桃花黃鶯圗金衣公子絳桃芳飛下喬林過錦江細按玉琴能巧囀絳紗髙捲薛濤窗夀陽公主折梅圖滿庭梅影媚春陽粉蕚封香散麝囊折得一枝春在手含章宫閣鬪新粧寶簷公鳯探芳叢瓊蘂飛翻入卧中一自粉綿輕拂散暗香吹滿夀陽宫題武教授峨嵋山溪堂圖野水林塘淡欲秋日長繒􅌳在沙頭故山咫尺峨嵋外未礙因人作逺遊張金吾慎獨堂赤丸夜語飛電如徼巡誰猛張金吾能於不覩不聞際一妄才生制得無中和堂草隨風偃理之常况是京師首善鄉聞説開元天子聖羽林多半授經郎慶夀東西二橋慶夀精藍丈室前松蕤盈庭景氣蕭爽嘗引流水㶁鳴其間東西梁貫以通往來今水湮橋廢止存二石屏上刻飛渡飛虹橋六字筆力遒婉勢若飛動有王禮部無競風格寺中相傳亡金道陵筆也主僧西雲安公喜作詩通書學以無礙妙辨現當機應身軒露頭角價重統堂緬懷遺迹修護珍惜屬秋澗翁作詩讃嘆傳示後來謹賦二絶奉答雅意秋澗王惲和南花木禪房徑窈通卧波曽覩未雩龍摩挲一片西山石依舊宸奎照碧松飛渡飛虹㧾舊名玉淵無復繞松棚偶投靜境便僧話指顧瑶鐫説道陵半山石詩一拳山骨動溪神小字金書爽醉魂竊吹濫巾非我事約公同賞謝家墩荆公精舍定林居蔣廟相過恰半途不憶半山亭上石溪光一夕照吾廬農里嘆并序至元草八年秋九月檢視水災趙之東偏自平丘至劉村渡凡一十一處因老農問答集為十絶句庶以見農家有終歲作若卒至於無成者可哀也哉作農里嘆其辭曰今歲馮夷勢蹇驕漫流西岸不知遙枯槎聚沫猶然在時見田間擁樹腰洨水南來接北滹兩河會合泛田廬官來檢驗承尊重所望申圎早得除寧晉東南舊馬頭今年秋稼𬒳災稠至今田畯揚旌處猶作長河一漫流漲痕到處盡翻耕壠畒縱橫宿麥青馬首野人爭説似肯教欺昧老提刑薄有田疇在逺埛近村減埯不能耕今年巳損秋禾了庶望來年麥有成野漲平田一漫蒼只緣溝澮失隄防田廬相近初無礙賴有莊東白草岡馳傳東來相水災並河村分盡俱該莫疑詢訪多諄復切恐文移不細開每年秋漲賴橫堤水縱漫堤尚害微近為鹿城偷堰破放交流潦到柴扉每歲災傷走吏曹何嘗南陌到東皋正緣事重人微甚特遣官來慰爾勞榖穗虛穰草色燻滿前堆積漫如囷一餐到口還無濟辛苦田間力稼人火雲六月旱為災嘉穀方苗大水來老牸瘦來無可飼放教河底嚙枯荄辛苦農民上所哀况遭今歲水為災淂除與否渾間事最喜分司檢踏來責偹利為人後責居先子細評來不苦偏鄭重左山親有語天心責偹最相憐相鄉懷古整整唐旗向日開賊兵來陳亦雄哉膽寒已落銀刀手不待騎河百戰來泜水倚空趙壁漢旗殷裭魄南隨逝水寒自是炎劉方爾熾不應儒將責成安題趙總尹書堂趙氏諸郎玉不如籝金雖貴樂三餘朝來放眼藝香閣信有人間未見書河內許生希顔願而有立志豫在襄國問學者月餘及其行也求一言為訓故書此以貽之筮仕常深未信懷孔門惟有漆雕開治平果淂真知理青紫何愁俯拾來題陳居士歸真圗三首林下山間本寂寥只緣久動思漁樵君看白首爭名者穰穰依前滿市朝桂樹巖幽謾見招風煙圗畫儘髙標一從五柳歸來後此事人間久寂寥舉世誰能未老間風煙空對畫圗間應憐心逺陳居士杖屨西山夢往還松林秋月萬壑松聲月色開夜深清景湛靈臺放懷不為樽中醁坐聽蒼髯説法來題劉道濟所藏石屏石中乃有此竒雯來䇿臨池障墨勳絶似雞鳴南下望桑乾東捲入寒雲過寧晉北陳村題陳節齋故居草廬壁皎皎丹心與義俱要須身外更無餘截然不負平生志依舊陳村一草廬生死分岐又六年野煙行入比陳阡不煩更聽山陽笛老淚臨風巳泫然過後趙右侯張賔墓自擬籌兵借筯倫品量何必果誰親風雲慘淡龍蛇裏獨識將軍亦可人一劒橫談動世龍掃除河朔晉為空運歸曽不論夷夏乾沒并門坐嘯功勒遇光皇並駕先右侯端有子房賢一時瀟灑君臣契虎視鷹揚豈偶然巨鹿懷古寰宇記平鄉秦巨鹿也項王解趙圍於此鐡鎖秦圍一戰開群雄稽顙拜平臺君王邂逅東城敗驕氣須知自此來趙圍才解已亡秦六合風雲霸業新逆取不思須順守嘔嘔空抱婦人仁沙丘懷古一從竒貨落韋機秦自莊襄統已非大寶前依王命論牛當馬後一何微滈壁投來讖已真沙丘臺下泣宫臣事機説到還元處造物於中太戲人時苗墓苗魏人官夀春滿留犢寰宇記云墓在平鄉縣東北二十里至今二村以時南時北為稱典郡風流若可稱當官明允復氷清來時孤牸歸遺犢却恐存心似近名笑却青鳬取大錢去留黃犢縣門邊就中處置人情近似覺山隂守更賢苦熱炎官令虐不容安背汗翻漿厭午餐遙憶百門山下水玻璃盆靣萬珠寒沙丘懷古六國平夷甚虎狼擬從一世到無疆誰期五十餘年後生處元來是死鄉擬就靈仙不死期翠華拂靣事皆非須知一把亡羊火望望驪山待汝歸萬靈訶護駭東巡一死沙丘等棄焚不直鮑車曽貝惡萯陽宫事儘腥聞萯如字花名玉萯四月開見廣韻陌上行人去不還眼中豺虎滿朝班齊雲樓下陂陀血紅比龍𫀆色更殷右讀唐昭宗紀東就梁營怒重𡵨傾危何處託苕枝目斜袖搭欄干曲花滿春宫去住時讀明皇雜事捂桐葉上雨聲繁絶似花奴羯鼓畨不待迫遷西內後上皇當此已消魂讀肅宗雜事凄涼南內廢晨昏興慶宫官不一存進藥失嘗蒙大惡肅宗當以弒君論又擁憐愛子遽聞言天理中還帝泫然龍德本非軋健體不應良娣健而顓廣宗早發武道亭西望鎮陽趣裝猶是四程強夜來一雨扳炎傘借得長途雨日涼贈擒虎張侯弟三子飛卿射虎聲雄發五豝三郎間損玉稍花雍容詩禮相逢處不信風姿是將家大學淵源在六經振振儀鷺儘充庭君看萬字長沙䇿不到詩家月露形黃巾墓洶洶黃妖聚一呼棘矜元是力耕夫人心莫作平常看易動難安最可虞再過隆平我𣣔臨流濯鬢埃沙鷗橋畔莫驚猜亭亭一點隆平塔半歲還成兩度來銅馬祠古鹿城西野廟新戰勳猶説馬將軍甲光千丈雲臺畫只有荒煙對夕曛昭慶陵紫雲仙李隴西宗又向平隆見祖宫陵寢柏城俱掃盡石麒麟鬛動秋風過唐山望禱帝堯祠光宅宫庭歲祀新壤歌猶是昔時民遙祈一勺龍弘水痛與山前洗旱塵讀李斯傳常笑秦斯訴已忠豈知身墮趙機中沙丘不負先王託雖死猶能保霸功盧處道處覔書米家書畫滿江船月貫長虹夜色鮮欲識廣收多蓄意北歸分賜到諸賢題塗水老人趙君璵詩卷豪傑并門自昔聞儻來軒冕等浮雲瀟然獨老琴書樂塗水看來只趙君老鶴昻藏不受羈九皋心與野雲斯翩翩不墜中郎業又向詩書得蔡姬廣武君李左車墓廣武籌兵見未形規模儘敵漢威靈天其不奪成安魄赤幟何由下井陘早發銅梁旱損滹南二十城蠶沙充食葉為羮朝來夢覺梁門驛幾處坊場聽鼓聲春宫元日口號日融欄檻貌金麗春滿松廊鶴禁深四海謳歌皇子夀一年得拜老臣心色目依班向殿趨入門一字立青蒲侍臣直上牙牀啓拜畢分觴當大脯獸樽人立逺傳臚軋軋聲來啓左樞玉馬抱牽當殿過一時肅拜不聞呼沉沉蘭殿欎穹㝫一點前星現半空事事見來臣分裏中單奚取絳紗紅暖煙宫殿歲華新入賀東朝異紫宸內外百官皆便服紫衣獨見海東臣三薰來獻野人芹不謂芻蕘得上聞銀研柘弓非所覬庶憑春鐸振斯文朝拜歸來户晝扄小齋孤坐喜春晴太平儻許斯文致未礙明窗管墨卿偶書唐到開元極盛年見人説似即欣然時時夢裏長安道驢背詩成雪滿肩太一宫春早即事漢家望祀竹宫神參禮精嚴動早晨殿瓦漸分籠月白一聲金磬聽朝真壬午除夜雜詩來住京師已半年欲行還止果誰然淵明豈是山林士苦要絃歌為秫田兩間齋室過今冬臘雪才消又朔風底滯王窮何所戀終年相伴要詩工鐡畫顔書雪屋燈夜深相對眼增明莫疑擲几金聲砉讀盡諸孫得杲卿科斗秦燔漢莫猜釐陵况是晉初開辭堅句澀無多旨茟削疑從戰國來輝輝風日暖生煙氣韻和平恐信然軒冕儻來皆外物歲功無切是豐年瓜畦分溉引溫湯三月中旬已進嘗縱使得先諸果上摘來終是不馨香衆卉迎春竊化權苦寒都在早梅邊不愁一夜氷花老便得和羹亦稿然失之須信本來無勉強難于上圾車看取一陽潛九地春來葭琯自舒徐謝安石奕棋圗百萬秦師未易摧動容無復捷音來入門偶折登山齒一矯論公恐妄猜江東全倚謝家安雅量形容對奕間勝負自𥘉成算在在風聲何賴八公山沛公洗足見酈生圗氣折狂豪一洗間要令遊士吐嘉言𥘉從沛長咸陽帝此術施來第幾番唁然洗腆孰為賔中隱炎劉四百春一説便能延上客君王肯效婦人仁包總綿區細故捐未妨撣洗酈生前一嚬一笑非無謂不似髙皇氣馭權落魄髙陽一酒徒略除邊幅展雄圗桓門堅忍須臾去長為東山出此模布褐昻藏七尺身不容空老酒壚春風雲慘淡龍蛇際首識隆顔亦可人書壬午歲十二月草二日夢中所見青山隱隱水悠悠鶴蓋前頭列火篝江閣連延三十里停輈看處古升州孫陽相馬圗龍眠筆昭王墓老秋蕪合虞坂人歸暮靄蒼屈産何嘗無駿足世間能有幾孫陽渭橋迎代王圗龍眠筆古人作事洞胚胎畫到龍眠見大材勘破丹青揮灑意英宗還自濮陽來李臨城挽章桂香坊裏推時雋爆竹聲中見孝心人道臧孫今有后惜教含笑九原深榮歸亭䇿勳自合畫麒麟佚老榮歸帝里春開卷賦詩還自笑滿纓塵土向時人身外功名弊屣輕一亭歸卧有餘榮分明昨夜南山獵夢裏弦驚裂石聲再題胡烈婦殺虎圗丈夫不作屠龍舉揵婦能成刺虎威試看五行參運化二隂何盛一陽微耽耽哆口摧天去死地求生有若人寸鐵竟能伸義烈大臣當國合橫身古稱政猛苛於虎揃暴除殘惜壯圗蹀血兩坊王義俠袖鎚揮處幾於莬汘宅全用倀鬼事皮骨皆為虎吻腴鬼幽曽不悟當初棘林夜黑相逢處猶恐倀倀泣有餘石鼎聮句圗衡山何物老彌明氣歷侯劉到震驚笑向半空盤硬語火爐頭上把降旌海上遊談接大顛鼎邊聮句託軒轅不須苦泥中間事二者看來揔大言渭橋辭謁圗閃閃鑾旗擁帝輿八方臣妾效嵩呼君王莫以來同喜衛霍功成萬骨枯周文矩畫金步搖官人圗螭玉珠華兩趐排髻髙雙鳯拂雲來玉笙合就新翻曲恰值碧桃花正開雪中同郡寮遊逹活泉訟牒聽餘事未圎日長誰辦枕書眠出門偶作間人計踏雪來觀逹活泉淵碧澄泓一畒池勝遊都在郡城西潛蛟免致騰雲潤歲歲分香入稻畦取東坡夏壠餅餌香之例也雪窗無寐夜深雪晃客窗明更比西樓月色清老大看書無眼力偃然欹枕數寒更早秋夜坐候蟲唧唧掩荆扉落索瓜簍滿敗籬涼氣巳隨新鴈至小齋燈火便相冝飲醯圗一勺儘調鼎味三升鼻吸誠難翁不去為卿相何人禁此辛酸江南道閩越自方千里冥冥海角天涯野竹踈梅沙路江邊到處人家早起效三五七字格東方明清風發白露下無聲步久寒侵襪撫楹歌罷酒微醒月明滿地蘆花雪秋澗先生大全文集卷第三十四
