body:
  text: 奉誄大丞相忠武史公贈太尉勑撰神道碑翰林學士王磐文萬國鞭笞走帝庭堂堂爭識漢孤卿元勳髙出麒麟上曠度𥘉無智勇聲儷景去翻髯影駕柱天留在笏端銘白頭無地酬知已痛為蒼生淚滿纓追晚元遺山先生文奎騰彩憶光臨孺子何知喜嗣音余年草許以時文贄於先生公喜甚親為刪誨且有文筆重於相權奉山微塵之説即𣣔挈之西行以所傳卑余以事不克至今有遺恨云黨趙正傳公固在陽秋當筆我奚任天機翻錦餘官樣月户量工更苦心野叟亭空遺事墜荒煙埋恨九原深香欲吊風流俱寂寞滿丘秋草近宫墻挽張簽省自號順齋老人中統元年授太原平陽宣撫再簽東平行省漢庭冠劒擁羣雄曽違嘉謀沃帝聰白筆剛稜驚柱後繡衣風彩照河東鷼來近舍魄先裭麟出昌時道未窮一掬西州門外淚不應悲絶獨羊公留别總府諸公超超天馬五花紋少日能空冀北群事梗不成旬月雅材駑空抱四年勤情馳北闕煙花禁夢到西山日暮雲一曲驪歌應恨别麒麟髙閣揔殊勳單學士挽章二首生平才氣浩無雙彭蠡秋璉万里江庭議儘髙清禁月苦心終對玉堂缸百年世契先君厚万斛龍文筆力杠最喜誨人曽不倦洪鐘無憚寸筵撞時論生平愛贄賢縱橫條列果無前屈身為道思弘濟遇事明言見惡圓韋杜去天才尺五衣冠埋恨便千年遙憐晚起山齋意地下修文恐浪然和劉懷州詩䪨二月燕城氣未華添衣風起謾吹花􅗃隂凝慘松猶凍藉潤含嬌草有芽得失正須論定分低回𥘉不為謀家長河有路通霄漢誰遣孤星滯客槎荏苒風埃老歲華羞將勳業照菱花暖催回鴈舒雲翼寒勒幽蘭茁露芽嚼蠟宦情無少味轉蓬身丗不知家客窗一夜江湖夢醉把長竿倚釣槎蛛絲拂靣喜生華照眼青燈夜有花雪屋苦吟饒客思茶鐺寬煮試新芽一官除後三移次十夢春耒九到家遙想西溪墳下水碧翻瑶灔待浮槎餞王全州二首衛連鄘弼號交衝比屋休驚未可封鄉校廢來風俗壞野田闢後歲年凶租徭雖免離民衆官府全更宿弊重新政慮來無此切正煩裁減與優容二十年來舊使君又瞻皂蓋擁朱輪試評異政三王果何似天姿兩漢循田里務從安靜了使軺誰計送迎頻先聲洽久民情喜聽取隨車一雨春同劉景融過西園懷古錦摛西苑正隆修大定明昌事宴遊海露恩波鼇抃首花翻瑶艷雪迷摟三千歌舞繁華地一片風煙慘淡愁興廢算來無五紀至今靈沼詠西周送髙飛卿尹順德朝家一革舊官空整整新除示至公善政擬超循吏上寬恩都在詔條中如君悃愊無虛譽所至弦歌有實功馬首快驅紅斾去百泉花柳待春風那州亦有百泉用劉景融䪨答客問寂寂從教笑仲華羈懷坐老竹生花新除海隔無從問喬木春深恐有芽追逐昔賢慚下惠比量時輩愧劉家万言倘作無聞去枉説張侯泛斗槎西苑懷古和劉懷州景融䪨彩鳳簫聲徹曉聞宫墻煙栁接龍津月邉橫吹非清夜鏡裏瓊華揔好春行殿基存焦作土踏錐舞歇草留禋野花豈解興亡恨猶學宫粧一色勻踏錐舞名見景無所録金人遺事瓊苑韶華自昔聞杜鵑聲裏過天津殿空魚藻山猶碧水涸龍池草自春民樂尚歌身後曲弓彎不見舞時茵絳桃誰植宫墻外露濕胭脂恨未勻和虞帝廟吊古分開幽野自虞分山海雄沉載厚坤玄德共瞻天北極殿基空對苑西門蒼梧雲駕無從呌翠琰顔書固可尊聞説興陵堪北德東凬啼損杜鵑魂和劉懷州韻雨露中天日有華䁔私幽圃亦多花事機不料先根本顛木其能絶蘖芽老去戀時兼戀闕愁來憂國不憂家幾多牛渚星邊客空望秋凬八月槎和髙飛卿韻錢郎滿腹好精神人物當年見絶塵長惜仕途知巳少不愁花樣入時新趙張而後材難繼季孟之間德有鄰早晚青雲臺閣底楊何同作眼中人春耒百草解通神其奈凄風漲野塵一為化權無定宰百般生意不能新栁含涷眼迷陶宅杏簇枯枝倚宋鄰和氣阻乖關治體仰空欲問待何人别髙屯田晦之十年冠蓋幾相逢邂逅燕城燕喜同清賞已歌梨雪白歸期休負牡丹紅千屯曉月鞭聲底一片田旌夕照中自笑欲歸歸未得草堂無地著盧鴻即席壽青陽學士湖海秋風駐節頻北來猶似漢平津如公合得無期夀笑我還充不速賓櫻筍厨香驚咄辦江山筆健老能神玉堂未羡台階貴人道詞臣是重臣和左山言懷韻投獻王門匪自謀白駒雖白欲誰留鳥飛魚泳有常分漏盡鐘鳴合少休老驥志存終伏櫪野人機靜不驚鷗會依緑野堂邉隱一抹青山屋打頭遊封龍北麓行近龍峰巳稱心栗留聲裏轉青林雨如散髮來無際山似幽人喜見臨樹密連岡橫逺障雲低隨馬布輕隂鹿泉蓋薄何殷厚伴我幽尋上碧岑中溪書院幽尋不為愛山吟李相巖栖是賞音身丗正堪間處著時情尤比嚮來深風煙物外開三觀塵土人間望一霖山若有靈歆素禱滿泓寒碧代孤斟贈知事劉大用兩椽茅屋打頭低中有林丘翠作圍無限雲煙供落墨揔從胸次發天機一枝湘竹臨江活万疊秦山照眼霏疇昔過門清話久前身疑是米元暉即事旨王鹿菴作徹備虗驚巳可懲更堪行事日紛更創行有例推諸老責備無端悚衆情遼海兵連思魏鄭延齡麻壞見陽城窮愁正逺聞佳報喜動皇都豈席生留别鎮陽諸公赴任濟南梧桐葉上雨瀟瀟有似留連助寂寥身丗未容歸壠晦羽毛誰欲見雲霄三年滹水人情好六月齊州去路遙回首北潭花上月時應歸夢到蘭橈經史總帥戰處乾石稿邊野澗撗分圍曽列亞夫營雲煙眼底縈蛇陳草木風前有戰聲故壘按行傷往事青山依舊繞孤城千年帶礪河山誓翰與汾陽貫日誠閔子墓聖門嫓德亞吾顔季氏何知欲浼然三釡恐貽親老耻一㕓歸卧汝陽田山􅨛容與和聲裏墟墓瀟條落葉邊兩下頴濵碑下拜滿杯秋菊薦寒泉公堂言懷勳業羞將鏡裏看遭時自擬寸心丹勉從仕版無微巧硬著精神博一官寤枕夜長憂思悄公堂人靜雪花寒眼中少事能如意管甚林梢又日殘糟魚霜刀截斷玉腴芳暖貯銀罌釀粉漿錦尾帶頳傳內品金盤堆雪喜𥘉嘗解酲未減黃柑美雋味能欺紫蟹香一筋饜餘乘醉卧夢撗滄海聽鳴榔甲寅歲元曰癡絶何堪應事機間心思與野雲期靦顔身世緣飢凍覺老筯骸強拄持馬怯力微朝進處鳥知飛倦暮栖時日斜憑暖烏皮兒靜看爐煙裊碧絲挽杜止軒貧樂能安貴不淫百年癭海寄浮沉間中今古資談具物外江山助醉吟風義見來先急難文章拈出更雄深追攀逸駕嗟何及時向逃空得苦心一代人文杜止軒海翻鯨掣見詩仙細吟風雅三千首獨檀才名四十年劒在不沉衝斗氣神遊多了住山緣老天未覺斯文喪齊魯諸生有正傳挽孟德卿龍驤東下破吳年談笑從軍似仲宣亡國不驚三月火􅸩書光動六朝煙當時籌筆何英彂此日題詩倍黯然湖海賢郎冝少慰光揚重見葺遺編和張鵬舉詩韻挽杜止軒貧樂能安貴不淫百年癭海寄浮沉間中今古資談具物外江山助醉吟風義見來先急難文章拈出更雄深追攀逸駕嗟何及時向逃空得苦心一代人文杜止軒海翻鯨掣見詩仙細吟風雅三千首獨檀才名四十年劒在不沉衝斗氣神遊多了住山緣老天未覺斯文喪齊魯諸生有正傳挽孟德卿龍驤東下破吳年談笑從軍似仲宣亡國不驚三月火􅸩書光動六朝煙當時籌筆何英彂此日題詩倍黯然湖海賢郎冝少慰光揚重見葺遺編和張鵬舉詩韻誰分先覺與凡民天理中來一氣春肯效寒螿啼月苦放教宛馬到河神六經之外皆非學諸子巳來宜有人自嘆半生蟫蠧裏白頭無術動嚴宸和張仲常韻強顔陳力愧周任閲盡當年得失林白首好看能幾日虗舟相觸果何心行身誰是無瑕玉合志能裁躍冶金退易進難吾道事此懷更比向來深賦白舜俞多月亭海岱東開逈地寬小亭千里入憑欄一軒風露金莖濕滿地瓊瑶桂影寒興比廋樓冝不淺飲豪舒杓肯留殘使君未老風流在八表神遊夢彩鸞何處人間不夜天月亭髙倚月𥘉圓玉壷光轉青冥路桂影香浮畫棟煙一棹蓬瀛知海近滿庭民遙臺秋偏素娥苦待停杯問愁絶當年李謫仙遊佛首山開化寺至元草一年四月八日挈行者孫鞬郎盤盤石磴轉蒼崖山似青蓮四面開寺古説從兵後廢官忙喜向靜中來半泓寒碧供僧飯一點煙螺認佛臺我本婆娑林下客樹頭幽鳥莫驚猜逰靈巖寺三首行入山門巳可吟䓤朧佳樹揔幽尋氣分嶽秀開金界䳡警隂魔護道林竹溜逺縈雲磴落煙螺濃並寺巗深喚回三十年前夢此日登臨慰宿心余三十年前夢逰一寺其形勢殿舍殆與此間不異路轉峰回墮翠窠陽崖擁抱更嵯峨泉通碧澗來無盡寺並青山永不磨林壑勝逰緣興適乾坤清氣與詩多晚鐘似惜逰人去逺泛餘音繞澗阿絶景亭髙勝賞多杖藜到處即婆娑巖虛應磬聲長殷寺古題名字半訛幾樹幽葩明寶供滿空金色下煙蘿何時暫謝人間事放眼雲巒入浩歌送世傑郎中舉使雲南節旄堅駐海西陲奮自陳湯一布衣朔雪不辭雙鬢老長纓直係六王歸恩波重浹滇池浪赤羽何勞漢將威想得諸羌迎拜處使華先動玉門扉余按部奉髙故人劉君之子持此詩來謁感念疇昔已草五年矣顧其紙札刓弊因為重書以遺庶幾孝摽憐西華之意云漢柏詩蒼柏無城擁漢陵閟宫遺樹鬱峥嶸崔嵬不植眀堂礎造化潛通嶽頂靈萬壑煙霏扶傑幹半天風雨撼秋聲白頭會見東封日照映鸞旗一色青過沙溝店髙栁長塗送客吟暗驚時序變鳴禽清風破暑連三日好雨依時抵萬金逺嶺抱村圍野色行雲隨馬弄輕隂搖鞭喜入肥城界桑柘隂濃麥浪深長清官舍十載隨人戴豸冠望離清秩實多難一身許國無知己万事關心空汗顔花樣况非時制巧功名宜為老天慳季鷹何待秋風起一夜歸心滿故山觀光三首十三年在都下作漢家宫闕碧岧嶤六合同來不待招非此詎能隆上國有臣何幸際昌朝光連帝極環玄象翠積中天仰鬱霄葵藿寸心深向戀日華明處五雲嬌大元夫子壯陪亰盡敞燕雲作苑城彩鳳應門千仗肅蒼龍雙闕五雲明千秋日月低宸極万國衣冠拜紞紘蟣虬小臣何所祝年年嵩嶽聽呼聲長樂宫成孽宋庭紫微垣外紫煙生明昌受欵真兒劇洛邑營周是小成正朔一家堯曆日青山三面漢金城君王神武髙千古緘口長沙建治平夀鹿菴大學士三首十一月𥘉一日大節中流砥柱標髙風孤振張吾曹眼中元老恩方渥林下淵眀氣本豪万事縱心緣理勝三峰當面與秋髙玉堂更覺台階重蓮炬長看照夀毫陽春門裏開新第魚藻宫中侍講筵晚節不緣三徑屈髙風終愛五噫賢雅懷老去從多可万事諳來愈自然千古六經常道在就中能契是知權風節生平以烈聞詞章獨與大蘇親天人重為斯文主甲子洪開夀域春行草縱心書愈聖歌詩吟老語彌真穆修亦是華顚客肯把韓編付授頻贈友人張彥魯并序友人彥魯别余四年今歲秋有秦中之行道出淇右時余亦北邁有期尊酒道舊為數日留既而分岐就駕次日彥魯復追及余於朝歌南遂偕與北上前次保塞逆旅追念往事耿不能寐為賦是詩以贈且傷其會合之靡常歡樂之無幾也彥魯諱著丗遼東人北邁南遊有定期半途回駕喜追隨心因年老便多可馬信車前亦緩馳緑綺素深平日雅碧雪償盡向來思一樽逆旅燈前話莫忘燕垂抵足時趙州石梁華表亭亭擁石麟車書万里此通津天垂蝶蝀蜷千尺月吐蟾蜍隱半輪片石鞭來能濟險大臣當用合橫身征鞍歸路明年事一片春風柳色新三臺懷古萬古三臺作厲階漳流東注若為哀才教逆叛朔奴去又得顛癡帝子來紫陌衣冠森鬼朴芳華林苑墮兵埃夷姦不獨西陵樹荀或穿窬止自裁夀姚雪齋散髻飄瀟玉局仙竹風松月共清圓雲間正際啇霖後學奧能窺太極前瀛館寵光開夀域太平勳業在經筵殷勤春雨堂前檜細綴氷花點翠妍慶宋尹毋八十夀樹萱堂背巳憂忘金粉蓮苞貯靜香風景四時藏秀麗慈顔八秩見康強賦中潘嶽間居樂詩裏燕山桂子芳會看肩羿宫户底更勝陳氏配東牀贈鄉先生逍遙子姓韓氏曾為尚書省都司鶴飄瀟玉錬顔一壷天地市朝問集方有驗扶嬴劣野鳥知歸謝往還幽睡不妨紅日晚青山誰似白雲間會當華表歸來日重為留題過故關送𥙿鄉都司南還前日翰林君送我今朝幽薊我辭若十年契闊凡三覿五月從遊此重分世事有機難預料後期無恙要相聞何時沁北丹東稼解紱歸來約共耘任懷逺慶九十詩卷朱顔青鬢万金身九十康強是福人擺落世紛隨所適棄遺家事見何親花香北渚杯盤具月滿南樓杖屨頻更為武公歌夀德一溪淇水照秋筠北渚謂鎮州北潭也在時居鎮陽挽楊春卿先生曾為衛輝路勸農官山澤􅋯仙老使君十年談笑接多聞襟期自是羲皇上肝膽𥘉無楚越分冀北羣空逢伯樂斗南名重見田文一丘宿草情何極凄斷無終日暮雲先生燕王日人無終玉田東北山寄壽博關趙總管豫方從事東平日君適分符濮水濱歲曆喜聞開九秩客來爭説好精神背鮐宛與龜紋秀面頰舟餘鶴頂新特似麒麟圖上見形容全不老於真壽平章張公時為副樞十年黃閣冨經綸落落蒼髯社禝身公道救時仍此在龍門歸譽見來新菊香已辨南豐供醁蟻無煩靖節巾壽席今年得佳語太平勳業在麒麟送啇台符赴行臺御史器識沉明義外方青衫難屈校書行暫虛東閣郎君位要聳南臺豸角霜八道風稜馳使節兩淮殘困是維楊就中驄馬吾儕事匡正官邪最大綱病目書懷效樂天體病眼平時視物疑更禁風火內交馳越蛙睅目將誰怒鮫淚傾珠盡日垂氣鬱方瞳昏暈鏡瘡連剛臉痛磨錐悠悠伏枕三旬苦安得黃金刮暯鎞送按察王煥卿之任建康三首滿移投上謝癡床五郡河湟作省郎白筆冷搖瓜步月緑橙香烈洞庭霜虛懷正切平時慮逹變終垂後代芳我老壯心猶未巳彈冠端有羡王陽十年臺省共翺翔機識沉雄義外方金節喜酬平昔志緑橙香動夜耒霜老懷雅有思深慮丗故何憂事過防眼看澄清開八道就中風動自丹陽五郡河湟巳有聲繍衣直指又煩卿恩寬注意矜新附物衆於中慮孽萌牛渚犀燃防過察吳江霜落要維清行司此去尤堪喜地爽山髙眼倍明送李敬之按察淮東遼陽三載淹廳幕并府終年二鐡官桃李門庭慙自致冰霜肝膽見來寒摧姦老手監司舊復業遺黎莫枕安想得桐淮東畔月清光先照使君鞍送馮夀卿簽事小邑鳴絃踰兩考外臺簽事是榮遷未妨躡足青雲後巳著先聲白鴈前三丗名家遺直在百城新附望恩偏銀鞭莫緩青驄去野騖羣飛正刺天寄子𥘉提刑自陜西改授行臺中丞治揚州監司西去無三月建莭東還路八千仕宦得君無重地澄清有路是瞻天霜封淮甸妖氛靜春入瓊華老樹妍一䇿想能康濟了儘堪歸隱百門煙目疾自警效樂天體目手相須最切身連宵慘痛可傷神老緣貪得書成祟壯為傷多酒入唇四大假來皆是苦萬緣急遣亦忘真悠悠未了三千牘束置從今不要親寄梁幹臣簽事滿移未貢别癡床去作襄州省幕郎遷拜揔緣才力致激揚尤稱老懷剛離情轉惡中年别衰鬢相望兩鏡霜每度思君傷馬甫漳州南望白雲長夀趙同簽九月草五日丙年正月下江東榮拜人驚此日同破竹固成王濬手侍謀多見茂先功松形秀並眉毫健軍務能開丗道公夀席今年更堪賀廟宫修治越裝空送劉侍御超騰髙品數年間才刃恢恢顧不難百越逺開炎漢域兩淮爭識惠文冠犀燃牛渚魚龍慘霜落吳江草樹寒成事自來輸有志不教勳業鏡中看雨聲滴破寒更韻未諧芭蕉未了更空階隔簾響絶玎東佩入耳愁生索寞懷孤嶼有舟添夜話殘燈無焰耿幽齋慿君㵼入瑶琴曲並與秋風洛水排夢焦簽事在一官署論余除授於某宫前十月十一日夜神交𥘉不間幽明夢裏相看儼若生顧接宛同蘭省日薦揚猶重故人情楓林魂黯人何在落月梁空思未平枕上兩行知巳淚覺來揮却又縱橫送寧端甫宣慰東平潚灑風神見德隅走趨知不利長裾老諳所事無多味却覺間官是美除恩詔才離溫室樹甘霖先沛泰山墟憲陵山色溪堂月剩有詩來當尺書送杜時舉歸平陽四載河東頗閲人愛君能靜復能貧一朝夜兩韋郎話滿眼睛雲玉壘春未分風塵淹駿足不妨麴蘖暫謀身因君西邁增余興兩夜青山入夢頻哭張總判行甫并序公諱傃北燕人姓張氏字行甫姿藴藉好賔客官至平陽府判官詩所謂愷悌君子民之父母者也家藏書數千卷後以纍落職年五十有七終于家晚築龍祠别墅溪風松月境趣瀟灑酒壚茶竈筆牀釣具有幽居草堂之樂至元壬申余官兾府暇日與君徜徉其間者蓋三年于兹醉山頭之落照起舞鳴歌弄茂蔭之清泉沙鷗靜玩追思往事傷如之何爰作悲歌庶賡薤露其詞曰酒病人看指日瘳扣床辝别到彌留歸軒東下才期月哀訃聞來已兩秋白璧冷埋泉壤閟黃壚不隔暮山稠分明昨夜龍祠夢醉卧藤隂唱石州君善歌石州慢婆娑杖屨桂叢幽長恐山中識故侯野約授書黃石在菊香浮甕草堂秋一作滿甕秋杏陶令酒一川風月武陵舟宦清瀟灑陶彭澤老境浮沉馬少遊何日下車傾腹痛春風吹淚拜林丘秋澗先生大全文集卷第十七
