body:
  text: 奉誄大丞相忠武史公贈太尉勑撰神道碑翰林學士王磐文萬國鞭笞走帝庭堂堂争識漢孤卿元勲髙出麒麟上曠度𥘉無智勇聲儷景去翻髯影駕柱天留在笏端銘白頭無地酬知已痛為蒼生涙滿纓追晚元遺山先生文奎騰彩憶光臨孺子何知喜嗣音余年廿許以時文贄於先生公喜甚親為删誨且有文筆重於相權奉山㣲塵之說即𣣔挈之西行以所傳卑余以事不克至今有遺恨云党趙正傳公固在陽秋當笔我奚任天機翻錦餘官様月户量工更苦心野叟亭空遺事墜荒烟埋恨九原深香欲吊風流俱寂寞滿丘秋草近宫墻挽張簽省自号順齋老人中統元年授太原平陽宣撫再簽東平行省漢庭冠劒擁羣雄曽違嘉謀沃帝聦白筆剛稜驚柱後繡衣風彩照河東鷼来近舎魄先裭麟出昌時道未窮一掬西州門外淚不應悲絶獨羊公留别緫府諸公超超天馬五花紋少日能空冀北群事梗不成旬月雅材駑空抱四年勤情馳北闕煙花禁夢到西山日暮雲一曲驪歌應恨别麒麟髙閤揔殊勲單學士挽章二首生平才氣浩無雙彭蠡秋璉万里江庭議儘髙清禁月苦心終對玉堂缸百年世契先君厚万斛龍文筆力杠最喜誨人曽不倦洪鐘無憚寸筵撞時論生平愛贄賢縱横條列果無前屈身為道思弘濟遇事明言見悪圓韋杜去天纔尺五衣冠埋恨便千年遥憐晚起山齋意地下脩文恐浪然和劉懷州詩䪨二月燕城氣未華添衣風起謾吹花􅗃隂凝慘松猶凍藉潤含嬌草有芽得失正湏論定分低回𥘉不為謀家長河有路通霄漢誰遣孤星滯客槎荏苒風埃老歳華羞將勲業照菱花暖催囬鴈舒雲翼寒勒幽蘭茁露芽嚼蠟䆠情無少味轉蓬身丗不知家客牎一夜江湖夢醉把長竿倚釣槎蛛絲拂靣喜生華照眼青燈夜有花雪屋苦吟饒客思茶鐺寛煑試新芽一官除後三移次十夢春耒九到家遥想西溪墳下水碧翻瑶灔待浮槎餞王全州二首衛連鄘弼號交衝比屋休驚未可封郷校廢来風俗壞野田闢後歲年凶租徭雖免離民衆官府全更宿弊重新政慮来無此切正煩裁减與優容二十年来舊使君又瞻皂蓋擁朱輪試評異政三王果何似天姿两漢循田里務從安静了使軺誰計送迎頻先聲洽乆民情喜聴取随車一雨春同刘景融過西園懐古錦摛西苑正隆脩大定明昌事讌遊海露恩波鼇抃首花飜瑶艶雪迷搂三千歌舞繁華地一片風烟慘淡愁㒷廢筭來無五紀至今靈沼詠西周送髙飛卿尹順徳朝家一革舊官空整整新除示至公善政擬超循吏上寛恩都在詔條中如君悃愊無虚譽所至弦歌有實功馬首快驅紅斾去百泉花柳待春風那州亦有百泉用刘景融䪨荅客問寂寂從教笑仲華覊懷坐老竹生花新除海隔無從問喬木春深恐有芽追逐昔賢慚下惠比量時軰愧劉家万言倘作無聞去枉說張侯泛斗槎西苑懐古和劉懷州景融䪨彩鳳簫聲徹曉聞宫墻烟栁接龍津月邉横吹非清夜鏡裏瓊華揔好春行殿基存焦作土踏錐舞歇草留䄄野花豈觧㒷亡恨猶學宫粧一色匀踏錐舞名見景无所錄金人遺事瓊苑韶華自昔聞杜䳌聲裏過天津殿空魚藻山猶碧水涸龍池草自春民樂尚歌身後曲弓彎不見舞時茵絳桃誰植宫墻外露濕臙脂恨未匀和虞帝廟吊古分開幽野自虞分山海雄沉載厚坤玄徳共瞻天北極殿基空對苑西門蒼梧雲駕無從呌翠琰顔書固可尊聞說㒷陵堪北徳東凬啼損杜䳌魂和劉懷州韻雨露中天日有華䁔私幽圃亦多花事機不料先根本顛木其能絶蘖芽老去戀時兼戀闕愁来憂國不憂家㡬多牛渚星邊客空望秋凬八月槎和髙飛卿韻錢郎滿腹好精神人物當年見絶塵長惜仕途知巳少不愁花様入時新趙張而後材難繼季孟之間徳有鄰早晚青雲䑓閣底楊何同作眼中人春耒百草觧通神其柰凄風漲野塵一為化權無定宰百般生意不能新栁含涷眼迷陶宅杏簇枯枝倚宋隣和氣阻乖關治體仰空欲問待何人别髙屯田晦之十年冠蓋幾相逢邂逅燕城燕喜同清賞已歌棃雪白歸期休負牡丹紅千屯曉月鞭聲底一片田旌夕照中自笑欲歸歸未得草堂無地着盧鴻即席壽青陽學士湖海秋風駐節頻北來猶佀漢平津如公合得無期夀笑我還充不速賓櫻筍厨香驚咄辦江山筆健老能神玉堂未羡台階貴人道詞臣是重臣和左山言懐韻投獻王門匪自謀白駒雖白欲誰留鳥飛魚泳有常分漏盡鐘鳴合少休老驥志存終伏櫪野人機静不驚鷗㑹依緑野堂邉隠一抺青山屋打頭遊封龍北麓行近龍峰巳稱心栗留聲裏轉青林雨如散髮來無際山佀幽人喜見臨樹宻連崗横逺障雲低随馬布䡖隂鹿泉蓋薄何慇厚伴我幽㝷上碧岑中溪書院幽㝷不為愛山吟李相巖栖是賞音身丗正堪閑䖏着時情尤比嚮來深風烟物外開三觀塵土人間望一霖山若有靈歆素禱滿泓寒碧代孤斟贈知事劉大用两椽茅屋打頭低中有林丘翠作圍無限雲烟供落墨揔從胷次發天機一枝湘竹臨江活万疊秦山照眼霏疇昔過門清話乆前身疑是米元暉即事㫖王鹿菴作徹備虗驚巳可懲更堪行事日紛更創行有例推諸老責備無端悚衆情遼海兵連思魏鄭延齡麻壊見陽城窮愁正逺聞佳報喜動皇都豈席生留别鎮陽諸公赴任濟南梧桐葉上雨瀟瀟有佀留連助寂寥身丗未容歸壠晦羽毛誰欲見雲霄三年滹水人情好六月齊州去路遥囬首北潭花上月時應歸夢到蘭橈經史緫帥戰處乾石槁邊野澗撗分圍曽列亞夫營雲烟眼底縈蛇陳草木風前有戰声故壘按行傷徃事青山依舊繞孤城千年帶礪河山誓翰與汾陽貫日誠閔子墓聖門嫓徳亞吾顔季氏何知欲浼然三釡恐貽親老耻一㕓歸卧汝陽田山􅨛容與和聲裏墟墓瀟條落葉邊两下頴濵碑下拜滿杯秋菊薦寒泉公堂言懐勲業羞將鏡裏看遭時自擬寸心丹勉從仕版無㣲巧硬着精神愽一官寤枕夜長憂思悄公堂人静雪花寒眼中少事能如意管甚林梢又日殘糟魚霜刀截断玉腴芳暖貯銀罌醸粉漿錦尾帶頳傳内品金盤堆雪喜𥘉甞觧酲未减黄柑羙雋味能欺紫蟹香一筋饜餘乗醉卧夢撗滄海聽鳴榔甲寅歲元曰癡絶何堪應事機閑心思與野雲期靦顔身世縁饑凍覺老筯骸強拄持馬怯力微朝進䖏鳥知飛倦暮栖時日斜凭暖烏皮儿静看爐烟裊碧絲挽杜止軒貧樂能安貴不滛百年癭海寄浮沉閑中今古資談具物外江山助醉吟風義見來先急難文章拈出更雄深追攀逸駕嗟何及時向逃空得苦心一代人文杜止軒海翻鯨掣見詩仙細吟風雅三千首獨檀才名四十年劒在不沉衝斗氣神游多了住山縁老天未覺斯文䘮齊魯諸生有正傳挽孟徳卿龍驤東下破呉年談笑從軍佀仲宣亡國不驚三月火􅸩書光動六朝烟當時籌筆何英彂此日題詩倍黯然湖海賢郎冝少慰光揚重見葺遺編和張鵬舉詩韻挽杜止軒貧樂能安貴不滛百年癭海寄浮沉閑中今古資談具物外江山助醉吟風義見來先急難文章拈出更雄深追攀逸駕嗟何及時向逃空得苦心一代人文杜止軒海翻鯨掣見詩仙細吟風雅三千首獨檀才名四十年劒在不沉衝斗氣神游多了住山縁老天未覺斯文䘮齊魯諸生有正傳挽孟徳卿龍驤東下破呉年談笑從軍佀仲宣亡國不驚三月火􅸩書光動六朝烟當時籌筆何英彂此日題詩倍黯然湖海賢郎冝少慰光揚重見葺遺編和張鵬舉詩韻誰分先覺與凢民天理中來一氣春肯効寒螿啼月苦放教宛馬到河神六經之外皆非學諸子巳来宜有人自嘆半生蟫蠧裏白頭無術動嚴宸和張仲常韻強顔陳力媿周任閲盡當年得失林白首好看能幾日虗舟相觸果何心行身誰是無瑕玉合志能裁躍冶金退易進難吾道事此懷更比向來深賦白舜俞多月亭海岱東開逈地寛小亭千里入憑欄一軒風露金莖濕滿地瓊瑶桂影寒㒷比廋樓冝不淺飲豪舒杓肯留殘使君未老風流在八表神遊夢彩鸞何䖏人間不夜天月亭髙倚月𥘉圓玉壷光轉青冥路桂影香浮畫棟烟一櫂蓬瀛知海近滿庭民遥䑓秋偏素娥苦待停杯問愁絶當年李謫仙遊佛首山開化寺至元廿一年四月八日挈行者孫鞬郎盤盤石磴轉蒼崖山佀青蓮四面開寺古說從兵後廢官忙喜向静中来半泓寒碧供僧飯一點烟螺認佛䑓我本婆娑林下客樹頭幽鳥莫驚猜逰靈巖寺三首行入山門巳可吟䓤朧佳樹揔幽㝷氣分嶽秀開金界䳡警隂魔護道林竹溜逺縈雲磴落烟螺濃並寺巗深喚囬三十年前夢此日登臨慰宿心余三十年前夢逰一寺其形勢殿舍殆與此間不異路轉峰囬堕翠窠陽崖擁抱更嵯峨泉通碧澗来無盡寺並青山永不磨林壑勝逰縁㒷適乾坤清氣與詩多晚鐘佀惜逰人去逺泛餘音遶澗阿絶景亭髙勝賞多杖藜到䖏即婆娑巖虚應磬声長殷寺古題名字半訛幾樹幽葩明寳供滿空金色下煙蘿何時暫謝人間事放眼雲巒入浩歌送世傑郎中舉使雲南節旄堅駐海西陲奮自陳湯一布衣朔雪不辭双鬢老長纓直係六王歸恩波重浹滇池浪赤羽何勞漢将威想得諸羗迎拜處使華先動玉門扉余按部奉髙故人劉君之子持此詩來謁感念疇昔已廿五年矣頋其帋札刓弊因爲重書以遺庻幾孝摽憐西華之意云漢栢詩蒼栢無城擁漢陵閟宫遺樹鬱峥嶸崔嵬不植眀堂礎造化潜通岳頂靈萬壑烟霏扶傑榦半天風雨撼秋聲白頭㑹見東封日照暎鸞旂一色青過沙溝店髙栁長塗送客吟暗驚時序變鳴禽清風破暑連三日好雨依時抵萬金逺嶺抱村圍野色行雲随馬弄䡖隂摇鞭喜入肥城界桑柘隂濃麥浪深長清官舎十載随人戴豸冠望離清秩寔多難一身許國無知己万事関心空汗顔花様况非時制巧功名宜為老天慳季鷹何待秋風起一夜歸心滿故山觀光三首十三年在都下作漢家宫闕碧岧嶤六合同來不待招非此詎能隆上國有臣何幸際昌朝光連帝極環玄象翠積中天仰鬱霄葵藿寸心深向恋日華明䖏五雲嬌大元夫子壯陪亰盡敞燕雲作苑城彩鳳應門千仗肅蒼龍双闕五雲明千秋日月低宸極万國衣冠拜紞紘蟣虬小臣何所祝年年嵩嶽聽呼聲長樂宫成孽宋庭紫㣲垣外紫烟生明昌受欵真児劇洛邑營周是小成正朔一家堯暦日青山三面漢金城君王神武髙千古緘口長沙建治平夀鹿菴大學士三首十一月𥘉一日大節中流砥柱標髙風孤振張吾曹眼中元老㤙方渥林下淵眀氣本豪万事縱心縁理勝三峰當面與秋髙玉堂更覺台階重蓮炬長看照夀毫陽春門裏開新第魚藻宫中侍講筵晚節不縁三徑屈髙風終愛五噫賢雅懐老去從多可万事諳來愈自然千古六經常道在就中能契是知權風節生平以烈聞詞章獨與大蘇親天人重為斯文主甲子洪開夀域春行草縱心書愈聖歌詩吟老語彌真穆脩亦是華顚客肯把韓編付授頻贈友人張彦魯并序友人彦魯别余四年今歲秋有秦中之行道出淇右時余亦北邁有期尊酒道旧為數日留旣而分岐就駕次日彦魯復追及余於朝歌南遂偕與北上前次保塞逆旅追念徃事耿不能寐為賦是詩以贈且傷其㑹合之靡常歡樂之無幾也彦魯諱著丗遼東人北邁南遊有定期半途囬駕喜追随心因年老便多可馬信車前亦緩馳緑綺素深平日雅碧雪償尽向來思一樽逆旅燈前話莫忘燕垂抵足時趙州石梁華表亭亭擁石麟車書万里此通津天垂蝶蝀蜷千尺月吐蟾蜍隱半輪片石鞭來能濟險大臣當用合横身征鞍歸路明年事一片春風柳色新三䑓懐古萬古三䑓作厲階漳流東注若爲哀才教逆叛朔奴去又得顛癡帝子来紫陌衣冠森鬼朴芳華林苑堕兵埃夷姦不獨西陵樹荀或穿窬止自裁夀姚雪齋散䯻飄瀟玉局仙竹風松月共清圓雲閑正際啇霖後學奥能窺太極前瀛館寵光開夀域太平勲業在經筵殷勤春雨堂前檜細綴氷花點翠妍慶宋尹毋八十夀樹萱堂背巳憂忘金粉蓮苞貯静香風景四時藏秀麗慈顔八秩見康強賦中潘岳閑㞐樂詩裏燕山桂子芳㑹看肩羿宫户底更勝陳氏配東牀贈郷先生逍遥子姓韓氏曾為尚書省都司鶴飄瀟玉錬顔一壷天地市朝問集方有驗扶嬴劣野鳥知歸謝徃還幽睡不妨紅日晚青山誰佀白雲閑㑹當華表歸來日重爲留題過故関送𥙿郷都司南還前日翰林君送我今朝幽薊我辭若十年契闊凢三覿五月從游此重分世事有機難預料後期無恙要相聞何時沁北丹東稼觧紱歸来約共耘任懐逺慶九十詩卷朱顔青鬢万金身九十康強是福人擺落世紛随所適棄遺家事見何親花香北渚盃盤具月滿南楼杖屦頻更爲武公歌夀徳一溪淇水照秋筠北渚謂鎮州北潭也在時居鎮陽挽楊春卿先生曾爲衛輝路勸農官山澤􅋯仙老使君十年談笑接多聞襟期自是羲皇上肝膽𥘉無楚越分冀北羣空逢伯樂斗南名重見田文一丘宿草情何極凄断無終日暮雲先生燕王日人無終玉田東北山寄壽愽關趙緫管予方從事東平日君適分符濮水濱歲暦喜聞開九秩客來爭説好精神背鮐宛與龜紋秀面頰舟餘鶴頂新特似麒麟圖上見形容全不老於真壽平章張公時為副樞十年黄閣冨經綸落落蒼髯社禝身公道捄時仍此在龍門歸譽見來新菊香已辨南豊供醁蟻無煩靖節巾壽席今年得佳語太平勲業在麒麟送啇台符赴行臺御史器識沉明義外方青衫難屈校書行暫虚東閣郎君位要聳南臺豸角霜八道風稜馳使節兩淮殘困是維楊就中騘馬吾儕事匡正官邪㝡大綱病目書懷效樂天體病眼平時視物疑更禁風火内交馳越蛙睅目將誰怒鮫淚傾珠盡日垂氣欝方瞳昬暈鏡瘡連剛臉痛磨錐悠悠伏枕三旬苦安得黄金刮暯鎞送按察王煥卿之任建康三首滿移投上謝癡床五郡河湟作省郎白筆冷摇瓜歩月緑橙香烈洞庭霜虚懐正切平時慮逹變終垂後代芳我老壯心猶未巳彈冠端有羡王陽十年䑓省共翺翔機識沉雄義外方金節喜酬平昔志緑橙香動夜耒霜老懐雅有思深慮丗故何憂事過防眼看澄清開八道就中風動自丹陽五郡河湟巳有声繍衣直指又煩卿恩寛注意矜新附物衆於中慮孽萌牛渚犀燃防過察呉江霜落要維清行司此去尤堪喜地爽山髙眼倍明送李敬之按察淮東遼陽三載淹㕔幕并府終年貳鐡官桃李門庭慙自致冰霜肝膽見來寒摧姦老手監司舊復業遺黎莫枕安想得桐淮東畔月清光先照使君鞍送馮夀卿簽事小邑鳴絃踰两考外臺簽事是荣迁未妨躡足青雲後巳著先聲白鴈前三丗名家遺直在百城新附望恩偏銀鞭莫緩青騘去野騖羣飛正刺天寄子𥘉提刑自陜西改授行䑓中丞治揚州監司西去無三月建莭東還路八千仕䆠得君無重地澄清有路是瞻天霜封淮甸妖氛静春入瓊華老樹妍一䇿想能康濟了儘堪歸隱百門烟目疾自警效樂天體目手相湏㝡切身連宵惨痛可傷神老縁貪得書成祟壯爲傷多酒入唇四大假來皆是苦萬縁急遣亦忘真悠悠未了三千牘束置從今不要親寄梁幹臣簽事滿移未貢别癡床去作㐮州省幕郎迁拜揔縁才力致激揚尤稱老懐剛離情轉惡中年别衰鬢相望两鏡霜毎度思君傷馬甫漳州南望白雲長夀趙同簽九月廿五日丙年正月下江東榮拜人驚此日同破竹固成王濬手侍謀多見茂先功松形秀並眉毫健軍務能開丗道公夀席今年更堪賀廟宫修治越裝空送劉侍御超騰髙品數年間才刄恢恢顧不難百越逺開炎漢域两淮争識恵文冠犀燃牛渚魚龍慘霜落呉江草樹寒成事自來輸有志不教勲業鏡中看雨聲滴破寒更韻未諧芭蕉未了更空堦隔簾響絶玎東佩入耳愁生索寞懷孤嶼有舟添夜話殘燈無燄耿幽齋慿君㵼入瑶琴曲並與秋風洛水排夢焦簽事在一官署論余除授於某宫前十月十一日夜神交𥘉不間幽明夢裏相看儼若生頋接宛同蘭省日薦揚猶重故人情楓林魂黯人何在落月梁空思未平枕上两行知巳淚覺來揮却又縱横送寗端甫宣慰東平潚洒風神見徳隅走趨知不利長裾老諳所事無多味却覺閑官是羙除恩詔纔離温室樹甘霖先沛泰山墟憲陵山色溪堂月剰有詩來當尺書送杜時舉歸平陽四載河東頗閲人愛君能静復能貧一朝夜兩韋郎話滿眼睛雲玉壘春未分風塵淹駿足不妨麴蘖暫謀身因君西邁增余㒷兩夜青山入夢頻哭張緫判行甫并序公諱傃北燕人姓張氏字行甫姿藴藉好賔客官至平陽府判官詩所謂愷悌君子民之父母者也家藏書數千卷後以累落職年五十有七終于家晚築龍祠别墅溪風松月境趣瀟洒酒壚茶竈筆牀釣具有幽㞐草堂之樂至元壬申余官兾府暇日與君徜徉其間者蓋三年于兹醉山頭之落照起舞鳴歌弄茂䕃之清泉沙鷗静玩追思徃事傷如之何爰作悲歌庶賡薤露其詞曰酒病人看指日瘳扣床辝别到弥留歸軒東下才期月哀訃聞來已两秋白璧冷埋泉壤閟黄壚不隔暮山稠分明昨夜龍祠夢醉卧藤隂唱石州君善歌石州慢婆娑杖屦桂叢幽長恐山中識故侯野約授書黄石在菊香浮甕草堂秋一作滿甕秋杏陶令酒一川風月武陵舟宦清瀟洒陶彭澤老境浮沉馬少遊何日下車傾腹痛春風吹淚拜林丘秋澗先生大全文集卷第十七
