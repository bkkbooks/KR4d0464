body:
  text: 故真定五路萬户府參議兼領衛州事王公行狀曽祖韓某祖韓某父諱某滄州某里王某六十三狀昔王延州有云君子有惠政而無異政史臣傳循吏而無能吏故班孟堅序龔黃鄭召諸人曰生有榮號死見奉祀廪廩德讓君子之遺風矣德既肆乎循政復極乎惠求之今人其惟王衛州乎公諱昌齡宇顯之姓王氏滄州人世雄于財以孝義著稱鄉里公少頴悟不凡業儒學嶄然見頭角故大父臨佟嘆曰王氏之宗善積有素嗣續弗絶必矣然起吾門者在此子也貞祐𥘉滄景𬒳兵破公以孤童子能依疆濟難間行歸汴抱負竒節時人未之知也正大末京城戒嚴北面元帥府以材幹辟公授帥府徑歷官積勞遷明威將軍陳州防禦判官適今中書大丞相政總兵民撫鎮河朔開幕府學良能恢弘父兄之業用薦者起公參議幕府事公遂悉心畢力知無不為故得感同風雲合若符契方國朝有事東南城攻野戰餘二十年公籌畫戎幄應變機權無戰無之以至冒矢石輸忠力作士氣雖一時輔佐有不克負荷者𥘉王師次安陸負險之民盤結山谷間備禦完固艱於力取公慨然以降集請行時人危之既抵壁宣示恩信喻以禍福竟招降而全活之歲丙申冬天兵次光州時餉道不繼主帥命公率十餘人乘筏入焦湖督運中流遇賊甚劇衆怖亂筏傾身沒於水者半公獨神色益壯持兵殊死戰賊潰護所運以軍士賴之大振遂取光州凱還丞相嘉公伐謀制勝之略遂留公居守公遂附安反側市肆不昜按堵如故幾於一載及䇿勳盟府主帥纍公之績以聞朝廷褒寵之而後奉命北覲通名於天朝者數矣每以生民休戚軍國利病為巳任而風雪沍寒往返之勞略不之恤也于今良法善政守而不失者多公所請云辛亥秋七月先皇帝即位正封邑錫勳舊復以汲胙共獲新中山陽六縣之地封户書大丞相若古采地然昭其功也時朝廷以汴洛荆徐卑丞相經略之以衛乏人為憂且曰衛當四逹之衝民疲事劇非得二千石良者無以剷夷積弊涵飬瘡痏也既難其人特命公領其事公下車以來敬以奉上恭以執事巨細不遺知所後先哀民之困於繭絲也均徭平賦以畜其力痛政之極於汚染也治官汰吏以清其源并容細民不優市肆懋遷有無以通舟車楗堤防以捍水災課農桑以抑遊手尊王人則修飾館舍免病涉則平治橋梁勵薄俗扶善良禮賢俊贍貧乏衍郛郭廣居㕓通商惠工興滯輔弊民不見吏而無吠警之虞士格所恥咸有聞知之懼蓋公之冶化謹身帥先居以廉平不至嚴而巳衛自亂餘以來民耕植居郡東者多而泉水自鄘城而下崖岸平流駃如掌上稍東復與淇水合秋潦時至涇流之大南際漢金堤田廬為之一空公為堤黑蕩陂以禦之遂絶橫潰之患清水出山陽白鹿嵬公乃度原隰創溝澮溉田余數百頃其興起洑利如此朝歌介弼鄘之間地迫山麓灌莾極目盜闖出沒越人於貨行者苦之公乃建議於漕臺周侯德甫州而縣之驛亭平襄南接頓丘於是淵藪之患息馹騎之力紓焉而德之波及鄰土者又如此既而丞相材公之為酬公之功以其子𣸪充同知衛州節度使事遂有撫恤軍民均平差役勸課農􅮏裁決詞訟治效極多之諭誠以八年之間熙然而春郁乎其文樂國多士之風還舊觀矣巳亥春例上計行臺恇怯苛猛公不忍甫息之民橫𬒳侵暴遂乃道巴峽抵忠渝哀鳴相府中有以彌綸之也雖獲所請竟以憂勞致疾東歸以是年冬十月草日卒於􅉑縣之斜披里春秋六十有三越十一月葬於汲縣王尚材之西原送喪者餘萬人攀號祖奠凝慕不巳其貴官名土若闊闊左丞姚司農張左轄參卿王仲禮宣撫張子敬耆德孫元輔假季昌咸逺道致祭衛人思之如戴父母明年相與起祠宇立遺像植豐碑壽遺愛歲時香火之奉其嚴如生公資明良安雅德量無涯涘風鑒表表口不出臧否飾吏以儒外彪中弸慈祥愷悌喜愠不形於色務明大體悃愊無譁持論深長操守匪石其待人御物純以至誠感發人心諄諄訓導若嚴師慈父有銘骨不能忘者𥘉京城厥圍友人某以罪逮捕抵公為舍匿之竟以獲免篤制徒單雲甫肥遁鄰邑聞公之典衛也幡然來歸為治堂黌極賓禮選子弟之開敏者從而師之自是郡之文風尤為煟興又曹取齋通甫由趙來依疽發背自病至終公醫拯殯送曲盡友義北渡後無遺山號稱一代士林之宗愛慕髙義乃有今而後寒士知所歸之嘆每自公退食盤饌稍盛必撤去之曰無暴殄天物及宴樂賔客供具豐腆盡於殷厚曰儉於人則不可也餘睱則閲書史接文士晚年尤喜作詩歌詠風流不知老之將至至雄章傑句間見層出兼善尺牘行書嘗謂下客王惲曰吾少業儒以時艱罔卒所志然胸中緒餘之氣勃勃然日新矣其好學又如此愛其子擇師而教之因訓之曰我不願若富貴能儒素起家弊廬饘粥生飬死葬足矣故於諸生獎藉作成為尤至所交皆天下豪傑其推賢讓能而升諸公者如中山楊西菴廬龍盧叔賢河南鄭子周陽憂董端卿皆一時材大夫也公之殁丞相墓祭而哭之曰昔公勤勞我家三十餘年事無巨細咸仰決焉豈其天奪之速而至於斯俾豫煢煢然在疚至有失目折肱之喻哀號之聲感動左右其為賢主人所惜如此不可謂不遇也不可謂不逹也故論者評公之惠愛類鄭子産忠貞類漢王常智周事悉類蘇令綽權望雅事之其樂於為善之心又如飢渴之於飲食也苟推而行之天下其功烈豈止是哉夫人姓陳氏齊安人生子男一人韓復少負鑒裁於間母通逹政體用丞相廷薦宣授衛輝路同總管事其綸章諭之曰故參議王顯之才行相輔政恕中行俾治衛輝民安事辦今子復良有父風以繼述之事考之誠無愧負矣孫二人曰雪山曰鐵山女孫一人曰幼安嗚呼公生平事業智名勇功囊括無迹恐蕪類之辭不足發越盛德之萬一敢以區區聞見播任興訟之實者勉為具述託立言君子而圗其不朽焉中統三年秋九月草有九日門下王某謹狀太一二代度師贈嗣教重明真人蕭公行狀師諱道熙字光逺本姓韓氏其先汴州人五代祖銀青榮祿大夫璹自唐季來隸于衛曾祖奕山舉茂材祖渤進士第父矩隱德不仕度師其仲子也師為人英偉眉目踈秀豐下美鬚髯三歲識字六歲能書棲心教法儼然注蕭門二葉之望金正隆間始祖一悟真人以神道設教上動人主所在翕然從風韓氏舉族清修師母閻尤極信心深入法海既孕苦病父請禱於真人真人曰汝韓氏素植善根當産異人且昭陽報然將來必佐吾法門可服吾丹書以安胎息久之母感異夢既寤師生果稟竒相充閭之氣肅如也才免懷留飬道宫受度為道士復先訓也再命而受清虛大德之號大定六年冬十有一月真人羽化於萬壽丈室師纕絰哀戚如喪考妣於是相宅兆具葬儀及殯整整有法綱而不紊觀者咸嗟異之時師甫滿十祀耳既窆師乃陳寶籙法物具香火升堂以二代嗣事諭衆有門弟子芋道省劉道固等思有以大厭衆心稽首求頌且問師它生云何賢聖師即走筆批曰明月清風大德頗訝愚人未識忉忉詢吾為誰只是從來太一衆遂讋服歸心焉九年朝廷歆其行異敕立萬壽額碑於本觀是后聲教大振門徒增盛東漸于海矣𥘉真人謂靈章寶籙率天神持護遺命起臺中央上為壇屋鐵作户牖庶幾神靈遊居有以妥安之師乃擴充真訓尊光圗籙締􅌟層閣制極壯麗揭以靈章寶藴之名歲時醮祭為衆生進階之地復建朝元觀為祖師墳原道場仍植豐碑表襮景行不數寒暑內外修治輪奐中度師直以德教感化曾聲色不動門人子來如趍父事十一年時師殆十有四臘門人巨鹿李悟真者造請何為仙道師曰做仙佛不難只依一弱字便是爾曰弱者道之用也悟真既授旨辝還師曰可速還汝當遷矣明年李不疾而逝殯七日形色如生及㼅舉棺蔑如開視之從中一曰錫飛去餘衣衾而巳衆始悟師旨當遷者即仙也其慧悟如此一日師曵杖逍遙謂左右曰吾旦夕𣣔馳四方可趣治行裝已而世宗詔永海內名僧宗主天長觀事師遂幡然應韶不閲月户外之屨滿矣師密削疏聚精以備儲乏既而秋旱京師物涌貴提點陳公者請行化畿內師曰君休矣吾巳辦之或者疑焉不數日陸輦川舟坌集於門下衆服其幾沉物先德博而化時大定十四年也明年春辝還鄉里后四年復住趙之太清觀適境內大旱衆禱兩於師曰今藴氣隆蟲願垂慈請命上帝師曰若等宜先竭誠遍走羣祠不應當以吾法行之越三日不雨師乃書飛雷救旱符一道張淨几上復呪法水數石令州將巳下人酌水沃符畢雨即來矣行未竟雷電雨且尺嵗賴以熟迄今趙人能道其事共二年興陵夢師冠履上謁寤思之遂徴至內殿問以攝生之道對曰噓吸精氣以清虛自守此野人之事今朝廷清明陛下當允執中道恭已無為而巳聖躬為之興及還寵錫甚渥草六年秋師忽思棲真巖壑因密謂蕭道宗曰吾門衆萬數試經具戒者完顔志寧王志沖而巳然志沖特純精廉潔可屬後事遂設大醮告禰廟卑之傳代祕籙曰君太一第三祖也及銘所付法具云有德輔德天孰可欺慎之敬之永保教基居無何棄几席謝去或問安所之曰吾將遍禮名山與心君作天遊耳遂去後不知所終師風儀瀟爽德宇沖粹傳學善文辭動輒數百言樂與四方賢士大夫遊談玄論道造極精妙書畫矯矯有魏晉間風格嘗自題畫像云來自無中來去復空中去來去總一般要識其間路其明逹又如此生平好振施飬老恤孤近百人人以鏹伍千月給為率死乃已貧者喪不能舉衣𬒳棺椁為俱具之至於持行法籙捕逐鬼物風聲肅肅除治户庭間殆古之能吏然精一之誠貫逹幽顯降度之功洋溢一世矣師之玄孫某以貞常溫𥙿為五代人天之師服膺先訓追逺盛德心藏不忘越乙卯春具大招之禮葬衣冠於祖塋之側今皇帝登極之三祀光崇玄化貞常師以祖德範圍請諡於朝追贈嗣教重明真人噫道家者流其術固以多矣而太一之法輔行世教有不可勝言者其鴻靈幽祕變化叵測通徹神明之功幾於上下天地把握隂陽者矣然苟非其人道不虗行一傳而至推廣悉備若真一人弘衍博大繼志述事之善者也翰林修撰兼國史編修官王惲狀故金吾衛上將軍景州莭度使賈公行狀曽祖鑑祖璋父政公韓德字克仁姓賈氏景州蓧縣從教鄉劉卿里人其系緒見學官王鼎所撰衍慶碑賈氏前宋時出行管都團練使用威府君之後曽祖鑑志操髙潔恥襲廕不仕家素饒財以周急販乏為事祖瑋性勤儉專事農務故資益雄鄉里父政事親孝處昆弟間無間言宗族以純至稱生二子長曰贇早卒次即公資秀頴在垂齠時舉止如成人禮既冠慷慨有逺志樂施豫不屑屑拘小莭嘗與鄉人處事談辨雄偉無出其右衆屬目異焉曰興賈門者必此子也自是事有疑率質成於公貞祐𥘉燕不能都德陵南幸汴群盜逄䖵起河朔在兾部滋甚澒洶囂混凶熖所灼里陌為蕭條公慨嘆壠首曰大丈夫生世不能除暴剃亂建勳名于時掇取冨貴戴履兩間寧無愧怍群俠少壯其言恃其勇往往依附為用州將材公為且知衆素所推服自白衣署公為故城縣丞專徼巡事於是設方略窮椇株破機牙擒捕招諭不數月寇難蕩平尋國兵入中夏太師國王營屯彌亘原野聲勢火烈震掀河嶽元州將某舉城降無幾宋將李益都全乘隙西略甲戍歲州遂為全所取盡質官屬妻子以東太師聞變赫怒擁盛兵為屠域之舉公白於州將曰反復際明以力不支故至此况天道人事嚮背皎然詎能以智計免哉不早為所楇將噬臍願躬詣軍門請命遂間行至深州帳下太師察公忠誠慰諭殊渥許其請闔城賴以全活大師承制拜公定逺大將軍賜金符提控本州兵馬事丙戍歲大師帶孫郡王南略晉衛明年復東徇魏齊皆從以行其破上黨馬武大名濟南及信安水柵與三齊徑兵閧穆陵歷山下俱獲大功英威騰奕冠諸將列益為太師郡王所知遷鎮國上將軍節度副使兼右副元帥仍改佩金虎符時江陵齊東寧晉與益都界犬牙相入賊李蠻奴寧主薄者引海寇不時僈軼為百姓患公連戰破之東鄙遂安升授金吾衛上將軍景州莭度使歲丙申以蓨縣東光阜城吳橋故城隸焉歲丙申六太子復命以分地所入江陵齊東寧晉八城俾公總治其事公為人恬退每物盛為戒丁未歲年五十有二即致政間居日課家僮輩躬事澤車欵假優遊田野間人不知為故侯宿將也至元十一年甲戍秋七月草八日以疾終千劉卿里私第之正寢享年八十有三公臨政剛明有斷僚友間容辭謙讓急於持吏惠以飬民卒之畏而愛威而不猛循循然有古良吏風𥘉州將以甫離搶攘人心轉側頗任刑立威所犯有事重而情輕者有情連而力嚇者公為折理營救多所昭雪以從輕議又同列馬侯子趙君妻男幼女彈壓宋其氏者𬒳虜胥靡營幕間公傾橐資購而良之其輕財重義類多此生平喪祭為尤重嘗謂宗屬曰兵荒來上數世殯淺土德又早失怙恃其於大葬之禮非竭力盡心罔極之恩何所圗報遂大治塋域表敘昭穆封植林丘而安而措禮莫不備復樹豐碑紀世德以見夫祖宗隂積所致之厚一郡有光焉性喜修潔裘馬鮮整自少若素宦然稍涉書傳善左右騎射矢不虛發時輩無與之比公八秩時往宴從教别墅二㕙起田間飛鞚回射獲焉其精力老不少衰蓋如此夫人髙氏蘇氏魏氏劉氏魏氏以賢配稱夫人梁氏施氏張氏馮氏王氏李氏亦俱有淑行如夫人者三人楊氏趙氏張氏子男一十八人曰荗宣授金虎符昭勇大將軍左翼侍衛親軍都指揮使行淮東左副都元帥府事謨勇忠謹以良將稱善射蓋家法云曰著前宣差景州管民長官曰莘未仕曰芳樺車弩千户曰蔚未仕曰英宣差滄州節度同知性方直有從政才曰仲溫前景州課稅所長官廉能有幹局曰毅前河間路諸軍奧魯總管曰萍前征行千戶曰僖曰蕙未仕曰玉前征行千户曰芝未仕曰蒿前景州勸農提領曰彬曰仲信曰進曰璧俱未仕女一人嫡夫人髙氏所出適侍衛親軍千户張琬男孫四十九人茂之于乃滿歹宣授金牌侍衛親軍千户重孫一十人兄贇子一人曰榮前景州奧魯千户榮之子三人重孫二人嗚呼盛哉十四年丁丑春元帥嗣侯茂暨弟仲溫介參謀趙君禹卿提點李練師子玄來謁豫曰先都帥祔葬墓木巳拱比年國朝方平一江左不肖忝居戎右用是其表見神道者未即樹立以慰下泉霜露之愴不遑寧處今將託立言君子圗其不朽焉敢再拜以事狀為囑遂勉為次第之故蠡州管匠提領史府君行狀府君諱忠字良臣姓史氏蠡州博野縣盂家里人曽大父暨祖世在野俱以伯仲稱父韓成繼業耕稼善因地利自髙祖巳降昆弟宣多至府君凡五世同居藹然以孝義渢一鄉君兒時日庤錢鏄為戲及長資純厚與人交不妄言謹身節用致桑士滋殖然慷慨有顧慮料事多合情得冝里人推其識直凡所疑滯必咨焉而後行貞祐𥘉國兵入中夏蠡𬒳圍太守鐡哥嬰城自固民凛凛崩角莫知所屬欲鳥獸散公約衆合謀曰金駕而南委河朔去州又自顧不暇事勢至比吾輩將安所託正有畏天順時得全性命為計之上不然何為束手俟死衆以君素有畫可仰聽焉遂率孟莊鐡千兩河夏村等老稚百餘人持牛酒詣太師國王行帳投附王矜其情許焉命公前慰諭者良久且給符約遣各歸田里尋州破鄰鄉多𬒳屠掠唯孟莊兩河等里得按堵如故兵後歲飢疫公惻然興感曰家幸嬴餘胡可坐視鄉人轉死溝壑即出蓋藏粟五百餘石計口而惠之賴安活者甚衆其散而復業者往往力殫具乏公為假牛畜耒耜􅡡種有因疾田蕪不克治者公乃侣結義社相救助於是秋獲皆有得家具酒食勞公以謝其德公曰患難相恤人之常道奚謝為苐比年來仰荷天休稍即溫飫不以禮道維持羣居雜處未免侵犯爭閲之事衆對惟君見訓俾終厥惠君雖不經見聞遇子弟必申以孝弟父兄則勉以恩愛聞順而善事者心需之飲食以蓄其良心彼遊陏有安狎于不順者即畏以官府使懲戒於是田里安集不知出喪亂之餘而有讓畔敬饁之漸每冬夏設粥瀋於路以濟行人其周急濟物類如此聲稱傳播時人有義門史氏之目州總匠王公興秀賢其為曰吾嘗聞居家理可移治於官遂薦于行省劉公署工匠提領府君感其見知盡心所事於是配能否均程課革舊弊皆有條次不紊及考工器率堅良精緻且合時度不為巧虛積料餘徼幹局稱乂未嘗竊徒工治巳私以自腴揔匠每稱能以勵其餘某年月日以疾終于家享年八十有五葬孟莊北原先塋之次識者謂公德純行美效官及物者甚廣其儲祥萃慶不在其身而子孫將有勃然興者娶同里某氏柔順勤儉克配公德生二子長曰伯祥次曰伯福幼承訓導俱孝而友或以襲父職為言伯祥曰吾家世服井畒以孝悌相傳逮吾先人輕財重義表率一鄉雖遭罹世故所立挺挺然大先業為有光今于昆苐二人無所肖似繼守田廬負薪之責惟罔克是惕苐知勤敷災修疆畎寒耕熱耨濬源培本使先世之澤渟蓄汪􅐮霑溉後人俟其可以起史氏者乃所職耳聞者歎其志逺而有所見也及子弼長性謙謹寡言笑顔赫然軀幹魁偉孔武有力年十六七時耕牧田間午憩桑蔭下父往饁遙睨有玄虺穴其口父大駭趣呼之寤問焉曰無所覺自是手力愈若神助遂精習挺槊又善左右騎射赳赳然負干城之氣揔匠王公子前僮關使彥弼異而妻焉舉於左丞相耶律公一見竒之得給事省府適考工上新製鐙弩力踰十鈎近臣有言弼材勇善挽此者即召見試有驗命列名扈從仍賜白金御以壯其勇不一二歲譯語國字皆通習之嘗奉旨數軍實于邊􅩌嶽祠於雒精簡而敝去壯麗而費省由是廉幹之稱聞于朝上知其可用至元巳巳命佐帥臣劉整南伐轉戰江漢間若鏖峨眉掀松陽拔樊城下襄陽飛渡大江併圍維揚率內簿先登及論功每在諸將右寶鞍錦服寵賚殊渥始自漢兵揔管授金虎符懷逺大將軍行軍萬户加定逺安逺升昭勇大將軍淮東大都督改揚州逹魯花赤今由鎮國上將軍進中奉大夫參知政事行黃州路宣慰使既拜命乃謀於婦翁奉直曰弼自惟起身壠畒遭際風雲𬒳沐恩遇以汗馬微勞不十五年間致仕將相其於史氏其榮極矣兹蓋祖宗勤苦純儉纍積攸厚一旦發越於藐焉之躬者如是丕顯可不知其所自哉欲報之德有懇求懿筆著信於後者論述隂積表樹丘壠而傳不朽庶幾顯揚之道奉直曰冝矣遂託樞相贊皇趙公及關使王君以事狀求屬因勉為次第之中奉大夫之攴今年六十母夫人某氏若干壽皆享有全福叔之子曰輔管軍千户次曰翊未仕中奉之于曰蠡奴女一人曰燕哥至元戊寅三月晦日謹狀太一五祖演化貞常真人行狀師姓李氏諱居壽宇伯仁道號淳然子衛之汲縣西晉里人生有淑質沉默寡言笑自幼喜遒家之學年十三拜太一四代祖中和仁靖真人為師旦夕給侍左右進退應對容度詳謹中和知其可教甚善待之戊戍嵗受戒為道士命典符籙科式等事籙文部帙靈章寶篆仙階顯職稱號廣博師裝繕嚴整銓次詳明大稱所委壬子歲聖主居潛邸駐驆嶺上以安車召中和真人於衛既至燕見之次薦師才識明敏志行淳和請傳嗣為五代祖仍從誓約昜姓為蕭即蒙允可賜號貞常大師仍授紫衣其年冬中和謝世中和人品道價髙視一世師嗣挈玄綱以簡重堅潔持守成規洞洞屬屬若恐失墜及其張皇道紀酬酢事冝其應如響由是徒衆厭服聽約束惟謹前人之光曽不少佚時衛大旱守官致禱于師即書太一靈符浸巨盎中騰呪未畢雲葉膚合澍雨霑足致德譽日廣上聞於朝巳未春上南巡駐驆淇右重師之請幸所居萬壽宫悵真仙之倐去喜付卑之得人周歷殿廡詢慰者久之師敷對誠欵允協睿意眷顧光寵於焉伊始明年庚申中統建元春正月命師即本宫設黃籙靜醮冥薦江淮戰殁一切非命者迎奏際隂風凄凛若有趍赴慘泣之狀秋九月詔赴闕下上親諭修祈祓金籙醮筵翼日特賜號太一演化貞常真人二年冬上命禜斗於厚載門親詣祝香仍賚錦紋綾帔四年秋遣近侍護師頒香嶽瀆等祠仍賑濟貧乏至元三年以京師劉氏宅賜師為齋潔待問之所六年春皇嗣請師禱祀上真用介繁祉受釐之餘遂賚師金冠錦服玉佩付焉八年螟蝗為災命師即岱宗汾睢設驅屏法供秋乃大熟十年正月就上都大安閣演金籙科儀時春寒賜黑狐裘貂帽各一冬十月奉安真武神位於昭應新宫禮畢中宫衣以異製綾道服大內青宫肇造之𥘉皆詔師按太一符云禳鎮方所十一年特旨於奉先坊創大一廣福萬壽宫中建齋壇繼太保劉秉忠禋六丁神將歲給道衆粟帛有差十五年奉旨祭七元星君於西府鐘室啓告之𥘉期以風動所樹幡標為神君格思之驗既而儲皇親臨炷香冷颼颯至幡影飄揚從官劒佩鏗鏘肅然為起敬明日具陳其事上甚喜越明年以事辭結遁壇命昜七元斗位聖上儲皇以師積年致禱精誠多獲靈應前後賜與如玉尊像寶粧劒安車龍杖金銀器皿等物不可殫紀師爰自傳嗣以來奏諡始祖曰太一一悟傳教真人二代祖曰太一嗣教重明真人三代祖曰太一體道虛寂真人四代祖曰太一中和仁靖真人焚黃昭告典禮華縟存殁有榮焉至元三年以重修祖觀殿宇告成以聞蒙勑辭臣製碑鋪敦教基具紀本末復奏受保舉師張善淵真靖大師教門提點監度師髙昌齡保真崇德大師髙弟李全祐觀妙大師范全定希真大師及欽承璽書護持玄門其弘闡宗教殊為光顯師以至元十七年七月草六日羽化於西堂方丈享年六十治命令觀妙大師李全祐嗣主法席訃聞上嗟悼久之儲皇賵楮幣三十定仍諭中書省給威儀祖送其年十月遣使護喪歸葬衛州汲縣四門村祖塋之次師丰儀秀偉清修有操行謙虛篤實不事表襮混然與物無忤而胸中風鑒殊皓皓也與人交誠欵有藴藉所談率以忠信孝慈為行身之本未嘗露香火餘習生平問學不斯須離如飢渴之於飲食其易傳皇極三式等書皆通究其理晚節德量弘衍慱大不可涯涘冝其為聖皇挹真風屬祕祀留宿宫禁參預庭議師素以憂深思逺理或未暢形於顔色故因方便而霈德澤之厖即詢訪而禆時政之闕橫覆道蔭成敷錫之美者多矣惟其玄默不出叵得而詳論者謂師雖方外士其至誠上感蓋有君臣慶會之契古人稱上士學道輔世主以洽好生之德師其有焉既窆之二年嗣教真人將以師言行請於朝植碑神門揄揚追報以慰華表歸來之想以不肖惲與師義同里閈交且欵知師為頗詳以事狀見託謹按綱首楊等所具行實勉為件右庶幾太史秉筆者得以採擇焉至元十九年十二月草一日中議大夫治書侍御史行御史臺事王惲謹狀秋澗先生大全文集卷第四十七
