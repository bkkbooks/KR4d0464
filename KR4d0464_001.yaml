  text: 秋澗先生大全集卷第一
  hash: sha256:bda9313076f67214cb8235848d7746c5f56e49ebbb7daf8b0f7e67dd073db17f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_001-1a}
body:
  text: 頌中統神武頌并序維三年春王正月逆璮悖負天恩扞我大刑裒姧誅頑嘯兇東土於是命將致討天戈一麾不五月而克青大憝兹蓋皇帝陛下夤奉天心布昭神武睿智足臨有正無戰故也昔肅宗中興唐室而元結獻頌用歌大業垂示無極臣惲忝属太史親覩盛事頌聲不作咎將曷歸敢綴緝所聞謹撰中統神武頌一首凡千有一百二十四字雖辭理未應庶㡬神武仁聖之德鑑鍧炳燿播宣金石振一代之徽烈也万冀㣲誠仰䝉天聽臣惲惶懼昧死拜手稽首而獻頌曰皇帝踐祚粤維三年萬靈清蹕廼狩于燕曰寒而寒曰燠而燠百度脩明朝廷清肅東截海表西亘庸濮悉臣悉貢罔不率服時維逆璮禍心乆纒再世鴟張顓征擅權奄殿全齊厲階泗漣煑鹽涸海剷銅夷山地險物衆蘖芽其間懵恃姧嚚海波可田背脅疽根怒而自鞭時徼邊功外示忠惓警我宋急騎通甘泉帝以徳御聽之誠然再命不庭穢彰溥天浪駭鯨奔擬騰百川按𬒮東来盗我西偏天意有在聚而􅑒旃皇帝神武不震不愆燎我神鼎烹此小鮮命將興師䇿出万全方叔召虎瓜牙利宣爰命宗王相臣是丞顓彼封拜虎符發兵赫赫禁旅犀中熊旌相臣曰璧維周之禎氣蓋一世徐方震驚皇帝曰嘻殱厥渠魁脅從罔懲既誓我師銳莫與争賊謂我怯蠆鋒来乗一戰而退曠懐自矜誑以有待孤城自嬰皇帝曰嘻璮不時下我民是恫武略神機運之淵衷相與謀謨丞相天澤廼拜稽首賊出下籌豨突于笠不死何求繚以巨堙畢克于秋帝曰元老壯哉謀猷其徃視師代予以休馬首既東零雨其濛精彩一變氣吐而虹萬杵一動月暈而墉山㫁外援水防内通髙壘深溝俟其自斃日壓賊營雲頽死氣賊勢既窘魄禠心悸䑕㧞其牙獸崩厥角斧偃螳潜鋒㩁蝟縮七月壬戌環陴内訌賊伺我隙悉甲来攻万死幸脫突我梯衝相史相趙出竒無窮既敗而壁衆猶嘨凶迨其癸酉有星蓬蓬騞若矢石妖聲堕空因之出䧏群兇率同彼狡狂卒不知所圖䘖窶䑕竄自投于湖宛轉不死可知其愚童子執戈縛之以趨比梟逆首磔裂其軀併取同惡牽攣就誅林林部曲面縛俟死皇帝曰噫皆朕赤子若蠢何知一從先㫖觧甲投戈縱㱕田里東際海壖西逾膠濟殺氣一空歡聲四起既定歷城東趣廣固比傳城下降幡内竪凡厥士女無或畏懼取彼逆属取其府庫市肆農耕按堵如故纍纍婦妾婉婉弱齡三木囊頭来献闕庭既令市朝咸即厥刑盡頒所獲大犒將旅稇載驩呼各歸禁伍劳我元臣其安爾所視我民政衮闕則𥙷肆赦東方皇恩斯溥録我陣殁䘏我孤苦舊染惟新各安爾土皇帝曰噫額額歷城撗燎兇干戈所歷復其租歛惠賜榖帛拯其昏墊隂伏陽開乾旋坤奠海岱重清一出聖筭奄奄北風讋而逺竄威憺蠻陬東夷來献盖代稱觴万口交慶再拜稽首皇帝神聖天錫勇智万邦以正億万斯年受天明命皇帝孝友敦序九族有爵有土煌煌車服終歳燕賜克諧克睦帶礪山河與天齊福皇帝睿哲别白忠直天賚厖臣左輔右弼孰敢予侮為天立極皇帝聖慈約法好生奚取八辟三章更輕大獄之起寕失不經如璮之誅万死何容罪止一族餘無所從漢制黨錮唐興羅織濫及無辜慘莫之惕天地大徳曰生曰植致討已來惟天是則吾皇之心堯仁舜徳海宇熈熈春䑓壽域群臣歸羙度越前古唐平淮西漢㓕呉楚以今方之其烈斯鉅規規孝景計誅臣錯岌岌憲宗皇咨于度兵纒四載呉縛于愬惟此齊功五月而成断以睿筭卑之戎衡皇帝執謙弗居弗處宗廟之靈將士之助敢告成功于考于祖祀事載祗牲牢鍾虡樹羽崇牙應田縣鼓粛雝和鳴先祖是聽神靈曰都嗣皇之英持盈之徳守成之能保我丕祚万福是􅈾夀等南山不騫不崩小臣眷眷職司述稱属辝比事献芹之誠親覩盛業拭目太平淵嘿無言咎將孰徵冐昧狂斐觸犯雷霆敢摭輿議用垂頌聲賦蛾眉研賦并序余家所役二硯研磨有年殆與瓦礫不異書生作計朝夕筆研間所用若是欲善其事而不能也宜矣乙卯春偶得是硯於販夫之手質名于譜盖歙石蛾眉之種也噫豈天誘愚裏将為文字之祥邪抑亦有數自王氏而發潜徳之光耶遂筆而賦焉其辝曰嘿齋主人行年廿有九日從事於翰墨將游心于道囿家畜二硯形模老醜研磨歲深埃塵瓦缶嘆材石之莫遇偶見授於野叟發此秘藏殆天所誘歸予之月卯挿其斗從吾囊之羞澁喜溪光之照牗其質圎以古其色緑而黝鬼擲滈璧鏡蝕秦紐太𥘉之面目巳露元氣之肧胎未剖涵玉徳之餘潤鑑金聲於一扣其閱人多矣幾墨翻於醉䄂也肌理細膩豊而不蔀顧溪痕之隱然旋摩挲而無有雪浪翻江映日光走其瑩滑温純之徳誠研中之瓊玖也若夫蒼文上横眉嫌𥘉就濃抺逺山濯如春柳其横雲却月之状又似開乎成都之畫手質名于譜兹歙石蛾眉之右也予想夫龍山之英歙溪之瀏醖醸幾年鍾此竒秀信神物之有歸不圖爲嘿齋座中之友也當其書幌晝明筆耕而耨一嘘泫然雲蒸霧湊試墨花於春融覺松風之瀉竇縱未洒薔薇之春露聽此亦足以醒張㒹之宿酒也相期百年以介爾壽研兮研兮汝名雖異傥浮於實兮終有愧於屋漏故東坡有云澁不拒筆滑不褪墨兹乃研之佳焉又何必鸜其目而鳯其咮也邪茹野菊賦并序丙寅春三月予以司明告病避忌食物無可供嚼嚙者家人軰采菊芽爲𬞞考之圖經味甘平療風熱於頭目極順適也遂茟而賦之其辝曰蹇予投劾而来歸兮守先人之故廬日閉關而却掃兮殆幽潜之不殊視外物其弊屣兮將㳺心於聖書何庖厨之逺戒兮幾釜中之生魚嗟肉食其無相兮喜盤𬞞之有餘潔我晨羞出于不虞擁案未前露香滿𥚑童子啞然而告予曰兹野菊之方苗適采擷于林墟考之圖經食有益於頭顱也若夫春芽翠茁方莖碧腴湯沃苦盡䁀調氣濡甘湧舌本味欺圃𬞞拉晚菘以爲友役春蒲而作奴貯空腹而不厭恐落英之不如彼寒花之可愛寄髙情於一壷縱傲睍乎秋霜踰佳辰而曰踈此方騰藉春陽甲拆而敷収微生於全體供野人之所需吾乃瀝芳馨而三嚥覺眼華之掃除其氣平夷其樂舒徐豈一杯之野馥等悅人之豢芻雖草木之誑口亦因茲而起予世有啖糠覈而瓠肥厭梁肉而黒瘦豈非適於口而心苦濡以膏而體劬吾知甘菲薄以自樂能克說其體膚既而隱几冥坐心明志虚佳境脩然恍與夢俱以神為馬以尻為舁既發軔於菊潭或弭節乎山隅訪淵明於栗里尋天台之隱居後鼓東南之歸枻追散人於江湖覺而賦之猶足以續離騷而吊三閭也未央瓦研賦贈終南李鍊師和甫斗直寅日維酉栩栩蝶化夢入靈囿覺而扣門有來玄叟投我天硯形圜色􅉳鬼擲滈璧鏡蝕秦紐文章欝律蛟蟠虺走以長樂無極而言廼漢殿燼餘之瓦首也當其炎運天開禹卑秦陋未央屹建長樂丕􅌟體紫極之圎方壯神麗於九有俾子孫無復加於後也若夫萬疊雲浮跨凌天宇鱗影參差鼇背掀舉瓊綴簷牙香團桂樹倒景激日馭之光流潤浥金莖之露聳萬國之衣冠䕃千秋之歌舞礪太華而帶河渭謂斯瓦之貞固天落妖彗一掃而去咄尔㣲質歸復其土何千歲而不化偶野人之與遇今歸乎我又係厥數摩挲漢月碧花燦吐似喜余之主也試玄蛟兮海運瀉松風於牎户滑不墨褪澁不筆拒然復其天則御陽周宣王宫名之耳孫較其古廼銅雀之鼻祖彼鸜其眼而羅其紋味則鳯而形則用或奚足取是不若兹瓦之而屋廕生聚帡幪霜雪蔽虧風雨是則用得其所付大任於汝也豈期棐几呈材辭客與伍處雖失宜其功尚溥鍜我銛鋒藉汝涵湑乞英靈於班馬鑑興亡於今古大書特書猶足以旌朱游而削張禹也道士顧笑吾子其為我賦之三峰晴雪賦并序乙亥歲冬十一月余以守吏将事自蒲抵華倉惶待命於塵坌間望三峰晴雪煥爛髙㓗皜不可尚已顧而自憐豈勝慚穢適与左山啇公遇於祠南栢行間歸作是賦以寄其詞曰華於衆嶽峻極莫之京兮三峯絶觀松雪益其清兮倒景旁射銀闕爛峥嶸兮仙掌翻空灝爽下青冥兮豈玉井蓮芳仙遊擁霓旌兮巨靈變現咤崑丘之瓊兮金天移仗敞瑶華之宫兮泠飈吹而不㓕海月照還空兮軒豁呈露何物外之雄兮又如螭蟠之老子與希夷之鉅公朗出天表飲太泉而遊封中兮安得杖仙人之九節登神丘之崇兮問真源於白帝追二公之蹤兮胡一行而作吏搶塵土之容兮對清都而不克徃世故驅以東兮掉塵鞅而北騖刺梗滿吾胷兮望岳神而三嘆歸夢挂岩松兮縱靈移之罔誚獨不愧於躬兮歸而賦之吾言固誇猶足以為執熱者之清風也熈春阮賦并序玄暉上人得隆德故閤餘材斵而為阮因以熈春目之亦文殊之義也至元戊寅春同寗尹端甫劉御史叔謙趙太愽彦伯坐心逺軒師為鼓緑水悲風二曲清越悲壯坐客感歎興亡有愴然于懐者師請予賦之其辭曰天新兩風日妍心與閑會境趣静便拉曠懐之逸士過雪庵之老禪歛𬒮危坐添鑪炷箋於是出桂阮調素絃控朏月而當抱撫筠柱之横駢師曰兹熈春之断餘偶絲之而清圓者也遂鼓一再行清越悲壯如泉咽冰㡳風行樾間翛翛兮欲断而復作淙淙兮似漱而還湲鑑爾擿銅丸之韻凄兮聆髙樹之蟬又如游士騁說劒歌去燕何辝氣之從横激太清而沉羽渊客乃呀然而驚慘然而悲信乎物之感人有不期然而然者想老徽之般樂盪侈魄以無前厭華陽之湫隘敞樓居而致仙海鼇首抃金鵬翼鶱欎鼎蓮之香霧鎻月殿之嬋姢䕃千秋之歌舞壽良岳而不騫俄龍移而鼎去継金亡而閣遷殆露槃之聲折悵秋風而涕澘興廢一瞬兩朝百年委繁華於野草鎻莽苑之荒煙咄此木之何幸遇幽人之逹觀納弥盧於芥子寓餘哀於一彈猶足以舞魚龍於海曲洗亡國之愁顔也嗚呼噫嘻向之使人凛而悲者物詎能動於人哉人之哀樂妄為物之所牽不知太虚寥寥既寂而玄唯此理之嘿識何繁華廢興之足嘆師曰子其為我賦之吾欲秋月當戸松風滿軒冩仲容之别操合清啇而洞宣使雲隂蔽空玄鶴下蹮走啇延於濮上掩新聲於師㳙也吊廉将軍墓賦并序三代而下功利之說興人臣擅恃功䏻鮮以禮譲為國者觀頗挾勲内忿忸居人下加諸彼不淺相如引車避嫌有犯無校蓋出天禀粹然處之為非艱至頗聞急先一言遽能握髮數罪受責門庭在將臣為實難若将軍者可謂不逺而復得無祗悔之義哉遂摛文以吊其辝曰渉滹沱而北騖兮過常山之故城何髙丘之突兀兮欎劒氣之峥嶸野人指而告予曰此廉将軍之封陵也人與骨而塵朽兮義於粲乎曰星遂陳辝而吊古兮命僕夫以停征嗚呼休哉昔伯禹之所以聖兮始不伐而不矜秦誓之所以經兮善悔過而胥盟觀戰國之多士兮依俙猶三代之英惟功利之時尚兮天理有時而蔽明能不逺而復𥘉兮其惟趙之廉郷方國都之中立兮資内附而兵精頗分閫而秉鉞兮騰茂實而蜚英聲梁從随而楚讋兮燕弭伏而齊并時有以卜将軍之意氣兮殆雷動而滿盈遽相臣之出右兮何發言之盈庭幾肉餧而食甘兮奮兩虎之必争及聆急難之一言兮輙弭耳而服膺復頓顙而悔過兮折節負贖罪之荆在引車而不必多兮将臣及此所以為古今之難能也逮漢起而帝稱兮禮飲至而䇿勲何諸将之失度兮至撃柱而紛紜安得将軍從容為一言兮觧販繒屠狗之棼彼臣濬之冐耋兮加充渾之貪䝉咤呉平於帝前兮互滔天而為已功安得将軍滌易其𥚹薄兮俾無成而有終嗟鄂國之列公兮挾勲劳而凌帝宗縱私忿而無忌兮一堕夫臣子之恭安得将軍北面而同列兮以中和之氣銷悍戾於未然之胷也雖哀之而不能鑒兮文空言其奚庸繄慨慕其耿光兮日三省乎㣲躬蕩吾伯夷之隘兮擴乎穆公之容希前賢而同升兮附驥尾而竭忠雖断断而無它兮庶幾廪廪徳譲君子之風衝山煙而暮去撫鳴劒兮増雄登常山故城賦我登常山心慨歎兮断城連絡蛇陳蜿兮憶當全盛兩漢間兮萬井歌吹魚龍渊兮推埋劒撃習俗然兮光沉響絶夫何言兮有懐古人秉心延兮交如餘耳始足賢兮烈如顔袁抗偽燕兮垂光竹帛星日懸兮壮哉子龍屋而祀兮膽氣滿軀勇夫志兮賊瞞臣漢得所事兮天理在人一符契兮千載仰止𥘉無異兮諒彼有立忠與義兮鶴媒賦并序中統二年予在上都掌記中堂客有負青障挾長􅒎二鶴馴于後以廪継来請問其役曰以鶴取鹿者也嗚呼鶴善類也喙雖長不鉤銛以噬爪雖巨無跅指以攫而於塵伏容有忮害其如人之不仁何至元壬午冬與禮部王兄子冕因話及此慨然有感曰今人以智計相傾内險外易者何殊於鶴之取鹿也作鶴媒賦其辝曰萬物者元氣之盗氣之靈者莫人若也既役物而君之其忍以盗作智而爲得計乎如絓麂草間圗鷓潔地胔𥿄求蜂葉城網雉盗物矜雄此何足異以智獵愚理固宜然用愚戕愚斯則不仁之亟也鶴本善類與物無忮飛翔寥廓仙游之驥教之羽舞已違元性詐以摽鹿遂戕彼命是則鶴之善人則用而險之返有過於機穽也鶴了不知鹿終弗悟歲供庖厨皆鶴之故何殊人心内險外易以詐假仁顕比隂忌将取彼有則必姑與彼昏不知日狎而伍一落其機投足無所誠何異以鶴而媒取也吾然後知物之顕暴者既得預而防之愚而深中者尤不可玩而侮也示我同志筆而爲賦玄猿賦并序效庾開府體至元十七年二月已卯清明日陪經明祭丞相忠武公墓適嗣侯平章格自静江籠致是猿以献西溪王通議命余賦之以紀竒觀其辝曰寳符之野滹池奫鎮人𥘉樂歲華新峴山正有堕涙感走馬逺出西州門映堂堦之碧草陪開府之嚴禋覩方物之来享宛有勝於攸聞繄尔猿之䖝質何其性之能馴素面掌許玄裳若纁尻不識尾臂長於身一動一静既恒且仁澗飲岩棲有彛有倫木方華而不折菓視熟而呼分思全生於物表時隱見於冬春三峽秋月九嶷暮雲雪嘨煙啼子從母奔動射者傷弓之慘驚山人應騁之輪哀楓林之逐客助永夜之霑巾其或冷挂虚壁幽尋窈冥避羣猱之喧躁悟善惡之難并去王孫而夐絶誠可愛而彼可憎也故或者謂衰周之士夫從昭王而南征痛膠舡之不返化若類而成群恐此事之􅯸㬻伊誰聞諸水濵淡夕陽於平野送歸鞍之逡廵偶吐辝而為賦念此物之貞純或體玄而尚寂要擇善而相親以升木而取喻庶有感於斯文蟠木山賦丁亥之冬夜氣清淑夢遊石林萬玉崷崪明日與客歩入李叟叟字希賢之塾燎爐却寒有蟠者木輪囷離竒大属吾目負之與歸而為秋澗坐中之物其爲状也左抱右擁或疊或窪蹄股交峙口鼻互呀於是扶洞穴振泥沙分嶺嶂翦􅒎枒拗者壑突者了去朽剔蠧磨光出華丹丘赤城凌空散霞不知沇洑於地中者㡬年一旦聽吾喙之横誇若乃峰頂改色湧雲倒懸岩崦層出峽門洞穿刻畫嫫母與施并妍其磊落盤錯自一成而有足觀也咄此怪供強名曰山然為幸也盖有大於是焉不腐而為朽壤不化而為飛煙收槁梧於㸑下遇中郎而獲全䕃居華屋之底植立几席之前聳太華三峰之秀有象江六石之堅終日與伍似非偶然徙倚蒼精之蓋摩挲白鹿之巔何澹僻之苦樂掇衆人之所捐吾愛夫始賤而終貴先汚而後蠲出神竒於腐杇蛻凡骨而得仙者也噫以静而致壽者山之性随帝而出震者木之權惟動静之交見渾體用於一源吾固衰謝拙於變遷以静為樂以安為便藏吾所别之噐浩吾固有之天守介節而不易庶兹蟠之可雋安時處順出艮震兩者之間不然造物者憐其不材辝翦伐而終天年其将亦惟周旋孰得惡而舎旃客曰汝言雖夸以山木而較之似不
