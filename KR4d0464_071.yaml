body:
  text: 題跋跋蔡中郎隸書後科斗書當秦有天下未盡廢而程邈易篆作隸特用便牘削耳逮中郎蔡雍去取丞相斯大小篆為八分實秦隸書也近觀公建寧三年所書五官功曹掾夏承墓表真竒筆也如夏金鑄鼎形模􅏜譎雖蛇神牛鬼厖雜百出而衣冠禮樂巳胚胎乎其中所謂氣凌百代筆陳堂堂者平故書家評公書骨氣洞逹爽爽為有神冝矣昔張長史作書多先觀古鐘鼎科斗文字遂楷法妙天下不然則無漢晉巳來髙古氣骨不肖往年道出襄國讀宋文貞神道碑見其筆畫一一涵篆隸古意乃知其言為有徴後之學者苟志於古舍兩漢孰宗匠哉至元辛未中秋前二日同相人馬才卿觀於省掾吳􅟵慶之寓舍衛人王某斂祍書跋中興頌歐陽公稱浯溪頌歲久剝裂字多訛缺獨李西臺家藏最為完好豫得而見之宦學四方來藏魯公書甚多兹獨闕然及調官平陽會郜君和之出故家墨刻八軸蓋浯溪臨本也命兒子孺臨摹雖精氣轉索庶幾典刑具爾嘗聞公平生書五百餘石其風骨氣韻率洞洞有神如忠臣正色立朝群姦魄禠又如元氣賦物流形都異因其人而為變耳始秦越人探丸起死不主故常在邯鄲則為帶下過洛陽則稱老人西入秦又以嬰兒醫名也故評兹帖者謂閎偉發揚狀巨唐中興􅈴德之盛豈虛言哉間間公偶以銀鉤鐵晝目之恐未盡善也至元十二年乙亥歲夏四月六日卧病中書于謝帥第之比軒跋郎官石柱記後唐尚書左司員外郎陳九言文古人稱長史得草聖不傳之妙豈知真書在唐為一代精絶所謂能行而後善走者也魯公書學氣侔造化真楷得法多自公始郎官帖精絶為至舊刻在京兆今亡或云淪瘞廳事址下近從曹生季衡得墨本全文蓋丞相壽國髙公故家物也老眼增明伏玩不置者纍旬真希代寶也十有三年春正月人日題於西山之讀易龕跋乎臨懷素自敘帖丗傳懷素自敘帖有數本劉御史文季云昔吾從祖河平君所藏本最佳後有蘇才翁跋云前𥿄縻潰親為裝楷且為輔書不自愧其粳粃也有杜祁公題云狂僧草聖繼張顛卷後兼題大曆年堪與儒門為至寶武功家丗久相傳後又有山谷楷書釋文蔡無可家故物也北渡後觀金城韓侯及祕府所收俱無蘇杜二公題跋似亦非長沙真筆至元辛未秋九月晦余謁左轄姚公出示太保劉公家藏帖前三十三字亦云子美輔亡按玩之余令人仿像意韻盤礴於胸中者纍月冬十月甲午是日極暄妍可愛乘筆墨調利喜為臨此拙惡非所慮庶幾見其典刑云耳監察御史汲郡王某伸謀甫題識題懷素草書千文後豫觀藏真大曆二年海西寺所書千文極縱橫捭闔之狀其欲斷還連似斜復整筆增妍而不繁其減者意足而悉備如風檣陳馬驟不可當倒冠落珮狂莫得制至於氣凌過庭勢迫張顚椎偉豪邁超於法度之外者一一視之皆篆隸之古文耳兹本雖出臨模精氣固衰骨脈具在所謂雖無老成人猶有典刑十一年正月五日風日清麗手柔筆利乘興學書覺胸中煩滯拂然從筆端出矣跋張嘉貞書近考瘞鶴銘乃知為右軍龍爪書也豫所藏唐中令張公嘉貞北嶽廟碑其意韻骨氣敦厖古怪如衝戈植劒特龍瓜遺法為正書之一變耳張公當開元𥘉拜大將提重兵卧護北門其氣固巳雄一世矣及繼璟而相以強敏風操聞然史臣稱公性疏簡與人交不疑內曠如也古人以書學為心畫故其筆不得不雄放竒偉象乎為人然未免夫捧心效顰也如優孟抵掌談話與叔敖俱化一一較之有不然者蓋其嚴辨有餘而髙風絶塵為少衰矣戊辰中元日書跋麻姑壇記後平陽盧氏家藏歐陽永叔云仙壇記有大小二本此大書者也其興寄縹眇檂纎妍麗無不可人正如覩麻姑手爪令人皆癢時不待爬搔已渙然冰釋矣魯公書大抵與元氣渾淪千態萬狀不可端倪因其人而為變耳第記中皆戃恍不經之事公特為書之豈王中令謝太傳文彩勳名凌誇百代未害登東山而有髙丗雲霞之志也題魯公書臧氏碑後魯公書三原臧氏二碑所謂糾宗者作擘窠大字體端整而頗瀟散如羽林壘壁橫天作陳勢相戞摩與衆星爭光而色正芒寒之氣為有間耳其懷恪神道銛鋒徑畫望之凛然挺植戈戟一一較之不無利鈍惜乎出秀岩臨摹使千金駿足困伏皂櫪間其超逸絶塵之想索寞無光惜哉乃知太師忠義之氣發於筆端者諒非積學而後能也至元乙亥秋七月朔得此帖於參政李公跋竹溪所題東坡墨戲後竹溪書所見多矣未有若此帖之真楷蕭散者大似虞中舍諌獵奏狀間以側筆學坡之媚耳乃知公當大定明昌間不只以篆隸獨步於玉堂金馬矣輔之韞櫝愛玩亦醉翁之意也可謂真知賞音者哉跋孫過庭書太宗以英偉之氣凌跨百代萬機之暇遊心翰墨故二王法書盡入祕府摹倣臨榻然後以牙籖玉軸遍賜諸王何好尚如此其篤臣下得不從風而靡過庭適當其時今觀此書規模步驟一宗二王得飛鳥出林驚蛇入草之勢然點畫散落往往斷而弗連蓋體具二王而章草為羽翼也東坡謂陶詩𥘉若緩散不收反復觀之乃得竒趣余於吳郡亦然但近代名公品題不到豈具眼者未暇及之邪豫特表而出之至元辛未冬十一月草四曰與兒子孺重觀於京師咸寧里之寓舍時雪霽氣清率爾而作汲郡王某謹題跋荆公墨迹豫嘗觀壽國髙公所藏心畫水鏡知此為臨川所書無疑雖風骨遒徑而筆勢散落無繩削可據殆似公當軸時變新法調夸毗子青苗助役無所紀極噫一念之差至於筆墨間尚能髣佛其為人如此後之學者處心擇術當如何哉至元壬申重陽前四日書於平陽官舍跋黃華墨迹矛觀公書多矣曰黃華山主者蓋公中年筆也其格調步趍要本二主氣韻蕭散得元章之勝徑厲𥘉不逮之然如王謝子弟以生長見聞猶足以超人群也殷溪云題黃華與李彥明太守一十三帖彥明係公同年友也此數帖蓋公官翰林時書也至有飢寒之厄近在旦夕又云收拾扈從秋山貧家至甚不易令人披讀可勝嘆惋當明昌嚮文之丗公以文彩風流照映一時其窘迫乃爾豈官散祿薄未為道陵所知不然貧乃士之常事造物者庸玉汝於成邪至於文翰之妙如荆金和璞自有定價不待稱而後重也跋任龍巖烏夜啼帖南麓書在京師為最多其擘窠大書往往體莊而神滯獨此帖豪放飛動超乎常度而木庵師謂醉後興逸妙能天成豈長沙率爾而顛字字圓轉之意邪然古人得意處非一如去乖就合意居筆先乘其調利例多髙風絶塵不只籍步兵作氣而能奪三軍之帥也跋任南麓所臨潛珍閣銘為大陽津張提舉彥亨賦總一百八字提刑王子勉目曰數珠帖南麓書在金大定間號稱獨步然擘窠大書往往體莊而神滯今觀此帖筆勢超逸氣韻兼勝豈非抵掌談笑善學叔敖者邪宣聖小影後跋語金正隆六年大學生馬雲卿筆襲封衍聖公孔元措題識宣聖肖像繪者非一據聖儀四十九表擬之猶潢潦之於河漢培塿之於泰山也孔氏云家廟所藏衣燕居服顔子從行小影最為真像此本蓋再一傳也嗚呼尊其道踐其迹是謂之恭敬不然天容日表雖參於前而倚諸衡是不幾於黷乎至元乙亥夏四月命士人王友仁臨寫小子惲百拜敬書跋周處府君斬蛟圖後役萬物而君之者莫靈於人而處尤以氣勝者也彼司馬肜之虺鄙未若神蛟之變怪也老於莬之殘猛不減氐萬年之嘨凶也處一旦視之猶尺蠖與孤豚耳乃知擁殳之際其氣固巳蓋西戎矣然有憾無援受制於人卒為二豎所害噫千載而下令人讀臨戎之篇􅏮􅏮然猶有生氣其睨梁王不糞土若也雲史筆之諒有激而云跋貫休北立像釋貫休北丘像豫二見之此幅與東平王氏所藏衣紋精麁不同恐學道子雨部圖鬼物筆法也跋陶縝生菜圗𬞞果猶犬馬然以其恆見而難為工故生意彩色有郊圃水濵之異縝之筆不見收于御譜而為金陵所題詠所謂一柸密雲龍足以知名於當代也跋范中立茂林秋晚圖中立𥘉年本學營丘極平逺烔秀之狀至於山骨鬱茂林麓幽邃咫尺杳靄逺隔千里蓊然若太隂雷雨不可端倪茲蓋居終南晚年之筆也故當時有棄墨如泥之目是知遊藝雖宗匠前修唯其胸中自有一天乃能造微入妙題寄寄老人陳氏詩卷昔帝舜陶於河濵器不苦窳而陶之為器最近古而適用廣長安寄寄翁得適用近古之法削為鼎研諸器堅潤精緻粹然含金玉之質誠可方駕保張逺紹澤之吕道人矣題王生臨道子橫吹等圖後書與畫同一開紐唐賢善臨書宋人工點本要之極形似而出神爽為佳蒲江王生以讀書餘暇遊藝丹青於臨放為尢能蓋致思詳雅不為法度窘束筆與意會探天機所到近為豫點道子馬融橫吹營丘寒江晚捕為可見昔龍眠作李北平射邊騎圖觀矢之所直乃應弦斃也若向作著矢狀則風斯在下矣知此則能造微入妙文甫其沉潛可也丙子清明日書于行館之敬止堂跋馬氏家譜圗後夫源深則流長本盛則末茂至於家丗蕃衍碩大亦由忠厚之培埴德澤之淵浸者耳燕箸姓馬氏自遼歷金代有顯人故居河朔者多大墳是歸昔狄武襄以族係不明不敢附梁公之後時人韙之今絳尹馬君出示兹譜曰此某之髙曽世皇顯也降而下之曰伯曰從曰昆曰仲聮綿次序蔚為一宗蓋亦有自來矣於戲盛哉遊澤州青蓮寺題示至元甲戌夏四月戊午豫以分閲滭潞州兵且需後命乘暇同州尹皇甫琰來遊兹山相與登福嚴佛閣置酒小酌歘林風振響山雨驟至煩襟塵思灑然醒少焉返照入壑其西南諸峯雲起曳縷及頂而散縈紆披拂殆六銖曹衣空𪷟法身既暮群動俱闃溪流有聲潨澮丹壑如萬馬而兵崩赴敵埸靜夜逺聞耿耿忘寐顧謂皇甫君曰此豈非山靈化現以清雄之狀娛遊人之耳目邪凡所得唱和詩若于首因留題禪院壁間以為它年林下故事從遊者沁水尹太原李汝翼屬吏丘山甫承直郎平陽路總管府判官汲郡王惲題子翁孺侍行絳州後園題名絳以兩州六縣三十萬户之盛守治一園甲河東而名天下者冝矣至元壬申春豫自霜臺來官平陽適陽威人有獄疑而未能決者四年遂𬒳命來讞授館絳園留十有七日既集事因披讀唐巳來園池圗記按觀遺迹莽為汚宫獨有者樹欹臺荒池漲水想像當時亭榭竹木之勝環合覆壓倒影明滅猶在瑶翻碧瀲中耳感今懷古因以見物理之盛衰知哀樂之不恆也同來者屬掾李諶鄭扆子公孺侍行是嵗夏六月𥘉伏后二日汲郡王惲題跋秦得真墨軸後墨之名家者唐巳來不數人其難工也若是如坡公尚煤松自劑放潘谷􅃮法至竈發吉焚曽無倦色冝乎秦君嗜之而不厭也蓋將紹潘張之絶藝發潛德之幽光耶豫近以沉煙寶劑就龍尾石試之其黑而能光清而不沍乃知精妙入神方駕前輩為諸公所稱道冝矣祭霍山祠題名至元九年冬朝廷以郡邑鎮山大浸載諸典秩者所司三載一祀霍嶽在河東實為靈鎮故事每嵗以仲夏土極之曰用信報禮昭虔度也明年癸酉夏六月北二日惲行縣北走霍邑前次洪洞雨不克邁越翼日抵趙城適嚴祀省牲之夕乃率霍州判官連漢臣監縣事塔的尹裴國用主縣簿劉偉齋宿祠下將事之夕霧雨交作既祀之朝隂霾四開三獻禮成冷風肅然神峯鷲嶺軒豁呈露雖韓潮陽之禮衡嶽孔廣州之祀南海不足以喻其快也陪祀者府兵曹解禎縣佐史髙政稅監張承慶邑人薛畐齡嶽廟道士李志真興唐寺僧普光執事者吏王庭玉等一十五人遂相與饜飫神貺而退承直郎平陽路總管府判官汲郡王惲題記從行者閭山張思誠子翁儒跋唐忠祚柘條白頭翁圖忠柞前宋人宣和畫譜有傳前人稱忠祚畫不唯極其形似如花美而艷竹野而天能狀物之性為好耳余尤愛其科條徑挺放筆而成得妙意於法度之外殆書家所謂錐畫沙也乃知畫與翰墨同一關紐豈虛言哉跋楊息軒江灣漁樂圖豫𥘉不解畫工拙非所知但開卷瀟灑見漁家風味令人渺然有江湖塵外之思不知何時得帶笭箵以駕船獨聱牙而揮車去作西溪漫叟為畫家所傳寫似亦不虛負此生矣跋甫田圗後近與李野齋讀岷隱先生詩説沖沖然殊有所得及觀是圗其經國備物之制傷今懷古之思令人想見三代忠厚氣象如在乎其間親承其事至於禽魚草木車服豆籩之盛一一視之皆具古意又有可觀可興者撫卷三嘆不覺慨然孰謂丹青形容起豫至於斯邪至元戊寅入夏五日題跋藏春劉公東亭等帖此太保劉公書也觀其筆法若不作意故飄逸如此絶似長沙素苔磯靜釣等帖識者當以豫言為不妄黃氏裝潢者能爰之以為珍藏豈性與藝習而相近然邪自題所書草字後今日午睡起偶作草字數行因悟筆勢貴其神速要如李訴夜半乘雪出其不意乃能入懸瓠城縛取元濟爾又題草書後草書筆勢至傾欹斷續當如歌三百篇會意時手舞足蹈不知其為顛蝢也題丙博陽問牛圗後蕭曹稱漢賢相然未免有牛飲池汚之論豈狃於休息重夫更化者乎及博陽秉鈞闊略細務每以燮和為心神爵五鳯間蔚然有聲為中興名臣以二公較之佐命外吉寅亮之功有足多者胡氏謂體元者人君之事調元者宰相之職信哉彼闔里門而消沴因淖車而𬒳謗者坐享堂封無所事事曽不若丞相嘔茵吏耳豫適纂述調元事鑑友人敬之之子公讓請題其後故書題贋本蘇才翁帖後蘇滄浪書多出懷素山谷草聖本學才翁如戎州所書漫與九詩何啻青出於藍真超凡入聖筆也若此者何為者哉所謂真贋不較可知至於樗軒所題真迹蓋自别卷移之於此耳至元戊寅夏六月十六日午睡覺後題王郎中國範所藏唐翰林供奉畫玄宗幸蜀圖丗知天寶之禍階於九齡罷相政歸楊李不知枉害忠良一言玄宗巳為聲色蠱惑其明理亂顚倒莫知所從逮夫九縣飈馳越在草莾方思曲江忠諌遣使祭墓嗟何及矣今觀是圖自馳出大內宫衛依然供頓咸陽父老進説次馬嵬而六師不前痛九廟而太子北駕至犒遣扶風蹭蹬蜀道倣徨躑躅惄焉如搗之懷去五百餘載按圖思事如在目前令人動𬒳髮伊上之感可謂書中有史其垂戒深矣跋黃華題郭壽卿雙溪圖雙溪余家山物也今觀公此作所謂詩中有畫畫未必能得真矣題間間公書祈宰傳後此祁忠義贊也蓋公在河北時所書以老筆所至自成一家觀之似未免效顰耳然堂堂之氣巳破碎陳敵矣題坡軒先生詩卷後豫嘗于鹿庵宴席見老人數輩衣冠楚楚容止足觀當時顯宦有不復及者詢之皆前朝榷釀官也而况坡軒者乎先生在大定間調監相酒其風流文采照映一世時賢與之不在明昌詞人之下所存片言隻字猶當享之千金自非篤好有睨而不顧者夢卿出將家喜詩學固能寶而藏之異時釃酒臨江助吾橫槊之氣者不為無得於斯文也題李懷逺事系後李鎬字之京涿之定興人父金大定間進士第終蘭州刺史先生姿沖淡樂山水𥘉蘭州府君官鳯翔府近山多勝概公日登覽怡説至樂而忘歸自是畫品日進北渡后留寓淇上僕猶及識之番番然一良士也嘗作樊樓風雨春雲出谷二圖大為東瀛子蕭公所賞識曰士夫間不多見也以門勞官至懷逺大將軍集慶軍節度副使夀六十五卒于衛子師孟字希賢今年七十有五為人質直好義無它腸精力強明飲啖不少衰時時尚能浮大白酣適簮花曵杖遊行閭里豫每遇諸塗更忙與從容抵掌談平日心事𥘉不以惸獨而屑懷也然未免作句讀師自給其日料焉復為一慨然耳戊子嵗端月上元日秋澗老人書且得載郡志寓居之列云跋桑維翰手簡國僑在五代間𥘉無書名今觀是帖其䇿勳於鐵研間者恐不獨專美於凝式也具眼者當以豫言為不妄秋澗老人題跋淡遊王先生詩後黃華先生以海嶽精英之氣發而為文章翰墨當明昌間照映一時惟其早丗識者至今惜之余向客京師好事家屏圍幀軸無非淡遊詩翰乃知老成雖逺典刑盡見于是此幅公之老筆尤瀟灑可愛豈神完守固氣自清明雖耄而不衰者邪戊子冬陽生后一日秋澗惲謹題題雲麾帖後李北海書融液屈折紆餘妍溢一法禊飲序但放筆差增其豪豐體使益其媚如盧絢下朝風度間雅縈轡回䇿儘有藴藉三郎顧之不覺歎美東坡云豫書𥘉學李江夏后來自成一家及以雲麾帖一一較之坡第按之稍扁而青出於藍耳蘭亭在古今為真行之祖自太宗崈尚一代學者爭師宗之然如徐季海輩尚未免誥體之俗况餘人乎公于斯時獨能髙視逺步造微入妙臨池䇿勛固當為右軍忠臣矣有具眼者出乃知余言為不妄戊子冬孟秋澗老人王惲謹題跋米南宫書曽夫人墓志後顔魯公稱殷成巳雅善填書嚮見唐人作禊飲序每行特留二三白者使見其巳者之功夫耳𥘉觀是帖即疑其神爽索然乏飛動縹眇之勢再視之乃知為成巳法也緣襄陽出竒無窮雖慿軾縱觀不無看朱成碧耽嗜者心慕手追豈不踐迹終不入于室邪夢卿來託審定所見如此於戲夢卿其寶之安知飛電流雲之駿不踵門而至者乎戊子歲秋八月草七日秋澗老人題跋香林先生老叨賦後真楷有常規而顛草無定態魯公傳長史之法東坡得魯公之妙至于率爾而顚餘未見能旭也今觀此帖馳騁長沙氣劘禱佛之壘耳嗚呼百年來人物淵源之盛槩可見矣先生姓田字信之前進士蒙城人學顔而至者也晚進王惲謹題跋唐韋臯畫像豫嘗觀臯王畫像魁偉竒傑顔赫奕視猛而髯戟如老羆抗首有百獸不敢傍之氣不如是何以破吐蕃四十八萬之衆擒殺節度都督籠官千五百名乎至外臣自預政抗章勸進軍旅之目以定秦鏤號其豪侈橫恣在所不論及殁有司欲追繩其咎賴門士陸暢者得解至今盛名有光于蜀嗚呼竹頭木屑其可忽也哉秋澗老人偶題題三百家詩選後潛溪稱唐人尤用意小詩其命意與所敘述𥘉不減長篇而促為四句意工理盡髙簡頓挫所以難耳故必有可書之事如王摩詰云西出陽關無故人故行者為可悲而勸酒者不得不飲陽關之詞不可不作余亦曰自簡古而發穠纎由穠纎而出議論此小詩所以最難工者也且唐詩名世者千有餘家此特三百而巳又鄱陽𥘉選時意不到此間有三合者亦足以見侏儒一節之驗也且書學成于晉歌詩極于唐而論解之學盛于宋雖然非數百年涵飬積習之久不克成就如是迹其所以然蓋皆自上之所好中來何則嘗觀𥘉學記載太宗文皇帝御製無題無詩及其文子文孫例能賦詠又唐之士人不能是者不復淸流比數習俗安得不從風而靡哉二生經史外行若有餘此亦不可不知故令一讀使見前賢雖小道其用意有如此者因書以為示巳丑重午日秋澗老人題秋澗先生大全文集卷第七十一
