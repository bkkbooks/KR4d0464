body:
  text: 七言絶句題武元直畫巢雲曙雪圖千丈雲巢曙雪寒清談誰似二公間京師三到凡三見夢繞煙林紫翠間蒼雪亭為劉參政賦將軍城市有山林亭下雙松鎖翠隂一夜雪花來點綴蒼蒼特表歲寒心蒼雪詩成玉局翁左山題扁取清雄翛然坐對橫枝處不到東華踏軟紅過賈左輔墳林雲陳橫陳賈氏林蒼煙埋沒石麟深堂堂地下開天業只聽黃鸝送好音桃花鸂􅥩圖桃花鸂鶒滿春江睡暖晴沙夢亦香何處秋風南去鴈斷雲寒影不成行答楊元甫問徑於屈鐡無強梗媚比嬌姝峻潔貞元甫見詢曾妄答筆端流潤自圎生答劉少卿顔書之問仙壇郭廟八關文襄國濠州半籕分五帖論來皆具體就中徑潤是殷君留别簽事張鵬飛鵬飛簽事以三詩餞行甚有情致但愧襄筠林暮雨共山山下送征騑卓水歸時趂醉題十萬壯夫飄灑處一燈長記宿筠溪入定州北門偶得千雉嚴城鼓角寒當年韓冨倚為安後人苦笑書懦白羽風雲屬將壇雲林曉汲家住青林杳靄間瓦瓶乘月汲泠淵山中道士全椒客煮盡溪頭白石圎山中雜詩路回峰轉認山形周折東來似曲肱偶倚斷崖南北看兩鯨挾輔一龍騰長風吹雨入山門洗淨埃霾面目真領取封靈相敬意儘堆空翠待詩人騎乘藍輿步揔冝雨睛龍首有餘姿興來題破蒼苔石記我青山獨到時徐童絶觀曉煙蒼盡得東峰草木香鞍口迤西山更好惜教無力到禪房山前三院説中溪蕙帳空來夜鶴悲一片短碑堪晤語宣尼堂下久搘順又題鹿菴與王子襄先生手書後一代髙人王鹿菴幽潛來住百門龕許瓢藥竈當時友政有先生德不慙劉齊王讀書堂在阜城北墉下當年齊相讀書堂此日金華表佛幢碧色尚餘書帶草綺疏猶是聚螢窗平原縣有懷顔太師忠莭羯奴獵火九州空平地孤城與抗雄十七郡兵同日集奮從吾守倡孤忠紀右脅志文昔相工謂王欽若貌異當貴或云鼻斜何如曰他日作相自正後果然子右脅有六紅志一黑子狀成斗文其黑子終非同色又逺而不應曲詰至元草年二月草一日因浴出見一紅志忽生其下遂足成杓狀吁亦異哉因書此以紀其生發月日云脅間素有七星文黑志權杓逺且昏匆出一星為輔正隱然髙起更紅溫讀老泉先生審勢審敵二篇清時無故厲兵刑審勢雖深衆目驚轉首翠華牽率去老泉幾䇿見來明二虜先須一掃清萬方然後論升平周文未免昆夷患却訝先生以筆爭赴任濟南前次黃岡作征車轆轆二旬間泥雨長途備阻艱行近黃岡都忘却一峰金翠得華山今年東赴濟南行帶雨拖泥二十程只為此身飢凍迫幾回辛苦歎勞生過濟河縣北晏嬰城一製狐裘四十年當時功烈管差肩細思欵對崔門語又見臨機勝趙宣三士輕生死二桃善謀誰似晏卿豪朝來采邑城東路欲訪林丘挂佩刀濟河道中今稱為齊河蓋偶忘點水耳地名耿濟後漢耿弇破張布於此故名甲子東逰入泰安封壇日觀總躋攀誰知二十年來後却向齊西看泰山匡山匡山説有舊茅廬李白當年此讀書嵐氣宛如吟醉重野雲時學簡編舒公堂鳬史前頭擁簿書午衙急散日停晡南山翠倚公堂上終日相看有若無九日登歷下亭當年歷下冨材賢李杜文章兩謫仙此日風流俱不見秋煙空濕採菱船周文矩雷劒化龍圖圄底幽光見斗間張華腰領不勝寒躍淵又作雙龍去在晉當為變怪看飛躍陶梭化葛笻潛飛無迹與神通披圗勘延平事又在雷公劔室中右軍書扇圗偶愛蒲葵扇影寒拈將揮灑動雲煙情知龍躍天門筆肯與兒童調百錢王謝當年奕丗豪東山清興更滔滔不應經略中興志留在書名與日髙春閨怨花落間庭燕語新東風吹夢濕行雲就中最是關情處一寸春光爛錦文爛者爛熳之爛甲申門帖子一巵春酒酹門扉入手新年所事冝却愧白頭官舍底苦無明略佐明時偶書人無定志何從好事到難量尚口行一理縱能消百妄物情其奈正逢迎周文矩勘書圖宫槐隂合玉堂清書葉翻香入細聽內苑近來遊少太平天子要傳經鈴索無聲到玉除一時人物在瀛壷細看簪盍翻經處當日安知不有吾花壓欄干淑景移一枰間煞玉堂棊日長政有樂未礙從容下直遲周昉畫楊妃禁齒圖海棠春睡儘紅嬌苦殢三郎厭早朝人到愛深無捧心顰處更妖嬈題張季雲先生山莊圖儒將風流素所期兒時幾讀霽後喜對張卿賦此詩却馬巗居是素懷英嗟終老未曽諧天氣散作恩威震兩淮思長本與風雲會山逈空圍水竹幽説似望建封勳業在徐州公與徐州帥牙吾答相得甚歡官幕府至蔡改吏部郎中死沛縣牙吾答即盧國瑞也樓居春望圖翠斂雙娥底事愁不緣春去落花稠歸鞍未得朝天信望斷東風燕子樓徐熙折枝果圖紫陌春風窈窕歌升平花果夢宣和寫生忽見徐卿畫碧爛紅鮮發興多後庭新唱滿深宫巳覺金陵王氣空畫手忍將亡國淚筆端秋實染春紅趙大牛雪霽聚禽圖風雪龍沙萬里行當時先兆見丹青不然紈綺豪華習滿意荒寒落鴈汀點綴煙林意儘妍沙洲鳬鴈見荒寒君看小景都盈尺展放江湖萬里冤又題美人却扇圖中饋蘋蘩女所思春風何意醉瓊枝畫家解寫不見樊姬脫珥時大禹泣辜圖真淳氣散不復古科條漸似秋茶深道逢胥靡漣洏泣灼見當時罪巳心陶濳夏居圖徽宗筆杜亨甫家藏梅懹嘯傲羲皇上晉宋興亡筆削中千古此心誰會得颯然時有北窗風吾廬瀟灑風煙外詩思扶踈樹影中典午廢來何限事五株楊桞自春風庭樹交柯緑蔭濃欣然忘却草堂空更憐伎稷懷新處漠漠平疇遞逺風題李伯時畫陽關圖霍清甫家藏晚唐聲教限羌戎才唱陽關慘意濃逺節每矜殷侑壯略無離别可憐容别淚重於煙栁雨離愁長似玉關程就中儘是銷魂處不待聽歌第四聲題𣑽隆古畫雅集圖係內府畫上有紹興印今為霍淸甫家藏龍章紅爛紹興文入手休驚玉碗新奎壁細看輝映處半為元祐黨中人第二句一作內府藝香祕幾春題杜莘老春融秀嶺圖三分春事二分空料峭寒生破曉風今日簷前天色好山嵐全似卷中融甲申春大寒題李龍眠畫九歌圖不志君死即休修辭空説逰歷山南寺園題其壁䁔煙散處只空崖俯瞰城居亦壯哉寸出不容濯濯嘆無材江貫道畫江山萬里圖抖擻衣塵整豸冠嚻嚻終日簿書間何時一裏飽看江南萬里山繁杏錦鳩圖繁杏梢頭淑景新錦鳩呼雨雨𥘉勻儘堪活色生香裏擁頸雙栖過一春過青崖山上有圓臺幾頃餘上有老嚴公手株今為大林麓矣鵲巢東下望青崖武惠當年幾往來欲説雄圖中最重至今東魯號多才一作欲話霸圖應寂寞蒼煙深處柏圍臺過道郎寄時伯威泰安教授名震宗回望漸徴茫空翠隨人過道郎三日魯瞻亭上一樽風味詎能忘題山谷家乘後初看喜小康宜州天氣固難量一壷醉倒牂柯古南樓飲恨長宿東平南衙曽預幕中籌白首重來却似綘園春睡聲鶗鵊五更頭黃石公祠雜詩指説山頭祠南翠阜重都在先生指授中邑彬彬冨碩儒山川英氣未嘗虛須苦泥夜半重來覔素書東阿前金自張萬公髙子清鄉侯莘卿巳下進士第者二此老當年一隱淪後稱黃石恍疑神野人莫詫山間事洞穴無情草自春謂黃山洞穴山顛折立石也良授書來知益竒一時籌䇿係安危楚人不逐哀歌散白首空懷抱石悲千古陳言雜偽真丹青難寫是精神護軍史筆端如畫北上風雲逐日新今古文章不自工後人公論見清雄壁間細閲題詩客笑煞騰騰兀兀翁黃石祠有詩云天其既與赤帝子我亦願師黃石公題曰騰騰老後復日兀兀翁騰騰老蓋楊紫陽也兀兀翁楊飛卿也二公爭相為巳詩者數年遺山聞之曰詩則非佳爭之意甚可為一噱也郭將軍巨廟在肥城縣西水里村南山上土人云巨嘗趂熟來此欲瘞其子於村傍果然余以謂孝忍者也家寠時供菽水難豈堪孫息共盤餐生埋設若同純孝不念將慈變忍端水里山頭郭巨祠歲時香火野人思反哺因羡慈烏鳥斜日歸飛滿樹枝一作啞啞却羡慈烏鳥繼司毅夫韻題野堂壁毅夫名仁郊居靜有耽書樂客至都忘慊歲災喜向壁間留語去草堂樽酒記曽來眼中故友三年别霜後春桑一例災暫解歲憂談士樂馬頭遙指野莊來武惠公故里在長清西五十里今稱鵲里者是也鵲里西連武惠林蒼煙埋沒石麟深固應千古桓公葉長聽黃鸝送好音遊百家巖雜詩月池懸溜落蒼窪岩竇分居可百家不羡碧瀾秋色好倚天驚絶赤城霞龍鬚草細雪婆娑石樹碧玉窩欲訪鍛爐懷舊隱老僧指示隔煙蘿山居最苦水泉慳明月池深湧碧瀾寺仰以清山藉潤細教螭口㵼髙寒山煙起處竹林蒼白鹿嵬髙半夕陽長嘯至為鸞鳯去公和當冠七賢堂玄髓丹書兩遇難碧山猶説有仙壇千年留在嵇康恨石上清風漠漠寒亂山合還排青闥細路縈紆走白蛇十里風煙吟醉底柘園莊北日𥘉斜清醑蒸粳户户香百門山下喜𥘉嘗太平有象豐年是翠竹梢頭看簸揚往蘇門半月過青簾巷揔窩寓形宇內知能酒當歡不樂何十月山陽黃落秋陡寒風色􅟠貂裘磋跎非泥林婆酒更為諸賢一日留晉隱祠邊落照紅自來伐木竹林中且休輕議前賢輩自執牙籌笑阿戎王烈清泉在碧巔當時瓢飲致髙年情知泥髓能充腹空使人間作笑傳題朱孝子詩卷道傍積土作髙標存殁中間慰寂寥見説一方多錫類秋風惡木變鳴梟中古識封髙四尺朱生覆簣到三尋所憐衰俗頽波裏能見終喪不匱心門閭旌異對堂封春在林墟泄樂中白首巳慚朱子孝荒阡望入漢堤東豫家三代祖塋夾堤東西相望凡三處長至日同李靖伯過髙仁甫新居即事禮義為方邑不多處心極厚巳澆訛首從吾輩家風異其奈閭閻鄙俗何藩籬限隔苦無多徹去寬於四海和昨晚杖歸心適喜樂於常棣燕時歌中唐一席間維藩隱眼髙於嶺嶂巑愛煞西家髙老子晚沙能暖鶺鴒寒讀明皇雜事西內凄涼慘落暉髙將軍去事尤危起居聽徹公卿表淚拭龍𫀆秪自悲元日門帖子堂落有成永思遠慰嵗時近逢季主親構新年儘笑聲雖關覺纍輕間心有味勝時榮不妨鄉社浮沉一曲酣歌樂太平跋醉道士圖頭傾盡玉雙瓶已醉猶醒百態生若問一中中所樂醉鄉日月自升平跋墦間圖乞食歸來意有餘豈知內子涕沾𥜗相逢半是墦間客底用經營畫作圖跋理宗題馬驎畫折枝木犀圖花中神品趙昌師又向臣驎見折枝不惜一天風露潤百杯樓晚要新詩跋醉漁父圖浪急舟輕任自由得魚歸去博新芻醉來省記靈均語獨速煙蓑笑不休題卜者詩卷卜筮精微未易通靜能知逺要深功褁糧去訪賢師友喜為題詩送易東跋徽宗畫百鷺圖草溝宫池漲碧淵日長靈囿鼓咽咽轉頭百有于飛地漠漠蒼煙是野田淺淺溪流碧玉汀風摽呈處揔真情圖回不到靈臺辦與樊川詫晚晴西伯池臺白鳥多二南風化到雍和慕羶只辦丹青了創守其如宗祖何乙酉元日門帖子莫認時榮真福順休從勢利論人情願將風日輝輝氣散作豐年笑樂聲題德長老夢䶖圗高情千古一坡仙夢入西堂豈偶然只著吾家公案論嗜心將至有開先修齡親説夢中傳寫出梅花樹下禪更愛鹿菴人品峻不隨王導作周旋鹿菴云好將半桶井華水過與闍利洗靣顔露堂夏曰即事曰長人在露堂間何物相看慰我顔碧瀲方池湖水滿一峰蒼翠出君山題遺山先生手書雜詩後河澗王成之收文鍵親承謦咳餘又從珠璧見遺書常疑落落江山筆不放奎光到玉除江鄉雪景圗勢利嬰兒百尺竿雲臺爭似釣臺間料應蓬底秋江夢不到君王物色間秋江待渡圗楓林沙步夕陽蒼一棹秋煙待野航江上西風晚多急行人歸路不須忙寒林圗溪山一雪自幽深都付騷人入苦吟最是畫工留意端瀟灑萃寒林題水牯圗姚黃魏紫動遊觀何似田家黑牡丹萬有囷倉由爾出論功消得畫圖看秋山訪友圖瀟瀟楓葉映青山詩在風煙紫翠間早晚得歸林下去一溪秋水伴君間闕峙石樓連佛屋灘橫八節走青伊杖藜多是香山老斜日青山獨往時讀後漢西域傳論丗外鴻荒古罕聞角端人語烏雄尊縱橫最愛宣城筆理絶人區略不論角端獸名極壯大能諸國語題樂天不能忘情圖駱馬悲鳴頓玉珂停杯重聽栁枝歌做成一段間公案轉覺香山長物多楊桞新聲滿洛陽樽前風味老難忘筆端拈出新詩句似為樊姬作嫁裝韓白二公老境日月間心要破除香山晚節亦區區藏詩葺寺皆餘事猶勝昌黎聚博徒藉也胡為勸著書要將斯道濟時須情知千古潮陽筆肯作分章摘句儒太一宫四絶華表人歸鶴未來空從雲氣望蓬萊西猶記中和手自栽露濕庭松偃蓋青一聲幽磬隔踈櫺多應金簡朝元罷自炷爐香讀道經庭樹瀟瀟緑滿廊日長深鎖碧窗涼隔簾遙見秋來處一葉輕黃墮井床漠漠隂風轉石壇長廊踏破碧苔寒呼童徹放松扉鑰看罷梅花問竹安倚竹圖天寒翠袖儘輕盈暮倚湘筠思不勝何異澗阿幽隱士長材空抱乏賔興遊龍門雜詩一十首共西山名山到龍門勢轉竒千巖軒豁射朝曦從教馬足徐徐進正是山紅澗碧時百丈瑶泓湛碧崖杖藜不到是空回諸人也解詩人樂挽葛攀藤一例來龍門形勝自天開細㵼銀河灑碧崖老我丗間塵土夢百年能得幾回來直上危巔弄瀑流空濛飛灑翠雲裘看來潭靣無纎翳人道龍泓似炭湫冷泉飛下碧峰尖蛟杍綃長萬縷纎却為夜潭霜月苦山靈長下水精簾龍門峽束石嶙峋只有懸流最可人才到寺臺心已喜竹梢明處拖天紳上題詩石上休劉郎勸酒薛郎謳竒探不識風雷若比潮陽更欵留舍䇿上稜層醉裏陳州羡不勝玄極近南雖峻絶似君筋力尚能登惜登危馬力微歸時風袖喜披披紫煙暖藉青鞋步下蒼陘不覺疲山喜詩人作晚粧野煙不幻碧峰蒼婆娑醉藉橫坡草更為山英倒一觴筠溪軒留題山川明秀在共西人問其中幾杖藜三十年間還默數青燈兩度宿筠溪筠溪溪上好風煙又向幽人借榻眠欲就龕燈尋道話却成尊酒醉留連題天慶觀壁至人心孔有天遊何似歸潛德日休千尺澗松終自老一菴間地且相留優優城居足是非靜觀秋水物空齊近年豁盡爭衡氣卧看虛窗日影西春畦緑滿桔橰間吟眺髙城有往還不著神光牛背上時來支笏看西山闤闠都來掌許中白頭相會幾人同時將一榼如氷酒傾㵼春風滿太空題史仲威修鄧州文廟詩卷禮殿修完到大成仲威一日得嘉聲却憐吾郡資庠地二十年來斷不行題歲寒齋松柏青青貫四時木中推重為幽婆史君特用為齋榜要見貞心老不移題東坡手簡文章大節中所立海嶽英靈未易招只為峻髙人競仰有時秦告作鸚嬌題山谷手簡書學推公果若何紆餘全似右軍鵝兩行醉墨南樓帖一字千金未足多寄楊參政紅藥階前露氣新五花行判舊經綸除章莫厭鈞陶細散在人間是好春間中何物慰窮愁細把調元入校讎勘破漢中三䇿意忍從刀筆論鄼矦謝太傳奕棋圖勝負胸中料已明又從堂上出竒兵怡然一笑文楸裏未礙東山是矯情秋澗先生大全文集卷二十九
