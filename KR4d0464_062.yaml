body:
  text: 詛蠹魚文并序王子曝書于庭風動帙開有蠹十數輩倘佯其間耴書視之甚有囓壞者遂為文以詛之亦且攄豫懷之梗概云其辭曰嗟上蒼之生物兮曽巨細之不遺隨一物而一名兮乃各有其所施龍􅋮首而霧集兮鷙搏擊而翰飛蝪緣隙而射蝎兮蚓含凄而應時蟻結陳而雨妥兮蛛縈絲而喜隨至於蛇虺毒而虎豹猛兮網繩㯮刃人得驅而逺之彼蠹魚之何為兮當去之而不疑我固拙而未貧兮尚其書之滿家規姚姒而法周孔兮浩波瀾之無涯念披讀而有次兮譬草木之品差歲翻閲而莫周兮蠹乘隙而遺蘖芽感餘浥而化育弓何族類之紛拏正如深山大澤人迹所不至兮足魍魎而生龍蛇爾名為魚厥號曰蠹無鱗鬐以自衛不潛淵而躍渚披景慕之虛名藴𧖟食之邪慮天壤之間充汝腹者多矣尋茫茫之墜緒幸不為人之害兮唯簡編之見惡信黃卷之有味汝得幽替而饜飫豔輕碧之微軀兮曵白鬚而容與曽賢愚之無間兮輒遇之而必妬誰謂汝無牙兮何以穿豫之竹素紛篆籀之紆屈弓致篇章之脫誤欲散帙而撲滅兮念忌器之善喻芼春薺之纎葉兮雜藝芳而細注恐物感之有驗兮庶噍類之一去曽少力之不獲兮愈滋蕃而無數汝豈學道之人兮咀糟粕而未悟將生死于文字之間兮凝精思於朝暮不然秦季斯之徒兮師六經而依據一旦燔之而叛道兮俾黔首而聾瞽流餘孽而見化兮終宇宙而惡著聖防謹其萌芽兮堅氷凝于霜屨苟不處而不區兮恐齧缺而無餘也布我床榻汛我庭宇亂牙籖于風中趂秋陽之烈馭既不能同湯鼠之磔裂兮以炎暉而為治具藉流爍之熾焰弓書難為之一抒􅑒醜類而莫逃兮遞糜暍於諸部失餘浥之所在兮㰸炎光于書户齊潔竹書之簡森列周宣之鼓固我扄鐍若有神護喜卷舒而無恙殆遺亡而見輔既收書而入室遂慨然而懷古彼微蟲之蠧書尚為害而斯巨吁姦邪之在朝妬忠直于時主其擯斥危亡之禍將何如哉嗚呼噫嘻我得之矣嚚嚚管蔡為周公之蠧兮幾謗成於王所睊睊子西為宣父之蠹兮化不霑于荆楚臧倉媒孽為子輿之蠹兮道不行于東魯上官媢嫉為屈平之蠧兮賦懷沙于汨浦匹夫絳灌為賈生之蠹兮老長沙之一傳孫弘變詐為仲舒之蠧兮䇿不施于漢武恭顯讒慝為蕭傳之蠧兮致炎運之中阻封倫小人為鄭公之蠧兮太宗幾以刑而為務盧𣏌姦邪為真卿之蠧兮卒糜軀于賊乕逢吉隂險為裴度之蠧兮播緋衣之訕語蠧兮去之而不可疑兮尚拔山之固兮况任遇寵信返為忠直之輔兮奮筆成文吾為此而懼兮祭諸葛丞相乞靈文維大元至元八年歲次辛未九月壬戌朔某日承事郎前監察御史衛人王某敢昭告于漢大丞相忠武矦諸葛公之靈嗚呼事有曠百丗而相感者以道義故也維公挺天人之資奮雲雷而起黜功利之邪説明剛健之正體攘伏群隂嗣興漢紀兩立偏安幽燭厥理兹少康克復之本心何戰國縱橫之可擬由是而觀公之志何意于鼎足而峙也至于開誠心布公道從權制示儀軌牧民訓兵賞善黜戻以君臣大義而言乃忠武開濟之餘事也宜魏人畏之而乕如走狐狸而號魍魅偃回斾之威靈嘆竒材於壁壘故三代而下巍然王者之佐惟公一人而巳繄一介之凡庸何清光之敢企然掦洪蜀郡之功曹楊顒莫府之屬吏韙一言而表擢感忠規而隕涕又如李平廖立以過見廢俾之怨艾固匪遐棄及夫蜀婦既髽痛吾已矣恨終左祍發憤而斃是又見公不屑與新之教采葑采菲之意無以下體而為纍也若惲也質朽才踈有志未遂年迫知命動昧操履蹣􅘐仕途幾年于此八月行臺僅免官謗三年御史莫吐其氣今則俟大治之甄陶聽鼠肝而蟲臂雖耿耿以自信復何為而何逝恐生無益于人死罔聞于丗也用是中夜慨歎不遑窹寐乞靈祠下陳辝而跽我公在天日星昭緯容光必照奚間彼此思蛻濯其塵穢扣囊底之餘智覬增益其不能為砭訂其頑鄙付清明于眇躬極臣子之所上有來厥修神所惠祉庶免夫年與時馳意從歲易悲嘆窮廬遂成枯蔞區區之懷竟無及于追悔也尚享為虎害移澤州山靈文大元國至元十二年九月日承直郎平陽路總管府判官王惲近𬒳藩府檄伐石東鄙有以虎害言者謹移文以告澤為用當太行心腹間傍雖長林巨壑獸蹄所交窟宅所在然鳥獸隂類神實主司隂禦默捍限隔常處制其暴厲使無犯越以為人害此神之聀守吏之責也今不逞之獸悍然不安其所安食其所不當食怖農耕梗行路啖民畜膏肥厥身以孳乳其遺類亂區制之常經忽太府之命吏是將與吏民雜處此土方今聖賢在上丗道清夷政令簡肅年榖登盜賊弭守吏者承流宣化牧養斯民為任坐視若此安能俯首降心偷安朝夕容此物橫重念民之于國備檥牲粢盛供天地百神之祀出兵賦芻餉佐軍旅征伐之用重繁若此幽明兩間敢不敬忌以顧恤邦本且民又未嘗輒犯於彼彼胡為而然哉若曰妖孽之來蓋有由然秪吏之不德政有不善自有任其責者奈何禍延平民使居者行者惴惴焉懷旦夕不安之恐一至于此哉即欲窮幽致討勦絶而後已逮禽獮草剃等耳然神不于其告輒從事于彼是守吏不有其神此文告所以先也維神聰明正直念守吏克虔之告思職分當然之理赫靈威迅符牒搜索凶渠斃諸原野餘則鞭笞驅逐逺放林壑限以常處永絶斯害使一方安靖遂田里有生之樂雖神之職也實神之惠也惟明靈其圗之瘞畜犬文有銘犬之於人有功矣晝則守禦夜則警盜其健則能搏物猛則能取威窮則不遺其主靈則不失其家兹犬德之大率也子有畜犬曰蒼頭髯尨𬒳體耽耽然有獅猛之姿誠㺜之上品也其為德則不貪饞不舐穢不虛吠不狂逰寢有常處履擇其地投之物非嗾之不敢囓叱之退非招之不敢前至于親屬賔客一及于門墻者聆其聲亦能識其人指揮馴狎咸會又意可謂有人性而無狸德矣嗚呼物之生稚而壯壯而老老而病病而死順常理也主人何憾焉且計其歸于我以至于死蓋十有一年于兹其服勤守禦功亦多矣主人惻然而興􅒛童子具畚鍤褁以寢簀枕用玄石瘞于古堞之下亦弊蓋不棄母使首陷之義也記曰捕田鼠者祀之矧犬有功于人也昭昭矣故係之銘其辭曰嗟嗟竒尨㺜之種曰守曰禦或靜或動靡失其常風鳴意聳卧護我家取威于衆相非狸德尓馴且勇唯有稱德與良馬共生也服勤死當禮送弊蓋之義敢不是奉諭平陽路官吏文為判官𥘉任時作時九年五月也契勘國家張官置吏本以為民且縣而州州而府吏而官官而長雖上下分殊大小聀異以承宣而言實為一體至若親臨民事周知下情如賦稅課程婚姻良賤債負田宅刑名等事推明根源分别曲直兩盡物情一歸于正為莫若州縣耳故諺有之既為民父母當作子孫看此言雖微可以喻大恐不當憚其煩勞一委于吏致開塞幸門情生詐起附會科條髙下其手冨強恃勢者理本曲而返神貧弱冤抑者情久欎而罔訴事體既乖勢成稽滯及訴者有辭莫可推延仍作疑似上之于州州司設有窺避事情捨難趨易艱于勞心者止慿縣解略不詳審輒上于府者有之易而有謂者一委胥吏聽其飾説亂行剖決者有之謂如按驗未完辭情稍備或明具條章不行定擬冒亂上陳幸其万一者有之又念徇情同列者視違錯而不言既滿望代者以患失而為慮至于辭不清明而曰民嚚于訟身不力行而曰事擁于下以聀以分何不思之深也總府固當持大綱略苛細不冝求痕洗垢以察為明然念軍國之利害刑罰之枉濫脫或差悮而總府亦不敢止守大綱究其所以自有任其責者矣至若總司行有不逮虧一道之紀綱亦何以逃朝廷共理之責乎又念郎官上應列宿苟非其人百里受害靜言思之可不畏歟稔聞公等類皆明直恪勤官政小則寄百里之􅒛大則近連率之聀天官天祿實荷恩榮獨有履正奉公竭盡心力以功名圗報上可以答國家委寄之恩下可以塞為民父母之望噫社稷人民莫非王事視如私家無不修理推廣此意又何俟告辭之丁寧公移之督責也自今以往計能強其所當行勉其所未盡以一體為心共理為務逺懲積習作新斯民使一道元元霑𬒳王澤而遂有生之樂實公等之力捴府敢叨其功乎所以集衆思廣忠益者惟期王事有成則捴府亦庶乎其寡過矣敦諭百姓文汝等性秉五常智周品物聞善必遷知過速改此固有之理恆久保身之道也方今明教化勸農桑彰善疸惡為務庶爾有衆比屋安然遂有生之樂此明天子之意也平陽陶唐故都詩書遺俗丗不乏德比者自逺思之化陵夷衰晉之風尚氣亢強頗乖正理致使訟牒嚚繁動經歲月較其所爭至甚微眇親舊變為仇讎畎畒棄而荒穢事端既起歲計一空亟當戒者乘氣窒塞不度輕重果于自殘禍延後人嗚呼一忿輕生乃至于此非愚而何况朝廷委付守臣之責非特有司常務而已正以承流宣化美厚風俗安靖一方為重兄兄弟弟夫夫婦婦恩義至篤也不可因細故而致爭比鄰共里連鄉並黨緩急相恤也不可以小忿而興謗蓋好鬪者喪身之原健訟者破家之本興言及此我心悲傷汝也何心忍于為此常念禮讓者安順和睦之方孝悌者福澤冨厚之本一日自新終身樂地能爾何止公庭致束杖之清田里獲共安之樂將見祖先神靈安于上子孫德澤流于下比屋雍熙永為善俗豈不快哉豈不樂哉據教諭社長耆舊人等請以此意敦諭中外使咸知勸戒毋重其改作也其有不待教率自來孝悌勤儉力田而省事循理而畏法者申明上司別加顯異若凶頑如前恬不知省上違捴府之訓辭下悖父兄之忠告是亂常敗俗之人國有常刑悔將何及至于有司非橫以侵牟豪強兼并而為事科差不均力役偏重縱而不問以致失冝使汝下情鬱抑控告無所是捴司撫字無方得罪于汝將何以息閭里愁嘆之聲逃朝廷共理之責乎汝等其詳思毋忽勸農文切惟民生之本在農農之本在田衣之本在蠶蠶之本在桑耕犂把種之本在牛耘鋤收穫之本在人人之本在勤勤之本在于盡地利人事之勤地利之盡一本于官吏之勸課夫田功既盡縱罹水旱尚有所得仰事俯畜乃克匡生穡事不勤雖值豐穰終無所穫賦稅飢寒將何以濟由是而觀克勤者身之寶自惰者家之殃此勸課所云急也提刑按察司欽奉聖旨所至勸課農桑使聀近緣巡厯考照簿書其耕播栽植之事勤惰勸率之方大抵虛文多失實效勸農之官長民之吏安得不任其責况今春首農事方作巡行勸勉適在兹時仰所在有司照依已降條畫遍厯鄉村奉宣聖天子德意敦諭社長耆老人等隨事推行因利而利察其勤惰而懲勸之所有事條開列如後一如田多荒蕪者立限墾斸以廣種蒔其有年深塉薄者教之上糞使土肉肥厚以助生氣自然根本壯實雖遇水旱終有收成若無間田此最良法一穀麥美種苟不成熟不如稊稗切須勤鋤功到去草培根豈不聞鋤頭有兩可耐旱乾結穗既繁米粒又復精壯此必然理也一一麥可敵三秋尤當致力以盡地冝如夏翻之田勝於秋耕概􅦥之方數多為上既是土壤深熟自然苗實結秀比之功少者收穫自倍一所在水利常令修葺毋得因循廢棄倘遇旱乾獨沾豐潤是地利遍惠一方人力可不加謹又兼此係朝廷最重之事切當用意仰體至懷一桑麻之務衣服所資切須多方栽種趂時科薅自然氣脈全盛葉厚秸長飼蠶績縷皆得其用又栽桑之法務要坑坎深闊蓋桑根柔弱不能入堅又不冝拳曲難舒根既易行三年之後即可採􅎥一蠶利最博養育實難如浴連生蟻初飼成眠以至上簇必須遵依蠶書一切如法可收倍利嘗聞山東農家因之致冨者皆自絲蠶旬月之勞可不勉勵一耕犂之功全籍牛畜須管多存芻豆牧飼得所不致羸弱以盡耕作其或引重服勞使長有餘力若有羸老不堪者切須戒殺心檀行屠宰一雞豚鵝鴨之屬菜果瓠芋之類皆可養人務畜廣種用之接聞不為無輔故古人有言菜不熟曰饉豈為細事一時至物成罷亞壠畒更加併力收斂以防風雨損壞有失歲計不惟盡廢前功一飯到口自行暴棄良為可惜一古人蓄積最為急務故國無九年之蓄國非其國也如平陽太原兩路例有蓄積往往山下飢荒鮮聞山上失所近日官設義倉正為此也蓄積之事其可後哉一織絍紡績責在女工可諭家長戒其慵惰嚴立程限造成端匹以備粧著蓋非鳥獸必須溫暖可禦冬寒若無衣褐何以終歲一或有頑不率教惰農自安背本趨未敗壞淳風朋遊群飲稱曰事情釀酒屠牲指為口願田務方集耽樂城市其或别生事端遭值官司父兄親戚理須營救豈止破壞家産田産轉成荒廢此等切當禁治毋得輕犯一有孝悌力田為衆表率汝等舉明到官優加寬恤如有浮泛雜役可除者即為蠲免以勸餘人據巳上事條仰社長耆老人等各於當社時時開陳隨事推行因利而利察其勤惰而勸懲之不致因循苟且徒文具而已庶可以仰副朝廷愛養元元務農重穀之本意也除已暗行體察不如教者須議省諭各令通知勸農詩總勸分司勸課不辝頻汝但聞言日克勤倘使有名無實效到頭俱是具虛文糞田年深蒔種薄田疇糞壤頻加自昔留田果糞餘根本壯縱遭水旱亦豐收種桑年年勸汝盛栽桑相度田園土脈良屬汝一根如法種明年要見百根長勤鋤鋤頭有雨潤非常此是田家耐旱方果使鋤跑功續到結多得米更精良水利細思水利最無窮普例災傷獨歉豐倘有可興須舉似已成毋得廢前功女工田家門內事紛拿最緊蠶繅與績麻主戒婢奴姑勸婦趂時作活可成家訟田近年田産貴于金明見無慿恃力爭縱使一時官借向就中不直有神明結親成婚作贅結歡情往往年深致怨爭省訟有方渠記耴始須書契兩分明讀書孝慈和順革囂愚説似兒孫自讀書縱不盡為官窅去省心解事亦良圗省訟典田賣舍屬曹司何似無爭省狀詞唆汝致爭元是賊勸令和忍是良師畏法禁網寬踈固不苛慎毋輕犯𬒳拘羅更思有理無錢語試估家資有幾何屠宰上司禁汝莫屠牛間有人來告事由豈止到官刑罪慘怨讎相結幾時休鬪驅農家蠶務與耕田除却耕蠶半是間利害不多休致鬪壞錢當罪片時間教唆教唆冤報似循環比及兒孫已𬒳愆若欲人生求利逹正須良善養心田盜賊一毫非有莫萌心竊物穿窬罪不輕重是杖徒微刺記枉因纎芥壞平生飲博常思群飲與難錢此事尤須預禁闌酗至輕生輸至盡恁時雖悔恐應難安分貧須藉冨冨憐貧安分懲貪德自新積取餱糧防儉歲慎無相率去祈神天報四民唯汝最純風天憫辛勤報已豐試看仕途青紫客大官多半是莊農終勸分司勸汝事多忱今歲詩篇意更深切把此詩長記誦來年比勸預關心又文告裁成二十詩篇篇皆出老農辭汝歸相勸行毋怠便是分司樂不資祭文先祖妣韓氏祭文中統元年庚辰秋九月丙寅朔十有一日丙子男孫某等謹以清酌庶羞遣奠于祖妣韓氏之靈繄韓氏先昌黎之裔枝分派析散處於衛衣冠煌煌文經武緯越宋有光司空之貴惲觀其譜本支十卋尚嗟祖妣實出其系薰沐膏腴生大盛卋德婉柔嘉主夫中饋貞祐𥘉元金兵四潰萬室一存危若旒綴時維祖妣歸于王氏內助我祖畢力家事遂濟坤柔外扶貞義我堂復構我祀復繼內治雖嚴舒而脫脫我祖先歸我考時稚勤苦流寓柏舟自誓鞠養提携遂成偉器名甲京師一日騰沸抱飴諸孫免夫火水至克負薪其恩非細欲報之德昊天罔既八十之春不為早卋顧不孝榮養殊替有銜不祛涕泗面𬒳庚申之秋應辟東魯力辟幕官唯曺是主慮其不淑庶獲奔赴罔遂所求心不遑處后土皇天實聞斯語旬日之間事易其故天誘愚衷駕言西騖拜省庭闈病為少愈九月𥘉吉星河尚曙有物告終聲裂軒户奄奄在床彌留不去日薄西山矯首云暮風樹之悲有淚如注盤盤新阡實惟高原安之妥之一遵訓言傳家之範敬奉周旋左配我祖何千萬年嗚呼尚享廣平郡夫人完顔氏祭文從單學懿懿夫人金源之裔分派天潢坤柔所萃式承隂教婉其令容作配德門𬒳之僮僮蘋蘩主饋化成肅雍血母之訓伯姬之恭是嬪是則以號以封立人之道莫嗣續大子挺儒宗種德孔邁令伯陳情不仕而恝菽水盡歡心乎日愛素髮垂領班衣在身問安視膳眷然晨昏野服瀟然林下之秀蘭玉盈庭歲時上夀日薄西山其明則東曽是微恙而不及躬起居燕樂曵曵融融彼髙明家具慶則那若母若子為夀如何親不知憂孝養終天享此全福幾人則然懿懿夫人足慰下泉膴膴周原瞻氣蔥曨居河之漘有儼新宫𥚹柎無憾哀以送終懿懿夫人為婦盡道為母有儀彤管有煒千古是徽尚饗祭王參議文維中統元年十月甲寅朔二十一日甲戌王惲謹以清酌之奠致祭于參議先生之靈藹藹王公維德之宗教子以義從師于共走也何幸而與點同氣質一變舞雩之風文士輩出繄先生之功公來典衛粵惟八年興滯輔弊政有後先激濁揚清巨細不捐樂育之心有加于前士感公知所立卓然顧惟不肖獨有二天每侍几杖接以溫言意向所在多文字間一意作成汝其勉旃家貧親老擇我祿仕床下之拜言猶在耳蜀山蒼蒼公箠西指董菴之別誠發于衷臨岐眷眷告以終始蹭蹬沉鱗有俟乎此孰為歸來便隔生死痛彼知已丗罕所遇我思古人涕零如雨猗歟先生伊時之麟文彩風流與道日新既惠我輩亦及我之後人所謂故國非有喬木之謂而有丗臣峩峩豐碑耒公之墳公雖云亡其德在民太行盤盤淇流湯湯永懷先生何日而忘祭王府君夫人陳氏文大元國至元十二年歲次乙亥二月壬寅朔越日承直郎平陽路捴管府判官王惲謹以香酌之奠致祭于河南路宣慰副使王君太夫人陳氏之靈伏以詩稱有基婦道乃隆易讃坤儀徽柔所鍾維夫人之淑兼著一躬母儀女範姻于六宗內助既𥙿化成肅雍彤管有煒周南之風嶷嶷賢嗣總角從容以契以分昆仲猶同二十年間獲侍左右歲時拜慶稱觴上夀顧畜殊常如卯斯覆我草惟纎兄蔚蘭樹突而辨兮載同庠序浹洽薰陶亦叨時譽調官南歸四月惟夏升拜北堂德容甚暇親哺之食手飲以斚駕言西行辭拜床下中心惻然誨言灑灑日薄西山衆雛飛翻云別幾何遽棄榮養聞訃驚怛惄焉如喪英英白雲太行之上有淚盈睫悵然東望嗚呼適去則順其生也榮較丘山與華屋終哀樂而殊情懿懿夫人夀踰八旬拊安玄堂慶流後昆是足以慰下泉而釋悽愴于蒿焄也惲以官守有限罔獲駿奔既不及撫棺而與諡繄昔賢兮擬倫以陶侃之忠順知湛君之聖善以不疑之平反審母氏之慈仁援例私議寓哀于文庶幾薦微誠而告精魂也尚饗禱雨蒼谷神祠文去冬今春厥旱斯普比聞三方既禱而雨維此衛邦和氣艱阻草木焦卷種不入土致此咎殃誠守吏不德之故也吏不稱聀罰及一躬我民何為罹此旱凶嗟嗟四民最苦我農止食其力歲期一豐旱苟成災散而西東恭惟明靈蒼水之龍哀憫慈惠正直明聰司我雨部山靈是宗澒彼淵池雲雷之宫民以病告禱輒感通忍以吏不稱聀卒莫救其隆蟲哉願回哀眷澤我弼鄘乃以有秋祀事孔終祭王參議文代史運使作惟公奮迹渤海應期挺生婉畫長材廓時之清佐我父相幾三十年子惠兵民以謀以旋長淮百戰松漢逾邁死生以之而有公在矯矯大莭老而彌堅襟融宇粹秉心塞淵中牟之仁平陽之賢哀哀衛民賴公以痊膴膴周原熙然樂土公雖云亡其政則舉走自恆陽來寓南鄘瞻邦遺像齊之蓋公歌詩知政泱泱大風民懷遺愛甘棠是比士而感德曠乎百丗矧伊嗣侯義同昆季嗚呼哀哉吊罔及哀生不獲事遐想音容河嶽流峙野日荒荒群飛搶揚公不少留使我涕滂跽而陳辭奠此一觴尚饗春旱禱諸廟文旱自去秋極于今春滌滌衛土如惔如焚夏麥已稿曷休我民秋種不入飢饉荐臻旦夕惶懼不知所云恭惟明德守臣所欽民以病困神心孔仁用是齋沐以祈以禋庶垂哀眷昭鑒微誠風伯回馭山川出雲一變盩氣化而甘霖秩我東作庶幾西成載謁祠下答鴻靈尚享七夕祭竈文至元乙亥平陽府作三代之制五祀孔修群姓時享或春而秋欽惟竈靈並奧而幽朝烹久飪一家所由火水相德乃神之休敢致薄奠于陘之周有肉如玉有酒斯柔味登于祖香列于卣匪物將致匪媚是求久矣斯禱庶答神休尚享七夕祀竈漢俗也丗久不用獨吾家行之多歷年所且前人致恭或斯苟得此非豫之心也蓋庖湢飲食所出五祀神為最尊薄宦巳來糊口四方是神即豫主豫乃神之客也匪朝伊夕不無溷殽膠撓之瀆惟神念客之故庶有以安之用伸告謝以答神休尚享謝龍神文維至正四年歲次下丣夏六月丁巳朔草日丙子翰林修撰郡人王惲謹以香酒之奠敬祭于縣西平成鄉龍公之神矯矯神龍柄雨之機亢陽為災非雨則飢土而力農乃分所冝惟百創理一旱則墮霈澤在天屢及我私疇敢不祗若神之威德也尚饗秋澗先生大全文集卷第六十二
