front:
  text: 秋澗先生大全文集卷第十四七言律詩
  hash: sha256:79d5f7a7e16c8d0b60a62b950e6cac551e4297ff7092cd925616548ec2d34989
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_014-1a}
body:
  text: 哭劉房山紫髯山立蔚揚休書學推君到晉流文冢氣嚴驚卧虎墨池星黯失蟠虬眼中人物嗟何及身後珠璣散不收我擬九歌投濁浪重傷吾道轉悠悠中秋月夏苦蒸雲嵗晏霜月華還覺此宵良天容澄徹銀河沒桂影飛來海氣涼老魄不應秋更苦賞心多為事相妨一杯儘吸清光了洗我平生芥蒂腸送王嘉父新知雖樂道彌親樽酒燈前便故人時宦儘從間處著浩歌還愛醉時真紅蓮幕府名兼隱春草池塘句有神恨煞百門山下水錦波流不到東秦一見襟期倍所聞霧嵓玄豹隱竒文清樽浩月應無幾赤日黃塵遽爾分濁酒可因微恙止天葩寧為舞裙芬百年湖海論攴地興在天東日暮雲和靖教授送行詩韻出處𥘉心度義行蒼天誰識此精誠十年載質孤懷苦一宦縻人弊屣輕時事失聲驚破釡幕蓮晴泛愧參卿夢歸夜夜栖巖桂猿鶴無勞久怨驚秋日言懷時先考卧病雨後秋堂早暮涼竹風飄蕩藥塵香身間正坐詩成癖親老何堪病在床書卷日隨秋草亂壯心愁入野雲蒼摩挲老鏡蓬窗底也效樊川洗鬢霜清明日錦堤行樂浪説蘭亭禊事修年季春好錦堤遊花翻舞袖驚歌板桞隔髙城暗酒樓緑樹恐應春事老金鞭重為使君留竹西路晚歸時醉何處珠簾半上鈎八月十九日雨晚晴積雨收霖景氣清物華雖老覺容平間雲知倦爭歸壑飛鳥趨林不計程山􅟠翠鰲驚突兀天浮圓蓋失枝撑化權舒慘吾何預要擬樊川賦晚晴上史節使晉明夀尚父忠勤歷五朝承家又見鳯遺毛神鋒灑落青冥闊秋隼騫騰華嶽髙治化載清遵定法德容充擴浹吾曹年年盡戟清香地常對秋香醉露桃南城納涼晚歸書院歸休日巳曛南城風細晚相親坐來近市喧𥘉息歸到衡門夜向分矮榻趂涼欣稚子踈燈留影伴厨人一杯粥了從髙卧須信間身等䇿勳七夕立秋庭竹風生好雨過碧梧飛下鳯凰柯人間一夕驚秋早天上雙星恨别多鈿合蛛絲遺暗網綺樓雲影淡明河柳州羡煞天孫巧其奈微生賦分何涼夜祝融怙權不肯退一夕好風吹暑回雨氣淡從雲尾散秋聲涼自樹頭來渴懷夢濯西江水逸興歡逢北海杯慿語蘭臺宋公子莫因雲物詠悲哉八月十一日夜坐展轉秋懷鬱不平憮然方寸若為驚學踈久昧天人理親老尤深喜懼情坐對燈花供笑語靜聞庭樹散秋聲大家但使康強了未害窮愁老此生雪晴望壬子歲正月滑滑春泥雪意融出門藜杖任西東光風漸好茅簷喜煙火全踈傳舍空三穴既能容狡兔五噫誰𣸪羡冥鴻更為著眼登臺處頗覺江山王氣雄題何練師巨川虛白菴西風吹下鏡湖船來作空山避丗仙採藥逺辭滄海上結茅歸老白雲邊鑑光應物元無物素質能玄本不玄莫遣碧桃溪畔水暗香浮出洞中天鵬雲蹤迹若垂天收斂都歸一室間塵境夢空祥巳止松巢枝穩鳥知還潭心印月清無滓谷口橫雲意自間想得翠蘿幽隱處天風和水㵼空山太康展江亭籌筆規模蓋丗功新亭髙構繼遺風乘秋閲武邊聲靜臨水投醪士氣醲騏騎繼聞空塞北樓船行復下江東殷勤淮水東邊月幾照元戎坐折衝送紫陽歸栁塘挂冠神武急趣裝歸隱秦中舊草堂海內共知元氣在井邊巳仰德星光眼明華嶽蓮峯翠路入函關草樹黃預為山靈報歸日緑楊隂合鄠南莊送蕭四祖北上丹鳯㗸書下紫庭秋宵光動少微星蒲輪再起秦遺逸天意將新漢典刑長䇿正勞黃屋夢故山從使白雲扄中原有幸經綸了天外髙鴻本自冥上闊闊學士𥘉來軍儲字子清蒙古人官至中書左丞六轡聮翩走使車繡衣風彩漢相如紛紛漕計歸鞭算戀戀丹心在帝居折節不知軒冕貴濟時行奏便冝書從今慰却蒼生望一點文星照玉除壬子夏六月陪蕭徴君飲方丈南榮同會者烏大使正卿董端卿經歷學士徒單雲甫張提點幾道王秀才子𥘉洎家府小子惲隅侍席末云修竹翛翛風滿廊夜深樽爼得餘涼浩歌聲繞銀河水畫燭光凝燕寢香雪蟻十分浮大白德星一夕聚髙堂停杯更待東山月要汲清光洗肺腸送王子𥘉東行岱嶽西南碧海東青齊中據震維雄驚猿别鶴休增怨詭觀竒蹤得盡窮劒暈寒輝騰寶氣馬搖金蹀健秋風欲知别後相思夢多在西山紫挂叢杜君美耕隱堂厭喧恥向市朝居歸隱南城舊草廬黃葉落時農事隙青燈明處夜窗虛寫懷草就淩雲賦貯腹看殘種樹書翠竹白沙村路晚月明幾駐故人車春懷和术忽坦夫韻苐屋春深懶閉藏出門藜杖獨相將春光暖透芝蘭谷風色妬殘桃李埸論政舉知南國弊賦詩休詠北風涼浮雲軒冕非吾事擬訪無功覔醉鄉雨中與諸公會飲市樓每恨人生會合難興來一醉盡君歡雨沾翠佩簾花細酒凸金杯飲興寬胡旋舞低翻翠袖串珠喉穩怯春寒朝來酒醒蓬窗下依舊春風首蓿盤秋漲後晚訪王克書舍種柳堤邊起暮吟黃金不博百年心垣墉傾圯水𥘉退門巷瀟條秋向深但遣歌詩酬野逸儘隨鄉社共浮沉鄰墻酒美中秋近明月柴門約重臨報子𥘉以書見慰擁鼻吟成嘆索居眼明驚見故人書邊城秋靜沉寒柝畫戟門深曵翠裾契闊秪應分一水笑談曾不廢三餘答君不忍虛來意呵筆裁詩雪滿廬春望黯淡春雲雨意微小樓孤影立斜暉書能引睡聊遮眼酒可攻愁任典衣桃蕾有情含笑發鴈行無力拂雲歸倚欄不盡登臨意獨對東風詠采薇冬夜坐虛堂人靜鼠窺燈霜葉瀟瀟散雨聲睡眼看書渾勉強夜窗得月喜虛明漫漫長夜何時旦悄悄孤懷百慮橫到底粗官男子事幾回投筆壯班生砧紙鵝溪蠶繭太豪華新紙蒙茸隱細紗不惜秋砧聲夜杵要翻新法自吾家搗勻楮皵光舒練拂散龍煤字點鴉我録詩書何所事擬尋源委泛靈楂夜歸月波環暈晚風凄賔館歸時獨杖藜曲巷門深驚剝啄小樓燈影自髙低歸心有限先回鴈丗事無心類木雞淡蕩春風二十八忍將書劒坐羈棲壽周都運劒佩龍樓顧遇頻漕臺今復試經綸平生許國丹心壯此日承家玉樹新德量潤涵淇水逺夀杯光動紫川春朝天好在明年日金印重看拜伯仁秋雨有懷吕丈子謙時奔喪夏津賓館光隂一歲中飄蕭吟鬢感秋風久諳丗事無多味靜覺書編有細功四壁夜蟲秋思苦一窗寒兩客牀空對眠不見蘇州守縱有新詩愧未工壽王參謀二首郁郁卿雲靄士林不應正作一方霖無媒致位寧私巳有子傳家足慰心巾卷在庭公事簡壽毫浮彩蟻樽深非詩莫頌千春德喜對梅花入細吟典郡風流漢表儀一方春物自熙熙謝公雅量推平昔楊震髙風到四知畫戟清香凝燕寢東山春酒照芝眉政成不獨褒金爵賢守恩波在鳯池贈元仲一書記名寓緇衣行碩儒蒲輪却走事居萬緣擺去聊乘化一念深來為讀書黃閣經綸冝自重青山談笑未全踈相望未入廬山社日暮碧雲思有餘和仲一詩韻丗事紛拿八九違未容丘壑淡忘機須知霖雨思賢佐終擬卿雲挾日飛麟閣勳名驚壯節虎溪公案覺前非會看杖䇿軍門去滿眼行山空夕暉娛志詩書不厭貧蟄龍冬卧不求伸應憐擁篲侯門下何似行歌澗水濱沙鳥忘機還自樂池蛙睅目欲誰嗔悠悠物理吾難料會得摳衣問上人送百德正臣之汴梁君璋序裏仰髙懷賓館相逄一笑開過眼揔非如意事著詩時遣不羇材人驚駿骨空燕市夢逐秋風上吹臺去去當途足知巳未應空使劒鋒摧贈王修甫樊川風調錦囊詩邂逅青樓豁所思得酒愛澆吟舌健放談時露劒鋒差香翻月户情難極風入庭梧鬢巳知過眼紛華終寂寞望君冠蓋鳯凰池挽趙父師提舉匹馬南來及撫棺磨礱空使憶當年師資有道無虛飾賦業推公得正傳黃鳥此時空止棘青藜何處伴談玄𬗟懷壽德冝無憾可忍羇魂似粵阡送盧叔賢之鄧州萬里風雲入壯懷斗南人巳識竒材重看緑水開蓮幕宛勝黃金築隗臺鈴閣風清談麈靜星屯煙暖漢旗開後期佇聽平安報定逐梅花驛騎來壽王子𥘉彩鳯髙翔欲覽輝十年書史董生帷持心不為紛華奪尚友常先逺大期內冨經綸隆事業外涵風雅養詩脾赤霄玄圃春風細百歲相期拾紫芝自適旋收柏實炷爐熏𥿄帳低垂自有春竹几隱眠無俗夢蒲圑容膝勝華禋窗間白日驚濤迅門外黃塵萬事新幸與聖賢相晤語未辭藜藿此生貧登熙春閣封丘門外故宫傍天閣空餘內苑荒瀛海夢空三島沒帝城煙慘五雲蒼石鯨照水鱗猶動金鳯凌雲勢欲翔竒貨梁園當日盡為誰留在閲興亡哀故宫掖庭依約粉垣丹行入荒宫重黯然華表忽驚人丗換昆明重見劫灰寒石龍委地埋秋草湖王臨池倚暮煙滿目悲風吹酒醒東華門外淚闌干送趙相君北上漢斾當年入汴州布衣曽此識君矦夏盟自列葵丘會驥馬空騰瀚海秋萬里風雲橫寶玦九天名姓動金甌南遊正值朝天去望斷春風五鳯樓登凌雲閣布衣塵滿戴儒冠風袂來登上將壇棟藻雲飛朱栱濕簷牙霜重玉梯寒風煙逺勝籌邊逈氣勢雄吞汴水乾經略江淮有成算不須重展地圖看送王子𥘉之鄧州東風霽雨泛晴光桃李爭妍出短墻春意似留行客住陌塵都釀燕泥香三杯别酒清明後滿眼春愁錦瑟傍一曲劒歌心事逺緑波南浦未應傷送郝伯常歸堡塞書劒南辭𣏌國天一歡傾倒酒爐邊鳯麟瑞質驚千古江海詞源浩百川吾道莫傷今日否斯文將付後來傳驪駒歌斷青山暮愧未長遊從馬遷贈李幹臣少年心事便拏雲不著清談解丗紛自得士元參别駕僵摧伯比張具軍一江夜雨供吟筆万里征鞍逐鴈羣早晚春風笳鼓地更看詩壘䇿竒勳登資聖閣傑閣當年瑞靄氤亂餘金碧半塵昏豈知象教移中士猶揭雄名護國門法界冷沉梁苑月寶香難返汝陽魂傷心五嶺騰煙語舉丗從風莫與論跋西蒲老人燕處圖甫脫孤城百戰危蒼茫何處跨鯨歸百年有感悲風樹一旦無依足孝忠遺像儼然留故事寸心聊擬答春輝逺遊剩袖如瓜棗海嶽相逢會有期上史相君夀麟閣勳髙誓不磨戟門春靜雀堪羅盟髙踐土尊王切恩入河南受賜多好學丗推同杜預薦賢人道過常阿稱觴何限輿人頌細逐春風入凱歌時自鄧鄙四過楚卿子冠軍宋義墓并序乙卯春三月豫柬如大名道出內黃鎮有廟在民居之南曰項王廟廟之址即卿子冠軍宋義墓也且以往昔墟墓間恍惚事來告子甚鄙焉獨于義之死有所感焉者噫義竒士也𥘉武君舉兵渡淮而西城攻野戰勢若破竹義之力居多及師次定陶再戰而再勝也見梁志滿氣驕識其奪魄後值崩潰果不踰素義可謂深知兵矣至羽請師救趙執以不可觀其籌畫號令攻取先後之方誠上將之略惜不使差肩三傑北靣以事髙祖反區區委質天久厭之楚與羽並驅爭先西向以舉虎狼之秦何其不幸者哉雖然方秦之失鹿也羣雄蝟起以蛇為龍者不可勝計布衣皇皇之士能明目識帝王之真而歸之者蓋有之矣誠未昜一二數也至若淮隂韓信陽武陳平一旦起而盡為楚用𥘉且不知天命集漢而後卒歸于漢功業如此幸也嗚呼俾天假義年脫身項氏䇿杖以歸真主其功名當代縱不能厠三傑之列未至與噲等伍耳嗚呼義何不幸也哉義何不遇也哉因作詩以吊并著豫之感云老項捐軍勢巳孤搗秦遺趙見雄圖竒才惜不遭龍準赤手爭教捋虎鬚日月不為荆楚計干戈空為漢家驅因君重起無依嘆羡煞中林得止烏元齋為仲希賦生平襟度玉無瑕天馬精神出渥窪北海樽罍無暇日德公賔主到通家山髙仰止人皆慕齋用元名意匪誇教子以經平日事不應遺實取其華過朝歌山勢西來擁廢宫荒煙回首接南鄘緬懷藝祖𥘉經野忍見狂童到覆宗野水作聲知客恨幽花含露為誰容千年快意商郊戰流謗爭教有二凶銅臺懷古都邑盤盤據四衝登臨形勢覺天雄歌樓暖響春風細綺陌香銷寶氣空笑著孱王承宋弊至今姦孽擅唐終慿髙誰識神州恨付與衡漳日夜東佑德觀早起留别道人陳彥逹碧桃花露濕衣涼宿酒醒時夜未央浩浩市聲喧曉枕搖搖星影入虛堂春風醉袖愁分手秋雨吟燈約對床後夜月明東北路吕安歸夢半嵇康望東北方半空書嵇康字兩行寄蕭荗先飄瀟襟韻恥咿嗄醉裏青袗兩鬢秋通介不隨襄俗受清貧當向古人求城居真似玉川子鄉思空懷馬少逰蚤晚臨漪亭畔月一樽重為紫髯留晚菊竹瘦松枯怨歲寒為誰含露彂幽妍踈花儘秀開何益晚莭能昌固自賢採擷落英悲楚客破除秋色靜斜川不辭潦倒東籬下桃李成蹊世舉然聞詔灤水嵩呼萬歲觴綸章飛下紫泥香九天空有風雲夢萬國爭依日月光草木變衰元氣活乾坤開霽老隂藏兩都耆舊欣相告四十年來未省嘗陽穀道中有懷黃石公事寄呈敬齋姚公雪齋請益𥘉心在東郡趍庭宿願償黃石有書開帝業布衣無地著恩光自慚國士思圖報敢暴孤懷不自強巾卷在庭循誘際佩懷言行愈難忘趙御史挽章振藻儒林起趙宗殿前一賦已摩空筆參造化陽氷篆氣屏權豪御史􅍡飬老正期來祝哽招魂何意入新宫影堂一拜情瀟慘瑞露香殘翠竹風先生比化甘露降庭竹上上王翰林白衣如鵠禁闈春九萬曽搏北海鵾獨翼龍顔潛代邸親承雲錦織天孫兩朝耆德尊元老千古雄文説赦恩寂寞黃金臺下客詠歸心久在龍門夢受庭訓其中頷景二聯蓋先君之意云老月驚風夜色蒼羈魂明隨几筵傍音容恍對如生在教戒無多止義方芰歜似傷時祭闕松楸應念墓田荒牽衣未畢城烏起曉枕縱橫泪幾行贈孟文伯秋月堂深劒履寒相逢一話破春顔心君意豁驚囊頴豹體文竒見霧孤節共髙殷侑壯片言誰拔子卿還笑拋燭影金叉夢長繞天墀十二間壽姚宣撫咸池朝日覩離明羽翼功髙見老成相體共推安石雅襟期全淂伯夷清黃金眼冷燕臺望赤羽心馳魏闕情鄭重一杯千歲酒調元消息在新正周仲寅處覔貂帽炙手權門已強顔蒯緱未免向人彈晨鐘聲裏霜侵鬢蘭省臺邉雪滿鞍貂恰擬從公子覔客床應念廣文寒何當花影烏衫側一笑春風拍畫欄邢夫子拜慶詩軸對君如讀開元報歷歷聲明見典刑欵曲每憐名父子顧瞻疑是老人星一言楚獄隂功厚百世名談汗簡青濵海歸來非我志春江乘興看浮萍鎮州懷古趙武雄圗不可尋風煙東接九門深炎涼到此分南北戰伐無情自古今彈躡流風猶戰國椎埋遺俗帶燕音劒歌不遇平原客落日滹沱動旅吟祇謁昭烈皇帝廟一劒功成百戰埸三年章武事堪傷力扶漢祚圖燃燼規取劉璋出侮亡若論託孤徒啓篡試評含泣到分香秋風一掬宗臣血五丈原頭落日蒼燕城書事二首都會盤盤控北垂當年宫闕五雲飛崢嶸寶氣沉箕尾慘淡隂風貯朔威審勢有人觀督亢封章無地論王畿荒寒照破龍山月依舊中原半落暉朔風千里捲孤蓬斗酒難澆磈磊􅎍清濁滄浪知自取蒙茸狐服竟誰從燕臺坐老黃金客甲苐爭髙白玉鐘撥土便成千尺幹露恩初不負嵓松望西陵漳川北岸望西陵馳道東連講武城將略有餘開戰伐墓碑無謂自題評一棺何在彌天力九錫徒誇盜漢名千古遺墟冷煙底定軍山樹拂雲平牧野道中野人川浴振裳衣况接恩波沐鳯池莫訝出門何刺刺須知去國自遲遲河橋飲餞無千騎文物聲明又一時有淚不揮離别際西風空送鴈行悲奉送平章趙公赴闕庭之召少答省檄見招之意云龍斾南還沸捷音漢臺凝望幾登臨洗兵未用挽天漢入夢應知有傳霖暖日睛消青海雪春風重掃黑山隂君王若問來歸䇿為説虞皇待象心贈鄉先生韓義和草服黃冠玉練顔一臺天地市朝間飄飄野鶴雖無繫戀戀鄉情尚未慳幽睡不妨紅日晚青山誰似白雲間何當一劒飛空去好為留題過故關送常道人子明道士何心作羽流擇音應避物為仇冷風身丗三千界碧落仙居十二樓無地可留雲表舄有懷終結竹林遊因君喚起西逰興滿眼太行黃落秋送劉同知還鎮陽繼士觀韻幾人襟韻似君矦潘嶽間居賦逺遊白雪髙歌南郢重壽山長路太行秋隱居正有千林玉濯足何須萬里流一曲驪駒頓丘北碧雲零落使人愁為王朝顯贈梁邦傑兼簡郝勸農漳南客子王朝顯日暮塗窮仗友生今夏逺投回沁水傍冬索米入共城千金諾重河柬守一府蓮香白璧卿詩藁不須詢幾束溪聲山色揔關情和幹臣今晨所見庚金乘火勢相髙午夜秋風散鬱陶氣錯不調伊摯鼎雨淫空續楚臣騷人占樂嵗無遺慮我覺天刑未可逃除治菊荒還寓目青山城郭幾周遭大風六合塵沙一混同群龍無力鄣驚風旱乾到此誰歸咎天道從中見蔽蒙詩枕夢驚茅屋破山林春老緣隂空雄攴便擬昌黎訟九虎當閽未昜通雨後草堂即事駭浪崩騰點額餘歸來縮首伴凡魚門從席後軒車少鬢自蒼來酒盞踈坐掩殘書懷苦節自鋤明月種秋𬞞鄰人共指揚雄宅只有兒童未喚烏挽季子文一丘宿草縣城東前日花時杖屨同白璧不埋連邑價青燈空負十年功鵩來近舍傷君去麟出非時見道窮修短偶然吾適值不須作賦問天公𥘉從拱把見凌雲天意栽培似厚君大厦如傾梁棟在神交遽爾死生分白駒空谷歸何處夜雨它年不忍聞吾道已窮來者替兩行清淚為斯文絳帳絃歌日沸闐去煩從簡屢為言自春卧病無三月一死埋魂入九原桂實未霜驚早落鳥聲解語惜空喧東門最是傷心地老父哀號血灑轅五年六月𥘉八日夜夢遺山先生指授文格覺而賦之以紀其異分明昨夜夢遺山指授文衡履絇間道必細論能出理文徒相剽亦何顔江流不廢驚千古霧管時窺得一班落月滿梁清境覺紫桐花露濕吟冠夏日南堂即事一雨清涼恰四朝霧絲縈户見蠨蛸病因戒酒成真止辭免書門絶妄交道拙尚憂兒墜簡家貧且喜稼盈郊間庭緑蘚泥融遍燕子飛來輔舊巢同幹臣讀漳濵唱和詩軸草堂舊兩記相尋細嚼漳濵唱和吟白雪調高雖寡和朱絃聲眇有遺音犀寒蒼渚竒逾出氣奪元胎理更深一洗向來筝笛耳坐聽三峽㵼瑶琴髙山仰止為千尋更對佳人與細吟藝絶六鈞俱破的調髙千古得知音靜藏晚兔無窮變法北滄溟不自深客去灑然心境寂滿軒秋氣入絲琴謝人惠瓦甒老雨崩崖為爾關野人携贈入藝齋埏陶有意存三代奠獻曽經備兩階上擁圓吭蹲野鸛中橫皤復怒池蛙鈎深免汝居危地時插秋香慰老懷六月𥘉七日夜二更雷雨大作落日山雲擁蓋幢二更雷起雨翻江六丁怒㵼銀河水千杖齊𫾣羯鼓腔耕壠揠苗秋有望炎官收􅏛夜深降一犂聞説西江上早晚龍移似老龐和幹臣韻雲漏踈星不滿天坐來風雨暗西山不憂鯨鬛翻滄海喜送涼飈入白間蜚不成災休紀異署雖才伏暫知還雨傷旱損俱咨怨讀罷君詩一破顔雨后出門言懷壯年祗死别猶薰老去收藏省一身祿不妄干時有待道從深探理彌真充腸有薺固云苦舉扇無塵可汚人洗我􅎍襟間磈磊門前秋水碧粼粼萬書叢裏自陶薰浩浩堪輿寄一身未靜蟄坯存夜氣鳥飛魚泳見天真學從踐履安天丗要經綸有若人林下幼安應未老且教雙足濯粼粼和幹臣雨晴出郭之什飲散公庭樂亦陶西湖乘興喜同遨河神偃蹇誇秋水山翠空濛上鬢毛乍脫城居驚眼放縱教詩思與秋髙鴻飛燕集隨時處誰羡傭耕壠上豪秋澗先生大全文集卷苐十四
