  text: 秋澗先生大全文集卷第十三
  hash: sha256:f41641ed11c15478797fd53083fdb779e0a77dc22eea0e035933b2d4be4bec25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_013-1a}
body:
  text: 五言律詩哀向書髙公詞維至元十一年甲戍十月壬子故吏禮部尚書髙公以疾薨於位嗚呼哀哉明年乙亥夏四月丁巳考工使者蔡鉉自相抵晉始知公靈櫬歸葬安陽秋口鄉臨穴者幾萬人僚屬士友會哭皆失聲惲辱知最厚嘆斯民之無祿痛知已之難遇自非歌詞無以寓餘哀而露情臆也乃作挽詩三篇表於素旗之末尚兾神靈鑒兹哀悃其詩曰翰學期公淺謨猷冠一時立朝稱極諫連茹愧深知斗舌承天眷風神夢羽儀比揮千字誄悲絶七哀詩思公情曷已漳水日東馳風調翔麟士文章太史辭行身無少玷持論有餘師落日孤忠壯秋風兩鬢絲幾行知已淚東望重淋漓問望群公表枝撑大厦材印窠空瑞錦風憲黯蘭臺反拭驚麟出云亡動國哀千年遼海鶴華表倘歸來枝撑一作扶持送成耀卿尹溫縣時河內連歲蝗旱邑古仍卿采民屎待尹蘇千年留故事一治聽歌𥜗鼎鼐調應切山川慘未濡莫辭淹兩考留潤溉焦枯奉題趙侯禹卿東皋林亭雅性便林壑紛華厭市城庭柯交美蔭好鳥變新聲喜見桑麻長誰知寵辱驚門前輪鞅滿一醉共秋成物我同天壤流年遽代更髙臺方畏景喬木巳秋聲默熟盛衰理都忘悔吝情只須多釀酒時與故人傾今年秋穫早臺逈暮登時野徑人歸晚煙林鳥去遲有來飛蓋客日課讀書兒適意有如此此外安所期築臺連野色架木繫匏瓜舍外開三徑壷中自一家愛吟歌白紵灑酒脫烏紗更喜南窗下秋風菊半華野逈門開早心間起自慵林香芻社甕山暝倚吟笻半醉留佳客深耕愛老農晚眠誰復覺墻外月明舂趙侯敬愛客每云相見稀不辝髙會數但恐賞心違白酒夜來熟黃花香正菲賔僚多暇日無惜過柴扉重謁樓桑昭烈帝廟百里燕南道山河繞帝宫荒村仍故里喬木幾秋風簡册經綸在丹青户牖空寥寥千載下無愧孔明公固安道中時至元六年冬十月巡按四州十月燕南道提封入按巡清霜嚴比雪枯樹老於人尚逺經綸妙須勞撫字頻前林烏鵲盛喧無戀餘春除蝗時被命捕蝗武清縣秋雨大作終日方止千杖呼聲急人懷愾敵看日長旗尾困圍促鼓聲乾人與蝗交戰天將雨助殘東林茅屋底客枕夜來安秋日過濟衆僧舍院靜鐘鳴後僧間暑退初過門無俗客閲古得名書衲潤香留几心清月印疏仲殊襟爽在開口見真如送紫陽歸桞塘時遊孔林回千古文章事江河不廢流苦心公正閏書法繼春秋夢繞秦山逺天教闕里遊會將洙泗教行復丐西周午憩陽城北龍泉寺倦客鞭催急龍泉一解鞍在家貧亦好行路古來難寺古松杉老山空水石寒萬松亭廢久重拂短碑看碑大定問澤州刺史楊庭秀撰真竒作也簡寄龐雲卿時自滑州判改授濟源令軹井千年邑提封百里侯剖繁人有賴治簡事彌優白鳥翻林表青山滿樹頭訟堂歸去早揔是釣詩鈎元日夜燈下即事五十又加三行藏默自諳去年留薊北今歲客漳南官事何容了君恩未報慙白頭青䤥裏衰謝百無堪詠史開府宅鶴超遙華表客吹落故侯家孤潔真仙驥飛鳴稱彩霞困眠依竹石飢啄半蟲沙會待秋風舉巢雲飬頂砂清苑道中野店春風裏行人避繡衣劒華寒有暈山日慘無暉孤隼梢雲下群鴉結陳飛驚鷗無逺泛事外本忘機又作澄清吾有志天意肯從違至元十七年正月十三日已刻出完州抵暮入保定夜未分雪大作至翼日午刻方止偶得此詩預喜歲事之有成也曲逆連清苑相忘兩舍中朝驅塵沒馬夕捲雪填空巳滌崇隆盡仍歌歲事豐小紅燈影底一笑覺春融一作誰云吾分薄所向得災凶答蠡州天寧寺英老灑落天寧老携尊復袖詩逢場間作戲來謂老監司白頂憐鄉土清吟説阿師一杯供客笑聊用當門捶在教頭腦異𥘉不間天彛座中偶得示舜舉舊逰仲賢良醫半載東州客﨑嶇笑自奄事隨時即故老與病相兼發伏遺姦枿褰帷愧具瞻君恩如許報白髮且休添龍門寺寺古僧何在山空石作門碧崖懸瀑影蒼峽掩朝暾不惜山公屐重登謝傅墩一杯須軟腳掃葉暖清尊辭長樂先壠二首已丑嵗秋九月二十六日將赴任福唐拜辭長樂先壠歸宿野竹趙氏田舍且喜聞村之故名因有是作為野竹訛為野緒别逺辭先壠歸遲宿近莊客窗疑夜暖野雨變晨涼遊宦嗟吾老窮居仰歲穰故鄉猶足樂誰遣去朱方展墓過農里㗸恩使逺方氣隨天北轉人與鴈南翔肝膽孤忠在江湖去路長此回當自信不必泥行藏飲食飲食資吾耄行年六十過三升元有料一口不容多過爽心隨滯長虛氣便和不須移遠步聖藥有束坡辭先壠後臨行作義重煙嵐簿人微使節光桑榆雖晚景事業見炎方回轡知非逺趣裝苦未涼交親留少住馬足健秋霜望舍弟消息憶弟居穰縣嗟豫宦建陽三書曽未報一别謾相望喜信占晨鵲清吟夢夜床殘年能幾許長與汝參商後會期𥘉夏遐征動暮秋萬金書渺渺兩地思悠悠問竹過門巷看雲倚郡樓南遊曾有話會上沔陽舟居守縈家纍懷歸畏簡書人憐英蕩重我覺宦情踈緩進需安信頻呼斫素魚後溪溪上月北望想躇蹰送趙克敬任孟州同知豫為待制時穆其屬也趙穆從英妙詩書性所安嚮為太史屬今作孟津官事辦時為切民恬貴政寬老夫江海去州縣莫辭難蕭相國廟在下邑東南五十里郎縣廟在縣北門外下栗東南陸鄼城井邑空圖書秦府夢簫鼓漢時宫喬木秋煙慘頽垣野燒紅數鄉供野祭歲歲不期同火獵自歸德以東皆用此法緑竹連罝逺蒼煙蔽野昏兩傍羅草伴一火趂羣奔從乎遮麛鹿張弓得艾豚縱觀思獵較積柴散燒痕汴堤道中細竹沿堤緑秋煙蔽野蒼路荒經桞子山逺指芒碭勉進心還尼懷歸事叵量縱令空往返猶得看維揚十一月三日宿濉寧夢總帥史子明見教矯矯常山帥相望間楚齊夢中親與誨身外别無提切囑心何朗臨辭乎重携何時揮老淚墓額拜征西次宿遷望紫山不至河廣舟航小堤長市屋卑宿遷元隔楚淮甸舊連邳濁浪隨淸變香粳問客炊紫山前有約抵事北來遲淮安州平野圍淮甸雙城入楚州喉襟開重地鼓角動邊樓聞鴈思鄉信歌魚撫劒緱此行安所遇江海任浮鷗是夜驛亭無抵待故有歌魚之句寶應道中共説淮南冷今冬氣陡增雲垂梅野雪風結漕渠冰事弊尋常密吾襄用不能據鞍時自笑休苦直如繩出寶應雪中舟行避冷乘官舸風篷去若奔兩陂雲影黑一片雪花繁景與詩相會寒無酒可溫泥橋投宿處寒日暮鴉昏髙郵道中二首築甬餘三百灣環護漕溝重橋穿寶應一岸入髙郵水陸開亭轉煒煙靜塞愁腰纏無十萬官遣上揚州湖漫通淮水盂城隱楚防百年勞士卒一擲失金湯陸走無關禁舟行半海商此邦多秀彥國士説秦郎召伯埭謝傅留遺愛千年尚不忘埭名同召伯郡號屬維揚煙火今中土干戈舊戰埸離離平野樹人指是甘棠一作斷橋穿市過十里藕花香又一作野人誇藕脆滿口嚼氷霜揚州贈史左丞拔都時宣慰維揚淮海維揚域金湯勢尚存車書歸一混鯨鰐失孤吞樓鎖行雲夢岡環洗玉盆治安君有䇿長嘨出東門衢州我歷江南郡凋殘不似衢兩坡稱閙市一炬變荒蕪反側誰無識瘡痍意未蘇殷勤陳别駕不厭拊循劬早發三衢驛開關放曉裝江風吹帽側山月照衣蒼馬渡浮航水雞號野店霜爛柯聞有局無分躡仙梁州南三十里有天然石梁長約數文謂之爛柯仙界玉山道中石徑行無盡清溪送馬蹄啾啾啼野鳥攃攃喚多泥松暗增晨黑川斜入望迷比明三十里巳過玉山西常山道中晚行土蹬盤黃嶺人家住碧峰焚林人逐獸競渡木為龍水穫無過夏山行不識冬斜陽留絶景不放晚煙烘信州道中控帶溪山嶮襟喉福建門吳音饒鵙舌越鼓聳邊屯岸闊浮航小城卑夕靄昏不煩詢土俗煙嶺互相吞石溪道中赤嶺鉛山界清溪野店橋株林煙漠漠沙路雨瀟瀟馬慣行安嶮禽幽語弄嬌西山晴更好詩思苦相撩鵝湖寺已丑冬仲望日雨中過此坐間為主僧希聲留題希福州人湖頂開鵝沼川形偃法船寺留金粟影僧結草鞋禪地勝多珍木山空響夜泉寺僧談逺迹張本永真年唐順宗年號閩中錦繡無諸國曽經漢武荒祝融開火宅颶毋擅風囊淵萃逋逃藪人依虎兕鄊閩中不識雪何有豸冠霜閩清湯池留題熙寧十年八月赴福唐元豐元年九月𬒳召還朝往返皆經此十五日南豐曽鞏題僕以大元至元草六年已丑秋按部來閩與公裔孫沖子同事明年秋以理去官與先生往還時月略同曠世相苻有似非偶然者摩挲蘚刻留詩而去重九前四日小子惲序潦倒嗟吾耄淹留近歲終客星回海上桂棹發閩中逺宦無遺纍歸帆得順風湯池看蘚刻往返似南豐建寧北苑宋寧宗曾開邸於此北苑繁華歇名猶博望尊野花疑靨珥徑草半蘭蓀軒縣歌鐘暗宫樓峻址存我來凝眺久喬木晚煙昏望嶺溪嶺無千里﨑嶇半月間事機須勇退天意許生還順處從多厄趍時免強顔越禽欣我往長路語關關鵝湖道中細路山園靜煙蘿野寺濃俯躬升峻嶺仰靣看喬松道在從時背才踈助性慵有身官不屬一任老龍鍾是日得臺報故云題柯山寶嚴寺璧同遊者山長趙文龍前教授徐夢龍兟友教官余性道二人皆廣信人徐有文筆甚健府推官保定張式儀卿别駕東平陳圭國寶子公孺侍行至元庚寅冬十月望日秋澗老人題龜阜西南麓名山世未雙爛柯仙有局絶觀石為矼事去空遺史風恬愛此邦來遊情眷眷留詠寄僧窗喜得陳張友來遊興不孤江山開怪供風月閟清都閲世驚棋局看題倒酒壼暮歸應稇載只欠畫為圗首夏家居即事懶幘從鬅鬢披衣任曵𥚑都忘身外事貪讀意中書比老心能爾雖貧樂有餘繞園欣細履樹影緑扶踈竹茂資泉潤花榮藉圃沙鈎簾來舞燕鎖樹護栖鴉客至留酤酒吟長待煮茶幾時容却掃一向似仙家方竹杖節徑嫌圜甚形方與衆殊任從炎漢斫不變魯人觚心曠謙中守姿堅義外扶蜀笻非我友釐簡乃吾徒枯燈花步入東瀛丈吟看北檻花春風收翠葉烈景發炎葩一氣元無間孤根乃爾差鄭箋𥘉不及黨詠只空誇送杜簽事之任江西憶在齊州日同聯憲府鏕群居推健羡孤繫更超遙此去雖殊域規為秪舊條將身能道護所至儘風標和幹臣重九日兩中醉歸韻髙會有成約寧為一兩妨烹雞酌白酒煮芋臭秋香落帽同嘉興霑寒等陛郎醉歸從健倒聊復少年狂今歲登髙節佳招兩有妨閉門時隱几掃地靜焚香安得黃金酎同傾白首郎醉鄉多樂事何祗發詩狂事一作地舍弟仲略題孫鞬郎名字説後訓汝諄諄意竒文見乃翁洞堅威可大棲鵠體須中既應開先兆當知矯揉功逺期遺近效羽夾看摩空贈欒子英詩子英冠州人時為農司從事子英外郎孝廉士也十年前豫與共事於沙麓者凡兩月今歲秋將命過衛踵門來謁話間因及親喪事弔以伏臘二氣遇之者固異然殁而不壞及膚髮猶生如欒氏二親者蓋亦罕見豈乃翁與媪生有所積而殁有以孝心之所感者然邪乞言顯親書此為贈其辭曰孝感元多異欒翁見化形𥘉終神不昧將祔兩猶生盡謝青蠅吊堪書翠琰銘百年風樹底悽斷蓼義情贈嶽錬師仲和今年八十四健勝去年時豈假還丹力沉潛繕性辭骨清儀野鶴神爽見毫眉更有虛明處物來多預知月桂花名誰品藻歲與月華新不為孤根細能留四季春色深丹竈術葉映碧苔禋我近雕攔側終朝倚杖頻賦白鷼羽族幽間品霜毛縷黑章聳冠矜耿介蓋用棲止不雜於象禽也顧影惜飛翔去備虞人貢行觀上國光刷毛琪樹底無夢海山蒼京華舊俗歲終草四日諸神上界夜家人設祭遣奠致詞且有遏惡揚善之囑遂作小詩庶見風物五祀開三代人間閲歲華交更同選調遣奠具餳茶天闊神驂馭燈清喜結花逢新如有問萬一善相誇和曲山冬夜即事韻二首清苦周南樂居官素有聲老天何汝困公道欲誰明瓶罄憐三白衾寒盻五更捋鬚儔賞識吟苦撚霜莖雪夜清無寐瓶笙細有聲茶鐺吟待熟虛室白生明白髮催人老青陽迫歲更湛思盤露重何意望修莖奉酬舍弟仲略見竒之什隔闊三年别回還萬里程細吟違逺句深見友于情路眇霜風徑吾衰體履平家貧渠亦老一動不為輕挽宋耀州漢臣二首每有遊秦士殷勤問宋侯相望無兩紀一别便千秋斗酒新豐客堂封渭水丘題詩何限恨老淚不成流斗酒新豐客龍門接上遊相望才兩紀一夢便千秋銘德辭無愧親民政最優兩行知巳淚撫卷為君流辛卯歲十二月望日大雪連明信宿開霽日色暄妍如春乾坤清淑之氣肅肅可挹數年來未之見也作小詩以紀我覺今冬氣全關燮理權一寒嚴往歲三白見豐年地掩浮陽靜天開麗景妍不應薪米價愁計畫義錢五加皮酒服食閩中士加皮説異常精華含五氣輔益最多方不羡黃金載長澆白玉觴豈惟除濕痺志意日安強題杜氏六子名後六子名三老餘芳見故家翰音鳴彩鳯翠茁映蘭芽出拜濟南日今看漳水涯一謙能事畢題詠復何加燭花詩李真人索賦燦燦銀臺燭淸光散彩霞誰分壼內景來種火中花一轉芝垂蓋孤芳蕙茁芽殘年如喜合丗事任無涯火􅼺兩手寒來瘃摩挲賴汝溫形骸雖土物氣勢炙權門燕王休誇暖湯婆可比尊心兵全不起留在谷神存題甘河遇仙詩卷愡恍甘河遇生龜脫慤時二仙形姓字一酌悟天彛入道兹玄徼尋源接上池崞山文最雅略不見諛辭和仲常牡丹詩并序三月草三日飲中作仲常良友氣溫而德雅余愛之重之未有擬諸形容爰因賦詠遂見賡歌故情之所鍾有不嫌於太切者其詞曰漢殿承恩早金盤薦露新色酣中省藥香重錦窠春儘殿群芳後誰辭載酒頻淸如司馬相也作插花人題郝氏世德碑後其嗣侯今為蜀省參政所謂和尚萬户者是也故國非喬木雄藩有世臣河山盟帶礪勳業畫麒麟白羽沉蛟匣靑雲滿後塵雅歌平日事遺愛在斯民草昧經綸際恩威見郝侯功成韜將略德洽配汾流金甲春農野黃雲畫角秋衰榮何百世千古仰山丘八月十二日夜病不能寐步月逹曙官事未易了癡兒昧獨勞病多和夢異蛩若為秋號事業靑燈苦星河紫極髙帝城人海裏泛泛一漁舠大行皇帝挽辭八首至元三十一年歲次甲午正月草二日癸酉夜亥刻帝崩于大內紫檀殿既殮殯于蕭墻之帳殿從國禮也越三日乙亥寅刻靈駕發引由建德門出次近郊北苑有頃祖奠畢百官長號而退臣惲職在詞館追思不巳作挽辭八章庶幾鼎湖攀髯之意其辭曰欒水龍飛日長楊羽獵時天顔凡五見雨淚遽雙垂化日中天赫隂靈萬國馳何由知帝力耕鑿樂雍熙晏駕才經宿幬車出建門千官紛兩淚六馭迅龍奔雲氣蒼梧逺天山禹穴昏依光瞻日月頌德象乾坤威破群雄膽恩藏四海心聲明三五盛垂拱九重深國論多儒斷天機入睿臨小臣𠢐面血無路灑松林聖神由廣運纂述到無加禹甸逾輪廣殷邦極靖嘉遵臨三紀久遽陟九天遐白首金鑾舊長號自倍嗟端月辰臨酉淵衷弗寤興紫垣蓬彗學𣏌國駭天崩法從嗟何及朝臣痛不勝聖靈知在上春草認封陵去歲回鑾輅旌麾擁萬靈今春辭畫翣弓劒閟泉扃黼扆虛瓊島雲龍慘帝庭是夜殿庭間有光煥爛若燈燭然良久方散詞臣思輔報淚濕簡編青論治方堯禹求賢到釣耕民區無二上廟算有竒兵萬寓風煙靜中天日月明小臣思頌德終了是強名帝系三宗上麟經一統尊火盤承正據虎落入雄吞窮蹴南交獸奔騰北海鯤不教擒一索遺恨付皇孫題兾州馬同知拜慶詩卷時九十七官鄉里時恩不轉矍鑠征南將忠勤為國知任官無調轉享壽到期頥錦爛行春里香生拜慶詩滿前蘭與玉又見福生基秋日下直玉堂下直玉堂廬間拖過市車秋風殘暑候積兩暮涼初撥置難行事尋看未見書萬緣前巳定不樂復何如餞安南國王弟回鄂渚萬里朝天道歸軒寓武昌觀光吳季札助順漢閩王寵渥心逾赤詩新桂有香庾樓回首處秋月興元長雪夜聞鐘元貞元年冬無雪十二月草一日夜大雪喜而作此雪屋燈淸夕踈鐘定夜鳴撞餘周逺韻聽久喜雙淸爐火留孤坐茶鐺待一烹巳眠猶未寐詩向枕邊成王氏拜慶詩并引集賢大學士王顒太夫人張氏元真丙申夀八十有八視聽聰明起居康健剪製纂組之事老猶能工正月十四日蓋生辰也中書右丞張公以升堂拜禮義重諸人前期誕彌啓之太毋特召見宫閣存問再四嘉其賢淑留宴賜幣下暨二孫皆霑寵渥明日翰林諸君相與舉觴上夀百拜獻詩猥當卷首九秩康寧夀親承燕賜恩香融彤管煒春滿繡輿溫世與名郎孝天全五福尊佩環聲合度清響徹宫門賈仲和慶八秩君前來魏國文元公逺裔其家丗備見遺山所撰千秋後録太史徴文獻隂功滿諌章諸孫冝曼衍八秩見康強孝義聞東魯簮纓慶北堂千秋遺録後奕葉又生光慶閻庭直夀毋詩洗髓黃眉夀儀尊五福全雍容班姆訓瀟灑謝庭仙致樂孫能飬居官子更賢霑恩行有日香重誥鸞箋送喬元朗疆理𥘉無外乾坤大統齊漢恩同一視星鳥望中低海甸沉銅鼓天書坼紫泥皇威能逺暢歸斾拂雲霓榕樹南來過劒府嶺岸樹多榕繳結如蛇蚓堅凝比柏松葉芽生挺代隂影散芳濃鶯羽群飛日凋零却是冬五言絶句贈髙邑趙教諭坐久槐花落黃金滿石牀一杯春露冷情話不知長冬藏和曲山詠懷嚴韻吾道有汚隆人情逐冷暖自憐心事佳不覺天機淺一作克教私意無任使天機淺貧居固鮮歡漏盡行當止只有若吟心時時為商起巨鈎釣鮮鱗其勢兩難著何當掩長圍為君獵麟腳却掃苦未能人事日復日泛愛聖所稱亦復論損益才踈詩倦吟年老酒當止君看古井波澄湛自不起安坐此心與天遊老我無繫著坑頭有春溫安坐收兩腳讀史紛紛世利塗翳翳桑榆日賢哉向長心一損勝三益詠梅折來何處梅自擬孤根暖寒花本強顔風味空不淺已亥歲門帖子不羡陶朱冨非悲阮籍窮愛君思道泰憂國願年豐跋吕丈扇頭井道飬不窮濟人非望報過飲投青錢取廉非正道秋雲自激行雲映空明㛪妸翻輕轂風吹不成雨日暮空相逐夢中得燈殘細暈黃月落孤窗白惡夢不成眠幽魂驚撇捩出門二首因酒敗佳意方知百拜輕忘機甘李喻重賦赤霄行踈拙傷吾性傾危見俗情出門山自好秋色浪峥嶸望淮朝日慘無色昏昏水氣間到淮猶數里隔岸見尖山夏夜庭竹影扶踈清風晚騷屑夜涼人未眠卧看窗間月出門東風吹隂霾朝來晴霽開抆眼門前去青山城際來雨後看山西山色蒼蒼雨後如新沭天髙晴意寬歸雲滿巖谷夢中得持酒濯利劒青蛇光黯然金鞭鞭駿馬汗血沾錦韉喜雨癸丑六月旱草木變萎黃夜來聞雨落起舞亂登床秋夜西風入庭樹掩冉衆葉鳴幽人不能寐愛此秋雨聲中秋制中對月露冷庭梧墜天髙月影長清光不堪掇和淚濕衣裳披襟涼風東北來蕩盡中夜熱起視河漢星微雲淡明滅秋澗先生大全文集卷苐十三
