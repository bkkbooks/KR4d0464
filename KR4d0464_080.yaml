front:
  text: 秋澗先生大全文集卷第八十中堂事記序余自稚歲讀書頗有志於丗甫及壯年彈冠應聘適際夫風雲慶會千載一遇之時荷囊載筆從事其間以至密邇論思酬酢吏務霑香紅藥之階接武雲龍之地若有所遇而大有以為也不圗爾後蹭蹬於仕途者草餘年回視嚮之鴈行而請署者川泳雲飛觸目皆是比量薄分蓋有無非命者况今日就衰謝百念灰冷有求田問舍躬耕種樹而巳然覺吾􅎍中耿耿者尚在及閲故書復得當時直省曰録觀其諸賢聚精會神于一堂之上所以開太平之基播無疆之休者班班可見因略為修飾題之曰中堂事記庶幾有閲是編者知豫生長明時雖無寸輔亦嘗饜邦家之光為閭里之榮也藏之篋笥固不敢以千金享之異時有索野史求史臣中舍之所遺逸者不無一得于斯焉至元二十四年丁亥歲秋九月七日前翰林修撰同知制誥兼國史院編修官左司都事秋澗老人謹序中堂事記上庚申年春三月十七日丗祖皇帝即位於開平府建號為中統元年秋七月十三日立行中書省於燕京劄付各道宣撫司取儒士吏員通錢榖者各一人仍令所在津遣乘驛赴省惲亦忝預其選是年冬十月至燕以三書投獻相府大率陳為學行巳逢辰致用之意頗蒙慰奬令隨省通知計籍使綜練衆務日熟聞見焉時行中書省官四員丞相禡禡資嚴厲凛然不可犯初與趙用行六部於燕至是就用為行省長官平章政事王文統字以道大定府人前經義進士平章政事趙璧字寶臣西京懷仁縣人賀弘偉能任六事以氣量雄天下參知政事張易宇仲一太原交城人資剛明尚氣臨政善斷符士以誠忤之不復與合左右司郎官八郎中賈居貞字仲明真定獲鹿人金尚書右丞益謙之孫資聰敏有左氏學通諸國譯語郭榮祖字榮叔燕人部令史出身廣詳雅能酬應事變自大興府參謀為今聀晉汝賢字才卿燕人班祗令史出身資隂克有幹局貟外郎王德容字仲寬河間將陵人部令史出身張桐字子華燕人班祗令史出身邢敏字公逹京兆人部令史出身都事劉郁字文季渾源人王德輔字良臣陳州商水人經童出身提控令史李惟寅字舜臣西京人前進士楊文卿术甲謙字和之遼東人楊恕字誠之左房省掾馬璘字文玉燕新城人後參知楊州行省事樂思齊字齊賢燕人王文藯字仲玉東平人終濟南經歷官劉傑字漢卿益都人王守正字賢之新城人宋筠字庭秀大名人楊顒字伯榮鎮之無極人今為京兆屯田總管楊湜字彥清鎮之藁城人楊珍字國寶鎮之中山人蔡玠字庭玉相州人馮處厚髙唐人髙明字柔克汴梁人陳鼎字取新真定人閻沂字巨川行唐人李壑字𥙿卿相人右房省掾袁𥙿字仲寬孟州孟津人終順德總尹李鼎字器之相人劉作字述之柘城人吳璧字國器邯鄲人張安仁字壽之宋璋字國寶柘城人梁德佐字輔之燕人張適字濟之平灤人劉濟字巨川周鼎字器之燕人張楫字巨川覃懷人架閣庫官二人邊字正卿德興人經章出身王和卿太原人典吏四人劉謙字伯益盧慎字順之洺州人
