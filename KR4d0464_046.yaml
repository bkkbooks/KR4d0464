body:
  text: 題戒仲希出金源卋胄少以孤兒隸羽林宿衛者有年為人慷慨尚風誼善馳射北渡後折節讀書樂與士夫交遊賙急解紛空蹶裝槖奔走風雨不少顧惜至於識名馬善隼羽知常通變談笑一卋翩翩為佳公子也如遺山先生一代巨公雖泛愛無間翰墨之作𥘉不輕與至于君題其居曰元齋繼其德曰吾弟復有篇贈稱道其志向非尚友重義得如是乎自是完希之名軒翥於河朔者三十餘年非不顒也豫既冠與君傾蓋於酒壚間一言定交伸眉吐氣歡若平生及合好議采曰夷貃之道吾不取也此又拔出流俗義之所可重者嗚呼君沒卋巳逺撫卷懷人不覺增嘆然義之所在猶耿耿也汝曹固當思其所尚求其所當重者充類至義之盡昭然使身名齒録於賢士夫之行曰此則某之孫也則某之甥也是則汝外祖姻於吾家之意也不然得衛公故物知其賢而不踐其迹徒以服器為丗家傳嗣之寶非所望于汝曹也作題戒草四年丁亥三月伯父秋澗老人書卑姪阿冝其聽之母怠名王氏子説王氏子嘗以小學從豫一日耒求其名與字因得讀張户部復亨所撰其祖墓碑乃知王氏自逺祖巳耒以文章儒行世其家於保者也小子今吾語汝汝曾祖在承安間擢巍科為一時名卿明昌𥘉官真定録事參軍政聲藉甚汝父遭罹世故以孤身卓爾自拔見知於漕臺周矦騰揚仕版若有所為而不幸蚤丗良可嘆惜然人有隂積者必有陽報苟不在乎身必及其後人如汝髙祖教授君志竟不遂厥類錫於爾曹今汝父復罔克所紹而止於斯而汝也今亦孤童子方保持門户為事長身如此所當願而恭柔而立操惟危之心念肯搆之戒日切一日吾見王氏之慶未艾昭然之報將不逺而復可不勉旃也哉故用􅌟名汝以德基字之中統甲子夏五月望日書忽治中名字説豫官御史時聞尚書工部郎中今治中别乘合刺思喜功名樂善言而與士君子遊某嘗望君於稠人中飄然有玉立雲飛之舉欲願交而未暇也至元壬申秋得同僚平陽相接如平生歡共事既久愛其材識通敏廉介有守處心臨政多中事冝殆與曩聞無異一日請名於豫且求其説豫曰上古之民林林而生系出一本聖人見其厥類蕃庶惡夫無别於是因官因封或勳或守王父之字賜姓氏以明之立名諱以識之表德業以貴之又以性有剛柔進退好惡之異而寓抑揚與奪之義焉君姓忽氏蓋父字也世為唐瀚海軍都護府人其國郊於乾兊之間掾雲天之雄故其人多沉潛剛克內明而外毅吾子乘彛竒特超拔倫萃表著於一時豈非能明其𥘉德而光揚於外者乎傳曰德明惟明其是之謂歟故以德輝名君而英甫字之蓋英者德之光發見於外者甫者男子之美稱也吾子以為如何乃書以贈李氏子名説故河東連帥李公以忠勇佐征伐建殊績受封河東蓋三丗矣有孫一十四人一日元孫萬户某率諸弟相過鴈行玉立映照前後與之語挺然有燕雲遼碣之徑氣吾知其先代之澤淵流而未央也次五弟因求名於余豫以謂李氏丗以武顯繼武而善可守者其惟文乎故名之曰嗣文以文叔字之傳不云乎文武之道未墜于地在人賢者識其大者莫不有文武之道焉李氏子其服之無斁至元十年歲癸酉前六月十一日豫自河解北還過絳書于園池之華蕚堂王氏四子字訓中丞王兄子𥘉一日因子名而告豫曰人之生丗貴善良而材用譬夫羊豕性馴而乏可用之資虎豹材逸而無可馴之理唯牛與馬乘服耕播性馴狎大有濟於世故弱息四人取其義名之曰犄犆牥犅吾友其為我字之豫即訓曰德驎德駼德騵德駺雖然牛不駕習則有破車之暴馬不調御則有泛駕之虞士不學習至跅弛而無所用四子尚涵飬其德性修治平聲其才學異時任重道逺無以襟據貽誚兹汝父之志也其勉旃母忽書字訓以貽之溫總𬋩字説古人制名與字本以假代稱道因其材而進退之非欲求勝而滋美也溫生世將家容止雍雅殆素間於詩禮者嘗攝從戎事及兄之子衣甫勝即以職卑之時人多其讓一日踵門來謁載拜而請曰𥘉膺字仲傑傑也者智過萬人之謂竊意聲聞過情君子恥之且於名理又弗類假而稱之誠有所未安者願先生易厥𥘉得因名衍義可用以自警者為稱則所貺多矣豫嘉其情實而辝遜卑牧而不自矜也乃以大賢之事告之昔顔氏子得一善則拳拳服膺而莫之失服膺者能持貯心胸以為終身之行用是夫子至興其殆庶幾之歎豫因為之説曰人心虛明而廣大衆善畢具惟其人欲靜盡則道心孔昭道心者何四端用中而巳雖然仁為體三者乃仁之用而敬者又禮之實克巳復禮庸焉而入德尤在視聽言動之先惟其善擇能守從容中道則此心弗曠既有物而且有則矣傳曰井受和白受采忠信之人可與學禮苟無其質禮不虛行况乎天姿溫粹樂善而克恭者焉故敢昜傑曰禮以仲敬字之庶幾因名衍義用以加修者歟然前賢致恭不以聲音笑貌為事欲誠著于中而藴篤實之光氣彂于外而粹安和之色道見于用而極靖嘉之方其事上則忠戰陳則勇與人交則信將見名實兩得禮容侃侃與大賢同歸異時詩書謀帥豈唯投壷雅歌而巳哉吾子以為何如膺曰意中事先生能言瑩如是敢再拜受教于是書以為贈張掾史名説元貞建號之前歲丞相伯顔公受開府儀同三司太傅知樞密院事許開幕置屬于是選擢材俊以崇時望主安定簿張楚者以掾史進一見即蒙眄睞是歲公以疾薨謝于位嗚呼哀哉楚追感殊顧懷思不忘至圗公像奉之懇集賢翰林兩院題讃俾昭蓋代亦來敘哀徴辝言念勛德辭情慷慨義形于色因知楚河東九原人少失怙恃飬於外家徐氏孑然以孤童子從許公度學氣兒修楚早負幹局甫冠先生以楚訓名是用勉夫修習俾趍于成今以事為所著者論之可謂樂事大賢知恩所自以義圗報有始有終者也其在衰俗誠可嘉尚豫乃悚然而器之曰楚今當作礎矣既而來求其説乃告之曰古者制名皆存義例有像其類而命之者因其材而篤之者或審其剛柔而抑揚之者或察其氣熖而取與之者非徒觀美誇大而巳也今豫以汝美在其中用見于外篤實輝光有不可掩焉者若夫氣志堅凝如巨石出霧洞逹無隱既敦固其材實復砥礪其廉隅方嚴正大奠夫鰲植之下而收任重持久之效者是正汝之責也昜曰介于石不終日貞吉其是之謂乎嗚呼礎乎其聽之無斁二年丙申重九日敘説儒用篇士農工賈謂之四民四民之業右士為最貴三者自食其力能傃所守時雖弗同固不失生生之理唯士也貴賤用舍繫有國者為重輕蓋其所抱負者仁義禮樂有國者恃之以為治平之具也國不為飬孰樂育之君不思庸孰信用之不幸斯道中微我玄尚白厄窮遺逸隨集厥躬此士之所以遑遑於下而可吊者也幸有連茹為引用為主張者曰鄙儒俗士烏足有為也切嘗惑焉謂有用也時不見其所用為無用也一為時用卓越宏逹莫可企而及者烏可以時偶無用概有用悉為無用之具哉國朝自中統元年巳來鴻儒碩德濟之為用者多矣如張趙姚啇楊許三王之倫蓋嘗忝處朝端謀王躰而斷國論矣固雖聖神廣運於上至於弼諧贊翼㑭之休明貞一諸人不無效焉今則曰彼無所用不足以有為也是豈智於中統之𥘉愚於至元之後哉豫故曰士之貴賤特係夫國之重輕用與不用之間耳嗚呼國之所以為國者有其人也今天下之心同然而深惟者天統大開六合同軌及其選一材取一士舉目茫洋無所於可正孔子稱𣏌宋二邦無足徵證蓋傷其賢既不足文典之傳有不可強而為者復以時務論之今選行於上材乏於下是最有國者之所當病故唐取士之法歲萬人為率猶三十年可盡况法未備而無所取哉又老成先進文學經制之士學海內而計之不三數人耳故州郡所謂學校勉勵修進之方從而無實掃地何有嗚呼儒乎其微至于兹乎斯文在天無可絶之理是恐不止不行不塞不流之意耶然士不用則巳如或用之固非一朝可就必須廣學校祿師儒振士氣而勃興設衆科而肆取故得人材輩出以膺文武之選以成久長之業斯則適其時矣任是責者庶聞之油然有蹶於中𫐠儒用篇吏解甚矣吏之不學取之無術也紛紜苟且自進自退據其名則正較其實則非而官之形勢衆之情偽習不相逺也故諺曰畫地為圄不可入削木為吏期不對此蓋傷其持心近鄙之之辝也然非吏之性也勢也今夫一縣之務領持大概者官也辦集一切者吏也簿書期會之所交錯也利害督責之所相須也煆煉酬酢日復一日大體細行有不遑顧者少或蹉跌輕則窘折困辱重則榜責退黜吏之為役賤巳極矣安得不持其事而逾急欺其心而後語哉或不經事昧於自信聞其名則憎見其人則昜意復少忤至忿嫉訾毁不以禮貌相接非也是皆不澄其源而貴其流之濁也若使上之人能清心省事一其法政簡而不擾有傑黠苛刻急劇苟且之心將安所施哉余故曰非吏之性也勢使然也若從其流而責之所可鄙而傷者甚矣今天下之人干祿無階入仕無路又以物情不齊惡危而便安不能皆入於農工商販故三尺童子乳臭未落群入吏舍弄筆無幾顧而主書重至於刑憲細至於詞訟生死屈直髙下與奪紛紛藉藉悉出於乳臭孺子之手幾何不相胥而溺也以至為縣為州為大府門户安榮轉而上逹莫此便且速也人烏得不樂而趍之嘗聞近代吏之出身難矣由州而吏貟由吏貟而部掾法侓乃筆人材行止舉明有官否則結罪然後考試有司寸步不遺設法既嚴百不選一猶恐中非其人害於而政以今觀之其可鄙而傷者當如何哉且兩漢之丗丞相御史下至三槐九棘蔚為名臣者多吏也固必學之有素進之有道𥘉不若此紛紜茍且嗚呼弊極而變變則通此必然之理也然非持衡者孰為立法而與革之哉作吏解篇田訟民之致訟者多矣未若田訴之未能決也自井地散而為限田限田變而為無法此事端之所由興也又以兵農勢異兩有相犯各持其是而不相下治兵者曰吾軍刀之所自出親民者曰吾征賦之所由辦居上者若是為下者將安適從至官諉吏而搏拏吏視賄而與奪牽制蔽欺卒無定論幸有審兩造而克荷者情裁臆斷明同仁一視之公釋纍歲積年之弊往往迫於形勢顧後患亦因循而莫之問故僥幸者覩其如此又以彼弱易欺也詒冒􅐁攘靡所不至甚者損衆益已閧一方之訟必𬒳擾而後巳以致乖戾抑滯之氣鬱積於上烏得無水旱之異哉水旱之來又弱者所先苦𣣔政能行民之不困也難矣余嘗讀大雅綿之詩虞芮質厥成文王蹶厥生蓋言二邑訟田往正於周及入其境履其庭禮讓之風無或不在二君感而中愧生其固有良心相與罷歸棄所爭為間田自是歸周者四十余國先儒以是為西伯受命之符冝矣孔子曰能以禮讓為國何有其是之謂歟嗚呼三代而上教有餘而法不足兩漢而下法有餘而教不足教不足法猶足治也矧教與法俱至闕然者乎民不險而訟也又難矣施於今者宜若何曰惟有明其教一其政立其法干其上然後擇官宣化守其法于下庶幾民志日定而訟者少為之熄矣述田訟篇黃石公説秦惑李斯之説燔書阮儒以愚黔首故一時豪傑之士醜厥德而耻食其粟者多矣如蓋公盧敖倉海若啇山皓皆是也若黃石公者後丗獨以鬼物為疑非也觀圯上一節公蓋逆知其炎劉將奮非良無以輔成漢業雖然顧狙擊吕政於博浪沙中良之氣固以為蓋丗雄傑惜有其材而未至者學耳及一旦相值輒令取履跪進旬日間往返三至先折以禮繼稱其可教特重夫師道之傳抑使動心忍性徴於色發於聲而後喻也兼奉執履杖弟子之職非有儻慌可怪之事而班固亦以非有贊焉設若良欲神其所遇不過使髙帝異其非常平時智計皆自神異復不輕其所授教而巳使是公果有其石我巳之語亦不過古人事了徑去剷迹韜光今千載而下仰其髙風可聞而不可詰也又嘗讀公遺書皆明哲警抑之道殆黃老氏之精英者也不然胡自托於荒丘􅻄確而為是傃隱行怪之舉哉由是而觀東坡稱公為秦隱君子可無疑矣距祠東里許有阜曰黃山下有孔穴其巔巨石嵬立土俗相承云公出於此尤為不經云至元甲申歲夏五月余覆災祠下顧瞻山川慨焉興感書是説以辨云筆説燕之筆霜雪頴也徑而莫為屈楚之毫炎蒸之毳也柔而易為書徑與柔何俟多論獨念夫用之有難昜也余以心無所用近集三代巳來輔臣相業述調元事鑑筆為日課資間中一樂機格間燕楚之材皆具柔和者易于得字腕不知勞也徑挺者艱於如意手指既據致牽其臂而為困然不數日燕鋒方練布畫愈精顧楚産巳敗而不任吾用矣豫於是乎感焉曰此何異於相之用人也昔霍將軍子孟欲顓事權利其庸鄙者相故李蔡石慶王欣揚敞使之充位而巳霍終不聞讜言其族隨敗而無餘唐相蕭嵩亦以韓休柔昜而薦之及其當位持議方剛殆不少撓至有不意能爾之嘆而開元之政蔚有可觀後之君子居于人上者正當毋友不如巳者可也苟専以庸鄙便巳為心其如邦家何作筆説至元丙戌夏六月三日也龜蛇説巳丑歲秋八月癸亥有玄龜丹蛇見于太乙宫之書院錬師范君再拜以禎祥來請豫為之説曰蛇虺在所有而玄龜不常見一旦蹣􅘐蜿蜒並出而偕行此又覩之罕也二者化精水火玄武衷甲以自壯靈蛇搖毒以螫人故古者師征圗形旟旐用先啓行加招搖于上俾急繕其怒以示禦侮毒暴之戒今六代純一師奉命醮斗積有歲時豈精誠感格當進作之際堅徑衆怒俾禦侮警暴隂為之祥邪然禋于彼而見于符籙所在者豈祭法徔出昭其教之本邪不然昔昭應宫因二物畢至靈宇斯建抑亦夀宫將欲復增光舊物此為有開之先兆邪吾不得而祥也作龜蛇同出説冬十月三日書牛生字説全閩鐵官屬吏曰牛生者東平人丗儒家尚氣義好刀剱或欲之雖千金不吝聞余名甚喜通謁耒拜豫曰汝非文星者乎唯而不敢當吾自壯歲亦以論文説劒為喜今雖耄氣習未除也遂與談古今劒器雄雯雌縵者數品至有所未聞而未見者若𣣔吐燕趙徑氣而來吳越之清風也巳而跽請曰星之表字走有所未安幸憲使與昜而淬礪之因謂之曰維南有斗不可以挹酒漿然經緯昭布天之至文也昔龍泉下伏𬗋氣上欎張雷識之得二者于幽囹之下嗚呼一物之靈有如是者傳曰文武之道未墜于地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫物猶能以氣而上逹人固當以文而致昌其以文昌字之可也牛生其朂哉毋怠于是書以為贈米少尹名字説人之性有生而即敏者有學而後明者要之生而開敏者為上習而成性者次之劒倅米君燕産丗為西域人性開敏樂于為善嘗憶其兄中丞丁多故際衆無異議中外稱其善良豫過劍浦米來求名因訓之曰闓闓者生其善心顯其可踐迹也內不先開英何為而發故字之曰英甫兼汝年方壯功名䁀耒若能以乃兄為法篤其良心踐其善迹是不負天性幼成訓夫闓之之義也英甫其勉旃庚寅九月十二日書于南劍􅈦事孫鞬郎名字説六藝以射為重三代所以觀德而貢士也故男子始生懸弧矢于門俾射上下四方示有事于他日也元孫鞬將生之夕總戎晉人社矦以竹簳五十遺余矦甫去而鞬生其開先慶璋名逐生來之兆為不偶然者昭昭矣今生十有八歲姿妍靜學習頗嚮方訓名象德不即開先之祥而用之將何求故以笴名之而以君貢字焉亦因饋命鯉之義乃告之曰雲夢之竹天下之美材其米而貢之者將逹之于王庭修夫射宫大用以明擇士之道其為物豈不重哉然矢之為矢必須辨隂陽相博徑矯揉以端其紆躁文彩以煥其羽筈堅鋭以利其鋒鏃而後可以洞逺而捷鵠不然雖公他飬由之伎且將不吾取矣於戲笴王氏由農而士嗣志讀書逮於汝蓋五丗于兹吾老矣其所以望於汝者端重持其中和昜接於外不使一毫怠墮之氣設於而身以之效用致逺而光大先丗之業小子笴其服之母斁至元壬辰秋九月十二日少中大夫祖父秋澗老人訓示叔父後溪題示訓汝諄諄意竒文見乃翁洞堅威可大棲鵠體須中既應開先兆當知矯揉功逺期遺近效羽夾看摩空樂全老人説昔太史公傳貨殖以素封而名家甚夥然冨而好禮享所有而全其樂者蓋亦鮮矣林氏系蘇門望族君玊雖治産時逐處心逺大資之以發其身者良有足取為人志明而氣鋭樂賢好客教子孫讀書顧一事不肯屑屑出人後通都大邑居竒貨儈嬴羡掉臂於陶朱猗頓間千金之産有過而弗觀者至親近名士大夫風雨寒暑奔走不避如鹿菴顒軒二大老愛其疏通知變皆欵與其進遂資藉子仲先為時聞人故好事之名髙出行輩逹官時貴踵接於門者無虛日家則藏書有閣圃外思親有亭植佳花釀名酒客至則擊鮮為具賔醉而後巳窮年而不厭也今年七十有五視聽聰明行步加健飲啖如五六十人既富而壽壽而安安而能享承家有子純孝而特逹釋負有孫善繼而克荷嵗時宴喜朋簮四盍兒孫滿前奉觴拜壽樂融融也一門之中百順坌集何其秉之厚樂之全且見其禮義之生於家也豫以丗姻故遊最狎因舉曽有慶謂子仲曰若乃父克享所有以齒以德扳古人之例宜易名以顯異之若等以為何如曰謹唯命遂以樂全老人目之異時瞻喬木禮髙年使誥雲絢彩爛焉盈門是將望於若子若孫者未必不張本於斯耶巳而子元耒請其説於是乎筆以為贈歲壬辰至元草九年履端曰書劈正斧辨斧斫蒼玉為之長徑九寸有幾針之刃滿六寸頦下略齟齬之中堅厚二寸強龍首呀吻囓于口作兩假吞答腦與刃通以柯貫之上以雙蟠螭冒其端下以玉束琯承其竅華潤緻密無微疵可樀神兵凛肅真祕寶也且斧者黼也黑白二色相次故以水蒼玉象之三代之制云兵刑喪祀用之飾怒以賜殺執之以就列示威以啓行而巳今則天子正何朝會命冕執中立以劈正為義莫究所從耒然法物變昜多自孤隋李唐因之有不能廢焉者歟又制度追琢以近代工較之非隋唐莫之能作豈劈正之論權輿於二代間邪嗚呼斷之為德至矣昔孝成以優遊不斷漢鼎遂傾憲宗知惟斷有成淮西克平是既繡於裳繪於扆織于畫于羃今復植立以肅正朝古之人納君於正去邪勿疑寓德威於物以將其果毅者俾無或忽也垂戒之義深矣至元癸巳春三月草六日因閲實偕御史啇琥修撰魏必復觀於侍儀法物庫偶憶近歲夢先師命豫賦朱干玉戚詩今日乃與神物會遇所謂嗜欲將至有開必先者也作劈正斧辨王氏冬藏圗説夫出處語默君子固由其中然造物者不無意於其間也適事殷之時引之靜處使逺其咎人意若中有所惜我可忽其所事哉曰事謂何靜而積學以俟夫動而有為也傳不云乎居則曰不吾知也如或知尓則何以哉况苒苒而來我悠悠而過心放而不思其求學雜而不至於穀坐靡光景日就衰謝則曰人不我知時不吾用其為惑也亦巳甚矣今將收放豚以入其笠屏吾雜以絶其害朝焉而經暮焉而史經則所以端吾體於中史則所以驗吾用於外旦為夕之所不能夕補旦之所不足要本先定力以固窮終精思以求道貫夫六藝之旨而酬酢乎事變之耒者如斯而巳矣至於無益之談不切之務昏怠之氣過分之思合俗徇情徴逐挑逹一日三秋之戒廢日廢身之喻又見夫左針右銘警其敬之未莊心之所不力也嗚呼昔孔宣父稱顔氏子其殆庶幾豈非三月不達其仁乃優入聖域之要也歟豫嘗求是心渾然無間於一時之久者無他政自敬與義夾持動與靜交相飬故也若夫冬者歲之一時猶夜之所當息也又易曰艮其趾時止也雖止止不終已而須其所止者蓋成於終而後有以成平物之始此冬藏之所以作也至元草四年丁亥陽月朔日云度曲説敬齋李先生晚年以歌酒自娛既耄雖不復而倩猶獨至每興耒輒持空柸令門人酈生放聲長歌以導歡暢或不如指先生以已之所得教之遂戟其手而髙下之使視焉以諧其節奏雲起雪飛窮要眇而後巳公亦醺然也丁亥冬十月八日飲李氏新篘偶及分忖歌節信主士逹仍為發此沖沖然殊有所適昔孔宣父與人歌善必使反之而後和焉又漢人例蓄聲樂唐之士夫皆有音學由是而觀歌之為藝亦未可人也先生以材德主盟斯文六十餘年豫才得一拜履綦及過元氏先生墓草巳宿何先賢風流藴藉不容多得也如是可勝嘆哉吾特書此異時會與蕳之酈君相值於光風霽月之前拊掌談笑中郎之文采風流不無髣佛於眉睫之間也士逹其志之又從而為之誶曰我觀夏禮𣏌固不足徴兮吾道線如賢獻日巳零兮斯文未喪其將孰為興兮噫中説聖人垂教千言萬論獨以中為天下之逹道者天體如是也且天地周圍三百六十五度而南北二極揆上嵩髙乃天之中心也故定極焉然後天地位而萬象則其法焉故過則為差不及則氣不能成歲折而中半二九一十八則度之數文稱停不偏矣人出於兩間受其中以生是謂之理理者仁義禮智之謂由是觀之聖人之為教所以因其材而篤焉舍是何以為物何以為則故董子有言道之大原出於天其斯之謂歟於是述中説至元戊子端午日雨中書命説姬仲實者名思誠真定靈夀人幼業儒兼該隂陽氣數之學今年四十有九以耕稼歸隱孤虛取名非本志也至元二十五年自趙過衛將還𥙿之方城縣合河鄉之新居為豫作一日之留得略談三命之理知姬之所得絶與衆人不同其法大抵取先天二氣五行萃合一處以盛衰偏枯克陷抶助就其胚胎截長輔短互相乘除度其造化虛實得中與否然後斷其衰旺成敗何如耳且謂豫身自乙巳至甲辰兩運極安靜得夀垂老若無疾恙豫莞而謂曰所獲多矣尚何兾云又云人不冨貴者若有學問即與享用者同樂又曰品秩入格局者極難因説賤庚即今大運見在乙巳已中暗戊人皆以破丁官者戊也然戊居巳苦無力不妨姬曰不然只為戊字居巳無力故官氣不旺何則日居丁邜火取月壬子為水丁之官子却為卯相刑尅使壬子散漫卒不得用若戊土建旺即成涯岸其水自可浮舟楫潤物類今年歲君雖是戊子戊旅寓於子非土之正位亦不克助噪開歲巳丑用神戊辰皆土恐却得扶藉作內作外皆獲助益蓋上下氣體皆順故也又以六壬占得一課其名見幾𥘉傳功曹次傳從魁末傳天綱中間所有動靜不涉虛妄其占云功曹者官府之吏長起彂其事者也從魁氣毋之杓斟酌與奪是大人之主斷者天綱即斗之標係從而贊輔者也謂如杓有􆇢用柄自然來隨將來所應多是武秩文用在今嵗窮臘來春孟仲間其事可驗門下自耒占決無似此課皆順無逆有成不妄也幸切記勿忘時歲八月十二日甲子未刻事也因念逺凶近吉君子之恆心故數占而不厭惡直喜諛丗俗之常態多願聞而受愚至有求其所不可得避其所不可免中無蔽志一聽於卜神亦不為之占矣且不測者隂陽之神也孰為細人寡聞者可得臆而度思彼妄意受愚者是特疏釋一時之隕穫耳苟非理之所在義之所當行者其抒憤警俗虛髙務悅之説君子雖聞之而弗由也然所以見其彼之云云者試以吾之所在而當行者且念夫彼之殊異于衆人之所謂者果孰得而孰失哉作命説金從革説豫嘗侍坐於丞相史公昭文先生談歲序攙搭之説不爾四時不續歲功不成開府以未之聞而喜甚繼以鼓鑄事語豫曰汝知夫金之從革乎工人摶沙為範力甚疏弱以金燬烈之氣寫而就器彼樣度之圎方文章之緻密顧雖絲髮之微其脈胳縱橫莫不克滿爛然可觀有非人力所能然者何則方金之在鎔也猶氣之氤於範圍間也彼燁燁融融楊彩委質既為之氣蓋有無不者所謂氣不周者是也豫以晚進學淺尊卑勢殊有所聞不敢質其所從來後乃知據易説莊解而云其敷言甚覼縷也以今思之為豫而發者多矣豫平生疏直強項氣少不人下而于丗每竒而不耦先生以不屑誨之蓋先説欲學者紬繹其道貴夫造之深也後一説以變化氣質為先欲澄治粗厲㑭就夫氣之中且和也此豈唯豫益實於丗教有輔惠夫後學者深矣因追録前言述從革説馬氏子處禮丗治家氣清而志學來求豫訓辝特書此以貽之古文今文難易不同説訓誥誓命等文體固不同要本聖賢以彛典明天理本人情統群心而巳然古今辝文有難昜相反者先儒論難終未明了以豫度之書之為䇿須史氏潤色隱括既出衆手性異好尚學有深淺才有髙下筆有強弱而辝有澀昜故也九峯疑其勝女口傳者偏記其難孔壁後得者返為平昜反覆究説似逺而泥謂如尹之訓賢君也當深而昜庚之誥民庶也當易而深又周書五誥獒牙詰曲叮嚀委曲有不昜曉者此無他一繫夫當時人情勢有不得不然者更值夫史氏之尚竒者一向艱澀韜其幽光以成噩噩灝灝之體耳蔡氏復以紀實難工雅詞昜好為辨是亦主其措辝為言然不碇此恐杜後來者詳説使學者躍如求於耳目聞見之外也啇魯頌次敘説韓陳二生問魯繼周頌啇次魯頌之後何居余曰三百篇皆周詩魯則列國蓋周之㣧裔僖公又魯之賢君天下無王蕩蕩板板而周禮盡在於魯故孔子曰如有用我者吾其為東周乎賢諸侯不與將疇歸恐亦書終以秦誓繼之之義也若商頌次之魯上殷周之先代前後不敘意者孔子殷後又當斯友之主那等樂歌皆成湯髙宗盛烈其聲其靈赫赫濯濯如此為子孫者刪次之際偶得是篇於大師可忽而不録仍附于後以終其弦誦之意恐或然歟百獸率舞説百獸率舞先儒皆無明攴所以然者豈上丗四靈在郊樂與天地氣應故幽則神和於上明則物和於野正緣史官形容四靈等瑞以見其氣和之至且如唐明皇舞馬止是一時教習即能驤首振鬛銜柸上進應樂節不差况聖人教化極和感發動蕩上下同流信及咸若有自然而然者豫故曰獸之率馴蓋實有之非溢美辝也不然則鳯凰來儀亦可為疑了雹説陶晉卿説獲嘉縣今年五月𥘉雨雹為災其大如柸拳桑棗皆戕折無餘及多拔大木有提去百步者如此凡一十八村其可畏也豫曰天地間無别物只是隂陽二氣交感而巳雨露霜雪如常者天地和恆之氣也唯其弗和致有此異蓋隂沴乖戾之氣從中脅而成之其大小即隨所感輕重而然木拔與去此是伏隂摶陽而奮木適與值遂突而出之耳氣盛物微吹而去之氣散自墜于下豫二十歲時行共山道中望羊角風自西南來蓬勃方數百畒吹駕大枿於塵坌上者數十株正此同耳申豐云雨雹山有氷不藏藏無棄餘所致且一歲山谷間隂積不釋者若一一藏之庸能既乎又遺堅志説有人雨過山行覩大本忽拔至聞其隂靈用力過而自絶倒者是皆齊東野人之語士當教子説豫嘗疑士大夫多不教子求其情而不得乃臆為之説曰儒家者流博而寡要勞而少功學者有牛毛鱗角之嘆其成難也如此豈謂是歟且以巳况之攻苦茹辛焦心勞思積數十寒暑之勤僅得猥列士行否者將何所冀哉故往往多不以所難強其所不能寧從彼好使昜為立身耳然蜾裸最蟲之微者尚能負螟蛉振羽而祝之曰類我類我况人乎彼或不賢為父兄者固當擇其師課其力誘之掖之俾極其所進之方果鞭而不前然後隨其所樂以畢父兄之責此吾儕當然之理也然自非下愚不移天下無不昜之俗人無有不變之資只在夫發藥者如何耳為子弟者至此日當愧耻無地心憤口悱勉立志節人十之巳百之人百之巳千之若恐不及為心又使昏惰之氣不設於其身可也先君亦嘗有言四民士為重學有成髙出一丗如其無成不衆人若委而棄之此何足以有為是則賢不肖其間不能以寸孟軻氏之言責固不為過矣又父兄不能久視長在一旦衰􅒜覩彼之子孫若是之髙我之門户如此之卑家聲曰替丗業一空幾何不嘆息而悒悒于斯也近一素宦以家學授其子三俱有所立尚以未登仕版至告人曰吾死目且不瞑矣父母之心天下一也况其所業未就學幸得而不自強才可進而乃自畫其為父母者安得其心不攸困者哉作士須教子説周景王大泉説世之嗜古者多尚鼎鍾鼎鍾往往偽出古而真者莫錢若也陶簿晉卿好古泉而得大泉五十者考之譄籍蓋周景王所更大錢大夫單旗諍之以為不可者是也其形徑一寸二分其重積十二銖今則半兩也以歲月計之自景王迄今幾二千年矣其文與周郭肉好精緻堅凝略不為之齧蝕信哉前代制作後人有不可企及者嗚呼陶子其寶之無斁安知無𬒳篾杖䇿踵門而耒丐者乎昨日歸卧春露堂既覺適筆研在䘛偶為書之覺體中不佳拂拂然從筆端出去矣至元二十四年秋七月丁酉戲題賣兔説伊川先生見賣兔云此亦可以畫卦或者曰何謂也余曰物盈天地間皆從氤氲一氣中耒所謂萬物一太極也卦之畫一隂一陽而已兔亦具其二者之氣耳見兔亦可以畫卦蓋謂有此理耳故又曰不特龜馬之顯著者焉二馬圗説明昌𥘉西夏國毋病章廟遣尚醫往治愈之獻名馬回謝一曰進御以試良德即旋焉上怒命太僕驅去窮曰力斃之未夕往返馳五百餘里歸望天廄振鬛長鳴若無事然自是以一骨當御今觀此二馬毛骼駭異黃門飛鞚迅若遊龍豈非當授轡之𥘉耶嗚呼馬臣類也食三品芻豆直立內仗一鳴則黜之矣其或猥靡為心取媚於上以速見知皆非馬之德也然則馬之為如之何而可曰有受䇿服勞不有其力以服芻秣之恩庶幾或徔王事無成有終之義也作二馬圗説稼齋説崔文字文卿稼齋者府從事崔君之自名也求余以隸書冠於卷首余曰渠年少氣鋭方馳聲胭仕以調議理務為事何以稼為豈起家隴畒揭焉而不忘其本邪豈食貧口衆祿不足以代其耕邪豈仕不為貧動久而思其靜邪曰崔氏世居荏平薄有田廬近在郊遂與城居不殊其靜僻殆谷耕林隱也往歲自海上罷官西歸脫煩鞅謝人事郊居者數月沖然大有所適方夏之𥘉三農在田耘耔底迹豫開軒卧治觀良苗之懷新有田畯之至喜及夫多稼雲如薿薿彌望庵觀銍川偃然覩崇墉之積𢋫豐年之歌動髙廩之詠田里熙熙物情交暢以已之樂而為衆樂因衆之安而為吾安是乃平昔明農私有所得於此也其為稼也不亦冝乎余曰四民之分各有攸業而進莫榮於仕退莫安于農仕則思吾所當安而明夫學之用也農則安吾所當遇而樂其身之適也若當仕而農將貽老農吾不如之鄙當稼而仕恐涉大昜知進不知退之譏然進而懷靜退之心不猶愈於退而存不巳之念也歟崔君其艾服官政進進而能先求其所當安而安之而後思巳之所安是亦先其所憂而後樂其所樂之意也作稼説以貽之李郎中二子名説郎中李俁正卿有子二人俱教之讀書從劣孫問學其勉勵資藉之者甚力其長資頗篤厚次則似涉輕俊然奉若父命周旋唯謹一日請訓名字於豫乃告之曰古人立名命字取義多端俱不若酌其才性優劣就為教誠而抑揚之最為親切夫篤厚者必藻之以才華所以彬其文質也故其長用質命名而字之華甫輕俊者須濟之誠實所以備其材德也故次者名之以俊而誠甫字焉嗚呼二子今而後當克制其偏勝涵飬其不足以造夫中庸之域他日立身行已不致有過不及之差庶克荷汝父平昔提誨之責尚佩服之母斁祁氏四子名説汴梁士人祁祐之治生而不求冨樂善而不近名尊賢者使教子讀書意在亢宗起家介司計楊敬夫求名字其四子豫謂為善好學積纍能又則協氣感發其興也勃然如水之淵渟滙滀一且泄溢騰而為雨霧降而為川流有不期然而然者祈氏子誠能勉力進修則於志成美其庶幾乎故其名與字皆以水命意焉澤字潤甫淵字濟甫源字湜甫濤字浩甫鳴呼小子其聽之母忽王從事季明子説兵馬指揮即前世執金吾職也其從事王李之之故人也以通家好出拜其子詢夫小涉即其命意以連僧昜之因求訓誨乃祖少從西菴楊參政樽爼士大夫間風流藴藉以通才稱惜乎竟汝父夙蒙中丞王西溪提誨持身從政不失不偶優遊常調然在相衛故家間屈指可數若家世之隆替係子孫之賢否欲其才賢讀書修業而已在我者既盡逹則身立名揚光昭世緒窮則為善人吉士此理之必然小于其服之母斁石抹氏子名字説大德庚子冬秋澗翁步入文殊東院主僧量示豫木鏤瑞像一龕何精妙也詢其孰作曰汝南監郡石抹君也為人端整白晢辭語灑灑有章天性機巧不待師授而能今年三十有三始筮仕入京師既而僧印耒謁言辭容止與向間吻合資何出之晚耶答曰叔父國用從四年母老侍疾持服年兹皆家觀光上國而名字未立何以稱呼先生顧恤為之訓誨曰勉夫志之命名用世亨字之夫雕鏤刻畫特志其逺者大者傳曰貞固足以幹事亨誠能貞正以固其德幹敏以運其昭先丗之業乃所以望於吾子也其秋澗先生大全文集卷第四十六
