  text: 秋澗先生大全集卷八十七烏臺筆輔
  hash: sha256:146f88c497f5f362c19be0165fb09940fc0859623c0fc27f281b98906d0d4772
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_087-1a}
body:
  text: 彈順天路總管祖丗傑不合支俸事狀照得尚書省劄付莭該今後官吏辨證私罪但離本職其祿不給承此今體察到順天總管祖丗傑於至元七年二月為道大言語公事尚書刑部勾喚本官前來歸問至當月十七日到部至至元八年二月二十二日才行還府有本官却將正二兩月俸秩於本路盡數關支了當事屬違錯合驗曠闕月日於本官處依數追理施行論借貸飢民米糧事狀切見益都淄萊衛輝洺磁等路農民因連年蝗旱闕乏餱糧自去秋至今春剟食草木至結死中毒病腫自縊死者幾於百人其壯者迫於飢寒往往去為盜賊外據見闕食者密州萊陽等處二萬七千餘户西京一路三萬餘户上下纍申前後十月才聞尚書省將三路飢民分間約量許貸米糧接濟却令今秋還納而上年似此等事依例催徴欠數參詳極有未當者夫張官置吏本以為致如為郡縣者承流宣化牧飬元元為本主監司者以按治撫察問民􅔂苦興利除害為務且救荒守臣職也今坐視民飢大失所天至於此極不敢權冝略為營救方循守常例行移申解經由官府數重至於再三尚不獲請即救其轉死溝壑之禍誠可痛也又慮任內户口流散别致違錯虗言安諭隨以鄰佑團甲保結不使東西就食它處苟延朝夕以致殍餓死亡逃竄如此是上慢下殘而與有司殺之何異使監司管民等官當位食祿何顔安處民上而以牧飬興除為治哉夫邦以民為本民以食為天宰相者代天理物下遂其冝者也今民急如此理合以哀痛為心猶巳飢溺開陳事冝作急聞奏使朝廷曉然知利害所在大發倉廩寬貸鹽法或停罷夫役蠲除差稅重加惠恤以賑濟撫飬為事庶可以上副聖主天地雨露之恩仁民愛物之念不務出此視為細微方以借貸還官為事所謂聞荒不救見饉不驚者也兼所在為糧多有名無實切恐虛行了無所濟且近年巳來為百姓貧乏省部雖差官賑濟止是營救一時不見逺有安濟弭盡之方以至於此如西京一路見闕食者三萬餘户今許借貸米糧倉檻二萬石約户給七斗家以五口為率日食二小升是僅能支持月餘兼山後地寒霜雪早至設或天災依然二月之外不知復何存活而秋田又無所望此又當慮者照得前宋時每遇水旱飢荒必選摘京朝才幹重臣以體量安撫為職其一切規畫悉以便宜從事如冨弼之活青州韓琦之救利益前後所活百有五十萬口足見規為有方雖多益辦况二三万之衆乎又檢會得金監司條例遇災傷闕食去處有能以物賙濟困窮與民興利除害者按察司保申朝廷約量旌賞其或今後遇有此等事理許令守臣從長規畫營救更乞將巳借米糧即充賑濟之物外據上年懸欠舊稅截日住徴其於官民兩得便濟某今當去職有見不言實為負責合行一就具呈據乞御史臺照詳聞奏施行舉李户部稱職合特加寵數事狀切惟財賦天下之大計民部六卿之劇曹昔李唐一代以調度見稱者裴劉二公而巳切見户部尚書李德輝資稟忠純精詳政體夙夜在公克盡所事而又疾邪持正吏不敢欺愛自歷職巳來實為允稱可謂蹇蹇匪躬盡瘁於國者也近聞尚書省亦以喉舌得人不許改充别職誠然照得唐例如裴劉諸人於度支鹽鐡本職上帶中書門下兼同之稱據尚書李德輝官資祿秩理冝特加寵數顯異良能以慰中外之望而當國者且復塞進賢之責矣烏臺日事自至元五年冬十一月終至元辛未夏四月請舉行科舉事狀切見科舉事理往年翰林院巳經具陳中書省乞聞奏定擬頃者尚書省亦下禮部復有講究條目至今未聞施行蓋未有度其事冝而力為言者伏惟朝廷凡有大小勾當聖意每云尋好人者且好人者大槩解官事識廉耻以公滅私不作過犯之人若科舉事行必須先立學校或人人力學學校者國家之化原人材之大本也但自教育中來人終是通古今解公事知廉恥識忠義鮮過犯如此豈非好人歟由是觀之庠序科舉以之育材取士最為急務理合舉行兼自立銓選已來內外郡官其品從散官俸祿職田子孫廕敘其為寵數亦以不薄至於功能升賞之科過犯降罰之例又復備具蓋所以磨鈍礪丗欲官得其人以之致理故也然取人之道未覩其由應選之人歲有定數謂如目今隨路府州司縣見設正官一千五百餘貟槩以中材較之其實良能著稱者少又中間身故老病因罪黜罷及闕貟去處每歲極多據格法之外雖有適用長材又不敢枉法參注一人是應選常調之者不數年所存固無幾矣若科舉取人之法於此不早詳定是猶工巧者得製錦之方而無錦可製將何以就裘服之功乎又如儒人户計委係深通文學者依例免差若此科不立恐不能竟别是否使委通文藝之人終身不𬒳其澤而又無路可進得展實用於明時誠可惜也以此參詳科舉為法以之取人實為公當故歷代因仍雖格制異同終不能少廢此明驗也鴻惟太宗合罕皇帝聖模宏逺戊戌年間以程試之法略為施行當時翕然向化所得人材不少據設科事理既係先朝已行故事理冝追述聞奏定奪施行如此則上可以副聖主求賢致理之心下庶幾多得人材大輔銓選內外百官之用不然人情急於進用勢利所在僥競成俗若此風一煽治道無由而隆風俗因之而靡尚何選法之有哉故時政所先莫此為重秉國鈞者冝深思逺慮預防其將來之弊則天下幸甚論職官公私有犯不聽收贖皆的決事狀古者刑不至大夫禮不及庶人兼爵祿者所以待材能廉耻者所以厲莭行此自古之常法蓋斷不可易者今訪聞得尚書省奏擬到將一切內外職官如公私有犯不聽收贖皆以的決論罪甚非待才能而厲臣莭也如此則是有司教人以頑鈍無耻奊詬之莭廉隅不立而當職任者既無貴貴尊尊之義且以官徒自處苟日計庸而已假如外路一州縣官聽斷民訟其或無理者必諭之使退彼執迷不聽至於再三官偶以怒詈遣出民必曰汝雖無私罪猶得以辱詈為公罪是當官者手足無措為小民者恣得羅織矣兼目今官弱民強例以侵侮把持為事若此法一行官府決不能立上司亦不復制矣論者必曰相臣得罪且受杖責此何所措是大不然夫相臣受責出人主一時權斷舊例即非永格體制不得引為後例今欲以的決施之天下必將為常行格法所謂非常之論民必懼焉恐此言一出斷不可訓徒傷天地之恩為國家斂怨之舉耳據此合行紏呈論重刑決不待時事狀切見中統建元詔內一欵犯刑至死者如州府審問獄成便行斷決則死者不可復生斷者不可復續案牘繁冗須臾決判萬一差誤人命至重悔將何及朕實哀矜今後但有死刑仰所在官司推勘得實見事情始末及斷定招欵申宣撫司照詳宣撫司再行審覆無疑呈省聞奏待報決斷至今依上施行理實允當此聖主天地好生之大德雖堯舜無以踰此今訪問得朝廷諭尚書省今後合打的便打了者合死的便施行者省官回奏云己前重刑待報候秋分後斷決為這般儧下多有便似淹禁一般今後至如省部問了監察重審無冤不待秋分逐旋施行呵怎生聖旨你道得是一般所聞大槩如此設或在京者能然外路何以區處卑職參詳刑者侀也一成而不可變故君子盡心焉謂如明白重刑其正犯干連贓仗準服追勘審覆結案須經歷官府數重少者不下半載之上不能一切完備尚慮事情始末恐有差疑人命至重或致枉錯有傷和氣故舊例重刑不限催舉待以歲時欲於三覆五奏之間脫有冤誣庶正犯敗露不致濫及無辜以極哀矜欽恤之意見不嗜於速殺也至於秋分後行刑蓋自古帝王體天行道以順四時生殺之理此又大不可悖也如舊例決不待時蓋所以待惡逆以上罪也今者將一切常犯死罪者數月之間案牘稍具止令省部監察審問無冤同惡逆罪犯決不待時雖皋陶在上保不能曲盡獄情一無冤濫今略舉近年北京髙幹忽乃壻銀延壽奴將隨逐妻家驅男長夀轉賣上都民家在後事發到官以殺害驅男自誣又經中書省審刑官審問無冤至將延夀奴作死罪斷訖一百七下及將妻髙氏離異既而驅男以親書逹于本使乃知本人誣服本道按察司方為改正以此參詳捶楚之下何求而不得兼法者天下之公共非倉卒奏對間所可擬議伏惟尚書省總持紀綱號令天下民之大命繫一言安危誠當審量事冝集議允當可為永格者而復更改聞奏以救既往則天下幸甚據此合行舉呈髙唐州州尹張庭瑞稱職事狀今體得髙唐州州尹張庭瑞自到任已來甫及期年五事可稱一方受賜蓋其人強幹有為廉能素著凡所興除率先律巳如待僚佐以禮束胥吏以法勸課耕桑裁抑遊惰宣明教本則首興學庿拯齊羸劣則課習醫流井井有條吏安民便而又䁱暢軍機勇於臨敵向軍虎嘯巳肅邊聲今尹齊西號稱治最誠有用之全材一時之良大夫也理冝聞奏擢置監司不然百里之地不能盡其所長為可惜耳據此合行呈請立登聞檢鼓院事狀切見一等狂妄小民苦無冤抑如婚姻田宅户門等事往往輒便接駕唐突聖主愛民心切以為事重致使聖顔未嘗不為之動其唐突者必奉將敕旨令有司理問然後退去則是萬乘帝王之尊下行有司之事萬無此理臣下能不駭懼合無建立登聞檢鼓院如有指陳軍國大事朝政得失大段冤抑纍經訴理未擭辨明或事不機密者許令投進以聞如此使天下冤抑之情得以上逹而朝廷尊嚴之勢彼狂妄小民亦不能咫尺輕近矣論立司諌等官事狀蓋聞朝無諍臣則不知過國無逹士則不聞善至於諸侯卿大夫士庶人皆有諍臣諍友則國安而令名可保矣况萬乘之帝王歟伏見朝廷近年以來雖或事小情有似重者天威震怒出於一時輒至不測欽惟聖慈隨復追悔以至有云當間如何無人題奏來所聞大槩如此今憲臺雖立或有所論執卒不能上逹得開陳利害於前合無選近侍重臣輔以剛正儒者使為司諌等官如此則聖益聖而明益明且免夫既往追惟之悔天下幸甚論職官子孫試輔省臺院部令史狀照得舊例皇家緦麻以上親及曽任宰執之子聽試尚書省令譯史皇家袒免親及宰執孫并弟若三品以上職事官之子弟及終場舉人聽試臺院令譯史其散官五品以上職事子孫兄弟及姪或散官不及五品曽任五品職事子孫兄弟皆聽試部令史譯史通事切見朝廷近年將大根腳官貟子孫分付都省臺院習學政務此政前代宗室宰執職官試輔之意也至於宗室子孫不敢輕議如宰執職官子孫弟姪理冝舉行蓋宰執職官子孫弟姪終是有門地大相腳中出來人其所聞所見無非宦體時務有所顧惜且不急於財賄此最可取者今後合無酌準上頃格例限以歲月試驗充堪相應之人令於省臺院部與吏貟相參勾當實為兩有便益且吏貟職掌文字皆係國家庶務刑政機密動關利害自非守愪公幹者鮮不害事若以宰執職官子孫相參勾當驗事務輕重上下分掌使遞互琢磨長短相輔持體倚辦各有所司豈非兩有便益者哉為吏貟者漸磨既久務知逺大聲迹漸好易其鍛煉積習之心為子弟者通曉政事一適於用革去驕墮侈靡之氣不數年使朝廷之上備任用者比皆良能公正閥閲素宦之人將見私已門下僥幸泛濫之弊不革而自去矣舉都事馬甫并選用儒者事狀切念臺之為司不同省部職掌上所以肅朝廷之紀綱下所以正百官之邪僻至於軍民利害刑政得失皆得紏而繩之故一臺綱領必須擇得其人使內外官府動或過舉則曰有某人在恐不冝然可也又古者用人唯出至公雖父子相舉兄弟同臺官府有舊皆不以為嫌如或不才抑濁揚清正臺司之職耳切見都事馬甫性詳靜間吏事凡所論議務先大躰以儒飾吏者相參勾當方為允稱不致事務差謬為外望所易論陳提刑改除不冝取解由事狀伏見尚書省奏擬山東東西道提刑按察使陳祐簽中興等路行尚書省事就令本司取無粘帶解由前來參詳見設按察司五道據祐忠真剛果毅然有為脫略苛細務明大體凡所興除民安吏畏風彩所加百城震肅以聲迹比量最為稱職兼山東東西阻山負海地廣物衆連年蝗旱軍民不安所仰祐等以之鎮靜今祐所除名雖相列其實左遷若向前代官苟非其人是一道監司殆虛設耳憲臺理合開陳可否以之執奏别議選注外據取解由一莭照得舊例凡省除官倒除者止是給據别無取解由休例且按察官係朝廷耳目之使以按劾彈紏為職不同州府掌管事理今也擠同有司一例取解由赴省似為非體乞一就定奪據此合行舉呈論五品以上官殿授事狀訪問得舊例五品以上官得除者殿授皆奏謝六品以下官於嚴祗門授而無謝禮今者內外大小官貟其宣命勑牒皆於中書省祗受似有未當者且三品至五品官僚職掌雖分內外俱係國家倚重臣子而朝廷誠不可不察視其人之邪正能否也昔太宗將都督刺史姓名疏於屏風欲坐卧觀覽得善惡之迹注於名下以備黜陟至玄宗將已除職官延之內殿詢訪治道然後諭遣至人人感激莫不以名莭自奮故貞觀開元之治號稱隆平今後合無將五品以上官貟盡令陛見祗受宣命使人人躬𬒳恩寵於朝抑且革去僥幸非妄之徒外據六品以下官貟且於中省祇受權冝門授之制如殿庭定立然後别議施行論貧難軍合從所屬定奪事狀切見天下新舊軍户極有生受難以應當者如貧難年老單丁女户消乏者是也至如新簽軍人近年上司略行分㨂難易不堪者却行收係為民二千餘户况在前年分舊軍中間年老單丁女户消乏貧難數多獨不蒙分間優恤何事情一躰而舊軍偏重如此蓋有司之不省故也其最可傷者如貧難等户往往陳告經年纍歲了無投向如告到總府府司止備申兵部部即曰非我當問即行下令申合屬本路依準申覆樞密院院即曰我主調發但恐闕少正數而巳仍散押入案亦别無定奪參詳雖使貧難軍人無所控訴而軍前氣力亦不濟用是軍力人難上下既無分解兩相耽誤今略舉懷孟路舊軍李用姚三秦義等三名俱各單丁年八十餘歲無人俱給日逐沿營乞食應役向申樞密院不蒙明降其秦義近於軍前因病身故本路又將李用等三名申詳兵部又行下令申合屬别無定奪此明驗也今檢會到唐制健兒在軍皆有年限更來往額為勞弊又諸軍鎮量間劇利害置兵防健兒於諸色征行人內及客户中召募取丁壯情願者充健兒常住邊靣者每年加常例給賜兼給永年優復其家口情願去者聽至軍州各給田土屋宅人賴其利中外獲安是後州郡之間永無徴發之役又舊例諸軍健年六十者罷役如秦義等八十老人使之守戍禦敵何所賴其勇健哉今後合無應貧難軍人陳訴許從合屬受理定奪勘當的實唯復寬減差役或别議優恤庶免致靠損人難進退無據不然請依分間新軍體例將貧難極生受者亦從長定奪似為安便外據闕少合輔之數官為召募情願者聽仍優復其家口遇有戰功普例給賜如此可以收壯健而活疲民其為惠恤小民豈不倍於尋常萬萬也據此合行舉呈薦臺掾趙文昌事狀切惟臺之為司以禮法繩官邪用儒術飾國事近丗巳來文學之士專上才華少諳吏業一旦從事解克有為苟有盡心誠可嘉尚切見前濟南副提學趙文昌自為臺掾強幹有稱夙夜在公精研政事以儒有飾吏之材飬氣負嫉邪之志求之等倫誠難多得今去繁居簡明見甄獎若臺司將來闕貟如文昌者誠冝擢用必能不負所學克堪所任儻升霜簡之流尤勵素餐之者某今當去職有見不言實為負責據此預合薦明舉左丞姚公克經筵等職狀伏惟朝廷凡有大政大議必須清問故老兹蓋詢咨黃髮恐有所愆之盛意也切見前中書左丞姚樞潛邸舊臣中朝大老生平以聖學為心輔政多嘉謀入告近簽南省為衆牽持罔伸所懷今年雖耆艾精力未衰謀猷論議足有規為未冝間退使後事功至於侍講經筵監修國史保傅儲闈承旨樞密實能克堪負荷必能進盡忠嘉有所廣益兼翰院集賢等貟如許竇二公者巳蒙恩眷如是有此體例合行舉言者伏乞憲臺詳照施行論衛輝路不冝通𬋩竹課事狀切見衛輝路見𬋩竹課據所該地靣懷洛嵩汝唐鄧徐邳益都泰安等處自方萬有餘里其實難以勾赴今止令衛輝總府並􅊢𬋩領恢辦課程不致虧兊失誤參詳極有未便者蓋衛輝路分微小當四衝驛程民訟科差諸軍奧魯一切課程等事比之他郡百倍其劇今又將諸路竹課並令𬋩領雖極慮盡心勾當決有力所不及去處又緣竹雖官貨實係經啇交易不同啇稅認辦宣課事體至於斫伐以時般運有法價直低昂使官民兩便自非通知貨殖善於理財者鮮能首尾相應彼此皆辦兼上項有竹地靣必須差設監司巡竹等官吏又令聽受本道節制前去各路營運其間交關往來其路分既平牒衙門而監巡皆差委客寄少有蹉跌輒成沮阻與其廢力如此何若各令所在總府兼行𬋩領以為長便又照得濱樂清滄解鹽依舊專設司事恢辦合無將上項竹課亦另行設立監司同鹽埸一體𬋩領勾當庶氣力專一終是易為責辦今省部若不如此從長别行定奪將來衛輝官府不惟因此負纍其所辦課程儻有虧兊失誤深係利害據此合行舉呈儒士楊弘道賜號事狀伏念髙尚之士無代無之國家必遂其素忘賜以處士先生之號蓋其材學節義可髙足以勵薄佫而敦風化故也切見益都路耆儒揚弘道文章德業師表一丗至於賊壇頻年徼功經營海道欲遂姦計先生預有所見發為歌詩聲言不可今行年八十有三窮君守道垂老丘園誠天民之先覺清時之隱逸也合無照依莊靖李公恩例乞賜處士先生之號以表其康節且令本路歲時常加存恤請職官依舊三十月遷轉事狀切見即目到部聽除職官緣貟多闕少填積停滯人數以致進退兩難有礙銓調似失才能樂於從政之詈及攬捽髯鬚至於脫落却行私下勸和參詳教官維為人師行中士表宣明教本訓導生徒為任其劉汝翼凶悍荒酗凌犯官長為細人所不為既傷儒風大失士體使京師首善之地何所矜式冝遴選師儒以代其職據此合行紏彈論隨路闕貟及未到任官貟事狀切惟張官置吏本以為民官得其人貟不曠闕庶得民安事辦今體察得隨路見闕總𬋩八貟正從七品二百七十餘貟兼州縣省併以來所轄地靣極有寬闊去處加以蝗旱大作民心嗸嗸似為未安况充兆平陽太原濟南等處皆係重鎮尤不可闕貟勾當合無遴選才德兼備素為朝廷所知者擬注總𬋩及州縣𬒳災重處貟闕多者省部從長講究於見守逺闕官內選摘或令內外五品以上官辟舉廉幹相應人借注輔充勾當又知得四月中受除官貟巳踰兩月尚有未到任者五十餘貟亦當作急催督别議究治不然切恐中間規避致誤一方事務又於國家法制有所蔑裂合行一就舉呈為起蓋良鄉縣南留里河橋梁事狀會驗中書省條畫內一欵該若有利害可以興除者申臺呈省遵此切見中都迤南係四方官貟客旅朝會經行驛程正路近體知得良鄉縣南十三里有舊來經由留里河橋官道南至涿州六十里兵革以來橋廢不行目今靠西由繼陽套繞轉至涿州七十五里若經夏秋河水泛漲泥濘虛陷致使鋪馬客旅來往生受兼繼陽套地形卑下村坊逺窵接連溝會屢常失盜深為未便竊詳若依舊起蓋留里河橋道不唯道路髙平徑直使鋪馬客旅往返近三十餘里又免水潦泥濘之患官民實為兩便伏乞御史臺備呈中書省行下相視改正施行益津縣尹張英非違等事狀今察到益津縣尹張英自到任已來甫踰兩月其逐莭非違為私蠹害等事開具于后據此合行紏彈一縣尹張英到任至今兼掌尉印凡失盜二起明有窟穴顯迹不即督勒弓兵嚴限緝捕却為劈問失盜李鄭二家親屬及勒要訖事主王伯英自願不行申告文狀其從滋盜賊以有為無匿而不申度其主意止恐不獲停罰月俸本縣民心因此失望其張英字民之官務在肅清所部盜賊消弭方為稱職今所行如此非唯違錯實為以私滅公一前益津縣尹張文郁主簿李璋使訖鹽折粟鈔三十餘定其張英明知前官侵使官錢不即依理舉問又不止約本官申明使州知會於九月十九日反行送出還家去訖及發下馬駝一千餘匹已誤料粟才於十月𥘉十經隔二十餘日不由所𬋩上司擅自赴府而越言上説稱前官張文郁並不交代往豐閠去訖乞勾追發下依理交代及總府退訖月申縣解却就都於州司吏李讓處詭取本州空解依前申覆切詳上項事理非唯失誤支持事屬欺罔詐冒兼張英係監臨之官知代官有犯故不舉問送令還家其徇私害公孰甚於此若弗紏治切恐因而循習别生事端所壉前項事情就問得州吏目王文進司吏吕仲榮與所察相同一霸州益津縣分俱該河流陂浸地靣其驛程係山東要路中間津梁最為急務又照得省劄修理橋道事明該簿尉闕貟委自巳上正官兼𬋩及令長官檢校其縣尹張英將本縣合修橋道堤口略不省問止委弓手盧得用𬋩領工役致使人夫逃散冬月寒冷修疊不能了畢使經行人貟罷役城夫及發下馬駝蕩涉氷水人幾有漂沒者就問得縣逹魯花赤舍里甫丁吏目王文進與所察相同其於公不幹違錯怠慢如此一守令百里寄命苟非其人則一方彼害其張英性荒嗜酒昧於事體又乘酒縱暴不居公𪠘將公使人符首領等非禮驅擊致有逃避之者及本州行下事理如橋道見禁等事往往違拒輒不申報至於縣司所行或不應者典吏報覆略不聽從恃賴曽為部掾蔑視上司如委棄尉印令弓手張典掌管將舍里甫丁私已人烈石立為巡捕祗待官見於煎茶鋪勾當其恣意亂行如此致將公務窒塞兩耽非止一事兼張英前任唐縣其部民告發不公等事上司未曽歸結不審緣何依前遷除充益津縣尹勾當合無一就究問彈左巡院官休和趙仲謙事今體察得趙仲謙於至元五年十二月內詣中都左巡院告王四打死妹趙喜蓮事其郝警使馬警判蕭典史提控張仲禮將𬒳論人王四不行撲捉到官及在都見有干證人亦不勾喚虛調行遣及將潞縣取發到干連人等並不與元告𬒳論當官對問從放還家其事主趙仲謙為見巡院故意遷延再行告到總府并右三部行下巡院其巡院官吏止是依前虛調行遣並不理問却於今年二月二十日有郝警使沈警副等當廳公然省會元告𬒳論人等與限二日勸和了者切見巡院係京畿親民正聽務要禮義興行肅清所部據前項違錯事理合行紏彈為添科南京不任差户事切見南京路兵興巳來百色所須盡出民間如挑河運糧和買和糴採打木植造作船隻器甲等事三年之間略無寧息加以蝗旱相仍物價踴貴其𬒳災去處至今有闕食者而賑濟大恩又不霑𬒳中外嗸嗸財殫力困已是生受又即目蟲蝻比之去歲滋㣧極多近體訪得今歲將本路新收二萬四千餘户盡行添科差發須𬋩不失元額却緣照得上項户計內一萬餘户俱係交參重抄老疾不任差下户切恐絲銀一出别致逃竄將閃下差發必􅎈於見在户數可敷元額如此是百姓重併轉增困弊兼目今襄漢未下攻取之本首仰河南據已困之民為國計者誠冝深慮撫摩存恤得小利為易固邦本為重合無欽依近奉聖旨減免益都差發恩例再行勘當堪與不堪從長定奪聞奏施行據此合行具呈伏乞御史臺照詳施行為除豁河南屯田户差發事切見河北路分新簽軍户省部將元當盡數除豁了當今體知得南京路屯田户計相近二萬方其絲銀止除訖正額餘上趓下數目却今見在民户包納即目本處軍馬調度百色所須民力已是生受更將額外絲銀敷納切恐靠損不安合無依見起新軍差發一體除豁似望百姓蘇􅒚不致因而重困為劉古乃打魚事切見雄霸武清等處魚官劉古乃所𬋩專一打魚人户七十六户每年納魚二千餘頭自去年納至五千四百餘頭比舊數增一倍之上儘供官司用度今體知得歲納魚數增至萬頭切詳雄霸等處俱係河泊斥鹵地靣其間貧難人户别無營産止仰捕魚為生應當一切差役又兼依例認辦課程其古乃每年於民間抽分魚貨巳是侵擾今來本官為增數及萬陳告上司將應有河泊盡拘屬官禁絶諸人不得採捕就問得魚户趙知事與所察相同若依上項所告不惟下奪小民衣食於國家賑恤貧難之意大相乖違又兼天地生物有數歲取萬頭不幾於竭澤乎據古乃所請理冝裁抑合行舉呈秋澗先生大全集卷第八十七
