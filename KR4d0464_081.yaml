body:
  text: 一中統元年科訖差發多有不盡户計所據今歲科差須管子細照勘務要盡實科徴不致隱漏兼各路投下户計差發欽奉見降聖旨亦從各路總管府驗數科徴仰各路管民官照勘本管地面內見住人民户及不以是何人等應合收係當差者須管從實盡數科徴見了數目開坐關部轉行申省聞奏若是中間却有漏落不盡實去處事發到官定將當該官吏嚴行斷罪外宣撫司有失體究者亦行治罪仍先取管民官甘結文字一中統二年差發雖巳定立限次仰各路管民官更為斟酌彼中事勢催徴如限內併納者聽務要民户安差發辦乃為稱職一起置信牌事緣為各路遇有催督差發勾追官吏等事多用委差官併隨衙門勾當人及曵刺祗候人等投下文字不得搔擾民間轉致遲誤官中事務為此擬定今後止用信牌催辦一切公事據置到信牌編立字號令長官次官圎簽於長官廳事封鎖收掌如總管府行下州府科催差發并勾追官吏等事所用信牌隨即附簿粘連文字上明標日時定立信牌廽日勾銷并照勘稽遲限次究治施行若雖有文字無信牌或有信牌無文字並不準用回日即仰本人賚擎前來赴總管府當廳繳納當該司吏不得一面接受落如違究治據府行下司縣其司縣行下所管地面亦仰依上施行一各路所設急遞鋪委自宣撫司提領仍禁約沿路不得奪要文字本管官司亦不得科取差發錢物并照刷遞轉文字如有稽遲日時約量治罪據鋪側近住坐或開店買賣聽過往軍馬使臣人等並不得搔擾遞轉文字除申朝廷省并夲路行移官司緊要文字外其餘間慢文字不得入遞亦不得私下夾帶一毫物件轉送仍常㓛存恤不致逃竄失所若有違犯仰宣撫司究治施行一宣撫司若遇緊要井機密公事須當赴朝省計稟即仰乘坐鋪馬走遞如是尋常公事止令入遞轉發除降去起馬札子外夲司更不得别給起馬札子宣撫司起馬五匹副使四匹委差官令史人等三匹一宣撫司官比及頒俸以來權依使臣分例批支一宣撫司曳刺祗候人比及定奪止設人數每司權設二十午刻諸相大合食于省堂之西偏奉旨命平章王文統舉讀史一人遂以詳定官周止噟選草五日丙辰諸相按問髙麗質子王淳與淇甫事未刻新舊宣撫拜命於省中就付條畫新制及諸換授官資者悉裁遣之草六日丁巳辰刻入見上以錢穀大計問平章文統敷對明敏慮無遺䇿凡軍國大事皆有成算然後撮其要領使例相此草七日戊午上命平章王文統與前省官庭辨中元民賦虛實比上年多寡之數若人為語塞草八日已未暑氣甚隆有旨昨者比附前政甚優終未服其心也奏準差宣便蒲散禧悉起燕帑所有金帛等物是日特旨命趙璧平章政事如故其夜諸掾以會計故逹曙不寐草九日庚申王相以簿書委積重為規畫授諸掾成算以備不時顧問三十日辛酉前相臣安天合授西京路宣撫大使仍錫金虎符特寵異焉未刻堂命惲草宣諭大理及合刺章俾還夲土手詔其辝有云嘉汝等逺自雲南導從選鋒轉戰千里直渡鄂渚以逹於此勤巳至矣今者俾爾各還本土以遂厥性之語各優賜人有差是日九道所造狐貉衣裘其數畢具王相命省掾王文蔚并惲用棋方抹子通類比附使見估直髙下孰省孰費且曰兹蓋史臣年表遺法固非吏輩所能知也蓋有所謂而云五月甲午王戍朔黎明逹官巨僚畢集中省遂檢前省民賦以上年比中元數多而所入者鮮以中元比上年户同而所入者廣論辨者久之前省官屈服始無異議焉諸相僉曰先後之事明矣遂具以聞夜漏下八刻廉右丞賈郎中傳旨曰若輩無狀凡所以欺蔽不應等事悉索焉以聞明日癸亥天威雷震前省官始知懼待罪矣中外聞者有萬口一辭之快是日巳刻東平宣撫司申國信使郝經等為宋人扼駐蘄州渦口不遣入國事既而知為宋人所誑我實不審所在也未刻復遣户部貟外郎王煥催發燕藏諸物𥘉三日甲子晴朗盡日詰問前省官事是日九道宣撫其先赴攸司及諸換授官入朝陛辝歡聲和氣洋洋郁郁滿皇都而載歸路矣上京路總管忙占都喜見諸相於都堂識所謂海魚九尾者四日乙丑問前省官事五日丙寅問前省官事已刻寥休上人來自南庵諸相就謁於龍光北寺識所謂溫庵主者未刻有旨命宣撫姚樞赴省同議軍須調度等事姚字公茂郴城人資明亮深識有理學嘗從征大理有佐命功至元改元轉天下官公力為多上嘗曰公茂善談論物之圓者只説出柄來官至中書左亟終翰林承旨是日左司都事楊恕傳都堂鈞旨令惲草移宋三省牒文向夕隂晦大風其牒草云大蒙古國行中書省移宋三省皇帝即位之𥘉重惜南北生靈之故一視同仁首主和議特遣信使敬奉國書講信修睦往年征進大軍即令分還本屯仍嚴勑邊將非奉土命毋得妄動爰自行人㗸命巳來載更歲律寂無來音其於講修之事將如何哉不惟有失忱辭反啓邊釁以至攻圍我上石侵軼我鄧鄙襲華陽擾隨州劫掠真陽數犯漣水皆出於使軺巳入彼境之後夫信與義自古所恃以為國者也一旦捐棄曲直所在自有任其責者矣若和議可必即當速遣重使與我行人偕來其或逗遛歲月别有異議請選帥徒具戈甲預致師期相與會獵於江南之地可也於斯二者惟所擇焉比來間將屢請出師以報侵強之役省府謹守聖訓弗允所請不識日者數舉果何為而然耶今大駕北狩巳是南還陛見之日何以為奏兾早示定議母坐失良圗以貽後悔七日戊辰卯刻百夷奉使劉方成行巳刻入見多所陳奏皆常例事內一條禁不得以馬挽車引碾及無故屠宰重兵力也是日發郎國遣人來獻卉服諸物其使自本土逹上都巳踰三年説其國在回紇極西徼常晝不夜野鼠出穴乃是入夕人死衆竭誠籲天間有蘇者蠅蚋悉自木出婦人頗妍美男子例碧眼黃髮所經塗有二海一則踰月一則期月可度其船艘大可載五十百人其所獻盞斚蓋海鳥大卯分而為之酌以涼醑即溫豈世所謂溫涼盞者耶上嘉其逺來回賜金帛甚渥是日懷孟路勸農官王秉中字仲撝來王相令訪問枋口去路六十里屬濟源縣所開水利即令溉民田幾何仲撝曰水舊名古秦渠蓋魏未司馬孚創修至隋盧賁復開治唐太和間河陽節度使太加疏導溉河內河陽溫濟武陟五縣民田五千餘頃宋天聖𥘉枋堰始壞至是仲撝復為起廢又云𥘉興役時掘地丈餘得柏枋數十假稱曰枋口豈因是得名乎是夜內庭官忽魯不花不令吉及第二子時年三十一歲飲諸相於中省既夕繼之以火二鼓方散八日巳巳對問前行部尚書馬月忽乃事所牒宋三省又移河南宣撫史公令改作經略司牒宋淮東制司施行就令選官充詳問官者經略公以太原士人崔明道為使南京兵馬副都李合義二焉以往其意蓋以或有不順先以省檄牒之則後無繼焉故也堂議中書出政之地人雜還莫能禁奏準令怯薛丹二人監約省庭間自是中省之務頗清肅焉是日都堂命惲編類歷代水利營屯田漕運錢幣租庸調等法及漢唐巳來宫殿制度等事巳刻上御萬安閣四川楊侍郎遣其子以弓矢等物具表來獻反廽上以手詔答之楊大淵省表具之朕恪守王封遽膺推戴即位之始不遑康寧惟爾逺戍邊陲久服戎政身外心內來陳賀章冝加寵答之辭以勵忠貞之節故兹詔示想冝知悉又一回紇醫者貢橐駝三十頭鞍具幪帕全光彩照地鳴鼓吹螺自臯門而入又一回紇贄栗色宛焉八拜玉面鹿身聳立如畫所謂脫必察者也申刻省起諸相候廉右丞疾九日庚午推問馬月忽乃事巳是日皇弟摩哥大王丗子昌童封永寧王仍改父王玉寶為金印命惲討論古今諸侯王印制遂製紐為駝作三臺其文曰永寧王印十日辛未堂議欲以元寶鈔背用關防印志既而議不便但令比户粉壁嚴偽造之禁從楊宣無果議也有旨遣上都同知阿合馬計點燕京萬億庫諸色物貨十一日壬申堂議曰古者天子有八寶蓋所以崇天授而鎮萬方也今朝廷所用止一寶而已欲議奏令印工季并餘寶皆刻而為之用古文竒篆殆受命璽然惲曰此非可輕議也又務繁需再議焉已刻上手詔宣諭四川侍郎楊某曰勇冠諸將名配古人知大義之可為籍諸城而來附獻以金帶示以誥箋載詳終始之誠冝示褒崇之禮可特賜虎符充夔府路行省兼安撫勾當更冝招懷未附共底丕平但桑蔭不移而能立其功雖苑土至重而朕無所惜其賜卿某物至可領也諸相大合食逹官巨僚於都坐皆霑醉而罷十二日癸酉有旨先召首相二三人入朝餘俟命於省署既而以大宴不克見上都留守同知阿合馬兼太倉使請立和糴所以溢廩庾堂議以曹人李亨字通甫勾當和糴事改和糴為規措所亨修人事極經畫已而粒米狼戻少尹愛其能焉十三日甲戌究問前省官一切事理皆有定論今左右司官具奏目然後詳聽巳上聞以見上下通知故也午轉大雷電以雨且有雹蔽地向夕內省官忽魯不花傳旨令前省官及諸路在都管民等官詰旦集闕下以聽聖訓明日乙亥寅刻詔罷東平路管民總管兼行軍萬户嚴忠濟仍敕戒諸路官寮無是效焉國有常刑犯不容有嚴其𥘉授制辭有云尓父承國家興運左右將士同心戮力封植東平施為名藩我祖宗嘉尓父之功乃建為侯自尓嗣位又草年朕𥘉即政復命襲爵往即乃封敬之慎之其修德砥行自立名節勉圗後效無忝先猷至是未見顯咎遽為黜罷或者不知而異焉未刻諸相退朝園坐按問李宣撫王正之等事既而廉右丞傳旨召平章王文統遂入見上於香閣夜漏下草刻方退十五日丙子誅東平經歷官邢衡銓𥘉邢以事告參政張易詰對於上前邢欵服命諸相監戮于都城東十里外張手剚其腹從𥘉請也十六日丁丑雨廉右丞耶律中書張參政王平章推考定奪諸路户口等事十七日戊寅諸相復定擬大名西京北京賦稅户口未刻藏春仲晦來朝諸相就見於李虞卿宅略話而退是日已刻上臨軒親諭諸路總尹遂以前東平總管嚴忠濟弟忠範為東平總管仍戒之口兄弟天倫事至於此朕甚憫焉今豫命尓尹兹東土非以訟受之也彼所責匪輕敬哉今而後苟不克荷非若汝兄幸而免也至是知忠淸之失皆為其弟所發因各賜馬酮慰遣復有改故從新之諭又黜大名路逹魯花赤愛魯魯河西人小李鉗部之子也十八日已卯晴暑上召前濟南宣撫宋子貞真定宣撫劉肅河東宣撫張德輝北京宣撫楊果於內殿以擢用輔弼為問楊果等前奏曰王文統材略規模朝士罕見其比然以驟加登庸物論不無新舊之間如史天澤纍朝舊臣勳碩昭著若使宅百揆大厭人望今文統輩經畫其間則省事成矣上曰置史某相位念之久矣卿等所言允協朕意因賜食而退十九日庚辰入見奏栽大拜及六部事詔以世臣不花經略史天澤為右丞相不花時三十三歲憲宗朝怯薛丹長領斷事官其祖太祖神元皇帝朝功臣父也孫秃花憲宗朝萬夫長忽魯不花耶律鑄為左丞相忽魯不花時年三十一歲父不令吉亥官人塔察兒廉右丞平章政事塔察兒時年草八歲其父憲宗朝世臣千夫長張參政為右丞宣撫楊果宣撫啇挺參知政事餘如故是日諸相入見將退上慰平章文統曰卿春秋髙恐勞於奏請今後可運籌省幄若有大議須面陳者及朕有所咨訪入見小事今人奏來不必煩卿也上以王姬下嫁午刻幸新桓御營草日辛巳奉旨命承旨王鶚定撰諸相制詞草一日壬午晴暑闔省大燕慶新除也時既相史公所事皆倚重焉丞相曰天澤武臣何克負荷但物務未安者老夫通譯其間為諸君條逹耳相則豫曷敢當衆愈服其謙抑皆霑醉而散是晚承旨王公命惲賫所撰制詞呈省其文通作一卷實封細銜書名上用院印或問焉曰白麻蓋自中出令實封防其外泄亦唐人鎖院之意也既披詳或欲有所更定惲力言其不可昔楊億以一壤字不勝其恧况改作乎苐修飾之可也其史相詞頭有惟卿丗篤忠貞材兼文武樹戰功於疆埸卿力良多論機務於廟堂朕心允協冝示百僚之式俾居諸相之先可特授中書右丞相卿其振紀綱崇體要往服新寵以壯舊猷廉希憲惟卿秀拔父兄學尊師友往綏諸道視民一以如傷就建行臺臨事毅然有斷冝從政轄進署相銜可超授平章政事惟暨乃心以答朕命楊果棹秀詞科馳聲劇縣佐南州之經略才巳見稱專比郡之無綏人皆受賜政之參決僉曰汝諧可特授參知政事祗服寵休益思報稱草二日癸未申刻堂議定省規一十條其一曰凡三日一奏事軍國急務不拘此限其二曰置勤政簿一扇凡公議已定事詳見于簿讀一譯不得增減言得日標題於逐欵之上還省立檢圎覆定行其三曰圎議定時首領官先擬定其事自下而上相次剖決議定題押批判若事關利害情見不同者各具奏稟其四曰圎議時非定貟不與知本房者不在回避之限若事涉機密者巳次請退其五曰同僚赴省日出為期停午乃起旬一日暇事遇急速不拘此限有疾故者須令報知庶免延待而巳其六曰省府官并屬官各家不許受詞訟公文其七曰如遇闕貟圎議公選不得用門下人輔充其八曰省府通譯史額定選充餘者不與其九曰奏事上前宣讀通譯人各一貟其十曰凡告事説事者聽畢避其人公議定然後回答僉曰所畫理到遂施行焉草四日乙酉巳刻奏準粘合中書授平章政事北京行省前歸德府官民總官張子良為河南宣撫使張字漢臣以名行午刻令郎中賈居貞照勘一切換授宣牌事無有稽緩草五日丙戌平章塔察兒日令參政楊公説通鑑三五假是日至吳太子明蜜中鼠矢事塔公掩卷曰我試為論之與正説合一省為屬目僕散禧起燕京帑藏至上都辰刻上觀於內藏喜甚曰自祖宗已來未有如是之多也申刻平章亷公郎中賈居貞掾髙明赴新桓御營奏事堂議專委參政楊公定奪內外新舊官資是日諸相授麻制於都堂詔下中外稱賀不勝其喜曰自國朝開創巳來論其得賢於斯為盛時有言綦陽鐡官不便者大抵其民皆殷實上户歲官得鐡甚鮮不能當歲輸包絲稅石之數若用此易鐡可增官煽數倍之上堂議曰若奏上朝廷即從然不重慮恐未免橫議仍令惲與工椽李鼎計勘一歲常課所造幾何橫造幾何一歲通可用鐡幾何在都廣備庫見有鐡幾何且可支幾年用度其外路應有鐡貨可支幾年用度既巳公曰未也若令民間興煽官為抽取凡幾爐一歲通可得鐡幾何既已公曰未也若都除內外見有數目止以民間一歲抽到鐡數可供幾年正橫造作用度既已公曰未也若將治户合人差稅取酌中價直一歲委可易鐡幾何有無少餘既已公曰未也更為積算一歲合用礦炭夫役且以酌中定數有無虧損官民既已公曰未巳更為大約鐡官一歲及上下一切侵漁掊克虛耗官物幾何既已公曰可也明日奏上果有恐失誤造作為言者以是應之遂罷冶户歸民因訓惲等曰書生論事大槩不差及詢其所以方略鮮有不遲凝者若將讀書苦心移之治此只一燈之功爾於政事何有汝等勵精焉可也何患兹位之不到哉是日不魯海牙授御史大夫兼大司農省諭一切言告事人不得私家請謁投訴遵新令也草七日戊子亭午右丞相史公赴永寧王榮授改鑄駝紐金印餘相圓坐照對燕京路民賦未刻掌記魏𥘉來自燕城申刻定議公府署押事右丞相史公與丞相忽魯不花五日輪畨一秉筆長官從上押右者處外邊一左一右以次而下圓坐亦然所謂廟坐廟晝也日將夕有大流星隕自巽位白光照野移時方散是日劉宣撫才卿説前朝省府各房止立鈞旨簿無行卷六部應呈事務左右司官議定可否粘方帖於部呈上書送字得都座準議省雜批釣旨於後其左右司元書送帖亦不揭去用省印傳其上蓋上下互為之防然後送部施行燕京路宣撫徐丗隆威卿説舊曰户部設審計科以料周歲所入幾何經費幾何遇有支發至十萬貫部方呈省大抵係常例有定體者如百官貫石之類是也外郎邢敏説舊曰郎中與外郎都事另幕坐是年秋與郎中不同處矣及有所編省臺定式亦有可取者劉宣撫又説舊日殿上奏事止左右兩司郎中其人賢遇執政有闕即拜參知政事草八日巳丑右丞相史公首秉判署是日命掌記魏𥘉令史馮嵩執掌奏事諸簿午刻奉旨定擬中行兩省去留人貟抵暮張右丞下朝説所奏事天顔甚喜交史丞相張左丞楊參政留中王平章廉平章張右丞行省事于燕草九日庚寅催督中外一切未經換授宣牌等事恐留難故也省退王相置酒私第會劉才卿宋周臣姚公茂王百一竇漢卿張耀卿許仲平李士都蓋留别故也是日嚴忠範授東平路總管李士都授翰林侍讀學士其制辝曰李昶學禮傳家明經登第練國家之典故謹士行之操修方當青史之編冝與玉堂之選冝公褒貶以示勸懲夏六月辛永朔卯刻艮方有青紫二氣橫亘間錯長袤數十丈移時弗散巳而霧雨交作不見天官書云凡星變氛祲三日內有雨大小凶咎即亡嘗以理推之乖則致異和則為雨既和而雨其災自無經曰往遇雨則吉是也二日壬辰晴暑詔賜木苑大王駝鈕金鍍銀印其文曰建昌王印時王見征戍大理諸部建昌雲南之别稱也都堂為諸投下種田户奉旨逐欵施行一阿术魯柭都魯為頭衆探馬赤官人每乙未年皇帝聖旨為逐官出氣力上撥到種田人戶擬自今後每年除絲線稅糧照依舊例合納包銀內一半納官一半給付本官用度阿木魯拔都魯塔四火魯赤笑匿亥李里匣兒拔都闊闊不花孛羅口怯烈亥撒及四不花這裏四迷按察兒持不哥兀也里乾男塔丑别立古亥一有幹只思皇后下民户八十五户內六十戶元係牙刺瓦赤全定包銀來今擬將合納包銀內一半納官一半赴本投下送納外有諸雜户計二十五戶內打捕一十一户依舊送納絲糧隨營一十四戶種田納稅買賣納啇稅一有阿吉赤大王奏告為先奉聖旨於太原路五戶絲內支與皇后合敦銀一百五十定內除支訖外欠一百二十定仰於本路五户絲料內中統一年為始分作三分年放支與者外據種田民户二百一十戶合納稅糧數目令本位下就用除已行下放支外仰照會施行絲線包銀與其餘民户一體科撥一有塔察兒大王奏漏籍户事仰依巳行詔書體例行者一有阿刺合赤妃子從嫁民户差發并匠人關取係官絲線織造假匹本投下送納事仰就便取問本位下人貟據上項民户差發若前斷事官定下全撥今擬減免一半如已定減半者今擬全免外據匠人依前關取係官絲線織造假匹赴本投下送納者一隨路應有金銀銅鐡丹粉錫碌等窑冶附籍漏籍民户盡行罷去分付元附籍地面官司應當差發今後許令諸人等有願入狀採打煽煉不用官本及占役百姓者據所得數目官為斟酌抽分若元管頭目等願入狀不用官本及占役百姓興煽者聽如不願者許他人入狀承認一河南路管下舞陽等處栽薑户仰與民一體當差每年合用生薑就燕京官為和買一諸投下壬子年附籍􅥟口仰照依先帝聖旨於冬各附籍處依舊例當差者一張杪兒赤奏隨路樂人差發事仰行下各路宣撫司與民一例當差止免雜役仍仰各處官司都不得因而搔擾不安遇有樂人赴闕承應官司斟酌與起發者一忽都花奏有茶罕元撥與字羅亥夀州民户內附籍三十一户見當絲線包銀稅糧外有漏籍三十一户內有打水獺一十户乞定奪事仰照勘附籍民尸别無爭差依種田户例送納絲糧外據包銀一半納官一半與本官用度所據打水獺户不須打捕水獺與其餘漏籍民户一體於各管官司當差一藤花户交各處官司與民一體當差仰斟酌氣力約量科取加存恤外據年例合用藤花仰所屬地靣官司從長計置趂時採摘依數送納毋致滅裂採取闕少用度一火赤逹刺罕大名府民户伍伯餘户每年除納絲線稅糧外不納包銀止納軍漢車銀二定二十九兩次後斷事官按脫定下與民一體當差仰依元行例與民一體當差施行是日未刻奏定左右三部尚書等官秋澗先生大全文集卷第八十一
