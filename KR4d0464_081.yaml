front:
  text: 秋澗先生大全文集卷第八十一中堂事記中五日丙申隂晦王相同左右司郎中賈居貞始入朝陛見上喜甚既退侍中和者思傳旨命與諸相集議六曹并九道宣撫事於中書堂六日丁酉諸相會左丞張仲謙第左丞名文謙字仲謙邢州沙河人資安和匕恭內敏於政不大聲以色為都司時公來催帳竿棊工事因教曰朝家事有大小大事需議可敢奏稍緩無方餘則不然吾子切念之今日思之可為至言也以決前議大抵選官薄賦評鈔法等事論者頗交雜王曰何傷取其長便者用焉未刻諸相入見進大定政要因大論政務於上前聖鑒英明多可其奏班退論諸相曰翼日朕郊祭釃馬酮馬卿等不必扈行凡內外之務比還悉裁定以聞八日巳亥天日極晴朗上祀天於舊桓州西北郊皇族之外皆不得預禮也九日庚子晴暖諸相圓坐都省集兩曹掾史讎九道民事十日辛丑王張廉三相洎賈郎中會議政事因論功利等事且曰丗代下衰其勢有不得不尓者時惲亦預坐因徐起而言曰功利既不能弛心與術亦不可不辨也且心以居正為體術以應變為用終之體不失而有成者為上此大臣所先務也三相愕而起十一日壬寅保定總管蔡國公嗣子和略以本道鈔法事耒議都堂為經畫之已刻張參政廉右丞會王相第令詳定官周止縷讀衆士嘉謨而詳聽焉僉曰不為無益也繼會九道宣撫定議官制輕減民賦等事申刻東北雲起蓊若潑墨雨東來散絲千門間乍暑霑潤為一快也十二日癸卯諸相集廉右丞第審定前議盧進之飯焉餉午鑾輅還宮有頃侍中和者思傳旨召諸相入朝遂以軍國大政上聞都俞際衆悉之以對天顔為喜動且有恨其見晚之嘆是日平章趙壁以軍儲事𬒳譴胥靡於家甚嚴惲時從承旨王公上諸趙公心雖惕厲氣量𥙿如也從而不去者唯門下士李革在焉趙事為結東平糧事李九山謂此事蓋意起於陳德秀禍成於杜彥深公實不知也藺仁甫之是日河南宣撫兼經略使史公至自汴梁十三日甲辰卯刻會廉右丞第辰刻諸相入朝以議定六部等事上聞綸音撫尉大允所奏曰向耒群疑渙然冰釋比出宫小雨浥塵綬轡沙堤有不覺其喜者晡時張參政廉右丞會王相第以奏允諸務耒審聽焉十四日乙巳雨午刻開霽會楊宣撫果張宣撫德輝劉宣撫肅張左丞再議民賦事蓋有所未盡故也十三日丙午有旨就上都長春宫作清醮三晝夜為民祈福奏告文字交王鶚定撰者其辝有既獲卑矜之福冝隆敷錫之恩六轡屬還歸之際一家孚保又之休言念蒼生不無素擾或凶荒之災相望或轉徙之苦相仍雖勑有司俾修善政更祈照鑒普洽鴻私是日巳刻廉右丞張參政會王相第呼金齒蠻使人問其來庭之意及國俗地理等事言語侏離重譯而後通國名百夷蓋群蠻之總稱也其地在大理西南數千里外而隸六詔焉曰阿吉者捻迭部長阿列所遺曰鉢布者玉龍川部長塔亨所遣偕來者八人始自戊午冬發於本土至是方逹上都其人衣冠裝束髻髮于頂褁以絳氊復以白疊布盤繞其首衣以皂繒無襟領之制膝以前裂而編之如懸索然眉額間塗丹墨為飾金其齒蓋國俗之賤者也意思野逸殆驚麕然其土冝稻有牛馬山羊雞豚鵝鴨之屬兵械有刀槊手弩而無弓矢甲胄既而遣還上命中山人劉芳借職兵部郎中使其國都堂命惲草詔其辭有嘉爾等跋涉修阻懷德逺來首輸事大之誠克謹畏天之戒轉為宣暢皇猷告諭鄰附俾知國家威靈無逺弗屆之意是日耶律中書來自漠北聖旨十六日丁未史經略張右丞洎衆宣撫集都堂條具民政十七日戌申辰刻諸相入朝以集議聞上一允所奏向夕出宫十八日巳酉省奏準條畫民事凡草七欵為施行之十九日庚戌百僚入見少頃出會東省奉旨召九路總管頒示新典若有所陳即具以聞除河間真定餘略有異同復為啇確奏裁以定草日辛亥內宴不克見是晚工部石里忽即李𬒳問堂命都司楊恕提控趙謙同惲等磨勘工匠支銷等簿逹曙不寐草一日壬子都堂令惲檢討唐人置信牌鎖長官廳事諸相辨析石里忽事責遂有所歸巳刻既雨而雪寒沍盡日草二日癸丑八見午刻諸相圎坐讎校九道宣撫殿最時東平撫司民賦有未足者某官對云云省官曰不聞詔條使户口增差發辨方為稱職某官以不敏謝及議中外新舊官改授定制轉午雨雹蔽地大者如彈丸俄而風作土下如雨黃霧四塞逮酉刻聞開霽草三日甲寅司天臺官中順大夫張為雨土事以民勞上聞明年新都之建遂經始焉草四日癸卯極晴朗諸相入朝奏準七道宣撫司所行條畫
