body:
  text: 七言古詩入侍行贈董符寳君家大兄吾故識君家三兄乃友執㳺談仰止有歲年只有八郎𥘉未覿八郎内時五雲深五雲宮闕何沉沉此時宻邇司獻納夙夕忠謹餘月心人知掌中金窠篆屈蟠螭重豈識兩䄂中有蒼生霖㥒聽民瘼懐惻怛細至稼穡艱苦歌謡情聖皇逹聦豈有既天語夜乆何叮嚀御幈香暖代鳴玉髙枕安寢神逰清輸忠徃徃捄時弊筆諌不數公權誠君不見西漢元封神爵間两朝貴幸張與金長楊蓮句滿宫舘正以丗閱逰從列九卿何如董侯剛方見特立大冠脩劒明月簮日華光動鬰金袍嗚鳳翔集朝陽岑一從通籍愈忠慤四海知有万石不為冨貴之所淫書生薄㳺不足惜凬化正爾基周南炎蒸幽朔今一軌好承清閑之燕請君一皷觧愠南風琴小山行馬子卿簽事贈予小山子目之曰共嵓故作是詩以謝我㫺東登㤗山頂直度天門歷參井十年西走華隂東仰面蓬峰落天影岱宗坐如太華立夢寐至今猶耿耿朅來塵土客京師長徃無時空自省愛山復得馬簽書相對髙談冠佩整馬卿有石寄禪䟽護持擬與經凾俱中峯魁岸大人坐兩峰傍翼殆若庭立而議相承趨我因閑逰叩僧户見之清興為𧺫予摩挲携去便許諾喜過中流失舟還得千金壺汲泉滌濯抉泥滓特置棐几為膏濡君不見羅池謾作万石記娱恱巳棄荒夷嵎一拳㤗岱堕吾前寸碧點出遥岑圖愽山香煖黄金爐細烟蒸潤飜飛鳬芳菲來助怪石供縞帶一縷山腰紆有如岫雲雨歇歸洞府変化㓕没還湏臾羗予本是山澤􅋯澹然對之氣安舒年來便静百念冷今復樂此依俙仁者之徒歟山容忽開欣我主瞑目便到秦觀呉觀之仙都茶甌去手風生臆飄飄如駕天門舁月明䆫影印庭栢落落恍倚秦松株地爐火熾紅艷發又似日觀坐看日出海湧金輪孤茅齋一夕得此樂冷却案上熊蟠膄微官不到竒章公甲乙乃有竒章之一太湖它時南歸冨潤屋不愁室無僕孥居無廬敖懃厚貺何以謝我欲贈之㕠瓊琚瓊琚雖羙未足報拜贈新詩永為好沙堤行君不見漢家日月四百載比隆三代追唐姚經綸帝業顧多士規随始自曹與蕭又不見丙與魏孝宣中興頼宏濟佀慚爕理化權衡重以文儒縁吏事羽毛千古動雲霄黄閣清風两無愧潭潭政府中書堂朝廷思治具畢張歷觀至元中統間諸公翺翔佐時昌相君継踵叅幕畫怏决不數陳元康况今炎風朔雪混一統軍國庻務何穰穰一朝鳴佩見獨歩恩波鳯沼飜晴光小心清慎冨籌䇿人望翕爾稱賢良房謀古推帷幄傑匪以杜断疇能将璣旋衡幹日万計夙夜宻勿心靡遑愛君南選儘公允要使四海桃李俱芬芳我常叩君見餘藴選進乆已歸鞶囊栁隂大道沙堤長迤邐逺並宫圍傍錯金䡖軟襯珂馬火城前導光煌煌行人走避歎禮絶焜耀爀奕何非常相君報國有能事澤民三代君虞唐火城沙堤誠足當况兹三陽排凝出九地君子道長群隂亡惜㦲時乎不易得為君一言陳斐狂蕭曹開濟固云重丙魏論思詎可忘羽林萬騎歌并引至元丙子歲立春后三日醉八奉御宅明日酒悪隱几坐殆不能為懐遂取通鑑閲唐明皇帝清宫事蹟作古樂府一章號曰羽林萬騎歌書示表弟韓從益且浮大白數四覺酒氣拂拂從指間出去矣其辞曰韋娘雞晨遵慕武牝雛啄李求太女履霜得氷忽深戒禍始房陵帝私語神龍殿前虹貫日王氣龍池濯烟縷羽林万騎驍且雄守捉内外生隂風韉裁文豹虎衣炳扼腕乆弗諸韋容潞州别駕眼横電虬髯英姿真太宗暗中結納許清禁継以幽求玄禮仙鳬忠玄武門前聽二皷散乱天星隕如雨平明一掃妖氛空相王巳是玄真主東城瑞靄朝日鮮五三甲第臨天淵三即歸來龍在沼晴波翠灔終南烟開元隆平此張本烟火萬里春熈然誰圖勇断蛾眉劒翻作環児並轡鞭畫家有玉環並轡圖瑞雪歌丁丑歳正月𥘉六日夜作去歳一冬無雪雨地不藏陽變恒煦就中氣運北自南江表嚴凝比燕土今年正月日丙申我㳺中堂聞好語聖恩滂濡來九天四海包徭盡蠲取宰臣奔走播德音雷厲風飛開萬寓油然雲葉合中天一雪平明幾尺許建章宫闕玉崔嵬華桞蓬萊氣先吐漢家燕南三百州千里飛章賀㤙溥天人上下本一致和氣致祥乖則異方春甫頒寛大書埃翳四開天地閉春秋盈尺書有例太史紀言真上瑞都城十日沸歡聲宿麥連雲見豊歳民願聖皇千萬春長開明堂布㤙惠元和老臣愛君深賀雨詩成伸戒勵小臣今作瑞雪歌要見天心愛民意謁蘇墳在汝州陜縣釣䑓鄉娥眉山前神嵩崩騰萬馬東汝流西來横玉虹山川秀潤不少悴知有峨眉老仙宅其中先生立朝有大節南遊天使完其忠胷中英氣蟠不盡餘藴散作文章宗天章昭囬爛雲漢下探萬古英靈空前年西堂覩先生之真像今年此山拜先生之堂封嗟予何者有此幸青藜得照龍淵宫汝陽樓上重囬首安得追逐逸駕攀髙風滌濯固陋開顓蒙公雖僵卧其猶龍雜言送文郎中子周宣慰江西道君侯交㳺二十秋胷次磊落誰與儔湖海豪氣老不减百尺髙卧元龍樓三年京師騘馬容搏撃快佀鷹脫鞲郎官民部纔十月持節撫慰江西州堂堂提封㡬千里陽開隂闔無深幽滕王閣上洪都酒孤鶩殘霞重囬首江山滿目􅦔我歌一曲陽関渭城栁聖㤙柔逺思悠乆化自周南同九有大司綜理固多端急手先湏橅瘡痏四民樂業兵有制盡徹湖陂変耕畒時驅大斾擁行軒布徳揚威趂春首丈夫此時不有爲何者功名垂不朽我雖鎩翮思奮飛㑹把一麾仍出守義士姜侯歌并序歲辛亥秋燕留守府叅謀刘坐事就死属其孤扵友人姜君諾焉既籍沒姜爲伸理其子逹官怒其僣張弓擬之姜不少懼即棵胷以逆遂義而從其請自是姜君義烈聞燕趙間後折莭從趙雲夢學非其義一介不取諸人丞相史公賢之以賓客禮焉至元丙子冬同張彦魯入燕聞姜云亾追念徃事爲欷歔者乆之渡易水之悲風荆卿巳去念朱家之長者今復何人爰作歌詩庶幾紹擊筑之遺音云姜諱迪禄丗燕人子尚其字也刘字正卿叅軍属孤出鬼幽姜侯諾之無蔕留一朝赤手編虎鬚義氣凛凛横霜秋命䡖義重㤗山比白羽迎射身熊侯孤児挈歸兔孥戮姜子拂衣無所欲朱家素擅長者風睚眦椎埋真碌碌魚紋三尺澹秋波千丈聲華光輦轂至今燕市人嘆羡五百年來未之見張卿說似予作歌庶激清風代君傳趙穆篆隷歌丁丑歲四月十六日作古人冨席珎璀璨玉無玷兼善不並稱例為長所掩予觀當塗文雄放雜淒渰一朝玉筯名餘作鋒鍔歛是知學與才相須成琬琰六經學淵㑹熈緝光自𦦨道藝貴自得舎瑟想曾點陽氷嚮匪斯文徒秪解篆畫方圜橅千言落𥿄極停穏一雋而後將無餘眀昌王趙稱文儒問書竹溪真起予㣲言提撕何理到歸讀六經兹本欤趙郎翛翛姿態殊十年弄筆好古書嚮來客燕見其作殆似蟬欲蛻殻虵遺膚去冬丙歲復入燕趙郎篆學超於前我為驚戄問所以荅云近得松岩之秘傳惜哉髙君今已矣黄壤不没蛟龍蟠嶧碑岐鼓得遺法趙郎手追忘寢餐我因為渠槩一言書至形似真徒然行逢碧落卧其下發塚親得中郎編胷中塵俗何由蠲正需力讀經與史他時㑹見將與松岩並驅相後先食梅子有感穉歳食梅矜行輩並撥連揮嘬長喙近年羅列雖滿前黄熟有餘聊雋味極餐不過三數枚老頰流酸牙莫對物逐時新歲歲同人到中年凢事退潮陽南還幸不死齒豁頭童足悲嘅我今五十齒雖牢食不能多行亦憊只有區區行志心若與公同人不逮潜齋歌贈中山知府史子華潜齋有志操不為浮榮汚彛衷剷豪習摡之詩與書呉鉤佩錦带寳校千金駒溢目不囬顧棄如履中苴嘗出試所學三年事徴輸衛人樂安使歳計公有餘淵潜不自珍昭然靄芳譽不覿五載强去冬㑹燕都與語覺道勝行身老諸儒神王氣骨清兩目秋鷹瞿扣門來別我朱幡擁髙車去作定州尹志意何安舒余思潜之功於焉見容與中山物繁稱奥區燕南劇郡此要途大兄持節官衡湖四郎按部参旗墟一門鼎足列清要正有報國忠而劬凝香燕寝供坐嘯紅旗鐵馬無邉虞心清事簡自多暇輕裘錦爛光鄉閭况君才髙足爲治聲聞日向天朝趍書来不必諮蕘議丈八盆邉有二蘇長慶行酬暢純甫贈元白二集長慶詞人㡬勍敵名動華夷説元白拾遺樂府即諫章相國絲綸號新格天教韓栁出仝時要使詩壇閗清逸年来愛白復愛元老厭風花喜情實圖書東壁黯晶熒五十年来無是集有時擬賦三兩題㫁簡殘編僅佔畢暢君好書似鄴侯荷囊去躍龍􅋮舟臨江釃酒参幕畫佳䴡㸔盡東南州棄人所取取所棄青帙萬卷堆行輈蒼江夜静虹貫月不羡克敵琳琅璆三呉歸來巾一幅蝦蟆池頭兩椽屋足跟不踏貴人門磊落羣書載其腹自欣滯貨潤有餘贈我兩編償不足恍逰赤水淂玄珠咲入荆巖抱和玉翛翛庭竹北窻風准偹殘年霑䞉腹虎牢關行至元二年夏六月予與搃管陳慶甫考試洛陽東還汴京道出其下鞏原北望河洛郊嵩邙柬走脊尾髙憶𥘉洪水勢方割湯湯北匯深渊壕千年水去两崖出天險東阨開成臯中原失鹿在所逐河山戰氣秋蕭騷當年刘項侭勍敵阮生猶為嘆非豪竇王椅角更可笑如蛾赴燎其能逃秋烟古戍深黄蒿狐狸夜上関頭嘷空餘千古荒城路輸與行人説爾曹送齊彦簽事湖南廣平一生真相業老坐朝堂振孤節理明有守見不疑萬事坌來能勇决我㳺洛師比盧龍嗣侯共事多相從文章翰墨有定價落落真有先相之遺風今年白麻拜新寵去去按部江西東朝廷妙選正有謂雅志不負温郎騘江南緑水天四圍秋風吹野百草腓煩君華岳峯尖舉着眼飛翔覧徳輝商鼎歌并序燕士張君文季讀書不求官治生不務冨稍有嬴餘即購求古噐書畫為事故其家藏三代巳来䁀彜敦卣及前賢法書名畫甚富素負藻識遇夫竒妙不惜資貨期於必得既得之傳觀惜玩𥘉不吝惜暇則明䆫棐几展師陳列廼沾沾而喜曰古人不作古意尚在三代之英精諸賢之純粹今吾何修一朝盡得而有之其稽古尚友之誠静觀適懐之樂於斯時也中心充實意得所寓回視晉椘之冨趙孟之貴不啻如雲烟之過目遇佳客踵門焚香煑茗盡彂秘藏為序説家數評論其優劣雍容文雅有都城故家風味於足稱也仙露寺僧寳藏商鼎有年不惜百金易而得之愛玩不足復求舘閤諸名勝詩詠喜為序其平生澹癖仍以古調歌之其辭曰維商賢君六七作禮重烝嘗制於鑠只縁近古俗忠厚象形作噐窮精鑿敦彛鍾鼎賜臣工重比謚贈縻天爵當時文獻不足徴故家餘俗歸寥索蒼銅不逐太社凶千古流傳誇灝噩供佛牀頭夜壑深物歸所好得真托張君嵇古負精識入手摩挲三歎息兩耳髙撑足拱三六乳附觚何的歴餮饕繞腹雜雷紋紫翠英英帳猶湿細觀𣢾識商父丁崑玉南金非所惜平生澹癖心不足此日大嚼情暢適模形逺紹考古圖發揮假手詞人筆君不見當年莘叟負謁湯髙宗肜祭雉雊鬲黄金塗耳玉鉉光此事傳聞巳陳迹一朝怳堕三亳間神明之噐今目擊或裊沉烟讀誥盤或挹殷谿煑巖石尚友直探三代英平生閱古心方畢歸夢謡丁丑歲九月二十三日夜夢陳緫管作時為浙東宣慰使十二月二十日宻縣王縣尹至知公於九月七日為越之玉山賊所􅊣五更歸夢東南長越州城府山蒼蒼我遊不省夢中客浮雲樓觀争翺翔節齋枉駕來就見上廉遥喜瞻清光倒衣走欲降堦接陳公出避朱門傍斯須徃謁登西堂要話乆别傾肝腸我公不之見蕃師滿禅床卉服魋結古碧眼須眉厖争先問訊展恭恪青松亂踏天花香就中老沙弥合瓜伸圎吭向子致呪語隂福來穣穣思公罔覿對佛子坐乆心思方彷徨傔來促起公召汝導我前徃穿行廊追奔接踵歘不見如瞽失相徒倀倀平頭闖首告前路終惑所往心爲狂惘然推枕若有喪但看落月滿屋梁我思與君别屈指一載加相思葉黄江水碧神交日夜心曽遐自春徂秋三入夢似恨海角天之涯吹燈信筆成詩句病眼溪藤亂紫花時目病新愈乂暗用楽天元九紫藤花事日蝕詩至元十四載維龍集丁丑孟冬丙辰朔詰旦隂風吼朝家有移告日蝕百司守伐鼓幣用杜庶嗇閧奔走都城十萬家竟日喧釡缶壯於田單兵聲勢助衝掊盎水觀日景占刻入午辰蝕午正二刻陽精從西虧若有物噬吞𥘉看偃珥玦再覩巳半輪終風轉蓬勃天影慘以昏斯須食之既陽光蔀無垠始似昏暈鏡乆乃挂鐡鉦團團溢隂影環輪玉爲繩晴天朗晝藏厚夜九衢草草人靣青衆宿不多出争光見三星謂填星角大角三指也只愁六鑿渾沌死蒼生百萬淪幽冥盻盻向申正輪圎復其明炷香再拜立前廡心魄動盪乆尚驚隣翁行年八十一如此災變見未曾我問長老說日月中有烏兎精顧兔固㣲物性狡隂邪萌人間三窟厭不處縁雲入月爲家庭太陽養火烏爀爀森神兵飼肉祝融家渇飲咸池泠二足利鈎戟炬火燃兩睛婪婪鐡作喙啄雲下開變隂晴曜靈壮汝觜與距外侮有犯鳥維憑六龍頓轡或少軔知有神物擁護終是隂為懲不然日圍千里不一蓄棲尔其内將何營及兹隂精盛所歷乖常經陽烏雖神力寡弱勢重不敵從侵凌避集扶桑枝噤縮潜威靈想當旣厄時如何炎官赤熛不率其徒來助勢與聲彤幢絳天皷雷霆振烏挾日騰两翮火吻噴薄摧隂凝逐兔入月脇隠伏跧其形樸朔知所懼彌離黯光晶含章合玄度安曜周八紘天公此兩目萬古更不盲嗟予旣匪羲和官區區空抱傾陽誠天髙不可階此事難具陳作詩擬月蝕欲見此志終或伸盧仝撫掌韓愈笑吾等狂徳君其隣南宮老仙雲山圖米襄陽筆應奉李受益藏南宮玉堂春晝晴瑣䆫霧垂幽思清先生胷次幾丘壑淡墨落紙詩無聲白雲㓕没春山碧萬木淋漓元氣濕風煙自昔鹿門深似愛龐公不浪出㐮陽雲卧思怡恱不為濃纎争巧拙虚堂生白定何如玉氣柱空虹貫月盧仲傑送所逸東萊集二帙盧卿贈我東萊編偶逸二帙心茫然朝來覔送欲舞有似合浦珠還蠙要書不必三萬軸挿架所貴皆成全風軒讎校忘午寢一讀三嘆鏗朱絃毎逄佳處時再欵不惜两眼遮昏煙就中細味官箴作覺我踈愚性最便簽院趙公許惠歐蘇集作詩以問之平生性癖耽墳籍細字牛毛早年筆只今五十眼昏花清晝看時滿行黒投身散地百無亊不著書遮如有失趙公嗜書似鄴侯不為章句非雕搜綰持樞紐日多暇借箸自有胸中籌更尋往事較所䖏有夢不到琳琅璆嗟余何者登瀛洲殘膏未免窺前修大淵然濶海鮫鰐翥洞視千古蘇韓歐文如不作作取法捨是三子將誰求窮閻雖具何足玩破碎重黒支吟頭牙籖揷架三萬軸誰省浙本鋪銀鈎或蘇或歐兩俱可勿使石壁成空投仁存義舉侯門事却恐乗機似巧偷仁存義舉用史記侯之門仁義存晋石壁見管子涇陽鎮中秋贈馬御史時予授監徳昌司南下去年中秋客燕山把酒望月空雲烟今秋此夕涇陽鎮六合一鏡懸青天乾坤軒豁開真境萬籟無聲露華冷京居多暇賞心違長路無家此清景湏知世事皆偶然賸却私憂胷刺梗同行喜淂馬少逰月下一樽還對影爱君才氣白眉良攬轡澄清知所省豸冠自古出儒冠老寉何為随露警人生㡬度中秋月不學羣兒𣣔圎缺舉杯酹月月應聞安得玄霜變華髮追逐諸君昌晚節小邉行一百五日同揔尹張彦亨赴小邊口相視河流回馬上偶作此詩北趍小邉相河害坐看長堤驚裂壞中流忽起劉子歎䟽濬神功思禹大憶當殘金堯河界两涯峽束如縈帶靈鼉萬皷動地來洶洶聲聞千歩外堤防不議四十年河行虚壌任徙遷乃今去京無一舎衝波南卧翻鯨鱣今年築堤捍渰水明年捲掃防洄淵濤頭况與酸棗直南北髙下尤相懸旣非經瀆乆逺計徒費民力妨農田正有避移䇿上聞放之曠野從奔衝不然建議以土湮大堤縷水横西東楗以木石東逾鐘逓河東去過京角此是永逸無窮功作詩擬逹宣房宫夢陳節齋至元十六年巳卯寒食夜卧開封後堂夢節齋陳公旣覺呼童吹燈信筆賦此追憶徃事令人短氣書示正甫敬甫二君子同爲一嘅也花枝入簾春夢香逰絲翻空清晝晨今年寒食客梁苑追憶徃事心彷徨前年考試登玆堂陳侯館予羅酒漿拊床髙詠逸興發不覺燈前大雨聲淋浪生平胷臆向予盡使我肝膽争開張重來物是人不復夜夢見之晝微茫誰期此會乃死别剗血不㓕呉雲蒼攬衣起行歩落月梅影滿庭空断膓信陵公子行與西溪同遊春風獵獵吹輕裘聮鑣來作夷門逰令人逺憶魏公子徑上吹臺臺上頭却泰存趙震九土誰意抱関老吏能此帷幄之良籌飢腸自古出竒䇿功成何害屠沽流髙皇布衣重公賢大梁城邊幾遅留一朝龍驤開漢業舉功不復詢來由豈非慕藺承餘休嘗讀太史公今日把酒酹墓周當時朱門滿歌舞此日野草荒山丘醉歌信陵行碧雲日暮冩我憂英雄割據雖巳矣髙義凛􅏮横清秋追攀逸駕那復得落日倚釰看神州倚釰一作徙倚題子猷廻舟圖勾呉四時無正天盛寒之月猶春妍朝來一雪天地白田父適喜争狃顛冝其佳客逸思發乘興逕上山隂舡煩襟囂慮一洗爲瀟然江東名流説戴逵髙談禮法殷春雷子猷恐是虚華士竟棹空舟夜半回山陽早發踈星綴空殘月烱我行早發山陽境太行九月未黄落一片秋光蕩林影愛山竟作三日留心下快活還自省江山登覧能幾度素髮飄蕭巳垂領愧無明略濟清時性蹇才堪卧雲嶺長疑造物若倒顛馬使守閭車拄鼎十年欲作百嵓游此度徑耒猶事梗勒廻俗駕似有意未許嵓畊遂幽屏醉臺劒沼两寂寞夢寐賞心終耿耿馬頭回首望山門白雲抺盡青山頂雄狐行按部唐縣為小縣尉作黄蒿古城狐晝行窟宅深固通精靈群貍闖首潜助勢跳煙嘯月妖腰輕社翁不神名則在將假其柄先憑陵西隣有田奪巳饜東家有羊頤指烹乘機侵刻恣所欲草棘蔽翳無由鷹老羆惑媚過不睨飢鳥噤啄寒無聲我雖老鷙瓜距秃一擊欲示終身懲遽然脫去成漏網固厚其毒羣心驚眼中雉兎盡何益使我怫欝難爲情歛翮坐覺秋風生月老招飲禪師慰我從事勞臨臯置酒來相邀西軒雖小面流水栁塘風物春飄瀟觥船一棹入法海照眼孤月翻雲濤既逢方外對佳景不飲亦復心陶陶况師有酒藏已乆快吸儘足供鯨鼇張侯引吭歌未闋嘉甫抗首賡其騷杜郷尚子噪扵側冠佩倒落軒湏毛僧云劉君更開爽惜不同醉持霜螯連揮大白不知數醉眼四顧天爲髙出門乗馬復班如壘酌已罄猶飄操一聲隣笛𧺫落日追憶往昔懐英髦陵川已矣九帥死此樂無復争禪逃眼中文武驚墜地悲風爲我徔空號予雖老驥志有在為國涕下沾綈𫀆陌頭柳色春向晚南塘碧水深幾篙簡書有程促又去悠悠離思懸干旄醒來信筆紀其事雅集難再誇吾曹阿師深藏莫輕示政恐見哂螟蛉豪望黄金䑓歌寄贈劉夢驥君不見孔子修春秋二百四十有二年燕人歃血纔一見下逮戰國尤茫然維南聲教耻不與苦羡齊魯多英賢黄金不惜築此䑓當時何限郭隗材政縁市駿售其骨雲烟轉盻龍媒來古稱得士國無小甘棠世業如天開悲風瀟瀟易水暮往事不復令人哀昭王之名傳永世黄金髙䑓安在哉越雞行贈柔明憲使君家素雞何異常來自越裳天一方又聞越溪之女天下白臨水照影長相將乆之氣感與俱化不覺粲粲争輝光兩足不盈握軟玉紅鱗芳孤唱有餘韻滿喙鏘風簧丹砂暈頰絳冠小雪氄覆背銀絲長雅冝宫閤催曉箭欄千五夜凝秋霜主人前年列朝行風雲劒珮争翺翔歸來故家對此物夜夜夢到雞人傍呼徸愛飬無逺出飲啄長使居中唐深沉庭院縈回廊離離花影翻春陽今春哺雛凢幾軰晴雪亂點筠籠香我從公子偶見索苦要鄙語爲相償𥘉心玩物物反玩戯吐綵綬信鳴吭他日雛孫求執贄不愁無物餉鞬郎春溪小獵行經略史公子明春溪小獵九公子有詩以紀其樂索予同作至元庚辰三月三日五夜燈下走筆賦此春風兩岸春草碧漫漫溪流野鳬集花邊髙塜卧麒麟拜掃歸來見豪習一聲畫鼓警鳬飛霜鶻翻空看横擊離披五色墮馬前血灑平蕪驚半濕野橋淡淡夕陽低回風䬃䬃溪神泣不愁歸具衆賔須紅燭金盤快鮮食將軍徃歲東西征苦竹崖傾江島赤髙勲烈烈在雲臺婉戀龍姿見平昔平生得意在戰酣州郡徒勞非我職明時政有逐禽樂醉聽清商還自適鼻端出火耳生風夢裏弦聲聞霹靂君不見姚崇奉詔趨新豐徑入長圍吐竒䇿呼鷹縱犬少年事大拜曽從指蹤得君侯逸興浩無邊老作獵師三萬日帕車過市奄新婦此事終爲景宗叱自憐白髮兩眼昏矻矻窮年大玄筆君王有夢渭濵畋苦恨非熊深自惜野兕行東山何髙與雲齊松柏薈蔚深巖棲龍潜虎伏變叵測野兕何者依貔羆暮學豼怒嘷朝循羆所蹊睥睨弱者肉獵食長林麋内助隂血盛外増兇艶平厖然非不偉椎魯𥘉何知時時具饜餘啖罷假其威復從群猱弄舉措甘傾危同類忌投䑕將爲真得二獸之幾微浸滛犯行路跂扈恣所爲窺切乗物便大笑狸怯狐多疑孤鶚憚弗撃林烏噪而飛獵師厚其毒使之自猖披一朝果投穽慘悴兩耳垂掉尾乞衆怜趨蹌曽不如狐狸吁嗟野兕兮一懲不省爲福基惴惴且免行人悲哀老殷辭至元十七年三月二十日南詔進象過安肅州軍户老殷爲象鼻束而死余適覩其事乃作此辭哀老殷平時皥皥爲王民荷戈幸不死鋒鏑胡爲此獸戕其身哀老殷賤且貧有兒十歳纔解語有婦出户無完裙髪膚一旦委巨齒身後名在征南軍朝來棺歛哭過市慘惨悲動梁䑓人我聞白傳引馴象爲君諷諌何忠勤禽珎貴不畜此雖至馴安用云偉哉樂天古良臣憫雨行至元十七年夏四月廿四日自束鹿縣入深澤午憇西河郷録父老語車中足成此詩時所在祈雨旱蟲食桑桑葉無榖不出壠麥欲枯人間四月號清潤物色慘悴幾焚如車前田畯向予説半歲無雨曾霑濡春蚕滿箔弃欲盡鋤戸趂熟多空廬社翁致禱略不神盻盻一雨何時蘇嘗聞古人遇災懼性幣徧走山川雩外修政務内自責念及女謁并包苴昨朝冠蓋稱勸使田務督責須勤劬農非耕稼何所事勸至無勸將何趍一和繆盭良有謂蜴蜥滿盎真無辜我𥘉聞言顔已厚食不下咽心爲瘉憑軾歸時長嘆息欲對畸人意先屈因思漢相問行牸爕和恐是三公職近年氣運例險食忍待須臾莫倉猝驅車疾去指前途落日蒼茫下喬木秋澗先生大全文集卷第八
