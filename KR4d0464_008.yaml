body:
  text: 七言古詩入侍行贈董符寶君家大兄吾故識君家三兄乃友執遊談仰止有歲年只有八郎𥘉未覿八郎內時五雲深五雲宮闕何沉沉此時密邇司獻納夙夕忠謹餘月心人知掌中金窠篆屈蟠螭重豈識兩袖中有蒼生霖猜聽民瘼懷惻怛細至稼穡艱苦歌謡情聖皇逹聰豈有既天語夜久何叮嚀御幈香暖代鳴玉髙枕安寢神逰清輸忠往往救時弊筆諌不數公權誠君不見西漢元封神爵間兩朝貴幸張與金長楊蓮句滿宫館正以丗閲逰從列九卿何如董侯剛方見特立大冠修劒明月簮日華光動鬱金袍嗚鳳翔集朝陽岑一從通籍愈忠慤四海知有万石不為冨貴之所淫書生薄遊不足惜凬化正爾基周南炎蒸幽朔今一軌好承清間之燕請君一鼓解愠南風琴小山行馬子卿簽事贈豫小山子目之曰共嵓故作是詩以謝我昔東登泰山頂直度天門歷參井十年西走華隂東仰面蓬峰落天影岱宗坐如太華立夢寐至今猶耿耿朅來塵土客京師長往無時空自省愛山復得馬簽書相對髙談冠佩整馬卿有石寄禪疏護持擬與經函俱中峯魁岸大人坐兩峰傍翼殆若庭立而議相承趨我因間逰叩僧户見之清興為起豫摩挲携去便許諾喜過中流失舟還得千金壺汲泉滌濯抉泥滓特置棐几為膏濡君不見羅池謾作万石記娛恱巳棄荒夷嵎一拳泰岱墮吾前寸碧點出遙岑圖博山香暖黃金爐細煙蒸潤翻飛鳬芳菲來助怪石供縞帶一縷山腰紆有如岫雲雨歇歸洞府變化滅沒還須臾羌豫本是山澤􅋯淡然對之氣安舒年來便靜百念冷今復樂此依俙仁者之徒歟山容忽開欣我主瞑目便到秦觀吳觀之仙都茶甌去手風生臆飄飄如駕天門舁月明窗影印庭柏落落恍倚秦松株地爐火熾紅艷發又似日觀坐看日出海湧金輪孤茅齋一夕得此樂冷却案上熊蟠膄微官不到竒章公甲乙乃有竒章之一太湖它時南歸冨潤屋不愁室無僕孥居無廬敖勤厚貺何以謝我欲贈之雙瓊琚瓊琚雖美未足報拜贈新詩永為好沙堤行君不見漢家日月四百載比隆三代追唐姚經綸帝業顧多士規隨始自曹與蕭又不見丙與魏孝宣中興賴宏濟似慚燮理化權衡重以文儒緣吏事羽毛千古動雲霄黃閣清風兩無愧潭潭政府中書堂朝廷思治具畢張歷觀至元中統間諸公翺翔佐時昌相君繼踵參幕畫怏決不數陳元康况今炎風朔雪混一統軍國庶務何穰穰一朝鳴佩見獨步恩波鳯沼翻晴光小心清慎冨籌䇿人望翕爾稱賢良房謀古推帷幄傑匪以杜斷疇能將璣旋衡幹日万計夙夜密勿心靡遑愛君南選儘公允要使四海桃李俱芬芳我常叩君見餘藴選進久已歸鞶囊栁隂大道沙堤長迤邐逺並宫圍傍錯金輕軟襯珂馬火城前導光煌煌行人走避歎禮絶焜耀爀奕何非常相君報國有能事澤民三代君虞唐火城沙堤誠足當况兹三陽排凝出九地君子道長群隂亡惜哉時乎不易得為君一言陳斐狂蕭曹開濟固云重丙魏論思詎可忘羽林萬騎歌并引至元丙子歲立春后三日醉八奉御宅明日酒惡隱几坐殆不能為懷遂取通鑑閲唐明皇帝清宫事迹作古樂府一章號曰羽林萬騎歌書示表弟韓從益且浮大白數四覺酒氣拂拂從指間出去矣其辭曰韋娘雞晨遵慕武牝雛啄李求太女履霜得氷忽深戒禍始房陵帝私語神龍殿前虹貫日王氣龍池濯煙縷羽林万騎驍且雄守捉內外生隂風韉裁文豹虎衣炳扼腕久弗諸韋容潞州别駕眼橫電虬髯英姿真太宗暗中結納許清禁繼以幽求玄禮仙鳬忠玄武門前聽二鼓散亂天星隕如雨平明一掃妖氛空相王巳是玄真主東城瑞靄朝日鮮五三甲第臨天淵三即歸來龍在沼晴波翠灔終南煙開元隆平此張本煙火萬里春熙然誰圖勇斷蛾眉劒翻作環兒並轡鞭畫家有玉環並轡圖瑞雪歌丁丑歲正月𥘉六日夜作去歲一冬無雪雨地不藏陽變恆煦就中氣運北自南江表嚴凝比燕土今年正月日丙申我遊中堂聞好語聖恩滂濡來九天四海包徭盡蠲取宰臣奔走播德音雷厲風飛開萬寓油然雲葉合中天一雪平明幾尺許建章宫闕玉崔嵬華桞蓬萊氣先吐漢家燕南三百州千里飛章賀恩溥天人上下本一致和氣致祥乖則異方春甫頒寬大書埃翳四開天地閉春秋盈尺書有例太史紀言真上瑞都城十日沸歡聲宿麥連雲見豐歲民願聖皇千萬春長開明堂布恩惠元和老臣愛君深賀雨詩成伸戒勵小臣今作瑞雪歌要見天心愛民意謁蘇墳在汝州陜縣釣臺鄉娥眉山前神嵩崩騰萬馬東汝流西來橫玉虹山川秀潤不少悴知有峨眉老仙宅其中先生立朝有大節南遊天使完其忠胸中英氣蟠不盡餘藴散作文章宗天章昭回爛雲漢下探萬古英靈空前年西堂覩先生之真像今年此山拜先生之堂封嗟豫何者有此幸青藜得照龍淵宫汝陽樓上重回首安得追逐逸駕攀髙風滌濯固陋開顓蒙公雖僵卧其猶龍雜言送文郎中子周宣慰江西道君侯交遊二十秋胸次磊落誰與儔湖海豪氣老不減百尺髙卧元龍樓三年京師驄馬容搏擊快似鷹脫鞲郎官民部才十月持節撫慰江西州堂堂提封幾千里陽開隂闔無深幽滕王閣上洪都酒孤鶩殘霞重回首江山滿目􅦔我歌一曲陽關渭城栁聖恩柔逺思悠久化自周南同九有大司綜理固多端急手先須橅瘡痏四民樂業兵有制盡徹湖陂變耕畒時驅大斾擁行軒布德揚威趂春首丈夫此時不有為何者功名垂不朽我雖鎩翮思奮飛會把一麾仍出守義士薑侯歌并序歲辛亥秋燕留守府參謀劉坐事就死屬其孤于友人薑君諾焉既籍沒薑為伸理其子逹官怒其僣張弓擬之薑不少懼即棵胸以逆遂義而從其請自是薑君義烈聞燕趙間後折莭從趙雲夢學非其義一介不取諸人丞相史公賢之以賓客禮焉至元丙子冬同張彥魯入燕聞薑云亡追念往事為欷歔者久之渡易水之悲風荆卿巳去念朱家之長者今復何人爰作歌詩庶幾紹擊築之遺音云薑諱迪祿丗燕人子尚其字也劉字正卿參軍屬孤出鬼幽薑侯諾之無蒂留一朝赤手編虎鬚義氣凛凛橫霜秋命輕義重泰山比白羽迎射身熊侯孤兒挈歸兔孥戮薑子拂衣無所欲朱家素擅長者風睚眥椎埋真碌碌魚紋三尺淡秋波千丈聲華光輦轂至今燕市人嘆羡五百年來未之見張卿説似豫作歌庶激清風代君傳趙穆篆隸歌丁丑歲四月十六日作古人冨席珍璀璨玉無玷兼善不並稱例為長所掩豫觀當塗文雄放雜淒淹一朝玉筯名餘作鋒鍔斂是知學與才相須成琬琰六經學淵會熙緝光自𦦨道藝貴自得舍瑟想曾點陽氷嚮匪斯文徒秪解篆畫方圜橅千言落𥿄極停穩一雋而後將無餘眀昌王趙稱文儒問書竹溪真起豫微言提撕何理到歸讀六經兹本歟趙郎翛翛姿態殊十年弄筆好古書嚮來客燕見其作殆似蟬欲蛻殼蛇遺膚去冬丙歲復入燕趙郎篆學超於前我為驚戄問所以答云近得松岩之祕傳惜哉髙君今已矣黃壤不沒蛟龍蟠嶧碑岐鼓得遺法趙郎手追忘寢餐我因為渠槩一言書至形似真徒然行逢碧落卧其下發冢親得中郎編胸中塵俗何由蠲正需力讀經與史他時會見將與松岩並驅相後先食梅子有感稚歲食梅矜行輩並撥連揮嘬長喙近年羅列雖滿前黃熟有餘聊雋味極餐不過三數枚老頰流酸牙莫對物逐時新歲歲同人到中年凡事退潮陽南還幸不死齒豁頭童足悲慨我今五十齒雖牢食不能多行亦憊只有區區行志心若與公同人不逮潛齋歌贈中山知府史子華潛齋有志操不為浮榮汚彛衷剷豪習溉之詩與書吳鉤佩錦帶寶校千金駒溢目不回顧棄如履中苴嘗出試所學三年事徴輸衛人樂安使歲計公有餘淵潛不自珍昭然靄芳譽不覿五載強去冬會燕都與語覺道勝行身老諸儒神王氣骨清兩目秋鷹瞿扣門來別我朱幡擁髙車去作定州尹志意何安舒余思潛之功於焉見容與中山物繁稱奧區燕南劇郡此要途大兄持節官衡湖四郎按部參旗墟一門鼎足列清要正有報國忠而劬凝香燕寢供坐嘯紅旗鐵馬無邉虞心清事簡自多暇輕裘錦爛光鄉閭况君才髙足為治聲聞日向天朝趍書來不必咨蕘議丈八盆邉有二蘇長慶行酬暢純甫贈元白二集長慶詞人幾勍敵名動華夷説元白拾遺樂府即諫章相國絲綸號新格天教韓栁出同時要使詩壇閗清逸年來愛白復愛元老厭風花喜情實圖書東壁黯晶熒五十年來無是集有時擬賦三兩題斷簡殘編僅占畢暢君好書似鄴侯荷囊去躍龍􅋮舟臨江釃酒參幕畫佳麗看盡東南州棄人所取取所棄青帙萬卷堆行輈蒼江夜靜虹貫月不羡克敵琳琅璆三吳歸來巾一幅蝦蟆池頭兩椽屋足跟不踏貴人門磊落羣書載其腹自欣滯貨潤有餘贈我兩編償不足恍逰赤水淂玄珠笑入荆巖抱和玉翛翛庭竹北窗風準偹殘年霑賸腹虎牢關行至元二年夏六月豫與總管陳慶甫考試洛陽東還汴京道出其下鞏原北望河洛郊嵩邙柬走脊尾髙憶𥘉洪水勢方割湯湯北匯深淵壕千年水去兩崖出天險東厄開成臯中原失鹿在所逐河山戰氣秋蕭騷當年劉項侭勍敵阮生猶為嘆非豪竇王椅角更可笑如蛾赴燎其能逃秋煙古戍深黃蒿狐狸夜上關頭嘷空餘千古荒城路輸與行人説爾曹送齊彥簽事湖南廣平一生真相業老坐朝堂振孤節理明有守見不疑萬事坌來能勇決我遊洛師比盧龍嗣侯共事多相從文章翰墨有定價落落真有先相之遺風今年白麻拜新寵去去按部江西東朝廷妙選正有謂雅志不負溫郎驄江南緑水天四圍秋風吹野百草腓煩君華嶽峯尖舉著眼飛翔覽德輝商鼎歌并序燕士張君文季讀書不求官治生不務冨稍有嬴餘即購求古器書畫為事故其家藏三代巳來䁀彜敦卣及前賢法書名畫甚富素負藻識遇夫竒妙不惜資貨期於必得既得之傳觀惜玩𥘉不吝惜暇則明窗棐几展師陳列乃沾沾而喜曰古人不作古意尚在三代之英精諸賢之純粹今吾何修一朝盡得而有之其稽古尚友之誠靜觀適懷之樂於斯時也中心充實意得所寓回視晉椘之冨趙孟之貴不啻如雲煙之過目遇佳客踵門焚香煮茗盡彂祕藏為序説家數評論其優劣雍容文雅有都城故家風味於足稱也仙露寺僧寶藏商鼎有年不惜百金易而得之愛玩不足復求館閣諸名勝詩詠喜為序其平生淡癖仍以古調歌之其辭曰維商賢君六七作禮重蒸嘗制於鑠只緣近古俗忠厚象形作器窮精鑿敦彛鍾鼎賜臣工重比諡贈縻天爵當時文獻不足徴故家餘俗歸寥索蒼銅不逐太社凶千古流傳誇灝噩供佛牀頭夜壑深物歸所好得真托張君嵇古負精識入手摩挲三歎息兩耳髙撑足拱三六乳附觚何的歷餮叨繞腹雜雷紋紫翠英英帳猶濕細觀𣢾識商父丁崑玉南金非所惜平生淡癖心不足此日大嚼情暢適模形逺紹考古圖發揮假手詞人筆君不見當年莘叟負謁湯髙宗肜祭雉雊鬲黃金塗耳玉鉉光此事傳聞巳陳迹一朝恍墮三亳間神明之器今目擊或裊沉煙讀誥盤或挹殷溪煮巖石尚友直探三代英平生閲古心方畢歸夢謡丁丑歲九月二十三日夜夢陳總管作時為浙東宣慰使十二月二十日密縣王縣尹至知公於九月七日為越之玉山賊所􅊣五更歸夢東南長越州城府山蒼蒼我遊不省夢中客浮雲樓觀爭翺翔節齋枉駕來就見上廉遙喜瞻清光倒衣走欲降階接陳公出避朱門傍斯須往謁登西堂要話久别傾肝腸我公不之見蕃師滿禪床卉服魋結古碧眼須眉厖爭先問訊展恭恪青松亂踏天花香就中老沙彌合瓜伸圎吭向子致呪語隂福來穰穰思公罔覿對佛子坐久心思方倣徨傔來促起公召汝導我前往穿行廊追奔接踵歘不見如瞽失相徒倀倀平頭闖首告前路終惑所往心為狂惘然推枕若有喪但看落月滿屋梁我思與君别屈指一載加相思葉黃江水碧神交日夜心曽遐自春徂秋三入夢似恨海角天之涯吹燈信筆成詩句病眼溪藤亂紫花時目病新愈乂暗用樂天元九紫藤花事日蝕詩至元十四載維龍集丁丑孟冬丙辰朔詰旦隂風吼朝家有移告日蝕百司守伐鼓幣用杜庶嗇閧奔走都城十萬家竟日喧釡缶壯於田單兵聲勢助衝掊盎水觀日景占刻入午辰蝕午正二刻陽精從西虧若有物噬吞𥘉看偃珥玦再覩巳半輪終風轉蓬勃天影慘以昏斯須食之既陽光蔀無垠始似昏暈鏡久乃挂鐡鉦團團溢隂影環輪玉為繩晴天朗晝藏厚夜九衢草草人靣青衆宿不多出爭光見三星謂填星角大角三指也只愁六鑿渾沌死蒼生百萬淪幽冥盻盻向申正輪圎復其明炷香再拜立前廡心魄動蕩久尚驚鄰翁行年八十一如此災變見未曾我問長老説日月中有烏兔精顧兔固微物性狡隂邪萌人間三窟厭不處緣雲入月為家庭太陽養火烏爀爀森神兵飼肉祝融家渴飲咸池泠二足利鈎戟炬火燃兩睛婪婪鐡作喙啄雲下開變隂晴曜靈壯汝觜與距外侮有犯鳥維憑六龍頓轡或少軔知有神物擁護終是隂為懲不然日圍千里不一蓄棲爾其內將何營及兹隂精盛所歷乖常經陽烏雖神力寡弱勢重不敵從侵凌避集扶桑枝噤縮潛威靈想當既厄時如何炎官赤熛不率其徒來助勢與聲彤幢絳天鼓雷霆振烏挾日騰兩翮火吻噴薄摧隂凝逐兔入月脅隱伏跧其形朴朔知所懼彌離黯光晶含章合玄度安曜周八紘天公此兩目萬古更不盲嗟豫既匪羲和官區區空抱傾陽誠天髙不可階此事難具陳作詩擬月蝕欲見此志終或伸盧同撫掌韓愈笑吾等狂德君其鄰南宮老仙雲山圖米襄陽筆應奉李受益藏南宮玉堂春晝晴瑣窗霧垂幽思清先生胸次幾丘壑淡墨落紙詩無聲白雲滅沒春山碧萬木淋漓元氣濕風煙自昔鹿門深似愛龐公不浪出襄陽雲卧思怡恱不為濃纎爭巧拙虛堂生白定何如玉氣柱空虹貫月盧仲傑送所逸東萊集二帙盧卿贈我東萊編偶逸二帙心茫然朝來覔送欲舞有似合浦珠還蠙要書不必三萬軸插架所貴皆成全風軒讎校忘午寢一讀三嘆鏗朱絃每逄佳處時再欵不惜兩眼遮昏煙就中細味官針作覺我踈愚性最便簽院趙公許惠歐蘇集作詩以問之平生性癖耽墳籍細字牛毛早年筆只今五十眼昏花清晝看時滿行黑投身散地百無事不著書遮如有失趙公嗜書似鄴侯不為章句非雕搜綰持樞紐日多暇借箸自有胸中籌更尋往事較所處有夢不到琳琅璆嗟余何者登瀛洲殘膏未免窺前修大淵然濶海鮫鰐翥洞視千古蘇韓歐文如不作作取法捨是三子將誰求窮閻雖具何足玩破碎重黑支吟頭牙籖插架三萬軸誰省浙本鋪銀鈎或蘇或歐兩俱可勿使石壁成空投仁存義舉侯門事却恐乘機似巧偷仁存義舉用史記侯之門仁義存晉石壁見管子涇陽鎮中秋贈馬御史時豫授監德昌司南下去年中秋客燕山把酒望月空雲煙今秋此夕涇陽鎮六合一鏡懸青天乾坤軒豁開真境萬籟無聲露華冷京居多暇賞心違長路無家此清景須知世事皆偶然賸却私憂胸刺梗同行喜淂馬少逰月下一樽還對影愛君才氣白眉良攬轡澄清知所省豸冠自古出儒冠老寉何為隨露警人生幾度中秋月不學羣兒𣣔圎缺舉杯酹月月應聞安得玄霜變華髮追逐諸君昌晚節小邉行一百五日同揔尹張彥亨赴小邊口相視河流回馬上偶作此詩北趍小邉相河害坐看長堤驚裂壞中流忽起劉子歎疏濬神功思禹大憶當殘金堯河界兩涯峽束如縈帶靈鼉萬鼓動地來洶洶聲聞千步外堤防不議四十年河行虛壤任徙遷乃今去京無一舍衝波南卧翻鯨鱣今年築堤捍淹水明年捲掃防洄淵濤頭况與酸棗直南北髙下尤相懸既非經瀆久逺計徒費民力妨農田正有避移䇿上聞放之曠野從奔衝不然建議以土湮大堤縷水橫西東楗以木石東逾鐘遞河東去過京角此是永逸無窮功作詩擬逹宣房宫夢陳節齋至元十六年巳卯寒食夜卧開封後堂夢節齋陳公既覺呼童吹燈信筆賦此追憶往事令人短氣書示正甫敬甫二君子同為一慨也花枝入簾春夢香逰絲翻空清晝晨今年寒食客梁苑追憶往事心倣徨前年考試登茲堂陳侯館豫羅酒漿拊床髙詠逸興發不覺燈前大雨聲淋浪生平胸臆向豫盡使我肝膽爭開張重來物是人不復夜夢見之晝微茫誰期此會乃死别剗血不滅吳雲蒼攬衣起行步落月梅影滿庭空斷腸信陵公子行與西溪同遊春風獵獵吹輕裘聮鑣來作夷門逰令人逺憶魏公子徑上吹臺臺上頭却泰存趙震九土誰意抱關老吏能此帷幄之良籌飢腸自古出竒䇿功成何害屠沽流髙皇布衣重公賢大梁城邊幾遲留一朝龍驤開漢業舉功不復詢來由豈非慕藺承餘休嘗讀太史公今日把酒酹墓周當時朱門滿歌舞此日野草荒山丘醉歌信陵行碧雲日暮寫我憂英雄割據雖巳矣髙義凛􅏮橫清秋追攀逸駕那復得落日倚釰看神州倚釰一作徙倚題子猷回舟圖勾吳四時無正天盛寒之月猶春妍朝來一雪天地白田父適喜爭狃顛冝其佳客逸思發乘興徑上山隂船煩襟囂慮一洗為瀟然江東名流説戴逵髙談禮法殷春雷子猷恐是虛華士竟棹空舟夜半回山陽早發踈星綴空殘月炯我行早發山陽境太行九月未黃落一片秋光蕩林影愛山竟作三日留心下快活還自省江山登覽能幾度素髮飄蕭巳垂領愧無明略濟清時性蹇才堪卧雲嶺長疑造物若倒顛馬使守閭車拄鼎十年欲作百嵓遊此度徑耒猶事梗勒回俗駕似有意未許嵓耕遂幽屏醉臺劒沼兩寂寞夢寐賞心終耿耿馬頭回首望山門白雲抹盡青山頂雄狐行按部唐縣為小縣尉作黃蒿古城狐晝行窟宅深固通精靈群貍闖首潛助勢跳煙嘯月妖腰輕社翁不神名則在將假其柄先憑陵西鄰有田奪巳饜東家有羊頤指烹乘機侵刻恣所欲草棘蔽翳無由鷹老羆惑媚過不睨飢鳥噤啄寒無聲我雖老鷙瓜距秃一擊欲示終身懲遽然脫去成漏網固厚其毒羣心驚眼中雉兔盡何益使我怫鬱難為情斂翮坐覺秋風生月老招飲禪師慰我從事勞臨臯置酒來相邀西軒雖小面流水栁塘風物春飄瀟觥船一棹入法海照眼孤月翻雲濤既逢方外對佳景不飲亦復心陶陶况師有酒藏已久快吸儘足供鯨鼇張侯引吭歌未闋嘉甫抗首賡其騷杜鄉尚子噪于側冠佩倒落軒須毛僧云劉君更開爽惜不同醉持霜螯連揮大白不知數醉眼四顧天為髙出門乘馬復班如壘酌已罄猶飄操一聲鄰笛起落日追憶往昔懷英髦陵川已矣九帥死此樂無復爭禪逃眼中文武驚墜地悲風為我徔空號豫雖老驥志有在為國涕下沾綈𫀆陌頭柳色春向晚南塘碧水深幾篙簡書有程促又去悠悠離思懸干旄醒來信筆紀其事雅集難再誇吾曹阿師深藏莫輕示政恐見哂螟蛉豪望黃金臺歌寄贈劉夢驥君不見孔子修春秋二百四十有二年燕人歃血才一見下逮戰國尤茫然維南聲教耻不與苦羡齊魯多英賢黃金不惜築此臺當時何限郭隗材政緣市駿售其骨雲煙轉盻龍媒來古稱得士國無小甘棠世業如天開悲風瀟瀟易水暮往事不復令人哀昭王之名傳永世黃金髙臺安在哉越雞行贈柔明憲使君家素雞何異常來自越裳天一方又聞越溪之女天下白臨水照影長相將久之氣感與俱化不覺粲粲爭輝光兩足不盈握軟玉紅鱗芳孤唱有餘韻滿喙鏘風簧丹砂暈頰絳冠小雪氄覆背銀絲長雅冝宫閣催曉箭欄千五夜凝秋霜主人前年列朝行風雲劒珮爭翺翔歸來故家對此物夜夜夢到雞人傍呼徸愛飬無逺出飲啄長使居中唐深沉庭院縈回廊離離花影翻春陽今春哺雛凡幾輩晴雪亂點筠籠香我從公子偶見索苦要鄙語為相償𥘉心玩物物反玩戲吐綵綬信鳴吭他日雛孫求執贄不愁無物餉鞬郎春溪小獵行經略史公子明春溪小獵九公子有詩以紀其樂索豫同作至元庚辰三月三日五夜燈下走筆賦此春風兩岸春草碧漫漫溪流野鳬集花邊髙塜卧麒麟拜掃歸來見豪習一聲畫鼓警鳬飛霜鶻翻空看橫擊離披五色墮馬前血灑平蕪驚半濕野橋淡淡夕陽低回風颯颯溪神泣不愁歸具衆賔須紅燭金盤快鮮食將軍往歲東西征苦竹崖傾江島赤髙勳烈烈在雲臺婉戀龍姿見平昔平生得意在戰酣州郡徒勞非我職明時政有逐禽樂醉聽清商還自適鼻端出火耳生風夢裏弦聲聞霹靂君不見姚崇奉詔趨新豐徑入長圍吐竒䇿呼鷹縱犬少年事大拜曽從指蹤得君侯逸興浩無邊老作獵師三萬日帕車過市奄新婦此事終為景宗叱自憐白髮兩眼昏矻矻窮年大玄筆君王有夢渭濵畋苦恨非熊深自惜野兕行東山何髙與雲齊松柏薈蔚深巖棲龍潛虎伏變叵測野兕何者依貔羆暮學豼怒嘷朝循羆所蹊睥睨弱者肉獵食長林麋內助隂血盛外增凶艷平厖然非不偉椎魯𥘉何知時時具饜餘啖罷假其威復從群猱弄舉措甘傾危同類忌投鼠將為真得二獸之幾微浸淫犯行路跂扈恣所為窺切乘物便大笑狸怯狐多疑孤鶚憚弗擊林烏噪而飛獵師厚其毒使之自猖披一朝果投穽慘悴兩耳垂掉尾乞衆憐趨蹌曽不如狐狸吁嗟野兕兮一懲不省為福基惴惴且免行人悲哀老殷辭至元十七年三月二十日南詔進象過安肅州軍户老殷為象鼻束而死余適覩其事乃作此辭哀老殷平時皥皥為王民荷戈幸不死鋒鏑胡為此獸戕其身哀老殷賤且貧有兒十歲才解語有婦出户無完裙髮膚一旦委巨齒身後名在征南軍朝來棺斂哭過市慘慘悲動梁臺人我聞白傳引馴象為君諷諌何忠勤禽珍貴不畜此雖至馴安用云偉哉樂天古良臣憫雨行至元十七年夏四月草四日自束鹿縣入深澤午憩西河鄉録父老語車中足成此詩時所在祈雨旱蟲食桑桑葉無榖不出壠麥欲枯人間四月號清潤物色慘悴幾焚如車前田畯向豫説半歲無雨曾霑濡春蠶滿箔棄欲盡鋤戶趂熟多空廬社翁致禱略不神盻盻一雨何時蘇嘗聞古人遇災懼性幣遍走山川雩外修政務內自責念及女謁并包苴昨朝冠蓋稱勸使田務督責須勤劬農非耕稼何所事勸至無勸將何趍一和繆盩良有謂蜴蜥滿盎真無辜我𥘉聞言顔已厚食不下咽心為愈憑軾歸時長嘆息欲對畸人意先屈因思漢相問行牸燮和恐是三公職近年氣運例險食忍待須臾莫倉猝驅車疾去指前途落日蒼茫下喬木秋澗先生大全文集卷第八
