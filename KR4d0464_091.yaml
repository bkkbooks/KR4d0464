front:
  text: 秋澗先生大全文集卷第九十一事狀
  hash: sha256:719fae4bbe973f71e11504f9f47f73157727a986adca0ecd41cd0aa1f3b1cec0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_091-1a}
body:
  text: 翰林院不當以資例取人竊惟人材不出政事文章而巳政務但曽諳練尚可勉為至於文章自非天材有學者不可強為今翰院職掌人等樂其安簡占處名位守以歲月以次而遷有從書寫至修撰待制者今後合無從本院精選人材勾當不冝循遷以塞賢路定奪黃河退灘地一黃河兩岸多有退灘間地有塔察大王位下頭目人等冒占作投下稻田令側近農民寫立種佃官文字每歲出納租課自餘不得開耕竊詳河水走卧不常今日河􅵝明日退灘安得為投下屬地今後合無將一切退灘地面許諸人開耕種蒔實為便益舉耶律張商焦四相事狀一竊見前中書左丞相耶律鑄前中書左丞張文潛前安西王府王相啇挺祕書監焦仲益皆係朝廷勳德天下重望方今之務親賢為急比之求訪踈逺如四相者識逹政體綜練時冝若使之參預大政必能禆輔闕漏有所廣益傳稱圗任舊人共政此之謂也復許諸人陳言一中統元年許諸人陳言當時主意不為徒然蓋一則舉知群下休戚之情二則視時政得失之弊三則見人材可用之實令政務方殷惟慮廣來直言採議得失令後合無復許諸人陳言內設詳定奪等官使掌其事舉明宣慰胡祗遹事狀竊見前荆湖路宣慰副使胡祗遹自中統元年至今揚歷中外二十餘年所至皆以能稱其識時應務通方有為求之時輩不可多得誠經濟之良材時務之俊傑也內外劇職皆可迭居今在間日久理合起復以應清朝之選兹乃天下公論非卑職之所得私也議司獄官竊見隨路所設司獄官致恤囚徒最為切務蓋使暮夜不致踈虞寒暑罔令失所飲食以時醫藥無闕比緣當罪不使苦楚無聊損傷人命此其職也近年多以年老無能之人使充其任至獄事狼藉囚繫失所是與不設等爾若選得如往年大都路司獄劉彥祿十數人使之盡心獄事或今後應重囚未斷非理獄死者治司獄等罪如此庶仰副朝廷哀矜庶獄之本意也禁約興利無效等人竊見近年開桃淄萊路石河致死損夫役甚衆終不能成事竊詳若輩妄開利孔明知無成萬一有效功歸一已不成害及衆人所該之家其將何罪山東之民至今咨怨今後若復有如此妄言僥幸之者冝嚴行禁約如見役興工者將來無驗合無量事重輕究治庶免傷財害民之悔又安知非姦人之計可不審慎之哉議大名劵軍竊見大名見屯生劵軍一萬二千餘人不及三年所費錢糧至甚浩大米一十萬石鈔七萬餘定若上司近前别無驅用冝同往年熟劵軍發還南中使分隸諸翼以備邊防其中若有年老者放還為民不冝使仰食縣官坐糜經費總三万大名一万二千衛輝路季太原十三年理財事狀即今包銀課程茶鹽之數歲入不資用度不患闕少所當更張者在於一切掌管之人染漬舊習中間多方掊取盡入私門官不得用民實受弊使國家虛受重利之名切要立法革弊使民力蘇息取之不致困乏馬政事狀竊謂三軍之本以馬為先今遇有用度不免和買拘刷和買官吏作弊拘刷則逺駭觀聽乞請於塞垣水草冝收之地分立群牧使通政院專掌其事預備事狀除有司常例支持外振武屯田輸粟輔官最為上策易稱君子儲戎器以備不虞兼預備則造作如法犀利可用朝錯謂甲不能禦矢與無甲同矢不能入堅與無矢同可不重慎今後合無將隨路常課再行整點督勒使成造如法於上書寫官匠姓名以考其程於所須去處起庫收貯如是庶得造作如法不致臨時併造多不如法朽鈍不堪用度為審斷罪內事狀竊見隨路淹禁罪囚極多省部自從以來逺踰半歲今追銀者有人填撫者有官檢災亡者有使未聞曽差一官審理罪囚者古人稱遭遇旱災多緣刑獄淹延所致即目巳是秋分乞請選精詳官貟曉知刑名者同按察司官分路前去審録歸斷一切獄囚恐亦感召和氣之一端又使百姓且知省部不獨于錢穀留意也為革部符聽偏辝下斷事狀竊見部吏符文之弊謂如甲以田宅告部便以偏辭有理斷付甲主乙復上訴新吏不照先行却以乙辭有理即付乙主路官知其徇弊欲從理長者歸結二人各倚元符互相不服其兩造或赴察司陳告照卷明見亦欲與之改正又緣省例部斷者不許輒改以致耽誤有纍年經歲不能杜絶者乞請上司定奪歸一母令止慿偏辭輒下斷語庶免人難開種兩淮地土事狀一竊見黃河迤南大江迤北漢水東西兩淮地面係在前南北邉徼中間歇間歲久膏肥有餘雖有居民耕種甚是稀少冝設立大司農司招集江南北無産業人民驗丁力摽撥頃畒令一定住坐為主官給牛隻農具差稅並不取要若成就後别議定奪如此不數年間開耕作熟貧民既得濟虛地又行內實萬一緩急以食以兵皆可倚用祝香百門山神事狀一輝米凖差者二千石和買又不下二三千石又淇水係是御河上源一切漕運供給大都甚有功用比之濟瀆及物濟國潤民之功非細據上源水神似冝特降香火以答神休司官不勝任者即行奏代事狀照得條畫內一欵按察官聲迹不好者即行奏代今南北察司草道每司正官與首領人貟除新任未滿者是遷調貟數嘗幾于半材不易知安得人人而當之然即其所知於𥘉選時稱停搭配不致偏重可也其巳除而不勝者若姑息待滿是知其無能今徒占位次月費俸料養資歷而巳於司事何益乞請令監察上下半年巡行督察之歲取其功罪之尤者明著之以示天下不次升黜一二人所謂臺諌急則監司警監司警則郡縣肅誠激勸賢否振勵衰弊之一法也精選首領官員事狀近年憲司首領官多取自雜流于案牘文墨有絶不通曉者其懦者備貟素餐強者挾私害公紊亂官府若今後止於見任州縣八品七品職官內選兼該儒吏通曉世務風采人望出總幕之右者使充可也且憲司職雖紏彈其體面全是禮法二者為用不同管民參佐衝撞辦集為能若必其取強梁跋扈務尚口吻者是無良之人假其重勢使之行私耳伏乞詳思以存大體添書吏奏差人貟祿食資歷事狀竊見按察司書吏奏差人貟據掌照文案紏察等事其品雖微其職甚要今百物踴貴俸稍不足以育廉賢愚混淆資敘不足以激勸循名責實似有所難惟其養之厚故可責之重乞請將祿食資歷耳行定奪稍得加重久則人自為勸若責罰出退其將何辭關支俸錢事狀竊見遷轉官吏例携幼扶老千里區區而就一官照得十八年正月內朝廷令州縣依舊與俸却為各處官無見在至今有未關支者是國家露恩如常而州縣不蒙均惠方糊口不贍而責曰爾無貪吾有法豈理也今後乞請將隨路百姓納到俸錢另行收貯專以按月支付庶幾官吏日得養廉易於責辦罷孫招討户一孫招討户自都督史權鎮鄧州時投拜約八百餘户名之曰射生户即目散處襄鄧西山一帶合行分屬所在州郡為民當差不致别生事端罷南陽屯田户一南陽府屯田三千户往年亦曽言其當罷其後省差官與河南宣慰司一同前往屯所勘當定奪其本管官見户齊斂鈔四兩打發來官以此却言不罷便至今依前屯種理合罷散兼南陽縣民該驛程在城見管當差户止十餘户遇有一切遞轉差役委不能當若將上項屯田户放還為民甚為便當罷規運硝減山楂等官一隨處見立規運所硝減局并河泊山楂山場等官侵漁百姓其害非一謂如一切販買山貨等物其賣主巳有認辦課程買主赴務起稅及其貨賣又行依例啇稅今來山楂等官鎖闌山路或半道巡捉更行驗物抽分至於來自它所經過地方不慿關引取要錢物稍涉疑似監收鎖索百方侵擾竊詳山野小民資本輕微仰之經營以供一切差役今者有此重併實不聊生所立州府為上司設置辦課衙門坐視亂行又不敢問致內負既屈控告無所據上項一切創立局司侵奪民利等事理合革罷以慰民心定奪儒户差發照得丁酉年欽奉聖旨節該中選儒生若種田者輸納地稅買賣者出納啇稅開張門面營運者依行例供出差發其餘差發並行蠲免又照得中統二年欽奉聖旨節該巳前聖旨裏如今咱每的聖旨裏和尚也里可溫先生答失蠻體例裏漢兒人河西秀才每不㨂甚麼差發休著秀才的功業習者欽此至元十三年蒙上司差官試驗分㨂元籍除差儒人該試中儒人內兩丁近下户計撥充大常寺禮樂户竊見試中儒人户內多有户下餘丁不曽就試官司收係當差又有因故不及就試儒人亦行全户收差若蒙將元籍試中儒人户下餘丁不曽就試户計照依丁酉年試驗儒人聖旨體例全免本户差發外及因故不及就試儒戶乞差官再行試驗試中者依例免差黜落者收係當差實為受賜外有至元八年欽奉聖旨保勘到委通文學續報倚差儒人於至元十三年亦行就試中選若蒙依例除差以為後勸薦前御史康天英狀早膺劇任備見長材當官有通變之方持論熟經事之慮考據實迹委號良能如憲臺𥘉立首以材望棹拜御史繼授南京幕職時攻取襄樊夲官支持餽運務繁益辦若以才能可以從政八路之間少見其比自秩滿居間恬于仕進于令四年抱用未伸中外漢惜伏惟聖朝方致理有為之秋如天英者不冝使才德空老田間以遺明時之用理合舉明以激貪鄙保郝彩鱗狀竊見故翰林侍讀學士國信使郝經奉使亡宋幽囚十有六年以沉欎致疾還朝未幾隨即物故據以勞死事誠當優恤其家令嗣子彩鱗年長負學卓有所立似冝超等擢用以酬父勞且為立功立事者之勸申明宣慰使陳祐狀蓋聞忠義者天下之大間聖王常推而褒之所以砥礪生民為當丗不忠者之勸竊見故中奉大夫浙東道宣慰使陳祐歷事兩朝家無儋石迹其官舉皆善政生而竭匡濟之忠殁而有砥礪之效孤身遇寇無路可生奮然不去為國扞賊甘心白刃正色就死雖李司徒之握節死事顔魯公之抗志捐軀無以過也至使越之部民感愴忠節萬口一辭願留葬會稽世奉其祀自非精誠洞貫警動一時何能致此其於助丗教厲薄俗豈小輔哉况忠義者國家之元氣所冝養而不可衰也今本官淪忠泉壤不蒙顯異切為朝廷惜焉伏惟哀憐推而褒之不惟於贈典殊常將見伏義守節之臣自兹為不少矣嗣子夔今為福建路行軍千户蓋出特旨不緣門資次子臯未仕通文學有孝行如録之從政必有可稱亦旌顯之一端也修理大都南京石經事狀三聖人之教其揆則一尊其師重其道此理之當然也竊見大都南京廟學所有九經石刻刋瑑極精近年巳來舊制既廢舉皆散落於荒煙草棘間日就摧圯甚可寶惜且經之遺制自漢唐至今歷代聖王無不尊崇修理蓋重夫經丗大法故也今海宇混一方息馬論道之時據上項石經理合修立以彰國容兼所費不過夫匠灰石而巳只係有司一言力耳論黃河利害事狀夫古人作事慮未然不治已然治未然用力少而收功多沉預備不虞古之善教也河為中國經瀆遷徙不常自古為患非小川細流可比竊見今夏自中堡村南卧去京城草里而近撞圈水三百餘步勢湍悍舊築月堤一蕩而盡又自河抵京北郊地勢漸下南北爭懸七尺之上中間土脈疏惡素無隄防固護以悍水衝又見犯去處不下五六十步南接陳橋六丈故溝至甚寬浚北勢既髙水性趨下斷無北泛之理故識者云巳隱犯京之勢似非過論也若向前霖潦大至瀑泛之際意欲所之崩摧潰決其害有不可勝言者每歲有司規畫不過今夏復夫數千明年興功半萬縷水築堤以應一時極其所至僅能防備淹水終非緩急可恃得濟之用但幸其不為災耳况大梁自古雄鎮今又為江淮總會要津日當修理不可任河作􅑂視為尋常萬一侵犯豈惟使民居蕩析且廢通漕控制之利民之大命又所係有重焉者蓋開封祥符陳留通許等數縣之地耕種不暇數萬餘頃若漫為淀濼歲訃先失民何以生此最可慮也又聞往年兩次南犯酸棗陳橋二門止是支流小水京尹昔告秃滿行省崔斌等極力堵閉幾不能塞况今大河正流直指南卧常人尚慮將漸為患而增卑培薄分流殺勢之議其可後哉今體訪得河自臺頭寺西東接𣏌縣西界兩勢平無槽岸行流虛壤中故卧南卧北大勢走作所以漸為京城害者不出此百里間而巳若能舍小就大廣為規制如亡金新衛所修石岸者遮障奔衝使東過三汊散為巨浸可毋慮也當職竊詳每歲興功築隄防㧹真成戲劇恐徒費人功損踐民田其為可防經久之事曽無少輔如蒙以國家大計論之河防之議其説甚多合行重為講究方來利害舍小就大廣為規制以圗一勞永逸之舉實為便當不然據要害去處建立祠廟專使以重禮禱祭仰賴洪庥庶回神眷使河有定流不致傷財動衆亦救災之一端也秋澗先生大全文集卷第九十一
