  text: 秋澗先生大全文集卷第十五
  hash: sha256:5f7a5d08aa0b1275c67c4153bee6ccf0f887d8fc098aa619585f339b5a3fd0ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_015-1a}
body:
  text: 七言律詩蘧大夫廟芒鞋兩自近關行頗訝先生出處輕道亟卷懷傷喪亂仕因公飬辟專榮輟車彷彿公門敬寡過依稀聖者清故國令煙喬木老至今君子號郷名苦雨吟禾頭生耳駭輪囷一雨霖霪迫兩旬蛙出坎居喧皷吹蟻連封垤失君臣隂沉便恐陽烏慘飛舞爭看石燕神寄謝碧鷄坊裏客不煩羹釡怨生塵迎秋大暑推回酷吏輈先聲傳喜到梧楸清啇載路歌夷則白駱前驅候蓐収氣肅衮裳𥘉𣸪辟露清行殿拜凝旒若論成結功尤著不解詞臣九辯愁明霽雷霆威霽雨𥘉迴戰罷昆陽萬馬摧成結歳功真有望洗清天宇覺重開秋菌出木驚朝暮野水增波阻徃來腰足痺頑欣一散約携藜杖晚登臺箕子廟唐在汲郡刳剔忠良詫肉林當年愁絶父師心道傳未害奴爲辱俗古方知化獨深上念聖湯思自献下逢周武是知音野煙無地尋遺廟空詠芃芃麦秀吟挽梁防禦邦傑二首酒舩茶竈柳溪煙把臂論交記昔年列郡剖符方再考銘旌埋恨便終天風纒大樹摧蘇嶺雲黯歸魂近赫連四十三年成底事一杯慟絶九山前梁矦躍馬英妙年大冠脩劒身頎然閉車過市殊不樂快意耳後抨驚絃朝吟醉卧石樓上暮歸射虎南山前聞說三城足遺愛令人空憶使君賢奉荅彦正參議書問清晨庭鵲喜相呼薄暮敲門得素書地重毎愁屯煦䏰人来還喜駐青居煙開瘴嶺三軍壯氣壓巴江百戰餘一檄我知邊報静西南爭識漢相如酒醒聞雪作呈陳侯隂雲低壓濕衡茅暖透衾禂地氣交縞色漸生明月幌風聲先到碧筠梢誰家獵騎長圍去何處柴門向曉敲開歲春風兩岐秀竚看晴浪際農郊至元四年歲在丁卯暮春之𥘉陪陳王二郡侯泛舟清水兼携妓樂山圍牧野青未了河抱鄘城勢轉雄髙㑹逺為開府設仙舟還許李膺同春光淡沲明歌扇吹管飄蕭颺逺風鄭重使君雙皂蓋月灘留醉恨怱怱風暖溪深夾岸花緩移蘭棹轉灘沙醉停杯酒清歌細看弄漁舟白日斜誰與浣花徵故事行觀春物到山家沙堤不用雙紅燭馬首歸時月有牙川故事太守自正月出三月及浣花止溪回路轉無多曲風軟舟輕恰數人汀樹弄晴供望眼岸花迎笑喜行春千年勝賞蘭臯在五郡謳吟使節新多謝絶吹醉㡌惺惺恰及到城闉寄王緫管子𥘉新築茅堂並水扉栁隂連接到漁矶平疇緑滿禾方秀髙樹凉多露未晞挾䇿不干丞相府入山終製芰荷衣故人好在龍津府書葉飜香吏事稀和節齋言懐詩韻元龍湖海見平生老我韜鈴未易兵格物志精先寔學捄時心切耻虗名風雲自是龍頭客吟笑空懐壠上耕䄂裡􅌐珠三百顆毎從開讌淂晶明林塘秋暁躡足烟霄謝俊㳺野人髙興在林丘近山欲雨先衣潤秋水増波拍岸流水葉静時存復理人心安處即天逰隔溪田父治荒穢斜日踈烟满樹頭卜築塢溪流水抱村斜林杪青山隔岸賖平日買田惟樂此他時成趣要移家溪邉種柳眠黄犢竹底開門繞白沙任使傍人呼漫浪雨蓑無負釣魚槎送王子𥘉揔管奉詔北上聖代崇儒意匪輕徴車相望半諸生九天雨露思賢相十載經綸見老成更化有方先定制捄時無騐是虚名烟霄未遂攀鱗志葵藿空懐向日誠簡寄楊治中文卿貳車沁水瞻髙駕簿領西臺有舊遊邂逅一樽淇上酒笑談千古庾南樓豐狐闖首蔵三穴一鶚盤空健九秋聞道清源足佳景竹林煙雨夢西州上史承相百揆端歸一相尊中臺潜隱北溟鯤人間桃李爭晴晝天上風雲擁㦸門駑蹇遇知思一顧家山囬首惜空奔幸䝉翦拂長鳴去會有文章報至恩題相者訾洞春野隠東過滄海翁醉吞秋日入心胷神機深探乾坤祕眞氣曽驚户牖龍驢背老髯掀一笑春風歸路指三峰昂蔵我似賔天鶴夢遶仙盤露影濃和髙麗參政李顯甫恩波如海際天隅一日京師識老蘇喜向嵓廊瞻漢相欵隨仙仗聽嵩呼衣冠自是乘槎客文彩還驚照乗珠共羡朝天蒙寵渥三韓秋色滿歸塗開平夏日言懐圡屋甖燈板榻虚一缾一鉢似僧居半編翰草從人讀兩鬢霜華向曉梳客子衾禂殘夢短暑天風物暮秋𥘉故園松菊荒多少豈不懷歸畏簡書郊送雲叟公寳鞍塵土滿香羅因送行臺振玉珂出郭快於鷹脱㡌歸懷爭奈鷇遺窠夕陽明處亂山淺碧草深時毳帳多自愧囊錐無利頴青雲臺閣半常何直中書省紫禁彤庭尺五天沉沉碧綺鎻秋煙鳯池波暖鏘鳴佩翰苑才踈愧昔賢人世好懷能幾度風埃長路已三年緑隂好在西園樹辜負移床聽晚蟬開平晚歸七月一日授翰聀龍首堈邊野草深秋風灤水動歸心百年蓬巷開圭竇一日恩光照一林吟鬢有光浮鏡玉家書封喜認泥金料應曉月簾櫳底乾鵲飛来報好音吊竹三徑歸來已就荒更堪庭實嘆云亡䆫間月出思清影簾底風来憶細香便擬碧鮮留賦詠恐應塵俗到膏盲未容分斸蒼苔破拄杖敲門有底忙和龐參軍雲卿詩韻萬事雲飜揔釋然不禁哀樂近中年此生得處便爲樂自断從今不問天最喜遇知傾底裏譬如食蜜味中邊吾郷頼有諸卿在歸隱終期覔魯連送陳尚書經略成都暫辤喉舌去籌邊調餉中間别有權托境要當成筭後務農思在訓兵先雪山已覺公來重玉壘休矜蜀險偏東北更看諸葛表春風晴霽錦江煙太原筆工李子昭許贈予雙筆乆不見付作詩以問之子昭過晉喜新知雙筆親承逺見遺脫㡌一從休老頴臨池幾負躍蟠螭正煩筠管麁扵臂細理毫鬃健作錐乆向夢堂驚五彩貯雲含霧莫来遟聞諸軍飛渡鄂渚前次建康節駐長洲巳浪然鐡縆鎔冷瘴江煙膠舩浮海從南遁漢日行天揔北旋牛後舉知非晉祚暦期應計過唐年至元天子如天覆莫遣虛陳坐榻氊秋日㑹牙城白雲樓讌行院使者及嘉定府新附諸校坐中觀西山風雨望際煙霏濕翠幈雄風先作雨前聲鴻濛氣合先天境慘淡川迴得意兵凉吹逺隨悲管發壯懐還傍醉吟生三年畫㦸清香地慚愧終童係越纓賦西城鸚鵡螺杯老月淪精射海波珠繩分秀貫神螺鷓班漬粉垂金薤鸚喙嫌寒縮翠窠樽岀癭藤紋浪異瓢成椰子腹空皤飲餘疑與溪娘遇一笑相看發浩歌乙亥夏六月廿四日西城即事馬上望姑山煙雨濃淡開闔有不可端倪者偶賦是詩以紀其竒觀云連山中断欝蒼陘全晉蟠紆未了青方訝野煙沉澗壑忽驅凉吹滿林埛天邊雨脚排銀竹物外仙家列畫幈擬是姑仙遊八表笑迴龍馭下滄溟挽翟器之八月十七日清晨夢翟君器之晤言者良乆覺而賦此以悼魂而有靈恐當撃節也淡癖相看忽四年襟期樗散鄭家䖍隷書思入錕刀法畫品人推具眼禪滿璧滄洲驚絶筆一樽别酒是終天不湏只聽山陽篴日暮懷人已慨然哭郝内翰奉使大河東匯𣏌連城之子南來氣宇盈義契重於平昔友斯文公與後來盟苦心問學唐韓愈全節歸來漢子卿十六年間成底事長編惟見使華名次楊子英詩韻十年芸閣想差肩曽侍紅雲尺五天幕府蓮波知泛麟臺勲業浩無邊劒埋古獄終衝斗玉藴藍田暖自煙留取􅎍中踈俊氣它年揮手障汾川題開封府後堂壁至元十三年𬒳省院檄同開封尹陳侯試河南儒士四月十九日抵京授館開封後署相與握手活舊且及包范二公事業時予耳疾止酒談噱間暮雨大作連明因述鄙語奉一笑云使軺南下入京華滿眼交親笑語譁共訝老螭蟠北海自怜賤子宿南衙關河痛别襟期豁風雨翻空夜氣嘉負煞清尊三百爵胡床相對看簷花投宿洧川驛時病耳話長不覺道途倄馬轉河堤入宋樓時事未容談笑故園難遂去來休一天梅雨方𥘉夏兩耳蟬聲預秋最喜此行陪逸駕未妨吾道付滄洲許昌道中一雨長途送曉凉陌塵壓盡燕泥香醉歌金縷辭梁苑笑拍吟肩入隷昌人物消沉清議在風雲開闔蒼應怜一片西湖水空照行人兩鬢霜頴封人廟在宋樓鎮西三里古堤上至元十三年夏四月考試河南同陳節齋過其廟陳爲索賦故有是作頴封遺廟枕髙墉窈窕舟青力牖空治道得人無國小孝心錫類與天通當年大隧融融樂此日喬林癛凛風㧾道茆焦賈餘勇從容難似片言功友人喪馬老驥厖然燕色蒼今春長記逺乗将翻江風雨曽何夢伏櫪飢寒想備嘗既乏敝帷酬逸德忍令銅鬲葬人腸玉鞭剪断春遊興驢背清吟要細償南陽府試院中作牙堂瀟灑敞晴䟽薜荔墻深五畆居起敬對瞻元凱廟訂頑欣得鶴山書心非道義為充實身與乾坤恐自踈暮倚城闉還一笑竿頭蚯餌引鰲魚寄李士觀時在襄陽兼簡好古郎中拚醉清樽洗别顔我來君徃轉凄然遥看漢水無三百不覿清揚已五年甕舞未収輸鬼笑候蟲多足返䕫憐義襟誰似張京兆早為吹嘘使北旋張京兆謂張好古也時在襄陽徴理錢糓等事南陽北城同陳節齋晚眺大野東瀦楚塞遮清川西騖抱城斜瓜分鼎峙連三國地廓天開到一家丞相大名垂宇宙龐公髙節動雲霞千年事徃空遺跡立遍殘陽數去鴉宛葉遁中六合雲蒸一氣霾漫漫長路渇生埃詩從白雨明邊得人自青山盡處來丗路有機難預料劇談供笑不時開濟時頼有諸君在漢苑秋風愧不才次宿汝樓韻二首解却征鞍細履園月明深夜倚危欄㑹慳共惜飄零乆心逺應憐語話殘尚友共㝷佳樹傳逢辰不戴鵕䴊冠傾嚢擲下驪珠顆依舊晶熒照乗寒微雲河漢半晴隂夜景蕭森夢化城山色不隨喬木老月華偏對故人明鶴縁露警清無寐蛙属官居重有聲廊廟只今紛治具正容堅坐看昇平贈别按察王立夫二首時在洛陽試院中作當年畫省憶同襟此日南來又盍簪夜雨喜成連榻夢秋霜尤見故人心義方外覺紛華遠話乆中傾底裏深他日買田相約老兩椽茆屋共雲林眼中機括審時張事外論量見直方白璧不酬金屑笑烏紗能護豸冠霜煙花紫禁期推轂風兩南州夢對床更就信陵陵上月一尊分手上河梁留别節齋公因次嚴韻雨露乾坤不少私至人出處與同期松筠氷雪有定操人物江山見一時着手正便捫蝨話㸔雲難受絡頭絲平生慕藺公應識秋水長河有令姿夜宿朝元閣下垣樓觀天中央星斗拱列靈壇蒼月中清露翻碧瓦殿簷風信摇金鐺炎歊似殺赤熛怒霧雨謾成玄豹章時考試儒士於此故云長纓土滿未容濯金溝泛曉空蒼凉挽吕權漕子謙維至元十年歲癸酉夏六月日江淮都轉運司幕官吕公終於私第之正寢饗年六十五越明年春三月東平尹信弘毅自衛過晉始知公墓草已宿嗚呼哀哉公諱遜字子謙系出東平望族父松金詞賦進士第官至隰州刺史興定間城䧟死節公其次子也為人䟽直愷悌樂道人善早歲有賦聲生平喜作詩格律精嚴長於七言近體或有問湏盡吐乃已然如法家断按不絲髪貸問者知所趣居漕府幾十年良謀黙計便公私為多某辱知最厚悼斯文之不幸痛知已之難遇非歌詩無以攄予衷也乃作是詩躬告墓左魂而有靈鍳兹誠悃其辭曰凌煙詞氣吕衡州一語神交二十秋漕府議髙推獨歩詩壇吟苦入冥搜眼中耆宿有今日地下周馮是舊遊秋草滿丘新吕道未容車過淚先流臨武堂讌醉後有懐省臺諸公桂月流光雪滿臺月明人影兩徘徊行雲不逐歌散徃事還隨去鴈哀雙鬢入秋無可白寸心於丗末全灰遥憐紅藥堦前客玉樹相依一笑開簡寄陳節齋别來碧海三山客偶得新詩慰逺情晝接夜談懐鄧鄙風荷煙柳夢都城好翻故里三千牘且按秋風九萬程㝡喜新凉換炎暑梁王臺上月孤明鞠餘望月東臺即事崖陴詰屈張煩痾老樹遺臺悵獨過山色滿樓簾影薄柳隂横沼鳥聲多兩河蓄潤開東雍十古秋風動漢歌誰着梗陽人有獄鬢華尤比向来皤日用萬彚何能臭味同洪纎強梗貴冲融虼於砥柱標天險淡似浮雲度太空意或近私隨有礙事因無已即成功莫將此理求諸逺揔在平時日用中送王丈子壽南下河中白髮今年八十過故園歸興足蹉跎啓期三樂人爭仰汲直髙風古所多照眼關河增喜色過門香火盡行窩後期望嶽棲巖上一笑雲煙入浩歌郝提舉子某至元八年冬見於京師楊氏書院與之語温醇有禮愉色睟然意謂奉身周謹篤於其親者也今年春予官平陽一日介呉君子明來謁具道郝南還之事相與撃節嘉嘆乆之噫方衰俗頽波中其孝養有如此者孰謂曽閔之門和樂之氣有時而息邪此心不匱豈特錫類而已哉故傳曰惟孝友于兄弟施于有政其是之謂歟喜為賦詩以贈且廣其敬養致楽之心色難無違之旨云古稱百行孝為先就養辝榮事更賢戀戀庭闈心向切依依親眼望来穿蓼莪報徳歌周雅令伯陳情感毋年衰俗陵遟有如此見渠福禄日増川白樓晚眺條山東峙畫幈開樓外長河一線來簷瓦蘸波鴛夢渚鏡鸞空影月臨臺千年事徃情如昨滿目春傷恨未裁更著野花留寳靨女墻隨意點晴苔洪洞道中送客回有懷子𥘉舎人親朋零落故人稀白首相望更一涯花底夢歸連夜酒柳邊情在送行詩賞心嵗月能多日人物江山又一時許國壯心雖未老向人孤抱欲誰知公堂即事鴈䳱行趨日出前潭潭槐府静秋煙漁陽摻急三撾後簿領山如萬慮旋圖報毎虞遺少愧焦勞何敢獨稱賢更堪清畏堂中夢夜夜歸心到日邊淸畏自榜寓君堂名和周録事感春詩韻微官休苦日奔忙須信行藏在彼蒼心計自憐甞越膽鬢華何計避呉霜暫容巾挂三花樹任使聲喧百鳥埸昨日平湖湖上過緑波如縠要浮觴夏縣道中濕雲壓樹際崗平溽暑還因小雨增官事困人如縛虎秋風吹野夢飜鷹趨時未必儒冠誤並隱端為野鶴憎遥憶筠溪亭下水萬竿蒼雪照吟燈題聞喜廟學古栢丗傳清廟聖湯墟老栢還除十六株黛色秋煙千古上石根銅榦百城無虬龍閲丗蒼髯磔踈影凌歊冷翠鋪眄汝自慚詩禮客摩挱三向孔庭趨餞張子文驛送戈甲前赴成都子文雲中人至元八年冬相識於大都李玄暉南菴吟君一軸餞行詩西望峨嵋有所思山險不憂巴道路雨多防濕漢旌旗雄邊有䇿看回奏諭蜀能文正及時儻見揔戎煩告語雪山輕重在謀為揔戎謂彦清譚帥寄送朱信卿還吏部故都喬木巳蒼煙朱翼城人故都謂翼唐叔故都也玉樹臨風照眼鮮暫着印窠封瑞錦要從鞭筭看流錢燕山夜月縈㱕思平水春風夢别筵不得一杯光祖道汾崗回首轉凄然霍岳道中郡寮招致逺相過冐雨東登荷笠簔比入廟宫三渡水再㝷蘭若重攀蘿傍山凉早疑秋近砰澗溪喧覺雨多庭下古碑堪晤語倚餘笻杖更摩挲謂劉神川修岳同碑霍邑懷古堂堂義幟下并門六合風雲巳併吞軟甲不憂三日雨妖氛厭兩都昏𬗟懐戍火城頭語死愧忠精地下魂謂宋老生也慘淡鑾鈴原上月至今英氣凛生存送周録事幹臣任滿赴都青衫白髪老參軍銀管聊鋪兩考勲公吏檢身知禮度兒童争語說清勤春官吏選多書最祖帳東門惜重分匣劒莫將塵自翳諌章論草要新文送漢臣張弟青青衿珮讀書郎邂逅姑汾意叵量老大正深郷國念飛翔不負少年埸行沾紅藥堦前露夢到秋風豸角霜此去固當強不息更湏人事卜行藏壽趙秘監輔之時奉使日夲迴西歸京兆報國心丹氣益振一㠶直徹海東垠三年契闊中朝客百險歸來万里身曠古使華清議在照人精彩壽毫新終當清淺蓬萊水經制金華要老臣陳季淵挽章三首至元十年十二月望陳季淵子次翁道出平陽以其父季淵䘮來告且請詩哀挽故勉爲賦此筆頭詩話硬盤空詩自工來老更窮玉斧驚傳脩月手旦評推絶斫雲翁幽穿洞穴愁山鬼壯極秋濤駕颶風千古杜陵原上月一丘分照渭城東大駕西廵始拜公從容樽酒兩都同杖歸河朔忠尤壯詩到秦州氣更雄蓮府晴波竒䇿在杜陵殘月草堂空傳家儘慰元龍望湖海諸郎有父風憶扈龍旂狩蜀年渡江詩並選鋒先江花冷墮波神泣醉䄂来披玉井蓮已訝羽淵淪老月遽教風骨閟重泉𬗟懐春草池塘興雨夜分明夢惠連挽殷簽事獻臣扶病南來喜盍簪激揚似為失前禽氣衝豸角空餘烈響絶朱絃得好音一節儘髙完璧事百年誰了蓋棺心醉魂不到黄壚夜夢繞三山碧海深㣲恙團蒲倚暖病維摩春滿晴䆫氣未和兀坐暫容心境静好懐安得故人過鐡花繡澁青萍暗丗事栽培白髪多却喜郡人相說似春風門巷雀堪羅至元十一年歲在甲戌上巳日㑹府倅張侯明卿治中忽英甫前揔判張行甫禊飲于晉源郷蘭莊刀氏之醒心亭張矦行甫之子思誠息翁孺侍讌禊飲蘭亭不可尋蘭莊山水儘清音楊花糝雪溪流碧野卉留香竹樹深暫脱帕車三日婦却忴時事百年心一樽快趂芳時醉明日池塘是緑隂次日奉命簽南征新軍中外騷然者數月送郭按牘彦實東西南北送行頻長路青山輾欲塵蓮府有聲推雅量柳條無計絆行人緑波未要傷春浦白璧難酬入幕賔後夜月明川口道夢歸先到晉溪春洛陽懐古重城繚繞枕邙腰二水交纒㑹洛橋勢即土中多漢制錦圍林苑訝隨妖山川開闔悲今昔陵谷更遷失市朝萬古消沉竟何有揔成閒話付漁樵遊澤州青蓮寺知州皇甫琰名山名刹不無神掣電轟雷一雨新洗出好山真靣目擎嵐捧翠待詩人薰風吹雨不沾衣馬趂清凉入翠微硤石兩楹天斧断好山四面畫幈圍我來勝地清心地僧說禪機與教機頼有文章賢判府裴徊登眺乆忘歸斜分一逕下林巒金碧觚稜紫翠間羣嶺秀攅青􅔽蓞孤峰突出玉湖山鑿開一握乾坤小占㫁千年日月閒浩浩兵塵滿河朔天風吹不到禪關和前韻盤盤石磴轉層巒寺隱青蓮六葉間天削断崖開老硤雨將空翠繪蒼山偶因戎治終朝畢暫得僧䆫半日閒清曉出山還一笑幾時塵事不相關覧勝都忘罥葛衣谿風吹雨散霏微霞明殿脚金千界雲抱山腰玉一圍林壑有靈憐俗駕人心無路息危機風流幸對文章守安得巖栖不更歸太守清吟句有神興隨山雨一時新身修自是吾儒事笑殺殘僧説似人夜過關嶺山山行四月似凉秋夜半摇鞭下嶺頭心苦自憐甞越膽歌長不用撫呉鈎風煙動色開中鎭禾稼連雲際四州碌碌一官成底事春風歸夢仲宣楼虞郷道中中條如畫色蒼蒼過雨晴嵐帶夕光望入王官饒水竹路經虞坂足耕桑未容巖桂相招隱自笑微官有底忙多謝浼風驅暑退笠簷吹作馬頭凉謁王官谷唐司空表聖祠堂人去空山草木香撑霆非爲漢文章三休方擬遺身累一僨應憐爲囯亡明月不汚黄浪濁清風髙並首陽芳滿斟三詺亭前水拜乞襟靈滌肺膓慶路伯逹八秩之壽素髪酡顔八十春昇平人物典刑存兩都喬木秋光老四座春風笑語温膝下盡歡衣有彩人間無似壽爲尊試從九老圗中看獨覺光荣萃潞門爲郷人夀壯年虎穴喜竒探老去幽潜一道龕倚杖看雲追徃事閉門留客了玄談關元氣欝丹浮頰玄髪雲如緑滿簮今歲夀堂春色好一簾空翠撲晴嵐秋澗先生大全文集卷第十五
