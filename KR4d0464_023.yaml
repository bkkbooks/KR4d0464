  text: 秋澗先生大全文集卷第二十三
  hash: sha256:7aca56646a555fba81f6c81193386f709d48de5c8e221fac7ca20b194dc0636e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_023-1a}
body:
  text: 七言律詩贈西雲上人系海雲高弟前日賔筵偶遂披覩一言當機口有不能言者如雲之在天水之在瓶不復喻其快也謹裁鄙詩奉為上人一噱某和南吏用公才不易逢茶煙都揚落花風登壇懸斷群機息靣壁傳心萬法通慧眼正來珠媚浦浮雲飛盡月當空虎溪公案元瀟灑會約松軒一笑同謝嶽昭文惠新曆夢破𫾣門蝶祤翩一編星曆衍堯天人憐短景催窮臘斗轉嚴城永日躔天外春回龍集閹林梢香動紫生煙迢迢細忖宫壷漏正是昭文進德年跋祈真人畫像何處人間有洞天青藜曽探寶珠玄柱頭留語疑遼鶴物外孤吟覔閬仙木食草衣元淡泊竹風松月自清圓壽宫舊有燒丹竈空憶靈砂績夜泉送安參政南還汴梁并序參政安公與僕定交於中統𥘉元契濶者草寒暑大德戊戌春邂逅於京師樽酒談話追憶疇昔念故舊之雕零感歲月之易邁情不能巳者謹以唐律為贈既光回斾且寓愚意之所託云黑頭蚤插侍中貂當日雲齊一羽毛忠翊殿庭稱謹密量吞湖海見雄豪風雲夢繞調元鼎珌奉光含切玉刀此去斯文應有記豐碑還擬泰山髙題南塘居士宋公畫像卷後南溏結夏水芝香對展蘇黃拜燕堂文獻在公推故舊琴樽娛客儘徜徉傷心此日空圖像照眼庭階失鴈行白首那堪題往事未容枯筆涕先滂跋東門祖道圖二首東門祖帳盛官儀淠淠鵉旗動漢騑燕几道尊籩有踐碧空雲靜日重暉飄瀟物表桑榆境灑落人間寵辱機東海西邉兩丘土至今圖畫見宫闈二踈心迹本鴻冥解紱東還弊屣輕劒履中朝何百位風雲髙駕眇雙旌問金奚有田廬計歸夢都忘寵辱驚詔獄悖然賢傅死虗勞明主問蕭生奉和寅甫學士九日迎鑾北口髙韻青山紅樹映晴霓玉削方臺積粟西不憚坡陀屢登陟喜陪朝謁共扶携霜風偃薄千林靜雲海蒼茫萬象低心自屏營瞻戀切佩聲長在筍班齊翠華南下拂雲霓駐驆軍都漢縣西龍虎臺髙驚峻絶蓬瀛人老許扶携鷺鵷班迫共扶携九天日月瞻光近万國風煙入望低佳莭迎鑾得清賞牛山𥘉不羡東齊過趙匏瓜林墓靄靄停雲自所思樂天池上獨來時匏瓜散落和雲扶踈帶醉移樽酒草堂前日夢小山叢桂猿悲因憶桓伊事却撫松筝為解頥長至日即事睡起鬪來催賀節牙牙紅點鴈成行灰飛琯透千門暖繍刺功添一線長極壽百年驚過半從心七秩有三霜發身不羡錢神潤要把青箱付窟郎挽平章御史中丞克齋公豸冠髙聳絳為韝霜色橫空一鶚秋癘鬼遽來露泰山歘裂駭黃流氣從溫造行間見魂逐龍下遊反𬒮兩行知己淚黃雲衰草夢西州州者蓋暗取羊曇西州門事也哭挽毋弟略監使分携洹水儘離愁誰料儀真是徹頭留别有詩驚咄咄逝波無夢便悠悠逺逰不負江山興鞭管樂疇老子慮來非一事后溪溪上暮山頭雪後即事一雪都城二尺強桂珠生事日尋常群鳥慘慘飛不下萬木林林凍欲僵頭戴鶡冠井潦倒氣尺泥藏倘為得放歸田去亦是眀時盛事即事湘雲月二首是日先府君明忌日珍果犀錢粲洗盆瑣窗香霧濕湘雲春風暖透青綾被𥘉慶祥開具葉攴樨竹翠含筠籜嫩猗蘭紅茁露芽芬細裁百疊清江錦留待鞶囊備􅍤紛彩檻移春照綺窗酒船浮臘進中堂負暄比獻茆簷日燕寢先分鈿機香缸燼翠凝鏘鳳蠟蘭膏春滿洗兒湯顧應吾父情鍾愛一笑燈前撫坐床送杜熙正省掾考滿授四川省都事扣門有客稱熙正考滿兩歸得蜀除照眼鄉鄰韋曲好趍程閣道劒門嶇煙霄顧接新桃李黑業紛翻舊簿書鄭重故人髙左轄雪山清興近何如聞長春宫溪水復至臨漪門外碧波瀜又見分流入道宫閬苑煙霞增景氣寶玄松桂動春風忘機靜玩沙鷗雪潤物中􅉼上善功道脈川流元一致滔滔東注浩無窮謝徐容齋贈梅燕叉宫額蠟粧勻夢繞羅浮雪裏村持贈一枝遮老眼淡依踈影度黃昏風流燈下佳人面瀟灑吟邊竹葉樽我老忘情被花惱曲幈深鎖惜芳溫容齋清節楊州遜贈我官梅興寄深宫額黃嬌渾綴蠟綺窗香淡不盈襟春融壷浸催先發雪壓溪橋憶練尋茆舍玉堂𥘉不間似將渠表歲寒心吊鄭徴君説心江南饒州人將年四十以氣疾死大都官舍善五星有易學注鄭氏新説春風雙節入閭門吳市東廛遇異人太易有靈蟠化筆天星飛跳見凝神燈幽竁室驚媧畫槎泛銀漢挂浙津反䃿兩行尼父淚定中臺下泣吾麟范徽卿風雪和林圖天䇿桓桓控上遊邉庭都付晉藩籌河山表帶連中夏風雪洪𪷟戌北樓笑著竒謀收藥籠未妨民賦課甌婁丈夫志在飛而食不讓班超定逺侯題劉處士墓碑後劉君襟韻晉人清耆舊風流有典刑三代鼎彛資噩噩一家鴻鵠自冥冥胸中素貯女康訓雲際曽瞻處士星花落草堂人去後鄰翁時過看埋銘大德二年冬十一月同昭文大學若思登太史新臺周覽儀象久之而下侍行者姪子公特徙倚靈臺万象新仰窺圎蓋偃鰲􅘡龍衝都柱驚坤軸望入星纒候北辰日梜陽烏符盎晷春浮元氣上儀輪思侔玄化稱平于太史于今恐後身贈不蘭奚侍御奕世威名大樹瀟孫支騰秀見英標肅清吏黠懷三畏摩拊民洟入六條烏府共推清廟器黑頭行插侍中貂仕優政有詩書樂洗耳齊竽聽舜韶廣平毛巨源夀萱堂百順無尊五福榮華堂髙揭緑萱名鳯花雅負忘憂酒香翻獻壽觥蘭玉照庭連秀色珮環合節有東風細揚簾旌繍會見鸞書下玉京張子惠母夫人手卷夫人內治曰嚴貞省定歸時有訓懲孝感庭闈深色養德融民社見春凝凱風吹棘心何切宿草含輝樂不勝七子有材俱茂異慶門從此福川增王太君授誥正月十四日拜慶家庭隆福宫深淑景長今年壽席倍恩光鸞廽紫誥擎來重花覆潘輿暖更香象服委他儀範逺兩宫朝賀佩環鏘細傾洗玉池邊酒常領春風拜北堂送趙提舉仲遠之順昌縣尹望入江城鴈影翩春風吹上洞庭船幾年戰藝東湖上一日觀光北斗邊勝賞莫誇王勃序吟鞍歸裊繞朝鞭詩雖六義功非易未厭蟲魚學鄭箋送李司馬任順德總尹司馬桓桓漢徹侯十年藩府佐邊籌氣凌朔漠三秋雪人在元龍百尺樓巳濟時艱完大節又宣風化入南州知君致澤平生事行聽民謡擁八騶順德道中魏勃何人擁使軺鵲山東下半林臯清霜原野雕盤健明月關河鴈影高遊宦有心空載質宰平無䇿漫操刀黃金臺上燕昭相甘為摳衣授六韜贈中山賈仲器刻書工賈仲器中山永平人諱德玉為人誠信多巧思平生好讀許慎説文識解字意故刋書際多所助益衆工讓能推為方今第一手近趙人术甲氏亦稱善碑刻者膠書𥿄於石立鐫全攴略不失真未審與仲器所刻氣韻為如何也賈今年近七旬技精不少衰白髮蒼顔兩目鵠視似耻與凡禽為羣耳來求詩書此為贈翠琰梁停有異觀賈生琨削近烏欄須知成巳填書藝信是春坊刻玉官千字誄精山鬼泣一鐙思苦夜臺寒惜君不致山隂禊八法從渠入木看巳亥歲京師除夜住京誰計畫權錢戀闕心丹力不前干祿自慚三釡栗借車津遣五窮船故鄉此夜偏多感衰鬢明朝又一年乞得殘骸便歸去草堂猿鶴巳淒然庚子元日賀苟嘉甫授徽政院長史忠孝堂堂漢宇孫更忙相見每留髠掃愁不為青藤酒展賀來𫾣白版門中議素髙徽政府清吟時接謝公墩老夫幸有西池遇東閣垂思合細論詩里平章公漢家六合恢攴治雨露恩深到海涵機務救時傳世業衣冠故里仰華簮闔門飢凍心雖切七秩歸休分亦堪一語倘蒙天眄去故山春滿讀書龕謹按遺山筆録載梁氏家世甚詳中有云斗南先眀昌二年進士為人讀書精熟喜作日幹局吏能剖繁治劇不肯下一世人人長於機務可謂有乃祖之風矣故有傳世業之句雲卿郎中方以嗣續致慮側聞弄璋喜作詩為賀平生隂德爛于門况復昌黎一氣氲詩夢占祥元有兆大賢之後豈無人蘭芽秀茁根初異海果生遲實自珍我老喜為湯餅客一樽光動竹亭春夢升天詩庚子春正月壬午日夜夢天風吹來星漢未曙梯雲上征極天宇而止豫倚雲下視倒景四垂滉漾滅沒有不可望焉者既而覺清寒逼人神思飄揚毛髮為森竪也遂躡空而下入道宫與張仙翁遇良久出翠弗紫端相遺而悟聞夜漏下草刻矣豫平日異夢甚多皆莫之比因作詩以記其祥沉沉玉漏三更後鵬背扶搖九萬搏彤管夢傳江令筆紫𫀆歸抱上巖端蒼溟赤日瞻天近碧落銀河照眼寬欲躡帝關誰汝畫九霄風露不勝寒繼張參政守歲詩韻兼寓鄙懷道號秀江官冷何心日九遷雀羅庭户任蕭然闔簮省闥何三益珥筆螭頭整八年臘味漫斟燕市酒春風誰送米家船西山日薄歸應晚自斷行藏不問天庚子正月十一日夜夢中丞崔公顧揖間巳知身故談笑眄睞殆若平生殊朗然也宿霧紅蒸海日曈分明來與一樽同煙開紫檜門外思繞金根豹尾中鐵柱髙標臺闑在逰魂凄斷夜堂空一宵鬼伯相催去天上人間獨有公介郡君王大夫人夀寶香鵉誥鬱宫羅春動麻姑送酒歌森玉階庭花映坐試燈門巷月舒波華筵燕喜乘軒貴白髮光隂得壽多五福人間誰似得金盤傾露醉紅螺送曠秀才奎東還廬陵序奎家世吉州安成人幼讀父書弱冠遊學四方歲丁酉由長沙泛荆湘泝巴蜀寓錦城邂逅髙相一見傾蓋留連二嵗戊戍春學士菊巖降香至蜀會於錦宫辱相知夜雨連牀春風嘨詠臨别且贈以言而有天都之約會有司以茂異舉逹之風憲適髙相移鎮江浙附驥東來分携于驪山之下臘月抵京師諸公協薦于春官但奎以親老家貧倚門有望而動髙堂式微之嘆遂丐之當途欲安分義俾行省于學官委任焉因賡嚴韻為餞且寄聲左相髙公云廬陵俊造以奎名投刺來登北海瀛白璧定交髙祖義錦宫持論蜀江清幾年書劔悲遊宦一曲滄浪聽濯纓聞説歐詹歸有得停雲回首夢柴荆大德四年五月中旬余從太史郭若思求畫周文公肖像者數日竟以事奪因作此詩以見鄙意幸賜采覽十年寤寐周公像幾嚮軒墀拜髧絃宗祖配天終北面洗兵而雨見東征道存履舄歌狼跋天動威靈表聖誠久矣吾衰嗟不復仰儀臺下候神礽賀威衛王公夀威尉厖眉七秩春不車不杖曵朝紳氣嚴樞管王猷壯光動蛟龍羽扇新衛武賦詩伸警抑廉頗一飯見精神因公重惜麒麟筆待與金城老寫真無盡藏山海沉雄斗極邉洹江東匪玉為淵停雲晴佇思親望繡帟香翻上冢船山色水光無盡極竹風松月共清妍千年山立梁中憲長與坡仙共一天夀梁太夫人雲開真館桂筆新婺彩穿簾瑞靄氤羽翼兩朝梁左相起居八座太夫人香翻錦字鸞回誥花滿金盤脯劈麟聞説麻姑來獻壽一杯春露從平津贈相士李達蒼狗雲衣耐事何都城風物閲人多神光爛爛開嵓電法語琅琅振玉珂每詫竒顱觀慶曆間評均幹過銅駝春融不逐秋陽老一笑西風付踏歌題無名亭詩并序韓右司雲卿築亭於所居後圃不侈不陋面勢軒檻爽朗靖深窈而有容公餘盤礴披玩法書名畫其間心適體胖沖然有得所收家數內陳無名最為之冠其文甚蔚如春雲出谷態度不一信可怡恱而友也用扁為亭名且見夫主人平昔篤志立行務造實理不事表襮之意喜為賦詩以歌詠之其詞曰朝回守口淡於鉼觸事初無寵辱驚道自上經元有説顔瞻新扁本無營書傳遺帖三倉古坡􅌟髙堂以雪成快意只須揮獻議出門一笑大江橫題萬知府瑞麥圗二岐至五歧者汝南今歲麥連雲一氣祥蒸德化循春露潤含千壠秀薰風披拂五岐新嘉禾共頴冝同頌神草聮莖恐謾珍旌異頴川元有例會聽增秩佐經綸送李景山宣慰夜郎仍用别詩韻雪山瀘水兩迢嶤天暢恩威壯本朝萬卷堂中人寂寂雙旌門外馬瀟瀟雄文喻蜀知無敵虎帳垂弨不待招許國壯心如此健夜郎風教儘敷條感舊書懷宫漏穿花隔掖垣彤庭雲靜鎖秋煙中堂載筆三千牘玉署觀光四十年麟獲削成周柱史座寒誰憶廣文氊應憐春草東郊思老馬何心覬二天簾筆貯雲含霧來江浙紗罩金盤舞鳯纎裁剪細筒裝紫頴卷舒􅊮管束紅簾鼠鬚挫鋭藏燕弗內史傳經寄道龕自是陸卿多巧思猩毛貂尾兩無慙作者南工陸秀卿一作誰是玉堂龜鶴手夜深仙火竒雲參送不蘭奚行臺中丞漢家二十六將軍忠孝如君萃一門痛惜鯨波吹屬甲盡將臺憲付諸孫維持根抵餘忠厚包總時情貴直溫攬轡澄清吾志在風沙先霽石城昏寄何參政郎山山下讀書堂萬卷藝香綴夜光贊善昔推東道主賢參髙臥北窗涼林烏返哺犍為守易水悲風劒客鄉擊築會傾髙麥酒滿壇秋草酹昭王贈雕鏉石抹世亨石郎來自汝之墳性解雕鏉到奪真一握錕刀修月巧滿龕龍像雨花紛趍庭過我求名諱刻木先君表世臣家廟薦蘋吾祭在露堂冠佩待三薰贈道者李雲叟道人姓李氏諱道謙出東齊世家年十六歘有悟棄家入道禮丹陽馬公髙弟劉為師既冠長遊諸方洞天參求玄契又嘗圜居於陜多積靜功時人以有道許之今主東雍之神霄宫曰雲叟者蓋其别號云昔王逸少與謝安石嘗東逰海嶠飄然有雲霞髙舉之志今亦以是稱豈其遺意耶秋澗翁敘生龜脫筒豈易事假手柱史驅群魔平生繕性契真訣萬慮刳中付踏歌遼鶴歸飛三島近道心安處一瓢多超然獨立雲霞表浩浩流光看擲梭題葛氏臨漳五福堂係經歷潤玉弟字壽之淡淡河流紫陌長青林東下望臨漳蒼煙拱木三臺里書葉翻香五福堂通德絳帷多故老謝家庭樹見諸郎兩公出處存深意嘗記吾親話故鄉龜詩閻學士數尾巳知三百歲息胎更活幾千年誤投且網寧無夢曽獻箕疇信有靈好共鶴嬉當碧徑莫追鼇負向滄溟松間竹下婆娑地長伴霜髯老夀星送僧印東還鍾離詩并序豫寓居安貞里東行百舉武有精舍曰攴殊僕方謝事需命間一往焉與僧法印號無文晤言以適吾懷因知師系出濠之郭氏其先東平人祖班嘗為弋陽部將死王事給葬於光父珍亦為州之機冝官師幼讀儒書長習隂陽風角等術既而悟塵出虛幼遁入招信嘉山尋師學浮圖法清修苦行致價重一時為兩淮朱制閫所尊敬特起華嚴禪院為棲息之所仍誦其品目追報母恩江淮平飛錫五臺禮文殊光相遂抵京師參叩叢林富觀大乘氣象其安心枯寂脫屣榮利飄飄然如孤雲野鶴任其去來若不為形迹所纍者泝其東歸賦詩以贈其辭曰鍾離老衲印無攴燕薊長逰寄此身一片野雲橫碧落半窗寒曰弄遊塵經龕入定依殘供帝里相逢有故人我亦天涯倦逰客幾回歸卜問通津保定曽揔管清隱亭詩卷平生不識將軍面開卷題詩得姓名清隱巳安三徑樂賔筵時雜五侯鯖春郊羽獵來緹騎煙渚沙鷗有憶􅉀聞説懿公多賜物過門求閲儘名卿餘慶堂銅臺趙御史鴈塔題名奕葉香教開娩婉亦知方須知培植根基厚遂見滋榮世葉昌沙麓昔聞王氏積桂華今接竇家芳豸冠髙映斑衣爛歲歲春風拜北堂慶耶律祕監九秩之壽大德辛五九月初郫離山色照中華孝繼忠傳自一家閲世光隂緣服食過庭詩禮儘柔嘉啓期榮樂神多與衛武針規慶未涯見説壽筵香霧暖誥恩行墮五雲花贈雪堂雲間徙倚妙髙臺蠡吹喧喧海會來佛界雨花香有信石塘流水靜無埃過溪破界東林約乞米藏書李勉哀想得大千香積供維摩方丈白皚皚題順德天寧方丈水晶心孔碧雲思方外髙間有阿師滿院緑隂人别後一欄紅藥客來時簾扉照映爐煙直僧榻留連茗碗遲何處虛舟虛未得冷翻吟棹衆波隨送荆書記幹臣北還詩并序幹臣參議覆事南來與余遇於襄國連日道舊契闊之懷豁如也君素能詩及得日本諸作清雄竒麗拂拂然挾海上風濤之氣令人豈勝嘆賞且聞駕海之舉千載盛事然江海之險非丘陵可比若以衣裳鱗介論之任責者當以萬全為言因贐鄙詩敢以略及邁往凌雲見妙年東征書檄更翩翩萬艘瀛海參戎畫九點齊州漫野煙卉服終期歸禹貢異聞無復訪奝然舞于不作三苗舉好為清朝論萬全董氏家庭拜慶詩順德少尹董君舜卿太夫人蘇氏系出兾州大家今年九十有四起居飲啖精健如五六十人以董氏論之親老而壽家溫而祿雖云賦豫攸厚亦孝感所致而然壬午夏季十有三日蓋拜慶辰也求歌詩以為榮謹書此以侑壽觴之末婺光分秀下含真來閲人間百歲春子孝每能忠作訓家肥還自德為鄰庭萱吐鳳明珠樹蓮葉翻香濕繡禋一曲南薰薦蒲酒慶筵長對歲華新近按部襄國提舉張子厚為僕留連者月餘既而得代𥙿如也因念其治燕南鐡官之最不旬時同僚給淨由以付張子之臨財蒞政其為人廉幹可知已將行以贈言為榮喜書此以貽三十年來舊弟昆紫髯落落照鄉鄰白圭磨徹光無玷青眼看餘分更親均幹有方留後法泳遊何患作潛鱗一杯回首河槗栁亂擺春風約去塵挽中書左丞魯齋許公經綸根極自朱程小學從容到大行安漢固當煩綺聘要湯𥘉不待伊烹辨姦素有批鱗直旌墓當書積善銘兩夜天官臺下夢分明危坐話平生庚伏日大雨屏翳驅雲障日昏雄風吹雨怒翻盆天髙地厚𥘉無際電激霆砰入併吞造化有神藏妙用枯焦回潤沛深恩客窗更喜終宵爽滌盡煩歊夜氣存廣宗董主簿二親同夀八十求詩為慶七十人間古已稀况登八秩壽眉齊慶延為厚于門積松茂同欺鵲嶺低棣蕚堂深鴒接翼碧梧枝老鳯雙棲年年長至花開候滿泛春風薦玉盠留别鎮陽諸公梧桐葉上雨瀟瀟涼透踈簾夜寂寥長往有懷深霧隱虛聲何意望弓招三年滹水人情好千里維陽去路遙多謝諸公挽留意取將衰謬枉清朝哀淸河公振轡咸池挾日飛識先秦府帝圖輝氣緣剛果踈沉慮變出倉皇落禍機尚賴聖朝明朴直豈防讒口重緋衣誰令諸武留遺育悵望燕雲借敬暉圖回東别鶴鳴軒脫却山衣相有元汲直寢謀推國老羽淵沉鯀認綸言參旗不掩千年氣楚些難招九死魂欲雪絳冤吾舌在有書無路逹天閽詩送宋克溫郎中北還神駼出水氣􅓸雲一顧曽空兾北群雞舌賜香封事祕紫宸陪仗絳纓紛茂陵弓劔空秋草麟筆公矦削魯攴從騎不愁逢醉尉暮歸猶識舊將軍一作茅屋兩簷書万卷門前冠蓋捴浮雲西池幸遇詩壬午嵗十月十二日某以承華事略求見引見者工部尚書張九思已刻拜太子于宮西射圃內北前命近侍趣入者再既見問秦始皇何如主某以所行過暴為對太子首讀明分篇間漢成帝不敢絶馳道事喜甚至輟射翻閲悉問其各篇主意張九思术忽乃略為應對讀訖以書付董八哥會靜時細聽未未賜酒霑醉而出射殿風清己午間曵𥚑挾䇿拜隆顔首詢帝子龍樓召喜輟犀弓偃月彎葵藿儘酬承日志簡編不負半生間滿樽春露霑恩處光動西池玉筍班挽元倅善長危并長逰士子間襟顔相接藹於蘭身緣吏隱多時尚事與心違仗酒寬千日醉吟愁儘在一朝卧病衆知難空懷去歲中秋會六郡歌頭聽細攤今春酌别鎮東門誰料歸來便哭君每愛醉歌增慷慷若論友義更殷勤谷駒夢杳驚炊甗塞鴈行踈斷朔雲撫卷題詩倍惆悵有知當徹九泉聞贈張詹丞子有二首一拜龍顔見赫臨繼開詹府更良針抗言博士議當取端本後朝緣自今千慮徒懷愚者料片芹難盡野人心儻蒙銀字霑恩去未礙東山擁鼻吟中護名香鶴禁深津津芝宇見雄沉兩坊春色煙花地一片丹誠羽翼心夜祲不容侵翠鑰布衣仍籍口華針五雲常近前星潤正要乘時作傅霖贈史中丞并王髙二侍郎朔吹驚翻白錦鷹搶揚還復籍飛騰嚴城鐘鼓殘更月客舍風霜半夜燈老境幾何心未已清時有味愧無能一麾儻便公私去大是生平幸不勝贈趙禹卿燕市分携又六年眼中雙鬢兩皤然槖金周急為真樂畎畒思君類昔賢章曲去天才尺五田攴食客尚三千相看一笑風神在不似長鯨吸百川壽楊奉御五郎黑顛冝插侍中貂華嶽秋髙見準標滿眼風雲承眷顧四科言語獨超遙時陪彩鳯巢阿閣又領春上桞條端尹後朝斯任重祝君眉夀等松喬贈楊吏部子𥙿載覿清揚又六年充庭儀鳯更翩翩事條不獨山公啓風鑒能知漢相賢黃散許除伸素志銓衡停允正吾權春風密鎖天官署長訝唐人緩所先劉禮部歸國詩卷朱邱同文易舊傳使華光動海西堧十年都護清如水百險歸來雪滿船壯莭氣凌殷侑序吟忠到子卿氊錦窠未是春風地會見吹噓侍日邉贈崔中丞秀拔氷天一氣晶幾年宫閣作先聲閉門著論驚崔實審勢陳書以賈生鐵柱宛從貂珥出簡霜能肅柏臺清堂堂正有文貞笏擊暴槯姦是小成月波引清商六調其一寒光相射其二冷侵牛斗其三靜聽龍吟其四逰魚躍浪其五風蹙成紋其六深夜回舟雙溪相公首韻者淡遊張緯文僧木菴趙虎巖著苗君瑞之姪良弼求詩於余勉為奉和以續五賢之右露洗金波蕩碧空清商傳調自天風看來冷浸雲間斗聽久幽吟水底龍孤棹泛溪回雪夜跳魚翻藻避蛟宫一彈曽感神人暢何翅平公為斂容謝平章聰山公見惠東陽佳醖大同枸𣏌書院春風靜掩關洞庭春浪漲滄灣雲腴釀自東陽酎仙𣏌香來大若山二物并遺沾雅貺一樽端為駐衰顔應慙潦倒登瀛客尚覬哀憐賜珮環秋澗先生大全文集卷二十三
