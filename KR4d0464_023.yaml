  text: 秋澗先生大全文集卷第二十三
  hash: sha256:7aca56646a555fba81f6c81193386f709d48de5c8e221fac7ca20b194dc0636e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_023-1a}
body:
  text: 七言律詩贈西雲上人系海雲高弟前日賔筵偶遂披覩一言當機口有不能言者如雲之在天水之在缾不復喻其快也謹裁鄙詩奉為上人一噱某和南吏用公才不易逢茶烟都颺落花風登壇懸断群機息靣壁傳心萬法通慧眼正来珠媚浦浮雲飛盡月當空虎溪公案元瀟灑㑹約松軒一笑同謝岳昭文惠新暦夣破𫾣門蝶祤翩一編星暦衍尭天人憐短景催窮臘斗轉嚴城永日躔天外春回龍集閹林梢香動紫生烟迢迢細忖宫壷漏正是昭文進徳年跋祈真人畫像何處人間有洞天青藜曽探寳珠玄柱頭留語疑遼鶴物外孤吟覔閬仙木食草衣元澹泊竹風松月自清圓壽宫舊有燒丹竈空憶靈砂績夜泉送安叅政南還汴梁并序叅政安公與僕定交於中統𥘉元契濶者廿寒暑大德戊戌春邂逅於京師樽酒談話追憶疇昔念故舊之彫零感歳月之易邁情不能巳者謹以唐律爲贈既光回斾且寓愚意之所託云黒頭蚤挿侍中貂當日雲齊一羽毛忠翊殿庭稱謹宻量吞湖海見雄豪風雲夢繞調元鼎珌奉光含切玉刀此去斯文應有記豊碑還擬泰山髙題南塘居士宋公畫像卷後南溏結夏水芝香對展蘇黄拜燕堂文獻在公推故舊琴罇娯客儘徜徉傷心此日空圖像照眼庭階失鴈行白首那堪題徃事未容枯筆涕先滂跋東門祖道圖二首東門祖帳盛官儀淠淠鵉旗動漢騑燕几道尊籩有踐碧空雲静日重暉飄瀟物表桑榆境洒落人間寵辱機東海西邉两丘土至今圖畫見宫闈二踈心迹本鴻冥解紱東還弊屣軽劒履中朝何百位風雲髙駕緲雙旌問金奚有田廬計歸夣都忘寵辱驚詔獄悖然賢傅死虗勞明主問蕭生奉和寅甫學士九日迎銮北口髙韻青山紅樹映晴霓玉削方䑓積粟西不憚坡陀屡登陟喜陪朝謁共扶携霜風偃薄千林静雲海蒼茫萬象低心自屏營瞻恋切佩声長在筍班齊翠華南下拂雲霓駐驆軍都漢縣西龍虎䑓髙驚峻絶蓬瀛人老許扶携鷺鵷班廹共扶携九天日月瞻光近万國風烟入望低佳莭迎銮得清賞牛山𥘉不羡東齊過趙匏瓜林墓靄靄停雲自所思樂天池上獨來時匏瓜散落和雲扶踈帶醉移樽酒草堂前日夢小山叢桂猿悲因憶桓伊事却撫松筝為觧頥長至日即事睡起闘來催賀節牙牙紅點鴈成行灰飛琯透千門暖繍刺功添一線長極壽百年驚過半從心七秩有三霜發身不羡錢神潤要把青箱付窟郎挽平章御史中丞克齋公豸冠髙聳絳爲韝霜色横空一鶚秋癘鬼遽來露㤗山歘裂駭黄流氣從温造行間見魂逐龍下㳺反𬒮两行知己涙黄雲衰草夢西州州者蓋闇取羊曇西州門事也哭挽毋弟略監使分携洹水儘離愁誰料儀真是徹頭留别有詩驚咄咄逝波無夢便悠悠逺逰不負江山興鞭管樂疇老子慮來非一事后溪溪上暮山頭雪後即事一雪都城二尺強桂珠生事日㝷常群鳥慘慘飛不下萬木林林凍欲僵頭戴鶡冠丼潦倒氣尺泥蔵倘爲得放歸田去亦是眀時盛事即事湘雲月二首是日先府君明忌日珎果犀錢粲洗盆瑣䆫香霧湿湘雲春風暖透青綾被𥘉慶祥開具葉攵樨竹翠含筠籜嫩猗蘭紅茁露芽芬細裁百疊清江錦留待鞶囊備􅍤紛彩檻移春照綺䆫酒舩浮臘進中堂負暄比獻茆檐日燕寢先分鈿机香缸燼翠凝鏘鳳䗶蘭膏春滿洗兒湯頋應吾父情鍾愛一笑燈前撫坐床送杜熙正省掾考滿授四川省都事扣門有客稱熈正攷滿两歸得蜀除照眼郷鄰韋曲好趍程閣道劒門㠊烟霄顧接新桃李黒業紛翻旧簿書鄭重故人髙左轄雪山清興近何如聞長春宫溪水復至臨漪門外碧波瀜又見分流入道宫閬苑煙霞増景氣寳玄松桂動春風忘機静翫沙鷗雪潤物中􅉼上善功道脉川流元一致㴞㴞東注浩無窮謝徐容齋贈梅燕釵宫額蠟粧匀夢繞羅浮雪裏村持贈一枝遮老眼淡依踈影度黄昏風流燈下佳人面瀟洒吟邊竹葉樽我老忘情被花惱曲幈深鎻惜芳温容齋清節楊州遜贈我官梅興寄深宫額黄嬌渾綴蠟綺牎香淡不盈襟春融壷浸催先發雪壓溪橋憶練尋茆舎玉堂𥘉不間似將渠表歲寒心吊鄭徴君說心江南饒州人將年四十以氣疾死大都官舍善五星有易學注鄭氏新説春風雙節入閭門吳市東廛遇異人太易有靈蟠化筆天星飛跳見凝神燈幽竁室驚媧畫槎泛銀漢掛浙津反䃿兩行尼父淚定中䑓下泣吾麟范徽卿風雪和林圖天䇿桓桓控上㳺邉庭都付晉藩籌河山表帶連中夏風雪洪𪷟戌北樓笑着竒謀收藥籠未妨民賦課甌婁丈夫志在飛而食不讓班超定逺侯題劉䖏士墓碑後劉君襟韻晉人清耆舊風流有典刑三代鼎彛資噩噩一家鴻鵠自冥冥胷中素貯女康訓雲際曽瞻處士星花落草堂人去後隣翁時過看埋銘大徳二年冬十一月同昭文大學若思登太史新䑓周覧儀象乆之而下侍行者妷子公特徙倚靈䑓万象新仰窺圎蓋偃鰲􅘡龍衝都柱驚坤軸望入星纒候北辰日梜陽烏符盎晷春浮元氣上儀輪思侔玄化稱平于太史于今恐後身贈不蘭奚侍御奕世威名大樹瀟孫支騰秀見英標肅清吏黠懐三畏摩拊民洟入六條烏府共推清廟器黑頭行插侍中貂仕優政有詩書樂洗耳齊竽聽舜韶廣平毛巨源夀萱堂百順無尊五福榮華堂髙揭緑萱名鳯花雅負忘憂酒香翻獻壽觥蘭玉照庭連秀色珮環合節有東風細颺簾旌繍㑹見鸞書下玉京張子惠母夫人手卷夫人内治曰嚴貞省定歸時有訓懲孝感庭闈深色養德融民社見春凝凱風吹棘心何切宿草含輝樂不勝七子有材俱茂異慶門從此福川増王太君授誥正月十四日拜慶家庭隆福宫深淑景長今年壽席倍恩光鸞廽紫誥擎來重花覆潘輿暖更香象服委佗儀範逺兩宫朝賀佩環鏘細傾洗玉池邊酒常領春風拜北堂送趙提舉仲遠之順昌縣尹望入江城鴈影翩春風吹上洞庭舩幾年戰藝東湖上一日觀光北斗邊勝賞莫誇王勃序吟鞍歸裊繞朝鞭詩雖六義功非易未厭蟲魚學鄭箋送李司馬任順徳緫尹司馬桓桓漢徹侯十年藩府佐邊籌氣凌朔漠三秋雪人在元龍百尺樓巳濟時艱完大節又宣風化入南州知君致澤平生事行聽民謡擁八騶順徳道中魏勃何人擁使軺鵲山東下半林臯清霜原野鵰盤健明月關河鴈影高遊䆠有心空載質宰平無䇿漫操刀黄金䑓上燕昭相甘為摳衣授六韜贈中山賈仲器刻書工賈仲器中山永平人諱徳玉爲人誠信多巧思平生好讀許慎說文識解字意故刋書際多所助益衆工讓能推為方今第一手近趙人术甲氏亦稱善碑刻者膠書𥿄於石立鐫全攵略不失真未審與仲器所刻氣韻爲如何也賈今年近七旬技精不少衰白髮蒼顔兩目鵠視佀耻與凢禽為羣耳來求詩書此爲贈翠琰梁停有異觀賈生琨削近烏欄須知成巳填書藝信是春坊刻玉官千字誄精山鬼泣一鐙思苦夜䑓寒惜君不致山隂禊八法從渠入木看巳亥歳京師除夜住京誰計畫权錢戀闕心丹力不前干禄自慚三釡栗借車津遣五窮舡故郷此夜偏多感衰鬢明朝又一年乞得殘骸便歸去草堂猿鶴巳淒然庚子元日賀苟嘉甫授徽政院長史忠孝堂堂漢宇孫更忙相見毎留髠掃愁不爲青藤酒展賀來𫾣白版門中議素髙徽政府清吟時接謝公墩老夫幸有西池遇東閤垂思合細論詩里平章公漢家六合恢攵治雨露恩深到海涵機務捄時傳世業衣冠故里仰華簮闔門飢凍心雖切七秩歸休分亦堪一語倘蒙天眄去故山春滿讀書龕謹按遺山筆録載梁氏家世甚詳中有云斗南先眀昌二年進士爲人讀書精熟喜作日幹局吏能剖繁治劇不肯下一世人人長於機務可謂有廼祖之風矣故有傳世業之句雲卿郎中方以嗣續致慮側聞弄璋喜作詩爲賀平生隂德爛于門况復昌黎一氣氲詩夢占祥元有兆大賢之後豈無人蘭芽秀茁根初異海菓生遲實自珍我老喜爲湯餅客一樽光動竹亭春夢昇天詩庚子春正月壬午日夜夢天風吹來星漢未曙梯雲上征極天宇而止予倚雲下視倒景四垂滉漾㓕沒有不可望焉者既而覺清寒逼人神思飄揚毛髮爲森竪也遂躡空而下入道宫與張仙翁遇良乆出翠弗紫端相遺而悟聞夜漏下廿刻矣予平日異夢甚多皆莫之比因作詩以記其祥沉沉玉漏三更後鵬背扶摇九萬搏彤管夢傳江令筆紫𫀆歸抱上巖端蒼溟赤日瞻天近碧落銀河照眼寛欲躡帝關誰汝畫九霄風露不勝寒継張叅政守歳詩韻兼寓鄙懐道号秀江官冷何心日九遷雀羅庭户任蕭然闔簮省闥何三益珥筆螭頭整八年臘味漫斟燕市酒春風誰送米家舩西山日薄㱕應晚自断行蔵不問天庚子正月十一日夜夢中丞崔公頋揖間巳知身故談笑眄睞殆若平生殊朗然也宿霧紅蒸海日曈分明來與一樽同煙開紫檜門外思遶金根豹尾中鉄柱髙標䑓闑在逰魂凄断夜堂空一宵鬼伯相催去天上人間獨有公介郡君王大夫人夀宝香鵉誥欝宫羅春動麻姑送酒歌森玉堦庭花映坐試燈門巷月舒波華筵燕喜乗軒貴白髮光隂得壽多五福人間誰似得金盤傾露醉紅螺送曠秀才奎東還廬陵序奎家世吉州安成人㓜讀父書弱冠㳺斈四方歲丁酉由長沙泛荆湘泝巴蜀寓錦城邂逅髙相一見傾蓋留連二嵗戊戍春學士菊巖降香至蜀㑹於錦宫辱相知夜雨連牀春風嘨詠臨别且贈以言而有天都之約㑹有司以茂異舉逹之風憲適髙相移鎮江淛附驥東來分携扵驪山之下臘月抵京師諸公恊薦扵春官但奎以親老家貧倚門有望而動髙堂式微之嘆遂丐之當途欲安分義俾行省扵學官委任焉因賡嚴韻為餞且寄聲左相髙公云廬陵俊造以奎名投刺來登北海瀛白璧定交髙祖義錦宫持論蜀江清㡬年書劔悲㳺䆠一曲滄浪聽濯纓聞說歐詹歸有得停雲囬首夢柴荆大徳四年五月中旬余從太史郭若思求畫周文公肖像者數日竟以事奪因作此詩以見鄙意幸賜采覧十年寤寐周公像幾嚮軒墀拜髧絃宗祖配天終北面洗兵而雨見東征道存履舄歌狼跋天動威靈表聖誠久矣吾衰嗟不復仰儀䑓下候神礽賀威衛王公夀威尉厖眉七秩春不車不杖曵朝紳氣嚴樞筦王猷壯光動蛟龍羽扇新衞武賦詩伸儆抑廉頗一飯見精神因公重惜麒麟筆待與金城老冩真無盡藏山海沉雄斗極邉洹江東匪玉為渊停雲晴佇思親望繡帟香翻上冢舡山色水光無盡極竹風松月共清妍千年山立梁中憲長與坡仙共一天夀梁太夫人雲開眞舘桂筆新婺彩穿簾瑞靄氤羽翼兩朝梁左相起居八座太夫人香翻錦字鸞回誥花滿金盤脯擗麟聞說麻姑來獻壽一杯春露從平津贈相士李達蒼狗雲衣耐事何都城風物閲人多神光爛爛開嵓電法語琅琅振玉珂毎詫竒顱觀慶暦閑評均幹過銅駝春融不逐秋陽老一笑西風付踏歌題無名亭詩并序韓右司雲卿築亭於所居後圃不侈不陋面勢軒檻爽朗靖深窈而有容公餘盤礴披玩法書名畫其間心適體胖冲然有得所收家數内陳無名最爲之冠其文甚蔚如春雲出谷態度不一信可怡恱而友也用扁為亭名且見夫主人平昔篤志立行務造實理不事表襮之意喜為賦詩以歌詠之其詞曰朝回守口澹於鉼觸事初無寵辱驚道自上經元有說顔瞻新扁本無營書傳遺帖三倉古坡􅌟髙堂以雪成快意只湏揮獻議出門一笑大江横題萬知府瑞麥圗二岐至五歧者汝南今歲麥連雲一氣祥蒸徳化循春露潤含千壠秀薫風披拂五岐新嘉禾共頴冝同頌神草聮莖恐謾珍旌異頴川元有例㑹聽增秩佐經綸送李景山宣慰夜郎仍用别詩韻雪山瀘水兩迢嶤天暢㤙威壯本朝萬卷堂中人寂寂雙旌門外馬瀟瀟雄文喻蜀知無敵虎帳垂弨不待招許國壯心如此健夜郎風教儘敷條感舊書懐宫漏穿花隔掖垣彤庭雲静鎻秋煙中堂載筆三千牘玉署觀光四十年麟獲削成周柱史座寒誰憶廣文氊應憐春草東郊思老馬何心覬二天簾筆貯雲含霧來江淛紗罩金盤舞鳯纎裁剪細筒裝紫頴卷舒􅊮管束紅簾䑕䰅挫銳藏燕弗内史傳經寄道龕自是陸卿多巧思猩毛貂尾兩無慙作者南工陸秀卿一作誰是玉堂龜鶴手夜深仙火竒雲參送不蘭奚行䑓中丞漢家二十六將軍忠孝如君萃一門痛惜鯨波吹屬甲盡將䑓憲付諸孫維持根抵餘忠厚包緫時情貴直温攬轡澄清吾志在風沙先霽石城昏寄何參政郎山山下讀書堂萬卷芸香綴夜光賛善昔推東道主賢叅髙臥北牎凉林烏返哺犍為守易水悲風劒客郷撃筑㑹傾髙麥酒滿壇秋草酹昭王贈雕鏉石抹世亨石郎來自汝之墳性觧雕鏉到奪真一握錕刀修月巧滿龕龍像雨花紛趍庭過我求名諱刻木先君表世臣家廟薦蘋吾祭在露堂冠佩待三薰贈道者李雲叟道人姓李氏諱道謙出東齊世家年十六歘有悟棄家入道禮丹陽馬公髙弟劉爲師既冠長㳺諸方洞天叅求玄契又甞圜居於陜多積静功時人以有道許之今主東雍之神霄宫曰雲叟者蓋其别號云昔王逸少與謝安石甞東逰海嶠飄然有雲霞髙舉之志今亦以是稱豈其遺意耶秋澗翁叙生龜脫筒豈易事假手柱史驅群魔平生繕性契真訣萬慮刳中付踏歌遼鶴㱕飛三島近道心安處一瓢多超然獨立雲霞表浩浩流光看擲梭題葛氏臨漳五福堂係經歴潤玉弟字壽之澹澹河流紫陌長青林東下望臨漳蒼煙拱木三䑓里書葉翻香五福堂通徳絳帷多故老謝家庭樹見諸郎兩公出處存深意甞記吾親話故郷龜詩閆學士數尾巳知三百歲息胎更活㡬千年誤投且網寕無夢曽獻箕疇信有靈好共鶴嬉當碧逕莫追鼇負向滄溟松間竹下婆娑地長伴霜髯老夀星送僧印東還鍾離詩并序予寓居安貞里東行百舉武有精舎曰攵殊僕方謝事需命間一徃焉與僧法印號無文晤言以適吾懐因知師系出濠之郭氏其先東平人祖班甞為弋陽部將死王事給葬於光父珎亦為州之機冝官師㓜讀儒書長習隂陽風角等術旣而悟塵出虚㓜遁入招信嘉山㝷師學浮圖法清脩苦行致價重一時爲兩淮朱制閫所尊敬特起華嚴禪院為棲息之所仍誦其品目追報母恩江淮平飛錫五臺禮文殊光相遂抵京師叅叩叢林富觀大乗氣象其安心枯寂脱屣榮利飄飄然如孤雲野鶴任其去來若不為形迹所累者泝其東歸賦詩以贈其辞曰鍾離老衲印無攵燕薊長逰寄此身一片野雲横碧落半牎寒曰弄㳺塵經龕入定依殘供帝里相逢有故人我亦天涯倦逰客幾囬歸卜問通津保定曽揔管清隠亭詩卷平生不識將軍面開卷題詩得姓名清隱巳安三徑樂賔筵時雜五侯鯖春郊羽獵來緹騎煙渚沙鷗有憶􅉀聞說懿公多賜物過門求閲儘名卿餘慶堂銅䑓趙御史鴈塔題名奕葉香教開娩婉亦知方湏知培植根基厚遂見滋榮世葉昌沙麓昔聞王氏積桂華今接竇家芳豸冠髙暎斑衣爛歲歲春風拜北堂慶耶律秘監九秩之壽大徳辛五九月初郫離山色照中華孝継忠傳自一家閲世光隂縁服食過庭詩禮儘柔嘉啓期榮樂神多與衛武箴規慶未涯見說壽筵香霧暖誥恩行墮五雲花贈雪堂雲間徙倚妙髙䑓蠡吹喧喧海會來佛界雨花香有信石塘流水静無埃過溪破界東林約乞米蔵書李勉哀想得大千香積供維摩方丈白皚皚題順徳天寕方丈水晶心孔碧雲思方外髙閑有阿師滿院緑隂人别後一欄紅藥客來時簾扉照映鑪煙直僧榻留連茗椀遲何䖏虚舟虚未得冷翻吟棹衆波隨送荆書記幹臣北還詩并序幹臣叅議覆事南來與余遇於襄國連日道舊契闊之懐豁如也君素能詩及得日本諸作清雄竒麗拂拂然挾海上風濤之氣令人豈勝嘆賞且聞駕海之舉千載盛事然江海之險非丘陵可比若以衣裳鱗介論之任責者當以萬全為言因贐鄙詩敢以略及邁徃凌雲見妙年東征書檄更翩翩萬艘瀛海叅戎畫九點齊州澷野煙卉服終期歸禹貢異聞無復訪奝然舞于不作三苗舉好為清朝論萬全董氏家庭拜慶詩順德少尹董君舜卿太夫人蘇氏系岀兾州大家今年九十有四起居飲啖精健如五六十人以董氏論之親老而壽家温而禄雖云賦予攸厚亦孝感所致而然壬午夏季十有三日蓋拜慶辰也求歌詩以爲榮謹書此以侑壽觴之末婺光分秀下含真來閲人間百歲春子孝每能忠作訓家肥還自德為隣庭萱吐鳳明珠樹蓮葉翻香濕綉䄄一曲南薰薦蒲酒慶筵長對歲華新近按部㐮國提舉張子厚為僕留連者月餘既而得代𥙿如也因念其治燕南鐡官之最不旬時同僚給净由以付張子之臨財蒞政其為人廉幹可知已將行以贈言爲榮喜書此以貽三十年來舊弟昆紫髯落落照鄉隣白圭磨徹光無玷青眼看餘分更親均幹有方留後法泳㳺何患作潜鱗一杯回首河槗栁亂擺春風約去塵挽中書左丞魯齋許公經綸根極自朱程小學從容到大行安漢固當煩綺聘要湯𥘉不待伊烹辯姦素有批鱗直旌墓當書積善銘兩夜天官䑓下夢分明危坐話平生庚伏日大雨屏翳驅雲障日昏雄風吹雨怒翻盆天髙地厚𥘉無際電激霆砰入併吞造化有神藏妙用枯焦囬潤沛深恩客牎更喜終宵爽滌盡煩歊夜氣存廣宗董主簿二親同夀八十求詩為慶七十人間古已稀况登八秩壽眉齊慶延爲厚于門積松茂同欺鵲嶺低棣蕚堂深鴒接翼碧梧枝老鳯雙棲年年長至花開候滿泛春風薦玉盠留别鎮陽諸公梧桐葉上雨瀟瀟凉透踈簾夜寂寥長徃有懐深霧隠虚聲何意望弓招三年滹水人情好千里維陽去路遥多謝諸公挽留意取将衰謬枉清朝哀淸河公振轡咸池挾日飛識先秦府帝圖輝氣縁剛果踈沉慮変出倉皇落旤機尚頼聖朝明朴直豈防讒口重緋衣誰令諸武留遺育悵望燕雲借敬暉圖囬東别鶴鳴軒脱却山衣相有元汲直寢謀推國老羽淵沉鯀認綸言參旗不掩千年氣楚些難招九死魂欲雪絳冤吾舌在有書無路逹天閽詩送宋克温郎中北還神駼出水氣􅓸雲一顧曽空兾北群鷄舌賜香封事祕紫宸陪仗絳纓紛茂陵弓劔空秋草麟筆公矦削魯攵從騎不愁逢醉尉暮歸猶識舊将軍一作茅屋两檐書万卷門前冠蓋捴浮雲西池幸遇詩壬午嵗十月十二日某以承華事略求見引見者工部尚書張九思已刻拜太子扵宮西射圃内北前命近侍趣入者再既見問秦始皇何如主某以所行過暴為對太子首讀明分篇間漢成帝不敢絶馳道事喜甚至輟射繙閱悉問其各篇主意張九思术忽乃略爲應對讀訖以書付董八哥㑹静時細聽未未賜酒霑醉而岀射殿風清己午間曵𥚑挾䇿拜隆顔首詢帝子龍樓召喜輟犀弓偃月弯葵藿儘酬承日志簡編不負半生閑滿樽春露霑㤙䖏光動西池玉筍班挽元倅善長危并長逰士子間襟顔相接藹於蘭身縁吏隠多時尚事與心違仗酒寛千日醉吟愁儘在一朝卧病衆知難空懐去歲中秋㑹六郡歌頭聽細攤今春酌别鎮東門誰料歸來便哭君毎愛醉歌增忼慷若論友義更慇懃谷駒夢杳驚炊甗塞鴈行踈断朔雲撫卷題詩倍惆悵有知當徹九泉聞贈張詹丞子有二首一拜龍顔見赫臨継開詹府更良箴抗言博士議當取端本後朝縁自今千慮徒懷愚者料片芹難盡野人心儻䝉銀字霑恩去未礙東山擁鼻吟中護名香鶴禁深津津芝宇見雄沉两坊春色煙花地一片丹誠羽翼心夜祲不容侵翠鑰布衣仍籍口華箴五雲常近前星潤正要乘時作傅霖贈史中丞并王髙二侍郎朔吹驚翻白錦鷹搶揚還復籍飛騰嚴城鐘皷殘更月客舎風霜半夜燈老境㡬何心未已清時有味愧無能一麾儻便公私去大是生平幸不勝贈趙禹卿燕市分携又六年眼中双鬢两皤然槖金周急爲真楽畎畒思君類昔賢章曲去天纔尺五田攵食客尚三千相看一笑風神在不似長䲔吸百川壽楊奉御五郎黒顛冝挿侍中貂華岳秋髙見準標滿眼風雲承眷顧四科言語獨超遥時陪彩鳯巢阿閣又領春上桞條端尹後朝斯任重祝君眉夀等松喬贈楊吏部子𥙿載覿清揚又六年充庭儀鳯更翩翩事條不獨山公啓風鑒能知漢相賢黄散許除伸素志銓衡停允正吾權春風宻鎻天官署長訝唐人緩所先刘禮部帰國詩卷朱邱同文易舊傳使華光動海西堧十年都護清如水百險歸來雪满舡壯莭氣凌殷侑序吟忠到子卿氊錦窠未是春風地㑹見吹嘘侍日邉贈崔中丞秀拔氷天一氣晶㡬年宫閣作先声閉門著論驚崔寔審势陳書以賈生鉄柱宛從貂珥出簡霜能粛栢䑓清堂堂正有文貞笏擊暴槯姦是小成月波引清商六調其一寒光相射其二冷侵牛斗其三静聽龍吟其四逰魚躍浪其五風蹙成紋其六深夜囬舟雙溪相公首韻者澹㳺張緯文僧木菴趙虎巖著苗君瑞之姪良弼求詩於余勉為奉和以續五賢之右露洗金波蕩碧空清商傳調自天風㸔來冷浸雲間斗聽乆幽吟水底龍孤棹泛溪囬雪夜跳魚翻藻避蛟宫一弹曽感神人暢何翅平公為歛容謝平章聦山公見惠東陽佳醖大同枸𣏌書院春風静掩関洞庭春浪漲滄灣雲腴醸自東陽酎仙𣏌香來大若山二物并遺沾雅貺一樽端爲駐衰顔應慙潦倒登瀛客尚覬哀憐賜珮環秋澗先生大全文集卷二十三
