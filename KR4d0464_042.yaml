body:
  text: 序與左山啇公論書序嚮大觀所類諸賢法書平生所未足於焉盡償公云如楊少師維摩等帖天真爛熳上法二王下與魯公爭衡至縱心所欲皆寓正筆而不踰矩所謂出新意於法度之中寄妙理於豪放之外知此乃悟涪公云余書不可學學者輒筆愞而無徑氣似非虛語也因復出坡公所書寒食詩二帖方之在顔楊兩間蘇當為入域之賢爾嗚呼古人不可作所得見者書迹為最真今吾左山商公掇拾於二千載後剔去纎妍而留精偉復始終條理俾金聲玉振以集大成是又智者之事諒非禪中有眼者疇克辦此邪弟恨不得時時聽瑩以盡古今之變會歸其極耳然歸裝翩翩巳復稇載矣至元二十年四月六日書于所寓壽宫之道室上巳日林氏花圃會飲序四序言謙氣有慘舒不無哀樂從違之間維暮春元巳物華淡豔極夫舒樂者也故昔之人迓續維新祓不祥於川流之上其來逺矣然例以三日為節緣不克與已會者蓋尋常焉今歲人和氣稔適與巳契又可重也不揆援永和之舊例嗣舞雩之清音徴賢合友禊飲林氏花圃尋盟而至者凡一十二人於是登野彴酹清波折栁脫窮秉蘭即宴歌絲間發羽觴交獻不數行四座紛然迭為賔主酒既酣秋澗老人繼以栁圈新唱詠四者之來并喜三樂之同集揚觶侑賔傾冠倒佩不知其不可也巳而客有稱於坐者曰昔會稽諸賢禊集雖雅未免因述梗懷俯仰今昔動終期歸盡之感今吾與子一攄砥滯增暢老懷顧知巳而無雜賔聆歌聲而免詩苦以此方彼疑若可繼樂有所踰也是不可以不志明日弟忱輩來解酲首賦佳篇乃以其序屬豫余亦以會鮮離多樂之不易再也筆泚餘酣率爾而作時至元二十四年歲在丁亥甲午日也謹序編年紀事序史書浩慱殆藥山然用之不盡取之不竭弟掇之者不易區别編紀之書有不得不作者然務博者或詳其不必書從簡者至略其所當取斯蓋漫然中無所主故也大抵觀史者須當見其一代興衰之自要本不出君與相好尚治忽而已如賢否之用舍治亂之所由生刑政之寬虐民情之所從易安危之機截若影響此理之必然也是皆吾儒法之而為明時治平之具者得不詳且備歟若筆之而無所用則上下數千載之事績特斷爛朝報耳草一年余解印西歸休焉而無所事日纘相務為業編年者尤不可斯須而去手遂與韓生弘因其舊編增而廣之事備於前統明於舊若夫丗主之御天接統輔相之登庸宅揆前後繫屬一不敢闕所謂該夫運之盛衰者則思過半矣明年冬既斷手生曰增輯之意不可不序諸篇端吁吾年向耄前日所進今日不覺其忘小子其祕之于以備吾家藥籠中用可也時則二十四年丁亥歲夏仲日序王氏易學集説序先君思淵子昔掾民部時尚書張公諱正倫字公理日引一叟連榻坐與之問辨甚欵察之蓋講易經旨也每參署已輒抱牘傍侍張公曰汝亦樂聞斯乎曰唯自是日熟所聞遂潛玩焉造次顛沛樂之而不釋也北渡後遇玉華王先生復得窺其門墻而覃思焉既而有問答理亂之説玉華子欣然曰推是而進何憂乎不造夫穾奧也然專靜之功不可以不至藏往知耒實本於此吾子其志之既而家府屏逺人事取歷代諸儒所傳探微頥妙日一卦為業真積既久靜見之心遂大以肆曰吾老矣非述何以見於後示子孫以大受也乃組節群言使如出一手辝約而意貫諸家之善蓋無餘藴矣嗚呼易之為書三聖人憂丗而作也其道有四互為之用然身外無可論之道道外無可談之理天理人事不出乎日用行已之間而已是書之集四者具列要以近人情為本使學者切身以求用易知而不雜其於易道庶彬彬然有煒矣不肖今亦向耄先丗庭訓墜佚無緒大懼夫不學而衰也乃沉潛是編冠修述之意於篇首仍題曰王氏易學集説使後之來者知先君學道立丗其博文約理有如此者小子惲復續所得以綴于後蓋先君所未見也庶幾五十家之説左右逢原矣至元二十五年戊子春二月一百五日序送信生士逹北行序勾吳之分豫章之野有神物焉雄雯隂縵丗不多得佩而服之可以檢非常而走光怪礪而用之可以決浮雲而開白日當其鋒鍔翳昧沉欎於幽圄之下然衝霄之氣不自逹於斗間雖有精鑒博識之士安得佩服提携檢非常而神利用者哉君子之仕也上需志於逹而後可以見於用用則先其材之云何而後其時之利與否也逢乎辰而匪其才何克應事幾而成吾務負其才而艱厥時吾固知攸往而終有所濟矣故伊尹不以其時而有間於所行孟軻氏不為齊梁不吾與而必意於速去何則天之所卑於我者如是我烏敢自棄不力其在我者焉奚暇計其可否俟彼有待而後我為之應哉士逹少問學於豫嘗以政試於諸生間唯士逹知所以對當時已異夫姿之敏志之逺到也厥後揚歷州郡果在夫受直罔怠其事者之列及例歸河東又見夫居養有得器藏諸身與時消息者蓋素所蓄積耳斯舉也又非底滯於下求逹於上方試用於公卿之間也顧時與仕吾無所慮矣然理有所當燭者試以吾嘗從事於斯者告之夫仕宦雖或巧拙而其間有容力不容力者彼自然之來吾順受而安之是則力之所不必也吾分既爾吾行足為即其所受而充其義之所至是則力之不可不勉而前也所勉者何用晦而明以訥為辨竭誠心於所事見實用於當行察其機而發人之幾通吾滯以逹人之滯不以資之微卑為嫌不以與之依附為得盤桓居貞以俟夫君子之大受何患乎聲名之不昭事業之不顯而著也於其往也故書以為贈禮部尚書趙公文集序至元丙子夏五月豫考試河南道出臨汝館望嵩樓者再宿歷覽後圃總為塵迹所謂汝海虛舟者於蒼煙老樹間巋然獨存因得防禦趙公亭記於壁間倚杖披讀者久之令人想見承平官府之盛惜公遺文不多見也後七年豫自齊還衛日與公孫維弘杖屨倘佯言笑者無時一日出耐辱集一編示豫曰此先祖通奉君之遺藁也豫請而讀之者數日得辝賦古律詩及雜著樂府等篇若干首其氣渾以厚其格精以深不雕飾不表襮遇事遣興因意逹辝略無幽憂憔悴尖新囏險之語信乎太平君子假樂有餘而神明與祐者也維弘遂以集序見屬豫曰以遺山先生之論之詳此固以為之足矣然士君子之學文章德業名為兩塗其實一致有以事業而垂丗有以文章而名家者傳曰我欲載之空言不如見諸行事之深切著明也吾儕孰不欲得時行道使利澤施於人名聲昭於代蓋有幸不幸遇不遇者焉如仕宦利逹復擅文雅以事業盛而掩其所謂文者從其重焉可也若文彩絺紩竟不得以片善及物者其或曰若何克為一文士而已此真為妄人尚何知兩塗一致之理者哉既為其序且寓夫豫之所感云先生諱思文字庭玉明昌五年進士官至通奉大夫禮部尚書𥘉河朔雲擾公流離兵間挺身歸國遂為德陵所知故其仕宦通顯而為兩朝名德一丗之龍門者云至元戊子秋八月朔旦謹序宫禽小譜序三百篇之作風人多引物以比事或託物以發興其氣類情性學者不可不識也是謂致知格物之道十一年江左平宫籞禽玩畢逹京師戊寅夏豫待制在京師獲覩諸禽于會同館之西位者凡一十七種誠有可愛而當識者厥後珍禽竒獸陸貢川輸歲相望於道彼隸鳥官入上林集萬年之芳枝蒙天顔之一盻振羽和鳴固有喙同而如瘖者矣其為物不可為不遇也因念九州風氣各殊其所産常異有無亦然非遍遊歷覽有終老而不識其狀與其物之情者况耒自閩廣之逺乎伏見近年求訪嘉士車徴幣聘歲亦不絶其或抱負器業谷耕巖隱偶不及時賢之論者未免厄窮遺逸反不若斯鳥之採擇薦進光耀如此之幸且遇也至元草五年戊子秋八月壬戌偶逢江外鳥使因追作宫羽小譜敘其所觀而識者今列于後秦吉了狀如大鸜鵒毛羽青黑色閃閃有光翅兩稍皆白翎耳與人肖耽腦上相答及喙距皆黃色聲雄烈善作人語蘋茄兒形狀毛色一與白鸚鵡同養者云性極乖戾尖尖帽灰緑色形如燕許頂毛上鋭下豐髙約一寸故名百舌兒狀如鴿略同毛羽蒼白花色江南三月間盛作聲今四月尚未鳴蓋北方地寒故也白頭翁狀如䲳色純白喙距皆青頂毛冗細蓬蓬然上起故名柳鶯純緑色甚嬌可愛性靈如黃鶯其狀差小切倉子一名鐡觜兒毛純赤褐色狀如雀鳴聲啁啾調之能頂負𥿄殼介胄人騎像於一欄內分兩陳作衝擊狀甚馴狎也相思兒灰赤色狀小如雀白鸚鵡一其大如鳬玄鶴二比常鶴差慘極清癯金絲雞毛褐色上有蒼班細文疊積如鴙鷹尾翅末秀翠金雙團花絶類孔翠聞他鳥鳴皆能效之水老鴉形髙大如鷀體班爛修首如卯形喙尖長蜿蜒俯仰絶與蛇類瓜掌則鴨也疑烏鬼即此也花鷺鷥褐色中白毛份然間出長喙趾青緑比雞差小又名白嘌小鸕鷀純白色黑喙青足但其頸骨狀曲折為一曲料哥形毛全是鸜鵒其光彩濯濯然丹喙人耳作梔黃色耳後有黃眉兩抹上連於腦能作人語喜則兩耳開聳烏雞骨與肉皆黑其蒼者亦然送薛參軍北行序承宣供億莫司屬為切然户鮮而居衝俗囂而不知教制於上而梗於下誠有所特難者焉又恆人之情視難易為行不乘𥘉以取其名即旁緣以徼利苟安依阿護養資歷愒日以俟代而巳丹陽薛君彥暉由藩府掾從事於斯者四十餘月為人外簡朴而內廉能供王事理民訟直而有方雖當急遽二者並行而不相遺自始逮更猶一日然其邁迹尋常立於能者之行卓矣惜乎心儘公而罔間於易難用有餘而不遑於風化因念令便於亟行化安於永久苟使民知義方其趍事赴功有不待致期而然者儻教有所未至俗有所未醇能者日鮮不能者日衆而供庶事理政務固不得一日曠弟恐物情治冝兩有不自盡者此昔人以化為先而令次之師帥者又化令之本也安得惟良如薛君者百有餘輩俾用焉而顓靖嘉治焉而有餘𥙿我不以徒法為政彼不復顧難易為心事雖衝而亦辨俗雖囂而可諄方之亟便特緩夫前後之間然能使物情紓而政本固官有儀而民不輕民不輕則吾之令行將見如流水之源矣不然使韓范復出職思其屬處簿書米鹽間雖終日無倦亦且有所顧矣薛君行來辝飲之酒再拜以送言為􅈤因書此以贈庶幾條治冝者聞之亦將有所頷焉草五年戊子冬十月晦序贈日者張翺序隂陽家者流秦漢已來如五行堪輿建除叢辰曆學天人太一等家其目雖多及臨事占決各開户牗吉凶得失互皆不同故漢人顓以五行主之豫因究其理而為之説曰夫太極判而五行具五行具而萬物生一物而一五行也才有所闕物不得為之物矣靜而體動而用剛柔迭制而吉凶生焉矧二氣良能以不測為神人於其間亦一物也吾何以逭其為術也天人之際有未易知者得之深者其理明索之淺者其説近又世道下衰人不安分以狂妄橫干中徼幸騖于外貪者以苟得為心狷者以速逹為念詢其命曰吾此去可亨相其時曰吾今年可動彼知其然即順情悅主售其術而已我審彼諛竟沾沾自喜圗一豁隕穫為愜是天理兩滅而人欲肆矣嗚呼風俗之移人也如是可勝嘆哉有張生翶者姿甚髙業是而志篤語直而不隱觸數知變若夫誇嚴苟售其術而已者挾是遊行州郡億焉而多中故七子往往與之顧接在翺固亦榮矣雖然吾將進翺於學爐其粗而造於精資之深而遺其淺不為世俗所移不以虛髙務悅習其所已知其所未至其要安在道其在於是矣能此將見聲光四白義置百錢坐來衆問不愈於行而求其售乎翺曰唯有是哉然行襆巳具敢板康節之例願先學於四方可乎於是書以為贈星丸漏詩序司録判官趙宇到任之明年置星丸木漏於衛之汲門上仍繪采為圖携之耒謁再拜請題辝于後豫以為政有緩而似亟事有微而實著者更漏是也雖因象制器特挈壷氏一士之職也然天地朝昏我則司之官民勤息我則警之上而日月運行於三百六十度之中外而二氣渾淪磅礴於三十七萬里之表使不出於五尺之幈百有餘丸之數非格物善政者其能之乎豫嚮官平陽亦嘗創此其考述測驗知為匪易今司録小秩也首此為務舉行廢典其儀物有足觀者是欲勤政率先因器警民者矣然年少氣鋭當筮仕之𥘉能推廣是心始終罔間則張希顔以夜漏分明等數事得稱為好官貟者恐他日不難至矣至元二十五年戊子夏六月入伏三日題淇奧唱和詩序心有所思思而有所言託物以永其言者莫詩若也曲山河君尹南樂終更將歸西山舊隱以吾故遂稅駕鐏酒談笑杖屨遊從日夕不少間既老日閉心無所運用感物興懷情有弗能巳者即作為歌詩以示同志顧不揆乃相與賡唱迭和絫積日久遂成卷束總得詩大小凡若干首曲山慮其散亂遺逸欲命劉生琛第而為帙且告豫以為何如豫曰彼王公大人羈旅草野之士遇其志得意滿與夫幽憤無聊見於詞章者多矣然未免有豪宕夸毗之意幽憂憔悴之狀吾輩不過道間適安命分遣興寄詠性情而巳又非欲示諸它人俾後之來者萬一視所履而踐厥迹安知不有撞破煙樓者乎巳而客有謂吾等不以有用為心而廢日力于此為可惜也豫應之曰不然是將俾豫守兔園之册耶削汗簡之青耶抑欲續太玄之經耶客笑而不答於是乎書以為淇奧唱和詩序老子衍義序壬辰冬豫應聘至都既館壽宫嗣教玄逸張公與一杖者相陪來謁須眉皓白氣貌魁偉敦兮其若朴聽其言沖沖然殆有所深藴隨見所賦詩顧非淡泊忘言者尋西還求辭方知君為重陽宫主玄學師也既而其徒執老子書請見稽首再拜為致師求序取重之懇避席拱立需命而退因勉為説云天下所謂聖人者以其理之所在治從而出焉舍是何所望於著書立言者哉然聖道溥博該貫群倫其為用也為天地立極為丗主明道要不過以靜制躁以簡御繁以真黜偽以朴還淳以正息妄以公去私以理勝欲以法防亂而已惜也老𥅆氏潛輝柱下不出於文武周召之時當王道中微禮壞樂崩仁殘義缺之後萬偽並作猝莫能觀其復思逺駕流沙髙出物表抉天機體玄化吐辝為經過為音譎憤激自成一家之言庶幾廓清澆偽再造堪輿之意歟雖然矯枉者必過其正逮夫末流仁智異見户牖各開曲暢旁通肆為駕説養生者以久親為心尚玄者以清談為樂冝乎晉史譏王政之虧知幾點河公之注今王丈蜀産皓首玄學獨能拔出衆流間索正歧根於治平者為多無乃見幾而作由儒而逃墨者邪固特樂而序云玉淵潭宴集詩序都城西郊佛官真館勝槩盤欎其間有潭玉淵蓋丁氏故池也栁堤環抱景氣滿爽嵐煙瑞靄霑漬襟𬒮方秋是焉撗陳都人遊觀誠為佳麗財賦總管王侯明之尚義好客髙出時彥甲午秋孟置酒潭上邀翰林諸公為一日之娛既而雨不克成歡是月晦復折簡來召用尋前盟也簮舄既集風日清美紅幢翠蓋間見層出天光雲錦淡灔尊席沙鷗容與於波間幽禽和鳴於林際若有以知野老之忘機代清唱而侑觴也酒肴饜飫賔主胥樂煩襟滯慮頓然一醒清適夷曠綽有餘思然賞心樂事良難四并雅會清吟烏可多得信口吐詞不計工拙諸公走筆𢋫和咸有所得殆山隂禊事之修幽情暢敘笑金谷羽觴之罰酒數何多第以率爾居前殊愧其粃粳也八月載生明序易解序易文為書廣大精微範圍乾度經紀丗道以一理而含萬變辝雖有盡理則無窮故説之者吹萬不同仁智各異要以修辝通變近人情關丗教為切練師李公嘗為豫言監丞張君在河南為衣冠清流多藏書得前代以易名家者數十種早治其學精占筮術北歸以藝能得官如支離覆逆建除叢辰等伎有不屑為者於是廣詢博究師心自斷集易解十卷于以抉聖心而明素志駙馬髙唐郡王天資英明雅好經術一覽偉其述作勤至發題篇端有正大純雅本乎仁義與經旨不殊其於丗教大有輔益命藩府板行賜觀中外者無慮數百餘帙用廣發越以表其志尚義山來屬俾序其事豫謂古之君子立言垂丗必藉王公大人為之主張方能信其説而傳不朽如曲臺禮經由獻王而明遺制毛公詩傳得河間而置學官今張君遭遇賢王得成其美將見與大雅不群之英異丗而同談者矣至於淵源之傳授辝理之深奧讀者自當知之又何俟見賣兔而設喻遇俑人氏而致問者邪元貞二年冬十一月謹題天德柴氏悅親圗詩卷序昔四子問孝於孔宣父雖因材而篤所答各異不過使親無所憂怡順顔情為難鄒孟氏復探源推本論臻其極曰此身能誠則親為之悅矣意者謂儻違於理雖奉承之至溫清之勤日養二牲猶為不孝如其愛敬交至氣和色愈則菽水乃盡其歡矣在孔孟時去古未逺垂教警俗亦復如是况天理斫喪人欲橫流於千載之後哉天德柴氏上丗為邢臺堯山人後遷絳之曲沃逺祖有軍功以鐡劵賜其家祖諱堅金季仕至將仕郎𥙿州葉縣尹生子懋字秀實以丗故復徙居于豐治家接物廉慎有法推其贏餘尚義好施鄉里以善士稱今夀登八秩有二配邢氏壽七十有四生四子長曰伯璵次仲謙仲玉仲祥伯璵天性孝友善治生與人交誠慤有終始慈祥愷悌見於顔間清淡不樂仕進惟致養二親友愛諸弟為務至一門之內上下安冝和樂且耽憲司廉實聞于朝榮加旌異嗚呼丗之貪很無賴不顧父母之養且貽親憂與夫所爭僅毫髮比更相媢嫉視同氣為寇讎者聞柴氏之風亦知其愧赧矣雪堂禪師雖處方外素樂君臣父子之懿喜從吾徒遊以鄉里盛事乃繪諸圗畫形容其歲時家庭拜慶之歡將求館閣名卿見之歌詠以序引為請豫為説以勉之曰方今孝治光隆仁風德教洋溢海宇臣民感格理勢應爾然雲朔之俗素號雄徑以氣義相許今論其孝友之行固當以柴氏為稱首復能如孟氏所論誠之於身詩人所詠不匱永錫者而致力焉將見化儕類而美暢彜倫觀人風者簉名於史籍矣以是為贊倡之始云清香詩會序道不同謀咫尺兩間渺隔千里心有所會上下八方溥同一雲法性三藏弘教佛智大師江浙總統沙羅巴者聞豫名而喜之不知於渠何所取也一日介應奉曹顯祖來約以深香間適與同一會於是開禪室敞賔席蒲團烏機列坐其次佳釀數行意甚怡悅主人出寶薰娛客溫爐回春楮煤凝雪窗日含暉岫雲借潤先之以青桂繼之以緑洋糅以熟結加之都梁棧融沉爇氣欎膏煎黃雲作穟碧霧𪷟筵吟珮未染鼻觀先參或袖籠而斂瑞或心融而氣宣於是健詩脾却蒸濕燕飲助其淸勝志慮以之沖粹不知佛齊勃泥婆律大食真臘占城而相去幾何通為一洞天也衆客稽首向師曰今夕何夕餘膏賸馥沾丐如是有不可思議者第恐造物者訝其多取而饜飫也師曰庸何傷且吾之為香者衆而心香為最曰戒香定香慧香解脫香解脫知見香是為五分香天之所賦於我者如是而馨解脫知見為妙用之極即詩所謂天生蒸民有物有則民之秉彛好是懿德也貴夫能復其𥘉而為物之靈也願此香雲遍滿空界作為無量佛事以奉五老香供且合三百五十歲之夀祺傳𥘉庵七十五雷苦齋七十三閻靜軒六十三王秋澗七十一貢評事七十而為無盡藏説法不以可乎於是衆賔讃嘆曰昔逺師以廬阜清勝即於東林結社絶塵清寂之士不期而至者甚衆諸人依逺遊止獨淵明范寧召而不赴豈非有不屑者哉以今論之衆之殽雜一也心有所局二也香色執著似纍干中三也何若師心境雙清賔主兩忘不知我之為香香之為我也而以心香為主也師曰有是哉遂相與一盧胡而别大德元年三月吉日謹序送丁主簿南還序古人以良能並稱欲以善而將其能也不然豈惟敗事亦且有害于而身此必然理也丁生元諒主榖城簿之明年以事抵衛來謁有頃避席而言曰弊縣僻在漢南事雖簡山氓獵户氣甚鄙悍思有以教迪之於是請書其廟學殿堂門廡等額乃曰歸當辦兹一事先此之作用碇余𥘉志耳遂授書沾沾而去後七年冬十月復見吾于京師曰嚮云而廟而學者今巳落成且有加於前及出馮雪崖所撰學記讀未竟不覺慨嘆曰一簿力之專乃致如是非有志能然乎兼雪崖吾熟其為人慎許可記中件右恐匪徒言雖然年少氣鋭乘勢作事似或不難至於知喜其事而不虞其終顧其近而不思其逺無後悔者鮮矣况能保巳成之功而享有無窮之辝乎又嘗聞士之當官公心多而取名薄者設有過舉往往人恕而紛解汝今此耒遇非常之恩千百人不一二值其為幸不幸誠不敢必所當念者此心不使有一毫之私可也丁生其勉哉如以吾言可取念之戒之將見悔尤日寡良能並著何患乎祿秩之不吾至也既行來辝書以為贈是歲癸巳仲冬五日序兊齋曹先生文集序北渡后斯文命脈主盟而不絶者賴遺老數公而已夤緣蒙元李諸公與進親承指授惟貽溪兌齋未之見也及調官平陽私竊喜幸雖不獲瞻拜履綦而遺文得遂觀覽逮識公仲子輗首為詢及謝以纂録未就然徴文獻論家丗而私淑諸人者固巳昭昭矣先生父清軒公資豪邁以文學起家受知榮國髙公雷李諸賢交遊甚欵先生接迹詞林幼知力學早擢巍科既而與遺山同掾東曹機務倥偬間商訂文字未嘗少輒至以正脈與之其奬藉如此後居汾晉閉戶讀書屏去外物嚅嚌道真及與諸生講學一以伊洛為宗衆翕然從之文風為一變後二十年豫在翰林前長葛薄子輶持遺編來謁屬豫序其端方得伏讀者再四不去手者纍日因為之説曰文章天下公器造物者不私所卑然非淵源有自講習有素力為之任者未易與議若先生之作其析理知言擇之精語之詳渾涵經旨深尚躰之工刋落陳言極自得之趣而又抑掦有法豐約得所可謂常而知變醇而不雜者也所可惜者古文雜詩僅三百首蓋先生年方不惑瞑廢於家又為人慎許可片言隻字不輕付人嚮使展盡底藴大開文竇極其所到肆波瀾而侈光豔則與元李麻劉並驅為不難矣異時版本一出學者爭光快覩俾中和之氣中融粹盎𥙿四躰而適獨坐如大羮玄酒寄至味於淡泊者庶幾知先生之所尚云不肖衰老懶於筆研敢直言所聞見而知者以塞其請焉大德二年人日謹序秋澗先生大全文集卷第四十二
