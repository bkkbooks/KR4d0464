body:
  text: 蘇門林氏家傳林氏其先兖州曲阜人唐季有官閩中者後復徙家文登至逺祖府君翰蓋五世矣翰宋𥘉用貴贈率府率子諱文受知熙陵官至崇儀副使淮南路提無刑獄贈領軍衛將軍生子永終屯田貟外郎御史臺推直官纍階贈光祿卿永生之純字嘉父曜景祐五年進士第釋褐主朝城簿河東犯橫壠頻於不支歸兵恟恟欲亡去公安諭遂怗然事集升知莘縣以屏盜有方受澶州頓丘令未幾恩信大行時麥黃木盛下囓孫陳掃岸勢危甚公朝服立潰堤上望濤頭拜禱波神為霽威竟賴以安改佐著作淮陽軍事判官二徐惠劾紀著叛獄有匿其家孥者注誤殊衆公為辨理多致原釋郊禮覃慶加太常博士知大名縣𥘉天王院五代時有韓王賜田甚廣歲久失據鄰伍以僧妄冒致訟纍寒暑不能決公按索鄰劵考明封畔繼得古石記與所按吻合以田付僧令歲輸常賦民乃稱服用丞相程公薦通判青州終得年四十有九官至職方貟外郎上騎都尉仍賜五品命服娶吕氏封京兆縣君惠和冝家之純生三子長曰舍字虛白年十九擢熙寧進士第性恬退以髙節自信嘗有詩云世有非常樂人無未老間未三十以大理評事休官名賢髙其行至方之淵明𥘉先生西遊共城愛其山水明秀乃營葬青州府君於縣西處賢鄉古郭里母夫人吕氏祔焉自是林氏為衛之蘇門人先生四子曰愚曰恕曰怤曰愚字貢元亦以莭行稱宋亡至焚香告誓不仕而殁仲弟介鄉貢進士季弟會字貫道幼知嗜書剛正有志操由蔭輔郊社齋郎𥘉主成都雙流縣簿令久闕攝公行縣事有能聲部內舊有􅢰歲例役並水民苴治貧下苦之公乃一責資溉家理辦仍揵石代土衆免告勞頻歲大稔調宿州司理參軍暮夜民遺火延燒犴屋公出繫散置庭中比熄倉卒際無越逸者上官材之移南京軍巡判官民有戕其子執謀害人者按竟公至疑焉求情得白遂直其枉改新蔡令歲大蝗獨不入縣境人謂公廉平所致由韋城宰歷奉符縣秩滿授通直郎知蘇州常熟縣兩浙頻年大水引溉浦口湮閼無慮三十餘所纍政謾不加省公按行故瀆率疏瀹之民受賜不資元祐庚辰疾終蘇之公館配張氏有淑德駕部貟外郎赤之女封壽安縣君生子男四人聽通直郎西京敦宗院博士聰揔隱皆業進土自羇丱至成人太孺隂教為居多聽生子五人曰巽兊蒙鼎革巽次子諱正國字德將登金大定十六年進士第終少中大夫北京鹽使生懷逺大將軍毗陽丞諱茂字漢卿懷逺二子曰思敬鄉貢進士曰思德頴州軍仗庫使生子芳今任江南某府從事思敬府君之子即故衛州交鈔規措大使諱通字子泉為人丰儀修整顔渥丹鼻隆然如膽垂寡言笑善心計顧衛南北衝會貨財四通遂積殖興時逐然坐籌能擇人而任故物情得而掇世資生平喜賔客樂施豫其克勤躬儉殆憂深思遠者屢以其術事上官獲精幹稱嘗訓子圭曰林氏上世以詩禮傳家代有聞人豫惟早失怙恃生長喪亂間以糊口計處四民末業致貽祖禰羞諸孫稍長無忘讀書以復世範汝念兹無置府君以丙辰嵗終魚行里之私居壽六十三配宣氏衛之大家主治內務寬健有母儀燕處榮飬期頥而終享年八十有三人以全福歸之子圭以孝義著稱能丗其父業嘗任州三務大使次子璋謹願克家圭子永大名府平凖庫使次子元圭奉遵先訓俾之從學其資藉啓迪乃心罔不盡不數年起家為中書掾至元丁丑豫列職太史元來謁拜而請曰元無所肖似析薪之責固不克負荷惟是先世行業非得名筆約而暢之將不能傳逺而人見於後先生尚胥暨顧豫以林世敘雖邈其聞而知之見而知之者班班可紀加以世姻之好故勉為傳𫐠之贊曰林氏本出商姓太丁子比干以忠諌死嗣堅逃難長林山易以定氏周衰枝葉扶踈散處中國如放之聞於魯顔之顯於齊回以義著至以相名皆其後也繄南安之林唐已來世為魯人豈放之苗裔耶道唐歷宋金四百餘載間奕葉以儒顯其流風善政表表于時者如是逮規措府君遭時艱虞家世中衰竟能渴追來孝俾盛德幽光墜而復續豈君子之澤其流淵且長乎南鄘王氏家傳王氏皆王者之後春秋時王子成父者敗敵有功因賜氏厥後子孫散落中國在晉者靈王太子後齊則畢公髙後其在陳留者齊王和之裔汲郡王氏其先陳留陽武縣七圈里人起家壠畒耕稼河陂間宋靖康𥘉避地徙家衛汲縣長樂鄉之白楊里逺祖金天會間積勞至𣏌縣尉髙祖見弟五人二翁是為扈王氏𥘉妣父扈素長者聞髙祖賢舍而甥焉生子男五曰三翁四翁五翁十五翁十六翁人見其本支蕃衍稱扈王氏以别因之蓋不忘本也三翁贇譜敘為二代祖生二子曰元用資頴異是為惲髙祖自田舍郎改肄士業嘗語人曰終當以筆代耕衆異其言及長補郡掾為人英特棣棣有威儀主治曹務踔敕角切厲風發明昌𥘉莭鎮參佐例朝授用薦者言遷河平軍都日官上官倚重有黑王殿直立節度之目尋得暴疾卒魚行里舍時年三十有八人惜其年不稱德生經紀紳三子紀為決曹紳潛德不耀曽祖經字伯常天稟孝愛垂髫已知事母容止如成人禮氣方嚴內長厚喜施與志不樂祿仕雍容鄉間以德度靄一時昆仲七人同居內外無間言以纍葉不分家用饒足其賑貧施乏不掩為偏惠人有貸弗忍徴久不克償輒折其劵或來謝就復惠濟曰周急素所樂何謝為一四家子要𬗋大絛來取所附興徐誡之曰農當務實士君子帶非送其家女弟嫁陵氏壻卞以俠犯女妹先君所鍾愛若壻置於辟婦容匿會赦嘗出郭門遇里農昜也墮焉取諸市可乎其人謝而去黨官府來求剖正為諭之曰逺親莫世所末免親仁和鄰古之善道𥘉無君子愛人以德曲直非所辨曰吾儕小人不昜慮至相戒曰今而後不可使長若其為一邦聽直欽服如此王氏北者尚十餘房其親喪隨所寓權厝曽之晉村之南阜曽慮歷年久斧封馬鼠漫不可曰吾大宗子合食族墓責實在我遂起新任大葬於長樂卿第四疃祖業之北原及舉祀絶者草餘柩贈率有加凡內外男女孤惸無藉賴者為娶嫁之姻禮踰巳出曽祖妣系出新中臨清關宋汲郡公吕氏之裔壼儀母德宗屬仰法焉生與曽祖歲月日同北兵破衛亦同時怖沒於家春秋七十有六實貞祐二年甲戌春正月十一日也百年來里中宿耆談孝愛而內有則者必曽為稱首生祖宇字彥宇身長七尺二寸儀觀清淑少傳家學尤明習文法至帖問條對儀精理當筆灑灑無滯辭行輩無居其右者甫冠遭罹板蕩業為一空奮身從事卒不失舊物雅為節度公完顔從坦所知遇由郡掾辟刑曹孔目官祖盡心庶獄要本情與法應未嘗用察為明情得為喜也故郡中稱平至有哀矜折獄之譽類注刑統進祿等書既而嘆曰後世知我罪我其此書乎生平樂誨人怡顔和氣不以已長格物雖童孺質問諄諄然無倦色有弗知未始不盡也今梁衛間由吏業而上逹者半為門生遂以吏學授先君曰吾治獄平後當有顯者然前賢有言吏以法令為師問而可知其能與否自有資才非學而可此汝最當默識苐完之子鈞早失怙恃鞠育與先君等至一豆羮一裘褐必加顧恤正大改元四月十六日以末疾終新衛州橫堤里之寓館壽五十有一官至敦武校尉祖妣孟氏女縣南草市榆林坊冨家姿貞順配祖德良稱既誕先考以貞祐二年癸酉四月十六日卒於郡之故家再娶韓氏韓朱巳來世顯族有纍階至司空龍圗者二十九處寡以健烈聞流寓勤苦保持門户甚力俾先君卓爾早逹祖妣資藉之方為多晚嗜道家教號妙清大元中統庚申重九日以疾終安仁里享年七十有六越三曰祔葬玄堂祖柩之左先君諱天鐸字振之姿精敏幼知嗜學諸弟出遊嬉獨把書不置既通大義先祖以律學授之即能下筆條對明究情法日蔪然露頭角衆謂能大其先業元光𥘉溫國胥公自秦移鎮新衛尚書李特立聞其才由州户曹掾辟權行部令史時上以御馬賜國公園曹取芻粟比內廄例先君曰不可在間則路馬既賜則公乘內廄之例容得同乎公聞之曰王掾愛人以禮二年上黨公誾壁馬武蟲為河朔藩扜分羸兵四千人假食於胙適公儲亦無幾方風雪寒沍衆待哺閭井間公府議以聞先君進説曰張紏合義兵皆河北遺黎今飢若是不權冝以濟殆非從便副上官意也侍郎梁亨道為肯首然當若何曰今官義兩軍溫飽有日若以月給權輟半以應彼急河南漕粟計不時亦至如此則客主兩不失所行臺可其請孱兵賴以安活自是大為省參康瑭郎中盧芝瑭字良輔芝字建瑞二人號􅴻吏事所賞識曰會見驥足騰􅋮一日千里也正大四年用元帥完顔公公諱訛可得賊以火燝之號火燎薦拔所能試京師擢吏貟甲首時年二十有六方軍國多故財賦一仰都運司經度實擇才掾集事即選充運司掾長先君夙夜在公遊刃餘𥙿都漕李公芳字執剛承安二年進士號精政務同漕移刺吳和深加器重吳和中公字景先亦禁官入作司藏吏以計盜官物使髙世英受贓𥘉不知從來事覺吏逃失所在及科罪摐事師肅執以監主為罪首抵世英死先君爭之不下至諳憲部詰辨曰原丗英情本非同謀第行盜後受賕耳據法議罪與元謀共犯不同髙止合坐贓論且法者固當公共師舍焉以即汝心是置法為虛器上官韙之髙竟減死論后懷金來謁先君怒斥去曰毋汚墨我所爭者法非汝私也豐衍庫使劉濬字德源愛民膀進士先君嘗從問學以卒𥘉業以沿代不審陷名𥿄三十萬用是追解先君為申理復官如𥘉五年輔睦親府掾屬皇兄荆王判府事愛其德度深加禮遇明年秋皇太后崩制袒免親奔仆有逺邇之限違者從府科罪時有後期者先君請曰南渡來宗室播弱宜從寬宥王然之以為知體園陵禮畢卒無有𬒳劾者六年轉輔户部令史時簿書財賦委積音漬紛至先君精力過人故務愈繁志愈明氣愈厲事愈詳不煩書佐裁決如流於是風動臺省有快吏元康之譽開興𥘉用入粟例補滿授户部主事壬辰天興東狩崔黨往往入宫禁竊取金貝或堅約同往以遜辭免乃切嘆曰端門不忍過其忍聞此京城下將士爭入俘掠尋有令禁止先君偕同志者突冒兵威禠救百餘口於南薰門下乙未嵗北還淇上尋朝廷命斷事官耶律買奴公括諸道户口柄用顓決得人為急用薦者署行臺從事制以籍為定互占它縣以死論有潞民馬醫常氏避役匿河內王帥家事露公抵常以死意在籍沒州將且用聳動鄰道先君辨之曰常罪止於逋論死則非制書本意公怒曰脫有誤並汝坐之反復辨明常竟獲免又王鳯翔者告崔帥立弟益侃匿金國珍寶適萬户喊失納國人受誅公抵益等以喊失罪罪之先君曰𥘉謀崔立今已死况罪不相及國有常憲公遂平反益等至有圗像奉報之語明年秋耶律公薨曰南歸或勸為州縣曰一丘之木安足棲集來辭於齋壁以見意因號思淵老人尤耆春秋左氏傳西漢書晚年洗心於於華隂王先生名元禮天意進士第號王華子曰子學汝問自昔治少亂多君子寡小人衆何也非天一而地二乾陽方始而隂已為之倍子得之矣集歷代諸儒易説為一書題曰遇朔例一占玩辭明變其應如響下至天極等學皆通習之聞一異書輒自手録多卷交人劉沖曰何矻矻如是曰吾老矣為歲戊戍詔試儒士時恩制寬或以乃嗣長可試先君曰吾思以義方為訓若以幸竊非常敢聞嘗誠惲忱曰吾巳錯斷不容再寒殍死無能一志於道以儒素起家吾殁則瞑目矣然學貴專精汝不見鑑瑩則乃能别物學苟不精如治鑑不明將安用為不學昜昧涉世之道不讀麟經無以見筆削之王吾平昔行巳得乎此而已丁巳秋八月以疾終牖下先君資剛明簡重善持論慮患深雅以大用自期人亦以此與之握瑜懷瑾群而不矜事莫可措手者率優為之不聲色少動故官守遊宦莫不尊德樂道問政質疑取決而去事巳率如教至吏筆縱橫緣以儒術乃餘事耳又善尺牘作真行書徑韻有風格與人交以取容阿匼為恥居家寡言笑以身為律度人望而畏若一官府然外事緩急不一言及家人非疾卧未嘗見日而作三十年兩昜喪褐年四十六既奪先妣或勸再娶曰其如不可何老者繼室又先余死是轉余於恤少者後豫是吾遺纍於後竟不娶𥘉試亰師時宿院夜夢人奉一首加胄曰持此若名也及榜出擢甲首云歲丙辰秋惲亦夢人馳報曰汝父領朝拜且至趣出顧見先君朝服席帽乘而秉簡一卒跳梁馬首唱云翠微君節度使后三日先君遘疾乃以所夢上白曰翠微者太虛之氣夫精氣為物逰魂為變死生者晝夜之道吾固安之復何憂奧明年捐館吁亦異哉先妣靳氏相州永和鎮人進士子玄之孫安陽丞顯思之女性淑善于婦道良謹生二子曰惲曰忱孫振孫冝孫重孫鞬郎贊曰謹按家譜惲六代祖昆弟五人五代祖行一十三髙祖行一十五曾祖行一十九王父行一十四禰伯叔行六人由是而觀金百年間本支不為微眇然自喪亂來或四三世五六世而巳者凡二十有四房哀哉唯扈王氏暨相之醫博房歷八世而傳祀是豈偶然者哉惲觀西漢名臣往往決曹獄史致位槐棘雖云明習文法練逹故實至論身名烜爀㣧裔延昌必曰隂積所至王氏自河平府君而下纍葉以刀筆承家職司城旦逮先考而業有光子孫迄綿綿于今視履考祥其亦有足致然者邪烈婦胡氏傳劉平妻胡氏濵州渤海縣秦臺鄉田家子至元平挈胡洎二子南戍棗陽垂至宿沙河岸次夜有虎虓然突來嘻平左曵之而去胡即抽裝刀前追可十許步及之徑刺虎劃腸而出斃焉趣呼夫猶生曰可忍死去此若他虎復來奈何委裝車遂扶平携幼涉水而西黎明及季陽堡訴於戌長趙侯為救藥之軍中聚觀哀平之不幸吒胡之勇烈也信宿平以傷死趙移其事上聞得復役終身嘻胡柔懦者也非不懼獸之殘酷正以援夫之氣激於衷而知有夫不知有於菟也平雖死其志烈言言方之太山號婦何壯毅哉贊曰桓桓壯夫鷙勇而夫事出倉猝變色蜂蠆烈烈胡氏憤物為害義激柔衷氣簿於外視虎如鼠所天為大平雖嘻死婦莭則邁媛折熊衝藴刃賊輩彤管流徽清芬並代貟先生傳貟炎字善卿同州人性落魄嗜酒業詩有能聲不事生産大元巳亥歲故人楊紫陽主漕洛師愍其窶用監嵩州酒時兵後邑居榛荒日與鹿豕伍非所樂也巳而隨所徴上謁楊方據按坐堂上吏鳬鴈行立貟挂布囊腋下杖巨挺直前曰楊使君不相知置我於此幾為老羆所噬此汝酤鏹持取吾不能為汝再辱遂揖而去其疏誕如此自是長遊河朔以詩鳴諸公間其洛陽懷古分韻得髮字云東雒打空城北邙連督闕懷古動悲吟逺客生華髮隆德宫云林花細妥煙脂色水荇輕淤翡翠泥歌舞留連嫌畫短樓臺䌚眇覺天低宴集東平湖亭北海樽前人似玉東原城下水如天滿服荷華三百頃採蓮人語隔秋煙髙唐道中影孤海內干戈滿愁入天涯草樹低桑柘影空蠶已老陂塘涸盡燕無泥濟南金線宿雨乍收雲葉斷猶疑電影掣湖心扇尾羊云馮翊春草香羊綿柔毛食飽飲苦泉卧沙稀助瓊筯細帶霜小耳春繭圎扇尾一方移種類風頭萬里搖腥羶吾生本無食肉相不煩浼手愁烹煎馬酮云謾説千杯不醉人清光壓倒洞庭春携行何用紫絲絡渴飲不煩烏角巾搖動革囊成醖釀封藏花盎作逡巡坐中一混華夷俗或有豪吞似伯倫豫時能憶者止此西歸過衛先君館焉褐衣麻屨酒近酣巨挺橫膝上掉頭吟諷歌謡慷慨之氣軒軼四座素不能騎乘人強之輒色變隋地或以詩戲云靴有鐙青雖可愛面無人色實堪憐嘗懷金一餅曰鎮心不可以闕此後用以昜妾繼為人竊去家居壁四立餘詩藁酒瓢而巳十七復有撖降字彥舉亦陜人面黯慘目光鬼物憑者少為里嗇夫𥘉不解文字一日忽能作詩吐竒怪語皆古人所未經道雖苦無義意其豪侈輩屬和終不能及中元冬見豫於燕市酒樓浮大白數行徑出步壚間嚶嚶然吻作露蚓來扼余腕欣甚曰吾有以贈子其詩有氣凌太華五千仞詩繞國風三百萹之句醺酣中惜不全憶也嘗謁淂禇幣若干醉過里井即投其中曰為爾俾子區區若此奚用為其狂昜如是後客死保塞殯西南門外路北若干步揭曰詩人撖某墓詩三卷號函谷道人集好事者刋行于世墓志銘金故忠顯校尉尚書户部主事先考府君墓志銘先府君諱天鐸字振之族王氏其先陳留郡陽武縣七圈里農家避靖康亂徙居衛汲縣長樂鄉逺祖有積勞官祀縣尉者曾祖府君諱仲英特有威望終河平軍莭度府都目官祖經諱不仕天性孝愛鄉黨化其德顯考府君諱宇衛州刑曹孔目官精文法表表為吏學師官至敦武校尉先君少聰敏嗜學不為羣兒嬉讀書通大義先祖授以律學即能下筆論斷推原情法誾誾如老成人衆謂父良為教子能丗其家矣正大𥘉自州户曹辟權行部令史時哀宗以御馬賜行省英公圉曹取芻粟欲內廄例同先君曰在間則路馬既賜則公乘內駟之例非所敢知公聞之喜曰王掾愛人以德矣上黨公闓壁馬武京為河朔聲援以餽餉不繼間羸卒四干假食于胙適公儲亦無幾部議以省聞方凨雪寒沍衆待哺閭井間先君進説曰公府紏合兵力皆河北遺黎今飢若是不權宜以濟殆非徔便副上官意也侍郎梁亨道為肯首然當若何曰今官義兩軍溫飫有素若以月給權輟半以應彼急河南漕粟計不時至如此則客主兩不失所可其請孱戍賴以安活自是為省參康瑭郎中盧芝所器識曰會見駿足騰􅋮一日千里也正大四年用元帥完顔公薦拔所能試亰師擢吏貟甲首時年草有六方軍國多故經費一仰大農調度即選充運司案長時李乾州芳承安二年進士字執剛移刺吳和領漕計號精吏務先君夙夜盡公審會明當二公稱其能入作司吏以計盜官物使髙丗英受贓𥘉不知所從耒事覺吏跳失所在及科罪從事師肅執監主為首抵卋英死先君爭之不下至詣憲部誥辨曰原丗英情本非同謀苐行盜後受賕耳據法議罪與元謀共犯不同髙止合坐贓論且法者固當公共師舍焉以即汝心是置法為虗器上官韙之髙竟減死論后懷金來謁先君怒斥去曰母汚墨我所爭者法非私汝也東豐衍使進士劉濬以沿代不審陷良𥿄三十萬是用追解先君為伸理復官如𥘉五年輔睦親府掾屬皇兄荆王判府事愛其德度深加禮遇明年秋皇太后崩制袒免親奔仆有逺邇限違者徔府科罪時有後期者先君請曰南渡來宗室播弱宜從寬宥王然之以為知體園陵禮畢卒無有𬒳效者六年轉輔戶部令史時簿書財賦委積音漬紛至先君精力過人故務愈繁志愈明氣愈厲事愈詳不煩書佐裁決如流于是風動臺省有快吏元康之譽開興𥘉用入粟輔若授户部主事壬辰天興東狩京城下將士爭入俘掠尋有令約束先君偕同志者突冒兵威禠救百餘口於南薰門下既而北還鄉里乙未嵗朝廷遣斷事官耶律公括諸道户口柄用顓決得人為急前省掾李禎巳佐幕府薦先君於公曰王某豫弗如也遂署行臺從事户制以籍為定互占他縣者以死論有愛民馬醫常氏避役匿河內王帥家帥名資榮事露公抵常以死意在籍沒州將用聳動鄰道先君辨之曰常罪止於逋論死非制書本意公怒曰脫有誤並汝坐之反復辨明常竟獲免明年秋買奴公薨雲中南歸讀書飬晦以厚所待或勸治生曰非豫𥘉心也勸仕州郡曰一丘之木安足棲集日以經史自娛尤嗜春秋左氏傳西漢書其天文術數等學皆通習之年既加一洗心於昜嘗質問於玉華子先生名元禮華隂人從衆進士大有所得一日先生發問曰自昔治少亂多君子人衆何也先君曰豈非天一而地二乾陽方始而隂巳為之倍歟玉華子曰子得之矣集歷代易説為一書題曰王氏纂玄且見吾遁世無悶也嵗戊戍詔試儒士時恩制寬或以乃嗣長可從師取應先生曰以為利非敢聞命嘗庭訓惲忱曰吾巳錯斷不容殍死無掾習能儒素起家其榮多矣然學貴不見鑑瑩則乃能别物學苟不精如治鑑不用為不學昜脈涉丗之道不讀麟經無以見正吾平昔行巳得乎此而巳年四十六既奪先妣或勸之娶曰其如不可何老者繼室又先余死是轉余於恤少者後豫是吾遺纍于後竟不復娶淵老人邦君遊宦咸尊德樂道問政質疑無巳率如教丙辰春平章趙公璧以書來聘時已克往明年丁巳秋八月十有八日考終牖下享年十有六官至忠顯校尉夫人靳氏相州永和人進子玄之孫安陽丞顯思之次女貞靜淑善光備婦生二子惲忱先卒用戊午春三月葬汲縣親仁鄉新任先妣祔焉先君資剛明簡密議論長慮患深以大用自期人亦以此與之握瑜懷瑾群而不矜當官宰務人莫能措手者率優為之不聲色少動外事緩急不一言及家人至於吏筆縱橫緣以儒術乃其末耳又善尺一簡而盡書徑韻有風格作楷字日滿萬聞一異書占畢如不及多積至千餘卷友人劉沖見之曰何自苦如是先君曰素無長物非此何以遺子孫其逺大如此所交皆一時名士以取容阿匼為恥生平非疾病未嘗見日而作三十寒暑兩昜裘褐居家寡言笑以身為律度人望而畏愛若一官府然嗚呼先君以刀筆起身垂聲當世於先業為光大惟其秉彛粹懿思欲克其所未至進進焉不容自巳絶不齒故習一肆於學根極群絰務明大本復旁通天人之術以濟厥用其修已應時開物成務之志是可涯際邪然時與命捩壽止於斯不獲卓犖大見於等聆風樹而含悽履霜露而興感抱昊穹明之氣也愾想平生鏤兹壙石庶幾慰安神靈永閟窀窆之藏銘曰繄扈王氏世業髙曽而下掾習同大風泱泱動南鄘於爍先子德一日奮起蛇化龍樹立先業何光融獄唯平反匪厥躬要以明恕剛而中廷平釋之唐有功漢二千石世業公剖裁錯節輸神鋒庶幾凛凛德讓風盧淵日入不可瞳布衣歸來默而容春秋大昜羅心胸迹蟠於泥氣則虹冀北一顧凡馬空道雖人弘繫其逢維弗卒施為世恫兒能讀書亢吾宗白首孰計逹與通閉門𬞞水井長終翠微之居窈以重一僨不起胡凶悠悠大鈞問無從太行西峙泉流東九原盤盤佳氣蔥魂兮歸安此新宫先妣夫人靳氏墓先妣縣君姓靳氏相州安陽永和鎮人永和自唐歷宋為名縣鴻儒巨族代櫛比出靳氏其一也家故饒財世以孝義著聞鄉里祖諱師楊字子玄舉進士賦聲埸屋間以恩賜第授彰德府教官金百鄴丁論人文之選者殿元為稱首以外祖其季也為人儀觀秀偉髯滿喜馬滿經犬遊獵橫漳間有河朔故家豪習嘗官安陽丞生二女先妣其次也姨母適李氏今為召居鄉里有一子既王氏先祖時已殁祖母韓性貞明持門户益嚴先妣孝飬恭順故閨門內事僅絲髮比不敢專須請之后行祖母以是賢之非大故未嘗踰外閾姻黨有以合二姓會諸親者先妣與焉里中諸媪至顧而不知為誰平居課兒輩讀書傍治絲枲須夜分乃休樂聞古人毋儀女誠及善惡興衰等事怡然有得至窹寐思服旦起愛晴隂問或旱則清澡溢則霃陰輒愀然不懌曰歲功一失憂有大於不然喜津津見顔先妣性溫純慈祥居家容儀無啞啞言笑人物不忍少傷內外以厚平生不能昜物心慊慊惟恐我之人也世方以服飾相髙羽耀閭閻間甚者託燕遊以私謁為事先妣聞而之朝夕志女功主中饋𬒳服在躬承祀孔時嘗以事當出乃歸而不自安者移時其幽間貞順之德蓋可知已嵗戊申夏六月竟以憂勤致疾越明年已酉秋七月草九日化于私居之適寢壽四十有五先君識明達既失內助斷不復娶祖母惓勤稍以內事傳新婦推氏每取先妣婦道是訓因追悼曰汝如醮王氏二十有五年有子有孫未嘗以王母自居失為婦禮勤巳至矣不獲少慰劬勞而止於斯可勝痛哉嗚呼天道悠悠報施善人果可必而恃邪故臨終嗚呼哀哉天妥惲可罪而至此極耶追念祖母疇昔之言穩然恫於心故茹哀䘖恤於兹八年是伸荼毒慰下泉發幽光而圗不朽冝銘德莫若哀號泣涕以畢其辭銘曰坤柔之德婉以從健而幹蠱匪婦功伯姬之卒諡以共淑先妣柔所鍾主夫中饋成肅雍春秋承祀𬒳憧憧善人獲報天乃公嗚呼福壽不一逢歸咎無處侗厥躬𥚹祔無憾哀送終萬家之原偃斧封泉流可竭恨不窮故權左司都事趙君墓銘君諱謙字和之世為蓋州人中統元祀用薦者言以材幹輔行臺左三房提控令史二年春考政上都與豫同遊居者數月用是情好日洽夏六月闔臺南還君為中省苛留乃以都司擬之作駐久計君怫然不樂求亟去甚鋭事業巳不許信宿疽發於腦户呻吟無聊殆不能堪醫庸藥妄一刺而肆裂越三日豫與楊易州恕謀曰常山瘍醫麻澤民今之俞跗也適召至若禱於院使王君儀之可一來救藥凡三往得請踵及門中使趣去之自是內侍不出者幾浹旬後五日夜聞君聲漸嘶執燭起視向壁卧頭岑岑不舉矣比明氣惡逹户外傔從止一老傖戇且愚瞪不知若何訪求知故無一人豫惻然感傷冒臭惡易衣衾悓其疾緩急困則對榻衣寢自疾亟迄蓋棺凡五旦夜得年五十有七實中統二年七月草有五日也嗚呼哀哉以義以友喪無歸責實在我既斂詣堂中請曰吏趙謙以官守客死禮以公給喪郎中賈君仲明憐之官為賵緍錢千躬為護喪大都城東門郊外適表親徐貞者至付之俾轊載歸燕君短小精幹審於吏計蚤歲從事課府以廉介稱杯酒間言笑啞啞殊不知為肅慎氏之族也术甲稱者聲近趙家故以趙定氏云銘曰志樂而奚庸氣信而弗窮曽不知安於命而為通也心與事捩卒與楇逢奈何乎趙公故南塘處士宋公墓志銘并序南塘處士宋公捐館之九年當強圉赤奮若千插亥夫人魏氏奄棄榮飬仲子繼祖等託參卿趙禹鄉致其命來請曰先人墓壙未克埋銘今將啓堂祔安妣喪于柩之左窆有日幸吾子速銘以光大事某追惟雒尹平生之言重以禹卿孔懷之義為次序之公諱珍字子玉姿秀偉有德度早能詩華玄深造理窟散髮揮塵瀟灑有出塵想故中書令律公一見偉其貌竒其才至贈詩稱與有柱石中原之目遂薦為朝廷侍從官既而歎曰吾志在長林豐草清泉白石金馬玉堂非所樂也乃辭去中令復授以資便職亦不就嵗甲辰自雲中徙家燕都得金溝水南形勝地十餘畒疏沼種樹中搆堂曰麗澤碧瀾秀樾景氣二勝日以琴書自娛教子孫為業野服髙間漠然以世務不攖其懷然性喜賔客樂觴詠所交皆一時俊乂如王慎獨之愷悌張鄰野之諧傲藴藉如楊西菴才鑒若姚雪齋王鹿菴之品潔一世商左山之凝重朝右每光風霽月過其居者燕樂衎衎必極歡而後去太史公云視友知人公之行巳槩可見矣夫人魏氏有賢淑行輔承內治能遂公𥘉心四子幼服庭訓皆賢孝負藝學長曰紹祖少中大夫河南府路總管次繼祖不仕次光祖侍儀法物庫使次仁祖以琴阮供奉孫十人曽孫四女孫一十四人時莭賀慶蘭芽玉樹瑶環瑜珥秀映庭户以次列拜上酒介壽公與夫人亦舉觴酬酢一家之內樂融融也公以至元巳巳秋八月考終牖下春秋七十有七越明年庚午冬葬大興縣招賢鄉之南原夫人之殁實至元十四年冬十月草五日也夀八十宋氏上世本蜀城都人逺祖有官言州之吉鄉者遂為河東人曽祖元祖信考章俱有儒行不耀其幽光潛德發於公之身者冝咺赫然公復謙抑不盡享其篤祐遺其子孫至光盛如此銘曰名藉朝端身心考槃貞不絶俗道出夷惠之間以儒雅而擅一時儋天爵而享髙年服食華鮮子孫滿前彯纓若綬照耀後先沒而從祖是之謂祉全我銘納壙復慰下泉千年而見白日尚知為青山白雲之仙大元故蒙軒先生田公墓志銘金源氏踵唐宋舊制以舉業取士號稱文武正科大定明昌間人材輩出天下英雄盡入吾彀中南渡後境壤蹙時事艱其自淵源見聞中來者多憂深思遠忠義奮發懷﨣﨣干城之志况其風聲氣習歌謡慷慨而有故家遺俗者哉公諱文鼎字仲德姓田氏其先京兆醴泉縣人曽祖俊正隆𥘉董汴宫役因家太康之侯陵祖秀徙居蒙城遂占藉焉祖用御史君貴贈上輕車都尉鴈門郡開國伯妣尹氏贈鴈門郡君父芝貞祐二年進士第官至嘉議大夫鎮南軍莭度副使資雅重有相望妣楊氏鴈門郡君公生而爽朗稚時巳軒露頭角棖觸物論為竒童嘗問學燕山張融一見即以不羈許之為人有膂力善挽強汴京受兵得請於香林先生應募自效執政以公書生年少初不之重及觀其拳勇誡以方略詢之宛如宿將射敵慮無遺䇿以勞授武節將軍西南面元帥府總領仍佩金符以寵異之京師飢遣公將五百人取封丘麥既還去城逺倐千騎來襲衆欲鳥獸散公曉之曰彼騎我步若前遮後蹂逃將安之即分為二隊相去各里許結陳而待戈矢外翼負者居中轉戰轉退手先作氣敵叵測不敢迫比至城不亡斗麥一卒執政才其為命監鄭門前後出活飢民甚衆汴梁下縱民四出護二親北渡時同發者數百家奉親外救死問疾往來保庇不少倦如渾源劉祁母洎祖母病死半塗二子相顧號泣而莫之何公為死瘞生負兩皆得所其處患難中自救不睱能急人之急如此何義烈哉遂來居相下以飬親讀書為事索米負薪日供所需以盡子職既而應廉訪劉汝翼辟為幕察官時朝廷逺駐龍朔凡上計三往返事集而無難色歲壬子輔國賢王定封彰德為分地擢用賢雋特授公為本道課稅所經歷時持政者多不法公諌止不從即投劾去後果敗中統𥘉又為參政商挺辟署河東行臺幕屬無幾罷歸公少負氣挺莭持論髙料事明義之所在勇於必為自視以為一世竒士幅巾藜杖掉頭吟諷不知去古為逺邇惟其學髙六藝名重一時邦君時相爭以禮幣招致尚期有可為而為之者然以太剛又不屑取媚於時故其抱負治具竟百不一試晚節與西巖張豸緱山杜瑛以詩酒自嬉不復談經世事矣臨終語其子復曰士之出處莫非義命道行志通伊周不為之泰道窮志湮顔原不為之否從古迄今有才不遇窳死溝壑者豈獨余哉是非所當戚戚於吾衷也蒙軒其自號云公善作詩工書學遒麗有楷法至於丈尺大字尤極精妙云癸酉春二月七日以疾終廣川客舍享年六十有三夫人慶陽李氏系出唐薛王前進士司農丞無黨女共儉淑善母道光備教子孫有法白首一莭安公之貧後公八年辛巳歲亦二月七日終於家壽六十有八生二子一女嫁士族子復傳家學有詩聲終河間漕司從事衍冨文學通吏事由憲臺史轉輔中書今為禮曹主事庶克光紹遺緒云孫六人曰伯耕曰叔耘叔耨叔耜曰重曰某衍將以年月日舉公柩葬彰南新再拜來請銘雖後進嘗獲拜履綦知公為頗詳既序其行已敢以生平底藴未克展盡為士論所痛惜者銘之銘曰士貴尚志趍事赴功况作而行之乃士夫之所崇矯矯田公繄時之雄振靈修之逺駕思從事而匪躬文章足潤身之具才武見將領之風桓桓蔡挺明夫戰攻解臨機而制變張國威於小戎奔走急難笑談折衝朔漠三往兾群一空顧曷職而弗辦曽漕計之是供政不我俾坐困簿叢寧窘澗阿肯與彼同利器百而不一試在先生為不逢道義蟠胸伊周是宗既得喪之不我與吾胡為而戚乎衷有軒曰蒙獨善固窮閉户讀書飲水長終人邪天邪問大鈞而無從惟子孫之可卜見德澤之所鍾繄臺閣之就列蔚圭璋之顒顒洹流毖北太行之東雖髙深兮易位尚知為蒙軒先生之封故正議大夫前御史中丞王公墓志銘并序至元二十六年二月丙辰辰刻正議大夫御史中丞橫海王君以疾卒于私第正寢斂有七日其子庸彛輩縗服纍然持事狀百拜以壙銘來懇以義以分有不得辭者公諱復字子𥘉𥘉名趾麟伯其字曽祖瑜大父松世家滄州俱隱德不仕禰府君諱昌齡金季嘗遊宦河南大梁亡起從恆山史矦參議軍府事後以公命來攝衛州事有惠化於民惟君器識早為經略公所知巳未冬自齊絰中起君襲父職仍領州務明年中統建元真授衛輝二州同知又明年昜州而路就升二揔尹君遵守成憲越先正有光至元甲子轉官制行授朝請大夫改倅彰德路無幾以德望入為中書兩司郎中調議密勿宰相至以佳士上聞魏河朔巨鎮吏重而俗囂號難理特輟君以少尹來治乃曰清心不如省事省事莫若先殺吏權於是汰冗濫屏姦惡絶私謁尚德化民有李氏者珥筆構黨持短長嚇官府張甚君發其姦杖踣之萬喙稱快自是闔郡嚮風書葉翻香曹務為清簡八年辛未春自中書舍人出知歸德府府居河下流其秋水大至環城為海衆胥沉為戚君乃督棹師浮舟楫濟民於丘陵林木上遂相水衝循橫堤疏二渠一注汳瀆一逹河故道水隨退得腴田萬頃佃貧民仍請廩粟得萬五千石活飢殍者既而復揵治回龍堤葛邑口於府西以絶永患曰烏可使吾民重漬于泉故水去而民益親繼丁母夫人憂去職未期詔起君充河南道宣慰副使國家方有事襄漢順流以成破竹之勢故軍需百色羽書交督急於星火一責於我中間籌辦君力為不少時大軍復東掀五河戰力而餽乏河走凌蔽川不昜轉致衆艱於行君毅然以漕事自任至撞氷東下一夕凍歘解軍威藉以振衆且服君事不辭難而害不苟避有如此者明年超擢陜西四川道提刑按察使尋進拜嘉議大夫行臺御史中丞用􅎓才選既署事有告蘇州應草竊以城叛者或議調急兵徑討公曰維揚去吳才三百里不當猝有此變恐憸人流言激之閧乘間以利賄耳與省議合遂駐兵近郊偵其實繼發未晚巳而果如料吳人得無虞而妥其臨大事處置明審例如此淮甸沃壤千里公於上前論奏冝設農司募遊食者開耕屯以盡遺利若爾非惟實內地且威剔遐陬坐銷外侮韙其議付有司施行俄加正議大夫徙按河東山西道以事免歸居三年竟以疾酬之遂至於斯哀哉享年六十有四前後寵錫凡十有一命官極通貴哀榮終始不為未遇以是月壬申葬汲縣親仁鄉王尚里禰塋三昭首穴夫人夾谷氏前公卒再娶夫人秦氏生二子曰彛曰範範前公九月暴卒二女長安歸徒單衍亡次適趙常曰夫人杜氏生子曰庸二子並願而有文學皆公所自教云曰子度曰女夀適陳氏皆先亡孫二人曰青牛範之子一在褓公為人器量弘深有經史學善持論識變通無贅言居飬甚重周防甚謹及開物成務當其可為推致所學惟恐不臻于極然事無巨細率以大躰中持恥近效取譽所謂以道事君者近之至威儀柔嘉小心式訓又類夫仲山甫衛武公之行巳承旨鹿菴王公人品清峻慎許可嘗詔公舉可執政者乃以君名進奏其經濟德業可知巳𥘉官河東時憲府爭索隱幣以副上需分司者不計應否悉掩為巳功弊久恬不為怪至是公以前行沒入十萬餘緍盡給之民又平陽府胥有以母喪甫窆輒從吉執役者公曰忘孝之人胡可與處乃按而斥之其惜躰正俗又如是可書者尚多惟著其繫夫事之重者恐亦公之志也歟銘曰大學為道將何為俾明一德新民彛行焉而底善是依要本平治先修齊俾明厥體用或違其在孔學非吾知倬哉王公天秉𡵨自稚細行𥘉不遺若考翼事子肯基一日雲厦盾巍巍楊歷中外厚自持柔嘉維則非公誰又復當用行不疑翰音登天翅屢垂越若有物中縶維從心罔單體弗羸期於俯仰無忸怩人或咨惜我則熙以道事君其庶幾六十四載麟儀儀綬何若兮印何纍賁夫松檟餘光輝天其或靳將後貽俾為清廟璧與圭奉之天門光陸離仙山東麓朝氣霏佳城欎欎君所歸殁而從禰為受釐足慰下泉含笑嘻零落不必西州悲我銘昭昭惟昧詥秋澗先生大全文集卷第四十九
