body:
  text: 翰林遺藁增諡睿宗仁聖景襄皇帝玉册文臣再拜稽首言伏以至德難名於穆乾坤之大孝思罔極有嚴祖考之稱稽遺美而載揚乃守文之先務弘宣令問荗對耿光伏惟睿宗景襄皇帝秀拔神支淵潛龍德英武內根於仁孝溫文外表乎謙恭先事而謀臨機善斷當軍國撫監之際赫風雲册伐之功川蜀威加宋人為之禠氣鈞臺戰􅸩金源遂不能兵闢土宇而靖中邦翊炎圗而隆寶運䇿勳天府歸美皇靈方請命於上蒼思保安於宗社祥開後聖光啓皇元致今日之隆平蓋孫謀之燕翼惟天縱其睿智故澤流於子孫爰伸凝慕之誠虔舉增徽之典詢諸輿議允協至公謹遣某官某奉玉册玉寶加上尊諡曰仁聖景襄皇帝廟號睿宗遹守先猷仰聖靈之如在式垂歆鑒降福祉以無疆追諡先太子册文皇帝若曰於戲故皇太子某天姿玉𥙿荗德淵沖朕紹纂丕圗仰遵太祖聖武皇帝遺訓以爾世嫡元孫譽望攸屬爰從燕邸正位春宫愈貴能謙居貞益慎及夫聽政揆敘有方至於睦親昆仲無間尊師問道日御經筵視膳候安時詢內竪佐豫柔理惠彼小民方念神器匪輕投艱有託豈期前星掩耀永隔幽明日居月諸懷思曷巳比者大臣敷奏冝易名奉祀光崇彛典今遣某官持册賜爾諡曰明孝太子永昭遺懿式慰朕懷尚兾明靈歆承寵渥皇太后玉册文維至元三十一年歲次甲午五月朔某日嗣皇帝臣御名謹稽首再拜言合萬國者莫隆於孝治揚懿德者必著其徽稱洪惟我幼沖人嗣無強大歷服率先風化無尚於斯恭惟太母聖善懿恭睿識逺慮力行善事隂賜及民隆孝敬於先朝軫憂勤於內助宫壼仰其規範宗族化其肅雍誕眇躬而砥于有成翊燕謀而俾登大寶深恩至德蕩焉難名匪極鴻一作推尊曷伸至願載惟昭考巳升祔於宗祧言念宸闈冝大崇其典禮庶幾均報仰答恩慈今遣某官謹奉玉册寶上尊號曰皇太后伏惟皇太后殿下端處福宫誕膺顯册儼母儀於四海德配坤元期聖夀於萬年祥開神策永資慈訓保我子孫臣誠歡誠抃稽首再拜謹言改元詔朕祗遹先猷嗣承丕構訪豫落止在夙夜以靡遑永言孝思閲歲時而憎愴惟春秋之謹始實古今之成規適屇履端聿新紀號可改至元三十二年為元貞元年咨爾有衆體豫至懷手詔侍郎楊大淵朕甚憫焉今豫命爾王茲東土非以訟受之也彼所責匪輕敬哉今而後苟不克荷非若汝兄幸而免也授賀某宣諭大理國制幼懷竒節筮仕昌時及知遇於先朝遂撫綏于大理楊威絶域昔收定逺之功服事彤庭屢抗伏波之請冝旌前效俾煥綸章汝其宣暢皇猷洋溢方外爰體綏懷之意以安遐邇之情轉為招徠式副所托宣諭大理及合刺章俾還本土手詔嘉汝等逺自雲南導從選鋒轉戰千里直波鄂渚以逹於此勤巳至矣今者俾爾各還本士以遂耿性優賜各有差薑真人手詔神以知來智亦藏往言念長江之邁未嘗一日而忘遐想仙標載勤馹傳雍容太厦論用復於細氊寂寞嚴扄雲暫辭於故隱春寒遣書指不多及追封皇國舅按赤那演濟寧王諡忠武制制曰疏恩異姓無踰王爵之崇追册元􅈴况在世􅊚之懿典禮所逮存亡靡殊故皇國舅按赤那演天挺英姿志宣忠力當祖宗造基之始為股肱佐命之臣衍慶軒星儷輝宸極惟勛閥之茂著冠戚里以獨髙朕紹述丕圗飬懷世德冝錫大邦之號仍褒一惠之文可進封濟寧五諡曰忠武於戲議協明廷庸布絲綸之命澤流後裔永昭泉壤之光尚想英靈歆此寵渥皇舅濟寧王妃制制曰爵以德崇既建真王之號婦因夫貴俾隆藩國之儀眷我外家德昭祖母誕彌聖后作配先皇豈惟內助之多光溢徽音之媺是冝管形瞱煒象服委蛇顧豫沖人獲紹前烈禮崇報本心焉敢忘可追封濟寧王妃與對邦休服茲寵數重衍􅊚親之懿永膺伉􅓻之榮泉壤雖幽歆承罔昧贈諡故光祿大夫左丞相都元帥阿木制制曰功德兼隆其所及者既遠存亡靡間故為報也必豐乃眷元勳豈同常品故光祿大夫中書左丞相都元帥阿木挺英將種作世虎臣爪牙兼信布之材韜略合孫吳之法惟重厚克􅎓其委寄故謙恭不有其智能當世祖之恢圖自元戎而宣力奠我南服隱若長城秉持旄鉞者三十餘年出入行陳者百五十戰奮身不顧忠如皎日之明愾敵無前勢若迅霆之擊載揚我武飛渡長江佐收一統之功名出諸將之右繼將明命逺震邉庭威方暢於皇靈訃遽聞於瀚海朕奉先猷而祗懼念王業之艱難鬱爾風雲追惟往昔優加恤典開勸後人官資超極品之榮封爵建大國之號於戲麟臺畫像豈惟宛轉於丹青甲第賜書庸示昭光於窀穸可特贈開府儀同三司太尉并國公諡曰武宣精爽如在不昧欽承太尉并國公夫人某氏制平章政事卜鄰吉帶母别速真氏父為於運宗臣嘗有功于社稷夫亦折衝名將屢宣力于封疆位陟中台慶鍾賢嗣惟是數者萃于一身其存殁則俱榮蓋始終之鮮儼况內德壼儀之著而婦規母訓之崇錫之以翟茀之章賁之以鋃黃之飾沛殊恩於既往示深勸于將來在邦彛皆所當然於世教其或有輔於戲脂田肇啓獨垂範于兩宗蘋饋相承尚流芳于百祀可贈并國太夫人追諡司徒鞏公制制曰莭惠易名恩禮備飾終之典依光育德風雲非一日之期故具官某稟性淑均處心貞亮眷昭考當歧嶷之際侍內庭多傅翼之功奉事兩宫勤勞有曰爰念邸潛之宿望特班邦教之殊階謀參密近而屢效忠誠位極崇髙而愈形謙謹朕方外于大寶將圗任于舊人巳聞歌露之悲可後蓋棺之議鼎湖未逺想陪仙馭之遊泉壤生光洞賁綸章之寵可贈金紫光祿大夫諡曰忠懿有來精爽不昧歆承追諡賽平章制制曰人臣罄奉上之忠恩恤奚分於今昔國家有飾終之典光楊亦賴於子孫於惟閥閲之家况復風雲之契某官某儀刑西域柱石中朝以文武之長材藴經綸之大業爰從潛邸早識英資而又圗回每沃於淵衷度量獨髙於天下四川分陜朝廷無西顧之憂六詔行臺郡縣奠南服之理福星霖雨動應時祥和氣嘉聲撫綏殊俗念匪躬而盡瘁每當饋以興哀朕祗奉先猷循思逺莭位兼將相德全始終况爾孫克光繩家訓弼豫孝治進二文昌用推錫類之恩寵以上公之號於戲鑄金圗像豈惟專媺於前賢告第頒書尚兾傳芳於來世可贈某官某諡英爽不昧其克欽承賽平章國夫人誥國治固先於家齊古今匪易婦秩諒從於夫貴典禮攸冝某官夫人某氏婉自名家嬪我賢輔循法度而供壼職以恭儉而相夫勞委他儼象服之尊恭懿融管彤之美以正以順如山如河主饋冝家綿休積慶夫延登於鼎胙孫進二於文昌不以輝稱曷彰內助仍易小君之號榮偕品極之封於戲德容尚肅於舊儀誥鵉有煥脂澤載光於故壠世祚彌昌可封某國太夫人諡某號主者施行追諡故都運梁公通憲先生制制曰望壠思賢臣子無古今之間顯親盡孝國家有推獎之崇矧兹文憲之傳篤我丗臣之舊資德大夫中書左丞梁暗都刺故曽祖金中奉大夫司農少卿陟早登科第顯歷仕途履正奉公才優國計持難抗節身為大間在先儒耆德之間有泰和能臣之譽經綸事往道義日尊流澤逺及於子孫致位有開於卿相克宣忠力勵相我家不有恤章曷勸來者可賜諡曰通憲先生於戲老成雖逺典刑猶見於國人寵數惟新潛德載光於泉壤尚期英爽不昧歆承太子少傳竇公制傳經明道既輔立太平之基崇德報功烏可後非常之典故桓傅致臨雍之敬而甘盤動憶舊之思古今雖殊典秩不異故翰林侍講學士竇默業尊周孔學際天人詢治體以綱常為言論人臣以功利為末侍謀帝幄剴切多文貞之風論相中書慷慨見陽城之烈而又三代建國眀倫是先惟西池儼籥羽之儀故東序擴人文之化風移俗易一變虗文地闢天開載明正學乃眷兩朝之耆德實為先禰之宮師稽考規模夢寐風采是用榮分三事光融邦教之階恩貴九泉瀟灑玉堂之契有來精爽服我寵靈夫人賈氏誥辭天人之際若弗可知禎祥之來各以類應凡祖宗父母尊榮夀考未有不以善而致者具官某夫人某氏婉從清望嬪我儒宗恭儉以相其夫勤恪以成其子珩璜中莭藻薦多儀清白傳家管􅊮有煒冝爾從夫之貴寵膺華郡之封鵉詰副加服我休命追諡賈博兒赤制負暃于時既逢其明主當饋起嘆有懷于昔賢某官藩邸近臣中朝耆德適際風雲之會素多監掌之功割烹調和乃其常事威儀進退曲盡恆規凡侍殿庭望高德度方舊人而圗任遽薤露以興哀嵗月雖深德容如在抱茂陵之弓劒婉變何窮悵華屋之兄筵未昭敕奠近因廷奏大需恩章可加贈某官諡曰某嗚呼授寵數以如生幽明罔間顧諸孫之衍慶福祉方來慰我老成含嘻泉壤追諡忽林赤制揚徽內職固有籍于世臣追錫親榮乃式遵于彛典其官髙閎集慶美行禔身早以謙恭光聮侍從藝則名而威則棣責于已而功于人出入禁闈者幾三十年主典玉食者何百餘事忠勤奉上夙宵在公每多燕饗之儀何止割烹之技方廷章之宣美遽朝露以溘先可贈某官某諡嗚呼祇奉仙逰悵同翻於􅌂景流光泉壤尚垂慶于後人魂而有靈歆我寵數進呈世祖皇帝實録表臣某等言臣聞典謨𫐠堯舜之功合名顯著方䇿布文武之政義問宣昭粵自漢隋及夫唐宋咸有信史以貽後來况大業豐功震今耀古惟深善述首議丕揚臣等誠惶誠懼頓首頓首洪惟世祖皇帝仁孝英明睿謀果斷爰從潛邸有志斯民植根幹而佐理皇綱聘耆德而講明治道始平大理再駕長江過化存神有征無戰逮其龍飛灤水鼎定上都革弊政以惟新擴同仁而一視規模宏逺朝野清明內則肇建宗祧創設臺省修舉政令登崇俊良外則整治師徒申嚴邉將布揚威德柔服蠻羌加以聖無不通明靡不燭守之以勤儉朴素飬之以慈惠雍和收攬權綱綜核名實賞罰公而不濫號令出以惟行萬彚連茹群雄入彀削平下土統正中邦慕義嚮風聲教奚朔南之暨梯山航海職貢無遐邇之殊方且開學校而劭農桑考制度而興禮樂國號體乾坤之統書畫煥奎璧之文罄所有而酬戰功不待計而救民乏聽言擇善明德緩刑斂福錫民遇災知懼得洪範惟皇之理過周宣條政之勤以致時和嵗豐民安吏職蓋帝德克周于廣運故至公均𬒳以無方可謂文致太平武定亂略繼一祖四宗之志兼三皇五帝之功開天建極者三十五年立經陳紀者二萬餘事以謙讓弗遑於備紀故纂修未至於成書欽遇皇帝陸下夤紹詒謀厲精圗治亟鑒觀於成憲思遹駿於先聲深詔下臣俾為實録宅心宗祐凝孝羮牆開館局而增置官僚敕群司而大紬圗籍編摩既冨搜訪加詳採托於時政之編參取於起居之注張皇𥘉藁增未見於罕聞承奉綸音俾蠲繁而就簡俯殫管見仰體宸衷盡略虛文一存實事其饗會征伐文物典章粲焉列三代之英蔚爾開萬世之業與夫才德孝廉之士忠良姦佞之臣版圗生齒之夥繁財賦畜牧之冨盛謹依條據粗致無遺今具所修成世祖聖德神功文武皇帝實録二百一十卷事目五十四卷聖訓六卷凡二百七十卷謹繕寫為二百七十秩用黃綾夾復封全隨表上進宸扆臣某等忝備台司幸膺盛典顧惟載筆才何有於三長勉進蕪辭慮庶幾於一得冒瀆聖聰下勝兢惕臣等無任瞻天望聖激切屏營之至謹奉表陳進以聞臣等誠惶誠懼頓首頓首謹言元貞元年六月曰開府儀同三司中書右丞相監修國史臣等上進聖夀節賀表至元十四年丁丑代中省作伏以龍德御天協千載休明之運星虹流渚開九秋震夙之祥正朔所頒臣民胥慶欽惟陛下長䇿逺御睿斷有臨凡經制於宏規思光昭於先業修振古未修之典集纍朝未集之勳獨運神機載揚我武削平六詔無好大喜功之心混一三吳見伐罪弔民之舉治道巳隆於貞觀風聲仍邁於漢家尚深門政之虞屢致迓衡之問詢謀元老懷保小民體群臣敬其所尊免包徭以之固本而又禁酒酤而重民食憫兵餘而肆赦恩動順輿情咸躋夀域繄爾至元之盛德優於行葦之深仁屬莭屆於誕彌適躬臨於巡省臣某等久承鈞軸列侍瑶墀一作分司蘭省阻司蓂階愧無金鑑之封章切效露囊之微悃鳯來儀而陪舞聽簫韶九奏之音虎拜手而揚休祝天子萬年之壽甲午賀正表代中省作伏以寅宫建斗洪釣轉一氣之春漢殿稱觴大禮重三朝之慶衣冠環拱文物昭融恭惟皇帝陛下乾健萃精睿思作聖頓皇綱而開大統備百度而冠前王澤既洽於域中威復加於海外中天而立躋丗於平以冨藏民惠免逋懸之賦先春肆赦恩深寬大之書繄至治之惟馨致上天之伸祐端臨正旦光動多儀受圗籍而膺貢珍宴臣工而湛春酒臣某等率先列辟拜舞揚休政與時新萬有遂生成之樂壽從天恪八秩開億兆之祥大都城隍廟設醮保佑青詞伏以天監雖髙曽易顯思之命基圗寅紹敢忘奉若之誠爰自君臨頗歷年所顧眇躬之上託致至理之維艱豈期外侮潛消復荷天休兹丕炎風朔雪大開一統金穰王燭屢致豐年而又雲靜祁連春回沙漠晝日有平安之報霜風無偃簿之虞匪涼德之能然皆聖靈之所佑乃即青陽之月恭修金籙之科誥演琅函真臨玉境導含景蒼精之駕覆垂雲洪蔭之仁鑒兹報謝之虔重以保持之福干戈止息永惟四海之清邦國榮懷亦尚一人之慶如式至元三十年崇真宫設醮齋意大元皇帝紹隆丕構撫御多方欲期中外之安致有憂勤之慮爰資道蔭用介福寧擬於今月𥘉三日就大都崇真萬壽宫設金籙醮筵二百四十分位涓日即良預期以告青詞伏以纂承有在擴先業以丕隆撫御攸寧皆上天之申佑况年齡之向邁資福廕以彌深念兹一巳之微事有萬幾之重邊聲雖捷軫慮良多精力自如過勤或倦而又回氣交更而無不順盩多生感受而未免乖和敢殫禱謝之誠普兾神明之相潛消災滯滋至天休素履安舒符乾剛而不息皇圗鞏固叢景福以惟新無任􅈤禱之至祀廟樂章無射宫之曲昭成於赫皇祖睿智聰明天扶一德海育群生文經武暢治定功成禋祀無期昭垂頌聲無射宫之曲顯寧天啓深仁須世而昌追惟顯考敢後光楊儀尊諡美禮備音鏘皇靈鑒止降釐無疆祝文第一室於赫聖武開運立極啓迪後人奄宅萬域繼體守文爰及眇質大位昭升隂相之力奉薦明禋載祗載式尚祈顧歆永深燕翼第二室丕顯睿祖載揚我武左右禰昆耆定區字慶衍本支紹纂基緒嗣服惟𥘉禮須告祀延洪幼沖永錫繁祉第三室明明我祖神聖無方武定文緩于先有光運開大統德冠百王仙馭漸逺攀慕奚極祔廟奉安縟典是式燕翼如在英靈日赫第四室於皇昭考神靈在天民受隂賜餘二十年不饗其位眇躬是傳追尊徽號永言奉先爰用昭告齋栗揭虔尚兾申佑寶祚綿延登明亥元神維神㧾劾成功尊臨隂位適承嵗德爰誕眇躬屬秋仲之佳辰致嚴禋之菲奠仰祈昭格永荷神休歲星木照星維神象緯玄穹祥開下土直兹嵗事相我沖人恭伸默禱之虔爰即絳宫之閟庶憑隂佑聿底丕平桞宿胎星維神光臨𥘉度獲纂鴻圗顧惟涼薄之躬萃集簡穰之福近因多故致禜幽壇尚兾精英更隆安吉新船落至祭歲君文成舟委波謂之落至維神灼知一嵗之事泛彼中河轉致厥載上下安輸非神曷賴修玉門前橋祭歲君地祇文應門將將前臨天津玉輅所馳虹梁必陳爰搆爰締築之陾陾神維垂祐迄于有成五方帝祭文因方殊號尊以帝稱殿臨五部有赫其靈維橋之作鞭石駕梁尚兾擁衛大來百祥擬禁酒詔漢賜大酺歲有常數周申文誥飲戒無彛况糜粟者莫甚於斯崇飲者刑則無赦近緣春旱朝議上陳冝禁市酤以豐民食朕詳思來奏實為腆民可自今年某月日民間毋得醖造酒醴俾天物暴殄重傷時和其或違者國有嚴典悔其可追故兹詔示想冝知悉中書省牒宋三省文中書省劄該爰自聖上即位之𥘉重惜南北生靈之故一視同仁首主和議故遣信使講信修睦往年征進大軍即令各還本屯仍嚴敕邊將非奉上命毋得妄動行人衛命以來載更歲侓寂無來音何哉不惟有失忱辭反啓邊釁以致攻圍我上蔡侵軼我鄧鄙襲華陽優隨州劫掠真陽數犯漣水此皆出於使軺巳入彼疆之後將和而戰得無異議乎夫信與義自古所恃以為國者也一旦棄捐自有任其責者矣向也大駕巡狩北庭以平內難今渠魁授首已於正月草六日還宫飲至頃因行臺入覲陛見之日具以奏聞請重兵壓境以問其故五月𥘉五日奉聖旨此一事發端自我姑待之省府仰體聖上仁慈尚存兼愛恐咈𥘉心弗允所請且夫朝廷大計巳定此特有司之事耳今就委本路發使詳問焉若復遲疑不決秋髙馬肥至日别有區處當司依奉省劄令差咨議官崔明道兵馬副都李合義充詳問使移文淮東制司即今國使安在何稽留不發并莭次侵疆之役具由回示以慿呈省施行請早示定議據此須至牒者順德府大開元寺重建普門塔碑銘國家以神武戡定區夏際海內外悉主悉臣其所以尊顯釋教彌綸元化者方往昔為最重于以推弘濟之深仁斂無量之衆福纘大寶錫群生躋六合於仁夀極樂之域豈特崇奉而巳哉順德府大開元寺旺聖天子潛邸迄於御極持護寵錫者前後非一至精藍淨衆特命近臣主領不與他寺比三十年間續光起廢集于大成主僧崇嚴以寺之大緣實肇基寶塔今雖雄峙雲衛未有紀述何以夀無盡藏之傳至元丁丑秋懇輦真國師以其事請于朝制可命奉御脫烈傳旨翰林院定撰合立碑文者臣謹按提點僧崇湛具列事迹寺舊有塔曰圎照癸酉之兵燼焉逮國朝辛卯萬安恩公來主函丈始圗興復其感驗靈異有神化無方者初公既祝髮心印佛乘機蟠利用錬形辟穀面壁安禪結習於臨城者五年建緣於淸泉者有日演法出無礙妙辨濟物現當機應身至回邪入正郤火返風雞悟靈而啄香牛馴致而受戒寒泉復眢井之波斗粟周衆僧之供復以慈善根力愈竒疾拯危厄人藏髮餘珠垂舍利潔庖寮而偫館榖代公私而息繹騷其感化方便人叵具舉第以菩薩目之以致逺邇隆嚮願言依歸及廟役興得能仁觀音舍利二顆光大殊常又易塔心柱礎因風自正故勳貴豪冨巨商世農施獻輸給同竟事緣金幣梓材不期而輦至藝巧工能不率而子來風動雲委略無虛日不十稔疊構重簷輪奐離立文階層戺勢軋坤軸藻拱璇題翬飛塵外若乃紺瓦鱗差金輪眩彩覆法雲於真境曜慧景於康莊絢爛䡃蕩若金光明中現無量化佛仰之者火宅晨涼耶之者重昏夜曉誠法界之寶宫河朔之傑觀也實經始於重光單閼之仲春斷手於上章困敦之秋孟簷十有三崇六十仭其二與費不可殫紀癸卯冬師拂衣禪室歸寂真空即日有雨木氷之異塔位石像亦怛化流潤若澘焉出涕者及斂大衆聞空中來妙音樂聲雲光變幻環剎成五色樓觀中現三大士像至有升塔投空攀號者其具戒門資萬數內嗣祖傳法解三藏教沙門今亦千計其為世宗師感慕者蓋如此巳酉歲嗣僧崇朗因太保劉秉忠奏疏請聖上為大功德主遂嘉納焉旦聞師𣑽行清修乃遣近侍護葬及建塔賜銘諡曰弘慈博化大士敕寺額曰大開元寺塔曰普門之塔爾後纍降綸恩優護贍恤靡不備至其紹化住持曰崇潤嗣傳住持曰崇朗崇悟崇瑀至崇嚴凡六代𥘉緣清泉淨土寺乃大士宗姪崇音住持云臣竊聞大雄氏之教以清淨虛寂為心方便慈悲為用愍念大千衆生墮落苦海洪濤鼓風漂流無際世尊心運慈航拯溺度厄俾登彼岸歸淨土正路又慮一切愛欲有迷悶終不覺其本來真心者故假象設教閎厖靈歘至理絶人區事出天外弗爾奚能傳悠久而警悟萬億劫邪窣堵波之建假教髙顯極矣然道自人弘功繇緣立非遇間氣傑出智慧開濟大士疇克弘通法海鋪敦教基如是光大者哉冝為聖天子終始崇奉如一特詔賜銘以昭永世臣某拜手稽首而獻銘曰釋迦挺生自西域靈山玄風暢無極經從白馬肆金光法本誠心歸利益仁王應世憫言湮大千淪流苦海厄教因象設濟無邊塔廟龍宫爭湧出開元大士弘慈公五載雷轟奮禪窟法音演出琉璃筒建此道場化所服髙摽突地跨蒼穹一日雄尊三百尺雨華天風韻流鈴師雖示寂此長舌聖皇錫號曰普門臣今思議何惻怛要欲手潔閻浮生躋彼仁壽極樂國臣聞大德必得夀佛應回施無量福蘿圖鞏固等彌盧聖子神孫千萬億秋澗先生大全文集卷第六十七
