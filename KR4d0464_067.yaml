body:
  text: 翰林遺藁増謚睿宗仁聖景㐮皇帝玉冊文臣再拜稽首言伏以至徳難名於穆乹坤之大孝思罔極有嚴祖考之稱稽遺羙而載揚廼守文之先務弘宣令問荗對耿光伏惟睿宗景㐮皇帝秀㧞神支淵潜龍徳英武内根於仁孝温文外表乎謙恭先事而謀臨機善断當軍國撫監之際赫風雲冊伐之功川蜀威加宋人為之禠氣鈞臺戰􅸩金源遂不能兵闢土宇而靖中邦翊炎圗而隆寳運䇿勲天府歸羙皇靈方請命於上蒼思保安於宗社祥開後聖光啓皇元致今日之隆平蓋孫謀之燕翼惟天縱其睿智故澤流於子孫爰伸凝慕之誠䖍舉増徽之典詢諸輿議允恊至公謹遣某官某奉玉冊玉寳加上尊謚曰仁聖景㐮皇帝廟號睿宗遹守先猷仰聖靈之如在式垂歆鍳降福祉以無疆追謚先太子冊文皇帝若曰於戯故皇太子某天姿玉𥙿荗徳淵冲朕紹纂丕圗仰遵太祖聖武皇帝遺訓以爾世嫡元孫譽望攸属爰從燕邸正位春宫愈貴能謙居貞益慎及夫聽政揆叙有方至於睦親昆仲無間尊師問道日御經筵視膳候安時詢内竪佐予柔理恵彼小民方念神器匪輕投艱有託豈期前星揜耀永隔幽明日居月諸懷思曷巳比者大臣敷奏冝易名奉祀光崇彛典今遣某官持冊賜爾謚曰明孝太子永昭遺懿式慰朕懷尚兾明靈歆承寵渥皇太后玉冊文維至元三十一年歳次甲午五月朔某日嗣皇帝臣御名謹稽首再拜言合萬國者莫隆於孝治揚懿徳者必著其徽稱洪惟我㓜冲人嗣無彊大歴服率先風化無尚於斯恭惟太母聖善懿恭睿識逺慮力行善事隂賜及民隆孝敬於先朝軫憂勤於内助宫壼仰其規範宗族化其肅雍誕眇躬而厎于有成翊燕謀而俾登大寳深恩至徳蕩焉難名匪極鴻一作推尊曷伸至願載惟昭考巳升祔於宗祧言念宸闈冝大崇其典禮庻㡬均報仰荅㤙慈今遣某官謹奉玉冊寳上尊號曰皇太后伏惟皇太后殿下端處福宫誕膺顯冊儼母儀於四海徳配坤元期聖夀於萬年祥開神筴永資慈訓保我子孫臣誠歡誠抃稽首再拜謹言改元詔朕祗遹先猷嗣承丕構訪予落止在夙夜以靡遑永言孝思閱歲時而憎愴惟春秋之謹始實古今之成規適屇履端聿新紀號可改至元三十二年爲元貞元年咨爾有衆體予至懐手詔侍郎楊大淵朕甚憫焉今予命爾王茲東土非以訟受之也彼所責匪輕敬哉今而後苟不克荷非若汝兄幸而免也授賀某宣諭大理國制㓜懐竒節筮仕昌時及知遇於先朝遂撫綏于大理楊威絶域昔収定逺之功服事彤庭屢抗伏波之請冝旌前効俾煥綸章汝其宣暢皇猷洋溢方外爰體綏懐之意以安遐邇之情轉爲招倈式副所托宣諭大理及合刺章俾還本土手詔嘉汝等逺自雲南導從選鋒轉戰千里直波鄂渚以逹於此勤巳至矣今者俾爾各還本士以遂耿性優賜各有差姜真人手詔神以知来智亦蔵徃言念長江之邁未嘗一日而忘遐想仙標載勤馹傳雍容太厦論用復於細氊寂寞嚴扄雲暫辭於故隱春寒遣書指不多及追封皇國舅按赤那演濟寕王謚忠武制制曰䟽㤙異姓無踰王爵之崇追冊元􅈴况在世􅊚之懿典禮所逮存亡靡殊故皇國舅按赤那演天挺英姿志宣忠力當祖宗造基之始爲股肱佐命之臣衍慶軒星儷輝宸極惟勛閥之茂著冠戚里以獨髙朕紹述丕圗飬懷世徳冝錫大邦之號仍褒壹恵之文可進封濟寕五謚曰忠武於戯議恊明廷庸布絲綸之命澤流後裔永昭泉壌之光尚想英靈歆此寵渥皇舅濟寕王妃制制曰爵以徳崇既建真王之號婦因夫貴俾隆藩國之儀眷我外家徳昭祖母誕彌聖后作配先皇豈惟内助之多光溢徽音之媺是冝管形瞱煒象服委蛇顧予沖人獲紹前烈禮崇報本心焉敢忘可追封濟寕王妃與對邦休服茲寵數重衍􅊚親之懿永膺伉􅓻之榮泉壌雖幽歆承罔昧贈謚故光禄大夫左丞相都元帥阿木制制曰功徳兼隆其所及者既遠存亡靡間故為報也必豊廼眷元勲豈同常品故光祿大夫中書左丞相都元帥阿木挺英将種作世虎臣爪牙兼信布之材韜畧合孫呉之法惟重厚克􅎓其委寄故謙恭不有其智能當世祖之恢圖自元戎而宣力奠我南服隱若長城秉持旄鉞者三十餘年出入行陳者百五十戰奮身不顧忠如皎日之明愾敵無前勢若迅霆之擊載揚我武飛渡長江佐收一統之功名岀諸将之右継将明命逺震邉庭威方暢於皇靈訃遽聞於瀚海朕奉先猷而祗懼念王業之艱難欝爾風雲追惟徃昔優加䘏典開勸後人官資超極品之榮封爵建大國之號於戯麟䑓畫像豈惟宛轉於丹青甲第賜書庸示昭光於窀穸可特贈開府儀同三司太尉并國公謚曰武宣精爽如在不昧欽承太尉并國公夫人某氏制平章政事卜鄰吉帶母别速真氏父爲於運宗臣甞有功扵社稷夫亦折衝名将屢宣力扵封疆位陟中台慶鍾賢嗣惟是數者萃扵一身其存殁則俱荣蓋始終之鮮儼况内徳壼儀之著而婦規母訓之崇錫之以翟茀之章賁之以鋃黄之飾沛殊㤙於既徃示深勸扵将来在邦彛皆所當然於世教其或有𥙷於戯脂田肇啓獨垂範扵兩宗蘋饋相承尚流芳扵百祀可贈并國太夫人追謚司徒鞏公制制曰莭惠易名恩禮備飾終之典依光毓徳風雲非一日之期故具官某禀性淑均處心貞亮眷昭考當歧嶷之際侍内庭多傅翼之功奉事兩宫勤勞有曰爰念邸潜之宿望特班邦教之殊階謀叅宻近而屢効忠誠位極崇髙而愈形謙謹朕方外于大寳將圗任于舊人巳聞歌露之悲可後蓋棺之議鼎湖未逺想陪仙馭之游泉壌生光洞賁綸章之寵可贈金紫光禄大夫謚曰忠懿有來精爽不昧歆承追謚賽平章制制曰人臣罄奉上之忠恩䘏奚分於今昔國家有飾終之典光楊亦頼於子孫於惟閥閱之家况復風雲之契某官某儀刑西域柱石中朝以文武之長材藴經綸之大業爰從潜邸早識英資而又圗回每沃於淵衷度量獨髙於天下四川分陜朝廷無西顧之憂六詔行臺郡縣奠南服之理福星霖雨動應時祥和氣嘉聲撫綏殊俗念匪躬而盡瘁每當饋以興哀朕祗奉先猷循思逺莭位兼將相徳全始終况爾孫克光繩家訓弼予孝治進貳文昌用推錫類之恩寵以上公之號於戯鑄金圗像豈惟專媺於前賢告第頒書尚兾傳芳於來世可贈某官某謚英爽不昧其克欽承賽平章國夫人誥國治固先於家齊古今匪易婦秩諒從於夫貴典禮攸冝某官夫人某氏婉自名家嬪我賢輔循法度而供壼職以恭儉而相夫勞委佗儼象服之尊恭懿融管彤之美以正以順如山如河主饋冝家綿休積慶夫延登於鼎胙孫進貳於文昌不以輝稱曷彰内助仍易小君之號榮偕品極之封於戯德容尚肅於舊儀誥鵉有煥脂澤載光於故壠世祚彌昌可封某國太夫人謚某號主者施行追謚故都運梁公通憲先生制制曰望壠思賢臣子無古今之間顯親盡孝國家有推㢡之崇矧兹文憲之傳䔍我丗臣之舊資德大夫中書左丞梁暗都刺故曽祖金中奉大夫司農少卿陟早登科第顕歷仕途履正奉公才優國計持難抗節身爲大閑在先儒耆德之間有㤗和能臣之譽經綸事往道義日尊流澤逺及於子孫致位有開於卿相克宣忠力勵相我家不有䘏章曷勸來者可賜謚曰通憲先生於戯老成雖逺典刑猶見於國人寵數惟新潜德載光於泉壌尚期英爽不昧歆承太子少傳竇公制傳經明道旣輔立太平之基崇德報功烏可後非常之典故桓傅致臨雍之敬而甘盤動憶舊之思古今雖殊典秩不異故翰林侍講學士竇黙業尊周孔學際天人詢治體以綱常為言論人臣以功利為末侍謀帝幄剴切多文貞之風論相中書慷慨見陽城之烈而又三代建國眀倫是先惟西池儼籥羽之儀故東序擴人文之化風移俗易一變虗文地闢天開載明正學廼眷兩朝之耆徳寔爲先禰之宮師稽考規模夣寐風采是用榮分三事光融邦教之階恩貴九泉瀟洒玉堂之契有來精爽服我寵靈夫人賈氏誥辭天人之際若弗可知禎祥之來各以類應凢祖宗父母尊榮夀考未有不以善而致者具官某夫人某氏婉從清望嬪我儒宗恭儉以相其夫勤恪以成其子珩璜中莭藻薦多儀清白傳家管􅊮有煒冝爾從夫之貴寵膺華郡之封鵉詰副加服我休命追謚賈博児赤制負暃于時既逢其明主當饋起嘆有懐扵昔賢某官藩邸近臣中朝耆徳適際風雲之㑹素多監掌之功割烹調和廼其常事威儀進退曲盡恒規凢侍殿庭望高徳度方舊人而圗任遽薤露以興哀嵗月雖深徳容如在抱茂陵之弓劒婉變何窮悵華屋之兄筵未昭敕奠近因廷奏大需㤙章可加贈某官謚曰某嗚呼授寵數以如生幽明罔間顧諸孫之衍慶福祉方来慰我老成含嘻泉壤追謚忽林赤制揚徽内職固有籍扵世臣追錫親榮廼式遵扵彛典其官髙閎集慶美行禔身早以謙㳟光聮侍從藝則名而威則棣責扵已而功扵人出入禁闈者㡬三十年主典玉食者何百餘事忠勤奉上夙宵在公毎多燕饗之儀何止割烹之技方廷章之宣羙遽朝露以溘先可贈某官某謚嗚呼祇奉仙逰悵同翻於􅌂景流光泉壌尚垂慶扵後人魂而有靈歆我寵數進呈世祖皇帝實録表臣某等言臣聞典謨𫐠堯舜之功合名顕著方䇿布文武之政義問宣昭粤自漢隋及夫唐宋咸有信史以貽後来况大業豊功震今耀古惟深善述首議丕揚臣等誠惶誠懼頓首頓首洪惟世祖皇帝仁孝英明睿謀果断爰從潜邸有志斯民植根幹而佐理皇綱聘耆徳而講明治道始平大理再駕長江過化存神有征無戰迨其龍飛滦水鼎定上都革弊政以惟新擴同仁而一視規模宏逺朝野清明内則肇建宗祧創設臺省修舉政令登崇俊良外則整治師徒申嚴邉將布揚威徳柔服蠻羗加以聖無不通明靡不燭守之以勤儉朴素飬之以慈惠雍和収攬權綱綜覈名實賞罰公而不濫號令出以惟行萬彚連茹群雄入彀削平下土統正中邦慕義嚮風聲教奚朔南之曁梯山航海職貢無遐邇之殊方且開學校而劭農桑考制度而興禮樂國號體乾坤之統書畫煥奎璧之文罄所有而醻戰功不待計而救民乏聽言擇善明徳緩刑歛福錫民遇灾知懼得洪範惟皇之理過周宣條政之勤以致時和嵗豐民安吏職蓋帝德克周于廣運故至公均𬒳以無方可謂文致太平武定亂略継一祖四宗之志兼三皇五帝之功開天建極者三十五年立經陳紀者二萬餘事以謙譲弗遑於備紀故纂修未至於成書欽遇皇帝陸下夤紹詒謀厲精圗治亟鍳觀於成憲思遹駿於先聲深詔下臣俾爲實録宅心宗祐凝孝羮牆開館局而増置官僚敕群司而大紬圗籍編摩旣冨搜訪加詳採摭於時政之編參取於起居之注張皇𥘉藁増未見於罕聞承奉綸音俾蠲繁而就簡俯殫管見仰體宸衷盡略虚文一存實事其饗㑹征伐文物典章粲焉列三代之英蔚爾開萬世之業與夫才徳孝廉之士忠良姦佞之臣版圗生齒之夥繁財賦畜牧之冨盛謹依條據粗致無遺今具所修成世祖聖徳神功文武皇帝實録二百一十卷事目五十四卷聖訓六卷凢二百七十卷謹繕冩為二百七十秩用黄綾夾複封全隨表上進宸扆臣某等忝備台司幸膺盛典顧惟載筆才何有於三長勉進蕪辭慮庶幾於一得冐瀆聖聦下勝兢惕臣䓁無任瞻天望聖激切屏營之至謹奉表陳進以聞臣等誠惶誠懼頓首頓首謹言元貞元年六月曰開府儀同三司中書右丞相監修國史臣䓁上進聖夀節賀表至元十四年丁丑代中省作伏以龍徳御天恊千載休明之運星虹流渚開九秋震夙之祥正朔所頒臣民胥慶欽惟陛下長䇿逺御叡断有臨凢經制於宏規思光昭於先業修振古未修之典集累朝未集之勲獨運神機載揚我武削平六詔無好大喜功之心混一三呉見伐罪弔民之舉治道巳隆於貞觀風聲仍邁於漢家尚深門政之虞屢致迓衡之問詢謀元老懷保小民體群臣敬其所尊免包徭以之固本而又禁酒酤而重民食憫兵餘而肆赦恩動順輿情咸躋夀域繄爾至元之盛德優於行葦之深仁属莭届於誕彌適躬臨於廵省臣某等乆承鈞軸列侍瑶墀一作分司蘭省阻司蓂堦愧無金鑑之封章切効露囊之微悃鳯來儀而陪舞聽簫韶九奏之音虎拜手而揚休祝天子萬年之壽甲午賀正表代中省作伏以寅宫建斗洪釣轉一氣之春漢殿稱觴大禮重三朝之慶衣冠環拱文物昭融㳟惟皇帝陛下乾健萃精睿思作聖頓皇綱而開大統備百度而冠前王澤旣洽於域中威復加於海外中天而立躋丗於平以冨蔵民惠免逋懸之賦先春肆赦恩深寛大之書繄至治之惟馨致上天之伸祐端臨正旦光動多儀受圗籍而膺貢珍醼臣工而湛春酒臣某等率先列辟拜舞揚休政與時新萬有遂生成之樂壽從天恪八秩開億兆之祥大都城隍廟設醮保佑青詞伏以天監雖髙曽易顯思之命基圗寅紹敢忘奉若之誠爰自君臨頗歷年所顧眇躬之上託致至理之維艱豈期外侮潜消復荷天休兹丕炎風朔雪大開一綂金穣王燭屢致豐年而又雲静祁連春囬沙漠晝日有平安之報霜風無偃簿之虞匪凉徳之能然皆聖靈之所佑廼即青陽之月恭修金籙之科誥演琅凾真臨玉境導含景蒼精之駕覆垂雲洪䕃之仁鍳兹報謝之䖍重以保持之福干戈止息永惟四海之清邦國榮懷亦尚一人之慶如式至元三十年崇真宫設醮齋意大元皇帝紹隆丕構撫御多方欲期中外之安致有憂勤之慮爰資道䕃用介福寕擬於今月𥘉三日就大都崇真萬壽宫設金籙醮筵二百四十分位㳙日卽良預期以告青詞伏以纂承有在擴先業以丕隆撫御攸寕皆上天之申佑况年齡之向邁資福廕以彌深念兹一巳之微事有萬幾之重邊聲雖捷軫慮良多精力自如過勤或倦而又囬氣交更而無不順盭多生感受而未免乖和敢殫禱謝之誠普兾神明之相潜消災滯滋至天休素履安舒符乾剛而不息皇圗鞏固叢景福以惟新無任􅈤禱之至祀廟樂章無射宫之曲昭成於赫皇祖睿智聦明天扶一徳海毓群生文經武暢治定功成禋祀無期昭垂頌聲無射宫之曲顕寕天啓深仁湏世而昌追惟顯考敢後光楊儀尊謚羙禮備音鏘皇靈鍳止降釐無疆祝文第一室於赫聖武開運立極啓迪後人奄宅萬域継體守文爰及眇質大位昭升隂相之力奉薦明禋載祗載式尚祈顧歆永深燕翼第二室丕顯睿祖載揚我武左右禰昆耆定區字慶衍本支紹纂基緒嗣服惟𥘉禮湏告祀延洪㓜冲永錫繁祉第三室明明我祖神聖無方武定文緩于先有光運開大統徳冠百王仙馭漸逺攀慕奚極祔廟奉安縟典是式燕翼如在英靈日赫第四室於皇昭考神靈在天民受隂賜餘二十年不饗其位眇躬是傳追尊徽號永言奉先爰用昭告齋慄掲䖍尚兾申佑寳祚綿延登明亥元神維神㧾劾成功尊臨隂位適承嵗德爰誕眇躬属秋仲之佳辰致嚴禋之菲奠仰祈昭格永荷神休歲星木照星維神象緯玄穹祥開下土直兹嵗事相我冲人恭伸黙禱之䖍爰即絳宫之閟庻憑隂佑聿底丕平桞宿胎星維神光臨𥘉度獲纂鴻圗顧惟凉薄之躬萃集簡穰之福近因多故致禜幽壇尚兾精英更隆安吉新舡落至祭歲君文成舟委波謂之落至維神灼知一嵗之事汎彼中河轉致厥載上下安輸非神曷頼修玉門前橋祭歲君地祇文應門將將前臨天津玉輅所馳虹梁必陳爰搆爰締築之陾陾神維垂祐迄于有成五方帝祭文因方殊號尊以帝稱殿臨五部有赫其靈維橋之作鞭石駕梁尚兾擁衛大來百祥擬禁酒詔漢賜大酺歲有常數周申文誥飲戒無彛况糜粟者莫甚於斯崇飲者刑則無赦近縁春旱朝議上陳冝禁市酤以豐民食朕詳思來奏寔爲腆民可自今年某月日民間毋得醖造酒醴俾天物暴殄重傷時和其或違者國有嚴典悔其可追故兹詔示想冝知悉中書省牒宋三省文中書省劄該爰自聖上即位之𥘉重惜南北生靈之故一視同仁首主和議故遣信使講信修睦往年征進大軍即令各還本屯仍嚴敕邊將非奉上命毋得妄動行人衛命以來載更歲侓寂無來音何哉不惟有失忱辭反啓邊釁以致攻圍我上蔡侵軼我鄧鄙襲華陽優隨州刼掠真陽數犯漣水此皆出於使軺巳入彼疆之後將和而戰得無異議乎夫信與義自古所恃以爲國者也一旦棄捐自有任其責者矣向也大駕廵狩北庭以平内難今渠魁授首已於正月廿六日還宫飲至頃因行臺入覲陛見之日具以奏聞請重兵壓境以問其故五月𥘉五日奉聖旨此一事發端自我姑待之省府仰體聖上仁慈尚存兼愛恐咈𥘉心弗允所請且夫朝廷大計巳定此特有司之事耳今就委本路發使詳問焉若復遟疑不决秋髙馬肥至日别有區處當司依奉省劄令差諮議官崔明道兵馬副都李合義充詳問使移文淮東制司即今國使安在何稽留不發并莭次侵疆之役具由囬示以慿呈省施行請早示定議據此湏至牒者順德府大開元寺重建普門塔碑銘國家以神武戡定區夏際海内外悉主悉臣其所以尊顯釋教彌綸元化者方往昔爲㝡重于以推弘濟之深仁歛無量之衆福纉大寳錫群生躋六合於仁夀極樂之域豈特崇奉而巳哉順德府大開元寺旺聖天子潜邸迄於御極持護寵錫者前後非一至精藍浄衆特命近臣主領不與佗寺比三十年間續光起廢集于大成主僧崇嚴以寺之大縁寔肇基寳塔今雖雄峙雲衛未有紀述何以夀無盡藏之傳至元丁丑秋懇輦真國師以其事請于朝制可命奉御脫烈傳㫖翰林院定撰合立碑文者臣謹按提點僧崇湛具列事蹟寺舊有塔曰圎照癸酉之兵燼焉逮國朝辛卯萬安恩公来主凾丈始圗興復其感験灵異有神化無方者初公旣祝髪心印佛乗機蟠利用錬形辟糓面壁安禪結習於臨城者五年建縁於淸泉者有日演法出無礙妙辯濟物現當機應身至囬邪入正郤火返風雞悟靈而啄香牛馴致而受戒寒泉復眢井之波斗粟周衆僧之供復以慈善根力愈竒疾拯危厄人蔵髪餘珠垂舎利㓗庖寮而偫館榖代公私而息繹騷其感化方便人叵具舉第以菩薩目之以致逺邇隆嚮願言依歸及廟役興得能仁觀音舎利二顆光大殊常又易塔心柱礎因風自正故勲貴豪冨鉅商世農施獻輸給同竟事縁金幣梓材不期而輦至藝巧工能不率而子来風動雲委畧無虚日不十稔疊構重簷輪奐離立文階層戺勢軋坤軸藻拱璇題翬飛塵外若乃紺瓦鱗差金輪眩彩覆法雲於真境曜慧景於康莊絢爛䡃盪若金光明中現無量化佛仰之者火宅晨凉耶之者重昏夜曉誠法界之寳宫河朔之傑觀也實經始於重光單閼之仲春断手於上章困敦之秋孟簷十有三崇六十仭其二與費不可殫紀癸卯冬師拂衣禪室歸寂真空即日有雨木氷之異塔位石像亦怛化流潤若澘焉出涕者及歛大衆聞空中来妙音樂聲雲光变幻環刹成五色樓觀中現三大士像至有升塔投空攀號者其具戒門資萬數内嗣祖傳法解三藏教沙門今亦千計其爲世宗師感慕者蓋如此巳酉歲嗣僧崇朗因太保劉秉忠奏䟽請聖上爲大功徳主遂嘉納焉旦聞師𣑽行清修乃遣近侍護葬及建塔賜銘謚曰弘慈愽化大士勅寺額曰大開元寺塔曰普門之塔爾後累降綸㤙優護贍䘏靡不備至其紹化住持曰崇潤嗣傳住持曰崇朗崇悟崇瑀至崇嚴凢六代𥘉縁清泉净土寺乃大士宗姪崇音住持云臣竊聞大雄氏之教以清净虚寂爲心方便慈悲爲用愍念大千衆生堕落苦海洪濤鼔風漂流無際世尊心運慈航拯溺度厄俾登彼岸歸浄土正路又慮一切愛慾有迷悶終不覺其本來真心者故假象設教閎厖靈歘至理絶人區事岀天外弗爾奚能傳悠乆而警悟萬億刼邪窣堵波之建假教髙顯極矣然道自人弘功繇縁立非遇間氣傑出智慧開濟大士疇克弘通法海鋪敦教基如是光大者哉冝爲聖天子終始崇奉如一特詔賜銘以昭永世臣某拜手稽首而獻銘曰釋迦挺生自西域靈山玄風暢無極經從白馬肆金光法本誠心歸利益仁王應世憫言湮大千淪流苦海厄教因象設濟無邊塔廟龍宫争湧出開元大士弘慈公五載雷轟奮禪窟法音演出琉璃筒建此道場化所服髙摽突地跨蒼穹一日雄尊三百尺雨華天風韵流鈴師雖示寂此長舌聖皇錫號曰普門臣今思議何惻怛要欲手絜閻浮生躋彼仁壽極樂國臣聞大徳必得夀佛應囬施無量福蘿圖鞏固䓁弥盧聖子神孫千萬億秋澗先生大全文集卷第六十七
