body:
  text: 七言絶句早梅香信臘前開籍約君同往肯前來松風亭下一樽開終曰裴徊醉竹臺霑帶晚夜深猶傍枕邊來花開花謝催人老花本無心人自哀折得一枝手且分春色入城來梅花風韻不凡才氷雪方凝始見開任使和實等間斤斧不為災夢酒張鍊師道人尸解柏陽臺三尺琻鐫卧緣苔昨夜月窗清底分明霑醉謝文來題劉總管宅御愛峰太湖清潤岱宗雄金宅宣和苐一峰絶似水晶宮裹看一堆寒碧玉玲瓏詠梅銅切塗黃點酪酥細薰婆律發溫鑑老夫鼻觀多知見不用燈前問玉奴一脈陽和擅獨根蒲枝金蕾鎖春溫惜花人老情緣在翦斷春風倩女魂尚愛梅君似細君題詩重過去年門經年不見春風靣為恐啼䀶似臘䀶鼓嶺青林欲盡頭半崖渾作白煙浮應知昨夜山中雨石上寒泉散漫流荔枝樓在按察司潭潭大府號澄清一道綱維控八城舊説憲僚憐夜宴荔枝樓上月三更題米元暉楚江清曉圗元暉茟力儘清雄兩岸青山似越中六鑿近年攘欲盡蒼煙無復曉冥𪷟江邊墟落靜荒煙林塢依然井臼全若比石壕更瀟灑入山多避過都錢禽語自感鷓鴣明呼行不得杜鵑切祝不如歸長憐二鳥知幾早苦戀明時日自鞿小樓晚眺逺客逢秋苦憶家小樓登眺日𥘉斜忽驚海上風來迅吹亂鄰墻一架花白沙漢舊名歸舟漾漾度林菲兩岸芙蓉間木犀最是逺遊堪記處一篙秋水白沙西天涯久客得還家喜動秋風八月槎絶似武陵回棹處後山都𬒳亂雲遮岸宿閩清縣門清江一曲抱城根此夜孤舟宿縣門已是客心幽逈處更堪踈雨濕黃昏小箬水師橫棹卧船頭三日風􅏃喜順流縱使不携西子去煙鬟都是苧蘿秋酬劉憲使仲修嚴韻舟次建寧書史孔元敬自浙東改任福唐得憲使仲修詩因繼髙韻為答孔字中卿係襲封元措行也來從海徼全閩地閲盡煙江疊嶂山越橐不憂無重致班超今喜得生還安嶺北遮千里目全閩東掩萬重山江花江草爭含笑一事無成謾往還夢筆山異稟中來氣自豪先生藻思湧秋濤斯文本逐年衰壯取與何嘗有彩毫題北苑亭柱羈懷牢落獨登臺幾𬒳時人笑不材只有青山最憐客翠幈如畫四圍開贈相者雪庭東谷二絶道人宛有雪山清顧我眉毫近九齡最喜一生心事好又看黃色起天庭雪裏踈梅儘耐寒功名都在晚年看煩君與卜趣裝日早晚孤舟發建安全氏小樓與南山相對殆几案間物也暇日觴豫其上索賦鄙作因口占二絶句閭閻撲地不容間疊起重棚翠靄間樓下市聲喧午枕藥爐頭上看青山東籬遙見喜悠然况在風煙咫尺間滿勸銀杯留客醉夕陽佳處鳥飛還南山秋色兩爭高終日相看不待招一炷龍涎滿樽酒安排詩思苦相撩過朱家府并序至元草七年冬孟過朱家府謁太師遺祠瞻拜禮像懷德不巳敬留四詩付林彬二孫庶幾鑽仰意云晚進小子汲郡王惲斂袵百拜書世仰遺祠愛及烏不緣喬木緣隂餘題為通德猶膚淺云是文奎所次墟濂洛尋源到聖功八方吹偃舞雱風一椽得近東家住瓢飲肱眠樂在中金聲遺響已千年聖道重光自子傳不為武夷山水窟拏舟還艤杏壇邊神而能化自人存毳冕凝旒以道尊德澤未應移五世青袗長見讀書孫張家灘在建陽縣南五里張家灘下石縱橫舟楫經過與水爭行路險巇皆一例溪聲何苦不平鳴武夷溪口謝諸生來迓諸生濟濟半深衣鞭馬來迎候武夷把酒向前爭致語精神全在去年時望武夷諸山武夷山水儘清竒石作龜麟玉作溪望入神清虧一到壁間空擬老歐題崇安道中十月山間不覺秋青林依舊鎖深幽西風老却黃雲稻野水溝溝澗澗流贈石堂和尚梅花樹下石堂僧楚語咻咻碧眼稜盛説輔陀神力大碧丹療疾百能徴道人來自武夷山袖有千金起廢丹専意濟人無所取一年強半在崇安過大安嶺愛山不厭入冥搜薄霧空濛為少收意似范寬誇老筆亂峰明處露礬頭大安形勢鬱峥嶸閩海東蟠未了青往返兩回煙雨暗不容詩筆寫真形前有群狐後有豺老懷悽斷嶺猿哀此行可卜新年順無是無非下嶺來萬里生還豈偶然一聲長嘯下蒼巔開頭若要留詩去記我今冬下嶺年下嶺人言出厄年一杯湔祓瘴江煙紫溪嶺下重回首巳勝班生到酒泉過稼軒先生墓在鉛山州南十五里陽原山中草七年自福唐作青銅三百了時文大節知公在致君朝野不應傳樂語六宫春動鬱金裙相秦審勢不明理坐使炎興失逺圗力主備邊信大義先生真是孔明徒遺編三復美芹辭睿眷曽蒙孝庿知黃壤不埋忠義氣至今煙草見蟠螭老徽北狩七陵空奉命南來見匪躬誰遣廟謀空坐老一椽精舍帶潮東招提遺像見英材喬木秋風過客哀通曆縱令追削盡疊山文是漢雲臺次鉛山示州尹杜君西連兩廣天荒處東接三山海盡頭喜見寬平風土美鉛山今合作中州余去冬過此今歲復由此北歸觀其田里城居比之前日精彩數倍詢之蓋侯杜新政之所致也喜為留詩而去題寒碧井在鉛山州東五里寒泉湛碧石為嵓鯨口長噴色更藍六月行人方困暍一杯永雪蜜同井沙溪道中馬知驛近趨行迅詩為山竒捉句難行過沙溪都忘却際空原野喜平寬喜得臺報弓刀霜冷五更𥘉破睡無方有疾驅不為殘年誇老健暫教粧點早行圗欲進行難愧素餐當機坐視更何安從今漸覺身心適秋水鳴蛙不屬官下山風袖任披披來路回看在翠微貪戀紫溪山路峻不知寒霧濕征衣玉溪登舟捨鞍乘木玉溪煙坐聽吳歌踏兩舷東抵餘杭西自信一千里路月明船食柑黃柑香熟夜來霜比似休官味更長道出三衢冬十月石塘林圃記𥘉嘗夜發嚴州亭亭白塔過嚴州漫漫清江不盡流慚愧釣臺臺上月分光也照逺回舟桐江待發柁師説似小兒童一覺平明意莫匆待彂桐廬遲是速舟隨潮退疾如風夜過七里灘都俞無幾巳還山自笑瞞􅘐老一官為恐石壇松鶴笑夜深舟過子陵灘錢塘道中長路人家不斷頭冨陽東下接杭州如今不似勾吳日猶自歌聲沸酒樓余自閩中北還舟行過常秀間卧聽棹歌殊有愜余心者每一句發端以聲和之者三扣其辭語敷淺而鄙俚曽不若和聲之歡亮也因變而作十二關且道其傳送艱苦之狀亦劉連州竹枝之意云露華冷浥蒼山碧江水平鋪素練光半夜棹歌相應起發揮無用詫鳴榔今秋湖濼兩相通差遣雖頻力易攻度險却防連夜發泝流還怕打頭風兩浙人稠不易安少罹凶慊即流遷今年苦惱蘇常地易子營生不計錢睡思朦朧苦未休棹歌催彂五更頭兩盂悶飯無鹽菜雨雨風風一葉舟朝來回棹喜空船坐唱吳歌踏兩舷淘米墩頭風浪起最防吹入太湖煙中産攢來六七家終年執役在浮槎今年水淹田苗盡少米爭前乞使華水色山光不易吟却教欵乃發幽深㫪陵不作吳兒事道是雲山韶濩音岊江灘石苦經過音莭聽來噪未和不似吳儂音韻美遺聲全是竹枝歌夢驚蓬底卧秋江一句才終和者雙任使再歌聽未巳不知寒日上船窗幹當江南有許多往還冠蓋似攛梭因兹力役無朝暮欸乃翻成懊惱歌路長江闊霧煙埋盡日長征帶夜開記得往年日𬒳差冠蓋有時來迢迢江上亂峯青路轉山回逺作程來使共稱星火急不容停待晚潮生水仙萱草二詠并序豫行次赤岸兩浙憲司屬吏侯仲卿拿舟自杭追余四十餘里及之拱立水次致紫山之意仍索賦水仙萱草二詩詢渠别有何故曰無有豫笑曰淡癖好名有如是者遂書二絶以付時至元二十七年冬十月二十二日也片帆歸自海東頭何限煙江疊嶂愁展放畫圗還一笑丗間名品果忘憂緑萱不得獨忘憂江草江蘺揔帶愁若使花神真解事一枝金鳯也垂頭雪作肌膚翠作裙凌波微步襪生塵茟端欲見錢郎意重為陳王賦洛神望歌風臺西風殘照舊山河故國遺臺憶獨過四百威靈歸寂寞斷碑猶記大風歌漢家豐沛有周邰四百炎輝自此開舉目不瞻龍虎氣寒鴉翻日上荒臺奉春一説即西行百二江山敞帝京不似楚人無逺略錦衣東帝詫韓生石勒問道圗位號真來變故多溥天無地不干戈養成豺豕蕭墻禍更向伊蒲問甚麼題范亜父增墓在徐州城南臺頭寺下大冢劒舞鴻門失此機重瞳成敗可前知猜嫌只待捐金後決意東歸去已遲單父琴臺武侯治蜀毋輕赦宓子彈琴不下堂風俗變移難復古後人為政貴論量讀佛圖澄傳慧眼前窺事有徴最慈祥是戒淫刑阿師更欲矜神異塔上風鈴要細聽雪漲千山圗六合雲同雪自寬千山都變玉孱顔限量不似年來雨多處淋淫儉處慳月草一日河南雨三尺河北全無喜周宰來居友道年來棄若泥白頭傾蓋似新知短轅塵尾關渠甚誚殺當年蔡克兒筋力覺衰防酒困生涯從淡碩詩工尚憐繆誤今何幸長在周郎顧盻中吾友西歸喜可知殘年心事得追隨朝來僦舍清談久憶得西齊共𬒳時諸子當年甫冠昏執經同在鹿庵門相逢正有謀生急裂月撑霆不要論發雪𥘉霏踏雪携壷扣夜扉長記孔門多披風袖詠而歸泉水思歸有故交共山無地可誅茅羡他僦舍同來燕終日㗸泥輔舊巢周兄所至號能官既幹而清事更難昨日借車還故里囊空留得一錢看一别淇南又十春此回相見更情親河山不隔黃壚斷屈指同遊有幾人翻雲覆雨到澆漓長愛吾周重所持四十五年同一日物情心事兩相知人生七十一衰翁比老能間樂事融著手不遮西去日閉門同卧北窗風山陽髙興在筠林痛飮狂歌揔賞音四十五年雖轉首白頭同賦故山吟柱頭化鶴千年事松下懷人一聚塵撥置老懷休悵惋且來同醉酒壚春才沾公祿能糊口縱得居官奈老何暫借麴生供日事何嫌酤釀近林婆過郝教授子貞故居三首雲際曽瞻處士星竹間無復草堂靈喚回三十年前夢壓酒槽邊寫六經一言拋却羽人冠長喜先生不逺還故隱只今誰作主詩瓢空挂百門山平生詩卷幾牛腰身後遺文便寂寥事業文章元有分自餘辛苦枉相撩回河常年動磑踰三月孟夏中旬見稻芽今歲使君先玉食清明分水與農家題胡笳十八拍圗漢丗婦人傳家業善文辭者前曰班氏後稱文姬琰不幸遭亂失身悲憤知耻至發而為辝章者而巳如是在東漢文章清而不俚者也其音調悽楚緣琴翻聲律協笳拍而於音學曲盡窈眇可謂不墜中郎之業矣今觀是圗其情義相牽不克自制之懷猶可想見於當時也此辭即唐劉商所作以七言較之益無疑矣因題五詩于後騷人擬之之意云畫却春山理素琴翠簾香鎖落花深豈知中有胡笳恨吹折關山一寸心胡笳翻曲太含情不道倉皇義重生舊怨未平新恨疊鴈聲才罷又邊聲乾翻坤覆困蛇龍女子柔衷鮮克終全著靡他論蔡琰不知何地置楊雄憔悴風沙十二年得歸情義轉相牽董郎庭户雖啓舊已是蘭摧白露前才慧其如薄命何猶能知耻見悲歌寥寥誰後得續離騷幸儘多跂徽宗畫兔格物心存養聖功老徽遊藝眩青紅四靈瑞丗渠何者也在君王物色中牧牛圗垂紖徐行信自如一揮鞭䇿見齊驅近來不似圗中看旱塊𫾣蹄百草枯青青春草滿郊原放飽歸時不用牽何似人牛俱不見碧天明月靜姢姢緑楊堤岸曉風清碧草陂塘暮雨晴村落近年乾旱損却將圗畫看升平兩童相顧意何為猶恐渠飢趂草歸一道牧民無所事處心專在當家肥飽耕飢放事年年放去收來任自然莫訝兩童無所識至今牛背是堯天跋徽宗畫馬圗為愛瑶池噴玉龍麝煙移入畫圗中宣和殿上揚休處忘却熙河汗馬功問雨六月五日雨三寸前日西村雨有餘東村曽不少霑濡望中雲氣西南重為問村東果有無從來暑雨多隔轍且喜一概蘇焦枯𫾣蹄旱塊如盆火為問秋田勾得無近日井霖遍四周隆都在郡城火無光淡跋武陵圗淵明髙興託冥鴻流水桃花事本空好笑武陵狂太守謾回煙棹月明中題數學鄭斗南詩卷洛圗河數發天機萬彚中來理莫違却有一言煩説似貴人何廣福人稀數學規模自易齋不煩衰薄究豫懷朝家謀斷須房杜早晚相携上太階巢父飲牛圗巢由真隱本同儔細論吾巢莭更優老牸渴來何所擇徑須牽避是非流靈照度丹霞圗衆生種業到無該愛海沉迷喚不回對證處方唯一捨不應真假比如來西江萬有巳沉沙更有何心到散花很似入門三十棒欵將一語了丹霞性定情移逐物開力能剛制見英才金沙灘畔風流骨恐是逄埸作戲來克已先論定力優後從屋漏驗清修禪家多少間拈弄糞掃堆頭覔悟頭和彥正憲使寄周宰詩韻且酬前日見贈之什紛紛黨議到無如常愛林宗智有餘金谷聚蚊潘在數一生空枉賦間居自憐豦事太遲回幾𬒳傍人笑懦哉勘破南華山木喻支離井作散樗材山陽水竹接雲莊真是間人避丗鄉殺馬毀車渠莫訝風波平地更羊腸殺馬毀車東漢馬良事故舊追歡不厭頻甚時王翰作比鄰相看比老都能幾猶作離羣索豦人時與心違儘倒顛且將書史度殘年樂天仁厚知幾逺好箇香山獨往篇佳人倚竹圖失路青雲恨未深更堪空谷日幽沉天寒翠袖相依處却是琴中對竹心和幹臣詩韻六首清江百折萬重山倦鳥翩翩不易還有客又來詢動靜不知馮道已癡頑一雨焦黃荔子丹去年今日宴東山山僧勸酒賔僚唱醉裏肩舁月下還樓閣三山景氣鮮萬家簾映荔枝妍紅雲酒美香粳滑只枉風煙是海邊泉石鷗盟尚可尋老懷其奈丗緣深將詩細嚼要豫和有酒深藏待子斟吾儕從事思行道尺未容伸巳枉尋不若將心隨所好物情明見古猶今人生兩足無不到去歲天涯今故山古語在家貧亦更憐吾子適東還復用苦齋韻作五詩以自警剽竊詞章笑自如何曽經旨醉三餘卑凡自處有如此誰復如軻以聖居終日如愚莫哂回克先復後並生哉從𥘉一著髙空上即是盆成死矣才學須一念主端莊漸次通融理義鄉况是四端生巳具幾曽由外貯肝腸濂洛諸儒問答頻道雖未冨亦其鄰異時酬酢無窮變不比禪林面壁人刺口髙談謾聖顛人心能淑變堯年孔門多少齋心學見用還存問政篇四月草六日西溪睡起城居喧隘一蛙坑乍到郊墟眼倍明濃睡覺來村塢靜緑楊深處栗晉聲灌園倚鋤看水立斜陽愛殺春風菜圃香自笑老叨須肉飽却思竒䇿出𬞞腸馬嘆足輕行穩不揚塵種性來從野馬羣昨日緑楊亭下路郡人爭羡五花文市來一馬性馴良竹耳雙批秃尾蒼笑殺飬生王武子辨教銅歷葬人腸擊壤軒軒旱塊大於盆朴擊都教細作塵便覺靜夕陽原隰看畇畇老子過關圗韓虬筆論道休將坐井觀逢時為用見真筌漢家注措才糟粕嘉靖寰區近百年柱下潛輝迹已賒青牛苦要渡流沙料應紫氣浮關後夢繞春風巨勝花贈武昌相士秋雲羡君兩眼明如鏡萬事都歸一盻中自笑本無食肉相虛名空似豹林种扣門有客號秋雲偶與微言最近真過眼無窮軒蓋士急流中退果河人品彚雖殊智欲周江南江北去悠悠多應未遇啇嵓叟點破長空萬里秋跋􅃮園田氏手澤金源取士自科文臺閣公卿半鳯麟後進且休輕訾議試從田氏看潛珍跋顧虎頭所畫謝安東山像出處當年繫重輕枉將浮議論蒼生異時兩袖東山雨待與君王洗甲兵跋香林先生顛草涪翁醉草井露帖勢與江山爭長雄幾丗幾年當復得香林筆底有遺風嘗愛井露詩草聖筆勢縱橫破碎陳敵今觀香林先生遺墨得涪翁步驟為多具眼者當至元元年有所思莫道當時無義間四題謝太傳安勝負胸中料已明又從堂上出竒兵怡然一笑文揪裏未礙東山是矯情周將軍江東注伯仁茂弘中忮本辜恩異時淚灑中書省空慰將軍石上魂髙司空允龍顔震電威伯恭持正見臨危挺然不應前星人臣要不欺王丞相猛當年北海螭對談捫蝨果何為華陽未入君王裏風雲只自知謁玉泉真像五首幾讀九山碑管葛襟期漢相規思欲執鞭那可松下獨來時民五十年後人經濟渺難攀須知浴日回天領間麒麟事業新有言到伊周元不是庸人丞相祠堂憶重尋幾年西崦柏森森入門再拜夫人表忘却登山力不任揔道書生吏事踈米鹽無術應時須請看中統元年事濟濟得朝廷半老儒豫讓邀襄子圗智氏頭顱到溺旋趙襄謹避墮空然若圗伯也非常報合有嘉謀在死前一言感激命為輕九死酬恩不為名千古晉陽橋下水不應嗚咽恨無成酬溫仲敬以櫻筍見遺四月人間櫻筍局喜將二物特相遺故家風味依然好獨有溫郎是素知春睡起偶書西墅東軒壁留連春色花隂蝶斷送林歌雨桞鶯更愛靜中消遣處春愁滴破聽槽聲題王明村老黃店壁八絶壬辰歲三月草五日葬曲山回作西山千疊玉稜層踏雪當年過五陵破帽不知風力緊夜窗歸趂讀書燈荒荒野曰店東西路入蘇門草樹低記得鹿庵傳授日饐瓜亭上識西溪今年上廟客紛紛賸具黃粱與酒樽白髮故人渾不見青衫多是子和孫曲山靈柩夜來過腸斷春風薤露歌同輩眼中多顯逹一生心事最蹉跎危嶺南蟠縮尾尻伍城東望俯坑壕蹇驢馱過王明店陡覺西山百倍髙古槐盤石緑隂垂下馬行人倦午馳每過黃翁間話舊停驂長到日西時中陽川逈屬新中店舍𥘉開映棘叢四十九年才一瞬黃郎今日老黃翁筠林同業憶當𥘉幾醉黃翁舊酒壚鄰笛聲中何限恨不堪零落曉星孤五五今獨豫在當時同門者十三四人止有李士觀傅士開秋日即事風軒兀坐髮鬅鬙涼入簷花露氣凝詞客感秋驚歲暮半生虛負讀書燈題嘉山假冝之讀書堂圗山水雖佳以士名誦聲曽動草堂靈至今松桂林中夢不識無禾飬百齡墨梅偶賦梅葉天質本紅黃玉潔氷清徹骨香近為丗間貪墨客硬隨時丗作新粧秋澗先生大全文集卷第三十一
