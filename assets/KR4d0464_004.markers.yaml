  - {type: indent, offset: 2543, content: 　　　　, id: KR4d0464_krp_004-bkkind17}
  - {type: variant, offset: 2543, length: 674, content: 感興詩三首中丞子𥘉過訪憫及生事述此以見志亦古人感遇意云不製衣日僅兩盃飯得年過期頥此亦何足羡是非華軒口悦芻豢平生未嘗學晩歳似有見盈望五秉粟禦此飢凍患閉門了一經庶幾思過半到羞澁百計若為辦人生霄壤間所卑恐有限分外思錙銖有力不容綰傷哉道難或拊掌發浩嘆士不吾知胷次何磊落少當利害間鮮有不顚患在無定方多學昧所樂出處况大節未用從人開談話艱辛汝豈有求託譬彼飲與食孰不知飢渇區區俟渠决肥瘠不相腭在我弗能了彼豈吾可校讎天禄閤我甞讀其書辝旨徒意何有止得寂與寞物來有當行道在吾面事所在俗争取維抱見售耕韞侯其沽䧟入中可爲征又昧出困舉湏利所有客語予固宜僂所論誠足門有時且入此室處苦寒昌黎體四年丁亥冬玄冥肅坎治太除包元陽少苦無風色悪積雪不在地隂機發新玄霜佐隆嚴宿助重曀長空浩乾冷於虎甚伯有厲一氣粟生膚酸鼻冰涕酒澤水空破裂山石潜獸忘群巢鳥交倚熒惑慘不芒崑火澹不熾東皇約祝融縮首避權勢天弧弦屢折何有琴瑟輩薄帷透三衾夢凛神不寐暖老玉無憑炙手竈可媚閭巷稀徃來雞犬噤嗚吠茫茫堪輿間欲逭何所逝若将肅殺威一変寛大制時當謹蓋藏理合絶掩蔽雖威貴不猛革故不失惠明知勢非恒其奈日増劇冨人尚云哿貧弱胡為濟里門有殣僵穴䖏返得計我時幸深藏順此天地閉無餐又無褐不易卒此歳有客過予談歲律何時易九陽消一隂萬象回生意予因語過客無庸心過亟四序本平分過差自成盭此雖節氣正未免急恒致循環万化輈一刻何甞滯昨晨履中園芳樹一為睨枯枝雜凍條芽孽巳萌綴都無十日春迎致勾芒祭土牛送餘威斗柄挿寅位汝冝姑待之能作幾日崇我閑亦已乆幽空懷霽偶書苦寒辭又成韓筆贅何當凌景風下折炎洲桂古云玉燭和調爕由獻替冥冥於两間侣恐不関係天運諒自然何俟呶吾喙, WYG: ''}
