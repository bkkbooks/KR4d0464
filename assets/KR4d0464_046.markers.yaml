  - {type: variant, offset: 10606, length: 335, content: 祁氏四子名説汴梁士人祁祐之治生而不求冨楽善而不近名尊賢者使教子讀書意在亢宗起家介司計楊敬夫求名字其四子予謂為善好學積累能又則恊氣感發其興也勃然如水之淵渟滙滀一且洩溢騰而為雨霧降而為川流有不期然而然者祈氏子誠能勉力進脩則於志成羙其庶幾乎故其名與字皆以水命意焉澤字潤甫淵字濟甫源字湜甫濤字浩甫鳴呼小子其聽之母忽王從事季明子説兵馬指揮即前世執金吾軄也其從事王李之之故人也以通家好出拜其子詢夫小渉即其命意以連僧昜之因求訓誨廼祖少從西菴楊叅政樽爼士大夫間風流藴藉以通才稱惜乎竟汝父夙蒙中丞王西溪提誨持身從政不失不偶優㳺常調然在相衞故家間屈指可數若家世之隆替係子孫之賢否欲其才賢讀書修業而已在我者旣盡逹則身立名揚光昭世緒窮則為善人吉士此理之必然小于其服之母斁石抹氏子名字説大德庚子冬, WYG: ''}
