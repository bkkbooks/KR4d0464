  - {type: variant, offset: 10943, length: 197, content: 翁歩入文殊東院主僧量示予木鏤瑞像一龕何精妙也詢其孰作曰汝南監郡石抹君也為人端整白晢辭語灑灑有章天性機巧不待師授而能今年三十有三始筮仕入京師既而僧印耒謁言辤容止與向間脗合資何出之晚耶荅曰叔父國用從四年母老侍疾持服年兹皆家觀光上國而名字未立何以稱呼先生顧卹為之訓誨曰勉夫志之命名用世亨字之夫雕鏤刻畫特志其逺者大者傳曰貞固足以幹事亨誠能貞正以固其徳幹敏以運其昭先丗之業廼所以望於吾子也其秋澗先生大全文, WYG: ''}
