  - {type: variant, offset: 0, length: 208, content: 秋澗先生大全文集卷第十七奉誄大丞相忠武史公贈太尉勑撰神道碑翰林學士王磐文萬國鞭笞走帝庭堂堂争識漢孤卿元勲髙出麒麟上曠度𥘉無智勇聲儷景去翻髯影駕柱天留在笏端銘白頭無地酬知已痛為蒼生涙滿纓追晚元遺山先生文奎騰彩憶光臨孺子何知喜嗣音余年廿許以時文贄於先生公喜甚親為删誨且有文筆重於相權奉山㣲塵之說即𣣔挈之西行以所傳卑余以事不克至今有遺恨云党趙正傳公固在陽秋當笔我奚任天機翻錦餘官様月户量工更苦心野叟亭空遺事墜荒烟埋恨九原深, WYG: ''}
