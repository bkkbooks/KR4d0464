  - {type: variant, offset: 1766, length: 448, content: 公南去五閱春邇來拜公情更親公雖引年乞謝事看公神觀老益振當年上壽客滿座奉觴迭起爲公賀犀軸綺語光陸離𥿄尾挂名惜欠我八十行及李東軒九十㑹到鹿菴年願從期頥數滿千我亦預備長生篇王鹿泉蚤歲聲華便軼群學擾不輟向來勤兩宫垂顧逢千載三世讀書萃一門蘭省柏臺留讜論玉堂金馬愌雄文平頭七十無多賀㑹見諸孫子又孫故翰林學士秋澗王公哀挽詩序内翰秋澗公謝事之明年終命於家春秋七十八寔大德甲辰六月辛丑也儼聞之悼心失圖彌日曩自幼挹公盛名知衞有三王與吾魯有四傑並甞求其所爲文諷誦之愛其氣格雄㧞不窘近世繩尺毎以不獲樞衣趍隅一問津焉爲疇昔恨旣而公提憲山東按部過鄆始遂一拜履絇輙辱折行軰以待聽其論說古今文字淵淵浩浩有源有委如法家議獄絲髮不少貸一歸公是而止使人胷中之滓都盡嚮來瓣香於是爲贈爾後參商相望瞻拜弗獲徒有江空歲年晚之歎壬辰同𬒳召詣公車入見世祖皇帝于上林苑癸巳又同拜北扉之命甲午抑又同在史局纂修世祖皇帝實録幸哉日得聆謦欬備准諾惠教弘多尋儼移病歸及再入奉常公巳登七秩矣乃出諸名勝賀章見示且命追𥙷前作爲賦七言長句公過爲激賞辛丑拜章引年甚力朝, WYG: ''}
