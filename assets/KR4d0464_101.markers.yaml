  - {type: variant, offset: 3787, length: 134, content: 建元左丞姚公宣慰東平辟充詳議官尋𬒳中書召特授翰林修撰同知制誥兼修國史院編修官制詞有行已無玷愽學能文顧超絶之逸才足鋪張於偉績之㫖士論榮耀焉一時詔制辭命皆出其手共稱敏瞻既而兼中書省左司都事建言曰廟堂出治之源今機務草創當究其本末先後酌而行之允焉遇事詳處得冝同列許其眀逹至元五, WYG: 二}
