  - {type: variant, offset: 2451, length: 429, content: 生小子於何考德問業焉少陵所謂長嘯宇宙間髙才日凌替豈不重可哀邪廼擬楚騷之亂以抒余哀其詞曰太行壁天兮横亘坤維篤生偉人兮企其齊而鞭赤龍兮駕白霓凌倒景兮㓕没其可追䟽决雲漢兮黼黻明時渾渾灝灝兮孰闚端倪雄咮一鳴兮喑萬溘塵埃野馬之一瞬兮浩江河之獨馳嗟形蛻而神往兮逝者如斯與造物者爲徒兮萬萬古猶一朞大冠如箕兮珮玉陸離耿音容之在目兮眇一去而不復來叶顧四方上下安所止兮雖巫陽九招竟奚爲諒冥冥或昭昭兮知邪弗知哀鐸有詞兮尚以聲吾悲陳儼歛祍端拜學與天淵慱名隨事業新文章早無敵字畫晚逾神冥躅追前哲遺芳澤後人獨憐秋澗月猶照玉堂春劉敏中斂祍書司馬凌雲氣逼真廣川精學道爲隣文章舘閣三朝舊冨貴児孫八十春醴酒常存沾講舌内帑特賜表詞臣歸來勘破浮生夢白玉樓成筆愈神劉愻頓首上文章字畫世争傳四海飛聲自早年冠豸一方騘馬使腰犀二品玉堂仙承家素學児孫貴謝事清朝壽福全零落山丘懐謝傅西州門道獨澘然王徳淵載拜儒林冝有傳汗竹藹餘青筆陳如飛電詞源若建瓴方登群玉府遽憶湧金亭欲扣平生學撞鍾愧寸莛疇昔聞淇上三王藉有聲共推, WYG: 至五代}
