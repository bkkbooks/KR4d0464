  - {type: variant, offset: 3094, length: 255, content: 世荷恩榮表弟韓從益再拜縱横筆陣知無敵如將升壇拜韓白先登劘壘特勇夫投石翹関乏風格黄金端可鑄鴟夷坐困強呉覇全越文埸自有萬人英豈尚虚浮棄真實唐興継代重詞科往往篇章見家集世衰䑕尾競喧啾天下幾人能事畢王公才敵異徹侯悄焉夜壑藏虚舟倐焉有力負之去不譲横槊劉并州勢如偃屋建瓴水熟如平地馳輕輈味如調羮夏鼎臠温如器琢崑山璆平生無意修邊幅丈室凝塵勝華屋詩腸耿耿少陵心經笥便便孝先腹豸冠繡斧滌源清視草判花隨意足南歸郷里未揮金寂寞荒阡竟埋玉獨存秋澗大全文來者相傳誦芬馥至大改元春三月望日洛客暢師文再拜束髪躭經晚益勤平生精力盡斯文先朝十老, WYG: 百年况乎}
