  - {type: line-break, offset: 0, content: '', id: KR4d0464_SBCK_101-1a01}
  - {type: variant, offset: 0, length: 1319, content: 秋磵先生大全文集後序先考文定公人品髙古才氣英邁勤學好問敏於製作下筆便欲追配古人騰芳百代務去陳言辝必巳出以自得有用爲主精粹醇正非他人所可擬自其弱冠巳甞請教於紫陽遺山鹿庵神川諸名公愛其不凢提誨指授所得爲多及壯周旋於徒單侍講曹南湖髙吏部郝陵川王西溪胡紫山之間天資既異師問講習者又至継之以勤苦不輟致愽學能文之譽聞於逺近其後五任風憲三入翰林遇事論列隨時記載未甞一日停筆平生底緼雖畧施設然素抱經綸心存致澤桑榆景迫有志未遂一留意於文字間義理辝語愈通貫精熟矣故學者以正傳名家推尊之旣捐館公孺編類遺藁爲一百卷字幾百萬咸謂學有余而不盡其用者則其言必大傳於後奈家貧無力不能刋播言之䀌傷若㷀㷀在疚恐一旦溘先朝露目爲不瞑矣延祐已未歳冬季孫苛方任刑曹郎官走書于家取其遺文云朝廷公議光祖資善府君平生著述先明正大関係政教甞蒙乙覧致有弘益堂移江浙行省給公帑刋行以副中外願見之心公孺聞之不勝欣躍因念韓文公爲唐大儒學者仰之如山斗其文集自唐至宋歷二百年之乆頼桞如京之賢方刻板本流傳於丗先君去丗今纔十五寒暑特蒙朝廷發揚如是實為希闊之遇于以見聖朝崇儒右文之羙光賁千古矣延祐七年庚申正月載生明男王公孺百拜叙書于后秋澗先生大全文集後序翰林承旨文定王公衛之名儒秋澗其號也從游遺山鹿菴紫陽神川四先生之門講貫漸磨深造閫域語性理則以周邵程朱為宗論文章則以韓桞歐蘇為法才思泉湧下筆輙數千言星囬漢翻韶鳴鳯躍千變萬狀可駭可愕文中巨擘也學古入官敡歷清要内而金馬玉堂外而豸冠繡斧所至有令譽雖公務填咽手不釋卷耽書嗜古天性然也公長子翰林待制紹卿嘗集公平生所作分爲百卷題曰秋澗先生大全文集庋藏家塾以貽後人繼而有聞于朝者取而寘之黄閣未幾􅏖發江浙行省議鋟諸梓卷帙繁工費夥或者難之庚申冬檄送本路俾㑹學廪之贏以給其用命出省府奉行惟謹矧余與文定居同鄉姓同氏視公猶父行承乏嘉禾幸獲覩公之遺文又安敢不用情耶迺命郡愽羅君應龍任其責學録余元第專董其事仍委藺溪州判唐泳涯校正擇諸生中能書者重為繕冩以授刋者工役甫見次第余適叨廣東憲節之命秣馬就道遂書此以卑禾學刻之卷末云旹至治改元重光作噩歲清和月古衛王秉彛謹序秋澗先生大全文集卷第壹伯終秋澗先生大全文集附録制辭授翰林修撰王惲行已無忝博學能文顧超絶之逸材足鋪張於偉績冝司綸命以賛皇猷可特授翰林修撰同知制誥兼國史院編修官當振斯文以宣朕命封謚制曰文章與時髙下陋乎宋而追乎唐人材隨世汚隆尊其官而羙其謚僉謂賁戔之信度大兹渙號以楊庭故翰林學士中奉大夫知制誥同修國史王惲慱學修能雄文逸氣五持憲節誅鉏吏弊而翼植民彛三入詞林敷潤皇猷而表章帝典進承華之昭鑑恢儲聖之良規勸其遺書蓋抱經綸之志詢夫成績豈徒黼黻之才惟治朝蓍蔡之是稽繄晚生斗山之所仰式遄歸而請老遽興歎於云亡睠彼壽耆議斯節惠於戯有斐君子何盛徳之可忘無競維人尚𥙿昆之克紹肸蠁巳朕魂魄猶強可贈翰林學士承㫖資善大夫追封太原郡謚文定主者皇帝聖㫖裏中書省御史臺呈據監察御史呈切見故翰林學士秋澗王文定公文才愽雅識見老成廼中州之名士也頃在翰林曁居臺察觀其因事匡時立言傳丗未甞不以致君澤民爲心端本澄源是務進呈承華事略蒙𥙿宗皇帝嘉納俾諸皇孫傳勸弘益良多近日又蒙聖上特命張司農等再行繪冩以賜東宫若非深有可取豈能如是哉即係兩朝御覧珎重文集又有元貞守成事鑑中堂事記烏臺筆𥙷, WYG: ''}
