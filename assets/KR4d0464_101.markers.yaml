  - {type: variant, offset: 3559, length: 1, content: 謚, WYG: 乃降常雨害於粢盛百川沸騰壊民廬舍固其宜也王者茍能修五政崇五禮禮不凟政不紊則五日一霏㣲十日一霡霂十五日一滂沱謂之時雨所以正五運之制節占象晷刻無有差爽則神農之世其驗歟世宗嘉之國初遷禮部侍郎依前學士判太常如故是時祠祝樂章宗廟諡號皆儼所定撰人服其該博儼沖澹寛簡好賢樂善平居怡怡如也未嘗失色於僮僕優游}
