  - {type: variant, offset: 3566, length: 6, content: 妣吕氏臨清大, WYG: 太宗熙宗海陵庶人世宗章宗衛紹王實録闕宣宗哀宗實録闕志書七天文五行附地理邊境附禮樂郊祀附刑法食貨交鈔附百官選舉附兵衛世襲附列傳舊實録三品以上入傳今擬人物英偉及勲業可稱不限品從忠義隠逸髙士附儒行文藝列女方技逆臣諸王后妃開國功臣在先書示仲謀王相修史事宜急不宜緩多年採訪竊恐老人漸無費用不可惜當著厯令一人專掌以後元裕之蕭公弼奏用銀二千定今即編修書寫請俸飲食紙劄費用作若干定撰三五百定都了又命採訪文字令言者旌賞隠者有罰仲謀所宜著心編修且要二貟直須選擇如魏太初及周榦臣云云本把合用儒人兼管不宜用他色目如他日同修編修人來房屋決少目今便合商議起盖盖下房屋都在文廟以後也得用謂如仲謀兼編修徒單雲甫受直學士兼同修李仁卿學士兼同修胡紹開年小也宜喚去比至定俸且與批支若}
