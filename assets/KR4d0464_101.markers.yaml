  - {type: variant, offset: 3527, length: 1, content: 揚, SBCK: 􅀭}
  - {type: variant, offset: 3537, length: 5, content: 諱惲字仲謀, WYG: 旻尋亦即皇帝位於晉陽終旻之世猶稱乾祐四帝二十九年至宋太祖興國四年歸宋依今日所論旻係劉髙祖母弟在位四年其子承鈞嗣位改元天㑹五年郭周已絶郭周三主九年東漢四主二十九年東漢四主逺兼郭周郭亦不當稱周固當為閏宋太祖不曰受周禪傳至太宗方承東漢之後歐陽不合作五代史合作四代史司馬光通鑑當列東漢為世紀歐陽不合作十國}
  - {type: page-break, offset: 3537, content: '', id: KR4d0464_WYG_100-5a, image: WYG1201/WYG1201-0392a.png}
  - {type: 'kr:newline', offset: 3542, content: '

      ', id: KR4d0464_krp_101-bkkkrnewl234}
  - {type: line-break, offset: 3542, content: '', id: KR4d0464_SBCK_101-13a10}
  - {type: variant, offset: 3544, length: 0, content: '', WYG: 嗚呼國家正閏固有定體不圖今日輕易褒貶在周則為正在金則為閏天下公論果如是乎况蔡城一事盖天朝征伐之功是時宋之邊将専權率意自撤藩籬快斯須之忿昧唇齒之理自謂愛已而惡他延引强兵深入遵行覆轍徽宗跨海助金破遼之事媒孽後禍取笑萬世何復讐之有也宋自靖康以來稱臣姪走玉帛嵗時朝貢幾於百年豈其今日私論遽稱尊大果使宋廟有靈必可其議也泰和間南宋寒盟起無名之師侵漢唐鄧宿泗章宗分遣應兵其淮漢川蜀之間大為所破宋遣臣方信孺等卑辭告和請叔為伯進増嵗幣獻權臣之首韓􅇑胄侯師旦也繪其容漆其首函送幽都至於闕下信孺有古調一篇猶能草畧記之大朝君相仁且慈小麥未熟休王師姦臣豈足贖民命既往不咎來可追此詩書於上源驛壁間館伴使入朝題奏上頗哀憐是時中原連年蝗旱五榖不登山東猶甚章廟自責之心深重形於歌詠者頗多每以偃兵為念故詔百官議曰朕聞海陵有言我國家雖受四方朝貢宋猶假息江左亦天下兩家邪故有親征之行去嵗宋人兵起無名摇蕩我邊鄙今已敗衂哀懇告和朕思海陵之言宜如何爾時臣下本希上意故進言曰先}
  - {type: page-break, offset: 3544, content: '', id: KR4d0464_WYG_100-5b, image: WYG1201/WYG1201-0392b.png}
  - {type: page-break, offset: 3544, content: '', id: KR4d0464_WYG_100-6a, image: WYG1201/WYG1201-0392c.png}
  - {type: variant, offset: 3545, length: 4, content: 衛曾祖諱, WYG: 靖康間宋祚已衰其游魂餘魄今雖據江左正猶昭烈之在蜀不能紹漢之遺統大可見也和議乃定今日校之此語乃當時繼好息民之大畧非後世正統之定論或曰何以知之曰夫昭烈之于漢雖云中山靖王之後其族屬疏逺不能紀録世數名位南宋髙宗乃徽宗之子欽宗之弟嵗月不易以即位奄有江南似與昭烈頗異若以金史專依泰和朝議特承宋統或從今日所論包為載紀二論俱非至公座客又云遼之有國僻居燕雲法度不一似難以元魏北齊為比僕再拜而言曰以此責之膚淺尤甚若以居中土者為正則劉石慕容苻姚赫連所得之土皆五帝三王之舊者也若以有道者為正苻秦之量雄材英畧信任不疑朱梁行事篡奪内亂不得其死二者方之統孰得焉夫授受相承之理難以此責况乎泰和初朝廷先有此論故選官置院創修遼史刻期榜状元張檝預焉後因南宋獻馘告和臣下奏言靖康間宋祚已絶當承宋統上乃罷修遼史縁此中州士大夫間不知遼金之興本末各異者向使泰和間若是遼史早得修成天下自有定論何待余言座客愕然曰數百年隠顯之由何其悉也問一得三實出望外幸卒言之僕因就毫楮録狂斐以俟憙事者刪之庶備他日史官之採摭云爾燕山修端謹記鹿菴云古詩句多平字不能得健如杜詩古調一句七字有至六字無平者律則當如樂律和應否則不成音矣紀行嵗丁未夏六月初吉赴召北上發自鎮陽信宿過中山時積隂不雨有頃開霽西望恒山之絶頂所謂神峯者聳拔若青盖然自餘諸峯厯厯可數因顧謂同侣曰吾輩此行其速返乎此退之衡山之祥也翌日出保塞過徐河橋西望琅山森若劒㦸而葱翠可挹已而由良門定興抵涿郡東望樓桑蜀先主廟}
  - {type: page-break, offset: 3545, content: '', id: KR4d0464_WYG_100-6b, image: WYG1201/WYG1201-0392d.png}
