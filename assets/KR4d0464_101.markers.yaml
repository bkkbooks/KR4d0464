  - {type: variant, offset: 3550, length: 0, content: '', WYG: 良鄉渡盧溝橋以達於燕居旬日而行北過雙塔堡新店驛入南口度居庸闗出關之北口則西行經榆林驛雷家店及於懐來縣縣之東有橋中横木而上下皆石橋之西有居人聚落而縣郭蕪沒西過雞鳴山之陽有邸店曰平輿其巔建僧舍焉循山之西而北沿桑乾河以上河有石橋由橋而西乃徳興府道也北過一邸曰定防水經石梯子至宣徳州復西北行過沙嶺子口及宣平縣驛出得勝口抵梔胡嶺下有驛曰孛落自是以北諸驛皆蒙古部族所分主也每驛各以主者之名名之由嶺而上則東北行始見毳幕氊車逐水草畜牧而已非復中原之風土也尋過撫州惟荒城在焉北入昌州居民僅百家中有廨舍乃國王所建也亦有倉廪𨽻州之鹽司州之東有鹽池周廣可百里土人謂之狗泊以其形似故也州之北行百餘里有故壘}
