  - {type: variant, offset: 3513, length: 6, content: 煒是用追述先, WYG: 復讐之迹固可兼金愚曰元魏齊梁世數已逺恐諸}
  - {type: indent, offset: 3518, content: 　, id: KR4d0464_krp_101-bkkind49}
  - {type: variant, offset: 3520, length: 0, content: '', WYG: 不以為然請以五代周漢之事方之漢隠帝乾祐三年遇弑太后詔}
  - {type: variant, offset: 3521, length: 15, content: 身行道致兹顯揚者敢昭告于神道先, WYG: 帝弟武寧軍節度使嗣位名贇河東節度使劉旻之子後雖廢為湘隂}
