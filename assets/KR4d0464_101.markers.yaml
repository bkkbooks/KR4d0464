  - {type: variant, offset: 3596, length: 141, content: 公貴贈集賢侍讀學士太中大夫追封太原郡侯謚敏懿祖妣孟氏韓氏並追封太原郡夫人顯考諱天澤資剛明决科律學魁多士亡金忠顯校尉户部王事中年折節讀書務教子起宗所交皆海内名士易名文通先生用公貴贈正奉大夫大司農卿追封太原郡公謚莊靖顯妣靳氏追封太原郡夫人先公㓜有至性勤學好問若飢渇然弱冠受教於鹿庵王公詩, WYG: 謂}
