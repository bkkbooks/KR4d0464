  - {type: variant, offset: 3551, length: 0, content: '', WYG: 然連亘山谷壘南有小廢城問之}
  - {type: variant, offset: 3552, length: 5, content: 讀書郷黨化, WYG: 者云此前朝所築堡障也城有戍者之所居自堡障行四驛始入沙陀際陀所及無塊石寸壤逺而望之若岡陵丘阜然既至則皆積沙也所宜之木榆栁而已又皆樗散而叢生其水盡鹹鹵也凡經六驛而出陀復西北行一驛過魚兒泊泊有二焉周廣百餘里中有陸道達于南北泊之東涯有公主離宫其外垣髙文餘方廣一里許中建寝殿夾以二室背以龜軒旁立兩廡前峙眺樓登之頗快目力宫之東有民匠雜居稍成聚落中有一樓榜曰迎暉自泊之西北行四驛有長城頽址望之綿延不盡亦前朝所築之外堡也自外堡行一十五驛抵一河深廣約什滹沱之三北語云翕陸連漢言驢駒河也夾岸多叢栁其水東注甚湍猛居人云中有魚長可三四尺春夏及秋捕之皆不能得至冬可鑿氷而捕也瀕河之民雜以畨漢稍有屋室皆以土冒之亦頗有種藝麻麥而已河之北有大山曰窟速吾漢言黒山也自一舍外望之黯然若有茂林者迫而視之皆蒼石也盖常有隂靄之氣覆其上焉自黒山之陽西南行九驛復臨一河深廣如翕陸連三之一魚之大若前狀捕法亦如之其水始西流深急不可涉北語云渾獨刺漢言兔兒也遵河而西行一驛有契丹所築故城可方三里背山面水自是水北流矣由故城西北行三驛過畢里紇都乃弓匠積養之地又經一驛過大澤泊周廣約六七十里水極澄澈北語謂吾悞竭惱兒自泊之南而西分道入和林城相去約百餘里泊之正西有小故城亦契丹所築也由城四望地甚平曠可百里外皆有山山之隂多松林瀕水青楊叢栁而已中即和林川也居人多事耕稼悉引水灌之間亦有蔬圃時孟秋下旬麻麥皆槁問之田者云已三霜矣由川之西北行一驛過馬頭山居者云上有大馬首故名之自馬頭山之隂轉而復西南行過忽蘭赤斤乃本部曲民匠種藝之所有水曰塌米河注之東北又經一驛過石堠石堠在驛道旁髙五尺許下周四十餘步正方而隅巍然特立於平地形甚竒峻遥望之若大堠然由是名焉自堠之西南行三驛過一河曰唐古以其源出於西夏故也其水亦東北流水之西有峻嶺嶺之石皆鐡如也嶺隂多松林其陽帳殿在焉乃避夏之所也迨中秋後始啟行東由驛道過石堠子至忽蘭赤斤山名以其形似紅耳也東北迤邐入陀山自是且行且止行不過一舍止不過信宿所過無名山大川不可殫記至重九日王師麾下㑹於大牙帳灑白馬湩修時祀也其什器皆用樺木不以金銀為飾尚質也十月中旬方至一山崦間避冬林木甚盛水皆堅凝人競積薪儲水以為禦寒之具其服非毳革則不可食則以羶肉為常粒米為珍比嵗除夕輒遷帳易地以為賀正之所日大宴所部於帳前自王以下皆衣純白裘三日後方詣大牙帳致賀禮也正月晦復西南行二月中旬至忽蘭赤斤東行及馬頭山而止趂春水飛放故也四月九日率麾下復㑹於大牙帳灑白馬湩什器亦如之每嵗惟重九四月九凡致祭者再其餘節則否自是日始回復由驛道西南往避夏所也大率遇夏則就髙寒之地至冬則趨陽暖薪水易得之處以避之過此以往則今日行而明日留逐水草便畜牧而已此風土之所宜習俗之大畧也僕自始至迨歸遊於王庭者凡十越月每遇燕見必以禮接之至於供帳衾褥衣服飲食藥餌無一不致其曲則眷顧之誠可知矣自度衰朽不才其何以得此哉原王之意出於好善而忘勢為吾夫子之道衰而設抑欲以致天下之賢士也徳輝何足以當之後必有賢於隗者至焉因記行李之本末故備誌之戊申夏六月朢日太原張徳輝謹識商司業録到太常諸雜儀禮文徳殿宿齋儀注差官等景靈宫行禮儀注差官等太廟行禮儀注差官等明堂大禮陞降玉輅儀注明堂殿行禮儀注明堂殿星圖明堂大禮畢紫宸殿稱賀儀注明堂大禮畢登門肆赦儀注明堂升陪事并禮饌差官等明堂降御劄鏁院并奏告事明堂大禮修築路道圖明堂大禮笏記明堂大禮排日祭祀明堂降御劄修路教車按輅等年代月日明堂大禮逐次䟎那更㸃明堂大禮差五使等官年代例明堂大禮總差官頭冠法服様玉輅圖玉輅件段尺寸及太平車尺寸等逍遥平輦圖并尺寸等太常樂圖祭器圖黄麾大仗圖明堂大禮文武官合著服色等御龍直執從物圖明堂大禮鼓吹雞唱警塲圖明堂大禮樂章樂曲明堂大禮合降指揮等明堂大禮為值雨降過生創指揮例明堂大禮諸雜事例等明堂大禮秖應并鋪分人數等熙朝盛典詩大安輦件段明堂大禮敎象申請事節計三十七冊曰明堂大禮景定四年藍大正記至元三十年三月二十九日商琥録宣和鹵簿圖祀園丘圖東封泰山圖監修國史例忠齋劉承㫖説宋朝監修國史宰相初任者謂之開局一月一至院謂之過局至元三十一年甲午七月初四曰右丞相旺扎勒受開府儀同三司監修國史右丞相如故竇儼水論周世宗南伐駐蹕臨淮因覽唐貞元中泗州大水記詔竇儼論其事儼獻文其畧曰夫水沴所具厥有二理一曰數二曰政天地有五徳一曰潤二曰暵三曰生四曰成五曰動五徳者隂陽之使也隂陽者水火之本也隂陽有常徳故水火有常分竒耦收半盈虚有凖謂之通正羨倍過亢極無不至謂之咎徴二者大期率有常數除之主始於淵獻水之行紀於九六凡千有七百二十有八歲為浩浩之㑹當是時也隂布固陽㴻雨天下百水灌注漲其通川岸不受餘則旁吞原隰科坎平槩則漂墊方割雖堯舜在上臯䕫佐政亦不能弭其沴也過此以還則係於時政如其后辟狂妄以自率權臣冒昧以下専政不明賢不立則苦雨數至潦水積厚然隂陽之數也貞元壬申之水匪數之期乃政之感也徳宗之在位也啟導邪政狎䁥小人裴延齡専利為心隂潛引納陸贄有其位棄其言由是明明上帝不駿}
