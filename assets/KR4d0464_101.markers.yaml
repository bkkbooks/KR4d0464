  - {type: variant, offset: 3996, length: 2365, content: 五十餘章竊直敢言不畏強禦於政體多所裨益如劾劉都水怙勢作姦䧟公儲四十萬石權貴爲側目九年陞授承直郎平陽路緫管府判官晋大府也先是吏風盛民嚚於訟公用誠敬待官長威嚴肅吏屬作勸諭文二一則勉飭州縣革弊勤政一則諄告百姓務本畏法致吏民感化奉約束惟謹歷二考如一日絳兵卒陳姓者殺同産兄社獄因鬻緩逮繫者三百餘人延滯至五年之乆逺近爲憤惋省檄鞠問廉得實跡一問即服時晋絳乆旱是夕大雨霑足咸謂伸理冤抑所致各路設辦課官例分門下平陽所轄院務幾百按籍點差終任不易藩府採姑射山文石藉夫匠力闢山蹊爲坦途者六十里西山伏利由之而出土人刻石紀其事大起府學敦勉師生傳授暇率吏屬聽講風俗爲一丕變又復囬車嶺孔子廟首陽山二賢祠修建廨傳逓鋪以間計者千數増户餘三千敕使過晉者以政績上聞至蒙奉公勤政之諭十三年奉命同陳節齋考試河南五路儒士語於陳曰吾道如綫不冝用平時取法凢就試者皆以通文學第之十四年授翰林待制奉訓大夫鹿菴大學方執文衡屢稱其文章精妙眀年秋選授朝列大夫河北河南道提刑按察副使改除燕南秩競移山東東西道先公之任風憲甞諗僚屬監司職在繩愆紏繆肅清政務惟自治而後可以治人又憲府非有錢榖詞訟之繁特明大體布公道事當熟議極乎中正方可服衆惟克已自勵故按治州郡褰帷具瞻有風動百城之目部内府尹恃占名鷹房恣爲不法公納賄賂莫敢誰何即按劾罪狀以聞蒙杖而黜焉憲臺徧諭諸道逺近為肅然兾州監從人因造作掊衆利甚夥與監逸去事白曰行司廵歷動經歲時俟獲而治則姦人得計矣質其田宅償其民南宫弭筆者號尹庫因告訐曽蒙賞賚沮嚇官府肆㓙侔利或言其擅殺耕牛歷數奸惡痛校之而死萬口稱快又辨釋徳平民劉氏疑獄一十八年除行臺治書侍御史下赴進承華事略於東宫廣孝立愛端本類二十篇採古儲貳善事前有圗後断以已意蒙𥙿皇徧覧稱善賜酒有極用心纂述之諭令諸皇孫傳觀宫寮稱其弘益良多聖上命近臣繪冩以賜東宫二十二年奏充中書省左司郎中屢趣不應時小臣盧以理財用事或問其故曰力小任重剥衆利巳未見能乆者可近乎旣而果敗衆服其識先而有守卄六年授少中大夫福建閩海道提刑按察使甌閩僻在海隅歸附後官貪民殘奄爲盗區黜尤貪惡者數十人乃上章彈劾行省官非其人冝選文武備具有籌䇿大臣矯正枉濫肅清邊陲則民心服而㓂盗息巨賊鍾眀亮嘯聚洪閩郊東繫則西逸西逐則東奔彼此玩冦師老無功乃請立主帥專號令朝廷允焉賊果潰㓕卄七年以疾得告北歸卄八年朝廷以耆宿來徴明年二月謁見丗祖皇帝於柳林行宫蒙慰諭义之継上萬言書條陳時政一曰議憲章以一政體二曰定制度以抑奢僣三曰節浮費以豐財用四曰慎名爵以攬威權五曰重廉司以勵庻官六曰議保舉以覈名實七曰設科舉以収人材八曰試吏貟以清政務九曰恤兵民以固邦本十曰復常平以廣蓄積十一曰開屯田以息逺餉十二曰息逺略以撫巳有十三曰感和氣以銷水旱十四曰崇教化以厚風俗十五曰减行院以一調遣十六日絶交貢以示曠度上嘉納焉授翰林學士嘉議大夫與議政事凢預庭議知無不言成宗嗣位獻守成事鑑曰敬天法祖愛民恤兵凢十五篇逐事直說本諸經㫖侍臣謂純正親切有魏文貞司馬端明之風元貞改元加通議知制誥同修國史纂修丗祖實録作表進呈及封謚除拜大典冊皆經定撰大徳元年進中奉明年戊戌春以三朝舊臣賜楮幣萬緍其年七十請老不許五年再上章懇請除公孺自祕著司刑鄊郡以便侍養仍官孫笴祕書郎榮其歸方優游鄊里樂遂安閑不幸於大德甲辰歲六月辛丑以疾薨於私第正寢之春露堂享年七十有八越九月已酉葬河西里之先塋夫人推氏祔焉送葬餘萬人及四方來弔祭者哭皆失聲曰五百年那復生此公耶先妣共城人尚醫推公季女資婉順事舅姑睦婣親以孝敬聞先公所得俸給均之家人惟恐失所若稍越規矩即治之如法故皆恱服而不敢犯女侍生二子善加撫育無異已出内助力爲多先十八年卒生子公孺奉議大夫知頴州事孫三笴朝列大夫中書刑部郎官次詵詵侃侃尚㓜女孫二長適昭文館大學士耶律伯強子著作郎楷次適寗氏子重孫五男漢璋德璋潤璋女二皆幼庻子二公儀廕授承務郎同知磁州事公説衞輝路儒學學正生子瑣住先公資明敏正大材器英邁操行純古慱學有經濟器業與人交樂易直諒不能詭隨與時俯仰常曰士當行其所學明義逹道一以至誠將之窮逹得失有不在巳者當官持重有體守正奉公表表欲見於丗故所至有聲遇不平事及惡之可疾者憤然必窮治廼巳官清要四十年自奉如寒士平生篤於禮義視勢利蔑如藩國丗子且貴顯於朝招翰林諸公讌集私覿禮衆議未一曰禮上國卿當下國君遂平揖而巳省掾趙和之病疽迎毉救視没爲殯歛以行橐付其家友人周曲山能官至廉卒無以葬營治至成禮南官劉文卿善數學客死于衛旣周其䘮妻少嚢珎具甚冨求一室相依以禮謝去其廉正類此少與西溪春山友善時目曰淇上三王别號秋澗晚莭名德俱重爲丗尊仰不穪姓字但曰秋澗公作爲文章不蹈襲前人要自肺腹中流出平居談話無異於人及操觚染翰經㫖之義理史傳之鋪陳子集之英華古今體制間見疊岀雄深雅徤辝古而意不晦以自得有用爲主冝乎綰持文柄獨歩一時字畫遒婉以魯公爲正所書卷帖爲世珎玩樂教掖後進明義理工文章必盡所得又善因材致篤故藉之多顯逹者自少至老未甞一日不學易簀方停筆平昔著相鑑五十卷汲郡志十五卷其承華事略守成事鑑中堂事記烏臺筆𥙷玉堂嘉話賦頌詔誥表啓書䟽詩文碑誌銘賛樂府號秋澗大全文集者一百卷延祐六年蒙朝廷公議爲之刋播焉冨哉言乎其勤篤至矣其振耀後丗冝矣至於論列時務利害互明得失兼著忠愛情切聞一事可行一士可用必爲建白雖未盡行後竟如所言較其藴奥見諸行事者纔十之二三故贈謚制詞有觀其遺書蓋抱經綸之志詢夫成蹟豈特黼黻之材惟治朝蓍蔡之是稽繄晚生山斗之所仰蓋公論云敢用是爲銘辭曰士惟有立德功與言能一於此不朽者存顯允先公睠兹克勤䇿勲學海力振斯文擴我浩氣塞乎乾坤手抉雲漢大放辝源鴻文大冊帝載昭宣人所共知方駕昔賢紹韓歐之宗派得文章之正傳臣時禆政人有未知志存經濟惟日孜孜拜章奏記罔或少遺有物禁訶百纔幾施時耶命耶而止於斯載瞻遺藁爲世蓍龜山斗聞望後學仰規内相羙謚恤典恩推見諸行事功止一時著書傳後千古是希孰得孰失必能辨之又何俟曠丗相感則吾道爲庻幾用是昭告神寕無疑大行峻極清泉漣漪淵峙無窮永照豐碑嗣子公孺撰, WYG: ''}
