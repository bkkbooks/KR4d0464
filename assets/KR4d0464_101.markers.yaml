  - {type: variant, offset: 441, length: 0, content: '', WYG: 卷之八甲午九月朢日東原五六友人㑹於孫侯小軒話及前朝得失之漸座客問云金有中原百有餘年将來國史如何爾或曰自唐以降五代相承宋受周禪雖靖康間二帝蒙塵縁江湖以南趙氏不絶金於宋史中亦猶劉石苻姚一載記爾衆頗惑焉僕曰正閏之論愚雖不敏試以本末言之夫耶律氏自唐以來世為名族延及唐末朱温篡唐四方幅裂遼太祖安巴堅乘時而起服髙麗諸國}
