  - {type: variant, offset: 3561, length: 0, content: '', WYG: 翰凡十數年著大周正樂三十卷詔藏於史閣其大周通禮未及編纂㑹儼卒議者惜之元貞元年六月十三日宋太祖實録抄并校勘無差時開真定野河事甚不便金史王文康公定奪此王状}
