  - {type: variant, offset: 4180, length: 398, content: 遊玉泉山記玉泉附都之名山也予十年間三赱居庸以事梗未遑一遊有顧揖雲㷑而已至元七年四月廿一日與憲䑓諸公出餞髙劉二侍御於髙梁河上客既去相與並騎且話且前舉目瞻佇巳次甕山因共為玉泉之遊於是轉崗陵過碾荘望西南林壑霏空翠襟之淋漓也遂舎騎而歩厯佛閣觀檻泉偃靈鰲之騫訝玉虹之命童子以銀罌挹水於石鯨清冷三於是雲蘿轉山腹不百平湖人有撑舟昆明之而入華石洞二三子大所歡充然有所淂凝空清和扇物雲春山之詩歌離宫之曲知之官日之在山也歌曰昔人作宫兮重扃扉兮登故基有苗兮漁有磯鳥飛鷗同一華一去落暉山良是兮事非感今懐人我胡爲兮拪栖滄浪水清兮濯冠去意扵淂意於登賞遂成兹逰至有心扵成約與造物逰扵一日之内而償窮年之勞不爲事奪風雨妨者殆無幾耳予然後知天下之事任術以去取留意於成全者皆以小智自私則失自然之理也可勝嘆㢤同㳺者凡六人范陽李公弼秦䑓楊子秀鄅城韓君羙洹水梁幹臣太原温次霄汲郡王仲謀期不至者饒陽髙瑞卿涑水邢良輔餞不及者固安王輔之相州馬才卿, WYG: ''}
