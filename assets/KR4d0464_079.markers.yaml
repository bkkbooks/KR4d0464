  - {type: variant, offset: 7064, length: 0, content: '', WYG: 欽定四庫全書秋澗集卷八十元王惲撰中堂事記序余自稚嵗讀書頗有志於世甫及壮年彈冠應聘適際夫風雲慶㑹千載一遇之時荷槖載筆從事其間以至宻邇論思醻酢吏務霑香紅藥之階接武雲龍之地若有所遇而大有所為也不圖爾後蹭蹬於仕途者廿餘年回視向之雁行而請署者川泳雲飛觸目皆是比量薄分蓋有無非命者况今日就衰謝百念灰冷有求田問舍躬耕種樹而已然覺吾胸中耿耿者尚在及閱故書復得當時直省日録觀其與諸賢聚精㑹神於一堂之上所以開太平之基播無疆之休者班班可見因略為修飾題之曰中堂事記庶㡬閱是編者知予生長明時雖無寸補亦常饜飫邦家之光為閭里之榮也藏之篋笥固不敢以千金享之異時有索野史求史臣中舍之所遺逸者不無一得于斯焉旹至元二十四年丁亥嵗秋九月七日前翰林修撰同知制誥兼國史院編修官左司都事王惲序中堂事記上庚申年春三月十七日世祖皇帝即位於開平府建號為中統元年秋七月十三日立行中書省於燕京劄付各道宣撫司取儒士吏員通錢榖者各一人仍令所在津遣乗驛赴省惲亦忝預其選是年冬十月至燕以三書投獻相府大率陳為學行已逢辰致用之意頗蒙慰奨令隨省通知計籍使綜練衆務日熟聞見焉行中書省官四員丞相瑪穆特嚴厲凛然不可犯初與趙相行六部於燕至是就用為行省長官平章政事王文統字以道大定府人前經義進士平章政事趙璧字寳臣西京懐仁縣人資𢎞偉能任大事以氣量䧺天下叅知政事張易字仲一太原交城人資剛明尚氣臨政善斷待士以誠忤之不復與合左右司郎官八員郎中賈居貞字仲明真定獲鹿人金尚書右丞益謙之孫資聪敏有左氏學通諸國譯語郭榮祖字榮叔燕人部令史出身廣詳雅能酬應事變自大興府參謀為今職晉汝賢字才卿燕人班秪令史出身資隂克有幹局員外郎王德容字仲寛河間將陵人部令史出身張桐字子華燕人班秪令史出身邢敏字公達京兆人部令史出身都事劉郁字文李渾源人王德輔字良臣陳州商水人經童出身提控令史李惟寅字舜臣西京人前進士楊文卿珠嘉謙字和之遼東人楊恕字誠之左房省掾馬璘字文玉燕新城人後叅知揚州行省事樂思齊字齊賢燕人王文蔚字仲玉東平人終濟南經歴官劉傑字漢卿益都人王守正字賢之新城人宋筠字庭秀大名人楊顒字伯榮鎮之無極人今為京兆屯田總管楊湜字彦清鎮之藁城人楊珍字國寳鎮之中山人蔡玠字廷玉相州人馮處厚髙唐人髙明字柔克汴梁人陳鼎字取新真定人閻沂字巨川行唐人李壑字裕卿相人右房省掾袁裕字仲寛孟州孟津人終順德總尹李鼎字器之相人劉作字述之柘城人吳璧字國器邯郸人張安仁字夀之宋璋字寳國柘城人梁德佐字輔之燕人張適字濟之平灤人劉濟字巨川周鼎字器之燕人張楫字巨川覃懐人架閣庫官二人邊闕字正卿德興人經童出身王和卿太原人典吏六人劉謙字伯益盧慎字順之洺州人候康濟字仲澤真定人趙文輝字克明燕人王顯卿熊岳人黄華姪孫張瓉燕人斷事官阿固岱麥肖竒塔特巴克實唐古岱老塔齊爾其子雅濟克今復為斷事官伊納克鄂嚕齊呼圖克奉御奏事官楊仁風字文卿潞州人今為真定等路宣慰使客省使一人班定直字舜卿山隂人奉使三人孟甲字文伯太原介休人嘗奉使大理有光逺功武茂字茂卿平定人終鄧州統軍劉芳字世傑中山人知省印一人許揖字公度太原忻州人通譯使四人阿里和之西域人道努逹克王哈喇王炳字煥卿太原人宣使六人李顯祖字顯卿相人富察禧字仲康終涿州尹王好禮字立夫真定人楊特穆爾寗澣字清甫平陽洪洞人𤓰爾佳巴蘇呼今為真定等路宣慰撫副使回回譯史一人敏珠爾丹所譯簿籍搗治方厚尺紙為葉以木筆挑書普速蠻字該寫衆事紙四隅用縷穿繫讀則脫而下之今為平章政事書填勘合令史三人馮崧字夀卿今為湖南北道按察副使馬紹字子卿李從周字文則東平人仕至東朝斷事官掌故二人馮渭字清甫真定人亡金松菴之子省令史出身完顔良輔亡金省知除房令史詳定官三人楊威字震亨太原太谷縣人治春秋義張永鍚字孝純太原人周止字定夫濵州人資強發有口多記前人利害事條因言事見稱在當時有足觀者都堂懸其卷於幕中用勸来者自是㳺道頗廣嘗權右司都事講集太常禮樂官三人許靖字唐臣安平人以三䇿終場試太常檢討郭伯達黨仲和皆東平人同講究勾當編類一切儀禮及祀典合祭諸神等事肄習供衛事官一人樊興嗣字作堅燕人時令彩畫鑾駕一切儀仗服色等物及教習隨取到控鶴等人授供衛大使省理問官三人蔚祚字天禄闕人律科出身邊闕字邦傑闕人律科出身張雲鵬字鵬飛燕人今任浙西憲副掌記一人魏初字太初順聖人魏學繼為姪孫思亷之子初掌書記闗防令史令編類一切户口差稅宣課地略堡塞等事宣課自領省立額㡬何迄今増益㡬何餘皆類此檢法兼縁堂一人沈侃字和卿大名人法律出身終陵州同知堂厨局長一人張抄兒赤省醫二人元鐸字振之獲吕人楊庸字君卿燕人鑄印局官三人劉淵字仲廣濟南人劉状元子劉驥字思齊通州人前進士劉晉德新子王利用字國賔大都人交鈔提舉司官三人張介字介甫燕京人部令史出身梁闕字秀實燕人王煥字紹明元寳總庫官李元字唐卿河南緱氏人前進士第王鶚榜𣙜貨司官二人郭儀字宜之真定人部令史出身王諤字諤臣燕人萬億庫官一人魏祥卿學士姪交鈔庫官二人髙澤字濟夫平陽人路闕字子敬潞州人應辦供頓官四人郭汝梅燕人終南京總管重陽二哥斜飛西域人李瑞字天祥潞州人吏員終襄垣縣尹到省聽任人員康天英字國才相人胡祇遹字紹聞武安人終山東按察使李謙字受益今翰林侍讀學士劉宣字伯宣太原忻州人韓㻸字寳之平陽人馬天驥字彦良磁州人陳祥字君祥大名人張煥字彦明濟南人張遹祖字仲賢順天人白俞字舜俞吳讓字謙甫時官至省者士人首以有無生理通曉吏事為問及取要所業文字蓋審夫資身之術或能否從事及手筆何如耳又擬以士人充省掾吏員補兩部令史東平士夫李謙聞之不欲吏辭去劉仲祥東平人亦係到省聽任人員時堂議擬令諸掾巾裹一衣皂服仍佩書袋於上或曰書袋廢已乆驟用恐駭觀聽若巾裹服止皂褐二色儘表於衆遂行焉是月剏建葫蘆套省倉落成號曰千斯時大都漕司勸農等倉嵗供營帳工匠月支口糧此則専用收貯隨路儹漕糧科秪修應辦用度及勘㑹亡金通州河倉規制自是漕船入都常平救荒之法以次有議焉諸投下五户絲料譯語曰阿哈塔穆爾自來就徵於州郡堂議云如此是恩不自上出事又不一於政體未便奏准皆輸大都總藏毎嵗令各投下差官赴省驗數開支其法毎户科絲二十二兩四錢二户計該絲二斤一十二兩八錢其二斤即係内官正絲内正絲色絲各半外將毎户賸餘六兩四錢儹至五户滿二斤數目付本投下支用謂之二五户絲以十分論之納官者七分投下得其三焉十一月甲子朔二日乙丑時夜禁甚嚴慮公幹有礙令有司置夜行白油木牌雖官府貴近非此不敢輒出往時一切無賴等人侵暴不法之事盡行斂息時應乗驛馬皆從省府給降劄子堂議亡金時馬劄子上畫墨桃紀數今宜印以墨馬遂用之如三匹者三馬五匹者五馬仍用省印以傅其上癸酉濟南宣撫司申宣撫副使王磐先生字文炳永年人前進士第道號鹿菴年七十致仕棄職去相府以惲係王席生令作書云省留之乃執覆曰鹿菴先生人品髙邁宜膺大受不可處之人下雖招之恐終不應不若從其所好遂止初行六部所㑹東平路民賦帳冊或有言未盡者堂議欲覆實之令周止劉芳王惲等置局磨勘都事劉郁領其事於上惲等力言其不可不允至於再三曰往事不宜䆒問此若一行非徒無益適足取怨兼衆怒不可犯也宜詳思遂寢時衆陳言等以中元所降詔書内一欵節該有上書陳言者皆得實封呈獻若言不可採並無罪責如其可用朝廷優加遷賞以旌忠直至是日有言以未用堂議令詳定官分間其言為三等如體用兼備切中機宜文彩可觀者為上雖乏文筆其指陳利害有興革之方者為中餘皆為下除現區處人數外其餘量給路費省㑹寧家聽候十二月甲午朔時於省東織造局置司集諸路計吏類校一嵗簿帳時相領務者退食後日一至按閲程務有未便即改立體式肅如也詳定官楊威以星變陳書省官宜解機務以避賢者不然且有大咎先生名威字震亨洛之永安人資剛直敢言通天文知兵金末嘗從軍陜右以勞充帥府議事官至元十年襄陽降安撫吕文煥過磁先生以詩讓之有云設若汝不來宋祚能有㡬須知李陵生何若張廵死吕以白金贈之不受夀八十終州教官有文集若干卷其為文思致甚敏詩乃其所長云}
