  - {type: line-break, offset: 0, content: '', id: KR4d0464_SBCK_053-1a01}
  - {type: variant, offset: 0, length: 1095, content: 秋澗先生大全文集卷第五十三絳州曲沃縣新修宣聖廟碑曲沃縣學舊矣始完於宋嘉祐𥘉盛於金㤗和閤貞祐之兵蕩焉無餘前政苟訿𥘉不遑䘏園𬞞興感薪刈其下者幾五十祀逮至元己已邑尹石秣公慨然以圗復爲事工垂􅌟而去尹侯簿賈天衢相與頋歎曰蕭武弁能是烏可不卒其羙然澤宫故地庳陋湫隘不足奠安神觀聳邦民瞻相治城西北陬勢夷且爽遂増崇前規而敞其禮殿焉既落成董事者許良等感蕭君經始之勤今政賛終之善來謁文將刻石廟庭俾簉名於孫曺諸賢之列用垂示來哲竊不自揆敢以聖道之隆汚廟學之本末互陳而歷告之三代之丗家有墪黨有庠術有序國有學以師以令肄俊造其中時書歳考小大有成然後賔而興之其典則六德六行其藝則禮樂射御書數然不可不知其所自故守學釋菜奠幣於先聖先師示不忘本也彼朝夕見聞無非智仁聖義忠和孝友睦婣任䘏之方凡邪說詖行放蕩僻異之術非可輔丗教明人倫者率屏絶不容髮其間故三代道出一致有學而無廟周衰王者迹熄生民不𬒳庠序之教天理茫昧心䘮厥守異端百家之說乗隙並騖不無厖雜壅底之蔽此太史公讀功令未甞不廢書而嘆也及漢興學館林如鴻儒継作師傳業受學古蒞官守其說而不易故謀王軆断國論一以經旨爲據于時公卿大夫士吏文學氣節雲蒸霧散彬彬然幾三代之風何其盛哉此無佗聖道明而百家自息也逮魏晉隋唐以來慕髙尚者以虚無爲宗干利禄者以科舉爲業其視窮理正心修己治人之道懵不知爲何事時則三物之教弗明于上先王之澤不及乎下單爲廟祀尊孔氏而王之三代教育之實泯泯掃地矣所謂有廟而無學間有卓越特逹之士出芟夷浮學羽翼聖道爲任然莫能極起其弊而全濟其溺者何哉盖道之隆汚學之盛衰一繫夫王政好尚而爲之有無也嗚呼三代吾不得而見之得見兩漢斯可矣今國家昭至德建民極勸學敦農崇化厲賢凡可以風四方而開太平之基者靡不興舉故經明行修之士徃徃賔興天府擢位卿相以心正意誠國治天下平之道巳甞佐天子而理百官矣士之不志於古則巳苟志於古舎斯時之易將何所求所待焉曲沃自昔以劇稱土腴物阜爲終諸縣甲俗剛僉力穡尚氣義憂深思逺奄焉有唐晉餘烈尤不可後者教也本既立矣道由生矣師帥者能仰體上之所嚮以明倫實教作新士民耳目俾知所以學異時人材輩出斌斌然追两漢之風孰謂不張本於斯邪不然釣来華名爲餼牽告朔之所吾不知其可也銘曰維晉曲沃以劇称絳山左戒汾右傾山川開闔氣上蒸風俗勤儉餘剛稜邑居萬家業有恒既冨而教廼丗程嗚呼庠序教所生石君作尹追良能奉宣德化根以誡清廟起廢功勃興心計百至經載營惜哉垂搆任遽更後人継之卒有成方華古礎排巨楹文禳藻棟浮雲縈相前增崇尤克承教基鋪敦道日弘春風隠耳絃歌聲始謀賛終匪自矜吏民懷感思以銘我詩刻石碑廟庭平陽府臨汾縣重修后土廟碑平陽府治之西有郷曰晉源帶汾河表姑射林墟􅌨比泉流交貫無寸壤閑曠山霏夕景杳藹如畫故河東称膏腴勝㮣之地于斯爲最風俗率勤儉盡地利属, WYG: ''}
