  - {type: variant, offset: 3950, length: 238, content: 雪庭𥙿和尚詩集序禪以奥為說詩以志為言僧之以詩鳴者見於晚唐盛於前宋前賢評論固匪一致不出才清氣勝發𬞞笋之餘芳辝簡義深調葛藤之奥語就本法言之以心傳心推離還源在用之恒寂而已尚何文字之有然出丗演法者儆悟群迷不容忘言假借聲光發雷音之先雪庭公和尚蓋亦出丗演志者也集詩詠及雜體等篇為三卷首嗣髮恵山來求予叙引以光師行雪庭平生然甞聞諸友人陳節齋談師噐局磊用見諸行事其在方外實為不今觀其應物信手拈來吹花作霧於憂時判徃徃出言意之表者可謂混儒墨為之手段企慕髙風追攀有山堂惠至元甲子冬十月卄七日秋澗老人序, WYG: ''}
