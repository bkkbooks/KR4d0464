  - {type: variant, offset: 3933, length: 320, content: 太一宫春早即事漢家望祀竹宫神參禮精嚴動早晨殿瓦漸分籠月白一聲金磬聽朝真壬午除夜雜詩来住京師已半年欲行還止果誰然淵明豈是山林士苦要絃歌為秫田兩間齋室過今冬臈雪纔消又朔風底滯王窮何所戀終年相伴要詩工鐡畫顔書雪屋燈夜深相對眼増明莫疑擲几金聲砉讀盡諸孫得杲卿科斗秦燔漢莫猜釐陵况是晉初開辭堅句澀無多旨茟削疑從戦國来輝輝風日暖生煙氣韵和平恐信然軒冕儻来皆外物歳功無切是豐年瓜畦分漑引温湯三月中旬已進嚐縦使得先諸菓上摘来終是不馨香衆卉迎春竊化權苦寒都在早梅邊不愁一夜氷花老便得和羹亦槁然失之湏信本来無勉強難扵上圾車看取一陽潜九地春来葭琯自舒徐謝安石奕棋圗百萬秦師未易摧動容無復㨗音来入門偶折登山齒一矯論公恐妄猜江東全倚謝家安雅量形容對奕閒勝負自𥘉成算在, WYG: 闕}
