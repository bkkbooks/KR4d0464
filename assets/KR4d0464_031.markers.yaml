  - {type: variant, offset: 0, length: 261, content: 秋澗先生大全文集卷弟三十一七言絶句早梅香信臘前開籍約君同徃肯前來松風亭下一樽開終曰裴徊醉竹臺霑帶晚夜深猶傍枕邊來花開花謝催人老花本無心人自哀折得一枝手且分春色入城來梅花風韻不凢才氷雪方凝始見開任使和實等閑斤斧不為災夢酒張鍊師道人尸觧栢陽䑓三尺琻鐫卧縁苔昨夜月䆫清底分明霑醉謝文來題劉總管宅御愛峰太湖清潤岱宗雄金宅宣和苐一峰絶佀水晶宮裹㸔一堆寒碧玉玲瓏詠梅銅切塗黄點酪酥細薰婆律發温鑑老夫鼻觀多知見不用燈前問玉奴一脉陽和擅獨根蒲枝金蕾鎻春温惜花人老情縁在翦断春風倩女魂尚愛梅君佀細君題詩重過去年門經年不見春風靣爲恐啼㾗似臘㾗, WYG: ''}
