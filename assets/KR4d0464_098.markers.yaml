  - {type: variant, offset: 0, length: 656, content: 秋澗先生大全文集卷九十八玉堂嘉話卷之六野合女子七七四十九隂絶男子八八六十四陽絶過此為婚為野合時叔梁紇過六十四娶顔氏少女故曰野合宋紹興中衍聖公渡江而東者孔玠也𧖟為龍之精按馬質云禁原蠶注天文辰為馬蚕書曰蚕為龍精月值大大則浴其種是蚕與馬同氣李林甫月令釋曰先蚕天駟也先蚕之神或以為苑窳婦人寓氏公主或以為黄帝或以為西陵氏或以為天駟歷論不一然蚕其首馬首其性喜温惡濕其浴火月而再養則傷馬此固與馬同出於天駟矣然天駟可為蚕祖而非先蚕者也蚕婦人之事史記黄帝娶西陵氏始蚕漢祝苑窳婦人寓氏公主比或有所傳然其祭設壇或少牢或太牢或一獻或三獻禮必皇后親享北齊使公卿祝之非也其曰龍精見荀子賦蚕閑府儀同三司謂置府辟吏儀同三公也唐制感生帝唐王仲丘傳引鄭玄注云天之五帝逓王王者必感以興故夏之正月祭所生於郊以其祖配之因以祈糓感帝之祝貞觀用之矣廟制古者天子七廟自虞至周不易之制也七廟者廟前廟後寢漢自明帝詔遵儉約無起陵寢藏魏立二廟晋宋齊隋及唐皆同一廟而異所以象生之有朝寢所以象生之有寢也建之觀門之内不敢逺其親也位之觀門之左不忍死其親也諸侯五廟謂二昭二穆與太祖之廟五鄭氏曰太祖始封之君王者之後不爲始封之君廟蓋諸侯不敢祖天子故王之子弟始爲諸侯不得立出王之廟後丗子孫祖其始封者而其或有大功德特命祀其祖先則立廟可也魯有姜嫄文王之廟鄭祖厲王是也若王者之後始封之君非有功德不可為祖則祖其先代之王也宋祖帝乙是也大夫三廟王制大夫三廟一昭一穆與太祖之廟三鄭氏曰太祖是别子始爵者雖非别子始爵者亦然鄭志荅趙商謂王制商制故雖非諸侯之别子亦得立太祖之廟周制别子爲太祖若非别子之後雖為, WYG: ''}
