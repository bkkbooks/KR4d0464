  - {type: variant, offset: 488, length: 0, content: '', WYG: 欽定四庫全書秋澗集卷九十八元王惲撰玉堂嘉話卷之六野合者女子七七四十九隂絶男子八八六十四陽絶此時婚謂野合時叔梁紇過六十四娶顔氏少女故曰野合宋紹興中衍聖公渡江而東者孔玠也蠶為龍之精按馬質云禁原蠶注天文辰為馬蠶書曰蠶為龍精月值大火則浴其種是蠶與馬同氣李林甫月令釋曰先蠶天駟也先蠶之神或以為苑窳婦人寓氏公主或以為黄帝或以為西陵氏或以為天駟歴論不一然蠶其首馬首其性喜温惡溼其浴火月而再養則傷馬此固與馬同出於天駟矣然天駟可為蠶祖而非先蠶者也蠶婦人之事史記黄帝娶西陵氏始蠶漢祝苑窳婦人寓氏公主此或有所傳然其祭設壇或少牢或太牢或一獻或三獻禮必皇后親享北齊使公卿祝之非也其曰龍精見荀子賦蠶唐制開府儀同三司謂置府辟吏儀同三公也感生帝唐王仲丘傳引鄭𤣥注云天之五帝遞王王者必感以興故夏之正月祭所生於郊以其祖配之因以祈榖感帝之祝貞觀用之矣廟制古者天子七廟自虞至周不易之制也七廟者即寝廟前廟後寝漢自明帝詔遵儉約無起陵寝藏主世祖廟魏立二廟晉宋齊隋及唐皆同一廟而異其寝宋遼因之廟所以象生之有朝寝所以象生之有寝也建之臯門之内不敢逺其親也位之觀門之左不忍死其親也諸侯五廟謂二昭二穆與太祖之廟五鄭氏曰太祖始封之君王者之後不為始封之君廟盖諸侯不敢祖天子故王之子弟始為諸侯不得立出王之廟後世子孫祖其始封者而其或有大功徳特命祀其祖先則立廟可也魯有姜嫄文王之廟鄭祖厲王是也若王者之後始封之君非有功徳不可為祖則祖其先代之王也宋祖帝乙是也大夫三廟王制大夫三廟一昭一穆與太祖之廟三鄭氏曰太祖是别子始爵者雖非别子始爵者亦然鄭志答趙商謂王制商制故雖非諸侯之别子亦得立太祖之廟周制别子為太祖若非别子之後雖為大夫但立父祖曽三廟隨時而遷不立始爵者為太祖也然左氏曰大夫有貳宗荀卿曰大夫士有常宗則大夫有百世不遷之大宗有五世則遷之小宗是太祖之廟常不遷也祭法曰大夫三廟考與王考皇考有廟顯考祖考無廟太祖正東向之位劉歆曰孫居王父之處以正昭穆父以明察下曰昭子以敬事上曰穆位則與祖相代此遷之殺也張純曰父子不並坐而孫從王父決疑要注曰凡昭穆父南面故曰昭昭者明也子北面故曰穆穆者順也杜佑曰太祖於室之中奥西壁下東面太祖之子南面為昭次之昭之子北面相對為穆張純曰元始中禘禮父為昭南面子為穆北面相對為穆父子不並坐也}
