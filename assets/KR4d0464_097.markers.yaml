  - {type: variant, offset: 4958, length: 199, content: 一五星行度並議前史之失以示髙允一年冬十月五星聚於東井此乃歴數之一史而不覺此繆浩曰所繆云何允曰按星金水二星常附日而行冬十月日旦在尾箕其申南而東井方出寅此二星何因背日而行欲神其事不復推之於理後歳餘浩謂允曰者本不經心及更考䆒果如君語以前三月井非十月也暦日詔云惟暦象日月星辰乃能成歳自侯采衛要欲同文直學士髙鳴雄飛辝也重公太原人官至吏部尚書玊堂嘉話卷之中玉堂嘉話卷之下魏景傳景字同叟淮南高郵之隠君子也身骨如削, WYG: ''}
