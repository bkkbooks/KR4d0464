  - {type: variant, offset: 438, length: 245, content: 庵命擬復立按察司手詔以一身之微惟万事之統不皇夙夜常切憂勤顧七道之提刑擴六條而從事近因省華偶值停閑然非違稽緩之愆縱令弗問恐伺便譸張之者爲害滋深仍轉側以詳思非監臨而罔益㨿所在按察司照依巳降條畫依舊設立施行於戯鷹隼當摶擊之任不與護恐為返傷琴瑟旣更張之餘識大躰乃為稱職重出樂天毎作歌詩成須令其家老嫗聽讀能通解其旨意詞為之定體此無他不過通俗近人情而巳特表而出之且為艱澁無謂之戒重西溪云正大七年亳州節使趙庭王詔别有擢用其子贄時為省知除掾既定省公問以召之之意贄曰以嫌疑故特回避而公拜禮部尚書入賀以成之鹿庵, WYG: 菴}
