  - {type: variant, offset: 981, length: 482, content: 表碣文通先生墓表先生諱天鐸字振之姓王氏丗爲衛之汲祖諱仲祖諱經顯考諱宇妣孟氏由農而士汔于先君蓋四丗矣其本支德澤與夫出處之大致巳鑱諸埋石兹不復云惟其心之與學逹於政而明夫用之所當然者敢發越以昭于外𥘉先君既冠以家學魁多士已而嘆曰君子不可以虚拘是足以盡吾學乎且天之所卑於我者何如我能克而復之以塞所以卑六考終于家逺近訃聞來㑹哭者踰月如知巴丁郎中居實石處士德玉單侍講公履烏宣慰貞等垂洟而言曰天不少假公年㑭爲我軰蓍龜今而後過將孰寡矣仍以文誄之至有識敏學精是既錫之以重彼胡奪之以輕遡長川而中流柂絶渉逺路而丰道車傾其爲時賢敬惜如此明年戊子春三月改葬于康公里清水原猊渦之洄曲奉常宋衜教授趙澄郝幹進士太原劉冲邑大夫李瑞僉曰先生卷徳丘園學貫三極其行與業爲國人所矜式可謂敏學先物逹夫丗用者也遂相與據法而謚表其封曰文通先生之墓夫人永和靳氏進士子玄之孫安陽丞顯思之女生子二人先卒家府没小子惲忱等服膺嚴訓獲登仕版粗有立于丗識者謂先生之志之學盖有驗於後矣是用昭掲神道永示來裔銘曰政爲事樞用乃道輿學焉而兩不克是爲虚拘融體用於一源宜大行而窮居其命矣夫若或訓斯丗而迪後壽髙名而不渝固云先生之知命胡其衘之不抒, WYG: ''}
