  - {type: variant, offset: 3494, length: 374, content: 議盗賊民患莫甚于盗賊不可視為小亊近年作過者皆於通涂大邑公然行刧略無畏憚者以應捕無方弓兵數少故也臨時力弱既不能擒捕既去應命追趂三限巳過恬然無事乞請將州縣尉司重行整搠所有弓兵定其不應占破之數悉歸所司以重其威力使潜消盗賊公然無畏之心且盗賊竊發正以衣食難飢若稍年難且有縱横不可制之勢何則人盗有形而易為之破竊賊無跡潜聚潜散難為之取也彼盗賊料其物既易取官無如兇惡之人鮮不動念我若度其如是預為備之之則將能為矣縣尉雖責專一捕盗然用得其材乃可所除多是承䕃子弟不閑事務又不習當處選擇一等舊曽作過不良人充師問詰捉雖頗有功効中間作弊有不勝言者如賭博櫃房宰殺牛畜等皆其事也又有因盗將良民俱被收禁正賊反行出放以致有與歹人暗行辭其在輩流實不多見加以揚歴省臺通介有守照得例五品已上宫不限職掌有文華者即命制誥若本官於翰院學士内相應名闕陞用實爲允愜士論合行移牒請照験備呈中書省定奪施行, WYG: ''}
