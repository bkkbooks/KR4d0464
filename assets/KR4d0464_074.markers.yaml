  - {type: variant, offset: 2599, length: 916, content: 十至元十七年三月廿二日余按部東行梁門劉君仲祥自髙林來餞臨歧把酒長歌不休旣而壷傾猶不忍別復聮鑣㡬三十里踰大尹而去不知劉君得扵余者何乃尔相爱因以水龍吟歌之且酧雅意仍荅見徵之意云緑楊一道飛花綉衣亂點如晴雪玉缾酒盡陽關歌徹未容輕發緑綺論心㡬人淂似劉君風莭記山堂轟醉己成塵迹今又作東城别世事悠悠誰料淡長空孤鴻明滅老懷耿耿正湏自信堅彌百折白髮灰心平生㽞在情馳丹闕悵孤雲細革東州囬望悵髙城隔十賦秋日紅棃花纎苞淡貯幽香玲瓏軒瑣秋陽麗仙根借暖㝎應不待荆王翠𬒳瀟洒輕盈玉客渾是金莖露氣甚西風宛勝東闌暮雨空點綴真妃淚誰遣司花妙手又一畚争竒呈異使君髙卧竹亭閒寂故来相慰燕几螺屏一枝披拂綉簾風細約洗粧快瀉玉缾芳酒枕秋蟾醉十二至元二十三年丙戌孟冬廿八日小雪十月中是日雪作連明霑地而釋潤扵春澤其應時顯瑞數年己来未之見也實可為明時慶因作樂府水龍吟以紀其和余平昔屢甞賦此未免掇拾故事張皇景氣而己兹萹之作頗體白戦抑老懷略見樸忠之至畎畝不忘之意也畫樓十日春隂晚風吹作水花轉𥘉冬中候應時呈瑞幾年未見沽酒㝷梅就中此興撩人不淺更露堂添得虚䆫夜白清於水光如練我老乆諳世味最忻然人安米賤蝗蝝入地麥旗掉壠翠翻平甸大獵清邉為民祈榖睿思何逺在詞臣合取元和賀例拜明光殿十三郭宣徽善甫開宴娯賔命樂工郭仲禮鳴笳佐酒思甚清暢酒闌人散餘音嫋嫋宛猶在耳且有衰年情嚮之感明日嵓甫修撰為求樂府賦越調以歌之春風緑綺堂深樽前初識龜年靣煙花紫禁幾年供奉香飄合殿悲壯凄清九天飛下鳯吟鶯轉待近前細看品題銀字知還是紅牙管儘著金黄玉磬泛宫聲五音𥘉遍明簮四合回頭聽處少陵情惋緑酒抛春何心傾倒汾陽金盌為斯人少漏玉堂消息㵼清商怨十四丙戌八月十二日宴季氏宅郡侯扎忽䚟酒酣為予親彈琵琶勸酒明日賦此曲以謝相逢一醉金荷氣豪長恨歡娯少貂蟬貴侍內家聲伎琵琶最好鐡撥鵾絲劃然中有繁音急調笑黄雲出塞青衫拭淚恩怨事君休道且聽新聲硬更銀筝與相繚繞空堂雪輥玉盤珠洴清雄縹緲漢殿承恩侯藩作牧此心未老付曲中細㵼他年事業拜紅雲島十五去嵗秋至今年春凢七月不雨有終風徒曀而巳生意殊悴然也逮二月九日雨雖以小言隨妥而釋三日方霽向來焦枯一洗而潤且又在清明節前嘗念一旱所繫甚重詩云舒矣冨人哀此惸獨然衆安我乃能安不然雖屋潤者其可能獨安乎此施旣光誠可賀也作越調以歌之, WYG: ''}
