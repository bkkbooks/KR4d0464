  - {type: variant, offset: 3517, length: 2537, content: 老人序喜看春雨如膏東風吹作冰花轉海棠紅瘦梨花香澹似嫌春晚縱使寒生猶勝空際陌塵黄捲道佳人拾翠王孫憶草都不負㝷芳眼欲見太平有象除豐年更何可羡田家作苦老臣憂國眉頭俱展最好知時清明前後一犁非淺笑樂天空抱元和詩律夢金鸞殿一作典春衫為問隣家新釀發春江靣十六賦筆故家張樂娯賔樂中無似秦筝大華筵聽處一揮銀甲笙竽幽籟四座雄聲滿空秋雨來從天外甚脩然思變白翎清調驚飛下金蓮塞長憶桓伊手語撫哀絃醉歌悲慨使君元有不凢風調平生豪邁録酒毺堂為余翻作八鸞海道更張正頼新聲陶冩継中書拜十七送崔中丞赴上都緑楊一道飛花繡衣亂點如晴雪都門幾日翠鸞回軫情馳魏闕頃不忘君時雖多暇逺猶辰說道六條儘備諸人多様卒難應和鸞節物勝自餘芽枿恐都輸豸霜摧折人無定忘事隨雲變莫捫渠舌百歩穿揚空拳搏虎豈容重發望君侯早晚去登黄閣作調元客十八飛卿係出將種余官燕趙時相識讀書尚義若不碌碌者然流離頓挫迄于今十年其窮極矣旣為哀之且求其所以然遂有斯作以越調水龍吟歌之庻幾伯竒履霜自傷窮思返義俾採詩者聞之不無當笞逐兒之感彫零萬木叢中秋霜不隕蒼筠節十年相見燕南趙北無根行客妻病兒殤歸來空在蒯緱彈鋏分躬耕壠山鵲起誰喚與將軍獵腰下鐡絲有箭柰荒煙泠霾虎穴見哀漂母猶勝低首看人顔色百折弥堅一窮終㤗不容終結望伯竒細㵼履霜幽怨洒西風血酹江月東原寒食天涯寒食問東風底事連行客千樹芳菲春不管吹盡枝頭紅雪湖水春波佳人錦瑟腸断非離索西來一劔不堪塵滿霜鍔憑仗誰話春愁一罇濁酒醉了還重酌盡日西歸歸未得怨殺山中猿鶴六印双旌两都無分此去從吾樂太行佳處布衣高卧雲壑平陽府倅第有來禽兩株以托根官舍有空谷幽居之嘆逮亞尹明卿來培植顧護始知重惜今年清明前花盛開芳姿綽約頻增容色侯置酒髙㑹遂極歡賞余因念草木之微豈輕重顕晦亦有数存其間邪乃以酹江月歌之同飲者忽治中英甫劉提舉者哥時至元甲戌春二月十有三日也遺臺樹老獨畫䦨春事猶未消歇好在來禽花盛發滿意淸明時莭翠䄂翻香朱顔暈酒緯約冰肌㓗幾年空谷等閑飄墜香雪回首綺閤東風使君情重一顧傾城色只恐花飛春减却來約樽前歡伯起舞山香醉歌金縷細按紅牙拍青鸞髙興恍然歸夢瑶闕三賦王薰爐贈數斈劉文卿客牎涼夕問故家何物能慰岑寂都把龍延二萬斛滿貯宫池􅗌玉立瓊洲雪翻花臆夢繞春江碧看雲失水淋漓元氣猶濕我昨杜杖敲門主人情重預報春消息相對掀髯談笑間一縷飛雲摇曳暖透天心冷穿月窟好箇行窩客金盤㵼露約君同醉秋月四爲友人壽中丞子𥘉棲遲林壑甚雍容雅量氣横寥廓人道魁然眞宰輔心在朝家黄閣幾卷閑書一門清樂不羡千金槖諸郎楚楚鳯毛輝映麟角今歲錦席雲涼菊香添麝竹樹煙霏薄風愛堂前秋氣好歌裏甘棠如昨十二金釵百壷清酒細把紅螺酌年年此日醉看淸獻龜鶴五賦雞頭紫荷盤若何波心濈濈鴻頭髙咏滿喙明珠三百顆一夕秋風吹落沙盎圓磋麝湯旋煑香噴佳人嚼杯盤涼夜楚江風味依約今嵗泠淡中秋空堦雨濕坐乆寒生幕草草時新聊應候兒女燈前歡噱趂暖争拈分明闘嚙翠屑紛如削老夫傍看苦吟思與韓較韓曷黎聮句云鳥頭刺劒石六福建官舎言懷散材無用空擁腫豈是入時花様白髪蒼顔官舎底日把早衙來放主治官書隱憂民瘼擬愜澄清望簡章霜在顧余関甚得䘮藕絲能繫况沗爲司長後擁前呵非不欲夢寐山林長徃不憶蓴鱸不懷松桂祗爲身多恙諸公垂顧免教憔悴煙瘴滿江紅爲大丞相史公壽柱石中朝還不减汾陽勲考人盡道今年相府南衙春早肘後不知金印大書中漸覺群疑少問南枝消息幾多春調羮了寳竇暖香雲裊晴雪霽西山曉見一星朝出五雲縈繞漢日舒長鈴閤静雅歌聲入江淮渺願神長對夀眉青應難老二至元十七年十一月十四日夜夢丞相忠武史公坐甲第西閤中余侍立其傍歘急報至云有敵犯府城西靣公佩櫜鞬集將領將出余握玉魚一雙跽請從行公曰不遲不遲因朗誦一樂府意甚欣暇曰此徒單侍講詞也旣覺但記其日月風雲瀟洒六字五夜枕上因足成之覺思來甚易録之以驗他日之祥云雷動雲横驚颷騖北城西下人共駭赤丸夜語電光飛射將領未承諸葛令櫜鞬已在汾陽胯笑書生思握玉鱗符從公駕鈴索静雲麾亞追徃事何多暇道一篇樂府翰林情話日月低回黄閣夢風雲慘淡凌煙畫儘花邊髙塚卧麒麟終瀟洒三德元來辭求贈言爲榮且及河防利害又聞介甫提刑捍禦衛災有功用殷卿嚴韻聊助行色兼簡徳𥙿彦隆二良直冠劒梁園又去作厖眉書客休自嘆功名幾許一家風雪春色似嫌鶯燕老秋霜歷試松筠節愛趙生游刄簿書間昆刀鐵都㑹地繁華歇形勝在猶堪說更諸君表裏玉煇冰㓗水陸若論都漕計夷門忍使黄流拆好相須着力障狂瀾休傷别四復用前韻有懐西溪梁園之游書劒梁園憶曽是青􅍡游客宫苑廢三山依約緑雲紅雪好在西溪王老子留連醉盡花時節記樽前金縷唱新聲忘筝鐵襟韻合曽衰歇消客氣歆情説儘暮年心事風霜孤㓗一片黄流翻晚照回驚呉楚東南拆偶追思徃事嘆餘生長年别五不肖目疾中承都運趙侯天章漕副相過自惟衰朽何以得此昨晚又以樂府見示疾讀數過不覺有起予之嘆復尋前盟略醻二公雅意風月溪堂也曽是東州行客長記得相逢一笑覉愁都雪又對青山談丗事老懷未减元龍節恨霜蹄蹴踏短轅間論塩鐵官裏事何曽歇公等志吾能說儘縱横鞭筭玉壷冰㓗爛醉春風能幾度桃花未了楊花拆甚一城相望半年過長如别六廿一年二月𥘉四日午夜枕上復継前韻書夢中所見秣馬膏車又去作天涯覊客明見得水雲深處萬花如雪緑暗江城多洞府紅燒燭影翻雙節𬒳曉風吹散枕中春簷間鐡塵丗事無窮歇吾最愛滄浪說恐靈均澤畔祗成孤㓗心事比量無少惡前途何必論龜拆儻祥金陶鑄遇良工從區别七至元廿一年嵗次甲申二月廿八日滦口離筵送殷卿同寮西還鎮陽一柱華峰緑翠似芙蓉金削辜負却畫舡春水一尊同酌寒食清明都幾日征鞍遽作西歸客漫春風檣燕語留人髙城隔春草碧楊花白粧點就行軒色道不應霜翮能舒長䇿三尺青萍風義在看君冠蓋長安陌對夕陽淡處最関情河梁别八夀康平章用臣柱石中朝人道是漢家眞相試看取鳯他髙歩珮聲清響丗祖功臣三十六䇿勲合在雲臺上欲暫分霖雨霈秦川從時望睿思逺誰能亮空健倒驪駒唱撫一方何似際天夤亮肘後不知金印重玉堂正要吾軍張向五雲深處望三台光千丈鳯凰臺憶吹簫爲張孝先紫簫賦係亡金宫中物宫樹春空御幈香冷誰遺金盌人間愛一枝紫玉雙鳯聲蟠秋月春花客思把幽情都付伊傳驚吹處籟翻天吹鶴怨空山風流貴家公子記夢裏瓊樓穏跨蒼鵉恍露凝銀浦霜裂琅玕不見雲間弄玉餘音散赤壁江寒秦臺曉碧雲零亂瑶天二贈喬媪張氏碧鳯翹寒玉霄宫晚雲牎誤讀黄庭恨淩波羅洛浦塵生徃事風流雲散但翠衾冷落餘馨人何在淡粧縞𬒮幽樹柴荆相逄一樽芳酒對夜色踈星歌裊雲停記水南佳麗姚魏池亭夢繞芙蓉城闕歸馭稳緱嶺風清桃花晚䓁閑休負瑶英秋澗先生大全文, WYG: ''}
