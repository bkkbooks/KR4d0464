  - {type: variant, offset: 3682, length: 2238, content: 上梁文大成殿上梁文寳位龍飛首闡大猷之化儒宫灰冷鞠爲茂草之區恭惟緫管陳公爰自下車慨焉興感仰體右文之意推明樂育之心因政平訟理之秋舉禮在實亡之典大復素王之宇重開太極之天于以増聖道之光華鑿晚生之耳目矧惟治本一出化原猗歟岳牧之心擬变謂書之俗落成有日神化無方折雄冠豭佩之徒趨庭受訓易篆刻雕蟲之子執簡傳經奠兩楹之豆蘧舞三代之韶箾伸嚴𣏌典咸啓敬心猥承縫掖之流可後閟宫之頌有來多士共駕虹梁兒郎偉抛梁東萬古宗風一泮宫頼得賢侯扶聖教太行元氣魯龜蒙抛梁南奕奕新宮播盛談一旦詠歸欣有地北山伏掃讀書龕抛梁西聖學如天不可梯湏信小成從洒掃互郷名與大賢齊抛梁北萬象經天瞻拱極文奎髙射徳星明昨夜騰光滿營室抛梁上偃植圎义屹相向人從懸甕發丹書堅與西山兩無恙抛梁下適衛屢爲瑗所舎春風緑滿杏壇隂從此西遊冝稅駕伏願上梁之後邑多君子世極文明國本固磐石之安天子享萬年之壽斯文有在振木鐸於中天遺法復行得人材於郷校舉霑寸進仰荅明時鎮國寺上梁文伏以坤儀佐理巳收純𬒳之功象教加持妙極大千之力爰擇鴻都之右輔聿興蓮宇之新宫我國家崇報是圗慈憫爲念演三乗而設教歛五福以錫民一朝之役罔及於國人萬有之輸悉供於内府於是郢斤運巧鄧梓呈材有來神力之無方遂極天下之大壯桓楹修棟欎雲氣之上浮疊拱層櫨屹丘山之壁立仍差榖旦共駕虹梁用綴蕪辝式伸善禱兒郎偉抛梁東六合天花散暁風隻履不煩嶺去九天開出𣑽王宫兒郎偉抛梁西萬刼壟縁妄想迷方寸欲明諸佛果正湏一勺自曹溪兒郎偉抛梁南莫咤龍門萬佛龕㑹使樓欏雙樹地萬方來此發經凾兒郎偉抛梁北萬象森羅朝帝極我爲禮此玉毫光聖徳無量千萬億兒郎偉抛梁上寳氣瓏璁像我今建此内道埸海㑹龍華無盡藏兒郎偉抛梁下千里王畿際兩稼年年鐘鼔樂清時共對人民霑聖化伏願上梁之後天低法界海怫潮音山河扶綉户之光日月擁雕簷之氣永將寳供仰賛皇圗奠金城不㧞之基祝天子無疆之壽亳州太清宫上梁文至道無名混太𥘉之一氣真人者出廓衆妙之玄門載歆道徳之言寔翊邦家之化太上混元上德皇帝潜輝柱史肇迹瀬陽千丁令神遊三尺兒童知尊聖祖故歷代備褒之禮皇家極樓觀之雄雖九伏於渊泉而紫氣日纏于天宇嗣興有數今見其人演化宗師真人德紹蟠教流白霫逺乗鶴馭來住琳宫爰即遺基重興丕搆用篤皇家之祐先開紫極之大及覩成規有光往制煙雲晻靄車囬隱玉之鑾仙聖超騰日仰猶龍之表㳟依善頌用駕虹梁兒郎偉抛梁東綿絡鈞天夢帝宫適喜頓然還舊觀玄都仙客振孤風兒郎偉抛梁西萬里黄流入望低爲謝㝷涼張慱望故家仙李又成蹊兒郎偉抛梁南聖牘玄珠閟不談且置金華丹寳説請從河上發經凾兒郎偉抛梁北玉帛中天朝萬國玄風慶㑹雪山陽柱下有人談道德兒郎偉抛梁上天蓋蒼蒼含萬象西昇不箸五千言萬古流沙空悵望兒郎偉抛梁下祈福爲民崇廣厦道家設教貴無爲䘮葛暄凉自冬夏伏願上梁之后人庥道廕世沐泠風山河扶綉户之光日月擁雕梁之氣竹宫望祀休誇漢武之祈靈敁宅徴符巳表吾皇之萬壽萬夀宫方丈上梁文伏以起百年之搆植大本於宗門葺一日之居見恒心於君子萬壽宫丈室者自昔中和之起廢逮今六祖之丕承物旣弊而更新制有増而匪舊敞桓楹而中起翼兩室以傍開雲霞藹疊栱之間燕雀賀華榱之上前瞻玉境通暢玄風後壯宸居擁陪法座况仙馭來臨之有日令威歸語以無時工旣落成衆孰不樂倚疊如山之壯罄單肯搆之誠重光動淇水之波佳氣欎太行之色式扶脩棟可後歡謡兒郎偉抛梁東燈火春城動竹宫看取洞天閑日月佩環聲在歩虚中西苒苒春雲去殿低莫道靈章仙秩峻青霄有路是丹梯南故院當年一畒菴碧瓦朱甍今覆壓後人光大儘無慚北五福從來尊太一碧霞千古振孤風奕奕神光長拱極上符籙潜珍無盡藏光芒未暇詫青藜六代傳芳主凾丈下玄教扶持衡可迓德星所在風雨時萬里如雲看多稼伏願上梁之後教基大闡福地重新五雲來崑閬之仙六甲祕風雷之奥華簮列拜載光傳度之儀金簡朝元永肅焚修之供以兹快樂普洽生成太一宫清蹕殿上梁文伏以顧瞻琳宇已嚴上帝之居婉孌龍聖人之作恭惟皇帝陛下圖囬治道窹寐幽人爰從潜躍之𥘉重有中和之䏂風雲允恊文物道而沃帝聦曽一言而利天下師今不見意若無犬駕以來臨駐故宫而懷舊漢文授經於河上加於軒后訪道於崆峒𥘉不踰此以兹寵握光極玄門念我後人思皇睿眷故大起御天之搆庻少伸就日之誠旣獻歲以僝功乃而考室敢陳善頌用駕虹梁抛梁東夜鶴休驚患帳空一自翠華臨幸後至今鎻春風抛梁西尚記春旗簇仗齊真氣滿空驚户牗光芒暇到青藜抛衆南論道當年有奥談乗賁臨猶望壠非縁叅决發經凾抛梁北金簡朝元瞻萬歳永無疆更願八荒開壽域抛梁上碧瓦朱甍遵大壯五雲佳氣欝蓬萊遊像思天仗抛梁下華表人歸餘道價雨露有偏恩不遣靈章隨物化伏願上梁之後日月擁雕楹之氣山河扶綉户之光道以之増輝真仙為之改觀雲紅黼座濃薰花氣風肅㤗壇光動竹宫之祀歛兹廣福錫厥明時溥同至樂春露堂上梁文伏以飛鳥知還固擇安棲之所弊廬託處舉懐必葺之心秋磵老人樗擽散材萍蓬逺䆠東西南北两紀奔馳雨露風霜終年偃薄乆矣壯遊之倦浩然故里之歸迣構新堂不遺舊物豈獨廣居而移氣蓋將追逺以顕親連甍接棟而中列三楹却暑囬寒而旁開两室俾春秋寢祭衆免勃磎節叙賔筵喜同笑語惟是時思之切仍題春露之名言舉斯心卑之來者承承継継無遏佚前人之光欎欝䓤䓤非秪謂喬木之羙爰扶脩棟例有歡謡抛梁東旭日紅駘蕩春陽滿太空人喜廟堂真宰出不煩東觀論青蟲抛梁西萬瓦齊撲地閭閻似碧鷄春露堂中春自好何甞有意夢沙堤抛梁南合明簮交道微來不易談正有歲寒三益在風簷先種兩株杉抛梁北正統一東亘扶桑略西極一堂雖起有先憂所願八荒開壽域抛梁上天蕩蕩光動太行三萬丈主人投紱巳歸來夜鶴不湏驚蕙帳抛梁下觀治化叶氣薫然衡四迓過門有客問行藏蓬纍而行得時駕伏願上梁之後里多仁美門掩春華歲時豐穣問甚槃中之蓿物情和好爱及屋上之烏對床賡風雨之吟開卷得聖賢之樂倘使少如所願不爲虛度此生, WYG: ''}
