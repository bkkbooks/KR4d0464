  - {type: variant, offset: 5794, length: 1000, content: 二日壬辰晴暑詔賜木苑大王駞鈕金鍍銀印其文曰建昌王印時王見征戍大理諸部建昌雲南之别稱也都堂為諸投下種田户奉㫖逐欵施行一阿术魯柭都魯為頭衆探馬赤官人毎乙未年皇帝聖旨為逐官出氣力上撥到種田人戸擬自今後毎年除絲線稅粮照依舊例合納包銀内一半納官一半給付本官用度阿木魯㧞都魯塔四火魯赤笑匿亥李里匣児㧞都闊闊不花孛羅口怯烈亥撒及四不花這裏四迷按察児持不哥兀也里乾男塔丑别立古亥一有幹只思皇后下民户八十五户内六十戸元係牙刺瓦赤全定包銀来今擬將合納包銀内一半納官一半赴本投下送納外有諸雜户計二十五戸内打捕一十一户依舊送納絲粮隨營一十四戸種田納稅買賣納啇稅一有阿吉赤大王奏告為先奉聖旨於太原路五戸絲内支與皇后合敦銀一百五十定内除支訖外欠一百二十定仰於本路五户絲料内中統一年為始分作三分年放支與者外據種田民户二百一十戸合納稅粮数目令本位下就用除已行下放支外仰照㑹施行絲線包銀與其餘民户一体科撥一有塔察児大王奏漏籍户事仰依巳行詔書体例行者一有阿刺合赤妃子從嫁民户差發并匠人関取係官絲線織造叚疋本投下送納事仰就便取問本位下人貟據上項民户差發若前断事官定下全撥今擬减免一半如已定减半者今擬全免外據匠人依前関取係官絲線織造叚疋赴本投下送納者一隨路應有金銀銅鐡丹粉錫碌䓁窑冶附籍漏籍民户盡行罷去分付元附籍地面官司應當差發今後許令諸人䓁有願入狀採打煽煉不用官本及占役百姓者據所得数目官為斟酌抽分若元管頭目䓁願入狀不用官本及占役百姓興煽者聴如不願者許他人入狀承認一河南路管下舞陽䓁處栽薑户仰與民一体當差毎年合用生薑就燕京官為和買一諸投下壬子年附籍􅥟口仰照依先帝聖㫖於冬各附籍處依舊例當差者一張杪児赤奏随路樂人差發事仰行下各路宣撫司與民一例當差止免雜役仍仰各處官司都不得因而搔擾不安遇有樂人赴闕承應官司斟酌與起發者一忽都花奏有茶罕元撥與字羅亥夀州民户内附籍三十一户見當絲線包銀税粮外有漏籍三十一户内有打水獺一十户乞定奪事仰照勘附籍民尸别無争差依種田户例送納絲粮外據包銀一半納官一半與本官用度所據打水獺户不湏打捕水獺與其餘漏籍民户一体於各管官司當差一藤花户交各處官司與民一体當差仰斟酌氣力約量科取加存恤外據年例合用藤花仰所属地靣官司從長計置趂時採摘依数送納毋致㓕裂採取闕少用度一火赤逹刺罕大名府民户伍伯餘户每年除納絲線稅粮外不納包銀止納軍漢車銀二定二十九两次後断事官按脫定下與民一体當差仰依元行例與民一体當差施行是日未刻奏定左右三部尚書䓁官, WYG: ''}
