  - {type: variant, offset: 6389, length: 5, content: 集卷第十六, WYG: 奎騰彩憶光臨孺子何知喜嗣音余年廿許以時文贄于先生公喜甚親為刪誨且有文章重于相權泰山微塵之説即欲挈之西行以所傳畀余以事不克至今有遺恨党趙正傳公固在陽秋當筆我奚任天機翻錦餘官様月户量工更苦心野史亭空遺事墜荒烟埋恨九原深哭賈叔良别駕今夏書来墨尚新並冬誰料訃音聞忍看玉樹摧崑火空遺歌聲遏嶺雲氣㑹可能鍾厄例天葩似靳吐奇芬拊膺慟絶華顛母老淚珠傾滿練裙祭館主謝總管老帥英威上将壇愛君雍雅戴儒冠依依孺慕懐丘壠煦煦交情出肺肝枳棘鸞棲終鎩翮蜀江梁險失驚湍傷心最是蒲中客馬首歸旌揭素竿㕘政楊公挽章公墓在河南府甲戌以事入潞拜其下賦是詩以弔天孫機杼五雲章簪珥飄瀟侍帝旁一札恩光慚賤子予一命翰林修撰其詞頭葢出公手有云行已無玷博學能文顧超絶之異材足鋪張于偉績百年清議在中堂望隆鳳詔絲綸美吟繞瑶臺雪片}
