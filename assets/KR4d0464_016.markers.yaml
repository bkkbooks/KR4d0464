  - {type: variant, offset: 6384, length: 0, content: '', WYG: 集卷十六欽定四庫全書秋澗集卷十七元王惲撰七言律詩奉誄大丞相忠武史公萬國鞭笞走帝庭堂堂爭識漢孤卿元勲高出麒麟上曠度初無智勇聲儷景去翻髯影駕柱天留在笏端銘白頭無地酬知己痛為蒼生淚滿纓追挽元遺山}
