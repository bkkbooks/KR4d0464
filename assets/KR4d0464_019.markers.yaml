  - {type: variant, offset: 3131, length: 443, content: 日笑談樽爼意平生酒壚不隔河山断隂翦其如骨蕞征用韓文公臨終事寂寞逍遥堂後木對床風兩最關情故人牢落曉星踈此日三王獨在予泉壤冷埋和氏璧牙籖空見鄴侯書問誰乆視嗟同盡老失知音慘自餘從此故祠鍾皷地謂去歲冬用三献禮祔母夫人于室此礼乆廢君首行之良可嘉尚過庭趨䖏半蘼蕪參議公在時賔客與君相接者未甞坐正堂上其謹敬如此衆呴漂山不易安勢張那復漲狂瀾一時附㑹真堪畏此際支持誠獨難貝錦斐文哀巷伯瑶琴幽橨变猗蘭一言曽擬桓矦辯醉裏哀箏爲謝弹病臻留飯作終天示我新文已惻然竒疾変常纔四日佳城埋恨便千年嘱遺不及私門亊燕翼全規誡子篇惆悵西山埋恨處定應大鳥淚如泉用後漢楊震事牡丹洛譜丹青說典刑畫欄春日見升平金盤薦品承朝露翠幄留香護玉鈴神女賦中羅襪歩少陵詩裏麗人行百壷莫惜花前醉樂事從來不易并海棠桃李無光分落英海棠姿色占春榮雲鬟緑擁粧𥘉罷醉臉紅匀睡未醒任使無香真可意放教千葉更多情光風流轉都能幾莫惜沙頭倒玉缾挽史九万户半生希古振長纓隱隱胷中冨甲兵三篋𥙷遺安世博千金爲壽魯連輕春風故里鳴珂逺暮兩山丘宿草生一傳散仙懐素叙為君珎惜比書評, WYG: 以下原闕}
