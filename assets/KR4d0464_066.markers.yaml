  - {type: variant, offset: 12583, length: 0, content: '', WYG: 欽定四庫全書秋澗集卷六十七元王惲撰翰林遺藁増諡睿宗仁聖景㐮皇帝玉册文臣再拜稽首言伏以至徳難名於穆乾坤之大孝思罔極有嚴祖考之稱稽遺美而載揚迺守文之先務𢎞宣令問茂對耿光伏惟睿宗景㐮皇帝秀㧞神支淵潛龍徳英武内根於仁孝温文外表乎謙恭先事而謀臨機善㫁當軍國撫監之際赫風雲册伐之功川蜀威加宋人為之褫氣鈞臺戰捷金源遂不能兵闢土宇而靖中邦翊炎圖而隆寶運策勲天府歸美皇靈方請命於上蒼思保安於宗社祥開後聖光啓皇元致今日之隆平蓋孫謀之燕翼惟天縱其睿智故澤流於子孫爰伸凝慕之誠虔舉増徽之典詢諸輿議允恊至公謹遣某官某奉玉册玉寶加上尊諡曰仁聖景㐮皇帝廟號睿宗遹守先猷仰聖靈之如在式垂歆鍳降福祉于無疆追諡先太子册文皇帝若曰於戲故皇太子某天姿玉裕茂徳淵沖朕紹纂丕圖仰遵太祖聖武皇帝遺訓以爾世嫡元孫譽望攸屬爰從燕邸正位春宫愈貴能謙居貞益慎及夫聽政揆叙有方至於睦親昆仲無間尊師問道日御經筵視膳候安時詢内豎佐予柔理惠彼小民方念神器匪輕投艱有託豈期前星揜耀永隔幽明日居月諸懐思曷已比者大臣敷奏冝易名奉祀光崇彞典今遣某官特册赐爾諡曰明孝太子永昭遺懿式慰朕懐尚翼明靈歆承寵渥皇太后玉册文維至元三十一年嵗次甲午五月朔某日嗣皇帝臣妥懽帖睦爾謹稽首再拜言洽萬國者莫隆於孝治揚懿徳者必著其徽稱洪惟我㓜沖人嗣無疆大厯服率先風化無尚於斯恭惟太母聖善懿恭睿識逺慮力行善事陰赐及民隆孝敬於先朝軫憂勤於内助宫壼仰其規範宗族化其肅雍誕眇躬而底于有成翊燕謀而俾登大寶深恩至徳蕩焉難名匪極鴻一作權尊曷伸至願載惟昭考已祔升於宗祧言念宸闡冝大崇其典禮庶幾均報仰答恩慈今遣某官謹奉玉册寶上尊號曰皇太后伏惟皇太后殿下端處福宫誕膺顯册儼母儀於四海徳配坤元期聖夀於萬年祥開神筴永資慈訓保我子孫臣誠歡誠抃稽首再拜謹言改元詔朕祗遹先猷嗣承丕構訪予落止在夙夜以靡遑永言孝思閱嵗時而増愴惟春秋之謹始實古今之成規適届履端聿新紀號可改至元三十二年為元貞元年咨爾有衆體予至懐手詔侍郎楊大淵省表具文朕恪守王封遽膺推戴即位之始不遑康寜惟爾逺戍邊陲久服戎政身外心内來陳賀章宜加寵答之辭以勵忠貞之節故兹詔示想宜知悉詔罷東平路管民總管兼行軍萬户嚴忠濟爾父承國家興運左右將士同心戮力封植東平屹為名藩我祖宗嘉爾父之功乃建為侯自爾嗣位又二十年朕初即政命復襲爵往即乃封敬之慎之其脩徳砥行自立名節勉圖後效無忝先猷十七日戊寅己刻上臨軒親諭諸路總尹遂以前東平總管嚴忠濟弟忠範為東平總管仍戒之曰兄弟天倫事至於此}
