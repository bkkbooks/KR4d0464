  - {type: variant, offset: 7115, length: 0, content: '', WYG: 既立矣道由生矣眎為餼羊乃予之耻秋澗集卷五十二欽定四庫全書秋澗集卷五十三元王惲撰碑絳州曲沃縣新修宣聖廟碑曲沃縣學舊矣始完於宋嘉祐初盛於金泰和間貞祐之兵蕩焉無餘前政苟訿初不遑卹園蔬興感薪刈其下者幾五十祀迨至元巳巳邑尹舒穆嚕公慨然以圖復為事工垂構而去尹侯簿賈天衢相與顧嘆曰蕭武弁能事烏可不卒其美然澤宫故地卑陋湫隘不足奠安神觀聳邦民瞻相治城西北陬勢夷且爽遂增崇前規而敞其禮殿焉旣落成董事者許良等感蕭君經始之勤今政贊終之善來謁文將刻石廟庭俾簉名於縣曹諸賢之列用垂示來哲竊不自揆敢以聖道之隆汚廟學之本末互陳而歴告之三代之世家有塾黨有庠術有序國有學以師以令肄俊造其中時書歳考小大有成然後賔而興之其典則六徳六行其藝則禮樂射御書數然不可不思其所自故入學釋菜奠幣于先聖先師示不忘本也彼朝夕見聞無非智仁聖義中和孝友睦婣任䘏之方凡邪説詖行放蕩僻異之術非可輔世教明人倫者率屏絶不容於其間故三代道出一致有學而無廟周衰王者迹熄生民不被庠序之教天理䝉昧心喪厥守異端百家之説乗隙並鶩不無厖雜壅底之蔽此太史公讀功令未嘗不廢書而嘆也及漢興學館林如鴻儒繼作師傳業受學古蒞官守其説而不易故謀王體斷國論一以經㫖為據於時公卿大夫士吏文學氣節雲蒸霧散彬彬然幾三代之風何其盛哉此無他聖道明而百家自息也迨魏晉隋唐以來慕高尚者以虚無為宗干利禄者以科舉為業其視窮理正心修己治人之道懵不知為何事時則三物之教弗明於上先王之澤不及乎下單為廟祀尊孔氏而王之三代教育之實泯泯掃地矣所謂有廟而無學間有卓越特達之士出芟夷浮學羽翼聖道為任然莫能拯起其弊而全濟其溺者何哉盖道之隆汚學之盛衰一繫夫王政好尚而為之有無也嗚呼三代吾不得而見之得見兩漢斯可矣今國家昭至徳建民極勸學敦農崇化勵賢凡可以風四方而開太平之基者靡不興舉故經明行修之士徃徃賔興天府擢位卿相以心正意誠國治天下平之道己嘗佐天子而理百官矣士之不志子古則己苟志于古舍斯時之易將何所求所待焉曲沃自昔以劇稱土腴物阜為絳諸縣甲俗剛儉力穡尚氣義憂深思逺奄焉有唐晉餘烈尤不可後者教也本}
