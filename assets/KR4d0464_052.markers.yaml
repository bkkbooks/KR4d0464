  - {type: variant, offset: 7127, length: 1, content: 予, WYG: 諗於衆曰吾黨仰滋天休取足厚載歲比豐穰人用樂胥可不知其自耶今神庭未備不足妥靈揭䖍其謂我何咸儆懼聞命柏與經畫起廢完故益新智者作其謀富者資其用取材于河陶甓于野􅀈礎于山然後工者輸其巧壯者服其役營務旣興先後有序於是繚重垣建臺門作重寢列兩序樹庭屏凡三十八楹丹刻翬飛輪奐離立其配侍法從}
