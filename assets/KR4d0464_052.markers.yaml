  - {type: variant, offset: 7126, length: 0, content: '', WYG: 告朔之所吾不知其可也銘曰維晉曲沃以劇稱絳山左戒汾右傾山川開闔氣上蒸風俗勤儉餘剛稜邑居萬家業有恒旣富而教廼世程嗚呼庠序教所生舒君作尹追良能奉宣徳化根以誠清廟起廢功勃興心計百至經載營惜哉垂構任遽更後人繼之卒有成方華古礎排巨楹文榱藻棟浮雲縈相前增崇尤克承教基鋪敦道日𢎞春風隱耳絃歌聲始謀贊終匪自矜吏民懐感思以銘我詩刻石碑廟庭平陽府臨汾縣重修后土廟碑平陽府治之西有鄉曰晉原帶汾河表姑射林墟櫛比泉流交貫無寸壤閒曠山霏夕景杏靄如畫故河東稱膏腴勝槩之地于斯為最風俗率勤儉盡地利憂深思逺有陶唐之遺化焉用是富庶而事神報本之禮尤恪歲時殫出惟恐居後豈終歲之勞一日蜡者之意歟樊氏里后土祠其來浸邈蒼烟喬木輪囷離披己百餘年物也兵燼來雖正寢巋然日就蕪圮里中父老某等閔其若是}
