  - {type: variant, offset: 7122, length: 2, content: 眎爲, WYG: 師帥者能仰體上之所嚮以明倫實教作新士民耳目俾知所以學異時人材輩出斌斌然追兩漢之風孰謂不張本於斯邪不然釣弋華名為}
