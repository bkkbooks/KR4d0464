  - {type: variant, offset: 0, length: 2948, content: 秋澗先生大全文集卷第八十中堂事記序余自穉歲讀書頗有志於丗甫及壯年彈冠應聘適際夫風雲慶㑹千載一遇之時荷囊載筆從事其間以至密邇論思醻酢吏務霑香紅藥之階接武雲龍之地若有所遇而大有以爲也不圗尔後蹭蹬於仕途者廿餘年囬視嚮之鴈行而請署者川泳雲飛觸目皆是比量薄分蓋有無非命者况今日就衰謝百念灰冷有求田問舎躬耕種樹而巳然覺吾􅎍中耿耿者尚在及閱故書復得當時直省曰録觀其諸賢聚精㑹神扵一堂之上所以開太平之基播無疆之休者班班可見因略爲修飾題之曰中堂事記庶幾有閱是編者知予生長明時雖無寸𥙷亦甞饜邦家之光為閭里之榮也藏之篋笥固不敢以千金享之異時有索野史求史臣中舎之所遺逸者不無一得扵斯焉至元二十四年丁亥歲秋九月七日前翰林修撰同知制誥兼國史院編修官左司都事秋澗老人謹序中堂事記上庚申年春三月十七日丗祖皇帝即位於開平府建號為中統元年秋七月十三日立行中書省於燕京劄付各道宣撫司取儒士吏員通錢榖者各一人仍令所在津遣乗驛赴省惲亦忝預其選是年冬十月至燕以三書投獻相府大率陳為學行巳逢辰致用之意頗蒙慰奬令隨省通知計籍使綜練衆務日熟聞見焉時行中書省官四員丞相禡禡資嚴厲凛然不可犯初與趙用行六部於燕至是就用為行省長官平章政事王文綂字以道大定府人前經義進士平章政事趙璧字寳臣西京懐仁縣人賀弘偉能任六事以氣量雄天下叅知政事張易宇仲一太原交城人資剛明尚氣臨政善断符士以誠忤之不復與合左右司郎官八郎中賈居貞字仲明真定獲鹿人金尚書右丞益謙之孫資聦敏有左氏學通諸國譯語郭榮祖字榮叔燕人部令史出身廣詳雅能酬應事変自大興府叅謀為今聀晉汝賢字才卿燕人班祗令史出身資隂克有幹局貟外郎王德容字仲寛河間將陵人部令史出身張桐字子華燕人班祗令史出身邢敏字公逹京兆人部令史出身都事劉郁字文季渾源人王徳輔字良臣陳州商水人經童出身提控令史李惟寅字舜臣西京人前進士楊文卿术甲謙字和之遼東人楊恕字誠之左房省掾馬璘字文玉燕新城人後叅知楊州行省事楽思齊字齊賢燕人王文藯字仲玉東平人終濟南經歷官劉傑字漢卿益都人王守正字賢之新城人宋筠字庭秀大名人楊顒字伯榮鎮之無極人今為京兆屯田緫管楊湜字彦清鎮之藁城人楊珍字國寳鎮之中山人蔡玠字庭玉相州人馮處厚髙唐人髙明字柔克汴梁人陳鼎字取新真定人閻沂字巨川行唐人李壑字𥙿卿相人右房省掾袁𥙿字仲寛孟州孟津人終順德緫尹李鼎字噐之相人劉作字述之柘城人呉璧字國噐邯鄲人張安仁字壽之宋璋字國寳柘城人梁徳佐字輔之燕人張適字濟之平灤人劉濟字巨川周鼎字噐之燕人張楫字巨川覃懐人架閣庫官二人邊字正卿徳興人經章出身王和卿太原人典吏四人劉謙字伯益盧慎字順之洺州人侯康濟字仲澤真定人王顯卿熊岳人黄華姪孫趙文輝字克明燕人張瓉燕人断事官阿虎女麥肖曲天八合赤唐古䚟老塔察兒其子燕真今復為断事官亦捻哥幹脫赤忽都奉御奏事官楊仁風字文卿潞州人今為真定等路宣慰使客省使一人班庭直字舜卿山隂人奉使三人孟甲字文伯太原介休人甞奉使大理有光遠功武茂字荗卿平定州人終鄧州統軍劉芳字丗傑中山人知省印二人許楫字公度太原忻州人杜字純甫通譯使三人阿里和之西域人道奴大哥王合刺王炳字煥卿太原人宣使五人李顯祖字顯卿相人蒲散禧字仲康終涿州尹王好禮字立夫真定人楊帖木児寗澣字清甫平陽洪洞人夾谷忽都虎今為真定䓁路宣慰副使回回譯史一人麥术丁其所譯簿籍搗治方厚尺紙為業以木筆挑書普速蠻字該冩衆事紙四隅用縷穿繫讀則脫而下之今為平章政事書填勘合令史二人馮崧字夀卿今為河南北道按察副使馬紹字子卿李從周字文則東平人仕至東朝断事官掌故二人馮渭字清甫真定人亡金松庵之子省令史出身完顔良輔亡金省知除房令史詳定官三人楊威字震亨太原太谷縣人治春秋義張永錫字孝純太原人周止字定夫濵州人資強發有口多記前人利害事條因言事見稱在當時有足觀者都堂懸其卷於幕中用勸來者自是㳺道頗廣甞權石司都事講集太常禮樂官三人許靖字唐臣安平人以三䇿終埸試太常檢討郭伯逹党仲和昔東平人同講䆒勾當編類一切儀禮及祀典合祭諸神等事肄習供衞事官二人樊興嗣字作堅燕人時令彩畫鑾駕一切儀仗服色等物及教習随収到控鶴等人授拱衛大使省理問官二人蔚祚字天禄人律科出身邊字邦傑人律科出身張雲鵬字鵬飛燕人今任浙西憲副掌記二人魏𥘉字太𥘉順聖人魏學士姪孫思廉之子初掌書記繼為邊関防令史令編類一切户口差稅宣課地畧塞䓁事宣課自領省立額幾何迄今增益幾何餘皆類此檢法兼縁堂一人沈侃字和卿大名人法律出身終陵州同知堂厨局長一人張抄兒赤省醫二人元鐸字振之獲吕人楊庸字君卿燕人鑄印局官三人劉淵字仲廣濟南人劉狀元子劉驥字思齊通州人前進士劉晉徳新子王利用字國賔大都人交鈔提舉司官三人張介字介甫燕京人部令史出身梁字秀實燕人王煥字紹明又有抄𥿄房即造局機造銀貨局元寳緫庫官李元字唐卿河南緱氏人前進士第王鶚樓確貨司官二人郭儀字冝之真定人部令史出身王諤字諤臣燕人萬億庫官二人魏祥卿魏學工姪交鈔庫官髙澤字濟民平陽人路字子敬潞州人應辦供頓官四人郭汝梅燕人終南京緫管重陽二哥斜飛西域人李瑞字天祥潞州人吏貟終㐮垣縣尹到省聽任人貟康天英字國才相人胡祗遹字紹開武安人終山東按察使李謙字受益令翰林侍讀學士劉宣字伯宣太原忻州人韓瓉字寳之平陽人馬天驥字彦良磁州人陳祥字君祥大名人張煥字彦明濟南人劉仲祥東平人張遹祖字仲賢順天人白俞字舜俞呉譲字謙甫時選至省者士人首以有無生理通曉吏事為問及取要所業文字盖審夫資身之術或能否從事及手筆何如耳又擬以士人充省掾吏貟𥙷两部令史東平士夫李謙聞之不欲吏辭去時堂議擬令諸掾巾褁一衣皁服仍佩書袋於上或曰書袋廢巳乆驟用恐駭觀聽若巾褁服止皁褐二色儘表於衆遂行焉是月剏建葫籚套省倉落成號曰千斯時大都漕司勸農等倉歲供營帳工匠月攴口粮此則專用收貯隨路儧漕粮科祗脩應辦用度及勘㑹亡金通州河倉規制自是舡漕入都常平救荒之法以次有議焉諸投下五户絲料譯語曰阿合塔木兒自來就徴於州郡堂議云如此是恩不上出事又不一於政體未便奏准皆輸大都緫藏每歲令各投下差官赴省驗數関攴其法每户科絲二十二两四錢二户計該絲二斤一十二两八錢其二斤即係納官正絲内正絲色絲各半外將毎户賸餘六两四錢儧至五户滿二斤數目付夲投下攴用謂之二五户絲以十分論之納官者七分投下得其三焉十一月甲子朔二日乙丑時夜禁甚嚴慮公幹有礙今有司置夜行白油木牌雖官府貴近非此不敢輙出徃時一切無頼䓁人侵暴不法之事盡行歛息時應乗驛馬皆從省府給降剳子堂議亡金時馬剳子上畫墨桃紀數今冝印以墨馬遂用之如三匹者三馬五匹者五馬仍用省印以傳其上癸酉済南宣撫司申宣撫副使王磐先生字文炳永年人前進士第道號鹿庵士致仕棄職去相府以惲係王席生令作書云省留之廼執覆曰鹿菴先生人品髙邁冝膺大受不可處之人下雖招之恐終不應不若從其好遂止𥘉行六部所㑹東平路民賦帳册或有言未盡者堂議欲覆實之令周止劉芳王惲等置局磨勘都事劉郁領其事於上惲等力言其不可不允至于再三曰徃事不冝䆒問此若一行非徒無益適足取怨兼衆怒不可犯也冝詳思遂寢時衆陳言等人以中元所降詔書内一欵節該有上書陳言者皆得實封呈獻若言不可採並無罪責如其可用朝廷優加迁賞以旌忠直至是日有言以求用堂議令詳定官分間其言為三等如體用兼備切中事機文彩可觀者為上雖乏文華其指陳利害有興除之方者為中餘皆為下除見區處人數外其餘量給路費省㑹寕家聽候十二月甲午朔時於省東織造局置司集諸路計吏類校一歳簿帳時相領務者退食後日一至按閱程務有未便即改立體式粛如也詳定官楊威以星變陳書省官冝解機務以避賢者不然且有大咎, WYG: ''}
