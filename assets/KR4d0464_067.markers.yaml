  - {type: line-break, offset: 0, content: '', id: KR4d0464_SBCK_067-1a01}
  - {type: variant, offset: 0, length: 790, content: 秋澗先生大全文集卷第六十七翰林遺藁増謚睿宗仁聖景㐮皇帝玉冊文臣再拜稽首言伏以至徳難名於穆乹坤之大孝思罔極有嚴祖考之稱稽遺羙而載揚廼守文之先務弘宣令問荗對耿光伏惟睿宗景㐮皇帝秀㧞神支淵潜龍徳英武内根於仁孝温文外表乎謙恭先事而謀臨機善断當軍國撫監之際赫風雲冊伐之功川蜀威加宋人為之禠氣鈞臺戰􅸩金源遂不能兵闢土宇而靖中邦翊炎圗而隆寳運䇿勲天府歸羙皇靈方請命於上蒼思保安於宗社祥開後聖光啓皇元致今日之隆平蓋孫謀之燕翼惟天縱其睿智故澤流於子孫爰伸凝慕之誠䖍舉増徽之典詢諸輿議允恊至公謹遣某官某奉玉冊玉寳加上尊謚曰仁聖景㐮皇帝廟號睿宗遹守先猷仰聖靈之如在式垂歆鍳降福祉以無疆追謚先太子冊文皇帝若曰於戯故皇太子某天姿玉𥙿荗徳淵冲朕紹纂丕圗仰遵太祖聖武皇帝遺訓以爾世嫡元孫譽望攸属爰從燕邸正位春宫愈貴能謙居貞益慎及夫聽政揆叙有方至於睦親昆仲無間尊師問道日御經筵視膳候安時詢内竪佐予柔理恵彼小民方念神器匪輕投艱有託豈期前星揜耀永隔幽明日居月諸懷思曷巳比者大臣敷奏冝易名奉祀光崇彛典今遣某官持冊賜爾謚曰明孝太子永昭遺懿式慰朕懷尚兾明靈歆承寵渥皇太后玉冊文維至元三十一年歳次甲午五月朔某日嗣皇帝臣御名謹稽首再拜言合萬國者莫隆於孝治揚懿徳者必著其徽稱洪惟我㓜冲人嗣無彊大歴服率先風化無尚於斯恭惟太母聖善懿恭睿識逺慮力行善事隂賜及民隆孝敬於先朝軫憂勤於内助宫壼仰其規範宗族化其肅雍誕眇躬而厎于有成翊燕謀而俾登大寳深恩至徳蕩焉難名匪極鴻一作推尊曷伸至願載惟昭考巳升祔於宗祧言念宸闈冝大崇其典禮庻㡬均報仰荅㤙慈今遣某官謹奉玉冊寳上尊號曰皇太后伏惟皇太后殿下端處福宫誕膺顯冊儼母儀於四海徳配坤元期聖夀於萬年祥開神筴永資慈訓保我子孫臣誠歡誠抃稽首再拜謹言改元詔朕祗遹先猷嗣承丕構訪予落止在夙夜以靡遑永言孝思閱歲時而憎愴惟春秋之謹始實古今之成規適屇履端聿新紀號可改至元三十二年爲元貞元年咨爾有衆體予至懐手詔侍郎楊大淵, WYG: ''}
