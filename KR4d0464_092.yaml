front:
  text: 秋澗先生大全文集卷第九十二事狀
  hash: sha256:ee04260ac5fcf8daaebb969c7a290862911b35491973a6d657f4e80d6c567d29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_092-1a}
body:
  text: 郊祀圎丘配享祖宗奏狀臣謹言伏念我國家列聖相承奄有天下六十餘載今海宇一統自堯舜漢唐以來未有如此之盛兹蓋陛下神聖天縱孝治日隆以不丗出大有為之資臨御有道故也然所有未舉大典在臣子分禮冝建言所謂方今大典郊祀是也何則孝莫大於嚴父嚴父莫大於配天自堯舜巳來至於金宋上下二十餘代之間莫不郊祭天地及五方帝神以配父祖蓋尊之至也祖宗之聖重熙纍洽郊祀之事未既舉行者緣禮文弗備有不遑及者今陛下即位二十餘年功成治定昭事天地尊禮百神略無虛歲若大禮一行將咸秩之位合禘於圓丘豈不大通神明降福穰穰者乎又念自古偏方小國尚皆力行尊顯祖宗以為天地百神之主恭惟陛下大廕謢助際海內外盡付所覆而上帝簡在陛下之心又大可見矣不於此時報本顯袒以答天休其於繼繼承承之道終為曠闕兼舊有典章自金章宗一行之後湮沒遺逸不絶如縷即今就有三二老儒并收拾到亡宋典册講究張皇一旦有成將萬倍於尋常使陛下垂旒𬒳衮對越上帝與三五同功並接數千嵗之統於上新萬方耳目於下使王道明而墜典興天地察而上下順聖政聖教不待嚴肅以成以治所謂聖人作而萬物覩也豈不盛哉由是而觀自古聖帝明王纘承先業所任之責未有重于此者故傳曰國之大事在祀與戎惟陛下裁察鈞州建先廟事狀蓋聞益廣宗廟大孝之本欽惟太上憲宗皇帝雖聖靈在天而神功武烈見于郡國者固當昭布逺暢以盡中外臣民之敬今河南鈞州係先太上皇帝王業所基戰勝龍興之地蓄靈擁休赫焉斯在冝營建原廟俾親王歲奉嚴禋以彰聖德光昭造邦之本誠嗣天子顯揚祖宗之至孝也牒司為中丞王通議病愈狀竊見前行臺中丞王通議去歲春自揚州赴闕奏事回偶患病疾百日作闕今過期年巳是平復即目居家讀書以教子為事其於已私似為安便若以方今選用人材之切如王通議者才術德望理當起復未宜投置散地若不舉明伏慮憲臺未知久遺録問保士人杜之材賈宗傳狀竊見新鄉縣布衣賈宗傳胙城縣中選儒士杜之材二人性沉厚端亮有文辝而通丗務讀書三十餘年安貧守道以耕稼自給未嘗枉已妄有干進其于士論略無瑕玷誠丘園之秀民廉退之良士也今者幸遭明時選材為急理當薦舉使拔出民間以備內外之用必能行其所學不負素守以之振士氣而抑僥風不為于時無輔彈保定路總管侯守忠狀檢會到中書省欽奉聖旨定與提刑按察司條畫內一欵節該所部內應有違枉並聽紏察除欽遵外今體察得保定路總管侯守忠麁魯無識凶暴有名恣意亂行略無忌憚不任以職猶恐敗群重之以官凶焰何奈以致不遵朝省對抗使人詈辱同僚穢言肆口耽誤經賦縱而不征引帶私人結而成黨取能聲擅斷職官樹威風敗壞官府其吏民枉𬒳凌暴者畏其凶惡罔敢聲欣所望察司少為抑按今又為阻壞如此中外嗟嘆莫不失色參詳本路近在都南實為要郡所轄一十五處軍民約十萬餘户據根本內地首恩澤固民心非良吏莫可今使凶暴如此之人臨民辦事正猶以豺狼守羊無不傷之理據此合行糾彈體復教授李龍輔狀今體復得本官併與元保相同當職又覩其為人雅厚清純臨事通方有如修整廟學訓導生徒舉皆有法雖淹滯年深未嘗妄有于求所謂有德有能可以從政者也兼知得北京南京教授俱蒙遷調理合升擢以激士風舉楊德柔狀竊見南京路録事司軍户楊德柔天資秀穎不妄干進纍歷管庫繼任本路照磨及奧魯府提控案牘檢法等官俱有廉能之稱其為書學尤為精妙方今少見其比今名在兵籍常以家貧執役行間譬之象犀珠玉要以不宜溷迹泥沙此士論之所共也卑職按巡河南見之廣座其學問行巳並與所聞相同據此合行保呈伏乞樞密院照詳施行論王學士合升承旨事狀竊見翰林兼國史院承旨中奉大夫姚樞今巳身故據本院翰林學士嘉議大夫王磐人品風莭追配前賢議論文章發明聖學方崇儒重道之秋膺養老乞言之眷者升授承旨職名以德以材實允中外之望據此合行具呈中書省照詳施行保舉提舉張從仕狀竊見前綦陽鐡冶提舉司從仕郎同提舉張從𥙿賦性良明為人謹厚兼通儒吏歷仕年深掌財賦而靄廉潔之稱論刀筆而有裁遣之敏加之嫉邪處正識逹時冝誠為有用之材皆係廉知之實理合薦舉以俟擢升特選行省官事狀竊見福建所轄八路一州四十八縣連山負海民情輕譎無常困苦者多其在邊隅實為重地存心撫馭尚慮失冝縱暴侵漁不無生事緣收附已來官吏以朝廷逺貪圗賄賂習以成風行省差擬職官又多冗雜擅科橫斂無所不至致政壞民殘草寇竊發指以為名下愚無聊因之蟻附其嘯聚去處附近平民盡為剽掠內地軍興不免蹂踐中間雖有憲司紏治梢末尚艱所行其於根本有無如之何者甚非朝廷包荒一視同仁之意求其治要無過得人為先且府州司縣等官雖不能一一精擇據見闕行省官僚如平章左丞二府名位特選素著清望簡在帝心文足以撫綏遺黎武足以折衝外侮盡忠所事籌䇿有方不以利賄為心使剷除積弊矯正枉濫肅清邊陲庶幾民安事靖日趍治域以之招諭則彼心可服以之進兵則我直大信今賊之所以滋蔓為梗者正以內闕官僚乘虛有名故也可不深計而熟慮哉設或不尓雖濟濟布列上下相蒙以私害公民之困弊猶焚溺水日益深且熾矣得失之機實係於此卑職叨居風憲覩其如是有不敢自惜而緘默者論草寇鍾明亮事狀竊見福建一道收附之後户幾百萬黃華一變十去其四今劇賊鍾明亮悍黠尤非華北未可視為尋常草竊誠有當慮者今雖兩省一院併力收捕地皆溪嶺囊橐其間出沒叵測東擊則西走西擊則東軼凶熖所及煽惑殺掠為害不淺招降則賊心不一攻圍則兵力不敷又兼春氣動時雨行彼負固我持久恐猝難成功以冝益兵力置總戎一節制追奔合圍勢至窮蹙其將自斃惟復特差重臣宣示恩詔招諭撫慰以安中外兩者之行庶幾有一得保醫儒胡璉狀竊見衛輝路醫儒胡璉資性詳眀學術有素凡經治療多獲痊安據本路見闕醫學教官若令璉輔充勾當教育諸生必有開益據此合行移牒請照驗施行保儒生韓弘牒草竊見衛輝路録事司後進儒生韓弘性溫雅有士行素明經學兼習詞章嘗試以事論議容止舉皆可觀據兹良碩冝備時用以勸後來今將本人所業文字録連在前合行移牒請照驗施行論教官俸給事狀竊念天下之事得其人則治不然雖有紀綱法制將衰薾而不振此必然之理學校者育材出治之本也見承奉御史臺札付該諸州府皆有受勑教授仰免差儒户內選餘間子弟入學修習儒業仍令各路正官朔望省視及按察司官選試行義修明文筆優贍可以從政者然後解貢此誠為國育材以備文武內外之用固非細務也却教授多係老儒宿德白首一官不沾寸祿良可哀也今欲修習之業旬省月視賁有成效亦巳難矣合無照依國子學醫學教官一體頒降俸給不然據見有學田去處于每歲收到子粒內宫為眀定斗石月充廩給以濟貧乏外無學田者唯復别議定奪如此恤勸庶幾官無虛設之名學有賔興之實將見文風蔚興有不期然而然者矣論開光濟兩河事狀省議即從所論罷役會驗近欽奉詔書內節該自今以始煩民之事一切革去便民之政次第舉行欽此今體知得省部符文準前工部尚書李奧魯赤等呈開洗東平濟州等河道并創修閘堰可役人夫一萬餘名計該八十六萬五千餘工合用石材地丁等物且舉德州一處所著該白棗木九千餘條每條長六尺徑四寸石材九千二百八十餘假每假長四尺闊三尺厚七尺計其餘該著數目比之德州豈止數倍雖云和買目今驗户樁俵上户十假中户不下五七餘塊並不見發下價錢即要赴所止送納日夜催併殆不聊生緣石材地丁非民間素有積蓄之物計其採買上價般運腳力上户已不能辦下户將何以給有破産逃竄而巳深為未便邊年創開海道益都淄萊濟南東平東昌等路百姓巳是疲乏死損數多哀痛之聲至今未息今又東平等一十餘處供辦上項夫役等物比夫海道之役亦為不輕是齊魯魏博數路之民𬒳擾無遺又念前政苛撓去歲不收民多流亡加以今秋風水蟲蚄災傷所在闕食恐又聞此役復業者轉行不來見在者又將逃避山東重地不可不慮兼此役浩煩未審曽無奏聞儻巳後不能成功虛費國力百姓實受其弊將來誰任其責然此却訪聞得李尚書等官見行安置土壩九座合無候來春土壩修成更為責委深知水利官貟一同相視光濟兩河於深淺不常時月斷流走沙去處試驗土壩委能積深浮重轉漕糧船迤久通行快便然後修理石壩尚為未晚仍於出産石木去處官為差顧夫匠採打用度不致取辦一時逼迫靠損人難卑職謬當言責以鎮靜為職親覩其事不敢不言合行移牒請照驗備申御史臺照詳施行論濟南路所轄逹魯花赤合遷轉事狀竊見濟南路所轄州縣見任達魯花赤內承襲勾當及巳滿年深未經遷轉者一十三貟今朝省庶政稍有未便務從一新若將上項逹魯花赤人貟於本投下州縣內依例遷轉實為使當庶不致恃賴久任樹黨行私官吏因之受弊據别路未經遷轉者亦合一體定奪保李提學昌道狀伏念俊造秀異皆稟氣之清造物者靳固未嘗多得今有其人使徒老明時誠為可惜竊見前上都路提舉學校官濟南李師聖經明行修不妄干進文筆性學皆有古風及扣以政事議論通暢皆切時之務可謂年髙德邁學冨才優韜晦城市不求聞逹者也朝省以選才為急如師聖者若擢以風憲或置之館閣俱有所長可收實用論濟南經歷闕貟事狀凡厥政務必官吏相須而後能濟若官有其人或吏獲其用二者得一則事無留難竊見濟南路所轄州縣一十三處路當山東要會事務頗繁所賴首傾官調議規畫為切今本路經歷知事俱各闕貟問得經歷孔文貞省部别行差委東平等處勾當却於本司署御請俸將近期年又本府憲司親臨於上今照得簿書未完事理九百餘件久乏其人責以事有未辦實上下之所難理合作急選注材能使輔其闕庶不致耽滯一切事務議盜賊民患莫甚于盜賊不可視為小事近年作過者皆於通塗大邑公然行劫略無畏憚者以應捕無方弓兵數少故也臨時力弱既不能擒捕既去應命追趂三限巳過恬然無事乞請將州縣尉司重行整搠所有弓兵定其不應占破之數悉歸所司以重其威力使潛消盜賊公然無畏之心且盜賊竊發正以衣食難飢若稍年難且有縱橫不可制之勢何則人盜有形而易為之破竊賊無迹潛聚潛散難為之取也彼盜賊料其物既易取官無如凶惡之人鮮不動念我若度其如是預為備之之則將能為矣縣尉雖責專一捕盜然用得其材乃可所除多是承蔭子弟不間事務又不習當處選擇一等舊曽作過不良人充師問詰捉雖頗有功效中間作弊有不勝言者如賭博匱房宰殺牛畜等皆其事也又有因盜將良民俱被收禁正賊反行出放以致有與歹人暗行辭其在輩流實不多見加以揚歷省臺通介有守照得例五品已上宫不限職掌有文華者即命制誥若本官於翰院學士內相應名闕升用實為允愜士論合行移牒請照驗備呈中書省定奪施行秋澗先生大全文集卷第九十二秋澗先生大全文集卷第九十三王堂嘉話序中統建元之明年辛酉夏五月詔立翰林院於上都故狀元文康王公授翰林學士承旨已而公謂不肖惲曰翰苑載言之職莫國史為重遂復以建立本院為言允焉仍命公兼領其事時不肖侍筆中書兩院故事凡百草創經營署置略皆與知其年秋七月授翰林修撰同知制誥兼國史院編修官方帝澤鴻厖賚及四海誥命宣辝頗與定撰再閲月蒙二府交辟不妨供職兼左司都事自後由御史裏行調官晉府秩滿復入為翰林待制時則有苦左丞相監修國史耶律公承旨霍魯忽孫安藏前左轄姚公大學士鹿菴王公侍講學士徒單公河南李公待制楊恕修撰趙庸應奉李謙不肖雖承乏幾於一考其獲從容侍接仰其祖宗對天之鴻休聖訓無窮之睿思皆聞所未聞者至於文章髙下典制沿革朝夕饜飫所得亦云多矣今也年衰氣耄盡負𥘉心因紬繹所記憶者凡若千言輯而為八卷題之曰玉堂嘉話其成燈火茆堂之夜尊罍心賞之間吐嘉話於目前想玉堂於天上鳴息有時盛年不再良可歎也然昔人有宅位鈞衡不得預天子私人為恨顧惟此生不為未遇用藏家匱以貽將來至元戊子冬季二日前行臺侍御史秋澗老人謹序
