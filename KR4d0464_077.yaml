body:
  text: 樂府行香子乙酉歲九月二十五日過林氏西圃與主人公洎張道士看花小酌林曰若作數語以記其來使通俗易解甚佳既歸不百步得樂府行香子一闋醉立斜陽浩歌而去秋霽遙岑何處登臨水西頭來散間心繞園細履栽種成隂撚秋香浮酒碗入孤斟老境駸駸鄉社浮沉醉顔酡白髮盈簮夕陽歸路聽我長吟待野梅芳多載酒再相尋江神子金朝遺風冬月頭雪令僮輩團取比明拋親好家主人見之即開宴娛賔謂之撇雪會去冬無雪今歲𥘉白如此燈下喜賦此詞録奉逹夫且應撇雪故事為一觴之侑也小窗遙夜失冬嚴覺春添捲踈簾掌許氷花撩亂撲風簷喜倒坐中兒子輩爭指似謝家鹽一杯燈下醉掀髯處窮閻最情忺萬壠含春江上麥纎纎應笑凍吟蘇老子楷病目認青簾眼兒媚賦燕子樓用幹臣繼路宣叔樂府韻橫塘煙淡冷涵秋寂寞舊粧樓珠簾夜月露桃幽怨總是間愁形滿骨化情緣在此恨若為休長河解浣佳人無那倒捲黃流二滿簾夜月耿霜秋雲夢黯歌樓殘燈伴曉夕陽催暮海水添愁天涯地角相思恨誰道此生休一篇照映唐人詩雅千古風流三我來吊古過悲秋徙倚夕陽樓畫堂歌舞都能幾日何限幽愁合歡牀冷孤眠若爭向死前休慿欄間看一雙雞鶒對起中流四西風歸燕幾經秋人老水邊樓一燈孤枕滿襟清血花也含愁前堂歌吹新聲有爭似去來休長河若解將姝遺恨與淚俱流五呈周幹臣桑榆晚景日駸駸莫厭數相尋靜憐幽境間談情話與滌煩襟濟時幸有諸公在鄉社好浮況間雲却恐西風吹去認做啇霖鵲橋仙壽胡紫山秋香懸桂光風轉蕙掩盡尋常花卉西城來往巳風流更點檢生涯次苐堂名休逸䇿扶流憩點間中風味雞聲才動巳扶頭紅日上花稍未起二調羮粉桂愛香種蕙自笑秋風野卉兩椽茅屋對青山𥘉不羡入雲髙第將心自逸欲行且憩為噯清時有味桐江波上一絲風儘容得嚴光不起三金蓮蜜炬紫山仙侣夢寐青門瓜圃春風著處是行窩要一笑人間今古錦箋佳句新聲金縷灑遍薔薇清露東華待漏滿靴霜恐輸與西城杖屨四和劉夢吉䪨髙人非古沖襟粹宇要覽德輝飛舉伊周元不是庸人吾志在箕山巢許蘭紉有賦菊香釀黍夢斷糟床秋雨淵明卧老北窗風猶勝似清談夷甫五沉酣往古棲遲衡宇劇有弓柖此舉長林豐草野塵心是中散生平自許日邊草賦矛頭炊黍誰道間雲有雨周宣輔衮要深功除喚起當年山甫六金鸞視草蒲輪應召客路人情殊好豈知野鹿飾金鏕志却在長林豐草霜風料峭形容枯稿愁緒百端縈繞故山歸去有茅蘆任束置長沙諌藁七五窮作崇百端相滯破帽一風吹碎邯鄲道上斷人行銷鑠盡元龍豪氣啇顔綺季當時不起誤甚漢家經濟書生薄相到還元要結末黃虀滋味八為何繼先夀調和謀斷論思機務許大茫茫疆宇當年姚宋救時才聽沙路歸來好語階翻紅藥省運溫樹滿貯春風瑞露眼中庭檜欎蒼蒼道晚節昌於韓圃浣溪沙壽李衛尉矍鑠當年漢伏波紫微垣外侍雕戈笑騎天駟下天河華髮雅冝麟閣畫春風先送武城歌朱顔休惜捲金荷二內黃道中風栁婆娑半畒隂兩株巧與道相鄰樹頭幽鳥侶知音馬上行人思困睡天邊赤日欲流金解鞍休惜濯煩襟三送王子勉都運關中薊北分㩗已六年秋風淇上又離筵一樽情話重留連內史調兵推漢相春潭通漕笑韋堅嶽雲拖翠上吟鞭四題韓氏别墅翠竹連村映白沙小岡回抱一川斜旋開幽沼聽鳴蛙樵客局邊驚橘樂黃塵門外任蜂衙樹頭山色晚來佳五客亭觀漲老雨長河壯怒濤客亭夜久聽喧號平明兩涘渺江皋沙尾沒來漁箔短危檣看處客帆髙斜陽汀草亂青𫀆六夀周幹臣十載相期紫禁遊一官誰想客西州春風間倚仲宣樓四海論交真益友一年好處是中秋壽波無惜捲金甌七吳村道中在平陽府北三十里汾水西三月十五日送客回作緑樹連村際碧山春風吹水漲黃彎沙汀蘋滿釣舟間薄宦﨑嶇清議裏風煙吞吐畫圖間夕陽明處鳥飛還八至元九年秋九月登秋風亭觀雨呈賊曹參軍周幹臣雨勢蒼山共一雲雨聲作氣張三軍秋風亭下葉繽紛官事何憂嚴限促天心不負老農勤夜窗孤客儘先聞九乙亥自夀時二孫行一女孫兒時避人事在汾西廣福院梅點氷梢蠟蒂凝蘭芽珠樹鬪鮮明團欒香火此時情避世逺慚金馬客現山人道老人星雪邊岩檜儘青青十夀湯總𬋩十載煙花紫禁遊嘉謨曽輔翠雲裘歸來尤荷寵光優畫戟清香髙北里虎符金節照南州夀波無惜捲吟甌十一夀王子𥘉六合澄清到一家顒顒文物望中華未容詩禮飬蘭芽松柏後凋元有待圭璋涵潤本無瑕誥恩行墮五雲花十二王中丞許贈新香不至書此以催之珍品無多百和濃露沾婆律濕蘭叢喜分新供到南豐螺甲未融金雀餅芳菲巳夢碧湘宫寶猊先障繡簾風十三六月𥘉三日與學官髙伯祥夜話於魏府之清潤堂露榻風簾燭影搖故人留話慰瀟條徘徊花月可憐宵天淡有雲空漢漠月明無雨更翛翛洞天歸路踏瓊瑶十四送劉仲元赴平定州親迎青鳥西傳燕尓期乘龍喜氣見修眉芳倧濃似去年時禁臠名香天盻重玉臺春暖鏡鸞棲人生樂處是新知十五賦筝朋盍華簮醉未霑主人張樂見厭厭一聲銀甲裂霜縑澗水咽氷翻隴怨將軍出塞憶蒙恬碧桃花底王十八賦筆朋盍華簮醉未霑主人張樂見厭厭一聲銀甲裂霜縑澗水咽氷翻隴怨將軍出塞憶蒙恬碧桃花底玉笙惉紅翠叢中樣度新桃花扇影駐行雲隋唐嘉話閲來真一片錦帆浮汴水兩京花栁暗風塵彩聲曾動鳯城春付髙彥卿十九雨點鳴鐃裂竹聲併隨牙板一時停詞源都作建瓴傾白羽揮開諸葛陳蒼濤翻動憲王陵低空知有彩雲橫隋末唐𥘉與漢亡干戈此際最搶攘一時人物盡鷹掦褒鄂有靈毛髮動曹劉無敵簡書光爭教含泣到分香二十旅館燈青夜色曛據牀談劇作春溫胸中雲夢入雄吞清議素髙烏府月秋霜低壓漲江雲吳山山下惜輕分中秋雖見月桂花出沒于雲影間有不快人意者作此詞以歌之月色都輸此夜看人心偏處即多慳碧雲吹恨滿瑶天儘著氷壺涼世界故將隂巧妬嬋娟桂香和露濕幽彈二十一贈朱簾繡滿意苕華照樂棚緑雲紅灔逐春生捲簾一顧未志情絲竹東山如有約煙花南部舊知名秋風吹醒惜離聲二十二為張右丞壽輔衮功深浴鳯池好賢人道似緇衣佩聲清響見委蛇千歲壽祺隂有積兩宫恩眷古來稀東山歌酒樂時熙二十三𥿄帳梅花夜色清行雲香濕墮銀幈惜花人老若為情對酒當歌須適意凌煙圖像是虛名十年編簡幾人青點絳唇夀周幹臣秋氣平分畫欄桂樹秋香底良辰美景拚取花前醉彭壽添君白也詩堪擬髙歌起月波如水長照金鐏裏二夀涿郡房二尊親露影庭萱一枝金綻叉頭鳯寶花香供壽席光浮動懿範閨門姻族同推重瓊杯捧二親安寵共醉玻璃甕三送董彥才西上揚桞青青玉門關外三千里秦山渭水未是消魂地坦卧東床恐減風雲氣功名際願君著意莫揾春閨淚四癸百夏六月五日同河中府官宴白樓倚檻清歌一聲髙遏行雲住長河傾注不煞曦輪署燕寢清香畫棟珠簾雨人何處一樽緑醑滿眼青山暮五題絳州花蕚堂時天暑回自河中一榻清風故山邂逅欣相遇緑隂池樹蕩漾瑶翻處赤日紅塵前日中條路人良苦壯心如故快斥王陽馭六後六月二十二日同府僚宴飲白雲樓時積雨新晴川原四開青障白波非復塵境忽治中英甫索鄙語酒酣耳熱以樂府歌之晴倚層欄飄飄醉上青鸞背飛雲崩墜萬疊銀濤碎青障白波非復人間丗人懷霽夕陽有意返照千山外七為房祖母壽婺女呈祥瑞光分自雲衢爛鳯萱金燦留待佳辰綻林下丰容閨壼瞻儀範香縈篆玉顔如練歲歲長康健八夀周幹臣千古詩壇苦吟誰得風騷妙羡君才調一蹴無邊徼歲歲中秋喜見朱顔好霜蟾皎一蹲傾倒萬事秋毫小九為丞旨唐壽卿夀秋氣平分欎蔥都作充閭喜玉堂風味磊落青雲器醉墨烏絲緑綺傳湘水千秋歲月波如洗長照金樽裏十雨中故人相過誰惜幽居故人相過還䎸語話餘聮步來看花成趣春雨霏微吹濕間庭户香如霧約君少住讀了離騷去十一春夜喜雨好雨知時萬金𣣔買𥘉無價種花才罷似為芳枝下花重宫城好箇風人雅從飄灑探花走馬明日春如畫十二雨霄即事春雨空濛晚來點綴間庭景一牀燈影潤入琴絲冷清夜況況誰慰孤懷耿雲生鼎倚窗髙詠愛此春霄永十三探花春雨添花繞欄來看花開否海棠紅瘦緑葉花如豆梨雪生香近在清明候花為友莫輕辜負預問鄰家酒十四喜芍藥發芽紅樂當階朝來撥土紅芽秀畫欄晴晝憑暖佳人袖一粒丹砂誰點仙根透從今後為渠釀酒去作花間友十五春雨後小桃端正樓空一枝春色誰偷得夜來消息暮雨胭脂濕倚竹佳人翠袖嬌無力須相覔一樽休惜轉首春狼籍十六已丑清明前一日春露堂即事時既雨快晴明日書示友人主人出名酒相屬因放歌數闋而去實至元二十六年三月七日也可為不虛度此節矣秋澗老人深香間適春雨如膏最憐適與清明遇晚晴庭宇畫出樊川賦苒苒行雲低拂垂楊度春如許亂花深處幾點薔薇露十七西灣即事碧玉環深一樽同醉清明後緑隂晴晝多少間花柳身丗虛舟日月驚跳走誰豪右志懷惟有拍泛船中酒平湖樂十章平湖雲錦碧蓮秋香浥蘭舟透一曲菱歌滿樽酒暫消憂人生安得長如舊醉時記得花枝仍好却羞上老人頭二鑑湖秋水碧於藍心賞隨年淡抑外蘭舟莫空攬典春杉觥船一棹汾西岸人間萬事暫時放下一笑付三平陽好處是汾西水秀山挼翠誰道微官淡無味錦障泥路人爭笑山翁醉西山殘照關卿何事險忙殺暮鴉啼四秋風嫋嫋白雲飛人在平湖醉雲影湖光淡無際錦幈圍故人逺在千山外百年心事一樽濁酒長使此心違五採菱人語隔秋煙波靜如橫練入手風光莫流轉共留連畫船一笑春風靣江山信美終非吾上問何日是歸年六秋風湖上水增波水底雲隂過憔悴湘纍莫輕和且髙歌凌波幽夢誰驚破佳人望斷碧雲暮合道别後意如何七緑荷相背倚西風涼露煙霏重翠蓋銀瓶醉時捧使君公徑須傾倒玻璃甕青山城郭暮雲樓閣髙下一重重八安仁雙鬢巳驚秋更甚眉頭皺一笑相逢且開口玉為舟新詞淡似鵝黃酒醉歸扶路竹西歌吹人道似揚州九水邊楊柳緑絲垂倒影竒峯墜萬疊蒼山洞庭水碧玻璃一川煙景涵珠媚會須滿載百壷春酒撾鼓蕩風猗十黃雲罷亞捲秋風社甕春來重父老持杯十分送使君公秋成不似今年痛太平天子將何為報萬壽與天同十一乙亥三月七日宴湖上賦春風吹水漲平湖翠擁秋千柱兩葉蘭撓鬪來去萬人呼紅衣出沒波深處鰲頭遊賞浣花風物好箇暮春𥘉十二山隂修禊説蘭亭似覺平湖勝春服𥘉成靚粧瑩玉雙瓶興來徑入無何境使君髙燕年年此日歌舞樂升平十三柳邊飛蓋簇晴煙人在平湖宴碧瀲瑶翻映歌扇綺羅筵人生幾度春風靣江山畫裏一時人物斜日重留連絳桃春堯廟秋社社壇煙淡散林鴉把酒觀多稼霹靂絃聲鬪髙下笑喧譁壤歌亭外山如畫朝來致有西山爽氣不羡日夕佳壽李夫人六首眼明欣見太平人環佩嬰香潤洞裏瑶華自髙韻八千春裊煙巳報長生信一杯更買麻姑蒼海安坐看楊塵謝林髙韻本蕭然百歲春風靣白髮兒孫羡康健誥鸞解彩雲扶下長生殿鄉閭盛説一家榮飬初不羡魚軒南枝消息小春初香滿間庭户見説仙家舊風度壽星圗瑞光浮動雲衢婺繡筵開處散花傳盞彩袖不曽扶小園不惜買花錢粧點蟠桃燕傳語風光莫流轉百來年人生幾度春風靣細思誰似君家阿媽康健地行仙牙牙長憶點粧紅曽得含飴弄此日筵前一杯捧白頭翁紫簫吹斷繁華夢百年留在故都瓊樹依舊動春風慈親康健説誰家李氏人難亞鏘鳯筵中見多暇醉簮花肩輿勝似宫門畫從今看取君家餘慶門户爛生華壽府僚錦貂千騎朔方豪瀚海淵波浩畫戟清香看傾倒醉仙桃秋光雖晚人難老煙花紫禁玉魚金帶新寵照朝𫀆九辛卯九月二十五日夜解衣欲睡適有飲興顧樽湛餘醁燈綴玉蟲而樂之然酒味頗酷乃以少蜜漬之浮大白者再覺胸中浩浩殊酣適也仍以樂府絳桃春歌之少年鯨吸酒如川甘苦從人勸老大含飴最深戀要中邊一甜掩盡黃柑釅更憐中有百花風味一笑為君妍十笑分花露出粧奩香軟金杯瀲滿著華池潤吾咽展眉尖坡仙釀法真堪羡却憐蜜課蜂兒官府辛苦為誰甜如夢令和曲山韻仕宦須求遭遇不顧已沾泥絮穰穰丗間人總𬒳虛名引去引去引去光景促於朝暮半丗隨波從衆幾被狙翁調弄富貴苦相謾一枕槐根春夢春夢春夢况復此身無用友道雨翻雲覆膠􅃮幾人持久遣興漫題詩客至有錢沽酒沽酒沽酒徑入醉鄉無有老境心便多暇束縛塵纓髙挂飯飽去尋君間步間吟間話間話間話過眼紛華都罷柳圈辭六暖煙飄緑楊橋旋結柔圈折細條都把發春間懊惱碧波深處一時拋野溪邊麗人天金縷歌聲碧玉圈解祓不祥隨水去盡回春色到樽前問春工二分空流水桃花揚曉風欲送春愁何處去一環清影到湘東步春溪喜追陪相與臨流酹一杯説似碧茵羅襪客逺將愁去莫徘徊秉蘭芳俯銀塘迎致新祥柭舊殃不似漢皋空解珮歸時襟袖有餘香醉留連賞春妍一曲清歌酒十千説與琵琶紅袖客好將新事曲中傳樂府合歡曲讀開元遺事去取唐人詩而為之一名百衲錦因觀任南麓所畫華清宫圗而作驛塵紅荔枝風吹斷繁華一夢空玉輦不來宫殿閉青山依舊御墻中亂橫戈奈君何扈從人稀北去多塵土已消紅粉艷荔枝猶到馬嵬坡歲東巡洛陽城天樂宫中夜徹明不憶李摹偷曲去酒樓吹笛有新聲雨霖鈴却歸秦猶是張徽一曲新長記上皇和淚聽月明南內更無人憶開元掌中仙入侍深宫二十年長記承天門上燕百官樓下拾金錢錦城頭錦江流回望長安帝儘愁那更血魂來夢裏杜鵑聲在散花樓驛坡前掩嬋姢慘亂旌旗指望賢無復一生私語事柘黃𫀆袖淚􅏰然九龍池百花時樂按梁州愛急吹揭手便拈金碗舞上皇驚笑勃拏兒信音沉淚沾襟秋雨鈴聲閣道深人到愁來無會處不關情處也傷心後庭破子晚眺臨武堂緑樹連逺洲青山壓樹頭落日髙城望煙霏翠滿樓木蘭舟彼汾一曲春風佳可遊驀山溪氷姿綽約翠袖翻清露林下謝夫人依然是故家風度搔頭玉重雲髻不勝寒繡簾踈涼月細一點香來處清摽一插脈脈秋如許無語對西風恍當年六朝瓊樹幽窗深鎖莫厭惜娉婷瑶臺路藐姑仙恐跨青鸞去鵲橋仙大德辛丑歲八月𥘉四日壽平章相公夫人金波秋靜桂欄香重瑞應能羆佳夢錦棚擎出玉麟兒道釋氏老君親送壽筵增慶朝鞍歸控恰及瑶觴拜棒平津起舞棣華歌好一醉玻璃春甕秋澗先生大全文集卷七十七
