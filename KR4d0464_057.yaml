body:
  text: 碑輝州重修玉虚觀碑嘉平道士介練師范君贄禮幣來謁拜而請曰弊觀在蘇門頋惟狹陋然歴年乆實爲自昔名額敢託斯文俾見興造本末暨師真住持所自用傳不朽廼宿昔所願言幸憲使惠頋越爲光有赫按所具事狀州西郭曰草市城北走出廣薪門百舉武有觀曰玉虚攷其肇基盖始於前宋政和間所建大定𥘉仍賜今額爲正殿一旁小殿二中設三清四聖元辰䓁像函丈後列神閍前敞下至真官齋壇賔客庖庫之位咸叙而即冝承平乆法供大行鍾磬齋魚之音隱然聞山水間蔚爲共前儲祥勝地壬癸兵餘日就荒落厥後清虚弘道真人來主治之月殿星壇稍復於舊㝷冷公西歸属之通妙嚴君顯奉師訓惟恪乃創水磑稻田禇莊䓁業雖罄刮衣盂資贍徒侶大有方便丙申冬嚴既示化真人致慮弘深召上足通真師梁志一謂曰玉虚道埸藐尓于共今繕修頗完資用苟有第道匪人弘何以行逺矧共山群彦所集半爲方外眷属微汝曷克洞玉清之虚静承文獻之頋接哉於是唯而來嗣飭治焚修其用充儼巳有者守之日固方來者増而歳新復於百泉西涯買田數畒築致爽亭貯經史植松竹號嘉惠別舘娯言一室罔間儒墨暇則鼔琴詠歌將以挹蟾房之景氣接鸞鳯之遺音豈惟與泉石而爲伍也雪齋姚公愛其幽勝亦甞徜徉其間與師爲蒼煙寂寞之友傳曰尚友知人梁之爲道槩可見矣既而師倦勤盡以後事付髙弟道燦燦爲人姿䟽秀氣爽而象恭志継而本立守護傳惟恐墜越其徒稱之曰能燦姓張氏自童行入道今三十六年矣甞觀道家說有玉清玉虚等號亦猶天有九霄神霄爲最髙然冲而用之於道體何在是固老子法虚心實腹守爲清修要者盖心不虚則道無以入物無以容教無以受而腹無以充矣坐進之功苟踈疑存之理或熄若道燦者法壽方爾主治院門甚力至於接外務崇本宗誠能中虚而應物以道膄而充腹者焉正自師祖師梁庸玉汝於成之㫖也若然則其爲後來紀綱是者矜而式之継爲不朽無窮之傳也必矣仍爲門人作詩俾歸來望思以極道真之本其辝曰蒼蒼共巖桂連蹇兮杳焉予懷仙遊逺兮山空日寒悵疊巘兮宫居粒食思展轉兮遐想仙標玉雪質兮彤車載花紅一色兮醉鞭星馭金虬蜿兮粃糠塵丗宅閬苑兮嗟嗟堪輿一烘爐兮徃古來今爍無餘兮丗外無物湏人徒兮刳滌玄覧歸静虚兮服餌節飲差少瘉兮弱志強骨壽吾軀兮庶幾真筌師同符兮噫大元國大都創建天慶寺碑銘并序大雄氏之爲教如慈雲慧日覆燾無際惟得其乂道乃大行宫居像設亦從而熾盛之我國家鼎定全燕教隆内典故精藍勝刹粧嚴寶界金碧相望有佛國大乗氣象維永㤗寺肇基自遼彌陁者㤗之别院也大安兵燼廢撤不存鞠爲茂草者五十大元至元壬申有僧雪始來結菴而主之先是師業嗣法猶窟潜天德以經戒嚴機鋒峻越在雲朔名動京師甞假息間有以天慶名所棲而告之者𥘉不諭其故既而駙馬髙唐郡主聞師名德喜之既覯止即依慈䕃扣真詮師順事方日有所覺以至承嗔獲譴非罪而罹苦毒者因師一言多所縱釋其後王請師住豐之法蔵院仍贈具錦法衣用著顯異㝷以道行上聞有詔所在護持及觀光大都郡王廼出重幣易是院爲師待問駐錫之所與其徒奉香火修㓗精進而已至於建大道埸擴充無量功德盖遵養而有俟也逮甲申冬皇孫紺蔴刺以師持誦保釐故欲辟静室處之宫府辤不可翼日出貨泉二千五百緡洎名驃二仍諭留守叚禎詹事丞張九思即所居庀徒蕆事起三大士正殿丈室七巨楹下至門閭庖湢賔客之所略皆完羙始於乙酉之春成於丙戌秋仲役𥘉作闕地得廢鍾所刻天慶二字考之盖有遼建號也事夣既恊即爲新寺名額於是倚晬像於金光沸潮音於空際有來諸天普臨雙樹顧諟永㤗廢餘復爲清涼法觀矣後三歳奉皇孫奩香禮江浙各刹起造蔵經師冐渉江湖徃返萬里存神過化髙風所及奔走供養且有金仙通靈茄藍主護之應吁亦異哉凡得經四藏計二萬八千餘卷分貯大都之開㤗天慶汴洛之惠安法祥及未豊法藏院仍以法物付之使人無南北通暢玄風壽聖皇賛寳緒天花雨紛𣑽唱雷動日開八方之供者此師之所圗惟也宜其經來神衛號應基先雖老栢重榮神松囬指有不是過者遂不千里逺持待制王之綱事狀以寺碑來請曰山僧空踈無足比数以義以契尚憲使與頋以銘章貺之始終之願畢矣予以師憙儒學有噐識所交皆藩維大臣文武豪士緩急於士大夫周旋不榮悴間解紛振乏要有實效然去來其間殆雲凝而風休也甞即寺雅集自鹿菴左山一大老已下至野齋東林凡一十九人作為文字道其不凡時方之廬阜蓮社云是亦將因儒釋僧之特逹者也冝其行業成就如此固可以著金石而垂不朽矣師諱普仁字仲山姓張氏雪堂其道號也丗爲許昌人父丗榮官至豐州司録叅軍母夾谷氏師生有禎祥甫毀齓不葷酒嚌𥘉祝髮於夀峯湛老再具戒于竹林雲和尚及叅永㤗贇公一見噐異即蒙印可至有機鋒洒落瑩徹氷輪頭角峥嶸先騰星緯之諭贇派出臨濟第而上之師乃慧照十九代孫也過鎮陽樹碑表行濬源接派以昭其本於尊祖追逺光又赫焉余甞論天下之事雖小大有殊醻酢注措皆有本末就釋氏教論之佛法者本也塔廟者末也崇其末而遺其本求進於道亦以難矣若師也可謂持用有方審所先後者哉乃隨喜讃歎而作偈曰道之大原出於天物生而静乃本然扶持有術繫後傳惟聖日逺湮其言奪攘矯䖍紛目前佛乗自西來笁乹慈愍濟度心爲先衆生迷惑不知覺沉溺苦海甘流連人乂安得以手濟以法爲枻經爲舩奉持頂戴破黒業火宅變幻生青蓮龍宫紺殿儘瞻禮具香湏滿黃金田阿師振錫下南海豈爲頭角争昻軒向來四萬八千偈重與震旦開經筵燕豐汴洛還舊貫佛界珠網摇秋煙群昬再曉棲至善如夢日月金沙渊漢人得經纔四十未若此舉思無邊功圓行滿師不有歸之帝孫祈永年八方奠枕磐石靖天子萬壽南山堅聖孫神子麗不億惟城惟藩復惟宣歸來丈室炷香坐但覺鍾皷清而圎從此婆欏雙樹底知師澄定草鞋禪大都路漷州隆禧觀碑銘漷州距今新都東南百里而近本漢泉州地遼爲鎮而亾金縣焉兵後井邑滿索僅存縣治原隰平衍渾流芳淀映帶左右建元已来春水羽獵歳甞駐驆民庶覩羽旄之光臨樂遊豫之有頼故生聚市閧旋踵成趣至元十有三年遂陞縣爲州從吏民之請也爰有道舘據城之西北維亦由是而修崇焉住持圎素大師劉志實者許之長葛人夙秉淑質自童行入道師希真劉志永永即長春丘公髙弟清虚韓志谷一再傳也𥘉師永誅苑於都之東郊刳心坐忘凝塵空竁者十年盤山王棲雲道價髙一時歆其精修枉道造謁自號麻衣老壽八十有四怡然而逝師之在弟子列也侍晨昏服勤勞人所不堪已自若也積寒暑三紀猶一日然麻衣見其持守不易皮毛盡而真實在可與有立於是以通真觀属院曰玉晨菴者令主張是戊午間誠明真人愛其地佳而氣腴嘱之増建以應有開之先始焉荒㕓二十餘畒敝屋數間蔽風雨而已師乃以和光同塵樸實感物爲方至一郷欽嚮願言信施有不期然而然者助益既多功用漸集遂起三清殿繪玄聖於堵所謂上九位者居其中又畫日月星官歳德師聖岳瀆等神列侍兩傍雲舒霞蔚彩絢目殆玄象肇分端倪呈露下至嚴禋有壇静棲有室凢所需皆具以屋而計者三十楹歳時清供真仙來臨鍾磬之音隱然空際誠迎祥之別舘一方之榮觀也既落成洞明宗師以今名榜之及玄逸真人張公嗣教嘉師之勤命書石以昭厥後遂介錬師劉文甫來請銘予以謂肯心而構易固而新豈唯瞻者増敬其因衆成功同延慶壽荅鴻休而畢師志使來者祝嚴罔逸而隆福降簡穰之本是固所當書者仍以黃庭七言體歌以系焉其辝曰道家者流玄黙稱抱持其雌無所矜屋居火食相奉承鳶飛戾天魚在泓疇不若尓休其生爰因像設心自兢仍用善俗滋良萌漷州維南泉故城玉晨有庵無所營敝廬數間僅幪帡一旦締結三十楹煙光𥻘𥻘萬瓦青正自肯搆今有成要擴師授昭予誠爲國迎祥禱上清鑾輿歳幸實省耕延芳春水紛霓旌遊豫何翅歌三登千秋萬歳樂事并道人百拜乞此銘隆禧因之播永馨雲間歎賞聞愾聲安知不有成公興大元故關西軍儲大使吕公神道碑銘盡瘁以事上忠也守志以完節貞也忠貞之澤流潤後人㑭功名奕葉冨䝿一時而親弗逮者天也故聖人垂光揚之典可以貫幽明而慰存没斯亦孝之至義之盡也若夫負卓越之竒材抱騫騰之逸志起家侍從收功轉漕臺閣藉風雲之舊門庭眩組綬之榮始以故家遺俗終以令聞令望振門閥而紹先猷者吾於遂城吕氏見之矣吕氏丗爲燕陲鉅族值金季搶攘譜諜墜逸髙曽而下澷不可昭穆公諱嗣慶字昌齡考諱祐仕皇元由行尚書省掾充諸路人匠府緫𬋩妣李氏公㓜喜讀書不從群兒嬉既冠氣貌魁傑學通經史善騎射長於辝令思以竒節偉論表見於丗耻齷齪出人後時朝廷逺控北樓詔龍門劉公元帥黃公行臺于燕柄用頗顓决公䇿時務所急及便益民編者十數事以撼二公果竒其材識以國士許焉既而挈之北覲引現太宗皇帝薦其材應時需堪備供奉上偉其儀觀收隷御帳下碌碌𥘉無所知名居無幾何譯語國體閑習通曉如素䆠於朝者由是稍得近侍上前公資聦悟應對周旋動恊睿意自爾顧遇頗異出入殿庭寒暑夙暮十載間謹畏小心未甞易常度上審其可用命提點尚食局事國朝大事曰征伐曰蒐狩曰宴饗三者而已雖矢廟謨定國論亦在於樽爼饜飫之際故典司玉食供億燕犒軄掌視前丗爲重凢群臣預御衎者冠珮服色例一軆不混殽號曰只孫必經賜兹服者方獲預斯宴于以別臣庶踈近之殊若古命服之制公前後𬒳賜只孫錦服十餘襲寵數之隆于斯可見歳已未憲宗下詔伐宋車駕由隴山道漢蜀趣合州之釣魚山大兵既興糧餫爲大計庭議推公冝膺將漕乃降璽書金符充関西興利軍儲大使公轉致有方給授均一士無飢餒之色民寛飛輓之勞竟用勤劬致疾以庚申年正月卄四日卒於京兆府官舎得年四十有三歸葬隧武之西原從祖竁也公資倜儻有大志奉上忠事親孝交友誠進不隱謀退無私議古今成敗胸中皎然吻縱波濤屢中倫慮材優噐幹事無盤錯膂力方剛經營伊始謂利澤施於人功名昭於時可力致也一旦濟浩浩之長川中流柂折渉漫漫之逺路半道車傾土論于焉爲之歎惜夫人王氏系保定大家姿温恭静淑公没之歳纔卄有八舅緫匠府君尚在堂二子方髫齓挺志自誓仰事俯鞠亢起夫宗爲任遂嚴奉舅璋壽終八秩教育二子至於成人爲長子澍娶金名臣追謚通憲先生梁公孫女今以才華英邁練逹政務任樞幕經歴爲次子渊娶漕僚清苑王君仲女資秉幹敏棣蕚輝映任承事郎管勾中書承發司昆季簉名朝籍校丗䆠故家不失舊物皆由夫人節義有方以之扶持者也姻戚郷閭至援稱行羙取爲訓範女一人適大都郝氏孫五人澍之子道安女惠鵉渊之子定安季安賜安壽五十一終於大都私居之正寢越三日祔安玄堂實至元八年十一月十六日也澍既長樞幕秩中通貴一日與弟渊謀曰今粗有所立猥荷析薪可不知其所自邪惟我先人大志不遂賷恨下泉妣貞幹内事克隆遺緒潜德遺淑大懼墜佚有求銘太史掲石神道賁松檟而垂示不朽融管彤而發越幽光罔極之恩庶幾昭報廼以不腆之文來請某自惟昔任裏行與澍婦翁孝可定交時澍方聮姻婭自是友義日篤于今三紀以契以舊有不得辝者謹掇其義烈言言振衰風而厲薄俗者銘之其辝曰維趙北際保爲名城風聲氣習而燕與并越此兩間古多豪英游談尚氣芥拾功名矯矯呂侯資秉忠貞濟以學問又多藝能文武備具冨之邦經嚢錐脫頴已爲丗驚一朝麟趾來儀紫庭入侍帷幄即允帝情錦衣分賚寵數光榮佐啇有道奚趐割烹大駕南征如靁如霆食惟兵本以先啓行曰轉曰漕軄焉汝勝民安飛輓師樂均平心計鞭筭以經以營鵬圗海運九萬𥘉程一僨不起其孰使令秦川慘澹有來英靈不隨朝露溘焉替零化之閨壼義烈烝烝二子承慶若綬彯纓婉婉幕畫執樞之衡顯揚有例聖經義明郎峯西峙雞距東傾武隧西原風水攸寕葬復從祖多祉是膺元身不殁永振嘉聲古所謂不於其身而在於子孫者其言有徴何以驗之視我刻銘大元故昭勇大將軍北京路總管兼本路諸軍奥魯緫管王公神道碑銘并序國家當肇造際所在豪傑應期効順卑世矦疊將鎮據一方父死子継兄没弟及蹈故歩而執成規固自若也逮夫守成尚文登庸賢俊通遷調而革舊襲明治道而考殊功所謂閥閱子弟持崇髙之體不學無術噤不能有所施爲備貟而尸禄者多矣論其籍父祖之緒餘卓爾以才傑著聞膺朝廷之選遴藹然称爲良牧伯者誰乎予於孤竹王公見之矣公諱遵字成之丗家平州之遷安縣祖諱誥亾金貞祐𥘉任興平軍節度幕官攝府事方大元經略中夏皇太弟國王奉命率兵出揄関循竜盧塞而南雷砰電激所向無前府君審天命之眷臨憫生民之塗炭遂挈二州五縣板圗投獻轅門王嘉其忠赤首倡大義即聞於太祖聖武皇帝蒙授榮禄大夫興平路兵馬都緫管知興平府事㝷錫金虎符加左副元帥兼安撫使父諱德明字才卿早嗣丗爵属遼右𥘉定撫養遺黎職修藩翰光奕先業焉公㓜頴悟好讀書年未弱冠入侍藩邸即能練習國體通曉譯語及長資沉毅負髙氣所交皆一時豪傑立志宏逹恥碌碌隨人後歳戊申襲父職仍佩金虎符公自祗承先政夙夜惴惴惟恐失墜視民事爲難不敢忽易遇政令之不便時俗之未安思而不置憂形於色必咨訪更張俾理順事得而後巳未甞恣情眈於游宴二十年間猶一日然咸謂臧孫有後於魯榮禄之澤未艾也辛亥歳入覲憲宗授本路緫管兼萬戸俾專兵民之政殊光寵也丗祖皇帝踐祚分朔南爲十路肇建緫管府以公奕丗材賢授平滦路緫管換佩金虎符且有奉公忘私當副所委之諭至元乙丑轉官制行授懷逺大將軍知中山府事三年陞昭勇大將軍彰德路緫管六年改懷逺大將軍緫尹順德路九年復昭勇大將軍升授太原路緫管兼府尹本路諸軍奥魯緫管十四年遷北京路緫管兼大定府尹以疾不赴卄一年上章致仕日與故交雅士用琴書棊槊相娱樂序宿好暢幽情𥙿如也不幸於至元卄五年正月卄有七日薨於私第之正寢享年六十有四越七日葬於遷安縣東石橋西原祖塋之次夫人安氏山東東西䓁路宣撫使安公之女和柔貞順光備婦道今壽登期頥夫人髙氏出盧龍處士家資賢明勤於内助主持家務營辦公喪預有力焉子男五人曰國彦蔚州採木提舉曰國傑俱先公没曰國英不仕曰國士早丗曰居仁髙所出忠翊校尉湯隂縣尹子女三人長適宋氏次畢氏嚴氏男孫三人不花永興公資雅重智慮周宻奉上忠接下有禮善養名馬識别鷹隼衣冠修㓗車從閑雅有承平豪䝿風度人徒知氣習體貌移養如是而已不知其當官蒞政持灋謹嚴聽断明察以公正自處凛然有不可犯之色務要紀綱立號令行其治相尹并皆監司理所工匠群不逞之所集公與辨曲直折姦橫不絲髮貸同僚以相假藉示并容爲言曰爲之在我者當如是因公道而致私憾吾不恤也雖時不相能後竟以事直而心服焉所至興修廣學尊禮師儒崇礼讓而抑豪強致差賦辦集民安俗阜然悃愊無譁不示裱襮持守剛果終始如一故治績混然不可指摘有古良吏風當中統至元間聖天子厲精政事以成効責中書一時宰輔皆極老成選咸謂素無選舉篤責之漸惟師帥得人上澤可下宣下情可上逹庶幾德化之成太平有象矣故各路緫尹愼擇其人至有虚曠歳月不肯輕以畀受者公之擢拜適丁玆時故四歴名郡兩増崇資皆出公論之所在卒以称聀聞已足以伸眉髙談有光故家含笑瞑目無愧先丗矣公既葬之十載嗣子居仁念潛德遺懿恐遂湮没聞不肖乆忝太史屢銘當代名公貴人乃件右事狀請碑其神道向公移鎮洹上不肖適退居淇右相衛之交相去不百里逮尹晉陽亦判平水幕汾晉兩府南北相望故稔知其政績後以迎迓事南來㑹遇於張少尹昊公館張與公爲風雲故契談其家丗行已爲詳是則今日論述巳有開先之兆矣敢勉爲次苐而重之以辝銘曰遼西惟漢右北平自昔用武地必争榆関北控盧龍撗夾右碣石山海扄沉雄氣欝貫斗精王公孕秀時之英天兵南下轟雷霆羣情恟恟孰敢嬰惟先奮效忠與貞玄黃于篚王師迎兩州千里不震驚寒谷陡覺春陽生風雲儷景同飜騰載丗柄緫民與兵一朝繩武光嗣承鵾鵬變化天東溟大合澄清朝日升修文偃武論治經唐虞黜陟公幽明罷侯置守除因仍德譲凛凛望乆凝漢二千石任可勝政刑相時量重輕剸裁錯莭需鋒稜善良與護姦惡懲大綱既振道自弘興庠育材昭丗程吏畏民愛風化行歴典四郡稱循能趙張才氣耻近名白頭一節匪變更庶幾無忝先業榮丗期福夀方川増勤勞致疾孰使令生存華屋丘山零嗣惟克肖孚孝誠銀鈞翠琰勒我銘蔽芾用播甘棠聲遺黎伏讀爲愴情墮淚當與征南并秋澗先生大全文集卷第五十七
