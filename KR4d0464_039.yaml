body:
  text: 重建衛輝路總管府帥正堂記汲之為郡其來久矣自唐𥘉易而為州歷五季宋金率以防禦節度使來尹治之故其公𪠘制度廣狹視厥秩夷而不敢越逮國朝中統建元之明年升州為府前政因仍不及改作加以歲月深土木弛狹隘頽弊朝夕視事有不堪其處者後二十五年嗣侯答失帖木兒暨總尹耶律漢傑判官常德繼軫來任既而與相議曰維大府距河朔衝會部二州四縣一司治稱匪易堂則乃赫焉具瞻之地其承宣王澤聽斷民事齊肅禮容號令約束盡在於是今狹陋若爾殆非所以恪正事而儼官守也又以品秩等威視堂之隆殺固不可與嚮也相類於是張皇前規􅌟而一新凡為楹三巨筵東西六尋有竒南北邃三十有七尺髙爽靖深公居儼稱復作左右翼廳各三楹及增崇儀閈俾與新𪠘映帶相奐仍扁其顔曰帥正復舊觀也凡三月告成詢其費曰安取輟公稍以給之越六月某日命饗於新堂會僚佐屬吏與郡之士夫肅四方之賔旅大合樂以落之望之儼然與飛雲傑構相雄跨矣故老嘆息以謂百年來方覩官府若斯之盛吁治其可忽也哉而忽而治只在公正從違而巳然則何為公事不私之謂也故公則生明何為正正巳而正不正者也故正則可大天下之事未有不公而治民未有不正而格官孰有不順而穆者乎于斯之際當官者固未睱以清心省事為職而守正從新何嘗有時不可之聞哉大凡人之心公而有恆德者苟事有可為必為之不怠詎肯以歲月去留容其心於間哉今斯役之作惟其若然故能於共億鞅掌外又復興滯輔弊如此可謂賢也巳既卒事來丐文於余以邦大夫之賢者方事之以相勉况鄉國盛事其敢以不敏辝於是乎大書于石庸告來哲抑又知公等必葺之意云至元草六年歲在巳丑五月日記郭氏挹翠樓記共人郭子忠起書樓于所居之西市以地形爽塏髙甫尋丈而有縹眇飛動之勢既落成來丐名與記豫以共為邑距太行東麓連山疊阜映帶回抱矯首而觀盡得西南林壑風煙之勝因扁其顔曰挹翠顧惟淡僻仁智之樂蚤歲有懷嘗從諸賢讀書山房灑灑然遂有所得如龍門石門白鹿嵬百家岩等山皆左戒絶觀雖常歷覽而屢至然蠟吾屐而踐其形固未若支手板而當其氣之爽也若夫積翠橫空一碧萬仭空𪷟霏微騰滋泛潤眷我樓居壷開碧供而又秋雨霽殘陽暮夕氣轉佳千鬟濕霧主人於畏詠飛鳥與還之詩誦煙光凝紫之句攬其秀則詩脾儘清挹其輝則芳樽溢渌至於野風吹來江月引去曽黎明而巳集喜虛懷之延停吾想夫共之全盛時愛山而起構者若湧金之麗譙公廨之危榭太師張公之溪亭丞相蔡侯之别墅其餘臺亭觀閣層軒曲檻前後非一雖昔人已非而山川良是嚮之挼藍潑黛爭妍競秀為名家之竒貨供騷客之珍玩者一旦悉為郭氏奄去不知一樓之勞之費其將幾何乃為造物所偏而獨饗者乃爾其冨冝乎釋然而樂興有餘而樂無窮也因念萬物盈於兩間洪纎髙下固云不齊要其氣體物吾與也𬒳山之丕凝篤實發光輝若然由家之絫積善行致慶流餘𥙿今郭氏在承平時為衛之大家丗以藥石為業乃若爾考爾叔秉彜藴秀稱鄉里善人其翼其肯者斯美具在子今不失舊物能擴而充之齊其本而大其末與霏霏微微者日新於華構之上俾後之來者挹而注之以膏其末光霑而漬之以衍其餘慶安知方寸之木不髙於岑樓也邪至元草四年歲次丁亥上元日記秋澗記山之有澗壑猶人之有量數也苟夷隘以狹人將無以自處况能物之容乎太行諸山去郡西五十里而近豫嘗逺遊西自百家岩東盡靈山北崦並山之麓深溪巨澗橫斜交絡折地而東鷺秋水時至萬壑潨澮允猶翕合咸就約束滔滔汩汩迤邐而去或清或濁無逺無邇不擇細大順受而併容者此澗之量也至於流潤決壅激而為飛湍旋而為盤渦匯而為淵渾東而為細流岩屋以伏其怒巨石以殺其勢就泛長傾順流逺引溉平田而有秋浮大丕而出谷不致肆濫橫潰使一漫流害注大川而後已者此澗之功也及其忽焉收潦千里一空曽不少遺用以自潤縈紆盤折沉深闊逺漲䀶在而流沫空沙尾平而崖涘峻紛兮交貫矌兮長虛水之去來雖有緩急澗之吞吐𥘉自若也又類夫含章可貞或從王事無成有終者是又澗之不有其量之與功也嗚呼澗乎其見用於秋之時乎豫嚮在京師客有善推䇿者嘗有所請渠曰子非王秋澗乎豫曰然客曰既云秋澗致用有在第未之至耳然觀子之流行異時當有東南逺役大冨厥覽不特泛長江而觀七澤也願子思存乎見少不自以為多可也是則澗之量數不其容乃大歟余唯而退至元草六年巳丑歲秋八月望日記堆金塜記國朝癸酉歲天兵北動奄奠中夏明年分道而南連亘河朔衛乃𬒳圍粵三日城破以州旅拒不即下悉驅民出泊近甸無噍類殄殱𥘉星妖下流淇上羣兒氣吐成謡閧歌里陌間曰團欒冬半破年寒食節絶人煙之讖尋罹厄實貞祐二年春正月十有二日也時太一度師蕭公當危急際以智逸去是年冬十一月師自河南來歸睨其城郭為墟暴骨如莽師惻然哀之遂刮衣盂所有募人力斂遺骸至斷溝眢井攓蓬坡塞掇拾罔漏乃卜州西北二里許故陳城內地鑿三坎瘞而丘之仍設醮祭以妥厥靈遊魂褫魄薤露莙篙同歸一竁其棘林暮夜之號隂壁枯血之火熒沉啾寂無復光怪蓋因冥薦而脫異滯之幽依道廕而復坤靈之厚幽冥雖殊存殁兩有慰焉而師之掩覆仁心於鄉梓之義極矣今其封俗呼為堆金冢言人骨久而化金石也每歲清明後一日邦人聚奠以信些孺本宫為尸而祝之六代師全祐懇豫文紀其事以昭先德嗚呼三代而下以智力相角其勢不干戈血肉而莫之已何天地生物之仁返如是其盩哉豈周天之運厄會有時中來而不可逭邪豈立極之道仁義迹熄自取陵遲而然邪豈蒼茫兩間𥘉無關係物盛而衰自然而然邪皆不可而必也第嘉師生平以道濟衆力苟可及不忍以一物失所類如此𥘉師既葬主柘之延祥觀壬辰冬大兵至城下師懲前日河朔兵凶之慘復以一言活萬家于鋒鏑之下古稱澤及枯朽矧生人乎師之謂也向使師遭時得位其仁民愛物之功豈如是而已耶因併及之師諱道輔字公弼甫冠嗣主宗教後加諡號中和仁靖真人云至元十九年龍集壬午窮臘日堇記霍嶽肇祀記至元九年冬朝廷以郡邑鎮山大浸載諸典秩者所司三載一祀霍嶽在河東實為靈鎮故事每歲以仲夏土極之日用信報禮昭處度也明年癸酉夏六月草六日惲行縣北走霍邑前次洪洞雨不克邁越翼日抵趙城適嚴祀省牲之夕乃率霍州判官連漢臣監縣事塔的尹裴國用主縣簿劉偉齊宿祠下將事之夜霧雨交作既祀之朝隂霾四開三獻禮成冷風肅然神峯鷲嶺軒豁呈露雖韓潮陽之禮衡嶽孔廣州之祀南海不足以喻其快也陪祀者府兵曹解禎縣佐史髙政稅監張承慶邑人薛昌齡獄廟道士李志真興唐寺僧普光執事者吏王庭玉等一十五人遂相與饜飫神貺而退承直郎平陽路總管府判官前監察御史汲郡王惲題記從行者閭山張思誠子公孺表忠觀碑始末記至元庚寅冬豫自福唐淂告北歸前次臨安客有以表忠觀碑為言者字作擘窠大書殊偉麗也詢之馬御史德昌如所聞云觀在龍井不十里逺能一到其下豁先覩為快何如豫以長淮迫凍為謝適鮮于生在坐屬伯機他日打一本惠及足矣曰諾既而杳然明年辛卯秋吾友傳君士開赴官兩浙仍託以取逮壬辰夏六月傳自杭特令人付來其碑作四巨軸裝潢如法蓋亡宋故家物也噫坡書在霄壤間忠義之氣鬱鬱然秋色爭髙雖片言隻字不可遺逸冝其世寶而力致之也故心存夢想求以三歲之久跨越江湖至自二千里之逺一且髙堂素壁如天珠河圖弘壁琬琰對越左右誠可貴也左山云古人不可復作所淂見者筆迹而已况公斯文關繫世教令人讀之油然有忠孝之勸烏可秪以翰黑為之論乎然一一較之蓋印印泥折叉股之法也是月草八日書于春露堂之扶踈軒睢州儀封縣創建廟學記道之大原出于天以之修齊治平格非心而敘彛倫者孔孟之教之功也其為天下通祀冝矣况存神過化之地乎儀封縣金正大間割考襄東明三邑地立治于黃陵之通安堡以古儀城在焉故名考之儀即春秋衛之邊邑其為孔輅頓次封人請見之處諒無疑矣兵後縣廢歲王子國家經略河南移理于通安南平城里桑土衍沃民俗便安然官府𥘉創禮文之事有未遑暇者吾夫子歲時假公舍而釋菜焉其邑長盛君即議起廟堂於艮方後為風雨攸壞癸亥秋裴滿君自陳留令耒尹斯邑既告謁顧清廟如是惴惴不少安乃與監縣奧兀刺等謀曰承流宣化事神善俗皆我之責吾夫子政之本教之宗也嚮以濟時行道轍環中國以木鐸而徇衛者屢矣千古而下時移事在雖眇邈聆遺音而二仲楹奠車聲轔轔肅焉來格不侈大宫庭將曷以發越奎光致邑人觀感之深者焉遂與繼任火者赤暨僚屬各捐俸易爽塏地於東南􅑍士庶聞風亦翕然響應於是定方中繚崇垣起禮殿敞神闕下至講堂齋舍庖湢之所莫不完美元聖素臣黼座有儼宏麗靖深蔚為東南宫廟之冠教諭張庭圭等實董其役君既代之明年尹程亮簿劉楫嘉其謀作之勤烏可使無聞于後乃令學直李攀鱗持狀來丐文以紀本末小子惲嚮提憲閩海道出兹邑親覩斯美周行慨嘆何有志成事也如此是可書也因重為告之曰風化者致治之原人材者為政之具人材盛衰民俗淳湡一係夫學校之興替故前人以庠序為國之元氣誠知言哉我國家以神武戡定區宇至戊戌間生聚甫集首閳猷設科擢賢雋復户役其所以開太平之基者固權輿于兹矣逮聖天子嗣復張皇潤色越先朝有光如釋奠具儀禁護著令內而開國學訓胄子庶幾成均遺法外而勉郡縣鄊社置師儒以揉鄙朴擢用講明條格甚悉于明德新民之具崇尚循誘之方可謂備矣而任師帥者承宣贊理以副上之所尚宜何如哉裴筮仕𥘉以通國字充胄子教授宜其下車首議教基敦風俗為本可謂知所務矣尹諱翼丗為遼右顯族資明逹以廟學一莭觀之知其為能官者某年月日堇記義勇武安王祠記汲縣縣治即故尉司公𪠘內舊有武安王祠莫究其所始而可見者金泰和𥘉信武將軍完顔師古重加修飾昭然禱而答靈貺也兵後廢撤不存有元中統癸亥簿聶元擒詰強禦未即厥事假靈于神已而如所碩遂即治左復廟而貌之癸未之水又從而圯焉至元丙戌真定録判劉聚來主縣簿以遊擊有功田里頗安不敢居其能越神明是歸遂以起廢為巳任星甫周神栖像設一切修而廣之妥靈揭虔中外交肅既落成來懇文以紀本末仍表夫神之所以昭昭者豫乃為之説曰忠義者天下之大間良心者衆人之素有惟夫超倫逸群之士淂時行道毅然不拔乃能見二者之用而使後世畏仰愈久而愈不忘者豈非公歟公遭漢室傾頽群雄血閧玄黃之際識昭烈而翊戴之紹延漢基而明君臣一定之分報效曹公不為利訹以決去就當然之機至氣凌三軍威振中夏而擅國士之風者此無他不過擴秉彛之良心信濟時之大義耳公既沒其隂相餘烈加于生者殊多豈豪傑英偉之氣無時而息加以人心素有聚精于此默相動蕩有不期然而然者邪是則公為不沒矣嗚呼其可不敬也夫故百世而下宫居血食衮冕而王冝矣及夫卋教下衰禍福警動之説興淫祀妄禱唯知曰我祭則受福此豈理也哉孰謂神顧而饗之耶今汝等既新斯宇當念夫神之所以致斯者義而已吾之所以感神者能極夫義之所至則幽明兩間豈惟感格之理名實俱淂將見簡簡穰穰之福降而孔那矣俾刻諸麗石以告來哲至元草八年五月重午日堇記勉齋記人有不若之耻天下事未有行而弗至者况秉彛昭融從容于循勉者乎郎中杜君季眀聞㒒名而喜之書所著勉齋等篇贈豫疾讀數過其修辭行已一以經旨為據有味哉斯言也誠信道篤持志堅進進而不畫者也豫乃為之説曰夫聖人之道體微而用費辝要而理奧雖聖賢有所弗知故學之者不措也克而至于極愚必眀柔必強書之懋哉詩之匪懈皆是也子思子因道述教發越微奧曰勉強而行之信聖賢之善誘致用自淂之良規也然乏粹美之姿者不可淂而勉無資深之志者勉焉而未易淂二者皆具無致用之位徒勉一躬俾兼善之功不及于物斯亦君子之所耻也故傳曰幼而學壯而欲行之由是而觀士志于學不止徒善乃為循勉之極今君懿秉超卓言慎行敏挺身頽波砥柱屹立逰公卿之門當形勢之途毅然以道義自任不為外物所移日廣忠益思成具瞻之美推轂多士以伸兼善之心正以負強矯之姿明當勉之理自誠而明由已以逹物其大者逺者還有功而立致效也為不難將見一拳之石聳泰岱于目前一勺之水沛霖雨于天下是則嚮之思而得勉而中從容中道聖賢與同歸矣㒒壯年竊有志于卋巳嘗少試于用間或勉中思得念天下之事莫此樂也今行就衰謝及聞伯夷之風振衰激懦耿耿有不去其懷者因為長歌揄揚吾子之勇且寓夫余之感焉歌曰安肆日偷衆情之常乎黽勉日強君子之志乎施之有用斯又古人之難乎矯矯杜君知耻近勇之倫乎見諸行事而復德曰新乎牙磋玉琢殆起豫者啇乎行雖衰矣衷或誘其愚乎雖佩玉長𥚑尚足以利乎走趍也于是乎書終南山集仙觀記豫自壯歲宦遊四方經涉河山大地昔賢遺迹未嘗不仿徉臨望冨覽勝槩而去尚自視欿然者獨欠秦中一遊每聞談關輔形勢漢唐間風聲氣習翹翹褰裳夢寐長往今年夏四月有虛齊道人楊姓者踵門來謁拈香具禮磬折而前曰側聆先生名德久矣自惟何幸於焉淂遇繼出一圖示余指似云終南縣重陽祖庭西南甘源水左由石寨入峪道即陡隂磴山行二十里而逺抵望仙平淂唐巳耒集仙庵故址山中人傳云昔有古仙人吕翁者嘗學道於此近代有長生師劉公愛其崦曲幽勝清泉灌木隂湛連壑乃結茅雲隱略有興築兵餘雲荒石老無復人迹林光空翠景氣長新當時貧道從三洞弘玄師真侍香重陽丈室既而以法籙事辝師入山結習修靜遂步上甘谷東峯不覺適喜曰此吾巢松稅駕之地也乃與方外二三友道宣聰真輩定居而建其所當奉壇場神室等祠歲時清供鐘磬之音隱然山谷間如回嶺丹樓諸峯漢洞神湫之境雲煙動色亦欣吾來盟洞眀真人祁公聞之嘉其志堅可與有立給觀名曰集仙至元癸未皇姪永昌王易其額有玉清昭應之號經營未已洞口有光人迹踵至復避喧趣靜㰸裳霄逝東入啇嶺廬天柱峯及漫川之青崖往來逋止將終身焉居無幾何悮為尺一喚去待詔闕下付以禱爾上下之事自是齋居致敬焉感召幽貺呵禁不祥扈從法駕往還兩京者凡二年于兹癸巳春蒙恩復以傳送還本山將行切自揆遭遇明時莫大之幸越玄門儘光重念山齋寂寥歸無片辭以勒岩石使後之尋盟者曷以見住山歲月開先樓觀而雲龕石室亦曽覩鶴書赴壠鳴騶入谷之賁哉敢再拜以記文為請且償先生平時所願言余嘗謂道家者流以淡泊虛無為宗以忘言絶俗為事或者須人為徒心存濟度如三洞五雷盟威正一等法行符敕水驅逐疾疫鞭答鬼物使邪氣罔姦兩間其於輔助世教有不淂後焉者方之與卋相遺歸潔一身稿死山林長往而不來者為有間矣故樂為書之楊法諱道謙蜀之銅梁人號保光子上卋有以進士為巴西令者某年月日記彭澤縣創修二賢堂記自昔宰彭澤者其麗不鮮獨二賢者至今屋而祀之在縣西市里者靖莭陶公也其在東門內者唐相梁公也歲貌殘圯揭虔斯在蓋其髙風義烈上薄雲曰千載而下大有關于卋教者然也揔尹周侯諒其如是越到官之明年既治廟學遂遷二賢祠于神閍之右作新宇以合饗之仍榜之曰二賢堂至元甲午春侯會豫于京師乃以祠事相告且曰二公皆宰兹邑行巳去就有略不同者先生試為錯言之余曰淵明以長沙卋胄起而弦歌知其不可而去及宋業漸隆不復仕進義熙而後止書甲子明見耻臣于宋豈惟隱居求志抑且勵薄俗而明大義也故綱目以晉徴士卒之梁公有唐忠臣𬒳讒逺謫志在復辟此隱忍就功可久可速藏器俟時之意也若二公者考其迹則異揆其心則同孟軻氏謂禹稷顔回同道易地則皆然者是也一堂並祀何嫌何疑周侯曰嘻有是哉不肖𥘉心固不外此特取正于公耳今將謁諸公賦詩合異同而萃全美幸內翰以首倡題諸萹端會歸付之邦人僤刻石祠下以告二公雖云義起烏可闕其説焉于是乎書是歲三月望日記克巳齋記御史中丞崔公作新齋于私苐中門之內為朝夕見賓客廣忠蓋之所扁其顔曰克巳中外士夫聞而疑焉蓋以公忠亮簡在帝心四方想見其風彩勳名事業無愧于昔賢方且孜孜焉汲汲焉致力于方學者所務㒒為之説曰天之降大任于斯人也俾經綸一丗之事其時政之得失思有以論列之生民之利病思有以興除之人林沉滯賴之而薦舉姦邪橫恣仰之而紏繩況辨公私于事時不同之後論紀綱于功利競進之餘是恆處乎憂患之域而踐乎囏險之塗矣職臺憲者可謂責之重而任之不易矣自非材德備具卓爾千人之英志氣剛明信乎萬物之表偏蔽躁妄力制嗜欲之私視聽云為粹彂性情之正厲忠直而靡他無瑕疵之可擲既正身而格物先律己而治人者詎能厭公論而服衆心振清風于臺閣者哉而公端本澄源之志實有在於此冝其于聖賢傳授心法切要之理默識心通景仰取法有不能自已者惟公歷事兩朝久執臺憲忠君愛物之念若飢渴之于飲食當其論列主宰之際犯顔匪躬挺然以直道偉論獨步一時曽無顧忌退縮之私固巳循天理之至公思復本心之全德矣雖然顔子入室大賢得聖人為之依歸夙承善誘鑽仰薦信猶不免違仁于三月之後矧餘人哉蓋天理人欲只在於公私一念之項惟致知是期格物知至者動靜以察其變朝昏以精其思久蹈彛則靡息厥修者方造聖賢閫域故衛武公年登九秩作抑詩以自警司馬文正存守一誠終身不易今公既循聖賢治心行已之要道復如二公貞固自持服膺勿失日就月將豈惟緝熙于光明將見與昔賢同歸而不殊矣公以齋記見囑㒒年衰老懶于筆研敢直書臆見姑塞雅命云秋澗先生大全文集苐三十九
