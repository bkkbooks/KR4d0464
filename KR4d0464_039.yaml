body:
  text: 重建衞輝路緫管府帥正堂記汲之為郡其來乆矣自唐𥘉易而為州歴五季宋金率以防禦節度使來尹治之故其公𪠘制度廣狭視厥秩夷而不敢越逮國朝中綂建元之明年陞州為府前政因仍不及改作加以歳月深土木㢮狭隘頽弊朝夕視事有不堪其䖏者後二十五年嗣侯荅失帖木兒暨緫尹耶律漢傑判官常徳継軫來任既而與相議曰維大府距河朔衝㑹部二州四縣一司治稱匪易堂則乃赫焉具瞻之地其承宣王澤聽断民事齊肅禮容號令約束盡在於是今狭陋若爾殆非所以恪正事而儼官守也又以品秩等威視堂之隆殺固不可與嚮也相類於是張皇前規􅌟而一新凢爲楹三鉅筵東西六㝷有竒南北䆳三十有七尺髙爽靖深公居儼稱復作左右翼㕔各三楹及增崇儀閈俾與新𪠘映帶相奐仍扁其顔曰帥正復舊觀也凢三月告成詢其費曰安取輟公稍以給之越六月某日命饗於新堂㑹僚佐属吏與郡之士夫粛四方之賔旅大合樂以落之望之儼然與飛雲傑構相雄跨矣故老嘆息以謂百年来方覩官府若斯之盛吁治其可忽也哉而忽而治只在公正從違而巳然則何爲公事不私之謂也故公則生明何爲正正巳而正不正者也故正則可大天下之事未有不公而治民未有不正而格官孰有不順而穆者乎于斯之際當官者固未睱以清心省事為軄而守正從新何甞有時不可之聞哉大凢人之心公而有恒徳者苟事有可為必為之不怠詎肯以歳月去留容其心於間哉今斯役之作惟其若然故能於共億鞅掌外又復興滯𥙷弊如此可謂賢也巳既卒事來丐文於余以邦大夫之賢者方事之以相勉况郷國盛事其敢以不敏辝於是乎大書于石庸告來哲抑又知公等必葺之意云至元廿六年歳在巳丑五月日記郭氏挹翠樓記共人郭子忠起書樓于所居之西市以地形爽塏髙甫㝷丈而有縹緲飛動之勢既落成來丐名與記予以共為邑距太行東麓連山疊阜映帶囬抱矯首而觀盡得西南林壑風煙之勝囙扁其顔曰挹翠頋惟澹僻仁智之樂蚤歳有懐甞從諸賢讀書山房洒洒然遂有所得如龍門石門白鹿嵬百家岩等山皆左戒絶觀雖常歷覽而屢至然蠟吾屐而踐其形固未若支手板而當其氣之爽也若夫積翠横空一碧萬仭空𪷟霏微騰滋泛潤眷我樓居壷開碧供而又秋雨霽殘陽暮夕氣轉佳千鬟濕霧主人於畏詠飛鳥與還之詩誦煙光凝紫之句攬其秀則詩脾儘清挹其輝則芳樽溢渌至於野風吹来江月引去曽黎明而巳集喜虚懐之延停吾想夫共之全盛時愛山而起構者若湧金之麗譙公廨之危榭太師張公之溪亭丞相蔡侯之别墅其餘䑓亭觀閣層軒曲檻前後非一雖昔人已非而山川良是嚮之挼藍潑黛争妍競秀為名家之竒貨供騷客之珎玩者一旦悉爲郭氏奄去不知一樓之勞之費其将幾何乃為造物所偏而獨饗者乃尔其冨冝乎釋然而樂興有餘而樂無窮也因念萬物盈於两間洪纎髙下固云不齊要其氣體物吾與也𬒳山之丕凝篤實發光輝若然由家之絫積善行致慶流餘𥙿今郭氏在承平時為衛之大家丗以藥石為業廼若爾考尔叔秉彜藴秀稱郷里善人其翼其肯者斯羙具在子今不失舊物能擴而充之齊其本而大其末與霏霏㣲㣲者日新於華構之上俾後之來者挹而注之以膏其末光霑而漬之以衍其餘慶安知方寸之木不髙於岑樓也邪至元廿四年歳次丁亥上元日記秋澗記山之有澗壑猶人之有量數也苟夷隘以狭人将無以自處况能物之容乎太行諸山去郡西五十里而近予甞逺遊西自百家岩東盡靈山北崦並山之麓深溪鉅澗横斜交絡折地而東鷺秋水時至萬壑潨澮允猶翕合咸就約束滔滔汩汩迤邐而去或清或濁無逺無邇不擇細大順受而併容者此澗之量也至於流潤决壅激而為飛湍旋而為盤渦匯而為渊渾東而爲細流岩屋以伏其怒巨石以殺其勢就泛長傾順流逺引溉平田而有秋浮大丕而出谷不致肆濫横潰使一漫流害注大川而後已者此澗之功也及其忽焉収潦千里一空曽不少遺用以自潤縈紆盤折沉深闊逺漲㾗在而流沬空沙尾平而崖涘峻紛兮交貫矌兮長虚水之去来雖有緩急澗之吞吐𥘉自若也又類夫含章可貞或從王事無成有終者是又澗之不有其量之與功也嗚呼澗乎其見用於秋之時乎予嚮在京師客有善推䇿者甞有所請渠曰子非王秋澗乎予曰然客曰既云秋澗致用有在第未之至耳然觀子之流行異時當有東南逺役大冨厥覧不特泛長江而觀七澤也願子思存乎見少不自以為多可也是則澗之量數不其容乃大歟余唯而退至元廿六年巳丑歲秋八月望日記堆金塜記國朝癸酉歲天兵北動奄奠中夏明年分道而南連亘河朔衛乃𬒳圍粤三日城破以州旅拒不即下悉驅民出泊近甸無噍類殄殱𥘉星妖下流淇上羣兒氣吐成謡閧歌里陌間曰團欒冬半破年寒食節絶人煙之䜟㝷罹厄實貞祐二年春正月十有二日也時太一度師蕭公當危急際以智逸去是年冬十一月師自河南來歸睨其城郭為墟暴骨如莽師惻然哀之遂刮衣盂所有募人力歛遺骸至断溝眢井攓蓬坡塞掇拾罔漏廼卜州西北二里許故陳城内地鑿三坎瘞而丘之仍設醮祭以妥厥靈游魂褫魄薤露莙篙同歸一竁其棘林暮夜之號隂壁枯血之火熒沉啾寂無復光怪盖因冥薦而脫異滯之幽依道廕而復坤靈之厚幽冥雖殊存殁兩有慰焉而師之掩覆仁心於郷梓之義極矣今其封俗呼爲堆金塚言人骨乆而化金石也每歲清明後一日邦人聚奠以信些孺本宫爲尸而祝之六代師全祐懇予文紀其事以昭先徳嗚呼三代而下以智力相角其勢不干戈血肉而莫之已何天地生物之仁返如是其盭㢤豈周天之運厄㑹有時中来而不可逭邪豈立極之道仁義迹熄自取陵遲而然邪豈蒼茫兩間𥘉無関係物盛而衰自然而然邪皆不可而必也第嘉師生平以道濟衆力苟可及不忍以一物失所類如此𥘉師既葬主柘之延祥觀壬辰冬大兵至城下師懲前日河朔兵兇之慘復以一言活萬家扵鋒鏑之下古稱澤及枯朽矧生人乎師之謂也向使師遭時得位其仁民爱物之功豈如是而已耶因併及之師諱道輔字公弼甫冠嗣主宗教後加謚號中和仁靖真人云至元十九年龍集壬午竆臘日堇記霍岳肇祀記至元九年冬朝廷以郡邑鎮山大浸載諸典秩者所司三載一祀霍岳在河東實爲靈鎮故事每歲以仲夏土極之日用信報禮昭處度也明年癸酉夏六月廿六日惲行縣北走霍邑前次洪洞雨不克邁越翼日抵趙城適嚴祀省牲之夕乃率霍州判官連漢臣監縣事塔的尹裴國用主縣簿刘偉齊宿祠下将事之夜霧雨交作既祀之朝隂霾四開三獻禮成冷風肅然神峯鷲嶺軒豁呈露雖韓潮陽之禮衡岳孔廣州之祀南海不足以喻其快也陪祀者府兵曹解禎縣佐史髙政稅監張承慶邑人薛昌齡獄庙道士李志真興唐寺僧普光執事者吏王庭玉䓁一十五人遂相與饜飫神貺而退承直郎平陽路緫管府判官前監察御史汲郡王惲題記從行者閭山張思誠子公孺表忠觀碑始末記至元庚寅冬予自福唐淂告北歸前次臨安客有以表忠觀碑為言者字作擘窠大書殊偉麗也詢之馬御史徳昌如所聞云觀在龍井不十里逺能一到其下豁先覩為快何如予以長淮迫凍為謝適鮮于生在坐属伯機他日打一本惠及足矣曰諾既而杳然明年辛卯秋吾友傳君士開赴官兩浙仍託以取逮壬辰夏六月傳自杭特令人付来其碑作四巨軸装潢如法盖亡宋故家物也噫坡書在霄壌間忠義之氣欝欝然秋色爭髙雖片言隻字不可遺逸冝其世寳而力致之也故心存夢想求以三歲之乆跨越江湖至自二千里之逺一且髙堂素壁如天珠河圖弘壁琬琰對越左右誠可貴也左山云古人不可復作所淂見者筆蹟而已况公斯文関繋世教令人讀之油然有忠孝之勸烏可秪以翰黒為之論乎然一一較之盖印印泥折釵股之法也是月廿八日書扵春露堂之扶踈軒睢州儀封縣創建廟學記道之大原出扵天以之脩齊治平格非心而叙彛倫者孔孟之教之功也其為天下通祀冝矣况存神過化之地乎儀封縣金正大間割考㐮東明三邑地立治于黄陵之通安堡以古儀城在焉故名攷之儀即春秋衛之邊邑其為孔輅頓次封人請見之䖏諒無疑矣兵後縣廢歲王子國家經略河南移理扵通安南平城里桒土衍沃民俗便安然官府𥘉創禮文之事有未遑暇者吾夫子歲時假公舎而釋菜焉其邑長盛君即議𧺫廟堂於艮方後為風雨攸壊癸亥秋裴滿君自陳留令耒尹斯邑既告謁顧清廟如是惴惴不少安乃與監縣奥兀刺等謀曰承流宣化事神善俗皆我之責吾夫子政之本教之宗也嚮以濟時行道轍環中國以木鐸而徇衛者屢矣千古而下時移事在雖眇邈聆遺音而二仲楹奠車聲轔轔肅焉来格不侈大宫庭将曷以發越奎光致邑人觀感之深者焉遂與継任火者赤暨僚属各捐俸易爽塏地於東南􅑍士庶聞風亦翕然響應於是定方中繚崇垣起禮殿敞神闕下至講堂齋舎庖湢之所莫不完羙元聖素臣黼座有儼宏麗靖深蔚為東南宫廟之冠教諭張庭珪等寔董其役君既代之明年尹程亮簿刘楫嘉其謀作之勤烏可使無聞扵後乃令學直李攀鱗持状来丐文以紀本末小子惲嚮提憲閩海道出兹邑親覩斯羙周行慨嘆何有志成事也如此是可書也因重爲告之曰風化者致治之原人材者爲政之具人材盛衰民俗淳湡一係夫學校之興替故前人以庠序爲囯之元氣誠知言㢤我國家以神武戡定區宇至戊戌間生聚甫集首閳猷設科擢賢雋復户役其所以開太平之基者固權輿扵兹矣逮聖天子嗣復張皇潤色越先朝有光如釋奠具儀禁護著令内而開國學訓胄子庶幾成均遺法外而勉郡縣鄊社置師儒以揉鄙朴擢用講明條格甚悉扵明徳新民之具崇尚循誘之方可謂備矣而任師帥者承宣賛理以副上之所尚宜何如㢤裴筮仕𥘉以通國字充胄子教授宜其下車首議教基敦風俗為本可謂知所務矣尹諱翼丗為遼右顕族資明逹以廟學一莭觀之知其為能官者某年月日堇記義勇武安王祠記汲縣縣治即故尉司公𪠘内舊有武安王祠莫䆒其所始而可見者金㤗和𥘉信武將軍完顔師古重加修飾昭然禱而荅靈貺也兵後廢撤不存有元中統癸亥簿聶元擒詰強禦未即厥事假靈扵神已而如所碩遂即治左復庙而貌之癸未之水又從而圯焉至元丙戌真定録判劉聚来主縣簿以㳺撃有功田里頗安不敢居其能越神明是帰遂以起廢為巳任星甫周神栖像設一切脩而廣之妥靈掲䖍中外交肅既落成来懇文以紀本末仍表夫神之所以昭昭者予乃為之說曰忠義者天下之大閑良心者衆人之素有惟夫超倫逸群之士淂時行道毅然不拔乃能見二者之用而使後世畏仰愈乆而愈不忘者豈非公歟公遭漢室傾頽群雄血閧玄黄之際識昭烈而翊戴之紹延漢基而明君臣一定之分報效曹公不為利訹以决去就當然之機至氣凌三軍威振中夏而擅國士之風者此無他不過擴秉彛之良心信濟時之大義耳公既没其隂相餘烈加扵生者殊多豈豪傑英偉之氣無時而息加以人心素有聚精扵此黙相動盪有不期然而然者邪是則公為不没矣嗚呼其可不敬也夫故百世而下宫㞐血食衮冕而王冝矣及夫卋教下衰禍福儆動之說興淫祀妄禱唯知曰我祭則受福此豈理也㢤孰謂神顧而饗之耶今汝等既新斯宇當念夫神之所以致斯者義而已吾之所以感神者䏻極夫義之所至則幽明兩間豈惟感格之理名實俱淂将見簡簡穣穣之福降而孔那矣俾刻諸麗石以告来哲至元廿八年五月重午日堇記勉齋記人有不若之耻天下事未有行而弗至者况秉彛昭融從容扵循勉者乎郎中杜君季眀聞㒒名而喜之書所著勉齋等篇贈予疾讀數過其脩辭行已一以經㫖為據有味㢤斯言也誠信道篤持志堅進進而不畫者也予乃為之說曰夫聖人之道体微而用費辝要而理奥雖聖賢有所弗知故學之者不措也克而至扵極愚必眀柔必強書之懋㢤詩之匪懈皆是也子思子因道述教發越微奥曰勉強而行之信聖賢之善誘致用自淂之良規也然乏粹羙之姿者不可淂而勉無資深之志者勉焉而未易淂二者皆具無致用之位徒勉一躬俾兼善之功不及扵物斯亦君子之所耻也故傳曰㓜而學壮而欲行之由是而觀士志扵學不止徒善乃為循勉之極今君懿秉超卓言慎行敏挺身頽波砥柱屹立逰公卿之門當形势之途毅然以道義自任不為外物所移日廣忠益思成具瞻之羙推轂多士以伸兼善之心正以負彊矯之姿明當勉之理自誠而明由已以逹物其大者逺者還有功而立致效也為不難将見一拳之石聳泰岱扵目前一勺之水沛霖雨扵天下是則嚮之思而得勉而中從容中道聖賢與同歸矣㒒壮年竊有志扵卋巳甞少試扵用間或勉中思得念天下之事莫此樂也今行就衰謝及聞伯夷之風振衰激懦耿耿有不去其懐者因為長歌揄揚吾子之勇且寓夫余之感焉歌曰安肆日偷衆情之常乎黽勉日強君子之志乎施之有用斯又古人之難乎矯矯杜君知耻近勇之倫乎見諸行事而復徳曰新乎牙磋玉琢殆起予者啇乎行雖衰矣衷或誘其愚乎雖佩玉長𥚑尚足以利乎走趍也扵是乎書終南山集仙觀記予自壮歲䆠游四方經渉河山大地昔賢遺跡未甞不仿徉臨望冨覧勝槩而去尚自視欿然者獨欠秦中一游每聞談関輔形勢漢唐間風聲氣習翹翹褰裳夢寐長徃今年夏四月有虚齊道人楊姓者踵門来謁拈香具禮磬折而前曰側聆先生名徳乆矣自惟何幸於焉淂遇継出一圖示余指似云終南縣重陽祖庭西南甘源水左由石砦入峪道即陡隂磴山行二十里而逺抵望僊平淂唐巳耒集仙庵故址山中人傳云昔有古僊人吕翁者甞學道於此近代有長生師劉公爱其崦曲幽勝清泉灌木隂湛連壑迺結茅雲隱畧有興築兵餘雲荒石老無復人迹林光空翠㬌氣長新當時貧道從三洞弘玄師真侍香重陽丈室既而以法籙事辝師入山結習修静遂歩上甘谷東峯不覺適喜曰此吾巢松稅駕之地也乃與方外二三友道宣聦真輩定居而建其所當奉壇塲神室等祠歲時清供鐘磬之音隱然山谷間如囬嶺丹樓諸峯漢洞神湫之境雲㷑動色亦欣吾来盟洞眀真人祁公聞之嘉其志堅可與有立給觀名曰集仙至元癸未皇姪永昌王易其額有玉清昭應之號經营未已洞口有光人跡踵至復避喧趣静㰸裳霄逝東入啇嶺廬天柱峯及漫川之青崖徃来逋止将終身焉居無幾何悮為尺一喚去待詔闕下付以禱尔上下之事自是齋㞐致敬焉感召幽貺呵禁不祥扈從法駕徃還兩京者凡二年于兹癸巳春䝉恩復以傳送還本山将行切自揆遭遇明時莫大之幸越玄門儘光重念山齋寂寥歸無片辭以勒岩石使後之㝷盟者曷以見住山歲月開先樓觀而雲龕石室亦曽覩鶴書赴壠鳴騶入谷之賁㢤敢再拜以記文為請且償先生平時所願言余甞謂道家者流以淡泊虚無為宗以忘言絶俗為事或者須人為徒心存濟度如三洞五雷盟威正一等法行符敕水驅逐疾疫鞭答鬼物使邪氣罔奸兩間其於𥙷助世教有不淂後焉者方之與卋相遺歸㓗一身稿死山林長徃而不来者為有間矣故樂為書之楊法諱道謙蜀之銅梁人號保光子上卋有以進士為巴西令者某年月日記彭澤縣創修二賢堂記自昔宰彭澤者其麗不鮮獨二賢者至今屋而祀之在縣西市里者靖莭陶公也其在東門内者唐相梁公也歲貌殘圯掲䖍斯在盖其髙風義烈上薄雲曰千載而下大有関扵卋教者然也揔尹周侯諒其如是越到官之明年既治廟學遂遷二賢祠扵神閍之右作新宇以合饗之仍榜之曰二賢堂至元甲午春侯㑹予扵京師廼以祠事相告且曰二公皆宰兹邑行巳去就有畧不同者先生試為錯言之余曰淵明以長沙卋胄起而弦歌知其不可而去及宋業漸隆不復仕進義熈而後止書甲子明見耻臣扵宋豈惟隱㞐求志抑且勵薄俗而明大義也故綱目以晉徴士卒之梁公有唐忠臣𬒳讒逺謫志在復辟此隐忍就功可乆可速蔵噐俟時之意也若二公者考其跡則異揆其心則同孟軻氏謂禹稷顔囬同道易地則皆然者是也一堂並祀何嫌何疑周侯曰嘻有是哉不肖𥘉心固不外此特取正扵公耳今将謁諸公賦詩合異同而萃全羙幸内翰以首倡題諸萹端㑹帰付之邦人僤刻石祠下以告二公雖云義起烏可闕其說焉扵是乎書是歲三月望日記克巳齋記御史中丞崔公作新齋扵私苐中門之内為朝夕見賓客廣忠葢之所扁其顔曰克巳中外士夫聞而疑焉盖以公忠亮簡在帝心四方想見其風彩勲名事業無愧扵昔賢方且孜孜焉汲汲焉致力扵方學者所務㒒為之說曰天之降大任扵斯人也俾經綸一丗之事其時政之得失思有以論列之生民之利病思有以興除之人林沉滯賴之而薦舉奸邪横恣仰之而紏䋲況辨公私扵事時不同之後論紀綱扵功利競進之餘是恒䖏乎憂患之域而踐乎囏險之塗矣軄䑓憲者可謂責之重而任之不易矣自非材徳備具卓爾千人之英志氣剛明信乎萬物之表偏蔽躁妄力制嗜欲之私視听云為粹彂性情之正厲忠直而靡他無瑕疵之可擿既正身而格物先律己而治人者詎能厭公論而服衆心振清風扵䑓閣者㢤而公端本澄源之志實有在於此冝其扵聖賢傳授心法切要之理黙識心通景仰取法有不能自已者惟公歴事兩朝乆執臺憲忠君爱物之念若饑渇之扵飲食當其論列主宰之際犯顔匪躬挺然以直道偉論獨歩一時曽無顧忌退縮之私固巳循天理之至公思復本心之全徳矣雖然顔子入室大賢得聖人為之依歸夙承善誘鑚仰薦信猶不免違仁扵三月之後矧餘人㢤盖天理人慾只在於公私一念之項惟致知是期格物知至者動静以察其變朝昬以精其思乆蹈彛則靡息厥修者方造聖賢閫域故衛武公年登九秩作抑詩以自警司馬文正存守一誠終身不易今公既循聖賢治心行已之要道復如二公貞固自持服膺勿失日就月将豈惟緝熈扵光明将見與昔賢同歸而不殊矣公以齋記見嘱㒒年衰老懶扵筆研敢直書臆見姑塞雅命云秋澗先生大全文集苐三十九
