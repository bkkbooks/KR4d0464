front:
  text: 秋澗先生大全文集卷之六十三祭文
  hash: sha256:a971ca00ba5c92e085c6b9ecad8b4b0eb14614a08effae344312a57be2003fdd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_063-1a}
body:
  text: 告家廟文維至元四年歲次丁卯六月丁巳朔卄三日巳卯孝曽孫王惲䓁謹以香酒時果之奠敢昭告于曽祖考府君曽祖妣臨清吕氏顕祖考修武府君顯祖妣孟氏韓氏皇顕考忠顕府君皇顕妣夫人靳氏之靈先以丙寅歲十有二月為子公孺聘婦得宣差石君之第三女兹者徃之女家躬展禮幣今龜告吉日維斯時廟授有儀式伸䖍告尚享祭元神祝文歲次丙辰九月戊戌廿九日丙辰臣某等謹以清酌庶羞之奠敢告于歲德之君惟神一歲之君百臣是統端臨異位獨秉威權悔吝灾祥維神是与臣某父某年踰知􅒛心切齊家動静之間旣乖攝養公私之際尤重愆違而又庭户積殃子孫不孝扵七月廿七日遽嬰末疾将抵時冬困致沉綿力疲舉履日因元􅒛躬薦愚衷幸兾神明蚤躋和豫尚享告家庿文維至元四年八月丙辰十七日壬申孝子惲忱䓁謹以清酌百羞之奠敢昭告于皇顕考忠顕府君顕妣縣君靳氏之靈嗚呼哀哉維丁巳歳八月至今年丁卯秋仲府君損舘十週星矣寔至元四年秋八月丙辰朔十有八日癸酉也十者數之盈天道之小變也祭法以春秋享奠盖因其氣之終始而致思焉矧履霜露瞻拱木歳月近紀親日愈逺得不極其志而重其感傷乎今之所謂道供豈古致齋鄉親之意歟兹者爰即正寢敬演靈章庶仗眞筌以證妙果神維格思式伸䖍告尚饗至聖文宣王奉安祝文扵赫元聖萬丗作凖曰義曰仁風化之本頋瞻清廟曠兹有年咎将孰執廼吏之愆爰自下車心弗遑安靡朝匪夕載經載营誕弥八月厥功告成奕奕新廟桓桓王楹峻以文階重以神幄有翼有嚴乃丹乃雘爰居爰處以清以寕神格其思享兹菲誠爰暨厥民日焉啓迪仰止瞻依聿脩厥德庶幾報本以謝不聀尚享兖國公奉安文㐲㠯庶工告成新廟孔碩扵穆素王之亞聿陪元聖之居仰底攸寕永欽厥祀尚享鄒國公奉安文伏㠯有嚴閟宫載新祀典仍増光扵肖像永配享扵神庭扵穆維清尚安且妥尚享辝墓祭文維大元國至元九年歲次壬申四月乙未朔十七日辛亥男孫惲謹以清酌之奠敢昭告于曾祖王父顯考王府君之靈惲自至元五年冬十月𬒳召赴臺九年春用前資翰林修撰由監察御史改授承直郎平陽路緫管府判官已擇此月十九日赴任所今當逺離墓次伏兾明靈特垂隂祐尚享祭孚惠神祠文六月十四日祈雨至十八日申刻大雨至十九日黎明方止惟神淵懿徽柔德妃乾方觱沸其泉寔為淵浸屋而祀之禮固宜矣兹者時雨愆常蒲絳兩州旱暵頗甚吏寔不職民將何尤憂麥勒而半成槁稼嘘而可燎衆仰一溝之水恃為卒歲之安然得之有限漑之不濟與其施及乎有數之田何若膏潤夫一境之内惠䘏哀憫繄神能然伏望起伏龍鞭電轂神泓為之變動川雲隨而蓊從細犍天瓢溥霑壠畒使槁者勃興而如揠熱者得濯而輒醒雲漢昭回一滌藴隆之氣甌窶滿載卒成大有之年神能鍳兹敢忘昭報尚饗祭斛律丞相文大元國至元九年歳次壬申六月丁亥朔初八日甲午承直郎平陽路緫管府判官汲郡王惲謹以清酌庶羞之奠致祭于有齊忠臣大丞相咸陽王斛律公之神伏念惲以監察御史叨承郡幕視事之初来讞兹獄求情罔獲非神疇依惟神心秉塞淵氣餘忠謹始焉義合於神武終以威馳於栢璧生為良弼殁為明神對越英靈凛然如在以徳以功宜永嚴祀惲授舘絳園迫近神廡號呶扑擊不無震驚然兇悍禍賊寔神所憝尚矜不逮俾集厥事式伸明薦以克来饗康澤王廟謝雨文惲訊獄絳陽囬經大平百里之間秋禾如槁物之生植時方尚飬民之告病不為不勤俾驕陽亢甚耕隴塵翻誠守吏不聀之所致也近虽致禱於鼓塠行復展誠扵祠下及次襄陵油雲四㒷甘澤霈作郊野灑然溥獲沾足且神化無方龍徳為大山澤一氣初無間然虽愚衷適與之㑹寔神碩䘏而恵之也用薦明禋以荅靈貺尚享拜奠夷齊墓文維大元國至元九紀歲玄􅘬涒灘冬十二月既望承直即平陽路總管府判官王某㳟以牢醴之奠致祭于孤竹二賢之墓嗚呼天下有當然難合之事惟特立者能成之天下有至中大正之道惟齊聖者能明之三代而下建天地之極碇君臣之義掲若日月亘萬古而不息者其惟二賢而巳王申之冬某以守吏按事蒲坂仰止髙山其立卓爾所謂聞凛凛之風者貪夫廉懦夫有立志也趍拜几像山烟四起奠以性醪若恐将凂有薇在山有粒在簋㓗以馨誠薦我明水尚享祭黄崖山神文節彼南山奠安一方爰産竒石𬗋質青章主宫繕興爾焉來营伐而材之不無震驚用是昭告帷神降寕庶慿黙佑迄用有成尚享謁西岳廟文維神徳嫓坤維氣涵崑潤際四海洪荒之内位寔雄尊在提封宻迩之間禮當趍謁仰止三峰之峻來伸一禱之誠僥倖之求断不敢萌憂恋之心庶幾昭鍳爰生申甫來佐明時冐瀆顥靈豈勝悚惕尚享安二賢神文某以壬申之冬來拜祠墓悼其傾圯几像暴露載經載營今也告成睠彼雷首肅焉神庭繄二賢之徳聖之清兮以孔聖之哲極所稱兮掲若日月何廟皃之尚兮封而匪屋來者何瞻仰兮蒼煙喬木何山爛其光兮盤非周粒桂酒苾其香兮神其格思歲永此而享弓肇祭霍岳文大元國至元十三年歲次癸酉六月壬午朔三十有六日丁未承直郎平陽路緫管府判官王某謹以牢醴之奠致祭于霍岳中鎮應靈王之神維神峻秀靈異鬱為鎮山兾州之野嶽麓所盤致興雲雨祀典載新報本信敬兹焉其辰頋維守吏歲奉嚴禋籩豆孔修敢告駿奔乃祝之曰髙冝麻麥兮下冝稌蛟蛇結盤弓物不窳王事庶集兮神所與康澤王廟祈雪文大元國至元十年十二月已酉朔承直郎平陽路緫管府判官王惲謹以清酌之奠敢致禱于康澤王之神伏念一冬三白歲事之常今者云暮未覩其祥寒律徒切風埃􅐓洞宿麥虽萎猶含餘凍載憂載忡春疫為重彤雲油油旣合而収和氣致盭政或未修吏寔不聀民将何尤惟神降鍳一雪孔周灾沴不作恵我來牟吾儕小人敢後神休尚享祭靖應真人姜公文大元國至元十一年歲在甲戌二月戊申朔十有二日已未承直郎平陽路緫管府判官王某謹以茗果之奠設祭于靖應真人姜公之靈某以中統元載列聀省郎得掌綸命帝遣使臣奉宣詔㫖起公扵晋有遐想仙標載勤馹乗之語眷眷之意何其隆信者哉逮明年春獲拜下風寳玄之宮野服黄冠道淳徳冲曽無一言及乎本宗其揄揚稱頌若恐隕越者堯舜禹湯文武之道之功建祠奉祀竭夫一躬退而論思豈墨名而行與儒同者耶及官平陽載覩儀容振𬒮談舊一沛平生之胸愈知蜻􅌹之性精誠之徳足以動三河而沃淵衷也云何一别上仙三峯杳黄鵠其何邁将神㳺乎太空天藐雲髙涕泗無從過故都而眷恋庶斯文之可通尚享兵次孟津祭靈源王文維十有一年甲戌夏五月丙子朔越七日壬午承直郎平陽路緫管府判官王某敢昭告于靈源王殿下我國家将有事扵南服桓桓兵甲例作于晋頋予小子寔緫其一焉今兹南邁前次河壖尚克顕相其安以濟豈惟可免薄責誠以威靈隂隲以先啓行之力也尚享祭平陽府東城門文惟神聀司啓閉氣積隂凝今者淫雨為崇巳及浹旬害役粢盛動妨民作伏望道迪陽和速成開霽尚享祭皐陶文惲以到官四日奉憲部符鞠絳陽獄大小之情心敢不盡侊愡曖昧有不可致詰者使讞議適當生死兩明愚衷不逮神惟能誘之冤滯沉痛捶楚之下求而不獲者神惟能伸之伏惟明靈尚克顕相中元莭祭三代告生孫汾郎文伏為男公孺新婦石氏扵今月十有二日辛巳生子名曰汾郎盖人倫之事継續為大因時以享式伸䖍告庶憑神佑其安且冝尚享立社禝祭告文維神五土之祇百谷之本血食于社萬丗依凖礼墜而興張本自兹牲醪香腯鼔鍾清夷迄用康年神其餒而維神百榖是長萬民之天配食于社古莫能遷名存實亡乃吏之愆張本于兹神其鍳焉有酒斯㫖有牲肥鮮維神格思歲其有年范陽房族祖九翁祭文維至元十三年歲次丙子冬十月壬戌朔十有八日已夘房孫謹以清酌少牢之奠百拜致祭于故軍資府君族祖九翁之靈嗚呼哀哉十二年春予守官平陽祖母慕容氏書来以公訃告國有常制莫敢擅離然聞母弟忱自疾凾扵引柩納壙皆與及喪次雖不獲戴星奔赴中為少遑也越翼日即縞素為位於府北郊之僧舎發哀以祭婦推氏子公孺新婦石氏在焉慼不視事者五日迨今年春三月秩滿東還将為指日即路得哭墓而唁親老也復為中書檄去考試河南四道滿三月而㱕日月逾邁霜露之感積諸中而至于攸乆也如是曠慢不恭之責将何所逭今兹之来駿奔露處不遑安者凢十有四日含凄茹辛實以祭告為事伏惟神靈鑒兹哀悃嗚呼哀哉尚饗祭中書左丞姚公文聖維天開寵綏九有必誕賢輔以左以右手斡機衡殆天旋斗伊公挺生奮迹營柳長白之英遼江之瀏元氣絪緼鍾此秀脫落俗學沉浸道囿姬情孔思伊淵洛薮一物致知千古尚友起而翼漢雲雷交遘啓沃淵衷逹聦纊黈至元之𥘉公綰機紐謀謨廟堂股肱元首聀分六卿綱維結紏帝載用熈豊而不蔀大明黜陟罷侯置守萬鈞機張頼公克彀霖雨一濡載清宇宙我武維揚荆㐮持乆大闢屯田櫛比粮糗公善開物務深耕耨豳風良耜十千為耦継倡農司萬邦是揉明彼王道始夫南畒護軍來㱕雪髯垂脰長江失險萬介北趣特置舘筵體貌耆耇眷我儒臣甘盤之舊天理人私自公判剖國势民機倚公安否有辯懸河而惡利口四海具瞻漢更啇叟龍光稠疊玉杖秬卣望公百年以佐元后胡不慗遺梁木壊朽彼蒼悠莫之能䆒嗚呼公之為學知所先後味道飫經大羹玄酒平生㳺藝組綉雕鏤公視餘事爲丗瓊玖公之逢辰道合非偶来儀舜庭台鼎鳳雊揚歴中外足展抱負八十之春巳極眉壽考終牖下載啓其手有子承家公復何疚嗟吾道之如綫念後學之孤陋與斯民之不幸孰思濟而云救惲自束髮辱知㝡厚拔擢提撕兩端親叩至登瀛洲再承善誘弦晦一週玉堂清昼今公云亡此㑹難又情悄悄以填膺淚浪浪而霑䄂今也送不遑執紼葬不得撫柩寓哀斯文爲一觴侑尚享故尚書禮部郎中致仕丁公祭文嗚呼維至元十三年夏六月惲考試河南拜公床下留語終日言不及私維是治之隆汙民之殿屎法具未完涕下漣而至扵㢘扵律巳老而知止教子以義方敕断家事其在倫列如公一人而巳此天下之公論非予得而私議也區區之誠幸惟鑒兹尚享故吏部尚書髙公祭文至元十五年閏十一月十一日大雪中拜奠惟中綂壬戌之春惲以事累退耕于壠畒者再罹寒暑旣而擇御史開憲府人文之選公以予主不肖誤蒙公知擢置言路三秊裏行我盻我頋豈惟使之増光迄薄用于今者寔之載舉及官平陽公判吏部不以契闊怜我椎魯每借譽扵時人為聲勢之一助是又見公終惠且勤不我遐遺之故也至扵雄文大笧忠規治具三峽秋濤危波砥柱兹公論之有在匪鄙言之能喻念公平生靄靄德度霑賸馥扵蘭䑓悵歳律之巳暮敢以受知一已之私抒予哀而酹公之墓也神惟有靈鍳兹誠素尚享外祖安陽縣丞靳公祭文十五年復十一月十五日惲年垂髫省識公面蒼髯堂堂山立而弁逮予成童受訓母氏公之丗家頗聞一二或官郷縣或擅科埸厯年五百財雄一方至公而衰亦理之常厥後一紀公殁于郷惟嗣罔續我考奭傷春秋時思合食祖傍是用傳訓子孫奉行公殯淺土幾卅霜棺衾改卜未就深藏姨母雖在顧力弗遑有劣其甥按部洹漳東望堯城心焉靡寕迎置姨母如拜儀形爰念葬事与之經營及兹春首窆公于茔庶幾畢考妣之志慰安公之神靈也尚期不昧俯鍳微誠尚享左丞董公祭文至元十六年歲次巳卯九月乙巳朔樾有三日丁巳朝列大夫燕南河北道提刑按察副使汲郡王惲謹以清酏嘉肴之奠致祭于故資徳大夫中書左丞簽書樞宻院事贈金𬗋光禄大夫平章政事謚忠献董公之靈觀夫大燕南陲全趙北垠神尖鬱茂滹池濟淪蟠精萃秀篤生異人公應運挺岀絶類離倫閱敦詩禮感會風雲奮父祖之餘烈䇿冦鄧之髙勛其志慮良實又濟以武恵惻隱之仁謙而接物勇見扵大敵㳟以持巳孰知夫丗臣至扵肅齊家範友于弟昆忠結主知徳庇生民功愈大而心轉小寵旣厚而憂益殷無私蓄為子孫之計不樹黨収門墻之恩其公亮謹厚又似夫董侍中與万石君也幾丗幾年孕此忠純方沭恩扵鳯沼俄星隕扵中軍痛丹青之宛轉追畫像扵麒麟此非一巳之私議在中外哀悼所不忍聞也惲爰自布衣仰公清塵接樽酒扵中統之首與賔筵扵至元之春每燕語之衎衎頋若揚顒之可賔矧二弟之欵曲辱交乆而情親雖草宿而罔哭聊寓哀扵斯文伸孺子之薄奠庶劒繫扵徐公之墳也尚享遷奉曽外祖殿試靳公祭文并外妣李氏惟公才徳兼備元精孕和早擅塲屋三中巍科人文之譽在公寔多正大𥘉元公卒冝津權厝新瀧幾七十春殯而未葬譬彼行人㱕不及家曷寕其身兹者日吉時良奉安祖傍祔以元配永閉深藏魂而有靈以賁幽光尚享遷奉安縣丞外祖并外媪王氏祭文惲以前歲後十一月廿三日為迁奉之事巳告尊靈今者應期舉厝永慰幽煢以順從祖以安則郷祔我外妣閟此玄坣靳雖衰宗在公未傷有甥妷以主祀重時思而不忘是則不必其子而光揚也有牲斯羜有酒斯香神惟昭鍳歆此一觴尚饗及葬公伯兄孝思貢士及姆氏秋澗先生大全文集卷第六十三
