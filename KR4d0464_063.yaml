front:
  text: 秋澗先生大全文集卷之六十三祭文
  hash: sha256:a971ca00ba5c92e085c6b9ecad8b4b0eb14614a08effae344312a57be2003fdd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_063-1a}
body:
  text: 告家廟文維至元四年歲次丁卯六月丁巳朔草三日巳卯孝曽孫王惲等謹以香酒時果之奠敢昭告于曽祖考府君曽祖妣臨清吕氏顯祖考修武府君顯祖妣孟氏韓氏皇顯考忠顯府君皇顯妣夫人靳氏之靈先以丙寅歲十有二月為子公孺聘婦得宣差石君之第三女兹者往之女家躬展禮幣今龜告吉日維斯時廟授有儀式伸虔告尚享祭元神祝文歲次丙辰九月戊戌草九日丙辰臣某等謹以清酌庶羞之奠敢告于歲德之君惟神一歲之君百臣是統端臨異位獨秉威權悔吝災祥維神是與臣某父某年踰知􅒛心切齊家動靜之間既乖攝養公私之際尤重愆違而又庭户積殃子孫不孝于七月草七日遽嬰末疾將抵時冬困致沉綿力疲舉履日因元􅒛躬薦愚衷幸兾神明蚤躋和豫尚享告家庿文維至元四年八月丙辰十七日壬申孝子惲忱等謹以清酌百羞之奠敢昭告于皇顯考忠顯府君顯妣縣君靳氏之靈嗚呼哀哉維丁巳歲八月至今年丁卯秋仲府君損館十周星矣實至元四年秋八月丙辰朔十有八日癸酉也十者數之盈天道之小變也祭法以春秋享奠蓋因其氣之終始而致思焉矧履霜露瞻拱木歲月近紀親日愈逺得不極其志而重其感傷乎今之所謂道供豈古致齋鄉親之意歟兹者爰即正寢敬演靈章庶仗真筌以證妙果神維格思式伸虔告尚饗至聖文宣王奉安祝文于赫元聖萬丗作凖曰義曰仁風化之本顧瞻清廟曠兹有年咎將孰執乃吏之愆爰自下車心弗遑安靡朝匪夕載經載營誕彌八月厥功告成奕奕新廟桓桓王楹峻以文階重以神幄有翼有嚴乃丹乃雘爰居爰處以清以寧神格其思享兹菲誠爰暨厥民日焉啓迪仰止瞻依聿修厥德庶幾報本以謝不聀尚享兖國公奉安文伏以庶工告成新廟孔碩于穆素王之亞聿陪元聖之居仰底攸寧永欽厥祀尚享鄒國公奉安文伏以有嚴閟宫載新祀典仍增光于肖像永配享于神庭于穆維清尚安且妥尚享辝墓祭文維大元國至元九年歲次壬申四月乙未朔十七日辛亥男孫惲謹以清酌之奠敢昭告于曾祖王父顯考王府君之靈惲自至元五年冬十月𬒳召赴臺九年春用前資翰林修撰由監察御史改授承直郎平陽路總管府判官已擇此月十九日赴任所今當逺離墓次伏兾明靈特垂隂祐尚享祭孚惠神祠文六月十四日祈雨至十八日申刻大雨至十九日黎明方止惟神淵懿徽柔德妃乾方觱沸其泉實為淵浸屋而祀之禮固宜矣兹者時雨愆常蒲絳兩州旱暵頗甚吏實不職民將何尤憂麥勒而半成稿稼噓而可燎衆仰一溝之水恃為卒歲之安然得之有限溉之不濟與其施及乎有數之田何若膏潤夫一境之內惠恤哀憫繄神能然伏望起伏龍鞭電轂神泓為之變動川雲隨而蓊從細犍天瓢溥霑壠畒使稿者勃興而如揠熱者得濯而輒醒雲漢昭回一滌藴隆之氣甌窶滿載卒成大有之年神能鑒兹敢忘昭報尚饗祭斛律丞相文大元國至元九年歲次壬申六月丁亥朔初八日甲午承直郎平陽路總管府判官汲郡王惲謹以清酌庶羞之奠致祭于有齊忠臣大丞相咸陽王斛律公之神伏念惲以監察御史叨承郡幕視事之初來讞兹獄求情罔獲非神疇依惟神心秉塞淵氣餘忠謹始焉義合於神武終以威馳於柏璧生為良弼殁為明神對越英靈凛然如在以德以功宜永嚴祀惲授館絳園迫近神廡號呶撲擊不無震驚然凶悍禍賊實神所憝尚矜不逮俾集厥事式伸明薦以克來饗康澤王廟謝雨文惲訊獄絳陽回經大平百里之間秋禾如稿物之生植時方尚飬民之告病不為不勤俾驕陽亢甚耕隴塵翻誠守吏不聀之所致也近雖致禱於鼓塠行復展誠于祠下及次襄陵油雲四興甘澤霈作郊野灑然溥獲沾足且神化無方龍德為大山澤一氣初無間然雖愚衷適與之會實神碩恤而惠之也用薦明禋以答靈貺尚享拜奠夷齊墓文維大元國至元九紀歲玄􅘬涒灘冬十二月既望承直即平陽路總管府判官王某恭以牢醴之奠致祭于孤竹二賢之墓嗚呼天下有當然難合之事惟特立者能成之天下有至中大正之道惟齊聖者能明之三代而下建天地之極碇君臣之義揭若日月亘萬古而不息者其惟二賢而巳王申之冬某以守吏按事蒲坂仰止髙山其立卓爾所謂聞凛凛之風者貪夫廉懦夫有立志也趍拜几像山煙四起奠以性醪若恐將凂有薇在山有粒在簋潔以馨誠薦我明水尚享祭黃崖山神文節彼南山奠安一方爰産竒石𬗋質青章主宫繕興爾焉來營伐而材之不無震驚用是昭告帷神降寧庶慿默佑迄用有成尚享謁西嶽廟文維神德嫓坤維氣涵崑潤際四海洪荒之內位實雄尊在提封密邇之間禮當趍謁仰止三峰之峻來伸一禱之誠僥幸之求斷不敢萌憂戀之心庶幾昭鑒爰生申甫來佐明時冒瀆皓靈豈勝悚惕尚享安二賢神文某以壬申之冬來拜祠墓悼其傾圯几像暴露載經載營今也告成眷彼雷首肅焉神庭繄二賢之德聖之清兮以孔聖之哲極所稱兮揭若日月何廟貌之尚兮封而匪屋來者何瞻仰兮蒼煙喬木何山爛其光兮盤非周粒桂酒苾其香兮神其格思歲永此而享弓肇祭霍嶽文大元國至元十三年歲次癸酉六月壬午朔三十有六日丁未承直郎平陽路總管府判官王某謹以牢醴之奠致祭于霍嶽中鎮應靈王之神維神峻秀靈異鬱為鎮山兾州之野嶽麓所盤致興雲雨祀典載新報本信敬兹焉其辰顧維守吏歲奉嚴禋籩豆孔修敢告駿奔乃祝之曰髙冝麻麥兮下冝稌蛟蛇結盤弓物不窳王事庶集兮神所與康澤王廟祈雪文大元國至元十年十二月已酉朔承直郎平陽路總管府判官王惲謹以清酌之奠敢致禱于康澤王之神伏念一冬三白歲事之常今者云暮未覩其祥寒律徒切風埃􅐓洞宿麥雖萎猶含餘凍載憂載忡春疫為重彤雲油油既合而收和氣致盩政或未修吏實不聀民將何尤惟神降鑒一雪孔周災沴不作惠我來牟吾儕小人敢後神休尚享祭靖應真人薑公文大元國至元十一年歲在甲戌二月戊申朔十有二日已未承直郎平陽路總管府判官王某謹以茗果之奠設祭于靖應真人薑公之靈某以中統元載列聀省郎得掌綸命帝遣使臣奉宣詔旨起公于晉有遐想仙標載勤馹乘之語眷眷之意何其隆信者哉逮明年春獲拜下風寶玄之宮野服黃冠道淳德沖曽無一言及乎本宗其揄揚稱頌若恐隕越者堯舜禹湯文武之道之功建祠奉祀竭夫一躬退而論思豈墨名而行與儒同者耶及官平陽載覩儀容振𬒮談舊一沛平生之胸愈知蜻􅌹之性精誠之德足以動三河而沃淵衷也云何一别上仙三峯杳黃鵠其何邁將神遊乎太空天藐雲髙涕泗無從過故都而眷戀庶斯文之可通尚享兵次孟津祭靈源王文維十有一年甲戌夏五月丙子朔越七日壬午承直郎平陽路總管府判官王某敢昭告于靈源王殿下我國家將有事于南服桓桓兵甲例作于晉顧豫小子實總其一焉今兹南邁前次河壖尚克顯相其安以濟豈惟可免薄責誠以威靈隂隲以先啓行之力也尚享祭平陽府東城門文惟神聀司啓閉氣積隂凝今者淫雨為崇巳及浹旬害役粢盛動妨民作伏望道迪陽和速成開霽尚享祭皋陶文惲以到官四日奉憲部符鞠絳陽獄大小之情心敢不盡侊愡曖昧有不可致詰者使讞議適當生死兩明愚衷不逮神惟能誘之冤滯沉痛捶楚之下求而不獲者神惟能伸之伏惟明靈尚克顯相中元莭祭三代告生孫汾郎文伏為男公孺新婦石氏于今月十有二日辛巳生子名曰汾郎蓋人倫之事繼續為大因時以享式伸虔告庶憑神佑其安且冝尚享立社禝祭告文維神五土之祇百谷之本血食于社萬丗依凖禮墜而興張本自兹牲醪香腯鼓鍾清夷迄用康年神其餒而維神百榖是長萬民之天配食于社古莫能遷名存實亡乃吏之愆張本于兹神其鑒焉有酒斯旨有牲肥鮮維神格思歲其有年范陽房族祖九翁祭文維至元十三年歲次丙子冬十月壬戌朔十有八日已卯房孫謹以清酌少牢之奠百拜致祭于故軍資府君族祖九翁之靈嗚呼哀哉十二年春豫守官平陽祖母慕容氏書來以公訃告國有常制莫敢擅離然聞母弟忱自疾函于引柩納壙皆與及喪次雖不獲戴星奔赴中為少遑也越翼日即縞素為位於府北郊之僧舍發哀以祭婦推氏子公孺新婦石氏在焉戚不視事者五日逮今年春三月秩滿東還將為指日即路得哭墓而唁親老也復為中書檄去考試河南四道滿三月而歸日月逾邁霜露之感積諸中而至于攸久也如是曠慢不恭之責將何所逭今兹之來駿奔露處不遑安者凡十有四日含凄茹辛實以祭告為事伏惟神靈鑒兹哀悃嗚呼哀哉尚饗祭中書左丞姚公文聖維天開寵綏九有必誕賢輔以左以右手斡機衡殆天旋斗伊公挺生奮迹營柳長白之英遼江之瀏元氣絪緼鍾此秀脫落俗學沉浸道囿姬情孔思伊淵洛藪一物致知千古尚友起而翼漢雲雷交遘啓沃淵衷逹聰纊黈至元之𥘉公綰機紐謀謨廟堂股肱元首聀分六卿綱維結紏帝載用熙豐而不蔀大明黜陟罷侯置守萬鈞機張賴公克彀霖雨一濡載清宇宙我武維揚荆襄持久大闢屯田櫛比糧糗公善開物務深耕耨豳風良耜十千為耦繼倡農司萬邦是揉明彼王道始夫南畒護軍來歸雪髯垂脰長江失險萬介北趣特置館筵體貌耆耇眷我儒臣甘盤之舊天理人私自公判剖國勢民機倚公安否有辨懸河而惡利口四海具瞻漢更啇叟龍光稠疊玉杖秬卣望公百年以佐元后胡不慗遺梁木壞朽彼蒼悠莫之能究嗚呼公之為學知所先後味道飫經大羹玄酒平生遊藝組繡雕鏤公視餘事為丗瓊玖公之逢辰道合非偶來儀舜庭台鼎鳳雊揚歷中外足展抱負八十之春巳極眉壽考終牖下載啓其手有子承家公復何疚嗟吾道之如線念後學之孤陋與斯民之不幸孰思濟而云救惲自束髮辱知最厚拔擢提撕兩端親叩至登瀛洲再承善誘弦晦一周玉堂清晝今公云亡此會難又情悄悄以填膺淚浪浪而霑袖今也送不遑執紼葬不得撫柩寓哀斯文為一觴侑尚享故尚書禮部郎中致仕丁公祭文嗚呼維至元十三年夏六月惲考試河南拜公床下留語終日言不及私維是治之隆汙民之殿屎法具未完涕下漣而至于廉于律巳老而知止教子以義方敕斷家事其在倫列如公一人而巳此天下之公論非豫得而私議也區區之誠幸惟鑒兹尚享故吏部尚書髙公祭文至元十五年閏十一月十一日大雪中拜奠惟中統壬戌之春惲以事纍退耕于壠畒者再罹寒暑既而擇御史開憲府人文之選公以豫主不肖誤蒙公知擢置言路三年裏行我盻我顧豈惟使之增光迄薄用于今者實之載舉及官平陽公判吏部不以契闊憐我椎魯每借譽于時人為聲勢之一助是又見公終惠且勤不我遐遺之故也至于雄文大笧忠規治具三峽秋濤危波砥柱兹公論之有在匪鄙言之能喻念公平生靄靄德度霑賸馥于蘭臺悵歲律之巳暮敢以受知一已之私抒豫哀而酹公之墓也神惟有靈鑒兹誠素尚享外祖安陽縣丞靳公祭文十五年復十一月十五日惲年垂髫省識公面蒼髯堂堂山立而辨逮豫成童受訓母氏公之丗家頗聞一二或官鄉縣或擅科埸厯年五百財雄一方至公而衰亦理之常厥後一紀公殁于鄉惟嗣罔續我考奭傷春秋時思合食祖傍是用傳訓子孫奉行公殯淺土幾卅霜棺衾改卜未就深藏姨母雖在顧力弗遑有劣其甥按部洹漳東望堯城心焉靡寧迎置姨母如拜儀形爰念葬事與之經營及兹春首窆公于塋庶幾畢考妣之志慰安公之神靈也尚期不昧俯鑒微誠尚享左丞董公祭文至元十六年歲次巳卯九月乙巳朔樾有三日丁巳朝列大夫燕南河北道提刑按察副使汲郡王惲謹以清酏嘉肴之奠致祭于故資德大夫中書左丞簽書樞密院事贈金𬗋光祿大夫平章政事諡忠獻董公之靈觀夫大燕南陲全趙北垠神尖鬱茂滹池濟淪蟠精萃秀篤生異人公應運挺出絶類離倫閲敦詩禮感會風雲奮父祖之餘烈䇿冦鄧之髙勛其志慮良實又濟以武惠惻隱之仁謙而接物勇見于大敵恭以持巳孰知夫丗臣至于肅齊家範友于弟昆忠結主知德庇生民功愈大而心轉小寵既厚而憂益殷無私蓄為子孫之計不樹黨收門墻之恩其公亮謹厚又似夫董侍中與万石君也幾丗幾年孕此忠純方沭恩于鳯沼俄星隕于中軍痛丹青之宛轉追畫像于麒麟此非一巳之私議在中外哀悼所不忍聞也惲爰自布衣仰公清塵接樽酒于中統之首與賔筵于至元之春每燕語之衎衎顧若揚顒之可賔矧二弟之欵曲辱交久而情親雖草宿而罔哭聊寓哀于斯文伸孺子之薄奠庶劒繫于徐公之墳也尚享遷奉曽外祖殿試靳公祭文并外妣李氏惟公才德兼備元精孕和早擅場屋三中巍科人文之譽在公實多正大𥘉元公卒冝津權厝新瀧幾七十春殯而未葬譬彼行人歸不及家曷寧其身兹者日吉時良奉安祖傍祔以元配永閉深藏魂而有靈以賁幽光尚享遷奉安縣丞外祖并外媪王氏祭文惲以前歲後十一月草三日為遷奉之事巳告尊靈今者應期舉厝永慰幽煢以順從祖以安則鄉祔我外妣閟此玄坣靳雖衰宗在公未傷有甥姪以主祀重時思而不忘是則不必其子而光揚也有牲斯羜有酒斯香神惟昭鑒歆此一觴尚饗及葬公伯兄孝思貢士及姆氏秋澗先生大全文集卷第六十三
