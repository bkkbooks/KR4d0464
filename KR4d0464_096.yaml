body:
  text: 奉迎使發䇿使告期使納成使納吉使納采使皆以僕射左右丞攝太尉使六帖説白樂天作類書名六帖通典選舉門載唐制開元中行課試之法帖經者所以習經掩其兩端中間微開一行裁𥿄為帖凡帖三字隨時增損可否不一或得四得五得六者為通此六帖之名所從起也六帖云者取中帖之數以名其書期於必中選也鹿庵命擬復立按察司手詔以一身之微惟萬事之統不遑夙夜常切憂勤顧七道之提刑擴六條而從事近因省革偶值停間然非違稽緩之愆縱令弗問恐伺便譸張之者為害滋深仍轉側以詳思非監臨而罔益據所在按察司照依巳降條畫依舊設立施行於戲鷹隼當搏擊之任不與護恐為反傷琴瑟既更張之餘識大體乃為稱職樂天每作歌詩成須令其家老嫗聽讀能通解其旨意辭為之定體此無他不過通俗近人情而已特表而出之且為艱澀無謂之戒西溪云減江南冗貟詔草諭江淮軍民等夫張官置吏本以為民非擾民也朕自混一江淮于今五年憂恤元元之心不遑夙夜期於撫定安集以承上天全付所覆之意比聞陳奏不圗設立之際官冗人濫重致煩擾念之憫然罔副朕志今者上自行省宣慰司下及總府州縣官酌量輕重去處一切冗濫凡有擾於民者盡行革去爾其各安恆業永底而生既清舊染之風共樂惟新之治其有作姧犯科似前不應者已敕行御史臺紏察中書省究治外咨爾黎庶體豫至懷出正大七年毫州節使趙庭王詔别有擢用其子贄時為省知除揉既定省公問以召之之意贄曰以嫌疑故特回避既而公拜禮部尚書贄入賀豫嬰年見神川劉先生三蘇交讀不去手因問於先大夫曰古人有言蘇文熟啖羊肉蘇女生啜菜羹豈此之謂也宋未下時江南謡云江南若破百鴈來過當時莫喻其意及宋亡蓋知指丞相百顔也夫熒惑之精下散而為童謡不尓何先事如此宋真宗東封升中圖嶽頂有五色雲山下環衛以甲馬金道陵元會圖及郊天儀仗圖郊天圓丘圖曽聞某官説當時掌禮者房千里中外幾用人三万未知方澤制度與此何若唐張説家藏明皇開元𥘉東封圖有説宋范石湖攬轡録記興陵見宋使儀衛戍子干入見循東西御廊北行廊幾二百間廊分三節每節一門將至宫城廊即東轉又百許間其西亦然亦有三出門中馳道甚闊兩傍有溝上植栁廊脊皆以青琉璃瓦覆宫闕門户即純用之北即端門十一間曰應天之門下開五門兩挾有樓如左右升龍之制東西西角樓端門內有左右翔龍門日華月華門前殿曰大安殿使人自左掖門入北循大安殿東廊入敷德門東北行直東有殿宇門曰東宫直北面南列三門中曰書英是故夀康殿母后所居西曰會通門自會通北入承明門又北則昭慶門東則集禧門尚書省在門外東西則左右嘉會門二有樓即大安殿後門之後至幕次黑布拂廬待班有頃入宣明門即常朝後殿門也門內庭中列衛士二百許人貼金雙鳯幞頭團花紅錦衫散手立入仁政隔門至仁政殿下團鳯大花氊可半庭殿兩傍有朵殿朵殿上兩髙樓曰東西上閣門兩廊悉有簾幕中有甲士東西御廊循簷各列甲士東立者紅茸甲金纒竿槍黃旗畫青龍西立者碧茸甲金纏竿槍白旗畫黃龍至殿下皆然惟立於門下者皂𫀆持弓矢殿兩階雜列儀物幢節之屬如道家醮壇威儀之類使人由殿下東行上東階却轉南繇露臺北行入殿閾謂之欄子金主幞頭紅𫀆玉帶坐七寶榻皆有龍水大屏風四壁帟幕皆紅繡龍拱斗皆有繡衣兩楹間各有大出香金獅蠻地鋪禮佛毯可一殿兩傍玉帶金魚或金帶者十四五人相對列立遙望前後殿屋崛起甚多制度不經工巧無遺力煬王亮始營此都規摹出於孔彥舟投民夫八十万兵夫四十萬作治數年死者不可勝計和宋書皇云眷命大蒙古國皇帝致書于南宋皇帝爰自平金之後蜀漢荆揚拿兵幾三十年交聘非一卒無成約比者川蜀搗虗荆湖批亢生靈有塗炭之苦戰士有暴露之勞朕甚憫焉是以即位之始首議寢兵用示同仁以彰兼愛期於休息元元馬天下共饗有生之樂而巳且南交廣而西巴蜀北長江而東滄海分兵守險彼所恃以為國者也今戰艦万艘既渡江以扼海鐡騎千群復踰廣而出蜀四塞無結草之禦六軍有破竹之威人所共知不必遍舉於此時也非不能掎角長驅水陸並進秋風虎旅指揮著浙江之潮春露鯨柸談笑挹吳山之翠蓋以佳兵不祥素所不喜守位以仁今之本心又况靖康南北釁端𥘉無盤錯大故非如女直西夏惡積仇深而不可解者也往者彼巳勝負之事往來曲直之辝各有攸當置而勿論自今作始咸取一新故先之以信使申之以忱辝告寶位之𥘉登明朕心之已定準親王上宰能報聘之一來則保國樂天必仁智之兩得苟盡事大之禮自有歲寒之盟若乃憂大位之難繼慮詭道之多方坐令失圗自甘絶棄則請修浚城池增益戈甲以待秣馬利兵會當大舉論天時則炎瘴一無畏憚論地險則江海皆所習知必也窮兵極討一決存亡而後巳力之所至天其識之禍自彼挑此無可慊在我者至誠可保在彼者聽所擇焉母循前例止作虛文時薦清和善綏福履不宣白庚申年四月七日開平府行李翰林欽叔一日與杜仲良在茶肆中有司召公甚急公曰無他多是要撰文字渠留此勿去少當即來已而果至曰為戒論百官草詔適當茟者應奉程天翼程𥘉入供職有猝不易稱者公遂立草五百餘字允協事冝甚稱上意其辝曰朕新即大位肇親万機國事實為未明政統猶懼多闕尚賴爾文武多士內外庶寮上下同心始終戮力以副遺大投艱之託共成興滯補廢之功然而養資考者每務於因循啫間逸者或託於疾病因之積弊習以成風事至於斯朕將何賴蓋嘗深惟百姓勤勞之意尚能不忘纍聖􅉼養之仁服田力穡而以給租庸挽栗飛芻而不憚征繕况爾等世􅈾髙爵身享厚恩夫有國乃可以有家而為臣亦猶為子未有國不安而家可保必須臣竭力而君以寧加之事屬方殷時丁多故舊強待平恢復強敵期于削平正當經營之秋難行姑息之政朕既夙宵軫念庶幾弘業以昭功爾其朝夕在公豈冝玩歲而愒日夫湯刑以警具位周典以正百官兹出話言以為明訓掌刑者有法可奉母使有冤抑之情典選者有格可修毋妄求疏駮之節錢穀當審知取豫母吝千出納之間臺諌當指陳是非毋涉于細碎之事司農以敦本察吏不可苟且而曠聀司牧民以扶弱抑強不可聚斂而營私計至于大而分閫小而掌兵固當志殄寇讎日闢土宇受朝廷之託必思報國念功臣之後常恐辱先又豈可平居或冒于糗糧臨事或生于畏懼視郡縣之官妄分于彼此後部伍之卒不計于公私凡有我官所當共戒其敬遵于邦憲務恪慎于官針享冨貴于當年垂功名于身後且賞罰期于信必而功罪貴乎正明兹誠前代之良規亦我祖宗之巳事今當仰法要在決行於戲任賢使能周室果聞乎興復綜名核實漢家遂至于肅清公勤者賞不敢私弛慢者刑兹無赦各勤爾聀明聽朕言故兹詔示想冝知悉賜國用安鐵劵文皇帝若白咨爾內族英烈戡難保節忠臣儀同三司都元帥兼平章政兖王完顔用安大邦維屏古有格言王府藏勳賞存舊典卿台階孕秀海嶽儲靈天賦忠貞性資明敏𥘉為兒戲營壘巳成長學神機風雲暗曉方將提挈義旅勤勞主家服金革以不辝冒矢石而有勇頃遭逢於多壘偶陷沒於他邦而能臨事見機去偽從正變疾風雨謀先鬼神一舉而患難殄殱不時而州縣眥復聽聞如此歎曯久之朕方總攬英雄興建功業躰天地含弘之德厚君臣終始之恩胙爾以諸王之封寵爾以上公之位氏族巳書于玉牒勳業復紀於太常同三司之威儀建大將之旗鼓蓋欲宥及于十丗何嫌恩積于一門泰山黃河永及爾裔皇天后土實聞斯言肆申白馬之盟庸示丹晝之約嗚呼謂豫不信鑒詩人曒日之辝弗與同心如文公白水之誓尚奉非常之渥以保無疆之休此是左丞李實之子介然所作時為翰林修撰鹿庵云丗稱米南宫者言禮部也自唐巳來見稱或云指太常也米芾嘗為太常官宋高宋善書學擇諸王命史彌逺教之視可者以繼統孝宗其一也髙宗因出祕府蘭亭使之各書五百本以試其能孝宗不旬日臨七百本以進司馬公注古文孝經首章作仲尼間居曾子待坐廣揚名篇於故治可移於官後有閨門之內具禮矣乎嚴父嚴兄之辝續夷堅志載廣府某官苦蛇毒取雄黃貯紗囊中挂四壁間既而承塵上日流黑汁視之有巨蛇一衆蛇十數皆腐潰而死自是府舍清安絶無毒物蟠蟄鹿庵云青詞主意不過謝罪攘災保佑平安而巳宋史王安石傳論安石謂天變不足畏祖宗不足法人言不足恤雖少正卯言偽而辨行僻而堅王莾以六經文姦言不是過也東坡論浩然之氣在身為氣見於行事為節合而言之為道故剛而不餒歐陽公云韓愈不獲用於丗修用於出而不盡青陽夢炎説春秋書春王正月本無深意周雖建子其紀年實用夏正觀豳國風為可見矣只為左氏書周正月故後人説謂以夏時冠周月又謂公榖雖迂逺義理最明左氏尚文辝却差了義理許魯齋説班固作古今人表分九等恐昔人心術行事不易知也如孔子稱四科言語宰我子貢至哀公問社食稻衣錦曰安皆為失對稱管仲之器小哉而曰如其仁如其仁伊尹謂不以堯舜之道事君治民是賊君民也而佐湯伐桀其前後不同如此又云聞獲玉山賊首害陳宣慰祐者斬楊州市豫即曰君陳為善之心不冝罹此今若是命也如果得其賊天理為不泯矣魯齋為肯首栁文五就桀贊序云伊尹聖人也不夏商乎心心乎生民而巳曰孰能由吾言由吾言為堯舜而吾生人堯舜人矣退而思曰湯誠仁其功遲桀誠不仁朝吾從而暮及於天下可也於是就桀至於卒不可乃相湯伐桀俾湯為堯舜而人為堯舜之人吾所以見伊尹急生人之大唐會要貞觀十四年陜州刺史房仁𥙿奏臣所管界內正月九日河變清者首尾三百余里京房云河水清天下平宋少卿云所清處天地之氣上下澄徹故清亦如霜降水潦收而清也弘道又説文與可送東坡通判杭州詩云北客若來休問事西湖雖好莫吟詩坡𥘉以為常及遭事乃知與可為知幾相如傳云倒景者謂人在天上下視日月故曰倒景課稅所立於合罕皇帝即位之元年諺云平生避車不逺一舍李受益説宋人文廟位次列子思於孟子上德州城壁塹髙深城門內起直城前障掩蔽內外左右慢道其尾相屬俗傳云皆顔魯公制也宋校正禮部韻説草字本音入今人作二十字用卅字本音鈒字今人亦作三十字用近杭州遺火燒五萬餘家延及御史臺少府監燼焉至祕書監救得免有人作賦一聮云公道不行臺遂焚於御史斯文未喪省僅存於祕書觀顔魯公忠義堂等帖偶悟公書徑面潤蓋筆善轉面韻勝故也何參政繼先説大名宣極司參議烏古論貞區處事機甚有決斷時奉朝旨死囚呈省待報其餘邊關雜犯皆從便處決時圍李璮於濟南人心中外不安烏議一切重刑欲皆戮之使由子明巳下皆以違制不從烏與左丞濶子清謀曰璮賊未下魏為西鄰不便冝從事無以震讋衆庶竟戮之市人稱臨事知權變云貞字正卿小字四和馬前朝近侍局大使晦翁明道論性説生之謂性止生之謂也天之付與萬物者謂之命物之稟受於天者謂之性然天命流行必二氣五行交感凝聚然後能生物也性命形而上者也氣則形而下者也形而上者一理混然無有不善形而下者則紛紜雜糅善惡有所分矣故人物既生則即此所稟以生之氣而天命之性存焉此程子所以發明告子生之説而以性即氣氣即性者言之也皆水也止各自出此又以水之清濁譬之水之清者性之善也流至海而不汚者氣稟情明自幼而善聖人陸之而全其天者也流未逺而巳濁者氣稟偏駁之甚自糿而惡者也流既逺而方濁濁者長而見異物而遷焉失其赤子之心者也濁有多少氣之昏明純驗有淺深不可以濁者不為水惡亦不可不謂之性也然則人雖為氣所昏流於不善而性未嘗不在其中故人不可以不加澄治之功惟能學以勝氣則知此性渾然初未嘗壞所謂元初水也東城云昔之為性論者孟子以為善而荀子以為惡楊子以為善惡混而韓愈氏又取夫三子之説而折之以孔子之論離性以為三品曰中人可以上下而上智與下愚不移言孔子之所謂中人可以上下而上智與下愚不移者是論其材也而至於言性則未嘗斷其善惡曰性相近也習相遠也而巳晦翁象刑説周穆王五刑皆贖復舜之舊不察舜之贖初不上及五刑而穆王之法亦必疑而後贖穆王之事以豫料之殆必由其巡遊無度財匱民勞至其末年無可為計乃特為此一切權宜之術以自豐而又託於輕刑之説以違道以干譽耳鹿庵問惲匡衡為相何如對曰學術有餘忠蹇不足先生為然陳希夷嘗有詩云我見世人忙箇箇忙如火忙者不為身為身忙却可觀蜀工孫知微人樣渡海觀音像足前有謂小百花者蓋作一大青荷葉上布散諸天花故云又觀馬雲卿臨吳道子轉山北斗圖凡七人中有𬒳甲者又觀周宣王宣榭敦考其欵文至至元戊寅二千年矣顔魯公書出師表後題乾元元年戊戍歲蒲州刺史顔真卿奉勑書豫以謂雖顔氏童僕尚不至此恐是世俗好事者為之盧摯説嘗聞諸先輩漢去三代最近髙祖有為之主不能革去秦弊復井田封建之制此最何之可責因與論作文當於易中求難難中求易相鑑之作當以蕭何為首一日左丞姚公謂余不若自臯夔始而下自無首尾為間余詳思處變之極反經而不失其正者莫伊周為大故自阿衡為首宋賔客云河水清河隂精本濁而反清不惟異常亦水氣之極盛也李受益云祖宗次序自曽祖巳上為五代祖增而上之也鹿庵云今之聲韻始自沈約及説今禮部韻如十灰十三元音殊不協何以知其自約始以文選前聲韻不謹嚴乃知鎮國寺柏上生芝中宫有旨令院官究其祥以進因與李受益具事實如左論衡云芝生於土土氣和故芝草生古瑞命記王者慈仁則芝草生瑞應圖王者敬事耆老不失故舊則芝草生酉陽雜爼云屋柱木生芝黃者為喜陶隱居云今世用芝此是樹木枝上所生狀如木檽音枹朴子云木芝者生於柏脂名曰未威喜夜視有光本草經云霍山生赤芝名曰丹芝常山生黑芝曰天芝泰山生青芝曰龍芝華山生白芝曰玉芝嵩山生黃芝曰金芝唐公逺靈芝經曰芝木之精也芝四季皆生名曰春精夏精秋精冬精又曰青芝一枝應木酒也宋敏求春明宫退朝録唐禮部郎中知省中詞翰為南宫舍人百日後必知制誥又載𥘉學記唐玄宗為諸王從學時命徐堅定撰雖名𥘉學終身觀之可也雪庵李禪師與余觀栁懸誠書何進滔碑李云桞書法度最備豫曰然然懸誠書令人易厭不若魯公筆法愈觀而意無窮也桞窘於法度取媚於一時中枯而無物顔意無窮蓋以忠義之氣中冠之故也雪庵為肯首劉太保常云中興頌雄偉如驅之一字若千金駿馬倚丘山而立歐率更三帖一姚將軍墓志二化度寺碑三追贈隋禪國公詔時貞觀五年也化度碑李百藥文率更規模一出黃庭至竒古處乃隸書一變爾李禪師説作字有得筆意時有得布置時趙大中庸説嘗見遺山與張緯文相謔見碑文過俞曰遺山又貨了一平天冠也鹿庵説堇奉御近贈一歙硯殊發墨且增其色馬雲漢説太庚麥無􅉭圎太謂之和尚麥後宋宰相韓托胄嘗改諸州後園蓮沼為放生池詞臣髙文虎作記有云鳥獸魚鱉咸若湯王所以基商後髙作主司出硬題困舉子一科生以髙用事懼作一小詞嘲云髙文虎誇伶俐萬苦千辛作箇放生池記從頭無一字説及朝廷只把托胄歸美夏王道我不是商王鳥獸魚鱉是你劉元城與司馬先生論玄宗𥘉年焚珠玉於前殿時有云焚之前殿蓋欲人知此好名之心也一日侈心復回其弊有甚於此者晚年果如其言司馬公云惜乎史失其人姓名至今為恨又云人君去賢任侫譬如治病飲良藥可愈非良藥即死明知之只飲惡藥既飲惡藥非至死不巳蓋玄宗暮年用相知林甫蕭松之佞用之甚久知張九齡韓休之賢退之甚速張萱畫則天朝六蕃圖其布置取則天遊上苑詩意明朝遊上苑火速報春知花須連夜發不待晚風吹及太宗朝蕃玉橫軸文皇乘一花輿四近侍肩舁云閻立本筆有詔集百官問鈔輕物重事大學士王鹿庵對云物貴則不足物賤則有餘要以節用而不妄費庶物貨可平宋少卿弘道説葬書分五姓九星又有棊旋正式風水土丈二尺下為土龍界又丈二尺下為水龍界過此則吉乂説唐太真改葬祖墓上有紫藤一株隂影甚茂既伐去藤流赤津如血不數年劉氏滅之殆盡因以往嵗改葬先妣夫人靳氏𥘉啓玄堂其棺蓋上露珠交布成文如所結瓔珞然甚可觀也復有二黃蝶飛出其露華移時方晞宋公云在葬書此子孫潤澤文華之兆别有記以書其詳慶壽長老滿公曽住泰安天保寨聞土人説黨竹溪未第時家甚窘至令其子為人牧豬燕城西南門曰端禮有大定末劉無黨所撰左丞唐括安禮碑有云尹大興時迎午休吏燕雀語堂下人不知有官府之詞康節與客遊嵩山中塗客指所憩樹問曰此何日枯悴先生久不對客疑焉曰非不答吾有所俟也俄一葉墜先生曰比吾二人還亡矣既回樹巳為人伐去占法蓋取葉墮時刻而定其存亡者焉鹿庵與顒軒論事顒軒曰天下事亦有不可以理槩知者鹿庵大為不然徒單公曰謂如大城南栁樹若不親覩如何知東西幾行大小幾株鹿庵為默然一座大笑晦庵云張良曹參二人皆學黃老子房體用兼備曹得其體而不得其用文云漢自武帝朝宰相但行文書而已秋澗先生大全文集卷九十六
