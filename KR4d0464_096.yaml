front:
  text: 秋澗先生大全文集卷九十六玉堂嘉話卷之四榖梁子曰獨隂不生獨陽不生獨天不生陽也隂也天也三者合然後生天極謂南北極天之樞紐常不動處譬則車之軸也河圖言崑崙者地之中也下有八柱互相牽制名山大川孔穴相通素問曰天不足西北地不滿東南注云中原地形西北髙東南下今百川滿湊東之滄海則東西南北髙下可知或問邵子曰天何依乎曰依乎地地何附曰附乎天天地何所依附曰自相依附天依形地附氣其形也有涯其氣也無涯但天之形圎如彈丸朝夜運轉其南北兩端後高前下乃其樞軸不動之處其運轉者亦無形質但如徑風旋之當晝則自左旋而向右向夕則自前降而歸後當夜則自右轉而後左將旦則自後升而趍前旋轉無窮升降不息是為天體而實非有體也地則氣之查滓聚成形質者但以其束於徑風旋轉之中故得以兀然浮空甚久而不墜耳黃帝問於岐伯曰地有憑乎岐伯曰大氣舉之亦謂此也曰九重則自地之外氣之旋轉益逺益大益清剛究陽之數而至於九則極清極剛則無復有涯矣豈有營度而造化之者先以斡維繫於一處而後以軸加之以柱承之而後天地乃定位矣許魯齋云古人看漢書皆有傳授不然有難曉者豈律曆天文之謂乎鹿庵先生江南平告天地文伏以時逢喪亂嶽瀆分疆運屬休明乾坤一統眷靖康之餘孽據江表以偷生依阻山溪動搖戈甲不修嵗幣久虧事大之儀留止行人永絶親鄰之好既興師而問罪即列陳而長驅戈船浮鄂渚之波鐵馬渡松關之險方知力屈始悔前非遂奉表以求哀願納地而入覲宋主某巳於某月日來至闕下其江南郡縣人民巳委官撫治了當是皆上帝垂祐靈祇降祥𣣔康功普𬒳於黔黎故盛事施及於沖眇尚祈昭監永錫休嘉告太廟文伏以踐祚守文雖奉巳成之業繼志述事敢忘未集之勳眷靖康亡滅之餘擅吳會膏腴之壤依憑江險壅隔皇風纍興問罪之師猶守執迷之意逮戈船飛渡列明土崩始悟前非方圖改過遂稱臣而奉表願納地以歸朝宋主某巳於某月日來至闕下其江南郡縣人民巳委官撫治了當朔雪炎風盡書軌混同之地商孫夏裔皆蒸嘗助祭之臣顧沖眇以何功實祖宗之餘廕尚祈昭監永錫休嘉瀛國公制辝時逢屯否嶽瀆分疆運值休明乾坤一統眷靖康之餘裔擅吳會之奧區逺隔華風久睽鄰好我國家誕膺景命奄有多方炎風朔雪之鄉盡修職貢若木虞淵之地靡不來庭罄六合以混同豈一方而獨異用慰徯蘇之望爰興問罪之師戈船飛渡而天塹無憑鐵馬長驅而松關失險末主趙某乃能察人心之向背識天道之推移正大姦誤國之誅斥羣小浮海之議決謀宫禁送欵軍門奉章奏以祈哀率親族而入覲是用昭示大信度越彛章位諸台輔之尊爵以上公之貴可開府儀同三司檢校司徒瀛國公主者施行涼威肅酒與甘張沙是燉煌瓜晉昌徒單侍講括至元六年行用元寶鈔止七十餘萬錠豫時為御史曾照刷提舉司文按故知至元七年天下軍民并折居總二百三十二万户天干地支天有五隂五陽為十幹地有六柔六剛為十二支九州地畝數後漢郡國志注九州之地凡二千四百三十万八千二十四頃定墾者九百二十万八千二十四頃不墾者一千五百万二千頃哲宗孟后元祐七年太皇太后以六禮儀制聘入宫
