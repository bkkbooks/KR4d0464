  text: 秋澗先生大全文集卷一伯王堂嘉話卷之八甲午九月望日東原五六友人會于孫侯小軒話及前朝得失之漸坐客問云金有中原百有余年將耒國史何如尓或曰自唐巳降五代相承宋受周禪雖靖康間二帝蒙塵緣江湖以南趙氏不絶金於宋史中亦猶劉石符姚一載記爾衆頗惑焉僕曰正閠之論愚雖不敏試以本末言之夫耶律氏自唐以來世為名族延及唐末朱溫篡唐四方幅裂遼太祖阿保機乘時而起服髙麗諸國并燕雲巳北數千里改元神册與朱梁同年即位元年丁卯在位十九年遼太宗嗣位諱德先太祖弟二子改元天顯元年丙戍典唐明宗同年即位十一年河東節度使石敬瑭為清泰來伐遣使求救于遼奉表稱臣仍以父禮事之遼太宗赴援以滅後唐石氏號晉晉以燕雲十六州獻于遼太宗歲貢帛三十萬匹天福七年晉髙祖殂出帝嗣位大臣議奉表稱臣告哀於遼景延廣請致書稱孫而不稱臣與遼托衡太宗舉兵南下會同九年入汴以出帝為負義侯置於黃龍府石晉遂滅大同元年太宗北還仍以蕭翰留守河南劉知逺在河東乘間而發由太原入汴自尊為帝及乎宋受周禪有中原一百六十餘年遼為北朝丗數如之雖遼之封城𥚹於宋校其兵力而澶淵之戰宋幾不守因而割地連和歲貢銀絹二十万兩匹約為兄弟仍以世序昭穆降及晚年遼為翁宋為孫至天祚金朝太祖舉兵西來平遼克宋奄有中原三分之二子孫帝王坐受四方朝貢百有餘年今以劉石等比之豫故不可不辨夫劉淵石勤皆晉之臣庶叛亂國家以目伐君縱能盜據一隅僣至姚泓終為晉將劉𥙿所虜斬于建康市返本還亢兹作載記理當然也夫完顔氏丗為君長保有肅愼至武元時而天下南北敵國素非君臣若依席上所言金為載記未審遼史復如何亦方遼太祖神册之際宋太祖未生遼祖比宋前期五十餘年巳即帝位固難降就五十年之後包于宋史為載記其世數相懸名分顚倒斷無此法既遼之丗紀宋不可兼其金有中原更難别議以公論處之據五代相因除莊宗入汴復讎伐罪理勢可觀外朱梁篡逆甚於窮新石晉因遼有國終為遼所虜劉漢自立父子四年郭周廢湘隂公而立以五代之君通作南史內朱梁名分猶恐未應遼自唐末保有北方又非篡奪復承晉統加之丗數名位逺兼五季與前宋相次而終言北史宋太祖受周禪平江南收西川白溝迆南悉臣大宋傳至靖康當為宋史金太祖破遼克宋帝有中原百有余年當為北史自建炎之後中國非宋所有冝為南宋史或曰歐陽宋之名臣也定立五代不云南史當時想曽熟議如何今日復有此論僕曰歐陽公作史之時遼方全盛豈不知梁晉漢周授受之由故列五代者欲􅈾周禪以尊本朝勢使而然至于作十國丗家獨稱周漢之事可謂難矣請事斯語厥有旨哉愚讀李屏山詠史詩詠五代郭周云不負先君持節死舉朝唯有一韓通愚嘗驚哀此詩命意宋自建隆以來名臣士大夫論議篇章不為不多未嘗有此語非不能道也蓋禘之説也故列五代者良可知隋季文中子作元經至晉宋巳後正統在中原而後大唐南北一統後至五代天下擾擾無由再議降及今日時移事改商確前人隱約之迹當從公論議者又曰金有中原雖百餘年宋自建隆于今幾三百年况乎今年春正月攻陷蔡城宋有復讎之迹固可兼金愚日元魏齊梁丗數巳逺恐諸公不以為然請以五代周漢之事方之漢隱帝乾祐三年遇弒太后詔立帝弟武寧軍節度使嗣位名贇河東節度使劉旻之子後雖廢為湘隂公旻亦尋即皇帝位于晉陽終旻之世猶稱乾祐四帝二十九年至宋太祖興國四年歸宋依今日所論旻係劉髙祖母弟在位四年其子承鈞嗣位改元天會五年郭周巳絶郭周三主九年東漢四主二十九年東漢四主逺兼郭周郭亦不當稱周固當為閏宋太祖不曰受周禪傳至太宗方承東漢之後歐陽不合作五代史合作四代史司馬光通鑑當列東漢為世紀歐陽不冝作十國丗家嗚呼國家正閏固有定躰不圗今日輕昜褒貶在周則為正在金則為閏天下公論果如是乎况蔡城一事蓋大朝征伐之功是時宋之邊將專權率意自撤藩籬快斯須之忿昧唇齒之理自謂愛巳而惡他延引強兵深入遵行覆轍徽宗跨海助金破遼之事媒孽後禍取笑萬丗何復讎之有也宋自靖康巳來稱目姪走玉帛歲時朝貢幾于百年豈期今日私論遽稱尊大果使宋廟有靈必可其議也泰和間南宋寒盟起無名之師侵漢唐鄧宿泗章宗分遣應兵其淮漢川蜀之間大為所破宋遣臣方信孑焉正等卑辝告和請叔為伯進增歲幣獻權臣之首韓托胄侯師且也繪其容漆其首亟送幽都至于闕下信孺有古調一篇子能草略記之大朝君相仁且慈小麥未熟休王師姦臣豈足贖民命既往不咎來可追此詩書於上源驛壁間館伴使入朝題奏上頗哀憐是時中原連年蝗旱五穀不登山東尤甚章庿自責之心深重形于欹詠者頗多每以偃兵為念故詔百官議曰朕聞海陵有言我國家雖受四方朝貢宋猶假息江左亦天下兩家邪故有親征之行去歲宋人兵起無名搖蕩我邊鄙今巳敗衄哀懇告和朕思海陵之言冝如何爾時臣下夲希上意故進言曰先于靖康間宋祚巳襄其遊魂餘魄今雖據江左正猶昭烈之在蜀不能紹漢氏之遺統大可見也和議乃定今日校之此語乃當時繼好息民之大略非後丗正閏之定論或曰何以知之曰夫昭烈之于漢雖云中山靖王之後其族屬疏逺不能紀録丗數名位南宋髙宗乃徽宗之子欽宗之弟歲月不易以即位奄有江南似與昭烈頗異若以金史專依泰和朝議特承宋統或從今日所論包為載記二論俱非至公坐客又云遼之有國僻居燕雲法度不一似難以元魏北齊為比僕再拜而言曰以此責之膚淺尤甚若以居中土者為正則劉石慕容符姚赫􅏒所得之土皆五帝三王之舊都也若以有道者為正符秦之量雄材英略信任不疑朱梁行事篡奪內亂不得其死二者方之統孰得焉夫授受相承之理難以此責况乎泰和𥘉朝廷先有此論故選官置院創修遼史刑期榜狀元張楫預焉後因南宋獻馘告和臣下奏言靖康間宋祚巳絶當承宋統上乃罷修遼史緣此中州士大夫間不知遼金之興本末各異者向使泰和間遼史蚤成天下自有㝎論何待余言坐客愕然曰數百年隱顯之由何其悉也問一得三實出望外幸謂言之僕因就毫楮録狂斐以俟喜事者刪之庶備他日史官之採托云爾燕山修端謹記鹿菴云古詩句多平字不能得健如杜詩古調一句七字有至六字無平者律則當如樂律和應否則不成音矣
