body:
  text: 紀行張參議䊮卿嵗丁未夏六月𥘉吉赴召北上發自鎮陽信宿過中山時積隂不雨有頃開霽西望恒山之絶頂所謂神峯者聳㧞若青盖然自餘諸峯歴歴可数因顧謂同侣曰吾軰此行其速返乎此退之衡山之祥也翌日出保塞過徐河橋西望琅山森若劍㦸而葱翠可挹巳而由良門㝎興抵涿郡東望樓桑蜀先主廟經良郷度瀘溝橋以逹于燕居旬日而行北過双塔堡新店驛入南口度居庸関出関之北口則西行經榆林驛雷家店及扵懐来縣縣之東有橋中横木而上下皆石橋之西有居人聚落而縣郭蕪没西過鷄鳴山之陽有邸店曰平輿其巔建僧舍焉循山之西而北沿桑乾河以上河有石橋由橋而西乃徳興府道也北過一邸曰㝎防水經石梯子至宣徳州復西北行過沙嶺子口及宣平縣驛出得勝口抵梔胡嶺下有驛曰孛落自是以北諸驛皆蒙古部族所分主也毎驛各以主者之名名之由嶺而上則東北行始見毳幕氊車逐水草畜牧而巳非復中原之風土也尋過撫州惟荒城在焉北入昌州居民僅百家中有廨舍乃國王所建也亦有倉廩隷州之塩司州之東有塩池周廣可百里土人謂之狗泊以其形以故也州之北行百餘里有故壘隱然連亘山谷壘南有小廢城問之居者云此前朝所築堡障也城有戍者之所居自堡障行四驛始入沙陀際陀所及無塊石寸壤逺而望之若岡陵丘阜然既至則皆積沙也所冝之木揄抑而巳又皆樗散而樷生其水盡鹹鹵也凡經六驛而出陀復西北行一驛過魚兒泊泊有二焉周廣百餘里中有陸道逹于南北泊之東涯有公主離宫之外垣高丈餘方廣二里許中建寝殿夾以二室背以龜軒旁列兩廡前峙眺樓登之頗快目力宫之東有民匠雜居稍成聚落中有一樓榜曰迎暉自泊之西北行四驛有長城䫋址望之綿延不盡亦前朝所築之外堡也自外堡行一十五驛抵一河深廣約什滹沱之三北語云翕陸連漢言馿駒河也夾岸多叢栁其水東注甚湍猛居人云中有魚長可二四尺春夏及秋捕之皆不能得至冬可鑿冰而捕也瀕河之民雜以蕃漢稍有屋室皆以土冐之亦頗有種藝麻麥而巳河之北有大山曰窟速吾漢言黒山也自一舎外望之黯然若有茂林者迫而視之皆蒼石也蓋常有隂靄之氣覆其上焉自黒山之陽西南行九驛復臨一河深廣加翕陸連三之一魚之大若水之捕法亦如之其水始西流深急不可渉北語云渾獨刺漢言免皃也遵河而西行一驛有契丹所築故城可方三里背山面水自是水北流矣由故城西北行三驛過畢里紇都乃弓匠積養之地又經一驛過大澤泊周廣約六七十里水極澄澈北語謂吾悮竭腦児自泊之南而西分道入和林城相去約百余里泊之正西有小故城亦契丹所築也由城四望地甚平曠可百里外皆有山山之隂多松林瀕水則青楊叢柳而巳中即和林川也居人多事耕稼悉引水灌之間亦有𬞞浦時孟秋下旬麻麥皆槁問之田者云巳三霜矣由川之西北行一驛過馬頭山居者云上有大馬首故名之自馬頭山之隂轉而復西南行過忽蘭赤斤乃奉部曲民匠種蓻之所有水曰塌米河注之東北又經一驛過石堠石堠在驛道旁髙五尺許下周四十余歩正方而隅巍然特立于平地形甚竒峻遥望之若大堠然由是名焉自堠之西南行三驛過一河曰唐古以其源出于西夏故也其水亦東北流水之西有峻嶺嶺之石皆鐡如也嶺隂多松林其陽帳殿在焉乃避夏之所也迨中秋後始啓行東由驛道過石堠子至忽蘭赤斤山名以其形似紅耳也東北迤邐入陀山自是且行且止行不過一舎止不過信宿所過無名山大川不可殚紀至重九日王師麾下㑹于大矛帳灑白馬湩脩時祀也其什噐皆用禾樺不以金銀為飾尚質也十月中旬方至一山崦間避冬林木甚盛水皆堅凝人競積薪儲水以為禦寒之計其服非毳革則不可食則以羶肉為常粒米爲珍比歳除日輙迁帳易地以為賀正之所日大晏所部於帳前自王以下皆衣純白裘三日後方詣大牙帳致賀礼也正月晦復西南行二月中旬至忽蘭赤斤東行及馬頭山而止趂春水飛放故也四月九日率麾下復㑹于大牙帳洒白馬湩什噐亦如之毎歳惟重九四月九凢致祭者再其餘節則否自是日始囬復由驛道西南徃避夏所也大率遇夏則就髙寒之地至冬則趍陽煖薪木易得之處以避之過以徃則今日行而明日留逐水草便畜牧而巳此風土之所冝習俗之大畧也僕自始至迨歸遊于王庭者凡十閱月毎遇燕見必以礼接之至于供帳衾褥衣服食飲藥餌無一不致其曲則眷顧之誠可知矣自度衰朽不才其何以得此哉原王之意出於好善忘勢爲吾夫子之道而設抑欲以致天下之賢士也德輝何足以當之後必有賢于隗者至焉因紀行李之夲末故備誌之戊申夏六月望日太原張徳輝謹誌商司業録到大常諸雜儀禮文德殿宿齋儀注差官等景靈宫行禮儀注差官等太廟行禮儀注差官等明堂大禮陞降玉輅儀注明堂殿行禮儀注明堂殿星啚明堂大禮畢紫宸殿称賀儀注明堂大禮畢登門肆赦儀注明堂升陪事并禮饌差官等明堂降御劄鏁院并奏告事明堂大禮修築路道圗明堂大禮笏記明堂大禮排日祭祀明堂降御劄修路教車按輅等年代月日明堂大禮逐次䟎那更點明堂大禮差五使等官年代例明堂大禮緫差官頭冠法服様玉輅圖玉輅件叚尺寸及太平車尺寸等逍遥平輦圗并尺寸等太常樂圗祭噐圗黃麾大仗圗明堂大禮文武官合着服色等御龍直執從物圖明堂大禮皷吹鷄唱警埸圖明堂大禮樂章樂曲明堂大禮合降指揮等明堂大禮爲值雨降過生創指揮例明堂大禮諸雜事例等明堂大禮祗應并鋪分人數等熈朝盛典詩大安輦件叚明堂大禮教象申請事節計三十七冊曰明堂大禮景定四年藍大正記至元三十年三月二十九日商琥録宣和鹵簿圖祀圎丘圗東封太山圗監修國史例忠齋劉承旨説宋朝監修國史宰相𥘉任者謂之開局一月一至院謂之過局至元三十一年甲午七月𥘉四日右丞相完澤受開府儀同三司監修國史右丞相如故竇儼水論周丗宗南伐駐驛臨淮因覽唐貞元中泗州大水記詔竇儼論其事儼献文其畧曰夫水沴所具厥有二理一曰數二曰政天地有五德一曰潤二曰暵三曰生四曰成五曰動五德者隂陽之使也隂陽者水火之本也隂陽有常德故水火有常分竒偶収半盈虚有凖謂之通正羡倍過亢極無不至謂之咎徴二者大期率有常數除之主始於淵献水之行紀於九六凡千有七百二十有八歳為浩浩之㑹當是時也隂布固陽澍雨天下百水注漲其通川岸不受餘則旁呑原隰科坎平槩則漂墊方割雖尭舜在上臯夔佑政亦不能弭其沴也過此以還則係於時政如其后辟狂妄以自率權臣昧冐以下專政不明賢不章則苦雨數至潦水積厚然隂陽之數也貞元壬申之水匪數之期乃政之感也徳宗之在位也啓導邪政狎暱小人裴延齡專利爲心隂潜引納陸贄有其位弃其言由是明明上帝不駿其德乃降常雨害于粢盛百川沸騰壞民廬舎固其冝也王者苟能修五政崇五禮禮不瀆政不紊則五日一霏微十日一霡霂十五日一滂沱謂之時雨所以正五運之制節占象晷刻無有差爽則神農之丗其驗歟丗宗嘉之國初迁禮部侍郞依前學士判太常如故是時祠祝樂章宗廟謚号皆儼所定撰人服該博儼冲澹寛蕳好賢樂善平居怡怡如也未甞失色於僮僕優游文翰凡十數年著大周正樂三十卷詔藏於史閣其大周通禮未及編纂㑹儼卒議者惜之至元貞元年歳六月十三日宋太祖實録抄并校勘無差時開眞定野河事甚不便金史王父康公定奪此王狀元先生時爲丞旨學士帝紀九太祖太宗熙宗海陵庻人丗宗章宗衛紹王實錄闕宣宗哀宗實録闕志書七天文五行附地里边境附禮楽郊祀附刑法食貨交鈔附百官選㪯附兵衛世襲附列傳舊實録三品巳上入傳今擬人物英偉勲業可称不限品從忠義隠逸高士附儒行文藝列女方技逆臣怱沙虎諸王后妃開國功臣在先書示仲謀王相修史事宜急不宜緩多半採訪切恐老人漸無費用不可惜當置暦令一人􅌹掌以丨打丨元𥙿之蕭公弼奏用銀二千定今即編修書冩請俸飲食𥿄劄費用若作定撰三五百定都了採訪文字令言者旌賞隱者有罰仲謀所冝着心編修且要二貟直須選擇魏太𥘉周幹臣云云本把合用儒人兼管不冝用他色目如他日同修編修人來房屋决少目今便合啇議起盖盖下房屋都在文廟巳後也得用謂如仲謀兼編修徒单雲甫受直學士兼同修李仁卿學士兼同修胡紹開年小也冝喚去比至定俸且與批支若家小來更好都交文廟裏住史事早成其他不預史事者在於文廟自當退去此明年話也仲謀冝知之書冩典史雜使以後必湏用謂文字未集且定編修二人若踏逐書冩二名更佳雜使亦不可闕將来院官不要人使喚中統二年示秋磵先生大全文集卷壹伯
