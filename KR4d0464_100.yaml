front:
  text: 秋磵先生大全文集卷壹伯王堂嘉話卷之八甲午九月望日東原五六友人㑹于孫侯小軒話及前朝得失之漸坐客問云金有中原百有余年將耒國史何如尓或曰自唐巳降五代相承宋受周禪雖靖康間二帝蒙塵縁江湖以南趙氏不絶金於宋史中亦猶劉石符姚一載記爾衆頗惑焉僕曰正閠之論愚雖不敏試以本末言之夫耶律氏自唐以來世爲名族延及唐末朱温篡唐四方幅裂遼太祖阿保機乗時而起服髙麗諸國并燕雲巳北數千里改元神冊與朱梁同年即位元年丁卯在位十九年遼太宗嗣位諱徳先太祖弟二子改元天顯元年丙戍典唐明宗同年即位十一年河東節度使石敬瑭爲清㤗來伐遣使求救于遼奉表稱臣仍以父禮事之遼太宗赴援以滅後唐石氏號晋晉以燕雲十六州献于遼太宗歳貢帛三十萬疋天福七年晋髙祖殂出帝嗣位大臣議奉表称臣告哀於遼景延廣請致書稱孫而不稱臣與遼托衡太宗舉兵南下㑹同九年入汴以出帝爲負義侯置於黄龍府石晋遂滅大同元年太宗北還仍以蕭翰留守河南劉知逺在河東乗間而發由太原入汴自尊爲帝及乎宋受周禪有中原一百六十餘年遼爲北朝丗數如之雖遼之封城𥚹於宋校其兵力而澶淵之戰宋幾不守因而割地連和歳貢銀絹二十万两疋約爲兄弟仍以世序昭穆降及晚年遼爲翁宋爲孫至天祚金朝太祖舉兵西来平遼克宋奄有中原三分之二子孫帝王坐受四方朝貢百有餘年今以劉石等比之予故不可不辨夫劉淵石勤皆晋之臣庻叛乱國家以目伐君縱能盗據一隅僣至姚泓終爲晉將劉𥙿所虜斬于建康市返本還亢兹作載記理當然也夫完顔氏丗爲君長保有肅愼至武元時而天下南北敵國素非君臣若依席上所言金爲載記未審遼史復如何亦方遼太祖神冊之際宋太祖未生遼祖比宋前期五十餘年巳即帝位固難降就五十年之後包于宋史爲載記其世數相懸名分顚倒断無此法旣遼之丗紀宋不可兼其金有中原更難别議以公論處之據五代相因除莊宗入汴復讎伐罪理勢可觀外朱梁篡逆甚於窮新石晋囙遼有國終爲遼所虜劉漢自立父子四年郭周廢湘隂公而立以五代之君通作南史内朱梁名分猶恐未應遼自唐末保有北方又非篡奪復承晉統加之丗數名位逺兼五季與前宋相次而終言北史宋太祖受周禅平江南收西川白溝迆南悉臣大宋傳至靖康當爲宋史金太祖破遼克宋帝有中原百有余年當爲北史自建炎之後中國非宋所有冝爲南宋史或曰歐陽宋之名臣也定立五代不云南史當時想曽熟議如何今日復有此論僕曰歐陽公作史之時遼方全盛豈不知梁晉漢周授受之由故列五代者欲􅈾周禪以尊本朝勢使而然至于作十國丗家獨称周漢之事可謂難矣請事斯語厥有旨哉愚讀李屏山詠史詩詠五代郭周云不負先君持節死舉朝唯有一韓通愚甞驚哀此詩命意宋自建隆以來名臣士大夫論議篇章不為不多未甞有此語非不能道也盖禘之説也故列五代者良可知隋季文中子作元經至晋宋巳後正統在中原而後大唐南北一統後至五代天下擾擾無由再議降及今日時移事改商確前人隱約之迹當從公論議者又曰金有中原虽百餘年宋自建隆于今幾三百年况乎今年春正月攻䧟蔡城宋有復讎之迹固可兼金愚日元魏齊梁丗數巳逺恐諸公不以為然請以五代周漢之事方之漢隱帝乾祐三年遇弑太后詔立帝弟武寕軍節度使嗣位名贇河東節度使劉旻之子後雖廢爲湘隂公旻亦尋即皇帝位于晉陽終旻之世猶称乾祐四帝二十九年至宋太祖興國四年歸宋依今日所論旻係劉髙祖母弟在位四年其子承鈞嗣位改元天㑹五年郭周巳絶郭周三主九年東漢四主二十九年東漢四主逺兼郭周郭亦不當称周固當為閏宋太祖不曰受周禪傳至太宗方承東漢之後歐陽不合作五代史合作四代史司馬光通鑑當列東漢為世紀歐陽不冝作十國丗家嗚呼國家正閏固有定躰不圗今日輕昜褒貶在周則為正在金則為閏天下公論果如是乎况蔡城一事盖大朝征伐之功是時宋之邊將專權率意自撤藩籬快斯須之忿昧唇齒之理自謂愛巳而惡佗延引強兵深入遵行覆轍徽宗跨海助金破遼之事媒孽後禍取笑萬丗何復讎之有也宋自靖康巳來称目姪走玉帛歳時朝貢幾于百年豈期今日私論遽称尊大果使宋廟有靈必可其議也泰和間南宋寒盟起無名之師侵漢唐鄧宿泗章宗分遣應兵其淮漢川蜀之間大為所破宋遣臣方信孑焉正等卑辝告和請叔為伯進增歳幣獻權臣之首韓侂胄侯師且也繪其容漆其首亟送幽都至于闕下信孺有古調一篇子能草畧記之大朝君相仁且慈小麥未熟休王師姦臣豈足贖民命既徃不咎來可追此詩書於上源驛壁間舘伴使入朝題奏上頗哀怜是時中原連年蝗旱五糓不登山東尤甚章庿自責之心深重形于欹詠者頗多毎以偃兵為念故詔百官議曰朕聞海陵有言我國家雖受四方朝貢宋猶假息江左亦天下兩家邪故有親征之行去歳宋人兵起無名摇蕩我邊鄙今巳敗衂哀懇告和朕思海陵之言冝如何尔時臣下夲希上意故進言曰先于靖康間宋祚巳㐮其游魂餘魄今雖據江左正猶昭烈之在蜀不能紹漢氏之遺統大可見也和議乃定今日校之此語乃當時継好息民之大畧非後丗正閏之定論或曰何以知之曰夫昭烈之于漢雖云中山靖王之後其族属䟽逺不能紀録丗數名位南宋髙宗乃徽宗之子欽宗之弟歳月不易以即位奄有江南似與昭烈頗異若以金史專依泰和朝議特承宋統或從今日所論包爲載記二論俱非至公坐客又云遼之有國僻居燕雲法度不一似難以元魏北齊爲比僕再拜而言曰以此責之膚淺尤甚若以居中土者爲正則劉石慕容符姚赫􅏒所得之土皆五帝三王之舊都也若以有道者爲正符秦之量雄材英畧信任不疑朱梁行事篡奪内亂不得其死二者方之統孰得焉夫授受相承之理難以此責况乎㤗和𥘉朝廷先有此論故選官置院剏脩遼史刑期榜狀元張檝預焉後因南宋献馘告和臣下奏言靖康間宋祚巳絕當承宋統上乃罷修遼史縁此中州士大夫間不知遼金之興本末各異者向使㤗和間遼史蚤成天下自有㝎論何待余言坐客愕然曰数百年隱顯之由何其悉也問一得三寔岀望外幸謂言之僕因就毫楮録狂斐以俟憙事者删之庶俻他日史官之採摭云尔燕山脩端謹記鹿菴云古詩句多平字不能得徤如杜詩古調一句七字有至六字無平者律則當如樂律和應否則不成音矣
