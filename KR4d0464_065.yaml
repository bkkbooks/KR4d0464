front:
  text: 秋澗先生大全文集卷第六十五辭
  hash: sha256:3d91edad153c6e21dcef08e8831e15f0c344e2c53c15dfce2a180fa219c3f22a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_065-1a}
body:
  text: 中林有烏唁姨母而思親也哀哀母氏壼儀光兮我鞠我育其勞昌兮植思静佳風飄颺兮頋惟蒿蔚擬諼芳兮菽水奉歡其憂忘兮母恃子豫亦所望兮一朝致楽𥘉未嘗兮夜夢見之晝微茫兮歳月逾邁拱木蒼兮履此霜露中心傷兮我行宗城如渭陽兮瞻恋姨闈自不遑兮展我孺慕聞母香兮贈乏瓊瑰幣帛将兮枝同氣連何殊扵幽明間兮庶幾母心慰下泉兮中林有烏翩其反兮情極反哺鳴聲應而􅚓兮可以人而不如鳥之志兮别淚盈睫下霑𬒮兮停雲在空浩無際兮我思母氏曷有旣兮哀友生季子辭并序中綂五年甲子歲夏五月卄有九日晝漏尽三十刻府從事周貞以友生季子之丧耒告聞之驚怛迺為輟食因憶予弱冠時始識渠于教官張文紀學舎性資純雅似不能言者扣其禮經皆䏻成誦于口旣長從泌陽趙公業詞賦故日夕翶翔相得為甚狎逮壬子秋顒軒徒單公自寗来㞐曰今而後執經問學吾知所從矣扵是摳衣席下大玩厥辝含章旣貞士論乃厭毎自嘆古人讀書患其無書今人置書不觀何居要當手畢群書使之滿家而巳反三史甫畢而病嘻學之難成也如此可勝嘆㦲子天性孝友為人簡靖不群喜作詩其較量體格推𫾣聲律有過人者然識者以骨清而癯耳小而傴恐非壽相也今年春顧見憊氣烝出顔間僕謂曰子殆病矣不然何神與氣索然無光耶子少休學本潤身守身為大吾子其慎之旣而臥病在怵以迄于死𥘉其父命其子曰而吏而啇断不汝為惟士與農迺所願學吁為父者可謂知其子而得其教為子者可謂尽其孝而養其志者矣継其天不假年聲光潜窒不少白扵世是迺可惜也扵戯天道無親常與善人若季氏者可謂一門善人矣遘罹㐫極一至扵此天之報施善人果何如㦲予不淂而知也噫武死矣非文曷以攄予之哀而見若之志如李觀歐陽詹之不幸終復聞於世者以昌黎之文故也君諱武字子文世為青齊人夀三十有四遂援毫寓哀以畢其辝誄曰徛嗟季氏以善傳兮種德及嗣培福田兮父母之心一何賢兮子奉以行周且旋兮學根於心浩浩天兮再世而昌其流淵兮有物忌􅎱坎壈纒兮云何不㳤遘此邅兮自古有死豈子然兮維卒不施涕所漣兮哀哀父母白垂顛兮狎于弗順盖子棺兮東城之野子之原兮悲風瀟瀟淇水寒兮㳺魂一去不𣸪還兮永矣無聞閟九泉兮反袂拭面慨其嘆兮禍淫福善此何愆兮天道悠逺疑其無所聞兮其脩与短不幸之間兮嗚呼哀哉夫我何言子所安兮故中奉大夫浙東宣慰使趙郡陳公哀辝至元十四年歲次丁丑秋中奉大夫浙東道宣慰使陳公按营田東下厯明逾台九月七日㱕屯新昌為賊姦所乗遇害嗚呼哀㢤公未殁前五月予夢公柩轊而過衛再夢坐越府上望公而不淂接後閱月復夢把臂談詠如在試院中時苐霧氣盪胸終不覩其面明日卜奉常宋君不吉日後㡬日當有惡報至予魄動而不忍聞既而公故吏張永錫以訃来告乃審公之所以亡嗚呼哀㢤𥘉癸丑歲公侍謀漢邸聞走名而喜之及尹洛師一見殆平生歡至元三年以邦伯釐衛日夕得㳺從燕䖏為文章徃𣸪時或持論古今傾底裏無間至於振衰礪懦長予志殊銳四載間猶一日也後五年予自裏行得調公亦移鎮河湟自是不相覿者五易歲維十有三年夏四月壬辰朏堂移考試河南淂貳公行躍躍不能寐遂自梁抵申由宛葉入洛而竟亊於汴寢飰㳺㞐不斯湏離者餘七十日公以平昔出䖏素所藴而毖者一彂而尽扵予竊壮夫志弘而毅氣剛以直學切而有用噐逺而足識皜皜乎有不可尚巳者及祖帳夷門酒酣歔欷悲不䏻訣去至揚觶而歌曰孤忠耿耿信不疑兮匪席匪石可卷移兮與子論交乃所期兮日暮途逺将何之兮彼蒼悠悠其聞斯兮予上馬㱕念且訝其遽如許也嗚呼噫唏公今死矣予尚忍言㦲或者以玉山賊門庭冦也終宋亡而不克揃新昌下邑也惡而無所預盍去諸予曰公之不去者以弭禍乱懐新附分也亊不辞難患不苟免志也去之民何頼焉賊或有知使洞貫之誠一言開悟干以窮根窟掃餘孽宣威海道以靖東南在公為弗難不幸擁馬直前言未及諭而兇鋒閧加盖公之所能者天也其不能者􅒛也嚮使因䑕軰而丧厥守以偷生而為淂計名莭委地坐眎民殘公之志也㢤况蚣平忠誼表表審量素定晚莭操履益堅其遇當行可為淂少伸抱負分一死乆矣昔顔太師知賊状已明将命而徑徃李司徒視逆刄交下握莭而不去二公者豈甘心劘躬㢤正以忠烈之氣寕以一不幸遽可慊然於其心㢤今以公事莭槩之不少異矣然不使公従朱㳺王遵􅅹丹衷於折檻之前抗忠諌於伏蒲之地柰何鏦死道路纓絶於穿窬之手此士論共惜僕尤哀而爲之辝也公諱祐字慶甫趙之寕晋人固窮力學工爲詩尚氣能道所欲言節齋其自号也嗣子夔継請兵討賊得害公者七人戮越州市次子皐扶其丧葬北邙之新阡其辭曰維天降材深有謂兮清明萃躬經此一世亊兮伊逢昌辰臣子尤不易兮鴻毛沛風冝乎奮厥翼兮百纔幾施有物訶以忌兮固窮善道退而甘所弃兮何縻以好爵足将進而躓兮擠之禍賊天胡爲而厲兮俾姦惡者何所懲忠善者将何恃兮豈福善禍淫之戒時㦯撓而弛兮豈命數一定善惡得而致兮豈一氣偶然乗之者随所值兮不然何厚其所可薄而賢者莫錫類兮鳴呼言至於此天道悠悠此心盡而俟兮自古有死死非以義等草木之敝兮堂堂節齋明是義兮夫我何尢公所求兮既獲死所公乃休兮有子而孝復厥讎而㱕故丘兮是或蒼蒼者有足頼神理於焉在兮魂㱕来些歆予文之一愾兮固元身不殁名永肩於崧岱兮噫故中奉大夫山東東西道宣慰使史公哀辞事有曠世相感欷􅒣不自巳者豈非義激於衷黙有所契而然耶况神交罔間沒而隂相者㢤故宣慰史侯五路萬户留後之嫡長太尉忠武公之猶子也不肖自早歳蒙開府盻睐獲識侯于明面合并有数欵狎則未也逮提憲朔南適平宋来㱕時接燕談三載之間猶一日然既而起公慰宣東方走亦持節歐越前次甬東一夕夢公相戒云君方從事閩徼得䘮有命尚慎眠食不冝中動臨岐握手有恋恋不已者予又嘗銘公兄墓以名驃見貺及倦㳺思㱕公復見夢曰逺囬在迩但吾乗不淂與同耳後数日聞公訃馬亦随斃計公卒辰適始夢甬上時也吁亦異㢤嗚呼公於余深矣徃有以教㱕有以啓迪之非神交而何哭墓草宿且悪夫涕之無從也癸已冬予在翰林公之子親衞指撝使煥弟祕監煇来謁出諸君銘章仍有徴於余感念疇昔迺抒願言公為人深靖有識量善謀能断主長豪貴不以居養自高周知物情未嘗臧否出口平居褒衣素裙以琴書自娯賔從宴㳺若與世浮沉者及其治兵作牧撫循籌畫二者並用不相底滯有成筭而無遺慮所謂緫戎作氣帥尹而寓軍容者公其有焉宜乎爲世父鍾愛名聲昭於人功烈著于後也至元甲申夏六月余将徃厯下見公扵所㞐南楼置酒酌别既酣談論古今成敗傾徹底裏且及平時窹寐風雲破碎陣敵䓁舉如濟南珍屿横槊臨江之役皆是也曰異時倘經故處當知予愾王所敵志也吾老矣将無復再得去三年公薨謝官下於戯公今已矣頋視一時鉅室世臣其麗不鮮較其徳業問望哀榮終始略無遺憾鮮有及公者焉然尚何辝而哀之惟是存殁隂相乆要之言耿耿在抱義激愚衷故特彂其隱而未書者俾告公靈庶慰車過腹痛繫劒喬木之意云其辞曰天之降才實為艱兮用應時需又所難兮文武一歧造物者靳其全兮合而兼濟粤惟世之賢兮堂堂史公北方強兮知柔知剛萬夫望兮依乗風雲乘鉞戎軒蕩無前兮有來群后䇿勛盟府相後先兮收歛豹韜作牧民編于蕃宣兮國倚以重民懐風愛動海堧兮神而化之人亡政息伊時邅兮嗚呼哀㢤若公者其英其靈有無間兮豈随化㱕盡魂無不之渺逝川兮其或奮為神明司幽玄兮明復為人續其志之淵兮若或亶然又不知其㡬世㡬年兮論至扵此尚何言兮所以増我永慨者正復哀斯民之不幸抑且感知巳而涕漣也祝辭劉孝先子迪作古者名訓冠前字加冠後改而推稱盖以責其礼之成全成人之道孝悌忠信莫重而先四者有立吉孰大焉曰禹曰益九官讓賢及陳儆告也如是况余人然山木取義併其名而字之予以四行擴充迪傳劉氏子其服膺拳拳猶日見鄉先生于朝端也周氏小女祝辞元貞元年秋過揔尹孟戡家出小女拜且􅒛誦孝經論語等萹殊琅然也仍請訓辝為祝因書以付之蘭即燕故家留判趙公外孫也英英女挐何静嘉兮翁𥘉見之燕故家兮牙牙點粧玭瓊珈兮學語未正鶯囀花兮今年拜予雙鬟鵶兮洞簫有賦非所誇兮孝章魯語誦無涯兮謝以藴稱汝其昭兮詢以小字曰蘭嬌兮葳蕤芳華幨翠翹兮猗猗揚揚兹容馤兮女惟德馨幽閑在兮佩而服之儀與誡兮女紅蚕休尤所頼兮守以貞順敬毋怠兮付之汝誦于以書脱脱觀溟漲辭山雲蒸兮老而昬大壑澮兮涇流奔渚崖曲兮千里一夕平兮光瀰二水之充兮無幽無深逺朝滄溟兮臣妾之心幽人觀其瀾逝者何嘆兮周而復還萬物化結水之仁功成而退兮殆君子之逡巡日三徃而視兮悟夫嘘噏於此身又何必酌樽中之醁問江山之神也耶鳴榔曲壬申春三月予自京師南還十八日夜半過平棘西洨水上聞漁人鳴榔中流聲響甚厲駐車起聴令人杳然有江湾漁樂之思作鳴榔曲以冩其音莭云其詞曰榔鳴葦間回風逺遞洲空月寒㫖莭愈厲響應虚谷波翻水際驚群魚而入糝笑古人之用智予駐車而三聴欲拏舟而同逝田横墓歌辝至元丙子夏六月奉堂移偕節齋陳公以亊東之偃師過横墓下慨慕耿光悲歌而去歌曰秦以帝稱魯連之所恥兮漢以劒起布衣之所極兮横王東海意不充其覬兮天命攸㱕吾将奚所適兮死或當理庶烈士之則兮秋澗先生大全文集卷第六十五
