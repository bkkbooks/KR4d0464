front:
  text: 秋澗先生大全文集卷第六十五辭
  hash: sha256:3d91edad153c6e21dcef08e8831e15f0c344e2c53c15dfce2a180fa219c3f22a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_065-1a}
body:
  text: 中林有烏唁姨母而思親也哀哀母氏壼儀光兮我鞠我育其勞昌兮植思靜佳風飄揚兮顧惟蒿蔚擬諼芳兮菽水奉歡其憂忘兮母恃子豫亦所望兮一朝致樂𥘉未嘗兮夜夢見之晝微茫兮歲月逾邁拱木蒼兮履此霜露中心傷兮我行宗城如渭陽兮瞻戀姨闈自不遑兮展我孺慕聞母香兮贈乏瓊瑰幣帛將兮枝同氣連何殊于幽明間兮庶幾母心慰下泉兮中林有烏翩其反兮情極反哺鳴聲應而􅚓兮可以人而不如鳥之志兮别淚盈睫下霑𬒮兮停雲在空浩無際兮我思母氏曷有既兮哀友生季子辭并序中統五年甲子歲夏五月草有九日晝漏盡三十刻府從事周貞以友生季子之喪耒告聞之驚怛乃為輟食因憶豫弱冠時始識渠于教官張文紀學舍性資純雅似不能言者扣其禮經皆能成誦于口既長從泌陽趙公業詞賦故日夕翶翔相得為甚狎逮壬子秋顒軒徒單公自寧來居曰今而後執經問學吾知所從矣于是摳衣席下大玩厥辝含章既貞士論乃厭每自嘆古人讀書患其無書今人置書不觀何居要當手畢群書使之滿家而巳反三史甫畢而病嘻學之難成也如此可勝嘆哉子天性孝友為人簡靖不群喜作詩其較量體格推𫾣聲律有過人者然識者以骨清而癯耳小而傴恐非壽相也今年春顧見憊氣蒸出顔間僕謂曰子殆病矣不然何神與氣索然無光耶子少休學本潤身守身為大吾子其慎之既而臥病在怵以迄于死𥘉其父命其子曰而吏而啇斷不汝為惟士與農乃所願學吁為父者可謂知其子而得其教為子者可謂盡其孝而養其志者矣繼其天不假年聲光潛窒不少白于世是乃可惜也于戲天道無親常與善人若季氏者可謂一門善人矣遘罹凶極一至于此天之報施善人果何如哉豫不淂而知也噫武死矣非文曷以攄豫之哀而見若之志如李觀歐陽詹之不幸終復聞於世者以昌黎之文故也君諱武字子文世為青齊人夀三十有四遂援毫寓哀以畢其辝誄曰徛嗟季氏以善傳兮種德及嗣培福田兮父母之心一何賢兮子奉以行周且旋兮學根於心浩浩天兮再世而昌其流淵兮有物忌􅎱坎壈纒兮云何不淑遘此邅兮自古有死豈子然兮維卒不施涕所漣兮哀哀父母白垂顛兮狎于弗順蓋子棺兮東城之野子之原兮悲風瀟瀟淇水寒兮遊魂一去不𣸪還兮永矣無聞閟九泉兮反袂拭面慨其嘆兮禍淫福善此何愆兮天道悠逺疑其無所聞兮其修與短不幸之間兮嗚呼哀哉夫我何言子所安兮故中奉大夫浙東宣慰使趙郡陳公哀辝至元十四年歲次丁丑秋中奉大夫浙東道宣慰使陳公按營田東下厯明逾台九月七日歸屯新昌為賊姦所乘遇害嗚呼哀哉公未殁前五月豫夢公柩轊而過衛再夢坐越府上望公而不淂接後閲月復夢把臂談詠如在試院中時苐霧氣蕩胸終不覩其面明日卜奉常宋君不吉日後幾日當有惡報至豫魄動而不忍聞既而公故吏張永錫以訃來告乃審公之所以亡嗚呼哀哉𥘉癸丑歲公侍謀漢邸聞走名而喜之及尹洛師一見殆平生歡至元三年以邦伯釐衛日夕得遊從燕處為文章往𣸪時或持論古今傾底裏無間至於振衰礪懦長豫志殊鋭四載間猶一日也後五年豫自裏行得調公亦移鎮河湟自是不相覿者五易歲維十有三年夏四月壬辰朏堂移考試河南淂二公行躍躍不能寐遂自梁抵申由宛葉入洛而竟事於汴寢飰遊居不斯須離者餘七十日公以平昔出處素所藴而毖者一彂而盡于豫竊壯夫志弘而毅氣剛以直學切而有用器逺而足識皓皓乎有不可尚巳者及祖帳夷門酒酣歔欷悲不能訣去至揚觶而歌曰孤忠耿耿信不疑兮匪席匪石可卷移兮與子論交乃所期兮日暮途逺將何之兮彼蒼悠悠其聞斯兮豫上馬歸念且訝其遽如許也嗚呼噫唏公今死矣豫尚忍言哉或者以玉山賊門庭冦也終宋亡而不克揃新昌下邑也惡而無所預盍去諸豫曰公之不去者以弭禍亂懷新附分也事不辭難患不苟免志也去之民何賴焉賊或有知使洞貫之誠一言開悟干以窮根窟掃餘孽宣威海道以靖東南在公為弗難不幸擁馬直前言未及諭而凶鋒閧加蓋公之所能者天也其不能者􅒛也嚮使因鼠輩而喪厥守以偷生而為淂計名莭委地坐視民殘公之志也哉况蚣平忠誼表表審量素定晚莭操履益堅其遇當行可為淂少伸抱負分一死久矣昔顔太師知賊狀已明將命而徑往李司徒視逆刃交下握莭而不去二公者豈甘心劘躬哉正以忠烈之氣寧以一不幸遽可慊然於其心哉今以公事莭槩之不少異矣然不使公從朱遊王遵􅅹丹衷於折檻之前抗忠諌於伏蒲之地奈何鏦死道路纓絶於穿窬之手此士論共惜僕尤哀而為之辝也公諱祐字慶甫趙之寧晉人固窮力學工為詩尚氣能道所欲言節齋其自號也嗣子夔繼請兵討賊得害公者七人戮越州市次子皋扶其喪葬北邙之新阡其辭曰維天降材深有謂兮清明萃躬經此一世事兮伊逢昌辰臣子尤不易兮鴻毛沛風冝乎奮厥翼兮百才幾施有物訶以忌兮固窮善道退而甘所棄兮何縻以好爵足將進而躓兮擠之禍賊天胡為而厲兮俾姦惡者何所懲忠善者將何恃兮豈福善禍淫之戒時或撓而弛兮豈命數一定善惡得而致兮豈一氣偶然乘之者隨所值兮不然何厚其所可薄而賢者莫錫類兮鳴呼言至於此天道悠悠此心盡而俟兮自古有死死非以義等草木之敝兮堂堂節齋明是義兮夫我何尢公所求兮既獲死所公乃休兮有子而孝復厥讎而歸故丘兮是或蒼蒼者有足賴神理於焉在兮魂歸來些歆豫文之一愾兮固元身不殁名永肩於嵩岱兮噫故中奉大夫山東東西道宣慰使史公哀辭事有曠世相感欷􅒣不自巳者豈非義激於衷默有所契而然耶况神交罔間沒而隂相者哉故宣慰史侯五路萬户留後之嫡長太尉忠武公之猶子也不肖自早歲蒙開府盻睞獲識侯于明面合并有數欵狎則未也逮提憲朔南適平宋來歸時接燕談三載之間猶一日然既而起公慰宣東方走亦持節歐越前次甬東一夕夢公相戒云君方從事閩徼得喪有命尚慎眠食不冝中動臨岐握手有戀戀不已者豫又嘗銘公兄墓以名驃見貺及倦遊思歸公復見夢曰逺回在邇但吾乘不淂與同耳後數日聞公訃馬亦隨斃計公卒辰適始夢甬上時也吁亦異哉嗚呼公於余深矣往有以教歸有以啓迪之非神交而何哭墓草宿且惡夫涕之無從也癸已冬豫在翰林公之子親衛指撝使煥弟祕監輝來謁出諸君銘章仍有徴於余感念疇昔乃抒願言公為人深靖有識量善謀能斷主長豪貴不以居養自高周知物情未嘗臧否出口平居褒衣素裙以琴書自娛賔從宴遊若與世浮沉者及其治兵作牧撫循籌畫二者並用不相底滯有成算而無遺慮所謂總戎作氣帥尹而寓軍容者公其有焉宜乎為世父鍾愛名聲昭於人功烈著于後也至元甲申夏六月余將往厯下見公于所居南樓置酒酌别既酣談論古今成敗傾徹底裏且及平時窹寐風雲破碎陳敵等舉如濟南珍嶼橫槊臨江之役皆是也曰異時倘經故處當知豫愾王所敵志也吾老矣將無復再得去三年公薨謝官下於戲公今已矣顧視一時巨室世臣其麗不鮮較其德業問望哀榮終始略無遺憾鮮有及公者焉然尚何辝而哀之惟是存殁隂相久要之言耿耿在抱義激愚衷故特彂其隱而未書者俾告公靈庶慰車過腹痛繫劒喬木之意云其辭曰天之降才實為艱兮用應時需又所難兮文武一歧造物者靳其全兮合而兼濟粵惟世之賢兮堂堂史公北方強兮知柔知剛萬夫望兮依乘風雲乘鉞戎軒蕩無前兮有來群后䇿勛盟府相後先兮收斂豹韜作牧民編于蕃宣兮國倚以重民懷風愛動海堧兮神而化之人亡政息伊時邅兮嗚呼哀哉若公者其英其靈有無間兮豈隨化歸盡魂無不之渺逝川兮其或奮為神明司幽玄兮明復為人續其志之淵兮若或亶然又不知其幾世幾年兮論至于此尚何言兮所以增我永慨者正復哀斯民之不幸抑且感知巳而涕漣也祝辭劉孝先子迪作古者名訓冠前字加冠後改而推稱蓋以責其禮之成全成人之道孝悌忠信莫重而先四者有立吉孰大焉曰禹曰益九官讓賢及陳警告也如是况余人然山木取義併其名而字之豫以四行擴充迪傳劉氏子其服膺拳拳猶日見鄉先生于朝端也周氏小女祝辭元貞元年秋過揔尹孟戡家出小女拜且􅒛誦孝經論語等萹殊琅然也仍請訓辝為祝因書以付之蘭即燕故家留判趙公外孫也英英女拿何靜嘉兮翁𥘉見之燕故家兮牙牙點粧玭瓊珈兮學語未正鶯囀花兮今年拜豫雙鬟鴉兮洞簫有賦非所誇兮孝章魯語誦無涯兮謝以藴稱汝其昭兮詢以小字曰蘭嬌兮葳蕤芳華幨翠翹兮猗猗揚揚兹容馤兮女惟德馨幽間在兮佩而服之儀與誡兮女紅蠶休尤所賴兮守以貞順敬毋怠兮付之汝誦于以書脫脫觀溟漲辭山雲蒸兮老而昏大壑澮兮涇流奔渚崖曲兮千里一夕平兮光瀰二水之充兮無幽無深逺朝滄溟兮臣妾之心幽人觀其瀾逝者何嘆兮周而復還萬物化結水之仁功成而退兮殆君子之逡巡日三往而視兮悟夫噓吸於此身又何必酌樽中之醁問江山之神也耶鳴榔曲壬申春三月豫自京師南還十八日夜半過平棘西洨水上聞漁人鳴榔中流聲響甚厲駐車起聽令人杳然有江灣漁樂之思作鳴榔曲以寫其音莭云其詞曰榔鳴葦間回風逺遞洲空月寒旨莭愈厲響應虛谷波翻水際驚群魚而入糝笑古人之用智豫駐車而三聽欲拏舟而同逝田橫墓歌辝至元丙子夏六月奉堂移偕節齋陳公以事東之偃師過橫墓下慨慕耿光悲歌而去歌曰秦以帝稱魯連之所恥兮漢以劒起布衣之所極兮橫王東海意不充其覬兮天命攸歸吾將奚所適兮死或當理庶烈士之則兮秋澗先生大全文集卷第六十五
