body:
  text: 碣銘故善士張君墓碣銘并序善士張君諱從禮字仲和順州龍山人大父德仁有耆行鄉人尊敬之禰義嘗任燕工技府總管既老君當襲職請於府曰親老需侍余志巳定弟從順賢而克荷願卑之竟以從順嗣仲和姿清介不隨俗上下嘗從淡遊先生學詩甚自喜也事母教弟以孝友聞承顔讀書外室屢空宴如也君既不樂仕進嘗曰菽水盡歡不害養志三釡五鼎非所願也至傭筆以供朝夕平生友非逾已而不交曰吾將安倣施非當受而取曰畏將曷勝弟從順洎婦併殁孤姪敏方三歲為鞠育成人過於已出至贅子智於友生羊舌氏家仍為敏納室是亦人難能也詹事張侯髙其孝義憐其窮獨出楮幣數千緡付之約得子錢悉助親養君以義重德薄謝弗敢當郡國知其賢以孝廉纍辟亦不就臺憲廉得其實旌焉復之終身君悚然嘆曰人子奉親理固當然因而有加邦之教也顧從禮何足以為上明分有如是者所居曲水里有亭沼植花挺若儼侍溫凊暇日哦其間有問者事子姑去自號柏溪主人左山啇公得贊之京師之明年君來謁見眉間今雖巳矣尚能以孝止善者也至元癸巳春母氏棄養以哀毀致疾是年冬十月三日考終牖下得年五十有六配劉氏亦能安君貧窶早丗生子智及二女適裴氏王氏再娶董亦前君殁生子曽葬璮州密雲鄉之王冡原友人劉某重契義介嗣子智中表其墓以君篤行有類古人者為之銘銘曰堪輿兩間子職不易孝為化源融而友悌君於二者行不少匱濟以廉貞大錫厥類目為善士吾言匪比其善伊何可欲之謂况乎質美而學行方而義繄匹夫而化鄉人曽克施之弗異五十六年為樂也泄泄去水來山密雲之隰隱然斧封山冢屹立是惟吾曽張仲之室過者必式後漢張羈性孝讓舉動合禮鄉人號張曾子故雲中髙君墓碣銘并敘君諱祐字仲和其先雲中人髙祖巳來逺昭穆無可詳者伯父與考金季家撫州以財雄邊伯父德真字伯諒潛德不仕考諱德榮伯寬其字也姿醇厚鄉黨以德人稱嘗以勞槯豐利酒伯母暨君之妣皆張氏女以姒姊而列妯娌伯生子曰信字仲禮曰義字仲仁信美丰儀虎睛豐頥耳珠赴海以樂終君實仲之嗣貌敦厖性孝悌及長雖混迹闤闠衆不敢以尋常期𥘉燕雲失守豐利府君避地南遷汴梁壬辰歲例北徙以實衛墟君與兄信素負心計相與謀曰衛居天中實通都劇邑百物夥繁合散於此若以什一與時馳逐可致屋潤遂主貨殖為業君為人篤信明敏不底藴留既易彼取收息且廉故聲實四出啇販輿集其門資既饒奓不忍顓利自濡以東多益寡為得每每貸子錢有不克償及群居邸舍積僦直而負者審其窘悉折券無難色由是三郎以長者稱於中外至元十九年五月四日以疾終于家壽六十有五三日葬汲縣汲城鄉南王里之原從新阡也配張氏與君德良稱生四子長曰明福以通幹由泰鹽管勾任河南府交鈔庫使次丗英丗顯丗昌孫二人曰蔓曰莘姪三人曰夢得鄉貢儒士前君卒曰丗傑丗寧姪孫二曰革曰華重孫一曰復亨明年明福以墓碣來請銘余以同里巷者五十年知髙氏為最詳即其冨潤齒息而論蓋自髙曽而降凡六丗雖荐更丗故以孝義勤儉同居不析故也至君承父兄餘業益光大於後內則齊理嚴肅以身率先族屬家僮千有餘指無間言日趍事惟謹屋廬𬒳服務從朴素常以驕靡為戒外則持心近厚與物無滯敬畏官府奔走輸辨未嘗少厭所患謀生之不勤胡恤王事之時亟也自壬子通閲後髙氏迄今為河朔名數之冠豈偶然哉故逺服賈者雖千萬里外念寬厚饒裕獨以髙氏為讓矧髙氏以義致利義重於生因資致冨冨而不驕為子孫又能求銘以昭丗德是又好禮而知本者也焉得辝銘曰冨壽五福先匪欲厚能卑全髙氏起雲燕凡六丗財雄邊重利始南遷編衛氓迹市鄽居家里無間言我屋豐利匪顓益寡乏貰子錢長者稱動河堧供厥賦日翩翩曽不憚生勉􅏧業攸久族嬋嫣服而食耻華鮮孝與義為周旋勤不匱理固然繼之者當鑒焉行山秀淇水淵髙氏裔與並傳新鄉縣尹劉君去思碣銘并序衛之屬邑曰新中鄉其地距太行東麓桑土衍沃浸以清泉之潤民俗殷阜自昔號河朔望縣惟其物廣而訟嚚路衝而務劇故治稱為難然渴餒而易飲食者民之心也得其人苟有以拊而安之將見民戴之如父母仰之如神明惟恐來之暮而去之遽也維至元草六年南宫劉君理由江淮漕莫來主縣治君姿幹敏有機警相時處冝果於裁斷既視事思有以事集于上民便於下於是舉條章明約束均賦役却造請凡轡馭之急遽者馴而致之不務髙逺率先以身為度縣當關陜驛程使馹轉致日相望於道吏民疲於供頓君量其輕重處之有方無名而求索者皆以理謝之則乘間侵牟之弊日就斂息廨舍一縣具瞻陋不克治事非所以整暇也計材尤工易故而新增葺者十餘楹復起蕭相祠㑭吏曹不自鄙薄以信景慕邵公橋跨清水上歲久墊齧兢於履危乘隙大揵硔臿斧官桞為梁方之舊締既髙而固役不知勞而民免病涉至治道塗取通快堙汙夷峻徒行輦致坦不少阻歲時邵農褁糧自隨周行田里未嘗追呼俾妨時作耕稼蠶績檢括課視切於已私復諭之以勤儉申之以孝悌使遷善而逺罪由是邑里感念昏於作勞生里且滋殖矣下逮鰥寡顛連亦行得所流逋聞之稍稍復業故賦稅輸納不及期而辦詞訟繁囂不俟約而簡君以令行民信教烏可後乃出巳稍崇飾廟學如蓋瓦級磚之破壞者丹堊漶漫之不鮮者一完而奂之復葺黼座陶祭器周繚崈垣外障儀閈春秋釋菜禮容為增肅暇則禮師儒率僚吏暨邑之子弟聽其講説使知所務故三載間庭無留訟牢户為屢空至鄰有疑讞滯而未決者上官倚之丕蔽而縣之治否為可知已君既更耆舊苗仲牛丗麟慕賔羅從玉郭昌祚席安等懷其夙愛有思罔置者來謁文以垂示于後辝再四不克仍覽觀件狀而次第之且寓夫余之所感焉嘗觀兩漢循吏政顓風化子視生民訓牖惠飬如恐不及凛然有三代遺風惟其浹洽於民者深至故所居即化所去見思有起祠樹碑以表夫永載遺賢之意非幸也冝也逮叔丗司牧者昧於治體苟簡貪墨習為當然其可聞者不過曉簿書以為能飾矯偽以干譽其於民之休戚漠然如秦人視越人之肥瘠甚者因之以急張臨之以形勢剝民之肌以膏其身傾民之産以肥其室使民畏之甚豺虎惡之劇冦讎告訐謗讟無所不至以理勢論之亦冝也今劉君以勤強幹敏力矯時弊致績用章著吏民稱道如是可謂能也巳是冝銘銘曰天下之事孰核孰綜政發于上相臣是控事終于下疇致厥用相須成務匪令奚共雖百里間務實煩開有社有民有賦有貢兵之貧難民之疾痛期會簿書風俗獄訟我剖我決我承我奉粵惟良能治之有統千室鳴弦五袴流頌以致朝堂令無太偬庶事日康四方風動增秩賜金璽書褒諷繄尓責望得人為重暨暨劉尹事功自喜挺身頽流卓尓為治不務髙逺不涉苛細相時致冝因利而利瘼自我蠲聲由實致所以懷思去而罔替截鐙願留非愚敢覬胡若稱述垂聲來丗刻石縣門永照鄘衛故太一二代度師先考韓君墓碣銘并序君諱矩字某其先為大梁望族曽祖璹五季時官司諌以銀青榮祿大夫致仕避地北渡遂占藉為衛人祖奕大觀末舉茂才數為縣有聲父渤金𥘉登進士第有文采終獲嘉令君自少以疾不仕資慈祥家故饒財心樂施與凡親舊貧窶里喪有不克襄事者至傾刮囊篋以賙其急或者來謝曰非𥘉心也鄉黨以長者稱天眷間太一始祖真人以神道設教逺邇嚮風受籙為門徒者歲無慮千數君舉族清修信禮為尤至香火之奉雖寒暑風雨不爽厥德巳而君內子閻以嗣事為禱真人篆丹符令吞之且曰汝家積善久當産異人既誕師果有竒表真人目之曰他日輔興吾教者此兒也甫免抱即留養道宫三歲識字七歲善書既長儀觀秀偉慧悟絶人批答辭章捷若影響由清虛師主盟法席二十餘年輔興之言有充而至於極者今追定仙號曰太一二代嗣教重明真人由是而觀韓氏一門之積其來固逺以有是子而論之君之德槩可見矣雖年甫中壽師易韓為蕭至於克荷玄綱光隆教本在韓宗亦為不朽君既殁重明躬葬君於四門里祖塋之次母閻氏祔焉禮也六代度師全祐顧惟傳嗣之重猥及余末于何以圖報維是師真所從出者其潛德幽光表而銘之中心庶獲少安乃以刻文來請師於某祖妣妙清君列叔父行義不可辝遂敘其世次而系之以銘銘曰作善降祥長惡得厲在理必然隨感而至赫赫韓宗德顯河衛衍慶及君滀而􅔿淪俟著而發乃生異人異人伊何太一次祖提挈玄綱鵬騫鳳翥庇及本宗光隆丘土松柏蕭園連岡接武神格仙遊有來容與風駕雲軒同翻共馭純化追逺歸厚來昆泝流尋源以表道根勒銘墓石永賁四門太一三代度師先考王君墓表君姓王氏諱守謙字受益博之堂邑人世以播種為業致資産豐阜田以井而計者九桑以株而會者蓋萬數焉遂為里中巨家然闔門善良薄於世味奉道之心亟若飢渴聞太一教以符籙濟度世厄所在奔是惟恐其後君乃與其配李氏欽挹真風不逺千里為門弟子量家歲費外悉以嬴餘為本宫香火供有子曰志沖即今太一三代度師也師生而歧嶷七歲出就外傅應對進退皆中禮度及毀齒善記誦喜讀老莊等書𥘉君董田務於野午憩蔭下寤寐間若聞呵喝聲見數青衣人導一童子前來且曰天仙過此可少避恍視之無有適師持壷漿來饁君異而不出口自度是兒恐終非田舍中物也及長父兄與議婚不許曰去家入道乃所願也遂禮二代師為黃冠以經明行修得度入道士列既嗣法席遭遇道陵特賜號玄通大師君聞而喜曰天仙之異誠有驗矣且曰平生奉道獲此實報王氏為有後矣享年七十有六考終牖下師以禮葬本縣王莊里祖塋之右母李氏祔焉今度師勑定仙號曰體道虛寂真人其師真之德靈應之迹詳見墓碑兹不復云六代度師全祐嗣教之七年自燕命提點張居祐等以禮幣來謁且致其意曰道家者流雖崇尚玄默而太一教法專以篤人倫翊丗教為本至於聚廬託處似踈而親師弟子之兩間傳度授受實有父子之義焉今三代師真其在宗門表墓有碑嗣法有傳可謂光且顯矣然物之在天壤間未有無本而出者今末有餘榮而本為寂然豈厚人倫輔丗教之理哉敢百拜以表辭為屬幸憲使無拒豫以師之言誠為知所本矣遂諾而作之表故真靖大師衛輝路道教提點張公墓碣銘并序道有綱紀需人而後弘如上承師真下綜法務以公材吏用而開玄佐之功者其錬師張公乎公諱善淵字幾道趙郡平棘人生有異相比長言灑灑有序父溥嘗任衛真縣酒坊使時太一四代祖中和真人提點亳之太清宫溥素挹真風日侍師於几席間沾沾然而喜曰吾兒知所於託遂參禮為門弟子中和人品髙邁道價重一丗與遊者公卿賢士夫一動靜語默皆中倫慮公親炙既久日有所得與之俱化若時雨然歲壬辰河南大兵公與中和隔離者久之既而聞師北渡稅駕於趙乃奔奉焉師欣甚曰奔奏疏附吾宗門有人矣即令知太清觀事丙午夏四月侍中和赴太后幄殿及見亦霑寵眷奏受真定路教門提點仍賜白錦法服命代中和頒錦幡寶香於嵩髙太華二以祈福祐時衛之祖觀兵燼後鞠為草棘中和卑經理不三數年神庭燕處頓還舊觀壬子夏六月從中和北覲嶺邸加號真靖大師改提點衛輝路道教事甲寅歲復奉旨致禮嶽瀆癸丑冬詔天下赴燕長春宫修羅天清醮公奉五代貞常真人會其所以致顯宗教推轂嗣師髙出衆表俾道流公力居多巳未春上南巡臨幸壽宫時公以疾不克朝謁上言念舊近侍存問仍賜御藥葡萄酒服之病良巳故中統二年換受宣詞有云操持堅正祭醮精嚴隨師逺覲於闕庭奉命敬祠於嶽瀆巳加玄號宜煥新章之旨道論為榮焉公資清峭貞幹臨事敏而善斷馭衆肅而有方雖一言話出人意表不肯碌碌混常流中生平喜讀書於老子最有得故行巳接物多掇其微妙至於禱禳醮祭內嚴外辦綽有餘𥙿兩從中和北上沈幾先物往返萬里無不如志嘗奉旨給諸道度牒鶴馭所經例有贐公略無私焉其清介逺大又如此壽七十委蛻於太一順事齋室實至元乙亥正月草五日也越三日陪葬祖塋之次後八年六代祖純一真人念公有力宗門在玄士為傑出有不當泯於後者丐豫文以識墓竁因托其行實而系之以辝銘曰真靖受業始於中和荆璞雖美器成琢磨東􅌡北渡載造玄科用匪其人道將若何公綜玄務辦於益多龍庭再召萬里周旋竹宫咸秩羽服雲闐尊師顯教我力孔宣玄綱張弛曲而全道價軒輊濟之以權塵而下歎其才賢仙遊有限道館驚捐斫石紀行以大斯傳雖髙深弓易位尚知為玄門之玄提點彰德路道教事寂然子霍君道行碣銘并序國朝甲辰乙巳間鹿庵先生教授共城不肖亦忝侍几杖時有為全真學者重玄李練師自相下來買田於卓泉立棲真别館既而重玄北歸委紀綱士霍君明道為之營建不數年創堂殿廊廡煥然一新際泉兩涘盡植巨竹隂蘙數百畒中搆筠溪亭招致吾徒徜徉笑傲其上由是卓泉道院聞於逺邇簉名洞天福地之末雖重玄創始之勤而霍君明道實有力焉師諱志真號寂然子明道其字也系出安陽縣秋口農里大家父諱澤嘗夢一麻衣道士云自天壇來求託宿許焉寤而誕師幼不好弄寡言笑既長性淡泊不樂榮利弱冠辝親學道父憶夙徴即允其請乃詣相之天慶宫禮重玄子為門人全真家禁睡眠謂之消隂魔服勤苦而曰打塵勞以折其強梗驕吝之氣師從事於此者閲三十寒暑略無憚色重玄諗其為受道器命主治玄門事挺志誠礭措畫井井有法及卜築蘇門委之鋪敦教基弘演宗緒俾特逹而有所樹立焉師披荆榛掇瓦礫攻苦食淡擴充師志復闢農畒創水磑廣資生理培植教本致逺邇尊禮學者日衆至於齋廬深靜井竈修潔遊人過客如歸而仰給焉道俗推舉任輝之威儀師滌除玄覽痛自澄治務正已以格物有辨訟者率用理遣不知官府為何事羽流敬安一方凝重至二十載之久年踰耳順相吏民宿仰道價請主天慶宫既至受提點彰德路道教事凡十有三祀年尊德重不俟言論而衆自化服以某年月日沐浴易衣冠無疾而逝夀八十有一葬安陽縣王𥙿里重玄仙冢之側師半度清逸若山澤之曜外朴而內敏質直而尚義簡重自居處事得時措之冝和同光塵接物無徇俗之弊其訓導徒輩言約理到以身為律度可謂純乎其純玄之又玄者也門人杜志用夙承提誨圗報無方琢石紀銘期傳不朽乃介太一純一真人李公來屬筆豫既重李請又與師有夙宿之雅既敘其行巳而系之以辝銘曰道之大原玄文五千誕誇索隱匪其正傳質稟貞素心地善淵惟卑也全內思靜􅌹耕田鑿井順乎丗緣修已求志繕吾性天無欲觀妙是為道之自然尚無往而不可孰間朝市之與林泉若人者雖乘化而委蛻安知其精純之氣不乘冷風而仙耶門人攀慕白雲翩蹮勒銘松臺何千百年凝寂大師衛輝路道教都提點張公墓碣銘并序師諱居祐字天錫丗為汲郡人父道用居樂善東北坊以茗飲為業師早失怙恃兄居仁訓育有方甫長願立如成人然向慕玄風亟若飢渴思得大宗師依歸以果其腹歲壬辰天兵下河南時太一四代度師自柘城北渡應大將撒吉思請主新衛昭順聖后祠居仁舉家崇奉遂命師為門弟子居無幾何度師北遷住趙之太清宫以師童侍有年謹敬不怠念焉遂度為道士俄命掌觀之廪料出納詳明儉而中禮曽無撮籥之誤度師稱其能時衛之祖觀兵後燬廢掃地度師遣提點張善淵詣衛興復且請師以佐葺理允焉師為戮力從事小大之役率以身先之既而張侍鶴馭北覲營建事師獨任之不十稔壇殿齊室下暨庖湢庫廄井井一新巳酉春中和真人還衛顧視喜其得人已酉冬中和升寂師辦易葬事焦勞為多丁巳冬以事召赴行殿勞歸霑衣幣有加還貞常真人以師貞幹有節命知宫事繼升充提舉中統三年上遣使植碑夀宮師復趣辦不踰其素於國光有華至元十九年六代純一真人嗣主法席以師道行純粹勤恪有功言於朝宣授凝寂大師衛輝路道教都提點七年間道流推服教門增重焉草六年二月五日得寒疾再宿談笑而逝及斂豫臨視靣如生吁亦異哉享年七十有二越七日提點范全定等葬師於四門里祖塋之側禮也師為人樂易無機械苟有過須問之人而無憚於改不然咽若有物所梗其歷事三師前後五十餘載護道服勤始卒德不爽純一真人以豫鄉曲故持狀來謁銘因憶十九年冬豫寓大都道宫適師與會宵永無寐龕燈爐火尊爼談舊嘗及萬靈坑事悲丗故之無常悼逝者之如是凄然動華表歸語之感故師每歲例清明后一日丐斂酒肴楮幣等物斗量車載展祭冢次以慰鄉梓冥漠之魂恐其心之不盡也其於存殁兩間亦追逺歸厚之意也歟是可銘銘曰太一設教幽顯兩通凡曰云為須人乃崇猗歟張公德度沖融致身福地逢教之隆敦兮若朴發之天衷寂不俗絶勞而有功師事三葉罔異𥘉終一朝委蛻為報何豐祖埌之東萬柏蔥籠陪葬其側若堂有封鑱銘表石永示無窮故卓行劉先生墓表先生諱德淵字道濟襄國中丘人性癖直有操守好學能自刻厲及遊滹南王先生門思索辨惑等説自是饜飫史學為專門之業古心古貌非禮義不妄言動一芥不取於人朋友死雖千里逺徒步必至覩前賢竒迹偉行擊莭嘆賞而不能自已至椎耕牛以饗竇王殺乘馬而祭昭烈其或憫時之艱急人之難切於巳私而不置也始則人大以為異既而疑焉終乃嘆服曰先生篤行直躬守死善道者也北渡後赴戊戍試魁河北西路逮中統建元三府辟其行能授翰林待制晚莭知圎鑿方枘不能與時􆅃匼乃以所得成就學者立言傳後著三為書數萬言其説為天地立極為生民立本為聖賢立法敷析溫公通鑑數百條技翊章武俾承正統及見考亭綱目書多所吻合沾沾而喜曰吾天地間可謂不孤矣又通古文竒字士多傳習之凡經指授者雖節目磊砢表表有所立或惜其獨善不顯諸用然振衰善俗激厲後人多矣太保劉公左轄張公以鄉曲義來周恤皆却之曰吾非踽踽涼涼閹然媚於丗者也至有以禮願交而弗之允者許魯齋每道邢必式閭致恭而去壬子秋不肖始覿先生於胙對榻學館夜參半歘起撼豫曰吾於漢丞相亮論議際有所得惜不並時當有説云云至元壬午豫按部夷儀謁先生於天貺齋棲遲蓬蓽心融一天自樂其樂英發之氣至老不裴先生近何述曰適作四凶辨天府七星挽章于以張皇幽眇振濯漢靈一何壯也臨訣握豫手曰吾耄矣斯文未喪子其自將行有以卑之既而聞卧疾慮乏調養詢諸友生始知先生有子朴早丗女孫一適康氏子新婦女孫皆不聽侍疾卒年七秩有八時至元丙戌九月草二日也葬蓬山之西丘後十五年晚進王寧合鄉國議來請曰先生學貫三才養素丘園行嫓於古人望髙乎一丗沒當易名用垂光範豫謂寧曰士風之不振也久矣道義之斫喪也微矣安得髙風苦節如先生者哉昔孟東野以詩鳴唐張藉私諡曰貞曜程伯淳以道自任潞公揭之曰明道今扳二例如以卓行加之則名與行為顯允矣門生民部尚書戎益將礲石表墓以圗不朽大德三年龍集已亥仲冬吉日翰林學士中奉大夫知制誥同修國史秋澗王惲為之表秋澗先生大全文集卷第六十一
