body:
  text: 絳州曲沃縣新修宣聖廟碑曲沃縣學舊矣始完於宋嘉祐𥘉盛於金㤗和閤貞祐之兵蕩焉無餘前政苟訿𥘉不遑䘏園𬞞興感薪刈其下者幾五十祀逮至元己已邑尹石秣公慨然以圗復爲事工垂􅌟而去尹侯簿賈天衢相與頋歎曰蕭武弁能是烏可不卒其羙然澤宫故地庳陋湫隘不足奠安神觀聳邦民瞻相治城西北陬勢夷且爽遂増崇前規而敞其禮殿焉既落成董事者許良等感蕭君經始之勤今政賛終之善來謁文將刻石廟庭俾簉名於孫曺諸賢之列用垂示來哲竊不自揆敢以聖道之隆汚廟學之本末互陳而歷告之三代之丗家有墪黨有庠術有序國有學以師以令肄俊造其中時書歳考小大有成然後賔而興之其典則六德六行其藝則禮樂射御書數然不可不知其所自故守學釋菜奠幣於先聖先師示不忘本也彼朝夕見聞無非智仁聖義忠和孝友睦婣任䘏之方凡邪說詖行放蕩僻異之術非可輔丗教明人倫者率屏絶不容髮其間故三代道出一致有學而無廟周衰王者迹熄生民不𬒳庠序之教天理茫昧心䘮厥守異端百家之說乗隙並騖不無厖雜壅底之蔽此太史公讀功令未甞不廢書而嘆也及漢興學館林如鴻儒継作師傳業受學古蒞官守其說而不易故謀王軆断國論一以經旨爲據于時公卿大夫士吏文學氣節雲蒸霧散彬彬然幾三代之風何其盛哉此無佗聖道明而百家自息也逮魏晉隋唐以來慕髙尚者以虚無爲宗干利禄者以科舉爲業其視窮理正心修己治人之道懵不知爲何事時則三物之教弗明于上先王之澤不及乎下單爲廟祀尊孔氏而王之三代教育之實泯泯掃地矣所謂有廟而無學間有卓越特逹之士出芟夷浮學羽翼聖道爲任然莫能極起其弊而全濟其溺者何哉盖道之隆汚學之盛衰一繫夫王政好尚而爲之有無也嗚呼三代吾不得而見之得見兩漢斯可矣今國家昭至德建民極勸學敦農崇化厲賢凡可以風四方而開太平之基者靡不興舉故經明行修之士徃徃賔興天府擢位卿相以心正意誠國治天下平之道巳甞佐天子而理百官矣士之不志於古則巳苟志於古舎斯時之易將何所求所待焉曲沃自昔以劇稱土腴物阜爲終諸縣甲俗剛僉力穡尚氣義憂深思逺奄焉有唐晉餘烈尤不可後者教也本既立矣道由生矣師帥者能仰體上之所嚮以明倫實教作新士民耳目俾知所以學異時人材輩出斌斌然追两漢之風孰謂不張本於斯邪不然釣来華名爲餼牽告朔之所吾不知其可也銘曰維晉曲沃以劇称絳山左戒汾右傾山川開闔氣上蒸風俗勤儉餘剛稜邑居萬家業有恒既冨而教廼丗程嗚呼庠序教所生石君作尹追良能奉宣德化根以誡清廟起廢功勃興心計百至經載營惜哉垂搆任遽更後人継之卒有成方華古礎排巨楹文禳藻棟浮雲縈相前增崇尤克承教基鋪敦道日弘春風隠耳絃歌聲始謀賛終匪自矜吏民懷感思以銘我詩刻石碑廟庭平陽府臨汾縣重修后土廟碑平陽府治之西有郷曰晉源帶汾河表姑射林墟􅌨比泉流交貫無寸壤閑曠山霏夕景杳藹如畫故河東称膏腴勝㮣之地于斯爲最風俗率勤儉盡地利属旄纛儀衛之數金碧絢爛森布左右莫不畢備遊人過客載瞻載儀溪山草木亦爲動色凢費泉幣僅萬疋既落成某人等以禮幣求文於予將以幽賛神明紀夫廟貌興衰之自謹按汾隂后土祠乃魏鄈丘之制其典秩華縟肇於漢武元鼎行幸之𥘉千載而下令人歌秋風之辝詠汾隂之曲想夫泛樓舡濟汾河干乗萬騎威靈震赫回旌跓蹕躬祀睢土祈糓報功於是乎在故歴代因仍以爲聲明盛事矌古當然之典是則崇奉者國家之事非齊民所得擬也以理䆒之神睢者即有國之大社而社者自天子至於郷遂皆得置而通祀苐禮文制節有隆殺之異尓况土爲神廣大博厚無所徃而不在又汾隂在晉爲属邑以兹爲離宫異館神游羙報之所其誰曰不然嗚呼三代巳降教化衰而禮樂廢禮樂廢而祀典亡林林緫緫之民物則既戕心惑所嚮有射利徼福而巳故祀非其類僥倖於萬一者胡可勝數今兾方之民獨能敦本返始奉所當祀俾歴丗相承之俗敬恭誠㓗永永是尊以荅髙廪無疆之休較夫滛祀野祭者可謂知所嚮矣乃爲作送迎神辭春祈秋報歌以祀云其辭曰汾流兮容與林葩兮綉組𬒳汾兮一曲坎坎兮擊皷薦瓊芳奠桂醑俟神來欣樂胥芳菲葬兮滿堂偃金枝兮翠羽報神德兮德何溥右迎神淡林扄兮山煙乗回風兮雲軿神欲旋兮何邁奄上征兮朝元衆紛舞兮羅拜欲神留兮無言望極浦兮渺渺愁予目兮姢姢神篤我祐兮歳有季右送神解州聞喜縣重修廟學碑銘堯舜用道以治天下孔子任道以垂萬丗其所以明倫建極論政造士迩說逺懷者不外夫術有序國有學而巳後之君人者思欲化隆唐虞坐収牖易之道舎夫子之教將安法歟我國家尊師重道明德新民風動海寓爰自京師逹於郡邑郷遂率建教官勉士以德趨民於學其比隆致治之意固云極矣而承宣鼓舞寔守令之軄是則道生之本教始之基其可後而聞喜在秦曰左邑桐郷逮漢元鼎間始昜仐名其爲縣􅒓董澤奠鳴條雄盤逺帶風土夷沃通晉走蒲古爲咽㑹名卿碩德代不乏人顧山川之氣鍾靈萃秀必自人文德化薫陶涵浸者爾縣廟學舊矣枕城之艮隅地勢穹霳如神龜負圖背露渊水蒼官薈欎環列庭戺秋煙古色望之儼然皆數百年物也按廟碑由宋迄金宰是邑者增崇非一故制度宏麗甲於諸縣遷革巳来神棲碑屋幸脫煨燼然歳年綿邈人迹罕至浸滛于壤藂草棘而宅狐狸蓋有年于兹至元已巳從仕郎張君來尹是縣首以營治爲任既而監縣事脫台簿司天禄佐史劉瑞争出廪料資所費而濟厥媺如榱棟桷櫨之傾腐者瓴甋階陛之缺裂者舉昜而新之復起講肄之堂齋廬之位至於神門庖庫畦圃游息之所莫不畢備用十年春二月釋菜禮告成厥功百年偉觀頓還于舊粤明年春史劉瑞介汾西前尹王延年持温國文正公學記踵門而請曰不腆敝邑猥致力於郷校功甫僝而尹適去烏可俾上官之譱藐焉無聞於後以軄以分瑞也寔任其責擬掲諸麗石以告來哲不肖素陋於文以懇請堅切辝不能巳敢勉為書之又竊喜幸得列名於司馬公之下風固所願也尹晉州臨汾人諱仲祥資明良果於從政故其為善卓卓有成也如是較夫從事於簿書期㑹之末者不曰有志於本知教之所基者歟誠可歌也巳其辝曰維漢聞喜古桐郷東浸董澤南條崗千年喬木炑煙蒼廟宫盤盤枕艮方平時絃誦溢雨庠代不乏賢古明良如儉顯魏度相唐風雲感㑹龍虎驤至今德業何昭彰神居雖存地土荒蒿萊没人狐兎蔵風雨穿漏摧棟梁張君下車心慨傷首以營治如弗遑同寮見義為賛㐮咨嗟吾道百孔瘡頓還舊觀蔚有光齋廬有室講有堂我南走蒲過此邦親覩盛事思彷徨吾儒有例善則掦作詩豈惟示不忘士民嚮化此本張嗚呼廟碑古甘棠衛州胙城縣靈虚觀碑胙之為邑乆矣昔周以黃帝後姞姓封此是為燕國至秦廢燕為胙貞祐𥘉金駕南遷竟河為界建師府宿重兵繫浮梁院爲汴京北門歳壬辰金人撤守天兵徇取之明年京城大饑人相食出逃死北渡者日不下千數既抵河津人利其財賄率不時濟莩死風雪間及巳濟而沉溺者亦無慮千百數時全真教大行所在翕然從風雖虎苛狼戾性於嗜殺之徒率授法號名㑹首者皆是也師時在衛目其事愀然歎曰人彂殺機一至於此邪吾拏舟而來正爲此尓兹焉不化安徃而施其道哉遂稅駕河上起觀距城之北墉曰將以此道埸爲設教張本之自於是仁風一扇比屋回心貪殘狼戾化而柔良津人跋俗悔禍徼福於門者肩相摩而踵相接矣㓙熖燎原撲殺心於已熾慈航登岸夷天險爲坥途由是而觀非好生大德洽於人心者其能若是哉師一日晨起集大衆謂曰吾學道有年所得而爲心印者一與虚而巳昔之得一者天以之而清地以之而寜神以之而靈又云致虚極守静篤萬物並作吾以觀其復惟其虚則能靈靈則自虚矣且天地虚而彂亭毒之妙日月虚而盪照臨之光山岳虚而蒸雲雷之変谷神虚而通天地之根致虚而要其極不過煉精守寂滌除玄覽耳故得心善渊居善地因題其額曰靈虚二三子其敬奉吾教且曰大德不德今業漿之家十饋其八九吾不可乆於此明日遂行自是風聲教習大𬒳於河朔矣師諱仲羙秦原月山人年三十弃妻子入道師浮山碧虚子遂盡得真傳深入性窟故爲大宗主推德分掌玄教於終南祖庭者逾三紀焉生平以濟物爲本事具重陽宫碑兹不復云歳丙午詔大醮燕京師預焉旣受釐特加師玄微真人號且膺宝冠霞帔之寵丗以酒李先生行云甲寅夏六月羽化於燕之長春宫及西帰門人啓柩顔色如生冬十有一月扶護至衛門徒王志安等以纕經成禮醮祭之夕朔風震屋將濟河即止吁亦異哉后十有二年志安等圗爲不朽用光昭師德遂以禮幣來謁曰先師教之所及師之所在也然過化存神興修道宇之自無文以詔來者責其誰帰吾子属列太史郷枌盛事幸爲我論道之敢再拜以請僕儒家者流道不同不相爲謀獨嘉其尊師重教推源知本其篤信有如此者故略爲序說云全真爲教始以脩身絶俗逺引髙蹈冥㓕山林如標枝野鹿漠然不與丗接此其本也終之混跡人間蝉蛻泥滓以兼愛濟物爲日用之妙其混沌民之風邪不然天命之性有物有則彛倫一叙終不得而蔽之邪如長春丘公在先朝時皇帝清問首以治囯保民爲本其利亦云博矣今觀玄微李公處身行已若昜地則皆然爾於是乎書且爲門人作詩追逺仙遊以極遐想之意渺渺帝郷乗白雲而何在依依玄鶴抱黄石以空悲其辝曰道之大原出於天柱史首探玄中玄後人依假土苴傳刺口論說書百千祈禳服食金鼎鈆楼居紫青致蓬仙全真獨扶龜王筌只以方寸爲福田七子大鑿䟽河源龍章鳯質炳後先風聲波動東海堧李公躍出秦月山天禀至性虚靖專一物不獲廼我愆黄流洶洶飜鯨鱣貪噬一丗垂飢涎汴人脫死乗膠舡葬之尓腹誠可冤先生有道光日躔手拂醉䄂敗履穿䲔牙笑拔鬚爲編濁波吹破爲澄渊遺黎此渡頼以全功成不居丗愈賢超出物表冥鴻翩千年喬木􅓹紫煙以靈掲宫含至言頭頭具道道眼圎伐柯睨柯開蒙顓門人奉行周且旋如入鄭圃居漆園至今遺照無徼邊皎焉靈臺霜月懸黃鶴一去不復還終南太華空巍然山中瑶草春芊芊何時真遊來羽軒赤霄望入崑崙巔我詩刻石不可諼用作華表歸來篇緫管陳公去思碑銘至元三年朝廷以衛之六城爲先大王分邑許就設監郡敞府治跨有鄘弼復爲河朔一路是年夏四月河南尹陳公承命分虎來莅此邦先是衛併于懷前守之良法羙政班班具在然連率逺控者盳洋而末之悉子弟資授者侵欲而無所顧不朞年法防紐弛群小氣横民遂殿屎公知其然思有以拊循振濯扶剔姦蠹一新厥民既視事乃緩其急張不爲小惠持以大軆從冝處約率以身先之及前規當法者仍遵而勿失於是案簿棼者井之而有綱公吏嚻者肅之而趍事教條既周小大得職時自春及夏暵不雨秋種未覆公曰龍見而雩其可後乎乃齋居禱蒼山祠下車甫還甘澍需作闔境霑足秋乃大熟既而監郡公聿來視師爲人祥靖明惠樂於爲善一見公歡然如平生其承宣注措云爲之意吻與公合此倡彼和如響之應聲及其倅王君文榦簡重諧譲以之賛副㑹歸政成化洽而巳用是德風草偃翕然称治𥘉共之西營幕習不法侵漁無時民苦之公以理將命遂折其湏牙來就約束又以毒民莫盗賊若乃下令属邑曰今而後若輩一汚記藉者以類别如農者畎畒啇者市歸俾督之營務以恒厥心時視其勤墮懲勸之果終其任悉悛革不二爲致狴犴屢空時熈春撤木萬計當浮御以東陸輦之勞汴衛兩集其事公曰汴大衛小役與之埒民將不堪力請於上竟以汴輸之河漘且遣軍士三百整桴而下我止壅遏水勢而已無幾治甲令下頗亟官易牛革鄰道例配科民間以辦農至解耕牛以屠猶有不堪其輸者公曰不可遂一易於市既而衆相率來謝曰脫東鄰之禍者繄明府是頼於是田里盡樂安之農暮夜有不扄之户矣殷太師比干墓在部内祭秩乆替公請于朝遂載諸祀典時秋陽載驕繹享之夕大雨越明年二麦倍常嘻亦異哉及再朞政平訟理民安吏法一日謂監郡公曰夫政以風俗爲先俗以教化爲本今國家文治煟興百廢具舉牧養元元曰就富庶教所未至寔我之責矧衛古稱多士今者春秋釋菜享獻無所上無以副朝廷右文之意下何以啓吾民嚮善之心遂大起孔子廟内外具瞻克壯於昔諸生執經咸得依仰既落成有芝産殿梁連莖秀曄童童盖如僉謂邦君誠敬所致由是而觀其於事神治人亦以至矣公尤辦於先事有方臨機應変用儒飾吏聽訟以情理明氣温推見至隱卒齊之以禮不知缿筩桁楊為何物故冤者抑者毎有所伸彊者暴者日安馴服至相戒曰陳公明良不容姦欺吾不可以過聞由是人興禮譲風化大行蔚照爲諸道帥朝廷嘉其能擢克山東東西道提刑按察使既趣装吏民祖送塡郛溢郭炷香而頂構綵而門徒竊垂洟感囙伸願借之心至有攀輪遮道不忍使去者既乃衛民懷思不忘求文於余予以郷國盛事敢勉爲論譔之愚竊觀兩漢之名臣如黃頴川劉東海之爲郡而能績用章章者皆由明允篤誠遂懿厥德故所居民愛所去見思况公自明而誠勤強練宻以道自信所謂推忠及物衆瘼自蠲懷我風愛永載遺賢者也且爲吏民作詩庶幾紹甘棠之遺音以永衛人無窮之思公諱祐字慶甫丗爲趙之寕晉人其詩曰維古作牧紛治偁兩漢具載循與能趙張固猛德不勝捄時沸炎多創懲漢家三尺丗有程下昧所守徇厥情一得千失例不經陳公爲邦大厥称三年撫字猶鮮烹頑則伊教孰汝刑執中以權適重輕吏畏民愛政廼平㑹歸其極誠與明吁嗟七月政報成載其清浄民敉寕里門夜啓深春耕雨暘時若歳屢登何以教之庠序興春風弦歌衛六城槐隂幄張掩訟㕔圜扉無人秋草生髙軒北來障緹屛翩翩振鷺朝天庭郡民祖帳􅌭斾旌昔何來暮今遽更漢民借㓂䝉允務我則不獲心乃㷀使君雖逺德曰馨彼風僾兮我佩銘願公壽福川方増坐之廟朝調鼎羮流惠載使邑里清我詩刻石亮有徴千載擬嫓甘棠聲平陽府剏建靈應真君廟碑玄黃判天地闢鰲足断四極立而隂陽五行之精上為經星恒宿環拱經緯幹化機而成歳功真武盖北極之鎮宿也端處玄宫爀睨四部在昔王者圗形旟旐以肅擁衛之儀道家取制爰設神像蓬勃其黒靈焉若夫振緑髪提干將履玄冥綰元氣也𬒳玄衣衷属甲戴雲旂耀武德也靈虺穹龜踴躍前導取形似而從隂類也復役丁甲六神撝指隂兵備將佐也廟而貌之于以填方域祓不祥而來福祐故在在奉祀以謂天神之尊極者焉我國家運開龍朔帝發其祥京都之建神恃顯化焉遂先啓應宫用彰靈貺矧齊民敢後其夤奉哉冀都真君壇其來乆矣先時府莊岳間有閣巍然山峙設四聖像於其上神奠其北户焉两廂豪右貿易彩幣市集宇下春秋奉香火甚恪里俗種祠用為故事厥後傑觀雖火禋嚴之礼蔵於人心者耿耿固在歳丁亥故老董威霍斌等頋相諗曰吾儕事神之心既不以閣之興替為有無然俾神明棲格無所謂掲䖍妥靈可乎於是與趙常柴邢凡七族共輸私財得地於平陽里起正殿神門社賔之位庖湢之所凡十有三楹莫不攸當神儀法從光怪絢爛飈馳雲擁陟降自空内外具瞻光動里陌後十年丙子里社程政等以前人興建本末不可使無聞於後且恐歳月緜邈祀典湮微乃介叅軍陀滿君用來謁文於予將掲諸麗石以告來者且知廟之所自予官晉四載間稔其風聲氣習思深而好禮尚儉而隆義奄焉有陶唐遺化故幽明兩間各盡所事若東里之曹相國西郛之霍博陸南遂之帝堯祠是皆敬其人神有德於民也是祠之建前倡後継不憚服賈之勤歴年之乆臻其成就若爾可謂冨而好礼敬恭神明罔墜休聲者哉至於施與厚薄之差時饗周行之次具列石背又見隆義嚮化所恱者衆云仍繫樂歌用伸幽賛其辝曰列象蒼蒼周天緯經玄枵之次虚危之精羽林北落凛焉神兵奠我邦家衛群生兮奕奕新宫士民之功逺彼囂閧極夫尊崇神庭肅敞景氣葱䏊風馬雲車歳時來同兮神維來降冷飈先颺應鼓田田悲簫洞盪紛進拜祼秬鬯將將洋洋如在上有物蜿蜓來盻蠁芳芬滿堂神人暢兮神鑒孔明我民之誠旍麾下拂風雨攸寕攘除祅災大來庶禎介我繁祉時和歳登種祠罔替継継承承永垂其休聲兮重修孤竹二賢廟碑首陽山孤竹二賢祠肇見於李唐增隆於前宋金貞祐末爲戍兵撤而槱之國𥘉郡人徐帥因廢基而屋焉後四十載當至元九年玄􅘬歳某自御史裏行來官河東以是年冬十有一月按部至於蒲坂適致祭令下遂齋沐奉祝祗拜墟墓庭序藂翳路寢傾圯遺像䵝昧陊剥就㓕於戯前政之不舉至於斯邪非惟不稱明詔尊顕風烈之義而大懼不職下隕教條吏隳不恭悪可徇狃於是䄄㑹属吏作新是圖資聚既營衆工趍事仍命府掾長呉舉董治厥役改新肖像以儼神儀逮明年夏五月復行縣次蒲吏告訖功用六月丁亥躬率僚属以少牢之奠敬妥神棲帶河表華新宫敞然山煙庭木奕奕動色守吏不任之責庶乎其少塞矣知府楊居寛請書其事于石以詔來者噫二賢聖之清者也其出處大節求仁本心興懦厲貪之操息邪懼亂之功孔孟称之詳矣掲若日月亘終古而不熄小子其敢凝諸然讀黃太史所述去國諌伐盖宗國有不說好事者爲之說耳竊有所疑焉若曰非譲而逃國人悪而逐之烏在其爲賢也且以避紂不有其位孔子何爲称求仁得仁子貢何以審夫子不爲衛君乎至於義抗白旄恥食周粟亦謂事不經見臧哀伯何獨称武王克啇義士猶或非之不然二賢者比自海濵聞善養來歸當周命惟新明義崇德之丗不知俯仰何所愧怍僵踣於兹山之下乎故特表而出之必有能辨之者仍爲蒲人作迎享神辝俾歳時歌以祀焉辝曰瓊蘼㓗兮蘭馨錯薇𬞞兮薦神庭條之山兮河之水廽風瀟瀟兮波瀰瀰神之逺遊兮邇何歸南呌虞舜兮帝禹與追以暴昜暴兮吾知其非國極所欽兮祀典載熈槃非周粒兮桂酒芬菲民之載神兮清風庶幾偃廽斾兮入室陳鐘鼔兮載考載撃千秋兮萬歳於焉兮永息故普濟大師劉公道行碑銘有序晉州景行里有觀曰玄應其徒謝志堅梁志端介寓館主謝純踵門來謁而告予曰先師純熈子化形巳乆今雖像而事之其平昔道術及於人者班班可紀然非文諸貞珉無以示來者而傳不朽明府甞列官太史六家之旨所冝論述也敢百拜以請謹按所持狀師諱志真字子常族劉氏陜之三堂人㓜沉潜不好弄及長趍尚冲曠嗜黃老書遂棄家入道既而㝷師來晉止舄玄都宫與方士韓仙翁遇傳宝珠照法覺靈府戃怳日有啓悟歳已亥披雲宋公首暢真風力紹絶學起道蔵書於河汾間師幡然喜曰此人天師也吾歸依有所即執弟子禮事之受紫虚籙訣香火修持晨夜不少懈宋偉其志後以上清三洞五雷籙法畀焉師操履益精勵神經怪牒大賾冥奥氣志既凝洞知來物簮𥚑所加法力所至疾痛呻吟隨失所在中外喧播以靈異稱今聖上邸潜時聞其名遺便召至試以籙法叄驗諸事逺邇幽深靈應昭着時既雨且風勢幾恒若命師以誠祈止少頃豐霳囬馭蜚廉爲不颺矣上異之賜御醪仙氅加號普濟大師特光寵焉留館堂下以需時召自是道價隆隆風動一時矣中統庚申冬詔就長春官設羅天清醮師攝行大禮凡七旦夜神人和暢且有天光現朗之異上聞之喜甚咸謂師精誠所致明年秋奉㫖馳乗祝香岳瀆事已還過故隠語志堅等曰吾雅性僻逸恬於丗味偶以兼術供奉闕庭㤙遇優渥巳踰素分物微近盛吾道家所忌遂謝使者而輟裝焉後復來徴竟辝疾不起以至元年夏五月終所居丈室壽六十有六師丰儀秀整面滿月紫髯垂脰翛然有獨立出塵之趣接物不以貴賤易其礼度人之有疾若已受之推誠濟物雄恐不力時人以此多之予甞以道家者流以清寂爲宗一死生外形骸自放於萬物之表是不以一毫丗故攖拂其心至於挾方術出秘藝捄時行道者丗有其人如砭劑膏育笞逐鬼物驅役社翁安人區而逺不祥徃徃驗於事者盖丗所不廢也普濟師其斯人之徒歟較夫遺丗絶俗歸㓗一身自放於萬物之表誠法教中有禆於丗者耳旦以費長房薊訓子事猶傳於東京方伎之列况師之行業出處又足嘉尚吾烏得而辝哉仍繫之銘詩庶幾門人歸來望思之意其辝曰大河湯湯南紀蒼蒼两戒勢分爰自陜疆蓄潤蟠精萃於三堂篤生異人孕氣之良截然入道濟物爲方山立髯張劒佩煒煌霆轟暗室星壇夜光玉鈴金紐呵斥不祥隱若勍敵隂魔遁降四十年間玄門之綱鶴馭仙去白雲帝鄉何謝丗兮已逺頋其道而弥光嗚呼劉根術驗而不及物長房及物而鬼所殃我銘勒石孰爲短長庶千年而語華表見門人之涕滂秋澗先生大全文集卷第五十三
