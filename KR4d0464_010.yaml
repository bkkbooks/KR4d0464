  text: 秋澗先生大全文集卷第十
  hash: sha256:79efd0ab250d0109788c634df1c22220158c6857806ad718fd0f6fb82823fe28
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_010-1a}
body:
  text: 七言古詩華不注歌齊州山水天下無濼源之峻華峰孤秦鞭有力驅不去天遣一柱標齊墟𥘉疑太素女媧氏𥙷天断手兹遺餘又如翠鳯翥郊藪來應丗瑞開昌圖南山連絡雖可愛未免阿拊相承趍孤撑直上夾右碣猛視又似天門貙慶封齊豹兩元惡哆嚙猶露雄牙須不然齊太史冤血凝碧老不渝化成直筆揷天外堂堂使表春秋誅乾坤乃有此雄跨未許鵲藥争頭顱江山勝槩儘軒豁逺客吟眺增躊躇李白上天不可呼雲煙變化何須臾後人摹冩覷天巧百匝空遶青芙蕖文章李杜光𦦨在有詩無詩將何如我思齊晉迭雄長山靈枉𬒳兵埃汚桓公九合猶覇事三周其下真誇䛕㑹須扶䇿凌絶項望入蒼梧呌帝虞趵突泉歌沇流峻發王屋顛世以獨逹神其源不知悍駃勢所激玉虹那待馮夷鞭洑流渇馬穿歴背海眼洞徹開龍淵嘗聞棄糠黒湾復此出明見下與地脉相勾連雲魚吹浪雪濤湧鱗屋撃皷春雷翻我𥘉來觀冬十月隂火下煑湯池煙洪𪷟元氣東山作蒼江屈注倒景懸少陵撫掌嘆竒絶未若王塔突起掀睛瀾天機幻出此怪供欲洒飛雨清塵寰當年小白㑹水上春秋見書名不刋咄哉齊晉两蠻觸千古事徃風雲閑漢家包海歸一統覇氣何有諸侯壇清泠無復歃血汗觱沸不洗陳恒姦我讀太史書風聲氣習隨山川齊人闊逹多匿智政恐功利爲當然安得此泉盡變作醇酎一醉浩浩還吾天東坡海南醉歸圖元祐諸人等圭壁司馬之相國柱石仆碑錮黨無不至棄若泥沙𥘉不惜當時何有雪堂翁一斥南荒無復比那知兹遊竒絶神所相海水天容清一色鐡杖横秋瘴霧空新詩落筆魚龍泣楓香樹髙溪雨濛醉挽黄衫两頰紅多隨父老燕同社或喜契順來相從一朝竟作遷客没造物未見哀龍鍾豈其中州淑氣到尔恐終絶故令着此眉山公故令着此眉山公河冰篇庚申前三年予以事赴汴次中灤值雪者三日時大河走凌因卧舡蓬間聽河冰柆船而下其聲瑟瑟可愛嘗欲一詩執筆輙罷今日率尔得此殊適然也時至元廿二年秋七月廿一日也大河凝寒氷走片岸深争逐盤渦轉沙頭卧艑凍欲僵細戞舡舷聲自顫幽人蓬底聞河清錚錚劒佩相磨鳴鳴如竹軒瀟洒帋半罅醉枕夢破風泠冷錢塘水樂世所愛求音寂寞將誰聽安得湘妃皷瑶瑟波間細冩宫商聲朝來賦就河冰篇胷中餘韻猶翛然浮聲切嚮何足異記我深津待渡年短歌行政彦村作君自分携今一紀疇昔四更來夢裏金鞍相值癭陶南君亦逺囬還故里酡顔喜意見眉間欲叙寒暄先称椅君諱也相隨行過縣𪠘西指説民居昔何羙邀臨甲第予力辤亦為前征趣行李夢中不悟死生分别后寄聲無棄鄙探囊傾下粔敉香送余不到河之梁嘱余南去路亦逺持此贈君爲褁粮怳然形開無所見落月照屋空微茫瀟瀟春草宫墻緑暮雨梨花寒食曲樽前浩唱意何長轉首先輸光景促我思夢境再目開君侯施施胡爲來賦詩非欲徴後事今世死别眞堪哀因見故人雖逺猶在當時懐荒鷄行乙酉九月四日苑簷月落霜稜稜夜半起聽荒雞聲不知首唱自何處喔喔滿城争亂鳴尔縁氣類司早晏乃今失職能無驚淒風吹空星斗黒漫漫長夜何時明萬事紛紜毎如此不煩劒舞蹴琨興龍在田詩我夢長橋秋水落俯瞰澄淵見蛟鰐絳綃百尺卧彩虹足尾鱗蒼閃煙壑我因投石起幽潜不待雷轟随奮躍神光照野驚在田􅋮首徐行軒觺角野人奔看若雲從洶洶呼聲􅏒寥廓余方闖視女墻間走欲攀鱗不知却超危如坦略無難􅗄墮嵓梯扣丹閣寳香佛界幾龍龕萬拱千梁金碧錯怳然夢覺聽夜漏四皷將䦨五更作因車夢蓋此何因無乃吉徵先我覺龍爲乾陽主善幻旣見禾田德施博乗髙臨下近清光雖險當前無所遏行穿嵓閣得金界動止其間為善樂援毫億度兼記時仲冬辛卯之夕歲在噩讀五代史記作古樂府五首楊柳枝辭唐昭宗天復三年梁王温辭歸鎮留宴壽春殿又餞於延喜樓上臨軒泣别因賜楊柳枝辭今亡乃爲𥙷作楊柳枝風吹何裊裊暖煙如織緑絲柔延喜樓前春色好臨軒奏曲送行頻梁王重有回天勲一忠之外何復云安得髙祖太宗之業如柳新檀來歌汎樓舡下淮浦百萬豼貅歌且舞不殺降不掠虜吾君吊伐眞湯武爾檀來不欺汝皡皥芏風樂吾土椒蘭怨昭皇迫東迁望絶忠臣援堂堂鴈門兵秪足速禍變帝酣長星杯醉魄迷椒殿神龍失水机上肉惡梟啄門夜漏半龍興赤霧天爲紅一竁三百皆皇宗唐家大業至此盡自古亡國未有若此之哀恫梁王歸罪將誰紿奴軰雖誅天有在金祥殿空殺氣髙賤珪白刃專相待汜水行王季權在兵逆順係財賄同光當宁能幾朝牝雞司晨傾内外添都買宴物山積盡入掖庭充内費君王政荒優䆠狎將相無辜恣誅殺蜀資百萬賊所徼縱有其能供近渴一夫夜呼汜水東絳霄樓頭兵反攻雍陵竟墮所好死英武杳逐仙音空先皇有識如相問三矢雖還未克終劉山人歌劉山人黃鬚糢糊衣䄂樓蓍囊藥笈手自携親詣宫門來省女將軍物色不少差其奈后方争竉嫵𬒳駈吾父已兵死何物田翁來辱汚椒房恩遇望遂空破帽東歸心痛楚長吁行念樂天歌不重生男重生女此事到吾爲妄語嗚呼五季皆天民人倫濁亂踈反親當時乖盭同一氣天理何有劉山人劉山人莫悲泣伎方終老固賤貧却免誅夷爲外戚後飼牛辭春半我田耕未辦児輩休稱牛力緩自冬皂飬日巳乆當用猶羸功有間吾今朂汝汝則聞朝昏飲食無過勤兩家計口三百指一飽入手皆渠身三公投筆尚歸畒况我本是蓬蒿人微茫煙雨孤村底思與天隨作近隣春寒曲家居對病妻書空咄怪事人生百歲能幾時風雨憂愁還半是一春寒克中傷人紅朋碧友潜酸辛今朝晴暖烏鵲喜寒食數日無多春脫巾自漉牀頭釀待與東皇共一橂驅狼行隔溪衆號呼驚視驅两狼竄伏草莾間毛色隨蒼茫此物胡爲來顧晲何揚揚我觀五行書據理論灾祥吏貪政暴狼囓人此説聞自蔡邕與京房近傅共縣東殺人食路傍獸威孰擅恐自爾竿不擉刃良弓藏又云村墟去山迩群行獵食為尋常豺狼當路古所畏野獸走壙何庸傷君不見漢家良吏龔與黄當年異績何章章嘉禾朱草滿郊藪麒麟鳯鳥争翺翔寳鴨歌天雨新晴秋氣肅時秋霖晴霽暗用賈誼宋昌訪司馬季主事秘書近住城西曲入門坐定有餘清旣領玄談出竒物翩然寳鴨立玉洲儘箸龍香貯脩腹麝煤融液須臾間藍田春暖煙生玉引吭不惜吐氲氤要徹天心穿月窟漢宫豈數愽山髙晉惔休談鵲尾秃劉著作勿輕出長慮王孫金彈丸醉中疑以來相觸漢宣帝幸池陽宫圖李伯時筆武皇雄吞老未巳歲歲開邊兵四起嫖姚出塞屢䇿􅈴武縶陵降終國恥騰凌蹂藉五十年饗功歸到曾孫宣萬方解辮盡内屬龍庭南北無烽煙池陽五柞郊歌裏五日賜酺餘燕喜呼韓稽顙謁甘泉欲示雄誇先就邸大陳還縱萬人觀豈獨珎竒紛錦綺歡呼歸作北庭藩萬代稱觴甥舅禮君王燕犒不知勞鸞旗直上中渭橋茂陵王氣如水清建章宫殿春雲髙從此臨軒舒化日一聲宮漏出花遥岀花遥一作等虞宫漏一作清䠋入奏行送右丞史侯十年不見汾陽面萬里朝天來海甸神鋒照眼倚青冥黄色充庭明羽扇張燈開宴見談噱慘澹風雲餘百戰嚮來作牧與開府緫道臨機能制變漢家六合頓宏綱民事正煩眞空便只縁報國忠義炯幾度恩綸回睿眷我識君侯禮数寛德威無地不交驩此行入見想膚奏大計不出兵民安兵民安古人念此良爲難因思先相台衡日退食歸來事簡編送雪堂南行雪堂矯矯僧中英今年逺作餘杭行朅來過衛首謁余特以贈言爲寵榮君不見韓潮陽昔交僧縱暢與澄詠歌序别欲傾倒秪以文雅爲推稱不似阿師髙義烱要飛花雨到南溟樂閒老人歌奴哥緫管姓栢德名継昌以小字行蓋㶚陵舊將軍也今閑居鄧下自號樂閑老人聞予名甚喜詢所以襟抱有不期同而同者千里求詩此意不可辜也因賦是歌以贈庶幾酒酣耳熱後放聲而歌之猶足以見故家餘習云浮生優優駒過隙守虜抱囚眞可惜晦明光景一月間開口笑談能幾日一閑未老方是閑已老謀閑何所及須信閑人是貴人束縛軒裳梏亡客况復筋骸血氣衰聖有嘉言戒貪得樂閒老人逹此理自放閒身樂山水君侯年甫五十踰解官歸卧南陽廬風雲窹寐鞍馬事錦鞲脫落秋鷹孤飛楊䟦扈竟何用此身徤在間爲娯大弨掛壁龍在匣追逐弋釣須鳧魚有時逸氣蟠不盡猶擬去射南山菟君不見邵平東陵時何若瓜田心自如後堂種竹前圃𬞞月下自理淵明鋤客來大笑猶有事茶鐺煑月糟立餔古人徃徃以樂老此意殆與君相符我今天地亦佚老聞君此懐良起予何當杖屦與君約江山佳處身岩居半山喚起浮休仙窪尊一醉傾吾餘風流肯落六客後吟嘨常作三賢圖醉中爲将桓侯鬚君其樂矣歌嗚嗚醉道士歌秋九月二十四日予方曵杖出門有道士野服掲冠倚立棖下予邀坐階戺瞪目視予者乆之曰觀君風骨蓋李唐人也心事好但蹤跡蹉跎多失事機可惜可惜雖然得年八十餘數八八後當有顯擢予言可切記也飲之酒醺然而去時至元二十四年丁亥歲也因作歌以紀其事辝曰門前落葉秋風哀麻衣道士從何來翛然倚立两棖下若有所諭心悠哉我因植杖邀與坐拂拭熊韋堂之階無言瞪目視余乆徐謂風骨眞文棤前生落度晚唐士心事最好無纎埃所嗟蹤跡多後時勃窣不顧群児咍雖然得儒極廣八八而後聮星台呼兒沽酒與之飲勸以數行浮大杯醺然徑去不少顧恍若仙遇神爲開當生所賦諒自知過望榮顯青黄菑書稱五福壽爲至得到八十眞洪崖生平夢異復此遇晚節無乃其行諧吾看浮世孰不死我巳天篤培其才濁醪麄飯有餘幸過此以徃非予懐君不見通都與大邑真仙徃返時爲偕蒼蒼雲路望不及爲渠更上凌風臺雙峰歌士逹察判携手植檜小山見贈願博一詩爲信氏家傳其志殊可嘉也遂賦此歌并以其山奉還蓋詩非山無以見狀物之體山非詩無以表處静之用抑又在彼猶在此之義也金絲堂前雙檜碧氣幹凌雲三百尺蒼精乆墮刼灰寒蟠柢輪囷堅似石枝條巳䕃百王芳膏潤猶含三代澤土花漬嚙又幾年爲像爲山豈多得君不見召公甘棠武侯栢特以兩賢猶愛惜後人歌詠尚如此况是東家手親植憶甞遊魯得餘材入手摩挲三嘆息信生爲予好竒觀携來比視吾家蟠泰山梁木萬世仰何翅如到日觀秦觀雙峰間顧瞻巖嚴儘足楽譬彼物有小大聖學俱能全此雖體微道則具終日儼侍參吾前古人尚行不尚說正可安静如山然我今木朽不可雕後來聳壑争昻霄君家児子玉雪比向學說是神超遥還汝山聽我謡仰止兹木思惟喬學該本末貴通徹無使磊磊落落徒有㧞俗之髙標過宋義墓予徃年東走魏過楚上將軍宋義墓欲作詩爲吊而未暇今日與諸生講讀至義之本未前後諸儒略不見論說因賦此篇以發前賢之所未發者秦兵西來勢莫當群雄假義尊懷王我雖三户秦可滅彼蝱可搏微者或莫傷將軍乗勢思一掃當時籌䇿誠難量項家父子本強暴以謀制勝非渠長義維去暴失之易一死竟墮貪如狼重瞳子何猖狂只知帳中竒兵化青血不悟鉅鹿之戰開天亡風雲慘淡蛇作龍安得即遇隆準翁使我目亂狐裘茸高陽酒徒號狂客醉中两眼何其瞳攀鱗掉舌纔數語兩女輟洗來趍風英雄有時利不利俛首何限甘長終楚王店頭土一丘至今草棘荒煙愁我來吊古還一嘅西風黄烏聲啾啾中秋吟中統二年予客上都館于太醫使王冝之家中秋夜伯禄宣慰携酒相過仝㑹者館主王丈洎省郎宋庭秀近人來索舊賦乱道今亡之矣因追作是詩以寄二年中秋客灤陽灤江陸海天中央秋風吹空一萬里誰復斫桂增清光平分秋氣無少陂但覺霜露非尋常玉繩㓕没澹鳷鵲衆宿何有争光芒煙霄幸附應時翼佳節共下今霄堂鳯池鳴佩有餘暇白兔搗藥秋正香故人携酒喜見過慰我乆客同一觴謫仙杯杓思浩浩芙蓉城闕天茫茫眼中賔主侯與宋胡牀更對墻東王九迁𥘉不羡時貴一醉逕入無何卿人生相逢貴適意浮世聚散真參啇當時少陵客愛國心遑遑夜深飲散卧不寐醉聽金鑰鏘倉琅夜如何其夜未艾披衣顛倒尋封章只今潦倒百事廢感嘆歲月徒悲傷書來索詩叙徃事盛集難再須揄揚興耒追作固狂斐念君乆要曾不忘鄭重西樓花上月金波重約醉秋凉花工王氏歌城南劉郎携斗酒與客来叅秋澗叟當隅踧縮不敢坐王姓珪名三十九平生有技真可人好箇春風接花手木翁奪秀孕黄婆轉眼紅朋栖碧友劉郎秀春趣已成徃徃豪家闘招誘王生本出方技家品味神經無不有流芳轉入百花香豈止槖駝法堪取只今家住圃田西小橋流水遮髙栁㑹邀一醉百花堂要藉我詩傳不朽我自東歸今五年小園栽種期幽妍城中糞壌雜瓦礫雖有羙植何由蕃結根失所固可惜異品奚獨冰霜纒君不見芳蘭種不生惡草剪不去此事人間自今古門園子聽予語本根或撥非所冝一接千金戒輕與河圖篇荅伯明學官河龍負圖自崑崙包羲畫出乾與坤聖昌拘幽演餘藴六十四卦相氤氲姬情孔思本傳註竹簡别出尊皇墳經從東漢乱古制綴合爻象為全文韓康輔嗣轉殽雜操以荘老何紛紜東萊探賾復古定太極旣判二氣終然分女媧撫掌為驚絶天地再位開玄根易包萬象無不至若以一爻為一事其道反局而不伸考亭専以筮為主豈非天道似逺人事親當時厄火燎九地不爾亦堕秦坑屯君緘越本逺見贈老眼一洗空花昏細披五賛得要妙餘作孰敢光争新君不見行逢市免具此理桶氏有見為伊訴作詩寄謝君應聞風字瓦研歌示陳生平生蓄研空纍纍其名曰端猶可嗤世間萬有珉作玉堅則墨褪軟則泥或濃或淡不成字終日與伍空嗟咨東家瓦研靣尺五其狀宛似維南箕松風小試漲玄霧臨視黯霮羲之池朝來揮洒儘快意一筆掃出千蛟螭東坡黼研不可見咄此朽壌争神竒君不見莫鎁神寳不適用補履曾不如囊錐黼渡藏啇家冬敬甫坐見之雷將軍歌名時舉京兆同州人雷舉秦人家將種不學齊髙賈餘勇温然醻接縫掖流照眼容刀輝玉琫朔風憶捲關隴破西走巴渝爲勢擁宋人重漢不内任閫貴豪英制邊聳將軍守戍分劒関劒門天險石巃嵸當時一軍號安靖玠去群狺閫呼洶俞玠字義夫官至侍郎在亡宋最善宋蜀者也龍旂西狩萬壁空石角此心隨北拱天顔喜動詔賜金一日康侯三接寵盤盤大獲金湯牢雲間猛將鬚髯豪片言因壘引降出風義不减曹王臯蜀山破碎凱歌裏六軍喜溢秋天高破崗山頭望回斾小臣墮地空烏號櫜弓歸來血洗箭又許拜舞趍新朝命妻賜第恩轉渥纔得主曹浮綱艘憶昨先聲躡鼓鼙只今騎馬似雞栖朝來携酒過予飲細話徃昔非余悲事機翻覆古如此一椽僦舎甘調飢我方讀詩至秦仲車鄰駟鐡生光輝廼知風聲氣習逺自文武始歌頌不到秦家非革故謡一作復隍謡南城囂囂足汚穢旣建神都風土美燕人重迁朽厥載睿意作新思有泚一朝詔徙殊井疆九陌香生通戚里煬城密邇不剗去適足嚢姦養狐虺城復池隍莫歎嗟一廢一興固常理今年戊子冬十月天氣未寒無兩雪禁軍指顧舊築空郊遂坦夷無壅隔寂寞千門草棘荒佗年空有銅駝說我詩雖小亦王風庶配商盤歌帝哲通漕引漢家鼎定天西北萬乗千官必共億近年職貢仰江淮海道轉輸多覆溺東阿距泉清泉縣二百八瀹濟西來與清合安流取直民力省積水浮綱纔两閴自昔河防争横議秪辦薪蒭不勝計宣防瓠子至今悲以彼方兹功極細役徒三萬朞可畢一動雖勞終古利褁粮荷鍤去莫遅行看連檣東過薊休説春潭得寳歌長咲韋郎空侈麗從今粒米斗三錢狼籍都城樂豐歲珎珠菓詞有菓有菓名珎珠厥苞䓤翠二寸餘絶類王瓜未變赤紺穣滋膩甘酸俱就中結核大於指狀似萆麻色微紫逺供來自廣南州臣子献芹心爾耳然觀夏賦皆邦用口腹所充須錫貢若論橘柚亦常材此物胡為勞驛送當熊詞戊子冬十二月廿五日聽韓陳二生讀通鑑綱目至中山馮太后事蹟壮其貞節感而作當熊詞馮元帝倢伃哀帝祖母也漢家九葉時清宴帝拱深宫樂㳺讌魚龍萬舞閱來饜闘獸雄觀臨虎圈老熊駭逸突笠出𬒳髮攀楯來御殿昭儀散走虎士驚盛氣前當無少變大駕臨軒問物情歛容前對香雲顫妾聞獸猛得人止萬一不虞身殉難日華翻動喜歸来香飄合殿春風轉君不見東西两漢五百載班馬徽音儘堪羙元城投璽媛當熊能以至柔馳至健大笑陳妃望幸心千金空買長門怨東征謡海徼春㴠物生廣芽孽中大悖先王志忠獎馳驅鱗介海波騰沸聚使殱怒鰐奔䲔歸渠魁谷静川空骨如莾今年復作欲盡殪逸徳駭天吏孽餘老死黒龍東詔勿窮追令自斃就中縱殺勢難分枲婦畊夫同例天兵南伐六十年楚女呉児供北婢欲知天道覆心看取東人復爲隷下瀬舡交趾漢羸􅖮縣地戊子三月失利家中之木同灰槁炎海波翻震天討彼交事大天理常歲歲卑辭掉虚表舟師陸騎問罪來力審難支施機巧彈丸所據五郡地瘴氣爲地利我來彼遁還則娓一弩千人不容避老天限作覊縻邦不以衣裳介鱗易昔賢有戒是貪兵若論彼資才具翠南越志尉佗時安陽王治支趾有神人日臯通造神弩一張一放殺越軍萬人後佗子始質于安陽王切其弩毁其機馳報佗佗興師擊之弩折衆散遂破之漢家聲教𥘉無外下瀬戈舷㣲主帥一軍膽落䧟泥湖二萬選鋒同日敗褁粮載甲力有餘正坐無人作吾氣軍聲稍振需所援春水旋艫可弘濟古人堂上有竒兵安得營平與動輩征士謡巳丑正月晦東風連日沙塵昏兵威揜盡春氣温漢家武備遍九有南來探騎探一作彍何紛紛今年十抽一推去千里起赴和林屯御河西岸殷牧野萬甲照水光𥻘𥻘觀容有使親閲實不許代名須正身神牙獵獵見北靡精鋭全是嫖姚軍嫖姚出塞路幾千逺戰不過封狼山征人莫憚行役苦廟謀素具車攻篇君不聞王師有征古無敵何况彊弩之末魯縞其能穿念渠愛惜腰間箭㑹聽長歌入漢関天星行正月十七日天星蓬蓬若爲祟彗掃長空徂巽位六龍推墮日車翻萬火分崩碎於地老天變色赤祲如西北継聞天狗吠行人匍伏群雉驚􅏮􅏮甚於崩角畏君不見天星懸象萬物精一物下亡一星墜春秋二百四十年孛斗經天無此異不然大火示厥罰下熛人間爲沴氣月寅歲丑丁酉晨東方向明時又寅老翁百嵗見未省何况地上蟻蝨臣天雖髙變雖大災反爲祥果何頼正有德修知儆戒雨木冰晝冥冥雲族聚和氣滿作雨和變而凝冰著樹巧裁細剪千萬状霧木翁縮頸凍欲僵辨着乾坤開大素其詳三朝古説大官爲最忂曦輪過午始消釋膏如雨泣少陽爲臣冰即兵麟史書徵臣者互長雄此事胡爲兆今日建春樓歌頭春日長建春樓與東門香層軒髙揭冨觀覽春潭照暎千㠶檣呉商楚女莫空過渠是京様河馬西京張丗間忘憂唯食飲越羅蜀錦空千箱登臨人具醉飽去共城齊氏眞非常共城齊氏眞非常潜蛟行謝温將軍惠石温郎少年姿潤秀好古探竒出予右扣門相訪得怪供鬼刻神􅥵未甞有我欣植杖三摩挲秋水潜蛟見蟠紐何年囚鎻出禹穴不磔鬚牙驚水母毅然見贈𥘉不惜澹癖憐予象江守深藏夜壑空有戒當晝児童負之走于金求買何所得一旦携歸定非偶清泉湔祓庸玉汝屹立花間冠吾囿蒼鱗照水勢若動口鼻唅呀欲䲔吼常疑尤物即神物隠伏地中諒難乆宣和族聚失所在却恐雷霆下來取一春病酒日欲眠忽得此峰如至友娉婷翠射喜欲舞復訝舞仙來勸酒君不見九成論樂一䕫足萬石不須誇柳柳人生意氣貴相傾走筆酬酒當瓊玖重門行瀟條共西野有城號重門重門幽幽深幾許齊芳歸藩何足云公卿老淚空沾巾天道好還非少恩青山斜照自今古禪陵西望猶比隣曹暪搤吭忍不殺終我四百爲虞賔廼云得之羣盗手吾將誰欺欺彼旻君不見鄧城南頭漢濁漉至今草樹凄無春唐申王盡馬歌花蕚樓前閱庭實布乗黄朱笑群辟奔虹凝露故家物詔冩眞形出東壁申王夭矯龍一種揮灑元精固無匹龍池十日霹靂聲房駟無光韋偃泣千年事徃失所在此𥿄流傳見眞跡明牎不厭百回看飛電流雲悵猶溼當時圖畫樂昇平轉首雲屯散榛棘儲皇纔藉河隴餘旋復廓清唐再闢物盛而衰固有時校以倉皇易爲力漢家托地封狼北萬騎騰凌已無敵更求駿骨張吾軍一綍風飛能事畢雖云中夏號雄強冨不民藏孰共億聖謨經丗了不刋収卷入囊三歎息秋澗著書圖歌贈畫工張仁卿張生冩出秋澗圖先生胡爲此遊居知余讀書樂幽寂况復野麋之性冝與水石俱西風蕭條秋氣餘浮雲身丗將何如江蘺託詠太哀怨老松卧壑甘扶踈逢時不作棟樑用且須著論希潜夫盤盤澗曲深幾許晨吞逺汎知攸徂百川横障使東徃細大不擇羞潢洿考槃有歌誰與伍山鳥山花吾友于張畫師王宰徒雲煙落帋何舒徐吾令屏居日巳乆爲我作此眞良謨平生未常學學焉於此𥘉古人尚友無老壯要欲静泊志可明而逺可逾駸駸晚景幾桑榆不知此去澹泊得似畫中無目明神王骨相􅋯一丘一壑着㓜輿畢此一事爲成書此外何有於余乎此外何有於余乎時集錄古今相業爲調元事鑑秋澗先生大全文集卷第十
