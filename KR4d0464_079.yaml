body:
  text: 崇儒漢明帝始爲太子丗祖拜桓榮爲博士授太子經令止宿宮中者五年榮甞寢疾太子朝夕遣中傳存問賜以珎羞帷帳後爲少傅以太子經學成畢上䟽陳謝太子報書曰莊以童蒙學道九載而訓典不明無所曉識夫五經廣大聖言幽逺非至精能與於此况以不才敢承誨命昔之先師謝弟子者有矣今蒙下列不敢辭願君慎疾重愛玉體唐玄宗𥘉爲皇太子太極元年親釋奠於國學命右常侍禇無量開講孝經及禮記文王丗子篇太子問疑義數條無量皆依古典以對微加規太子恱賜無量物百段及學官胄子賜各有差順宗立爲皇太子喜學藝禮重師傳見輙先拜臣惲觀明帝之奉書報謝順宗之見師先拜聖上之立國學教胄子殿下之選儒士講經典皆以尊師重道故也然尊其師必崇其教夫子之教堯舜文武之道堯舜之道三綱五常是也夫子修而明之故爲百代帝王之師切見方今文儒之事関係教化曠而未舉者數事如學校未興人材無所育儒户未復士風絶于下孔殿未修帝師虚其位襲封未定祀事乏其主洒掃未給祖庭爲之蕪如或當行惟殿下留意其尊師重道之實光賁千古矣親賢漢惠帝爲太子招東園公綺里季夏黄公角里先生爲客太子侍髙帝宴四人者從年皆八十湏眉皓白衣冠甚偉上恠問之四人各以名姓前對上乃驚曰吾求公數歲公避逃我今何從吾兒游乎四人曰聞太子仁孝恭敬愛士天下莫不延頸爲太子用者故臣等來耳上曰煩公幸調護太子元稹教本書云唐太宗爲太子時引有道德者十八人爲學士杜如晦房玄齡虞世南禇遂良姚思亷李玄道蔡允恭薛元敬顔祖時蘇朂于志寕蘇世長薛收李守素陸徳明孔穎逹盖文達許敬宗雖閑宴飲食十八人皆在上之失無不言下之情無不逹不四三年而名髙盛古斯游習之致也臣惲伏觀自昔茂建元良所以属民望植國夲故必妙選老成耆德忠正賢良之士使左右前後朝夕納誨藴崇其德而况聖上預付殿下以萬機之重哉其所急者莫親賢爲㝡譬如作室小大之材湏積以歲月然後棟梁椳闑隨濟厥用不然顧雖一木或闕終不能就其室况治天下之廣居乎甞聞聖上龍潜至於御極二十年間百色之人逺召明揚旁及草野一旦置諸庶位小太隨材曽不乏用以致昭丕天之業開一統之基雖聖神廣運亦𬒳驅䇿者有所効耳其觀志繼行正在今日惟殿下留意去邪邢峙仕髙齊爲四門博士以經授皇太子厨宰進食菜有邪蒿者峙令去之曰此菜有不正之名非殿下所冝食文宣聞而嘉之賜彼褥縑纊賈誼書周文王使太公望傳太子及嗜鮑魚而太公弗與曰禮鮑不登爼豈有非禮而可以飬太子哉臣惲按二者食物之微古人之飬太子皆却而不進其嚴如此矧邪枉不正之人所冝近哉故司馬光曰太子之教雖前後僕從亦必孝悌端良之士誠有㫖哉納誨晋元帝立子紹爲皇太子以温嶠爲中庶子深見寵遇與爲布衣之交嶠数陳規誨甚有弘益又獻侍臣箴其略曰無以處極利在永貞思有虞之烝烝遵周文之翼翼晨昏靡違夙興晏息師傅是曕正人在側屏彼佞䛕納此亮直稽古訓導懼道未融造膝詭辭咎將藴崇鍳于九二天禄永終太子皆嘉納焉臣惲按晋太子紹𥘉在東宫以韓非子不足留心已從庾亮之言復納温嶠箴規至多弘益故能遇事損抑謂止建西池樓觀也不妄舉動謂勸不親征王敦也冝其號兩晋賢明之主良可鍳也承華事略卷第五幾諌東漢光武紀曰帝每日視朝日昃乃罷数引公卿郎將講論經理夜分乃寐皇太子見帝勤勞不怠承間諌曰陛下有禹湯之明而失黄老飬性之福願頥愛精神優游自寕帝曰我自樂此不爲疲也唐順宗紀曰順宗爲皇太子侍宴魚藻宮德宗懽甚顧太子曰今日何如太子誦詩好樂無荒以對及裴延齡韋渠牟用事丗皆畏其爲相太子每候顔色陳其不可故二人卒不得用臣惲切惟子事父母有承順從令而巳其或政令之非便舉動之過差而内發至誠逺徴古義周旋規切逹其善而巳若諌之甚則傷恩又非臣子之所安故孔子以幾諫爲言曽參以不逆爲善又傳曰親有過子則降氣怡色柔聲以諌如明帝以頥愛而勸光武順宗以無荒而對德宗其於父子之間可謂得幾微規諌之理矣臣特表而出之伏惟殿下詳覧以光子道從諌漢賈誼保傅篇曰太子旣冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諌之鼓瞽史誦詩工誦箴諌大夫進謀士傳民語習與智長故切而不媿謂習聞規誨與智俱長故諫之雖切亦能受之而不媿恨也化與心成故中去聲道若性言教化與心俱成故所爲皆合於道如性自然也晋明帝在東宮時太子起西池樓觀頗爲勞費中庶子温嶠上䟽以爲朝廷草創冝應儉以率下務農重兵太子納焉及王敦舉兵内向太子將自出戰嶠執鞚諌曰臣聞善戰者不怒善勝者不武如何萬乗儲副而以身輕天下太子乃止臣惲以太子甫冠處深宫供子職而誼之說防閑諷誦之嚴如此其備似爲過論然以宗社儲貳言之意在馴致涵飬預崇懿德異時重華繼照使易於從諌然後知古人念慮何深且逺哉况殿下春秋鼎盛當監國聽政之𥘉仁孝賢明聞於中外欲虚已聽言歛天下之明以爲已明取衆人之善以爲已善誠不難矣推恩齊宣王坐於堂上有牽牛而過堂下者曰牛何之曰將以釁鍾王曰舎之吾不忍其觳觫若無罪而就死地曰然則廢釁鍾與曰何可廢也以羊易之王若隠其無罪而就死地則牛羊何擇焉曰無傷也是乃仁術也見牛未見羊也今恩足以及禽獸而功不至於百姓者爲不用恩焉老吾老以及人之老㓜吾㓜以及人之㓜天下可運於掌言治天下其易如物轉運於掌上詩云刑于寡妻至於兄弟以御於家邦言舉斯心加諸彼而已言文王自正其適妻至於兄弟至臨御家邦皆舉巳心加於人而巳故推恩足以保四海弗推恩無以保妻子古之人所以大過人者無他焉善推其所爲而巳矣大過人者謂大過強於人無他事能推其所爲恩惠耳梁昭明太子統孝謹天至寛和容衆聞百姓賦役勤苦户口未實輙歛容色重於勞優宫臣有老父母者常遣存問歲時加賜珍膳衣服又見後閣小児攤戯属有獄牒攤者法士人結流庶人徒太子曰私錢自戯不犯公物此科太重令刑上三歲士一人免官或霖雨積雪令行視閭巷出𥜗袴以施貧凍平断法獄多所全宥天下稱其仁臣惲伏見聖上近年爲征役煩重例减差徭山東𬒳災溥加賑濟殿下日者慮繋囚淹滯也减雜罪而輕之念鰥寡困苦也發廪粟以濟之是皆德澤鴻厖者也今殿下朝夕聽理之事無非生民之利病時政之得失懐保惠和日深一日推是心而至於極又何獨哀庶獄之無辜見釁牛之不忍哉若廣採博聽因利而利當更而更者寛得一分民受一分之賜矣昔唐順宗處儲位日每進見德皇必有諌說未甞懈倦故天下隂受其賜者二十餘年正以推此心加諸彼而已承華事略卷之五承華事略卷第六尚儉梁昭明太子統武帝長子出宫二十餘年不畜聲樂時俗稍奢以已率物服御朴素身永浣衣膳不兼肉京師糓貴令菲衣减膳改常饌爲小食普通元年甘露降于慧義殿咸以爲至德所感云唐太宗撰帝範十二篇賜皇太子其崇儉篇大略曰聖代之君存乎節儉冨貴廣太守之以約茅茨不剪采掾不斵舟車不飾衣服無文王階不崇太羮不和非憎榮而惡味乃循薄而奉儉故風俗淳朴比屋可封此節儉之德也臣惲切惟人君以四海之廣萬民之冨居處服用稍加華美未爲過舉然帝堯以卑宫室稱聖君大禹以菲飲食爲令主蓋儉者德之恭也侈者惡之大也兼儉德者化民之夲上儉約則下豐足上侈靡則俗襄弊此必然理也伏見聖上自臨御巳來稽古崇儉如禁酒醴造繒綈去塗金率以朴素爲先殿下方監國守成之際冝觀志承訓以謹其始天下幸甚戒逸書益稷篇禹曰無若丹朱傲惟慢遊是好書無逸篇周公曰君子所其無逸昔殷中宗治民祗懼不敢荒寕享國七十五年髙宗亦不敢荒寕嘉靖殷邦享國五十九年自是厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟躭楽之從自時厥後亦罔或克壽臣惲謹按臯陶謨無教逸欲有邦兢兢業業一日二日萬幾解者曰不可逸欲當兢業者以天下萬事叢於一身微而難察多而難窮一不克謹則所失甚大昔大禹克勤於邦惡㫖酒好善言而惜寸隂恐爲善日不足也臯陶尚陳戒如此後之嗣王春秋方盛者固當寅恭儆懼戒逺逸䂊頥飬福夀則邦其永孚于休矣審官唐元稹教本書云貞觀以來保傅皆宰相兼領余官亦時重選馬周以官髙恨不得爲司議郎此其驗也文宗太和四年左庶子孫草奏青宫列局護翼元良必用卿相子弟文學端士今以年月浸乆漸至訛替近年有流外出身者稽諸故事未甞聞流外出身者得厠此官當司有司經局校書正字品秩至卑而文學之人競求者蓋以無塵雜故也今五局郎資序夲是清品若授流外則此司官属漸成無蔓請自今巳後不得注擬流外人勑㫖准依臣惲按唐髙宗爲太子太宗作帝範以訓内有審官一篇今左庶子孫革云稽諸故事無流外出身充東宫司局者正以貞觀以來餘官重選其流不雜之意唐之選擇至嚴慎如此又甞聞前金時東宮官察遭遇纂承一切改授謂之隨龍轉其恩例名爵比常秩爲特優逺觀唐制近視金法二者之間誠有當取鍳者𥘉𥙿皇讀至漢成帝不絶馳道唐肅宗改服絳紗爲朱明服心甚喜曰孤若遇是禮亦當如比不意古人已行之矣及邢峙止齊太子不食邪蒿顧宫臣曰一菜之名雖食之豈遽能邪人哉詹丞張九思對曰正人防微理乃固然譬猶於莬雖渇不飲汚泉暍不寢惡木隂也上喜其說而善之承華事略卷第六元貞守成事鑑臣惲再拜昧死謹言臣伏念叨忝禄仕以來三十五年比者復蒙先皇帝召至闕下授以翰職顧惟衰庸思有以圖報萬一幸遇皇帝陛下嗣登寳位謹封上十有五事題之曰守成事鑑皆逐事直說不敢過爲言論庶便觀覧謹列于后敬天王者爲天眷命貴爲一人冨有四海然隨其所行得失即降鍳而災祥之此天人感格必然之理吁可敬也伏惟陛下英明仁孝繼天而王如寳符應運慶雲開瑞年榖登中外安足見天心脊佑深至然祀告者寅畏意也政事者感格夲也故臣採自昔聖賢敬天實德為陛下言之夫抑畏顕命恒厥德而保小民者成湯也嚴恭祗懼謹身而修政事者髙宗也小心翼翼順帝之則者文王也夙夜畏威日靖四方者周后也傳曰動人以行不以言應天以實不以文此之謂也三代明君惟克若是故得申命用休享永年之祚幸陛下鑒觀日新聖敬法祖伏見國家未有如今日之大亦未若丗祖文武皇帝之聖者陛下新即大位規模法度首為重事然先事者後事之鍳祖宗者子孫之法緬惟先皇帝臨御天下三十五年之間洪規逺慮典章文物粲然備具但未纂為一代成憲冝令有同條具綱目不時鍳觀遵而行之譬猶弩之有機往省括干度則發無不中矣為益有三使祖宗良法善政永見於方來一也臣民安夫習熟昜於奉行二也繼述先志茂隆考治三也昔周武廣文王之聲永清四海漢文遵髙祖之法化治多方又書曰鍳于先王成憲其永無愆兹非明效歟惟陛下留神覧察愛民天以至仁生萬物人君代天理物故當以仁愛爲主國家自太祖肇造區夏至於先皇帝混一六合功成治定可謂至矣今陛下繼體守文如周成康措丗於安寕漢文景注意於休息中外顒望正在今日所謂子愛實恵不出息兵省刑薄歛而己兹者肆赦蠲徭停罷逺征固得其要尚當䆒仁愛之本使民永受其賜夫敦化厚俗使民自逺於罪此乃省刑之本也内修文德外嚴武備懐柔逺人至不得巳而用此乃息兵之夲也躬先儉素撙節浮費不至厚取於民此乃薄歛之夲也願陛下擴充詔條日新庶政何患德澤不𬒳聲教之不廣哉又江南版籍貧下者衆去朝廷逺易動難安尤冝慎擇守令撫字有方秋毫無犯則盗賊自然消弭所謂天下本無事但庸人優之耳十羊九牧誠可爲鍳恤兵兵民國家大本二者互相爲用自昔視之如一伏惟陛下即位之𥘉審其如是首蠲民差重恤軍役可謂得愛飬不偏之道矣今寛恩巳𬒳於民編實惠未霑於軍籍竊恐綸音徒深衆望兼近年民間凋弊凡有雜泛與之分當小户何堪實爲重併此當論者一也軍籍自至元八年縁強弱不均巳曽推併迄今廿餘載新強舊乏陟然不同今一體應役豈不偏重其九年軍雖行合併十一年簽者當時起遣巳是生受此當論者二也彼貧難者未免赴愬自下而上中間齟齬比獲存恤至甚不易恐徒開有力者僥倖之門終不能爲貧乏無力者之地至於癃老病弱䓁户雖寛限優飬譬疲乏犬馬終難復舊留之將安所用此當論者三也且國家用兵六十餘年今天下已平不可忘戰但講治之法與時髙下者有所闊略幸遇陛下曠示洪恩作新國政比之以姑息爲惠何若詔所司依八年例再行通閱使貧冨適冝至公均𬒳則福禔中外豈不盛哉守成古稱繼體之君猶持盈守成盈者器之滿成者物之聚旣成旣盈手執身護一或怠則墮其成一或側則溢其盈可不慎哉伏惟陛下聦明睿智足以保臨即位之𥘉追崇祖考尊禮大臣息兵愛民慎官節用固以得守成之道臣所以孜孜爲言者蓋以治安難恃驕怠易生故也昔唐太宗問創業守成孰難魏徴對昔之興乗亂覆昏殆天授人與旣得則鮮不怠驕有國之弊常由此起守成爲不易太宗以徴言爲然司馬光亦曰夫民有十金産者猶思先丗所致必苦身謹守惟恐失墜况享祖宗奄有四海之業將傳於無窮當如何哉伏望陛下以司馬光言爲鍳唐太宗之問爲法豈惟宗社之福實天下幸甚若夫聖子神孫旣明其體不可不新其用敢略以四者爲言纂武功平禍亂而一統者垂統之祖也尚文徳以柔道而爲理者守成之君也仁義禮樂乃治之具也仁者政之德所以固億兆易動之心義者事之制所以明政務當然之冝禮者萬事之節所以革去僣越定上下之分樂者聲音之和所以蕩滌滛邪浹大人之氣也此四者先王致治要道正在用之何如爾惟陛下垂察清心心爲一身主萬善所從出惟澄治不爲物慾蔽遷故得耳目聦明志慮精一况人君是心包羅萬慮經緯八方苟非澄治一或少差得失係焉昔二帝三王傳授治道以心爲本然不出執中建中而巳曰中者何無過之謂中則天理之公過則人欲之私國之所以治者只在存此心清此心耳如此則或差之慮不生至公之理可得率至公之理以臨制其下孰不心服而化從今陛下英明濬哲氣志如神事無微而不察物無逺而不照復能鍳二帝三王之執中節嗜好逺功利使心鏡澄澈昭然一德照臨百官雖萬幾前陳酬酢聽断將無逃於聖鍳矣其於守成持盈何有勤政人君代天理物所當法者天也天惟乾健不息四時行而歲功成君惟體之不怠帝載熈而百揆叙故大禹業業勤邦明德垂百王之法太宗孜孜爲治貞觀有三代之風後之君人者可不鍳哉况軍國大事日有萬幾湏敷奏以時聽鍳有所今殿庭慶宴巳有定儀視朝之禮尚曠而未行行之正在今日勤政之實無踰於此尚儉夫上儉約則下豊足上侈靡則俗凋弊此必然之理也故先皇帝崇尚儉約如重紬繒而輕紵衣去金飾而朴鞍履服用婚嫁一切有制以奉行漸逺不無稍緩今臣民衣着等於貴戚婚嫁財踰於公卿其僣越暴殄有不能供給者如漢文景時海内冨安風俗淳厚蓋示以敦朴率先天下故也今陛下新即大位尚儉去奢最是切務且天之生財必供一丗之用今國家財賦至廣每歲支持不易者蓋事勝於財故也爲今之計省事節用量入爲岀以過有所費爲戒昔金世宗時有以不給而請者丗宗曰汝輩何騃殊不知府庫之財乃百姓財耳我但揔而主之安敢妄費至今稱爲君人至言可不鍳哉謹令臣聞號令者布德澤宣壅滯法天順民者也猶天之雷霆一出而不可掩故書曰謹乃出令令出惟行弗惟反唐太宗亦云發號施令當永爲式湏審定而不輕出今陛下受命惟新萬務伊始吏民奉行期於至治可不謹而一之如政有所必革事有所當行發自宸衷詢之輔相稽祖訓則例明恊民心則允恊如是而行旣謹且一則威肅而民信君尊而國安又舊例軍國事省與臺院一同奏聞有所未當即議從所長當時行之甚爲便益目今各行專逹旣不通知事或窒礙必湏更易其於大體不無少虧冝申明舊例且防壅蔽天下蒙幸立法法者輔治之具一日闕則不可歴觀自古代有成憲子孫守而不失如周之三典漢之九章是也今國家有天下六十餘年大小之法尚未定議内而憲臺天子執法外而廉司州郡法吏是具司理之官而無所守之法猶有毉而無藥也至平刑議断旋旋爲理未免有酌量凖擬之差彼此重輕之異臣愚謂冝將先朝擬定律令頒爲元年新法如是則法無二門輕重適當吏安所守民知避而難犯亦繼述之大事也重臺諌臣聞臺諌者天子耳目朝廷紀綱耳目聦明則事無壅蔽紀綱振萬則朝廷肅清惟係重如此故權不冝使之輕氣不可使之沮否則聦明自蔽綱紀自緩將何所頼惟職專紏彈不恱者衆又近年巳來𬒳敫者欲緩已罪返行誣告權臣因之沮抑靡所不至䆒其無實多不抵坐致使邪氣轉盛正人結舌根本内撥枝葉外瘁甚失風憲大體故古人有言鷹隼獲禽獵人隨護不然返爲物傷可不念哉昔𥙿宗皇帝聽理東朝審其如是力爲扶持今陛下即位之𥘉特爲倚重一切所行率由舊章悠久如是豈惟肅正朝綱聦明有頼執法明而尊嚴之道備矣臣愚表而言者爲天下賀選士伏覩先皇帝在潜登極四十年間招延側陋㝷訪好人略無虚歲得士之多於斯爲盛以選擇難精任使乖用設科取士甞有定議計古今治道良法美意行之略遍獨此未及行耳比讀詔條莭該議貢舉之法可謂得先帝遺㫖矣况科舉取士歷代講䆒旣公且當無踰於此若將十一年巳定程試格式舉行甚允當也但科場停罷曰乆欲收實效行之不可草略必先整學校選教官擇生徒限以歲月方可考試如是則熊得實材以備國家無窮之用臣愚所以爲言者選取人材㝡爲方今切務不可緩也頃年丗祖皇帝暨𥙿宗皇帝所以將行而未遑者天其意者欲以遺陛下禆爲今日守成致治之夲歟慎名爵書稱官爵天秩王者不可私以予人何則礪丗磨鈍鼓舞一丗使天下之人奔走爲吾用者正頼此耳惟賢惟能然後授之尚慮得之輕則祝之輕視之輕則人不重人不重君子恥而小人至矣今四海一家廓然無事收攬威權正在今日朝廷冝重而惜之不輕與人謂如李唐季年使職或帶相衘𥘉無分省實權何則旣逺闕廷豈容别置省府所以然者蓋亡金南渡後一時權冝不可爲法其勲伐者當如漢唐封加官爵夫有功勞者酬以官爵有材德者任以職位此人君御下之術也未聞以輔相之職爲賞功之官者冝講明典故别議施行明賞罰賞罰爲國大柄惟政先定體官有定貟則大柄可行能責人以成效况古人爲官擇人後丗爲人擇官職此之由政本不立遂成冗濫此古今通弊也故唐太宗貞觀元年首明致理之本任賢去冗定文武官才六百餘貟金丗宗即位之𥘉專以廉能責下遣官分察州郡以三等大明黜陟加遷櫂其汙濫不職者第一等並除各第二第三等俱解職比聞詔有司减官增俸是將汰冗飬能正此意也頃年已甞定奪縁事重責大行之有所未盡今者之舉非断自宸衷先定體而行之恐無異於前時臣故曰减冗貟莫若議新制責廉能無如明黜陟内則遵太宗以爲法外則取金朝以爲鍳若此孰不承風振癘庶幾名實兩得漸消苟且因循之弊則貞觀三代之風大定惟新之冶恐不專美於前代矣逺慮伏見陛下纂承以來時和歲豐萬方晏然可謂旣安且治似無可所慮者然自昔明君不狃安目前常存深逺之慮者蓋事生於細微患成於所忽故易以履霜堅冰爲言書以不見是圗爲戒又賈生有云天下大器置諸安處則安置諸危處則危且以方今論之如備禦邊防廣修馬政規兵儲逺謹斥候撫安新附降徳音擇官守弭盜賊隄防水旱復常平廣蓄積謹隄防敦厚風俗興學校敦孝廉重徳義抑游墮禁奢僣肅清官吏表亷能絶請謁禁吏啇抑貪鄙可逺謀而深慮者豈皆無之惟在䆒其所未然而圗其所當置則致治保邦爲不難矣何近憂切患之有哉故傳曰逺乃猷又曰君子思患而預防之皆聖人以逺爲慮也幸陛下鍳觀毋以目前之安爲安惕然以乆逺治安爲慮恐先皇帝付托遺意正在於是臣又聞愚者千慮必有一得狂夫之言聖人擇焉臣所進言固迂闊淺近儻一有可采自隗而始則忠言讜論訑訑日至矣惟陛下省察臣不勝俯伏待罪恐懼之至臣惲昧死再拜謹言秋澗先生大全文集卷第七十九
