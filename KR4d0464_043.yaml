body:
  text: 序紫山先生易直解序紫山胡公年未強仕應奉翰林潔居官舍者幾十載致力讀書究明義理期於逺大取易卦辝遍書屋壁時不肖忝在言列過而見焉詢其故曰吾朝夕洗心將範模四聖人庶幾言行適冝而寡尤悔焉非特説夫言竒而法也識者巳以通材有用許之爾後郎地官佐省幕總尹大郡提憲外臺平生藴藉見諸施設其至公正大之論卓異特逹之舉固不可枚數要之神吾志行吾道不阿合取容於時不俯仰勉從於衆可行即行不可即止又其晚節脫屣軒冕笑傲林泉進退兩間知命隨時從容中道蓋棺論定皆曰紫山曠逹英邁士也稽驗疇昔諗其得於易者為多𥘉不知其有所著述公沒之三載嗣子伯馳携所著易解懇題其端公與僕自弱冠定交氣義契合互為知巳今雖衰懶撫其遺書忍無一言發越潛輝夫易聖人憂丗書也純粹精深通貫三才理包萬彚其用必須見於開物成務之實然通其變必當逹其辝逹其辝欲見諸用者不於先覺躬行踐履之實迹而取法焉未見能造其窔奧也昔宋名儒劉斯立作學易堂記但序日用常行事而曰余學易矣論者以為得體况紫山踐履工夫形諸事業復推巳所得纂而成書啓迪後人可謂得聖賢忠恕之道矣學者復能考公平昔操履得其端倪以之尋繹隱賾奧妙之旨則思過半矣大德二年冬十月八日謹序總管范君和林逺行圖詩序燕趙自昔多豪邁慷慨之士雖時移俗易不復於古而海山沉雄通貫斗極鍾靈孕秀間亦見其人焉和林乃國家興王地有峻嶺曰抗海答班大川曰也可莫瀾表帶盤礴據上遊而建瓴中夏控右臂而扼西域盤盤欎欎為朔土一都會然去京師數千里地連廣漠氣肅玄冥中土人聞話彼間風景毛髮森豎巳不勝其凛然矣况行役於其間哉至元丙戌詔皇孫晉王於其地建藩開府鎮護諸部燕人范君徽卿早以湯液供奉徽卿為人讀書尚義以功名自喜識逹時務臨機果決非特以方伎進也凡侍行者三往返焉所謂沙漠寥逈風雪寒沍險阻艱辛備嘗之矣其志益厲氣益振曽無退縮顧避之私今人暫適數百里間者輒有離别可憐之容抱𬒳入直省署倣徨顧妻子語刺刺不能休較以徽卿之事非豪邁慷慨者乎冝遂雅志掇美仕而收功於藥籠者不止邯鄲故步也友生尚藥長假鼎臣壯夫為人擊節嘆賞之不足復持所繪逺行圖將求名公歌詠庸彰其名譽屬序其端豫謂徽卿志行固可振衰激懦為臣子忠勤之勸復欲形諸歌詠庶有聞風而興起者焉大德二年十二月臘日序易齋詩序豫往歲需命延芳東淀識供奉姚君於稠人中儀觀秀偉襟量伉朗及聽其談論灑灑有斷決固疑其非建除流也舜卿河東人少博學越法家為顓門嘗從事憲司以平反稱用薦耒京師當塗者將處之秋官司平既而侍從官有以善占筮聞者一日緹騎到門以所詢上對多徴驗中事幾由是待詔金馬日承恩睞者蓋有年于兹四方稽疑問計者須以正理示之曰人事順蓍蔡不吾戾也皆知所止而去然舜卿姿耿介負才氣思效用於明時者為切顧是覆逆有不屑為者足迹亦未嘗及權貴門墻求展其所藴賢士夫歆其志尚如此樂與之遊從嚴範泉嘗題所居曰易齋率賦詩極口幽贊近持嚴翰相過屬題其端且曰序吾平生闕下十年幸詳之過此非所知也豫告之曰昔劉斯立記學易堂但筆其宿昔日用常行之事洗心工夫不一言及論者謂得體蓋易之為書聖人之丗為書人事作也吾用既明道固在其中矣嗚呼舜卿胸中自然之理善學不言之妙與厮立其亦同然者乎元貞乙未冬十月望日序洪洞縣王舜卿敬親堂詩卷序昔賢論孝子之事親也務為敬愛交至恐其恃愛而怠慢生故父子異宅而處復慮孝愛簡而弗洽乃有問搔庠痛之節所以廣其敬愛也然宣尼語孝之大經以不敬其親謂之悖禮徒能養而禮法不足又深警於言遊蓋明孝之用固有愛敬之别究其本體主一無適與親之重事之大復何以加於敬乎豫官晉府者五年得純孝之士曰王君舜卿舜卿丗居洪洞縣東陽里自曽祖惠祖誠祖母張氏繼享遐齡子孫俱以善事聞舜卿夙承家範復知讀書勵行增益其情文之不足者奉其父伯玉君恪供子職謹身節用惟恐甘旨之有闕也氣和色愈所期致志之樂也孺慕情至洞洞屬屬如不勝而有所失由是取信於朋類傳美於鄉閭僉曰舜卿誠孝人也豫嘗過其廬扁曰敬親庸表順德後草餘載豫在翰林其友人中省東曹掾郭文卿相過而請曰舜卿自經翰學先生題品後信道愈篤家居教授克終孝養有司辟舉辝皆不應邑大夫洎士之能文辝者咸歌贊之然未免為一鄉士也不肖交最欵將求詩什於朝士庶播其清譽幸念疇昔賜以序文豫謂文卿曰河東三聖人所都平陽實放勳所理其至德之所感格深澤之􅉼濡至今尚有存者晉卿乃晉産之良孝行既超乎流輩隱居復求其志尚自可追遺風而厲衰俗矣昔唐董召南隱居行義昌黎先生作詩發其潛德宋徐仲車力學至孝紫陽朱公特書卓行二子之名因之昭晣顧豫衰老其言豈能為人重輕哉文卿曰士志獲伸於知巳後生借重於先進此理之必然况嘗趍下風而接清光者乎不然幽隱之士烏能名於後丗邪豫曰有是哉於是乎書大德二年戊戌歲重陽前二日序雪堂上人集類諸名公雅製序雪堂上人禪悅餘暇樂從賢士夫遊諸公亦賞其爽朗不凡略去藩籬與同形迹以道義定交文雅相接故凡有營建遊謁或懇為紀述或贈之詩引三十年間纍至數百篇非好之篤求之切安能致多如是耶乃自諗曰綾標玉軸藏之篋笥銀鈎翠琰列諸廊廡焚香煮茗玩味者有時拂拭塵埃披讀者有數不若纂為一編刋之板木用廣其傳遂詣秋澗翁以序引為請豫詰之曰夫浮屠氏一生死外形骸百年斯丗電露起滅事業功名一歸虛寂而後已今吾輩既以不朽計實其空無復欲申衍微義其説何居師曰在吾教法中凡嚮善積行述贊偈為之證據今某踵鴈塔之故例續千佛之名經集群英裒衆美期欲布恆河沙界等須彌盧共傳為無盡藏不求詞林大居士為表暴其端倪鼓舞其宿緒是猶以明月之璧夜光之珠無因而暗投可乎豫曰有是哉昔文暢參寥子愛仰昌黎東坡名德屢造門墻二公以墨名儒行特與其進至贈之序贊雄深雅健與時俱新膾炙人口由是後丗知有二僧之名雪堂其亦文暢參寥子之流與至於行業風義讀其文頌其詩自當知之兹不復云樂籍曹氏詩引樂籍曹錦秀緩度清歌一日耒為余夀因詢之曰汝以故家人物才色靚麗風韻間雅知名京華為豪貴招致逞妙藝而佐清歡日弗暇及不知何取於豫而得此哉曰妾雖不慧頗解之無猥以薄技陳述古今興亡閨門勸戒必探窮所載記傳詩詠掇採端倪曲盡意趣久之頗有感悟欲為效顰願乞一言為發越俾妾姓名得見於當代名公才士題品之末庶幾接大雅之髙風一時增價飲靈芝之瑞露七竅生香不同落花飛絮委迹於塵泥間耳先生寧無意乎曰豫少有志於時中年多故每感事興懷登髙作賦以攄其底藴由是頗以文字知名今老矣百念灰冷有瞑目澄心燕坐焚香而巳惟集賢翰林諸名勝擅文雅而足才情念芳溫而餘藴藉者肩相摩而踵相接也琢肝腎而製錦綺因咳唾而成珠璣模寫鶯花之狀形容月露之情只在揮毫之頃耳彼往求而得之如杜秋娘之善謳金縷薛校書之秀發娥眉元相國杜樊川皆贈寄詩什語意清新膾炙人口自可因之以傳不朽尚何俟粃粳之辝簸揚於前哉曰請即書此語令妾持之以為先容扣蓬萊瀛洲之境而問津焉不以可乎磁州采芹亭後序采芹亭者前州倅劉藻之所建也豫自壯年宦遊河朔間每過滏陽更遽必趍拜楊公而去一日先生率豫謁州之廟學指其廢而未理者曰此郡庠也此頖池也此頖之采芹故址也承平時學校之盛視數州為冠吾雖耄要當修完庶復舊觀據當時所存者雖一瓦一石俾保之勿壞既而先生下丗壬辰冬豫復過滏陽所謂芹亭者巍然如翬飛翼跂宛浮波面荷香藻影曉風涼露士子遊息徜徉其上沾濡芬霏歌詠思樂殆有登瀛之快已而翰屬曹生因求書其事楊公疇昔之言不覺蹶然於中雖罔及施勞使來者是心不匱實先生有以錫之我其可不念哉先生名威字震亨承安人姿剛直有文章議論少嘗以蕃兵為儒將有功西夏建元𥘉年中書嘗召為詳定官巳而言事以星變勸大臣宜解機務以避賢路不然且有大咎不聽遂拂衣南歸教授鄉里壽八十終于家逮至元五年襄陽破吕文煥出降五月北覲過磁先生贈之詩云連隂六十日平地一尺水今朝與明日淋瀝尚未止此者天垂戒其中有至理降將吕太尉飯畢行欲起偶爾得會面舍館接汝爾自言鎮襄陽於此今五紀為惜萬人命此來非為巳聖主錫深恩髙爵還故里一飯尚有報盡忠從此始余謂我國家萬方同一軌得之與不得東南一隅耳向使君不來宋歷能有幾人生苟冨貴直筆一張𥿄見説李陵生不若張巡死吕為之斂祍而去撫卷懷賢豈勝感嘆若能取孟亭例祀先生於學宮俾死而不忘儲宫祝香回灑汗而書雪庭𥙿公和尚語録序至元丙子夏豫考試河南由汝抵洛嵩前勝槩盡在目中只欠少林一遊耳東行擬取道轘轅庶饜宿願竟以事奪不果耿耿在抱至神遊洞閣雨花􅌭紛恍與真遇今年甲午冬萬夀主僧圎讓偕少林惠山來謁因及山中物色與向夢不少異相顧一笑乃有是邪遂袖出一編曰先師雪庭語録也仍合瓜前請曰公山林清興雖未稱遂幸題辝篇端以為他日張本寧無意乎豫以事與心會似非偶然者按所具騰説以應懇求雪庭𥘉參万松秀公萬松得法雪岩上人縱橫理窟深入佛海至於遊戲翰墨與間間屏山二居士互相贊歎為方外師友其器業槩可知已帥參禮閲十寒暑獨能秀拔叢林得根踞為奧遂出丗主奉福精藍繼應少林敦請招提禪剎號中天名勝板蕩后增崇起廢頓還舊觀緇徒具瞻蓊若海會於是欵龍庭而振舉宗風敞五林而弘闡家教因緣會合傾動一時以無礙妙辨現當機應身處統堂第一位者蓋有年于兹從是而觀自非克荷佛乘大異倫類機鋒峻整逈出物表者能如是乎今舌本巳淨真如迹空學其法者能鑽研故紙即心印所在求向上一著恐不待夜雪橫腰而悟面壁西耒之意蓋有之矣吾未之識也是歲仲冬開局前三日書孝節王氏詩卷序傳稱夫有再娶之義婦無二適之文蓋天道之常經人倫之大綱也然風霜别草木之性衰俗表幽貞之節求之于今王氏其人也父振北渡后嘗為州權司年耄無嗣納州將劉六郎為門倩得一子甫半歲而壻亡既而父以女年盛且無母氏議復館甥於室女聞之跽父前而言曰家貧無嗣世之常事婦人再醮奈名教何有誓死而巳父壯其志遂寢無幾異母弟用國俗欲行續嫓王氏出好言置叔於姑前以人倫正理折之曰寧守節而死不失節而生且夫者天也天不可逃行違神明天則罰之即欲自戕賴左右救而免叔亦感義烈而止時劉帥殁已久世業扶踈諸子分居其姑秦氏亦無子孤影煢煢空闈索處王氏善組紃以供日需提挈子傑歸養秦氏以極孝恭教其子至通習儒吏致卓有所立於是風動鄉閭義激行路耆舊士夫交章舉保蒙旌表門闕曰孝節王氏之里嗚呼光顯哉及秦亡顧劉氏三代浮殯淺土子孫遊宦力不暇及遂獨營墓田經理葬具凡溝合者十餘竁鄉人來觀無不驚歎曰丈夫兒有不能辨者何賢孝如此王氏處寡四十寒暑言笑未嘗露齒素髮盈簮氣貌幽間所謂老而益堅者也鄉里偉其徽美一日子傑來請文因泚筆而序之庶幾備采管䑣區明風烈者演柏舟之義云雪庭𥙿和尚詩集序禪以奧為説詩以志為言僧之以詩鳴者見於晚唐盛於前宋前賢評論固匪一致不出才清氣勝發𬞞笋之餘芳辝簡義深調葛藤之奧語就本法言之以心傳心推離還源在用之恆寂而已尚何文字之有然出丗演法者警悟群迷不容忘言假借聲光發雷音之先雪庭公和尚蓋亦出丗演志者也集詩詠及雜體等篇為三卷首嗣髮惠山來求豫敘引以光師行雪庭平生然嘗聞諸友人陳節齋談師器局磊用見諸行事其在方外實為不今觀其應物信手拈來吹花作霧於憂時判往往出言意之表者可謂混儒墨為之手段企慕髙風追攀有山堂惠至元甲子冬十月草七日秋澗老人序嘉善録序刑者成也一成而不變民之生死俗之慘舒係焉故君子悉其聰明致其忠愛而盡心焉在唐虞三代之際風俗淳教化備巳有輕重適冝欽恤哀矜之感况肺石雪冤棘林夜哭之後哉此疑獄折獄等集所由作也大都路總管府推官李君威卿少習城旦書以儒術飾吏事復取經史子集下逮百家之説凡關於刑憲者撮其機要纂而從類先之以歷代法令輕重沿革著明其體繼之以聽斷節目之詳彰施其用凡三十二門名曰嘉善録一日携示秋澗翁懇題其端豫雖衰耄胸中耿耿尚在士有好學而兼善者乃喜聞而樂道之自政教陵遲獄辝繁閧事至持難手有未易措者故職任推理衆為抵諱然協中輔治之具雖聖人視之為切務者孜孜焉存心而盡意可謂超出於流俗之表矣况有致知之資居可行之聀當推鞠審決之際屬類比事稽古凖今融會貫通俾時有稱平不冤之譽為不難矣昔宋祥符間有獄官張慶者以矜愼自持其囚徒飲食湯藥卧具必加精潔其後子孫奕葉登第顯宦于朝論者謂慶平昔重恤獄事隂德致然况延精覃思盡心於五罰五用者哉威卿尚勉行其所學善推其所得而愛物兼善之澤詎可量邪西巖趙君文集序西巖趙君系出遼勳臣開府公後遭時多故家業中衰西巖崛起畎畒從龍山吕先生學金自南渡後詩學為盛其格律精嚴辭語清壯度越前宋直以唐人為指歸逮壬辰北渡斯文命脈不絶如線賴元李杜曹麻劉諸公為之主張學者知所適從惟虎巖龍山二公挺英邁不凡之材挾邁往凌雲之氣用所學所得偃然以風雅自居視孝協律趙渭南伯仲間也雅為中書令耶律公賔禮至令其子雙溪從之問學由是趙吕之學自為燕薊一派西巖受業適丁兹時探究其淵源沉浸乎醲郁加以立志堅篤講肄不倦冝紹傳遺緒最為知名士捐館後十五年子天民携所述西巖集見示求引其端乃為之説曰文章天下之公器與造化者爭衡為之甚難故得其正傳者亦不多見豈非天之降才不易而人之器識亦有限量邪惟就其材地所至學問能就以自得有用為主儘名家而傳不朽若必曰須撑霆裂月碎破陳敵穿穴險固者方可為之則後生晚學不復敢下筆矣如西巖之氣淳而學古材清而辝麗自足以攄平生之底藴為後進之規模異時有大辝伯出如王臨川元新興纂李唐之英華續中州之元氣序文章之宗派者則於是集恐亦有所取焉遺安郭先生文集引關輔天下形勝地有終南太華洪河涇渭為之襟帶姬周之所積纍漢唐之所經營雖時異事改彼忠厚雄傑之餘風山川英靈之萃秀而在於人也意其必有瓌竒文雅之士生乎其間僕嘗思一遊求其人與之縱竒觀歷遺迹羡河山之良是嘆興亡之無窮豁逹界蒂以忘吾憂寤寐平生未遂斯願至元乙亥冬猥判晉幕夤緣迎謁抵華隂東歸殊悵然也爾後每自秦雍來者必為訪問雖得其髣佛而士之隱見𥘉不知也大德庚子春方謝事不出有客扣門剝啄自稱奉先郭良弼嵒甫携示先丗遺安先生文集請引其端細為披讀蓋信道篤燭理明攻詩文為顓門之業者也豈非向所謂瓌竒文雅之士乎雖未西遊其山川人物已在吾目中矣奈何衰老懶於論載請益勤乃勉為之説曰文章雖推衍六經宗述諸子特言語之工而有理者爾然必需道義培植其根本問學貯蓄其穰茹有淵源精尚其辝體為之不輟務至於圎熟以自得有用為主浮艷陳爛是去方能造乎中和醇正之域而無剽切撈攘滅裂荒唐之弊故為之甚難名家者亦不多見惟周卿先生天資沖粹內守峻潔自幼力學為健舉子中年流離不易所業故德望彌髙文學益冨致逺近尊禮又少日以外孫行接際蘭泉先生所交麻段孟李諸公皆秦晉名士其資之深學之博與夫淵源講習可謂有素矣故詩文溫醇典雅曲盡已意能道所欲言平淡而有涵蓄雍容而不迫切類其行巳靄然仁義道德之餘孔子曰有德者必有言信乎其有言也所可惜者連蹇埸屋不遂一第侍謀省幕道弗大行然化乎今者不必傳於後晦其始者其終必顯曰顯與晦必時之待楊雄氏所謂五百年必得其人然寥寥四海豈無知音者恐表聖之言乃為通論况有賢子孫為之揚顯者哉今文治蔚興學者日衆異時板本一出有序關右之宗派究蘭泉之命脈者則於是集知所崇尚矣翁三山史詠序自伯魚趍庭宣父訓以學詩俾興起志意通逹事理造夫大學閫域由是後之學者有以取法知所適從伊川先生嘗欲體詩敘童子切務令朝夕諷誦發其意趨蓋遵遺旨也六經之外其次莫如史然載籍浩博𥘉學者欲遽涉獵譬如算沙海上成功何年故前丗有帝王鏡略小學史斷蒙求箋要等編皆誘之易以覽誦速收見效今慶元路總判三山翁侯元臣復廣克前人規模取通鑑編年事迹顯著者綴聮五言絶句二千餘篇其歷代之隆替君臣之得失粲然具列辝直而不晦言簡而意足使𥘉學者讀之易曉而難忘庸他日融會通貫之漸或曰牽合章句破碎全史不幾於篆刻雕蟲之弊乎豫曰不然聖賢進修學有大小傳有後先子夏所謂譬諸草木區以别者為得之矣况翁侯是作特為童蒙所設就其所成就而論可謂祖聖訓述賢傳攄已志惠後學好古博雅者矣大德四年月日謹序燕山王氏慶弄璋詩引史館檢閲王生子憲自其先丗以篤行至孝培植根本子孫奉承家致屋潤復能尚義好禮為名公賢士夫稱道都城人物浩繁由是王氏以孝義知名子憲幼蒙訓誨卓有所立以良家子選侍閣門擢直玉堂謹願文雅出色同輩有光故家所不足者嗣續為念大德庚子夏佳氣充閭璋裳呈瑞犀錢玉果已浴蘭湯綵筆柘弓載臨晬旦以豫在院中最為耆舊來乞名乃取先丗積善而不近名種德而不求報命之曰餘慶先儒有云善惡之報至子孫而後定又云賢者必有後王氏其有子也冝矣謝庭春好羡樹玉之臨風竇桂枝榮望讀書而有日徐卿二子少陵有歌嗣深晬日涪翁伸頌凡與往來者皆冝作詩用展光賀贈李逹之詩序李逹字逹之汲梁人世將家既長遊燕遂占藉焉為人慷慨樂易好間便靜以相術行於時然不以藝自矜與僧西雲相善講主和一日以領宗門事為問切語其徒曰汝師不數日逺行尚欲何為不浹旬而逝又同術者指一井工有坎厄斃不出來日逹曰否坎厄則無將縊而死果然南官程總尹以除目訪之曰喜只在此夕口未落而除下其應驗若爾僧龕禪榻曽不惜朝鏡之蹉跎醉袖笻杖嘗歷遍春煙之巷陌丗味宦情兩皆泊如其兄顯道以偏師戍瓜步殊光顯也書屢招不赴或疑焉逹曰兄安余無所希覬何往其安貧守分如是者有屋數間在崇仁東市門田五頃近潞水淡臺里歲得租粟自糊其口云義齋先生四書家訓題辭義齋先生姓石氏諱鵬字雲卿父璧自五臺東徙唐封家焉丗傳儒業中戊戌選終保定路勸農使先生早以文行師範一方至元丙子用辭科魁多士資純篤恬於丗味惟閉户讀書務為無所不窺四書小學尤所致力集其所得遂至成書沉潛玩味者有年反復更易𥘉不去手易簀際屬其子承義等曰吾平昔精力盡在是書藏之家孰詒訓子孫吾丗其庶幾乎承宗奉遺命以敘引來請僕憶提憲燕南時按行屬縣與先生有一日之雅今雖衰耄忍靳一言庸慰存沒夫四書所載性命道德之懿修齊治平之方道統所由傳授學者所以修習推明天理維持丗教如水火菽粟日用而不可闕伊洛名公後宋諸儒集解纂疏論之詳矣近年月而公卿大夫下而一邑一鄉之士例皆講讀僉謂精詣理極不可加尚先生復能沉浸濃郁含英咀華發先儒之未及附巳意之所見自為一家之説其學與志可謂勤而知所務矣蓋士生斯丗不可虛拘出則行道濟時隱則立言垂後况性命之理仁義之端非由外鑠皆性分之所固有職業之所當為盡其在我者而巳𥘉無先後淺深之間故子貢曰文武之道未墜於地在人賢者識其大者子夏亦云君子之道孰先傳焉孰後倦焉是則先生著述之本意也若秪以篤信好學修辭明志遺訓子孫啓迪後學折中聖賢則義齋之名亦當傳聞于後於是乎書大德辛丑歲孟夏吉日題義齋先生小學家訓序義齋先生輔注小學書藏之家孰未嘗示人治命其子承宗曰當携謁秋澗翰學庶明吾志先生既沒鄉邑士人楊飛卿將板行焉承宗致遺命懇求序引僕向遊宦趙北與先生夤緣私覿欵洽則未也用是追念疇昔敢攄臆見昔晦庵朱文公既集注四書俾大學之道體用本末昭然顯著復慮童蒙之士弗知趍向次第不能入德義之門造治平之域復述此書俾為師者知所以教弟子知所以學雖曰小學其文辭雜出於聖經賢傳百家之書言微行懿顧老師宿儒究竟踐履有終身不能盡者近年科舉不行士趨實學曰師弟子云者專務講明收功致效舊有標注未極詳備今先生之注究其淵源辭旨之奧與夫品節度數之詳隨其繁簡而具載焉純直明坦俾𥘉學者觀之易於省解如陟髙而得梯階濟深而遇舟楫其急先務應時求不為無輔先生諱鵬字雲卿自號義齋保之唐縣人隱居求志潛心著書不求裱襮吾聞積善勤學報施不及其身而發越於後者必大則是書之出先生之志之學光昭於時也審矣西溪趙君畫隱小序豫既冠受館於漕使周侯因與門下士趙君子玉遊久之熟其為人資清雅而有幹局心機巧而善繪事其𥘉家藏營丘遺墨朝夕愛玩不去其手遂有所得繼遇東丘畫工沈氏指授筆法又嘗西遊太行窮巖岫之深峻觀雲煙之變化當其情得意會留連忘歸動經旬月由是於仁智妙趣得其動靜之理及操觚染翰覺心手灑灑無留思嘗為廉右相董承旨及僕作廉泉野莊秋澗等圗景氣瀟爽雲煙清潤筆簡而意足其寄興雲霞放情林壑有淡墨寫出無聲詩之譽或譏懷材抱技不沽價以求售曰人物者天地之幻化圗畫者又人物之幻影彼功名烜赫冨貴薰天者倐忽之頃巳歸磨滅况韋布之士欲取聲華於虛幻之餘不幾於惑歟然所以孜孜於此者特遣興適懷寫吾􅎍中之丘壑爾聞者為知言大德辛丑夏邂逅都城為豫臨楊息軒緑野探梅圗髣佛三昧不傳之妙復懇於豫曰僕老矣技進止此幸惠顧序述平生傳遺子孫乃語之曰昔曹霸樂藝而忘貧窮郭熙頭白餘筆力少陵山谷為賦丹青引秋山歌攀附驥尾名垂不朽顧僕何人敢望於二公哉趙君趙君其奈爾何子玉曰不然前賢後賢其揆一也古往今來各其時也顧在中朝問望老於文學者孰出公右言念夙昔能無情乎既不獲巳乃援毫而識之趙氏系出柳城宦族當天兵南下父通福以義勇附太師國王帳下從定河朔屢立戰功夀終定武漕使周侯以葭莩故表其勞績蒙先朝收録二子仍復其家仲列名侍從後歷尉完利等州州尹次曰澄即子玉也受中山三司使晦迹管庫餘三十年無毫髮點汚蓋其胸次脫灑不為物欲所纍故也五子秉仁秉溫緣父好尚亦馳譽丹青云是歲秋七月上旬二日秋澗翁謹述崇真萬夀宫都監馮君祈晴詩序大都辛丑夏仲暑雨大作霖霪不輟至五旬之久泥塗坎塪車馬不通潢潦瀰漫浸貫川澤小民咨怨農夫告病崇真萬夀宫都監石泉馮君乃謀於道衆曰吾輩奉正一法以祈禳為業覩其如是雖不吾以安可坐視而弗救耶於是致齋潔肅儀物籲告穹蒼飛檄諸部懇以七日為開霽之度及期果六丁斂虐曦馭騰光士庶獲覩天日晴明之快免昏墊陷溺之苦於是羽客儒流咸作詩贊揚湖廣儒學提舉戴月澗以序引見屬戴交久情欵有不能已者乃題數語姑塞其請豫嘗讀洪範九疇觀天人相感之際隨所召禎祥災沴應之吁可畏也故三代君臣遇災知懼固曰修已敬天為務而禱謝禋榮盡諸人事者自不容巳逮漢靜應張公以神道設教躰含清虛用周慈憫為國家祈天永命為黎庶祓除不祥由是祈禳祭醮自為一家之學傳授科式符籙具在也然得其人則法靈而著效笱非其人道不虛行傳曰至誠感神又曰至誠動金石道雖殊途其致則一若石泉馮君之祈晴有驗其亦持守誠敬祭醮精嚴善於弘衍宗風者哉諸君作詩稱美不亦冝乎其年秋七月草三日秋澗翁漫書窮閻飄泛逝川東千里嘉禾一雨空􅑷㩳羽林槍壘底林林萬木水光中慘舒何待鞭竒石禱籲端能格上穹千古盟威神力在崇真壇下振髙風紫山胡公哀挽詩卷小序挽章者哀傾逝而寓夫所感之辭也豫於紫山既哀之而復有以惜焉紫山起諸生進擢館閣揚歷省臺官至三品夀幾七秩順受委正略無慊愧於何嗟惜所惜者材超卓而不凡氣正大而有養可以挺公論而勵衰俗激清風而作土氣旦天柱峰摧少微彩晦士林憔悴失所景仰不知乾坤純粹之精山川英秀之藴幾丗幾年氤氲感會復生斯人此黃鳥之詩薤露之歌有不容已者忝與紫山三丗交遊氣合情欵故其子典簿特屢徴鄙作既序夫易解復記其祠堂今又以斯文為念孝心追逺誠宜嘉尚顧筆力衰薾奚能發潛德之幽光倡作者之端緒然眷懷疇昔重以陳太常北山之請敢攄平生所得於公而可深惜者冠之篇首云大德辛丑歲秋仲載生明秋澗書朝儀備録敘至元辛未歲大內肇建始議講行朝會禮儀蓋所以尊嚴宸極辨上下而示等威也然事出草創不過會集故老參考典故審其可行者而用之其後遇有大典禮準例為式祗取嚴辦一時執事者各司品節其禮之全體亦不能究其詳而通貫焉逮侍儀舍人周之翰供職乃纂述物色儀制之品班次度數之則曰朝賀曰䇿立曰開讀皆具已行而可驗復圗注以致其詳皇儀縟典粲然明白目之曰朝儀備録携示秋澗翁求考辨焉乃告之曰汝外祖文康公羽儀先朝粉飾皇猷號禮文稱首汝父松壑侍儀𥘉事綿蕝獲預選習今汝從事於兹又復有年其見聞之久講習之熟可謂專門學矣况禮之大經本乎天理之自然節文儀則出人情而折衷不容強知妄擬措私意於其間雖聖人不過祖述既往隨時去取故孔子曰周因於殷禮所損益可知也其所以行之者極乎敬慎而已故曰其在宗廟朝廷便便言惟謹爾則是書纂述非惟備豫考按即事可行若有集國禮而編會要者亦將有所取焉大德辛丑歲立春前五日秋澗退叟題恕齋詩卷序郎中李侯正卿其先世佐金祖開國子孫衍慶傳嗣侯爵易代後軒裳蟬嫣猶為燕雲巨族正卿資明豪踈財樂善有子二人俱教之讀書勉勵資藉之者惟恐不及與古人愛其子教以義方之説吻合衣冠修整僕馬鮮明喜交遊遇事慷慨與物無凝滯蓋有志於冨貴利逹者也人爽約以負之量廓然而能容或非禮以相干但理遣而不校尚恐其守之不堅行之不力乃榜其宴息之所曰恕齋又為未盡也質之於秋澗翁將求諸名勝題詠庸勉其不逮乃告之曰夫人之生稟精五行有情有性仁義禮智主之於中所謂性也喜怒哀樂愛惡欲感之於外所謂情也聖賢存養撙節求合乎中而已其恕云者既盡夫存養之功復推而為應物接人之道故曰推巳以及物已所不欲勿施於人蓋由內以逹乎外自漢以來不能體認聖賢求諸巳意思遂以恕為寬容之稱雖范忠宣之賢亦有恕已恕人之説是徇外以遺內也何不揣其本而齊其末哉今夫己之善推以及人其不善弗加諸彼則物之應於我者皆善自無出悖來違之戾尚何寬貸容恕之有今正卿既識其用復能明其體由未以逹其本日就月將緝熙光明則違道不逺矣雖然比之貪冒無厭覿於貨財較班資之崇卑計利害之得失不至傾陷攘奪而不止者為之猶賢乎巳某年月日秋澗翁敘秋澗先生大全文集卷第四十三
