front:
  text: 秋澗先生大全集卷苐八十八烏臺筆輔
  hash: sha256:672307898e72e869a6d8a74deda8b8e0956dc7920d84c20c2cb684e71ebabeb3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_088-1a}
body:
  text: 彈趙春奴不孝事今察到在都薊寧坊人匠趙春奴將伊親母阿焦生不奉飬棄絶在外餘二十年於今年五月內客寄患病有伊母親妹梁阿焦遣人報知其趙春奴並不前來侍疾至十九日夜母阿焦身死其院王陳姑兩次専人告哀本人又不奔赴停至午轉才方前來巳是帶酒並不舉哀又無衰絰復彂怨言雜以穢惡又禁伊妻不令哀哭遂將靈車用驢駕拽便行出送春奴隨逐道中又不哭泣亦無戚容言笑自若里巷人衆指詈不孝其逆心終不悛悔反生嗔怒先行去訖有姨弟梁從振者告到匠官黃元帥教依理持喪出殯本人故將喪事略不成禮只于當晚焚燒了當詳此情逆世所不容今京師風化之源憲臺肅清之府其趙春奴既為人子其於毋氏存殁之際梟獍其心絶滅人理較量惡逆孰大于斯其在國家實傷風化據此合行紏劾伏乞御史臺照詳痛加懲戒施行論鈔息復立常平倉事切惟天災莫重於凶歉國計無先於貯儲蓋諸有餘則國用足國用足則民賴以足今天下大約公私之間曽無蓄積以備凶年况郎目自中都而南蝗旱水潦十有餘路雖水至甚萬一失所官須存恤然不過發倉廪免租稅重為賑濟而已此特救荒于一時其於經國逺圖則未也以愚見莫若復先帝常平之制就各路巳有之倉令有司預為修理講明定法不使有名無實昔唐以稅茶等錢為義倉之本深為便益參詳合無亦將隨路平凖行用鈔庫工墨鈔息增餘見在等鈔分標州郡作常平粟本就令夲路轉運司兼以提舉收糴勾當續用逐年所得錢數源源不巳則三年之間百萬石之粟可不勞而辦是常有一年之蓄矣又會驗得常平倉國家自丁巳年𥘉立明年戊午宣德西京等處霜損田禾穀價騰踴百姓闕食官為減價出糶民賴以安此先事之效也兼安便官民其利有五且不動官本無害經費取辦於息取息之法又無窒礙一利也歲或飢饉就未全濟使民心先安大有指擬不必家至户到感念恩惠二利也其力穡之家又知國家貴榖賤貨務農大本使趍末之徒爭緣南畒不致有過賤傷農之歎三利也至若軍旅調度糧餉為先比歲軍興動輒和糴若常平一立除屯田糧及正稅外復有百萬餘石之榖積於中而壯於外時和歲豐民無所仰權以濟軍雖調度加倍民無和糴之擾軍免闕食之虞四利也歲稍不豐平價出糶鈔夲不失人賴以安使市㕓之徒絶幸災貪利之心貧乏之家脫轉死流移之替五利也若夫平糴常平富人社義等法歷代相沿莫能變易能一旦舉而復行則天下幸甚所謂不害經費為國逺圖良以此也據此合行呈覆彈縣尉楊政事狀體察得今年十一月內有在都住人崔提領將傳州人户丁五十妻支丑女作逃婦捉拿及稱被捉支丑女時有老劉等將皮帽金經卷兒等物奪了其崔提領與伊相識人大興縣見任縣尉楊政一同於施仁門關不居公𪠘問得支丑女不係逃婦明有根腳不容分析崔提領將支丑女用繩索鎖訖分付楊縣尉收禁責得本婦狀稱因夫丁五十赴都作夫患病前來探覷到永清縣河西務𬒳雀提領作孛蘭奚捉住寅夜強行姦汚問出如此詞因其縣尉楊政並不行移有司理問枉禁支丑女數日將崔提領所托老劉等奪訖金經卷兒等物却勒支丑女要培鈔六貫才將支丑女保出使本婦無處申訴為此就喚到太興縣尉楊政問得所説相同除前項支丑女等一起公事省會本縣尉司行移本縣依理施行外據縣尉楊政係京畿捕盜正官有此違枉合行紏彈彈馬全擅科鈔事狀今體察到𬋩上都路洪贊馬站貼户提領馬全自至元二年正月至五年十月終於所𬋩站户劉澤等處除正站秪應錢外擅自科斂雜泛錢鈔二定一十九兩九錢問得馬全招伏是實兼馬全年七十七歲老病不任勾當合行紏彈為收刈秋青草事照得每年和買應辦稈草不下六七百萬稱才方敷用切見燕京順天等處蝗蟲水潦若全依年例和買切恐臨時耽誤合無籍此秋間令從長計置秋青等草如法積垜向前兼戴支持用度官民侣為兩便據此合行具呈為私𬒳衣甲事狀欽奉聖旨條畫內一欵莭該諸官吏將官物移易借貸者委監察紏察欽此近於五月十三日在都百姓人等私賽神社其人往往𬒳執兵甲遊歷街衢前後數日及馬有挂全副甲者今體察得上項器甲俱係在京諸色官貟人等處借到參詳甲兵國家重器又欽奉聖旨已有眀禁條例今來諸人冒法抵禁私假小民以為戲劇甚非嚴制令而重武備也豈惟民不識法習以為常切恐因而别生事端據在都官貟人等務相假借及合干部分禁斷不嚴合行紏彈伏乞御史臺照詳懲戒施行彈市令馮時升不公事狀今體察到在都前市令馮時升於行鋪人户處取受行錢鈔六定一十一兩三錢五分黃米七石麵一百斤制府見行追培其馮時升却於今年四月間賫大興府保解赴部求仕省部依準將馮時升遷除保定縣尉去訖切詳市令係八品職官其不公如此事發在官已有承伏乃於總府告稱勾當已來並無粘帶亦無過犯其大興府亦不勘當是否端的輒便朦朧保申是屬違錯外據馮時升負罪欺官僥幸冒進以之臨民何所不至合行一就紏彈今後合無照到部人員曽𬋩領錢穀者亦於制國用使司會驗有無粘帶然後遷除庶望杜絶姦欺以厲來者彈步站官王提領不公事狀今體察得中都𬋩步站官吏王提領崔總把徐令史等與自願當站百户楊賆焦百户等上下通同作弊於站户百户馮百亨等二十名處纍次取斂錢物及尅落給散草料鈔取受羊酒逐莭不公等事據此合行紏彈為在都回回户不納差稅事狀切見中都親𬋩民户每歲供給和買夫役一切等事比之他路實為繁重今體察到本路回回人户自壬子年元籍并中統四年續抄計二千九百五十三户於內多係冨啇大賈勢要兼并之家其興販營運百色侵奪民利並無分毫差役照得欽奉先帝聖旨莭該斡脫做買賣畏吾兒木速兒蠻回回交本住處千户百户裏去者若稱有田産物業不去呵依已前聖旨體例裏見住處不㨂大小差發鋪馬秪應與民户一體當者欽此合無照依纍降聖旨處分事意取會見數分豁定奪驗實有氣力與民一體當差庶得協濟貧乏不致靠損據此合行紏呈施行為陜西鄭縣隱户計事狀欽奉聖旨條畫內一欵該載不盡應合紏察事理委監察並行紏察又會到陜西行中書省文符該欽奉聖旨莭文拘刷本路外來交參析居放良等户若州縣官如能用心將民户拘刷盡數到官遷官給賞如有隱藏定是降官治罪欽此今體訪到京兆路華州官司將鄭縣刷出漏籍等户六十二户並不申報上司私下取斂差發今問得見有華州人劉德亨並與所察相同是屬違錯據此合行紏呈為蝗旱救治事狀切惟古之為國者雖值凶歉民無捐瘠困乏者蓄積多而備先具也今隨路大蝗赤地千里就使撲滅巳成災傷其於貧民首先失所不無流移飢饉而救荒備患之術不可不預為計料何則今日唯先安集民心最為急務故謹具愚見二十事伏乞御史臺詳擇施行須至呈者一隨路總管府今歲伏遇天壽節除祝延萬壽禮數外權冝停罷公宴庶表朝廷優恤元元不以巳為樂也若然則雖古者聖王遇災減膳徹樂無以加此一御河上下有糧倉分冝差清幹官檢括實有見在數目外據借貸裝散變碾及上年河運未到倉粟數督勒所司嚴限閉納其通州李二寺等處應有露囤糧斛就水潦未動亦冝許諸人般運赴都城倉其腳價止支本色亦實京師濟窮民之一端也如挨陳者其闕食之家驗口賑濟不然令所在弓兵早暮兼為巡防以備踈虞一隨路啇販積蓄之家官冝出榜驗彼中時估量添價直發賣仍禁不得擅恣高增物價如百石以上不出糶者究治如官倉發賣其權豪冨户所糴不過十余石若詭名轉糴者仍為究治一隨路存留祗應銀糧如已到官者須土司明文然後動支若百姓緊闕食處仍作急飛申聽候許令賑濟其未納到官者盡行蠲兔一隨路站赤祇應如酒肉等物亦冝約量減免不然照依中書省劄付順天路事理一體施行不然是燕南二萬餘户獨不𬒳存恤之意也一河間路轉運司應收到物斛不下五七萬石冝無令回易銀鈔驗元價直輸河倉使充正課以備軍國經費侶為兩便不然如本路百姓闕食官定平價發賣一隨處金銀丹錫等坑治約五十餘所每歲穿穴淘採不無損泄隂陽之和有無合止者止以少養天地元氣一山林河泊之利所在皆辦外課有無權時蠲免聽民採取以供不給兼前丗巳嘗施行稍足復禁如初一山林原野係禁地去處如豬鹿鳬鴈雞兔之類亦冝許令採捕期以歲稍豐復禁如初一隨路交鈔庫鐵治所即目若有見在物斛去處亦冝取會見數仰所在運司出榜照依元價糶賣一在都酒務開沽者應有見在稻糯官司亦冝見數權令停止醖造此係前丗屢嘗施行一捕蝗之際不以諸色等人有材能識見規畫出衆者籍記姓名事定量如賞用又嘗聞飛蝗雖難打捕遇夜即須停止於坐落厚處傍挑坑塹燃薪草使之明照四逺然後驚趕蝗必望明投赴衆力從而撲滅説比比得濟合無試為之行恐是一法一莊農之民闕糧食者所在官司預冝出榜禁治不得推稱病疫私宰耕牛為食如博易米粟者聽準備翻耕出曝蝗子參詳最為急務一州府司縣官其𬒳災重處有能規措存恤百姓不致流移飢殍者仰按察司考覆得實申臺呈省以憑不次升用一急遞鋪兵俱係貧難下户若一處斷絶遞轉即時阻滯合無與中都迤北遞鋪一體給糧食飬濟仰所在官司專一存恤不致飢困逃散一每歲應辦官草收成尚然不敷今秋榖草顯見儉少冝趂時於無蝗去處收刈秋青等草將來兼帶支持用度一莊農之民所認六色課程如酒醋等課今蝗旱如此有無權時停免或從實結辦稍安復舊如初一隨路州府冝建立社稷䄍神壇廟令有司歲時致祭亦憫恤為民之一事也一隨路自省併州縣以後極有寬闊去處或有尉多係主簿兼攝至有全闕去處如山東州郡所在雖有專刷其地廣物衆委係難以照𬋩又體知得省部亦為此事先於東都路巳行添設專尉了當今蝗旱如此百姓嗸嗸切慮迫於飢寒盜賊多有不無驚擾冝約量隨路緊要地靣添設巡檢使鎮遏巡防以備不虞及村保設置鼓靣遇有警急互相應和一隨路如冨户有力之家能周贍貧乏或為粥於道以濟流民至千人以上者官為旌賞或聽一子臨官彈馬仲溫橫斂錢物事狀今察到在都曲河坊坊正馬伸溫因刷問逃軍於人户取訖寶鈔一十一貫八百文緣兩廂七十餘坊凡有事務不無搔擾合行紏呈彈忽都魯阿散不赴任所事狀今察到淄萊路長山縣達魯花赤忽都魯阿散前來中都部夫勾當至十月初罷役本官不行還職令女壻馬合馬等於本路關訖自十月至十二月終俸鈔若不紏呈緣忽都魯阿散係請俸親民職官到今八十餘日不行還職據此合行紏彈彈王千尸冒名代軍事狀今察到守把棗陽萬總𬋩下千户王仲賢至元六年入月內前來中都取發軍人其本官將合起正軍六名不令正身應役却行要訖錢物冒名替代今就責得本官下提控李德唐指證並與巳察相同合行開坐紏呈彈益津縣尹張文郁侵使鹽價事狀今察到霸州益津縣前縣尹張文郁主簿李璋於至元五年支不盡鹽折粟內侵使訖鈔三十三定三十五兩為此就問得州司吏杜唐佐並與所察相同據此合行紏彈為太廟中柱損壞事狀今體知得太常寺申都城所呈相驗到太廟中心等柱損壞訖一十四條訪聞先為劉晸監修太宫完備特注朝官重加賞賚今者未及數年朽壞如此顯見當間滅裂多不如法設若舊柱不堪自合改用新林擬壯麗今省部雖令劉晸用木填塞了畢終非可待歲月理合治罪以彰其咎至如太常寺近為經夏暑濕告出曝神室中氊罽有司尚恐褻瀆不從所請彼修輔動作之際其震驚神靈比之曝晒褻瀆實為加重外據不經奏請即令劉晸修輔震驚神靈事屬違錯合行一就紏彈為優恤襄陽軍人事狀伏見中統建元詔條內一欵莭該凡征進軍人臨陳而亡𬒳傷而死者其家屬理當優恤仍仰各路宣撫司量給衣糧優恤其家欽此又漢唐舊制軍士死者加恩致祭吏為衣衾棺斂轉送其家今聞圍守襄陽軍人經值今夏癘疫致有死亡俱係沒於王事誠當推恩矜憫有無照依巳行事理或令所在官司逸還其喪外據氣力孤弱之家取會見數量加優恤非惟激厲將士實恩慰民心感召和氣一端也為懷孟路新民不便事狀切見懷孟路新民三千餘户雖俵居六處終頻近大河又不在本路莭制之內巳是未便兼所𬋩鄭汪等頭目俱係宋人中間官民恆相告訐輒生事端無歲無之又訪聞得如修武縣新民見發姦細利害等事此其驗也設若狂妄無實人情臲卼終是不安合無將上項户計隸屬夲路𬋩領其舊𬋩頭目依例與𬋩民官一體遷轉不然於職官內選素有威德足以鎮撫為總𬋩亦是一便蓋往年巳曽令李同知宗傑於上安撫勾當一任之間特然安靜此非其效驗乎據此合行具呈彈兵馬司擅自鞠斷事狀切見在都兵馬司設馬步軍五百人係專一警捕衙門自去年至今年三月終強竊盜賊計六十餘起致有殺傷事主劫掠財物及本司公𪠘下為盜者蓋當該官兵不為用心滋多如此三限不獲行下取招並不回報其都轄上司縱令滅裂虛作行移亦不申明賞罰是作過之人無法可畏教之公行也都城輦轂之下庫藏倉廩諸所在萬一窺竊深繫利害又間有敗獲賊徒除事關權勢不能歸結者才方申上自餘無問輕重輒便鞠問斷遣豈惟侵司越職竊弄威權但恐中間姦弊日滋實為事害兼是司自來並無囚繫鞠問斷遣之理今後有無有令兵馬司據應獲盜賊略行取問即便解府歸結施行外據失盜起數巳獲者賞未獲者罰如此庶望上無縱恣虛行之失下革違錯自專之弊賞罰既明民知所畏京畿之間不待歲月作過之人將自消弭據此合行紏呈彈大興縣官吏乞受事狀今體察到至元六年三月內有施仁關倡户魚王嫂赴大興縣告稱男婦阿肖欲行私遁還家想見别有姦事有周縣尹并司吏張榮祿將阿肖枷收輒行推問指稱在曽與劉和尚安三通姦隨即撲捉各人不見却將平人劉貴劉慶甫監收至當月二十一日有周縣尹將魚王嫂劉貴巷長張仲義等公廳省會傷和了者至二十五日有魚王嫂要訖親家肖大買休鈔一百四十兩及劉貴安三劉住女休和鈔九十兩當官有本把張榮祿取要訖劉貴等家錢物鈔三十八兩九錢紵絲二匹又有打合休和人罷役司吏張權縣要訖安三鈔一十五兩祗候人馮首領董靣前要訖鈔九兩打合人韓大處見收鈔一十七兩有周縣尹教休和了當為此喚到司吏張榮祿等略行問得是實就追到鈔六十三兩紵絲二匹贓狀至甚明白據本縣官司止合依理歸問阿肖不合背夫欲行私自還家罪犯外據想見别有姦事一莭係是稱疑詞因别無堪信顯迹依例不許經告官司便行推鞠令阿肖招説曽與劉和尚安三通姦輒生事端亂行撲捉搔擾收禁兼魚王嫂娼優之家官司不為詳審致令當行令史收受錢物為無慿據却行省會休和如此開閉幸門撓亂公法事屬欺枉合行紏呈彈良鄉縣站官私取工俸事狀今體察到良鄉縣𬋩站官王提領等至元四年至元六年於站户納到祗應錢內侵支訖鈔數為此就責得司吏王仲筠狀供𬋩站官吏於至元四年至元六年祗應錢內侵支訖鈔八定二十五兩五錢據此合行紏彈為孫彈壓代軍事狀今察到左衛親軍總把張大亨下彈壓孫旺至元七年二月代替訖哨馬劉本户軍役周歲雇軍絲一千兩巳得訖絲一百兩就取問得孫旺招伏是實據此合行紏呈彈固安州官吏尅落鹽折粟價錢事狀今察到固安州官吏將至元三年鹽變粟數作至元四年鹽粟見在報過大興府依巳報四年粟價每石四錢五分追鈔其固安州却分出三年粟數依當年粟價每石六錢追鈔為此就責司吏張安仁狀供當元係司吏于仲淵等將三年支不盡粟六千四百四十四石二升作四年見在報過在後總府依四年粟價每石四錢五分追要鈔數此時照出三年粟數并價直於前州官劉州判處啇量蒙擬定三年粟數止依當年粟價每石鈔六錢追收見收到鈔二千七百兩五錢四分得此文狀扣算得三年比四年粟價每石多鈔一錢五分計多餘鈔一十九定十六兩六錢據此合行紏彈彈東安州官吏尅落鹽折粟價錢事狀今體察得東安州鹽折粟價至元三年每石六錢至元四年每石四錢四分除起納就支喂馬駝外至元三年見在粟二千六百九十二石至元四年粟八千八百七十五石五斗二升一合七勺有司吏李讓將三年粟數併作四年見在申報在後大興府驗巳報四年見在每石徴鈔四錢五分其當該司吏李榮并提控楊守榮却將至元三年粟數依當年每石鈔六錢追收比四錢五分餘徴鈔八定三兩八錢略問得司吏李榮狀招巳取到三年鈔折粟一千五百四十石六斗五合計餘徴鈔四定三十一兩九分據此合行紏彈乞徴問取牧馬地草粟事狀今察到涿州站憀占牧馬地內有熟地二百七十七頃二十二畒每年召人租種每畒收粟三升稈草一束為此取到𬋩站官提領馬仲祥呈並與所察相同今扣算得上項地畒每年計取粟八百三十一石六斗六升稈草二萬七千七百二十二束且自至元三年為頭至今四年計粟三千三百二十六石六斗四升稈草一十一萬八百八十八束據此合行紏彈彈東安州司吏張芮不公事狀今察到東安州刑案司吏張芮贓濫不公為此就責得張芮招狀於至元四年十二月終劉同等處免刈葦草要訖鈔四兩五錢至元五年免放李守政解鋸夫役要訖鈔三兩至元六年七月於娼女常海棠家內飲酒逐件是實即追到鈔七兩伍錢再將本人審問無冤斷訖二十七下勒停了當今將上項鈔七兩五錢隨呈解去伏乞御史臺照詳施行體訪保申令史曹士良狀訪問得曹士良隻身於在都銅馬坊寄居住坐於今年六月內前去上都至今未回今就問得左巡院司吏張仲禮稱當間係燕王位下趙二奉御對警使警判保舉曹士良係真定路附籍人户儒吏俱通以此準慿轉保申府了當今來切詳既大興府令本院踏逐通經史令史一名自合公選可應之人其左巡院官却行徇情轉保訖自來素不諳知人貟事屬違錯據此合行一就紏呈彈涿州站官私使祇應錢事狀今察到涿州𬋩站官劉提領等至元四年至元五年於站户納到祗應錢內侵支訖鈔數為此就問得次官提領馬仲祥稱本站官二貟吏三名於四年五年祗應錢內侵支訖鈔一十二定是實據比合行紏彈彈趙州平棘縣尹鄭亨事狀今體察得趙州平棘縣尹鄭亨自到任巳來聲迹至甚不佳本官酗酒狂為連結朋比遊行私家無日不飲及求娶娼婦展散不公挾弓放彈損傷人目如此非違事理就問得本州司吏王柔張才稱與所察相同合行具呈伏乞御史臺照詳施行一本縣西關開門户娼婦邢絨哥其鄭亨私先往來於今年七月內求娶為妻照得舊例監臨之官不得與部下百姓交婚雖會赦猶離之况娶娼女户主為婚參詳縣尹字民之官務在肅清所部禮義興行今所行如此事屬汚濫一自到任至今别無可稱聲迹與本路扇趙史提控王太醫靳提控日逐朋從遊行私家飲酒無度如今春北寺救火其鄭亨乘醉執持棍杖沿街驅率人衆致將小耿打傷頭靣參詳應救而不救自有條禁罪名豈得恣為歐擊亂行無法足見居官素無政體事屬違錯一於今年春令在縣祗候人屈首領引宅司鄭都𬋩於縣西村分發訖馬尾羅兒約三百餘箇每箇要白米一斗無米斂金一錢四分其公然展散無所畏避事屬貪鄙一今夏捕蝗自佛寺為頭迤西村分所至輒取要雞酒每飯殺雞數隻且天災如此農民嗸嗸困於捕役當此之際其鄭亨恬不為意飲酒食肉以悅口腹其為不恤無重於斯一去年夏挾弓放彈將縣民曹博士左眼打傷致令本人損傷訖一目無所告詣照得放彈及投瓦石在庶民猶有明禁詳此縱或誤傷亦無一方師帥民所具瞻挾彈行遊彈射鳥鵲而為少年童子之事是為不應合行紏彈薦濟南士人楊從周事狀蓋聞為國所重必在得人報恩之義莫大薦士今體訪得濟南士人前監察御史楊清卿孫楊文郁天資雅厚質而有文子史群經多所浹洽今年近強仕經明行修不求聞逹侍庭闈以𬞞水悅親居鄉里以教授為業傳箕裘於三丗罔墜先聲藹聞望於一方式敦薄俗誠當代之孝廉士林之挺特也儻蒙省録必有可稱不惟激士夫進學之心庶幾愧奔形勢之者於肅清風化似不徒然謹具狀舉聞彈中翼軍搔擾百姓事狀今察到中翼侍衛親軍楊千户崔百户髙彈壓下軍人自至元五年八月前來武清縣北鄉等處於民家安下每日取要飲食及遞互斂索馬匹草料至甚搔擾不安少不應副恃賴衆力輒發惡言恐嚇侵凌無所不至每年直至來春三月才方起離雖曽陳告縣官不能禁制使當差平民無所赴訴深為未便今就問得夲縣東至孫家務西至牛人南至召香二十餘村及取到百户梁仁主首趙百春社長田祥等狀供與所察相同據此合行紏呈彈漕運司差委官非理搔優事狀今體察到漕運司同提舉下委差唐古張千户等於今年正月間騎坐鋪馬三匹前至武清縣北洪濟鎮將夲鎮主首張聚等用繩子拴縛打拷非理取要飲食等物就責得張聚等狀供與所察相同看詳本鎮不係站赤路程遇有使客鋪馬飲食皆取自民間而漕司官吏每年不時經過其唐古等恃賴本司形勢如此縱暴不公非止一次略舉今次強取要訖物件并多取訖飲食數目合行開坐紏呈彈李二寺倉損壞官糧事狀今察到李二寺通濟廣濟二倉見在糧粟用露囤收貯其倉官不為用心以致倒榻訖露囤五十八座並不修理損壞官糧計尤千八百餘石據此合行紏彈彈右巡院淮攔王得進事狀今察到在都西曲河坊丁阿齊女心哥召到弘河人户王得進弟王千奴為壻於至元六年十一月內為病卧於積糞團標內凍餓身死並不停喪依理埋殯恐鄰佑知覺比及天明擡􅐝出城燒揚了當其丁心哥亦不持服於今年五月內有母阿齊接受訖本家安下數年今平凖庫劉大使財錢鈔三定金子六兩為妻了當又買與丁心哥女婦一名於八月內有王千奴兄王得進具狀告到右巡其本院官吏雖判勾行並無取責却有坊正陳提領為與丁家關親遂拆令折和至當月初四日丁阿齊與訖王得進買服物折鈔五十貫其當該司吏劉淵兩次要訖王得進鈔六兩祗候人小楊等二兩七錢於初九日接訖攔狀為此追到元行文卷及問得元告人王得進并過錢人薛仲甫張得林隨逐劉淵人劉得進俱與巳察相同今來參詳據丁阿齊圗財主婚濁亂人倫不有所天其劉大使明知違法輒行求娶其右巡院官曽不詳審俱係妄冒敗俗傷化之事輒虛調行遣並無取責却於公廳接受攔狀縱令公吏等人私下折和如此開閉幸門撓亂公法事屬違柱合行一就紏彈論課稅户隸總府𬋩領事狀切見隨路運司見𬋩課稅户五千七百餘户契勘係先朝初立課稅所時將應設官吏就作本所户計用之添重氣力協辦課程今運司巳立數年其官吏及院務人貟皆從朝省擬注據此等户計實無所籍近體訪得尚書省遍行隨路如遇婚姻田産詞訟等事令總府運司關會一同歸斷給者往往有之深為未當至如隨路奧魯比之此户尤重今巳令總府𬋩領近年巳來至甚簡便合無除竈插户外其餘一隸總府𬋩領實為長便論法官沈侃升用事狀官沈侃性端方通經旨知典故年雖耳順精衰於老成實具典刑在司理誠為師表兼本臺執法如侃者議斷公平情文兩得至比理冝升用以表良能秋澗先生大全集卷第八十八
