front:
  text: 秋澗先生大全文集卷第六十九
  hash: sha256:1cf0e42a524738383157821fdf9f3eca42be124e073c35c027a2907715ef42df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_069-1a}
body:
  text: 疏衛輝路創修文廟疏竊以廟而通祀國家極典禮之尊教以多方庠序乃風化之本子焉而父臣焉而君大凡日用之間無匪聖人之道既冨而教以時則冝猗嗟君子之邦久曠素王之位吏之不職孰此重焉學之不講是吾憂也爰興丕構庸示教基擴前日輪奐之規敞百代神明之觀經始雖先於一府贊襄實賴於諸公蓋土木之資瓦甓之用須豪傑而共濟庶程度之可完仰止翬飛永鏘玉振春秋二祀肅豆籩三代之儀衮冕而王還文物昔年之舊凡我同盟之者即當聞斯行諸謹疏大成殿上梁疏伏以起百年之廢不渝乎素心合四境之人用扶其修㨂凡曰有生之者孰非吾道之中功將底於落成衆能無於小助况鄉校半讀書之子而師帥舉稽古之流重瞻弼衛之天久𬒳絃歌之化推求治本一出儒宗敢紆長者之車來聽兒郎之偉謹疏重修衛州蒼谷山廣施王廟疏伏以民所欲而神必從冝深乎報神有享而民乃主否則疇依顧維明神爰處蒼峪司分雨部權控龍威時罹暵乾禱輒靈應且王號巳昭於舊典而秩恩又見於新條比者祠字年深榱楹日圯塵昏畫像慘雷轟電擊之雄瓦落宫墻動木老雲荒之嘆今將上完霧棟旁奕蒼池及時瞻山雨之來闔郡享豐年之賜神報義已豐矣公等冝如何哉謹疏隰州蒲縣重建嶽廟臺門疏伏以鐵鳯翔雲神棲固極於壯觀銀臺墮墜天廢必假於人謀眷岱嶽之行宫據蒲城之右麓豐碑具述歷代增崇雖作鎮於東方實普臨于率土有禱輒應顯化殊常蓋幽明祕不測之神而死生為揔歸之府兹非尊奉曷致敬恭今將大復神譙俾還舊觀計百費以實博顧一巳而難為衆力經營厥功可僝舉蒙少助不日告成靈威肅喬木之風雲氣動孤山之色璇題藻棟儼九天來格之儀僚寀黎民獲三殿護持之福幸垂藻鑑請署芳題玉清觀化緣疏竊以雲飛鶴舉固所去以為常火食屋居在有生其可闕未遂山林之往所期性命之安如某者忝鄭圃之居久滿户間之屨慕子真之隱擬耕谷口之雲雖南鄰北里揔是檀那而凌雨震風可踈寢處為歸翼數飛於夢蝶奈拙謀復甚於林鳩王録事倘助於草堂庚桑楚庶休於畏壘田園成趣平分乎二頃煙霞杖屨它時共樂此一庵風月凡曰通方之士能無尚義之心鄆城縣普濟寺化緣疏伏以建外道埸不獨為天女散花之供祈聖人壽庶或盡臣子永命之心眷髙魚之北鄉乃獲麟之西鄙古瞻勝槩地發龍光巳霑普濟於明經未覩華嚴之寶界今將百堵具舉精籃聿修需仗衆緣能成妙果道昭者雲龕野衲海嶠行騰卓錫得泉了此這埸諸佛事投竿在水肯教空載月明歸謹疏請黃先生德新主善疏三年至榖諸生忍廢於光隂一卷立師學行首明其模範惟大冶有鑄金之妙良工收琢玉之功况漢庭發䇿本之明經而近代程文自有定體欲造科埸之捷徑須求事業之專門伏惟殿元先生藻發儒林道傳絶派繼踵于黃氏三山之後探賾乎上古八索之前而又馳騁乎百家通貫乎六藝春闈陳合筆驚風雨之聲夢澤胸吞文麗江山之秀久矣倦遊之興偉哉樂育之心倘蒙憫小子之斐狂永以為國人之矜式髙懸絳帳嗣音敢自於吾儕仰屬青襟固讓毋勞於謙德謹疏襄陵縣重建飛橋化緣疏伏以平水澮川依約金城之舊彩虹沉影空餘華表之遺矧當晉秦南北之衝有秋夏泛溢之阻僧淸者心存肯搆力振前修經營者己數年奔走者幾萬里每以力微而事大懼夫始作而終衰驅石必東海之鞭洪波可駕銜木仰西山之鳥尺喙徒勞在他邦果於義為豈鄉國獨無至意倘垂一諾過重千梁少分有限之功隂受無量之福公私安濟免勞鄭國之乘輿遐邇具瞻復覩河東之偉觀謹疏追薦孤魂化緣疏切以辝辨遊魂雖著長終之變傳明滯魄深詳為厲之文久失所依誠為可憫痛彼河南之戰重為天下之傷血殷溱水之波尸蔽奉寧之野兵自休者巳三紀祀而存者能幾家野祭不來愁絶喪元之勇士沙埸半殁盡為亡社之遺黎蕭條蒿里之悲風黯慘棘林之老月尚過者動虆梩之嘆况仁人同桑梓之情義所當為祭而非諂凡我見而知者忍不聞斯行諸故謁同盟畢茲大事魂兮來些庶幾貴賤之攸歸心獲所安不謂幽明之有識倘蒙金諾請挂銀鈎上張宣慰疏代劉進之作切以辱甲子於泥塗趙武有由吾之嘆轉江沱之窮鮒昌黎云投足之勞懷古傷今而復有此進之先生文摩屈壘心醉麟經學詩得東野之窮好學有征南之癖以壯歲負并汾之氣幾年為河朔之遊老雖益堅空至於屢拭白首窮途之淚夢黃雲畫角之秋思歸敝廬得甘饘粥撫孤松而吊影望先壠以含悲具爾是逢翻然可駕麥船惠顧一帆助順濟之風華表歸來獨鶴遂長鳴之願伏惟使相學士閣下氣嚴霜簡名在帝心炳趙衰愛日之輝聳吏部泰山之望爰從公議兩鎮名藩承流巳浹於河汾宣化又漸於海表去國見似之者喜同聲亟相應之情嗚呼託子而來嘗切慕古人之義請書而去思遊揚足下之名為成尺素幸念鄉扮之舊與分鄰燭之光倘請題芳字謹疏為宋儒揚從龍贖身醵金疏切以觀軍府而釋鍾儀傳美晉侯之德解左驂而贖世稱晏子之仁古則云然今亦能爾唐風雖儉義則豐荆璞未逢遇和則售士人楊從龍者晉州客吳會諸生念江湖當波蕩之餘得升斗遂身安在士庶官寮之者當體寬恩以吹噓惠費之仁不過一宴倘蒙金諾請署芳題算學主善疏眷言六藝數之先訓彼群蒙業必專門之者伏惟冝之先術窺海鏡心洞神機以勾股而測髙深極乘除而盈縮挾此九章之妙屢為一卷之師倘許光臨豈口傳要訣同趣開悟之方手算万籌庶無倒顛之謹疏為刋金疏發明德豈惟鄉國之賢關繫民風庶見事為者凡一十五卷計字數近六七萬言其傳必録諸梓惟是間居之久苦無力量之多費口糧倘蒙少助雖夜光明月不為暗投公等我正賴有此耳謹疏太康縣創建忠武史公祠堂疏伏以臨危脫難無深骨肉之恩報德靡忘莫重春秋之祀太尉忠武公曩分帥閫東徇京畿擴仁心而斂兵鋒招柘城而降陽夏繼來臨戍尤盡撫綏雜耕無相擾之私按堵享維新之樂百年父老廕自餘休三尺兒童慶延史氏今將起神祠於舊里昭大德於邦其等雖經始於一時敢獨專其至美庶憑衆力易見成功具我時瞻要擬甘棠之木眷言遺愛豈惟墮淚之碑凡我同盟請題芳字秋澗先生大全文集卷第六十九
