front:
  text: 秋澗先生大全文集第十九
  hash: sha256:c66bee622bcb694a7acc95ea842f96b2292241fee8695416b37d14831aec1718
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_019-1a}
body:
  text: 七言律詩老境六適并序夫人生百歲如馳駟過隙能幾七十者又復幾人所謂倘來外物猶浮雲過日亦何足道哉因感壯年所行多輕生之事趍前太猛一也讀書過分二也飲酒無量三也妄慮坐馳四也喜談耗氣五也戰藝多勞六也不肖今年已踰六旬念此六失覺五十九年之間何趐是耳而驚而愕且畏且怖豈勝既哉故養生之念蹶然生于中蓋其勢有不得不然者因作老境六詠庶幾與吾同疢者聞之不無少有所戒亦老者安之之意也至于直逹性情以救往失初不以工與拙為計也幸觀者無誚至元二十四年冬十一月一日秋澗老人謹白飯飽即步殘書讀罷午飱餘信步徐行當澤車接武徑過通德里談玄時到故人廬老便步穩靴無襪靜愛聲璆佩有琚相送歸時燈巳上到床一枕即華胥目倦忘書辛苦雙明六十強滿前花黑理應常酒杯縱對甘無分書卷相看任久忘虛室靖深便默坐午窗晴爛怯餘光悠悠未了三千牘吟諷從今付窟郎言慎飬氣聚首間談足是非到頭贏得小人歸屬垣有耳嘗捫舌守口如瓶慎動機珍惜無先吾氣浩坐忘深識道心微客來客去俱恬靜克已存誠恐庶幾食甘戒飽食前方丈肉如陵莫遣分毫胃氣勝百斛盡從中所過微軀能不病相仍巳飢便飫甘能止過軟雖鮮熱即乘此是老坡真聖樂免教携杖去騰騰寤寐絶思夢神依例到殘更目似鰥魚了不瞑正為膽寒增展轉不緣身老惜伶俜滌除玄覽歸安靜宰制心君入沓冥昨旦早興襟韻足不知青鏡鬢星星息藝休心辝筆縱橫更老成秪來虛譽不根經風雲滿眼嗟何有月露盈箱笑未停肆口成章終妄作忘言休思是頥齡子淵直在心齋妙一字何嘗及性靈坐倦即眠坐暖團蒲倦自然夢歸先到蝶飛邊膂􅘡癡絶凝盤石肩井斜傾似墮鳶香散餘馨栖翠被燭搖寒影掩殘編老來境界無多味飢即思飱困即眠一作不教怠氣加吾體愛然中和論性篇香冷燈殘靜枕帷竹窗幽思獨依依時情久與詩情淡鋭氣夜氣歸空控孤膺堅鶻坐漸驚縫掖擁腰圍味雖同體未分甘從朽木譏汲城懷古尚父祠荒草滿扉伍城猶在陳圖圍飛梁水落橫霜瀨石馬門空半夕暉竹簡有光陵寢破山川是昔人非臨風笑煞安釐事甘著虛名博禍機夢王尚書子勉時罷中丞在楊州丁月日分明昨夜夢王褒海上歸來從鳯毛燈下留連醉筆端揮灑挾風濤滿囊文具為余贈四座春風倦士豪與客忽從窗隙去惘然驚覺聽雞號冬藏木葉歸根到閉關遇藏𥘉匪避冬寒孔宣何苦韋三絶顔氏胡為樂一簞庭户信知吾道在光隂移入畫圖看此邦雖小無窮事定力先須似石盤小邑都來掌許間紛紛人事日多端敢言絶學希不解呼盧去效韓身老轉驚謀道拙時艱難作強歌歡正須一室虛明地時著間身引睡看丁亥歲十月十日夜夢乘船渡一大河既濟望南岸一閣髙數百尺窗户北向自簷至地上下以琉璃大簾垂蔽翠色半天甚竒麗也雲間髙閣翠為簾疑是仙居擁衛嚴虹影蕩搖青帝闕海風吹墮寶陀嵐半空倒景驚竒絶千丈搖光入顧瞻我自平生多異夢似憐方朔詫雄談篘飲李縣丞靖伯約嘗新釀坐客有云酒之醇粹莫胚胎若也遂篘而飲之偶得獨腳句醉歸為足成之如能可君等雅意便當屬和時至元丁亥冬十月八日也瑟縮松凬滿甕春甕頭篘飲有餘薰醉鄉日月時須到太極胚胎昔未分肯放小槽珠作滴快傾浮蟻玉為群人間愁緒知多少一盞能消正要君誰擬鯨吞罄緑樽一杯聊示試芳溫中含妙理何多味細捲春江侭帶渾談藉清光搖北海詩慿風韻繞西崑知君預報時須意免故來𫾣月下門透月岩偶到君家思適然一峰竒石墮吾前千金欲買𥘉無價百穴潛通小有天花露逗香滋碧潤月娥含景愛幽妍從今紫翠芙蓉夢不到齊州落照邊成氏西灣即事栽種西灣趣已成主人置酒約同傾小車來駐林間閣藜杖間看兩后耕老圃生涯非細事滄浪清濁任吾纓少陵苦愛溪居好興在千章夏水清南陌東城占却春西灣深處最藏珍青芽破粒柔桑稚紅袖迎門杏蕾新醉裏光風多樂事老來清貴是間人就中更愛清溪水隔斷西風庾亮塵壯年心事幾虧成每對蒼髯聽細傾夢裏江湖幾走遍林間雞犬却歸耕潘輿正要間居賦蘭佩誰堪海縣纓脫却烏紗有忙事甕頭春釀漉生清海縣纓暗用解蘭縛塵纓事海縣調周彥出為海縣令也清明日花下獨酌時戊子歲草七日遊泗溪作人家拜掃重清明羅綺翻香曉吹輕不欲把書成兀坐也隨遊子出重城間雲弄日何多態春水平橋不礙行勝事自知還獨往一壷耒就淺沙傾後一日雨中招林韓李三君子小酌且為梨花洗粧時新植梨花一株盛開花滿金罍酒滿樽一杯歡飲得佳賔近年樂事無今歲此際間身有幾人祿美勝於三品料臘香清徹六根塵風簷數點催粧雨辨與梨花作好春東坡汲乳泉圖儋州遷客玉堂仙服食天教得乳泉三咽遽驚滋浩氣一甘無壞是泠淵中朝清議孤忠裏瘴海鯨波九死邊落月淡隨人不見滿襟風露獨翛然道宫獨發乳泉香似與坡仙養浩方井冽不從炎海瘴味甘還比上池觴化機軒豁元胎濕孤影追隨月色蒼天地此身忠義在一杯三咽濯肝腸送姬仲實隱士北還紛紛未術例從諛邂逅淇南論有餘賈傅自憐多感慨東門何意泥孤虛雨連賔館留三宿天遣幽懷為一抒覺我胸中聞未有九峰新説曆家書九峰一作一篇壽器之國醫學開金匱得真傳濟物功深不自賢前輩衆推楊獨步後來誰與子爭先青黏有術扶衰謝白髮相看度歲年此曰樽前祝君壽一杯還代上池淵白簽事彥隆哀辭素菴一氣本龍佟心苦時違揉與同強仕有懷三品料發言都是四書功愁隨野草憂春雨恨滿山城對學宫誰為魯齋興起地古共門外便秋風王師中哀辝玉樹庭階自幼看九霄雲路到鵬搏天門折翼差何及宅相論微理未安咄咄向空書怪事涓涓揮淚濕門闌應忴遺愛祠前柏恨鎖秋風月影寒壽少尹寶同知寶丁平章子秀稟金天一氣晶規模全是漢專城當官治劇有餘𥙿臨事知幾見老成門閥起身真相種天池刷羽看鵬程一杯領取千秋夀細著檀槽合玉筝顔氏冠詩寄蒲城主仲白祠李知觀一握儒冠綴七梁金絲勻織玉為相顧瞻遺制從顔始陪侍先師見色莊巾卷在庭聊束髮玉簮橫影夢升堂切雲莫羡如箕大曽冠三千弟子行紋背藤梁玉色瑳師傳元與薛同科薛模為西􅗛冠師出高帝紀要盤白髮三千丈間過春風十二窠衰俗幸存加冠禮滄浪無用濯纓歌敝餘改作須重丐玉導先期為細磋朱砂餅菊詩并序秋澗翁觀化於秀春園見菊之種甚多有所謂朱砂餅煙脂紅子以白與黃菊之正色今變幻若爾何哉或曰接之於艾致然豫試為之説曰艾火草也菊亦陽種也以二物方盛之時使客于艾之末未有不隨其主之盛氣而變者又赫以鮮者陽之精也故有硃砂之異此雖小事亦氣化之類也格物者不可不知故序玉餅金蟬爛熳秋朱砂為質更風流天機欲測司花巧物色先從氣類求孕秀似鄰勾漏井分香當上絳霄樓朱顔厭對柴桑客恐覩空杯笑不休送録事薛彥暉秩滿北上秦隴風聲化有邰規模况自左山來三年弊邑淹良驥一日銓曹得茂材撫字論功書上考廉能核實到兼該春風領取新除去喜動門山兩翼開王尚書子勉挽辭三首淚灑行間閲尺書訃聞三至尚疑虛佳城一閟無開日聮事三年忝二車詞筆早推韓愈健曠懷未覺孔融踈那知一夢終天别惆帳春風隔綺疏少孤綿歷太迍邅甫壯光榮四十年氣運倘來方出限愛心先斷便終天魂飛楚些和雲慘淚灑淮壖與海連左袒客衣三匝去延陵冝為聖稱賢婉孌英姿自妙年奎光空照玉堂仙辦教一世龍門重誰遣三王鼎足偏曠度包荒無徼略秋濤翻海失鯨鱣百觚未醉螺臺酒重為斯文一泫然逰蒼峪青岩山有懷烈士甄濟義重於生視若歸封刀無復騁霜威千年喬木髙風在一片青岩烈日暉元稹論忠真不愧杲卿摧逆與幾希環山弋獵猶知畏白鳥衝煙自在飛啇左山副樞承屢念及作詩以答雅意四十年間凡九遇感公翦拂使長鳴三蒼論法傳餘藴七扎量能綴賤名曉日嶽祠留語别秋風韋曲餞豫行傷心緑野堂前月空遣流光照斗城賀士常侍御受吏部尚書識鑒久歸清議裏恩光今著履聲中文章曹植波瀾小星斗潮陽譽望隆除重不知黃散目輸誠思輔燮調功從今不鎖春風部管取銓衡𬒳至公題懷孟路宋總管太夫人九秩詩卷七十邦君九十親人間此事少同倫柏舟髙節徽彤管鵉誥清光照畫輪步履不緣扶杖健精神猶比結䄜新河陽莫説潘輿樂沁水花時别有春身寵家溫親老健福全無似宋門榮漢宫傳訓斑儀在萊子承顔彩袖輕孤節徑於相水竹九齡春動野王城年年壽席聞佳語南極星邊婺女明和陶主簿見寄詩韻時主肥鄉簿半生鄉國共遊居老去文交樂更餘苦厭物情多薄相每吟風雅入吾廬一官稍得寬民力三飰何憂進野𬞞聞説列人真吏隱竿頭還有再懸魚哀挽亡友中丞王兄五首百蛇墮地一能龍知巳相須不易逢僧孺固應知杜舍臧洪𥘉不負張公扶搖羽翮翻溟海作養功名上景鐘自笑澗松居不巧半生清露到虛蒙嚶嚶求友幼同聲五十年來好弟兄零落山丘有今日笑談樽爼意平生酒壚不隔河山斷隂翦其如骨蕞征用韓文公臨終事寂寞逍遙堂後木對床風兩最關情故人牢落曉星踈此日三王獨在豫泉壤冷埋和氏璧牙籖空見鄴侯書問誰久視嗟同盡老失知音慘自餘從此故祠鍾鼓地謂去歲冬用三獻禮祔母夫人于室此禮久廢君首行之良可嘉尚過庭趨處半蘼蕪參議公在時賔客與君相接者未嘗坐正堂上其謹敬如此衆詬漂山不易安勢張那復漲狂瀾一時附會真堪畏此際支持誠獨難貝錦斐文哀巷伯瑶琴幽橨變猗蘭一言曽擬桓矦辨醉裏哀箏為謝彈病臻留飯作終天示我新文已惻然竒疾變常才四日佳城埋恨便千年囑遺不及私門事燕翼全規誡子篇惆悵西山埋恨處定應大鳥淚如泉用後漢楊震事牡丹洛譜丹青説典刑畫欄春日見升平金盤薦品承朝露翠幄留香護玉鈴神女賦中羅襪步少陵詩裏麗人行百壷莫惜花前醉樂事從來不易并海棠桃李無光分落英海棠姿色占春榮雲鬟緑擁粧𥘉罷醉臉紅勻睡未醒任使無香真可意放教千葉更多情光風流轉都能幾莫惜沙頭倒玉瓶挽史九万户半生希古振長纓隱隱胸中冨甲兵三篋輔遺安世博千金為壽魯連輕春風故里鳴珂逺暮兩山丘宿草生一傳散仙懷素敘為君珍惜比書評小園即事間來無事欲何營揔是栽花種栁情汲水溉餘紅藥秀繞欄看得緑隂成身參化育行當健物喜安舒悟養生放下虛窗時倦卧夢驚還聽乳鳩聲小園清潤稍堪觀翠有庭筠馥有蘭未放薔花金作蕾已開梨蘂雪為團鳥欣有託扶踈樹客喜來慿詰曲欄深院日長須細履也勝愁坐兩眉攢託陶晉卿借鄭氏所藏劉房山行草效吳躰出入格房山一字三過筆此帖揮灑何其殊臨遊親覩長史作透綃又似涪翁書春葩舞女多姿態逺韻髙風見步趨手追心慕情正切託君為借今何如復作一詩以繼前韻鄭家數幅房山書自笑伎癢須臨摹五陵裘馬見年少兩漢劒履多文儒遊談得敘真可壯破冢求法何其愚煩君更擊馮夷鼓未信驪龍不吐珠戊子歲穀兩日中丞王兄令李子師中携名酒洛花相餉作詩以謝殷厚洛艷紅嬌醴味佳併携春色照人來豐苞細拆先三嗅醁蟻連傾盡數杯北里定應香作陳西園休詠眼慵開維摩久病行當問好在春風紫錦臺括九峯禹貢解北條北境之山晉北諸山自代來自寰武風憲四州而耒胚凝首自霍山開連延眷脈為壷口南作析城王屋排復折而西雷首出一支北走太行崖次又一支為大茂四條明白不須猜大卿徐先生挽章諱世隆字威卿金進士第陳州西華人官至集賢大學士壯歲巍科擢上遊如公樂易更風流文章海內元推轂議論行間宋與儔鄉校功存東魯盛炬蓮恩在北門優自忴狂斐慚提獎爭遣鱣堂一拜休至元草一年豫按部東平拜公於私苐之前堂時公巳在病眷眷於豫者甚欵既而卒于家壽總尹劉公一家英氣蓋遼東聞説君矦有父風作牧首分青社土䇿勳誰比黑河功化行屬邑謳歌裏春自慈闈孝養中今歲壽筵光景好榴花渾似舞裙紅龍教授哀挽東郡教授龍君名革字取新廣安人善賦學及五星等術士子從之學者多所沾丐至元辛已與豫相遇于滑朝夕從遊者旬日一良德君子也後主魏縣簿政有聲今兹云亡其子夔來求挽章特為賦此當年按部館南衙日夕相過興未涯楚産例佻開實學天星推跳見名家大伾山下遊龍洞歸鴈亭邊望暮沙此日題詩重惆悵為君回首眷西華南齊任盻之子商左山哀辭啇孫膚敏矯猶龍千載流芳見此公佐魯謀猷元克壯定秦功力更沉雄城門被爇池魚涸臣罪當誅聖主聰老淚不緣知已痛麒麟臺上又秋風夾谷尚書哀挽名之奇字士常終吏部尚書品彚流形萬不同銓量平允侭清通恩非出已知誰怨天不遺賢見道窮三復苦辭歸汶上一官催老掩曹東茫茫大塊升沉裏重為清朝惜至公追挽承旨王文康公文章四海一康公炯炯元精貫自中盧肇名先金榜重歐陽仙去玉堂空道由實學明真用義不忘君見至忠惆悵當年門下士斷雲低處望曹東左丞史公哀辝并序左丞史公之薨客有云云者余曰事機之來雖理有難處度不違於義其寵辱有不足驚者當克明之無定力以順受輕則伊欎而自沮重則至憂悸而殞越正以不安而無定力故也嗚呼史公不少隱忍以光先正之業而至于斯其命耶抑以有未安於所受之正耶於是作是詩哀之鬢金貂漢九鄉大階平自柏臺清侭將事業傳鍾不特家聲藉父兄自忖行藏無所慊此生榮辱不須驚辦姦聽徹唐君説淚灑春風滿豸纓丙戌歲中秋後二日夢過真定與宣慰張鵬舉相會作詩為贈既覺頗記首尾意韻因足成之九月十一日忽英甫過衛説張是月此日辛於真定千里提封入控臨不知秋氣上華簮紫泥頒寵何三詔丹扆輸忠見六針機務固方前日簡論思尤比向來深潭園月轉覺孤懷愧此心蔓慶憲副良友十年局促伏轅駒解鞅歸來樂自如奔走止緣糊口計支離况是不材樗常因客過知安健多謝人來問起居把酒竹軒猶昨日清詩想似向來臞寄贈介甫憲倅聞除興元揔尹方聽新除入歷城忽傳改授漢中行霜空暫息騫飛翮民社教優撫字聲伏利試尋山水堰逺征先恤異方兵如承髙省相垂問老我山田二頃耕送徐正卿秩滿還漳南共筆燈窗憶昔時只今相顧鬢成絲三年調議良多益一道將迎不易持辭别巳餘連日惡直清留在後人思漳南未是歸棲地要與朝家作羽儀謝湯宣慰惠書間來何物慰窮愁細把調元入校讐相業有方無限事室書能幾不容抽巳欣惠賜承蘇集復夢翻香上郡樓插架万籖容遍覽鄴侯人道是湯矦代書寄友舊二首匪為窮愁曰著書閉門經史且相娛為憐魯酒無多味任使陶鉼乏見儲黃卷能教吾道在青雲未覺故人踈有時夢到烏臺月奄奄猶勝閉婦車半𥿄功名不足書暮年心緒若為娛背昧伎倆輸鳩拙度歲生涯儉擔儲為寂恐貽髙密笑不才爭似孔融踈退藏入密真吾事誰遣門多長者車西村三首和韻種來佳樹日扶踈秋草當階不忍鋤城府事囂間靜重林墟秋熟物情舒溪行改徑農耕後漁浦移梁水退餘我自興來成獨往手拖拄杖不巾車近歲行藏匪自踈胸中刺鯁要誅鋤通明縱使同方進朴鈍何如似魏舒堂上咿瀀從肉食橘中遊戲喜霜餘八騶前馭非吾事正要安徐下澤車忖量身卋兩乖踈去學淵明荷短鋤時事未容間裏過人心安得老來舒沙鷗逺泛機先識穴鼠深藏壤有餘我輩所行多倒置旱資舟楫水資車寄道之憲使仁兄匪為場苗賦白駒别來多事復何如臣門最喜心如水故第猶知里號樗落落壯為天外客潭潭老向府中居為近日二憲使不出司故云使君若問年來况山澤依前老病癯聞平章由公薨于維陽以詩挽之非藉吾不徒言邂逅欒江宴語頻外臺𥘉建首先分風雲契厚真吾相魚水情深有分民名在諌垣稱鯁直力輸王室最公勤豐碑會見十年後猶是中朝第一人丙戌除夜盤花紅卷燭光搖一歲迢迢盡此宵凍坼臘香浮柏葉暖移春意上梅梢拊心自信愚忠在流涕還悲髀肉消揣分要知溫飽力比生無地答清朝賀文卿同簽宣慰河朔時真定連年旱乾春風花發四鄰香曲巷時過笑語長議論有方消鄙薄功名無地不輝光簽書樞府孤忠壯愾敵長江一葦航今日八州歸總轄又煩和氣致時祥同簽趙公挽辭諱良弼字輔之遼東人至元二十三年南遊京洛卒明年正月二十四日夜見於夢托豫令易其名諱辭意甚切不然目將不瞑矣遂追作是詩以紀其意識逺幾沉任獨勞不將虛譽冠時髦使華光動扶桑日樞府謀深尚父韜四海樊川遺隱在九原精爽與秋髙分明夢裏來相託抵掌猶能似叔敖禮部尚書許公挽辝官至榮祿大夫名國禎字進之翼城人當年劒履上星辰忠謹持心老益振藥籠功名開夀域朝端風度見誠臣勒漿有味霑餘論卿月分光照近鄰我自訃聞增悵望白雲長處是滹垠凶訃𥘉傳不忍聞惜從朝著失忠臣安常每懼非常寵格物還深濟物仁貶損定交何眷厚燕間相過更情親轔轔細約車聲去長憶同逰過闕晨宋賔客弘道挽辝景玄絶學到縱橫此老猶能見典刑相府才華推上客少微光彩動前星誠身𥘉不離儒行進讀何妨雜貝經正有莫教傷餒恨併隨神剱閟泉扄公舊有舒辟劍萬有紛華入醉吟都將誠靜粹靈襟雲松卧壑存𥘉志望苑霑恩豈本心談並齊諧疑志怪學空滄海别穿深斗間縱有龍泉氣凄斷春風緑綺琴追悼參政李公仲實詩有序至元丁亥二月十日夜夢李參政仲實再拜向豫顧指所佩鞶囊曰吾平生盡在於此他日會須纍君但不敢輕易發也既寤悵然者久之因追作此詩以見其神交之不昧也昔李衛公見夢於令狐綯懇其北還綯畏其精爽白于帝得以歸葬今李侯明以後事來託豫老且間不知何所賴焉冠劒風雲擁漢庭斗邊喉舌振孤聲漢儲與翼非輕託蜀酒雖多每細傾身後哀榮光諡册夢中精爽似平生分明指顧鞶囊事一縷幽光要纍卿挽教官石仲遷名與義鄭州人少為縣吏後從李野齋學終南京教官臨試東過僕射陂封書投贄識君時生猶櫝玉期三獻死愧囊金昧四知塵丗驚回黃落夢帝京悲動白雲辝因思吾輩豪雄處貧賤能安貴不移送府判李侯赴調東曹其懷與政備見乎辝邶衛交衝辦事難送迎終日不停鞍去官不到瓜期代在分能居幕職安衙鼓通嚴披訟牒厨煙炊碧淡𬞞盤回看奔走風塵際却忠新除是振冠代書奉寄子明宣慰時為濟南宣慰五載因官寓鎮陽朋簮盍處佩聲鏘金盤爛醉雲樓酒繡镼其物反今之半臂也出光武紀一作䘿同披燕寢香樂事有懷終會合名泉無計共徜徉空餘情似康崖水一脈勾連到海長夀子𥘉中丞鼓瑟春風記點同轉頭俱作白頭翁逺逰長得知時報微恙行收勿藥功巾卷在庭隨燕几嬰香和露溫簾櫳暮年縱有周公夢輸與浮雲度太空送史邦直之任竹山縣屬房陵更在西一官雖逺儘施為王風漸𬒳無遐邇異俗能安戒鄙夷會待竒姿超駿足試教銛頴發囊錐彩旗閙簇清江渡想見春風到任時丙戌嵗除夜去歲椒盤一笑欒今冬除夕倍凄然奠餘靈桉鍾聲後坐對隂容燭影前存殁不堪思往事康寧還喜過今年數家剩説新春好夢到梅花小雪邉奴星具糗送窮歸夜久蘭堂燭影低梅雪溢寒嚴厲鼓枕香留暖潤盤犀試傾臘醖歆椒頌已覺春風拂畫雞明日書雲臺上去蒼精橫角看杓攜答何劉二端公屢有人來問起居近年為况果何如每承省録常深感欲話行藏不敢書逐末有慚規什一歸田無力把犁鋤時時夢到霜臺月靜聽烏聲尚起豫挽李子陽早歲龍門接茂材相携有意上台階夜書稱快元康在詩思爭髙嶽掌開落月滿梁清夢斷旅墳三尺野煙埋微官殆似台州鄭拊卷題詩擬八哀三十年前成邂逅酒壚傾徹醉顔開筆端力挽狂瀾倒袖裏親携太華來淚灑行間遺草在恨埋泉壤劒鋒摧因思秋雨蒼苔句何限令人不飲哀餞士逹御史還臺通家丗契鬱蘭金驄馬南來屢見臨披露義襟餘悃愊酌量時務入精深眼中白璧真無價調外朱絃有賞音回首炎荒四千里一杯不惜為重斟秋澗先生大全文集卷第十九
