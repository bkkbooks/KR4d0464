body:
  text: 七言律詩溪田晚歸百物秋成次第芳野人籬落散幽光晚禾結秀爭垂露髙樹吟秋未有霜瓢飲空思罇湛緑盤餐新喜黍炊黄歸時更得茆簷萸下澤車輕背夕陽辛卯重九嘲幹臣周宰九日寒花不見芳西灣招飲侭相妨驅車共載差元約冐雨長行有底忙野吹掀飜緇布㡌冷香滂盡紫茰囊渣泥踏水歸時晚也道龍山㑹一塲夀李夫人時九十四歳􅜳恱風流見二南洞天真侶記鸞驂慈顔媛娩丹浮頰素髪飄瀟雪滿簮九十平頭添二二百齡餘慶欠三三今年更覺秋容好薦壽寒花滿菊潭寄竹林劉隱君文甫兼簡苦齋詩老蓬莱清淺到楊塵林下幽蘭有異芬萬壑烟霏分野色一庵閑地占溪雲鸞音時接公和歗樵隱休驚豹峪君儘着青山暎華髪東州人事日紛紛周曲山挽章壬辰三月十五日四十年来老弟兄忍看埋玉入佳城子輿正斃酬𥘉志東野詩鳴豈本情六任在官無少玷一貧到骨有餘清易車令辦棺衾事猶恐臨行累友生哀馬希驥人夀㡬何鬼伯催抱嬴赴官吁可哀乃知生死有定䖏挽断衣衫喚不廻千室望空絃誦樂一枝風折桂林材儀牀最是傷心目愁拂春劒字埃競渡詩并引予前年客福唐寓舎在西湖上閩俗自四月中爲龍船戯舩鑿長木爲槽首尾鱗鬛皆作龍形以五彩粧繪髹其腹取其澤也上坐五六十人人一棹柱面對翻並進如箭鐃歌鼓吹自明竟夕殊喧譁也大率争取頭標以爲劇戯踰重午乃已壬辰㽔賔莭追念徃事偶爲賦此且記越俗之好尚焉又平時花竹亭舘四面環合不减臨安故亦以西湖名之五月沅江競渡頻遺風此日見東閩大夫淪溺甘魚腹舟子招呼問水濱鐃鼓轟翻蛟鰐室繁華淒断綺羅塵曲終人散青山暮招屈祠前獨愴神獨頭木香塔吉甫索賦水晶簾外日初長一架酴醿雪覆墻艶冷不爭春事晚香繁還愛獨頭芳看來玉蘂唐昌供幻出天眞虢國粧壷酒風流名字在醉魂千丈助詩狂元夕斗轉春城送臘寒暖回阡陌紫生煙春風两市華燈閙夜色千門璧月圓書卷光隂清議裏梅花消息吟邉厭厭醉裏南樓角無復情悰似少年和曲山見贈之什竹林舊女今無幾白髪歸来對曲山詩似春雲有態倦如飛鳥共知還淵明髙㒷羲皇上葛亮伊吕間鍾鼎山林两無濟塵埃空負半生閑和紫山見寄四詩正月二日作百險歸来万里江傍人剛羡老能強閑居苦笑拙逺宦空成捄火忙少日搶揚猶雀躍只今蓄縮龜藏絶然却掃関門坐過簡還疑近子桑一作晋公鐡靣耻將迎天遣汾亭醉六經麟出近郊休袂拭鳯巢阿閣要儀刑菌揺露影從團蓋草腐墻根任化螢天賦羙材終大用不然編簡爲誰青一作大器晚成疑定論山立揚休見老成輶車風彩動蠻荆两郷相望三年别四海論交六日兄諸葛竒才如汝滯漢庭公議欲誰明只將健笔凌雲句亦是詩壇不朽名望君重為斯文憎一頌寜堪以酒名七十人生所事休莫將閑惱蹵眉頭看来世運恢恢網剰却孤懐悄悄憂肉食廟堂均一飽笑談尊爼更何求樂章聽徹醒還醉夢繞黄爐憶舊游立春日五詩正月𥘉九日枕上作今年春晚暖何遥庭院輕隂鎻寂寥香散南衙牛巳碎冰封北岸凍微消老逢月閏憐多日前去灯宵不五朝居士病来花不染閉門詩思苦相撩妄心風斾莫揺摇且着清樽永此朝詩句得吟如有助生涯無幾強顔料平生肉食聊尔耳此日𬞞盤更寂寥休笑少陵垂白老還家曾散紫宸朝是年元日立春予時爲待制同百官望拜内廷西北曲山一病保無他卧老行厨閱歲華貧富較来元有分郷関歸到却無家粥盂得味憑虀羙詩陣無前聽鼓撾早晚黄紬紬被底醉頭舒出使排衙暗用女潞公宰翼城詩意輕䘮錦帶佩吴鈎曽作江湖萬里逰彩仗春烟縈越省為是年擊牛省中梅花詩興醉楊州在家貧好誰餬口万事癡如慮破頭收取琴書林下去蓋頭茆把要先謀爲子孺欲起禄稼軒故云立春節物最風流釵燕𬞞盤闘獻酬暖律潜回交泰琯香塵飛散送寒牛令龜有喜迎新歲任運何心接俊游鬱鬱林梢看紫氣悠悠吾道付滄州是日卜得泰卦故云令龜有喜守歲夜靈案回飈闔户樞赤囊懸井漬屠蘇罇留臘味爲春酒門揷新桃換舊符歲事守来人潦倒窮舩推去鬼揶榆明朝最是新年喜寛大書来聽杖扶頷聮一作糟塗竈户酣司命火結儺神打夜胡元日朔夜兒童問寢餘莫催予起動長吁圖書万囯朝元㑹鍾皷千門走嗇夫璿象謾回齊政斗赤靈何有碎邪符沉沉未覩三陽㤗愁絶灰心一寸蘆和曲山詩韻寄紫山年兄宦業初無一事成誰云禄足代吾耕最怜獨學無友擬托隣居度此生天外鳯凰得山間風月相迎詩来健羡凌雲句轉使孤懷不暢情百計謀生百不成薄田無幾不任耕洗心大易常絶拊髀劉郎肉不生勢有大行虧倚伏人無定志將迎果哉去作山林計却恐吾儕訝不情壯年力學老無成自髪何堪事笔耕張子田園帰有賦老龎話語到無生一作巳分歸田慕張子有時結韈待王生挐雲心事輸年少拭目時和喜迓迎有客過門聞詔語一言或𥙷不無情人日有懷紫山年兄効少陵清明詩格前年人日客殊方此日相望各故郷酒醆不虧工部口梅華空断蜀州腸休驚老態連眉白又喜春風上桞黄君豈笑談称曠逹我非用捨定行藏風雲北海捫虱花木西城夢對牀晚節得同林下飲不妨閑䖏㸔人忙紫山别業在府城西郭多植綿桞課僮奴以桮圈為事故以桞黄爲言和曲山見贈髙䪨我愛周兄不倚中平生臨事見豪雄從傍誰掣挐雲手妙用都歸製錦工勿藥病懷湏止酒運斤詩笔自成風浩然一點胷中氣莫問時汚與道隆肉䜴肉豉傳方出異庖玉盆凝就破昆刀縱横碎漬氍毹錦瑩㓗光翻琥珀膏暖入餳華防性爽味芳禁脔想京鏖年髙饜飫便夭羙不負吾坡養老饕人日贈曲山周宰近書雲物見豊年寛大書頒兩日前爲糓未知明日事得官休羡小兒權翦花作勝徒爲爾覔紙題詩一粲然遺愛祠前周老子幾時扶杖過思淵客㕔舊名先大夫所扁爲靳嘉議夀時年八十有三人生享福壽為先不似君家樂事全春色不隨喬木老眉毫光動百齡前風雲藥籠多隂積蘭玉堦庭點翠妍九老圖中休着眼世間元有地行仙琉璃肺撃鮮爲具樂朋簮辣品流馨漲緑沉犀著喜辛忘海味霜刀争割快牛心四筵談屑霏餘烈一縷冰漿濯襟勝過屠門矜大嚼夢雲飛逺蹛林深一作隂蹛音帶簡寄魏叅政兼謝白紵之貺草木先聲漢嫖姚一軍畬洞掃虵妖碧雲望杳江南道白紵情深鄭國僑水閣燕閑時有待銀坑心計苦相撩看看銅柱南邊月又見弓旌萬里招樂全老人詩樂全老子見輕安杖屦西城日徃還論福有孫應有子閑居非水亦非山春風滿意花遮眼曉鏡浮光酒暈顔九老有圖冝健羡一生班列素侯間耳聵自感人生五十未全老天遣吾聰用晦明怪志虚傳三耳異省心先得一根清腦鳴日作蜩蟬噪霆迅時無匕鬯驚物壯而衰自然理家翁稱譽轉尊榮諺云不過顒軒先生林墓正月十三日與陶晋卿送客回同拜墓予二人爲愴然者乆之故有是作庻見夫當哀切禱之意云詩後七日其孫以脾疾亡整冠趨拜栢林煙事徃懐賢一慨然羽翼有圖期四皓風雲埋恨便千年斯文未欲吾儕䘮乳穉冝爲造物憐宿草黄岡重回首大書猶是廣平阡公母夫人封廣平郡君三字蓋公親軰良霄散歩詩并序至元廿八年冬十一月十四日同曲山小酌林兄北軒旣醺相與至珉溪家夜話㱕見月色煙霏殊有春意因念数日寒沍今夕乃尔恐一冬不三二朝而巳遂歩入春露坊衝口而成詩何夜無月何家無酒但少閑適如吾四人耳散歩閑行不厭頻暖煙門巷趂冬温話深不限城頭皷㱕晚長敲月下門一枕黒甜饒熟睡兩螯風味夢清樽竹宫梅信今年早准備新詩問蠟痕和曲山題太一宫詩韻蒼精宫闕五雲高千刼塵縁謝世勞太一旂常王母使真官裘被吉光毛仙家功行何多品人物中和第一曹近日蓬壷到清淺獨留春色醉仙桃䔥爽神庭積翠髙東瀛修復堵宫勞法傳四葉光前後望重層霄一羽毛粉飾皇圖開治道庇庥廣厦到吾曹慇懃太一池邊月曾照銀觥醉露桃粉飾皇圖謂剏見今上時首陳修國史立臺省等事醉露桃謂四十年前陪諸公謙集方丈前除庇庥廣厦接禮士夫也喜雨秋冬不雨到中春壠麥黄芽起旱塵輸販乘時祈踴貴賤貧無䇿救飢民誰知一雨連三日走逐群巫謝大鈞愚俗豈知皆帝力年年豊稔太平人即事言懐抱病三年白髮翁今年自覺更踈慵硯池敗墨無新瀋書冊凝塵養蠧虫時向毉方求服食誰從卜者問窮通正同農畒憂春旱三日甘霖洗歲凶凉夜氣機開闔貴循常極慘隆炎物返傷大暑遽罹前日酷万金難買此宵凉啇颷借爽清庭户白露先秋洗肺腸一枕夢歸天外境廣寒宫殿夜蒼蒼跋御史梁公題祖隱君墓碑後中憲大定二十七年進士仕至河南府少尹當年中憲煥人文景仰脩齊表隱君三尺瑶鐫堪晤語一家庭訓儘㳟懃詩書有種餘金穴簮紱傳芳見世勛孝子思親同一致幾囬瞻灑太行雲賈祕監宅蓄大龜來自海南盈尺三尾真靈物也觀玩之餘賦詩以詠爲提點老友一粲神龜來自海中央登薦君家五福堂盈尺要開黄髮壽巢蓮不羨緑毛香蒼鱗弇獵垂三尾元氣氲氤善六蔵昨日朶頥觀不足榰牀長在老人傍壽韓生弘待扣鐘邊弟子行當年風度巳汪洋循循試看青衿子濟濟渾如上舎庠將就緝熈從灑掃撃磨蒙垢到輝光束脩籍手嗟何有重爲韓生夀一觴青青衿佩西門塾濟濟衣冠上舍庠和曲山冬日述懐嚴韻幾年青瑣列朝班萬里江湖又徃還浮世舉從愁裏過人生能肯老來閑時方多故難前料家任長貧免後艱更有行身思寡過未能蘧瑗毎慚顔送參政飛卿時改迁西省辛卯冬十二月七日漢庭冠劒擁群雄開濟都輸畫一功暫試邉籌外又分春色入秦中風雲平步無餘謹肝膽醻知有至公長使救時公䓁健老夫何有炬蓮紅奉和曲山胡桃詩嚴韻藤蔾爲菓性甘良今歲收成滿市行褐殻外包金作皺黄衣中褁玉爲穣似憐澹泊陪尊爼滿嚥芳馨肺腸聞說開元全盛日十金一柈喜新嚐又長瀛傳羙法膏同嚙便非常彼桃根植自羗南遺種携來漢使驂雷斧斫開驚蟄卯雪穰翻出合歡蟾華池増潤酥同膩老頰含飴蜜比甜想得上林𥘉結實百官分賜露恩沽餞中丞羲甫還闕下并序予與中丞羲甫同官歷下自後君由維陽移秦中不肖亦承乏福唐地之相去也萬里時之契闊盖八年于兹壬辰春正月邂逅衞南尊酒間握手道舊殊歡暢也因話及弊居醉經堂珉溪曰今易爲春露矣予即曰春露堂中秋澗老君應聲云可對梅花軒下栁溪生盖君游蘇門稱栁溪生提憲開封以梅軒自號故云即舉酒嘱予曰可足爲一詩見贈因輟聮成篇以光行色其辭曰緑波春水浄長亭樽酒相逄話故情春露堂中秋澗老梅花軒下栁溪生十年一别渾如昨兩地相望不易并三篋𥙷遺蒙睿眷寵光浮動漢公卿衛南讌集纔終日歷下分携已八年玉樹風神猶夙昔弹丸詩句轉清圎傳家有學光先業望壠求書憶昔賢從此玉墀冠劒地漢家勲業有貂蝉第三句一作肯堂有構傳先業和曲山見示十六夜詩三杯兩醆醉朦騰門巷歸時月色澄人影共三驚傑句元宵過五䞉殘燈遊觀縱羙吾誰與老病相仍子不勝昨晚詩來知勿藥樂於相對逺方朋非隠非啇處市闤出門即礙覺行難虚名藉籍知何有世事悠悠興易䦨化日舒長饒驟暖新詩吟苦有餘寒書生伎倆冝人笑兩束賡章要不刋爲曲山欲以近日唱和等作編集成帙以示來者故云寄贈緫帥便冝汪壬辰正月二十一日過衛前日劒騎過衞幸得一識英表勉贈二章庶見微懇瑊晟𫀆鎧鳯花紅颯爽英姿百戰䧺歌雅有懐千里隔停驂還喜一樽仝忠傳孝繼來家法谷静川空見驗功自古詩書出名將將軍今日漢膠東隴西名將相山東與别諸侯揔不同隴右風塵天一柱將壇恩禮漢元戎秦風儘詠車𥻘冨魯泮重看獻馘功想得朝天承讌衎教坊金纛彩雲中燈市行樂人喜時和更上元春城風物覺清妍罇罍傾倒非吾事杖屦游觀有樂全澹澹陌塵燈散後迢迢春箭醉吟邊新詩不獨書閑適待與清時俻管絃爲曲山乆病作詩以慰之曲山隠机一冬餘心事中間合减除委巷莫悲來結駟蒯緱休詠食無魚木欺脾土冝甘養詩梗吟吭可暫踈六十坡仙年未老万縁灰冷覔方書再和慰曲山前韻一身之外揔爲餘應有閑憂合屏除出宰莫悲淹足驥研精休効蠹書魚兩盂充腹冝相調一盏和顔未可踈休信安心泥禅術内經還是不刋書若以老年閑遣興或若以遣懐餘習在内經還是緊看書予拜顒軒墓後七日其孫以脾疾亡復作詩以哀之悲風吹野白晝隂吞聲不作短歌吟尚期穉子有餘慶少慰先生未了心玉樹淍殘天已老蘭芽助長思空深因懐此老含飴語地下相持淚滿襟穉子一作委蛻委蛻岀列子子孫者天地之委蛻也僮哀詩并序僮姓李氏小字八齡十有六歳壬辰夏後六月廿九日因戯水濵溺死猊渦予時卧病不知以數日不來見疑其有異且覺夢思恍惚及旬餘窮竟所以乃云已死矣爲惻然者累日其辞曰來從汀郡六千里執役家僮二載餘兵死不教承舞槊陸沉誰料葬河魚樵蘇晚到虞踈失庭户晨興憶掃除善遇力傭平日事一朝不見意何如挽揔尹湯矦井幹臺邊始識君共山山下酹新墳攀髯猶是風雲夢分陜仍髙牧伯勲翠琰能書無媿筆石麟休認辟邪文泉扄儘慰承家望又見賢郎逈不群題珠簾綉序後七竅生香詠洛姝風流不似紫山胡半床夢冷珠簾月用煙中怨事一序情鍾楽籍圖鎚破小山犂舌獄倒翻卓氏拍沽壚芳悰苦殢同心賞遏断行雲唱鷓鴣題香山寺畫卷送客當年過玉泉醉中遊賞得竒觀一泓湛碧浮僧鉢幾葉秋黄打石欄山色空濛金界濕松聲清泛海波寒吟鞭囬首都門道斜日歸時翠滿鞍過朝歌與苦齋馬上聮句三十年來老友生論文談舊見交情清時健在巳多幸白髪相從復此行朔吹號寒欺破帽重隂掃静喜新晴憂先樂後平生事一笑長驅過故城題府判黄懋卿手卷簿領當年憲府㕔已期公叔與同升爲觀臨事多難際素有持心近厚称荷槖儘高蘭省諭判花清映玉壷氷漳南未是淹留地變化重㸔九萬鵬送舎弟南歸穣下壬辰十月廿日彰德相别相思渭北常年事逺送漳南恨别心沙暖暫聮鴻鴈序霜寒凄断鶺鴒音兩郷健在都能幾千里含情老更深慰浣此懐知懇切不文消息到浮沉觀光化日舒長静八埏䕫龍布滿紫宸班閭閻有喜科差少煙火全踈傳舍閑象緯拱環天北極聲明漸及海東蠻春潭不用弘農寳斗米三錢濟歲艱夀右平章不忽术黑頭便挿侍中貂湋水春風憶共僚學術自𥘉希聖哲羽毛今果見雲霄心存經濟開公道天與精神本朝紫禁煙花縈繞裏青松千尺儘難凋閱清朝玉笋班龍麟誰似相君攀事多簡省經綸道在從容奏對間黄閣不知金印重思亭清似玉閑鳯池剰有如澠酒細㵼瓊杯暈夀顔一作梅花香長醉春玉鍊顔劒履光清斗極邊秋風庭户净吟氊北門視草情何宻東閣觀梅暖更妍白髮詞臣從寂寞青天鵬背鹵三千一樽細㵼新豊酒此際於君分合偏漢相規隨有典刑讃書今傍太微星甄陶品彚均元化業履貂蝉自六經飬浩以剛鄒孟直誠心無愧魯齋銘細傾東閣梅花醸長對西山未了青時拜御史中丞賦王詹丞宣賜玉杖王諱慶端字正甫藳城人青宫宿衛舊將軍家世今誰萬石君千騎寵光承眷頋一枝方杖表忠勤静臨春桂堂階月暖帶紅鸞扇影雲若把璠璵比良徳徤於羅結更温文一作前日倚毗今有効雲臺從此策高勳同鵬飛遊長春宫步入方壷别有天茫茫雲海道家山甘河真遇自伊始鐡鎻髙垂不可攀黒入太隂松桂老望空玄圃水雲閑臨漪門外春風暖将復流紅到世間張鵬飛治虎骨爲鎞挿作詩以贈張矦骨鯁霜稜稜削出雄軱瑩且精厭猛細將鵝作項差肩羞與鹿同名寢皮食肉真吾事理髮繙經入小成持贈有懐增老健一簮秋氣見𥘉横虎腦杯二首帳竿圍錦稱談兵猛腦刳來正可觥製就要爲元惡戒飲餘便覺谷風生瑣紋漬血紅猶濕酒力増嚴氣未平廣㑹長筵莫輕出慮妨倀鬼淚縱横犀船螺斚脂粉具老頂刳作元戎觥撩頭無復盗跖怒持飲頓覺隂風生鎻紋漬血紅猶濕酒力增嚴氣未平䲔吸長筵莫輕出揶揄倀鬼恐潜驚一作更啜梟羮戒元惡却思倀鬼恐潜驚十一月十八日壽宫小集六祖真人牛教授伯祥張按察鵬飛十稔相望不易逢一樽誰料此宵同笑談偶得陶元亮賔主不分龐徳翁竹葉添春冬後緑燭華留喜夜深紅鼎邊句就東方白却恐彌明訝不工訝一作笑贈牛教授伯祥牛君伯祥以失馬辞見示意甚悽惋雖情之所鍾正在我軰然思而不置恐傷天和而病吾子也故終之以電露之喻朝看頏頡燕于飛夜聴城烏有暗啼風拉綺絲疑晤語鏡翻鵉影夢雙棲屡空曽改安貧楽當饋難忘舉按齊不見六如亭上客此情断度不容悽壽長春張真人絳闕蓬山不易求春風瑶草夢麟洲未如華表千年鶴纔閱人間七十秋道紀有方蔵妙用玄談登對動宸旒慇懃一炷嬰香供吹滿壺天十二樓登對謂嘗以老子言上對㫖送王講師歸終南舊隠青城仙馭本翩蹮自惜繙經老閉關藜杖偶隨雲暫出草堂今喜鶴飛還道凝甘壑冲融際詩在終南紫去去黄塵今古道幾人囬首似君閑吾友鵬飛張君壯歲論交十年三遇少聞如意多見隠憂燕越相望契闊復爾衰年逺别互深相愛之情判案須煩例有三惑之誚氷清玉㓗餘孰何堪下怨上疑自昔如此在李華而未免於吾子以何如若作計以處時冝貴和而容衆子其行矣詩以送之四任邊除見壯猷空拳搏虎踣三彪得便宜處無再徃當計㑹時須逺謀花柳都城終歲好江山南土蹔時游倚門妻子愁仍破檣燕聲中莫少留送左丞董君行院金陵壘壁光寒海徼深未容緩帶畀分臨旌旗動色真餘事節制無方是自侵纒索要知今日馭戎機還盡老臣心迎仙門外生祠栢親見森森緑滿隂朝謁柳林行宫二詩并叙至元癸已二月四日臣膺惲臣文海儼居信朝謁春水行宫於瀘曲之柳林優蒙睿眷詔録年名以聞引進者中丞崔或𬒳沐天恩敢綴為唐律二詩以表殊常之遇臣惲謹序漢家天子獵非熊五柞長楊是近宫萬騎逺臨滄海右五人同拜柳林東自憐賤子承恩眷重為斯文惜至公更擬論思叅政議老臣何有沃淵衷千官扈蹕翠華東詔許諸生見雪宫商嶺採芝慚綺季新豊需命似姚崇名煇􅊮管猶通籍簡在儒臣要勸忠歩出禁闈傳少俟長楊髙樹動春風癸巳清明後三日偕益津李士觀登太史臺客中何處散幽懐放眼高明恐易裁兼覺形神未全老試憑筋力共登䑓山河繚繞陪京壯樓觀參差落照開曵杖不知雙髀困銅駝巷陌晚歸來奉和李樂齋登太史臺詩韻衰􅒒形骸俱諱老較量筋力共登臺漸忻就日瞻天近不惮捫參歷井囬歩下玉堦驚峻極立殘夕照尚裴徊銅駝巷陌歸時晩一笑傞傞曵杖來靈臺璇象兩巍巍夢寐三年始一窺日挾陽烏飜倒影天浮圎盖入銅儀當時東觀張平子此日吾元郭若思羡殺漢儒皆實學幾曽分異限藩籬和李樂齋馬病詩韻栁都城約勝遊閉門飜作抱官囚血糊駿足幾無眼昧庸工悔悞投䇿杖恐招徒歩誚求全飜得蹙眉憂自今安驥君須記鍼法從來是把頭爲中丞博陵公壽如君冨遠圖報恩多半薦賢書義方對何婉玄素囬天力有餘論入事機包細大望見舒徐近年黙數康時奏儘是汾陽極品除喜荅李六祖病後見憶韻郷心兩疊稠竹宫長記半冬留橘房嬉戯有真樂鵬背逍遥忘逺遊清夢偶便旬月寢巖花空抱一春愁朝來好得平安報香滿經臺紫氣浮送呉僧清琬長逰上都顱骨巉巉犀揷腦繙經休作越僧看潔蠲心行抛塵累飛跳天星得妙觀化日閻浮天竺小秋風蘭若野僧殘囬頭清磬千門裏曇鉢花鮮照眼寒挽樊君道録每歎玄門道有綱樊君扶翊冠簮裳公材絶似張嵩岳術異初非費長房樽酒笑談才宿昔玉棺飛堕便蒼茫仙遊乆厭人間世華表歸來意未量荅晉卿教授蒼狗雲衣日易飜桂薪珠米住京難百司扈送囬銮輅一室虚潜盻冷官老境静思林下樂郷書喜向枕中看絳紗㡢底絃歌樂政恐天教柰歲寒挽趙公同簽不肖惲自壯嵗辱知頗厚意廣才踈竟成堕窳曰暮懷人豈勝慨嘆魂而有知庻幾少慰其詩曰氣鬱元龍漢魏豪豈容空見卧床高力籌戎務開樞府膽落僧奫拜莭毛隂授有機黄石略夢歸何處赤松遨傷心此日題詩客老淚縱横溼佩刀公使日本回相會於平陽以本國佩刀見贈詩純用留矦事者盖以公全似漢𥘉異人詩餞王中丞復任中慶諸路行臺愛仰之懐義形于辝知音者無惜同賦詔行䑓自昔無恢恢天網未容踈滇池逐鰐眞餘霜簡收炎見壯圖報政果符銀作驗立朝囬看玉此身雖逺吾民晏肯憚風沙萬里涂銀為驗𥘉赴雲南時二笏乃諭日若委付将來以此銀爲驗過樞東府二首呈王院判仲常延英殿廡風道傳宫語近軍容自從文武岐分覺韜鈴勢轉雄畫㦸凝香連嫖衛出長楊賦云乃命嫖衞此赤囊封愾折邉衝郤縠莫詫詩書將谷静要駿功雄見致隆所衝樽爼沃渊衷庭花露重凝深石犀寒辟軟紅國論動能叅兩勢朝堂亦作陳蕃寕空歸鞍細嚼輪䑓詔兵寢刑清是極功題峗山白石洞野齋序文後東北望峗山滿馬風埃憶徃還白石乆聞經洞碧雲誰似老僧閑夢驚三十年前事詩在推𫾣月安得野齋相約去松風岩壑共躋攀送王司業嗣能倅衢州年持莭使閩甌端是騎䲔汗漫遊兩浙江山真罨畫三衢風土似中州兵餘獨重瘡痍苦政異無逾檽謳此去新詩更瀟灑所思多在望濤樓完顔士慶赴任蜀省來别索詩係金内族秋滿長安落葉紛天葩根異獨竒芬氣酣不在新豐酒志逺先馳蜀棧雲幕府文書無整肅郎官心事足忠勤腰間四世千金劒又見清光湛斗文輔提刑正臣挽詩并序䑓憲者煩長道而服群醜也昔魯人以泮水頌僖公而曰敬慎威儀維民之則載色載笑匪怒伊教如提刑輔公有焉又如諸生廪継于邁思樂何啻采芹藻而已不肖猥継公後親覩斯羙豈勝歆歎盖學校乃國家之元氣故予特以崇學為言使留心於簿書米鹽間者聞先生之風庶幾知所自云秋澗王惲謹序澄清心事見褰帷只道剛稜未盡知霜逐簡華森憲府力宣風化作邦基廟堂留像瞻遺愛寒藻翻香舞頖池夢到養源堂上月至今鐘鼓似清時前年學館拜遺祠此日看君堕涙詩飲食固云飢渴易教條能盡後先冝豸霜肅政潜梟歗文藻翻香舞類池夢到飬源堂上月至今鐘鼓樂清時李廷珪墨瀋世傳能定人神志予病乆思若慌惚因假之師孟研汁一龠飲之戯漬餘復香賦詩少見無聊頼之緒時癸巳八月朔日也龍劑如珪獨擅唐洗心今試秘滿意濃薰月露香靈府䇿文戰非吾事正送鄧郎任繹州我客京華識鄧郎怳如身在齋傍三年載筆同詞館一字論文憶夜牀老去光隂都幾許别來雲海尚相望玉堂昨夜秋風冷夢裏歸心到汶陽秋澗先生大全文集卷二十一
