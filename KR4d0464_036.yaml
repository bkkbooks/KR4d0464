body:
  text: 記醉經堂記王子築室於中唐既落成掲之曰醉經客有過而疑焉曰古之人名其室廬盖皆砭所欲而儆不逮今吾子年踰強仕讀書學道積有寒暑方以醉經為志且平昔所尊何經所嗜者何學耶子應之曰人孰不飲食淂其味者或寡矣且天下之事必綦其所嗜而後淂之如易牙之别味飬叔之治射秋之於弈伯倫之於酒唯其嗜之酷故能造乎極而嚌其胾者矣矧五經者聖人之成法生民之大命係焉若夫尽乹坤之変極萬物之情鬼神之所以幽吉㐫消長之所以著使人窮神知化樂而不憂遯而無悶者易之道也性情之所發禮義之所當止天地鬼神之所以感動草木昆虫之所以區别俾多聞博識益耳目之聦明者詩之教也五帝之建極三代之受授邦本所以基而固生民所以厚而康布在方䇿示人主以軌範者書之奥也飲食有莭進退有度使君臣父子兄弟朋友之間上下志㝎而無僣越危乱之禍者禮之實也公是非明褒貶君子小人之所以分亂臣賊子之所以懼萬世而下使大中至正之道綱維世教不至於魑魅魍魎者春秋之法也斯五者天下之逹道堯舜以之無為湯武以之順守周公以之輔相孔孟以之垂教伊尹之致其君顔子之樂其樂其皆出扵此乎然非嗜之酷資之深守死善道殆未窺其窔奥也若予也㓜而學以舉業汩其真壯而仕以冥行易所守内乏中和以植其本外欿禮義以制其冝望道而未見歠醨而失醇所謂清廟之玄酒至道之膏腴時或揚觶一嚼卒未造乎古人中聖之地故事變之来酬酢倒置鮮中律莭此無他志之不立經之不明故也鳴呼予乎其将醉于經乎朝而􅒓六藝之醲郁夕而味百家之異同然後躡丘臺而望千鍾之聖騁奥府而追百觚之賢神凝妙理心粹太和浩浩其天淵淵其淵不知我之醉經經之醉我是則醉經為志不其曠且樂欤重為歌之曰能者在人不能者在天㓜學壮行訂夫學之正偏道之隆汚一聴天之云然彼君子兮盡其性之所全故無入而不自淂焉有河上丈人者出庶幾知予心之拳拳客曰若子之志似酣且適矣尚何言㢤廼揖而退因書其言于壁不惟志其所欲亦且規其未至者日就月將果能粹于全經者乎時至元丁夘夏六月中伏日經堂主人王仲謀父記博望侯廟辯記頓坊距汲縣東北二十五里川原衍沃泉流交貫蓋蒼水沇洑至此而後發厥田冝稲與麻平時脩竹彌望號稱小蘇門按圖誌其地殷墟近郊太行之朝陽也坊北不百舉武有岡陂陀際山西來岡首有祠俗相承云漢博望侯張騫廟侯之塚在焉予讀西漢書騫自建元中使西域通烏孫而卒塚今在漢中此安淂騫之墓㢤是乃樂史所辯汲縣東北三十里有岡曰博望上有石墳洎二石表云張騫塚非也乃故原武典農髙府君之神道呼為石柱國者是也然不明府君何代人而典農魏晉間秩號見晋書何曽傳曾為汊郡典農中郎将其扵郡人有功因屋而祀之昭昭矣今縣治去頓坊二十里而遥曰五十里者攷之盖距古汲城而言也又按唐志書武徳六年改共城為共州置博望縣此亦因岡而為名故土人不䆒是非直以崗縣名与騫侯封相同遂指為騫之塚廟何其誤㢤至元四年外叔韓澍来官數以廟辯見嘱予因為説曰明則有禮樂幽則有鬼神幽明雖殊其理罔間騫若有靈恐不能一朝居此且以名乱實者君子惡諸守令者民神之主也一旦有事祠下幣祝交獻明以典農髙君而曰博望張侯吾誰欺欺神乎言且不順而望神之妥靈肹蠁吾未之信也嗚呼正名實明祀典有司之事也今侯之為縣首以孚誠感通神明致雨暘之應以利其郷人故正兹名實之不正足以見侯之蒞官興事不苟云歳丁卯壮陽月夏至后三日郡人王惲記洄溪記有銘王子性僻野喜泉石樂之窮老而不饜間歲買田郭西廣且百畒土瘠而甌臾特以溪流回護居水之腹景氣古澹令人有足爱者且清泉二水近自蘇嶺逺發黒山至共西南而後合縈帶林野百里而後渡汲予甞登丘望逺溪自郭氏林塢徑北流運肘而東指盡三里而北騖沉沉無聲若白虹西来束田為腹視兩際為最深惟其崖岸峻曲故淵流紆緩黛滀膏渟倒影空碧其或匯而為盤渦瀴而為浦溆横煙漠漠魚鳥飛没此溪曲之大率也至若林霏未開披拂縞練風漪遡行殆縈而轉夕月秋霽瑶琨滿溪流光空明蕩而復回金支翠旂有來宓妃鷗汎汎而不下舟揺揺而若維是則淵洄泱泱容態百出澄萬慮駐景色可喜可觀者也若夫􅔿淪淵黙溪之靈也浸潤原野溪之徳也窟宅蛟鼉溪之神也變態曲折随物賦形溪之文也衆壑来㑹噏呷納溪之量也湯湯洋洋旦夜不息是又溪之無盡藏也豈幽人智士樂而不饜者良以此與予乆閑寂若為時所遺也日以杖屨徜徉溪上屏蓊翳逺馬牛䟽薉惡以㓗溪之流㞐無幾溪之神似喜予之主也林壑從而増華雲烟為之動色臨溪而漁藉草而坐不勞登渉指顧之頃其溪山之勝魚鳥之樂盡在吾目中矣王子於是醉而歌𧺫而舞振靈脩之逺駕襲九淵之神竜不知世之遺我我之逺世将淵潜以自珍也昔栁州謫永易冉而為愚元結刺道以浯而銘溪今予扳二公之例錫汝曰洄溪其誰將不然安知夫溪神不擊節嘆賞喜其名嘉而實淂時出歌舞以樂其不世之遇也耶銘曰浩浩川流逝何速兮㳙㳙石霤時或窮兮水維淵泗物所鍾兮吾庸名汝亦目容兮汝安吾命尤冲融兮邑無君子吾適從兮偭彼蟂獺追神竜兮匪惟自珎俟吾道之隆兮殷太師廟重建外門記廟有外門舊矣金泰和四年節度使孟公鑄易而新之近代以來廢撤不復者蓋三紀焉維皇朝至元元年郡侯渤海王復命汲縣令葛祐作新太師之祠奉明詔而緝廢典也越明年春二月神宇甫完移治令下逮夏五月郡人韓澍來令兹邑奠謁祠下顧瞻臺門未克完具殆無以稱新宫而楬䖍敬明年秋七月廼經始焉順歲成而樂民用也九月𥘉吉告成厥功輪奐爽塏神㳺敞然風馬雲車肅焉來臨左林右泉奕奕動色旣而主縣簿髙顯洎其属願以事文諸廟石遂再拜請書於惲惲曰太師之墓在衛境聖蹟也按祭秩常祀也自殷迄今二十有餘歲矣神之所以凛然如生血食不絶者豈非忠義之氣粹而爲喬嶽融而爲列星窮天地亘萬古作大閑爲民極故也孔子偁殷有三仁焉蓋至誠惻怛之心其揆一也太師之進諌不去箕子之法授聖也太師之殺身成仁微子之志存宗也前代以二賢配饗廟庭亦見夫顯異尊崇之禮宜矣然一門之役不可不謂全功重嘉令之爲縣民安政簡而復致敬恭於明神継成前功可謂能也已故詳書本末以俟來哲至元丁卯秋九月重九日謹記種栁記古之人十年種木俟以時而充吾用也然五十不藝樹者謂夫歲月之不我予也物之易生莫栁若也自拱把而合抱特十餘歲耳今年春命家僮斧東城之外七十有二木植諸洄溪之上清流溉其根時雨澤其顛甫閱月枝葉扶蘇已復可愛異時材則充吾家棟宇之用薪則供吾㸑下朝夕之湏斧斤以時有不勝其用者矣不然畏曰凝空炎風灼野長條羙䕃拂堤岸而庇清流使龜魚㳺泳爲牛馬憇息之所亦田家之一快也吾今年四十有二小子其識之且念夫天之生物無匪益扵人者人爲物靈役萬有而君之亦莫不極焉不知加我數年能有益扵物也果何如㢤時至元戊辰夏六月洄溪主人記社壇記田之置社所從来尚矣自天子至扵庶人莫不有社盖所以神地道而羙民報也其制遺而不屋俾之受霜露風雨以逹天地之氣社者五土之示田主之所依也各以方所冝木樹之以表其位夏以松殷以栢周以栗是也祀以春秋始用祈而終有報也曰用甲祭之常而取其始也配以稷盖稷為五糓之長且稷非土無以生土非稷無以見生生之效以其同功均利更相載養故也至元三年秋予買田於清水之南墾斸樹藝且厯歳時淂田二百餘畒方之圭㓗盖以倍徙矣若夫水土之賜莫非君恩軋溢豊㓙寔維神所托焉是不可不明乎本觀衛土所冝惟棠為然故於舎之西南若干歩就其木以為神表箸之位春祈秋報用安以妥嗚呼社禮之廢乆矣背本趨末者衆矣古之為民者四各有恒業不相哤雜今三者不易為士者獨失所守遑遑載質不相吊於道路者幾何人斯若予也工啇賤事非所冝為以幸為利義之所不敢出也是則耕而後食藉之為育㢘之地誠又性之所便身之所安爾予一夫耳其䏻化郷人乎以為告朔餼羊使田正有所依而知載養之功徳合無疆矣於是乎書時四年丁夘冬十月也孔履記孔子殁千有八百餘歲小子惲獲拜履綦扵先進趙公學舎吁可敬也履之制極古長尺有二寸其圏以絲藉則以枲為之紋作古方花角結駢羅紕絡如畫不可端倪厥首几几佀圓而方状若物勾勢欲上逹循口有衣如􅊻可相掩覆傍綴繩絇長約數寸殆用拘縛以歛口哆環脣之周中貫繶紃疊踵之后辮結方舒犢鼻穿徹色蒼艾無光枲之纎尫者逮弊絲之堅凝者不變也扵是拂拭睇眎起敬𧺫爱怳如升君子之堂仰髙風攀逸駕而聆足音之跫然也若夫履者禮也君子所履小人所視况吾夫子踐履之物㢤吾儕小人可不敬而視之且夫子相魯七日誅夘也扵兩觀之下如由賜之徒尚愕然而驚况魯人乎然視其所履其詳可淂而考也夾谷之㑹齊以䒹兵刼公孔子履者而上不盡一等是履也凝然山立兵却魯張其無嚴諸侯之勇可淂而見也然後退而閑居従容中道與三千之徒翺翔扵洙泗之間接武扵杏壇之上其素履之徃坦坦幽人貞可淂而觀也俾後之君臣父子兄弟夫婦順而履之者昌捨而違之者亡冝乎吾夫子萬世之下凝旒𬒳衮履帝位而不疚其道光明者焉嗚呼當崇奉者聖人之功也當踐履者聖人之跡也苟知其功而不踐其迹與嗜古物爲耳目之玩者等矣是誠不可不知其所當履也中綂三年夏五月同宣撫徐世隆都司劉郁幽陵張著觀汲郡王惲拜手稽首而爲之記殷少師比干廟肇祀記緫管趙郡陳公治衛之明年政乎訟理一日謂僚佐曰太師比干之神古今之盛烈也以視事之𥘉未遑致祭爲守臣者是殆闕如况在明詔又當夤奉神不扵其祭吾烏乎用吾祭噫斯典之廢乆矣禮失而野當以義𧺫且四時以秋為金五行以金為義而大師之徽烈忠貞剛䝘盖與秋律一也今以秋令祀之庶幾氣可應而神来格也僉曰俞公於是擇糓旦謹齋沐淂秋九月十有四日戊戍夜漏下四十刻公乃延郡之賓友洎府之幕属畢集祠下質明公歛袵以入乃即厥事鼓鍾既陳賔従􅈬列籩豆静嘉牲醪香腯奠獻禮成泠風穆然忻忻康樂神具醉飽從祀者凢十有九人對越靈威精魂動盪殆肅如也既闔户賔主序位主人示曠度略苛禮歌管交奏饜飫神貺公乃詠擬騷之九誦賦伐木之卒章洗爵揚觶以極歡暢顧謂坐客曰祀以秋期肇自扵是可乎客乃聞而賛之為之歌曰沉寥兮九秋神粹兮一氣百卉兮具腓貞松兮勁厲来雲兮度帟逥風兮滿斾坎坎兮蹲蹲人神兮貝醉雨暘兮時若神賜兮屢歳爰祀兮清啇自公兮母替燕既終賔主揖而退繹之明夜大雨信宿乃止咸曰時雨之應豈非公之至誠所感耶公以謙撝自牧乃謝不敏曰適雨與㑹予何徳以致之既而府從事李端告予曰公自下車跡其善政有不可揜焉者其扵事神治人可謂備矣宜文諸廟石以旌厥羙衛人王惲偉其言而嘉之於是乎記至元丁夘冬十月也楊氏塑馬記至元二年春三月運副楊君祝香濟瀆道宿承恩夢人驅乗馬而西寤而異之及投誠沇海出紵衣以賜因黙祝曰幽靈如此當復来以荅神貺越翼曰馬無病而斃即火之俾授隂䇿明年春再赱祠下追念驥徳與相之權竒有足見于土木而聳隂馭之儀者廼命工塑設於神庭之右􅋮首振􅿁勢殆躍如既而楊再拜請記於予予謂清濟在天地間一水耳唯其不常流乱渉河溢榮沇洑地中獨逹于海故曰瀆此濟之所以神也祭秩視諸侯有國者祀之近代来歲時香火奔走百郡丗之人豈以靈淵䀹歘變幻百出能警動人耳目以為瀆不測之神耶夫神聦明正直者恐不爾必矣且揚君誠心所貫發於夢夢之所淂見於行事其亦敬共篤信聴於神而不疑者也然心即神也神即心也吾恐方寸靈明之地即天地百神之主而吉㓙禍福不由乎已而由神乎㢤昔昌黎公碑羅池神筆李儀醉踣廟下以為靈尚何怪於此㢤至元丁夘秋七月日記遊玉泉山記玉泉附都之名山也予十年間三赱居庸以事梗未遑一遊有顧揖雲㷑而已至元七年四月廿一日與憲䑓諸公出餞髙劉二侍御於髙梁河上客既去相與並騎且話且前舉目瞻佇巳次甕山因共為玉泉之遊於是轉崗陵過碾荘望西南林壑霏空翠襟之淋漓也遂舎騎而歩厯佛閣觀檻泉偃靈鰲之騫訝玉虹之命童子以銀罌挹水於石鯨清冷三於是雲蘿轉山腹不百平湖人有撑舟昆明之而入華石洞二三子大所歡充然有所淂凝空清和扇物雲春山之詩歌離宫之曲知之官日之在山也歌曰昔人作宫兮重扃扉兮登故基有苗兮漁有磯鳥飛鷗同一華一去落暉山良是兮事非感今懐人我胡爲兮拪栖滄浪水清兮濯冠去意扵淂意於登賞遂成兹逰至有心扵成約與造物逰扵一日之内而償窮年之勞不爲事奪風雨妨者殆無幾耳予然後知天下之事任術以去取留意於成全者皆以小智自私則失自然之理也可勝嘆㢤同㳺者凡六人范陽李公弼秦䑓楊子秀鄅城韓君羙洹水梁幹臣太原温次霄汲郡王仲謀期不至者饒陽髙瑞卿涑水邢良輔餞不及者固安王輔之相州馬才卿㳺霖落山記州西北四十里有山曰霖落寺曰香泉者𥘉自寺荘入山門約行六七里峰回路轉得古浮圖亭亭出杳靄間青嶂回抱真畫圖也望東北諸峯頂磨蒼穹足注絶壑山之椒萬石林立極太湖竒特之状半空磊落勢若飛来蒼官老栢儼侍上下雲煙空翠顧揖不暇即霖落山也行百餙歩徑漸峡束石犖确不能騎青鞋竹杖推挽以進還自絶澗底陟西磴道入寺殿廢基枕巔崖上東西二佛龕歳月峥嵘皆開元間物也南瞰哀壑心魄為動王子與客循東崖而下抵霖落山足仰看青壁斗絶如削今謂之捨身崖者是也少憇轉而升東北石磴攀蘿蹴蘚度滴乳古巖再折而抵華嚴壁下壁磨崖為之作隷書刻華嚴部特精緻可觀字約萬数水客誕誇時出光怪中鑿巨龕古佛護以龍象其香泉自經洞石罅中流岀穿雲霤石復從乳巖半腹下㵼作瀑布流飛濺叢石間珠跳玉迸頃刻百斛山藉以潤寺仰以清也西崖對峙老色積鐡怪石出槲樹間蹲踞騰拏衆獸相搏望之愕然而恐野人指予而告曰此獅子嵓也其西北一峯天成如臺石逕作梯盤屈而上若雌霓掛樹連卷未収即寺之眺月臺也寺故址山中相傳昔魏安王起雪官於此故宋人石刻皆引魏離宫故事有﨑嶇一逕入禪扉魏主離宫在翠微之句金盛時殿閣極侈今柢稠禪師一殿巋然獨存所恨薄暮不獲陟連雲絶頂放曠逺目以盡諸山之勝令人仰視飄然有整翮凌雲之志既而林風振壑寒日下山蒼然暮色自逺而至猿鳴兕叫凛不可留遂自南山半腰厯蘚磴俯渃岸盤馬謹轡而還回顧寺塔瞑㷑四合無復所見但覺西山爽氣清潤雄秀溢我心目襟𬒮以之淋漓詩脾爲之清壮也夫逰覧細事也功名之士有所不取然謝傅之放情丘壑羊公之興懐峴首二賢者其功業豈下扵人㢤要之髙人勝士不無瀟洒出塵之想闤闠塵俗觸眼可悪時扵山川風煙勝䖏垂槖而徃囷載而歸俾廓落之懐心凝形釋與萬化冥合然後知吾向之未始逰焉如何若曰功名顯赫如二公而後可噫髙天厚地湏冨貴何時邪癸亥冬十二月望日記新井記有銘水之滋人至矣予城㞐三十年口衆而無井亦一古也盖飲食酒茗之用日不暇數十斛率以㒒奴遠汲取足誠可憫也中綂四年夏六月朔召井工鑿井扵舎南隙地告成扵是月上旬之戊午凡用錢布四千五百役傭三十六甃甓三千二百其深四尋有一尺既汲果食冽而多泉味之莫餘井若也且夫汲之為郡一咽㑹也吾聞生聚繁夥之地水率鹹苦井而得羙泉者百不一二數何則腐穢渗漉之餘故也予生也多疾鹹苦之味尤所禁忌今新泉若是而甘且列天其或者湔浣我心肺滌濯我五臟沛然助往来生生之資而供無窮之用也是宜銘銘曰四年季夏日戊午鑿井得泉甘勝乳古云飲之疾可愈朝来汲引已堪覩金沙離離流百股一泓寒碧蒼烟吐黒知湾澴潆水府劇郡之水率斥鹵此泉扶哀殆天與我嬰重㓗繘脩組尚飲耒者無窮數登觀雀樓記予少從進士泌陽趙府君學先生河中人故児時得聞此州樓觀雄天下而觀雀者尤為之甲及讀唐李虞部暢諸王之煥等詩壮其藻思令人飄飄然有整翮凌雲之想擬一登而未能也至元壬申春三月由御史裏行来官晋府因竊喜幸曰蒲為属郡且判府職固㕔幕而開掌有顓務國制判官典郵傳季得乗馹撿劾稽緩西南河関勝㮣固形扵夢寐中矣其歲冬十一月戊寅奉堂移偕来伻按事此州遂獲登故基徙倚盤礴情逸雲上扵是俯洪河面太華楫首陽雖傑觀委地昔人已非而河山之偉風㷑之勝不殊扵徃古矣扵是詠採薇之歌有懐舜徳起臨河之歎而思禹功坐客頋笑舉酒相嘱何其思之深而樂之多也噫昔韓吏部𣣔造登南昌閣者屢矣至扵刺潮移袁濵潭卒莫之遂秪獲載名其上列三王之次今雖罄適夙昔盡登臨之羙而不覩瓌偉嶻嶪之觀廼知勝賞有數樂事不可并也偕来者古肥戴剛柔克滏陽馬昫徳昌营州張思誠誠叔子翁孺侍行是歲陽復後一日承直郎汲郡王惲仲謀甫記平陽府新條星尢漏記經漏之法盖所以司天地之朝昬儆官民之動息郡邑皆得置之遵古制也平陽府治舊有漏設䑓門上近代来名存噐亡具鍾鼓而巳視事𥘉思有以更張之遂得遺法所謂木漏星丸者也其制為夾屏髙㡬㝷廣則半之中布敔道七折用棘作丸彈如凢六十數以循環六千分晝夜百刻之度又按中星制十二圖定日月寒暑消長遲速之候注丸為分積分取點積點成刻均平五更定為成式至元十年春二月丁未新漏告成法簡而易知理明而度應信乎可恒用而不息者也噫君子之為政自一已而逹之物因物而取信扵民兹漏之設苟不自信而勤於政豈惟伊漏之愧将何以化齊民㢤爰作箴以自警其辞曰在昔上古挈壷有職尭水懐山釹若星歴繄爾經漏亦政令所棘不夙則暮匪時動息今也具成官民攸則彼寕不勤政荒業墮嗚呼有官率先是思太平縣宣聖廟重建賢廊記二帝三王之道逮孔子而後明然師授私㳤傳之後世俾彛倫攸叙而不斁者七十子有力焉是則配侍於聖人也冝矣太平晉國故封今為絳之劇邑襟山帶河衝㑹南北故其俗率勤儉剛義憂深思逺有陶唐之遺風焉為縣者必欲明倫復古吾夫子之教其可後乎縣有廟學國朝已來具法宫而虚兩序春秋奠獻自侯巳降位設牗下其於典憲是殆闕然至元八年夏進義副尉平遥任興嗣來主縣簿覩其如是慨焉興感乃祗㑹教官張鑄孫某暨邑之士人相與庀材僦工經营以方凢為室東西各五楹翬飛翼棘奐焉維新遂圖七十子肖像于壁元哲當座素臣儼如載尊載儀咸列斯宫吁其偉㢤以至元癸酉秋八月行釋菜之禮用安神棲邦人向化士興于學若任君者其於承宣之職可謂知所先務矣爰作詩以歌之其辭曰元聖垂教先天後終用廣發越群賢之功於爀魯語如日在空建極明治萬古是崇冝其報禮極熾而隆奕奕兩序厥功固微小善罔棄大焉可希刻詩廟門来者庻幾澤州新脩天井関夫子廟記舜澤南逕太行左腹百里而遥赱懐洛道也當天井開衝有殿屋巍然髙出林表曰夫子廟廟之建莫究所從來歳年滋乆物不能終壮故脊圯瓦裂桷陊榱傾障盖日䟽風雨攸斁寖及于壊行人過客朝頓夕䖏車隱户間火燧柱下燻醫蕪躪悪不可睨孰謂神能一朝而妥扵此乎莫瀆慢此若某以至元九年夏四月調官平陽道出祠下愕眙嗟咨詎可下墜㪍基俾守土者大貽神羞吾儒安得不受其責於是属州尹皇甫琰以營圖越明年冬十月廼經始焉完故益新克壮于昔而復繚周垣建崇門固扄鐍既治既除神宇肅敞又眀年春正月州判官張漢来告迄功且致尹意求予文以記之曰祠雖葺而稍新固不足為成功然轍跡事不辨諸廟石無以警山甿野俗若載之恐以誣傳誣伊明府有以述之嗚呼惟夫子之道本原扵天天理出於人心固有周衰王者迹熄邪說暴行大作天以堯舜禹湯文武周公之道恐遂湮微又不能聲臭諄諄下誨扵人故誕生元聖祖述憲章振鐸下土於是觀周如陳聘楚轍環扵齊魯宋衛之郊盖将以明倫建極復其固有之天俾君臣義父子恩夫婦别朋友信長㓜序天地位萬物育而巳其道則礼樂刑政其文則詩書易春秋如水火菽粟日用而不可離非有誕漫詭異難行不經之事萬世而下順而履之者昌逆而違之者亡論夫神化無方之妙復有大扵此歟又何俟草間之䑕石上之轍警流俗而駭衆目者㢤然按世家孔子将西見簡子于晉聞鳴犢舜華之死臨河而嘆曰吾之不濟命也今澤寔晋之東鄙廟之設豈菲出於人心景慕信瞻天就日有不可廢焉者先賢因之以神道設教明夫聖道溥博無所徃而不在彌六合而滿坑谷也故併及之尚来者無惑尹諱琰字國瑞姓皇甫氏潞之襄垣人賢而有文為政勤彊練宻聲藉甚于時十一年歳在甲戍正月既望承直郎平陽路緫管府判官汲郡王惲堇記秋澗先生大全文集卷第三十六
