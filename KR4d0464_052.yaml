body:
  text: 大元故鄭州宣課長官盧公神道碑銘并序至元己丑冬豫提憲福唐識前政太中盧君沉厚謙抑蓋卓卓有為者及聞諸僚友間君自平江浙以來治軍撫民俱有成效惜去之遽不暇欵接也後六年豫方紬書石室來謁曰天祥負釁深重嚮任回甫拜先壠不幸考妣相繼奄逝今祥禫已終惟是告神明傳未久者不內翰是託其疇依幸惠顧無讓既而持善狀以墓碑來請乃勉為論撰之公諱元姓盧氏丗為許之臨頴縣里仁鄉人曽祖祖丗代邈名諱俱逸樂耕稼以善行茈一方父諱某金季以勞治襄城簿有聲妣李氏姿明慧知經史公垂髫教之讀書每以言動不妄為誡及長存誠尚義挺然有守不為流俗所移歲壬辰公避地鄭之管城及汴梁下民環鄭而來者日以千數公知衆心去留未定即會而喻之曰鄭土號稱沃壤䇿荒歲久畒可數鍾今棄而不耕狃遷避為安其安果何在哉吾欲捐私廪助種食與汝曹並耕而食一旦有成不猶愈糊其口於四方君等其有意乎衆感而準命由是逺近孺慕歸依者衆生聚煙火漸復平日之舊迄今鄭人户而祝之庚子辛丑間朝廷聞公信義多之乃曰智效一官用未可量也遂舉充鄭六縣課稅長官數年間事辦而民安不知有壟斷也其寬和如此既而嘆曰放利而行不容無怨况非素志遂投牒而去優遊田間處身事外有教子讀書立門户盡地利厚蓋藏而已歲時伏臘擊鮮具釀與親戚父老寧止燕衎樂于胥也先是治苐郡城中然未嘗久處杖屨所安多在里仁别業辛卯冬一夕與鄰里辝訣曰相親久幸各自重遂命駕入城衆訝其遽如許也巳而果微恙召諸子若孫告之曰昔吾翁媪兵燼餘營理生産五十年間勤苦備嘗方致苟完今壽踰八秩嗣子致位通顯吾何修而然是皆祖禰積德勤力所致苐官無髙庳廉慎能安家無肥瘠共儉可保吾平生行巳汝曹猶及見之諸孫溫飫不知囏難所自讀書力田愼勿偏廢如是則盧氏其未央也言終而逝饗年八十有二夫人薛氏抵嚴貞順母道有光夫婦相處五紀公之意不毫髮少失後一閏無疾而終四子長天祥大中大夫福建閩海道提刑按察使次天驎未仕天祐忠翊校尉行軍總把戰占城殁皆薛出天瑞晉江縣尹前公卒一女適曹氏子孫七人從善從禮從順從道從正從德從謙從禮襲父天祐聀忠顯校尉行軍千户餘皆幼孫女九人四適士族餘在室曽孫一人曰允孫曽女孫一人尚幼某年月日天祥等奉公柩葬大陵先塋某穴夫人薛氏祔焉公為人魁梧重然諾寡言笑言則為衆信服處身治家不侈不陋理恆業課僮僕各得其宜故能上下戮力農事修整子孫朝夕問謁肅若官府雖搶攘際姻親鄉曲賴其依藉與平時無異𥘉江左平公南遊襄漢遇俘者疾病顛頓道塗間憫焉遂罄行槖中物贖而良之者甚衆至於行髙恩積在人又似夫漢樊重之行事也是可銘銘曰天稟中厚百焉可為事以誠應其將孰違暨暨盧氏家頴之涯三丗在野篤為農師顧此大本我控我持逮乎府君一誠是思積而能散識符事幾大梁既下流氓四馳環鄭而來莫知所依一語還定衆若歸畇畇鄭圃淡淡沖陂煙火相望雞犬垣籬繄鄭有存曰僑曰皮尸而祝之非公其誰豈惟義豪善人幾希逹而拜官非吾所期解紱南轅幅巾杖藜秩我東作西成可知崇彼禮節張吾四維嗚歌有子幼之樂營産盡吾樊之規流惠閭里賑乏宗支人以為君子冨於此見智人所推取諸理化政將同施婆娑故里壽髙期頥子孫簮紱何若若兮纍纍臨終朗朗二者勿遺蓋耕稼乃種德之本教子隆起家之基古人取必於身後公獨饗福於平時狼陂奫淪大陵崔巍異時瞻豐碑於木抄其有感於斯者知無愧辝噫金故朝請大夫泌陽縣令趙公神道碑銘并序金自南渡後封壤日蹙軍國調度百色所須悉取辦民間然迄於亡而不知困其良法善經維持而有力者多農司辟令是歸若乃䇿名俊造列官令宰終其職而不負所舉者趙公其一也公諱鵬字搏霄蒲之河東人幼君舉業弱冠有聲埸屋間擢貞祐三年詞賦進士第父元善聲韻算學丗以農致冨及公第諸負債者悉折劵以貰曰吾所得巳多尚何貪為其知止如此公釋褐主芮城簿秩滿令闕縣請留公行臺廉其能俾攝縣務既而調同州澄城令民安公教政方著左曹請赴入輔尚書省掾未幾用薦者辟授泌陽縣令泌邊邑也户繁俗剽薄多不地著號稱難理公下車設教條督遊墮行視田里相民利病而興除之見其土腴而桑鮮及知玉池沱坡等陂民嘗資以蒔稻歲穫千萬鍾年深堤堰圯漏貪取恣引強者有餘弱者不足田有涸而生埃者致相訟竟歲公審其若是令口水為利殊博旱乾有藉焉正患潤餘而用不均又曰設使菽粟如流寒無袴𥜗將奚以卒歲乃揵圯苴漏瀦漶散理溝洫復作斗門提閼十數處量田疇為可溉約束又置鼓畜犬於田畔以警其姦竊自是紛爭息民無所私及課植桑歲至三十萬株縣以之致冨焉公曰既殷而教聖人之大經於是謹庠序表善惡以敦其禮讓有射生張青者闖踐兩徼頗橫恣不法民嫉之公廉知攝至庭嚴加教戒就給田牛昜籍農伍許以自新曰今而後姦枿少萌吾將不汝貸青悔愧自斂迄終更不復為非其興利昜俗先教後罰殆召父之治南陽也農司核實以其績上聞至有州縣得人之諭尋遷豐衍庫使京城變人飢至相啖同僚欲私帑物以昜斗食公曰我主吏死則吾分可切君藏以偷生耶其人慚而止北渡後流寓淇南貧無為資時當路有知公之賢欲以一縣相屈者公聞之曰余方以儉素自守其可榮以仕乎竟不應遂教諸生為業識者多之以甲寅歲夏六月二十九日觀漲西城歸憩坐礎言笑而逝春秋七十有三積官至朝請大夫至元戊寅歲改葬公郡城東郭顯應祠雨百許步郡君邢氏祔焉公凡五娶楊氏生子庭掌為郡學官文某適同年何氏子耶氏生女華仙適齊氏次雷氏令狐氏再娶閿鄉邢氏生四子一女男曰康曰廣廣傳家學嘗任管庫以廉能稱曰應曰廉讀書通醫術女舜英適陳嘉謀孫七人良弼遂良濟民從龍顯祖時敏克謙先生資雅厚長身白晢與人接未嘗出一妄言衣冠顔貌望之知為一醇儒也所交皆一時才傑如石御史子堅李右司欽叔暨其弟欽用欽若楊都運換然王華隂元禮何學博與之嘗觀河華風土秀潤雄碩不隨時髙下先生挺生其間清明之所萃鍾英彥之所霑浹宜其角逐文埸而擢名進士楊歷中外而稱材大夫所居民冨所去見思廪廪然有德讓君子之風詞賦為平生顓門之學其經指授者皆有所成就某年方志學受業門下今老矣凡兩入翰林三二憲府粗有所聞於時先生之教有力焉子廣來請銘曰是某之責也其敢以不敏辭銘曰於休先生德讓君子力擢巍科聲馳膴仕二宰劇縣政平訟理敬謹開田里先罰後令行禁止異績殊聞驚目駭耳一非不能未免有巳鄒論為邦厥有深旨樹畜耕耘王道伊始史傳漢循龔黃信臣奮髯扺几莫之與倫諒公平生有得於此至今遺黎歌詠餘美天步改玉士或昜節布衣歸來教授為業斗食苟生寧飢不屑銘無愧辝劖此麟碣是為亡社大夫之墓其光有曄大元故奉訓大夫尚書禮部郎中致仕丁公墓碑銘并序金制大定聞限以三品至五品職事官承廕子孫內班供奉或省署儤直者同吏貟許試六曹令史中其選驗班秩崇庳而收輔焉謂之班祗出身于以抑任子苟進之風且勵多士特逹者之志在當時號稱入流美科如吾奉訓丁公卓然以材術拔出倫類表見一時可謂篤志君子其敢以門資待之乎公諱居實字仲華髙祖孝溫仕金朝官金紫光祿大夫臨海軍節度使遂丗家錦州曽祖與宣武將軍終興化簿大父從吉明威將軍宜陽令考鐘太康稅使纍官至宣武將軍公少孤稍長力學不倦每以藉廕入雜流為慊遂去習城旦書用明威資中正大四年部掾甲首例輔尚書吏部令史南播後封瓖蹙貟多闕鮮中外官守代攙滯公詳酌格例若不顓泥而銓調以方至事行而人服其當因建言曲阜令孔氏丗繼終其身有不便者請優以兩考調他任擢族中賢者嗣秩乃尓則聖人之後材能輩出不致沉鬱朝議從之未幾擢權尚書省令史明惠太后崩暨國信出使皆以材選從事爼豆縉紳間稱其敏逹積前後勞官昭信校尉勳雲騎尉金亡流寓天德黑水間國朝方事江淮總廪餉于衛漕長宗矦亨奏公充軍儲經歷官收德望也公籌會漕計雖內輸外饋應期取辦顓以抒民力為心俾人忘飛挽之勞士有足食之樂公力為居多逮中統建元開府史公宣撫河外方圗任舊人以副閫寄故首薦公咨議幕府事公竭誠殫慮思盡心所行簿書外典憲獄情亢所明慎𥘉許民得千户印章於􅡡間以窶甚冒稱偏禆獲戾投欵而南以徼賞格既而潛來事露有司抵之極刑公曰不可原其情非逆不過以譎圗賄爾竟從減死論故制辝有處心純正用事詳明熟識國興之諭其為朝壄推重如是四年復應左丞闊公辟署大名宣慰司幕官適青齊用兵調度星火急公晝夜措畫責分而事辦有宿盜抵法上官主以劓刑決之公力辨曰時方關動肉刑久廢行之恐衆情疑駭且復纍公遂處以常法一邊將以􅖄叛獲奴從欲殺之公請讞於朝左轄公曰從逆者坐死尚何疑公曰彼固有罪為士師則可以僇之况奴為主脅寧知得巳乎上之囚果縱釋後來謝公拒絶不見曰嚮非汝私論國典也其清眘強幹至為子清公賞識且以大用許之五年朝廷大明黜陟調中外官銓法曠久後生晚進有愕然手不易措者以掌固起公遂授吏部貟外郎所謂吏勳總格貼簿之類指授大略然後以今酌古裁為新格粲如也庳秩崇資升降注擬多適其宜以能升奉訓大夫尚書禮部郎中尋以年及請老諸相謂公齒力健未宜失此老成人請益堅得告沾沾而喜曰自今方為一事了人也其含章有終為可見矣時致仕例未行俗且以奔競患失為風聞公勇退若尓識者莫不歎羡翰林諸公至餞以歌詩美之公氣貌魁偉資頴悟廉直精敏過人挺身正路動以撿押自律與人交雖小信不忒及談典故論法家令人聽之娓娓忘倦故至元已來刪定儀制公每預其庭議焉嘗有以瓜果為獻者謝去之曰此固微物第生平未省一介妄取諸人其自克治多類此疇謂阿私可得而浼邪中年後勑斷家事母復關白以書史自娛喜讀司馬公通鑑日手書為課曰一録則勝數過矣五載間寒暑不輟遂成全帙故晚節識益明志益篤然於丗猶有末忘者十三年夏余考試在汴尚憶公危坐一榻吐論猶健間及丗道理有所臲􅑶慨然義形于色因泣下沾襟余訝其遽如許也明年秋八月遘疾卒于家春秋七十有五夫人趙氏金太中大夫太常卿文簡公之女孫泗州防判經之女正內主饋壼儀有煒生四子皆讀書公資之殊力長曰誠克家不仕曰詢有文學淇州教官曰訓通吏事任江州某職曰諒能以孝移理于官而義襟靄如嘗為河南宣慰司提領按牘官又不負公之所鍾愛云孫男女如于公殁後八年子詢諒來謁余跽而請曰維憲使與先君丗契厚從遊且久知行已為最詳今墓石未銘敢百拜屬筆庶假寵後人以垂不泯幸先生母讓因弟其善狀而表之以銘銘曰士志弘毅奚間隆汚譬彼玉瑩丹青不渝顯允丁公志弘氣愈脫落門閥奮飛亨衢貞我憲度勵夫廉隅擢居省署以才以譽契囊佩玉氣貌舒徐表見一時聲光兩都開物成務綽然有餘其出其處與時盈虛解紱歸來詩書自娛人曰吏師我曰通儒淺之為失昧於卷舒公卿之門形勢之塗老不知巳伺候奔趍衆視為常曽何異於我獨翩翩勇退自如以此較彼孰賢孰愚豈惟知止而近不殆古所謂賢哉二大夫者公其庶乎我銘表德過者嗟吁故武節將軍侍衛親軍千户董侯夫人碑銘有序故武節將軍董矦死事后十有九年當癸巳秋八月庚戌夫人凌其氏卒於稿苐之正寢用次月九日嗣子守仁手開玄堂祔安武節匶左禮也重念母氏德全恩至以守仁蚤備戎行省定歲有時不幸罹兹大故例同丗俗附見於表志之末何以慰凱風寒泉之思惟是鑱銘别石嫓峙神隧用昭懿德越厥心是恔內翰與叔祖契欵尚惠顧使卒微志豈唯守仁等幸亦母氏之永光也敢百拜為請讓不容巳謹敘而誶之夫人號淑媛系艧澤大家父松岡先生諱軸母元氏先生資剛正有文行嘗提舉真定八州學校夫人幼聰慧即教之知書既笄容止幽間組繡剪製巧者餘思班經女誡皆通曉大義故金紫光祿大夫忠獻董公聞其賢淑求配長嗣士元維董氏勛閥大族丗稱有家法者夫人出儒素一旦起家若固有之即能事公姑奉祭祀不爽婦職小大説懌化行閨壼間穆如也太夫人早棄養忠憲公洎武節扈從出帥無虛歲門內事如麻一諉之主治居無幾何內外齊肅始一官府然審詳而不傷其婉嚴恪而不害其和以致家道昌冝豐儉中禮若乃終之以溫惠浹之以恭順四十年間奉承內助夫人之力居多夫人嘗以賜幣為武節作服衣之入侍上目其製精適冝且滅手迹顧左右曰董某妻必女紅之善者或歸語其堂多悚而效之者由是夫人賢淑聞于時及武節之喪哀毀幾絶者再比之奉轊安窆植碑表烈以終大禮其勤悴至矣加以鞠育諸孤朝趨學於外夕朂志於內至祝香空際願克孝而忠若冨與貴非所敢希至於時祀雖幼子童孫抱持起拜使習見熟其當然於嬰孩示教又如此故歲時拜慶瑶環瑜珥停鸞峙鵠玉雪照㬇樂融怡也至元三十年夫人竟以勤劬致疾既革子守仁越千里來省正容而謂曰宿衛事重何以我為業來吾且逝矣比屬纊立諸子戒之董氏一門世篤忠貞汝輩當效死報國母貽尓祖禰羞能然吾目瞑無憾矣言畢而終享年六十有一生子男四人長早世次即守仁守禮守謙守仁姿清峻射聲有父風勤於問學恪於官守初以羽林孤兒襲爵尋有功升宣武將軍簽右衛指揮司事餘未仕皆謹願克家子女四人俱適名族武莭有次室曰張氏夫人禮遇殊厚生男女各一教育嫁娶不異巳出女媵四及所生女一遺命劵而良之其逮下罔嫉有芣苡小星之惠若夫人者在家為淑嬺既嫁為哲婦老而稱賢母以行以法宜有銘銘曰夫婦之道人倫是維內治克雍尤婦之冝育德由素承家有基懿懿夫人兩全德儀譬彼蘭苡曄曄猗猗植根得所馨華日滋求佳耦而得英配融篤實而發光輝主祀孔嘉供養無違以孝以敬心焉與持志閔天勞而勸義豈特奉几而齊眉庭生玉樹秀擢連枝惟天姿而與教冝並悌而孝思孰云施而匪報繄美惡人兩遺雖壽齡兮似靳儘五福兮熙熙煒我彤管刻銘在碑香生七誡聲聞禁闈羌千秋兮百代與班氏兮同歸泰安州長清縣朱氏丗系碑銘并序大元以威德撫有方夏當其摧強暴剪妖孽而收廓清之功者莫不資心膂瓜牙之士以宣其力三齊諸軍號稱果鋭就偏禆中論之長清朱氏蓋其一也朱氏丗為黃山里中人逺祖諱寶寶生珍珍生鎮皆力穡致冨積而能散以孝謹聞鎮之配馬氏生五子曰在曰楫曰存曰林曰和洎女弟三人皆適里族而楫與存獨慷慨超昆季間既長並善騎射膽略過人平居恂恂殆無能為者至於臨事果遇敵勇自視無前貞祐𥘉金棄燕南渡所在豪強乘亂而起一僨一興迭為雄長人昧夫依於楫與弟存乃集鄉義年少團大望山以自保聞東平武惠嚴公倡率義師壁青崖山伏俟國兵攸歸楫慕義往見之遂假楫兵馬都總領歲庚寅武惠挈所部歸太師國王王丞制封拜徼衆力為用時楫以功從公請授懷逺大將軍同知濟南府事甲申略地而西次冠氏與宋將彭義斌遌陷陳中戰殁母弟存奉欍葬黃山原之先塋禮也存遂襲兄職以信武將軍俾領軍務俄鄆州失守翼武惠復東平就取徐邳乙未嘬鋒棗陽踣之進攻黃光尅焉積勞遷廣威將軍繼升昭勇大將軍辛丑歲軍府第功以最開賜金符充東平路行軍千户逮巳酉春竟以攻戰得勞疾卒夫人李氏系同郡大家其次室曰吳氏王氏劉氏傳氏生男子五人克正克紹克修克恭克順克正即夫人吳氏出既嗣昭勇軍務仍佩金符改授東平路長清縣行軍千户方荐歲南伐所在戰有之如壬子攻虎頭關以先登得功主將遙見之召使前免胄識面以鏐匜犒之戊午秋國兵大集釣魚山詔東師掣肘淮海宣武以騎將徇召伯􅞌之復有白金之賜已末冬王師渡江取鄂分率拔都穴城以入不甲解者四十晝夜中統三年破歷下城諸校以圍柵功例有銀碗紵𫀆之賚宣武預焉至元十一年掀荆山鍋河等戍十二年提漢甲從元帥孛羅歡掇連海清口淮安寶應水陸相聖殊力故明年秋復掠髙郵西遇賊一戰而纎行樞録勞上聞授武節將軍又準辟兼行省都鎮撫十四年隨右相别里迷失入覲進宣武將軍管軍總管仍宿杭以鎮明年處劇賊陳夀浮雲張三八等劫鎮縣殺守吏勢甚張比摛獮馘渠首二十餘級隨以蒙古漢步七百人收溫之五寨以能升本軍萬户十七年庚辰督造下瀨戈船竹頭木梯積羡增四十餘艘用是得勞憊疾輿歸卒黃山墅之正寢其壯而事者以宣武自結髮從軍幾三十年小大戰百餘合忠勇奮發亦可謂無負名之與爵矣夫人張氏系同縣丗家姿貞嚴齊家有法與宣武合德生子故女三人啓以丗敘宣授武略將軍本翼管軍千户就佩父金守戍臨安繼宣慰忽都虎駕海徑占臘占終朝廷恤其師復伏類歲良之寧海部群盜嘯凶者潭巴山月雙二溪同茶把所也武略獨首九十餘級扲介胄者艦者五戰遂平明州冬暴卒於明州之軍舍為人倜儻好施謙撝有祖懷公勤凛父風天不假壽止於斯悲夫明年夏四月夫人劉氏自慶元護靈轊而歸以從亦以哀悴致疾終孤子昭先就安祔公藏昭先二女長適幾管兀顔次歸今武衛親軍副都指揮使張瑾任適德起身戲下義激於衷最不忘其故者於是接挈今授昭信校尉管軍千户俾嗣其丗業葬之載月殘紹介其舅持翰林修撰傳夢弼善狀百拜來丐銘榮嘗讀西漢遊俠傳魯人尚儒惟朱家以俠聞長清在漢濟北地面控泰岱挾右滄海與魯封犬牙相入今朱氏丗為長清黃山里人家故饒財急難喜施丗不乏人豈朱家之逺裔乎且戎閫為國之正臣豪俠乃鄉土武斷其豁逹匿智雖習俗使然彼風聲氣概尚桓而趨事也如是非來之逺積之厚其流胡能若爾而淵者呼仍系之以銘銘曰天生五材闕一胡可孰能去兵芟夷繁夥繄朱氏先其來么麼三丗在田睯而罔墮加以孝友勤儉克荷﨣﨣懷宣拳勇強果尚桓朂義志不屑瑣諸父而下乃暨仍孫例生炳彪負嵎而賁風塵與會雲􅣂解屯撫定齊魯于桑于耘蕩一江吳席卷鯨吞會歸一原張本楫存三丗為將道家所忌唯殺不嗜能永厥丗偉曺惠武仁而且智臨陳愾敵虔劉鏺刈居當平時蟻封謹避儻存是心絫將何害萬骼雖脂功成而泰於戲朱氏我銘韋佩匪惟光昭惟以是誡絳州重修夫子廟碑絳為州甚劇其地蓄河山之潤總六縣以三萬户為河東冠俗剛儉尚氣義奄焉有三晉餘習州治民廬髙下覆壓蟠蜛枕跨岡陵是依獨夫子廟學據城之東北隅爽朗夷衍奠澤宫甚冝而素汾北來盤折容與帶郡城而西望之一泮水然廢撤既久莽為榛墟逮州將艧澤郭公來始圗興復遂起大成殿泮宫門各三楹甫朽棧而公卒漠然狼藉者蓋三年于兹噫將有待而然邪至元九年秋奉議馬公來尹斯郡既謁告顧瞻咨嗟憫夫垂成之功日就陊剝乃以完故益新為任於是完正殿壯臺門創兩序凡就屋五十餘楹層棟軒翥墀陛整削松桷有舄碩碩其庭中設素王像以顔孟十哲配侍左右東西兩廡繪六十二子及大儒二十有四衮冕哻裳峨峨奉璋奎壁輝映煥焉有光廟既成適選舉令下士子來歸洋洋滿庠既而衆議以州之治化及民者非一其大者著者可無聞於后來謁文於余因勉為撰述且寓夫豫之所感焉嗚呼三代之治道莫先於教學無重於育材材弗育則用乏其人民失化則不明乎善善不明則民入於僻民蕩於僻則幾何不為禽犢也哀哉欲求吏之良政之善胡可得已若夫天地緼絪山川開闔蟠精粹靈非有今昔醇醨之間人之秉彛具存天之生材不乏然氣之不充俗之不美者特以教之無素養之未至耳今國家崇聖道開化源建辟雍於京師立學師於鄉遂顓本業者復其身鳴一藝者無不庸是則大易人文之化菁莪樂育之方靡不備至奈何吏治者鮮推其本以簿書獄訟是務為士者不思根極聖道以大學自任區區從事於章句之末是不副上之所求所望焉而曰道不明秦無人也宜矣尹蚤以學術侍彤庭歷臺閣熟其然故下車之𥘉首事學校作新土民耳目至成就若尓可謂能也巳尹諱某世郡人既書其興建本末而繫之以詩其辝曰厥𥘉生民秉彛昭融物欲外遷良心蔽蒙於鑠元聖乃大有覺何效何則而先乎學于嗟叔丗降及漢唐道統湮微絺文繪章士騖空言吏昧厥治朝夕孜孜匪不摩勵科學異端簿書期會愚者不及淪於自棄聖不丗出發越道源粃粳虛文浩浩其天廟宫之建序庠是宣穆穆睿思意茲在焉而吏而士尚克勉旃盤盤閟宫完故益新馬公之功本既立矣道由生矣視為餼羊乃豫之恥秋澗先生大全文集卷第五十二
