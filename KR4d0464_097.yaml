body:
  text: 一五星行度並議前史之失以示髙允一年冬十月五星聚於東井此乃歷數之一史而不覺此繆浩曰所繆云何允曰按星金水二星常附日而行冬十月日旦在尾箕其申南而東井方出寅此二星何因背日而行欲神其事不復推之於理後歲餘浩謂允曰者本不經心及更考究果如君語以前三月井非十月也曆日詔云惟曆象日月星辰乃能成歲自侯采衛要欲同文直學士髙鳴雄飛辝也重公太原人官至吏部尚書玊堂嘉話卷之中玉堂嘉話卷之下魏景傳景字同叟淮南高郵之隱君子也身骨如削石瞳子碧色有光嘗賣繒於市遇華從授錬丹鑄劒長生之術元翁名碧天其師蟾海蟾之師曰吕洞賔洞賔之師曰鐘離權景凡五世矣云龍不識石人不識風鬼不識土魚不知水先生云陽不冬藏春氣發而無力十一年十二月十四日陽羅洑渡江明年十二月臨安降度宗二庶冝中文天祥兩淮張丗傑擁入許浦江口時見因改號景炎凡十八月十六年為帥臣張山口執文天祥至大都囚之上屢欲赦出相之竟不從十九年十二月𥘉九日戮于燕南城柴市錢譜劉更生傳舜父肓其毋常鬻薪以自給舜時糶米返置錢于米囊中以還其母則重華之丗錢巳行矣此唐代錢之驗也賈逵注夏商金幣三等錢為下等先儒所傳有錢明矣梁大司馬顧協所撰錢譜序云漢尚書郎主作文書起草月賜赤管一雙秋澗先生大全文集卷九十七
  hash: sha256:a34a5d69086be3c723c3291a0bd2494e71580f3d345c2cf113e1cc0985dd915b
