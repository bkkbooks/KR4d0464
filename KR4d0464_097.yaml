  text: 秋澗先生大全文集卷九十七玉堂嘉話卷之五燕展築南城係金海陵天德二年見蔡無可大覺寺碑史記不載蕭何修未央宫事此非細事馬遷漢史而不見書何謂青居山古果州也唐張嘉貞為相弟嘉祐官金吾將軍每上朝軒蓋騶導盈閭巷時號所居為鳴珂里源乾曜為相建言大臣子併求京職俊乂率任外官非平施之道臣二息俱任京官請出以輔外以示自近始詔可又議者言執政與國同休戚不崇異無以責成功上乃詔中書門下共食實户三百堂封自此始裴耀卿遷長安令舊有配户和市法人厭苦之裴一切責豪門坐賈豫給以直僦欺之弊遂絶李之儀端叔説遺教經係徐季海書李善尺牘東坡所謂手簡三昧者也三昧者正定也李屏山釋迦贊蓋出王勃成道記李但約散文而為韻語耳其達磨讃曰楖櫪者稱杖也遺山新渠記有云水至平而善利物今以至平而為不平不爭而為必爭雖有万折必東之心終有七遇皆北之勢佛書曰獅子吼者言説法與無畏也四万八千言大數也嘗讀後宋布衣徐理所進律鑑書其序云律者以實統虛者也何謂虛氣與聲也氣之在天地間或聚或散聲之無色無形故氣成於管聲成於樂首取司馬遷法度又説班固所作律志全取對韻説期於必中選也鹿庵命擬復立按察司手詔以一身之微惟万事之統不皇夙夜常切憂勤顧七道之提刑擴六條而從事近因省華偶值停間然非違稽緩之愆縱令弗問恐伺便譸張之者為害滋深仍轉側以詳思非監臨而罔益據所在按察司照依巳降條畫依舊設立施行於戲鷹隼當摶擊之任不與護恐為返傷琴瑟既更張之餘識大躰乃為稱職重出樂天每作歌詩成須令其家老嫗聽讀能通解其旨意詞為之定體此無他不過通俗近人情而巳特表而出之且為艱澀無謂之戒重西溪云正大七年亳州節使趙庭王詔别有擢用其子贄時為省知除掾既定省公問以召之之意贄曰以嫌疑故特回避而公拜禮部尚書入賀以成之鹿庵先生説為學務要精熟當鎔成汁㵼成錠團成塊按成餅惲以謂作文字尤當如是又云東坡草字為寫時肘著紙上故筆轉處多不園草書體貴輕筆當持重楷書筆貴精謹而體尚寬綽又説顔子壽夭不當只去顔子身上論它自堯舜巳降皋夔稷契周孔和氣所生者多矣至於顔子命數偶夭亦不足怪譬如人家昆仲五人有三箇賢的必有兩箇不肖的郭若思説天之分界南至臨邑郡北至鐡勒部日去地八万里交趾國日中人影在南王黃華西京留守廳題名記説起武靈王既破林胡始城雲中秦紹漢襲其名不改元魏之興也為京師焉西際大河東連上谷南厄中山北控五原廣袤千餘里規以為甸服逮遼德于晉晉割山前代北十有六州以賂之遼即魏之故基考位為宫闕是曰西京六典云父之姊妹其姪稱之曰女伯女叔唐盧坦傳舊制官階勳俱三品始聽設戟後雖轉四品非貶削者戟不奪自貞元已來京師立戟者不十八家唐陸贄傳云人君德合於天曰皇合於地曰帝合於人曰王父天地以飬人治物得其冝者曰天子皆大名也三代而上所稱象其德不敢有加焉至秦乃兼曰皇帝流及後世皆稱之君始有聖劉天元之號故人主重輕不在稱謂視其德何如爾宋弘道説其舅劉景玄先生善記一日友人與逰市取染工曆令讀數面試之一覽背誦不一字差義徒單侍講與孟解元駕之亦善誦記取新刋稼軒樂府吳子音前序一閲即誦亦一字不遺詳定官張孝純説一士人候某官疾既去遺一藁於坐視之蓋預作祭文也一日又問一病友友曰且休放入待探懷無祭文相見聞者大笑米先生端州斧柯山石説端州石出髙要縣斧柯山山前臨大溪其絶頂匠者於此鑿石歲久乃成洞穴今已極深邃洞中常有水至春冬水涸採石中隂黑無所覩但以手捫石隨大小取之凡石理之精鹿即良工往洞中上不能别至於瑕玷璺脈須出洞乃可識故有纍日月而不得一佳者大抵以石中有眼者為最貴丗謂之鸜鵒眼蓋石文精美如木之有節也不知者反以為石病吁可痛哉凡取石有四曰上嵓下巖西坑後歷上岩之石最精下岩次之惟上嵓之石乃有眼之美者皆緑黃二色相重多者自外至心凡八九重其狀皆圎以色鮮美重數而園正者為上其大者尤為稀有絶大者乃如彈丸有布列硯中或如北斗或如五星心房之形者價不減數万其生於墨池之外謂之髙眼其內者為低眼曰髙眼者以其不為墨所漬掩常可覩於前也無眼者雖資質甚美不出千錢石之品有數種其色正紫而微有青潤無芒叩之無聲此近水者也其色微紫而不深重近日視之略似有芒叩之有聲此嵓壁之石二者最為發墨乃石至精者其次青紫叄半或紫而近赤或青多紫少皆石之下也端人為硯凡色之不佳者須用佛桑花染漬之𥘉亦可愛經水即如故又山有自然團子或云剖其璞而得焉謂之子石又謂石之有金線者為美此正其病也端人亦不取云準材之大者尤為難得每購求方六七寸而亡病脈者固亦少矣比歲所貢方硯者五皆以及為凖然止於岩石之中品或眼工人輒鏨去之恐異日復求不可必致也太常新藥祭時開邸嶺上祖宗於藩邸文其辝曰惟我烈祖誕受上帝之命肇造區夏先皇帝嗣守大業卒其伐功圖惟奉答神祐光昭前烈而祀典闕如爰命多方旁求先王之樂八音遏逸未潰于成今豫小子肅將天子之明命俾殿南服聞時周禮將具于我魯邦欽命攸司是徴是舉匪攸敢私聞庶用畢我先志以對天之休神其格思翰林學士徐威卿先生辝也官至集賢院大學士金登科記序道散而有六經六經散而有子史子史之是非取證於六經六經之折中必本諸道道也者適治之路天下之理具焉二帝三王所傳是巳三代而上道見於事業而不在於文章三代而下道寓於文章而不純於事業故鄉舉里選取人之事業也射䇿較藝取人之文章也兩漢以經術取士六朝以薦舉得人莫不稽舉於經傳子史焉隋合南北始有科舉自是盛於唐增光於宋迄于金又合遼宋之法而潤色之卒不以六藝為致治之成法進士之目名以鄉貢進士者本周之鄉舉之遺意也試之以賦義䇿論者本漢射策之遺法也金天會改元始設科舉有詞賦有經義有同進士有同三傳有同學究凡五等詞賦於東西兩京或蔚朔平顯等州或涼庭試試期不限定月日試處亦不限定州府詞賦之𥘉以經傳子史內出題次又令逐年改一經亦許注內出題以書詩易禮春秋為次蓋循遼舊也至夫眷三年浙津府試逮及海陵天德三年親試于上京貞元二年遷都于燕自後止試於浙津府收遼宋之後正隆二年以五經三史正文內出題明昌二年改今群經子史內出題仍與本傳此詞賦之大略也經義之𥘉詔試真定府所放號七十二賢搒逮及蔚州浙津今昜書詩禮春秋專治一經內出題蓋循宋舊也天德三年罷去經義及諸科止以詞賦取人明昌𥘉詔復興經義此經義之大略也天眷二年令大河已南别開舉埸謂之南選貞元二年遷都于燕遂合南北通試于燕正隆二年令每二年一次開闢立定程限月日更不擇日以定為例府試𥘉分六路次九路後十路此限定月日分格也天德二年詔舉人鄉府省御四試中第明昌三年罷去御試止三試中第府試五人取一名合試依大定間例不過五百人後以舉人漸多會試四人取一名得者常不下八九百人御試取奏旨此限定場數人數格也自天眷二年淅津放第於廣陽門西一僧寺門上唱名至遷都后命宣陽門上唱名後為定例此唱名之格也明昌𥘉五舉終埸人直赴御試不中者别作恩榜賜同進士出身會元御試不中者令傍末安插府元𬒳黜者許來舉直赴部𥘉貞祐三年終埸人年五十以上者便行該恩此該恩之格也大定三年孟宗獻四元登第特受奉直大夫第二第三人授儒林郎餘皆從仕郎後不得為例明昌問以及第者多第一甲取五六人狀元授一十一官第二第三人授九官餘皆受三官此授官之法也進士第一任丞簿軍防判弟二任縣令此除受之格也近披閲金國登科顯官升相位及名卿士大夫間見迭出代不乏人所以翼贊百平如大定明昌五十餘載朝野間暇時和歲豐則輔相佐佑所益居多科舉亦無負於國家矣是知科舉豈徒習其言説誦其句讀摛章繪句而巳哉篆刻雕蟲而巳哉固將率性修道以人文化成天下上則安冨尊榮下則孝悌忠信而建万丗之長䇿科舉之功不其大乎國家所以稽古重道者以六經載道所以重科舉也後丗所以重科舉者以維持六經能傳帝王之道也科舉之功不其大乎庚子歲季秋朔日東原李丗弼序唐人黃金臺詩燕昭北築黃金臺四方豪俊乘風來秦家燒書殺儒客肘腋之間千里隔去年八月幽州道昭王墓前哭秋草今年五月咸陽關秦家城外悲河山河上關頭車馬路殘日青煙五陵樹徒單顒軒云此詩議論深長甚可學也皇甫湜編年紀傳論古史編年至漢司馬遷始更其制而為紀傳相承且編年之作豈非以事繫日以日繫月以月繫時以時繫年者哉司馬氏作紀以項羽承秦以吕后接之亦以厯年不可中廢故也均輸法起桑弘羊謂市井百貨皆輸官坊啇賈不復貿昜唐禮部貟外郎為瑞錦窠貟外􅈦前有大石碎諸州廢印於上又掌圖寫祥瑞令狐楚元和𥘉任此貟外郎嘗有詩曰移石幾回𫾣廢印開箱何處送新圖是也退朝録疏廣云賢而多財則損其志愚而多財則益其過且冨者衆之怨也吾既亡以教子孫不𣣔益其過而生怨待君子以誠治小人以術反是為不仁不智矣東銘似乎兼愛其實理一而分殊漢制州郡佐史自長史以下皆太守刺史自辟如杜髙則楊震所辟李膺則胡廣所辟唐制採訪節度官屬自判官巳下得自辟舉未報則稱攝巳命則同正如杜甫則嚴武所辟韓愈則董晉所辟三司使謂鹽鐡度支置制條例司歐參政云天下之事惟宰相得行倠臺諌得言漢時長安北七百里即胸奴之地長城始築自趙簡子議者亘千里人治一步役三十秦制商鞅佐秦以為地利不盡更以二百四十步為畒百畒紿一夫又以秦地曠而人寡晉狹而人夥誘三晉之人耕而優其田宅復及子孫使秦人應敵於外非農與戰不得入官太率百人以五十為農五十人習戰故兵強國冨漢故事漢興七年長樂宫成諸侯朝畢復置酒侍坐殿上伏尊以卑次起上夀故事上燾四會曲注言但有鍾鼓無歌詩魏青龍二年以古置酒曲代四會曲又易古詩為羽觴行用為上壽古者司會今之尚書也周官司會以參互考日成以月要考月成以歲會考歲成以周知四國之治以詔王及冢宰廢置笮復引一索其名為笮人懸半空度彼絶壑此獨孤及招北客辝也天子之門以通十二子謂甲與子為支干之首總而言之也六壬壬為水其數皆六如六丙六丁之類百六之會章會統元漢以黃帝上元甲子為首至太和元年所積之數至百六十年為一厄也漢律厯志髙麗官制其品從論穿執傘有陪蓋為從傘也金國𥘉問宋索金文玉册宋曽册為東懷國溫公通鑑無髙祖廢孝惠留侯招四皓從太子事伊川易傳取之者善其智而能諌以明納約之義溫公去之者為後世慮逺矣去取之意兩不相悖學者當默識之楊龜山云箕子疑亦可死而佯狂以避蓋以父師之義死之則傷勇矣老莊之學衡麓胡先生云老莊見周未文勝人皆從事於儀物度數不復以誠信為主故欲掃除弊迹以趍乎本真而矯枉太過立言有失玄虛幽眇不切事情遂使末流遺略禮法忽棄實德浮遊波蕩其為丗害更甚於文滅質漢開西域三十六國後稍分至五十餘國皆在丐奴之西烏孫國之南逺者万有二千餘里近者不下九千餘里或問上蔡先生講論經典二三其説者當何從謝答曰用得即是驗之於心而安體之於身而行斯是矣如求之或過於幽深證之或出於穿將破碎大體不見聖賢之用心冝無取焉劉元城云説得一丈不如行取一尺楊龜山語遊執中云常以晝驗之於妻子以觀其行之篤與否也夜考之於夢寐以卜其志之定與否也伊川先生云讀書當平其心易其氣闕其疑則聖人之意見矣東坡先生云聖人之言當以數句成文而求其意若學者率以一字為斷遇其不同則異説生焉朱文公語學者觀書法云且當玩味大意就自已分上著實體驗不須細碎計較一兩字異同學問之道無它求其放心而已東坡論老莊之教君臣父子夫婦之間泛泛乎若萍遊於江湖而適所值者商鞅韓非得其所以輕天下齊万物之術是以敢為殘忍而無疑大抵於所厚者薄則無所不薄理勢然也陳履常云士大夫視天下不平之事不當懷不平之意平居憤憤切齒扼腕誠非為已一旦當事而發之如決江河其可禦耶必有過甚覆溺之至切為陳子之論有大學有所忿疐則不得其正之義要當豁廓然大公物來而順應之胡文定公曰有志於學者當以聖人為則有志於天下者當以宰相自期降此不足道矣石徂徠曰士之積道德冨仁義於一身蓋假權位以布諸行事利於天下也豈有屑屑然謀夫衣食者與侯師聖曰事君者以行道為志非為祿也然亦有時而為貧若專以祿為事則厮役之志也胡衡麓曰士之器大槩有三志於道德者功名不足以纍其心志於功名者冨貴不足纍其心志於冨貴者苟冨貴而巳則亦無所不至矣孔子所謂鄙夫之事橫渠曰德未成而先以功業為事是代大匠斫鮮不傷手也堯夫詩曰慎勿輕言天下事伊周元不是庸人陳述古曰大丈夫當容人勿為人所容伊川云别事人都強得惟識量不可強如鄧艾位三公年七十處得甚好及因下蜀有功便動了謝安當謝玄破符堅對客圍棊報至不喜及歸折屐齒強終不得又云堯舜事業亦只如太虛中一點浮雲過目胡文定公語楊訓曰人家切不要事事足意得常有些不足處便好人家才事事足意便不恰好事出亦體消長之理言也青苗錢如今之預取麥錢也假如即目麥價一貫偕與五百將來徴麥一石助役錢國家遇有大役均取錢於民官為雇傭也唐故事奉使四夷其印章曰大唐入某國之印見蜀王建丗家五代吳越貢賦朝廷遣使皆由淄萊泛海歲常漂沒其使吳越王錢鏐嘗遊衣錦軍作還鄉歌歌曰三節還鄉兮挂錦衣父老遠來相追隨牛斗無孛人無欺吳越一王駟馬歸唐開元二年制選京官有才識者除都督刺史都督刺史有政迹者除京官使出入常均永為恆式漢制由郎官而出宰百里由郡守而入為三公漢少府掌山海陂澤之稅以備天子私奉大司農掌國貨以供軍國之用漢制武帝北伐乃置萬騎太守而馬政兼於郡二千
