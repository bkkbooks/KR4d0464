body:
  text: 祭文祭蒲大夫文大元國至元十八年歲次辛巳三月丁酉朔十有九日乙卯朝列大夫燕南河北道提刑按察副使謹遣從事賈汝霖以清酌庶羞之奠致祭于河內公之神惟公德挺群哲獄清片辭列髙弟于聖門揚仁風于蒲邑三善之美庸能既耶適星垣有分按之行過神宇致一柸之奠庶祈靈貺以益不能尚饗祭孝感聖姑文惟神肇迹博靈遇仙渦浦懿昭靈作蠶聖母千祀永賴神功斯溥食弗再則飢衣弗製則窶念此歲事惟神其惠顧之尚享故江漢大都督河間路總管兼府尹史公祭文幽霫萃氣招搖耀芒合是二者篤生忠良惟公應運挺出起家朔方奮父兄之餘烈荷天衢而鷹揚武濟文經為峕棟梁宿一軍於陽夏號東南之精強枳棘非所移旌鎮穰撫我瘡痏靖我邊強其惠春雨其威秋霜掇我殘棄變而金湯復我陂障積而陵岡孰慮鱗介易我衣裳彼氣日索我師堂堂果上鈞之一戰掃敗葉于秋啇每出竒而制勝𥘉不知古人之所長殆羊傳之久駐控上流于荆襄雖飛渡之無及吳之所以亡者本由此而用張能回百戰之餘勇效政迹之章章鬱公堂之佳樹至今三鎮指為公之甘棠然干將而輔履終所用而失常加憂深而思逺此夙夜之所以遑遑也竟風悲於大樹奄龍剱于幽藏嗚呼才有餘而用不悉位雖髙而志靡償曽桃李不言而天下為之傷也公常幕余二年倘佯促滕言笑執手飲觴略吏事而不責謂國士之或當兹奉恩綸按部滹陽望龍驤之塋域能我涕之弗滂㵼平生於此辭庸表公之衷腸噫慟臨江之哭在公則萬事巳矣有子孝繼以後則其流未央神之聽之庶少慰其所望也尚享祭郝奉使墓文大元國至元十七年歲在庚辰二月十有二日甲申朝列大夫燕南河北道提刑按察使友生王惲堇以清酌之奠致祭于故翰林學士國信大使陵川郝公之墓嗚呼甲寅之冬仲月之尾公自𣏌來道出鄘弼始覿清揚重於夙契把酒論交笑談遊藝顧睞回翔吾子可誨臨别之語一何勉慰維中元春雲龍交際我時遊梁與公再會東館相過四并同醉所學所行盡發其祕北次龍岡嘔血而癘書來及豫愈見友義我車北轅公已南逝自兹及薨凡十六歲追憶平生潸焉出涕公之問學閎肆汪􅐮公之文章豹炳乕蔚万斛淵泉出不擇地太史與倫皇墳可嫓浩浩江漢万古不廢發為忠貞見諸行事著書垂聲諒非本意匪豫得私乃世公議今我想公令人短氣斯文線如忍復殄瘁直筆疇歸大册孰卑偉迹鴻休光潛揚厲而最傷公為國出使𥘉館儀真主成和計奉持國書以死自誓万介外侮群尨內猘莭落瘴煙精誠益勵屬國平原同歸一致長星墜芒使軺還轡玉上青蠅何啻一二惟皇聖明見萬里外録勞棄瑕豫豈汝罪士無賢否入朝見忌膚訴再行與病交劇一僨不起萬事瓦棄感時懷人憂來附髀昔賢有言常論我輩大概無差節目或滯如公之才如公之志雲夢九吞曽弗芥蒂俯掇勳名髙視一丗意廣思長反為物制豈惟公傷因以自識茫茫太鈞形流萬彚幾丗幾年生此偉器贄用潓宗誼逢漢帝百未一施胡奪之易雞水淪光郎山斂翠隱然一丘保之西遂車過腹痛我懷曷既黃鳥聲悲助我歔欷臨風拜公哭而載酹嗚呼哀哉孤忠伊鬱幽憂樵悴生罔能伸死而永閟寓哀斯文庶昭枉昧公如有靈恐豫言為知己也尚饗祭武強南龍池神文維神威洞淵府奮飛天衢致雨興雲執帝之樞顧此兾野時極焦稿桑半捲而蟲作􅑂穀出壠而氣未蘇農官至無可而勸窮民將失所匪惟吏責恐亦神之所當虞也况蒼精昏見適時之雩望靈池而致禱庶少金其區區嗚呼帝而下君也我當供厥聀耳免吏責而歲有成則其敢後諸尚享北嶽兾之為分方數千里惟嶽峻極于天神奠安之水旱疾癘神主宰之今者地不藏陽寒氣失序歲律向終未霑冬澤俾野土不膏宿麥無望春疫將興巳足深慮飢饉荐至民何以生祈穀請命憂人之憂是亦部刺史之責也慺慺微誠敢用昭告尚享祭侍講學士竇公文惟公性極純誠道深養浩幼學壯行出人意表於周吉士在漢有道以術濟人方德則小丁巳春識公於沙麓之墟辛已夏吊公於肥縣之保憶忝列於􅌡洲閲歲華者再抄丗知公漢家之羽翼我以為中朝之元老謀方􅈾於聖咨憂遽遺於丘禱今也云亡士林悴稿據愸遺而論斯民有無祿之歎以順受而言得五福終命之考再拜墳阿奠酹草草顧藥籠之纎微蓋以答平日之不我少也尚享丞相史公明忌日祭文十六年十二月十九日按部中山府維公出入將相存殁哀榮公自去丗于今幾齡定人思公雖殁猶生永言不忘曰忠曰貞見之範圍展也大成勛藏盟府德為丗程赫赫堂堂如山不傾定人那知功𬒳齊民惲向侍燕几謦咳親承今遇明忌來拜神庭感念在昔依依我情有樂陳列有酮在罌碧映階酹兹一觥尚享定人像公於西北隅皆享祀謂忠孝會史公祭文惟公德冠群后望隆漢儀一節四朝知無不為收武定文綏之略有金聲玉振之規發至仁於易簀識大運之盈虧何巳私之曽及顓戒殺而為嬉雖羊祐知吳亡而勸進房喬以征遼而未冝固足與之等夷也嗚呼柱石巍巍歘然中微風雨震凌恲幪者誰俾為善者嗒然而若喪變怪者百出而不疑此又丗之歔欷而含愴也公殿是邦尤極恩威峩豐碑于國門冝鎮人之涕洟切嘗荷公左提右㩗豈孺子之可教在卵而翼之之恩大有濟于艱危及聞公薨身縶情馳矌一奠而如負蓋五年于兹也今我何幸改卑燕陲歷河山之故封悵音容之依稀念公平生其能巳而公雖云亡為丗蓍龜公爽在天尚充念之蓋生而矝其愚既有以省録豈殁而知其來復無所維持也追盛德而曷報庶不辱我公之所知尚饗岱嶽祠禱雨文嵓嵓岱宗雷雨宅兮艮震對代生物仁兮片雲膚合天下澤兮兹者春霜例災桑柘空兮二麥含實勒將稿兮秋雖下種不出土兮無褐無糗歲何卒兮衣𬒳饜飫膚合力兮仰惟嶽神其念兹兮憂民之憂而亦部刺史公之責兮慺慺微誠神其鑒兮尚享黃石公祠乞靈文惟公鍾秀崇丘降神圯上靈氣驚丗倘恍莫詰如子房以韓亡之餘開炎漢之業為帝師之崇其顯授隂翼竟濟丗美者先生之神之功也不肖猥叨時名艾服官事余草年每以昧於事機動成乖戾為愧然非其材而樂之者有賢父兄故也矧先生明靈乎至若矝其愚昧濯其固陋增益其所不能非先生其誰用是乞靈祠下區區之懷神其鑒兹尚享修治新阡告成文糊口四方幾二十載歲時拜掃禮有不逮水泛雷轟未免惶駴於其事亡不孝之大即此良月躬為修治芟蕪剪棘增髙夷圯輔植林空再釐風水郭以周垣隆阿四起樹門神遊題阡表氏揭虔妥靈非直觀美功今有僝以告以祀神之聽之以克永世尚享韓君大祥祭文嗚呼王宗韓氏通家往來三十年間情好孔懷矧惟亡友吾門上第貞幹風生彂強剛毅其在諸生先子所喪年近而立揚厯中外臺掾郎曹名聲􅎪􅎪前歲之秋告别何遽曽未越境夢隨川逝日月云邁奄復祥祭論其受年校夫稟氣老而益強期頥可致衆維奭傷去之太蚤古云五十不為之大宛彼二雛卓有所樹翶翔仕途侭持門户依依孝思以永終譽君如有靈亦足以慰夫懷之素也尚享為姓氏告亡妻文維丁亥歲六月十八日丁丑夫惲謹以茶果之奠告于夫人之靈推之為姓世不多有故嘗詢其所從出為汝討論者有年一無所見適讀替夫氏姓論曰推氏建氏南氏舒堅氏魯陽氏黑肱氏皆出楚之芈姓者先君熊繹氏之㣧其來光且逺矣嗚呼夫人殁而有靈亦將歆慰其光且逺者用是不敢不告尚享中丞王公祭文大元國至元二十六年歲在巳丑二月辛亥朔越八日戊午友生王惲謹以清酌之奠昭告于正議大夫中丞王兄之靈嗚呼朋友之重義列天倫切切偲偲疇非弟昆惟君顧我而我宗君以志則一以分則親如漆斯固如蘭斯馨而敬而愛久而益新爰自垂齠以及於冠授業蘇門各伸志願智愚雖殊道則一貫君衷淵塞浩無涯岸脫略辝華好謀能斷嘗論士心酬酢萬變如匪中立鮮不棼亂此豫少君餘何足算我時念君大器已見敦我鄙薄激我愚懦治仕將歸而豫獨眷繼分使符有最無殿在昔相度有若昌黎辟佐戎幕大為已知及論國計莫之與規裴非少韓有崖其間隱忍就事材為實難穆穆忠武曰伊曰吕桃李盈門夛士如雨同升諸公曰僎是與𥘉疑中舍謂輕所處長居六曺是為之所自後騰揚又知所主曰史曰張曰姚曰許交口薦揄螭蟠鳯翥望君庿堂致主堯禹其經綸國業固足以見君之器宇彼或無知奚我齟齬淮海歸來道在心小角巾私第日事墳討周防有餘蛇虺結繳讒火燒城甚於原燎伊欎積中不無熱惱嘗切諗豫憂丗心悄覯閔何多受侮不少每見慰寬外物一掃擴量沖融致養強矯死非所憚此何足優如金在鎔百錬不撓白首窮塗亦足枯稿留使咨謀為世儀表此天下之公論非一己之私禱云何不淑不憗遺此一老吾乃知蒼蒼報施於焉有未曉者念君問學天人理皎臨終永訣投我腹藁語何琅琅秋空日杲淚灑行間茂陵遺草哀哀二子越玉陳寶賢而有文遹追來孝所存者長况不為夭鍾鼎一事古人誰了嗚呼事至蓋棺夫復何尚精爽不昧而來者是保我奠兩楹腹痛如攪平生相期逺到苦樂行違知者惟魢悠悠常情異心同貌老夫知音自深痛悼我過孰寡我履孰蹈有慟無聞徒辟而摽淚下河傾寄兹一抱嗚呼哀哉尚享路祭中丞王兄永訣文維君丰度凝遠內明而外閟以豫交遊之久頗髣佛其一二其所以斯疾而至於斯者而皆命之所致耶豈用有餘而嗇於行耶物或犯而隱不校耶欲求合而反得乖耶剪所愛而箋老懷耶不然何氣運喪謝叢一躬而災耶方謗之興豫適在燕嘗表裏乎西溪致一言於諸公之間力雖微而莫辨庶幾友義盡豫心之拳拳用是生有以書慰之殁有以文誄之又罔以不敏復銘而賁之辝固斐然思罄單無愧而巳今者執紼徒送永隔泉路然古人神交罔間存殁臨𡵨贈言故不憚其再瀆伏惟明靈鑒兹微悃尚享御史中丞王公誄文大元至元草五年歲在戊子秋八月十有一日前禮部尚書御史中丞東魯王公薨於維陽之客舍友生王惲謹遣子某致奠以不腆之文誄焉其辝曰顯允王公天姿粹精文辭翰墨外彪中弸年甫弱冠四擅華聲從元問學館申作甥二公提㯕大潰于成繼以賔師主善共城始拜公面歡如平生忘年定交實為畏兄青燈孔序絳帷趙廳尊酒文會桐隂滿慶既謁寥休偉其豪英力薦于上與之同升帝曰汝冕秉心和平乃眷乃顧詔扈南征潛鱗縱壑天衢荷亨一命卿二尋擢歷亭改漕京兆以廉見稱擢之提憲以顯以榮褰帷杖莭激濁楊清移鎮三晉八州敉寧載臨恆衛兩河肅澄霜空千里一鶚獨橫走忝二車峩冠振纓言議甚衎王事每兢其臭斯蘭其堅斯金兩秩五年愈親愈誠訌賊撾死王度載貞整我六曹春官首􅊹再執行憲居中作丞守以大體與時浮沉西湖瀲碧吳岫空青公餘吟醉若慰羇情用是北歸伊誰云憎徜徉淮海子潛疾嬰俟其少間偕之北行豈其奄忽痛乖延陵剛弗愛克遂傷厥生疇昔之夢飲于兕觥豫欲從之扜格莫能今悟死別神交匪冥今歲夏仲手書是承寄是新作託之稱停豈意期月遘此凶屯𥘉接傳聞既疑且詢繼來訃告大為震驚於戲已矣王兄殁而有靈鄙懷我聽以公夀言六十六秩未嘗疾痛體胖心逸以公宦業通貴之極三十年間略無空隙以公文章不事雕飾平易溫雅簡而有式以公聞望揚休山立聲價一時荆金趙璧以公㣧嗣怡怡蟄蟄翠竹高梧鵉亭鵠植所為福全百福無逆是用慰公能事可畢方之吾㑪又有大弗克及者秉彛豐厚度量寬宏愷悌樂易顧大光明不以逹貴我崇彼輊不以已長格物自矜心無城府口絶否臧孰為機張以虞以防坦焉蕩蕩內敬外方汪汪黃陂撓之不渾嵓嵓高山仰之彌尊天下之人不間識否聞君之名僉曰良友是喜是愛稱不容口我觀氣運有通有窒或負而乘君子冝息遺逸厄窮固足摧抑遽忍飄蕩忽還穹碧是用奭傷載悲載泣維此善人天地之紀幾世幾年生此偉器一朝云亡歎興殄瘁茫茫九原愛莫之起悠悠此懷曷維其巳上以愾斯民之無祿下以惜平生之知已嗚呼哀哉尚享推氏卒哭祭文至元草四年歲次丁亥二月壬辰朔十七日戊申中議大夫王惲謹以玄酒庶羞之奠敢昭告于亡妻推氏之靈嗚呼禮嚴卒哭氣渝一時愾然興感悠悠我思去日漸逺神而明之爰仰道宫有求戚知哀薦成事用光其儀君子與孫衰衣纍纍心焉寸草恩則春暉伸哀報德泣涕交頥而於自致其殆庶幾惟靈降鑒以慰永悲嗚呼哀哉尚享祭三藏佛圖澄文惟師薄遊襄國實開帝聰聞音知物變眩幽通非此無以回猛鷙而神事㓛我師真筌不忌在空來拜祠下辛歲𥘉冬酹觴乞靈裴回呪龍庶一勺之逹水人之心胸也尚享祭宋文貞公墓至元十九年歲次壬午五月巳未朔十一己已謹以清酌之奠致祭于唐太尉文貞宋公墓下嗚呼惟嶽降神生甫及申為周之楨如公之生於唐乃開元之治具也昔玄宗能逺而不忘一旦召而相之何其明邪及惑伶人一謔公終老于家何其昧哉豈天寶之亂于後有不容置大器于久安故於戲往者何咎國家方以親賢為急天或寵綏四方若公者復克降靈作甫與申免夫望壠思賢之歎此臣子所以再贍隧動曠世相感之意也區區之誠惟神其鑒之尚享授少中大夫福建閩海道提刑按察使告祖宗文巳丑秋八月三日至元草六年歲次巳丑八月丁未朔越四日庚戌孝孫惲敢昭告于王氏三代祖考祖妣之靈惲不肖獲承祖宗遺訓以至今日又於此月初三日欽奉宣命進授少中大夫福建閩海道提刑按察使是皆祖宗奕葉德積之故越小子何敢存殁光顯冝知所自特陳薄奠是用昭告尚享祭待制徒單衍文維至元草六年歲次巳丑冬十月丁未朔十二日巳未少中大夫福建閩海道提刑按察使王惲致奠于故待制徒單公之靈嗚呼禍與福善惡以應之變其常理有不復致詰者惟翰林侍講學士顒軒先生厥心孔嘉樂善修德及其立朝行道罔不傾悉晚歲得子又𣸪良碩學由家傳志乃早立先生云亡相咨惜念渠零屏繼任翰聀淹留京師豈造物者將有俟而輔先生之不及一旦夭奪松摧玉質云何不淑而臻此極眷若堂之三封悵遼海之不溢何一氣之衰謝逮子身而迹熄余愈知善惡之叵量蒼蒼之不可必也不然豈行焉忽諸致皋陶庭堅之不食吾不可而識也噫辝墳祝文伏以甌東南之極徼憲使外臺之正名受命以來夙夜祇懼有不遑寧處者於是月十七日卯刻與子公孺輩前赴任所伏惟明靈相其不逮以道護之尚享祭雙庿文至元草六年歲次已丑冬十月丁未朔二十六日壬申瘞以清酌之奠敢昭告于唐臣中丞張公睢陽太守許公之靈惟神忠抗全莭義摧賊鋒既障江淮載清河洛精爽在上其生炳如惲等適有事于維揚特乞新庿顧惟朽質逺涉畏塗過覬之心斷非敢萌虞之變庶祈默祐尚享祭淮水文惟神彂源桐山橫界楚甸德參四瀆潤􅉼百川惲恭綸恩逺臨殊域險阻炎蒸有自惜者惟神鑒祐其安以濟是則神上有以欽承明命下有以臣子之義也尚享亡妻推氏祭文遣奠祭文維至元草三年歲次丙戌冬十一月癸亥朔十有二日甲戌中議大夫前行臺行御史王惲堇以牲醪之奠致祭于夫人推氏之靈維君為婦克恭以母則式助我內治其冝其適四十三年乃猶一日眷我貧家勤亦之極惟是盡瘁遂臻于疾彌留八年屢值巳棘孰祓其祥梢復安息孟冬辛酉遽變容度孰禠其魄溘先朝露惟此喪制我實主之布冠齊衣我具舉之木美藏嚴恐速腐之美慰汝心汝其顧之我小甲戌窆焉襲吉奉安汝柩皇姑之側升輴彂引爰用控告汝冝勿憾我未為恔魂兮歸來些四荒不可以往兮惟汝子孫是依是保黯黯精魂悁悁心目旬浹之間重有所祝曰薄西山一語不復念之奭傷又熟為鬱於戲零落山丘生存華屋自古皆然非汝之獨惟弗偕老天為之酷有淚如泉永注河曲嗚呼哀哉尚享過趙祭忠武史公祠文夫用物精多者英爽罔昧垂顧異常者死生不殊我丞相忠武史公以丘山之重顧草芥之微其生也卵而翼之其殁也寐而訓之兹者奉詔比上展拜新祠敢乞明靈增益不逮蓋愚魯之性惟其素知於言動之間庶幾默祐尚享秋澗先生大全文集卷第六十四
