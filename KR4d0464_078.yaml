front:
  text: 秋澗先生大全文集卷第七十八
  hash: sha256:85ce0bcbbefc9794ab88f36db8da685d1bb0c7d1e23a18335a61e422ee042537
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_078-1a}
body:
  text: 進承華事略箋臣惲謹言伏以學止虛文在明時而何輔士傳民語恐小道之可觀俯瀝愚衷仰陳瞽頌臣誠惶誠恐叩頭叩頭恭惟皇太子殿下溫文海潤孝敬日暉方丕承天序之時有歷試諸難之命事統殆萬幾之廣君門邈千里之遙雖睿足以有臨明足以繼照仁足以及物智足以周知復多識於前言乃益隆於孝治謹採儲闈之事要庶幾賈傅之遺規儻賜乙觀豈勝至幸波洋少海固不擇於細流德表華針竊效持於衆美臣惲今所纂集名曰承華事略凡草篇釐為六卷謹奉箋投進冒瀆嚴威無任激切屏營之至臣惲誠惶誠恐叩頭叩頭謹言至元十八年十二月日臣王惲進承華事略序臣惲嘗讀文王世子賈誼保傳篇二者教飬大子之方盡矣苐去古逾逺其典禮有不復行於今者又伏念殿下春秋鼎盛以天挺英睿之資復有不待學焉而後能者故臣愚慮敢述其切時近用可舉於今庶有輔於來者著而為篇然事有先後必循序而進竊謂孝者德之本也唯天子之孝以寧親敷教為大故首之以廣孝愛者孝所生也惟孝友于兄弟故繼之以立愛孝愛既立亟當正者國之本也故繼之以端本本雖端非學無以成其德故繼之以進學學不無異端之害故以擇術謹習次之教尊德成必取正於官非聽政無以驗諸用非逹聰無以周其知故方其聽政即以逹聰繼之國政之外兵戎為重故以撫軍次之軍國事殷舉措之間恐涉僣誤故以明分次之文武並用長久之術故繼之曰崇文尚文之實親賢為夲然不可不辨其邪正故親賢後繼之曰去邪正人之言無匪弘益故繼之曰納誨雖聖人不能無過諌而能改善莫大焉故先以親之幾諌次以已之從諌思互為警省爾至若仁民愛物非德澤何以加故預之以推恩德加於民而儉約逸豫居上者尤所當尚戒天下之事無大小官得人則治故以審官終之自廣孝至審官凡二十篇釐為六卷篇有圗俾見古人當時事迹之偉後有説以致愚慮循序近用之義且易於按觀焉題之曰承華事略臣不自揆涓埃之微何足以益崇深之海嶽猥以惓惓愚誠庶千慮一得或可仰禆儲闈萬分之一蓋臣素願也臣王惲謹序承華事略目録第一卷廣孝立愛端夲第二卷進學擇術謹習第三卷聽政逹聰撫軍明分第四卷崇儒親賢去邪納誨第五卷幾諌從諌推恩第六卷尚儉戒逸審官承華事略卷第一廣孝禮記文王世子篇曰文王之為世子朝於王季日三雞𥘉鳴而至於寢門外問內臣曰今日安否內臣曰安文王乃喜及日中又至亦如之及莫又至亦如之食上必在視寒暖之節食下問所膳命膳宰曰未有原末無也原再也無令使先進之物再進恐臭味惡也應曰諾然後退武王帥而行之不敢有加唐玄宗開元二年宴京師侍老於內殿八十至九十者版授賜爵及几杖粟帛有差紿一子侍婦人亦如之其孝子順孫終身勿事征防兵父母年七十者遣還民天寶十三載詔天下家藏孝經臣惲伏聞殿下天粹元良日隆純孝其問安視膳於兩宫之間與古契者多矣然於君父之孝復有當廣之者如承顔順志俾聖躬寧於上庶事康於下乃臣子孝敬之至故楊子孝至篇云孝莫大於寧神謂尊祖考安神靈也寧神莫大於寧親終於四表之􅌚心如唐之賜爵給帛孝子勿事征防親年及者還民及詔天下家藏孝經有三王四代飬老之遺風焉豈非德加百姓四表之􅌚心者乎惟殿下詳覽益廣至德立愛書伊訓曰今王嗣厥德罔不在初立愛惟親立敬惟長始于家邦終于四海後漢和帝為太子時特親愛兄清河王慶入則共室出則同輿及即位待慶尤渥慶或時不安帝朝夕問訊進膳所以垂意甚備唐睿宗諸子傳曰玄宗為太子嘗製大衾長枕將與諸王共之睿宗知喜甚及先天後盡以隆慶舊邸為興慶宮天子於宫西南置樓其西曰花蕚相輝之樓南曰勤政務本之樓帝時時登之聞諸王作樂必亟召升樓與同榻坐或就幸第賦詩燕嬉賜金帛侑歡丗謂天子友悌古無有者時有鶺鴒千數集麟德殿廷樹翔棲浹日長史魏光乘作頌以為天子友悌之祥臣惲切惟父子存乎天性兄弟謂之彜倫友愛親睦人心之良德也孔子曰惟孝友于兄弟施於有政兹蓋言常人以一身齊治尚先悌於兄長故能施政事矧國之儲二家有四海者歟異時將以立愛立敬睦九族建宗親使維藩維城之勢屏翰王室措天下於磐石之安不以友愛為本可乎故伊尹於太甲嗣位之𥘉不遑它務首以愛敬為訓太甲竟能誨過思庸言思念常道也復為殷之賢君唐明皇以一念深至致開元雍熙之化兹非前世之明效歟端夲尚書太甲下伊尹訓太甲曰一人元良萬邦以貞唐燕王忠傳許敬宗曰本正則萬事治太子者國之本也魏元忠傳袁楚客曰夫安天下者先正其本夲正則天下固國之興衰係焉臣惲謹按孟軻氏曰天下之夲在國國之本在家家之本在身人君者天下之表則故以一身為天下之本太子者國之儲副天命所係屬人心所歸問是夲正則國正國正則百官正百官正則逺邇莫敢不一於正故伊尹之訓太甲正謂此也且政者正也以正而正不正者也今殿下方開物成務作貞萬邦思取法於正者非一而端本澄源其可後哉承華事略卷第一承華事略卷第二進學昔殷髙宗為王子時問學于甘盤及厥德罔顯得傳説而告之曰爾惟訓于朕志説曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永丗匪説攸聞又曰念終始典于學厥德修罔覺髙宗承説之教至四海咸仰其德漢顯宗立為皇子師事博士桓榮學通尚書令榮止宿宫中積五年榮上疏云太子以聰睿之姿明逹經義觀覽古今儲君副主莫能專精博學若此者也斯誠國家福祐天下幸甚臣惲觀自古人君雖秉聰敏睿哲之資必由學以成其德者蓋所以究聖政明新之理以正其心術通古今治亂之源以增其智慮使聖益聖明益明雖比隆唐虞無難且如射弓學書一藝也非習焉尚不能造其妙况治國平天下之道哉故傳説告髙宗使終始常在于學既無間斷則德之所修有不期然而然者此之謂也伏聞殿下屢召儒臣講肄經史進進不巳非惟緝熙光明抑以仰副聖上訓學之意為國福祐豈不偉哉擇術晉元帝立子紹為太子帝好刑名家以韓非子賜太子庾亮諌曰申韓刻薄傷化不足留聖心太子納之太子是為晉明帝臣惲按申韓之學非惟刻薄而巳且導人君以驕淫放恣李斯嘗以誤二丗矣豈可以教儲二者邪庾亮雖清談之徒然斯言則有益於丗故取焉謹習漢景帝太子徹聰明有智術好詩書善史隸時竇太后尚黃老言今太子諸王通讀之太子獨能解其意而心弗好也每還宫取儒書名法之術習讀之及初立即能表章六經罷黜百家舉用俊茂與之立功至號令文章焕焉可述元帝贊曰元帝多材藝善史書鼓琴瑟吹洞簫自度曲𬒳歌聲分刌節度窮極幼眇及即位牽制文義優遊不斷孝宣之業衰焉臣惲謹按保傅篇陳教太子首以所習為言蓋謂性相近習相逺也且常人所習或違逺善性猶云不可况生長深宫極於冨貴者可不慎歟如武帝之黜百家尚儒術尊先王之道知所統守容受直言好賢不倦正由謹其所習於𥘉故也逮其孫孝元習音曲為樂至牽制優遊不果於斷二君之用心賢否可不鑒哉然仁孝禮義詩書射御乃所習之正也今殿下仁孝恭謹聞於中外在移飬嗣德之𥘉能所習皆正無一念不謹臣知雖放心快已之事曰陳於前不能奪巳成之習巳定之心矣如此其於守成持盈何有承華事略卷第二承華事略卷第三聽政元魏太武帝燾少聰明大度既立為太子明元帝詔臨朝為國副主以長孫嵩宿德舊臣歷事四丗功存社稷奚斤辨捷智謀名聞遐邇安同曉解俗情明練於事為左輔坐東廂西面以崔浩慱聞強識精察天人穆觀逹政要識吾旨趣丘堆在公專謹為右弼坐西廂東面百官揔已以聽帝時隱而窺之聽其大説謂侍臣曰以此六人輔相太子吾與汝曹巡行四境伐叛柔服足以得志於天下矣群臣時奏所疑帝曰當決之汝曹國主也臣惲觀歷代明君皆令儲二監國政者正欲移飬君體厭服臣下審明治道熟知民事為務猶聖上今日之付殿下豈特使經理機務習熟節目者哉然政之紀綱不過審慎官爵勤恤民隱明信賞罰至公無私而已所謂審官任賢使能與我圗治也所謂恤民輕徭薄賦以厚民生也所謂明信賞罰使功罪允當聞者恱服也誠能如此雖堯舜之治不是過也惟殿下留神省察逹聰唐太宗問魏徴為君何道而明何失而暗徴曰君所以明兼聽也所以暗偏信也堯舜氏闢四門明四目逹四聰闢四門者謂開闢四方之門廣致衆賢明四目逹四聰者謂廣視聰於四方使天下無壅塞也雖有共鯀不能塞也靜言庸違不能惑也故曰君能兼聽則姦人不得壅蔽而下情通矣臣惲謹按尚書舜典曰闢四門明四目逹四聰蓋人君居九重之深所聞所見者不過左右前後之事此舜之所以逹聰也故逺聽於忠良者則聞所未聞偏聽於左右者則事多欺蔽伏惟殿下方育德春宫重光華夏於圖治有為之𥘉逹聰廣聽似為急務又傳曰審所以聽言受事則下不欺蔽矣如中統元年許諸人陳言亦逹聰之一端也撫軍春秋閔公二年左氏傳曰晉侯使太子申生伐東山皋落氏里克諌曰太子奉冡祀社稷粢盛以朝夕視君膳者也故曰冡子君行則守有守則從從曰撫軍守曰監國古之制也西漢髙帝紀帝征淮南王布乃發上郡隴西車騎巴蜀材官及中衛卒三萬人令太子監撫關中唐順宗為皇太子德宗幸奉夭太子常親執弓矢率軍後先導衛及戒嚴朝夕巡城傳宣撫慰督勵戰士故感激奮發氣益百倍臣惲切見聖上往年詔殿下領樞密院事正古昔撫軍制也每歲車駕巡幸兩都以萬乘之冨六軍之衆如大獵以軍律驅馳宿衛按羽林環布殿下躬行扈從所當齊整軍容撫慰將士使逺忘跋涉之勞日聞歌舞之樂夫仗所臨宵嚴晝肅致鸞輅清寧省方之外無他軫慮誠臣子起居之大節也至於樞府軍務比之先日尤冝仰留睿算乃天下安不忘武備之義也明分西漢成帝紀曰帝為太子寬博謹審𥘉居桂宫上嘗急召太子出龍樓門不敢絶馳道上遲之問其故以狀對上大説乃著令太子得絶馳道云唐肅宗紀曰𥘉立為皇太子有司行册禮其儀有中嚴外辨其服絳紗太子曰此天子禮也乃下公卿議蕭嵩等請改外辨於外備絳紗衣為朱明服乃從之臣惲曰甚矣名分之不可不明也何謂名公卿大夫是也何謂分君臣上下是也一或不正何止動生悔吝且有事言不順之忒矧太子正名辨分者也使天下明知儲副有尊君卑臣之德異曰撫臨萬邦安有干名犯分事言不順者哉如漢成之出龍樓門而不絶馳道肅宗之易絳紗而改服朱明誠可以為後王之法云承華事略卷第三秋澗先生大全文集卷第七十八
