body:
  text: 七言絶句題蘭氏三桂堂字説手卷當年山斗仰蘭公此日開封有父風著眼讀書堂下去又看三桂發春紅著一作放題玉局公所畫竹石秋壑家藏此老何心作此君一枝中發錦江春無窮露葉煙梢意散作先生百億身關河形勢圖關河百二控秦頭滿目斜陽獨倚樓設險守邦須尚德每多吳起説文侯秦川展掌華山髙千古關河緯構牢早晚去施通濟手浮航如畫鎖驚濤壓關樓上醉慿欄一片黃流入斷山彼索此強俱寂寞山河空鎖夕陽間解鞍圖川流縈帶燒痕青万帳風煙扈漢營長記散軍郊射罷丹青圖上看升平瀟瀟牙帳野河春羽獵歸來日未曛展放畫圖還記得二年鞍馬過牛群髙空雲逈射雕還細草平沙困解鞍醉裏清寒將夢去春風吹雪點旗竿題黃門飛鞚圖金錯盤陀絡玉鞿春風飛影下瑶池丹青明見臚傳意花栁深宫燕八姨年年十月幸溫湯詔給辝臣半驌驦最見流雲瀟灑處津陽春色晚蒼蒼讀唐武后曌紀秋日花開未足災有瓜無可摘黃臺瑣間辦著青娥笑爭指朝堂鬼朴來讀狄梁公傳魚鱉霑恩遍九垓鳯池春色接鵉臺敝𫀆不染梁公血辨作幽囹一聚埃二馬圖振鬛長鳴万馬瘖肯教間損絡頭金多應縱鴐華清去飛過宫前御桞隂讀冨鄭公傳奉詔東來止國門悔將威克動嚴宸繞爐不合終宵眼六丈方知是聖人玉堂間適圖醉岸烏紗殿影東宫花低映酒波紅興來草罷長楊賦獨占髙槐灑晚風淵明漉酒圖此圖以氣象筆法較之恐是王雲筆也雲秦人意匠多偉麗而少雍容余嘗觀斬蛟及內殿橫吹等圖故敢指此殆雲之筆也然近代以來如雲之工者亦不可多得云秋澗老人王惲序牀頭新釀漉來空清濁君看固不同門外徴車揮巳去秋香籬落醉西風紛紛葛屨雜華纓何物衣冠可重輕莫若脫來還漉酒一杯時復聖之清秫田一粒不霑唇長恐春醪負此巾儘著輕紗渾溼却尤勝憔悴染京塵停雲時鳥日從容長在先生醉眼中劉宋禪來非一事五株楊桞自春風蒲輪逺聘亦醲恩處士雖微實晉臣常愛紫陽書法當不教輕染寄奴塵莊宗橫吹圖郭相西征奏凱還阿嬌歡寵鏡交鵉却嫌暖殿春風燠玉管橫翻曉吹寒霸業艱難百戰開侈心何苦溺優俳豈知兩部仙韶器揔是君王火葬材繼周南樂見寄嚴韻長慶詞人興寄長當時元白鬪軒昂江山正有潮陽筆千古詩壇自一行一作細嚼君詩興緒長孤吟空效鶴頭昂解教老媪能通曉留與香山作鴈行莫嗟朝鏡鬢毛霜揔道寒花晚莭昌一級散官增正七三升春酒醉公堂茆亭秋月水天上下月微茫冷浸茆亭夜色蒼我欲去尋幽隱客一天風露靜琴張括諸山水勢兩分兾北諸山水兩分山西流注會龍門春東衆壑歸幽野號作桑乾入海奔復作詩以贊之聀方引據説空繁到底終無一定言愛殺九峰真具眼髙空直下看中原寄馬左丞子卿士逹察判行求先容不敢書謹以亂道二章聊代起居之問且奉一􅙾云治道元來有本根聚精都在鳯池春近因拈出中堂記滿眼經綸半魯人一别春坊歲五過向來心事總蹉跎遙憐紅藥階前露霑丐茆茨意最多學圃亭崔君隱德老談經俯仰乾坤一草亭莫為處心親細事正冝烹煮削蕪菁桔橰上下任畦丁春韭秋𬞞用不勝若向邵生親問訊瓜田風味勝東陵明農致事稱周宰抱甕澆畦説漢隂兩事若論為拙計空拳搏虎更何心庚郎三韭種來靑鄭老秋瓜結巳成食肉飯𬞞元有分不應空戀五侯鯖鄭老為瓜州刺史審也東鄰近接香山里南汭今稱處士涯活計看來無不惡自鋤明月種梅花題紅葉扇頭故宫秋色醉來鮮浥露吟風雜暮蟬折得不浮流水去一枝留伴月中仙深宫不禁水東流賦就幽情孰與酬紅露滿山秋正好等間休上建章樓今年火盛若為攻盻盻西風一掃空忽見扇頭紅錦色上陽秋意滿吳宫雅歌一十二首并序雅歌者為丞相武公作也公經略河南之三年有詔士計行臺時權臣承制威震中外拭吻磨牙婪婪橫噬凡可以中傷羣辟者靡不畢至公以大忠至謹乃心王室斂衆人之責為己責以天下之憂為巳憂雖困於跋疐一身利害略不為恤也蓋欲俾朝廷上存公恕下不失民心為重其大節有如此者竟能感格帝心恩終簡在自非精忠貫日其孰能與於此哉所謂臨大事處大變而后見其真將真相之度焉因追作雅歌一十五章庶幾流播斯美使後人頌而歌之顧望若神人然其辝曰讀來黃卷有深功都見平時日用中朝下引車常慕藺行間拔士每知蒙隂闔陽開制揔司諸人何與到傾危微臣有罪天王聖不患朝廷遠不知衮冕桓圭極品榮校來得失一毫輕空摶馬援囊珠謗終見汾陽貫日誠天蓄靁風未動威栖栖遵渚歎鴻飛見知正賴龍潛帝笳鼓歸來有衮衣萬馬瀟瀟入漢巴行臺東下控中華方思霖雨須賢相豈特春風動虎牙萋菲方成具錦哀睿思熒惑若為開天教中令心如日几几俄瞻赤舄來品彚流形共化權歲寒都到老松邉欺殘太古隂崖雪始信貞心老更堅儀比鵉凰重比山功髙心小古為艱平生幹當江南事事了身名兩不關羣飛鎩翮入罝羅棘上青蠅訝許多良玉儘禁三試火周人坐搆百升歌亢則憑凌懦則摧秋霜中烈外低徊虎臣剩有回天力更著閹兒與孽媒拓境每憂王土窄息肩思與万方休生平戀闕丹心在風雨何傷一葉秋身任安危五十年老臣懷抱若為宣始終正有汾陽夢不到江湖范蠡船長圍破蔡仁聲著積穀吞吳策畫深三十年來分閫地智名功勇揔無心長憶中堂掌固𥘉宛陪髙步在亨衢百官禮絶真除日門閣蕭然一事無釣魚山下護龍旗番冢江邊奏凱歸一馬二僮東下日路人拭目認征衣丁亥歲門帖子坐賈謀生計巳癡歸田無力理耕縻一家風雪渾間事四海豐穰是素期汴梁故宫寒食人家賣酒繞宫池爭插青旗曲作圍簘鼓漸多寒食近一撙先為典春衣熙春閣傑閣當年燕御頻鼎煙未盡慘兵塵土階三尺茆茨底人自熙熙物自春倚竹圗錦字挑香翠易顰一枝修竹立湘裙定情正在氷霜操下到琴臺日暮雲粉香沾袖怯輕寒都著幽情寄竹間多是楚山湘水怨不應空待賣珠還巳丑歲門帖子大郎赴部應求敘老子傳心要醉經二事儻能如所碩一家編簡有餘青韓生寤寐春秋學陳孺薰酣寶訓文磨礪童孫能寸進一家春色看禪雲題顯宗墨竹撫軍睿思到湖文筆底秋筠見本根絶似承華欄檻看露梢煙葉揔龍孫堯民圗日出漁佃日夕歌蠶衣耕食樂天和細思歷象星辰外帝力於人更有何巳丑五月十五日過王氏祠堂兩軒梅竹足興哀親見春山手自栽前日問安人不見翻翻風葉送愁來兩丗規模有逺圖轉頭庭樹影扶踈顧瞻阿大中郎輩信覺嵇公德未孤巢父飲牛圗濁泥常恐汚吾牛特地驅來飲碧流縱使許由辭位去汗顔終是對宸旒耕田鑿井不知勞長恐逃名未得逃最喜帝堯平治事一犂春雨滿江臯徴庸禪讓兩無心驅飲時過碧澗潯若見後人牛傳事入山唯恐不幽深舜授堯傳兩不聞最憐牛力晚來新一鞭了却東臯事潁水箕山分外春苦訝箕山易所操雖辝堯讓匪吾曹桐江江上垂綸客一樣清凨万古髙清明后二日南莊拜掃回偶占寒食人家莭巳過秋千猶在院東坡今年春日光風好拜掃歸來笑語多野叟爭求醉筆新因書聊歇杯頻勸農説有新冠蓋要識君侯是老親送葬挽歌髙墳嶣嶤沒荒草白楊風悲和鬼嘯人生到此是徹頭一例灰塵無醜好祖筵才徹哀號起翣桞多儀殯蒿里向來送者各還家冥冥獨卧黃泉底人丗何短白髮多駒隙光隂不奈何才見春風吹草緑又看庭樹葉辭柯人命輕微如薤露百年歡樂能幾度森森鬼伯若來催相將共入黃壚去哭聲交慘簘笳咽樹架增嚴縞素餘昨夜髙堂猶暖熱今宵荒野恨何如相將執紼送華輈毋子恩深哭不休報德不銷埋石痛低空還有斷雲愁方相擊凶魂攪馬閭里親知滿中野只知哀挽送行人相看誰是長年者細君推氏哀辭神情減自女拿捐病後支持又八年最著老懷悲悼處死猶知惜畫義錢性姿貞靜伯姬恭四十三年好夢空一閟夜臺無復見悲聲留在白楊風斂來三夜夢平生明説先姑巳侍行喪稱有無能戚了何須易治太經營中堂北隩挂殘魂戀戀情思在子孫奉祀更當嚴在日忍令哭臨限朝昏水西原上有新塋三丗親喪力助成一旦夢隨先妣去有知當慰未忘情才過彌誕無旬月遽變辭容只兩朝寶靨暗晉嵓菊細黛蛾空見逺山遙營葺貧家鵲有巢百年心事憶同牢空餘深夜回溪月獨見凌波采澗毛六十難為大折悲百年偕老是同期篋衣滿意遺薌在空結纓䄜九十儀病倚中廬望大兒姢姢心目巳難支朦朣帳影魂衣暗腸斷燈前擁髻時暗用通德悲野田荒草事去年扶病上新塋歌管杯盤水曲亭今日重來人不見杏花零落桞條青素棺巳蓋鋪丹旐舊物難窺瘞玉臺苒苒縱隨仙馭去姍姍猶憶夢中來將持仲子庶同嫡主葺貧家儉作豐存殁較來無少慊正緣余厄致終凶恩榮頗浹魚軒貴祿食同霑石窖田忍死最憐相叩問六旬之上有餘年舒徐委􅍤浣餘衣能盡桃夭灼灼冝四十三年中饋地儼然宗祖饗多儀團圞香火坐庭闈欲話平生氣已微生死慮來真大事幾回含笑説先歸逝水碧縈長寢地畫簾香黯送時車間窗不待粧奩感遺恨空存禱嶽書百年同穴是同期一病彌留秋草萎垂老境中成死别九泉相見話真知緡錢灰冷過黃昏閃閃寒缸閉閣門只有此生來夢裏幾回含泣認離魂健婦治家勝丈夫維君真與健同符半生黽勉公家事一米私門不纇吾勸余過飲省文思切戒無多酒後辭翁媪老來惟我爾百年門户要扶持蘭枯蕙稿不禁風一夕吹香入殯宫把酒試澆橋下水不容將恨到湘東當餐愁對齊眉案升屋空留復魄衣誰遣兩行知巳淚浪浪併向老來揮薦蘩人去露堂空內助功多想肅雍説似老莊休鼓缶固無形氣奈情鍾壷漿朝奠愴蒿蔒露􅊜衰衣半淚痕每囑兒童莫歸早水邉恐有未招魂忘懷無似老莊盆便作何知委路塵詩到悼亡能自釋情文相稱是安仁你殯親遷葬百泉久謀銘誄入瑶鐫君須少候無多恨行見貞珉表墓前長筵拜慶諸姬上隨宦名邦二紀間秋入池臺芳徑歇春歸庭院落花間行來古禮不多難含斂堋藏淚涕澘莫訝𥘉終無佛事此心求在有無間衣衾棺槨無遺憾親戚悲哀有至情二十三年庚子月西河原上葬先塋李早蕃馬圖群奔角壯任郊埛巳入竿頭莫力爭惜取蹄間三丈逸望雲秋計鐡山程跋藍關圖潮陽英氣凛中天愁絶南荒瘴海煙不道生還隂有相自陳哀表亦堪憐晚凨吹雪下關頭點綴行人去國愁展盡畫圖還自惜七閩南下即潮州題趙克敬遺安亭襄陽苦莭説龐公趙氏貽謀意與同肯羡東鄰驟榮貴轉頭歌舞畫堂空趙生卓爾見青襟及長行身稱克欽為問遺安安所止一家鴻鵠住高林題張氏致樂堂生前菽水儘餘歡身後追思丗所難誰似考城張孝子至今供具潔盤餐刻桷丹楹燕寢新食前方丈處華裀一杯不及慈顔樂負米終慚季路貧夀萱亭葵丘張氏孝無違終歲承顔著彩衣入户僾然親不見一簾風月淡春輝凱風吹棘棘心柔罔極恩深痛莫酬不羡潘興花滿縣一枝金鳯儘忘憂潘店早發一鞭行色甌閩道過處人多説險夷忠義此心能自信風波前路不須疑儀封三代漸民道義深抱關疇匪大賢心按雲才遂瞻依願便解天教振鐸音睢州道中馳傳北經梁孝苑垂鞭東過宋襄城征人折盡隋堤桞風捲枯蓬逐馬行汴堤近自汴州開夾道逺連淮甸卧長虹若論往返行人便道在勞民却有功寧陵縣早發殘缸斜照耿孤懷夜久吟餘氣頗諧睡暖不知霜力重起看梧葉滿庭階蕭相國廟海寓清澄入帝圖忍將牛渴飲泥汚不思世教從中降得約秦苛意儘都聞畸人話芒碭山事芒碭山逺欎蒼蒼斷口雲連十里長兩假素蛇今化石至今神異鋭髙皇望碭山縣有感裴劉起義晉陽宫三百年來立國雄一旦剪夷無噍類厲階誰想在全忠宿州道中辟寒須酒多難飲數堠前征覺易行前去維揚猶七百黃雲衰草宿州城樓子店道中汴溝巳是荒亡迹湖石重開禍亂基徽煬較來同一病九泉相見不相嗤敗盟無策更開邉万石移來起艮山天意故遺亡國恨兩堤秋草卧孱顔虹縣道中度長直溝望入綏寧接楚雲老婆山逺界溝鄰小河河上淮東地万頃黃蘆不見人渡江生平夢寐瓜州渡此日風煙指顧間却恨中流凨浪惡雄觀應欠上金山潤州甘露寺近為火焚掃地望空北顧無雙寺行入西津第一州江影隔山搖素練行雲和夢瑣朱樓桃源圖劉君卿索賦淵明既號葛天民流水桃花到處春明見筆端間寓興武陵休苦殢漁人東來連舸泛長湖兩鬢氷霜儘瘁癯偶值漁郎心巳愧更堪三復武陵圖浙西到處武陵溪稍涉幽深路便迷始信避秦元寓説淵明遺丗厭羈栖虎丘寺真娘誰為惜娉婷李白題詩在竹亭洗鷓班金縷碗細烹泉眼較中泠姑蘇館夜雨吳亡越霸兩蝸爭朔吹翻江恨未平一夜不眠思往事姑蘇臺下雨連明宿寒山寺借榻僧窗夜氣清梅花香細燭花明鐘聲不取唐人例一覺安眠徹五更伏生授書圖遺書灰冷散飛煙老喙重宣即粲然三䇿竟從名數説穎川方寸殆虛傳題醉隱墨竹清溪映竹竹連雲苒苒晴梢醉墨新却為歲寒心事苦暖煙濃淡要橫陳露梢風葉喜晴春醉掃吟看卧竹根欲見此君生意盛滿川煙雨半龍孫西湖一湖碧水山三面滿眼樓臺堰一條只為近年荒廢久花無容色竹無憀飛來峰西湖廢撤無多景靈隱莊嚴有勝幽扶杖冷泉亭上看日斜猶為此山留靈隱寺山緣松竹煙光潤寺倚峰巒地位雄憑檻忽驚靈鷲上丗間真有化人宫旋開僧牖觀山罷間逐遊人看寺廽買得兩錢乾果子步穿經洞引猿來錢塘噫流無壯浙江潮刀削銀塘甃石牢三十里長凡兩用既防崖路障驚濤錢塘西岸市樓接望無三里嶺嶂回環自一川曉日人家炊㸑罷竹籬香滿碧松煙人家邸閣絡江臯十室看來四五逃間向老人詢所以近緣軍過苦相搔富陽縣會江樓山光簇簇無連嶂江水瀰瀰漲碧瀾何處風煙見真境冨陽樓上倚闌干冨陽道中兩浙風煙入冨春眼中形勝閗一樽不吸江山渌笑煞桐廬把釣人江山畫裏看清雄魚稻鄉中樂歲豐不是釣壇壇上客未能忘此就三公早過新城黃山鎮二首水無絶壑山無麓春麥收來秧稻穀行穿松徑看煙巒一假碧紗籠水玉奧溪引作長畦浸宿霧空𪷟破墨山馬上不知行役倦村村都在畫圗間白峯嶺儀曹苦厭為山囚霧幛煙幈看未休行過白峰三十里桐廬江上重回頭七里灘桐廬江水緑於藍兩岸山攢碧玉簮前去釣臺猶數里兩峰竒石見巉巉共惜殘年得逺遷豈知天意却相憐筆頭少得江山助便遣空回亦愜然嚴州道中髙盤山頂下深淵馬足長驅不易前幽鳥背人飛去速一聲津鼓突江煙叢叢吳岫暖煙生峽束奔江徹底清斜日篙師催進棹三灘難上要雄撑蘭溪縣女步道中豫樟蔽日無黃落竹笋經霜更碧鮮記取江南光景異暖煙晴日是冬天三河道中龍丘風土類中原兩勢山開百里川白鷺水田摩詰畫桃花溪洞武陵船龍遊道中路入龍遊不見山緃橫阡陌縠江邉穿籬臘笋如槍槊夾道寒花似火燃龍遊道中聞鴈避寒來趂稻粱肥水逺山長結伴稀已是江湖逺行客一雙猶自向南飛西安道中衢州屬縣西安荒惡路清寧水泛山行夜不停却為近來山寇發大明猶未撤關扄紫溪嶺紫溪梯嶺一層層况復鞭羸帶雨登頗笑此山藏行迹丗人曽不峻為稱昔杜止軒告豫云楊西庵談諧俠黠之雄者也丗人不知其然不肖何有竟負天下滑稽之名楊何深而僕何淺也豫謂分水與紫溪嶺亦然分水雖大平而易登紫溪雖小峻而難陟今丗人以大安至險可畏為言而紫溪略無聞焉其與楊杜顯晦𥘉不殊也車盤嶺大雨中上嶺時沾窮臘天多雨路轉巔崖險可驚辦著壯心時叱馭兩程併作一程行武夷山朱文公書院在焉紫陽集裏已曽逰此日輕舟過山摳衣不獲拜遺祠武夷一棹空回首建陽道中二更到縣山溪流急逺聞聲月暗林深信馬行衆宿斂芒南斗大半天驚看六星橫謝朱詠道山長來訪名沂今為亭山故縣經兵廢不存考亭依舊泰山尊南來有幸猶親炙得見先生四丗孫八仙驛灘峻渦旋陡下危施師招處和聲齊八仙驛畔山如畫一棹清風下建溪劒浦湛湛雙溪劒浦秋張華祠下更深幽神兵不斫姦臣去真是蛟龍亦可羞李延平道南書院延平名侗晦庵師也延平劒躍蛟龍窟湆淡灘危灔澦堆二事聽來皆野語道南書院重裴徊髙桐道中梅花如雪小桃紅夾道修篁翠幄濛折得一枝春在手蠟香吹滿馬頭風上水船亂石叢堆積鐵然湍流翻雪沸洄淵半崖匍匐人如蟻百丈驚看上水船􅒎洋鐡喻篙師𥿄喻船上灘元比下灘難傳呼緩棹蘭撓去路入􅒎洋要細看蒼峽道中雨後看雲滿嶺間看雨後雲空𪷟踈薄畫難真蒼山巧露都著銖衣挂法身蒼峽鎮雨夜地連吳越已夷蠻蒼峽東南更二千鄉夢不成非野宿雨聲還向客窗偏摩天嶺寒雲直上看髙層峻極諸山莫與京不作閩清具瞻物摩天空擅最髙名秀才嶺西登盤上卧羊坡東降平穿谷口蘿為問蒼巔髙幾許微行人指樹頭過水口山路捱來僕馬瘏方舟南下頗安舒催搖柔櫓嫌曛黑行趂漁燈一點孤小箬冬陽暖透征衣燠溪曲寬從水口開夜半朔風吹月墮臘寒還逐早潮來湯池湯泉為説盡唐庚一脈溫從地氣生滌淨丗塵𥘉不汚根源方信本來清井蔗洲山明溪靜絶纎埃望際川原四面開忽訝兩涯風浪湧舟人云是海潮來雨中江行望井蔗洲方舟搖揚櫓聲齊細雨􅏃窗看岸移望入蔗洲何眇靄霧江平抹白煙癡懷安縣縣依溪曲兩岡間翠竹晴沙轉雪灘前去郡城饒候迓官儀多是夢中看總題無窮山轉青龍峽不盡溪蟠碧玉潨西自鎮江南抵福三千里路略相同義門任氏詩并序燕雲風土雄碩故其俗純厚多以孝友稱御史藺君寶臣屢談於余吾鄉有任著飛卿者樂讀書其家義風尤為昭著至三丗同㸑鄉鄰化而慕之碩得一言發越其媺因賦二詩于以見蒸蒸所自且勉夫錫類不匱之心焉燕雲任氏丗同居和氣薰然樂有餘春在紫荆庭樹底緑隂𥘉不見扶踈一門髙義冠鄉鄰纍葉相承棣萼春不學張公書忍訓友于元自孝心純秋澗先生大全集卷第三十
