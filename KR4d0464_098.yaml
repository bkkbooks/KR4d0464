body:
  text: 廟前廟後寢漢自明帝詔遵儉約無起陵寢藏魏立二廟晉宋齊隋及唐皆同一廟而異所以象生之有朝寢所以象生之有寢也建之觀門之內不敢逺其親也位之觀門之左不忍死其親也諸侯五廟謂二昭二穆與太祖之廟五鄭氏曰太祖始封之君王者之後不為始封之君廟蓋諸侯不敢祖天子故王之子弟始為諸侯不得立出王之廟後丗子孫祖其始封者而其或有大功德特命祀其祖先則立廟可也魯有薑嫄文王之廟鄭祖厲王是也若王者之後始封之君非有功德不可為祖則祖其先代之王也宋祖帝乙是也大夫三廟王制大夫三廟一昭一穆與太祖之廟三鄭氏曰太祖是别子始爵者雖非别子始爵者亦然鄭志答趙商謂王制商制故雖非諸侯之别子亦得立太祖之廟周制别子為太祖若非别子之後雖為又祭統曰昭穆者放以别父子逺近長幼親疏之序而無亂也藏主開元禮義鑑曰藏主合在何處按五經異議云藏主於廟西壁中備水火之災必在西者長老之處地道尊右鬼神幽隂也祭薦檀弓有薦新如朔奠謂重新物為之設奠王制大夫士宗廟之祭有田則祭無田則薦祭二以首月薦二以仲月士用特豚大夫用羔庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卯麥以魚黍以豚稻以鴈髙堂隆曰天子諸侯月有祭事其孟月四時之祭也大夫以上將之以羔或加犬而巳士以豚庶人則唯其時冝魚鴈可也又薦新雖在廟皆不出神主五禮精義曰但設神座陳氏曰人子之於親飲食與藥必先嘗而後進四時新物必先獻而後食寢廟之薦新亦推其子先之禮以盡誠敬而巳宋秦益公檜家廟制紹興中命立家廟於私第中門之左一堂五室丗祖居中東二昭西二穆堂飾以黝堊神板長一尺博四寸五分厚五寸八分大書某官某夫人神坐貯以帛囊藏以􅃮函用神幄歲四享用孟月柔日具三獻有司言時享用常器常饌上倣政和故事命制祭器賜之舞雩臺雩祭蓋龍見建巳之月巳乃陽亢之時隂氣難逹用女巫舞雩女隂也舞所以逹陽中之隂也又吁􅦹而禱雨曰雩社稷位社五土之神稷五榖之長首種先成故長蔡雍曰其位在中門之右社主隂其遺故北向天子曰大社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫為民族居百家以上共立一社曰里社各以所冝本立而表之大社廣五文諸侯半之蓋方廣二丈五也皆胃以黃土其主以石謂石土類也其位社東而稷西王之祭也南面其服也絺冕其性黝其祭血取其隂類其樽大罍其樂應鍾其舞帗舞其鼓靈鼓凡皆因其物以致其義庶人蒙其社功故亦祭之春有祈而秋有報也稷非土無以生土非稷無以見生生之效以其同功均利養人故也地載萬物天垂象取財於地取法於天是以尊天而親地故教報焉家主中霤田主社示本也陳氏禮書諸侯城郭之制典命云上公九命子男五命其國家宫室車旗衣服禮儀皆以命數為節國家國之所居謂城方也公之城方九里宫方九百步侯伯之城方七里宫方七百步子男之城方三里宫方三百步五土所宜鴻别子曰土地各以類生故山氣多男澤氣多女障氣多喑風氣多聾林氣多癃木氣多傴岸下氣多腫石氣多力險阻氣多癭暑氣多天寒氣多壽谷氣多痺丘氣多狂衍氣多貪輕土多利重土多遲清水音小濁水音大湍水人輕遲水人重堅土人剛弱土人肥壚土人大沙土人細息土人美耗土人醜七水所宜汾水濛濁而冝麻濟水通和而冝麥河水中濁而宜菽維水輕利而冝禾渭水多力而冝黍漢水重安而冝竹江水肥仁而冝稻平土之人慧而冝五榖爾雅曰太平之人仁丹穴之人智太蒙之人信倥侗之人武釋菜鄭司農云古者士相見於君以雉為贄見於師以菜為贄釋即舍也始入學必舍菜禮先師也菜蘋藻之屬蓋以伴宫有芹藻猶子事父母有堇荁也姓族氏説詩曰振振公姓振振公族書曰錫土姓左氏衆仲曰天子建德因生以賜姓胙之土而命之氏諸侯以字為氏因以為族官有丗功則有官族邑以如之周語曰伯禹疏川遵滯鍾水豐物皇天嘉之祚以天下賜姓曰姒氏曰有夏堯賜禹姓曰姒封之有夏謂其能以嘉利冨生物也祚四嶽國命為侯伯賜姓曰薑氏曰有吕謂其能為禹股肱心膂以養物豐人也姓非天子不可以賜而氏非諸侯不可以命姓所以繫百姓之正統氏所以别子孫之旁出族則氏之所聚而已占者或氏於國則齊魯秦吳是也氏於諡則文武成宣是也氏於官則司馬司徒是也氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東門北郭氏於志則三烏五鹿氏於事則巫土匠陶是也蓋别姓則為氏即氏則有族族無不同氏氏有不同族故八元八凱出於髙陽氏髙辛氏而謂之十六族是氏有不同族也啇氏條氏徐氏之類謂之六族陶氏施氏之類謂之七族宋氏華氏謂之戴族向氏謂之桓族是族無不同氏也贄禮帛有衣𬒳之仁皮有炳蔚之文故孤執之羔有跪乳之禮有羣而不黨之義故卿執之進必以時行必以序鴈也故大夫執之交有時别有倫𬒳文以相質死分而不變者雉也故士執之可畜而不散遷者鶩也故庶人執之可畜而不違時者雞也故工商執之食邑説秦爵二十級惟徹侯乃得食縣其關內侯本無食邑其加異者列之關內之邑食其祖稅漢𥘉士大夫以上皆令食邑食者除租每户一歲更輸錢二百貨殖傳所謂千户之君則二十萬是也漢因鄉評取士謂因人共推之也如公孫弘以充賦萬石君以孝謹聞漢𥘉入仕者不限年如劉向陳咸以八十為郎劉辟疆以八十為衛尉公孫弘以八十為相趙充國以七十為將軍貢禹八十遷御史大夫漢集議漢置大夫專掌議論事苟疑似未央合中朝之士雜議之自兩府大臣以下至博士議郎皆得議之不嫌於卑抗尊也如呼韓邪單于欵塞卒用郎中侯應之䇿朱博得罪議獄者五十八人王嘉得罪議者六十人故曰漢集議有公天下之心漢封侯號有宰相封侯者公孫平津是也有婦人封侯者蕭何夫人同封鄼侯樊噲妻吕須封臨羌侯是也以地名封者平陵冝春是也以功封者冠軍驃侯是也以美名封者傳望博陸是也太行山水皆洑流地中關中諸水皆行流地上金銀魚袋唐髙宗給五品上隨身銀魚袋以防詔命之詐出內必合之三品巳上金飾袋垂拱中都督刺史始賜魚中宗景龍中令特進佩魚散官佩魚自此始宋張師正倦遊録云魚袋者取事君夙夜匪懈之義以金為飾亦身之華也上公桓圭侯信圭伯躬圭鎮主冒圭公謂二主之後及王之上公雙植謂之桓桓宫室之象所以安其上也信當為身與躬圭蓋皆象以人形為瑑但文有麁縟耳欲其慎行以保身也鎮圭尺二寸天子守之鄭氏曰鎮安也所以安四方以四方鎮山為飾崇髙敦厚而萬物附焉者山也冒圭孔氏曰冒以齊瑞信方四寸邪刻之然冒之以知諸侯之信偽猶今之合符也子榖璧男蒲璧榖所以養人蒲為席以安人璧皆徑五寸子男不執圭者未成國也蓋桓強立不撓而安上為任故公圭瑑之身伸而躬屈伸者尊足以候外而蔽內屈者卑足以長人故侯伯之圭瑑之子不足於長人而可以飬人故璧瑑以縠男不足以養人而可以安人故璧瑑以蒲圭者天之用璧者天之體盡其用者必盡其體得其體未必盡其用此圭璧所以不同也王后駔琮駔音組作方玉五寸上有鼻以組繫之因名焉蓋古者建國王立朝后立市用以為權也牙璋中璋典瑞曰牙璋起兵旅以治兵守鄭司農曰牙璋瑑以為牙牙齒兵象故以牙璋發兵又牙璋中璋皆有鉏牙之飾賈公彥云軍多用牙璋軍少用中璋白虎通曰璋位南方南方陽極而隂生兵亦隂也故以兵起為義如漢有銅虎符魏有兵符以發郡國兵豈牙中之類歟白琥刻虎為形者以形成於秋也虎禮西方之玉也以鹽為虎形者亦示武之謂也瑗説文曰瑗大孔璧也人君上除陛以相引環玦荀子曰絶人以玦反絶以環范寧釋榖梁曰君賜之環則還賜之玦則往蓋環之為物或施於佩或施之於反絶佩環則不佩玦六幣相合行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼何也昔大王事秋人以皮幣繼之以犬馬終之以珠玉是珠玉重於犬馬犬馬重於皮幣則合圭以馬合璋以皮宜矣繡黼皆隂功也繡則五色之全黼則白黑而巳是繡備於黼也則合琥以繡合璜以黼冝矣婚禮納徴以束帛饗贈送者以束錦聘禮享君夫人以束帛覿以束錦上大夫與下大夫致賔介饔餼皆以束帛賔介儐之以束錦食禮君侑幣小束帛大夫相食以束錦是帛宜於錦也則合壁以帛合琮以錦宜矣圭東方也馬動物也璋南方也皮文物故以文琥西方也萬寶之成莫備於此故以繡璜北方也隂陽之辨莫斷於此故以黼此六幣所以合之之意也皮馬不上堂故圭璋特逹於上然則璧琮琥璜皆非特逹者歟伏日曆忌釋曰伏者何也金氣伏藏之日也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏於火故至庚日必伏庚者金故也臘日風俗通曰禮傳夏曰嘉平殷曰清祀周曰大蠟漢改曰獵臘者臘也因臘取獸祭先祖也漢火行衰於戌故曰臘也漢舊儀曰臘者報諸神鬼古聖賢有功於民者禮記伊耆氏始為蠟蠟者索也歲十二月合聚萬物而索享之也周禮祭䄍則吹豳頌擊土鼓以息老物節有八節玉節玉節之制以玉為之以命數為大小守邦國者用之角節用犀角角在鼻上是角中之貴守都鄙者用之虎節山多虎者用之謂晉國之類以金為節鑄象焉必自以其國所多者於以相别為信人節平地多人者用謂衛國之類龍節澤多龍者用之謂鄭國之類皆以金為之以英蕩輔之英蕩畫函也以竹為之而有飾焉盛節器也輔之節者使不損也旌節道路用之道路謂鄉遂大夫也符節都鄙用之都鄙謂公之子弟及卿大夫采地之吏也管節以竹為之析節竹為符節全竹為管節如今之竹使符也其有商者通之以符節門關者與市聮事節可同也康誥曰越小臣諸節春秋宋司馬握節以死司城效節於府人而去司馬牛致其邑與圭而適齊圭守邑土信符則守節不特於邦國都鄙雖官府小臣亦有之矣漢竹使符銅虎符各分其半右留京師左付郡守傳司關凡所逹貨賄者則以節傳出之如今移所過文書凡通達於天下者必有節以傳輔之漢制門關用傳作兩行書繒帛上各持其一出入合之豈古之遺制歟秋澗先生大全文集卷九十八
