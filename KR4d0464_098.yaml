front:
  text: 秋澗先生大全文集卷九十八玉堂嘉話卷之六野合女子七七四十九隂絶男子八八六十四陽絶過此為婚為野合時叔梁紇過六十四娶顔氏少女故曰野合宋紹興中衍聖公渡江而東者孔玠也𧖟為龍之精按馬質云禁原蠶注天文辰為馬蠶書曰蠶為龍精月值大大則浴其種是蠶與馬同氣李林甫月令釋曰先蠶天駟也先蠶之神或以為苑窳婦人寓氏公主或以為黃帝或以為西陵氏或以為天駟歷論不一然蠶其首馬首其性喜溫惡濕其浴火月而再養則傷馬此固與馬同出於天駟矣然天駟可為蠶祖而非先蠶者也蠶婦人之事史記黃帝娶西陵氏始蠶漢祝苑窳婦人寓氏公主比或有所傳然其祭設壇或少牢或太牢或一獻或三獻禮必皇后親享北齊使公卿祝之非也其曰龍精見荀子賦蠶間府儀同三司謂置府辟吏儀同三公也唐制感生帝唐王仲丘傳引鄭玄注云天之五帝遞王王者必感以興故夏之正月祭所生於郊以其祖配之因以祈穀感帝之祝貞觀用之矣廟制古者天子七廟自虞至周不易之制也七廟者
  hash: sha256:901907ea0f699d2966b6b6ce3b770ddcffa7d863db19d4fb872fa207ad696f3c
