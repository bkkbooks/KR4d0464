body:
  text: 一巳除翰林學士承㫖兼修國史王鶚翰林侍讀學士郝經差充國信使翰林侍講學士李昶兼同議東平路軍民事翰林學士知制誥同修國史李冶翰林修撰同知制誥兼充國史院編修官雷膺王惲一未除見収拾王磐直學士徒單公履待制孟攀麟待制宋思誠修撰胡祗遹應奉右仰照㑹収拾者准此承旨王公字百一曹州東明人知人榜辝賦狀元皇帝在潜時首以禮幣徴焉以老儒故上甚敬重每見以狀元呼之以元年七月受是職公上章言修史事云自古國亡而史不亡唐取隋史焉宋取五代亦然金不為遼作史至今天下有遺恨我國家以神武定四方皆太祖聖武皇帝廟謨雄断所致若木乗時紀録以詔萬丗切恐歲乆漸至遺亡又舉前朝名筆數人於是上特降是詔焉廿八日戊子丞相史公遣修撰雷膺送安粛濟南二國公誥命公曰若所有潤禮汝二新人中受之且代光院之贈廿九日已丑申刻丞相史公卧閤中前行部馬月忽乃来謁辝不見曰若公務當於都省相見秋八月丁酉辛夘朔徴君許衡授懐盂路教官制曰許衡天資雅厚經學精專大凢講論之間深得聖賢之奥受罰者恐陳君所短為盗者畏王烈之知所在向風真堪正俗可令於懷孟䓁處選揀子弟俊秀者舉歸教育取作範模再令董子帷前有傳授之弟子重使王通門下皆經濟之名臣毋䘮斯文以弻予治竇傑授太子少傅制曰徳全天懿學得聖傳文章足以徽帝猷言行足以為丗範属周丗本支之盛要漢家羽翼之成冝導春宮用嚴師訓可特授太子少傳早為諭教當自誠心左右前後皆正人冝公所選干戈羽籥在東序行見其儀巳上二篇皆四菴楊公筆也宣撫姚樞授太子少傳制詞曰姚樞天彜素厚聖學有傳能全踐履之功發自誠明之性養成耆德無非禮樂詩書當侍春宮爰置左右前後可特授某官要明早諭以賛元良用傳震索之祥得継離明之照二日壬辰奉㫖諸路學校乆廢無以作成人材今擬選愽學洽聞之士以教導之凡諸生進修者仍選髙業儒生教授嚴加訓誨務要成材以備他日選擢之用仍仰各路官司常加主領敦勸隨頒降從六品印信勾當癸巳緫帥汪某授鞏昌路便冝都帥其制曰某官勳髙再丗勇冠諸軍向因犯順之徒遽起稱兵之釁頼兹戮力殱厥渠魁及當来覯之時殊乏自矜之色觀其誠赤深可尚嘉就帶巳降虎符可授鞏昌路同簽便冝都緫帥事冝盡賛毗以禆遺逸垂功名於千載萃忠義於一門尚副朕懷以固吾圉甲午奏遣宣使王好禮閱鄧州軍實仍送萬户史權改授江淮大都宣命乃奬諭軍將等詔其辭曰朕即位之𥘉深以戢兵為念故年前遣使於宋以通和好宋人不務逺圖伺我小隙反啓邊釁東剽西惊曽無寕日朕自還宮諸大臣皆以舉兵南伐為請朕重憫两國生靈之故猶待信使還歸庶有悛心以成和議留而不至今巳一載徃来之禮遽絶侵擾之暴不已彼甞以衣冠禮樂自居理當如是乎曲直之分灼然可見今遣使徃諭卿等當整尔士卒礪尔戈矛矯尔弓矢約㑹諸軍秋髙馬肥水陸分道而進以為問罪之舉尚頼宗廟社稷之靈其克有勳卿等當宣朕命明諭將士各當自勉予大賚汝仰下項把軍頭目毋替朕命四日乙未前奉使賀某復授宣諭大理國使其詞曰賀某㓜懐竒節筮仕昌時及知遇於先朝遂撫綏於大理楊威絶域昔収定遠之功服事􅊮庭屢抗伏波之請宜旌前効俾煥綸章汝其宣暢皇猷洋溢方外爰体綏懷之意以安遐邇之情轉為招徠式副所託五日巳亥承旨命惲與某同撰釋莫諸文某人所撰中涉論議公曰文自有體此䓁文字皆是賛頌功徳不當如是徐莞爾曰不知謂我云何至於散文亦有三說入作湏若虎首取其猛而重也中如豕腹取其醲而多也末同蠆尾取其臨出螫而毒也此雖常談亦可為之法也六日丙申詔追謚真定五路萬户府叅謀李大蔡州破將被戮萬户史侯救免之撫治真定有法其詞曰政書仕籍聲振諌垣至於今代以有爲方之古人而無愧適將擢用遽不愸遺既乖顯異於生前忍使湮微於身後冝錫如綸之命用增拱木之光可謚曰貞粛魂其有知歆此無斁同日復追謚前監察御史中庸先生張特立其辝曰學有淵源行無玷玦雖經䘮亂不改故常向邸之升聞降璽書而褒重未遂丘園之賁俄興窆之悲冝煥絲綸用光泉壌可依前號中庸英靈如寵數其知復追謚故徴君魏璠恬退自如剛毅有守常謂生前之不逹忍令死后之無聞冝定嘉名以光後裔可謚曰靖粛先生名璠字邦彦金貞祐𥘉詞賦進士第道號峯老人正大末以修撰使武仙不屈大元庚戌上徴至潜邸條陳三十餘事如定官號頒俸禄功罪有賞罰能否有升降署治天下之急務又曰農桑天下大本不可不重是故明君重五榖而賤金王告許之俗興罰及無辜僥倖之門啓官及不善漢之常平宋之講筵萬丗可常行也又薦中州名士大夫六七十人今之施為多先生餘論也今曽孫必復已為翰林修撰七日丁酉許教官衡改授國子祭酒其辝曰懿徳素全經學洞貫視聴言動皆合禮冝進退周旋舉皆中道所在滿禦冦之屨疇非趍董子之惟冝處成均以全樂育可特授某官務講明於聖道為矜式於國人八日戊戌太傳姚樞改授大司農其辝曰學明經旨徳備天彛由本邸而知名從王師而伐罪黽勉從事于今有年可改授某職務要克謹農時一遵詔旨民舉縁於南畒歲有望於西成庸厚民生以强國本九日已亥鄭汝翼授大理寺丞其詞曰某官法律深明䑓寺徧歴常謹少恩之戒共推断獄之平任此舊人弼予新政可特授某官冝在簿書之際更詳朱墨之工十日庚子賜髙麗國王倎手詔時值權臣金氏之變其辝曰丗居東土封自西周中國之姓雖更外邦之貢不闕向以權臣之專寵至於隻矢以相加卿慨發純誠來修覲禮敬形于色濟濟然殊可觀情見乎辭謙謙而不自伐冝還舊服徃紹新休可封髙麗國王仍統治東方諸國如故尚服寵光益加奮勵十一日辛丑徴君李治字仁卿欒城人前進士初公徵至詢以時事但以真定木場抽分官錢修蓋文廟而巳道號敬齋授翰林學士制詞曰某官秀擢巍科力窮聖學據縱横之大筆足潤色於皇猷况當青史之編冝與玉堂之選可特授某官知制誥庶得腹心之助以光綸綍之司十二日壬寅劉秉恕授中書吏部侍郎其詞曰家學有傳天資素厚向處副車之地巳全製錦之功榮示褒崇以明勸奬可特降金牌授某職兼邢州安撫使徃膺朕命毋廢攸司儻中心不異扵此時豈後寵反薄於今曰十三日癸邜太醫王儀授太醫院判兼教授其詞曰歴學精髙儒術通貫肱不待於三折功巳底於丕全乆侍禁闈共惟耆徳可授某官勾當尚傳素業用授諸生儀之材慮人沉静有議論毎有所陳禆益時政甚多十四日甲辰賜劉元帥手詔兼宣諭䕫府路新附軍民人䓁其詞曰且土地定其疆固有朔南之異而父母愛其子曽何彼此之分朕甞以四海為家萬方在巳凢有來賔之俗敢忘同視之仁近因宋國之未臣遂致蜀川之重擾彼軍旅焉老淹於屯戍彼民人焉力盡於轉輸况值凶荒舉皆轉徙保聚山麓者延生於歲月潜匿澤藪者横死於風霜彼君有昧於天時在朕心亦有其慙徳今兹劉整慕我國朝既能順徳而來當副徯蘇之望市肆勿異田里俾安尓有貨財毋令刼掠尓有禾稼罔使踐傷諸囬囬通事人等逃在彼軍者許令自還為良不属舊主除已行下陜西行省常加存恤不使侵攘外今降金牌五銀牌十以旌有功者當續具姓名頒降宣命凡在軍民各寕處所故兹詔示想冝知悉十五日乙已董文炳授親衛軍都指揮使其詞曰某官性秉忠貞才堪任使積年事上不違咫尺之天今日定封當處瓜牙之地可特降虎符授親衞軍都指揮使同簽武衞軍事尚嚴宿衞益効勤勞用副朕心以成尓續十六日丙午宣諭歸附段實曰向率我師徃臨尔境重拒國人之請因從城下之盟欵附而来忠勤益著庸示至優之渥以彰同視之仁尚修前効母負𥘉心撫安已附之民招集未降之衆國典有常卿其勉之十七日戊申宣諭青居山帥臣某官爰從變故明審事機携赤子以来歸保青居而不失要明實志屢立戦功儻不示於寵章何以旌其忠懇用錫虎符之命以彰鴻渥之殊餘如故尚盡乃心毋􅟂厥職儻忠心不異於始豈後賞反薄於前前通許屯田萬户宋抃字文卿授某路勸農官其詞有天資忠慤儒學專精昔蘭省之荷嚢乆勤王事近栁營之積糓大備兵儲冝崇褒奬之恩以盡始終之義其弟宋彰字壽甫屯田府諮議其詞曰明切事機用輸誠欵能釋樂成之業以明懐徳之心宜示褒崇取爲勸激可充鄧州屯田緫管下諮議兼招撫未降軍民勾當更當自勉期有成勲終郴州緫管邢州張安撫耕字耘夫真定靈壽人年二十用資入仕以名臣子補俸聀大元癸丑授邢州安撫使至是超拜以施治效爲人長身白晳氣皃沉厚犯而不校改授吏部尚書其詞曰徳備忠純材優經濟及試臨民之職首馳報政之聲保安全於乆廢之餘集流亡於四散之後以兹明效冝示寵章可超授吏部尚書兼前職仍易虎符以昭鴻渥徃膺朕命恪守攸司十八日乙已奉旨頒降中統權冝條理詔叅政楊公筆也制曰事匪前定無以啓臣民梘聴不惑之心政豈徒為必當舉帝王坦白可行之制我國家以戎旌而開建於禁網則闊䟽雖甞有所施行未免渉於簡略或得於此而失於彼或輕於昔而重於今以兹姦猾之徒得以上下其手朕惟欽恤期底寛平迺姑立於九章用頒行於十道比成國典量示權宜務要遵行毋輕變易據五刑之中流罪一條似未可用除犯死刑者依條處置外徒年杖數今擬逓减一䓁决杖雖多不過一百七下著為定律掲示多方開條云云嗚呼六計周官所以蔽群吏之治三章漢法所以慰百姓之心詳酌舊規著為新制惟上令昭垂如日月則下情易避如江河雖曰從輕期於不犯咨尓有衆體子至懐故兹詔示想冝知悉十九日巳酉辰刻同雷彦正游宣撫子明平章政事赴南平山辭藏春上人時入壇不克見㳺於菴門外大呼曰師父顯䓁謹来拜辝時丞相史公第四子杠侍上人於此遂置酒相别此囬朔風振野吹砂䃯射人殆勁矢然寒已不可勝矣廿日庚戌詣都堂辝諸相南歸廿一日辛亥辰刻由都西門出是夜宿桓州廿二日壬子抵舊桓州廿三日癸丑前次牛群頭取直東南下崖嶺夜半宿山南農家明日甲寅宿雲州張継先家廿五日乙夘自望雲㳂龍門河南行入寒山峪遇大雨憇寒山逓鋪午霽渡泥澗人馬縋而下挽而上登靖邊北嶺有虎突起澗東嘯而去人馬為辟易投宿碧落崖下崖峻絶方廣如畫屏然泉流縈帶環山根一匝秋稼巳熟黄雲滿川盖朔方之武陵溪也廿六日丙辰下十八骨了泥滑不能騎比至平地僕馬為痡矣行約两舎抵田家止宿廿七日丁巳宿北口小杏明日踰灰嶺試桃花峪温湯山間殊有竒觀石為盤渦如碧玉盆者非一壽藤灌木交䕃左右其水泉蓋潞河之上源也是晚宿新店又二日至燕粵自中元九月奉檄北上至是年辛酉九月凢十有三月實歴三百八十四日秋澗先生大全文集卷第八十二
