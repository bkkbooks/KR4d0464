body:
  text: 一巳除翰林學士承旨兼修國史王鶚翰林侍讀學士郝經差充國信使翰林侍講學士李昶兼同議東平路軍民事翰林學士知制誥同修國史李冶翰林修撰同知制誥兼充國史院編修官雷膺王惲一未除見收拾王磐直學士徒單公履待制孟攀麟待制宋思誠修撰胡祗遹應奉右仰照會收拾者準此承旨王公字百一曹州東明人知人榜辝賦狀元皇帝在潛時首以禮幣徴焉以老儒故上甚敬重每見以狀元呼之以元年七月受是職公上章言修史事云自古國亡而史不亡唐取隋史焉宋取五代亦然金不為遼作史至今天下有遺恨我國家以神武定四方皆太祖聖武皇帝廟謨雄斷所致若木乘時紀録以詔萬丗切恐歲久漸至遺亡又舉前朝名筆數人於是上特降是詔焉草八日戊子丞相史公遣修撰雷膺送安肅濟南二國公誥命公曰若所有潤禮汝二新人中受之且代光院之贈草九日已丑申刻丞相史公卧閣中前行部馬月忽乃來謁辝不見曰若公務當於都省相見秋八月丁酉辛卯朔徴君許衡授懷盂路教官制曰許衡天資雅厚經學精專大凡講論之間深得聖賢之奧受罰者恐陳君所短為盜者畏王烈之知所在向風真堪正俗可令於懷孟等處選揀子弟俊秀者舉歸教育取作範模再令董子帷前有傳授之弟子重使王通門下皆經濟之名臣毋喪斯文以弻豫治竇傑授太子少傅制曰德全天懿學得聖傳文章足以徽帝猷言行足以為丗範屬周丗本支之盛要漢家羽翼之成冝導春宮用嚴師訓可特授太子少傳早為諭教當自誠心左右前後皆正人冝公所選干戈羽籥在東序行見其儀巳上二篇皆四菴楊公筆也宣撫姚樞授太子少傳制詞曰姚樞天彜素厚聖學有傳能全踐履之功發自誠明之性養成耆德無非禮樂詩書當侍春宮爰置左右前後可特授某官要明早諭以贊元良用傳震索之祥得繼離明之照二日壬辰奉旨諸路學校久廢無以作成人材今擬選博學洽聞之士以教導之凡諸生進修者仍選髙業儒生教授嚴加訓誨務要成材以備他日選擢之用仍仰各路官司常加主領敦勸隨頒降從六品印信勾當癸巳總帥汪某授鞏昌路便冝都帥其制曰某官勳髙再丗勇冠諸軍向因犯順之徒遽起稱兵之釁賴兹戮力殱厥渠魁及當來覯之時殊乏自矜之色觀其誠赤深可尚嘉就帶巳降虎符可授鞏昌路同簽便冝都總帥事冝盡贊毗以禆遺逸垂功名於千載萃忠義於一門尚副朕懷以固吾圉甲午奏遣宣使王好禮閲鄧州軍實仍送萬户史權改授江淮大都宣命乃奬諭軍將等詔其辭曰朕即位之𥘉深以戢兵為念故年前遣使於宋以通和好宋人不務逺圖伺我小隙反啓邊釁東剽西驚曽無寧日朕自還宮諸大臣皆以舉兵南伐為請朕重憫兩國生靈之故猶待信使還歸庶有悛心以成和議留而不至今巳一載往來之禮遽絶侵擾之暴不已彼嘗以衣冠禮樂自居理當如是乎曲直之分灼然可見今遣使往諭卿等當整爾士卒礪爾戈矛矯爾弓矢約會諸軍秋髙馬肥水陸分道而進以為問罪之舉尚賴宗廟社稷之靈其克有勳卿等當宣朕命明諭將士各當自勉豫大賚汝仰下項把軍頭目毋替朕命四日乙未前奉使賀某復授宣諭大理國使其詞曰賀某幼懷竒節筮仕昌時及知遇於先朝遂撫綏於大理楊威絶域昔收定遠之功服事􅊮庭屢抗伏波之請宜旌前效俾煥綸章汝其宣暢皇猷洋溢方外爰體綏懷之意以安遐邇之情轉為招徠式副所託五日巳亥承旨命惲與某同撰釋莫諸文某人所撰中涉論議公曰文自有體此等文字皆是贊頌功德不當如是徐莞爾曰不知謂我云何至於散文亦有三説入作須若虎首取其猛而重也中如豕腹取其醲而多也末同蠆尾取其臨出螫而毒也此雖常談亦可為之法也六日丙申詔追諡真定五路萬户府參謀李大蔡州破將被戮萬户史侯救免之撫治真定有法其詞曰政書仕籍聲振諌垣至於今代以有為方之古人而無愧適將擢用遽不愸遺既乖顯異於生前忍使湮微於身後冝錫如綸之命用增拱木之光可諡曰貞肅魂其有知歆此無斁同日復追諡前監察御史中庸先生張特立其辝曰學有淵源行無玷玦雖經喪亂不改故常向邸之升聞降璽書而褒重未遂丘園之賁俄興窆之悲冝煥絲綸用光泉壤可依前號中庸英靈如寵數其知復追諡故徴君魏璠恬退自如剛毅有守常謂生前之不逹忍令死后之無聞冝定嘉名以光後裔可諡曰靖肅先生名璠字邦彥金貞祐𥘉詞賦進士第道號峯老人正大末以修撰使武仙不屈大元庚戌上徴至潛邸條陳三十餘事如定官號頒俸祿功罪有賞罰能否有升降署治天下之急務又曰農桑天下大本不可不重是故明君重五榖而賤金王告許之俗興罰及無辜僥幸之門啓官及不善漢之常平宋之講筵萬丗可常行也又薦中州名士大夫六七十人今之施為多先生餘論也今曽孫必復已為翰林修撰七日丁酉許教官衡改授國子祭酒其辝曰懿德素全經學洞貫視聽言動皆合禮冝進退周旋舉皆中道所在滿禦冦之屨疇非趍董子之惟冝處成均以全樂育可特授某官務講明於聖道為矜式於國人八日戊戌太傳姚樞改授大司農其辝曰學明經旨德備天彛由本邸而知名從王師而伐罪黽勉從事于今有年可改授某職務要克謹農時一遵詔旨民舉緣於南畒歲有望於西成庸厚民生以強國本九日已亥鄭汝翼授大理寺丞其詞曰某官法律深明臺寺遍歷常謹少恩之戒共推斷獄之平任此舊人弼豫新政可特授某官冝在簿書之際更詳朱墨之工十日庚子賜髙麗國王倎手詔時值權臣金氏之變其辝曰丗居東土封自西周中國之姓雖更外邦之貢不闕向以權臣之專寵至於隻矢以相加卿慨發純誠來修覲禮敬形于色濟濟然殊可觀情見乎辭謙謙而不自伐冝還舊服往紹新休可封髙麗國王仍統治東方諸國如故尚服寵光益加奮勵十一日辛丑徴君李治字仁卿欒城人前進士初公徵至詢以時事但以真定木場抽分官錢修蓋文廟而巳道號敬齋授翰林學士制詞曰某官秀擢巍科力窮聖學據縱橫之大筆足潤色於皇猷况當青史之編冝與玉堂之選可特授某官知制誥庶得腹心之助以光綸綍之司十二日壬寅劉秉恕授中書吏部侍郎其詞曰家學有傳天資素厚向處副車之地巳全製錦之功榮示褒崇以明勸奬可特降金牌授某職兼邢州安撫使往膺朕命毋廢攸司儻中心不異于此時豈後寵反薄於今曰十三日癸邜太醫王儀授太醫院判兼教授其詞曰歷學精髙儒術通貫肱不待於三折功巳底於丕全久侍禁闈共惟耆德可授某官勾當尚傳素業用授諸生儀之材慮人沉靜有議論每有所陳禆益時政甚多十四日甲辰賜劉元帥手詔兼宣諭夔府路新附軍民人等其詞曰且土地定其疆固有朔南之異而父母愛其子曽何彼此之分朕嘗以四海為家萬方在巳凡有來賔之俗敢忘同視之仁近因宋國之未臣遂致蜀川之重擾彼軍旅焉老淹於屯戍彼民人焉力盡於轉輸况值凶荒舉皆轉徙保聚山麓者延生於歲月潛匿澤藪者橫死於風霜彼君有昧於天時在朕心亦有其慙德今兹劉整慕我國朝既能順德而來當副徯蘇之望市肆勿異田里俾安尓有貨財毋令劫掠尓有禾稼罔使踐傷諸回回通事人等逃在彼軍者許令自還為良不屬舊主除已行下陜西行省常加存恤不使侵攘外今降金牌五銀牌十以旌有功者當續具姓名頒降宣命凡在軍民各寧處所故兹詔示想冝知悉十五日乙已董文炳授親衛軍都指揮使其詞曰某官性秉忠貞才堪任使積年事上不違咫尺之天今日定封當處瓜牙之地可特降虎符授親衛軍都指揮使同簽武衛軍事尚嚴宿衛益效勤勞用副朕心以成尓續十六日丙午宣諭歸附段實曰向率我師往臨爾境重拒國人之請因從城下之盟欵附而來忠勤益著庸示至優之渥以彰同視之仁尚修前效母負𥘉心撫安已附之民招集未降之衆國典有常卿其勉之十七日戊申宣諭青居山帥臣某官爰從變故明審事機携赤子以來歸保青居而不失要明實志屢立戰功儻不示於寵章何以旌其忠懇用錫虎符之命以彰鴻渥之殊餘如故尚盡乃心毋􅟂厥職儻忠心不異於始豈後賞反薄於前前通許屯田萬户宋抃字文卿授某路勸農官其詞有天資忠慤儒學專精昔蘭省之荷囊久勤王事近栁營之積穀大備兵儲冝崇褒奬之恩以盡始終之義其弟宋彰字壽甫屯田府咨議其詞曰明切事機用輸誠欵能釋樂成之業以明懷德之心宜示褒崇取為勸激可充鄧州屯田總管下咨議兼招撫未降軍民勾當更當自勉期有成勳終郴州總管邢州張安撫耕字耘夫真定靈壽人年二十用資入仕以名臣子補俸聀大元癸丑授邢州安撫使至是超拜以施治效為人長身白晳氣貌沉厚犯而不校改授吏部尚書其詞曰德備忠純材優經濟及試臨民之職首馳報政之聲保安全於久廢之餘集流亡於四散之後以兹明效冝示寵章可超授吏部尚書兼前職仍易虎符以昭鴻渥往膺朕命恪守攸司十八日乙已奉旨頒降中統權冝條理詔參政楊公筆也制曰事匪前定無以啓臣民梘聽不惑之心政豈徒為必當舉帝王坦白可行之制我國家以戎旌而開建於禁網則闊疏雖嘗有所施行未免涉於簡略或得於此而失於彼或輕於昔而重於今以兹姦猾之徒得以上下其手朕惟欽恤期底寬平乃姑立於九章用頒行於十道比成國典量示權宜務要遵行毋輕變易據五刑之中流罪一條似未可用除犯死刑者依條處置外徒年杖數今擬遞減一等決杖雖多不過一百七下著為定律揭示多方開條云云嗚呼六計周官所以蔽群吏之治三章漢法所以慰百姓之心詳酌舊規著為新制惟上令昭垂如日月則下情易避如江河雖曰從輕期於不犯咨尓有衆體子至懷故兹詔示想冝知悉十九日巳酉辰刻同雷彥正遊宣撫子明平章政事赴南平山辭藏春上人時入壇不克見遊於菴門外大呼曰師父顯等謹來拜辝時丞相史公第四子杠侍上人於此遂置酒相别此回朔風振野吹砂䃯射人殆徑矢然寒已不可勝矣草日庚戌詣都堂辝諸相南歸草一日辛亥辰刻由都西門出是夜宿桓州草二日壬子抵舊桓州草三日癸丑前次牛群頭取直東南下崖嶺夜半宿山南農家明日甲寅宿雲州張繼先家草五日乙卯自望雲沿龍門河南行入寒山峪遇大雨憩寒山遞鋪午霽渡泥澗人馬縋而下挽而上登靖邊北嶺有虎突起澗東嘯而去人馬為辟易投宿碧落崖下崖峻絶方廣如畫屏然泉流縈帶環山根一匝秋稼巳熟黃雲滿川蓋朔方之武陵溪也草六日丙辰下十八骨了泥滑不能騎比至平地僕馬為痡矣行約兩舍抵田家止宿草七日丁巳宿北口小杏明日踰灰嶺試桃花峪溫湯山間殊有竒觀石為盤渦如碧玉盆者非一壽藤灌木交蔭左右其水泉蓋潞河之上源也是晚宿新店又二日至燕粵自中元九月奉檄北上至是年辛酉九月凡十有三月實歷三百八十四日秋澗先生大全文集卷第八十二
