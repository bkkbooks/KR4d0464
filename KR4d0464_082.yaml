front:
  text: 秋澗先生大全文集卷第八十二中堂事記下三日癸巳京兆叅知政事商挺字夢卿平叔子馳奏關陜重地大亂後餘風有未殄者非廉希憲不能填撫中外右丞相史公以聞允焉未刻復入見平章王文統請廉希憲依已議同政不許遂以左丞相耶律鑄代廉赴燕是日追謚魏璠曰靖粛先生當改後從此四日甲午有旨趣平章王文統南行於是定省府掾属去留者是日燕京路宣撫賽典只児囬紇之有良德者自云世家同中國孔子宗系累朝爲断事官輕財安民甚有人望後以平章政事终於雲南貞定宣撫劉粛授吏户禮三部尚書以上都太倉使宋紹祖邢人郝子明爲郎中益都等路宣撫宋子貞授兵刑二三部尚書以太醫院官焦仲益李子敬為右三部侍郎劉前進士自聀官勾補省掾北渡後佐東平幕上聞具有經濟才召治邢州省部之建諮其議論為多五日乙未左右两部官望謝恩命於省中都堂為諸投下招収人户取索錢債奏奉聖㫖諭十道宣撫司今体知得諸投下差使臣告奉到聖旨及令旨文字不經由本路官司徑直於州縣開讀拘刷民户人匠便行拘收起移及取索錢債搔擾為此特降聖㫖今後遇有各投下拘刷起移民匠取索錢債先湏經由夲路宣撫司行下逹魯花赤管民官不係大數民匠合拘刷起移者依上拘刷並不得似前徑直於州縣一同搔擾如委實不係大數合拘刷起移底民匠各路官司却不得遮當外據錢債公事不得一同拘収人員取索若委係巳身借過錢債照依先降聖㫖於宣撫司定奪立限歸還違者並行治罪巳刻雷雨大作其驟烈可怖六日丙申入奏行臺一切事理其㫖有云管民官管軍官鷹房打捕諸色造作一切大小公事併聴行省從冝處置申刻宋劉二尚書来謝王相曰公等皆朝廷遴選謝于私門非敢聞命辝不見七日丁酉奏准八座職印以白金作三臺鑄造其方寸皆從品秩有差午刻藏春上人以王相南下令僧逸以良馬二疋来餞陞户部貟外郎王煥為左三部郎中是日加尚書賽典只司農卿領左部如故從再請也八日戊戌益都申宋人侵軼漣水與戦敗之是日追謚前經義狀元李俊民為莊静先生云云先生字用章艧澤人明昌間進士道號鶴鳴老人在河南時於隱士荆先生傳皇極數學巳未間聖上在潜令張仲一就問禎祥優禮有加至是先生巳殁其言盡徴故有是命以旌其徳學云𥘉張辝去曰継請以蒲輪来起公先生笑不荅贈詩以見方来其辭曰丹鳯㗸書下九霄山城和氣動民謡乆潜龍虎聲相應未戮䲔鯢氣尚驕萬里江山歸一統百年人事見清朝天教老眼觀新化白髮那堪不肯饒明年正月先生卒于家愚甞觀其遺書所得盖康節之傳云甞與劉尚書才卿講䆒焚黄故事劉曰甞聞之髙士美云其勑之全式尚書省牒故某官某職某人牒奉勑可追謚某名牒至准勑故牒年月日後備具相衘圓押其敕封上題給付某人第其子孫録全文如式火於本官家廟以告爲之焚黄九日未刻右丞相不花来納王相行期平章以行臺未辦事同丞相赴省議决申刻右相不花入朝見焉陳䆳授濵棣勸農使陳君錫大名宰懷州劉淵西京十日庚子諸相座省劉尚書議部官署押事王相爲裁定焉辰刻得宋荆湖制司與右相史公書并公文所贈遺禮物時来景定二年也其其事以聞是日髙麗世子植来朝詔館於都東郊官舎從行者一十八人選必赤太原張大本字仲端美丰儀辨而有文采爲館伴焉継命翰林承旨王鶚郎中焦飛卿犒慰有詔翼日都省官與髙麗使人每就省中戯劇者十一日辛丑都堂置酒宴世子植等於西序其押燕者右丞相史公左丞相忽魯不花王平章張右丞張左丞楊叅政姚宣撫賈郎中髙聖舉從西榻南頭至東北作曲肘座掌記王惲通譯事李顯祖皆地座西嚮其髙麗世子與叅政李藏用字顯甫尚書本翰林直學士南榻坐亦西嚮又有龍舒院書状等官凢六人尚書己下三人皆襪而登席相次地坐酒數行語旣不通其問荅各以書相示丞相史公首問曰汝國海中所臣者凢幾處軍旅有無見征戍者掌兵者何人官號何名叅政李藏用對曰掌兵者金氏史曰豈傷猶以莫利支為名乎曰此名廢去巳乆其官亦皆帶樞府兵部之號史曰聞汝國亦常與宋人通好然乎曰但商舶徃來耳平章王曰汝國今歲亦収成曰仰頼聖㤙雨暘時若溥霑豊稔又曰聞汝國用未人正朔然乎曰第商人私有賫至本方者實不為用耳叅政楊公曰聞汝邦亦設科舉曰然曰今歲試題為何曰賦則某題論即西門豹為政其炎如火詩則天砥礲兆民也又曰除詩賦䇿論外科名極多如經學隂陽醫方武舉筭學之類皆是也宣撫姚公口傳聞汶邦有古文尚書及海外異書曰與中國書不殊又曰聞聖上近賜餼牽想巳饜飫曰悉亡之矣曰慱塞亡之乎讀書亡之乎曰慱塞亡之矣遂烘堂大笑左丞張公問曰汝國王丗系説是丗臣㣧裔曰非也其来是唐順宗第十三子逃難而立於此以王家後易姓為王時李叅政手持玳瑁聚翣史相曰執政官當以端方表徳今所用非方非圓或聚或散何居李不能荅有頃即以葛藤語亂之實飾辭也其丗子與李叅政不白縠上衽抱冠則􅃮紗圎頂巾履舄皆以絲為之帶則烏犀小革也其李顯甫面滿月白晳鬚髮皓然年十八以詞賦狀元第時六十一歲通禪學善作詩盖丗于之岳翁也酉刻皆霑醉而去其導從儀物張盖乗馬馬首復持一大紫盖比常益四垂極長問之曰引蓋也名曰儀執明日諸相入見上聞燕語甚􅌚遂以手詔玉帶遣還制詞有云出水而陸去危就安冝寛漢法之拘續議楚宫之作蓋准元年先奏便民之請也至元七年朝廷遣平章趙璧郎中宋道字弘道終太子賔客徙王都於海西岸江華島一炬為焦土矣十二日壬戌辰刻耶律中書張左丞傳旨今後應奉朝旨如無御寳并印信文字不得輙行未刻王相陛辝皇后及皇太子於青宫太子慰奬甚厚有元老克壯謀猷之諭申刻復入朝遂陛辝焉遂出自南門郊餞者廉平章楊叅政賈郎中及留冬諸掾属比至南平藏春令左右迎候於道者踵相接也上人待遇甚恭極賔主之禮十三日癸亥辰刻齋畢而去十四日甲子藏春来自南菴午刻㑹食史相行館寥休以灑墨玉盂斚贈公及觀所作玉鏡命諸公賦詩西菴有幸自得辝塗抺手照人無用太分明之句仲晦爲忻然也十五日乙丑欲移寓太醫使王儀之館舎史公不許令與參議納合君同寢處者四十餘日時惲管陳言文字就命日左右楊相權供中舎之職十六日丙寅詔封保定張柔為安粛公制辝口大夫當七十之後致仕則冝國家列五䓁之封攷勛而授張某功成百戰眷荷累朝方深𥙷衮之思遽有懸車之請冝䟽上爵用荅元勳可特封某公致仕事業一時宜使古今之獲寵子孫後丗要知忠義之可為冝保永年以全耆徳濟南張榮為濟南公其詞曰大夫謝事得進退之宜國家定封明始終之義某官功髙舊徳教備義方方深分閫之期遽有懸車之請冝䟽上爵以示殊恩可特封某公致仕慶及子孫常保山河之誓名垂竹帛永為忠義之門頥飬遐齡保全耆徳十八日戊辰權中省都事趙謙得腦瘍極熾惲與楊都司誠之求療於太醫王儀之遂以真定麻澤民與視凡三徃諾焉踵及門中使促而去之自是澤民内侍不得出者旬日趙之疾遂無及矣一携僕既老而癡時臭惡聞石外予絮兩鼻孔為湯藥之夜則對榻而卧伺其緩急義之所激曽弗之倦十九日已巳堂議選中省两司都事遂以左司授惲此出史楊二公雅意辝曰據某何人過蒙擢用得文翰職足矣廿五日甲戌都堂奉㫖諭各路宣撫司宣聖廟國家歲時致祭如月朔釋奠冝恒令洒掃修潔今後禁約諸官貟使臣軍馬無得於廟宇内安下或聚集理問詞訟及褻瀆飲宴管工匠官不得於其中營造違者治罪管内凢有書院亦不得令諸人搔擾使臣安下廿七日丙子都堂奉㫖夫五岳之中恒属其一豐阜峻極作鎮北土爰古進今祀典存焉粤自國朝開創以来祠祭之禮亦未甞闕其岳廟中今後仰過徃使臣軍馬母得安下搔擾毀折樹木及不得於看廟人處奪要鋪頭口仍仰常切修葺毋致踈荒廿八日丁丑都堂奏奉聖㫖道與真定路宣撫司據懐孟逹魯花赤蜜里吉緫管覃澄奏告管下地分多有屯住蒙古頭目遇有関渉詞訟公事不肯前来對證徃徃不伏勾追以致遲滯公事准奏仰遍諭諸路宣撫司今後各州城管民官遇有関渉蒙古軍人公事理問時分管軍官一貟一同聴断施行無得偏向准此秋七月丙申辛酉朔前河東宣撫使張公以怨家有言去留維谷是日得行省諮保及史相濶左丞互為申理奏准充行中書省參議方得觧去良不易也嗚呼天道冥冥報施其間令人有可疑者今張以正獲罪然聖人所事不為過甚公豈犯此忌邪可不戒之哉其宣辭云張徳輝宅心剛正處事精明及居風憲之司遂有澄清之志巨猾望風而屏迹疲民受賜以到今不示顯膺何彰獨立可特授翰林學士參議行中書省事尚資婉畫庶厎成功十七日丁丑大司農左三部尚書賽典只改授平章政事制辝曰两朝眷遇凡事精勤常辦集於軍前能經營於意外欲旌成績冝處台司當奉至公用遵大体盡尓賛㐮之力副予委任之誠至於辦集經營當時論者謂於公甚為切當公遂置酒重以潤筆為荅惲謝不敏十八日戊寅翰林國史院保雷膺與惲充本院属官十九日巳卯石抹剛紇荅授右三部尚書制詞曰望髙門地業不墜於箕裘身侍禁闈勞乆服於歲月宜分膺於三部俾庸列於六卿可特授某官當副朕心母瘝厥職廿日庚辰行省諮者數事都堂議有可否史公曰雖分两省其實一也若非関利害者不宜妄有阻駮使王事成就可也今後凢行省所諮湏三日内咨報自是上下云為如流水之源矣予當時嘆賞以謂不多得也廿一日辛巳有旨丗臣買住孩児秃花太傅姓耶律氏在前金時戍桓州官愛里徳漢語守成長也其後與一十八人從太祖神元皇帝同飲於黒河子於口命元􅈴公其也買住即太傅第二子早卒其子明安歹児時年十有三歳外以路揔管耶律漢傑即其兄也聖㫖宣諭了也教省家與文書去者其制辝曰我家當開拓之𥘉乃祖有經營之力人今不見功豈可忘雖尔身未及成人在朕心忍令無後姑承舊爵用顯元勳直湏長立之年許領職司之務廿二日闊學士授中書左丞闊字子清時年三十九歲甞受學於王百一張耀卿其父潜邸舊臣丗為阿塔赤漢語羣牧所官也廿三日癸未鄭江授侍衛官其辝曰鄭江職在承宣誓從征役跡去易就難之意有忘家憂國之誠不示褒崇何明勸激就帶巳降金牌充侍衛軍副都指揮使同判武衛軍事景州軍民長官如故更冝戮力以奏膚公是日有旨與老王姑護持玉華宮聖旨者其辭曰錬師王道婦賦性純正執志不囬挺挺然有古烈婦之風奉侍我太上皇皇太后積有年矣周旋之間曽無過舉當時雅為敬重使之入道為此先帝常加賜予巳勑令真定管民官選擇佳地起蓋宮觀資給衣粮仍以玉華之名賜之以為我家祈福之地朝夕焚誦用報我皇考妣罔極之恩所在有司冝加持護毋容它人妄相侵奪母以差役相毒以致不安常教告天與皇家子孫祝延福壽准此廿五日乙酉權中省都事趙謙終於上都客舎惲為棺㰸并封視隨行衣裝請於郎中賈君仲明蒙賵錢千五百緡廿六日丙午遣送趙君焚於都城東十里外囬適趙氏親知徐緫管者至其僕與所封裝篋付焉三十日庚戌時前軍儲所官塔塔児亥术忽乃昔刺必闍赤馬月忽乃䓁争相爲用丞相史公與闊左丞議曰今南邊極逺江淮又不用兵所事宜廢至於異時征進一行部官可辨旣而中止特㫖以前都運周恵子鍇領其事七月廿七日丁亥前大名路宣撫司幕官雷膺前東平路宣撫司同議權詳定官王惲同日授翰林修撰雷詞頭云家學有傳士行無玷昔年詩禮巳聞鯉過於庭階今日絲綸復見鳳毛於池上可特授某官同知制誥兼國史院編修官冝振斯文以弼予治王詞頭云行已無忝博學能文顧超絶之逸材足鋪張於偉蹟冝司綸命以賛皇猷可特授某官同知制誥兼國史院編修官當振斯文以宣朕命承旨笑謂膺䓁曰汝二人可謂佛子出丗矣惲䓁謝不敏既而奏准行翰林院事中省既以院印授承旨公因與惲議曰前朝士人無幾若比老使得霑一命儘有光矣遂保奏廿餘人擬為随路提舉學校官是曰有詔照㑹立翰林國史院道與翰林承旨王鶚據保奏翰林院官修國史事准奏収拾者在這裏底先與職名者外未到人貟候来時定奪今開坐元保人數并巳除翰林院官職名如后
