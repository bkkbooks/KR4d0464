body:
  text: 五言古詩題玉石蓮華洞道院壁東山一何髙細路石巃嵸窅從絶澗底徙上盤峻塜糢糊松間雪照映列孤䂬衣飄逺壑風馬滑隂嶺凍捨鞍強躋攀憩定腰膝痛吾非樂險遊靈迹訪仙洞當年白帽翁恍惚見醫夢進功力開鑿怒玃髯鬛動毛麾語怪徒筆此真作俑至今城市人誕説猶洶洶好竒更過豫一笑為腹捧西山遊欲遍物産多給用爾焉最不才任土無可貢濯濯殆赭餘地冷物寡種我來探是穴木葉恣填壅青藜試撥觀隂背一罅孔廣深無丈尺蟾吻呀劒唪回環聚乳坎歲久垂巨蛹白猿竟何有流石變擁腫太史載禹穴登覽想森悚不經聖人手後世妄增寵况兹何足云遺搆託以重作詩破群疑擲地驚墜甕道人亦釋然别逺猶目送來者儻志同三復賈餘勇御驃出廄圖何人拂絹素寫此房駟精一馬老伏櫪志在千里行二馬騁踶嚙角壯猶龍騰一馬方輥塵海岸翻鯤鯨畫師慘淡意落筆矜多能我觀寓所感國制貴有經唐人重馬政分屯列邠埛當時百万匹肅肅羅天兵東封與西蕩歲用不可勝嗣王獵其餘尚足開中興乃知三軍本匪馬將奚慿聖經説備預万古為世程倉卒事亦辦未免衆目驚我思立仗間振鬛伸長嗚吾言固芻蕘聖經其可輕題吕充隱和陶詩卷後吕字明復武陟人金亡居襄陽尋渡江居鄂昔從顒軒遊嘉話半耆耇每及充隱君稱道弗容口自憐野逸姿佳遁乃師友聞風即欣慕髙興渺林藪况吟平生篇開卷粲瓊玖君詩江西來一旦落吾手正襟三復餘酣飲得重酎外枯含至腴霜落溪水瀏嚮來和陶作雲夢吞八九金鏞出大音何俟寸莛扣吾愛先生心吾尚隱君守當時淮西役臨事見不偶吾䇿君可屈此身孰得有先生歌鳯徒簮紱胡可誘髙情薄雲月流詠見不朽九原儻可作清江變醇酒眼中杖屨來磐礴門邊栁與背一壷遊秋毫峴山首昆陽懷古行役宛葉郊路入昆陽城􅘷水抱城左蕩潏東南傾川原入四顧蟠互多岡陵城頽削懸崖草深惡鴟鳴嗟爾一抔土當此百万兵莽圖十九年聚此天為坑王者況不死千騎驚龍騰漢業兆豐沛赤伏此中興創復兩不易山川賁雄名東西遙相望盤盤兩神京千年事雲散草木含威靈野人無所知城邊事春耕扶犂上廢壘壠畒縱復橫只應懷古士千古愴餘情為東坡昆陽城賦苦熱歎四十六韻效昌黎體祝融駕火蚪頓轡周八裔戰酣西北乾回薄餘暮熾朱光沸虞淵大地蒸一氣蒼茫夜色溼酗鬱玄象醉今年六月中荼毒逾往歲金晶才始狀熛怒勢此鋭炎官張火傘屏翳揚赤幟四合歊陳來一鼓赫離冶天潢影半涸星鳥芒欲彗吟風樹葉噤塌翮林鳥墜併兼坎兊權不使天地閉王城十万家燻灼迫一勢乾坤墮熾甕逸德駭天吏掩關人事絶藏伏敢口議寒裳起中夜通夕不容寐捫背赭汗流窺井湯泉沸松間有困鶴無夢到清唳墻根有腐草螢化光晢晢穿簾入我室照眼驚火齊隂蟾遁老魄火鼠騁黠智夜深過我前跳躑翻飲器屋古又足蝎伺螫尤謹避簟紋燎炎輝側脅能少憩舉動體愞熟歔欷氣短細抱冰眠或可揮翣何所濟二年客京師身幸置散地雖無束帶勞唯老覺加倍倣徨不知曙種髮沐而𬒳四序本平分偏盛誰所致火攻出下䇿不已􅑒万類嗟此一丗人暍死將何厲此生匪金石流鑠吁可畏內熱復自焚衰稿將立至燥惟以靜勝事須以義制冰山詎可依煬竈非所媚遐想崑崚巔庭觀何偉麗巍然五千仞日月光隱蔽回環十二樓空明淡無際水晶作柱礎群玉絢軒陛天風掠枕席月露濕環帔瑶臺擁灝靈萬舞發清吹真仙事朝元鸞鳯互驂翳閬風接玄圃追陪憶遊戲何年墮塵緣坐想無由詣安得萬里風振此垂天翅脫落區中囚髙舉尋吾契聽講吕刑諸篇至元十六年已卯歲冬十二月十七日中山府明新堂雪夜會府尹史子華二政朱信卿洎諸吏屬聽教官滕仲禮講周書吕刑論孟諸篇凄風布雲葉寒日慘不光先集覩微霰轉盻鵝毛揚一天陽和氣散入中山堂公堂何所有曹務紛刑章竟日椎與撲令人足悲傷廉隅是何物僥幸為尋常淪胥一至此禮義從消亡涉淵不自濟試以舟楫航郡侯樂與善揮撾噪其傍况復得佳士問學陂汪洋一編周穆書噩噩深慈祥爰念盡心戒披衍何琅琅敷明發藴奧逺紹開微茫大羮得至味黍稷非馨香狐白有餘燠弊緼非所當衆目鑿聾聵同僚益溫良夜久不能寐孰知冰雪雱定武古戰國風俗稱雄強今夕復何夕弦歌破天荒吏散擁衾卧薄俗思溥匡大決洙泗波浩蕩湔群盲此事恐難必此志詎能忘一州稍安行一方賜無量比老汲一見此外吾何望打窗聽雪聲起視夜巳央謝子文龍尾藤䇿之贈子文善方伎姦從吾輩遊城居三十年藥惠遍八州我適駐棘津數見禮聿修循循似不能氣貌何和柔贈我龍尾研加以蒼藤修杖為扶我衰研用供冥搜入手三摩挲白雲滿汀洲意重無所答在我將何求君言愛余書落紙雲煙浮儻蒙數字惠永作千金收既聞因語君我老拙所謀有時縱惡扎聊用寫殷憂如君濟物心胡為效豫尤喜抱弊帚歸兩袖紛琳璆客去倚窗坐念之思夷猶一作悠悠誰期淡癖中亦有同好流呼兒一題詩持贈相為酬贈仲溫教授求授真訣僕年五十餘氣志覺衰耄耳厭秋蟬號目眩昏花眊癃鍾百態具何啻鬚髮皓朅來觀津邑有幸遇醫老仰開浩浩天俗學歸一掃息心抱吾真辨之當在早人生堪輿間雖靈貴強矯不然一物耳歲久等枯稿况復智物誘內熱日煎擾不聞山木喻樗散元壽考守身為最大自餘皆細眇亟當念所存夕惕謹持保授我內經旨根命入幽討促膝語三日底裏為傾倒會合豈易得相逢恨草草多君濟物誠憐我慕丘禱夜闌耿無寐再拜獲至寶作詩代瓊琚相期永為好泛漳篇并序豫以王事奔命今春環走二千餘里前次漳隂車殆馬煩且得目眩􅦅痛疾逺不能騎舟行東下庶得一日之休富覽大川勉卒來事作泛舟篇以見意時至元辛巳四月十一日也盤盤魏大名屬縣行且周銷我髀裏肉四月猶綿裘舍車出漳隂步上枋頭舟咿啞理雙棹信船下中流清風泛微瀾篙師訝當頭豈知河伯意故故為遲留汀花助行吟孰取澤畔愁解衣卧蓬底穩似畫舫幽駭觀兩岸移灣環轉林丘灘回淺能澀波富去自湭拍拍風水聲兩打空階秋白鳥何處來雪點河之洲前飛如導豫翔集聲啁啾欽念川上嘆晝夜何悠悠宜為智者樂曲折涵至柔中擅利物功轉漕半九州君看萬斛載掀舞一葉浮仍為勉不息能若兹水不行行望沙麓且得一日休呼兒覔殘𥿄題作漳川遊柏亭嘆至元十八年七月𥘉二日次柏鄉因所見而作烏巢一枝多回簿萬幹林富覽擅已有振羽辝凡禽傾身附老鶻翔集千仞岑既切彼所習復接鳴鳯音秋空恣搏擊鷙老有弗任勢大不兩立擠彼歸幽沉健雛從天來赫赫威制臨毒拳奮所宣坼裂顙與襟縣官籍其家富埒郭穴金懷壁匹夫罪况此皆漁侵行植柏亭傳緩轡惻我吟前車滿孥戮後車載瑜琛乃知非分福禍養憸人深行路莫為惜但云神理忱豺豕與蛇虺吞噬蓋本心天道喜報復自昔非獨今戾氣容有已怨讎日相尋一禮制萬動千古聖所欽何當民志定無復僣與淫九門道中至元十八年十二月六日同察司諸公會葬董簽院於南董髙里原還過九門故城作朔風暮轉劇曠野埃霾昏長鞭驅羸驂日晏東南奔義有執紼役重過孤城闉邑居廢與置代逺不必論緬懷武靈舉騎服開雄尊國聽固自我臣義贊亦惇潛師襲中山萬馬出此門林樓九原塞英氣為一吞脾睨五雄間霸業幾桓文至今西林阜隱隱猶兵屯一朝探雀鷇瘦死秋槐根人事靡不𥘉克終乃可云野老無所識引宿投荒村吹燈具萍粥士雉爇使溫解我寒悴色謝官非所存就枕固不寤一覺東方􅚐野河渡蒼茫劉橋渡南北凡幾過清霜十月交澄湛東流波飲馬立水邊照我兩鬢皤行役非所苦傷懷動悲歌三年恆山趙彈劾兼拊摩熬熬眼中民力弊差與科不能一勺潤慰彼煩與痾顧此衣帶水溉載功實多人而反不若低首愧野河素餐吾可逃奈此蒼生何菊歎沙河縣作佳菊如幽人蔬畦溷凡卉繞叢嘆萎暍與我𥘉不異秋香期爛熳培植須早計呼童溉清泉乘曉看生意繁根溢芳滋秀色失枯悴一物苟獲飬面背見盎睟人生胡不然浩浩存夜氣挽漕篇一作拖舟謡湯湯汶水波西騖復東注勢雖汗漫來止可流束楚發源本清淺才夏即沮洳安能浮重載通漕越齊魯有時泛啇舶潦漲藉秋兩船官行有程至此日艱阻巨野到齊東著淺凡幾處必資州縣力澀滯方可度漫村趕丁夫所在沸官府先須刮流沙推挽代篙櫓硬拖泥水行奚異奡蕩努涉寒痺股腓負重傷背膂咫尺逺千里跬步百舉武兹焉幸得過斷流行復阻又須集牛車陸遞入前浦中間吏因緣為弊不可數蠻梢貪如狼總壓暴於虎所經輒繹騷不若𬒳掠虜盻盻入海口未免風浪鼓舟中一斛粟百姓幾辛苦今復起堰壩壅積百万禦木石動萬計科配困氓伍不思根源微隄障深幾許轉漕本便民廣儲實國輔事功貴順成勉強終齟齬海道事巳然又復有此舉惜將生民力委棄若泥土山東實重地一靜乃可撫嘗聞建隆間有相曰趙普凡百投利人罷遣皆不取以兹報國恩後世比申甫黃閣十餘年清風一萬古元日示孫阿鞬六十韻璠璵世重寶就器須磨鐫𣏌柳固凡木矯揉成杯棬人雖物之靈學則全其天蛾子積大垤禮經存至言多學卓有立孔門稱子淵吾年八九歲入學鄉校間外傳既善誘汝曽從勉旃暮觀子夜後晨讀霜月邊日課字三百熟誦例半千十三至十六詩賦填全篇十九學蘇門遂親經史筵潛窺義理窟弄筆勢翩翩遺山紫陽翁鹿庵暨神川四老鑄顔手誨我扣兩端騰口為奬藉孺子有足觀自後雖努力巳為家務纒隨復就力列一身縛微官道德負𥘉心聰明非日前歲月不我與齒豁童其顛猶能致祿位分持憲司權出入鶴蓋隂紫𫀆金帶鮮舉家𥘉不識啼飢與號寒政自稽古力汝曽極周旋切誡習刀筆有來戴儒冠傳家無長物臨終付青氊有書五千卷太半親手編三世無白屋辛苦天所憐多財秖益愚讀書可希賢遺訓母此替我目瞑下泉汝生今十歲小字名阿鞬貌端姢且靜氣吐清而圓妍皮褁癡骨了不直一錢致身文學中不負三輩傳後事實汝責窠雛望飛鶱四民士為貴六經學之原身安得所師志節先強堅憤悱務時敏效習心眼専人十已則百人眠巳不眠事業一燈苦聲華四方喧唾手取青紫如拾地芥焉子孫丐華澤其祚將綿綿但見讀書貴但知讀書便重則復其家輕則雜泛蠲不見編戶氓差徭日相煎里胥徵斂急追呼到推牽汝若學不立非農即啇廛更下作奔趣為人執弭鞭爾雖士夫裔所習失之偏不學入常流學者乘髙軒我嘗感時輩貴賤難相攀何啻龍與豬過甚霄壤懸子孫轉下愚門户日凋殘或秪為士子終身尚髙間向來徴斂暴略不相為干近多置書家萬卷圖好看來者不一讀非貿即棄捐人果不好學方寸如廢田良苗復何有茆塞深荒煙皇皇七篇書義利何昭宣堯舜等人耳有為即差肩我家徙鄘衛將近二百年素業農與儒宗族頗嬋嫣囑汝善繼述可光新舊阡我老不足法汝曽言不刋念兹復在兹敬之若銘盤力學貴稚齒收功良匪難幼成若天性習慣如自然所以昌黎公恩義戒奪遷願汝事斯語佩服如韋弦我文多漫與此詩不可諼桑蟲歎行行桑間人執柯爭擊撲樹根擁圎壤持􅓩待掩覆云是振桑蟲除治絶遺育咄哉此何為與蠶同出沒千林緑如雲一掃若湯沃不知絲忽腸其大容幾斛春蠶眠正飢蠢蠢冨厥族湯盆出新絲奪自汝口腹無衣四海寒十千帛一束老農前致詞近歲旱何酷無乃民作孽其或時事促十年餐險食邇來險不復嘗云和致祥野成繭與榖皆緣一氣間修省轉災福望望惜兩乾汝等稱濟物駐驂答老農默爾私自囑調元真宰事吾輩乃碌碌低頭愧畸人張口待廩粟靈光塔并序豫自京師南還赤日黃塵走六百餘里及登兹觀煩襟倦思頓為一醒因書斐作二十一韻以記來曽我從京師來望望入定武靈光古傑觀嶻嶪上雲雨何年僧令能建此壯佛宇浮雲衛浩劫神力湧坤土經過二十年未暇登陟舉坡仙遺墨在平日思一覩𥘉穿若蜃樓轉上疑戰櫓拾級有餘平緩步無陟苦最愛洞腹寬豁逹儘容與盤折抵絶巔未省吾背僂心清聞妙香風烈不知暑逈臨增雙明徙倚栗兩股滹池黃一線太行青可數江山有清眺萬象入延佇乃知灝爽氣物外自吞吐應憐闤闠人下與塵坌仵斜陽淡髙層風鈴時自語靈光久無光雄筆照千古摩挲墨花昏瞪視遽如許清風冠髙標猶足跨虞禇龍象幸護持取重此窣堵窣堵波佛經云高顯也舂榆嘆昨遊封龍回行行憫農耕午憩得美蔭飲馬常山城有婦挾筐筥木皮白縱橫柴門臨野碓舂治無停聲朝餐此皮麵暮煮此葉羮救荒兹上食殘喘聊支撑話巳長嘆息一飽何時盈我因慰田父努力無嘆驚皇家澤􅗈霈蠲盡租與征閲月凡四兩禾苗見青青又聞使四出訪問民間情有害思與去有利隨使興惟期和氣應庶得來休徴寧心待斯須會見秋有成折齒吟二十四韻吾年未四旬顱髮白勝雪兩眼眩生花一耳或通塞所喜牙齒牢未省有殘缺飲食雖壽基齒壯物善嚙庶幾桑榆境健啖延歲月所以胾與餅飢耒若刀截今晨具盤餐軱肉固纎屑一嘬出不虞左齒拉而折群稚慘不嬉病妻驚欲絶汝老不自量無故取摧摺豫云盛則衰百醜見兩頰平生好言辭咀嚼出五色文戰怒欲碎醉飫乾甚決運用勤亦至半百當衰􅚿一作歇時時以舌舐乍脫覺中熱一落不復生根􅒎漫枯枿駭若中堅摧闊於山口豁自今須愼護作事思妥帖一柔勝百剛有味老聃説唅呀動恥念顚倒漱水怯猶勝昌黎公餘者堅尚潔既不妨嘯歌底用心甈臲齒墮端午前詩裁重午莭成虧恐有數歌以散憂結癸未七月秋分日鎮陽澤宫弘道堂讀韓子有感盤盤素王宫欎起金粟背厭喧卧芹堂梏亡心暫在岡平勢尚隆雨久晴亦快風清自逺至雲竒堆户外一編子韓子至味欣一嘬時當八代衰道脈僅如帶先生晞聖徒扶抵由我泰詠歸渺聖門簞食乏藜菜顧時有汙隆盡我志所逮遑遑仁義心自任乃爾大橫流嚙巨防力障俾勿壞排隂入九地孤唱肅萬籟困吝𥘉不計百折氣益邁要當沒則巳不易下惠介書雖不盡言後學有足賴真知程子説安石詩自厄荀揚公所譏鄒後無接派道心得非深能遽發此慨略內詳外言恐就述作槩我知踐履功當出仰嵩岱後來立論者志母以辭害文平極道腴筆肆走光怪私心適有會何翅讀屢再雄名儷景翻浩氣振吾憊起拜壁間像顙泚覺雨霈冝乎配神庭血食昭万代董大夫廟在元州城北門內有宋元祐間縣宰宋保國壁記云縣西南八十里有廣川店隋避諱改長河縣今將陵縣是也舊屬兾州吾觀漢家制所法皆亡嬴中間去取之易苛稍寬平何參不足責本是刀筆生文景尚黃老申公負虛名賢哉董大夫三䇿冠漢庭論説天人際髙吐三代英仁義我所重功利我所輕紛紛弘湯間獨能尊聖經所惜王者佐竟老膠西卿過蓨得遺廟再拜冠與纓至今讀公書片辭皆丗程浩浩廣川水萬古朝滄溟因之觀其瀾吾道得少行漢丞相條侯廟在蓨縣西三里遙遙漢蓨國落落真將軍至今有遺廟突兀城西垠維景四葉帝恩濫椒房親髙帝白馬約侯封乃忠勳區區王氏子何功復何人丞相懲吕禍安劉念先臣所重社稷計豈憚嬰其鱗竭忠固臣節返得怏怏嗔大胾不設櫡薄責等上尊庾死何所慊景皇似非君泥阻小大西門道中七月四日常山抵鳶鞮望望百里近我行滹水陽秋漲勢才褪氣蒸暑肆虐雲駃雨作陳經塗𬒳遊潦間關阻前進固知路未夷畏此簡書迅東西大小門咫尺浮圖鎮泥淤壞轍深車陷雙輪軔顛蹶困長耳喧呼空斷靷于役非其時跬步有至遴用拯壯則吉人牛親倩問言形半公私物應有違順禮讓疏慊荒非係風土吝侯門仁義存河去安所潤赴官比花開斯語未盡信暮投田家宿何翅夏畦病苦熱不能眠伏枕聽露蚓鋤鏤詩并序至元二十年癸未歲七月四日赴任濟南道出藁邑西南鄉觀農人用鋤鏤理田時秋霖開霽嘉穀滿野三農熙熙然有歲成之樂自惟本田野間人喜為賦詩不知何時得與若輩耦而耕也雙竿駕特牛獨腳雲耳並紛紛捲土落一剗蕃草淨是名為鋤鏤𥘉不見田令行觀數畝禾草去苗意盛中心覺欣快圗蔓得機柄種多我力寡匪此何由勝一作人定果能勝神農製田鎡耒耜理之正兹焉述後來𥘉出驚智竟荆公重農本一一見歌詠青苗變箕斂大為當丗病千年負深譏言不覆所行牛升哥詩并序深州靖安故城店牛氏子升哥年十歲能白翦諸字試之誠然點畫波撇甚有可觀者其父來求詩因走筆賦此七月八日人生有至性凡事作不難豈問年長少智巧出百端阿升甫毀齓能弄金剪刀一字𥘉不識所見禾與蒿字形雖百態裁成思無勞撶膚搯細像棘端刻飛猱往往從效習猶足驚兒曹我因囑乃父宜令筆墨操學焉苟不輟智見為書豪聞談劉齊王故事并序七月十三日宿阜城縣廨教諭劉元輔話廢齊祖塋在縣南十二里今謂之御莊至今石馬在焉明日次元州陳教授又説豫未貴時一日顧見一白龍現婦翁家大鏡中但無鱗與角耳後乃嶽亦見以女妻之資藉之力甚厚及生二子以鱗角名之或者謂二子長豫當大貴後果然劉公布衣時往往人鄙棄婦翁識其賢資籍極至意龍騰鏡光中第闕鱗角異用輔二子名既長志果遂八年阜昌齊有命終閏位至今説釡銀託子返為絫為淵既毆魚齊安得不廢朅來過故城人指金華地公昔此讀書蔥欎見佳氣尚看書帶草碧色映階砌蕭條縣南墳猶以御莊謂石馬慘無聲山冡久蕪穢空餘一字詠流播傳後世邦人陳與劉因話談此事過深州故城有懷韓昌黎解牛元翼圍事維唐有藩鎮連衡皆盜區汚孽互相濟殆似背脅疽心腹訌蟊賊膏血化蟲蛆厲階安史亂王澤不逺敷河朔有故事誓作效逆徒堂堂裴中令夷蔡恢皇圖聊乘破竹勢一制三鎮污腐敗就與決大赫天王誅彼相中妒梗百裴竟無如事機一墮地涵潰終喪軀所以賊湊輩血人于牙鬚既戕弘正忠復抗新使符靖安門晝鎖長圍困豼貙昌黎解一言王略始得舒信乎立大事臨機見真儒東征過故城往事秋風徂得人國無弱懷古重欷􅒣文公豈多得元翼何代無賢哉霍生行霍宗字守道世啇賈二子長日思廉次日思文賢哉禹城霍傳家惟水圖一身坐服賈二子使業儒虗館致師範謂董宗道也名師舜濟南人捐金買詩書所願士行列所願德依於利逹非素望爵祿非所覦厥修日有來此心得安舒我職宣教責東行式其閭二子出拜我朴厚中若虗呼前試講説固覺回不愚我因囑乃父義利不並居頓首謝使者行將帶經鋤祝阿幾万家從古禮義墟爰自兵革來錐刀衆為趍瀟瀟枳棘間一朝見鵷雛孝悌道甚邇色怡步徐徐聖賢事不難經訓即災畬二者有餘𥙿文章自華腴要知特逹舉張本德與譽切戒作而輟又慎終匪𥘉勤苦天不負流芳子孫濡或秪稱善人巳為舜之徒讀書不求官此語聞大蘇譬如飲不醉陶然歡有餘賢哉霍君心能與坡意符因之訓二子此詩不可無七月二十三日客禹城作題洪崖先生卷後昔夢洪崖仙遺我雪色鹿振衣登長岡超邁翥玄鵠山精與木怪役使供走僕至今青城山神爽動林谷三郎老溫柔妄意企仙躅兩行招隱書空霑岩桂馥誰能拍其肩翳鳯事追逐我欣拜遺像及此凡數幅仙摽入遐想兹畫更清淑掩卷見南山髙興渺煙麓出香竒石張生貯竒石携來有遐觀一峯華不注墮我几桉間穿穴作怪供突兀橫蒼顔炷香煙滿竇野燒生春山我久汨俗冗對之心暫間瞑坐清興遠夢與孤雲還洗硯示孫阿鞬書生事筆耕窮年治農圃我貧未是貧四貴會文府東坡謂筆墨紙硯文房四貴伊硯供我用小大不恆主磨硯積有時敗墨雜垢淤毛錐汨厚漬豪蕩失剱舞墨石不相入肝膽幾越楚呼兒濯清泉外難思一抒枯蓬發寒芒炭柳屏宿汚玄泓連紫臺月露霮天宇炯炯鸜眼碧婉婉修眉嫵歙絲紛霧縠秋色鬱端渚更憐緑玉洮金桃啄鸚鵡石中有此理面目開太古不辭襟袖黝一一重摩拊朝來試玄圭瑟瑟響秋雨聽餘思修然揮灑方得所玩之中有感滌念易心慮元來况本善物誘失𥘉度賢愚不相逺克復在朝暮昏蒙貴擊伐氣志戒墮窳淬礪能日新天理自昭著願渠體終章吾豈為研賦秋澗先生大全大集卷第三
