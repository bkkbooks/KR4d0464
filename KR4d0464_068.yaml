body:
  text: 翰林遺藁擬中書省賀河清表伏以天開昌運統一車書地應休禎河清陜洛如式恭惟皇帝陛下徳昭天漢思溥淵泉覆露何止於中華洋溢逺霑於方表以致潤􅉼九折鏡浄两涯自陜至汜㡬千里之遥由乙至丙逮三旬之乆鱗介之泳游可鑑山林之形影皆分躍圖馬於龍宫未容專羙舞夷於鱗屋時出効靈顧兹上瑞之方増特表吾君之至聖臣某䓁叨居華省幸覩榮光敢傾葵日之誠用伐辭人之頌遐荒嚮慕百川宗滄海而王寳祚洪延萬壽等丹丘之固又上澄下徹光昭四表之平國晏民安永溢万年之壽擬聞捷賀表天網雖䟽曽恢恢而有失罪人斯得迓穆穆之来平外侮旣消頌聲交作臣某䓁誠歡誠抃頓首頓首㳟惟皇帝陛下仁含動植德嫓生成振長䇿而用三驅念天顯而惇九族荐雷之震逺驚而邇懼大風之舉歌動而雲揚側聞喜自於日邉豈止威加於海内臣某等職叨省署阻奉鑾輿竚目龍旂遥伸虎拜歸牧武成於周馬歌功羙邁於唐鐃六轡言還春動两都之和氣千官飲至歡騰萬歳之霞觴如式中書省賀正慶八十表甲午嵗伏以明堂受籍萬方歸一統之尊神䇿探祥八秩開大椿之首稽諸前古曽未多聞中賀恭惟皇帝陛下德本至仁天申顯佑維神聖之廣運致功業以獨髙粲然萃三代之英蔚爾創一家之制與天立極躋世於平我澤我威洽乎南而暢乎北曰聲曰教漸于東而𬒳于西方且通逹下情蠲除積負肆赦恩而哀矜庻獄扇㤗和而煦育群生冝福夀之貺如川方增見寅畏之心維日不足端臨元㑹光動漢儀舒化日於中天湛露㤙於春酒臣某叨承睿眷乆侍瑶階俻位秉鈞何𥙷馨香之治捧觴上壽永膺億萬之年如式中書省賀尊號皇帝夀八十表伏以廣二億而輪二億萬方歸一統之尊春八千而秋八千六葉開大椿之首稽之載籍曽未前聞恭惟憲天述道仁文義武大光孝皇帝陛下德本至仁天申純佑継一祖四宗之業兼三皇五帝之功燕貽謀動從民志以太孫撫軍而重安國本以新河轉漕而通恵畿民建大學而首善京師清中書而杜絶群枉緩囬鑾輅省秋歛而即田功丕顯前光纂武圗而修信史惟聖神之廣運納福夀於方來神嵩屢聽於三呼籛祖莫多於八百顧兹鉅典稱慶冝先况盛事之難逄幸微生之親見臣某䓁職司蘭省喜倍輿情順考百王實光千古輸誠報上區區歌天保之詩以億祈年永永同洛書之誦又伏以王正紀月萬方歸一統之尊神筴儲祥八秩啓無疆之等况得春於上日恊正氣於四時事盛來并禮湏交慶恭惟尊號陛下誕膺景命祗紹炎圗載纉三代之英創作一王之制継天立極躋世於平化行鯨海之南威暢龍庭之北廓廓然可謂無事巍巍乎其有成功方且以冨蔵民與免積年之負方春布德肆頒咸赦之恩冝壽祉之方隆見嚴恭之克享端臨元㑹光動皇儀舒化日於中天湛露恩於春酒臣等率先列辟拜舞稱觴乆侍台階何益體元之政願言洛誦来符垂億之年聖壽節表伏以日符恊夢茂隆探䇿之祥鳯曆周星方啓同天之運休徴滋至海宇交懽中謝恭惟尊號陛下帝學日新聖模天縱恢章先業垂𥙿後昆所欲從民爲天立極以太孫撫軍而重属丗望以新河通漕而倍溢民儲建國庠而首善京師清中書而杜絶群枉方翠鑾之囬軫慶玉燭之調元敬展賀儀載臨誕莭臣某䓁承乏鼎鉉同秉國鈞愧無金鑑之書徒切露嚢之獻光瞻比極列衆星環拱之先壽等南山伸天保不騫之祝翰林院聖節賀表伏以翠鑾囬軫属千官飲至之秋王燭調元慶萬寳登平之歲載臨誕節煥舉賀儀中謝恭惟尊號陛下内極文明外昭桓撥爰從登極之𥘉未甞以位爲樂思章先業垂𥙿後昆燕貽謀而以之撫軍清中書而俾之端本于以息肩中夏謹度侯藩上禱下祈爲民歛福東征西伐與世除殘文軌一家而不曰治安者乎煙火萬里而可謂和樂者也尚覬惟新之政擴推不忍之仁包舉遐荒涵濡聖澤臣等叨居辭館榮列土林敬奉倪觴俯伸虎拜敢希金鑑之誠仰罄神嵩之頌感生北帝歌有商長發之祥夀等南山罄天保不騫之祝謝授翰林學士表臣言今月日蒙恩除臣翰林學士者伏以求賢圗治逺邁哲王飬老乞言誠爲重事况聖代方文明之盛在禁林湏超逸之才如臣者學術素踈桑榆垂晩俾㩴升於衆上殆選有於無中兹蓋伏遇皇帝陛下聖敬日躋文思天縱紹接千年之統光揚列聖之徽舎所短而就所長小成小而大成大敢不疑思螭首益礪詞鋒由外臺而登玉堂固巳極當代縉紳之寵約舊章而修信史何敢企髙天日月之輝如式登寳位賀表伏以承祧主器已欣曆數之歸助順與能允恊神人之望事光前古運洽重熈欽惟皇帝陛下皇祖聖武之曽孫明孝太子之嫡嗣英武同符於先帝温文早著於春宫扈蹕東征躬勤備至撫軍北邁我武維楊符命自至而呈祥宗盟樂椎而同戴旣深丕眷所助冝多覩六寳之昭升將兆民之永頼中綂至元之治行見増隆漢文夏后之賢莫之獨美光融化日歡沸民謳臣某等乆事先朝備位政府再逄嘉㑹喜邁輿情景命維新按軒曆上元之統太平假樂稱瑶階萬夀之觴老人星致語伏以太平有象治洽金穣至德無方文綏武暢惟精誠之上感致淵曜之輝臨臣逺自狐南光融狼北厖眉鶴髪月帔霞冠遽踰常度之躔来展流虹之慶恭惟皇帝陛下玉帛萬國庭衢八荒紹列聖之垂休圖舊人而共政幾先物而聦明齊聖量包逺而恩澤無遺取慿出丙之微明用禱後天之遐筭咸躋夀域樂對昌辰南極何深下坤維七十五度北辰伊邇拱乾位億萬餘年爰捧徽章式伸善頌其辭曰天地穹窿一氣氲祥開来表帝皇真九圍覆露堯天大萬有榮懷湯徳新報上疇非思下下推恩反物自親親通明殿裏長生奏願祝元貞萬萬春中書左丞姚公制朕聞世祖睿臨之乆有文王多士之稱如種楩楠而備梁棟之材如積璠璵而供瑚璉之器而况先朝故老當代名臣良用慨然想見風采故中書左丞姚某生禀淑質世稱大儒爰自潜藩殆若神授天扶道統力主經筵以聖道而覺斯民燭天理而息邪說智足以逹其言行辯足以濟其經綸耕桑開王業之艱征伐佐雲南之舉罷侯置守轉官之制𥘉行論道經邦建極之功斯在是用圗囬左轄羽翼春宫永惟佐命之勤式賛承祧之羙籥羽東序從容賢傳之嚴綸綍北門寂寞玉堂之話百身莫贖一鑑云亡開國於營用旌直徳可贈某官某謚俯惟英爽歆此寵靈中書左丞許公制朕究觀世數灼見天心粤惟有不世出之君然後得大有爲之士運符千載道濟一時中書左丞許某爰自師儒遂拜左相用之不惟不重學之不惟不深貞一乃心執持苦莭謀謨善断精識造微旣逢堯舜之明用安社稷爲恱君聖臣直理明道尊庻幾夷夏之安風以詩書之教衣冠萬國雍容叔孫之儀仁義一家剴切魏徴之諌在中統至元之治有永淳貞觀之風此其效焉功可忘耳而復飬英材於國學齊七政於璿璣白首南歸尚深北顧憂來丘禱歔欷柱石之㐮人去鑑亡瀟洒風雲之契感時懷德想像其人忍惜䘏章俾䟽身後可贈某官某謚尚期窀穸不昧欽承翰林學士承旨王公制人臣大節忠義爲先䘏典推恩古今一致故翰林學士承㫖王某道德淵深人品峻潔板蕩見忠貞之操文章有正大之風飬力息兵貽謀進諌惟軍國正撫監之體將謳歌見曆數之歸白首匡時赤心爲國庸示至公之論曽無一已之私而又扶昌運則一代名臣鎮雅俗則百年遺老去日漸逺有念何窮九原之氣猶生不忘宗社三事之報斯在庶極哀榮可贈某官某謚尚兾英靈服我休命請上尊號奏草臣等言伏見陛下昭受顯號今己十年聖徳神功日新一曰又聖壽新嵗茂登八秩考于典禮合行再上尊號上以賛揚功徳之萬一下以罄臣子愛戴歸羙之誠謹此奏聞伏兾聖慈特賜允許表外任進賀聖夀節賀表至元三年電繞中樞寳曆啓千齡之運祥開彌月瑶墀儲八葉之蓂凢在覆臨疇非鼔舞欽惟皇帝陛下聦明時乂聖敬日躋爰從在御之𥘉未甞以位為樂大度同符于漢祖宏規逺邁於唐文纉四聖之丕圗新一家之大典尊崇故老思致隆平委任勲賢迭居宰輔文之以詩書禮樂律之以軌度儀刑薄賦輕徭省官定制尚側身而修行毎前席以賔賢察納雅言彌綸元化上所以恢章先業下所以弘濟生民凢曰云為務從休息分緫司而去積年之弊更庶尹而削藩鎮之權尊祖配天妥宗祧於九廟敷文柔逺舞干羽於兩階功徳兼隆神人交暢以致服前代所不能服臣上古所不得臣東夷航海以來庭西域梯山而欵附可謂振長轡以逺馭敞中國之至仁仰惟極治之艱各皆出聖模之廣運載臨盛旦敬舉賀章臣等猥領郡符恩崇天造進乏千秋之金鑑遥稱萬歲之霞觴同虎拜以揚休下列阻陪於北闕効嵩呼而獻祝賡歌載詠於南山聖夀節賀表至元四年甲觀開祥嗣大歷無疆之服華封請祝罄後天難老之期凢在夀臨率均呼舞中謝欽惟皇帝陛下文思天縱聖憲日新得漢唐經國之權綱極堯舜知人之濬哲以岳牧治本也䟽之而冊授中書化源也清之以弼諧尚兼聽以爲明毎得賢而恨晚溥覃禄秩優復民田有官荷覆露之恩含氣遂生成之樂家給人足時龢歲豐九歌莫𬒳其神功萬事馴歸於道揆而又順長道而屈群醜推至悌而御多邦謂本支一出於祖宗重䟽恩而立愛江漢終歸於淵海首継好以息民由旣睦而於变時雍以克肖而全付所覆春際八荒之壽域天開一統之徵祥瑞屢見於蒼麟箭罷傳於青海西窮月窟率稽顙以來王東極扶桑復寅賔而朝日繄爾至元之盛烈於昭曠古之深仁瑞節載臨賀儀煥舉臣某等心馳魏闕職限矦藩阻振鷺以陪庭儼天威之在上千官飲至傳聞置酒於南宫萬嵗稱觴苐切瞻光於北極兩宫正位稱賀表伏以正位建儲舉一代當行之典推仁𬒳化遂萬邦咸喜之心凡在臣鄰同音鼔舞中謝恭惟皇帝陛下道彰坤順德益離明治首宫闈基隆國本著母儀於天下融少海之波光謳歌見四海之歸教治豈二南之廣壯本支於百世聳官儀於一時某等職忝侯藩心馳象闕徒切煙花之想阻陪鵷鷺之行敢罄丹衷載陳封事德符寳運拜揚稱三殿之觴慶衍蘿圗綿亘接萬年之統聖壽節御史臺賀表鼎定皇圗接千歳上元之統天開甲觀儲九秋盛德之祥聲教所加讙呼斯溥中謝恭惟皇帝陛下堯文天縱湯聖日躋爰從在御之𥘉未甞以位爲樂躬勤儉德夢想幽賢察納雅言恢弘治道蕩皇威於北海藉千畒於東郊載崇列聖之鴻基仍創一家之大典漢官儀之漸復唐治具之畢張尚深闕政之思屢下䘏民之詔内祓災而修行外發政以施仁明德緩刑輕徭薄稅而又天臨睿智坐折遐衝昭曠度以無前振長轡而逺馭爰整干戈之事終歸雨露之恩雲掃黒山孰謂玉關之乆閉春回鴨緑旋聞滄海之維清旣荒外服之功尤盡内修之理繄爾至元之盛烈於昭曠古之深仁瑞莭賁臨賀儀煥舉臣某等榮叨臺諌戀功葵傾陪稱漢殿之觴仰効露嚢之獻光瞻北極罄封人上願之心壽等南山伸天保不騫之祝聖壽節賀表寳曆膺期接千歲上元之綂日符恊夢開九秋盛徳之祥稱慶惟均際天所覆中謝恭惟皇帝陛下離明継照乾健乗時動順民冝更張治化未懿德而式序爾位任吉士而勵相我家尚深闕政之思屢下子民之詔去網更仁於湯祝敷文思格於苗頑旣荒外服之功尤盡内修之理卜營督亢宅壯陪涼據山河全勝之區得貢賦適中之地于以隆上都而觀萬國備時廵而禮髙年四聦逹群下之情一豫爲諸侯之度臣某等榮叨郡寄心切葵傾阻稱漢殿之觴徒効露嚢之獻運鍾北帝祚有商長發之祥壽䓁南山伸天保不騫之祝御史臺賀正旦表至元八年爲御史時作伏以鳯曆頒春三正恊夏王之統雞人唱曉萬方稱漢殿之觴品彚冲融衣冠環拱恭惟皇帝陛下容德乃大盛蹟無前載新出震之權端履乗乾之位東漸滄海髙麗蒙再造之恩西極渠搜葱嶺多來庭之使國字創一家之制朝章舉曠代之儀方漢之險何足恃乎髙深蓬萊之波旋復聞其清淺終格羽干之舞姑奉文誥之辭咫尺天威趍承鳯闕蕩思光於萬里醉春色於九重臣某等乆侍瑶階叨居憲府獻可替否詎能振臺閤之風拜平揚休仰以祝河山之夀正旦賀表伏以玉燭調元蓂莢啓堯堦之曆椒花獻頌錦封陪漢殿之觴朝野同歡乾坤交㤗中謝恭惟皇帝陛下仁涵動植徳備廣淵受籍以朝履端於始爰體春王之月屢頒寛大之書顧軫慮以洪深躋吾民於仁夀而復開明堂而坐治奉帝藉以躬耕揔攬皇綱務滋大本鳯城斗轉春廽萬里之農桑紫禁天開瑞靄兩都之雲氣臣某等叨承列郡逺𬒳恩光敢俯傾葵日之誠仰以効華封之祝遥瞻北闕天威殆咫尺之臨夀等南山神筴授萬千之筭史都督譲緫管表臣謹言推賢以位敢希髙世之名以讓移風固有爲邦之教志雖自信政亦當然中謝伏念臣某等鷹犬微材邊防舊帥起家燕地分土恒陽累朝荷眷遇之恩報國乏忠貞之効正以先臣之故乆膺方面之權﨑嶇提陽夏之師屯戍控荆門之㑹仰憑聖筭十載無虞鎮守長江寸功何有比加寵數方驚都督於諸軍恭𬒳朝章㑭襲天倫之舊物君命凛雷霆之重微軀處伯仲之間情有難安禮冝遜讓臣兄某灼知民事素秉忠心功収製錦之能政洽承流之體如黄覇巳優於冶頴何景宗遽可以臨民伏望聖慈鍳臣愚智非敢圖私已之便實恐貽不友之譏念念天恭敢後周書之誡堂堂大國務先常棣之風謹拜表以聞聖節望闕祝文龍馬授圖巳肇興王之迹流虹啓聖大開彌月之祥凢居覆載之間疇匪懽忻之至欽惟皇帝陛下聖謀能断睿智足臨天祐人歸功崇業廣西平大理蘇雲霓傒望之心南渡長江得風日淸明之助爰履神明之祚恭承祖考之休庸示至恩以昭曠度親王昆弟光輝棣萼之樓異姓勲臣揚歴金華之省尚求賢而若渇每從諫以如流所期無曠於庶官急欲廣聞於民瘼禮百神而歛福順三時而務農載戢干戈㑭安田里施仁發政先困窮無告之人講好息民停邊鄙喜功之奏而又兵民異政威爱並行鑑古昔之安危立規模於宏逺移官吏而除累年之弊崇儒雅而興文治之風尊京師而強榦弱抜削藩方而如臂使指分宰相於諸道專委任而責成功置統軍於遐陬蓄精銳而消外侮唐丗之時雍丕変漢家之治具畢張以致祥風扇和時雨霈徳炎洗蛮邦之瘴春回沙漠之寒車書八方不曰治平者也煙火萬里可謂和樂者乎民歌德化之成心靡帝功之有當萬寳秋成之莭適群龍首出之辰湛珠露於仙盤蕩金風於玉宇香欎三山之紫霧懽騰大液之蒼波吉旦光臨溥天同慶臣等叨居民部阻奉壽觴不勝葵藿之誠仰荅乾坤之造遥瞻北闕天威逮咫尺之臨拜祝南山神筴授萬千之筭十六年賀正旦表任河南河北道提刑時作玉燭調元允恊三朝之始春城囬斗茂凝一氣之新正朔所頒邇遐交慶欽惟皇帝陛下端臨左个誕受輿圗仁擴春寛道開時㤗化日舒而民力足奔鯨沛而海道空清明際區宇之間皷舞樂雍熈之治尚惟事統丕顯聖謀孜孜下逹於民情念念化隆於邦憲保釐荒服减吏冗而益監司惻憫長征數軍實而免貧役功極見寢兵之漸䇿長盡馭逺之方履兹肆覲之辰介以如山之社臣等欣逢盛旦叨領外臺政罔肅於簡花禱徒伸於椒頌遥瞻宸極阻奉觥觩夢聽鈞天霑露恩於春酒對揚休命祝聖壽於南山聖壽節賀表至元十七年八月𥘉二作秋滿皇都荷大駕省方之豫祥歌長發属千齡應運之辰夙旦載逢儀章煥舉㳟惟皇帝陛下聖惟桓撥智足睿臨卑式九圍大開一統爰念盈成之戒毎深覆燾之仁挈彼生民躋于壽域兵刑寢措収帝王之極功基業恢弘光祖宗之丕緒儲此無量之福有來滋至之休繄爾大元於斯爲盛臣䓁叨持使節違逺天威雖微金鑑之輸誠敢後封人之願祝盤銘至再天心享一德之新嵩呼者三聖夀永萬年之筭進瑞芝表皇帝聖㫖裏臣某䓁言於所領汲縣界内今月某曰陶工朱良舎中産土芝一大本者伏以至和大來嘉貺昭應爰念開先之兆聿彰承順之祥臣䓁誠惶誠恐頓首頓首欽惟皇帝陛下政洽慈仁敬事耆舊聖惟廣運惠澤春融德合無疆瑞草英發彤枝曄曄合爲連葉之芳紫蓋煌煌夐出銅池之秀木檽慚稱於弘景郊歌美並於班書以兹玉質之竒特著吾皇之夀適迎誕節恭覩殊姿臣某等無任忻抃慶頌之至謹具表進獻以聞臣某等謹言甲申歲正旦賀表山東憲司伏以齊七政于璣衡統允恊於夏正受四海之圖籍喜大溢於周邦香翻白獸之尊光動黄麾之仗恭惟皇帝陛下叡臨神筭武定文綏體元建極於中天顓任責成於諸相惟德應上天之眷遂運開一統之祥宴錫彤弓畫接玉関之使塵清滄海暖回暘谷之春歷觀往代之規模未見今日之全盛尚軫憂勤之念屢頒寛大之書便民之政以次舉行煩民之事悉令革去廓廓然可謂無事巍巍乎其有成功臣某等幸際鳩辰敢陳椒頌遥下肅雍之拜如臨咫尺之威紫禁縈花夢想鈞天之奏華封獻壽祝同嵩岳之呼如式聖節表伏以氣調玉燭開九秋大有之祥露湛霞觴獻天子萬年之夀賀儀煥舉海㝢同懽中謝恭惟憲天述道仁文義武大光孝皇帝陛下立賢無方從諌弗咈畏服得所臨之道威揚極載績之功平内艱而以義㓕親停遐征而敷文柔逺而又政歸一相事革多門永言夙夜之思大得股肱之助臣某等忝膺郡寄宻邇天顔歌天保以歸休阻陪鴛列罄華封而願祝竊効嵩呼牋千秋莭賀牋至元十八年六月運炎烏火見上天於穆之休一作皇天眷命大開一統之基甲觀呈祥通際誔弥之月帝降玄商適長發其祥之月千秋稱慶四海攸同欽惟皇太子殿下德粹元良道隆純孝允當楚璧歷試堯難未明問寢於龍樓思治望賢於漢苑曰深子爱時御經筵擴推不忍之仁隂作無量之賜而又維持臺憲與振朝綱左右端人圖惟國政雖一事仰資於聖断致兩宫咸得其懽心以兹中外之情顒切撫監之望某等内塵法從外領雄藩恩深少海之波瀾躬侍春坊之劒履玉巵爲夀陪鳯舞於西池鶴禁揚休䓁嵩呼於北闕一作玉巵献酒陪鳯舞於西池宝緒分輝俾壽昌於北極啓上經略史公啓壬子年三月十七日門下王某謹齋沐頓首百拜致啓于經略相公閤下右某言乾坤草昧建諸侯所以濟屯茅土分封惟太人爲能開國仰佐龍飛之運湏資嶽降之賢擬議以言非公孰可洪惟經略相公閤下器兼文武運偶經綸衆惟爲上將之材自任以天下之重攀鱗附鳯早依日月之光捧轂推輪榮受干戈之命萃一門之忠孝兼五路之侯封終始四朝險夷一節仁温温乎冬日氣凛凛乎秋霜内藴一誠外含萬動推而行陣則勇摧大敵歛而康濟則澤𬒳生民顧所遇之如何必其才之相應鷹揚虎視收中原百戰之勲蘭婉芝芬靄漢將千金之譽旣備過人之智故多及物之功綏斯來動斯和存者神過者化紅蓮緑水盡借籌入幕之賔長劔危冠皆扛鼎蒙輪之士謂蟻穴尚干於天討詔龍􅋮暫駐於遐陬旌旗未指於淮壖草水先聲於江左虚懷下士冝平原賔客之三千不戰屈人切充國便冝之十二雖閑暇不忘於武備一周旋悉本乎儒風詩書鞍馬之間談笑風塵之外又且脫屣示譲在人所難當諸郎勝事之初乃一旦奉身而避弃壁而負其于林囬雖近於人情捨巳而與諸人季札蓋存乎教典方慶懸車之樂復承顧命之榮乗騄駟而超天河以腹心而叅廟筭增輝白日叶賛明時力障群隂春囬華夏試手巳安於漢鼎阜民共拂於薰絃柱石之力𥘉不譲於霍嫖姚股肱之貞豈復减於蕭相國而又量容江海利先國家顧所收之邑委以不争蓋先見之明知其有在果屐斗間之紫氣卒收度外之鴻名知其褒有成忠荐膺渥眷復衛邑爲之湯沐豈曰偶然錫康侯至於庻番固所冝也望符興議歡動百城顧兹繈負以偕來寔出恩威之素著僉曰維昔有虎苛之政于今無犬吠之虞一新汚穢之風共沐神明之化出幽谷而遷喬木孰不快哉若大旱之望雲霓徯斯乆矣此共推於公議匪獨出於私心今衛勢據上流土名沃壌衣冠之所出風化之所生柰何民阽死者積年政弊極之有日治期清静無如宰牧之良俗乆浮佻冝審急先之務况仁深改革意切矜怜固非賤子之當陳諒以愚衷之所激伏念某三尺微命一介書生慚非適用之才素負讀書之念無繩以繫白日昔年甘落佩之迁披霧而覩青天今日有彈冠之慶且平昔想聞其風采况終身得爲之主盟爲喜可勝所憂一冩聞風興起已空北海之濵杖䇿來歸獨愧南宫之謁儻預蒙於剪拂庻得免於駑駘所願無他其心止此借齒牙之餘論煦枯槁於寒郷燕麥兎葵尚兾春風之摇蕩䑕肝䖝臂敢逃大冶之鑪爐庻將螢爝之㣲仰賀風雲之末過此以往不知所裁某頓首再拜冒黷尊嚴不勝戰栗之至上姚敬齋啓中綂元年七月六日席生王某謹齋沐頓首再拜致啓于尚書宣撫先生閤下伏審九天頒詔側聞方岳之分臨四海嚮風喜見太平之有自顧惟孱劣曷稱提撕况朝廷方弘治之辰而州縣以得賢爲急湏獲玄德升聞之士可副大人吐握之懐如某者禀性踈愚與人朴直断无它技徒切休心爰自穉年㭙乖庭訓雖讀書郷曲謾攻童子之雕䖝及學道蘇門徒竊孫登之吟嘯因沾餘溢得列諸生然固窮不輟於絃歌念来事可爲者忠孝吾將仕矣未見其人蓋女爲恱巳者容士爲知巳者死俄翰簡光臨於圭竇見先生樂育之素心爲喜可勝所憂一冩何乃至於此蓋有激而云身賤貧而處世無聞跡泥塗而遇知爲貴若夫燕築臺而師郭隗豈天下之無人備奉命而奔孔融所喜世間之有己將摳衣於不曰終瀝膽以謝誠伏惟閤下學際天人林兼文武幾年潜邸一变經筵儀表四方股肱元聖方棊聞捷偉謝安雅量之雍容抗表出師見葛亮忠規之逺大以致佐命收竒功於六詔除殘僨封豕於三秦盪平青海之波濤𥙷就蒼天之日月方聳馬空於兾北首令詔撫於山東杖扶戴白之疲癃春動百城之草木欲隆承流宣化之權故擴并採兼收之路慮一夫之不獲念小子以何堪戴徳若天醻恩無地比遂掃門之役庻堅磨鈍之誠利一割之鈆刀享千金於弊帚翮知短鎩敢圗運海之鵬程言至再三恐辱知人之藻鑑過此以徃未知所裁上張左丞啓中綂元年六月日衛人王某謹齋沐頓首再拜啓事於中書左丞宣撫相公閤下欽聞明詔来鎮雄藩凢在提封咸増慶抃謂天下大綂也尚建侯而不寕𥘉無中外之限方岳至重也惟得賢而俾乂故咨帷幄之臣然念德非盛大不足以填壓夸毗量非弘深不足以包揔細大才非經綸不足以酬事変望非崇髙不足以饜人心恭惟閤下德冨天彛材爲世用望出中朝之勲舊量涵萬頃之汪洋兵濟長江符羊祐抗章之志龍興代邸偉宋昌獨断之能故得雨闢雲開隂消陽長雷霆軀號令之威朝野擴綱維之治繡衣南下寔承流宣化之權齊斧西臨正擿伏破姦之日而今况河朔數路懷衛兩州丗官有晚唐擅據之強風俗近天寳塗炭之苦穢彰隣邑政出多門其爲害也權在吏胥之手賄甘桀點之心敗者能先去之善人者其自存耳以聖求直言之者故愚儒及舊政之非伏念某一介布衣半生文史顧其時之可出念所學之無成北闕上書媿乏馬周之志南山種豆毎懐楊惲之風觀化明時游心至道不求鳴於時相終混跡於常流少得見知侯喜顯名於韓狀如蒙所讀曽點終老於孔門過此以還未知所措授翰林修撰同知制誥兼充國史院編修官謝中書省啓中統二年秋七月廿九日王某謹齋沐頓首百拜奉啓事于中書門下伏以㓜學壯行自吾儒之常事位尊徳薄寔君子之深憂况禁林乃清切之資而自昔極人文之選如某者性資樸魯學術蘼蕪㓜窺篆刻之文稍服鯉庭之訓而蔵修蔑有其素徒佔畢不去其心血指汗顔竊弄柳州斤斧属辝比事略窺左氏門墻頼鶚薦之先容致嚢錐之立見幸遇鴻熈之世来觀上國之光自嗟坎井之蛙日侍幕蓮之地時乏駿足用駑馬以代駿筆悞素屏點蒼蠅而成質方退南飛之鷁重留西掖之垣方筵預使席之榮竹李致舘人之意念朱雲之恥吏哀王孫而進飱顧影自怜捫心有託特以見知之厚遇不無立仗之長鳴苟丐虚名盡光歸路豈意誕膺綸命峻陟文階忝分蓮炬之光得與玉堂之選固不能奮陽城之觀望無乃自郭隗而權輿儘不負十載夜牎燈火之勤足以瞑九原先子之目其榮巳極夫復何求茲蓋伏遇中書相公閤下柱石中朝風雲潜邸羽翼四人之勲業文章兩漢之精華秩乃代天門無弃物父子傳温國之學書史備鄴侯之籖公将權衡彼自爲之髙下信如寒暑卒皆遂於生成豈謂帡幪䕃及蕭艾某敢不勉修士行恪守官箴仰酬雨露之恩俯荅丘山之德蓬蓬運海固敢期九萬里之程碌碌因人庻不在十九人之後過此以往不知所裁謹奉啓事以聞王某頓首再拜青詞齋意旱氣隆蟲歷三時而巳逺守臣惶懼顧大責之難逃輙先榖雨之辰敢罄雩求之懇預期以告於禮則冝祈雨青詞恐懼自修災有可消之理敬誠斯在天無不饗之心伏念臣惲素昧臨民叨承㧾寄毎荷登穣之恵庻寛撫字之憂爰自去秋迄于今嵗風霾蓬勃生意焦枯時疫大興秋種未下氣將交而寒薄雲已合而風醨旣走郡祠載呼洪造恭輸至懇光啓靈壇集道侶於琳宫宣琅凾之真誥伏望九天降監列聖垂慈分勑山川之神普下雷霆之詔風災一返膏潤咸霑使春事無訛喜動四郊之耒秋成有望歌賡髙廩之詩臣無任瞻天望聖激切屏營之至祈雨青詞伏以萬物盈於兩間亭毒必資於帝力皇天祐于一德髙明庻格於精誠比者時雨愆常秋種不下重念無辜之者將罹飢饉之災用是罷將作而㢮土木禁市酤而重餱糧循省自修兾囬哀眷氣將交而寒薄雲旣宻而風醨適當龍見而雩爰致桑林之禱恭延真馭崇建靈壇伏望列聖垂仁九天降鋻易隂陽之恒数斡運化之玄機下勑豊霳霈流甘㴻蘇槁麥於南畒橎嘉榖於東郊一滌昏霾溥含生意豈惟大賫三農免失業之憂嘉與多方髙廪享有年之慶祈雨青詞天地乃萬物父母忍飢饉之荐臻風雨爲一歲咎休顧得失而與應念守臣之不職致春旱以爲灾終風且霾種不入土近雖霑其濡潤終未至於霶𩃱二麥就枯群情懐懼念鰥寡無辜之者有溝􅊤立至之憂旣走郡祠載籲玄造瀝愚衷之至懇建雨部之靈埸伏望真宰鍳臨髙穹隂騭溥同一視之仁大霈如膏之澤興嘉苗於四野際和氣於兩間庻寛轉側之勞共慰徯蘇之望所有報禮其敢後而爲春旱䖝災青詞伏念天聽雖髙惟至誠而能感田功未即繄歲事之可憂敢瀝丹衷仰干玄造兹者自春徂夏時雨愆期荑桑卷而歩屈爲災嘉禾槁而風埃蔽野吏則不德民將何尤非恐懼以自修將藴隆而曷巳爰差榖旦乃建靈壇延致羽流恭修法供應蒼精之昏見兾誠意之孚通伏願列聖垂慈九天降鍳俯回哀眷霈甘澤於一方丕顯神功享豊年於髙廪齋意伏以驕陽恒若時雨未沾嘉禾槁而耕壠如焚歩屈災而春蚕闕食齋心預告於禮攸冝爲張縣尹吉求嗣青詞伏以不孝有三身無後而爲大輸誠儻至天雖髙而聽卑敢瀝丹衷用干玄造伏念臣某一行作吏壯歲當官乆居簿領之間未免輕重之悞或飬志罔終於恃怙或臨民多靳於哀矜以致二子併亡半生惸獨自孽難逃於隂譴隱憂忍及於先人敢資惟恵之仁爱謹籲天之請敬陳清醮上扣髙真伏望大眷垂哀憫孤影零丁之苦維羆應夢廣一門嗣續之傳為郷人禱疾青詞伏以民固多愚匪易天心之感老惟欲逸何堪竪疾之嬰敢以聽卑用伸懇至伏念臣某生居市閧長失義方凡有作為不無過咎或營營以窺利或昧昧以馮生正以貪癡愈深罪釁又縁移徙多所紛更穿掘旣發其蓋蔵修治悞衝其禁忌以致災徴未巳病曰彌留和豫旣乖眠食稍廢捄薬徒爲之瞑眩朝昏遂苦於呻吟伏望上聖垂慈髙真降枯庻憑仁覆得蒙羸劣之安言念愚衷永謹省修之戒秋澗先生大全文集卷第六十八
