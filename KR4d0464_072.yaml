body:
  text: 題跋題遺山手簡後公道存在上者惟恐士之不才公議廢當塗者惟恐士之有才此古今通病必然之理也昔伊川與韓相維遊許昌西湖坐間有以書投韓者程視之蓋干進者也程曰相公亦令人求之耶况爾後乎冝其藩維棘瑣遐想玉堂如在天上也觀此帖者幸不以遺山為疑可也題張嘉貞北嶽碑後余少時喜作擘窠大字嘗書出師表于屋壁房山劉先生過而見之顧謂家府曰毋令輟學後當名家因問余學書覺有進否對曰不知但今日書明日視之有大可惡者又不擇諸人書以余拙視彼善者即默識於心及省書當之必倣其筆勢先生曰此即汝所進也既而出此碑見贈且提誨曰古人書有當玩而必習者有未易學而當玩者吾今以是授若非欲汝師之也俟盡參衆妙立筆後時時玩其意味可也晚年當有所得此帖藏幾三紀未嘗發視仐歲巳丑豫六十有三追憶往事時時取觀覺日有所得乃知房山之言為不妄不然後生愛風華老大即厭之而然歟觀其簡古曠逸𥘉若緩散不收一一視之內方而外圎風骨偉秀殆似夫上簾瞻對鳯鳴朝陽時也前人謂焦山鶴銘乃逸少龍爪書或者謂未若以大辨若訥大巧若拙方之為近似余於嘉貞書亦云唯具眼者當識之因嘆吾老矣技進而道不至是亦所當懼也然張么唐名相今見千丗者止此耳枝雖微固亦有不可廢焉者剪製巳遂題記於後示阿孫鞬郎且使知嗜古者莫書學為重何則先賢手澤在焉故也是夏六月二日秋澗老人記題山谷手簡後文瑞名璋侍御于文瑞奉使江西回以山谷訴哀帖見貺觀者致疑其間豫曉之曰公孝友純至當痛酷摧裂之際意有不在書者此正言不當文之義也若以微瑕而棄連城之壁非余之所敢知也題竹溪詩筆文獻黨公大定間翰墨為天下第一如雪溪黃山輩皆北面師尊之冝其片言隻字為後丗寶藏仰之如泰山云題家藏禱佛帖後顔魯公書氣洞金石精貫白日然得長史心法筆力日進遂集大成公之書可知冝其使長沙比靣髙間終不侔也𥘉藏者平章政事盧豫時蓋自琉璃瓶中協神策者也大元已丑秋七月秋澗老人曽收題左山所書春露堂後余搆春露堂之明年參政左山商公作三大字自燕見遺因刻而榜之吾廬為爛然也公今嵗壽登八秩觀其書端莊婀娜略不見衰老之氣吾喜其所飬至剛非唯書之盡善也公為人雅重深謀其翰墨之工在公為餘事然嗜好之篤營求之切殆飢渴之於飲食只以功業相逼有不遑專事者當急遽際嘗與豫論及津津然喜見顔間不知老之將至日之云夕也方在藩府時以分陜之重橫當事衝至與貙虎相搏者屢矣未嘗見志之衄氣之靡降而少屈規其所不可求避其所不可免者此所謂砥柱頽波迄然而莫傾者也求試其心之所在蓋安命順受而巳既安且順則心乃定心乃定則氣不餒氣不餒則道可以坐進而况枝之云乎醫家有云榮衛可以知人之修短豫亦謂文翰可以卜士君子之盛衰仐觀公書以精神氣𦦨取之是知公之夀考既耆而艾也必矣豈斯文未喪造物者將屬之於公耶於是書以自警至元戊子夏四月十二日謹題題張氏所藏先卋手澤後昔人以長不識父對其畫像輒拜而垂涕張㑦以勞卒軍中子用道痛乎不覩其沒每得其手澤雖片言隻字洞洞焉奉之如恐失墜其於觀行速肖之心為可見矣題時苗留犢圖君子之居官也論其稱與無愧而巳苟能致君澤民雖祿之以萬鐘繫之以千駟將受焉而不辭况巳之所當有乎若苗之事持清而近名矯枉過正者耳然使貪墨畏人者聞夀春之風亦可以少知愧矣此京兆王雲筆也以年深色故因之輔綴頗踈妙意至布置分數尚當與斬蛟圖氣勢兩相髙也戊子夏五月秋澗老人題題自書歸去來后録事參軍丹陽薛君文曜携佳紙見過請余書晉處士陶靖節歸去來辭是日晨氣頗爽在庚伏中難得朝也乘筆墨調利心手相應忽憶往年過曲陽見唐宰相張嘉貞所書北嶽廟歌歌碑不覺行墨以入其體識者莫訝其刻鵠也題郎官石柱記後真生行行生草顚之草至稱之為聖其法蓋先能楷所謂善行而後能走者也郎官石柱記以豫聞見今在丗有三本梁崔氏贈余與平陽曹氏所藏壽國公故物同出一石但未知柳城姚氏所寶者何如耳商左山云正刻舊在京兆兵後淪入公堂址下恐不復出矣汝輩冝珍惜之其姿體端方清徑似出歐虞自成一家少陵云卓立天骨森開張者也至元戊子七月朔秋澗老人記跋蔡襄書後嘗觀心畫水鏡宋一代能書者不少然蘇黃一出爝火難為光矣襄之書在當時極為坡所推重恐是徐行後長之義夢卿好古得於法帖者甚多書學豫非深之者不千里逺來求題評此亦不可曉也秋澗老人題題哀江南賦後示韓陳二生史稱信有文集二十卷行于丗今秖見者此數篇而巳乙卯歲豫得之于沙麓蕭茂先家逮今歲戊子蓋三十四年矣近目疾瞑坐者浹旬二生來問適新是帙令句句詳讀且究其用事非徒然也蓋辭之為體甚多學者不無利鈍于其間汝等文竇方開然有望而未見者故令觀覽欲彼摩其朴鈍發其清新此老夫之意也嗚呼理者性所自出才者氣之所由形中人以上苟得其養性使可復才也者不可強而致也或曰理重才輕取其重而舍其輕可也曰勢有不可偏廢者焉理則體才則用也體與用具然後可以持躬而應物二生其志之跋楊輔之墨梅後花光梅在前宋為第一賞之者至有買船來住之語及輔之一出變苦硬為秀潤曽觀春風雪溪二圗者乃知豫言為不妄一有自題云日移清影人立黃昏其用意不分固巳神疑于此君矣昭陵六駿圖後序物之賢否一定論其遇不遇可也昭陵六駿天降毛龍授之英主俾剪隋亂及其功成琢石為像太宗親題真贊以傳不朽何存殁遭遇其為幸也如此冝其聲華氣艷上與房駟爭光故潼關之役備體渙汗又何神哉如昭烈之的盧冉閔之朱龍名雖存而形何見焉大史公稱閭閻之人雖砥行立名非附青雲之士惡能施于后丗者是巳豫藏此圖久矣特妝潢以備珍玩因題品卷末以寓余之所感云書送鄭尚書序後韓柳文多同時相顧而作如送鄭權序饗軍堂記之類是也筆勢翩翩若相陵跨者柳之記間架曲折宏深雅麗出竒無窮然不過崇洽閈閎饗燕軍容之盛而巳序之為文才五百餘字雖云後出詞氣絶勝令人讀之抵一部嶺南方志覺海氣拂拂來逼人矣其終篇致意最妙專以貴而能貧仁而不冨為主委曲謀猷之壯從容針戒之深誠有關於嶺徼之治亂為尚書權之藥石也近年某官有奉使句麗煩於乞索者至為東人易而傷體信乎貪而無威微而無經術者不可以華逺而寄邊方重命嗚呼公之斯文曰經丗柔逺之長䇿可也作之明年公卒在諸文極為老筆又見其氣之至耄不少衰也如此韓生因説有問特書此以示戊子冬十一月十日也跋蔡蕭間醉書風簷梨雪瑞香樂府二篇贈王尚書無競王後有跋語小楷數十字極妍徑可愛樂府尚豪華然非紈綺中人未免鄰女效顰耳明秀一集以崇髙之餘發而為詞章如飲內府酒金沙霧散六府為之醺酣方之逢麴車而口流涎者固有間矣跋竹溪所書墨苑篇後東坡先生百丗髙士至自跨竈作墨得佳者數百九顧之而笑曰足供吾一丗著書及煤發焚舍乃巳冝其竹溪為墨苑作書而不猒所謂子雲相如同工異曲也薛紹彭臨魯公座位帖後魯公此帖純是一假折魚軍容直氣知此然後可以論書之法度耳書南麓珍翰後龍岩書在顔坡之間然未免有癡絶處此帖殊靖徑可愛豈得意時書邪跋黃華煙江歸艇圖先生當明昌間以文彩風流照映玉堂仐觀此畫所謂金鑣野鹿志在長林豐草也跋間間公草書心經般若經前後文辭重復公書之字字姿態不同所謂堂堂天陳臨機制變出竒無窮者也錦峯真逸王仲元清卿書錦峯書意韻瀟散不減古人但前有黃山後有間間公故公之墨妙掩而不彰丗稱士之得名有幸不幸者豈其然乎跋黃華老人二詩后觀公手迹多矣此幅恐是早年所作然澗松出士巳有凌雲之氣識者自當知之跋龐才卿悲潼關賦後此賦都運龐才卿所作其步驟全類思子臺賦意則擴充潼關甲辭字畫瀟散有法出顔蘇之間前丗士大夫學藝精妙如此豈勝歎慕評楊凝式書楊凝式書維摩等經説皆作行體大字瓌竒豪邁瀟散中寓正筆左山云魯公後惟少師能得二王之法所謂文起八代之衰也坡公行書大槩類此至元草年四月𥘉五日過辭左山獲觀於座所論如此其王文荆公論云公書不曵之以就長蹴之以就短云題元楊手書後卷中諸公皆一時名勝先生爼豆其間諸賢樂與遊者其以道義故也余早嵗讀書蘇門尚及見之歲時以文酒吟詠於山水間彬彬然極平時故家風味不知軒冕為何物孰謂三十年後文物夌替而至於斯拊卷援毫豈勝慨慕至元癸未嵗𬎼賔日謹題跋自書訓儉文後文正公平昔著述純粹深切其有輔世教如菽粟之於飲食可斯須離哉後人傳誦敬仰冝矣德昻茂異喜讀書善居室屬余書斯文將置諸坐右取為修齊矜式所謂儉者德之共也故樂為筆之𥘉不計其工拙也跋羅謙甫醫辨後容齋述醫論二篇求豫書將板行以證俗之訛謬因念丗之物理流傳失正漸習成風無復革易者多矣較其所係重者莫醫若也謙甫心存濟物明當然之理不為流浴所移固自可尚又使藥石亂投之禍日有所弭其於丗豈小輔哉所謂砥柱中流回狂瀾於既倒也故樂為筆之跋紫絲靸鞋帖後紫絲鞋帖四十六字二十年癸未夏借觀於張條山家昔公書太宗送梨帖後云珠還合浦劒入延平蓋自謂也此帖雖遒婉可愛然筆虛墨嫩九淵之神宜躍而沕恐臨本也觀者自當識之跋摹馬圗書與畫同一閧紐昔人謂學書者苟非自得雖奪真妙墨終為奴書余於畫亦然題所臨顔魯公十帖後大名楊君順之家藏劉元剛嘉定間忠義堂所刻魯公書草一帖豫擇其大小尤精者臨一十紙近在京師入翰林復觀顔碑十餘本皆所未見也又與左山商公論其平生所得於公書者數焉一日覺􅎍中頓有所悟及南歸取向所臨裴將軍等帖觀之當時凝神筆端非不玉汝奈非其人而學不至何譬如以美石追琢瑚璉則不可也癸未歲夏六月入伏前二日大雨淋浪五晝夜不止開窗隱几坐見舍東積潦展觀此帖偶為題其後云字程氏小子癸未夏四月僕還自京師道出梁臺蜀士程天驥自云伊川先生之遣裔有子方黃携而拜豫因求其小字乃訓之曰伊傳嗚呼小子其念之哉跋樗軒壽安宫賦西園雜詩後余生長汴梁八歲而北渡河當時風物有能記憶者但如隔丗夢寐中見尓及讀如庵西園雜詩何殊趙家老樹遺臺令人對之有足悲者故孫樵雜報云生恨不為承平時人良有以哉收卷奉還題其後漢文翁講室畫像余讀漢魏五書云成都有漢文翁髙朕石室壁間刻三皇五帝以來聖賢畫像蜀太守張收筆也收獻帝時人近過劉氏家孰遂獲其本蓋自盤古氏以下至仲尼七十弟子百一十三人畫極精妙簡古經千有餘歲無絲髮剝壤非神物護持疇克爾邪後有東坡所臨王逸少欲摹帖氣韻豪逸有顔魯公風格再四展觀悚然起敬令人有振纓希古之想真竒迹也書劉氏屋柱至元甲申夏四月余自泰安平隂東阿撿覆桑災而西赤日黃塵中馳六百餘里忽得此屋休蔭車怠馬煩之意為釋然也主壻劉澤克家有禮且云此屋甫成未經寢處而公至可謂彈壓瘴氣矣又説婦翁張學臨終戒作佛事以多誦孝經為囑不圗田野間有此端士重午後二曰過此跋坡公春寒帖茶使分寧李君踵門來謁坐定出春寒帖相示願一言為審定余曰昔坡公在館閣時每作一石一竹淨為好事者取去况詞翰乎所謂良金美玉自有定價尚何言子歸而潛珍東緑吾將見燁然之光不唯在惠州李氏矣龍門寺題名余聞龍門久矣嘗讀故相雲叟公題名風煙形勝盡在目中終以不得一往為曠今嵗冬適諸君以事會共遂成此逰相與分雲尋壡攀水隮危抵懸瀑下少焉環坐磐石盡一尊而去凡得詩一十一首偕來者判官李讓州將劉民望陳州長李公惠前憲臺獄丞梁平州學正張賁士人程翼蔡州吏目薛丗英郡人徐英時至元乙酉冬仲望日也跋鹿庵書玉華宫詩後鹿庵書氣韻滿散嘗疑出焦山鶴銘一日問筆法於先生曰平昔於沙河碑致力為多今觀此帖一一較之其瘦健清拔蓋以廣平作骨而取真逸為竒放也跋米元暉書元暉書類王謝子弟以當家論之暗中模索知為人豪然其間時有圎轉藏鋒處豈厭家雞而欲斂乃翁之掉率邪跋虞丗南十二大字虞永興書攀鱗附田異十二大字丗皆以雄偉稱之石刻墨本凡兩見之豫特愛其結密無間由智永小楷擴而充之至於如此之極且見夫落筆不難也因悟蔡京書太學首善儀門昊天大帝之類其法度一出於此今夕而有一舉兩得之佒於是乎書題耶律公手書濟源詩後物之有光華者雖微必著况文章翰墨之卓越乎近觀故中書令耶律公當壬辰歲過濟瀆留題詩翰逮今歲龍集適一甲子其孫希逸始托揔尹靳榮俾刻石祠下屬豫題數語于後余曰事之顯伏雖數存其間至後大前光在後人固當如是所可敬而仰者玉泉老仙於灑景同翻經綸致澤之餘復發為文章翰墨鏗然而金石振巍然而冠劔植表裏國華鼓舞元化為丗倚重巳見惡盈好謙恬然靜退之心故賡和樂天詩韻為恱無乃魏公醉白之意歟俾來者觀咏將有擊節嘆賞挹髙風而跋絶塵者矣又何翅紀嵗月而傳不朽者哉題臨潛珍銘後潛珍閣銘坡公渡海北為李光道書於曲江當時真迹入石為龍潭絶勝逮淳祐乙巳東嘉趙汝馭求訪百至巳不復得惜哉今所傳者蓋漢中石刻濮之板本再一傳也此則以濮本較之迫視筆勢往往有形似者豈踐其迹庶入室之意歟然龍為神物唯劉纍乃能優之或者輒攀鱗進技其氣亦可尚也至元壬辰後六月廉訪任居携以示豫曰此李安仁所藏也幸吾子題數語于後故書題山谷苦筍賦帖後臨安漕副喬仲山豫為御史時臺小吏也庚寅冬南行遺杭仲山以是帖贐豫或有以真贋為問者豫曰𥘉未嘗經意唯其無心於得渠無求而見贈取與兩間皆出自然若有不為嗜好所玩者故喜為收之至於書之真贋君其問諸墨卿跋朱文公手書子所見手迹十餘番皆老筆也公何嘗以書學名家只以道義精華之氣混混灝灝自理窟中流出一旦揮灑有不期然而然者未易以翰墨畛畦論也前人稱孔明出師表秪見性情不見文字豫於公書亦云題杜仲正省掾家世卷後先師泌陽府君河中人應進士時石公子堅同舍生也且蒲當秦晉之郊其河山之勝樓觀之冨甲天下而文物之盛如金吾李氏昆季及公皆極一時之選豫嘗三走中條登髙望逺追惟師之遺言思其人而不見徒有永言慨慕之歎去年冬豫持節同閩有杜君仲正來謁蓋公之甥也與之語誾誾侃侃願有餘而辝甚雅因念豫兒時耳公之名閲五十寒暑始識其甥於甌閩越絶之徼所謂老成雖逺典刑得見于茲一日携雷苦齋所述示豫且求訓勵數語于後豫謂今之士夫思其大而略其細知其雅而不通其俗此大夫士之通患曽不思親其細所以全其大也通其俗所以尊其雅也今吾子含香佩棠所治者皆簿書期會米鹽瑣屑之務而能終日黽勉無倦色安知開封府推異時不至忠獻禮絶之地乎跋郭熙山水巨軸崔生有畫二軸不見題志中隱云此郭熙筆也信當行茲能事熙無疑但立名不正物不得順受所謂山亭避暑者余易之曰江煙晚浦崔抱歸志甚揚也然坐而論道謂之王公作而行之謂之士大夫今降而嗜此以為髙且多識雖屢中何足道哉跋顔魯公裴將軍帖此帖豫見者數本皆大小不同獨忠義堂刻臨摹最善蓋純以隸體發其竒特尓至於詩格雄偉壯麗比之清逺等作又何翅十倍曹丕也贈師御史彥貞名頥丗固有難事惟篤好者即能之况氣志清明者乎御史師君彥貞世為瀚海府人姿英毅逹時應務乃其所長復於公餘以吟咏自樂積而至十數篇非好之篤其克如是耶因求一言見誨子謂詩固一藝心之聲言之至文者也作之者譬猶良工就利器雖有棠溪之金須百錬乃得其精如吾御史君氣不凡意竇方啓能敏修不巳將見與日新之業並驅而前至綴聮雲煙撑霆裂月恐不難矣立夏後十日謹題書歸去來偶題于後古今聞人例善於辭而克行之者鮮踐其所言能始終而不易者其惟淵明乎此所以髙於千古人也僕今年六十有五衰病相仍越在絶域終日役役疲於官守雖云微勞事有無如何者因書此辭不覺慨歎者久之跋蘇子美千文帖長史顛草點畫略具意度巳足子美迫近之此帖豪放飛動所謂筆陳堂堂者乎歐公於本朝書獨取蘇蔡三人非虛言也周越輩安得窺其籓籬哉趙生其寶藏之至元庚寅八月謹題跋拙翁桃華春水圖南華云相拘相沫不若相忘於江湖此正圉圉相忘時也但恐馮歡輩見之即垂涎耳庚寅秋題於西寺跋文公與子晉伯謨二帖建安諸公往往以文公翰墨賜觀視之皆非也此二帖母君希悅所藏其為真迹無疑所謂剛健含婀娜玉德而溫栗者也因知前書皆邑人江春山效顰豫特表而出之惡紫之亂朱也至元庚寅九月二十八日夜漏下卅二刻既寤不能寐起書於府集思堂之燭下斂祍題題三河驛壁余回自海徼暑毒之氣至此方作眩臥於舟中者一伏時蓋以閩中氣節不常水土殊異宦遊之士鮮有不病而歸者因念孔孟之道能治心而不治病倉扁之術治病而不治心安得合而為一俾治南方不治之病庶乎其有瘳者余言雖鄙庶有關于丗教故書至元庚寅冬十月十有七日題於三河驛壁尚聞者知所警答戴生余來官南越凡十有一月戴生叔堅者閩産也以詩文來謁且言其志久乃見其為人叔均有嵗寒姿扣之所學外又通熟吏事時居間日久思以三釡侍親義形于色豫告之曰行與止有數存其間者此心不匱則棒檄之喜其來之不逺也傳有之居則曰人不我知如或知爾則何以哉蓋言其學之不可不積行之不可不卓也戴生其勉旃晦翁墨迹紫陽先生手探月窟足躡天根𥘉非欲書名家唯其道義之氣蔥蔥欎欎散於文字間者不得不如是耳傳曰愛其人愛及屋上烏况先生之手澤乎韓生其寶藏之跋香林先生顛草嘗愛甘露寺詩草聖筆勢縱橫破碎陳敵今觀香林先生遺墨得涪翁步驟為多具眼者當知余言為不妄跋黃華書後昔黃華老仙方書翰得名求之者衆日不暇給張丹華家慞善於刻鵠公時命代書至真贋莫辨此又張奴之重胎者也東坡開葑帖後語此借船一帖耳今人讀之聳然有趍事赴功之意當時民説忘勞槩可知巳使公得坐廟堂釐衆務文致太平為不難矣題米南宫帖後今日客有自河朔山東來者聞時雨霑足蠶麥有望適師孟携此卷相過臨風展玩沾沾然有三安之喜不然奚暇及此且將為質錢慱米之具耳跋禊飲序後兩晉法書李唐詩騷宋人之論議天機所到有不可企及者獨韓子以右軍書嫵媚可傳鶂鶂而已其立論峻絶不詭隨如是亦可愕眙然豫綿歷丗故以來士大夫所繫非輕不爾安能有立于丗區區遊藝巳是末學令就末以泥其不必者竟何為哉至元癸巳四月豫入院後五日師孟持此卷堅求跋尾因信筆及此書商司業定武蘭亭本後書學自是吾儕一假妙韻昔先正商公善書而深識客至多談是為樂娓娓忘倦公今己矣言復得聞邪去嵗冬豫載入京師與台符司業時會愛其議論操守識鑒書翰得家法為多如考定定武拓本辨論隱顯是否真贋幾數百言截斷衆流會歸其極豫擊節嘆賞何其該且洽也然暗中摸索知為人豪者𥘉不在是丗家子弟當門户焜耀鮮不以丗味務快一時商子曽有是乎及其順受厄窮以理自信卓爾有立於顛沛流離之際吾胸中耿耿者曽不少挫是則商之最起豫者故特表而出之使丗知夫寥寥千載下殷士膚敏者蓋有人焉不只以技進而巳耳適佳客在坐聞豫言皆唯之而去因書卷尾以還跋馬左丞所藏貫休羅漢後時子卿有未疾不出昔梁直閣將軍張僧繇𥘉作繪事貌天竺二僧侯景之亂剖裂為二一失所在其一後為唐常侍陸堅所得及堅病亟所藏僧見夢曰吾有同侣今在洛陽李氏能求而合之當以法力護尓平復陸如其言訪之果驗遂以錢數萬贖歸陸疾隨愈嗚呼凝思之妙通於神明顯諸隂佑者如是此盡云僧貫筆貫平生專藝在唐一代亦號精絶能敬禮有加安知不同繇僧通靈時出光怪而致主人勿藥之喜邪嵗癸已夏四月題秋澗先生大全文集卷第七十二
