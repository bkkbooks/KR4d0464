body:
  text: 七言絶句華嶽廟留題朝來松檜重煙霏仰靣蓮峯翠撲衣自笑愛山心不足日斜猶未駐征騑祠前喬木老輪囷閲盡長安道上人千古倚空仙掌在好為回首障兵塵蓮峯卓拔見雄尊干劫孤撑碧玉盆總被少陵收拾却諸山羅列似兒孫乖崖一出著髙勳回首猶慙華頂雲應笑豹林种處士擬將虛譽售時君東登岱頂雪彌空上徹中封似不逢應喜此行何豁敞青天白日對三峯渡渭有感當年尚父欲誰親八十西來釣渭濱馬上行人應未老莫教虛負百年身秦亡漢起兩悠悠總把興亡入海流汀樹岸花三百曲煙波都屬釣魚舟安邑道中六合雲蒸一氣埋際空秋稼委枯荄馬頭赤日疑無色望際青林兩氣來洪洞道中望霍嶽諸峯老澗灣環兩翼分一川草木氣如薰土人更説山靈異欲雨先占霧頂雲留題霍嶽喜遂平時景霍心適逢嚴祀一登臨感通固愧潮陽筆霧雨重開萬壑隂山腰明霽靜煙霏嶽頂雲𪷟淡欲飛岩壑似供詩筆健法身都挂六銖衣題豫讓橋死堅鐡石表孤忠一水曽蟠萬丈虹太史注書隨俠例豈知風義本無同過益昌橋盤盤危磴轉山腰下瞰長河漲怒濤霍邑南邊趙城北滿頭風雨過昌橋霍州四雍中坳一豢牢快心唯有霍山髙一條彘水從中過日夜隔城聞怒號跋范蠡歸湖圖霸越髙勳土苴如五湖歸隱號陶朱扁舟共載西施去却恐時人是厚誣題趙城縣環翠亭秀色四圍供坐嘯山城終歲早休衙陂塘清淺知秧稻畒嶺橫縱看藝麻簡城南北幾經還赤日紅塵赭背顔歘得解鞍心適喜暫容髙卧對東山趙城道中早發積雨睛來露氣餘風枝成滴草垂珠麻衣半濕溪邉路長記郊原五月居跋米元章蘆鴈圖西風萬里下衡陽水宿雲飛固自雙似為呌群心事苦不教相映睡秋江煙渚潮空退暮沙依稀寒影落蒹葭何人解化雙飛翼拍拍隨君問使華甲戍歲門帖子全家恩飽荷恩榮闔郡清寧歲屢登蟣蝨小臣何所報一公之外百無能不求冨有金成穴不羡官榮曰九遷但願時和身健在大家無事過今年庖舍門帖子王家供具乳蒸豚石氏庖厨蠟代薪二者侈荒何足論一簞顔巷世歸仁山市晴嵐墟落人家半夕暉太行天上倚煙霏喚回二十年前夢共伯城西載酒歸古柏寒鴉亂鴉蒼柏晚相依流水孤村句未竒佮似首陽祠下看夕光翻影上枯枝松蔭寒泉坐蔭髯龍夢已醒更堪幽谷亂泉聲遙知緑綺相逢夜幽思中含太古情雲竇飛湍千丈懸淙落碧霄百岩回望冷瀟瀟若為借得天瓢手傾向人間救旱苗蒲中十詠為巖卿師君賦并序中條山水雄秀照映河華豫兩年以事扺蒲略獲遊賞然雲煙勝槩旦夕不去其懷嘗思以數語道其髣佛心在而未暇也至元十年秋九月蒲人師巖卿拉王國器李仲和張師諸人携酒過門杯數行袖出錦囊巨軸曰此河中十詠也因徴詩於不肖逮明年甲戍正月辛巳豫以微恙閉閣少休隱几瞑坐神與境會既覺晴日滿窗幽思發越眷焉十題卒然而就顧不足發山水之清音聊以移方寸而外形骸也且為四老人一盧胡云蒲津晚渡落日西風送棹謳行人無數立沙頭君看一葉顚危甚苦不忙時且少休舜殿薰風巖廊瀟灑壓城闉解愠歌殘又幾秦一道殿簷涼似水至今猶有夢華人虞坂曉發雞聲茅店月微茫山逺行人促曉裝良驥虺隤身自健不須拭目認絲楊首陽晴雪前冬兩拜首陽祠野雪搖光晚霽時蒼柏滿山人欲去亂鴉翻影上枯枝鸛雀波聲洶洶河流入斷山馮夷無力障狂瀾乘風破浪他年事且挽清雄上筆端東林夜雨瀟瀟風雨暗秋山聲滿踈林萬珮環拂曉開門看晴霽白雲依舊伴僧間林亭夜月大內扶君不見人野煙碧樹總傷神應憐一片林亭月曽照司空泪滿巾王官飛湍石竇懸流雪練飛夜深和月映松扉恨豫不遇貽溪老一笑山間説化機西巖疊巘東山如髻鬱重重人倚栖巖第一峯似是晚煙開畫幛濃揮淡抹鬪丰容媯汭夕陽溪痕春漲碧迢迢一帶斜陽映野橋風土亦涵釐降意野花如靨點裙腰贈寫真賈生氣貌昻藏野鶴姿賈生模寫有餘師情知不入麒麟畫剛為天朝飾羽儀寄李𥙿卿山中風日淡無輝山下騰光欲爍衣辛苦南州李從事三年其奈肉山肥交遊過眼日紛紛故舊如君有幾人岸幘一樽蕭寺月此回談笑更情真過橫望嶺終日山行不厭山出山聊喜慰衰顔朝來橫望開頭路滿意風煙看洛川澤潞即事雜詩一十首醲恩三接無旬浹春日春衣未足多沙上歸來聞好語誓殫忠力更無他裴翁祠晚夕陽催野色橫川組練回我數固多多已辦不愁歸路碧崔嵬自古徒兵澤潞雄選齊尤見四州公堂堂氣與聲聲壯閃閃旗翻日腳紅獵獵清風偃斾聲南風不競此先徵朝耒小試青油底一鼓仍驚氣倍增闐闐風外鼓聲乾小隧紅牙入細看自古中原雄莫敵麟符準到漢家壇萬命安危一將懸成功端在得人先長江儘飲天山馬莭制應須閫外顓角聲催日上牙城白羽風清坐閲兵盾鼻恐煩磨檄墨莫教華髮等間生一檄風馳萬有降天兵開國古無雙寄聲璧月瓊枝客鐡鎖休誇一葦江結束征𫀆總白丁淮隂一將便橫行瀟條此意千年後正賴桓文節制明嗚嗚殘角過三吹整整魚麗待一揮曉涼更覺軍容肅露濕朱旗月滿衣太嶺道中泉眼并雜詩路長坡峻一層層六月行人困鬱蒸多謝山靈解煩暍一泓澄徹冷於冰來路蒼蒼不可尋山風吹馬下遙岑望中斜日行雲掩逺嶺橫分一半隂長松磊落不凡材風拂煙霏畫障開端似髙人在嵓壑苦嫌塵土不歸來千古雄藩入控連瀟瀟旌斾莫愁邊最憐天壤清涼界欲買西山二須田潞州為太行清涼境界太行南走百山門岡勢回環淺作盆瀟灑緑隂臺館靜平時尤見使君尊過遊仙李節使墳大定明昌五十年當時人物玉堂仙朝來書案山前路瞥見堂封一慨然遊青蓮寺上方層閣倚晴煙回合諸峯聳碧蓮午枕不容詩夢就天風吹雨下危巔山間一雨衆壑澮轉石砰崖聲若雷殆似山靈詫清駃夜深還到枕邊來夜過關嶺山晝鎖壷關戰氣昏自環長塹作孤豚紛紛彼校何為者愧煞新聲欲死言夏縣一縣隂隂夏木清大賢司馬小賢城河山依舊英靈在重為生賢作國禎虞鄉道中長纓風笠葛衣踈裝就唐人早發圖只有才情渾不似馬頭吟久却成無猗頓道中玉繩西轉啓明東熱擁長途似火攻辛苦平陽王判府三年三伏走蒲中跋蘭昌宫圖宫斜春草暗驪陽花底春雲覆苑墻匆覩翠罌銀勺事丗間疑有返魂香乙亥歲門帖子三年判府𥘉無輔一寸孤衷老謾丹最喜元正即春節併將和氣到門闌李潛宛馬圗李生鞍馬見金𥘉倣像殊方職貢圗今去玉門途萬里總隨鞭䇿入長驅丙相問牛圗牛來近地暑光微深愧調元相業非後丗幾人能辨此濘車甘受野人譏用宰相楊再思閉坊門禳水會事謝太傳東山圖金黎陽李公泰筆鳯沼春間湛緑波未容絲竹醉嵓阿儘能經濟蒼生了七寶裝嚴未是過秦兵一掃兩淮清桓氏微來晉鼎平况復中年正多感未妨雲壑寄髙情四皓圗事定歸來舊隱深皎然松雪映雲林寥寥髙誼千年後似覺元之最賞音先生莭義重丘山冠珮遙瞻漢嗣安莫以隱淪忘丗論一身歸潔何難苦諌臣通巳謾為一書光動紫巖芝後人只説安劉重不道留侯䇿更竒顯宗墨竹離離香粉淡爭妍莫作荒寒景趣看絶似承華宫檻畔春風和露濕闌干一枝蒼雪映遼江滿意春煙鎖建章監國撫軍仁孝在不應遊藝較蕭郎雲溪先生畫像大定明昌五十年聲明文物出中天畫圗一識雲溪老耆舊風流墮眼前訪京師故里四紀光隂黍一炊重尋陳迹巳都迷百年風樹悲涼底更遣朱衣問碧雞秋夕早起鏡裏顔蒼鬢雪如憂心中夜轉民區開門看雨驚連夕堂下秋蘭恐半蕪聞方響時過一苐宅丁東鏗戞碎璆琳掩盡朱絃窈眇音花外粉墻遮不斷珮環清徹洞房深壬申門帖子任運喜尋蕭逺論廣騷慵擬楚人辭里兒莫訝三冬蟄一寸丹心用有時題王仲通二友亭治葉倡條占好春轉頭紅雨委芳塵歲寒伴我初心在二友歸來是故人得失之間勢利交脅肩何翅夏晆勞淡交自得志言友醉眼螟蛉視二豪此君髙莭對髯龍雪壓霜封傲睨同不羡杏梢春意閙等間開謝是東風酒蠅閧集霑餘瀝火鼠潛趍媚竈炎誰似歲寒亭上客儘將冰雪澡吾廉老眼相看十五年青青節操貫時賢自憐蒲柳非真質兩鬢秋風久颯然題卜隱王君手軸洛陽織畚王丞相異事驚逢少室翁我試問渠曽見否太平天子夢非熊百年人事有乖通萬彚流形本不同付與君平都一笑滿簾紅日落花風大易幾微得最神闖懷隂穽失崖垠坡仙有句堪書贈醉裏微言更近真有命何嘗論智愚班超傭筆衛青奴一從遇著客間氣胸中一點無學術源同有淺深如君龜䇿入幽尋自憐一片靈臺月才並明時𬒳物侵題松隂訪古圗舟橫逺水翻蘭棹人倚長林諷楚詞却憶來河南畔路松岡晴雪晚遊時豫壬申冬大雪后曾謁司馬相公墳故云春雲出谷圗岫雲𥘉出豈無心擬向人間作傳霖萬壑忽為風散去卷舒應見本空隂看雲曽上太山巔淡抹空𪷟總自然似慰幽人怡説意故縈林壑弄春妍牧牛圗車邉起飯歌何烈角畔橫書丗謾驚何似短僮無所識夕陽村落見升平溪橋風雨圖前溪才渡又危橋風雨行人已倦勞更著客心孤逈處逺煙明滅寺樓髙跋後唐莊宗按樂圖王業艱難百戰開洛宫春色醉瑶臺那知兩部仙韶樂總是君王火葬材紅雲香暖翠屏間橫玉聲清內殿寒誰道畫師無逺意丹青應見守成難群鶻古柏圗振翮蒼巔控老拳霜空利不隔秋煙料應攫裂修蛇後相與朋來一砉然書夢中語春雲容與春隂輕杏梢點紅楊柳青人在畫樓斜照外秋干臨水影亭亭春江獨釣圖前金平陽人孫子安筆十三科皆工渺渺春江碧若空一絲斜裊釣壇風冨春莫擬幽棲穩巳在君王物色中峴山秋晚圖春風漢水大堤平雲靜譙樓峴首青千古愴懷羊太傳幾時親酹玉雙瓶伐石東岡得小山一株雙峯並秀若夏雲突元者因命曰湧雲僉謂名之甚稱作詩之坤靈凝秀幾千春一日佳名號湧雲淡僻性便雖老在自挑沙礫看竒文孟光捧按圖為申主簿受之賦噫歌裏動晨炊一敬還驚按等厝想得主人茅宇下肅雍形出二南詩具門煙暖褐衣輕舂賃中間見本情豪蕩阿戎那解此夢回青瑣得卿卿稠禪解虎圖宋均政異於莵去魯宰風行野雉馴誰為碧嵓方外客等間藜杖也通神楞嚴堆案滿凝塵山下間來解虎紛千古阿師公案在寶香燻徹百嵓雲乙亥重九日客臺鄉板橋里滿川煙雨對南山冷浥重嵓細菊班不著白衣携酒至卧瞻衡字已開顔無人對菊情逾逺有酒盈樽意倦斟十日板橋田舍底似教平子遂𥘉心依依墟落俯山郊雨濕炊煙覆屋茆一夜秋風翻木葉露巢髙下見林梢瀟瀟山雨暮寒生漠漠青林宿靄橫把菊珮萸俱寂寞卧聽簷溜走湍聲一官殆為公田秫塊坐渾疑野老禪我喜靜中觀物化鹿臺風景似斜川疊巘相連老雨昏秋香狼藉擁籬根野情本與漁樵熟共席來傾老瓦盆百年悲感登臺社四座驚看落帽嘉野鳥送歌人勸酒閉門風雨醉山家山中佳節欲何酬醉裏間書醒不休共著一樽相慰藉李卿申子兩江州讀易龕即事朅來採石事間關却得幽潛兩月間準擬後人重到此指名王子讀書山十三年四月十九日待中渡泛泛輕航破浪花春風自信動檣牙不煩更擊中流楫六合澄清到一家宿開封後署拂拭殘碑覽德輝千年包范見留題驚烏繞匝中庭柏猶畏霜威不敢棲許昌道中望三封山大河失險已無金不待鈞臺一雪深十萬選鋒同日死西風吹恨滿遙岑跋松風醉歸圖南陽修端卿藏不向東華踏軟紅夢歸丘􅊤灑松風夜深健到山間石吹萬從渠總不同危行危言到兩難炎涼時事旋相看放教兩耳秋風裏待與髯龍約歲寒題煙江疊障圖楚水吳山萬里秋風帆吹飽北來舟應憐滿眼新亭客空對江山雙淚流江上晴嵐萬疊山幾緣亡國帶愁顔而今一統無南北滿意風煙送往還昆陽道中同陳莭齋考試河南官事無涯有限身拚教赤日走紅塵十年薄宦﨑嶇裏笑煞羲皇向上人朝趍長路暮郵亭遠自南陽到洛亰馬上唱酬三百里宦遊無似此回情路氏子榮飬堂遺羹親拜封人廟戲彩重登路子堂二事半生俱不遂看雲凄斷蓼莪章退思亭詩卷退食歸來靜掩扉比量心事到精微今年京洛重相值一話能知五十非滿壷清醑薦柔毛一尺甘膏遍洛郊總道使君誠意格至今歌頌滿衡茅拜狄梁公祠下取日虞淵力儘多洗光重照舊山河雄忠貶入周人列似覺文公立法苛京西道中漢家綿蕝要齋郎見説趍程舉子忙一道緑槐梁苑樹輕花也學十分黃怨笛落江梅鏡裏青鸞怨獨棲月邊踈影伴橫吹誰憐一曲春閨思箇裏幽香是素知柏鄉光武廟上谷兵威突騎良風塵河朔入披攘蒼涼鄗邑祠前月曽照君王萬歲觴臨制亡疑見理明治隆三代所由行竟從讖緯論邦計地下桓卿恨未平宫武當年兩虎臣丹青千古照麒麟十年紫禁煙花底判府歸來恐笑人麥飯蕪蔞誓不忘肯教大樹日蒼涼竭忠竟得來吳輩何慮蜀蛙不井亡山行雜詩川隔寒山日上遲槲林平抹霧煙齊晚涼貪趂征驂健却西山四五題亂山合沓四圍青行近星軺路漸平大約太行吾肺腹一重一掩總天成入山不比出山寬回轉青林路詰盤曉色漸分煙店近范寬圗上記曽看太行元氣老洪𪷟草樹風前帶潤容山色只冝差逺看近移空翠上髙峯西來遊宦半忙間六日迢遙道路間回轉羊腸三百里天教馬上飽看山入雲蒼嶺望中賖石徑蜿蜒走白蛇見説碧峯爭秀麗不愁車馬下狼車過山陽縣題七賢祠不到山陽二十年黃壚空瑣竹林煙盧胡笑煞嵇劉輩又向西山著祖鞭七賢來為此君遊終歲相看散百憂却為歲寒貞蓈在十年憔悴伴人愁時竹禁嚴故云山行雜詩門前流水屋頭山馬上行人畫葉間清化許梁三十里只除天許此中間錦窠蓮炬竟虗聞五馬西來忝幕賔似為愛山緑分重著詩模寫太行真過濯漉城麗不愁車馬下狼車過山陽縣題七賢祠不到山陽二十年黃壚空瑣竹林煙盧胡笑煞嵇劉輩又向西山著祖鞭七賢來為此君遊終歲相看散百憂却為歲寒貞蓈在十年憔悴伴人愁時竹禁嚴故云山行雜詩門前流水屋頭山馬上行人畫葉間清化許梁三十里只除天許此中間錦窠蓮炬竟虗聞五馬西來忝幕賔似為愛山緑分重著詩模寫太行真過濯漉城炎漢淪精到此灰獻皇空使後人哀篡成不獨曹罪須信桓靈是禍胎路入蕪城漲麥雲獻靈千古廟猶存一杯誰著濁漳水少為征西酹餒魂題馬坊久遊都邑無明略出判名藩愧不才忽得解鞍俱忘却一聲幽鳥竹邊來題山陽七賢祠黃塵換盡豸冠霜薄宦驅人救火忙一勺七賢祠下水療飢猶勝食官倉山行雜詩山下良田苦不多耕來山頂作旋螺薰風五月燕南道千里黃雲際兩河唐叔虞廟巍然遺廟枕城崖霸業桓桓自此開剗地不銷昭伯血瓜分何為出公哀潞公亭唐都東望故城荒澮水翔山半多陽前日潞公遺愛在至今亭構比甘棠陽城道中兩極坡長馬力窮澤南百里水泉空朝來丹沁東邊路始見河山大地雄南來似為亂山囚後擁前遮苦見留多謝鍾靈不嫌俗坦然煙谷縱鳴騶守歲夜宿太陵田舍今年除夕苦羇栖著我西山更向西一窖太陵田舍火雪龕孤坐聽猿啼田家無物具茶餳爐火龕燈建曙明野老向人無别話新年時熟長官清過郊底村聽田父話陜州事張姓名一曾授䇿州軍判離離殘雪點山郊老樹冰崖映斷橋縱使林泉有佳趣住山活業本蕭條野叟龍鐘百戰酣目光如炬尚耽耽阿欽一死無由得對坐從渠説趙三時欽叔在阿不早元帥府作經歷官新道成試車東下寄德昭書史千仭溪山險已平朝來喜逐炭車行兩鄉父老來爭賀萬事元輸有志成野步曵杖山行記可逰﨑嶇𥘉不厭經丘靜憐苔色圍孤石間愛長松蔭碧流大石橫崖亂作層偶來孤坐適幽情春生先自溪流見暖散冰泉繞舍鳴蒼澗行歌不見人草心泉脈動朝曛溪邊倚杖看來久沙水空明散錦紋秋澗先生大全文集卷第二十六
