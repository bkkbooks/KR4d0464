body:
  text: 衛輝路總𬋩府重修帥正堂疏伏以聽共民事必先處所之安絡繹星軺無匪玉人之重顧衛輝之公署實民庶之具瞻起蓋年深疏陋日甚飭傳舍固為微末論揔治此則本根今將重搆一新增光六縣俸稍先輸其兩月餘力須藉於衆官勢惟乘其一時工可就於不日清香畫戟雖云都尹之居聖莭公筵永祝皇家之壽敢祈同志各署芳銜樂籍殷氏醵金疏量珠買笑空憶當時糊口為生重過故里李弄玉幾年西邁杜秋娘未老東歸載瞻光祿池臺總是舊遊桃李樂籍殷氏者名香佳麗天賦芳溫曽將兩字風流占斷八州煙月此日紛華都識破向來心事欲誰論鳯凰臺上有伴吹簫鼓笛埸中何堪把色與行丏歌姬之院且少分鄰燭之光万水千山得得來一瓶一鉢垂垂老桑間遊女固能憐暮雨之詩芳草王孫尚不棄春風之面倘霑餘潤儘冨歸裝多寡隨冝以疾為妙謹疏李府君建碑醵金疏故汲縣長官李公天祥素負義襟號稱能吏急難多國士之風宰邑有桐鄉之愛去世能幾日有家為一空短碑卧草未覩瑶鐫孤壠含悽豈勝冥感凡曰相知之舊能無墮淚之傷庶少分魯肅之囷共建此陽城之碣眷言故里永賁幽光請靳顯卿山陽闡庠疏切以嬰孩教子貴在父兄詩禮承家必資師範伏惟顯卿學師性資純厚賦業優長規模有乃嶽之風句讀傳故家之習久訓蒙於柘里今間處於山陽煩於白社之間載闡青襟之教邑雖十室使盡為忠信之人喜動七賢不負此風煙之勝恭惟短疏具列同盟重修泰山廟疏伏以物有生死維嶽主司事至微須人興葺眷新中之左地儼泰岱之行宫當年廟貌壯麗有餘此日嵓廊摧毀無幾賴陳將軍之果毅曹鄉老之經營一備糇糧一鳩工役周垣己興於百堵正殿將復其五楹度其工之實繁計所費以不少若憑衆力可見成功使車馬風雲喜降臨之有所官僚户庶獲福祐以無窮謹疏重修河內公廟化緣疏惟公德並群哲材優四科為邦致三善之稱折獄有片言之譽顧瞻喬木懷想其人况此蒲鄉實維舊治民淳訟簡猶沐休風世逺祠存不忘久敬然塵昏像設殆緼𫀆弊故之餘草滿露壇起燕麥動搖之嘆惟夫興葺可表尊崇凡我同盟義當少助謹疏省齋裴先生建碑疏伏以辭焉不愧緣景行之獨髙得之無財於人心而能恔故武昌節度同知省齋先生兩朝名士一世龍門在鴻文大學之間有瑞錦秋濤之譽里雖稱其通德墓未表乎豐碑眼中縫掖半門生身後殘膏丐來者知歸報本復有望於諸君礲石劖銘庶落成於不日嶷嶷麒麟之碣輝輝星漢之光匪惟裴氏之獲安誠亦士林之美事為耶律伯明醵金疏伏以分財曰惠莫先賙急之心見義當為切戒後時之嘆伯明秀造􅃮水東丹之後右丞文獻之孫學則有餘空至於屢為子娶婦禮尚未完急手謀生力有不及顧同志多狐貉之列忍一家有風雪之寒少分半宴之資可合二姓之好倘蒙薄助請署芳題張漢臣醵金疏張漢臣者監司故掾淇奧諸生緼𫀆傷此日之貧客舍歎故人之雨心關桂玉連阻風波既久淹吏部之除未免索長安之米况臺閣半為鄉舊而燕雲古有義風哀王孫者丗為尋常付裝資者日云不少舉船望惠才固匪於建封指囷不難時豈乏於子敬滴水而為恩於目下奉千金而敢忘於他時困涸能濡多寡唯命梁彥升醵金疏太原人山頽木壞永哀賢哲之萎髙上坎中未遂窀穸之窆兾彼齊卿之恱傷哉季路之貧前進士太原梁公子彥升詩禮名家羮墻純孝思雙親而不見抱孤影而自憐秋草萋兮恨隔於九原春露濡而履兹者二紀惟得脫驂而􅉠乃能大事之襄四十萬非敢望於郭代公五百斛庶少分於范左相凡為同好寧不興哀淇水東傾渺逝者如斯之嘆太行西望慰異鄉久客之心大繼長醵金疏國破家士老作無依之客衣單糧絶誰堪卒歲之憂大先生繼長者渤海名家中朝顯宦功名冨貴竟無有文彩風流今尚存黑貂盡季子之裘短布才寧卿之骭雖黃髮髙年之列奈清霜九月之寒甘餓陪於西山束荆薪而煮白石哀哀漂母進簞食以無難戀戀故人贈綈𫀆而何有大凡同志能不興懷所願不過一金未免上煩多士謹疏南宫縣文廟三門化緣疏切惟衣無袖領難以為全行舍户庭將何自出南宫廟學修建有年大殿既完兩序已具獨臺門而未稱在衆意以未安須資多助之方可就三楹之勝雲煙動色歲來泮水之芹雷霆乍驚玉振殷人之輅倘垂重諾請署芳銜滑州文廟化緣疏天下之事無大小得人則興郡國之學由古今似緩而急蓋庠序乃禮女之地而絃歌為風化之原繄爾侯邦號稱文治載瞻淸廟有乏宏規廊廡卑棲狹僅容拜宫垣頽圯髙不及肩我將易故而增卑衆欲妥靈而揭敬輪奐動泮池之藻丹青一繪事之新審致大成需資多助垂旒委佩復誾誾侃侃之儀趨事赴功得磊磊落落之者賢使君業為倡率同僚屬理當贊襄母吝援毫重書所諾謹疏巨鹿縣講堂化工疏粵惟大陸實曰古任創興釋菜之宫舊有眀經之室年深踈陋日就傾危今擬修崇務敦風化大弓長劒其備可忘三綱五常非學不立稍聽一丁之諭將成百室之歌敢仗斯文共成勝事謹疏為周府君立碑醵金疏伏以起千年巳廢詎能忘利益之恩顧喬木而言尚未覩麒麟之碣故江淮都轉使周侯除興義重撫字恩深公雖云亡德其可後今也有銘不愧墮淚無從惟斫石而為特書可於公而見不朽庶圖少報永振休聲凡我同盟共成盛事謹疏汴梁路相國寺化工䟲汴梁路大相國寺住持僧柴某欽奉聖旨修葺前殿所有化緣疏文合行開具者伏以𣑽宫盤欎無踰相國宏規傑閣巋存猶是李唐遺構浩劫黯浮雲之衛秋風動喬木之悲顧二三之殘僧將修完而何力幸蒙睿眷尚賴人謀况有生趍嚮而孰匪善心在稽首歸依者當體上意能傾心而樂施或分囷以捐金同新般若淸光與復天人偉觀風鈴如語響泛潮音天女散花有來衆士祝延聖夀載翻具葉之香翊贊皇圗永比彌盧之固謹疏請陶教授主善疏切以擇師教子孰無希驥之心傳道解疑須藉鑄金之手况木非揉則無自圎之理玉惟斫則成就器之名伏惟主簿先生經明行修學慱才贍聞望素髙於儒館淵源逺自於顒軒講論造精一之微文辭知古今之變惟是青襟之子常瞻絳縵之儀敢瀆師嚴再新函文心專志致深惟體用之方日就月將最切後先之序以兹誘掖與正斐狂所有束修開呈于后重修開泰寺大功德疏伏以道不逺人善無先於利益物興有數勢須藉於英豪乃眷燕山昔為遼府開泰禪寺者爰因鄴第建自樞臣雖復兩朝之增葺何堪雙樹之蕭條如聲色香味布施能圎則上下虛空何修不可伏惟參政相公才優鞭算義重規為禪扣愚機派流臨濟逺暢神通妙方幾開方便法門莊嚴已擴淨慈天庇廕證明羅漢夢况兹金粟影巋爾古精藍雨花翳空得還舊觀登壇判斷重振玄關盡刮衣孟已是多餘香積飯有來福德何嗟不到佛如來載經載營同心同德永扶寶祚為國拈香前進士李舜臣姪求子婦醵金疏切以燕雲尚志情深友義之懷婚媾及時詩美桃夭之詠前進士李公舜臣之姪元德為子求婚納徵有月奈囊空而羞澀須力濟於英豪或采幣以相投或青鳬而見賜迓續先人之胤配合二姓之歡如種玉而獲圭璋在貧家而得箕帚豈曰小輔實荷鴻私兒女債還敢云遂尚平之志簮纓顧恤庶幾接仲郢之風請署芳銜用昭金諾謹疏銅臺阿丑石氏疏年方破瓜在故里樂籍者凡四年今嫁李氏相得甚歡辛巳春以良家來見酒間敘話心事追念舊遊蓋草有二年矣且有滄州之行求余言為重因書此以付去國期年見似者而輒喜改圗故步念此意之可嘉銅臺石氏者穠艷呈霞髻雲綰緑白雪擅郢中之曲絳羅捲薛氏之窗玉秀蘭芳風尖月細荏苒四年之塵土稱量幾斛之珠琲悔失此身得逄佳配回金沙灘頭之夢吹碧桃花上之笙顧自憐度日之難未免有當壚之役試看長樂坊頭雪猶自春風醉裏香將安排老歲生涯預準備藥爐經卷巳蒙重顧來謝鈞慈滿地流錢共説平生鞭算了投竿在水肯教空載月明歸謹疏前泉州路揔管府推官朱淮故太師徽國文公嫡孫今擬於杭州路擇湖山勝地創建書院中起文公祠堂教誨子弟奉承香火上祝聖壽無疆次為宗屬朋從續考亭道脈之傳伏望公卿士夫喜聞樂助庶資衆力克遂𥘉心者伏以明經傳道深有賴於後人圗報起祠必資成於多士况在曽玄之列當膺倡率之勤恭惟晦菴先生學貫六經名髙諸子始焉講學克紹程張之緒餘展也成功直造孔顔之堂奧發揮義理昭若日星沒未及於百年道太行乎四海凡曰進修之者孰非沾溉之餘方國家之右文冝天下之通祀乃眷餘杭名郡未瞻遺像清光聿修香火之新祠爰擇湖山之勝地計所需而甚廣嘆獨力以難勝少分涓滴之餘波同濟經營之盛事絃歌不絶敢云家學之有傳爼豆斯陳庶使宗風之罔墜倘蒙金諾請署珍銜謹疏榜張氏秋香館酒榜伏以三尺紫簫吹破金臺之月一竿青斾飄搖淇水之春孝先張君系出豪華長居紈綺壯狃五陵之裘馬老尋中聖之家風左顧東城名香新館雖借作育廉之地已大搜破敵之兵瀧春溜於連床貯秋香於百甕與同至樂任價寬沽罄翠罌銀勺之歡是非何有聽白雪陽春之曲風月無邉信不比於尋常莫等間而空過任使髙陽公子從他宫錦仙人爭貰金貂紛摩劒珮繫馬鳯凰樓柱挂纓日月窗扉白骨蒼苔古人安在流光逝水浮丗堪驚况百年渾是者能幾回一月開口者不數日忍辜妙理也作獨醒莫思身後無窮且鬪尊前見在那愁紅雨春圍繡幕之風來對黃花共落龍山之帽快傾銀而注瓦任枕麴以藉糟只空工部之囊扶上山翁之馬前歸後擁盡日而然約林評事花約伏以良辰樂事雖曰難并旨酒嘉有豈容獨饗兹者小園竹木粗有堪觀故里賔僚可踈一宴忍教康節獨擅花時敢擬右軍同修禊事伊誰有語花枝羞上老人頭來日無多此樂莫教兒輩覺玉盤濯月巳煩竹裏行厨繡勒攢香暫簇花邉駿馬擇於今月二十八日就弊圃聊備芳樽伏望群英早垂光降茶約伏以歡情漸減豈任林酌之娛老境相冝正有茶香之供今者策勳茗碗集勝爐薰須分旗葉槍芽選甚鷓斑螺甲破紙帳梅花之夢參老夫鼻觀之禪要追陪七碗家風共消遣一冬月日勿謂淡中無味且從靜裏看忙老懷自嚮故人多此樂莫教兒輩覺我今首倡盟可同尋湯響松風巳減却十分酒病日拖竹杖長行携兩袖香煙顧此聞思咸歸歡樂謹約禊約四序節氣春極和而季月為之盛故古人因三日盛時而為元巳之莭然鮮克與巳相會今歲兹辰適值癸已又一盛也用是約二三知友宴集林氏花圃所有事冝略具真率舊例各人備酒一壷花一握楮弊若干細柳圈一春服以色衣為上其餘所需盡約圃主供具秉簡續􅦔辨追洧水歡遊禊飲賦詩修復蘭亭故事上梁文大成殿上梁文寶位龍飛首闡大猷之化儒宫灰冷鞠為茂草之區恭惟總管陳公爰自下車慨焉興感仰體右文之意推明樂育之心因政平訟理之秋舉禮在實亡之典大復素王之宇重開太極之天于以增聖道之光華鑿晚生之耳目矧惟治本一出化原猗歟嶽牧之心擬變謂書之俗落成有日神化無方折雄冠豭佩之徒趨庭受訓易篆刻雕蟲之子執簡傳經奠兩楹之豆蘧舞三代之韶簫伸嚴𣏌典咸啓敬心猥承縫掖之流可後閟宫之頌有來多士共駕虹梁兒郎偉拋梁東萬古宗風一泮宫賴得賢侯扶聖教太行元氣魯龜蒙拋梁南奕奕新宮播盛談一旦詠歸欣有地北山伏掃讀書龕拋梁西聖學如天不可梯須信小成從灑掃互鄉名與大賢齊拋梁北萬象經天瞻拱極文奎髙射德星明昨夜騰光滿營室拋梁上偃植圎義屹相向人從懸甕發丹書堅與西山兩無恙拋梁下適衛屢為瑗所舍春風緑滿杏壇隂從此西遊冝稅駕伏願上梁之後邑多君子世極文明國本固磐石之安天子享萬年之壽斯文有在振木鐸於中天遺法復行得人材於鄉校舉霑寸進仰答明時鎮國寺上梁文伏以坤儀佐理巳收純𬒳之功象教加持妙極大千之力爰擇鴻都之右輔聿興蓮宇之新宫我國家崇報是圗慈憫為念演三乘而設教斂五福以錫民一朝之役罔及於國人萬有之輸悉供於內府於是郢斤運巧鄧梓呈材有來神力之無方遂極天下之大壯桓楹修棟欎雲氣之上浮疊拱層櫨屹丘山之壁立仍差榖旦共駕虹梁用綴蕪辝式伸善禱兒郎偉拋梁東六合天花散曉風隻履不煩嶺去九天開出𣑽王宫兒郎偉拋梁西萬劫壟緣妄想迷方寸欲明諸佛果正須一勺自曹溪兒郎偉拋梁南莫吒龍門萬佛龕會使樓欏雙樹地萬方來此發經函兒郎偉拋梁北萬象森羅朝帝極我為禮此玉毫光聖德無量千萬億兒郎偉拋梁上寶氣瓏璁像我今建此內道埸海會龍華無盡藏兒郎偉拋梁下千里王畿際兩稼年年鐘鼓樂清時共對人民霑聖化伏願上梁之後天低法界海怫潮音山河扶繡户之光日月擁雕簷之氣永將寶供仰贊皇圗奠金城不拔之基祝天子無疆之壽亳州太清宫上梁文至道無名混太𥘉之一氣真人者出廓衆妙之玄門載歆道德之言實翊邦家之化太上混元上德皇帝潛輝柱史肇迹瀨陽千丁令神遊三尺兒童知尊聖祖故歷代備褒之禮皇家極樓觀之雄雖九伏於淵泉而紫氣日纏于天宇嗣興有數今見其人演化宗師真人德紹蟠教流白霫逺乘鶴馭來住琳宫爰即遺基重興丕搆用篤皇家之祐先開紫極之大及覩成規有光往制煙雲暗靄車回隱玉之鑾仙聖超騰日仰猶龍之表恭依善頌用駕虹梁兒郎偉拋梁東綿絡鈞天夢帝宫適喜頓然還舊觀玄都仙客振孤風兒郎偉拋梁西萬里黃流入望低為謝尋涼張慱望故家仙李又成蹊兒郎偉拋梁南聖牘玄珠閟不談且置金華丹寶説請從河上發經函兒郎偉拋梁北玉帛中天朝萬國玄風慶會雪山陽柱下有人談道德兒郎偉拋梁上天蓋蒼蒼含萬象西升不箸五千言萬古流沙空悵望兒郎偉拋梁下祈福為民崇廣厦道家設教貴無為喪葛暄涼自冬夏伏願上梁之后人庥道廕世沐泠風山河扶繡户之光日月擁雕梁之氣竹宫望祀休誇漢武之祈靈敁宅徴符巳表吾皇之萬壽萬夀宫方丈上梁文伏以起百年之搆植大本於宗門葺一日之居見恆心於君子萬壽宫丈室者自昔中和之起廢逮今六祖之丕承物既弊而更新制有增而匪舊敞桓楹而中起翼兩室以傍開雲霞藹疊栱之間燕雀賀華榱之上前瞻玉境通暢玄風後壯宸居擁陪法座况仙馭來臨之有日令威歸語以無時工既落成衆孰不樂倚疊如山之壯罄單肯搆之誠重光動淇水之波佳氣欎太行之色式扶修棟可後歡謡兒郎偉拋梁東燈火春城動竹宫看取洞天間日月佩環聲在步虛中西苒苒春雲去殿低莫道靈章仙秩峻青霄有路是丹梯南故院當年一畒菴碧瓦朱甍今覆壓後人光大儘無慚北五福從來尊太一碧霞千古振孤風奕奕神光長拱極上符籙潛珍無盡藏光芒未暇詫青藜六代傳芳主函丈下玄教扶持衡可迓德星所在風雨時萬里如雲看多稼伏願上梁之後教基大闡福地重新五雲來崑閬之仙六甲祕風雷之奧華簮列拜載光傳度之儀金簡朝元永肅焚修之供以兹快樂普洽生成太一宫清蹕殿上梁文伏以顧瞻琳宇已嚴上帝之居婉孌龍聖人之作恭惟皇帝陛下圖回治道窹寐幽人爰從潛躍之𥘉重有中和之䏂風雲允協文物道而沃帝聰曽一言而利天下師今不見意若無犬駕以來臨駐故宫而懷舊漢文授經於河上加於軒后訪道於崆洞𥘉不踰此以兹寵握光極玄門念我後人思皇睿眷故大起御天之搆庶少伸就日之誠既獻歲以僝功乃而考室敢陳善頌用駕虹梁拋梁東夜鶴休驚患帳空一自翠華臨幸後至今鎖春風拋梁西尚記春旗簇仗齊真氣滿空驚户牗光芒暇到青藜拋衆南論道當年有奧談乘賁臨猶望壠非緣參決發經函拋梁北金簡朝元瞻萬歲永無疆更願八荒開壽域拋梁上碧瓦朱甍遵大壯五雲佳氣鬱蓬萊遊像思天仗拋梁下華表人歸餘道價雨露有偏恩不遣靈章隨物化伏願上梁之後日月擁雕楹之氣山河扶繡户之光道以之增輝真仙為之改觀雲紅黼座濃薰花氣風肅泰壇光動竹宫之祀斂兹廣福錫厥明時溥同至樂春露堂上梁文伏以飛鳥知還固擇安棲之所弊廬託處舉懷必葺之心秋澗老人樗擽散材萍蓬逺宦東西南北兩紀奔馳雨露風霜終年偃薄久矣壯遊之倦浩然故里之歸迣構新堂不遺舊物豈獨廣居而移氣蓋將追逺以顯親連甍接棟而中列三楹却暑回寒而旁開兩室俾春秋寢祭衆免勃磎節敘賔筵喜同笑語惟是時思之切仍題春露之名言舉斯心卑之來者承承繼繼無遏佚前人之光欎鬱䓤䓤非秪謂喬木之美爰扶修棟例有歡謡拋梁東旭日紅駘蕩春陽滿太空人喜廟堂真宰出不煩東觀論青蟲拋梁西萬瓦齊撲地閭閻似碧雞春露堂中春自好何嘗有意夢沙堤拋梁南合明簮交道微來不易談正有歲寒三益在風簷先種兩株杉拋梁北正統一東亘扶桑略西極一堂雖起有先憂所願八荒開壽域拋梁上天蕩蕩光動太行三萬丈主人投紱巳歸來夜鶴不須驚蕙帳拋梁下觀治化叶氣薰然衡四迓過門有客問行藏蓬纍而行得時駕伏願上梁之後里多仁美門掩春華歲時豐穰問甚槃中之蓿物情和好愛及屋上之烏對床賡風雨之吟開卷得聖賢之樂倘使少如所願不為虛度此生秋澗大全文集卷七十
