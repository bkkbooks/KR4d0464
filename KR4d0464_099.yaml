body:
  text: 禰繼禰小宗小宗禰繼禰小宗小宗小宗禰繼禰小宗小宗小宗禰繼禰小宗小宗小宗别子繼别為祖為宗大宗大宗大宗大宗諸侯繼世之君君君君君君陳氏禮書云公子不得禰先君故為别子而繼別者族人宗之為大宗遠雖至於絶屬猶為之服襄三月庶子不得祭祖故諸兄弟宗之為小宗以其服服之大宗逺祖之正體則一而巳小宗髙祖之正體其别有四則繼禰者兄弟宗之繼祖者從兄弟宗之繼曽祖者從祖兄弟宗之繼髙祖者從曽祖兄弟宗之四世親盡屬絶而不為宗矣然言繼别為宗又言繼别子之所自出者言繼禰為小宗又言宗其繼髙祖者則繼别子者子之子也繼别子之所自出者即别子也繼禰者庶子之子繼髙祖者五世之孫也繼禰言其始繼高祖言其終繼别言其宗繼别子之所自出言其祖經言繼别子之所自出頴逹言别子之所由出然則别子所由出即國吾也其可宗乎璽衛宏漢書舊儀曰璽白玉蝺虎紐文曰皇帝行璽天子信璽凡六又曰諸矦玉印黃金槖駝紐文亦曰璽列矦黃金印龜紐文曰印丞相將軍黃金龜紐文曰章中二千石銀印龜紐文曰章千石六百石四百石銅印鼻紐文曰印孫堅得傳國璽方圍四寸上紐盤五龍然則漢天子之璽其方不過四寸諸侯王巳下其小可知土牛制義月令季冬命有司出土牛以送寒氣正義曰出猶作也丑為牛牛可牽止也送猶畢也其月建丑又土能尅氷特水之隂氣故時作土牛以畢送寒氣也土勝水故可以勝寒又且以升陽唐月令季冬出土牛以示農耕之早晚若立春在十二月望則䇿牛人近前示其農早立春在十二月晦及正月朔則策牛人當中示其農平立春近正月望則䇿牛近後示其農晚也後漢志季冬作土牛六頭於國都郡縣城外五地其牛色以歲之幹色為首甲乙木其色青丙丁大其色赤戊已土其色黃庚辛金其色白壬癸水其色黑以支色為身寅卯水其色青巳午火其色赤申酉金其色白亥子水其色黑辰戍丑未其色黃納音色為腹若甲子乙丑金其色白丙寅丁卯火其色赤他皆倣此以立春日幹色為角耳尾支色為脛納音色為蹄設令甲子歲甲為干其色青則青為牛首子為文其色黑則黑為身納音金其色白則白為腹又若丙寅日立春丙為干其色赤則赤為角耳尾寅為支其色青則青為脛納音火其色赤赤為蹄九州釋義兖州兖信也五行星流而為兖豫州豫舒也又序也言隂陽分布各得其序荆州荆疆也陽盛物堅其氣急冀州兾近也爾雅云河兩間曰兾青州元命苞曰虛危星精流而為青雍州雍壅也唐地紀曰雍兼得梁州之地西北位陽所不及隂氣雍遏故取名焉益州益謂溢也徐舒也楊輕也鍾山徐爰曰建康北十餘里有鍾山漢末金陵尉蔣子文討賊戰亡靈發于山因立蔣侯祠故丗號蔣山神赤縣張衡靈憲圖曰崑崙東南有赤縣之州風雨有時寒暑有節苟非此土南則多暑北則多寒東則多隂故聖王不處焉史記鄒衍曰中國於天下八十一分居其一分耳中國名赤縣赤縣內自有九州禹之敘九州是也不得為州數中國外如赤縣州者又有九乃謂九州也有神海環之如一區中者乃為一州也如是者九乃有大瀛海環其外天地之際焉三川河洛伊也司馬光言行録有司奏言日當食光言食不滿分或京師不見皆賀臣以為日食四方見而京師獨不見天意人君為隂邪所蔽天下皆知而朝廷獨不知其為災當益皆不當賀詔從之後以為常漢宫中有宣室武臺召文臣則於宣室召武臣則於武臺春夏秋各釋義禮鄉飲酒云春之為言蠢也産万物者聖也夏之為言假也養之長之假之仁也秋之為言愁也愁之以時察守義者也冬之為言中也中者藏也天地嚴凝之氣始於西南而盛於西北此天地尊嚴之義氣也溫厚之氣始於東北而盛於東南此天地盛德之仁氣也按地志今衛州城即殷牧野之地周武王伐紂築也又云武王至於商郊牧野乃築此城祭説唐韋彤議曰祭非外至生于心者也是故聖人等牲牢布籩豆昆蟲草木可薦者莫不咸在所以享宗廟交神明而全孝敬也遺山嘗與張噥齋論文見有竊用前人辝意而復加雌黃者遺山曰既盜其物又傷事主可乎一坐為絶倒噥即張緯文先生蓋遺山戲語也嘗有詩云因君寄謝噥齋老道我今年二十七作論法鹿庵云語與義體式一殷亦是冒原講證結但論入作獨句直下不似義兩句扇對而入如麻先生漢書貫五經論最明白得體金清漳老人南宫人曽撰本縣二閬神廟碑遺山見之謂進士張和之有讀得行之語光武同馮異遇雨燎衣處在今南宫東北二十里馮村內外制翰林學士所撰者為內制中書舍人定撰者為外制金哀宗朝有親軍殺其子者法家斷不至死上曰親軍宿衛之人父子之間殘忍如此與常人不同竟坐死論徐大卿云詔命之體莫如兩漢以其典實故也餘則何恤又大卿等論及子告母事孟德卿有莊公文薑之説德公主義重於母李侍講説中和真人在龍庭時以瞻對無時恆備物以充咀嚼時一士人同在邸舍師每與之分甘一日師復求之彼辭無有託便族食焉師知之因曰沙漠之羊與中土桑用略同肉充飢毛作氊皮為裘角為柸匜此人所共知不憶近來羊尿又何以配餅食也聞者為大笑彼徐悟其方已甚有愧色楊勸農春卿夜讀書有鼠出躍書機上忽投膏􅼺中揚子取一方木覆之隨突以出環書册走不輟作人語曰油著油著揚笑起曰吾避汝燕城閣前晌午市合更忙猝不能過即擎虛器云油著油著人即開避故鼠亦云云聞者為笑徒單侍講説石丞相琚大定末致仕居鄉中一日會客間聞司録呵喝過門公即起立既逺復位客曰丞相何若此公曰參軍雖微國家命官也吾敢不敬衆客為嘆息丞相字子美中山人王西溪嘗云表章體目無居首之理故今之表式皆以帝旨冠首王西溪云元遺山録册中云東平范尊師庵內見化飯王先生説渠海州為吏時歲貢糟薑糟蟹海棠出州東入海八百里峽島島是龍宫地生海棠作矮樹花色深紅大如茶碗面而百葉香韻殊絶開時可持一月久既衰不落而萎每歲自島中移百本入海州御園明年再移百本而以先所種者供銜每花一金籖牌記之腳花乃得入州官民家每一花必三葉承之重九開鹿庵先生為學士日命應奉編修輩取金實録內各臣事迹欲集為長編俾士大夫家易於觀録或問其去取法曰大抵人之功勞必須具載如西漢曹參樊噲傳此其例也又曰西漢列傳是多少好墓志碑銘格樣學之有餘師矣既而侍講某多略之其人勳效鹿庵聞之曰某不解此平日於書多謾讀過去了秋澗先生大全文集卷九十九
