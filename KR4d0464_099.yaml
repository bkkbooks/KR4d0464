front:
  text: 秋澗先生大全文集卷九十九玉堂嘉話卷之七喪服小記别子為祖繼别為宗繼禰者為小宗有五世而遷之宗宗其繼髙祖者也是故祖遷于上宗昜于下尊祖故敬宗敬宗所以尊祖禰也大傳曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也
