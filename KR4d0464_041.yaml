body:
  text: 南鄘諸君會射序君子之學貴乎有用不志於用雖曰未學可也聖門之藝有六而射為重蓋射者男子之事志有事於四方也近歲南鄘諸君於二仲月肄諸射事豫雖不敏亦從事其間嗚呼鄉飲廢而長幼之序乖大射廢而君臣之義缺今之去古也逺矣欲人之知禮也難矣兹射也匪曰嬉遊為樂將少長是序匪曰僥幸為得將心體是正匪曰致逺為功將中鵠為善匪勝巳是怨反諸己為賢匪酒醴是嗜而辭養為恭匪多算為能而進退可度夫如是其於修盛德逺不肖習威儀復鄉飲而適丗用不由斯而有漸乎若夫野曠天清露禾棲畒霜氣折膠秋聲厲木土氣充而耦同燕角徑而弦裂張侯去百步之外揖遜務君子之孕得之心應之手箭如鴟呌羽若星飛雖末敏及參連神凝剡注追騶虞牧野之風致矍相堵墻之觀庶幾繹巳之志張本乎四方之事誠君子有用之一端也孔子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎巳矧君子正已之具也哉因序其事而賡之以歌歌曰古道下散文武岐中原氣折兵塵飛四郊多壘乃我責誰云武事非吾知不見東家矍相事當年凛凛無全齊丈夫况當志四方射先祿後非吾欺只今天地一射圃國俗靡靡從風披圗書束置奎宿黯弧矢髙射騰寒輝冥冥天道既如此智者相時行所冝又不見臺城陷辱古所嗤舞于不救髙皇危諸人清談不適用晉室竟墮東門機乃知六藝射尤重丗不可廢誠有為寄謝一丁相誚子恐人迂乃坐書癡投壷引古之人心正意誠之學無或不在也豫於投壷見之矣壷之義三代之遺制也自諸侯至於卿大夫靡不行焉或堂或庭野外軍中必設兩階以明賔主之禮置壷楹間取其中也北面受矢尊其賔也兩黨相嚮比其誠也絃以貍首殺其等也鼓以魯薛節其事也勝欲不勝養弗能也司射申誡警其慢也若夫左右盍簮臨壷荷矢身跛倚則壷不相直也氣渙散則志不能碇也手不端則矢弗能順也必也心正意誠神凝於內坐與壷相當扶與矢相應故的然而中無過不及之差豈非誠心正已之道歟且古之為學怠墯之氣不設於身其或少焉必有休息之具曽不以竒技淫巧令人心蕩而狂也故壷之義有足尚焉然壷亦兵象也與射禮略同蓋兵凶戰危人情之所惡燕飲娛賔人心之所欲也先王因其所欲而寓其所惡於其中俾樂為之不厭則平日之所尚乃異時之所用也且漢唐以來博戲之事多矣獨奕之技行于今不廢然迹其用心傾危抵巇一著一機司明以之眊亂靈臺為之攙搶必決其存亡而后已傳曰性相近也習相逺也術之不善擇也如此悲夫豫自憲臺秩滿居間不出者動涉旬朔時雨霽堂廬清停披之餘無以休息用此以佐雅歌之樂庶幾動靜周旋其心一出於正方之既飽而嬉莫知所嚮者其賢乎哉其賢乎哉至元辛未夏六月望日序逰洄溪序夫燕遊觀覽蓋所以增放曠而攄煩滯也故君子所不廢焉歲戊辰夏四月既望時雨霽景氣清嘉苗濯秀二麥含實翰林先生拉二三子聮騎出郭由郡之西南按轡邍隰周覽物華既而掉鞅東首尋盟洄溪之上於是步蘭臯俯清流蔭佳樹藉碧草鳥嚶嚶而遺音魚躍躍以騰水飛鳴潛泳各遂所冝悠然之思與淵流俱而莫際其涯皓然之氣與造物遊而不知其所極先生曰吁樂哉斯遊也於是談塵屑飛朱絃聲眇從容質問不覺前席二三子怡然洽所歡充然有所得不知老之將至日之云夕也風乎詠歸又何啻遺塵枉而攄壅鬱者哉因援毫為之序帝王鏡略序東萊云六藝之文學者之大端也其次莫如史然史書浩博自遷固而下不啻數百萬言學者雖資稟精強至於極其致而得其要者或寡矣矧童子𥘉學者歟近讀遺山先生鏡略書所謂立片言而得要者也其馳騁上下數千載之間綜理繁會數百萬言之內駢以四言叶以音韻丗數代謝如指諸掌歷代之能事畢矣然先生北渡後力以斯文為巳任孰謂斫大材而就小室抵和璞而輝丘陵者乎是書之出若為童蒙學習者之所設也然傳不云乎君子之道孰先傳焉孰後倦焉循序而進有不可躐等者士人張敬叔貧而好學家藏是書今刋之以廣其傳亦可以見其用心焉爾彼𥘉學者一旦心志通逹由堂入奧又且得博觀約取之法焉是則一鏡之略不為小輔者也至元四年歲丁卯重午前二日題王氏藏書目録序河南房扈王氏為衛之著姓百有餘年祖宗以奉反相傳略無長物逮先君思淵子北渡后亦不治生産怡然以閉户讀書為業聞一異書惟恐弗及其弱冠時先君氣志精強目覽手筆日且萬字不十年得書數千卷或者曰藏書如是尚爾為先子曰吾老矣為子孫計耳有能受而行之吾丗其庶矣乎丗人知榮保其爵祿不知一跌足赤吾之族知冨寶其金玉一慢藏巳為盜所目也何若保書之為寶乎若子若孫由是而之焉為卿相為牧字為善人為君子上以致君澤民下以立身行道道其在於是矣由是而觀先君立丗之志貽厥之謀何其逺且大哉嗚呼先君去丗將近二紀不肖某今年四十有一遺言在耳遺書在櫝感念耳昔不覺泣下因復慨嘆仕不為進退足自樂蓋所恃者此爾然置之而不力其讀讀之而不踐其道與無書等矣傳曰遺子黃金滿籝不如教之一經此誠先君之志也可不懋敬之哉至元四年秋七月曝書于庭與兒子孺校而帙之則各從其類也述書傳目録敘汲郡圗志引客有過僕而問曰子之經求衛事纂集圗史所嚮欲何為哉僕應之曰述先君之志也昔先子無恙時嘗訓某曰衛有圗經舊矣北渡巳來百訪而不一見丗郡人也生於斯長於斯宦學於斯聚族屬於斯由宋而金而皇朝百有五十餘祀不謂之遺俗可乎且衛得天中桑土之野北通燕趙南走京洛太行峙其西大河經其南河山之間盤盤焉一都會也及論其郡國之本未輿地之因革牧守政教之賢否土産風俗之醇醨山澤利益之隱顯人物古今之盛衰則藐然不知責將誰歸至如淇水各川也而指為李河銅關近防也而曰壁列門羌公顯號也而曰康叔冢殷溪明表也而稱太公泉共城伯國也而曰假天子城趙越太守也而曰越王墓淇口會亭也而曰衛新臺岡名博望而祀張騫山號仙翁而歸葛氏視獲嘉而曰故城以頓方而作頓丘枋裏而為枋頭而又汲水湮而無聞金堤蕩而失據其甚則白圭訛而為雞黑麓謬而為鹿迷惑忘返以至於斯可勝嘆哉是皆吾平昔欲正之而不忘者也吾老矣終當畢此一事付之青箱無幾先君捐館雅志罔就嗚呼痛哉中統建元之三年豫自堂吏來歸間中紬繹經史得先人所藏遺書淚灑行間愾歎久之曰精爽不昧有繼志述事庶少慰爾於是聚書一室研精致思蟫蠧群言外則訪諸耆宿雜採傳記碑刻復為按行屬邑以覆其所得噫汲雄望也自康叔迄今幾二千餘歲其幽光潛德靈蹤盛迹隨陵谷起滅不可殫紀徴文獻則墜簡已亡懷舊俗則髙年無幾瞻言丘壠旌紀寂寥不肖何人能發越其間哉然先子遺教不可墜也良史所載傳信後也故特取其人物政教風俗關於治亂為後丗之法者群分而類聚之復著辨論等篇凡若干卷題之曰汲郡志曰郡者何包上下而言也書成因自笑曰諺有之家畜弊帚享之千金其不肖之謂歟然非敢示諸作者庶幾來者志存肯搆其治梓作室以是為朴斫坦墉之始丹艧墍茨之本可乎客唯而退時至元丙寅秋九月重陽日引會玉簮花詩序玉簮花之名品也然唐宋以來騷人賦客歌詠不多見豈花之種昌於近代歟較其繁昌在京師為最盛豈花之性喜涼風土使之然耶當其庭軒暑退幽砌涼新翠筳髙聳瑶花盛陳湛露氣於碧霄映仙姿於月户素影以之輕盈芳心為之容與至若肌膚綽約來姑仙也緑雲婆娑墜曉鬟也幽香濃逺眇不知其幾許也其畏景便隂低昻倚佇意韻飄瀟如欲輕舉所謂玉華同駕紛簮導以何翩風標可人占髙秋而所安神不為之餒而敢告來者能永遵儀法不惟德歸於厚有以見吾皇考繼述啓迪之方祖妣承家守節揚厲無窮之意也至元三十年夏四月翰林學士中奉大夫知制誥同修國史裔孫惲百拜而為之序南陽府瑞芝詩卷序天地之大氣無不周也其至和純粹之極隨德感召而禎祥之故應干上則有卿雲景星發于下則有醴泉朱草芝為物尤瑞然産之不恆秀之而特異者蓋不一二數焉完顔公尹南陽之明年有芝産於方城民家凡四本誠秀麗而殊常者也其駢枝連葉突如雲興幢然蓋植有纍至十六七者英華韡曄顔如渥丹可玩而愛郡之吏民視履考祥奔走庭下咸謂公視事已耒行有以召之故也如役使時而田里安賦斂均而物情允疲痏者為之息肩方苞體者使之不天是慈祥愷悌之方拊循惠養之實夾洽備至感召休徴物效靈光者也公曰方今王澤下流皇風逺暢意者仁厚之化行乎江漢域者衣𬒳草木昭回光而為開先之兆也昭昭矣豫何敢以當之即篚置以聞衆復曰非常之瑞歸美於上臣分當然弗産於鄰郊它邑而呈祥於提封涵濡之下不蒸於顛枿棟隆而擢芳於陂澤野人之圃亦由布宣中和導揚德化下克靈承之自也是不可無聞於後遂繪彩靈姿求太史紀瑞者屬之俾上以頌天休滋至之繁下以見郡守惟良之美適余將事在申因其請樂為書諸卷端文府英華敘僕自弱冠時從永年先生問學先生以科舉既廢士之特立者當以有用之學為心於是日就通鑑中命題或有其義而亡其辝或存其辝而意不至者課之以為日業雖云此何時也然觀多事之際斯文有不可廢焉者小子其勉旃及長年以來綿歷丗故愈知先生之言為有徴至元三年豫自魯返衛居間痛悼墮窳日以書史振勵厥志因覩古人臨大節處大事征伐號令渙汗云為之際含章時發以之功業成而聲名白者良竊慨慕焉遂斷自戰國巳上迄于金取其文字粲然適用於當丗觀法於後來者得若干首題曰文府英華非敢妄意去取第類集以廣怡説其或從事力列屬辝比事庶有效於時實自先生之教之中來也是不可不序四年丁卯秋孟三日引宋總尹母夫人慶八秩詩序人與天地叄所貴者生所欲者夀福全德邵此又夀者之可樂也豫宦遊燕朔接丗家甚多至於享髙年之安具五福之慶者總尹宋君母夫人其一也夫人姓魏氏濟南人出膏浸醲薰丗為名族及歸處士貞順儉約𬒳服僮僮早夜以中饋是承處士姿沖適樂易以文儒重一時為中令耶律公所知喜賔客樂施豫尊爼談詠有承平故家風味故軒事填咽鶴蓋交隂於門者無虛日夫人躬儉內助壷儀有則賔至率擊鮮供具佳肴名釀齊潔嚴整未常計家有無俾不足於賔所也處士嘗與客語久夫人適幈户間有所聞客去即曰直諒易言我雖誠人則有愛惡焉再思可也其順成輔佐君子至意類多此子四俱教之讀書雖出就外傳庭訓之際以孝悌忠信為主曰孝者行之源悌者順之至忠者臣道之極信又朋友所須以成者立身揚名本其在於是汝等敬之勉之古稱隂教有助夫人之謂也長曰漢臣河南府路總管忠勤長厚不類今人次魯臣願而克家恬於仕進次唐臣才碩有幹局侍儀司法物庫使次楚臣博學多藝能有處士風上邸潛時以琴阮侍左右有年今以致養日嚴為事夫人今年壽登八秩康寧精爽髮微艾容睟然飲啖如五六十人歲時拜慶子孫滿前斑衣彩袖鴈行玉立其團欒香火之情雍肅閨門之化融融泄泄萃於一堂之上不謂福全德邵可乎吾是知召南美化本於正始而有麟趾鵲巢之應洪範之九五根於攸好德一言而夀為五福之尊禎祥有自於宋氏槩可見矣求諸公賦詩歌詠其所貴可樂之美屬惲而為之序總尹湯侯月臺圗詩序蘇門山水明秀為天下甲蓋有東南佳麗瀟灑之勝而無卑溼蒸炎之苦誠中州之江南也湧金門外西南行三里而近曰蘇氏别墅中有大石月如周列座鼓八因得名曰月臺其形勝大槩溪環竹外山倚雲旓空翠湖光動蕩無際蒼煙白鳥容與鳴集渡野彴穿林篁而入中鑿蓮溏削方洲􅌟亭其上青梅蒼檜四面間植竒花異卉繍錯其下牡丹臺酴醿洞又為東西别圃春則醉其香夏則清其暑秋月可玩冬梅可探而賞也四時之景皆新而其樂亦無窮也暮春𥘉郡人遊歷始于百泉曉翠經柳湖雙塘梅溪而南迄焉止息故共頭月臺實為一方首尾之冠至元丙子春豫自晉東還取道共城友人於焉觴豫為一日留覩其廢磑修復堰蹊髙敞雲煙竹樹光賁疇昔詢之知為府尹湯侯易而主也是年冬與湯會燕出所繪月臺圗且曰為仕宦牽率罔獲徜徉其間以遂𥘉心今欲求諸公題詠庶見其素藴雖南北東西時得展玩猶一到其中也吾子為我序之嘗念天壤間佳境幽人勝士樂之而不能有豪宗貴族有之而不暇樂三十載間吾見此四易主矣不知當時賔從輪蹄凡幾往返得窮雲煙魚鳥之趣彼幽人勝士暢情適意不以物之有無為樂而貴遊豪宗雖有之能遂其樂而樂方為巳有雖然今君以才術通顯投功名之會膺長沙方嶽之寄而能以此為懷豈他時倦遊知止之心急流勇退之舉將張本於斯歟十四年上元日序博古要覽序豫性淡癖無他嗜好獨于古彛器愛而不置雖造次必摩挲瞪視辨其銘欵為何代何物間有所得則悚然起敬想見當時氣象令人有不能巳者弟所見不廣究其義未詳耳十四年春余入翰林四十有七日侍左丞相耶律公于玉堂坐間出宣和博古啚三十卷示豫因假以歸與院史趙復取鍾鼎韻歐陽子薛尚功欵志吕氏博古李羣舒考右等圗參讀而莭約之觀其制作之精微錫用之所以篆籕之古而不苛文章之雅而不迫取物象形垂警萬世其為法深且逺矣因念三代吾不淂而見之淂見是器斯可矣矧微辭奧旨引據考證于粲昭著生平所疑前賢或闕而莫可致詰者一覽而盡得怡然理順渙焉冰釋筆削既巳從其類而作若干卷題之曰博古要覽客有過而笑曰子之學棄俗尚從寂寞惟恐其不古也其如適越而冠章甫何豫應之曰不然方今明天子御極神聖慈武撫四海而有之禮器縟典將維新是啚一日告功神明郊祀饗獻之禮行有每事而問者據所淂而告之曰此鼎也彛也卣也匜也爵也罍也犧也象也如是而已其于魯兩生間安知無一日之長乎客笑而退于是乎書以為序書畫目録序登崑崙之墟者知宇宙之大臨滄海之淵者見魚龍之富故達人大觀必于物之所萃而致意焉乃能窮古今之變極天下之觀否則與管窺等耳若夫厯代之法書名盡唐以太宗嗜好之篤宋以徽廟耽湎之甚搜訪百至品苐裝潢比三代傳寶至陪葬昭陵閟藏內殿仍置官典校署之曰祕省何其崇哉當時自非寵錫貴近賜觀諸王思欲頍首一窺胡可淂已且唐迄今五百有餘歲幸而存者又無幾唐亡而五季宋殘而金源氏金滅而國朝興其間兵亂相繼散亡劘燼又不可勝紀聖天子御極十有八年當至元丙子春正月江左平冬十二月圗書禮器並送亰師敕平章太原張公兼領監事仍以故左丞相忠武史公子杠為之二尋詔許亰朝士假觀豫適調官都下日飽食無事遂與左山啇台符叩閣披閲者竟日凡淂二百餘幅書字一百四十七幅畫八十一幅怡然有所淂沖然釋所願精爽洞達滯思為一攄所謂升崑顛而見洪荒之大俯𬈑渤而駭光怪之多也嗚呼三光五嶽之氣緼絪盤礴發于人為精華傳于代為英物以數百載萃聚韞藏之盛積而為崇丘澮而為淵府一旦顒顒然拭目而觀可謂千載一遇也因念人與事機其會與否皆有數存其間九年春豫一夕夢謁平章張公名易字仲一太原人于府苐之東堂酒數行發書一匱示豫皆彩啚繪本金文玉牒今觀中祕所有璀璨輝赫與夢中所見者盡同吁亦異哉傳曰嗜欲將至有開必先信哉斯言也作書盡目録序故翰林學士河東南北路宣撫使張公挽詩序歲甲寅冬先生𬒳故經略史公至過衛惲以諸生贄文上謁承顧睞獨異逮中統辛酉先生自河東宣撫改授翰林學士兼中書省參議其秋惲亦以都司就列機務之暇接論思殊欵至元二年公以前東平宣慰起復簽山東等路行省事適惲從事在魯又奉間燕者兩月六年已已冬不肖應御史辟出真定候公於頥齋尊酒從容言笑竟見因及西臺故事時公精力未衰慨然經丗之懷尚眷眷不置也厥後惲官平陽飫聞公填撫時政績章章在人心不去者甚悉私念自甲寅迄壬申歲草年間與公會合者五聮事者再似不偶然也故知公為頗詳公資剛嚴有經濟器業遇事風生果於斷劃其庭議剴切矯矯有長孺志節至扶善良嫉姦惡又似夫王義方對仗時辭氣生平素藴在河東展也盡至今三晉間愛仰如神明乃以霹靂手目焉雖時致齟齬其耿耿自信不疑者氣終不少下公殁后三年甥王革來過追惟疇昔愴然動零落丘山之感余亦為歔欷也想遺直之不復悼斯文之如線勉為哀挽庶答顧遇知巳之厚且代封龍招來之此二魂而有靈鑒兹哀悃公字耀卿姓張氏太原友城人早舉進士聲藉場屋間既而以臺掾進為入儀觀秀偉山立揚休望而知為正人端士夀八十終鎮州頥齋其自號云不書名貴之也至元丁丑秋謹序趙德明母劉氏慶八十詩序人皆以壽為樂然使吾親夀壽而康寧兹人子之至樂也鼓邑趙君德明豫官晉府時幕從事也每與之接不下帶而存者皆和氣愈色其臨事行巳洞洞屬屬若持盈奉玉惟恐弗勝豫異之而不及問戊寅春會京師稱其母劉氏金進士都水監勾之女穰縣簿耆德唐甫之妹年雖髙聰明安健紉縫在手不持杖作筯力先懷逺府君不幸早丗三十年間昶暨二弟靖炳頗試所歷及有孫六人女孫二人重孫二重女孫六同居無間言是皆母氏慈愛恭儉隂教有方之力也昶等不肖愧弗能紆青拖紫儋爵析圭以顯榮為養用報劬勞之德今歲夀開八秩將南歸省慶尚賴賢士夫見之歌詠歸慰母心以為閭里光豫告之曰夀福冨貴衆人之所欲也若今之冨貴似可求而得唯夀與福命之於天不可幸而致彼髙明家雖三牲日養未免使親有顧慮可憂之戚崇髙而安者子孫多親不待之嘆今君職雖卑祿雖薄與仲弟輩怡然以志為養其樂也融融吾知案上一杯菽水過於五鼎七牢矣時也恆山之陽滹池之濵風和而晝明鳥嚶而華粲緑萱婆娑於堂背舞袖欄斑於膝下朝而倚其門夕而倚其廬俟子之來歸君其行矣試以吾言語諸鄉人而曽閔和樂之氣將有聞風而興起者焉至元十五年季春清明日序潔古老人注難經序醫之有難素猶六經之有春秋易也書雖盡言言不極意神而化之存乎其人潔古張先生醫師之大學也以是書注釋雖博未免有仁智殊見體用不回之間於是研思凝神探索玄奧發遺意於太素之𥘉出妙理於諸家之表使體用一源得失兩判復隨其疾證附以禁忌方論述經解草四卷先生髙弟東垣老人以其書授羅君謙甫兵後文多墜簡及得田氏口傳易水遺旨百餘條苴輔脫漏遂為完書豫嘗觀其旨要顧天下之事未有不極其理而能臻於妙者矧醫術精微主司萬命惟其至精非一丗之所能備惟其至微非一賢之所能窮故軒歧開天如大易之書其卦越人撮要猶三傳之贊其經逮潔古講解古今之善傳注之能事畢矣誠生民之命脈醫學之淵會也嗚呼醫固難事學即能至至於提挈造化會歸一身如秦扁窺五臟而洞癥結察形聲而辨死生推原本自心融手應坐收神聖康濟之功要以理明學博精詣其極有不期然而然者其功用之實咸在是書學者冝盡心焉而太史公稱扁之術得於餌桑君之藥飲上池之水特以診視為名恐未之思爾謙甫將板行以夀其傳求題諸篇端豫嘉其學術及物之外能光昭師道如是可謂知本也巳先生諱元素易水人潔古其自號云至元十七年歲次庚辰中伏日序宋東溪墨梅圗引性之所得於天有不行而至不學而能者况託物遊藝意存所寓者哉總尹漢臣善寫梅樂之終身而不厭且梅以墨繪黯淡枯寂無聲色臭味可嗜而恱蓋性之所得有不容自巳者余嘗踏雪過南溏入東閣主人開樽小酌醉中出示所製溪雪春風等圗亦以淡僻故為把玩者久之覺冷香踈影動蕩於几案門令人翛然有孤山籬落之想後考試洛陽復與君會府署之梅花堂庭之所植者皆是也因舉觴相屬曰永南梅之淵藪又久官於此殆將俾使君移船花光臻超然之極致耶東歸悉以近作贐豫其風味之勝瀟灑之工又非向時吳下矣及入汳解裝盡為好事者索去嗚呼君今已矣梅寧復得邪其弟唐臣義夫輩追憶風流事亡如存聮綴遺墨求名士夫題詠將昭大兄遊藝之美耒屬引其端漢臣於余契久且敬故知為人頗詳君天姿誠悃與人交有終始於修身齊家孝友純至一門之中融融怡怡以及於政是知託物寓意於歲寒三友之間者不徒模寫形似俾自得之趣冠時人而名後丗也十七年立秋日秋澗序新修調元事鑑序土之有志於道者當以聖人為則有志於天下者當以宰相自期降是夫何言焉然宰相者輔天子坐廟朝經綸一丗豈偶然哉是在彼者得之為有命而在我者烏得而不盡之哉况相之為任正已以格君心之非進賢以盡知人之鑑理物以代天地之化以成天下之務尤需以學術而為之先若不學無術則暗於政體是最大臣之所深敝故賢如傳説典學𥘉終聖若周公思兼四事逮夫叔丗多故大學之道不明於上燮理化為權衡論思變成機務相之德業其所存而不亡者幾希矣此事鑑之所以作也嗚呼三代而上如禹益稷契其謨猷德業光極臣道日星麗天尚何議擬故斷自殷周巳來終之近代上下千有餘載間其相之賢否具列無遺俾歷朝之用舍一代之安危前後鱗差易於即見至若善或當與詳其所可法惡或可奪書其所由然凖以夔契伊周之所行斷以孔孟諸儒之正論間以臆見附之要本德學材識公明正大以道事君為事業經綸之最至如遭際聖傑不善更化祇以權謀功利為尚雖濟一時而不可多得終非鑑之所先務也僕老矣壯而所期見於丗者百不能一必故朝夕覃思是編庶成一書亦畎畒不忘之心也俾後之君子有志於斯民者識前言而明治體稽往行而處事機其於衮聀不無少有輔焉至元二十年歲次癸未夏六月十有七日序顔魯公書譜序古人以書學名家者甚衆今獨取魯公而譜之者重其人以有閞於風教故也兼公之書上則窺三蒼之餘烈中則造二王之微妙下則極古今書法之變復濟之以文章氣節之美故後人作之終莫能及東坡云評書兼論其平生苟非其人雖工不貴昔莆陽鄭樵嘗集公代有金石刻得七十有五豫之耳聞目覩洎有其名而亡其書者得六十有二備録家藏實有五十有一只以憺僻酷愛營求三十年之久才所得如是念其嗜之無力自非夤緣物聚於所好亦巳難矣嗚戲公之書今存於丗者無幾加之歲刓月敝有劘滅而已可勝惜哉若夫千金之璧為丗重寶人能碎而不靳者以求而可復有也若公之書寧復載得邪故余作譜按公春秋與所書碑刻歲月官封詳考而次第之俾觀者知公之書因物賦形變態百出其胸中忠義之氣蔥蔥鬱鬱散於筆墨之間者至終老而不少衰所謂止見性情不見文字令人想見當時氣象有興起而不能已者是不亦閞於風教者乎譜既成客有過豫而問曰二王乃真行之祖顔陳縱橫曽不踰矩曷若即而為法乎余曰不然孔子吾徒之願學也然升堂入室固當有序若即此而求臨池之妙則思過半矣客謝而退至元癸未得伏日序衛生寶鑑序醫與造化參學之精者為難至著書垂訓兾後丗必然之用者為尤難羅君謙甫東垣先生之髙弟嘗謂豫言𥘉授簡席下東垣曰汝將為為人之學歟聞道之士歟請曰走雖不敏幸蒙先生與教理之深詣乃所願也故十年間雖祁寒盛暑親炙不少輟真積力久盡傳其私潄不傳之妙大抵人之疢疾不外夫隂陽變徴我能參兩聞會一身推窮其所受根源方為可爾用是以所得驗於日用之間如敵在目中然後審藥為攻未嘗不如吾之所必取也因集為一書題曰衛生寶鑑曰辨誤者證丗之差謬明其理之所自也曰擇方者别夫藥之精粗寒燠以酌其疾證之冝否也曰紀驗者述其巳之拯料與彼之深淺見其功效之實也僕平昔所得者如是吾子其為我序之豫聞醫之為學右聖賢致知格物之一端也軒岐巳來難素靈樞等書纍數千萬言自非以醫為巳任者孰克而究之若羅君者可謂以醫為任而究其理之所自歟昔王彥伯醫聲既白列三四竈煮藥於庭老幼塞門來請彥伯曰熱者飲此寒者飲此風者氣者各飲此初不計其酬謝今羅君亦以道心濟物復能著書垂後兾必然之用其仁心普眼當與彥伯同流其誰曰不然故樂為題其端云至元癸未歲清明日序王彥伯酉陽雜爼云唐人為道士善醫術秋澗先生大全文集卷第四十一
