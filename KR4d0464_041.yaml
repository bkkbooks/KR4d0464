body:
  text: 南鄘諸君㑹射序君子之學貴乎有用不志於用雖曰未學可也聖門之藝有六而射為重蓋射者男子之事志有事於四方也近歳南鄘諸君於二仲月肄諸射事予雖不敏亦從事其間嗚呼郷飲廢而長㓜之序乖大射廢而君臣之義缺今之去古也逺矣欲人之知禮也難矣兹射也匪曰嬉遊為樂将少長是序匪曰僥倖為得将心體是正匪曰致逺為功将中鵠為善匪勝巳是怨反諸己為賢匪酒醴是嗜而辭養為恭匪多筭為能而進退可度夫如是其於脩盛徳逺不肖習威儀復郷飲而適丗用不由斯而有漸乎若夫野曠天清露禾棲畒霜氣折膠秋聲厲木土氣充而耦同燕角勁而弦裂張侯去百歩之外揖遜務君子之孕得之心應之手箭如鴟呌羽若星飛雖末敏及參連神凝剡注追騶虞牧野之風致矍相堵墻之觀庶幾繹巳之志張本乎四方之事誠君子有用之一端也孔子曰飽食終日無所用心難矣哉不有博弈者乎為之猶賢乎巳矧君子正已之具也哉因序其事而賡之以歌歌曰古道下散文武岐中原氣折兵塵飛四郊多壘乃我責誰云武事非吾知不見東家矍相事當年凛凛無全齊丈夫况當志四方射先禄後非吾欺只今天地一射圃國俗靡靡從風披圗書束置奎宿黯弧矢髙射騰寒輝冥冥天道旣如此智者相時行所冝又不見臺城䧟辱古所嗤舞于不捄髙皇危諸人清談不適用晉室竟堕東門機乃知六藝射尤重丗不可廢誠有為寄謝一丁相誚子恐人迂乃坐書癡投壷引古之人心正意誠之學無或不在也予於投壷見之矣壷之義三代之遺制也自諸侯至於卿大夫靡不行焉或堂或庭野外軍中必設兩階以明賔主之禮置壷楹間取其中也北面受矢尊其賔也兩黨相嚮比其誠也絃以貍首殺其等也鼓以魯薛節其事也勝欲不勝養弗能也司射申誡儆其慢也若夫左右盍簮臨壷荷矢身跛倚則壷不相直也氣渙散則志不能碇也手不端則矢弗能順也必也心正意誠神凝於内坐與壷相當扶與矢相應故的然而中無過不及之差豈非誠心正已之道歟且古之爲學怠墯之氣不設於身其或少焉必有休息之具曽不以竒技淫巧令人心蕩而狂也故壷之義有足尚焉然壷亦兵象也與射禮略同盖兵㐫戰危人情之所惡燕飲娯賔人心之所欲也先王因其所欲而寓其所惡於其中俾樂爲之不厭則平日之所尚乃異時之所用也且漢唐以來博戯之事多矣獨奕之技行于今不廢然迹其用心傾危抵巇一着一機司明以之眊乱靈臺爲之攙搶必决其存亡而后已傳曰性相近也習相逺也術之不善擇也如此悲夫予自憲䑓秩滿居閑不出者動渉旬朔時雨霽堂廬清停披之餘無以休息用此以佐雅歌之樂庶幾動静周旋其心一出於正方之旣飽而嬉莫知所嚮者其賢乎哉其賢乎哉至元辛未夏六月望日序逰洄溪序夫燕游觀覧蓋所以増放曠而攄煩滯也故君子所不廢焉歳戊辰夏四月旣望時雨霽景氣清嘉苗濯秀二麥含實翰林先生拉二三子聮騎出郭由郡之西南按轡邍隰周覧物華旣而掉鞅東首㝷盟洄溪之上於是歩蘭臯俯清流䕃佳樹藉碧草鳥嚶嚶而遺音魚躍躍以騰水飛鳴潜泳各遂所冝悠然之思與淵流俱而莫際其涯顥然之氣與造物遊而不知其所極先生曰吁樂哉斯遊也於是談塵屑飛朱絃聲眇從容質問不覺前席二三子怡然洽所歡充然有所得不知老之将至日之云夕也風乎詠歸又何啻遺塵枉而攄壅鬰者哉因援毫為之序帝王鏡略序東萊云六藝之文學者之大端也其次莫如史然史書浩博自遷固而下不啻數百萬言學者雖資禀精彊至於極其致而得其要者或寡矣矧童子𥘉學者歟近讀遺山先生鏡略書所謂立片言而得要者也其馳騁上下數千載之間綜理繁㑹數百萬言之内駢以四言叶以音韻丗數代謝如指諸掌歴代之能事畢矣然先生北渡後力以斯文為巳任孰謂斵大材而就小室抵和璞而煇丘陵者乎是書之出若為童䝉學習者之所設也然傳不云乎君子之道孰先傳焉孰後倦焉循序而進有不可躐等者士人張敬叔貧而好學家藏是書今刋之以廣其傳亦可以見其用心焉爾彼𥘉學者一旦心志通逹由堂入奥又且得博觀約取之法焉是則一鏡之略不為小𥙷者也至元四年歲丁卯重午前二日題王氏藏書目録序河南房扈王氏為衛之著姓百有餘年祖宗以奉反相傳略無長物逮先君思渊子北渡后亦不治生産怡然以閉户讀書為業聞一異書惟恐弗及其弱冠時先君氣志精強目覧手筆日且萬字不十年得書數千卷或者曰藏書如是尚爾為先子曰吾老矣為子孫計耳有能受而行之吾丗其庶矣乎丗人知榮保其爵禄不知一跌足赤吾之族知冨宝其金玉一慢藏巳為盗所目也何若保書之為寳乎若子若孫由是而之焉為卿相為牧字為善人為君子上以致君澤民下以立身行道道其在於是矣由是而觀先君立丗之志貽厥之謀何其逺且大哉嗚呼先君去丗将近二紀不肖某今年四十有一遺言在耳遺書在櫝感念耳昔不覺泣下因復慨嘆仕不為進退足自樂盖所恃者此爾然置之而不力其讀讀之而不踐其道與無書等矣傳曰遺子黄金滿籝不如教之一經此誠先君之志也可不懋敬之哉至元四年秋七月曝書于庭與児子孺校而帙之則各從其類也述書傳目録叙汲郡圗志引客有過僕而問曰子之經求衛事纂集圗史所嚮欲何為哉僕應之曰述先君之志也昔先子無恙時甞訓某曰衛有圗經舊矣北渡巳來百訪而不一見丗郡人也生於斯長於斯䆠學於斯聚族属於斯由宋而金而皇朝百有五十餘祀不謂之遺俗可乎且衞得天中桑土之野北通燕趙南走京洛太行峙其西大河經其南河山之間盤盤焉一都㑹也及論其郡國之本未輿地之因革牧守政教之賢否土産風俗之醇醨山澤利益之隱顯人物古今之盛衰則藐然不知責将誰歸至如淇水各川也而指為李河銅関近防也而曰壁列門羗公顯號也而曰康叔塚殷溪明表也而稱太公泉共城伯國也而曰叚天子城趙越太守也而曰越王墓淇口㑹亭也而曰衛新臺崗名博望而祀張騫山號仙翁而歸葛氏眎獲嘉而曰故城以頓方而作頓丘枋裏而為枋頭而又汲水湮而無聞金堤蕩而失據其甚則白圭訛而為鷄黒麓謬而為鹿迷惑忘返以至於斯可勝嘆哉是皆吾平昔欲正之而不忘者也吾老矣終當畢此一事付之青箱無幾先君捐舘雅志罔就嗚呼痛哉中綂建元之三年予自堂吏來歸閑中紬繹經史得先人所藏遺書淚灑行間愾歎乆之曰精爽不昧有継志述事庶少慰爾於是聚書一室研精致思蟫蠧群言外則訪諸耆宿雜採傳記碑刻復為按行属邑以覆其所得噫汲雄望也自康叔迄今幾二千餘歲其幽光潜徳靈蹤盛蹟随陵谷起㓕不可殫紀徴文獻則墜簡已亡懐舊俗則髙年無幾瞻言丘壠旌紀寂寥不肖何人能發越其間哉然先子遺教不可墜也良史所載傳信後也故特取其人物政教風俗関於治乱為後丗之法者群分而類聚之復著辨論等篇凢若干卷題之曰汲郡志曰郡者何包上下而言也書成因自笑曰諺有之家畜弊帚享之千金其不肖之謂歟然非敢示諸作者庶幾來者志存肯搆其治梓作室以是為樸斵坦墉之始丹艧墍茨之本可乎客唯而退時至元丙寅秋九月重陽日引㑹玉簮花詩序玉簮花之名品也然唐宋以來騷人賦客歌詠不多見豈花之種昌於近代歟較其繁昌在京師為㝡盛豈花之性憙涼風土使之然耶當其庭軒暑退幽砌涼新翠筳髙聳瑶花盛陳湛露氣於碧霄映仙姿於月户素影以之輕盈芳心為之容與至若肌膚綽約來姑仙也緑雲婆娑墜曉鬟也幽香濃逺眇不知其幾許也其畏景便隂低昻倚佇意韻飄瀟如欲輕舉所謂玉華同駕紛簮導以何翩風標可人占髙秋而所安神不為之餒而敢告来者能永遵儀法不惟徳歸於厚有以見吾皇考継述啓迪之方祖妣承家守節揚厲無窮之意也至元三十年夏四月翰林學士中奉大夫知制誥同修國史裔孫惲百拜而為之序南陽府瑞芝詩卷序天地之大氣無不周也其至和純粹之極随徳感召而禎祥之故應干上則有卿雲景星發于下則有醴泉朱草芝為物尤瑞然産之不恒秀之而特異者盖不一二數焉完顔公尹南陽之明年有芝産於方城民家凢四本誠秀麗而殊常者也其駢枝連葉突如雲興幢然盖植有累至十六七者英華韡曄顔如渥丹可翫而愛郡之吏民視履考祥奔走庭下咸謂公視事已耒行有以召之故也如役使時而田里安賦歛均而物情允疲痏者為之息肩方苞軆者使之不天是慈祥愷悌之方拊循惠養之實夾洽備至感召休徴物効靈光者也公曰方今王澤下流皇風逺暢意者仁厚之化行乎江漢域者衣𬒳草木昭回光而為開先之兆也昭昭矣予何敢以當之即篚置以聞衆復曰非常之瑞歸美於上臣分當然弗産於鄰郊它邑而呈祥於提封涵濡之下不蒸於顛枿棟隆而擢芳於陂澤野人之圃亦由布宣中和導揚徳化下克靈承之自也是不可無聞於後遂繪彩靈姿求太史紀瑞者属之俾上以頌天休滋至之繁下以見郡守惟良之美適余将事在申因其請楽為書諸卷端文府英華叙僕自弱冠時從永年先生問學先生以科舉旣廢士之特立者當以有用之學為心於是日就通鑑中命題或有其義而亡其辝或存其辝而意不至者課之以為日業雖云此何時也然觀多事之際斯文有不可廢焉者小子其勉旃及長年以来綿歴丗故愈知先生之言為有徴至元三年予自魯返衛居閑痛悼堕窳日以書史振勵厥志因覩古人臨大節處大事征伐號令渙汗云為之際含章時發以之功業成而聲名白者良竊慨慕焉遂断自戰國巳上迄于金取其文字粲然適用於當丗觀法於後来者得若干首題曰文府英華非敢妄意去取第類集以廣怡說其或從事力列属辝比事庶有効於時寔自先生之教之中来也是不可不序四年丁卯秋孟三日引宋緫尹母夫人慶八秩詩序人與天地叄所貴者生所欲者夀福全徳邵此又夀者之可楽也予䆠游燕朔接丗家甚多至於享髙年之安具五福之慶者緫尹宋君母夫人其一也夫人姓魏氏濟南人出膏浸醲薫丗爲名族及歸處士貞順儉約𬒳服僮僮早夜以中饋是承處士姿冲適楽易以文儒重一時爲中令耶律公所知憙賔客楽施予尊爼談詠有承平故家風味故軒事填咽鶴盖交隂於門者無虚日夫人躬儉内助壷儀有則賔至率撃鮮供具佳肴名醸齊㓗嚴整未常計家有無俾不足於賔所也處士甞與客語乆夫人適幈户間有所聞客去即曰直諒易言我雖誠人則有愛悪焉再思可也其順成輔佐君子至意類多此子四俱教之讀書雖出就外傳庭訓之際以孝悌忠信為主曰孝者行之源悌者順之至忠者臣道之極信又朋友所湏以成者立身揚名本其在於是汝等敬之勉之古稱隂教有助夫人之謂也長曰漢臣河南府路緫管忠勤長厚不類今人次魯臣愿而克家恬於仕進次唐臣才碩有幹局侍儀司法物庫使次楚臣博學多藝能有處士風上邸潜時以琴阮侍左右有年今以致養日嚴為事夫人今年壽登八秩康寕精爽髪微艾容睟然飲啖如五六十人歲時拜慶子孫滿前斑衣彩䄂鴈行玉立其團欒香火之情雍肅閨門之化融融洩洩萃於一堂之上不謂福全徳邵可乎吾是知召南美化本於正始而有麟趾鵲巢之應洪範之九五根於攸好徳一言而夀為五福之尊禎祥有自於宋氏槩可見矣求諸公賦詩歌詠其所貴可楽之羙屬惲而為之序緫尹湯侯月臺圗詩序蘇門山水明秀為天下甲盖有東南佳麗潇洒之勝而無卑溼蒸炎之苦誠中州之江南也湧金門外西南行三里而近曰蘇氏别墅中有大石月如周列座鼓八因得名曰月臺其形勝大槩溪環竹外山倚雲旓空翠湖光動盪無際蒼烟白鳥容與鳴集渡野彴穿林篁而入中鑿蓮溏削方洲􅌟亭其上青梅蒼檜四面間植竒花異卉繍錯其下牡丹臺酴醿洞又為東西别圃春則醉其香夏則清其暑秋月可翫冬梅可探而賞也四時之景皆新而其楽亦無窮也暮春𥘉郡人遊歴始于百泉曉翠經柳湖雙塘梅溪而南迄焉止息故共頭月臺寔為一方首尾之冠至元丙子春予自晉東還取道共城友人於焉觴予為一日留覩其廢磑修復堰蹊髙敞雲烟竹樹光賁疇昔詢之知為府尹湯侯易而主也是年冬與湯㑹燕出所繪月臺圗且曰爲仕䆠牽率罔獲徜徉其間以遂𥘉心今欲求諸公題詠庶見其素藴雖南北東西時得展玩猶一到其中也吾子爲我序之甞念天壤間佳境幽人勝士樂之而不能有豪宗貴族有之而不暇樂三十載間吾見此四易主矣不知當時賔從輪蹄凡幾徃返得窮雲烟魚鳥之趣彼幽人勝士暢情適意不以物之有無爲楽而貴游豪宗雖有之能遂其樂而樂方爲巳有雖然今君以才術通顕投功名之㑹膺長沙方岳之寄而能以此爲懐豈他時倦游知止之心急流勇退之舉将張本於斯歟十四年上元日序博古要覧序予性澹癖無他嗜好獨扵古彛噐愛而不置雖造次必摩挲瞪視辨其銘欵為何代何物間有所得則悚然起敬想見當時氣象令人有不能巳者弟所見不廣䆒其義未詳耳十四年春余入翰林四十有七日侍左丞相耶律公扵玉堂坐間出宣和博古啚三十卷示予因假以帰與院史趙復取鍾鼎韻歐陽子薛尚功欵誌吕氏博古李羣舒考右等圗㕘讀而莭約之觀其制作之精㣲錫用之所以篆籕之古而不苛文章之雅而不廹取物象形垂儆萬世其為法深且逺矣因念三代吾不淂而見之淂見是噐斯可矣矧㣲辭奥旨引㩀攷證扵粲昭著生平所疑前賢或闕而莫可致詰者一覧而盡得怡然理順渙焉冰釋筆削既巳從其類而作若干卷題之曰博古要覧客有過而笑曰子之學弃俗尚從寂寞惟恐其不古也其如適越而冠章甫何予應之曰不然方今明天子御極神聖慈武撫四海而有之禮噐縟典将維新是啚一日告功神明郊祀饗献之禮行有每事而問者拠所淂而告之曰此鼎也彛也卣也匜也爵也罍也犧也象也如是而已其扵魯兩生間安知無一日之長乎客笑而退扵是乎書以為序書畫目録序豋崑崙之墟者知宇宙之大臨滄海之渊者見魚龍之富故達人大觀必扵物之所萃而致意焉乃䏻竆古今之変極天下之觀否則與管窺䓁耳若夫厯代之法書名盡唐以太宗嗜好之篤宋以徽庙躭湎之甚搜訪百至品苐装潢比三代傳宝至陪塟昭陵閟蔵内殿仍置官典校署之曰秘省何其崇㢤當時自非寵錫貴近賜觀諸王思欲頍首一闚胡可淂已且唐迄今五百有餘歲幸而存者又無㡬唐亡而五季宋殘而金源氏金滅而國朝興其間兵乱相継散亡劘烬又不可勝紀聖天子御極十有八年當至元丙子春正月江左平冬十二月圗書禮噐並送亰師敕平章太原張公兼領監事仍以故左丞相忠武史公子杠為之貳尋詔許亰朝士假觀予適調官都下日飽食無事遂與左山啇台符叩閤披閱者竟日凡淂二百餘幅書字一百四十七幅畫八十一幅怡然有所淂冲然釋所願精爽洞達滯思為一攄所謂升崑顛而見洪荒之大俯𬈑渤而駭光怪之多也嗚呼三光五岳之氣緼絪盤礴發扵人為精華傳扵代為英物以数百載萃聚韞蔵之盛積而為崇丘澮而為渊府一旦顒顒然拭目而觀可謂千載一遇也因念人與事機其㑹与否皆有数存其間九年春予一夕夢謁平章張公名易字仲一太原人扵府苐之東堂酒数行發書一櫃示予皆彩啚繪本金文玉牒今觀中秘所有璀璨輝赫與夢中所見者盡同吁亦異㢤傳曰嗜欲将至有開必先信㢤斯言也作書盡目録序故翰林斈士河東南北路宣抚使張公挽詩序歲甲寅冬先生𬒳故經畧史公至過衛惲以諸生贄文上謁承顧睞獨異逮中綂辛酉先生自河東宣撫改授翰林學士兼中書省叅議其秋惲亦以都司就列機務之暇接論思殊欵至元二年公以前東平宣慰起復簽山東等路行省事適惲從事在魯又奉間燕者兩月六年已已冬不肖應御史辟出真定候公於頥齋尊酒從容言笑竟見因及西臺故事時公精力未衰慨然經丗之懐尚眷眷不置也厥後惲官平陽飫聞公填撫時政績章章在人心不去者甚悉私念自甲寅迄壬申歲廿年間與公㑹合者五聮事者再似不偶然也故知公為頗詳公資剛嚴有經濟噐業遇事風生果於断劃其庭議剴切矯矯有長孺志節至扶善良嫉姦悪又似夫王義方對仗時辭氣生平素藴在河東展也盡至今三晉間愛仰如神明乃以霹靂手目焉雖時致齟齬其耿耿自信不疑者氣終不少下公殁后三年甥王革來過追惟疇昔愴然動零落丘山之感余亦爲歔欷也想遺直之不復悼斯文之如綫勉爲哀挽庶荅顧遇知巳之厚且代封龍招來之此二魂而有靈鍳兹哀悃公字耀卿姓張氏太原友城人早舉進士聲藉場屋間旣而以臺掾進爲入儀觀秀偉山立揚休望而知爲正人端士夀八十終鎮州頥齋其自號云不書名貴之也至元丁丑秋謹序趙徳明母劉氏慶八十詩序人皆以壽為楽然使吾親夀壽而康寕兹人子之至楽也鼔邑趙君徳明予官晉府時幕從事也每與之接不下帶而存者皆和氣愉色其臨事行巳洞洞属属若持盈奉玉惟恐弗勝予異之而不及問戊寅春會京師稱其母劉氏金進士都水監勾之女穰縣簿耆徳唐甫之妹年雖髙聦明安健紉縫在手不持杖作筯力先懐逺府君不幸早丗三十年間昶曁二弟靖炳頗試所歷及有孫六人女孫二人重孫二重女孫六同居無間言是皆母氏慈愛恭儉隂教有方之力也昶等不肖愧弗能紆青拖紫儋爵析圭以顯榮為養用報劬勞之徳今歲夀開八秩将南歸省慶尚頼賢士夫見之歌詠歸慰母心以為閭里光予告之曰夀福冨貴衆人之所欲也若今之冨貴似可求而得唯夀與福命之於天不可幸而致彼髙明家雖三牲日養未免使親有顧慮可憂之慼崇髙而安者子孫多親不待之嘆今君職雖卑禄雖薄與仲弟軰怡然以志為養其樂也融融吾知案上一杯菽水過於五鼎七牢矣時也恒山之陽滹池之濵風和而晝明鳥嚶而華粲緑萱婆娑於堂背舞䄂欄斑於膝下朝而倚其門夕而倚其廬俟子之來歸君其行矣試以吾言語諸郷人而曽閔和樂之氣将有聞風而興起者焉至元十五年季春清明日序㓗古老人注難經序醫之有難素猶六經之有春秋易也書雖盡言言不極意神而化之存乎其人㓗古張先生醫師之大學也以是書注釋雖博未免有仁智殊見體用不回之間於是研思凝神探索玄奥發遺意於太素之𥘉出妙理於諸家之表使體用一源得失兩判復随其疾證附以禁忌方論述經解廿四卷先生髙弟東垣老人以其書授羅君謙甫兵後文多墜簡及得田氏口傳易水遺㫖百餘條苴𥙷脱漏遂爲完書予甞觀其㫖要顧天下之事未有不極其理而能臻於妙者矧醫術精微主司萬命惟其至精非一丗之所能俻惟其至微非一賢之所能窮故軒歧開天如大易之書其卦越人撮要猶三傳之賛其經迨㓗古講解古今之善傳注之能事畢矣誠生民之命脉醫學之淵㑹也嗚呼毉固難事學即能至至於提挈造化㑹歸一身如秦扁闚五臓而洞癥結察形聲而辨死生推原本自心融手應坐収神聖康濟之功要以理明學博精詣其極有不期然而然者其功用之實咸在是書學者冝盡心焉而太史公稱扁之術得於餌桑君之薬飲上池之水特以診視為名恐未之思尔謙甫将板行以夀其傳求題諸篇端予嘉其學術及物之外能光昭師道如是可謂知本也巳先生諱元素易水人㓗古其自號云至元十七年歲次庚辰中伏日序宋東溪墨梅圗引性之所得於天有不行而至不學而能者况託物游藝意存所寓者哉緫尹漢臣善寫梅樂之終身而不厭且梅以墨繪黯淡枯寂無聲色臭味可嗜而恱盖性之所得有不容自巳者余甞踏雪過南溏入東閤主人開樽小酌醉中出示所製溪雪春風等圗亦以淡僻故為把玩者乆之覺冷香踈影動蕩於几案門令人翛然有孤山籬落之想後考試洛陽復與君㑹府署之梅花堂庭之所植者皆是也因舉觴相属曰永南梅之淵薮又乆官於此殆將俾使君移船花光臻超然之極致耶東歸悉以近作贐予其風味之勝潇洒之工又非向時呉下矣及入汳觧裝盡為好事者索去嗚呼君今已矣梅寕復得邪其弟唐臣義夫輩追憶風流事亡如存聮綴遺墨求名士夫題詠将昭大兄游藝之美耒属引其端漢臣於余契乆且敬故知為人頗詳君天姿誠悃與人交有終始於修身齊家孝友純至一門之中融融怡怡以及於政是知託物寓意於歲寒三友之間者不徒模寫形似俾自得之趣冠時人而名後丗也十七年立秋日秋澗序新修調元事鑑序土之有志於道者當以聖人為則有志於天下者當以宰相自期降是夫何言焉然宰相者輔天子坐廟朝經綸一丗豈偶然哉是在彼者得之為有命而在我者烏得而不盡之哉况相之為任正已以格君心之非進賢以盡知人之鑑理物以代天地之化以成天下之務尤需以學術而為之先若不學無術則闇於政體是最大臣之所深敝故賢如傳説典學𥘉終聖若周公思兼四事逮夫叔丗多故大學之道不明於上爕理化為權衡論思變成機務相之徳業其所存而不亡者幾希矣此事鑑之所以作也嗚呼三代而上如禹益稷契其謨猷徳業光極臣道日星麗天尚何議擬故断自殷周巳來終之近代上下千有餘載間其相之賢否具列無遺俾歴朝之用舎一代之安危前後鱗差易於即見至若善或當與詳其所可法悪或可奪書其所由然凖以䕫契伊周之所行断以孔孟諸儒之正論間以臆見附之要本徳學材識公明正大以道事君為事業經綸之最至如遭際聖傑不善更化祇以權謀功利為尚雖濟一時而不可多得終非鑑之所先務也僕老矣壯而所期見於丗者百不能一必故朝夕覃思是編庶成一書亦畎畒不忘之心也俾後之君子有志於斯民者識前言而明治體稽徃行而處事機其於衮聀不無少有𥙷焉至元二十年歲次癸未夏六月十有七日序顔魯公書譜序古人以書學名家者甚衆今獨取魯公而譜之者重其人以有閞於風教故也兼公之書上則闚三蒼之餘烈中則造二王之微妙下則極古今書法之變復濟之以文章氣節之美故後人作之終莫能及東坡云評書兼論其平生苟非其人雖工不貴昔莆陽鄭樵甞集公代有金石刻得七十有五予之耳聞目覩洎有其名而亡其書者得六十有二備録家藏實有五十有一只以憺僻酷愛營求三十年之乆纔所得如是念其嗜之無力自非夤縁物聚於所好亦巳難矣嗚戯公之書今存於丗者無幾加之歲刓月敝有劘㓕而已可勝惜哉若夫千金之璧為丗重寳人能碎而不靳者以求而可復有也若公之書寕復載得邪故余作譜按公春秋與所書碑刻歲月官封詳考而次第之俾觀者知公之書因物賦形變態百出其胷中忠義之氣葱葱鬰鬰散於筆墨之閒者至終老而不少衰所謂止見性情不見文字令人想見當時氣象有興起而不能已者是不亦閞於風教者乎譜旣成客有過予而問曰二王乃眞行之祖顔陳縱横曽不踰矩曷若即而爲法乎余曰不然孔子吾徒之願學也然升堂入室固當有序若即此而求臨池之妙則思過半矣客謝而退至元癸未得伏日序衞生寳鑑序醫與造化叅學之精者爲難至著書垂訓兾後丗必然之用者爲尤難羅君謙甫東垣先生之髙弟甞謂予言𥘉授簡席下東垣曰汝将爲爲人之學欤聞道之士欤請曰走雖不敏幸䝉先生與教理之深詣廼所願也故十年間雖祁寒盛暑親炙不少輟眞積力乆盡傳其私潄不傳之妙大抵人之疢疾不外夫隂陽変徴我䏻叅兩聞㑹一身推窮其所受根源方爲可爾用是以所得驗於日用之間如敵在目中然後審薬為攻未甞不如吾之所必取也因集為一書題曰衛生寳鑑曰辨誤者證丗之差謬明其理之所自也曰擇方者别夫薬之精粗寒燠以酌其疾證之冝否也曰紀驗者述其巳之拯料與彼之深淺見其功効之實也僕平昔所得者如是吾子其為我序之予聞醫之為學右聖賢致知格物之一端也軒岐巳來難素靈樞等書累數千萬言自非以醫為巳任者孰克而䆒之若羅君者可謂以醫為任而䆒其理之所自欤昔王彦伯醫聲旣白列三四竈煑薬於庭老㓜塞門來請彦伯曰熱者飲此寒者飲此風者氣者各飲此初不計其醻謝今羅君亦以道心濟物復能著書垂後兾必然之用其仁心普眼當與彦伯同流其誰曰不然故樂為題其端云至元癸未歲清明日序王彦伯酉陽雜爼云唐人為道士善醫術秋澗先生大全文集卷第四十一
