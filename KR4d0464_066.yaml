body:
  text: 憲司針肅肅憲司虞夏九牧其在漢唐刺史都督控臨百城靡不約束既重其權匪輕所責治弘務簡望隆威赫有臺閣清嚴無州郡急迫繡衣四出輶軒金莭命服有彰非爾徒設奉宣詔條巡省按決官之邪正政之得失酌汝之言以明黜陟俗之媺惡民之休戚恃汝注措以安以息國有重典越惟刑辟圜土幽囚肺石冤抑仰汝審察哀矜致恤毫髮或差追悔何及剛不可憚憚則氣怫弱不可欺欺則衆忽事無避難避之愈集法毋情破破之有窒何以處之必正必式一有私萌力為之克如松斯貞如鷙斯擊其嚴秋霜其平砥石是乃邦之司直我玉無瑕彼疵可録志行氣伸吏畏民服一道清寧乃稱所屬其或暗夫大體苛細是燭較利害之孰夛至首尾之畏蹜甘于慵身計日而祿官謗逭顔厚有忸爰作斯針敢告司僕言針語戒過繁先期我動躁輕易違理取勝過慮思邪言之不有害于用審察安詳時然後應一出于正其或不然自陷於穽念之之忍針忍之為字以刃加心少或弗隱其傷必深家府維挺挺而全謂豫平生半在官聮萬變前陳履薄臨淵少觸與競其心即燃自救弗暇理何有焉量汝之性以忍為先惟忍則濟欽哉聖言銘楷杖銘并引孔林之木瓌異者為多魯人世不知其名者蓋夫子沒弟子各持其方之水耒樹焉在枌檀毚柞中名殊顯者獨文楷耳前朝斫之板持以備新進之儀豈思其人重其文敬其手植之意也歟𬗋陽公携二杖過衛一以贈豫因識其楷之所以為楷也如是吁昔而簡今而杖用雖不同至於重其文敬其手植之意一也銘曰體堅而微色正則瑩庚庚其文挺挺其性本根傳万世之芳枝葉蔭百王之聖斫而杖之以扶吾道之衰兮庶由乎義路之正且豫年之方盛是不可施於其鄉兮復將弊蛇妖於異日于以叩原壤之脛惟桑與梓必恭且敬矧吾家之草木敢不同甘棠而加愛兮故賡之以舞雩之詠檳榔杖銘體堅而柔莭促而澤赤藤桃竹非所狎兮青蛇奮蟄腹紋鱗鱗入手滑兮質挺炎德出入有聲豈特鏗瓜甲兮堂堂許公國喉舌兮杖而登朝表孤節兮是將代太尉之笏擊姦慝于未孽也芝枕銘并引豫觀神農氏之經芝之種有五焉紅者如珊瑚青者如翠羽黃者如紫金白者如截肪黑者如澤漆光明洞徹如氷之堅五嶽之山産焉後之以芝名若是豈柳柳州所謂天澤餘潤雖枯枿敗腐猶能出芝􅌲以為瑞物是枕之芝或間産名山或蒸出枯枿豫不淂而知也但不斤不斫底平面傾犀文外繞疊成枕形誠可以薦牀第而承幽人之憩息也銘曰體似重而輕性似柔而剛豈顛木之餘枿薦幽人之野牀質似芝而秀文似犀而光果齋房之瑞氣化竒形而不忘但髣佛兮一枕之妙至於為芝為􅌲吾不知其物化之常秀比連葉清凝寢香枕或強名用適則良俾欹之藉之勿邪其所思兮是可以夢周公而接羲皇也砥柱銘水之為力無物不從津門之險壯夫砥之為雄洪濤西來萬夫前攻而戰而薄我當其衝狂瀾勢倒安流而東屹嵩華之隆崇也吾儕小人弱值淺中衰俗外群邪外訌苟內省而不疚有碇心而直吾躬也金銀沙二泉銘山之清潤澤氣以通兮坤之靈秀醴泉以發兮太行蟠亘元陽所軋兮天門左界二泉並渣兮巨鰲背鑿寶藏泄兮靈淵奫淪海眼徹兮泓澄一碧金瓊屑兮全流石爍爽氷雪兮雲煙藉潤為改色兮酌而瀹冷冽兮挹之薦帝明水潔兮淋漓膏液輔天缺兮女媧錬石用不竭兮夸娥弛簷濯困暍兮七賢尋盟醉達兮幽響傳谷鏘瓊玦兮山空月落仙人揭兮生肥悟真訣兮我銘勒石泉不涸兮端石硯銘硯之同功甲與鋋試之敵場惟利堅其或不爾安用焉鳴呼此硯穹而圎神黿足跧舌有泉既利我頴墨且便青州絳州何所賢題品入格因公權處士或托斯銘傳默齋銘語寂滅者涉于絶類談自然者入于虛無嗚呼默乎其天地閉賢人隱括囊無咎無譽者與至於明良相遇治具畢張一言而可以興除者如宣父夾谷之盟孔明隆中之論茲吾儒之事也豈淂退藏於默乎豈得退藏于默乎間邪齋銘意嘻是心既岌而放內閧外膠靡不馳嚮忘返從流于焉板蕩維禮與義以戒以懼存之以誠為間之具有人于斯言動視聽庸信庸謹造次於是成德雖中慮萌邪侈一念或非為姦所餌易演文言一間大焉一聖心權輿於乾譬海乘載一碇能安如馬泛駕則旋險去而夷浪平斯淵彼碇與勒曷能舍何李侯周防未然操心知要惕焉拳拳言信行謹其庶幾一誠存中太山可移素聖賢同歸洮石硯銘吁爾洮水中沚翠欲流礪于砥考之譜端歙齒波及余古月子斫而泓堅澤玭孰為尸王御史玳琩龜洗銘醫月槃漢洗器制爾形從相類漢維魚我龜賁取彼壽綰元氣宜子孫傳後裔銘者誰王子系訥齋銘堪輿兩間事變靡極成始要終非言莫立玄聖垂教訥言為先匪曰終默時然後言喋喋利口返為事愆覆邦亂家身溺于淵猗郜君內思靖顓一訥銘齋浩浩其天人亡道存實大其傳尚來者而恪守猶丹書與湯盤也文貞公笏銘呈竇學士公家物唐有天下垂三百年于粲者貞觀之治焉其效蓋仁義之一言世之望公三辰在天是則公之德何俟笏而賢耶銘存物亡實大其傳則是樵之文伊笏之曽玄也猗歟竇公國老之元神物有歸寶之几筵安知無望壠而求後因甘棠而思邵伯於燕者耶仙臺金迹硯銘為宋少卿弘道作盤盤嘯臺一碧千尺湛月露以洗空隱松風之瀟瑟仙遊何之留此真迹斫而硯之是將晦靈蹤於翕歘藉玄雲而掩扣神物有歸蘭臺之客會登玉淸蕩空碧斗挹滄溟醉憑鰲格拂海苔之霞箋揮仙火之巨筆也楮都護銘漢開西域國三十六中置都護控制約束強凌弱折乃有攸屬我嗜群經視為席珍翻閲不時未免絲紛亦作護府仰兹楮君統之有要無相奪倫侵損日逺緝㷩日新插架安書曰史曰墳勒銘于上䇿燕然勛太秀華銘丁生贈余湖峯一株頂足背面蒼鱗隱隱渾然天成無微竇可隙植立几案間殆與頎頎君子相對殊可玩也昔元㫪陵作榱溪柸樽等銘命名既異垂戒又深豫嘗讀而愛之因銘茲石仍掇其義片石何狀天然自若鱗鱗蒼窩背露蛟鰐一氣渾淪略無巖壑太湖凝精示我以朴我思古人真風眇邈變詐百出孰知誠確心深洞府混沌六鑿剛健篤實君子之質惟其似之是用比德嗚呼安得誠天下之意如兹石之挺特也書厨銘至元十七年八月三曰夜與子孺燈下觀丹書銘因擬而作此置之于室胡若載之腹也名汝曰厨以其無不蓄也腹至於餒返為汝所忸也子其戒之惟勗鸚鵡啄金桃研銘大名劉揔尹求豫作忍濟堂銘奉此研見謝翠鸚啄桃翩欲飛去棲影片洮以慧之故藝閭風簾疑若與晤助彩毫端辨夫詞語捶黃鶴而倒芳洲賡正平之賦邪復明辟而以夢諫草梁公之疏也菊井銘余到官兩月移居司西官舍治舊井而新之方衆菊爛然擇其佳者植諸欄傍因銘之曰菊井其辭曰養而不窮者井之德也服而能壽者菊之靈也我潔斯井岡羸其鉼彼窈然而深泓然而澄蓋南山之餘溢乃濟清而未名思欲沉浸醲郁皆菊之馨庶幾西河南陽之意仁吾民而制頽齡也冬藏圗右銘太極中分有靜有動氣與理錯未免交閧孰盡聖哲不思而中思而或邪奚翅荒縱理明伊何精一為重間邪存誠彂而可衷內莊全體外致吾用早也奚思尹則孰覺一洗妄心盡易前錯學孔之學樂顔之樂華去實存玉礱石斫道最中害或輟或作不學而衰即成枯落念至于茲立敢不卓靳惜分隂守之以恪敬入為門輔我不及足豈三餘日新一日動靜云為是為之則敢告靈臺服之無斁左針其目曰定力以固窮為冬藏圖作天運循環有泰有否人生其間乃一氣類乏財曰困弗通為塞苟遇不安習坎而厄自昔君子器藏俟時出門有礙吾將安之仲由愠見阮藉窮哭惟昧困理于臲于􅑶安之有道説不徒泛堅我㝎力不容少濫氣養以剛志明由淡少焉墮昏亟為澄湛衣弊服緼一溫而止飯糗茹𬞞一飽而已茫茫厄臺悠悠羑里文明為夷孔玉櫝毀聖賢猶然况弗至此我道未亨克念終始敬義齋銘維天生民卑之者全氣有澄滓因之以偏惟聖立極俾復其天困而弗學民斯為下甘彼顓蒙時有不暇間有知悔或窺厥竅遺緒茫茫又昧其要大哉文言聖學之宗致力兼輔蒙而聖功一敬內主義須外充凡百君子有云有為行而冝之心宰物隨秪直而莊匪方於動事物之來未免變閧惟其夾持務成德尊既銘吾心復書我紳始終是則日新又新垂龍圗銘所翁姓陳氏福州人嗜飲恬于仕宦善圗龍見知於宋理宗嘗以商舶越海與真龍遇自是盡其情狀其作也必乘醉潑墨為之天機所到非學而能殆邈槊之噀墨法云醉墨翻雲族聚所翁圗龍與真遇黑風吹海作太隂太火出山雷奮豫是將執雨機而飛天侭滂沱而洗吳楚宿雲軒銘并序吾友中丞王君買宅蘇門得竒石一峯厥狀雲如靄然輝應於庭户間甚可愛也因名其軒曰宿雲徴文于余乃以是文表之其辝曰眷此來雲態度容與觸石而生與石為伍宛𬒳南山宿我庭宇主人名軒其義安取是將停藹譪之容為思友之故邪伴東山之卧抱濟時之雨也雲兮雲兮出兩者之間固無心兮其從龍也須以時兮吾豈欲度之以自潔徒為怡悅而巳邪水晶筆格銘玉瑩氷清太陽之精孰琢肖山之形鎮我几案虛白夜生息我矛矟摩壘之聲空明洞徹爛氷峰之孤撑物有形似吁足可驚若倚之而固寵旭日巳升恐潰釋而摧崩也頥軒銘為洪同簽作堪輿兩間物所充兮而長而養一氣融兮人惟法天浩焉同兮頥以象觀四隂內訌惟養之以中正不我舍而彼從是以得終吉而在躬洪公孕秀海山沉推其材足以經制其量足以含弘贊翊樞務既貞且忠故謀謨應事機之會談笑折尊爼之衝不恃全美方致養以為功果我枵腹以正以沖虎耽其視而始而終見寒思煦恐邉衣之未備寸膚失養念一士之或癃扁吾軒而匪外飾起居飲食在日用常行之中吾將養已以及物致事業於無窮是知大易乃萬世之龜鑑尚何俟授一編于圯上之翁也愛菊堂銘草木之品色中氣清有隱逸之稱唯菊為能含精益齡晚而芳馨又類夫君子退讓而不爭圯橋老仙友而堂名雖墮履之弗進亦足以卜幽人之永貞華構傳芳三世相仍其孺慕也孝凝然心深而愛中樂不勝口欲言而不能自鳴者此郭氏之所以尋盟也若夫平泉草木固護封植亦克厥承是或一道終未極愛之之至情親存親沒觀志視行曰如其道終身是程嗚呼郭君至性愈色豈得於尹氏者拳拳而服膺吾今取為銘以告草堂之靈安知不入户聞愾然之聲也邪虹霓硯銘并序趙太傳彥伯出示𬗋石大方硯請銘余以石有竒雯類虹霓然因以字之銘曰蒼梧雲蒸九疑􅊜碧海風濤翻出日江山通秀鬱𬗋煙産此珍材比玉德金繩繞腹泄精英電激神光掣蛟室雌霓斷影飲丹池暮雨連蜷一千尺號泥鄴瓦稱善墨石中乃有此竒質子墨客卿尤所惜大竒多自米家船入手摩挲三嘆息趙君文彩珊瑚鈎禮樂縱橫供夢筆左招協律揖孫通出入英莖五音飭楊氏雕玉寶章銘并序故參政楊公之子勗家藏漢雕玉印章二方者丞相吉圎者太尉震也其博陽章即乃祖息軒所傳故物大定十二年崔憲可詩序云長安許惟寧以是博祕監畫于闐花驄圗得之嗚呼二公以通明正直師表兩漠今去千餘載其風烈凛然思其人而不得覩物增慨乃為作銘士桓博雅好古今為集賢直學士庶幾能紹其家風者漢丞相博陽矦丙吉印銘吁寶章才寸許紐玄龜綰漢祖隸為刻見邈祖神物護照千古此何夕得摩汝恍坐我丞相府𥘉望氣郡邸圄詔夜殱拒户樞是雖天公可無偃柳興將舊圗乳褓恩其可辜獄有牘祕不舒是章緘金縢如歸有數子與俱十襲藏無太踰防有光夜衝閭六丁取嫓貞符在博陽宜特書漢太尉司徒楊震印銘伊弘農漢巨儒道自任聖為徒主鱣堂閲群書表氏諱兹為符位台鼎綰國樞赫漢炎走羣貙堂堂氣忠義軀四知金厲貪夫殆是章玉不渝內寵橫哲人殂與雀環瘞幽墟見白日歸子𥙿世失系紛莫區伊莘楊豈公莩苟不爾胡為乎致大鳥止丘隅淚如雨洗冤誣佩之行可舍諸我作銘此嘻噓張指揮甘白堂銘我識先帥于清之野緩帶輕裘投壷歌雅伊時張君侍立親傍虎豹在穴已炳其章及將羽林肯構其堂榜以甘白于先有光試嘗聽其言論諒天姿之殊常是將調和衆味羮傳鼎之美邪彰施五彩絺上公之裳邪噫吾説已竟必一居於此恐德業之未易量也忍濟齋銘改作為楊子英題多變而莫測者事機淺深殊迹而難度者人心善惡我據事會忤激交作彼以機成客氣外鑠或當懲而乃忿可理遣而反愕隘不自容事安能若因小端而致大亂又奚翅九州之鐵而鑄一錯也理貴含弘量崇濩落功若與即是心先怍言不可出我舌為齚故堅伺桓門者收康濟之功俯出胯下者辦戡㝎之略宜成王之戒君陳見周書之噩噩海印奎星研銘宋祕監弘道索賦詩𬒳東宫旨編莭丗宗實録奎麗空文之宗秀孕石與歙逢礲而研以類從海有瀾穹浮蓋印天光終古在拱前星問有待霮玄雲集毫彩酌前言作帝誡歙石壁研銘并序至元癸未歲正月二日謁左山先生坐間出茲硯示客僕以形質異常略狀數語公喜甚曰汝言殊有契豫心者吾子其為我銘之銘曰玉德而金聲縠紋而紺理湛兮虛見明生於旁魄恍兮惚疑璧投于山鬼玄雲橫馭風生燕几顯諸用起經綸於心上發餘輝綰秋蛇于筆底是則公事業之美也我將靜濯碧空洞徹表裏觀春雨之散絲似啇霖之復起也醉仙石銘為韓通甫作爬髿蟇緣蹣跚鱉跛化而醉仙蓬首不褁傾欹落魄對客裎祼惟不適用得脫秦火黯桂樹之秋香普故宮之青鎖推墮人間無可不可頑碧凝蒼肩神垂嚲留賔筵而盡餘歡每蹲蹲而舞我也殷乳銘并序韓生弘以瓦鼎示豫制極古而可愛余曰此從何而淂曰淂之于帝辛之故墟然不知其為何制也余曰此殷之乳鼎也即為之銘曰惟殷墟廢巳久代所居止野叟殁而葬此何有其為物故啇埴千年後見白曰乳至四冝蟄蟄萬有生皆此出取為形穀瑑壁嫓龍觚飲而食秋澗銘渾沌鑿韓生藏深夜壑後來者見必作贊老人星贊月帔雲衣金支翠旗御星騑而􅓸沆瀣騰淵䊮而表明時爛祥光於萬文湛南海之清輝我見我出為瑞為禧厯朱方而朝北極祝皇夀之無期何南山之鞏固等旻天而峻齊然後廓夀域兮無際挈斯民而溥躋倚蓋霏霏蒼茫曷歸貝闕珠宫群仙與嬉歌東皇而逺引隨升降而入氣機但天容海色渺不可以涯涘兮眩朝日之重暉先君思淵子畫像贊德之厚其所受也全學之博其所守也專材刃恢恢利周物先占氣斗間世之龍泉卒之臨大事以益辦曽何以惠文而為賢望之儼然即之溫然治之隆汚持衡以權一言吏師世有可痊孰謂神而化之之妙杔丹青而可傳耶王內翰寫真贊捴管蕭君出示承旨內翰寫真木庵師題贊其上似有所未盡者因為之贊云充氣之粹兮與材無忤靈襟之廓兮以道為腴延譽在龍門之上視草冠玉堂之廬及其物則見百里之寄其托輔則可六尺之孤天步改玉婆娑兩都悵蒼蒼之秋色欎喬松而未枯尚能賔扶桑之出曰振人文于燼餘見之丹青清風穆如人徒知百年之遺老我以謂中朝之巨儒彼晬然而容盎然而春見于眉睫之間者固非山澤之臞也耶鮮于純叔寫真贊遙遙華胄卋靄令聞沇水之集其源奫淪老成雖逺而典刑今見于斯人髯踈而秀心吉而仁藤白而冠紗烏其巾豈見夫身外之身豫但知仁者之必夀其風姿落落百歲猶畫中之真也麟匜贊吸嬴匜脹豕腹背負厥角挺竒骨列太階職盟滌今歸于我研與匹薊門市南冬日淂蒼溟之波浩無極挹彼注兹泚我筆姦枿誅絶旌直德子孫寶傳金玉式桑泉老人畫像贊德與學専行為卋傳是之謂有年雙瞳炯然蒼髯戟然人目曰山澤之仙庸巨知抱長孺之直甘骯髒于門邉者耶范文公畫像贊堂堂范公三代之佐致君澤民盡夫在我曰義與仁經綸之具篤信力行曽不易慮受知𥙿陵千載一遇其施幾何貞我百度狺狺羣言激公而去天下之事匪材莫為遭時冨材中靳固之治止斯耶由數竒耶再拜公像涕洟咨嗟乖崖公真贊堂堂益州元精之傑用智馭權以氣逹莭在德克剛得吏之訣其救時也若乖崖而極經綸其擲姦也不鉤巨而洞窟穴噫太華之雲清淮之月豈無間心大厦火爇較以出處此兼善而彼獨索冝公平生日新事業皂裘褐衣有將之威我拜公像清風凛而悠悠九原愛莫起之吕仙翁真贊合道陵祕府物今為王簽省家藏元精貫中老不息先生煉形與之一氣機出入我所乘世間甲子管不淂有時變現稱劒客三江五湖風袖碧江雲紅爛嶽陽樓醉飛星馭鞭金蚪騎驢歘上長安道來看西風渭水秋古人事業垂不朽八表神遊欲誰友乾坤况復一洪爐萬古消沉竟何有先生遺照滿人間已是真筌不死傳只須袖裏青蛇氣夜夜人驚在斗邊駮華驄圗贊并序馬之有駮猶人表之異常也昔骨利幹貢馬百匹中有駮者太宗愛之親為製名曰決波騟又秦胡公有乘馬號忽雷駮此馬毛質時異豈骨利之遺種歟故供奉官圗形以獻見方物一峕之盛云吁神騟骨相殊振蒼雲散華軀供帝間馭虬鬚厯八極塊清都非所覬三品芻有物制噤不舒絡青絲伍髯奴終奮鬛躍天衢君無癡茲畫圗填星神像贊坤元之精積而上曜厚載之德至靜而妙爛然黃明有歲之兆僧繇像之其神杳杳冠著牛首類其順也手綰方玦取乎填也非夫知鬼神之情狀者何以則其奧隱也二十四大儒贊并序堯舜之道淂孔子而後明六經之旨俟諸子而後彂逮秦火燔蕩先王之迹一向熄滅而天理之在人心者何嘗有一息之間斷哉漢興諸儒挺出如董生劉向孔安國毛萇楊雄號稱鴻碩斯皆摘奎之光發輝孔壁探聖之幾耴訂口傳致興學立官文風彬彬可謂盛矣然六經之旨有師授而無傳著東漢巳來師説並行馬鄭賈何服虔王肅之流罔羅衆説正誤刋繁流藻箋注復使聖道粲然如大明當空蔑不耿昭以之斷國論建民極有不可斯須離者至唐踵七代之衰理弛文弊道統益微及韓愈氏出以道濟自任隄障末流廓清義路蓋皇皇如也故人儒位置終之以昌黎伯者良以此歟若夫三才彌綸元化前世比圖像列配神庭為不刋之至元癸未冬十月齊府廟宫兩廡繪事告成明靈儼然如在爰作贊文昭揭于上庶幾乾端坤軒豁呈露聳齊人之敬為邦家之光也左丘明麟經垂憲百王是懲素臣筆傳日星益明文開史統卋咀華英儷景同翻未播休聲穀梁赤封襲丘伯聖道群用見有深淺赤也明經辝清義婉漢儒推轂大開學館繼我國政論益光顯公羊髙封臨淄伯麟出魯郊筆終史削公一再傳若聆徇鐸冝其資深裁辨辭諤折衷群疑匪斯孰托荀卿封蘭陵伯金聲絶響詭辨縱橫蘭陵著書吐辭為經憤彼譎變欺卋迷民性惡之説有激而云伏勝封乘氏伯秦火驪坑儒厄斯極天不沒公俾副孔壁渾灝之義垂範後王賴公口授帝道復光照耀齊國文奎煌煌毛萇封樂夀伯風雅三百一歸無邪絃歌音眇孰為傳耶溫溫樂壽漢𥘉名家訓傳首出遂正而葩敦厚之風永煽幽遐髙堂生漢慱士封菜蕪伯秦尚法制禮喪無幾雍雍堂生當炎之始官儀國容有頠會辨澤宫赤舄几几孔安國封曲阜伯書出漢初壁傳口授古隸未兮詎免訛漏天開聖孫以傳以㝎帝制復明翼我國政戴勝封楚丘伯曲臺傳經有千其儀戴君發揮其詳可知履之則癸悖焉來違煌煌天序相我民彛劉向封彭城伯彬彬中壘帝胄惟英授經草諌力扶漢傾巳志伊欎聖學崇明鷩冕玄端山立神庭楊雄封成都伯有漢鴻儒述作之賢體易之妙衍夫太玄抉聖之心繼成法言大醇小疵其然豈然惟寂惟寞天祿之閣出處兩間其何以怍何休封任城伯髙也傳經心深而文秦漢而下莫窺其門任城解詁堅守如墨開户免脫破碎陳敵駮我漢事會歸其極鄭衆封中牟伯喧啾梁門師也威鳯志棲阿閣學明三統皇皇使華漢鼎取重諒夫通材中藏大用馬融封扶風伯扶風氣豪慱精群集賢如鄭賈執經在席暢我休風彬彬文質尚想絃歌漢南之國盧植封良鄉伯海山沉雄精貫斗極篤生大儒文武之特以道事君以經翼國劒佩赫然氣掩群慝鄭玄封髙密伯秦燔六經天理曽熄漢興諸儒臆説雜出司均網羅刋繁正誤箋注皇皇流藻終古服虔封榮陽伯卓越九江清介不羣雅材文論為世所珍任城巨敵左氏忠臣光簉漢彥蔚乎其聞賈逵封𡵨陽伯偉哉侍中好問而博通眀四經大肆厥作綱維國論張皇帝學東觀石渠光寵于爍杜子春封緱氏伯周官大典興王之迹制古辭約我解我釋入海穿深薄霄透碧品物詳明千載是式范寧封新野伯藻發儒林學淹墳籍嫉世浮虛著論詣實盤盤學臺膠庠大開至今豫章有來群村杜預晉大將軍開府儀同三司當陽侯贈司徒堂堂征南經制晉室袵席金革研精麟筆學方武庫卋號經癖有開後來理順氷釋繄公存殁戃恍靈氣我曰猶龍焉取虺異王肅魏衛大將軍太常蘭陵侯贈司空猗歟子雍英發妙年書易陽秋傳列學官制刋朝典秩煥郊壇汪汪東海載觀其瀾王弼字輔嗣魏尚書即封偃師伯龍出河圗經成三聖輔嗣窮幽乾旋坤靜漢説多門唯公取正伊洛淵源流光與盛韓愈字退之唐吏部侍郎封昌黎伯維天有文公材命丗彍義滂仁黜邪異世溺方深力以道濟百折彌堅死而後巳倒影滅沒藐不可企文中子顯允文中希聖之徒闡教河汾宛然泗洙斤斤陏文不足與事挾䇿歸來心醉經史曰魏曰房曰杜曰李學傳聖心有樂有禮貞觀至治有三代風論夫源委先生之功千古而下與唐比隆鍾氏先世畫像贊為鄉人大明作顯允鍾公肇䟢自秦金季家衛以財發身闤樓卉圃照映河濵優遊卒歲壽開八旬維嗣強矯結髮從軍奮提干將屢收戰勳釣臺雪潰死莭酬恩伊恕之父蛇化其文憤志讀書行比鄉鄰陳力漕府克公克勤是知善繼述者豈無其因不過積德與崇仁故培之厚者其發茂浚之深者其流􅔿嗚呼鍾氏之子孫能不封植其本根也趙曹州晝像贊宓子宰單鳴琴在堂琅琅玉音齊魯之鄉流清芬于異代得趙公之循良峩冠惠文貯書撑腸不竊榮而易素守曽格物而恃巳長二政兩州治績章章字民折獄仁恕內將體春陽而休煥孰知秋荼之繫昌觀兩漢之卿相自卒史而翶翔以材以術公其可方固沉底于下位浩􅚡流兮未央維嗣善繼乘驄奮􅋮慶之所鍾于焉厚償匪槐棘而就列將禮文之有光又何啻簪白筆而飛簡華之霜也九公子畫像贊史開府子名喜莊列學屢為萬夫長有時麻衣草屨以散仙自號鋭目豐頥氣貌魁竒𬒳褐懷寶有儼其儀出紈綺之間無豪貴之習抱夷惠之志蔚熊豹之姿齊物我於一致感盛衰之無時其或戴逺遊之冠甘元氣之委騎將軍之馬掃干將之霓歘生皋比玄談四馳提筆揮灑以遨以嬉斂凌雲之劔氣等尺鷃而蓬飛恥以藝進與時推移希逹人之大觀每先事於幾微與其身之外樂何若心之內怡是則散之為仙見於丹青者如是又何計騰寓説而橫氣機也試將須而為問恐吾言之庶幾漢諌議大夫王章博士朱雲贊并序孝成之朝劔履間健者猶百位然挺身為國直言忠諌者誰歟蓋當時乾綱紐弛威福柄移赤伏隂疑堅氷日至獨能痛國統之將微憤中外之單弱毅然與天子合謀屬具臣矯朝曲以社稷大計為言殺身犯顔以成其仁者在漢二百餘載之間唯仲卿與朱遊二人而已何忠直剛果之氣寥寥如是哉論者方以下量輕重陷于刑戮為譏吾恐為人臣者不以容身保祿是耻將何以為訓作諌議大夫王章慱士朱雲贊其辝曰天厚之剛百折不撓履霜而氷辨之當早漢至元成國統中熄隂暗陽精九廟不食劒履群卿孰非逺識坐視淪胥權歸外戚厄會中來詎容人力公豈不知言出禍入殺身成仁臣子之職彼牛衣言固非所恤諤諤南昌感公奮激抗書申明路開忠直三復斯言寫我心戚慱士朱雲維皇有師禮自天秩動靜安危以物以則矧惟中材性可善惡俟我儀刑狂聖乃作安昌師漢腹心之疾竊我崇髙容姦隱慝社禝大計莫此為亟雲位下僚自任稷契犯顔嬰鱗為漢藥石諌雖弗行彼氣則折欄檻嶙峋我舌不結少師劘軀龍逄挺莭以分以職于死為説並遊無慙終古有烈嚴子陵贊漢有天下夲以霸興陵遲世季其弊莫勝光禹阿諛雄欹狂鄙元成以來從風而靡維炎中熾故人作帝先生慨傷為漢砥礪潔我一巳訓彼四方顧惟可加萬世之光幽幽冨春渺渺桐江釣絲裘褐終焉倘徉是則柔理之道先生助治者其維皇哉噫漢議郎田疇贊炎漢淪精群雄蜂起士昧所擇依強而巳附袁臣曹風從雲委幸而有成終焉自凂堂堂幽州志在安劉信我大義掃清國仇先生委質名正言順報以國使力抶衰運間關歸來大事已去君讎未復吾將孰與躬耕故山有死無二白狼之役諒非本志是懲是膺權以濟事何以明公龍盧之封繫以千駟祿之萬鍾曽不少睨肯縻其躬嗚呼智如荀或識似田豐眀不自保竟貽終凶千古而下死魄英風抵􅲨贊并序郡譙門兩棖下有石獸左曰抵右曰􅲨為狀特異隱其齒而吻張崩其角而顛兀頂髮雲委垂卷兩膊丗傳殷宮中故物自衛縣移置于此考之集韻云秉心甚靈蓋忠直獸也彼物爾淂氣之偏者也何以識其性之云然以屈軼指倿神羊觸邪麟趾厚而不踐虎螭仁而有威是以忠與直可得而推也其所以表之以為世儀者古人制物有所取而垂戒焉蓋忠者衛上之謂直者不骫之稱此則臣子之所固有而所當為者物能如是可以人而不如獸之云乎作抵􅲨贊贊曰吁竒厖三代制賢其德與獸異體具存神則逝逐比干而下逰悲獨夫之狂猘抵兮􅲨兮無效麟之出非時兮使吾拭面而反𬒮西溪真贊秩秩其德瞱瞱其英天稟之厚固非學之所能用晦而眀與時偕行愚常與公從事雅量有餘曽不知趙張之蜂閎豈鷹隼迅擊終不若鵉鳯之和鳴也我贊公像庶幾典刑道義視文章為重雲煙同冨貴而輕至于生也順事沒而吾寧疇為丹青可淂而名也邪雪堂普仁真贊柳州序浩𥘉讀書樂山水有文章父子咸為其道治焉而無求賢于惟印組為務以相軋者逺矣道行貞純𥘉不絶俗機鋒灑落即之可親苦空任沒膝之雪處心探濟物之仁草坐容身雨花􅌭紛雷音淵默獸伏鳥馴咄此圎神淡如凝雲耿金粟之孤影笑人間之幾塵愛而贊之蓋浩初一流人也中書左丞許公真贊古人以道濟為任者時雖見于行藏心不間于微著于皇先生道深潔矩以希聖為心侓已為度上明君道之方下易薄夫之慮危言立朝聞者悚懼公于斯時屹傾波之砥柱非天下至誠其孰能與瞻拜公像魁然真輔奉璋峩峨其儼而𥙿至于體用一源先後有敘試以中元之治較之見論思與機務念公平生其丹青可得而喻也耶醫學教授趙公仲康真贊洹水流潤太行唯峩篤生異人司時之瘥顯允趙公𬒳服委蛇道髙而施慱脈明而智多丗以醫名者衆如公之醫中而不頗護養氣元玉池生波攻以峻劑我禁我呵鬱焉有餘揮之以戈俟其半衰濟之以和開壽域者五十年良聲番番其所以淂于公者如是𬒳之贊歌知陽報之有在福子孫而為那也王子明傳贊古人稱殺身易成事難雖然事有大小公私之間如不有已私專以公心除天下之害此其成尤為難能而可重唐代宗以萬乘之權群公卿之謀至取一家奴宛轉畏懦不敢明言竟以盜歸之而觀著之莭可謂壯矣手植夏禹像贊并序衡嶽有怪柏一株世傳夏禹手植長沙溫將軍得斯木一枝堅徑苾芬愛仰不已以為神明之物也刻帝像以奉之亦臣子厯舜九疑呌雲蒼梧之義也求潤色于余秋澗王惲拜首稽首而為之贊曰亹穆神禹玄功格天見之羮墻况手植之所刋帶不下而道存體雖微而儼然所謂㰸之管窺浩浩淵淵嗚呼三代吾不得而見之得視斯像固足以揭吾之虔是將同啓石而不朽耶抑以與九疇而共傳也田仲德先生晝贊言論固樞機之先作行在士大夫為重卓越田公二者錯綜氣無虛談才見實用翶遊侯伯之間擬擴香林之供幅巾橫策掉首吟諷豫嘗聞鄒蒙之辨説有以卜先生之㝎動于戲文獻不足以柯為棟載曕遺像安得不有人物眇然之痛柏溪主人張仲和真贊堅以持其心直以養其浩用是二者以全純孝淂其時而濟斯􅍇安其貧而取近效其樂也融融為行也慥慥氣溫而和貌儼以肖豈惟夀考兮康寧永以為鄉黨後來之教趙瓠瓜寫真贊丹頰秀眉踈髯方頥目朗炯欲曙之星氣吐若垂天之霓略施為而見底藴據懷卷而藏器機曩也為平津之上客今而乃瓜田之布衣注酒滿瓠溉此鴟夷醯雞笑甕天之舞醉袖拂西山之低趑趄囁嚅尚肯效夏畦之病為浮雲冨貴軒冕塗泥况尺鷃享鍾鼓之樂遊談到六印之纍卧元龍之樓下覺許汜未全癡也耋杖圗贊先生姓馬氏名天昭字雲翰汾州介休人自號師易老人丁丑歲壽八十有一德維懿其存則不謂之命氣維克其㝎也能勝乎天故衝風之火易熄溉旱之禾有年而况有道君子者焉矯矯先生匪曲而全靜以仁樂健為德先應獵無夢絶韋有編通而得夷惠之介默而契消長之權何軒冕之可纍豈山林而後賢氣精而鶴夀松貞而嵗堅故得甲子幾七七之數乾陽符九九之玄道與貌粹峙而停淵儼乎若介山之鬱茂奫兮如素汾之淪漣方吾道之如線賴此老之康延豈造物者卑西河南陽之夀固將為斯文無窮之傳也耶趙徴士畫贊君名鉉字仲器多巧思精藝術今年六十有一自號鈍軒逸皓所謂隱居求志行義逹道者也祖質字景道家大興之穴里金建春離宫在焉常有詩題學舍壁間云折腳鐺中烹白薺打頭屋底看青山道陵春水過見之為賞識左右以公卿名對召見殊加優禮仲器公之曽孫也蒼髯于思雙瞳炯然徑逸欎幽燕之氣端倪賾太易之玄挫止其鋭鈍而名軒曽于物而不滯浩胸中之一天是謂建春徴士之後其青山秀句猶隱見于眉睫之間也故金滎陽令傳輔之畫像贊其父霖明昌刑期進士行部臨潢沒于王事玉潔含光蘭幽藹芳孰為氣機貌溫而良我嘗陪公杖屨徜徉沖善為植德之本揮遜厚周身之防見之丹青衣冠堂堂維玉田之傳其故家文物尚髣佛明昌之煌煌若子若孫既衍慶以襲吉又將見再世而昌也耶韓御史畫像贊晦其明而于物也周以旋介而通其于事也曲以全神湛秋水顔如渥丹藹藹蔚和愈之氣怡怡為孝友之賢施之有政其逹固然同峩冠于豸府愛諤莭之孤騫所可見而知者如是其不可企而得者殆丹青之默然而淵也渡水十六羅漢贊為聖安容老賦誰吮淡墨作佛事顧頴含光開太始稽首尊者十六相金沙灘頭渡淵水魚龍異獸同一家背負鱗浮供役使碧蓮泛灧百花小兩腳何曽踏泥滓法身化現炯孤月海風吹墮千江裏輔陀巖竇寶香濃滄浪石上觀生死白毫光滿海西岸航此洪濤悲一卋玉溪老子出示余意匠經營親説似禪機巳落慘淡中我今試下第二義九年面壁度龍象一日西歸携隻履善提樹下喜相逄拍板髙歌聊爾耳香水琴贊并序南海石隱禪師合沉檀二水為琴絲而撫之其音克諧有不讓于稿梧者假生淂之以珍異丐余文以贊之其辝曰繄琴之胎以桐為材製自虞氏其來邈哉斫以香木南海之僧絲而理之有嶧陽之清物逐所好歸之伯寧脫燎爐之融液拉玉雷而為朋藹然雜芬菲之韻琅然泛韶濩之聲嗚呼琴乎學者寡而其將孰聽倘鍾期之與遇又何啻一再行也劉巨川簽事真贊事機之棼非才則務弛天質之美逢時則道行於維劉卿志氣蜂閎臺閣肇建鶚書應徴豈惟夜書快吏見稱及佐府幕遊刃發硎人奉承而不睱我持難而肆能致駕五馬心奚以榮律身束吏明倫恤刑陟而提憲風動百城褰帷聳具瞻之美控拳無虛搏之名抵凡或迅盤根莫就天或假年蔚為名鄉冝大用而乃靳殆收功于嗣興卓彼二子力振家聲彯纓若綬荷天衢亨將見一日千里騁駿足而躡雲鵬也黃洛老人畫像贊猗歟趙公以古為徒燕居磐石㝎力有餘萬坌前陳付之一壷身心翛然浮雲太虛自號曰黃落散人世指為山澤之臞見于序文者如是吾説試嘉遁之自如不居山林匪樵匪漁安我素分而與道俱醉以酒而適意晦其明而內娛夀幾九齡健不杖扶有子有孫簮纓仕途天之報施善人也合若契符甚矣吾衰愛公起豫拊卷慨嘆遂㰸袵而時書軟背椅贊并序昔李山人詔隱衡嶽淂虬松一枝即形作椅名之曰隱和終莫能曉其何義故左丞史公之子假豫是具其安四體養老妙意有不可勝言者繩而網之以軟其背把而執之以駕其肘至包承臀臂曲盡其冝甚矣工者得老者安之少者懷之之遺意歟名之曰軟背且贊之曰咄此為具其製非一坐促背峻似恭而蹐傍無兩把豫肘安適而最苦者磨隱傴脊未若此君溫柔旖旎譬彼姬薑擁抱而息不髙不亢老者所仰爰從何來藍輿之狀管幼安濯足圗贊天下有二道出與處而巳然審時處巳有未易言者先生遭三國雲優蹈海而東髙尚其事如度之致禮以加敬丕之逺聘以拜官皆恬然若無所聞所謂隱居求志行義逹道者也至於嘯傲物表澡灑溪流特一時間適若歆輩俾進履拱杖猶恐自汚抗疏代位此何理哉自惟老繆待罪翰林赤日長驅會集寓館背汗浹流暍而欲踣歘挹清風豈勝愧仰乃再拜稽首而為之贊曰吁先生古逸民素所友夷惠倫傲狐瞞東海賔著皂帽踏碧𥻘尚恐染三臺塵若歆輩進履徒破壁手乃敢汚抗疏請代三孤眛平生何足誅百世下孰知巳翛然心見終始大起豫有蘇子古燕印贊并引參政何公世家易州常于燕丹廢城中耕淂圗書小印雖百枚制皆殊一曰以所淂者贈豫形如方斗其文曰韋宙宙唐昭宗時宰相豈古今人姓名有偶相同者耶入手摩挲甚可惜也作斯贊以答雅厚其辝曰燕有國八百餘維易容奭故都按璧壘見雄圖萬組印雜簮𥚑人與骨朽巳無耕壠間獨淂渠一粒小丹砂如其文宙亦盛夫紐岑樓或龜趺纍纍多一皆殊彼斗大黃金塗懸肘後擊賊奴氣雖豪空淪胥三摩挲重嗟吁猗參相好古徒知淡癖為贈豫何所志遺惠書四子問孝圖贊天地之經其維白孝魯人所瞻巨室是效四子致問庶幾要道因材為篤聖答各異發藥其偏從容和氣思煽皇風永錫厥類怡聲粹色玉佩華𥚑表之丹青清風穆如嗚呼安淂一天下之慮宛同是圖梁太師王彥章畫像贊堂堂太師勇冠萬夫曽精甲之幾何破南城於一呼三日奏捷素果不逾大厦將仆一木可扶衆且顧望我誓捐軀蒼髯糢糊目光炬如戰酣歸來氣欎犀渠惟孝與忠同歸異途繄錦囊之三矢與長矛而不殊冝乎文忠之筆大書特書不一書而巳也吁劉珍母王氏真贊嗟嗟母氏恩斯勤斯自期寸草庶答春熙况復身後有飬何施履霜濡露感懷歲時嗟嗟母氏健幹而慈奉巳以約保家之肥致家之完乃有今日我食我衣皆母之力曖曖停雲泉水湯湯我思母氏何日而忘重華鼓琴圖贊幽幽深山玄德聞兮二女釐降溈水春兮乾健坤順其道恆且久兮袗衣鼓琴固若我所有兮手揮五弦正始此其時兮琅然玉音一氣為之熙兮鏘然和鳴鵉鳯以之儀兮衣垂手拱其道本於斯兮升道蒼梧惋莫從兮淚浥湘筠思何窮兮噫故處士牛了齋真贊眼高一卋舌本懸泉噴噀珠璣孰為後先樂育自好以全性天生也順受沒吾寧焉彼顔渥而顴野服翛然尚知為鴈門儒將之裔庶幾青山白雲之仙也故翰林應奉陶珉溪真贊貌古而氣清言訥而行純此見于外者皆曰儒學之醇若夫該貫經史筆斡千鈞玉佩瓊琚大玩斯文足以泛珉溪之雪浪追顒軒之絶塵然綸恩甫沾而不祿夀靳固于七旬天之報施果何有于善人峩并朱衣正笏垂紳雖未及直玉堂之署尚知為元貞辭翰之臣也房星贊粉色黯淡雙絲浮絳冠箕如柱劒􅚆陽環夜半海氣湧火輪欲上鞭金虬赤㕙躍入玄關幽殆似戰勝褰雲兜千金漢將非吾儔中令化筆通神謀冷風拂巫寒颼飀大德四年臘八日作房四星為眀堂布政之宮亦四輔也下一星上將次次將次次相上即上相所以理隂陽正教化南二星君位北二星夫人位又為四表中間黃道之所從為天衢又為天關南關曰陽環其南曰太陽北關曰隂環其北曰太隂亦曰天廄示曰天馬主車駕南星曰左驂次左服次右驂又主開闔畜藏之所也松化石贊燕城趙彥清家藏伊石與松秉彛堅潤雯華根莭鱗皴挺徑儼髯龍之淵潛蛻康溪之深濬伊艮震之交感化而為他山之璡逮霧巖之玄豹隱錦斒而如扙水水清華坤靈藉重氣變無方靜含妙用物貴異稱金鏗玉振習焉不封於秦今也罔言於晉但摩挲而三嘆非張華而孰綜然室無滯而不冨况殊方之竒貢嚮為山人隱和之具今作仇池怪石之供一線爐熏靄若雲蓊栩栩蝶去夢繞神清之洞蛻齋劉先生真贊先生諱思齊燕人猗歟蛻齋蚖肆螭蟉擴充家傳資深善誘愛波瀾之老成宛黼黻之絺繡曽管窺於一斒竟韞櫝而莫售我瞻遺像氣豐而蔀一官廣文祿才升斗挈簞瓢兮屢空曽臧否之何有嗟共盡而奚言豈獨哀於吾友蛻齋𥘉與胡國瑞同年登第中統𥘉為中書省掾後辭歸為彰德路學官卒秋澗先生大全文集卷第六十六
