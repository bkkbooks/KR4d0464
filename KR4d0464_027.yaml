body:
  text: 七言絶句過文貞宋公墓廣州去闕幾千里中使㗸恩信貴僚莫訝簡驩無一語太平勲業見風標沙丘宫齊梁覇趙何雄壯探鷇囙鋒遽懦庸千古興亡酷相似武靈而後有莊宗栢郷道中聮鏕時喜笑談𨳩不覺凄風漲靣埃曉日迫亭橋畔路青山一道柳邊來大都小雪時聞兩廣捷至雪飜廣栢飄梅粉雲覆宫墻抹竹煙預爲新年傳喜夜到甘泉宫杖亡宋物也左丞姚公以上所賜出示坐客故有此作效王建體六宫催上木蘭舟百色輸來不敢留親見紫宸新製杖金盤龍地玉虬頭過中山府紅旗鐡馬響春冰儒將清邊丗莫驚遼吏不知溏泊險使來先問二蘇名過梁門漠漠蒼溏海氣霾銅梁北照遂城開不知陂漲能遮甚萬騎藪潚索戰來毳幕卓歇圗牙旗風軟馬蕭蕭渭水歸來氣更豪想得龍沙西北道際天秋草黒山髙題花光墨梅二絶蜀僧超然字仲仁居衡陽花光山避靖康亂徙江南之柯山與叅政陳簡齋並舍而居山谷所爲研墨作梅超凢入聖法當冠四海而名後丗甞有移船來近花光住冩盡南枝與北枝之句其丰度可想見矣趙雲夢題云如王謝子弟倒冠落佩舉止欹傾自有一種風味盖前朝髙丞相家物暗香踈影溪雪春風四圗今失其溪雪見爲宋漢臣所收僧號花光道人東坡山谷少游皆有贈詩滿溪明月影扶踈只枉緇塵點雪膚展放畫圗還記得孤山離落漲西湖破墨能開雪裏芳道人花供老猶香移船要近花光住笑殺涪公有底忙𥙿卿李兄來别復效樂天體以贈晤語從游喜任眞玉堂僧舍幾相親河梁莫厭重携手明日共爲千里人題朱彦暉三陪手卷謂木庵陪飯竇漢卿陪針陳學士陪口也陳時可字秀玉余年五十覺籠東左臂偏枯右耳聾説道燕城陪手客此針傳授到朱公江村訪友圖江東宰相說風流賈嗣呉潜果孰優今日國亡岀時須來訂晉陽秋㢘公作牧古無雙聞道旌招别楚邦何計挽留我似來謀及鹿門龐兩掾茆屋枕江濆杖屨來𫾣月下門不是愛梅多㸔竹冷香踈影坐黄昏韓幹畫照夜白圖開元天子燕遊多一骨承恩玉色瑳所養自來非所用雨中蜀棧要青騾纓紱騶衣一色紅玉華光照苑門空昭陵六駿秋風裏辛苦文皇百戰功沉香亭下牡丹芳宫漏穿花夜宴央輦路傳呼停鳯燭内家歸詫玉麟光松窓雜錄云開元中明皇甞乗照夜白與太真妃賞牡丹於沉香亭政捐金鑑九齡歸聲色糊塗醉不知天意種深天寳禍故生尤物配妖姬題何侍御所藏雪霽江行圖雪霽澄江照眼開常年十月蔽兵埃而今風物真堪畫滚滚行啇兩浙來栢臺霜信肅江楓寒入黄茅瘴巳空一線暮江春雪外枉將新意詫清䧺炎瘴消殘一雪餘勾呉無地不亨衢江山正要燕公筆却點騾綱入畫圖滕王蝶蟻圖劉侍御家藏兩翅輕翾暈粉金内人無計撲羅襟南昌閣底花如霧迷殺春香一寸心槐壤紛紛事暫歡枕中栩栩伴周閑丹青欲識滕王意湏着人間比夢間粉香金翠夣能甜細冩春悰入筆尖却恐尋香飛便去六宫争下水晶簾王建宫詞有傳得滕王蛺蝶圖之句夏日玉堂即事悠悠時事百年心歳月徒成昨與今萬一寸長能及物不愁華髪已盈簮失時巳抱周人恨濟物長深永叔懐鈴索不鳴朝日静坐㸔簾影轉苔堦丗願登瀛不作卿玉堂更比憲臺清只縁白獸樽中醴當日元王爲穆生隂隂槐幄羃閑庭静佀藍田縣事㕔細草近縁春雨過暎堦侵户一時青日長上直玉堂廬思入閑雲待卷舒重爲盛時難再遇等閑羞老蠧書魚故開府儀同三司中書左丞相贈太尉謚忠武史公挽詞有序維大元國至元十二年歳乙亥二月七日中書左丞相忠武史公以疾薨于位訃聞天下痛悼嘆哲人之云亡哀斯民之無禄在某又有感焉而不能已者𥘉壬子歳公受封於衞其年秋來視師某以諸生啓事上謁特睠焉録用實資藉之俾進其所未至以需逮中綂建號之明歳公入當鈞軸時某掌記中堂館門下者半歳首奏擢除翰林修撰兼内省都司旣而以事詿得公辨明免歸至元改元緫尹都督移鎮東魯辟某克幕官遵公命也公之意盖欲革舊事行新用也九年壬申銯御史得調平陽謁公授嗾去曰若綿歷頗乆同列貴和餘復何云明年朝議經制南伐詔公開府襄州節制諸軍又將以僚属召㝷輿疾北還事雖不果於菲薄寔加重嗚呼昔韓愈從事汴州於隴西公有惓惓不忘者在裴中令爲可知不肖某何敢望昌黎之清光而忠武勲德爲丗宗臣逺邁中令而某也始終沐公裁成卵翼使聲光爝耀於時其感戴當何如哉一旦遡六樹之悲風痛吾儕之安仰此李平廖立淚下而霑襟者也爰𢋫薤露之歌用表素旂之末前十章頌公德業之萬一後五章攄平昔頋遇辱知之厚傳武侯於近代敢躡蹤張拭之文賛充國於麟臺庻張本揚雄之作尚兾神靈鑒兹誠悃其詞曰𥙷衮功深作帝箴片言能霈萬方霖白頭無地酬知巳重爲蒼生淚滿襟㓂鄧髙勲上將材丹青圗畫冠雲臺舉頭納納乾坤大辛苦中原百戰來南臨江漢北無垠英衛軍機祐預仁百代盛從青史見漢家群后有元臣遺表陳情不及私南征無嗜殺爲嬉身雖不覩呉平後羊祐恩威有素規元勲髙在麒麟上曠度初無智勇名欲見令公隂德厚一門八子緫公卿幾年黄閣見調元福浸蒼生奠枕眠兩號改元幾二紀不交波及海南天閫節堂堂五路尊継承諸姪動天閽推恩不爲夷齊讓要慰先臣地下䰟身後論功誓不磨德鞬髙塜欝峩嵳千年零落丘山底忍聽唐鐃作露歌上計歸來愈謹忠又從潜邸識真龍十年浴鳯池邊夣不到歌鐘甲第雄逆齋節制竊桓丈䲔鬣飜波海氣昏堂上有兵能制勝一言料死苙中豚時予都司中堂公聞逆璮突入濟南有豨入圈無能爲之句至成擒竟如所料先皇登極公封衛賞識初縁啓事陳二十年間門下客愧無椽筆賛經綸昻藏緑野堂前鶴飲啄當年在鳯池一諾見推連省署九泉埋骨荷深知中統二年余在上都公館焉日陪侍左右幕圍火烈燕巢傾北際誰能託死生一語保全微命去聖安方丈記辭行拂衣歸去老田園木屑筠頭苦見憐尺一起爲蓮幕客東平門下又三年征南開府控襄州舒也何爲預唱籌報徳愧無千字誄峴山南望淚空流萬壽節同宋太常弘道出左掖門口號禁漏穿花夜已央宫槐籠曉色蒼蒼慇懃一點東華日先到紅鸞扇影光隔夜端門分板位平明簮笏列鵷行紫雲低覆千官拜潤入金爐百和香羯鼓聲髙吹管清九天合作鳯鸞鳴侍儀賛喝三成後磬折齊呼萬壽聲花映嵓廊近紫宸宫官行酒過三廵共携滿䄂香煙岀散作都城十日春對品班分玉筍行一時望拜殿西廂百官燕出宫闈静踈雨𪷟𪷟濕建章過王太師廟在夀張縣西三十里老雨莓苔滿露臺野棠花映廟門開地中鐡戟消沉盡時有隂風樹杪來題開州驛亭壁并序昔有宋之三葉也遼人大舉入㓂南抵澶淵有併吞席卷之勢堯叟以蜀産主議西廵欽若以呉人請狩建業社稷安危在此一舉萊公審勢明料敵果挺不㧞之忠任投瓊之責奮不顧身竟夷國難當時遼舉國之兵膽巳墮公北狩一言奚待斃延夀一矢之力也庚申秋予應辟東魯道出是邦按轡周覽想河流之奔洶仰壁壘之雄峻斯亦宋之金湯也遂盤礡回鑾碑下慨然有懷古人臨大節處大難胷中素有所定不然淮隂以漢中畧對烏得還定三秦武侯以南陽一論遽能西取劉璋東向以爭天下者哉幸蜀廵呉避銳鋒竟從孤注就天功千年草木餘威在野老猶能說㓂公顯宗畫三教晤言圖兩晉玄風倡永嘉晤言新意出承華後人莫作無同論剖破藩籬即大家微言𥘉不出吾書正恐雄誇渉誕虚坐上若拈花葉問發端當自仲尼居承華宸翰日重光大定聲明有父皇若以撫軍監國論長沙書䟽未容忘緇衣蔽路樂清修羽客談玄日自由眼孔佀怜吾輩小終年平地㸔錢流爲儒户印造寳鈔鬢絲禪榻喜相依休問珠英果是非巳着孔林殘照裏青衿漸染變緇衣徽宗臨張萱宫騎圖缺胯頳衫玉帶圍騣凶鬯匕華翻影下瑶池老徽筆底無留思貌盡春風出閣儀碧暈紅絪思有餘較來經國太工夫大風歌裏雲飛逺不畏髙皇笑殺渠戊寅歳燕都元夕萬家簫皷憶升平九陌銀華璧月澄此夕薊門南北望風簷隨分兩三燈九齡忠諌圗挺笏摧姦論已萌帝心唯恐悞忠貞開元所事呈来足只欠成都萬里行樂土宣鸂􅥩圗宣和畫工彩羽翬明照影閑蓼汀沙暖睡𥘉殘撃揚寄謝霜空鶻輸與江湖百頃寛四皓圖山中日月到華胥澗飲芝餐樂自殊苦被留侯容不得須教人彘事相汚送南冠徐子懌兵后還武昌卧老盧龍塞下春故郷心緒異郷身燈前一展平安報照眼清江月近人故里依稀竹樹煙白頭此日是歸年多應秉燭東湖夜夢裏相㸔一泫然王摩詰􅌐山宫圗安逺門西萬里餘耕桑煙火緫民居只應勤政樓中夢百倍華清樂不如憶昔風流王右相開元親侍玉堂廬細吟凝碧池頭句政恐丹青是諌書跋張龍丘簮花圗醉吟賞盡洛陽春老與坡僊作近隣未礙一枝長在眼静庵方寸本無塵龍丘子晚居黄崗號静菴居士与東坡為隣荆氏周急圗九縣飈馳到𣏌天禾㕓櫛比豈容全指囷能継前賢舉亦是農家識事權宣和梅蘭圗暈碧裁紅奪化權氷􅐾芳魄闘春妍只應五柞宫中夣不到幽香淡影邊木有寒梅草有蘭色香冝作一圗看曽憂荆𣏌生庭户歳暮芟夷有至難題張寶臣手卷華𥚑織翠萬金身名動春坊劒字新全佀當年天䇿府經綸王業半儒臣跛船子和尚圗戢戢波間萬鮪遊一鈎那得盡廻頭何如収却綸竿坐明月千江任自由漁樵閑話圗艤舟㢮檐兩欣然千古興亡話眼前忘却前溪歸路晚暝煙横合碧山巔觀稼朝餐不再腹爲虚多稼雲連仰兩濡今日東城看佳色愈知糞壤是金珠今年薪桂米量珠日聽閭閻有殍夫縱使積金髙北斗不知能濟此飢無煙鋪雲委泛晴光平逺風來粒米香鄒孟最深王道本徑從五畒論耕桑雨後看山西山盡日塵土靣一雨晚來膏沐容晴霽最堪圖畫處白雲零亂點髙峯竹林七賢圗森森煙玉太行秋七子倘徉結勝遊笑殺阿戎真俗物出山能幾執牙籌魏晉清談倡若徒永嘉東播洛爲墟大書不削陽秋筆更着丹青詫隠居讀文中子傳書成復性才稱訓道見原人本自文聖學操存元不易白溪猶有淺深分山壑萬松圗髯龍落落不凢材萬壑蒼煙鬱未開絶佀澗阿幽隱士苦嫌塵土不歸來巖風謖謖泛秋聲展放横披眼便明酷似龍門山正北兩崖隂合記經行大厦欹傾要棟梁萬材於此欝蒼蒼正須叮嘱工師輩爲桷爲攘細選量構厦先論大匠賢杗楹椳闑不相捐何當剪伐長材外乞與坡仙作竈煙讀開元天寳間事庭燔錦繡𥘉年事嬌枉情過乆復歸鄒孟一言垂至戒大臣無切格君非常山不屈平生節中令能明死後忠未若廣平還具眼當朝終不賞邊功李龍眠二駿圗突嚙相忘絡腦覊沙平春静草凄迷後人莫作丹青㸔特爲南華釋馬蹄遼夏㝷􅉀静塞塵駧駧歸逸華山雲當時騋牝三千匹辦與龍眠䇿畫勲候㢘相病詩書素業清時樂草木平泉四季春識取相君無妄疾自來憂道不憂貧金華恩眷見來深李泌𥘉無冨貴心琴裏南風如觧愠正煩吹起傳岩霖一作況是岱雲能寸合肯教空作傅岩隂當年匹馬走雷風氣壓秦川百二雄今日露花欄檻底秋絲争吐㸔青蟲貧不能移貴不驕丈夫到此是雄豪何當慰滿蒼生望卧㸔東山月影髙明皇按樂圗羽曲調音到克諧宫中花柳四時開五絃儘有南薰手却唤花奴觧穢來興慶宫池水殿深帝心横潰溺哇滛讓皇交愛情何切獨爲君王辨八音逸圖零落衘前幈心醉華清按樂聲擊損碧梧縁底事促教秋雨劒關行李伯時二馬圖肉騣凶鬯匕連錢汗血無絶足日與駑頑俱何當與馭彪將髀蹴踏逋孽閩東隅承顔堂舉丗紛紛説奉承色窮愉婉古難能近因細讀蘇公傳眷戀庭闈有足稱太子府戊寅夏六月廿日千秋節同承㫖姚公尚書許公行香口號入朝巳盡三嚴皷禮佛重行繞殿香洞户啓時宫燭逈五雲朝處少微光前呈光彩日重輝㓜海風煙動羽旗曲冥未終閑委珮朶頥廟下㸔靈龜将入宫夜夣一大龜飛舞余前明日祝夀畢遂觀此龜沉沉蘭殿寳香熏濟濟衣冠四皓賔識取元良無筭壽歛時多福錫生民時奏停運司題沁州杜敬天醉經堂沁春秋時地名鞮即文中子祖父故居銅川地金沙霧散滿懐春緫爲從來味道醇酣適愈深心愈樂不任桮杓復何人聖賢真味日陶然王氏遺書有正傳河上丈人如見問却還糟粕到銅川飲食誰非飽即嬉至論珎味幾人知六經奥㫖醲於酒不到沉酣緫啜醨李相師詩并序㐲臣簾垂坐卜蜀君平禄命雖髙目撃道存袁客師人倫尤妙嵩嵓處士李君術窺鬼眼鑑洞清霄馳聲於京華二十年閲人於市樓幾百輩多因勢解棼之說無虗髙過喻之辭待詔宫車屢承恩眷直氣曽驚於户牖㣲言預兆於禨祥爲賦新詩先書小序霧隱雲驤虎豹文眼中歷歷說承恩羡君風鑒何精切曽愽紅雲一笑温萬事心藏到隱微一言能發静中機聖皇臨御思賢切識取新豊馬布衣過仁宗陵道出黒石渡同宣慰陳慶甫遊仁宗陵後宋人曽有詩云干戈銷弭歳年登邊將無功吏不能四十三年那忍說暗垂雙淚過昭陵見朱晦翁語録猗蘭被路柏圍城此日秋禾滿廢陵伊洛水南崧少後丙年六月記來曽題承顔堂卷近讀程氏遺書論曽子耘瓜誤斬其根曽晳建入杖以擊其背曽子仆地不知人事良乆而蘇欣然而進曰大人用力教參得無疾乎乃退援琴而歌使知體康孔子聞而怒曽子至孝如此亦有這些失處若是舜百事從父母只殺他不得又問申生待烹之事如何曰此只是恭也若舜湏逃也前日題此卷詩意偶與此合喜爲録附其後小雅報勞天囯極南陔致養戒何深浚完井廪從多故一順能全是舜心題禮宗所題宫扇拱手深宫四十年只將詩酒闘清妍料應一片江湖夢不到謝玄淝水邊跋嘉祐熈寕間李昭珙所受告身三通愛樹懷賢自昔然眼中真宰見差肩因思近代文明㝡無佀嘉熈慶曆年跋秦王擒竇建徳圖天命人心巳有歸怒麛抗嶽欲奚爲自將五載飛揚舉辦作秦王破陣辭王昭君出塞圖絶色當年冠漢宫誰移尤物使和戎流連不重君王慾延夀丹青似有功用程晏論朔漠風沙異紫臺琵琶心事欲誰開人生正有新知樂猶勝昭陽赤鳯來讀趙飛燕傳木門蒼莨向夜開富平騶騎欲誰猜微行笑殺張公子併引昭陽赤鳯來題黠䑕賦後䑕喻雄深過柳州竊時欺暴果誰尤惠卿未死舒王在悄悄孤懷爲國憂社䑕城狐固細微不勞區處動嫌疑何當論報堂階下免使區區若輩欺豺豕磨牙到暴殘容身應媿豸爲冠咄哉此輩何爲者未用區區計靣謾黄筌蜂蝶圖翅粉翻香卷鐡鬚亭亭花影小華胥黄生筆底留深思似與齊丘釋化書鳯輦隨渠即幸臨隔花望断翠嬪心春風上下撲不得飛過畫欄情更深題劉君用可菴手卷忤物能全古未聞正湏多可應時人保身猶落婁公後唾辱湏防潔靣嗔題樂天不能忘情圖病來心事轉蹉跎身外猶嫌長物多况是春歸留不得侍兒無用蹙雙蛾里陌鳴珂歳月深柳枝清唱伴長吟一朝並逐春風散却是維摩示病心悲鳴駱馬莫回頭說似余情乆倦游滿眼清伊石樓月杖藜來徃亦風流龍門八節鑿來平千首新詩貯佛經只爲暮年無可做又留公案入丹青青衫憔悴老江州放逐歸來萬事休正有醉吟情未减又飜新様柳枝愁春風不到豸冠霜甚是温柔與醉郷展放盡圖還自笑鬢絲先比樂天蒼年四十二髮巳半白題醉仙圖瑶池清讌丗空聞想像仙桃物外春盡史恍從見丹靑貌盡醉時真等是髙陽舊酒徒醉郷真樂到華胥不然有口難言際同向春風倒一壼何物諸人作恠顚眼花落井口流涎滔滔緫是胡母軰強着冠巾作散仙公堂即事自箴兩衙相並無㝷丈一處繁囂一寂然間有事來還徇却俯慚於地仰慚天門帖子不期北里冨薰天敢羨中朝日九遷喜見上旬壬子會大家豊足過今年四日壬子題杜氏近仁堂青青庭草我何殊物體方苞戒薙除致飬此心能類長一軒和氣際堪輿一作一天生意見方輿我欲斯仁仁即至主人此理乆相安兩椽寓舎中堂後莫作王孫火竈看心徳由來萬善宗舉斯加彼即冲融不湏苦向遺編泥收取平時濟物功漢署郎曹寔要津不移居飬幾何人粹然一點慈祥氣辦與人間作好春嫂趍井坎爭援手牛爲觳觫免釁鐘天理在人曽間断多君操守便從容顔子拳拳善服膺豈徒歸羙重名稱寥寥此意千年後復禮名家見杜陵愽愛功多到靖深虛懷猶用近爲箴煩君試閲金華事何限當機利益心跋燕肅牧羊圖行飲溪流喜降阿歸鞭影淡夕陽坡佀將濈濈維千角辦作宣王考牧歌平秩東臯事有餘荒煙平楚散林墟牧人例有繁多慶簔底秋江夢衆魚題温居士畫像盛集賔筵每㑹逢笑談端有古人風如公耆舊今能幾又逐秋江月影空太真風彩動并門處士流芳寔裔孫今日坐看磐石上老成雖逺典刑存自稱晉温太頁之後題魯人張仲和卿舒嘯亭手卷蟻穴蜂衙閧事機人心無路到淸夷翛然笑煞東皇客月白風清世不知千山秋月照螺臺兩吻清風萬壑來吹作半空鸞鳳去公和元是不凢材已卯清明日雜詩時廵按南京東風吹静鎻䆫塵落盡桃花别有春一樹青梅老小湖山畔翠娥顰早衙倒向中時散宿酒禁持到日西歩繞芳叢見閑情還與碧雲低千門萬户記經行瓦礫場中問舊名一片月照人依舊十分明散公堂日晌西暮雲樓閣自髙低呢喃何處飛來燕佀爲巢新快穏棲雪妥紅飜點綴春桃花錦爛柳條新那知春事都無意燕子争來強語頻我近南來石濟津暖煙晴日欲烘春自從入得清明節連日春隂殢殺人汴梁淸明連日風沙此日晴東君有意作淸明垂鞭醉入宫城去一片傷心畫不成寒食日過隆徳宫當年陸海駭珎藏此日繁華墮渺茫春草不隨人事換依然分翠入宫墻題孫郎中孝友峯小穿沙囓到玲瓏抵事題爲孝友峯長著紫荆庭樹影鞠哀天顯表冲容館史開府第宅石欄春静雨留苔江漢堂深又獨來前日平泉門下客一花一草緫興哀宫墻一片摧頺當道危風前竹色想依依偶逢白髪宫前叟指顧因渠得禁闈秋澗先生大全文集卷第二十七
