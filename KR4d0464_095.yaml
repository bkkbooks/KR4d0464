body:
  text: 秋澗先生大全文集卷九十五玉堂嘉話卷之三楊凝式小字詩字虛白五代時人號希維居士又云關西老人癸已人心印帖李老君枕中經招客同飲帖皆唐人書韓魏公書杜少陵盡鶻詩擘窠大字墨迹山谷書繼月帖云繼月學書未知其要處東坡先生云大字難於結密而無間小字難於寬綽而有餘又云學書時臨摹可得形似大要多取古書細看令入神乃到妙處惟用心不雜乃是入神要格山谷為甥張大同書擘科大字一卷中云涪翁自黔南遷于𤏡道二年矣寓舍在城南居兒村側蓬藋柱宇鼪鼯同徑然頗為諸少年以文章翰墨見強尚有中州時舉子習氣未除耳至於風日晴暖䇿杖蹇蹶雍容林丘之下清江曰石之間老子於諸公亦有一日之長時涪翁年五十六病足不能拜心腹中蒂芥如懷瓦石未知後日復能作如此字否其筆勢從橫意韻瀟散絶類瘞鶴銘書少陵畫鶴等詩山谷練湖夜雨草聖瘦藤草聖十三篇辛未人日書皆公詩也草聖贈元亮姪兩首草書廉頗傳書韓非子十六篇後跛云姪授万里來求書法此不急務也以万里來故不能已山谷書一十幅內此君軒詩擘科大字體極瘦徑又起草墓銘一草聖詩三首書王摩詰詩山谷書一十幅內草聖一為李華重試南豐鄭熙棗核筆崇寧四年南樓書蓋公絶筆也逹觀臺詩草聖六言詩內行書五首皆摩詰王建王介甫東坡詩后自云老眼昏花書不能佳如醜婦昏鏡中梳粧似亦妍耳蘇才翁草聖少陵二首蘇氏寶章東坡黃門邁遲等帖遲即頴濵子也逺涉帖豫二十年前觀於大名魏氏家未敢必為孔明書及入祕監見宣和書譜乃知宋銜府所收為武矦書明矣米書黃龍寺碑宋相張商英撰襄陽書一十幅內兩卷佳蔡襄元祐續帖凡九帖帖帖筆法不同宋少卿弘道説嘗見李德新所藏碑本云書學之傳蔡雍得之干神人雍傳女文姬文姬傳鍾繇繇傳衛夫人夫人傳羲之羲之傳獻之獻之傳羊欣欣傳蕭子雲子雲傳王僧虔僧虔傳智永智永傳智果智果傳虞丗南丗南傳歐陽詢詢傳張長史長史傳顔魯公古今畫閻立本畫古帝王一十四名漢文昭帝光武皇帝魏文帝丕蜀昭烈皇帝吳孫權晉武帝炎陳宣帝陳文帝陳廢帝後主叔寶陳文帝周武帝字文雍隋文帝煬帝前宋楊褒家藏後入祕閣富弼韓琦題識其後但文昭帝有解云漢文廟樂曰昭德故曰昭文帝又云偽蜀李壽曽立號曰漢興廟諡曰昭文此文昭又恐非也十四帝除漢文陳宣廢帝後主煬帝餘皆衮冕若五方帝之儀其曹丕司馬炎宇文雍容色皆嚴毅可畏其字文雍髯糢糊滿額兩顴上亦有長鬚下垂晉顧愷之青牛道士圖道士即封君達畫洛神賦後有梁普光間題跋􅎔本吳道子護法善神閻立本阮孚蠟屐圗老子出關圖老子西升經下虞丗南楷書各假事迹王維山水圖輞川圖驪山圖韓幹出水馬李昭訓崆洞山圖李昭道避暑宫圖戴松牛李將軍鶻唐人翦鬃馬貫休竹韓幹正面馬韋偃羣衛圖後主收唐人化行天竺荆浩江村早行韓幹四馬圖七人解衣下水李升水墨滕王閣圖合幅上畫人物宴集甚盛張萱界畫宫閣侍女圗及醉女圗內有以紫色粉塗面者韓幹三花御馬真張萱號國夫人夜遊圖小李將軍翠微宫圗合幅一幅畫騎者十四人步者二一幅騎者十九人牧馬者十四人唐將軍霸獵騎圗人物結束類開元𥘉羽林守捉衣雜色錦𫀆褁方平巾帶長刃兩鞬箭左手握弧右抽矢于房驊騮馬豹韉紅錦襴胸鞅同勒有鑣朱絲絛鞚馬迅疾殆逐獸然筆畫徑硬如鐡屈者御顯神品上上宋諸帝御容自宣祖至度宗凡十二帝內懷懿皇后李氏用紫色粉自眉已下作兩方葉塗其面頰直鼻梁上下露真色一線若紫沙羃者後見古今注魏文帝宫人有巧笑者以妬錦絲作紫粉塗拂其面宋郊天儀仗圗衮冕圗車輅圗易元吉獐猿蓼花草蟲楊棐象黃筌援李伯時水墨馬羣馬圖丘慶餘花禽鍾隱雙禽圗黃筌碎全圗崔白梅竹寒雀李公年桃溪春色艾宣竹鶴胡瓌馬騎契丹人凡畫毛尾取狼毫疏渲張戡騉馬圗崔殼江鴨李伯時著色馬郭忠恕避暑宫作界畫黃居采鹿艾宣雞冠黃葵杜鵑花圗崔白秋溏戲鴨郭忠恕界畫著色宫閣圗李伯時著色夜遊宫圖嬪十人奄四人皆騎徽宗臨張萱宫騎圖李伯時淵明圗李伯時蓮社圖趙大年小景郭忠恕飛仙圖郭熙秋山圗因念人與事機會合皆有數存其間九年春子一夕夢謁平章公於府第之東堂酒數行發書一匱示豫皆粉圖繪本金文玉牒今觀中祕所有璀璨溢目與夢中所是略同吁亦異哉傳曰嗜欲將至有開必先信哉斯言也作書畫日録序王晉卿煙江疊嶂圗并和坡詩李伯時畫明皇乘三鬃赤驃後跋云昔李將軍思訓畫明皇擁嬪御數十駒摘瓜伯時仍為山路小橋至元元年與翟處正觀子東平武濟之家又觀東坡與蒲資政傳正書并覔柿霜無核棗四帖後有張行簡堇師中元遺山跋語僧傳古坐龍至元元年宣慰張順齋為春旱於范大師觀迎此龍於嚴東平北宅每旱張是圗輒雨此日亦然龍蒼駝蹲坐火雲中頂與鱗甲間皆有緑髮世所畫皆蝤蚓耳宣和題妙趙邈搠噀墨虎至兩目夾鏡睛隨人轉同史左丞觀於田尚書和卿家已上二畫皆有詩大意古人欲以一藝名丗者必精思入神極占今之變而後巳故能洞逹天機氣隨物在至觀之者亦有感格相應之理如摩詰苔磯靜釣水閣間棊令人不覺身在其間傳古龍出兩應氣來噀墨虎睛逐人轉鄰姬顰蹙馬踐家具之變此長沙云精筆感人有如此者蓋非虛談也秋澗老人題丁丑秋奉御脫烈傳旨本院定撰順德資戒碑及普門塔碑銘鹿庵曰老夫作資戒文乃令不肖撰塔銘惲謝不敏先生曰但作吾深意存焉及畢聞奏頗稱旨今日乃悟先生其誘掖成就後生如此陳希夷嘗有詩云我見世人忙箇箇忙如火忙者不為身為身忙却可商左山顔平原中興頌蓋變玉筯大篆為真楷耳劉房山嘗説海陵欲南征先以十八人服御與上一同私行扺淮上以覘虛實號曰黑護衛前次相下宿南郭逆旅張燈置酒聞有新進失職劉其姓者先在邸中召與飲劉素善謳能詩即以歌侑觴辝氣慷慨禮貌甚恭上喜甚遂詢其所以至此之意而默識之黎眀劉復持酒餞謝上既乘以手札付劉曰府尹我親知也可用此投獻取錢幾千緍劉依命謁府尹疑通刺久不報見左右遑遽具儀物授旨方悟疇昔為海陵云及還宫即特旨起復劉為京朝官後從南狩同殁江上至元十五年戊寅正月甲寅乙酉朔同李侍講德新應奉李謙陪百官就位望拜行在所凡亡拜其侍儀司先一日於端門兩闕間灰界方所以板書百官號隨各司依品秩作等列班定以次入宫行禮禮畢由左掖門出風埃大作所謂出門塵漲如黃霧始覺身從天上歸曽有口號一絶隔夜端門分板位平眀簮笏列鴛行紫雲低覆千官入潤作金爐百和香讀韓文孔幾墓銘孔世三十八字音作蘇合反王承旨慶八秩詩西菴云人材落落自天成千佛經中第一名巳今二膳常珍進但入朝行以杖行商左山云藥褁封災隨臘去酒杯稱夀逐年新胡紫山云堅辭不允老而傳􅕇杖恩光又十年勇折桓文匡政弊力扶周孔上經筵又云塞破乾坤享重名玉堂東觀又尊榮香山如礪瀘溝帶才與斯文作主盟宋人畫瓊花圖花蘂團團作九葉如聚八仙花楊州人説近歲其花巳枯朽矣李玄暉所藏古端研其背刻云此硯色青紫而潤下嵓石也先公得於山谷若文室中磨李庭圭墨試諸葛氏筆丗間真有楊州鶴也後題曰元暉山谷云虎兒筆力能扛鼎好著元暉繼阿章米因以字之亦羲之獻之例也祠堯舜禹於所都唐開元五年為始從禇無量請也見無量傳王黃華稱香品有蟠螭小月夜窗幽几之辝公壽止五十三官至承務郎翰林修撰黃華論汴河前宋以洛河入汴為京西漕路其後黃河卧南洛水舊道斷絶今汴河名存其實止是京索須三水自滎澤南入汴河故道行流徽宗臨張萱宫騎圖其侍從有挈金驝駝者蓋唐制宫人用金駝貯酒玉龜藏香趙同簽説髙麗東北有弟五頭城其地有五城此蓋從南弟一城也宋克溫説今隂山古金山也古于闐今曰幹端古烏孫今幹落絲潮海桁海薛良河今悉連哥回鶻今外五回紇今回回不谷寒毗伽可汗身毒印都吐蕃土波柘枝舞夲拓拔舞金人以名不佳改之屈原湘中廟題曰清烈公唐車服志帶匜尾取順下之義魚袋取其清潔魚目不瞑勤而不懈也契丹以其國産鑌鐡乃為國號故女真稱金以勝之或謂以水生金非也髙麗蓋州蓋葛牟城也明昌𥘉易名曰辰州鹿庵云有旨講究光祿寺職掌寺與卿漢官也應邵曰光明祿爵勳功也言光祿典郎謁者虎賁羽林舉不失德賞不失勞故曰光祿勳郎中令泰始置掌宫殿門户及諸郎在殿中之侍衛者故曰郎中令漢因之不改北齊隋唐止掌許左丞作新定官制圗大抵以唐為則品從略與金同杭州畫工潘氏寫真其法不用朽先草直以筆寫又不粉背言形似易容色難晦庵云周之肅拜今之長揖也唐檢校名蓋正官上加官沅州安撫使郭彥髙大名人説廣中風土其地皆山如水之波浪然蓋古盤瓠國在夜郎西南數百里與大理東境相接郭有詩地連兩廣多蛇窟水隔三湘絶鴈書丁丑歲二月初黃河自陜州靈寶清澄至河南府或云自潼關至三門集津壬子年拾遺丹丘千年一燒黃河千年一清又曰聖人生鹿庵曽命擬中省賀表天開昌運統一車書地應休禎河清陜洛恭惟德昭天漢恩溥淵泉覆露何止於中華洋溢逺沾於方表以致潤􅉼九折鏡淨兩涯自陜至巴幾千里之餘由乙踰丙殆三旬之久鱗介之泳遊可鑑山林之形影皆分躍圖馬於龍宫未容專美舞馮夷於鱗屋時出效靈顧兹上瑞之方增特表吾皇之至聖臣某等叨居華省幸覩榮光敢傾葵日之誠用代辭人之頌遐荒嚮慕百川宗滄海而王寶祚洪延万夀等丹丘之固正月上旬歌括甲子風災丙子旱戊子蝗蟲庚子叛唯有壬子最豐穰正月上旬子細看竇先生云近歲頗有應驗故録聞捷鹿庵命擬中省賀表天網雖疏曽恢恢而不失罪人斯得迓穆穆以來平外侮既消頌聲交作恭惟仁含動植德嫓生成振長䇿而用三驅念天顯而惇九族荐雷之震逺驚而邇懼大風之舉歌動而雲楊側聞喜自於日邊豈止威加於海內臣某等職叨省署阻奉鸞輿仲目龍旗遙伸虎拜歸牧武成於周馬歌功美邁於唐鐃六轡言還春動兩都之和氣千官飲至歡騰萬歲之霞觴馮渭金詔赦序有云霸陵森柏荒涼白露之中明惠寢園寂寞蒼梧之逺又云荏苒十霜竟摧一戰東坡我有帖云外郡雖鹿俗然每日惟早衙一時辰許紛紛餘蕭然皆我有也內慰字不挑心寫宋人蕭山則題云今專官橫將肆咆哮于庭太守色羞對吏民豈復有畫戟清香意象耶然坡非置公事不問時平事少耳為頴州時久雪一夕不寐欲造炊餅救飢人又發義倉數千石作院炭數万稱酒務柴數十万稱濟之未必常蕭然也所謂皆我有者特不以外物之有纍我內樂之有而巳惟以逸處心以勞處事是之為能官太常少卿宋弘道以先農燔肉來致適李應奉受益携毛詩青蠅至甫田諸圖請跋其後有云觀其禽魚草木車服籩豆之盛而經國備物之制令人相見三代忠厚氣象如在其間親承其事孰謂丹青形似起豫至於斯邪大都城隍廟設醮保祐青詞代鹿庵作天鑒雖髙曾易顯思之命基圖寅紹敢忘奉若之誠爰自君臨頗歷年所顧眇躬之上托致至理之惟艱豈期外侮潛消復荷天休滋至嚴風朔雪大開一統金穰玉燭屢致豐年而又雲靜祁連春回沙漢晝日三平安之報霜風無偃薄之虞匪涼德之能然皆神靈之所祐乃即青陽之月恭修金録之科誥演琅函真臨玉境導含景蒼精之駕覆垂雲洪廕之仁監兹報謝之虔重以保持之福干戈止息永維四海之淸邦國榮懷以尚一人之慶新船落至祭歲君文成舟委波謂之落至惟神灼知一歲之事泛彼中河轉致厥載上下安輸非神曷賴修端門前橋啓上告歲君地祇文應門將將前臨天津玉輅所經虹梁必陳爰構爰締築之陾陾神維垂祐迄于有成五方帝祭文因方殊號尊以帝稱殿臨五部有赫其靈維橋之作鞭石駕梁所兾擁衛大來百祥減江南冗貟詔草諭江淮軍民人等夫張官置吏本以為民非擾民也朕自混一江淮于今五年憂恤元元之心不遑夙夜期於撫定安集以承上天全付所覆之意比聞陳奏不圖設立之際官冗人濫重致煩擾念之憫然罔副朕志今者上自行省宣慰司下反總府州縣等官酌量輕重去處其一切冗濫凡有擾於民者盡行革去爾其各安恆業永底尓生既清舊染之風共樂惟新之治其有作姦犯科似前不應者巳敕行御史臺紏察中書省究治外咨尓黎庶體豫至懷誠諭官吏詔草朕自統一南北巳來設置羣官小六畢備俾上下承宣慰安元元而巳近緣冗濫省併一新自爾厥後各搷攸司以興滯輔弊為心以便國益民為事務施實惠母尚虛文夙夜在公尚期豫治若有狃習故常殘蠧害者國有常刑朕其敢赦故兹詔示想冝知悉唐申王六馬圗一曰奔虹赤二曰飛霞赭三日騰霜白四曰凝露驄五曰決波騮六曰發電烏內奔虹赤與決波騮綰結其尾絡首皆鞗銜皆有鑣撁籠者服色皆以朱砂紅石緑粧染蘇門郭氏家藏西溪折攬銘直言骨鯁天威雷霆非賴此檻資斧曷勝檻既折矣從修不修佞臣見之面靦心羞檻謂直臣可無結舌爾氣不撓吾寧惲折世多張禹代無朱雲直欄橫檻整整而陳噫徐子方繭瓶詩一竅鬼工開混沌八蠶神繭墮扶桑秋澗先生大全文集卷九十五
