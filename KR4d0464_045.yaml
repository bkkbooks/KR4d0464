body:
  text: 説遷固紀傳不同説余讀宋儒論項羽紀傳不同説以謂遷之意秦有天下五載而後楚楚五載而後漢方秦巳亡漢未立天下莫有攸屬不可一日無君况封建王矦政由羽出舍羽孰主哉作紀所以繫天下五載之權也立之傳班固意不過羽不可以抗漢因斷之曰皆非也正以二史之體不得不然爾在遷不得不紀在固不得不傳設使固取遷而紀是天有二日民有二王也其書將載之漢代之首乎次於髙紀之下乎其為稱號曰楚史乎曰漢史乎若以封建繇項氏出五年而後漢天下不可無君乃屬之羽曽不察首入函谷者髙祖之義師也授降軹道者秦民之真主也天命人心之屬漢明巳兆於秦十月五星聚東井之時也胡不考虞芮之質厥成西伯受命之基也當陽之不馳去昭烈淂統之年也若籍者正炎漢之一驅除耳矧才封已叛旋取復失安得為一日繼統之主哉若又曰固之意羽不可以抗漢故傳而遷漢太史也獨可紀羽而肩漢乎余故曰子長之所以紀筆削厯代之史也其意蓋以歷年相承不可中闕猶存夫以月繫時之法也孟堅之所以傳先漢一代之史也余故曰二體有不得不然者矣若宋儒之論恐求之太過耳讀史余讀留侯傳云沛公入關見秦宫室之盛帷帳狗馬之冨重寶婦女之美欲留居之樊噲進諌子房固知其不聽此正教之使先耳蓋良以沛公有為而多欲者也至此天理昧而人欲肆矣非驟能一言回也若已諌不入則莫之繼也故先之以樊卿使抑遏橫流少殺其方張之勢繼以苦口逆耳之言警懼啓沃使默識其神器所在何眷眷於此耳髙帝能無從乎此乃晉隨會諌靈公三進及霤然後以趙宣子繼之之義也不然噲沛之屠狗者也安知夫漢之為漢張本於此亟當力諌以成髙帝之業哉對張中丞説或者以張巡守睢陽之事為非曰古之人行一不義殺一不辜雖淂天下不為况食邑人以為守乎余以謂不然昔李翰表公握節死事與夫造唐之功嬰城之志亦云詳矣然尚有所未厭者翰特以功利為言未極夫臣子當然之理行而冝之之義也昔伊川有以武侯所喪弘多亦以不義不辜為疑者先生曰若殺不辜以利一已則不可奉天之命討天下之賊殺戮雖多理固無害且陳恆弒君孔子請討夫子豈得討恆時保不殺一人耶蓋誅弒逆之賊有不得顧焉者余亦曰此中丞之素心也公以一郡守之力橫制百万日滋之寇公豈不審夫強弱存亡之勢哉正以與城存亡效死不去當然之理也若無巡則無睢陽無睢陽則無江淮無江淮則唐之為唐未可知也由是而觀公之心利一巳耶為天下耶夫武侯控全蜀之力燃未灰之燼陳恆以穿窬之盜竊一隅之齊耳彼祿賊者豨突之頃九縣飈馳三精霧塞万姓以之塗炭大駕為之蒙塵其棄城圗存望風崩赴者又何啻草四郡哉俾唐祚中微禍亂接踵卒至於亡安史階之而巳是乃周公所必膺武侯不兩立者也論者不處公以大誼秪擲以救不至而食盡食盡而及人為非不知李司徒郭中令河朔之舉安陽之役屢戰屢北紛紛藉藉草野𬒳血者幾千万人能必其事事合誼人人得罪於唐室者乎若又曰上以政荒失國乃殘民以復民何罪焉是則李郭亦不義之舉耳傳不云乎臣民之於君猶子弟之於父兄也君父有難臣子奔救餘有不睱顧者若大義既正安得徇夫區區之小節哉不然則石碏不得為臣之純而王陵乃賊恩之大者也讀張籍書豫讀籍遺文公書大率稱公材識明睿當任著書之事又曰不以此時著書待五六十後而有所為或有不可及曷可追乎然公之志豈忘夫著述哉原道不曰斯道也堯舜禹湯傳之文武周公周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與楊擇焉而不精語焉而不詳又曰小醇而大疪意二子者雖云升堂終未窺其窔奧也豈公之心繼孟而下任夫道統者邪何藉之識必待公屢書而後悟哉而伊川亦云公之見道固因文而發耳嗚呼公五十七而殁若假以數年其見於後丗者為如何哉夫五百歲而後命世者出造物者固云靳矣而奪之遽何邪豫不得而知也彼籍之戚戚而恐公不及者竟如所言非有見於公也特以陽一隂二之理而言耳道之難明也如此噫犬相乳説轉運楊公家有犬生子而斃求哺無所獲鳴咿咿殊可憐有斃犬之母性甚獰既老乳久絶走而顧睞倣徨躑躅即其棲附而乳之既乳而乳真有遂盡活所棄子噫犬之畜也非有慈祥不忍之性特感於所畜者如此然老而復乳此亦異之大者楊公北燕人世為巨族盛年以勇毅從事兵間其活人救物釋難解紛功亦多矣雖揚歷州郡為顯宦其友愛之情日篤一日事姊如事親敬兄如敬長以致弟念天顯兄鞠子哀一門之內兄兄弟弟怡然而理順曖然而氣和若棣華之相承手足之互為用耳何其偉哉傳曰國之本在家家之本在身蓋一家之隆替繫一身所行如何爾其善惡感召殆影響之應形聲也昔北平王道行於家有貓相乳之兆董召南孝且慈有雉哺其犬之祥今楊氏大感於所畜極不忍棄其後之意者表公樂於為善之心油然生乎其中也其乳絶復生意者見公福祿將老而未艾也巳棄之物遂獲生全意者勉公故舊之恩所當復也丗之人以犬之悲嘷為不祥非犬也殃自人召也是犬也持性於不忍為姑乳之亦非犬致然也福開有先也夫冨貴福祿人之所大欲也故韓子有云得之之難未若待之之難也得之於功或失之於行得之於身或失之於子孫今吉祥止於楊氏者如此其厚而隂有所積也必矣冝乎有犬相乳之報云嗚呼楊氏其善持之既談其事懇豫以敘故書磔犬者説王子逰於市見群犬逐一叟號呶而不去詢其故曰屠犬者也於是乎有感夫人之為不善禍從而磯之亦何以異於是歟且犬之吠逐非有見於物也特為氣所感而巳至若雷霆之威人有叛父母褻神明者或下擊而斃之豈造物者區區環域中特索夫若人而敝之邪故先儒有言迅霆者天地之怒氣無良之人其凶戾與天地之氣自相感激遂震以死此略無疑者彼犬之見逐雖小大不殊理固然也從是而觀人之方寸胡可萌一毫不善之念哉微則至於物怒而見搏大則至於天威下罰故橫浦云一念善則祥風和氣在於是一念惡則妖星癘鬼亦在于是可不敬畏之哉是知天氣下感於人人氣上通於天者犬昭昭矣因筆此有以明夫感應正理不眩惑於鬼神怪誕之説云鈍説夫器之為制小大輕重適厥用而已然以銛鋭拙鈍用之多寡故有敗之夀夭之異焉趙君仲器博物多藝能喜筮而絶市道觀化而樂誘人古所謂不居朝廷而隱醫卜之中者之流也一日愕然以所感告豫曰適過梓人氏顧礱削之器縱橫前陳例乏完好因詰之曰操幾何而致然爾豈材負劣弱煆礪弗精而然邪匠者曰不然彼斧斤刀鋸之屬銛乎其鋭者也特以朝夕從事乎削斫礱刮或半歲一易或旬月一易逺者不逾期年比更新而無孑遺矣因指其輳輪之錘曰是置於吾祖用於吾父今傳於豫惟其碇然朴鈍用寡而無所損益故能夀於彼而若是其久也僕因曰豈獨物乎人則亦然進鋭者退必速任重者道能逺是輕鋭者不若堅鈍之為愈也夫木訥之仁朴魯之忠外視之若癡絶而緩於事及其臨大莭處大政守固密而罔疏挺剛健而不奪亦何異兹錘之輳圜輪納疊拱刜蟠根隱錯節支離者周比而無間倔疆者妥怙而端平由是而觀可謂宣力弘多收功攸厚者哉彼丗之人秪知利之為利曽不悟鈍之為利廣且博而夀且久矣豫聞其説而韙之吾將藏吾器飬吾鈍斂吾圭角息吾氣機引重致逺俟時而動以利天下可乎趙君曰嘻子其得用而不括出而有獲語成器而動者之道也於是乎書至元壬申二月九日題服色考陳節齋祐以宣聖像設既素而繪仍以服色為言曰冠服之制所從來尚矣然自三代之丗變易去取其義有不同者某雖不敏試請而詳之夫冕平而旒笄衡而紘上衣而下裳垂紳而履舄繫而帶珮而綬此三代王者不易之制也今宣聖其紘其芾其純其舄皆丹乎質唯服之色尚玄何也考漢晉志書天子以袀玄皂繒為大祀之𫀆服於孔子服色非可據而明也謹按大戴禮云有虞氏皇而祭深衣而飬老逮乎夏后氏王以水德色尚黑易而􆇄端玄裳故收而祭燕衣而飬老又諸侯以天子燕衣為視朝之正服有殷氏以金符德色尚白易而練衣縞裳故哻而祭縞衣而飬老及周有天下以烏火王色尚赤宜乎以赤為飬乃曰冕而祭玄衣而飬老何居鄭玄云周則兼二代而用之也若夫四代之禮飬國老於膠序蓋天子師而學之也唐孝明皇帝尊師重道爵孔子以王列弟子為素臣至於冕服之制亞次之秩廟宫之法饗獻之禮講明論議亦云極矣今之制實開元儀也其義正襲鄭氏之説耳故冕服尚玄用夏禮也朱芾斯皇示周制也錦紳素質兼祖法也彼領𬒮緣飾又復純赤何也詩素衣朱襮者是也襮為領諸矦之服也據爾雅黼領為襮黼繡為領丹朱則其緣也又范曄云天子祀天地宗廟釋奠先聖皆服袀玄緣領以絳漢明帝以紗為中單或者疑此乃中衣表而出之非緣也豫以褻紅紫為非後之賢者加諸乎夏后氏云其色赤則示赤心奉神明而已兹概祭服而言也在吾夫子則不然特又明夫周所尚之之義也蓋孔子帝者之師禮王者之後以天子燕衣為之御周大夫士私朝朝玄端夕深衣孔子以時則周人也以臣則魯司寇也以後則啇之孫子也其道則堯舜禹湯文武周公其法則禮樂刑政而後王報功報德有罔極焉者曰公曰矦曰師曰玉曰帝可也宜乎用三代服色而兼備於一躬也尢昭昭矣又有曰方而心者當乎膺曲而領者施於朱襮之上何也此蓋漢猶有𬒳之者故朱勃衣方領能矩步乃學者之服也其象則圎上而方下蓋取諸乾坤逮晉隋唐以來天子有事乎郊祀冠通天冠束白假帶方心曲領猶存乎前代之制耳其十哲服色大同而章有降殺之異下至七十二子佩服皆青士子父母具純衣以青體少陽而致敬也其帶則縞有受道之質也夫諸子乃以士從父師而學者也詩不云乎青青子襟殆學者之常服云鸞刀説余往歲客汴梁陳君逹夫出示玉刀長二尺許鋒首斜削廣餘五寸玉水蒼色極光潤扣之聲清越以長其拊容握末有環背通刻柷敔狀端有竅圜徹陳曰亂後入太常官舍得之不審何物於何所用豫曰此省牲之鵉刀也其端之圜竅蓋用繫鵉未所施環即著和耳傳曰鋒有鵉環有和是也禮云割刀之用鵉刀之貴貴其義也端有鈐取其奏刀中莭聲和而後斷環有和取其斷非和則劌和非斷則牽天以秋肅物和之以兊聖人以義制物而和之以仁鵉刀以和濟割此其義也詩云執其鵉刀以啓其毛又曰鵉刀以刲何休亦曰鵉刀宗廟割切之刀然孔氏有古刀今刀之異古刀遲緩難用宗廟用古刀者修古故也由是而觀今刀古刀其實皆以金為之此玉也其何能割切哉豈漢唐而下三代之禮實亡名存者非一刻玉為刀郊祀之際執以示古儀乎至於去質從華亦由近代用金玉為匜爵代越席以臯比也恐未盡惟彥伯太博詳覽涿州移置考至元八年秋九月豫以省覲來涿因拜謁孔子清廟遂讀唐貞元中使待莭都督幽州諸軍事彭城劉公建孔廟碑乃知州治本幽州盧龍軍屬邑范陽縣也至代宗大曆𥘉詔始分范陽歸義固安三縣為涿州治范陽涿郡即涿郡故地為名按輿地廣記漢𥘉髙祖始立涿郡魏文帝改范陽郡其地左碣石右督亢南控鄚城百里而遙北連幽薊百里而近唐巳耒中間控制蕃戎部落甚衆又河流縈帶前後有林麓陂池之利周廣磅礴鬱為雄藩及辨讀遼統和草八年州刺史廣陵髙公移廟碑隂記云舊廟本在南城東北隅是年刺史髙公移置南城東南隅康莊之左因復悟今州城南北若連環然意者置州時展築南城而廣大之今市中隔門本故縣城南門也觀此前後證據甚明無可疑者噫豫往來幽涿間蓋十年于兹嘗以隔門之制為惑詢訪土俗莫詳其故且方物之辨一事弗知君子耻諸不圖聞一得二使數年之疑一旦渙然冰釋亦可喜也特表而出之敢貽涿之好事君子以俟更孜云締觀説吾鄉黃冠師房公體鴻厖貌古而心通讀儒書喜營治嘗作吳殿於棣華菴故址締構日豫與亡友季武子文往觀見工人數十附立楹顛方納栱駕梁為事其枘鑿縫縮有略不相認者衆工爭左右晲材分繩墨曰不少繆即縆驅鎚按呼號半空強以力相下良久終無奈木何一工者舉手招衆曰聽無譁衆瞪目東北嚮率弭耳受嗾豫二人從所向顧之見一老道士傴僂擁敗絮曝日坐短垣下俯其首捫虱略不一仰睞苐抗聲騰言以手畫空而已云東西行若干寸南北起若干尺此蹇傲者彼之所枝撑也彼拗捩者此之所走側也上工即如教歘衆材軋然作聲若相尋而契果安貼停穩不踰若所料豫問道士於房曰此始謀畫宫于堵斷手載名其上者也豫因有感於中乃知天下之事有大有小人之材有能有不能俾細大不捐區處適當此宰相之聀也君人者何憂乎不治苟明大者反知其小任小者反負其大是上下錯繆冠屨倒置欲求功成理定難矣哉持衡者曽梓人體要者之不若也師啞然曰筆之可也於是乎作締觀説屏雜説嗚呼雜之為學其害道也甚矣麴蘖雜醴齊為弗醇享飪雜鼎美為之變味宮啇雜音奏為之惉滯君子之所不取而不由也况學乎學而雜心則交錯而二其行言則叢脞而昧于理動則拂亂而失其冝至于文章翰墨一糅于雜偏駁不振尚何理之能著家之可名乎謂為道尤判然離而曠且逺矣故傳曰攻乎異端斯害也已然博我以文多學而識之又曰君子耻一事之不知能無雜乎蓋聖賢為學必務其大者而使小者從焉其所以務之為者明理致知收放心格庶物而已四者既主存于中雖諸子之説百家之言日至于前猶衆川之流朝宗而東常我之主孰能雄而長之撓而濁之者哉况約之以禮詳之以説為之澄滓于其後者非一如是則何患乎問之該洽學之博雜者哉戊子夏六月庚伏有七日發藏曝書得雜文百餘帙睨而視之皆豫稚歲所閲習多曲學小道廢日力不少不覺喟然曰兩漢而下學無師傳安宅曠而弗居正岐舍而弗由者其我之謂乎使吾老而困困而無所成者職此之由務于𥘉而害其大之為也於是命兒子輩屏而絶之板為三夾束置髙閣且誓之曰今而后非有命不得發而妄閲以蠱惑其心目大抵中人以下之性所偏者多同而特逹者或鮮吾今是舉正以巳之所偏且正汝之或失也是吾不忍以誤我于前者而又誤汝等于其后也天其或者果汝之賢而有全經全史在焉泝流探源採剝其華實咀嚼其膏味少有所得以之修身齊家推而及于物將見終身有用而不克盡者尚何以他為哉小子其服之無斁作屏雜説答客問至元草一年春正月豫有中省郎曹之命既而以事不果行或傳豫抵燕視其有不可而歸者嗚呼誠身之未篤不為所信也如此作答問以自見其辭曰客有過秋澗而問者曰子不旬時而𬒳旌招者三將謂趣裝有期反柅其輪而脫其鞿者何也方今王者無外四海一家渴於得賢以光國華有片善者無不録效寸長者靡不嘉故有立談而致卿相略而不及其他士或韋布進無資涯名不登于仕版何得挂銓曹之齒牙子今幸蒙見招未為不遇官列郎曹名都省署切近論思周旋宰輔設或有為澤及黔庶曽若無聞又復何顧豈子志願未充班資尚卑重有所覬其行遲遲豫仰而歎俯而思人各有冝孰不自知越分而行有乖無隨豫方以再命而傴僂尚敢以鋭進而為期也客曰豈子欲信猶屈道行未隆甘於泥蟠以固其窮然聞聖哲席有不腝援溺救焚豫曰丗之康濟固自我化道之隆汚蓋有不為命者然墨突不黔其炊煙孔轍幾環於天下雖遑遑於救丗亦觀時而取捨豫且何人敢妄為之駕也客復曰子豈年近耳順歲月向邁心智雖強膂力弗逮曰若不肖齒髮雖微未為衰暮顧嘗攬轡外臺峨冠憲府從事有年艾服頗素其責固重即其心則安道可行雖一日不去故黽勉盡瘁不遑寧處通其考則為四百其月則去五豫亦知力之有所不及蓋嘗以明時可惜憤功業之不顯著也客曰伊懷既然子何見其一而二之不覩投會是機進退餘𥙿忖其不可即以他務尚不失邯鄲之故步不猶愈於刻舟求劒守株而待其兔耶乃若而然客轉談之誤也今有司以是召我其行或否理之所當喻也若顧量可否以改圗為舉是先以不誠自將上欺君父以幸為利取便巳故是又義之不敢與也客曰然則子之志嚮果云何而可哉傳不云乎士有二道出處為大進退無常惟義所在又曰可久可速其行其止蓋平日所素學不容以彼而易此今吾子堅欲推挽抶之使前是茫洋徑涉趣入於無涯之淵設若有為徒勞勉旃至于出處之道論之誠君子之不然此吾之所以不果執宣父之鞭也故為可為於可為之時則從而寧為不可為於不可為之時其咎即徴杲其可之與會客何勞於勸懲吾年雖耄目顧矍鑠尚或堪於一行客唯而退於是筆之以自銘謗解豫作謗解夢人以壞木寓蠧見示意者謗由我興非外至也然謗之惑人深矣公孰與制私無以勝其説至肆行而不少憚以隂擠而為陽助𬒳之者鮮克自處欲弭之而無術也嗚呼丗教下衰友道日壞私好惡者愛之者欲其生憎之者即其斃口溢金蘭心包鬼蜮謹其藏已射其形亟為防巳螫其毒矣輕則噂沓背憎浸潤膚受妄生事端橫造異議忘我大德利彼小私傾良惠姦傷公害義認為憸人坐擅形勢苟淺之為量者不自返而縮徒恚夫此胡為而致焉思其稍逹藉勢投卑使恩讎兩明以泄其忿懥恐非君子以直而報之義也夫聖人所以列朋友于天倫者示其當重而親匪大故則不容棄也又讀小雅何人斯篇彼暴之譛蘇公也至獲戾失職亦云極矣略不見聲色於辭氣何三代教化和平忠厚成士德也如是至好歌忠告反以不忍遽絶為言其亦審夫天倫為重枉為小人之為也靜言思之大有契豫心者豫雖愚而懦受人侮者不少然天之所卑於我者似不薄矣矧諺曰禦寒必須重喪弭謗莫若自修大率常情之所未免者其疚有十處巳之不恭也御物之不誠也嫌與疑不擇也毀與譽肆行也或以巳長格物或以剽義沽名或出戲言犯衆或恃口給陵人責人太重而以驕吝自矜審先去此十病無瑕可摘謗奚自而生哉而復守之以敬慎將之以忠厚以蘇公之心為恕以中庸之教自處其或有作於上力易斯弊上以格憸人之非心下以殄讒口之罔極建中子民歸之以厚俾欲校欲報者亦不得賊其衷而發之如此我之所謂疢者而或有瘳彼之所謂謗者亦庶幾其少熄矣作謗解對魯公問後云思保歲寒之莭徇國家之難爾顔魯公唐一代巨臣論者當明其心求其迹則非也公始終王室死而後巳蓋素所藴也不幸值唐中衰以孤忠大節立于傾朝死覬一言有輔於國至于老不退休大率朋友之交遭罹患難尚有相死不輕去之義况君臣乎及盧𣏌當國見其嫉賢亂政公復以正言折之既憎公直重忤杞意至遜辝為謝終不少解巳而有宣慰之命每讀至此未嘗不掩卷而興慨也于時公豈不知一入賊庭撗噬虎口意者比之使𣏌姦計媒孽其罪㗸冤入地靄而不可明是不若履忠蹈義明死於使華之命尚或摧沮逆謀以激忠義之士而愧夫天下後世亂臣賊子之心是乃不以李鄭勸而不行為得而以死于義命為安也要令千百世後義烈言言如嚴霜畏日有不可尚巳者此公之心也嘗以忠義者國家之元氣世當顧護靳惜使信其巳往不泯之志勵夫將耒至簿之俗而為天下之大間如公者誠不可例與具臣者論其進退之迹也若專以老不致事為嫌是又失見危授命之義也况唐人之于致政𥘉無定躰至元戊子秋八月草日晨起偶記往年對翰長之問特為筆此且發所潛之幽光云儉訓人之生于天壤間分所當得者隂有曰料涪翁謂一飯先書籍者是也未老前固不應空乏凍餒而死如其暴殄過度以旬時之用為一朝之費促之而不給者信有之矣故諺云兹焉不足往則太過此言雖微可為永喻昔李文饒相而後當飫羊十萬數未充而𬒳斥蓋已用者過侈故也此非明驗可不鑒哉今余一家二百指日所費以酌中計之且約五貫文是須千八百餘緡可支一歲其於慶吊賔客差徭之數又不在內顧余生事四民之業一無所營而終歲所耗如此造物者斡旋供億亦巳勞矣吾何德以堪之復𣣔終日望望然致室之完美此心斷不可萌至量其所入度其所出如且休接闕之説此念不可疏也豫今年六十有二向之所謂心焉而志學焉而力者日趍于衰微安坐待哺外餘無能為秪有以勤儉律彼使猥承家事而巳傳曰家當克儉焉邦當克厪焉又曰生則在勤勤則不匱儉為德恭侈惡之大也此雖聖賢垂教格言不可斯須離逖然孰不念而知之但齒年未至不經其事之囏難者鮮不忽而略之是自逺其恭德昧夫寧固之理可乎逮其已困歎彼之豐傷巳之窘方思莭約以輔其不足不亦晚乎汝等其勗哉毋替作儉説遺山先生口誨遺山先生向與頥齋張公諱德輝字耀鄉終河東宣撫使自汴北歸時史相請為皆吉秃滿作碑過衛先君命録近作一卷三十餘首為贄拜二公於賔館同志雷膺在焉先生略扣所學喜見顔間酒數行令張燈西夾曰吾有以示之先生慿几東嚮坐豫二人前侍披所獻狂斐且讀且竄即其後筆以數語攦其非是且見循誘善意而於體要工拙音韻乖叶尤㘦致􅈤每篇終不肖跽授教再拜起立夜向深先生雖𬒳酒神益爽氣益溫言益厲覺泉蒙苑塞灑灑然頓釋如醉者之於醒萎者之於起也説既竟先生復昌言曰千金之貴莫逾於卿相卿相者一時之權文章千古事業如日星昭回經緯天度不可少易顧此握管銛鋒雖微其重也可使纎埃化而泰山其輕也可使泰山散而為微塵其柄用有如此者况老成漸逺斯文將在後妹等其朂哉母替坐客四悚有惘然自失不覺嘆而發愧者既而鼓動客去先生覆衾卧豫二人亦垂頭倚壁熟睡及覺日上先生與客已觴詠久矣於是胠篋取一編書皆金石雜著授豫曰可疾讀吾聽愜其音節句讀不忒顧先君字而謂之曰孺子誠可教矣老夫平昔問學頗得一二嵗纍月積針線稍多但見其可者欲付之耳可令吾姪從豫偕往將一一示而卑之庶文獻之傳罔隕越于下先君起拜謝不敏曰先生惠顧若耳何幸之如王氏且有人矣敢不唯命期以眀年春當見先生於西山時歲甲寅春二月也後三十五年戊子冬十二月臘節前三日小子再拜追述政問至元九年春豫以御史滿秩除平陽路判官過辭諸公以臨民處已之教為請右丞相史公曰汝讀書年長久在朝行今官外郡寅奉之心當常若在朝野時至于事機變轉不可預料臨時制宜可也翰林學士鹿庵先生曰長次不睦及首沽虛聲今天下之通患推讓有終為上詩云靖恭爾位好是正直神之聽之介爾多福况人事乎餘何言祭酒許魯齋曰臨政譬之二人對奕機有淺深不可心必於勝因其勢而順導之同僚間勿以氣類匪同而有彼此或有扞格當以至誠感發無所爭矣其後揔𬋩萬奴耒尹亦請訓於開府史公曰今判官王某性純直頗諳事儻有所疑當與可否至於左丞姚公吏部尚書髙公諱鳴雄飛每以事使晉府者必有言顧慰至秩竟僚屬友愛以理而去時十有三年春三月也不肖今年六十有二老不能用追思往事如此等格言有不可遺逸者因特書云且寓夫強仕之不可復也是歲戊子秋七月丙戌𥘉二日也醫説贈胡君器之醫者精微之術也又曰醫者意也得於中而可以應諸外通乎微而後可以逹其變此必然理也豫素有中脘疾二十年間凡三舉發𥘉得于燕也醫袁以玄胡劑療之法既緩再宿而疾乃巳在趙藥以神寶名者攻其中堅暝昡搜索上痛方厲而下動大作猶一敵未退而復生一敵物雖去而泄不止豫頽然而卧力不勝而氣巳憊矣間日而氣始平其作於邢也陳氏亦以類趙劑者投之而為苦與先尤加劇焉今者蹶動感似輕而痛則一上閧於中州旁刺於兩脅後延於膂􅘡撞搪衝拉頭岑岑而氣翕翕求少寐以休吾煩且不得也胡君器之亦探藥之粒如者曰朱砂圓下之豫顧其劑微於先疑為力更峻器之曰無慮為苐下咽覺腸間少鳴而微痢則痛隨止矣巳而果然繼以厚朴湯調之忽醒然而寐如釋重負而濯淸風也師寤日髙三丈許豫體中巳平曽泄之不復作而氣之不少憊也器之天資髙業顓而學博識明而善斷出新意而不泥古知其常而通其變嘗曰人具五行稟之者不一天有六氣感之者無常病雖名同而證實有異者苟以一槩治之吾未見其能也故證之壞者往往濟而獲安昔霍嫖姚行師少衄多勝正以不至泥古兵法顧所遇吾應之者為如何且豫於器之亦然作醫説以貽之秋澗先生大全文集卷第四十五
