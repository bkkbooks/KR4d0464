front:
  text: 秋澗先生大全集卷第三十三七言絶句
  hash: sha256:b91bd57ed69a312c9cb20b06817ceb0d0c967645370728a4648f2bea94179a36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_033-1a}
body:
  text: 野莊圗并序承旨董公繪野莊為圗求諸賢題詠中齋草序以同人致亨晦叔撰銘以擬倫溢美恐未盡公臆之所在若夫士君子出處固皆有命不可以遲速工拙為言然當得行道際靜退之心何嘗食頃而不在懷也以艱於自云必托物以表其志雖未能挂冠神武斂裳霄逝較之鍾鳴漏盡不巳行者猶賢乎巳喜為賦詩初弗計其不自量也其辭曰午橋吟醉平淮後啇嶺鴻冥定漢餘正恐野莊歸未遂九重思治望新書老筆錬餘詩律細事機諳久宦情踈輞川圗上王摩詰靜退為心是本初寶珠換却杖頭鳩空見秋瓜憶故丘白首相看官舍底晚年心事轉優遊輥馬圖馬蹄立論見天機四輥塵沙更適冝恰似解𫀆隨意處小齋磐礴退朝時題錢舜舉畫梨花香翻玉笛真妃怨雨暗樂語凄不似錢郎能駐風庭日醉如泥水西千樹閙春華莫把芳容帶雨誇看取一枝橫絶處洗粧還是漢宫娃題廄馬圖前年扈從獵長楊偶雜髯騶宿野莊一撁玉華三百匹老人垂淚説先皇三笑圗元聖開天一理融推心不外善為宗後人剛作無同論三子相逄笑殺儂題劉導引卷末傳家素有延齡録手澤珍藏鏡李辝吹就棘心親不在每觀凄斷凱風詩題朝元宫劉道人秋聲圗紫極宫深景氣秋翛翛窗竹發詩愁謫仙千古風流句輸與歐公作巧偷少年心事讀書臺涼入郊墟巳快哉星漢在空人未寢一聲猶憶樹頭來寧戚叩角圖長夜漫漫志未伸單衣雖弊霸圗新一匡巳在夷吾佐激烈啇歌惜自陳覺山寺題示元貞改號夏四月九日為勑建司徒鞏公墓碑同朝貴來會需命間客有談盧師當遊者山道阻遂折而入覺山精舍觀泉景氣瀟爽不獲留宿為恨山僧泚筆請留詩于壁偶書此以記來曽偕遊者太一李宗師承旨董野莊大學李內翰東平賈彥載秋澗老人王惲題為樹瑶鐫未奠間杖黎尋勝一躋攀世間萬事真難必來訪盧師入覺山誰削蒼巔峻作崖碧瀾直上妙髙臺靜功儘辦瞿曇鉢石鏬清泉迸玉來山因寺勝寺依泉雲自無心景自間懶陟上方窮逺目黃塵深處是人間丙吉問牛圗休驚宣父才難歎兩漢調元見是公後世幾人能辦此救時才得一姚崇右軍觀鵝圗照眼䨥鶂引頸來胸中妙思與之偕寥寥尚友千年後只有涪翁識此懷又跋問牛圗坐理論思一相功只今機務簿書叢後人刺口無輕議世事看來總不同閩海道憲司書吏張禧事母以孝聞本道具辝上逹得請乃以所居論秀坊為純孝健如五六十人諸人賦詩為慶吏業傳家説寧馨炎方享夀見徐庭婉容還憶相看處燭治官書在憲廳飬親致樂固多歧無重承顔志不違純孝表門才兩字四山和氣動春暉平生快吏元康筆俯就功名力不難邂逅南陔見深愛為親初不厭卑官鄉閭顯異有新書衣錦還家喜不如歸到建園春正好里人拭目拜潘輿寸心擬報春暉飬椂食榮同頴叔羮兩地月明思最切倚門心事正懸旌建人悍徑尚氣莭不尓秀狎多文儒鄉間今説張忠孝還似中林返哺烏淵明臨流賦詩圗秋水門前有令姿先生非是好吟詩因觀逝者如斯説天運何嘗有息時題存樂堂詩卷當年膝下侍慈顔蒲樹悲風入夢寒不及一杯菽水飬對君慚愴淚闌干寸心不到南陔飬空羡中林反哺烏最是范公含恨處百年溫飽見妻孥題成經歷晚翠堂雙檜堂前晚翠新歲寒相對更情親東家桃李君休羡爛熳光風幾日春七十平頭恰數朝望秋蒲桞到松喬何當醉倚處滿院秋煙濕翠翹明皇驪山出獵圗都尉王晉卿筆五家錦繡迷川谷萬馬旌旗獵帝師治亂兩途明在眼丹青渾是黍離詩玉泉巖并序元貞二年正月中旬兩夢登海山絶島明日鄰人葛巨濟以此山見示巖巒四面皆自天成色深翠秀麗惜其淪落泥塗慘淡有未之發者上刻五題曰夀山曰玉泉巖其傍絶頂有懸流一脈下注山足甚鮮明也曰崆洞洞曰子陵灘曰白石瀨皆以金填形勢與玉泉山不殊疑前金宫中物也兩夜登臨倚碧岑夢中驚絶此﨑嶔朝來翠射娉婷底笑煞平生未足心送韓推官之任廣固支人韓侍御君美子歷試諸難貴逺期休言為吏莫為推煩渠細讀瀧岡表恐是廬陵積慶基花樹韋郎好弟兄當時同宦最關情三年不見諸韓面却為儀山作送行元貞丙申立春日作前歲徴車起陸沉清優特置在詞林明知不是啇顔客當體先皇飬老心終日思歸憶故山玉堂金馬有堪憐只知蓮炬君恩重其奈山公啓事偏六藝蹴空成底物龍鍾何有玉為堂眼明愛殺韓忠獻到了蘇坡一議郎題西湖圗東南形勢説餘杭誰辦山溪作國防踏雪欲尋龍井去表忠祠下謁錢王丙申歲京師元日門帖子三冬露處無家客七十殘年有限身強項一生今潦倒更將低首嚮何人中舍無心喜外遷非緣詞筆厭雕鐫眼中故舊飄零盡嗤點從渠最可憐錢舜舉折枝圗探花走馬醉西城歲與東君似有情不是今春風色惡折枝圗上看清明院中即事元貞元年為修實録移在北中書省內有時下直出銀臺三昧楞伽亦快哉不似近年官事急小車還聽吏批來李肇翰林志説前輩傳楞伽經一本亟在屋壁每下直出門相謔謂之小三昧出銀臺門乘馬謂之大三昧如釋氏云解縛而自在也重遊玉泉并序元貞二年龍集丙申三月二十八日大駕北狩同翰林諸君送次大口回獨與孫笴西過玉泉因憶至元七年御史裏行時來遊者一十有五人歲月如流轉首草五年今在者李司卿輔之溫漕使次霄與不肖三人耳人欲久不死而于人世何如也凡得詩三絶留山間而去轣轆澤車轉碧崖山煙喜客望中開畸人問我從何自適送鑾輿大口來進水山僧去未回日長空閣獨徘徊尋詩不到瑶華洞踏遍松間碧色苔山頭亂石鬪􅒎丫水底浮光浸碧霞絶似蘇門山下路惜無修竹與梅花清白圗為何掾舜舉賦傳家素有遊鯈潔竊祿生憎碩鼠貪三考臬司如一日眼中何掾德無慚題韋偃十馬圗浮深角壯恣遊嬉沙苑春風碧草齊聞説紫宸初立仗內家正要不鳴嘶國初鞍馬説江都今見韋侯十駿圗獨愛少陵忠義氣艱危安得濟時需和東泉翁山中雜詠一十三首過眼紛華興未闌人生難得老來安山中致爽饒清賞不是悲秋強自寬山居為愛淵明不自賢夕陽飛鳥兩忘言巳邀白日羲皇上况復青山是故園清美堂啓期三樂素非狂帶索行歌老自量明理巳安循理轍息心元是飬心方歸來亭生平遊刃擬青萍一日歸來與道寧繞樹每憐驚木鳥思親時上望雲亭丹砂玉屑燕窠瓷臺閣風流見一時桃李春光能幾日惜君元有歲寒姿幽芳軒朝三暮四本來齊誰為兒童較栗梨今歲見花欣實美山中風物要通知香雪原田家剝棗暮秋初野甑蒸香木蜜酥不冨正緣無滯貨芋魁墻外又成區木蜜岡山中處士玉堂仙兩地相望思渺然説有詩來多勝概含情多在碧雲箋杏塢靜約幽人品羽茶偶隨稚子去鋤瓜問君何似東陵日猶是峗山故老家瓜堰門外清泉兩汊流臣心如水更何求濯纓濯足終多事巳分心身到逸休東泉樹影扶踈聽鳥音可堪時事百年心髙情愛殺陶元亮一盞秋香見獨斟西泉德澤涵濡得二難百年祠館見遺安蒼蒼一片墳臺石留在行人下馬看墳館士論推稱諡最公瑶鐫三尺刻文通因君喚起西南興夢寐洄溪碧瀲中先君衛士夫私諡為文通先生曹右丞生祠手卷前年拜掃王墳廬笑逐雙肩到並驅林薄氣清侵邃宇人家春社樂于胥農樂無如歲有年更將民瘼細為蠲應憐右轄祠邊月花栁深村有二天李白醉歸圗雲陳橫陳大渡河一書能解六蠻和仙韶莫詫君王寵七寶粧嚴未是多襲美堂詩雲中張釭母姓楊氏性資淑惠小心敬畏早見知於中宫出入禁掖垂三十年前後賞賚濃渥楊殁上思保育之功贈安翼趙國夫人生子六人長曰鎮出刺荆門沂水二郡其四曰鑑知東勝州餘皆宿衛宸庭襲美看來媺在中當時安翼有深功春風吹下蓬萊閣二子歸來五馬驄自題寫真白髮刁騷一幅巾遺書浩浩百年身縱令不入麒麟畫巳是三朝館閣臣李德𥙿見客唐韓滉筆徽宗臨并御題在後金鑾載筆寵光多三鎮聞風自削磨開運中興元兩樣相君勳業邁蕭何恩讎平日太分明胸次看來氣未宏不鎖匱坊停衛士諒知堂上有竒兵動華夷機務論思儘有為一貶未應生重崖州山色要新詩經綸心事在思亭據榻髙談似自矜不見省中溫室樹孔光終了説何曽有才善處是無權朋比為心自黨偏邂逅郡樓回首處杜門應羡晉公賢意氣揚揚與脅肩較來失德兩同然春風滿眼桐花鳯不是當年諤諤賢送同知范君璋之任平灤昆明授法起􅉑嗣民瘼洗蠲冝飽知後日鳴絃千室邑豈惟活國説良醫三紀承恩鶴禁深一官灤海任浮沉固應天上張公子好識當年大范心張遂初詩鶴禁辛勤四十秋端功端品可封矦一官才入尋常選猶𬒳時胥問解由需軒閉閣陽城醉似泥諌臣為論在韓疑一朝力折延齡相識得三陽出險時據按事從中道處洗心思與繇辭新小軒不似朝來喜倒屣門前不速賔則天朝回圗萬有潛隨一氣回武炎如火李如灰上陽宫殿春風暖花底朝鞭隱若雷過甕山記老人語刑清兵寢歲豐穰五十年來帝道光駝馬欄東逢老叟向人猶解説先皇題劉元禮挽詩卷後有得歸為怙恃榮三年索米可憐生一杯不及慈闈飬空有殘魂繞斗城三尺旅墳燕地鬼一篇新序翰林詞友生最是情鍾處夢斷空梁月落時客死無歸最痛心李生哀慟惜知音只緣識得天倫重不為黃金緑綺琴任氏具慶堂詩卷善積中來慶自全一堂和氣覺春寬人間兩字風流處貼在兒兒額上看夀援諺語應踰七數比名泉更益三婺女老人元瑞世兩星今見濟之南劉簽事友竹亭詩退食歸來對竹吟相看同抱歲寒心只今眼底交情薄不似環亭翠影深公子清標有足多紫微垣外侍雕戈料應瞻彼猗猗興瑟僴功夫見琢磨題錢選臨曹將軍燕脂驄圗涪翁醉草丹青引祕省珍藏獵騎圗老眼再觀知有數喜從唐本玩臨摹第三句一作書入陵那復得龍種中來見異姿春風舞影下瑶池馬中嶽湛錢郎筆寫盡坡仙七字詩刻烙天全固可悲不應顧影自驚嘶君看慘淡經營意重為莊生解馬蹄首脫金羈籍帝間春風沙苑草芊綿承恩幸在休間地誰與爭鳴八駿先良驥初非以力聞丹青傳寫畫圗新超超説是千金駿踶嚙何曽到圉人相馬圗駑駘安分老青芻騄駬論才白璧酬相馬只今誰伯樂解教駑驥兩垂頭題趙嵓人馬圗嵓五代人嘗為朱溫駙馬都尉天廄真龍自不凡未妨束縛具羈銜當時一筆千金重今恨無人説趙碞甲午歲門帖子旅食京華兩見春哀年來作玉堂臣一家溫飽恩光裏輔報無方愧此身題徐中丞子方愛蘭軒詩卷吏部尚書昔刺濕索賦幽蘭在谷似幽人相近相親有使君獨愛遜綿詩律細宛從平淡發竒芬手治蘭臺種竹圍護香籠日淡炎暉絲綸閣下文書靜却似當年對紫薇山行還喜得夷途路轉蘭皋更可娛十里曉煙香不斷春風吹𬒮過鵝湖豫嘗往來饒信間景物多異惟鵝湖山氣清淑土脈馨潤所産花卉非蘭即其餘有不敢與之並者晦庵先生少時愛其地勝嘗讀書於此特表而出之濟南録事參軍解君瑞芝圖曄亭亭紫蓋光氣和無地不芬芳一枝特秀溪堂似表參軍政異常從來腐朽化神竒正自餘精發菌芝浩蕩上林春色裏自憐蒲桞望秋衰題李巨川衆芳亭引水溉餘紅藥秀繞欄看得緑隂春帝城擾擾黃塵底獨惜幽香亦可人傾囊不惜買花栽釀酒留香待賞來説以西園瀟索客從今無復眼慵開主人襟韻有餘馨俯仰乾坤一草亭餐菊佩蘭當此際江漁休笑屈原醒淵明歸來圗獨遊初不為良晨步入斜川别有春多是斂裳宵遁日眉間歸色喜津津徽宗花鳥圖無逸圗空冷御幈翠香珍羽惜娉娉不思三代池臺樂感致中和本四靈踈梅寒雀圗苦愛梅花結素緣野莊胸次本瀟然枝頭凍雀何為者時許分香到夢邊長記扁舟過武夷仙家梅竹滿清溪山禽盡日憐幽致爭㨂寒枝趂晚栖題邢君用意齋禹城方伎響邢君顧我龍鍾老病身賦就瘁梨空自惜幾時相對意齋人百疾中來有變常智人察色信能量細看難素縱橫説到了何曽有定方醫言意也精微而危不誠無物誠斯明斯意誠心正以至國治治國尚可奚難於醫仲尼無意人孰能追莊生刻意我非敢知惟神聖工巧意行不疑然後是齋之所謂意者庶幾得軒𡵨之遺甲午歲門帖子新春元日兩爭妍氣朔分齊本自然不待書占雲物喜上旬壬子是豐年題張太師浩家集後功名有分事無難談笑貂蟬素履間松菊堂深歸未老西州扶病嘆丘山跋雪峯居士顚草後筆從簡古發濃纎書到顔樵兩具瞻不憶雪峯揮翰手怒轟雷火學秦蟾濡墨池邊説醉顛書家初不數鍾權縱橫詰曲千文帖篆􅊢中間有正傳元貞二年秋偶至新店觀光驛回思往事蓋三十五年矣因書壁以記重來漢署風雲控北坡萬方奔走聽虞羅偶思三十年前事夜半郵亭索傳過湘江晚渡賈傳懷騷動楚悲退之伸禱謫潮時黃陵廟下山如霜南氣已凝物華從此見衰榮漫山桃李春能幾煞寒溪四友清枯木寒鴉枯樹寒梢凍欲氷野鴉翻影若為情錦鳩呼兩煙林外紅杏香中過一生楚水歸舟漢東歸興楚江帆老我南宫百不堪莫訝西風煙棹速秋霜香滿洞庭柑菊軒薑君美係斗南先生外甥薑家籬落似斜川野圃秋容淡淡煙何待白衣人送酒一軒風物已陶然生平愛菊菊名軒細撚秋香憶昔賢似續外家無盡藏壁間渾寫和陶篇子路問津圗轍環天下老於行二子相忘不輟耕休為聖賢分二致本來出處不同情元貞三年門帖子平生報國宦情踈千里思歸意未舒只有暮年心健在一燈清影課殘書大簡之山水橫披雨濕溪煙凍不飛一船燈火曉光遲風蓬冷泛東山月記我茶洋早發時知本齋先生憲府舊乘驄骨鯁人稱鐡靣翁此日籌堂見餘慶一門和氣樂融融人物原原有自來特將知本榜新齋歸根返壑皆吾事庭草春來緑滿階灞陵風雪圗詩瘦清於飯顆山蹇驢馱入畫圗間姓名得挂金鑾月風雪長途是等間跋左山公書東坡醉墨堂詩閉戶經年翰墨場鐡心人道漢王常折衝不縮堂堂手思入顔楊鴻鴈行夢回仙以丹劑療疾黃鶴留題世巳驚又遺丹劑化盧生夢回仙馭無從見何處秋風一劒橫碧桃青鳥圗上林春滿漢宫煙翠雀飛來態度間王母西歸方朔去碧桃華影語關關􅌡洲仙集海微茫翠鳥湘桃更異常似為碧霄宫宇寂故傳芳信到劉郎孟母三遷圗卷贈新軒子張孟母三遷飬聖功芬芬千古振髙風披圗欲識頥齋意人道神交管鮑同題張昭信濟江調兵記目堂堂大將伯顔公萬舸浮江節制雄今日河山歸統却從遺藁見元功題蕭氏承顔亭曽門為孝固多聞不似承顔孝莭純人説小亭如斗大一欄花木四時春東坡赤壁圗先生胸次有天遊萬里長江一葉舟欲托悲風㵼遺響恐驚幽壑舞潛蚪題錢舜舉牡丹折枝圗翠帷髙捲出傾城並髻凝粧别有情似為洛人矜絶艷兩枝相倚鬪輕盈李擇善甫貰錢詩卷營營市井逐錐刀戈戟相尋較一毫焚劵貰錢如棄屣丘陵宜並泰山髙宫廊校書斷爛朝章報恐差青編搓碎旋添加就中書削無多意坐到宫廊柱影斜任伯如慶母夫人八十之夀婺光簾幕寶煙濃八十慈顔夀樂融健羡鹿泉新句好一堂和氣畫圗中風髙雲夢夕江連雲夢夕多風萬斛龍􅋮簸蕩中常記瓜洲乘醉渡片帆幾落海門東枯木寒鴉亂鴉翻影上枯枝點綴荒寒見野祠絶似首陽山下路滿陂晴雪祭餘時秋蟬堂詩霹靂湘琴得正傳新聲曽擅泰和年王音又與人俱逝時賴秋蟬續斷絃屈原對漁父國既無人不我知秋風澤畔一湘纍君臣大義明如鏡抵用漁翁辨啜醨題張君利甫秀巖琴譜手卷故家人物秀岩仙一曲瑶琴有正傳鄭重張君寶遺譜不殊親授廣陵篇題紡績圖三晉遺黎樂士農綌絺為業略相同細思七月豳風詠不到春坊錦繡工千里秋晴圗出門藜杖思飄飄千里晴霄見羽毛特為樊川發清興南山秋色兩相髙江船曉發圖漠漠溪煙凍不飛一船煙火曉光遲風蓬冷泛東山月似我茶洋早發時秋澗先生大全文集卷第三十三
