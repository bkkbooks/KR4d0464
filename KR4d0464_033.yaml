front:
  text: 秋澗先生大全集卷第三十三七言絶句
  hash: sha256:b91bd57ed69a312c9cb20b06817ceb0d0c967645370728a4648f2bea94179a36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_033-1a}
body:
  text: 野莊圗并序承㫖董公繪野莊爲圗求諸賢題詠中齋草序以同人致亨晦叔撰銘以儗倫溢羙恐未盡公臆之所在若夫士君子出處固皆有命不可以遅速工拙爲言然當得行道際静退之心何甞食頃而不在懐也以艱於自云必托物以表其志雖未能掛冠神武歛裳霄逝較之鍾鳴漏盡不巳行者猶賢乎巳喜爲賦詩初弗計其不自量也其辭曰午橋吟醉平淮後啇嶺鴻冥定漢餘正恐野莊歸未遂九重思治望新書老筆錬餘詩律細事機諳乆䆠情踈輞川圗上王摩詰静退爲心是本初寳珠換却杖頭鳩空見秋瓜憶故丘白首相㸔官舎底晩年心事轉優游輥馬圖馬蹄立論見天機四輥塵沙更適冝恰似觧𫀆隨意處小齋䃲礴退朝時題錢舜舉畫梨花香飜玉笛真妃怨雨暗樂語凄不佀錢郎能駐風庭日醉如泥水西千樹閙春華莫把芳容帶雨誇㸔取一枝横絶處洗粧還是漢宫娃題廐馬圖前年扈從獵長楊偶雜髯騶宿野莊一撁玉華三百疋老人垂淚説先皇三笑圗元聖開天一理融推心不外善爲宗後人剛作無同論三子相逄笑殺儂題劉導引卷末傳家素有延齡録手澤珍蔵鏡李辝吹就棘心親不在每觀凄断凱風詩題朝元宫劉道人秋聲圗紫極宫深景氣秋翛翛牎竹發詩愁謫仙千古風流句輸與歐公作巧偷少年心事讀書臺凉入郊墟巳快哉星漢在空人未寢一聲猶憶樹頭來寗戚叩角圖長夜漫漫志未伸單衣雖弊覇圗新一匡巳在夷吾佐激烈啇歌惜自陳覺山寺題示元貞改號夏四月九日爲勑建司徒鞏公墓碑同朝貴來㑹需命間客有談盧師當遊者山道阻遂折而入覺山精舎觀泉景氣瀟爽不獲留宿爲恨山僧泚筆請留詩于壁偶書此以記來曽偕遊者太一李宗師承㫖董野莊大學李内翰東平賈彦載秋澗老人王惲題爲樹瑶鐫未奠間杖黎尋勝一躋攀世間萬事真難必來訪盧師入覺山誰削蒼巔峻作崖碧瀾直上妙髙臺静功儘辦瞿曇鉢石鏬清泉迸玉來山因寺勝寺依泉雲自無心景自閑懶陟上方窮逺目黄塵深處是人間丙吉問牛圗休驚宣父才難歎兩漢調元見是公後世幾人能辦此捄時纔得一姚崇右軍觀鵝圗照眼䨥鶂引頸來胷中妙思與之偕寥寥尚友千年後只有涪翁識此懐又䟦問牛圗坐理論思一相功只今機務簿書叢後人刺口無輕議世事看來緫不同閩海道憲司書吏張禧事母以孝聞本道具辝上逹得請乃以所居論秀坊爲純孝健如五六十人諸人賦詩爲慶吏業傳家説寕馨炎方享夀見徐庭婉容還憶相看處燭治官書在憲㕔飬親致樂固多歧無重承顔志不違純孝表門纔兩字四山和氣動春暉平生快吏元康筆俯就功名力不難邂逅南陔見深愛爲親初不厭卑官郷閭顯異有新書衣錦還家喜不如歸到建園春正好里人拭目拜潘輿寸心擬報春暉飬椂食榮同頴叔羮兩地月明思最切倚門心事正懸旌建人悍勁尚氣莭不尓秀狎多文儒郷間今説張忠孝還佀中林返哺烏淵明臨流賦詩圗秋水門前有令姿先生非是好吟詩因觀逝者如斯說天運何甞有息時題存樂堂詩卷當年膝下侍慈顔蒲樹悲風入夣寒不及一杯菽水飬對君慚愴淚䦨干寸心不到南陔飬空羡中林反哺烏最是范公含恨處百年温飽見妻孥題成經歷晚翠堂雙檜堂前晚翠新歳寒相對更情親東家桃李君休羡爛熳光風幾日春七十平頭恰數朝望秋蒲桞到松喬何當醉倚處滿院秋煙濕翠翹明皇驪山出獵圗都尉王晋卿筆五家錦綉迷川谷萬馬旌旗獵帝師治乱兩途明在眼丹青渾是黍離詩玉泉巖并序元貞二年正月中旬兩夣登海山絶島明日隣人葛巨濟以此山見示巖巒四面皆自天成色深翠秀麗惜其淪落泥塗慘淡有未之發者上刻五題曰夀山曰玉泉巖其傍絶頂有懸流一脉下注山足甚鮮明也曰崆峒洞曰子陵灘曰白石瀬皆以金填形勢與玉泉山不殊疑前金宫中物也兩夜登臨倚碧岑夣中驚絶此﨑嶔朝來翠射娉婷底笑煞平生未足心送韓推官之任廣固支人韓侍御君羙子歷試諸難貴逺期休言爲吏莫爲推煩渠細讀瀧岡表恐是廬陵積慶基花樹韋郎好弟兄當時同䆠最関情三年不見諸韓面却爲儀山作送行元貞丙申立春日作前歳徴車起陸沉清優特置在詞林明知不是啇顔客當體先皇飬老心終日思歸憶故山玉堂金馬有堪怜只知蓮炬君恩重其柰山公啓事偏六藝蹴空成底物龍鍾何有玉爲堂眼明愛殺韓忠献到了蘇坡一議郎題西湖圗東南形勢説餘杭誰辦山谿作國防踏雪欲尋龍井去表忠祠下謁錢王丙申歳京師元日門帖子三冬露處無家客七十殘年有限身強項一生今潦倒更將低首嚮何人中舎無心喜外遷非縁詞筆厭雕鐫眼中故舊飄零盡嗤點從渠㝡可怜錢舜舉折枝圗探花走馬醉西城歳與東君佀有情不是今春風色惡折枝圗上㸔清明院中即事元貞元年為修实錄移在北中書省内有時下直出銀臺三昧楞伽亦快哉不似近年官事急小車還聽吏批來李肇翰林志說前輩傳楞伽經一本亟在屋壁每下直出門相謔謂之小三昧出銀臺門乘馬謂之大三昧如釋氏云解縛而自在也重遊玉泉并序元貞二年龍集丙申三月二十八日大駕北狩同翰林諸君送次大口回獨與孫笴西過玉泉因憶至元七年御史裏行時來遊者一十有五人歳月如流轉首廿五年今在者李司卿輔之温漕使次霄與不肖三人耳人欲乆不死而于人世何如也凢得詩三絶留山間而去轣轆澤車轉碧崖山煙喜客望中開畸人問我從何自適送鑾輿大口來進水山僧去未廻日長空閣獨徘徊尋詩不到瑶華洞踏遍松間碧色苔山頭乱石闘􅒎枒水底浮光浸碧霞絶似蘇門山下路惜無脩竹與梅花清白圗爲何掾舜㪯賦傳家素有游鯈㓗竊禄生憎碩䑕貪三考臬司如一日眼中何掾德無慚題韋偃十馬圗浮深角壯恣游嬉沙苑春風碧草齊聞説紫宸初立仗内家正要不鳴嘶國初鞍馬説江都今見韋侯十駿圗獨愛少陵忠義氣艱危安得濟時需和東泉翁山中雜詠一十三首過眼紛華興未闌人生難得老來安山中致爽饒清賞不是悲秋強自寛山居爲愛渊明不自賢夕陽飛鳥兩忘言巳邀白日羲皇上况復青山是故園清羙堂啟期三樂素非狂帶索行歌老自量明理巳安循理轍息心元是飬心方歸來亭生平游刃擬青萍一日歸來與道寜繞樹每憐驚木鳥思親時上望雲亭丹砂玉屑燕窠瓷臺閣風流見一時桃李春光能幾日惜君元有歳寒姿幽芳軒朝三暮四本來齊誰爲兒童較栗梨今歳見花欣實羙山中風物要通知香雪原田家剥棗暮秋初野甑蒸香木蜜酥不冨正縁無滯貨芋魁墻外又成區木蜜岡山中處士玉堂仙兩地相望思渺然説有詩來多勝㮣含情多在碧雲牋杏塢静約幽人品羽茶偶隨稚子去鋤瓜問君何佀東陵日猶是峗山故老家瓜堰門外清泉兩汊流臣心如水更何求濯纓濯足終多事巳分心身到逸休東泉樹影扶踈聽鳥音可堪時事百年心髙情愛殺陶元亮一醆秋香見獨斟西泉德澤涵濡得二難百年祠館見遺安蒼蒼一片墳臺石留在行人下馬㸔墳舘士論推稱謚㝡公瑶鐫三尺刻文通因君喚起西南興夣寐洄溪碧㶑中先君衛士夫私謚爲文通先生曹右丞生祠手卷前年拜掃王墳廬笑逐雙肩到並驅林薄氣清侵邃宇人家春社樂于胥農樂無如歳有年更將民瘼細爲蠲應憐右轄祠邊月花栁深村有二天李白醉歸圗雲陣横陳大渡河一書能觧六蠻和仙韶莫詫君王寵七寳粧嚴未是多襲羙堂詩雲中張釭母姓楊氏性資淑惠小心敬畏早見知於中宫出入禁掖垂三十年前後賞賚濃渥楊殁上思保育之功贈安翼趙國夫人生子六人長曰鎮出刺荆門沂水二郡其四曰鑑知東勝州餘皆宿衛宸庭襲羙看來媺在中當時安翼有深功春風吹下蓬萊閣二子歸來五馬騘自題冩真白髮刁騷一幅巾遺書浩浩百年身縱令不入麒麟畫巳是三朝舘閣臣李德𥙿見客唐韓滉筆徽宗臨并御題在後金鑾載筆寵光多三鎮聞風自削磨開運中興元兩様相君勲業邁蕭何恩讎平日太分明胸次看來氣未宏不鎻櫃坊停衞士諒知堂上有竒兵動華夷機務論思儘有爲一貶未應生重崖州山色要新詩經綸心事在思亭據榻髙談佀自矜不見省中温室樹孔光終了説何曽有才善處是無權朋比爲心自黨偏邂逅郡樓囬首處杜門應羡晋公賢意氣揚揚與脅肩較來失徳兩同然春風滿眼桐花鳯不是當年諤諤賢送同知范君璋之任平滦昆明授法起􅉑嗣民瘼洗蠲冝飽知後日鳴絃千室邑豈惟活國説良醫三紀承恩鶴禁深一官滦海任浮沉固應天上張公子好識當年大范心張遂初詩鶴禁辛勤四十秋端功端品可封矦一官纔入尋常選猶𬒳時胥問觧由需軒閉閤陽城醉佀泥諌臣爲論在韓疑一朝力折延齡相識得三陽出險時據按事從中道處洗心思與繇辤新小軒不佀朝來喜倒屣門前不速賔則天朝回圗萬有潜隨一氣回武炎如火李如灰上陽宫殿春風暖花底朝鞭隠若雷過瓮山記老人語刑清兵寢歳豊穣五十年來帝道光駝馬欄東逢老叟向人猶觧説先皇題劉元禮挽詩卷後有得歸爲怙恃榮三年索米可憐生一盃不及慈闈飬空有殘䰟遶斗城三尺旅墳燕地鬼一篇新序翰林詞友生最是情鍾處夣断空梁月落時客死無歸最痛心李生哀慟惜知音只縁識得天倫重不爲黄金緑綺琴任氏具慶堂詩卷善積中來慶自全一堂和氣覺春寛人間兩字風流處貼在兒兒額上看夀援諺語應踰七數比名泉更益三婺女老人元瑞世兩星今見濟之南劉簽事友竹亭詩退食歸來對竹吟相㸔同抱歳寒心只今眼底交情薄不似環亭翠影深公子清標有足多紫微垣外侍雕戈料應瞻彼猗猗興瑟僴功夫見琢磨題錢選臨曹將軍燕脂騘圗涪翁醉草丹青引祕省珍藏獵騎圗老眼再觀知有數喜從唐本玩臨摹第三句一作書入陵那復得龍種中來見異姿春風舞影下瑶池馬中岳湛錢郎筆冩盡坡仙七字詩刻烙天全固可悲不應頋影自驚嘶君看慘淡經營意重爲莊生觧馬蹄首脱金覊籍帝閑春風沙苑草芊綿承恩幸在休閑地誰與争鳴八駿先良驥初非以力聞丹青傳冩畫圗新超超説是千金駿踶嚙何曽到圉人相馬圗駑駘安分老青芻騄駬論才白璧酬相馬只今誰伯樂觧教駑驥兩垂頭題趙嵓人馬圗嵓五代人甞為朱温駙馬都尉天廐真龍自不凡未妨束縛具覊衘當時一筆千金重今恨無人説趙碞甲午歳門帖子旅食京華兩見春哀年來作玉堂臣一家温飽恩光裏𥙷報無方愧此身題徐中丞子方愛蘭軒詩卷吏部尚書昔刺濕索賦幽蘭在谷似幽人相近相親有使君獨愛遜綿詩律細宛從平淡發竒芬手治蘭臺種竹圍護香籠日淡炎暉絲綸閣下文書静却似當年對紫薇山行還喜得夷途路轉蘭皐更可娯十里曉煙香不断春風吹𬒮過鵝湖予甞徃來饒信間景物多異惟鵝湖山氣清淑土脉馨潤所産花卉非蘭即其餘有不敢與之並者晦庵先生少時爱其地勝甞讀書於此特表而岀之濟南録事叅軍觧君瑞芝圖曄亭亭紫蓋光氣和無地不芬芳一枝特秀溪堂似表叅軍政異常從來腐朽化神竒正自餘精發菌芝浩蕩上林春色裏自怜蒲桞望秋衰題李巨川衆芳亭引水溉餘紅藥秀遶欄㸔得緑隂春帝城擾擾黄塵底獨惜幽香亦可人傾囊不惜買花栽醸酒留香待賞來説以西園瀟索客從今無復眼慵開主人襟韻有餘馨俯仰乹坤一草亭餐菊佩蘭當此際江漁休笑屈原醒淵明歸來圗獨遊初不爲良晨歩入斜川别有春多是歛裳宵遁日眉間歸色喜津津徽宗花鳥圖無逸圗空冷御幈翠香珎羽惜娉娉不思三代池臺樂感致中和本四靈踈梅寒雀圗苦愛梅花結素縁野莊胷次本瀟然枝頭凍雀何爲者時許分香到夣邊長記扁舟過武夷仙家梅竹滿清溪山禽盡日怜幽致争㨂寒枝趂晚栖題邢君用意齋禹城方伎響邢君頋我龍鍾老病身賦就瘁梨空自惜幾時相對意齋人百疾中來有變常智人察色信能量細看難素縱横説到了何曽有定方醫言意也精微而危不誠無物誠斯明斯意誠心正以至國治治國尚可奚難於醫仲尼無意人孰能追莊生刻意我非敢知惟神聖工巧意行不疑然後是齋之所謂意者庻幾得軒𡵨之遺甲午歳門帖子新春元日兩争妍氣朔分齊本自然不待書占雲物喜上旬壬子是豊年題張太師浩家集後功名有分事無難談笑貂蟬素履間松菊堂深歸未老西州扶病嘆丘山䟦雪峯居士顚草後筆從簡古發濃纎書到顔樵兩具瞻不憶雪峯揮翰手怒轟雷火學秦蟾濡墨池邊說醉顛書家初不數鍾權縱横詰曲千文帖篆􅊢中間有正傳元貞二年秋偶至新店觀光驛迴思徃事蓋三十五年矣因書壁以記重來漢署風雲控北坡萬方奔走聽虞羅偶思三十年前事夜半郵亭索傳過湘江晩渡賈傳懐騷動楚悲退之伸禱謫潮時黄陵廟下山如霜南氣已凝物華從此見衰榮漫山桃李春能㡬煞寒溪四友清枯木寒鴉枯樹寒梢凍欲氷野鴉飜影若為情錦鳩呼兩烟林外紅杏香中過一生楚水歸舟漢東歸興楚江㠶老我南宫百不堪莫訝西風烟棹速秋霜香滿洞庭柑菊軒姜君羙係斗南先生外甥姜家籬落似斜川野圃秋容淡淡烟何待白衣人送酒一軒風物已陶然生平愛菊菊名軒細撚秋香憶昔賢似續外家無盡藏壁間渾寫和陶篇子路問津圗轍環天下老於行二子相忘不輟耕休為聖賢分二致本來出處不同情元貞三年門帖子平生報國䆠情踈千里思歸意未舒只有暮年心徤在一燈清影課殘書大簡之山水横披雨濕溪烟凍不飛一舩燈火暁光遲風蓬冷泛東山月記我茶洋早發時知本齋先生憲府舊乗騘骨鯁人稱鐡靣翁此日籌堂見餘慶一門和氣樂融融人物原原有自來特將知本榜新齋歸根返壑皆吾事庭草春來緑滿堦㶚陵風雪圗詩瘦清於飯顆山蹇驢䭾入畫圗間姓名得掛金鑾月風雪長途是等閑䟦左山公書東坡醉墨堂詩閉戸經年翰墨場鐡心人道漢王常折衝不縮堂堂手思入顔楊鴻鴈行夣回仙以丹劑療疾黄鶴留題世巳驚又遺丹劑化盧生夣回仙馭無從見何䖏秋風一劒横碧桃青鳥圗上林春滿漢宫煙翠雀飛来態度閑王母西歸方朔去碧桃華影語関関􅌡洲僊集海微茫翠鳥湘桃更異常似為碧霄宫宇寂故傳芳信到劉郎孟母三遷圗卷贈新軒子張孟母三遷飬聖功芬芬千古振髙風披圗欲識頥齋意人道神交管鮑同題張昭信濟江調兵記目堂堂大將伯顔公萬舸浮江節制雄今日河山歸統却從遺藁見元功題蕭氏承顔亭曽門為孝固多聞不佀承顔孝莭純人説小亭如斗大一欄花木四時春東坡赤壁圗先生胷次有天遊萬里長江一葉舟欲托悲風㵼遺響恐驚幽壑舞潜蚪題錢舜舉牡丹折枝圗翠帷髙捲出傾城並髻凝粧别有情似為洛人矜絶艶兩枝相倚闘輕盈李擇善甫貰錢詩卷營營市井逐錐刀戈㦸相尋較一毫焚劵貰錢如棄屣丘陵宜並㤗山髙宫廊校書断爛朝章報恐差青編搓碎旋添加就中書削無多意坐到宫廊柱影斜任伯如慶母夫人八十之夀婺光簾幙寳煙濃八十慈顔夀樂融徤羡鹿泉新句好一堂和氣畫圗中風髙雲夣夕江連雲夣夕多風萬斛龍􅋮簸蕩中常記瓜洲乗醉渡片㠶幾落海門東枯木寒鴉乱鴉飜影上枯枝點綴荒寒見野祠絶似首陽山下路滿陂晴雪祭餘時秋蝉堂詩霹靂湘琴得正傳新聲曽擅泰和年王音又與人俱逝時頼秋蝉續断絃屈原對漁父國旣無人不我知秋風澤畔一湘纍君臣大義明如鏡抵用漁翁辯啜醨題張君利甫秀巖琴譜手卷故家人物秀岩仙一曲瑶琴有正傳鄭重張君宝遺譜不殊親授廣陵篇題紡績圖三晉遺黎樂士農綌絺爲業略相同細思七月豳風詠不到春坊錦綉工千里秋晴圗出門藜杖思飄飄千里晴霄見羽毛特爲樊川發清興南山秋色兩相髙江船曉發圖漠漠溪煙凍不飛一船煙火曉光遲風蓬冷泛東山月似我茶洋早發時秋澗先生大全文集卷第三十三
