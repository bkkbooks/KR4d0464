body:
  text: 大元國故尚書省左右司貟外郎韓公神道碣銘并序夫朝廷山林之士有徃而不返入而不能出者惟其勇於静退貞不絕俗是則爲丈夫之亊吾於郷先生韓公得之矣公諱仁字義和父顯有融德不耀公甫冠而孤亊母以至孝稱好學強識聞一善事楽爲而不饜正大間舉孝廉辟爲州孔目以能充元帥府令史方羽書交馳際公勵精所事爲上官推重畨譯史安天合爲相友善壬辰北渡隠居郷間澹嘿無所營庚子歳詔行䑓於燕開莫府選叅佐得良能爲亟用安侯薦首聘公充尚書省都亊癸卯春以國計北覲上詢以金粟川流蘿圗鞏固將何䇿可濟對者以十數獨公敷陳詳明簡而得要有鑒古訓用賢材之說上喜甚仍奏天下困窮者寔繁其徒方發政施仁之秋冝子惠俾霑大賚允焉迄今貧子月給廪料盖自公伊始是年秋丁母梁氏憂彛奪哀起授左右司貟外郎公早夜在公以吏務自任郎中李獻卿才望重兩朝亦許公和光解紛能就吾亊又明年冬以祔母夫人得告南歸既襄亊偕内子張氏棄俗入道自號逍遥子遂西遊太華終南諸山黃冠野服偃然閱丗如老松卧雲壑者逾三紀焉公資明淑生平與物無忤其薦賢周急有大過人者宗族藉之通逹者甚衆甞買僮即約之曰汝等以丗故不幸及此義則黽勉相從否則任渠所徃晚節専以方書濟人爲事聞一秘方竒訣求訪百至易千金不恡歳乆得益多如煙霞醫林等集悉鋟梓流布猶虞所傳未暢擇摽治者遍書里巷壁間京師物繁歳多竒疾頼公起死者不勝紀例來謝辭不見曰吾庶幾道念濟苛苦而巳餘何兾當時少傅竇公亦以醫方談客多獵神農經所載爲用公則博採經驗所謂海上方者録之無遺二公雖趣向不同於愽施則一也故竇韓之名並傳于丗先是道人謝志賢等歆公進退有道心存濟物殆非㝷常所可及遂請主神寳修眞二觀餘三十年奉公猶一日公有二姪長曰天祐㤗鹽提舉次德旻由後衛從事充樞宻院令史德旻以公耄期迎置家庭與妻苑氏侍養送終禮無少憾士論賢之公以至元十九年十月望日考終牖下享年八十有四某月日將歸窆汲縣耿岡之新壠墓湏銘以郷耆故來属筆其敢以蕪斐辝銘曰頌允韓公生有淑質陳力周行孝廉應辟移而爲忠載揚厥職濟物之心一何云亟漢署千官含香入侍經國之對允合脊思片言囬春仁者之賜脫屣榮貴神武挂冠退身急流又人所難全真爲教楽在一簞青嚢集驗捄夫丗􅟂旁搜轉施一壷布間保合大和浩浩其天我錬我形我駐我顔較彼獨善九鵬一鸇栖遲有窠逍遥有篇青山白雲玄門老仙黃岡北原腃焉故山惟耿新壠繄公改遷魂兮來歸諒先生之所安大元故濛溪先生張君墓碣銘并序余官晋府者四年得進修之士一人曰濛溪張君毎暇與相徃來把酒論文㝡可尚者君無求於人人之有得於君殊冲然也私自衷念異時禮文興舉吾儻與當任渠責及承乏翰林君墓草巳宿乙未夏其子思敬來京師謁余以墓銘爲請慰唁餘爲歔欷者乆之言猶在耳其忍以不敏辭君諱著字仲明姓張氏丗爲襄陵縣張相里人曽祖諱某雅重然諾頋義所在雖死生以之祖愿父彬皆潜德不仕讀書治田子孫相傳以爲家法君少頴悟不待勉勵卓然自志於學國朝戊戌歳設科取士君以詞賦中選既而嘆曰士當逺大自期雕蟲篆刻將何爲哉適貽溪麻先生洎前進士兊齋曹丈來主經局君喜且不寐曰今而後吾學有所正矣遂刮去故習沉潜伊洛諸書雖飢渇寒暑貧窮得失不易其𥘉心所謂道之體用文之華實探渉其源流咀嚼其膏味積而爲文詞發而爲事業不盈不矜介然家居以樂育諸生爲業中統建元頥齋張公以直道清節宣撫河東廉君才行擢主潞城簿政廉能以畏愛稱明年公去事齟齬不可爲以親老西歸有司累辟不就至元乙酉用薦者授平陽路儒學教授於是衆論大厭士風爲一變先生年彌髙德彌劭學益愽文益竒士友知所依嚮吏民咸有矜式秩竟不聽其去者逾再考厥後子思敬自南陽教官來省聞彼中風土樂焉曰名山大川平日所願見遂命駕南遊以至元壬辰夏六月卄六日考終寓舎享年六十有九𥘉娶陶寺里大家趙氏一子思敬二女長嫁同邑王黼次適洪洞梁龜齡継室浀沃靳氏孫男二曰丗權丗衡思敬以家學今充隆福宫宫教先生姿明亮色夷而氣清爲人誠厚寡欲不戚戚於貧賤與人交始若䟽澹乆之愈敬而愛人百負之終不較望而知爲雅德君子其成就後進爲已任故晉人以文名而逹者多出其門切惟亾金百年來平陽號稱多士毎歳舉子赴選大約數倍諸郡至有白首埸屋庶幾一第餘有不暇及者唯君年甫冠即能知所學所從㧞出習俗潜心古道踐履外詩文雜著曰濛溪集者五百餘篇何多矣哉晋絳諸人未之有也况一辝一藻典雅有法理明辭約以自得爲主是可銘銘曰四科稱賢曰德與藝其在聖門用不偏廢文乃道輿經天緯地苟遺其本剽竊何異利禄科埸疇非誕誇聮綴𥙷絹是是言邪濛溪爲學其復不遐洗心程張正藝曹麻閉門窮經其書滿家玉珮瓊琚粲焉辝華含章時發其助也多士之生丗濟時行道時既我乖立言明教生榮殁傳朝菌夕蓼逹人大觀彼此奚較大川河宗名山華崧地靈氣異先生所鍾一朝長逰杳焉飛鴻丗皆知仁智之所樂吾獨爲歸根返壑乃先生之所終凌倒景而不㓕其元精耿耿固浩乎其所不窮適來吾時適去吾從先生之心與造物也從容尖山西東相里新宫我銘斯石如勒景鐘雖陵遷兮谷變尚知爲濛溪先生之封故趙州寜晋縣善士荆君墓碣銘并序元貞元年春廉訪荆侯改道北燕過京師來謁再拜以先表属筆因念子與侯𥘉定交於癭陶一見如平生後十年復㑹于東楚握手道舊勉予南行忠厚之氣靄然萃顔間令人有不能忘者今以是來託載惟疇昔其敢以固陋辭謹按典瑞少監焦養直善狀君諱祐字伯祥趙之寕晋人丗陶洨濵逮祖暨禰以改工是圗曰與其供噐用於一郷曷若以善及人爲愈於是板行五經等書不二十寒暑荆氏家籍布滿河朔君甫冠而孤毎以保大家業爲志貞祐兵乃取五經㤗和律義篇廣韻板閟墟埌中亂定來視盗發掘無幾君悉力𥙷購隨復爲完部或者云𥘉蔵書時善本固多唯取是三者何哉曰經者道之本法者治之具韻者字之始文籍所由生其爲善已多聞者爲知本于時官府生聚雖稍稍有立詩書法律晚生後軰不知爲何物一旦得是如瞽者復明迷者之知津也而又印模精取直廉故售者廣屋日爲之潤所可重者積而能散縣人王壹者坐事累繫獄吏挾私欲死之君力與營救彼不頋且諷而徼賄竟傾貲出之渠來謝却不見曰吾區區若然者憐渠罔䧟非辜餘何有壬子歳州縣通籍冐占者有禁里嫗瞽而來依者惻然以乳姆收恤轉易書輩徃徃宿負審其窶既折元劵復惠之書甞有以女奴來償者辭不克娉而焉斯皆風義矯矯人難能者率樂爲之故郷里無親䟽以善人稱君以丁已秋遘疾遺命仲子元綱曰伯叔二䘮未克葬汝勉襄大事以卒吾志言終而逝實是年八月八日也壽五十有九蔵先塋昭穴君資和易處事明敏終以失學爲愧恨及諸子長皆教之讀書甞訓飭曰吾已面墻無及今幸嗣先業庭户間書帙紛繙豈有資人進修暋不自力將何以免君子之譏且先丗易冶而裘所期正爾汝曹其勉􅏧君𥘉娶劉氏継室蘇氏生四子長國噐中戊戌詞科次國用善属文皆前卒次元綱自㓜有成人風君甞語所親異時保家子也竟如言季㓜紀爲人雅重信道篤少從敬齋李先生學所得爲多由典瑞貳卿擢任風憲今爲山北遼東道廉訪使女一適進士張景賢孫懷寳男孫九人曰諶曰詢曰誠曰謙曰謐曰誼曰諒曰詡曰諏女孫五人一在室餘皆適士族曽孫九女孫如之於戯盛哉予然後知善惡之報至子孫而後定者審矣銘曰繄士居業擇術是先有篤者志善乎變遷捨鈞治書理幾於妍顯允荆君思深業專誓教子而亢宗旯蔵書之有權要本孝義奉而周旋萃英敷華煥乎簡編迪我後人學者頼焉磊落載腹宛從蹄筌積厚能散憫窮拔冤不有其祉委順百年慶流後裔子孫蟬嫣人定彼勝其然亶然二子翩翩遺珠在渊仲克丗荷愿而稱賢季由近侍三使輶軒較夫善利孰大斯傳固惟自稽古之力實資藉之所縁欲報之徳有昊者天刻我銘章于晋之阡遹追來孝以慰下泉異時推耆徳而配郷社尚有攷於瑶鐫洪嵒老人石琖公墓碣銘并序公姓石琖氏諱德玉字君寳遼東蓋州人踈髯烱目氣骨臞清超超然如萬里之鶴貞祐𥘉以良家子軍􅐁夏折橋功得官積勞至武德將軍北渡後相衛間母杜氏唐相如晦後公天性能孝愉色班衣垂白朝夕孺慕雖菽水無有南陵白華之時杜壽登八秩清修絶葷茹日庭間白菌百余本掇去復茁者數月人以爲孝感所致贈詩有似憐甘㫖闕春風玉芝香之句篤趍人之急逾於已私至遇不竹木花石時醸名酒客至輒而後巳眼花耳熱與之扶䇿之某處手植而即蕃者也此眄柯怡顔喜津津溢眉睫間曰吾且有不壁矣甞種竹當户或謂太迫曰待其藂茂秋霽月之時㑭清樾透簾爲此君冩真耳故終日翛然對之灑爲樂其清澹如此晚年游心命書人有問必以已安分爲荅能此不待孤虚相旺吾言固有徴矣丙子公年八十有五甞繪共山歸隱圖以自歌其樂因號共嵒老人是歳冬灑然而逝若委蛻焉孺人劉氏能遂公𥘉心主治中饋不知其爲貧家也生女子二人長適御史康天英次適河東道提刑按察使姜彧家府與公交欵曲篤丗契三十年一別終天有恨何如㝷歩入街西故里眄睞竹樹慨然有聞􅐟懷人之愴老淚濡毫而有斯作銘曰貧而樂有類乎黔婁心而隠似慕夫德翁事親極融融之樂逢辰岀蹇蹇之忠布衣歸來黙而自容將裴徊而孰友侣藂筠而伍嵒松生也順事殁寕吾躬古之所謂郷先生死而祭于社者其處士之堂封乎大元故廣威將單寕晋縣令李公墓碣銘公諱譲姓李氏其先易水黄山人也父海姿善良丗樹藝爲業公既孤母張氏以健持家就熟南遷至寕晋唐城郷愛其風土遂占籍爲縣人公𥘉生顱骨有異狀及冠美鬚髯聲音如鍾爲人善騎射勇於赴義爲一方推服貞祐𥘉河朔失守所在冦盗充斥日相吞噬公慨然輟耕壠上團結郷豪游獵陸澤荆藺問以保庇井邑爲事蓋有所需以明歸附之志歳巳卯天兵南下公與兄直首率里人迎拜女兒那顔於軍門嘉其效順授直行寕晋縣事公管軍緫校仍聽元帥蔡國公節制時歳荒民飢道殣相望縣東有水柵曰瀝城大澤瀰漫周浸百餘里菱芡魚鳬資生之物甚冨民徃依大獲厥所庚辰秋金兾州將柴茂以兵來取兄與公力戰而前直死焉公憤大兄敗殁衆又失所庇以圗報復瀝爲誓雖食頃不忘也継從縣長王帥復奪其柵居無幾茂復合大勢來争前次滿氏公聞之盡匿精銳於瀝傍二十里叢葦間以弱誘茂令之曰伺彼過聽金聲而作親驅數百人前逆鋒纔交即陽北逗茂逾紀氏塢金鳴伏發茂腹背受兵大挫其銳公回戈追奔五戰皆捷自是兾人聲熸不敢復窺滹垠矣瀝城用以全安帥閫酬勞授主本縣簿乙酉冬武仙以真定叛麾下劇節副鄭進等乗勢剽掠趙癭陶迤東悉爲丘墟公度力不可支收合餘與鼔藁二王帥合勢併破劇鄭諸砦馘數百級而還所失保聚生齒皆得復故丙戌冬仙復令劇鎮戍趙州明年春從大兵規取克焉時太師木花里以顓封拜録公前後功授公行鼔城帥府右監軍銀符使顯異焉既而陞充本縣令以寕昌爲丗封於是招流亾布恩惠畫井閈起市集廛居有貿易之利田里無追呼之擾四民樂業外户爲不扄矣田務抑游墮扶寡弱法姦蠧是又公之所必行慊民有衣食不自給者公發私蔵以瞻之冨足帥府聞之爲復其三年公雖貴必耕而食蚕而後衣居甞以榜掲門扉私嘱干謁請毋相覿其廉守如此癸丑春以老致仕令男天澤嗣職優游里社日課子孫耕鑿爲務甞斧桑田間或勸之公曰官時來爲農吾家素業我若尔兒輩尚墮而自安或者謝而去古人稱貴而能賤丈夫之事公其有焉以至元十一年十月卄二日考終牖下享年八十有七越四目葬縣西北下王里之新塋礼也祖送者幾萬人夫人祕氏趙氏張氏子男六人長曰天澤歴寕晋元氏兩縣簿次天禄本縣奥魯千户次天祐監寕晋酒次天祚不仕次天祥次天祜某鎮廵檢女四人長與次俱適趙氏次適牛氏次適郝氏男孫一十九人女孫一十三人重孫男一十八人重孫女一十三人𥘉公畜家僮數百指悉縱遣爲良曽無鬻身分役之責人又欽其德厚云天禄性孝義仡仡有父風以北孟舊塋屢爲滹浸所嚙遂改卜於此既襄事贄禮幣百拜來請銘予方問俗洨濵見其遺黎故老脫離兵革六十餘載猶爲懷思王李諸人眷眷不忘有配社尸祝之報嗚呼貞祐之亂可謂離且瘼矣元元之民莫適所歸不爲人所魚肉必轉死溝壑如王李諸公雖奮棘矜起壠畒至於父子昆弟出死力角群豪經營捍蔽使一方奠安又識夫天運所在挈民去危邦而就興國誠亦出人意表一時賢豪者也甫定後復能俾官府生聚日就完好今歴官郷曲歳時拜墓于于而來者皆曩時不能自存之嗣續也其德民之厚感民之深又何止童不雉捕長江之虎渡者哉冝其子孫䋲繩蟄蟄皆有所立然後知德施於民功𬒳一時者大之垂報何其豐且阜哉癭陶北郊里號下王顧瞻佳城蔚乎蒼蒼是爲晉長李公之蔵惟是李公千夫之防果毅之勇木訥之刪奮身隴畒舉圖義匡貞祐南播雲擾之俶割據侵凌互相魚肉民匪殱夷轉死溝谷宛彼瀝城居水之腹菱芡魚鳬大益不足聞公來依襁負相續如鹿走音如鳥棲木四境騷然獨爲樂國耿氏昆仍旌旗部曲既復兄讎又知所属草昧𥘉分官府始置戢我武幹明夫吏治内守以廉外方以義撫循有方興滯𥙷弊扶弱抑強繩姦束吏百戰遺黎竟保終惠民之戴公頌聲噦噦尸而祝之懷思罔替勒銘豐碑尚克永丗大元國故河中府南北道舡橋緫管謝公墓碣銘字仲進其先燕之香河人吾衛上將軍河東路緫帥其仲子也爲人性行淑均沉實有頋慮既冠甞從父西破川蜀每領牙隊居前當破竹際掩目懚心未甞以嗜殺爲快雖執訊獲醜力爲全活者甚衆用勞充秦鞏路軍儲大使辦集有方餉道爲不乏丁已夏先帥薨君實主其䘮縗杖瘠立躬起塋壠棺衾儀物既易可觀㑹者大說復樹豐碑昭德神道其例新仟有光焉大兄維石襲父軄役軍中行臺檄君以例継執不可曰兄念天顯極友愛頋某不啻若手足然家事一聽予處鞠立之責正在今日竟以其嗣徃代其遹追永言之思友于䘏孤之義盖終身焉其爾過於人逺甚者類多此晚節以故矦失將駕下澤乗欵段遊居中條田間耕牧卒歳𥙿如也至元乙亥冬十二月卄有六日以疾終平陽府崇道里私苐之正寢得年五十有五官至河中府舡橋緫管越三日厝於府東神泉郷之南里原從遷壠也萬口稱惜咸以善人歸焉夫人劉氏晋之平陽人德柔嘉主内事殊嚴生三子長曰純克家有立志次曰繹謹愿嚮子道季夭女一適裴氏子孫男一人未名既卒哭嗣子純來求表其墓道予私念其故昔孔子遇舊館人喪脫驂馬以賵曰吾悪夫涕之無從也君於予西道之主人也從游讌語姁姁然盖三年于兹殆非過客之有頃其可辝不敏君生長秦晋間而礼度雍雅不知爲將家子與人交信無間言其在諸弟間棣華輝䕃惟恐弗又出天禀粹然也嗚呼以君之德之壽較之有不相稱及者仍哀之以辝銘曰蒼茫兩間生也倐寓一氣之來命有定數彼修短與奪理則有之若不繫夫善悪積習之故嗚呼謝君一僨而去孝友淑善曽終始渝素天之報施如此豈定者不可奪來者固所與也將子孫延昌以永其終譽邪吁故將仕郎汲縣尹韓府君墓表府君姓韓氏諱澍字巨川其先陳留酸棗人丗以儒業顯逺祖有方官至大司空六代祖璹累階銀青榮禄大夫五季間北渡河遂占籍為衛人榮禄生朝奉大夫祗徳朝奉生八十一秀才奕山山生渤亦舉進士渤生柜善居室遂用冨饒於君爲曽祖祖恱有淳德不耀父仲字仲寛所居以善行稱君自穉齒性沉潜寡言笑群兒劇里中過不少睨宗黨異焉稍長以刀筆起家用言者爲安陽吏主掾以能入爲府属吏丙辰歳朝廷以相之五縣封太弟爲米邑継郡帥例肆覲君毅然以民計從行及敷對称户曹孔目官明年春降璽書起聘君太原高公鳴爲彰德路緫管遂汰冗貟擢群能新舊圖至設府史不數人君首以才選無幾轉按牘提控官夙夜在公勵精所事閱六歳克勤猶一日大爲緫尹知守録事叅軍至元二年轉官制行積前後勞授以縣尹下車首以羙俗邵農爲務頋謂僚属曰冨足者禮義之資耕桑者風化之本至於􅎖亭傳謹迎候奉上官徼目前譽非吾所知也於是下教條課户丁􅓯藂薄植桑菓以敦大本非農隙不許人城市暇則行縣檢視勤墮而賞罰焉自是邍隰畇㽛榛惡爲有間郷隣有以忿䦧訟於庭者君曰孝悌力田親仁善鄰古之善道𥘉無大故何乃至尓諭而遣之至頑不率教則曰聽兩造明曲直是不難恐一置于罰終身玷辱爲郷黨指誚吾惜汝者此也儻不吾念論如法比秩滿五事備舉所獲來暮之歌厥聲載路矣五年用新銓法勑授將仕郎主髙唐縣簿九九月輿疾歸明年卒於絃歌里舎得年四十有八實至元庚午春二月一日也越十有九日從葬安陽縣西陵郷武官原之新塋母李氏時年八十拊柩而哭之慟曰天乎遽奪我純孝至此酷邪聞者憫其賢孝縣君金相人進士秦公之孫配君德良稱生子男三長曰從益目憲臺六察史今爲燕南河北道提刑按察司書史次從愿從革女明童適王氏子男孫四人後九年歳戊寅冬十一月七日終祔安玄堂之左禮也𥘉縣境夏大旱比致禱私念事之壅底獄之欝滯亦沴氣是致乃裁决牢繫爲一空及禱蒼山祠雩舞未收雲幢幢起中谿翼日雨盈尺継謝祠下車還衆曰尹精誠若是當有囬馬雨表公䖍至半途果然㝷鄰道以蝗災告備已而竟不入境縣狀其異以聞是秋爲有年君温雅有沉量慮事逺善措畫臨政暇裕畧不動聲色亦未甞矜喜以己長格物其孝愛友悌出天秉粹然不忍一朝違母氏側甞行役踰時眷焉陟岵寢餗爲不安於承顔孺慕若此其至𥘉見第季既多枝葉蕃衍門户事繫重故挺身吏業盡心所事匪厥躬是私期於庇本根寛父母抱者幾三十年若府君者可謂克孝克恭念顯養志者矣某祖妣韓是爲君女叔曰女叔者称父之妹也出六帖君之嗣從益厠某行爲外弟一日跽而請曰先人棄養奄踰八年坎不及誌有銜未祛唯是表於墓左者又闕罪惡之大無可言若銘則尚於兄焉有託某追惟祖妣平生之言得君抱爲㝡詳因繫之以銘銘曰於鑠韓氏丗爲儒之宗兮彯纓若綬揚歴位乎公弓猗嗟裔孫掾習匪其躬兮黽勉從事養夫親之志兮庇我本根殆葛藟之義兮聖哲所稱吾今見其人兮於穆府君諒彼古之倫兮兩漢循吏鑄頑以成仁兮嗚呼令尹誠亦吏之循兮予銘摭實其敢過爲文兮魂而有靈尚愾嘆之一伸兮秋澗先生大全文集卷第六十
