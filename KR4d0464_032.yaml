body:
  text: 七言絶句詠早梅四首招曲山同探早梅香信臘前開竹外橫斜映野臺待著一杯相慰藉約君同往肯前來松風亭下一樽開終日裴徊醉竹臺霑帶冷香歸去晚夜深猶傍枕邊來花開花謝催人老花本無心人自哀折得一技香在手且分春色入城來梅花風韻不凡才氷雪方凝始見開任使和羮無翠實等間斤斧不為災夢酒張錬師道人尸解柏隂臺三尺瑶鐫卧緑苔昨夜月窗清夢底分明霑醉謝文來題劉總管宅御愛峰太湖清潤岱宗雄金字宣和第一峰絶似水晶官裏看一堆寒碧玉玲瓏詠梅銅切塗黃點酪酥細薰婆律彂溫爐老夫鼻觀多知見不用燈前問玉奴一脈陽和檀獨根滿枝金蕾鎖春溫惜花人老情緣在翦斷春風倩女魂尚愛梅君似細君題詩重過去年門經年不見春風面為恐啼䀶似蠟䀶梅花開在百花前苦莭貞心只自憐縱使孤根有餘暖強顔於丗為誰妍為愛梅花徹骨清冷香能幾謾含情春風果有和羮用未害肝腸似廣平江路吟看彂興長西湖浮重月昏黃泠香本是幽人供枉自踈籬比玉堂日日雙瓶換水溫為憐幽谷似佳人夜來紙帳清燈夢繞遍羅浮樹下春蠟削䏎膚玉作顔淡粧終不入時看苦吟正有西湖老凍繞枯枝賞歲寒芳叢百繞問花開夢在仙人萼緑臺為報主人多置酒臘前冬後約重來我識西湖處士心一生梅竹是知音誰知二百餘年後又見諸孫鶴在隂偶題記參政飛卿語睡起東齋日上窗醉扶頭罷炷爐香似勝東里金華相夢繞鐘聲入省堂曲山見示古雪詩云盡道豐年瑞豐年瑞若何長安有貧者為瑞不冝多曲山反其意又和瑞尤多一絶云人言盡道豐年瑞其奈無衣貧者何曷若方春發生際不愆時雨瑞尤多豫細思之古詩雖如此似不若少陵無食思樂土無衣思南州哀而不怨也因繼韻為解嘲云暑雨祁寒俱致怨化如何雪却恐吾儕怨更多題竹林七賢詩并序竹林七賢觀今為長春别館昔誠明張真人嘗集諸公題詠欲刋置祠下逮至元辛卯練師劉文甫始遵命以紹宿志求詩於豫且志其刻名本末用題于右凡得詩若干首始於王文康公終之鄙作非敢先後之蓋因其所書之次第焉使後之觀者詠詞懷舊得信髙風絶塵之想云秋澗序漠漠筠林指舊栖幾年於此避危機竒才最惜嵇中散空聽鵉音月下歸談玄髙出萬物表七子風流有典刑三十年間凡五過塵容漸愧草堂靈竹林髙卧丗稱賢隱放看來未中權千古歸潛書法在一回來讀一翛然作者當年亦七人粗聞名姓孰能親山王首作彈冠舉却恐筠林是要津嵇中散識短材長蓄禍機放懷獨惜養生嵇後人莫坐談玄罪秋水篇中物物齊粉飾青黃乃木災當年中散固竒才髙風不逐鸞音去桞下奚為打煆來阮步兵口腹無嫌乞步兵虱藏裩絮又堪憎浪為廣武山頭嘆尺鷃胡能况大鵬王司徒兩簏收來蔽以身不應顔面愧佳賓燈前手執牙籌算枉對河山説隱淪山吏部從來吏選苦紛紜過眼群材得所甄若論雅懷關得喪山公於晉是能臣劉參軍荷鍤隨埋見性真等間談笑解時嗔竹林七子多沉酗醉裏乾坤獨可人向散騎心醉玄談外此形自知中有未忘情異時未逹堯心對枉泥南華與理爭阮始平禮法踈來萬事沉娛心鍾律是知音聖門論樂中和止不似吾威到樂淫題范文正公真像嶽記梁碑冠古今當時文筆見忠忱細思後樂先憂説士子今誰抱此心題長沙醉草圗萬有龍蛇落筆端滿堂風雨夜深寒書家最是通神處疊指懸鋒不作難堂堂萬里長沙陳曽與張顔角長雄信道書家同一提鋒應解入神功又題謝東山江東全倚謝家安雅量形容對奕間勝負胸中了風聲何賴八公山題家藏顧虎頭畫謝安曵杖圗一枰𥘉散竹間棊杖屐歸來喜可知欲見虎頭無盡意捷音讀罷到門時獅貓何年變體自條支錦爛修毛見兩耐夢裏鼠山京觀了午欄花影淡離離和苦齋見寄嚴韻不才自分賦間居薄有山田與弊廬鄭重漢庭楊得意薦賢心也到相如兩首詩來以動言徴車早晚出山門苦齋刋落紛華盡獨有忠君一念存病裏行藏未易言夢中待詔望金門回頭碌碌因人去自笑張儀舌謾存題日者壁三尺神鈴手內提看來萬命幾曽齊百錢糊却談天口一片風簾日未西乾坤一氣本中和其奈人情六鑿何帝道巳還皆未劫不須苦泥貴人多當年卜隱不明誰四相行藏見側微從此閉門終寂寞老天似厭太知機星槎逺泛斗牛杓萬里歸來齒髮凋碌碌又教攀附去不知何有輔清朝煆煉五行分造化斟量四柱别公卿百錢嬴得生涯了一片風簾任晦明喜彥祥西還故里千里西還已五年枝巢雖在不勝寒半生歷試何清慎依舊春風苜蓿槃寄苦齋老友今年一病到龍鍾遲速前驅有不同健羡苦齋攀附意秋風雙翮欲摩空題何練師又玄堂大道難名説又玄取為堂扁示蹄筌函關紫氣經臺月又見先生一再傳題眼科杜金山卷白日青天墮晦冥百年未滿若為生金鑱一刮神光爛此藝爭傳杜氏精心火燔空水下濡外腴中涸已堪吁雙眸眊眊青燈底忍更看書似老奴自戒過王化店王化岡頭四望開西山吹盡凍雲埋東風借暖憐衰老滿馬晴暉曝背鮐群鼠盜茄圗食飽官倉到酪蘇嗜井不計首深濡丹青似見公意紅女園𬞞戒併圗題間間種德堂記後轉折掉屣軒豁頓挫態度不同乃猶人面要能自成一家為貴子于公書亦然香色臭味而荔實為美推類至極須以江瑶為此者豈易牙雋永而當然之理固如是乎斯文斯翰兩翩翩與試稱量孰可肩一贊吕溫真傑作更開生面到凌煙倦書圗書貴凝思在筆前欲揮還止想翩翩畫師若作行雲了妙與天機兩索然題洛神賦畫後凄斷西陵松柏聲將身自試謾為情陳王正自無聊賴流盻川妃欲目成屈原卜居圗用舍行藏聖有餘却從詹尹卜攸居乾坤許大無容處正在先生見道踈山林長往眇難攀死不忘君世所難邂逅去從詹尹卜八方歷遍果何安遂𥘉亭韋杜城南尺五天眼中朝市有林泉不須苦泥興公説絲竹何妨解倒懸厭喧思寂尋常事以隱為髙拙宦人出處似君應不尓西池東閣見經綸山林長往懷高致富貴逼人將奈何間向遂𥘉亭上去一樽髙詠採芝歌宋太祖蹴鞠圗凡六人對蹴者趙普傍看者太宗八王一道士與從者劉向别録蹴鞠黃帝所作或曰起戰國時蹴鞠兵勢也所以練武士知有才也榻邊咫尺夢金陵欲下河東勢未能畫史意傳當日事丹青圗上見軍興婉戀龍姿五客隨內庭深處共逰嬉筆端欲見無窮意一點香塵欲起時太平朝野日歡娛肯效三郎和碧梧治定不應忘武備花間踏鞠是雄圗倦書圗六朝人愛倦書圖唐閻令喜而臨之妙在約略濃淡之間玉堂昨夜醉厭厭格筆慵書見未忺似待指端餘力散卧看花影轉踈簾筆陳堂堂到倦書紫蕉欹暖錦氍毹細看三子從容處當日安知不有吾二美人圗錢選筆春醉瓊枝意未諧行雲空瑣望仙臺九重不隔簫聲斷喚得長空赤鳯來右趙飛燕壁月瓊枝醉舞栶泠泠蘭舌半詞臣國亡只咎傾城滿胭脂片底春右張麗華固陵雪鴣圗取鑒前王有覆車三韓風雪儘愁豫長江飲馬年年事筆底寒禽辨得無韓文公重幈圗熙載南朝亦宰臣後來狂揚欲全身比教乞食歌姬院坐閲棋枰似可人名教之中樂有餘只須棊槊可歡娛晦翁微貶文昌意正為先生不著書張麗華手擎白鸚鵡自調雲間三閣綺成霞閣上仙人蕚緑華蘭舌不應詞客巧自調鸚羽按庭花西施西施為物一何尤吳已荒亡越可憂一枕勾王春殿夢抱氷寒苦變溫柔孤舟橫笛王晉卿筆秋風葉下洞庭波橫吹歸時逸興多筆底分明詩外意武昌南岸老人歌淵明漉酒圗趙子昻筆牀頭釀香奚待壓脫巾漉飲良愜人興來酣適無不可過論總非公所真雪舟夜語劉文甫藏大定明昌五十年當時文物蔚中天雪蓬夜話無多味黨蔡風流墮眼前跋張真人雙頭蓮手卷池靣出雙蕖花本無心道自如若與主人論逺香當到愛蓮書有虞鼓琴趙霖筆逑匹誰如帝子崇和鳴還與五絃同異時愠解吾民阜本自君王正始功送張鵬飛同知兩浙漕事張侯又見走踆踆雲海相望四十春記取都城相别處細炊香飯煮金鱗送司毅夫之任共城皂蓋東歸五馬榮太行南下是共城春林布穀應饒舌剩著青衫竹馬迎司君材調號能官駿足終陪十二間天意似教優此任政成坐嘯看青山中州佳麗百山門太守風流兩漢循細酌百泉亭上酒正煩留意鑄斯民題姬義士卷後掩瘞無歸責巳任凱風吹棘遂𥘉心絶交端為西華發較似劉摽義更深題紀伯新詹判如溪詩意通人無滯與溪友坎止流行到兩忘羡殺胸中瀟灑意一橫煙景夢滄浪源源不絶産蛟鼉若論潛玲一勺多莫惜玉瓶沙上酒醉來間聽濯纓歌意留花不發待豫㷌題薑詩躍鯉圗舍邊泉出躍䨥魚感自龐姬孝有餘畫史載容非小輔丹青渾是蔚宗書清泉故里兩無蹤坡老詩成竹樹風展放畫圗增永慨丹青於世不無功後二句取唐張彥逺畫記序畫者挂也以彩色挂物象也故鼎鐘刻則識魑魅而知神姦旗章明則昭軌度而備國制以忠以孝盡在於雲臺有烈有勳皆登於麟閣紀傳所以敘其事不能載其容賦頌有以詠其美不能備其象圗畫之制所以兼之也陸士衡云丹青之興比雅頌之𫐠作宣物莫大於言存形莫善於畫此之謂也清明日南城訪友客裏清明散滯懷也隨遊子出城來東風似惜春光爛桞眼雖青細細開題嚴子陵還山圗借其意而反之癸巳夏聽除間作冨春不起最為賢星彩空輝帝座寒縱便放還江上去已應慚見釣魚壇跋徽宗退朝圗唐虞道統不知傳師事林靈信妄言三十六宫春寂寞玉清雲上夢朝元謾説煙空有九霄朝元仙路碧迢迢轉頭風雪韓州地方誤簮裳是服妖水車圗人定真能力勝天一車翻水溉髙田漢隂機在終無力長憶郊居值旱年題昔刺公奉使江左圗紫髯風采照江東馬首雙旌及見公三十年來和議裏使華當代不無功和戰當年楚已空一丘衰草葬南鄘卷中題詠俱名筆褒羡人言是景鍾孫登長嘯圗先生可想不可見秋月千山白鹿臺吹作半空鸞鳯去公和真是不凡材八方雲擾閧兵塵夷再清談到隕身長嘯一聲聊寓意不妨玄髮散麒麟不幸遭逢晉魏間先生出處兩為難才長識寡嵇中散只待明言覺膽寒秋江待渡圗兩崖鐡峽束蒼江風浪無時一葦航險阻備嘗無太穩臨流將渡復回徨秋江極望圗乾坤清氣滿詩脾望入霜空思未迷誰著畫工撗截斷一行秋影鴈飛低韓生寫真圗後韓郎落筆凌煙靣嘉老摛文造物權名下自來無妄譽伯時多為九歌傳乙未夏重午日偶得一扇絶與吾鄉龍門谷形勝相似因書一絶於上太行西北是龍門便靣圗看爽客魂千尺緑蘿飛瀑底浩歌還憶醉霪樽定羌李氏昆季三人係李遊仙之裔同歸三教赱筆為賦德積繇來慶自賖三英同秀定羌家從今沮洳汾西曲三教堂中看棣華大定明昌五十年一時文物説遊仙料應書案山前月更覺秋空皓彩圎史院即事聖德神功浩有餘竹書何翅十三車近觀飬士開局而來巳六旬倉皇曽不計殘身一朝汗簡有敢説兼修為乏人宋徽宗石榴圗安石赤榴自漢來千年西域武皇開寫生若論丹青妙金馬門前待詔才顯宗墨竹筆藝𥘉非羡顯宗承華主鬯兩沖容天教二十年隂賜護飬風雷見籜龍午窗畨盡顯皇書問寢龍樓孝有餘夢到承華欄檻底露梢煙葉儘扶踈題兾州趙莭孝侍祖母韓詩卷眼前諸子芝蘭秀堂上慈親九十儀若取陳情論樂飬趙生心事勝犍為五福君家有自開閨門全是孝慈來異時旌表瞻榮觀髙似陳思燕處臺野春亭為劉仲文賦出仕清朝接俊遊閉門間處更風流君看緑野堂中客未必心安勝素侯春滿青林花滿煙風光深鎖市㕓間都城何限豪家樂輸與劉郎未老間鶴間無意上揚州果熟能勝萬户侯近日治家尤有法課兒書誦五更頭韋杜城南尺五天千金不惜買林泉左山信手拈春出一片浮光鎖翠煙憶昔過門得故人示豫亭記思清新白頭青竹題詩客一笑揮毫到野春沙頭乾盡玉瓶雙香冷牙籌括錦囊長日間庭有忙事青衫時課讀書郎四皓圗尺一招來四老翁冥冥髙興振孤風少微不是門人像調護前星最有功人欲橫流不易攻留侯真是帝師雄笑將二老歸周意翻作啇顔羽翼翁夜壑藏舟未厭深皎然松雪映髙林間雲終作從龍雨唯有留侯識此心蕭然亭澄淵橫壑東坡語窗竹驚秋太白辭解使六塵能此淨不煩華構與新詩坡仙信筆張園記向畫豪家隱仕情出處兩間無不可最憐婪入吏啇名遂州張氏出家資修建學舍僧鎮公來索詩因題其後三關控接厄邊塵四十年來草棘春不為兩庠燈火事孜孜求義到斯人太白獨酌圗九重春色醉仙桃何似江山照賜𫀆千丈氣豪天不管青山磯上月輪髙李太初元齋時為濮陽主簿一氣中含萬善根夫何為善即吾仁不煩力剖藩籬破已覺軒中浩浩春魏提學授路膠水令菁莪樂育為求賢十載京華柄學權今日二官滄海去春風千室聽鳴絃贈相士梅心長嗟躍治不祥金忽漫求名竟陸沉萬事不如方寸好愛渠開口便論心贈相士秋巖乾坤清氣滿秋岩顧我行藏試一談早晚得歸林下去北山重掃讀書龕跋單檢校吉甫所藏江孝卿手書真草二帖徴君諱紱曹南人我初不識檢校靣見此可嘉平昔心光景片時爭屬目獨憐遺翰是知音有客臨風惜壯圗不從竒耦計榮枯因君憶起江卿事間氣銷來一點無讀韓文外集韓子為書有正傳精詳無出穆修編不應集外生浮誕三簡誣公侫大顛瑞鶴詩方平家近鬱蕭臺視履推祥有自開拈出扈山交感説胎仙非止異香來龍虎堂甲午秋九月草八日迎謁自懷來四過其下玉華行殿拂明開北狩南巡此往回長憶先皇重遺老玉堂今歲幾人來長意先皇恩治切天顔喜動老臣來百靈拱護走風靁萬馬雲屯駐漢臺今日鼎成弓劒逺西風吹淚不勝哀觀光弓劒拱重圍蕩蕩髙空日月輝先帝老臣今有幾瞻依恆勑近天威秋迎駕走居庸一道青山返照紅新店到都才九十坐車乘馬兩籠東抱關休訝去翩翩霜滿征衣月滿鞍只為冕旒𥘉未拜至今眠食未能安紅雲現處拜瑶亭皂蓋歸時午夜行半醉喜乘勸酒居庸關下聽雞聲井不刾川在上都西北七百里外董侯承旨扈從北回遇於榆林酒間因及今秋大獮之盛書六絶以紀其事絡野籠山捲朔陲盡隨湯祝懾天威客卿莫詫長楊賦聽説今秋第一圍詩詠虞官發五豵漢家圍合萬車同料應老上龍庭北谷靜川空説俊功千里隂山騎四周休誇西伯渭濵遊今年較獵饒常歲一色天狼四十頭宣威見此行君王耀德豈觀兵我詩擬配𡵨陽鼓要與周宣作頌聲今年大獮嵽林秋青兕黃羊以萬籌搖吻戍兒欣有語好雲從此到南樓今秋天餉住冬糧萬穴空來殺氣蒼渴飲馬酮飢食肉西風低草看牛羊隆福行宫詩裏山河瞻象服女中堯舜宋宣仁從今隆福宫闈月聖夀輝煌一萬春四海坤儀自正家垂簾休獨美瑶華側聞聖善如先后在昔天皇有懿誇賤名猥𬒳平章奏供奉詞林舊老臣細酌金罍宣勸出一年三荷寵光新題沙門宣公手卷後海藏龍宫鬱紫煙逢辰僧到赤烏年白毫千丈渠能致何俟韓書重大顛秋澗先生大全文集卷第三十二
