body:
  text: 碑渾源劉氏丗德碑銘并序金源氏倔起海東當天會間方域甫定即設科取士急於得賢故文風振而人材輩出治具張而紀綱不紊有國雖餘百年典章文物至比隆唐宋之盛若夫篤志力學挾藝應選首破天荒魁冠多士父子昆季相繼擢第為名士夫作良牧守文行端雅門第清峻為金朝第一流者其惟渾源劉氏乎劉氏出彭城望族五季板蕩播遷朔土遼末逺祖諱用者居弘州順聖縣之耀武關丗業耕稼生子翰贈承德郎配張氏追封彭城郡太君生撝字仲謙即今監察御史鄰之髙祖也始釋耒耜習進士業當遼金革命擾攘際學未嘗一日廢天會二年肇闢科埸公以詞賦第一人中選惟遼以科舉為儒學極致文體厖雜萎薾視晚唐五代尤為卑下公勵精種學文辝卓然天成妙絶當丗一掃假貸剽切牽合輔綴之弊其後學者如孟宗獻趙樞張景仁鄭子聃皆取法焉金國一代詞學精切得人為盛由公有以振而起之也釋褐右拾遺轉知天城陽曲懷仁三縣擢大理正遷平陽府判官安東節度副使兩二大理寺出刺石州纍官中大夫年六十三卒於位翰林學士張景仁碑其神道公性淳厚見義固執待物誠好誘掖後進三為理官議獄主恕不屈於權貴故多平反尤長於治民興利除害若嗜欲然施設有條理簡便可持久所去見思圖形奉事素愛渾源山水幽勝買田家焉晚號南山翁夫人渾源雷氏北京轉運使思之女封彭城郡君生四子曰汲曰渭曰滂早丗曰濬汲字伯深頴悟絶人早傳家學與弟渭同擢天德三年進士屢為州縣有聲纍官朝散大夫應奉翰林文字西京路轉運司都句判官平生寡合不羈慕郭林宗黃叔度之為人晚節倦於遊宦放浪山水間以遣興讀書為樂稱西嵓子述壽藏記敘其行已甚悉卒年五十八鄆王府文學陳訥銘其墓有西嵓集行於丗屏山李之純引其端娶曹氏追封彭城縣君一子侃字稚川大定十年進士第積資奉直大夫豐王府文學兼記室參軍孫一從夔字和卿奉聀出身善作詩曽孫文祖渭字仲清少好學克紹箕裘既登苐授承德郎知秦州隴城寨事調隰州軍事判官終朝列大夫岢嵐州刺史號老人一子價河水泊酒監曰濬乃鄰之曽祖博學強記少有聲埸屋間既而用廕入仕至安逺大將軍饒陽令配張氏封彭城縣君生四子佖似儼侯佖字稚行宣武將軍真定府軍資庫使三子從善字澤卿彰德府酒監從皋字平卿從契字禮卿武義將軍克勝軍副都統孫五人曰郊武義將軍曰郅等俱早丗似字稚章孝敬友愛出於天性力學能文稱其家聲四試于庭不偶用恩賜苐授承仕郎華州教授再任承直郎主沂水縣簿娶王氏封彭城郡太君壽五十五終於家遺文雄深簡古有乃祖風嘗訓子孫曰為士當先行檢如絲之潔將立其身愼無點汙汝佩吾言則無忝矣故屏山李純甫表其竁曰善人劉公之墓其為士夫之紀蓋可見矣一子從益字雲卿自髫齓時已有成人度擢大安元年進士乙科調鄯陽丞長葛簿陳州防禦判官皆有治績投機應變措畫出衆意表進提舉南京路摧貨事丁沂水君憂起復拜監察御史君負材尚氣資之以學欲使事業表表大見於丗一旦聀與志合所言朝廷紀綱時政利病竟與宰臣辨論得失不屈去聀間居淮陽與諸生講明伊洛學久之選令葉縣至則鋤強剔􅗜豪族惡黨禁不敢少肆請免逋租三萬石致流民自歸者口數千大起孔子廟既樹教本集諸生肄習其中風化大行考課為河南最未幾召入翰林為應奉不踰月而卒得年四十有四雷御史淵志其墓趙翰林秉文勒銘神道皆稱其器識明敏剛直敢言學可以輔政教材足以濟時艱賫志以殁士論惜焉葉民至廟而祀之孔子稱遺直遺愛者豈近是邪蓬門其自號也蓋取南山翁誡子詩元自蓬蒿出門户莫交門户却蒿蓬之句有文集十卷粹而瞻通而不流類其為人丙子嚴氏封彭城縣君子二祁郁祁字京叔少頴異為學能自刻厲有竒童目弱冠舉進士庭試失意即閉户讀書務窮逺大涵滀煆淬一放意於古文間出古賦雜説數篇李屏山趙間間楊吏部雷御史王滹南諸公見之曰異才也皆倒屣出迎交口騰譽之及與御史公退居於陳相與講明六經直探聖賢心學推於躬行踐履自是振落英華收其真實文章議論粹然一出於正士論咸謂得斯文命脈之傳壬辰北還鄉里躬耕自給築室榜曰歸潛歲戊戌詔試儒人先生就試魁西京選充山西東路考試官後征南行臺拈合公聞其名邀至相下待以賔友凡七年而沒享年四十有八翰林承旨王磐志其墓娶史氏洛陽名族一女適前監察田芝子文冕一男景山終國史院編修官孫一興同有神川遁士集二十二卷處言四十三篇歸潛志三卷行於丗郁字文季亦名士中統元年肇建中省辟左右司都事出尹新河召拜監察御史能文辝工書翰别號歸愚卒年六十一娶趙氏前禮部尚書璜之女一子景嵓鄴字伯震一子景巒儼字稚昻鄰之祖也登承安二年進士第纍官至中奉大夫祕書少監壬辰北渡痛宗國云亡蹈河而死配李氏封彭城郡夫人三子從禹字虞卿登正大七年辝賦第官至朝散大夫同州録判一子曰都從愷字舜卿自幼卓犖不羣稍長入鄉校擅能賦聲再舉不契就廕輔官授武義將軍登封主簿已能綜核縣務束濕吏曹人不敢以少年書生易之國𥘉生聚稍集遴選廉能急於撫字辟府君攝領韶州事繼真授冝陽令縣當兵後庶事草創髙下下車廉知其利病休戚斟酌而更易之凡科取差徭必驗其等第俾均輸焉暇則集俊秀於縣庠講明禮義美善風俗為政才期月而頌聲四逹終更授河南府路經歷素精吏事婉畫恢恢刃遊餘地致六房無滯務公餘與紫陽楊文西菴楊公九山李子微薛庸齋微之觴詠於泉石間中統四年正月草八日以疾卒於私居之正寢壽五十有五娶張氏宣德望族貞靖柔懿自在父母家巳稱純孝及歸于我事舅姑恭順飲食服御非經其手不進也終於至元草三年十月草日享年七十有五葬合祔子男三人鄘字君美平江路人匠提舉至元三十一年十一月以疾殁得年五十有五配假氏享年四十有九鄗袁部埸管句鄰才識警敏練逹時務由省掾授承務郎工部主事次升承直郎順德路總管府判官選充監察御史女二長適渾源州王氏次適應州元帥韓公之孫孫五紹祖江浙省宣使慶祖澱山巡檢繼祖勝童乞童從稷字賢卿終濟南路儒學教授三子曰郇曰郴曰郛俁承奉班祗候遂州酒監一子從周字文卿劉氏先壠始葬順聖之耀武關南山翁徙祖營於渾源縣東北黃嵬鄉御史君以丗故流離起先塋於宛丘神川旅殯洹水歸愚㝎窆燕山令鄰奉大父中奉公衣冠及考妣柩安厝於河南北邙之原是為渾源劉氏洛陽新阡鄰復欲彰先懿昭孝思圖不朽諗不肖嘗問學於神川先生知其家丗頗詳持張陳李趙雷王諸公銘志求述丗德碑以猥列後進年迫襄謝不能發越先賢事業且何敢秉筆於諸名勝之後堅辝者久之鄰復曰金亡士之北渡者百不二三今消磨已盡求接見先輩老於文辝而最知名者莫公若也今弗惠顧則先丗之事將何於託不獲已乃採掇諸公緒餘及巳之聞見而知者會歸其極而系之銘銘曰漢庭射䇿貢士遺風排黜百氏仲舒是崇唐文三變敗北無從振起衰薾尊昌黎公兩公傑出莫之比隆考其㣧裔孰繼芳蹤大名難再氣數竒窮金源立國網羅才雄首魁多士惟南山翁程文妙絶一丗師宗當時景仰韓董攸同子孫克肖家學是攻巍科七決聲華摩空故家文獻泱泱大渢蓬門卓爾丗業克充言直行果節效匪躬支撑傾頽致時之雍賫志雖沒留名則鴻中奉矯矯聀二大蓬存亡惟義表我孤忠子孫昌熾為報則豐神川力學洞聖心胸明理貫遒匪文奚工玉佩瓊琚大振辝鋒導家學之淵流會百川而朝東章甫適越惜不時逢隂相同氣先志恢洪朱衣白簡乘御史驄何劉氏之多賢試紬繹其始終種德植善無踰於農立志務學祿在其中忠義仁恕傳嗣彌縫維人事之克盡見天理之昭融冝澤流渾水之源青蔚南山之峯北邙之原巋然新宫丗故牽率匪忘祖封是惟金百年文宗之裔過者敬恭大元故廣威將軍屯田萬户聶公神道碑銘皇元以神武戡定區宇剪金取宋保塞一軍號稱雄勝帥閫堂堂節制於上亦由部曲宣力得其人故也况聶氏與蔡國張公奮迹布衣義同里閈依乘風雲奕丗竭節者哉公諱禎字正卿丗為定興沈陶井里人曽祖洎大父皆在野不仕父福堅資豪偉善騎射國𥘉張公團結鄉義柵西山之東流堝選推為百夫長從定河朔取汴蔡有殊績終襄縣屯田總管母夫人假氏同里大家生四子公其長也幼沈􅋧寡笑言不作群兒嬉及長聰敏好學有謀略慷慨尚氣節年十七嗣襲父聀張公察其才武試以攻守之方為問條對灑灑有成算公愕然不復以嚮之吳下阿蒙為睞歲丁未率本部分功立𣏌城亳厄宋人出沒以絶侵軼之患繼攻泗州前後以功受賞有差巳未扈丗祖皇帝渡江攻鄂渚拔蝥弧先登陷東南城堞都督戰親覩壯其勇酌酒飲賚以紀其功其年冬命領千兵迎援大帥兀良合反於長沙水陸轉戰備嘗艱苦竟逹漢陽由是升總轄仍佩銀符中統三年賊璮叛公攝千夫長分圍歷城接戰嘗先諸道兵蒙賜鏐馬俾激士氣璮平遂南城荆山至元六年真授千户易以金符是年朝廷進軍襄樊公屯守鹿門甚力至元七年行臺命公將畨漢馬步三千人取新興寨公曰彼衆而恃險我客而力不一惟當神速掩其不備可成功尓遂一戰而克斬馘不勝計生擒者七十人賞楮幣四千緡至元十二年分隸元帥孛魯歡收連海淮安等州宋守將許安撫者陳艨艟五百艘以俟公帥麾下直搗之許少却水陸乘之彼軍大壞殺死溺水者十七八盡獲其戰艦器仗帥府上功奉旨升武節將軍繼攻下招信泗州階進宣武時孽宋巳亡江西湖南皆內附獨靜江恃其險逺旅拒上以亳軍素精鋭戰必勝攻必取命摘全軍進擊至則賊勢披猖公率猛士深入殊死閗首奪西南城堞衆隨之以進城陷捷聞加授顯武將軍行軍總管桂境雖平大兵後所在草冦切發充斥山谷間為良民梗衡山茶陵尤稱搶攘帥府稔公威名烜赫摘諸翼兵千人往平之公窮竟窟穴夷抉根株其脅從汗染者諭歸田畒井邑按堵軍無私焉所在老幼擁馬首泣拜曰非公活我吾四縣遺民二十餘萬無噍類矣其戢禍亂威愛兼濟有古良將風既而蒙古漢軍都帥張侯以公部曲故家屢立駿功請於朝復備將佐十七年從張侯入覲進拜明威將軍亳軍副萬户仍賜錦𫀆一襲旌宿勞也俾鎮建康尋移維揚十九年選充江淮都漕運使二十五年改任廣威將軍大都屯田萬户一載間區畫營屯耕稼有法比前政收獲為倍蓰二十六年更授右翼萬户田旌閃閃有万屯曉唱之樂至元草六年三月十六日以疾卒於官享年六十有二葬祖塋公資外嚴毅內廓如也孝於事親忠於為國出天秉固然治軍旅號令嚴明部伍整肅臨陳抗敵挺身決戰略無顧惜故每戰有功聲名烜赫暇則讀書不輟左氏傳通鑑戰國策皆通大義古人良法美意竒計偉畫涉獵融會多見諸行事方經略南服母夫人陳氏尚在堂公乃心王事不遑暇然遺親之念未嘗置頃刻也一旦心神內動泚流𬒳靣曰豈吾親有故動於彼而應於此邪即請歸覲比至太夫人喪尚未斂公攀號屢絶痛其終之無所存活克襄大事鄉里感嘆為平昔孝誠所致夫人郭氏同縣南王里人溫純恭謹奉事老姑怡順進退不敢自專年逾四十夫貴子長應對門內事尚以名稱姑病早暮侍養不少懈倦湯劑必嘗而後進及亡朝夕廬祭者三周歲宗黨號曰孝婦待妾媵有恩禮略無嫉妬子一十一人長曰惟義承父爵右翼屯田萬户次曰惟謙峽州夷陵尹曰惟明閣門宣贊舍人曰惟孝惟爵未仕皆郭出也余幼未名女四人俱適望族元貞建號之二載冬十一月惟義踵門來請曰自惟無所肖似尚賴先丗遺澤嗣守緒業朝夕惴惴愧無光揚惟是鑽石紀銘表諸神門圖報萬一稔聞翰學先生學古詞逹當代將相家皆有煩於下執事儻得銘則為不朽矣中統建元余應召中省獲識蔡國父子及提憲河朔郎山雞水之間亦嘗巡歷載惟疇昔輒次其件右而繫之以辝銘曰大夫挺志無先外事况乎戰陳聖所慎毖不有諸內孰形於外擴我秉彜克作其氣惟燕南陲聶宗所系奮從雲雷以功名喜侯不封萬志焉罔遂報之後人福祿何既桓桓廣威克昌再丗曉暢戎機蔡國首器發蹤指獸俾展其翼橫戈長江斬鯨蒼海萬竈同心雅歌奏凱長驅靜江指顧摧敗草切蟲如肆為民害玉石既分善良攸賴笳鼓歸來旌斾揚彩酬功進爵大蒙天賚髙大門閎鄉閭歎慨不知其中大本有在子曽有言質而弗礙篤孝惟移化而忠義公於臣子存沒無愧巨川騰波郎峯聳翠片石干霄千古光配大元奉聖州新建永昌觀碑銘并序奉聖本秦上谷郡地唐始立新州石晉割賂於遼更今名亡金升武定軍節度今雖為州當兩都往來之衝其地望尤重於昔雲山環抱川流交貫樹藝茂盛有中土清淑之美風俗雄碩樂施而好善蓋燕雲習尚氣義而然也據治城東南里許有道觀曰永昌其𥘉祖寂然子張志玄隱微丗居河東之孟門縣越自髫齓歆挹真風從平水景錬師為全真學既長正一法籙亦稱精究貞祐南遷所在俶擾聞長春丘公應聘龍庭師喟然嘆曰天道在北吾將逺遊雲朔庶有遇合聿隆道紀至永興之清樂鄉愛其山水幽勝遂結苑而居凝神坐忘志趣叵測謁漿之家咸異之曰彼其中必有所得豈徒然哉由是風動一方日奉香火羅拜菴前間有請必恍然開悟乃相與選勝得獨山中水頭地起建琳宇處師為上賔榜曰迎仙尊顯之也師佩上清三洞靈章主盟武定者幾草載前後化度門人甚衆惟吳張盧三法師得其要妙而吳在伯仲為最寂然謝丗藏觀南化臺吳號通玄子氣貌魁偉志行誠篤體含妙用動逹玄機寂然師知為受道器常勉之曰汝舉止異常言論卓犖通文辝知醫藥恐鸞翔鶴翥終非草野間物寂然既終行緣城市人或參扣誦答如流有一鉢千家飯渾身百衲衣心如江月朗情似野雲飛之句其胸懷洞徹如此加以符水療疾隱痛隨愈衆驚異以有道目之逹官豪右共來敬禮至有得望其風采而為幸者闔境尊信法緣契合遂易亡金劉大監別墅為棲真所中有亭崇臺層簷為一境偉觀即改亭為殿奉三清睟容下逮齋厨庫廪以次修舉署曰永昌與迎仙為上下院自是徒衆雲集檀越之家設醮筵而徼冥福求符藥而濟災屯者憧憧而來曽無虛日鍾磬之聲隱然聞市肆間永昌琳館為一方名勝道俗歸依之所矣通玄仙去寧神於永昌之南以後事付上足弟子虞法師師行業修潔和光同塵心存濟度多蒙藥惠輔治遺缺而觀之規為始克完具以推擇充玄門道録虞寂陪葬師側其徒崔志善踵而增飾之崔沒盧法師以道録來住持焉傳之門人李道素道素姿朴實惟恐遏逸前光內則起廢寮舍外則增置田圃朝夕齋戒載勤頌禱望髙羽流擢判管內道門事乃惴惴不遑曰向上師真刳心勞神披荆榛掇瓦礫鋪敦教基吾輩何有坐享其安惟是刻石紀行俾見興建本末庶垂不朽來丐銘豫以道不同不相為謀牢讓者爯請益堅乃酌取大方家見於吾儒之紀載者論次而銘之後丗所謂道家者流蓋古隱逸清潔之士矣巖居而澗飲草衣而木食節欲以清心修已而應物不為軒裳所羈不為榮利所怵自放於方之外其髙情逺韻凌煙霞而薄雲月誠有不可企及者自漢以降處士素隱方士誕誇飛升煉化之術祭醮禳禁之科皆屬之道家稽之於古事亦多矣徇末以遺其本淩遲至於宣和極矣弊極則變於是全真之教興焉淵靜以而行翕然從之實繁有徒其特逹者各牗日名其家若寂然師弟弘衍慱濟教行山此是也耕田鑿井自食其力垂慈接物以期善俗不知誕幻之説為何事敦純朴素有古逸民之遺風焉而又卑授得人顯揚斯在是可書定安之白雲觀盧法師建永興之觀張法師建與永昌同一法眷也銘曰道之大原玄文五千慈儉不爭清靜自然辝固奮激至理無邊修道謂教由是之焉全真為學本乎善淵返純還朴復太古前究其源委豈忘蹄筌寂然出丗私淑其傳雲朔俗徑聞善易遷坐忘感化孰分後先傾心信嚮克興大緣絶塵而下復得通玄化行城府重闡法筵一時景仰道價翩翩香火奔走先業昭宣燕處有室耕鑿有田遺我後人基緒綿綿門人繼承持守拳拳光揚有例刻銘瑶鐫流光遺照何千百年大元故正議大夫浙西道宣慰使行工部尚書孫公神道碑銘并序雲西風土雄碩龍山峻極為之奠焉渾流交貫神川清淑資其潤焉故士生其間有瓌竒宏傑之稱而劉雷為之冠焉然山川炳靈奚間今昔况河洛為帝王之里并汾多攀附之臣儷景風雲依光日月者哉若乃始以材技有光丗緒終則挺輸忠藎作時名卿安榮福壽慶流後裔者誰乎故宣慰使工部尚書孫公其人也公諱公亮字繼明丗家渾源撗山里曽祖諱伯大父諱慶文咸勤力務本不耀其光顯禰諱威為人跅弛不羈早以功名自喜少有巧思肄函人民業繕治堅密出新意於法度之中方太祖聖武皇帝經略中夏總攬豪傑貯除戎具為亟乃挾所業投獻上賞其能應時需賜名也可兀闌錫佩金符充諸路甲匠總管太宗朝從征秦晉惻民𬒳屠戮屢以搜簡工匠為言賴全活者衆顯妣杜氏主內務有綱紀嘗辨雪工徒質逆之誣因之脫死公生漠北年十許歲總匠君挈之入覲太宗異其風骨曰此兒他日必大享用蒙賜御饌自是得出入禁闥矣及長資英明多藝能慷慨有大志練習國典通曉譯語所交皆一時豪雋衆亦以通材許之庚子歲襲父職佩銀符定宗朝換金符歲進課精例賜錦幣憲宗特賚貂裘仍敕繼稱父賜名丗祖皇帝在潛邸上命歲輸百鎧有中七矢而不貫者其堅完如此及南征果獲用中統建元授都總管上北征駐昔沒敦公出私財製甲胄六十襲以天顔喜甚錫銀笏忠結命領諸路雜色一奏四十妻工之鰥者歲支衣糧贍濟不給局廪給自此始又考制度定程式作諸路恆法公自承嗣選材下招亡恤弱出私財以代公費獲而軍興蒙賞進秩可謂盡心所事克以人材抱負論之于將輔寶鼎枝車未膺所用有鬱不能自巳者至元改朝廷清明治具畢張公上抗言冝設御史臺肅正紀綱雖不遑有符士論偉之五年憲府肇建特拜監察御史官忠翊校尉上諭大夫塔察公曰他人則未之識如也可兀闌朕熟其忠廉冝與汝共事時官僚極一時選較天多識朝廷故事洞逹諸色情狀材氣足以投赴事機威望可以懾服豪猾在公無以踰一旦職與志愜思明目張膽鯁言無忌仰答恩遇是風生白筆氣凌霜簡論列無虛日時宿衛鷹房待城社頗縱恣在他人弗措手者公優為之如上時門強奪民物東安州縱馬駝囓食桑棗甚至伐為薪公痛繩之以法至畏避上聞而以目之年考滿憲長奏公自供職無點水私至絶飲風稜銛利刺督切中裏行無出其右時選擢正為此爾可再任俾矜式新進者既而察為外事還西川行者冒支楮幣二萬餘定之義為役兵士治第採薪至𬒳虎五十仍奏治其罪十年夏宣授金符武德將軍簽山東東西道提刑按察司事至則務實用顯效張皇憲度故材廉者必薦姦貪者必置於法州郡惴惴奉約束惟謹褰帷具瞻有風動百城之目東平路監尹出貴戚簡重自居監司官至郡未嘗相覿聞公來按部迎謁境上紏治豪縱不法者十數輩曽無一語護援及去復伸餞禮博德髙唐耆老貯香於頂來迓曰自立憲司未覩稱職如公者我輩獲安田里受賜多矣其威望顯著吏民畏服可知已十二年升山北遼東道提刑按察副使遼東境土曠逺諸王營帳洎諸部種人雜處其間恃勢相凌為申嚴法禁革去宿弊豪強斂迹小民氣得少伸分司遼陽親王近侍五人劫居民資用且歐擊之有司不敢究民來欣即械五人徇通衢王諭釋其罪竟杖決之灤水闊而雜沙石自昔無津梁命造荆絡貯碎石為柱以成橋倣此建者百所自爾遼右免病涉之苦十三年進階朝列十四年春升授中順大夫彰德路總管分佩金虎符惟相當南北衝會民物繁夥自昔為河朔名郡然政務煩重視鄰路為蓓蓰公諳練政體材地有餘當王事坌集訟牒交至泛應曲當不失時措之冝平生遇事有為一旦重膺民社乃究竟利病俾實惠及民以三事躬請於朝其一比歲霖潦傷稼民多闕食準免逋稅九千七百石其二諸郡翰遞取道本路徴發車牛越廣平扺順德往還餘五百里非惟偏倍恐民力不堪蒙以廣平之磁州代焉其三本路稅粟歲輸大名秦家渡由唐宋渡河東南行百五十里歲晏寒沍車人告病聽於唐宋倉輸納前政貸民資五百餘定起新附軍營舍至是亦給公帑邢民李閏六嘗殺人纍問弗伏干證餘百人移公推密廉其實遂伏辜餘得釋時以神明稱終更相人懷思至琢石頌焉江浙平上諭中書省造作事重當選能者主之十六年冬授正議大夫浙西道宣慰使兼行工部事籍人匠四十二萬立局院七十餘所每歲定造幣縞弓矢甲胄等物十八年上命左丞相阿刺罕等征日本給辦艨衝戰具繕製堅完都將以聞上曰也可兀闌豈有誤邪二十年十月來朝大為上所獎諭賜宴於便殿二十二年授江西等處行工部尚書上章致仕間居清苑每風憲洎臨民官來質疑必告以益國便民之方二十四年九月覲上於朝殿上念丗臣之舊問年今幾何居某處子孫幾人奏對畢賜食俾坐於御榻之西上遣大府卿納里忽問曰飲飫飽未復賜鹿羮白酒沾醉而出大德元年子拱總尹大同奉公與夫人張氏還鄉里時公及夫人夀俱髙日與親友相飲宴鄉人榮之改渾源西北山曰晝錦有司亦用名鄉四年正月草九日以疾薨于私居之正寢享年七十有九遺訓子孫勉力忠孝少不及私二月十四日歸葬于渾源州西劉村先塋之次送葬者數千人哭聲聞數里外蓋平生感懷於人者如此夫人張氏梁氏皆出名家張氏終於四年秋壽八十有四梁氏先公沒子三人拱資誠實材果純孝力學由工部侍郎升受少中大夫大同路總管兼府尹本路諸軍奧魯總管管內勸農事擏武略將軍武備寺丞振忠翊校尉定海縣尹女三長適安平縣尹趙襄次適李氏劉氏孫男四謙襲丗職從仕郎保定等路軍器人匠提舉次早丗諧承真郎利器庫提點誼進義副尉保定等路軍器人匠提舉孫女三適趙氏王氏次幼曽孫男一㺜頭曽孫女三長適李氏餘幼公儀觀魁偉氣量蜂閎美鬚髯容色莊厲間習時體譯語闌翻雜以談謔顧國種貴卿無以易其論列公朝集議僚屬處正奉公詞情剴切毫髮不假借善為鉤距能得小人根株窟穴似夫古之能吏才大夫至於奉上忠事親孝交友誠雖位望顯赫循循謙讓退然如無能為者齊家教子敦篤義方循尚禮法又似夫齊魯質行之士生平疾惡由義激中其心休休樂善成美出於天稟粹厚放良臧獲百餘人貸貧民子錢七萬緡冝其三任風憲位正總尹丕張丗守官簉六卿剛直有守允協士論忠勤無間簡在帝心福壽綿延子孫衆多家門隆盛雖曰依乘亦由平昔操履感召有以致然也可謂材德具備勳名兩全哀榮終始者矣嗣子拱以墓碑來請因憶至元戊辰憲臺𥘉立公與不肖同擢御史引見丗祖皇帝於廣寒殿自爾議事松廳聮鏕􅍡馬義氣交孚相得為甚歡後偕官於相逮歲壬辰應聘北上復私覿保塞追敘契舊當時並峨豸冠今所存者獨吾二人公又奪去僕雖耄忍無一言邪既敘梗概仍系之銘銘曰雲龍奮飛西北天神武載造坤與乾有來羣后捷戎軒所在戈甲相周旋孫矦挾技善逹權賜名訓徒卑任顓函惟扞格貴弗穿函雖多樣公發源犀兕七屬光生煙上為嗟惜賞丗延風雲儷景同翩翩執藝諫請多活全臧孫有後理固然公其挺生鍾丗賢嗣興遺緒心彌丹鯤化躍出天池淵豸冠執法班朝端憲綱未舉為進言太微一夕光星纒朱衣白簡相後先忠臣憤激同鷹鸇秋風搏擊無空拳上目剛直由孤騫青齊遼碣海岱連地廣物衆牙孽間繍衣風彩何翩翩積弊一剷摧邪姦耻令趙張出吾前煌煌金節臨漳洹霜空霽嚴政春妍矦伯正位務固繁剸裁錯節驚龍泉吏惟寬慢猛則殘要本實惠蘇民編三事上請民力殫轉輸省便逋賦蠲橫斂追給公府錢去思有頌德化宣江浙平一俗巧儇訓授程課需丗官共工汝賢常伯聮工局染院勞次銓歲時供億物利堅聖皇眷顧稱忠惓一朝上章遽引年功成身退名節完嗣矦亞卿請外遷作牧鄉郡意所便錦衣榮養白晝鮮丗期福壽方綿綿丘山零落館舍捐停雲苒苒橫之巔時有白鹿馴其阡神遊凄斷招來篇自昔豪傑誇雲燕乘時樹立孰敢肩千年酆劒埋神川鬱鬱紫氣衝斗邊何以驗之瑶有鐫英聲並與斯銘傳秋澗先生大全文集卷第五十八
