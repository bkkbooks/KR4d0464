body:
  text: 河内脩武縣重修廟學記覃懷風土距太行之陽川夷氣淑山水秀麗逺而舒發於􅑔者爲多故人傑地靈自㫺無荒寒僻野之陋至元壬午冬前州將劉暉與予同在京師間相㑹肆談懐衛間勝㮣娓娓忘􅌒因及縣之廟學與夫本末告予曰廟自宋歷金雖制量邑作當時徙建甚備罹壬辰雲擾爼豆不遑頼先帥家府爲主張是故已圯者隨葺堅完者俾勿壞乃以有道王君文玉陳復趙冝中輩前後顧筦得巋然獨存於兵燼之餘力也非幸也至元癸酉不肖自鄭秩滿來㱕顧殿廡肖像歲月浸乆風雨浸剥䵝昧傾藉無復於舊荷薪之責懼不克舉遂倡帥官庻日以脩治崇飾爲事御史栢徳孝思又從而賛焉經調官蒲楊彭三明府千年間皆次第而作新之遂延致學師日誘諸生講肄在其中復請有司淂麗掃十餘人春秋奠獻鍾鼔鏗鏘禮容升降盖肅如也㒒之素願雖畢而明徳新民之效尚未敢議也余曰不然郡縣之政似有緩而急者學校是也學校者三代之所以明人倫也人倫明於上則小民親於下其所以關係風化不的然而彰欤若夫山川英粹之氣氲氤開闔鍾竒孕秀曽無今昔醇醨之間至扵􅉼飬薄俗作成善類寔庠序基而本之後之來者復能増崇勉勵以極菁莪樂育之羙異時人材輩出如近代進士張夢弼郭黻張衮祁文秉趙尚賔文彩風流照暎一時誠不難矣劉侯曰有味㢤子之言也請筆之歸而刻諸麗石庻幾有讀斯文而興起者焉二十年歳在癸未二月十八日謹記蘭亭石刻記蘇門盧君茂之得玉色碑石中断塈酒壚間偶見眎之乃禊飲序也即懇求淂之予自穉年㽞心翰墨閲是本無慮十數此帖極清勁有神而不厖雜與定武石本畧同其背有勑書字塗以黄金光彩尚煥下復刻祈公字二豈𥙿陵賜宰相衍家物也甞謂二王墨妙雖片言隻字如寸珠尺璧見者皆當寳惜不可使混泥沙今一旦爲吾所遇免夫淋洿嚙蝕委弃劘㓕之厄果神物護持時有授受然耶異時歸來當臨溪起亭位置璧間扳長史齋新例榜其亭曰右軍且詫郷賢曰此乃吾王氏真行之祖也庻幾有摳衣而請益者其扵奎璧兩間不無煌煌者焉但未知在幾年後耳又諺云室無滯貨不為潤屋矧吾儕以多文為冨乎然物之堅者莫金石若也兹刻也豈敢保其必夀抑不敢矜其長為巳有特記焉以付子孺庻王氏来者能弓而箕之是所謂薪有盡而火無窮之傳也二十年歳在癸未夏五月十七日謹記御史箴後記此帖閑閑公為師中丞仲安所書乱餘李侯輔之掇於西臺著間后為義士張伯寕所有至元戍寅因獲觀扵張隣野家孝純爱玩不巳命子逺摹臨略不失筆意壬午秋予至京師鄰野子來謁遂及曩之所摹明日持以見贈墜送之餘僅得百一十八字公之書世固不少論夫擘窠大書雄勁瓌奇體兼顔蘇而自成一家者此平生最得意書也予性僻而好古於書學嗜而不厭故所欲見者每每如意豈歐陽子謂物聚扵好然耶抑亦有契分故耶二十年癸未夏五月雨中與子􅳼装潢歸藏春露堂以為書林寳鎮且懌同志願見之心中議大夫治書侍御史汲郡王惲謹記祥露記先母夫人平峕顧惲讀書作言辭喜見於色曰好此吾殁且無憾若汝長仍能辦日飯一盂啖我過於䁀餗荣矣亡後十有四祀方得廩食於官而菽水自供之養曽不少及苐新婦推代中饋勞者僅六年風樹之慼其何有涯故每讀文正范公饗若曹之歎未甞不撫卷流涕也甫十年不幸先君亦捐舘以治命建新阡於河西郷用明年百五日奉遷二親藁殯於沁曲玄堂纔開有二黄蝶飛出其先妣柩盖珠露疑綴皛明煥爛駢羅角結殆寳幢纓絡蒙覆其上且聞清香襲人觀者異焉天日照臨移刻乃晞嗚呼夫人自巳酉秋棄飬至是整十祀矣在窀穸間祥見如此恐非偶然也昔人有夢持炬下入祖禰㼅中識者謂光照光世之兆兹夢也或有異不異焉今野䕃之氣化爲真露露膏澤也復聮綴而成雯華意者先妣之徳有幽光而未彂耶不然將澤及子孫有以文而興𧺫者邪開先之慶固當有在惲不淂而知也至元廿一年歲舎甲申正月二十有八日中議大夫山東東西道提刑按察副使男惲百拜泣血追記均斡堂記財賦者生民之命國家之大本也善理者古今無幾焉自塩鐡事興漢庭諸儒紛紜辨論竟莫能一其艱在於不傷財而必害民故也濟南漕長趙侯洎其貳儲君天章過余求扁其公堂之顔遂題曰均斡盖取孟堅志書之辭也均者使四民常均公有餘而私不乏幹者所以齊衆度而㧕兼并也二者爲義如此何古人憂後世之心深且重㢤顧諟新政意若在兹第不自著者形與跡耳盖甞思之其所以經制於一堂之上者不過以㢘自澡以静内守而以法外御也故務雖繁而愈辦羡比常而益増此自然理也異時揔㑹民賦鼓鬻山海低昻物貨之權佐理軍國之用従容朝珂籌之以䇿未必不由主静而法以均斡爲得計而以籠絡爲末策也未知以爲何如二公唯而退於是乎書以爲記逰華不注記濟南山水可㳺觀者甚冨而華峰濼源爲之冠余到官八月湖光山色朝夕與對於庭户几席間若無所覩心有所不在焉然每以厯㞐卑溼爲念或有云堰頭者乃自昔潨引諸泉入大清之峻口也一鍤之力不崇朝可徹而陸之常欲一徃而未遑也冷竈節得暇且寛憲使耶律君邀余暨簽書杜君為兹山逰且㝷堰頭之盟諾焉逮十有一日遂自厯下亭登舟乱大明湖經㑹波樓下出水門入癈齊漕渠所謂小清河者是也汎灔東行約里餘運肘而北水漸㳽漫北際黄臺東連疊徑悉為稻畦蓮蕩水村漁舎間錯煙際真畫幀也於是緑萍蕩槳白鳥前導北望長呤華之風煙勝賞盡在吾目中矣是日也天朗氣淑清風徐來水平不波鳴絲歌板響動林谷舉酒相属開口而噱少頃扶腋登岸相與歩入華陽道觀主人方布几延賔㒒以疾作遽還二君為愀然也至於罔獲陟連雲絶頂追謪仙之逸駕呌蒼梧之暮雲冨覧江山以盡㳺觀之羙特閑適餘事初不訝其從違正恐山靈獨囬俗駕造物者有所靳耳既㱕伏臥舟中怦怦焉如宿醒在懐殊伊欝也但聞兩舷間風水之聲自宫自啇拍拍盈耳殆魏獻子之歌鐘石鍾山之水樂也且念蕐峰之勝樂在近郊因以歩里計之自厯亭北至華陽院下廿里而逺由水門抵黄臺北渚十八里而近以葦汀漁箔周折湾淑從城東北阿至艤舟山家盖且十曲矣峕至元甲申清明前一日也謹記春露堂記王氏㞐安仁西里有宅一區湫隘近市或者曰宜易此而就爽塏余應之曰遺簮之求聖人有取焉况先人之弊廬乎然歳深屋老枝撑欹側有不堪託䖏者於是謀為新堂不侈不陋于以藏遺書閟宗器節序致嚴設裳衣而安寝祭且将砭吾㞐明嚮晦燕偃息之所乙酉春既落成遂榜其顔曰春露盖取霜露既降感時思親之義也嗚呼思雽我将從其重乎思其重念吾親之志也敬其止慮夫不克析薪之荷也昔吾先君思淵子握瑜懐瑾經世之志甚逺汔澹無所營專事於學務為無所不闚要歸適用有爲而已甞曰吾年未老持此而明吾道行吾志於天下庶乎開物成務大有見於世不然吾遯則無怍無悶矣悲夫曽不少施而卒賫志以没至為有為者所惜此不肖所以仰穹罔極而抱終身之慼也盖吾親之去日愈逺不肖之受年益深去親邈則子孫有悠而無宻受年多則氣志漸怠而生不蹶追其逺所以厚來者之徳也重其思所以勉吾心之述也傳不云乎孝也者繼志述事之謂也周公善焉是則爲逹孝學也者學爲周孔而已矣至扵履霜濡露感念歳峕入室肅焉如覩乎容色之睟出户愾然若聞其歎息之音齊則見其所爲饗者悽愴怵惕奭動于中是皆峕思之常君子所之同也後之嗣服者登斯堂讀斯文求予心之所泊能先其所重而不忘其所常将見堂構無盡孝思爲不匱矣至元廿二年十月日記㷩春閤遺制記梓人鈕氏者向余談熈春故閣形勝殊有次第既而又以界畫之法爲言曰此閣之大㮣也􅌟髙二百二十有二尺廣四十六歩有竒從則如之雖四隅闕角其方數紆餘于中下断鰲為柱者五十有二居中閣位與東西耳構九楹中為楹者五每楹尺二十有四其耳為楹者各二共長七丈有二尺上下作五檐覆壓其檐長二丈五尺所以蔽虧日月而却風雨也閤位與平座疊層為四每層以古座通藉實為閤位者三穿明度闇而上其為梯道凢五折焉世傳閤之經始有二子掖醉翁過前将作者曰此即閣之制也取具成體故兩翼旁􅌟俯在上層欄构之下止一位而已其有隆有殺取其漂紗飛動上下崇卑之序此閣之形势所以有瑰偉特絶之称也予因念汴自壬辰兵後故苑蕪没惟熈春一閤巋然獨存昔甞与客三至其上徙倚周覽雖悵然動麥秀黍離之感且詫其截嶪壮麗如神营鬼構洞心駭目有不可端倪者至不藉井幹不堦峻址飛翔突𧺫干青霄而矗上又似夫鰲掀而鳯翥也予厯考秦漢巳來宫殿之制漢不復扵秦而唐不及扵漢如未央長樂曽何得阿房之萬一含元華清又奚敢跂两都之規制也盖天地氣衰國資民力與林林之材不克取盈而尺度不足其数焉故也然熈春遺構亦可為近代之傑觀彼騷人詞客雖稱述賦詠極其偉麗是猶臆說庭章而徒彷像其千門萬户而巳終非梓匠不能知其規模與勝槩之所以然閤廢撤巳乆及聞紐氏之説使觚稜金爵上雲雨飛舞空際者盡在吾目中矣然不文之言不足以逹逺因作記以遺之鈕氏者顒世工師之良者也至元廿三年冬十月記徴夢記某官真㝎時夢一老人長身縞衣杖而告曰若遇而祖能識之乎憶祖妣妙清君平時語惲者熟視之為吾大父敦武府君無疑載拜已迺跽而請曰惟王氏上卋甞有顯者否先祖曰今濟源陳堯叟祠碑所刻王姓者即逺祖也切識之時至元庚辰春二月也惲以是異念之者無時後八年戊子二月韓氏子中西謁濟瀆託之為求訪果扵司焉端明所撰四令祠堂記碑脇得元符二年春二月左中散大夫知軍州事拜謁題名廼陳之外孫王恱名氏吁亦異㢤題名云外孫左中散大夫知軍州事王恱奉詔詣靈祠禱雨畢㳟非堂下元符二年春二月廿九日也刻碑之右肋父即前宋王文簡公曽拜參知政事名夅正字伯中係堯佐之壻其子誨說夅正坡公所謂清徳之老是亡其二子名諱見東坡飛白記不肖平生凡事欲将至必警先扵寤寐間如先君将殁以翠微節度傳迓召為御史人以牛刀迎刺扵口断絳陽獄斛律神自牗來告待制翰林有瑶階叅筆月殿芸香之詠馳奏中統二年十二月為都事時事行宫有雪漠三更雲輜萬兵之作進讀東朝夢紫閣連延龍馬飛翔之異是皆徴眀而不可誣者故古人論夢心官物之至靈非但藏徃固能知來凡天地古今之所有無一外乎此而有明晦逺迩通塞之間此人之所以有夢夣之所以多変也然有直有象有精有想唯精誠感薄神靈之所告者乃有占而可㣲是夢也求其所以似亦渉因想盖不肖每以先卋旌紀寂寥念不去懐者有年今先祖昭告如是此亦理之必至所可異而重者據其夢而得其實扵二百載之前若合符節此豈只勞扵想可致而論耶又知吾先卋神爽雖逺而昭昭矣嗚呼既誘其衷明夫系之有自所請闕而有待者不知復能鑒佑使遂其𥘉心少副明靈之精應乎其或亶然是垂老之日即受生之年也是不可不識至元廿五年春二月九日記透月岩記王子塞向冬蛰不出户者两月適寒曦回燠乗休郊㳺歩過故人子也鮮伯之居有竒石儼侍堂背銳上而豊下百竅洞逹大者為巖小者為竇聳者為岑絡者為脉復形勢之所當出者又皆人意與㑹表裏瑩㓗渾然天成顧而睨之如華峰半圭髙挿雲表余乃百匝摩挲襟䄂霑瀆主人因乞名扵余即目之曰透月巖何其石堅凝篤實物也今玲瓏秀麗實而能虚䟽風逗月囘伏景氣如神劖鬼刻出竒乃爾誠百中不一見也主人喜其名佳而物稱明日過門􅈤文其狀予告之曰昔汝父新中府君熟其平生乆矣爲人安静遇禮而用和者也甞買一石日與之伍呼為石友乃臨終曰吾國俗近古不封不樹然我殁當以此石表吾岡西墓田何嗜好其篤也如是因念昔陸績官欎林装鉅積以越海鄭璠守象江輦六石以歸秦前人稱道筆之簡冊非特見其澹僻也正以二賢操履當蒞官行巳之際以廉静為心由篤實而致輝光之用者在此而不在彼也吁汝父之志固有慕扵昔賢今汝能箕裘卋業亦㢘㓗自厲復輦置竒石思継靜觀之樂因迹以求心庶䏻堅其所已至而厲其所未至者焉又淂一悃愊無華吏矣不然将以物為玩徒成䘮志之廦非余之所敢知也扵是乎書以貽之至元廿四年丁亥冬春節前三日記林氏酴縻記人之爱其物也培植顧護之意必致其曲物既淂飬榮華茂盛之氣而自與人意㑹理則或然我未之察耳林氏别墅有酴醿一株自𥘉植至今特二年于兹戊子清和節予杖而來觀花雖未而根撥枝葉條逹舒暢盈盈然有不勝其茂宻者清淑之氣霑漬䆫户間若喜其相遇而與之相㑹也然所以盛者種之非常一也地之氣羙二也人力所至而不失其飬者三也一圃之間異卉殊冨而獨致曲于兹者豈饜彼紅紫而特惜其芳之白且㓗欤近以是花置之露堂西序晨𧺫将啓户香自隙作陣而出有襲人洞觀之烈至扵簾櫳之縈拂几席之薫染着莫而不散者數日且花之爲物香與色而巳若夫香之清郁色之孤㓗殿春餘而獨開扵夏𥘉者其風流藴藉餘品有不淂伉且儷者其爲卋之所重而不厭其多者良以是欤余幽㞐日無事随其隙地亦以㘽種爲樂城中糞壌瓦礫土之正氣悉爲穢汚所易百植而不一生非獨余家比比皆是木之羙者爱雖篤力雖至返淂憔悴可憐之色幸生致枯之歎是知紫庭之蘭不生扵枳棘之野丹崖之木不産於犖确之丘也必矣又傳曰苟淂其養無物不長苟失其養無物不消是以君子悪㞐下流可不慎㢤林君爲人氣勝者也凢一事一物之作不肯碌碌落扵人後必極其精粹而後已今年七十有二目明耳聦強歩健啖壮歳甞從侍講徒單公㳺教其子讀書致身顕逹今也謝其所必爲而安其所已至者日一逰其圃非特物之爲玩将思其老而縱心憐天生發之意而明其馨香之德云秋澗翁喜其如是既與之欵因書以爲記時二十五年立夏后十有五日也清蹕殿記維衞州太一廣福萬夀宫伏為憲天述道仁文義武大光孝皇帝赫臨之盛易常然丈室大起行殿邇天威而貯寵光焉既落成嗣師蕭全祐以其事上聞賜名曰清蹕全祐將文諸貞石以傳不朽謂臣甞忝属太史於法得書廼具其本末来請臣謹按𥘉上之在潜也思得賢俊以禆至理聞太一四代度師蕭輔道弘衍博大則其人也於是以安車來聘既至上詢所以為治者師以愛民立制潤色鴻業用隆至孝者數事為對上喜甚錫之重寳辭不受曰眞有道士也賜號中和仁靖真人冠帔尊崇之禮前後有加迨已未春鑾輅南駕次牧之野時師僊㳺已邈上以隱居所在特枉駕來幸周覧殿廡儀享丈室詢慰宿昔者乆之所以欽悒真風懐思不忘且從五代嗣師居夀之請也及登大寳復降璽書追寵師徳有清而能容光而不曜富文學知變通嚮朕在潜與之同䖏何音容乍逺冠履遽遺殊用悵然之歎居夀等以遭際聖明顯異家教其臨幸之榮又為前代希闊之遇碩惟丈室㒺稱淵躍思丕御天之構者念兹在兹継承詔住燕之齋宫致有待而未遑焉建六代度師全祐既主法席首以継述先志爲切始克丕建實至元廿三年丙戍歳冬十一月也桓楹松桷孔㬅且碩藻棟文欀龍鸞交暎内拱宸居宸居穆穆中闢應門應門鏘鏘玉宇𨳩于前方壺翊于後蒼官鉅竹儼侍左右其宏䴡靖深宛然帝者之居望雲就日奕奕動色于以焚修頌禱仰介萬夀無疆之祉其於貯寵渥廣敬恭報恩徳而圖不朽者亦以勤矣載顧載瞻中外咸若轔轔焉如聴属車之音肅肅焉若覩羽旄之美千古而下焜燿煒煌何啻振碧霞之孤風為郡國之盛事也臣以為自昔聖帝明王崇玄重道以萬乗之尊求一言之要者不過體尚玄黙企慕真純載其清浄躋民夀域擴充無為之化耳如軒后訪道于崆峒漢文受經于河上是也以今方之越光顯有加焉異時史臣有鋪張洪休揚厲無窮之羙者因蹟以求聖皇睿意之所在其於斯宇亦將有所取焉至元廿五年戊子歲夏四月廿有五日謹記重修録事司㕔壁記治有常䖏則視瞻尊而政廼肅此必然理也維衛録事司自辛亥歲州理復舊凡百草次其司事權寓扵委巷間逋舎靡有定所厥後官易雷氏私居即爲今署然敗屋數間而已頽垣四逹泮潦傍浸夏不足以障炎歊冬不足以禦寒凍公吏勃奚簿案委積執事聽理者安於湫隘踐居塵泥與鼃黽混殽者蓋有年於兹逮上郡薛君來蒞是軄顧惟若爾恥狃故習且有以需焉治之明歲衆務舉下安教條審其信而可使廼與其監也鮮不花司判趙㝢起廢易故将惟新是圗上之府允焉於是作㕔事敞後閤署佐幕創架庫下至吏廡門閭誡飭之石胥靡之所莫不畢具僚友聽决夏冬爲適安吏曹升降次列有攸叙中外具瞻一司爲齊肅其材木之用取辦廩餘而甓石工役等費願言趨事有不期然而然者經始於丁亥之春畢工於是冬之季凡爲屋十有八楹室既釁薛君暨其貳㝢史湯瑀踵門來謁載拜而言曰文曜等不敏猥有營治固爲瑣屑不足以見于後然恐迤乆爲有力者豪據致虚勞民力官失恒䖏於人心大無所恔幸憲使惠顧文本末於石將䧟置㕔壁使觀者取重知改作匪易不致妄有異議予以有味哉斯言也今之職州縣者丁此繁劇匪朝伊夕惴惴焉奔命共事惟恐其後故徃徃翹足瓜代知免責而去今薛君等能以從事餘力改葺斯宇且慮乆有侵于可謂臨政不苟重民力敬王事心公而慮逺者矣後之來者知政由是出無匪王事一以公道為心越前政有光又何患焉苟公心不存徒知居必日葺以爲觀羙之具非余之所敢知也眀年戊子夏六月記扶踈軒記余構春露堂之眀年循墻種木思有以蔽於外而奥於内也又眀年衆木欝茂布柯散葉隂暎雖微葱蘢可恱於是題其軒曰扶踈四月維夏露華湛滋扶光踈翠曄曄離離徤晚凉而層出媚晴霏而自持鳥交欣而有託物争妍而見熈我固知吾廬之可愛過客睠焉亦去之而遲遲客曰今子取陶詩名軒見於外者如是其安於静而樂乎中者不無意於其間試爲我道之予廼仰而思俛而嘆曰客何見之晚也秋澗叟積學四十餘年從仕其間亦甞明其學而行其道於時矣然方駕而尼盛行自拘吾豈惡彼利逹樂此閑且寂也天道盈虚時有用捨安吾所遇委夫時運而已甞誦淵明饑凍雖切違已交病心爲形役深愧平生之語大有契於愚衷良竊慨慕者焉况復衰謝不堪丗用有悟言一室嘯傲兹軒之下廼所便尔物耒即應客去讀書遇事與心㑹輙忻然忘倦其或抽思雜著旁搜逺紹竟日忘返盖㝷常焉今又厭斁倦於作為知饑而食困而眠蹣跚其迹扶踈其心任衰榮之無定樂閑身於兹時騁懐逰目極夫吾之所好斯亦適意壷觴寓興於草木之意也客曰有是㢤覺吾清興翛翛横陳於䟽風秀樾之間者且無邊際矣予乃賡之以歌曰庭下之木日惟喬兮封而植之眷生意之浩兮軒中之人日益耄兮仕喜巳愠無所関於抱兮天運如此孰敢咈此道兮偉哉靖節獨立物之表兮今我何人議論安敢到兮願為擁篲以備三徑之掃可乎客笑而去於是乎筆以為記至元戊子秋孟廿有六日書萬夀宮方丈記夫天下之事得人則興否則萎薾而不振此必然理也萬夀宮既易常然丈室起清蹕行殿越眀年作夏屋於新宮之背盖所以拱宸居而復師位也方之舊制一切充而大之其傳度之位賔友之筵淵嘿之室髙眀靖深燕處爲超然矣既考室廼以壁記來墾維太一教興於金𥘉始祖垂創顧雖一事而本而末皆有次第其植根豐末濬源衍派傳無窮於後者惟恐其不弘且博也逮重明嗣法至創靈章峻僊品有充類至極者大定一水漂泛無幾再傳而得虚寂堂宇齋壇刻期而復貞祐之兵燼爲飛煙四代中和仁靖真人披荆榛掇瓦䃯成難爲易不十年略見完具其有俟而未侈大者以傒夫後之肯構者焉然顯仁藏用已胚胎乎其中矣貞常師持守成業而光楊恢廓之志規模未竟而奪之遽今六代純一師感其如此思有以大慰先志俾有俟而未竟旣易而必葺者八年之間一新而改觀誠可謂善維善述者矣異時真仙偕來華表留語曰吾之析薪也如是乃今克荷者若爾其至則知欣然顧諟蕩雲光於廣福致墟於玉室者尚有重於此者乎然道修爲教有體有用體雖具而用不彰其爲道也亦以㣲矣嗚呼嗣音而來者固當惴惴焉以思道生之本使坐有所進則拱璧駟馬未足為先後之光也至於興建之方資用之費木土之工主治者㑹計之事兹不復云唐中書令贈尚書右僕射馬公祠堂記予甞道出荏平顧視俗多闊逹膏壤夷曠俯仰控衞兼齊薄魯海岱之所鎮浸禮義之所漸摩冝其鍾靈萃秀篤生異人有如中令公者曰山東出相亶其然乎仍訪公陳迹得遺祠于里之北壞垣敗屋大有不稱公聲華烜爀於盖代者適去職不遑顕圗略致稽古象賢微意今年冬郡從事邑人崔君文􅈤予書以掲公祠他日持歸將丕崇厥構有來具瞻式廓民傚以為東人光庻幾必恭敬止之義其懐賢樂善殊有属予心者就述中令公之出處大致且寓夫予之所梗㮣者焉唐既剗隋亂治具畢張公挺曠邁之姿負詩書之業寤寐風雲思立談以取卿相及遭遇太宗由布衣論天下事飛章抗䟽展盡底藴一時劒履鏘翔何翅百位獨能婉孌龍姿宥宻基命如房杜以佐命就列先生以機務稱賢至隆貞觀文物聲明之治龍受之先前後有爀卒全君臣始終相得之分何其盛哉然向非中郎何之賢心焉休休越彦聖而逹不違則公之事業烏得施展經綸如是其至者乎書稱邦之榮懐杌􅑾其原實繋於此信哉故昔之以致澤存心進賢爲職者未甞不眷眷於斯焉至想見二公風采歆其餘光邁烈厲衰俗而激頽風者亦以多矣崔君曰有是哉吾子固當同稱並羙大書特書而巳也至元二十五年戊子歲冬十一月謹記靈應觀世音記以心感心不然柛當求之於有無之間新樂李氏蔵觀世音像盖宋淑徳尹后家物也李世奉之甚恪喪乱間失所在一夕見於夢曰吾今寓某家犨塢中可訪求以歸為物色之獲焉家人疾乞藥甞得丹粒於杯案間服之者即間於戯其可謂靈也已釋有經曰觀音大約人罹厄難持誦䖍禱世音以慈悲威力能觧脫諸苦雖悍夫戾婦莫不信然吾儒者釋之道𥘉未之學其善惡感格之理且以吾之所得者明之夫萬善生於心而庶徴應於外又嗜欲將至有開必先天之所以福善禍滛者只是以理或否屈而伸之也故一念善則祥風和氣即在於是一念悪則妖星厲鬼亦在於是彼疾痛率籲而云聞聲應願濟而度之者所謂以心感心不入諸相而氣志如神廓然自應者歟不然恐是聖賢立教使人篤敬速於背悪而嚮善耳若孚誠不立妄意虚想亦釋氏之所悪也昔有寳菩薩板者重其道子筆也今李氏世奉尊像如此敬其神之靈也既曰靈有不敢以一㮣論者如東坡外祖父程公遇蜀亂絶粮困不能歸有僧十六人徃見之曰我公之邑人也各以鏹二百貸之程以是得歸竟不知僧所在公曰此大阿羅漢也歲設大供四公年九十凡設四百餘供然坡跋扵尾云或曰羅漢慈悲深重急於接物故多現神變儻其然乎是亦自疑而不敢必也幸觀者瑩鑒畫年深繒色黯昧筆法極精妙非近代所可及李伯毋孺人王氏今年夀九十一聦明不衰自少至老供養尤謹可謂孚誠立而不入諸相者哉至元巳丑歲五月六日係先妣夫人靳氏明忌書二本以薦冥福云秋澗先生大全文集卷第三十八
