body:
  text: 河內修武縣重修廟學記覃懷風土距太行之陽川夷氣淑山水秀麗逺而舒發於􅑔者為多故人傑地靈自昔無荒寒僻野之陋至元壬午冬前州將劉暉與豫同在京師間相會肆談懷衛間勝概娓娓忘􅌒因及縣之廟學與夫本末告豫曰廟自宋歷金雖制量邑作當時徙建甚備罹壬辰雲擾爼豆不遑賴先帥家府為主張是故已圯者隨葺堅完者俾勿壞乃以有道王君文玉陳復趙冝中輩前後顧管得巋然獨存於兵燼之餘力也非幸也至元癸酉不肖自鄭秩滿來歸顧殿廡肖像歲月浸久風雨浸剝䵝昧傾藉無復於舊荷薪之責懼不克舉遂倡帥官庶日以修治崇飾為事御史柏德孝思又從而贊焉經調官蒲楊彭三明府千年間皆次第而作新之遂延致學師日誘諸生講肄在其中復請有司淂麗掃十餘人春秋奠獻鍾鼓鏗鏘禮容升降蓋肅如也㒒之素願雖畢而明德新民之效尚未敢議也余曰不然郡縣之政似有緩而急者學校是也學校者三代之所以明人倫也人倫明於上則小民親於下其所以關係風化不的然而彰歟若夫山川英粹之氣氲氤開闔鍾竒孕秀曽無今昔醇醨之間至于􅉼飬薄俗作成善類實庠序基而本之後之來者復能增崇勉勵以極菁莪樂育之美異時人材輩出如近代進士張夢弼郭黻張衮祁文秉趙尚賔文彩風流照映一時誠不難矣劉侯曰有味哉子之言也請筆之歸而刻諸麗石庶幾有讀斯文而興起者焉二十年歲在癸未二月十八日謹記蘭亭石刻記蘇門盧君茂之得玉色碑石中斷塈酒壚間偶見視之乃禊飲序也即懇求淂之豫自稚年留心翰墨閲是本無慮十數此帖極清徑有神而不厖雜與定武石本略同其背有勑書字塗以黃金光彩尚煥下復刻祈公字二豈𥙿陵賜宰相衍家物也嘗謂二王墨妙雖片言隻字如寸珠尺璧見者皆當寶惜不可使混泥沙今一旦為吾所遇免夫淋汙嚙蝕委棄劘滅之厄果神物護持時有授受然耶異時歸來當臨溪起亭位置璧間扳長史齋新例榜其亭曰右軍且詫鄉賢曰此乃吾王氏真行之祖也庶幾有摳衣而請益者其于奎璧兩間不無煌煌者焉但未知在幾年後耳又諺云室無滯貨不為潤屋矧吾儕以多文為冨乎然物之堅者莫金石若也兹刻也豈敢保其必夀抑不敢矜其長為巳有特記焉以付子孺庶王氏來者能弓而箕之是所謂薪有盡而火無窮之傳也二十年歲在癸未夏五月十七日謹記御史針後記此帖間間公為師中丞仲安所書亂餘李侯輔之掇於西臺著間后為義士張伯寧所有至元戍寅因獲觀于張鄰野家孝純愛玩不巳命子逺摹臨略不失筆意壬午秋豫至京師鄰野子來謁遂及曩之所摹明日持以見贈墜送之餘僅得百一十八字公之書世固不少論夫擘窠大書雄徑瓌奇體兼顔蘇而自成一家者此平生最得意書也豫性僻而好古於書學嗜而不厭故所欲見者每每如意豈歐陽子謂物聚于好然耶抑亦有契分故耶二十年癸未夏五月雨中與子􅳼裝潢歸藏春露堂以為書林寶鎮且懌同志願見之心中議大夫治書侍御史汲郡王惲謹記祥露記先母夫人平峕顧惲讀書作言辭喜見於色曰好此吾殁且無憾若汝長仍能辦日飯一盂啖我過於䁀餗榮矣亡後十有四祀方得廩食於官而菽水自供之養曽不少及苐新婦推代中饋勞者僅六年風樹之戚其何有涯故每讀文正范公饗若曹之歎未嘗不撫卷流涕也甫十年不幸先君亦捐館以治命建新阡於河西鄉用明年百五日奉遷二親藁殯於沁曲玄堂才開有二黃蝶飛出其先妣柩蓋珠露疑綴皛明煥爛駢羅角結殆寶幢纓絡蒙覆其上且聞清香襲人觀者異焉天日照臨移刻乃晞嗚呼夫人自巳酉秋棄飬至是整十祀矣在窀穸間祥見如此恐非偶然也昔人有夢持炬下入祖禰㼅中識者謂光照光世之兆兹夢也或有異不異焉今野蔭之氣化為真露露膏澤也復聮綴而成雯華意者先妣之德有幽光而未彂耶不然將澤及子孫有以文而興起者邪開先之慶固當有在惲不淂而知也至元草一年歲舍甲申正月二十有八日中議大夫山東東西道提刑按察副使男惲百拜泣血追記均斡堂記財賦者生民之命國家之大本也善理者古今無幾焉自鹽鐡事興漢庭諸儒紛紜辨論竟莫能一其艱在於不傷財而必害民故也濟南漕長趙侯洎其二儲君天章過余求扁其公堂之顔遂題曰均斡蓋取孟堅志書之辭也均者使四民常均公有餘而私不乏幹者所以齊衆度而抑兼并也二者為義如此何古人憂後世之心深且重哉顧諟新政意若在兹第不自著者形與迹耳蓋嘗思之其所以經制於一堂之上者不過以廉自澡以靜內守而以法外御也故務雖繁而愈辦羡比常而益增此自然理也異時揔會民賦鼓鬻山海低昻物貨之權佐理軍國之用從容朝珂籌之以䇿未必不由主靜而法以均斡為得計而以籠絡為末策也未知以為何如二公唯而退於是乎書以為記逰華不注記濟南山水可遊觀者甚冨而華峰濼源為之冠余到官八月湖光山色朝夕與對於庭户几席間若無所覩心有所不在焉然每以厯居卑溼為念或有云堰頭者乃自昔潨引諸泉入大清之峻口也一鍤之力不崇朝可徹而陸之常欲一往而未遑也冷竈節得暇且寬憲使耶律君邀余暨簽書杜君為兹山逰且尋堰頭之盟諾焉逮十有一日遂自厯下亭登舟亂大明湖經會波樓下出水門入廢齊漕渠所謂小清河者是也泛灔東行約里餘運肘而北水漸瀰漫北際黃臺東連疊徑悉為稻畦蓮蕩水村漁舍間錯煙際真畫幀也於是緑萍蕩槳白鳥前導北望長呤華之風煙勝賞盡在吾目中矣是日也天朗氣淑清風徐來水平不波鳴絲歌板響動林谷舉酒相屬開口而噱少頃扶腋登岸相與步入華陽道觀主人方布几延賔㒒以疾作遽還二君為愀然也至於罔獲陟連雲絶頂追謪仙之逸駕呌蒼梧之暮雲冨覽江山以盡遊觀之美特間適餘事初不訝其從違正恐山靈獨回俗駕造物者有所靳耳既歸伏臥舟中怦怦焉如宿醒在懷殊伊鬱也但聞兩舷間風水之聲自宫自啇拍拍盈耳殆魏獻子之歌鐘石鍾山之水樂也且念華峰之勝樂在近郊因以步里計之自厯亭北至華陽院下草里而逺由水門抵黃臺北渚十八里而近以葦汀漁箔周折灣淑從城東北阿至艤舟山家蓋且十曲矣峕至元甲申清明前一日也謹記春露堂記王氏居安仁西里有宅一區湫隘近市或者曰宜易此而就爽塏余應之曰遺簮之求聖人有取焉况先人之弊廬乎然歲深屋老枝撑欹側有不堪託處者於是謀為新堂不侈不陋于以藏遺書閟宗器節序致嚴設裳衣而安寢祭且將砭吾居明嚮晦燕偃息之所乙酉春既落成遂榜其顔曰春露蓋取霜露既降感時思親之義也嗚呼思雽我將從其重乎思其重念吾親之志也敬其止慮夫不克析薪之荷也昔吾先君思淵子握瑜懷瑾經世之志甚逺汔淡無所營專事於學務為無所不窺要歸適用有為而已嘗曰吾年未老持此而明吾道行吾志於天下庶乎開物成務大有見於世不然吾遁則無怍無悶矣悲夫曽不少施而卒賫志以沒至為有為者所惜此不肖所以仰穹罔極而抱終身之戚也蓋吾親之去日愈逺不肖之受年益深去親邈則子孫有悠而無密受年多則氣志漸怠而生不蹶追其逺所以厚來者之德也重其思所以勉吾心之述也傳不云乎孝也者繼志述事之謂也周公善焉是則為逹孝學也者學為周孔而已矣至于履霜濡露感念歲峕入室肅焉如覩乎容色之睟出户愾然若聞其歎息之音齊則見其所為饗者悽愴怵惕奭動于中是皆峕思之常君子所之同也後之嗣服者登斯堂讀斯文求豫心之所泊能先其所重而不忘其所常將見堂構無盡孝思為不匱矣至元草二年十月日記㷩春閣遺制記梓人鈕氏者向余談熙春故閣形勝殊有次第既而又以界畫之法為言曰此閣之大概也􅌟髙二百二十有二尺廣四十六步有竒從則如之雖四隅闕角其方數紆餘于中下斷鰲為柱者五十有二居中閣位與東西耳構九楹中為楹者五每楹尺二十有四其耳為楹者各二共長七丈有二尺上下作五簷覆壓其簷長二丈五尺所以蔽虧日月而却風雨也閣位與平座疊層為四每層以古座通藉實為閣位者三穿明度暗而上其為梯道凡五折焉世傳閣之經始有二子掖醉翁過前將作者曰此即閣之制也取具成體故兩翼旁􅌟俯在上層欄構之下止一位而已其有隆有殺取其漂紗飛動上下崇卑之序此閣之形勢所以有瑰偉特絶之稱也豫因念汴自壬辰兵後故苑蕪沒惟熙春一閣巋然獨存昔嘗與客三至其上徙倚周覽雖悵然動麥秀黍離之感且詫其截嶪壯麗如神營鬼構洞心駭目有不可端倪者至不藉井幹不階峻址飛翔突起干青霄而矗上又似夫鰲掀而鳯翥也豫厯考秦漢巳來宫殿之制漢不復于秦而唐不及于漢如未央長樂曽何得阿房之萬一含元華清又奚敢跂兩都之規制也蓋天地氣衰國資民力與林林之材不克取盈而尺度不足其數焉故也然熙春遺構亦可為近代之傑觀彼騷人詞客雖稱述賦詠極其偉麗是猶臆説庭章而徒倣像其千門萬户而巳終非梓匠不能知其規模與勝槩之所以然閣廢撤巳久及聞紐氏之説使觚稜金爵上雲雨飛舞空際者盡在吾目中矣然不文之言不足以逹逺因作記以遺之鈕氏者顒世工師之良者也至元草三年冬十月記徴夢記某官真㝎時夢一老人長身縞衣杖而告曰若遇而祖能識之乎憶祖妣妙清君平時語惲者熟視之為吾大父敦武府君無疑載拜已乃跽而請曰惟王氏上卋嘗有顯者否先祖曰今濟源陳堯叟祠碑所刻王姓者即逺祖也切識之時至元庚辰春二月也惲以是異念之者無時後八年戊子二月韓氏子中西謁濟瀆託之為求訪果于司焉端明所撰四令祠堂記碑脅得元符二年春二月左中散大夫知軍州事拜謁題名乃陳之外孫王恱名氏吁亦異哉題名云外孫左中散大夫知軍州事王恱奉詔詣靈祠禱雨畢恭非堂下元符二年春二月草九日也刻碑之右肋父即前宋王文簡公曽拜參知政事名降正字伯中係堯佐之壻其子誨説降正坡公所謂清德之老是亡其二子名諱見東坡飛白記不肖平生凡事欲將至必警先于寤寐間如先君將殁以翠微節度傳迓召為御史人以牛刀迎刺于口斷絳陽獄斛律神自牗來告待制翰林有瑶階參筆月殿藝香之詠馳奏中統二年十二月為都事時事行宫有雪漠三更雲輜萬兵之作進讀東朝夢紫閣連延龍馬飛翔之異是皆徴眀而不可誣者故古人論夢心官物之至靈非但藏往固能知來凡天地古今之所有無一外乎此而有明晦逺邇通塞之間此人之所以有夢夢之所以多變也然有直有象有精有想唯精誠感薄神靈之所告者乃有占而可微是夢也求其所以似亦涉因想蓋不肖每以先卋旌紀寂寥念不去懷者有年今先祖昭告如是此亦理之必至所可異而重者據其夢而得其實于二百載之前若合符節此豈只勞于想可致而論耶又知吾先卋神爽雖逺而昭昭矣嗚呼既誘其衷明夫系之有自所請闕而有待者不知復能鑒佑使遂其𥘉心少副明靈之精應乎其或亶然是垂老之日即受生之年也是不可不識至元草五年春二月九日記透月岩記王子塞向冬蟄不出户者兩月適寒曦回燠乘休郊遊步過故人子也鮮伯之居有竒石儼侍堂背鋭上而豐下百竅洞逹大者為巖小者為竇聳者為岑絡者為脈復形勢之所當出者又皆人意與會表裏瑩潔渾然天成顧而睨之如華峰半圭髙插雲表余乃百匝摩挲襟袖霑瀆主人因乞名于余即目之曰透月巖何其石堅凝篤實物也今玲瓏秀麗實而能虛疏風逗月回伏景氣如神劖鬼刻出竒乃爾誠百中不一見也主人喜其名佳而物稱明日過門􅈤文其狀豫告之曰昔汝父新中府君熟其平生久矣為人安靜遇禮而用和者也嘗買一石日與之伍呼為石友乃臨終曰吾國俗近古不封不樹然我殁當以此石表吾岡西墓田何嗜好其篤也如是因念昔陸績官欎林裝巨積以越海鄭璠守象江輦六石以歸秦前人稱道筆之簡册非特見其淡僻也正以二賢操履當蒞官行巳之際以廉靜為心由篤實而致輝光之用者在此而不在彼也吁汝父之志固有慕于昔賢今汝能箕裘卋業亦廉潔自厲復輦置竒石思繼靜觀之樂因迹以求心庶能堅其所已至而厲其所未至者焉又淂一悃愊無華吏矣不然將以物為玩徒成喪志之廦非余之所敢知也于是乎書以貽之至元草四年丁亥冬春節前三日記林氏酴縻記人之愛其物也培植顧護之意必致其曲物既淂飬榮華茂盛之氣而自與人意會理則或然我未之察耳林氏别墅有酴醿一株自𥘉植至今特二年于兹戊子清和節豫杖而來觀花雖未而根撥枝葉條逹舒暢盈盈然有不勝其茂密者清淑之氣霑漬窗户間若喜其相遇而與之相會也然所以盛者種之非常一也地之氣美二也人力所至而不失其飬者三也一圃之間異卉殊冨而獨致曲于兹者豈饜彼紅紫而特惜其芳之白且潔歟近以是花置之露堂西序晨起將啓户香自隙作陳而出有襲人洞觀之烈至于簾櫳之縈拂几席之薰染著莫而不散者數日且花之為物香與色而巳若夫香之清郁色之孤潔殿春餘而獨開于夏𥘉者其風流藴藉餘品有不淂伉且儷者其為卋之所重而不厭其多者良以是歟余幽居日無事隨其隙地亦以栽種為樂城中糞壤瓦礫土之正氣悉為穢汚所易百植而不一生非獨余家比比皆是木之美者愛雖篤力雖至返淂憔悴可憐之色幸生致枯之歎是知紫庭之蘭不生于枳棘之野丹崖之木不産於犖確之丘也必矣又傳曰苟淂其養無物不長苟失其養無物不消是以君子惡居下流可不慎哉林君為人氣勝者也凡一事一物之作不肯碌碌落于人後必極其精粹而後已今年七十有二目明耳聰強步健啖壯歲嘗從侍講徒單公遊教其子讀書致身顯逹今也謝其所必為而安其所已至者日一逰其圃非特物之為玩將思其老而縱心憐天生發之意而明其馨香之德云秋澗翁喜其如是既與之欵因書以為記時二十五年立夏后十有五日也清蹕殿記維衛州太一廣福萬夀宫伏為憲天述道仁文義武大光孝皇帝赫臨之盛易常然丈室大起行殿邇天威而貯寵光焉既落成嗣師蕭全祐以其事上聞賜名曰清蹕全祐將文諸貞石以傳不朽謂臣嘗忝屬太史於法得書乃具其本末來請臣謹按𥘉上之在潛也思得賢俊以禆至理聞太一四代度師蕭輔道弘衍博大則其人也於是以安車來聘既至上詢所以為治者師以愛民立制潤色鴻業用隆至孝者數事為對上喜甚錫之重寶辭不受曰真有道士也賜號中和仁靖真人冠帔尊崇之禮前後有加逮已未春鑾輅南駕次牧之野時師仙遊已邈上以隱居所在特枉駕來幸周覽殿廡儀享丈室詢慰宿昔者久之所以欽悒真風懷思不忘且從五代嗣師居夀之請也及登大寶復降璽書追寵師德有清而能容光而不曜富文學知變通嚮朕在潛與之同處何音容乍逺冠履遽遺殊用悵然之歎居夀等以遭際聖明顯異家教其臨幸之榮又為前代希闊之遇碩惟丈室罔稱淵躍思丕御天之構者念兹在兹繼承詔住燕之齋宫致有待而未遑焉建六代度師全祐既主法席首以繼述先志為切始克丕建實至元草三年丙戍歲冬十一月也桓楹松桷孔曼且碩藻棟文欀龍鸞交映內拱宸居宸居穆穆中闢應門應門鏘鏘玉宇開于前方壺翊于後蒼官巨竹儼侍左右其宏麗靖深宛然帝者之居望雲就日奕奕動色于以焚修頌禱仰介萬夀無疆之祉其於貯寵渥廣敬恭報恩德而圖不朽者亦以勤矣載顧載瞻中外咸若轔轔焉如聽屬車之音肅肅焉若覩羽旄之美千古而下焜耀煒煌何啻振碧霞之孤風為郡國之盛事也臣以為自昔聖帝明王崇玄重道以萬乘之尊求一言之要者不過體尚玄默企慕真純載其清淨躋民夀域擴充無為之化耳如軒后訪道于崆洞漢文受經于河上是也以今方之越光顯有加焉異時史臣有鋪張洪休揚厲無窮之美者因迹以求聖皇睿意之所在其於斯宇亦將有所取焉至元草五年戊子歲夏四月草有五日謹記重修録事司廳壁記治有常處則視瞻尊而政乃肅此必然理也維衛録事司自辛亥歲州理復舊凡百草次其司事權寓于委巷間逋舍靡有定所厥後官易雷氏私居即為今署然敗屋數間而已頽垣四逹泮潦傍浸夏不足以障炎歊冬不足以禦寒凍公吏勃奚簿案委積執事聽理者安於湫隘踐居塵泥與蛙黽混殽者蓋有年於兹逮上郡薛君來蒞是職顧惟若爾恥狃故習且有以需焉治之明歲衆務舉下安教條審其信而可使乃與其監也鮮不花司判趙宇起廢易故將惟新是圗上之府允焉於是作廳事敞後閣署佐幕創架庫下至吏廡門閭誡飭之石胥靡之所莫不畢具僚友聽決夏冬為適安吏曹升降次列有攸敘中外具瞻一司為齊肅其材木之用取辦廩餘而甓石工役等費願言趨事有不期然而然者經始於丁亥之春畢工於是冬之季凡為屋十有八楹室既釁薛君暨其二宇史湯瑀踵門來謁載拜而言曰文曜等不敏猥有營治固為瑣屑不足以見于後然恐迤久為有力者豪據致虛勞民力官失恆處於人心大無所恔幸憲使惠顧文本末於石將陷置廳壁使觀者取重知改作匪易不致妄有異議豫以有味哉斯言也今之職州縣者丁此繁劇匪朝伊夕惴惴焉奔命共事惟恐其後故往往翹足瓜代知免責而去今薛君等能以從事餘力改葺斯宇且慮久有侵于可謂臨政不苟重民力敬王事心公而慮逺者矣後之來者知政由是出無匪王事一以公道為心越前政有光又何患焉苟公心不存徒知居必日葺以為觀美之具非余之所敢知也眀年戊子夏六月記扶踈軒記余構春露堂之眀年循墻種木思有以蔽於外而奧於內也又眀年衆木鬱茂布柯散葉隂映雖微蔥蘢可恱於是題其軒曰扶踈四月維夏露華湛滋扶光踈翠曄曄離離健晚涼而層出媚晴霏而自持鳥交欣而有託物爭妍而見熙我固知吾廬之可愛過客眷焉亦去之而遲遲客曰今子取陶詩名軒見於外者如是其安於靜而樂乎中者不無意於其間試為我道之豫乃仰而思俯而嘆曰客何見之晚也秋澗叟積學四十餘年從仕其間亦嘗明其學而行其道於時矣然方駕而尼盛行自拘吾豈惡彼利逹樂此間且寂也天道盈虛時有用捨安吾所遇委夫時運而已嘗誦淵明飢凍雖切違已交病心為形役深愧平生之語大有契於愚衷良竊慨慕者焉况復衰謝不堪丗用有悟言一室嘯傲兹軒之下乃所便爾物耒即應客去讀書遇事與心會輒欣然忘倦其或抽思雜著旁搜逺紹竟日忘返蓋尋常焉今又厭斁倦於作為知飢而食困而眠蹣跚其迹扶踈其心任衰榮之無定樂間身於兹時騁懷逰目極夫吾之所好斯亦適意壷觴寓興於草木之意也客曰有是哉覺吾清興翛翛橫陳於疏風秀樾之間者且無邊際矣豫乃賡之以歌曰庭下之木日惟喬兮封而植之眷生意之浩兮軒中之人日益耄兮仕喜巳愠無所關於抱兮天運如此孰敢咈此道兮偉哉靖節獨立物之表兮今我何人議論安敢到兮願為擁篲以備三徑之掃可乎客笑而去於是乎筆以為記至元戊子秋孟草有六日書萬夀宮方丈記夫天下之事得人則興否則萎薾而不振此必然理也萬夀宮既易常然丈室起清蹕行殿越眀年作夏屋於新宮之背蓋所以拱宸居而復師位也方之舊制一切充而大之其傳度之位賔友之筵淵默之室髙眀靖深燕處為超然矣既考室乃以壁記來墾維太一教興於金𥘉始祖垂創顧雖一事而本而末皆有次第其植根豐末濬源衍派傳無窮於後者惟恐其不弘且博也逮重明嗣法至創靈章峻仙品有充類至極者大定一水漂泛無幾再傳而得虛寂堂宇齋壇刻期而復貞祐之兵燼為飛煙四代中和仁靖真人披荆榛掇瓦䃯成難為易不十年略見完具其有俟而未侈大者以傒夫後之肯構者焉然顯仁藏用已胚胎乎其中矣貞常師持守成業而光楊恢廓之志規模未竟而奪之遽今六代純一師感其如此思有以大慰先志俾有俟而未竟既易而必葺者八年之間一新而改觀誠可謂善維善述者矣異時真仙偕來華表留語曰吾之析薪也如是乃今克荷者若爾其至則知欣然顧諟蕩雲光於廣福致墟於玉室者尚有重於此者乎然道修為教有體有用體雖具而用不彰其為道也亦以微矣嗚呼嗣音而來者固當惴惴焉以思道生之本使坐有所進則拱璧駟馬未足為先後之光也至於興建之方資用之費木土之工主治者會計之事兹不復云唐中書令贈尚書右僕射馬公祠堂記豫嘗道出荏平顧視俗多闊逹膏壤夷曠俯仰控衛兼齊薄魯海岱之所鎮浸禮義之所漸摩冝其鍾靈萃秀篤生異人有如中令公者曰山東出相亶其然乎仍訪公陳迹得遺祠于里之北壞垣敗屋大有不稱公聲華烜爀於蓋代者適去職不遑顯圗略致稽古象賢微意今年冬郡從事邑人崔君文􅈤豫書以揭公祠他日持歸將丕崇厥構有來具瞻式廓民效以為東人光庶幾必恭敬止之義其懷賢樂善殊有屬豫心者就述中令公之出處大致且寓夫豫之所梗概者焉唐既剗隋亂治具畢張公挺曠邁之姿負詩書之業寤寐風雲思立談以取卿相及遭遇太宗由布衣論天下事飛章抗疏展盡底藴一時劒履鏘翔何翅百位獨能婉孌龍姿宥密基命如房杜以佐命就列先生以機務稱賢至隆貞觀文物聲明之治龍受之先前後有爀卒全君臣始終相得之分何其盛哉然向非中郎何之賢心焉休休越彥聖而逹不違則公之事業烏得施展經綸如是其至者乎書稱邦之榮懷杌􅑾其原實繫於此信哉故昔之以致澤存心進賢為職者未嘗不眷眷於斯焉至想見二公風采歆其餘光邁烈厲衰俗而激頽風者亦以多矣崔君曰有是哉吾子固當同稱並美大書特書而巳也至元二十五年戊子歲冬十一月謹記靈應觀世音記以心感心不然柛當求之於有無之間新樂李氏藏觀世音像蓋宋淑德尹后家物也李世奉之甚恪喪亂間失所在一夕見於夢曰吾今寓某家犨塢中可訪求以歸為物色之獲焉家人疾乞藥嘗得丹粒於杯案間服之者即間於戲其可謂靈也已釋有經曰觀音大約人罹厄難持誦虔禱世音以慈悲威力能解脫諸苦雖悍夫戾婦莫不信然吾儒者釋之道𥘉未之學其善惡感格之理且以吾之所得者明之夫萬善生於心而庶徴應於外又嗜欲將至有開必先天之所以福善禍淫者只是以理或否屈而伸之也故一念善則祥風和氣即在於是一念惡則妖星厲鬼亦在於是彼疾痛率籲而云聞聲應願濟而度之者所謂以心感心不入諸相而氣志如神廓然自應者歟不然恐是聖賢立教使人篤敬速於背惡而嚮善耳若孚誠不立妄意虛想亦釋氏之所惡也昔有寶菩薩板者重其道子筆也今李氏世奉尊像如此敬其神之靈也既曰靈有不敢以一概論者如東坡外祖父程公遇蜀亂絶糧困不能歸有僧十六人往見之曰我公之邑人也各以鏹二百貸之程以是得歸竟不知僧所在公曰此大阿羅漢也歲設大供四公年九十凡設四百餘供然坡跋于尾云或曰羅漢慈悲深重急於接物故多現神變儻其然乎是亦自疑而不敢必也幸觀者瑩鑒畫年深繒色黯昧筆法極精妙非近代所可及李伯毋孺人王氏今年夀九十一聰明不衰自少至老供養尤謹可謂孚誠立而不入諸相者哉至元巳丑歲五月六日係先妣夫人靳氏明忌書二本以薦冥福云秋澗先生大全文集卷第三十八
