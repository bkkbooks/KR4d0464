body:
  text: 碑大元國趙州創建故開府儀同三司中書右丞相贈太尉忠武史公祠堂碑銘并序自昔以功德而獲大任既沒而饗常祀者鮮矣况匹夫匹婦之心者哉如武矦卒而蜀人祭於梁去則魏土廟而食寥寥千載幾何人斯若太元郡趙相師表百辟名節獨著薨謝之日葬加賜銘士無異議民有報祀而得衆心之同然者今於忠武史公見之公肇自太宗朝襲世爵付以全趙四十而公宿兵陽夏歲例歸視師每過趙遲遲而郡甫離兵燼經凃南北環視千里間生意公憫其如是必為察民情之賦役偏而不均獄訟冤而且滯即為彼有害於政也立與之軺之求索自貶威重告語約束興除寬假之力又有大過人者白衣經會煽七縣間不逞蟂聚伺昧嘨凶約屠城資期竊發適公歸至郡有以之萌無亂之形處之為最趣其變公外示間暇覘黨魁所在不意掩捕獲焉之具服示所告屬邑曰渠率已殱餘不一究以安反側趙人遂妥逮壬寅歲詔作丘甲時歲荒民移排抽户椎事竟椎不滿者三十數有司以狀白公曰業無所於取缺之以需可也守吏以軍興嚴惴惴不敢諾公曰以民困故非敢私脫有誤責我任不汝及也殆紀後乃如約不數年保障休息恆襄間熙熙然一樂國也公薨後十五年前蘭溪薄郡人李瑛喜義重報貞而有幹為一日謂趙之父老曰吾儕小人樂有家室得至今日者可不知其所自斯皆忠武公恩造骨而肉之之德也終無以圗報將死有餘負惟是起祠奉祀庶酬萬一衆曰諾遂相與協力作新廟於郡城西里迄三載廟成神栖像設翼翼有儼凡用鍰三千七伯餘緡已而州二政蓨人賈英嘗屬櫜鞬左右公覩其若爾感念疇昔曰丕厥搆則罔及乃以樹碑頌德為巳任以某知公平生頗詳不千里逺請書其事於石某以下吏故有不敢多讓者因勉為次系之公諱某燕之永清人姿忠亮謹畏以度量雄天下歷事四朝入則坐廟堂出則分閫寄者五十年當其臨大事決大議夷大難不動聲色卒之收尊主庇民之功此天下所共知兹不復云顧惟治趙之績在公雖一事惟其恩造之功至故能感民心也深化強梗而為善良易慷慨而為忠厚以致其生也如父母戴之其沒則以神明事焉嗚呼休哉人稱至人不死以氣之精大賢不亡得氣之英公英爽在上其眷戀於趙人也審矣仍作歌詩遺之俾歲時虔饗以侑肴意椒漿之薦其詞曰常山鬱兮蒼蒼陳堂堂兮公則亡趙之封兮四開風雲慘兮漢故臺望公不來兮莫知我哀公精英兮弗昧山川開闔兮不隨以晦公不忘兮德在民思之在心兮其存則目存之目兮思則固廟而貌之兮其以故招公來格兮歆嚴禋颯冷飊兮雲旗紛憺光靈兮愈於生存福我兮孔那驅癘疫兮辟妖訛風時雨若兮歲時和民報祀兮心乎靡他坎坎擊鼓兮舞傞傞饗有肴蒸兮登有歌麗碑峨嵯兮永言不磨大元故懷逺大將軍萬户唐公死事碑銘并序天下有酗戰之士拳勇絶人捐軀徇國雖一時之短其義烈言言超千人而挺生奮百世而獨存者誰乎南陽唐公其人也公諱琮世居內鄉縣淅川之白亭伯祖諱臯金季以鄉豪署峽口鎮將父諱慶仕亡宋用邉功起身自保義郎京西副將纍遷至左領軍上將軍諸軍統制歸附皇元後終江淮軍民安撫使唯襄鄧自昔為用武地唐氏世鍾材武繼領韜鈐剛毅奮發馳聲疆埸稱山南名將家公軀幹魁傑而善於騎射黝色鷹視氣吐鍾鈜然擐帶橫槊出入行陳間人愕而聳之至元十三年襲父爵授武略將軍管軍把明年丁丑轉武德復安撫使仍佩金符十六年以勞績進階宣武授金虎符管軍總管十八年升懷逺大將軍萬夫長二十年改授唐州軍府萬户二十五年移鎮泉道屯駐㫪陵時安南保蕞爾域負固不庭聖上赫怒詔諸道兵以討之公到鎮甫二旬而檄至即閲數軍實申嚴節制明日大宴郡僚敘别或以期逺緩發為言公曰不可征討國家重事忠勤臣子大節况吾家三丗迭將逮不肖之身分符顓閫備具爪牙恩寵深厚思畢力邊陲以暢天子威命則死之日猶生之年也尚敢以顧忌為計哉詰旦啓行旗斾精明鼓角清亮識者壯之遂會諸將屯靖海境溪嶺湍嶮艱於馳逐北兵不習地里與鱗介爭利於舟楫叢薄間已非所長加以瘴癘流毒海飈騰炎吏士觸冒疾疫者過半躬自撫視左饘右劑恩義備至若父兄之於子弟致人人感激思奮島夷幸我師不利乘便突出逞獰肆凶次年己丑三月大戰于􅐭埸之三江口公率衆先入所嚮披靡賊兵衆開而復合者數四致麾下散失公力戰手剚數十人以沒得年四十有九訃聞部曲至刲股肉致祭朝廷為嗟惜之公天資雄峻沉鷙有將略號令精明拊循有素期於恩威兼濟當戰陳際奪勇愾敵不自顧藉有古烈士風概故所向克捷自筮仕不十年正位帥閫平居與人交氣怡辝溫謙恭惟謹未嘗以色待物人視之儒素也其死生義利胸中權衡素定決非奮不慮死徼取美名者嗚呼忠義天下之大間志士仁人終始一致雖頺嵩岱不吾壓也豈以暫不幸而墮吾名節哉王者推而褒之所以砥礪多士窒不軌也故周崇死政漢寵死事然皆有等級次序俱未若皇元即以父祖之爵祿卑其子孫有崇無降其報恤激勸之典視前代為重公可謂得死所矣夫人李氏亦內鄉大家資度純懿克嫓公德孝以奉舅姑慈以鞠幼稚生三子一女孟曰丗忠仲曰丗英季曰和尚孫二長靈童次保保丗忠子也丗忠嗣奉丗爵往奠舊服追忠思孝罔替箕裘奉公衣冠葬襄陽榖城縣鳯溪鄉丙山先塋之次起祠墓前歲時享獻庸展哀慰復念非假辝紀績曷以垂鴻無窮儻得書太史氏則先業為不朽矣遂介祕書監丞申敬載拜來請某以忠君孝親係風化所在有不獲辝者輒論列而係之以銘其辝曰武當西來萬馬驤漢水東注為滄浪鳯溪之里榖伯邦盤盤沃野開荆襄丙山衣冠唐所藏維兹唐侯百夫防佩服義烈南方強三丗崛起參戎行幢牙茸纛金節煌王常鐵石我所將維南有交伐用張一軍來戍心靡遑萬甲夜卷趍敵埸桓桓不憚天戈攘誓此一去批其亢㫪陵宴訣何琅琅山溪失勢臣分當鮫鱷肆毒紛蜂螳落落銅柱鷹孤揚海霧翻瘴霾三江奄奄戰鼓聲則鏜一僨不救千夫僵蛟匣零亂劒有光臣維有霣甘自戕一日之短百丗長恨以鱗介易我裳義存義亡臣節昌勝負况復兵家常恤典昭報恩澤􅗈嗣侯孝思示不忘葬而從祖饗有堂巫陽下招為悲傷羈棲胡為滯此荒魂兮歸來安故鄉牲牷肥腯羅酒漿部曲儼侍備兩廂鼖鼓鐃鐸聲鏗鏘子孫歲時供蒸嘗銀鉤翠琰勒我章忠傳孝繼渢大泱陵遷谷變事叵量英聲載丗永不亡順德路同知寶坻董氏先德碑銘有序至元十七年奉議大夫盧越􅐭使司提舉董侯孝良以規辦功最升授朝列大夫同知順德路總管府事自惟材踈能譾何以臻此兹蓋祖禰積德絫行􅉼濡慶澤所從徠逺矣惟是斫銘樂石光賁松梓庶克自信遹追仰報罔極乃介府幕陳從慶贄禮幣百拜以先塋碑為請某承乏燕南以明新是任惟孝與義為丗大經今猥來屬筆有不當辝者謹按所具事狀董氏世居燕之武清縣南仁佛里金大定十二年改新倉鎮作縣故今為寶坻人曽祖以農為業代逺偶逸名諱生三子曰永進曰仲仁曰蘃昆仲既蕃孝愛日篤以資雄一鄉永進娶彭氏女實生寶溢府君諱柔蓋侯之皇考也府君行孝廉善居室一介不妄取與諸人里中以善人稱之二親嘗卧疾治療罔效府君曰嘗聞人之肌肉可愈困瘵於是默刲股肉雜它進之服之果良愈既而父目病幾於凝盲府君又以舌日舐其睛無幾頓還舊觀邑里稱嘆以為孝感所致云嘗以事之保暮行通衢間蹴得白金一巨餅幣百餘緡詰旦持坐獲所候求訪者失主至物色不妄即付之至於牟子錢貧不克償者率折其劵貸自是孝廉之名軒著燕保間當途者聞之以謂不茍於得可以臨財厲俗用薦檄充保定務啇權次寶溢堝監支納益用心稱物極平施之方公私俱有賴焉至元十三年以疾考終牖下享年七十有八董氏其三代皆竁寶坻故塋至公始徙家武清之大定沽遂改卜聚落之南原是為武清新阡孺人蘇氏信都大家事舅姑主內務以孝婉聞生子男三人孝義孝溫孝良太君資藉訓迪納規矩中者居多故母儀婦道宗族取法焉今年九十有四起居飲啖精健如五六十人孝義有融德不樂仕宦二子長曰順管勾鹽埸事次愛孫孝溫醇謹有幹局充鹽使司判官三子和張驢昌孫和任監當官和之子八十買住孝良孝友純至幼習司空城旦書及長兼通國朝語嘗給事貴近以材果管勾三汊沽鹽官事至元十年秋大霖三汊𬒳浸亭户例狼藉阻飢侯致恤申明上官發廪米四千餘石侯乃計口均給民免菜色水退侯􅖴度原隰終復為患議户抽一推起土璋埸請於上允焉明年水果至無所虞矣以能升本埸鹽司大使仍佩金符以寵異之先是歷年牢盆錢不計成鹽多寡即驗丁全給致本耗而課不充後復給與不時課不辦而卒日困侯白所司革焉遂驗亭户煎數在官仍半給之復需其畢運為足其所當付至曩之倚而未頒者仍皆為卑之至今遵行官卒兩稱其便十三年亭户乏哺無可於糴侯以鬻造孔棘恐軼歲辦出私廪二百餘石稟食之未嘗更其費十四年用薦欽授宣命官奉訓大夫尋升奉議兼提舉蘆越鹽司事十七年以均斡有方程辦饒羡積前後勞遷授今職侯以民社重寄非財賦可擬宣力有加焉子三人長曰革中書省宣使次安住次海山鐡奇𥘉寶溢府君刲股肉以致親和厥後府君洎太夫人蘇氏在疢子孝溫及侯與室劉氏亦踵而行之由是鄉里論篤孝者以董氏為稱首嗚呼孝者人子至行揚名顯親之大致也然代以孝名者非一若休徴之剖氷求鯉孟宗之泣林取筍李建進藥而病即瘳盛彥慟哭而明復故今董氏之刻肌而愈親疾可謂情迫孝至殊途而同歸者也詩曰孝子不匱永錫尓類其是之謂歟至慶流㣧裔移理於官冝矣後之來者復能致竭兩間以極忠厚孝廉之美將見董氏福祿淵流而未央也是冝銘銘曰暨暨董氏起家幽墟繄曽祖君是生三珠孝廉溫潔王瑩不俞我屋豐潤尓焉德劬維寶溢君乃皇厥圖一廉厲俗致身仕途我幹我均我摧我酤人勉不足我恢有餘夫孝何居曰父母且病則致憂巳何暇虞越惟親安其樂愈愈要以情至同歸途殊錫我胤類德冝不孤篤生賢孝髙大門閭連城具贍有儼倅車顯親揚名實由懿模遹追圗報於焉是需岌峙豐碑螭首龜趺丐我銘章大書特書幽陵蒼蒼渾流徐徐照映鄉梓永示德隅故提刑按察簽事劉公墓碑銘并序奉議大夫提刑按察簽事劉公既窆之明歲其子戚然以追逺之志來諗曰孤不失先君勤黽王事期顯歷半道傾摧俾任重致逺之舉罔克攸盡在慕終養之榮曽弗少及不孝之大無足言者維是刻銘麗石表見墓道庶不朽而為新壠光幸憲使憫焉某惟曩嘗與公翶翔中書有聯事之雅以分以義有不敢為亡友靳者謹按事狀公諱濟字巨川其先真定行唐人丗在野大父某倜儻尚氣為鄉曲所重考信方直有父風以植産致冨心存樂施貞祐兵避地陳頴間散財濟衆人多傾赴正大末所在遊騎充兵令民團結相保衆推公充鄉義兵都統巳而殁于事公信之冡嗣也自捴角姿嚴恪不知為兒嬉及長明吏事時趙人董珍者來領魏郡材公為郎署府從事民政軍務多所禆益中統建號省府立擢賢舉能以恢廓宏綱為亟路辟公應選遂輔省左曹掾四年間精核吏務氣明而事辦然所期攸邈有不屑為者尋除二上都糧料使會當估平致太庾京積巳而充中書磨勘官真定郭文進者托白肖二人毒殺其父歲久莫決府以疑獄聞命公往讞既至按覆簿牘推察物情不終日而虛實兩判鎮人稱其明朝官嘉之至元七年勑授承直郎太原路總管府判官公不卑小官思以行志惠吾民為念府東有山曰罕山每溝澮秋泛害及關坊公乃度原隰相水衝以事冝從上官議可焉衆欣就役自山南扺汾壖鑿渠余十里以釃水勢自是漂沒患絶且溉傍田數百頃其興利除害類如是明年夏六月大旱步禱列石龍祠應焉秋賴以熟九年升授奉訓大夫知獻州事既下車囚繫填狴犴間公歎曰盡心之戒當於焉是圗遂裁遣剖折凡五日牢户為一空然後束吏以法拊民以寬慮科調之不均也為等苐之恐田疇之未治也為勸劭之新州治以具視瞻崇儒學以敦教本內外釐補井井有條其孝悌任恤之化風偃海濵矣迄今民思不忘秩滿憲司廉其能遷奉議大夫簽書燕南河北道提刑按察司事十六年四月竟以勤事致疾既乃終于位享年六十有四夫人程氏魏大家配公德良稱前四年卒即其歲九月草九日祔大名賢由盆里繁水之隂宅新兆也二子圭玘今圭亦官直郎大名路總管府判官性純孝從政幹果玘歷𬋩庫甚願女三人伯適趙郡武氏仲從鄒氏季徐氏公資明辨遇事風生不肯陸陸一事落人後故所至卒有聲其孝義出天性固然𥘉調并梁兵西援􅓃䏰事集悵望南雲泫焉興感曰母氏殯陳四十年不即卒大事儻溘先朝露目其能瞑耶乃於介使告其所以然諾焉馳至陳求訪叢垠間罔知誰何因籲天行泣俄得劉叟者示其處下插驗所志物是夕寤寐中有以呵之者曰汝母何疑當收之速去即是年冬十月歸葬行唐縣甘泉鄊七里烽之先塋禮也傳稱古人行役云逺必思念其親以篤孝飬若公斯舉何思遑將其母哉又鄉豪董君死葬癭陶碑石卧荒壠間身後貧不克􅥵樹公按部過趙為求銘表墓以報知已其風義肖上丗又如此是冝銘銘曰古評吏治匪循即能循傳而列能或槩稱時有緩急事方責成珮玉長𥚑艱於奉承維材應變其任乃勝用或異冝跌焉不興暨暨劉公才長氣弘小試遊刃鋭於發硎擢列郎曹風生臺閣若不屑為翩翩荷槖一麾出守殆古能吏錯節蟠根别夫利器苟利吾氓身弗遑睨于今兩州懷思無斁維孝與義為丗儀軌子箕而裘已濟厥美歸息泉扃神亦寧止五鹿之野由盆之里沙麓茫茫繁流瀰瀰谷變陵遷墓碑有嵬大都通州郭氏遷塋碑銘并序孝子之愛其親也心無乎不至其始也盡􅌚心以致其樂儋髙爵以顯其宗又以安冨尊榮歆其親以愜其志望及其終也擇善地敞真宅樹豐碑彰遺媺别為再祖俾饗大宗不遷之祀越是心以為恔者於尚書郭君見其純旦至焉郭氏丗為通州潞縣人曽祖府君諱伯昌尚義有應劇才金季以勞授州之判官方四郊多壘仍歲飢荒賴公力全活者衆民刻惠里廟至今其石宛在金制官分嚴不敢絲髮侵上承下辦惠鮮保障能尓其為人可知巳大父諱和字和之資持重擇交而遊經紀逺識殊與父肖貞祐𥘉燕不能國遂避地徙河南公奉從母楊挈弟姪至復還鄉梓往返數千里間冒涉艱梗舉宗全慶竟不失舊物是亦人所難能郭氏之有今日其祥實開於此公少樂讀書長以吏業著稱且玄之與潞在昔為轉漕淵會見聞習熟故公於綱計為詳壬辰歲詔立漕司於燕明年癸巳中書粘合公辟公為經歷官舊條新制兼舉而行居無幾何民力大紓而廩儲崇積會計出納允當詳明官無私焉至今論漕運者皆以公為稱首國朝丁未公春秋五十有九卒官下祖妣孫氏出庶之清門內助成家與公合德後公草一年乙亥歲壽八十終生二子長諱天圭字君寶次天瑞晦德不仕棣華輝映樂怡怡也鄉里以善人歸之長即尚書君考秉德清慎直諒多聞以世美繼為漕幕從事為人樂易輕財好施雖指囷解驂未嘗見難色樂從賢士夫遊延致禮待惟恐不盡又通五行書叩之者推明倚伏率以戒辝為言斯亦知命君子者歟惜乎年不滿德仕未盡用至元改號夏四月草四日以疾卒壽止四十有七子秀生才十四歲矣夫人張氏燕之名家性貞靜壼儀有光漕司府君既殁夫人持內事甚嚴家道昌冝內外宗屬入門升堂不覺其母子之互為資也享年七十有四終所居正寢實至元草九年壬辰秋八月八日也秀字秀實姿善淑少以孝聞交於友以誠移於官則理儀觀魁偉臨事明敏有盻藉甫冠由總制院都事遷經歷官繼改都省左司貟外郎尋就升郎中已而授少中大夫禮部尚書今簽宣政院事君自惟起身刀筆不十年致位通顯德薄才菲將何以臻此兹非先丗積善參慶光潛不耀一旦叢於不肖身者如此是用祗懼昊蒼罔極報德何從顧惟長城先壠歷年藐斧封馬鬛傍無所取穴故祖考叔父而下三柩皆未克大葬言念奭傷􅉭刺負背乃改卜宛平縣張華里之北原墨食吉用三十年春二月壬寅以三品儀物封而樹之庶幾無乎不在之心少有遂焉既襄事百拜以墓碑來請幸內翰惠顧三讓求益懇豫以孝子順孫顯揚慎追之義關人倫風教者為最謹按善狀諾而銘諸銘曰慶由善先順為福原惟積也厚其流則淵譬彼播植用其道而分所冝其根苗華實有不期然而然猗歟郭氏宗族嬋嫣繄長城之故壠不知其幾丗幾年堂封纍纍拱木蒼煙逼道塗而且隘無可穴而理必遷張華西里其平宛宛風水攸寧欎焉新阡哀哀送終棺衾華鮮祭以大夫有加鼎籩祔安神靈既厚且堅庶窀穸之下慰將寸心之少安孰無子孫焜耀聯翩念得之而能竭力讓春官之孝賢刻吾銘而表神道永以為郭氏無窮之傳大元故中順大夫徽州路總管兼管內勸農事王公神道碑銘并序上登極之二載詔以前泉州路總管中順王公作尹於徽制下而公已卒士論慨嘆惜其備具文武才未究於用也明年春正月嗣子謙持太史屬王德淵所撰善狀百拜來請銘自惟識公始用情交終以義合至元庚寅歲邂逅於歐閩後二年豫入翰林公亦終更來燕玉堂多暇日夕從遊詡詡相得校夫三十年間會晤雖數在京師為最洽公今已矣銘其墓冝莫豫若公諱道字之問姓王氏其先為京兆終南縣人丗將家公姿魁偉勇而多力幼讀儒書長喜武事飛箋走檄尤翩翩也公既負器局挾藝能不肯碌碌居人後間出大言捭闔時事及作為歌詩藻思甚壯激昻頓挫以驚動一丗謂將相無種功名可戾契致也然干時貴近終無所合至元更化以剔民蠧清吏弊為亟公曰兹吾之時也乃走燕上書請置執法官如是則吏畏政肅澤𬒳於下政化可得而成六年憲臺肇建遂辟充椽史公志在澄清一旦抱牘齷齪鳬進論得失於簿領間耻於屑為才數月即拂衣而去適朝家遴選文學士充東宫講書官用昭文竇公薦得入侍經筵進讀際辝理敷暢間以時務意在互有發明由是稔知為竒士進見顧眄與餘人異欲大用而有需也十三年江左平福建內附蠻夷悍輕易怨以變蛇豕婪婪血人于牙何所靳顧非大行臺填之不足以制內而撫外也故郎署官重其人方𥙿宗皇帝參聽朝政乃選公充福建行省左右司郎中時柄用者專尚威猛不能導揚恩信慰安逺人凡事之悖理政之害民及私意之所宿者公皆執而不行至面折力諍必理得事正而後已如宦族趙知府元輩六十三家間居室潤誣與山賊通擬挺殺之意在籍沒掩利餘資公抗言宋故官纍詔恩恤今以昧曖一槩奴戮有傷朝廷好生之德止杖八人餘悉縱遣降將吊眼陳據漳州叛賊勢張甚招討潘力不支踰城走泉行省以失守罪縳出將戮焉公曰招討秩三品有罪當稟於朝不可擅殺上官奴遣督將二人率甲士環公曰字不同署罪當相及公乃具朝服望闕再拜曰省官不有朝廷脅我以兵欲將何為吾寧與潘同死字不可得也彼莫能屈潘竟減死論其守正不屈類如此由是強橫氣禠善良攸賴閭閻間至畫公像事之草四年授中順大夫泉州路總管兼府尹泉據南海津會豪儈吏啇假權貴聲勢日凌轢請索紊大府紀綱牟取衆利公折以理拒以威輒落其機牙束手噤語而去公堂為肅然先時晉江之安溪土賊張大老方德龍嘯聚畬洞無賴二萬餘人時出搶略為一方大患者幾三十年聞公至私相約束曰王老子來當謹避之勿輕出公為布耳目設方略不月踰生擒賊酋草三人悉榜殺泉市餘衆駥散百姓為之歌曰藥不瞑眩而疾祛非良醫而誰乎兵不血刃而賊除非智士而誰乎其為輿情感恱可知矣在任凡四載代歸鄉里以營治先塋樹植碑表為務屢供具召親友燕衎為樂若日不足者家人亦訝其遽如許也元貞二年春二月十有二日以疾終私居正寢享年七十葬維州北海縣樂泉里金山原公強矯有守臨事敢言膽氣噴薄無所回撓志在開布公誠砥礪名莭表表有見於丗孰謂勢利可得而奪邪至於擲姦發伏不避持難又似夫漢王尊之在東郡虞詡之治朝歌也奮身布衣起家至二千石剛直之氣至老不衰其功業止斯而已此士論所痛惜也逺祖金𥘉以武功賜完顔氏丗襲千户官至金吾衛上將軍曽祖諱虞鄉大父諱從正歷隰州太守父諱成皆嗣承丗爵金亡復故姓仕國朝任樂安縣令因家焉今為廣固人公先娶孫氏生子謙夫人年草八卒繼室羅氏亦先公卒生二子曰諒曰惠謙幼侍東宫才敏有時譽能政克家蔚有父風今官奉訓大夫大司農少卿男孫四人謙之子三曰元孫仲孫季孫諒之子一曰彥孫公平生著述號雲門老人集殆千餘篇傳于家銘曰繄王使君起海堧妙齡飛英振孤騫陳琳書檄何翩翩一箭擬下聊城堅心惟嫉惡民瘼蠲驅逐鳥雀同鷹鸇一行作吏非所便褰帷有志澄八埏封書直上沃帝淵太微執法光炯然春宫嚮學開經筵一日登對席為前顧公可試冝擢遷利器當遇蟠根宣歐閩行臺兩廣連陽舒隂慘持化權幕非其人奚望旃六十三家宋故官執之犴死何繁冤公為辨析皆平反潘惟不支心則丹以死信理人所難維閩之南天府泉卑公撫循面則顓鋤剃強梗安惸鰥風帆踔敕教反敕角反海魚龍翻萬貨山積來諸番晉江控扼實要關勢取豪索非一端不動聲氣為周旋安溪有盜勢結盤撞搪呼號動百千公然剽竊三十年為一郡患何迍邅公來約束毋妄干老熊當道百獸跧一旦解刀耕壠間溪山淡淡風日間帥得其人人自安如君兩除稱衡銓幕府坐嘯鳴化絃簡節疏目政猛寬四載終更公孰賢王尊虞詡相後先千年神劒埋山原欎欎夜氣生紫煙何以驗之石有鐫秋澗先生大全文集卷第五十五
