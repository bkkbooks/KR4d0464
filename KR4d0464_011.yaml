front:
  text: 秋澗先生大全文集卷第十一七言古詩
  hash: sha256:75f66fa9bc131e30c789b8857ca162d8096ae9b67b68f546b57f2694ac8926f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0464_SBCK_011-1a}
body:
  text: 題耆英圖奉呈子𥘉中丞張生好竒兼尚友古畫古書長在手欣然示我洛英圖便覺奎光生户牖衣冠磊落十三人閑著一枰談治否堂堂文冨兩具瞻天下倚安貞大叟平頭七十是㝷常獨有端明未期夀方辭晚進不敢班列宿光中巳瞻斗北門昜慮望佳招王拱辰字君貺千里馳書恨官守升平盛事那得再夢寐席間把巵酒吾儕起敬當如何再拜乞靈三叩首君不見西周文物稱全盛除却邑姜纔得九神崧間氣萃此多周鳳魯麟紛在藪鄭郎繪事固入神自是德星傳不朽我思仁祖慶曆中慶曆政有三代風斯民皡皡樂其樂六合一氣開時雍扶持位育㧾是諸賢功熈寕天子錯料事以忠爲邪邪作忠放教公等在散地擢置安石司群工惠卿継用二惇起當時何止驚三空嗚呼以人爲鑑古所取安得獻此與論治道之汚隆願君深藏勿輕出世代雖逺多青蟲紫芝歌継胡紫山集瑞堂詩韻巳丑秋八月有紫芝産陶户朱良舍下凢五六本此最異者陶坑削崖蝸作室和氣所鍾無不集非縁石潤木之精平地抽英昭茂徳蓬牎一夕爛生光紫蓋彤枝照鄉國氤氲五彩畫不如駢秀連莖瑩於漆考祥吻合農帝經表瑞無慚桞州筆老翁百歲見未魯醉將蒼髯如㦸郡人爭欲飲至和奔走來觀恐無及出門秋望稼連雲汝芝汝芝安所吉圯上行邳州道中作十一月初四午刻書於宿迁馬驛楚兵東來殺爲嬉烈火西捲如飊馳爲藂驅爵恐過慘天賜漢以興王師憶𥘉搥秦天下震盛氣不折将徒爲泥中進履屈亦至不爾安制重瞳兒徃年親祀濟北石此日還賦圯橋詩神龍變化不復見仿像鬼物來隂機素書三卷不必怪要本老氏持其雌持守其雌也題長江萬里圖後穉年屋居三十春老境誰遣東南奔去秋有詔使持節北自邶衛官甌閩閩中水淺百味澹但覺草木多精神展放江山萬里圖卷中瀟洒似堪娱寄聲故國游觀客卜築蘇門儘可居畫乃劉合秀家藏所恨歸峽不出一手耳問呉臺辭呉王宫殿㝷無跡只見山蒼湖水碧歩上髙臺散客愁十月江南看春色晚風吹雨濕闌干簷花泫露宫娃泣欲摭愁煙問故臺愁煙無語空蕭瑟是邪非邪不必辨且爲興亡求亂隙夜半娃宮作戰場緫罪君王以色荒春秋責備大法在不道延陵退耕呉巳亡聖賢處變貴逹節審勢不得同曹臧當年㤗伯終三讓明見丕承有聖昌南臺懐古封君姒遥裔重光麗無諸憶提越甲佐天討翦嬴摧項開雄圖保邦事大霈厖澤至今國俗猶薫濡石樽劒沼两寂寞山川良是先王都越人感徳知所尊蕭皷猶陳漢薦殷潮去潮來朝又慕花謝花開秋復春千年事徃遺烈在草木澟􅏮來威神廟中筠簽萬有卜陳説禍福稱靈珍我因拜禱問來事繇辝灑灑何其真殊方逺䆠乃氣數品秩雖到多邅迍正湏耐辱安所遇不乆㧞出東南閩生平行巳半流坎雖老而夀猶朝紳鞠躬黙謝神貺厚得遂歸隠餘何云我来正值群祀日伎樂朝獻爭趍奔越巫紛拜靈欲駕泠風滿斾翻凝雲囬首笧臺祠下路蕭蕭寒雨濕蒼麟今廟基即漢髙帝封笧臺也游九仙閣三郎百戰開閩國鏻搶基圖專詐力二嬖恩光象服尊九龍帳設香雲濕朝參寳皇宫暮禮妖師席國事一從神所質九仙結搆豈此時萬瓦鱗鱗跨空碧閣中景氣四時新徃事如雲散無跡我來登陟縱遐觀一榻清風抵萬錢暫與塵襟豁煩滯横欄直下看三山雜言寄中隱信宣慰時在泉州近辱書過蒙逺問倥􅘓間不時奉荅獲罪多矣人行謹以雜言爲報奉别後一粲蹇予元年東魯客𥘉識君侯髮如􅃮平生髙氣樂新知一笑論交真莫逆凉風八月中秋節月滿金樽惜輕别邂逅溪堂又五年情好比前尤欵洽髙堂轟飲幾連明四座歡呼倒冠憤當時樽前闘年少豪邁不知家立璧興來爲我掃雲煙思入天機妙無迹我識君侯此餘事落筆縱橫見竒䇿自是暌違三十秋只今同客嶺南州天涯牢落儘愁絶况復两翁俱白頭書来慰我見安好細字滿𥿄紛銀鈎故園風物信如舊桞子𥘉豈爲山囚春雲夢濕蘭苕翠壯觀雄翻海岳樓近從潭府閱家數筆力已復追營丘煩君吮墨留餘溢重爲靈均作逺遊中隱乃雲甫道號近於魏參政處看雲甫山水畫故云近從潭府閲家數李夫人畫蘭歌為郎中孫榮甫賦清閟堂深不知暑瑶草佳期夢玄圃孫郎笑折紫蘭來素影盈盈映脩渚李夫人澹丰容天然與蘭相始終剡藤一筆作九畹落墨不臧江南工芳姿元與凢卉異曄曄况是湘纍藂離騷不復作遺恨千古沉幽宫君看此花有深意似冩靈均幽思悲回風君家大雅堂文采東野翁併入慘澹經營中秋風拂簾秋日長芳霏霏兮汜崇光澹粧相對有餘韻盡欄桂子空秋香淡軒託物明孤潔五十年來抱霜節固知色相皆空寂妙得於心聊自適仿像湘娥倚暮花黄陵廟前江水碧生平佩服真賞音升聞紫庭非素心喚起謪仙摇醉筆爲翻新曲㵼瑶琴曲一作操古夫人名至規號澹軒亡宋狀元黄朴之女長適尚書李珏子早寡今年七十有二善畫蘭撫琴近爲郎中孫榮父作九畹圖若與蘭爲知聞也且自叙其後云予家雙并公以蘭北君子父東野翁甚愛之予亦愛之毎女紅之暇甞冩其真聊以備閨房之玩𥘉非以此而求聞於人也郎中以蘭省之彦一日來徴予筆遂誦點汚亦何忍但覺難爲辞之詩以應之孫求歌詩於予因樂爲賦此者正取其節而不以其藝故也秋七月𥘉吉秋磵老人題雜言庾寅七月二日病告中作我今行年六十五得至緃心能幾許憂愁風雨每大半念至於斯足悲楚縱令得邁七十壽比老於心當恱豫不然終日疫事役殁而後已真愚魯君不見人間聲利藏禍機迷着世人曽不知得之志揚失之沮一死與愽争奔馳又不見朝花纔荣暮雨惡火竈方熾寒灰隨攀援髙貴鄙卑賤得勢未必皆便冝至人大觀出世表肯爲造物相調戯豁逹一篇荘叟論太山毫末較来齊福唐中秋對月醻劉端友見贈之什少年愛月長苦吟賞玩不知清夜深擬揮玉斧手盡掃丹桂隂髙歌起舞弄清影直入月脇穿天心節序依然人耄矣所事感懐無可喜少陵有淚濕金波歎息無家清夜羙當時流落止鄜州况在甌閩數千里此夕常娥海上來謂三山距海九十里冰輪蹴踏驚四開牀頭有酒不復飲追憶少壮令人哀老人病骨防風露静卧空齋深閉户却從虚幌看清光四壁秋蟲饒夜語題釣臺并序至元二十六年巳丑歲冬仲九日予自桐廬舎鞍鼔柚取道嚴瀬旣午艤舟祠下登拜遺像肅如也歷觀古今題記多論其形迹未有明先生之心者天下有二道出與處而巳先生之起義明君臣順乎天也浩然長歸氣信名節遂其志也夫三公坐而論思明是理而表萬方者也是則佐理之功多矣尚何爲因留詩招隱柱間入客星閣眺羊裘軒降觀釣臺書院山光叢簇江流有聲若有以回俗駕而謝逋客也江行有程促之而去囬望雙臺顔厚有杻少中大夫福建閩海道提刑按察使汲郡王某歛祍書劉郎少年同几席綉𥚑朱衣稱謹勑六龍一曰飛上天豈爲故人談徃昔原陵欲臣意有在大隠何心學夷隘當時雖落物色中肯以三公易其介先生豈是煙波徒奕奕星芒動帝車一言稍峻得狂鄙况復好爵縻其軀君臣大義巳明了助順又見懐仁書君房𥘉不識微意尚欲求益何其迁一竿雖老桐江月儘着清風厲薄夫洛中吟有序近讀邵氏所書洛中雜事撫卷三歎令人有不能巳者嗚呼五代間亂離相継其否極矣生逢兹辰一何幸哉故孫樵有生恨不得爲太平人良有以也因効康節謝温公買園詩格綴集所見賦洛中吟一篇其辭曰萬方文物洽堯雍若論聲明極洛中地自水南連洛北治從真廟到神宗揔將六合清明氣散作三川禮譲風道綂有傳程邵在勲名無比冨文崇棚車載酒都人賞名教傳家習俗同花木四時春不老耕桑彌野歲長豐三千歩幛家雖侈十二行窩樂最融春酒泛香沽翠幙夜花和露買筠籠小車髙閣期真侣魏紫姚黄擅化工爱育揔歸君父聖論思不出廟堂公􅍮舒變法無朞月社稷垂亡到一空讀罷適然清興逺一簾花影曉光紅一作讀罷然還復感斯民何幸此何窮竹鹿辭并引竹鹿出南海不合刺國赤毳雪文狀若龜背然頂有䨥茸葳蕤如珊瑚巨枝元廿七年秋八月上進過福唐予之昔梁孝王逰兎園宴忘憂館命賦苑中諸物文鹿其一也今以賦攷之正此鹿也因作竹鹿辭竹鹿亦瑞獸頂有珊瑚茸素綦爲紋負湘極騰仙蹤颶風吹堕海洋國馹騎逺獻玉樹青葱瓏攸伏曰與群甡從一則道通君不見漢武獲異獸非闢西南封迢迢兹鹿來漢道相比隆東南際海國萬數將見珠香犀象等物相率皆來同游金山寺寺名龍游舊名浮王庚寅嵗十一月二日來游二十八韻我登金山江似練金山突兀神鰲抃樓閤參差四五層覆壓崖巔瞰江靣璧間不見老坡詩空歷長廊瞻湧殿江山形勢互爲勝直上金鰲窮偉觀裴徊乆眺吞海亭海門两點煙螺澱舟中望處不争多大抵蒼茫煙一片平生歌詠古人詩此日一樽償宿願攛牌纔過璞墓西水作磴痕風四轉放舡北渡返東行一傑中流去如箭瓜洲西北堕杳靄照眼鶴崖迫焦巘獨遊髣髴蘇二興冐嶮比方章子愞夕陽西下煙四起欲進何之退無畔倒装漁艇入荒村百計無由登北岸拖師失色都舡驚暗觸江神豈予譴我為使者𥘉不然先盡人為論事變力微艦巨酒半酣正坐忽焉遺此患金山雖竒極淵險沃老登危非所便書生氣習不一到慊慊此心辜所恋量非謝傅與婁相驚定老懷彌懔戰艱関投宿野人廬因賦此詩為永嘆至元庚寅冬予自福建北歸渡江作此詩未嘗示人逮大德巳亥十年矣衛輝判官井君德常陞倅鎮江來别因話及焉井索書此詩云歸刻寺璧以増江山勝㮣予謝不敢當然俾讀者為遨遊之戒云汲郡王某題時年巳七十三矣鬼車行辛卯歲五山廿二日誅於鄂州教陽十五日作鬼車一身編九頭黑夜來過聲啾啾半空瀝血洒人屋所遭之家無空休窮兇極惡煽威虐妖孽幾遍江南州内姧黨蔽事莫發百計捕逐無縁由聖皇明見萬里外一網掩來同治罪憶𥘉百鬼擁行車此日行車載孤鬼琅璫繫頸纒車軸涕淚淋淋不時哭死聲宛轉尚嘔啞晝夜催行不停轂路人借問欲何之詔赴行臺加顕戮揮刀臠食快衆心奔鯨四沛無遺育萬里歡聲動大江百城歌舞喧華屋我思善惡人自取禍福不應深倚伏寸心少慊獲隂譴天網天刑敢輕觸爲誡兇人不足心鬼車扳例猶檮杌流民嘆六月七日有丐者過門聞其説因録而作此我家本燕雲未省離鄉國前年一霜秋稼空望入田間禾穂黒忍飢猶待下年収一澇髙原水三尺人生重遷乃本心一餒催人忘南北水採無菱芡山收闕橡栗雖云生處樂乏物得生活扶携逺趂河南豐道路無資日行乞毳衣穿結杖蒿藜氣力凌兢雙脛赤我聞尭水與湯旱民免流移少捐瘠不出九年耕長有三嵗食朝家勸課儘憂勞只爲有名多少實常平嚮爲前省壞義廪近年無廣積江南最苦過都錢更著營司日搔屑營司巳罷民力蘇大府兼農到徒設捄荒發廪最上䇿近井乃能療近渴君門萬里安得知作詩代洒流民血南樓行送信御史佐鄂岳行院武昌南樓跨空碧滿目江山猶徃昔笑抛霜簡佐行樞去作南樓幕中客羗予㳺䆠江之南江南軍務多䟽闊􅎥差押取固多弊甚是飬威并練習十羊九牧苟非人未免因縁出枝節卒然警急幸無事若論罪功孰褒黜就中貧難㝡可憫孀婦盲翁死應絶依然名姓在軍書按籍来徴豈容説唐兵六十即放免七十一丁令侍側當時貞觀開元間三代仁風畧無别幸今守戰有專職整暇虞姦正今日兵惟禁暴本衛民不致侵漁乃良䇿蠻陬溪洞旣荒逺顛枿其間不無孽畬軍新附用得冝以彼爲攻昜摧折前年盗起江西柬千萬爲群恣衝突只縁浪戰乏緫戎空使民殘兵耗力請君詳此能一行四院規模自吾出此時乗月庾南樓談笑胡床能事畢五色鸚鵡歌滄溟浴日麗火荒飛走衣𬒳照回光隴禽鍾秀更竒絶翟翬絢煥紛天章越裳野雉太縞素上與朱鳥叅翶翔環王得之不敢受爲是珎物歸天王山川迢遞来林邑護送慇懃飼紅粒海樹雖殘舊宿枝君門萬里承恩入香鎻金籠暖御煙盡日充君眼中物一鈎紅觜儘多知两葉翠衿真聚鷸六宫共説鸚哥嬌天仗儔呼供内職且莫低回訴苦寒卿雲長捧蓬萊日福星行辛卯嵗白正月迄五月不雨是月廿一日河南雨三尺故作是詩以維焉六月五日雨大作河南雨足餘三尺河北嗷嗷千里赤河南穀麥賤於土河北齊民有飢色爽氣空吹五日凉火雲不暵三農泣天有貴神名太一前歲人傳豫州域連年大稔風雨時全是福星照臨力幸今六合入提封聖上同仁視如一又聞天下猶一身氣脉周流體能適福星福星冝憫斯少分餘溢霑河北白鹿嵬歌贈雷苦齋太行西来萬馬奔嶺嶂横截摩青雲山陽西北望鹿嵬突兀絶似東山墩孤撑直上幾千丈雲煙覆露垂天根憶𥘉夸娥檐負分太華萬古雄跨諸峰尊有懷孫公和自是物表人半嶺騰鳯吹萬壑飄游氛纒身雖有一丈髪以火保耀先吾薪甞嗟中散寡於識三載堅扣如無聞當年清嘯杳何許比日乃有由東隣苦齋老清而憞才豐識逺兼多文人見長松偃蹇卧雲壑豈知浩浩之氣藏彌綸有首不頂丞相㡌有足不踏公卿門詩来三復有餘馥如茹秋菊紉蘭蓀平生尚友抱苦節逸興特爱淵明真不居城府儘髙尚况欲卷迹同其倫白鹿嵬髙輪囷望之可仰不可親徜徉終歲竹林下囬視七子徒紛紛囬視七子徒紛紛東坡云孔子不取微生高孟子不取於陵仲子悪其不情也陶淵明欲仕則仕不以求之為嫌欲隱則隱不以去之為髙飢則扣門而乞食飽則鷄黍以迎客古令賢之貴其真也瓊華露酒歌継惠一樽故作歌以謝之時壬辰六月廿八日也酒之爲齊釀法先麹生玉粒聽其然百方百醖品各異要以色味清爲賢井君出職光禄寺容止藴藉涵清妍朝來相過憐衰翁開樽小酌何從容銀􅎆細㵼疑匪酒玉色照眼清如空停杯題品賞超絶瓊枝湛露吹天風一酌氣馥烈再酌心冲融憶𥘉蜀使分餘瀝老頰不到湖春紅爲君三嚥儘鯨吸便覺輔安五臟夷三蟲吾聞此術煮酎法連罌氣化開鴻蒙多君屢製轉精粹儀狄拊掌驚神工橘中游戯商山樂玉薤䇿勲俱妄作浩歌爲約飲中仙世間元有楊州鶴有狐篇黄蒿古城人絶迹有狐綏綏出復没近郊夷曠兀兀静獵食無求蟄無窟依憑城社歲月深群犬噤聲畏不逐或曽爲孽化而人漢有曹瞞楚奚䘏蒼形雪面妥彗尾氣出隂邪餘詭譎振毛出火噑黒夜竊食人家翻盎錡鬼行胸臆神不容彼爲一飢還尓耳况今白晝雜人居厥兆有占羣小侈郡侯執徳儘勝妖要絶其根心乃巳老姦急捕驚脱兔遺育夷滌腥穢彼狐㣲物徒妖訛朝来一掩虞人羅叔敖殺蛇韓逐鰐公等去狐誠可歌張綱埋輪非不問事有難昜先重科人靣獸心當若何罩魚歌夏五月六日作於洄溪東軒二李生用南梁劉之亨夢二李生事稻秧針如溪可揭春水桃花魚失勢野人乗捕趂農閑風暖溪深張水戯輕舠前漾撒巨網後擁罩竿遮两際大魚赤鱔如有神一夕雷風先逺逝終朝罩罩盡常材栁貫壼携不餘弃行觀窟宅幾一空河伯波神爲慘悴君不見天生萬物盈两間物物資人供所嗜用惟有節取有時食不能勝非小惠山不幽來水無阻智出犠皇結䋲罟上焉神理下物情以類以通無過舉於戯三代根此心後世胡爲弃如土東軒歸夢二李生我軰何辜遽如許風狸行後六月十五日至衛乃作是詩風狸出桂海厥狀即猨狨晝伏如蝟縮夜躍衝樊籠咄彼乳與溺愈疾收竒功或云識風候飛行半空中置之危檣顛順勢蹲西東越人豈此異逺進燕山宮不思汝悖疾持此以自攻幡然効順如狸聰交州况復七縣地枉着螳臂當車衝南風不競汝親見戈舡下海驅群龍聖皇神武包九有任土之物皆吾賨養之如春涵如海聲教所曁開唐封汝不聞蕭梁天監間林邑之范觀天風審知中天御明主一旦職貢應来同兹焉罔念徒爾耳嗚呼彼狸何所庸寰宇記梁天監中林邑主范纉觀望天風知中國有明主即奉表内附賀君玉林兄得重孫共山老仙號虚白未老而閑見髙節琅琅玉骨含滋散入雲仍衍遺澤林兄今年幾八旬飲啖行歩餘精柛阿元㳺宦巳通貴慰眼又見元之孫犀錢玉果蘭湯温洗教啼泣吾試聞充閭之氣當煴煴繞床阿堵莫輕動留待它年讀書用二俊歌并序揔管温卿蓄一鶻一犬每出獵不即則巳即則必獲其或一失願以羔見償予以二者雖自籠養指嗾中來非俊無留賞其何能爾作二俊歌以美之其詞曰温郎年少温如玉老作獵師知所蓄不劳赤羽膳千夫眼底韓盧手中鶻太行東麓雲雪崗飛鞚鳴鞘幾馳逐暮歸不省錦鞍空獵獵霜風靜三窟我觀二俊固竒毛擊取無虚指縱力數朝解鞍何所從鎻牎弄筆圍春風螺香不到眉嫵秀鶴翎細抺丹砂紅㑹當将鬚賞不凡爲君一醉琉璃鐘題任南麓畫華清宫圖後并序圗有閑閑公題詩作擘窠真書蓋與畫世爲三絶此卷𥘉主於僧遜公継爲嬀川松公所寳興定𥘉松間關兵亂中保持與歸燕都今爲子英家藏至元廿四年揚示予披玩者累日甞欲賦一詩以發偉觀竟以事未暇今林谿殁畫復在燕不知且歸何人適閲滏水集見公題詩偶書此以償宿昔𥘉弗計其不揆也廿八年冬十一月十四日秋磵老人序三郎年耄誇精徤嵗嵗華清事游宴玉蓮湯殿浴行雲傾城幾顧環兒倩一掬㳺塵散馬嵬餘波不涴香囊怨龍巖畫筆冩興亡墨花暈出真妃傳謪仙辭翰两超嫓以任公世三絶我昔西游不到秦披圖空夢山月林谿家藏十襲珎楊生巳殁歸何人護持當有松公神和東坡聚星堂雪詩韻天風一夜吹端葉清曉開門驚尺雪林林萬木凍巳僵漠漠長空來不絶南畮能滋壠麥肥東床任使琴絲折玄冥用壮見肅殺疫氣迎春盡消㓕少年雪獵狐兎羣夢寐韝鷹思一掣凍封窟宅龍挺蟄色晃書帷繒失纈中庭食飽妨散歩行櫬春泥思木屑一冬三白積餘威不比㝷常應時瞥炎凉一氣不自如苦樂人生有難説羊羔金帳暖如春布被藜床冷於鐡鷄蹠劒歌前年官閩中偶遇牛斗客醉解胯下劒壮我逺行色劒名鷄蹠來岷峨鐡花綉出雄雯多似連還断断復續蒼精含景争横羅南游萬里非浪走彈鋏豈爲無魚歌飛空欲作黄鶴舉劈浪下斬􅯀江鼉誰期两事俱大繆歸來掛壁如陶梭吾衰物壮終汝悮不見漢相劒佩紛相磨春雷奮蟄當如何春雷奮蟄當如何飛廉館瓦研歌癸巳六月六日病中作贈王冲霄洛邑西遷漢靈泣一炬南宮三月赤飛廉鎩翮化靑鳬老瓦淪胥何所得太隂凝魄祕興亡土花千年不敢蝕劉郎杳杳秋風客神鳥冥飛憶𥘉格豹章爵首尾蟠蛇建章千門風洌洌磨礱頭角入孤圜収劒松聲聽蕭瑟墨花供筆發幽光長日玉堂生五色張華博物見𥘉心笑泚玄泓爲渠説昭陵栢城𥘉覩汝十五年來莫渠别護軍紀漢明有書應劭箋形更精㓗道𥘉在邇求轉遐半世看書眼空纈冲霄持贈有深意淡僻憐予如任俠一朝入手與神㑹過户不知吾屐折嗚呼三代不復見两漢規模儘堪説寳藏冝與瓦礫殊隄備有人來揭篋昭陵栢城宋仁宗陵也在河南縣西南清霜怨贈吾省參君璋日落偶過呉郎家入門两欄姚魏花金盤洗粧都幾日巳覺鬢亂釵横斜韓卿秉燭惜佳麗便恐翠䄂倚竹空春華鶴翎紅糁玉蝶粉堕髻睡羙呉宮娃我欲問花不解語何故忽爾令人嗟東皇醉着𥘉不問青女潜妬飛銀沙花神歛𬒮避隂慘駐顔何有仙人砂京師名圃花不少今歲閑殺遊春車客懷豈獨𬒳花惱俗事擾擾驚無涯西風巷陌塵障面酒樓寂寂空簫笳我因未事得閑在虚日飲客煎溪芽天教世務不掛口遮眼幸有詩書葩時時弄筆散幽滯錢褁忘計東坡乂爲花作譜鬼衰盛自笑思澁頥空呀因聲寄謝紫山老落落髙舉凌青霞賀雨詩并序通惠河自壬辰秋開治至今年夏六月中穿土未巳時方旱暑氣極熾兵民頗困於役是月二十日有司請少間以紓民力首相主减役止留軍夫五千庭議巳下而雨作盈尺賦賀雨詩以紀其事一畒泉深龍匯碧逺引入城通太液不縁蝦口灑郊塵又匪弘農獻琛璧稻米流脂粟米白歲與飢民豐粒食靈臺靈沼湏民力併敵一劳思永逸今年旱氣罩火傘赫赫焚如驚赭赤萬人雲鍤揮汗雨薰染踰時不無疫有司陳請避炎輝役敢辝辛時少息巳聞停議出中堂未午朋隂蓊東北都城一雨幾尺餘何俟巫吁而雩盎浮􅔼天人相感本無間金鉉調元不多術誠心公道即天心元氣洪濛開太極餘粮栖畒婁滿載御廪天囷若京積夕陽澹灔斗門深一片波光連畫鷁題中山劉夀翁九十五詩卷按部過中山憶甞謁王丈眼明欣見百年人談塵詞鋒轉清亮故都喬木幾秋風精力有餘無少恙盤盤定武古戰國耆舊例多神所相于今又得劉家翁人説殆與王丈同康寕好徳九十五篤實外著心和沖世事不挂口外物不役躬軒冕真倘来眎若雲浮空子孝以志養家温樂時雍固云賦與厚亦自存養功常笑鷄窠祖雖見九世宗不食又不語夀齊彭籛安足顒何如此老人雙瞳烱如两耳聦子孫滿前樂融融歲時燕喜北潭緑常日睡起東牎紅稱觴冝有鮐詠背祝噎不用鳩爲笻行聽郷閭尊二老丹青蘭若見儀容送李蕭二君奉使安南李仲賔假部侍郎蕭假部郎中蕭隆興人以神童出身字平則安南九城海中沚墨誌彈丸良蕞尓阨吭控背相簒弑正倚大邦為表裏畏天事大自前王念彼人臣以忠止先帝包荒不遐遺南北肯分同赤子歲時宣諭極忱誠都護諸番殆三紀豈惟璽書意曲盡錦幣殊恩兼藥餌至仁臨御海波平銅皷聲沉邉四敉父恭于前子遵後臣子於焉正其理前年奉表餘翠具再嵗象奴紛異議執迷托故謂來庭彼孰能欺徒自骫先皇赫怒安逺人邊將請征思一洗秋風少約茂陵寒巳復夷迁空越鄙嗣皇龍飛擴神武盡雪前愆昭曠度两階首舞有虞千正以自新開彼路皇元一氣包六合榻外他人非所慮豈有父子一家還異趣使華重照欎林光積懼懐恩深悔悟二奉使心何誾逢時吐氣思經綸縱横正有三寸舌不在犀翠充庭珎嗣皇仁聖自天眷又非人力之所能徳澤如海涵如春彼交雖眇冝知聞眼穿一宥盻巳乆去去莫緩都亭輪継翰属詩韻昨觀諸君光和所謂眼中有鐡皆勍敵也復為滲漉以見鄙懐蹇予一生空濩落心佀虚舟藏夜壑誰教浪走半九州潦倒不容停两脚前年尺一遽呼起峻以文階深自愕投閑置散乃分冝未免老為文字縳青綾𬒳暖玉堂清鶡雀何為集阿閤太平典笧不縁麟顧我削書寕不怍滿牀堆積簡編青其奈曲江雖忠林甫惡礱硯詞并引予家藏風字歙硯石色斵手二者俱佳所患褪墨略不得色聞師道吾友有竒石善勵鈍發銳能一礱治亦太玄之一助也遂作詩以懇之其辭曰硯之同功甲與鋋試之敵埸維利堅其或不爾安用焉咄嗟此歙肌理妍和光挫銳今幾年本圖殺墨不荏入殆似两鏡光相研聞君有石善礱鈍武昌赤砥銛龍泉碧絲吐鋩瀝玄潘濡首亦快張家顛我今白髯玉堂客結習未了文房縁自憐癡絶渠復爾堆積音漬汗簡何由前儆抑正頼公和賢秦山圖時元貞元年秋九月十四日作時歲賤庚六十有九秦之爲山何峻雄西連太白東華峰特隆天府樹巨屏固蓄精祐開邰封黍離變雅西周東雲烟㓜出淆凾宮不信詩書顓法制百二山河纔兩世後来漢唐亦盛代文物雖多終覇氣千年亊徃遺迹在留與来今鍳成敗君不見烽燧臺羯皷樓祖龍墓在山東頭丹青比興雅頌作畫史固是非九流半生薄宦走踆踆每恨西遊不到秦我今年耄百事懶唯有懷古一念心猶存甞聞雪滿秦山圖天機貌畫中南真又聞髯張醉裏頭挿筆灑遍人間雪色壁西溪君范華原嗚呼二者不復作令人氣短心茫然一朝全秦大物忽當眼着我如在龍首山之顛卷舒巨軸閲幾年两都喬木今蒼烟其歸數開有先昔藏壽國今聦山二公異世俱稱賢畫兮畫兮得其傳送曹仲堅赴建寕路教武夷書院今畫圖建安林館鄒魯如攷亭文公宋世儒主盟太學持文樞六經要是平治具上際圓蓋蟠方輿正誠两字有抵力遑遑仁義真亨衢人倫大統旣攸叙不爾天理私慾同一區先生去世𥘉未逺得私淑者君其徒昨聞赤牒下建府圓冠喜動歐閩隅君今見秩八品貴官府言責一事無育材不闕學田粟挿架剰有官樓書講經㑹課有餘𥙿修巳繕性深􅉼濡今之所教教以此而彼所授授此歟仲堅世系乃華胄出入鶴蓋垂文魚箕裘幸不失素業儒林振藻今璠璵友于疇似君家樂鶚薦重看入石渠鴈門公子行鴈門山髙幾百仞風土雄尊號全晋李侯年少出紈袴裘馬輕肥冠時俊古来豪俠數幽并桞子不徒誇晋問蹇予三歲東州客塵滿青衫鬢雙白書生無䇿俾侯鯖尺蠖泥蟠甘退縮此時同君在幕中時君居史公幕下佐理邦經殊有方焉䄂手旁觀駭超越絛籠脫落不受覊意表出竒人巨測徤於義鶻快一撃霜翮挐雲鷙空百愛君肝膽向人開遇事剖析無留材世人刺梗塞靈府米事桂眼生嫌猜丈夫所貴氣爲主行義不虧誠可取區區心計簿書間束縛疇非抱官虜春光澹沲東湖亭素筝濁酒攄離情豹藏深霧出竒質未害蹉跎魯客卿我懷井谷君隂積蓋代聞涂郷五千户一語爲生存子孫衍慶冝英偉欎欎其能乆於此後也速又行省四川辟公員外郎大展其用後授順慶宣課大使甲戌嵗任成都路防城軍民揔管乙亥冬卒于成都得年四十有八白帝城髙玉壘深定秦戈甲紛西鄙民政兵機两肅然當時艶艶東西川公不少留我涕漣洗心棲寂中和篇空餘遺愛歌皐賢一别人間三十秋又從圖畫挹風流至今劒北羅江道徃徃旌髦見出逰謂見郷人王小五于羅江縣道中嘱以家事公旣没蜀人至今思之精魄爽爽如在泉石雙松圖何直長筆江煙霏霏江雨濕滿壑秋風蕩虚壁何工雖老筆有神寫出雙松䕃泉石君看磊落横澗枝黒入太隂凝積鐡它時不作澗窟虬定向風巖聞虎裂煩君十襲爲深藏隄備六丁来電掣江南道江南道翠竹晴沙靜如掃風煙終日畫圖間不覺行人暗中老笑行人自枯槁名利誰能死前了我行貪路發五更馬上吟看亂山曉聽閩猿聞越鳥㧾道先生歸去好只縁老病日相仍非爲知機辯之卑清時正有一閑髙天涯何處無芳草贈五星鄒冝齋建安山水何瓌竒冝齋氣禀冝清夷天星飛跳括萬命落筆一剖無藏機蹇予歸舟次甌寕子孺病卧咄可驚爲予刺口論灾咎火頭孛尾相纏嬰推原根植甚安固五日而後知和平疾勿藥言果徴願丐一詩爲發明我今憂國渠試聽近年越㓂何縱横朅来赤囊日三捷分崩鼠穴逃餘生此時脅從弗與殊玉石併燬真無辜腰間縱有玉真劒坐視罔救空長吁煩君拭目維南斗此去妖氣可静無湘中後怨至元十八年歲辛巳冬十月按事順德晨起燈下讀沈下賢文集偶賦此或云鄭即子春也洛橋曉月光朦朧彼姝嬌啼橋水東鄭生早發與之遇挈去媵御甘長終霧綃煙縠巳戃怳九歌招䰟皆楚風一朝謪滿與鄭訣云是蛟娣非凡庸岳陽樓髙花映紅滿筵歌舞蛟人宮海風吹散歘不見倚雲望入湘江空摩莎辭我從濃東来枯陂滿畸人駐馬驚問之云掘摩莎根摩莎一㪷舂爲塵聊沃飢火充朝餐兩屈南来至趙止彼壌可遊兹若焚東西跬歩間乾潤爾分龍公執雨機行事太不均野人前致辝荷鍤立傴僂翻淘此物又將空戀戀無他爲郷土一飢濵死不足慮大稅今秋何所取州帖猶來徵事故街東宅効樂天體嘆暴貴而戒貪得也街東宅萬瓦新晴煙披拂青𥻘𥻘滿堂歌吹樂新貴豈知賀者在室吊在門根株巳爲鬼所斧藻棟竟起髙比隣古云暴貴不祥事巢覆未省鶵能存俄聞斵棺昭隠慝應有籍入無䟽親福由積善尚恐失忍用隂遹戕其身作歌為飭附炎子未必貧賤非高人碧玉琱枕歌夀王承㫖君不見靈夀賜孔光俾之扶衰杖於朝安車起申公未免逺駕趍旌招我思碧玉琱枕貺飬老之意更比西京饒宛如大士冠馳送下九霄春氷藉紅牙當晝凝不消寵光照室幾千丈寳華璀粲翻雲蛟人間有眼未省見况用顕異張吾曹先生今年八十一視聽不减神超遥先生節操玉比德先生文章匪玉琱以言以行國所仗明堂大鼎湏時調聖皇丙夜不安寐作行尚復思群豪漆園蝶栩固不到赤舄夢與周公遨薦賢行見及遺逸粧嚴七寳先瓊瑶從此鹿菴春更好怡然髙卧養松喬淮西行送湯侯宣慰廬江郡淮西風土髙且凉桐波悠悠帶陵岡流俗勁决喜戰闘自昔尚農今重商今人逮我百餘載况復限隔為邊荒八州隷轄勢亦重慰宣正爾咨忠良君侯磊落識巳乆吐論能與時低昻上承下接不湏慮幽逖澤及先痍瘡兵令畏法民有食鎮以簡静無更張丈夫逺役存事業治公如家功可量行行斾征指淮甸弩臺曉日翻春陽憶昨傾蓋長安陌一笑軒豁生輝光功名有在心未已相顧但惜湏眉蒼打門來辭興不淺思有以贈因吹楊别懷不用作酒惡梅花滿枝休断膓㑹把一麾淮海去與君終歲約徜徉黄鵠下太液池歌贈張詹丞子有君不見西京全盛時黄鵠飛下太液池雄聲東來蕩鳬鷺波濤干頃翻琉璃菊裳肅肅金爲衣至今樂府留歌辭只縁罕見稱祥輝較之世用將何爲張侯家住太液傍寵眷乆沐恩波光金閨時彦推獨歩大冠脩劒明月璫煙花鶴禁正縈繞翩如彩鳯鳴朝陽張侯本是濟時傑游刃有餘歸以德津津和氣粹眉宇皎皎氷壷湛胸臆兩都廵撫嵗有常守護無虞嘆先識臨機益辨固餘事端本澄源更超逸覃覃詹府開兩坊春桂香濃露華濕鄭莊好客未足多桃李公門半簮紱况今六合梟鸞分霜風静野惡木寂太平有望公等事爲國薦賢時所急顒顒士論問逺期它日明堂湏柱石昔聞黄鵠下太液今覩池邊威鳯集作歌自笑贈君侯一片野心猶獻炙海燕蒲萄鏡歌贈趙克敬趙郎少年有澹癖抉古搜竒曾不息神京陸海魚龍窟入市驚呼得玄璧何年軒鑑覷天巧百鍊隂精開棄質玉臺人去玉燈㓕洞映千秋猶一日粉膏銷盡漢宮香背像冥薰臘茶色翩翾海燕喜春晴的皪蒲萄泫秋碧寳奩才拆走神光秋月横江露華濕森然毛骨溢清寒野魅山精堕幽泣藏明入晦古所尚物不將迎汝之徳土花綉澁學妖蟇桂影團圑恣吞蝕照人似惡太分明俯仰取容非我軄蹇予行年五十七落魄功名尚南北青衫拂拭照衰朽増進一階真可借鑑裁不到魏文貞金鏡輸誠志當畢趙郎從傍抵掌笑識㧞群材有時特悽然歛祍問鏡神我髪何由黒如􅃮和張鵬飛詩韻魯公平生書百碑衆筆腐朽驚神竒長沙大笑稱老賊當時未必爲真知大師忠義膽身大寓意於書忘吊賀君不見路逢碧落三日觀一字末厭書萬過秋澗先生大全文集卷第十一
