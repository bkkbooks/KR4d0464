body:
  text: 五言律詩壽史開府開府群公表山河間氣鍾飛翻同儷景婉孌獨從龍慶㑹千年運中原百戰功一門傳畫㦸列聖錫䑣弓霖雨思賢乆中朝注望隆詔居華衮地德邁古人風學並征南癖心肩尚父忠翦䲔清碧海煉石𥙷蒼穹脫略三朝㒞從容萬石恭都俞明治體風俗變時雍薦逹多名士經綸極至公功成心轉小量廓孰非容柱石嘉謨壯朝廷睿眷崇何心貪寵數圖報罄丹衷降典維公共群疑可適從欽承能致恤度作貴惟中漢紀三章約秋荼一掃空與時弼五教致主冠三宗夀席㤙光暖梅稍蠟蔕融翠梧鶵鳯秀燕寢霧香濃毫彩知神相顔酡匪酒紅武公強不息羅結懿而聦䄂手調伊鼎刋名溢景鐘耆英追洛㑹遐壽等喬松賤子何多幸凢金乆在鎔寸誠芹擬獻五福日來襲德潤餘燕桂簮纓滿漢宫一杯千歲酒遐邇此心同壽徒單顒軒間氣無時歇先生嶽降申慶流椒室裔䄂有鴨江春漢苑稱多士青雲早致身縱横蘇氏學英特賈生倫盛徳應如此文章固有神玉堂看歩武滄海忽揚塵飄泊心逾壯歸來道日新因懷盤谷隠怡恱太行雲歘命竹林駕來陪楚醴賔詞源窮造化講席見經綸小子嗟何𫐠先生樂育諄顧非清廟器時辱郢人斤旣佩雕䥴厚長懐頌禱勤微誠方獻炙誕節遇兹辰酌以義泉水清冷勝飲醇贈以湘纍菊馨香如友人水澄性不撓菊老氣彌振道體同康謚窮途任屈伸年年華表底同拜白頭親送外弟韓茂卿北上外弟韓從愿奉檄轉𥙷尚書部椽自梁過衛留三日而去臨行求言爲訓因書是詩以贈華省開新制尚書古六曹官嚴程有限吏職㝡爲勞受簡聮鳬行隨時覆契刀論量天下事承接眼中豪吾弟方強仕頭顱未二毛荷囊𥘉佩服公務乆薰陶未害居煩劇休辝任動慅一勤無不辦多慢豈難操所事先懐慎當官責可逃古人淹典制多暇戒遊遨簿領雖山積身心楽戰鏖苦辛天不負聲實日能髙况汝韓宗盛從來衆士髦華纓彯綉弁象簡映青𫀆光禄何稠疊司空見贈褒非儒即政務致力釣溟鼇継述無多事公清善吏豪老夫雖潦倒聴汝鶴鳴臯春夜宴史右相宅勲閥汾陽業金貂漢相家陽春元有脚玉度瑩無瑕神駿推宛馬跳梁笑井蛙相逄成夜集暢飲壓流霞綺席圍聲妓銀筝合鳯琶晚粧添粉黛雜舞見渝巴暖融螺甲盤香供露芽秀㪣兩扙促節摻漁撾侑食増陽盛紓懐發興賖舊聲今漸逺新體此無加樓轉三更月燈垂半夜花歌長縈曲調獅猛奮湏牙辝謝寕容退留連暫樂佳直湏窮薄伎尤異是雄蹅登踏寒林判軒呈迓古丫侍筵更紀僕歸燭黯籠紗下客陪簮玉清吟擁鼻瓜嗣侯非自樂先業念無涯待士無踈宻籌邉静譟譁有時陳樂籍張宴爲賔嘉此夕真儀鳯明朝等散鴉寵光需北闕時有進拜隆興省平章之耗又以二月七日先相忌辰約徃沐京故第享祀故云春禴動南衙豈特調銀字重看拜白麻轉頭雖契闊後話足䧺誇碧草傷淹賦清江吊屈沙别懐增惓惓獨鴈謾啞啞霄漢嗟垂翼庭階愧倚葭情悠天共逺心在地無遐㑹作登樓客聊停泛斗槎朱門三十載未分鬢空華送表弟韓雲卿赴臺才幹稱吾弟名行邁友生煙霄湏致力蘭署乆留情練事言無訒臨機敵莫勍趍朝元有日去魯不無名荣映荷囊紫聲嚴栢府清外司歆簡㓗内憲惜紛更輕重量時制銓除慮旦評貴人無自恕乗勢可將迎恩擢非余出覦情怨自平斯言當首議大體先居貞行巳雖多轍開心罄赤誠諒能持衆羙不必論前程自笑行藏拙潜看歳月驚清時悲杜舎白璧愧虞卿遊䆠幾三紀殘棋任一枰鐘鳴冝少息時捩尚何營塵委漸芻狗歌長振孺纓十年希豸觸一旦謾葵傾道在吾何慊憂深汝備明見渠由爾逹着眼在兹行聰作章徒紊行艱累匪輕南山與秋色依舊两峥嶸爲将設察判仍舊貫可也謁武惠魯公林墓四十韻金馭成隂朽山東自古彊限田摽鎮戍積憤致搶攘武惠當年傑天心覇業匡雲龍時際㑹風虎日翶翔五十連城重三千戰士良一朝歸版籍遺愛在耕桑甫定先文治來威戒代張儉恭希大帛號令肅秋霜氣革耰鋤擾風還禮義郷頌方歌魯盛人駴隕星鏜雲出靑崖頂烏瞻㤗岱傍驅車經鵲里故宅似汾陽山倚祁連塚祠荒緑野堂門旌虚將幄燕寢尚淸香有客追疇昔懷人動慨慷王師𥘉破汴河朔乆淪網文物隨雲散招徠不一亡盡收周禮樂重闢漢科塲淸秩銓華省群英萃郡庠有金皆冶器無玉不追章蓄徳需明主流波及四方星躔從落落奎彩獨煌煌嗣相圖光紹先猷在益彰雪山冝乆重世業寖丕昌帝道開中統皇風煽八荒重推黄閤相輕是尚書郎两署分荷橐千官列鴈行至今稱濟濟所在見蹌蹌原治無多術推賢用回量措材真得所收効儘非常侯國能如此朝家化更皇闡明雖實理勉勵乏明揚一代徐通議中流號巨防試圖援手助潜有䟦胡坊薄宦新過魯諸生懼面牆泮田饒樂育師授柰無望可惜絃歌地虚成笱在梁力扶雖切切事迫去遑遑量分功名薄傷時涕泗滂野煙知客恨先自栢城蒼靈巖寺二十六韻中立論名刹兹山第一巖地靈連海岱境勝隔仙凡紺殿通虚閣丹崖間翠嵐天低神寳嶺佛出證明龕鷄警隂魔暴僧馴怒虎躭定師興寺始党刻不辝慙石狀殷公恠眉厖老衲毿鍾聲盤絶壑幡影走枯柟法護雙欏樹經嚴七寳凾巢棲松鶴赭茗瀹露泉甘花雨濛沙界巖圍抱碧潭布金仍趙魏仰食不耕𧖟冨覧山無盡幽㝷力不堪微官嗟縳律小隱欲投簮吟就籃輿徃禪思玉版叅静縁天或假世味苦相諳城市蛙居坎功名蟻戰酣有來求福利誰復减嗔貪風化吾儒在慈恩釋氏覃教崇縁丗主風靡過周南以此山林勝皆爲佛老探兹遊聊適意他日儘横談翠琰詩如此清吟口詎緘顧瞻因咄咄前後至三三山主留昏宿官程畏衆碞夕陽人影澹猶惜動歸驂夀郡侯瀚海流餘慶金天秉氣昌風姿先相肖節㮣更鷹楊衛郡民何幸君侯德㝡良幾年承此治一日意曾遑仕膴學彌勵身脩志自強物情諳漸熟巵酒不聞香順事蠲苛嬈持難懾暴狂親賢咨政體捐俸起公堂舉意從人便何心恃已長行春忘逸獵發語見周防門静無私謁絃調戒急張早衙長待旦退食到斜陽奉上惟知謹當機每克莊清廉安本分孝悌出天常聽訟從輸臆安群腯牧羊行方端比矢處當断如鋼誕席闌微獻歌詩代頌章自憐鮐背叟長對徳星光却恐流雲駿終峨象角霜所期松栢壽喬嶽共蒼蒼贈周曲山官滿周南樂城居漢德翁酒杯隨老减詩句自窮工甕料黄虀剰瓶儲白粲空畫义餞幾塊人事日相攻昨暮招添夀今辰云吊凶新除雖有望舊債積来重咄咄時書恠悠悠任轉蓬伸眉無寸樂接物儘多容憔悴鱗遺野昻藏鶴在籠固知吾道在未免此心冲夕講詩書共朝遊杖屨仝暗消秋澗鄙卓有苦齋風一覺平明睡三竿曉日紅計資徴麹價分口訓村童縣邑多遺愛文章不濟窮曲肱而飲水樂亦在其中夢入閩清府已丑秋九月二日五夜夢閩府來迓品節儀物之盛有不可殫紀者旣覺即其意賦此夢入閩清府郊迎罄海圻𥘉從亭傳發迓自憲司歸萬目瞻新使中天仰國威康衢回曲曲香霧靄霏霏罩􅏛雲垂蓋行歌錦作幃申嚴森赤棒緩進佇朱衣鼔吹連天動旌旄映日微髙乗三丈轎前導一雙騑花覆朝𫀆紫沉薫象簡馡散班行有叙社直見來稀覆地䄄如織蒙山綉若絺籠官衫赤褐花㡌翠誕葳天逺綸恩重霜清豸角巍繁華驚極盛心事豈輕肥白璧防汚玷黄金惜帶圍六條申漢制八郡歛炎輝庻政惟蠲嬈流風可漸徽氣和樓吐蜃官肅浦還璣後擁才中道前呵近憲扉一聲鷄唱白推枕蝶分飛塵世真如夢蓬纍未覺非日髙詩巳就清思尚依依送李郎中德昌北還情見乎辭一自新河別經今巳十年爲㝷江表傳重㑹嶺南天鴻鵠乘風健驊騮得路先鷄香芬省署襟誼動星躔灑落生平契留連組送筵自嗟衰病客愁卧瘴江煙歳月隣期耄郷関近五千依依枝遶鵲跕跕水飛鳶外望何其切中堅未昜䥴崇髙疇弗戀筋力若爲前落日郷音杳秋空望眼穿委心歌巳矣適意俟終焉行止雖存數周旋正頼賢省臺公道在萬一故人憐謁光武廟奉詔趍龍朔驅車過鄗南壇傾餘里陌廟古老松杉建武重明後中原百戰酣同飜思儷景懷古暫停驂像儼雲臺畫炎開漢燼燂道深柔作理亂自武能戡於穆吾皇聖英明世祖參有賢勞夢想無物不春涵賤子嗟前進殘年謾一堪材䟽徒意廣學古不時諸杖䇿非髙宻扶真愧耿弇乞靈期睿眷登對恊時談景巳桑榆晚恩非兩露貪所思吾道重少負此生慙𥙷報功微效歸休老亦甘冷颷知客意吹靉御鑪馣和幹臣食粽有感詩韻辛夘端午傑句欣三復辭情浹且黏君吟元在北我詠實維南綜品雖云衆名芳不自嫌懷沙悲楚屈設祭入湘潭一昨聞辰告周防致思嚴褁纒需彩縷竊食逺腥鮕節届朱明近家同玉版叅飣盤犀偃角帶籜笋遺尖製變菰筒質香浮九子纎長腰烹得所木宻助餘甜老復防留膩多餐不過三縳從堂上解爽覺箸頭添應候然微物因騷有細談貞賢餐愈㓗䜛佞對冝慚我本餔糟客何心論滯淹番禺杖異種來番國知名自老坡杖才任操倚節自喜摩挲尺度天然足柑黄氣色和竒姿含海霧孤植映江沱物眇離郷貴材稀審實訛聲音鏗爪甲鱗介訝鮫鼉鞭馭真雷䇿批亢格魯戈重輕欣得所長短稱閑拖扶老携行便持危得力多金蛇僵自勁鮐背痒忘苛不自浮槎使來從老伏波見歸情鄭重未許老婆娑入手嗟神物傳看駭玉柯支頥看月出横膝伴詩哦選勝㝷泉石窮幽入薛蘿有時兒女觸却恐鬼神呵蓋節空笻竹神鋒黯太阿笑揮堪解虎静倚可降魔靈夀輕無頼梅條皺可捼花藤昏玳暈班點惨湘娥桃竹那能比桄榔未足歌望塵甘却立歛迹揔無過用舎時當審敲撞責果何更防雷雨夜衝屋學陶梭秋月篇夀幹臣周宰取杜黙爲李文定公迪詩例五任稱賢宰平頭數七旬分輝郎宿烱鍾秀曲山春懷寳湏時用騰蛟自蠖伸所期千室冨匪爲一家貧文彩唐儒雅規模漢吏循刃游無節錯佩服藹蘭紉訟簡縁情得民安爲賦均處膏希孔㓗孔奮曾為姑葳守身處脂膏終不自潤宣化見恭仁今嵗逢𥘉度賔筵聽具陳分安貧愈厲詩健老能神報政長書㝡閑居任甑塵從容黄卷樂浩蕩白鷗馴大器成應睌煙霄漸可隣旣淹千里足終遇九方歅况復崇公道明揚到逸民新除行有曰舊政說難倫湛露金莖濕清樽雪蟻新朗吟秋月句來醉白綸巾再拜添眉夀無勞頌大椿願同蟾窟桂千歲欝輪囷送趙都司秉彜赴遼東省幕世味無餘雋群居底許争疾徐誰長者沴拉到諸凡吾子方強仕襟期㝡老成喧聞烏亂集歘聽鳯孤鳴行巳謙而讓持心厚且誠相看情欵洽有問對詳明再世儒冠素三年祕閣榮以除遴所選論省諒非輕營帳稱強翰天威想濯征海澄鯨巳戮地曠物多萌望重官儀肅民安吏務清濟時紛筆議展用幾書生抱志能兹念流芳在此行秩卑猶吏属禄足代躬耕曉日灤江渡秋風鶴野城蒼茫連渤澥控帶本營平緑水開蓮幕青山送去程䆠遊真衣錦别思任懸旌有道開先丗孤標振直聲遼陽回首處未用愴離情送忠翁南歸并序元貞乙未春翰長忠翁年七十七致仕南歸行有日平章張侯同諸僚宷祖道於遂𥘉亭舘予亦忝陪席次明日賦律詩廿四韻非敢以爲詩庻幾表吾皇元崇儒重道跨越前人相府睠懐始終盡禮張大續鹿庵之貺詠歌見楊尹之榮豈惟上國之光華永作翰林之故事其詞曰供帳都門讌非縁歳例過右相城南别墅每歳春例一燕諸公時清連勝日簮盍半鑾坡酒羙凌金谷歌酣掩艶娥盛於清洛禊用裴晋公上巳同刘白泛舟洛水柰此別筵何爱客終青顧傷離賦緑波散花簮席㡌泥飲捲鸚螺人世真流梗年光易擲梭瑣軒凉吹急綺席落花多蕩粉霑䄄綉吹香入䄂羅暫留春色住莫戀去程搓峻秩慚同列醺容慘弗酡新亭收老淚官舸送長河聖代吾儒重詞林寵數頗諾從丞相允義見相臣番祖餞賢踈傅衣冠似永和生還梁庾信贐重魯鄒軻盛事傳千古儒流聳四科丹青前日畫歎息路人歌有客孤吟悄臨風兩鬢皤圗南鵬運海遶樹鵲依柯早晚同長徃徜徉隱澗阿此懐從落寞起舞且婆娑道在無南北朝家立賢無方果才何間南冠北士材非謾琢磨醉歸扶路晚里巷認鳴珂賦手植檜酒鍾千載東家檜榮枯與道俱鐸沉金絶嚮鳯去洛遺圗元氣蟠根祗斯文見盛汚噐圓傷失制梭削嘆非柧梁棟無隆用杯盤伴飲徒泛香宜盎齊奠獻嫓龍觚沾漑餘周魯淵源挹泗洙雅同吳壽鼎髙亞愽山鑪刺口論三代髙歌共一壷或延中聖客或約醉經儒閱古因懷昔相看醉捋鬚蒼煙空左紐偃蓋凛相扶歸詠絲堂樂摳衣闕里趍回思鐘鼎事一笑付桑榆哀曹府君詞維至元乙亥夏四月癸卯前行尚書省左右司郎中曹君卒於郷里後九日聞訃適有令開廪拯隰予特請行將致一哀旣而不果逮十四夜見君於夢邀予坐故第前楹汛滌供具促膝晤言話其平生甚悉夢中相對爲歔欷也覺而賦此聊伸白馬素車之願二十日辛酉命州属吏路材代予徃奠俾火其詩於栢原以告君墓魂而有靈尚克昭鍳嗚呼哀哉君諱松年字夀之享年七十有五世爲隰州隰川人聞訃纔三宿衣冠夢兩楹㳙除開故室拂欝話平生息弱哀無託才清老有聲撫懷思攬轡將事過持盈細札紛遺簡謂二月有書寄于故云山煙慘樹旌素車空佇望柩馬想悲鳴懷舊星臨曙傷貧淚滿纓紫川西邁意端欲爲君行送趙克敬判定武趙子公侯裔雍容館閣才羙除官定武増秩自邢臺喜溢家人敬春融處士懷沼蓮香莫府衙鼔響㕔階雲靜靈光塔風清雪浪齋敢辭推按劇那憚簿書埋任責騰聲譽隨時免謗猜不教民事緩肯失上官諧人樂家餘袴官清甑任埃鼎祥新有說世系舊爲裁筆胄淵流逺慈親壽域開嚮來餘藻飾此去要培㘽惜别輕三載離筵重一杯君看忠獻業超擢此中來省題詩紅藥當堦翻紫殿春光晚芳叢夏景暄緑萱垂地合紅藥當堦翻粉蘂金腰束嬈旗絳艶繙凉颸飄碧砌清影動朱軒白傳吟何婉玄暉思不煩顧瞻栖鳯地折贈詎容言朱干玉戚詩并序至元二十五年戊子秋八月五日夢先師泌陽府君命賦此題寤寐中得成韻語者數句旣覺因足成之禮制詳三代軍容備百王錫干朱作飾戚祕玉爲章持緫如山立張皇見武楊威伸三令粛近作一身防商翦歌周雅夷清頌漢昌格苗先此用萬古仰虞皇以謂帝舜敷文舞千全不尚武致苗頑自格後世以征伐有天下然後象干戈俻樂舞以彰其成功此後王之徳不及也何叅政母夫人哀辭友義當匍匐無從涕泗漣升堂元有約臨窆不容愆念子𥘉何兾嗟予重㤯然㑹湏陳漬酒孤酹廣平阡享福年幾百升堂拜慶三丰容冝象服隂教動周南子孝終身慕家貧極㫖甘併將風樹感彤史後來譚徳邁魚軒貴恩涵鳳沼春遽遺彤管羙凄断素車塵在毋稱賢範康時産異人故家桃李月何止詠蔡蓁仲和張君孝友純至來求詩因賦此以贈滄江客康寕白髪親䆠游非不逹純孝與爲隣養志曾叅事遺羹考叔仁汴都三萬一家春致樂如君少長歸便毋安物生皆有飬色順㝡爲難夏清簾幃暑冬温枕𬒳寒慈顔何所喻庭柰見來丹題常仁卿運使西覲紀行九萬鵬摶翼孤忠駕使軺功名元有數風雪不知遥抵北踰鰲極維南望斗杓胡生摇徤筆且莫詫東遼出五代史突厥冏錄同州邰陽縣令胡嶠亡歸中國作䧟虜記三䇿條民便逾年致節旄夢驚羊胛日嶮歷幻人刀碧盌昆堅異黄金甲第髙白頭書卷裏留滯敢辝劳太平宴二詩海寓𥘉無外王師信有征秉旄麾戰旅漏網得奔鯨清晝來三捷歡謡沸百城從今田舎底白首樂昇平西北烽煙静東南海祲清太平元有象帝見餘禎愾敵無多殺推恩屢减䡖公堂歌舞処氣正凝平冬日即事飢火衰榮笑物情百年能幾日半世太勞生白首􆀐書苦黄金過眼輕有懷如此癖何徃不艱征夀韓生弘秉天然厚青衿雅韻多室鄙揮戈壘吟來細韓墻氣見奉璋峨哭友親完顔仲希墓宿草西河客隆顱塞外春死留朋義重生與醉鄉隣天老株林雨魂香蟻穴塵我来還獨酹黄葉鳥聲頻挽呉衡甫波蕩江湖士來從隱逸居醉吟忘楚越箋學到蟲魚拊髀驚凶訃霑巾覩故書慨然西望断山色照空廬壽王子𥘉近世佳公子詩書看起家處身何不可致飬略無加信厚歌麟趾文章粲劒華一樽添夀酒猶及泛黄花秋夜月下獨酌時回自燕都堂虗生夜白院静散蟲聲月下一杯酒胸中無限清艱難吾道事冷暖故人情爲報南枝鵲安棲不復驚治穢聖戒防微漸常懷蔓莫圖菊荒䟽苯䔿竹宻斬蘩蕪舉目晴山近當軒恠石孤放教今夜月清影滿庭隅贈彦政副使一世佳公子氣涵渾水春衣冠逾逺澤麴糵豈謀身白璧詩名重清燈客舎新不妨宛馬足暫屈到河神清明日南寺對雨時在東平寒食無家客禪房喜兩餘坐深僧話永心逺世縁䟽厭捲椰瓢醁來叅貝葉書傍人從不悟有待曵長裾酒榼㝷春晚茶甌破睡餘庭虗花寂寂雲淡雨踈踈有待存終始無心望簡書何當玉堂客脫此馬秋夜卧榻鋪筠簟風簷逓晚凉雲枯􅉼旱氣星爛射寒芒鍾鼔寒更永乾坤夜色蒼時危関百慮低首拊空床出門因酒敗佳意方知百拜輕忘機甘李喻重賦赤霄行踈拙傷吾性傾危見俗情出門山氣好秋色浪峥嶸挽真定史二相君凭鳯攀龍起貂蟬奕世侯九天資岳牧一夢忽山丘陵劒驂停魯相輈八州遺爱在滹水日東流挽武安道故失邯鄲歩憂分陋巷簞持身心巳亂得病衆知難夜月琴絲暗秋風旅殯寒人生罹此極命矣復何嘆壽雷彦政南渡衣冠後如君不數人氣􅉼渾水秀色映塞垣春靈沼儀周鳯商郊獲魯麟壽杯傾菊露同拜倚門親去歲龍沙月流光共薊門寒華驚晚節客舎壽明樽取友襟期在傳家命脉存今年秋色好笑語北堂温白松霍岳祠南寺竒松勝所聞孤根生得地衆木逈雖霜雪封琪樹丹青變錦紋山靈應見惜時與護晴早發泓芝驛西邁經猗頓鳴珂夜半過天低平卧斗野逈陡赤日三庚伏紅塵兩鬢皤老懷多故禹廟庙在安邑故城内甲十九日點視玉帛中天㑹謳崗負黄雲表台愛極憐烏周幹臣詩韻和近得閑中趣都無俗物侵風霜驚老鬢道徳負枕倦書横膝庭虚樹有隂殷勤周吏隠時遣道清和秋漲二首泉峪從共㑹奔流到衛雄新詩來幕下歸興滿舟取少陵胡爲只合例怒捲濤山北雄吞海若東我思泛舟役氏泛舟之役輕惜幾千功謂太宮之木順流而下兩後聞溪漲先聲噴簿來氣嚴千騎駚波急萬窠囬終古朝宗去神功念禹開寄言歸義子欵塞莫遲徊題有趙義士三侯祠雙塚連遺廟風雲擁義壇難興忠可壯事集死尤難烈日丹衷皎青山白骨寒一杯來酹祭用激懦夫肝禱兩孚恵靈祠夜半清源道来伸禱兩誠壝圜形覆釡泉䆳碧爲泓覇業開三晋風煙暗九京一杯臨水坐便欲濯塵纓慶王丈子夀八秩之夀遺愛汾西政耆英故里居期頥八十夀精徤五旬餘捨䇿春流憇龕燈夜注書更怜温清際蘭玉滿庭除奉酬紹開外郎畫省胡貟外都城憶昔逰分携無半載渇仰若三秋巳辦催科拙寕煩任智憂何當償宿願相望兩山州星子鎮道中北下星關道川開百里寛夢殘傾錦帢吟細緩征鞍土峽深回洞山田疊醮壇一杯亭傳酒來爲敵霜寒題栢璧鎮峽古疑天設營空故壘存捐金行楚問力戰决齊吞馬足沾霜健山煙漲日昏治安誰有䇿一笑出關門夷齊墓逺避東鄰虐還遮北伐頻與天重立極叩馬死成仁落日悲歌壯東風紫蕨春一飢雖可療終媿是商臣舜井廣孝銘遺井千秋仰有虞側微多在困捐浚失之誣喬木非三代雲煙接兩都依依風樹感不待露霜濡河中歷按河東道蒲津勢㝡雄河山全晋鄙土俗半秦風野日連墟壘孤煙認佛宫論功無渾馬極口說先公登歷山聖人嶺形勝開三靣臨觀醉魄醒松悲虞泣涕石老象頑冥澗水縈瓜蔓荒山卧虎形野人無所解尊禮九真靈䟦運使張君㑹琴圖雪徑㝷無路東林素有期琴絲凍欲折風䄂暁還披偉觀疑韓愈幽林付頴師無由陪杖屨只悟盡中詩田間斜日秋瓜圃雲閑兩過𥘉平疇交晚吹凉意滿輕𥚑草木浮元氣河山擁草廬拊心欣有得重展故人書雲帶山籬簿溪横舎屋斜卷懷忘仕版作苦事田家踈散藏吾拙敷榮眷物華晚凉沙岸静植杖自耘瓜漠漠西山兩東來意甚徐潤深滋厚壤洒宻下平蕪巢燕歸飛急林鳩得雨呼有金堆積斗能捄暵乾無遇萬泉縣今癈縣倚孤山碧崗圍落照紅一丘歸慘淡千室想豐融絕澗縈樵徑懸崖半土空物繁耕壌狹寕得不唐風秋澗先生大全文集卷第十二
