body:
  text: 五言律詩壽史開府開府群公表山河間氣鍾飛翻同儷景婉孌獨從龍慶會千年運中原百戰功一門傳畫戟列聖錫䑣弓霖雨思賢久中朝注望隆詔居華衮地德邁古人風學並征南癖心肩尚父忠翦鯨清碧海煉石輔蒼穹脫略三朝俊從容萬石恭都俞明治體風俗變時雍薦逹多名士經綸極至公功成心轉小量廓孰非容柱石嘉謨壯朝廷睿眷崇何心貪寵數圖報罄丹衷降典維公共群疑可適從欽承能致恤度作貴惟中漢紀三章約秋荼一掃空與時弼五教致主冠三宗夀席恩光暖梅稍蠟蒂融翠梧雛鳯秀燕寢霧香濃毫彩知神相顔酡匪酒紅武公強不息羅結懿而聰袖手調伊鼎刋名溢景鐘耆英追洛會遐壽等喬松賤子何多幸凡金久在鎔寸誠芹擬獻五福日來襲德潤餘燕桂簮纓滿漢宫一杯千歲酒遐邇此心同壽徒單顒軒間氣無時歇先生嶽降申慶流椒室裔袖有鴨江春漢苑稱多士青雲早致身縱橫蘇氏學英特賈生倫盛德應如此文章固有神玉堂看步武滄海忽揚塵飄泊心逾壯歸來道日新因懷盤谷隱怡恱太行雲歘命竹林駕來陪楚醴賔詞源窮造化講席見經綸小子嗟何𫐠先生樂育諄顧非清廟器時辱郢人斤既佩雕鐫厚長懷頌禱勤微誠方獻炙誕節遇兹辰酌以義泉水清冷勝飲醇贈以湘纍菊馨香如友人水澄性不撓菊老氣彌振道體同康諡窮途任屈伸年年華表底同拜白頭親送外弟韓茂卿北上外弟韓從願奉檄轉輔尚書部椽自梁過衛留三日而去臨行求言為訓因書是詩以贈華省開新制尚書古六曹官嚴程有限吏職最為勞受簡聮鳬行隨時覆契刀論量天下事承接眼中豪吾弟方強仕頭顱未二毛荷囊𥘉佩服公務久薰陶未害居煩劇休辝任動慅一勤無不辦多慢豈難操所事先懷慎當官責可逃古人淹典制多暇戒遊遨簿領雖山積身心樂戰鏖苦辛天不負聲實日能髙况汝韓宗盛從來衆士髦華纓彯繡辨象簡映青𫀆光祿何稠疊司空見贈褒非儒即政務致力釣溟鼇繼述無多事公清善吏豪老夫雖潦倒聽汝鶴鳴臯春夜宴史右相宅勳閥汾陽業金貂漢相家陽春元有腳玉度瑩無瑕神駿推宛馬跳梁笑井蛙相逄成夜集暢飲壓流霞綺席圍聲妓銀筝合鳯琶晚粧添粉黛雜舞見渝巴暖融螺甲盤香供露芽秀敲兩扙促節摻漁撾侑食增陽盛紓懷發興賖舊聲今漸逺新體此無加樓轉三更月燈垂半夜花歌長縈曲調獅猛奮須牙辝謝寧容退留連暫樂佳直須窮薄伎尤異是雄蹅登踏寒林判軒呈迓古丫侍筵更紀僕歸燭黯籠紗下客陪簮玉清吟擁鼻瓜嗣侯非自樂先業念無涯待士無踈密籌邉靜譟譁有時陳樂籍張宴為賔嘉此夕真儀鳯明朝等散鴉寵光需北闕時有進拜隆興省平章之耗又以二月七日先相忌辰約往沐京故第享祀故云春禴動南衙豈特調銀字重看拜白麻轉頭雖契闊後話足雄誇碧草傷淹賦清江吊屈沙别懷增惓惓獨鴈謾啞啞霄漢嗟垂翼庭階愧倚葭情悠天共逺心在地無遐會作登樓客聊停泛斗槎朱門三十載未分鬢空華送表弟韓雲卿赴臺才幹稱吾弟名行邁友生煙霄須致力蘭署久留情練事言無訒臨機敵莫勍趍朝元有日去魯不無名榮映荷囊紫聲嚴柏府清外司歆簡潔內憲惜紛更輕重量時制銓除慮旦評貴人無自恕乘勢可將迎恩擢非余出覦情怨自平斯言當首議大體先居貞行巳雖多轍開心罄赤誠諒能持衆美不必論前程自笑行藏拙潛看歲月驚清時悲杜舍白璧愧虞卿遊宦幾三紀殘棋任一枰鐘鳴冝少息時捩尚何營塵委漸芻狗歌長振孺纓十年希豸觸一旦謾葵傾道在吾何慊憂深汝備明見渠由爾逹著眼在兹行聰作章徒紊行艱纍匪輕南山與秋色依舊兩峥嶸為將設察判仍舊貫可也謁武惠魯公林墓四十韻金馭成隂朽山東自古強限田摽鎮戍積憤致搶攘武惠當年傑天心霸業匡雲龍時際會風虎日翶翔五十連城重三千戰士良一朝歸版籍遺愛在耕桑甫定先文治來威戒代張儉恭希大帛號令肅秋霜氣革耰鋤擾風還禮義鄉頌方歌魯盛人駴隕星鏜雲出靑崖頂烏瞻泰岱傍驅車經鵲里故宅似汾陽山倚祁連冢祠荒緑野堂門旌虛將幄燕寢尚淸香有客追疇昔懷人動慨慷王師𥘉破汴河朔久淪網文物隨雲散招徠不一亡盡收周禮樂重闢漢科場淸秩銓華省群英萃郡庠有金皆冶器無玉不追章蓄德需明主流波及四方星躔從落落奎彩獨煌煌嗣相圖光紹先猷在益彰雪山冝久重世業寖丕昌帝道開中統皇風煽八荒重推黃閣相輕是尚書郎兩署分荷橐千官列鴈行至今稱濟濟所在見蹌蹌原治無多術推賢用回量措材真得所收效儘非常侯國能如此朝家化更皇闡明雖實理勉勵乏明揚一代徐通議中流號巨防試圖援手助潛有跋胡坊薄宦新過魯諸生懼面牆泮田饒樂育師授奈無望可惜絃歌地虛成笱在梁力扶雖切切事迫去遑遑量分功名薄傷時涕泗滂野煙知客恨先自柏城蒼靈巖寺二十六韻中立論名剎兹山第一巖地靈連海岱境勝隔仙凡紺殿通虛閣丹崖間翠嵐天低神寶嶺佛出證明龕雞警隂魔暴僧馴怒虎耽定師興寺始黨刻不辝慙石狀殷公怪眉厖老衲毿鍾聲盤絶壑幡影走枯柟法護雙欏樹經嚴七寶函巢棲松鶴赭茗瀹露泉甘花雨濛沙界巖圍抱碧潭布金仍趙魏仰食不耕𧖟冨覽山無盡幽尋力不堪微官嗟縳律小隱欲投簮吟就籃輿往禪思玉版參靜緣天或假世味苦相諳城市蛙居坎功名蟻戰酣有來求福利誰復減嗔貪風化吾儒在慈恩釋氏覃教崇緣丗主風靡過周南以此山林勝皆為佛老探兹遊聊適意他日儘橫談翠琰詩如此清吟口詎緘顧瞻因咄咄前後至三三山主留昏宿官程畏衆碞夕陽人影淡猶惜動歸驂夀郡侯瀚海流餘慶金天秉氣昌風姿先相肖節概更鷹楊衛郡民何幸君侯德最良幾年承此治一日意曾遑仕膴學彌勵身修志自強物情諳漸熟巵酒不聞香順事蠲苛嬈持難懾暴狂親賢咨政體捐俸起公堂舉意從人便何心恃已長行春忘逸獵發語見周防門靜無私謁絃調戒急張早衙長待旦退食到斜陽奉上惟知謹當機每克莊清廉安本分孝悌出天常聽訟從輸臆安群腯牧羊行方端比矢處當斷如鋼誕席闌微獻歌詩代頌章自憐鮐背叟長對德星光却恐流雲駿終峨象角霜所期松柏壽喬嶽共蒼蒼贈周曲山官滿周南樂城居漢德翁酒杯隨老減詩句自窮工甕料黃虀剩瓶儲白粲空畫義餞幾塊人事日相攻昨暮招添夀今辰云吊凶新除雖有望舊債積來重咄咄時書怪悠悠任轉蓬伸眉無寸樂接物儘多容憔悴鱗遺野昻藏鶴在籠固知吾道在未免此心沖夕講詩書共朝遊杖屨同暗消秋澗鄙卓有苦齋風一覺平明睡三竿曉日紅計資徴麴價分口訓村童縣邑多遺愛文章不濟窮曲肱而飲水樂亦在其中夢入閩清府已丑秋九月二日五夜夢閩府來迓品節儀物之盛有不可殫紀者既覺即其意賦此夢入閩清府郊迎罄海圻𥘉從亭傳發迓自憲司歸萬目瞻新使中天仰國威康衢回曲曲香霧靄霏霏罩􅏛雲垂蓋行歌錦作幃申嚴森赤棒緩進佇朱衣鼓吹連天動旌旄映日微髙乘三丈轎前導一雙騑花覆朝𫀆紫沉薰象簡馡散班行有敘社直見來稀覆地禋如織蒙山繡若絺籠官衫赤褐花帽翠誕葳天逺綸恩重霜清豸角巍繁華驚極盛心事豈輕肥白璧防汚玷黃金惜帶圍六條申漢制八郡斂炎輝庶政惟蠲嬈流風可漸徽氣和樓吐蜃官肅浦還璣後擁才中道前呵近憲扉一聲雞唱白推枕蝶分飛塵世真如夢蓬纍未覺非日髙詩巳就清思尚依依送李郎中德昌北還情見乎辭一自新河別經今巳十年為尋江表傳重會嶺南天鴻鵠乘風健驊騮得路先雞香芬省署襟誼動星躔灑落生平契留連組送筵自嗟衰病客愁卧瘴江煙歲月鄰期耄鄉關近五千依依枝繞鵲跕跕水飛鳶外望何其切中堅未昜鐫崇髙疇弗戀筋力若為前落日鄉音杳秋空望眼穿委心歌巳矣適意俟終焉行止雖存數周旋正賴賢省臺公道在萬一故人憐謁光武廟奉詔趍龍朔驅車過鄗南壇傾餘里陌廟古老松杉建武重明後中原百戰酣同翻思儷景懷古暫停驂像儼雲臺畫炎開漢燼燂道深柔作理亂自武能戡於穆吾皇聖英明世祖參有賢勞夢想無物不春涵賤子嗟前進殘年謾一堪材疏徒意廣學古不時諸杖䇿非髙密扶真愧耿弇乞靈期睿眷登對協時談景巳桑榆晚恩非兩露貪所思吾道重少負此生慙輔報功微效歸休老亦甘冷颷知客意吹靉御爐馣和幹臣食粽有感詩韻辛卯端午傑句欣三復辭情浹且黏君吟元在北我詠實維南綜品雖云衆名芳不自嫌懷沙悲楚屈設祭入湘潭一昨聞辰告周防致思嚴褁纒需彩縷竊食逺腥鮕節屆朱明近家同玉版參飣盤犀偃角帶籜笋遺尖製變菰筒質香浮九子纎長腰烹得所木密助餘甜老復防留膩多餐不過三縳從堂上解爽覺箸頭添應候然微物因騷有細談貞賢餐愈潔讒佞對冝慚我本餔糟客何心論滯淹番禺杖異種來番國知名自老坡杖才任操倚節自喜摩挲尺度天然足柑黃氣色和竒姿含海霧孤植映江沱物眇離鄉貴材稀審實訛聲音鏗爪甲鱗介訝鮫鼉鞭馭真雷䇿批亢格魯戈重輕欣得所長短稱間拖扶老携行便持危得力多金蛇僵自徑鮐背癢忘苛不自浮槎使來從老伏波見歸情鄭重未許老婆娑入手嗟神物傳看駭玉柯支頥看月出橫膝伴詩哦選勝尋泉石窮幽入薛蘿有時兒女觸却恐鬼神呵蓋節空笻竹神鋒黯太阿笑揮堪解虎靜倚可降魔靈夀輕無賴梅條皺可捼花藤昏玳暈班點慘湘娥桃竹那能比桄榔未足歌望塵甘却立斂迹揔無過用舍時當審敲撞責果何更防雷雨夜衝屋學陶梭秋月篇夀幹臣周宰取杜默為李文定公迪詩例五任稱賢宰平頭數七旬分輝郎宿炯鍾秀曲山春懷寶須時用騰蛟自蠖伸所期千室冨匪為一家貧文彩唐儒雅規模漢吏循刃遊無節錯佩服藹蘭紉訟簡緣情得民安為賦均處膏希孔潔孔奮曾為姑葳守身處脂膏終不自潤宣化見恭仁今嵗逢𥘉度賔筵聽具陳分安貧愈厲詩健老能神報政長書最間居任甑塵從容黃卷樂浩蕩白鷗馴大器成應睌煙霄漸可鄰既淹千里足終遇九方歅况復崇公道明揚到逸民新除行有曰舊政説難倫湛露金莖濕清樽雪蟻新朗吟秋月句來醉白綸巾再拜添眉夀無勞頌大椿願同蟾窟桂千歲鬱輪囷送趙都司秉彜赴遼東省幕世味無餘雋群居底許爭疾徐誰長者沴拉到諸凡吾子方強仕襟期最老成喧聞烏亂集歘聽鳯孤鳴行巳謙而讓持心厚且誠相看情欵洽有問對詳明再世儒冠素三年祕閣榮以除遴所選論省諒非輕營帳稱強翰天威想濯征海澄鯨巳戮地曠物多萌望重官儀肅民安吏務清濟時紛筆議展用幾書生抱志能兹念流芳在此行秩卑猶吏屬祿足代躬耕曉日灤江渡秋風鶴野城蒼茫連渤澥控帶本營平緑水開蓮幕青山送去程宦遊真衣錦别思任懸旌有道開先丗孤標振直聲遼陽回首處未用愴離情送忠翁南歸并序元貞乙未春翰長忠翁年七十七致仕南歸行有日平章張侯同諸僚宷祖道於遂𥘉亭館豫亦忝陪席次明日賦律詩草四韻非敢以為詩庶幾表吾皇元崇儒重道跨越前人相府眷懷始終盡禮張大續鹿庵之貺詠歌見楊尹之榮豈惟上國之光華永作翰林之故事其詞曰供帳都門宴非緣歲例過右相城南别墅每歲春例一燕諸公時清連勝日簮盍半鑾坡酒美凌金谷歌酣掩艷娥盛於清洛禊用裴晉公上巳同劉白泛舟洛水奈此別筵何愛客終青顧傷離賦緑波散花簮席帽泥飲捲鸚螺人世真流梗年光易擲梭瑣軒涼吹急綺席落花多蕩粉霑禋繡吹香入袖羅暫留春色住莫戀去程搓峻秩慚同列醺容慘弗酡新亭收老淚官舸送長河聖代吾儒重詞林寵數頗諾從丞相允義見相臣番祖餞賢踈傅衣冠似永和生還梁庾信贐重魯鄒軻盛事傳千古儒流聳四科丹青前日畫歎息路人歌有客孤吟悄臨風兩鬢皤圗南鵬運海繞樹鵲依柯早晚同長往徜徉隱澗阿此懷從落寞起舞且婆娑道在無南北朝家立賢無方果才何間南冠北士材非謾琢磨醉歸扶路晚里巷認鳴珂賦手植檜酒鍾千載東家檜榮枯與道俱鐸沉金絶嚮鳯去洛遺圗元氣蟠根祗斯文見盛汚器圓傷失制梭削嘆非柧梁棟無隆用杯盤伴飲徒泛香宜盎齊奠獻嫓龍觚沾溉餘周魯淵源挹泗洙雅同吳壽鼎髙亞博山爐刺口論三代髙歌共一壷或延中聖客或約醉經儒閲古因懷昔相看醉捋鬚蒼煙空左紐偃蓋凛相扶歸詠絲堂樂摳衣闕里趍回思鐘鼎事一笑付桑榆哀曹府君詞維至元乙亥夏四月癸卯前行尚書省左右司郎中曹君卒於鄉里後九日聞訃適有令開廪拯隰豫特請行將致一哀既而不果逮十四夜見君於夢邀豫坐故第前楹汛滌供具促膝晤言話其平生甚悉夢中相對為歔欷也覺而賦此聊伸白馬素車之願二十日辛酉命州屬吏路材代豫往奠俾火其詩於柏原以告君墓魂而有靈尚克昭鑒嗚呼哀哉君諱松年字夀之享年七十有五世為隰州隰川人聞訃才三宿衣冠夢兩楹涓除開故室拂鬱話平生息弱哀無託才清老有聲撫懷思攬轡將事過持盈細札紛遺簡謂二月有書寄于故云山煙慘樹旌素車空佇望柩馬想悲鳴懷舊星臨曙傷貧淚滿纓紫川西邁意端欲為君行送趙克敬判定武趙子公侯裔雍容館閣才美除官定武增秩自邢臺喜溢家人敬春融處士懷沼蓮香莫府衙鼓響廳階雲靜靈光塔風清雪浪齋敢辭推按劇那憚簿書埋任責騰聲譽隨時免謗猜不教民事緩肯失上官諧人樂家餘袴官清甑任埃鼎祥新有説世系舊為裁筆胄淵流逺慈親壽域開嚮來餘藻飾此去要培栽惜别輕三載離筵重一杯君看忠獻業超擢此中來省題詩紅藥當階翻紫殿春光晚芳叢夏景暄緑萱垂地合紅藥當階翻粉蘂金腰束嬈旗絳艷翻涼颸飄碧砌清影動朱軒白傳吟何婉玄暉思不煩顧瞻栖鳯地折贈詎容言朱干玉戚詩并序至元二十五年戊子秋八月五日夢先師泌陽府君命賦此題寤寐中得成韻語者數句既覺因足成之禮制詳三代軍容備百王錫干朱作飾戚祕玉為章持總如山立張皇見武楊威伸三令肅近作一身防商翦歌周雅夷清頌漢昌格苗先此用萬古仰虞皇以謂帝舜敷文舞千全不尚武致苗頑自格後世以征伐有天下然後象干戈備樂舞以彰其成功此後王之德不及也何參政母夫人哀辭友義當匍匐無從涕泗漣升堂元有約臨窆不容愆念子𥘉何兾嗟豫重㤯然會須陳漬酒孤酹廣平阡享福年幾百升堂拜慶三丰容冝象服隂教動周南子孝終身慕家貧極旨甘併將風樹感彤史後來談德邁魚軒貴恩涵鳳沼春遽遺彤管美凄斷素車塵在毋稱賢範康時産異人故家桃李月何止詠蔡蓁仲和張君孝友純至來求詩因賦此以贈滄江客康寧白髮親宦遊非不逹純孝與為鄰養志曾參事遺羹考叔仁汴都三萬一家春致樂如君少長歸便毋安物生皆有飬色順最為難夏清簾幃暑冬溫枕𬒳寒慈顔何所喻庭奈見來丹題常仁卿運使西覲紀行九萬鵬摶翼孤忠駕使軺功名元有數風雪不知遙抵北踰鰲極維南望斗杓胡生搖健筆且莫詫東遼出五代史突厥冏録同州邰陽縣令胡嶠亡歸中國作陷虜記三䇿條民便逾年致節旄夢驚羊胛日嶮歷幻人刀碧碗昆堅異黃金甲第髙白頭書卷裏留滯敢辝勞太平宴二詩海寓𥘉無外王師信有征秉旄麾戰旅漏網得奔鯨清晝來三捷歡謡沸百城從今田舍底白首樂升平西北烽煙靜東南海祲清太平元有象帝見餘禎愾敵無多殺推恩屢減輕公堂歌舞處氣正凝平冬日即事飢火衰榮笑物情百年能幾日半世太勞生白首􆀐書苦黃金過眼輕有懷如此癖何往不艱征夀韓生弘秉天然厚青襟雅韻多室鄙揮戈壘吟來細韓墻氣見奉璋峨哭友親完顔仲希墓宿草西河客隆顱塞外春死留朋義重生與醉鄉鄰天老株林雨魂香蟻穴塵我來還獨酹黃葉鳥聲頻挽吳衡甫波蕩江湖士來從隱逸居醉吟忘楚越箋學到蟲魚拊髀驚凶訃霑巾覩故書慨然西望斷山色照空廬壽王子𥘉近世佳公子詩書看起家處身何不可致飬略無加信厚歌麟趾文章粲劒華一樽添夀酒猶及泛黃花秋夜月下獨酌時回自燕都堂虗生夜白院靜散蟲聲月下一杯酒胸中無限清艱難吾道事冷暖故人情為報南枝鵲安棲不復驚治穢聖戒防微漸常懷蔓莫圖菊荒疏苯䔿竹密斬蘩蕪舉目晴山近當軒怪石孤放教今夜月清影滿庭隅贈彥政副使一世佳公子氣涵渾水春衣冠逾逺澤麴糵豈謀身白璧詩名重清燈客舍新不妨宛馬足暫屈到河神清明日南寺對雨時在東平寒食無家客禪房喜兩餘坐深僧話永心逺世緣疏厭捲椰瓢醁來參貝葉書傍人從不悟有待曵長裾酒榼尋春晚茶甌破睡餘庭虗花寂寂雲淡雨踈踈有待存終始無心望簡書何當玉堂客脫此馬秋夜卧榻鋪筠簟風簷遞晚涼雲枯􅉼旱氣星爛射寒芒鍾鼓寒更永乾坤夜色蒼時危關百慮低首拊空床出門因酒敗佳意方知百拜輕忘機甘李喻重賦赤霄行踈拙傷吾性傾危見俗情出門山氣好秋色浪峥嶸挽真定史二相君憑鳯攀龍起貂蟬奕世侯九天資嶽牧一夢忽山丘陵劒驂停魯相輈八州遺愛在滹水日東流挽武安道故失邯鄲步憂分陋巷簞持身心巳亂得病衆知難夜月琴絲暗秋風旅殯寒人生罹此極命矣復何嘆壽雷彥政南渡衣冠後如君不數人氣􅉼渾水秀色映塞垣春靈沼儀周鳯商郊獲魯麟壽杯傾菊露同拜倚門親去歲龍沙月流光共薊門寒華驚晚節客舍壽明樽取友襟期在傳家命脈存今年秋色好笑語北堂溫白松霍嶽祠南寺竒松勝所聞孤根生得地衆木逈雖霜雪封琪樹丹青變錦紋山靈應見惜時與護晴早發泓芝驛西邁經猗頓鳴珂夜半過天低平卧斗野逈陡赤日三庚伏紅塵兩鬢皤老懷多故禹廟廟在安邑故城內甲十九日點視玉帛中天會謳岡負黃雲表台愛極憐烏周幹臣詩韻和近得間中趣都無俗物侵風霜驚老鬢道德負枕倦書橫膝庭虛樹有隂殷勤周吏隱時遣道清和秋漲二首泉峪從共會奔流到衛雄新詩來幕下歸興滿舟取少陵胡為只合例怒捲濤山北雄吞海若東我思泛舟役氏泛舟之役輕惜幾千功謂太宮之木順流而下兩後聞溪漲先聲噴簿來氣嚴千騎駚波急萬窠回終古朝宗去神功念禹開寄言歸義子欵塞莫遲徊題有趙義士三侯祠雙冢連遺廟風雲擁義壇難興忠可壯事集死尤難烈日丹衷皎青山白骨寒一杯來酹祭用激懦夫肝禱兩孚惠靈祠夜半清源道來伸禱兩誠壝圜形覆釡泉邃碧為泓霸業開三晉風煙暗九京一杯臨水坐便欲濯塵纓慶王丈子夀八秩之夀遺愛汾西政耆英故里居期頥八十夀精健五旬餘捨䇿春流憩龕燈夜注書更憐溫清際蘭玉滿庭除奉酬紹開外郎畫省胡貟外都城憶昔逰分携無半載渴仰若三秋巳辦催科拙寧煩任智憂何當償宿願相望兩山州星子鎮道中北下星關道川開百里寬夢殘傾錦帢吟細緩征鞍土峽深回洞山田疊醮壇一杯亭傳酒來為敵霜寒題柏璧鎮峽古疑天設營空故壘存捐金行楚問力戰決齊吞馬足沾霜健山煙漲日昏治安誰有䇿一笑出關門夷齊墓逺避東鄰虐還遮北伐頻與天重立極叩馬死成仁落日悲歌壯東風紫蕨春一飢雖可療終愧是商臣舜井廣孝銘遺井千秋仰有虞側微多在困捐浚失之誣喬木非三代雲煙接兩都依依風樹感不待露霜濡河中歷按河東道蒲津勢最雄河山全晉鄙土俗半秦風野日連墟壘孤煙認佛宫論功無渾馬極口説先公登歷山聖人嶺形勝開三靣臨觀醉魄醒松悲虞泣涕石老象頑冥澗水縈瓜蔓荒山卧虎形野人無所解尊禮九真靈跋運使張君會琴圖雪徑尋無路東林素有期琴絲凍欲折風袖曉還披偉觀疑韓愈幽林付頴師無由陪杖屨只悟盡中詩田間斜日秋瓜圃雲間兩過𥘉平疇交晚吹涼意滿輕𥚑草木浮元氣河山擁草廬拊心欣有得重展故人書雲帶山籬簿溪橫舍屋斜卷懷忘仕版作苦事田家踈散藏吾拙敷榮眷物華晚涼沙岸靜植杖自耘瓜漠漠西山兩東來意甚徐潤深滋厚壤灑密下平蕪巢燕歸飛急林鳩得雨呼有金堆積斗能救暵乾無遇萬泉縣今廢縣倚孤山碧岡圍落照紅一丘歸慘淡千室想豐融絶澗縈樵徑懸崖半土空物繁耕壤狹寧得不唐風秋澗先生大全文集卷第十二
