body:
  text: 誠説堂三牲致養應為易楊子怡親志所難滿抱忱誠無少慊一杯菽水見真歡詠歌豈取時人譽溫清思貽後嗣看想得歲時稱慶處春風香藹紫庭蘭史宣慰子明友松亭詩壯歲英威大樹馮老依松翠飬襟靈秋聲幾泛投壷唱偃蓋空懷倚杖形華屋丘山驚夢斷玉堂編簡為君青千年貞魄棲修幹不信龍泉閟夜扃壽張左丞子友甲午正月十六日箕尾儲精一氣氲仰看風骨秀而神青宫羽翼風雲舊黃閣調和鼎鼐新若論救時非易得與同熙載更誰親一杯重為君矦夀紅藥階前要好春春坊璧月桂瓊枝人物風流映一時四海蒼生欣望愜兩宫和氣對時熙西池進讀霑殊遇東閣追攀辱舊知此日夀君冝有頌載歌針警武公詩供職詞林已四年今春添壽倍增妍詩如東閣梅花細人在春坊璧月圎漢業翼成無迹考遂𥘉亭暖覺春先沙堤有語蒼生福好在論思拱御筵今歲調元事體新風雲開闔入經綸兩宫受賀安磐石萬國歸心有老臣相業儘高麟閣讃醉吟時到野亭春五雲深處台星爛長見清光拱北辰甲午歲正月二十三日右丞何公麟華旦謹奉唐律二章介眉夀婆娑一畝隂貞姿不受歲寒侵侍謀東閣時情協養浩南窗夜氣深間縱詩懷穿理窟靜觀犧易見天心百觚剩有春風釀重為明時要細斟叢臺袨服士如雲又見聰山一氣春帷幕細談天下事典刑渾是老成人詩來東閣梅花細歌入民謡漢法新健羡武公冝自警太平勳業畫麒麟過左副賈相公新阡左副新阡何處尋祁陽東北望喬林連城政美無瑕璧萬卷書多遺子金冠劒圖形凌閣重風煙埋恨石麟深峴山欲墮豐碑淚桃李公門緑滿隂彭澤二賢堂為江州周使君賦斂裳宵逝無三月待臯鳴琴蒲五年與論行藏元有異比量心事本同然浴光力取虞淵日示貶忠凝甲子編千古新祠祠下月不應獨照二公賢謂分光於使君也李清甫分齋鷃飛不過丈尋間鵬翼雲垂九萬摶每自忖量彛秉外就中增損一毫難洗心俠習從多可放眼青天有逹觀拈取榜齋才隻字此身還有泰山安送表弟雲卿經歷赴上都先時韓壽院判仲常詩有通介不隨新進士虀鹽依舊老書生之句大為王君稱賞及北行仲常用元韻餞贈韓持詩見示亦請豫依韻相送因勉為賡賦樞庭機務貴謀成調議中間執倚平經事莫深吾弟慮臨機能盡上官情正煩幕畫孤忠壯肯著車輪角生明日馬頭新店路居庸山色照吟觥秋曰宴廉園清露堂并序右相康公奉詔分陜七月𥘉一曰宴集賢翰林兩院諸君留别中齋有詩以記燕衎因繼嚴韻作二詩奉平章相公一粲時坐間聞有後命故詩中及之何處新秋樂事嘉相君絲竹宴芳華風僯柳弱婆娑舞雨媚蓮嬌次第花照眼東山人未老舉頭西日手空遮賔筵醉裏聞佳語喜動金柈五色瓜頷聮一作高雲錦席翻涼吹翠蓋紅粧簇藕花朝野歡娛到靖嘉五年經制見金華先聲逺動秦川樹後命光融紫禁花歸騎不妨沙路晚留中恐為國人遮暗用司馬端明留臺西洛事自慚忝列絲綸地憔悴秋風一繫瓜德壽殿玉方池研理宗所御德壽殿為太上皇後所居殿緝熙講理殿也硯即碧絲歙玉斫坤形霮四溟丹書猶認壽宫名紛紛落墨騰蛟霧淅淅秋風拉瑟聲神物不知崑火烈碧絲今對玉堂卿眼中多少興亡事白髮孤臣最愴情當時同僚承旨留中齋學土劉東崖侍讀趙方塘皆宋人也甲午秋七月九日扈山約赴李君水芝之會豫以事不克往明日例徴詩因繼中齋韻陪京秋早物華清杖屨迎秋出綺城蓮社與吟千葉白盤餐非為五矦鯖眼中閣老何瀟灑意外浮名任易更唯有柯山山上月歸心同照石梁橫飛蓋追隨野興清冷煙踈雨濕層城兩舷踏足空蓮唱大嚼過門得鼎鯖錦席髙雲增爽朗秋風殘暑喜交更竹西歸晚留餘思詩在夕陽淡處橫為周紫岩賦冬日牡丹蘇州人右聀出身新簽兩浙行省事中齋索賦翦翦江風十月霜寒梅時序見花王一枝重薦金盤瑞滿幄濃薰麝粉香協氣暗扶忠莭壯名葩來伴紫岩芳故園從此恩光爛卷裏題詩半玉堂再繼前韻贈中齋承旨先生襟韻氣之清開府歸來客薊城雅集不知河朔飲名談有味德麟鯖歸心落曰常躑躅世事浮雲任變更夢到柯山山上月流光還愛石梁橫賀梁參政升拜左轄故都喬木百年春纍葉簮纓得相君馬出渥波騰逸氣豹藏玄霧見竒文十年佩玉何清響一見英標勝素聞剩説鼎調多至味兼收時到野人芹題奉常李謙甫歸覲詩卷十載馳書望玉關一朝羅拜喜生還溫顔孺慕猶親側秉燭相看似夢間棣蕚香凝薑被暖故鄉誰羡錦衣班鶺鴒庭樹春多少車馬西行揔詔頒一首句四十年阻離殊城喜生景一蕚韡承餘宴樂錦衣誰夢照卿國賀唐承旨新堂落成碧雞華構喜新成軒瑣虗明夜白生花影入簾詩思淑琴聲當户月華清人生孰若安居樂樽酒重尋雨盟不作老張輪奐頌玉堂青議正煩卿甲午八月一曰赴李揔𬋩蓮溏之會坐中走筆賦此斗酒𥘉醺倚畫欄藕花紅映万珠盤野煙髙柳吹衣濕碧落銀河照眼寒老去自知情味減興來思盡故人歡相逢一笑真難得况復君矦禮數寬諸人酬詠既已復和前韻垂枊橫橋轉赤欄望中清興散愁盤玉淵堂逈山光碧秋水臺髙午景寒爛熳不知前日會唱酬當記此時歡平生肝膽向人盡不是悲秋強自寬甲午中秋日宴同簽洪公東第賔僚集賢翰林兩院而已將暮雲隂四合既歸月明如晝偶賦此詩且記盛筵三首今年秋夕賞心何絲竹堂深間雅歌三院盍簮都下少四筵登味海東多休辭皂蓋停車轂盡倒清樽待月娥兩袖桂香翻未盡更憐歸路影婆娑赤囊無騎海無波今歲中秋樂事多為愛頥軒吟興逸來陪詞客醉時歌紅雲照眼瞻天近白髮欺人奈老何連夜暮歸驚夢異林間金背看陂陀梢梢英氣秀橫秋此日青雲接燕逰賓府笑談詩禮帥故家人物鳳麟洲為憐桂影饒清賞歸避金吾怯晚留為見頥軒殷厚意更將遺興較詩籌題髙和甫侍郎先世圖譜後故都喬木幾蒼蒼髙氏宗支慶緒長兩世簪纓登相府百年忠孝見諸郎解紛晉漢多隂積斂衽韓劉避耿光十襲寶藏防墜佚衛公遺物要同芳送東崖學士總尹建昌軍九月十三日待詔詞林整十年黃金橫帶列朝班紅雲黼扆瞻天屢白晝鄉關著錦還顔筆謝詩增曠逹銅陵碧澗夢躋攀殷勤華子岡頭月先借清光浣别顔遊水峪雨沐山容曉更鮮峪深行入洞中天林間石碇傳經鉢嶺崦雲封種玉田世味酸鹹誰自信人生聲利古難全道人歸潔冝諳此抱石歸來煮夜泉今秋山北迓回鑾偶淂新詩記往還臣子要知吾分在功名休問老天慳滿軒光寵居庸道兩袖風煙水峪山同見同遊又同樂從容恰及一旬間過誨之髙兄新居髙子幽居逺若村北城城下栁藏門寒因霜早收梨栗貧喜家安遺子孫間裏有詩渾漫興客來止酒對空樽自慚過訪成踈曠戀戀相看到日昏為洪同簽書諸公中秋燕集詩卷因題于後詩靉靉碧空雲一樣書來更可人落墨空翻黑清呤真有鴨江春雞林取重吾何有樞相知音世罕倫還笑愛鵝王內史寫經時與羽流親壽泉平章兩朝元老漢刑儀宣室深香侍受釐博識不遺三篋祕拜公應較十年遲敢從汗簡聮清秩喜為裁詩薦夀巵瀚海緑波三百曲歲浮春色上芝眉壽董承旨正月十一日百觚春酒遐年壽千首新詩二品官窮達不為身外計功名儘向後來看細圗野隱明歸志靜撫孤松愛歲寒此日稱觴冝有頌兩宫恩眷古為難送縉雲教官伯讓之任瀏陽仍和見贈韻縉雲遙裔以才聞逺任長沙吊楚臣論學拜官甘冷職過門求益有斯人道傳伊洛真吾事詩到齊梁恐後塵領取漢家聲教去六經何地不陽春元貞二年丙申元會曰大雪万寶陳庭未是竒千官朝處玉為墀靜看整整斜斜態不礙蹌蹌濟濟儀法部氣嚴催箭舞御爐煙淡濕鵉旗小臣歸美豐年慶不數元和賀雨詩送省掾李希顔隆興總判西京人春水延芳扈從辰笑談鞍馬見情真幾年畫省含香掾一日公堂入幕賔政異莫如官事簡心丹回夢帝城春古稱四海皆昆弟灑落如君有幾人題彭夀之慶八十詩軸竹色宫墻野粉黃百年遺老見張蒼青雲仕宦思昔白髮光隂在故鄉步健不知鳩杖徑眼明猶炯竹書光若從九老徴遺事好著丹青畫寶坊大賢詩三首并序甲午歲正月草二日癸已偕翰林諸君謁太傅伯顔公於東城甲第之北堂公姿威不見猛簡不失和真魁傑人也公𥘉至燕首詢諸何右轄曰翰林諸老今在者誰及是厯問各官夀期今供何職酬禮間顧相謂曰朝家所以養諸老者正以乞言論政而巳如事會議各顧官守未免或偏若集之同僚則議論通一所益良多某曰前丗立益政院者正此意也中丞崔相亦以為然乃知公深謀逺至氣量含弘朝廷之上軍國大計心無或不在所謂大臣以道事君者也既而公出衆俟門屏間遣純綱來謝曰不敢多勞遂退因淂大賢詩一首紀其披覩之快後二年公府掾張楚持畫像懇豫哀挽既書鄙辭載惟疇昔情有不能已者且念六合雖一相業未展天不愁遺哀斯民之不幸也噫因附録于後萬馬龍驤宿漠陲朔雲邉雪避旌麾麟逰近藪人歌瑞虎在深林氣甚夷解甲齊山降宋日鞠躬趍陛入朝時有懷不盡蒼生事空詠皮公七愛詩使華來自海西邊一日風雲擁將壇仁信有餘收戰格旌麾不動下臨安應憐文武匡時切忍對麒麟畫像看不獨臨淮開府掾追思勳德淚闌千軍容機政兩儀刑自有胸中節制兵直道事君忘智勇丹心為國儘忠貞風雲感會千年契笳鼓歸來六合清遙想翠華秋獮際聖情凝佇聽鼙聲異菊圖一枝十花容色各異未之見也故賦枉説重巖細菊班連眉十樣更清妍不辭老圃秋容淡要見花神景氣偏越被香濃薰百和柴桑人去巳千年醉吟不用江州白此日東籬得董仙百品流芳見巳稀一枝獨秀更堪竒秋陽借暖留三徑翠袖分香列十眉竹外晚粧眀閣院月中青女要新詩繁華凄斷長沙夢畫裏淵明又一詩聞友人買犀帶聞君饒價買犀躔似為精神見老年論品要勝華衮異垂腰猶欠玉魚懸通天即是裴公賜素髮其如白傅顛留取百錢休妄費安排開歲置貂蟬贈瀋州朴生子溫踵門來謁樂新知自説容城指授師孤鶴逺從華表下六經都向管中窺西山掃墓懷私叔東郡趨庭儼聖恩莫把一簞顔氏樂春風吹作錦囊詩送總統佛智師南還釋教總統佛智大師姓積寧氏名沙囉巴華言為吉祥慧也西番人祖相嘉屹囉父沙囉觀以象胥主譯諸經至師八世矣師早侍帝師彂思巴受知先朝精詳內典又喜儒書樂與吾屬遊元貞𥘉選師為江浙總統眀年率諸山長老入覲獲侍清燕啓沃一言煦燠三吳同熙大覺未歸江東父老投牒行臺趣師南還將行以贈言為榮因賦是詩以送白足毗耶不易逢鬢絲禪榻偶相同經耒震旦三千界人在天龍八部中滿送酒船浮北海細薰香霧供南豐江東父老催飛錫要沸潮音與海通與梁揔判楊少監武子劉揔管叔謙會梁都運髙舍别墅夜話帳中樂怡怡也梁君索詩因書此以答雅意元貞三年二月十八日也問字嘗思過子雲一樽梁墅喜情親清燈夜話逢知友喬木蒼煙憶世臣野水添杯無盡藏矦門儲慶有餘春五枝休數燕山竇黃閣經綸見秉鈞挽子敬楊君終唐州知州子格母弟青血陂陀閟夜泉鶺鴒庭樹巳瀟然一樽卺飲留情話五馬長歸是别筵黃壤冷埋林下璧緑坡空泛幕中蓮息軒未覺風流逺行見吾彪歷試年送李敬甫之任靖江揔管海山蟠亘十州環桂嶺西南隘漢關吾子有材稱吏治土風從古號時慳老天形勢開炎德赤子龍蛇雜洞蠻交致恩威民事了䨥旌歸早慰慈顔呈髙麗世子霞綺紅潮鴨緑清風姿渾是父王英禮文曲折猶周制脂澤􅉼濡見漢甥衡宇接談今日欵中堂陪宴嚮來情鳯凰池上應回憶慚愧朱絃一再行冬日海棠玉環朝醉緑雲鬆足幽軒不信冬春色暖私神草異丹砂重見海洲紅銀釭侍寢留髙照青女憐嬌偽動容似與方平慰親老金盤佳品不教空夀唐承旨母王氏承旨五六嵗授孝經論語於母氏教子堂深映謝幃碧梧停鵠發英㽔燕脂點額猶宮樣懿範齊家備母儀香裏鵉花回紫誥雪封梅信動橫枝百年好在升堂拜歲嵗分香入夀危慶王彥舉太夫人九秩之夀花栁西池點翠妍婺光曽現竹宫煙年髙賜幣承恩重子孝能忠見母賢女誡看耒形管煒雲花行墮誥鵉鮮風流九十人間福才是平頭第一篇和樞院王仲常雪詩嚴韻龍武新軍宿禁墻鐵關風急走降王雅歌望絶皇華使朔雪春回黑帝祥四海同風有今日九天清吹表戎行兩宫和氣春如水併捲流霞入夀觴夀王仲常院判顴骨清竒類左山紅雲香軟侍天顔處心久在升沉外著我何妨伯仲間密學潛隨宣底轉新詩清與化機間太平有象邉聲靜醉聽長歌入漢關題節婦寧氏手卷蘭有幽姿竹有筠秋霜庭户藹清芬誦詩巳矢靡他節在禮𥘉無再醮女蟋蟀聲寒思曉織莙嵩魂黯􅟵孤墳楚王祠下秋原逈消得旌書倚碧雲贈髙麗樂軒李參政甥朴學士中統𥘉豫載筆中堂嘗陪先相文會且有唱和今覩髙標曰暮懷人不覺慨歎因賦是詩為贈情見乎辭鴨緑江頭老謫仙醉中吟諷得微言當年翰學推賢相此日高風得樂軒白雪陽春元寡和翠鵉朱鳯看同翻鴨江秀色雞林筆歲歲封章入紫垣題保定醫學劉教授慶八十詩卷八秩光隂積慶多笑看金狄手摩挲前知來事疑思邈集驗儒門似子和藥籠功名間等第醉鄉風月飽經過雞川如畫郎山秀好在春風十二窠和贈髙麗鄭學士詩韻豹管潛窺見異姿雞林詩好動京師恩深自比滄溟濶國小方姿莭相毗寶瑟聽來多雅唱人生樂處是新知蓬山歸到梅花在千樹清香醉拾遺和雪中鄭朴二學士金司業來訪詩韻風雪長安撲玉塵詩成驢背欲誰親海東遊子興不淺醉裏微言語更真膜拜尚思瞻國老過門今喜得陶賔人生適意無南北宫錦淋漓未厭頻挽馮廉副夀卿友契漢署千官列兩曹當時儀物聳清標鞶囊議事驚孤注霜簡摧姦見六條樂府名香金鳯曲揚橋風細月明簫雪崖遺恨埋千古大樹風悲日寂寥養志堂詩為前江西省郎中孫居仁字甫作高唐人幾年臺省列清班作聖門垂教色為菜子嬰嬉舞褎班遊刃恢恢政務間順志如詹推致養為親捧檄即承顔餘歡方在恩榮際純孝𥘉非口躰間開卷諸公足歌詠自今錫類滿鄉關髙麗國王謝事詔丗子嗣位東還詩以送之禁臠東牀得象賢遠持龍節赴真傳靜看麗海風雲契更覺天東雨露偏萬里寵光隆帝館三韓春色入吟鞭百年藩屏敦姻好合有忠精在日邉秋澗先生大全文集卷第二十二
