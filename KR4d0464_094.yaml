body:
  text: 秋澗先生大全文集卷第九十四玉堂嘉話卷之二看古玉器當解其刀刻碾刻者刀刻為上碾與刻蓋相去其逺丞相史公嘗收太康墓中玉環名曰泥湫龍係昆吾刻也磨李廷圭墨法啇台符嘗云向抄合萬户用聚星玉版研磨李庭圭墨求木菴書研為墨所畫木菴亟止之曰用李氏墨有法若用一分先以水依分數漬一宿然後磨研乃不傷研論硯先觀其石性麁細枯潤不必須有眼者其膩潤視之有紫芒而不拒筆者即端之佳者也看畫當觀其氣次觀神而畫筆又次之用􅃮點睛朱砂紅石緑者皆唐畫也豫嘗觀閻立本老子西升如此許魯齋云古人看漢書皆有傳授不然有難曉者豈律歷天文之謂乎太康冢或云漢梁孝王墓或云晉何曽墓以下里物色考之皆恐非也豫向與吳教授會真定因及此吳曰此晉司馬文王陵也曰何據吳曰昔居太康時冢前有廟晉文王祠至田夫野叟皆以文王呼之及發其龜璧皆刻南征並夀之字以史考之文王南征數矣豈其然歟鹿庵先生曰前漢列傳多少好樣度於後插一銘詞篇篇是箇碑表墓志作者觀此足矣不必它求曹南湖亦嘗説作銘辝法度謂如一人有數事好處取其重者論之及詳史漢論贊其原蓋出于此坡詩雖二十宇者皆有莫大議論歐公文尊經尚體於中和中做精神鹿庵曰文章以自得不蹈襲前人一言為貴曰取其意而不取其辝恐終是踵人足迹俱不若孟軻氏一字皆存經丗大法其辝莊而有精彩也南湖又云非莊無以雄其辨非騷無以清其氣豫嘗問匡衡相業於先生先生曰汝以為何如曰學術有餘而忠蹇不足先生為肯首地震説周語伯陽父曰陽伏而不能出隂迫而不能蒸於是有地震孔朝云陽氣伏於隂下見迫於隂故不能升以至於動以地道安靜返動為異也又靈臺祕苑云地夲於隂而生万物其形至厚其德至靜定而不動者也若匆震動是謂臣強陽伏而不能出隂迫而不能入隂有餘也若外戚擅權后妃專政則土為變異小人用下有謀及民擾則地震其分多兵飢若動於宗廟宫庭或動而不已者國有叛臣讒侫並進大臣數動誅罰不以理而上下不相親或政在女子或秋行冬令則地裂若裂而有聲四方不寧地忽陷乃專政民離散亦為失地若火燃者乃為陽精地為隂主若或燃則越隂之道行陽之政傷而不克之象臣專恣而終以自害也若地忽生毛為金失其性人將勞役又漢應奉云人氣內通則感動天地天變見於星氣日蝕地變見於竒物震動者陽用其精隂用其形猶人之有五臟六躰五臟象天六體象地故臟病則氣色發於面體病則欠申動於貌前丗術者乃以日辰分配國土為占歲日月時辰及見災所在之地皆同用之又有只以日時相加為占者如漢成建始三年日蝕地震杜欽云殆為後宫何以言之日以戊申蝕時加未戊未土也土者中宫之部也其夜地震未央宫殿中今本朝大臣無不安之人外戚無乖刺之心諸侯無強大之國四方無逆理之節此必適妾將有爭寵而相害者其法甲為齊乙為海外東夷丙為楚丁為江淮南蠻海岱戊為韓魏申州河濟巳為韓魏庚為秦辛為華山巳西之國壬為燕趙衛癸為常山巳北北方之國子為周丑為翟魏亦主遼東寅為趙楚卯為鄭辰為晉邯鄲趙巳為衛午為秦未為中山梁宋之國申為齊晉魏酉為魯戌為趙吳越亥為燕天鳴有聲人主驚憂而百姓勞失厥土五福太一所在每歲須利一事大斿三十六年一交十二年司天十二年司地十二年司人小斿三年一交大斿所在天開眼小斿所在人相食巳上皆東平立星劉明之説如此日月徑一千里周三千里何以知之曰周天三百六十有五度以太陽日行一度考之則知矣周公以陽城土圭測日自王城四面去千里則減一寸凡日食於窗隙間穿𥿄如錢許取影視之可見食之多寡東缺則西見西缺則東見樞府典故唐𥘉典兵禁中出於帷幄之議故機密名官開元中設堂後五房而樞密自為一司其職祕獨宰相得知舍人官屬無得預也貞元之後藩鎮旅拒重以兵屬人乃以中官公領左右神䇿軍而樞密之職歸於北司然常寄治省寺廡下延英會議則屏立殿西勢猶厭厭傳道宫省語而已至其盛時其貴者號中尉次則樞密使皆得貼黃除吏唐末乃除北司并南北軍于樞密使遂總天下之兵五代以來多以武人領使而宰相知院事至宋復置副二簽書直學士之名大略文武參用間以宰相兼領故得進退大吏預間機政其任職蓋重矣西使記壬子歲皇弟旭烈統諸軍奉詔西征凡六年拓境幾萬里己未正月甲子常德字仁卿馳馹西覲自和株出兀孫中西北行二百餘里地漸髙入站經瀚海地極高寒雖暑酷雪不消山石皆松文西南七日過瀚海行三百里地漸下有河濶數里曰昏木輦夏漲以舟揖濟數日過龍骨河復西北行與别失八里南以相直近五百里多漢民有二麥黍榖河西注瀦為海約千餘里曰乞則里八寺多魚可食有碾磑亦以水激之行漸西有城曰業瞞又西南行過孛羅城所種皆麥稻山多柏不能株絡石而長城居肆囿間錯土屋窗户皆琉璃城北有海鐵山風出往往吹行人墮海中西南行二十里有關曰鐵木兒懴察守關者皆漢民關徑﨑嶇似棧道出關至阿里麻里城市井皆流水交貫有諸果唯瓜蒲萄石榴最佳回紇與漢民雜居其俗漸染頗似中國又南有赤木兒城居民多并汾人有獸似虎毛厚金色無文善傷人有蟲如蛛毒中人則煩渴飲水立死唯過醉蒲萄酒吐則解有嗅酒孛羅城迤西金銀銅為錢有文而無孔方至麻阿中以馬撁拖床遞鋪負重而行疾或曰乞里乞四易馬以犬二月二十四日過亦堵兩山間土平民夥溝洫映帶多故壘壞垣問之蓋契丹故居也計其地去和林萬五千里而近有河曰亦運流洶溝東注土人云此黃河也二十八日過塔刺寺三月一日過賽藍城有浮圖諸回紇祈拜之所三日過别石蘭諸回紇貿易如上巳節四日過忽章河渡船如弓鞋然土人云河源出南大山地多産玉疑為崑崙山以西多龜蛇行相雜郵亭客舍甃如浴室門户皆以琉璃飾之民賦歲止輸金錢十文然貧冨有差八日撏思千城大而民繁時羣花正坼花唯梨薔薇玫瑰如中國餘多不能名隅城之西所植皆蒲萄粳稻有麥亦秋種其乃滿地産藥十數種皆中國所無藥物療疾甚效曰阿只兒狀如苦叄治馬鼠瘡婦人損胎及打撲內損用豆許咽之目消曰阿息兒狀如地骨皮治婦人産後衣不下又治金瘡膿不出嚼碎傅瘡上即出曰奴哥撒兒形似桔挭治金瘡及腸與筋斷者爵碎傅之自續餘不能盡録十四日過暗不河夏不雨秋則雨溉田以水地多蝗有鳥飛食之十九日過里丑城其地有桑棗征西奧魯屯駐于此二十六日過馬蘭城又過納啇城草皆苜蓿藩籬以柏二十九日殢掃兒城山皆鹽如水晶狀近西南六七里新得國曰木乃奚牛皆駝峯黑色地無水土人隔山嶺鑿井相沿數十里下通流以溉田所屬山城三百六十巳而皆下唯擔寒西一山城名乞都不孤峯峻絶不能矢石丙辰年王師至城下城絶髙險仰視之帽為墜諸道並進敵大驚令相大者納失兒來納欵巳而兀魯兀乃算灘出降算灘猶國王也其父領兵别據山城令其子取之七日而陷金寶物甚多一帶有直銀千笏者其國兵皆刺客俗見男子勇壯者以利誘之令手刃父兄然後充兵醉酒扶入窟室娛以音樂美女縱其欲數日復置故處既醒問其所見教之能為刺客死則享福如此因授以經呪日誦蓋使蠱其心志死無悔也令潛使未服之國必刺其主而後巳雖婦人亦然其木乃奚在西域中最為凶泳永旱威脅鄰國霸四十餘年王師既克誅之無遺類四月六日過訖立兒城所産蛇皆四跗長五尺餘首黑身黃皮如鯊魚口吐紫艷過阿刺丁城禡咱蒼兒人𬒳髮率以紅帕首衣青如鬼然王師自入西城降者幾三十國有佛國名乞石迷西在印毒西北蓋傳釋迦氏衣鉢者其人儀狀甚古如丗所繪逹摩像不茹葷酒日啖粳一合所談皆佛法禪定至暮方語丁巳歲取報逹國南北二千里其主曰合里法其城有東西城中有大河西城無壁壘東城固之以甓繪其上甚盛王師至城不一交戰破勝兵四十餘萬西城陷皆盡屠其民尋圍東城六日而破死者以數十萬合里法以舸走獲焉其國俗冨庶為西城冠宫殿皆以沉檀烏木降真為之壁皆以黑白玉為之金珠珍貝不可勝計其妃后皆漢人所産大珠曰太歲強蘭石璱璱金剛鑽之類帶有直千金者其國六百餘年傳四十年至合法里則亡人物頗秀於諸國所産馬名脫必察合法里不悅以橙漿和糖為飲琵琶三十六絃𥘉合法里患頭痛醫不能一伶人作新琵琶七十二絃聽之立解土人相傳報逹諸胡之祖故諸胡皆臣服報達之西馬行二十日有天房內有天使神胡之祖葬所也師名癖顔八兒房中懸錢絙以手捫之心誠可及不誠者竟不得捫經文甚多皆癖顔八兒所作轄大城數十其民冨實西有密乞兒國尤冨地産金人夜視有光處志之以灰翼日發之有大如棗者至服達六千餘里國西即海海西有冨浪國婦人衣冠如丗所畫菩薩狀男子胡服皆善寢不去衣雖夫婦亦異處有大鳥駝蹄蒼色鼓趐而行髙丈餘食火其如升詐其失羅子國出珍珠其王名襖思阿塔卑云西南海也採珠盛以革囊止露兩手腰絙石墜入海手取蛤并泥沙貯于囊中遇惡蟲以醋噀之即去既得蛤滿囊撼絙舟人引出之往往有死者印毒國去中國最近軍民一千二百萬户所出細藥大胡桃珠寶烏木雞舌賓鐵諸物國中懸大鐘有訴者擊之司鐘者紀其事及時王官亦紀其名以防姦欺民居以蒲為屋夏大熱人處水中巳未年七月兀林國阿早丁算灘來降城大小一百二十民一百七十萬山産銀黑契丹國名乞里彎王名忽教馬丁等灘聞王大賢亦來降其技里寺大城獅子雄者鬃尾如纓拂傷人吼則聲從腹中出馬聞之怖溺血狼有鬃孔雀如中國畫者唯尾在翅內每日中振羽香貓似土豹糞溺皆香麝如鸚鵡多五色風駝急使乘日可千里鵓鴿傳日亦千里珊瑚出西南海取以鐡網高有至三尺者蘭赤生西南海山石中有五色鴨思價最髙金剛鑽出印毒以肉投大澗底飛鳥食其肉糞中得之撒八兒出西海中蓋玳玳之遺精蛟魚食之吐出年深結為價如金其假者即犀牛糞為之也骨篤犀大蛇之角也解諸毒龍種馬出西海中有鱗角牡馬有駒不敢同牧騮馬引入海不復出皂雕一産三卵內一大者灰色而毛短隨母影而走所逐禽無不獲者壠種羊出西海羊臍種土中溉以水聞雷而生臍系地中及長驚以木臍斷嚙草至秋可食臍內復有種又一胡婦解馬語即知吉凶甚驗其怪異等事不可彈紀往返凡一十四月郁歎曰西域之開始自張騫其土地山川固在也然世代浸遠國號變易事亦難考今之所謂瀚海者即古金山也印毒即漢身毒也曰駝鳥者即安息所産大馬爵也密昔兒即唐拂菻地也觀其土産風俗可知己又新唐載拂菻去京師肆萬里在西海上所産珍異之物與今日地里正同蓋無疑也中統四年三月渾源劉郁記堂叔伯者是並父之兄弟也父之姊妹謂之女叔女弟鄂王嶽飛諡忠穆文主耳忘身兹謂人臣之大節諡以表行必稽天下之公言申錫贊書追告幽穸故太師追封鄂王諡忠穆嶽飛威名震於夷狄智略根乎詩書結髮從戎前無堅敵枕戈勵志誓清中原謂恢復之義為必伸謂忠憤之氣為難遏上心密契詔札具存夫何權臣力主和議未究凌煙之偉績先罹偃月之隂謀李將軍口不出辭聞者流涕藺相如身雖巳死凜然猶生宜高皇眷念之不忘肆孝廟哀矝之備至還故官而禮葬頒祠額以旌褒逮于先帝之時禭以真王之爵既解誣於纍聖可無憾於九京然而易名之典雖行議禮之言未一始為忠愍之號旋更武穆之稱朕獲覩中興之舊章灼知皇祖之本意爰取危身奉上之實仍采克定禍亂之文合此兩言節其一惠昔孔明之志興漢室若子儀之光復唐都雖計效以或殊在秉心而弗異垂之典册何嫌今古之同符賴及子孫將與山河而並久英靈如在茂渥有承鹿庵先生曰作文之躰其輕重先後猶好事者以盡娛客必先示其尋常而使精妙者出其後豫偶悟曰比倒食甘蔗之意也作文字亦當從科舉中來不然豈唯不中格律而汗漫披猖無首無尾是出入不由户也又云後學雖不業科舉至於唐一代時文律賦亦當披閲而不可忽其中躰制規模多有妙處二王行書其蜿娫欹傾之狀若行雲流水似不拘於律然即於筆意求之其端莊流離皆有餘韻唯具眼乃能識之鹿庵先生嘗以歷代史學誠問於不肖惲對曰自史漢而下文字率猥併無法如新唐書雖事增於前辝省於舊字愈竒而氣愈索不若新五代一唱而三歎有餘音者矣先生為欣然南方之地物香而人臭或者謂飲食致然與草木之氣所奪故也豫曰不然四方者乃中國之隂也陽為馨香隂為臭穢四方氣偏不得中和之正故香臭異常辛殿撰小傳棄疾字幼安濟南人姿英偉尚氣節少與泰安黨懷英友善肅慎氏既有中夏誓不為金臣子一日與懷英登一大丘置酒曰吾友安此余將從此逝矣遂酌别而去既歸宋宋士夫非科舉莫進公笑曰此何有消青銅三百易一部時文足矣巳而果擢第孝宗曰是以三百青鳬傳吾爵者乎其為授觀文殿􅱗撰及議邊事主和者衆公曰昔齊桓公雪九丗之耻春秋韙之况我與金人不同戴天讎邪今日之計有戰伐而巳時丞相托胄當軸與公議合自是敗盟開邊用兵於江淮間者數年公方為居多開禧二年除知紹興府至陛辝復以金人亂冝亟攻為言辝情慷慨義形於色繼托胃再議恢復乃以樞密都承旨召公於越中道以疾學道號稼軒土今女集中壽南澗翁者蓋托胄也𥘉公在北方時與竹嘗遊泰山之靈巖題名曰六十一上人破辛字也至元二十年豫按部來遊其石刻宛在聖上御極十有八年當至元十一年丙子春正月江左平冬十二月圖書禮器並送京師敕平章太原張公兼領監事尋詔許京朝官假觀子遂與左山啇台符叩閣披閲者竟日凡得書畫二百餘愊今列于左王羲之四月忱四十字獻之三帖一洛中二佳音三北問王羲之與謝安石評書帖後跋云古人作字悉平生用功安有不絶出於右今者邪羲之與安石冠王謝首所爭若此况它哉蓋帖中有云自於山谷中臨學鍾氏張芝等書二十餘年竹葉樹皮山石板木不可知數至箋縠藤紫反復書之佳者收採自書皆記不能得而云此公何時用功夫深不達耳獻之鄱陽帖右軍威略帖八十二字入梁唐御府至宋入蘇大簡家崇寧癸未襄陽米芾審定真迹其圖書有祕玩手臨智永禪師臨右軍四帖後東坡跋六書如聽響切胍知其美惡則可謂必能名之者過也豫觀祕閣墨迹皆唐人硬黃臨本但得臨本皆可蓄惟鵝群一帖似是獻之真筆熙寧五年子瞻書禇遂良臨黃庭南唐升元三年裝褙紙則黃硬米芾學右軍書并論其筆法後一幅亦學右軍書退之詩俗書趂姿媚此公不為石鼓發想亦見此等物耳獻之草洛神賦𥿄極殘缺向明視背萬綻縱橫謝安東山帖右軍快晴帖米襄陽臨本蘭亭五言帖后跋云唐虞世南臨夲晉王恬帖三十一字晉王敦帖作草聖書皆晉史中語獻之書洛神賦后有梁普光間題跋云唐人臨本不名何人獻之書陸士衡文賦鍾太傅墨迹議事表後錢惟演范堯夫薛祖道題錢文僖公題尚父嘗寶此帖尚父謂忠懿王鏐也唐人書唐太宗二帖一兩行十字若珠還合浦劒入延平泰和二年三月司封貟外郎栁公權記唐玄宗賜道士李􅉼光敕李陽氷墨迹篆侍御帖上有李後主合同印李陽氷篆二十六字后有韋處厚李啇隱題商隱字躰絶類黃庭經時開成三年也髙聞上人詫得韓序帖后有韓琦劉敞冨弼歐陽修宋敏求題云此卷蠟紙書非摹本也歐云如此韓公稱實録云書系顛草歐陽率更帖二臨本度尚帖襄陽寶定珍迹祕玩智永禪師春雨帖真草千文墨迹唐相李憕連句帖後跋云筆勢似李北海李北海毒熱帖臨夲李雍手簡後題觀者黃魯直張淳休卲篪王説張舜民等凡六十九人僧髙間觀張旭顛逸帖唐史惟則墨迹篆隸韻系小篆體例修狹后張浮體李公麟跋李太白醉歸墨迹後自題云吾頭懵懵試書此不能自辦賀生為我讀之汝年少眼明上有四世三公之印懷素草千文草聖遊京師帖論草字帖自敘帖布簾帖上林花發帖唐髙宗巳下諸帝墨迹手詔李北海休休帖白少傳墨迹六偈子唐元和大理評事吳通微行書千文唐人草北山移文垂洪二年寫貞元甲戍陸贄觀筆法似是孫過庭唐僧亞栖書吳彩鸞龍鱗楷韻後栁懸誠題云吳彩鸞世傳謫仙也一夕書廣韻一部即鬻於市人不測其意稔聞此説罕見其書數載勤求方獲斯本觀其神全氣古筆力遒徑出於自然非古今學人可及也時泰和九年九月十五日題其制共五十四葉鱗次相積皆留𥿄縫天寶八年製懷素洛中帖近於洛中得王右丞苔磯靜釣水閣間棊二畫其林野之思物景之清不覺身在其間信精筆感人也如此李白墨迹送賀八歸越詩顔書與兄常山太守書乞米帖與宗室李太保勉奉辝帖與盧八倉公快雪晴時帖二十八字與李太保狀后有唐陳銓印志祭濠州文孫過庭墨迹草書譜過庭字處禮陳留人髙宗垂拱二年書徽宗書譜云孫草書皆逼羲獻妙於用筆雋挍剛斷出於天材非積習所可至孫思邈書計二十一字坡書洗玉池銘擘窠真書瘦徑神奎閣碑墨迹上清儲祥宫碑墨迹然後書老泉撰商左山云蓋避黨禍故改云東坡醉書盧同詩為團練使書東坡觀世音贊靖康元年五月書蓋以殁前二月絶筆書也秋澗先生大全文集卷九十四
